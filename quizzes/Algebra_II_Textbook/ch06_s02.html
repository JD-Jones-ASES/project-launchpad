    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Perform the operation and simplify: $x^2/(x-2) - 4/(x-2)$.", "options": [{"text": "$x-2$", "isCorrect": false, "rationale": "This option would result if the numerator was $(x-2)^2$. The correct simplification is $(x^2-4)/(x-2)$, which factors to $((x-2)(x+2))/(x-2)$."}, {"text": "$x+2$", "isCorrect": true, "rationale": "When denominators are the same, combine the numerators: $(x^2 - 4)/(x-2)$. Factor the numerator as a difference of squares: $((x-2)(x+2))/(x-2)$. Cancel the common factor $(x-2)$ to get $x+2$ (provided $x \neq 2$)."}, {"text": "$(x^2-4)/(x-2)$", "isCorrect": false, "rationale": "This is the correct intermediate step after combining numerators, but the question asks to simplify the result, which involves factoring and canceling common terms."}, {"text": "$x^2-4$", "isCorrect": false, "rationale": "This would be the result if the denominator was 1, which is incorrect. The denominator is $(x-2)$ before simplification."}]}, {"question": "According to the textbook section, what is the least common denominator (LCD) of two or more rational expressions?", "options": [{"text": "The product of only the common prime polynomial factors, each raised to the lowest power.", "isCorrect": false, "rationale": "The LCD includes *all* distinct prime polynomial factors, not just common ones, and each is raised to the *highest* power, not the lowest."}, {"text": "The product of all distinct prime polynomial factors, each raised to the highest power in which it appears in any denominator.", "isCorrect": true, "rationale": "This statement is the exact definition of the LCD provided in the 'keyterm' section of the text. It correctly specifies 'all distinct prime polynomial factors' and 'highest power'."}, {"text": "The sum of all denominators, after factoring.", "isCorrect": false, "rationale": "The LCD is a product, not a sum, and it is a single expression used to rewrite fractions, not a combination of denominators."}, {"text": "The smallest numerical value that is divisible by all denominators.", "isCorrect": false, "rationale": "While the concept of 'smallest numerical value' applies to numeric fractions, for rational expressions, the LCD involves polynomial factors, not just a numerical value. Also, it's about being a multiple, not a divisor, of the denominators."}]}, {"question": "Find the LCD of $3/(10x^3)$ and $7/(15x)$.", "options": [{"text": "$30x$", "isCorrect": false, "rationale": "This LCD incorrectly uses the lowest power of $x$ (which is $x^1$) instead of the highest power ($x^3$). It also has the correct numerical part ($30$). "}, {"text": "$30x^3$", "isCorrect": true, "rationale": "Factor $10x^3$ as $2 \\cdot 5 \\cdot x^3$. Factor $15x$ as $3 \\cdot 5 \\cdot x$. The distinct factors are $2, 3, 5, x$. The highest power of $x$ is $x^3$. So, $LCD = 2 \\cdot 3 \\cdot 5 \\cdot x^3 = 30x^3$."}, {"text": "$150x^4$", "isCorrect": false, "rationale": "This LCD is the product of the original denominators, which is a common multiple but not necessarily the *least* common multiple. It multiplies $10 \\cdot 15$ and $x^3 \\cdot x$ incorrectly."}, {"text": "$5x$", "isCorrect": false, "rationale": "This represents a greatest common factor (GCF) rather than a least common multiple (LCM) or LCD. It only includes common factors at their lowest power."}]}, {"question": "Determine the LCD for the rational expressions $5/(x^2+5x+6)$ and $2/(x^2-4)$.", "options": [{"text": "$(x+2)(x+3)$", "isCorrect": false, "rationale": "This LCD only accounts for the factors of the first denominator. It misses $(x-2)$ from the second denominator."}, {"text": "$(x-2)(x+2)(x+3)$", "isCorrect": true, "rationale": "Factor the first denominator: $x^2+5x+6 = (x+2)(x+3)$. Factor the second denominator: $x^2-4 = (x-2)(x+2)$. The distinct factors are $(x+2), (x+3), (x-2)$. Each appears to the power of 1. So, the LCD is $(x-2)(x+2)(x+3)$."}, {"text": "$(x+2)$", "isCorrect": false, "rationale": "This is a common factor between the two denominators, but it is not the least common multiple; it doesn't include the other distinct factors."}, {"text": "$(x^2+5x+6)(x^2-4)$", "isCorrect": false, "rationale": "This is a common denominator but likely not the *least* common denominator. It's the product of the original denominators, which doesn't simplify using common factors."}]}, {"question": "Which sequence correctly outlines the steps for adding or subtracting rational expressions with different denominators, as described in the textbook section?", "options": [{"text": "1. Add or subtract numerators; keep the LCD. 2. Find the LCD. 3. Simplify. 4. Rewrite each fraction with the LCD.", "isCorrect": false, "rationale": "This sequence is incorrect because finding the LCD and rewriting fractions with it must occur *before* adding or subtracting numerators."}, {"text": "1. Find the LCD of all denominators. 2. Rewrite each fraction with the LCD. 3. Add or subtract the numerators; keep the LCD. 4. Simplify the result.", "isCorrect": true, "rationale": "This sequence directly matches the four steps outlined under the 'Adding/Subtracting with Different Denominators' property in the textbook section, ensuring the correct logical flow for the procedure."}, {"text": "1. Rewrite each fraction with the LCD. 2. Find the LCD. 3. Simplify. 4. Add or subtract the numerators.", "isCorrect": false, "rationale": "This sequence is incorrect. You cannot rewrite fractions with the LCD before you have actually found the LCD itself."}, {"text": "1. Simplify the result. 2. Find the LCD. 3. Rewrite each fraction with the LCD. 4. Add or subtract the numerators.", "isCorrect": false, "rationale": "This sequence is incorrect. Simplification is the final step, not the first. You must find the LCD, rewrite fractions, and combine numerators before simplifying."}]}, {"question": "Add $5/(x+2) + 3/(x-1)$.", "options": [{"text": "$(8x+1)/((x+2)(x-1))$", "isCorrect": true, "rationale": "The LCD is $(x+2)(x-1)$. Rewrite the fractions: $5(x-1)/((x+2)(x-1)) + 3(x+2)/((x+2)(x-1))$. Combine numerators: $(5x-5 + 3x+6)/((x+2)(x-1)) = (8x+1)/((x+2)(x-1))$."}, {"text": "$8x+1$", "isCorrect": false, "rationale": "This incorrectly omits the common denominator from the final answer. The result must remain a rational expression."}, {"text": "$(8x+1)/((x+2)+(x-1))$", "isCorrect": false, "rationale": "The denominators are multiplied to get the LCD, not added. This operation is incorrect."}, {"text": "$(5x-5+3x+2)/((x+2)(x-1))$", "isCorrect": false, "rationale": "The distribution in the second numerator is incorrect; $3(x+2)$ should be $3x+6$, not $3x+2$."}]}, {"question": "Subtract $x/(x^2+x-6) - 1/(x^2-9)$.", "options": [{"text": "$(x^2-4x+2)/((x-3)(x+3)(x-2))$", "isCorrect": true, "rationale": "Factor denominators: $x^2+x-6 = (x+3)(x-2)$ and $x^2-9 = (x-3)(x+3)$. The LCD is $(x+3)(x-2)(x-3)$. Rewrite fractions: $x(x-3)/LCD - 1(x-2)/LCD$. Combine numerators: $(x^2-3x - (x-2))/LCD = (x^2-3x-x+2)/LCD = (x^2-4x+2)/((x-3)(x+3)(x-2))$. The terms $x-2$ and $x-3$ can be rearranged in the denominator without changing the expression."}, {"text": "$(x^2-2x-2)/((x+3)(x-2)(x-3))$", "isCorrect": false, "rationale": "This option contains an arithmetic error in the numerator: $-3x - x$ should be $-4x$, not $-2x$. Also, the sign of the constant term in the numerator is incorrect, it should be $+2$, not $-2$ (from $-(-2)$)."}, {"text": "$(x^2-4x-2)/((x+3)(x-2)(x-3))$", "isCorrect": false, "rationale": "This option incorrectly has $-2$ in the numerator, failing to distribute the negative sign to the constant term when subtracting $-(x-2)$ which should result in $+2$."}, {"text": "$(x^2-4x+2)/((x^2+x-6)(x^2-9))$", "isCorrect": false, "rationale": "This option uses the product of the original denominators as the LCD, which is a common denominator but not the *least* common denominator. It would be a correct expression if the common factors were not identified and removed."}]}, {"question": "Why is it crucial to state restrictions on the variable (e.g., $x \\neq 2$) when simplifying rational expressions?", "options": [{"text": "To make the expression easier to factor by limiting potential terms.", "isCorrect": false, "rationale": "Restrictions are about mathematical validity, not making factoring easier. Factoring is a tool used to find restrictions and simplify, not the other way around."}, {"text": "To identify values that would make the original expression undefined, ensuring the simplified form is equivalent to the original.", "isCorrect": true, "rationale": "Restrictions are necessary because they specify values of the variable for which the original denominator (or any intermediate denominator) would be zero, making the expression undefined. The simplified expression must maintain these original restrictions to be equivalent."}, {"text": "To limit the number of possible solutions to an equation involving the expression.", "isCorrect": false, "rationale": "While restrictions can exclude potential solutions in an equation, their primary purpose in *simplification* is to define the domain of the expression, not to limit solutions to a problem that might not even be an equation."}, {"text": "To simplify the process of finding the LCD by ruling out complex factors.", "isCorrect": false, "rationale": "Restrictions are a result of analyzing the denominators, not a tool to simplify finding the LCD. The LCD is found by factoring, and then restrictions are identified from the factors."}]}, {"question": "In the context of adding and subtracting rational expressions, what is the primary role of factoring?", "options": [{"text": "To always make the numerators simpler before any other operation.", "isCorrect": false, "rationale": "Factoring is primarily applied to denominators to find the LCD, and sometimes to numerators for simplification *after* combining, but not 'always' to make numerators simpler before other operations."}, {"text": "To identify common terms for direct cancellation before finding the LCD.", "isCorrect": false, "rationale": "While factoring helps identify common terms, direct cancellation *before* finding the LCD and rewriting fractions is generally not the correct procedure for adding/subtracting (it applies more to multiplying/dividing single rational expressions)."}, {"text": "To determine the least common denominator (LCD) and to simplify the final result by canceling common factors.", "isCorrect": true, "rationale": "The text explicitly states that 'we must find the least common denominator (LCD) by factoring' and 'After combining, simplify by factoring and canceling if possible.' This option covers both critical roles of factoring."}, {"text": "To change the sign of the expression for easier calculation.", "isCorrect": false, "rationale": "Factoring does not inherently change the sign of an expression for calculation purposes. While factoring out a negative can change appearances, it's not its primary role in the context of adding/subtracting rational expressions."}]}, {"question": "Simplify $2/x + 5/(x-1) - 3/(x^2-x)$.", "options": [{"text": "$(7x-5)/(x(x-1))$", "isCorrect": true, "rationale": "First, factor $x^2-x$ as $x(x-1)$. The LCD for $x$, $(x-1)$, and $x(x-1)$ is $x(x-1)$. Rewrite each fraction with the LCD: $2(x-1)/(x(x-1)) + 5x/(x(x-1)) - 3/(x(x-1))$. Combine numerators: $(2x-2 + 5x - 3)/(x(x-1)) = (7x-5)/(x(x-1))$."}, {"text": "$(7x-2)/(x(x-1))$", "isCorrect": false, "rationale": "This option has an incorrect constant term in the numerator. It should be $-2-3=-5$, not $-2$ or a derivation resulting in $-2$."}, {"text": "$(7x+5)/(x(x-1))$", "isCorrect": false, "rationale": "This option has an incorrect sign for the constant term in the numerator. It should be $-5$ from $-2-3$, not $+5$."}, {"text": "$(4x-5)/(x(x-1))$", "isCorrect": false, "rationale": "This option has an incorrect coefficient for $x$ in the numerator. The terms $2x$ and $5x$ add to $7x$, not $4x$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
