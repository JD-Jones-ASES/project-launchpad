        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the *first* essential step when solving a rational inequality like f(x) > g(x) according to the provided strategy?", "options": [{"text": "Multiply both sides by the denominator to clear it.", "isCorrect": false, "rationale": "The caution note explicitly warns against multiplying by the denominator without knowing its sign, as it can lead to incorrect results."}, {"text": "Find the zeros of the numerator and denominator immediately.", "isCorrect": false, "rationale": "While finding zeros is crucial, it's Step 3. The initial steps involve rearrangement and simplification."}, {"text": "Rearrange the inequality to have 0 on one side.", "isCorrect": true, "rationale": "Step 1 of the strategy states to 'Rearrange to get 0 on one side: f(x) - g(x) < 0'."}, {"text": "Test values in each interval on a number line.", "isCorrect": false, "rationale": "Testing values is part of building the sign chart (Step 4), which comes after identifying critical values."}], "id": "q01"}, {"question": "In the context of solving a rational inequality p(x)/q(x) ≤ 0, what do \"critical values\" refer to?", "options": [{"text": "Only the values of x where p(x) = 0.", "isCorrect": false, "rationale": "This only accounts for numerator zeros, neglecting the critical role of denominator zeros in defining intervals and exclusions."}, {"text": "Only the values of x where q(x) = 0.", "isCorrect": false, "rationale": "This only accounts for denominator zeros, neglecting the values where the expression equals zero due to the numerator."}, {"text": "The values of x where p(x) = 0 or q(x) = 0.", "isCorrect": true, "rationale": "Critical values are defined as the zeros of the numerator (potential sign changes and points where the expression can be zero) and the zeros of the denominator (where the expression is undefined and also potential sign changes)."}, {"text": "Any x-value that makes the expression positive.", "isCorrect": false, "rationale": "This describes a solution interval, not the definition of critical values."}], "id": "q02"}, {"question": "When writing the final solution to a rational inequality p(x)/q(x) ≥ 0, which of the following statements is true regarding interval endpoints?", "options": [{"text": "All critical values are always excluded from the solution.", "isCorrect": false, "rationale": "This is incorrect. For inclusive inequalities (≥ or ≤), numerator zeros are included."}, {"text": "Zeros of the numerator (p(x)=0) are included, but zeros of the denominator (q(x)=0) are always excluded.", "isCorrect": true, "rationale": "The strategy states to 'include interval endpoints where the original expression equals the target (for ≤ or ≥), but exclude any x-values where the expression is undefined.' Numerator zeros make the expression zero; denominator zeros make it undefined."}, {"text": "Zeros of the denominator (q(x)=0) are included, but zeros of the numerator (p(x)=0) are always excluded.", "isCorrect": false, "rationale": "This is incorrect. Zeros of the denominator always make the expression undefined and must be excluded."}, {"text": "All critical values are always included in the solution.", "isCorrect": false, "rationale": "This is incorrect because values that make the denominator zero are always excluded."}], "id": "q03"}, {"question": "The textbook states, \"Never multiply both sides of a rational inequality by the denominator without knowing its sign.\" Why is this caution emphasized?", "options": [{"text": "It simplifies the problem too much, making it harder to learn the sign-chart method.", "isCorrect": false, "rationale": "The caution is based on mathematical validity, not pedagogical difficulty."}, {"text": "Multiplying by a negative value reverses the inequality sign, which can be overlooked if the denominator's sign isn't constant across the number line.", "isCorrect": true, "rationale": "If the denominator can be both positive and negative, multiplying by it requires splitting the problem into cases based on the denominator's sign, which is exactly what the sign-chart approach avoids."}, {"text": "It always leads to extraneous solutions that are difficult to identify.", "isCorrect": false, "rationale": "While extraneous solutions can arise from algebraic manipulation, the primary concern here is incorrect inequality direction due to unknown sign."}, {"text": "Rational expressions are designed to be solved using division only.", "isCorrect": false, "rationale": "This statement is not a mathematical principle governing rational expressions."}], "id": "q04"}, {"question": "Solve the rational inequality \\frac{x+3}{x-2} < 0.", "options": [{"text": "$(-\\infty, -3) \\cup (2, \\infty)$", "isCorrect": false, "rationale": "In this interval, the expression is positive or zero, not strictly less than zero."}, {"text": "$(-3, 2)$", "isCorrect": true, "rationale": "Critical values are $x=-3$ (numerator zero) and $x=2$ (denominator zero). Testing $x=0$ in the interval $(-3, 2)$ gives $3/(-2) = -1.5$, which is $<0$. For strict inequality, all critical values are excluded."}, {"text": "$(-\\infty, -3]$", "isCorrect": false, "rationale": "This interval is only part of where the expression is negative and incorrectly includes $x=-3$ for a strict inequality."}, {"text": "$[-3, 2)$", "isCorrect": false, "rationale": "This interval correctly identifies the range but incorrectly includes $x=-3$. For a strict inequality, $x=-3$ (where the expression is 0) should be excluded."}], "id": "q05"}, {"question": "To solve $\\frac{3}{x-1} \\ge 2$, what is the correct form after the first two steps (rearranging and simplifying to a single fraction)?", "options": [{"text": "$\\frac{5-2x}{x-1} \\ge 0$", "isCorrect": true, "rationale": "Step 1: Subtract 2 from both sides: $\\frac{3}{x-1} - 2 \\ge 0$. Step 2: Combine over a common denominator: $\\frac{3}{x-1} - \\frac{2(x-1)}{x-1} \\ge 0 \\implies \\frac{3 - (2x-2)}{x-1} \\ge 0 \\implies \\frac{3-2x+2}{x-1} \\ge 0 \\implies \\frac{5-2x}{x-1} \\ge 0$."}, {"text": "$\\frac{1}{x-1} \\ge 0$", "isCorrect": false, "rationale": "This involves incorrect arithmetic when combining the terms. $3 - 2(x-1)$ does not simplify to 1."}, {"text": "$3 \\ge 2(x-1)$", "isCorrect": false, "rationale": "This step involves multiplying by the denominator $(x-1)$ without considering its sign, which is explicitly warned against."}, {"text": "$\\frac{3-2x}{x-1} \\ge 0$", "isCorrect": false, "rationale": "This is close but shows an arithmetic error in the numerator: $3 - (2x-2)$ should be $3-2x+2$, resulting in $5-2x$, not $3-2x$."}], "id": "q06"}, {"question": "A sign chart for the expression $\\frac{(x+1)(x-3)}{x}$ shows the expression is negative on $(-\\infty, -1)$ and $(0, 3)$. Based on this, what is the solution to $\\frac{(x+1)(x-3)}{x} \\ge 0$?", "options": [{"text": "$(-\\infty, -1) \\cup (0, 3)$", "isCorrect": false, "rationale": "This interval represents where the expression is strictly negative, not where it is positive or zero."}, {"text": "$[-1, 0) \\cup [3, \\infty)$", "isCorrect": true, "rationale": "Since the expression is negative on $(-\\infty, -1)$ and $(0, 3)$, it must be positive on the complementary intervals $(-1, 0)$ and $(3, \\infty)$. For $\\ge 0$, we include numerator zeros ($x=-1, x=3$) and exclude denominator zeros ($x=0$). Thus, the solution is $[-1, 0) \\cup [3, \\infty)$."}, {"text": "$(-\\infty, -1] \\cup (0, 3]$", "isCorrect": false, "rationale": "This mixes intervals where the expression is negative and positive, and misidentifies the behavior around $x=0$ and $x=3$ based on the given information."}, {"text": "$(-1, 0) \\cup (3, \\infty)$", "isCorrect": false, "rationale": "This interval correctly identifies where the expression is strictly positive but incorrectly excludes the numerator zeros, which should be included for a 'greater than or equal to' inequality."}], "id": "q07"}, {"question": "For the inequality $\\frac{x^2 - 9}{x^2 + x - 2} > 0$, what are all the critical values?", "options": [{"text": "$-3, 3$", "isCorrect": false, "rationale": "These are only the zeros of the numerator. Critical values must include zeros of the denominator as well."}, {"text": "$-2, 1$", "isCorrect": false, "rationale": "These are only the zeros of the denominator. Critical values must include zeros of the numerator as well."}, {"text": "$-3, -2, 1, 3$", "isCorrect": true, "rationale": "Factor the numerator: $x^2 - 9 = (x-3)(x+3)$, so numerator zeros are $x=3, x=-3$. Factor the denominator: $x^2 + x - 2 = (x+2)(x-1)$, so denominator zeros are $x=-2, x=1$. All these values are critical values."}, {"text": "$0$", "isCorrect": false, "rationale": "The value $x=0$ is not a zero of either the numerator or the denominator, so it's not a critical value in this case."}], "id": "q08"}, {"question": "Why are $x$-values that make the denominator of a rational expression zero *always* excluded from the solution set of a rational inequality, regardless of whether the inequality is strict (>, <) or inclusive (≥, ≤)?", "options": [{"text": "They are typically very large numbers that complicate the solution process.", "isCorrect": false, "rationale": "The magnitude of the numbers is irrelevant; it's about the mathematical definition."}, {"text": "The expression becomes undefined at these values, making the inequality invalid.", "isCorrect": true, "rationale": "A rational expression is undefined when its denominator is zero. An undefined expression cannot satisfy any inequality condition (>, <, ≥, ≤), so these values must always be excluded from the domain and thus the solution set."}, {"text": "They are always extraneous solutions that arise from algebraic manipulation.", "isCorrect": false, "rationale": "Extraneous solutions are typically introduced in equations when operations like squaring or multiplying by variable expressions occur. Denominator zeros are domain restrictions, not extraneous solutions in the typical sense."}, {"text": "Including them would make the sign chart too complex to interpret.", "isCorrect": false, "rationale": "The complexity of the sign chart is not the mathematical reason for exclusion. The reason is the expression's undefined nature."}], "id": "q09"}, {"question": "Solve the rational inequality $\\frac{x+5}{x-1} \\ge 0$.", "options": [{"text": "$(- \\infty, -5] \\cup (1, \\infty)$", "isCorrect": true, "rationale": "Critical values are $x=-5$ (numerator zero) and $x=1$ (denominator zero). Constructing a sign chart: for $x < -5$, expression is $(-) / (-) = (+)$; for $-5 < x < 1$, expression is $(+) / (-) = (-)$; for $x > 1$, expression is $(+) / (+) = (+)$. We want $\\ge 0$. So, positive intervals include $(-\\infty, -5)$ and $(1, \\infty)$. Since it's $\\ge 0$, we include the numerator zero $x=-5$. The denominator zero $x=1$ is always excluded. Thus, $(-\\infty, -5] \\cup (1, \\infty)$."}, {"text": "$[-5, 1)$", "isCorrect": false, "rationale": "This interval is where the expression is negative or zero, not positive or zero."}, {"text": "$(-5, 1)$", "isCorrect": false, "rationale": "This interval is where the expression is strictly negative."}, {"text": "$(- \\infty, -5) \\cup (1, \\infty)$", "isCorrect": false, "rationale": "This solution incorrectly excludes $x=-5$, which should be included because the inequality is 'greater than or equal to'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
