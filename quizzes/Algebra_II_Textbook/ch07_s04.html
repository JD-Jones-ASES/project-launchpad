    };

<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of an exponential equation?", "options": [{"text": "The variable appears as a base.", "isCorrect": false, "rationale": "If the variable is the base (e.g., x^2=4), it is a power equation, not necessarily exponential. An exponential equation requires the variable to be in the exponent."}, {"text": "The variable appears in an exponent.", "isCorrect": true, "rationale": "The textbook states, 'An exponential equation is one in which the variable appears in an exponent.' This is the defining feature."}, {"text": "The equation involves a constant exponent.", "isCorrect": false, "rationale": "An expression with a constant exponent (e.g., 2^3=8) is an arithmetic expression, not an equation with a variable in the exponent."}, {"text": "The equation contains logarithmic terms.", "isCorrect": false, "rationale": "While exponential equations can be solved using logarithms, the presence of logarithmic terms is not their defining characteristic; they may or may not contain them."}], "id": "q01"}, {"question": "Solve the equation 2^3x = 2^(x+4).", "options": [{"text": "x = 4", "isCorrect": false, "rationale": "This would be the solution if 2x = 8, implying a calculation error."}, {"text": "x = 2", "isCorrect": true, "rationale": "Since the bases are equal, we set the exponents equal: 3x = x + 4. Subtracting x from both sides gives 2x = 4. Dividing by 2 yields x = 2."}, {"text": "x = -2", "isCorrect": false, "rationale": "This would result from an error in algebraic manipulation, possibly with signs."}, {"text": "x = 1", "isCorrect": false, "rationale": "This would be the solution if 2x = 2, indicating an error in the initial exponent equality or solving."}], "id": "q02"}, {"question": "Which of the following equations CANNOT be solved directly by applying the same-base method without first rewriting one or both bases?", "options": [{"text": "5^x = 125", "isCorrect": false, "rationale": "125 can be rewritten as 5^3, so the equation becomes 5^x = 5^3, allowing direct application of the same-base method."}, {"text": "2^(x-1) = 16", "isCorrect": false, "rationale": "16 can be rewritten as 2^4, so the equation becomes 2^(x-1) = 2^4, allowing direct application of the same-base method."}, {"text": "9^x = 27", "isCorrect": true, "rationale": "To solve 9^x = 27, both 9 and 27 must be rewritten as powers of a common base (3): (3^2)^x = 3^3. Only then can the exponents be set equal. This is an example from the text requiring base transformation."}, {"text": "3^2x = 3^(x+5)", "isCorrect": false, "rationale": "The bases are already the same (3), so the exponents can be set equal directly without any base rewriting."}], "id": "q03"}, {"question": "When is taking the logarithm of both sides the preferred strategy for solving an exponential equation?", "options": [{"text": "When the variable is in the base of the exponential term.", "isCorrect": false, "rationale": "If the variable is in the base (e.g., x^3=8), it's not an exponential equation, and logarithms are not the primary method for solving it."}, {"text": "When the exponential expression cannot be isolated.", "isCorrect": false, "rationale": "The first step in the logarithm strategy is to 'Isolate the exponential expression.' If it cannot be isolated, other methods might be needed, or the problem might be ill-posed for this strategy."}, {"text": "When the equation can be rewritten with the same base on both sides.", "isCorrect": false, "rationale": "If the equation can be rewritten with the same base, the 'Same Base' method is generally simpler and preferred over logarithms."}, {"text": "When the bases of the exponential terms cannot be easily made equal.", "isCorrect": true, "rationale": "The textbook states that taking the logarithm of both sides is used 'If the equation cannot be rewritten with the same base,' which occurs when the bases cannot be easily made equal."}], "id": "q04"}, {"question": "To solve 5^x = 80, which of the following is the correct first step after deciding to use logarithms?", "options": [{"text": "x log 5 = log 80", "isCorrect": false, "rationale": "This is the result after applying the Power Rule to log(5^x), not the very first step of taking the logarithm of both sides."}, {"text": "log(5^x) = log 80", "isCorrect": true, "rationale": "As shown in the example, the first step is to apply the logarithm (common or natural) to both sides of the equation: log(5^x) = log 80."}, {"text": "x = 80/5", "isCorrect": false, "rationale": "This incorrectly attempts to treat the exponent as a coefficient, which is not a valid mathematical operation for solving exponential equations."}, {"text": "5 = log 80 / x", "isCorrect": false, "rationale": "This incorrectly rearranges the terms and only applies the logarithm to 80, not to 5^x."}], "id": "q05"}, {"question": "What is the first step in solving 3e^2x - 1 = 74 using logarithms?", "options": [{"text": "Take the natural logarithm of both sides.", "isCorrect": false, "rationale": "You cannot take the logarithm of both sides directly when there are other terms added or subtracted. The exponential expression must be isolated first."}, {"text": "Apply the Power Rule for logarithms.", "isCorrect": false, "rationale": "The Power Rule is applied after the logarithm has been taken on an isolated exponential term, not as the first step for this equation."}, {"text": "Add 1 to both sides, then divide by 3.", "isCorrect": true, "rationale": "The first strategy step for using logarithms is to 'Isolate the exponential expression.' For 3e^2x - 1 = 74, this involves adding 1 to get 3e^2x = 75, then dividing by 3 to get e^2x = 25."}, {"text": "Substitute u = e^x.", "isCorrect": false, "rationale": "Substitution like u=e^x is typically used for quadratic-form exponential equations (e.g., e^2x - 5e^x + 6 = 0), not for isolating a single exponential term."}], "id": "q06"}, {"question": "Consider the equation e^2x - 5e^x + 6 = 0. Which technique from the section is most appropriate for the initial approach to solving this equation?", "options": [{"text": "The same-base method.", "isCorrect": false, "rationale": "The same-base method is not applicable here due to the multiple exponential terms with different coefficients and the constant term, preventing easy base equality."}, {"text": "Taking the logarithm of both sides directly.", "isCorrect": false, "rationale": "Taking the logarithm of a sum or difference (like ln(e^2x - 5e^x + 6)) does not simplify nicely and is not a valid first step."}, {"text": "Substitution to transform it into a quadratic equation.", "isCorrect": true, "rationale": "As demonstrated in the example, this equation is in quadratic form. By letting u = e^x, the equation transforms into u^2 - 5u + 6 = 0, which can be solved using factoring or the quadratic formula."}, {"text": "Isolating e^2x and then taking the logarithm.", "isCorrect": false, "rationale": "You cannot isolate e^2x on one side effectively due to the presence of the e^x term, without first employing a substitution strategy."}], "id": "q07"}, {"question": "According to the text, which of the following statements about choosing between common logarithm (log) and natural logarithm (ln) for solving exponential equations is true?", "options": [{"text": "Only the natural logarithm (ln) can be used to solve exponential equations.", "isCorrect": false, "rationale": "The text explicitly states, 'You may use either the common logarithm (log) or the natural logarithm (ln) when solving exponential equations'."}, {"text": "The common logarithm (log) is always preferred in science and calculus.", "isCorrect": false, "rationale": "The text states, 'In practice, ln is preferred in science and calculus, while log appears more often in engineering contexts'."}, {"text": "Both common and natural logarithms yield the same numerical answer for x.", "isCorrect": true, "rationale": "The text clarifies that 'both give the same answer (here x = log 80/log 5 = ln 80/ln 5).'"}, {"text": "Using common logarithm (log) is generally faster than natural logarithm (ln).", "isCorrect": false, "rationale": "The text does not mention any difference in speed between the two logarithms for calculation, only preferences in different fields."}], "id": "q08"}, {"question": "An investment grows according to A(t) = 1000 * 2^(t/5). To find out in how many years the investment will reach $7,000, what is the correct setup after substituting A(t)?", "options": [{"text": "1000 * log(2^(t/5)) = log(7000)", "isCorrect": false, "rationale": "Taking the logarithm should happen after isolating the exponential term. Applying log to 1000 * 2^(t/5) directly is incorrect."}, {"text": "2^(t/5) = 7", "isCorrect": true, "rationale": "First, set the equation: 1000 * 2^(t/5) = 7000. Then, isolate the exponential expression by dividing both sides by 1000: 2^(t/5) = 7. This is the correct setup before applying logarithms."}, {"text": "(t/5) * ln 2 = ln 7000", "isCorrect": false, "rationale": "This setup incorrectly skips the step of isolating the exponential term from the coefficient of 1000 before taking logarithms, and incorrectly applies ln only to 7000, not 1000 * 2^(t/5)."}, {"text": "1000 * (t/5) * 2 = 7000", "isCorrect": false, "rationale": "This treats the exponent (t/5) as multiplication, which is a fundamental misunderstanding of how exponents work."}], "id": "q09"}, {"question": "Which of the following equations is best solved by first rewriting terms with a common base?", "options": [{"text": "3e^x = 15", "isCorrect": false, "rationale": "This equation requires isolating e^x and then taking the natural logarithm to solve for x."}, {"text": "7^x = 100", "isCorrect": false, "rationale": "7 and 100 (or its factors) do not share an obvious common integer base, so taking logarithms is the appropriate method."}, {"text": "2^(x+1) = 32", "isCorrect": true, "rationale": "32 can be easily rewritten as 2^5. Therefore, the equation becomes 2^(x+1) = 2^5, allowing direct application of the same-base method (x+1 = 5)."}, {"text": "e^2x - e^x - 2 = 0", "isCorrect": false, "rationale": "This is an exponential equation in quadratic form, best solved by using substitution (u = e^x) to convert it into a quadratic equation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
