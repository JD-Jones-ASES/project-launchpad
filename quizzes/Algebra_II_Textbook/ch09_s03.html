<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental defining characteristic of an ellipse?", "options": [{"text": "The set of all points equidistant from a fixed point and a fixed line.", "isCorrect": false, "rationale": "This definition describes a parabola, not an ellipse. For a parabola, the distance to the focus equals the distance to the directrix."}, {"text": "The set of all points for which the sum of the distances from two fixed points (the foci) is constant.", "isCorrect": true, "rationale": "This is the precise definition of an ellipse as stated in the text. The sum of the distances from any point on the ellipse to its two foci is always the same constant value."}, {"text": "The set of all points for which the difference of the distances from two fixed points is constant.", "isCorrect": false, "rationale": "This definition describes a hyperbola, not an ellipse. For a hyperbola, the absolute difference of the distances to the two foci is constant."}, {"text": "The set of all points equidistant from a single fixed point.", "isCorrect": false, "rationale": "This definition describes a circle, which is a special case of an ellipse where the two foci coincide (eccentricity is 0), but it's not the general definition for an ellipse."}], "id": "q01"}, {"question": "For an ellipse described by the equation $(x-h)^2/b^2 + (y-k)^2/a^2 = 1$ where $a > b > 0$, what can be inferred about its major axis?", "options": [{"text": "The major axis is horizontal.", "isCorrect": false, "rationale": "The major axis orientation is determined by which term has the larger denominator ($a^2$). In this equation, $a^2$ is under the $y$-term, indicating a vertical major axis."}, {"text": "The major axis is vertical.", "isCorrect": true, "rationale": "According to the text, if the larger denominator ($a^2$) is under the $y$-term, the major axis is vertical. The semi-major axis $a$ determines the length along the major axis."}, {"text": "The major axis passes through the origin.", "isCorrect": false, "rationale": "The major axis passes through the center $(h,k)$. It only passes through the origin if the center itself is at $(0,0)$."}, {"text": "The major axis is parallel to the minor axis.", "isCorrect": false, "rationale": "The major and minor axes of an ellipse are always perpendicular to each other, not parallel."}], "id": "q02"}, {"question": "Consider the ellipse given by the equation $(x-3)^2/64 + (y+1)^2/36 = 1$. What are the coordinates of its foci?", "options": [{"text": "$(3 \\pm 8, -1)$", "isCorrect": false, "rationale": "These coordinates represent the vertices of the ellipse, which are located at a distance 'a' from the center along the major axis, not the foci."}, {"text": "$(3 \\pm 6, -1)$", "isCorrect": false, "rationale": "The value $b=6$ represents the semi-minor axis. The foci are located at a distance 'c' from the center along the major axis, not 'b'."}, {"text": "$(3 \\pm 2\\sqrt{7}, -1)$", "isCorrect": true, "rationale": "The center is $(3, -1)$. With $a^2=64$ and $b^2=36$, we find $c^2 = a^2 - b^2 = 64 - 36 = 28$, so $c = \\sqrt{28} = 2\\sqrt{7}$. Since $a^2$ is under the $x$-term, the major axis is horizontal, so the foci are at $(h \\pm c, k) = (3 \\pm 2\\sqrt{7}, -1)$."}, {"text": "$(3, -1 \\pm 2\\sqrt{7})$", "isCorrect": false, "rationale": "This would be the coordinates of the foci if the major axis were vertical. However, since $a^2$ is under the $x$-term, the major axis is horizontal."}], "id": "q03"}, {"question": "An astronomer observes two celestial bodies orbiting a star. Body A's orbit has an eccentricity of 0.05, while Body B's orbit has an eccentricity of 0.85. Which statement accurately describes their orbits?", "options": [{"text": "Body A's orbit is more elongated than Body B's orbit.", "isCorrect": false, "rationale": "An eccentricity closer to 0 indicates a nearly circular orbit, while an eccentricity closer to 1 indicates a very elongated orbit. Therefore, Body A's orbit is nearly circular, not more elongated."}, {"text": "Body B's orbit is nearly circular, while Body A's is very elongated.", "isCorrect": false, "rationale": "This statement incorrectly reverses the characteristics. Body B's high eccentricity (0.85) means it's very elongated, and Body A's low eccentricity (0.05) means it's nearly circular."}, {"text": "Body A's orbit is nearly circular, and Body B's orbit is very elongated.", "isCorrect": true, "rationale": "An eccentricity ($e$) close to 0 means the ellipse is nearly circular (like Body A with $e=0.05$). An eccentricity close to 1 means the ellipse is very elongated (like Body B with $e=0.85$). This statement correctly applies the concept of eccentricity."}, {"text": "Both orbits are perfectly circular.", "isCorrect": false, "rationale": "A perfectly circular orbit has an eccentricity of exactly 0. Since both values are greater than 0, neither orbit is perfectly circular."}], "id": "q04"}, {"question": "After completing the square, the equation $25x^2 + 4y^2 + 150x - 8y + 129 = 0$ is transformed into standard form. What is the center of this ellipse?", "options": [{"text": "$(3, 1)$", "isCorrect": false, "rationale": "This would be the center if the terms were $(x-3)^2$ and $(y-1)^2$."}, {"text": "$(-3, -1)$", "isCorrect": false, "rationale": "This center would result from $(x+3)^2$ and $(y+1)^2$ terms."}, {"text": "$(-3, 1)$", "isCorrect": true, "rationale": "First, group terms: $25(x^2 + 6x) + 4(y^2 - 2y) = -129$. Complete the square: $25(x^2 + 6x + 9) + 4(y^2 - 2y + 1) = -129 + 25(9) + 4(1)$. This simplifies to $25(x+3)^2 + 4(y-1)^2 = 100$. Dividing by 100 gives $(x+3)^2/4 + (y-1)^2/25 = 1$. The center is therefore $(-3, 1)$."}, {"text": "$(3, -1)$", "isCorrect": false, "rationale": "This center would result from $(x-3)^2$ and $(y+1)^2$ terms."}], "id": "q05"}, {"question": "An ellipse has its center at the origin, a major axis of length 10 along the x-axis, and its foci are at $(\\pm 4, 0)$. What is the length of its semi-minor axis, $b$?", "options": [{"text": "3", "isCorrect": true, "rationale": "The major axis length is $2a=10$, so $a=5$. The foci at $(\\pm 4, 0)$ indicate $c=4$. Using the relationship $b^2 = a^2 - c^2$, we get $b^2 = 5^2 - 4^2 = 25 - 16 = 9$. Therefore, $b = 3$."}, {"text": "4", "isCorrect": false, "rationale": "This value represents $c$, the distance from the center to a focus, not the semi-minor axis length $b$."}, {"text": "5", "isCorrect": false, "rationale": "This value represents $a$, the semi-major axis length, not the semi-minor axis length $b$."}, {"text": "$\\sqrt{41}$", "isCorrect": false, "rationale": "This value would be $a$ if $b=4$ and $c=5$, which is incorrect given $a>c$ and $a>b$ for an ellipse."}], "id": "q06"}, {"question": "For a planet orbiting a star in an elliptical path, if $a$ is the semi-major axis and $c$ is the distance from the center of the ellipse to a focus (where the star is located), how are the perihelion (closest point) and aphelion (farthest point) distances calculated?", "options": [{"text": "Perihelion = $a+c$, Aphelion = $a-c$", "isCorrect": false, "rationale": "This incorrectly swaps the calculations. Perihelion is the closest point, and aphelion is the farthest, relative to the focus."}, {"text": "Perihelion = $a-c$, Aphelion = $a+c$", "isCorrect": true, "rationale": "The perihelion (closest distance to the focus) is found by subtracting the focal distance $c$ from the semi-major axis $a$. The aphelion (farthest distance) is found by adding $c$ to $a$."}, {"text": "Perihelion = $c-a$, Aphelion = $c+a$", "isCorrect": false, "rationale": "Since $a > c$ for any non-circular ellipse, $c-a$ would result in a negative distance, which is physically impossible. This formula is incorrect."}, {"text": "Both perihelion and aphelion are equal to $a$.", "isCorrect": false, "rationale": "This would only be true if the orbit were a perfect circle ($c=0$), where all points are equidistant from the center (and coincident focus)."}], "id": "q07"}, {"question": "In the context of conic sections, how is an ellipse formed by the intersection of a plane and a double-napped cone?", "options": [{"text": "The plane is parallel to the base of the cone.", "isCorrect": false, "rationale": "A plane parallel to the base of the cone intersects to form a circle, not an ellipse (unless considered a special case of an ellipse)."}, {"text": "The plane cuts the cone at an angle, intersecting both nappes.", "isCorrect": false, "rationale": "A plane intersecting both nappes of a double-napped cone forms a hyperbola."}, {"text": "The plane cuts the cone at an angle, not parallel to the base or a side, and intersects only one nappe.", "isCorrect": true, "rationale": "The text states that an ellipse arises when a plane cuts a cone at an angle, specifically not parallel to the base (which gives a circle) and not parallel to a side (which gives a parabola), and intersects only one nappe."}, {"text": "The plane is parallel to a generator (side) of the cone.", "isCorrect": false, "rationale": "A plane parallel to a generator (or side) of the cone forms a parabola."}], "id": "q08"}, {"question": "What occurs when the eccentricity ($e$) of an ellipse approaches 0?", "options": [{"text": "The ellipse becomes extremely elongated.", "isCorrect": false, "rationale": "An ellipse becomes extremely elongated when its eccentricity approaches 1, not 0."}, {"text": "The foci merge with the center, and the ellipse becomes a circle.", "isCorrect": true, "rationale": "As $e = c/a$ approaches 0, $c$ must approach 0 (since $a$ is positive). When $c=0$, the foci coincide with the center, and the semi-major axis $a$ becomes equal to the semi-minor axis $b$, forming a perfect circle. This is the definition of a circle as a limiting case of an ellipse."}, {"text": "The semi-major axis becomes much larger than the semi-minor axis.", "isCorrect": false, "rationale": "When eccentricity approaches 0, $c \\to 0$, which means $a^2 = b^2 + c^2$ implies $a^2 \\approx b^2$, so $a$ and $b$ become nearly equal. The ellipse becomes more circular, not more flattened."}, {"text": "The ellipse degenerates into a straight line segment.", "isCorrect": false, "rationale": "This extreme elongation occurs as eccentricity approaches 1, where the foci move towards the vertices, effectively flattening the ellipse to a line segment between the vertices."}], "id": "q09"}, {"question": "For the ellipse $(x+5)^2/9 + (y-4)^2/16 = 1$, identify its center, major axis orientation, and the coordinates of its vertices.", "options": [{"text": "Center: $(-5, 4)$; Horizontal major axis; Vertices: $(-5 \\pm 4, 4)$.", "isCorrect": false, "rationale": "The major axis orientation is incorrect. Since $16 > 9$, $a^2$ is under the $y$-term, indicating a vertical major axis."}, {"text": "Center: $(5, -4)$; Vertical major axis; Vertices: $(5, -4 \\pm 4)$.", "isCorrect": false, "rationale": "The center is incorrectly identified. The center is $(h, k)$, which is $(-5, 4)$, not $(5, -4)$."}, {"text": "Center: $(-5, 4)$; Vertical major axis; Vertices: $(-5, 8)$ and $(-5, 0)$.", "isCorrect": true, "rationale": "The center is $(h, k) = (-5, 4)$. With $a^2 = 16$, $a = 4$. Since $a^2$ is under the $y$-term, the major axis is vertical. Vertices are at $(h, k \\pm a) = (-5, 4 \\pm 4)$, which gives $(-5, 8)$ and $(-5, 0)$."}, {"text": "Center: $(-5, 4)$; Horizontal major axis; Vertices: $(-1, 4)$ and $(-9, 4)$.", "isCorrect": false, "rationale": "The major axis orientation is incorrect, and the vertices are calculated using $a$ along the wrong axis. These would be the vertices if the major axis were horizontal and $a=4$ was added/subtracted to the $x$-coordinate."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
