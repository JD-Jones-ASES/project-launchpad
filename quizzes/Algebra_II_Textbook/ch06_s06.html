    };

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 6</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines a rational equation?", "options": [{"text": "It contains variables only in the numerator.", "isCorrect": false, "rationale": "An equation with variables only in the numerator is typically a polynomial equation, not a rational equation."}, {"text": "It involves at least one term that is a rational expression.", "isCorrect": true, "rationale": "According to the text, a rational equation is an equation in which one or more terms are rational expressions, meaning they have variables in the denominator."}, {"text": "Its solution always results in a whole number.", "isCorrect": false, "rationale": "Solutions to rational equations can be any real number, including fractions, decimals, or irrational numbers, not exclusively whole numbers."}, {"text": "It can only be solved using the quadratic formula.", "isCorrect": false, "rationale": "While some rational equations lead to quadratic equations, many simplify to linear equations or can be solved by other algebraic methods."}], "id": "q01"}, {"question": "An extraneous solution to a rational equation is a value that:", "options": [{"text": "Satisfies the original equation but not the transformed polynomial equation.", "isCorrect": false, "rationale": "An extraneous solution satisfies the transformed polynomial equation, not necessarily the original one."}, {"text": "Is found by checking the solution in the cleared polynomial equation.", "isCorrect": false, "rationale": "Extraneous solutions are identified by checking them in the *original* equation, not the cleared polynomial, to see if they cause a zero denominator."}, {"text": "Satisfies the transformed equation but makes a denominator zero in the original equation.", "isCorrect": true, "rationale": "As defined in the text, an extraneous solution is a value that satisfies the transformed equation but causes a zero denominator in the original equation and is therefore rejected."}, {"text": "Is always equal to zero.", "isCorrect": false, "rationale": "An extraneous solution can be any real number that leads to a zero denominator, not exclusively zero."}], "id": "q02"}, {"question": "Before solving the equation $\\frac{x}{x-5} = \\frac{2}{x-5} + 3$, what are the domain restrictions?", "options": [{"text": "$x \\neq 2, x \\neq 3$.", "isCorrect": false, "rationale": "Restrictions are determined by values that make denominators zero, not by numerators or constants."}, {"text": "$x \\neq 0, x \\neq 5$.", "isCorrect": false, "rationale": "The term $x$ in the numerator does not create a restriction. Only denominators create restrictions."}, {"text": "$x \\neq 5$.", "isCorrect": true, "rationale": "The only denominator in the original equation is $x-5$. Setting $x-5 = 0$ gives $x=5$. Therefore, $x \\neq 5$ is the domain restriction."}, {"text": "No restrictions exist.", "isCorrect": false, "rationale": "A rational equation always requires checking for values that make denominators zero, which are domain restrictions."}], "id": "q03"}, {"question": "Consider the equation $\\frac{2}{x-1} = \\frac{x+1}{x-1}$. If, during the solving process, you arrive at $2 = x+1$, which leads to $x=1$, what can be concluded about $x=1$?", "options": [{"text": "It is the only valid solution.", "isCorrect": false, "rationale": "While $x=1$ satisfies the transformed equation $2=x+1$, it makes the denominator $x-1$ in the original equation equal to zero, making it an invalid solution."}, {"text": "It is an extraneous solution because it makes the original denominators zero.", "isCorrect": true, "rationale": "The value $x=1$ makes the denominator $x-1$ equal to zero in the original equation, which is the definition of an extraneous solution. It must be rejected."}, {"text": "It is a valid solution because it satisfies $2=x+1$.", "isCorrect": false, "rationale": "A solution must satisfy the *original* equation's domain. Satisfying the transformed polynomial is not sufficient if it violates domain restrictions."}, {"text": "The equation has no solution.", "isCorrect": false, "rationale": "While $x=1$ is extraneous, there might be other solutions depending on the equation (though in this specific case, it's the only one found and it's extraneous, meaning no solution)."}], "id": "q04"}, {"question": "Solve the equation $\\frac{4}{x} + 2 = \\frac{10}{x}$.", "options": [{"text": "$x = -3$.", "isCorrect": false, "rationale": "If $x=-3$, $\\frac{4}{-3} + 2 = -1.33 + 2 = 0.67$. $\\frac{10}{-3} = -3.33$. $0.67 \\neq -3.33$."}, {"text": "$x = 3$.", "isCorrect": true, "rationale": "The LCD is $x$. Multiplying all terms by $x$: $4 + 2x = 10$. Subtracting 4 from both sides gives $2x = 6$. Dividing by 2 gives $x=3$. Checking in the original equation: $\\frac{4}{3} + 2 = \\frac{4}{3} + \\frac{6}{3} = \\frac{10}{3}$. $\\frac{10}{3}$ matches. Also, $x=3$ is not a restriction ($x \\neq 0$). Thus, $x=3$ is the solution."}, {"text": "$x = 2$.", "isCorrect": false, "rationale": "If $x=2$, $\\frac{4}{2} + 2 = 2 + 2 = 4$. $\\frac{10}{2} = 5$. $4 \\neq 5$."}, {"text": "No solution.", "isCorrect": false, "rationale": "There is a valid solution for this equation."}], "id": "q05"}, {"question": "Solve the equation $x + \\frac{6}{x} = 5$.", "options": [{"text": "$x = 0$.", "isCorrect": false, "rationale": "This value is a restriction ($x \\neq 0$) because it would make the denominator zero in the original equation. Thus, it is an extraneous solution if derived, or simply not a valid starting point."}, {"text": "$x = 2, x = 3$.", "isCorrect": true, "rationale": "The LCD is $x$. Multiplying all terms by $x$: $x^2 + 6 = 5x$. Rearranging into a standard quadratic form: $x^2 - 5x + 6 = 0$. Factoring, we get $(x-2)(x-3) = 0$. This yields $x=2$ and $x=3$. Neither of these values makes the original denominator zero ($x \\neq 0$). Checking: $2 + 6/2 = 2+3=5$; $3 + 6/3 = 3+2=5$. Both are valid solutions."}, {"text": "$x = -2, x = -3$.", "isCorrect": false, "rationale": "If $x=-2$, $-2 + \\frac{6}{-2} = -2 - 3 = -5 \\neq 5$. If $x=-3$, $-3 + \\frac{6}{-3} = -3 - 2 = -5 \\neq 5$."}, {"text": "$x = 5$.", "isCorrect": false, "rationale": "If $x=5$, $5 + \\frac{6}{5} = \\frac{25}{5} + \\frac{6}{5} = \\frac{31}{5} \\neq 5$."}], "id": "q06"}, {"question": "The work-rate formula $\\frac{1}{t_A} + \\frac{1}{t_B} = \\frac{1}{T}$ implies that:", "options": [{"text": "The total time $T$ is always the sum of individual times $t_A$ and $t_B$.", "isCorrect": false, "rationale": "If $T = t_A + t_B$, then $1/T$ would be $1/(t_A+t_B)$, which is not equal to $1/t_A + 1/t_B$. Working together always reduces the total time."}, {"text": "As more workers contribute, the total time $T$ to complete the job increases.", "isCorrect": false, "rationale": "Adding more workers (or pipes, etc.) generally increases the combined work rate, thereby decreasing the total time $T$ required to complete the job."}, {"text": "The combined rate of work is the sum of the individual rates.", "isCorrect": true, "rationale": "The formula explicitly states that the individual rates ($1/t_A$ and $1/t_B$) are added to find the combined rate ($1/T$), which is the inverse of the total time."}, {"text": "Only two workers can contribute to a single job.", "isCorrect": false, "rationale": "The formula can be extended to any number of workers, e.g., $1/t_A + 1/t_B + 1/t_C = 1/T$ for three workers."}], "id": "q07"}, {"question": "A seasoned painter can paint a room in 5 hours. An apprentice painter takes 10 hours to paint the same room. If they work together, how long will it take them to paint the room?", "options": [{"text": "15 hours.", "isCorrect": false, "rationale": "Adding their individual times (5 + 10) is incorrect. Their combined work rate will reduce the total time, not increase it."}, {"text": "7.5 hours.", "isCorrect": false, "rationale": "This is the average of their times, but not the correct calculation for combined work rate."}, {"text": "3.33 hours (approximately).", "isCorrect": true, "rationale": "Using the work-rate formula $1/t_A + 1/t_B = 1/T$: $1/5 + 1/10 = 1/T$. Finding a common denominator: $2/10 + 1/10 = 1/T$. This simplifies to $3/10 = 1/T$. Therefore, $T = 10/3 = 3.333...$ hours."}, {"text": "2.5 hours.", "isCorrect": false, "rationale": "If $T=2.5$ hours, then $1/T = 1/2.5 = 2/5 = 4/10$. This does not equal $3/10$ (their combined rate)."}], "id": "q08"}, {"question": "A small plane flies 600 miles with the wind and returns the same distance against the wind. The speed of the wind is 50 mph. If the total trip takes 5 hours, which equation correctly represents this scenario, where $v$ is the speed of the plane in still air?", "options": [{"text": "$\\frac{600}{v} + \\frac{600}{50} = 5$.", "isCorrect": false, "rationale": "This equation incorrectly adds the time for the plane in still air to the time it would take to travel 600 miles at wind speed alone, not accounting for the combined effect of plane and wind."}, {"text": "$\\frac{600}{v+50} + \\frac{600}{v-50} = 5$.", "isCorrect": true, "rationale": "Time equals distance divided by rate. When flying with the wind, the plane's effective speed is $v+50$. When flying against the wind, it's $v-50$. The sum of the times for each leg of the journey equals the total trip time, 5 hours."}, {"text": "$600(v+50) + 600(v-50) = 5$.", "isCorrect": false, "rationale": "This equation represents a sum of distances multiplied by rates, which is not the formula for total time in this context."}, {"text": "$\\frac{v+50}{600} + \\frac{v-50}{600} = 5$.", "isCorrect": false, "rationale": "This equation incorrectly represents rate divided by distance, rather than distance divided by rate, for calculating time."}], "id": "q09"}, {"question": "The caution note states: \"Always check solutions in the original equation, not in the cleared polynomial.\" Why is this step crucial?", "options": [{"text": "The polynomial equation might be harder to solve than the original rational equation.", "isCorrect": false, "rationale": "Generally, the cleared polynomial equation is easier to solve than the original rational equation because it lacks denominators with variables."}, {"text": "It confirms that the algebraic steps taken to solve the equation were correct.", "isCorrect": false, "rationale": "While checking solutions does help confirm algebraic accuracy, the primary reason for this specific caution is related to extraneous solutions, not just general correctness."}, {"text": "It ensures that no solution makes any denominator in the original equation equal to zero.", "isCorrect": true, "rationale": "This is the critical reason. An extraneous solution will satisfy the polynomial equation but will cause a denominator in the *original* rational equation to be zero, rendering it invalid. Checking against the original equation's domain restrictions is vital."}, {"text": "Solutions to the polynomial equation are always different from solutions to the rational equation.", "isCorrect": false, "rationale": "Valid solutions to the rational equation are also solutions to the polynomial equation. The issue arises when a polynomial solution *isn't* a valid rational equation solution due to domain restrictions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
