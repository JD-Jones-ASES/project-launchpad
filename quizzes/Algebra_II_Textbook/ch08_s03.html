        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 3</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is a key characteristic that distinguishes the cube root function $f(x) = [3]x$ from the square root function $g(x) = x$?", "options": [{"text": "Its domain is restricted to non-negative real numbers.", "isCorrect": false, "rationale": "This describes the square root function, not the cube root function. The cube root function's domain includes all real numbers."}, {"text": "It has an inflection point at the origin where its concavity changes.", "isCorrect": true, "rationale": "The text explicitly states that the graph of the cube root function passes through the origin (0,0), which is an inflection point where the curve changes concavity. This is a distinguishing feature from the square root function's vertex."}, {"text": "It is an even function, symmetric about the y-axis.", "isCorrect": false, "rationale": "The cube root function is an odd function, meaning $f(-x) = -f(x)$, and is symmetric about the origin, not the y-axis."}, {"text": "It does not pass through the origin $(0,0)$.", "isCorrect": false, "rationale": "The cube root function $f(x) = [3]x$ passes through the origin $(0,0)$ because $[3]0 = 0$."}]}, {"question": "Consider the expressions $\\sqrt{-8}$ and $[3]{-8}$. Which statement accurately describes their relationship based on the properties of even and odd index radicals?", "options": [{"text": "Both expressions result in non-real numbers because the radicand is negative.", "isCorrect": false, "rationale": "While $\\sqrt{-8}$ is not a real number, $[3]{-8}$ is a real number (-2)."}, {"text": "$\\sqrt{-8}$ is a real number, while $[3]{-8}$ is not a real number.", "isCorrect": false, "rationale": "This statement incorrectly reverses the properties. $\\sqrt{-8}$ is not real, and $[3]{-8}$ is real."}, {"text": "$\\sqrt{-8}$ is not a real number due to the even index, while $[3]{-8}$ is a real number because of the odd index.", "isCorrect": true, "rationale": "The text explains that for even-index radicals, a negative radicand results in a non-real number, but for odd-index radicals, a negative radicand produces a real number."}, {"text": "Both expressions are real numbers, but $\\sqrt{-8}$ is positive while $[3]{-8}$ is negative.", "isCorrect": false, "rationale": "$\\sqrt{-8}$ is not a real number. Only odd-index roots can produce negative real results from negative radicands."}]}, {"question": "A student graphs the function $h(x) = -[3]{x+2} + 4$. Based on the rules for transformations, what is the inflection point of this function?", "options": [{"text": "$(2, 4)$", "isCorrect": false, "rationale": "The term $(x+2)$ indicates a horizontal shift of 2 units to the left, not to the right. The $y$-coordinate is correct."}, {"text": "$(-2, 4)$", "isCorrect": true, "rationale": "The original inflection point is $(0,0)$. The $(x+2)$ term shifts the graph 2 units to the left (to $x=-2$), and the $+4$ term shifts it 4 units up (to $y=4$). Reflection over the x-axis does not change the inflection point's coordinates."}, {"text": "$(2, -4)$", "isCorrect": false, "rationale": "This indicates a shift right 2 and down 4, which are incorrect for both directions based on the function's form."}, {"text": "$(-2, -4)$", "isCorrect": false, "rationale": "This indicates a shift down 4, which is incorrect because the $+4$ term shifts the graph upwards."}]}, {"question": "How does the graph of $g(x) = 2[3]{x-1} - 3$ compare to the parent function $f(x) = [3]x$?", "options": [{"text": "It is shifted right 1, down 3, and vertically compressed by a factor of 2.", "isCorrect": false, "rationale": "The coefficient '2' in front of the radical represents a vertical stretch, not a compression."}, {"text": "It is shifted left 1, down 3, and vertically stretched by a factor of 2.", "isCorrect": false, "rationale": "The $(x-1)$ term indicates a shift to the right, not to the left."}, {"text": "It is shifted right 1, down 3, and vertically stretched by a factor of 2.", "isCorrect": true, "rationale": "The $(x-1)$ term shifts the graph 1 unit right. The '$-3$' term shifts it 3 units down. The '2' coefficient indicates a vertical stretch by a factor of 2."}, {"text": "It is shifted left 1, up 3, and vertically compressed by a factor of 2.", "isCorrect": false, "rationale": "This option contains multiple errors regarding direction of shifts and type of vertical transformation."}]}, {"question": "Solve the equation $[3]{4x + 7} = -3$.", "options": [{"text": "$x = 5$", "isCorrect": false, "rationale": "This would result from setting $4x+7 = 27$ (positive 27), which is incorrect as $(-3)^3 = -27$."}, {"text": "$x = -8.5$", "isCorrect": true, "rationale": "To solve, cube both sides: $([3]{4x+7})^3 = (-3)^3$. This gives $4x+7 = -27$. Subtract 7 from both sides: $4x = -34$. Divide by 4: $x = -34/4 = -17/2 = -8.5$."}, {"text": "$x = -17$", "isCorrect": false, "rationale": "This suggests a calculation error, possibly $4x = -68$ or similar."}, {"text": "$x = -10$", "isCorrect": false, "rationale": "This suggests a calculation error, possibly $4x = -40$ or similar."}]}, {"question": "When solving a cube root equation such as $[3]{ax+b} = c$, why is it generally unnecessary to check for extraneous solutions, unlike with square root equations?", "options": [{"text": "Cube root functions have a limited domain, which prevents extraneous solutions.", "isCorrect": false, "rationale": "Cube root functions have a domain of all real numbers, not a limited domain. This is opposite to the reason for square root equation checks."}, {"text": "Cubing both sides of an equation preserves the sign of both sides, ensuring equivalence over real numbers.", "isCorrect": true, "rationale": "When you cube both sides of an equation $A=B$ to get $A^3=B^3$, the solutions are equivalent for real numbers (i.e., if $A^3=B^3$, then $A=B$). Square roots require checking because $A^2=B^2$ can mean $A=B$ or $A=-B$, introducing potential new solutions."}, {"text": "Extraneous solutions only occur with even powers, not odd powers.", "isCorrect": false, "rationale": "While the principle is related, this option doesn't fully explain *why* this is the case. The core reason lies in the preservation of sign when cubing."}, {"text": "The range of cube root functions is only positive numbers, avoiding issues with negative solutions.", "isCorrect": false, "rationale": "The range of cube root functions is all real numbers, including negative values. This statement is factually incorrect about the range."}]}, {"question": "The description of the cube root function's graph states it is \"steepest near $x = 0$ and flattens for large $|x|$.\" What does this imply about the function's rate of change?", "options": [{"text": "The function's output values increase at a constant rate across its domain.", "isCorrect": false, "rationale": "A constant rate of change would mean a straight line. The cube root function's steepness varies, indicating a non-constant rate of change."}, {"text": "The function has a higher rate of change (is steeper) near the origin and a lower rate of change (flattens) as $x$ moves away from the origin.", "isCorrect": true, "rationale": "Steepness directly relates to the rate of change (slope). 'Steepest near $x=0$' means the rate of change is greatest (in magnitude) there, and 'flattens for large $|x|$' means the rate of change decreases as $x$ moves away from zero."}, {"text": "The function eventually becomes horizontal for very large positive or negative $x$ values.", "isCorrect": false, "rationale": "While it flattens, it never becomes perfectly horizontal. The function continues to increase or decrease, just very slowly, as $x$ approaches $\\pm\\infty$."}, {"text": "The function's slope is zero at $x = 0$.", "isCorrect": false, "rationale": "The function is steepest at $x=0$, meaning its slope is maximal (in magnitude) at this point, not zero."}]}, {"question": "The cube root function is described as an \"odd function\" with $f(-x) = -f(x)$. What is the graphical implication of this property?", "options": [{"text": "The graph is symmetric about the y-axis.", "isCorrect": false, "rationale": "Symmetry about the y-axis is a characteristic of an even function, where $f(-x) = f(x)$."}, {"text": "The graph is symmetric about the x-axis.", "isCorrect": false, "rationale": "A graph symmetric about the x-axis would generally fail the vertical line test and not be a function (unless it's $y=0$)."}, {"text": "The graph is symmetric about the origin.", "isCorrect": true, "rationale": "The property $f(-x) = -f(x)$ defines an odd function, whose graph is always symmetric about the origin."}, {"text": "The graph only exists in the first and third quadrants.", "isCorrect": false, "rationale": "While there are points in the first and third quadrants, the function also passes through the origin and points in the second and fourth quadrants (e.g., $(-1,-1)$ is in the third, $(1,1)$ is in the first, $(-8,-2)$ is in the third). The statement is misleading about the graph's full extent."}]}, {"question": "For a general $n$th root function $f(x) = [n]x = x^{1/n}$, which statement correctly describes its domain?", "options": [{"text": "The domain is always all real numbers, regardless of whether $n$ is even or odd.", "isCorrect": false, "rationale": "This is only true for odd-index radicals. Even-index radicals have a restricted domain."}, {"text": "If $n$ is an even integer, the domain is $[0, \\infty)$, and if $n$ is an odd integer, the domain is $(-\\infty, \\infty)$.", "isCorrect": true, "rationale": "This correctly summarizes the general rule: even-indexed roots require non-negative radicands, while odd-indexed roots allow any real number as the radicand."}, {"text": "If $n$ is an even integer, the domain is $(-\\infty, \\infty)$, and if $n$ is an odd integer, the domain is $[0, \\infty)$.", "isCorrect": false, "rationale": "This statement incorrectly reverses the domain rules for even and odd indices."}, {"text": "The domain is restricted to integers for all $n$.", "isCorrect": false, "rationale": "The domain consists of real numbers, not just integers, as implied by continuous function graphs."}]}, {"question": "Evaluate the real number result for the expression $-2[3]{-27}$.", "options": [{"text": "$-6$", "isCorrect": false, "rationale": "The cube root of $-27$ is $-3$. So, $-2 \\times (-3)$ equals $6$, not $-6$."}, {"text": "$6$", "isCorrect": true, "rationale": "First, evaluate the cube root: $[3]{-27} = -3$ (since $(-3)^3 = -27$). Then multiply by $-2$: $-2 \\times (-3) = 6$."}, {"text": "The expression is not a real number.", "isCorrect": false, "rationale": "An odd-index root of a negative number is always a real number, so the expression is real."}, {"text": "$-18$", "isCorrect": false, "rationale": "This would result from multiplying $-2$ by $9$ (if it was a square root of 81 or similar), or a different calculation error."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
