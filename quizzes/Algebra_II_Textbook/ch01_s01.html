<div class="quiz-container">

<script>
var QUESTIONS = [{"question": "Which of the following best describes the set $S = \\{x \\mid x \\text{ is an integer and } -2 < x \\le 3\\}$?", "options": [{"text": "\\{-2, -1, 0, 1, 2, 3\\}", "isCorrect": false, "rationale": "This option incorrectly includes -2. The inequality $-2 < x$ means $x$ must be strictly greater than -2, so -2 is not an element of the set."}, {"text": "\\{-1, 0, 1, 2, 3\\}", "isCorrect": true, "rationale": "The set-builder notation specifies that $x$ must be an integer. The condition $-2 < x$ means $x$ must be greater than -2. The condition $x \\le 3$ means $x$ must be less than or equal to 3. Combining these, the integers that satisfy both conditions are -1, 0, 1, 2, and 3. This matches the definition of roster notation where all elements are listed between braces."}, {"text": "\\{-2, -1, 0, 1, 2\\}", "isCorrect": false, "rationale": "This option incorrectly includes -2 and incorrectly excludes 3. The inequality $-2 < x$ means $x$ must be strictly greater than -2, and $x \\le 3$ means $x$ can include 3."}, {"text": "\\{-1, 0, 1, 2\\}", "isCorrect": false, "rationale": "This option correctly excludes -2 but incorrectly excludes 3. The inequality $x \\le 3$ means 3 is an element of the set."}], "id": "q01"}, {"question": "Consider the number $\\sqrt{9} - 0.5$. To which set(s) of numbers does it belong?", "options": [{"text": "Natural Numbers, Integers, Rational Numbers, Real Numbers", "isCorrect": false, "rationale": "The calculated value is $3 - 0.5 = 2.5$. Natural numbers and integers do not include decimal values. While 2.5 is rational and real, it is not natural or an integer."}, {"text": "Integers, Rational Numbers, Real Numbers", "isCorrect": false, "rationale": "The calculated value is 2.5. Integers do not include decimal values. While 2.5 is rational and real, it is not an integer."}, {"text": "Rational Numbers, Real Numbers", "isCorrect": true, "rationale": "First, simplify the expression: $\\sqrt{9} = 3$. So the number is $3 - 0.5 = 2.5$. A rational number is any number that can be written as a ratio $p/q$ where $p, q \\in \\mathbb{Z}$ and $q \\ne 0$. For example, $2.5 = 5/2$, which fits this definition. All rational numbers are also real numbers. It is not a natural number (positive whole numbers) nor an integer (whole numbers including zero and negatives) because it has a non-zero decimal part."}, {"text": "Real Numbers only", "isCorrect": false, "rationale": "While the number 2.5 is a real number, it is also a rational number because it can be expressed as a ratio of two integers (e.g., 5/2). The question asks for all sets it belongs to."}], "id": "q02"}, {"question": "Which statement accurately describes the relationship between Natural numbers ($\\mathbb{N}$), Integers ($\\mathbb{Z}$), and Rational numbers ($\\mathbb{Q}$)?", "options": [{"text": "$\\mathbb{Q} \\subset \\mathbb{Z} \\subset \\mathbb{N}$", "isCorrect": false, "rationale": "This statement suggests that natural numbers contain integers, which contain rational numbers. This is the inverse of the correct hierarchy. For example, not all rational numbers are integers (e.g., 1/2), and not all integers are natural numbers (e.g., 0, -1)."}, {"text": "Every natural number is an integer, but not every integer is a rational number.", "isCorrect": false, "rationale": "The first part is correct (every natural number is an integer). However, the second part is incorrect: every integer $n$ can be written as $n/1$, making every integer a rational number. Therefore, all integers are rational numbers."}, {"text": "All natural numbers are rational numbers, and all rational numbers are integers.", "isCorrect": false, "rationale": "The first part is correct (all natural numbers are rational numbers, as $\\mathbb{N} \\subset \\mathbb{Z} \\subset \\mathbb{Q}$). However, the second part is incorrect: not all rational numbers are integers (e.g., $3/4 = 0.75$ is rational but not an integer)."}, {"text": "$\\mathbb{N} \\subset \\mathbb{Z} \\subset \\mathbb{Q}$", "isCorrect": true, "rationale": "This statement correctly represents the number-set hierarchy described in the text. Natural numbers (1, 2, 3, ...) are a subset of integers (...-2, -1, 0, 1, 2, ...), and integers are a subset of rational numbers (numbers that can be expressed as a ratio of two integers). The text states: 'Every natural number is an integer, so $ \\mathbb{N} \\subset \\mathbb{Z} $' and 'Since every integer $n$ equals $n/1$, we have $ \\mathbb{Z} \\subset \\mathbb{Q} $.'"}], "id": "q03"}, {"question": "A student is given a number $X$ and determines its decimal expansion is $5.12345...$ where the ellipsis indicates a non-repeating, non-terminating pattern. Based on this information, which of the following is true about $X$?", "options": [{"text": "$X$ is a rational number because it has a decimal expansion.", "isCorrect": false, "rationale": "While rational numbers do have decimal expansions, they either terminate or repeat. A non-terminating, non-repeating decimal indicates an irrational number, not a rational one."}, {"text": "$X$ is an integer because it has a whole number part.", "isCorrect": false, "rationale": "Integers are whole numbers (positive, negative, or zero) without any fractional or decimal part. The number $X$ has a decimal part, so it cannot be an integer."}, {"text": "$X$ is an irrational number because its decimal expansion is non-terminating and non-repeating.", "isCorrect": true, "rationale": "According to the text, 'An irrational number is a real number that cannot be expressed as a ratio of two integers. Its decimal expansion is non-terminating and non-repeating.' This perfectly matches the description of number $X$. Familiar examples include $\\sqrt{2}$ or $\\pi$."}, {"text": "$X$ is a natural number if the non-repeating part eventually ends.", "isCorrect": false, "rationale": "A natural number must be a positive whole number (1, 2, 3, ...). If the decimal part ends, the number would be rational (and likely not a natural number unless the decimal part was .0), but the problem states it's non-terminating and non-repeating, making it irrational."}], "id": "q04"}, {"question": "Which interval notation correctly represents all real numbers $x$ such that $x \\ge -10$?", "options": [{"text": "$(- \\infty, -10)$", "isCorrect": false, "rationale": "This notation means $x$ is strictly less than -10 and does not include -10. The inequality $x \\ge -10$ means $x$ is greater than or equal to -10."}, {"text": "$(- \\infty, -10]$", "isCorrect": false, "rationale": "This notation means $x$ is less than or equal to -10, covering numbers from negative infinity up to and including -10. The inequality $x \\ge -10$ means $x$ is greater than or equal to -10."}, {"text": "$[-10, \\infty)$", "isCorrect": true, "rationale": "The inequality $x \\ge -10$ means $x$ is greater than or equal to -10. In interval notation, the square bracket `[` indicates that -10 is included (closed endpoint), and $ \\infty $ is always represented with a parenthesis `)` because it is not a real number and therefore never an endpoint of a closed interval. This correctly represents all numbers from -10 upwards, including -10."}, {"text": "$(-10, \\infty)$", "isCorrect": false, "rationale": "This notation means $x$ is strictly greater than -10 and does not include -10. The inequality $x \\ge -10$ means $x$ is greater than or equal to -10, so -10 must be included."}], "id": "q05"}, {"question": "A number line graph shows a filled circle at 2, an open circle at 8, and the region between them shaded. Which of the following inequalities and interval notations correctly represent this graph?", "options": [{"text": "$2 < x \\le 8$; $(2, 8]$", "isCorrect": false, "rationale": "A filled circle at 2 indicates that 2 is included, meaning $x \\ge 2$ or a square bracket `[`. An open circle at 8 indicates 8 is excluded, meaning $x < 8$ or a parenthesis `)`."}, {"text": "$2 \\le x < 8$; $[2, 8)$", "isCorrect": true, "rationale": "A filled circle at 2 corresponds to $x \\ge 2$ and a square bracket `[`. An open circle at 8 corresponds to $x < 8$ and a parenthesis `)`. The shaded region between them means $x$ is between these values. Therefore, $2 \\le x < 8$ and its interval notation $[2, 8)$ correctly describe the graph."}, {"text": "$2 \\le x \\le 8$; $[2, 8]$", "isCorrect": false, "rationale": "This would represent filled circles at both 2 and 8. The graph has an open circle at 8, meaning 8 is excluded."}, {"text": "$2 < x < 8$; $(2, 8)$", "isCorrect": false, "rationale": "This would represent open circles at both 2 and 8. The graph has a filled circle at 2, meaning 2 is included."}], "id": "q06"}, {"question": "Given sets $A = (-3, 5]$ and $B = [1, 7)$, find the union $A \\cup B$.", "options": [{"text": "$(-3, 7)$", "isCorrect": true, "rationale": "The union $A \\cup B$ includes every element that belongs to $A$, to $B$, or to both. The leftmost boundary of set A is -3 (exclusive). The rightmost boundary of set B is 7 (exclusive). Since the intervals $A=(-3, 5]$ and $B=[1, 7)$ overlap (specifically in the range $[1, 5]$), there are no gaps between the sets. All numbers strictly greater than -3 and strictly less than 7 are covered by at least one of the sets. Therefore, the union is $(-3, 7)$."}, {"text": "$(-3, 7]$", "isCorrect": false, "rationale": "This would imply that 7 is included in the union, but 7 is not included in set B ($[1, 7)$), nor is it included in set A ($(-3, 5]$). Therefore, 7 should not be included in the union."}, {"text": "$[1, 5]$", "isCorrect": false, "rationale": "This represents the intersection of the two sets, not the union. The union should include all elements from either set, extending beyond this range."}, {"text": "$[1, 7)$", "isCorrect": false, "rationale": "This excludes the elements in A that are less than 1 (e.g., -2, 0). The union must include all elements from either set, so it should extend to -3."}], "id": "q07"}, {"question": "Given sets $M = (- \\infty, 0]$ and $N = [-5, \\infty)$, find the intersection $M \\cap N$.", "options": [{"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "This represents the set of all real numbers, which would be the union of these two sets (if there were no gaps), but not their intersection. The intersection only includes elements common to both."}, {"text": "$[-5, 0]$", "isCorrect": true, "rationale": "The intersection $M \\cap N$ includes only those elements belonging to both $M$ and $N$. Set $M$ includes all numbers less than or equal to 0. Set $N$ includes all numbers greater than or equal to -5. The values that satisfy both conditions are those greater than or equal to -5 AND less than or equal to 0. Both endpoints -5 and 0 are included in their respective sets (square brackets), so they are included in the intersection."}, {"text": "$(- \\infty, -5]$", "isCorrect": false, "rationale": "This set is contained within M but does not overlap with N, as N starts at -5 and goes to positive infinity. This is incorrect for the intersection."}, {"text": "$[0, \\infty)$", "isCorrect": false, "rationale": "This set is contained within N but does not overlap with M (except for 0 itself), as M ends at 0 and goes to negative infinity. This is incorrect for the intersection."}], "id": "q08"}, {"question": "Let $P = \\{x \\mid x \\text{ is an even integer}\\}$ and $Q = \\{x \\mid x \\text{ is a rational number between 0 and 1}\\}$. Which statement describes a property of $P \\cap Q$?", "options": [{"text": "$P \\cap Q$ contains infinitely many elements.", "isCorrect": false, "rationale": "If there were any elements, they would be even integers. There are no even integers (or any integers) strictly between 0 and 1. Therefore, there can't be infinitely many elements."}, {"text": "$P \\cap Q$ contains exactly one element.", "isCorrect": false, "rationale": "There are no even integers (or any integers) strictly between 0 and 1. Thus, no single element exists in the intersection."}, {"text": "$P \\cap Q$ is the empty set.", "isCorrect": true, "rationale": "An even integer is a whole number (e.g., ..., -4, -2, 0, 2, 4, ...). A rational number between 0 and 1 (exclusive) includes numbers like 0.5, 1/3, etc., but does not include 0 or 1. Since there are no integers strictly between 0 and 1, there can be no even integers that are also strictly between 0 and 1. Therefore, the intersection of these two sets is the empty set ($\\emptyset$)."}, {"text": "$P \\cap Q$ contains all integers between 0 and 1.", "isCorrect": false, "rationale": "There are no integers strictly between 0 and 1. Even if the question implied 'inclusive', the only integer would be 0 or 1, neither of which is 'between' them in the strict sense. This option suggests it contains 'all' such integers, which is zero of them."}], "id": "q09"}, {"question": "Which of the following statements is FALSE regarding set notation and number sets?", "options": [{"text": "The set of natural numbers can be written in roster notation as \\{1, 2, 3, ...\\}.", "isCorrect": false, "rationale": "This statement is TRUE. The text explicitly defines natural numbers as $ \\mathbb{N} = \\{1, 2, 3, 4, ...\\} $ and mentions that any finite subset can be written in roster form, and infinite countable sets like natural numbers can be represented with an ellipsis to indicate the pattern."}, {"text": "The empty set, denoted by $\\emptyset$, is a set that contains no elements.", "isCorrect": false, "rationale": "This statement is TRUE. The text explicitly defines the empty set as containing 'no elements at all'."}, {"text": "A rational number like $0.75$ terminates, while an irrational number's decimal expansion is non-terminating and non-repeating.", "isCorrect": false, "rationale": "This statement is TRUE. The text states: 'In decimal form, rational numbers either terminate (e.g. $3/4 = 0.75$) or repeat (e.g. $1/3 = 0.3$).' It also says: 'An irrational number... Its decimal expansion is non-terminating and non-repeating.'"}, {"text": "The set of real numbers can be fully described using roster notation because it is an infinite set.", "isCorrect": true, "rationale": "This statement is FALSE. While the set of real numbers is indeed infinite, the text explicitly states: 'The sets $ \\mathbb{N}, \\mathbb{Z}, \\mathbb{Q} $, and $ \\mathbb{R} $ are infinite—none can be written in roster notation by listing all elements.' Roster notation is suitable for listing countable, discrete elements or showing a clear pattern for infinite countable sets, but not for uncountable sets like real numbers where elements are continuous and cannot be individually enumerated."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
