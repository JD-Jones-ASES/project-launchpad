    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement correctly defines a one-to-one function?", "options": [{"text": "For every input, there is exactly one output.", "isCorrect": false, "rationale": "This statement describes the definition of any function, not specifically a one-to-one function."}, {"text": "Every horizontal line intersects its graph in at most one point.", "isCorrect": false, "rationale": "This is the Horizontal Line Test, a graphical method for identifying a one-to-one function, but not its fundamental definition."}, {"text": "Different inputs always produce different outputs.", "isCorrect": true, "rationale": "The text defines a one-to-one function as one where 'different inputs always produce different outputs' or $f(a) = f(b) \\implies a = b$."}, {"text": "Its graph passes the vertical line test.", "isCorrect": false, "rationale": "This statement describes the definition of any function, ensuring that each input has only one output, but not specifically a one-to-one function."}]}, {"question": "Why is it crucial for a function to be one-to-one in order to have an inverse function?", "options": [{"text": "A one-to-one function always has a domain of all real numbers, which simplifies finding the inverse.", "isCorrect": false, "rationale": "The domain of a one-to-one function is not necessarily all real numbers (e.g., $h(x) = \\sqrt{x-1}$). This is not the reason it must be one-to-one for an inverse."}, {"text": "If a function is not one-to-one, its inverse would not be a function because one output would map back to multiple inputs.", "isCorrect": true, "rationale": "The text states, 'Only one-to-one functions have inverses, because an inverse must map each output back to exactly one input.' If an output corresponds to multiple inputs, the 'inverse' would not satisfy the definition of a function."}, {"text": "One-to-one functions are generally easier to manipulate algebraically when finding an inverse.", "isCorrect": false, "rationale": "Algebraic ease is not the fundamental mathematical reason a function must be one-to-one to have an inverse."}, {"text": "Only one-to-one functions can pass the Vertical Line Test, which is necessary for an inverse.", "isCorrect": false, "rationale": "All functions pass the Vertical Line Test. One-to-one functions pass the Horizontal Line Test, which is different."}]}, {"question": "If $f(x)$ is a one-to-one function with domain $D$ and range $R$, and $f^{-1}(x)$ is its inverse, which of the following statements is true regarding their domains and ranges?", "options": [{"text": "Domain of $f^{-1}$ is $D$, and Range of $f^{-1}$ is $R$.", "isCorrect": false, "rationale": "This implies the domains and ranges are the same, but the text states they swap for an inverse function."}, {"text": "Domain of $f^{-1}$ is $R$, and Range of $f^{-1}$ is $D$.", "isCorrect": true, "rationale": "The text explicitly states: 'Domain of $f^{-1} = \\text{Range of } f$' and 'Range of $f^{-1} = \\text{Domain of } f$'."}, {"text": "Domain of $f^{-1}$ is always all real numbers, $\\mathbb{R}$.", "isCorrect": false, "rationale": "The domain of the inverse depends directly on the range of the original function, which is not always all real numbers."}, {"text": "The domains and ranges of $f$ and $f^{-1}$ are always identical.", "isCorrect": false, "rationale": "This is incorrect; a key property of inverse functions is that their domains and ranges are swapped relative to each other."}]}, {"question": "Consider the function $g(x) = \\frac{2x+1}{x-3}$, $x \\neq 3$. Based on the concept of inverse functions, what are the domain and range of its inverse function, $g^{-1}(x)$?", "options": [{"text": "Domain: $x \\neq 3$; Range: $x \\neq 2$.", "isCorrect": false, "rationale": "This incorrectly maintains the original domain and swaps the original range to become the new range, not the new domain."}, {"text": "Domain: $x \\neq 2$; Range: $x \\neq 3$.", "isCorrect": true, "rationale": "For the original function $g(x)$, the vertical asymptote is at $x=3$ (domain restriction) and the horizontal asymptote is at $y=2$ (range restriction). For the inverse function, the domain and range swap, so the domain of $g^{-1}(x)$ is $x \\neq 2$ and its range is $x \\neq 3$. This is also directly shown in the 'Finding the Inverse of a Rational Function' example."}, {"text": "Domain: all real numbers; Range: all real numbers.", "isCorrect": false, "rationale": "Rational functions typically have restricted domains and ranges, meaning their inverses also have restrictions."}, {"text": "Domain: $x \\neq 2$; Range: $x \\neq -3$.", "isCorrect": false, "rationale": "The original domain restriction was $x \\neq 3$, not $x \\neq -3$."}]}, {"question": "Which of the following correctly represents the general relationship between a function $f(x)$ and its inverse $f^{-1}(x)$?", "options": [{"text": "$f(f^{-1}(x)) = 1$ and $f^{-1}(f(x)) = 1$.", "isCorrect": false, "rationale": "The composition of inverse functions returns the original input, $x$, not 1."}, {"text": "$f(f^{-1}(x)) = x$ and $f^{-1}(f(x)) = x$.", "isCorrect": true, "rationale": "As stated in the 'Inverse Function' definition and 'Verification of Inverses' property, these compositions are the defining characteristic of inverse functions."}, {"text": "$f^{-1}(x) = \\frac{1}{f(x)}$.", "isCorrect": false, "rationale": "This represents the reciprocal of $f(x)$, not its inverse function. The text explicitly cautions against this common misunderstanding: '$f^{-1}$ as 'f-inverse'; it is not the same as $1/f(x)$.'"}, {"text": "$f(x) + f^{-1}(x) = 0$.", "isCorrect": false, "rationale": "There is no general mathematical property stating that a function and its inverse sum to zero."}]}, {"question": "Find the inverse function of $f(x) = 3x - 5$.", "options": [{"text": "$f^{-1}(x) = 5 - 3x$.", "isCorrect": false, "rationale": "This incorrectly changes the order of operations and signs during the algebraic process."}, {"text": "$f^{-1}(x) = \\frac{x+5}{3}$.", "isCorrect": true, "rationale": "Following the steps: 1. Replace $f(x)$ with $y$: $y = 3x-5$. 2. Swap $x$ and $y$: $x = 3y-5$. 3. Solve for $y$: $x+5 = 3y \\implies y = \\frac{x+5}{3}$. 4. Replace $y$ with $f^{-1}(x)$: $f^{-1}(x) = \\frac{x+5}{3}$. This matches the 'Finding the Inverse of a Linear Function' example."}, {"text": "$f^{-1}(x) = \\frac{1}{3x-5}$.", "isCorrect": false, "rationale": "This represents the reciprocal of $f(x)$, not its inverse function."}, {"text": "$f^{-1}(x) = 3x+5$.", "isCorrect": false, "rationale": "This only changes the sign of the constant term, rather than correctly solving for $y$ after swapping $x$ and $y$."}]}, {"question": "Given the function $h(x) = \\sqrt{x-1}$ with domain $x \\geq 1$. Find its inverse function $h^{-1}(x)$ and its corresponding domain.", "options": [{"text": "$h^{-1}(x) = x^2+1$, domain $x \\geq 1$.", "isCorrect": false, "rationale": "While the algebraic inverse is correct, the domain of $h^{-1}(x)$ is the range of $h(x)$, which is $[0, \\infty)$, not $[1, \\infty)$."}, {"text": "$h^{-1}(x) = (x-1)^2$, domain $x \\geq 0$.", "isCorrect": false, "rationale": "The algebraic manipulation for solving for $y$ is incorrect; the $-1$ should be moved after squaring both sides."}, {"text": "$h^{-1}(x) = x^2+1$, domain $x \\geq 0$.", "isCorrect": true, "rationale": "Following the steps: 1. $y = \\sqrt{x-1}$. 2. Swap $x$ and $y$: $x = \\sqrt{y-1}$. 3. Square both sides: $x^2 = y-1$. 4. Solve for $y$: $y = x^2+1$. The range of $h(x)$ is all non-negative numbers, $[0, \\infty)$, so the domain of $h^{-1}(x)$ is $x \\geq 0$. This aligns with the 'Finding the Inverse of a Square-Root Function' example."}, {"text": "$h^{-1}(x) = x^2-1$, domain $x \\geq 0$.", "isCorrect": false, "rationale": "The algebraic manipulation for solving for $y$ is incorrect; it should be $x^2+1$, not $x^2-1$."}]}, {"question": "Which of the following functions does NOT have an inverse function over its natural domain without restriction?", "options": [{"text": "$f(x) = 5x - 2$.", "isCorrect": false, "rationale": "This is a linear function, which is always one-to-one and thus has an inverse over its entire domain."}, {"text": "$g(x) = x^3 + 1$.", "isCorrect": false, "rationale": "This is a cubic function with a positive leading coefficient, which is strictly increasing and therefore one-to-one, having an inverse over its entire domain."}, {"text": "$h(x) = x^2 - 4$.", "isCorrect": true, "rationale": "This is a quadratic function (parabola), which fails the Horizontal Line Test because different inputs (e.g., $x=2$ and $x=-2$) can produce the same output. Therefore, it is not one-to-one over its natural domain and does not have an inverse without domain restriction."}, {"text": "$k(x) = \\frac{1}{x}$.", "isCorrect": false, "rationale": "This is a reciprocal function, which is one-to-one over its natural domain (excluding $x=0$) and has an inverse."}]}, {"question": "A function $C(F) = \\frac{5}{9}(F - 32)$ converts Fahrenheit to Celsius. Its inverse, $C^{-1}(C) = \\frac{9}{5}C + 32$, converts Celsius to Fahrenheit. What does $C^{-1}(100)$ represent in this context?", "options": [{"text": "The temperature in Celsius when it is 100 degrees Fahrenheit.", "isCorrect": false, "rationale": "This would be calculated by $C(100)$, not $C^{-1}(100)$. The inverse function reverses the input and output roles."}, {"text": "The temperature in Fahrenheit when it is 100 degrees Celsius.", "isCorrect": true, "rationale": "Since $C^{-1}(x)$ converts Celsius to Fahrenheit, evaluating it at $100$ (representing 100 degrees Celsius) gives the equivalent temperature in Fahrenheit. This is shown directly in the 'Using Inverse Functions to Decode Information' example."}, {"text": "The average temperature conversion rate between Celsius and Fahrenheit.", "isCorrect": false, "rationale": "The value $C^{-1}(100)$ is a specific temperature conversion, not a rate or an average."}, {"text": "The boiling point of water in Celsius.", "isCorrect": false, "rationale": "$100^\\circ C$ is the boiling point, but $C^{-1}(100)$ calculates its equivalent in Fahrenheit, not the Celsius value itself."}]}, {"question": "To verify that two functions $f(x)$ and $g(x)$ are inverses of each other, what must be true for all $x$ in their respective domains?", "options": [{"text": "$f(x) = g(x)$.", "isCorrect": false, "rationale": "This would mean the functions are identical, not necessarily inverses. For example, $f(x)=x$ and $g(x)=x$ are identical, but only $f(x)=x$ is its own inverse."}, {"text": "$f(x) \\cdot g(x) = 1$.", "isCorrect": false, "rationale": "This property defines reciprocal functions, not inverse functions. For example, $f(x)=x$ and $g(x)=1/x$ are reciprocals, but not inverses of each other in the general sense."}, {"text": "$f(g(x)) = x$ AND $g(f(x)) = x$.", "isCorrect": true, "rationale": "The 'Verification of Inverses' property explicitly states that two functions are inverses if and only if both compositions $f(g(x))$ and $g(f(x))$ equal $x$."}, {"text": "$f(x) + g(x) = 0$.", "isCorrect": false, "rationale": "This property implies that $g(x) = -f(x)$, meaning they are additive inverses, not inverse functions in the context of composition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
