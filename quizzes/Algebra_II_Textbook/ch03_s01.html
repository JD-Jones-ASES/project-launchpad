<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why was the complex number system introduced?", "options": [{"text": "To provide solutions for all linear equations.", "isCorrect": false, "rationale": "Real numbers already provide solutions for all linear equations. The text states the need arises from polynomial equations like x^2+1=0 which have no real solutions."}, {"text": "To allow negative numbers to have square roots, specifically to solve equations like x^2 = -1.", "isCorrect": true, "rationale": "The text explicitly states that 'no real number squared can be negative' and that the 'remedy is to extend R to a larger number system, the complex numbers C, in which every polynomial equation has at least one solution', exemplified by x^2 = -1."}, {"text": "To extend the number line into higher dimensions beyond two.", "isCorrect": false, "rationale": "The complex numbers extend the real number line to a two-dimensional complex plane, not necessarily higher dimensions in general within this context."}, {"text": "To simplify arithmetic operations for real numbers.", "isCorrect": false, "rationale": "Introducing complex numbers adds new rules for arithmetic and does not simplify operations for numbers that are already real."}], "id": "q01"}, {"question": "Which of the following statements correctly identifies the real and imaginary parts of the complex number z = -5i + 2?", "options": [{"text": "Re(z) = -5, Im(z) = 2", "isCorrect": false, "rationale": "In the form a+bi, 'a' is the real part and 'b' is the imaginary part. The given number is 2 + (-5)i, so the real part is 2 and the imaginary part is -5."}, {"text": "Re(z) = 2, Im(z) = -5", "isCorrect": true, "rationale": "A complex number is defined as a+bi, where 'a' is the real part and 'b' is the imaginary part. Reordering the given number as 2 + (-5)i reveals that the real part is 2 and the imaginary part is -5."}, {"text": "Re(z) = 2, Im(z) = -5i", "isCorrect": false, "rationale": "The imaginary part (b) is a real number, not including the imaginary unit 'i'. The correct imaginary part is -5."}, {"text": "Re(z) = -5i, Im(z) = 2", "isCorrect": false, "rationale": "The real part (a) is a real number, not including the imaginary unit 'i'. The correct real part is 2."}], "id": "q02"}, {"question": "Simplify the expression: (7 - 3i) - (-1 + 5i)", "options": [{"text": "6 - 8i", "isCorrect": false, "rationale": "This results from (7-1) and (-3-5)i, which incorrectly applies the subtraction to the real part. The correct real part is 7 - (-1) = 8."}, {"text": "8 + 2i", "isCorrect": false, "rationale": "This results from (7 - (-1)) = 8 and (-3 - (-5))i = 2i, which incorrectly applies the sign distribution for the imaginary part."}, {"text": "8 - 8i", "isCorrect": true, "rationale": "To subtract complex numbers, distribute the minus sign and then combine real parts and imaginary parts separately: (7 - (-1)) + (-3 - 5)i = (7 + 1) + (-8)i = 8 - 8i."}, {"text": "6 + 2i", "isCorrect": false, "rationale": "This results from (7-1) and (-3+5)i, both incorrectly calculated."}], "id": "q03"}, {"question": "Expand and simplify the product: (4 - i)(2 + 3i)", "options": [{"text": "8 - 3i^2", "isCorrect": false, "rationale": "This answer only multiplies the first and last terms (FOIL), omitting the outer and inner products."}, {"text": "11 + 10i", "isCorrect": true, "rationale": "Using FOIL: (4)(2) + (4)(3i) + (-i)(2) + (-i)(3i) = 8 + 12i - 2i - 3i^2. Substituting i^2 = -1: 8 + 10i - 3(-1) = 8 + 10i + 3 = 11 + 10i."}, {"text": "5 + 10i", "isCorrect": false, "rationale": "This incorrectly calculates the real part as 8 - 3 = 5, forgetting that -3i^2 becomes +3."}, {"text": "8 + 10i", "isCorrect": false, "rationale": "This correctly performs the FOIL expansion but fails to substitute i^2 = -1, thus not fully simplifying the expression."}], "id": "q04"}, {"question": "What is the value of i^123?", "options": [{"text": "1", "isCorrect": false, "rationale": "i^n equals 1 when n is a multiple of 4. 123 is not a multiple of 4 (123 mod 4 = 3)."}, {"text": "-1", "isCorrect": false, "rationale": "i^n equals -1 when n has a remainder of 2 when divided by 4. 123 mod 4 = 3."}, {"text": "i", "isCorrect": false, "rationale": "i^n equals i when n has a remainder of 1 when divided by 4. 123 mod 4 = 3."}, {"text": "-i", "isCorrect": true, "rationale": "To find i^n, divide n by 4 and use the remainder. 123 divided by 4 is 30 with a remainder of 3. Therefore, i^123 = i^3. Since i^3 = i^2 * i = -1 * i = -i, the correct value is -i."}], "id": "q05"}, {"question": "Which statement about the complex conjugate z̄ of a complex number z = a+bi is true?", "options": [{"text": "The product z · z̄ is always a complex number.", "isCorrect": false, "rationale": "The text states that 'Their product is always a non-negative real number: z·z̄ = (a+bi)(a-bi) = a^2+b^2 >= 0'."}, {"text": "z̄ has the same imaginary part as z.", "isCorrect": false, "rationale": "The complex conjugate of a+bi is a-bi, meaning the imaginary parts (b and -b) are opposite in sign, unless b=0 (in which case the number is real and z=z̄)."}, {"text": "The modulus of z̄ is different from the modulus of z.", "isCorrect": false, "rationale": "The modulus of z = a+bi is sqrt(a^2+b^2) and the modulus of z̄ = a-bi is sqrt(a^2+(-b)^2) = sqrt(a^2+b^2). Thus, they are the same, as shown in the example."}, {"text": "If z is purely imaginary, then z̄ = -z.", "isCorrect": true, "rationale": "If z is purely imaginary, then z = 0+bi = bi. Its conjugate z̄ = 0-bi = -bi. Since -z = -(bi) = -bi, it follows that z̄ = -z."}], "id": "q06"}, {"question": "Write the complex number 5/(1+2i) in the form a+bi.", "options": [{"text": "5/3 - 10/3 i", "isCorrect": false, "rationale": "This would result if the denominator was 1^2 - 2^2 = -3, which is incorrect. The denominator should be 1^2 + 2^2 = 5."}, {"text": "5 - 10i", "isCorrect": false, "rationale": "This incorrectly assumes the denominator disappears or becomes 1 without proper division."}, {"text": "1 - 2i", "isCorrect": true, "rationale": "To divide, multiply the numerator and denominator by the conjugate of the denominator: (5/(1+2i)) * ((1-2i)/(1-2i)) = (5(1-2i)) / (1^2 + 2^2) = (5 - 10i) / 5 = 1 - 2i."}, {"text": "5/1 - 5/2 i", "isCorrect": false, "rationale": "This incorrectly attempts to distribute the denominator to parts of the numerator before multiplying by the conjugate."}], "id": "q07"}, {"question": "Find the modulus of the complex number z = -6 + 8i.", "options": [{"text": "sqrt(100)", "isCorrect": false, "rationale": "While the value is sqrt(100), the question asks for the modulus, which is the simplified value, 10. This option is technically correct but not simplified to the final answer."}, {"text": "10", "isCorrect": true, "rationale": "The modulus of z = a+bi is |z| = sqrt(a^2+b^2). For z = -6+8i, |z| = sqrt((-6)^2 + 8^2) = sqrt(36 + 64) = sqrt(100) = 10."}, {"text": "14", "isCorrect": false, "rationale": "This results from adding the absolute values of the real and imaginary parts (6+8), which is not how the modulus is calculated."}, {"text": "sqrt(28)", "isCorrect": false, "rationale": "This results from an incorrect calculation of the squares or their sum (e.g., 64-36 or 36-8, or 64-8^2 which is not how it works)."}], "id": "q08"}, {"question": "Based on the provided text, which statement best describes the relationship between real and complex numbers?", "options": [{"text": "Real numbers are a subset of purely imaginary numbers.", "isCorrect": false, "rationale": "The text defines a real number as a complex number where b=0, and a purely imaginary number as a complex number where a=0 and b!=0. These sets are distinct except for 0."}, {"text": "Complex numbers are an extension of real numbers, encompassing them within a 2D plane.", "isCorrect": true, "rationale": "The text states 'Every real number is a complex number (with b=0), so R is a subset of C. The complex numbers extend the real number line to the full complex plane'."}, {"text": "The complex number system is entirely separate from the real number system.", "isCorrect": false, "rationale": "The text clearly states that 'Every real number is a complex number (with b=0)', meaning the real number system is embedded within the complex number system."}, {"text": "Every complex number has a corresponding real number with the same modulus.", "isCorrect": false, "rationale": "While a complex number's modulus is a real number, not every complex number (e.g., 3+4i) has a *corresponding real number* that *is* the complex number, with the same modulus (e.g., 5 is real, but 3+4i is not 5). This phrasing is imprecise and misleading."}], "id": "q09"}, {"question": "A common error is stated as sqrt(-4)sqrt(-9) = sqrt(36) = 6. What is the correct way to simplify sqrt(-4)sqrt(-9) according to the rules of complex numbers?", "options": [{"text": "sqrt(36i^2) = 6i", "isCorrect": false, "rationale": "While sqrt(-4)sqrt(-9) does lead to 6i^2, stating it as sqrt(36i^2) and then simplifying to 6i is not the correct final result or method. i^2 is -1, making the overall term negative."}, {"text": "(2i)(3i) = 6i^2 = -6", "isCorrect": true, "rationale": "The text's 'note' section explicitly demonstrates this: 'sqrt(-4)sqrt(-9) = (2i)(3i) = 6i^2 = -6'. This applies the definition sqrt(-b) = ib first, then multiplies the complex numbers."}, {"text": "sqrt(-(4 * 9)) = sqrt(-36) = 6i", "isCorrect": false, "rationale": "The text warns against this: 'The rule sqrt(a)sqrt(b) = sqrt(ab) applies only when both radicands are non-negative.' Applying it here leads to an incorrect intermediate step and result."}, {"text": "The expression is undefined in the complex number system.", "isCorrect": false, "rationale": "The expression is well-defined in the complex number system, which was specifically introduced to handle square roots of negative numbers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
