<body>
<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>

        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 5</div>

    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions is the correct factorization of 49x^6 - 25y^4?", "options": [{"text": "(7x^3 - 5y^2)(7x^3 - 5y^2)", "isCorrect": false, "rationale": "This represents squaring a binomial (a-b)^2, not a difference of squares. The correct factorization of a difference of squares is (a+b)(a-b)."}, {"text": "(7x^3 + 5y^2)(7x^3 - 5y^2)", "isCorrect": true, "rationale": "This expression is in the form a^2 - b^2, where a = 7x^3 (since (7x^3)^2 = 49x^6) and b = 5y^2 (since (5y^2)^2 = 25y^4). The correct factorization for a difference of squares is (a+b)(a-b)."}, {"text": "(7x^2 + 5y^2)(7x^4 - 5y^2)", "isCorrect": false, "rationale": "The powers of x are incorrect, as (7x^2)^2 would be 49x^4, not 49x^6. Also, the form is not a simple difference of squares."}, {"text": "(7x^3 + 5y^2)^2", "isCorrect": false, "rationale": "This represents squaring a binomial (a+b)^2, which expands to a^2 + 2ab + b^2, not a difference of squares a^2 - b^2."}], "id": "q01"}, {"question": "Factor the expression y^3 + 125 completely.", "options": [{"text": "(y + 5)(y^2 + 5y + 25)", "isCorrect": false, "rationale": "This is incorrect because the middle term of the trinomial factor for a sum of cubes should have an opposite sign (SOAP mnemonic: a^2 - ab + b^2)."}, {"text": "(y - 5)(y^2 + 5y + 25)", "isCorrect": false, "rationale": "This is incorrect because the first binomial factor for a sum of cubes should have the same sign as the original expression (SOAP mnemonic: (a+b))."}, {"text": "(y + 5)(y^2 - 5y + 25)", "isCorrect": true, "rationale": "This is the correct factorization for a sum of cubes. Using the formula a^3 + b^3 = (a + b)(a^2 - ab + b^2), with a = y and b = 5, we get (y + 5)(y^2 - y*5 + 5^2) = (y + 5)(y^2 - 5y + 25)."}, {"text": "(y + 5)^3", "isCorrect": false, "rationale": "This represents cubing a binomial, which expands to y^3 + 15y^2 + 75y + 125, not y^3 + 125."}], "id": "q02"}, {"question": "What is the complete factorization of 24m^3 - 3n^3?", "options": [{"text": "3(2m - n)(4m^2 + 2mn + n^2)", "isCorrect": true, "rationale": "First, factor out the GCF, which is 3, resulting in 3(8m^3 - n^3). Then, apply the difference of cubes formula a^3 - b^3 = (a - b)(a^2 + ab + b^2), with a = 2m and b = n. This gives 3(2m - n)((2m)^2 + (2m)(n) + n^2) = 3(2m - n)(4m^2 + 2mn + n^2)."}, {"text": "(24m - 3n)(m^2 + mn + n^2)", "isCorrect": false, "rationale": "This factorization does not correctly apply the difference of cubes formula. The GCF (3) was not factored out correctly, and the terms in the trinomial are incorrect."}, {"text": "3(2m + n)(4m^2 - 2mn + n^2)", "isCorrect": false, "rationale": "This is incorrect because it uses the sum of cubes pattern for the binomial factor (2m + n), but the original expression is a difference of cubes, so the first binomial factor should be (a - b)."}, {"text": "(2m - n)(12m^2 + 6mn + 3n^2)", "isCorrect": false, "rationale": "While the first binomial factor (2m - n) is correct if the GCF were 3, the GCF of 3 was not factored out of the trinomial factor, which should be 3(4m^2 + 2mn + n^2), not 12m^2 + 6mn + 3n^2."}], "id": "q03"}, {"question": "According to the 'SOAP' mnemonic for factoring sums or differences of cubes, what is true about the signs in the trinomial factor (a^2 ± ab + b^2)?", "options": [{"text": "The sign of the ab term is always the same as the original binomial.", "isCorrect": false, "rationale": "The 'O' in SOAP stands for 'Opposite', meaning the sign of the ab term in the trinomial is opposite to the sign in the original binomial."}, {"text": "The sign of the a^2 term is always negative.", "isCorrect": false, "rationale": "The a^2 term is always positive in both sum and difference of cubes formulas. (a^2 + ab + b^2 or a^2 - ab + b^2)."}, {"text": "The sign of the b^2 term is always positive.", "isCorrect": true, "rationale": "The 'AP' in SOAP stands for 'Always Positive', indicating that the sign of the b^2 term in the trinomial factor is always positive."}, {"text": "The sign of the first binomial factor (a ± b) is opposite to the original binomial.", "isCorrect": false, "rationale": "The 'S' in SOAP stands for 'Same', meaning the sign of the first binomial factor is the same as the sign in the original sum or difference of cubes expression."}], "id": "q04"}, {"question": "Factor the expression x^8 - 10x^4 + 9 completely over the real numbers.", "options": [{"text": "(x^4 - 1)(x^4 - 9)", "isCorrect": false, "rationale": "This is a correct intermediate step using substitution (u=x^4), but it is not the complete factorization. Both factors are differences of squares and can be factored further."}, {"text": "(x^2 - 1)(x^2 + 1)(x^2 - 3)(x^2 + 3)", "isCorrect": false, "rationale": "This is incorrect. The first factors (x^2-1) and (x^2-9) should be (x^2-1) and (x^2-9), and then factored further. This option factors x^4-1 as (x^2-1)(x^2+1) and x^4-9 as (x^2-3)(x^2+3), which is incorrect because (x^2-3)(x^2+3) yields x^4-9, not (x^2-3) and (x^2+3)."}, {"text": "(x - 1)(x + 1)(x - √3)(x + √3)(x^2 + 1)", "isCorrect": false, "rationale": "This factorization contains irrational factors (sqrt(3)) which is not typically implied by 'completely over the real numbers' unless specified. Also, it's missing (x^2+3). It's a misapplication of the steps."}, {"text": "(x - 1)(x + 1)(x - 3)(x + 3)(x^2 + 1)", "isCorrect": true, "rationale": "Let u = x^4. The expression becomes u^2 - 10u + 9 = (u - 1)(u - 9). Substituting back, we have (x^4 - 1)(x^4 - 9). Factoring both difference of squares: (x^2 - 1)(x^2 + 1)(x^2 - 9). Finally, factor the remaining differences of squares: (x - 1)(x + 1)(x^2 + 1)(x - 3)(x + 3)."}], "id": "q05"}, {"question": "Which of the following polynomials is NOT in quadratic form (au^2 + bu + c) where u is a power of x?", "options": [{"text": "3x^4 - 2x^2 + 1", "isCorrect": false, "rationale": "This polynomial is in quadratic form, where u = x^2, so it can be written as 3u^2 - 2u + 1."}, {"text": "x^6 + 5x^3 - 6", "isCorrect": false, "rationale": "This polynomial is in quadratic form, where u = x^3, so it can be written as u^2 + 5u - 6."}, {"text": "2x^5 - x^3 + 7", "isCorrect": true, "rationale": "This polynomial is NOT in quadratic form. If u = x^k, then the powers of x must be 2k, k, and 0 (for the constant term). Here, the powers are 5 and 3, which are not in a 2k and k relationship (e.g., if k=3, 2k=6; if k=5, 2k=10)."}, {"text": "y^10 - 4y^5 + 3", "isCorrect": false, "rationale": "This polynomial is in quadratic form, where u = y^5, so it can be written as u^2 - 4u + 3."}], "id": "q06"}, {"question": "Given the polynomial P(x) = x^3 - 3x^2 - x + 3, which of the following statements is true?", "options": [{"text": "(x - 2) is a factor of P(x).", "isCorrect": false, "rationale": "According to the Factor Theorem, if (x - 2) is a factor, then P(2) must be 0. P(2) = (2)^3 - 3(2)^2 - 2 + 3 = 8 - 12 - 2 + 3 = -3, which is not 0."}, {"text": "P(0) = 0.", "isCorrect": false, "rationale": "P(0) = (0)^3 - 3(0)^2 - 0 + 3 = 3, which is not 0. Therefore, x=0 is not a zero."}, {"text": "(x - 1) is a factor of P(x).", "isCorrect": true, "rationale": "According to the Factor Theorem, if (x - 1) is a factor, then P(1) must be 0. P(1) = (1)^3 - 3(1)^2 - 1 + 3 = 1 - 3 - 1 + 3 = 0. Since P(1) = 0, (x - 1) is a factor."}, {"text": "x = 2 is a zero of P(x).", "isCorrect": false, "rationale": "If x = 2 is a zero, then P(2) must be 0. P(2) = (2)^3 - 3(2)^2 - 2 + 3 = 8 - 12 - 2 + 3 = -3, which is not 0."}], "id": "q07"}, {"question": "Given that (x + 2) is a factor of P(x) = x^3 + 5x^2 + 2x - 8, what is the complete factorization of P(x)?", "options": [{"text": "(x + 2)(x + 4)(x - 1)", "isCorrect": true, "rationale": "Since (x + 2) is a factor, we can use synthetic division with c = -2. Dividing P(x) by (x + 2) gives a quotient of x^2 + 3x - 4. Factoring this quadratic trinomial yields (x + 4)(x - 1). Thus, the complete factorization is (x + 2)(x + 4)(x - 1)."}, {"text": "(x + 2)(x^2 + 3x - 4)", "isCorrect": false, "rationale": "This is a correct partial factorization after the first step of synthetic division, but the quadratic factor (x^2 + 3x - 4) can be factored further into (x + 4)(x - 1)."}, {"text": "(x + 2)(x - 4)(x + 1)", "isCorrect": false, "rationale": "The factorization of the quadratic quotient x^2 + 3x - 4 is incorrect. It should factor into (x + 4)(x - 1), not (x - 4)(x + 1)."}, {"text": "(x - 2)(x + 4)(x - 1)", "isCorrect": false, "rationale": "This is incorrect because the initial given factor is (x + 2), not (x - 2). The Factor Theorem states that if (x - c) is a factor, then P(c) = 0, so if (x + 2) is a factor, c = -2."}], "id": "q08"}, {"question": "For the polynomial P(x) = 4x^3 - 7x^2 + 2x - 6, which of the following is a possible rational zero according to the Rational Root Theorem?", "options": [{"text": "1/3", "isCorrect": false, "rationale": "According to the Rational Root Theorem, if p/q is a rational zero, p must divide the constant term (-6) and q must divide the leading coefficient (4). Here, q=3, which does not divide the leading coefficient 4."}, {"text": "2/5", "isCorrect": false, "rationale": "Here, p=2 divides -6, but q=5 does not divide the leading coefficient 4."}, {"text": "3/4", "isCorrect": true, "rationale": "Here, p=3 divides the constant term -6, and q=4 divides the leading coefficient 4. Therefore, 3/4 is a possible rational zero according to the Rational Root Theorem."}, {"text": "4/3", "isCorrect": false, "rationale": "Here, p=4 does not divide the constant term -6. Therefore, 4/3 is not a possible rational zero."}], "id": "q09"}, {"question": "Find all zeros of the polynomial P(x) = 2x^3 - x^2 - 7x + 6.", "options": [{"text": "x = 1, x = -3/2, x = 2", "isCorrect": false, "rationale": "While x=1 and x=2 are zeros, x=-3/2 is incorrect. The quadratic factor yields x=3/2, not x=-3/2."}, {"text": "x = 1, x = 3/2, x = -2", "isCorrect": true, "rationale": "Using the Rational Root Theorem, possible rational zeros include ±1, ±2, ±3, ±6, ±1/2, ±3/2. Testing P(1) = 2 - 1 - 7 + 6 = 0, so x=1 is a zero. Synthetic division by (x-1) gives a quotient of 2x^2 + x - 6. Factoring this quadratic gives (2x - 3)(x + 2). Setting these factors to zero gives x = 3/2 and x = -2. Thus, the zeros are 1, 3/2, and -2."}, {"text": "x = -1, x = 3/2, x = -2", "isCorrect": false, "rationale": "P(-1) = 2(-1)^3 - (-1)^2 - 7(-1) + 6 = -2 - 1 + 7 + 6 = 10 ≠ 0, so x=-1 is not a zero."}, {"text": "x = 1, x = 2, x = 3", "isCorrect": false, "rationale": "P(2) = 2(2)^3 - (2)^2 - 7(2) + 6 = 16 - 4 - 14 + 6 = 4 ≠ 0, so x=2 is not a zero. P(3) = 2(3)^3 - (3)^2 - 7(3) + 6 = 54 - 9 - 21 + 6 = 30 ≠ 0, so x=3 is not a zero."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
