<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT a characteristic of a linear equation in one variable x?", "options": [{"text": "It can be written in the form ax + b = 0.", "isCorrect": false, "rationale": "According to the definition, a linear equation in one variable x can indeed be written in the form ax + b = 0."}, {"text": "The variable x can have an exponent greater than 1.", "isCorrect": true, "rationale": "A linear equation by definition involves the variable x raised only to the power of 1 (implicitly). If x has an exponent greater than 1, it is not a linear equation."}, {"text": "The coefficient 'a' must be a non-zero real number.", "isCorrect": false, "rationale": "The definition states that 'a' must be a non-zero real number; otherwise, the variable term would disappear, and it might not be an equation in x or might simplify to a trivial statement."}, {"text": "The constant 'b' can be any real number.", "isCorrect": false, "rationale": "The definition states that 'b' is a real number, implying it can be any real value, including zero."}], "id": "q01"}, {"question": "Solve the equation 5y + 12 = 37.", "options": [{"text": "y = 25", "isCorrect": false, "rationale": "This would be the result if 12 was added to 37, or if division was not performed correctly. Subtracting 12 from both sides yields 5y = 25, not 5y = 125."}, {"text": "y = 4", "isCorrect": false, "rationale": "Subtracting 12 from both sides gives 5y = 25. Dividing 25 by 5 yields 5, not 4."}, {"text": "y = 5", "isCorrect": true, "rationale": "First, subtract 12 from both sides: 5y = 37 - 12, which simplifies to 5y = 25. Then, divide both sides by 5: y = 25 / 5, which results in y = 5. Checking: 5(5) + 12 = 25 + 12 = 37."}, {"text": "y = -5", "isCorrect": false, "rationale": "The calculation 37 - 12 results in a positive 25, so y must be a positive number."}], "id": "q02"}, {"question": "To transform the equation x - 8 = 15 into x = 23, which property of equality is applied?", "options": [{"text": "Subtraction Property of Equality", "isCorrect": false, "rationale": "The Subtraction Property would involve subtracting a quantity from both sides, which would move x further away from isolation."}, {"text": "Multiplication Property of Equality", "isCorrect": false, "rationale": "The Multiplication Property involves multiplying both sides by a quantity, which is not what is done here."}, {"text": "Addition Property of Equality", "isCorrect": true, "rationale": "To isolate x, we need to add 8 to both sides of the equation (x - 8 + 8 = 15 + 8), which results in x = 23. This is an application of the Addition Property of Equality."}, {"text": "Division Property of Equality", "isCorrect": false, "rationale": "The Division Property involves dividing both sides by a non-zero quantity, which is not applicable in this step."}], "id": "q03"}, {"question": "Find the solution to the equation 7z - 10 = 3z + 14.", "options": [{"text": "z = 6", "isCorrect": true, "rationale": "First, collect variable terms on one side by subtracting 3z from both sides: 4z - 10 = 14. Next, collect constant terms on the other side by adding 10 to both sides: 4z = 24. Finally, divide by the coefficient of z: z = 24 / 4 = 6. Check: 7(6) - 10 = 42 - 10 = 32; 3(6) + 14 = 18 + 14 = 32. Both sides are equal."}, {"text": "z = 24", "isCorrect": false, "rationale": "This would be the result if 10 and 14 were combined, and the coefficients of z were not handled correctly. The steps lead to 4z = 24, not z = 24."}, {"text": "z = -6", "isCorrect": false, "rationale": "Errors in combining signs or subtracting terms would lead to this. The steps lead to 4z = 24, making z a positive value."}, {"text": "z = 4", "isCorrect": false, "rationale": "This result suggests an incorrect division or combination of terms. The correct calculation is 24 divided by 4, not 16 divided by 4."}], "id": "q04"}, {"question": "Which statement best describes equivalent equations?", "options": [{"text": "They always look identical in their initial form.", "isCorrect": false, "rationale": "Equivalent equations do not necessarily look identical initially (e.g., x = 2 and 2x = 4). They are considered equivalent if they simplify to the same solution set."}, {"text": "They have at least one common solution.", "isCorrect": false, "rationale": "While equivalent equations will have common solutions, the definition states they must have *exactly* the same solution set, not just 'at least one' common solution."}, {"text": "They possess identical solution sets.", "isCorrect": true, "rationale": "The text explicitly states: 'Two equations are equivalent if they have exactly the same solution set.'"}, {"text": "They can be transformed into each other using only multiplication.", "isCorrect": false, "rationale": "Equivalent equations can be transformed into each other using any of the properties of equality (addition, subtraction, multiplication, or division by a non-zero quantity), not just multiplication."}], "id": "q05"}, {"question": "What is the first step recommended in the general strategy for solving an equation like m/4 - 1/3 = 5/6?", "options": [{"text": "Combine the fractions on the left side.", "isCorrect": false, "rationale": "While combining fractions on one side is a valid step, the general strategy specifically recommends 'Clear any fractions by multiplying both sides by the LCD' as the first step."}, {"text": "Multiply both sides by the least common denominator (LCD) of all fractions.", "isCorrect": true, "rationale": "The 'General Strategy for Solving a Linear Equation' explicitly states: 'Clear any fractions by multiplying both sides by the LCD' as the first step. For m/4 - 1/3 = 5/6, the LCD is 12."}, {"text": "Subtract 5/6 from both sides.", "isCorrect": false, "rationale": "This would involve working with fractions still and is not the recommended first step for clearing fractions."}, {"text": "Multiply 'm' by 4.", "isCorrect": false, "rationale": "Multiplying only one term by 4 would violate the properties of equality unless the entire side of the equation is multiplied, or specific terms are handled as part of a larger LCD multiplication."}], "id": "q06"}, {"question": "According to the general strategy for solving a linear equation, which of these steps should typically be performed *before* combining like terms?", "options": [{"text": "Dividing both sides by the coefficient of the variable.", "isCorrect": false, "rationale": "Dividing by the coefficient is typically the last step after all variable and constant terms have been collected and combined."}, {"text": "Collecting all variable terms on one side.", "isCorrect": false, "rationale": "Collecting variable terms is usually done after clearing fractions, parentheses, and combining like terms on each side."}, {"text": "Using the distributive property to remove parentheses.", "isCorrect": true, "rationale": "The general strategy lists 'Clear any fractions' then 'Use the distributive property to remove all parentheses' before 'Combine like terms on each side'. Removing parentheses allows the terms inside to be available for combining."}, {"text": "Checking the solution in the original equation.", "isCorrect": false, "rationale": "Checking the solution is always the final step to verify its correctness."}], "id": "q07"}, {"question": "If 'twice a number, decreased by 5, is equal to the number increased by 10,' what is the number?", "options": [{"text": "5", "isCorrect": false, "rationale": "If the number is 5: (2 * 5) - 5 = 10 - 5 = 5. And 5 + 10 = 15. Since 5 ≠ 15, this is not the correct number."}, {"text": "15", "isCorrect": true, "rationale": "Let n be the number. Translate the statement: 2n - 5 = n + 10. Subtract n from both sides: n - 5 = 10. Add 5 to both sides: n = 15. Check: (2 * 15) - 5 = 30 - 5 = 25. And 15 + 10 = 25. Since 25 = 25, the solution is correct."}, {"text": "-5", "isCorrect": false, "rationale": "If the number is -5: (2 * -5) - 5 = -10 - 5 = -15. And -5 + 10 = 5. Since -15 ≠ 5, this is not the correct number."}, {"text": "10", "isCorrect": false, "rationale": "If the number is 10: (2 * 10) - 5 = 20 - 5 = 15. And 10 + 10 = 20. Since 15 ≠ 20, this is not the correct number."}], "id": "q08"}, {"question": "An equation that is true for specific values of the variable but not for all real numbers is known as what type of equation?", "options": [{"text": "An identity", "isCorrect": false, "rationale": "An identity is an equation that is true for *every* real number, not just specific ones."}, {"text": "A contradiction", "isCorrect": false, "rationale": "A contradiction is an equation that is *never* true for any real number, having an empty solution set."}, {"text": "A conditional equation", "isCorrect": true, "rationale": "The text defines a conditional equation as 'an equation that is true for some but not all real numbers,' which matches the description."}, {"text": "A literal equation", "isCorrect": false, "rationale": "A literal equation is an equation involving two or more variables, usually solved by isolating one variable in terms of the others, not categorized by the nature of its solution set (all, none, or some)."}], "id": "q09"}, {"question": "After performing the necessary steps to solve an equation, you arrive at the statement 8 = 8. What does this indicate about the equation?", "options": [{"text": "The equation is a conditional equation with a unique solution.", "isCorrect": false, "rationale": "A conditional equation would yield a specific value for the variable (e.g., x=5), not a constant true statement."}, {"text": "The equation is a contradiction with no solution.", "isCorrect": false, "rationale": "A contradiction would result in a false statement (e.g., 8 = 5), indicating no solution."}, {"text": "The equation is an identity, and its solution set is all real numbers.", "isCorrect": true, "rationale": "The text states: 'When the variable completely cancels and you are left with a true statement (such as 5 = 5), the equation is an identity. Its solution set is all real numbers.'"}, {"text": "The equation has an error in its original setup.", "isCorrect": false, "rationale": "Arriving at a true statement like 8 = 8 is a valid outcome in solving equations and signifies an identity, not an error in the original equation's setup."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
