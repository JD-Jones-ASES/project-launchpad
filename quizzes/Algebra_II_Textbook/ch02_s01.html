<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic that distinguishes a function from a general relation?", "options": [{"text": "A function must have a domain of all real numbers.", "isCorrect": false, "rationale": "This is incorrect. A function's domain can be restricted (e.g., square roots, fractions), and not all relations have a domain of all real numbers."}, {"text": "A function assigns exactly one output to each input.", "isCorrect": true, "rationale": "This is the precise definition of a function: every element of the domain is paired with exactly one element of the range. No two ordered pairs share the same first coordinate with different second coordinates."}, {"text": "A function is always represented by a linear equation.", "isCorrect": false, "rationale": "This is incorrect. Functions can be linear, quadratic, exponential, piecewise, or many other forms, not just linear."}, {"text": "A function's range must be equal to its domain.", "isCorrect": false, "rationale": "This is incorrect. There is no such general restriction. The range is the set of outputs, and the domain is the set of inputs; they are often different sets of values."}]}, {"question": "A relation includes the ordered pairs $(3, 5)$, $(-2, 8)$, $(3, 1)$, and $(0, 4)$. Does this relation represent a function, and why?", "options": [{"text": "Yes, because each input has a unique output.", "isCorrect": false, "rationale": "This is incorrect. The input $x=3$ has two different outputs ($5$ and $1$), which violates the definition of a function."}, {"text": "No, because the input $3$ is paired with two different outputs, $5$ and $1$.", "isCorrect": true, "rationale": "This is correct. For a relation to be a function, each input must have exactly one output. Since $x=3$ is paired with both $y=5$ and $y=1$, it fails the definition of a function (and the Vertical Line Test)."}, {"text": "Yes, because it passes the Vertical Line Test.", "isCorrect": false, "rationale": "This is incorrect. A vertical line at $x=3$ would intersect the graph at both $(3,5)$ and $(3,1)$, failing the Vertical Line Test."}, {"text": "No, because the output $5$ is paired with two different inputs.", "isCorrect": false, "rationale": "This describes a characteristic of a function that is not one-to-one, but it does not prevent a relation from being a function. The critical issue for being a function is that each input has only one output, not the other way around."}]}, {"question": "If $f(x) = 2x^2 - 3x + 1$, what is the value of $f(-2)$?", "options": [{"text": "3", "isCorrect": false, "rationale": "This is incorrect. A calculation error occurred. For example, if $(-2)^2$ was interpreted as $-4$ instead of $4$ or if the $-3(-2)$ term was calculated incorrectly."}, {"text": "15", "isCorrect": true, "rationale": "This is correct. Substituting $x=-2$ into the function gives $f(-2) = 2(-2)^2 - 3(-2) + 1 = 2(4) + 6 + 1 = 8 + 6 + 1 = 15$."}, {"text": "-1", "isCorrect": false, "rationale": "This is incorrect. A calculation error occurred, possibly sign errors during multiplication or addition."}, {"text": "1", "isCorrect": false, "rationale": "This is incorrect. This value corresponds to $f(0)$, not $f(-2)$."}]}, {"question": "Given $f(x) = 2x^2 - 3x + 1$, evaluate $f(a+1)$.", "options": [{"text": "2a^2 + a + 1", "isCorrect": false, "rationale": "This is incorrect. There was a miscalculation during the expansion of $(a+1)^2$ or combining like terms."}, {"text": "2a^2 + 7a + 6", "isCorrect": false, "rationale": "This is incorrect. A common mistake is to assume $f(a+1) = f(a) + f(1)$, which is generally false. Full substitution and expansion are required."}, {"text": "2a^2 + a", "isCorrect": true, "rationale": "This is correct. Substituting $(a+1)$ for $x$ gives $f(a+1) = 2(a+1)^2 - 3(a+1) + 1 = 2(a^2 + 2a + 1) - 3a - 3 + 1 = 2a^2 + 4a + 2 - 3a - 3 + 1 = 2a^2 + a$."}, {"text": "2a^2 - 3a + 1 + a + 1", "isCorrect": false, "rationale": "This is incorrect. This shows a misunderstanding of how to substitute an entire expression for $x$. The substitution must be applied to all occurrences of $x$ and then simplified algebraically."}]}, {"question": "What is the domain of the function $g(x) = \\sqrt{x - 4}$?", "options": [{"text": "$$(-\\infty, \\infty)$$", "isCorrect": false, "rationale": "This is incorrect. Square roots (even-index radicals) restrict the domain because the radicand cannot be negative."}, {"text": "$$(4, \\infty)$$", "isCorrect": false, "rationale": "This is incorrect. While numbers greater than 4 are included, the number 4 itself is also allowed in the domain because $\\sqrt{4-4} = \\sqrt{0} = 0$, which is a real number."}, {"text": "$$[4, \\infty)$$", "isCorrect": true, "rationale": "This is correct. For the square root of $x-4$ to be a real number, the radicand $x-4$ must be greater than or equal to zero. Solving $x-4 \\ge 0$ gives $x \\ge 4$, which in interval notation is $[4, \\infty)$."}, {"text": "$$(-\\infty, 4]$$", "isCorrect": false, "rationale": "This is incorrect. Values less than 4 would make the radicand negative, resulting in an imaginary number, which is outside the implied domain of real-number outputs."}]}, {"question": "Determine the domain of the function $h(x) = \\frac{1}{x - 3}$.", "options": [{"text": "$$(-\\infty, \\infty)$$", "isCorrect": false, "rationale": "This is incorrect. Fractions restrict the domain because the denominator cannot be zero."}, {"text": "$$(-\\infty, 3)$$", "isCorrect": false, "rationale": "This is incorrect. While values less than 3 are in the domain, values greater than 3 are also allowed. Only $x=3$ is excluded."}, {"text": "$$(3, \\infty)$$", "isCorrect": false, "rationale": "This is incorrect. While values greater than 3 are in the domain, values less than 3 are also allowed. Only $x=3$ is excluded."}, {"text": "$$(-\\infty, 3) \\cup (3, \\infty)$$", "isCorrect": true, "rationale": "This is correct. For the expression to be defined, the denominator cannot be equal to zero. Thus, $x-3 \\ne 0$, which means $x \\ne 3$. The domain includes all real numbers except 3."}]}, {"question": "Given the piecewise function $f(x) = \\begin{cases} x^2 & \\text{if } x < 0 \\\\ 2x + 1 & \\text{if } x \\ge 0 \\end{cases}$, what is $f(-3)$?", "options": [{"text": "7", "isCorrect": false, "rationale": "This is incorrect. The condition for using $2x+1$ is $x \\ge 0$. Since $-3 < 0$, the $x^2$ formula should be used."}, {"text": "9", "isCorrect": true, "rationale": "This is correct. Since $-3 < 0$, we use the first rule: $f(x) = x^2$. So, $f(-3) = (-3)^2 = 9$."}, {"text": "-5", "isCorrect": false, "rationale": "This is incorrect. This might result from applying the wrong rule or making a sign error (e.g., $-3^2 = -9$ or an error with $2x+1$). The correct rule for $x=-3$ is $x^2$."}, {"text": "1", "isCorrect": false, "rationale": "This is incorrect. This value corresponds to $f(0)$, not $f(-3)$."}]}, {"question": "Using the same piecewise function from Question 7, $f(x) = \\begin{cases} x^2 & \\text{if } x < 0 \\\\ 2x + 1 & \\text{if } x \\ge 0 \\end{cases}$, what is $f(0)$?", "options": [{"text": "0", "isCorrect": false, "rationale": "This is incorrect. The condition for using $x^2$ is $x < 0$. Since $x=0$ is not less than 0, this rule does not apply."}, {"text": "1", "isCorrect": true, "rationale": "This is correct. Since $0 \\ge 0$, we use the second rule: $f(x) = 2x + 1$. So, $f(0) = 2(0) + 1 = 1$."}, {"text": "Undefined", "isCorrect": false, "rationale": "This is incorrect. The function is defined at $x=0$, as indicated by the 'if $x \\ge 0$' condition for the second formula."}, {"text": "It could be either 0 or 1, depending on interpretation.", "isCorrect": false, "rationale": "This is incorrect. Piecewise functions have strict conditions for which formula to use. There is only one correct formula for any given input in the domain."}]}, {"question": "Which statement accurately describes a one-to-one function?", "options": [{"text": "Every input has exactly one output.", "isCorrect": false, "rationale": "This describes the definition of any function, not specifically a one-to-one function. A function like $f(x)=x^2$ satisfies this but is not one-to-one."}, {"text": "No two different inputs produce the same output.", "isCorrect": true, "rationale": "This is the correct definition of a one-to-one function. Equivalently, every element of the range corresponds to exactly one element of the domain, and its graph passes the Horizontal Line Test."}, {"text": "The function's graph intersects the y-axis at most once.", "isCorrect": false, "rationale": "This is a characteristic of any function (since $x=0$ can only have one output), but it does not define a one-to-one function."}, {"text": "The function's graph intersects the x-axis at most once.", "isCorrect": false, "rationale": "This is incorrect. While some one-to-one functions might only intersect the x-axis once, it's not a defining characteristic for all one-to-one functions (e.g., $f(x)=e^x$ never intersects the x-axis, but is one-to-one)."}]}, {"question": "Given the function $g(x) = 4x + 7$, find the value of $x$ for which $g(x) = 31$.", "options": [{"text": "4", "isCorrect": false, "rationale": "This is incorrect. If $x=4$, then $g(4) = 4(4) + 7 = 16 + 7 = 23$, which is not 31."}, {"text": "6", "isCorrect": true, "rationale": "This is correct. Set the function equal to 31 and solve for $x$: $4x + 7 = 31 \\Rightarrow 4x = 31 - 7 \\Rightarrow 4x = 24 \\Rightarrow x = 6$."}, {"text": "9", "isCorrect": false, "rationale": "This is incorrect. If $x=9$, then $g(9) = 4(9) + 7 = 36 + 7 = 43$, which is not 31."}, {"text": "12", "isCorrect": false, "rationale": "This is incorrect. If $x=12$, then $g(12) = 4(12) + 7 = 48 + 7 = 55$, which is not 31."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
