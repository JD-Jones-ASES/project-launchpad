<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 6</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">

<script>
var QUESTIONS = [{"question": "Which statement best describes the relationship between a logarithmic function $f(x) = \\log_b(x)$ and an exponential function $g(x) = b^x$?", "options": [{"text": "Their graphs are reflections of each other across the x-axis.", "isCorrect": false, "rationale": "Reflecting across the x-axis changes $y$ to $-y$, which is not the definition of an inverse function relationship for these functions."}, {"text": "They are inverse functions of each other.", "isCorrect": true, "rationale": "The text explicitly states that a logarithmic function $f(x) = \\log_b(x)$ is the inverse of the exponential function $g(x) = b^x$, and their graphs are reflections across the line $y = x$ as a result."}, {"text": "They are parallel transformations of each other.", "isCorrect": false, "rationale": "Inverse functions are not simply parallel transformations; they involve swapping input and output values, leading to a reflection across the line $y=x$."}, {"text": "There is no direct functional relationship between them.", "isCorrect": false, "rationale": "The text clearly establishes that logarithmic functions are defined as the inverses of exponential functions with the same base."}]}, {"question": "For a basic logarithmic function $f(x) = \\log_b(x)$ with $b > 0, b \\ne 1$, what are its defining domain and vertical asymptote?", "options": [{"text": "Domain: $(-\\infty, \\infty)$; Vertical asymptote: $x = 0$", "isCorrect": false, "rationale": "The range of a logarithmic function is $(-\\infty, \\infty)$, but its domain is restricted to positive values."}, {"text": "Domain: $(0, \\infty)$; Vertical asymptote: $y = 0$", "isCorrect": false, "rationale": "The vertical asymptote is $x=0$, not $y=0$. A horizontal asymptote for $y=0$ is characteristic of many exponential functions, but not basic logarithmic functions."}, {"text": "Domain: $(0, \\infty)$; Vertical asymptote: $x = 0$", "isCorrect": true, "rationale": "The properties section clearly states that the domain of $f(x) = \\log_b(x)$ is $(0, \\infty)$ and its vertical asymptote is $x = 0$ (the y-axis)."}, {"text": "Domain: $(-\\infty, \\infty)$; Vertical asymptote: $y = x$", "isCorrect": false, "rationale": "Neither the domain nor the asymptote are correctly stated here. The line $y=x$ is the line of reflection for inverse functions, not an asymptote for $f(x) = \\log_b(x)$."}]}, {"question": "When sketching $f(x) = \\log_3(x)$ by plotting key points using its equivalent exponential form $x = 3^y$, which of the following points would typically *not* be used to demonstrate the basic shape and properties?", "options": [{"text": "$(1, 0)$", "isCorrect": false, "rationale": "This point is derived from $3^0=1$ and is a key x-intercept for all basic logarithmic functions, as shown in the example."}, {"text": "$(3, 1)$", "isCorrect": false, "rationale": "This point is derived from $3^1=3$ and is a key point in sketching the graph, as shown in the example."}, {"text": "$(0, 1)$", "isCorrect": true, "rationale": "The point $(0, 1)$ is characteristic of an exponential function ($y$-intercept of $y=b^x$) but is not on the graph of a basic logarithmic function $y=\\log_b(x)$, whose domain is $(0, \\infty)$ and thus does not include $x=0$. The example table does not include this point."}, {"text": "$(9, 2)$", "isCorrect": false, "rationale": "This point is derived from $3^2=9$ and helps illustrate the slow rise of the logarithmic curve, as shown in the example."}]}, {"question": "Consider the function $g(x) = \\log_2(x + 4)$. Relative to $f(x) = \\log_2(x)$, what transformation has been applied and how does it affect the function's vertical asymptote?", "options": [{"text": "A vertical shift up by 4 units; the asymptote remains at $x=0$.", "isCorrect": false, "rationale": "Adding a constant to the argument ($x+4$) results in a horizontal shift, not a vertical shift. Vertical shifts do not change the vertical asymptote."}, {"text": "A horizontal shift right by 4 units; the asymptote moves to $x=4$.", "isCorrect": false, "rationale": "A term like $(x+4)$ indicates a shift to the left, not the right. A shift right would be $(x-4)$."}, {"text": "A horizontal shift left by 4 units; the asymptote moves to $x=-4$.", "isCorrect": true, "rationale": "The term $(x+4)$ inside the logarithm indicates a horizontal shift to the left by 4 units. This causes the original vertical asymptote $x=0$ to shift left by 4 units, resulting in a new asymptote at $x=-4$. This is demonstrated in example (a)."}, {"text": "A reflection across the x-axis; the asymptote remains at $x=0$.", "isCorrect": false, "rationale": "A reflection across the x-axis would appear as $-f(x)$ or $-\\log_2(x)$, which is not the case here."}]}, {"question": "For the function $h(x) = -\\log_2(x) + 3$, which transformations are applied to the parent function $f(x) = \\log_2(x)$, and in what order?", "options": [{"text": "Reflection across the x-axis, then vertical shift up 3 units.", "isCorrect": true, "rationale": "The negative sign in front of the logarithm ($-f(x)$ form) indicates a reflection across the x-axis. The '+3' outside the logarithm indicates a vertical shift up by 3 units. The order of operations dictates that reflections are applied before vertical shifts when both are external to the function's argument, as clarified in example (b)."}, {"text": "Reflection across the y-axis, then vertical shift up 3 units.", "isCorrect": false, "rationale": "A reflection across the y-axis would be $f(-x)$ or $\\log_2(-x)$, not $-\\log_2(x)$."}, {"text": "Vertical shift up 3 units, then reflection across the x-axis.", "isCorrect": false, "rationale": "The order of transformations matters. If you shift up first, then reflect across the x-axis, the shift would also be reflected, leading to a different graph. The correct order is reflection first, then translation."}, {"text": "Horizontal shift left 3 units, then reflection across the x-axis.", "isCorrect": false, "rationale": "The '+3' is outside the logarithm, indicating a vertical shift, not a horizontal shift. A horizontal shift would be inside the argument, e.g., $\\log_2(x+3)$."}]}, {"question": "Find the domain of the logarithmic function $f(x) = \\log(4 - x^2)$.", "options": [{"text": "$(-\\infty, \\infty)$", "isCorrect": false, "rationale": "The domain of a logarithmic function is always restricted to positive arguments, so it cannot be all real numbers."}, {"text": "$(0, \\infty)$", "isCorrect": false, "rationale": "This is the domain of a basic $\\log(x)$ function, but the argument here is $4-x^2$, not just $x$."}, {"text": "$(-2, 2)$", "isCorrect": true, "rationale": "For the logarithm to be defined, its argument must be strictly positive: $4 - x^2 > 0$. This inequality solves to $x^2 < 4$, which means $-2 < x < 2$. The domain is therefore the interval $(-2, 2)$, as shown in the example."}, {"text": "$(-\\infty, -2) \\cup (2, \\infty)$", "isCorrect": false, "rationale": "This interval is where $4 - x^2 < 0$, which would make the argument negative and undefined for the logarithm."}]}, {"question": "For the function $f(x) = \\log_5(x - 2) - 1$, state its domain, vertical asymptote, and x-intercept.", "options": [{"text": "Domain: $(-\\infty, \\infty)$; Vertical asymptote: $x=0$; x-intercept: $(5, 0)$", "isCorrect": false, "rationale": "The domain of a logarithmic function is restricted. The vertical asymptote is shifted due to the horizontal transformation."}, {"text": "Domain: $(2, \\infty)$; Vertical asymptote: $x=2$; x-intercept: $(7, 0)$", "isCorrect": true, "rationale": "Domain: $x-2 > 0 \\Rightarrow x > 2$, so $(2, \\infty)$. Vertical Asymptote: $x-2 = 0 \\Rightarrow x = 2$. x-intercept: Set $f(x)=0 \\Rightarrow \\log_5(x-2) - 1 = 0 \\Rightarrow \\log_5(x-2) = 1 \\Rightarrow x-2 = 5^1 \\Rightarrow x=7$. So the x-intercept is $(7, 0)$. All these align with the example solution."}, {"text": "Domain: $(2, \\infty)$; Vertical asymptote: $x=-2$; x-intercept: $(3, 0)$", "isCorrect": false, "rationale": "The vertical asymptote comes from $x-2=0$, not $x+2=0$. The x-intercept calculation is also incorrect for this function."}, {"text": "Domain: $(0, \\infty)$; Vertical asymptote: $x=0$; x-intercept: $(7, 0)$", "isCorrect": false, "rationale": "The domain and vertical asymptote are determined by the horizontal shift of 2 units to the right, not for the basic function."}]}, {"question": "A student states that all logarithmic functions $f(x) = \\log_b(x)$ are always increasing. Based on the provided text, why is this statement incorrect?", "options": [{"text": "Logarithmic functions are decreasing if the base $b > 1$.", "isCorrect": false, "rationale": "The text states that $f(x) = \\log_b(x)$ is increasing when $b > 1$."}, {"text": "Logarithmic functions are increasing if the base $0 < b < 1$.", "isCorrect": false, "rationale": "The text states that $f(x) = \\log_b(x)$ is decreasing when $0 < b < 1$."}, {"text": "Logarithmic functions are decreasing if the base $0 < b < 1$.", "isCorrect": true, "rationale": "The text explicitly states: 'Increasing when $b > 1$; decreasing when $0 < b < 1$'. Therefore, the statement that all logarithmic functions are always increasing is incorrect because they are decreasing when the base is between 0 and 1."}, {"text": "Logarithmic functions are neither increasing nor decreasing; their slope changes.", "isCorrect": false, "rationale": "Logarithmic functions are one-to-one and monotonic (either always increasing or always decreasing) over their entire domain."}]}, {"question": "The text emphasizes that for $f(x)=\\log_b(g(x))$, one must solve $g(x)>0$ to find the domain. If a student attempts to evaluate $\\log_7(-5)$, which fundamental requirement for logarithmic functions is being violated?", "options": [{"text": "The base must be a positive number.", "isCorrect": false, "rationale": "The base $7$ is positive, so this requirement is met."}, {"text": "The base must not be equal to 1.", "isCorrect": false, "rationale": "The base $7$ is not equal to 1, so this requirement is met."}, {"text": "The argument of the logarithm must be strictly positive.", "isCorrect": true, "rationale": "The argument of the logarithm is $-5$, which is not strictly positive. The 'note' explicitly highlights this as the single most important feature to check, stating the argument must be $g(x)>0$."}, {"text": "The output of the logarithmic function must be a real number.", "isCorrect": false, "rationale": "The output being a real number is a consequence of the logarithm being defined, not a precondition for its definition. If the argument is invalid, no real output exists."}]}, {"question": "Which transformation of $f(x) = \\log_b(x)$ would result in a reflection across the y-axis, and what would be the impact on its domain and vertical asymptote?", "options": [{"text": "$-f(x)$; Domain: $(0, \\infty)$; Asymptote: $x=0$", "isCorrect": false, "rationale": "$-f(x)$ represents a reflection across the x-axis, which does not change the domain or vertical asymptote of the basic function."}, {"text": "$f(-x)$; Domain: $(-\\infty, 0)$; Asymptote: $x=0$", "isCorrect": true, "rationale": "The transformation $f(-x)$ reflects the graph across the y-axis. For $f(x) = \\log_b(x)$, this becomes $f(-x) = \\log_b(-x)$. The argument must be positive, so $-x > 0 \\Rightarrow x < 0$. This changes the domain to $(-\\infty, 0)$ while the vertical asymptote remains $x=0$ (the y-axis)."}, {"text": "$f(x) + k$; Domain: $(0, \\infty)$; Asymptote: $x=k$", "isCorrect": false, "rationale": "$f(x)+k$ is a vertical shift, not a reflection. It does not change the vertical asymptote for a basic log function (it would remain $x=0$) or the domain."}, {"text": "$f(x - h)$; Domain: $(h, \\infty)$; Asymptote: $x=h$", "isCorrect": false, "rationale": "$f(x-h)$ is a horizontal shift, not a reflection across the y-axis. While it changes the domain and asymptote, it's not the requested transformation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
