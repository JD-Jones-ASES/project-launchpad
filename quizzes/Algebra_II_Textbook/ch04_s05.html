<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "From a function perspective, how is a sequence defined?", "options": [{"text": "A function whose domain is all real numbers.", "isCorrect": false, "rationale": "A sequence is specifically a function whose domain is the set of positive integers (or natural numbers), not all real numbers."}, {"text": "A function whose domain is the set of positive integers.", "isCorrect": true, "rationale": "The section states: 'A sequence can be viewed as a function a : N -> R, where a(n) = a_n.' The domain is the positive integers."}, {"text": "A function whose range is the set of positive integers.", "isCorrect": false, "rationale": "The range of a sequence can be any set of real numbers. It is the domain that is restricted to positive integers."}, {"text": "A function that maps real numbers to integers.", "isCorrect": false, "rationale": "A sequence maps positive integers to real numbers, not the other way around."}]}, {"question": "What defines an arithmetic sequence?", "options": [{"text": "Each term is obtained by multiplying the previous term by a constant ratio.", "isCorrect": false, "rationale": "This describes a geometric sequence, not an arithmetic sequence."}, {"text": "The difference between consecutive terms is constant.", "isCorrect": true, "rationale": "An arithmetic sequence has a constant common difference d, where d = a_{n+1} - a_n for all n >= 1."}, {"text": "Each term is the average of its two neighbors.", "isCorrect": false, "rationale": "While this is a property that follows from constant differences, it is not the definition given in the section."}, {"text": "The terms alternate between positive and negative values.", "isCorrect": false, "rationale": "Alternating signs characterize certain geometric sequences with negative common ratios, not arithmetic sequences in general."}]}, {"question": "What is the nth-term formula for an arithmetic sequence with first term a_1 and common difference d?", "options": [{"text": "a_n = a_1 * d^(n-1)", "isCorrect": false, "rationale": "This is the formula for a geometric sequence, which uses repeated multiplication. Arithmetic sequences use repeated addition."}, {"text": "a_n = a_1 + nd", "isCorrect": false, "rationale": "Close, but incorrect. The formula is a_n = a_1 + (n-1)d, not a_1 + nd. With nd, the second term would be a_1 + d instead of starting the count from 0 steps."}, {"text": "a_n = a_1 + (n - 1)d", "isCorrect": true, "rationale": "The section states: 'If a sequence is arithmetic with first term a_1 and common difference d, then a_n = a_1 + (n-1)d.' This gives any term directly from its position n."}, {"text": "a_n = a_1 * (n - 1) + d", "isCorrect": false, "rationale": "This formula is algebraically incorrect. The correct form multiplies d by (n-1) and adds a_1."}]}, {"question": "Is the sequence 5, 10, 20, 40, ... arithmetic?", "options": [{"text": "Yes, with common difference 5.", "isCorrect": false, "rationale": "The differences are 5, 10, 20 — they are not constant. The section explicitly identifies this sequence as 'not arithmetic' because the differences vary."}, {"text": "Yes, with common difference 10.", "isCorrect": false, "rationale": "Only the first difference (10 - 5) equals 5, not 10. And subsequent differences (20 - 10 = 10, 40 - 20 = 20) are not constant."}, {"text": "No, it is a geometric sequence with common ratio 2.", "isCorrect": true, "rationale": "The section shows: 'Differences: 10-5=5, 20-10=10, 40-20=20. Not constant. Not arithmetic. (This is a geometric sequence with ratio 2.)'"}, {"text": "No, it has no recognizable pattern.", "isCorrect": false, "rationale": "The sequence does have a pattern: each term is multiplied by 2 to get the next. It is geometric, not arithmetic."}]}, {"question": "An arithmetic sequence has a_1 = 7 and d = -3. What is a_10?", "options": [{"text": "-23", "isCorrect": false, "rationale": "This would come from 7 + 10(-3) = -23, but the formula uses (n-1), not n."}, {"text": "-20", "isCorrect": true, "rationale": "Using a_n = a_1 + (n-1)d: a_10 = 7 + (10-1)(-3) = 7 + 9(-3) = 7 - 27 = -20. The section simplifies to a_n = 10 - 3n, giving a_10 = 10 - 30 = -20."}, {"text": "-17", "isCorrect": false, "rationale": "This would result from miscounting steps. a_10 = 7 + 9(-3) = -20, not -17."}, {"text": "37", "isCorrect": false, "rationale": "This would result from adding instead of subtracting: 7 + 9(3) = 34, which is still not 37."}]}, {"question": "What is the nth-term formula for a geometric sequence with first term a_1 and common ratio r?", "options": [{"text": "a_n = a_1 + (n - 1)r", "isCorrect": false, "rationale": "This is the formula for an arithmetic sequence. Geometric sequences use multiplication (exponentiation), not addition."}, {"text": "a_n = a_1 * r^n", "isCorrect": false, "rationale": "The exponent should be (n-1), not n. With r^n, the first term would be a_1 * r instead of a_1."}, {"text": "a_n = a_1 * r^(n-1)", "isCorrect": true, "rationale": "The section states: 'a_n = a_1 * r^(n-1).' This ensures a_1 = a_1 * r^0 = a_1, correctly giving the first term."}, {"text": "a_n = a_1 * n * r", "isCorrect": false, "rationale": "This linear formula does not capture the exponential growth or decay of a geometric sequence."}]}, {"question": "A geometric sequence has a_1 = 3 and r = 2. Is 192 a term in this sequence?", "options": [{"text": "Yes, it is the 6th term.", "isCorrect": false, "rationale": "a_6 = 3 * 2^5 = 3 * 32 = 96, not 192."}, {"text": "Yes, it is the 7th term.", "isCorrect": true, "rationale": "Solve 3 * 2^(n-1) = 192: 2^(n-1) = 64 = 2^6, so n - 1 = 6 and n = 7. Therefore 192 = a_7."}, {"text": "Yes, it is the 8th term.", "isCorrect": false, "rationale": "a_8 = 3 * 2^7 = 384, not 192."}, {"text": "No, 192 is not a term in this sequence.", "isCorrect": false, "rationale": "192 is indeed a term: 3 * 2^6 = 192, making it the 7th term."}]}, {"question": "The sequence 64, -32, 16, -8, ... is geometric. What is the common ratio?", "options": [{"text": "r = 2", "isCorrect": false, "rationale": "The terms are decreasing in absolute value and alternating in sign, so the ratio must be negative and have absolute value less than 1."}, {"text": "r = -2", "isCorrect": false, "rationale": "If r = -2, the terms would grow: 64, -128, 256, ... But the terms here are shrinking."}, {"text": "r = 1/2", "isCorrect": false, "rationale": "If r = 1/2, all terms would be positive. The alternating signs require a negative ratio."}, {"text": "r = -1/2", "isCorrect": true, "rationale": "Compute: -32/64 = -1/2, 16/(-32) = -1/2, -8/16 = -1/2. All ratios equal -1/2. The negative ratio explains the alternating signs."}]}, {"question": "An arithmetic sequence has a_3 = 11 and a_7 = 27. What is the common difference d?", "options": [{"text": "d = 8", "isCorrect": false, "rationale": "This would be (27-11)/2, dividing by the wrong number of steps."}, {"text": "d = 4", "isCorrect": true, "rationale": "From term 3 to term 7 is 4 steps: a_7 = a_3 + 4d, so 27 = 11 + 4d, giving 4d = 16 and d = 4."}, {"text": "d = 5.33", "isCorrect": false, "rationale": "This would result from dividing by 3 instead of 4. There are 7 - 3 = 4 steps between the terms."}, {"text": "d = 2", "isCorrect": false, "rationale": "If d = 2, then a_7 = 11 + 4(2) = 19, not 27."}]}, {"question": "In the compound interest example, $1,000 is deposited at 6% annual interest compounded annually. What is the common ratio of the resulting geometric sequence?", "options": [{"text": "r = 0.06", "isCorrect": false, "rationale": "0.06 is the interest rate, not the common ratio. Each year the balance is multiplied by 1 + 0.06, not by 0.06."}, {"text": "r = 1.06", "isCorrect": true, "rationale": "Each year the balance is multiplied by (1 + 0.06) = 1.06. This makes r = 1.06, so the sequence is 1000, 1060, 1123.60, ..."}, {"text": "r = 6", "isCorrect": false, "rationale": "A ratio of 6 would mean the balance sextuples each year, which is far too large."}, {"text": "r = 0.94", "isCorrect": false, "rationale": "r = 0.94 = 1 - 0.06 would represent a 6% decrease each year, not a 6% increase."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
