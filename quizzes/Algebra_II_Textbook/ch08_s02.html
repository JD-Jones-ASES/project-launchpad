    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the 'counterintuitive' aspect of horizontal scaling mentioned in the textbook section?", "options": [{"text": "Multiplying f(x) by a > 1 causes the graph to be compressed vertically.", "isCorrect": false, "rationale": "This describes a vertical stretch, making the graph taller, not compressed vertically."}, {"text": "Multiplying the input by b > 1 causes the graph to be stretched horizontally.", "isCorrect": false, "rationale": "This is incorrect. Multiplying the input by b > 1 actually compresses the graph horizontally, which is the counterintuitive property."}, {"text": "Multiplying the input by b > 1 causes the graph to be compressed horizontally.", "isCorrect": true, "rationale": "The text states: 'horizontal scaling has the counterintuitive property that multiplying the input by b > 1 actually compresses the graph (it makes it narrower, not wider).'"}, {"text": "Multiplying f(x) by 0 < a < 1 causes the graph to be stretched vertically.", "isCorrect": false, "rationale": "This describes a vertical compression, making the graph shorter, not stretched vertically."}]}, {"question": "If the point (3, 6) is on the graph of y = f(x), what point will be on the graph of y = (1/2)f(x)?", "options": [{"text": "(3, 12)", "isCorrect": false, "rationale": "This would be the result of a vertical stretch by a factor of 2 (y = 2f(x))."}, {"text": "(6, 6)", "isCorrect": false, "rationale": "This would be the result of a horizontal transformation, not a vertical one."}, {"text": "(3, 3)", "isCorrect": true, "rationale": "A vertical compression by a factor of 1/2 (y = (1/2)f(x)) means each y-value is multiplied by 1/2. So, (3, 6) maps to (3, 6 * 1/2) = (3, 3)."}, {"text": "(1.5, 6)", "isCorrect": false, "rationale": "This would be the result of a horizontal compression by a factor of 1/2 (y = f(2x))."}]}, {"question": "A graph of y = f(x) passes through the point (8, 2). If g(x) = f(4x), what point will be on the graph of g(x)?", "options": [{"text": "(2, 2)", "isCorrect": true, "rationale": "A horizontal compression by a factor of 1/b (y = f(bx)) means each x-value is divided by b. Here, b=4, so (8, 2) maps to (8/4, 2) = (2, 2)."}, {"text": "(32, 2)", "isCorrect": false, "rationale": "This would be the result of a horizontal stretch by a factor of 4 (y = f(x/4))."}, {"text": "(8, 8)", "isCorrect": false, "rationale": "This would be the result of a vertical stretch by a factor of 4 (y = 4f(x))."}, {"text": "(8, 0.5)", "isCorrect": false, "rationale": "This would be the result of a vertical compression by a factor of 1/4 (y = (1/4)f(x))."}]}, {"question": "Consider the transformations y = 3f(x) and y = f(3x). How do these transformations generally affect the graph of f(x) in terms of its appearance?", "options": [{"text": "Both transformations will make the graph appear taller and narrower.", "isCorrect": false, "rationale": "While f(3x) makes it narrower, 3f(x) makes it taller but not necessarily narrower in overall width relative to height."}, {"text": "y = 3f(x) makes the graph taller, while y = f(3x) makes it narrower.", "isCorrect": true, "rationale": "For y = af(x) with a > 1, the graph stretches vertically (taller). For y = f(bx) with b > 1, the graph compresses horizontally (narrower). This matches the description."}, {"text": "y = 3f(x) makes the graph shorter, while y = f(3x) makes it wider.", "isCorrect": false, "rationale": "This describes the opposite effects for both transformations."}, {"text": "Both transformations will make the graph appear shorter and wider.", "isCorrect": false, "rationale": "This describes the opposite effects for both transformations."}]}, {"question": "A function f(x) is transformed to g(x) = -2f(x + 5) - 1. According to the textbook's 'Order of Transformations (inside to outside)' key concept, which transformation should be applied third?", "options": [{"text": "Vertical stretch by a factor of 2.", "isCorrect": true, "rationale": "The order is: 1. Horizontal shifts (x+5, left 5), 2. Horizontal stretches/compressions (none here, b=1). 3. Vertical stretches/compressions (multiplier -2 outside, so stretch by 2, ignoring the negative for now). 4. Reflections over x-axis (the negative sign). 5. Vertical shifts (-1, down 1)."}, {"text": "Horizontal shift left by 5 units.", "isCorrect": false, "rationale": "This is the first transformation according to the 'inside to outside' rule for f(x+5)."}, {"text": "Reflection over the x-axis.", "isCorrect": false, "rationale": "This transformation (the leading negative) should be applied fourth, after the vertical stretch."}, {"text": "Vertical shift down by 1 unit.", "isCorrect": false, "rationale": "This is the last transformation (fifth) according to the specified order."}]}, {"question": "Starting with y = |x|, write the equation after it is shifted right by 3 units, compressed vertically by 1/2, and then shifted down by 4 units.", "options": [{"text": "y = (1/2)|x + 3| - 4", "isCorrect": false, "rationale": "This equation represents a shift left by 3 units, not right."}, {"text": "y = (1/2)|x - 3| - 4", "isCorrect": true, "rationale": "Following the order: 1. Parent function: y = |x|. 2. Shift right 3: y = |x - 3|. 3. Compress vertically by 1/2: y = (1/2)|x - 3|. 4. Shift down 4: y = (1/2)|x - 3| - 4."}, {"text": "y = |(1/2)x - 3| - 4", "isCorrect": false, "rationale": "This represents a horizontal stretch by 2 and then a shift right, not a vertical compression."}, {"text": "y = 2|x - 3| - 4", "isCorrect": false, "rationale": "This represents a vertical stretch by 2, not a compression by 1/2."}]}, {"question": "The textbook cautions against applying transformations in the wrong order. Which of the following scenarios best illustrates why applying a vertical shift *before* a vertical stretch can lead to an incorrect graph?", "options": [{"text": "Shifting y = x^2 up by 2 and then stretching vertically by 2 results in y = 2x^2 + 4, while stretching first results in y = 2x^2 + 2.", "isCorrect": true, "rationale": "If we shift first: f(x)+2. Then stretch: 2(f(x)+2) = 2f(x)+4. If we stretch first: 2f(x). Then shift: 2f(x)+2. These are different, demonstrating why order matters for vertical stretch and shift."}, {"text": "Horizontal shifts and stretches always commute, so their order doesn't matter.", "isCorrect": false, "rationale": "This statement is generally false, and specifically does not address the vertical shift/stretch issue from the caution note."}, {"text": "Reflections over the x-axis are not affected by the order of vertical shifts.", "isCorrect": false, "rationale": "Reflections are affected: -(f(x)+d) is different from -f(x)+d. This also doesn't specifically address the stretch/shift order problem."}, {"text": "Applying a horizontal compression before a horizontal shift changes the magnitude of the shift.", "isCorrect": false, "rationale": "While true that factoring for `f(b(x-c/b))` changes the shift value, this option focuses on horizontal transformations, not the specific vertical stretch/shift order cautioned against in the text."}]}, {"question": "Describe all transformations applied to f(x) = x^2 to obtain g(x) = - (2x + 4)^2 + 3, in the correct order according to the textbook's key concept.", "options": [{"text": "Horizontal shift left 4, horizontal compression by 1/2, reflection over x-axis, vertical shift up 3.", "isCorrect": false, "rationale": "The horizontal shift should be based on the factored form, (x+2), not (x+4)."}, {"text": "Horizontal compression by 1/2, horizontal shift left 2, reflection over x-axis, vertical shift up 3.", "isCorrect": true, "rationale": "First, rewrite as g(x) = -(2(x + 2))^2 + 3. Following the order: 1. Horizontal compression by 1/2 (from '2x'). 2. Horizontal shift left 2 (from 'x+2'). 3. Reflection over x-axis (from the leading '-'). 4. Vertical shift up 3 (from '+3')."}, {"text": "Horizontal shift left 2, horizontal stretch by 2, reflection over x-axis, vertical shift up 3.", "isCorrect": false, "rationale": "This incorrectly identifies a horizontal stretch instead of a compression."}, {"text": "Horizontal shift left 4, horizontal stretch by 2, reflection over x-axis, vertical shift up 3.", "isCorrect": false, "rationale": "Both the magnitude of the shift and the type of horizontal scaling are incorrect."}]}, {"question": "For the function f(x) = x^2, a horizontal compression by a factor of 1/2 is equivalent to which other transformation?", "options": [{"text": "A vertical compression by a factor of 1/4.", "isCorrect": false, "rationale": "A vertical compression by 1/4 would result in y = (1/4)x^2, which is not equivalent to f(2x)."}, {"text": "A vertical stretch by a factor of 4.", "isCorrect": true, "rationale": "The text states: 'f(2x) = (2x)^2 = 4x^2 = 4f(x)—horizontally compressing by 1/2 is the same as vertically stretching by 4' for f(x)=x^2."}, {"text": "A horizontal stretch by a factor of 2.", "isCorrect": false, "rationale": "This is the opposite of a horizontal compression by 1/2."}, {"text": "A reflection over the y-axis.", "isCorrect": false, "rationale": "For f(x)=x^2, f(-x) = (-x)^2 = x^2, so a reflection over the y-axis causes no change to the graph of y=x^2."}]}, {"question": "When a graph y = f(x) undergoes a vertical stretch or compression (y = af(x) where a > 0), which points on the graph remain unchanged?", "options": [{"text": "Points on the y-axis.", "isCorrect": false, "rationale": "Only the point (0,0) if it exists, but other points on the y-axis (where x=0) such as (0, 5) would change to (0, 5a)."}, {"text": "Points on the x-axis.", "isCorrect": true, "rationale": "The property states: 'Each point (x, y) maps to (x, ay). Points on the x-axis (where y = 0) are unchanged.' This is because y=0 becomes y=a*0=0."}, {"text": "Points at the maximum or minimum of the function.", "isCorrect": false, "rationale": "Unless the maximum or minimum occurs at y=0, their y-coordinates will change due to the vertical scaling."}, {"text": "Points where f(x) = 1.", "isCorrect": false, "rationale": "If f(x)=1, then af(x) = a*1 = a. So, a point (x, 1) would transform to (x, a), which is a change (unless a=1, in which case there is no transformation)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
