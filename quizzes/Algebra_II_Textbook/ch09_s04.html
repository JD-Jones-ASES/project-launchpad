<script>
var QUESTIONS = [{"question": "What is the fundamental defining characteristic of a hyperbola, and how does it fundamentally differ from an ellipse?", "options": [{"text": "The sum of distances to two foci is constant, similar to an ellipse.", "isCorrect": false, "rationale": "This describes an ellipse, where the sum of distances is constant, not a hyperbola. The text explicitly states this difference."}, {"text": "The absolute difference of distances to two foci is constant, unlike an ellipse where the sum is constant.", "isCorrect": true, "rationale": "As stated in the text, a hyperbola is defined as the set of all points where the absolute difference of distances to two fixed points (foci) is constant, which directly contrasts with an ellipse where the sum is constant."}, {"text": "It has only one focus, and the distance to it is equal to the distance to a directrix.", "isCorrect": false, "rationale": "This property describes a parabola, not a hyperbola. Hyperbolas, like ellipses, have two foci."}, {"text": "The product of distances to two foci is constant.", "isCorrect": false, "rationale": "The product of distances is not a defining property of either a hyperbola or an ellipse."}], "id": "q01"}, {"question": "For the hyperbola given by the equation \\(\\frac{(x-3)^2}{25} - \\frac{(y+2)^2}{144} = 1\\), what are the coordinates of its foci and the equations of its asymptotes?", "options": [{"text": "Foci: $(3 \\pm 5, -2)$; Asymptotes: $y+2 = \\pm \\frac{5}{12}(x-3)$.", "isCorrect": false, "rationale": "This option incorrectly uses 'a' (5) instead of 'c' (13) for the foci, and swaps the slope components for the asymptotes ($a/b$ instead of $b/a$). For a horizontal hyperbola, the slope is $\\pm b/a$."}, {"text": "Foci: $(3 \\pm 13, -2)$; Asymptotes: $y+2 = \\pm \\frac{12}{5}(x-3)$.", "isCorrect": true, "rationale": "The center is $(3, -2)$, $a^2=25 \\implies a=5$, $b^2=144 \\implies b=12$. For a hyperbola, $c^2=a^2+b^2=25+144=169$, so $c=13$. Since it's a horizontal hyperbola, foci are $(h \\pm c, k) = (3 \\pm 13, -2)$. The asymptotes for a horizontal hyperbola are $y-k = \\pm \\frac{b}{a}(x-h)$, so $y+2 = \\pm \\frac{12}{5}(x-3)$."}, {"text": "Foci: $(3, -2 \\pm 13)$; Asymptotes: $y+2 = \\pm \\frac{12}{5}(x-3)$.", "isCorrect": false, "rationale": "This option incorrectly places the foci along the vertical axis instead of the horizontal axis, which corresponds to a vertical hyperbola. The asymptotes are correct for a horizontal hyperbola."}, {"text": "Foci: $(3 \\pm 13, -2)$; Asymptotes: $y+2 = \\pm \\frac{5}{12}(x-3)$.", "isCorrect": false, "rationale": "This option has the correct foci, but incorrectly uses $a/b$ instead of $b/a$ for the slope of the asymptotes for a horizontal hyperbola."}], "id": "q02"}, {"question": "Consider the hyperbola with the equation \\(\\frac{(y-1)^2}{9} - \\frac{(x+4)^2}{16} = 1\\). What are the coordinates of its vertices and the eccentricity?", "options": [{"text": "Vertices: $(-4, 1 \\pm 4)$; Eccentricity: $e = 5/3$.", "isCorrect": false, "rationale": "This option incorrectly uses 'b' (4) instead of 'a' (3) for the distance to the vertices, and 'a' for eccentricity should be from the term with the positive sign."}, {"text": "Vertices: $(-4, 1 \\pm 3)$; Eccentricity: $e = 5/4$.", "isCorrect": false, "rationale": "This option has the correct vertices but incorrectly uses 'b' (4) instead of 'a' (3) in the denominator for eccentricity ($e=c/a$ where $a$ is from the positive term)."}, {"text": "Vertices: $(-4, 1 \\pm 3)$; Eccentricity: $e = 5/3$.", "isCorrect": true, "rationale": "The center is $(-4, 1)$, $a^2=9 \\implies a=3$, $b^2=16 \\implies b=4$. For a hyperbola, $c^2=a^2+b^2=9+16=25$, so $c=5$. Since it's a vertical hyperbola (y-term is positive), vertices are $(h, k \\pm a) = (-4, 1 \\pm 3)$. Eccentricity $e=c/a = 5/3$."}, {"text": "Vertices: $(-4 \\pm 3, 1)$; Eccentricity: $e = 5/3$.", "isCorrect": false, "rationale": "This option incorrectly places the vertices along the horizontal axis instead of the vertical axis, which corresponds to a horizontal hyperbola."}], "id": "q03"}, {"question": "Convert the equation \\(9y^2 - 4x^2 - 36y - 8x - 4 = 0\\) to standard form for a hyperbola and identify its center and orientation.", "options": [{"text": "\\(\\frac{(x+1)^2}{9} - \\frac{(y-2)^2}{4} = 1\\); Center: $(-1, 2)$; Horizontal.", "isCorrect": false, "rationale": "This option has the signs of the squared terms flipped in the standard form, which would lead to an incorrect orientation and an incorrect equation. The constant terms from completing the square are also handled incorrectly for $x$ and $y$ terms."}, {"text": "\\(\\frac{(y-2)^2}{4} - \\frac{(x+1)^2}{9} = 1\\); Center: $(-1, 2)$; Vertical.", "isCorrect": true, "rationale": "Group terms: $9(y^2 - 4y) - 4(x^2 + 2x) = 4$. Complete the square: $9(y^2 - 4y + 4) - 4(x^2 + 2x + 1) = 4 + 9(4) - 4(1)$, which simplifies to $9(y-2)^2 - 4(x+1)^2 = 36$. Divide by 36: $\\frac{(y-2)^2}{4} - \\frac{(x+1)^2}{9} = 1$. The center is $(-1, 2)$, and since the $y^2$ term is positive, it's a vertical hyperbola."}, {"text": "\\(\\frac{(y+2)^2}{4} - \\frac{(x-1)^2}{9} = 1\\); Center: $(1, -2)$; Vertical.", "isCorrect": false, "rationale": "This option has an incorrect center due to errors in completing the square and identifying the signs for 'h' and 'k'."}, {"text": "\\(\\frac{(x-1)^2}{9} - \\frac{(y+2)^2}{4} = 1\\); Center: $(1, -2)$; Horizontal.", "isCorrect": false, "rationale": "This option has an incorrect center and incorrect orientation, as well as an incorrect standard form."}], "id": "q04"}, {"question": "Which of the following general quadratic equations represents a hyperbola?", "options": [{"text": "\\(x^2 + y^2 - 4x + 6y + 1 = 0\\)", "isCorrect": false, "rationale": "In this equation, the coefficients of $x^2$ and $y^2$ are both $1$ (equal and same sign), indicating a circle."}, {"text": "\\(3x^2 + 5y^2 - 6x + 2y - 10 = 0\\)", "isCorrect": false, "rationale": "In this equation, the coefficients of $x^2$ and $y^2$ are $3$ and $5$ respectively (both positive but different), indicating an ellipse."}, {"text": "\\(y^2 - 2x + 4y - 3 = 0\\)", "isCorrect": false, "rationale": "This equation has only one squared term ($y^2$), indicating a parabola."}, {"text": "\\(2x^2 - 7y^2 + 8x - 14y + 5 = 0\\)", "isCorrect": true, "rationale": "In this equation, the coefficients of $x^2$ and $y^2$ ($A=2$ and $C=-7$) have opposite signs, which is the defining characteristic of a hyperbola in general form, as outlined in the text's 'Classifying Conics' property."}], "id": "q05"}, {"question": "A common point of confusion arises when comparing the relationship between \\(a, b, c\\) and the eccentricity for hyperbolas and ellipses. What is the correct distinction?", "options": [{"text": "For both hyperbolas and ellipses, \\(c^2 = a^2 + b^2\\), but eccentricity \\(e < 1\\) for hyperbolas and \\(e > 1\\) for ellipses.", "isCorrect": false, "rationale": "This is incorrect. The relationship for $c^2$ is different for hyperbolas and ellipses, and the eccentricity conditions are swapped for both."}, {"text": "For hyperbolas, \\(c^2 = a^2 + b^2\\) and \\(e > 1\\); for ellipses, \\(c^2 = a^2 - b^2\\) and \\(e < 1\\).", "isCorrect": true, "rationale": "As stated in the 'caution' note, for hyperbolas, $c^2 = a^2 + b^2$ and eccentricity $e = c/a > 1$. For ellipses, $c^2 = a^2 - b^2$ (or $a^2 = b^2 + c^2$) and eccentricity $e = c/a < 1$."}, {"text": "For hyperbolas, \\(c^2 = a^2 - b^2\\) and \\(e < 1\\); for ellipses, \\(c^2 = a^2 + b^2\\) and \\(e > 1\\).", "isCorrect": false, "rationale": "This option incorrectly swaps the $c^2$ relationship and eccentricity conditions between hyperbolas and ellipses."}, {"text": "For both hyperbolas and ellipses, \\(c^2 = a^2 - b^2\\), and eccentricity \\(e > 1\\) for hyperbolas and \\(e < 1\\) for ellipses.", "isCorrect": false, "rationale": "This is incorrect. The $c^2$ relationship is different for hyperbolas and ellipses. Specifically, $c^2 = a^2 + b^2$ for hyperbolas."}], "id": "q06"}, {"question": "The asymptotes are a crucial feature of a hyperbola. How can they be accurately visualized and derived from the hyperbola's standard form?", "options": [{"text": "The asymptotes are lines perpendicular to the transverse axis passing through the foci.", "isCorrect": false, "rationale": "Lines perpendicular to the transverse axis are not the asymptotes. These might be directrices in the context of other conics, but not for hyperbolas' asymptotes."}, {"text": "The asymptotes are lines that intersect the vertices of the hyperbola, defining its spread.", "isCorrect": false, "rationale": "Asymptotes are lines that the hyperbola approaches but never reaches, they do not typically intersect the vertices of the hyperbola. They guide the curve's spread."}, {"text": "The asymptotes are the extended diagonals of the central rectangle, which is centered at \\((h,k)\\) with half-widths \\(a\\) and \\(b\\) in the transverse and conjugate directions, respectively.", "isCorrect": true, "rationale": "The text explains that 'The asymptotes of a hyperbola can be found by constructing the central rectangle... The asymptotes are the diagonals of this rectangle extended.' This provides a clear visualization and derivation method."}, {"text": "The asymptotes are found by setting the denominators of the standard form equation to zero and solving for \\(x\\) and \\(y\\).", "isCorrect": false, "rationale": "Setting denominators to zero is not a method to find asymptotes. This would lead to undefined terms in the equation, not lines that the hyperbola approaches."}], "id": "q07"}, {"question": "Given a hyperbola in standard form \\(\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1\\), what is the equation of its conjugate hyperbola?", "options": [{"text": "\\(\\frac{x^2}{b^2} - \\frac{y^2}{a^2} = 1\\)", "isCorrect": false, "rationale": "This equation swaps the denominators $a^2$ and $b^2$ but keeps $x^2$ positive, which does not produce a conjugate hyperbola as defined. A conjugate hyperbola has its transverse and conjugate axes swapped, meaning the positive term switches from $x^2$ to $y^2$ (or vice-versa), and $a^2$ and $b^2$ retain their positions relative to the variables in the definition."}, {"text": "\\(\\frac{y^2}{a^2} - \\frac{x^2}{b^2} = 1\\)", "isCorrect": false, "rationale": "This equation correctly makes the $y^2$ term positive but incorrectly associates $a^2$ with $y^2$ and $b^2$ with $x^2$. The text defines the conjugate of $x^2/a^2 - y^2/b^2 = 1$ as $y^2/b^2 - x^2/a^2 = 1$."}, {"text": "\\(\\frac{y^2}{b^2} - \\frac{x^2}{a^2} = 1\\)", "isCorrect": true, "rationale": "As defined in the text, 'Two hyperbolas are conjugates if they share the same asymptotes but have their transverse and conjugate axes swapped. If one hyperbola is $x^2/a^2 - y^2/b^2 = 1$, its conjugate is $y^2/b^2 - x^2/a^2 = 1$.'"}, {"text": "\\(\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1\\)", "isCorrect": false, "rationale": "This equation represents an ellipse, not a hyperbola, and therefore cannot be a conjugate hyperbola."}], "id": "q08"}, {"question": "In a LORAN navigation system, two transmitters are 160 km apart. A ship determines it is 40 km closer to transmitter A than to transmitter B. Which statement correctly describes the ship's position?", "options": [{"text": "The ship is located on an ellipse where the sum of distances to the transmitters is 40 km.", "isCorrect": false, "rationale": "The difference of distances, not the sum, is constant for this application, defining a hyperbola, not an ellipse."}, {"text": "The ship is located on a hyperbola for which \\(2a = 40\\) km, with the foci being the two transmitters.", "isCorrect": true, "rationale": "The definition of a hyperbola is the set of all points where the absolute difference of distances to two foci is constant. In LORAN, the transmitters act as foci, and the constant difference in distances is $2a$. Here, the ship being 40 km closer to A than B means the difference $|d_A - d_B| = 40$ km, so $2a = 40$ km."}, {"text": "The ship is located on a parabola, with one transmitter as the focus.", "isCorrect": false, "rationale": "A parabola has only one focus. This scenario involves two fixed points (transmitters), defining either an ellipse or a hyperbola based on the sum or difference of distances."}, {"text": "The ship is located on a hyperbola where \\(a=160\\) km, and the difference in distances is \\(2c\\).", "isCorrect": false, "rationale": "$2c$ represents the distance between the foci (the transmitters), which is 160 km. The constant difference in distances is $2a$, which is 40 km, not $2c$ or $a=160$ km."}], "id": "q09"}, {"question": "For what value(s) of \\(k\\) is the line \\(y = 3x + k\\) tangent to the hyperbola \\(x^2 - y^2 = 8\\)?", "options": [{"text": "\\(k = \\pm 4\\)", "isCorrect": false, "rationale": "This result would occur if there was an algebraic error in solving the discriminant equation, such as $k^2 = 16$ instead of $k^2 = 64$."}, {"text": "\\(k = \\pm \\sqrt{8}\\)", "isCorrect": false, "rationale": "This result would occur if the discriminant was $-k^2 + 8 = 0$, which is not correct for this problem. The discriminant calculation should be $4k^2-256=0$."}, {"text": "\\(k = \\pm 8\\)", "isCorrect": true, "rationale": "Substitute $y = 3x + k$ into $x^2 - y^2 = 8$: $x^2 - (3x+k)^2 = 8$. Expand: $x^2 - (9x^2 + 6kx + k^2) = 8 \\implies -8x^2 - 6kx - k^2 - 8 = 0$. Rearrange to $8x^2 + 6kx + (k^2 + 8) = 0$. For tangency, the discriminant must be zero: $B^2 - 4AC = (6k)^2 - 4(8)(k^2 + 8) = 0$. This simplifies to $36k^2 - 32k^2 - 256 = 0 \\implies 4k^2 - 256 = 0 \\implies 4k^2 = 256 \\implies k^2 = 64$. Therefore, $k = \\pm 8$."}, {"text": "\\(k = \\pm 16\\)", "isCorrect": false, "rationale": "This result would occur if there was an algebraic error in solving the discriminant equation, such as $k^2 = 256$ instead of $k^2 = 64$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
