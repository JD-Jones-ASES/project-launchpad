    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions correctly defines the quotient of two functions, $(f/g)(x)$, and its domain?", "options": [{"text": "$(f/g)(x) = f(x) + g(x)$, with domain $D_f \\cap D_g$.", "isCorrect": false, "rationale": "This definition is for the sum of functions, not the quotient. The domain is also incomplete for a quotient."}, {"text": "$(f/g)(x) = f(x)/g(x)$, with domain $D_f \\cap D_g$ where $g(x) \\ne 0$.", "isCorrect": true, "rationale": "This is the correct definition for the quotient of functions, requiring the denominator $g(x)$ not to be zero, in addition to $x$ being in both $D_f$ and $D_g$."}, {"text": "$(f/g)(x) = f(x)g(x)$, with domain $D_f \\cap D_g$.", "isCorrect": false, "rationale": "This definition is for the product of functions, not the quotient."}, {"text": "$(f/g)(x) = f(g(x))$, with domain of $x$ in $D_g$ such that $g(x)$ is in $D_f$.", "isCorrect": false, "rationale": "This definition describes the composition of functions, not the quotient."}]}, {"question": "Given $f(x) = 3x + 1$ and $g(x) = x^2 - 4$, what is the value of $(f - g)(2)$?", "options": [{"text": "$-4$", "isCorrect": false, "rationale": "This would be $g(2)-f(2)$, which is $0-7=-7$. The correct subtraction is $f(2) - g(2)$."}, {"text": "$0$", "isCorrect": false, "rationale": "This would be the result of $(f-g)(2)$ if $f(2)$ and $g(2)$ were equal. $f(2) = 7$ and $g(2) = 0$, so $7-0 = 7$."}, {"text": "$7$", "isCorrect": true, "rationale": "First, evaluate $f(2) = 3(2) + 1 = 7$. Next, evaluate $g(2) = 2^2 - 4 = 4 - 4 = 0$. Then, $(f - g)(2) = f(2) - g(2) = 7 - 0 = 7$."}, {"text": "$11$", "isCorrect": false, "rationale": "This would be $f(2) + g(2)$ if $g(2)$ was $4$, but $g(2)=0$. $f(2)=7, g(2)=0$. So $f(2)-g(2)=7$."}]}, {"question": "For functions $f(x) = 3x + 1$ and $g(x) = x^2 - 4$, what is the domain of $(f/g)(x)$?", "options": [{"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "The domain of $(f/g)(x)$ must exclude any values of $x$ for which the denominator $g(x)$ is zero."}, {"text": "$(- \\infty, -2) \\cup (-2, 2) \\cup (2, \\infty)$", "isCorrect": true, "rationale": "The domain of $(f/g)(x)$ is the intersection of the domains of $f(x)$ and $g(x)$, excluding any $x$ where $g(x) = 0$. Both $f(x)$ and $g(x)$ have domains of all real numbers. $g(x) = x^2 - 4 = 0$ when $x^2 = 4$, so $x = 2$ or $x = -2$. These values must be excluded from the domain."}, {"text": "$(- \\infty, -1/3) \\cup (-1/3, \\infty)$", "isCorrect": false, "rationale": "This domain would be relevant if $f(x)$ were in the denominator, or if $f(x)=0$ needed to be excluded for some reason, which is not the case for $(f/g)(x)$."}, {"text": "$[4, \\infty)$", "isCorrect": false, "rationale": "This domain is typically associated with functions involving square roots of expressions like $(x-4)$, not a rational function like $(f/g)(x)$."}]}, {"question": "Which statement accurately describes the general relationship between $(f \\circ g)(x)$ and $(g \\circ f)(x)$?", "options": [{"text": "They are always equal, demonstrating that composition is commutative.", "isCorrect": false, "rationale": "The text explicitly states that composition is generally not commutative, meaning $(f \\circ g)(x) \\ne (g \\circ f)(x)$ in general. The example also demonstrates this."}, {"text": "They represent the product of $f(x)$ and $g(x)$, just in a different order.", "isCorrect": false, "rationale": "Composition is a distinct operation from the product of functions. The product is $(fg)(x) = f(x)g(x)$."}, {"text": "They are generally not equal, indicating that the order of composition matters.", "isCorrect": true, "rationale": "The text highlights that composition is generally not commutative, and the order of operations (which function is applied first) significantly affects the result, i.e., $(f \\circ g)(x) \\ne (g \\circ f)(x)$."}, {"text": "One applies $f$ to $x$ and then $g$ to the result, while the other applies $g$ to $x$ and then $f$ to the result, making them fundamentally the same operation.", "isCorrect": false, "rationale": "While the description of the order of operations is correct for both $(g \\circ f)(x)$ and $(f \\circ g)(x)$ respectively, it incorrectly concludes that they are 'fundamentally the same operation' in terms of outcome. The distinction in order *is* what makes them generally different."}]}, {"question": "Let $f(x) = x^2 + 1$ and $g(x) = 2x - 3$. Evaluate $(f \\circ g)(4)$.", "options": [{"text": "$31$", "isCorrect": false, "rationale": "This result corresponds to $(g \\circ f)(4)$, where $f(4) = 17$ and $g(17) = 2(17) - 3 = 31$. For $(f \\circ g)(4)$, $g$ is applied first."}, {"text": "$5$", "isCorrect": false, "rationale": "This is the value of $g(4)$. The next step for $(f \\circ g)(4)$ is to apply $f$ to this result."}, {"text": "$26$", "isCorrect": true, "rationale": "To evaluate $(f \\circ g)(4)$, first calculate $g(4) = 2(4) - 3 = 8 - 3 = 5$. Then, substitute this result into $f(x)$, so $f(5) = 5^2 + 1 = 25 + 1 = 26$."}, {"text": "$17$", "isCorrect": false, "rationale": "This is the value of $f(4)$. For $(f \\circ g)(4)$, $g$ is applied first, not $f$."}]}, {"question": "Given $f(x) = 2x + 5$ and $g(x) = x^2 - 1$, find and simplify $(f \\circ g)(x)$.", "options": [{"text": "$4x^2 + 20x + 24$", "isCorrect": false, "rationale": "This is the result of $(g \\circ f)(x)$, not $(f \\circ g)(x)$. It involves substituting $f(x)$ into $g(x)$."}, {"text": "$2x^3 + 5x^2 - 2x - 5$", "isCorrect": false, "rationale": "This is the result of the product $(fg)(x)$, not the composition $(f \\circ g)(x)$."}, {"text": "$2x^2 + 3$", "isCorrect": true, "rationale": "To find $(f \\circ g)(x)$, substitute the entire expression for $g(x)$ into $f(x)$. So, $f(g(x)) = f(x^2 - 1) = 2(x^2 - 1) + 5 = 2x^2 - 2 + 5 = 2x^2 + 3$."}, {"text": "$x^2 + 2x + 4$", "isCorrect": false, "rationale": "This expression does not result from correctly performing the composition $(f \\circ g)(x)$ with the given functions."}]}, {"question": "Let $h(x) = (3x - 5)^4$. Which pair of functions $f(x)$ and $g(x)$ correctly decomposes $h(x)$ as $(f \\circ g)(x)$?", "options": [{"text": "$f(x) = x^4$ and $g(x) = 3x - 5$", "isCorrect": true, "rationale": "If $g(x) = 3x - 5$ and $f(x) = x^4$, then $f(g(x)) = f(3x - 5) = (3x - 5)^4$, which matches $h(x)$. This means $g(x)$ is the 'inner' function and $f(x)$ is the 'outer' function."}, {"text": "$f(x) = 3x - 5$ and $g(x) = x^4$", "isCorrect": false, "rationale": "If $f(x) = 3x - 5$ and $g(x) = x^4$, then $f(g(x)) = f(x^4) = 3(x^4) - 5 = 3x^4 - 5$, which is not $h(x)$."}, {"text": "$f(x) = (3x - 5)^4$ and $g(x) = x$", "isCorrect": false, "rationale": "This decomposition uses $g(x) = x$, which is generally discouraged in decomposition exercises as it's trivial and doesn't break down the function into simpler components."}, {"text": "$f(x) = 3x^4$ and $g(x) = x - 5$", "isCorrect": false, "rationale": "If $f(x) = 3x^4$ and $g(x) = x - 5$, then $f(g(x)) = f(x - 5) = 3(x - 5)^4$, which is not $h(x)$."}]}, {"question": "Let $f(x) = \\sqrt{x}$ and $g(x) = x - 4$. What is the domain of $(f \\circ g)(x)$?", "options": [{"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "The function $f(x) = \\sqrt{x}$ requires its input to be non-negative, so the domain cannot be all real numbers."}, {"text": "$[0, \\infty)$", "isCorrect": false, "rationale": "This is the domain of $f(x)$ by itself. For composition, the output of $g(x)$ must satisfy the domain of $f(x)$, and $x$ must be in the domain of $g(x)$."}, {"text": "$[4, \\infty)$", "isCorrect": true, "rationale": "The domain of $(f \\circ g)(x)$ requires two conditions: 1) $x$ must be in the domain of $g(x)$ (which is $(-\\infty, \\infty)$ for $g(x) = x-4$), and 2) $g(x)$ must be in the domain of $f(x)$. Since $f(x) = \\sqrt{x}$, its input must be non-negative. Therefore, $g(x) \\ge 0$, which means $x - 4 \\ge 0$, leading to $x \\ge 4$. So the domain is $[4, \\infty)$."}, {"text": "$(- \\infty, 4) \\cup (4, \\infty)$", "isCorrect": false, "rationale": "This domain would be for a rational function like $1/(x-4)$, where $x=4$ is excluded. It's not applicable for a square root function."}]}, {"question": "In the context of 'Function Arithmetic and Composition,' how does composition differ from arithmetic combinations of functions?", "options": [{"text": "Arithmetic combinations apply one function after another, while composition performs operations like addition or subtraction.", "isCorrect": false, "rationale": "This statement reverses the definitions. Composition applies one function after another, while arithmetic combinations involve operations like addition or subtraction."}, {"text": "Composition is limited to combining functions that are both linear, while arithmetic combinations can use any function type.", "isCorrect": false, "rationale": "Composition is not limited to linear functions; it can combine various types of functions. This statement is incorrect."}, {"text": "Arithmetic combinations combine functions directly via operations like addition, where functions share the same input, whereas composition uses the output of one function as the input for another.", "isCorrect": true, "rationale": "This accurately distinguishes the two. Arithmetic combinations take $f(x)$ and $g(x)$ and apply an operation (e.g., $f(x)+g(x)$) using the same input $x$. Composition, however, creates a nested structure where $f(g(x))$, the output of $g$ becomes the input to $f$."}, {"text": "The domain of arithmetic combinations is always narrower than the domain of composition.", "isCorrect": false, "rationale": "The relationship between domains can vary. For example, the domain of $f+g$ might be $(-\\infty, \\infty)$, while the domain of $f(g(x))$ could be restricted to a smaller interval due to inner function or outer function domain constraints. There is no 'always narrower' rule."}]}, {"question": "If $f(x) = 4x - 1$ and $g(x) = x^2$, calculate $(g \\circ f)(-1)$.", "options": [{"text": "$-5$", "isCorrect": false, "rationale": "This is the value of $f(-1)$ before applying $g$. $f(-1) = 4(-1) - 1 = -4 - 1 = -5$. The next step is to apply $g$ to this result."}, {"text": "$15$", "isCorrect": false, "rationale": "This calculation is incorrect. $f(-1)=-5$, then $g(-5)=(-5)^2=25$."}, {"text": "$25$", "isCorrect": true, "rationale": "To evaluate $(g \\circ f)(-1)$, first calculate $f(-1) = 4(-1) - 1 = -4 - 1 = -5$. Then, substitute this result into $g(x)$, so $g(-5) = (-5)^2 = 25$."}, {"text": "$1$", "isCorrect": false, "rationale": "This would be $g(f(-1))$ if $f(-1)$ was $1$ or $-1$. $f(-1) = -5$, so $g(-5)=25$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
