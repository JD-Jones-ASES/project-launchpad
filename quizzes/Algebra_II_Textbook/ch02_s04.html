<script>
var QUESTIONS = [{"question": "In a linear model $f(x) = mx + b$, what do the slope $m$ and the $y$-intercept $b$ primarily represent?", "options": [{"text": "The slope $m$ is the initial value, and the $y$-intercept $b$ is the rate of change.", "isCorrect": false, "rationale": "This statement reverses the definitions. The slope $m$ represents the rate of change, and the $y$-intercept $b$ represents the initial value."}, {"text": "The slope $m$ is the rate of change, and the $y$-intercept $b$ is the initial value.", "isCorrect": true, "rationale": "According to the text, in a linear model $f(x) = mx + b$, the slope $m$ represents the rate of change and the $y$-intercept $b$ represents the initial value (value when $x = 0$)."}, {"text": "The slope $m$ is the dependent variable, and the $y$-intercept $b$ is the independent variable.", "isCorrect": false, "rationale": "The slope $m$ and $y$-intercept $b$ are constants in a linear function; $x$ is the independent variable and $f(x)$ (or $y$) is the dependent variable."}, {"text": "The slope $m$ is the input value, and the $y$-intercept $b$ is the output value.", "isCorrect": false, "rationale": "The input value is $x$, and the output value is $f(x)$ or $y$. The slope and $y$-intercept are parameters of the function, not the input or output themselves."}]}, {"question": "A personal trainer charges a one-time registration fee of $30 plus $60 per session. Which function $C(s)$ correctly models the total cost for $s$ training sessions?", "options": [{"text": "$C(s) = 30s + 60$", "isCorrect": false, "rationale": "This model incorrectly assigns the per-session charge as the y-intercept and the registration fee as the slope. The $60 per session is the rate of change (slope) and the $30 registration fee is the initial value (y-intercept)."}, {"text": "$C(s) = 60s + 30$", "isCorrect": true, "rationale": "The $60 per session represents the rate of change (slope $m$), and the $30 registration fee represents the initial value (y-intercept $b$). Therefore, the correct function is $C(s) = 60s + 30$."}, {"text": "$C(s) = 90s$", "isCorrect": false, "rationale": "This function combines the initial fee and per-session charge into a single rate, implying a direct variation without a separate initial fee, which is incorrect for this scenario."}, {"text": "$C(s) = 30 - 60s$", "isCorrect": false, "rationale": "This function incorrectly suggests that the cost decreases with more sessions and that $30 is the maximum cost, which is contrary to the problem description."}]}, {"question": "Which of the following equations represents a direct variation relationship between $y$ and $x$?", "options": [{"text": "$y = 5x + 2$", "isCorrect": false, "rationale": "This is a general linear function. For direct variation, the $y$-intercept must be zero ($b=0$), meaning it must be in the form $y = kx$. Here, $b=2 \\neq 0$."}, {"text": "$y = 3/x$", "isCorrect": false, "rationale": "This represents inverse variation, where $y$ is directly proportional to the reciprocal of $x$, not directly proportional to $x$ itself."}, {"text": "$y = -4x$", "isCorrect": true, "rationale": "Direct variation is defined as $y = kx$ for some nonzero constant $k$. In this equation, $k = -4$, satisfying the definition."}, {"text": "$y = x^2$", "isCorrect": false, "rationale": "This is a quadratic relationship, not a linear direct variation. The exponent on $x$ must be 1 for a linear relationship."}]}, {"question": "If $y$ varies directly as $x$, and $y = 42$ when $x = 7$, what is the value of $y$ when $x = 11$?", "options": [{"text": "55", "isCorrect": false, "rationale": "First, find the constant of variation $k$. Given $y=42$ when $x=7$, we use $y = kx$: $42 = k(7)$, which gives $k = 6$. So the direct variation model is $y = 6x$. Then, substitute $x=11$ into the model: $y = 6(11) = 66$. This option is incorrect."}, {"text": "66", "isCorrect": true, "rationale": "First, find the constant of variation $k$. Given $y=42$ when $x=7$, we use $y = kx$: $42 = k(7)$, which gives $k = 6$. So the direct variation model is $y = 6x$. Then, substitute $x=11$ into the model: $y = 6(11) = 66$."}, {"text": "77", "isCorrect": false, "rationale": "First, find the constant of variation $k$. Given $y=42$ when $x=7$, we use $y = kx$: $42 = k(7)$, which gives $k = 6$. So the direct variation model is $y = 6x$. Then, substitute $x=11$ into the model: $y = 6(11) = 66$. This option is incorrect."}, {"text": "84", "isCorrect": false, "rationale": "First, find the constant of variation $k$. Given $y=42$ when $x=7$, we use $y = kx$: $42 = k(7)$, which gives $k = 6$. So the direct variation model is $y = 6x$. Then, substitute $x=11$ into the model: $y = 6(11) = 66$. This option is incorrect."}]}, {"question": "In the 'Draining a Swimming Pool' example, the function $V(t) = 15,000 - 250t$ describes the volume of water remaining after $t$ minutes. What does the slope, $-250$, represent in this context?", "options": [{"text": "The initial volume of water in the pool (in gallons).", "isCorrect": false, "rationale": "The initial volume of water is represented by the $y$-intercept, which is $15,000$ gallons, not the slope."}, {"text": "The total time it takes for the pool to empty (in minutes).", "isCorrect": false, "rationale": "The total time for the pool to empty is found by setting $V(t) = 0$, which is $60$ minutes, not represented by the slope directly."}, {"text": "The rate at which water is being drained from the pool, in gallons per minute.", "isCorrect": true, "rationale": "The slope $m$ represents the rate of change. A slope of $-250$ indicates that the volume of water is decreasing by $250$ gallons every minute, meaning the drain empties $250$ gallons per minute."}, {"text": "The total volume of water drained after $t$ minutes (in gallons).", "isCorrect": false, "rationale": "The total volume drained after $t$ minutes would be $250t$, not simply the value of the slope $-250$ itself."}]}, {"question": "The 'Boiling Point vs. Elevation' example uses the function $B(h) = 100 - h/300$, where $B(h)$ is the boiling point in Celsius and $h$ is the elevation in meters. What does the $y$-intercept ($B(0)$) represent in this specific context?", "options": [{"text": "The rate at which the boiling point changes with elevation.", "isCorrect": false, "rationale": "The rate of change is represented by the slope, which is $-1/300$ degrees Celsius per meter, not the $y$-intercept."}, {"text": "The boiling point of water at sea level (0 meters elevation).", "isCorrect": true, "rationale": "The $y$-intercept $b = f(0)$ represents the initial value, which in this case is the boiling point of water when the elevation $h=0$ meters (sea level). $B(0) = 100 - 0/300 = 100^\\circ C$."}, {"text": "The maximum possible elevation at which water can boil.", "isCorrect": false, "rationale": "The $y$-intercept does not represent the maximum elevation; it represents the boiling point at zero elevation."}, {"text": "The total decrease in boiling point for a given elevation.", "isCorrect": false, "rationale": "The total decrease in boiling point would be $h/300$, which depends on $h$, not a fixed value like the $y$-intercept."}]}, {"question": "A library charges a $5 annual membership fee plus $0.20 per day for each book borrowed. If a member wants to spend no more than $15 on library services in a year, what is the maximum number of book-days (sum of days for all books borrowed) they can accumulate?", "options": [{"text": "40 book-days", "isCorrect": false, "rationale": "Let $d$ be the number of book-days. The cost function is $C(d) = 0.20d + 5$. Setting $C(d) \\le 15$: $0.20d + 5 \\le 15 \\Rightarrow 0.20d \\le 10 \\Rightarrow d \\le 50$. So $40$ is below the maximum."}, {"text": "50 book-days", "isCorrect": true, "rationale": "Let $d$ be the number of book-days. The cost function is $C(d) = 0.20d + 5$. To spend no more than $15, we set up the inequality: $0.20d + 5 \\le 15$. Subtracting $5$ from both sides gives $0.20d \\le 10$. Dividing by $0.20$ yields $d \\le 50$. Therefore, the maximum number of book-days is $50$."}, {"text": "60 book-days", "isCorrect": false, "rationale": "Let $d$ be the number of book-days. The cost function is $C(d) = 0.20d + 5$. Setting $C(d) \\le 15$: $0.20d + 5 \\le 15 \\Rightarrow 0.20d \\le 10 \\Rightarrow d \\le 50$. So $60$ exceeds the budget ($0.20(60) + 5 = 12 + 5 = 17$, which is greater than $15$)."}, {"text": "75 book-days", "isCorrect": false, "rationale": "Let $d$ be the number of book-days. The cost function is $C(d) = 0.20d + 5$. Setting $C(d) \\le 15$: $0.20d + 5 \\le 15 \\Rightarrow 0.20d \\le 10 \\Rightarrow d \\le 50$. So $75$ far exceeds the budget."}]}, {"question": "A cell phone provider offers two plans: Plan X charges $10 per month plus $0.10 per minute, and Plan Y charges $30 per month with unlimited minutes. For how many minutes of talk time would Plan X cost more than Plan Y?", "options": [{"text": "Fewer than 100 minutes", "isCorrect": false, "rationale": "Let $m$ be minutes. Plan X: $C_X(m) = 0.10m + 10$. Plan Y: $C_Y(m) = 30$. To find when $C_X(m) > C_Y(m)$: $0.10m + 10 > 30 \\Rightarrow 0.10m > 20 \\Rightarrow m > 200$. So, Plan X costs more for more than 200 minutes."}, {"text": "Exactly 200 minutes", "isCorrect": false, "rationale": "At $200$ minutes, $C_X(200) = 0.10(200) + 10 = 20 + 10 = 30$. $C_Y(200) = 30$. So, the plans cost the same at exactly $200$ minutes, not more."}, {"text": "More than 200 minutes", "isCorrect": true, "rationale": "Let $m$ be the number of minutes. Plan X's cost is $C_X(m) = 0.10m + 10$. Plan Y's cost is $C_Y(m) = 30$. We want to find when $C_X(m) > C_Y(m)$: $0.10m + 10 > 30$. Subtracting $10$ from both sides gives $0.10m > 20$. Dividing by $0.10$ yields $m > 200$. So, Plan X costs more for more than $200$ minutes."}, {"text": "More than 300 minutes", "isCorrect": false, "rationale": "Let $m$ be minutes. Plan X: $C_X(m) = 0.10m + 10$. Plan Y: $C_Y(m) = 30$. To find when $C_X(m) > C_Y(m)$: $0.10m + 10 > 30 \\Rightarrow 0.10m > 20 \\Rightarrow m > 200$. So, more than $300$ minutes would certainly mean Plan X costs more, but it's not the full range, and $200$ minutes is the threshold."}]}, {"question": "A baker's daily profit, $P(c)$, is modeled by the function $P(c) = 3.5c - 70$, where $P(c)$ is in dollars and $c$ is the number of cakes sold. Which variable is the dependent variable and which is the independent variable?", "options": [{"text": "$c$ is the independent variable, and $P(c)$ is the dependent variable.", "isCorrect": true, "rationale": "In a function $f(x)$, $x$ is the independent variable (input) and $f(x)$ is the dependent variable (output). Here, $c$ (number of cakes) is the input that determines the profit $P(c)$ (output)."}, {"text": "$P(c)$ is the independent variable, and $c$ is the dependent variable.", "isCorrect": false, "rationale": "This statement reverses the roles. The profit $P(c)$ depends on the number of cakes sold $c$, making $P(c)$ the dependent variable."}, {"text": "$P(c)$ and $c$ are both independent variables.", "isCorrect": false, "rationale": "These variables are related by the function, meaning one depends on the other; they are not both independent."}, {"text": "The numbers $3.5$ and $-70$ are the independent variables.", "isCorrect": false, "rationale": "The numbers $3.5$ (slope) and $-70$ (y-intercept) are constants or parameters of the function, not variables."}]}, {"question": "A factory produces widgets, and its weekly production cost, $C(w)$, in thousands of dollars, is given by $C(w) = 0.8w + 15$, where $w$ is the number of widgets produced in hundreds. What does the slope $0.8$ represent in this context?", "options": [{"text": "The initial fixed cost of production is $800.", "isCorrect": false, "rationale": "The initial fixed cost is represented by the $y$-intercept, which is $15$ thousand dollars ($15,000)."}, {"text": "For every 100 widgets produced, the cost increases by $800.", "isCorrect": true, "rationale": "The slope $0.8$ has units of 'thousands of dollars per hundred widgets'. This means for every 1 unit increase in $w$ (which represents 100 widgets), the cost increases by $0.8$ (which represents $0.8 \\times 1000 = $800)."}, {"text": "The cost of producing a single widget is $0.80.", "isCorrect": false, "rationale": "The slope is $0.8$ thousand dollars per hundred widgets. This means $800 for 100 widgets, so $800/100 = $8 per widget, not $0.80."}, {"text": "The total cost of production is $800.", "isCorrect": false, "rationale": "The total cost depends on $w$. The slope represents a rate of change, not a total cost."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
