<script>
var QUESTIONS = [{"question": "According to the conic definition, a parabola is defined as the set of all points that are equidistant from which two geometric elements?", "options": [{"text": "Two fixed points called foci.", "isCorrect": false, "rationale": "This describes an ellipse, not a parabola. A parabola has one focus and one directrix."}, {"text": "A fixed point (focus) and a fixed line (directrix).", "isCorrect": true, "rationale": "The text explicitly states: 'A parabola is the set of all points (x,y) in a plane that are equidistant from a fixed point called the focus and a fixed line called the directrix'."}, {"text": "Two fixed lines called directrices.", "isCorrect": false, "rationale": "This definition does not correspond to any standard conic section. A parabola has one directrix."}, {"text": "A fixed circle and a fixed point.", "isCorrect": false, "rationale": "This definition describes a different type of curve (e.g., a limaçon if the point is on the circle), not a parabola."}]}, {"question": "For a vertical parabola defined by the equation y = -1/2(x + 3)^2 + 5, what is its opening direction and the coordinates of its vertex?", "options": [{"text": "Opens upward; Vertex: (3, 5)", "isCorrect": false, "rationale": "The 'a' value is negative, so it opens downward, not upward. The vertex 'h' value is -3, not 3."}, {"text": "Opens downward; Vertex: (-3, 5)", "isCorrect": true, "rationale": "The equation is in the form y = a(x - h)^2 + k. Here, a = -1/2, which is less than 0, so the parabola opens downward. The vertex (h, k) is (-3, 5)."}, {"text": "Opens downward; Vertex: (3, -5)", "isCorrect": false, "rationale": "While it opens downward, the vertex 'h' value is -3 and 'k' value is 5."}, {"text": "Opens upward; Vertex: (-3, -5)", "isCorrect": false, "rationale": "The 'a' value is negative, so it opens downward. The vertex 'k' value is 5, not -5."}]}, {"question": "Consider the vertical parabola given by the equation y = 3(x - 2)^2 + 1. What are the coordinates of its focus and the equation of its directrix?", "options": [{"text": "Focus: (2, 13/12); Directrix: y = 11/12", "isCorrect": true, "rationale": "For a vertical parabola, (h, k) = (2, 1) and a = 3. The focus is (h, k + 1/(4a)) = (2, 1 + 1/(4*3)) = (2, 1 + 1/12) = (2, 13/12). The directrix is y = k - 1/(4a) = 1 - 1/12 = 11/12."}, {"text": "Focus: (2, 11/12); Directrix: y = 13/12", "isCorrect": false, "rationale": "The focus and directrix formulas are swapped, and the values are incorrect due to the swap."}, {"text": "Focus: (2, 1/3); Directrix: y = 2/3", "isCorrect": false, "rationale": "This calculation for 1/(4a) is incorrect; 1/(4*3) is 1/12, not 1/3."}, {"text": "Focus: (2, 1); Directrix: y = 0", "isCorrect": false, "rationale": "This would imply a = undefined, or the focus/directrix are at the vertex/x-axis, which is not true for a = 3."}]}, {"question": "Which statement accurately describes a horizontal parabola defined by x = a(y - k)^2 + h?", "options": [{"text": "It always opens upward or downward, depending on the sign of 'a'.", "isCorrect": false, "rationale": "Horizontal parabolas open left or right. Vertical parabolas open upward or downward."}, {"text": "It represents a function of x, passing the vertical line test.", "isCorrect": false, "rationale": "The text explicitly states: 'A horizontal parabola ... is not a function of x. Its graph does not pass the vertical line test.'"}, {"text": "Its axis of symmetry is vertical and passes through the vertex and focus.", "isCorrect": false, "rationale": "For a horizontal parabola, the axis of symmetry is horizontal, not vertical."}, {"text": "It opens to the right if 'a > 0' and to the left if 'a < 0'.", "isCorrect": true, "rationale": "As stated in the 'Horizontal Parabola—Vertex Form' property, if 'a > 0', it opens right; if 'a < 0', it opens left."}]}, {"question": "Find the focus and directrix for the horizontal parabola given by the equation x = 2(y - 1)^2 - 4.", "options": [{"text": "Focus: (-31/8, 1); Directrix: x = -33/8", "isCorrect": true, "rationale": "For a horizontal parabola, (h, k) = (-4, 1) and a = 2. The focus is (h + 1/(4a), k) = (-4 + 1/(4*2), 1) = (-4 + 1/8, 1) = (-32/8 + 1/8, 1) = (-31/8, 1). The directrix is x = h - 1/(4a) = -4 - 1/8 = -33/8."}, {"text": "Focus: (1, -31/8); Directrix: y = -33/8", "isCorrect": false, "rationale": "The coordinates for focus are inverted, and the directrix should be x = constant, not y = constant."}, {"text": "Focus: (-4, 1/8); Directrix: x = -4 - 1/8", "isCorrect": false, "rationale": "The focus calculation is incorrect, it should be h + 1/(4a), not just 1/(4a) as the x-coordinate."}, {"text": "Focus: (1/8, -4); Directrix: x = -1/8", "isCorrect": false, "rationale": "The h and k values are incorrectly applied and swapped."}]}, {"question": "Convert the general form equation y = x^2 + 6x - 7 into vertex form and identify the vertex.", "options": [{"text": "y = (x + 3)^2 - 16; Vertex: (-3, -16)", "isCorrect": true, "rationale": "To convert, complete the square for the x terms: y = (x^2 + 6x + 9) - 7 - 9 = (x + 3)^2 - 16. From this vertex form, h = -3 and k = -16, so the vertex is (-3, -16)."}, {"text": "y = (x - 3)^2 - 16; Vertex: (3, -16)", "isCorrect": false, "rationale": "The term (x - 3)^2 would result in x^2 - 6x, not x^2 + 6x."}, {"text": "y = (x + 3)^2 + 2; Vertex: (-3, 2)", "isCorrect": false, "rationale": "The constant term after completing the square is incorrect. (-7 - 9 = -16)."}, {"text": "y = (x - 6)^2 + 7; Vertex: (6, 7)", "isCorrect": false, "rationale": "This equation does not match the original after completing the square. The method for completing the square is incorrect here."}]}, {"question": "Convert the general form equation x = y^2 - 4y + 1 into vertex form and identify the equation of its directrix.", "options": [{"text": "x = (y - 2)^2 - 3; Directrix: x = -13/4", "isCorrect": true, "rationale": "Complete the square for y: x = (y^2 - 4y + 4) + 1 - 4 = (y - 2)^2 - 3. Here, a = 1, h = -3, k = 2. The directrix is x = h - 1/(4a) = -3 - 1/(4*1) = -3 - 1/4 = -13/4."}, {"text": "x = (y + 2)^2 - 3; Directrix: x = -11/4", "isCorrect": false, "rationale": "The term (y + 2)^2 would result in y^2 + 4y, not y^2 - 4y. The directrix is also incorrect."}, {"text": "x = (y - 2)^2 + 5; Directrix: x = 19/4", "isCorrect": false, "rationale": "The constant term is incorrect (1 - 4 = -3, not +5). This leads to an incorrect directrix."}, {"text": "x = (y - 2)^2 - 3; Directrix: y = -13/4", "isCorrect": false, "rationale": "While the vertex form is correct, the directrix for a horizontal parabola is x = constant, not y = constant."}]}, {"question": "A lighting engineer is designing a new flashlight. To produce a strong, focused beam of parallel light rays, where should the light source (bulb) be positioned relative to the parabolic reflector?", "options": [{"text": "At the vertex of the parabola.", "isCorrect": false, "rationale": "Placing the source at the vertex would scatter light in various directions, not produce a parallel beam."}, {"text": "At the directrix of the parabola.", "isCorrect": false, "rationale": "The directrix is a line; placing a light source there would not achieve a parallel beam based on the reflective property."}, {"text": "At the focus of the parabola.", "isCorrect": true, "rationale": "The 'Reflective Property of a Parabola' states that 'any ray emanating from the focus reflects parallel to the axis.' This is ideal for producing a focused, parallel beam."}, {"text": "Anywhere along the axis of symmetry, as long as it's inside the parabola.", "isCorrect": false, "rationale": "Only rays emanating specifically from the focus reflect parallel to the axis of symmetry, not just anywhere on the axis."}]}, {"question": "A satellite dish is designed with its vertex at the origin and opens upward. If the receiver (at the focus) is placed 0.5 ft above the vertex, what is the value of 'a' in the parabolic equation y = ax^2?", "options": [{"text": "a = 1/4", "isCorrect": false, "rationale": "If a=1/4, then 1/(4a) = 1/(4*1/4) = 1, meaning the focus would be 1 ft above the vertex."}, {"text": "a = 1/2", "isCorrect": true, "rationale": "For a vertical parabola with vertex at (0,0), the focus is at (0, 1/(4a)). Given the focus is at (0, 0.5), we set 1/(4a) = 0.5. This means 1/(4a) = 1/2, so 4a = 2, which simplifies to a = 1/2."}, {"text": "a = 1", "isCorrect": false, "rationale": "If a=1, then 1/(4a) = 1/4 = 0.25, meaning the focus would be 0.25 ft above the vertex."}, {"text": "a = 2", "isCorrect": false, "rationale": "If a=2, then 1/(4a) = 1/(4*2) = 1/8 = 0.125, meaning the focus would be 0.125 ft above the vertex."}]}, {"question": "The reflective property of parabolas is crucial for their use in satellite dishes. How does this property specifically benefit satellite dish design?", "options": [{"text": "It ensures that signals arriving at various angles are reflected uniformly across the dish.", "isCorrect": false, "rationale": "The property deals with parallel rays reflecting to a single point, not with various angles reflecting uniformly."}, {"text": "It disperses incoming parallel signals to create a wider reception area.", "isCorrect": false, "rationale": "This is the opposite of the desired effect for a satellite dish, which needs to concentrate signals."}, {"text": "It collects all incoming parallel signals and concentrates them at a single point, the focus, where the receiver is placed.", "isCorrect": true, "rationale": "The text states: 'Any ray parallel to the axis of symmetry reflects off the parabolic surface and passes through the focus.' For a satellite dish, incoming signals are essentially parallel rays, which are then concentrated at the focus for the receiver."}, {"text": "It allows the dish to be made from any material, as the shape itself dictates signal strength.", "isCorrect": false, "rationale": "The material properties (e.g., reflectivity) are still important. The reflective property is about the geometry, not material independence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
