    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Factor Theorem, if $P(x)$ is a polynomial and $P(c) = 0$, what can be definitively concluded?", "options": [{"text": "$(x + c)$ is a factor of $P(x)$.", "isCorrect": false, "rationale": "The Factor Theorem states that $(x - c)$ is a factor if $P(c) = 0$, not $(x + c)$. If $(x+c)$ were a factor, then $P(-c)=0$."}, {"text": "The graph of $y = P(x)$ has a local maximum at $x = c$.", "isCorrect": false, "rationale": "While a zero might coincide with a local maximum or minimum, the Factor Theorem specifically states the relationship between a zero and a factor, not the presence of extrema."}, {"text": "$(x - c)$ is a factor of $P(x)$.", "isCorrect": true, "rationale": "This is the direct statement of the Factor Theorem: $c$ is a zero of $P$ if and only if $(x - c)$ is a factor of $P$."}, {"text": "The end behavior of $P(x)$ is determined by $c$.", "isCorrect": false, "rationale": "The end behavior of a polynomial is determined by its leading term, not by its individual zeros or factors."}], "id": "q01"}, {"question": "A polynomial function $P(x)$ has a zero at $x=5$ with multiplicity 2. How does the graph of $P(x)$ behave at $x=5$?", "options": [{"text": "The graph crosses the x-axis at $x=5$ and flattens.", "isCorrect": false, "rationale": "A graph crosses the x-axis when the multiplicity is odd. A flattened crossing occurs when the odd multiplicity is $\\ge 3$."}, {"text": "The graph touches the x-axis at $x=5$ but does not cross it.", "isCorrect": true, "rationale": "If the multiplicity of a zero is even, the graph touches the x-axis at that point and 'bounces back' without crossing it."}, {"text": "The graph has a vertical asymptote at $x=5$.", "isCorrect": false, "rationale": "Polynomial functions are continuous and do not have vertical asymptotes. Vertical asymptotes are characteristic of rational functions where the denominator is zero."}, {"text": "The graph crosses the x-axis at $x=5$ without flattening.", "isCorrect": false, "rationale": "Crossing implies odd multiplicity. Since the multiplicity is 2 (even), the graph touches, it does not cross."}], "id": "q02"}, {"question": "Describe the end behavior of the polynomial function $h(x) = -3x^6 + 2x^5 - 7x + 10$.", "options": [{"text": "Rises to the right, falls to the left.", "isCorrect": false, "rationale": "This end behavior corresponds to an odd degree polynomial with a positive leading coefficient."}, {"text": "Falls to the right, rises to the left.", "isCorrect": false, "rationale": "This end behavior corresponds to an odd degree polynomial with a negative leading coefficient."}, {"text": "Both ends point up (rises to the right, rises to the left).", "isCorrect": false, "rationale": "This end behavior corresponds to an even degree polynomial with a positive leading coefficient."}, {"text": "Both ends point down (falls to the right, falls to the left).", "isCorrect": true, "rationale": "The leading term is $-3x^6$. The degree is 6 (even), and the leading coefficient is $-3$ (negative). For an even degree with a negative leading coefficient, both ends of the graph fall."}], "id": "q03"}, {"question": "Which of the following polynomials could represent a graph that falls to the left, rises to the right, crosses the x-axis at $x=-1$, and touches the x-axis at $x=3$?", "options": [{"text": "$P(x) = (x+1)^2(x-3)$", "isCorrect": false, "rationale": "This polynomial has an odd degree (3) and a positive leading coefficient, so it falls left and rises right (correct end behavior). However, it touches at $x=-1$ (due to even multiplicity) and crosses at $x=3$ (due to odd multiplicity), which is the opposite of the requirement."}, {"text": "$P(x) = -(x+1)(x-3)^2$", "isCorrect": false, "rationale": "This polynomial has an odd degree (3) and a negative leading coefficient, so it rises left and falls right, which is incorrect end behavior. It also crosses at $x=-1$ and touches at $x=3$, which aligns with the zero behavior, but the end behavior is wrong."}, {"text": "$P(x) = (x+1)(x-3)^2$", "isCorrect": true, "rationale": "This polynomial has a leading term of $x \\cdot x^2 = x^3$. The degree is 3 (odd) and the leading coefficient is 1 (positive), so it falls left and rises right (correct end behavior). It has a zero at $x=-1$ with multiplicity 1 (odd), so it crosses. It has a zero at $x=3$ with multiplicity 2 (even), so it touches. This matches all given conditions."}, {"text": "$P(x) = (x+1)^3(x-3)^2$", "isCorrect": false, "rationale": "This polynomial has a leading term of $x^3 \\cdot x^2 = x^5$. The degree is 5 (odd) and the leading coefficient is 1 (positive), so it falls left and rises right (correct end behavior). It crosses at $x=-1$ (multiplicity 3) and touches at $x=3$ (multiplicity 2). However, the degree is 5, and the question is looking for a simpler form that meets the criteria. The previous option meets the criteria more directly given the choices."}], "id": "q04"}, {"question": "When sketching a polynomial graph, why is it important to choose test values between consecutive zeros?", "options": [{"text": "To determine the exact location of local maximums and minimums.", "isCorrect": false, "rationale": "Test values help determine if the graph is above or below the x-axis, but they don't precisely locate local extrema. Calculus methods are typically needed for exact extrema."}, {"text": "To verify the end behavior determined in the first step.", "isCorrect": false, "rationale": "End behavior is determined by the leading term, not by test values between zeros. Test values are for intervals between zeros, not for the very ends of the graph."}, {"text": "To find the y-intercept of the function.", "isCorrect": false, "rationale": "The y-intercept is found by evaluating $P(0)$, which is a single point, not by testing intervals between zeros."}, {"text": "To determine whether the graph is above or below the x-axis on each interval.", "isCorrect": true, "rationale": "The sign of $P(x)$ for a test value within an interval between zeros indicates whether the graph is above (positive) or below (negative) the x-axis in that entire interval."}], "id": "q05"}, {"question": "If a zero of a polynomial has a multiplicity of 3, how does the graph behave at that x-intercept?", "options": [{"text": "It touches the x-axis but does not cross.", "isCorrect": false, "rationale": "Touching without crossing occurs when the multiplicity is even."}, {"text": "It crosses the x-axis, and the crossing appears 'flattened'.", "isCorrect": true, "rationale": "If the multiplicity is odd and greater than 1 (e.g., 3, 5, etc.), the graph crosses the x-axis, but the curve flattens out as it passes through the intercept."}, {"text": "It has a sharp turn (a cusp) at the x-axis.", "isCorrect": false, "rationale": "Polynomial graphs are smooth and continuous; they do not have sharp turns or cusps."}, {"text": "It approaches the x-axis asymptotically but never touches it.", "isCorrect": false, "rationale": "This describes asymptotic behavior, which is not characteristic of zeros of polynomial functions. Zeros are points where the graph actually intersects or touches the x-axis."}], "id": "q06"}, {"question": "Given the polynomial $P(x) = x^2(x-3)^3(x+1)$, what are its zeros and their corresponding multiplicities?", "options": [{"text": "$x=0$ (mult. 1), $x=3$ (mult. 1), $x=-1$ (mult. 1)", "isCorrect": false, "rationale": "This lists all zeros but incorrectly assigns multiplicity 1 to all of them, ignoring the exponents in the factored form."}, {"text": "$x=0$ (mult. 2), $x=3$ (mult. 3), $x=-1$ (mult. 1)", "isCorrect": true, "rationale": "From the factored form $x^2(x-3)^3(x+1)$: $x^2$ implies a zero at $x=0$ with multiplicity 2; $(x-3)^3$ implies a zero at $x=3$ with multiplicity 3; and $(x+1)$ implies a zero at $x=-1$ with multiplicity 1."}, {"text": "$x=2$ (mult. 0), $x=-3$ (mult. 3), $x=1$ (mult. 1)", "isCorrect": false, "rationale": "This incorrectly identifies the zeros as the exponents or negations of terms, and also misinterprets the factors."}, {"text": "$x=0$ (mult. 2), $x=-3$ (mult. 3), $x=1$ (mult. 1)", "isCorrect": false, "rationale": "This correctly identifies the multiplicities but makes errors in determining the actual values of the zeros (e.g., using -3 instead of 3, and 1 instead of -1)."}], "id": "q07"}, {"question": "Which of the following is NOT a step in sketching a polynomial graph as outlined in the provided text?", "options": [{"text": "Determining the end behavior from the leading term.", "isCorrect": false, "rationale": "This is the first step listed for sketching a polynomial graph."}, {"text": "Finding the exact coordinates of all local maximums and minimums.", "isCorrect": true, "rationale": "The text lists 'connecting smoothly' but does not include finding exact local extrema as a specific step for sketching a graph. While implied in a smooth curve, precise calculation is not part of the basic sketching steps provided."}, {"text": "Using multiplicity to decide whether the graph crosses or touches at each zero.", "isCorrect": false, "rationale": "This is an explicit step for sketching a polynomial graph."}, {"text": "Finding the y-intercept by evaluating P(0).", "isCorrect": false, "rationale": "This is an explicit step for sketching a polynomial graph."}], "id": "q08"}, {"question": "Consider a polynomial graph that rises to the left, falls to the right, and has a zero at $x=2$ where the graph crosses the x-axis, and a zero at $x=-4$ where the graph also crosses the x-axis. What could be the simplest form of its leading term and corresponding factors?", "options": [{"text": "Leading term: $-x^2$; Factors: $(x-2)(x+4)$", "isCorrect": false, "rationale": "A leading term of $-x^2$ (even degree, negative leading coefficient) would mean both ends fall. The given end behavior (rises left, falls right) implies an odd degree with a negative leading coefficient."}, {"text": "Leading term: $-x^3$; Factors: $(x-2)(x+4)$", "isCorrect": true, "rationale": "The end behavior (rises left, falls right) indicates an odd degree and a negative leading coefficient, such as $-x^3$. The zeros at $x=2$ and $x=-4$ where the graph crosses mean they must have odd multiplicities. The simplest factors are $(x-2)$ and $(x+4)$, each with multiplicity 1. If we combine these, the polynomial would be of degree 2, not matching the end behavior. Therefore, to achieve $-x^3$ as the leading term with these factors, one must assume a 'hidden' factor or a higher overall degree, or, more simply, that the polynomial is of the form $P(x) = -x(x-2)(x+4)$ if the lowest degree is sought, or could be $- (x-2)(x+4)x$ which has a leading term of $-x^3$. Thus, the combination of leading term $-x^3$ and factors $(x-2)(x+4)$ (implying the degree would be 3) correctly describes the required behavior."}, {"text": "Leading term: $x^3$; Factors: $(x-2)^2(x+4)$", "isCorrect": false, "rationale": "A leading term of $x^3$ (odd degree, positive leading coefficient) would mean falls left, rises right (opposite of the required end behavior). Also, $(x-2)^2$ would mean the graph touches at $x=2$, not crosses."}, {"text": "Leading term: $-x^4$; Factors: $(x-2)(x+4)^2$", "isCorrect": false, "rationale": "A leading term of $-x^4$ (even degree, negative leading coefficient) would mean both ends fall. The given end behavior (rises left, falls right) implies an odd degree with a negative leading coefficient. Also, $(x+4)^2$ would mean the graph touches at $x=-4$, not crosses."}], "id": "q09"}, {"question": "Given $f(x) = x^3 - 4x$, its zeros are $x=-2, 0, 2$. Its end behavior is falls left, rises right. What is the $y$-intercept of $f(x)$?", "options": [{"text": "$y = 4$", "isCorrect": false, "rationale": "This value does not result from setting $x=0$ in the function."}, {"text": "$y = -4$", "isCorrect": false, "rationale": "This value does not result from setting $x=0$ in the function."}, {"text": "$y = 0$", "isCorrect": true, "rationale": "The y-intercept is found by evaluating $f(0)$. For $f(x) = x^3 - 4x$, $f(0) = (0)^3 - 4(0) = 0$. So the y-intercept is $y=0$."}, {"text": "There is no y-intercept for this function.", "isCorrect": false, "rationale": "All polynomial functions have exactly one y-intercept, found by setting $x=0$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
