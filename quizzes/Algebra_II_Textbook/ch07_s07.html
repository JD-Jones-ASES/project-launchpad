<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In the continuous growth/decay model $A(t) = A_0 e^{kt}$, what does a negative value for the constant $k$ signify?", "options": [{"text": "The quantity is constant over time.", "isCorrect": false, "rationale": "A negative $k$ indicates a change in quantity, not a constant value. A constant quantity would imply $k=0$ or a different model."}, {"text": "The quantity is increasing at an accelerating rate.", "isCorrect": false, "rationale": "An increasing quantity corresponds to $k > 0$. An accelerating rate is characteristic of exponential growth, but only when $k$ is positive."}, {"text": "The quantity is decreasing over time (exponential decay).", "isCorrect": true, "rationale": "As stated in the 'Continuous Growth and Decay' section, when $k < 0$, the quantity decays exponentially, meaning it decreases over time."}, {"text": "The quantity is increasing at a constant rate.", "isCorrect": false, "rationale": "A constant rate of increase would be represented by a linear function, not an exponential function. Exponential growth (for $k>0$) means the rate of increase itself grows, not remains constant."}], "id": "q01"}, {"question": "A forest's tree population was estimated at 15,000 in 2015. If it grows continuously at a rate of 1.8% per year, what is the predicted population in 2025?", "options": [{"text": "16,200 trees", "isCorrect": false, "rationale": "This calculation would be for simple interest, not continuous compounding. Even for simple interest, it's incorrect as 15000*(1 + 0.018*10) = 17700."}, {"text": "17,700 trees", "isCorrect": false, "rationale": "This would be the population if the growth was linear or calculated using simple interest over 10 years ($15000 + 15000 \\times 0.018 \\times 10 = 17700$), not continuous exponential growth."}, {"text": "17,958 trees", "isCorrect": true, "rationale": "Using the continuous growth model $A(t) = A_0 e^{kt}$, with $A_0 = 15,000$, $k = 0.018$, and $t = 2025 - 2015 = 10$ years. $A(10) = 15,000 e^{(0.018)(10)} = 15,000 e^{0.18} \\approx 15,000 \\times 1.1972 \\approx 17,958$. "}, {"text": "18,540 trees", "isCorrect": false, "rationale": "This value is too high; it might result from an incorrect calculation or a higher growth rate than specified."}], "id": "q02"}, {"question": "A new antibiotic is introduced, and a bacterial colony's size is measured. Initially, there are 10,000 bacteria. After 5 hours, the count is 8,000. Assuming continuous decay, what is the continuous decay rate $k$?", "options": [{"text": "$k \\approx 0.0446$ per hour", "isCorrect": false, "rationale": "This value would indicate growth ($k>0$), but the population is decreasing, so $k$ must be negative."}, {"text": "$k \\approx -0.0446$ per hour", "isCorrect": true, "rationale": "Using $A(t) = A_0 e^{kt}$, we have $8000 = 10000 e^{k \\cdot 5}$. Dividing by 10000 gives $0.8 = e^{5k}$. Taking the natural logarithm of both sides: $\\ln(0.8) = 5k$. Thus, $k = \\ln(0.8)/5 \\approx -0.2231/5 \\approx -0.0446$ per hour."}, {"text": "$k \\approx -0.0500$ per hour", "isCorrect": false, "rationale": "This is an incorrect calculation of $k$. A common error might be to use $0.2/5$ for percentage decay, which is not the continuous rate."}, {"text": "$k \\approx -0.2231$ per hour", "isCorrect": false, "rationale": "This value is $\\ln(0.8)$, but it has not been divided by the time $t=5$ hours, which is necessary to find $k$."}], "id": "q03"}, {"question": "A certain radioactive isotope has a continuous decay rate of $-0.015$ per year. If a sample initially contains 500 grams, how much will remain after 20 years?", "options": [{"text": "485 grams", "isCorrect": false, "rationale": "This would be the result of a linear decay calculation ($500 - 0.015 \\times 500 \\times 20 = 350$, which is still not 485), not continuous exponential decay."}, {"text": "370.4 grams", "isCorrect": true, "rationale": "Using the formula $A(t) = A_0 e^{kt}$, with $A_0 = 500$, $k = -0.015$, and $t = 20$. So, $A(20) = 500 e^{(-0.015)(20)} = 500 e^{-0.3} \\approx 500 \\times 0.7408 \\approx 370.4$ grams."}, {"text": "425 grams", "isCorrect": false, "rationale": "This result is incorrect. It might arise from using a discrete decay model or an arithmetic error in calculation."}, {"text": "250 grams", "isCorrect": false, "rationale": "This would be the result if the time period of 20 years happened to be exactly one half-life, which is not the case here."}], "id": "q04"}, {"question": "An investment grows continuously at an annual rate of 4%. How many years will it take for the investment to reach 150% of its initial value?", "options": [{"text": "Approximately 12.5 years", "isCorrect": false, "rationale": "This would be an incorrect calculation, possibly from using $0.5/0.04$ which is not how exponential equations are solved."}, {"text": "Approximately 10.14 years", "isCorrect": true, "rationale": "Let $A_0$ be the initial value. We want $A(t) = 1.5 A_0$. So, $1.5 A_0 = A_0 e^{0.04t}$. This simplifies to $1.5 = e^{0.04t}$. Taking the natural logarithm of both sides: $\\ln(1.5) = 0.04t$. Thus, $t = \\ln(1.5)/0.04 \\approx 0.4054/0.04 \\approx 10.14$ years."}, {"text": "Approximately 17.33 years", "isCorrect": false, "rationale": "This value is related to the doubling time ($\\ln(2)/0.04 \\approx 17.33$ years), not to reaching 150% of the initial value."}, {"text": "Approximately 15 years", "isCorrect": false, "rationale": "This is an incorrect calculation. It might be a guess or a result of a misapplied formula."}], "id": "q05"}, {"question": "If a radioactive substance has a half-life of 10 years, which of the following expressions correctly represents its continuous decay rate $k$?", "options": [{"text": "$k = \\ln(2) / 10$", "isCorrect": false, "rationale": "This expression would give a positive $k$ (growth rate), but half-life implies decay, so $k$ must be negative."}, {"text": "$k = -10 / \\ln(2)$", "isCorrect": false, "rationale": "This calculation incorrectly places time in the numerator and also does not provide the correct magnitude or sign for $k$."}, {"text": "$k = -\\ln(2) / 10$", "isCorrect": true, "rationale": "For half-life, $A(t) = A_0/2$. So, $A_0/2 = A_0 e^{kt}$, which simplifies to $1/2 = e^{kt}$. Taking the natural logarithm: $\\ln(1/2) = kt$. Since $\\ln(1/2) = -\\ln(2)$, we have $-\\ln(2) = kt$. Given a half-life of $T=10$ years, $k = -\\ln(2)/10$ (approximately $-0.6931/10 = -0.06931$ per year)."}, {"text": "$k = 10 \\ln(0.5)$", "isCorrect": false, "rationale": "This expression multiplies the time by the logarithm, rather than dividing the logarithm by the time, making it incorrect."}], "id": "q06"}, {"question": "A population of insects doubles every 4 days. What is its continuous growth rate ($k$)?", "options": [{"text": "$k \\approx 0.2500$ per day", "isCorrect": false, "rationale": "This is an approximation for $1/4$, which does not account for the exponential nature of continuous growth."}, {"text": "$k \\approx 0.6931$ per day", "isCorrect": false, "rationale": "This value is $\\ln(2)$, which is the numerator, but it has not been divided by the doubling time (4 days)."}, {"text": "$k \\approx 0.1733$ per day", "isCorrect": true, "rationale": "For doubling time, $A(t) = 2A_0$. So, $2A_0 = A_0 e^{kt}$, which simplifies to $2 = e^{kt}$. Taking the natural logarithm: $\\ln(2) = kt$. Given a doubling time of $T=4$ days, $k = \\ln(2)/4 \\approx 0.6931/4 \\approx 0.1733$ per day."}, {"text": "$k \\approx 1.3863$ per day", "isCorrect": false, "rationale": "This would be approximately $2 \\times \\ln(2)$, which is incorrect for this problem."}], "id": "q07"}, {"question": "A chemical solution is found to have a hydrogen ion concentration ($[H^+]$) of $2.5 \\times 10^{-6}$ mol/L. What is its pH, and how would it be classified?", "options": [{"text": "pH $\\approx 6.0$, basic", "isCorrect": false, "rationale": "While the order of magnitude of pH is correct, the precise calculation is off, and a pH below 7 is acidic, not basic."}, {"text": "pH $\\approx 5.60$, acidic", "isCorrect": true, "rationale": "Using the pH formula $pH = -\\log[H^+]$, we have $pH = -\\log(2.5 \\times 10^{-6})$. This can be calculated as $-(\\log(2.5) + \\log(10^{-6})) = -(\\log(2.5) - 6) = 6 - \\log(2.5) \\approx 6 - 0.3979 \\approx 5.60$. Since pH is less than 7, the solution is acidic."}, {"text": "pH $\\approx 5.60$, basic", "isCorrect": false, "rationale": "The pH calculation is correct, but a pH of 5.60 is acidic, not basic. Basic solutions have a pH greater than 7."}, {"text": "pH $\\approx 6.40$, acidic", "isCorrect": false, "rationale": "This pH value is incorrect for the given hydrogen ion concentration."}], "id": "q08"}, {"question": "An earthquake measures 6.5 on the Richter scale, and another measures 4.5. How many times more intense is the stronger earthquake compared to the weaker one?", "options": [{"text": "2 times", "isCorrect": false, "rationale": "The Richter scale is logarithmic; a difference of 2 in magnitude does not mean 2 times the intensity. It indicates a factor of $10^2$."}, {"text": "20 times", "isCorrect": false, "rationale": "A difference of 2 in magnitude corresponds to a factor of $10^2$, not $10 \\times 2 = 20$."}, {"text": "100 times", "isCorrect": true, "rationale": "The Richter scale is logarithmic with base 10. If $M_1 = \\log(I_1/I_0)$ and $M_2 = \\log(I_2/I_0)$, then $M_1 - M_2 = \\log(I_1/I_0) - \\log(I_2/I_0) = \\log((I_1/I_0) / (I_2/I_0)) = \\log(I_1/I_2)$. Here, $6.5 - 4.5 = 2$. So, $\\log(I_1/I_2) = 2$, which means $I_1/I_2 = 10^2 = 100$. The stronger earthquake is 100 times more intense."}, {"text": "200 times", "isCorrect": false, "rationale": "This would mean a difference of $\\log_{10}(200) \\approx 2.3$ in magnitude, not 2."}], "id": "q09"}, {"question": "Which statement best describes the primary roles of logarithms in the applications discussed in this section?", "options": [{"text": "They linearize exponential growth curves, making them easier to graph on standard Cartesian coordinates.", "isCorrect": false, "rationale": "While logarithms can be used to linearize exponential data for graphing (e.g., semi-log plots), this is not explicitly discussed as a primary role for solving problems or representing scales within this section. The section emphasizes solving exponential equations and compressing vast ranges."}, {"text": "They provide a way to convert multiplicative relationships into additive ones, allowing for easier calculation and compression of large ranges of magnitude.", "isCorrect": true, "rationale": "The section explicitly states that 'Logarithm rules convert between multiplication and addition,' and that 'Logarithmic scales (pH, Richter, decibels) compress vast ranges into manageable numbers.' These are the fundamental roles highlighted."}, {"text": "They allow for the direct calculation of future values in continuous growth or decay models without needing exponential functions.", "isCorrect": false, "rationale": "Logarithms are used to *solve for* variables within exponential functions (like $k$ or $t$), but the exponential function $A(t) = A_0 e^{kt}$ itself is used for direct calculation of future values $A(t)$ when $k$ and $t$ are known."}, {"text": "They are exclusively used to represent extremely small numbers, such as hydrogen ion concentrations in acidic solutions.", "isCorrect": false, "rationale": "While used for small numbers like $[H^+]$, logarithms are also used for large numbers (like earthquake intensities) and for solving for time or rate in both growth and decay models, not just for representing small numbers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
