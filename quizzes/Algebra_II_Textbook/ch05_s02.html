<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

<script>
var QUESTIONS = [{"question": "Expand $4x(2x^2 - 3x + 5)$.", "options": [{"text": "8x^2 - 12x + 20", "isCorrect": false, "rationale": "This option incorrectly applies the exponent rule for x, treating x*x^2 as x^2 instead of x^3, and x*x as x instead of x^2. The correct operation involves adding exponents for variables."}, {"text": "8x^3 - 12x^2 + 20x", "isCorrect": true, "rationale": "According to the distributive property for polynomials, the monomial $4x$ must be multiplied by every term inside the polynomial: $4x(2x^2) = 8x^3$, $4x(-3x) = -12x^2$, and $4x(5) = 20x$. Combining these gives the correct expansion."}, {"text": "8x^3 - 3x + 5", "isCorrect": false, "rationale": "This option only multiplies the monomial by the first term of the polynomial and leaves the remaining terms unchanged, which is an incorrect application of the distributive property."}, {"text": "4x^3 - 12x^2 + 20x", "isCorrect": false, "rationale": "This option incorrectly calculates the product of the first terms as $4x^3$ instead of $8x^3$, indicating an error in multiplying the coefficients ($4 \\times 2 = 8$). The remaining terms are correctly multiplied."}]}, {"question": "Multiply $(2x - 3)(x + 4)$.", "options": [{"text": "2x^2 - 12", "isCorrect": false, "rationale": "This option only multiplies the first terms ($2x \\cdot x = 2x^2$) and the last terms ($-3 \\cdot 4 = -12$), neglecting the inner and outer products, which is a common mistake in binomial multiplication."}, {"text": "2x^2 + 5x - 12", "isCorrect": true, "rationale": "Using the distributive property (or FOIL), each term of the first binomial must multiply each term of the second: $(2x)(x) = 2x^2$, $(2x)(4) = 8x$, $(-3)(x) = -3x$, and $(-3)(4) = -12$. Combining like terms ($8x - 3x = 5x$) yields $2x^2 + 5x - 12$."}, {"text": "2x^2 - 11x - 12", "isCorrect": false, "rationale": "This option incorrectly combines the middle terms. The products are $2x^2$, $8x$, $-3x$, and $-12$. The sum of the middle terms should be $8x - 3x = 5x$, not $-11x$."}, {"text": "2x^2 + 11x - 12", "isCorrect": false, "rationale": "This option incorrectly combines the middle terms. The products are $2x^2$, $8x$, $-3x$, and $-12$. The sum of the middle terms should be $8x - 3x = 5x$, not $11x$."}]}, {"question": "Expand $(3x + 2)^2$.", "options": [{"text": "9x^2 + 4", "isCorrect": false, "rationale": "This is a common error of distributing the exponent to each term individually, $(a+b)^2 \\ne a^2+b^2$. It omits the crucial middle term $2ab$ from the perfect square trinomial formula."}, {"text": "9x^2 + 6x + 4", "isCorrect": false, "rationale": "This option incorrectly calculates the middle term. The middle term should be $2ab = 2(3x)(2) = 12x$, not $6x$."}, {"text": "9x^2 + 12x + 4", "isCorrect": true, "rationale": "Using the special product formula $(a+b)^2 = a^2 + 2ab + b^2$, with $a=3x$ and $b=2$: $(3x)^2 + 2(3x)(2) + (2)^2 = 9x^2 + 12x + 4$."}, {"text": "6x^2 + 12x + 4", "isCorrect": false, "rationale": "This option incorrectly calculates the first term, $(3x)^2$, as $6x^2$ instead of $9x^2$. The coefficient for $x^2$ should be $3^2=9$."}]}, {"question": "Which expression is equivalent to $(5x - 1)^2$?", "options": [{"text": "25x^2 - 1", "isCorrect": false, "rationale": "This incorrectly applies the difference of squares pattern or distributes the exponent, omitting the middle term $2ab$. The result should be a perfect square trinomial."}, {"text": "25x^2 + 1", "isCorrect": false, "rationale": "This incorrectly omits the middle term and applies the wrong sign for the constant term, as if distributing the square to each term, $(a-b)^2 \\ne a^2+b^2$."}, {"text": "25x^2 - 10x + 1", "isCorrect": true, "rationale": "Using the special product formula $(a-b)^2 = a^2 - 2ab + b^2$, with $a=5x$ and $b=1$: $(5x)^2 - 2(5x)(1) + (1)^2 = 25x^2 - 10x + 1$."}, {"text": "25x^2 - 5x + 1", "isCorrect": false, "rationale": "This option incorrectly calculates the middle term. It should be $2ab = 2(5x)(1) = 10x$, not $5x$."}]}, {"question": "Simplify $(7x + 2)(7x - 2)$.", "options": [{"text": "49x^2 + 4", "isCorrect": false, "rationale": "This option incorrectly applies the difference of squares formula by using a positive sign for the constant term. The formula is $a^2 - b^2$, not $a^2 + b^2$."}, {"text": "49x^2 - 4", "isCorrect": true, "rationale": "This is an application of the difference of squares special product formula $(a+b)(a-b) = a^2 - b^2$. Here, $a=7x$ and $b=2$, so the product is $(7x)^2 - (2)^2 = 49x^2 - 4$."}, {"text": "14x^2 - 4", "isCorrect": false, "rationale": "This option incorrectly calculates the first term, $(7x)^2$, as $14x^2$ instead of $49x^2$. The coefficient should be $7^2=49$."}, {"text": "49x^2 - 28x - 4", "isCorrect": false, "rationale": "This option performs a full binomial multiplication, but it's not the simplified form for a difference of squares. The middle terms $2(7x) - 2(7x)$ would cancel out, indicating this is incorrect."}]}, {"question": "According to the text, what is a common error when expanding $(a+b)^2$?", "options": [{"text": "Forgetting to distribute the 'a' term to all terms of the second polynomial.", "isCorrect": false, "rationale": "While forgetting to distribute is a common error in general polynomial multiplication, the text specifically highlights a different error for $(a+b)^2$."}, {"text": "Incorrectly combining like terms after multiplication.", "isCorrect": false, "rationale": "This is a general arithmetic error that can occur in any polynomial multiplication, but the text points out a very specific common error related to the form $(a+b)^2$."}, {"text": "Omitting the middle term $2ab$, leading to $a^2 + b^2$.", "isCorrect": true, "rationale": "The 'caution' box explicitly states that a common error is to 'distribute the square' and omit the middle term $2ab$, leading to the incorrect result $a^2 + b^2$ instead of $a^2 + 2ab + b^2$."}, {"text": "Applying the difference of squares formula instead of the perfect square trinomial formula.", "isCorrect": false, "rationale": "This implies using the wrong formula entirely. The common error mentioned is specifically about an omission *within* the perfect square formula, not mistaking it for another formula."}]}, {"question": "To expand $(y - 1)^3$, what is the recommended approach according to the text?", "options": [{"text": "Apply a special formula for cubing binomials that is not provided.", "isCorrect": false, "rationale": "The text explicitly states: 'Rather than memorizing new formulas, we simply multiply out each step' for higher powers of binomials, making this option incorrect."}, {"text": "Multiply $(y - 1)$ by itself three times using repeated application of the distributive property.", "isCorrect": true, "rationale": "The example 'Cubing a Binomial by Distribution' demonstrates this exact method: $(x+2)^3 = (x+2)(x+2)(x+2)$, multiplying the first two factors, then multiplying the result by the third factor, using the distributive property repeatedly."}, {"text": "Distribute the exponent 3 to each term, resulting in $y^3 - 1^3$.", "isCorrect": false, "rationale": "This is a common algebraic error, similar to incorrectly expanding $(a+b)^2$ as $a^2+b^2$. Exponents cannot be distributed over addition or subtraction in this manner."}, {"text": "Use Pascal's triangle coefficients directly without any multiplication steps.", "isCorrect": false, "rationale": "The text notes that coefficients match Pascal's triangle but states 'for now, repeated distribution always works,' implying the multiplication steps are necessary, especially for deriving the terms, not just writing coefficients."}]}, {"question": "Multiply $(2x^2 + x - 1)(x - 3)$.", "options": [{"text": "2x^3 - 5x^2 - 4x + 3", "isCorrect": true, "rationale": "Distribute each term of the first polynomial across the second: $2x^2(x-3) = 2x^3 - 6x^2$; $x(x-3) = x^2 - 3x$; $-1(x-3) = -x + 3$. Summing these: $(2x^3 - 6x^2) + (x^2 - 3x) + (-x + 3) = 2x^3 + (-6x^2 + x^2) + (-3x - x) + 3 = 2x^3 - 5x^2 - 4x + 3$."}, {"text": "2x^3 + 7x^2 - 2x + 3", "isCorrect": false, "rationale": "This option contains errors in combining like terms, particularly for the $x^2$ and $x$ terms. For instance, $(-6x^2 + x^2)$ should be $-5x^2$, not $7x^2$."}, {"text": "2x^3 - 5x^2 + 2x + 3", "isCorrect": false, "rationale": "This option has an incorrect coefficient for the $x$ term. The sum of $-3x$ and $-x$ should be $-4x$, not $2x$."}, {"text": "2x^3 + x^2 - x - 3", "isCorrect": false, "rationale": "This option appears to have only multiplied the first terms of the binomial by the trinomial, or made significant calculation errors, not fully applying the distributive property to all terms."}]}, {"question": "When multiplying a polynomial with 3 terms by a polynomial with 4 terms, how many partial products are initially generated before combining like terms?", "options": [{"text": "3", "isCorrect": false, "rationale": "This would only occur if a monomial were multiplied by a 3-term polynomial, or if only the first term of the 3-term polynomial was distributed."}, {"text": "4", "isCorrect": false, "rationale": "This would only occur if a monomial were multiplied by a 4-term polynomial, or if only the first term of the 4-term polynomial was distributed."}, {"text": "7", "isCorrect": false, "rationale": "This is the sum of the number of terms ($3+4=7$), not the product of the number of terms, which determines the initial partial products."}, {"text": "12", "isCorrect": true, "rationale": "According to the 'General Polynomial Multiplication' property, for an $m$-term polynomial times an $n$-term polynomial, this produces $mn$ partial products. In this case, $3 \\times 4 = 12$."}]}, {"question": "The text states that 'Mastering the special-product patterns introduced here will speed up work... and in factoring.' How does understanding these patterns primarily speed up the process of multiplying polynomials?", "options": [{"text": "They simplify the process by allowing distribution of only the first term.", "isCorrect": false, "rationale": "Special product patterns do not eliminate the need for full distribution; rather, they provide a shortcut for specific common binomial multiplications, assuming full distribution is still conceptually applied."}, {"text": "They eliminate the need for combining like terms after the initial multiplication steps.", "isCorrect": false, "rationale": "Even with special products, combining like terms (if any remain, like in perfect square trinomials) is still part of the final simplification. The patterns just provide the expanded form directly."}, {"text": "They provide direct formulas for common binomial products, reducing the number of individual multiplication and addition steps.", "isCorrect": true, "rationale": "Special product formulas (e.g., $(a+b)^2 = a^2+2ab+b^2$) offer a memorized shortcut for specific, frequently encountered binomial multiplications. This bypasses the step-by-step application of the distributive property and subsequent collection of terms, thereby speeding up the process."}, {"text": "They are primarily used for verifying answers, not for speeding up the initial calculation.", "isCorrect": false, "rationale": "While they can be used for verification, the text explicitly states their purpose is to 'speed up work' in multiplication and factoring, making them tools for efficient calculation rather than just checks."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
