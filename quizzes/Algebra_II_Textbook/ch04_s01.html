<script>
var QUESTIONS = [{"question": "What does the absolute value of a real number geometrically represent?", "options": [{"text": "Its square root on the number line.", "isCorrect": false, "rationale": "The square root of a number is a different mathematical concept, not the geometric representation of absolute value."}, {"text": "Its position relative to the origin on the number line.", "isCorrect": false, "rationale": "While related to position, 'distance from zero' is a more precise and correct geometric interpretation of absolute value than 'position relative to the origin'."}, {"text": "Its distance from zero on the number line.", "isCorrect": true, "rationale": "The text explicitly states: 'Geometrically, x is the distance from x to 0 on the number line.'"}, {"text": "Its value without considering its sign.", "isCorrect": false, "rationale": "This describes the algebraic outcome of absolute value, but not its geometric meaning as a 'distance'."}], "id": "q01"}, {"question": "What are the domain and range of the basic absolute value function $f(x) = |x|$?", "options": [{"text": "Domain: $[0, \\infty)$, Range: $(-\\infty, \\infty)$", "isCorrect": false, "rationale": "The domain of $f(x)=|x|$ includes all real numbers, and the range is restricted to non-negative values."}, {"text": "Domain: $(-\\infty, \\infty)$, Range: $(-\\infty, \\infty)$", "isCorrect": false, "rationale": "The range of $f(x)=|x|$ is not all real numbers; outputs are always non-negative."}, {"text": "Domain: $(-\\infty, \\infty)$, Range: $[0, \\infty)$", "isCorrect": true, "rationale": "The text states: 'The absolute value function $f(x) = |x|$ has domain $(-\\infty, \\infty)$ and range $[0, \\infty)$'."}, {"text": "Domain: $[0, \\infty)$, Range: $[0, \\infty)$", "isCorrect": false, "rationale": "The domain of $f(x)=|x|$ is all real numbers, not just non-negative numbers."}], "id": "q02"}, {"question": "Why is the absolute value function $f(x) = |x|$ considered an even function?", "options": [{"text": "Because its graph always opens upward.", "isCorrect": false, "rationale": "The direction of opening (upward/downward) is determined by the coefficient 'a' and is not the definition of an even function."}, {"text": "Because its vertex is at the origin $(0,0)$.", "isCorrect": false, "rationale": "While the basic absolute value function has its vertex at the origin, this is a specific property, not the definition of an even function."}, {"text": "Because $f(-x) = f(x)$ for all $x$, indicating symmetry about the y-axis.", "isCorrect": true, "rationale": "The text explicitly states: 'The symmetry about the $y$-axis makes $f(x) = |x|$ an even function: $f(-x) = |-x| = |x| = f(x)$ for all $x$.'"}, {"text": "Because its outputs are always non-negative.", "isCorrect": false, "rationale": "This describes the range of the function, not the condition for being an even function."}], "id": "q03"}, {"question": "For the function $f(x) = -3|x + 2| + 5$, what are its vertex and direction of opening?", "options": [{"text": "Vertex: $(2, 5)$, Opens upward", "isCorrect": false, "rationale": "The $h$ value is $-2$ (from $x - (-2)$), and the $a$ value is $-3$, meaning it opens downward."}, {"text": "Vertex: $(-2, 5)$, Opens upward", "isCorrect": false, "rationale": "The $h$ value is $-2$ and $k$ is $5$, but the $a$ value is $-3$, meaning it opens downward, not upward."}, {"text": "Vertex: $(2, -5)$, Opens downward", "isCorrect": false, "rationale": "The $h$ value is $-2$ and $k$ value is $5$. The vertex is $(-2, 5)$."}, {"text": "Vertex: $(-2, 5)$, Opens downward", "isCorrect": true, "rationale": "In the form $y = a|x - h| + k$, the vertex is $(h, k)$. Here, $h = -2$ (because $x+2 = x-(-2)$) and $k = 5$. Since $a = -3 < 0$, the graph opens downward."}], "id": "q04"}, {"question": "Compared to the graph of $y = |x|$, how is the graph of $g(x) = 0.5|x - 4| - 3$ transformed?", "options": [{"text": "Shifted left 4 units, down 3 units, and made steeper.", "isCorrect": false, "rationale": "The 'h' value of 4 means a shift right, not left. The 'a' value of 0.5 makes the graph wider, not steeper."}, {"text": "Shifted right 4 units, down 3 units, and made wider.", "isCorrect": true, "rationale": "The $h=4$ shifts the graph right 4 units. The $k=-3$ shifts it down 3 units. The $a=0.5$ (where $0 < a < 1$) makes the graph wider."}, {"text": "Shifted right 4 units, up 3 units, and reflected over the x-axis.", "isCorrect": false, "rationale": "The 'k' value of -3 means a shift down, not up. The 'a' value of 0.5 (positive) means it opens upward, not reflected over the x-axis."}, {"text": "Shifted left 4 units, up 3 units, and made wider.", "isCorrect": false, "rationale": "The 'h' value of 4 means a shift right, not left. The 'k' value of -3 means a shift down, not up."}], "id": "q05"}, {"question": "What is the range of the function $h(x) = -|x| + 7$?", "options": [{"text": "$[7, \\infty)$", "isCorrect": false, "rationale": "This range would apply if the graph opened upward ($a > 0$). Here, $a = -1$, so it opens downward."}, {"text": "$(- \\infty, 7]$", "isCorrect": true, "rationale": "For $h(x) = a|x - h| + k$, if $a < 0$, the graph opens downward and its maximum value is $k$. Here, $a = -1$ (opens downward) and $k = 7$, so the range is $(-\\infty, 7]$."}, {"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "Absolute value functions always have a restricted range; they do not cover all real numbers."}, {"text": "$[0, \\infty)$", "isCorrect": false, "rationale": "This is the range for the basic $y=|x|$ function. The vertical shift and reflection change the range."}], "id": "q06"}, {"question": "An absolute value function has a vertex at $(2, -5)$, opens upward, and is steeper than $y = |x|$. Which of the following could be its equation?", "options": [{"text": "$y = -2|x - 2| - 5$", "isCorrect": false, "rationale": "The coefficient $a = -2$ would mean the function opens downward, not upward."}, {"text": "$y = 0.5|x + 2| - 5$", "isCorrect": false, "rationale": "The vertex would be $(-2, -5)$, not $(2, -5)$. Also, $a = 0.5$ would make the function wider, not steeper."}, {"text": "$y = 3|x - 2| - 5$", "isCorrect": true, "rationale": "The vertex is $(h, k) = (2, -5)$, which matches. The coefficient $a = 3$ is positive (opens upward) and $a > 1$ (steeper than $y = |x|$), matching all conditions."}, {"text": "$y = |x - 2| + 5$", "isCorrect": false, "rationale": "The vertex would be $(2, 5)$, not $(2, -5)$. Also, $a=1$ would have the same steepness as $y=|x|$, not steeper."}], "id": "q07"}, {"question": "Rewrite the function $f(x) = |4x + 12|$ as a piecewise function.", "options": [{"text": "$f(x) = \\begin{cases} 4x + 12 & \\text{if } x \\ge 3 \\\\ -4x - 12 & \\text{if } x < 3 \\end{cases}$", "isCorrect": false, "rationale": "The expression $4x+12$ equals zero when $x=-3$, not $x=3$. The branches are also incorrect for the given conditions."}, {"text": "$f(x) = \\begin{cases} 4x + 12 & \\text{if } x \\ge -3 \\\\ -4x - 12 & \\text{if } x < -3 \\end{cases}$", "isCorrect": true, "rationale": "To find the split point, set $4x + 12 = 0$, which gives $x = -3$. When $x \\ge -3$, $4x+12$ is non-negative, so $|4x+12|=4x+12$. When $x < -3$, $4x+12$ is negative, so $|4x+12|=-(4x+12) = -4x-12$."}, {"text": "$f(x) = \\begin{cases} -4x + 12 & \\text{if } x \\ge -3 \\\\ 4x - 12 & \\text{if } x < -3 \\end{cases}$", "isCorrect": false, "rationale": "This piecewise definition has incorrect signs for both branches of the function."}, {"text": "$f(x) = \\begin{cases} 4x - 12 & \\text{if } x \\ge 3 \\\\ -4x + 12 & \\text{if } x < 3 \\end{cases}$", "isCorrect": false, "rationale": "The split point $x=3$ is incorrect. Also, the signs in the piecewise definition are incorrect for the branches."}], "id": "q08"}, {"question": "Using the piecewise definition, evaluate $f(-2)$ for the function $f(x) = |x + 5|$.", "options": [{"text": "$-3$", "isCorrect": false, "rationale": "The absolute value of a number cannot be negative."}, {"text": "$3$", "isCorrect": true, "rationale": "First, find the split point: $x+5=0 \\implies x=-5$. The piecewise definition is $f(x) = x+5$ if $x \\ge -5$, and $f(x) = -(x+5)$ if $x < -5$. Since $-2 \\ge -5$, we use the first branch: $f(-2) = (-2) + 5 = 3$."}, {"text": "$7$", "isCorrect": false, "rationale": "This would be the result if the function were $|x-5|$ and $x=-2$, or if it were an incorrect application of the definition."}, {"text": "$-7$", "isCorrect": false, "rationale": "The absolute value of a number cannot be negative."}], "id": "q09"}, {"question": "Solve the absolute value equation $|3x - 6| = 9$.", "options": [{"text": "$x = 1$ or $x = 5$", "isCorrect": false, "rationale": "One of the solutions ($x=1$) is incorrect. Let $3x-6 = 9 \\implies 3x=15 \\implies x=5$. Let $3x-6 = -9 \\implies 3x=-3 \\implies x=-1$."}, {"text": "$x = -1$ or $x = 5$", "isCorrect": true, "rationale": "To solve $|3x - 6| = 9$, we set up two equations: $3x - 6 = 9$ and $3x - 6 = -9$. Solving the first: $3x = 15 \\implies x = 5$. Solving the second: $3x = -3 \\implies x = -1$. The solutions are $x = -1$ or $x = 5$."}, {"text": "$x = 5$ only", "isCorrect": false, "rationale": "Absolute value equations typically have two solutions unless the isolated absolute value equals zero or a negative number. This option misses one solution."}, {"text": "$x = -1$ only", "isCorrect": false, "rationale": "Absolute value equations typically have two solutions unless the isolated absolute value equals zero or a negative number. This option misses one solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
