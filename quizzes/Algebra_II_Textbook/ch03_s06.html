<body>
<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">

<script>
var QUESTIONS = [{"question": "Which statement correctly describes the graph of a quadratic function in standard form f(x) = ax^2 + bx + c?", "options": [{"text": "The parabola always opens upward, regardless of 'a'.", "isCorrect": false, "rationale": "The direction a parabola opens is dependent on the sign of 'a', not always upward."}, {"text": "If a < 0, the parabola opens downward.", "isCorrect": true, "rationale": "According to the text, if the coefficient 'a' in the standard form f(x) = ax^2 + bx + c is less than zero (a<0), the parabola opens downward."}, {"text": "The axis of symmetry is x = c.", "isCorrect": false, "rationale": "The axis of symmetry for standard form is x = -b/(2a), not x = c. 'c' represents the y-intercept."}, {"text": "The vertex is always at (0, c).", "isCorrect": false, "rationale": "The point (0, c) is the y-intercept, which is only the vertex if b=0."}]}, {"question": "Convert the function f(x) = x^2 + 4x - 1 to vertex form and identify its vertex.", "options": [{"text": "f(x) = (x+2)^2 + 3, vertex (-2, 3)", "isCorrect": false, "rationale": "While the x-coordinate of the vertex is correct, the constant term after completing the square is incorrect, leading to an incorrect y-coordinate."}, {"text": "f(x) = (x+2)^2 - 5, vertex (-2, -5)", "isCorrect": true, "rationale": "To convert, complete the square: f(x) = (x^2 + 4x + 4) - 4 - 1 = (x+2)^2 - 5. In vertex form f(x) = a(x-h)^2+k, the vertex is (h,k). Here, h=-2 and k=-5."}, {"text": "f(x) = (x-2)^2 - 5, vertex (2, -5)", "isCorrect": false, "rationale": "The sign of 'h' is incorrect. Half of +4 is +2, so it should be (x+2)^2, not (x-2)^2."}, {"text": "f(x) = (x+4)^2 - 17, vertex (-4, -17)", "isCorrect": false, "rationale": "The value added and subtracted to complete the square, and thus the resulting vertex form and vertex coordinates, are incorrect."}]}, {"question": "Given the function f(x) = 2x^2 - 12x + 7, what is its vertex?", "options": [{"text": "(3, 7)", "isCorrect": false, "rationale": "While the x-coordinate is correct, the y-coordinate is the constant 'c' from the standard form, not the y-coordinate of the vertex."}, {"text": "(-3, -11)", "isCorrect": false, "rationale": "Both the x and y coordinates are incorrect. The x-coordinate should be positive, and the y-coordinate is calculated incorrectly."}, {"text": "(3, -11)", "isCorrect": true, "rationale": "Using the vertex shortcut formula x = -b/(2a): x = -(-12)/(2*2) = 12/4 = 3. Then, f(3) = 2(3)^2 - 12(3) + 7 = 2(9) - 36 + 7 = 18 - 36 + 7 = -18 + 7 = -11. So the vertex is (3, -11)."}, {"text": "(-3, 7)", "isCorrect": false, "rationale": "The x-coordinate is incorrect in sign, and the y-coordinate is incorrect."}]}, {"question": "For the quadratic function f(x) = -2(x+3)^2 + 7, what are its vertex and axis of symmetry?", "options": [{"text": "Vertex (3, 7), Axis x = 3", "isCorrect": false, "rationale": "The vertex form is f(x) = a(x-h)^2+k. Since the function is (x+3)^2, h is -3, not 3. Therefore, the x-coordinate of the vertex and the axis of symmetry are incorrect."}, {"text": "Vertex (-3, 7), Axis x = -3", "isCorrect": true, "rationale": "In the vertex form f(x) = a(x-h)^2+k, we have h = -3 (because x+3 = x - (-3)) and k = 7. Thus, the vertex is (-3, 7) and the axis of symmetry is x = -3."}, {"text": "Vertex (3, -7), Axis x = 3", "isCorrect": false, "rationale": "Both the x and y coordinates of the vertex are incorrect. The x-coordinate should be -3 and the y-coordinate should be 7."}, {"text": "Vertex (-3, -7), Axis x = -3", "isCorrect": false, "rationale": "While the x-coordinate of the vertex and the axis of symmetry are correct, the y-coordinate of the vertex is incorrect. It should be 7, not -7."}]}, {"question": "Find the vertex of f(x) = -3x^2 + 12x - 5 using the shortcut formula.", "options": [{"text": "(-2, 7)", "isCorrect": false, "rationale": "The calculation for the x-coordinate is incorrect; the negative sign in the formula (-b/2a) must be carefully applied."}, {"text": "(2, -5)", "isCorrect": false, "rationale": "While the x-coordinate is correct, the y-coordinate calculation is incorrect. The value -5 is 'c' from the standard form, not f(2)."}, {"text": "(2, 7)", "isCorrect": true, "rationale": "Using the formula x = -b/(2a), with a=-3 and b=12: x = -12 / (2 * -3) = -12 / -6 = 2. Then, substitute x=2 into the function: f(2) = -3(2)^2 + 12(2) - 5 = -3(4) + 24 - 5 = -12 + 24 - 5 = 12 - 5 = 7. So the vertex is (2, 7)."}, {"text": "(-2, -5)", "isCorrect": false, "rationale": "Both the x and y coordinates are incorrect, indicating errors in applying the formula and function evaluation."}]}, {"question": "A quadratic function has a vertex at (5, -10) and opens upward. Which of the following statements about its vertex form f(x) = a(x-h)^2 + k is true?", "options": [{"text": "a < 0, and the function has a maximum value of -10.", "isCorrect": false, "rationale": "If the function opens upward, 'a' must be greater than 0, not less than 0. An upward-opening parabola has a minimum, not a maximum."}, {"text": "a > 0, and the function has a maximum value of 5.", "isCorrect": false, "rationale": "While 'a' > 0 is correct for an upward-opening parabola, an upward-opening parabola has a minimum value, not a maximum. Also, the value should be the y-coordinate of the vertex (-10), not the x-coordinate (5)."}, {"text": "a > 0, and the function has a minimum value of -10.", "isCorrect": true, "rationale": "An upward-opening parabola means 'a' > 0. The vertex is the turning point, and for an upward-opening parabola, the y-coordinate of the vertex (k = -10) represents the minimum value of the function."}, {"text": "a < 0, and the function has a minimum value of 5.", "isCorrect": false, "rationale": "If the function opens upward, 'a' must be greater than 0, not less than 0. An upward-opening parabola has a minimum at the y-coordinate of the vertex, which is -10, not 5."}]}, {"question": "A parabola has vertex (-1, 4) and passes through the point (1, 12). What is its equation in vertex form?", "options": [{"text": "f(x) = (x-1)^2 + 4", "isCorrect": false, "rationale": "This equation has 'a' = 1, which is incorrect, and 'h' is also incorrect given the vertex is (-1,4)."}, {"text": "f(x) = 2(x+1)^2 + 4", "isCorrect": true, "rationale": "Start with vertex form f(x) = a(x-h)^2+k. With vertex (-1,4), we have f(x) = a(x - (-1))^2 + 4 = a(x+1)^2 + 4. Substitute the point (1,12): 12 = a(1+1)^2 + 4 => 12 = a(2)^2 + 4 => 12 = 4a + 4 => 8 = 4a => a = 2. So, f(x) = 2(x+1)^2 + 4."}, {"text": "f(x) = 2(x-1)^2 + 4", "isCorrect": false, "rationale": "The x-coordinate of the vertex is -1, so the term in the parenthesis should be (x - (-1)) or (x+1), not (x-1)."}, {"text": "f(x) = 2(x+1)^2 - 4", "isCorrect": false, "rationale": "The y-coordinate of the vertex (k) is 4, not -4."}]}, {"question": "If the vertex of a parabola is (2, 9) and it passes through the point (0, 5), what other point must also be on the parabola due to symmetry?", "options": [{"text": "(2, 5)", "isCorrect": false, "rationale": "The point (2,5) is on the axis of symmetry but not necessarily a mirror point to (0,5). Symmetry is about the axis, reflecting across it horizontally."}, {"text": "(4, 5)", "isCorrect": true, "rationale": "The axis of symmetry is x=h, which is x=2. The point (0, 5) is 2 units to the left of the axis (0 = 2 - 2). Due to symmetry, there must be a mirror point 2 units to the right of the axis (2 + 2 = 4), with the same y-coordinate. So, the point is (4, 5)."}, {"text": "(0, 9)", "isCorrect": false, "rationale": "The point (0,9) is on the y-axis, and (2,9) is the vertex, but (0,9) is not directly related by symmetry to (0,5) through the axis x=2."}, {"text": "(2, 0)", "isCorrect": false, "rationale": "The point (2,0) is on the axis of symmetry, but its y-coordinate is not a mirror of 5, nor is it the vertex."}]}, {"question": "How many x-intercepts does the function f(x) = x^2 + 2x + 5 have?", "options": [{"text": "Two x-intercepts", "isCorrect": false, "rationale": "Two x-intercepts would imply a positive discriminant (b^2 - 4ac > 0), which is not the case here."}, {"text": "One x-intercept", "isCorrect": false, "rationale": "One x-intercept would imply a zero discriminant (b^2 - 4ac = 0), which is not the case here."}, {"text": "Zero x-intercepts", "isCorrect": true, "rationale": "The number of x-intercepts is determined by the discriminant (b^2 - 4ac). For f(x) = x^2 + 2x + 5, a=1, b=2, c=5. The discriminant is 2^2 - 4(1)(5) = 4 - 20 = -16. Since the discriminant is negative (-16 < 0), there are no real solutions to f(x)=0, meaning there are zero x-intercepts."}, {"text": "Cannot be determined without graphing.", "isCorrect": false, "rationale": "The number of x-intercepts can be definitively determined algebraically using the discriminant without graphing."}]}, {"question": "A student is asked to find the vertex of the function f(x) = 3(x-5)^2 + 2. If they incorrectly state the vertex as (-5, 2), what common misconception are they demonstrating?", "options": [{"text": "They are confusing the roles of 'a' and 'k' in the vertex form.", "isCorrect": false, "rationale": "The student has correctly identified 'k' as the y-coordinate of the vertex (2) and 'a' is not involved in the sign error for 'h'."}, {"text": "They are misinterpreting the sign of 'h' because (x-h) means the x-coordinate of the vertex is h, not -h.", "isCorrect": true, "rationale": "The vertex form is f(x) = a(x-h)^2+k. The x-coordinate of the vertex is 'h'. In this function, (x-5)^2 means h=5. The common misconception is to take the opposite sign, treating it as (x+h) or mistakenly taking -h as the coordinate."}, {"text": "They are incorrectly calculating the y-coordinate of the vertex.", "isCorrect": false, "rationale": "The y-coordinate 'k' is correctly identified as 2."}, {"text": "They are attempting to use the vertex shortcut formula for standard form.", "isCorrect": false, "rationale": "The function is already in vertex form, so there is no need to convert it to standard form to find the vertex using the shortcut formula. The error is a misinterpretation of the vertex form itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
