    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which form of a linear equation is most direct to write when given a point and the slope of the line?", "options": [{"text": "Slope-intercept form", "isCorrect": false, "rationale": "Slope-intercept form (y = mx + b) is direct when the y-intercept is known, not just any point and slope. While it can be derived from point-slope, it's not the most direct initial form for a general point."}, {"text": "Standard form", "isCorrect": false, "rationale": "Standard form (Ax + By = C) requires rearrangement and adherence to integer coefficient rules, making it less direct than point-slope when only a point and slope are initially given."}, {"text": "Point-slope form", "isCorrect": true, "rationale": "As stated in the text, 'Point-slope form is the most direct form to write when you know a point and a slope, since you simply substitute those values.'"}, {"text": "Intercept form", "isCorrect": false, "rationale": "Intercept form (x/a + y/b = 1) is not one of the three standard forms discussed in this section and is specific to situations where both intercepts are easily identifiable."}], "id": "q01"}, {"question": "A line passes through the points (3, -2) and (6, 4). What is its equation in slope-intercept form?", "options": [{"text": "y = 2x - 8", "isCorrect": true, "rationale": "First, find the slope: m = (4 - (-2)) / (6 - 3) = 6 / 3 = 2. Then, use point-slope form with (3, -2): y - (-2) = 2(x - 3) => y + 2 = 2x - 6 => y = 2x - 8."}, {"text": "y = 2x + 8", "isCorrect": false, "rationale": "This would imply a y-intercept of +8, but substituting either point (e.g., (3, -2): 2(3) + 8 = 14 ≠ -2) shows it is incorrect. A common error here might be an arithmetic mistake with the y-intercept or sign error."}, {"text": "y = 2x - 4", "isCorrect": false, "rationale": "While the slope (2) is correct, the y-intercept is incorrect. Substituting (3, -2): 2(3) - 4 = 6 - 4 = 2 ≠ -2. This might result from an error in calculating the y-intercept from point-slope form."}, {"text": "y = (1/2)x - 7/2", "isCorrect": false, "rationale": "This option has an incorrect slope. The calculated slope is 2, not 1/2. This error might arise from inverting the slope calculation (delta x / delta y)."}], "id": "q02"}, {"question": "Which of the following is the standard form of the linear equation $y - 3 = -(1/2)(x + 4)$?", "options": [{"text": "x + 2y = 2", "isCorrect": true, "rationale": "Starting with y - 3 = -(1/2)(x + 4): Multiply by 2 to clear the fraction: 2(y - 3) = -1(x + 4) => 2y - 6 = -x - 4. Move x-term to the left: x + 2y = -4 + 6 => x + 2y = 2. This satisfies A, B, C being integers with A ≠ 0 and no common factor."}, {"text": "x + 2y = -10", "isCorrect": false, "rationale": "This option results from an arithmetic error when moving constants or distributing. For example, if -4 - 6 was incorrectly calculated as -10."}, {"text": "x - 2y = 10", "isCorrect": false, "rationale": "This indicates an incorrect sign for the y-term and the constant, suggesting errors in distributing the negative sign or rearranging terms."}, {"text": "2x + y = -5", "isCorrect": false, "rationale": "This equation has an incorrect slope (m = -2, not -1/2) and incorrect constant, indicating fundamental errors in distributing and rearranging terms, possibly confusing the roles of x and y coefficients."}], "id": "q03"}, {"question": "A line is parallel to $y = -4x + 7$ and passes through the point $(1, -5)$. What is its equation in slope-intercept form?", "options": [{"text": "y = -4x - 1", "isCorrect": true, "rationale": "Parallel lines have the same slope, so the slope of the new line is m = -4. Using point-slope form with (1, -5): y - (-5) = -4(x - 1) => y + 5 = -4x + 4 => y = -4x - 1."}, {"text": "y = 4x - 9", "isCorrect": false, "rationale": "This option uses an incorrect slope (4 instead of -4), which would indicate a different direction, not parallel. Parallel lines share the identical slope."}, {"text": "y = (1/4)x - 21/4", "isCorrect": false, "rationale": "This option represents a line perpendicular to the given line, not parallel, due to using the negative reciprocal slope. The y-intercept is also incorrect."}, {"text": "y = -4x + 9", "isCorrect": false, "rationale": "While the slope is correct, the y-intercept is incorrect. Substituting (1, -5) into this equation: -4(1) + 9 = 5 ≠ -5, which means it doesn't pass through the given point."}], "id": "q04"}, {"question": "What is the equation of the line perpendicular to $3x - 2y = 12$ that passes through the point $(3, 1)$?", "options": [{"text": "y = -(2/3)x + 3", "isCorrect": true, "rationale": "First, find the slope of the given line: -2y = -3x + 12 => y = (3/2)x - 6. So, m_given = 3/2. The perpendicular slope is the negative reciprocal: m_perp = -2/3. Using point-slope with (3, 1): y - 1 = -(2/3)(x - 3) => y - 1 = -(2/3)x + 2 => y = -(2/3)x + 3."}, {"text": "y = (3/2)x - 7/2", "isCorrect": false, "rationale": "This option uses the same slope as the given line, making it parallel, not perpendicular."}, {"text": "y = (2/3)x - 1", "isCorrect": false, "rationale": "This option has an incorrect slope (it's the reciprocal, but not negative) and an incorrect y-intercept, thus not perpendicular nor passing through the given point."}, {"text": "y = -(3/2)x + 11/2", "isCorrect": false, "rationale": "This option has an incorrect slope (it's the negative of the original slope, but not the reciprocal) and an incorrect y-intercept. The correct perpendicular slope is -2/3."}], "id": "q05"}, {"question": "According to the 'caution' note, what is a common error when expanding the point-slope form $y - y_1 = m(x - x_1)$ when 'm' is negative?", "options": [{"text": "Incorrectly calculating the slope 'm'", "isCorrect": false, "rationale": "While slope calculation can be a source of error, the 'caution' specifically addresses the distribution step after the slope is already known and used in point-slope form."}, {"text": "Forgetting to distribute the negative sign of 'm' to both terms inside the parentheses", "isCorrect": true, "rationale": "The text explicitly states: 'Forgetting to distribute the negative sign to both terms inside the parentheses is one of the most common errors in writing equations of lines.'"}, {"text": "Switching the x and y coordinates when substituting into the formula", "isCorrect": false, "rationale": "This is a common algebraic error, but it is not the specific error highlighted in the 'caution' note within the provided text."}, {"text": "Incorrectly simplifying fractions for the slope", "isCorrect": false, "rationale": "Similar to option A, this relates to slope calculation, not the distributive property error during expansion of the point-slope form, which is the focus of the caution."}], "id": "q06"}, {"question": "To graph the line $4x - 5y = 20$ using its intercepts, what are the coordinates of the x-intercept and y-intercept?", "options": [{"text": "x-intercept: (5, 0), y-intercept: (0, -4)", "isCorrect": true, "rationale": "To find the x-intercept, set y = 0: 4x - 5(0) = 20 => 4x = 20 => x = 5. So, (5, 0). To find the y-intercept, set x = 0: 4(0) - 5y = 20 => -5y = 20 => y = -4. So, (0, -4)."}, {"text": "x-intercept: (-5, 0), y-intercept: (0, 4)", "isCorrect": false, "rationale": "This option has incorrect signs for both intercepts, suggesting errors in solving for x and y after setting the other variable to zero."}, {"text": "x-intercept: (0, 5), y-intercept: (-4, 0)", "isCorrect": false, "rationale": "This option swaps the roles of x and y intercepts and has incorrect signs, indicating a misunderstanding of how intercepts are defined."}, {"text": "x-intercept: (4, 0), y-intercept: (0, -5)", "isCorrect": false, "rationale": "This option incorrectly swaps the numerical values derived for x and y, likely from a mix-up during calculation or assignment to the correct axis."}], "id": "q07"}, {"question": "If a linear equation's x-intercept and y-intercept both coincide at the origin (0,0), what is the recommended method to find a second point for graphing?", "options": [{"text": "Assume the slope is 1 and find a point (1,1)", "isCorrect": false, "rationale": "Assuming a slope of 1 is incorrect; the line could have any slope. This would only be true if the specific equation were y = x."}, {"text": "Find a second point by substituting any convenient non-zero x-value into the equation", "isCorrect": true, "rationale": "The 'note' section explicitly states: 'If both intercepts coincide (i.e., the line passes through the origin), find a second point by substituting any convenient x-value.'"}, {"text": "The line cannot be graphed if both intercepts are at the origin", "isCorrect": false, "rationale": "This is incorrect. A line passing through the origin can certainly be graphed, but plotting a second point is necessary as both intercepts are the same point."}, {"text": "Use the midpoint formula with the origin and any other given point", "isCorrect": false, "rationale": "The midpoint formula is used to find the middle of a line segment, not to generate a second point on the line itself for graphing purposes in this context."}], "id": "q08"}, {"question": "According to the section, what characteristic must be true for every linear function $f(x) = mx + b$ where $m \\neq 0$?", "options": [{"text": "It passes through the origin (0,0).", "isCorrect": false, "rationale": "A linear function only passes through the origin if b=0. The y-intercept is b, so if b is any other value, it does not pass through the origin."}, {"text": "It is a one-to-one function.", "isCorrect": true, "rationale": "The text states: 'Every linear function (with m ≠ 0) is one-to-one: no horizontal line intersects it more than once.' This means each unique input x maps to a unique output y."}, {"text": "Its graph is always parallel to the x-axis.", "isCorrect": false, "rationale": "A line parallel to the x-axis has a slope m=0 (a horizontal line). The question specifies m ≠ 0, meaning the line is not horizontal."}, {"text": "Its slope 'm' must be an integer.", "isCorrect": false, "rationale": "The text defines 'm' and 'b' as constants, but does not restrict 'm' to be an integer. Slopes can be fractions or any real number, as seen in examples like m=2/3."}], "id": "q09"}, {"question": "When would using the slope-intercept form ($y = mx + b$) be most advantageous compared to other forms?", "options": [{"text": "When you are given two arbitrary points on the line.", "isCorrect": false, "rationale": "Given two points, it's typically easiest to first calculate the slope and then use point-slope form, from which slope-intercept can be derived. It's not the 'most advantageous' starting point."}, {"text": "When you need to easily identify the x-intercept and the slope.", "isCorrect": false, "rationale": "Slope-intercept form directly provides the slope (m) and the y-intercept (b), not the x-intercept directly. Finding the x-intercept requires setting y=0 and solving for x."}, {"text": "When you are given the slope of the line and its y-intercept.", "isCorrect": true, "rationale": "The text defines slope-intercept form as 'The equation of a line with slope m and y-intercept b.' This is the most direct scenario for its use, as these values are substituted directly."}, {"text": "When the equation must be written with integer coefficients and no common factors.", "isCorrect": false, "rationale": "This describes the requirements for standard form (Ax + By = C), which is specifically designed for such constraints, not slope-intercept form."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
