<script>
var QUESTIONS = [{"question": "Factor the polynomial 15y^4 - 20y^3 + 5y^2 completely.", "options": [{"text": "5(3y^4 - 4y^3 + y^2)", "isCorrect": false, "rationale": "The GCF must include the lowest power of the common variable y, which is y^2. This option only factored out the numerical GCF."}, {"text": "5y^2(3y^2 - 4y + 1)", "isCorrect": true, "rationale": "The greatest common factor (GCF) of the numerical coefficients 15, 20, and 5 is 5. The lowest power of the common variable y among y^4, y^3, and y^2 is y^2. Thus, the GCF is 5y^2. Factoring this out from each term results in 5y^2(3y^2 - 4y + 1)."}, {"text": "y^2(15y^2 - 20y + 5)", "isCorrect": false, "rationale": "The GCF includes the greatest common numerical factor, which is 5. This option only factored out the variable part, not the complete GCF."}, {"text": "5y(3y^3 - 4y^2 + y)", "isCorrect": false, "rationale": "The lowest power of y among y^4, y^3, y^2 is y^2, not y^1. The GCF must include the lowest power of each shared variable, making 5y^2 the correct variable part of the GCF."}]}, {"question": "According to the text, why is factoring out the Greatest Common Factor (GCF) always the first step in any factoring problem?", "options": [{"text": "It makes the polynomial a monic trinomial, which is easier to factor.", "isCorrect": false, "rationale": "Factoring out the GCF does not guarantee a monic trinomial, nor is that its primary purpose as the first step for any factoring problem."}, {"text": "It ensures all terms are perfectly divisible by the GCF, simplifying subsequent factoring steps and preventing incomplete factorization.", "isCorrect": true, "rationale": "The text states that factoring out the GCF is always the first step because it simplifies the polynomial and ensures that no common factors are missed, leading to a complete factorization. This makes the remaining polynomial easier to factor using other methods."}, {"text": "The GCF is the only type of factor that works for all polynomials.", "isCorrect": false, "rationale": "The text clearly outlines several other factoring strategies (sum/difference of cubes, quadratic form, trinomial factoring) for different types of polynomials, indicating GCF is not the only method."}, {"text": "It immediately reveals the roots of the polynomial.", "isCorrect": false, "rationale": "Factoring is a step towards finding roots, but factoring out the GCF alone does not typically reveal all roots, especially if the remaining polynomial is not linear. Its primary purpose as the first step is simplification and completeness."}]}, {"question": "Factor the expression 125x^3 + 8 completely.", "options": [{"text": "(5x+2)(25x^2 - 10x + 4)", "isCorrect": true, "rationale": "This expression is a sum of cubes, A^3 + B^3, where A = 5x and B = 2. Applying the formula A^3 + B^3 = (A+B)(A^2 - AB + B^2) yields (5x+2)((5x)^2 - (5x)(2) + 2^2), which simplifies to (5x+2)(25x^2 - 10x + 4)."}, {"text": "(5x+2)(25x^2 + 10x + 4)", "isCorrect": false, "rationale": "According to the sum of cubes formula (A+B)(A^2 - AB + B^2), the middle term in the trinomial factor should have the opposite sign of the binomial, i.e., -AB."}, {"text": "(5x-2)(25x^2 + 10x + 4)", "isCorrect": false, "rationale": "For a sum of cubes (A^3 + B^3), the binomial factor should have the same sign as the original sum, i.e., (A+B)."}, {"text": "(5x+2)^3", "isCorrect": false, "rationale": "This is a common misconception. (5x+2)^3 expands to 125x^3 + 150x^2 + 60x + 8, which is not equal to 125x^3 + 8. The sum of cubes formula produces two factors, a binomial and a trinomial."}]}, {"question": "Factor the expression y^3 - 216 completely.", "options": [{"text": "(y-6)(y^2 - 6y + 36)", "isCorrect": false, "rationale": "According to the difference of cubes formula (A-B)(A^2 + AB + B^2), the middle term in the trinomial factor should have the opposite sign of the binomial, i.e., +AB."}, {"text": "(y+6)(y^2 - 6y + 36)", "isCorrect": false, "rationale": "For a difference of cubes (A^3 - B^3), the binomial factor should have the same sign as the original difference, i.e., (A-B)."}, {"text": "(y-6)(y^2 + 6y + 36)", "isCorrect": true, "rationale": "This expression is a difference of cubes, A^3 - B^3, where A = y and B = 6. Applying the formula A^3 - B^3 = (A-B)(A^2 + AB + B^2) yields (y-6)(y^2 + (y)(6) + 6^2), which simplifies to (y-6)(y^2 + 6y + 36)."}, {"text": "(y-6)^3", "isCorrect": false, "rationale": "This is a common misconception. (y-6)^3 expands to y^3 - 18y^2 + 108y - 216, which is not equal to y^3 - 216. The difference of cubes formula produces two factors, a binomial and a trinomial."}]}, {"question": "Factor the polynomial x^4 - 10x^2 + 9 completely.", "options": [{"text": "(x^2-1)(x^2-9)", "isCorrect": false, "rationale": "This is a correct intermediate step after factoring the quadratic form. However, both (x^2-1) and (x^2-9) are differences of squares and can be factored further, so the polynomial is not completely factored."}, {"text": "(x-1)(x+1)(x-3)(x+3)", "isCorrect": true, "rationale": "This polynomial is in quadratic form. Let u = x^2, so the expression becomes u^2 - 10u + 9. Factoring this monic trinomial yields (u-1)(u-9). Substituting back u = x^2 gives (x^2-1)(x^2-9). Both of these factors are differences of squares: (x^2-1) = (x-1)(x+1) and (x^2-9) = (x-3)(x+3). Therefore, the completely factored form is (x-1)(x+1)(x-3)(x+3)."}, {"text": "(x^2-3)(x^2-3)", "isCorrect": false, "rationale": "This factorization is incorrect. Multiplying it out gives (x^2-3)(x^2-3) = x^4 - 6x^2 + 9, which does not match the original polynomial x^4 - 10x^2 + 9."}, {"text": "(x-10)(x^2+9)", "isCorrect": false, "rationale": "This factorization is incorrect. Multiplying this out does not yield the original polynomial. It incorrectly mixes terms from the quadratic form."}]}, {"question": "Factor the polynomial x^6 - 9x^3 + 8 completely.", "options": [{"text": "(x^3-1)(x^3-8)", "isCorrect": false, "rationale": "This is a correct intermediate step after factoring the quadratic form. However, both (x^3-1) and (x^3-8) are differences of cubes and can be factored further, so the polynomial is not completely factored."}, {"text": "(x-1)(x^2+x+1)(x-2)(x^2+2x+4)", "isCorrect": true, "rationale": "This polynomial is in quadratic form. Let u = x^3, so the expression becomes u^2 - 9u + 8. Factoring this monic trinomial yields (u-1)(u-8). Substituting back u = x^3 gives (x^3-1)(x^3-8). Both of these factors are differences of cubes: (x^3-1) = (x-1)(x^2+x+1) and (x^3-8) = (x-2)(x^2+2x+4). This is the completely factored form."}, {"text": "(x-1)(x+1)(x-2)(x+2)(x^2+1)(x^2+4)", "isCorrect": false, "rationale": "This option incorrectly treats the cubic terms as differences of squares and attempts to factor non-factorable quadratic terms over real numbers (like x^2+1). The correct approach requires applying the difference of cubes formula."}, {"text": "(x^2-1)(x^4-8)", "isCorrect": false, "rationale": "This is an incorrect initial factoring step. It does not correctly apply the quadratic form substitution for x^3 or factor the resulting expression properly."}]}, {"question": "For the polynomial p(x) = (x+5)^2 (x-1)^4 (x+2), what are the zeros and their corresponding multiplicities?", "options": [{"text": "Zeros: 5, -1, 2 with multiplicities 2, 4, 1 respectively.", "isCorrect": false, "rationale": "The zeros are found by setting each factor (x-r) to zero. Thus, (x+5) corresponds to x=-5, (x-1) to x=1, and (x+2) to x=-2. The signs for the zeros are incorrect in this option."}, {"text": "Zeros: -5, 1, -2 with multiplicities 2, 4, 1 respectively.", "isCorrect": true, "rationale": "A zero 'r' corresponds to a factor (x-r). So, from (x+5)^2, x=-5 (multiplicity 2); from (x-1)^4, x=1 (multiplicity 4); and from (x+2)^1, x=-2 (multiplicity 1). This option correctly identifies the zeros and their multiplicities."}, {"text": "Zeros: -5, 1, -2 with multiplicities 1, 1, 1 respectively.", "isCorrect": false, "rationale": "While the zeros are correctly identified, the multiplicities are given by the exponents of the factors (2, 4, and 1), not all 1."}, {"text": "Zeros: 5, -1, 2 with multiplicities 4, 2, 1 respectively.", "isCorrect": false, "rationale": "This option has incorrect signs for the zeros and also swaps the multiplicities, associating 4 with 5 and 2 with -1, which is incorrect."}]}, {"question": "Factor the trinomial x^2 + 3x - 10.", "options": [{"text": "(x+5)(x-2)", "isCorrect": true, "rationale": "For a monic trinomial x^2 + bx + c, we look for two integers p and q such that pq = c and p+q = b. Here, c = -10 and b = 3. The integers 5 and -2 satisfy 5 * (-2) = -10 and 5 + (-2) = 3. Therefore, the factorization is (x+5)(x-2)."}, {"text": "(x-5)(x+2)", "isCorrect": false, "rationale": "This factorization would result in x^2 - 3x - 10 when multiplied out, not x^2 + 3x - 10. The sum of the factors -5 and 2 is -3, not 3."}, {"text": "(x+10)(x-1)", "isCorrect": false, "rationale": "This factorization would result in x^2 + 9x - 10 when multiplied out, not x^2 + 3x - 10. The sum of the factors 10 and -1 is 9, not 3."}, {"text": "(x-3)(x+10/3)", "isCorrect": false, "rationale": "While multiplying these out might give some terms correctly, standard factorization of monic trinomials typically involves integer factors, and this expression does not correctly yield the original trinomial when multiplied out."}]}, {"question": "Factor the trinomial 4x^2 - 4x - 3 completely using the AC method.", "options": [{"text": "(2x-3)(2x+1)", "isCorrect": true, "rationale": "For ax^2 + bx + c, compute ac = 4 * (-3) = -12. Find two integers m and n such that mn = -12 and m+n = -4. These integers are -6 and 2. Rewrite the middle term: 4x^2 - 6x + 2x - 3. Factor by grouping: 2x(2x-3) + 1(2x-3) = (2x-3)(2x+1)."}, {"text": "(4x-1)(x+3)", "isCorrect": false, "rationale": "Multiplying this out gives 4x^2 + 12x - x - 3 = 4x^2 + 11x - 3, which is not the original polynomial."}, {"text": "(2x+3)(2x-1)", "isCorrect": false, "rationale": "Multiplying this out gives 4x^2 - 2x + 6x - 3 = 4x^2 + 4x - 3, which is not the original polynomial 4x^2 - 4x - 3."}, {"text": "(4x+1)(x-3)", "isCorrect": false, "rationale": "Multiplying this out gives 4x^2 - 12x + x - 3 = 4x^2 - 11x - 3, which is not the original polynomial."}]}, {"question": "A student is attempting to factor the polynomial 10x^3 - 15x^2 + 5x. Based on the summary 'Strategy for Factoring,' what should be the *absolute first* step the student takes?", "options": [{"text": "Look for two terms to apply sum/difference of cubes.", "isCorrect": false, "rationale": "The polynomial has three terms, not two. Furthermore, the 'Strategy for Factoring' explicitly states that factoring out the GCF is the first step for any polynomial."}, {"text": "Identify if the polynomial is in quadratic form.", "isCorrect": false, "rationale": "While this is a valid factoring strategy for certain trinomials, it is not the absolute first step for *any* polynomial. The GCF must always be factored out first."}, {"text": "Factor out the Greatest Common Factor (GCF).", "isCorrect": true, "rationale": "The 'Summary: Strategy for Factoring' clearly lists 'GCF first. Factor out any common factor' as the initial and most important step in factoring any polynomial. This prepares the polynomial for further factorization using other methods."}, {"text": "Attempt to factor as a monic trinomial.", "isCorrect": false, "rationale": "The given polynomial (10x^3 - 15x^2 + 5x) is not a monic trinomial (it has a leading coefficient of 10 and an x^3 term). More importantly, the GCF must be considered first for any polynomial."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
