    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following functions is NOT a power function as defined in the textbook section?", "options": [{"text": "f(x) = x^3", "isCorrect": false, "rationale": "This is a power function where n=3, which is a positive integer."}, {"text": "g(x) = x^(1/2)", "isCorrect": true, "rationale": "A power function is defined as f(x) = x^n where 'n' is a positive integer. Here, n=1/2, which is not an integer."}, {"text": "h(x) = x^6", "isCorrect": false, "rationale": "This is a power function where n=6, which is a positive integer."}, {"text": "k(x) = x^1", "isCorrect": false, "rationale": "This is a power function where n=1, which is a positive integer."}]}, {"question": "An even-degree power function, f(x) = x^n (where n is a positive even integer), will always exhibit which of the following characteristics?", "options": [{"text": "Its range is (-∞, ∞).", "isCorrect": false, "rationale": "Even-degree power functions have a range of [0, ∞), as their graphs open upward and have a minimum at (0,0)."}, {"text": "Its graph is symmetric about the origin.", "isCorrect": false, "rationale": "Even-degree power functions are symmetric about the y-axis, not the origin. Symmetry about the origin is characteristic of odd functions."}, {"text": "It has a global minimum at (0,0).", "isCorrect": true, "rationale": "According to the 'Even-Degree Power Functions' property, (0,0) is a minimum for f(x)=x^n when n is a positive even integer."}, {"text": "As x → -∞, f(x) → -∞.", "isCorrect": false, "rationale": "For even-degree power functions, as x → -∞, f(x) → ∞ (the graph opens upward in both directions)."}]}, {"question": "Which of the following points will an odd-degree power function f(x) = x^n (where n is a positive odd integer) always pass through?", "options": [{"text": "(0,1)", "isCorrect": false, "rationale": "All power functions f(x)=x^n pass through (0,0), not (0,1)."}, {"text": "(1,-1)", "isCorrect": false, "rationale": "Odd-degree power functions pass through (1,1), not (1,-1)."}, {"text": "(-1,-1)", "isCorrect": true, "rationale": "The 'Odd-Degree Power Functions' property explicitly states that these functions pass through (-1, -1), (0, 0), and (1, 1)."}, {"text": "(-1,1)", "isCorrect": false, "rationale": "The point (-1,1) is passed through by even-degree power functions, not odd-degree ones."}]}, {"question": "A scientist models the growth of a certain population using a power function P(t) = t^4, where t represents time in years. If the model is valid for increasing time, what does the end behavior 'as t → ∞, P(t) → ∞' imply about the population?", "options": [{"text": "The population will eventually stabilize at a maximum value.", "isCorrect": false, "rationale": "An end behavior of P(t) → ∞ means the value increases without bound, not that it stabilizes at a maximum."}, {"text": "The population will eventually decline to zero.", "isCorrect": false, "rationale": "P(t) → ∞ signifies continuous growth, not decline to zero."}, {"text": "The population will grow without bound over time.", "isCorrect": true, "rationale": "The arrow notation 'P(t) → ∞' means P(t) increases without bound, directly implying the population will continue to grow indefinitely under this model."}, {"text": "The population will fluctuate periodically.", "isCorrect": false, "rationale": "Power functions do not exhibit periodic behavior; their end behavior is monotonic growth or decline."}]}, {"question": "Consider the graphs of f(x) = x^3 and g(x) = x^5. Which of the following statements accurately compares their shapes?", "options": [{"text": "For x > 1, f(x) > g(x).", "isCorrect": false, "rationale": "The text states that for x > 1, higher powers produce larger outputs, so g(x)=x^5 would be greater than f(x)=x^3."}, {"text": "For 0 < x < 1, g(x) > f(x).", "isCorrect": false, "rationale": "The text states that for 0 < x < 1, higher powers produce smaller outputs, so f(x)=x^3 would be greater than g(x)=x^5."}, {"text": "For x < 0, g(x) is always greater than f(x).", "isCorrect": false, "rationale": "Since both are odd functions, for x < 0, their outputs are negative. For example, at x=-2, x^3 = -8 and x^5 = -32. -8 is greater than -32. So for x < -1, x^3 > x^5, and for x in (-1, 0), x^5 > x^3. It's not always true that g(x) > f(x)."}, {"text": "For x ∈ (0,1), the graph of g(x) = x^5 is 'flatter' than f(x) = x^3.", "isCorrect": true, "rationale": "The example 'Comparing Even and Odd Power Functions' notes that for 0 < x < 1, higher powers produce smaller outputs (e.g., x^4 < x^2). This means x^5 will be closer to zero than x^3 in this interval, making it 'flatter' or closer to the x-axis."}]}, {"question": "Determine whether the function h(x) = x^2 - 4 is even, odd, or neither.", "options": [{"text": "Even", "isCorrect": true, "rationale": "To check for even/odd, evaluate h(-x). h(-x) = (-x)^2 - 4 = x^2 - 4. Since h(-x) = h(x), the function is even. (A constant vertical shift doesn't break even symmetry for an even function)."}, {"text": "Odd", "isCorrect": false, "rationale": "For an odd function, h(-x) = -h(x). Here, h(-x) = x^2 - 4, while -h(x) = -(x^2 - 4) = -x^2 + 4. These are not equal."}, {"text": "Neither", "isCorrect": false, "rationale": "The function is even, as shown by h(-x) = h(x)."}, {"text": "Both even and odd", "isCorrect": false, "rationale": "A function can only be both even and odd if it is the zero function, h(x) = 0."}]}, {"question": "Describe the transformations applied to the basic power function y = x^4 to obtain the graph of f(x) = -(x + 2)^4 - 1.", "options": [{"text": "Shift left 2 units, reflect over the y-axis, then shift down 1 unit.", "isCorrect": false, "rationale": "The reflection is over the x-axis, not y-axis, and the +2 inside the parentheses means a left shift, not right."}, {"text": "Shift right 2 units, reflect over the x-axis, then shift up 1 unit.", "isCorrect": false, "rationale": "The shift is left 2 units (due to x+2), and the shift is down 1 unit (due to -1)."}, {"text": "Shift left 2 units, reflect over the x-axis, then shift down 1 unit.", "isCorrect": true, "rationale": "The (x+2) term indicates a horizontal shift 2 units to the left. The negative sign in front of the parenthesis indicates a reflection across the x-axis. The -1 outside indicates a vertical shift down 1 unit."}, {"text": "Shift right 2 units, reflect over the y-axis, then shift up 1 unit.", "isCorrect": false, "rationale": "All parts of this description are incorrect for the given function."}]}, {"question": "The area of a square is given by A = s^2, where s is the side length. If the side length of a square is quadrupled (multiplied by 4), by what factor is its area multiplied?", "options": [{"text": "4", "isCorrect": false, "rationale": "Quadrupling the side length means the new side is 4s. The new area would be (4s)^2, not just 4 times the original area."}, {"text": "8", "isCorrect": false, "rationale": "This would be the factor if the function were s^3 and the input doubled, as seen in the sphere volume example. Here, the power is 2 and the input is quadrupled."}, {"text": "16", "isCorrect": true, "rationale": "If the side length s is quadrupled to 4s, the new area is A' = (4s)^2 = 16s^2. Since the original area was s^2, the area is multiplied by a factor of 16. This applies the principle from the sphere volume example to a different power and scaling factor."}, {"text": "64", "isCorrect": false, "rationale": "This would be the factor if the function were s^3 and the input quadrupled, or if the function were s^4 and the input doubled."}]}, {"question": "Which of the following power functions has a range that includes all real numbers (-∞, ∞)?", "options": [{"text": "f(x) = x^2", "isCorrect": false, "rationale": "x^2 is an even-degree power function, whose range is [0, ∞)."}, {"text": "g(x) = x^4", "isCorrect": false, "rationale": "x^4 is an even-degree power function, whose range is [0, ∞)."}, {"text": "h(x) = x^6", "isCorrect": false, "rationale": "x^6 is an even-degree power function, whose range is [0, ∞)."}, {"text": "k(x) = x^7", "isCorrect": true, "rationale": "k(x)=x^7 is an odd-degree power function (n=7). The 'Odd-Degree Power Functions' property states that their domain is (-∞, ∞) and their range is (-∞, ∞)."}]}, {"question": "A student observes a graph that is U-shaped, symmetric about the y-axis, and has its lowest point at the origin. Based on the textbook's descriptions, this function is most likely:", "options": [{"text": "An odd-degree power function.", "isCorrect": false, "rationale": "Odd-degree power functions have 180° rotational symmetry about the origin and pass through (-1,-1), (0,0), (1,1), not a U-shape opening upwards."}, {"text": "An even-degree power function with a negative leading coefficient.", "isCorrect": false, "rationale": "An even-degree power function with a negative leading coefficient would open downward, not upward."}, {"text": "An even-degree power function.", "isCorrect": true, "rationale": "The properties for 'Even-Degree Power Functions' describe precisely this: U-shaped, symmetric about the y-axis, opens upward, and has a minimum (lowest point) at (0,0)."}, {"text": "A function with 180° rotational symmetry about the origin.", "isCorrect": false, "rationale": "180° rotational symmetry about the origin is a characteristic of odd-degree power functions, not U-shaped graphs symmetric about the y-axis."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
