<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What is a defining characteristic of a rational function's graph that distinguishes it from a polynomial function's graph?", "options": [{"text": "It always has at least one x-intercept.", "isCorrect": false, "rationale": "Rational functions do not necessarily have x-intercepts; for example, if the numerator is a constant."}, {"text": "It is always a continuous curve without any breaks.", "isCorrect": false, "rationale": "The text explicitly states that a rational function's graph 'can have breaks, gaps, and horizontal “ceiling/floor” lines not seen in polynomial graphs'."}, {"text": "It can have vertical or horizontal asymptotes.", "isCorrect": true, "rationale": "The presence of vertical and horizontal asymptotes (or breaks/gaps) is a key distinguishing feature of rational functions compared to polynomials, which are continuous everywhere."}, {"text": "Its domain is always all real numbers.", "isCorrect": false, "rationale": "The domain of a rational function excludes values where the denominator is zero, meaning it's not always all real numbers."}]}, {"question": "For a rational function $f(x) = p(x)/q(x)$, a vertical asymptote occurs at $x=a$ if:", "options": [{"text": "$p(a) = 0$.", "isCorrect": false, "rationale": "If $p(a)=0$ and $q(a) \neq 0$, this indicates an x-intercept, not necessarily a vertical asymptote."}, {"text": "$q(a) = 0$ after simplifying $f(x)$.", "isCorrect": true, "rationale": "The text states that 'Vertical asymptotes occur at values where the simplified denominator equals zero.' Simplification is crucial to distinguish between a vertical asymptote and a hole."}, {"text": "$f(x) \\to L$ as $x \\to \\infty$.", "isCorrect": false, "rationale": "This describes the condition for a horizontal asymptote, which concerns the end behavior of the function, not specific vertical lines where the function grows without bound."}, {"text": "$0$ is in the domain of $f(x)$.", "isCorrect": false, "rationale": "This condition relates to whether a y-intercept exists, not to the presence of a vertical asymptote."}]}, {"question": "What is the horizontal asymptote of the function $f(x) = (3x + 1)/(x^2 - 4)$?", "options": [{"text": "$y = 3$", "isCorrect": false, "rationale": "A horizontal asymptote of $y=3$ would occur if the degrees of the numerator and denominator were equal, and the ratio of leading coefficients was 3. Here, the degrees are not equal."}, {"text": "$y = 0$", "isCorrect": true, "rationale": "The degree of the numerator (n=1) is less than the degree of the denominator (d=2). According to the horizontal asymptote rules, if $n < d$, the horizontal asymptote is $y = 0$ (the x-axis)."}, {"text": "$x = 0$", "isCorrect": false, "rationale": "This describes a vertical line, which is not a horizontal asymptote. Horizontal asymptotes are of the form $y=L$."}, {"text": "No horizontal asymptote", "isCorrect": false, "rationale": "This function does have a horizontal asymptote because the degree of the numerator is not greater than the degree of the denominator."}]}, {"question": "Consider the function $f(x) = (4x^2 - 5x + 2)/(2x^2 + 7)$. What is its horizontal asymptote?", "options": [{"text": "$y = 0$", "isCorrect": false, "rationale": "The horizontal asymptote is $y=0$ only when the degree of the numerator is less than the degree of the denominator. Here, the degrees are equal."}, {"text": "$y = 4$", "isCorrect": false, "rationale": "The horizontal asymptote is determined by the ratio of the leading coefficients when degrees are equal, not just the numerator's leading coefficient."}, {"text": "$y = 2$", "isCorrect": true, "rationale": "The degree of the numerator (n=2) is equal to the degree of the denominator (d=2). According to the horizontal asymptote rules, if $n = d$, the horizontal asymptote is $y = a_n / b_d$, where $a_n$ is the leading coefficient of the numerator (4) and $b_d$ is the leading coefficient of the denominator (2). Thus, $y = 4/2 = 2$."}, {"text": "No horizontal asymptote", "isCorrect": false, "rationale": "This function has a horizontal asymptote because the degree of the numerator is not greater than the degree of the denominator."}]}, {"question": "Which of the following functions has no horizontal asymptote?", "options": [{"text": "$f(x) = (x^2 + 3)/(x^3 - 1)$", "isCorrect": false, "rationale": "For this function, $n=2$ and $d=3$. Since $n < d$, there is a horizontal asymptote at $y=0$."}, {"text": "$f(x) = (2x - 5)/(3x + 1)$", "isCorrect": false, "rationale": "For this function, $n=1$ and $d=1$. Since $n = d$, there is a horizontal asymptote at $y=2/3$."}, {"text": "$f(x) = (x^3 - 2x)/(x^2 + 4)$", "isCorrect": true, "rationale": "For this function, $n=3$ and $d=2$. Since $n > d$, there is no horizontal asymptote, as stated in the text's horizontal asymptote rules."}, {"text": "$f(x) = (x - 1)/(x^2 + x + 1)$", "isCorrect": false, "rationale": "For this function, $n=1$ and $d=2$. Since $n < d$, there is a horizontal asymptote at $y=0$."}]}, {"question": "To find the $x$-intercepts of a rational function $f(x) = p(x)/q(x)$, what must be true?", "options": [{"text": "$q(x) = 0$", "isCorrect": false, "rationale": "Setting the denominator $q(x)$ to zero helps find vertical asymptotes or holes, not x-intercepts."}, {"text": "$f(0) = 0$", "isCorrect": false, "rationale": "Evaluating $f(0)$ finds the y-intercept. For an x-intercept, we need the output $f(x)$ to be zero, not the input $x$ to be zero."}, {"text": "$p(x) = 0$ and $q(x) \\neq 0$ at that $x$ value.", "isCorrect": true, "rationale": "The text states, 'x-intercepts: Set the numerator equal to zero (and check that the denominator is nonzero there).' This ensures the function is defined at that point and crosses the x-axis."}, {"text": "The degrees of $p(x)$ and $q(x)$ must be equal.", "isCorrect": false, "rationale": "Comparing degrees is used to find horizontal asymptotes, not x-intercepts."}]}, {"question": "Identify the vertical asymptotes of the function $h(x) = (3x - 6)/(x^2 - 4)$.", "options": [{"text": "$x = 2$ and $x = -2$", "isCorrect": false, "rationale": "Factoring gives $h(x) = 3(x-2)/((x-2)(x+2))$. The common factor $(x-2)$ indicates a hole at $x=2$, not a vertical asymptote. Only the non-canceled factor $(x+2)$ leads to a VA."}, {"text": "$x = 2$ only", "isCorrect": false, "rationale": "After simplifying, $x=2$ corresponds to a hole, not a vertical asymptote, as the simplified denominator is non-zero at $x=2$ (i.e., $3/(2+2) = 3/4$). The original denominator being zero at $x=2$ only indicates it's not in the domain."}, {"text": "$x = -2$ only", "isCorrect": true, "rationale": "First, simplify the function: $h(x) = (3(x-2))/((x-2)(x+2))$. For $x \\neq 2$, $h(x) = 3/(x+2)$. The simplified denominator $(x+2)$ equals zero when $x = -2$. Thus, $x = -2$ is the only vertical asymptote."}, {"text": "There are no vertical asymptotes.", "isCorrect": false, "rationale": "After simplification, the denominator $x+2$ is zero at $x=-2$, which creates a vertical asymptote."}]}, {"question": "Which of the following represents the correct sequence of steps when sketching a rational function graph, as outlined in the text?", "options": [{"text": "Intercepts, Simplify, Asymptotes, Sign chart, Sketch.", "isCorrect": false, "rationale": "Simplifying is the crucial first step to correctly identify asymptotes and domain restrictions. This sequence puts intercepts before simplifying and asymptotes."}, {"text": "Simplify, Vertical asymptotes, Horizontal asymptote, Intercepts, Sign chart, Sketch.", "isCorrect": true, "rationale": "This sequence exactly matches the 'Sketching Procedure' enumerated in the text: Simplify, Vertical asymptotes, Horizontal asymptote, Intercepts, Sign chart, Sketch."}, {"text": "Horizontal asymptote, Vertical asymptotes, Simplify, Intercepts, Sign chart, Sketch.", "isCorrect": false, "rationale": "Simplifying must occur before identifying asymptotes to ensure they are correctly determined from the simplified function. This sequence also reverses the order of identifying horizontal and vertical asymptotes."}, {"text": "Simplify, Sign chart, Asymptotes, Intercepts, Sketch.", "isCorrect": false, "rationale": "Asymptotes and intercepts should be found before creating a sign chart, as they define the critical values and key points for the chart. This sequence puts the sign chart too early."}]}, {"question": "A rational function has a vertical asymptote at $x = -3$, a horizontal asymptote at $y = 5$, and an $x$-intercept at $x = 1$. Which of the following functions satisfies these conditions?", "options": [{"text": "$f(x) = (5(x-1))/(x+3)$", "isCorrect": true, "rationale": "VA at $x=-3$: The denominator is $(x+3)$. HA at $y=5$: Degrees are equal (1), and ratio of leading coefficients is $5/1 = 5$. X-intercept at $x=1$: The numerator is zero when $x=1$, i.e., $5(1-1) = 0$. This function meets all given criteria."}, {"text": "$f(x) = (x-1)/(5(x+3))$", "isCorrect": false, "rationale": "While it has a VA at $x=-3$ and an x-intercept at $x=1$, the horizontal asymptote would be $y=1/5$, not $y=5$."}, {"text": "$f(x) = (x+3)/(5(x-1))$", "isCorrect": false, "rationale": "This function has a VA at $x=1$ (not $x=-3$) and an x-intercept at $x=-3$ (not $x=1$). The HA would be $y=1/5$."}, {"text": "$f(x) = (5(x+1))/(x-3)$", "isCorrect": false, "rationale": "This function has a VA at $x=3$ (not $x=-3$) and an x-intercept at $x=-1$ (not $x=1$). The HA is $y=5$."}]}, {"question": "For the function $f(x) = (4x + 8)/(x^2 + 5x + 6)$, identify all vertical and horizontal asymptotes and $x$-intercepts.", "options": [{"text": "VA: $x = -2$, HA: $y = 0$, $x$-intercept: $x = -2$.", "isCorrect": false, "rationale": "After simplifying $f(x)$, $x=-2$ is a hole, not a vertical asymptote or x-intercept of the simplified function. The HA is correct."}, {"text": "VA: $x = -3$, HA: $y = 4$, $x$-intercept: $x = -2$.", "isCorrect": false, "rationale": "The VA at $x=-3$ is correct. However, the HA is $y=0$ (n<d), not $y=4$. Also, $x=-2$ is a hole, not an x-intercept."}, {"text": "VA: $x = -3$, HA: $y = 0$, No $x$-intercept.", "isCorrect": true, "rationale": "First, simplify: $f(x) = (4(x+2))/((x+2)(x+3))$. For $x \\neq -2$, $f(x) = 4/(x+3)$. From the simplified form: VA at $x=-3$ (denominator is zero). HA at $y=0$ (degree of numerator 0 < degree of denominator 1). No x-intercept because the numerator, 4, is never zero."}, {"text": "VA: $x = -3$ and $x = -2$, HA: $y = 0$, $x$-intercept: $x = -2$.", "isCorrect": false, "rationale": "When simplifying the function, the factor $(x+2)$ cancels, meaning $x=-2$ corresponds to a hole, not a vertical asymptote. There are no x-intercepts after simplification."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
