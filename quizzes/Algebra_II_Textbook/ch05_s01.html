<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following expressions is NOT a polynomial, according to the definition provided?", "options": [{"text": "A. 3x^4 - 2x + 1", "isCorrect": false, "rationale": "This is a polynomial because all exponents on the variable x are non-negative integers (4, 1, and 0 for the constant term) and the coefficients are real numbers."}, {"text": "B. 7", "isCorrect": false, "rationale": "This is a constant polynomial, which is a valid polynomial with a degree of 0 (7x^0). The exponent is a non-negative integer."}, {"text": "C. 5x^(1/2) - 3", "isCorrect": true, "rationale": "This is not a polynomial because it contains a fractional exponent (1/2) on the variable x. The definition states that n must be a non-negative integer."}, {"text": "D. -x^2 + πx - √2", "isCorrect": false, "rationale": "This is a polynomial because all exponents on x are non-negative integers (2, 1, 0) and the coefficients (-​1, π, -√2) are real numbers, which is allowed."}]}, {"question": "For the polynomial P(x) = 6x - 2x^3 + 5 - 4x^4, what is the leading coefficient and the constant term?", "options": [{"text": "A. Leading coefficient: 6, Constant term: 5", "isCorrect": false, "rationale": "The polynomial is not in standard form. The leading coefficient is from the highest-degree term, which is -4x^4, making the leading coefficient -4."}, {"text": "B. Leading coefficient: -4, Constant term: 5", "isCorrect": true, "rationale": "First, write the polynomial in standard form: -4x^4 - 2x^3 + 6x + 5. The highest exponent is 4, so the leading term is -4x^4, and its coefficient is -4. The term with no variable factor is the constant term, which is 5."}, {"text": "C. Leading coefficient: -2, Constant term: 1", "isCorrect": false, "rationale": "The leading coefficient is determined by the highest-degree term, not necessarily the second highest. The constant term is 5, not 1."}, {"text": "D. Leading coefficient: 5, Constant term: -4", "isCorrect": false, "rationale": "The leading coefficient is -4, not 5. The constant term is 5, not -4. This option incorrectly swaps their values and identifies the constant as a coefficient of a term."}]}, {"question": "Write the polynomial 7x^2 - 12 + 5x^5 - x^3 in standard form and identify its degree.", "options": [{"text": "A. 5x^5 - x^3 + 7x^2 - 12; Degree: 5", "isCorrect": true, "rationale": "Standard form requires terms to be arranged in descending order of degree. The term with the highest degree is 5x^5, followed by -x^3, then 7x^2, and finally the constant term -12. The highest exponent is 5, so the degree is 5."}, {"text": "B. 7x^2 - x^3 + 5x^5 - 12; Degree: 2", "isCorrect": false, "rationale": "This is not in standard form as the degrees are not in descending order. The degree of the polynomial is the highest exponent, which is 5, not 2."}, {"text": "C. -12 + 7x^2 - x^3 + 5x^5; Degree: 0", "isCorrect": false, "rationale": "This is not in standard form. The degree of the polynomial is the highest exponent, which is 5, not 0 (which would be for a constant polynomial)."}, {"text": "D. 5x^5 - 12 - x^3 + 7x^2; Degree: 5", "isCorrect": false, "rationale": "While the degree is correctly identified as 5, the terms are not fully in descending order of degree (e.g., -12 comes before -x^3 and 7x^2). Standard form requires all terms to be in descending order."}]}, {"question": "After combining like terms, what is the classification of the polynomial P(x) = (3x^2 + 2x - 5) - (3x^2 - x + 1)?", "options": [{"text": "A. Monomial", "isCorrect": false, "rationale": "After simplification, the polynomial has two terms, not one. A monomial has exactly one term."}, {"text": "B. Binomial", "isCorrect": true, "rationale": "First, distribute the negative sign: 3x^2 + 2x - 5 - 3x^2 + x - 1. Then combine like terms: (3x^2 - 3x^2) + (2x + x) + (-5 - 1) = 0x^2 + 3x - 6 = 3x - 6. This simplified polynomial has two terms (3x and -6), making it a binomial."}, {"text": "C. Trinomial", "isCorrect": false, "rationale": "After simplification, the polynomial has two terms, not three. A trinomial has exactly three terms."}, {"text": "D. Constant", "isCorrect": false, "rationale": "After simplification, the polynomial is 3x - 6, which contains a variable term (3x). A constant polynomial has only a constant term (degree 0)."}]}, {"question": "Which of the following statements correctly identifies like terms and their combination?", "options": [{"text": "A. 3x^2 and 5x^4 are like terms; their sum is 8x^6.", "isCorrect": false, "rationale": "Like terms must have identical variable parts (same variable raised to the same exponent). x^2 and x^4 have different exponents, so they are not like terms and cannot be combined in this way."}, {"text": "B. 2x and -4x are like terms; their sum is -2x.", "isCorrect": true, "rationale": "Both terms have the variable part 'x' (which means x^1), so they are like terms. To combine them, add their coefficients: 2 + (-4) = -2, resulting in -2x."}, {"text": "C. 6x^3 and 6x are like terms; their sum is 12x^4.", "isCorrect": false, "rationale": "x^3 and x have different exponents, so they are not like terms and cannot be combined. The sum 12x^4 incorrectly adds the coefficients and multiplies the exponents."}, {"text": "D. 8x^2 and 3x^2 are not like terms because their coefficients are different.", "isCorrect": false, "rationale": "This statement is incorrect. Like terms are defined by their identical variable parts (x^2 in this case), not by their coefficients. Different coefficients are precisely what allows them to be combined (e.g., 8x^2 + 3x^2 = 11x^2)."}]}, {"question": "Simplify the expression: (4x^2 - 3x + 1) + (2x^2 + 5x - 7).", "options": [{"text": "A. 6x^2 - 8x - 6", "isCorrect": false, "rationale": "The x-terms are combined incorrectly: (-3x) + (5x) = 2x, not -8x."}, {"text": "B. 6x^2 + 2x + 8", "isCorrect": false, "rationale": "The constant terms are combined incorrectly: (1) + (-7) = -6, not 8."}, {"text": "C. 6x^2 + 2x - 6", "isCorrect": true, "rationale": "To add polynomials, collect like terms and add their coefficients: (4x^2 + 2x^2) + (-3x + 5x) + (1 - 7) = 6x^2 + 2x - 6."}, {"text": "D. 2x^2 - 8x - 6", "isCorrect": false, "rationale": "The x^2 terms are combined incorrectly: (4x^2) + (2x^2) = 6x^2, not 2x^2."}]}, {"question": "Subtract: (5x^3 - 2x^2 + 4) - (3x^3 + x^2 - 6x + 1).", "options": [{"text": "A. 2x^3 - x^2 - 6x + 5", "isCorrect": false, "rationale": "The -2x^2 and -x^2 terms combine to -3x^2, not -x^2. The -(-6x) becomes +6x, not -6x. The constant terms combine to 4 - 1 = 3, not 5."}, {"text": "B. 2x^3 - 3x^2 + 6x + 3", "isCorrect": true, "rationale": "First, distribute the negative sign to the second polynomial: 5x^3 - 2x^2 + 4 - 3x^3 - x^2 + 6x - 1. Then, group and combine like terms: (5x^3 - 3x^3) + (-2x^2 - x^2) + 6x + (4 - 1) = 2x^3 - 3x^2 + 6x + 3."}, {"text": "C. 2x^3 - 3x^2 - 6x + 5", "isCorrect": false, "rationale": "The -(-6x) should become +6x, not -6x. The constant terms combine to 4 - 1 = 3, not 5."}, {"text": "D. 8x^3 - x^2 - 6x + 5", "isCorrect": false, "rationale": "The x^3 terms should be subtracted, not added: 5x^3 - 3x^3 = 2x^3, not 8x^3. Other terms are also incorrect."}]}, {"question": "Let P(x) = 2x^3 - 5x^2 + x - 4. Evaluate P(-2).", "options": [{"text": "A. -42", "isCorrect": true, "rationale": "Substitute x = -2 into the polynomial: P(-2) = 2(-2)^3 - 5(-2)^2 + (-2) - 4 = 2(-8) - 5(4) - 2 - 4 = -16 - 20 - 2 - 4 = -42. Be careful with signs when raising negative numbers to exponents."}, {"text": "B. -34", "isCorrect": false, "rationale": "This result indicates an error in calculation, possibly in summing the terms correctly or in the sign of one of the terms, such as incorrectly evaluating -(-2) as +2 instead of -2."}, {"text": "C. 8", "isCorrect": false, "rationale": "This is the value for P(3) from the example in the textbook, not P(-2)."}, {"text": "D. 10", "isCorrect": false, "rationale": "This result suggests significant errors in evaluating the terms, such as sign errors or incorrect exponentiation (e.g., treating (-2)^2 as -4 or 2(-8) as +16)."}]}, {"question": "Let Q(x) = x^2 - 3x + 2. Find Q(a-1) and simplify.", "options": [{"text": "A. a^2 - a", "isCorrect": false, "rationale": "This is the result for evaluating Q(a+1) from the textbook example, not Q(a-1). The terms would combine differently with a (a-1) substitution."}, {"text": "B. a^2 - 5a + 6", "isCorrect": true, "rationale": "Substitute (a-1) for x: Q(a-1) = (a-1)^2 - 3(a-1) + 2. Expand: (a^2 - 2a + 1) - (3a - 3) + 2. Distribute: a^2 - 2a + 1 - 3a + 3 + 2. Combine like terms: a^2 + (-2a - 3a) + (1 + 3 + 2) = a^2 - 5a + 6."}, {"text": "C. a^2 - 4a + 4", "isCorrect": false, "rationale": "This result likely comes from an error in expanding (a-1)^2 or in distributing -3, or in combining the constant terms."}, {"text": "D. a^2 - 3a + 2", "isCorrect": false, "rationale": "This is the original polynomial Q(x) itself, indicating that no substitution or simplification occurred."}]}, {"question": "Consider two polynomials P(x) = 5x^4 - 2x^3 + x and Q(x) = -5x^4 + 3x^2 - 7. What is the degree of the polynomial P(x) + Q(x)?", "options": [{"text": "A. 4", "isCorrect": false, "rationale": "Although both P(x) and Q(x) individually have a degree of 4, the leading terms (5x^4 and -5x^4) cancel out when added, reducing the degree of the sum. The degree of a sum or difference is at most the larger of the individual degrees, but can be lower if leading terms cancel."}, {"text": "B. 8", "isCorrect": false, "rationale": "The degree of a sum is not the sum of the degrees of the individual polynomials. This would be the case for multiplication, not addition."}, {"text": "C. 3", "isCorrect": true, "rationale": "P(x) + Q(x) = (5x^4 - 2x^3 + x) + (-5x^4 + 3x^2 - 7) = (5x^4 - 5x^4) - 2x^3 + 3x^2 + x - 7 = -2x^3 + 3x^2 + x - 7. The highest exponent in the resulting polynomial is 3, so its degree is 3."}, {"text": "D. 0", "isCorrect": false, "rationale": "The resulting polynomial is -2x^3 + 3x^2 + x - 7, which is clearly not a constant polynomial (degree 0). A degree of 0 would mean the polynomial is just a number."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
