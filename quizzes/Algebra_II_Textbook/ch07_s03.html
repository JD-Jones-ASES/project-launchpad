    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements best describes the fundamental purpose of a logarithm $log_b(x)$?", "options": [{"text": "It calculates the base $b$ given $x$ and the exponent.", "isCorrect": false, "rationale": "The base $b$ is a given component of the logarithm, not what the logarithm calculates. The logarithm seeks an exponent."}, {"text": "It determines the result of raising $b$ to the power of $x$.", "isCorrect": false, "rationale": "This describes an exponential function, $b^x$, not a logarithm. A logarithm finds the exponent."}, {"text": "It finds the exponent to which $b$ must be raised to obtain $x$.", "isCorrect": true, "rationale": "This correctly captures the definition of a logarithm: $log_b(x) = y$ means $b^y = x$. The logarithm $y$ is the exponent on $b$ that yields $x$."}, {"text": "It represents the inverse of $x$ in terms of base $b$.", "isCorrect": false, "rationale": "While a logarithm is the inverse of an exponential function, this statement is vague and doesn't precisely define what the logarithm computes. It finds an exponent, not just 'an inverse'."}]}, {"question": "Convert the exponential equation $7^{-2} = \\frac{1}{49}$ into its equivalent logarithmic form.", "options": [{"text": "$log_7(-2) = \\frac{1}{49}$", "isCorrect": false, "rationale": "The argument of a logarithm must be positive ($x>0$), and the base of the logarithm is the base of the exponential term (7), not the exponent itself (-2)."}, {"text": "$log_{-2}(7) = \\frac{1}{49}$", "isCorrect": false, "rationale": "The base of a logarithm ($b$) must be positive and not equal to 1. Here, the proposed base is negative, which is not allowed. Also, the base should be 7, not -2."}, {"text": "$log_7(\\frac{1}{49}) = -2$", "isCorrect": true, "rationale": "Using the definition $b^y = x \\iff log_b(x) = y$, where $b=7$, $y=-2$, and $x=\\frac{1}{49}$. This conversion is correct."}, {"text": "$log_{\\frac{1}{49}}(7) = -2$", "isCorrect": false, "rationale": "The base of the logarithm should be the base of the exponential expression (7), not the result ($1/49$). The base must also be greater than 0 and not equal to 1."}]}, {"question": "Without using a calculator, evaluate the expression $log(1000) + ln(e^{-3})$.", "options": [{"text": "-1", "isCorrect": false, "rationale": "$log(1000) = log_{10}(10^3) = 3$. $ln(e^{-3}) = log_e(e^{-3}) = -3$. The sum is $3 + (-3) = 0$, not -1."}, {"text": "0", "isCorrect": true, "rationale": "The common logarithm $log(1000)$ is $log_{10}(10^3)$, which evaluates to 3 using the inverse property $log_b(b^x) = x$. The natural logarithm $ln(e^{-3})$ is $log_e(e^{-3})$, which evaluates to -3 using the same property. Therefore, $3 + (-3) = 0$."}, {"text": "3", "isCorrect": false, "rationale": "This is only the value of $log(1000)$, neglecting $ln(e^{-3})$."}, {"text": "6", "isCorrect": false, "rationale": "This would be if both terms were positive 3, or if the operation was multiplication, neither of which is correct."}]}, {"question": "Simplify the expression $10^{log(5x)} - log_e(e^{(x-2)})$.", "options": [{"text": "$4x + 2$", "isCorrect": true, "rationale": "Using the inverse properties, $10^{log(5x)} = 5x$ (since $log$ is base 10). Similarly, $log_e(e^{(x-2)})$ simplifies to $x-2$. So, the expression becomes $5x - (x-2) = 5x - x + 2 = 4x + 2$."}, {"text": "$6x - 2$", "isCorrect": false, "rationale": "This error likely resulted from adding $x$ instead of subtracting it, or incorrectly distributing the negative sign."}, {"text": "$5x - (x-2)$", "isCorrect": false, "rationale": "While this is a correct intermediate step after applying the inverse properties, the question asks to 'simplify the expression', implying the final combined form."}, {"text": "$4x - 2$", "isCorrect": false, "rationale": "This error likely resulted from incorrectly distributing the negative sign to $(x-2)$, resulting in $5x - x - 2 = 4x - 2$."}]}, {"question": "Which expression is equivalent to $log_5(25y)$ for $y > 0$?", "options": [{"text": "$2 + log_5(y)$", "isCorrect": true, "rationale": "Using the product rule, $log_5(25y) = log_5(25) + log_5(y)$. Since $log_5(25)$ means 'what power of 5 gives 25?', which is 2, the expression simplifies to $2 + log_5(y)$."}, {"text": "$log_5(25) \\cdot log_5(y)$", "isCorrect": false, "rationale": "The product rule states that $log_b(MN) = log_b M + log_b N$, not multiplication of logarithms."}, {"text": "$log_5(y) + 25$", "isCorrect": false, "rationale": "$log_5(25)$ evaluates to 2, not 25. An evaluation error occurred here."}, {"text": "$log_5(5) + log_5(y)$", "isCorrect": false, "rationale": "This would be equivalent to $log_5(5y)$. $log_5(25)$ is 2, not $log_5(5)$ (which is 1)."}]}, {"question": "Expand the logarithm $log_2(\\frac{x^3}{16})$.", "options": [{"text": "$3log_2(x) - 4$", "isCorrect": true, "rationale": "First, apply the quotient rule: $log_2(\\frac{x^3}{16}) = log_2(x^3) - log_2(16)$. Next, apply the power rule: $3log_2(x) - log_2(16)$. Finally, evaluate $log_2(16)$, which is 4 (since $2^4 = 16$). So, the fully expanded expression is $3log_2(x) - 4$."}, {"text": "$log_2(x) - log_2(16)$", "isCorrect": false, "rationale": "This correctly applies the quotient rule but fails to apply the power rule to $x^3$ and evaluate $log_2(16)$."}, {"text": "$log_2(x^3) + log_2(16)$", "isCorrect": false, "rationale": "This incorrectly uses the product rule instead of the quotient rule for division."}, {"text": "$3log_2(x) - 2$", "isCorrect": false, "rationale": "This applies the power rule but incorrectly evaluates $log_2(16)$ as 2 instead of 4."}]}, {"question": "Fully expand the expression $ln(\\frac{x^2 \\sqrt{y}}{z^3})$, assuming $x, y, z > 0$.", "options": [{"text": "$2ln(x) + \\frac{1}{2}ln(y) - 3ln(z)$", "isCorrect": true, "rationale": "Using the quotient rule: $ln(x^2\\sqrt{y}) - ln(z^3)$. Using the product rule: $ln(x^2) + ln(\\sqrt{y}) - ln(z^3)$. Using the power rule: $2ln(x) + ln(y^{1/2}) - 3ln(z)$, which becomes $2ln(x) + \\frac{1}{2}ln(y) - 3ln(z)$."}, {"text": "$2ln(x) + 2ln(y) - 3ln(z)$", "isCorrect": false, "rationale": "This option incorrectly applies the power rule to $\\sqrt{y}$, treating it as $y^2$ instead of $y^{1/2}$."}, {"text": "$ln(x^2) + ln(\\sqrt{y}) + ln(z^3)$", "isCorrect": false, "rationale": "This option incorrectly uses the product rule for $z^3$ (it should be subtraction) and does not fully apply the power rule to all terms."}, {"text": "$ln(2x) + ln(\\frac{1}{2}y) - ln(3z)$", "isCorrect": false, "rationale": "This option incorrectly moves coefficients into the logarithm's argument as multiplication, rather than applying them as exponents to the variable."}]}, {"question": "Condense the expression $4log(a) - log(b) + \\frac{1}{3}log(c)$ into a single logarithm, assuming $a, b, c > 0$.", "options": [{"text": "$log(\\frac{4ac}{3b})$", "isCorrect": false, "rationale": "The coefficients $4$ and $\\frac{1}{3}$ become exponents, not multipliers in the argument. The $3$ in the denominator is incorrect."}, {"text": "$log(\\frac{a^4 \\sqrt[3]{c}}{b})$", "isCorrect": true, "rationale": "First, apply the power rule: $log(a^4) - log(b) + log(c^{1/3})$. Then, use the product and quotient rules to combine: $log(a^4) + log(c^{1/3}) - log(b) = log(a^4 c^{1/3}) - log(b) = log(\\frac{a^4 c^{1/3}}{b})$. Since $c^{1/3} = \\sqrt[3]{c}$, the expression is $log(\\frac{a^4 \\sqrt[3]{c}}{b})$."}, {"text": "$log(a^4 - b + \\sqrt[3]{c})$", "isCorrect": false, "rationale": "Logarithms do not condense by performing addition and subtraction directly on their arguments. The properties involve combining arguments through multiplication and division, after applying the power rule."}, {"text": "$log(\\frac{a^4 \\cdot c}{3b})$", "isCorrect": false, "rationale": "The coefficient $\\frac{1}{3}$ becomes an exponent (cubic root), not a divisor of the argument $c$ or a multiplier of $b$."}]}, {"question": "To evaluate $log_4(50)$ using common logarithms (base 10), which of the following expressions is correct?", "options": [{"text": "$\\frac{log_{10}(4)}{log_{10}(50)}$", "isCorrect": false, "rationale": "The argument of the original logarithm (50) should be in the numerator, and the base of the original logarithm (4) should be in the denominator."}, {"text": "$log_{10}(50) - log_{10}(4)$", "isCorrect": false, "rationale": "This expression is equivalent to $log_{10}(\\frac{50}{4})$, which is not the change-of-base formula for $log_4(50)$."}, {"text": "$\\frac{log_{10}(50)}{log_{10}(4)}$", "isCorrect": true, "rationale": "The change-of-base formula states that $log_b(x) = \\frac{log_a(x)}{log_a(b)}$. Here, $b=4$, $x=50$, and choosing $a=10$ (for common logarithms) gives $log_4(50) = \\frac{log_{10}(50)}{log_{10}(4)}$."}, {"text": "$log_{10}(\\frac{50}{4})$", "isCorrect": false, "rationale": "This is equivalent to $log_{10}(12.5)$, which is not $log_4(50)$. The change-of-base formula uses a ratio of separate logarithms, not a logarithm of a ratio."}]}, {"question": "Determine the domain of the function $h(x) = log_2(x^2 - 5x + 6)$.", "options": [{"text": "$(2, 3)$", "isCorrect": false, "rationale": "In the interval $(2,3)$, the quadratic $x^2 - 5x + 6$ would be negative, which is not allowed for the argument of a logarithm."}, {"text": "$$(-\\infty, 2) \\cup (3, \\infty)$$", "isCorrect": true, "rationale": "The argument of a logarithm must be strictly positive. So, we need $x^2 - 5x + 6 > 0$. Factoring the quadratic yields $(x-2)(x-3) > 0$. A sign analysis of this inequality shows that it is true when $x < 2$ or $x > 3$. Thus, the domain is $(-\\infty, 2) \\cup (3, \\infty)$."}, {"text": "$$(-\\infty, 2]$$", "isCorrect": false, "rationale": "This interval includes $x=2$ where the argument is zero, which is not allowed. It also excludes the portion of the domain where $x > 3$."}, {"text": "$$(3, \\infty)$$", "isCorrect": false, "rationale": "This interval is only part of the correct domain. It excludes the portion of the domain where $x < 2$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
