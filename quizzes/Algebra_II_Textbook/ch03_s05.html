        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the primary advantage of transforming a quadratic expression into a perfect square trinomial using the completing the square method?", "options": [{"text": "It simplifies the expression for easier factoring over integers.", "isCorrect": false, "rationale": "While factoring can be a goal, completing the square is particularly useful when polynomials do not factor nicely over integers. Its primary advantage for solving is different."}, {"text": "It allows the equation to be solved directly using the square-root method.", "isCorrect": true, "rationale": "The text states that completing the square 'transforms any quadratic expression into a perfect square trinomial plus a constant, making the equation solvable by the square-root method'."}, {"text": "It directly provides the discriminant of the quadratic equation.", "isCorrect": false, "rationale": "Completing the square is the method used to derive the quadratic formula, which contains the discriminant, but the transformation itself does not directly yield the discriminant as its primary advantage."}, {"text": "It guarantees that the quadratic equation will have only real solutions.", "isCorrect": false, "rationale": "The nature of the solutions (real or complex) is determined by the discriminant, not by the act of completing the square itself. Completing the square can lead to real or complex solutions depending on the original equation."}]}, {"question": "To transform the expression \\(x^2 + 12x\\) into a perfect square trinomial, what constant term must be added?", "options": [{"text": "6", "isCorrect": false, "rationale": "This value (b/2) is half of the linear coefficient, not the constant term needed to complete the square."}, {"text": "12", "isCorrect": false, "rationale": "This is the linear coefficient itself, not the constant term needed to complete the square."}, {"text": "36", "isCorrect": true, "rationale": "According to the property for completing the square (Monic), to make \\(x^2+bx\\) a perfect square trinomial, one must add \\((b/2)^2\\). Here, \\(b=12\\), so \\((12/2)^2 = 6^2 = 36\\)."}, {"text": "144", "isCorrect": false, "rationale": "This value (b^2) is the square of the linear coefficient, not the constant term needed to complete the square."}]}, {"question": "A student is solving the equation \\(x^2 - 10x + 7 = 0\\) by completing the square. Which of the following is a correct step in this process?", "options": [{"text": "Add 25 to the left side and subtract 7 from the right side.", "isCorrect": false, "rationale": "The first step is to move the constant to the right side, changing its sign (from +7 to -7), then add \\((b/2)^2\\) to both sides. Subtracting 7 from the right is incorrect."}, {"text": "Rewrite the equation as \\((x-5)^2 = 18\\).", "isCorrect": true, "rationale": "First, move the constant: \\(x^2 - 10x = -7\\). Then, add \\(( -10/2)^2 = (-5)^2 = 25\\) to both sides: \\(x^2 - 10x + 25 = -7 + 25\\). This simplifies to \\((x-5)^2 = 18\\)."}, {"text": "Divide all terms by -10 to simplify the linear coefficient.", "isCorrect": false, "rationale": "Dividing by the linear coefficient is not a standard step in completing the square. Division is typically only done if the leading coefficient (of \\(x^2\\)) is not 1."}, {"text": "Move the constant 7 to the right side, resulting in \\(x^2 - 10x = 7\\), then factor the left side as \\((x-5)^2\\).", "isCorrect": false, "rationale": "Moving the constant is correct, but the left side \\(x^2 - 10x\\) is not a perfect square trinomial and cannot be factored as \\((x-5)^2\\) until the appropriate constant term (25) is added."}]}, {"question": "Solve the equation \\(x^2 - 4x - 5 = 0\\) by completing the square.", "options": [{"text": "\\(x = 2 \\pm \\sqrt{21}\\)", "isCorrect": false, "rationale": "This result would occur if, after moving the constant and completing the square, the right side became 21. For this equation, the right side becomes 9."}, {"text": "\\(x = 5, x = -1\\)", "isCorrect": true, "rationale": "1. Move constant: \\(x^2 - 4x = 5\\). 2. Add \\(( -4/2)^2 = 4\\) to both sides: \\(x^2 - 4x + 4 = 5 + 4\\). 3. Factor left: \\((x-2)^2 = 9\\). 4. Take square roots: \\(x-2 = \\pm 3\\). 5. Solve for \\(x\\): \\(x = 2 \\pm 3\\), so \\(x=5\\) or \\(x=-1\\)."}, {"text": "\\(x = -2 \\pm 3\\)", "isCorrect": false, "rationale": "The constant term from the perfect square trinomial should be positive when moved to the right side of the equation (i.e., \\(x-2\\) not \\(x+2\\)). Also, \\(\\sqrt{9}\\) should be simplified to 3."}, {"text": "\\(x = 4 \\pm \\sqrt{5}\\)", "isCorrect": false, "rationale": "This would result from a different equation and incorrect application of the square root property."}]}, {"question": "What is the first step when solving \\(3x^2 + 6x - 9 = 0\\) by completing the square?", "options": [{"text": "Move the constant term -9 to the right side.", "isCorrect": false, "rationale": "While moving the constant is a step, it is not the *first* step when the leading coefficient is not 1. The equation must first be made monic."}, {"text": "Add \\((6/2)^2\\) to both sides of the equation.", "isCorrect": false, "rationale": "Adding \\((b/2)^2\\) is done after the equation is monic (leading coefficient is 1) and the constant has been moved. Doing it before dividing by 3 would use the wrong 'b' value."}, {"text": "Divide every term in the equation by 3.", "isCorrect": true, "rationale": "The text explicitly states: 'When the leading coefficient is not \\(1\\), divide through by \\(a\\) first.' In this case, \\(a=3\\)."}, {"text": "Apply the quadratic formula directly.", "isCorrect": false, "rationale": "The question specifically asks for the first step *when solving by completing the square*, not by using the quadratic formula."}]}, {"question": "The Quadratic Formula is derived using which fundamental algebraic technique?", "options": [{"text": "Factoring by grouping", "isCorrect": false, "rationale": "Factoring by grouping is a method for factoring some polynomials, but it is not used to derive the general quadratic formula."}, {"text": "Synthetic division", "isCorrect": false, "rationale": "Synthetic division is a shorthand method for polynomial division, primarily used for finding roots of higher-degree polynomials, not for deriving the quadratic formula."}, {"text": "Completing the square", "isCorrect": true, "rationale": "The section clearly states: 'Applying the completing-the-square procedure to the general equation \\(ax^2+bx+c=0\\) (\\(a \\neq 0\\)) yields the Quadratic Formula.'"}, {"text": "The discriminant method", "isCorrect": false, "rationale": "The discriminant is a component *within* the quadratic formula that helps classify the roots, but it is not the method used to derive the formula itself."}]}, {"question": "In the quadratic formula, \\(x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}\\), what is the term \\(b^2-4ac\\) specifically called?", "options": [{"text": "The determinant", "isCorrect": false, "rationale": "Determinants are concepts primarily used in linear algebra with matrices, not for this specific term in the quadratic formula."}, {"text": "The radicand", "isCorrect": false, "rationale": "While \\(b^2-4ac\\) is the expression under the radical (making it a radicand), it has a more specific and important name in the context of quadratic equations."}, {"text": "The discriminant", "isCorrect": true, "rationale": "The text defines this term explicitly: 'The discriminant of \\(ax^2+bx+c=0\\) is \\( \\Delta = b^2-4ac\\).'"}, {"text": "The coefficient", "isCorrect": false, "rationale": "Coefficients are the numerical factors of terms (a, b, and c in \\(ax^2+bx+c=0\\)), not the entire expression \\(b^2-4ac\\)."}]}, {"question": "Without solving the equation, what type of solutions does \\(2x^2 - 3x - 5 = 0\\) have?", "options": [{"text": "Two distinct real solutions", "isCorrect": true, "rationale": "Calculate the discriminant \\( \\Delta = b^2 - 4ac\\). Here, \\(a=2, b=-3, c=-5\\). So, \\( \\Delta = (-3)^2 - 4(2)(-5) = 9 - (-40) = 9 + 40 = 49\\). Since \\( \\Delta = 49 > 0\\), there are two distinct real solutions."}, {"text": "Exactly one real solution (repeated root)", "isCorrect": false, "rationale": "This would occur if the discriminant \\( \\Delta = 0\\), but it is 49 in this case."}, {"text": "Two complex (non-real) conjugate solutions", "isCorrect": false, "rationale": "This would occur if the discriminant \\( \\Delta < 0\\), but it is 49 in this case."}, {"text": "No solutions", "isCorrect": false, "rationale": "All quadratic equations have solutions, either real or complex. The discriminant helps classify them."}]}, {"question": "A quadratic equation's discriminant is found to be negative. What does this imply about the graph of its corresponding quadratic function \\(y = ax^2+bx+c\\)?", "options": [{"text": "The parabola intersects the x-axis at exactly one point.", "isCorrect": false, "rationale": "This occurs when the discriminant \\( \\Delta = 0\\), indicating one repeated real root, meaning the parabola touches the x-axis at its vertex."}, {"text": "The parabola does not intersect the x-axis at all.", "isCorrect": true, "rationale": "When the discriminant \\( \\Delta < 0\\), there are two complex (non-real) conjugate solutions. This means the parabola does not cross or touch the x-axis, as real roots correspond to x-intercepts."}, {"text": "The parabola intersects the x-axis at two distinct points.", "isCorrect": false, "rationale": "This occurs when the discriminant \\( \\Delta > 0\\), indicating two distinct real roots."}, {"text": "The parabola opens downwards.", "isCorrect": false, "rationale": "The direction the parabola opens (upwards or downwards) is determined by the sign of the leading coefficient \\(a\\), not by the discriminant."}]}, {"question": "A student attempts to solve \\(x^2 + 6x = 1\\) by adding \\((6/2)^2 = 9\\) to the left side only, resulting in \\((x+3)^2 = 1\\). What is the consequence of this error?", "options": [{"text": "The student correctly factored the left side, so the solutions will still be accurate.", "isCorrect": false, "rationale": "Factoring \\(x^2+6x+9\\) as \\((x+3)^2\\) is correct, but by adding 9 only to one side, the equation itself has been changed, leading to incorrect solutions for the original problem."}, {"text": "The equation solved is actually \\(x^2+6x+9=1\\), which is different from the original \\(x^2+6x=1\\). This will lead to incorrect solutions.", "isCorrect": true, "rationale": "The 'caution' note emphasizes that \\((b/2)^2\\) 'must be added to both sides. Adding it only to the left side changes the equation and produces wrong solutions.' The student created a new equation by adding 9 to only one side."}, {"text": "The student should have subtracted 9 from the right side instead of adding it to the left.", "isCorrect": false, "rationale": "To maintain equality, if a value is added to one side of an equation, it must be added to the other side as well. Subtracting would further alter the equation incorrectly."}, {"text": "The error will lead to complex solutions, regardless of the original equation's nature.", "isCorrect": false, "rationale": "The error doesn't necessarily dictate the type of solutions (real or complex); it simply ensures the solutions found are incorrect for the original equation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
