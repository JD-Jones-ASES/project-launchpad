    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is always the first step in the factoring strategy presented in this section?", "options": [{"text": "Check for a difference of squares.", "isCorrect": false, "rationale": "Checking for a difference of squares comes after factoring out the GCF and only when the polynomial has two terms."}, {"text": "Factor out the greatest common factor (GCF) from all terms.", "isCorrect": true, "rationale": "The factoring strategy explicitly states: 'GCF first. Factor out the greatest common factor from all terms.' This is always Step 1 before looking for more structure."}, {"text": "Use the AC method to split the middle term.", "isCorrect": false, "rationale": "The AC method applies to trinomials with a leading coefficient not equal to 1, but it is not the first step. The GCF must be factored out first."}, {"text": "Count the number of terms in the polynomial.", "isCorrect": false, "rationale": "Counting the terms is Step 2, performed after factoring out the GCF."}], "id": "q01"}, {"question": "What is the GCF of the polynomial 6x^3 - 9x^2 + 3x?", "options": [{"text": "3", "isCorrect": false, "rationale": "While 3 is the GCF of the coefficients, the GCF of a polynomial also includes the lowest power of each variable present. Since each term contains at least x^1, the GCF is 3x."}, {"text": "3x", "isCorrect": true, "rationale": "The GCF of the coefficients (6, 9, 3) is 3, and the lowest power of x present in all terms is x^1. Therefore the GCF is 3x, giving 3x(2x^2 - 3x + 1)."}, {"text": "3x^2", "isCorrect": false, "rationale": "Not all terms contain x^2. The term 3x only has x^1, so x^2 cannot be part of the GCF."}, {"text": "6x", "isCorrect": false, "rationale": "While 6 divides 6, it does not divide 9, so 6 is not the GCF of the coefficients."}], "id": "q02"}, {"question": "When factoring a trinomial x^2 + bx + c with leading coefficient 1, what two conditions must integers p and q satisfy?", "options": [{"text": "p + q = c and pq = b", "isCorrect": false, "rationale": "The conditions are reversed. The sum p + q must equal b (the linear coefficient) and the product pq must equal c (the constant term)."}, {"text": "p + q = b and pq = c", "isCorrect": true, "rationale": "For x^2 + bx + c = (x + p)(x + q), expanding gives x^2 + (p+q)x + pq. Matching coefficients requires p + q = b and pq = c."}, {"text": "p - q = b and p + q = c", "isCorrect": false, "rationale": "The factoring pattern requires p + q = b and pq = c, not subtraction."}, {"text": "p * q = b and p + q = c", "isCorrect": false, "rationale": "This reverses the roles: the product should equal c and the sum should equal b."}], "id": "q03"}, {"question": "Factor x^2 - 5x + 6 completely.", "options": [{"text": "(x - 1)(x - 6)", "isCorrect": false, "rationale": "While (-1)(-6) = 6, the sum -1 + (-6) = -7, not -5 as required."}, {"text": "(x + 2)(x + 3)", "isCorrect": false, "rationale": "This gives x^2 + 5x + 6, not x^2 - 5x + 6. Both signs must be negative."}, {"text": "(x - 2)(x - 3)", "isCorrect": true, "rationale": "We need p + q = -5 and pq = 6. Testing p = -2, q = -3: (-2) + (-3) = -5 and (-2)(-3) = 6. Check: (x-2)(x-3) = x^2 - 5x + 6."}, {"text": "(x + 1)(x - 6)", "isCorrect": false, "rationale": "While 1 + (-6) = -5, the product (1)(-6) = -6, not +6 as required."}], "id": "q04"}, {"question": "In the AC method for factoring ax^2 + bx + c, what is the key product computed in Step 1?", "options": [{"text": "ab", "isCorrect": false, "rationale": "The AC method multiplies the leading coefficient a by the constant term c, not by b."}, {"text": "bc", "isCorrect": false, "rationale": "The method is named the AC method precisely because it uses the product of a and c, not b and c."}, {"text": "ac", "isCorrect": true, "rationale": "Step 1 of the AC method states: 'Compute ac.' Then in Step 2, you find two integers m and n such that mn = ac and m + n = b."}, {"text": "a + c", "isCorrect": false, "rationale": "The AC method uses the product ac, not the sum a + c."}], "id": "q05"}, {"question": "Use the AC method to factor 6x^2 + 7x - 3. What are the correct values of m and n that split the middle term?", "options": [{"text": "m = 3, n = 4", "isCorrect": false, "rationale": "While 3 + 4 = 7, the product 3 * 4 = 12, not -18 as required (ac = 6 * (-3) = -18)."}, {"text": "m = 9, n = -2", "isCorrect": true, "rationale": "ac = 6(-3) = -18. We need mn = -18 and m + n = 7. Testing: 9 * (-2) = -18 and 9 + (-2) = 7. This splits the middle term to give 6x^2 + 9x - 2x - 3."}, {"text": "m = -9, n = 2", "isCorrect": false, "rationale": "While (-9)(2) = -18, the sum -9 + 2 = -7, which has the wrong sign."}, {"text": "m = 6, n = -3", "isCorrect": false, "rationale": "While 6 + (-3) = 3, not 7, and (6)(-3) = -18 satisfies the product but the sum is wrong."}], "id": "q06"}, {"question": "What is the complete factorization of 6x^3 - 9x^2 + 3x?", "options": [{"text": "3x(2x^2 - 3x + 1)", "isCorrect": false, "rationale": "This is only a partial factoring. The inner trinomial 2x^2 - 3x + 1 can be further factored using the AC method."}, {"text": "3x(x - 1)(2x - 1)", "isCorrect": true, "rationale": "First factor out the GCF: 3x(2x^2 - 3x + 1). Then factor 2x^2 - 3x + 1 by the AC method (ac = 2, m = -1, n = -2): 2x^2 - x - 2x + 1 = x(2x-1) - 1(2x-1) = (x-1)(2x-1). Complete: 3x(x-1)(2x-1)."}, {"text": "3(2x^3 - 3x^2 + x)", "isCorrect": false, "rationale": "This only factors out 3 from the coefficients but misses the common factor of x in every term."}, {"text": "x(6x^2 - 9x + 3)", "isCorrect": false, "rationale": "This only factors out x but not the common numerical factor 3. The GCF is 3x, not just x."}], "id": "q07"}, {"question": "Which of the following is the correct factorization of the difference of squares 4x^2 - 25?", "options": [{"text": "(2x - 5)^2", "isCorrect": false, "rationale": "Expanding (2x - 5)^2 gives 4x^2 - 20x + 25, which includes a middle term. The difference of squares formula produces two distinct factors."}, {"text": "(4x + 5)(x - 5)", "isCorrect": false, "rationale": "This does not match the difference of squares pattern. Each term must be written as a perfect square: 4x^2 = (2x)^2 and 25 = 5^2."}, {"text": "(2x + 5)(2x - 5)", "isCorrect": true, "rationale": "Write each term as a perfect square: 4x^2 = (2x)^2 and 25 = 5^2. Apply a^2 - b^2 = (a+b)(a-b): (2x+5)(2x-5)."}, {"text": "The expression is prime and cannot be factored.", "isCorrect": false, "rationale": "4x^2 - 25 is a difference of two perfect squares, which always factors as (a+b)(a-b)."}], "id": "q08"}, {"question": "Which polynomial is prime over the real numbers and cannot be factored?", "options": [{"text": "x^2 - 4", "isCorrect": false, "rationale": "This is a difference of squares: x^2 - 4 = (x+2)(x-2)."}, {"text": "x^2 + 4", "isCorrect": true, "rationale": "The section states: 'The sum a^2 + b^2 cannot be factored over the real numbers.' x^2 + 4 is a sum of squares and is therefore prime over the reals."}, {"text": "x^2 + 10x + 25", "isCorrect": false, "rationale": "This is a perfect square trinomial: x^2 + 10x + 25 = (x+5)^2."}, {"text": "x^2 - 8x + 16", "isCorrect": false, "rationale": "This is a perfect square trinomial: x^2 - 8x + 16 = (x-4)^2."}], "id": "q09"}, {"question": "Why does the section caution students to always check for a GCF before attempting other factoring methods?", "options": [{"text": "Because the GCF step is the only factoring method that always works.", "isCorrect": false, "rationale": "The GCF step does not fully factor a polynomial by itself; it simplifies the remaining polynomial so that further methods (trinomial factoring, difference of squares) can be applied more easily."}, {"text": "Because skipping the GCF step forces you to work with larger coefficients and you may miss a factor entirely.", "isCorrect": true, "rationale": "The caution box states: 'If you skip the GCF step, you will work with larger coefficients unnecessarily and may miss a factor entirely.' The example shows how pulling out 3x first simplifies the remaining trinomial."}, {"text": "Because the AC method cannot be used unless the GCF has been removed.", "isCorrect": false, "rationale": "The AC method can technically be applied without removing the GCF first, but the resulting work is harder and more error-prone."}, {"text": "Because the GCF determines whether the polynomial is prime.", "isCorrect": false, "rationale": "Whether a polynomial is prime depends on its structure after the GCF is removed, not on the GCF itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
