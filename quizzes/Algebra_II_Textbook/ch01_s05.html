<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

<script>
var QUESTIONS = [{"question": "Simplify the expression $(a^4 b^{-2})(a^{-1} b^5)$ and write the result with positive exponents only.", "options": [{"text": "a^3 / b^3", "isCorrect": false, "rationale": "This option incorrectly moves the 'b' term to the denominator, indicating a misunderstanding of negative exponents or product rule application."}, {"text": "a^3 b^3", "isCorrect": true, "rationale": "To simplify, group like bases and apply the Product Rule (a^m a^n = a^(m+n)). For 'a' terms: a^4 * a^-1 = a^(4 + (-1)) = a^3. For 'b' terms: b^-2 * b^5 = b^(-2 + 5) = b^3. The result is a^3 b^3, which uses only positive exponents."}, {"text": "a^5 b^7", "isCorrect": false, "rationale": "This option results from incorrectly adding all exponents (e.g., 4+1 for 'a' and 2+5 for 'b') without considering the negative signs, or incorrectly multiplying exponents."}, {"text": "a^4 b^5 / (a b^2)", "isCorrect": false, "rationale": "This option merely rearranges the terms without applying the exponent rules, or incorrectly converts negative exponents."}]}, {"question": "Which of the following statements about zero and negative exponents is true?", "options": [{"text": "0^0 = 1", "isCorrect": false, "rationale": "The text explicitly states that the expression 0^0 is undefined in this course. The rule a^0 = 1 holds only when a ≠ 0."}, {"text": "a^(-n) = -a^n for any non-zero real number a and positive integer n", "isCorrect": false, "rationale": "A negative exponent signals a reciprocal, not a negative output. The rule is a^(-n) = 1/a^n."}, {"text": "(5x)^0 = 1 for all real numbers x", "isCorrect": false, "rationale": "This statement is false because if x = 0, then (5x)^0 becomes 0^0, which is undefined. The rule a^0 = 1 requires a ≠ 0."}, {"text": "(-3)^(-2) = 1/9", "isCorrect": true, "rationale": "Applying the negative exponent rule: (-3)^(-2) = 1/(-3)^2. Then, (-3)^2 = 9. So, 1/9. This statement is true."}]}, {"question": "Calculate $(2.5 \times 10^4) \times (4.0 \times 10^{-7})$ and express the result in scientific notation.", "options": [{"text": "10.0 × 10^(-3)", "isCorrect": false, "rationale": "While the calculation is numerically correct, 10.0 is not in the correct format for scientific notation (1 ≤ a < 10). It needs to be adjusted to 1.0 × 10^1."}, {"text": "1.0 × 10^(-2)", "isCorrect": true, "rationale": "First, multiply the decimal parts: 2.5 × 4.0 = 10.0. Next, multiply the powers of 10: 10^4 × 10^-7 = 10^(4-7) = 10^-3. So, the result is 10.0 × 10^-3. To express this in scientific notation, adjust 10.0 to 1.0 × 10^1. Then, (1.0 × 10^1) × 10^-3 = 1.0 × 10^(1-3) = 1.0 × 10^-2."}, {"text": "1.0 × 10^(-3)", "isCorrect": false, "rationale": "This option fails to account for the adjustment needed when 2.5 × 4.0 results in 10.0, which means an additional factor of 10 must be carried over to the exponent."}, {"text": "1.0 × 10^(-11)", "isCorrect": false, "rationale": "This option incorrectly multiplies the exponents of 10 (4 × -7 = -28) instead of adding them, which is the Product Rule for exponents."}]}, {"question": "In the expression $\\sqrt[3]{27x^2}$, identify the index, radicand, and the principal square root of 9.", "options": [{"text": "Index is 3, radicand is 27. The principal square root of 9 is -3.", "isCorrect": false, "rationale": "The radicand is the entire expression under the radical sign, which is 27x^2, not just 27. Also, the principal square root is defined as the unique non-negative number, so -3 is incorrect."}, {"text": "Index is x^2, radicand is 27. The principal square root of 9 is 3.", "isCorrect": false, "rationale": "The index is the small number indicating the type of root (here, 3 for cube root), not x^2. The radicand is 27x^2, not just 27."}, {"text": "Index is 3, radicand is 27x^2. The principal square root of 9 is 3.", "isCorrect": true, "rationale": "In $\\sqrt[3]{27x^2}$, the index is 3 (the cube root), and the radicand is the entire expression under the radical, $27x^2$. The principal square root of 9 is indeed 3, because 3^2 = 9 and 3 is non-negative."}, {"text": "Index is 2 (implied), radicand is 27x^2. The principal square root of 9 is 3.", "isCorrect": false, "rationale": "The index is explicitly given as 3; it is not implied to be 2. An index of 2 is only implied for a square root ($\\sqrt{}$)."}]}, {"question": "Simplify the radical expression $\\sqrt{48a^5b^6}$, assuming $a \\ge 0$ and $b \\ge 0$.", "options": [{"text": "$16a^2b^3\\sqrt{3a}$", "isCorrect": false, "rationale": "This option incorrectly extracts the perfect square factor for 48. The largest perfect square factor of 48 is 16, and its square root is 4, not 16."}, {"text": "$4a^2b^3\\sqrt{3a}$", "isCorrect": true, "rationale": "To simplify, find the largest perfect square factors: $\\sqrt{48a^5b^6} = \\sqrt{(16 \\cdot 3) \\cdot (a^4 \\cdot a) \\cdot (b^6)}$. Extract the perfect squares: $\\sqrt{16} = 4$, $\\sqrt{a^4} = a^2$, $\\sqrt{b^6} = b^3$. The remaining terms inside the radical are $3a$. So, the simplified expression is $4a^2b^3\\sqrt{3a}$."}, {"text": "$4a^5b^6\\sqrt{3}$", "isCorrect": false, "rationale": "This option only extracts the perfect square from the numerical part (48) but fails to extract perfect square factors from the variable terms $a^5$ and $b^6$."}, {"text": "$4a^2b^3\\sqrt{3a^2}$", "isCorrect": false, "rationale": "This option incorrectly leaves an $a^2$ inside the radical. Since $a^2$ is a perfect square, it should be extracted as 'a'."}]}, {"question": "Rationalize the denominator of the expression $\\frac{7}{\\sqrt{14}}$.", "options": [{"text": "$\\frac{7\\sqrt{14}}{14}$", "isCorrect": false, "rationale": "This result is correct in rationalizing the denominator, but it is not fully simplified. The fraction 7/14 can be reduced."}, {"text": "$\\frac{\\sqrt{14}}{2}$", "isCorrect": true, "rationale": "To rationalize, multiply the numerator and denominator by $\\sqrt{14}$: $\\frac{7}{\\sqrt{14}} \\times \\frac{\\sqrt{14}}{\\sqrt{14}} = \\frac{7\\sqrt{14}}{14}$. Then, simplify the fraction $\\frac{7}{14}$ to $\\frac{1}{2}$. So the result is $\\frac{\\sqrt{14}}{2}$."}, {"text": "$7\\sqrt{14}$", "isCorrect": false, "rationale": "This option results from multiplying only the numerator by $\\sqrt{14}$ or from an incorrect cancellation, thus failing to rationalize the denominator."}, {"text": "$2\\sqrt{14}$", "isCorrect": false, "rationale": "This option shows incorrect arithmetic or an incorrect application of rationalization techniques."}]}, {"question": "Rationalize the denominator of the expression $\\frac{10}{3 - \\sqrt{7}}$.", "options": [{"text": "$15 + 5\\sqrt{7}$", "isCorrect": true, "rationale": "To rationalize a binomial denominator, multiply the numerator and denominator by the conjugate of the denominator. The conjugate of $3 - \\sqrt{7}$ is $3 + \\sqrt{7}$. So, $\\frac{10}{3 - \\sqrt{7}} \\times \\frac{3 + \\sqrt{7}}{3 + \\sqrt{7}} = \\frac{10(3 + \\sqrt{7})}{3^2 - (\\sqrt{7})^2} = \\frac{10(3 + \\sqrt{7})}{9 - 7} = \\frac{10(3 + \\sqrt{7})}{2}$. Finally, simplify by dividing the numerator by 2: $5(3 + \\sqrt{7}) = 15 + 5\\sqrt{7}$."}, {"text": "$\\frac{10(3 + \\sqrt{7})}{2}$", "isCorrect": false, "rationale": "This option correctly applies the conjugate and simplifies the denominator, but it does not perform the final division of 10 by 2, so it's not fully simplified."}, {"text": "$30 + 10\\sqrt{7}$", "isCorrect": false, "rationale": "This option results from only multiplying the numerator by the conjugate (or 10 by the conjugate directly) and neglecting to divide by the simplified denominator, which should be 2."}, {"text": "$\\frac{10(3 - \\sqrt{7})}{2}$", "isCorrect": false, "rationale": "This option incorrectly multiplies by the original denominator (or a non-conjugate) instead of its conjugate, resulting in an incorrect numerator."}]}, {"question": "A square has an area of $72 \\text{ m}^2$. What is its exact perimeter?", "options": [{"text": "$6\\sqrt{2} \\text{ m}$", "isCorrect": false, "rationale": "This is the correct calculation for the side length ($s = \\sqrt{72} = 6\\sqrt{2}$), but the question asks for the perimeter, which is 4 times the side length."}, {"text": "$24\\sqrt{2} \\text{ m}$", "isCorrect": true, "rationale": "Let $s$ be the side length of the square. Since Area = $s^2$, we have $s^2 = 72$. So, $s = \\sqrt{72}$. Simplify the radical: $\\sqrt{72} = \\sqrt{36 \\times 2} = \\sqrt{36} \\times \\sqrt{2} = 6\\sqrt{2}$ m. The perimeter of a square is $P = 4s$. Therefore, $P = 4 \\times (6\\sqrt{2}) = 24\\sqrt{2}$ m."}, {"text": "$40\\sqrt{2} \\text{ m}$", "isCorrect": false, "rationale": "This value is given in the checkpoint answers for a similar problem (area 200m^2), not for an area of 72m^2. It represents a miscalculation or confusion with another problem."}, {"text": "$12\\sqrt{2} \\text{ m}$", "isCorrect": false, "rationale": "This option might result from calculating $2s$ instead of $4s$, or an error in multiplication for the perimeter."}]}, {"question": "Simplify $\\left(\\frac{2a^2b^{-3}}{a^{-1}b^2}\\right)^3$ and write the result with positive exponents only.", "options": [{"text": "$\\frac{8a^9}{b^{15}}$", "isCorrect": true, "rationale": "First, simplify inside the parentheses using the Quotient Rule ($a^m/a^n = a^{m-n}$): $\\frac{2a^{2 - (-1)}b^{-3 - 2}}{1} = 2a^{2+1}b^{-5} = 2a^3b^{-5}$. Next, apply the outer exponent (Power Rule: $(a^m)^n = a^{mn}$ and Product to a Power: $(ab)^n = a^n b^n$): $(2a^3b^{-5})^3 = 2^3 \\cdot (a^3)^3 \\cdot (b^{-5})^3 = 8a^{3 \\times 3}b^{-5 \\times 3} = 8a^9b^{-15}$. Finally, write with positive exponents: $8a^9/b^{15}$."}, {"text": "$\\frac{8a^6}{b^5}$", "isCorrect": false, "rationale": "This option makes several errors, including incorrect exponent subtraction for 'a' (2-(-1) is 3, not 2), and incorrect application of the outer exponent (e.g., $b^{-15}$ not $b^5$). The base 2 is cubed correctly, but exponents are not consistently multiplied by 3."}, {"text": "$\\frac{2a^6}{b^{15}}$", "isCorrect": false, "rationale": "This option fails to cube the numerical coefficient 2 (it should be 2^3=8, not 2). It also has errors in the exponents for 'a' and 'b' if not simplifying inside first."}, {"text": "$\\frac{8a^9}{b^2}$", "isCorrect": false, "rationale": "This option has correct coefficients and 'a' exponent, but the 'b' exponent is incorrect. $(b^{-5})^3 = b^{-15}$, not $b^2$ or $b^{-2}$."}]}, {"question": "Which of the following statements about powers and roots is false?", "options": [{"text": "$\\sqrt[3]{-27} = -3$", "isCorrect": false, "rationale": "This statement is true. For odd indices, the radicand can be negative, and the root will have the same sign as the radicand. $(-3)^3 = -27$."}, {"text": "$a^0 = 1$ for any non-zero real number $a$", "isCorrect": false, "rationale": "This statement is true. The text defines $a^0 = 1$ for any non-zero real number $a$."}, {"text": "$\\sqrt{9 + 16} = \\sqrt{9} + \\sqrt{16}$", "isCorrect": true, "rationale": "This statement is false. The left side is $\\sqrt{25} = 5$. The right side is $3 + 4 = 7$. Since $5 \\ne 7$, the statement is false. The text explicitly cautions against this common error: $\\sqrt{a + b} \\ne \\sqrt{a} + \\sqrt{b}$."}, {"text": "A negative exponent always results in a negative number.", "isCorrect": false, "rationale": "This statement is false. A negative exponent signals a reciprocal, not a negative output. For example, $2^{-2} = 1/2^2 = 1/4$, which is positive. The text states: 'A negative exponent signals reciprocal, not a negative output.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
