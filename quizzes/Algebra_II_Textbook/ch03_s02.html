<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the solutions to the equation \\(x^2 = 81\\)?", "options": [{"text": "\\(x = 9\\)", "isCorrect": false, "rationale": "This option only includes the principal (positive) square root, forgetting that negative numbers squared also yield a positive result."}, {"text": "\\(x = -9\\)", "isCorrect": false, "rationale": "This option only includes the negative square root, forgetting the positive solution."}, {"text": "\\(x = \\pm 9\\)", "isCorrect": true, "rationale": "According to the Square-Root Property, for \\(c > 0\\), the equation \\(x^2 = c\\) has two real solutions: \\(x = \\sqrt{c}\\) and \\(x = -\\sqrt{c}\\). Thus, for \\(x^2 = 81\\), the solutions are \\(x = \\pm 9\\)."}, {"text": "\\(x = 81\\)", "isCorrect": false, "rationale": "This option incorrectly states that \\(x\\) is the number itself, rather than its square root."}]}, {"question": "To solve the equation \\(2x^2 = 72\\), what is the correct first step, and what are the solutions?", "options": [{"text": "Divide by 2, then take the square root to get \\(x = 6\\).", "isCorrect": false, "rationale": "While dividing by 2 is the correct first step, this option only provides the positive solution, omitting the negative solution."}, {"text": "Take the square root of both sides to get \\(x\\sqrt{2} = \\sqrt{72}\\).", "isCorrect": false, "rationale": "The first step should be to isolate the \\(x^2\\) term, not to take the square root immediately."}, {"text": "Divide by 2, then take the square root to get \\(x = \\pm 6\\).", "isCorrect": true, "rationale": "The first step is to isolate \\(x^2\\) by dividing both sides by 2, yielding \\(x^2 = 36\\). Then, applying the square-root property, \\(x = \\pm\\sqrt{36}\\), which means \\(x = \\pm 6\\)."}, {"text": "Subtract 72 from both sides, then factor.", "isCorrect": false, "rationale": "Subtracting 72 would result in \\(2x^2 - 72 = 0\\), which could then be factored, but isolating \\(x^2\\) and taking roots is the more direct method described for this form."}]}, {"question": "What are the solutions to the equation \\(x^2 = -36\\)?", "options": [{"text": "\\(x = \\pm 6\\)", "isCorrect": false, "rationale": "This option incorrectly treats the right side as positive, leading to real solutions, when in fact the square root of a negative number is imaginary."}, {"text": "\\(x = \\pm 6i\\)", "isCorrect": true, "rationale": "According to the Square-Root Property, if \\(c < 0\\), then \\(x^2 = c\\) has two complex solutions, \\(x = \\pm\\sqrt{c}\\). For \\(x^2 = -36\\), \\(x = \\pm\\sqrt{-36} = \\pm\\sqrt{36}\\sqrt{-1} = \\pm 6i\\)."}, {"text": "\\(x = \\sqrt{-36}\\)", "isCorrect": false, "rationale": "While part of the process, this notation typically denotes the principal square root in complex numbers (which is \\(6i\\)), but it doesn't explicitly state both solutions, \\(\\pm 6i\\)."}, {"text": "No real solutions.", "isCorrect": false, "rationale": "While there are no *real* solutions, the problem asks for *the* solutions, which include complex solutions. The text explicitly states there are complex solutions if \\(c < 0\\)."}]}, {"question": "Solve the equation \\((x+5)^2 = 100\\).", "options": [{"text": "\\(x = 5\\)", "isCorrect": false, "rationale": "This option only provides one solution and involves a calculation error, as \\(x+5=10\\) gives \\(x=5\\), but it misses the case where \\(x+5=-10\\)."}, {"text": "\\(x = 15\\) and \\(x = -5\\)", "isCorrect": false, "rationale": "This option contains calculation errors for both solutions. If \\(x+5=10\\), then \\(x=5\\), and if \\(x+5=-10\\), then \\(x=-15\\)."}, {"text": "\\(x = 5\\) and \\(x = -15\\)", "isCorrect": true, "rationale": "Applying the square-root property, \\(x+5 = \\pm\\sqrt{100}\\), so \\(x+5 = \\pm 10\\). This leads to two linear equations: \\(x+5 = 10\\) (giving \\(x=5\\)) and \\(x+5 = -10\\) (giving \\(x=-15\\))."}, {"text": "\\(x = 10\\) and \\(x = -10\\)", "isCorrect": false, "rationale": "This option incorrectly forgets to account for the \\(+5\\) term within the squared expression, treating it as if it were simply \\(x^2=100\\)."}]}, {"question": "Determine the solutions for the equation \\((3x-2)^2 = -25\\).", "options": [{"text": "\\(x = 2 \\pm 5i\\)", "isCorrect": false, "rationale": "This option correctly identifies the imaginary part but fails to divide the entire expression by 3 in the final step."}, {"text": "\\(x = \\frac{2 \\pm 5i}{3}\\)", "isCorrect": true, "rationale": "Applying the square-root property, \\(3x-2 = \\pm\\sqrt{-25}\\), so \\(3x-2 = \\pm 5i\\). Adding 2 to both sides gives \\(3x = 2 \\pm 5i\\), and dividing by 3 yields \\(x = \\frac{2 \\pm 5i}{3}\\)."}, {"text": "\\(x = \\frac{5 \\pm 2i}{3}\\)", "isCorrect": false, "rationale": "This option incorrectly swaps the real and imaginary parts in the numerator."}, {"text": "No real solutions.", "isCorrect": false, "rationale": "While there are no real solutions, the problem asks for 'the solutions,' which include complex solutions, as explained in the text for \\(c < 0\\)."}]}, {"question": "When an equation of the form \\((ax+b)^2 = c\\) has real coefficients and \\(c < 0\\), what characteristic will the two complex solutions always exhibit?", "options": [{"text": "They will always be purely imaginary.", "isCorrect": false, "rationale": "Solutions are purely imaginary only if the real part \\(-b/a\\) is zero, meaning \\(b=0\\). Generally, they have both real and imaginary parts."}, {"text": "They will always be rational numbers.", "isCorrect": false, "rationale": "Complex numbers are generally not rational, and the solutions for \\(c < 0\\) are explicitly stated to be complex (non-real)."}, {"text": "They will always be complex conjugates of each other.", "isCorrect": true, "rationale": "The text explicitly states: 'Note that the two solutions are complex conjugates of each other—this always happens when the equation has real coefficients and negative right-hand side.'"}, {"text": "They will always have a positive real part.", "isCorrect": false, "rationale": "The sign of the real part (\\(-b/a\\)) depends on the specific values of \\(a\\) and \\(b\\), not a general property when \\(c<0\\)."}]}, {"question": "Find the real solution(s) to the equation \\(x^5 = 243\\).", "options": [{"text": "\\(x = 3\\)", "isCorrect": true, "rationale": "According to the property for solving \\(x^n = c\\), if \\(n\\) is odd, then \\(x = \\sqrt[n]{c}\\) is the unique real solution. Since \\(3^5 = 243\\), \\(x = \\sqrt[5]{243} = 3\\)."}, {"text": "\\(x = \\pm 3\\)", "isCorrect": false, "rationale": "For odd exponents, there is only one real solution. The \\(\\pm\\) sign applies to even roots of positive numbers."}, {"text": "No real solutions.", "isCorrect": false, "rationale": "Odd-indexed roots always have a unique real solution, regardless of the sign of \\(c\\)."}, {"text": "\\(x = \\sqrt[5]{243}\\)", "isCorrect": false, "rationale": "This notation simply restates the problem's solution in radical form, but doesn't provide the simplified, exact numerical answer."}]}, {"question": "Which statement best describes the solutions to the equation \\(x^4 = -16\\)?", "options": [{"text": "There is one real solution, \\(x = -2\\).", "isCorrect": false, "rationale": "For an even exponent and a negative constant, there are no real solutions."}, {"text": "There are two real solutions, \\(x = \\pm 2\\).", "isCorrect": false, "rationale": "There are no real solutions when taking an even root of a negative number."}, {"text": "There are four complex solutions, but no real solutions.", "isCorrect": true, "rationale": "According to the property for solving \\(x^n = c\\), if \\(n\\) is even and \\(c < 0\\), there are no real solutions. However, complex solutions do exist (specifically, four for a 4th-degree polynomial)."}, {"text": "There are two real solutions, \\(x = \\pm 4\\).", "isCorrect": false, "rationale": "This option incorrectly takes the square root and provides real solutions, which is incorrect for an even root of a negative number."}]}, {"question": "A square garden has an area of 144 square feet. What is the length of one side of the garden?", "options": [{"text": "\\(\\pm 12\\) feet", "isCorrect": false, "rationale": "While \\(\\pm 12\\) are the mathematical solutions to \\(x^2 = 144\\), length is a physical quantity and must be non-negative."}, {"text": "12 feet", "isCorrect": true, "rationale": "If the area of a square is \\(A\\) square units, each side has length \\(\\sqrt{A}\\) units. Since length must be non-negative, we take the positive root: \\(\\sqrt{144} = 12\\) feet."}, {"text": "-12 feet", "isCorrect": false, "rationale": "Length cannot be a negative value in a physical context."}, {"text": "72 feet", "isCorrect": false, "rationale": "This option is a calculation error; it incorrectly divides the area by 2 instead of taking the square root."}]}, {"question": "A student solves an equation and writes \\(x = \\pm 10\\). When asked for the length of a side of a square whose area is 100 square units, they give the answer '10 units.' Which of the following best explains why they did not include the negative solution in their final answer for the length?", "options": [{"text": "The square root symbol (\\(\\sqrt{}\\)) always implies only the principal (non-negative) value.", "isCorrect": false, "rationale": "While \\(\\sqrt{}\\) does denote the principal root, the question is about applying the solution set \\(x=\\pm 10\\) to a physical context, not about the definition of the \\(\\sqrt{}\\) symbol itself. The text states that \\(x=\\pm c\\) refers to the full mathematical solution set."}, {"text": "Length is a physical quantity and must be non-negative, so the negative solution is disregarded in this context.", "isCorrect": true, "rationale": "The text explicitly states: 'When the problem says “find the side length,” always choose the positive square root. Lengths, distances, and other physical quantities cannot be negative.' This is the precise reason for choosing only the positive solution in this application."}, {"text": "The equation for area, \\(s^2=A\\), only yields positive results for \\(s\\).", "isCorrect": false, "rationale": "Mathematically, the equation \\(s^2=A\\) yields both positive and negative solutions for \\(s\\) (e.g., \\(s=\\pm\\sqrt{A}\\)). The choice to use only the positive value comes from the *context* of length, not the intrinsic nature of the equation's mathematical solutions."}, {"text": "It's an arbitrary rule to always choose the positive value for geometry problems.", "isCorrect": false, "rationale": "It's not an arbitrary rule, but one based on the physical reality that lengths cannot be negative."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
