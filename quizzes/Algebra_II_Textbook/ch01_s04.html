    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the geometric interpretation of the absolute value of a real number $x$?", "options": [{"text": "Its numerical value on the number line.", "isCorrect": false, "rationale": "This describes the number itself, not its absolute value. The absolute value focuses on distance."}, {"text": "The distance from $x$ to the origin on the real number line.", "isCorrect": true, "rationale": "The text explicitly states that '$x$ is the distance from $x$ to the origin on the real number line,' which is the fundamental geometric definition of absolute value."}, {"text": "The square root of $x^2$.", "isCorrect": false, "rationale": "While $x = \\sqrt{x^2}$ is an algebraic identity, it is not the geometric interpretation of absolute value as distance from zero."}, {"text": "Its non-negative counterpart.", "isCorrect": false, "rationale": "This describes the result of taking an absolute value (always non-negative), but not its underlying geometric meaning."}], "id": "q01"}, {"question": "Solve the equation $|4x + 1| = 9$.", "options": [{"text": "$x = 2$", "isCorrect": false, "rationale": "This is one of the two correct solutions, but a complete answer requires both."}, {"text": "$x = -2.5$", "isCorrect": false, "rationale": "This is one of the two correct solutions, but a complete answer requires both."}, {"text": "$x = 2$ or $x = -2.5$", "isCorrect": true, "rationale": "For $|E|=n$ with $n>0$, we solve $E=n$ or $E=-n$. So, $4x+1=9 \\implies 4x=8 \\implies x=2$, and $4x+1=-9 \\implies 4x=-10 \\implies x=-2.5$. Both solutions are correct."}, {"text": "No solution", "isCorrect": false, "rationale": "The right-hand side, 9, is positive, so there are solutions."}], "id": "q02"}, {"question": "Which of the following absolute value equations has no solution?", "options": [{"text": "$|3x - 5| = 0$", "isCorrect": false, "rationale": "This equation has one solution: $3x-5=0 \\implies x=5/3$. An absolute value can equal zero."}, {"text": "$|x + 2| = 7$", "isCorrect": false, "rationale": "This equation has two solutions: $x+2=7 \\implies x=5$ and $x+2=-7 \\implies x=-9$. An absolute value can equal a positive number."}, {"text": "$|-2x + 1| = -4$", "isCorrect": true, "rationale": "The absolute value of any real number is always non-negative ($|E| \\ge 0$). Therefore, an absolute value expression cannot equal a negative number like -4, meaning there is no solution."}, {"text": "$|x| = |-x|$", "isCorrect": false, "rationale": "This equation is always true for all real numbers $x$ (e.g., $|5|=5$ and $|-5|=5$), meaning it has infinitely many solutions."}], "id": "q03"}, {"question": "Consider the equation $|2x - 1| = x + 5$. Why is it particularly important to check solutions for this type of equation?", "options": [{"text": "The absolute value makes algebraic manipulation difficult.", "isCorrect": false, "rationale": "While care is needed, the algebraic manipulation itself isn't inherently more difficult. The critical step is verifying the results."}, {"text": "It's possible for a candidate solution to make the right-hand side negative, leading to an extraneous solution.", "isCorrect": true, "rationale": "As stated in the 'note' section, when the right-hand side is a variable expression, a candidate solution might cause that expression to become negative. Since an absolute value cannot be negative, such a candidate is an extraneous solution and must be discarded."}, {"text": "The equation might have infinitely many solutions.", "isCorrect": false, "rationale": "Equations of this form typically have a finite number of solutions (0, 1, or 2), not infinitely many."}, {"text": "There are always two distinct solutions for such an equation.", "isCorrect": false, "rationale": "Due to the possibility of extraneous solutions, these equations might have one or no solutions, not necessarily always two."}], "id": "q04"}, {"question": "Solve the equation $|x - 2| = |3x + 4|$.", "options": [{"text": "$x = -3$", "isCorrect": false, "rationale": "This is only one of the two correct solutions. The property $|A|=|B|$ yields two cases."}, {"text": "$x = -1/2$", "isCorrect": false, "rationale": "This is only one of the two correct solutions. The property $|A|=|B|$ yields two cases."}, {"text": "$x = -3$ or $x = -1/2$", "isCorrect": true, "rationale": "For $|A|=|B|$, we solve $A=B$ or $A=-B$. Case 1: $x-2 = 3x+4 \\implies -6 = 2x \\implies x=-3$. Case 2: $x-2 = -(3x+4) \\implies x-2 = -3x-4 \\implies 4x=-2 \\implies x=-1/2$. Both solutions are valid."}, {"text": "No solution", "isCorrect": false, "rationale": "Equations of the form $|A|=|B|$ always have at least one solution, as shown in the example provided in the text."}], "id": "q05"}, {"question": "The inequality $|E| < m$ (where $m > 0$) geometrically represents:", "options": [{"text": "All real numbers exactly $m$ units from zero.", "isCorrect": false, "rationale": "This describes an equality, $|E|=m$, not an inequality ($|E|<m$). Geometric interpretation of absolute value is distance."}, {"text": "All real numbers farther than $m$ units from zero.", "isCorrect": false, "rationale": "This describes the geometric meaning of $|E|>m$, where the solutions are outside the interval $(-m, m)$."}, {"text": "All real numbers within $m$ units of zero.", "isCorrect": true, "rationale": "The text states, 'The inequality $E < m$ asks for all real numbers within distance $m$ of zero—a bounded interval.' This is the 'AND' case, forming a single bounded interval."}, {"text": "All real numbers greater than $m$ or less than $-m$.", "isCorrect": false, "rationale": "This describes the algebraic solution for $|E|>m$, which corresponds to being 'farther than' $m$ units from zero."}], "id": "q06"}, {"question": "Solve the inequality $|5x - 2| < 13$ and express the solution in interval notation.", "options": [{"text": "$(- \\infty, -11/5) \\cup (3, \\infty)$", "isCorrect": false, "rationale": "This is the solution format for a 'greater than' absolute value inequality (OR case), not a 'less than' inequality."}, {"text": "$(-11/5, 3)$", "isCorrect": true, "rationale": "For a 'less than' inequality ($|E|<m$), we use the 'AND' case: $-m < E < m$. So, $-13 < 5x - 2 < 13$. Adding 2 to all parts gives $-11 < 5x < 15$. Dividing by 5 yields $-11/5 < x < 3$. In interval notation, this is $(-11/5, 3)$."}, {"text": "$(- \\infty, 3)$", "isCorrect": false, "rationale": "This interval only represents the upper bound and extends indefinitely to the left, incorrectly omitting the lower bound for a bounded interval."}, {"text": "$(-11/5, \\infty)$", "isCorrect": false, "rationale": "This interval only represents the lower bound and extends indefinitely to the right, incorrectly omitting the upper bound for a bounded interval."}], "id": "q07"}, {"question": "Solve the inequality $|x + 7| \\ge 2$ and express the solution in interval notation.", "options": [{"text": "$[-9, -5]$", "isCorrect": false, "rationale": "This interval represents an 'AND' case (bounded interval) and uses incorrect values. A 'greater than or equal to' inequality results in two separate rays."}, {"text": "$(- \\infty, -9] \\cup [-5, \\infty)$", "isCorrect": true, "rationale": "For a 'greater than or equal to' inequality ($|E| \\ge m$), we use the 'OR' case: $E \\le -m$ or $E \\ge m$. So, $x+7 \\le -2 \\implies x \\le -9$, or $x+7 \\ge 2 \\implies x \\ge -5$. In interval notation, this is $(-\\infty, -9] \\cup [-5, \\infty)$."}, {"text": "$[-5, -9]$", "isCorrect": false, "rationale": "This interval is improperly ordered (lower bound must be less than upper bound) and represents a bounded interval, which is incorrect for a 'greater than' inequality."}, {"text": "No solution", "isCorrect": false, "rationale": "Solutions exist for this inequality, as an absolute value can be greater than or equal to a positive number."}], "id": "q08"}, {"question": "Which of the following statements about absolute value inequalities is true?", "options": [{"text": "The inequality $|E| < m$ always has a solution for any real number $m$.", "isCorrect": false, "rationale": "According to the 'Special cases' property, if $m \\le 0$, then $|E|<m$ has no solution, because an absolute value cannot be strictly less than or equal to zero, nor less than a negative number."}, {"text": "If $m < 0$, the inequality $|E| > m$ has no solution.", "isCorrect": false, "rationale": "If $m < 0$, then $|E| > m$ is satisfied by *all* real numbers $x$, because an absolute value (which is always non-negative) will always be greater than any negative number."}, {"text": "If $m \\le 0$, the inequality $|E| < m$ has no solution.", "isCorrect": true, "rationale": "The text states this explicitly under 'Special cases': 'if $m \\le 0$ then $E < m$ has no solution.' An absolute value is always non-negative, so it cannot be strictly less than or equal to zero, or less than a negative number."}, {"text": "The solution to $|E| > m$ can always be written as a single compound expression like $-4 < x < -1$.", "isCorrect": false, "rationale": "The 'caution' box specifically warns against this, stating that 'Do not write the solution to a greater-than absolute value inequality as a single compound expression.' It requires union notation."}], "id": "q09"}, {"question": "An engineer states that 'the measurement must be within $0.05$ cm of the target value $c$.' If $x$ represents the measurement, which inequality accurately models this specification?", "options": [{"text": "$|x| < 0.05$", "isCorrect": false, "rationale": "This inequality means the measurement $x$ must be within $0.05$ cm of *zero*, not the target value $c$."}, {"text": "$|x - c| \\le 0.05$", "isCorrect": true, "rationale": "As explained in the 'note' section, 'the measurement must be within $0.05$ cm of the target value $c$' is equivalent to the distance between $x$ and $c$ being less than or equal to $0.05$, which is precisely $|x - c| \\le 0.05$."}, {"text": "$|c - x| > 0.05$", "isCorrect": false, "rationale": "This inequality means the measurement $x$ must be *farther* than $0.05$ cm from $c$, which contradicts 'within.' Also, it uses a strict 'greater than' inequality, implying it cannot be exactly $0.05$ cm away."}, {"text": "$x - c = 0.05$", "isCorrect": false, "rationale": "This is an equality, implying the measurement is *exactly* $0.05$ cm greater than $c$, not within a range around $c$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
