    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What fundamental characteristics of a line does its slope primarily capture?", "options": [{"text": "Its length and precise midpoint.", "isCorrect": false, "rationale": "The length and midpoint are geometric properties, not directly represented by slope. Slope specifically addresses 'steepness and direction'."}, {"text": "Its steepness and direction.", "isCorrect": true, "rationale": "According to the text, 'The steepness and direction of a line are captured by a single number called its slope.'"}, {"text": "Its x-intercept and y-intercept.", "isCorrect": false, "rationale": "Intercepts indicate where a line crosses the axes, which is related to its position, but not its fundamental steepness or direction in the way slope is."}, {"text": "Its area and perimeter relative to the coordinate plane.", "isCorrect": false, "rationale": "Lines do not have area or perimeter in the traditional sense within a 2D coordinate system. These concepts are irrelevant to slope."}]}, {"question": "When calculating the slope $m = (y_2 - y_1) / (x_2 - x_1)$, what is a crucial rule regarding the order of subtraction?", "options": [{"text": "The y-coordinates must always be subtracted from left to right, and x-coordinates from right to left.", "isCorrect": false, "rationale": "This statement describes an inconsistent order of subtraction, which the text explicitly warns against as it 'gives the wrong sign'."}, {"text": "The order of subtraction for the y-coordinates must be consistent with the order of subtraction for the x-coordinates.", "isCorrect": true, "rationale": "The text states: 'The order in which you subtract must be consistent: if you compute $y_2 - y_1$, you must also compute $x_2 - x_1$ (not $x_1 - x_2$).'"}, {"text": "It does not matter which point is $(x_1, y_1)$ or $(x_2, y_2)$, but $x_1$ must always be less than $x_2$.", "isCorrect": false, "rationale": "While it's true that swapping the labels for $(x_1, y_1)$ and $(x_2, y_2)$ does not change the slope, the condition $x_1 < x_2$ is not a requirement for calculating slope."}, {"text": "The numerator can be $y_1 - y_2$ as long as the denominator is $x_2 - x_1$.", "isCorrect": false, "rationale": "This represents an inconsistent order of subtraction and would result in an incorrect slope value (specifically, the wrong sign)."}]}, {"question": "Calculate the slope of the line passing through the points $(2, -5)$ and $(-4, 7)$.", "options": [{"text": "2", "isCorrect": false, "rationale": "This would result if the denominator was $2 - (-4) = 6$ and the numerator was $7 - (-5) = 12$, resulting in $12/6 = 2$. This implies $(y_2 - y_1)/(x_2 - x_1)$. However, if you chose $(2,-5)$ as $(x_2,y_2)$ and $(-4,7)$ as $(x_1,y_1)$, then $m = (-5-7)/(2-(-4)) = -12/6 = -2$."}, {"text": "-2", "isCorrect": true, "rationale": "Using the slope formula $m = (y_2 - y_1) / (x_2 - x_1)$ with $(x_1, y_1) = (2, -5)$ and $(x_2, y_2) = (-4, 7)$: $m = (7 - (-5)) / (-4 - 2) = (7 + 5) / (-6) = 12 / -6 = -2$."}, {"text": "1/2", "isCorrect": false, "rationale": "This would result from an incorrect calculation or misapplication of the formula, possibly by inverting the ratio or calculation errors."}, {"text": "-1/2", "isCorrect": false, "rationale": "This would result from an incorrect calculation, for example, if the change in x was 12 and the change in y was -6, or by calculating the reciprocal of the correct slope."}]}, {"question": "A line has a slope of $m = -5/2$. What is the geometric interpretation of this line's direction when viewed from left to right?", "options": [{"text": "It rises from left to right.", "isCorrect": false, "rationale": "A line that rises from left to right has a positive slope ($m > 0$), not a negative one."}, {"text": "It falls from left to right.", "isCorrect": true, "rationale": "According to the 'Types of Slope' property, a 'Negative slope ($m < 0$): line falls from left to right.'"}, {"text": "It is a horizontal line.", "isCorrect": false, "rationale": "A horizontal line has a zero slope ($m = 0$), not a negative slope of $-5/2$."}, {"text": "It is a vertical line.", "isCorrect": false, "rationale": "A vertical line has an undefined slope, not a specific numerical negative slope."}]}, {"question": "Which of the following lines has an undefined slope?", "options": [{"text": "A line passing through $(3, 5)$ and $(3, -2)$.", "isCorrect": true, "rationale": "For this line, $x_1 = 3$ and $x_2 = 3$. The denominator in the slope formula, $x_2 - x_1$, would be $3 - 3 = 0$. Division by zero results in an undefined slope, indicating a vertical line."}, {"text": "A line with equation $y = 4$.", "isCorrect": false, "rationale": "The equation $y = 4$ represents a horizontal line, which has a zero slope, not an undefined slope."}, {"text": "A line passing through $(1, 1)$ and $(5, 5)$.", "isCorrect": false, "rationale": "The slope here would be $(5-1)/(5-1) = 4/4 = 1$, which is a positive slope, not undefined."}, {"text": "A line with equation $2x + 3y = 6$.", "isCorrect": false, "rationale": "This is a linear equation that can be rewritten as $3y = -2x + 6$, or $y = (-2/3)x + 2$. Its slope is $-2/3$, which is a defined negative slope."}]}, {"question": "Determine if the points $(0, 1)$, $(2, 4)$, and $(4, 7)$ are collinear.", "options": [{"text": "Yes, because the slope between $(0,1)$ and $(2,4)$ is $3/2$, and the slope between $(2,4)$ and $(4,7)$ is also $3/2$.", "isCorrect": true, "rationale": "To check collinearity, we compute the slopes between two pairs of points. Slope $m_1 = (4-1)/(2-0) = 3/2$. Slope $m_2 = (7-4)/(4-2) = 3/2$. Since $m_1 = m_2$, the points are collinear."}, {"text": "No, because the slope between $(0,1)$ and $(2,4)$ is $3/2$, and the slope between $(2,4)$ and $(4,7)$ is also $3/2$.", "isCorrect": false, "rationale": "If the slopes between pairs of points are equal, it indicates collinearity. This option incorrectly states the conclusion despite correctly calculating the slopes."}, {"text": "Yes, because the slopes are different, indicating they are part of a curve.", "isCorrect": false, "rationale": "For points to be collinear (on the same straight line), the slopes between any pairs of them must be identical. Different slopes would mean they are not collinear."}, {"text": "No, because the slopes are the same, which means they form a triangle.", "isCorrect": false, "rationale": "If the slopes are the same, the points are collinear, meaning they lie on a straight line and cannot form a triangle. This option provides an incorrect conclusion and reasoning."}]}, {"question": "A line passes through $(1, 3)$ and $(4, 9)$. What is the slope of any line parallel to it?", "options": [{"text": "-1/2", "isCorrect": false, "rationale": "This is the negative reciprocal of the calculated slope, which would be for a perpendicular line, not a parallel one."}, {"text": "2", "isCorrect": true, "rationale": "First, calculate the slope of the given line: $m = (9 - 3) / (4 - 1) = 6 / 3 = 2$. According to the 'Slopes of Parallel Lines' property, two distinct non-vertical lines are parallel if and only if they have equal slopes."}, {"text": "-2", "isCorrect": false, "rationale": "This is the negative of the calculated slope, not the same slope as required for parallel lines."}, {"text": "1/2", "isCorrect": false, "rationale": "This is the reciprocal of the calculated slope, which is incorrect for parallel lines."}]}, {"question": "If a line has a slope of $m = -2/5$, what is the slope of a line perpendicular to it?", "options": [{"text": "-2/5", "isCorrect": false, "rationale": "This is the same slope, which would be for a parallel line, not a perpendicular one."}, {"text": "2/5", "isCorrect": false, "rationale": "This is the opposite of the original slope, but not the negative reciprocal required for perpendicular lines."}, {"text": "-5/2", "isCorrect": false, "rationale": "This is the negative reciprocal, but the sign is incorrect. The negative reciprocal of a negative slope should be positive."}, {"text": "5/2", "isCorrect": true, "rationale": "According to the 'Slopes of Perpendicular Lines' property, two non-vertical lines are perpendicular if and only if their slopes are negative reciprocals ($m_1 m_2 = -1$). For $m_1 = -2/5$, $m_2 = -1/(-2/5) = 5/2$."}]}, {"question": "A vertical line and a horizontal line are perpendicular to each other. Which of the following statements about their slopes is true?", "options": [{"text": "Both have undefined slopes.", "isCorrect": false, "rationale": "A vertical line has an undefined slope, but a horizontal line has a zero slope."}, {"text": "Both have a slope of zero.", "isCorrect": false, "rationale": "A horizontal line has a zero slope, but a vertical line has an undefined slope."}, {"text": "One has a zero slope, and the other has an undefined slope.", "isCorrect": true, "rationale": "The text states: 'Zero slope ($m = 0$): line is horizontal' and 'Undefined slope: line is vertical'. It also explicitly states that 'A vertical line and a horizontal line are also perpendicular'."}, {"text": "Their slopes are negative reciprocals (e.g., $m$ and $-1/m$).", "isCorrect": false, "rationale": "The negative reciprocal relationship ($m_1 m_2 = -1$) applies to *non-vertical* perpendicular lines. It does not apply when one slope is zero and the other is undefined."}]}, {"question": "Based on the provided examples for collinearity, consider three points $P_1$, $P_2$, and $P_3$. If the slope from $P_1$ to $P_2$ is $m_A$ and the slope from $P_2$ to $P_3$ is $m_B$, what condition must be met for the points to be collinear, and which example illustrates this?", "options": [{"text": "$m_A = m_B$; this is demonstrated by points $(1, 2)$, $(3, 5)$, and $(7, 11)$ where both calculated slopes were $3/2$.", "isCorrect": true, "rationale": "The text states that 'We test collinearity by checking that the slope between any two pairs of the points is identical.' The example for collinear points $(1, 2)$, $(3, 5)$, and $(7, 11)$ shows $m_1 = 3/2$ and $m_2 = 3/2$, confirming collinearity."}, {"text": "$m_A \\neq m_B$; this is demonstrated by points $(-2, 1)$, $(1, 4)$, and $(4, 8)$ where slopes were $1$ and $4/3$.", "isCorrect": false, "rationale": "Points are not collinear if $m_A \\neq m_B$. While the example provided correctly shows unequal slopes for non-collinear points, the condition for collinearity is equality of slopes, not inequality."}, {"text": "$m_A = m_B$; this is demonstrated by points $(-2, 1)$, $(1, 4)$, and $(4, 8)$ where slopes were $1$ and $4/3$.", "isCorrect": false, "rationale": "This option correctly states the condition for collinearity but then incorrectly associates it with the example that explicitly shows non-collinear points because their slopes were different ($1 \\neq 4/3$)."}, {"text": "$m_A \\neq m_B$; this is demonstrated by points $(1, 2)$, $(3, 5)$, and $(7, 11)$ where both slopes were $3/2$.", "isCorrect": false, "rationale": "This option incorrectly states the condition for collinearity (it should be equality) and incorrectly associates it with the example that explicitly shows collinear points (where slopes were equal)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
