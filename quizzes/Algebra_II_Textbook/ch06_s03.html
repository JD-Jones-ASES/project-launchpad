        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary key strategy emphasized for multiplying and dividing rational expressions *before* performing the final multiplication or division?", "options": [{"text": "Multiply all numerators and denominators first to combine terms.", "isCorrect": false, "rationale": "This is the opposite of the emphasized strategy. Multiplying first would result in larger, more complex expressions, making cancellation difficult."}, {"text": "Find a common denominator to prepare for cancellation.", "isCorrect": false, "rationale": "Finding a common denominator is a strategy for adding or subtracting rational expressions, not for multiplication or division."}, {"text": "Factor all numerators and denominators completely.", "isCorrect": true, "rationale": "The text explicitly states, \"The key strategy is to factor first before multiplying, so that common factors can be canceled before the numbers get large.\""}, {"text": "Convert all expressions to a common base.", "isCorrect": false, "rationale": "Converting to a common base is not a standard procedure for simplifying rational expressions in multiplication or division."}]}, {"question": "Multiply and simplify: $4x^3 / (3y) \\cdot (9y^2) / (2x)$", "options": [{"text": "$6x^2y$", "isCorrect": true, "rationale": "First, multiply the numerators ($4x^3 \\cdot 9y^2 = 36x^3y^2$) and the denominators ($3y \\cdot 2x = 6xy$). Then, divide the resulting numerator by the denominator, canceling common factors: $(36/6) \\cdot (x^3/x) \\cdot (y^2/y) = 6x^2y$."}, {"text": "$36x^3y^2 / (6xy)$", "isCorrect": false, "rationale": "This is the correct intermediate step after multiplying, but the expression is not yet simplified by canceling common factors."}, {"text": "$12x^2y$", "isCorrect": false, "rationale": "This answer likely results from an error in the multiplication or division of coefficients (e.g., $4 \\cdot 9 / 3 = 12$, instead of $36/6 = 6$) or incorrect cancellation."}, {"text": "$6x^2/y$", "isCorrect": false, "rationale": "This answer results from an error in simplifying the y terms, incorrectly placing y in the denominator or canceling incorrectly."}]}, {"question": "Simplify the product: $(x^2 - 9)/(x^2 + 3x) \\cdot (x^2)/(x - 3)$", "options": [{"text": "$x^2(x-3)/(x+3)$", "isCorrect": false, "rationale": "This result suggests an error in factoring or canceling terms such as $x^2$ with $x$, or $(x+3)$ and $(x-3)$."}, {"text": "$x(x+3)$", "isCorrect": false, "rationale": "This result indicates incorrect or incomplete cancellation, possibly by not factoring $x^2 + 3x$ correctly or missing the cancellation of $(x-3)$."}, {"text": "$x$", "isCorrect": true, "rationale": "Factoring gives $(x-3)(x+3) / (x(x+3)) \\cdot x^2 / (x-3)$. Canceling $(x-3)$ from the numerator and denominator, $(x+3)$ from the numerator and denominator, and one 'x' from $x^2$ in the numerator with 'x' in the denominator leaves 'x'."}, {"text": "$x(x-3)/(x+3)$", "isCorrect": false, "rationale": "This result implies that only one 'x' was canceled from the $x^2$ term and the $(x+3)$ and $(x-3)$ terms were not fully canceled, or canceled incorrectly."}]}, {"question": "Why is it crucial to factor numerators and denominators completely *before* multiplying rational expressions?", "options": [{"text": "To make the expressions easier to read.", "isCorrect": false, "rationale": "While factoring can sometimes make expressions appear simpler, the primary mathematical reason is not readability but simplification through cancellation."}, {"text": "To ensure that the final answer is always a polynomial.", "isCorrect": false, "rationale": "The final answer is a rational expression, which may or may not be a polynomial, depending on whether all denominators cancel out to 1. Factoring doesn't guarantee a polynomial."}, {"text": "To identify and cancel common factors, preventing large numbers and simplifying the process.", "isCorrect": true, "rationale": "The text explicitly states, \"The key strategy is to factor first before multiplying, so that common factors can be canceled before the numbers get large.\" This prevents dealing with complex, unsimplified terms later."}, {"text": "To convert all terms into their simplest radical form.", "isCorrect": false, "rationale": "Radical form is not relevant to simplifying rational expressions involving polynomials. Factoring deals with polynomial factors, not radicals."}]}, {"question": "Which statement accurately describes the process of dividing one rational expression, P/Q, by another, R/S?", "options": [{"text": "Multiply P/Q by R/S.", "isCorrect": false, "rationale": "This describes multiplying the two expressions, not dividing. Division requires multiplying by the reciprocal of the divisor."}, {"text": "Multiply Q/P by R/S.", "isCorrect": false, "rationale": "This incorrectly inverts the first fraction (P/Q) instead of the second (R/S)."}, {"text": "Multiply P/Q by S/R.", "isCorrect": true, "rationale": "The text states, \"To divide by a rational expression, multiply by its reciprocal,\" and gives the formula (P/Q) / (R/S) = (P/Q) \\cdot (S/R). S/R is the reciprocal of R/S."}, {"text": "Multiply Q/P by S/R.", "isCorrect": false, "rationale": "This incorrectly inverts both fractions, which is not the rule for division."}]}, {"question": "A student incorrectly simplifies $A/B \\div C/D$ as $B/A \\cdot C/D$. What common error did the student make?", "options": [{"text": "The student forgot to factor the expressions.", "isCorrect": false, "rationale": "While factoring is crucial, the specific error in the setup ($B/A \\cdot C/D$) indicates a mistake in applying the division rule, not in factoring."}, {"text": "The student inverted the first fraction (A/B) instead of the second (C/D).", "isCorrect": true, "rationale": "The problem shows the student used B/A (the reciprocal of the first fraction) instead of D/C (the reciprocal of the second fraction, C/D). The text explicitly warns, \"Always invert the second fraction (the divisor), not the first. A common error is to flip the wrong fraction.\""}, {"text": "The student did not multiply by the reciprocal at all.", "isCorrect": false, "rationale": "The student *did* multiply by a reciprocal (B/A), but it was the reciprocal of the wrong fraction."}, {"text": "The student made a mistake in canceling common factors.", "isCorrect": false, "rationale": "The error occurred in the initial setup of the multiplication problem, not in the subsequent cancellation step."}]}, {"question": "Divide and simplify: $(12a^4 / (5b^3)) \\div (4a^2 / (15b))$", "options": [{"text": "$9a^2 / b^2$", "isCorrect": true, "rationale": "First, rewrite as multiplication by the reciprocal: $(12a^4 / 5b^3) \\cdot (15b / 4a^2)$. Then, multiply numerators and denominators: $(12 \\cdot 15 \\cdot a^4 \\cdot b) / (5 \\cdot 4 \\cdot b^3 \\cdot a^2) = (180a^4b) / (20a^2b^3)$. Finally, simplify: $(180/20) \\cdot (a^4/a^2) \\cdot (b/b^3) = 9a^2/b^2$."}, {"text": "$3a^2 / b^2$", "isCorrect": false, "rationale": "This suggests an error in the multiplication or division of the coefficients (e.g., $12/4 \\cdot 15/5 = 3 \\cdot 3 = 9$, not 3)."}, {"text": "$9a^2b^2$", "isCorrect": false, "rationale": "This indicates an error in simplifying the 'b' terms, perhaps multiplying instead of dividing or incorrect exponent subtraction."}, {"text": "$36a^6 / 25b^4$", "isCorrect": false, "rationale": "This looks like the result of multiplying the original fractions directly without inverting the divisor, and then multiplying coefficients incorrectly or not simplifying."}]}, {"question": "Simplify: $(x^2 - 16)/(x^2 + 4x) \\div (x - 4)/(x^2 - x)$", "options": [{"text": "$(x-4)(x-1)$", "isCorrect": false, "rationale": "This suggests some factors were not canceled or were incorrectly kept in the numerator. The $(x+4)$ and $x$ in the denominator should have been fully canceled."}, {"text": "$(x+4)(x-1)$", "isCorrect": false, "rationale": "This indicates that 'x' in the denominator was not canceled, or $(x+4)$ was not correctly identified as a common factor to cancel in the denominator."}, {"text": "$(x-1)$", "isCorrect": true, "rationale": "First, rewrite as multiplication: $(x^2 - 16)/(x^2 + 4x) \\cdot (x^2 - x)/(x - 4)$. Factor all terms: $[(x-4)(x+4)] / [x(x+4)] \\cdot [x(x-1)] / [(x-4)]$. Cancel common factors: $(x-4)$, $(x+4)$, and $x$. This leaves $(x-1)$."}, {"text": "$(x-4)/(x+4)$", "isCorrect": false, "rationale": "This result seems to have errors in factoring the second fraction's numerator and canceling the $x$ term or the $(x-4)$ term."}]}, {"question": "Simplify: $(y^2 + 5y + 6)/(y - 1) \\div (y + 3)$", "options": [{"text": "$(y+2)/(y-1)$", "isCorrect": true, "rationale": "Treat $(y+3)$ as $(y+3)/1$. Rewrite as multiplication by the reciprocal: $[(y^2 + 5y + 6)/(y - 1)] \\cdot [1/(y + 3)]$. Factor the quadratic: $[(y+2)(y+3)] / (y - 1) \\cdot [1/(y + 3)]$. Cancel the common factor $(y+3)$ to get $(y+2)/(y-1)$."}, {"text": "$(y+2)(y+3)/(y-1)$", "isCorrect": false, "rationale": "This indicates that $(y+3)$ was not canceled from the numerator and denominator after factoring."}, {"text": "$(y+3)/(y-1)$", "isCorrect": false, "rationale": "This suggests incorrect factoring of the quadratic or an error in cancellation, possibly canceling $(y+2)$ instead of $(y+3)$ or only partially simplifying."}, {"text": "$(y+2)(y-1)$", "isCorrect": false, "rationale": "This result implies that the denominator was canceled entirely or moved to the numerator, and the $(y+3)$ term was canceled incorrectly or not at all."}]}, {"question": "When multiplying and simplifying the expression $(x^2 - 4x)/(x^2 + x) \\cdot (x^2 + 2x + 1)/(x + 2)$, which of the following is *not* a domain restriction for the *original* expression?", "options": [{"text": "$x \\ne 0$", "isCorrect": false, "rationale": "The denominator of the first fraction is $x^2 + x = x(x+1)$. For this to be defined, $x$ cannot be 0. So, $x \\ne 0$ is a restriction."}, {"text": "$x \\ne -1$", "isCorrect": false, "rationale": "The denominator of the first fraction is $x^2 + x = x(x+1)$. For this to be defined, $x+1$ cannot be 0, so $x$ cannot be -1. So, $x \\ne -1$ is a restriction."}, {"text": "$x \\ne 2$", "isCorrect": true, "rationale": "The original denominators are $x^2 + x$ and $x + 2$. Setting these to zero yields $x = 0$, $x = -1$, and $x = -2$. The value $x = 2$ does not make any of the original denominators zero, so it is not a domain restriction for this expression."}, {"text": "$x \\ne -2$", "isCorrect": false, "rationale": "The denominator of the second fraction is $x + 2$. For this to be defined, $x+2$ cannot be 0, so $x$ cannot be -2. So, $x \\ne -2$ is a restriction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
