<div class="quiz-container">

<script>
var QUESTIONS = [{"question": "What is the most critical step after algebraically solving a logarithmic equation, and why?", "options": [{"text": "Simplifying the result to its lowest terms to avoid fractions.", "isCorrect": false, "rationale": "While simplifying is often good practice, it is not the most critical step unique to logarithmic equations and does not address the domain."}, {"text": "Checking all proposed solutions in the original equation to ensure arguments of logarithms are strictly positive.", "isCorrect": true, "rationale": "This is the most critical step because the domain of a logarithmic function is restricted to positive arguments. Any solution that makes an argument non-positive must be rejected as extraneous."}, {"text": "Graphing the solution to visually confirm it intersects the x-axis.", "isCorrect": false, "rationale": "Graphing can be a useful visualization tool but is not a mandatory or definitive check for the validity of solutions in all cases, especially concerning the domain of the logarithm."}, {"text": "Converting the solution back to exponential form to verify consistency.", "isCorrect": false, "rationale": "Converting to exponential form is a key step *during* the solving process, not *after* obtaining a potential solution. It doesn't address extraneous solutions directly."}]}, {"question": "Solve the equation $\\log_5(3x + 2) = 2$.", "options": [{"text": "$x = 1$", "isCorrect": false, "rationale": "If $x=1$, then $\\log_5(3(1)+2) = \\log_5(5) = 1$, which is not equal to 2."}, {"text": "$x = 23/3$", "isCorrect": true, "rationale": "Converting to exponential form gives $3x + 2 = 5^2$. This simplifies to $3x + 2 = 25$, so $3x = 23$, and $x = 23/3$. Checking this in the original equation, $3(23/3)+2 = 23+2 = 25$, which is positive, so the solution is valid."}, {"text": "$x = 11/3$", "isCorrect": false, "rationale": "This would result from $3x+2=13$, not $3x+2=25$. It's incorrect."}, {"text": "$x = 9$", "isCorrect": false, "rationale": "If $x=9$, then $\\log_5(3(9)+2) = \\log_5(29)$, which is not equal to 2."}]}, {"question": "Solve $\\log_4(x+6) - \\log_4 x = 1$.", "options": [{"text": "$x = 2$ only", "isCorrect": true, "rationale": "Using the quotient rule for logarithms, $\\log_4\\left(\\frac{x+6}{x}\\right) = 1$. Converting to exponential form gives $\\frac{x+6}{x} = 4^1$, so $x+6 = 4x$. This simplifies to $6 = 3x$, leading to $x=2$. Checking this solution, $x+6 = 8 > 0$ and $x = 2 > 0$, so both arguments are positive, making $x=2$ a valid solution."}, {"text": "$x = -3$ only", "isCorrect": false, "rationale": "While algebraic steps might lead to other solutions in similar problems, $x=-3$ would make the argument $\\log_4 x$ undefined, as $x$ must be greater than 0. Thus, $x=-3$ is an extraneous solution."}, {"text": "Both $x = 2$ and $x = -3$", "isCorrect": false, "rationale": "Algebraically, only $x=2$ is obtained. Even if $x=-3$ were an algebraic result, it would be extraneous because it would lead to a non-positive argument in the original logarithm $\\log_4 x$."}, {"text": "No solution", "isCorrect": false, "rationale": "There is a valid solution, $x=2$, as it satisfies the equation and the domain requirements for the logarithms."}]}, {"question": "Determine the exact solution for $3\\ln(2x-1) - 4 = 5$.", "options": [{"text": "$x = \\frac{e^3 - 1}{2}$", "isCorrect": false, "rationale": "This solution incorrectly subtracts 1 before dividing by 2, or makes an error in isolating $e^3$."}, {"text": "$x = \\frac{e^3 + 1}{2}$", "isCorrect": true, "rationale": "First, isolate the logarithm: $3\\ln(2x-1) = 9$, which simplifies to $\\ln(2x-1) = 3$. Convert to exponential form: $2x-1 = e^3$. Then, solve for $x$: $2x = e^3 + 1$, so $x = \\frac{e^3 + 1}{2}$. Checking the argument: $2\\left(\\frac{e^3 + 1}{2}\\right)-1 = e^3+1-1 = e^3$, which is positive, so the solution is valid."}, {"text": "$x = \\frac{3e - 1}{2}$", "isCorrect": false, "rationale": "This solution incorrectly applies the exponential step, possibly confusing $e^3$ with $3e$ or making another algebraic error."}, {"text": "$x = \\frac{e^9 + 1}{2}$", "isCorrect": false, "rationale": "This would result if the initial division by 3 was not performed, leading to $2x-1 = e^9$. The logarithm must be isolated before converting to exponential form."}]}, {"question": "If $\\log(2x-7) = \\log(x+3)$, what is the value of $x$?", "options": [{"text": "$x = -10$", "isCorrect": false, "rationale": "If $x=-10$, the arguments $2x-7$ and $x+3$ would be negative, making the logarithms undefined. This is an extraneous solution."}, {"text": "$x = 4$", "isCorrect": false, "rationale": "This would result if $2x-7=x+3$ led to $x=4$, which is incorrect. $x=4$ would give $\\log(1)$ and $\\log(7)$, meaning $0 = \\log(7)$, which is false."}, {"text": "$x = 10$", "isCorrect": true, "rationale": "Since the logarithms have the same base and are equal, their arguments must be equal due to the one-to-one property: $2x-7 = x+3$. Solving for $x$ gives $x = 10$. Checking the arguments: $2(10)-7 = 13 > 0$ and $10+3 = 13 > 0$. Both are positive, so $x=10$ is a valid solution."}, {"text": "No solution", "isCorrect": false, "rationale": "There is a valid solution, $x=10$, that satisfies both the equation and the domain restrictions."}]}, {"question": "Find all solutions to the equation $(\\ln x)^2 - 5 \\ln x + 6 = 0$.", "options": [{"text": "$x = 2, x = 3$", "isCorrect": false, "rationale": "These would be the solutions for $u$ if $u = \\ln x$, but not for $x$ itself. $x$ must be in exponential form."}, {"text": "$x = e^2, x = e^3$", "isCorrect": true, "rationale": "Let $u = \\ln x$. The equation becomes $u^2 - 5u + 6 = 0$. Factoring gives $(u-2)(u-3)=0$, so $u=2$ or $u=3$. Substituting back, $\\ln x = 2$ means $x = e^2$, and $\\ln x = 3$ means $x = e^3$. Both $e^2$ and $e^3$ are positive, so their logarithms are defined. Both solutions are valid."}, {"text": "$x = e^{-2}, x = e^{-3}$", "isCorrect": false, "rationale": "This would result if $u = -2$ and $u = -3$, which is not correct from the factored quadratic equation."}, {"text": "$x = e^{1/2}, x = e^{1/3}$", "isCorrect": false, "rationale": "This would imply $\\ln x = 1/2$ and $\\ln x = 1/3$, which is not derived from the quadratic solution."}]}, {"question": "Consider the equation $\\log_6(x-2) + \\log_6(x+3) = 1$. Which of the following statements is true regarding its solution(s)?", "options": [{"text": "The only solution is $x = 3$.", "isCorrect": true, "rationale": "Combine logarithms using the product rule: $\\log_6((x-2)(x+3)) = 1$. Convert to exponential form: $(x-2)(x+3) = 6^1$, which simplifies to $x^2+x-6 = 6$. Rearranging gives $x^2+x-12 = 0$. Factoring yields $(x+4)(x-3)=0$, so $x=-4$ or $x=3$. Checking $x=3$: arguments are $(3-2)=1>0$ and $(3+3)=6>0$, so $x=3$ is valid. Checking $x=-4$: argument $(x-2) = (-4-2) = -6 \\ngtr 0$, so $x=-4$ is an extraneous solution. Thus, $x=3$ is the only solution."}, {"text": "The solutions are $x = 3$ and $x = -4$.", "isCorrect": false, "rationale": "While $x=3$ and $x=-4$ are the algebraic solutions from the quadratic, $x=-4$ is extraneous because it makes the arguments of the original logarithms negative."}, {"text": "There are no solutions because both algebraic results are extraneous.", "isCorrect": false, "rationale": "$x=3$ is a valid solution as it results in positive arguments for both logarithms."}, {"text": "The only solution is $x = -4$.", "isCorrect": false, "rationale": "$x=-4$ is an extraneous solution because it leads to negative arguments in the original logarithms. It cannot be a valid solution."}]}, {"question": "The 'Strategy for Solving Logarithmic Equations' explicitly states to 'Check all answers in the original equation; reject any that make an argument of a logarithm $\\le 0$'. This step is essential because:", "options": [{"text": "It ensures the resulting numerical answer is an integer, which is often preferred.", "isCorrect": false, "rationale": "Logarithmic equations can have non-integer solutions, so this is not a requirement or the reason for checking."}, {"text": "It validates that the algebraic manipulations were performed correctly throughout the solving process.", "isCorrect": false, "rationale": "While a correct solution might indicate correct algebra, the primary reason for this specific check is related to the domain, not just algebraic integrity."}, {"text": "The domain of a logarithmic function requires its argument to be strictly positive.", "isCorrect": true, "rationale": "This is the fundamental reason. A logarithm is only defined for arguments greater than zero. Solutions that violate this domain constraint, even if algebraically correct, are extraneous and must be rejected."}, {"text": "Logarithmic functions are always increasing, so only one solution can exist for any given equation.", "isCorrect": false, "rationale": "Logarithmic functions are indeed monotonic, but combined logarithms or those in quadratic forms can lead to multiple algebraic solutions, some of which may be valid and some extraneous. The monotonicity itself doesn't remove the need to check for domain issues."}]}, {"question": "Consider the equation $\\ln(x+1) + \\ln(x-1) = \\ln(8)$. What is the correct solution?", "options": [{"text": "$x = \\sqrt{e^8+1}$", "isCorrect": false, "rationale": "This would be the solution if the right side was 8 (not $\\ln(8)$) and the base was $e$. The problem is $\\ln(x+1) + \\ln(x-1) = \\ln(8)$, meaning the right side is a logarithm of 8."}, {"text": "$x = 3$", "isCorrect": true, "rationale": "Using the product rule, $\\ln((x+1)(x-1)) = \\ln(8)$. Due to the one-to-one property, $(x+1)(x-1) = 8$. This simplifies to $x^2-1 = 8$, so $x^2 = 9$, meaning $x = \\pm 3$. Checking $x=3$: arguments are $(3+1)=4>0$ and $(3-1)=2>0$, so $x=3$ is a valid solution. Checking $x=-3$: argument $(x+1)=(-3+1)=-2\\ngtr0$, so $x=-3$ is an extraneous solution. Therefore, $x=3$ is the only correct solution."}, {"text": "$x = -3$", "isCorrect": false, "rationale": "While $x=-3$ is an algebraic result from $x^2=9$, it is an extraneous solution because it makes the arguments of the original logarithms non-positive ($\\ln(-2)$ and $\\ln(-4)$ are undefined)."}, {"text": "$x = \\pm \\sqrt{e^8+1}$", "isCorrect": false, "rationale": "This represents solutions to $\\ln(x^2-1)=8$, not $\\ln(x^2-1)=\\ln(8)$. The 8 is already inside a logarithm on the right side."}]}, {"question": "A student attempts to solve $\\log_2(x-3) = \\log_2(5-x)$. Their algebraic steps correctly lead to $x=4$. Which of the following must still be done to confirm the solution?", "options": [{"text": "Verify that $x=4$ is positive.", "isCorrect": false, "rationale": "While $x=4$ is positive, it's not $x$ itself that must be positive, but the *arguments* of the logarithms. A valid solution for $x$ could theoretically be 0.5, for example, if it made the arguments positive."}, {"text": "Substitute $x=4$ into *both* $(x-3)$ and $(5-x)$ to ensure they are strictly positive.", "isCorrect": true, "rationale": "This is the essential check. For $x=4$, $(x-3) = (4-3) = 1 > 0$ and $(5-x) = (5-4) = 1 > 0$. Since both arguments are positive, the solution is valid. This confirms the solution according to the domain restrictions of logarithmic functions."}, {"text": "Graph $y = \\log_2(x-3)$ and $y = \\log_2(5-x)$ to see if they intersect at $x=4$.", "isCorrect": false, "rationale": "Graphical verification can be helpful, but it is not a mandatory step for formal confirmation of a solution's validity in all cases. The algebraic check against the domain is definitive."}, {"text": "Confirm that the base of the logarithm, 2, is a positive number other than 1.", "isCorrect": false, "rationale": "The base of the logarithm is a characteristic of the function itself, not something that needs to be checked for a proposed solution to an equation involving that function. It's assumed the function is well-defined from the start."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
