<body>
<div class="quiz-container">

        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What fundamental restriction defines the domain of a square root function in the real number system?", "options": [{"text": "The radicand must be a positive integer.", "isCorrect": false, "rationale": "The radicand can be any non-negative real number, not just a positive integer. It can include zero and decimals."}, {"text": "The radicand must be any real number.", "isCorrect": false, "rationale": "Taking the square root of a negative real number does not yield a real result, so the radicand cannot be any real number."}, {"text": "The radicand must be non-negative.", "isCorrect": true, "rationale": "For a square root function to produce a real number result, the expression under the radical (the radicand) must be greater than or equal to zero (non-negative)."}, {"text": "The radicand must be a perfect square.", "isCorrect": false, "rationale": "While a perfect square will yield an integer result, it is not a requirement for the domain of a square root function. For example, \\sqrt{2} is a real number."}], "id": "q01"}, {"question": "Find the domain of the function $f(x) = \\sqrt{7x + 21}$.", "options": [{"text": "$[-3, \\infty)$", "isCorrect": true, "rationale": "To find the domain, set the radicand greater than or equal to zero: $7x + 21 \\ge 0$. Subtract 21 from both sides: $7x \\ge -21$. Divide by 7: $x \\ge -3$. In interval notation, this is $[-3, \\infty)$."}, {"text": "$(- \\infty, -3]$", "isCorrect": false, "rationale": "This would be the domain if the inequality were $x \\le -3$, which results from an incorrect inequality direction."}, {"text": "$[3, \\infty)$", "isCorrect": false, "rationale": "This results from a sign error when solving the inequality, e.g., $7x \\ge 21$ instead of $7x \\ge -21$."}, {"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "Square root functions have domain restrictions; they are not defined for all real numbers unless the radicand is always non-negative."}], "id": "q02"}, {"question": "Which of the following functions has a domain of $(-\\infty, 5]$?", "options": [{"text": "$f(x) = \\sqrt{x - 5}$", "isCorrect": false, "rationale": "For $f(x) = \\sqrt{x - 5}$, the domain is $x - 5 \\ge 0 \\Rightarrow x \\ge 5$, or $[5, \\infty)$."}, {"text": "$f(x) = \\sqrt{5x}$", "isCorrect": false, "rationale": "For $f(x) = \\sqrt{5x}$, the domain is $5x \\ge 0 \\Rightarrow x \\ge 0$, or $[0, \\infty)$."}, {"text": "$f(x) = \\sqrt{10 - 2x}$", "isCorrect": true, "rationale": "For $f(x) = \\sqrt{10 - 2x}$, the domain is $10 - 2x \\ge 0$. Subtracting 10 gives $-2x \\ge -10$. Dividing by -2 and flipping the inequality sign gives $x \\le 5$, or $(-\\infty, 5]$."}, {"text": "$f(x) = \\sqrt{x + 5}$", "isCorrect": false, "rationale": "For $f(x) = \\sqrt{x + 5}$, the domain is $x + 5 \\ge 0 \\Rightarrow x \\ge -5$, or $[-5, \\infty)$."}], "id": "q03"}, {"question": "Determine the domain of the function $p(x) = \\sqrt{x^2 - 16}$.", "options": [{"text": "$[-4, 4]$", "isCorrect": false, "rationale": "This interval is where $x^2 - 16 \\le 0$. The radicand must be non-negative, not non-positive."}, {"text": "$(- \\infty, -4] \\cup [4, \\infty)$", "isCorrect": true, "rationale": "Set the radicand $x^2 - 16 \\ge 0$. Factor the quadratic: $(x - 4)(x + 4) \\ge 0$. This inequality holds true when $x \\le -4$ or $x \\ge 4$. In interval notation, this is $(-\\infty, -4] \\cup [4, \\infty)$."}, {"text": "$[4, \\infty)$", "isCorrect": false, "rationale": "This option only includes part of the correct domain, neglecting the interval where $x \\le -4$."}, {"text": "$(- \\infty, \\infty)$", "isCorrect": false, "rationale": "The radicand $x^2 - 16$ is not always non-negative (e.g., for $x=0$, $x^2-16 = -16$), so the domain is restricted."}], "id": "q04"}, {"question": "Describe the transformations applied to $y = \\sqrt{x}$ to obtain the graph of $f(x) = -2\\sqrt{x + 3} - 1$.", "options": [{"text": "Shift right 3, down 1, reflect over x-axis, stretch vertically by factor of 2.", "isCorrect": false, "rationale": "The $+3$ inside the radical indicates a shift left 3 units, not right. The negative sign outside the radical indicates a reflection over the x-axis. The factor of 2 indicates a vertical stretch."}, {"text": "Shift left 3, down 1, reflect over y-axis, stretch vertically by factor of 2.", "isCorrect": false, "rationale": "The negative sign is outside the radical, indicating reflection over the x-axis, not the y-axis."}, {"text": "Shift left 3, down 1, reflect over x-axis, compress vertically by factor of 2.", "isCorrect": false, "rationale": "The coefficient $|-2| = 2$ is greater than 1, which indicates a vertical stretch, not a compression."}, {"text": "Shift left 3, down 1, reflect over x-axis, stretch vertically by factor of 2.", "isCorrect": true, "rationale": "Comparing $f(x) = -2\\sqrt{x - (-3)} + (-1)$ to $g(x) = a\\sqrt{x - h} + k$: $h = -3$ means a shift left 3; $k = -1$ means a shift down 1; $a = -2$ means a reflection over the x-axis and a vertical stretch by a factor of 2."}], "id": "q05"}, {"question": "For the function $g(x) = \\sqrt{x + 4} - 1$, identify its starting point, domain, and range.", "options": [{"text": "Starting point: $(4, -1)$; Domain: $[4, \\infty)$; Range: $[-1, \\infty)$.", "isCorrect": false, "rationale": "The horizontal shift $h$ is derived from $x - h$, so $x + 4 = x - (-4)$, meaning $h = -4$, not $4$. The domain starts at $x=h$ and the range starts at $y=k$."}, {"text": "Starting point: $(-4, -1)$; Domain: $[-4, \\infty)$; Range: $[-1, \\infty)$.", "isCorrect": true, "rationale": "For $g(x) = \\sqrt{x - h} + k$, $h = -4$ and $k = -1$, so the starting point is $(-4, -1)$. The domain starts at $x = h$, so $[-4, \\infty)$. Since $a=1 > 0$, the graph curves upward, so the range starts at $y = k$, or $[-1, \\infty)$."}, {"text": "Starting point: $(-4, 1)$; Domain: $[-4, \\infty)$; Range: $[1, \\infty)$.", "isCorrect": false, "rationale": "The vertical shift $k$ is $-1$, not $1$."}, {"text": "Starting point: $(4, 1)$; Domain: $[4, \\infty)$; Range: $[1, \\infty)$.", "isCorrect": false, "rationale": "Both the horizontal shift $h$ and vertical shift $k$ are incorrectly identified."}], "id": "q06"}, {"question": "Which statement accurately describes the graph of $h(x) = -\\sqrt{x - 2} + 3$?", "options": [{"text": "It starts at $(2, 3)$ and curves upward to the right.", "isCorrect": false, "rationale": "The negative sign outside the square root (i.e., $a < 0$) indicates that the graph is reflected over the x-axis and curves downward, not upward."}, {"text": "It starts at $(-2, 3)$ and curves downward to the right.", "isCorrect": false, "rationale": "The horizontal shift is $h=2$ (from $x-2$), so the x-coordinate of the starting point is $2$, not $-2$."}, {"text": "It starts at $(2, 3)$ and curves downward to the right.", "isCorrect": true, "rationale": "The starting point is $(h, k) = (2, 3)$. Since the coefficient $a = -1$ (which is less than 0), the graph is reflected over the x-axis and therefore curves downward to the right."}, {"text": "It starts at $(2, -3)$ and curves upward to the right.", "isCorrect": false, "rationale": "The vertical shift $k$ is $3$, not $-3$. Also, the graph curves downward due to the negative sign in front of the radical."}], "id": "q07"}, {"question": "A square root function has its starting point at $(1, 5)$ and passes through the point $(10, 8)$. Which of the following is its equation?", "options": [{"text": "$y = \\sqrt{x - 1} + 5$", "isCorrect": true, "rationale": "Using the general form $y = a\\sqrt{x - h} + k$ with $(h, k) = (1, 5)$, we get $y = a\\sqrt{x - 1} + 5$. Substitute the point $(10, 8)$: $8 = a\\sqrt{10 - 1} + 5 \\Rightarrow 8 = a\\sqrt{9} + 5 \\Rightarrow 8 = 3a + 5$. Solving for $a$: $3 = 3a \\Rightarrow a = 1$. So the equation is $y = 1\\sqrt{x - 1} + 5$, or $y = \\sqrt{x - 1} + 5$."}, {"text": "$y = \\frac{1}{3}\\sqrt{x - 1} + 5$", "isCorrect": false, "rationale": "This equation would imply $a = 1/3$, but the calculation shows $a=1$ is required for the function to pass through $(10,8)$."}, {"text": "$y = 3\\sqrt{x - 1} + 5$", "isCorrect": false, "rationale": "This equation would imply $a = 3$, but the calculation shows $a=1$ is required for the function to pass through $(10,8)$."}, {"text": "$y = \\sqrt{x + 1} + 5$", "isCorrect": false, "rationale": "The term $x + 1$ implies $h = -1$, meaning the starting point would be $(-1, 5)$, not $(1, 5)$."}], "id": "q08"}, {"question": "Consider the function $g(x) = \\sqrt{-(x-4)} + 2$. How does the graph of $g(x)$ compare to the basic square root function $f(x) = \\sqrt{x}$?", "options": [{"text": "$g(x)$ is shifted right 4 units and up 2 units.", "isCorrect": false, "rationale": "The negative sign inside the radical, affecting $x$, indicates a reflection, not just a shift. Also, the direction of reflection is horizontal."}, {"text": "$g(x)$ is reflected over the x-axis, shifted right 4 units, and up 2 units.", "isCorrect": false, "rationale": "The reflection occurs horizontally (over the y-axis or a vertical line), not vertically (over the x-axis), because the negative sign is inside the radical affecting $x$."}, {"text": "$g(x)$ is reflected over the y-axis, shifted right 4 units, and up 2 units.", "isCorrect": true, "rationale": "The negative sign within the radicand, $-(x-4)$, indicates a reflection across the y-axis. The term $x-4$ indicates a shift right 4 units (the anchor point is where $x-4=0$, so $x=4$), and the $+2$ indicates a shift up 2 units. The domain $-(x-4) \\ge 0 \\Rightarrow x \\le 4$ means it extends to the left from its starting point $(4,2)$."}, {"text": "$g(x)$ is reflected over the y-axis, shifted left 4 units, and up 2 units.", "isCorrect": false, "rationale": "The term $x-4$ indicates a shift to the right by 4 units, not to the left."}], "id": "q09"}, {"question": "A pendulum is designed to have a period of 4 seconds. Using the formula $T = 2\\pi\\sqrt{L/9.8}$, what length $L$ (in meters) is required? Round to two decimal places.", "options": [{"text": "$0.99$ m", "isCorrect": false, "rationale": "This length corresponds to a period of approximately 2 seconds, not 4 seconds, as shown in the textbook example."}, {"text": "$3.97$ m", "isCorrect": true, "rationale": "Substitute $T=4$ into the formula: $4 = 2\\pi\\sqrt{L/9.8}$. Divide by $2\\pi$: $2/\\pi = \\sqrt{L/9.8}$. Square both sides: $(2/\\pi)^2 = L/9.8$. Solve for $L$: $L = 9.8 \\times (2/\\pi)^2 = 9.8 \\times (4/\\pi^2) \\approx 9.8 \\times (4/9.8696) \\approx 3.9717$. Rounded to two decimal places, $L \\approx 3.97$ m."}, {"text": "$1.27$ m", "isCorrect": false, "rationale": "This value would result from calculation errors, such as incorrectly squaring $2/\\pi$ or errors in subsequent division/multiplication."}, {"text": "$15.88$ m", "isCorrect": false, "rationale": "This value might result from multiplying by $9.8$ multiple times or incorrect squaring/division steps, leading to an overly large length."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
