<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental geometric definition of a circle?", "options": [{"text": "The set of all points in a plane equidistant from two fixed points.", "isCorrect": false, "rationale": "This describes an ellipse, not a circle. A circle is defined by its distance from a single fixed point."}, {"text": "The set of all points in a plane that lie a fixed distance from a fixed point called the center.", "isCorrect": true, "rationale": "This is the precise definition of a circle as provided in the text: 'the set of all points in a plane that lie a fixed distance—the radius—from a fixed point called the center.'"}, {"text": "A closed curve where all points are connected by straight line segments of equal length.", "isCorrect": false, "rationale": "This describes a regular polygon, not a smooth curve like a circle."}, {"text": "The path traced by a point that moves at a constant speed around a central axis.", "isCorrect": false, "rationale": "While a circle can be described this way in motion, it's not its static geometric definition as a 'set of points'."}], "id": "q01"}, {"question": "Write the standard-form equation of the circle with center $(-5, 2)$ and radius $7$.", "options": [{"text": "$(x - 5)^2 + (y + 2)^2 = 7$", "isCorrect": false, "rationale": "The signs for the center coordinates are incorrect, and the radius should be squared on the right side of the equation."}, {"text": "$(x + 5)^2 + (y - 2)^2 = 49$", "isCorrect": true, "rationale": "Substituting $h = -5$, $k = 2$, and $r = 7$ into $(x-h)^2 + (y-k)^2 = r^2$ gives $(x - (-5))^2 + (y - 2)^2 = 7^2$, which simplifies to $(x + 5)^2 + (y - 2)^2 = 49$."}, {"text": "$(x - 5)^2 + (y + 2)^2 = 49$", "isCorrect": false, "rationale": "The signs for the center coordinates are incorrect. $h$ and $k$ are subtracted from $x$ and $y$ respectively, so for $(-5, 2)$ it should be $(x - (-5))$ and $(y - 2)$."}, {"text": "$(x + 5)^2 + (y - 2)^2 = 7$", "isCorrect": false, "rationale": "While the center coordinates are correctly incorporated with signs, the radius must be squared, so $7^2 = 49$, not $7$."}], "id": "q02"}, {"question": "Identify the center and radius of the circle given by the equation $(x + 8)^2 + (y - 3)^2 = 64$.", "options": [{"text": "Center $(8, -3)$, radius $8$", "isCorrect": false, "rationale": "The signs for the center coordinates are incorrect. In $(x-h)^2$, if it's $(x+8)^2$, then $h = -8$. Similarly for $k$."}, {"text": "Center $(-8, 3)$, radius $8$", "isCorrect": true, "rationale": "Comparing to $(x-h)^2 + (y-k)^2 = r^2$, we have $x - (-8)$ and $y - 3$, so the center is $(-8, 3)$. For $r^2 = 64$, the radius $r = \\sqrt{64} = 8$ (since $r > 0$)."}, {"text": "Center $(-8, 3)$, radius $64$", "isCorrect": false, "rationale": "The center is correct, but the radius is the square root of the number on the right side, not the number itself."}, {"text": "Center $(8, -3)$, radius $64$", "isCorrect": false, "rationale": "Both the signs for the center coordinates and the value for the radius are incorrect."}], "id": "q03"}, {"question": "Which of the following equations represents a circle centered at the origin with a radius of 1 (a unit circle)?", "options": [{"text": "$x^2 - y^2 = 1$", "isCorrect": false, "rationale": "This equation represents a hyperbola, not a circle. The standard form for a circle requires the sum of squared terms."}, {"text": "$(x - 1)^2 + (y - 1)^2 = 1$", "isCorrect": false, "rationale": "This equation represents a circle with center $(1,1)$ and radius $1$, not a circle centered at the origin."}, {"text": "$x^2 + y^2 = 1$", "isCorrect": true, "rationale": "When the center $(h,k)$ is at the origin $(0,0)$, the standard form simplifies to $x^2 + y^2 = r^2$. For a unit circle, $r=1$, so $x^2 + y^2 = 1^2 = 1$."}, {"text": "$x^2 + y^2 = 0$", "isCorrect": false, "rationale": "This equation represents a single point, the origin $(0,0)$, because $r^2 = 0$, meaning the radius is 0."}], "id": "q04"}, {"question": "Convert the equation $x^2 + y^2 - 10x + 4y - 7 = 0$ into standard form.", "options": [{"text": "$(x - 5)^2 + (y + 2)^2 = 36$", "isCorrect": true, "rationale": "To convert, group $x$-terms and $y$-terms and move the constant: $(x^2 - 10x) + (y^2 + 4y) = 7$. Complete the square for $x$: $(-10/2)^2 = 25$. Complete the square for $y$: $(4/2)^2 = 4$. Add these to both sides: $(x^2 - 10x + 25) + (y^2 + 4y + 4) = 7 + 25 + 4$, which simplifies to $(x - 5)^2 + (y + 2)^2 = 36$."}, {"text": "$(x + 5)^2 + (y - 2)^2 = 36$", "isCorrect": false, "rationale": "The signs for the center coordinates are incorrect. $(x^2 - 10x)$ completes to $(x-5)^2$, and $(y^2 + 4y)$ completes to $(y+2)^2$."}, {"text": "$(x - 5)^2 + (y + 2)^2 = 7$", "isCorrect": false, "rationale": "The constant term on the right side is incorrect. When completing the square, the added values must also be added to the right side of the equation."}, {"text": "$(x + 5)^2 + (y - 2)^2 = 7$", "isCorrect": false, "rationale": "Both the signs for the center coordinates and the constant term on the right side are incorrect."}], "id": "q05"}, {"question": "What is the radius of the circle represented by the equation $4x^2 + 4y^2 + 16x - 24y - 36 = 0$?", "options": [{"text": "$36$", "isCorrect": false, "rationale": "Before completing the square, all terms must be divided by the coefficient of $x^2$ and $y^2$. Also, this value would be $r^2$, not $r$."}, {"text": "$6$", "isCorrect": false, "rationale": "After dividing by 4 and completing the square, we get $(x + 2)^2 + (y - 3)^2 = 22$. The radius is $\\sqrt{22} \\approx 4.69$, not $6$. This error arises from incorrectly computing the right-hand side after completing the square."}, {"text": "$\\sqrt{22}$", "isCorrect": true, "rationale": "First, divide the entire equation by 4: $x^2 + y^2 + 4x - 6y - 9 = 0$. Group terms and move constant: $(x^2 + 4x) + (y^2 - 6y) = 9$. Complete the square: $(x^2 + 4x + 4) + (y^2 - 6y + 9) = 9 + 4 + 9$. This gives $(x + 2)^2 + (y - 3)^2 = 22$. Thus, $r^2 = 22$, and the radius $r = \\sqrt{22}$."}, {"text": "$22$", "isCorrect": false, "rationale": "This value would be $r^2$, not the radius $r$. The radius is the square root of this value."}], "id": "q06"}, {"question": "After completing the square for an equation of the form $x^2 + y^2 + Dx + Ey + F = 0$, suppose the resulting standard form is $(x-h)^2 + (y-k)^2 = -9$. What does this indicate about the graph?", "options": [{"text": "It represents a circle with a radius of $3i$.", "isCorrect": false, "rationale": "In real coordinate geometry, a radius must be a positive real number. An imaginary radius implies no real graph."}, {"text": "It represents a single point at $(h, k)$.", "isCorrect": false, "rationale": "A single point occurs if $r^2 = 0$. Here, $r^2 = -9$, which is negative."}, {"text": "It represents a circle centered at $(h, k)$ with radius $3$.", "isCorrect": false, "rationale": "The value on the right side, $-9$, is $r^2$. A negative $r^2$ means no real radius and thus no real circle."}, {"text": "It has no graph in the real Cartesian plane.", "isCorrect": true, "rationale": "The text states that an equation of the general form 'has no graph (if $r^2 < 0$)'. Since $r^2 = -9$, which is less than 0, there is no real graph for this equation."}], "id": "q07"}, {"question": "A circle has the equation $(x + 1)^2 + (y - 6)^2 = 100$. Which of the following statements about its graph is true?", "options": [{"text": "The circle is symmetric about the lines $x=1$ and $y=-6$.", "isCorrect": false, "rationale": "The lines of symmetry for a circle are the horizontal and vertical lines passing through its center. The center is $(-1, 6)$, so the lines of symmetry are $x = -1$ and $y = 6$."}, {"text": "The center of the circle is $(1, -6)$ and its radius is $100$.", "isCorrect": false, "rationale": "The center is $(-1, 6)$, and the radius is $\\sqrt{100} = 10$, not $100$."}, {"text": "To sketch the circle, you would plot the center at $(-1, 6)$ and then mark points $10$ units away horizontally and vertically.", "isCorrect": true, "rationale": "The center is $(-1, 6)$ and the radius is $r = \\sqrt{100} = 10$. The correct sketching method involves plotting the center and then marking the 'compass points' $r$ units in each cardinal direction from the center, as described in the text."}, {"text": "The circle passes through the origin $(0,0)$.", "isCorrect": false, "rationale": "Substitute $(0,0)$ into the equation: $(0+1)^2 + (0-6)^2 = 1^2 + (-6)^2 = 1 + 36 = 37$. Since $37 \\neq 100$, the circle does not pass through the origin."}], "id": "q08"}, {"question": "A point $(3, 1)$ lies on a circle whose center is at $(3, -4)$. What is the standard-form equation of this circle?", "options": [{"text": "$(x - 3)^2 + (y + 4)^2 = 5$", "isCorrect": false, "rationale": "The calculation for the radius squared is incorrect. The radius is the distance from $(3, -4)$ to $(3, 1)$, which is $5$. Therefore, $r^2$ should be $25$."}, {"text": "$(x + 3)^2 + (y - 4)^2 = 25$", "isCorrect": false, "rationale": "The signs for the center coordinates are incorrect. For center $(3, -4)$, the equation should be $(x-3)^2 + (y-(-4))^2$."}, {"text": "$(x - 3)^2 + (y + 4)^2 = 25$", "isCorrect": true, "rationale": "The center is $(h, k) = (3, -4)$. The radius $r$ is the distance between the center and the point $(3, 1)$. Using the distance formula, $r = \\sqrt{(3-3)^2 + (1-(-4))^2} = \\sqrt{0^2 + 5^2} = \\sqrt{25} = 5$. Substituting these values into the standard form $(x-h)^2 + (y-k)^2 = r^2$ gives $(x - 3)^2 + (y - (-4))^2 = 5^2$, which simplifies to $(x - 3)^2 + (y + 4)^2 = 25$."}, {"text": "$(x - 3)^2 + (y - 1)^2 = 25$", "isCorrect": false, "rationale": "This equation uses the point $(3,1)$ as the center, not the given center $(3,-4)$. The question specifies the center at $(3,-4)$."}], "id": "q09"}, {"question": "Which of the following statements about the equation of a circle is FALSE?", "options": [{"text": "For the equation $(x-h)^2 + (y-k)^2 = r^2$, the radius $r$ must always be a positive value.", "isCorrect": false, "rationale": "This statement is TRUE. The definition of a circle specifies $r > 0$. If $r=0$, it's a point, not a circle."}, {"text": "When converting from general form, if $x^2$ and $y^2$ have a common coefficient other than 1, it must be divided out before completing the square.", "isCorrect": false, "rationale": "This statement is TRUE. The text explicitly demonstrates this by dividing $2x^2 + 2y^2 + 8x - 12y + 2 = 0$ by 2 before completing the square."}, {"text": "The general form $x^2 + y^2 + Dx + Ey + F = 0$ always represents a circle.", "isCorrect": true, "rationale": "This statement is FALSE. The key concept notes that this general form 'represents a circle (if $r^2 > 0$), a single point (if $r^2 = 0$), or has no graph (if $r^2 < 0$)'. Therefore, it does not *always* represent a circle."}, {"text": "The values $h$ and $k$ in the standard form $(x-h)^2 + (y-k)^2 = r^2$ directly represent the coordinates of the center $(h,k)$.", "isCorrect": false, "rationale": "This statement is TRUE. By definition, $(h,k)$ is the center of the circle in standard form."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
