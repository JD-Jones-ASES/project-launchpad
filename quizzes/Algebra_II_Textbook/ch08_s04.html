    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Given the piecewise function $f(x) = cases x^2 - 1 & if x < 0, \\ 3 & if x = 0, \\ 2x + 1 & if x > 0. cases$, what is the value of $f(-3)$?", "options": [{"text": "-1", "isCorrect": false, "rationale": "This would be the result if -3 were mistakenly applied to the 'x=0' or 'x>0' conditions, or if the calculation was incorrect for x < 0."}, {"text": "3", "isCorrect": false, "rationale": "This is the value for $f(0)$, not $f(-3)$. The condition for this piece is $x=0$."}, {"text": "8", "isCorrect": true, "rationale": "Since $-3 < 0$, we use the first rule $f(x) = x^2 - 1$. Substituting $x = -3$ gives $f(-3) = (-3)^2 - 1 = 9 - 1 = 8$."}, {"text": "Undefined", "isCorrect": false, "rationale": "The function is defined for all real numbers, as its domain is covered by the specified intervals."}], "id": "q01"}, {"question": "When graphing a piecewise function, what symbol should be used at an endpoint defined by an inequality such as $x > a$ or $x < a$?", "options": [{"text": "A solid dot", "isCorrect": false, "rationale": "A solid dot is used for endpoints that are included in the interval, indicated by inequalities like $x \\geq a$ or $x \\leq a$."}, {"text": "An open dot", "isCorrect": true, "rationale": "An open dot is used for endpoints that are excluded from the interval, indicated by strict inequalities like $x > a$ or $x < a$."}, {"text": "A dashed line", "isCorrect": false, "rationale": "A dashed line is typically used for asymptotes or to indicate parts of a graph not included, not for single endpoints of a piecewise function."}, {"text": "A vertical line", "isCorrect": false, "rationale": "A vertical line might indicate a vertical asymptote or a specific x-value, but not the inclusion or exclusion of an endpoint on a segment."}], "id": "q02"}, {"question": "Which of the following conditions must be met for a piecewise function $f(x)$ to be continuous at a breakpoint $x=c$?", "options": [{"text": "$f(c)$ is defined, and the graph has a hole at $x=c$.", "isCorrect": false, "rationale": "If the graph has a hole, it is not continuous at that point, even if $f(c)$ is defined elsewhere. For continuity, there must be no holes or jumps."}, {"text": "The left-hand and right-hand values at $c$ are equal, but $f(c)$ does not need to equal this common value.", "isCorrect": false, "rationale": "For continuity, $f(c)$ must be defined and equal to the common left-hand and right-hand values. If $f(c)$ differs, it's a removable discontinuity (a hole)."}, {"text": "$f(c)$ is defined, and the left-hand, right-hand, and $f(c)$ values are all equal.", "isCorrect": true, "rationale": "For a piecewise function to be continuous at a breakpoint $x=c$, all three conditions must hold: $f(c)$ is defined, the left-hand and right-hand values at $c$ are equal, and that common value equals $f(c)$."}, {"text": "Only the left-hand and right-hand values must be defined at $c$.", "isCorrect": false, "rationale": "Being defined from both sides is necessary but not sufficient for continuity; the values must also be equal to each other and to $f(c)$."}], "id": "q03"}, {"question": "Find the value of $k$ that makes the function $f(x) = cases kx - 2 & if x < 3, \\ 2x + 1 & if x \\geq 3. cases$ continuous at $x = 3$.", "options": [{"text": "$k = 1$", "isCorrect": false, "rationale": "If $k=1$, the left-hand value is $1(3) - 2 = 1$, which does not equal the right-hand value of $2(3) + 1 = 7$. Thus, it would not be continuous."}, {"text": "$k = 3$", "isCorrect": true, "rationale": "For continuity at $x=3$, the left-hand value must equal the right-hand value. The right-hand value (and $f(3)$) is $2(3) + 1 = 7$. The left-hand value is $k(3) - 2 = 3k - 2$. Setting them equal: $3k - 2 = 7 \\implies 3k = 9 \\implies k = 3$."}, {"text": "$k = -2$", "isCorrect": false, "rationale": "If $k=-2$, the left-hand value is $-2(3) - 2 = -8$, which does not equal the right-hand value of $7$. Thus, it would not be continuous."}, {"text": "$k = 7$", "isCorrect": false, "rationale": "If $k=7$, the left-hand value is $7(3) - 2 = 19$, which does not equal the right-hand value of $7$. Thus, it would not be continuous."}], "id": "q04"}, {"question": "Which of the following piecewise functions correctly represents the absolute value expression $h(x) = |4x - 8|$?", "options": [{"text": "$cases 4x - 8 & if x < 2, \\ -4x + 8 & if x \\geq 2. cases$", "isCorrect": false, "rationale": "This definition incorrectly assigns the positive case ($4x-8$) to $x<2$, where $4x-8$ would be negative, and the negative case ($-4x+8$) to $x \\geq 2$, where $4x-8$ would be non-negative."}, {"text": "$cases 4x - 8 & if x \\geq 2, \\ -4x + 8 & if x < 2. cases$", "isCorrect": true, "rationale": "The expression $4x - 8$ is zero when $x=2$. If $x \\geq 2$, $4x - 8 \\geq 0$, so $|4x - 8| = 4x - 8$. If $x < 2$, $4x - 8 < 0$, so $|4x - 8| = -(4x - 8) = -4x + 8$. This correctly reflects the definition of absolute value."}, {"text": "$cases 4x + 8 & if x \\geq 2, \\ -4x - 8 & if x < 2. cases$", "isCorrect": false, "rationale": "This option introduces incorrect signs for both pieces of the function, not correctly representing the absolute value of $4x-8$."}, {"text": "$cases 4x - 8 & if x \\geq 0, \\ -4x + 8 & if x < 0. cases$", "isCorrect": false, "rationale": "The breakpoint should be where the expression inside the absolute value is zero, which is $x=2$, not $x=0$."}], "id": "q05"}, {"question": "A simplified income-tax model charges 10% on income up to $10,000 and 20% on income from $10,001 to $40,000. For income above $40,000, it charges 30% on the additional income (plus the tax from lower brackets). How much tax would a person pay on an income of $50,000?", "options": [{"text": "$1,000", "isCorrect": false, "rationale": "This is only the tax on the first $10,000 of income ($0.10 \\times $10,000)."}, {"text": "$4,000", "isCorrect": false, "rationale": "This is the tax on an income of $25,000, as calculated in the text: $1,000 + 0.20($25,000 - $10,000) = $4,000."}, {"text": "$7,000", "isCorrect": false, "rationale": "This is the total tax paid for income up to $40,000: $1,000 (from first bracket) + $0.20($40,000 - $10,000) = $1,000 + $6,000 = $7,000."}, {"text": "$10,000", "isCorrect": true, "rationale": "Using the tax function $T(x) = 7,000 + 0.30(x - 40,000)$ for $x > 40,000$: $T(50,000) = 7,000 + 0.30(50,000 - 40,000) = 7,000 + 0.30(10,000) = 7,000 + 3,000 = $10,000."}], "id": "q06"}, {"question": "A mailing service charges $3.00 for the first pound and $1.50 for each additional pound or fraction thereof. Using the ceiling function concept, which expression best represents the cost $C(w)$ for a package weighing $w$ pounds (where $w > 0$)?", "options": [{"text": "$C(w) = 3 + 1.50 \\lfloor w \\rfloor$", "isCorrect": false, "rationale": "This formula incorrectly uses the floor function and doesn't account for the 'first pound' charge separately from 'additional pounds'."}, {"text": "$C(w) = 3w + 1.50$", "isCorrect": false, "rationale": "This is a linear function, not a step function, and does not correctly model the pricing structure where the first pound is different and fractions round up."}, {"text": "$C(w) = cases 3 & 0 < w \\leq 1, \\ 3 + 1.50 \\lceil w - 1 \\rceil & w > 1. cases$", "isCorrect": true, "rationale": "For $w \\leq 1$, the cost is $3.00. For $w > 1$, the number of additional pounds (or fractions thereof) is $\\lceil w - 1 \\rceil$. Each of these additional units costs $1.50, added to the initial $3.00."}, {"text": "$C(w) = 3 + 1.50 \\lceil w \\rceil$", "isCorrect": false, "rationale": "This formula incorrectly applies the ceiling function to the total weight $w$, instead of the 'additional' weight beyond the first pound."}], "id": "q07"}, {"question": "What is the domain and symmetry characteristic of the parent cube root function, $f(x) = \\sqrt[3]{x}$?", "options": [{"text": "Domain: $[0, \\infty)$; Symmetric about the y-axis.", "isCorrect": false, "rationale": "This describes the square root function. The cube root function is defined for all real numbers and is symmetric about the origin, not the y-axis."}, {"text": "Domain: $(-\\infty, \\infty)$; Symmetric about the origin (odd function).", "isCorrect": true, "rationale": "The cube root function is defined for all real numbers (domain $(-\\infty, \\infty)$) because any real number has a real cube root. It is an odd function ($f(-x) = -f(x)$), meaning it is symmetric about the origin."}, {"text": "Domain: $(-\\infty, \\infty)$; Symmetric about the x-axis.", "isCorrect": false, "rationale": "While the domain is correct, a function cannot be symmetric about the x-axis (unless it is $y=0$) without failing the vertical line test. Also, cube root functions are symmetric about the origin."}, {"text": "Domain: $(-\\infty, \\infty)$; No symmetry.", "isCorrect": false, "rationale": "The domain is correct, but the parent cube root function does exhibit symmetry about the origin."}], "id": "q08"}, {"question": "For the function $g(x) = 4\\sqrt[3]{x-5} + 2$, what are the transformations applied to $f(x) = \\sqrt[3]{x}$ and what is its inflection point?", "options": [{"text": "Vertical stretch by 4, shift right 5, shift up 2; Inflection point: $(-5, 2)$.", "isCorrect": false, "rationale": "The inflection point's x-coordinate for a horizontal shift $x-h$ is $h$, not $-h$. Also, the vertical shift is correct, but the sign for the x-coordinate is wrong."}, {"text": "Vertical stretch by 4, shift left 5, shift up 2; Inflection point: $(5, 2)$.", "isCorrect": false, "rationale": "A term $x-5$ indicates a shift to the right, not left. The inflection point is $(h, k)$, which is $(5, 2)$ here."}, {"text": "Vertical stretch by 4, shift right 5, shift up 2; Inflection point: $(5, 2)$.", "isCorrect": true, "rationale": "The coefficient '4' indicates a vertical stretch by a factor of 4. The 'x-5' inside the cube root means a horizontal shift right by 5 units. The '+2' at the end means a vertical shift up by 2 units. The inflection point for $a\\sqrt[3]{x-h}+k$ is $(h, k)$, so for this function it's $(5, 2)$."}, {"text": "Vertical compression by 4, shift right 5, shift down 2; Inflection point: $(5, -2)$.", "isCorrect": false, "rationale": "The coefficient '4' indicates a stretch, not a compression. The vertical shift is up, not down, and the inflection point's y-coordinate is $k$, which is $2$, not $-2$."}], "id": "q09"}, {"question": "Which of the following is a key characteristic of the Gaussian function (bell curve) $f(x) = ae^{-(x-h)^2/(2\\sigma^2)}$?", "options": [{"text": "It has a domain of $[0, \\infty)$ and a range of $(-\\infty, \\infty)$.", "isCorrect": false, "rationale": "The bell curve's domain is $(-\\infty, \\infty)$, but its range is restricted to $(0, a]$ (or $[0, a)$ depending on formulation of $a$ and $y=0$ as asymptote)."}, {"text": "It has a vertical asymptote at $x=h$ and its peak is at $y=0$.", "isCorrect": false, "rationale": "The bell curve does not have vertical asymptotes. Its peak (maximum value) occurs at $x=h$, and its value at the peak is $a$, not $0$."}, {"text": "It is symmetric about $x=h$, reaches a maximum value at its peak, and has a horizontal asymptote at $y=0$.", "isCorrect": true, "rationale": "The Gaussian function is symmetric about its peak at $x=h$. It has a maximum value of $a$ at this peak, and it approaches $y=0$ as $x \\to \\pm\\infty$, making $y=0$ a horizontal asymptote."}, {"text": "It is an odd function, symmetric about the origin, with no horizontal asymptotes.", "isCorrect": false, "rationale": "The Gaussian function is an even function if $h=0$ (symmetric about the y-axis), but generally symmetric about $x=h$. It is not an odd function, and it always has a horizontal asymptote at $y=0$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
