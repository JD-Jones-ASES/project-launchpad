<script>
var QUESTIONS = [{"question": "What is the primary difference in how a vertical asymptote and a hole (removable discontinuity) arise from the factors of a rational function $f(x) = P(x)/Q(x)$?", "options": [{"text": "A vertical asymptote arises from factors in $Q(x)$ that also cancel with factors in $P(x)$, while a hole arises from factors in $Q(x)$ that do not cancel.", "isCorrect": false, "rationale": "This statement reverses the definitions. A vertical asymptote comes from non-canceling factors in the denominator, and a hole comes from canceling factors."}, {"text": "A vertical asymptote arises from factors in $Q(x)$ that do not cancel with factors in $P(x)$, while a hole arises from factors in $Q(x)$ that *do* cancel with factors in $P(x)$.", "isCorrect": true, "rationale": "This accurately distinguishes between vertical asymptotes and holes. Vertical asymptotes occur at zeros of denominator factors that do not cancel with the numerator, leading to unbounded behavior. Holes occur at zeros of denominator factors that *do* cancel, resulting in a single missing point."}, {"text": "Both arise from factors in $Q(x)$ that cancel with factors in $P(x)$, but a hole is a single missing point while an asymptote is a line.", "isCorrect": false, "rationale": "This is incorrect because vertical asymptotes arise from factors in $Q(x)$ that *do not* cancel, not from canceling factors."}, {"text": "Vertical asymptotes are determined by $P(x)$, and holes are determined by $Q(x)$.", "isCorrect": false, "rationale": "Both vertical asymptotes and holes are determined by the zeros of the denominator $Q(x)$, in conjunction with whether those factors cancel with the numerator $P(x)$."}], "id": "q01"}, {"question": "For the function $f(x) = \\frac{x^2 - 4x + 4}{x^2 - 4}$, identify the coordinates of any holes.", "options": [{"text": "There are no holes.", "isCorrect": false, "rationale": "Factoring the function reveals a common factor in the numerator and denominator, which indicates the presence of a hole."}, {"text": "A hole exists at $(2, 0)$.", "isCorrect": true, "rationale": "First, factor the numerator and denominator: $f(x) = \\frac{(x-2)^2}{(x-2)(x+2)}$. The factor $(x-2)$ cancels, indicating a hole at $x=2$. To find the y-coordinate, substitute $x=2$ into the simplified function $f(x) = \\frac{x-2}{x+2}$, which gives $\\frac{2-2}{2+2} = \\frac{0}{4} = 0$. Thus, the hole is at $(2, 0)$."}, {"text": "A hole exists at $(2, 1)$.", "isCorrect": false, "rationale": "While there is a hole at $x=2$, evaluating the simplified function $f(x) = \\frac{x-2}{x+2}$ at $x=2$ yields $\\frac{0}{4}=0$, not 1."}, {"text": "A hole exists at $(-2, \\text{undefined})$.", "isCorrect": false, "rationale": "The factor $(x+2)$ in the denominator does not cancel, indicating a vertical asymptote at $x=-2$, not a hole. The function approaches infinity or negative infinity near $x=-2$, it is not just undefined as a single point."}], "id": "q02"}, {"question": "Consider the function $f(x) = \\frac{x^2 - x - 6}{x^2 - 9}$. Which of the following describes its vertical asymptotes?", "options": [{"text": "$x = 3$ and $x = -3$.", "isCorrect": false, "rationale": "While $x=3$ and $x=-3$ are zeros of the denominator, $x=3$ results in a hole, not a vertical asymptote."}, {"text": "$x = -3$ only.", "isCorrect": true, "rationale": "First, factor the numerator and denominator: $f(x) = \\frac{(x-3)(x+2)}{(x-3)(x+3)}$. The factor $(x-3)$ cancels, indicating a hole at $x=3$. The factor $(x+3)$ remains in the denominator, indicating a vertical asymptote at $x=-3$."}, {"text": "$x = 3$ only.", "isCorrect": false, "rationale": "The factor $(x-3)$ cancels from the numerator and denominator, meaning there is a hole at $x=3$, not a vertical asymptote."}, {"text": "There are no vertical asymptotes.", "isCorrect": false, "rationale": "There is a non-canceling factor $(x+3)$ in the denominator, which produces a vertical asymptote at $x=-3$."}], "id": "q03"}, {"question": "Which of the following functions has a horizontal asymptote at $y = 0$?", "options": [{"text": "$f(x) = \\frac{3x^2 + 1}{x^2 - 5}$", "isCorrect": false, "rationale": "For this function, the degree of the numerator (2) is equal to the degree of the denominator (2). The horizontal asymptote is the ratio of the leading coefficients, $y = \\frac{3}{1} = 3$."}, {"text": "$f(x) = \\frac{x^3 - 2x}{x^2 + 1}$", "isCorrect": false, "rationale": "For this function, the degree of the numerator (3) is greater than the degree of the denominator (2). Therefore, there is no horizontal asymptote (instead, there is an oblique asymptote)."}, {"text": "$f(x) = \\frac{x - 1}{x^2 + 4}$", "isCorrect": true, "rationale": "For this function, the degree of the numerator (1) is less than the degree of the denominator (2). According to the rules for horizontal asymptotes, when $n < m$, the horizontal asymptote is $y = 0$."}, {"text": "$f(x) = \\frac{2x + 5}{x - 3}$", "isCorrect": false, "rationale": "For this function, the degree of the numerator (1) is equal to the degree of the denominator (1). The horizontal asymptote is the ratio of the leading coefficients, $y = \\frac{2}{1} = 2$."}], "id": "q04"}, {"question": "Under what condition does a rational function $f(x) = P(x)/Q(x)$ have an oblique (slant) asymptote?", "options": [{"text": "When the degree of $P(x)$ is equal to the degree of $Q(x)$.", "isCorrect": false, "rationale": "When the degrees are equal, the function has a horizontal asymptote at $y = a_n/b_m$, not an oblique asymptote."}, {"text": "When the degree of $P(x)$ is less than the degree of $Q(x)$.", "isCorrect": false, "rationale": "When the degree of $P(x)$ is less than the degree of $Q(x)$, the function has a horizontal asymptote at $y = 0$, not an oblique asymptote."}, {"text": "When the degree of $P(x)$ is exactly one more than the degree of $Q(x)$.", "isCorrect": true, "rationale": "An oblique (slant) asymptote exists precisely when the degree of the numerator is exactly one greater than the degree of the denominator. In this case, polynomial long division yields a linear quotient (mx+b) and a remainder that approaches zero as x approaches infinity."}, {"text": "When $Q(x)$ has no real roots.", "isCorrect": false, "rationale": "The existence of an oblique asymptote depends on the relationship between the degrees of the numerator and denominator polynomials, not on whether the denominator has real roots."}], "id": "q05"}, {"question": "Find the oblique asymptote for the function $f(x) = \\frac{x^3 + 2x^2 - 5x - 6}{x^2 + x - 2}$.", "options": [{"text": "$y = x - 3$", "isCorrect": false, "rationale": "Performing polynomial long division of $x^3 + 2x^2 - 5x - 6$ by $x^2 + x - 2$ results in a quotient of $x+1$, not $x-3$."}, {"text": "$y = x + 1$", "isCorrect": true, "rationale": "To find the oblique asymptote, perform polynomial long division. $ (x^3 + 2x^2 - 5x - 6) \\div (x^2 + x - 2) = x + 1 + \\frac{-4x-4}{x^2+x-2}$. As $x \\to \\pm\\infty$, the remainder term $\\frac{-4x-4}{x^2+x-2}$ approaches 0. Therefore, the oblique asymptote is $y = x + 1$."}, {"text": "$y = 0$", "isCorrect": false, "rationale": "Since the degree of the numerator (3) is greater than the degree of the denominator (2), there is no horizontal asymptote at $y=0$. There is an oblique asymptote."}, {"text": "There is no oblique asymptote.", "isCorrect": false, "rationale": "An oblique asymptote exists because the degree of the numerator (3) is exactly one more than the degree of the denominator (2)."}], "id": "q06"}, {"question": "What are the x-intercepts of the function $f(x) = \\frac{x^2 - 9}{x^2 - 5x + 6}$?", "options": [{"text": "$(3, 0)$ and $(-3, 0)$.", "isCorrect": false, "rationale": "While $x=3$ is a zero of the original numerator, the factor $(x-3)$ cancels, meaning there's a hole at $x=3$ and not an x-intercept."}, {"text": "$(-3, 0)$ only.", "isCorrect": true, "rationale": "First, factor the numerator and denominator: $f(x) = \\frac{(x-3)(x+3)}{(x-3)(x-2)}$. The factor $(x-3)$ cancels, leaving the simplified function $f(x) = \\frac{x+3}{x-2}$ (for $x \\ne 3$). To find x-intercepts, set the simplified numerator to zero: $x+3=0 \\Rightarrow x=-3$. Since $x=-3$ is not a domain restriction for the simplified form, it is an x-intercept. The point is $(-3, 0)$."}, {"text": "$(2, 0)$ only.", "isCorrect": false, "rationale": "The factor $(x-2)$ in the denominator means there is a vertical asymptote at $x=2$, not an x-intercept. An x-intercept occurs when the function value is zero, which means the numerator must be zero."}, {"text": "There are no x-intercepts.", "isCorrect": false, "rationale": "The simplified numerator is $x+3$, which has a zero at $x=-3$, indicating an x-intercept."}], "id": "q07"}, {"question": "Which of the following functions has a domain restriction at $x=2$ that results in a hole, and a domain restriction at $x=-1$ that results in a vertical asymptote?", "options": [{"text": "$f(x) = \\frac{x-2}{(x-2)(x+1)}$", "isCorrect": true, "rationale": "For this function, the factor $(x-2)$ cancels from the numerator and denominator, causing a hole at $x=2$. The factor $(x+1)$ remains in the denominator, causing a vertical asymptote at $x=-1$. This matches the conditions."}, {"text": "$f(x) = \\frac{x+1}{(x-2)(x+1)}$", "isCorrect": false, "rationale": "For this function, there would be a hole at $x=-1$ (due to cancellation of $x+1$) and a vertical asymptote at $x=2$ (due to $x-2$). This reverses the specified conditions for the hole and VA locations."}, {"text": "$f(x) = \\frac{x-2}{(x-2)(x-1)}$", "isCorrect": false, "rationale": "For this function, there would be a hole at $x=2$ and a vertical asymptote at $x=1$, which does not match the requirement for the VA at $x=-1$."}, {"text": "$f(x) = \\frac{x+2}{(x+2)(x+1)}$", "isCorrect": false, "rationale": "For this function, there would be a hole at $x=-2$ (due to cancellation of $x+2$) and a vertical asymptote at $x=-1$. This does not match the requirement for the hole at $x=2$."}], "id": "q08"}, {"question": "What is the primary purpose of performing a sign analysis on a rational function after identifying its vertical asymptotes and x-intercepts?", "options": [{"text": "To determine the location of horizontal asymptotes.", "isCorrect": false, "rationale": "Horizontal asymptotes are determined by comparing the degrees of the numerator and denominator, not through sign analysis."}, {"text": "To find the y-intercept of the function.", "isCorrect": false, "rationale": "The y-intercept is found by evaluating $f(0)$, not through sign analysis."}, {"text": "To decide whether the graph lies above or below the x-axis in different intervals.", "isCorrect": true, "rationale": "Sign analysis uses test values in intervals defined by vertical asymptotes and x-intercepts to determine the sign (positive or negative) of $f(x)$, which indicates whether the graph is above or below the x-axis in those intervals."}, {"text": "To calculate the values of any oblique asymptotes.", "isCorrect": false, "rationale": "Oblique asymptotes are found by performing polynomial long division, not through sign analysis."}], "id": "q09"}, {"question": "Which statement accurately describes the general behavior of a rational function's graph near its asymptotes?", "options": [{"text": "The graph always crosses horizontal asymptotes but never crosses vertical asymptotes.", "isCorrect": false, "rationale": "The graph may cross horizontal asymptotes, but it is not guaranteed to 'always' cross. More importantly, it never crosses or touches vertical asymptotes, so the second part of the statement is correct but the first part is too absolute."}, {"text": "The graph may cross a horizontal asymptote for finite x-values but never touches a vertical asymptote.", "isCorrect": true, "rationale": "This statement is accurate. Rational functions can intersect their horizontal asymptotes for specific finite x-values, especially for 'smaller' x. However, the graph of a rational function will never touch or cross a vertical asymptote, as the function approaches infinity (or negative infinity) at these x-values, meaning it's undefined there."}, {"text": "The graph always touches vertical asymptotes and never crosses horizontal asymptotes.", "isCorrect": false, "rationale": "This is incorrect. The graph never touches vertical asymptotes, and it is possible for it to cross horizontal asymptotes."}, {"text": "The graph may touch a vertical asymptote but never crosses a horizontal asymptote.", "isCorrect": false, "rationale": "This statement is incorrect. The graph never touches a vertical asymptote. It can, however, cross a horizontal asymptote."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
