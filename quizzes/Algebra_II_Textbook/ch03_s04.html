    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the essential condition for applying the Zero Product Property?", "options": [{"text": "The product of factors is any real number.", "isCorrect": false, "rationale": "The Zero Product Property specifically requires the product of factors to be equal to zero, not just any real number."}, {"text": "The product of factors is exactly zero.", "isCorrect": true, "rationale": "The text states, 'if a product equals zero, at least one of the factors must be zero.' This is the fundamental condition for the Zero Product Property."}, {"text": "At least one factor is positive.", "isCorrect": false, "rationale": "This is not a condition for the Zero Product Property. Factors can be negative or zero."}, {"text": "All factors are integers.", "isCorrect": false, "rationale": "The Zero Product Property applies to any real (or complex) numbers, not exclusively integers."}], "id": "q01"}, {"question": "A student is solving the equation (x-2)(x+5)=10. They conclude that x-2=10 or x+5=10. What is the fundamental error in their reasoning?", "options": [{"text": "They incorrectly factored the quadratic expression.", "isCorrect": false, "rationale": "The expression is already factored. The error lies in how the property is applied, not the factoring itself."}, {"text": "The Zero Product Property only applies to products that equal zero.", "isCorrect": true, "rationale": "The text explicitly states, 'The Zero Product Property applies only when the product equals zero; if the product equals, say, 6, we cannot conclude that one factor equals 2 and the other 3.'"}, {"text": "They should have used the quadratic formula instead of factoring.", "isCorrect": false, "rationale": "Factoring is a valid method, but the property was misapplied. The quadratic formula is an alternative, not a necessity in this case."}, {"text": "The equation should be solved by isolating x directly, not by factoring.", "isCorrect": false, "rationale": "This is a quadratic equation and cannot be solved by simply isolating x directly without first expanding and rearranging."}], "id": "q02"}, {"question": "Consider the equation 5x^2 = 3x+2. What is the *first and critical* step to solve this equation using factoring?", "options": [{"text": "Divide both sides by x.", "isCorrect": false, "rationale": "Dividing by a variable 'x' can lead to losing a potential solution if x=0."}, {"text": "Factor out the common term x.", "isCorrect": false, "rationale": "There isn't a common factor of 'x' across all terms once the equation is properly set up for factoring."}, {"text": "Rewrite the equation in standard form ax^2+bx+c=0.", "isCorrect": true, "rationale": "The first step in the 'Steps for Solving by Factoring' is to 'Write the equation in standard form: all terms on one side, zero on the other (ax^2+bx+c=0).'"}, {"text": "Take the square root of both sides.", "isCorrect": false, "rationale": "This method is typically used for equations in the form x^2 = k and is not suitable when there is an 'x' term (3x)."}], "id": "q03"}, {"question": "Solve the equation x^2 - 10x + 24 = 0 by factoring.", "options": [{"text": "x=6, x=4", "isCorrect": true, "rationale": "We need two numbers that multiply to 24 and add to -10. These numbers are -6 and -4. So, (x-6)(x-4)=0. Setting each factor to zero gives x=6 or x=4."}, {"text": "x=-6, x=-4", "isCorrect": false, "rationale": "If x=-6 or x=-4 were solutions, the factored form would be (x+6)(x+4)=0, which expands to x^2+10x+24=0, not the given equation."}, {"text": "x=12, x=2", "isCorrect": false, "rationale": "If x=12 or x=2 were solutions, the factored form would be (x-12)(x-2)=0, which expands to x^2-14x+24=0, not the given equation."}, {"text": "x=-12, x=2", "isCorrect": false, "rationale": "If x=-12 or x=2 were solutions, the factored form would be (x+12)(x-2)=0, which expands to x^2+10x-24=0, not the given equation."}], "id": "q04"}, {"question": "Solve the equation 3x^2 + 8x - 3 = 0 by factoring.", "options": [{"text": "x=1/3, x=-3", "isCorrect": true, "rationale": "Using the AC method (ac = 3 * -3 = -9), we need two numbers that multiply to -9 and add to 8 (which are 9 and -1). Rewrite as 3x^2 + 9x - x - 3 = 0. Factor by grouping: 3x(x+3) - 1(x+3) = 0, which is (3x-1)(x+3)=0. Setting factors to zero gives x=1/3 or x=-3."}, {"text": "x=-1/3, x=3", "isCorrect": false, "rationale": "This would result from factors (3x+1)(x-3)=0, which expands to 3x^2-8x-3=0, not the given equation."}, {"text": "x=1/3, x=3", "isCorrect": false, "rationale": "This would result from factors (3x-1)(x-3)=0, which expands to 3x^2-10x+3=0, not the given equation."}, {"text": "x=-1/3, x=-3", "isCorrect": false, "rationale": "This would result from factors (3x+1)(x+3)=0, which expands to 3x^2+10x+3=0, not the given equation."}], "id": "q05"}, {"question": "Solve the equation 2x^3 - 18x = 0 by factoring.", "options": [{"text": "x=0, x=3", "isCorrect": false, "rationale": "This solution is incomplete; it misses one of the real roots."}, {"text": "x=0, x=3, x=-3", "isCorrect": true, "rationale": "First, factor out the GCF, 2x: 2x(x^2 - 9) = 0. Then, recognize the difference of squares: 2x(x-3)(x+3) = 0. Setting each factor to zero yields x=0, x=3, or x=-3."}, {"text": "x=3, x=-3", "isCorrect": false, "rationale": "This solution is incomplete; it misses the root x=0, likely by incorrectly dividing by 'x' prematurely."}, {"text": "x=0, x=9", "isCorrect": false, "rationale": "This would imply the factorization was 2x(x-9)=0, which is incorrect."}], "id": "q06"}, {"question": "The product of two consecutive odd integers is 143. If n represents the smaller odd integer, which equation correctly models this situation?", "options": [{"text": "n(n+1) = 143", "isCorrect": false, "rationale": "If n is an odd integer, n+1 would be the next consecutive *even* integer, not the next consecutive odd integer."}, {"text": "n(n+2) = 143", "isCorrect": true, "rationale": "If n is the smaller odd integer, the next consecutive odd integer is n+2. Their product is n(n+2)."}, {"text": "n^2 = 143", "isCorrect": false, "rationale": "This equation represents the square of a single integer, not the product of two consecutive odd integers."}, {"text": "n + (n+2) = 143", "isCorrect": false, "rationale": "This equation represents the *sum* of two consecutive odd integers, not their product."}], "id": "q07"}, {"question": "A rectangular garden has an area of 40 square meters. The length of the garden is 3 meters more than its width. Find the width of the garden.", "options": [{"text": "8 meters", "isCorrect": false, "rationale": "If the width is 8 meters, the length would be 8+3=11 meters. The area would be 8*11=88 square meters, which is not 40."}, {"text": "5 meters", "isCorrect": true, "rationale": "Let 'w' be the width. Then the length is 'w+3'. The area is w(w+3)=40. This expands to w^2+3w-40=0. Factoring gives (w+8)(w-5)=0. Possible solutions are w=-8 or w=5. Since width must be positive, the width is 5 meters."}, {"text": "4 meters", "isCorrect": false, "rationale": "If the width is 4 meters, the length would be 4+3=7 meters. The area would be 4*7=28 square meters, which is not 40."}, {"text": "10 meters", "isCorrect": false, "rationale": "If the width is 10 meters, the length would be 10+3=13 meters. The area would be 10*13=130 square meters, which is not 40."}], "id": "q08"}, {"question": "Why is it important to check all solutions in the *original* equation, especially in word problems?", "options": [{"text": "To ensure the factoring process was done correctly.", "isCorrect": false, "rationale": "While checking helps confirm the algebra, the primary reason, especially for word problems, is broader than just the factoring process itself."}, {"text": "To confirm that the solution makes sense within the context of the problem, discarding extraneous or irrelevant answers.", "isCorrect": true, "rationale": "The text states, 'Always verify that solutions satisfy the original (unfactored) equation, especially in word problems where extraneous or negative solutions may arise.'"}, {"text": "To verify that the algebraic manipulation aligns with the Zero Product Property.", "isCorrect": false, "rationale": "This is part of the process of solving, but the final check serves a higher purpose of contextual validation."}, {"text": "To practice substitution skills for future math problems.", "isCorrect": false, "rationale": "Practicing substitution is a beneficial byproduct, but it's not the main reason highlighted for checking solutions in context."}], "id": "q09"}, {"question": "According to the text, what is the maximum number of real solutions a polynomial equation of degree five can have?", "options": [{"text": "Two", "isCorrect": false, "rationale": "The text indicates that a quadratic equation (degree two) has at most two solutions."}, {"text": "Three", "isCorrect": false, "rationale": "The text indicates that a cubic equation (degree three) has at most three solutions."}, {"text": "Five", "isCorrect": true, "rationale": "The text states, 'The number of solutions equals the number of distinct factors that can equal zero. A quadratic equation... has at most two solutions; a cubic, at most three; and so on.' This pattern extends to a degree-five polynomial having at most five solutions."}, {"text": "Cannot be determined without the specific equation.", "isCorrect": false, "rationale": "The text provides a general rule for the maximum number of solutions based on the polynomial's degree."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
