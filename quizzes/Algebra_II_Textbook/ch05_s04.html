        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Division Algorithm for Polynomials, if P(x) is divided by D(x) (where D(x) is not the zero polynomial), what must be true about the remainder R(x)?", "options": [{"text": "R(x) must always be zero.", "isCorrect": false, "rationale": "The remainder R(x) is only zero if D(x) is a factor of P(x); it is not always the case."}, {"text": "The degree of R(x) must be greater than or equal to the degree of D(x).", "isCorrect": false, "rationale": "The degree of the remainder must be strictly less than the degree of the divisor, unless the remainder is zero."}, {"text": "R(x) must be a constant.", "isCorrect": false, "rationale": "R(x) can be a constant (degree 0) or a polynomial with a degree greater than 0, as long as its degree is less than that of D(x)."}, {"text": "R(x) is either 0 or its degree is less than the degree of D(x).", "isCorrect": true, "rationale": "This statement accurately reflects the condition for the remainder in the Division Algorithm for Polynomials."}], "id": "q01"}, {"question": "When performing polynomial long division to divide x³ - 2x + 5 by x - 2, what is the correct initial setup for the dividend?", "options": [{"text": "x³ - 2x + 5", "isCorrect": false, "rationale": "This setup is missing a placeholder for the x² term, which is crucial for proper alignment during long division."}, {"text": "x³ + 0x² - 2x + 5", "isCorrect": true, "rationale": "The dividend must be written in standard form with zero-coefficient placeholder terms for any missing degrees to ensure correct column alignment during long division."}, {"text": "x³ - 0x² - 2x + 5", "isCorrect": false, "rationale": "While technically correct for zero, the standard practice is to use '+ 0x²' to maintain consistency with positive coefficients and descending order."}, {"text": "x³ - 2x + 5 + 0x²", "isCorrect": false, "rationale": "The terms must be arranged in descending order of their degrees, with the highest degree term first."}], "id": "q02"}, {"question": "If, after performing polynomial long division of P(x) by D(x), the remainder R(x) is 0, what can be concluded?", "options": [{"text": "P(x) is a constant polynomial.", "isCorrect": false, "rationale": "A zero remainder indicates a specific relationship between P(x) and D(x), not that P(x) is a constant."}, {"text": "D(x) is a factor of P(x).", "isCorrect": true, "rationale": "When the remainder of a division is 0, it means the divisor evenly divides the dividend, making the divisor a factor of the dividend."}, {"text": "The quotient Q(x) must be zero.", "isCorrect": false, "rationale": "The quotient Q(x) is the result of the division, and it's generally a polynomial, not necessarily zero."}, {"text": "The division was performed incorrectly.", "isCorrect": false, "rationale": "A zero remainder is a perfectly valid and often desired outcome of polynomial division."}], "id": "q03"}, {"question": "Under which specific condition can synthetic division be used to divide a polynomial P(x)?", "options": [{"text": "When the divisor is any polynomial D(x).", "isCorrect": false, "rationale": "Synthetic division is a specialized shortcut and does not work for all polynomial divisors."}, {"text": "When the divisor is a linear factor of the form x - c.", "isCorrect": true, "rationale": "The text explicitly states that synthetic division is a shortcut for dividing by a linear factor of the form x - c."}, {"text": "When the divisor is a quadratic factor, e.g., x² + ax + b.", "isCorrect": false, "rationale": "Synthetic division is not applicable for quadratic or higher-degree divisors; polynomial long division must be used."}, {"text": "When the remainder of the division is expected to be 0.", "isCorrect": false, "rationale": "Synthetic division is a method of division; its applicability depends on the form of the divisor, not the expected remainder."}], "id": "q04"}, {"question": "To use synthetic division to divide 3x⁴ - 5x³ + 2x - 8 by (x - 2), what values would be used for 'c' and the coefficients of the dividend?", "options": [{"text": "c = -2; coefficients: 3, -5, 2, -8.", "isCorrect": false, "rationale": "For a divisor of (x - c), 'c' is 2, not -2. Also, a placeholder for the missing x² term is needed."}, {"text": "c = 2; coefficients: 3, -5, 0, 2, -8.", "isCorrect": true, "rationale": "From the divisor (x - 2), c = 2. The coefficients of the dividend must include a 0 for the missing x² term (3x⁴ - 5x³ + 0x² + 2x - 8)."}, {"text": "c = 2; coefficients: 3, -5, 2, -8.", "isCorrect": false, "rationale": "While 'c' is correct, the coefficients are missing the essential placeholder '0' for the x² term."}, {"text": "c = -2; coefficients: 3, -5, 0, 2, -8.", "isCorrect": false, "rationale": "The value of 'c' is incorrect. For a divisor (x - 2), c must be 2."}], "id": "q05"}, {"question": "If synthetic division is performed to divide x³ + 4x² - 3x - 18 by (x - 2), and the resulting bottom row (excluding 'c') is 1  6  9  0, what is the quotient polynomial Q(x)?", "options": [{"text": "x³ + 6x² + 9x", "isCorrect": false, "rationale": "The degree of the quotient polynomial is always one less than the dividend. This option has an incorrect degree and includes the remainder."}, {"text": "x² + 6x + 9", "isCorrect": true, "rationale": "The coefficients 1, 6, and 9 correspond to the terms of the quotient polynomial, which has a degree one less than the original dividend (x³), making it x² + 6x + 9. The last number, 0, is the remainder."}, {"text": "x² + 6x + 9 + 0/(x - 2)", "isCorrect": false, "rationale": "This represents the full result of the division in the form Q(x) + R(x)/D(x), not just the quotient polynomial Q(x)."}, {"text": "1x + 6 + 9/x", "isCorrect": false, "rationale": "This option incorrectly assigns degrees to the terms and misinterprets the coefficients from the synthetic division result."}], "id": "q06"}, {"question": "According to the Remainder Theorem, to find the remainder when P(x) = x⁴ - 3x² + 5x - 7 is divided by (x - 3), one should calculate:", "options": [{"text": "P(-3)", "isCorrect": false, "rationale": "The Remainder Theorem states that for a divisor (x - c), the remainder is P(c), so for (x - 3), c = 3."}, {"text": "P(3)", "isCorrect": true, "rationale": "The Remainder Theorem states that if a polynomial P(x) is divided by (x - c), the remainder equals P(c). Here, c = 3."}, {"text": "Q(3)", "isCorrect": false, "rationale": "Q(x) is the quotient, not the remainder. The theorem relates the remainder to the value of the polynomial at c, not the quotient."}, {"text": "The value of x that makes x - 3 = 0.", "isCorrect": false, "rationale": "This value is 'c' (which is 3), but the theorem specifies that the remainder is P(c), not just 'c' itself."}], "id": "q07"}, {"question": "If synthetic division of a polynomial P(x) by (x - c) results in a remainder of 0, what does the Remainder Theorem imply about P(c)?", "options": [{"text": "P(c) is undefined.", "isCorrect": false, "rationale": "Polynomials are defined for all real numbers, so P(c) will always have a defined value."}, {"text": "P(c) = 0.", "isCorrect": true, "rationale": "The Remainder Theorem states that the remainder when P(x) is divided by (x - c) is equal to P(c). Therefore, if the remainder is 0, P(c) must also be 0."}, {"text": "P(c) = c.", "isCorrect": false, "rationale": "This is a general relationship that does not necessarily hold true; P(c) is the value of the polynomial at x=c, not 'c' itself."}, {"text": "P(c) is the quotient polynomial.", "isCorrect": false, "rationale": "P(c) is a numerical value (the remainder), whereas the quotient is a polynomial."}], "id": "q08"}, {"question": "What is the primary advantage of synthetic division over polynomial long division when applicable?", "options": [{"text": "It works for any type of polynomial divisor.", "isCorrect": false, "rationale": "Synthetic division is only applicable for division by linear factors of the form x - c, not any polynomial divisor."}, {"text": "It provides the factors of the polynomial directly.", "isCorrect": false, "rationale": "While a zero remainder indicates a factor, synthetic division doesn't directly list all factors; it primarily gives the quotient and remainder."}, {"text": "It is a more compact and streamlined algorithm, using only coefficients.", "isCorrect": true, "rationale": "The text describes synthetic division as a 'compact algorithm' that uses 'only the coefficients' to streamline the process compared to long division."}, {"text": "It always results in a zero remainder.", "isCorrect": false, "rationale": "Synthetic division can result in any remainder, including non-zero remainders, depending on the division problem."}], "id": "q09"}, {"question": "The Division Algorithm for Polynomials states P(x) = D(x) Q(x) + R(x). Which of the following is an equivalent expression for P(x)/D(x)?", "options": [{"text": "Q(x) - R(x)/D(x)", "isCorrect": false, "rationale": "This expression incorrectly uses subtraction instead of addition for the remainder term."}, {"text": "Q(x) + D(x)/R(x)", "isCorrect": false, "rationale": "This expression incorrectly inverts the fraction of the remainder term; R(x) should be divided by D(x)."}, {"text": "Q(x) + R(x)/D(x)", "isCorrect": true, "rationale": "By dividing the entire equation P(x) = D(x)Q(x) + R(x) by D(x), we get P(x)/D(x) = Q(x) + R(x)/D(x)."}, {"text": "R(x) + Q(x)/D(x)", "isCorrect": false, "rationale": "This expression incorrectly places R(x) as the main quotient and misrepresents the Q(x) term."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
