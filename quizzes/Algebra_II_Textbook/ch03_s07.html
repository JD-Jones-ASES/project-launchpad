<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What does the vertex of a quadratic function primarily represent in real-world optimization problems as described in the text?", "options": [{"text": "The point where the function crosses the x-axis, indicating a zero value for the quantity.", "isCorrect": false, "rationale": "This describes the roots or x-intercepts of the function, not necessarily the point of optimization (maximum or minimum)."}, {"text": "The maximum or minimum value of the quantity being optimized, such as height, area, or revenue.", "isCorrect": true, "rationale": "The text explicitly states that 'The vertex of a parabola is the point where the function achieves its maximum or minimum value,' which is the central idea for optimization problems."}, {"text": "The initial value or starting point of the quantity being modeled at time t=0.", "isCorrect": false, "rationale": "This describes the y-intercept of the function, which is the value when the independent variable is zero, not necessarily the maximum or minimum."}, {"text": "The rate at which the quantity changes over time or with respect to another variable.", "isCorrect": false, "rationale": "The rate of change is related to the slope or derivative of the function, not the vertex itself."}], "id": "q01"}, {"question": "According to the textbook's outlined strategy for optimization problems with quadratic models, which of the following is NOT a required step?", "options": [{"text": "Define variables for the quantities involved.", "isCorrect": false, "rationale": "Defining variables is the first step in the strategy (1) define variables."}, {"text": "Write the quadratic function that models the problem.", "isCorrect": false, "rationale": "Writing the quadratic function is the second step (2) write the quadratic function."}, {"text": "Perform a linear regression analysis to estimate trends.", "isCorrect": true, "rationale": "Linear regression analysis is not mentioned or required in the strategy for solving quadratic optimization problems. The text focuses on algebraic methods to find the vertex."}, {"text": "Verify the reasonableness of the calculated answer.", "isCorrect": false, "rationale": "Verifying reasonableness is the final step in the strategy (5) verify reasonableness."}], "id": "q02"}, {"question": "A farmer has 400 ft of fencing. He wants to enclose a rectangular pen against a straight barn wall, meaning only three sides need fencing. What dimensions (width perpendicular to the barn, length parallel to the barn) will maximize the enclosed area?", "options": [{"text": "100 ft (width) by 200 ft (length)", "isCorrect": true, "rationale": "Let 'w' be the width and 'l' be the length. The fencing constraint is 2w + l = 400, so l = 400 - 2w. The area function is A(w) = w(400 - 2w) = -2w^2 + 400w. The vertex occurs at w = -400 / (2 * -2) = 100 ft. Then l = 400 - 2(100) = 200 ft."}, {"text": "100 ft (width) by 100 ft (length)", "isCorrect": false, "rationale": "This would be a square, but for three sides against a wall, the optimal length is double the width, not equal."}, {"text": "50 ft (width) by 300 ft (length)", "isCorrect": false, "rationale": "While the sum of widths and length is 400, this combination (-2(50)^2 + 400(50) = 15000) does not yield the maximum area (20000 sq ft)."}, {"text": "200 ft (width) by 200 ft (length)", "isCorrect": false, "rationale": "This would require 2w+l = 2(200)+200 = 600 ft of fencing, which exceeds the given 400 ft."}], "id": "q03"}, {"question": "A ball is thrown upward from an initial height of 10 ft with an initial velocity of 80 ft/s. When does it reach its maximum height?", "options": [{"text": "10 seconds", "isCorrect": false, "rationale": "This is the initial height, not the time to maximum height."}, {"text": "2.5 seconds", "isCorrect": true, "rationale": "The height function is h(t) = -16t^2 + 80t + 10. The time to reach maximum height (the vertex's t-coordinate) is given by t = -v_0 / (2a) = -80 / (2 * -16) = -80 / -32 = 2.5 seconds."}, {"text": "5 seconds", "isCorrect": false, "rationale": "This would be if the initial velocity were 160 ft/s (160/(2*16)=5), or a miscalculation."}, {"text": "80 seconds", "isCorrect": false, "rationale": "This is the initial velocity, not the time to maximum height."}], "id": "q04"}, {"question": "Using the ball's trajectory from the previous question (initial height 10 ft, initial velocity 80 ft/s), approximately when does the ball hit the ground?", "options": [{"text": "Approximately 2.5 seconds", "isCorrect": false, "rationale": "2.5 seconds is the time when the ball reaches its maximum height, not when it hits the ground."}, {"text": "Approximately 5.12 seconds", "isCorrect": true, "rationale": "The ball hits the ground when h(t) = 0: -16t^2 + 80t + 10 = 0. Using the quadratic formula (t = [-b ± sqrt(b^2 - 4ac)] / 2a) with a=-16, b=80, c=10: t = [-80 ± sqrt(80^2 - 4(-16)(10))] / (2*-16) = [-80 ± sqrt(6400 + 640)] / -32 = [-80 ± sqrt(7040)] / -32. Since sqrt(7040) is approximately 83.9, t = [-80 - 83.9] / -32 ≈ 5.12 seconds (the positive time)."}, {"text": "Approximately 10 seconds", "isCorrect": false, "rationale": "There's no direct calculation in the problem that leads to 10 seconds as the landing time."}, {"text": "It never hits the ground because it's a projectile.", "isCorrect": false, "rationale": "Objects launched vertically under gravity will always hit the ground unless otherwise specified, as gravity pulls them down."}], "id": "q05"}, {"question": "A company sells 'x' widgets at a unit price given by the demand function p(x) = 100 - 0.2x dollars. How many widgets should be sold to maximize weekly revenue, and what is that maximum revenue?", "options": [{"text": "250 widgets for a maximum revenue of $12,500.", "isCorrect": true, "rationale": "The revenue function R(x) = x * p(x) = x(100 - 0.2x) = -0.2x^2 + 100x. To find the maximum revenue, find the vertex's x-coordinate: x = -100 / (2 * -0.2) = -100 / -0.4 = 250 widgets. Substitute x=250 into R(x): R(250) = -0.2(250)^2 + 100(250) = -0.2(62500) + 25000 = -12500 + 25000 = $12,500."}, {"text": "500 widgets for a maximum revenue of $25,000.", "isCorrect": false, "rationale": "This would be the revenue if x=500, but R(500) = -0.2(500)^2 + 100(500) = -0.2(250000) + 50000 = -50000 + 50000 = $0. This would be a root, not the maximum."}, {"text": "100 widgets for a maximum revenue of $9,800.", "isCorrect": false, "rationale": "R(100) = -0.2(100)^2 + 100(100) = -0.2(10000) + 10000 = -2000 + 10000 = $8,000. This is not the maximum revenue."}, {"text": "50 widgets for a maximum revenue of $4,500.", "isCorrect": false, "rationale": "R(50) = -0.2(50)^2 + 100(50) = -0.2(2500) + 5000 = -500 + 5000 = $4,500. This is not the maximum revenue."}], "id": "q06"}, {"question": "Find two positive numbers whose sum is 30 and whose product is maximum.", "options": [{"text": "10 and 20", "isCorrect": false, "rationale": "The product of 10 and 20 is 200, which is not the maximum possible product for two numbers summing to 30."}, {"text": "14 and 16", "isCorrect": false, "rationale": "The product of 14 and 16 is 224, which is closer but not the maximum."}, {"text": "15 and 15", "isCorrect": true, "rationale": "Let the numbers be x and 30-x. Their product is P(x) = x(30-x) = -x^2 + 30x. The vertex (maximum) occurs at x = -30 / (2 * -1) = 15. The other number is 30 - 15 = 15. The product is 15 * 15 = 225. The text's 'Insight' notes that the numbers closest to equal give the largest product for a fixed sum."}, {"text": "5 and 25", "isCorrect": false, "rationale": "The product of 5 and 25 is 125, which is far from the maximum."}], "id": "q07"}, {"question": "Which statement accurately describes how to determine whether the vertex of a quadratic function represents a maximum or minimum value?", "options": [{"text": "If the constant term 'c' is positive, the vertex is a maximum.", "isCorrect": false, "rationale": "The constant term 'c' represents the y-intercept, not the opening direction or whether the vertex is a maximum or minimum."}, {"text": "If the coefficient 'a' (of the x^2 term) is positive, the parabola opens upward, and the vertex is a minimum.", "isCorrect": true, "rationale": "As stated in the 'keyconcept' section, 'If the parabola opens upward (a>0), the vertex is a minimum.' This is a fundamental property of parabolas."}, {"text": "If the coefficient 'b' (of the x term) is negative, the parabola opens downward, and the vertex is a maximum.", "isCorrect": false, "rationale": "The coefficient 'b' affects the position of the axis of symmetry (-b/2a) but does not determine whether the parabola opens upward or downward. Only 'a' determines this."}, {"text": "The vertex is always a maximum in real-world optimization problems.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states that the vertex can be either a maximum or a minimum, depending on the sign of the 'a' coefficient."}], "id": "q08"}, {"question": "A student is modeling the height of an object launched vertically using the formula h(t) = -4.9t^2 + v_0t + h_0. What is the crucial implication of using -4.9 as the coefficient for t^2?", "options": [{"text": "The initial velocity v_0 must be given in miles per hour.", "isCorrect": false, "rationale": "Using -4.9 (based on Earth's gravity in SI units) implies that all other related measurements must also be in SI units, not imperial units like miles per hour."}, {"text": "The initial height h_0 must be given in feet.", "isCorrect": false, "rationale": "The coefficient -4.9 is for meters/seconds. Mixing units (meters for gravity, feet for height) leads to nonsensical answers, as warned in the 'note' section."}, {"text": "All height measurements (h, h_0) and velocity (v_0) must be in meters and meters per second, respectively.", "isCorrect": true, "rationale": "The 'note' explicitly states that the projectile formula h(t) = -4.9t^2 + v_0t + h_0 uses meters and seconds, corresponding to SI units. Consistency across all units is crucial."}, {"text": "This formula only applies to objects launched horizontally.", "isCorrect": false, "rationale": "The projectile motion model is for objects launched vertically, not horizontally. The formula describes vertical height over time."}], "id": "q09"}, {"question": "Consider an optimization problem where the quadratic function modeling the quantity to be optimized is P(x) = -x^2 + 10x. If 'x' represents a physical quantity that must be between 0 and 4 (i.e., 0 < x < 4), what should be done after finding the vertex at x=5?", "options": [{"text": "The vertex x=5 is the optimal value, so proceed to calculate P(5).", "isCorrect": false, "rationale": "The text's 'keyconcept' emphasizes checking that 'the optimal value lies within the feasible domain.' Since x=5 is outside the domain (0 < x < 4), P(5) is not the optimal value for this specific problem."}, {"text": "Since the vertex x=5 is outside the feasible domain (0 < x < 4), the maximum value occurs at an endpoint of the domain.", "isCorrect": true, "rationale": "The function P(x) = -x^2 + 10x is a downward-opening parabola with its vertex (maximum) at x=5. Since the feasible domain (0, 4) is entirely to the left of the vertex, the function is increasing over this domain. Therefore, the maximum value within the domain will occur at the right endpoint, x=4."}, {"text": "There is no maximum value in this scenario because the vertex is not in the domain.", "isCorrect": false, "rationale": "There is still a maximum value within the specified domain (0 < x < 4); it just occurs at one of the boundaries, not at the overall vertex of the parabola."}, {"text": "Re-evaluate the problem; a quadratic function cannot have a maximum outside its physical domain.", "isCorrect": false, "rationale": "A quadratic function can indeed have its overall maximum or minimum outside a given restricted domain. In such cases, the optimal value for the restricted domain is found at one of the domain's boundaries."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
