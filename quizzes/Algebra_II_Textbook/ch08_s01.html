    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a 'parent function' in the context of graphical transformations?", "options": [{"text": "A function that has been shifted up or down.", "isCorrect": false, "rationale": "This describes a transformed function, not the original parent function itself. A parent function is the starting point for such transformations."}, {"text": "The simplest form of a function family from which transformations are derived.", "isCorrect": true, "rationale": "As defined in the text, a parent function is 'the simplest form of a function family' upon which arithmetic operations are applied to create new graphs through transformations."}, {"text": "The most complex form of a function family.", "isCorrect": false, "rationale": "The text explicitly states that a parent function is the 'simplest form,' not the most complex."}, {"text": "A function whose graph always passes through the origin.", "isCorrect": false, "rationale": "While many common parent functions like $f(x)=x^2$, $f(x)=|x|$, and $f(x)=x^3$ do pass through the origin, this is not a universal defining characteristic of all parent functions or how they are described in the text."}], "id": "q01"}, {"question": "If the graph of $y = f(x)$ is shifted 5 units downward, which of the following equations represents the new graph?", "options": [{"text": "$y = f(x + 5)$", "isCorrect": false, "rationale": "This represents a horizontal shift to the left by 5 units, as adding a constant inside the function moves the graph in the opposite direction of the sign."}, {"text": "$y = f(x) - 5$", "isCorrect": true, "rationale": "According to the property of vertical shifts, subtracting a constant 'k' outside the function ($f(x) - k$) shifts the graph down 'k' units. Here, k=5."}, {"text": "$y = f(x - 5)$", "isCorrect": false, "rationale": "This represents a horizontal shift to the right by 5 units, not a vertical shift downward. Adding or subtracting a constant inside the function affects horizontal position, not vertical."}, {"text": "$y = f(x) + 5$", "isCorrect": false, "rationale": "This represents a vertical shift upward by 5 units, as adding a constant 'k' outside the function shifts it up."}], "id": "q02"}, {"question": "A student observes the graph of $g(x) = (x + 3)^2$. Compared to the parent function $f(x) = x^2$, how is the graph of $g(x)$ transformed?", "options": [{"text": "Shifted 3 units right.", "isCorrect": false, "rationale": "Horizontal shifts are counterintuitive; $f(x-h)$ shifts right, while $f(x+h)$ shifts left. Here, it's $x+3$, so it shifts left."}, {"text": "Shifted 3 units left.", "isCorrect": true, "rationale": "As stated in the 'Horizontal Shifts' property, $y = f(x + h)$ shifts the graph left $h$ units. Here, $h=3$, so the graph shifts left 3 units."}, {"text": "Shifted 3 units up.", "isCorrect": false, "rationale": "Vertical shifts occur when a constant is added or subtracted outside the function, such as $f(x)+k$ or $f(x)-k$. Here, the constant is inside the parentheses."}, {"text": "Shifted 3 units down.", "isCorrect": false, "rationale": "This would be a vertical shift down, which occurs when a constant is subtracted outside the function, not inside the input."}], "id": "q03"}, {"question": "Which transformation applies to the graph of $y = -|x|$ when compared to its parent function $y = |x|$?", "options": [{"text": "Reflection over the y-axis.", "isCorrect": false, "rationale": "Reflection over the y-axis occurs when the input variable is negated, i.e., $f(-x)$, which would be $y = |-x|$ in this case. The equation given negates the entire function output."}, {"text": "Shifted down by 1 unit.", "isCorrect": false, "rationale": "A shift down by 1 unit would be represented as $y = |x| - 1$. The negative sign in front of the absolute value denotes a reflection."}, {"text": "Reflection over the x-axis.", "isCorrect": true, "rationale": "As described in the 'Reflections' property, $y = -f(x)$ reflects the graph over the x-axis. Here, $f(x) = |x|$, so $y = -|x|$ is a reflection over the x-axis."}, {"text": "Shifted left by 1 unit.", "isCorrect": false, "rationale": "A shift left by 1 unit would be represented as $y = |x+1|$. The negative sign in front of the absolute value indicates a reflection, not a shift."}], "id": "q04"}, {"question": "Without graphing, determine the vertex of the function $y = |x - 1| + 7$.", "options": [{"text": "$(-1, 7)$", "isCorrect": false, "rationale": "The horizontal shift $f(x-h)$ corresponds to a shift right by $h$ units, making the x-coordinate of the vertex positive. $(-1,7)$ would result from $y=|x+1|+7$."}, {"text": "$(1, -7)$", "isCorrect": false, "rationale": "The vertical shift $f(x)+k$ corresponds to a shift up by $k$ units, making the y-coordinate positive. $(1,-7)$ would result from $y=|x-1|-7$."}, {"text": "$(1, 7)$", "isCorrect": true, "rationale": "The term $x - 1$ inside the function indicates a horizontal shift right by 1 unit (so $x=1$ makes the inside zero). The term $+ 7$ outside the function indicates a vertical shift up by 7 units. Thus, the vertex of the parent function $y=|x|$ at $(0,0)$ moves to $(1, 7)$."}, {"text": "$(-1, -7)$", "isCorrect": false, "rationale": "This would correspond to a horizontal shift left by 1 unit and a vertical shift down by 7 units, which is not what the given equation describes."}], "id": "q05"}, {"question": "Describe the transformations applied to the parent function $f(x) = x^2$ to obtain the graph of $g(x) = -(x + 3)^2 - 1$. What are its vertex and direction of opening?", "options": [{"text": "Shift left 3, reflect over x-axis, shift down 1; Vertex: $(-3, -1)$, opens upward.", "isCorrect": false, "rationale": "The negative sign in front of the squared term indicates a reflection over the x-axis, which means the parabola opens downward, not upward."}, {"text": "Shift right 3, reflect over x-axis, shift up 1; Vertex: $(3, 1)$, opens downward.", "isCorrect": false, "rationale": "The term $(x+3)^2$ indicates a shift left by 3 units (not right), and the $-1$ indicates a shift down by 1 unit (not up). The vertex and transformations are incorrect."}, {"text": "Shift left 3, reflect over x-axis, shift down 1; Vertex: $(-3, -1)$, opens downward.", "isCorrect": true, "rationale": "Starting with $x^2$: $(x+3)^2$ shifts left 3 units. $-(x+3)^2$ reflects over the x-axis (making it open downward). $-(x+3)^2 - 1$ shifts down 1 unit. The vertex moves from $(0,0)$ to $(-3,-1)$, and the reflection makes it open downward."}, {"text": "Shift right 3, reflect over y-axis, shift down 1; Vertex: $(-3, -1)$, opens downward.", "isCorrect": false, "rationale": "The shift is left 3 (not right). The reflection is over the x-axis (due to $-f(x)$), not the y-axis (which would be $f(-x)$). The transformations are incorrect."}], "id": "q06"}, {"question": "If the point $(-2, 6)$ lies on the graph of $y = f(x)$, what is the corresponding point on the graph of $y = f(x - 3) + 1$?", "options": [{"text": "$(-5, 7)$", "isCorrect": false, "rationale": "The horizontal shift $f(x-3)$ moves the graph right by 3 units, so the x-coordinate should be increased, not decreased. The x-coordinate should be $-2+3=1$."}, {"text": "$(1, 7)$", "isCorrect": true, "rationale": "The transformation $f(x - 3)$ shifts the graph right by 3 units, so the x-coordinate of the point changes from $x$ to $x+3$. The transformation $+ 1$ shifts the graph up by 1 unit, so the y-coordinate changes from $y$ to $y+1$. Applying this to $(-2, 6)$ gives $(-2+3, 6+1) = (1, 7)$."}, {"text": "$(-5, 5)$", "isCorrect": false, "rationale": "Both the x and y coordinates are incorrectly transformed. The x-coordinate should be increased by 3, and the y-coordinate should be increased by 1."}, {"text": "$(1, 5)$", "isCorrect": false, "rationale": "The x-coordinate is correctly transformed to $1$, but the y-coordinate should be increased by 1, resulting in $6+1=7$, not $5$."}], "id": "q07"}, {"question": "A point $(4, -3)$ lies on the graph of $y = f(x)$. Find the corresponding point on the graph of $y = -f(x + 2) + 5$.", "options": [{"text": "$(6, 8)$", "isCorrect": false, "rationale": "The $x+2$ inside the function means a shift left by 2 units, so the x-coordinate should be $4-2=2$, not $4+2=6$."}, {"text": "$(2, 2)$", "isCorrect": false, "rationale": "While the x-coordinate is correct ($4-2=2$), the reflection and vertical shift are not applied correctly to the y-coordinate. $-(-3)+5 = 3+5=8$."}, {"text": "$(2, 8)$", "isCorrect": true, "rationale": "The transformation $f(x + 2)$ shifts the graph left by 2 units, so the x-coordinate changes from $x$ to $x-2$. So $4-2=2$. The transformation $-f(x)$ reflects over the x-axis, changing $y$ to $-y$. So $-(-3)=3$. The transformation $+ 5$ shifts the graph up by 5 units, so the new y-coordinate is $y+5$. So $3+5=8$. The corresponding point is $(2, 8)$."}, {"text": "$(6, 2)$", "isCorrect": false, "rationale": "Both the x and y coordinates are incorrectly transformed. The x-coordinate should be $4-2=2$, and the y-coordinate should be $-(-3)+5=8$."}], "id": "q08"}, {"question": "Given that $f(5) = 10$, and $g(x) = f(x - 2) - 4$, what is the value of $g(7)$?", "options": [{"text": "$10$", "isCorrect": false, "rationale": "This value would be $f(5)$, but the function $g(x)$ also includes a vertical shift down by 4, which needs to be applied."}, {"text": "$6$", "isCorrect": true, "rationale": "To find $g(7)$, substitute $x=7$ into the equation: $g(7) = f(7 - 2) - 4$. This simplifies to $g(7) = f(5) - 4$. Since $f(5) = 10$, we have $g(7) = 10 - 4 = 6$."}, {"text": "$14$", "isCorrect": false, "rationale": "This would result from $f(5)+4$, incorrectly adding the vertical shift instead of subtracting it."}, {"text": "$8$", "isCorrect": false, "rationale": "This value is not obtained through correct substitution and calculation. For instance, $f(7)$ or $f(9)$ would be needed to get 8 if some other error were made."}], "id": "q09"}, {"question": "The graph of $y = x^3$ is transformed to produce the graph of $k(x) = (-x)^3 + 6$. Which statement correctly describes the transformation from $y = x^3$ to $k(x)$?", "options": [{"text": "Shift up 6 units and reflect over the x-axis.", "isCorrect": false, "rationale": "The $+6$ indicates a shift up 6 units. However, the $(-x)^3$ is equivalent to $f(-x)$, which is a reflection over the y-axis, not the x-axis. For an odd function like $x^3$, reflecting over the x-axis ($ -x^3 $) gives the same result as reflecting over the y-axis ($(-x)^3 = -x^3$), but the conceptual transformation is over the y-axis when the input is negated."}, {"text": "Shift up 6 units and reflect over the y-axis.", "isCorrect": true, "rationale": "The term $(-x)^3$ represents $f(-x)$, which reflects the graph over the y-axis. The term $+6$ outside the function represents a vertical shift up by 6 units. Therefore, the transformations are a reflection over the y-axis and a shift up 6 units."}, {"text": "Shift down 6 units and reflect over the x-axis.", "isCorrect": false, "rationale": "The shift is up 6 units (due to $+6$), not down. The reflection is over the y-axis (due to $(-x)^3$), not the x-axis."}, {"text": "Shift down 6 units and reflect over the y-axis.", "isCorrect": false, "rationale": "The shift is up 6 units (due to $+6$), not down. The reflection over the y-axis is correct, but the vertical shift direction is wrong."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
