    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately defines a rational expression and its domain, according to the textbook section?", "options": [{"text": "A rational expression is any fraction, and its domain includes all real numbers.", "isCorrect": false, "rationale": "This is incorrect. A rational expression is specifically a ratio of two polynomials, and its domain excludes values that make the denominator zero, not all real numbers."}, {"text": "A rational expression is an expression of the form P(x)/Q(x), where P(x) and Q(x) are polynomials and Q(x) ≠ 0. Its domain is the set of all real numbers for which Q(x) ≠ 0.", "isCorrect": true, "rationale": "This statement directly matches the definition provided in the 'keytermRational Expression' section of the text."}, {"text": "A rational expression is any algebraic expression that can be simplified, and its domain is determined after simplification.", "isCorrect": false, "rationale": "This is incorrect. While rational expressions can often be simplified, their definition is specific to polynomials, and the domain must be determined from the original (unsimplified) expression."}, {"text": "A rational expression is a polynomial divided by a constant, and its domain is always all real numbers.", "isCorrect": false, "rationale": "This is incorrect. The denominator of a rational expression can be any polynomial, not just a constant, and its domain is restricted when the denominator can be zero."}]}, {"question": "Which of the following expressions is NOT a rational expression?", "options": [{"text": "x^2 + 3x / (x - 1)", "isCorrect": false, "rationale": "This is a rational expression because both the numerator (x^2 + 3x) and the denominator (x - 1) are polynomials."}, {"text": "5 / (x^2 + 4)", "isCorrect": false, "rationale": "This is a rational expression because the numerator (5, a constant polynomial) and the denominator (x^2 + 4) are polynomials."}, {"text": "x^2 + sqrt(x) / (x - 2)", "isCorrect": true, "rationale": "This is not a rational expression because the term sqrt(x) (square root of x) in the numerator is not a polynomial term. Polynomials only involve non-negative integer powers of the variable."}, {"text": "7 / 3", "isCorrect": false, "rationale": "This is a rational expression, as both 7 and 3 are constant polynomials."}]}, {"question": "What is the domain of the rational expression 7x / (2x + 10)?", "options": [{"text": "All real numbers.", "isCorrect": false, "rationale": "The denominator cannot be zero, so there will be a restriction on the domain."}, {"text": "All real numbers except x = -5.", "isCorrect": true, "rationale": "To find the domain restriction, set the denominator equal to zero: 2x + 10 = 0. Solving for x gives 2x = -10, so x = -5. Therefore, x = -5 must be excluded from the domain."}, {"text": "All real numbers except x = 0.", "isCorrect": false, "rationale": "x = 0 does not make the denominator zero (2(0) + 10 = 10 ≠ 0)."}, {"text": "All real numbers except x = 5.", "isCorrect": false, "rationale": "x = 5 makes the denominator 2(5) + 10 = 20, which is not zero, so x = 5 is not a restriction."}]}, {"question": "Determine the domain restrictions for the rational expression (x + 2) / (x^2 - x - 12).", "options": [{"text": "x ≠ 3, x ≠ -4.", "isCorrect": false, "rationale": "Factoring the denominator (x^2 - x - 12) yields (x - 4)(x + 3). Setting these factors to zero gives x = 4 and x = -3, not x = 3 and x = -4."}, {"text": "x ≠ 4, x ≠ -3.", "isCorrect": true, "rationale": "To find domain restrictions, factor the denominator: x^2 - x - 12 = (x - 4)(x + 3). Set each factor to zero: x - 4 = 0 implies x = 4; x + 3 = 0 implies x = -3. Thus, the domain restrictions are x ≠ 4 and x ≠ -3."}, {"text": "x ≠ -2.", "isCorrect": false, "rationale": "This restriction would come from the numerator, but domain restrictions are determined by the denominator where division by zero is undefined."}, {"text": "x ≠ 0, x ≠ 1.", "isCorrect": false, "rationale": "These values do not make the denominator zero: (0)^2 - (0) - 12 = -12; (1)^2 - (1) - 12 = -12."}]}, {"question": "When simplifying a rational expression by canceling common factors, why is it crucial to state the domain restrictions that were present in the *original* expression?", "options": [{"text": "Because the simplified expression will always have a different domain than the original.", "isCorrect": false, "rationale": "This is incorrect. The domain *is* the same for the original and simplified expressions when restrictions are stated. The simplified form itself might not explicitly show the restrictions if not stated."}, {"text": "To make the simplified expression easier to graph, as it eliminates unnecessary points.", "isCorrect": false, "rationale": "This is incorrect. While the simplified expression might be easier to graph, the reason for stating restrictions is to maintain mathematical equivalence, not just graphing convenience."}, {"text": "To accurately represent the domain of the original function, because canceling a factor creates a 'hole' (a single missing point) in the graph at that value, which must be acknowledged.", "isCorrect": true, "rationale": "As stated in the text, canceling a common factor simplifies the algebra, but the original expression was undefined wherever that factor was zero. Graphically, this results in a hole, and stating the original restrictions ensures the simplified expression maintains the same domain as the original."}, {"text": "To prevent the numerator from becoming zero, which would make the expression undefined.", "isCorrect": false, "rationale": "This is incorrect. An expression is undefined when the denominator is zero, not necessarily when the numerator is zero. A zero numerator simply makes the expression's value zero."}]}, {"question": "Consider the expression (x^2 + 5) / (x + 5). Which of the following statements is true regarding its simplification?", "options": [{"text": "It simplifies to x^2 by canceling the common term '5'.", "isCorrect": false, "rationale": "This is a common error. The '5' in the numerator and denominator are terms, not factors, and therefore cannot be canceled according to the 'Fundamental Property of Rational Expressions' and the 'caution' note."}, {"text": "It simplifies to x by canceling the common term 'x'.", "isCorrect": false, "rationale": "Similar to option A, 'x' here is a term, not a factor, in the denominator. Canceling terms is an incorrect operation."}, {"text": "It cannot be simplified by canceling 'x' or '5' because they are terms, not factors, in the given form.", "isCorrect": true, "rationale": "The text explicitly states: 'Only factors may be canceled, never terms.' In (x^2 + 5) / (x + 5), neither x nor 5 are factors of the entire numerator or denominator."}, {"text": "It simplifies to x + 1 after factoring x from the numerator and denominator.", "isCorrect": false, "rationale": "Factoring x from the numerator would give x(x + 5/x), which does not allow for cancellation of (x+5). This simplification is incorrect."}]}, {"question": "Simplify the rational expression 6x^3 / (9x) and state any restrictions.", "options": [{"text": "2x^2 / 3, x ≠ 0.", "isCorrect": true, "rationale": "Factor out common terms: 6x^3 / (9x) = (3x * 2x^2) / (3x * 3). Canceling the common factor 3x leaves 2x^2 / 3. The original denominator 9x equals zero when x = 0, so x ≠ 0 is the restriction."}, {"text": "2x^2 / 3, no restrictions.", "isCorrect": false, "rationale": "There is a restriction because the original denominator (9x) would be zero if x = 0."}, {"text": "3x^2 / 2.", "isCorrect": false, "rationale": "The coefficients and powers of x are incorrectly simplified."}, {"text": "6x^2 / 9, x ≠ 9.", "isCorrect": false, "rationale": "The coefficients are not fully simplified, and the restriction is incorrect. The restriction comes from the variable factor, x, not the coefficient 9."}]}, {"question": "Simplify the expression (x^2 - 9) / (x^2 - x - 6) and state its domain restrictions.", "options": [{"text": "(x + 3) / (x + 2), x ≠ 3, x ≠ -2.", "isCorrect": true, "rationale": "Factor the numerator: x^2 - 9 = (x - 3)(x + 3). Factor the denominator: x^2 - x - 6 = (x - 3)(x + 2). Cancel the common factor (x - 3). The simplified expression is (x + 3) / (x + 2). The original denominator factors were (x - 3) and (x + 2), so the restrictions are x ≠ 3 and x ≠ -2."}, {"text": "(x - 3) / (x - 2), x ≠ -3, x ≠ 2.", "isCorrect": false, "rationale": "The factors are incorrect, leading to an incorrect simplified expression and restrictions."}, {"text": "1 / (x - 6), x ≠ 6.", "isCorrect": false, "rationale": "This simplification is incorrect and results from canceling terms or incorrect factoring."}, {"text": "x - 9 / (x - 6), x ≠ 0.", "isCorrect": false, "rationale": "This results from attempting to cancel terms instead of factors and has an incorrect domain restriction."}]}, {"question": "Simplify the expression (3 - x) / (x^2 - 9) and state its domain restrictions.", "options": [{"text": "1 / (x + 3), x ≠ 3, x ≠ -3.", "isCorrect": false, "rationale": "This option is missing the negative sign that results from factoring out -1 from (3 - x) to make it (x - 3)."}, {"text": "-1 / (x + 3), x ≠ 3, x ≠ -3.", "isCorrect": true, "rationale": "Factor the numerator by factoring out -1: 3 - x = -(x - 3). Factor the denominator: x^2 - 9 = (x - 3)(x + 3). The expression becomes -(x - 3) / ((x - 3)(x + 3)). Cancel (x - 3) to get -1 / (x + 3). The original denominator (x^2 - 9) is zero when x = 3 or x = -3, so these are the restrictions."}, {"text": "-1 / (x - 3), x ≠ 3, x ≠ -3.", "isCorrect": false, "rationale": "While the negative sign is present, the denominator is incorrect after simplification and cancellation."}, {"text": "(3 - x) / ((x - 3)(x + 3)), no restrictions.", "isCorrect": false, "rationale": "This is the factored but not simplified expression, and it incorrectly states there are no restrictions. The domain must restrict values that make the denominator zero."}]}, {"question": "A student simplifies the rational function f(x) = (x^3 - 4x) / (x^2 + 2x) to f(x) = x - 2. Which statement accurately describes the graph of the *original* function f(x)?", "options": [{"text": "The graph of f(x) is a straight line with no unusual features.", "isCorrect": false, "rationale": "This describes the simplified form but ignores the domain restrictions of the original function, which lead to 'holes' in the graph."}, {"text": "The graph of f(x) is a parabola with a hole at x = 0 and x = -2.", "isCorrect": false, "rationale": "The simplified function f(x) = x - 2 is a line, not a parabola. The holes are correctly identified but the base shape is wrong."}, {"text": "The graph of f(x) is the line y = x - 2 but with holes at x = 0 and x = -2.", "isCorrect": true, "rationale": "Factoring the numerator gives x(x - 2)(x + 2). Factoring the denominator gives x(x + 2). Canceling x and (x + 2) leaves x - 2. The factors x and (x + 2) in the original denominator lead to domain restrictions at x = 0 and x = -2. Because these factors cancel, they create holes in the graph of the line y = x - 2 at these x-values."}, {"text": "The graph of f(x) has vertical asymptotes at x = 0 and x = -2.", "isCorrect": false, "rationale": "Vertical asymptotes occur when a factor in the denominator remains after simplification (meaning it doesn't cancel with a numerator factor). In this case, the factors x and (x+2) *do* cancel, indicating holes, not asymptotes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
