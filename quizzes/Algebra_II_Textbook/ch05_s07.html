on asks for $\\ge 0$."}, {"text": "$(- \\infty, -1] \\cup [5, \\infty)$", "isCorrect": true, "rationale": "Factoring gives $(x+1)(x-5) \\ge 0$. The zeros are -1 and 5. Testing intervals: for $x < -1$, e.g., $x=-2$, $(-1)( -7) = 7 \\ge 0$. For $-1 < x < 5$, e.g., $x=0$, $(1)(-5) = -5 \\not\\ge 0$. For $x > 5$, e.g., $x=6$, $(7)(1) = 7 \\ge 0$. Since it's a non-strict inequality, endpoints are included."}]}, {"question": "For an inequality involving a polynomial with a factor $(x-c)^m$ where $m$ is an even integer (even multiplicity), how does the polynomial's sign behave at $x=c$?", "options": [{"text": "The polynomial always changes sign from positive to negative at $x=c$.", "isCorrect": false, "rationale": "A sign change occurs at zeros with odd multiplicity, not even."}, {"text": "The polynomial always changes sign from negative to positive at $x=c$.", "isCorrect": false, "rationale": "A sign change occurs at zeros with odd multiplicity, not even."}, {"text": "The polynomial does not change sign at $x=c$; the sign in the intervals immediately to the left and right of $x=c$ remains the same.", "isCorrect": true, "rationale": "The text explicitly states: 'When a zero has even multiplicity, the polynomial does not change sign there. The sign chart value in both neighboring intervals is the same.'"}, {"text": "The value $x=c$ is always included in the solution set, regardless of the inequality type.", "isCorrect": false, "rationale": "The inclusion of $x=c$ depends on whether the inequality is strict ($>$ or $<$) or non-strict ($\\ge$ or $\\le$). For strict inequalities, $x=c$ is typically excluded."}]}, {"question": "Solve the inequality $-2x^2 + 2x + 40 \\ge 0$. Express the solution in interval notation.", "options": [{"text": "$(- \\infty, -4] \\cup [5, \\infty)$", "isCorrect": false, "rationale": "This would be the solution if the inequality were $x^2 - x - 20 \\ge 0$, which means the reversal of the inequality sign was missed after dividing by a negative number." + 9 < 0$. Express the solution in interval notation.", "options": [{"text": "$(- \\infty, -3) \\cup (-1, 1) \\cup (3, \\infty)$", "isCorrect": false, "rationale": "This solution represents the intervals where the polynomial is positive, not negative."}, {"text": "$[-3, -1] \\cup [1, 3]$", "isCorrect": false, "rationale": "This interval notation would be correct if the inequality was non-strict ($\\le 0$). The question specifies strict inequality ($< 0$), so endpoints must be excluded."}, {"text": "$(-3, -1) \\cup (1, 3)$", "isCorrect": true, "rationale": "Let $u=x^2$. The inequality becomes $u^2 - 10u + 9 < 0$, which factors to $(u-1)(u-9) < 0$. Substituting back, $(x^2-1)(x^2-9) < 0$, which fully factors to $(x-1)(x+1)(x-3)(x+3) < 0$. The zeros are -3, -1, 1, 3. A sign chart reveals the polynomial is negative on $(-3, -1)$ and $(1, 3)$. Since the inequality is strict, endpoints are excluded."}, {"text": "$(-1, 1)$", "isCorrect": false, "rationale": "This is only one of the intervals where the polynomial is negative; it misses the other interval."}]}, {"question": "A company's profit $P(x)$ (in thousands of dollars) for selling $x$ units of a product is given by $P(x) = -x^2 + 10x - 20$. For what range of units sold, $x$, is the company *losing money*? (Assume $x \\ge 0$ and $x$ is a real number for this model.)", "options": [{"text": "$(5 - \\sqrt{5}, 5 + \\sqrt{5})$", "isCorrect": false, "rationale": "This interval represents where the company is making a profit ($P(x) > 0$), not losing money."}, {"text": "$[0, 5 - \\sqrt{5}) \\cup (5 + \\sqrt{5}, \\infty)$", "isCorrect": true, "rationale": "We need to solve $P(x) < 0$, so $-x^2 + 10x - 20 < 0$. Multiplying by -1 and reversing the inequality gives $x^2 - 10x + 20 > 0$. The zeros of $x^2 - 10x + 20 = 0$ are $x = \\frac{10 \\pm \\sqrt{100 - 80}}{2} = \\frac{10 \\pm \\sqrt{20}}{2} = 5 \\pm \\sqrt{5}$. Since the parabola $y = x^2 - 10x + 20$ opens upwards, it is positive (and thus the company loses money) outside its  "Solving polynomial equations involves finding critical numbers, while solving polynomial inequalities does not.", "isCorrect": false, "rationale": "Critical numbers (the zeros of the polynomial) are fundamental to solving both equations and inequalities. They are directly the solutions for equations and define the intervals for inequalities."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
