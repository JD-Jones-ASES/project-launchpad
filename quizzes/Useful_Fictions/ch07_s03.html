<script>
var QUESTIONS = [{"question": "What is the 'implicit hierarchy' about metaphor that Lakoff and Johnson argue is 'precisely backwards'?", "options": [{"text": "The assumption that abstract thought is more sophisticated than concrete thought.", "isCorrect": false, "rationale": "The text does not discuss a hierarchy of sophistication between abstract and concrete thought. Lakoff and Johnson's target is the assumption that metaphor is decorative rather than constitutive of thought."}, {"text": "The assumption that metaphor is ornamental — something added to thought after the thought has been completed in literal form.", "isCorrect": true, "rationale": "The text states the traditional view holds that you have the idea first and then dress it in a metaphor if you want to make it poetic. Lakoff and Johnson argue the opposite: metaphor is thought itself, not decoration added afterward."}, {"text": "The assumption that written metaphors are more powerful than spoken ones.", "isCorrect": false, "rationale": "The text makes no distinction between written and spoken metaphor. The hierarchy Lakoff and Johnson invert is between literal thought and metaphorical expression."}, {"text": "The assumption that professional writers use metaphor more skillfully than ordinary speakers.", "isCorrect": false, "rationale": "The text argues the opposite of literary specialness: conceptual metaphors are pre-reflective and largely invisible to all speakers, not the province of skilled writers."}], "id": "q01"}, {"question": "According to Lakoff and Johnson, what is the function of conceptual metaphor in human cognition?", "options": [{"text": "To make speech more persuasive by activating emotional responses in listeners.", "isCorrect": false, "rationale": "The text does not present conceptual metaphors as persuasion tools. Their function, as Lakoff and Johnson describe it, is cognitive infrastructure: they are the mechanism through which we understand abstract domains."}, {"text": "To provide the cognitive infrastructure through which we understand abstract domains by mapping them onto concrete, perceptible ones.", "isCorrect": true, "rationale": "The text states conceptual metaphors are 'the primary cognitive mechanism through which we understand abstract domains' by mapping them onto 'things we can perceive directly (space, physical conflict, containers, journeys, cleanliness).'"}, {"text": "To enable children to acquire vocabulary by linking new words to familiar objects.", "isCorrect": false, "rationale": "Language acquisition is not the function the text describes. Conceptual metaphors operate in adult cognition across all domains, not only in early language learning."}, {"text": "To help speakers be precise by distinguishing the literal from the figurative.", "isCorrect": false, "rationale": "The text argues that conceptual metaphors are largely pre-reflective and invisible — the opposite of precision tools. Their role is not to clarify the literal/figurative distinction but to structure thought before reflection occurs."}], "id": "q02"}, {"question": "Lakoff and Johnson use ARGUMENT IS WAR as their central example. What does this metaphor hide about the activity of argument?", "options": [{"text": "It hides the fact that argument requires formal training in logic.", "isCorrect": false, "rationale": "The text does not discuss formal logic as something the war metaphor obscures. The metaphor hides different possible goals and forms of argument, not technical requirements."}, {"text": "It hides the aspects of argument as collaborative inquiry — as a process of mutual refinement and joint truth-seeking.", "isCorrect": true, "rationale": "The text states the war mapping 'hides' argument as 'collaborative inquiry, as a process of mutual refinement, as a way of getting at the truth together.' These aspects don't fit the war source domain and are therefore rendered invisible."}, {"text": "It hides the emotional costs of conflict, making arguments seem consequence-free.", "isCorrect": false, "rationale": "The text does not identify emotional costs as what the war metaphor conceals. The hidden element is the collaborative, truth-seeking dimension of argument — not its emotional difficulty."}, {"text": "It hides the fact that argument is often conducted in writing rather than face-to-face.", "isCorrect": false, "rationale": "The text does not discuss medium of argument as something the metaphor conceals. The war metaphor shapes the goal, the success criteria, and the appropriate behaviors — not the channel of communication."}], "id": "q03"}, {"question": "In the culture Lakoff and Johnson imagine where ARGUMENT IS DANCE, what would 'winning' an argument mean?", "options": [{"text": "Demonstrating superior logical skill by exposing the other person's fallacies.", "isCorrect": false, "rationale": "This is still within the ARGUMENT IS WAR framework — exposing fallacies maps onto defeating an enemy. In the dance culture, this framing would not exist."}, {"text": "Producing the most technically precise argument, equivalent to performing the most difficult dance moves.", "isCorrect": false, "rationale": "Technical difficulty in dance is not the same as winning, and the text is not suggesting a competitiveness-through-virtuosity model. The dance metaphor implies mutual arrival at synthesis, not individual performance."}, {"text": "Nothing — 'winning' would be a category that doesn't apply, as you cannot win a waltz.", "isCorrect": true, "rationale": "The text states 'People in that culture would not understand what it meant to win an argument any more than you can win a waltz.' The dance metaphor structures argument around coordination and synthesis, which have no winner."}, {"text": "Reaching agreement faster than in a war-metaphor argument, since dance is more efficient.", "isCorrect": false, "rationale": "Efficiency is not the difference the text highlights. The difference is about what counts as success: dance aims at synthesis achieved together, which has no winner and no loser."}], "id": "q04"}, {"question": "The TIME IS MONEY metaphor 'presupposes that time is a finite resource that must be allocated efficiently.' What ideological content does the text say this mapping carries?", "options": [{"text": "It assumes that wealthy people have more time than poor people.", "isCorrect": false, "rationale": "The text does not make this socioeconomic claim. The ideological content identified is the assumption that efficiency is the appropriate metric for time use — not a claim about how time distributes across income levels."}, {"text": "It encodes a specifically industrial-economic orientation toward time, making time management feel like an obvious practical problem rather than a cultural choice.", "isCorrect": true, "rationale": "The text states the mapping 'makes time management feel like an obvious practical problem rather than a particular cultural orientation,' and that 'the industrial economy drew' this map. Other cultures organize temporal experience around cycles, relational obligations, or contemplative states."}, {"text": "It accurately describes the universal human experience of time as scarce and valuable.", "isCorrect": false, "rationale": "The text argues the opposite: the mapping 'is neither universal nor obviously correct' and other cultures have organized temporal experience differently. The MONEY framing is a cultural imposition, not a discovery."}, {"text": "It reveals that time and money are physically equivalent, supporting formal economic models of temporal discounting.", "isCorrect": false, "rationale": "The text is not endorsing an economic equivalence claim. It is arguing that the monetary mapping is a metaphor — a cognitive map drawn over temporal territory — not a literal physical or economic truth."}], "id": "q05"}, {"question": "The section describes a study in which the ARGUMENT IS WAR metaphor and related priming affected not just language but also memory, judgment, and policy preferences. What does this evidence establish about conceptual metaphors?", "options": [{"text": "It establishes that conceptual metaphors are only active when speakers consciously choose to use them.", "isCorrect": false, "rationale": "The text states conceptual metaphors are 'pre-reflective and largely invisible' — the opposite of conscious choice. The priming study shows effects operating below awareness."}, {"text": "It establishes that the metaphor was not merely describing a prior view but was generating one — shaping how people reasoned about a domain even with identical factual information.", "isCorrect": true, "rationale": "The text describes subjects primed with different crime metaphors (beast vs. virus) recommending different policies even when all factual information was identical. The text concludes: 'The metaphor was not describing a prior view; it was generating one.'"}, {"text": "It establishes that war metaphors always produce more punitive policy recommendations than disease metaphors, regardless of the domain.", "isCorrect": false, "rationale": "The study concerned crime specifically, not all domains. The general conclusion is about metaphor's generative power, not a universal directional claim about war versus disease frames."}, {"text": "It establishes that people with less education are more susceptible to metaphorical framing effects.", "isCorrect": false, "rationale": "The text makes no claim about education level as a moderator of susceptibility. The point is about the power of metaphors to generate views, not about differential vulnerability."}], "id": "q06"}, {"question": "The LIFE IS A JOURNEY metaphor implies that 'the quality of those choices determines where you end up.' According to the text, what does this metaphor hide about how lives actually unfold?", "options": [{"text": "It hides the fact that life outcomes are entirely determined by social class and therefore individual choices are irrelevant.", "isCorrect": false, "rationale": "The text does not argue that choices are irrelevant or that structural factors determine all outcomes. The journey metaphor's concealment is about the narrative structure of lives — not about agency versus structure in a sociological sense."}, {"text": "It hides the ways a life is made retroactively through storytelling — that narrative coherence is imposed on experience rather than found within it, and that lives are recursive rather than linear.", "isCorrect": true, "rationale": "The text states 'the map of your life is drawn after the territory has already been lived' and 'narrative coherence is not something found in experience; it is something imposed on experience by the stories we tell.' Lives are 'recursive, cyclical, multidimensional' — not the linear journey the metaphor implies."}, {"text": "It hides the reality that most people never reach their destination, making the journey metaphor statistically inaccurate.", "isCorrect": false, "rationale": "The text does not make a statistical claim about destination-reaching. The problem with the journey metaphor is structural: lives don't have the linear progression from start to end that a journey implies."}, {"text": "It hides the differences between cultures that organize life narratives differently.", "isCorrect": false, "rationale": "While the text notes the metaphor is dominant in 'the modern West,' the primary critique is about the structure of the metaphor itself — its linearity, its implied agency, and its concealment of retroactive narrative construction."}], "id": "q07"}, {"question": "A hospital administrator frames the problem of patient re-admissions as 'a war against readmission.' A quality improvement consultant suggests reframing it as 'a garden that must be cultivated.' Applying the section's argument, what would be the practical consequence of each framing?", "options": [{"text": "Both framings are equally valid because they are both metaphors — neither should influence practical decision-making.", "isCorrect": false, "rationale": "The text argues the opposite: conceptual metaphors shape what counts as success, what behaviors are appropriate, and what aspects of the problem are visible or invisible. The choice of metaphor has real practical consequences."}, {"text": "The war framing makes winning/defeating the metric of success and hides maintenance, ecological balance, and long-term cultivation; the garden framing makes ongoing systemic care salient and hides adversarial dynamics.", "isCorrect": true, "rationale": "The text shows that ARGUMENT IS WAR makes opposition, defeating, and winning salient while hiding collaboration. The same logic applies: war frames problem-solving as adversarial and goal-oriented toward elimination; garden frames it as systemic maintenance over time. Each framing illuminates different aspects and conceals others."}, {"text": "The war framing is inappropriate for healthcare because war causes harm, while the garden framing is universally better.", "isCorrect": false, "rationale": "The text does not argue that some metaphors are universally better. It argues that every metaphor enables certain aspects and hides others. The appropriate choice depends on what you need to see."}, {"text": "Only the war framing will motivate staff because humans are naturally competitive, making the garden metaphor ineffective.", "isCorrect": false, "rationale": "The text does not make claims about motivation based on universal human competitiveness. It analyzes what each metaphor makes visible and what it hides — not which is more motivationally effective."}], "id": "q08"}, {"question": "The section connects the LIFE IS A JOURNEY metaphor to the narrative theory of Chapter 6. What is the shared claim?", "options": [{"text": "Both the journey metaphor and narrative theory agree that human life has a discoverable, pre-given structure that storytelling reveals.", "isCorrect": false, "rationale": "The text argues the opposite: the self is 'a fiction' and the journey it travels is 'a map drawn over a more chaotic set of events.' The claim is that structure is imposed, not discovered."}, {"text": "The 'traveler' on life's journey is already a fiction, and the journey itself is a map imposed on a more chaotic set of events — narrative coherence is constructed, not found.", "isCorrect": true, "rationale": "The text states 'the self that is the traveler on life's journey is already a fiction, and the journey it is traveling is a map drawn over a more chaotic set of events that lack the metaphor's clean structure.' This connects directly to the narrative theory claim that coherence is imposed rather than discovered."}, {"text": "Journey metaphors are universal across cultures because all narrative traditions organize life as travel.", "isCorrect": false, "rationale": "The text presents LIFE IS A JOURNEY as dominant in 'the modern West,' not as universal. The connection to Chapter 6 is about the constructed nature of narrative coherence, not cross-cultural universality."}, {"text": "Both claims agree that the self is stable and unified, though its journey is complex.", "isCorrect": false, "rationale": "The text explicitly identifies the self as 'a fiction, and the journey it is traveling is a map drawn over a more chaotic set of events.' The claim is that the self is not stable and unified but narratively constructed."}], "id": "q09"}, {"question": "The Sapir-Whorf hypothesis asked whether vocabulary shapes perception. How does Lakoff and Johnson's work extend that question?", "options": [{"text": "They showed that Sapir-Whorf was wrong and that vocabulary has no effect on thought.", "isCorrect": false, "rationale": "The text presents Lakoff and Johnson's work as extending Sapir-Whorf, not refuting it. Their contribution is to scale the question from vocabulary to conceptual structure."}, {"text": "They extended the question from whether individual words shape perception to whether the entire conceptual metaphorical structure through which a domain is understood determines what can be thought about it.", "isCorrect": true, "rationale": "The text states Lakoff and Johnson extend Sapir-Whorf 'from vocabulary to conceptual structure.' The question becomes not just whether having a word shapes perception, but whether the entire metaphorical mapping through which a domain is understood determines what thinking is possible within it."}, {"text": "They shifted the question from language to biology, arguing that conceptual metaphors are genetically encoded.", "isCorrect": false, "rationale": "The text does not make a genetic or biological claim. Lakoff and Johnson's extension is from word-level to conceptual-structure level, not from cultural to biological."}, {"text": "They focused the question on written language specifically, arguing that metaphors in text are more cognitively powerful than metaphors in speech.", "isCorrect": false, "rationale": "The text makes no written/spoken distinction. Conceptual metaphors operate in all language use, and the extension is about structural depth (vocabulary to conceptual mapping), not medium."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
