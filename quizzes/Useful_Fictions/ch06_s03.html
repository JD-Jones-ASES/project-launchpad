<script>
var QUESTIONS = [{"question": "Émile Durkheim proposed in The Elementary Forms of Religious Life (1912) that when people worship God, they are — in a sense they do not recognize — worshipping something else. What was that something else?", "options": [{"text": "The natural forces of the universe, which early religions anthropomorphized as divine agents.", "isCorrect": false, "rationale": "Durkheim's claim is not about anthropomorphizing nature. His argument, as presented in the text, is that 'the sacred is the social' — the force experienced as divine is the force of the collective, not natural processes."}, {"text": "Society itself — the collective whose norms and demands are experienced through sacred ritual as transcendent obligation.", "isCorrect": true, "rationale": "The text states Durkheim's core argument: 'when people worship God, they are — in a sense they do not recognize — worshipping society. The sacred is the social. The awe, submission, and moral obligation that believers direct toward the divine is the awe, submission, and moral obligation they owe to the collective.'"}, {"text": "The authority of political leaders, who used religion to legitimate their power over the community.", "isCorrect": false, "rationale": "Durkheim's argument is structural, not about political manipulation. The text presents his claim as about the identity of two experiences — the sacred and the social — not as a theory of religious manipulation by elites."}, {"text": "The evolutionary fitness benefits of cooperation, which religious behavior indirectly promoted.", "isCorrect": false, "rationale": "This is closer to the Big God hypothesis (Norenzayan), not Durkheim. Durkheim's argument concerns the phenomenological identity of the sacred and the social, not evolutionary fitness."}], "id": "q01"}, {"question": "What is 'collective effervescence' in Durkheim's analysis, and why is it important to his argument?", "options": [{"text": "A state of group hysteria that Durkheim believed was pathological and needed to be controlled by religious institutions.", "isCorrect": false, "rationale": "The text presents collective effervescence as the key mechanism Durkheim used to support his argument — he had 'no interest in dismissing it' and treated it as a real experience. It is a proof point, not a pathology."}, {"text": "A state of heightened emotional intensity in which individuals feel merged into something larger than themselves — which Durkheim identified as the force of the collective experienced as divine.", "isCorrect": true, "rationale": "The text describes collective effervescence as 'a state of heightened emotional intensity in which individuals felt themselves merged into something larger than themselves, energized and obligated by forces beyond their individual wills.' Durkheim's argument was that 'the force the worshippers experienced as divine was, in fact, the force of the collective.'"}, {"text": "The economic surplus generated by religious festivals that Durkheim believed supported social cohesion through redistribution.", "isCorrect": false, "rationale": "Collective effervescence is a psychological-phenomenological experience in Durkheim's analysis, not an economic concept. The text makes no mention of economic surplus or redistribution in this context."}, {"text": "A specific chemical process in the brain that produces feelings of transcendence during prayer.", "isCorrect": false, "rationale": "Durkheim was a sociologist working in 1912, before modern neuroscience. Collective effervescence is a sociological concept describing group experience, not a neurological process."}], "id": "q02"}, {"question": "Daniel Dennett introduced the 'intentional stance' in The Intentional Stance (1987). What does this concept explain about the genesis of gods?", "options": [{"text": "That gods are the result of authoritarian leaders deliberately inventing divine figures to control populations.", "isCorrect": false, "rationale": "The intentional stance is a cognitive, not a political, concept. The text presents it as a feature of how human minds explain and predict complex systems — not as a theory of top-down political invention."}, {"text": "That humans naturally explain and predict complex systems by treating them as if they had beliefs, desires, and intentions — and this tendency, applied to large impersonal forces, generates gods.", "isCorrect": true, "rationale": "The text states: 'we can explain and predict the behavior of complex systems by treating them as if they had beliefs, desires, and intentions.' The text then connects this directly: 'The same cognitive tendency is at work in the genesis of gods. Whether the subject is the invisible hand of the market or the will of Zeus, the underlying mental operation is identical — the intentional stance applied to a large, complex, consequence-generating system.'"}, {"text": "That humans intentionally and consciously construct gods as social fictions for political purposes.", "isCorrect": false, "rationale": "The intentional stance is an unconscious cognitive default, not a deliberate construction. The text describes it as a 'reflexive' attribution of agency — not a conscious social engineering project."}, {"text": "That gods must have intentions in order to be worshipped, which is why impersonal forces like gravity cannot become objects of religious devotion.", "isCorrect": false, "rationale": "This reverses the argument. The intentional stance explains why humans attribute intentions to things that lack them — the point is that we impose agency on impersonal forces, not that only actually-intentional entities become gods."}], "id": "q03"}, {"question": "Why does the text say human agent-detection circuits are 'hyperactive'? What is the evolutionary logic behind this?", "options": [{"text": "Because larger brains evolved alongside larger societies, and detecting more agents was necessary to manage complex social networks.", "isCorrect": false, "rationale": "The evolutionary explanation in the text is about the asymmetry of false positive versus false negative detection errors, not about social network management or brain size."}, {"text": "Because the cost of a false negative (missing a real predator) is death, while the cost of a false positive (mistaking a rock for a predator) is merely wasted running — so natural selection favored over-detection of agents.", "isCorrect": true, "rationale": "The text states: 'The evolutionary logic is asymmetric: if you mistake a rock for a predator, you lose a few seconds of running. If you mistake a predator for a rock, you die. Natural selection favored a brain that sees agents everywhere.'"}, {"text": "Because social cooperation requires tracking many agents simultaneously, which pressured the brain to expand its agent-detection capacity.", "isCorrect": false, "rationale": "While social tracking is relevant elsewhere (Dunbar's number in the Big God section), the specific explanation for hyperactive agent detection in this passage is the asymmetric cost of false positives versus false negatives in predator detection."}, {"text": "Because religious traditions trained humans over generations to see divine agents everywhere, making it a learned rather than evolved tendency.", "isCorrect": false, "rationale": "The text explicitly frames hyperactive agent detection as an evolved feature of the brain — 'the human brain has specialized circuits for detecting and modeling agents' — not as a learned or culturally transmitted behavior."}], "id": "q04"}, {"question": "What is the 'Big God hypothesis,' and what specific social problem does it propose that moralistic gods solve?", "options": [{"text": "Big God religions spread because they promised larger cosmic rewards than small-scale local spirit religions, attracting more converts.", "isCorrect": false, "rationale": "The text presents the Big God hypothesis as a solution to a coordination problem — scaling cooperation — not as a competition between religions based on the size of promised rewards."}, {"text": "Moralistic gods who know your thoughts and punish vice extend cooperative enforcement to anonymous strangers beyond the reach of direct reputation networks.", "isCorrect": true, "rationale": "The text explains: small societies maintain cooperation through direct reciprocity and reputation, but beyond Dunbar's number this breaks down. 'What moralistic gods provide is the credible fiction of universal surveillance... The psychological effect of believing you are always watched, by an omniscient moral agent who keeps perfect books, produces cooperation among strangers at a scale that reputation networks cannot achieve.'"}, {"text": "Big gods evolved because they could command larger armies for conquest, giving their worshipping societies a military advantage.", "isCorrect": false, "rationale": "Military advantage is not the mechanism described. The Big God hypothesis in the text is about internal social coordination — extending cooperative enforcement within large societies — not external military competition."}, {"text": "Omniscient gods created the psychological preconditions for literacy by instilling discipline that made sustained learning possible.", "isCorrect": false, "rationale": "Literacy is not mentioned in the text's account of the Big God hypothesis. The mechanism is moral surveillance enabling cooperation among anonymous strangers — not educational discipline."}], "id": "q05"}, {"question": "The text says that 'the Big God is, in effect, a bureaucratic technology.' What does this metaphor mean?", "options": [{"text": "Religious institutions developed written records and tax collection systems that served the same functions as secular bureaucracies.", "isCorrect": false, "rationale": "The bureaucratic technology metaphor in the text refers to the cognitive/psychological function of divine surveillance — maintaining a ledger of behavior across a population — not to the administrative apparatus of religious institutions."}, {"text": "The omniscient moral god maintains a record of every person's behavior that human memory and reputation networks cannot hold, extending enforcement to the scale of large anonymous societies.", "isCorrect": true, "rationale": "The text states: 'The Big God is, in effect, a bureaucratic technology: he maintains the ledger that human memory cannot hold.' The metaphor is about information and enforcement at scale — tracking the moral behavior of thousands of anonymous strangers that no human reputation network could monitor."}, {"text": "Large religious organizations developed hierarchical bureaucracies that allowed them to govern territories previously controlled by secular rulers.", "isCorrect": false, "rationale": "This is about organizational structure, not the psychological mechanism described. The text's bureaucratic technology metaphor concerns the function of divine omniscience, not the organizational form of churches."}, {"text": "Gods were invented by priestly classes to create and maintain administrative records for agricultural surplus distribution.", "isCorrect": false, "rationale": "The text presents the Big God hypothesis as an evolutionary/social coordination account, not a theory of priestly invention for agricultural administration."}], "id": "q06"}, {"question": "The text states: 'Whether or not gods exist, they function.' What does this claim establish, and what does it explicitly not establish?", "options": [{"text": "It establishes that gods do not exist while acknowledging that religious practice has some social benefits.", "isCorrect": false, "rationale": "The text explicitly says: 'Nothing in the sociological or evolutionary account of religious fiction proves that gods do not exist.' The functional analysis is agnostic about the metaphysical question, not a refutation."}, {"text": "It establishes that the social functions of gods are real and consequential, without resolving whether gods have independent metaphysical existence.", "isCorrect": true, "rationale": "The text states: 'the function is separable from the metaphysical claim. We do not need to resolve the metaphysical question to observe that gods, as social fictions, perform work — real, consequential, civilization-shaping work.' The functional and metaphysical questions are treated as independent."}, {"text": "It establishes that functional analysis is the only valid approach to religion and that metaphysical questions are meaningless.", "isCorrect": false, "rationale": "The text says the theological implications are 'worth acknowledging and then setting aside' — it does not claim metaphysical questions are meaningless, only that the functional analysis can proceed independently."}, {"text": "It establishes that gods must exist because their social functions are too important to be explained by a fiction.", "isCorrect": false, "rationale": "The text does not make this argument. It explicitly separates function from existence: a real divine entity 'might work precisely through the cognitive and social mechanisms described,' but the functional account neither proves nor disproves existence."}], "id": "q07"}, {"question": "Apply the concept: A sociologist studying a newly industrialized city notices that crime rates rise as the population grows past a certain size, despite no change in policing or economic conditions. Based on the Big God hypothesis as described in the text, what explanation might she offer?", "options": [{"text": "Larger cities attract more criminals because the anonymity makes law enforcement less effective.", "isCorrect": false, "rationale": "While anonymity is relevant, this answer focuses on law enforcement rather than on the reputation-and-surveillance mechanism the Big God hypothesis describes. The hypothesis is about the breakdown of informal social enforcement when communities grow beyond Dunbar's number."}, {"text": "The city has grown beyond Dunbar's number, breaking down the direct reputation enforcement that kept behavior cooperative in smaller communities — and without a functional substitute (secular or religious), cooperation decreases.", "isCorrect": true, "rationale": "The text explains: 'As societies grow beyond Dunbar's number... direct reputation enforcement breaks down. You cannot personally monitor the behavior of ten thousand strangers. You need something else.' The Big God provides credible surveillance as one substitute. Without it, or a secular functional equivalent, cooperation among strangers degrades."}, {"text": "Industrialization destroyed religious belief, removing the moral constraints that previously deterred crime.", "isCorrect": false, "rationale": "While religious belief is relevant to the Big God hypothesis, the text's mechanistic explanation is about scale exceeding Dunbar's number — not specifically about industrialization destroying belief. The text also notes secular institutions may serve as functional equivalents."}, {"text": "The newcomers have different religious traditions that are less effective at moral enforcement than the original community's religion.", "isCorrect": false, "rationale": "The Big God hypothesis in the text is about scale and the breakdown of reputation networks — not about cross-cultural religious differences. The explanation is structural, not comparative-religion."}], "id": "q08"}, {"question": "The text describes an 'open question' about secular institutions: 'The secular institutions of the modern state (courts, police, tax authorities) are, on the Big God hypothesis, functional equivalents of divine oversight. Whether they are adequate substitutes is an empirical question.' What does 'functional equivalent' mean in this context?", "options": [{"text": "Secular courts have adopted religious legal codes and therefore function identically to religious governance.", "isCorrect": false, "rationale": "The text is not claiming secular institutions derived their content from religious law. The 'functional equivalent' means they perform the same social coordination role — extending enforcement to anonymous strangers — regardless of their content or origin."}, {"text": "Like the omniscient moral god, these institutions extend surveillance and enforcement of cooperative norms to anonymous strangers at large scale, potentially replacing divine oversight as the mechanism of social control.", "isCorrect": true, "rationale": "The functional equivalence is about the mechanism: the Big God hypothesis says gods work by providing credible surveillance of behavior in large anonymous societies. Courts, police, and tax authorities perform the same function through different means — monitoring and sanctioning behavior at scale without requiring direct reputation tracking."}, {"text": "Secular institutions developed from religious ones and therefore share the same organizational structure.", "isCorrect": false, "rationale": "Historical derivation is not what the text means by 'functional equivalent.' The equivalence is about the social coordination function performed, not about organizational lineage."}, {"text": "Citizens obey secular laws for the same emotional and spiritual reasons they obey divine commands.", "isCorrect": false, "rationale": "The text does not claim secular institutions produce religious emotions. The equivalence is functional — they perform the same enforcement role — not experiential."}], "id": "q09"}, {"question": "The text says 'you cannot replace a social technology without providing a substitute.' In the context of gods as social technology, what does this imply about secular modernity?", "options": [{"text": "Secularization is impossible because human cognitive architecture requires belief in gods.", "isCorrect": false, "rationale": "The text does not claim secularization is impossible. It claims that replacing gods functionally requires adequate substitutes — courts, police, secular moral codes — not that the cognitive architecture demands theism."}, {"text": "Secular societies that have reduced religious belief need to have developed adequate institutional substitutes for the cooperation-enforcing and community-bonding functions that gods historically performed.", "isCorrect": true, "rationale": "The text states 'The function is what explains their persistence... You cannot replace a social technology without providing a substitute.' It then poses the question of whether secular institutions (courts, police, tax authorities) are adequate functional equivalents — framing this as an empirical question, not a settled fact."}, {"text": "Religion will inevitably return to all secular societies because the social functions of gods are irreplaceable.", "isCorrect": false, "rationale": "The text does not predict religious revival. It notes that secular institutions may serve as functional equivalents and treats the adequacy of those substitutes as an open empirical question."}, {"text": "Secular modernity has successfully replaced gods with science, which performs the same epistemological functions through empirical verification.", "isCorrect": false, "rationale": "Science is not mentioned in the text as a functional equivalent of religion. The candidate substitutes mentioned are legal and regulatory institutions — courts, police, tax authorities — not scientific knowledge."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
