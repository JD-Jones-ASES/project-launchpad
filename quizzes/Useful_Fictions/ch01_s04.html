<script>
var QUESTIONS = [{"question": "The text describes a 'paradox at the heart of this chapter.' What is that paradox?", "options": [{"text": "Nothing is both the most useful and the most dangerous concept in human thought, depending entirely on who invokes it.", "isCorrect": false, "rationale": "While the section does contrast generative and dangerous uses of nothingness, the paradox the text names explicitly is not about danger — it is about generativity specifically."}, {"text": "The most generative concept in human intellectual history is the concept of nothing.", "isCorrect": true, "rationale": "The text states: 'This is the paradox at the heart of this chapter: the most generative concept in human intellectual history is the concept of nothing.'"}, {"text": "Nothing and something are ultimately the same entity, viewed from different perspectives.", "isCorrect": false, "rationale": "The text does not claim an identity between nothing and something. The paradox is about nothing's generative power, not its equivalence to something."}, {"text": "The more precisely you define nothing, the more it resembles something.", "isCorrect": false, "rationale": "This is not the paradox the text names. The stated paradox is specifically about nothing being the most generative concept — surprising precisely because generativity seems to require something to work with."}], "id": "q01"}, {"question": "What is the doctrine of creatio ex nihilo, and how does it differ from the view that God shaped pre-existing matter?", "options": [{"text": "Creatio ex nihilo holds that God created the universe from nothing; this means God is entirely unconstrained and the universe is radically contingent — it need not exist and exists only because God wills it.", "isCorrect": true, "rationale": "The text explains: 'if God creates from nothing, then matter itself is entirely God's product, God is entirely unconstrained, and the universe is radically contingent: it need not exist at all, and exists only because God wills it to, moment by moment.'"}, {"text": "Creatio ex nihilo holds that the universe is eternal and uncreated; God merely orders it according to divine reason.", "isCorrect": false, "rationale": "This describes a Platonic or Aristotelian view of an eternal cosmos, not the Christian doctrine of creatio ex nihilo, which the text explicitly links to the universe's radical contingency."}, {"text": "Creatio ex nihilo and creation from pre-existing matter are theologically equivalent — both affirm God's omnipotence.", "isCorrect": false, "rationale": "The text argues these are 'a very different theology' — creation from pre-existing matter would give matter an independence from God; ex nihilo creation removes that independence entirely."}, {"text": "Creatio ex nihilo requires a medium — the void itself — which God fills with creation, making the void ontologically prior.", "isCorrect": false, "rationale": "Aquinas specifically argued that creation ex nihilo did not require an instrument or medium. The void was 'not a container that God filled; it was the contrast class against which creation was intelligible.'"}], "id": "q02"}, {"question": "Thomas Aquinas argued that creation ex nihilo was 'philosophically distinctive.' What made it distinctive in his account?", "options": [{"text": "It was the only doctrine compatible with both Christian faith and Aristotelian natural philosophy.", "isCorrect": false, "rationale": "The text does not present the Aquinas argument as an attempt at Aristotelian compatibility — indeed, Aristotle rejected the idea of a created universe. The distinctiveness Aquinas identified was about the mechanism of creation."}, {"text": "It required no instrument, no material, and no elapsed time — God's creative act was instantaneous and total, and the void was not a container filled but the contrast against which creation was intelligible.", "isCorrect": true, "rationale": "The text says: 'creation ex nihilo was philosophically distinctive because it did not require an instrument or a medium. An ordinary craftsman needs material, tools, and time. God needed none of these — the act of creation was instantaneous and total.'"}, {"text": "It was the first doctrine to place the universe within time, rather than in an eternal present.", "isCorrect": false, "rationale": "While creatio ex nihilo does imply a beginning of time, this is not the specific philosophical distinctiveness Aquinas emphasized in the text's account."}, {"text": "It proved that the void pre-existed God and therefore that God emerged from nothingness.", "isCorrect": false, "rationale": "This would be a heretical implication — the text says the void was not ontologically prior; it 'was the contrast class against which creation was intelligible,' not something that existed before God."}], "id": "q03"}, {"question": "What does the text identify as the problem with asking 'what came before the Big Bang'?", "options": [{"text": "Science lacks the instruments to measure events before the Big Bang.", "isCorrect": false, "rationale": "The text frames the issue as conceptual, not technological. It is not about instrument capability but about whether the question is grammatically well-formed given the nature of time."}, {"text": "The question may be malformed — time itself may have begun with the Big Bang, making 'before' a term without a referent, like asking what is north of the North Pole.", "isCorrect": true, "rationale": "The text states: 'The honest answer is that the question may be malformed. Stephen Hawking and James Hartle proposed a model in which asking what came before the Big Bang is like asking what is north of the North Pole — the question assumes a geometry that doesn't apply.'"}, {"text": "Religious authorities have forbidden scientists from investigating the period before creation.", "isCorrect": false, "rationale": "The text makes no mention of religious restrictions on scientific inquiry. The problem with the question is structural — 'before' has no referent if time began with the Big Bang."}, {"text": "The universe is infinitely old, so there was no 'before' because the Big Bang never happened.", "isCorrect": false, "rationale": "The text presents the Big Bang as the accepted model of the universe's origin, not as a disputed event. The 'before' question is problematic precisely because the Big Bang was a beginning."}], "id": "q04"}, {"question": "The text says that the cosmological story of the Big Bang 'rhymes uncomfortably' with creatio ex nihilo. In what specific way does it 'rhyme'?", "options": [{"text": "Both require a creator — the Big Bang model names the universe's cause as 'God' under a different scientific label.", "isCorrect": false, "rationale": "The text explicitly contrasts them: 'This is not creation ex nihilo in the theological sense — there is no creator, no intention, no will.' The rhyme is structural, not about a shared creator."}, {"text": "Both share a deep structure: a universe that exists against a background of nothing, where that nothing is not mere absence but in some sense the condition of possibility for existence.", "isCorrect": true, "rationale": "The text says the Big Bang model 'shares the deep structure: a universe that exists against a background of nothing, where the nothing is not merely absence but is in some sense the condition of possibility for existence.'"}, {"text": "Both were developed by medieval theologians working from the same scriptural sources.", "isCorrect": false, "rationale": "The Big Bang model was developed by twentieth-century physicists; it has no theological origin. The similarity is structural, not historical."}, {"text": "Both claim that the universe is approximately 13.8 billion years old.", "isCorrect": false, "rationale": "The 13.8 billion year figure is from cosmological physics, not from theological doctrine. Creatio ex nihilo makes no claim about the universe's age."}], "id": "q05"}, {"question": "In the von Neumann construction of natural numbers from the empty set, what does the empty set ∅ represent, and how is the number 2 represented?", "options": [{"text": "∅ represents 0; the number 2 is represented as the set {∅, {∅}} — the set containing both the empty set and the set containing the empty set.", "isCorrect": true, "rationale": "The text explains: 'The empty set ∅ represents 0. The set containing only the empty set, {∅}, represents 1 — it has one member. The set {∅, {∅}} represents 2 — it has two members.'"}, {"text": "∅ represents infinity; the number 2 is represented as {∅} because all finite quantities are subsets of the infinite.", "isCorrect": false, "rationale": "The construction starts at 0 (empty set), not infinity. Each natural number is the set of all natural numbers preceding it."}, {"text": "∅ represents 1; the number 2 is represented as {∅, ∅} — two copies of the empty set.", "isCorrect": false, "rationale": "The construction begins at 0, not 1. And {∅, ∅} = {∅} in set theory (sets do not contain duplicate elements), so this would also be incorrect structurally."}, {"text": "∅ represents 0; the number 2 is represented as {∅} because 1 already contains two abstract elements.", "isCorrect": false, "rationale": "{∅} has one member (the empty set itself) and so represents 1. The number 2 requires a set with two distinct members: {∅, {∅}}."}], "id": "q06"}, {"question": "According to the text, what does John Cage's 4'33\" demonstrate about silence?", "options": [{"text": "That true silence exists in specially designed concert halls with superior acoustic dampening.", "isCorrect": false, "rationale": "The text argues the opposite: true silence does not exist. Even in the anechoic chamber at Harvard, Cage heard two sounds — his nervous system and his blood circulating."}, {"text": "There is no such thing as silence — what we call silence is always the sound of what we were not listening to; the empty score is a frame that makes the unintentional audible.", "isCorrect": true, "rationale": "The text states: 'there is no such thing as silence. In the anechoic chamber at Harvard, he had heard two sounds... What we call silence is always the sound of what we weren't listening to.' And: 'The empty score is a frame that makes the unintentional audible.'"}, {"text": "Audiences can be trained to appreciate the absence of music when given sufficient preparation.", "isCorrect": false, "rationale": "Cage's point is philosophical, not pedagogical. The piece is not about training audiences to enjoy quiet — it is about revealing that silence is already full of sound."}, {"text": "Music requires no intentional content — any random sounds constitute a valid composition.", "isCorrect": false, "rationale": "The text does not present 4'33\" as a claim that any random sounds count as music. The piece's specific philosophical point is about framing — the empty score is a frame that reveals existing sounds, not a license for anything to be music."}], "id": "q07"}, {"question": "The text attributes the von Neumann construction of numbers from the empty set to a specific decade and foundational framework. What are they?", "options": [{"text": "Developed by John von Neumann in the 1920s; forms the foundation of ZFC (Zermelo-Fraenkel with Choice) set theory.", "isCorrect": true, "rationale": "The text states: 'This construction, developed by John von Neumann in the 1920s, is the foundation of modern ZFC set theory (Zermelo-Fraenkel with Choice), which is the standard axiomatic foundation for most of contemporary mathematics.'"}, {"text": "Developed by Georg Cantor in the 1870s; forms the foundation of Euclidean geometry.", "isCorrect": false, "rationale": "The text attributes this construction to von Neumann in the 1920s. Cantor developed set theory in the nineteenth century, but the specific construction described here is attributed to von Neumann."}, {"text": "Developed by Bertrand Russell in the 1910s; forms the foundation of formal logic.", "isCorrect": false, "rationale": "The text attributes the construction to von Neumann, not Russell, and names ZFC set theory as the framework, not formal logic per se."}, {"text": "Developed by Brahmagupta in the seventh century CE; forms the foundation of arithmetic.", "isCorrect": false, "rationale": "Brahmagupta developed arithmetic rules for zero (ch01_s01); the von Neumann construction of all numbers from the empty set is a twentieth-century achievement in formal set theory."}], "id": "q08"}, {"question": "Scenario: A designer creates a poster with extensive deliberate white space — blank areas surrounding the central image. A colleague objects: 'That space is just empty — it's wasted.' Using the section's key insight, how would you respond?", "options": [{"text": "The colleague is correct; white space reduces the information density of a design.", "isCorrect": false, "rationale": "The section's argument directly contradicts this. The void is not wasted — it is the condition of possibility for the content it surrounds. White space, like silence in music, is what makes the non-white-space legible."}, {"text": "The white space is not empty but generative — it is the frame that makes the central image visible and meaningful; without it, the image has nothing to stand against.", "isCorrect": true, "rationale": "The text's closing argument is that 'you cannot read text without white space' — and that nothingness is the precondition for something. White space is an instance of the generative void: the nothing that makes the something intelligible."}, {"text": "White space is valuable only in certain cultural traditions and would be wasted in others.", "isCorrect": false, "rationale": "The text makes a general philosophical claim about the generative role of nothing, not a culturally relative one about design aesthetics."}, {"text": "The designer should add more content to fill the white space before the poster is finalised.", "isCorrect": false, "rationale": "This advice misses the section's argument entirely. The text argues that absence is not a failure of presence but its precondition."}], "id": "q09"}, {"question": "The section concludes by identifying a single insight that connects zero, the vacuum, blank slates, and the generative void. What is that unifying insight?", "options": [{"text": "All human inventions are ultimately derived from the concept of zero, which was the first human abstraction.", "isCorrect": false, "rationale": "The text does not claim that zero is the source of all inventions. The unifying insight is about the relationship between nothing and something in general."}, {"text": "Nothing is not the opposite of something but its precondition — you cannot count without zero, measure pressure without a vacuum, inscribe without a prepared surface, or hear music without silence.", "isCorrect": true, "rationale": "The text states: 'Nothing is not the opposite of something. Nothing is the precondition of something. You cannot count without zero. You cannot measure pressure without a vacuum to measure against. You cannot inscribe anything without a surface prepared to receive inscription. You cannot hear music without silence, read text without white space, or appreciate presence without understanding absence.'"}, {"text": "The most important things in civilization are invisible — what matters is always what is absent, never what is present.", "isCorrect": false, "rationale": "The text does not argue that absence matters more than presence. It argues that absence is the *precondition* for presence — they are interdependent, not with absence being privileged."}, {"text": "Human beings are fundamentally afraid of nothingness and construct all of civilization as a defense against it.", "isCorrect": false, "rationale": "While earlier sections (horror vacui, theological anxiety about zero) touch on fear of nothing, the closing argument is positive: the void is where everything starts, not something to be defended against."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
