<script>
var QUESTIONS = [{"question": "What is the logical structure of William Paley's 'watchmaker' argument in Natural Theology (1802)?", "options": [{"text": "Complex functional order in living organisms implies a designer, just as a watch's complex order implies a watchmaker.", "isCorrect": true, "rationale": "The text states Paley's argument: a watch found on a heath implies a watchmaker because watches don't assemble themselves; living creatures are vastly more complex than watches; therefore a designer exists. 'Complex, functional order implies design.'"}, {"text": "The probability of random assembly of any complex structure approaches zero, therefore God must have intervened at the origin of life.", "isCorrect": false, "rationale": "While related to Paley's intuition, this is a probabilistic reformulation, not Paley's actual analogical argument as described in the text."}, {"text": "The diversity of species on Earth is too great to be explained by any single natural process, requiring divine guidance.", "isCorrect": false, "rationale": "Paley's argument centers on the complexity and functional fit of individual organisms, not on biodiversity or the plurality of species."}, {"text": "Mechanical processes can produce functional order given enough time, so a designer is unnecessary.", "isCorrect": false, "rationale": "This is Darwin's counter-argument, not Paley's argument. Paley's premise is that mechanical processes cannot produce the appearance of design."}], "id": "q01"}, {"question": "The text says Paley's argument 'fails not because it is badly reasoned.' Why does it fail?", "options": [{"text": "Because there is no empirical evidence that watches exist — the analogy is factually unsound.", "isCorrect": false, "rationale": "The text accepts the analogy as valid reasoning; its failure lies in the discovery of a mechanism that Paley couldn't have known about — not a flaw in the analogy itself."}, {"text": "Because functional complexity in living organisms is actually simpler than that in manufactured objects.", "isCorrect": false, "rationale": "The text acknowledges the opposite: organisms are 'vastly more complex, more intricately fitted' than any watch. The complexity premise is conceded, not denied."}, {"text": "Because natural selection — a process Paley had no access to — produces the appearance of design without requiring a designer.", "isCorrect": true, "rationale": "The text states: 'Paley was not a fool. His argument is tight. The reason it fails is not that it is badly reasoned; it fails because there is another process — one nobody had described yet — that produces exactly the appearance of design without requiring a designer.'"}, {"text": "Because the watchmaker analogy is a logical fallacy — comparing biological organisms to artificial objects.", "isCorrect": false, "rationale": "The text does not dismiss Paley's argument as fallacious in form; it accepts the reasoning as tight but describes it as defeated by empirical discovery of a better explanation."}], "id": "q02"}, {"question": "What does the text mean by calling Darwin's achievement 'Darwin's Great Inversion'?", "options": [{"text": "Darwin reversed the Linnaean taxonomy, reorganizing species classifications in the opposite order.", "isCorrect": false, "rationale": "The 'inversion' the text describes is philosophical, not taxonomic — it concerns the replacement of purposive with mechanical explanations."}, {"text": "Darwin replaced purposive explanations (design, intention) with a mechanical one (differential reproduction over time), showing that apparent purpose can arise without a purpose-holder.", "isCorrect": true, "rationale": "The text states: 'What Darwin had done to Paley is exactly what Torricelli had done to Aristotle: he replaced a purposive explanation (design, intention, intelligence) with a mechanical one (differential reproduction over geological time).'"}, {"text": "Darwin showed that organisms are more complex than previously thought, inverting earlier estimates of biological simplicity.", "isCorrect": false, "rationale": "The inversion is about the type of explanation used (purposive vs. mechanical), not about estimates of biological complexity."}, {"text": "Darwin inverted religious doctrine by demonstrating that species change over time rather than remaining fixed.", "isCorrect": false, "rationale": "While species change was religiously controversial, the text identifies the 'Great Inversion' specifically as the substitution of mechanical for purposive explanation, not the mere claim of species mutability."}], "id": "q03"}, {"question": "What is teleological language in biology, and why does the text say 'technically none of it is accurate'?", "options": [{"text": "Language that uses Latinate terminology instead of common words, making biology inaccessible to non-specialists.", "isCorrect": false, "rationale": "Teleological language is defined by attributing purpose and goals, not by vocabulary register or accessibility."}, {"text": "Language attributing purposes, goals, or intentions to organisms and processes that have no foresight or goal-directedness — shorthand for longer mechanistic explanations.", "isCorrect": true, "rationale": "The text defines teleology as 'the attribution of purpose, goal, or end-directedness to a process' and notes: 'Evolution has no purposes. Natural selection has no goals. White blood cells do not seek anything; they are proteins and lipids obeying chemical gradients.'"}, {"text": "Scientific language that accurately describes organisms by reference to their evolutionary history and ancestral forms.", "isCorrect": false, "rationale": "Teleological language refers to purposes and goals, not to evolutionary history. The text describes it as technically inaccurate shorthand for mechanistic description."}, {"text": "Language that systematically overestimates the intelligence of animal organisms.", "isCorrect": false, "rationale": "The issue is attributing goal-directedness to processes (not just animals), including white blood cells, the eye's evolution, and the peacock's tail — none of which involve intelligence per se."}], "id": "q04"}, {"question": "What is the Specimen classification for Natural Selection, and what does 'a differential equation disguised as a narrative' mean?", "options": [{"text": "Natural selection is classified as 'Biological mechanism / Explanation-fiction for functional design.' The phrase means that selection operates as a precise mathematical process (proportion of heritable variants changing in proportion to reproductive success) but is experienced and communicated as a story about organisms striving and competing.", "isCorrect": true, "rationale": "The Specimen box classifies it as 'Biological mechanism / Explanation-fiction for functional design' and states: 'What it actually is: A differential equation disguised as a narrative — the proportion of a heritable variant in a population changes over time in proportion to its effect on reproductive success. What it sounds like: Organisms striving, adapting, competing, trying to survive.'"}, {"text": "Natural selection is classified as 'Teleological fiction.' The phrase means Darwin wrote his theory in narrative form to make it accessible, even though it was originally expressed mathematically.", "isCorrect": false, "rationale": "The Specimen classification is 'Biological mechanism / Explanation-fiction for functional design,' not 'Teleological fiction.' And the narrative vs. equation contrast is about the mechanism's intrinsic nature, not Darwin's presentation choices."}, {"text": "Natural selection is a mathematical law that biologists convert into stories for pedagogical purposes, but the stories have no explanatory value.", "isCorrect": false, "rationale": "The text does not say the narrative has no explanatory value; it identifies the narrative as a useful but technically inaccurate rendering of the underlying mathematics."}, {"text": "Natural selection is classified as an 'Ideological anchor,' and the phrase means that population genetics equations are used to disguise ideological claims.", "isCorrect": false, "rationale": "'Ideological anchor' is the classification for the invisible hand, not natural selection. The phrase concerns the gap between technical mathematical process and narrative presentation."}], "id": "q05"}, {"question": "What is Daniel Dennett's 'intentional stance,' and what does it reveal about useful fictions?", "options": [{"text": "The philosophical principle that all mental states are ultimately reducible to physical brain states.", "isCorrect": false, "rationale": "The intentional stance is a predictive strategy, not a position on mind-body reduction. Dennett's point is about when it is useful to attribute intentionality, not what intentionality fundamentally is."}, {"text": "The strategy of treating a system as if it had beliefs, desires, and goals because doing so lets you predict its behavior — a productive fiction that works without being literally true.", "isCorrect": true, "rationale": "The text states: 'Daniel Dennett coined the phrase the intentional stance for the strategy of treating a system as if it had beliefs, desires, and goals, because doing so lets you predict its behavior.' The chess example illustrates: we predict a computer's moves by asking what a rational player would do, not by tracing electrons."}, {"text": "The view that animals and humans share identical mental states because both evolved by natural selection.", "isCorrect": false, "rationale": "The intentional stance is a predictive methodology that can be applied to computers, thermostats, and other non-living systems, not a claim about shared animal-human mental states."}, {"text": "The scientific principle that experimental observers must acknowledge their own intentionality to avoid bias in observations.", "isCorrect": false, "rationale": "The intentional stance is about modeling external systems, not about managing observer bias in scientific methodology."}], "id": "q06"}, {"question": "According to the text, what are the real predictive achievements of the 'selfish gene' framework — what phenomena does it illuminate?", "options": [{"text": "The emergence of cooperative social institutions, democratic governance, and market economies.", "isCorrect": false, "rationale": "These are social-science phenomena; the selfish gene framework is biological. The text specifies predictions about altruism, parental investment, and parent-offspring conflicts."}, {"text": "It predicts altruism among genetic relatives, explains greater parental than sibling investment, and illuminates conflicts between parents, offspring, and different gene copies.", "isCorrect": true, "rationale": "The text states the framework 'predicts altruism among genetic relatives. It explains why parents invest more in offspring than in siblings. It illuminates conflicts between parent and offspring, between different copies of the same gene in different bodies, between genes and the organisms that carry them.'"}, {"text": "It explains how organisms develop immune responses to pathogens over a single lifetime.", "isCorrect": false, "rationale": "Immune response development within a lifetime is not addressed by the selfish gene framework, which operates at the population genetics level over evolutionary time."}, {"text": "It predicts which individual organisms will survive predation in any given ecosystem.", "isCorrect": false, "rationale": "The selfish gene framework does not predict individual survival outcomes; it models population-level frequency changes in heritable variants over generations."}], "id": "q07"}, {"question": "The text says Dawkins 'knew perfectly well that genes aren't selfish in any literal sense. He said so explicitly.' Why does the fiction persist despite this disclaimer?", "options": [{"text": "Because readers are unable to understand complex scientific disclaimers and default to literal interpretations.", "isCorrect": false, "rationale": "The text does not attribute persistence to reader incompetence; it identifies the phrase's power as coming from its analytical productivity — it generates accurate predictions."}, {"text": "Because the phrase is so vivid, narratively satisfying, and good at generating testable predictions that it dominates evolutionary thinking regardless of its literal falseness.", "isCorrect": true, "rationale": "The text states: 'the phrase the selfish gene is so vivid, so narratively satisfying, so good at generating testable predictions, that it has dominated evolutionary thinking for fifty years. This is the mark of a successful fiction: it is more useful than the accurate but cumbersome alternative.'"}, {"text": "Because scientists have since discovered that genes do possess a rudimentary form of self-interest at the molecular level.", "isCorrect": false, "rationale": "The text does not suggest any scientific revision of Dawkins' disclaimer; genes remain, in the text's view, sequences of nucleotides with no preferences or desires."}, {"text": "Because Dawkins regretted the disclaimer and removed it from later editions.", "isCorrect": false, "rationale": "The text does not mention any such revision; it accepts that the disclaimer stands and asks why the fiction persists despite it."}], "id": "q08"}, {"question": "A student reads about the selfish gene and concludes: 'This proves that all altruism is ultimately disguised selfishness and cooperation is impossible.' According to the text's analysis, what has this student done wrong?", "options": [{"text": "The student has correctly extended the selfish gene framework to its logical conclusion in human behavior.", "isCorrect": false, "rationale": "The text explicitly warns against this move: it is 'the dangerous slide from as if to actually,' taking the fiction literally in ways its inventor never intended."}, {"text": "The student has confused Dawkins' framework with Spencer's social Darwinism, an unrelated theory.", "isCorrect": false, "rationale": "The text does not invoke Spencer in this section; the specific error described is the literal misreading of the selfish gene metaphor — mistaking the map for the territory."}, {"text": "The student has taken the 'as if' fiction literally, arriving somewhere Dawkins never intended — missing that the territory contains enormous cooperation and mutualism that the framework can't explain if taken too literally.", "isCorrect": true, "rationale": "The text states: 'When people forget that [genes aren't literally selfish] and start believing that selfishness is the fundamental fact of nature… they have taken the fiction literally and arrived somewhere its inventor never intended. The map has been mistaken for the territory… the territory, it turns out, contains an enormous amount of cooperation, mutualism, and behavior that the selfish-gene framework, taken too literally, cannot explain.'"}, {"text": "The student has overgeneralized from a biological to a social context, which is a valid move if stated cautiously.", "isCorrect": false, "rationale": "The text's critique is not about cross-domain application per se, but about mistaking the fiction for literal truth within any domain — the 'as if' to 'actually' slide."}], "id": "q09"}, {"question": "What parallel does the text draw between Darwin's relationship to Paley and Torricelli's relationship to Aristotle?", "options": [{"text": "Both pairs show how later scientists used their predecessors' data to reach opposite conclusions.", "isCorrect": false, "rationale": "The parallel is not about data re-use; it is about the type of explanation each replaced — purposive explanations replaced by mechanical ones."}, {"text": "Both cases are instances where a purposive explanation (design/Aristotle's teleology) was replaced by a mechanical one (differential reproduction/atmospheric pressure), eliminating the need to posit intentional forces.", "isCorrect": true, "rationale": "The text states: 'What Darwin had done to Paley is exactly what Torricelli had done to Aristotle: he replaced a purposive explanation (design, intention, intelligence) with a mechanical one (differential reproduction over geological time).'"}, {"text": "Both pairs show that scientific progress requires rejecting all metaphors, replacing them with purely mathematical descriptions.", "isCorrect": false, "rationale": "The text does not argue for eliminating metaphors; it argues for understanding them as metaphors. The parallel is about the type of causal explanation, not about metaphor use."}, {"text": "Both pairs demonstrate that religious arguments eventually yield to empirical observation in all fields of inquiry.", "isCorrect": false, "rationale": "The Torricelli-Aristotle parallel concerns natural philosophy, not religion specifically, and the text's point is about purposive vs. mechanical explanation, not religion vs. science."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
