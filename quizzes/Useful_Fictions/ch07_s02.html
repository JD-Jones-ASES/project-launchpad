<body>
<div class="quiz-container">

        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; The Periodic Table and Other Beautiful Lies</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What was the most remarkable predictive feature of Mendeleev's 1869 periodic table?", "options": [{"text": "It correctly listed all sixty-three known elements in alphabetical order, making them easier to memorize.", "isCorrect": false, "rationale": "Mendeleev arranged elements by atomic weight and recurring properties, not alphabetically. The text emphasizes predictive power as the remarkable feature, not organizational convenience."}, {"text": "It predicted the existence, atomic weight, and chemical properties of three undiscovered elements — gallium, scandium, and germanium — which were subsequently confirmed.", "isCorrect": true, "rationale": "The text states Mendeleev left gaps for undiscovered elements and predicted their properties. Within fifteen years, gallium (1875), scandium (1879), and germanium (1886) were found with properties matching his predictions."}, {"text": "It immediately provided the theoretical explanation for why element properties recur periodically.", "isCorrect": false, "rationale": "Mendeleev's table preceded its theoretical justification. The quantum mechanical explanation of electron shell configurations came in the early twentieth century, decades after his 1869 paper."}, {"text": "It correctly resolved the ordering anomalies of cobalt/nickel and tellurium/iodine using atomic weights.", "isCorrect": false, "rationale": "The text notes these were anomalies in Mendeleev's original weight-based table. They were resolved by Moseley's 1913 discovery that atomic number, not weight, is the correct organizing principle."}], "id": "q01"}, {"question": "Why does the text describe the periodic table as 'a good map drawn before the territory had been fully surveyed'?", "options": [{"text": "Mendeleev's table was geographically organized by the countries in which each element was discovered.", "isCorrect": false, "rationale": "The text does not organize the periodic table by geography. The 'map' metaphor refers to the table as a representation of chemical structure, not physical location."}, {"text": "The table correctly organized elements and revealed gaps corresponding to real undiscovered elements, even though the quantum mechanical theory explaining why it worked came later.", "isCorrect": true, "rationale": "The text states the table was 'right before its theoretical justification had been found' — it mapped structural reality correctly (the gaps were real) even though the quantum explanation of electron shells arrived decades later."}, {"text": "Mendeleev drew the table as a literal map, with elements plotted by their geographic distribution in the earth's crust.", "isCorrect": false, "rationale": "The 'map' in the text is a metaphor for a representation. Mendeleev organized elements by atomic weight and periodic properties, not geography."}, {"text": "Early versions of the table were incomplete because Mendeleev had surveyed only Russian chemical samples.", "isCorrect": false, "rationale": "The text does not limit Mendeleev's work to Russian samples. He worked with sixty-three elements known globally at the time and left gaps for predicted, not yet found, elements."}], "id": "q02"}, {"question": "Henry Moseley's 1913 discovery corrected anomalies in Mendeleev's original table. What was the correction?", "options": [{"text": "Moseley replaced element names with numerical codes to eliminate linguistic confusion.", "isCorrect": false, "rationale": "Moseley's contribution was identifying atomic number as the correct organizing principle via X-ray frequency analysis, not renaming elements."}, {"text": "Moseley showed that atomic number, not atomic weight, is the correct organizing principle, resolving ordering anomalies such as cobalt/nickel and tellurium/iodine.", "isCorrect": true, "rationale": "The text states Moseley's discovery that characteristic X-ray frequency is a function of atomic number resolved the cobalt/nickel and tellurium/iodine ordering problems that appeared wrong when sorted by weight."}, {"text": "Moseley added a second dimension to the table to incorporate isotope data that Mendeleev had ignored.", "isCorrect": false, "rationale": "The text does not mention Moseley adding a second dimension. His contribution was establishing atomic number as the primary organizing principle."}, {"text": "Moseley proved that gallium, scandium, and germanium did not exist, disconfirming Mendeleev's predictions.", "isCorrect": false, "rationale": "The text states these three elements were discovered between 1875 and 1886 with properties matching Mendeleev's predictions — well before Moseley's 1913 work."}], "id": "q03"}, {"question": "The political 'left' and 'right' labels originated in the 1789 French National Assembly. According to the text, what is the most important limitation of the resulting left-right political spectrum?", "options": [{"text": "The labels are French in origin and therefore inapplicable outside France.", "isCorrect": false, "rationale": "The text notes that left and right 'spread through French political journalism and eventually became the master metaphor of Western political thought' — the argument is not about linguistic applicability but about the spectrum's dimensionality."}, {"text": "The spectrum encodes a single dimension that implies positions can be ordered on a line, hides multi-dimensional political reality, and embeds a preference for moderation in its descriptive vocabulary.", "isCorrect": true, "rationale": "The text states political scientists have argued a single dimension is inadequate; the Nolan Chart adds a second dimension; researchers propose additional ones. The spectrum persists despite being 'almost certainly wrong as an empirical matter.'"}, {"text": "The spectrum was designed by conservatives to make radical positions appear extreme and therefore unelectable.", "isCorrect": false, "rationale": "The text traces the origin to an accidental seating arrangement, not a conservative design. The bias the text identifies is structural — the center is defined as moderate — not a deliberate political strategy."}, {"text": "Because the spectrum assigns every voter a precise numerical position, it fails to capture qualitative differences in political opinion.", "isCorrect": false, "rationale": "The text does not discuss numerical scoring. The limitation the text identifies is that the spectrum is a single-axis model that cannot capture multi-dimensional political variation."}], "id": "q04"}, {"question": "Maslow never drew the pyramid. What does the text identify as the key distortion introduced by the pyramid visualization?", "options": [{"text": "The pyramid incorrectly identified self-actualization as a lower-order need, when Maslow placed it at the base of human motivation.", "isCorrect": false, "rationale": "The text states the pyramid puts self-actualization at the top (highest level), not at the base. The distortion is about rigidity of the sequence, not the placement of any single level."}, {"text": "The pyramid implies a rigid, universal sequence of need satisfaction that Maslow's own writing explicitly rejected.", "isCorrect": true, "rationale": "The text states Maslow wrote that the hierarchy was flexible, that needs could be partially satisfied, that individuals differed, and that creative people could bypass lower needs. The pyramid's rigid visual form obscured all these qualifications."}, {"text": "The pyramid omitted two additional levels of human need that Maslow proposed in his 1943 paper.", "isCorrect": false, "rationale": "The text does not claim the pyramid omits Maslow's levels. The problem is the shape's rigidity and implied sequence, not the number of levels depicted."}, {"text": "The pyramid was drawn by Maslow's rivals to undermine his academic reputation.", "isCorrect": false, "rationale": "The text attributes the pyramid's creation to management consultants in the 1960s and 1970s who found it useful for motivating workers — not to rivals or critics of Maslow."}], "id": "q05"}, {"question": "The 2011 Tay and Diener study found that the hierarchical structure of Maslow's pyramid was not supported by data from 123 countries. Why does the text argue the pyramid persists despite this empirical failure?", "options": [{"text": "Researchers in those 123 countries used flawed measurement instruments that could not detect the hierarchy.", "isCorrect": false, "rationale": "The text does not question the study's methodology. It accepts the finding that the hierarchy was not observable and explains the pyramid's persistence on grounds of practical utility, not empirical doubt."}, {"text": "Because the pyramid is a beautiful organizing fiction that makes complex human motivation navigable, giving managers, therapists, and coaches a useful vocabulary even at the cost of misrepresenting the territory.", "isCorrect": true, "rationale": "The text asks 'why does the pyramid persist?' and answers: it is useful in the way a map is useful. It simplifies a complex territory into navigable form, and that utility sustains it even after empirical disconfirmation."}, {"text": "Tay and Diener's findings have been widely rejected by psychologists who believe cross-cultural data cannot test a Western theory.", "isCorrect": false, "rationale": "The text does not indicate rejection of the study. It presents the finding as a genuine empirical challenge that the pyramid's persistence must explain — and explains it through practical utility, not through doubts about the study."}, {"text": "The pyramid persists because it is legally required content in psychology and management education curricula.", "isCorrect": false, "rationale": "The text makes no mention of legal or regulatory requirements. It explains persistence through the pyramid's practical usefulness as an organizing framework."}], "id": "q06"}, {"question": "What test does the text propose for deciding whether a 'beautiful lie' — an organizing fiction — is worth keeping?", "options": [{"text": "Whether the fiction can be defended in peer-reviewed literature without modification.", "isCorrect": false, "rationale": "The text does not propose peer-review durability as the test. The Linnaean taxonomy, Maslow's pyramid, and the periodic table all have been modified, extended, or challenged, yet the test the text proposes is about correspondence to real structure."}, {"text": "Whether the fiction finds things that are really there — whether its organizing principle corresponds to real structure in the world.", "isCorrect": true, "rationale": "The text states explicitly: 'The test is not: is this map true? The test is: does this map find things that are really there?' Mendeleev's table works because periodicity is real; the Linnaean taxonomy works because it corresponds to phylogenetic structure."}, {"text": "Whether the fiction is simple enough to be taught in introductory courses without advanced prerequisites.", "isCorrect": false, "rationale": "Pedagogical accessibility is not the criterion the text proposes. The criterion is correspondence to real structure — a representation can be simple and still correspond accurately to reality, or complex and still fail to do so."}, {"text": "Whether the fiction was proposed by a credentialed scientist rather than a journalist or political figure.", "isCorrect": false, "rationale": "Credentials are not the test. Arno Peters was a historian, not a cartographer, and the text takes his political argument seriously regardless. The criterion is whether the organizing principle maps onto real structure."}], "id": "q07"}, {"question": "Why does the text call the Linnaean taxonomy a 'fiction in the precise sense of Chapter 7'?", "options": [{"text": "Because Linnaeus invented imaginary creatures and added them to Systema Naturae to fill gaps in the classification.", "isCorrect": false, "rationale": "The text does not claim Linnaeus invented fictional organisms. 'Fiction' in this context means an organizing scheme imposed on continuous reality, not an invented falsehood."}, {"text": "Because species boundaries are human administrative decisions imposed on evolutionary continua that do not naturally divide into neat discrete packages.", "isCorrect": true, "rationale": "The text states species 'hybridize, grade into each other, exist along evolutionary continua that the taxonomic grid is forced to slice at arbitrary points.' The boundary between species and subspecies is an administrative decision, not a natural fact."}, {"text": "Because Linnaeus's five-category system (kingdom, class, order, genus, species) was replaced entirely by cladistics and no longer has scientific value.", "isCorrect": false, "rationale": "The text explicitly states the Linnaean system 'is indispensable' and that without it you cannot communicate about organisms or study ecology, epidemiology, or evolutionary biology at scale."}, {"text": "Because Linnaeus deliberately misclassified some organisms to make the system publishable as a single volume.", "isCorrect": false, "rationale": "The text makes no such claim. The 'fiction' is structural — the imposition of discrete categories on continuous biological reality — not a deliberate distortion by Linnaeus."}], "id": "q08"}, {"question": "You are organizing a large dataset of consumer financial behaviors. Following the logic of this section, which approach is most likely to produce a representation that is predictively useful rather than just a convenient filing system?", "options": [{"text": "Categorize behaviors alphabetically so that any team member can locate a category quickly.", "isCorrect": false, "rationale": "Alphabetical organization is a filing system, not a representation that reveals structure. The text contrasts filing cabinets with representations that 'reveal what you do not yet know.'"}, {"text": "Use the largest number of categories possible to avoid omitting any behavioral variation.", "isCorrect": false, "rationale": "More categories do not create predictive power. Predictive representations reveal real structure in the data, which typically requires identifying the organizing principle that makes regularities visible, not exhaustive enumeration."}, {"text": "Identify an organizing principle — such as risk tolerance or liquidity preference — that reveals regularities and gaps corresponding to real structure in consumer behavior.", "isCorrect": true, "rationale": "The text argues a representation becomes predictive when its organizing principle corresponds to real structure in the phenomenon. Mendeleev's table worked because periodicity was real. A financial classification works when the organizing dimension maps onto genuine behavioral regularities."}, {"text": "Adopt the industry-standard classification scheme, since its familiarity reduces errors in cross-team communication.", "isCorrect": false, "rationale": "Familiarity and communication efficiency are not the criteria for predictive power. The text distinguishes between representations that merely organize what is known and those that reveal hidden structure."}], "id": "q09"}, {"question": "The left-right political spectrum 'encodes a political preference for moderation directly into the descriptive vocabulary.' What does the text mean by this?", "options": [{"text": "The spectrum forces all voters to register as either liberal or conservative, eliminating the possibility of moderate political identity.", "isCorrect": false, "rationale": "The spectrum does the opposite — it defines 'center' and 'moderate' as positions on the spectrum. The text's point is that labeling a position 'extreme' by definition of distance from center is a normative judgment embedded in what appears to be a neutral description."}, {"text": "The geometry of a line with two poles implies that positions distant from the center are more radical, building a normative preference for centrism into a supposedly descriptive framework.", "isCorrect": true, "rationale": "The text states the spectrum 'encodes a political preference for moderation directly into the descriptive vocabulary' by calling distance from center 'extremism.' A position is not extreme by virtue of being wrong; it is labeled extreme by being far from center — which is a value judgment disguised as a description."}, {"text": "The political center has always had more representatives in the French National Assembly than either wing.", "isCorrect": false, "rationale": "The text makes no claim about the numerical distribution of French representatives. The argument is semantic: the meaning of 'extreme' on a linear spectrum builds moderation-preference into the description."}, {"text": "Moderate politicians deliberately designed the spectrum's language to suppress radical candidates in elections.", "isCorrect": false, "rationale": "The text traces the bias to the geometry of the single-axis model, not to deliberate political manipulation. The encoding of moderation-preference is structural, not conspiratorial."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
