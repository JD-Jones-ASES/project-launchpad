<div class="quiz-container">

        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Rules Without Rulers</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Ludwig Wittgenstein published two major philosophical works representing sharply contrasting views. What was the central shift from his early to his late philosophy?", "options": [{"text": "From studying ethics to studying logic.", "isCorrect": false, "rationale": "Both phases concerned language and meaning. The shift was not from ethics to logic but from a logical-picture view of language to a practice-based, games view of language."}, {"text": "From the view that language mirrors the logical structure of the world to the view that meaning is produced by diverse human practices (language games), none reducible to a single underlying logic.", "isCorrect": true, "rationale": "The text states: the early Wittgenstein believed language was 'a picture of the world' with 'a logical form that mirrored the structure of the facts'; the later Wittgenstein saw instead 'an enormous variety of human practices, each with its own internal logic, none reducible to any other.'"}, {"text": "From supporting rule-based reasoning to advocating for intuition and emotion in philosophy.", "isCorrect": false, "rationale": "The later Wittgenstein did not reject rule-following; he reconceived what rules are. Language games are still rule-governed — the rules are just embedded in practices rather than logical structures."}, {"text": "From studying spoken language to studying written language and formal symbols.", "isCorrect": false, "rationale": "Neither the early nor the late Wittgenstein made this distinction. The shift was between a logical-picture theory and a practice-based theory of meaning."}], "id": "q01"}, {"question": "Wittgenstein challenged readers to find what all games have in common. His conclusion was that:", "options": [{"text": "All games share the essential features of winning, losing, rules, and entertainment.", "isCorrect": false, "rationale": "The text demonstrates that each of these proposed features fails for some games: ring-around-the-rosie has no winning; a child bouncing a ball alone is not competitive; a soldier's solitaire may not be entertaining."}, {"text": "Games are too diverse to be meaningfully classified together.", "isCorrect": false, "rationale": "Wittgenstein does not conclude that 'game' is meaningless or that the concept should be abandoned. He offers family resemblance as the positive account of how such concepts work."}, {"text": "There is no single property shared by all games — only a network of overlapping and criss-crossing similarities, like resemblances among family members.", "isCorrect": true, "rationale": "The text states: 'There is, Wittgenstein concludes, no property or set of properties shared by all and only games. What there is instead is a network of overlapping and criss-crossing similarities' — which he called family resemblance."}, {"text": "The definition of 'game' has been corrupted by modern usage and must be reformed.", "isCorrect": false, "rationale": "Wittgenstein's point is descriptive and philosophical, not prescriptive. He is not calling for language reform; he is describing how concepts actually work."}], "id": "q02"}, {"question": "Wittgenstein's concept of 'family resemblance' applies beyond the word 'game' to many philosophical concepts. Which statement best describes what family resemblance claims about concepts like art, justice, or knowledge?", "options": [{"text": "These concepts do have precise definitions, but those definitions are too complex for ordinary speakers to articulate.", "isCorrect": false, "rationale": "Family resemblance is explicitly a rejection of the search for necessary and sufficient conditions (definitions). The claim is not that the definition is complex but that it does not exist."}, {"text": "These concepts have no meaning and should be replaced by more scientifically rigorous terms.", "isCorrect": false, "rationale": "Wittgenstein is not an eliminativist about ordinary language. Family resemblance explains how these concepts work without definitions — their meaningfulness is not in doubt."}, {"text": "These concepts are held together by a web of overlapping similarities rather than by any single defining essence — they lack necessary and sufficient conditions for their application.", "isCorrect": true, "rationale": "The text defines family resemblance as 'the principle that many of our most important concepts do not have necessary and sufficient conditions for their application, but are held together by a web of overlapping similarities rather than a single defining essence.'"}, {"text": "These concepts are defined by majority vote among users — whatever most speakers agree on becomes the definition.", "isCorrect": false, "rationale": "Family resemblance is not a majority-vote theory. It describes the structure of how concepts apply, not a democratic decision procedure for meaning."}], "id": "q03"}, {"question": "Chomsky's sentence 'Colorless green ideas sleep furiously' is cited to illustrate what point about grammar?", "options": [{"text": "That grammaticality is culturally determined, varying from language to language.", "isCorrect": false, "rationale": "The text is making a point about the rule operating below conscious awareness, not about cultural variation. The point is that native speakers know the grammatical judgment without being able to explain it."}, {"text": "That native speakers can recognize grammatical well-formedness without being able to state the rules — demonstrating that the rule operates below the threshold of conscious awareness.", "isCorrect": true, "rationale": "The text states: 'A native English speaker knows immediately that… [the sentence] is grammatically correct and semantically absurd… they cannot usually say why they know these things. The rule is operating, but there is no legislator who wrote it, no enforcement agency that maintains it.' This demonstrates rules operating below conscious access."}, {"text": "That meaning requires both grammatical correctness and semantic coherence — neither alone is sufficient.", "isCorrect": false, "rationale": "While the sentence does illustrate a grammar/semantics distinction, the text cites it specifically to make the point about unconscious rule-following, not to establish a two-condition theory of meaning."}, {"text": "That artificial intelligence cannot generate grammatically valid sentences without semantic content.", "isCorrect": false, "rationale": "The text makes no reference to artificial intelligence. The sentence is a philosophical example about the nature of grammatical rules in human cognition."}], "id": "q04"}, {"question": "What are 'desire paths,' and what philosophical point does the text use them to illustrate?", "options": [{"text": "Desire paths are shortcuts that develop illegally when proper infrastructure is absent; they illustrate the failure of city planning.", "isCorrect": false, "rationale": "The text does not frame desire paths as illegal or as planning failures. It uses them positively to demonstrate how rules can precede rulers."}, {"text": "Desire paths are dirt trails worn into grass by accumulated pedestrian choices — they illustrate that rules can emerge from practice without being designed by any authority.", "isCorrect": true, "rationale": "The text says desire paths 'emerge from the accumulated choices of many individual walkers' and are 'a living demonstration of the game-theoretic point that rules can precede rulers. No one designed the desire path.'"}, {"text": "Desire paths are planned infrastructure elements that mimic organic patterns — they show that good design follows nature.", "isCorrect": false, "rationale": "Desire paths emerge without planning; they are not planned to mimic organic patterns. The text's point depends on their undesigned character."}, {"text": "Desire paths show that individual preferences are always more rational than collective planning.", "isCorrect": false, "rationale": "The text draws no such general conclusion about rationality. It uses desire paths specifically to illustrate how rules can emerge from aggregated practice before any formal rule is written."}], "id": "q05"}, {"question": "The text cites English common law as 'perhaps the most sophisticated example' of the principle that games create rules. What makes English common law a good illustration of this principle?", "options": [{"text": "Common law is based on a comprehensive written code enacted by Parliament before any cases were decided.", "isCorrect": false, "rationale": "This describes civil law systems, not common law. Common law is explicitly built from court decisions, not from prior legislative codes — which is why it illustrates the text's point."}, {"text": "Common law is built from accumulated court decisions rather than legislative pronouncements — the rule is extracted from the pattern of cases rather than applied to them.", "isCorrect": true, "rationale": "The text states: 'English common law is perhaps the most sophisticated example… It is a legal system built almost entirely from the accumulated decisions of courts rather than from legislative pronouncements, in which the rule is extracted from the pattern of cases rather than applied to them.'"}, {"text": "Common law grants judges unlimited discretion to decide cases however they choose, with no binding rules.", "isCorrect": false, "rationale": "Common law is rule-governed — the rules are just derived from practice. Prior decisions bind future courts (stare decisis). This is the opposite of unlimited discretion."}, {"text": "Common law was designed by philosophers following Wittgenstein's principles of family resemblance.", "isCorrect": false, "rationale": "Common law predates Wittgenstein by centuries. The text uses it as a historical illustration of Wittgenstein's philosophical point, not as an application of his theory."}], "id": "q06"}, {"question": "Wittgenstein's answer to the chicken-and-egg paradox of rules and games is: 'following a rule is a practice.' What does this mean for the relationship between rules and the practices they govern?", "options": [{"text": "Rules are logically prior to practices — you must know the rule before you can participate.", "isCorrect": false, "rationale": "This is the view Wittgenstein rejects. His answer says rules and practices are not two separate things where one grounds the other — the rule just is the pattern of the practice described abstractly."}, {"text": "The rule and the practice are not two separate things — the rule is the pattern of the practice described at a certain level of abstraction, and neither can be separated from the other.", "isCorrect": true, "rationale": "The text states: 'The rule and the practice are not two separate things, one of which grounds the other. The rule just is the pattern of the practice, described at a certain level of abstraction.'"}, {"text": "Practices are subordinate to rules — changing a practice requires first changing the rule that governs it.", "isCorrect": false, "rationale": "The text argues the opposite: to change the rules of a game, you have to change the practice. 'Once enough people are doing something different, the new rules will write themselves.'"}, {"text": "Rules and practices are completely unrelated — rules are logical abstractions that float free of any particular behavior.", "isCorrect": false, "rationale": "This view is directly contradicted by Wittgenstein's position, which ties rules entirely to practices. A rule that no one follows is not a rule in any meaningful sense."}], "id": "q07"}, {"question": "The text argues that legislating against racism does not change racist practice, but that 'changing racist practice… eventually changes the law.' What is the practical implication of this claim?", "options": [{"text": "Law is ineffective at producing social change and should be abandoned as a tool for reform.", "isCorrect": false, "rationale": "The text does not advocate abandoning law. It argues that the causal direction matters — changing practice changes law, and changing law alone does not change practice. Law is one tool among others, and its effectiveness depends on accompanying practical change."}, {"text": "To change the rules of a social game, you must change what people actually do — change the practice. Once enough people do something differently, the new rules will write themselves.", "isCorrect": true, "rationale": "The text states: 'The game does not change when you rewrite the rulebook. The game changes when the players play differently. The rulebook follows.' This is the practical corollary of Wittgenstein's insight."}, {"text": "Social change always originates in elite opinion and filters down to practice through imitation.", "isCorrect": false, "rationale": "The text makes no claim about elites or top-down diffusion. Its argument is about the relationship between rules and practice, not about where in society change originates."}, {"text": "Moral progress is impossible because practices always reassert themselves against legal change.", "isCorrect": false, "rationale": "The text is not pessimistic about change — it describes change as 'more hopeful and more difficult than it sounds.' The point is about where to direct effort, not about whether progress is possible."}], "id": "q08"}, {"question": "The text describes 'deep grammar' as distinct from prescriptive grammar. What is the key difference?", "options": [{"text": "Prescriptive grammar covers all of a language's actual rules; deep grammar is a simplified set taught in schools.", "isCorrect": false, "rationale": "This reverses the relationship. Deep grammar is the full structural system; prescriptive grammar is the artificially simplified set of rules from English class."}, {"text": "Deep grammar consists of the structural rules that allow native speakers to generate and recognize well-formed sentences without being able to state those rules; prescriptive grammar is the set of rules explicitly taught.", "isCorrect": true, "rationale": "The text defines deep grammar as the rules 'that allow native speakers to generate and recognize well-formed sentences without being able to state those rules — operates entirely below the threshold of conscious awareness,' contrasting it with the rules from English class."}, {"text": "Deep grammar is the grammar of ancient or classical languages; prescriptive grammar is the grammar of modern languages.", "isCorrect": false, "rationale": "The distinction is between conscious, taught rules and unconsciously operating structural rules — it has nothing to do with language age."}, {"text": "Deep grammar changes rapidly over time; prescriptive grammar changes slowly.", "isCorrect": false, "rationale": "The text does not make this claim. The point is about conscious vs. unconscious access to rules, not about rates of change."}], "id": "q09"}, {"question": "A city government decides to outlaw a slang term it considers disrespectful. According to the Wittgensteinian framework in this section, what is the most likely outcome and why?", "options": [{"text": "The ban will succeed because legal sanctions provide the enforcement mechanism that informal rules lack.", "isCorrect": false, "rationale": "The text argues that language evolves from practice, and 'grammarians who try to arrest the evolution always fail.' Legal prohibition of language use typically produces the opposite effect or drives usage underground."}, {"text": "The ban will fail because language rules emerge from practice, not from legislative pronouncement — changing the words people use requires changing what the community does, not passing a law.", "isCorrect": true, "rationale": "The text states: 'Languages evolve before grammarians codify them; grammarians who try to arrest the evolution always fail.' The Wittgensteinian point is that the rule is what the practice is — you cannot change linguistic practice by rewriting the rulebook."}, {"text": "The ban will succeed because governments have historically shown effectiveness in shaping vocabulary.", "isCorrect": false, "rationale": "The text implicitly contradicts this — it notes that grammarians trying to arrest language evolution 'always fail,' and aligns legal language reform with the general claim that rules follow practice."}, {"text": "The outcome is unpredictable because language change depends on charismatic individuals rather than collective practice.", "isCorrect": false, "rationale": "The text frames language change as emerging from 'aggregated preferences' and collective practice, not from charismatic individuals. Desire paths and language evolution are both given as examples of emergent collective patterns."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
