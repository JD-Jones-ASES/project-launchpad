    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

<script>
var QUESTIONS = [{"question": "Simon Kuznets delivered his report introducing GNP in 1934. What warning did he explicitly include, and what happened to it?", "options": [{"text": "He warned that GNP would eventually be replaced by GDP, and Congress adopted GDP in 1991 as he predicted.", "isCorrect": false, "rationale": "Kuznets did not predict the GNP-to-GDP transition; his warning was specifically about mistaking the aggregate for a measure of national welfare, not about future terminological changes."}, {"text": "He warned that GNP excluded welfare-relevant dimensions like unpaid labor and environmental costs, and that the aggregate should not be mistaken for national welfare — a warning Congress completely ignored.", "isCorrect": true, "rationale": "The text states Kuznets explicitly warned 'the welfare of a nation can scarcely be inferred from a measurement of national income' and lists what GDP excludes (unpaid labor, environmental degradation, etc.). The text then notes: 'Status of warning: Completely ignored.'"}, {"text": "He warned that the Roosevelt administration would misuse the data politically, and Congress imposed neutrality requirements on future statistics agencies.", "isCorrect": false, "rationale": "The text describes Kuznets's warning as substantive (about what GDP measures and misses), not political; Congress did not impose neutrality requirements as a response."}, {"text": "He warned that GNP calculations were too complex to be reliable, and Congress therefore funded a permanent bureau of economists to validate the figures.", "isCorrect": false, "rationale": "The text does not mention concerns about GNP's computational reliability; Kuznets's warning was conceptual — about the mismatch between the aggregate and welfare."}], "id": "q01"}, {"question": "Which of the following is the correct statement of Goodhart's Law?", "options": [{"text": "The more complex a social system, the more likely any single metric will fail to capture its essential features.", "isCorrect": false, "rationale": "This paraphrases a general observation about complexity but is not Goodhart's Law. Goodhart's Law specifically concerns the effect of making a measure a target."}, {"text": "When a measure becomes a target, it ceases to be a good measure.", "isCorrect": true, "rationale": "This is the text's verbatim formulation of Goodhart's Law, attributed to economist Charles Goodhart, and presented as 'one of the most reliably confirmed generalizations in social science.'"}, {"text": "The more any quantitative social indicator is used for decision-making, the more apt it is to distort the social processes it monitors.", "isCorrect": false, "rationale": "This is Campbell's Law as stated by Donald Campbell, not Goodhart's Law. The text distinguishes between the two, presenting Campbell's as the broader formulation and Goodhart's as the more concise version."}, {"text": "Statistical tools designed for populations cannot validly describe any individual within those populations.", "isCorrect": false, "rationale": "This describes the population-to-individual appropriation problem discussed for BMI and IQ, but is not Goodhart's Law."}], "id": "q02"}, {"question": "A car accident increases GDP. According to the text, this illustrates which of GDP's structural problems?", "options": [{"text": "GDP double-counts transactions, inflating the apparent size of the economy.", "isCorrect": false, "rationale": "Double-counting is a technical accounting problem, not what the car-accident example illustrates; the example shows that GDP counts harm-generated economic activity positively."}, {"text": "GDP treats all economic transactions positively, including those generated by harm, cleanup, and disaster, making it a flawed measure of welfare.", "isCorrect": true, "rationale": "The text explicitly says: 'It treated a car accident as good for the economy, because hospitals and body shops were paid.' This is among the perverse incentives listed in the Specimen box: 'Natural disasters, divorces, and car accidents all increase GDP.'"}, {"text": "GDP was not designed to measure short-term fluctuations and performs poorly when accidents create sudden demand spikes.", "isCorrect": false, "rationale": "The problem with car accidents in GDP is conceptual (they increase a welfare measure despite being bad), not a temporal measurement issue."}, {"text": "GDP double-counts medical services because hospitals receive payment from both insurance companies and patients.", "isCorrect": false, "rationale": "The text does not raise double-counting as the relevant issue; the point is that socially negative events register as economically positive."}], "id": "q03"}, {"question": "Alfred Binet developed the first intelligence test in 1905 for a specific, limited purpose. What was it, and how was it later misappropriated?", "options": [{"text": "Binet designed it to rank all French children by intellectual merit for university placement; later reformers repurposed it to identify learning disabilities.", "isCorrect": false, "rationale": "The sequence is inverted; Binet designed the test to identify children needing extra educational support (not for ranking), and later applications extended it toward claims about innate, heritable intelligence."}, {"text": "Binet designed it as a practical screening tool to identify children needing extra educational support; it was later reinterpreted as measuring fixed, innate, heritable intelligence.", "isCorrect": true, "rationale": "The text states the test was 'explicitly designed to be a practical screening tool, not a measure of fixed, innate intelligence.' Binet warned against interpreting scores as measuring inborn ability; Terman and Goddard later used it to claim fixed racial differences in intelligence."}, {"text": "Binet designed it to measure adult cognitive decline; it was later modified by Terman for use with children in schools.", "isCorrect": false, "rationale": "Binet's 1904 commission was from the Paris school system, specifically for identifying children needing support — it was already a child-focused educational tool."}, {"text": "Binet designed it to measure linguistic competence in French; it was later adapted to measure general reasoning in all languages.", "isCorrect": false, "rationale": "The text does not describe the test as specifically measuring linguistic competence; its original purpose was identifying educational support needs, and its misappropriation was about fixed intelligence claims, not linguistic expansion."}], "id": "q04"}, {"question": "The Flynn effect 'compounds the absurdity' of IQ as a fixed measure. What is the Flynn effect?", "options": [{"text": "The tendency for IQ tests to measure cultural knowledge rather than abstract reasoning, producing scores that vary by nationality.", "isCorrect": false, "rationale": "Cultural bias is a separate critique of IQ tests; the Flynn effect is specifically about rising scores over time requiring re-norming."}, {"text": "Average IQ scores rise by roughly three points per decade, requiring periodic re-norming, meaning a given score in one era means something different than the same score decades later.", "isCorrect": true, "rationale": "The text states: 'average IQ scores rise by roughly three points per decade, requiring periodic re-norming of tests. The score is therefore not a measure of a stable attribute but a position on a shifting scale.'"}, {"text": "IQ scores are systematically higher for people tested in the morning than in the afternoon, introducing a time-of-day bias.", "isCorrect": false, "rationale": "The text does not mention time-of-day bias; the Flynn effect is a secular trend across decades, not a within-day variation."}, {"text": "As populations become more educated, IQ tests must be made harder every decade to maintain their discriminatory power.", "isCorrect": false, "rationale": "This inverts the causal direction; the Flynn effect describes score increases on existing tests, which is addressed by re-norming the tests — not by making them harder."}], "id": "q05"}, {"question": "The body mass index was originally invented by Adolphe Quetelet in 1832 for a specific purpose. What was it, and why is its current clinical use problematic?", "options": [{"text": "Quetelet invented BMI to diagnose obesity in individual patients; it became problematic when epidemiologists began using it for population-level research instead.", "isCorrect": false, "rationale": "The text inverts this: Quetelet designed it for population-level statistical description; the problem is its subsequent misuse for individual clinical diagnosis."}, {"text": "Quetelet invented the index to describe statistical distributions of physical characteristics in large populations; clinical use is problematic because it misapplies a population tool to individual diagnosis.", "isCorrect": true, "rationale": "The text states Quetelet designed the index 'to describe the statistical distribution of physical characteristics in large populations' and identifies the 'fundamental' problem as: 'Quetelet designed it to describe the average of a large population, not to diagnose the health status of any particular person within it.'"}, {"text": "Quetelet invented BMI to track soldier fitness in the Belgian army; clinical use is problematic because it was calibrated on physically exceptional military populations.", "isCorrect": false, "rationale": "The text says Quetelet's goal was understanding population distributions, not soldier fitness; the miscalibration noted is about European-ancestry populations, not military ones."}, {"text": "Quetelet invented BMI as part of a eugenics program; its continued clinical use perpetuates that program's discriminatory goals.", "isCorrect": false, "rationale": "While Quetelet was influenced by ideas about the 'average man,' the text's critique of BMI focuses on its measurement properties (population vs. individual, muscle vs. fat, ethnic calibration), not a eugenics legacy."}], "id": "q06"}, {"question": "The text describes a recurring pattern: 'a statistical tool is invented to describe populations, adopted as a proxy for an individual attribute, acquires legal and institutional force, and begins to shape the behavior it was supposed to describe.' What is this pattern's name?", "options": [{"text": "The Flynn effect", "isCorrect": false, "rationale": "The Flynn effect is the secular rise in average IQ scores — a specific empirical trend, not the general pattern of proxies acquiring institutional force and shaping behavior."}, {"text": "Goodhart's Law", "isCorrect": true, "rationale": "The text concludes the 'Think About It' box: 'This pattern has a name: Goodhart's Law.' The full pattern described — proxy adopted, proxy becomes target, proxy becomes detached from original attribute while retaining institutional authority — is the text's illustration of Goodhart's Law in action."}, {"text": "Campbell's Law", "isCorrect": false, "rationale": "Campbell's Law (the more a social indicator is used for decision-making, the more it distorts the processes it monitors) is a closely related concept cited earlier in the section, but the 'Think About It' box specifically labels this pattern 'Goodhart's Law.'"}, {"text": "The double coincidence of wants", "isCorrect": false, "rationale": "The double coincidence of wants is the barter coordination problem from section 1; it has no relation to the proxy-to-target corruption pattern described here."}], "id": "q07"}, {"question": "The FICO credit score can cause a recent immigrant to have a low score even if they have never defaulted on a debt. The text identifies this as an example of which conceptual problem?", "options": [{"text": "Goodhart's Law — the score became a target that people optimize, so recent immigrants who cannot optimize have low scores by design.", "isCorrect": false, "rationale": "The immigrant problem is not about gaming the score; the person simply lacks data. The text identifies this as the score creating the attribute it was supposed to describe, not as Goodhart's Law corruption."}, {"text": "The score that was meant to measure pre-existing trustworthiness instead creates trustworthiness — because a person with no credit history is excluded from the systems that generate the signals the score needs.", "isCorrect": true, "rationale": "The text states: 'The score, which was supposed to describe a pre-existing attribute, creates the attribute by excluding people from the systems that generate the signals it needs.' A recent immigrant has low credit not for untrustworthiness but for lack of measurement data."}, {"text": "The BMI appropriation error — the score was calibrated on a specific population (long-term U.S. residents) and performs differently across groups.", "isCorrect": false, "rationale": "While both problems involve miscalibration across groups, the text's specific argument about the credit score is about the score creating the attribute, not about cross-group calibration failure."}, {"text": "The Flynn effect — the meaning of a given score drifts over time because the reference population changes with immigration.", "isCorrect": false, "rationale": "The Flynn effect is about secular score inflation requiring re-norming; the text's credit score problem is about the measurement instrument generating (rather than measuring) the attribute."}], "id": "q08"}, {"question": "The text closes with an argument about 'measurement literacy.' What does measurement literacy require you to ask about any number that governs your life?", "options": [{"text": "Whether the number was published in a peer-reviewed journal, whether the sample size was sufficient, and whether the statistical method was appropriate.", "isCorrect": false, "rationale": "These are methodological questions important in research contexts, but the text's argument for measurement literacy is broader and more political, focusing on design intent, exclusions, power interests, and misclassification costs."}, {"text": "What was this designed to measure, who designed it and for what purpose, what does it exclude, who benefits from the current cutoffs, and who bears the cost of misclassification.", "isCorrect": true, "rationale": "The text explicitly lists this set of questions as the content of measurement literacy: 'what was this designed to measure? Who designed it and for what purpose? What does it exclude? Who benefits from the current cutoffs, and who bears the cost of misclassification?'"}, {"text": "Whether the number correlates with other validated measures of the same construct, and whether its predictive validity has been confirmed across diverse populations.", "isCorrect": false, "rationale": "Concurrent and predictive validity are psychometric concepts; while relevant, they are not what the text's argument for measurement literacy emphasizes. The text focuses on political and ethical questions about design and consequences."}, {"text": "Whether the number is being used by a public or private institution, since private institutions are less accountable for measurement errors.", "isCorrect": false, "rationale": "The text does not distinguish public from private institutional accountability; its measurement literacy framework applies across all institutional contexts."}], "id": "q09"}, {"question": "A school district ties teacher salary raises to standardized test scores, and within three years teachers are devoting most class time to test preparation rather than broader learning. The text's framework names this pattern. Which name is correct, and what does the example illustrate?", "options": [{"text": "The Flynn effect — rising scores indicate genuine improvement but require ever-harder tests to remain discriminating.", "isCorrect": false, "rationale": "The Flynn effect describes secular score inflation; this scenario shows behavior-shaping by a target metric, not general score drift."}, {"text": "Goodhart's Law — once test scores became salary targets, teachers optimized for scores rather than the learning the scores were meant to measure, detaching the proxy from the original attribute.", "isCorrect": true, "rationale": "The text defines this exact pattern: 'a proxy is useful; then, the proxy becomes a target; then, the proxy becomes detached from what it was meant to measure while retaining all of its institutional authority.' Teaching to the test is listed as one of the text's own examples."}, {"text": "Campbell's Law — scores are now used for high-stakes decisions (salary), so corruption pressures have increased, consistent with Campbell's formulation.", "isCorrect": false, "rationale": "Campbell's Law is related and applicable, but the text's 'Think About It' box specifically names 'Goodhart's Law' as the label for this pattern; Campbell's Law is the broader predecessor formulation introduced earlier."}, {"text": "The double coincidence of wants — teachers need higher salaries and principals need higher scores, but only the test provider benefits from both needs being simultaneously satisfied.", "isCorrect": false, "rationale": "The double coincidence of wants is a barter coordination concept from monetary theory; it does not describe the metric corruption dynamic in this scenario."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
