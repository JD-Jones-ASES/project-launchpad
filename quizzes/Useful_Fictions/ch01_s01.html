<body>
<div class="quiz-container">

        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; The Invention of Nothing</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the key distinction the text draws between a 'placeholder zero' and a 'numerical zero'?", "options": [{"text": "A placeholder zero can be used in arithmetic operations, while a numerical zero is purely a typographical mark.", "isCorrect": false, "rationale": "The text defines these in the opposite way: the placeholder zero is a typographical convenience that cannot be used in arithmetic, while the numerical zero is a mathematical entity with its own arithmetic properties."}, {"text": "A placeholder zero marks an empty positional column in a number, while a numerical zero is a number in its own right representing the quantity 'none.'", "isCorrect": true, "rationale": "The text explicitly states that a placeholder zero 'marks an empty position in a number' and that a numerical zero is 'a number in its own right, with its own arithmetic properties, representing the quantity none.'"}, {"text": "A placeholder zero was invented by the Indians, while a numerical zero was invented by the Babylonians.", "isCorrect": false, "rationale": "The text says the opposite: the Babylonians invented the placeholder zero, and India produced the numerical zero around the fifth century CE."}, {"text": "Both concepts are functionally identical; the distinction is purely terminological.", "isCorrect": false, "rationale": "The text stresses that the numerical zero was a conceptually radical innovation, calling it 'something far stranger' than the placeholder — the two are philosophically quite different."}], "id": "q01"}, {"question": "Why did Aristotle and the ancient Greeks largely reject the concept of zero, according to the text?", "options": [{"text": "They lacked the mathematical sophistication needed to work with positional number systems.", "isCorrect": false, "rationale": "The text identifies the Greeks as 'arguably the most philosophically ambitious people in the ancient world,' so the rejection was not a matter of mathematical sophistication."}, {"text": "They were prohibited by law from using non-Greek numeral systems.", "isCorrect": false, "rationale": "The text says nothing about any Greek law against foreign numerals; the Greek resistance was 'more philosophical than mathematical.'"}, {"text": "Their objections were more philosophical than mathematical — zero required treating absence as a thing, which conflicted with their worldview.", "isCorrect": true, "rationale": "The text states that 'The Greeks, arguably the most philosophically ambitious people in the ancient world, considered zero and largely decided they wanted nothing to do with it, for reasons that were more philosophical than mathematical.'"}, {"text": "They had their own symbol for zero that made the Indian innovation redundant.", "isCorrect": false, "rationale": "The text never states that the Greeks had any zero symbol; it says they wanted nothing to do with zero."}], "id": "q02"}, {"question": "Which of the following best explains why Brahmagupta's treatment of zero in 628 CE was a conceptual breakthrough, according to the text?", "options": [{"text": "He created the first positional notation system, making it possible to write large numbers efficiently.", "isCorrect": false, "rationale": "Positional notation already existed among the Babylonians long before Brahmagupta. His breakthrough was specifically about giving zero arithmetic rules, not creating positional notation."}, {"text": "He gave zero explicit arithmetic rules — defining how it behaves when added, subtracted, and multiplied — transforming it from a gap into a mathematical entity.", "isCorrect": true, "rationale": "The text says Brahmagupta's Brahmasphutasiddhanta 'gave zero arithmetic rules' and details these rules, describing them as 'definitions, the act of deciding that this new entity called sunya would behave in certain ways when combined with other numbers.'"}, {"text": "He proved that division by zero is undefined, resolving a controversy that had troubled earlier mathematicians.", "isCorrect": false, "rationale": "The text notes that Brahmagupta 'stumbled' on division by zero and attempted to define it incorrectly. His error on that point was not a breakthrough — it was 'simply wrong.'"}, {"text": "He invented the circular symbol '0' that is still used today.", "isCorrect": false, "rationale": "The text says the circular symbol '0' was 'standardized relatively recently' and that earlier forms included 'dots, gaps, and the Sanskrit symbol for sunya.' The breakthrough was about arithmetic rules, not the symbol."}], "id": "q03"}, {"question": "Florence banned Hindu-Arabic numerals, including zero, in 1299. What does the text identify as the motivations behind this ban?", "options": [{"text": "Fear of foreign cultural influence and a desire to protect the Roman numeral industry.", "isCorrect": false, "rationale": "The text does not mention any 'Roman numeral industry.' The stated motivations were fear of fraud and philosophical or theological discomfort."}, {"text": "Concerns about fraud (a zero could turn 3 into 30) and deeper philosophical discomfort about the ontological status of nothingness.", "isCorrect": true, "rationale": "The text says the ban 'was motivated partly by fear of fraud (the argument being that a zero could be added to a number to multiply it by ten), but it was also entangled with a broader discomfort about the philosophical status of nothingness.'"}, {"text": "A purely practical decision to standardize trade across Italian city-states using Roman numerals.", "isCorrect": false, "rationale": "The text explicitly says the ban was about more than practical standardization — it was 'entangled with a broader discomfort about the philosophical status of nothingness.'"}, {"text": "The Catholic Church formally condemned zero as heretical after Brahmagupta's work was translated into Latin.", "isCorrect": false, "rationale": "The text describes the Church's unease as theological anxiety, not a formal condemnation; and the ban was by civic authorities in Florence, not by the Church directly."}], "id": "q04"}, {"question": "The text traces the word 'zero' through several languages. Which sequence correctly reflects how the term traveled from Sanskrit to English?", "options": [{"text": "Sunya → sifr → zephirum → zefiro → zero", "isCorrect": true, "rationale": "The text traces this exact path: 'sunya (Sanskrit for empty or void)' → Arabic 'sifr' → medieval Latin 'zephirum' → Italian 'zefiro' → 'zero.'"}, {"text": "Sunya → cipher → naught → nil → zero", "isCorrect": false, "rationale": "These are all aliases for zero listed in the Specimen box, but they do not represent the historical linguistic chain the text describes."}, {"text": "Zephirum → sifr → sunya → zefiro → zero", "isCorrect": false, "rationale": "This reverses the direction of transmission. The concept traveled from India (Sanskrit) to the Arab world to medieval Latin to Italian, not the other way around."}, {"text": "Sunya → brahmagupta → al-khwarizmi → zephirum → zero", "isCorrect": false, "rationale": "Brahmagupta and Al-Khwarizmi are people, not words. The text traces the word itself: sunya → sifr → zephirum → zefiro → zero."}], "id": "q05"}, {"question": "What does the text mean when it says that inventing zero required 'a particular kind of philosophical courage'?", "options": [{"text": "Mathematicians had to risk their physical safety to introduce unpopular ideas.", "isCorrect": false, "rationale": "The text does not say invention of zero required physical bravery. The 'courage' is specifically intellectual — the willingness to make a conceptual commitment that defies intuition."}, {"text": "Mathematicians had to be willing to declare that absence itself is a kind of presence — that nothing can be treated as a thing with arithmetic properties.", "isCorrect": true, "rationale": "The text says zero 'asks you to treat the absence of a thing as a thing in itself — to point at emptiness and say, yes, that. I will give that a name and a symbol and a place in my arithmetic,' describing this as 'a small act of intellectual revolution.'"}, {"text": "The Church would punish anyone who questioned existing mathematical doctrines.", "isCorrect": false, "rationale": "While the text mentions Church unease, the 'philosophical courage' required preceded and transcended any threat of ecclesiastical punishment — it was about the conceptual act itself."}, {"text": "Most civilizations were prevented from discovering zero by a lack of advanced educational systems.", "isCorrect": false, "rationale": "The text explicitly says the barrier was not lack of education or intelligence — 'not because they were bad at math' — but because zero requires a counterintuitive conceptual move."}], "id": "q06"}, {"question": "Imagine a civilization that has a sophisticated positional numeral system — it can write 3, 30, and 300 — but uses only a blank space to mark empty columns, never developing zero as a standalone concept. Which of the following would most likely be impossible for that civilization?", "options": [{"text": "Tracking the movements of planets.", "isCorrect": false, "rationale": "The Babylonians, who had only a placeholder zero, are described by the text as being able to 'track the movements of planets' — so astronomical tracking does not require a numerical zero."}, {"text": "Developing algebraic expressions that involve the concept of a null quantity.", "isCorrect": true, "rationale": "The text says 'You can do algebra' only after deciding that nothing is a number. Algebra requires treating zero as an entity that can participate in equations — something impossible with only a blank-space placeholder."}, {"text": "Building elaborate accounting systems for commerce.", "isCorrect": false, "rationale": "The Babylonians had 'elaborate accounting systems' using only a placeholder zero — accounting does not require zero as a full numerical entity."}, {"text": "Dividing hours into equal sub-units.", "isCorrect": false, "rationale": "The Babylonians, who only had a placeholder, are credited in the text with dividing hours into 60 minutes. This requires only positional arithmetic, not a full numerical zero."}], "id": "q07"}, {"question": "Al-Khwarizmi is mentioned in the section on zero's journey to Europe. What two words in current use does the text trace to him?", "options": [{"text": "Zero and cipher.", "isCorrect": false, "rationale": "Zero and cipher derive from sifr and sunya — not from Al-Khwarizmi's name. The two words traced to Al-Khwarizmi himself are algorithm and algebra."}, {"text": "Algorithm and algebra.", "isCorrect": true, "rationale": "The text states that Al-Khwarizmi's 'name gave us the word algorithm and whose treatise on calculation gave us the word algebra.'"}, {"text": "Arithmetic and calculus.", "isCorrect": false, "rationale": "Neither arithmetic nor calculus is traced to Al-Khwarizmi in the text. Arithmetic is a much older term; calculus is associated with Newton and Leibniz."}, {"text": "Sifr and naught.", "isCorrect": false, "rationale": "Sifr is the Arabic word for zero, not a word derived from Al-Khwarizmi's name. Naught is listed as an alias for zero but is not linked to Al-Khwarizmi."}], "id": "q08"}, {"question": "A modern software engineer encounters a 'division by zero' error that crashes a program. According to the text's closing argument, what does this error illustrate on a deeper level?", "options": [{"text": "That ancient mathematicians were correct to resist the concept of zero as dangerous.", "isCorrect": false, "rationale": "The text does not endorse the ancient resistance to zero. It argues that zero was a necessary and revolutionary invention, even though some of its implications — like division by zero — remain problematic."}, {"text": "That the anxiety zero generates — a brief stare into the void — never entirely disappeared; it just moved from theology to philosophy to software.", "isCorrect": true, "rationale": "The text says the anxiety about zero 'migrated from theology to philosophy, and from philosophy to the anxiety we still feel, faintly, when a computer program crashes with a division by zero error and the machine seems to briefly stare into the void.'"}, {"text": "That modern mathematics has still not resolved the problem of zero that Brahmagupta left unsolved in 628 CE.", "isCorrect": false, "rationale": "The division-by-zero problem is well understood in modern mathematics (it is undefined). The text uses the software error as a cultural metaphor for lingering anxiety, not as evidence of an unresolved mathematical problem."}, {"text": "That software should be designed to use Roman numerals, which do not include zero.", "isCorrect": false, "rationale": "This is not an argument the text makes. In fact, the text humorously suggests that Roman numeral arithmetic is impractical ('Try doing long division in Roman numerals. Go ahead. We'll wait.')."}], "id": "q09"}, {"question": "The text says 'the entire edifice of modern quantitative civilization rests, at its base, on a fiction.' What is that fiction, and why does the text call it a fiction?", "options": [{"text": "The fiction that Roman numerals are inadequate, when in fact they could support modern mathematics if we tried harder.", "isCorrect": false, "rationale": "The text does not argue this. The 'fiction' is about zero, not about Roman numerals."}, {"text": "The fiction that the Babylonians invented zero, when in fact it was independently discovered by multiple civilizations simultaneously.", "isCorrect": false, "rationale": "The text attributes the numerical zero specifically to India (Brahmagupta) and does not claim it was independently invented elsewhere. This is not what is called a 'fiction.'"}, {"text": "The fiction that nothing is a number — calling it a fiction because zero is a human invention, a conceptual decision to treat absence as a mathematical entity rather than something found in nature.", "isCorrect": true, "rationale": "The text concludes: 'The entire edifice of modern quantitative civilization rests, at its base, on a fiction: the idea that nothing is a number.' It is a fiction because zero isn't found in nature — it 'isn't a number you find — it's a number you invent.'"}, {"text": "The fiction that the Catholic Church was hostile to zero, when in fact it embraced Hindu-Arabic numerals from the start.", "isCorrect": false, "rationale": "The text explicitly describes Church suspicion about zero's theological implications, so this would be a false claim. The 'fiction' referred to in the conclusion is about zero itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
