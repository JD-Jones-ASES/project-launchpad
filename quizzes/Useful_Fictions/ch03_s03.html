<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Emergence and the Zeitgeist</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The text opens with leafcutter ant colonies. What is the central explanatory puzzle they pose?", "options": [{"text": "How do insects develop specialized behaviors through individual learning and practice?", "isCorrect": false, "rationale": "The puzzle is not about individual learning but about collective intelligence emerging without any individual possessing that intelligence or directing the group."}, {"text": "How does a colony of roughly 250,000 ants — with no ant in charge, no supervisor, no dispatcher — maintain complex, adaptive, competently organized behavior?", "isCorrect": true, "rationale": "The text states: 'None of them is in charge. None of them knows what the colony needs. The queen is not an executive... Yet the colony maintains foraging trails, manages a fungal garden of exquisite complexity, regulates its own temperature...' The question posed is: 'where does the intelligence live?'"}, {"text": "How do ants communicate across distances greater than the individual ant's sensory range?", "isCorrect": false, "rationale": "While pheromone communication is mentioned, the central puzzle is about collective intelligence without any individual holding that intelligence — not the range of chemical signaling."}, {"text": "Why do ant colonies outperform human institutions in resource allocation despite lacking language?", "isCorrect": false, "rationale": "The text does note colonies are 'more competently run than most human institutions,' but the central puzzle is about the location of intelligence, not a comparative performance question."}], "id": "q01"}, {"question": "According to Deborah Gordon's research on harvester ants, how does the colony 'decide' to send out more foragers when some are removed?", "options": [{"text": "The queen releases a chemical command that triggers a colony-wide response to the missing workers.", "isCorrect": false, "rationale": "The text explicitly states the queen 'lays eggs and does nothing else' and is not an executive. The adjustment happens through a different mechanism involving returning forager rates."}, {"text": "A small group of scout ants counts the population deficit and dispatches replacement workers from a reserve.", "isCorrect": false, "rationale": "There is no such counting or dispatching role described. The adjustment emerges from local chemical signal changes, not any coordinating agent."}, {"text": "The changed rate of successful foragers returning alters the chemical signal at the nest entrance, triggering different behavioral responses in waiting ants — with no memo received by anyone.", "isCorrect": true, "rationale": "The text states: 'when she experimentally removed foragers, the colony adjusted by sending out more foragers — not because any ant received a memo, but because the returning rate of successful foragers changed the chemical signal in the nest entrance, which triggered different behavioral responses in ants waiting inside.'"}, {"text": "Individual ants spontaneously volunteer to fill the gap after noticing the reduced number of colleagues on foraging routes.", "isCorrect": false, "rationale": "No individual ant has a model of the colony or a count of missing workers. The adjustment is fully distributed through pheromone gradient changes, not individual noticing."}], "id": "q02"}, {"question": "How does the text define emergence?", "options": [{"text": "The gradual accumulation of new properties in a system as its components evolve over long timescales.", "isCorrect": false, "rationale": "Emergence as defined in the text is not about gradual evolution over time but about properties arising at the collective level that none of the individual components possess — a synchronic, not diachronic, phenomenon."}, {"text": "The phenomenon in which a system exhibits properties, behaviors, or capacities that none of its individual components possess.", "isCorrect": true, "rationale": "The text states: 'This is emergence: the phenomenon in which a system exhibits properties, behaviors, or capacities that none of its individual components possess. The colony is intelligent; no ant is. Wikipedia is accurate… no individual editor is infallible.'"}, {"text": "The appearance of new species through evolutionary branching from a common ancestor.", "isCorrect": false, "rationale": "Speciation is a separate biological concept. Emergence as defined here is a systems property — collective behavior exceeding the sum of individual parts — not a mechanism of species origin."}, {"text": "The process by which hidden coordinators direct large-scale social behavior without being publicly visible.", "isCorrect": false, "rationale": "This is precisely the temptation emergence creates — to find a hidden coordinator — but the text defines emergence as the absence of such a coordinator, not its hiddenness."}], "id": "q03"}, {"question": "E. O. Wilson called insect colonies 'superorganisms.' What does this term capture, and what is the philosophical vertigo it creates?", "options": [{"text": "It captures that colonies can grow indefinitely; the vertigo is about whether they pose ecological threats.", "isCorrect": false, "rationale": "The philosophical vertigo described concerns ontological and functional questions about agency and design, not ecological threats."}, {"text": "It captures that colonies display adaptation, homeostasis, and purposive behavior at the collective level; the vertigo is: at what point does 'as if designed' become 'functionally equivalent to designed'?", "isCorrect": true, "rationale": "The text states Wilson applied 'superorganism' to entities displaying 'adaptation, homeostasis, and purposive behavior that we normally attribute to individual organisms.' The vertigo: 'Can we say the same about the termite mound? About the ant colony? About the market? At what point does as if designed shade into functionally equivalent to designed?'"}, {"text": "It captures that insects cooperate socially like humans; the vertigo is whether insects have moral status.", "isCorrect": false, "rationale": "The philosophical vertigo is about design and functional equivalence, not about the moral status of insect consciousness."}, {"text": "It captures that colonies have a recognizable individual identity; the vertigo is determining which individual ant constitutes the 'true' organism.", "isCorrect": false, "rationale": "The vertigo concerns functional design at the collective level, not identifying a representative individual within the colony."}], "id": "q04"}, {"question": "Hegel described Napoleon as 'the World Spirit on horseback.' According to the text, what does this phrase represent philosophically?", "options": [{"text": "Hegel's admiration for Napoleon as an exemplary individual who shaped history through personal genius.", "isCorrect": false, "rationale": "The phrase means the opposite: Napoleon is not an autonomous agent but an unwitting instrument — 'not a man with a plan, but an unwitting instrument of History working through him.'"}, {"text": "Emergence promoted to metaphysics: the intelligence of the historical whole reified as a real force operating through individuals toward a predetermined goal.", "isCorrect": true, "rationale": "The text states: 'This is emergence promoted to metaphysics. The intelligence of the whole, instead of being acknowledged as an emergent fiction, is reified as a real force operating through individuals toward a predetermined goal.'"}, {"text": "A satirical observation that Napoleon confused his own ambitions with the will of history.", "isCorrect": false, "rationale": "The text presents this as Hegel's sincere philosophical position, not as satire directed at Napoleon's self-deception."}, {"text": "A metaphor for how military victories produce unintended political consequences.", "isCorrect": false, "rationale": "The unintended consequences reading misses the key move: Hegel was not just noting unintended consequences but arguing that those consequences were the unfolding of a rational historical principle."}], "id": "q05"}, {"question": "What is the Specimen classification for 'Emergence,' and what is 'the temptation it creates'?", "options": [{"text": "Classification: 'Biological mechanism.' Temptation: to reduce all complex systems to their simplest components.", "isCorrect": false, "rationale": "The Specimen box classifies emergence as 'Systems property / Fiction of distributed agency' and identifies the temptation as finding the hidden coordinator — the opposite of reductionism."}, {"text": "Classification: 'Systems property / Fiction of distributed agency.' Temptation: to find the hidden coordinator, the invisible hand, the emergent 'plan.'", "isCorrect": true, "rationale": "The Specimen box states: 'Classification: Systems property / Fiction of distributed agency' and 'The temptation it creates: To find the hidden coordinator, the invisible hand, the emergent plan.'"}, {"text": "Classification: 'Mathematical abstraction.' Temptation: to apply mathematical models from one system to non-analogous systems.", "isCorrect": false, "rationale": "Neither the classification nor the temptation matches what the Specimen box states."}, {"text": "Classification: 'Philosophical concept.' Temptation: to conclude that individual agency does not exist.", "isCorrect": false, "rationale": "This is not the classification or temptation given in the Specimen box."}], "id": "q06"}, {"question": "What does Conway's Game of Life demonstrate about emergence, according to the text?", "options": [{"text": "That artificial intelligence requires complex initial programming to produce intelligent-seeming behavior.", "isCorrect": false, "rationale": "Conway's Game of Life demonstrates the opposite: three extremely simple rules produce unlimited emergent complexity, showing that intelligence or computation does not require complex initial programming."}, {"text": "That emergence is what happens when simple local rules interact at scale — not a mystical property but a structural consequence of rule-governed interaction, capable of producing unlimited complexity.", "isCorrect": true, "rationale": "The text states: 'the lesson Conway's automaton offers is that emergence is not a mystical property of special systems; it is what happens when simple rules interact at scale.' Three rules on a grid can simulate a Turing machine — meaning unlimited emergent computational complexity with no designer or plan."}, {"text": "That computer simulations provide more reliable models of social behavior than empirical observation.", "isCorrect": false, "rationale": "The Game of Life is invoked as a philosophical demonstration, not as a methodological argument about social science research methods."}, {"text": "That Hegel's Weltgeist theory was correct but needed a mathematical formalization that Conway provided.", "isCorrect": false, "rationale": "The text uses Conway's Game of Life to argue against Hegel's mystification of emergence: the 'spirit' is the fiction; the intelligence is real but mechanistic."}], "id": "q07"}, {"question": "The text applies Conway's lesson to the Zeitgeist with the phrase: 'The intelligence is real; the spirit is the fiction.' What does this distinction mean?", "options": [{"text": "Historical periods do produce identifiable cultural patterns (real), but attributing those patterns to a metaphysical force with intentions and direction (spirit) is a reification of emergence.", "isCorrect": true, "rationale": "The text concludes: 'The ant colony is complicated Game of Life. The market is complicated Game of Life. The Zeitgeist is complicated Game of Life that someone decided to write a philosophy about. The intelligence is real; the spirit is the fiction.' The coordination exists; the purposive force directing it does not."}, {"text": "Intelligent individuals exist in history (real), but the Zeitgeist incorrectly treats their collective output as unimportant (fiction).", "isCorrect": false, "rationale": "This inverts the text's point. The text argues the collective output is real; the mystification is treating it as driven by a metaphysical spirit rather than arising from simple local interactions."}, {"text": "The spirit of any era is detectable through careful historical research (real), but Hegel's specific formulation was philosophically confused (fiction).", "isCorrect": false, "rationale": "The distinction is not between good and bad historical methodology but between acknowledging emergent intelligence (real) and reifying it as a metaphysical force (fiction)."}, {"text": "That Hegel was an intelligent philosopher (real) but his World Spirit concept was merely a literary device (fiction).", "isCorrect": false, "rationale": "The text's point is about the ontological status of emergent collective intelligence vs. the metaphysical Spirit, not about Hegel's personal intelligence."}], "id": "q08"}, {"question": "Why does the termite mound's thermoregulation create philosophical difficulty about attributing function and intention?", "options": [{"text": "Because it shows that termites are more intelligent than previously thought, requiring a revision of animal cognition models.", "isCorrect": false, "rationale": "The text's point is precisely the opposite: no termite designed or understands the mound's temperature regulation. The difficulty concerns the attribution of function without any knowing agent."}, {"text": "We readily say 'the heart pumps blood' (attributing function without intention) because natural selection designed it, but the termite mound has no such individual-level designer — raising questions about when function attribution is justified.", "isCorrect": true, "rationale": "The text poses: 'We have no trouble saying the heart pumps blood. We attribute function to the heart even though the heart has no intention of pumping anything. We do this because we know there is a designer — natural selection — that shaped the heart for its role. Can we say the same about the termite mound?' No termite and no individual-level selection designed the mound's architecture."}, {"text": "Because it demonstrates that termite mounds are not actually adaptive but merely appear to be from a human perspective.", "isCorrect": false, "rationale": "The text accepts that the mound is genuinely adaptive — 'the mound regulates its internal temperature within a narrow band.' The difficulty is philosophical, about attribution, not empirical, about whether the adaptation is real."}, {"text": "The thermostatic properties of termite mounds have been exaggerated by biologists, making them a poor example for any argument.", "isCorrect": false, "rationale": "The text presents the termite mound as a canonical example and makes no such methodological caveat about exaggeration."}], "id": "q09"}, {"question": "A manager discovers that his team consistently produces innovative solutions without any planning meeting or explicit coordination. He says: 'There must be an unspoken shared vision guiding them — a team spirit I can't quite see.' Based on this section, what cognitive error is he making?", "options": [{"text": "He is correctly identifying emergent collective intelligence and giving it an appropriate label.", "isCorrect": false, "rationale": "The collective intelligence is real, but the manager's explanation commits the error the text warns against: positing a hidden coordinator (a guiding 'spirit' or 'vision') rather than acknowledging that intelligent outcomes can emerge from simple local interactions without any unified plan."}, {"text": "He is committing the temptation emergence creates: finding a hidden coordinator — an emergent 'plan' — rather than recognizing that global order can arise from simple local interactions without any guiding entity.", "isCorrect": true, "rationale": "The Specimen box identifies 'The temptation it creates: To find the hidden coordinator, the invisible hand, the emergent plan.' The manager's 'team spirit I can't quite see' is precisely this move — reifying emergence as a hidden agent."}, {"text": "He is applying Hegel's Weltgeist framework correctly to organizational management.", "isCorrect": false, "rationale": "The text presents Hegel's Weltgeist as an example of the error, not a correct analytical tool. Invoking it correctly here would mean recognizing the same mistake."}, {"text": "He is confusing individual contributions with collective output, a basic attributional error.", "isCorrect": false, "rationale": "The manager is not confusing individual and collective; he is accurately noticing collective-level intelligence. His error is positing a hidden coordinator behind it rather than recognizing emergence from local interactions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
