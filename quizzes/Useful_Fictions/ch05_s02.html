    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The text argues that karma has a structural similarity to double-entry bookkeeping. What specifically is this structural parallel?", "options": [{"text": "Both systems were invented by merchants in ancient India and spread along trade routes.", "isCorrect": false, "rationale": "The text makes no claim about karma's commercial origins; the comparison is structural, not historical."}, {"text": "Every action generates two entries — the deed and its consequence — and the account must ultimately balance, with the universe as auditor.", "isCorrect": true, "rationale": "The text explicitly states karma is like double-entry bookkeeping because 'every action has two entries, the deed and its consequence, and the account must balance. The universe itself is the auditor.'"}, {"text": "Both require an institutional third party to validate each transaction and prevent fraud.", "isCorrect": false, "rationale": "Karma is self-administered by cosmic law, not by a human institution; the text's point is that the universe acts as auditor, not a human intermediary."}, {"text": "Both systems allow debts to be transferred between accounts through the purchase of certificates.", "isCorrect": false, "rationale": "The transferability of moral credit through certificates is a feature of the Catholic indulgence system, not karma. Karma accumulates personally and cannot be purchased or transferred in the same way."}], "id": "q01"}, {"question": "What was the 'Treasury of Merit' in medieval Catholic theology, and what role did it play in the indulgence system?", "options": [{"text": "A physical vault in the Vatican where gold coins donated by pilgrims were stored to fund charitable works.", "isCorrect": false, "rationale": "The Treasury of Merit was a theological concept about surplus spiritual merit, not a physical gold deposit. The money from indulgence sales funded construction and campaigns, but the Treasury itself was a moral, not monetary, entity."}, {"text": "A surplus of spiritual merit accumulated by Christ and the saints, administered by the Church, from which sinners could draw to reduce temporal punishment.", "isCorrect": true, "rationale": "The text states Christ and the saints accumulated 'a surplus of merit far beyond what was required for their own salvation' stored in the Treasury of Merit, which the Church administered; sinners could draw on it via indulgences."}, {"text": "A ledger maintained by parish priests recording the good deeds of each congregation member against their sins.", "isCorrect": false, "rationale": "Confession, penance, and parish records are distinct from the Treasury of Merit, which concerns the saints' surplus merit available for transfer — not a local ledger of individual behavior."}, {"text": "The doctrine that all suffering in purgatory could be eliminated if the entire Church prayed in unison.", "isCorrect": false, "rationale": "Collective prayer is not what the Treasury of Merit describes; it specifically concerns the transferable surplus merit of Christ and the saints administered by papal authority."}], "id": "q02"}, {"question": "What was the central insight of Martin Luther's Ninety-Five Theses regarding the indulgence system, as described in the text?", "options": [{"text": "He rejected the idea that moral life has a structure of accumulating virtue and sin.", "isCorrect": false, "rationale": "The text explicitly states Luther did not deny 'the underlying intuition that moral life has a structure that can be tracked, that virtue and sin accumulate.' He rejected the Church's institutional role, not the accounting metaphor itself."}, {"text": "He denied the Church held a transferable treasury of merit, that salvation could be bought, and that a papal certificate could substitute for genuine repentance.", "isCorrect": true, "rationale": "The text says Luther 'denied that the Church had a treasury of transferable merit to administer, denied that salvation could be purchased with money, and denied that a papal certificate could substitute for genuine repentance.'"}, {"text": "He argued that karma and Christian salvation were equivalent systems requiring the same kind of moral discipline.", "isCorrect": false, "rationale": "The text does not suggest Luther made any comparison to karma; his theses were specifically an internal Catholic theological critique."}, {"text": "He proposed replacing the felicific calculus with a purely theological measure of moral worth.", "isCorrect": false, "rationale": "Bentham's felicific calculus was formulated in 1789, over 270 years after Luther's 1517 theses; Luther could not have referenced it."}], "id": "q03"}, {"question": "The text notes that after Martin Luther's Reformation, the moral accounting intuition 'survived intact.' In what form did it persist?", "options": [{"text": "It was abandoned entirely in Protestant countries, which replaced moral arithmetic with purely faith-based salvation.", "isCorrect": false, "rationale": "The text says the moral accounting intuition survived the Reformation intact; it did not disappear in Protestant countries."}, {"text": "It migrated into secular frameworks under names like 'moral desert,' 'just deserts,' and in therapy culture as 'self-compassion as cancellation of unfair self-debt.'", "isCorrect": true, "rationale": "The Specimen box states: 'The moral accounting intuition survived the Reformation intact; it simply moved into secular frameworks where it continues to operate under names like moral desert, just deserts, and (in therapy culture) self-compassion as cancellation of unfair self-debt.'"}, {"text": "It was formalized by Jeremy Bentham into the felicific calculus, giving moral accounting a rigorous mathematical foundation.", "isCorrect": false, "rationale": "While the felicific calculus does represent a secular form of moral accounting, it is not what the Specimen box specifically identifies as the immediate successor to the indulgence system's moral accounting intuition."}, {"text": "It was absorbed entirely into commercial banking, where credit and debt replaced sin and virtue.", "isCorrect": false, "rationale": "The text traces the parallel between commercial and moral accounting, but the post-Reformation survival of moral accounting is specifically described as moving into secular moral frameworks, not banking."}], "id": "q04"}, {"question": "Jeremy Bentham's felicific calculus measured moral worth through which seven dimensions of pleasure and pain?", "options": [{"text": "Intensity, duration, certainty, propinquity, fecundity, purity, and extent.", "isCorrect": true, "rationale": "The text lists all seven: intensity, duration, certainty, propinquity (how soon), fecundity (tendency to produce more), purity (tendency not to produce the opposite), and extent (number of persons affected)."}, {"text": "Intensity, duration, frequency, reversibility, breadth, depth, and proximity.", "isCorrect": false, "rationale": "While some of these terms overlap conceptually, the text's list includes propinquity, fecundity, purity, and extent — not frequency, reversibility, breadth, or depth."}, {"text": "Pleasure, pain, virtue, sin, penance, reward, and duration.", "isCorrect": false, "rationale": "These are not Bentham's dimensions; the felicific calculus measures properties of pleasures and pains, not categories of moral acts."}, {"text": "Magnitude, likelihood, temporality, breadth, reversibility, purity, and social impact.", "isCorrect": false, "rationale": "These do not match the text's enumeration; the correct answer uses Bentham's own terminology, including the less obvious terms 'propinquity' and 'fecundity.'"}], "id": "q05"}, {"question": "What is the 'utilitarian monster' problem, and which of Bentham's premises does it expose?", "options": [{"text": "It refers to corporations that use utilitarian logic to justify externalities, revealing that the calculus cannot handle institutional actors.", "isCorrect": false, "rationale": "The utilitarian monster thought experiment concerns individuals, not corporations; it reveals a problem with interpersonal aggregation of pleasure and pain."}, {"text": "A large number of people gaining a small pleasure can outweigh one person's intense suffering — exposing the premise that pleasure and pain are summable across individuals.", "isCorrect": true, "rationale": "The text states: 'a sufficiently large number of people gaining a small pleasure can outweigh the intense suffering of a single person,' which is a problem because Bentham's calculus sums pleasure and pain across individuals as if they share a common unit."}, {"text": "Pleasure and pain cannot be reliably remembered, so any historical calculation of utility is unreliable.", "isCorrect": false, "rationale": "Memory reliability is not the utilitarian monster problem; the issue is whether pleasure and pain are commensurable across different people."}, {"text": "Actions with high fecundity (producing more pleasure) always dominate, creating a bias toward addictive behaviors.", "isCorrect": false, "rationale": "While fecundity is one of Bentham's dimensions, the utilitarian monster problem is specifically about interpersonal aggregation, not the fecundity dimension."}], "id": "q06"}, {"question": "What fundamental ontological problem did Bentham's felicific calculus face, according to the text?", "options": [{"text": "Pleasure and pain are not real experiences; they are subjective interpretations that cannot be meaningfully discussed.", "isCorrect": false, "rationale": "The text states 'Pain and pleasure are real experiences; there is no doubt about that.' The problem is not their reality but their measurability across different individuals."}, {"text": "Pain and pleasure cannot be summed across individuals because there is no common unit in which both are denominated — interpersonal comparison is unproven.", "isCorrect": true, "rationale": "The text states: 'You cannot add your pleasure to mine; there is no common unit in which both are denominated. When Bentham says that the greatest good for the greatest number requires summing pleasures across individuals, he is presupposing what he needs to prove.'"}, {"text": "Bentham lacked the computing power to perform the required calculations across large populations.", "isCorrect": false, "rationale": "The problem is philosophical, not computational; computing power is irrelevant to the question of whether pleasures across persons share a common unit."}, {"text": "His seven dimensions were too many to weigh simultaneously, making the calculus practically useless.", "isCorrect": false, "rationale": "Practical complexity is not the text's identified problem; the core issue is the ontological assumption of interpersonally comparable cardinal utility."}], "id": "q07"}, {"question": "The text states that utilitarian ethics 'migrated into economics.' What contemporary practice does it identify as Bentham's felicific calculus 'in a suit and tie'?", "options": [{"text": "The stock market's use of earnings per share as a standardized corporate value measure.", "isCorrect": false, "rationale": "EPS is an accounting metric for corporate performance; the text specifically identifies regulatory cost-benefit analysis, not stock market metrics, as utilitarian heritage."}, {"text": "The concept of GDP as a measure of national wellbeing.", "isCorrect": false, "rationale": "GDP is discussed in section 3 as a statistical fiction; the text here identifies the value of a statistical life in regulatory analysis as the direct utilitarian descendant."}, {"text": "The assignment of a monetary value to a statistical life in U.S. federal regulatory calculations.", "isCorrect": true, "rationale": "The text states: 'The contemporary practice of assigning a value of a statistical life — currently around $11 million in U.S. federal regulatory calculations — is Bentham's felicific calculus in a suit and tie.'"}, {"text": "Carbon credit pricing in the EU Emissions Trading System.", "isCorrect": false, "rationale": "Carbon credits are discussed in section 4; the direct utilitarian descendant identified in this section is the value of a statistical life in regulatory cost-benefit analysis."}], "id": "q08"}, {"question": "Johann Tetzel's jingle 'As soon as the coin in the coffer rings, the soul from purgatory springs' encapsulates a key feature of the medieval indulgence market. Which economic concept does this illustrate?", "options": [{"text": "The double coincidence of wants — both buyer and soul needed the same thing at the same time.", "isCorrect": false, "rationale": "The double coincidence of wants is an exchange-coordination concept from monetary theory; Tetzel's jingle illustrates a different mechanism."}, {"text": "The commodification of moral credit — salvation outcomes priced and sold in tiered denominations like commercial goods.", "isCorrect": true, "rationale": "By the late medieval period indulgences were sold for money 'in tiered denominations, with higher-grade certificates cancelling more punishment,' making moral debt a commodity with a price — precisely what Tetzel's sales pitch encoded."}, {"text": "The utilitarian monster problem — the Church's pleasure in donations outweighed the suffering of sinners in purgatory.", "isCorrect": false, "rationale": "The utilitarian monster concerns Bentham's calculus for aggregating pleasure and pain across individuals; Tetzel's jingle is about the commercial structure of indulgence sales."}, {"text": "The Flynn effect — successive generations needed ever-larger payments to achieve the same spiritual outcome.", "isCorrect": false, "rationale": "The Flynn effect is about rising IQ scores, introduced in section 3; it has no relevance to indulgence pricing."}], "id": "q09"}, {"question": "A company introduces a 'wellness credit' system where employees earn points for healthy behaviors (exercise, sleep) and lose points for unhealthy ones, which affect their health insurance premiums. Which concept from this section does this most directly illustrate?", "options": [{"text": "Fractional reserve banking, because the company is creating value (health credits) from a notional reserve.", "isCorrect": false, "rationale": "Fractional reserve banking is a monetary concept from section 1; it describes how banks create money through lending, not how behavioral metrics are assigned institutional force."}, {"text": "Karma, because the system tracks actions across a lifetime and balances the account at death.", "isCorrect": false, "rationale": "Karma operates across lifetimes with the universe as auditor; the wellness system is institutional, not cosmic, and does not operate across reincarnations."}, {"text": "The moral accounting impulse applied institutionally — behaviors assigned numerical values, accrued as credits and debits, with the ledger governing material outcomes.", "isCorrect": true, "rationale": "The text describes moral accounting as the consistent human impulse to 'track, tally, and balance accounts' of virtue and vice, giving them real consequences. A corporate wellness ledger that prices healthy behavior and charges premiums accordingly is a direct secular institutional expression of this impulse."}, {"text": "The indulgence system, because employees can purchase extra credits to offset bad behaviors.", "isCorrect": false, "rationale": "If the system allowed purchasing credits to cancel behavioral debts, the indulgence analogy would apply more precisely. As described, the scenario is a general moral accounting structure, not specifically about purchased credit transfers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
