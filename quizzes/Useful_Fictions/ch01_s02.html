    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what was Aristotle's core philosophical argument against the existence of a vacuum?", "options": [{"text": "Space is inherently filled with an invisible substance called the ether, making true emptiness impossible.", "isCorrect": false, "rationale": "The text attributes the 'ether' argument to the critics of Torricelli's experiment, not to Aristotle himself. Aristotle's argument was that space only exists as a relation between bodies."}, {"text": "Space only exists as the relation between bodies — 'the place' a body occupies — so removing all bodies removes all space, making a vacuum a self-contradiction.", "isCorrect": true, "rationale": "The text states: 'Space, he argued, only exists as a relation between bodies — it is the place that a body occupies, defined by the inner surface of whatever surrounds it. Remove all bodies, and you remove all places, and you remove all space.'"}, {"text": "God's omnipotence would always intervene to fill any void before it could form.", "isCorrect": false, "rationale": "This conflates the medieval theological argument (that even God could not create a self-contradictory vacuum) with Aristotle's own physical argument about the nature of space."}, {"text": "The vacuum was not impossible, merely undetectable with the instruments available in antiquity.", "isCorrect": false, "rationale": "Aristotle did not argue that vacuums were undetectable — he argued they were logically impossible by definition, not a matter of experimental limitation."}], "id": "q01"}, {"question": "What was the practical anomaly that prompted Torricelli to investigate atmospheric pressure?", "options": [{"text": "Suction pumps in mines could not lift water beyond approximately ten meters, regardless of pump quality.", "isCorrect": true, "rationale": "The text states: 'The miners of his day used suction pumps to remove water from mines, but the pumps had a curious limitation: they couldn't lift water more than about ten meters, no matter how good the pump was.'"}, {"text": "Mercury behaved differently from water when placed in sealed glass containers.", "isCorrect": false, "rationale": "Mercury's different behavior was the experimental tool Torricelli used to test his theory; the anomaly that motivated the investigation was the pump limitation in mines."}, {"text": "Aristotle's model predicted that water should fall, not rise, in a sealed pump system.", "isCorrect": false, "rationale": "Aristotle's model predicted water should rise indefinitely in response to a vacuum — the ten-meter limit was what contradicted the Aristotelian prediction."}, {"text": "Medieval theologians had calculated mathematically that the vacuum must exist somewhere above ten meters.", "isCorrect": false, "rationale": "No such theological calculation is mentioned in the text; Torricelli's motivation was an engineering puzzle about pump behavior, not theology."}], "id": "q02"}, {"question": "How did Torricelli's barometer reframe the explanation for why water rises in a pump?", "options": [{"text": "He showed that nature actively attracts water upward into vacuums through a force similar to magnetism.", "isCorrect": false, "rationale": "This is the Aristotelian 'horror vacui' explanation Torricelli was disproving. His insight was that no active attractive force was needed — passive atmospheric weight explained everything."}, {"text": "He demonstrated that the water rises because the weight of the atmosphere presses down on the reservoir surface, pushing the water up — not because nature 'pulls' to avoid a vacuum.", "isCorrect": true, "rationale": "The text says: 'It wasn't that nature was pulling the water up to avoid a vacuum. It was that the weight of the atmosphere was pushing the water up from below. That pressure could support a column of water about ten meters high — and not one millimeter more.'"}, {"text": "He showed that water rises because of density differences between the water in the pipe and the water in the reservoir.", "isCorrect": false, "rationale": "Density differences between water types are not part of Torricelli's argument. He used density differences between mercury and water only as a scaling tool to design his experiment."}, {"text": "He proved that suction pumps create a magnetic effect that attracts water molecules upward.", "isCorrect": false, "rationale": "Magnetism plays no role in Torricelli's explanation. The mechanism is atmospheric pressure — the mechanical weight of air pressing on the water's surface."}], "id": "q03"}, {"question": "Why did Torricelli use mercury rather than water in his 1643 experiment?", "options": [{"text": "Mercury does not evaporate, ensuring that any space at the top of the tube was truly empty rather than filled with vapor.", "isCorrect": false, "rationale": "While mercury vapor was mentioned as a concern raised by critics, the text does not give this as Torricelli's stated reason for using mercury rather than water."}, {"text": "Mercury is approximately 13.6 times denser than water, so atmospheric pressure would support a manageable column of only about 760 mm — small enough for a practical laboratory instrument.", "isCorrect": true, "rationale": "The text explains: 'Mercury is about 13.6 times denser than water, so if his theory was right, the atmosphere should support a column only about 760 millimeters high.' This made the experiment physically feasible."}, {"text": "Mercury was cheaper and more readily available than water in seventeenth-century Italy.", "isCorrect": false, "rationale": "The text gives no such reason. Mercury was chosen for its high density, not its cost or availability."}, {"text": "Water was banned by the Church for use in scientific experiments at the time.", "isCorrect": false, "rationale": "No such ban is mentioned anywhere in the text. The choice of mercury was purely a function of its density relative to water."}], "id": "q04"}, {"question": "What did Otto von Guericke's Magdeburg hemisphere demonstrations prove that Torricelli's barometer had not?", "options": [{"text": "That a vacuum could be created by actively pumping air out of a sealed container, not just by inverting a mercury column.", "isCorrect": true, "rationale": "The text distinguishes the two experiments: Torricelli's demonstrated the air's absence passively; von Guericke 'built a vacuum pump — a device for actively removing air from a sealed container, rather than merely demonstrating the air's absence.'"}, {"text": "That the Torricellian vacuum was filled with mercury vapor, not true emptiness.", "isCorrect": false, "rationale": "Von Guericke's demonstration supported the reality of the vacuum, not doubt about it. The vapor-criticism came from skeptics of Torricelli, not from von Guericke."}, {"text": "That atmospheric pressure varies with altitude.", "isCorrect": false, "rationale": "Altitude variation in atmospheric pressure is not mentioned in the context of von Guericke's demonstrations; it is more associated with later Pascalian experiments."}, {"text": "That the Catholic Church was wrong to doubt the existence of vacuums.", "isCorrect": false, "rationale": "Von Guericke's demonstrations were scientific, not theological polemics. The text does not frame the hemispheres as a refutation of Church doctrine specifically."}], "id": "q05"}, {"question": "At the 1654 Imperial Diet in Regensburg, von Guericke harnessed thirty horses to the Magdeburg hemispheres. What held the two halves together against the horses' combined strength?", "options": [{"text": "The leather gasket between the hemispheres, which created an unbreakable seal.", "isCorrect": false, "rationale": "The gasket was used to ensure airtightness, but the text is explicit that what held the hemispheres together was not the gasket — it was atmospheric pressure on the outside with nothing pressing back from inside."}, {"text": "Simply the weight of the atmosphere pressing inward from outside, with no internal pressure to resist it.", "isCorrect": true, "rationale": "The text states: 'What held them together was not glue, not magnetism, not mystical force. It was simply the weight of the air pressing in from outside, with nothing on the inside to press back.'"}, {"text": "A magnetic force between the copper hemispheres that activated once the air was removed.", "isCorrect": false, "rationale": "The text explicitly rules this out: 'What held them together was not glue, not magnetism, not mystical force.'"}, {"text": "A vacuum-induced adhesion effect specific to copper, not found in other metals.", "isCorrect": false, "rationale": "The text makes no mention of copper-specific properties. The holding force was atmospheric pressure, which would work with any airtight sealed container."}], "id": "q06"}, {"question": "According to the text, what is the 'quantum vacuum,' and why is it philosophically significant?", "options": [{"text": "It is a region of space from which all matter has been physically removed, representing the purest form of emptiness achievable.", "isCorrect": false, "rationale": "This describes a macroscopic vacuum, which Torricelli and von Guericke demonstrated. The quantum vacuum is different — the text says it is the 'lowest possible energy state of a quantum field,' and it is explicitly not empty."}, {"text": "It is the lowest energy state of a quantum field — technically 'empty' space that is nonetheless filled with quantum fluctuations and measurable forces.", "isCorrect": true, "rationale": "The text defines it as 'the lowest possible energy state of a quantum field' and explains that even 'empty' space is 'filled with quantum fluctuations — pairs of virtual particles that pop into existence and annihilate each other almost instantaneously.'"}, {"text": "It is the hypothetical space before the Big Bang — a true void from which the universe eventually emerged.", "isCorrect": false, "rationale": "The Big Bang context belongs to the next section of the book (ch01_s04). The quantum vacuum, as defined here, refers to the ground state of quantum fields in current physics."}, {"text": "It is a theoretical construct that has no measurable physical consequences and remains unconfirmed.", "isCorrect": false, "rationale": "The text says the quantum vacuum 'is not a theoretical speculation; it has measurable consequences,' citing the Casimir effect as experimentally confirmed in 1997."}], "id": "q07"}, {"question": "The Casimir effect is cited as evidence for the quantum vacuum. What does it demonstrate?", "options": [{"text": "Two uncharged metal plates placed close together in a vacuum will repel each other because of competing quantum fluctuations.", "isCorrect": false, "rationale": "The plates attract, not repel. The text says the constrained fluctuations between the plates create lower pressure than the unconstrained outside, so the plates are pushed together."}, {"text": "Two uncharged metal plates in a vacuum are attracted toward each other because the quantum fluctuations between them are constrained while outside fluctuations are not, creating a pressure differential.", "isCorrect": true, "rationale": "The text explains: 'the quantum fluctuations in the space between the plates are constrained... while the fluctuations on the outside face no such restriction. The outside pressure is slightly higher than the inside pressure, and the plates are gently pushed together by the weight of nothing.'"}, {"text": "Metal plates in a vacuum eventually dissolve as virtual particles convert the copper into energy.", "isCorrect": false, "rationale": "No such dissolution is described. The effect is mechanical — a force pushing the plates together — not a chemical or nuclear conversion of the plates themselves."}, {"text": "The distance between two plates in a vacuum decreases over time because air gradually re-enters the chamber.", "isCorrect": false, "rationale": "The Casimir effect operates in a genuine vacuum — the pressure differential is caused by quantum fluctuations, not by air re-entering."}], "id": "q08"}, {"question": "The text describes scholastic philosophers debating whether God could create a vacuum, and notes that their conclusion was remarkable. What was that conclusion, and what made it remarkable?", "options": [{"text": "God could create a vacuum, proving divine omnipotence extended even to logical impossibilities.", "isCorrect": false, "rationale": "The consensus was the opposite: the vacuum was so self-contradictory that even omnipotence could not make one. The text calls this a 'remarkable claim about the limits of omnipotence.'"}, {"text": "Even God could not create a vacuum because it was so self-contradictory — a remarkable implicit acknowledgment that omnipotence has logical limits that the Church never found alarming.", "isCorrect": true, "rationale": "The text states: 'a vacuum was so self-contradictory that even omnipotence couldn't make one — which is a remarkable claim about the limits of omnipotence that the Church somehow never found alarming.'"}, {"text": "God would always prevent vacuums from forming, but this was a voluntary choice, not a limitation of power.", "isCorrect": false, "rationale": "The scholastic argument was about logical impossibility — a vacuum being self-contradictory — not about God choosing to prevent them as a matter of will."}, {"text": "God had already created the vacuum before the universe, which is why it serves as the backdrop for creation.", "isCorrect": false, "rationale": "This describes a theological position found in other traditions but not in the scholastic consensus the text describes."}], "id": "q09"}, {"question": "Imagine a scientist in 1600 CE who argues: 'My pump cannot lift water more than ten meters, therefore my pump is defective.' Using the logic of Torricelli's insight, explain what this scientist is getting wrong.", "options": [{"text": "The pump is, in fact, defective — no pump can exceed this limit, so a better pump would solve the problem.", "isCorrect": false, "rationale": "This is precisely the error Torricelli corrected. The limit is not a product of pump quality; it is the limit imposed by atmospheric pressure, which no pump can overcome."}, {"text": "The pump limit is not a defect but a physical law: atmospheric pressure can only support a column of water about ten meters high, regardless of pump quality. A perfect pump would still hit the same ceiling.", "isCorrect": true, "rationale": "Torricelli showed the limit is caused by the weight of the atmosphere pressing down on the reservoir. The text says 'That pressure could support a column of water about ten meters high — and not one millimeter more' — independent of pump quality."}, {"text": "The pump is experiencing a spiritual vacuum — a sign that nature is punishing the scientist for attempting to create emptiness.", "isCorrect": false, "rationale": "This reflects the folk version of horror vacui, not Torricelli's physics. The actual mechanism is measurable atmospheric pressure, not spiritual punishment."}, {"text": "The scientist should try the pump at a higher altitude, where the limit does not apply.", "isCorrect": false, "rationale": "While atmospheric pressure does decrease with altitude, this does not mean the limit 'does not apply' — it means the limit changes. The fundamental point is that the limit exists because of atmospheric pressure, not pump quality."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
