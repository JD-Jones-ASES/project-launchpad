<script>
var QUESTIONS = [{"question": "The text begins by describing Hofstadter's concept of a 'strange loop' and then says 'this book is a strange loop.' What does this mean for the relationship between the book's content and its method?", "options": [{"text": "The book is circular in a vicious way — it proves nothing because it assumes its own conclusion.", "isCorrect": false, "rationale": "The text distinguishes vicious circles from virtuous ones. The self-referential structure is explicitly described as potentially a virtuous circle — using itself as evidence for a claim that also predicts things outside itself."}, {"text": "The book used useful fictions to explain useful fictions — its method is an instance of its thesis — making the book itself evidence for the claim it argues.", "isCorrect": true, "rationale": "The text states: 'The book you have been reading used useful fictions to explain useful fictions. This is not a confession of inadequacy. It is the demonstration of the thesis.' The self-referential structure makes the book a strange loop: it confirms itself by being an instance of what it describes."}, {"text": "The book is unintentionally self-refuting — it shows that useful fictions cannot be used to make true claims.", "isCorrect": false, "rationale": "The text does not conclude the book is self-refuting. The performative paradox is a feature, not a bug — the self-reference is what makes the book a demonstration of its own thesis."}, {"text": "The book was impossible to write, since any discussion of useful fictions must itself avoid using fictions.", "isCorrect": false, "rationale": "The text explicitly embraces the opposite conclusion: the book could and should use useful fictions. The self-referential structure is the demonstration, not a barrier."}], "id": "q01"}, {"question": "The text describes the book's eight-chapter structure as 'a spherical-cow version of the history of ideas.' What does this mean?", "options": [{"text": "The book is so abstract that it cannot be applied to concrete historical events.", "isCorrect": false, "rationale": "The spherical cow is a model that simplifies for tractability — not a claim of abstraction for its own sake. The book does engage with concrete historical cases throughout."}, {"text": "The book's structure organized a continuous, overlapping, contested intellectual landscape into discrete chapters — a model optimized for pedagogy rather than for historical accuracy.", "isCorrect": true, "rationale": "The text states: 'it organized a continuous, overlapping, contested intellectual landscape into eight discrete chapters with clear themes, clean examples, and satisfying arcs. The chapters are a spherical-cow version of the history of ideas, optimized for pedagogy rather than for historical accuracy.'"}, {"text": "The book is rigidly historical, covering the history of ideas in strict chronological order.", "isCorrect": false, "rationale": "The text's complaint is the opposite — the chapters are too clean and organized, not rigidly historical. The spherical cow model simplifies rather than accurately represents."}, {"text": "The book describes useful fictions as spherical objects that rotate smoothly through history.", "isCorrect": false, "rationale": "This is a literal misreading. The spherical cow is a metaphor from Chapter 2 about simplified models — the book is a simplified model of intellectual history."}], "id": "q02"}, {"question": "The text identifies a 'performative paradox' in the book's argument. What is it?", "options": [{"text": "The book claims that useful fictions are harmless but acknowledges in its final chapter that they can be dangerous.", "isCorrect": false, "rationale": "The performative paradox has nothing to do with harm. It concerns the self-confirming structure of the thesis."}, {"text": "The book's thesis — that useful fictions produce real effects — is itself demonstrated by the fact that the category 'useful fiction' is productive: if the thesis is true, the book that advances it is evidence for its own thesis.", "isCorrect": true, "rationale": "The text states: 'If this thesis is correct, then the book that advances it is itself evidence for its own thesis… The book is right, and the proof that it is right is the book itself. This is the performative paradox: a statement that, if true, makes itself true.'"}, {"text": "The author performs useful fictions while claiming they are not real — a contradiction between theory and practice.", "isCorrect": false, "rationale": "The text does not claim useful fictions are unreal. The performative paradox is about self-confirmation, not about a contradiction between claiming and performing."}, {"text": "The book's argument cannot be assessed because doing so requires already accepting its premises.", "isCorrect": false, "rationale": "The text addresses this concern by distinguishing vicious circles (self-confirming without reaching beyond) from virtuous circles (self-confirming while also predicting things outside themselves)."}], "id": "q03"}, {"question": "The text distinguishes between vicious circles and virtuous circles in response to the concern that self-referential arguments immunize themselves against criticism. What is the difference?", "options": [{"text": "Vicious circles use informal logic; virtuous circles use formal logic.", "isCorrect": false, "rationale": "The text's distinction is not about formal vs. informal logic but about whether the self-referential system reaches beyond itself to predict new things."}, {"text": "Vicious circles confirm themselves without reaching beyond themselves; virtuous circles use themselves as evidence for a claim that also predicts things outside themselves.", "isCorrect": true, "rationale": "The text states: 'Some self-referential systems are vicious circles — they confirm themselves without reaching beyond themselves. Others are virtuous circles — they use themselves as evidence for a claim that also predicts things outside themselves.'"}, {"text": "Vicious circles rely on authority; virtuous circles rely on empirical evidence.", "isCorrect": false, "rationale": "Authority vs. evidence is not the criterion the text uses. The criterion is whether the circle generates claims about things outside itself."}, {"text": "Vicious circles are logically invalid; virtuous circles are logically valid.", "isCorrect": false, "rationale": "The text's framework is pragmatic — about productivity and reach — not about logical validity alone."}], "id": "q04"}, {"question": "The text uses the Necker cube and the young-woman/old-woman ambiguous image to describe the concept of a 'gestalt switch.' What claim does the text make about understanding the concept 'useful fiction'?", "options": [{"text": "Understanding useful fictions is an unstable experience — readers will keep switching between seeing them as useful and seeing them as merely fictional.", "isCorrect": false, "rationale": "The text's claim is not about instability. The gestalt switch is permanent, not oscillating. Once you see the concept's applicability, you cannot unsee it."}, {"text": "Understanding useful fictions produces a permanent gestalt switch — once you see that money is a collective agreement, for example, you cannot fully un-understand this, even while continuing to operate within the monetary system.", "isCorrect": true, "rationale": "The text states: 'The concept of useful fiction produces a gestalt switch of this kind. Once you understand that money is a collective agreement that works because everyone acts as if it works, you cannot fully un-understand this.'"}, {"text": "Understanding useful fictions is paralyzing — it prevents effective action within social systems.", "isCorrect": false, "rationale": "The text explicitly says the gestalt switch is 'not disabling. It is clarifying.' The changed relationship to fictions enables a different kind of agency, not paralysis."}, {"text": "Understanding useful fictions is only possible for trained philosophers — ordinary people cannot achieve the gestalt switch without guidance.", "isCorrect": false, "rationale": "The text makes no such elitist claim. The gestalt switch is presented as accessible to any reader of the book who engages with its concepts."}], "id": "q05"}, {"question": "The text reflects on how the book personified its concepts throughout — saying 'what the magic circle does,' 'what the ledger wants.' What is the text's point about this practice?", "options": [{"text": "Personification is a literary error that should have been avoided — it misleads readers about whether abstractions have agency.", "isCorrect": false, "rationale": "The text does not apologize for the personification. It identifies it as an instance of the invisible-hand fiction (Chapter 3) — a useful fiction the book itself deployed as a pedagogical tool."}, {"text": "The personification of abstractions is itself an invisible-hand fiction — treating aggregate outcomes as if they were the intentions of a single agent — demonstrating that the book practiced the thesis it preached.", "isCorrect": true, "rationale": "The text states: this book personified its concepts throughout — speaking of what the magic circle does, treating abstractions as agents with intentions and purposes. The invisible hand wrote this textbook."}, {"text": "Personification of abstractions is always harmless because readers automatically understand it as metaphor.", "isCorrect": false, "rationale": "The text elsewhere warns that useful fictions become harmful when mistaken for accurate descriptions. Personification is not automatically harmless — it is useful within the magic circle of pedagogy."}, {"text": "Personification was used sparingly in the book to avoid reinforcing the invisible-hand fallacy.", "isCorrect": false, "rationale": "The text says the personification was pervasive — 'throughout' — not sparse. The book leaned into the practice, which is part of what makes it self-referential."}], "id": "q06"}, {"question": "The text says the most important useful fictions — money, law, nation, paradigm, self — are 'ones that we found ourselves already inside, already navigating by, before we had any capacity to examine them.' What is the significance of this observation for the book's project?", "options": [{"text": "It shows the book's project is futile — we can never step outside the fictions we inhabit, so the analysis cannot succeed.", "isCorrect": false, "rationale": "The text explicitly says the goal is not to escape the fictions but to change the relationship: 'from unreflective player to one who knows they are playing a game.' Partial distance, not full escape."}, {"text": "It establishes the primary constraint: we cannot escape the fictions, but we can step just far enough outside them to see their structure — changing from unreflective player to one who understands enough of the rules to see how the game might be played differently.", "isCorrect": true, "rationale": "The text states: 'This book has tried to step outside enough of those circles, just far enough, to look at their structure. Not to escape them — there is no escaping them… But to change the relationship between you and the fictions you inhabit.'"}, {"text": "It shows that useful fictions are more powerful when they are invisible — the book has therefore weakened them by making them visible.", "isCorrect": false, "rationale": "The text does not treat the analysis as weakening fictions. Money continues to work for someone who knows it is a collective agreement. Visibility changes the knower's relationship, not the fiction's effectiveness."}, {"text": "It is a confession that the book failed to achieve its purpose — since we are inside fictions before we can examine them, examination is impossible.", "isCorrect": false, "rationale": "The text describes partial examination as both possible and valuable. The magic circle was drawn before we could walk — but we can still learn to see it, from the inside, with effort."}], "id": "q07"}, {"question": "According to the closing 'Think About It' prompt, the definition of useful fiction — 'something that everyone agrees does not correspond to reality in any simple way, yet functions as if it does, and whose functioning produces real effects' — is itself a useful fiction. What is the test the text proposes for evaluating it?", "options": [{"text": "Whether the definition is logically consistent and internally non-contradictory.", "isCorrect": false, "rationale": "The text acknowledges the definition has internal tensions ('everyone agrees' is rarely true). Logical consistency is not the test; functional productivity is."}, {"text": "Whether the definition makes you see things you would not otherwise have seen — whether it groups things that belong together and generates productive new questions.", "isCorrect": true, "rationale": "The text asks: 'Does having this category make you see things you would not otherwise have seen? Does it group things that belong together? Does it generate productive new questions?' These are the tests of a useful fiction."}, {"text": "Whether professional philosophers have endorsed the definition in peer-reviewed literature.", "isCorrect": false, "rationale": "The text proposes a pragmatic, reader-based test, not an appeal to scholarly authority. The test is functional productivity, not professional endorsement."}, {"text": "Whether the definition can be applied without exception to every possible concept.", "isCorrect": false, "rationale": "The text explicitly acknowledges borderline cases and internal tensions. The test is not exceptionless coverage but functional usefulness."}], "id": "q08"}, {"question": "The text describes the book's assessment rubrics as 'their own kind of ledger: they assign numerical scores to understanding, commensuring the incommensurable.' What does this mean?", "options": [{"text": "The rubrics are perfectly accurate measures of understanding and should be taken at face value.", "isCorrect": false, "rationale": "The text explicitly says that whether a student understands useful fiction is not the kind of thing that has a numerical value. The rubric is a useful fiction, not an accurate measure."}, {"text": "Assessment rubrics are useful fictions — they make grading possible by treating something inherently unquantifiable (understanding) as if it were quantifiable, paralleling how double-entry bookkeeping made assets and liabilities commensurable.", "isCorrect": true, "rationale": "The text states that whether a student understands useful fiction is not the kind of thing that has a numerical value, and that the rubric is a useful fiction that makes grading possible. This parallels Chapter 5's ledger — both commensure the incommensurable."}, {"text": "Rubrics are harmful fictions that should be abolished because they distort what education is for.", "isCorrect": false, "rationale": "The text calls rubrics useful fictions — they serve a function (making grading possible) while being imprecise. Useful fictions are not condemned; the danger is mistaking them for accurate descriptions."}, {"text": "Assessment rubrics work because students believe they are accurate measures, producing a self-fulfilling accuracy.", "isCorrect": false, "rationale": "The text does not argue that belief in rubric accuracy makes them accurate. It argues they are useful because they make a social practice (grading) tractable, not because of self-fulfillment."}], "id": "q09"}, {"question": "The text ends: 'The game was always in progress. Now you can see the circle.' What cognitive shift does this closing claim the book has produced?", "options": [{"text": "Readers now know that all social institutions are fraudulent and should resist participating in them.", "isCorrect": false, "rationale": "The text explicitly says the knowledge is 'not power in any simple sense' and is not disabling. It is a clarifying freedom, not a call to resistance or withdrawal."}, {"text": "Readers have achieved the permanent gestalt switch of seeing the structures underlying collective fictions — able to see money, law, paradigm, and self as variations on a single structural theme while still operating within them, but with a changed posture.", "isCorrect": true, "rationale": "The text describes the changed relationship as 'from unreflective player to one who knows they are playing a game, and understands enough of the rules to see, occasionally, how the game might be played differently.' This is clarifying freedom, not paralysis."}, {"text": "Readers have learned a definitive method for analyzing any institution and can now apply it mechanically.", "isCorrect": false, "rationale": "The book's conclusion is the opposite of offering a method — it argues against methodological formalism (see Chapter 8.3). The shift is a changed way of seeing, not a technique."}, {"text": "Readers are now trapped in an awareness of the circle that prevents them from ever acting naturally within any social system.", "isCorrect": false, "rationale": "The text says this knowledge is 'not disabling. It is clarifying.' You can continue to act within the monetary system or the corporation — but with a different posture."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
