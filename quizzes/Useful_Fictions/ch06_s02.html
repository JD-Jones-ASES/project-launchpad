<script>
var QUESTIONS = [{"question": "In Imagined Communities (1983), Benedict Anderson defined a nation as an 'imagined political community.' What did he mean by the word 'imagined' in this context?", "options": [{"text": "Nations are fabrications invented by elites to manipulate citizens into loyalty they would not otherwise feel.", "isCorrect": false, "rationale": "The text is explicit: 'This is not a debunking claim. Anderson did not say nations are fake, in the pejorative sense, or that national feeling is irrational.' 'Imagined' is a structural description, not a charge of manipulation."}, {"text": "Members of a nation can never know most of their fellow members, yet in each person's mind lives an image of their shared communion.", "isCorrect": true, "rationale": "The text quotes Anderson directly: a nation is 'imagined because the members of even the smallest nation will never know most of their fellow members, meet them, or hear of them, yet in the minds of each lives the image of their communion.' This is what 'imagined' means — a specific kind of social fiction, not a hoax."}, {"text": "Nations exist only as mental projections and have no concrete institutional reality such as laws or borders.", "isCorrect": false, "rationale": "Anderson's account distinguishes nations (cultural-psychological entities) from states (legal-political entities) — nations are imagined communities but they interface with real institutions. The text does not say nations have no concrete reality."}, {"text": "All national feelings are irrational and should be overcome through cosmopolitan education.", "isCorrect": false, "rationale": "The text explicitly says Anderson 'did not say national feeling is irrational.' The framework is analytical, not prescriptive."}], "id": "q01"}, {"question": "According to Anderson's framework, what three features characterize how a nation imagines itself?", "options": [{"text": "It imagines itself as universal, eternal, and divinely ordained.", "isCorrect": false, "rationale": "Anderson's three features, as given in the text, are 'limited,' 'sovereign,' and a 'community' — not universal, eternal, or divine. Nations are imagined as having finite boundaries, not universal scope."}, {"text": "It imagines itself as limited in boundaries, sovereign in governance, and a horizontal community of comradeship.", "isCorrect": true, "rationale": "The text lists Anderson's three features exactly: 'They are imagined as limited — they have finite... boundaries. They are imagined as sovereign — they claim the right to self-governance. And they are imagined as communities — despite hierarchies... the nation is conceived as a deep, horizontal comradeship.'"}, {"text": "It imagines itself as racially homogeneous, linguistically pure, and historically continuous.", "isCorrect": false, "rationale": "These are features of certain nationalist ideologies, not of Anderson's structural definition. Anderson's three features are limited, sovereign, and community — race, language purity, and historical continuity are not in this list."}, {"text": "It imagines itself as economically unified, militarily powerful, and geographically central.", "isCorrect": false, "rationale": "These are not Anderson's three features. The text presents limited, sovereign, and community as the structural characteristics Anderson identified."}], "id": "q02"}, {"question": "What role did print capitalism play in making modern nationalism possible, according to Anderson's account in the text?", "options": [{"text": "It allowed governments to distribute propaganda that manufactured loyalty among previously indifferent populations.", "isCorrect": false, "rationale": "Anderson's argument, as presented, is not primarily about government propaganda but about the structural effects of a shared daily text — the 'meanwhile' sense of community created by mass printing. The text describes print capitalism as enabling, not as a government manipulation tool."}, {"text": "It standardized vernacular languages and created a shared symbolic world that millions consumed simultaneously, producing a sense of national communion.", "isCorrect": true, "rationale": "The text states: 'The printing press, by standardizing vernacular languages and creating a daily shared text that millions of people consumed simultaneously, created what Anderson called the \"meanwhile\" — the sense that right now, across a vast imagined space, people like you are reading the same words, thinking about the same events, sharing the same symbolic world.'"}, {"text": "It enabled governments to record and enforce national citizenship laws across vast territories.", "isCorrect": false, "rationale": "Anderson's argument focuses on cultural and psychological community-formation, not bureaucratic legal enforcement. The mechanism is the daily newspaper as communal ritual, not legal record-keeping."}, {"text": "It replaced oral tradition with written history, giving nations a fixed past they could study and revere.", "isCorrect": false, "rationale": "While written history is relevant to national identity, Anderson's specific argument in the text concerns the simultaneous shared consumption of daily print — the 'meanwhile' — not the preservation of a fixed past."}], "id": "q03"}, {"question": "What is the crucial distinction the text draws between a 'nation' and a 'state'?", "options": [{"text": "A state is older than a nation; nations are modern inventions while states have existed since antiquity.", "isCorrect": false, "rationale": "The text defines the distinction by type (cultural-psychological vs. political-legal), not by historical age. It does not claim states predate nations."}, {"text": "A state is a political-legal apparatus with territory and a monopoly on legitimate violence; a nation is a cultural-psychological entity of people who believe they share a common identity.", "isCorrect": true, "rationale": "The text defines them precisely: 'A state is a political and legal entity: a government with a defined territory, a monopoly on legitimate violence (Weber's classic definition), a bureaucracy, and recognition by other states.' A nation is 'a cultural and psychological entity: a group of people who believe they share a common identity, history, language, or destiny, whether or not they have a state.'"}, {"text": "A state is democratic; a nation is autocratic — the difference is in their systems of government.", "isCorrect": false, "rationale": "The text does not define states or nations by their democratic or autocratic character. The distinction is structural: political-legal entity versus cultural-psychological community."}, {"text": "A nation is a subset of a state — nations are smaller regional communities within larger state structures.", "isCorrect": false, "rationale": "The text gives the Kurds as a nation of 35 million with no state — so nations are not necessarily subsets of states. The UK is an example of a state containing multiple nations. The relationship is variable, not definitionally hierarchical."}], "id": "q04"}, {"question": "The text states that 'national enemies are as essential as national heroes.' What function do national enemies serve in the construction of national personhood?", "options": [{"text": "They provide a legal justification for military spending and conscription laws.", "isCorrect": false, "rationale": "The function described is psychological and definitional, not legal. The text frames enemies as part of the identity-construction process, not as justifications for specific policies."}, {"text": "They give the national person a face to define itself against, making the nation's identity legible by showing what it is not.", "isCorrect": true, "rationale": "The text says: 'The nation is defined against what it is not, and that not-ness requires a face. The nation-as-person needs antagonists, which is why propaganda so reliably personifies enemy nations as malevolent figures.' You can hate a person; it is harder to hate an economic and historical process."}, {"text": "They serve as cautionary examples of failed nationhood that reinforce the superiority of the imagined community.", "isCorrect": false, "rationale": "While this might be true in some contexts, the text's specific point is about identity construction through contrast — defining what the nation is by defining what it is not — not about demonstrating the failure of enemy states."}, {"text": "They are invented by governments to distract citizens from internal economic problems.", "isCorrect": false, "rationale": "The text's analysis is structural — enemies are a functional component of national personhood — not a claim about government manipulation or economic distraction."}], "id": "q05"}, {"question": "Why does the text say the conflation of 'nation' and 'state' in the phrase 'nation-state' is 'one of the most consequential category errors in modern politics'?", "options": [{"text": "Because it prevents scholars from studying nations and states as separate phenomena.", "isCorrect": false, "rationale": "The text's concern is political, not scholarly — the consequences are wars, ethnic cleansing, and national self-determination movements, not limitations on academic study."}, {"text": "Because it implies that every nation ought to have a state and every state a nation, which drives both self-determination movements and ethnic cleansing.", "isCorrect": true, "rationale": "The text states: 'The implication drives national self-determination movements and also ethnic cleansing campaigns: if the state and the nation must coincide, then the presence of the \"wrong\" nation within the state's territory becomes an existential problem.'"}, {"text": "Because it led the United Nations to adopt a flawed membership criterion based on cultural homogeneity.", "isCorrect": false, "rationale": "The text does not discuss the UN's membership criteria. The consequences described are political violence — self-determination movements and ethnic cleansing — not institutional design errors at the UN."}, {"text": "Because it prevents multinational states from functioning, since citizens will only identify with cultural nations.", "isCorrect": false, "rationale": "The text gives the United Kingdom as an example of a multinational state that does (imperfectly) function. The problem is the implied imperative of coincidence, not a general inability for multinational states to work."}], "id": "q06"}, {"question": "Marianne, Uncle Sam, and Britannia serve as national personifications. According to the text, what specifically makes these figures functional rather than merely decorative?", "options": [{"text": "They provide governments with legally recognized emblems that can be trademarked and protected by copyright.", "isCorrect": false, "rationale": "The text's analysis of national personifications is entirely psychological and sociological — about emotional mobilization and identity — not about intellectual property or government legal symbols."}, {"text": "They give abstract political entities a body, a face, a will, and an emotional charge that enables citizens to feel loyalty to them as they would to a person.", "isCorrect": true, "rationale": "The text says these figures are 'functional components of a psychological infrastructure that makes nations possible.' The Delacroix image caption explains: 'an abstraction is given a body, a face, a will, and an emotional charge, so that citizens can feel loyalty to it the way they feel loyalty to a person.'"}, {"text": "They encode the founding myth of the nation in a memorable visual form that can be reproduced in schools.", "isCorrect": false, "rationale": "While national myths are discussed elsewhere in the section, the specific function of personification figures described in the text is about inducing emotional loyalty to an abstraction — not about encoding founding myths."}, {"text": "They mark national territory on maps and give soldiers an identifiable symbol to fight under in battle.", "isCorrect": false, "rationale": "The text's analysis is psychological and social — about the emotional infrastructure of nationhood — not about cartographic or military signaling functions."}], "id": "q07"}, {"question": "You are a political consultant advising a new government that wants to build a sense of national solidarity. Based on the text's account of nationhood rituals, which combination of measures best addresses the functional requirements of national personhood?", "options": [{"text": "Lower taxes and increase GDP growth to give citizens a material stake in the nation's prosperity.", "isCorrect": false, "rationale": "The text's analysis of nationhood is cultural-psychological, centered on rituals, myths, symbols, and personifications — not on material incentives. Economic prosperity is not in the list of mechanisms described."}, {"text": "Establish a national anthem, a founding myth, a flag with a usage code, and a personified national figure who can serve as an emotional focal point.", "isCorrect": true, "rationale": "The text's 'Field Note' on nationhood rituals lists precisely these: the national anthem ('sung collectively at moments of communal gathering'), the flag ('a social technology for focusing and directing collective emotion'), the founding myth ('a moment of heroic creation that establishes its essential character'), and national personification (Marianne, Uncle Sam, etc.)."}, {"text": "Create a strong military and demonstrate territorial expansion to signal national power to citizens.", "isCorrect": false, "rationale": "Military power is not in the text's list of nationhood-building mechanisms. The text focuses on symbolic, ritual, and narrative infrastructure — not power projection."}, {"text": "Mandate a single official language and expel all linguistic minorities to achieve cultural homogeneity.", "isCorrect": false, "rationale": "While language standardization is mentioned (print capitalism standardizing vernaculars), the text does not prescribe expulsion of minorities. This option conflates the analysis of how nations formed historically with a policy recommendation, and it describes the destructive potential of exclusive nationalism."}], "id": "q08"}, {"question": "The text says that before cheap printed newspapers and novels, the inhabitants of what we now call France 'spoke mutually unintelligible dialects, worshipped regional saints, paid taxes to local lords.' What does this historical picture imply about the relationship between national identity and media technology?", "options": [{"text": "National identity is a natural, pre-existing sentiment that print capitalism merely amplified and expressed.", "isCorrect": false, "rationale": "The text argues the opposite — that the sense of national connection did not exist before print capitalism created the structural conditions for it. The pre-print picture is of regional fragmentation, not latent national feeling."}, {"text": "National identity, as we know it, required a specific communications technology to create the shared symbolic world through which millions could feel connected.", "isCorrect": true, "rationale": "The text's point is that pre-print populations had no mechanism for the 'meanwhile' — the sense of simultaneous shared experience. National identity at the scale we know it was made possible by print capitalism standardizing language and creating daily shared texts. The technology preceded and enabled the identity."}, {"text": "Print capitalism was irrelevant — nations formed through military conquest rather than shared media consumption.", "isCorrect": false, "rationale": "The text presents Anderson's argument that print capitalism was 'the mechanism that made modern nationalism possible.' Military conquest is not the explanation given."}, {"text": "National identity will disappear once print media is replaced by digital media, since the mechanism no longer functions.", "isCorrect": false, "rationale": "The text does not discuss digital media or predict national identity's disappearance. The argument concerns the historical origins of modern nationalism, not its trajectory under new technologies."}], "id": "q09"}, {"question": "According to the Specimen box, what is the 'destructive potential' of the national fiction when the national person is defined in exclusionary terms?", "options": [{"text": "Exclusionary nationalism tends to reduce economic productivity by restricting immigration of skilled workers.", "isCorrect": false, "rationale": "The text's stated destructive potential is violence and existential threat — not economic productivity loss. The Specimen box describes physical destruction and expulsion, not labor market effects."}, {"text": "Non-members become existential threats to be expelled or destroyed, since the nation-as-person demands internal coherence.", "isCorrect": true, "rationale": "The Specimen box states: 'When the national person is defined in exclusionary terms (racial, religious, linguistic), non-members become existential threats to be expelled or destroyed.' The nation-state logic — state and nation must coincide — drives ethnic cleansing as a logical (if catastrophic) consequence."}, {"text": "Exclusionary nationalism leads to diplomatic isolation and economic sanctions from the international community.", "isCorrect": false, "rationale": "The text does not discuss diplomatic isolation or sanctions as the destructive potential. The described danger is internal: the existential threat framing of non-members within the territory."}, {"text": "When defined exclusively, national identity becomes too rigid to adapt to changing demographic realities.", "isCorrect": false, "rationale": "Demographic inflexibility is not the destructive potential the text describes. The Specimen box specifically frames the risk in terms of violence against non-members — expelled or destroyed — not adaptive failure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
