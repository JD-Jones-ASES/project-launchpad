    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Carbon Credits and the Commodification of Guilt</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The U.S. sulfur dioxide cap-and-trade program of 1990 was considered a striking success. What was the mechanism by which it reduced acid rain?", "options": [{"text": "It mandated specific pollution-control technology for every power plant, ensuring uniform emission reductions across the industry.", "isCorrect": false, "rationale": "The text explicitly states the law did not mandate specific technology or set uniform emission limits — this was precisely what made cap-and-trade different from conventional regulation."}, {"text": "It created a market in sulfur dioxide permits, capping total emissions while allowing plants to buy and sell allowances based on their own cost calculations.", "isCorrect": true, "rationale": "The text describes the mechanism precisely: a market in permits, each allowing one ton of SO₂/year; plants that reduced emissions could sell surplus permits to those that found it cheaper to buy than to clean up; the total cap declined over time."}, {"text": "It imposed a carbon tax on coal plants, with revenue used to fund alternative-energy subsidies.", "isCorrect": false, "rationale": "The 1990 program was a cap-and-trade system, not a carbon tax; it did not tax emissions directly or redirect revenue to energy subsidies."}, {"text": "It replaced coal power plants with natural gas plants through government purchase and decommissioning.", "isCorrect": false, "rationale": "The program created a market mechanism for existing plants; it did not involve government purchase or decommissioning of facilities."}], "id": "q01"}, {"question": "The text calls a carbon credit 'a particularly pure example of the kind of useful fiction this book is about.' What makes it pure?", "options": [{"text": "Carbon credits are backed by a physical commodity (carbon dioxide) unlike fiat currency, which is backed by nothing.", "isCorrect": false, "rationale": "This is backward: the text says a carbon credit 'has no physical form' and 'did not exist before the law created it' — it is precisely the absence of physical backing that makes it a pure fiction."}, {"text": "A right to emit one ton of CO₂ did not exist before the law created it, has no physical form, and represents a social permission slip created by collective agreement.", "isCorrect": true, "rationale": "The text states exactly this: 'A right to emit one ton of carbon dioxide did not exist before the law created it. It has no physical form. It represents a social permission slip, created by collective agreement' — meeting the book's definition of a useful fiction."}, {"text": "Carbon credits are the only fictional instrument that directly changes atmospheric chemistry rather than human behavior.", "isCorrect": false, "rationale": "Carbon credits change behavior through economic incentives; they do not directly change atmospheric chemistry. The text notes the question of whether the stack of abstractions actually produces the intended real-world effect is precisely what is under scrutiny."}, {"text": "They are pure because they were developed by scientists rather than by economists or politicians.", "isCorrect": false, "rationale": "The text credits economists for the cap-and-trade mechanism and describes its origins in Congressional legislation, not in scientific design."}], "id": "q02"}, {"question": "What is 'additionality' in carbon offset markets, and why is it difficult to verify?", "options": [{"text": "The requirement that offset projects must add new renewable energy capacity rather than merely conserving existing forests.", "isCorrect": false, "rationale": "Additionality is not specifically about renewable energy; it applies to any offset project, including forest conservation. The text's examples include tree planting, forest preservation, and cookstoves."}, {"text": "The requirement that an offset project represent emissions reductions that would not have occurred without the offset payment — verifying a counterfactual.", "isCorrect": true, "rationale": "The text defines additionality as 'the requirement that an offset project must represent emissions reductions that would not have happened without the offset payment' and identifies the difficulty: 'A forest that was never going to be cut down does not offset anything; it is counterfactual carbon, a notional reduction in a hypothetical future that may or may not reflect what actually happens.'"}, {"text": "The requirement that any carbon offset generate at least as much economic value as the emissions it offsets, so net welfare improves.", "isCorrect": false, "rationale": "Additionality is specifically about whether emissions reductions are genuinely caused by the offset payment, not about welfare comparisons of economic value."}, {"text": "The requirement that offset buyers disclose all their emissions so the total net position can be independently verified.", "isCorrect": false, "rationale": "Disclosure by buyers is a transparency requirement; additionality is specifically about whether the project itself produced genuine new reductions that would not otherwise have occurred."}], "id": "q03"}, {"question": "A 2023 investigation found that more than 90 percent of Verra's rainforest carbon offset credits were 'phantom credits.' The text attributes this outcome to which principle?", "options": [{"text": "The Flynn effect — offset certifiers were applying older, less rigorous standards calibrated for a different baseline.", "isCorrect": false, "rationale": "The Flynn effect relates to rising IQ scores requiring re-norming; it has no relevance to carbon offset fraud."}, {"text": "The double coincidence of wants — buyers wanting credits and sellers wanting revenue aligned regardless of atmospheric reality.", "isCorrect": false, "rationale": "While there is a mutual interest between credit buyers and offset sellers, the text specifically attributes the phantom-credit problem to Goodhart's Law, not the barter coordination concept."}, {"text": "Goodhart's Law — once offset certification became a commodity with a price, the incentive to produce certified reductions exceeded the incentive to produce actual ones.", "isCorrect": true, "rationale": "The text states explicitly: 'The accounting had become detached from the underlying reality, exactly as Goodhart's Law would predict: once offsets became a commodity with a price, the incentive to produce certified offsets overwhelmed the incentive to produce actual emission reductions.'"}, {"text": "Campbell's Law — because offset credits were used for high-stakes regulatory decisions, corruption pressures corrupted the certification process.", "isCorrect": false, "rationale": "While Campbell's Law is closely related, the text specifically names Goodhart's Law as the prediction this outcome confirms."}], "id": "q04"}, {"question": "What structural problem does the text identify with ESG rating agencies?", "options": [{"text": "ESG ratings are not legally binding, so corporations can ignore them without consequence.", "isCorrect": false, "rationale": "The text does not discuss legal enforceability; the identified structural problem is that different agencies rating the same company produce profoundly different scores because they measure different things and weight them differently."}, {"text": "Different ESG agencies rating the same company frequently disagree profoundly, with inter-agency correlations around 0.61 — far below bond rating agencies' 0.99.", "isCorrect": true, "rationale": "The text cites a 2019 MIT Sloan study: 'the correlation between different agencies' ESG ratings of the same companies was 0.61 on average — considerably lower than the correlation between different agencies' bond credit ratings, which is around 0.99.'"}, {"text": "ESG agencies consistently overrate large corporations and underrate small ones, creating a systematic size bias.", "isCorrect": false, "rationale": "The text identifies disagreement between agencies rating the same company, not a systematic bias toward large or small corporations."}, {"text": "ESG ratings only measure environmental performance reliably; social and governance dimensions produce meaningless scores.", "isCorrect": false, "rationale": "The text treats all three dimensions of ESG as subject to the same problem; it does not claim environmental scores are reliable while social and governance scores are not."}], "id": "q05"}, {"question": "What is 'commensurability' and what does the text say about its truth?", "options": [{"text": "Commensurability is the thesis that all values can be ranked on a single scale and compared; the text argues this is true in atmospheric science but false in ethics.", "isCorrect": false, "rationale": "The text does not divide commensurability into scientific and ethical domains; it argues (citing Elizabeth Anderson) that commensurability is false for some morally important comparisons — not only for ethics versus science."}, {"text": "Commensurability is the thesis that all values can be ranked on a single scale and compared; the text argues it is false for some morally important comparisons — some values are incommensurable, different in kind rather than just in amount.", "isCorrect": true, "rationale": "The text states: 'commensurability — the thesis that all values can be ranked on a single scale and compared.' It then cites Elizabeth Anderson: 'Some values are incommensurable: not just different in amount but different in kind, such that ranking them on a single scale necessarily misrepresents at least one of them.'"}, {"text": "Commensurability is the legal standard requiring that any carbon offset must equal the atmospheric impact of the emissions it covers; the text argues current offsets fail this standard.", "isCorrect": false, "rationale": "This is a narrow misreading; commensurability is a philosophical concept about whether all values can be compared on a single scale — not a legal standard in emissions accounting."}, {"text": "Commensurability means that a ton of carbon from any source has the same atmospheric effect; the text endorses this as physically true but morally insufficient.", "isCorrect": false, "rationale": "The physical commensurability of carbon (a ton is a ton atmospherically) is acknowledged, but the text's point is that moral commensurability — whether different kinds of emissions are morally equivalent — is the contested and probably false claim."}], "id": "q06"}, {"question": "The text describes the carbon credit as 'a layered fiction.' What are the layers?", "options": [{"text": "Financial contract → legal instrument → political compromise → market price → atmospheric outcome.", "isCorrect": false, "rationale": "This invents a layering structure not used in the text; the text describes the layers in terms of what each represents and what it is intended to produce."}, {"text": "A legal right (the permit) that represents an atmospheric permission (a ton of CO₂) that may not correspond to atmospheric reality (if offsets are fraudulent) that is intended to produce a moral outcome (stable climate) via a market mechanism that may or may not align incentives with atmospheric reality.", "isCorrect": true, "rationale": "The text enumerates these layers exactly: 'a legal right (the permit) that represents an atmospheric permission (a ton of CO₂ equivalent) that may or may not correspond to what actually happens in the atmosphere (if offsets are fraudulent) that is intended to produce a moral outcome (a stable climate) via a mechanism (the market) that may or may not align economic incentives with atmospheric reality.'"}, {"text": "An accounting entry → a certificate → a regulatory filing → a market trade → an atmospheric change.", "isCorrect": false, "rationale": "This describes a transaction sequence, not the layers of abstraction the text identifies. The text is concerned with what each layer represents and whether the stack achieves its intended real-world effect."}, {"text": "Corporate promise → ESG score → investor confidence → market valuation → actual environmental improvement.", "isCorrect": false, "rationale": "This describes the ESG score chain, not the carbon credit's layered structure. The text describes the carbon credit's layers separately from its ESG discussion."}], "id": "q07"}, {"question": "A company based in Ohio buys certified offsets to cover its coal emissions by paying for forest preservation in Indonesia. The text identifies two separate problems with this arrangement. What are they?", "options": [{"text": "The geographic distance makes enforcement difficult; and the local population did not consent to selling their forest.", "isCorrect": false, "rationale": "These are real policy concerns, but they are not the problems the text specifically identifies; the text's identified issues are additionality (would the forest have been preserved anyway?) and moral incommensurability (are Ohio coal emissions morally equivalent to Indonesian forest preservation?)."}, {"text": "Additionality — the forest may not have been endangered, making the offset a counterfactual fiction; and moral incommensurability — the atmospheric equivalence does not exhaust the relevant moral comparison.", "isCorrect": true, "rationale": "The text identifies both: (1) additionality — 'A forest that was never going to be cut down does not offset anything'; and (2) that the offset 'assert[s] that these two things are commensurable in terms of atmospheric impact — which may be true — and that the commensurability in atmospheric terms exhausts the relevant moral comparison — which is almost certainly false.'"}, {"text": "Verification costs make offset monitoring prohibitively expensive; and regulatory arbitrage allows companies to choose the cheapest offset regardless of quality.", "isCorrect": false, "rationale": "These are practical policy concerns but are not what the text specifically analyzes; it focuses on additionality and moral incommensurability as the conceptual problems."}, {"text": "Forests sequester carbon intermittently, so the offset may reverse when the forest is eventually logged; and financial markets can speculate on offset prices, decoupling them from environmental outcomes.", "isCorrect": false, "rationale": "Permanence and financial speculation are real issues in offset markets, but they are not the specific problems the text identifies in the Ohio-Indonesia example."}], "id": "q08"}, {"question": "The EU Emissions Trading System was launched in 2005 and expanded to aviation in 2012. What share of EU greenhouse gas emissions does it cover?", "options": [{"text": "About 20 percent", "isCorrect": false, "rationale": "The text states the EU ETS covers roughly 40 percent of EU greenhouse gas emissions, not 20 percent."}, {"text": "About 40 percent", "isCorrect": true, "rationale": "The text states: 'The system covers roughly 40 percent of EU greenhouse gas emissions.'"}, {"text": "About 60 percent", "isCorrect": false, "rationale": "The text states roughly 40 percent; 60 percent is not mentioned."}, {"text": "About 80 percent", "isCorrect": false, "rationale": "The text states roughly 40 percent; 80 percent overstates the coverage."}], "id": "q09"}, {"question": "The text ends by contrasting two accounting systems: the books kept by the carbon market versus the atmosphere. Which statement best captures the text's closing argument?", "options": [{"text": "The carbon market's books balance because every emitted ton has a corresponding certified offset, proving the system is working.", "isCorrect": false, "rationale": "The text challenges whether balanced books translate to real-world atmospheric benefit, explicitly raising the question of whether the system is 'doing the work it is supposed to do.'"}, {"text": "The carbon market may balance its ledger through credits and offsets while the atmosphere continues to warm, because the atmosphere does not care about the books.", "isCorrect": true, "rationale": "The text concludes: 'The books may balance. The atmosphere does not care about the books.' This captures the core warning: a well-functioning accounting system is not the same thing as a well-functioning physical intervention."}, {"text": "The carbon market is fundamentally fraudulent and should be replaced with direct emission regulations.", "isCorrect": false, "rationale": "The text raises serious doubts about the market's effectiveness but does not advocate for a specific regulatory alternative; the closing is a question, not a policy prescription."}, {"text": "Because the atmosphere is global, any ton of carbon reduced anywhere in the world is equally valuable, proving the market's logic is sound.", "isCorrect": false, "rationale": "The text acknowledges the atmospheric commensurability of carbon but argues this does not settle the moral question — and the empirical question (do offsets produce real reductions?) remains deeply contested."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
