    <script>

    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Borders, Real and Imagined</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why was the forty-ninth parallel chosen as the US-Canada border in 1818?", "options": [{"text": "Because it followed the natural boundary of a major river running east-west across the continent.", "isCorrect": false, "rationale": "The text states the forty-ninth parallel was chosen because it is 'geometrically clean, cartographically simple, and requires no knowledge of the actual terrain' — not because it followed any natural feature."}, {"text": "Because British and American negotiators had surveyed the terrain and found it to be the most defensible natural line.", "isCorrect": false, "rationale": "The text says the negotiators 'had never seen most of the territory they were dividing.' The choice was a line of latitude, not a surveyed defensive feature."}, {"text": "Because it was geometrically clean and cartographically simple — a line of latitude requiring no knowledge of the actual terrain.", "isCorrect": true, "rationale": "The text explicitly states: 'They picked a line of latitude for the same reason you pick a meridian: it is geometrically clean, cartographically simple, and requires no knowledge of the actual terrain.'"}, {"text": "Because it followed the traditional territorial claims of Indigenous nations already living in the region.", "isCorrect": false, "rationale": "The text notes the border 'slices the Blackfoot Confederacy into two jurisdictions,' indicating Indigenous boundaries were not consulted or respected."}], "id": "q01"}, {"question": "What was the Sykes-Picot Agreement of 1916?", "options": [{"text": "A peace treaty between the Ottoman Empire and the Allied Powers ending Ottoman involvement in World War I.", "isCorrect": false, "rationale": "Sykes-Picot was not a peace treaty with the Ottomans; it was a secret agreement between British and French diplomats to divide Ottoman Arab territories between their spheres of influence."}, {"text": "A secret agreement between British diplomat Mark Sykes and French diplomat François Georges-Picot dividing Arab territories of the collapsing Ottoman Empire between their respective countries' spheres of influence.", "isCorrect": true, "rationale": "The text describes this precisely: Sykes and Picot 'divided the Arab territories of the collapsing Ottoman Empire between their respective countries' spheres of influence' using 'a map and a pencil.'"}, {"text": "A League of Nations agreement establishing the modern borders of Turkey after World War I.", "isCorrect": false, "rationale": "Sykes-Picot divided Arab territories, not Turkish ones. The League of Nations Mandates came later and modified Sykes-Picot; they are distinct agreements."}, {"text": "A UN-sponsored arbitration panel that redrew Middle Eastern borders after World War II.", "isCorrect": false, "rationale": "Sykes-Picot was negotiated in 1916 by two individual diplomats in London and Paris, not by any international body, and pre-dates the UN by three decades."}], "id": "q02"}, {"question": "What was the most significant way in which the Sykes-Picot line failed to reflect the region's actual human geography?", "options": [{"text": "It placed all majority-Shia populations under French control while all majority-Sunni populations fell under British control.", "isCorrect": false, "rationale": "The text does not describe the division along Shia/Sunni lines. It notes that 'Sunni Arab populations were split across it' and that Kurdish communities were divided among four future nation-states."}, {"text": "It followed existing tribal boundaries exactly, making it impossible to create coherent nation-states.", "isCorrect": false, "rationale": "The text says the line 'bore no relation to the region's actual human geography' — the opposite of following existing boundaries."}, {"text": "It split Sunni Arab populations across the line, divided Kurdish communities among four future nation-states, and allocated Mosul based on suspected oil deposits rather than community affinities.", "isCorrect": true, "rationale": "The text explicitly lists these consequences: Sunni Arabs split, Kurds divided among Turkey/Syria/Iraq/Iran, and Mosul allocated to the British zone 'not because its communities had affinities with British interests, but because of the suspected oil deposits underneath it.'"}, {"text": "It gave France control over oil-rich Mesopotamia while giving Britain control over the less valuable Syrian highlands.", "isCorrect": false, "rationale": "The text states the opposite: 'The French got the Syrian highlands; the British got the Mesopotamian river valleys' — the British zone included the oil-associated territory of Mosul."}], "id": "q03"}, {"question": "What was the Berlin Conference of 1884-1885, and what was its most visible lasting consequence on the African continent?", "options": [{"text": "A peace conference among African nations that established the principle of self-determination for colonial territories.", "isCorrect": false, "rationale": "No African representative was present at the Berlin Conference. It was a European-organized event to manage the 'Scramble for Africa' among European colonial powers."}, {"text": "A meeting of 14 European nations (plus the US as observer) that drew colonial borders across Africa — producing approximately 44 straight-line borders that cut across more than 177 ethnic and linguistic groups.", "isCorrect": true, "rationale": "The text describes exactly this: 'Fourteen European nations (and the United States as observer) gathered in Berlin... drawing boundaries across the continent... The result is still visible on a modern political map of Africa: the forty-four straight-line borders that account for approximately 44 percent of Africa's total boundary length, cutting across more than 177 distinct ethnic and linguistic groups.'"}, {"text": "A diplomatic conference between African kingdoms that established trade agreements with European powers.", "isCorrect": false, "rationale": "The conference was organized by European powers for their own benefit; African nations and kingdoms were not represented or consulted."}, {"text": "A UN predecessor organization meeting that outlawed the slave trade and established humanitarian standards for colonial governance.", "isCorrect": false, "rationale": "The Berlin Conference was about establishing rules for colonial land acquisition, not abolishing the slave trade or establishing humanitarian standards."}], "id": "q04"}, {"question": "Why did post-independence African states largely keep their inherited colonial borders, according to the section?", "options": [{"text": "Because newly independent governments believed the colonial borders accurately reflected natural ethnic and cultural divisions.", "isCorrect": false, "rationale": "The text does not suggest post-independence governments thought colonial borders were ethnically accurate — quite the opposite. They kept them as a calculated choice under the OAU principle of uti possidetis."}, {"text": "Because the Organization of African Unity (OAU) enforced inherited borders under the principle of uti possidetis, calculating that renegotiating every border simultaneously was worse than the inherited dysfunction.", "isCorrect": true, "rationale": "The text states: 'Post-independence African states, operating under the OAU principle of inherited colonial borders (uti possidetis), largely kept these lines, calculating that the alternative — renegotiating every border on the continent simultaneously — was worse than the inherited dysfunction.'"}, {"text": "Because international law required newly independent nations to honor the borders established by previous colonial powers.", "isCorrect": false, "rationale": "The text frames this as a political calculation by African states themselves, not as a legal requirement imposed from outside."}, {"text": "Because the European powers that had drawn the borders maintained military presence to enforce them through the independence era.", "isCorrect": false, "rationale": "The text attributes the decision to keep colonial borders to an OAU political calculation, not to continued European enforcement."}], "id": "q05"}, {"question": "What is gerrymandering, and what does the section argue it makes visible that other borders do not?", "options": [{"text": "Gerrymandering is electoral fraud and makes visible how foreign powers interfere in domestic elections.", "isCorrect": false, "rationale": "Gerrymandering is the domestic manipulation of district boundaries by political actors; the text does not describe it as foreign interference."}, {"text": "Gerrymandering is the manipulation of district boundaries for partisan advantage; it makes visible the explicit human agency behind all border-drawing, because we can name who chose the lines and for what purpose.", "isCorrect": true, "rationale": "The text states: 'What gerrymandering makes visible, in a way that the forty-ninth parallel and the Sykes-Picot line do not, is the explicit human agency behind border-drawing. We know someone chose those lines, and we can name them.'"}, {"text": "Gerrymandering is the process of making borders permanent and makes visible how borders acquire legitimacy over time.", "isCorrect": false, "rationale": "Gerrymandering involves drawing and redrawing district boundaries, not making them permanent. It highlights arbitrariness and agency, not legitimacy."}, {"text": "Gerrymandering is a cartographic technique and makes visible the mathematical precision of modern boundary drawing.", "isCorrect": false, "rationale": "While modern gerrymandering uses computational mapping, the section's point is about the political intent and human agency behind the technique, not its mathematical precision."}], "id": "q06"}, {"question": "The section describes a 'central irony' of border enforcement. What is it?", "options": [{"text": "The more a border is contested, the weaker it becomes, until it eventually disappears.", "isCorrect": false, "rationale": "The text describes the opposite dynamic: vigorous enforcement makes borders more real over time, not weaker."}, {"text": "The more vigorously a border is enforced, the more real the differences it was supposed to merely describe eventually become.", "isCorrect": true, "rationale": "The Specimen box states explicitly: 'The more vigorously a border is enforced, the more real the differences it was supposed to merely describe eventually become.' People stop visiting relatives, trade routes shift, languages diverge."}, {"text": "Countries that draw the most borders are paradoxically the least secure.", "isCorrect": false, "rationale": "The text does not make any claim about a relationship between the quantity of borders and national security."}, {"text": "Borders drawn without geographic logic are more durable than borders drawn along natural features.", "isCorrect": false, "rationale": "The text does not compare the durability of geometric versus natural-feature borders; the irony it identifies is about how enforcement creates the differences borders were supposed to reflect."}], "id": "q07"}, {"question": "What does the term 'uti possidetis' refer to in the context of post-colonial African borders?", "options": [{"text": "A UN resolution requiring that all colonial-era agreements be renegotiated within ten years of independence.", "isCorrect": false, "rationale": "Uti possidetis is the opposite principle — it holds that inherited borders should be maintained, not renegotiated."}, {"text": "The OAU principle of maintaining inherited colonial borders, calculated as preferable to the chaos of simultaneous continent-wide renegotiation.", "isCorrect": true, "rationale": "The text describes it as the 'OAU principle of inherited colonial borders (uti possidetis)' — African states kept colonial lines as a pragmatic choice to avoid the worse alternative of universal border renegotiation."}, {"text": "A Latin term from Roman law meaning 'the borders belong to those who drew them.'", "isCorrect": false, "rationale": "The text does not define the Latin origins of the phrase; it uses it as the name of the OAU policy of keeping inherited borders after independence."}, {"text": "An African Union protocol requiring member states to recognize only democratically drawn borders.", "isCorrect": false, "rationale": "Uti possidetis as used here is the opposite — it accepts borders drawn without democratic input (by colonial powers) as the inherited baseline."}], "id": "q08"}, {"question": "Scenario: A historian argues that 'if Sykes and Picot had consulted local populations, the modern Middle East would have no conflict.' Based on this section, what is the most precise critique of that argument?", "options": [{"text": "It is correct — the section shows that consulted populations always produce stable borders.", "isCorrect": false, "rationale": "The section does not claim that consulted populations always produce stable borders; it argues that the specific problem with Sykes-Picot was drawing borders that served imperial interests rather than reflecting actual communities."}, {"text": "It overstates the case: while Sykes-Picot was extreme, all borders are drawn for someone's advantage, and there is no friction-free way to carve continuous human geography into jurisdictions.", "isCorrect": true, "rationale": "The section argues that 'all political boundaries are chosen for someone's advantage' and that any border imposes a sharp line on continuous human geography. Consultation would reduce but not eliminate the fundamental tension between lived geography and administrative boundaries."}, {"text": "It is irrelevant because the Middle Eastern conflict is religious in nature, unrelated to border placement.", "isCorrect": false, "rationale": "The text specifically attributes chronic instability to borders drawn to serve European imperial interests rather than reflect communities — directly rejecting any purely religious or non-geographical explanation."}, {"text": "It is anachronistic; in 1916, democratic consultation was not a recognized international norm.", "isCorrect": false, "rationale": "The section does not defend Sykes-Picot on procedural historical grounds; it makes a structural argument about the problem of drawing borders across continuous human geography regardless of era."}], "id": "q09"}, {"question": "Scenario: A student claims that the 49th parallel US-Canada border 'works fine' and therefore proves that arbitrary borders can become fully legitimate. What does this section's analysis add to that observation?", "options": [{"text": "It agrees fully: the 49th parallel proves that arbitrary borders become natural over time and are indistinguishable from natural features.", "isCorrect": false, "rationale": "The section does not claim that enforced borders become natural; it says enforcement makes the *differences* the border implies more real, but the border itself remains a drawn line, not a discovered natural feature."}, {"text": "It would note that the border 'works' partly because enforcement over time has made the differences it implied real — but the Blackfoot Confederacy's division into two jurisdictions shows that 'works fine' depends on whose experience is being measured.", "isCorrect": true, "rationale": "The section notes the border 'slices the Blackfoot Confederacy into two jurisdictions with different laws, different languages of government, and different histories of colonial policy.' The border's functionality depends on perspective — it works for some and divided others without their consent."}, {"text": "It rejects the claim entirely: the 49th parallel has never been legitimate because it was not chosen by the people it affects.", "isCorrect": false, "rationale": "The section does not argue the 49th parallel lacks all legitimacy; it uses it as an example of a border that became 'real' through enforcement while still being an imposed line, not a natural feature."}, {"text": "It would redirect to the Berlin Conference as more relevant than the 49th parallel for understanding legitimacy.", "isCorrect": false, "rationale": "The section uses both the 49th parallel and the Berlin Conference as complementary examples; it does not dismiss the 49th parallel as less relevant to the legitimacy question."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
