<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Where One Color Ends and Another Begins</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What does the electromagnetic spectrum reveal about the physical boundary between color categories such as blue and green?", "options": [{"text": "It contains clear, natural breakpoints at which one color ends and another begins.", "isCorrect": false, "rationale": "The text explicitly states the spectrum is 'a continuous gradient of wavelengths' with 'no gaps, no fences, no natural breakpoints where one color stops and another begins.'"}, {"text": "It is a continuous gradient that contains no natural divisions between colors.", "isCorrect": true, "rationale": "The text states the physics of light is 'indifferent to the names we give it' and that the spectrum runs from roughly 380 nm to 700 nm as an unbroken continuum."}, {"text": "It contains approximately seven universally recognized divisions corresponding to the colors of the rainbow.", "isCorrect": false, "rationale": "The text makes no claim that the spectrum contains seven natural divisions; the names visible on a spectrum rendering are described as 'carved by human language from a continuum.'"}, {"text": "It provides wavelength boundaries that match the color vocabulary of most human languages.", "isCorrect": false, "rationale": "The text demonstrates the opposite: different languages carve the same continuum differently, confirming that wavelengths do not dictate linguistic color boundaries."}], "id": "q01"}, {"question": "In Welsh, the word 'glas' covers a range that English divides into two separate color terms. Which terms does it span?", "options": [{"text": "Blue and purple", "isCorrect": false, "rationale": "The text states that Welsh 'glas' covers what English carves into 'blue' and 'green,' not blue and purple."}, {"text": "Blue and green", "isCorrect": true, "rationale": "The text explicitly states that Welsh 'glas' covers 'a range that English carves into both blue and green,' encompassing sky, sea, grass, and distant hills."}, {"text": "Green and yellow", "isCorrect": false, "rationale": "The text does not describe 'glas' as covering yellow; the word bridges the English blue/green boundary specifically."}, {"text": "Blue and cyan", "isCorrect": false, "rationale": "The text uses 'glas' to illustrate how a single word can span what English treats as two distinct colors — blue and green, not blue and cyan."}], "id": "q02"}, {"question": "What is notable about Russian color vocabulary compared to English, according to the section?", "options": [{"text": "Russian has no basic term for green, treating it as a shade of blue.", "isCorrect": false, "rationale": "The text's Russian anomaly concerns the blue range specifically: Russian has two separate basic terms for blue ('siniy' and 'goluboy'), not an absence of green."}, {"text": "Russian uses a single term 'siniy' for all shades across the blue-green range.", "isCorrect": false, "rationale": "Russian actually has two separate terms for blue shades — 'siniy' (dark blue) and 'goluboy' (light blue) — not one term for a wide range."}, {"text": "Russian has two separate basic terms for what English calls blue, making the dark/light distinction categorical rather than a matter of degree.", "isCorrect": true, "rationale": "The text states Russian has 'siniy' (dark blue) and 'goluboy' (light blue), making that distinction 'a categorical distinction, not a matter of degree, in the same way that the difference between blue and green is categorical in English.'"}, {"text": "Russian lacks a basic term for blue altogether, borrowing from neighboring Slavic languages.", "isCorrect": false, "rationale": "Russian does not lack blue terms — it has more basic blue terms than English, specifically two distinct ones for different shades of blue."}], "id": "q03"}, {"question": "Berlin and Kay's 1969 research on color vocabulary across 98 languages found which of the following?", "options": [{"text": "Color boundaries are entirely arbitrary cultural conventions with no cross-cultural patterns.", "isCorrect": false, "rationale": "Berlin and Kay found the opposite: there are 'striking cross-cultural regularities,' including a universal sequence in which languages add color terms, showing that color categories are not purely arbitrary."}, {"text": "Both focal color exemplars and category edges are highly consistent across languages.", "isCorrect": false, "rationale": "Berlin and Kay showed that focal colors are consistent across cultures, but 'the edges of the categories are fuzzy, negotiated, and genuinely different between languages.'"}, {"text": "Focal color exemplars are broadly consistent across cultures, but category edges vary between languages.", "isCorrect": true, "rationale": "The text states: 'The focal colors — the best exemplars of a color category — are surprisingly consistent across cultures. But the edges of the categories are fuzzy, negotiated, and genuinely different between languages.'"}, {"text": "Languages add color terms in random order, showing no universal evolutionary sequence.", "isCorrect": false, "rationale": "Berlin and Kay found precisely the opposite: 'the sequence in which languages add color terms follows a universal pattern' — black/white, then red, then yellow or green, and so on."}], "id": "q04"}, {"question": "The Winawer et al. experiment involving Russian and English speakers and blue squares demonstrated which finding about language and perception?", "options": [{"text": "Russian speakers' visual cortex contains more photoreceptors sensitive to the blue range of the spectrum.", "isCorrect": false, "rationale": "The study was behavioral and cognitive, not neuroanatomical. The text locates the effect 'not in the physics, not in the retina, but somewhere in the cognitive processing between sensation and judgment.'"}, {"text": "Language boundaries can create measurable perceptual discontinuities in cognitive processing, even though the physical signal is continuous.", "isCorrect": true, "rationale": "Russian speakers were 'measurably faster' when the task crossed the siniy/goluboy boundary but not when it did not, showing the language boundary 'creates a real perceptual discontinuity' in cognitive processing."}, {"text": "English speakers consistently outperform Russian speakers on tasks involving color discrimination.", "isCorrect": false, "rationale": "The finding was the reverse for the relevant category: Russian speakers were faster when the target crossed their language's blue boundary, suggesting an advantage for that specific distinction, not a general English advantage."}, {"text": "The strong version of the Sapir-Whorf hypothesis was confirmed — speakers of different languages literally see different physical stimuli.", "isCorrect": false, "rationale": "The text says the strong version 'has largely been abandoned.' The experiment is cited as evidence for the weaker version — language affects cognitive processing, not physical sensation."}], "id": "q05"}, {"question": "What is the Sorites paradox, and what does it reveal about the relationship between language and reality?", "options": [{"text": "A mathematical proof that infinite series of additions cannot produce measurable quantities.", "isCorrect": false, "rationale": "The Sorites paradox is a philosophical puzzle about vague predicates, not a mathematical theorem about infinite series."}, {"text": "A logical puzzle showing that because single grains cannot form a heap and gradual additions seem insufficient, no number of grains ever constitutes a heap — revealing that language draws sharp lines through gradients that contain no such breaks.", "isCorrect": true, "rationale": "The text defines the Sorites paradox precisely this way and states: 'The paradox does not show that heaps, baldness, and salary-levels do not exist. It shows that language draws sharp lines through continuous reality, and that any such line is, at some level, arbitrary.'"}, {"text": "An ancient Greek proof that perception is reliable because the senses detect real boundaries in nature.", "isCorrect": false, "rationale": "The Sorites paradox argues against sharp natural boundaries, not for the reliability of perception."}, {"text": "A demonstration that the word 'heap' has no definition and should be removed from language.", "isCorrect": false, "rationale": "The text says the paradox 'does not show that heaps... do not exist.' The conclusion is not that the term should be dropped but that the line marking a 'heap' is drawn, not found in nature."}], "id": "q06"}, {"question": "What does the weak version of the Sapir-Whorf hypothesis (linguistic relativity) claim, as described in this section?", "options": [{"text": "Speakers of a language are cognitively incapable of grasping concepts their language lacks a word for.", "isCorrect": false, "rationale": "That is the strong version, which the text says 'has largely been abandoned' because it 'requires that people with different languages are cognitively incapable of grasping concepts their language doesn't name, which is obviously false.'"}, {"text": "Language structure influences cognitive processing and perception, even if it does not fully determine thought.", "isCorrect": true, "rationale": "The text describes the weak version as having 'real empirical support' and cites the Russian blue experiment as 'one of its clearest demonstrations' — language boundary affects processing speed without eliminating cross-boundary cognition."}, {"text": "The vocabulary of a language perfectly mirrors the natural categories of the physical world.", "isCorrect": false, "rationale": "The section argues the opposite — that language imposes categories on continuous physical reality, and that different languages impose them differently."}, {"text": "Human color perception is determined entirely by genetics, not by language or culture.", "isCorrect": false, "rationale": "The experiments cited show language does influence color processing; a purely genetic account would predict no cross-linguistic behavioral differences in color tasks."}], "id": "q07"}, {"question": "Scenario: An English-speaking student argues that 'of course blue and green are naturally distinct — any child can see they are different colors.' Based on this section, what is the most precise response?", "options": [{"text": "The student is correct; Berlin and Kay proved that the blue-green boundary is biologically universal and not a linguistic convention.", "isCorrect": false, "rationale": "Berlin and Kay showed that focal exemplars are consistent but that category edges vary between languages. Welsh 'glas' and Japanese 'ao' both demonstrate that blue and green are not universally treated as separate."}, {"text": "The student's perception reflects a real cognitive effect of English categorization, but the physical spectrum contains no such boundary — Welsh and Japanese historically treat the same range as a single category.", "isCorrect": true, "rationale": "The section explains that the electromagnetic spectrum is continuous and that languages like Welsh ('glas') and Japanese ('ao') handle the blue-green range as one category. The student's perceptual sharpness at the English boundary is a real cognitive effect of their language, not a discovery of a physical boundary."}, {"text": "The student is wrong; blue and green are indistinguishable to all humans regardless of language background.", "isCorrect": false, "rationale": "The section does not say colors are indistinguishable — focal colors (the most prototypical blue or green) are consistently recognized. What varies is where the boundary falls."}, {"text": "The student's view cannot be evaluated without knowing more about the wavelength thresholds detected by their retinal cones.", "isCorrect": false, "rationale": "The text locates the relevant effect in 'cognitive processing between sensation and judgment,' not in retinal cone thresholds, and directly addresses the cultural variability of the blue-green boundary."}], "id": "q08"}, {"question": "Scenario: A policy-maker argues that color names are 'just labels' with no functional consequences for perception or decision-making. Which finding from this section most directly challenges that view?", "options": [{"text": "The finding that all languages eventually develop words for all colors, showing labels are universal and therefore consequential.", "isCorrect": false, "rationale": "Berlin and Kay showed a universal sequence of color term acquisition, not that all languages end up with the same number of terms. And this would not directly challenge the 'just labels' view."}, {"text": "The Winawer et al. experiment showing Russian speakers matched blue squares faster when the task crossed their language's blue boundary than when it did not.", "isCorrect": true, "rationale": "This experiment directly shows that language categories have measurable functional consequences — Russian speakers' response times differed based on whether the task crossed a linguistic boundary, showing labels are not 'just labels' but affect real cognitive performance."}, {"text": "The finding that the electromagnetic spectrum runs from 380 to 700 nm with no natural breakpoints.", "isCorrect": false, "rationale": "This supports the claim that labels are imposed on a continuum, but it does not directly show that the labels have functional perceptual consequences — it would be compatible with labels being 'just labels.'"}, {"text": "The historical fact that Japanese introduced 'midori' after contact with European color systems.", "isCorrect": false, "rationale": "This illustrates cultural influence on color vocabulary but does not directly demonstrate that the change in labeling had functional perceptual consequences, as the Winawer experiment does."}], "id": "q09"}, {"question": "The section concludes that color lines are 'neither useless nor interchangeable' even though they are drawn rather than discovered. What reasoning supports this conclusion?", "options": [{"text": "Because biological evolution has hard-wired humans to perceive specific color boundaries, making cultural variation impossible.", "isCorrect": false, "rationale": "The section cites extensive cross-cultural variation in color categories, contradicting the idea of hard-wired universal boundaries."}, {"text": "Because drawn lines, such as color names, do real cognitive work — such as making color discrimination faster — even though no line exists in the physical spectrum.", "isCorrect": true, "rationale": "The text states: 'A color name that makes you faster at matching swatches is doing real cognitive work.' The value of drawn lines comes from their cognitive utility, not from their correspondence to natural boundaries."}, {"text": "Because scientific instruments have confirmed that category boundaries correspond exactly to peak wavelength sensitivity in the human eye.", "isCorrect": false, "rationale": "The section makes no such claim; if anything, the cross-cultural variation and the continuous spectrum argument count against a direct mapping of color categories to cone sensitivity peaks."}, {"text": "Because the Berlin-Kay universal sequence proves that color boundaries are determined by physics, not culture.", "isCorrect": false, "rationale": "Berlin and Kay's universal sequence shows regularities in how terms are added, but the section explicitly states color names are 'neither purely arbitrary nor purely natural' — they are useful fictions, not physical discoveries."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
