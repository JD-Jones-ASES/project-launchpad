<script>
var QUESTIONS = [{"question": "Why did Gerardus Mercator's 1569 map inflate the size of land masses near the poles?", "options": [{"text": "He lacked accurate measurements of the polar regions.", "isCorrect": false, "rationale": "The distortion is not a measurement error. Mercator had to apply a deliberate mathematical transformation to make rhumb lines appear as straight lines on a flat surface."}, {"text": "He deliberately exaggerated European and North American territory for political reasons.", "isCorrect": false, "rationale": "The text does not attribute political intent to Mercator. The distortion was a geometric necessity of the mathematical transformation he used to make the map navigable."}, {"text": "Converting the curved surface of a sphere to a flat plane requires a mathematical transformation that stretches features near the poles.", "isCorrect": true, "rationale": "The text explains that sailing on a constant compass bearing required rhumb lines to appear straight. Achieving this required a mathematical transformation that inflated features near the poles — a structural consequence, not an error."}, {"text": "Cartographic instruments in the sixteenth century could not measure area accurately.", "isCorrect": false, "rationale": "The issue is not instrumental limitation but geometric necessity: a sphere cannot be unrolled onto a flat plane without distortion, which is a theorem in differential geometry, not a technological shortcoming."}], "id": "q01"}, {"question": "What does Carl Friedrich Gauss's Theorema Egregium establish about map projections?", "options": [{"text": "It proves that Mercator's projection is the most accurate possible for any purpose.", "isCorrect": false, "rationale": "The theorem makes no claim about which projection is best. It proves that no flat projection can preserve all geometric properties of a sphere simultaneously."}, {"text": "It shows that a sphere and a flat plane have different Gaussian curvature, making it impossible to preserve all geometric properties in any flat projection.", "isCorrect": true, "rationale": "The text states that Gauss proved a flat surface and a sphere have different Gaussian curvature, meaning no smooth, bijective mapping can preserve area, shape, distance, and direction all at once."}, {"text": "It demonstrates that equal-area projections are mathematically superior to conformal ones.", "isCorrect": false, "rationale": "The theorem does not rank projection types. It establishes only that some distortion is unavoidable in any projection, not that any particular type is superior."}, {"text": "It limits navigational accuracy to projections made before the nineteenth century.", "isCorrect": false, "rationale": "The theorem is a statement about geometry, not historical period. It constrains all projections equally, past and present."}], "id": "q02"}, {"question": "Arno Peters promoted his equal-area projection as a political correction to Mercator. What was the cartographic community's main technical objection?", "options": [{"text": "The Gall–Peters projection was identical to Mercator's and provided no actual improvement.", "isCorrect": false, "rationale": "The Gall–Peters projection is an equal-area projection, quite distinct from the conformal Mercator. The objection was not that they were the same but that Gall–Peters introduced its own distortions of shape."}, {"text": "While Gall–Peters preserved area, it distorted shapes — stretching nations near the equator and compressing those near the poles.", "isCorrect": true, "rationale": "The text notes that the Gall–Peters projection, though area-accurate, gave continents a peculiarly elongated appearance because preserving area required sacrificing shape — exactly what the Theorema Egregium predicts."}, {"text": "Peters's projection was invalid because James Gall had already published an identical projection in 1855.", "isCorrect": false, "rationale": "While the text notes the prior publication by Gall, the cartographic community's formal objection was to rectangular world map projections in general, focused on their distortions, not on questions of priority."}, {"text": "The projection failed to preserve navigational rhumb lines, making it dangerous for maritime use.", "isCorrect": false, "rationale": "The Gall–Peters projection was promoted for general visual use, not navigation. The objection was about shape distortion, not navigational utility."}], "id": "q03"}, {"question": "Jorge Luis Borges's story about a 1:1 scale map illustrates which principle about representation?", "options": [{"text": "A perfect map is the ultimate goal of cartography and should be pursued despite its cost.", "isCorrect": false, "rationale": "The text treats the 1:1 map as a reductio ad absurdum, not an ideal. A perfect representation becomes indistinguishable from the thing itself and therefore useless as a map."}, {"text": "The utility of a map comes precisely from its distortions — the omissions and simplifications that make it smaller and more manageable than the territory.", "isCorrect": true, "rationale": "The text states that a perfect representation is indistinguishable from the thing itself and provides no advantage over it. The utility of a map derives from its distortions, not despite them."}, {"text": "Maps become useless when they age, because the territory changes while the map remains static.", "isCorrect": false, "rationale": "The Borges example concerns scale, not age. The 1:1 map is useless immediately upon creation because it is as cumbersome as the territory itself."}, {"text": "Large-scale maps are always less accurate than small-scale ones.", "isCorrect": false, "rationale": "The text is not making a claim about accuracy versus scale. It argues that a map that preserves everything ceases to be a map and becomes a second territory."}], "id": "q04"}, {"question": "The Robinson projection was 'optimized for aesthetic familiarity rather than mathematical correctness.' What does this reveal about the relationship between maps and their purposes?", "options": [{"text": "It reveals that cartographers in the twentieth century became less rigorous than their predecessors.", "isCorrect": false, "rationale": "The text presents the Robinson projection as a deliberate, principled compromise — not a lapse in rigor. The National Geographic Society commissioned it specifically to minimize the worst distortions across all properties."}, {"text": "It shows that the 'correct' projection depends on what the map is for — and therefore every projection is a choice about which truth to tell.", "isCorrect": true, "rationale": "The text concludes: 'The appropriate projection depends on the purpose of the map — which means the appropriate lie depends on what truth you most need to tell.' The Robinson projection was built for a specific purpose: visual palatability."}, {"text": "It proves that the Mercator projection is superior for educational purposes because it was the established standard.", "isCorrect": false, "rationale": "The text criticizes the Mercator projection's use in classrooms precisely because it was not designed for that purpose. The Robinson projection was commissioned as an improvement for general visual display."}, {"text": "It demonstrates that no projection should be used in schools because all of them involve compromise.", "isCorrect": false, "rationale": "The text does not recommend avoiding all projections. It argues for awareness that every projection is optimized for a purpose and distorts other properties accordingly."}], "id": "q05"}, {"question": "A historian argues that the Mercator projection embedded a colonial worldview into Western visual culture. Which of Korzybski's ideas, as presented in this section, best explains how a navigational map could produce such a cultural effect?", "options": [{"text": "The map was deliberately designed as propaganda by European colonial powers.", "isCorrect": false, "rationale": "The text does not claim Mercator had colonial intent. Korzybski's warning is specifically about unintentional effects: when a map optimized for one purpose is used for another, its implicit choices travel invisibly with it."}, {"text": "A map optimized for one purpose carries its implicit choices invisibly into other contexts, where those choices do unnoticed work.", "isCorrect": true, "rationale": "The text states Korzybski's warning: 'the map is not the territory' in the substantive sense that every map embeds a choice about which truths to preserve. When the navigational Mercator was hung in classrooms, its angular-accuracy-over-area tradeoff traveled with it, teaching children a distorted sense of continental scale."}, {"text": "All maps are equally distorted, so the choice of projection has no cultural significance.", "isCorrect": false, "rationale": "The text explicitly argues the opposite: different projections make different political arguments. The Peters controversy made explicit what was implicit in Mercator's long dominance."}, {"text": "Korzybski argued that visual representations are always more dangerous than verbal ones.", "isCorrect": false, "rationale": "The text does not distinguish between visual and verbal representations in this way. Korzybski's warning applies to all representations."}], "id": "q06"}, {"question": "You are advising a development organization that uses the Mercator projection in reports comparing the size of international aid regions. Which projection should they switch to, and why?", "options": [{"text": "The Robinson projection, because it is the official choice of the National Geographic Society.", "isCorrect": false, "rationale": "The Robinson projection compromises all properties and is optimized for aesthetic familiarity. For the specific purpose of comparing the sizes of regions, an equal-area projection is more appropriate."}, {"text": "An equal-area projection such as the Mollweide or Gall–Peters, because the purpose is to compare relative sizes of regions.", "isCorrect": true, "rationale": "The text explains that equal-area projections preserve relative area, making continental and regional comparisons meaningful — exactly the required property when the purpose is comparing aid regions. The 'appropriate lie depends on what truth you most need to tell.'"}, {"text": "The Mercator projection, because its familiarity reduces misinterpretation by non-specialist readers.", "isCorrect": false, "rationale": "Familiarity does not make a projection appropriate for the task. The Mercator projection systematically distorts area at higher latitudes, which would undermine the organization's goal of accurate regional size comparison."}, {"text": "No flat projection at all — they should use globe illustrations instead.", "isCorrect": false, "rationale": "While globes are geometrically accurate, the text notes they 'cannot be folded into a glove compartment' and are impractical. The correct response is to choose the projection appropriate to the purpose, not to abandon flat maps entirely."}], "id": "q07"}, {"question": "The text draws a comparison between a cartographer who distorts area to preserve navigational accuracy, an economist who models humans as rational agents, and a physician who applies discrete diagnostic categories. What common principle do these three cases illustrate?", "options": [{"text": "All three professions are fundamentally dishonest and should be held to stricter standards of accuracy.", "isCorrect": false, "rationale": "The text explicitly calls these 'not a dishonest lie, but a structural one' and calls the simplifier a 'necessary worker.' The concern is not dishonesty but unawareness of the simplification."}, {"text": "Simplification is always dangerous and should be minimized in any professional context.", "isCorrect": false, "rationale": "The text argues that simplification is necessary and that the distortions are unavoidable features of representation. The danger lies not in simplifying but in forgetting that you are doing so."}, {"text": "Every representation preserves some properties by sacrificing others, and problems arise when the distortions become invisible to the user.", "isCorrect": true, "rationale": "The text states: 'The liar is doing necessary work. The problem begins when you forget that you are lying.' Each example involves structural simplification whose distortions cause harm only when the user forgets they are using a model."}, {"text": "Mathematical models are more reliable than visual ones because their distortions are easier to detect.", "isCorrect": false, "rationale": "The text does not rank visual versus mathematical representations. All three comparator cases — the map, the economic model, and the diagnostic category — involve different representational forms, and the warning applies equally to all."}], "id": "q08"}, {"question": "What does the phrase 'the only honest map is the globe' mean in context, and what is the irony the text highlights?", "options": [{"text": "Globes are the only accurate representation of the earth, and all flat maps should be replaced by them.", "isCorrect": false, "rationale": "The text immediately undercuts this reading: globes are 'useless for navigation, cannot be folded into a glove compartment, and cost more to print.' The statement points to a paradox, not a recommendation."}, {"text": "The only representation that avoids distortion is too impractical to use — meaning useful representations necessarily involve distortion.", "isCorrect": true, "rationale": "The text uses the globe as a limiting case: it is geometrically honest but practically useless as a navigation or reference tool. This illustrates the core paradox that distortion is the price of utility in representation."}, {"text": "Globes are dishonest because they omit the undersides of continents when displayed on a stand.", "isCorrect": false, "rationale": "The text does not raise this objection. The honesty of the globe refers to its lack of projection distortion, not to display conventions."}, {"text": "Globe manufacturers are deceptive because they sell an impractical product at a premium price.", "isCorrect": false, "rationale": "The observation about cost is used to underscore impracticality, not to make a commercial criticism. The text's point is structural, not consumerist."}], "id": "q09"}, {"question": "A teacher uses the Mercator projection throughout a geography course because students are familiar with it and find other projections confusing. Applying the argument of this section, what is the most significant risk of this choice?", "options": [{"text": "Students may struggle with navigation because the Mercator projection is not optimized for classroom compasses.", "isCorrect": false, "rationale": "The text does not discuss classroom compasses. The risk identified is perceptual, not navigational — the concern is that students will form inaccurate beliefs about the relative sizes of the world's regions."}, {"text": "Students will learn an outdated projection when modern cartography has moved to better alternatives.", "isCorrect": false, "rationale": "The text does not frame the Mercator projection as merely outdated. The problem is that it was designed for a specific purpose and encodes a specific set of distortions that become invisible when the map is treated as a general-purpose image of the world."}, {"text": "Students will internalize the angular-accuracy tradeoff as a neutral image of the world, learning a distorted sense of continental scale as if it were reality.", "isCorrect": true, "rationale": "The text explicitly warns that the implicit choice 'travels with' the map — invisible and unquestioned — when a navigational tool is hung on a classroom wall. Greenland appearing as large as Africa trained generations to misperceive the world."}, {"text": "Students will resist learning other projections in later courses, causing long-term curricular problems.", "isCorrect": false, "rationale": "Curricular resistance is not the concern the text raises. The concern is epistemic: the distortions of the map are mistaken for facts about the world."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
