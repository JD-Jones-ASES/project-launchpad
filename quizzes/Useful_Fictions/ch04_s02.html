<body>
<div class="quiz-container">

        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; The Species Problem</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "How did Darwin characterize the term 'species' in On the Origin of Species?", "options": [{"text": "As a divinely ordained natural kind that reflects God's original creation.", "isCorrect": false, "rationale": "Darwin spent his career dismantling the theological notion that species were separately and eternally created. The text explicitly notes he rejected this view."}, {"text": "As a convenience label arbitrarily given to sets of closely resembling individuals, not a natural kind carved at the joints of reality.", "isCorrect": true, "rationale": "The text quotes Darwin directly: 'I look at the term species as one arbitrarily given for the sake of convenience to a set of individuals closely resembling each other.' He called it a convenience, not a natural kind."}, {"text": "As the most fundamental unit of biological organization, more basic than genus or family.", "isCorrect": false, "rationale": "Darwin questioned the reality of the species concept altogether, not elevated its status above other taxonomic units."}, {"text": "As a practical classification that perfectly reflects reproductive isolation in all organisms.", "isCorrect": false, "rationale": "Darwin's doubt preceded the Biological Species Concept (1942). He saw 'species' as a convenience, not a criterion-based natural unit."}], "id": "q01"}, {"question": "According to the 1997 review by ornithologist Kevin de Queiroz, how many distinct definitions of 'species' were in active scientific use?", "options": [{"text": "Three", "isCorrect": false, "rationale": "The text states de Queiroz identified 'at least twenty-six distinct definitions,' not three."}, {"text": "Seven", "isCorrect": false, "rationale": "The text specifically states de Queiroz identified 'at least twenty-six distinct definitions of species in active scientific use.'"}, {"text": "At least twenty-six", "isCorrect": true, "rationale": "The text directly states: 'A 1997 review by the ornithologist Kevin de Queiroz identified at least twenty-six distinct definitions of species in active scientific use. The number has not declined since.'"}, {"text": "More than one hundred", "isCorrect": false, "rationale": "The text gives the number as 'at least twenty-six,' not more than one hundred."}], "id": "q02"}, {"question": "What is the main practical problem with the Biological Species Concept (Ernst Mayr, 1942) as described in the section?", "options": [{"text": "It is too inclusive, classifying nearly all organisms as one species because interbreeding is universal.", "isCorrect": false, "rationale": "The Biological Species Concept actually excludes many organisms; its problem is that it does not cover asexually reproducing organisms at all, not that it lumps everything together."}, {"text": "It cannot be applied to asexually reproducing organisms, which include the majority of life on Earth.", "isCorrect": true, "rationale": "The text states: 'It says nothing about organisms that reproduce asexually, which includes a majority of life on Earth — all bacteria, many plants, numerous insects.' Reproductive isolation requires sexual reproduction, which most life does not rely on."}, {"text": "It was developed before genetics and therefore relies entirely on morphological similarity.", "isCorrect": false, "rationale": "Mayr's 1942 concept was based on reproductive isolation, not morphology. The Morphological Species Concept is a separate definition described later in the section."}, {"text": "It produces a proliferation of species, fracturing what was once one species into many.", "isCorrect": false, "rationale": "That fragmentation problem is described for the Phylogenetic Species Concept, not the Biological Species Concept."}], "id": "q03"}, {"question": "What practical consequence does the Phylogenetic Species Concept have for conservation and taxonomy, compared to the Biological Species Concept?", "options": [{"text": "It reduces the number of recognized species, simplifying conservation policy.", "isCorrect": false, "rationale": "The text says the Phylogenetic Species Concept 'produces a proliferation of species,' which expands rather than reduces species counts."}, {"text": "It can only be applied to sexually reproducing organisms, limiting its taxonomic usefulness.", "isCorrect": false, "rationale": "That limitation is specific to the Biological Species Concept. The Phylogenetic Species Concept is described as 'more inclusive of asexual organisms.'"}, {"text": "It produces a proliferation of species — fragmenting single former species into many — with consequent chaos in legal protections and conservation priorities.", "isCorrect": true, "rationale": "The text states: 'what used to be classified as one species often fractures into a dozen under this definition, with corresponding chaos in legal protections, conservation priorities, and textbooks.'"}, {"text": "It relies entirely on physical form, which frequently contradicts genetic evidence.", "isCorrect": false, "rationale": "Relying entirely on physical form describes the Morphological Species Concept, not the Phylogenetic Species Concept."}], "id": "q04"}, {"question": "Ring species such as the Ensatina salamanders of California demonstrate which problem with the species concept?", "options": [{"text": "They prove that species concepts are entirely useless because interbreeding is impossible to verify in the field.", "isCorrect": false, "rationale": "The text explicitly states: 'Ring species don't disprove the utility of species concepts.' They demonstrate a real problem with sharp boundaries, not the uselessness of species concepts altogether."}, {"text": "They show that adjacent populations can always interbreed, proving all organisms belong to one species.", "isCorrect": false, "rationale": "The Ensatina ring species shows the opposite: the two end populations that meet in southern California are too genetically and morphologically different to interbreed, even while every adjacent pair along the ring can."}, {"text": "A connected gradient can have 'same species' at every adjacent step yet 'different species' at the ends — showing that species categories occasionally refuse to close.", "isCorrect": true, "rationale": "The text describes exactly this: 'The ring of Ensatina salamanders is a single connected gradient with same species at every adjacent step and different species at the junction. The category fails to close.'"}, {"text": "Ring species form only in island environments and therefore cannot inform mainland species concepts.", "isCorrect": false, "rationale": "The Ensatina example involves California's coastal ranges and Sierra Nevada, not islands. Herring gulls circling the Arctic provide a second example, also not island-based."}], "id": "q05"}, {"question": "What does the existence of 'pizzly bears' (grolar bears — fertile polar/grizzly hybrids) suggest about the species boundary between polar and grizzly bears?", "options": [{"text": "That polar and grizzly bears are definitively the same species under all modern species concepts.", "isCorrect": false, "rationale": "The text notes most biologists still say they are different species; natural conditions of isolation, not laboratory reproductive capacity, determine species status under the Biological Species Concept."}, {"text": "That reproductive isolation by geography and ecology is not absolute — the two populations diverged recently enough that genetic distance has not become complete.", "isCorrect": true, "rationale": "The text states: 'Their ability to produce fertile offspring suggests the isolation is not complete — they diverged recently enough that the genetic distance has not become absolute.'"}, {"text": "That the Morphological Species Concept is now the most accurate species definition because appearance clearly distinguishes polar from grizzly bears.", "isCorrect": false, "rationale": "The hybrid example complicates, rather than supports, any single species concept. The text uses it to illustrate speciation as a gradient process, not to endorse a particular concept."}, {"text": "That climate change has caused rapid speciation, generating a new third species faster than evolution normally allows.", "isCorrect": false, "rationale": "The text discusses hybrids as evidence of incomplete reproductive isolation, not as evidence of new speciation. The grolar bear is called a hybrid, not a new species."}], "id": "q06"}, {"question": "What is the 'deeper point' about speciation that the section makes using the grolar bear and liger examples?", "options": [{"text": "That captive breeding programs can reverse speciation, returning diverged populations to a common gene pool.", "isCorrect": false, "rationale": "The text is not about reversing speciation; it is about demonstrating that speciation is a gradual process without a definitive boundary moment."}, {"text": "That speciation is a process, not an event — populations diverge gradually with no moment at which they 'flip' from same to different species.", "isCorrect": true, "rationale": "The text states: 'Speciation is a process, not an event. Populations diverge gradually... There is no moment at which two populations flip from same species to different species any more than there is a moment at which a heap of sand becomes a heap.'"}, {"text": "That the Biological Species Concept is more reliable than the Phylogenetic Species Concept for large mammals.", "isCorrect": false, "rationale": "The text does not compare the relative reliability of species concepts for specific taxa; it uses these examples to argue against the general premise of sharp species boundaries."}, {"text": "That ligers disprove the Biological Species Concept because lions and tigers can reproduce in captivity.", "isCorrect": false, "rationale": "The text notes that biologists say natural conditions, not zoo capacity, determine species status. The liger example does not disprove the Biological Species Concept; it illustrates a judgment call about what 'natural conditions' to privilege."}], "id": "q07"}, {"question": "Scenario: A conservation organization is lobbying to have a population of beetles classified as a separate species so they qualify for Endangered Species Act protection. Critics argue they are 'just a subspecies.' Based on this section, what structural problem does this dispute reflect?", "options": [{"text": "The dispute is purely political and has no scientific basis, since species classification is entirely objective.", "isCorrect": false, "rationale": "The section explicitly shows that with at least 26 definitions in use, species classification is not purely objective — different criteria genuinely yield different classifications."}, {"text": "The competing claims reflect that 'species' has at least 26 definitions with no scientific consensus, so the classification depends on which concept is applied — and the legal stakes make the choice consequential.", "isCorrect": true, "rationale": "The text's Specimen box notes: 'Whether a population is one species or two has direct legal implications for endangered species protections — making this a philosophically contested fiction with material stakes.' This is precisely the beetle scenario."}, {"text": "The dispute will be resolved once genetic sequencing confirms or denies reproductive isolation.", "isCorrect": false, "rationale": "Genetic data would help under some definitions but not others. The Biological Species Concept requires reproductive isolation; the Phylogenetic Species Concept requires a unique common ancestor and derived trait; these can yield different answers from the same genetic data."}, {"text": "The critics are scientifically correct, because the Biological Species Concept is the only widely accepted definition of species.", "isCorrect": false, "rationale": "The section explicitly states 'at least twenty-six distinct definitions are in active scientific use' and describes the Biological Species Concept's substantial limitations, making it far from the only accepted definition."}], "id": "q08"}, {"question": "What is the central irony the section identifies about Darwin's legacy regarding the species concept?", "options": [{"text": "Darwin devoted his life to arguing species do not exist while biologists still use species names today.", "isCorrect": false, "rationale": "Darwin did not argue species don't exist; he questioned whether 'species' named a natural kind. The irony is more specific than a straightforward rejection."}, {"text": "Darwin waited twenty-three years to publish, yet his explanation of species formation simultaneously proved that 'species' as a concept is a fiction.", "isCorrect": true, "rationale": "The text states: 'The man who gave us the most powerful explanation of how species form is also the man who proved that species is a fiction.' He explained the process while undermining the category — spending twenty-three years preparing a book about a concept he ultimately doubted."}, {"text": "Darwin adopted the theological species concept from his opponents even as he refuted it.", "isCorrect": false, "rationale": "The text says Darwin 'spent his career dismantling the theological notion' of fixed species. The irony is that his mechanism of evolution proved species boundaries aren't fixed, not that he adopted his opponents' view."}, {"text": "Darwin's theory is now used by conservationists to protect species boundaries that his own work shows are arbitrary.", "isCorrect": false, "rationale": "While an interesting implication, this is not the central irony the section identifies. The text focuses on Darwin's personal intellectual position: he proved how species form while declaring the term a 'convenience.'"}], "id": "q09"}, {"question": "Scenario: A biologist argues that 'the Ensatina ring species proves we should abandon the species concept entirely.' How does the section's analysis respond to that conclusion?", "options": [{"text": "It would agree — ring species conclusively show that species are not real biological entities.", "isCorrect": false, "rationale": "The text explicitly states: 'Ring species don't disprove the utility of species concepts.' The section concludes the opposite of abandonment."}, {"text": "It would agree only for salamanders; other taxa have clearer species boundaries.", "isCorrect": false, "rationale": "The section uses ring species as a general illustration of the gradient problem, not as a salamander-specific exception. The broader argument applies to all speciation."}, {"text": "It would reject the conclusion: ring species show that the category occasionally fails to close, not that the pattern of species grouping in nature is unreal or useless.", "isCorrect": true, "rationale": "The text states: 'Ring species don't disprove the utility of species concepts; they do show that species describes a real pattern in nature that occasionally refuses to be neatly bounded.' The species boundary is a useful fiction, not a worthless one."}, {"text": "It would say the question cannot be answered until all 26 species definitions agree on the Ensatina case.", "isCorrect": false, "rationale": "The section does not wait for definitional consensus; it draws the philosophically principled conclusion that species concepts are useful even while their edges are contested."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
