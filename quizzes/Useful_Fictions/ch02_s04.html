<script>
var QUESTIONS = [{"question": "What is Occam's Razor in its most familiar modern form, and how does this differ from William of Ockham's original intent?", "options": [{"text": "In its modern form it means \"prefer the most mathematically elegant theory\"; Ockham's original was a scientific method for choosing between competing hypotheses.", "isCorrect": false, "rationale": "The text does not describe mathematical elegance as the modern form. And Ockham's original was embedded in a theological argument about universals — it was not primarily a methodological prescription for scientists."}, {"text": "In its modern form it means \"among competing explanations, prefer the simpler one — do not multiply entities beyond necessity\"; Ockham's original Latin formulation was embedded in a theological argument about the nature of universals, not a scientific method.", "isCorrect": true, "rationale": "The text states the modern principle explicitly — prefer simpler explanations, cut unnecessary complexity — and then notes: \"Ockham's original Latin formulation — entia non sunt multiplicanda praeter necessitatem — was embedded in a theological argument about the nature of universals, not a methodological prescription for scientists.\" It migrated into science during the Scientific Revolution."}, {"text": "In its modern form it means \"prefer the theory with fewer empirical anomalies\"; Ockham's original was a principle of logic with no scientific application.", "isCorrect": false, "rationale": "The modern form is about entities/assumptions, not empirical anomalies. And Ockham's principle did have applications beyond theology — it migrated into scientific practice and has been used by scientists ever since."}, {"text": "Both the modern and original forms mean the same thing — the principle has always been used to choose between competing scientific explanations.", "isCorrect": false, "rationale": "The text explicitly distinguishes Ockham's theological context from its later scientific use: the principle \"migrated into scientific practice during the Scientific Revolution\" — it was not originally a scientific principle."}], "id": "q01"}, {"question": "The Copernican heliocentric model displaced the Ptolemaic system partly because of parsimony. What specifically made the Ptolemaic system non-parsimonious?", "options": [{"text": "The Ptolemaic system required the Earth to move, while the heliocentric model kept the Earth stationary — and moving the Earth required more mechanical assumptions.", "isCorrect": false, "rationale": "This reverses the actual positions. The Ptolemaic system kept Earth stationary; the heliocentric model moved Earth around the Sun. The Ptolemaic system's non-parsimony came from epicycles, not from Earth's movement."}, {"text": "The Ptolemaic system had accumulated an elaborate scaffolding of epicycles, equants, and deferents — circles riding on circles, with more added whenever observations revealed discrepancies — making it highly adjustable but riddled with hypothetical motions with no physical basis.", "isCorrect": true, "rationale": "The text describes the Ptolemaic system's non-parsimony precisely: \"By the time Copernicus proposed his heliocentric alternative, the Ptolemaic system had accumulated an elaborate scaffolding of epicycles, equants, and deferents... a baroque clockwork of hypothetical motions that could fit almost any set of observations precisely because it had so many adjustable parameters.\""}, {"text": "The Ptolemaic system required positing thirteen separate planets instead of the six known in Copernicus's time, violating the principle of not multiplying entities.", "isCorrect": false, "rationale": "The Ptolemaic system did not posit extra planets. Its non-parsimony came from epicycles — the geometrical devices added to explain planetary motion within a geocentric framework."}, {"text": "The Ptolemaic system made empirically incorrect predictions that Copernicus's model corrected — the razor favored Copernicus because his model was more accurate.", "isCorrect": false, "rationale": "The razor does not favor accuracy directly; it favors simplicity. Moreover, Copernicus's original model was not dramatically more accurate than Ptolemy's — the razor's advantage was that Copernicus eliminated many epicycles with one conceptual move."}], "id": "q02"}, {"question": "The text describes the geological establishment's rejection of continental drift as \"a misapplication of parsimony.\" What was the misapplication?", "options": [{"text": "Geologists misapplied the razor by preferring fewer continents over more continents, when in fact more continents better fit the fossil evidence.", "isCorrect": false, "rationale": "The issue was not about the number of continents but about the mechanism. The misapplication was preferring a theory with fewer new mechanisms (fixed continents) over one with more (continental drift), even when the simpler mechanism required multiplying unexplained entities (sunken land bridges)."}, {"text": "Geologists preferred the fixed-continent theory's simpler mechanism over Wegener's new large-scale crustal dynamics — but this preference discarded evidence-demanded complexity (plate tectonics) in favor of evidence-independent simplicity, trading necessary reality for a simpler story.", "isCorrect": true, "rationale": "The text makes this diagnosis: \"The simpler theory was wrong.\" The geological establishment's razor cut away necessary complexity — Wegener's plate tectonics was not gratuitous complexity but \"necessary complexity, demanded by evidence the simpler theory could not explain.\""}, {"text": "Geologists misapplied the razor by accepting Wegener's theory too quickly, without waiting for the mechanistic evidence of plate tectonics.", "isCorrect": false, "rationale": "This reverses the history. The geologists rejected Wegener — they did not accept him quickly. The misapplication was in using parsimony to justify the rejection."}, {"text": "Geologists failed to consider the fossil evidence at all, applying the razor to mechanisms while ignoring the data that should have guided their reasoning.", "isCorrect": false, "rationale": "The text says the geological establishment's objection was \"partly mechanical\" but also notes the fossil distribution evidence was \"suggestive.\" The issue was how they weighed the evidence against the need for new mechanisms, not that they ignored evidence entirely."}], "id": "q03"}, {"question": "What is the bias-variance tradeoff in machine learning, and how does it refine the simple injunction \"prefer simpler models\"?", "options": [{"text": "It shows that simpler models always perform better because they avoid overfitting, confirming that parsimony is always the right goal.", "isCorrect": false, "rationale": "The text explicitly argues the opposite: \"The optimal model is not the simplest possible, nor the most complex possible.\" Too-simple models suffer high bias; too-complex models suffer high variance. Neither extreme is optimal."}, {"text": "It shows that increasing model complexity reduces bias but increases variance, so the optimal model minimizes their sum — not the simplest possible, but the level of complexity that captures real signal without absorbing noise.", "isCorrect": true, "rationale": "The text states precisely: \"as you increase a model's complexity, bias decreases and variance increases. The optimal model — the one with the best out-of-sample performance — is not the simplest possible, nor the most complex possible. It is the one that minimizes the sum of bias and variance.\""}, {"text": "It shows that more complex models are always better for prediction because they have access to more data patterns — parsimony should be abandoned in favor of maximum complexity.", "isCorrect": false, "rationale": "This describes overfitting: too-complex models memorize noise and perform poorly on new data. The bias-variance tradeoff shows that maximum complexity is just as wrong as maximum simplicity."}, {"text": "It shows that the best model is always a compromise between the training data and the test data, regardless of its complexity.", "isCorrect": false, "rationale": "The bias-variance tradeoff is more specific than a generic \"compromise.\" It identifies the two specific failure modes (underfitting and overfitting) and the specific goal: minimizing their combined sum, which identifies a specific optimal level of complexity."}], "id": "q04"}, {"question": "What is overfitting, and how does the text connect it to a human cognitive bias?", "options": [{"text": "Overfitting is when a model is too simple and misses genuine patterns in the data, analogous to stereotyping in human cognition.", "isCorrect": false, "rationale": "This describes underfitting (high bias), not overfitting. Overfitting is when a model is too complex, memorizing noise. Stereotyping is the human analogy for underfitting."}, {"text": "Overfitting is when a model is too complex and memorizes noise and quirks in training data, performing perfectly on known data and poorly on new data — analogous to superstition and pattern-matching from insufficient evidence in human reasoning.", "isCorrect": true, "rationale": "The text defines overfitting as high variance: the model \"mistakes noise for signal.\" And in the THINK ABOUT IT box: \"If you're too complex — you refuse to generalize at all, treating every situation as completely unique — you overfit: you've memorized your past experiences but cannot apply any lessons from them to new situations.\" The human analogy is superstition."}, {"text": "Overfitting is when a scientist adds too many epicycles to a theory to fit anomalous observations — like the Ptolemaic system.", "isCorrect": false, "rationale": "Adding epicycles is indeed a form of overfitting, but the text's specific definition of overfitting is the machine learning one: memorizing noise in training data rather than learning the underlying pattern."}, {"text": "Overfitting occurs when a model is trained on too little data, causing its predictions to be unreliable — analogous to confirmation bias in human reasoning.", "isCorrect": false, "rationale": "Overfitting is about model complexity relative to data, not data quantity alone. And the human analogy the text offers is superstition (pattern-matching from insufficient evidence), not confirmation bias specifically."}], "id": "q05"}, {"question": "The phlogiston theory required an element (phlogiston) with no other observable properties, and some formulations gave it negative weight. How does Lavoisier's oxygen theory exemplify correct razor application?", "options": [{"text": "Oxygen theory was more mathematically elegant than phlogiston theory, demonstrating that the razor prefers formal beauty.", "isCorrect": false, "rationale": "The text's argument is about entities and mechanisms, not formal elegance. The razor cuts because oxygen theory \"required no such entity and fit the data better\" — not because it was mathematically prettier."}, {"text": "Lavoisier's oxygen theory eliminated phlogiston — an entity with no observable properties and paradoxical negative weight — and fit the combustion data better using only oxygen, which was independently observable. Fewer entities; better fit; correct razor application.", "isCorrect": true, "rationale": "The text states: \"The phlogiston theory of combustion required an element, phlogiston, that had no other observable properties and even appeared to have negative weight in some formulations. Lavoisier's oxygen theory of combustion required no such entity and fit the data better.\" This is the razor correctly applied: the simpler explanation (no phlogiston needed) also fits the evidence better."}, {"text": "Lavoisier proved phlogiston did not exist through a series of experiments, disproving it empirically rather than on parsimony grounds.", "isCorrect": false, "rationale": "Lavoisier's experiments were part of the argument, but the text presents the case through the lens of parsimony: oxygen theory required fewer entities and fit the data better. The razor and evidence worked together."}, {"text": "The razor correctly favored phlogiston theory over oxygen theory because phlogiston was a simpler, single-element explanation for all combustion phenomena.", "isCorrect": false, "rationale": "This gets the history backwards. The razor favored oxygen theory because phlogiston was a gratuitous entity — posited to save the theory but with no independent observational support. Oxygen had independent support and explanatory power."}], "id": "q06"}, {"question": "Alfred Wegener's continental drift theory was rejected in part through an implicit razorlike argument. What does this reveal about the limitations of parsimony as a principle?", "options": [{"text": "It reveals that parsimony cannot be applied to geological questions because geological processes are too complex for any simple model.", "isCorrect": false, "rationale": "The text does not exclude geology from razorlike reasoning. The lesson is broader: parsimony is a heuristic that requires judgment, and judgments about what counts as \"simpler\" depend on background assumptions that may be wrong."}, {"text": "It reveals that parsimony is always wrong and should be replaced by exhaustive empirical testing before any theory is rejected.", "isCorrect": false, "rationale": "The text defends the razor as valuable when correctly applied (heliocentrism over Ptolemy, oxygen over phlogiston). The lesson from continental drift is about misapplication, not about rejecting parsimony entirely."}, {"text": "It reveals that \"simpler\" is not self-evident: the judgment of what counts as necessary versus gratuitous complexity depends on background assumptions that may themselves be wrong, and every generation of scientists has made parsimony calls that embedded the assumptions of their time.", "isCorrect": true, "rationale": "The text states: \"The danger of the razor, then, is not that it points in the wrong direction. It is that 'simpler' is not always obvious, and the judgment of what counts as necessary complexity depends on background assumptions that may themselves be wrong.\" The geological establishment's assumption that continents don't move biased their parsimony judgment."}, {"text": "It reveals that parsimony should only be applied to theoretical physics, where the concept of unnecessary entities is better defined.", "isCorrect": false, "rationale": "The text presents parsimony as a general principle across sciences, and its analysis of the continental drift failure is precisely to show that the principle requires the same kind of judgment in all fields."}], "id": "q07"}, {"question": "A medical researcher is choosing between two models of disease progression: Model A has 3 parameters and fits 85% of patient cases; Model B has 12 parameters and fits 97% of patient cases. Based on the bias-variance tradeoff described in the section, what questions should guide the choice?", "options": [{"text": "Always choose Model A because parsimony is a virtue and 85% is good enough for medical purposes.", "isCorrect": false, "rationale": "The text explicitly argues against \"simpler is always better\" as a universal principle. 85% vs. 97% fit on training data is not the right comparison — the question is out-of-sample performance and whether the extra parameters capture real signal or noise."}, {"text": "Always choose Model B because higher accuracy means better patient outcomes, and parsimony should yield to empirical performance.", "isCorrect": false, "rationale": "Model B's higher fit may reflect overfitting — memorizing idiosyncrasies of the training cases rather than the underlying disease mechanism. Higher in-sample accuracy does not guarantee better out-of-sample performance."}, {"text": "The right questions are: does Model B's extra complexity reflect genuine biological mechanisms or noise in the training data? How does each model perform on new patient cases it was not trained on? The optimal model minimizes bias and variance together, not one at the expense of the other.", "isCorrect": true, "rationale": "This applies the bias-variance tradeoff directly: \"The optimal model is the one that minimizes the sum of bias and variance.\" Model A may underfit; Model B may overfit. The key test is out-of-sample performance and whether the additional parameters earn their keep by capturing real disease structure."}, {"text": "The choice should be made by domain experts who know the biology, not by statistical principles like the bias-variance tradeoff.", "isCorrect": false, "rationale": "The text's argument is that the bias-variance tradeoff formalizes what domain experts must intuit. Domain expertise informs what complexity is necessary — exactly the judgment the text says the razor requires. The two are complementary, not competing."}], "id": "q08"}, {"question": "Einstein's special relativity eliminated the need for the luminiferous ether. How does this exemplify the correct application of Occam's Razor?", "options": [{"text": "Special relativity was simpler than ether theory because it required fewer equations to describe electromagnetic phenomena.", "isCorrect": false, "rationale": "The text's criterion is entities and mechanisms, not number of equations. Special relativity eliminated the ether — a posited medium — rather than simplifying the mathematical formalism."}, {"text": "Special relativity eliminated the luminiferous ether — an entity that required \"increasingly elaborate properties\" as experiments failed to detect it — and required no medium to carry electromagnetic waves, producing a simpler account that fit all the evidence.", "isCorrect": true, "rationale": "The text states: \"The luminiferous ether — a medium posited to carry electromagnetic waves — required increasingly elaborate properties as experiments failed to detect it. Einstein's special relativity required no medium at all.\" This is the razor correctly applied: the simpler story turned out to be the truer one."}, {"text": "Special relativity was correct because Einstein derived it from first principles rather than from observations that might be wrong, making it more reliable than the empirically-based ether theory.", "isCorrect": false, "rationale": "The text does not distinguish relativity from ether theory on the basis of derivation method. The razor argument is about entities: ether required increasingly elaborate assumptions with no independent detection; relativity required no such entity."}, {"text": "Special relativity correctly applied the razor by finding a middle ground between the too-simple and too-complex accounts of electromagnetic wave propagation.", "isCorrect": false, "rationale": "The text does not frame the ether-relativity case as a bias-variance tradeoff. It is a case of the razor correctly eliminating a gratuitous entity (the ether) that was supported only by the need to save a prior theory."}], "id": "q09"}, {"question": "The Specimen box warns: \"The razor cuts in both directions. It can eliminate unnecessary complexity, or it can eliminate necessary reality.\" What does this double-edged quality imply about how Occam's Razor should be used?", "options": [{"text": "The razor should be abandoned entirely because it is just as likely to lead scientists astray as to guide them correctly.", "isCorrect": false, "rationale": "The text defends the razor's value — heliocentrism, oxygen theory, and relativity are genuine successes. The warning is not to abandon it but to apply it with judgment rather than as a self-applying algorithm."}, {"text": "The razor is only reliable in physics and mathematics; in biology and geology, complexity should always be preferred.", "isCorrect": false, "rationale": "The text does not restrict the razor to physics. Its misapplication in geology (continental drift) is used to illustrate a general warning, not to exclude geology from parsimony reasoning."}, {"text": "The razor should be applied as a question — \"what does this added complexity actually explain that the simpler story cannot?\" — rather than as an automatic algorithm, because judging \"simpler\" requires exactly the kind of contextual judgment no principle can substitute for.", "isCorrect": true, "rationale": "The text states: \"Occam's Razor is not a self-applying algorithm. It is a question: what does this added complexity actually explain that the simpler story cannot? Asking that question well requires exactly the kind of judgment that no principle can substitute for.\""}, {"text": "The razor should be applied symmetrically: whenever you consider simplifying a theory, you should simultaneously consider making it more complex, and choose whichever produces the greater improvement.", "isCorrect": false, "rationale": "This is not the text's prescription. The razor is a heuristic for preferring simplicity when complexity earns no predictive keep — not a symmetric algorithm for simultaneously considering both directions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
