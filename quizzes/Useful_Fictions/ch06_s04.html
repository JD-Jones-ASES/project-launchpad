<script>
var QUESTIONS = [{"question": "The Buddhist doctrine of anatta teaches that the self as ordinarily conceived does not exist. What does exist instead, according to the text?", "options": [{"text": "Pure consciousness — a single unified awareness that underlies all experience but lacks individual identity.", "isCorrect": false, "rationale": "The text presents anatta as specifically rejecting the notion of any fixed center. The five aggregates are not a unified consciousness but interdependent processes without a controller or owner behind them."}, {"text": "The five aggregates (skandhas): form, sensation, perception, mental formations, and consciousness — arising together and producing the functional appearance of a self without any fixed center.", "isCorrect": true, "rationale": "The text states: 'What exists instead are the five aggregates (skandhas): form (the body), sensation, perception, mental formations (including emotions and dispositions), and consciousness. These aggregates arise together, condition each other, and produce the functional appearance of a self. But they are not a self; there is no controller behind them, no owner, no continuous \"who\" that has them.'"}, {"text": "An eternal soul that transmigrates between lives, constituting the real self beneath the appearances.", "isCorrect": false, "rationale": "Anatta is specifically the no-self doctrine — it denies a permanent, substantial self of any kind, including an eternal soul. The text presents it as the claim that 'the grammatical subject \"I\" does not refer to a substance.'"}, {"text": "Nothing at all — anatta is a nihilistic claim that neither experiences nor the person having them exist.", "isCorrect": false, "rationale": "The text explicitly says: 'This is not nihilism. Anatta does not say that nothing exists, or that your experiences are not real.' The claim is about the self as a substance, not about the reality of experience."}], "id": "q01"}, {"question": "When David Hume introspected to find the self, what did he discover — and what conclusion did he draw?", "options": [{"text": "He found a continuous, stable sense of personal identity that confirmed the reality of the unified self.", "isCorrect": false, "rationale": "The text says the opposite: the result of Hume's introspection was 'famously disconcerting.' He never found the self — only successive perceptions — and concluded the self is a bundle, not a substance."}, {"text": "He always stumbled on particular perceptions and could never catch himself without one, concluding the self is a bundle of perceptions with no underlying substantial unity.", "isCorrect": true, "rationale": "The text quotes Hume: 'I always stumble on some particular perception or other... I never can catch myself at any time without a perception.' His conclusion: the self is 'nothing but a bundle or collection of different perceptions, which succeed each other with inconceivable rapidity.'"}, {"text": "He found the Cartesian cogito — the thinking 'I' — confirming that the self is the one thing that cannot be doubted.", "isCorrect": false, "rationale": "Hume reached the opposite conclusion from Descartes. The text places Hume in the empiricist tradition and describes his result as disconcerting precisely because it undermined the common-sense intuition of a unified self."}, {"text": "He found that the self is composed of rational faculties that are distinct from mere perceptions, validating a faculty psychology.", "isCorrect": false, "rationale": "Hume's bundle theory reduces the self entirely to perceptions — not to rational faculties. His conclusion is that there is no deeper layer beneath perception, not that rational faculties constitute the self."}], "id": "q02"}, {"question": "What is the default mode network (DMN), and what role does neuroscience assign to it in relation to the self?", "options": [{"text": "A brain region that stores long-term memories and is responsible for the factual content of personal identity.", "isCorrect": false, "rationale": "The text describes the DMN as active during daydreaming, reminiscing, planning, and social modeling — not as a memory storage system. Its role is narrative generation, not factual storage."}, {"text": "A network of brain areas active when not engaged with external tasks, which weaves memories, perceptions, and social models into the running narrative experienced as the self.", "isCorrect": true, "rationale": "The text states the DMN 'becomes active when we are not engaged with external tasks: when we daydream, reminisce, plan future scenarios, and think about other people's mental states. The DMN is, among other things, the brain's story generator: it weaves together memories, current perceptions, anticipated futures, and social models into the running narrative that we experience as our self.'"}, {"text": "A specialized module that controls voluntary motor actions and generates the sense of authoring one's own behavior.", "isCorrect": false, "rationale": "The DMN is described as the brain's story generator active during task-disengagement, not as a motor control system. The sense of authoring action is more associated with the interpreter module discussed in the split-brain section."}, {"text": "A circuit that maintains attention during sustained focus, explaining the subjective sense of being present in each moment.", "isCorrect": false, "rationale": "The text says the DMN 'deactivates during intense task engagement' — it is suppressed by focused attention, not active during it. This is the opposite of a sustained-attention circuit."}], "id": "q03"}, {"question": "What does Gazzaniga's 'interpreter module' do in split-brain patients, and what does it imply about the self?", "options": [{"text": "It translates signals between the two hemispheres, maintaining unified consciousness after the corpus callosum is severed.", "isCorrect": false, "rationale": "After the corpus callosum is severed, the two hemispheres operate as independent cognitive systems. The interpreter module does not maintain unified consciousness — it confabulates explanations for behavior the left hemisphere did not cause."}, {"text": "A left-hemisphere circuit that generates plausible-sounding narrative explanations for the self's behavior after the fact, regardless of what actually caused it.", "isCorrect": true, "rationale": "The text explains: 'Gazzaniga called this confabulating system the interpreter module: a left-hemisphere circuit whose job is to construct a coherent narrative explaining the self's behavior after the fact, regardless of whether it knows what actually caused the behavior.'"}, {"text": "A right-hemisphere circuit that generates emotional responses while the left hemisphere rationalizes them post-hoc.", "isCorrect": false, "rationale": "The interpreter module as described is a left-hemisphere circuit, not a right-hemisphere one. The text's account specifically attributes confabulation to the left hemisphere constructing post-hoc narratives."}, {"text": "A circuit that detects inconsistencies between the self's beliefs and actions and generates corrective impulses.", "isCorrect": false, "rationale": "The interpreter module in the text is described as confabulating — generating plausible explanations regardless of truth — not as detecting inconsistencies or generating corrections."}], "id": "q04"}, {"question": "What does Douglas Hofstadter's concept of the 'strange loop' contribute to understanding the self as fiction?", "options": [{"text": "It shows that the self is infinitely regressive — every self-model generates a further meta-self that models the model, without end.", "isCorrect": false, "rationale": "The strange loop is not about infinite regress per se. The text describes it as the self being 'a high-level pattern in the brain that is causally real, that acts on the lower-level processes that generate it.' The key insight is causal reality, not infinite regress."}, {"text": "The self is a high-level pattern generated by the brain that, once generated, acts causally on the brain's lower-level processes — a fiction that bootstrapped itself into functional reality.", "isCorrect": true, "rationale": "The text states: 'The self is, on Hofstadter's account, a strange loop: a high-level pattern in the brain that is causally real, that acts on the lower-level processes that generate it, and that exists as a genuine causal power in the world — even though it has no independent existence outside those processes. The self is a fiction that became real by acting as if it were real.'"}, {"text": "The self is an illusion that loops back to its own origins and dissolves into pure process when examined carefully enough.", "isCorrect": false, "rationale": "Hofstadter's account, as presented, does not say the self dissolves — it says the self is 'causally real' and 'a genuine causal power in the world,' even though it lacks independent existence. The strange loop makes the self real through its own functioning."}, {"text": "Mathematical logic, music, and the self all exhibit the same formal structure of incompleteness and are therefore equally unknowable.", "isCorrect": false, "rationale": "While the text mentions Hofstadter's work on mathematical logic and musical counterpoint, it does not draw a conclusion about unknowability. The strange loop concept applied to the self is about causal reality, not epistemic limits."}], "id": "q05"}, {"question": "The text identifies three independent intellectual traditions that converge on the conclusion that the self is a fiction. What are they?", "options": [{"text": "Freudian psychoanalysis, Kantian idealism, and evolutionary psychology.", "isCorrect": false, "rationale": "These traditions are not identified in the text. The three convergent traditions the text specifies are Buddhist philosophy, Scottish Enlightenment empiricism (Hume), and contemporary neuroscience."}, {"text": "Buddhist philosophy, Scottish Enlightenment empiricism (Hume), and contemporary neuroscience of the default mode network.", "isCorrect": true, "rationale": "The text states directly: 'This is the conclusion of Buddhist philosophy, Scottish Enlightenment empiricism, and the contemporary neuroscience of the default mode network, arrived at by entirely different methods over two and a half millennia. The convergence is striking enough to demand serious attention.'"}, {"text": "Stoic philosophy, cognitive psychology, and quantum physics.", "isCorrect": false, "rationale": "None of these traditions appear in the text's account of the self as fiction. The three named are Buddhism, Hume's empiricism, and DMN neuroscience."}, {"text": "Existentialism, phenomenology, and social constructivism.", "isCorrect": false, "rationale": "While these traditions are relevant to questions of selfhood, they are not identified in the text. The three convergent traditions named are Buddhist philosophy, Scottish Enlightenment empiricism, and neuroscience."}], "id": "q06"}, {"question": "Hume reported that after extended philosophical reflection he was 'ready to reject all belief and reasoning,' and could only restore his equilibrium by playing backgammon and attending dinner parties. What does the text use this anecdote to illustrate?", "options": [{"text": "That philosophy is ultimately harmful to psychological wellbeing and should be practiced in moderation.", "isCorrect": false, "rationale": "The text does not draw a prescriptive conclusion about the dangers of philosophy. Hume's anecdote illustrates a specific structural point about useful fictions, not a general warning about philosophical practice."}, {"text": "That the useful fiction of the self reinstalls itself automatically the moment deliberate philosophical resistance stops — the fiction is more robust than the philosophical argument against it.", "isCorrect": true, "rationale": "The text states: 'The useful fiction, it turns out, reinstalls itself the moment you stop actively resisting it.' Hume's return to ordinary life allowed 'the natural fiction of the self to reassert itself without philosophical interference.' This illustrates the self's psychological resilience even against conclusive philosophical argument."}, {"text": "That the best test of a philosophical argument's truth is whether it can be sustained in ordinary life.", "isCorrect": false, "rationale": "While this is a reasonable methodological point, it is not what the text uses the anecdote to illustrate. The text's focus is on the self's persistence as a fiction, not on a criterion for philosophical truth."}, {"text": "That Hume ultimately abandoned the bundle theory because he found it psychologically unsustainable.", "isCorrect": false, "rationale": "Hume did not abandon the bundle theory — the text presents him as finding it 'philosophically inescapable.' What he could not sustain was the practical experience of living without the self-fiction, not the theory itself."}], "id": "q07"}, {"question": "The text states that experiences of profound DMN suppression — in advanced meditators, dissociative patients, or psychedelic states — are 'strikingly consonant with the anatta doctrine.' What specifically do these experiences share with anatta?", "options": [{"text": "The sensation of a unified, eternal self that underlies all personal experience — confirming that the self is real.", "isCorrect": false, "rationale": "This is the opposite of what the text describes. DMN suppression produces the dissolution of the narrative self, not its confirmation. The experiences are consonant with anatta precisely because they resemble the no-self experience."}, {"text": "The sense of a narrative self dissolves; experience continues; there is awareness without a fixed center of awareness.", "isCorrect": true, "rationale": "The text states: 'People who have experienced profound DMN suppression... often report experiences that are strikingly consonant with the anatta doctrine: the sense of a narrative self dissolves; experience continues; there is awareness without a fixed center of awareness.' This matches the Buddhist account of anatta as a process without a fixed center."}, {"text": "Hallucinations of external entities — gods, ancestors, spirits — that reveal the constructed nature of ordinary perception.", "isCorrect": false, "rationale": "The text describes DMN suppression in terms of self-dissolution and centerless awareness — not in terms of external hallucinations. The consonance with anatta is specifically about the loss of the fixed self, not about visionary content."}, {"text": "A sense of moral clarity and freedom from desire that aligns with Buddhist ethics.", "isCorrect": false, "rationale": "The text's comparison is specifically about the structure of the self-experience (no fixed center), not about moral clarity or freedom from desire. The consonance is phenomenological, not ethical."}], "id": "q08"}, {"question": "The 'Think About It' box asks: 'If the self is a useful fiction maintained by a narrative-generating brain circuit, then the question arises: useful to whom?' What paradox does this generate?", "options": [{"text": "It generates no real paradox — the obvious answer is that the self is useful to the organism, and the question is settled.", "isCorrect": false, "rationale": "The text explicitly says that 'The obvious answer — useful to the organism — only relocates the problem.' The question is designed to show that the answer is not obvious and generates a regress."}, {"text": "The supposed beneficiary of the self-fiction (the organism, the brain) is itself not a unified agent — the self was supposed to be the unified agent, but if it is a story the brain tells, the brain is not unified either.", "isCorrect": true, "rationale": "The text states: 'Which organism? The unified self was supposed to be the organism's coherent, persistent agent. If the self is a story the brain tells, then the brain is telling the story to itself, for reasons that serve its functioning. But \"the brain\" is not a single unified agent either — it is a massively parallel distributed system whose constituent processes are not unified by anything like the self they generate.'"}, {"text": "It reveals that the self must be real, since only a real self could benefit from the fiction of a self.", "isCorrect": false, "rationale": "This is precisely the kind of reasoning the 'Think About It' box is designed to undermine. The question does not resolve in favor of the self's reality; it generates a regress that leaves the question open."}, {"text": "It shows that the self is useful to society rather than to the individual, making selfhood a collective rather than personal phenomenon.", "isCorrect": false, "rationale": "The text does not resolve the paradox by attributing selfhood to a social function. The paradox is that locating the beneficiary requires assuming a unity (organism, brain) that is equally problematic."}], "id": "q09"}, {"question": "The closing paragraph of the chapter says: 'The most useful fictions are the ones we cannot stop believing even when we know they are fictions.' How does the self exemplify this claim?", "options": [{"text": "Because the self is ultimately real — the philosophical arguments against it fail, which is why we cannot stop believing in it.", "isCorrect": false, "rationale": "The text explicitly says 'the philosophical and scientific case against a substantial, unified, continuous self is strong.' The persistence of the self-fiction is not due to the failure of the arguments against it, but to the fiction's functional indispensability."}, {"text": "You can read Hume, grasp the split-brain results, and meditate for ten thousand hours — and still wake up tomorrow as yourself, because the self-fiction is functionally indispensable and reinstalls itself regardless of philosophical knowledge.", "isCorrect": true, "rationale": "The text states exactly this: 'You can read every word of Hume, grasp every split-brain result, sit in Buddhist meditation for ten thousand hours, and still wake up tomorrow morning as yourself... The person who isn't there will be back in the morning.' The fiction persists because it is required for deliberation, planning, commitment, moral responsibility, and social trust."}, {"text": "Because the self is a uniquely strong delusion that, unlike other fictions, cannot be seen through by any means.", "isCorrect": false, "rationale": "The text is not claiming the self cannot be partially seen through — Buddhist meditation and philosophical reflection do change one's grip on the self. The point is that even with full philosophical knowledge, the functional fiction reinstalls itself."}, {"text": "Because the concept of a fiction itself presupposes a self that knows it is fictional — making self-denial self-refuting.", "isCorrect": false, "rationale": "While this is an interesting philosophical argument, it is not what the text offers. The text's explanation for the self's persistence is practical: you need the fiction to plan, make promises, and be held morally responsible — not a logical argument about the concept of fiction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
