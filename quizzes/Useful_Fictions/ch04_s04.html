<script>
var QUESTIONS = [{"question": "What is the 'age of majority' as described in this section, and why does the section call it a 'fiction'?", "options": [{"text": "A scientifically determined age at which the brain achieves full development, typically around age 18.", "isCorrect": false, "rationale": "The section explicitly states the age of majority is not a biological discovery. The prefrontal cortex continues developing into the mid-twenties. Different nations set the threshold at ages ranging from 9 to 20."}, {"text": "A sharp numeric line drawn across the continuous gradient of human maturation, varying across countries and calibrated to administrative practicality rather than biological development.", "isCorrect": true, "rationale": "The text states every national threshold is 'a sharp line drawn across a gradient that does not contain sharp lines' — not a biological fact but 'a compromise between administrative practicality and developmental fact.'"}, {"text": "A cultural tradition with ancient roots, which different societies have independently confirmed produces optimal outcomes.", "isCorrect": false, "rationale": "The section presents age of majority thresholds as varying enormously across countries (9 to 20) with no convergence on an empirically validated 'optimal' age — they are administrative choices, not validated cultural wisdom."}, {"text": "A legal formality with no practical consequences, since most adult rights can be accessed informally before the official threshold.", "isCorrect": false, "rationale": "The text opens by listing the extensive practical consequences that attach to the threshold: buying alcohol, voting, signing contracts, criminal liability, military enlistment. These are not mere formalities."}], "id": "q01"}, {"question": "How was the US federal poverty line originally calculated in the 1960s by economist Mollie Orshansky?", "options": [{"text": "By surveying the median income of households in the bottom quintile of earnings and setting the line at 60% of that median.", "isCorrect": false, "rationale": "The text describes a specific food-based calculation: Orshansky multiplied a minimum food budget estimate by three, based on the observation that poor families spent roughly a third of income on food."}, {"text": "By multiplying a Department of Agriculture minimum food budget estimate by three, based on the empirical observation that poor families at the time spent about one-third of income on food.", "isCorrect": true, "rationale": "The text states: 'The poverty line was originally calculated in the 1960s by economist Mollie Orshansky at the Social Security Administration, who multiplied a Department of Agriculture estimate of a minimum food budget by three, on the empirical observation that poor families at the time spent roughly a third of their income on food.'"}, {"text": "By calculating the minimum cost of adequate housing, healthcare, and childcare and adding a food allowance.", "isCorrect": false, "rationale": "The original calculation was food-based, multiplied by three — not a basket of housing, healthcare, and childcare. The text notes that housing, healthcare, and childcare costs have grown faster than food costs since, making the original food-based method increasingly inadequate."}, {"text": "By identifying the income level below which the majority of families could not afford basic clothing and education.", "isCorrect": false, "rationale": "The original calculation was specifically food-based (food budget × 3), with no reference to clothing or education expenditures."}], "id": "q02"}, {"question": "What is the 'benefits cliff,' and how does it illustrate the 'violence of the line'?", "options": [{"text": "A steep rise in benefit generosity above the poverty line that creates incentives to earn just above it.", "isCorrect": false, "rationale": "The benefits cliff is the opposite: crossing the poverty line by a small amount means losing substantial benefits, not gaining them. The 'cliff' is a drop in total income after crossing the threshold."}, {"text": "A situation where crossing the poverty line by a single dollar can trigger the loss of thousands of dollars in benefits — making two economically identical people legally different in ways that affect their material lives enormously.", "isCorrect": true, "rationale": "The text states: 'In many states, crossing the poverty line by a single dollar means losing thousands of dollars in benefits — a situation policy analysts call the benefits cliff.' This is the violence of a line that treats near-identical situations as categorically different."}, {"text": "The gradual reduction of benefits as income rises above the poverty line, designed to smooth the transition out of poverty.", "isCorrect": false, "rationale": "The benefits cliff is specifically about abrupt, not gradual, loss of benefits. A gradual phase-out would mitigate the cliff; the cliff exists precisely because eligibility thresholds are binary."}, {"text": "A tax increase that kicks in when income exceeds the poverty line, effectively punishing people who move out of poverty.", "isCorrect": false, "rationale": "The benefits cliff involves loss of benefit eligibility, not a tax increase. The text focuses on benefits programs (Medicaid, SNAP, CHIP, housing) that cut off at the threshold."}], "id": "q03"}, {"question": "Why has the federal poverty line become an increasingly inaccurate measure of poverty over time?", "options": [{"text": "Because it has been adjusted upward for inflation at a rate that consistently overestimates the true cost of living.", "isCorrect": false, "rationale": "The text suggests the opposite problem: the line has not been fundamentally recalculated to reflect how living costs have changed structurally, not just inflated."}, {"text": "Because housing, healthcare, and childcare costs have grown far faster than food costs since the 1960s, but the threshold is still anchored to a food-based formula that has only been inflation-adjusted, not reconceptualized.", "isCorrect": true, "rationale": "The text states: 'It has not been fundamentally recalculated, despite the fact that housing, healthcare, and childcare costs have grown far faster than food costs in the intervening sixty years. The contemporary poverty line measures something considerably less than contemporary poverty.'"}, {"text": "Because the Department of Agriculture's food cost estimates have been inflated by corporate lobbying since the 1980s.", "isCorrect": false, "rationale": "The text does not mention lobbying or intentional inflation of food cost estimates. The problem is a structural mismatch between the formula's assumptions and how modern household budgets actually work."}, {"text": "Because poverty itself has been eliminated, making the original line irrelevant to current conditions.", "isCorrect": false, "rationale": "The section does not suggest poverty has been eliminated; it argues the poverty line now measures 'something considerably less than contemporary poverty,' implying the line understates current poverty levels."}], "id": "q04"}, {"question": "What is the legal blood alcohol limit for driving in the United States, and what does the section argue about the physiological significance of the precise threshold?", "options": [{"text": "The limit is 0.10%, chosen because it is the level at which reaction time is measurably impaired in all drivers.", "isCorrect": false, "rationale": "The text states the current US limit is 0.08%, lowered from 0.10% in 2000 following federal pressure. The selection of 0.08% was a political and administrative choice, not a physiological discovery."}, {"text": "The limit is 0.08% BAC; the physiological difference between 0.079% and 0.080% is not detectable by any performance test — the sharp line is a political and administrative choice, not a scientific discovery.", "isCorrect": true, "rationale": "The text states: 'The physiological and cognitive difference between these two readings is not detectable by any test of human performance... the sharp line at 0.08 rather than 0.07 or 0.09 is a political and administrative choice, not a scientific discovery.'"}, {"text": "The limit is 0.05%, selected after neuroscience research identified it as the threshold at which alcohol impairs driving-relevant cognition.", "isCorrect": false, "rationale": "The US limit is 0.08%, not 0.05%. The section also argues the threshold reflects political negotiation, not neuroscience discovery."}, {"text": "The limit is 0.08% and was chosen because it is the minimum BAC that can be reliably detected by roadside breathalyzer technology.", "isCorrect": false, "rationale": "The text attributes the 0.08% threshold to a federal political choice (linking highway funding to the lower limit), not to the limitations of detection technology."}], "id": "q05"}, {"question": "What is the Flynn effect, and how does it create a 'perverse complication' for the IQ cutoff used in death penalty cases?", "options": [{"text": "IQ scores have been declining globally, meaning the cutoff must be raised periodically to maintain the same proportion of the population below it.", "isCorrect": false, "rationale": "The Flynn effect documents rising IQ scores, not declining ones. James Flynn found scores rising at roughly three points per decade."}, {"text": "Average IQ scores have been rising at ~3 points per decade; tests are periodically re-normed to keep the mean at 100, meaning a score of 70 represents better actual performance on an older test — so the 'line' is in the same place while what is on either side of it keeps shifting.", "isCorrect": true, "rationale": "The text states: 'A score of 70 on a test normed in 1990 reflects better actual performance than a score of 70 on a test normed in 2020. The line is in the same place; what is on either side of it keeps moving.'"}, {"text": "Repeated IQ testing improves scores by 3 points per test, making death penalty defendants appear more intelligent than they are.", "isCorrect": false, "rationale": "The Flynn effect is a population-level trend documented across the industrialized world over decades, not a per-test improvement in individuals."}, {"text": "IQ tests have become easier to fake, so defendants with low intelligence can now score above 70 by guessing strategically.", "isCorrect": false, "rationale": "The Flynn effect concerns genuine population-wide score increases due to better nutrition, education, and familiarity with abstract test-taking — not test manipulation."}], "id": "q06"}, {"question": "What does Atkins v. Virginia (2002) establish, and how does it illustrate the section's argument about sharp legal thresholds?", "options": [{"text": "It established that capital punishment is unconstitutional for all defendants under age 18, connecting biological development to legal culpability.", "isCorrect": false, "rationale": "Atkins v. Virginia (2002) concerns intellectual disability, not age. The Supreme Court ruling on juvenile offenders is Roper v. Simmons (2005)."}, {"text": "It ruled that executing intellectually disabled defendants violates the Eighth Amendment, using an IQ threshold of 70 — meaning a defendant with IQ 71 can be executed while one with IQ 69 cannot, despite near-identical cognitive situations.", "isCorrect": true, "rationale": "The text states: 'A defendant with an IQ of 71 can be executed; a defendant with an IQ of 69 cannot.' This is the section's clearest illustration of how an administrative line creates categorical legal difference out of near-identical circumstances."}, {"text": "It banned the use of IQ tests in criminal proceedings entirely because they are unreliable measures of actual intelligence.", "isCorrect": false, "rationale": "Atkins v. Virginia incorporated IQ testing into death penalty eligibility determinations; it did not ban IQ tests. The section criticizes the sharp threshold, not the use of IQ evidence."}, {"text": "It established that intellectual disability must be assessed individually in each case rather than by a fixed numeric threshold.", "isCorrect": false, "rationale": "The text describes the IQ 70 cutoff as in active legal use, not replaced by individualized assessment. The Flynn effect complication arises precisely because the numeric cutoff remains operative."}], "id": "q07"}, {"question": "The section argues that sharp lines are necessary despite their arbitrariness. What is the strongest argument the section makes for why administrative thresholds cannot simply be replaced by 'more nuanced, continuous assessments'?", "options": [{"text": "Because continuous assessments would produce too many appeals, clogging the court system.", "isCorrect": false, "rationale": "The text does not cite court system efficiency as the justification for sharp lines. Its argument is more fundamental: case-by-case assessment is administered inconsistently and favors the well-resourced."}, {"text": "Because the human brain is not capable of making reliable judgments about continuous gradients.", "isCorrect": false, "rationale": "The text does not argue cognitive limitations justify sharp lines. Its argument is about administrative consistency and equity in large-scale systems."}, {"text": "Because a system requiring individualized expert assessment for every case will be administered inconsistently, expensively, and in ways that systematically favor those with more resources and better advocates.", "isCorrect": true, "rationale": "The text argues: 'A system that says it depends on the precise details of your situation in ways that require expert individual assessment is a system that will be administered inconsistently, expensively, and in ways that systematically favor those with more resources and better advocates. A sharp line, applied uniformly, has virtues that a gradient assessment does not.'"}, {"text": "Because governments lack the statistical tools necessary to implement continuous benefit eligibility calculations at scale.", "isCorrect": false, "rationale": "The text does not cite technical computational limitations. Its argument is about equity, consistency, and the risk of corruption in individualized discretion."}], "id": "q08"}, {"question": "Scenario: A legislator proposes raising the poverty line to reflect current housing and healthcare costs. Based on this section's analysis, which response best captures the section's framework?", "options": [{"text": "This is unnecessary because the existing line has been adjusted for inflation and therefore reflects current poverty accurately.", "isCorrect": false, "rationale": "The text explicitly states the line 'has not been fundamentally recalculated' and that inflation adjustment is insufficient because housing, healthcare, and childcare have grown faster than food costs since the 1960s."}, {"text": "This reform is justified precisely because the poverty line is an administrative choice that should be updated regularly and contested vigorously — not treated as a natural threshold at which poverty begins.", "isCorrect": true, "rationale": "The text states: 'The poverty line is not a natural threshold at which poverty begins; it is an administrative convenience that should be updated regularly and contested vigorously.' Updating the line is exactly what the section endorses."}, {"text": "This reform is misguided because any threshold will be arbitrary and therefore no threshold can be more accurate than another.", "isCorrect": false, "rationale": "The section does not argue all thresholds are equally valid. It argues that drawn lines can be better or worse calibrated to actual conditions, and that the current poverty line measures 'something considerably less than contemporary poverty.'"}, {"text": "This reform would be justified only if it completely eliminated the benefits cliff, making benefit loss gradual rather than binary.", "isCorrect": false, "rationale": "While addressing the benefits cliff is a valid policy goal, the section endorses updating the threshold itself as a legitimate reform. It does not condition threshold reform on simultaneous cliff elimination."}], "id": "q09"}, {"question": "Scenario: A judge argues that a 17-year-old defendant should be tried as an adult because 'the developmental neuroscience shows teenagers can reason maturely.' How does this section's framework evaluate that argument?", "options": [{"text": "The judge is scientifically correct — developmental neuroscience confirms that most individuals reach adult-level reasoning by age 17.", "isCorrect": false, "rationale": "The text states the prefrontal cortex 'continues developing into the mid-twenties.' If anything, neuroscience argues for later thresholds, not earlier ones."}, {"text": "The judge is correct that neuroscience is the right standard, but should use brain scans rather than behavioral evidence to determine individual maturity.", "isCorrect": false, "rationale": "The section's point is that neuroscience does not contain a threshold year — the prefrontal cortex develops continuously. Individual brain scans would not resolve the boundary problem."}, {"text": "The judge is misusing neuroscience: brain development is a continuous process that does not contain a year at which 'responsibility switches on,' meaning the choice of a cutoff age is a social and moral decision, not a biological discovery.", "isCorrect": true, "rationale": "The text's 'Think About It' box states: 'The developmental neuroscience of adolescent brain maturation does not contain a year at which responsibility switches on. The prefrontal cortex, which governs impulse control and long-term planning, continues developing into the mid-twenties. The choice of a cutoff age is a social and moral choice, not a biological discovery.'"}, {"text": "The judge's argument is valid because the age of criminal responsibility should be set at the point of maximum deterrence, which developmental psychology places at age 17.", "isCorrect": false, "rationale": "The section mentions maximum deterrence as one possible principle for setting the threshold, but explicitly frames all such principles as social and moral choices — not as correct answers given by science. It does not endorse maximum deterrence as the right criterion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
