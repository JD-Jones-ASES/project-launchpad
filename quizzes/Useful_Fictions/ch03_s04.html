<script>
var QUESTIONS = [{"question": "The text opens with: 'The arc of the moral universe is long, but it bends toward justice.' What does the text identify as the fundamental epistemic problem with this statement?", "options": [{"text": "The statement is a misquotation and was never used by Martin Luther King Jr.", "isCorrect": false, "rationale": "The text acknowledges King did use the phrase 'often and movingly'; the attribution problem is that it originated with Theodore Parker in 1853, but the text's main critique is deeper than attribution."}, {"text": "It is a wish expressed in the grammatical form of a fact — there is no empirical basis for the claim that the universe has a direction, and no mechanism that would bend it toward justice rather than indifference or entropy.", "isCorrect": true, "rationale": "The text asks: 'How does anyone know that the universe has an arc? How does anyone know it bends toward justice rather than toward indifference, or entropy, or nothing in particular? The moral universe, to the best of anyone's empirical knowledge, is under no particular obligation to go anywhere. The line is not a description. It is a wish expressed in the grammatical form of a fact.'"}, {"text": "The statement implies historical progress, which has been empirically falsified by events like the Holocaust.", "isCorrect": false, "rationale": "While the Holocaust is later discussed as challenging this belief, the text's opening critique is specifically about the epistemic status of the statement — it is not a description but a wish."}, {"text": "The statement is too vague to have any practical implications for political action.", "isCorrect": false, "rationale": "The text explicitly notes the phrase's power as a motivating force for political action; the problem is not vagueness but the claim's unfalsifiable nature."}], "id": "q01"}, {"question": "The text says belief in a directional history 'appears in nearly every major religious and political tradition, wearing different costumes.' What are the four main variants it identifies?", "options": [{"text": "Capitalism, Communism, Feudalism, and Democracy.", "isCorrect": false, "rationale": "These are economic and political systems, not teleological history frameworks. The text's variants are providential history, karma, Manifest Destiny, Whig history, Hegelian dialectic, and Marxist historical materialism."}, {"text": "Providential history (divine purpose guides events), karma (actions have consequences across lifetimes in a morally ordered universe), Manifest Destiny (expansion as divine fulfillment), and Whig history / Marxist materialism (secular teleologies of progress and inevitability).", "isCorrect": true, "rationale": "The Specimen box lists variants as 'Divine Providence (Christianity, Islam), karma (Hinduism, Buddhism), Manifest Destiny (American expansionism), the Whig interpretation of history, Hegelian dialectic, Marxist historical materialism, progressive inevitabilism.'"}, {"text": "Stoicism, Epicureanism, Neoplatonism, and Deism.", "isCorrect": false, "rationale": "These are ancient philosophical schools not specifically discussed in the text as variants of teleological historical belief."}, {"text": "Progress, Regress, Cycles, and Chaos.", "isCorrect": false, "rationale": "These are abstract historical shapes, not the specific named variants the text catalogues. The text focuses on named traditions, not abstract patterns."}], "id": "q02"}, {"question": "How does the text distinguish karma from simple fatalism?", "options": [{"text": "Karma applies only to collective civilizational fates, while fatalism applies to individuals.", "isCorrect": false, "rationale": "The text describes karma as operating 'at the individual rather than the collective level' — the opposite distinction from this option."}, {"text": "Karma implies moral agency — current choices shape future circumstances — while also affirming that the universe keeps a morally ordered ledger in which accounts are eventually settled.", "isCorrect": true, "rationale": "The text states: 'Karma is not merely fatalism — it implies moral agency, since your current choices shape your future circumstances — but it shares with providential history the deep conviction that the universe is, at bottom, morally ordered.'"}, {"text": "Karma is empirically verifiable through reincarnation research, while fatalism is purely speculative.", "isCorrect": false, "rationale": "The text does not address reincarnation research; it examines karma as a 'useful fiction' — not as an empirically verifiable claim."}, {"text": "Karma is a Hindu concept only; fatalism is universal across all cultures.", "isCorrect": false, "rationale": "The text describes karma as shared by 'Hindu and Buddhist' traditions, not exclusively Hindu, and the distinction it draws is about agency vs. passivity, not cultural origin."}], "id": "q03"}, {"question": "What was the doctrine of Manifest Destiny, and how did teleological fiction function in its ideology?", "options": [{"text": "Manifest Destiny held that American territorial expansion was economically necessary for national survival.", "isCorrect": false, "rationale": "The text frames Manifest Destiny as a theological/teleological claim, not an economic necessity argument: it was about 'fulfillment — the working-out of a divine plan for a chosen nation in a promised land.'"}, {"text": "Manifest Destiny framed American expansion as fulfillment of divine destiny, converting conquest and dispossession from moral choices requiring ethical evaluation into inevitable steps in history's plan — providing 'conscience-salving narrative that made aggression feel like destiny.'", "isCorrect": true, "rationale": "The text states: 'The doctrine of Manifest Destiny held that the expansion of the United States across North America was not conquest but fulfillment… The dispossession of indigenous peoples, the annexation of Mexican territory… were not choices, not moral decisions subject to ordinary ethical evaluation. They were the arc bending. History doing what history does.'"}, {"text": "Manifest Destiny was a response to European colonial competition and justified expansion purely on grounds of national security.", "isCorrect": false, "rationale": "The text identifies Manifest Destiny as a teleological fiction about divine destiny, not a security-based geopolitical argument."}, {"text": "Manifest Destiny was a short-lived slogan with little actual influence on American foreign or domestic policy.", "isCorrect": false, "rationale": "The text presents it as a consequential ideology that framed the dispossession of indigenous peoples and annexation of Mexican territory — significant acts of policy shaped by this fiction."}], "id": "q04"}, {"question": "What is Herbert Butterfield's 'Whig history,' and what is wrong with it?", "options": [{"text": "A British political party's official historiography that systematically distorted the past to favor aristocratic interests.", "isCorrect": false, "rationale": "'Whig' here is Butterfield's metaphorical term for a historiographical vice, not a reference to actual Whig Party political propaganda."}, {"text": "Reading history backward from the present, tracing a triumphant Progress narrative toward where we are now — making history useless as a guide because you can only see what confirmed your predetermined conclusion.", "isCorrect": true, "rationale": "The text states: 'Butterfield coined the phrase Whig history to describe a specific historiographical vice: reading history backwards, starting from the liberal democratic present and tracing a triumphant narrative of Progress toward it… this makes history useless as a guide to understanding the past, because you can only see what confirmed the conclusion you had already reached.'"}, {"text": "Writing history exclusively focused on great men and ignoring social, economic, and cultural forces.", "isCorrect": false, "rationale": "Whig history as Butterfield defines it is about teleological backward-reading, not specifically about great-man historiography."}, {"text": "History written by the politically powerful to suppress the accounts of marginalized groups.", "isCorrect": false, "rationale": "While this is a real historical concern, it is not what Butterfield meant by Whig history. His critique is about teleological backward-projection, not about power and marginalization."}], "id": "q05"}, {"question": "What made Marx's secular teleology especially dangerous in practice, according to the text?", "options": [{"text": "Marx's predictions about capitalist collapse were so accurate that followers felt justified in imposing his system violently.", "isCorrect": false, "rationale": "The text does not attribute the danger to predictive accuracy; it focuses on the role of 'historical inevitability' — the claim that the communist end-state is not just desirable but logically inscribed."}, {"text": "Historical materialism was a claim about inevitability — the communist end-state was not just desirable but inscribed in the logic of history — so any action that accelerated arrival could be justified, however brutal.", "isCorrect": true, "rationale": "The text states: 'The fiction of historical inevitability proved, in practice, extremely dangerous: if the destination is fixed, then any action that accelerates arrival can be justified, however brutal.'"}, {"text": "Marx's writings were deliberately obscure, allowing any political actor to claim Marxist sanction for their preferred policies.", "isCorrect": false, "rationale": "The text's critique is structural, not about obscurity or interpretive flexibility — it concerns the logic of inevitability, not ambiguous writing."}, {"text": "Marxist states had large armies that enforced the ideology by military means on neighboring countries.", "isCorrect": false, "rationale": "The text's critique is philosophical: it is the logical structure of inevitability claims that makes the ideology dangerous, not military capacity."}], "id": "q06"}, {"question": "What does the text say about the psychological function of teleological fictions, drawing on William James?", "options": [{"text": "Teleological beliefs are cognitively simple heuristics that reduce decision-making complexity.", "isCorrect": false, "rationale": "The text draws on William James for a specifically emotional and existential function, not a cognitive efficiency function."}, {"text": "Teleological fictions serve as analgesics: they convert unbearable pointless suffering into endurable suffering that serves a larger unseen good — responding to the human mind's peculiar intolerance for meaninglessness.", "isCorrect": true, "rationale": "The text states: 'The psychologist William James observed that the human mind has a peculiar intolerance for meaninglessness… What we cannot easily endure is suffering that is for nothing… The teleological fiction is, among other things, an analgesic. It converts the unbearable — pointless evil — into the endurable: evil that serves a larger good we cannot yet see.'"}, {"text": "Teleological fictions are economically functional, motivating long-term investment and cooperative behavior within groups.", "isCorrect": false, "rationale": "The text does note that teleological beliefs can 'motivate action,' but James's specific contribution is about the psychology of suffering and meaninglessness, not economics."}, {"text": "Teleological fictions are neurologically ingrained from birth, making them impossible to overcome through rational argument.", "isCorrect": false, "rationale": "The text does not claim teleological beliefs are neurologically innate; it presents them as psychologically motivated responses to the experience of suffering and meaninglessness."}], "id": "q07"}, {"question": "How does the text use the Holocaust as an example in its discussion of teleological belief?", "options": [{"text": "As evidence that teleological beliefs are always false, since the worst atrocity in history happened despite centuries of providential belief.", "isCorrect": false, "rationale": "The text does not argue that the Holocaust falsifies teleological belief; it notes that the Holocaust intensified theological engagement rather than ending it."}, {"text": "As an illustration of why teleological history can justify atrocities: the Holocaust was carried out partly in the name of a teleological fiction about racial inevitability.", "isCorrect": false, "rationale": "While the text does identify teleological fictions as capable of justifying atrocities, the Holocaust passage specifically concerns the Jewish theological tradition's response to theodicy — not the perpetrators' ideology."}, {"text": "To show that the belief in a moral arc persists even after extreme counter-evidence, because the alternative — that the six million dead were meaningless statistical events — is nearly unbearable, and that may itself be an accurate but almost unendurable conclusion.", "isCorrect": true, "rationale": "The text states: 'The Jewish theological tradition has grappled for millennia with the problem of theodicy… The Holocaust produced not the end of this tradition but an explosion of it… What almost nobody could do, it turned out, was simply conclude that history has no arc and that the six million dead were statistically predictable consequences of industrialized tribalism with no further meaning. That conclusion is, perhaps, the accurate one. It is also almost unbearable.'"}, {"text": "As proof that providential history is incompatible with Judaism and should be abandoned as a theological framework.", "isCorrect": false, "rationale": "The text notes that responses to the Holocaust ranged from abandonment of traditional God-concepts to reformulations of Providence — it does not endorse abandonment as the correct response."}], "id": "q08"}, {"question": "The 'Think About It' section asks: what evidence would convince you the arc-toward-justice claim is false? What does this question reveal about the claim's epistemic status?", "options": [{"text": "It reveals that the claim has strong empirical support and would be falsified by any major historical setback.", "isCorrect": false, "rationale": "The question is designed to reveal the opposite: the difficulty of identifying falsifying evidence suggests the claim may not be empirical at all."}, {"text": "It reveals that the claim may be unfalsifiable — functioning not as an empirical description of the universe but as a declaration of how one wants to feel about it, which raises the question of whether the distinction between 'true belief' and 'productive belief' matters.", "isCorrect": true, "rationale": "The text poses: 'If there is no evidence that could falsify it, is it a claim about the world — or a claim about how you want to feel about the world? Is there a meaningful difference between a universe that actually bends toward justice and a universe in which people who believe it bends are better equipped to act justly?'"}, {"text": "It reveals that the claim is easily falsifiable through comparative historical study of justice trends over time.", "isCorrect": false, "rationale": "The text presents this as a question about unfalsifiability, not a prompt to undertake comparative historical research. The difficulty of answering 'what evidence would falsify this?' is the point."}, {"text": "It reveals that justice has a quantifiable definition and can be tracked using social science methods.", "isCorrect": false, "rationale": "The text does not suggest a social science resolution; it frames the question as a philosophical challenge to the epistemic status of the belief itself."}], "id": "q09"}, {"question": "The text says teleological fictions are 'productive and lethal in proportion to the same quality.' What quality does it identify, and provide one example of each outcome?", "options": [{"text": "Simplicity: simple teleologies sustained the civil rights movement; complex teleologies produced the Gulag.", "isCorrect": false, "rationale": "The text does not identify simplicity as the shared quality. The quality identified concerns the certainty of knowing where the story ends."}, {"text": "Unconditional confidence about where the story ends: this sustained civil rights resistance through decades of defeat; the same quality, in the form of historical inevitability, justified the Gulag by framing atrocities as necessary steps toward a fixed destination.", "isCorrect": true, "rationale": "The text states: 'The fiction is productive and lethal in proportion to the same quality: its unconditional confidence that it knows where the story ends.' Examples: the arc sustained the civil rights movement; historical inevitability justified the Gulag."}, {"text": "Emotional intensity: intense belief sustained resistance movements; intense belief also authorized violence.", "isCorrect": false, "rationale": "The text identifies a specific cognitive-epistemic quality ('unconditional confidence that it knows where the story ends'), not generalized emotional intensity, as the shared quality."}, {"text": "Age: ancient teleological beliefs (karma, providence) sustained communities through suffering; modern ones (Marxism) justified atrocities.", "isCorrect": false, "rationale": "Age is not the relevant variable; the text draws the productive-lethal contrast between civil rights movement uses and Gulag-justifying uses of the same type of conviction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
