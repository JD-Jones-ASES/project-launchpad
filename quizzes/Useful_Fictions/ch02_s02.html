<script>
var QUESTIONS = [{"question": "The text says that removing the impossible objects from physics textbooks would cause the field to \"largely collapse.\" What does this claim reveal about the relationship between impossible idealizations and scientific knowledge?", "options": [{"text": "Impossible objects are pedagogical shortcuts that could be replaced with accurate descriptions if scientists invested the effort.", "isCorrect": false, "rationale": "The text explicitly argues that impossible objects are not merely pedagogical shortcuts but the foundational tools by which scientific understanding is built. Replacing them with accurate descriptions would not produce better science — it would destroy the explanatory structure."}, {"text": "Impossible objects are indispensable because they are the primary means by which science identifies causal structure — the relationships between variables that hold across varying conditions.", "isCorrect": true, "rationale": "The text states the goal of scientific explanation is not to describe a specific real system in all its particularity but \"to identify the causal structure underlying a class of phenomena.\" Impossible objects serve this function. The field would collapse without them because they are the engine of structural insight."}, {"text": "Physics is uniquely dependent on impossible objects because it deals with abstract quantities, unlike biology or economics.", "isCorrect": false, "rationale": "The text does not claim physics is uniquely dependent on impossible objects. Chapter's discussion of Homo economicus shows that social science uses the same strategy. The point is about scientific explanation in general."}, {"text": "Impossible objects are useful only during the early stages of a science; mature sciences eventually replace them with accurate models.", "isCorrect": false, "rationale": "The text says impossible objects \"live in introductory textbooks\" but also in \"the equations used daily by engineers and chemists and biologists\" — they remain indispensable in mature practice, not just early stages."}], "id": "q01"}, {"question": "What is the essential difference between an idealization and an approximation, as defined in the KEY CONCEPT box?", "options": [{"text": "An approximation is used in physics; an idealization is used in chemistry and biology.", "isCorrect": false, "rationale": "The text draws no such disciplinary distinction. The difference is conceptual: what kind of relationship to truth each has."}, {"text": "An approximation gets the right answer approximately; an idealization may give exactly the wrong answer for any real system while giving exactly the right structural insight into all of them.", "isCorrect": true, "rationale": "This is directly from the KEY CONCEPT box: \"Unlike an approximation (which gets the right answer, approximately), an idealization may give exactly the wrong answer for any real system while giving exactly the right structural insight into all of them.\" The ideal gas is the example — not an approximation to real gases, but a model of structural relationships."}, {"text": "An idealization is more accurate than an approximation because it uses more sophisticated mathematics.", "isCorrect": false, "rationale": "The text inverts this intuition. An idealization may be less accurate than a good approximation while being more structurally illuminating. The van der Waals equation is more accurate than the ideal gas law and less illuminating."}, {"text": "An approximation involves deliberate omission; an idealization preserves all the features of the real system.", "isCorrect": false, "rationale": "Both involve omission. The distinction is not about whether omission occurs but about the relationship between the simplified description and truth — approximations converge on truth; idealizations may diverge from it while still revealing structural truths."}], "id": "q02"}, {"question": "Why does the text argue that removing friction entirely from a model of a block on a ramp produces more generalizable understanding than including all friction factors?", "options": [{"text": "Because friction is negligible in most real-world applications and including it would over-complicate the analysis.", "isCorrect": false, "rationale": "The text does not claim friction is negligible. It acknowledges friction is \"real and important\" but also \"complicated.\" The argument is about isolation of causal structure, not negligibility."}, {"text": "Because including all friction factors produces an accurate description of one specific block on one specific ramp — telling you almost nothing about any other case — while removing friction exposes the angle-mass-acceleration relationship present in every real case.", "isCorrect": true, "rationale": "The text makes this argument explicitly: complete friction modeling \"will tell you almost nothing about any other block or any other ramp. By removing friction entirely, you expose the relationship between angle, mass, and acceleration that is present in every real case.\" Generality is purchased by deliberate omission."}, {"text": "Because students find frictionless models easier to understand, and pedagogy requires simplification even at the cost of accuracy.", "isCorrect": false, "rationale": "The text's argument is not pedagogical convenience but epistemic structure. The frictionless model is used by practicing engineers and physicists, not merely in introductory classes."}, {"text": "Because friction is an artifact of measurement error that does not appear in the underlying physics.", "isCorrect": false, "rationale": "The text explicitly calls friction \"real and important\" — it is not an artifact of measurement error. The argument is that its complexity, not its unreality, is the reason for omitting it."}], "id": "q03"}, {"question": "The ideal gas law PV = nRT is described as wrong about every real gas that has ever existed. What, then, explains why it \"tells you why gases in general behave the way they do\"?", "options": [{"text": "It is based on averaging real measurements, so its predictions converge on the correct values even if no individual measurement is exactly right.", "isCorrect": false, "rationale": "The ideal gas law is not derived by averaging measurements. It is derived from kinetic theory assumptions about molecules — assumptions known to be false for real gases. Its accuracy at certain conditions is a consequence of real gases approximating ideal behavior, not of averaging."}, {"text": "By assuming away molecular volume and intermolecular forces, it reveals the structural relationship — moving molecules, elastic collisions, kinetic energy proportional to temperature — that underlies all real gas behavior, even when real gases deviate from the predictions.", "isCorrect": true, "rationale": "The text states the ideal gas law \"tells you why gases in general behave the way they do: because molecules are moving, because they collide, and because their average kinetic energy is proportional to temperature.\" The false assumptions strip away deviations to expose the causal skeleton."}, {"text": "It correctly predicts gas behavior at all conditions except very high pressures and very low temperatures, which are rare in practice.", "isCorrect": false, "rationale": "The text's argument is not about frequency of exceptions. It argues that the ideal gas law is illuminating because of what it reveals structurally — not because exceptions are rare."}, {"text": "The van der Waals correction terms can always be applied after the fact, so the ideal gas law is a good first approximation.", "isCorrect": false, "rationale": "The text explicitly contrasts the ideal gas law (which reveals structure) with the van der Waals equation (which is more accurate but \"tells you how a specific real gas behaves\" rather than why gases in general behave as they do). The point is about structural insight, not about correction factors."}], "id": "q04"}, {"question": "The van der Waals equation is more accurate than the ideal gas law. Yet the text describes it as \"less illuminating.\" What does this reveal about the relationship between accuracy and understanding?", "options": [{"text": "Accuracy and understanding are the same thing — if a model is more accurate, it necessarily provides more understanding.", "isCorrect": false, "rationale": "The van der Waals example directly contradicts this. More accurate (van der Waals) can mean less illuminating if the accuracy is purchased by adding empirical correction terms that obscure the underlying causal structure."}, {"text": "Accuracy and understanding can come apart: the van der Waals equation adds empirical correction terms (a and b) that fit specific gases better while obscuring the structural insight that the ideal gas law makes transparent.", "isCorrect": true, "rationale": "The text states: \"The van der Waals equation is more accurate. It is also less illuminating. It tells you how a specific real gas behaves. The ideal gas law tells you why gases in general behave the way they do.\" The correction terms improve fit while hiding structure."}, {"text": "The van der Waals equation was a historical mistake because it complicated a simpler theory without improving predictions.", "isCorrect": false, "rationale": "The text does not call it a mistake. Johannes van der Waals won the Nobel Prize for it. It is a genuine improvement in accuracy — but accuracy is not the only scientific virtue, and the text's argument is that illumination is the separate virtue the ideal gas law better serves."}, {"text": "Understanding is more important than accuracy in theoretical physics but less important in engineering and applied contexts.", "isCorrect": false, "rationale": "The text draws no such disciplinary division. The argument applies broadly: structural insight from idealizations is valuable across all contexts."}], "id": "q05"}, {"question": "Newton treated both the Earth and the Moon as point masses when calculating gravitational attraction. The text calls this \"wildly wrong\" about what the Earth actually is — yet it produces spacecraft-trajectory precision. What makes this idealization succeed?", "options": [{"text": "The Earth and Moon happen to be so large that their internal structure is irrelevant to any practical calculation.", "isCorrect": false, "rationale": "Size is not the explanation. The text gives a specific geometric reason: Newton's theorem about spherically symmetric mass distributions."}, {"text": "Newton proved that a spherically symmetric mass distribution exerts exactly the same gravitational force on an external point as a point mass of the same total mass at its center — and real planets are approximately spherically symmetric, so the key assumption holds well enough.", "isCorrect": true, "rationale": "The text states: \"Newton proved that a spherically symmetric mass distribution exerts exactly the same gravitational force on an external point as a point mass of the same total mass located at its center. Real planets are approximately spherically symmetric. Therefore the point mass gives approximately the right answer.\" The real object satisfies the idealization's key assumption."}, {"text": "The errors introduced by treating planets as point masses cancel out over long orbital periods, so trajectory calculations remain accurate.", "isCorrect": false, "rationale": "The text explains the success through a theorem, not through error cancellation over time. Newton's proof provides the geometric justification."}, {"text": "Spacecraft trajectories are so far from Earth that the detailed shape of the Earth has negligible effect on the gravitational field.", "isCorrect": false, "rationale": "While distance reduces some effects, the text's explanation is the spherical symmetry theorem — the reason the idealization works is geometric, not merely a function of distance."}], "id": "q06"}, {"question": "The text states that \"idealizations are not random fictions. They are chosen because the real system shares the idealization's key properties at a useful level of approximation.\" A geologist models the Earth's crust as a rigid, homogeneous plate. Under what conditions would this idealization be productive?", "options": [{"text": "When studying processes that occur on timescales shorter than the timescale of crustal deformation, making the crust's rigidity an appropriate approximation.", "isCorrect": true, "rationale": "This applies the text's principle directly: the idealization is chosen because the real system (the crust) shares the idealization's key property (approximate rigidity) at a useful level of approximation — specifically, when the question involves timescales shorter than significant deformation. The idealization's wrongness does not matter for those purposes."}, {"text": "When the geologist wants to model earthquake generation, since the rigid-plate assumption captures fault mechanics.", "isCorrect": false, "rationale": "Earthquakes are precisely where crustal rigidity breaks down — they occur when the crust fractures. The idealization would fail for this question because the rigid-plate assumption misses the key property (deformation under stress) that drives earthquakes."}, {"text": "Always, because the crust is macroscopically the most rigid substance in the Earth system.", "isCorrect": false, "rationale": "\"Always\" contradicts the chapter's core argument. Idealizations succeed for specific questions, not universally. Continental drift is an example where treating continents as fixed (a similar idealization) produced catastrophic error."}, {"text": "When the geologist is building a model for public communication, where simplification is more important than accuracy.", "isCorrect": false, "rationale": "The chapter's argument is about scientific productivity, not communication strategy. Idealizations are productive tools for discovery, not just simplifications for lay audiences."}], "id": "q07"}, {"question": "The text describes the idealization strategy as \"philosophically related to the Platonic idea that the world of appearances is a confused copy of a more perfect underlying reality.\" Yet it adds that the strategy \"does not require Platonism.\" Why is this distinction important?", "options": [{"text": "It allows scientists who reject philosophy entirely to use idealizations without intellectual inconsistency.", "isCorrect": false, "rationale": "The text does not suggest that scientists can or should reject philosophy. The distinction is epistemological: you can accept the practical value of idealizations without committing to a specific metaphysical view about the ultimate nature of reality."}, {"text": "It clarifies that idealizations are a practical method for isolating causal structure, not a metaphysical claim that ideal objects are more real than the physical world — an empiricist can use them without believing in Platonic forms.", "isCorrect": true, "rationale": "The text states: \"You can be a thoroughgoing empiricist and still recognize that deliberately impossible objects are the most productive entry point into understanding real ones.\" The method is justified by its results, not by Platonic metaphysics."}, {"text": "It shows that Plato was wrong about the nature of forms, and that modern science has superseded ancient philosophy entirely.", "isCorrect": false, "rationale": "The text does not claim Plato was wrong. It acknowledges the philosophical kinship while noting that the scientific use of idealizations is independent of that metaphysical commitment."}, {"text": "It means that idealizations are only appropriate in physics, where the Platonic tradition has historical roots.", "isCorrect": false, "rationale": "The text explicitly extends idealizations beyond physics — to chemistry, biology, and (in subsequent sections) economics. The point is that the method is universal and independent of any particular philosophical tradition."}], "id": "q08"}, {"question": "Robert Boyle's discovery of the inverse pressure-volume relationship was made using a J-shaped glass tube and trapped air. The text presents this as a case study in \"productive wrongness.\" What is the productive wrongness in Boyle's Law?", "options": [{"text": "Boyle made measurement errors that were later corrected by more careful experimenters.", "isCorrect": false, "rationale": "The text does not describe Boyle's Law as the result of experimental error. The productive wrongness is in the idealization — the law describes ideal gas behavior, which no real gas perfectly exhibits."}, {"text": "Boyle's Law (PV = k) is wrong about every real gas — it fails at high pressures, low temperatures, and near liquefaction — yet it correctly identifies the inversely proportional relationship between pressure and volume that underlies all real gas behavior.", "isCorrect": true, "rationale": "The text explicitly states \"This law is wrong. It is wrong about every real gas that has ever existed\" — and then explains at which conditions real gases deviate. Yet it reveals the structural relationship that prompted van der Waals and the full ideal gas law PV = nRT. The wrongness is productive because it exposes real structure."}, {"text": "Boyle was wrong about the cause of the relationship — he attributed it to elasticity of air rather than molecular kinetics.", "isCorrect": false, "rationale": "The text focuses on the deviations of real gases from the law, not on Boyle's causal explanation. The productive wrongness is at the level of idealization, not mechanistic interpretation."}, {"text": "Boyle's experimental design was flawed in a way that happened to produce a useful result by accident.", "isCorrect": false, "rationale": "The text treats Boyle's experiment as careful and his results as genuine. The \"wrongness\" is in the idealization that the law embodies, not in his experimental technique."}], "id": "q09"}, {"question": "An economist arguing for a particular trade policy uses a model that assumes perfect market competition — no monopolies, no transaction costs, no information asymmetries. A critic objects that \"these conditions never exist in the real world.\" Based on the section's argument about idealizations, how should we evaluate the economist's model?", "options": [{"text": "The model is invalid because its assumptions are known to be false, and policies based on false models inevitably fail.", "isCorrect": false, "rationale": "This restates the intuition the chapter argues against. The text shows that knowing a model's assumptions are false does not automatically invalidate it — the relevant question is whether the falseness matters for the specific purpose."}, {"text": "The model is valid because economists are experts and their simplifications should be trusted.", "isCorrect": false, "rationale": "The chapter does not appeal to expertise as a justification for idealizations. The question is always whether the omissions matter for the purpose at hand."}, {"text": "The model must be evaluated by whether the idealized assumptions isolate the causal structure relevant to the policy question — the model can yield structural insight even when every assumption is technically false, as long as the real system shares the key properties at a useful level.", "isCorrect": true, "rationale": "This applies the chapter's principle directly. The text argues: \"idealizations are not random fictions. They are chosen because the real system shares the idealization's key properties at a useful level of approximation.\" The economist's model must be assessed by whether the perfect-competition assumption isolates the relevant causal mechanisms."}, {"text": "The model is useful for prediction but useless for policy, because policy requires accuracy about real conditions, not just structural insight.", "isCorrect": false, "rationale": "The text draws no such distinction between prediction and policy uses. The argument about the productive value of idealizations applies to both contexts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
