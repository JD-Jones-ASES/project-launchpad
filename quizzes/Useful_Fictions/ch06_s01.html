<body>
<div class="quiz-container">

        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; Corporate Persons</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the legal status of the headnote written by court reporter Bancroft Davis in the Santa Clara County v. Southern Pacific Railroad (1886) case?", "options": [{"text": "It was a binding Supreme Court ruling that formally granted corporations Fourteenth Amendment rights.", "isCorrect": false, "rationale": "The text explicitly states that 'headnotes are not law. They are not even the court's words. They are a clerk's administrative convenience' with 'no legal force whatsoever.'"}, {"text": "It was a non-binding administrative summary with no legal force that subsequent courts treated as authoritative anyway.", "isCorrect": true, "rationale": "The text describes the headnote as something that 'precedes the opinion and has no legal force whatsoever,' yet 'subsequent courts treated the headnote as authoritative,' making it the basis of the corporate personhood doctrine."}, {"text": "It was a formal concurring opinion written by Chief Justice Waite endorsing corporate personhood.", "isCorrect": false, "rationale": "Chief Justice Waite made a prefatory oral remark before arguments; Bancroft Davis — the court reporter, not Waite — wrote the headnote. The case itself was 'decided on other grounds.'"}, {"text": "It was a legislative amendment to the Fourteenth Amendment authorizing its application to corporations.", "isCorrect": false, "rationale": "No legislative amendment is described. The doctrine emerged from a court reporter's headnote, not from any change to the constitutional text."}], "id": "q01"}, {"question": "According to the text, what core coordination problem does the legal fiction of corporate personhood primarily solve?", "options": [{"text": "It prevents corporations from paying taxes by granting them the same rights as individual citizens.", "isCorrect": false, "rationale": "The text does not frame corporate personhood as a tax avoidance mechanism. The Santa Clara case involved a tax dispute, but the broader purpose described is enabling large-scale capital accumulation, not tax evasion."}, {"text": "It allows businesses to persist across time with a continuous legal identity that outlasts any individual human participant.", "isCorrect": true, "rationale": "The text states that 'a person also dies, retires, changes their mind,' and that without corporate personhood 'it dissolves when they do. It cannot accumulate obligations across generations... cannot maintain a continuous legal identity that outlasts any individual participant.' Corporate personhood solves precisely this problem."}, {"text": "It grants corporate executives immunity from prosecution for business decisions.", "isCorrect": false, "rationale": "The text discusses shareholder limited liability — not executive personal immunity — as the key benefit. Executives can still face liability; it is shareholders whose downside is capped."}, {"text": "It ensures that corporations have the right to vote in elections, giving capital a democratic voice.", "isCorrect": false, "rationale": "The text does not claim corporations have voting rights. Citizens United concerned political expenditures, not voting. The text frames corporate personhood primarily as a commercial and legal device."}], "id": "q02"}, {"question": "The text describes limited liability as 'the financial engine of modern capitalism.' What is the precise asymmetry it creates?", "options": [{"text": "Creditors bear unlimited risk while shareholders bear no risk at all.", "isCorrect": false, "rationale": "Creditors do bear risk, but the asymmetry described is between shareholders' capped downside and their uncapped upside — not an elimination of shareholder risk entirely."}, {"text": "Shareholders can gain unlimited upside from corporate success while their losses are capped at their investment.", "isCorrect": true, "rationale": "The text states precisely: 'If the corporation goes bankrupt, creditors can pursue the corporation's assets but not the personal assets of shareholders. The downside is capped; the upside is not.' This is the asymmetry described as the financial engine of capitalism."}, {"text": "Executives receive unlimited bonuses but face no personal liability for corporate fraud.", "isCorrect": false, "rationale": "The limited liability discussed applies to shareholders, not executives, and the text is analyzing structural financial incentives rather than compensation or fraud law."}, {"text": "Corporations can borrow unlimited capital while governments absorb any resulting losses.", "isCorrect": false, "rationale": "The text does not describe government absorbing corporate losses. The downside is borne by creditors who can only pursue corporate assets, not the broader public or government."}], "id": "q03"}, {"question": "According to the text's definition, what distinguishes a legal fiction from an ordinary legal mistake?", "options": [{"text": "A legal fiction is an accidental error in legal reasoning that courts correct over time.", "isCorrect": false, "rationale": "The text states the opposite: 'legal fictions are not mistakes; they are deliberate tools.' They are purposeful constructions, not errors awaiting correction."}, {"text": "A legal fiction is a deliberately adopted assumption that is false as an empirical claim but load-bearing as a legal one.", "isCorrect": true, "rationale": "The text defines legal fiction as 'a fact assumed or created by a court or legislature... even though it does not correspond to empirical reality' and explicitly says they are 'deliberate tools.' The corporation-as-person is 'false as a biological claim and true as a legal one.'"}, {"text": "A legal fiction is a legislative compromise between two competing legal doctrines.", "isCorrect": false, "rationale": "The text defines legal fictions in terms of assumed facts that are empirically untrue but legally useful — not as legislative compromises between doctrines."}, {"text": "A legal fiction is a temporary legal device used only until the underlying fact can be established.", "isCorrect": false, "rationale": "The text's examples — constructive notice, adverse possession, sovereign immunity — are enduring structural features, not temporary placeholders for future fact-finding."}], "id": "q04"}, {"question": "Justice Stevens' dissent in Citizens United argued that corporations are not 'members of We the People.' What structural problem with useful fictions does the text use this case to illustrate?", "options": [{"text": "That corporate personhood was an unconstitutional doctrine from its inception in 1886.", "isCorrect": false, "rationale": "The text does not claim corporate personhood was unconstitutional from the start. It presents the doctrine as legally contested but not inherently invalid — the problem is its expansion beyond its original domain."}, {"text": "That fictions designed for one domain can migrate into adjacent domains where their premises do not hold.", "isCorrect": true, "rationale": "The text states: 'This is precisely the problem with useful fictions: they are modular. A fiction created for one purpose — enabling large-scale economic coordination — can be imported into adjacent domains with different structural requirements. Corporate personhood was a fiction designed for commercial law. Its migration into constitutional law produces results that would have seemed absurd to the lawyers who crafted the original doctrine.'"}, {"text": "That Supreme Court dissents have greater legal authority than majority opinions in constitutional cases.", "isCorrect": false, "rationale": "The text does not make any claim about the relative authority of dissents versus majority opinions. Stevens' dissent is cited to illustrate a conceptual point about useful fictions, not to argue for its legal superiority."}, {"text": "That corporations intentionally exploit legal fictions to corrupt democratic politics.", "isCorrect": false, "rationale": "The text frames this as a structural feature of how fictions propagate — modular migration into new domains — rather than as a story of intentional corporate manipulation."}], "id": "q05"}, {"question": "The Fourteenth Amendment was ratified in 1868 to protect the citizenship rights of formerly enslaved people. The text calls its application to railroad corporations 'at minimum, an irony worth noting.' What makes this irony structurally significant in the context of the chapter?", "options": [{"text": "It shows that constitutional amendments are always misapplied by the courts that interpret them.", "isCorrect": false, "rationale": "The text does not generalize to all constitutional amendments. The irony is specific to the way a rights-protecting amendment was extended to artificial commercial entities — not a general claim about all constitutional interpretation."}, {"text": "It illustrates how a legal fiction, once given official status, can be extended to serve purposes entirely foreign to its origins.", "isCorrect": true, "rationale": "The Santa Clara headnote — itself of dubious legal status — extended an amendment designed to protect formerly enslaved humans to railroad corporations. This exemplifies the chapter's thesis: fictions created for one purpose migrate and expand, producing consequences no one originally intended."}, {"text": "It proves that Chief Justice Waite intended to grant corporations constitutional rights when he made his prefatory remark.", "isCorrect": false, "rationale": "The text says 'Legal scholars still argue about whether Waite actually meant what Davis wrote' — the text explicitly leaves this question open rather than resolving it."}, {"text": "It demonstrates that the Supreme Court has always prioritized economic interests over civil rights.", "isCorrect": false, "rationale": "The text notes the irony without making this broad normative claim about the Court's priorities across all cases. The focus is on the structural dynamics of legal fictions, not a general indictment of judicial motivation."}], "id": "q06"}, {"question": "You are a corporate attorney advising a new startup. A client asks whether forming a corporation primarily protects her from lawsuits related to the startup's business debts. Based on the text, which response best reflects the structure of limited liability?", "options": [{"text": "Yes — once incorporated, she faces zero personal liability for any corporate obligation under any circumstance.", "isCorrect": false, "rationale": "The text describes limited liability for shareholders specifically with respect to the corporation's obligations, not zero liability in all circumstances. Courts can pierce the corporate veil in cases of fraud, and the text does not claim absolute immunity."}, {"text": "Yes — incorporation means creditors can only pursue the corporation's assets, not her personal assets, if the startup cannot pay its debts.", "isCorrect": true, "rationale": "The text states: 'If the corporation goes bankrupt, creditors can pursue the corporation's assets but not the personal assets of shareholders.' This is precisely the limited liability protection the client is asking about."}, {"text": "No — the legal fiction of personhood only protects the corporation from criminal prosecution, not from civil debt claims.", "isCorrect": false, "rationale": "The text explicitly describes limited liability as protecting shareholders from creditor pursuit of personal assets in cases of corporate insolvency — a civil debt protection, not merely criminal immunity."}, {"text": "No — corporate personhood only enables the corporation to sue others; it provides no personal protection for shareholders.", "isCorrect": false, "rationale": "Limited liability is one of the central functions the text attributes to corporate personhood. The text explicitly names it as one of the key things the corporate legal fiction enables."}], "id": "q07"}, {"question": "The text says the corporation 'cannot go to prison' and 'cannot feel remorse.' In the context of the Specimen box, what tension does this create?", "options": [{"text": "It proves that corporations must be dissolved as they are fundamentally incompatible with a just legal system.", "isCorrect": false, "rationale": "The text does not advocate corporate dissolution. It states that 'modern capitalism is unimaginable without it' and presents the tension as a structural feature of useful fictions, not as grounds for abolition."}, {"text": "The same structural feature that makes corporations powerful — collecting benefits of personhood while evading its full obligations — is also what makes them potentially dangerous.", "isCorrect": true, "rationale": "The Specimen box and the closing paragraph both make this point explicitly: 'The same structural feature that makes it powerful makes it dangerous.' The corporation 'collect[s] the benefits of personhood while evading its full obligations — which is, of course, exactly what it was designed to do.'"}, {"text": "Corporations should be given criminal penalties equal to those imposed on humans to correct this imbalance.", "isCorrect": false, "rationale": "The text describes this tension analytically without prescribing criminal penalties for corporations. It is an observation about the nature of the fiction, not a policy recommendation."}, {"text": "The inability to feel remorse is a minor limitation that is outweighed by the corporation's economic benefits.", "isCorrect": false, "rationale": "The text presents this as a genuine structural paradox — 'many of its most troubling features may also be unimaginable without it' — not as a minor limitation to be dismissed."}], "id": "q08"}, {"question": "A city council passes a zoning law that applies different rules to corporations owning commercial real estate than to individual homeowners. Based on the Citizens United trajectory described in the text, under which constitutional doctrine would a corporation most likely challenge this law?", "options": [{"text": "The Third Amendment's prohibition on quartering soldiers.", "isCorrect": false, "rationale": "The Third Amendment is not mentioned in the text in connection with corporate rights. The text traces corporate constitutional protections through the Fourth, Fifth, and First Amendments — not the Third."}, {"text": "The Fourteenth Amendment's Equal Protection Clause, arguing the law discriminates against corporate persons.", "isCorrect": true, "rationale": "The text traces exactly this trajectory: the Santa Clara headnote extended equal protection to corporations, and 'equal protection rights meant that laws singling out corporations for differential treatment were constitutionally suspect.' A law applying different zoning rules to corporations is precisely the kind of differential treatment equal protection scrutiny would target."}, {"text": "The First Amendment's freedom of religion, arguing zoning infringes on corporate worship.", "isCorrect": false, "rationale": "The text discusses First Amendment speech protections for corporations (Citizens United), not free exercise of religion. A zoning challenge would most naturally invoke equal protection, not religious liberty."}, {"text": "Article I's Commerce Clause, arguing the zoning law obstructs interstate commerce.", "isCorrect": false, "rationale": "The Commerce Clause is not mentioned in the text's account of corporate constitutional rights. The doctrinal trajectory traced runs through the Fourteenth Amendment and then into the First, Fourth, and Fifth Amendments."}], "id": "q09"}, {"question": "The text states: 'Without [limited liability], risk capital would not accumulate at the scale required to build railroads, fund pharmaceutical research, or operate airlines.' What does this claim imply about the relationship between legal fictions and material civilization?", "options": [{"text": "Legal fictions are trivial linguistic conveniences with no real impact on economic outcomes.", "isCorrect": false, "rationale": "The text makes the opposite point — without the specific legal fiction of limited liability, entire industries that define modern civilization would not exist. Legal fictions are described as 'load-bearing,' not trivial."}, {"text": "Some legal fictions are preconditions for the existence of the physical and economic infrastructure of modern societies.", "isCorrect": true, "rationale": "By linking limited liability directly to railroads, pharmaceutical research, and airlines, the text argues that these physical industries could not exist without the legal fiction that enabled the capital formation underlying them. The corporation is 'as indispensable to the industrial economy as double-entry bookkeeping.'"}, {"text": "Legal fictions exist to serve the interests of wealthy investors at the expense of workers and communities.", "isCorrect": false, "rationale": "While the text acknowledges that limited liability enables 'externalization of costs onto workers, communities, and environments,' it does not claim this is the purpose of the fiction. The primary purpose described is solving the coordination problem of capital accumulation."}, {"text": "Modern corporations would function identically without the legal fiction of personhood since real economic forces drive them.", "isCorrect": false, "rationale": "The text explicitly argues the opposite — without corporate personhood and limited liability, the capital accumulation required for large-scale industry would not occur. The legal fiction is described as causally essential."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
