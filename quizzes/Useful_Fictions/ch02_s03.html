<script>
var QUESTIONS = [{"question": "The section describes Homo economicus as \"a spherical cow in human form.\" What does this analogy mean in the context of the chapter's argument?", "options": [{"text": "It means that economists are as out of touch with reality as physicists who study spherical cows — both groups produce useless abstractions.", "isCorrect": false, "rationale": "The chapter defends spherical cows as productive tools, not useless abstractions. The analogy is laudatory: it places Homo economicus in the same tradition of useful fictions as physics idealizations."}, {"text": "It means that Homo economicus is a deliberate idealization — a purposeful simplification that strips away the messy reality of human psychology to isolate economic causal structure, in the same way the spherical cow strips away physical complexity.", "isCorrect": true, "rationale": "The text explicitly uses this phrase and context: the neoclassical economists knew their agents were simplifications — modeling devices chosen for tractability, not claims about how real people behave. The analogy places rational actor theory in the tradition of scientific idealizations established in s01 and s02."}, {"text": "It means that both physicists and economists make embarrassing simplifications that should be replaced by more realistic models as soon as possible.", "isCorrect": false, "rationale": "The chapter's entire argument is against this view. Simplifications are productive tools, not embarrassments to be apologized for."}, {"text": "It means that Homo economicus is a biologically accurate description of a type of human being, just as the spherical cow accurately describes some cows.", "isCorrect": false, "rationale": "The text is unequivocal: Homo economicus \"does not exist. Has never existed. Could not exist, given the actual architecture of the human brain.\" The analogy is about intellectual strategy, not biological accuracy."}], "id": "q01"}, {"question": "Adam Smith's original argument in The Wealth of Nations is commonly mischaracterized. What was Smith actually arguing, and how does the text's account correct the mischaracterization?", "options": [{"text": "Smith argued that people are primarily motivated by pure self-interest and that this drives all economic activity — the text agrees with this characterization.", "isCorrect": false, "rationale": "The text explicitly corrects this: Smith was a nuanced thinker whose other major work, The Theory of Moral Sentiments, is a sophisticated account of human sympathy. The cartoon version of pure self-interest was a later distortion."}, {"text": "Smith argued that markets have a structure — the 'invisible hand' — by which individual decisions, each made for private reasons, aggregate into socially beneficial outcomes, without requiring individual virtue or rationality.", "isCorrect": true, "rationale": "The text states: \"Smith's original argument was not that people are purely self-interested. It was that markets have a structure — the 'invisible hand' — by which individual decisions, each made for private reasons, aggregate into socially beneficial outcomes.\" The miracle is market structure, not human virtue."}, {"text": "Smith argued that economic agents must be perfectly rational for markets to function, and that this rationality should be encouraged by public policy.", "isCorrect": false, "rationale": "The text explicitly says Smith did not require individual rationality. The invisible hand works through market structure, aggregating private decisions regardless of whether any individual is rational."}, {"text": "Smith argued that sympathy and altruism are the primary drivers of economic behavior — a view that later economists correctly abandoned.", "isCorrect": false, "rationale": "The text does not say sympathy drives economic behavior. Smith's Theory of Moral Sentiments accounts for social behavior broadly; his economic argument is about market structure, not altruism."}], "id": "q02"}, {"question": "Why did neoclassical economists choose the assumption of perfect rationality when formalizing economics with mathematics?", "options": [{"text": "Because they conducted surveys and found that most people behave rationally most of the time.", "isCorrect": false, "rationale": "The choice was not empirically motivated. The text states it was a modeling decision: rationality was the most tractable assumption — not a claim validated by survey data."}, {"text": "Because rationality was the most tractable assumption: a rational agent can be modeled with a utility function, which can then be subjected to calculus, optimization, and theorem-proving — making formal economic theory mathematically possible.", "isCorrect": true, "rationale": "The text explains: \"The most tractable assumption about human decision-making is rationality. A rational agent can be modeled. Her choices obey consistency conditions that allow the construction of a utility function. Once you have a utility function, you can do calculus on it, find maxima, derive equilibrium conditions, prove theorems.\""}, {"text": "Because they believed that irrational behavior would be corrected by education and social reform, making rationality a good description of future behavior.", "isCorrect": false, "rationale": "The text says the rational actor was initially a modeling device, not a prediction about future human behavior after reform. The neoclassical economists knew it was a simplification from the start."}, {"text": "Because the assumption of rationality was required by Smith's original theory and the neoclassical economists were following his framework.", "isCorrect": false, "rationale": "The text explicitly distinguishes Smith's non-rationality-dependent argument from the neoclassical formalization. The rational actor was introduced by Jevons, Walras, and Marshall, not derived from Smith."}], "id": "q03"}, {"question": "Describe the classic Kahneman-Tversky experiment with Version A and Version B. What does it demonstrate about real human decision-making?", "options": [{"text": "It demonstrates that humans cannot do probability calculations, and therefore require expert assistance for any financial decisions.", "isCorrect": false, "rationale": "The experiment does not show an inability to calculate. It shows that the framing of outcomes as gains versus losses systematically changes decisions even when the outcomes are mathematically identical — a structural bias, not a computational failure."}, {"text": "It demonstrates loss aversion: humans systematically prefer a certain gain over a gamble (Version A), but switch to preferring a gamble over a certain loss (Version B), even though both versions have identical mathematical outcomes — proving that framing changes decisions contrary to rational actor theory.", "isCorrect": true, "rationale": "The text describes both versions precisely: Version A (given $1,000, choose $500 certain vs. 50% of $1,000) and Version B (given $2,000, choose $500 certain loss vs. 50% chance of $1,000 loss). Both yield $1,500 or $1,000/$2,000. Yet most people choose the certain option in A and the gamble in B — demonstrating loss aversion and frame dependence."}, {"text": "It demonstrates that risk-averse people always prefer certain outcomes while risk-seeking people always prefer gambles — a stable individual trait.", "isCorrect": false, "rationale": "The experiment shows the opposite: the same people are risk-averse in one framing (Version A) and risk-seeking in another (Version B). Risk preference is not a stable individual trait but depends on whether outcomes are framed as gains or losses."}, {"text": "It demonstrates that humans are more rational about losses than about gains, and that economic models should focus on loss scenarios.", "isCorrect": false, "rationale": "The finding is that losses feel roughly twice as painful as equivalent gains feel pleasant — a bias toward loss avoidance that distorts decision-making. This is not a form of rationality about losses but a systematic departure from it."}], "id": "q04"}, {"question": "What is anchoring, and why does it constitute a violation of rational actor theory?", "options": [{"text": "Anchoring is the tendency to rely on the most recent piece of information received. It violates rationality because good decisions should use all available information equally.", "isCorrect": false, "rationale": "Anchoring is specifically about the influence of arbitrary numerical starting points on subsequent estimates — not about recency. And the violation is that irrelevant information (an arbitrary number in the question) infects judgments, which rational actors would ignore."}, {"text": "Anchoring is the tendency for an arbitrary numerical starting point to influence subsequent numerical estimates, even when that starting point is irrelevant. It violates rational actor theory because Homo economicus would be immune to such irrelevant framing effects.", "isCorrect": true, "rationale": "The text describes the experiment: participants asked whether Turkey's population is larger or smaller than 35 million give higher estimates than those asked about 10 or 65 million. The arbitrary number in the question anchors estimates. Homo economicus, the text states, has \"immunity to framing effects\" — anchoring is precisely such an effect."}, {"text": "Anchoring is a useful cognitive strategy that rational actors employ to make faster decisions under uncertainty.", "isCorrect": false, "rationale": "Anchoring is described as a bias — an irrational departure from optimal judgment — not as a useful strategy rational actors employ. Herbert Simon's bounded rationality describes heuristics as adaptive; anchoring is in a different category."}, {"text": "Anchoring proves that humans need anchor points to make any numerical estimate, and that rational decision-making without anchors is impossible.", "isCorrect": false, "rationale": "The claim is not that anchors are necessary for estimation. The finding is that arbitrary, irrelevant anchors — numbers introduced in the framing of a question — systematically bias estimates in a way rational actors would not allow."}], "id": "q05"}, {"question": "Herbert Simon introduced the concept of \"bounded rationality.\" How does this concept differ from the full rationality of Homo economicus, and why does Simon see bounded rationality as a feature rather than a bug?", "options": [{"text": "Bounded rationality describes irrational agents who make systematically wrong decisions; Simon's contribution was to catalog these errors so economists could correct for them.", "isCorrect": false, "rationale": "Simon did not view bounded rationality as mere error-cataloging. He argued that heuristics — the shortcuts bounded rationality relies on — are not bugs but features: adaptive responses to a world of genuine complexity where optimization is computationally impossible."}, {"text": "Bounded rationality acknowledges that real decision-makers operate with limited information, limited computational capacity, and limited time, so they use heuristics rather than optimization — and Simon argues this is not a cognitive defect but an adaptive feature in a genuinely complex world.", "isCorrect": true, "rationale": "The text quotes Simon directly: \"Simon's insight was that this is not a bug in human cognition. It is a feature. In a world of genuine complexity, optimization is computationally impossible; good-enough heuristics are more adaptive than perfect calculation.\""}, {"text": "Bounded rationality means that humans are rational within their limited knowledge but would behave like Homo economicus if they had complete information.", "isCorrect": false, "rationale": "Simon's concept is more radical than this. Even with more information, humans would not optimize in the way Homo economicus does — the cognitive architecture of decision-making involves structural shortcuts that are not simply removed by adding information."}, {"text": "Bounded rationality is a weaker form of the rational actor model that economists use when full rationality assumptions fail — a fallback rather than an independent contribution.", "isCorrect": false, "rationale": "The text treats Simon's bounded rationality as a substantive insight about cognition, not a fallback. It preceded the Kahneman-Tversky experiments and established a different framework for understanding human decision-making."}], "id": "q06"}, {"question": "The section offers three reasons why mainstream economists continue using rational actor models even after Kahneman and Tversky's demolition project. Which of the following correctly summarizes all three?", "options": [{"text": "Economists continue using rational actor models because (1) they haven't read the behavioral economics literature, (2) they are ideologically committed to free markets, and (3) rational models are easier to teach.", "isCorrect": false, "rationale": "The text explicitly says \"mainstream economists largely know about loss aversion and anchoring and framing effects. Many of them have read Kahneman and Tversky.\" Ignorance and ideology are not the text's explanations."}, {"text": "Economists continue using rational actor models because (1) competitive markets weed out consistently irrational actors, (2) many biases cancel each other out in aggregate, and (3) rational actor models yield clean, testable predictions — unlike models that correctly incorporate the complexity of human irrationality.", "isCorrect": true, "rationale": "The text gives all three reasons explicitly: competitive markets select against irrational actors; aggregate behavior may look rational when individual biases cancel; and a model that says \"sometimes rational, sometimes not, depending on Tuesday and hunger\" is more accurate and completely useless."}, {"text": "Economists continue using rational actor models because behavioral economics has failed to produce models accurate enough to replace them, and the field is still waiting for a better alternative.", "isCorrect": false, "rationale": "The text does not claim that behavioral economics has failed or that economists are waiting for a better model. The three reasons it gives are positive defenses of rational actor models for specific purposes."}, {"text": "Economists continue using rational actor models because (1) they are consistent with Smith's original argument, (2) government regulators require tractable models, and (3) prospect theory has been refuted by subsequent experiments.", "isCorrect": false, "rationale": "None of these three are the reasons the text offers. The text does not connect continued use to Smith, regulatory requirements, or prospect theory's refutation — prospect theory is described as the most cited paper in economics."}], "id": "q07"}, {"question": "Prospect theory, published by Kahneman and Tversky in 1979, is described as \"the most cited paper in all of economics.\" What does prospect theory claim that classical utility theory denies?", "options": [{"text": "Prospect theory claims that people are sometimes rational and sometimes irrational depending on their emotional state.", "isCorrect": false, "rationale": "Prospect theory is not about variable rationality depending on emotional states. It proposes a formal alternative to classical utility theory with specific structural claims about how people evaluate outcomes."}, {"text": "Prospect theory claims that people evaluate outcomes as gains and losses relative to a reference point (rather than as final wealth states), that losses are weighted more heavily than equivalent gains, and that risk preferences reverse depending on framing — all denied by classical utility theory.", "isCorrect": true, "rationale": "The text describes prospect theory precisely: it replaces the classical assumption (final wealth states, fixed risk preferences) with reference-dependent evaluation, loss aversion (losses weigh roughly twice as heavily as gains), and frame-dependent risk preferences."}, {"text": "Prospect theory claims that economic agents are never rational and that all economic behavior is driven by emotion and cognitive bias.", "isCorrect": false, "rationale": "Prospect theory is a formal model — it replaces one formal framework (classical utility theory) with another. It does not claim agents are never rational or that all behavior is emotional."}, {"text": "Prospect theory claims that markets always fail to aggregate individual irrationality into rational collective outcomes, disproving Smith's invisible hand.", "isCorrect": false, "rationale": "The text explicitly notes that markets can produce rational-looking aggregate behavior even when individuals are irrational. Prospect theory describes individual decision psychology, not market aggregation failure."}], "id": "q08"}, {"question": "A company designs a retirement savings plan with two versions: Version A requires employees to opt in (default: no savings), and Version B requires employees to opt out (default: automatic enrollment). Based on the behavioral economics described in the section, what outcome difference would you predict, and why?", "options": [{"text": "Participation rates would be identical, because rational employees evaluate the plan on its merits regardless of how it is framed.", "isCorrect": false, "rationale": "Homo economicus would evaluate both plans identically since only the merits matter. But the text's behavioral economics evidence — loss aversion, framing effects — predicts that defaults exert powerful influence. Opt-out designs exploit loss aversion (changing from the default feels like a loss)."}, {"text": "Version B (opt-out) would produce significantly higher enrollment because defaults function as implicit recommendations, and inertia combined with loss aversion makes changing the default feel like an active loss.", "isCorrect": true, "rationale": "This applies the chapter's behavioral economics directly. Framing the default as enrollment means that opting out requires active change. Loss aversion (losses weigh twice as heavily as gains) makes departing from the default psychologically costly. The result is higher enrollment — precisely the pattern that Thaler and Sunstein's nudge research (building on Kahneman-Tversky) confirms."}, {"text": "Version A (opt-in) would produce higher enrollment because employees who actively choose to save are more committed and less likely to later withdraw.", "isCorrect": false, "rationale": "The behavioral evidence the text describes predicts the opposite. Active opt-in requires overcoming inertia; most employees will not do so. The default is a powerful determinant of behavior in a way Homo economicus would not predict."}, {"text": "The difference would depend entirely on the interest rate offered — behavioral factors are secondary to financial incentives.", "isCorrect": false, "rationale": "The text's behavioral economics evidence shows that framing and defaults are independent of financial incentives. Anchoring and loss aversion operate even when the underlying financial value is the same."}], "id": "q09"}, {"question": "The section ends by noting that Homo economicus is \"wrong about every real human\" yet \"useful for understanding markets, designing policy, and predicting aggregate behavior.\" How does this conclusion exemplify Box's dictum?", "options": [{"text": "It shows that economic models, unlike scientific models, can be wrong at the individual level and still right at the aggregate level, making economics uniquely suited to policy design.", "isCorrect": false, "rationale": "The text does not claim economics is unique in this respect. Box's dictum is presented as a general principle applying across all models — the spherical cow, the ideal gas, and Homo economicus all illustrate it."}, {"text": "It shows that Box's dictum applies to Homo economicus: wrong about every real person (as established by behavioral economics), yet useful for understanding the causal structure of incentives, market pressures, and equilibria — exactly the purpose-relative usefulness Box described.", "isCorrect": true, "rationale": "The text explicitly invokes Box's dictum: \"This is George Box's dictum playing out in real time. Homo economicus is wrong about every real human. He is useful for understanding markets, designing policy, and predicting aggregate behavior.\" The fiction reveals things reality hides — specifically, the structure of incentives and equilibria."}, {"text": "It shows that Box's dictum is too weak a principle — Homo economicus is not just \"wrong\" but actively harmful, and its continued use in economics is a failure of intellectual honesty.", "isCorrect": false, "rationale": "The text's conclusion is not a critique of Box's dictum or of economic modeling. It defends the continued use of Homo economicus for specific purposes while raising a caveat about whether economists always remember they are working with a fiction."}, {"text": "It shows that the demolition project by Kahneman and Tversky has been conclusive, and that economics must now abandon rational actor models entirely.", "isCorrect": false, "rationale": "The text reaches the opposite conclusion. Despite the behavioral demolition project, rational actor models remain useful for specific purposes — which is the philosophically interesting part that behavioral economists \"sometimes underemphasize.\""}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
