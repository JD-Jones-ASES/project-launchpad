<script>
var QUESTIONS = [{"question": "The text introduces the concept of the 'fiction of emptiness.' Which of the following best defines how this term is used throughout the section?", "options": [{"text": "A mathematical method for computing the value of sets that contain no elements.", "isCorrect": false, "rationale": "The text uses 'fiction of emptiness' as a political and philosophical category, not a mathematical one. The mathematical version is only mentioned briefly to contrast with the political stakes."}, {"text": "The declaration that some territory — physical, mental, social, or historical — is blank or unoccupied, and therefore available for writing upon, always as a claim with political consequences.", "isCorrect": true, "rationale": "The text defines it as 'the declaration that some territory — physical, mental, social, historical — is blank, void, or unoccupied, and therefore available for writing upon,' adding: 'The fiction of emptiness is never a neutral observation. It is always a claim with consequences, and the consequences are almost always about power.'"}, {"text": "A narrative technique in literature where an author begins a story with no prior context, treating the fictional world as a blank canvas.", "isCorrect": false, "rationale": "The text defines the 'fiction of emptiness' in political and philosophical terms, not as a literary technique."}, {"text": "A scientific hypothesis that the universe began in a state of absolute emptiness before the Big Bang.", "isCorrect": false, "rationale": "This cosmological question belongs to a different part of the textbook (ch01_s04). The 'fiction of emptiness' as used here is always a human social claim, not a physical description."}], "id": "q01"}, {"question": "What was Locke's tabula rasa, and which Cartesian idea was it specifically developed to oppose?", "options": [{"text": "The theory that the mind is a blank slate at birth, developed to oppose Descartes' doctrine of innate ideas.", "isCorrect": true, "rationale": "The text states: 'Locke argued against the Cartesian doctrine of innate ideas — the claim that the human mind arrives in the world pre-equipped with certain concepts (God, mathematics, logic) that do not need to be learned from experience. Locke's alternative was the blank slate.'"}, {"text": "The theory that aristocratic bloodlines determine intelligence, developed to oppose the democratic movement in England.", "isCorrect": false, "rationale": "Locke argued against innate ideas, not directly against aristocratic bloodlines, though the text notes that the tabula rasa had the political effect of undermining arguments for hereditary rank."}, {"text": "The theory that language is innate, developed to oppose Jean-Jacques Rousseau's view that language is learned.", "isCorrect": false, "rationale": "The text does not connect Locke's argument to Rousseau or to debates about language. The opponent was specifically Descartes' doctrine of innate ideas."}, {"text": "The theory that all knowledge is mathematical, developed to oppose the empirical method of Francis Bacon.", "isCorrect": false, "rationale": "Locke was an empiricist opposing Cartesian rationalism, not the other way around. And the text's focus is specifically on innate ideas, not mathematical knowledge."}], "id": "q02"}, {"question": "According to the text, the tabula rasa was simultaneously a liberating idea and a dangerous one. What was the specific danger embedded in it?", "options": [{"text": "It suggested that intelligence was heritable and therefore justified aristocratic privileges.", "isCorrect": false, "rationale": "This is the opposite of the tabula rasa's implication. The blank-slate idea attacked hereditary intelligence; it is the anti-tabula-rasa position that would justify aristocracy."}, {"text": "It implied that whoever controls the inscription process controls the mind — linking Enlightenment pedagogy to totalitarian indoctrination and colonial re-education.", "isCorrect": true, "rationale": "The text states: 'If the mind is genuinely empty at birth, then whoever controls the inscription process controls the mind. The pedagogical optimism of the Enlightenment and the totalitarian impulse toward indoctrination are children of the same parent concept.'"}, {"text": "It made knowledge purely subjective, with no objective basis for any claim to truth.", "isCorrect": false, "rationale": "The text does not connect the tabula rasa to subjectivism or relativism. The danger it identifies is specifically about power — who controls what gets inscribed on the blank slate."}, {"text": "It denied the existence of religious experience, leading to widespread atheism and social instability.", "isCorrect": false, "rationale": "The text does not link the tabula rasa to atheism or religious experience. Its danger is political: control of education as control of minds."}], "id": "q03"}, {"question": "What is terra nullius, and how did it function as a legal doctrine?", "options": [{"text": "A Roman legal principle meaning 'land of no one,' applied to treat land that was not occupied in European legal terms as unowned and available for taking.", "isCorrect": true, "rationale": "The text defines it: 'the legal doctrine of terra nullius — “land belonging to nobody.” Under this doctrine, land that was not visibly occupied in ways European law recognized... could be legally treated as unowned, and therefore available for taking.'"}, {"text": "A medieval law requiring farmers to leave one-third of their fields fallow each year.", "isCorrect": false, "rationale": "The fallow-field rule was an agricultural practice; terra nullius is a colonial legal doctrine about land ownership, not agricultural management."}, {"text": "A United Nations resolution declaring that uninhabited islands belong to the nearest nation-state.", "isCorrect": false, "rationale": "Terra nullius is a colonial-era legal doctrine rooted in Roman law, not a modern UN resolution. It has no connection to the United Nations."}, {"text": "A doctrine requiring that conquered peoples formally surrender their land rights before colonization could proceed.", "isCorrect": false, "rationale": "Terra nullius worked in the opposite direction — it declared land unowned without requiring any surrender, because the existing inhabitants' forms of occupation were simply not recognized."}], "id": "q04"}, {"question": "The text says that when British ships arrived in Australia in 1788, the continent was not empty. What specifically did British law fail to recognize, and why?", "options": [{"text": "The Aboriginal peoples had no permanent settlements, so British law correctly classified the land as unused.", "isCorrect": false, "rationale": "The text explicitly rejects this framing: the continent was 'inhabited by hundreds of distinct Aboriginal nations' with 'intricate systems of land management, property, and governance.' The issue was not that the land was empty but that British law lacked the vocabulary to recognize non-European forms of occupancy."}, {"text": "The Aboriginal nations had not signed treaties with European powers, which was the only form of legal sovereignty British law recognized.", "isCorrect": false, "rationale": "The text does not frame the failure in terms of treaties. It says British law lacked 'the conceptual vocabulary to recognize their presence as legally significant occupancy' — the forms of governance and land management were simply invisible to European legal categories."}, {"text": "The intricate systems of land management, property, and governance of hundreds of distinct Aboriginal nations — forms of occupancy that were simply invisible to European legal categories.", "isCorrect": true, "rationale": "The text states: 'British law lacked the conceptual vocabulary to recognize their presence as legally significant occupancy.' It describes the continent as inhabited by 'hundreds of distinct Aboriginal nations, speaking over 250 languages, with intricate systems of land management, property, and governance.'"}, {"text": "The Aboriginal people spoke no European languages, making legal negotiation impossible.", "isCorrect": false, "rationale": "Language is not the issue identified by the text. The problem was that European legal categories could not see non-European forms of property and governance as legally meaningful."}], "id": "q05"}, {"question": "The Mabo decision of 1992 is highlighted in the text for a specific linguistic reason, beyond its legal consequences. What was that linguistic significance?", "options": [{"text": "It was the first Australian court ruling to be written partly in an Aboriginal language, symbolizing legal recognition.", "isCorrect": false, "rationale": "The text does not say the ruling was written in an Aboriginal language. The linguistic significance is about a specific English word the court used."}, {"text": "The High Court itself used the word 'fiction' to describe the legal foundation of the colonial enterprise — a word courts use sparingly and with precision.", "isCorrect": true, "rationale": "The text says: 'the court's own word — and that native title had never been extinguished. The practical consequences of the ruling were enormous... But the linguistic point is worth noting: the highest court in the land used the word \"fiction\" to describe the legal foundation on which the entire colonial enterprise had rested. Fiction is not a word courts use lightly.'"}, {"text": "The ruling introduced the term 'terra nullius' into common Australian legal vocabulary for the first time.", "isCorrect": false, "rationale": "Terra nullius had been used in legal contexts long before 1992. The Mabo decision was notable for overturning the doctrine, not for introducing the term."}, {"text": "It established that Aboriginal languages should be treated as official languages of Australia.", "isCorrect": false, "rationale": "Language rights are not what the text focuses on in the Mabo discussion. The point is about the court's use of the word 'fiction' to describe terra nullius."}], "id": "q06"}, {"question": "What is the French Revolutionary calendar an example of, and how does the text categorize it relative to other examples in this section?", "options": [{"text": "An extreme example of the fiction of emptiness applied to land, similar to terra nullius but in France.", "isCorrect": false, "rationale": "The Revolutionary calendar applies the fiction of emptiness to time (history), not land. The text distinguishes it from terra nullius on exactly these grounds."}, {"text": "A 'relatively benign' version of declaring history empty — resetting the calendar to Year I to signal that something so fundamental had changed that the old accounting no longer applied.", "isCorrect": true, "rationale": "The text describes it as 'a relatively benign version' of declaring history empty: 'the revolution declared that history had begun anew... Year I. The past was not erased, exactly, but it was relegated to a different calendar.'"}, {"text": "A failed attempt to apply the tabula rasa to political institutions by declaring prior laws void.", "isCorrect": false, "rationale": "The text focuses on the Revolutionary calendar's temporal symbolism (resetting the year), not on its legal implications for prior laws. It is categorized under the 'fiction of emptiness' applied to history, not law."}, {"text": "The first case in history of a state attempting to control education by declaring all prior knowledge invalid.", "isCorrect": false, "rationale": "The Revolutionary calendar is about symbolic time-resetting, not educational control. The connection between blank-slate thinking and education control is developed in the discussion of Locke and the colonial mission civilisatrice."}], "id": "q07"}, {"question": "The text places the Khmer Rouge's 'Year Zero' at the extreme end of a spectrum that also includes the tabula rasa and terra nullius. What underlying logic does the text claim all three share?", "options": [{"text": "All three require military force to implement and maintain.", "isCorrect": false, "rationale": "Locke's tabula rasa was a philosophical argument requiring no military force. The text's point is about shared conceptual logic, not shared methods of enforcement."}, {"text": "All three are examples of emptiness declared by fiat — the belief that naming something 'nothing' is sufficient to make it nothing, regardless of what actually exists there.", "isCorrect": true, "rationale": "The text concludes: 'They are extreme cases of a logic that operates at every scale: that emptiness can be declared by fiat, that the act of naming something \"nothing\" is sufficient to make it nothing.'"}, {"text": "All three were later overturned by the same international legal institutions.", "isCorrect": false, "rationale": "The text does not claim a single legal institution overturned all three. The Mabo decision overturned terra nullius; the Khmer Rouge ended through different historical processes; Locke's tabula rasa remains philosophically influential."}, {"text": "All three originated from the same political tradition of European Enlightenment rationalism.", "isCorrect": false, "rationale": "While the tabula rasa and terra nullius are connected to European Enlightenment thinking, the Khmer Rouge's Year Zero drew from Maoist and radical revolutionary traditions, not Enlightenment liberalism directly."}], "id": "q08"}, {"question": "Scenario: A colonial administrator in 1800 surveys a region where indigenous people have complex oral land agreements, seasonal rotation of territories, and ceremonial custodianship of sacred sites — but no written deeds and no enclosed fields. Under terra nullius logic, what would he likely conclude, and what does the text say about that conclusion?", "options": [{"text": "He would recognize the oral agreements as legally equivalent to written deeds — terra nullius only applied to truly uninhabited land.", "isCorrect": false, "rationale": "Terra nullius, as the text describes it, did not recognize non-European forms of land management as legally significant. Oral agreements and ceremonial custodianship would be invisible to the doctrine."}, {"text": "He would declare the land unowned and available for taking — and the text argues this was always a fiction, as it ignored real forms of occupancy that European legal categories could not see.", "isCorrect": true, "rationale": "The text says terra nullius treated land as unowned when it 'was not visibly occupied in ways European law recognized' — oral agreements and ceremonial custodianship fall outside those categories. The Mabo court later called this 'a fiction,' and the text agrees."}, {"text": "He would negotiate purchase agreements with indigenous leaders, as required by terra nullius procedures.", "isCorrect": false, "rationale": "Terra nullius did not require negotiation — it declared the land unowned ab initio. No purchase was necessary because the doctrine held no one owned the land in the first place."}, {"text": "He would ask indigenous leaders to formalize their land rights under European law before proceeding.", "isCorrect": false, "rationale": "The whole point of terra nullius was that it allowed colonial actors to bypass such negotiations by declaring indigenous occupancy legally non-existent. No formalization was required or offered."}], "id": "q09"}, {"question": "The text draws a structural parallel between the mathematician's zero and the political 'zero.' What distinction does it draw between these two versions of 'declared emptiness'?", "options": [{"text": "Mathematical zero is used only in scientific contexts, while political zero is only relevant to colonial history.", "isCorrect": false, "rationale": "The text explicitly says the logic of declared emptiness 'operates at every scale,' not just colonial history. And mathematical zero underpins all of modern quantitative civilization."}, {"text": "Mathematical zero is a 'beautiful abstraction that enables calculation'; the political zero — declared emptiness of a land, mind, or historical period — 'is something far more dangerous.'", "isCorrect": true, "rationale": "The text states: 'The mathematician's zero is a beautiful abstraction that enables calculation. The political zero — the declared emptiness of a land, a mind, or a historical period — is something far more dangerous.'"}, {"text": "Mathematical zero was invented; political zero was discovered. This makes political zero more objective and defensible.", "isCorrect": false, "rationale": "The text argues that both involve human decisions — and that the political version is more dangerous precisely because its consequences fall on real people, not theorems."}, {"text": "Mathematical zero has no practical consequences, while political zero always improves governance.", "isCorrect": false, "rationale": "Mathematical zero is foundational to all of modern civilization (algebra, calculus, software); and the text argues political zero produces terrible harm — not improvement — in its extreme forms."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
