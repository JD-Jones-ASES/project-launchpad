    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "How many times did Adam Smith use the phrase 'invisible hand' across his entire published output?", "options": [{"text": "Once, exclusively in The Wealth of Nations.", "isCorrect": false, "rationale": "The text specifies three occurrences spread across multiple works, not one."}, {"text": "Three times — once in The Theory of Moral Sentiments, once in The Wealth of Nations, and once in an early astronomy essay.", "isCorrect": true, "rationale": "The text states precisely: 'Once in The Theory of Moral Sentiments (1759). Once in The Wealth of Nations (1776). Once in an early essay on the history of astronomy.'"}, {"text": "Dozens of times, making it the central organizing metaphor of The Wealth of Nations.", "isCorrect": false, "rationale": "The text explicitly notes the contrast: three uses by Smith versus 'many thousands' of citations by later economists, underlining how rare his actual use was."}, {"text": "Twice — once in each of his two major works.", "isCorrect": false, "rationale": "A third occurrence in an astronomy essay is also identified, making the total three, not two."}], "id": "q01"}, {"question": "What was the original, specific context of the invisible hand passage in The Wealth of Nations?", "options": [{"text": "A general theory that uncoordinated self-interest always produces the best social outcomes.", "isCorrect": false, "rationale": "That is the later, expanded meaning. The text explicitly contrasts this current usage with Smith's narrower original intent."}, {"text": "An argument for why free trade with foreign nations is always preferable to domestic production.", "isCorrect": false, "rationale": "The passage was actually about the opposite: why domestic investment tends to exceed foreign investment — a point about risk aversion, not a pro-free-trade argument."}, {"text": "An observation about why domestic capital investment tends to exceed foreign investment, due to risk aversion and home-country bias.", "isCorrect": true, "rationale": "The text states: 'The famous passage in The Wealth of Nations is a single paragraph… concerned with the very specific question of why domestic investment tends to exceed foreign investment even when foreign returns appear higher. Smith's invisible hand was originally an observation about risk aversion and home-country bias.'"}, {"text": "A critique of government monopolies and their distortions of market prices.", "isCorrect": false, "rationale": "While Smith did write about monopoly dangers, the specific invisible hand passage was not about that topic according to the text."}], "id": "q02"}, {"question": "The phrase in Smith's original sentence — 'in this, as in many other cases' — carries a significant implication. What does it concede?", "options": [{"text": "That the invisible hand operates universally and without exception in all market conditions.", "isCorrect": false, "rationale": "This is the opposite of what the phrase implies; the text notes the phrase 'quietly concedes there are other cases where it doesn't work out so neatly.'"}, {"text": "That Smith believed the invisible hand was a divine rather than a natural force.", "isCorrect": false, "rationale": "The text does not connect this grammatical phrase to a claim about divinity; it specifically addresses the scope of the claim."}, {"text": "That there are cases where self-interested action does not produce socially optimal outcomes — the mechanism has limits.", "isCorrect": true, "rationale": "The text analyzes the grammar carefully: 'Not always led. Not infallibly led. In this, as in many other cases — a phrase that quietly concedes there are other cases where it doesn't work out so neatly.'"}, {"text": "That domestic investment is only sometimes preferable to foreign investment.", "isCorrect": false, "rationale": "While the original passage is about domestic vs. foreign investment, the grammatical point the text highlights is about the general scope of the hand's operation, not specifically about investment preferences."}], "id": "q03"}, {"question": "What does the textbook mean when it says the invisible hand is a 'carefully hedged theological claim wrapped in economic language'?", "options": [{"text": "Smith was secretly a religious writer who disguised theology as economics.", "isCorrect": false, "rationale": "The text describes Smith as 'a professor of moral philosophy, not a cheerleader for unconstrained markets,' but the theological claim it identifies is the agency-implying nature of the metaphor, not Smith's personal religious intent."}, {"text": "The metaphor satisfies humans' tendency to detect agents and purpose ('it's as if a hand were arranging it') without invoking God directly, but smuggles in the same cognitive structure.", "isCorrect": true, "rationale": "The text explains: 'It doesn't say a god arranges the market. It says it's as if a hand were arranging it — a carefully hedged theological claim wrapped in economic language.' The agency-detection appeal is the key mechanism."}, {"text": "Economic theories always require religious foundations to gain popular acceptance.", "isCorrect": false, "rationale": "The text makes no such general claim; it analyzes the specific rhetorical structure of this metaphor."}, {"text": "The metaphor was deliberately constructed by religious economists to promote laissez-faire doctrine as God's will.", "isCorrect": false, "rationale": "The text does not claim deliberate religious intent; rather, it identifies the metaphor's cognitive appeal as structurally similar to theological reasoning."}], "id": "q04"}, {"question": "According to the text, what is the mechanism by which the invisible hand transformed from a 'cautious metaphor' to 'an axiom of political theology'?", "options": [{"text": "Academic economists deliberately distorted Smith's work to serve political interests.", "isCorrect": false, "rationale": "The text describes the transformation as a gradual, incremental process with each step 'individually defensible,' not a conspiracy of deliberate distortion."}, {"text": "A series of small, individually defensible steps that cumulatively traveled an enormous distance from Smith's original meaning.", "isCorrect": true, "rationale": "The text states: 'Each step in the chain was small. Each step was individually defensible. The cumulative journey was enormous' — describing how a cautious observation became a justification for sweeping policy prescriptions."}, {"text": "Smith himself expanded the metaphor's scope in later editions of The Wealth of Nations.", "isCorrect": false, "rationale": "The text attributes the expansion to successors and usage over time, not to revisions by Smith himself."}, {"text": "The metaphor's transformation was unique to economics and has no parallel in other disciplines.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not unique to economics. Every discipline has its foundational metaphors, and every foundational metaphor has a tendency to escape the careful conditions under which it was first proposed.'"}], "id": "q05"}, {"question": "The cognitive scientist Paul Bloom's concept of 'hypersensitive agency detection' helps explain the invisible hand's appeal. What does this concept mean?", "options": [{"text": "The human tendency to find intention and purpose everywhere, even where none exists — an evolutionary byproduct of predator detection.", "isCorrect": true, "rationale": "The text states: 'Humans are extraordinarily good at detecting agents in their environment... The cognitive scientist Paul Bloom calls this hypersensitive agency detection — the tendency to find intention and purpose everywhere, even where none exists.'"}, {"text": "The ability of trained economists to detect hidden market forces that laypersons cannot perceive.", "isCorrect": false, "rationale": "Bloom's concept is about a universal human cognitive tendency, not a skill specific to economists; it relates to the evolutionary predator-detection heritage."}, {"text": "A pathology in which some people are unusually sensitive to perceiving social injustice.", "isCorrect": false, "rationale": "The text presents this as a universal human cognitive trait, not a pathology, and it concerns perceiving agents generally rather than social injustice specifically."}, {"text": "The scientific method's capacity to detect real causal agents operating within complex systems.", "isCorrect": false, "rationale": "The concept describes a bias toward finding agents even where none exist — the opposite of scientific caution about inferring causes."}], "id": "q06"}, {"question": "The text describes a revealing slide from 'it's as if a hand were doing this' to 'a hand is doing this' to 'the hand always does this' to 'interfering with the hand is therefore sacrilege.' What general phenomenon does this sequence illustrate?", "options": [{"text": "How scientific theories become more precise as they accumulate empirical confirmation.", "isCorrect": false, "rationale": "The sequence moves away from precision and hedging, not toward it; each step drops a qualification present in the previous one."}, {"text": "The gradual reification of a hedged 'as if' metaphor into an absolute truth claim, eventually acquiring moral and political weight.", "isCorrect": true, "rationale": "The text traces the semantic slide explicitly and connects it to the broader argument: the 'as if' hedging is dropped at each step until the metaphor becomes a moral prohibition against interference."}, {"text": "How the application of metaphors consistently improves our understanding of complex systems over time.", "isCorrect": false, "rationale": "The text presents this as a warning about what metaphors do when misused, not a celebration of metaphorical thinking in general."}, {"text": "Adam Smith's own progressive expansion of the invisible hand concept across his career.", "isCorrect": false, "rationale": "The text attributes the expansion to Smith's successors over the twentieth century, not to Smith's own development of the idea."}], "id": "q07"}, {"question": "Which aspect of Adam Smith's actual intellectual profile tends to be omitted when his invisible hand is invoked in libertarian economic arguments?", "options": [{"text": "His background as a Scottish Enlightenment philosopher with ties to David Hume.", "isCorrect": false, "rationale": "The text does not identify Smith's Hume connection as the suppressed aspect; it focuses on his substantive policy views."}, {"text": "His deep concern about monopoly power, his support for legitimate government regulation, and his suspicion of merchants who sought to make their own rules.", "isCorrect": true, "rationale": "The text states: 'This Smith — the skeptic, the moralist, the man deeply worried about what unregulated commerce would do to workers — tends to appear less frequently in the footnotes of libertarian economists.' It quotes his description of 'the mean rapacity, the monopolizing spirit of merchants.'"}, {"text": "His religious views, which were central to his moral philosophy.", "isCorrect": false, "rationale": "While the text notes Smith was a moral philosopher, it does not specifically identify his religious views as the suppressed element; it emphasizes his regulatory and skeptical stances."}, {"text": "His writing on the division of labor and its dehumanizing effects on workers.", "isCorrect": false, "rationale": "The text focuses on Smith's concerns about monopoly and government regulation as the omitted dimension, not specifically the division of labor passage."}], "id": "q08"}, {"question": "A policy analyst argues that removing a minimum wage law is justified because 'the invisible hand will ensure workers receive fair compensation.' Based on the section's analysis of how the metaphor functions, what is the most fundamental problem with this argument?", "options": [{"text": "It applies the metaphor outside economics, where it cannot function.", "isCorrect": false, "rationale": "The metaphor is being applied within economics — precisely its ostensible domain. The problem the text identifies is not domain mismatch but the slide from hedged observation to axiom."}, {"text": "It treats a carefully limited empirical observation as an infallible universal guarantee, erasing the hedging that Smith himself built into the phrase.", "isCorrect": true, "rationale": "The text shows Smith's phrase included 'in this, as in many other cases' — a hedge against universal application. The policy argument removes that hedge entirely, committing exactly the slip the text warns about: from 'sometimes' to 'always' to 'always and infallibly in every labor market condition.'"}, {"text": "It misidentifies who coined the metaphor, attributing it to later economists rather than Smith.", "isCorrect": false, "rationale": "The argument correctly attributes the metaphor to Smith; the error the text identifies is about scope and certainty, not attribution."}, {"text": "It ignores modern economic data that did not exist in Smith's time.", "isCorrect": false, "rationale": "While empirical updating matters, the text's specific critique is the logical/semantic transformation of a hedged metaphor into an axiom — not an empirical data gap."}], "id": "q09"}, {"question": "The text asks: 'Why a hand? Why not a network, a process, an equilibrium, a gradient?' What does the choice of the 'hand' metaphor specifically add that these alternative terms do not?", "options": [{"text": "Mathematical precision that allows economists to model market behavior quantitatively.", "isCorrect": false, "rationale": "The text critiques the metaphor precisely for importing non-mathematical, intentionality-laden meaning; 'network' or 'gradient' would be more mathematically neutral."}, {"text": "The implication of intentionality and guidance — the suggestion that someone, somewhere, is in charge.", "isCorrect": true, "rationale": "The text states: 'A hand implies intentionality. It implies guidance. It implies that someone, somewhere, is in charge, even if that someone is conveniently invisible.' The alternative terms do not carry these connotations."}, {"text": "A more accurate description of the mechanism by which prices equilibrate supply and demand.", "isCorrect": false, "rationale": "The text suggests the opposite: that 'network,' 'process,' 'equilibrium,' or 'gradient' would be more accurate mechanistic descriptions, while 'hand' imports intentionality that misleads."}, {"text": "Historical precedent linking it to theological concepts of divine Providence.", "isCorrect": false, "rationale": "While the text notes the theological resonance, it identifies the specific addition of the hand metaphor as intentionality and guidance — a cognitive and semantic point rather than purely historical."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
