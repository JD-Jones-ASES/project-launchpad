<script>
var QUESTIONS = [{"question": "What is George Box's most famous contribution to the philosophy of science, and what does it actually claim?", "options": [{"text": "\"No model can ever be useful\" — a warning that simplification always destroys essential information.", "isCorrect": false, "rationale": "Box's dictum is precisely the opposite: it argues that models, despite being wrong, can be useful. He was not counseling despair about simplification."}, {"text": "\"All models are wrong, but some are useful\" — a precise technical claim that all simplifications omit things, yet the right omissions still generate genuine understanding.", "isCorrect": true, "rationale": "The text quotes this sentence as \"the most useful sentence in the philosophy of science\" and clarifies that Box was making a precise technical point: omitting things makes a model wrong by definition, but that wrongness need not prevent usefulness."}, {"text": "\"The best models are the most complete ones\" — an argument that adding more detail always improves explanatory power.", "isCorrect": false, "rationale": "The text argues the opposite: a model that included everything would have no explanatory leverage and would be as complex as the system it was meant to explain."}, {"text": "\"Models should be judged only by their accuracy\" — a claim that empirical correctness is the sole criterion for evaluating a model.", "isCorrect": false, "rationale": "Box's point shifts attention away from accuracy as the sole criterion. He argues that \"the interesting question is not whether a model is wrong but how wrong it is, and whether the ways it is wrong matter for the purpose at hand.\""}], "id": "q01"}, {"question": "The text describes two deep intuitions about description that pull in opposite directions. Which of the following correctly identifies the tension at the heart of the chapter?", "options": [{"text": "The intuition that good descriptions are short versus the scientific demand for mathematical precision.", "isCorrect": false, "rationale": "The chapter does not frame the tension around brevity vs. mathematical precision. The core tension is between completeness and strategic omission."}, {"text": "The intuition that descriptions should be complete (leave nothing out) versus Box's claim that leaving things out is the method, not a failure.", "isCorrect": true, "rationale": "The text explicitly names \"the deep intuition that most of us carry without noticing: the intuition that the goal of a description is to be complete\" — and then sets Box's dictum against it: \"Leaving things out is the method. The art is in choosing what to leave out.\""}, {"text": "The intuition that science should be value-neutral versus the recognition that all models embed ideological assumptions.", "isCorrect": false, "rationale": "Ideological neutrality is not the tension the text explores. The chapter focuses on completeness versus purposeful omission as intellectual strategies."}, {"text": "The intuition that simpler is always better versus the recognition that some systems resist simplification entirely.", "isCorrect": false, "rationale": "While simplicity is related, the text's core tension is about whether omitting things counts as cheating or is actually the productive strategy."}], "id": "q02"}, {"question": "According to the text, why would Jorge Luis Borges's perfect map — a map the size of the empire — be \"perfectly useless\"?", "options": [{"text": "Because it would be too expensive to produce and maintain.", "isCorrect": false, "rationale": "The text's point is philosophical, not economic. Borges's map is useless because it fails to provide the leverage that makes maps valuable."}, {"text": "Because it would only work for the particular empire it depicted and could not generalize.", "isCorrect": false, "rationale": "The issue is not generalizability but the fundamental nature of what makes a model useful: it must be simpler than what it represents, or it offers no advantage."}, {"text": "Because perfect completeness eliminates the selective omission that gives a model its explanatory leverage — a map must be simpler than the territory to answer \"how do I get from here to there?\"", "isCorrect": true, "rationale": "The text states: \"The road map works precisely because it does not try to be the city.\" A map the size of the empire achieves completeness but loses the utility that comes from purposeful simplification. This directly illustrates the chapter's thesis."}, {"text": "Because it would take too long to read and would therefore be impractical for navigation.", "isCorrect": false, "rationale": "While impracticality is implied, the text's deeper point is that a map identical to its territory provides no leverage — it cannot answer the navigational question any better than standing in the territory itself."}], "id": "q03"}, {"question": "The text introduces a distinction between a \"failed description\" and a \"model.\" What is the essential difference?", "options": [{"text": "A failed description is produced by non-experts; a model is produced by trained scientists.", "isCorrect": false, "rationale": "The distinction the text draws is about intent and design, not about the expertise of the person producing the description."}, {"text": "A failed description aims for completeness and falls short; a model deliberately captures only what matters for a specific question and, if well-designed, succeeds entirely at that narrower task.", "isCorrect": true, "rationale": "The text states directly: \"A failed description tries to capture everything and falls short. A model tries to capture only what matters for a specific question, and if it is a good model, it succeeds entirely at that narrower task.\" The difference is one of intent."}, {"text": "A failed description uses words; a model uses mathematics.", "isCorrect": false, "rationale": "The text does not draw this distinction. The road map example is a non-mathematical model, and a verbal description could also fail. The distinction is about purpose, not medium."}, {"text": "A failed description ignores data; a model incorporates all available empirical evidence.", "isCorrect": false, "rationale": "The text's distinction is about intent (completeness vs. purposeful omission), not about the treatment of evidence."}], "id": "q04"}, {"question": "The text says that the spherical cow is \"a deliberate subtraction\" and contrasts it with the invention of zero described in the previous chapter as \"a deliberate addition.\" What philosophical point does this contrast make?", "options": [{"text": "Mathematical inventions are more powerful than physical models because they add to reality rather than stripping it.", "isCorrect": false, "rationale": "The text does not claim mathematical inventions are superior to physical models. The contrast is used to illuminate a shared pattern of intellectual invention, not to rank them."}, {"text": "Both zero and the spherical cow are useful fictions: one adds an entity to our conceptual toolkit, the other removes features from a real entity — both are deliberate acts of creative intellectual construction.", "isCorrect": true, "rationale": "The text explicitly frames both as examples of the same intellectual move: \"Where Chapter's nothing was a deliberate addition... the spherical cow is a deliberate subtraction.\" Both are purposeful intellectual acts that generate understanding — the chapter's defining thesis."}, {"text": "The history of science alternates between addition and subtraction, and progress requires both in equal measure.", "isCorrect": false, "rationale": "The text does not claim a historical alternation or a required balance. The contrast is conceptual, showing that useful fictions can work by either adding or subtracting."}, {"text": "Subtractive models are more dangerous than additive ones because omitting things can cause errors.", "isCorrect": false, "rationale": "The text does not introduce a hierarchy of danger between additive and subtractive intellectual moves. It uses the contrast to clarify what a model is."}], "id": "q05"}, {"question": "The text calls model-building \"the history of strategically untrue descriptions that generated genuine understanding.\" Which statement best explains why a false description can generate genuine understanding?", "options": [{"text": "False descriptions generate psychological confidence, which motivates scientists to continue researching.", "isCorrect": false, "rationale": "The text's argument is about the epistemic structure of models — what they reveal about causal relationships — not about psychological confidence."}, {"text": "False descriptions are easier to communicate than true ones, so they spread more widely and generate more collaboration.", "isCorrect": false, "rationale": "Ease of communication is not the mechanism the text describes. The claim is about what omissions reveal, not how easily information spreads."}, {"text": "By stripping away irrelevant complexity, a strategically false description isolates the features that actually drive a system's behavior, allowing reasoning that the full, complicated truth would obscure.", "isCorrect": true, "rationale": "The text argues: \"A model that included everything would have no explanatory leverage. It would be as complex as the thing it was trying to explain, and therefore no help.\" Models work by identifying which features drive behavior and stripping away the rest. The false claim enables clear reasoning."}, {"text": "False descriptions fail in practice, which reveals by contrast what the true description must look like.", "isCorrect": false, "rationale": "The text does not argue that models succeed by failing. It argues that the strategic falseness itself — the deliberate omissions — is what gives models their power."}], "id": "q06"}, {"question": "A city planner is designing a new transit system. She has access to two databases: one containing every building address, tree location, and traffic light schedule in the city; the other containing only road names, distances, and intersections. Based on the chapter's argument about models, which database should she use for route optimization, and why?", "options": [{"text": "The first (complete) database, because transit planning requires as much information as possible to avoid errors.", "isCorrect": false, "rationale": "The chapter argues against this intuition. More completeness does not mean more leverage. The complete database would be as complex as the city itself and would provide no more analytical grip than walking around it."}, {"text": "The second (simplified) database, because it omits the features irrelevant to route optimization and thereby concentrates explanatory power on the variables that matter — roads, distances, intersections.", "isCorrect": true, "rationale": "This directly applies the chapter's argument: \"A map that showed everything would be...perfect, and perfectly useless.\" For the specific question of route optimization, the simplified model answers the question more productively than the complete one. The power comes from the purposeful omissions."}, {"text": "Both databases equally, because combining perspectives always yields better understanding than using either alone.", "isCorrect": false, "rationale": "The text does not claim that layering all available information is the optimal strategy. It argues that the right model is defined by what question you are trying to answer — and for route optimization, trees and traffic light schedules are irrelevant noise."}, {"text": "Neither, because real transit planning requires direct observation of the city rather than any model.", "isCorrect": false, "rationale": "The text explicitly defends the value of models against the intuition that only direct, complete observation yields understanding. Models \"are how you build a ladder from phenomena to understanding.\""}], "id": "q07"}, {"question": "The text describes the process of scientific modeling as beginning with the simplest case and \"gradually adding back the complications you strategically dropped.\" What does this suggest about the relationship between the spherical cow and the real cow?", "options": [{"text": "The spherical cow is a preliminary error that scientists must eventually discard entirely in favor of accurate description.", "isCorrect": false, "rationale": "The text explicitly says the spherical cow is not an embarrassment: \"The fictional simplifications of science are not embarrassments to be apologized for. They are techniques.\" The simple model is the starting point, not a mistake."}, {"text": "The spherical cow and the real cow are equally valid descriptions that serve different audiences.", "isCorrect": false, "rationale": "The text frames these not as equally valid for different audiences, but as sequential stages: the spherical cow comes first as the foundation for building toward more complex understanding."}, {"text": "The spherical cow is the essential first step in a scaffold: understanding the idealized case first creates a foundation from which complications can be reintroduced one at a time, tracking how conclusions change.", "isCorrect": true, "rationale": "The text describes this process precisely: \"understand the simple case, then the slightly less simple case, then gradually adding back the complications you strategically dropped, watching at each step how the conclusions change. The spherical cow comes first. The cow with legs comes later.\""}, {"text": "The spherical cow eventually becomes the real cow as scientists gather more data and refine their observations.", "isCorrect": false, "rationale": "Models don't become reality through data accumulation. The process is one of controlled reintroduction of complexity — adding back what was strategically dropped — not of models converging on reality through measurement."}], "id": "q08"}, {"question": "The Specimen box describes the spherical cow as \"Wrong about every real cow. Sometimes right about the herd.\" What principle of model evaluation does this encapsulate?", "options": [{"text": "That individual-level inaccuracy is always compensated by aggregate-level accuracy.", "isCorrect": false, "rationale": "The text does not claim that aggregate accuracy automatically follows from individual inaccuracy. The Specimen box says \"sometimes right about the herd\" — not always."}, {"text": "That the usefulness of a model depends on the level and question at which it is applied — a model that fails at the instance level may still succeed at the population or structural level.", "isCorrect": true, "rationale": "This is Box's dictum made concrete. The spherical cow's omissions make it wrong for any individual cow but may preserve the properties (mass estimates, volume-to-surface ratios) relevant to understanding herd-level behavior. The question determines the appropriate level of analysis."}, {"text": "That wrong predictions at the individual level should be averaged out to produce correct aggregate predictions.", "isCorrect": false, "rationale": "Statistical averaging is not the mechanism described. The text's point is about what structural properties the model preserves, not about averaging errors."}, {"text": "That a model's errors are always acceptable as long as the model was constructed by a credentialed expert.", "isCorrect": false, "rationale": "The text does not appeal to credentialing as a criterion for model evaluation. The criterion is always purpose: whether the model's particular wrongness matters for the question at hand."}], "id": "q09"}, {"question": "A student argues: \"If a model is a lie — it says things that are not true — then using it to generate scientific conclusions is methodologically dishonest.\" Based on the chapter's argument, what is the most precise response to this objection?", "options": [{"text": "The student is right; scientific models should always be replaced with more accurate descriptions as soon as these become available.", "isCorrect": false, "rationale": "The chapter argues against this view. More accurate descriptions are not always more useful, and the simplified model's \"lie\" is precisely what gives it explanatory power."}, {"text": "The distinction between a lie and a model is intent and purpose: a lie deceives, while a model deliberately simplifies in full transparency, using false claims as tools to reveal structure that true descriptions obscure.", "isCorrect": true, "rationale": "The text acknowledges the discomfort directly: \"A model is, in a sense, a lie. It says things about the world that are not true... We make these false claims deliberately.\" But the point is that deliberate, purposeful falsification in service of structural understanding differs categorically from deception. The model is a transparent technique, not a hidden distortion."}, {"text": "The student is applying a philosophical standard (truth) that is inappropriate in scientific contexts, where only predictive accuracy matters.", "isCorrect": false, "rationale": "The text does not dismiss truth as a philosophical standard. It argues that truth and usefulness can come apart — that sometimes false descriptions generate understanding that true ones cannot. This is a more nuanced position than abandoning truth as a value."}, {"text": "Scientific dishonesty only matters when the false claims affect policy decisions; in theoretical contexts, any simplification is acceptable.", "isCorrect": false, "rationale": "The text draws no such distinction between theoretical and policy contexts. The defense of simplification applies generally, and the chapter does not exempt policy applications from scrutiny."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
