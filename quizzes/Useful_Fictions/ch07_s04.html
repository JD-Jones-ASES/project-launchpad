<script>
var QUESTIONS = [{"question": "What did Alfred Korzybski call the pathological collapse of the distinction between a representation and the thing it represents?", "options": [{"text": "Reification", "isCorrect": false, "rationale": "Reification is a related but distinct concept: treating an abstraction as if it were a concrete object. Korzybski's specific term for the collapse of the map-territory distinction — responding to a symbol as if it were the thing symbolized — is identification."}, {"text": "Identification", "isCorrect": true, "rationale": "The text states Korzybski 'called this identification — the pathological collapse of the distinction between map and territory.' He believed it was at the root of most human conflict, including political violence."}, {"text": "The McNamara Fallacy", "isCorrect": false, "rationale": "The McNamara Fallacy refers specifically to the error of privileging what can be measured over what cannot. It is a consequence of identification but not Korzybski's specific term for the general phenomenon."}, {"text": "General semantics", "isCorrect": false, "rationale": "General semantics is the name of Korzybski's broader discipline — the practical project of improving reasoning by clarifying the relationship between language and reality. Identification is a specific concept within that system."}], "id": "q01"}, {"question": "According to the text, what is reification, and which example best illustrates it?", "options": [{"text": "The study of real-world objects and their properties; best illustrated by physics.", "isCorrect": false, "rationale": "Reification is not a scientific discipline — it is a cognitive error. The text defines it as treating an abstraction as if it were a concrete object with fixed, measurable properties."}, {"text": "Treating an abstraction as if it were a concrete object with fixed properties; illustrated by treating 'the economy' as an organism that must be kept healthy.", "isCorrect": true, "rationale": "The text defines reification as 'treating an abstraction as if it were a concrete object: stable, bounded, with fixed properties.' The Specimen box gives 'treating the economy as an organism that must be kept healthy' as a direct example."}, {"text": "The measurement of an abstract phenomenon using physical instruments; illustrated by IQ testing.", "isCorrect": false, "rationale": "The text does mention IQ but to illustrate reification — treating IQ as 'a thing inside your head rather than a score on a test.' Reification is the cognitive error of treating the score as a thing, not the act of testing itself."}, {"text": "The process of converting a legal concept into a physical asset; illustrated by converting corporate bonds to buildings.", "isCorrect": false, "rationale": "This is a financial description, not Korzybski's concept. Reification in this section is the cognitive move of treating any abstraction — legal, social, psychological — as if it were a concrete thing."}], "id": "q02"}, {"question": "What was the McNamara Fallacy, and what was its specific manifestation in the Vietnam War?", "options": [{"text": "The belief that military force can resolve political conflicts; manifested in the escalation of bombing campaigns.", "isCorrect": false, "rationale": "This describes a general strategic error, not the McNamara Fallacy as the text defines it. The fallacy is about measurement systems — specifically the privileging of what can be counted over what cannot."}, {"text": "The error of privileging what can be measured while discarding what cannot, eventually presuming unmeasured things don't exist; manifested in using body count as the primary progress metric.", "isCorrect": true, "rationale": "The text quotes Yankelovich's four-step sequence defining the fallacy, and describes how it produced a body-count metric that decoupled from reality: commanders optimized the metric (inflating kills, counting civilians) rather than achieving the underlying goal."}, {"text": "The tendency of military commanders to overestimate enemy casualties; manifested in inflated kill reports from field units.", "isCorrect": false, "rationale": "Inflated kill reports are a symptom of the fallacy's institutional incentive structure, not the fallacy itself. The McNamara Fallacy is the broader error of elevating measurable metrics above unmeasurable realities."}, {"text": "The assumption that statistical analysis is always superior to qualitative judgment in military planning.", "isCorrect": false, "rationale": "While McNamara championed quantitative analysis, the fallacy as defined by Yankelovich (and described in the text) is specifically about the four steps by which measurable proxies displace the realities they were designed to represent."}], "id": "q03"}, {"question": "Why did the body count metric 'decouple from the reality it was supposed to represent'?", "options": [{"text": "Because the North Vietnamese Army successfully concealed its casualties using guerrilla tactics.", "isCorrect": false, "rationale": "The text does not attribute the metric's failure to enemy concealment. The decoupling resulted from field commanders' rational response to incentive structures — they managed the metric rather than the underlying goal."}, {"text": "Because field commanders, evaluated and promoted based on body count, optimized for the metric itself — inflating kills, counting civilians, and expanding the definition of enemy combatants.", "isCorrect": true, "rationale": "The text states commanders 'did what rational agents do in the face of measurement systems: they managed the metric.' Confirmed kills were inflated, civilians counted as combatants, weapons planted near bodies. The metric optimized itself away from reality."}, {"text": "Because Washington officials falsified the briefing documents before they reached the President.", "isCorrect": false, "rationale": "The text does not allege top-level falsification. The distortion arose from field-level optimization of the metric by rational actors responding to institutional incentives — a structural problem, not a conspiracy."}, {"text": "Because the Department of Defense lacked the computing power to accurately aggregate kill counts from multiple theaters.", "isCorrect": false, "rationale": "Technology is not the issue the text identifies. The decoupling was a product of institutional incentive structures, not computational limitations."}], "id": "q04"}, {"question": "The text describes 'teaching to the test' as an educational analogue of the McNamara Fallacy. What is the structural feature that both cases share?", "options": [{"text": "Both involve government bureaucracies that prioritize efficiency over effectiveness.", "isCorrect": false, "rationale": "The text does not restrict the pattern to government bureaucracies. It explicitly extends the pattern to hospitals, academic departments, corporations, and social media platforms — any system in which a proxy measure acquires institutional authority."}, {"text": "A proxy measure acquires institutional authority, creating incentives to optimize the measure rather than the underlying reality it was designed to represent.", "isCorrect": true, "rationale": "The text states this is 'a structural feature of any system in which a proxy measure acquires institutional authority.' In both Vietnam and schooling, the measured indicator (body count; test score) becomes the goal, while the underlying reality (military progress; education) is deprioritized."}, {"text": "Both involve dishonest actors who deliberately manipulate data to deceive overseers.", "isCorrect": false, "rationale": "The text frames both cases as rational optimization, not dishonesty. Commanders and teachers respond to the incentives they face. The problem is structural — the metric is misaligned with the goal — not a matter of individual moral failure."}, {"text": "Both cases involve a single decision-maker who chose the wrong metric without consulting experts.", "isCorrect": false, "rationale": "The text does not attribute either problem to an individual decision-maker. The pattern recurs across hospitals, departments, corporations, and social media — indicating a structural feature, not individual error."}], "id": "q05"}, {"question": "What is the 'recursive problem' the section identifies with Korzybski's map-territory framework?", "options": [{"text": "The framework is self-defeating because it requires knowing the territory before you can evaluate the map.", "isCorrect": false, "rationale": "The text does not present this as the recursive problem. The problem it identifies is that the map-territory distinction is itself a map — a meta-level representation subject to the same distortions it was designed to diagnose."}, {"text": "The map-territory distinction is itself a map — a meta-representation that can be reified, misapplied, and used as the very identification it was designed to diagnose.", "isCorrect": true, "rationale": "The text states: 'The map-territory distinction is itself a map.' It can be reified (treated as fixed metaphysical truth rather than a useful tool), misapplied (the distinction is illuminating in some contexts and misleading in others), and can become the very identification it was designed to diagnose."}, {"text": "Korzybski's framework creates an infinite regress because every meta-map needs another meta-meta-map to evaluate it.", "isCorrect": false, "rationale": "While the text acknowledges the recursive structure, it does not frame it as producing an infinite regress that paralyzes thought. It frames it as a reason for calibration — maintaining awareness that even the diagnostic framework is a tool, not a final truth."}, {"text": "The framework is recursive because Korzybski applied it to itself in Science and Sanity, making the book self-referential.", "isCorrect": false, "rationale": "The text does not discuss Science and Sanity as self-referential. The recursive problem is conceptual — the analytical framework is itself a representation subject to its own critique — not a feature of Korzybski's writing style."}], "id": "q06"}, {"question": "The text describes a LinkedIn profile as a case where 'the map shapes the territory.' What does this mean?", "options": [{"text": "LinkedIn profiles contain false information that misleads employers about a person's actual qualifications.", "isCorrect": false, "rationale": "The text is not making a claim about dishonesty. The point is subtler: even honest profiles reshape the person they represent because the person adjusts their behavior to fit the profile's categories."}, {"text": "The profile is not merely a representation of a person but actively shapes the person — who pursues accomplishments that will be profileable and neglects skills the profile has no field for.", "isCorrect": true, "rationale": "The text states the person 'adjusts their behavior to match the profile, pursues accomplishments that will be addable to the profile, develops skills the profile framework makes visible and neglects skills it has no field for.' The self navigated into existence is substantially constituted by the maps used to represent it."}, {"text": "Digital maps like LinkedIn profiles are more powerful than paper maps because they are interactive and algorithmically curated.", "isCorrect": false, "rationale": "The text does not compare digital and paper maps. The LinkedIn example illustrates the general principle that maps reshape territories — regardless of medium."}, {"text": "Social media companies deliberately design profiles to manipulate users' sense of identity for commercial purposes.", "isCorrect": false, "rationale": "The text does not make a commercial manipulation argument. The shaping described is structural — any profile framework that makes some attributes visible and others invisible will reshape behavior, regardless of intent."}], "id": "q07"}, {"question": "Korzybski argued that propaganda 'works by identification.' Applying his framework, what mechanism explains propaganda's effectiveness?", "options": [{"text": "Propaganda is effective because it repeats false claims until they become familiar and believable.", "isCorrect": false, "rationale": "Mere repetition is not Korzybski's analysis. His account focuses on the collapse of the map-territory distinction: propaganda works by giving you a map of the enemy so vivid and total that you stop seeing the territory behind it."}, {"text": "Propaganda gives the audience a map of the enemy so vivid and total that the map displaces the territory — responses appropriate to the reality are triggered by the representation.", "isCorrect": true, "rationale": "The text states: 'Propaganda works by identification: it gives you a map of the enemy so vivid and total that you stop seeing the territory behind it.' The emotional and behavioral responses appropriate to actual people are directed at the representation as if it were those people."}, {"text": "Propaganda exploits cognitive biases such as confirmation bias and availability heuristic to reinforce pre-existing beliefs.", "isCorrect": false, "rationale": "While cognitive biases may contribute, Korzybski's specific analysis is about the map-territory collapse: the representation of a group replaces engagement with actual members of that group. This is identification, not a bias-exploitation account."}, {"text": "Propaganda is effective because it simplifies complex political situations, making them easier to understand and act on.", "isCorrect": false, "rationale": "Simplification is a feature of all useful representations. Korzybski's account of propaganda's danger is not its simplicity per se, but the identification it produces: the map becomes the territory for the audience, blocking access to the actual people behind the representation."}], "id": "q08"}, {"question": "A hospital system adds a patient satisfaction score to its physician evaluation rubric. Within a year, survey scores have risen significantly, but independent measures of clinical outcomes have not improved. Applying the section's framework, what has most likely occurred?", "options": [{"text": "The physicians became more patient-centered in ways that improve subjective experience but not measurable clinical outcomes.", "isCorrect": false, "rationale": "While possible, the text's framework points to a different and more systematic explanation: when a proxy measure acquires institutional authority, rational agents optimize the measure rather than the underlying goal the measure was designed to capture."}, {"text": "The satisfaction survey is too short to capture meaningful data, indicating a need for a longer instrument.", "isCorrect": false, "rationale": "The text does not frame metric failure as an instrument-length problem. The structural issue is that institutional authority attached to the metric creates optimization incentives that decouple the metric from the reality it represents."}, {"text": "Physicians have optimized for the satisfaction metric — through bedside manner, faster responses to complaints — rather than for the underlying clinical care the metric was designed to proxy, producing the McNamara Fallacy pattern.", "isCorrect": true, "rationale": "This follows the text's explicit pattern: 'the map acquires power over the territory it was supposed to describe, and the territory begins to reshape itself in the map's image — not because the territory has gotten better, but because it has learned to look better on the map.'"}, {"text": "Patient satisfaction and clinical outcomes are inherently unrelated, so no conclusion can be drawn from the divergence.", "isCorrect": false, "rationale": "The text does not argue that satisfaction and outcomes are unrelated. It argues that when a proxy measure acquires authority, it becomes optimized in ways that decouple it from the underlying reality — which is a testable, structural claim, not a claim about inherent unrelatedness."}], "id": "q09"}, {"question": "The section concludes that Korzybski's insight 'does not get you off the map.' What does this mean, and what does the text say the insight actually gives you?", "options": [{"text": "It means the insight is ultimately useless — knowing about map-territory confusion does not prevent it.", "isCorrect": false, "rationale": "The text is not defeatist. It calls the conclusion 'not cause for despair but for calibration' and articulates what the insight positively enables."}, {"text": "It means representation is inescapable, but the insight gives you a different relationship to your maps — navigational skill and awareness of what each tool was designed to show and omit, keeping the possibility of a better map open.", "isCorrect": true, "rationale": "The text states: 'You must represent reality in order to navigate it, and representation always involves distortion. What the insight gives you is a different relationship to your own maps: not the certainty of someone who thinks they are touching reality, but the navigational skill of someone who knows they are using a tool.' The goal is not to stop mapping but to stop worshipping maps."}, {"text": "It means you should suspend all use of representations until you have verified their accuracy against the territory.", "isCorrect": false, "rationale": "The text explicitly rejects this interpretation: 'You must represent reality in order to navigate it.' The insight does not recommend representational abstinence but calibrated, tool-aware engagement."}, {"text": "It means the distinction between map and territory is ultimately metaphysical and has no practical implications.", "isCorrect": false, "rationale": "The entire section is devoted to demonstrating the practical implications of the map-territory distinction — from Vietnam body counts to LinkedIn profiles. The conclusion that representation is inescapable is not a claim about metaphysics but about practice."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
