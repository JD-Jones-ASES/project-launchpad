<script>
var QUESTIONS = [{"question": "The text describes the laminated classroom poster of the scientific method as 'perhaps the most successful piece of institutional mythology in the history of education.' What does calling it 'mythology' rather than simply 'wrong' imply?", "options": [{"text": "The poster is completely fabricated and should be removed from classrooms immediately.", "isCorrect": false, "rationale": "The text explicitly calls the poster 'a useful fiction' that gives students a helpful framework. It is not entirely fabricated — it simplifies something real."}, {"text": "The poster is a useful fiction that purchases tractability at the cost of accuracy — it simplifies real science helpfully, but becomes harmful when mistaken for an accurate description.", "isCorrect": true, "rationale": "The text states: 'Like all useful fictions, it purchases tractability at the cost of accuracy. The problem is not that the poster simplifies. The problem is that the poster is taken seriously by people who have not thought about it as a simplification.'"}, {"text": "The poster is correct in every detail, but myths are always correct at a deeper level.", "isCorrect": false, "rationale": "The text is explicit: 'It is not how science works.' The poster is inaccurate as a description of scientific practice."}, {"text": "Mythology means the poster has religious significance and should be treated as a matter of faith.", "isCorrect": false, "rationale": "The text uses 'institutional mythology' to mean a widely accepted simplification that has acquired the status of unquestioned truth — not religion."}], "id": "q01"}, {"question": "What was Francis Bacon's inductivist account of how science works, and why did David Hume's problem of induction demolish it?", "options": [{"text": "Bacon claimed science proceeds by falsifying hypotheses; Hume showed that falsification cannot rule out all alternatives.", "isCorrect": false, "rationale": "Falsification is Popper's account, not Bacon's. Bacon proposed induction — building from particular observations to general laws. Hume's problem is specifically about induction."}, {"text": "Bacon claimed science proceeds by systematic observation from which general laws inductively emerge; Hume showed that no finite number of observations can logically justify a universal conclusion.", "isCorrect": true, "rationale": "The text states: Bacon proposed knowledge 'built from the ground up: you observe particular cases, collect enough of them, and the general law emerges.' Hume's problem: 'no finite number of observations can logically justify a universal conclusion.' The black swan example demonstrates this."}, {"text": "Bacon claimed science requires controlled experiments; Hume showed that experimental conditions can never be fully controlled.", "isCorrect": false, "rationale": "Bacon's inductivism focused on patient observation, not controlled experiments. And Hume's problem is a logical point about the gap between 'some' and 'all,' not about experimental control."}, {"text": "Bacon claimed science is based on mathematical deduction; Hume showed that mathematics cannot describe the physical world.", "isCorrect": false, "rationale": "Bacon's account was inductivist — moving from observations to general laws — not deductive. This option misrepresents both thinkers."}], "id": "q02"}, {"question": "Karl Popper proposed falsificationism as a solution to Hume's problem. What is falsificationism, and what is one key problem the text identifies with it?", "options": [{"text": "Falsificationism holds that science proceeds by confirming hypotheses with positive evidence. The problem is that positive confirmation can always be faked.", "isCorrect": false, "rationale": "Falsificationism is explicitly the opposite: science proceeds by trying to refute hypotheses, not by confirming them. Popper rejected confirmation as the basis for scientific knowledge."}, {"text": "Falsificationism holds that a hypothesis is scientific only if it is falsifiable — could in principle be shown false. The problem is that real science does not simply discard hypotheses at the first refuting observation.", "isCorrect": true, "rationale": "The text states Popper's criterion: 'A hypothesis is scientific if and only if it is falsifiable.' The problem: 'Real scientific practice does not simply discard hypotheses at the first refuting observation' — scientists posited 'Vulcan' rather than abandoning Newton when Mercury's perihelion violated predictions."}, {"text": "Falsificationism holds that all scientific claims are permanently provisional. The problem is that science has produced many confirmed, stable laws.", "isCorrect": false, "rationale": "While falsificationism does make all claims provisional, this is not identified as a problem in the text. The text's specific objection is about how real scientists respond to anomalies — they don't abandon frameworks at first refutation."}, {"text": "Falsificationism holds that only mathematical claims are falsifiable. The problem is that many scientific claims are not mathematical.", "isCorrect": false, "rationale": "Falsificationism applies to empirical hypotheses in general, not only mathematical ones. This is a misrepresentation of Popper's view."}], "id": "q03"}, {"question": "Thomas Kuhn replaced Popper's logical account with a sociological one. What is 'normal science' in Kuhn's framework?", "options": [{"text": "Science conducted according to universally agreed methodological rules, producing steady cumulative progress.", "isCorrect": false, "rationale": "Kuhn's account rejects the idea of universally agreed methodological rules. Normal science is puzzle-solving within a paradigm, not according to external rules."}, {"text": "Puzzle-solving within a shared paradigm — a framework of assumptions, exemplary cases, tools, and standards that defines what counts as a good question, answer, and problem worth solving.", "isCorrect": true, "rationale": "The text states: 'Normal science… is puzzle-solving within a paradigm — a shared framework of assumptions, exemplary cases, tools, and standards that defines what counts as a good question, what counts as a good answer, and what counts as a problem worth solving.'"}, {"text": "The everyday science conducted by non-specialists, in contrast to the revolutionary science of genius-level researchers.", "isCorrect": false, "rationale": "Normal science is a technical term in Kuhn about the mode of scientific activity — puzzle-solving within a paradigm — not a distinction between specialists and non-specialists."}, {"text": "Science that follows the laminated poster method: hypothesis, experiment, data, conclusion.", "isCorrect": false, "rationale": "Kuhn's whole point is that the poster misrepresents how science actually works. Normal science is precisely the activity the poster fails to capture."}], "id": "q04"}, {"question": "The text describes the Copernican Revolution as 'not a logical event. It was a social one.' What does this mean in Kuhn's framework?", "options": [{"text": "The heliocentric model was accepted because Galileo had political connections that the Ptolemaic astronomers lacked.", "isCorrect": false, "rationale": "The text attributes the shift to the new model's elegance and Galileo's rhetorical power, not to political connections."}, {"text": "The geocentric model was not definitively refuted — the shift happened because the heliocentric model offered a more elegant framework and Galileo made it culturally and rhetorically irresistible.", "isCorrect": true, "rationale": "The text states: 'The shift happened not because the geocentric model was definitively refuted but because the heliocentric model offered a more elegant framework for puzzle-solving, and because Galileo made the new framework culturally and rhetorically irresistible. The transition was not a logical event. It was a social one.'"}, {"text": "The shift was driven by new telescope observations that conclusively proved the heliocentric model.", "isCorrect": false, "rationale": "The text says the geocentric model had 'accumulated epicycles and corrections sufficient to produce acceptable predictions' and was 'not obviously worse.' The shift was not driven by conclusive observational refutation."}, {"text": "The Ptolemaic model was simply forgotten rather than replaced — astronomers moved on without formally rejecting it.", "isCorrect": false, "rationale": "The text describes a paradigm shift — a revolutionary reorganization of the field — not mere forgetting. Kuhn's account requires an active replacement of one framework by another."}], "id": "q05"}, {"question": "Paul Feyerabend's 'epistemological anarchism' is summarized as 'anything goes.' What did Feyerabend actually mean by this, according to the text?", "options": [{"text": "Evidence does not matter in science; all beliefs are equally well-supported.", "isCorrect": false, "rationale": "The text explicitly states: 'His point was not that evidence doesn't matter or that any belief is as good as any other.' This misrepresents his view."}, {"text": "Every methodological rule ever proposed has been violated at crucial moments by the scientists who made the discoveries the rule was supposed to explain — the discoveries were not derived from the rules; the rules were reverse-engineered from the discoveries.", "isCorrect": true, "rationale": "The text states: 'every methodological rule… has been violated, at crucial moments, by the scientists who made the discoveries the rule was supposed to explain. Galileo didn't follow the rules. Newton didn't follow the rules. Einstein didn't follow the rules. The rules… were reverse-engineered from the discoveries.'"}, {"text": "Scientists should be free to pursue any research topic without institutional or ethical constraints.", "isCorrect": false, "rationale": "Feyerabend's anarchism is epistemological — about the absence of universal methodological rules — not about institutional or ethical deregulation of research."}, {"text": "Philosophy of science is useless and scientists should ignore it entirely.", "isCorrect": false, "rationale": "Feyerabend was himself a philosopher of science engaged with Popper, Kuhn, and Lakatos. His point is about the failure of formal methods, not that philosophy should be abandoned."}], "id": "q06"}, {"question": "The text claims science is 'a game that changes its own rules.' What makes this the most important distinguishing feature of science?", "options": [{"text": "Science uses more sophisticated equipment than other knowledge-producing activities.", "isCorrect": false, "rationale": "The text makes no mention of equipment as what distinguishes science. Its claim is about the culture of provisional rules and anomaly-seeking."}, {"text": "After every scientific revolution, not just the answers but the questions and the criteria for what counts as a good answer change — the game rewrites its rules in the course of play.", "isCorrect": true, "rationale": "The text states: 'Every major scientific revolution has not just added to scientific knowledge but changed what counts as scientific knowledge, what counts as a scientific question, and what counts as a scientific answer. The game rewrites its rules in the course of play.'"}, {"text": "Science is the only activity in which participants are required to cite evidence for their claims.", "isCorrect": false, "rationale": "Law, history, and journalism also require evidence. The distinguishing feature, per the text, is the self-revision of the rules themselves, not mere evidence-citing."}, {"text": "Science uniquely prohibits appeals to authority or tradition.", "isCorrect": false, "rationale": "The text describes science as a culture in which the rules are provisional, not as one that simply bans authority. Kuhn's paradigms involve considerable deference to exemplary past practice."}], "id": "q07"}, {"question": "The text says the 'secret' of science's power is 'not a method' but 'a culture.' What does this culture consist of, according to the text?", "options": [{"text": "A culture in which scientists are rewarded financially for making new discoveries.", "isCorrect": false, "rationale": "The text does not mention financial incentives. Its account of science's culture is about epistemic norms — what is valued — not about material rewards."}, {"text": "A form of life in which rules are provisional, anomalies are the most interesting things, and the highest virtue is to be proven wrong in a way that generates something new.", "isCorrect": true, "rationale": "The text ends by describing science as 'a culture — a form of life, as Wittgenstein would say — in which the rules are provisional, anomalies are the most interesting things, and the highest virtue is to be proven wrong in a way that generates something new.'"}, {"text": "A culture of peer review and institutional skepticism that prevents fraudulent research from being published.", "isCorrect": false, "rationale": "While peer review exists, the text's account of what makes science powerful focuses on its self-revising epistemic norms, not institutional fraud-prevention."}, {"text": "A culture of international cooperation that allows researchers worldwide to share data and collaborate.", "isCorrect": false, "rationale": "International cooperation is not mentioned. The text's point is about the epistemic culture — the attitude toward anomalies and rules — not about organizational structure."}], "id": "q08"}, {"question": "A pharmaceutical company claims its drug is effective because it has never been proven ineffective in a clinical trial, and it has been used for 20 years without disaster. Using the concepts from this section, identify the most precise criticism of this reasoning.", "options": [{"text": "The company's claim commits a logical fallacy by appealing to tradition.", "isCorrect": false, "rationale": "While 'appeal to tradition' is relevant, the text provides a more precise framework: failure to test falsifiability and the problem of induction (twenty years of non-disaster does not logically entail efficacy or safety)."}, {"text": "The reasoning commits both Hume's inductive fallacy (past non-disasters do not logically imply future safety) and violates Popper's falsificationism (absence of a refuting observation is not evidence of a hypothesis's truth).", "isCorrect": true, "rationale": "Hume: no finite number of successful uses logically justifies a universal safety claim (black swans apply). Popper: a hypothesis that 'predicts everything' (never been proven ineffective = consistent with all outcomes) is epistemically worthless. Both apply here."}, {"text": "The company is following a Baconian method, which the text shows is adequate for establishing pharmaceutical safety.", "isCorrect": false, "rationale": "Hume demolished Bacon's inductivism precisely because accumulated observations cannot logically warrant universal conclusions — which is exactly what the company is attempting."}, {"text": "The claim is a paradigm shift in progress and should be evaluated by Kuhnian criteria.", "isCorrect": false, "rationale": "There is no paradigm shift here — the company is not proposing a new framework. The error is inductive and falsificationist, not paradigmatic."}], "id": "q09"}, {"question": "The text notes that after the Copernican Revolution, astronomers were 'doing a different kind of astronomy, asking different questions, deploying different tools.' What does this show about the relationship between successive paradigms?", "options": [{"text": "Each paradigm is simply a more accurate version of the previous one, converging toward perfect truth.", "isCorrect": false, "rationale": "The text explicitly states that the new paradigm is not more 'true' than the old one in any simple sense; it solves different problems and ignores different anomalies. Convergent progress toward truth is not Kuhn's claim."}, {"text": "Successive paradigms are not straightforwardly comparable — they solve different problems, ignore different anomalies, and constitute different games with different rules.", "isCorrect": true, "rationale": "The text states that the new paradigm is not more 'true' in any simple sense; it solves different problems and ignores different anomalies. It is, in the vocabulary of this book, a different game with different rules."}, {"text": "Old paradigms are completely worthless once replaced and should be discarded from science education.", "isCorrect": false, "rationale": "The text makes no such normative claim. Kuhn's point is about the structure of change, not about the worthlessness of superseded frameworks."}, {"text": "Paradigm shifts occur randomly and cannot be explained by looking at what anomalies accumulated.", "isCorrect": false, "rationale": "Kuhn's account is precisely that crises occur 'when anomalies accumulate to the point where normal puzzle-solving can no longer contain them.' The process is patterned, not random."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
