        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Useful Fictions: A Field Guide &mdash; The Magic Circle</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Johan Huizinga's central claim in Homo Ludens (1938) reverses the common assumption about the relationship between play and civilization. Which statement best captures his thesis?", "options": [{"text": "Civilization developed first, and play emerged as a leisure activity within it.", "isCorrect": false, "rationale": "This is exactly the assumption Huizinga overturns. He argues civilization is a byproduct of play, not the other way around."}, {"text": "Play is a byproduct of civilization that helps adults relax from serious pursuits like law and war.", "isCorrect": false, "rationale": "The text explicitly states this common view is what Huizinga's argument rejects. He treats law and war as forms of play, not the reverse."}, {"text": "Civilization is a byproduct of play — law, war, philosophy, and ritual are at their roots forms of play that were institutionalized and made serious.", "isCorrect": true, "rationale": "The text states directly: 'Civilization is a byproduct of play… Law, war, philosophy, poetry, ritual, and courtship… are, at their roots, forms of play that have been elaborated, institutionalized, and made serious.'"}, {"text": "Play and civilization evolved simultaneously and are best understood as parallel developments.", "isCorrect": false, "rationale": "Huizinga makes a directional claim — the game came first. A parallel-evolution view misrepresents his argument."}], "id": "q01"}, {"question": "According to Huizinga's definition, which of the following is NOT a defining feature of play?", "options": [{"text": "It is voluntary and intrinsically motivated.", "isCorrect": false, "rationale": "The text explicitly lists voluntary and intrinsic motivation among play's defining features."}, {"text": "It produces outcomes that are recognized as valid outside the game's boundaries.", "isCorrect": true, "rationale": "The text states play produces 'outcomes that have no reality outside that space.' External validity is not a feature of play — it is its opposite."}, {"text": "It is temporally bounded — it has a beginning and an end.", "isCorrect": false, "rationale": "Temporal boundedness is explicitly listed: play is 'temporally bounded.'"}, {"text": "It is governed by rules that have no authority outside the designated space.", "isCorrect": false, "rationale": "Rules with limited jurisdiction are a defining feature: 'governed by rules that have no authority outside that space.'"}], "id": "q02"}, {"question": "When children declare that a stick is a sword and other children accept this, the text describes the result as 'a zone of altered ontology.' What does this phrase mean in context?", "options": [{"text": "The children are engaging in self-deception and genuinely forget the stick is not a sword.", "isCorrect": false, "rationale": "Huizinga's framework includes the idea that participants know they are playing — the special consciousness coexists with the fiction, not replaced by it."}, {"text": "Within the agreed space, the stick genuinely is a sword for all purposes relevant to the game — a region where different rules about what things are applies.", "isCorrect": true, "rationale": "The text says 'Inside this zone, the stick genuinely is a sword — for all purposes relevant to the game,' which is what altered ontology (altered facts about what things are) means."}, {"text": "The stick becomes physically transformed by the children's belief.", "isCorrect": false, "rationale": "The transformation is consensual and bounded to the game-space, not physical. The magic circle is a psychological and social boundary, not a material one."}, {"text": "The children are using metaphor to describe the stick symbolically without any real change in rules.", "isCorrect": false, "rationale": "The magic circle does more than metaphor — it creates a bounded space where the object actually functions as a sword for game purposes. Simple metaphor would not require entering or refusing to enter a 'circle.'"}], "id": "q03"}, {"question": "The text describes a child who says 'it's just a stick' as not having 'scored a philosophical point.' What is the text's actual claim about this child's action?", "options": [{"text": "She has exposed the logical contradiction at the heart of the magic circle.", "isCorrect": false, "rationale": "The text treats her refusal as practically meaningful, not as a logical victory over the others. The circle has its own internal coherence."}, {"text": "She has revealed that the magic circle is an illusion and the others are mistaken.", "isCorrect": false, "rationale": "The text implies the opposite: the magic circle is real in its effects, and the child who refuses to enter it has simply stepped outside its domain."}, {"text": "She has simply refused to enter the magic circle — opting out of the shared agreement rather than refuting it.", "isCorrect": true, "rationale": "The text says explicitly: 'The child who insists it\\'s just a stick has not scored a philosophical point. She has simply refused to enter the magic circle.' Opting out is not the same as disproving."}, {"text": "She is correct, and the game should be stopped because the fiction is harmful.", "isCorrect": false, "rationale": "The text offers no such normative endorsement of the objecting child. The magic circle framework is presented as enabling important social structures, not as harmful."}], "id": "q04"}, {"question": "The text argues that the Geneva Conventions represent 'a fiction of enormous practical consequence.' What makes this a fiction at all, given that it has real effects?", "options": [{"text": "The Conventions are fictional because they were written by diplomats who had never experienced combat.", "isCorrect": false, "rationale": "The text says nothing about who wrote them. The 'fictional' quality has to do with the mechanism by which they work, not their authorship."}, {"text": "They work not because they are enforced by a sovereign power standing above all armed parties — no such power exists — but because parties accept the fiction that they are bound by rules even while trying to kill each other.", "isCorrect": true, "rationale": "The text states exactly this: they work 'not because they are enforced by some sovereign power standing above all armed parties (there is no such power), but because the parties to the game accept the fiction that they are bound by rules.'"}, {"text": "They are fictional because nations routinely violate them, so their binding force is entirely imaginary.", "isCorrect": false, "rationale": "The text notes the laws of war 'work — to the extent they do,' acknowledging partial effectiveness. Fiction here doesn't mean ineffective."}, {"text": "The categories they create (soldier, prisoner of war, military target) are self-evident in the field and require no shared agreement.", "isCorrect": false, "rationale": "The text explicitly contradicts this: 'These categories are not self-evident in the field. They are maintained by agreement to play by the rules.'"}], "id": "q05"}, {"question": "The text identifies a courtroom as an example of the magic circle. Which feature of a courtroom does the text NOT cite as maintaining the magic circle's boundary?", "options": [{"text": "The physical railing (the bar) separating participants from spectators.", "isCorrect": false, "rationale": "The text explicitly mentions 'there is a railing, the bar, that separates participants from spectators' as one of the boundary markers."}, {"text": "The requirement that witnesses swear oaths.", "isCorrect": false, "rationale": "The text explicitly states 'Witnesses must swear oaths' as part of the courtroom's formalized structure."}, {"text": "The judge's ability to sentence defendants to prison.", "isCorrect": true, "rationale": "The text focuses on theatrical and ritual markers — robes, oaths, forms of address, the railing — as boundary maintainers. The coercive sentencing power is not mentioned as a magic-circle mechanism; the text's point is that authority comes from performance, not from force."}, {"text": "The distinctive clothing (robes) that marks the judge's authority.", "isCorrect": false, "rationale": "The text says 'The judge wears distinctive clothing that marks their authority' as part of the circle's maintenance."}], "id": "q06"}, {"question": "The text identifies the magic circle as 'the master category of the entire book.' What does this claim mean?", "options": [{"text": "The magic circle is the most entertaining concept in the book, useful mainly for explaining sports and games.", "isCorrect": false, "rationale": "The magic circle is presented as foundational to law, currency, corporations, and other serious institutions — not primarily for sports, and not as 'entertaining.'"}, {"text": "Every useful fiction in the book works by establishing a boundary between the space where the fiction holds and the space where it does not — and this structure is exactly what the magic circle describes.", "isCorrect": true, "rationale": "The text states: 'Every useful fiction examined in these pages operates by establishing a boundary between the space where the fiction holds and the space where it does not.' This is the magic circle's structure."}, {"text": "Huizinga's concept of the magic circle was chronologically the first useful fiction to be invented.", "isCorrect": false, "rationale": "The text makes no claim about chronological priority. 'Master category' is a logical claim about structure, not a historical claim about sequence."}, {"text": "The magic circle is the only type of useful fiction that produces genuinely real effects.", "isCorrect": false, "rationale": "All useful fictions in the book produce real effects. The magic circle is not singled out as uniquely real; it is the structural pattern shared by all of them."}], "id": "q07"}, {"question": "The text describes the seriousness of a game as 'simultaneously genuine and performed, real and fictional, deeply felt and known to be constructed.' Imagine a juror who understands that courts are human inventions and verdicts are not divinely determined. According to the text, what follows for the verdict's authority?", "options": [{"text": "The verdict's authority is destroyed because the juror can see through the fiction.", "isCorrect": false, "rationale": "The text argues the opposite: knowing the robes are costumes and the law is contested text does not diminish authority. The authority is produced by performance, not by metaphysical weight."}, {"text": "The verdict retains full authority because the authority is produced by the shared agreement to play the game, regardless of whether participants understand its constructed nature.", "isCorrect": true, "rationale": "The text states: the courtroom's authority is not diminished by the knowledge that the robes are costumes, the oaths are conventions, and the law is a text that lawyers spend their careers disputing. The authority is produced by the performance of authority, sustained by the agreement to play the game."}, {"text": "The juror's knowledge transforms them into an outsider observer who cannot legitimately participate.", "isCorrect": false, "rationale": "The text implies knowing you are playing does not exclude you from the game — Huizinga's definition includes a 'special consciousness' where participants know they are playing, and this knowledge 'does not diminish but intensifies the experience.'"}, {"text": "The verdict is now merely the opinion of twelve individuals backed by force, with no genuine authority.", "isCorrect": false, "rationale": "The text uses this description ('someone's opinion backed by force') for law outside a jurisdiction, not for law operating within the magic circle of a functioning court."}], "id": "q08"}, {"question": "The text notes that when defendants laugh at judges, soldiers massacre prisoners, or athletes attack referees, observers experience this as a violation of 'something more fundamental' than a rule. What is that something more fundamental?", "options": [{"text": "The natural law that prohibits violence.", "isCorrect": false, "rationale": "The text's framework is consensual and social, not based on natural law. The violation is felt because it breaks the shared fiction, not because it transgresses an external moral law."}, {"text": "The legal code that governs the activity.", "isCorrect": false, "rationale": "Breaking a specific legal code is a violation of a rule. The text distinguishes this from the 'something more fundamental' — the shared fiction that makes the rules possible at all."}, {"text": "The shared fiction — the collective agreement — that made the activity (trial, warfare under conventions, sport) possible at all.", "isCorrect": true, "rationale": "The text says the violation is felt as breaking 'the shared fiction that made the activity possible at all.' This is the magic circle itself, not any particular rule within it."}, {"text": "The participants' personal honor and reputation.", "isCorrect": false, "rationale": "While honor may be at stake, the text's analysis operates at the level of collective fictions and shared agreements, not individual reputation."}], "id": "q09"}, {"question": "The text ends by stating: 'The question is never whether the magic circle is real. The question is whether enough people agree to play the game.' A currency union is considering adding a new member nation whose citizens are largely skeptical of the shared currency. Using the magic circle framework, what does this skepticism most directly threaten?", "options": [{"text": "The physical supply of banknotes and coins, which depends on public confidence to remain in circulation.", "isCorrect": false, "rationale": "The magic circle framework is about collective agreement and social ontology, not the logistics of physical currency supply."}, {"text": "The consensus agreement that transforms paper rectangles into valid obligations of the state — without that agreement, the currency cannot function.", "isCorrect": true, "rationale": "The text explicitly states that currency requires 'the magic circle that transforms a paper rectangle into an obligation of the state,' and that the question is always whether enough people agree to play. Widespread skepticism attacks the consensual foundation directly."}, {"text": "The technical payment infrastructure that processes transactions across national borders.", "isCorrect": false, "rationale": "Technical infrastructure is not what the magic circle framework addresses. The framework is about shared belief, not engineering systems."}, {"text": "The nation's central bank, which is the ultimate guarantor of the currency's value.", "isCorrect": false, "rationale": "The text's point about currency is that its authority comes from collective agreement, not from an institutional guarantor — analogous to how the Geneva Conventions work without an enforcing sovereign."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
