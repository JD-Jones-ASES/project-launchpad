        <div class="subtitle">Useful Fictions: A Field Guide &mdash; The Invention of Money</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What did the rai stones of Yap most clearly demonstrate about the nature of money?", "options": [{"text": "That money requires a physical object of substantial weight to be credible.", "isCorrect": false, "rationale": "The rai stones could remain at the sea floor or in an inaccessible location and still circulate as money, proving that physical presence or substance is irrelevant."}, {"text": "That money is fundamentally information held in collective belief, not a physical substance.", "isCorrect": true, "rationale": "Ownership of a rai stone changed through shared social agreement — the community updated its 'mental ledger' — without the stone moving. This exposes money as collective belief, not substance."}, {"text": "That only island cultures need abstract monetary systems because trade goods are too large to transport.", "isCorrect": false, "rationale": "The rai stone example is presented as illustrating a universal truth about all monetary systems, not a quirk of island geography."}, {"text": "That ancient cultures mistrusted precious metals and preferred stone-based currencies.", "isCorrect": false, "rationale": "The text draws no comparison between stone and precious-metal preference; the rai stones illustrate the philosophical skeleton of all money."}], "id": "q01"}, {"question": "The text describes the history of money as 'a history of progressive dematerialization.' Which sequence best reflects this trajectory?", "options": [{"text": "Commodity money → fiat paper → gold coins → digital cryptocurrency", "isCorrect": false, "rationale": "This sequence is out of order; gold coins preceded fiat paper, and cryptocurrency comes after fiat paper, not between earlier stages."}, {"text": "Gold coins → commodity money → fiat paper → digital entries", "isCorrect": false, "rationale": "Commodity money (shells, livestock, grain) preceded gold coins; the sequence does not start with coins."}, {"text": "Commodity goods (shells, grain) → metal coins → backed paper → fiat digits", "isCorrect": true, "rationale": "The text traces money from intrinsically useful commodities, to metal coins whose value partly exceeded raw metal, to paper backed by gold, to purely notional digital entries — each step less material than the last."}, {"text": "Barter → digital ledgers → commodity goods → metal coins", "isCorrect": false, "rationale": "Digital ledgers are the most recent development, not an early stage; barter precedes commodity money but is not itself a monetary system."}], "id": "q02"}, {"question": "According to the text, what does the 'double coincidence of wants' problem explain?", "options": [{"text": "Why governments must control the money supply to prevent inflation.", "isCorrect": false, "rationale": "The double coincidence of wants concerns the inefficiency of barter exchange between individuals, not governmental monetary policy."}, {"text": "Why pure barter economies are inefficient and why monetary systems arise reliably across cultures.", "isCorrect": true, "rationale": "Barter requires simultaneous mutual need; you must find someone who has what you want and wants exactly what you have. Money dissolves this constraint by providing a universal intermediate, explaining its near-universal adoption."}, {"text": "Why gold became the preferred backing for currency in most civilizations.", "isCorrect": false, "rationale": "The double coincidence of wants explains the need for money in general, not the specific choice of gold as a backing material."}, {"text": "Why Bitcoin requires collective belief in the validity of its ledger.", "isCorrect": false, "rationale": "Bitcoin's trust problem is discussed separately in the text; the double coincidence of wants is the foundational problem that any money system — not just crypto — solves."}], "id": "q03"}, {"question": "A sovereign's stamp on a gold coin made it worth more as currency than as raw metal. What concept does this illustrate?", "options": [{"text": "Fractional reserve banking, because the stamp created more value than the metal contained.", "isCorrect": false, "rationale": "Fractional reserve banking refers to banks lending money into existence through loans, not to the premium a sovereign stamp adds to coinage."}, {"text": "The double coincidence of wants, because the stamp told both parties what the other wanted.", "isCorrect": false, "rationale": "The double coincidence of wants is about the coordination problem in barter; the sovereign stamp is about social institutions layered on top of physical objects."}, {"text": "A social institution layered on top of physics — the coin's monetary value derived from collective trust in sovereign authority, not merely its metal content.", "isCorrect": true, "rationale": "The text states the sovereign's stamp vouched for weight and purity and that 'the social institution was what made the coin work as money,' showing monetary value is socially constructed even for metal coins."}, {"text": "The gold standard, because the stamp fixed the coin's exchange rate to a specific gold weight.", "isCorrect": false, "rationale": "The gold standard is a specific formal policy system (Britain from 1717, U.S. from 1900); the premium of coined versus raw gold is a more general phenomenon predating that system."}], "id": "q04"}, {"question": "The gold standard was described as 'psychologically reassuring and economically constraining.' During the Great Depression, how did the constraint manifest?", "options": [{"text": "It forced banks to foreclose on farmers, creating widespread rural poverty.", "isCorrect": false, "rationale": "While bank foreclosures did occur, the text's specific point about the gold standard's constraint is that it limited monetary policy, not that it directly caused farm foreclosures."}, {"text": "It prevented the federal government from expanding the money supply to fight deflation, and countries that left it earlier recovered sooner.", "isCorrect": true, "rationale": "The text states the gold standard 'prevented the federal government from expanding the money supply to reflate prices and revive demand,' and that 'Countries that abandoned the gold standard earlier recovered earlier.'"}, {"text": "It caused foreign governments to demand U.S. gold reserves, draining them to zero.", "isCorrect": false, "rationale": "The text focuses on the domestic policy constraint — inability to expand money supply — not on foreign drain of reserves as the Depression's cause."}, {"text": "It made international trade impossible because exchange rates could not float to reflect economic conditions.", "isCorrect": false, "rationale": "The text does not discuss floating exchange rates or trade disruption; it focuses on the domestic monetary policy limitation imposed by gold backing."}], "id": "q05"}, {"question": "What was the significance of Nixon's announcement on August 15, 1971?", "options": [{"text": "It created the Federal Reserve and gave the government independent monetary control for the first time.", "isCorrect": false, "rationale": "The Federal Reserve was created in 1913; Nixon's 1971 announcement ended the Bretton Woods dollar-gold convertibility, completing a transition that had been underway since 1913."}, {"text": "It established Bitcoin's philosophical precedent that currency could be backed by mathematical proof.", "isCorrect": false, "rationale": "Bitcoin was created in 2009 by Satoshi Nakamoto; the text does not connect Nixon's decision to cryptocurrency's origins."}, {"text": "It completed money's transformation into a purely social institution backed by nothing but government authority and collective confidence.", "isCorrect": true, "rationale": "By ending dollar-gold convertibility, Nixon's announcement meant money was 'now purely a social institution, backed by nothing but the taxing power of the government and the collective confidence of the people who used it.'"}, {"text": "It triggered a global currency crisis that destroyed international trade for a decade.", "isCorrect": false, "rationale": "The text describes the financial system continuing to work — 'The emperor had no clothes, and the financial system kept working anyway' — not a destructive collapse."}], "id": "q06"}, {"question": "When a commercial bank approves a mortgage, how does money come into existence in the modern system described in the text?", "options": [{"text": "The bank retrieves cash from the Federal Reserve's vault and transfers it to the seller's account.", "isCorrect": false, "rationale": "The text explicitly states banks do not retrieve cash from a vault; they create new money by typing a number into a computer, reflecting fractional reserve banking."}, {"text": "The bank converts gold reserves at Fort Knox into paper currency at a fixed exchange rate.", "isCorrect": false, "rationale": "The gold-dollar link was severed in 1971; modern money is not created by converting gold reserves."}, {"text": "New money is created as a digital entry — a credit and a corresponding liability — backed by a promise to repay.", "isCorrect": true, "rationale": "The text states: 'When a bank approves your mortgage... it types a number into a computer: your account is credited, the seller's account is credited, and a corresponding liability appears on the bank's books. New money has been created, not from gold or paper, but from a promise to repay.'"}, {"text": "The government prints new currency and distributes it to banks as needed for loan originations.", "isCorrect": false, "rationale": "The text says 'the vast majority of money in existence is not printed or minted' and that commercial banks — not the government — create it through lending."}], "id": "q07"}, {"question": "A local coffee shop decides to issue its own 'loyalty tokens' redeemable for drinks. Customers begin trading these tokens among themselves for unrelated goods. Using the text's framework, which condition is most essential for the tokens to function as genuine money?", "options": [{"text": "The tokens must be made of a material with intrinsic worth, such as metal or durable plastic.", "isCorrect": false, "rationale": "The text argues material substance is irrelevant — even sunken rai stones circulated as money. What matters is collective belief, not the token's physical composition."}, {"text": "The tokens must be issued with government backing so legal-tender status applies.", "isCorrect": false, "rationale": "Legal-tender status is one source of confidence, but the text shows money can operate on pure collective belief without formal government sanction — as rai stones did."}, {"text": "Users must collectively believe others will accept the tokens in exchange for things they want.", "isCorrect": true, "rationale": "The text defines money's value as 'the belief that others will accept it in exchange for things you want' — this shared expectation is the core condition, as true for tokens as for rai stones or fiat dollars."}, {"text": "The number of tokens in circulation must be capped and verifiable to prevent inflation.", "isCorrect": false, "rationale": "Supply control affects the stability of a monetary system but is not what makes an object money in the first place; belief is the foundational condition."}], "id": "q08"}, {"question": "Bitcoin was designed to replace institutional trust with mathematical proof. According to the text, what problem does this redesign fail to fully solve?", "options": [{"text": "Bitcoin's blockchain cannot actually record transactions without a central bank to validate them.", "isCorrect": false, "rationale": "The text describes the blockchain as a distributed ledger maintained across thousands of computers with 'no single point of control' — the absence of a central bank is a feature, not a flaw the text identifies."}, {"text": "The mathematical rules cannot prevent governments from seizing Bitcoin wallets.", "isCorrect": false, "rationale": "Government seizure of wallets is not mentioned in the text; the problem identified is social, not a regulatory enforcement issue."}, {"text": "Bitcoin still requires collective social belief that the ledger is valid and that someone will accept it tomorrow.", "isCorrect": true, "rationale": "The text states Bitcoin 'still requires collective belief that the ledger is valid, that the rules will be followed, and that someone tomorrow will exchange it for something you want. The magic is the same. The mechanism is different.'"}, {"text": "Bitcoin has no supply cap, so it is vulnerable to the same inflation risks as fiat currencies.", "isCorrect": false, "rationale": "The text states 'No central authority can inflate the currency by printing more of it; the rules are written in code' — Bitcoin's supply limit is presented as a design feature, not a vulnerability."}], "id": "q09"}, {"question": "The text's Specimen box on fiat currency states: 'Money was never not a fiction. The gold standard was a fiction with better props.' What does 'better props' refer to?", "options": [{"text": "The gold standard provided stronger legal enforcement mechanisms than fiat currencies do.", "isCorrect": false, "rationale": "The text does not compare enforcement mechanisms; 'props' is a theatrical metaphor about psychological reassurance, not legal authority."}, {"text": "Gold reserves gave the monetary fiction the appearance of physical grounding, making collective belief easier to sustain.", "isCorrect": true, "rationale": "The gold standard's 'psychological reassurance' came from the sense that money corresponded to 'something you could, at least in theory, hold in your hand' — gold served as a prop that made the underlying fiction feel more real."}, {"text": "The gold standard used more sophisticated financial instruments than cowrie-shell currencies.", "isCorrect": false, "rationale": "The comparison in the Specimen box is between the gold standard and modern fiat currency, not between different historical currencies; 'props' refers to gold as a confidence mechanism."}, {"text": "The gold standard prevented hyperinflation more effectively because the props constrained government spending.", "isCorrect": false, "rationale": "While the gold standard did constrain spending, the text's point in this sentence is about the psychological illusion of grounding, not the anti-inflationary constraint."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
