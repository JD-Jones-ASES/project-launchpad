        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to Plato's proposal, what is the primary purpose of the 'noble lie' in the ideal city?", "options": [{"text": "To identify and punish individuals who challenge the state's authority.", "isCorrect": false, "rationale": "The text states the noble lie is a 'founding myth designed to promote social cohesion by convincing citizens they were born with souls of different metals,' not for punishment or suppression of dissent."}, {"text": "To ensure social cohesion and justify assigned roles based on natural aptitude.", "isCorrect": true, "rationale": "The text explicitly states the noble lie is 'a founding myth designed to promote social cohesion by convincing citizens they were born with souls of different metals, suiting them for different roles in the city,' and that 'the system is based on natural aptitude, not birth.'"}, {"text": "To provide a historical account of the city's actual origins and development.", "isCorrect": false, "rationale": "Socrates himself admits the story is a 'fabrication' and a 'lie,' indicating it is not a truthful historical account but a myth."}, {"text": "To allow citizens to freely choose their profession based on personal preference.", "isCorrect": false, "rationale": "The noble lie's purpose is to convince citizens of pre-ordained roles based on their 'metal-souls,' thereby justifying assigned places, rather than promoting free choice."}], "id": "q01"}, {"question": "Which of the following best describes the ethical paradox central to Plato's Noble Lie?", "options": [{"text": "The conflict between individual liberty and the common good, regardless of truth.", "isCorrect": false, "rationale": "While related, the core paradox is specifically about whether a beneficial outcome can justify a foundational lie, not simply any conflict between individual and common good."}, {"text": "The tension between achieving a just and stable society through deception versus upholding the principle of honesty.", "isCorrect": true, "rationale": "The 'paradoxbox' explicitly asks: 'If a carefully constructed falsehood produces a just and stable society... is the lie justified? Or does the deception itself corrupt the justice it is supposed to serve?' This captures the tension between societal benefit and honesty."}, {"text": "The difficulty of distinguishing between a 'white lie' and a 'noble lie' in everyday situations.", "isCorrect": false, "rationale": "The text explicitly differentiates the noble lie from a 'white lie to spare someone's feelings,' emphasizing its systematic, state-sponsored nature."}, {"text": "The challenge of finding a myth that is universally accepted by all citizens.", "isCorrect": false, "rationale": "The challenge mentioned is about the ethical justification of the lie itself, not merely its acceptance, which is assumed once taught from childhood."}], "id": "q02"}, {"question": "A key argument *against* the Noble Lie, as presented in the text, concerns the relationship between rulers and the governed. What is this argument?", "options": [{"text": "It requires rulers to be exceptionally wise and virtuous, which is unrealistic.", "isCorrect": false, "rationale": "While true that wise rulers are desirable, the text's specific argument against the lie focuses on the inherent dishonesty and lack of consent, not the difficulty of finding virtuous rulers."}, {"text": "It creates a fundamentally dishonest relationship where citizens cannot truly consent to their social order.", "isCorrect": true, "rationale": "The text states: 'A society built on deception... is a society in which the rulers stand in a fundamentally dishonest relationship to the governed. The citizens cannot consent to an arrangement whose true nature is hidden from them.'"}, {"text": "It promotes a rigid social hierarchy that stifles innovation and individual potential.", "isCorrect": false, "rationale": "The system is based on 'natural aptitude' and allows movement between classes (gold-souled child to bronze parents moves up), suggesting it's not strictly rigid in a way that stifles potential based on birth, but rather places based on perceived nature."}, {"text": "It is an outdated concept with no relevance to modern political structures.", "isCorrect": false, "rationale": "The 'realworld' section explicitly discusses modern applications and the ongoing relevance of the Platonic question."}], "id": "q03"}, {"question": "According to the 'caution' box, what is a common misinterpretation of Plato's 'noble lie'?", "options": [{"text": "That it applies only to ancient Greek societies and not to modern nations.", "isCorrect": false, "rationale": "The text clarifies its *meaning*, not its historical applicability, which the 'realworld' section extends."}, {"text": "That it is the same as any politically convenient falsehood or self-serving deception.", "isCorrect": true, "rationale": "The 'caution' box states: 'It does not mean “any politically convenient falsehood.” Politicians who lie to cover up scandals are not practicing Plato's noble lie — they are practicing ordinary deception for self-interested reasons.'"}, {"text": "That it proposes a system where rulers are always of a 'gold-soul' and never 'bronze-souled.'", "isCorrect": false, "rationale": "The text clarifies that a gold-souled child born to bronze parents moves to the rulers, indicating that 'souls' determine roles, not birth parents, which is not a common misinterpretation discussed."}, {"text": "That it is meant to promote social discord rather than harmony.", "isCorrect": false, "rationale": "The text clearly defines the noble lie as a myth 'designed to promote social cohesion' and 'genuine social harmony.'"}], "id": "q04"}, {"question": "A central banker expresses more confidence in economic stability than they truly feel, believing that public confidence is self-fulfilling and doubt is self-fulfilling too. How would the text's 'realworld' section likely categorize this action?", "options": [{"text": "As an example of ordinary political dishonesty for personal gain.", "isCorrect": false, "rationale": "The text implies this is done for perceived common good (stability), not personal gain, distinguishing it from 'ordinary political dishonesty.'"}, {"text": "As a clear instance of Plato's Noble Lie in its purest form.", "isCorrect": false, "rationale": "The 'realworld' section uses this as an example of a situation where the Platonic question applies, but it doesn't call it a 'purest form' or an exact Noble Lie, which is a specific founding myth."}, {"text": "As a scenario where the Platonic question of whether benefit justifies deception applies.", "isCorrect": true, "rationale": "The 'realworld' section uses this exact example and concludes: 'In each case, the Platonic question applies: does the benefit of the simplification justify the deception?'"}, {"text": "As a demonstration that all forms of public messaging are inherently deceptive.", "isCorrect": false, "rationale": "The text focuses on specific instances of strategic simplification or omission, not a blanket statement that 'all forms' of messaging are deceptive."}], "id": "q05"}, {"question": "What is the primary mechanism by which Plato's Noble Lie assigns individuals to social roles?", "options": [{"text": "Hereditary status passed down from parents to children.", "isCorrect": false, "rationale": "The text explicitly states: 'The system is based on natural aptitude, not birth,' and describes how a gold-souled child of bronze parents should be raised among rulers, and vice-versa."}, {"text": "Democratic elections where citizens vote for their preferred leaders.", "isCorrect": false, "rationale": "The text describes an assigned social order based on a founding myth, not a democratic electoral process."}, {"text": "Divine intervention or oracle pronouncements.", "isCorrect": false, "rationale": "While a god 'mixed different metals into their souls,' the practical assignment is based on discovering this 'natural aptitude,' not ongoing divine pronouncements for each individual."}, {"text": "Natural aptitude, symbolized by different metals mixed into their souls at birth.", "isCorrect": true, "rationale": "The text states: 'The god who made them mixed different metals into their souls: gold for the rulers, silver for the warriors, and bronze for the farmers and craftsmen. Each person is suited by nature for a particular role.'"}], "id": "q06"}, {"question": "The text contrasts Plato's Noble Lie with 'ordinary deception for self-interested reasons.' What is the fundamental difference highlighted?", "options": [{"text": "The Noble Lie is easier to detect than self-interested deception.", "isCorrect": false, "rationale": "The text does not discuss detectability. In fact, citizens believe the lie, suggesting it's not easily detected by them."}, {"text": "The Noble Lie is a state-sponsored founding myth aimed at social harmony, while ordinary deception serves individual or group self-interest.", "isCorrect": true, "rationale": "The 'caution' box states the noble lie is 'a founding myth designed to produce genuine social harmony based on natural aptitude,' contrasting it with politicians' lies 'for self-interested reasons.'"}, {"text": "The Noble Lie is always a temporary measure, while ordinary deception is permanent.", "isCorrect": false, "rationale": "The noble lie is described as a 'founding myth to be taught to every citizen from childhood' as a foundation for social order, implying permanence, not temporary status."}, {"text": "Ordinary deception is always more damaging to society than the Noble Lie.", "isCorrect": false, "rationale": "The text presents the Noble Lie itself as troubling and problematic, with arguments against it, not necessarily less damaging than other lies."}], "id": "q07"}, {"question": "What commonality does the text draw between the Noble Lie and the founding narratives of modern nations like America or France?", "options": [{"text": "All are based on explicit, acknowledged fabrications like the 'metals in souls' myth.", "isCorrect": false, "rationale": "The text states these narratives 'involve selective emphasis, strategic omission, and a generous helping of retrospective mythmaking,' not necessarily explicit fabrications like the noble lie."}, {"text": "They are all designed to justify a rigid, unchangeable class system.", "isCorrect": false, "rationale": "The noble lie is based on aptitude, allowing movement, and the modern narratives are not necessarily about justifying rigid class systems."}, {"text": "They serve as shared narratives or myths that simplify history to promote social cohesion and identity.", "isCorrect": true, "rationale": "The text states: 'Societies need shared narratives to hold together. Every nation has its founding myths — stories about origins, destiny, and identity that are, at best, dramatically simplified versions of messy historical reality.'"}, {"text": "They are all examples of benevolent deception universally accepted as good.", "isCorrect": false, "rationale": "The text presents the Noble Lie as 'troubling' and 'debatable,' and the arguments against it highlight that benevolent deception is not necessarily universally accepted as good."}], "id": "q08"}, {"question": "If a society successfully implemented the Noble Lie as described, what fundamental right or capacity would its citizens be effectively denied?", "options": [{"text": "The right to travel freely between cities.", "isCorrect": false, "rationale": "The text does not mention any restrictions on travel for citizens under the Noble Lie."}, {"text": "The capacity to evaluate and consent to the true nature of their social and political arrangements.", "isCorrect": true, "rationale": "The text states: 'The citizens cannot consent to an arrangement whose true nature is hidden from them,' because 'the rulers know it is false' while 'the citizens believe the myth is true.'"}, {"text": "The opportunity to rise above their initial social standing.", "isCorrect": false, "rationale": "The text explicitly states, 'If a gold-souled child is born to bronze-souled parents, the child should be raised among the rulers,' showing that social mobility based on aptitude is part of the system."}, {"text": "The freedom to express dissenting political opinions publicly.", "isCorrect": false, "rationale": "While the lie promotes cohesion, the text focuses on the deception about their origins and roles, not the suppression of political speech after accepting the lie."}], "id": "q09"}, {"question": "The 'connections' section refers to Rawls's Veil of Ignorance as a modern theory of justice. How does it contrast with Plato's Noble Lie in its approach to social order?", "options": [{"text": "Rawls's theory also relies on a foundational lie but for different societal goals.", "isCorrect": false, "rationale": "The text explicitly states Rawls's theory 'works through hypothetical ignorance rather than deception,' which is a direct contrast to the Noble Lie's reliance on falsehood."}, {"text": "Rawls's theory achieves social order through transparency and full disclosure to all citizens.", "isCorrect": false, "rationale": "Rawls's theory uses 'hypothetical ignorance,' not necessarily full disclosure, to derive principles of justice, but it avoids *deception*."}, {"text": "Rawls's theory aims for social order through hypothetical ignorance, whereas the Noble Lie uses actual deception.", "isCorrect": true, "rationale": "The text contrasts 'Rawls's Veil of Ignorance... for a modern theory of justice that works through hypothetical ignorance rather than deception,' directly highlighting the difference in method to achieve a just society."}, {"text": "Rawls's theory focuses on individual happiness, while the Noble Lie prioritizes societal stability.", "isCorrect": false, "rationale": "The text contrasts the *method* (hypothetical ignorance vs. deception), not the ultimate goals of justice or stability, for the two theories."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
