<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the core meaning of 'the elephant in the room' as presented in the text?", "options": [{"text": "A problem that is difficult to understand due to its complexity.", "isCorrect": false, "rationale": "The text states the elephant is 'obvious' and 'impossible to miss,' contradicting the idea of complexity making it difficult to understand."}, {"text": "A minor issue that everyone exaggerates due to collective anxiety.", "isCorrect": false, "rationale": "The text describes it as a 'problem so obvious' and 'enormous,' not a minor issue that is exaggerated."}, {"text": "An obvious problem that everyone is aware of but no one is willing to discuss.", "isCorrect": true, "rationale": "This option directly aligns with the text's definition: 'a problem so obvious that every person present can see it, but no one is willing to name it.'"}, {"text": "A personal secret that an individual hides from a group.", "isCorrect": false, "rationale": "The text emphasizes that 'everyone knows' about the problem, making it a collective awareness rather than an individual secret."}], "id": "q01"}, {"question": "In the scenario of the company facing layoffs, the employees discuss quarterly targets and holiday parties without mentioning the impending layoffs. This behavior is primarily driven by which collective dynamic?", "options": [{"text": "An accidental oversight where no one genuinely remembers to bring up the layoffs.", "isCorrect": false, "rationale": "The text explicitly states that 'The silence is not accidental' and 'Everyone is thinking about them,' indicating a conscious avoidance rather than an oversight."}, {"text": "A deliberate strategy by management to maintain a positive atmosphere.", "isCorrect": false, "rationale": "While management might prefer silence, the text focuses on the collective pressures among all present, not solely a top-down strategy."}, {"text": "A 'web of social pressures' leading to a maintained silence despite collective awareness.", "isCorrect": true, "rationale": "The text directly attributes the maintained silence to 'a web of social pressures, each one rational at the individual level and collectively destructive,' perfectly describing the scenario."}, {"text": "A lack of information among employees regarding the severity of the layoffs.", "isCorrect": false, "rationale": "The scenario clearly states 'everyone knows the company is about to announce layoffs,' indicating a shared understanding of the situation."}], "id": "q02"}, {"question": "Which of the following situations best exemplifies 'diffusion of responsibility' as a reason for not naming the elephant?", "options": [{"text": "A manager avoids confronting an underperforming employee to prevent an uncomfortable conversation.", "isCorrect": false, "rationale": "This scenario points more towards 'fear of conflict' from the individual manager's perspective rather than the collective 'someone else will say it' aspect of diffusion of responsibility."}, {"text": "Multiple team members notice a critical project error but each waits for a more senior colleague to report it.", "isCorrect": true, "rationale": "This is a direct application of diffusion of responsibility, where individuals assume 'someone braver, more senior, or more directly affected will speak up,' leading to no one acting."}, {"text": "An employee is reluctant to voice a concern because they were previously reprimanded for speaking out.", "isCorrect": false, "rationale": "This aligns with 'social punishment,' where past negative experiences deter future outspokenness, not the 'someone else will do it' mentality."}, {"text": "A board member hesitates to question a CEO's decision, unsure if their concern is valid or an overreaction.", "isCorrect": false, "rationale": "This scenario illustrates 'genuine uncertainty about whether it is an elephant,' where the individual doubts the validity of their perception."}], "id": "q03"}, {"question": "The text mentions the child in Hans Christian Andersen's story who says 'the emperor has no clothes.' How does the real-world consequence for such a person typically differ from the story's outcome?", "options": [{"text": "In reality, such individuals are often celebrated for their courage and insight.", "isCorrect": false, "rationale": "The text states that 'Whistleblowers are rarely thanked in the moment' and 'that child gets reassigned,' indicating a negative rather than celebrated outcome."}, {"text": "In reality, the 'child' would likely be ignored as their opinion is not considered authoritative.", "isCorrect": false, "rationale": "While being ignored is possible, the text emphasizes a more active 'price' paid, like being 'reassigned,' which is a direct negative consequence beyond simple ignoring."}, {"text": "In reality, individuals who point out uncomfortable truths often face social or professional repercussions.", "isCorrect": true, "rationale": "The text explicitly states, 'The person who names the elephant often pays a price' and 'that child gets reassigned,' aligning with social punishment and professional repercussions."}, {"text": "In reality, the 'emperor' would immediately acknowledge the truth and rectify the situation.", "isCorrect": false, "rationale": "The text implies that the silence makes problems worse and they 'fester,' suggesting immediate rectification is rare; the focus is on the messenger's fate, not the recipient's immediate reaction."}], "id": "q04"}, {"question": "According to the text, what is the most significant consequence of allowing 'the elephant in the room' to remain unnamed?", "options": [{"text": "The problem might eventually resolve itself without intervention.", "isCorrect": false, "rationale": "The text directly contradicts this, stating 'the silence almost never makes the problem go away. It makes it worse.'"}, {"text": "Individuals involved become more resilient to dealing with unspoken issues.", "isCorrect": false, "rationale": "The text describes negative consequences like problems festering and becoming more damaging, not improved resilience."}, {"text": "The problem festers and becomes far more damaging when it inevitably erupts.", "isCorrect": true, "rationale": "The text clearly states: 'Problems that are not discussed cannot be addressed. They fester. They grow. And when they finally erupt—as they inevitably do—they are far more damaging.'"}, {"text": "It builds a stronger, more cohesive group dynamic due to shared unspoken understanding.", "isCorrect": false, "rationale": "The text describes the silence as 'collectively destructive' and leading to 'organizational dysfunction,' which undermines group cohesion."}], "id": "q05"}, {"question": "What does the text identify as the 'antidote' to the collective pretending that keeps the elephant unnamed?", "options": [{"text": "Waiting for a designated leader to officially acknowledge the problem.", "isCorrect": false, "rationale": "The text advises 'without waiting for someone else to go first,' which contradicts waiting for a designated leader."}, {"text": "Aggressively confronting the issue to force an immediate resolution.", "isCorrect": false, "rationale": "The text advises 'Not aggressively, not self-righteously,' emphasizing a calm and clear approach."}, {"text": "Developing internal coping mechanisms to manage the problem individually.", "isCorrect": false, "rationale": "The text suggests confronting the problem collectively, not managing it individually, as individual coping often enables the problem."}, {"text": "The willingness to calmly and clearly state the obvious without waiting for others.", "isCorrect": true, "rationale": "The text explicitly states, 'be the person who names the elephant. Not aggressively... but clearly' and the key concept mentions 'the willingness to state the obvious—calmly, clearly, and without waiting for someone else to go first.'"}], "id": "q06"}, {"question": "Consider a family where an elderly parent's declining health is causing significant strain, but family members avoid discussing it directly, instead making private adjustments and hoping someone else will bring it up. This scenario is an example of:", "options": [{"text": "Effective crisis management through individual adaptation.", "isCorrect": false, "rationale": "The text describes such 'private adjustments' and hoping someone else intervenes as 'enabling the very pattern they wish someone would address,' not effective crisis management."}, {"text": "A 'political taboo' within a close-knit group.", "isCorrect": false, "rationale": "While it's a taboo, 'political taboo' specifically refers to policy questions in the public sphere, whereas this is a family dynamic."}, {"text": "A 'family dynamic' where 'collective pretending' allows a problem to fester.", "isCorrect": true, "rationale": "This directly matches the 'Family dynamics' real-world example, where 'collective pretending' prevents discussion and enables the problem to persist."}, {"text": "Genuine uncertainty about the parent's health, causing reluctance to speak.", "isCorrect": false, "rationale": "The scenario implies awareness ('causing significant strain') and avoidance, not uncertainty about the problem's reality."}], "id": "q07"}, {"question": "The text notes that 'Collective Pretending' involves a problem that is 'obvious to everyone but acknowledged by no one.' Which of the following is NOT listed as a conspiring force contributing to this silence?", "options": [{"text": "Fear of conflict.", "isCorrect": false, "rationale": "'Fear of conflict' is explicitly listed as a reason why we stay silent."}, {"text": "Diffusion of responsibility.", "isCorrect": false, "rationale": "'Diffusion of responsibility' is explicitly listed as a reason why we stay silent."}, {"text": "Lack of clear evidence that a problem exists.", "isCorrect": true, "rationale": "The text mentions 'Genuine uncertainty about whether it is an elephant,' but the core premise of 'Collective Pretending' is that the problem is 'obvious to everyone,' implying evidence exists, it's just doubted by individuals, not lacking entirely. This option suggests no evidence, which is different from uncertainty about one's perception of an obvious problem."}, {"text": "Social punishment.", "isCorrect": false, "rationale": "'Social punishment' is explicitly listed as a reason why we stay silent."}], "id": "q08"}, {"question": "When the text refers to the bystander effect as a 'close cousin' of diffusion of responsibility, it highlights that both concepts describe a phenomenon where:", "options": [{"text": "Individuals are more likely to act when they feel personally responsible for a situation.", "isCorrect": false, "rationale": "Both the bystander effect and diffusion of responsibility describe situations where individuals are *less* likely to act, not more, due to distributed responsibility."}, {"text": "The presence of more people decreases the likelihood that any single individual will intervene.", "isCorrect": true, "rationale": "The text states, 'the more people who witness a problem, the less likely any one of them is to act,' which is the essence of the bystander effect and its connection to diffusion of responsibility."}, {"text": "People are generally proactive in addressing collective problems.", "isCorrect": false, "rationale": "Both concepts describe scenarios where proactivity is diminished, not enhanced, in group settings."}, {"text": "Group members encourage each other to take individual action.", "isCorrect": false, "rationale": "The concepts describe the opposite: a lack of individual action due to the expectation that others will act."}], "id": "q09"}, {"question": "The 'practical lesson' derived from understanding the 'elephant in the room' is presented as 'simple to state and difficult to execute.' What does this difficulty primarily stem from?", "options": [{"text": "The inherent complexity of articulating difficult truths in simple terms.", "isCorrect": false, "rationale": "The difficulty isn't about the complexity of articulation, but rather the personal courage required to act against powerful social forces."}, {"text": "The lack of available opportunities to calmly and clearly address the issue.", "isCorrect": false, "rationale": "The text implies the opportunities exist but are avoided due to individual and social pressures, not their absence."}, {"text": "The strength of the social pressures (fear, diffusion, punishment, uncertainty) that conspire to maintain silence.", "isCorrect": true, "rationale": "The text details multiple 'forces conspire' (fear, diffusion, punishment, uncertainty) that make breaking the silence personally costly and challenging, hence the difficulty in execution."}, {"text": "The fact that most elephants are not truly obvious until it is too late.", "isCorrect": false, "rationale": "The core definition states the elephant is 'obvious' and 'impossible to miss,' so its lack of obviousness is not the primary difficulty."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
