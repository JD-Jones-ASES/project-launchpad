    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes a first-order effect from a second-order effect?", "options": [{"text": "First-order effects are always negative, while second-order effects are always positive.", "isCorrect": false, "rationale": "The text states that first-order effects are direct, immediate, and intended, while second-order effects are indirect, delayed, and often unintended. There is no mention of them being exclusively positive or negative."}, {"text": "First-order effects are direct and immediate, while second-order effects are indirect and often delayed.", "isCorrect": true, "rationale": "The text explicitly defines first-order effects as 'direct, immediate, intended results' and second-order effects as 'indirect, delayed, often unintended results that emerge from the interaction of the first-order effects with the wider system.'"}, {"text": "First-order effects are always unintended, while second-order effects are always intended.", "isCorrect": false, "rationale": "The text states that first-order effects are 'intended results,' while second-order effects are 'often unintended,' making this statement incorrect."}, {"text": "First-order effects are exclusive to economic policies, while second-order effects apply only to social issues.", "isCorrect": false, "rationale": "The text provides examples across economics (rent control, tariffs, price cuts) and social issues (social media), indicating both types of effects can occur in various domains."}], "id": "q01"}, {"question": "According to Fréd\\'eric Bastiat, what differentiates a good economist from a bad one?", "options": [{"text": "A good economist focuses only on visible effects, while a bad economist considers invisible ones.", "isCorrect": false, "rationale": "Bastiat argued the opposite: a bad economist only considers visible effects, while a good economist considers both."}, {"text": "A good economist dismisses second-order effects, while a bad economist prioritizes them.", "isCorrect": false, "rationale": "This statement contradicts Bastiat's philosophy, which advocates for considering second-order effects."}, {"text": "A good economist considers both visible first-order effects and invisible second-order effects.", "isCorrect": true, "rationale": "The text states, 'the bad economist considers only the visible, first-order effects... while the good economist also considers the invisible, second-order effects.'"}, {"text": "A good economist avoids policy analysis, whereas a bad economist engages in it without caution.", "isCorrect": false, "rationale": "Bastiat's distinction is about the *completeness* of the analysis, not whether an economist engages in it."}], "id": "q02"}, {"question": "Based on the text's example of rent control, which of the following represents a first-order effect?", "options": [{"text": "Landlords reducing maintenance on buildings.", "isCorrect": false, "rationale": "This is described as a second-order effect, emerging from reduced revenue."}, {"text": "Developers building fewer new apartments.", "isCorrect": false, "rationale": "This is described as a second-order effect, resulting from lower returns."}, {"text": "Current tenants paying less in rent.", "isCorrect": true, "rationale": "The text explicitly states: 'The first-order effect is exactly what the policy intends: rents go down, and current tenants pay less.'"}, {"text": "A tighter housing market for newcomers.", "isCorrect": false, "rationale": "This is described as a second-order effect, emerging from the shrinking housing supply."}], "id": "q03"}, {"question": "Considering the rent control example, which of these is a second-order effect?", "options": [{"text": "An immediate reduction in the monthly cost of living for existing tenants.", "isCorrect": false, "rationale": "This is the primary first-order effect of rent control, the direct and immediate outcome."}, {"text": "A long-term increase in the availability of affordable housing units.", "isCorrect": false, "rationale": "The text indicates that rent control leads to a *shrinking* housing supply and a *tighter* housing market, which is the opposite of increased availability."}, {"text": "Deterioration of building quality and a shrinking overall housing supply over time.", "isCorrect": true, "rationale": "The text states: 'Landlords, earning less revenue, reduce maintenance. Buildings deteriorate. Developers... build fewer new apartments. The housing supply shrinks.' These are presented as delayed, indirect consequences."}, {"text": "A direct incentive for landlords to invest more in property upgrades.", "isCorrect": false, "rationale": "Rent control leads to less revenue, which creates a disincentive for landlords to invest in maintenance, causing deterioration."}], "id": "q04"}, {"question": "Why is second-order thinking described as difficult?", "options": [{"text": "It requires ignoring all direct consequences of an action.", "isCorrect": false, "rationale": "Second-order thinking builds upon first-order effects, not ignores them. It considers the subsequent chain of consequences."}, {"text": "It involves predicting how other actors with their own incentives will respond to new conditions.", "isCorrect": true, "rationale": "The text explains: 'Second-order thinking is difficult because it requires imagining how other people will respond to the new conditions your action creates... modeling the behavior of other actors in the system — actors who have their own incentives, information, and strategies.'"}, {"text": "It focuses solely on short-term, visible outcomes.", "isCorrect": false, "rationale": "Second-order thinking focuses on indirect, delayed, and often invisible outcomes, contrary to this statement."}, {"text": "It mandates that all second-order effects must always reinforce first-order effects.", "isCorrect": false, "rationale": "The text explicitly states: 'The second-order effects may reinforce the first-order effects, or they may undermine them entirely.'"}], "id": "q05"}, {"question": "The text emphasizes that evaluating a policy or decision solely by its first-order effects is incomplete because:", "options": [{"text": "First-order effects are rarely measurable.", "isCorrect": false, "rationale": "The text often describes first-order effects as visible and immediate, implying they are measurable (e.g., rents go down, more customers, increased domestic production)."}, {"text": "Second-order effects are always intended and thus easily predictable.", "isCorrect": false, "rationale": "The text states second-order effects are 'often unintended' and difficult to predict due to the need to model system responses."}, {"text": "Second-order effects, though indirect and delayed, can significantly undermine or reinforce the initial intended outcome.", "isCorrect": true, "rationale": "The text notes: 'The second-order effects may reinforce the first-order effects, or they may undermine them entirely. You cannot know which without thinking through the chain of consequences.'"}, {"text": "Only first-order effects are politically salient.", "isCorrect": false, "rationale": "While first-order effects can be politically salient, ignoring second-order effects leads to an incomplete evaluation, as these effects can have significant societal impact, even if less visible initially."}], "id": "q06"}, {"question": "A government raises tariffs on imported steel. The first-order effect is increased domestic steel production and preserved steelworker jobs. What would be a second-order effect of this policy, according to the text?", "options": [{"text": "Immediate decrease in steel prices due to higher domestic supply.", "isCorrect": false, "rationale": "The text states the cost of steel *rises* for industries that use steel due to tariffs, not decreases."}, {"text": "Job losses in industries that rely on steel, such as automotive manufacturing.", "isCorrect": true, "rationale": "The text explicitly states: 'Second-order effects: the cost of steel rises for every industry that uses steel... Those industries become less competitive. Some of them lay off workers.'"}, {"text": "Improved trade relations with steel-exporting countries.", "isCorrect": false, "rationale": "Raising tariffs typically strains, rather than improves, trade relations."}, {"text": "A direct boost to the national GDP due to increased steel exports.", "isCorrect": false, "rationale": "The text focuses on the negative impacts on steel-using industries and job losses, not increased exports or direct GDP boost from the second-order effects of tariffs."}], "id": "q07"}, {"question": "A company cuts prices to gain market share. The first-order effect is more customers and sales. If competitors respond by cutting their prices too, leading to shrunken margins across the industry, what does this demonstrate about the initial price cut strategy?", "options": [{"text": "The first-order analysis was entirely incorrect.", "isCorrect": false, "rationale": "The text states 'The first-order analysis was correct (lower prices attract more customers)' for this example, making this option false."}, {"text": "The first-order analysis was correct but incomplete, failing to account for system responses.", "isCorrect": true, "rationale": "The text concludes this example by stating: 'The first-order analysis was correct (lower prices attract more customers) but incomplete (competitors also adjust).'"}, {"text": "Second-order effects always negate any positive first-order effects.", "isCorrect": false, "rationale": "The text states second-order effects 'may reinforce... or they may undermine,' not 'always negate.'"}, {"text": "The company should have anticipated that competitors would never react.", "isCorrect": false, "rationale": "Second-order thinking is precisely about anticipating how other actors *will* respond, indicating that assuming no reaction would be a failure of this thinking."}], "id": "q08"}, {"question": "According to the 'realworld' example, which of the following is presented as a second-order effect of social media platforms on adolescents?", "options": [{"text": "The ability for teenagers to stay in touch with friends.", "isCorrect": false, "rationale": "This is described as a first-order effect: 'The first-order effect of social media platforms was connection: teenagers could stay in touch with friends...'"}, {"text": "Finding communities of interest online.", "isCorrect": false, "rationale": "This is described as part of the first-order effect of connection and finding communities."}, {"text": "Amplified social comparison and cyberbullying due to curated feeds and anonymity.", "isCorrect": true, "rationale": "The text lists these as second-order effects: 'The second-order effects... were more complex: social comparison amplified by curated feeds, cyberbullying enabled by anonymity and reach, sleep disruption...'"}, {"text": "The immediate and direct experience of sharing their lives with others.", "isCorrect": false, "rationale": "This falls under the umbrella of 'connection' and 'sharing their lives,' which are described as first-order effects."}], "id": "q09"}, {"question": "Which of the following statements best encapsulates the central message of the 'Second-Order Effects' section?", "options": [{"text": "All actions inevitably lead to negative second-order effects.", "isCorrect": false, "rationale": "The text does not claim all second-order effects are negative; it states they 'may reinforce' or 'undermine' first-order effects, implying they can be positive or negative."}, {"text": "Decisions should primarily focus on immediate, visible results for maximum impact.", "isCorrect": false, "rationale": "This contradicts the core message, which argues against evaluating decisions solely by first-order, immediate, visible effects because it is incomplete."}, {"text": "Comprehensive decision-making requires understanding how actions ripple through a system and evoke responses from other actors.", "isCorrect": true, "rationale": "The 'keyconcept' summarizes: 'Sound decision-making requires considering not just what your action will accomplish but how the system — including the other actors within it — will respond.'"}, {"text": "Second-order effects are purely theoretical and rarely materialize in real-world scenarios.", "isCorrect": false, "rationale": "The text provides multiple 'realworld' examples (rent control, tariffs, social media) where second-order effects are tangible and significant, disproving this statement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
