    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the core definition of the Streetlight Effect?", "options": [{"text": "The tendency to overemphasize easily accessible information, leading to information overload.", "isCorrect": false, "rationale": "While the effect involves 'easy' information, its core is about the strategy of searching based on convenience rather than relevance, not information overload itself."}, {"text": "The tendency to search for answers where searching is convenient rather than where the answers are most likely to be found.", "isCorrect": true, "rationale": "This definition is directly stated in the text: 'The streetlight effect is the tendency to search for answers where searching is easy rather than where the answers are most likely to be found.'"}, {"text": "The tendency to exclusively use visual data for problem-solving due to its clarity.", "isCorrect": false, "rationale": "The Streetlight Effect is not limited to visual data; it applies to any form of 'easy' measurement, data, or method."}, {"text": "The tendency to ignore problems that are difficult to define or quantify.", "isCorrect": false, "rationale": "This is a consequence of the Streetlight Effect, but not its fundamental definition, which focuses on the *choice of where to search*."}]}, {"question": "How does the Streetlight Effect perpetuate itself despite leading to suboptimal outcomes?", "options": [{"text": "It discourages critical thinking, making individuals less likely to question their search methods.", "isCorrect": false, "rationale": "While a lack of critical thinking might contribute, the text emphasizes that the production of 'results' makes the activity *appear* productive, reinforcing the behavior."}, {"text": "It fosters a sense of false productivity by generating easily measurable but often irrelevant results.", "isCorrect": true, "rationale": "The text explains, 'When you search where the light is, you find things — just not necessarily the things you need... The activity looks productive. The problem is that it is answering the wrong questions,' which reinforces the behavior."}, {"text": "It creates a preference for quantitative data over qualitative insights, regardless of relevance.", "isCorrect": false, "rationale": "This describes a common manifestation of the effect, but not the primary way the effect itself becomes 'self-reinforcing' as per the text."}, {"text": "It leads to a scarcity of resources for exploring difficult-to-measure areas, making them even harder to investigate.", "isCorrect": false, "rationale": "This might be a downstream consequence, but the core self-reinforcement comes from the immediate, tangible, though misleading, 'results' of the easy search."}]}, {"question": "In academic research, what terms are sometimes used interchangeably with the Streetlight Effect?", "options": [{"text": "Confirmation bias and sunk cost fallacy.", "isCorrect": false, "rationale": "Confirmation bias is mentioned as a related concept, but not as an interchangeable term for the Streetlight Effect; sunk cost fallacy is not mentioned."}, {"text": "Observational bias and drunkard's search.", "isCorrect": true, "rationale": "The text explicitly states: 'In academic research, the streetlight effect is sometimes called the drunkard's search or observational bias.'"}, {"text": "Goodhart's Law and Campbell's Law.", "isCorrect": false, "rationale": "These are related institutional phenomena discussed in a later chapter, not interchangeable terms for the Streetlight Effect itself as presented here."}, {"text": "Availability heuristic and anchoring bias.", "isCorrect": false, "rationale": "These are cognitive biases, but the text does not use them as synonyms for the Streetlight Effect."}]}, {"question": "A startup is heavily tracking daily active users (DAU) and time spent in-app. While these metrics show growth, customer churn is high, and qualitative feedback suggests dissatisfaction with core features. Which aspect of the Streetlight Effect is most evident here?", "options": [{"text": "The overestimation of product success due to early positive feedback.", "isCorrect": false, "rationale": "This scenario describes a misdirection of focus, not necessarily an overestimation based on early feedback. The core problem is *what* is being measured."}, {"text": "The focus on quantitative metrics over qualitative feedback, even if the latter is more indicative of true problems.", "isCorrect": true, "rationale": "This directly illustrates the Streetlight Effect where 'easy-to-measure metrics' (DAU, time in-app) are prioritized over more important, but harder-to-quantify, aspects like customer satisfaction or product quality, which live in the 'dark alley' of qualitative feedback."}, {"text": "The inability to collect data on customer churn due to technical limitations.", "isCorrect": false, "rationale": "The scenario implies churn *is* known to be high, suggesting data exists, but the focus is elsewhere. The issue isn't data collection inability but the chosen focus."}, {"text": "The tendency to invest more resources into popular features rather than critical ones.", "isCorrect": false, "rationale": "While a possible outcome of misdirected focus, the primary evidence of the Streetlight Effect here is the choice of *what to measure* and its misalignment with what truly matters, not directly resource allocation based on feature popularity."}]}, {"question": "According to the text, what is the primary antidote to the Streetlight Effect?", "options": [{"text": "Implementing advanced data analytics tools to measure previously unquantifiable aspects.", "isCorrect": false, "rationale": "While new tools can be helpful, the text emphasizes a cognitive shift rather than purely technological solutions."}, {"text": "Regularly questioning whether one is looking where the answer is or where the light is.", "isCorrect": true, "rationale": "The text states: 'The antidote is to periodically ask: “Am I looking where the answer is, or am I looking where the light is?”'"}, {"text": "Prioritizing qualitative research methods over quantitative ones in all circumstances.", "isCorrect": false, "rationale": "The text does not advocate for one method over another, but for aligning the search method with the actual location of the answer."}, {"text": "Establishing clear, measurable objectives before beginning any research or problem-solving.", "isCorrect": false, "rationale": "While good practice, if these objectives are based on 'easy' measures rather than 'important' ones, they can still be subject to the Streetlight Effect."}]}, {"question": "The text states, 'Not everything that counts can be counted, and not everything that can be counted counts.' This statement highlights which critical implication of the Streetlight Effect?", "options": [{"text": "The inherent difficulty in achieving perfect measurement in any field.", "isCorrect": false, "rationale": "While true, the statement's implication in this context is more specific to the *choice* of measurement and its consequence, not just general difficulty."}, {"text": "That focusing on easily measurable metrics can lead organizations to implicitly value irrelevant outcomes.", "isCorrect": true, "rationale": "The text connects this directly to how 'When organizations decide what to measure, they are implicitly deciding what to care about,' illustrating how easy metrics can misdirect priorities away from what truly matters."}, {"text": "The ethical imperative for researchers to prioritize data transparency and public accountability.", "isCorrect": false, "rationale": "This quote is about the *substance* of what is measured and its value, not the ethics of data handling."}, {"text": "The necessity of balancing quantitative and qualitative data in all decision-making processes.", "isCorrect": false, "rationale": "While this is a sound practice, the quote specifically addresses the danger of measuring the wrong things, implying a deeper problem than just a lack of balance."}]}, {"question": "Which of the following scenarios *most directly* exemplifies the Streetlight Effect as described in the text?", "options": [{"text": "A scientist continues an experiment that is yielding confusing results, hoping for a breakthrough.", "isCorrect": false, "rationale": "This scenario describes perseverance or perhaps confirmation bias, but not the core idea of choosing a search area based on ease rather than likelihood of finding the answer."}, {"text": "A marketing team launches an expensive campaign based on outdated market research data.", "isCorrect": false, "rationale": "This relates to using poor quality or outdated data, but not necessarily the choice of *what to measure* or *where to search* based on convenience."}, {"text": "A city council allocates funds to improve road infrastructure based on citizen complaints, even though an independent study indicates public safety issues are more prevalent in other areas not commonly discussed.", "isCorrect": true, "rationale": "The council is addressing issues that are 'easy to find' (citizen complaints) rather than potentially more impactful, but less obvious, issues identified by a deeper analysis (the independent study). The 'light' is on the complaints, while the 'dark alley' holds the more critical safety issues."}, {"text": "An artist focuses on perfecting a technique they already master, rather than experimenting with new, challenging styles.", "isCorrect": false, "rationale": "This describes staying within a comfort zone, but the Streetlight Effect specifically refers to *searching for answers* to a problem in an easy place, not avoiding new challenges in general."}]}, {"question": "The 'drunkard's search' analogy describes the Streetlight Effect primarily by illustrating:", "options": [{"text": "The futility of searching for lost items in unfamiliar places.", "isCorrect": false, "rationale": "The problem isn't about unfamiliarity, but about choosing a less likely location due to convenience."}, {"text": "The irrationality of prioritizing convenience over effectiveness when solving a problem.", "isCorrect": true, "rationale": "The drunk knows the keys are in the dark alley (where they should effectively search) but searches under the streetlight (where it is convenient), directly illustrating this irrational prioritization."}, {"text": "The importance of clearly defining a problem before attempting to solve it.", "isCorrect": false, "rationale": "The problem (lost keys) is clear; the issue is the flawed search strategy."}, {"text": "The tendency to rely on external aids, such as streetlights, rather than internal knowledge.", "isCorrect": false, "rationale": "The analogy isn't about reliance on external aids in general, but specifically the *choice of location* for the search based on the availability of that aid, even if it's the wrong place."}]}, {"question": "In the context of the provided text, how is the Streetlight Effect primarily characterized?", "options": [{"text": "As an institutional phenomenon influencing organizational structures and policies.", "isCorrect": false, "rationale": "The 'note' section explicitly states that in *this* chapter, it's treated as a 'cognitive bias,' while its institutional aspect is reserved for a later chapter."}, {"text": "As a cognitive bias, representing an individual tendency to search where searching is easy.", "isCorrect": true, "rationale": "The text's 'note' clarifies: 'Here we treat it as a cognitive bias — an individual tendency to search where searching is easy.'"}, {"text": "As a form of market failure resulting from imperfect information.", "isCorrect": false, "rationale": "The text does not frame the Streetlight Effect in economic terms like market failure."}, {"text": "As a logical fallacy stemming from flawed deductive reasoning.", "isCorrect": false, "rationale": "While it involves flawed reasoning, the text categorizes it as a 'cognitive bias' and a 'pervasive mistake in human inquiry,' not specifically a logical fallacy."}]}, {"question": "Considering the various examples and explanations, the ultimate problem caused by the Streetlight Effect is that it leads individuals and organizations to:", "options": [{"text": "Overlook the most challenging problems in favor of less significant ones that are easier to address.", "isCorrect": true, "rationale": "This synthesizes the key consequence: by focusing on 'where the light is,' truly important but harder-to-measure problems ('dark alley') are neglected, resulting in answering 'the wrong questions' or solving less important issues effectively while critical ones persist."}, {"text": "Exhaust resources on redundant tasks, leading to inefficiencies and burnout.", "isCorrect": false, "rationale": "While inefficiency might occur, the text emphasizes the misdirection of effort towards *unimportant* or *wrong* questions, rather than simply redundant tasks."}, {"text": "Develop an overreliance on technology and data, neglecting human intuition and creativity.", "isCorrect": false, "rationale": "The issue is about *what* data or tools are utilized (the easy ones), not an inherent overreliance on technology itself over intuition."}, {"text": "Misinterpret available data, leading to conclusions that are often the opposite of the truth.", "isCorrect": false, "rationale": "The Streetlight Effect is more about selecting *which* data to collect/focus on in the first place, rather than misinterpreting the data that is available."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
