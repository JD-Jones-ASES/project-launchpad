        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central concept demonstrated by the Coastline Paradox?", "options": [{"text": "The length of any natural border is finite but difficult to measure precisely.", "isCorrect": false, "rationale": "The text explicitly states that the measured length 'grows without bound' and 'does not converge to a definite value,' indicating it's not simply finite but difficult to measure, but rather undefined."}, {"text": "The measured length of a natural coastline increases indefinitely as the measurement resolution becomes finer, meaning it has no single well-defined length.", "isCorrect": true, "rationale": "The text clearly explains, 'At each scale, the coastline gets longer. And there is no natural stopping point. ... The measured coastline does not converge to a definite value — it grows without bound as the measurement scale decreases. ... The number you get depends on the resolution of your measurement, and there is no “true” answer.'"}, {"text": "The perceived length of a coastline changes based on the observer's subjective interpretation.", "isCorrect": false, "rationale": "The paradox is tied to the objective 'resolution of your measurement' (e.g., ruler length), not subjective interpretation."}, {"text": "Natural coastlines are perfectly smooth curves that only appear rough due to low-resolution measurements.", "isCorrect": false, "rationale": "The text states, 'The coastline is not a smooth curve... It is “rough” at every scale,' directly contradicting this option."}]}, {"question": "According to the text, why does the measured length of a natural coastline increase as the measurement scale decreases?", "options": [{"text": "Smaller rulers are inherently less accurate, introducing measurement errors that inflate the length.", "isCorrect": false, "rationale": "The increase in length is not attributed to measurement error but to the ability of smaller scales to capture more actual detail."}, {"text": "Natural coastlines possess increasing detail and roughness at progressively smaller scales, which smaller rulers are able to capture.", "isCorrect": true, "rationale": "The text explains, 'Use a ruler 50 kilometers long, and you can follow the coast's curves more closely — capturing bays and peninsulas... Switch to a 10-kilometer ruler, and you pick up still more detail... Zoom in, and you find more detail, which adds more length.'"}, {"text": "The act of measuring with a smaller ruler physically alters the coastline, making it longer.", "isCorrect": false, "rationale": "This is an illogical and unsupported claim; measurement does not alter the physical object in this context."}, {"text": "The phenomenon is an optical illusion, and the actual length remains constant regardless of the ruler size.", "isCorrect": false, "rationale": "The text clearly states the measured length 'grows without bound' and 'does not converge to a definite value,' indicating it is not an illusion but a fundamental property."}]}, {"question": "The initial observation of the phenomenon that later became a foundational concept of fractal geometry is attributed to which mathematician?", "options": [{"text": "Benoit Mandelbrot", "isCorrect": false, "rationale": "Mandelbrot developed it into fractal geometry, but Richardson first observed the phenomenon. The text states: 'Developed into a foundational concept of fractal geometry by Benoit Mandelbrot...'"}, {"text": "Lewis Fry Richardson", "isCorrect": true, "rationale": "The text explicitly states: 'First observed by the English mathematician Lewis Fry Richardson in the 1950s while studying the lengths of national borders.'"}, {"text": "Euclid", "isCorrect": false, "rationale": "Euclid is associated with classical geometry, not the modern concept of the Coastline Paradox or fractal geometry."}, {"text": "Albert Einstein", "isCorrect": false, "rationale": "Einstein was a physicist, not mentioned in the context of the Coastline Paradox or fractal geometry in this section."}]}, {"question": "How did the Coastline Paradox primarily contribute to the development of fractal geometry?", "options": [{"text": "It disproved classical geometric principles, necessitating a new form of mathematics.", "isCorrect": false, "rationale": "The paradox didn't disprove classical geometry but rather highlighted its limitations in describing natural phenomena, leading to an expansion of mathematical tools."}, {"text": "It highlighted the need for mathematical tools to describe objects with self-similarity and roughness at multiple scales.", "isCorrect": true, "rationale": "The text states, 'The Coastline Paradox was the spark that ignited fractal geometry. Mandelbrot realized that coastlines, and many other natural shapes... share a common property: self-similarity at different scales. ... Fractal geometry provides the mathematical tools to describe such objects.'"}, {"text": "It provided the first real-world example of a perfectly smooth curve that had previously only existed in theory.", "isCorrect": false, "rationale": "This is the opposite of what the paradox demonstrates; it's about inherent roughness, not perfect smoothness."}, {"text": "It showed that all natural shapes could eventually be simplified into classical geometric forms with enough precision.", "isCorrect": false, "rationale": "Mandelbrot's insight was that 'the smooth, simple shapes of classical geometry... are the exception in nature, not the rule,' contradicting this statement."}]}, {"question": "When observed at increasingly finer scales, how do natural coastlines fundamentally differ from a classical geometric shape like a circle?", "options": [{"text": "A circle appears increasingly jagged at higher magnifications, while a coastline becomes perfectly smooth.", "isCorrect": false, "rationale": "This is incorrect; a circle appears flatter/smoother, and a coastline reveals more detail/roughness."}, {"text": "A circle retains its curved shape but appears flatter at high magnification, whereas a coastline reveals more intricate detail and length.", "isCorrect": true, "rationale": "The text explains: 'The coastline is not a smooth curve that becomes straighter as you zoom in (like a circle, which looks increasingly flat at high magnification). It is “rough” at every scale. Zoom in, and you find more detail, which adds more length.'"}, {"text": "Both shapes exhibit infinite length, but only the circle's length can be precisely calculated.", "isCorrect": false, "rationale": "A circle has a finite, precisely calculable length. A coastline's measured length 'grows without bound' but is not generally considered 'infinite' in the same way, and certainly not precisely calculable as a single value."}, {"text": "A coastline's length converges to a definite value, unlike a circle which becomes infinitely long.", "isCorrect": false, "rationale": "This is incorrect; a coastline's length 'does not converge to a definite value,' and a circle's length is finite."}]}, {"question": "Beyond geographical features like coastlines and mountain ranges, which of the following natural phenomena is cited in the text as exhibiting fractal properties?", "options": [{"text": "The trajectory of a thrown baseball.", "isCorrect": false, "rationale": "This is a classical physics problem, typically modeled with a parabolic curve, and is not mentioned as fractal in the text."}, {"text": "The perfectly spherical shape of dew drops.", "isCorrect": false, "rationale": "Dew drops are typically smooth, simple shapes, not fractals, and are not mentioned in the text."}, {"text": "The branching patterns of human lungs and the fluctuations of stock prices.", "isCorrect": true, "rationale": "The text explicitly states: 'The branching pattern of human lungs is fractal. The fluctuations of stock prices display fractal-like self-similarity across time scales.'"}, {"text": "The orbital paths of planets around a star.", "isCorrect": false, "rationale": "Planetary orbits are typically described by ellipses (classical geometry) and are not mentioned as fractals in the text."}]}, {"question": "The text states that the coast of Britain has a fractal dimension of approximately 1.25. What does this value indicate about the coastline?", "options": [{"text": "It means the coastline is perfectly smooth and can be accurately represented as a one-dimensional line.", "isCorrect": false, "rationale": "A perfectly smooth one-dimensional line would have a fractal dimension of exactly 1.0. A value of 1.25 indicates roughness beyond a simple line."}, {"text": "It shows that the coastline is rougher than a straight line but does not completely fill a two-dimensional plane.", "isCorrect": true, "rationale": "The text explains: 'A smooth line has dimension 1. A filled-in square has dimension 2. The coast of Britain has a fractal dimension of approximately 1.25 — it is “rougher” than a line but does not fill up a plane.'"}, {"text": "It suggests the coastline is actually a two-dimensional area, similar to a filled-in square.", "isCorrect": false, "rationale": "A two-dimensional area would have a fractal dimension of 2.0. The 1.25 value is between 1 and 2."}, {"text": "It represents the exact, definitive length of the coastline in kilometers.", "isCorrect": false, "rationale": "Fractal dimension is a measure of an object's roughness or complexity, not its length. The paradox states there is no 'true' definitive length."}]}, {"question": "How does the Coastline Paradox have practical consequences for international relations?", "options": [{"text": "It necessitates the use of satellite imagery to definitively determine border lengths, removing ambiguity.", "isCorrect": false, "rationale": "Even satellite imagery has a resolution limit, meaning it cannot definitively remove the ambiguity inherent in fractal borders."}, {"text": "It highlights that neighboring countries can arrive at different measured border lengths due to varying measurement resolutions.", "isCorrect": true, "rationale": "The text states: 'neighboring countries have measured their shared border and arrived at different lengths, depending on the resolution of their surveys.'"}, {"text": "It suggests that all international borders are inherently unstable and constantly shifting.", "isCorrect": false, "rationale": "The paradox concerns the measurement of a border's length, not its physical instability or movement."}, {"text": "It promotes the idea that international borders should be defined by abstract mathematical equations rather than physical features.", "isCorrect": false, "rationale": "The text does not suggest abstract mathematical equations as a solution, but rather points out the measurement challenge of physical features."}]}, {"question": "Benoit Mandelbrot's primary insight, as described in the text, was regarding the prevalence of different geometric forms in nature. What was this insight?", "options": [{"text": "He realized that nature predominantly adheres to the smooth, simple shapes of classical Euclidean geometry.", "isCorrect": false, "rationale": "Mandelbrot's insight was the opposite: 'the smooth, simple shapes of classical geometry — circles, triangles, planes — are the exception in nature, not the rule.'"}, {"text": "He found that natural objects are primarily smooth curves at macro scales but become rough at micro scales.", "isCorrect": false, "rationale": "He realized that natural objects are 'rough at every scale,' not just micro scales."}, {"text": "He demonstrated that the natural world is largely composed of fractal patterns, where roughness and self-similarity are the rule, not the exception.", "isCorrect": true, "rationale": "The text states: 'Mandelbrot's insight was that the smooth, simple shapes of classical geometry... are the exception in nature, not the rule. The natural world is fractal.'"}, {"text": "He proposed that all natural shapes are ultimately reducible to a single, universal geometric constant.", "isCorrect": false, "rationale": "The text does not mention such a proposal. Mandelbrot introduced the concept of fractal dimension to describe variation in roughness, not a single constant for all shapes."}]}, {"question": "The text mentions the fractal structure of blood vessels and lung tissue. What is the key advantage of this fractal structure in human lungs, as described?", "options": [{"text": "It makes the lungs more flexible, allowing them to expand and contract easily during breathing.", "isCorrect": false, "rationale": "While lung flexibility is important, the text specifically attributes the advantage to increased surface area, not flexibility."}, {"text": "It minimizes the surface area available for gas exchange, preventing over-oxygenation.", "isCorrect": false, "rationale": "This is the opposite of what the text states; the fractal structure 'maximizes oxygen absorption' by vastly increasing surface area."}, {"text": "It vastly increases the surface area available for gas exchange compared to a smooth-surface model, maximizing oxygen absorption.", "isCorrect": true, "rationale": "The text explains: 'the fractal structure of blood vessels and lung tissue means that the “surface area” available for gas exchange in your lungs is vastly larger than you would estimate from a smooth-surface model — a feature that natural selection has exploited to maximize oxygen absorption.'"}, {"text": "It makes the lungs less susceptible to damage from inhaled particles by streamlining air flow.", "isCorrect": false, "rationale": "This is a plausible biological advantage but is not mentioned in the text as the key advantage of fractal structure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
