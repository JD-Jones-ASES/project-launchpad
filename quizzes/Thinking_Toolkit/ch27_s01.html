<script>
var QUESTIONS = [{"question": "In the early 20th century, what was the ambitious dream of mathematicians regarding formal systems that G\"odel's work ultimately disproved?", "options": [{"text": "To create a system capable of solving any computational problem, regardless of complexity.", "isCorrect": false, "rationale": "While computational problems are related, the dream was specifically about establishing a secure logical foundation for *mathematics*, focusing on proofs and consistency, not universal computation."}, {"text": "To establish a formal system that could prove every true mathematical statement and also demonstrate its own consistency.", "isCorrect": true, "rationale": "The text states mathematicians dreamed of 'a formal system... powerful enough to prove every true mathematical statement' and that 'the system itself could be shown to be free of contradictions' (i.e., consistent). G\"odel's First Theorem showed the former was impossible, and the Second Theorem showed the latter was impossible for sufficiently powerful systems."}, {"text": "To develop a single, universally accepted set of axioms for all scientific disciplines.", "isCorrect": false, "rationale": "The focus of this dream was specifically on placing *all of mathematics* on a secure foundation, not necessarily all scientific disciplines broadly."}, {"text": "To demonstrate that all mathematical truths are inherently intuitive and require no formal proof.", "isCorrect": false, "rationale": "This is contrary to the historical context, which involved figures like Frege, Russell, and Hilbert seeking to formalize mathematics with precise axioms and rules of inference."}]}, {"question": "Which of the following statements accurately summarizes G\"odel's First Incompleteness Theorem?", "options": [{"text": "All true mathematical statements can be proven within any sufficiently powerful formal system.", "isCorrect": false, "rationale": "This statement describes the 'ambitious dream' that G\"odel's First Incompleteness Theorem disproved, making it incorrect."}, {"text": "A formal system is either inconsistent or it is incapable of expressing basic arithmetic.", "isCorrect": false, "rationale": "The theorem applies to systems *capable* of expressing basic arithmetic, stating that such consistent systems are incomplete, not that they are necessarily inconsistent or incapable of arithmetic."}, {"text": "Any consistent formal system capable of expressing basic arithmetic will contain true statements that are unprovable within that system.", "isCorrect": true, "rationale": "This is a direct restatement of G\"odel's First Incompleteness Theorem, as quoted in the text: 'Any consistent formal system capable of expressing basic arithmetic contains true statements that the system cannot prove.'"}, {"text": "The consistency of any formal system can only be proven by a stronger, external system.", "isCorrect": false, "rationale": "This statement describes G\"odel's Second Incompleteness Theorem, not the First."}]}, {"question": "In the context of G\"odel's Incompleteness Theorems, what does it mean for a formal system to be 'consistent'?", "options": [{"text": "It contains only true statements and no false ones.", "isCorrect": false, "rationale": "Consistency means the system doesn't produce contradictions. An inconsistent system can prove anything, including false statements, but consistency itself is about avoiding contradictions, not guaranteeing only true statements."}, {"text": "It is capable of expressing all basic arithmetic operations.", "isCorrect": false, "rationale": "This describes a requirement for the system for the theorems to apply, but not the definition of 'consistent' itself."}, {"text": "It never proves both a statement and its negation simultaneously.", "isCorrect": true, "rationale": "The text explicitly defines 'Consistent' as meaning 'the system does not produce contradictions — it never proves both a statement and its negation.'"}, {"text": "All its axioms are self-evident truths that require no proof.", "isCorrect": false, "rationale": "This relates to the nature of axioms, but not the formal definition of a system's consistency."}]}, {"question": "What is the primary role of G\"odel numbering in the proof of the Incompleteness Theorems?", "options": [{"text": "To simplify complex mathematical formulas into single digits for easier computation.", "isCorrect": false, "rationale": "While it assigns numbers, the purpose isn't simplification for computation, but enabling self-reference."}, {"text": "To allow a formal system to make statements about its own symbols, formulas, and proofs through arithmetic.", "isCorrect": true, "rationale": "The text explains, 'With this coding, statements about the system (“formula X is provable”) become statements within the system (arithmetic facts about G\"odel numbers). The system can, in effect, reason about its own proofs.' This enables the crucial self-reference."}, {"text": "To provide a method for verifying the consistency of a formal system from within itself.", "isCorrect": false, "rationale": "The Second Incompleteness Theorem states that a system cannot prove its own consistency, so G\"odel numbering does not achieve this."}, {"text": "To convert unprovable statements into provable ones by re-encoding them.", "isCorrect": false, "rationale": "G\"odel numbering is used to construct the unprovable G\"odel sentence, not to make unprovable statements provable."}]}, {"question": "The G\"odel sentence G essentially states 'This statement is not provable in this system.' If a *consistent* formal system *could* prove the statement G, what would be the logical conclusion according to G\"odel's proof?", "options": [{"text": "The statement G would be considered true and provable, making the system complete.", "isCorrect": false, "rationale": "If G is provable, and G states it's *not* provable, then proving G would mean proving something false, leading to a contradiction, not completeness."}, {"text": "The system would demonstrate its own inconsistency by proving a false statement.", "isCorrect": true, "rationale": "The text explains: 'If G is provable, then the system has proved a statement that says it is not provable. This means the system has proved something false — it is inconsistent. But we assumed the system is consistent. So G cannot be provable.' This highlights the logical consequence: a contradiction, implying the system is inconsistent."}, {"text": "The system would need to be expanded with new axioms to resolve the paradox.", "isCorrect": false, "rationale": "While new axioms might be added in practice, the direct logical consequence of G being provable in a consistent system is not simply a need for expansion, but a contradiction within the existing system itself."}, {"text": "The G\"odel numbering scheme would be shown to be flawed.", "isCorrect": false, "rationale": "The numbering scheme is a robust part of the proof; the contradiction arises from the properties of the sentence G itself, not the encoding method."}]}, {"question": "What is the central assertion of G\"odel's Second Incompleteness Theorem?", "options": [{"text": "It is impossible for any formal system to be truly consistent.", "isCorrect": false, "rationale": "The theorem assumes consistency as a premise; it does not claim that consistency itself is impossible. It states that *proving* that consistency internally is impossible."}, {"text": "A consistent formal system capable of expressing basic arithmetic cannot prove its own consistency.", "isCorrect": true, "rationale": "This is a direct quote from the text, defining G\"odel's Second Incompleteness Theorem: 'No consistent formal system capable of expressing basic arithmetic can prove its own consistency.'"}, {"text": "All mathematical systems are inherently incomplete, regardless of their capacity for arithmetic.", "isCorrect": false, "rationale": "The theorem specifically applies to systems 'capable of expressing basic arithmetic,' not all systems regardless of this capacity."}, {"text": "Consistency proofs for formal systems are always subjective and non-deductive.", "isCorrect": false, "rationale": "The theorem addresses provability within the system, not the subjective or objective nature of consistency proofs in general."}]}, {"question": "How did G\"odel's Second Incompleteness Theorem directly impact Hilbert's program?", "options": [{"text": "It provided the necessary formal methods for Hilbert to complete his consistency proofs.", "isCorrect": false, "rationale": "G\"odel's theorem showed the opposite: it proved that Hilbert's goal of proving consistency internally was impossible."}, {"text": "It demonstrated that it's impossible to establish the consistency of a sufficiently powerful mathematical system using only finitary methods from *within* that system.", "isCorrect": true, "rationale": "The text states: 'This was a direct blow to Hilbert's program, which aimed to prove the consistency of mathematics using only “safe,” finitary methods. G\"odel showed that this is impossible: any system strong enough to do arithmetic cannot certify its own soundness.'"}, {"text": "It demonstrated that foundational mathematics must rely on non-deductive, empirical methods.", "isCorrect": false, "rationale": "The theorem applies to formal deductive systems; it doesn't advocate for non-deductive or empirical methods for foundations of mathematics."}, {"text": "It showed that all formal systems capable of arithmetic are inherently inconsistent.", "isCorrect": false, "rationale": "The theorem assumes consistency and shows that consistency cannot be proven *internally*, not that such systems are inherently inconsistent."}]}, {"question": "According to the text, which of the following is a common misinterpretation of G\"odel's Incompleteness Theorems?", "options": [{"text": "That human mathematical understanding might extend beyond formal systems.", "isCorrect": false, "rationale": "The 'think about it' section poses this as a philosophical question for consideration, implying it's a valid area of discussion, not explicitly listed as a 'misapplication' or 'misunderstanding'."}, {"text": "That mathematics is inherently unreliable or flawed.", "isCorrect": true, "rationale": "The text explicitly lists '“Mathematics is unreliable” (the theorems assume consistency, not undermine it)' as something G\"odel's theorems do not prove, and thus a common misinterpretation."}, {"text": "That formal systems must be consistent to be useful.", "isCorrect": false, "rationale": "The theorems assume consistency as a condition for their applicability, reinforcing the importance of consistency, not that it's a misconception."}, {"text": "That arithmetic is a prerequisite for any interesting mathematical system.", "isCorrect": false, "rationale": "The text describes this as a 'modest requirement that any interesting mathematical system satisfies,' suggesting it's a factual prerequisite for the theorems, not a misconception of them."}]}, {"question": "The text describes G\"odel's theorems as revealing 'blind spots' in formal systems. What does the text imply about the nature of these blind spots?", "options": [{"text": "They are temporary deficiencies that can be overcome with improved computational power.", "isCorrect": false, "rationale": "The text explicitly states: 'These are not practical limitations — they are structural, permanent features of formal reasoning itself.'"}, {"text": "They are structural and permanent features inherent to formal reasoning itself.", "isCorrect": true, "rationale": "The 'keyconcept' box directly states: 'These are not practical limitations — they are structural, permanent features of formal reasoning itself. Every formal system... has blind spots: truths that lie within its language but beyond its reach.'"}, {"text": "They represent areas where the system has not yet been sufficiently developed.", "isCorrect": false, "rationale": "The text emphasizes their permanent and structural nature, not a lack of development."}, {"text": "They are primarily philosophical constructs without practical mathematical implications.", "isCorrect": false, "rationale": "G\"odel's theorems are precise mathematical results with profound implications for the foundations of mathematics, not merely philosophical constructs without practical relevance."}]}, {"question": "The 'think about it' section raises a philosophical question regarding human mathematical understanding and G\"odel's theorems. Which of the following best captures the nuanced perspective presented in that section?", "options": [{"text": "G\"odel's theorems definitively prove that human intelligence possesses capabilities fundamentally beyond any formal system.", "isCorrect": false, "rationale": "The text poses this as a question ('Does this mean...') rather than a definitive proof, acknowledging the complexity and open-ended nature of the philosophical implication."}, {"text": "While humans can recognize the truth of G\"odel's sentence G, this might merely indicate that humans are employing a different, possibly stronger, formal system with its own inherent limitations.", "isCorrect": true, "rationale": "The 'think about it' section asks: 'Does this mean human mathematical understanding goes beyond formal systems? Or does it simply mean we are using a different (stronger) system when we see that G is true — a system that has its own blind spots?' This option captures the second, more nuanced possibility presented."}, {"text": "The ability of humans to understand G\"odel's proof invalidates the claim that formal systems have unprovable truths.", "isCorrect": false, "rationale": "Human understanding confirms the existence of unprovable truths *within the original system*, it does not invalidate the claim."}, {"text": "The theorems suggest that human mathematical intuition is entirely unreliable and should be replaced by formal deduction.", "isCorrect": false, "rationale": "This is a misinterpretation; the theorems explore the limits of formal deduction but do not suggest human intuition is unreliable or should be replaced."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
