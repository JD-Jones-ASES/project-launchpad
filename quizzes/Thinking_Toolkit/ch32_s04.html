    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 32, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the core principle of 'inversion' as described in the text?", "options": [{"text": "Always seek to understand the direct path to success.", "isCorrect": false, "rationale": "This describes a traditional, forward-thinking approach, which inversion specifically challenges by asking the opposite question."}, {"text": "Systematically determine and avoid what would guarantee a negative outcome.", "isCorrect": true, "rationale": "The text defines inversion as asking, 'How would I guarantee the outcome I want to avoid?' and then avoiding those things."}, {"text": "Focus exclusively on positive brainstorming for solutions.", "isCorrect": false, "rationale": "Inversion suggests asking the opposite of positive brainstorming, focusing on potential failures rather than just successes."}, {"text": "Identify what would guarantee a desired outcome.", "isCorrect": false, "rationale": "This is still a forward-looking question about achieving a desired outcome, not inverting the problem to focus on what to avoid."}], "id": "q01"}, {"question": "While Carl Jacobi introduced the mathematical concept, who significantly adopted and generalized the inversion principle into a practical reasoning tool for decision-making?", "options": [{"text": "Murphy", "isCorrect": false, "rationale": "Murphy's Law is mentioned in 'connections' but not as the person who generalized inversion for practical reasoning."}, {"text": "Charlie Munger", "isCorrect": true, "rationale": "The text explicitly states, 'Charlie Munger adopted the principle as a central tool of his decision-making framework.'"}, {"text": "Famous relationship researchers", "isCorrect": false, "rationale": "Relationship researchers are cited for their findings on negative behaviors, not for generalizing the inversion principle itself."}, {"text": "Early engineers", "isCorrect": false, "rationale": "Engineers apply inversion, but they are not credited with generalizing the principle for practical reasoning in the text."}], "id": "q02"}, {"question": "According to the text, why is inversion often more powerful than focusing solely on how to achieve success?", "options": [{"text": "Success is always simpler to define than failure.", "isCorrect": false, "rationale": "The text states the opposite: 'Success is complex and context-dependent; failure has recurring, predictable patterns.'"}, {"text": "Failure patterns are generally more predictable and universal than success patterns.", "isCorrect": true, "rationale": "The text explicitly states this: 'Success is complex and context-dependent; failure has recurring, predictable patterns.'"}, {"text": "It guarantees success by identifying all possible obstacles beforehand.", "isCorrect": false, "rationale": "The text says 'you may not guarantee success—but you dramatically improve your odds,' not that it guarantees success."}, {"text": "It eliminates the need for any forward-looking planning.", "isCorrect": false, "rationale": "Inversion 'serves as a check on your forward-looking plans,' it doesn't eliminate them."}], "id": "q03"}, {"question": "A startup founder wants to ensure their new product launch is successful. Applying the principle of inversion, what question should they prioritize asking?", "options": [{"text": "\"What features would make our product irresistible to customers?\"", "isCorrect": false, "rationale": "This is a forward-looking question focused on achieving success, not an inversion strategy."}, {"text": "\"How can we maximize our initial sales and market share?\"", "isCorrect": false, "rationale": "This is a strategic question aimed at positive outcomes, not one that inverts the problem to identify failure."}, {"text": "\"What would cause this product launch to fail spectacularly?\"", "isCorrect": true, "rationale": "This directly applies the inversion principle by asking what would guarantee the outcome one wants to avoid (failure), allowing for proactive avoidance."}, {"text": "\"Who are our biggest competitors and what are their strengths?\"", "isCorrect": false, "rationale": "This is competitive analysis, a valid business practice, but not an application of the inversion principle as described."}], "id": "q04"}, {"question": "A young professional is concerned about their financial future. Following the inversion principle described in the text, which strategy would be most aligned with avoiding financial ruin?", "options": [{"text": "Invest heavily in high-growth stocks for quick wealth.", "isCorrect": false, "rationale": "The text advises against 'make concentrated bets on things you do not understand' as a path to financial ruin, making this a risky, not avoidance, strategy."}, {"text": "Carefully manage expenses to ensure spending does not exceed income.", "isCorrect": true, "rationale": "The text states that to guarantee financial ruin, one should 'Spend more than you earn.' Avoiding this behavior aligns with inversion for personal finance."}, {"text": "Prioritize acquiring luxury items to demonstrate success.", "isCorrect": false, "rationale": "This behavior often leads to overspending and debt, which the text identifies as causes of financial ruin."}, {"text": "Seek out complex, high-return investment schemes without proper due diligence.", "isCorrect": false, "rationale": "This aligns with 'make concentrated bets on things you do not understand,' which is a path to financial ruin according to the text."}], "id": "q05"}, {"question": "How does inversion relate to a 'pre-mortem' as mentioned in the text?", "options": [{"text": "They are entirely unrelated concepts; one is about math, the other about project management.", "isCorrect": false, "rationale": "The text explicitly states they are related, calling inversion 'essentially a pre-mortem framed as inversion.'"}, {"text": "Inversion is a specific type of pre-mortem, framed to identify potential failure modes in a strategy.", "isCorrect": true, "rationale": "The text states: 'This is essentially a pre-mortem framed as inversion,' highlighting its role in checking strategies for failure."}, {"text": "A pre-mortem is a step that must always precede any inversion thinking.", "isCorrect": false, "rationale": "Inversion itself can *be* the pre-mortem, or a way to frame it, not a step that always precedes it."}, {"text": "They both guarantee success by eliminating all risks.", "isCorrect": false, "rationale": "Neither guarantees success nor eliminates all risks; they make plans more robust and improve odds."}], "id": "q06"}, {"question": "Which of the following is NOT presented as a primary benefit or characteristic of using the inversion principle?", "options": [{"text": "It helps to identify predictable and universal causes of failure.", "isCorrect": false, "rationale": "The text states failure has 'recurring, predictable patterns,' making this a benefit."}, {"text": "It can make a forward-looking plan more robust by testing it for failure modes.", "isCorrect": false, "rationale": "The text says a strategy 'survives both forward reasoning… and inverted reasoning is far more robust.'"}, {"text": "It guarantees the achievement of success by eliminating all negative possibilities.", "isCorrect": true, "rationale": "The text explicitly states, 'you may not guarantee success—but you dramatically improve your odds.' It does not claim to eliminate all negative possibilities or guarantee success."}, {"text": "It often simplifies problem-solving by focusing on what to avoid rather than what to pursue.", "isCorrect": false, "rationale": "The text notes it's 'often easier to identify what leads to failure than what leads to success,' implying simplification."}], "id": "q07"}, {"question": "In engineering, the inversion principle is applied when good engineers ask 'How could this system fail?' This leads to practices such as designing bridges for loads beyond expected use and redundant systems in airplanes. What does this demonstrate?", "options": [{"text": "The pursuit of maximal efficiency above all other considerations.", "isCorrect": false, "rationale": "This application focuses on safety and resilience, which may sometimes conflict with maximal efficiency."}, {"text": "A primary focus on cosmetic design elements over functional ones.", "isCorrect": false, "rationale": "Designing for failure is a highly functional and critical aspect of engineering, not cosmetic."}, {"text": "A proactive strategy to build resilience and prevent catastrophic outcomes.", "isCorrect": true, "rationale": "By anticipating failure modes, engineers design systems to withstand or recover from them, thus building resilience and preventing catastrophe."}, {"text": "A tendency to over-engineer products, leading to unnecessary costs.", "isCorrect": false, "rationale": "While it might add cost, the text frames it as a necessary and 'good' engineering practice to prevent failure, not as mere 'over-engineering.'"}], "id": "q08"}, {"question": "Considering all the examples and explanations provided, what is the ultimate aim of systematically applying the inversion principle?", "options": [{"text": "To exclusively focus on avoiding negative outcomes, neglecting positive pursuits.", "isCorrect": false, "rationale": "Inversion is presented as an *additional* approach ('instead of asking only… also ask'), not a replacement for positive pursuits."}, {"text": "To guarantee success in any endeavor by eliminating all risks.", "isCorrect": false, "rationale": "The text states it 'dramatically improve your odds' and provides a 'necessary foundation,' but does not promise guaranteed success or elimination of all risks."}, {"text": "To build a robust foundation by systematically removing obstacles and dramatically improving the odds of desired outcomes.", "isCorrect": true, "rationale": "This synthesizes the key ideas: avoiding ruin 'is a necessary foundation,' and eliminating causes of failure 'dramatically improve your odds' of success."}, {"text": "To identify the single, most direct path to achieving success in complex situations.", "isCorrect": false, "rationale": "Inversion helps by eliminating failure paths, not necessarily by identifying a single direct path to success, which the text notes is complex."}], "id": "q09"}, {"question": "Sarah wants to improve her relationship with her partner. Instead of just brainstorming activities they could do together, she applies inversion. Based on the text's examples regarding relationships, which question would be most pertinent for her to ask?", "options": [{"text": "\"What are the most romantic gestures I can make to show my love?\"", "isCorrect": false, "rationale": "This is a forward-looking question about positive actions, not an inversion strategy."}, {"text": "\"What negative behaviors or habits could destroy our relationship?\"", "isCorrect": true, "rationale": "The text's example for relationships is 'What would destroy this marriage?' (Chronic contempt, dishonesty, etc.), directly aligning with this question."}, {"text": "\"How can we spend every waking moment together to strengthen our bond?\"", "isCorrect": false, "rationale": "This is a potentially impractical and even harmful positive strategy, not an inversion question."}, {"text": "\"What are the key interests and hobbies my partner has?\"", "isCorrect": false, "rationale": "This is a general relationship understanding question, not an application of the inversion principle."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
