    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 25, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the specific rule that defines the barber's shaving practice in the Barber Paradox?", "options": [{"text": "He shaves only those residents who shave themselves.", "isCorrect": false, "rationale": "This is the opposite of the barber's stated rule. The barber does not shave those who shave themselves."}, {"text": "He shaves all residents in the town, without exception.", "isCorrect": false, "rationale": "The rule explicitly states he shaves 'all and only those residents who do not shave themselves,' implying he does not shave everyone."}, {"text": "He shaves all and only those residents who do not shave themselves.", "isCorrect": true, "rationale": "This statement accurately reflects the barber's strict rule as described in the text: 'he shaves all and only those residents who do not shave themselves.'"}, {"text": "He allows residents to choose whether he shaves them or they shave themselves.", "isCorrect": false, "rationale": "The rule is strict and prescriptive, not based on resident choice, and it leads to a paradox precisely because of its rigidity."}], "id": "q01"}, {"question": "The central contradiction of the Barber Paradox arises when trying to determine who shaves the barber himself. What is this contradiction?", "options": [{"text": "The barber is too busy shaving others to shave himself.", "isCorrect": false, "rationale": "While a practical concern, this is not the logical contradiction at the heart of the paradox. The problem is with the rule itself, not the barber's schedule."}, {"text": "If the barber shaves himself, he violates his rule; if he doesn't shave himself, he also violates his rule.", "isCorrect": true, "rationale": "This correctly identifies the contradiction: applying the rule to the barber himself leads to a situation where he both must shave himself and must not shave himself, making the rule self-contradictory."}, {"text": "The barber's rule only applies to residents, and he is not considered a resident.", "isCorrect": false, "rationale": "The text implies the barber is a resident and the rule applies to 'all and only those residents,' with 'no exceptions' for its application."}, {"text": "The town's residents do not want the barber to shave himself.", "isCorrect": false, "rationale": "The preferences of the town's residents are not part of the paradox's logical structure or its resolution."}], "id": "q02"}, {"question": "In its analogy to Russell's Paradox, what does 'shaving yourself' in the Barber Paradox represent?", "options": [{"text": "Being a unique individual in a community.", "isCorrect": false, "rationale": "This is too general and doesn't capture the specific self-referential aspect being mapped."}, {"text": "Containing yourself as a member of a set.", "isCorrect": true, "rationale": "The text explicitly states: '“Shaving yourself” corresponds to “containing yourself as a member.”' This is the direct mapping from the concrete scenario to the abstract set theory."}, {"text": "Being an element that is excluded from all sets.", "isCorrect": false, "rationale": "This is unrelated to the concept of self-containment in set theory or self-shaving in the paradox."}, {"text": "The act of defining a set itself.", "isCorrect": false, "rationale": "Defining a set is a separate concept; 'shaving yourself' maps to a property of a set (containing itself), not the act of definition."}], "id": "q03"}, {"question": "The Barber Paradox serves as a 'miniature' illustration of Russell's Paradox. What does the barber character himself represent in this analogy?", "options": [{"text": "A universal set containing all other sets.", "isCorrect": false, "rationale": "A universal set is a different concept in set theory and is not the direct analogue of the barber in this paradox."}, {"text": "The set R, which is defined as the set of all sets that do not contain themselves.", "isCorrect": true, "rationale": "The text explicitly states: 'The barber is the set R — the set of all sets that do not contain themselves.' This is the core mapping."}, {"text": "Any arbitrary set within a given collection.", "isCorrect": false, "rationale": "The barber represents a very specific, problematic set, not just any arbitrary set."}, {"text": "The rules governing set formation in general.", "isCorrect": false, "rationale": "The barber's *rule* corresponds to the defining property of set R, but the barber himself is the set R."}], "id": "q04"}, {"question": "How is the contradiction presented by the Barber Paradox typically resolved within its own narrative?", "options": [{"text": "The barber is replaced by an automated shaving machine.", "isCorrect": false, "rationale": "This is a practical solution that avoids the paradox but doesn't resolve the logical impossibility of the original premise."}, {"text": "The town decides to ignore the rule for the barber himself.", "isCorrect": false, "rationale": "The text states 'No exceptions' to the rule, meaning ignoring it is not a valid resolution within the paradox's premises."}, {"text": "It is concluded that no such barber with that rule can exist; the scenario is impossible.", "isCorrect": true, "rationale": "The text explicitly states: 'No such barber can exist. ... The scenario is impossible. We simply reject the premise.'"}, {"text": "The barber shaves himself on Tuesdays and is shaved by someone else on Fridays.", "isCorrect": false, "rationale": "This attempts to find a practical workaround, but the paradox's core is that *any* consistent state for the barber (shaving or not shaving himself) leads to a contradiction based on the rule."}], "id": "q05"}, {"question": "What is the overarching lesson that both the Barber Paradox and Russell's Paradox communicate regarding definitions?", "options": [{"text": "All definitions, regardless of their structure, are inherently prone to logical inconsistencies.", "isCorrect": false, "rationale": "This is too broad and pessimistic. The lesson is about *specific types* of definitions (self-referential ones), not all definitions."}, {"text": "Self-referential definitions can lead to contradictions, necessitating restrictions on what kinds of definitions are permissible.", "isCorrect": true, "rationale": "This accurately summarizes the key concept presented: 'self-referential definitions can produce contradictions, and the only resolution is to restrict the kind of definitions we allow.'"}, {"text": "Paradoxes are simply amusing intellectual exercises with no real-world implications.", "isCorrect": false, "rationale": "The text emphasizes the 'deeper consequences' of Russell's Paradox, indicating significant real-world (mathematical) implications."}, {"text": "The only way to avoid contradictions is to eliminate all rules and definitions.", "isCorrect": false, "rationale": "This is an extreme and impractical conclusion. The solution is to restrict problematic definitions, not eliminate all of them."}], "id": "q06"}, {"question": "The text draws a significant distinction between the consequences of resolving the Barber Paradox versus Russell's Paradox. What is this distinction?", "options": [{"text": "Resolving the Barber Paradox required complex philosophical debates, while Russell's Paradox was quickly dismissed.", "isCorrect": false, "rationale": "This is incorrect. Russell's Paradox led to significant foundational changes in mathematics, implying deep debate and consequence."}, {"text": "Both paradoxes required equally profound foundational changes in their respective fields.", "isCorrect": false, "rationale": "The text explicitly contrasts them: 'restricting barbers costs us nothing, while restricting set formation required rebuilding the foundations of mathematics.'"}, {"text": "Resolving Russell's Paradox had deep implications for the foundations of mathematics, while resolving the Barber Paradox was comparatively trivial.", "isCorrect": true, "rationale": "This accurately reflects the text's conclusion: 'restricting barbers costs us nothing, while restricting set formation required rebuilding the foundations of mathematics.'"}, {"text": "The Barber Paradox led to practical changes in town planning, but Russell's Paradox had no real-world impact.", "isCorrect": false, "rationale": "The Barber Paradox's resolution is simply that such a barber cannot exist; it doesn't lead to town planning changes. Russell's Paradox had profound mathematical impact."}], "id": "q07"}, {"question": "According to the section, what permissive assumption of 'Na\"ive set theory' did Russell's Paradox, illustrated by the Barber Paradox, challenge?", "options": [{"text": "That sets could contain elements of different types (e.g., numbers and letters).", "isCorrect": false, "rationale": "While an aspect of set theory, this specific permissiveness is not the one highlighted as challenged by Russell's Paradox."}, {"text": "That any collection of objects that could be defined could automatically be considered a legitimate set.", "isCorrect": true, "rationale": "The text states: 'Na\"ive set theory said that any definable collection is a set — the mathematical equivalent of saying 'sure, a barber with that rule can exist.'' Russell's Paradox disproved this permissiveness."}, {"text": "That all mathematical operations (like addition or subtraction) could be applied to sets.", "isCorrect": false, "rationale": "This relates to set operations, not the fundamental definition of what constitutes a set in naive set theory."}, {"text": "That sets must always be finite and countable.", "isCorrect": false, "rationale": "Naive set theory did not impose such a restriction; the challenge was about the *formation* of sets, not their size."}], "id": "q08"}, {"question": "The Barber Paradox is presented primarily as an illustration of which specific paradox?", "options": [{"text": "The Liar Paradox", "isCorrect": false, "rationale": "The Liar Paradox is mentioned as a 'connection' involving self-reference in language, but the Barber Paradox is explicitly called 'A popular illustration of Russell's Paradox'."}, {"text": "Zeno's Paradoxes", "isCorrect": false, "rationale": "Zeno's Paradoxes deal with concepts of infinity and motion, which are distinct from the self-referential logical contradiction of the Barber Paradox."}, {"text": "Russell's Paradox", "isCorrect": true, "rationale": "The text explicitly states: 'A popular illustration of Russell's Paradox... It translates the abstract set-theoretic paradox into a concrete, everyday scenario.'"}, {"text": "The Sorites Paradox", "isCorrect": false, "rationale": "The Sorites Paradox (or paradox of the heap) deals with vague predicates and is not the paradox illustrated by the barber scenario."}], "id": "q09"}, {"question": "Consider a computer program with a function `F` that operates by the rule: `F(x)` processes `x` if and only if `x` does not process itself. If this program attempts to apply `F` to itself (i.e., `F(F)`), which lesson from the Barber Paradox is most directly applicable?", "options": [{"text": "The importance of clear and descriptive variable names in programming.", "isCorrect": false, "rationale": "While good practice, this is a practical programming concern and does not address the fundamental logical issue of a self-referential rule."}, {"text": "That self-referential rules can lead to unavoidable contradictions, making the scenario impossible without restriction.", "isCorrect": true, "rationale": "The program's rule 'processes x if and only if x does not process itself' is directly analogous to the barber's rule, and applying it to itself creates the same logical contradiction. The lesson is that such a rule is impossible to implement consistently without restrictions."}, {"text": "The need for programming languages to support advanced object-oriented features.", "isCorrect": false, "rationale": "The paradox is a logical one, independent of specific programming paradigms like object-oriented programming."}, {"text": "The benefits of distributed computing for complex tasks.", "isCorrect": false, "rationale": "Distributed computing is a solution for processing power, not for resolving logical contradictions within a rule's definition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
