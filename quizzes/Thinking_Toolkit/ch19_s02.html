    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the central assertion of Campbell's Law?", "options": [{"text": "Statistical relationships tend to break down when used for policy purposes.", "isCorrect": false, "rationale": "This statement describes Goodhart's Law, which is distinct from Campbell's Law. Campbell's Law goes further to describe active distortion and corruption of processes."}, {"text": "The more any quantitative social indicator is used for social decision-making, the more subject it will be to corruption and distortion of the processes it monitors.", "isCorrect": true, "rationale": "This option directly quotes and accurately summarizes Donald Campbell's blunt statement, which is the core definition of Campbell's Law."}, {"text": "Qualitative audits are sufficient to prevent the corruption of social indicators when high stakes are involved.", "isCorrect": false, "rationale": "While qualitative audits are a suggested safeguard, they are not the central assertion of the law itself. The law highlights the inherent vulnerability to corruption when measures become targets."}, {"text": "Measures of institutional performance generally become more accurate over time due to refinement and experience.", "isCorrect": false, "rationale": "This statement contradicts Campbell's Law, which posits that high stakes attached to measures lead to distortion and corruption over time, not increased accuracy."}]}, {"question": "How does Campbell's Law primarily differ from Goodhart's Law in its emphasis?", "options": [{"text": "Campbell's Law applies exclusively to economic indicators, whereas Goodhart's Law applies to social indicators.", "isCorrect": false, "rationale": "This is incorrect. Campbell's Law specifically focuses on 'social indicators' and 'public institutions,' while Goodhart's Law originated from a central banker concerned with 'monetary aggregates' (economic)."}, {"text": "Campbell's Law describes a moral phenomenon leading to institutional decay, while Goodhart's Law describes a statistical phenomenon where relationships break down.", "isCorrect": true, "rationale": "The text explicitly states this distinction: 'Goodhart... describes a statistical phenomenon. Campbell... describes a moral phenomenon,' leading to 'institutional decay.'"}, {"text": "Goodhart's Law focuses on individual dishonesty, while Campbell's Law focuses on systemic data errors.", "isCorrect": false, "rationale": "Campbell's Law emphasizes the creation of incentives for dishonesty, which can affect individuals and systems, leading to more than just 'systemic data errors'; it's about active corruption and reshaping culture."}, {"text": "Campbell's Law is concerned with the initial design of metrics, while Goodhart's Law addresses their long-term usage.", "isCorrect": false, "rationale": "Both laws relate to the impact of metrics when they are used for policy or decision-making, particularly their long-term usage. The primary distinction is the nature of the observed phenomenon (moral vs. statistical)."}]}, {"question": "According to Campbell's Law, what is the long-term impact of tying people's livelihoods, reputations, and careers to a quantitative measure?", "options": [{"text": "It inevitably leads to more accurate and reliable data due to increased focus and accountability.", "isCorrect": false, "rationale": "This outcome contradicts Campbell's Law, which predicts that such high stakes will lead to distortion and corruption, not increased accuracy."}, {"text": "It primarily causes a temporary statistical anomaly that corrects itself once policies are adjusted.", "isCorrect": false, "rationale": "Campbell's Law describes a deeper, moral phenomenon that leads to a reshaping of institutional culture and potential decay, which is far more significant than a temporary statistical anomaly."}, {"text": "It creates incentives for dishonesty, ultimately reshaping the institution's culture and leading to decay.", "isCorrect": true, "rationale": "The text explicitly states that tying high stakes to numbers 'creates incentives for dishonesty, and over time, those incentives reshape the culture of the institution itself,' leading to 'institutional decay.'"}, {"text": "It encourages innovation in data collection and reporting methodologies without affecting the underlying processes.", "isCorrect": false, "rationale": "Campbell's Law warns that the measure will 'distort and corrupt the social processes it is intended to monitor,' meaning the underlying reality, not just the reporting methodology, is affected."}]}, {"question": "Why is Campbell's Law considered 'especially dangerous' due to its effects being 'self-concealing'?", "options": [{"text": "The corruption is so subtle that only highly trained statisticians can detect it.", "isCorrect": false, "rationale": "The danger isn't about the subtlety for statisticians, but about the *appearance* of positive numbers for anyone looking at the dashboard, masking the truth from general observation."}, {"text": "Institutions are unwilling to admit fault, actively hiding any visible evidence of corruption.", "isCorrect": false, "rationale": "While institutions might hide fault, the 'self-concealing' aspect refers to the *numbers themselves* appearing good because they are gamed, making the corruption intrinsically hard to spot from official reports."}, {"text": "The negative effects only manifest decades after the measures are implemented, making them hard to trace back to the original policy.", "isCorrect": false, "rationale": "The text implies a more immediate problem: the gamed numbers look good *now*, masking current corruption and decay, rather than a delay of decades."}, {"text": "The gaming of measures produces numbers that appear positive, masking the underlying corruption from those who only observe dashboards.", "isCorrect": true, "rationale": "The text clearly states: 'When a measure is being gamed, the gaming itself produces numbers that look good. The corruption is invisible to anyone who looks only at the dashboard.'"}]}, {"question": "A government agency implements a new performance metric: 'Number of successfully resolved citizen complaints per month,' with bonuses tied to exceeding targets. Which outcome is most consistent with Campbell's Law?", "options": [{"text": "Agency staff begin categorizing complex complaints as 'resolved' even if only initial contact has been made, to meet targets and secure bonuses.", "isCorrect": true, "rationale": "This scenario exemplifies 'gaming' the measure by manipulating the reporting to make the numbers look good ('appearance of resolution') without necessarily addressing the underlying issue ('reality of resolution'), consistent with Campbell's Law."}, {"text": "The agency receives an increased budget due to demonstrably improved citizen satisfaction, leading to better service.", "isCorrect": false, "rationale": "This describes an ideal, positive outcome, which Campbell's Law suggests is unlikely when high stakes are involved, as the incentive to game the metric often overrides genuine improvement."}, {"text": "The metric is abandoned quickly because it is too difficult to measure 'successful resolution' objectively across diverse complaints.", "isCorrect": false, "rationale": "While measurement difficulty can be a problem, Campbell's Law focuses on the *corruption* that occurs when high stakes are tied to a measure, not necessarily its abandonment due to inherent difficulty."}, {"text": "Citizens become more critical of the agency's performance, leading to a decrease in the reported number of resolved complaints.", "isCorrect": false, "rationale": "Campbell's Law suggests the reported numbers would look *good* due to gaming, making the agency appear to be performing better, not worse due to public criticism affecting the official count."}]}, {"question": "Based on Campbell's Law, what cautionary advice is given regarding measures that are deemed most important, such as child welfare?", "options": [{"text": "They should never be quantified, as any measurement will inevitably lead to corruption.", "isCorrect": false, "rationale": "The text explicitly states: 'Campbell's Law does not mean that we should abandon measurement in social policy.' It warns against turning them into high-stakes targets without safeguards."}, {"text": "These measures should be used with extreme caution if turned into targets, as this can create incentives to game the numbers rather than improve the reality.", "isCorrect": true, "rationale": "The text warns: 'the measures that matter most are the ones you should be most cautious about turning into targets... you have created incentives for every actor in the system to make the number look good rather than to make children safe.'"}, {"text": "They should only be used internally and never reported publicly to avoid external pressure.", "isCorrect": false, "rationale": "While public pressure can amplify issues, the core problem identified by Campbell's Law is tying 'funding and careers' (high stakes) to the number, regardless of internal or external reporting."}, {"text": "Their measurement systems should be simplified to ensure easy comprehension by all stakeholders.", "isCorrect": false, "rationale": "Simplification of measurement systems does not address the fundamental problem of gaming when high stakes are involved; in some cases, simpler metrics might even be easier to manipulate."}]}, {"question": "While acknowledging Campbell's Law, the text advises against abandoning social policy measurement. Instead, what is a crucial safeguard suggested to mitigate its effects?", "options": [{"text": "Implementing severe consequences for gaming the system that are at least as stringent as those for failing to meet targets.", "isCorrect": true, "rationale": "The 'caution' section explicitly lists: '...and — crucially — consequences for gaming that are at least as severe as consequences for failing to meet targets.'"}, {"text": "Relying solely on a single, comprehensive quantitative measure for all evaluations to ensure clarity.", "isCorrect": false, "rationale": "The text suggests 'multiple independent measures,' which contradicts relying on a single measure."}, {"text": "Increasing the frequency of reporting to catch any distortions or gaming early.", "isCorrect": false, "rationale": "Frequent reporting doesn't prevent gaming if the incentives remain; it might even increase pressure to game the numbers more often."}, {"text": "Focusing primarily on historical data trends rather than current performance indicators.", "isCorrect": false, "rationale": "While historical data provides context, it does not prevent the corruption of current measures. The suggested safeguards focus on designing and overseeing present measurement systems."}]}, {"question": "The VA hospital scandal of 2014, where administrators created secret waiting lists to meet appointment targets, best illustrates which aspect of Campbell's Law?", "options": [{"text": "The inevitable breakdown of statistical correlations in public policy when used for decision-making.", "isCorrect": false, "rationale": "While related to Goodhart's Law, this example demonstrates active distortion and deception, which is the core of Campbell's Law, rather than a passive statistical breakdown."}, {"text": "The inherent difficulty in setting clear, measurable targets for complex social services.", "isCorrect": false, "rationale": "The targets (14 days) were clear. The problem was the response to the high stakes tied to those targets, leading to gaming, not the clarity of the target itself."}, {"text": "How high stakes attached to a measure can cause the appearance of meeting targets to replace the reality of the process.", "isCorrect": true, "rationale": "The text explicitly uses this example to show how 'The high stakes attached to it ensured that the appearance of prompt treatment replaced the reality' through secret lists."}, {"text": "The need for more robust data collection technologies to prevent manual manipulation of records.", "isCorrect": false, "rationale": "While technology might help, the fundamental issue is the incentive structure that drives manipulation, regardless of the tools available, which is what Campbell's Law highlights."}]}, {"question": "Donald Campbell's perspective on his law emphasizes a 'moral phenomenon' rather than a purely statistical one. What does this distinction signify?", "options": [{"text": "It implies that only morally corrupt individuals are susceptible to gaming measures.", "isCorrect": false, "rationale": "The law suggests that *incentives* corrupt the system, making it predictable that people *within* the system will respond to those incentives, not that only inherently corrupt individuals are affected."}, {"text": "The law highlights that high-stakes measures create incentives for dishonesty and unethical behavior, corrupting the institutional culture.", "isCorrect": true, "rationale": "The text states Campbell's law 'describes a moral phenomenon. When you tie people's livelihoods... you are creating incentives for dishonesty, and over time, those incentives reshape the culture of the institution itself.' This directly points to ethics and culture."}, {"text": "It means that social indicators are inherently subjective and cannot be measured accurately.", "isCorrect": false, "rationale": "The law doesn't claim indicators can't be measured accurately; it warns that they become *corrupted* when used as high-stakes targets, leading to inaccurate representations of reality."}, {"text": "It suggests that statistical analysis itself is an unethical practice in social science.", "isCorrect": false, "rationale": "The text explicitly states not to abandon measurement, but to design systems with awareness of gaming, implying that statistical analysis is valuable when used carefully and ethically."}]}, {"question": "The author states that Campbell's Law is 'not a gentle observation about statistical artifacts. It is a warning about institutional decay.' Which statement best encapsulates this broader warning?", "options": [{"text": "Statistical models are inherently flawed and should not be used in social science research.", "isCorrect": false, "rationale": "The text does not advocate abandoning measurement or statistical models, but rather using them with caution and safeguards to prevent their corruption and the resulting institutional decay."}, {"text": "Individual instances of dishonesty are inevitable in large organizations but do not affect overall institutional health.", "isCorrect": false, "rationale": "Campbell's Law precisely argues the opposite: that widespread incentives for dishonesty *do* reshape institutional culture and lead to decay, affecting overall institutional health significantly."}, {"text": "Unchecked reliance on high-stakes metrics for decision-making can systematically erode the integrity and effectiveness of public institutions over time.", "isCorrect": true, "rationale": "This statement synthesizes the core message that high-stakes measures create incentives for gaming, which distorts reality, promotes bad behavior, and ultimately leads to a systemic erosion of institutional integrity and effectiveness."}, {"text": "Institutions are primarily concerned with maintaining a positive public image, even at the cost of internal efficiency.", "isCorrect": false, "rationale": "While maintaining a good image (e.g., numbers looking good) is a *symptom* of gaming, the broader warning of Campbell's Law is about the deeper 'institutional decay' and corruption of actual processes, not just superficial image management."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
