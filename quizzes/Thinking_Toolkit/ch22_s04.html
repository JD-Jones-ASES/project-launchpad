        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between Murphy's Law and the Law of Unintended Consequences, according to the text?", "options": [{"text": "Murphy's Law applies to simple systems, whereas the Law of Unintended Consequences applies only to social systems.", "isCorrect": false, "rationale": "The text states that the Law of Unintended Consequences applies to complex systems generally, not exclusively social ones. Murphy's Law is not limited to simple systems, but rather states that 'things go wrong' in a general sense."}, {"text": "Murphy's Law predicts that things will go wrong, while the Law of Unintended Consequences suggests outcomes will be different than planned due to complex system responses.", "isCorrect": true, "rationale": "The text explicitly states: 'Murphy's Law says things go wrong. The Law of Unintended Consequences says something more subtle: things go differently than planned, in directions nobody anticipated, because complex systems respond to interventions in ways that are not fully predictable.'"}, {"text": "Murphy's Law states that all plans will fail, while the Law of Unintended Consequences suggests that plans will simply be delayed.", "isCorrect": false, "rationale": "The text defines Murphy's Law as 'things go wrong,' which is not necessarily 'all plans will fail.' The Law of Unintended Consequences focuses on *different* outcomes, not just delays."}, {"text": "Murphy's Law focuses on human error, while the Law of Unintended Consequences focuses on natural disasters.", "isCorrect": false, "rationale": "Neither law is primarily defined by the text as focusing exclusively on human error or natural disasters. The Law of Unintended Consequences is about the inherent complexity of systems."}], "id": "q01"}, {"question": "Which of the following is NOT explicitly identified by Robert Merton as a reason why purposive actions produce unanticipated consequences?", "options": [{"text": "Sheer complexity of social systems.", "isCorrect": false, "rationale": "The text states, 'The most important is sheer complexity: social systems have too many interacting variables for any actor to model completely,' making this an identified reason."}, {"text": "Intentional malice or sabotage.", "isCorrect": true, "rationale": "Merton's reasons listed are complexity, ignorance, error, 'imperious immediacy of interest,' and self-defeating prophecy. Intentional malice is not mentioned as one of his reasons for unanticipated consequences."}, {"text": "Ignorance (we do not know enough).", "isCorrect": false, "rationale": "The text states, 'But Merton also pointed to ignorance (we do not know enough),' making this an identified reason."}, {"text": "The 'imperious immediacy of interest' (we focus on short-term goals).", "isCorrect": false, "rationale": "The text states, 'and the 'imperious immediacy of interest' (we focus on short-term goals and ignore long-term effects),' making this an identified reason."}], "id": "q02"}, {"question": "The text emphasizes a crucial distinction regarding unintended consequences. What is this distinction?", "options": [{"text": "Between first-order and second-order effects.", "isCorrect": false, "rationale": "While second-order effects are related and mentioned in 'connections,' the text states the *crucial distinction* is about the nature of the outcome itself, not its order."}, {"text": "Between foreseeable and unforeseeable consequences.", "isCorrect": false, "rationale": "The Law of Unintended Consequences deals with outcomes 'nobody anticipated,' making them unforeseeable, but this isn't the specific *crucial distinction* the text highlights about their nature."}, {"text": "Between consequences that are bad and consequences that are merely unexpected, which can be positive, negative, or neutral.", "isCorrect": true, "rationale": "The text explicitly states: 'The crucial distinction is between unintended consequences and bad outcomes. Unintended consequences can be positive, negative, or neutral.'"}, {"text": "Between individual actions and collective actions.", "isCorrect": false, "rationale": "This distinction is not mentioned in the text as the crucial distinction for unintended consequences."}], "id": "q03"}, {"question": "According to the text, what makes the Law of Unintended Consequences a 'law' rather than an occasional surprise?", "options": [{"text": "Its basis in ancient philosophical traditions.", "isCorrect": false, "rationale": "While the concept has roots in historical figures, the text states this is not what makes it a 'law' in the sense of regularity."}, {"text": "Its ability to predict specific outcomes with high accuracy.", "isCorrect": false, "rationale": "The text explicitly states that 'we do not know, and we cannot fully know' the specific outcomes, contradicting the idea of high predictive accuracy."}, {"text": "The regularity with which all interventions in complex systems produce effects beyond their intended scope.", "isCorrect": true, "rationale": "The text states: 'What makes the Law of Unintended Consequences a law rather than an occasional surprise is its regularity. It is not that some interventions produce unintended consequences and others do not. It is that all interventions in complex systems produce consequences beyond their intended scope.'"}, {"text": "The tendency for negative consequences to always outweigh positive ones.", "isCorrect": false, "rationale": "The text clarifies that unintended consequences can be positive, negative, or neutral, so they don't always lean negative."}], "id": "q04"}, {"question": "Given the understanding of the Law of Unintended Consequences, what counsel does the text offer for decision-makers?", "options": [{"text": "To avoid all interventions in complex systems due to the inherent unpredictability.", "isCorrect": false, "rationale": "The text explicitly cautions against this, stating, 'This does not mean we should never act. Paralysis is its own choice, with its own unintended consequences.'"}, {"text": "To act with humility, monitor effects, be willing to adjust, and build in reversibility.", "isCorrect": true, "rationale": "The text advises: 'It means we should act with humility, monitor the effects of our actions, be willing to adjust, and build in reversibility wherever possible.'"}, {"text": "To rely solely on expert models, as they can fully predict system responses.", "isCorrect": false, "rationale": "The text notes that 'the system is more complex than our models of it,' implying models cannot fully predict responses."}, {"text": "To focus exclusively on achieving short-term goals, as long-term effects are too hard to predict.", "isCorrect": false, "rationale": "Focusing on short-term goals while ignoring long-term effects is identified as 'imperious immediacy of interest,' one of Merton's reasons for *producing* unanticipated consequences, not a recommended strategy."}], "id": "q05"}, {"question": "A city government implements a new policy requiring all restaurants to use biodegradable packaging to reduce plastic waste. Initially, plastic waste in landfills decreases. However, it soon becomes apparent that the biodegradable packaging is significantly more expensive, leading many small restaurants to close or raise prices, disproportionately affecting low-income residents and causing job losses. This scenario best exemplifies:", "options": [{"text": "Murphy's Law, because the policy resulted in things going wrong for small businesses.", "isCorrect": false, "rationale": "While things did go wrong, this scenario demonstrates a more subtle, systemic response beyond mere failure, which is the essence of the Law of Unintended Consequences rather than Murphy's Law."}, {"text": "The 'imperious immediacy of interest,' as the government prioritized waste reduction over economic stability.", "isCorrect": false, "rationale": "While the government might have overlooked economic impacts, the scenario as a whole points to the broader concept of the LOUC, not just one of Merton's specific reasons. The question asks what the *scenario exemplifies* most broadly."}, {"text": "The Law of Unintended Consequences, demonstrating how interventions in complex systems produce outcomes beyond their initial scope, even with a partially achieved primary goal.", "isCorrect": true, "rationale": "The policy achieved its intended goal (reduced plastic waste) but had unforeseen, negative second-order effects (economic hardship, job loss) due to the complexity of the urban ecosystem, fitting the definition of the Law of Unintended Consequences."}, {"text": "A self-defeating prophecy, where the prediction of success changed behavior to invalidate it.", "isCorrect": false, "rationale": "The initial goal of reducing plastic waste was met, so the prophecy of success wasn't invalidated. The issue was with other, unforeseen consequences arising from the intervention."}], "id": "q06"}, {"question": "The text cautions against a common misapplication of the Law of Unintended Consequences. What is it?", "options": [{"text": "Using it as an excuse to avoid accountability for negative outcomes.", "isCorrect": false, "rationale": "While this might happen, the specific caution mentioned in the text is about using it as a blanket argument against action, not primarily about avoiding accountability."}, {"text": "Interpreting it as a blanket argument against any policy intervention, leading to inaction.", "isCorrect": true, "rationale": "The text states: 'The Law of Unintended Consequences is sometimes misused as a blanket argument against any policy intervention: “We cannot predict all the consequences, so we should do nothing.” This is a misapplication. Inaction also has unintended consequences.'"}, {"text": "Believing that only negative consequences can arise from interventions.", "isCorrect": false, "rationale": "The text explicitly states that unintended consequences can be positive, negative, or neutral, so this is a misunderstanding, but not the specific 'misapplication' highlighted in the 'caution' section."}, {"text": "Applying it to simple systems where outcomes are easily predictable.", "isCorrect": false, "rationale": "The Law of Unintended Consequences inherently applies to complex systems where outcomes are *not* fully predictable. Applying it to simple systems would likely be a misunderstanding of its scope, but not the specific misapplication warned against."}], "id": "q07"}, {"question": "The Prohibition example from the 'realworld' section primarily illustrates that an intervention aimed at solving a social problem can:", "options": [{"text": "Always achieve its primary goals if enforced strictly enough.", "isCorrect": false, "rationale": "The text states, 'Alcohol consumption initially declined but then partially recovered,' indicating that strict enforcement did not lead to sustained achievement of the primary goal."}, {"text": "Result in second-order consequences that are more detrimental than the original problem.", "isCorrect": true, "rationale": "The text concludes that Prohibition produced 'second-order consequences that were, by most assessments, worse than the original problem,' highlighting the severity of the unintended negative outcomes."}, {"text": "Prove that human behavior is entirely unpredictable and cannot be influenced by policy.", "isCorrect": false, "rationale": "Alcohol consumption *did* initially decline, showing policy influence. The example demonstrates complex responses, not total unpredictability or inability to influence."}, {"text": "Only have negative unintended consequences, never positive ones.", "isCorrect": false, "rationale": "While the Prohibition example focuses on negative consequences, the general principle of the Law of Unintended Consequences, as established earlier in the text, allows for positive or neutral outcomes."}], "id": "q08"}, {"question": "The key concept 'Complexity Produces Surprise' implies that unintended consequences are:", "options": [{"text": "A result of intellectual failure on the part of policymakers.", "isCorrect": false, "rationale": "The text explicitly states, 'This is a structural feature of complexity, not a failure of intelligence,' contradicting this option."}, {"text": "An inherent and structural feature of complex systems when subjected to intervention.", "isCorrect": true, "rationale": "The 'keyconcept' section states: 'All interventions in complex systems produce effects beyond their intended scope. This is a structural feature of complexity, not a failure of intelligence.'"}, {"text": "Random occurrences that cannot be accounted for in any decision-making process.", "isCorrect": false, "rationale": "The text advises that 'Sound decision-making accounts for this by favoring reversible actions, monitoring outcomes, and maintaining the flexibility to adjust course,' indicating they can be accounted for, even if not fully predictable."}, {"text": "Solely attributable to external, unforeseen events rather than internal system dynamics.", "isCorrect": false, "rationale": "The text emphasizes that complex systems *respond to interventions* in unpredictable ways, focusing on internal system dynamics as the source of surprise, not just external events."}], "id": "q09"}, {"question": "The text suggests that 'The most dangerous interventions are not the ones that go wrong but the ones that go wrong and cannot be undone.' This highlights the importance of:", "options": [{"text": "Ensuring all interventions are irreversible to commit fully to a course of action.", "isCorrect": false, "rationale": "This option contradicts the advice to build in reversibility, implying that irreversible actions are more dangerous when they go wrong."}, {"text": "Prioritizing interventions with known, guaranteed outcomes over those with potential uncertainty.", "isCorrect": false, "rationale": "The Law of Unintended Consequences states that all interventions in complex systems will produce outcomes beyond their intended scope, meaning guaranteed outcomes are often not possible."}, {"text": "Designing policies with built-in flexibility and reversibility to mitigate unforeseen negative impacts.", "isCorrect": true, "rationale": "The text advises to 'build in reversibility wherever possible' precisely because 'the most dangerous interventions are not the ones that go wrong but the ones that go wrong and cannot be undone.'"}, {"text": "Delaying action indefinitely until all possible consequences are fully understood.", "isCorrect": false, "rationale": "The text warns against this, stating, 'Paralysis is its own choice, with its own unintended consequences,' and that full understanding is often impossible due to complexity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
