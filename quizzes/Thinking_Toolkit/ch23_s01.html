        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which statement best summarizes Gall's Law?", "options": [{"text": "Complex systems are inherently unstable and will always eventually fail, regardless of their origin.", "isCorrect": false, "rationale": "This statement is too general and does not capture the core mechanism of Gall's Law, which focuses on the origin and evolution of complex systems, not their inherent instability once established."}, {"text": "Working complex systems invariably evolve from simpler working systems, whereas complex systems designed from scratch rarely succeed.", "isCorrect": true, "rationale": "This accurately summarizes Gall's Law: the reliable path to a complex working system is through incremental evolution from a simple, functional foundation, rather than a comprehensive design from the ground up."}, {"text": "The key to system success is meticulous planning and exhaustive documentation before any implementation begins.", "isCorrect": false, "rationale": "This describes an approach similar to the 'waterfall' model, which the text explicitly identifies as producing 'spectacular failures' because it ignores emergent behaviors."}, {"text": "All successful systems must be complex from their inception to address real-world challenges effectively.", "isCorrect": false, "rationale": "This contradicts Gall's Law, which states that successful complex systems evolve from simple ones, implying they are not complex from inception."}]}, {"question": "According to Gall's Law, what is the primary reason complex systems designed from scratch tend to fail?", "options": [{"text": "A lack of sufficient funding or resources allocated for their development.", "isCorrect": false, "rationale": "While funding can be an issue, the text does not identify it as the 'primary reason' for failure in the context of Gall's Law. The focus is on design methodology."}, {"text": "The inherent logical impossibility of designing complex systems on paper.", "isCorrect": false, "rationale": "The text explicitly states: 'The reason is not that complex designs are logically impossible. On paper, a comprehensive system can look elegant and complete.'"}, {"text": "The inability to predict emergent behaviors that arise from the interactions of components within the system.", "isCorrect": true, "rationale": "The text highlights that 'complex systems have emergent behaviors — properties that arise from the interaction of their components and cannot be predicted from the components alone,' blindsiding designers."}, {"text": "Designers' unwillingness to embrace comprehensive solutions, opting for simplicity instead.", "isCorrect": false, "rationale": "The text states 'The temptation to design a perfect, comprehensive system from the ground up is nearly irresistible,' indicating the opposite of unwillingness."}]}, {"question": "Which of the following development approaches best exemplifies adherence to Gall's Law?", "options": [{"text": "A waterfall model, where all requirements are specified in advance, and the entire system is built before testing begins.", "isCorrect": false, "rationale": "The text explicitly cites the 'waterfall' model as an approach that 'produces spectacular failures' because it violates Gall's Law."}, {"text": "A phased rollout where a basic, functional core system is launched, and features are added iteratively based on real-world observation and testing.", "isCorrect": true, "rationale": "This approach directly aligns with Gall's Law: 'build a simple version, run it, observe what actually happens, and then iterate' and 'Each increment was tested against reality before the next was added.'"}, {"text": "Designing a comprehensive system on paper first, meticulously accounting for all potential interactions to prevent future issues.", "isCorrect": false, "rationale": "While good in theory, the text warns that such paper designs fail in practice because emergent behaviors cannot be predicted, leading to 'blindsided' designers."}, {"text": "Employing a large team of experts to design and build all complex components simultaneously to accelerate development time.", "isCorrect": false, "rationale": "Team size or parallel work doesn't inherently address the core issue of emergent behaviors when designing a complex system from scratch; it might even increase integration challenges."}]}, {"question": "Based on the text, which historical example most clearly demonstrates a violation of Gall's Law?", "options": [{"text": "The development of the Internet.", "isCorrect": false, "rationale": "The Internet is cited as one of 'The most successful software systems' that 'began as simple, working prototypes and grew incrementally,' thus adhering to Gall's Law."}, {"text": "The evolution of the United States Constitution.", "isCorrect": false, "rationale": "The U.S. Constitution is presented as a complex governing document that 'evolved from the Articles of Confederation,' illustrating adherence to Gall's Law."}, {"text": "The initial launch of the Healthcare.gov website in 2013.", "isCorrect": true, "rationale": "The text explicitly states: 'The initial launch of the federal health insurance exchange website was a high-profile example of Gall's Law violated,' as it was designed as a comprehensive platform from scratch and failed catastrophically."}, {"text": "The incremental growth of Wikipedia.", "isCorrect": false, "rationale": "Wikipedia is listed among 'most successful start-up products' that 'began as simple, working prototypes and grew incrementally,' following Gall's Law."}]}, {"question": "A software development team wants to build a new, highly complex social media platform. How would Gall's Law guide their initial design strategy?", "options": [{"text": "They should focus on a comprehensive architectural design that details every feature and interaction before any coding starts.", "isCorrect": false, "rationale": "This approach mirrors the 'waterfall' model and 'design from scratch' strategy, which Gall's Law warns against due to unpredicted emergent behaviors."}, {"text": "They should prioritize building a simple, core version of the platform with basic functionality, testing it, and then incrementally adding features.", "isCorrect": true, "rationale": "This strategy directly applies Gall's Law: 'build a simple version, run it, observe what actually happens, and then iterate,' ensuring each layer is tested against reality."}, {"text": "They should assemble a large team of specialists to design and build all complex components in parallel to ensure efficiency and completeness.", "isCorrect": false, "rationale": "While large teams can be effective, designing all complex components in parallel from scratch without an evolutionary base still risks encountering unmanageable emergent behaviors upon integration."}, {"text": "They should conduct extensive market research to predict all possible user needs and design a system to fulfill them from day one.", "isCorrect": false, "rationale": "Predicting 'all possible user needs' and designing a 'system to fulfill them from day one' is a characteristic of the 'comprehensive system designed from scratch' approach that Gall's Law argues against."}]}, {"question": "What is the fundamental 'path' to creating a successful complex system, according to Gall's Law?", "options": [{"text": "Developing an exhaustive set of requirements and specifications upfront, leaving no room for ambiguity.", "isCorrect": false, "rationale": "This approach is typical of 'designing from scratch' or the 'waterfall' model, which Gall's Law identifies as prone to failure due to unpredictable emergent behaviors."}, {"text": "Starting with a simple, functional system and gradually adding layers after testing each increment against reality.", "isCorrect": true, "rationale": "This directly aligns with the key takeaway: 'The path to a complex system that works runs through a simple system that works... build it one working layer at a time, testing each layer against reality before adding the next.'"}, {"text": "Utilizing advanced predictive modeling to anticipate all possible emergent behaviors before system deployment.", "isCorrect": false, "rationale": "The text states that 'emergent behaviors... cannot be predicted,' making this approach unreliable according to Gall's Law."}, {"text": "Allocating a significant budget to allow for numerous redesigns and patches if initial complex designs fail.", "isCorrect": false, "rationale": "Gall's Law states that a complex system designed from scratch 'cannot be patched up to make it work,' implying that throwing money at fixing a fundamentally flawed initial design is ineffective."}]}, {"question": "Gall's Law is described as an argument 'against hubris' but 'not against ambition.' What is the key difference implied by this distinction in the context of system design?", "options": [{"text": "Ambition drives innovation in simple systems, while hubris leads to resistance to change in established complex systems.", "isCorrect": false, "rationale": "The distinction is not about innovation in simple systems versus resistance to change, but rather about the approach to building new complex systems."}, {"text": "Ambition encourages setting high goals for complexity, while hubris assumes one can perfectly design that complexity from scratch without evolution.", "isCorrect": true, "rationale": "Ambition allows for the goal of a complex, wonderful system. Hubris is the mistaken belief that such a system can be successfully created 'from scratch' rather than incrementally, ignoring the unpredictable nature of emergent behaviors."}, {"text": "Hubris is about designing systems that are too simple to be effective, whereas ambition pushes for necessary complexity.", "isCorrect": false, "rationale": "Hubris, in this context, refers to overconfidence in designing *complex* systems from scratch, not designing overly simple ones."}, {"text": "Ambition focuses primarily on technical solutions, while hubris considers the human element in system failure.", "isCorrect": false, "rationale": "The text does not frame the distinction in terms of technical versus human elements; it's about the design process and the confidence in predicting complex interactions."}]}, {"question": "Considering the evolution of the U.S. Constitution as an example, what principle of institutional design does Gall's Law emphasize?", "options": [{"text": "The importance of revolutionary change to discard outdated systems entirely in favor of completely new structures.", "isCorrect": false, "rationale": "The text states the Constitution 'evolved' from existing documents, not that it was a complete discard of all previous systems, contrasting with 'attempts to design entirely new governmental systems from scratch.'"}, {"text": "The necessity of a single, brilliant designer or committee to create a perfect governing document from scratch.", "isCorrect": false, "rationale": "This contradicts the idea of evolution and incremental testing. The text highlights the 'evolved fit between design and reality' as crucial for institutions."}, {"text": "The value of evolving complex institutions from simpler, working foundations, testing each layer against experience before adding the next.", "isCorrect": true, "rationale": "The text uses the Constitution as a prime example: 'Each layer was tested by experience before the next was added,' directly illustrating this principle."}, {"text": "The idea that institutional design is fundamentally different from engineering design and therefore not subject to Gall's Law.", "isCorrect": false, "rationale": "The text explicitly states: 'The same principle applies to institutions' and refers to Gall's Law as a principle in 'institutional design.'"}]}, {"question": "The failure of Healthcare.gov's initial launch serves as a powerful illustration of Gall's Law because:", "options": [{"text": "It demonstrated that even simple systems can fail if not properly maintained after launch.", "isCorrect": false, "rationale": "Healthcare.gov was designed as a 'comprehensive platform,' not a simple system. The failure was during launch, not due to lack of maintenance after a successful deployment."}, {"text": "Its eventual success after being rebuilt showed that initial, flawed designs can always be patched up to work with enough effort.", "isCorrect": false, "rationale": "The text explicitly states that a complex system designed from scratch 'cannot be patched up to make it work.' The system was 'eventually rebuilt using a more incremental approach,' implying a re-start, not just patching."}, {"text": "It was an attempt to design a comprehensive, complex system from scratch, leading to catastrophic failure due to unpredicted emergent behaviors.", "isCorrect": true, "rationale": "The text describes Healthcare.gov's initial launch as 'designed as a comprehensive platform... built over several years with extensive specifications — and it failed catastrophically on launch day,' precisely mirroring Gall's Law's prediction for systems designed from scratch."}, {"text": "It proved that government projects are inherently more prone to failure than private sector ones.", "isCorrect": false, "rationale": "This is a generalization not supported by the text's explanation, which attributes the failure to a violation of Gall's Law, not the nature of government projects per se."}]}, {"question": "Beyond software engineering, in which other domains is Gall's Law explicitly stated to be a useful principle?", "options": [{"text": "Only in medical and bureaucratic systems, as per John Gall's original experience.", "isCorrect": false, "rationale": "While Gall's observations grew from these areas, the text explicitly states the law is useful in 'engineering, management, and institutional design' beyond just medical and bureaucratic systems."}, {"text": "In all scientific research, emphasizing the need for simple experiments.", "isCorrect": false, "rationale": "The text does not mention 'all scientific research' as a direct application domain for Gall's Law."}, {"text": "Engineering, management, and institutional design.", "isCorrect": true, "rationale": "The text states, 'This is Gall's Law, and it is one of the most useful and most frequently ignored principles in engineering, management, and institutional design.'"}, {"text": "Only in startup product development, due to the rapid iteration needs of new businesses.", "isCorrect": false, "rationale": "While applicable to startups, the text also broadens its scope to include large-scale systems and institutions like the Internet, Unix, and the U.S. Constitution, not just startups."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
