        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 18, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the central premise of Brooks's Law regarding project management?", "options": [{"text": "Small teams are inherently more efficient than large teams in all scenarios.", "isCorrect": false, "rationale": "Brooks's Law does not state that small teams are *always* more efficient, but rather highlights the detrimental effect of adding people to *late* projects, particularly those with interconnected tasks. The text acknowledges exceptions for perfectly partitionable tasks."}, {"text": "Adding manpower to a late software project makes it later.", "isCorrect": true, "rationale": "This is the direct quote and core statement of Brooks's Law, emphasizing the counterintuitive outcome of a common management instinct."}, {"text": "Communication overhead decreases exponentially with an increase in team size.", "isCorrect": false, "rationale": "The text explicitly states that communication overhead grows roughly with the square of team size, meaning it increases, not decreases."}, {"text": "Project deadlines should always be extended to accommodate any new hires.", "isCorrect": false, "rationale": "While extending deadlines might be a necessary project adjustment, it is not the central premise of Brooks's Law itself, which focuses on the impact of adding people to a late project."}], "id": "q01"}, {"question": "According to Brooks's Law, what is one immediate consequence of adding new team members to an already late project that contributes to further delays?", "options": [{"text": "The project budget will inevitably exceed its original allocation due to increased salaries.", "isCorrect": false, "rationale": "While increased salaries might be a budgetary consequence, the text focuses on direct impacts on productivity and time, not financial overrun as the *reason* for delay."}, {"text": "New members require existing experienced members to spend time training them, thereby diverting productivity.", "isCorrect": true, "rationale": "The text clearly states that new arrivals need to learn, and experienced members must take time away from their work to train them, slowing down the project further."}, {"text": "The original team members will become demotivated by the influx of newcomers, reducing their output.", "isCorrect": false, "rationale": "While team morale can be a factor in project success, the text does not list demotivation as a primary reason for Brooks's Law. It focuses on tangible time costs like training and communication."}, {"text": "The project's technological stack will need to be re-evaluated to suit the new skill sets.", "isCorrect": false, "rationale": "The text does not suggest that adding new team members necessitates a re-evaluation of the technology stack as a cause for delay under Brooks's Law."}], "id": "q02"}, {"question": "How does communication overhead typically scale with team size, according to Brooks's analysis?", "options": [{"text": "It grows linearly with team size, similar to productive capacity.", "isCorrect": false, "rationale": "The text states that productive capacity grows linearly (at best), but communication overhead grows at a much faster rate."}, {"text": "It grows roughly with the square of team size, while productive capacity grows linearly.", "isCorrect": true, "rationale": "The text explicitly uses the formula '4^2 = 6' (meaning 4 choose 2 pairs, which is 6) and states that communication overhead 'grows roughly with the square of team size,' contrasting it with linear productive capacity."}, {"text": "It decreases as team size increases, due to greater specialization and autonomy.", "isCorrect": false, "rationale": "This statement contradicts Brooks's analysis, which indicates communication overhead increases with team size."}, {"text": "It remains constant regardless of team size for efficiently managed teams.", "isCorrect": false, "rationale": "The text argues against this, showing how the number of communication paths inherently increases with team size, regardless of management efficiency."}], "id": "q03"}, {"question": "The 'mythical man-month' concept refers to the false assumption that:", "options": [{"text": "All project tasks are inherently sequential and cannot be parallelized.", "isCorrect": false, "rationale": "While some tasks are sequential, the 'mythical man-month' specifically addresses the misconception about parallelizing tasks that *cannot* be perfectly divided."}, {"text": "Software engineering is an art, not a science, making time estimation inherently impossible.", "isCorrect": false, "rationale": "The concept is about the divisibility of work and time, not about the nature of software engineering as an art or science."}, {"text": "Work and time are freely interchangeable, implying that adding people will proportionally reduce the time needed.", "isCorrect": true, "rationale": "The text defines the 'mythical man-month' as the 'false assumption that work and time are interchangeable: that a project requiring twelve man-months can be completed in one month by twelve people.'"}, {"text": "Complex projects require a minimum threshold of personnel to achieve success.", "isCorrect": false, "rationale": "The concept doesn't specify a minimum threshold but rather critiques the assumption that more people always means faster completion for complex tasks."}], "id": "q04"}, {"question": "A construction project is significantly behind schedule because the electrical wiring phase, which must follow the framing, is taking longer than expected. To accelerate, the manager decides to double the number of electricians. Based on Brooks's Law, what is the likely outcome?", "options": [{"text": "The project will catch up rapidly as more hands are available for wiring.", "isCorrect": false, "rationale": "This scenario involves sequential tasks ('wiring must follow framing') and potential crowding, making it unlikely to accelerate rapidly according to Brooks's Law."}, {"text": "The additional electricians will complete the wiring in exactly half the time.", "isCorrect": false, "rationale": "Wiring is an example of a task with an inherent sequential structure and interdependencies. Doubling personnel for such a task typically does not halve the time, due to indivisibility and coordination issues."}, {"text": "The project will likely experience further delays due to crowding, interference, and increased coordination needs.", "isCorrect": true, "rationale": "The text explicitly uses construction (wiring must follow framing) as a 'real-world' example where 'crowding and interference, not acceleration,' are the outcomes when adding workers to sequential tasks."}, {"text": "The quality of the electrical work will significantly improve with more focused attention.", "isCorrect": false, "rationale": "Brooks's Law focuses on project timeline and productivity impacts, not necessarily a direct improvement or degradation of quality as the primary outcome of adding people to a late project."}], "id": "q05"}, {"question": "Which of the following scenarios would be an exception where adding more people *might* effectively accelerate a project, according to the text?", "options": [{"text": "A team of developers debugging a highly interconnected, monolithic codebase under a tight deadline.", "isCorrect": false, "rationale": "This scenario involves complex, interconnected software, which is precisely where Brooks's Law is most applicable and adding people would likely worsen delays."}, {"text": "A group of academics collaboratively writing a research paper with frequent revision loops.", "isCorrect": false, "rationale": "The text cites 'academic collaboration' as an example where 'coordination, revision loops, and style reconciliation often make collaborative writing slower per person than solo writing,' reinforcing Brooks's Law."}, {"text": "A factory assembly line where each worker performs an independent, identical step in parallel.", "isCorrect": true, "rationale": "The text acknowledges an exception for 'perfectly partitionable' tasks, such as 'harvesting a wheat field' where 'each person can work on an independent piece with no need for coordination,' and production scales linearly. An assembly line with independent, identical steps fits this description."}, {"text": "A project where new hires are brought in to redesign the core architecture while existing members maintain it.", "isCorrect": false, "rationale": "Even with separate tasks, core architecture redesign and existing maintenance likely involve significant interdependencies, communication, and learning curves, making it susceptible to Brooks's Law."}], "id": "q06"}, {"question": "Which of the following is NOT presented in the text as a primary reason why adding manpower to a late project makes it later?", "options": [{"text": "The need to train new team members, diverting existing resources.", "isCorrect": false, "rationale": "This is one of the explicit reasons given in the text: 'The people who can least afford to stop working are pulled away to bring newcomers up to speed.'"}, {"text": "An exponential increase in communication overhead with larger teams.", "isCorrect": false, "rationale": "The text states 'communication overhead grows roughly with the square of team size,' which is a key reason for delays."}, {"text": "The inherent indivisibility or sequential nature of certain tasks.", "isCorrect": false, "rationale": "The text highlights this with the 'nine women cannot have a baby in one month' analogy and the 'mythical man-month' concept."}, {"text": "Increased employee turnover due to stress from tighter deadlines.", "isCorrect": true, "rationale": "While stress and turnover can impact projects, the provided text does not explicitly list 'increased employee turnover' as a primary mechanism or reason for Brooks's Law's effect of making a late project later."}], "id": "q07"}, {"question": "Brooks's Law is most acutely applicable under which set of conditions for a project?", "options": [{"text": "The project is in its early planning stages and has a flexible timeline.", "isCorrect": false, "rationale": "Brooks's Law specifically addresses *late* projects, where deadlines are near and flexibility is limited."}, {"text": "The project tasks are perfectly partitionable, allowing independent work with minimal coordination.", "isCorrect": false, "rationale": "The text identifies 'perfectly partitionable' tasks as an exception where Brooks's Law does *not* apply."}, {"text": "The project is behind schedule, and the remaining work is tightly interconnected with a near deadline.", "isCorrect": true, "rationale": "The text states, 'It means that adding people to a late project — when the remaining work is tightly interconnected and the deadline is near — typically makes things worse.'"}, {"text": "The project involves a small, highly specialized team working on a new innovation without external dependencies.", "isCorrect": false, "rationale": "While small teams might be effective, the core applicability of Brooks's Law depends on the project being *late* and having *interconnected* tasks, not just team size or innovation focus."}], "id": "q08"}, {"question": "Fred Brooks's insights articulated in 'The Mythical Man-Month' were primarily drawn from his experience managing which significant software project?", "options": [{"text": "The development of Microsoft Windows 95.", "isCorrect": false, "rationale": "Windows 95 was developed much later than the period Brooks describes and by a different company."}, {"text": "The creation of Apple's Macintosh operating system.", "isCorrect": false, "rationale": "The Macintosh OS was developed by Apple in the 1980s, well after Brooks's foundational work."}, {"text": "IBM's OS/360, one of the largest software projects of its era.", "isCorrect": true, "rationale": "The text explicitly states that Brooks's book is 'Based on Brooks's experience managing the development of IBM's OS/360, one of the largest software projects of its era.'"}, {"text": "The Apollo guidance computer software for NASA.", "isCorrect": false, "rationale": "While a monumental software project of its time, this was not the project managed by Fred Brooks that led to 'The Mythical Man-Month.'"}], "id": "q09"}, {"question": "Based on Brooks's Law, what is a crucial insight for a project manager whose complex software project is falling behind schedule?", "options": [{"text": "The immediate solution is always to increase the team size to distribute the workload more evenly.", "isCorrect": false, "rationale": "This is precisely the 'instinct' that Brooks's Law warns against, stating it will make the project later."}, {"text": "Focus on identifying and delegating perfectly partitionable tasks to new hires, as these tasks can scale linearly.", "isCorrect": false, "rationale": "While this is an exception, the text notes that 'most knowledge work is not perfectly partitionable,' meaning this strategy is often not broadly applicable for complex, late projects."}, {"text": "Recognize that for highly interconnected work, adding more people close to the deadline is likely to worsen delays.", "isCorrect": true, "rationale": "This is the core practical implication of Brooks's Law for project managers, acknowledging the costs of integration, communication, and indivisible tasks for late, complex projects."}, {"text": "Implement stricter monitoring and longer working hours for the existing team to force acceleration.", "isCorrect": false, "rationale": "This response describes a different management strategy not directly derived from or supported by the principles of Brooks's Law regarding team scaling."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
