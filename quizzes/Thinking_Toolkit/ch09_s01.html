<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Plato's Allegory of the Cave, what constitutes the entirety of reality for the prisoners who have been chained since birth?", "options": [{"text": "The people carrying objects behind them.", "isCorrect": false, "rationale": "The prisoners face a blank wall and have never seen the people carrying objects directly; only the shadows these objects cast."}, {"text": "The real objects, figures, and statues casting shadows.", "isCorrect": false, "rationale": "The prisoners only perceive the shadows, not the actual objects themselves, which are behind them."}, {"text": "The shadows projected onto the wall by a fire.", "isCorrect": true, "rationale": "The text explicitly states: 'The shadows are, for them, the entirety of reality. They give names to the shadows.'"}, {"text": "The fire burning behind them.", "isCorrect": false, "rationale": "The fire is the source of light for the shadows, but the prisoners do not perceive the fire itself as their reality; they perceive its effect."}], "id": "q01"}, {"question": "According to the allegory's interpretation, what do the 'chains' binding the prisoners primarily symbolize?", "options": [{"text": "Literal physical constraints preventing movement.", "isCorrect": false, "rationale": "The text clarifies that 'The chains are not literal'."}, {"text": "External societal laws and political restrictions.", "isCorrect": false, "rationale": "While society plays a role in forming assumptions, the text focuses on internal intellectual barriers rather than strictly external laws."}, {"text": "Habits of thought, unexamined assumptions, and inherited cultural opinions.", "isCorrect": true, "rationale": "The text states the chains are 'habits of thought, unexamined assumptions, the inherited opinions of our culture that we mistake for truth'."}, {"text": "The limitations of human sensory perception.", "isCorrect": false, "rationale": "While sensory perception is limited, the allegory emphasizes the *intellectual* and *cultural* reasons for mistaking appearance for reality, not just the physical limits of senses."}], "id": "q02"}, {"question": "When the freed prisoner first emerges from the cave and encounters sunlight, what is their initial reaction and experience?", "options": [{"text": "Immediate joy and clarity, instantly understanding true reality.", "isCorrect": false, "rationale": "The text describes the experience as 'blinding and painful' and that 'He cannot see' at first."}, {"text": "Disorientation, pain, and an inability to see clearly.", "isCorrect": true, "rationale": "The text states, 'At first, the sunlight is blinding and painful. He cannot see. Gradually, his eyes adjust.'"}, {"text": "A longing to return to the comfortable darkness of the cave.", "isCorrect": false, "rationale": "While disoriented, the text doesn't explicitly state an immediate longing to return at this stage, but rather a painful adjustment leading to new understanding."}, {"text": "An immediate urge to explain the truth to the other prisoners.", "isCorrect": false, "rationale": "This urge comes later, after the prisoner has adjusted and understood the new reality."}], "id": "q03"}, {"question": "Plato's central metaphysical claim, as revealed through the allegory, concerns the relationship between appearance and reality. What does it state about the physical world we perceive?", "options": [{"text": "The physical world is the ultimate and only true reality.", "isCorrect": false, "rationale": "Plato's claim is the opposite; the physical world is not the ultimate reality."}, {"text": "The physical world is a higher reality accessible through senses alone.", "isCorrect": false, "rationale": "The text states the physical world is a 'shadow' of a higher reality (Forms) accessed through 'reason'."}, {"text": "The physical world is an imperfect representation or 'shadow' of a higher reality (the Forms) accessible through reason.", "isCorrect": true, "rationale": "This directly matches the text: 'The physical world we perceive through our senses is a shadow of a higher reality (the Forms) that we can only access through reason.'"}, {"text": "The physical world is a random illusion with no underlying cause.", "isCorrect": false, "rationale": "The shadows are 'not random — they are caused by real objects,' indicating a systematic, albeit imperfect, relationship."}], "id": "q04"}, {"question": "What is the primary reason the freed prisoner faces ridicule and hostility upon returning to the cave?", "options": [{"text": "He tries to physically unchain the other prisoners, causing them pain.", "isCorrect": false, "rationale": "The resistance is intellectual and social, not based on physical coercion from the returned prisoner."}, {"text": "He has forgotten how to navigate the shadow-world the prisoners have mastered.", "isCorrect": true, "rationale": "The text states: 'His inability to navigate the shadow-world they have mastered proves, in their eyes, that the journey outside was worthless — or worse, dangerous.'"}, {"text": "The other prisoners are envious of his newfound freedom.", "isCorrect": false, "rationale": "Their reaction is described as mockery and hostility because they perceive his journey as having 'ruined' his eyes and his ability to function in their world."}, {"text": "He immediately tries to assert intellectual superiority over them.", "isCorrect": false, "rationale": "While he brings new knowledge, the text emphasizes their reaction to his perceived incompetence in their world, not his direct assertion of superiority."}], "id": "q05"}, {"question": "The allegory of the cave suggests that 'genuine education is painful, requiring us to abandon comfortable illusions.' Which aspect of the allegory most directly supports this idea?", "options": [{"text": "The prisoners' initial comfort and mastery of predicting shadows.", "isCorrect": false, "rationale": "This illustrates the 'comfortable illusions,' but not the 'painful' process of abandoning them."}, {"text": "The freed prisoner's initial blindness and pain when exposed to sunlight.", "isCorrect": true, "rationale": "This directly represents the 'painful process' of confronting a new reality after abandoning the 'comfortable ignorance' of the cave."}, {"text": "The eventual ability of the freed prisoner to see the sun clearly.", "isCorrect": false, "rationale": "This represents the *outcome* of education, not the painful *process* itself."}, {"text": "The hostility faced by the freed prisoner upon returning to the cave.", "isCorrect": false, "rationale": "This represents the 'social cost of truth,' a consequence of education, rather than the internal pain of learning itself."}], "id": "q06"}, {"question": "Which of the following figures served as Plato's teacher, and later, through the allegory, symbolized the fate of those who challenge societal assumptions?", "options": [{"text": "Aristotle", "isCorrect": false, "rationale": "Aristotle was Plato's student, not his teacher."}, {"text": "Homer", "isCorrect": false, "rationale": "Homer was an ancient Greek epic poet, not Plato's teacher mentioned here."}, {"text": "Socrates", "isCorrect": true, "rationale": "The text states, 'Socrates — Plato's teacher...was executed by Athens for the crime of making people uncomfortable with their own assumptions.'"}, {"text": "Pythagoras", "isCorrect": false, "rationale": "Pythagoras was an ancient Greek mathematician and philosopher, but not identified as Plato's teacher in the text."}], "id": "q07"}, {"question": "The 'realworld' section discusses whistleblowers who 'expose institutional corruption.' How does this situation parallel the Allegory of the Cave?", "options": [{"text": "Whistleblowers represent the chained prisoners, content with their established 'shadow-world'.", "isCorrect": false, "rationale": "Whistleblowers are the ones who 'see more clearly,' not those content with shadows."}, {"text": "The institution represents the 'sun,' illuminating the truth for everyone.", "isCorrect": false, "rationale": "The text states 'the institution would rather maintain its shadow-world than face the sunlight,' indicating it resists truth."}, {"text": "Whistleblowers are like the freed prisoner, revealing a deeper reality (corruption) that is met with resistance by those who prefer the established illusion.", "isCorrect": true, "rationale": "This directly connects to 'those who see more clearly often face hostility from those who prefer the familiar darkness,' and 'the institution would rather maintain its shadow-world than face the sunlight.'"}, {"text": "The corruption represents the 'Forms,' a higher, ideal reality.", "isCorrect": false, "rationale": "Corruption is a negative 'shadow-world' that needs to be exposed, not a 'Form' which represents a higher, unchanging reality."}], "id": "q08"}, {"question": "Which statement best captures the allegory's overarching message about 'seeing things as they are'?", "options": [{"text": "It is an intuitive and universally welcomed process that leads to immediate societal improvement.", "isCorrect": false, "rationale": "The allegory emphasizes the 'difficulty and danger' and 'social cost' of seeing clearly, contradicting an intuitive and welcomed process."}, {"text": "It requires abandoning comfortable illusions, can be painful, and often leads to social ridicule or hostility from those who prefer ignorance.", "isCorrect": true, "rationale": "This synthesizes the three key ideas: 'abandon comfortable illusions' (education), 'painful' (education), and 'face hostility' (social cost of truth)."}, {"text": "It is primarily a personal, solitary journey with no significant societal implications.", "isCorrect": false, "rationale": "The allegory explicitly addresses the 'social cost of truth' and the hostility upon return, indicating significant societal implications."}, {"text": "It is about demonstrating intellectual superiority over others who are less enlightened.", "isCorrect": false, "rationale": "The text explicitly states: 'The allegory is not about being smarter than others. It is about the difficulty and danger of seeing things as they are.'"}], "id": "q09"}, {"question": "Given Plato's theory of Forms, what does the 'sun' in the allegory ultimately represent to the freed prisoner?", "options": [{"text": "The physical source of all light in the cave.", "isCorrect": false, "rationale": "While it is a source of light, its ultimate symbolic meaning is deeper than just physical light."}, {"text": "The highest form of knowledge and the source of all truth and visibility in the intelligible world.", "isCorrect": true, "rationale": "The text states the prisoner 'understands it as the source of all light and visibility' after seeing 'real objects' and understanding shadows as projections of a deeper reality. In Plato's philosophy, the sun often symbolizes the Form of the Good, the ultimate source of all knowledge and being."}, {"text": "A painful but temporary obstacle to achieving clarity.", "isCorrect": false, "rationale": "It's initially painful, but ultimately becomes the source of profound understanding, not just a temporary obstacle."}, {"text": "The ideal political state or republic that Plato envisioned.", "isCorrect": false, "rationale": "While the allegory is in The Republic, the sun itself symbolizes a metaphysical truth about knowledge and reality, not directly a political state."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
