        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the core principle of Chesterton's Fence?", "options": [{"text": "All existing traditions and institutions should be preserved, as they are inherently valuable.", "isCorrect": false, "rationale": "The text explicitly states this is not an argument against change, but against ignorant change. It does not advocate for preserving everything unconditionally."}, {"text": "Before removing any established rule, tradition, or institution, one must first understand its original purpose.", "isCorrect": true, "rationale": "This option directly states the central argument of Chesterton's Fence: understand the 'why' before acting, to avoid unintended negative consequences."}, {"text": "If a rule or institution's purpose is not immediately obvious, it should be removed to reduce bureaucracy.", "isCorrect": false, "rationale": "This is precisely the 'wrong response' that Chesterton argues against. The lack of an obvious reason does not equate to a lack of purpose."}, {"text": "Change should always be implemented rapidly to avoid stagnation and embrace innovation.", "isCorrect": false, "rationale": "The principle emphasizes careful consideration and understanding before change, contrasting with hasty or rapid implementation without due diligence."}]}, {"question": "According to the text, what is the primary danger of removing a 'fence' without understanding its purpose?", "options": [{"text": "It implies a lack of respect for past generations.", "isCorrect": false, "rationale": "While related to intellectual humility, the text focuses more on the practical, detrimental consequences of the action rather than just the implication of disrespect."}, {"text": "The original problem the 'fence' solved may re-emerge, leading to unforeseen negative consequences.", "isCorrect": true, "rationale": "The text emphasizes that a fence 'may be solving a problem that only becomes visible when the fence is gone,' as illustrated by the QA department and financial deregulation examples."}, {"text": "It discourages future generations from creating new rules or institutions.", "isCorrect": false, "rationale": "The text does not discuss this potential outcome. Its focus is on the immediate risks of ignorant removal rather than long-term impacts on institutional creation."}, {"text": "It invariably leads to a more complex system than the one it replaced.", "isCorrect": false, "rationale": "The text highlights the re-emergence of problems and associated costs, not necessarily that the resulting system will be more complex."}]}, {"question": "Which of the following scenarios best exemplifies a failure to apply Chesterton's Fence principle?", "options": [{"text": "A city council conducts a detailed historical review of an old zoning law before deciding to update it to reflect current needs.", "isCorrect": false, "rationale": "This action aligns with Chesterton's principle because the council is 'doing the work of understanding first' before making a judgment about removal or reform."}, {"text": "A software company analyzes user feedback and past bug reports before redesigning a legacy feature that users find confusing.", "isCorrect": false, "rationale": "This scenario demonstrates understanding the problem and context (user feedback, bug reports) before making changes, consistent with the principle."}, {"text": "A school eliminates a mandatory club activity because student participation has been low, without investigating why it was initially required.", "isCorrect": true, "rationale": "This represents an 'ignorant change' where a practice is removed based on superficial observation (low participation) without understanding its original purpose, which might still be valid or address an unseen need."}, {"text": "A national park service studies the ecological impact of a hiking trail for several years before implementing new access restrictions.", "isCorrect": false, "rationale": "This action demonstrates a thorough understanding of the situation and potential consequences before implementing a change, aligning with the principle's intent."}]}, {"question": "The text states that Chesterton's Fence 'is not an argument against change. It is an argument against ignorant change.' What does 'ignorant change' refer to in this context?", "options": [{"text": "Change proposed by individuals who lack formal education.", "isCorrect": false, "rationale": "The term 'ignorant' here refers to a lack of understanding regarding the specific context or purpose of the 'fence,' not a general lack of education or intelligence."}, {"text": "Any change to a long-standing tradition or institution, regardless of its justification.", "isCorrect": false, "rationale": "The principle explicitly allows for change if the original reasons no longer apply or if the situation has genuinely changed, making the reform informed rather than ignorant."}, {"text": "Reforming something without first understanding why it was originally put in place.", "isCorrect": true, "rationale": "This definition aligns perfectly with the text's explanation of 'ignorant change' – making alterations or removals without knowing the original purpose or the problem it was designed to solve."}, {"text": "Change that is universally unpopular or goes against public opinion.", "isCorrect": false, "rationale": "The principle is about the process of understanding before action, not about the popularity or public reception of a change."}]}, {"question": "Which of the following would NOT typically be considered a 'fence' in the broader application of Chesterton's principle?", "options": [{"text": "A company's mandatory annual performance review process.", "isCorrect": false, "rationale": "This is an 'institutional practice' and could be a 'fence' if its original purpose for improvement or accountability is forgotten and it's seen as mere bureaucracy."}, {"text": "A country's constitutional amendment regarding freedom of speech.", "isCorrect": false, "rationale": "This is a 'law' or 'regulation' and could be a 'fence' if its underlying historical reasons for establishment are overlooked in discussions about its scope or interpretation."}, {"text": "A specific piece of software code written by an individual developer for personal use.", "isCorrect": true, "rationale": "While the principle can apply broadly, it is typically discussed in the context of laws, regulations, traditions, and institutional practices that serve a collective purpose and might be removed by someone other than the originator. A personal piece of code doesn't fit the collective 'fence' analogy as directly."}, {"text": "A cultural custom requiring specific etiquette during meals.", "isCorrect": false, "rationale": "This is a 'tradition' and directly fits the broad application of 'Chesterton's Fence,' where the etiquette might have an underlying social or practical purpose that has been forgotten."}]}, {"question": "The example of financial deregulation leading to the 2008 crisis highlights what key aspect of Chesterton's Fence?", "options": [{"text": "The difficulty of removing fences once they have been in place for a long time.", "isCorrect": false, "rationale": "The text shows the rules *were* removed, implying it wasn't difficult to remove them, but rather that the removal was ill-advised due to forgotten reasons."}, {"text": "How easily the original reasons for 'fences' can be forgotten over time.", "isCorrect": true, "rationale": "The text states the rules 'seemed outdated — relics of a crisis that happened seventy years ago' and that 'the original reasons for those rules had not disappeared; they had merely been forgotten,' leading to the 2008 crisis."}, {"text": "The importance of having expert committees review all proposed regulatory changes.", "isCorrect": false, "rationale": "While expert review might be a good practice, the example specifically focuses on the *forgetting* of the original reasons, not the process of review itself."}, {"text": "That financial regulations are generally ineffective in preventing crises.", "isCorrect": false, "rationale": "The example suggests the regulations *were* effective but their removal allowed the problems they prevented to resurface, indicating their effectiveness was proven by their absence."}]}, {"question": "What is identified as the 'deepest lesson' of Chesterton's Fence?", "options": [{"text": "The importance of historical preservation.", "isCorrect": false, "rationale": "While understanding history is part of the principle, the deepest lesson goes beyond mere preservation to a mindset of intellectual engagement."}, {"text": "The necessity of continuous, proactive reform in all societal systems.", "isCorrect": false, "rationale": "The principle argues against *ignorant* reform and promotes understanding *before* reform, not constant proactive change."}, {"text": "The value of intellectual humility and considering the wisdom of past decisions.", "isCorrect": true, "rationale": "The text explicitly states: 'The deepest lesson of Chesterton's Fence is about intellectual humility. It asks you to consider the possibility that the people who came before you were not stupid.'"}, {"text": "The inherent complexity of modern legal and institutional frameworks.", "isCorrect": false, "rationale": "While frameworks can be complex, the 'deepest lesson' is about the approach to understanding them, not merely their complexity."}]}, {"question": "According to the 'keyconcept' box, what is the crucial distinction between acceptable reform and 'ignorant reform' in the context of Chesterton's Fence?", "options": [{"text": "Acceptable reform is always driven by economic efficiency, while ignorant reform ignores costs.", "isCorrect": false, "rationale": "The text does not specify economic efficiency as the sole or primary driver of acceptable reform. It highlights understanding as the key."}, {"text": "Acceptable reform seeks to completely dismantle old systems, whereas ignorant reform makes minor adjustments.", "isCorrect": false, "rationale": "The scale of reform is not the differentiator; rather, it's the underlying knowledge or lack thereof."}, {"text": "Acceptable reform is based on understanding the original purpose of a 'fence,' while ignorant reform lacks this foundational understanding.", "isCorrect": true, "rationale": "The keyconcept box directly states, 'Before removing a law, tradition, rule, or institution, first understand why it was created... This is not an argument against reform — it is an argument against ignorant reform.'"}, {"text": "Acceptable reform is initiated by recognized experts, while ignorant reform comes from laypersons.", "isCorrect": false, "rationale": "The text does not define 'ignorant' based on who proposes the change, but rather on whether the original purpose is understood by whoever is proposing it."}]}, {"question": "The 'personbox' about G. K. Chesterton notes that his 'Fence' principle appeals to both 'conservative and reformist thought alike.' Why is this surprising, and what does it suggest about the principle?", "options": [{"text": "It's surprising because conservatives typically oppose all change, and reformers always advocate for it, suggesting the principle is often misinterpreted.", "isCorrect": false, "rationale": "This mischaracterizes both conservative and reformist thought and misinterprets the principle. Conservatives value tradition but aren't against all change, and reformers aren't always for reckless change."}, {"text": "It's surprising because these camps usually have opposing views on change, suggesting the principle's strength lies in its demand for intellectual rigor before action.", "isCorrect": true, "rationale": "This option captures the essence: conservatives often prioritize existing structures, and reformers seek improvement. The common ground is the shared demand for a *rigorous understanding* of the 'why' before any action, appealing to both by promoting thoughtful engagement."}, {"text": "It's surprising because Chesterton himself was a staunch conservative, so his ideas typically only resonate with conservatives.", "isCorrect": false, "rationale": "While Chesterton had specific leanings, the text highlights the unusual breadth of appeal of this *specific* principle, implying it transcends strict ideological boundaries."}, {"text": "It's surprising because reformers are only interested in progress, not in historical context, so the principle must be seen as anti-progress.", "isCorrect": false, "rationale": "Reformers are interested in effective progress, which often benefits from understanding historical context. The principle is not anti-progress but anti-'ignorant' progress."}]}, {"question": "Drawing on the 'Think About It' section, if you identify a rule at your workplace that seems pointless, how should you approach deciding whether it should be removed?", "options": [{"text": "Immediately propose its removal, as its apparent pointlessness indicates it's hindering efficiency.", "isCorrect": false, "rationale": "This would be an 'ignorant change' as described in the text, acting without understanding the original purpose or potential hidden problem."}, {"text": "Circulate a petition to gather support for its removal, then present it to management.", "isCorrect": false, "rationale": "While gathering support might be part of a reform process, the 'Think About It' section emphasizes understanding the *reason* for the rule *before* deciding on removal, not just popular opinion."}, {"text": "First, investigate to understand why the rule was originally created and if the original problem still exists.", "isCorrect": true, "rationale": "This directly applies the 'Think About It' guidance and the core principle of Chesterton's Fence: understand the 'why' and assess current relevance before making a judgment about removal."}, {"text": "Assume the rule is indeed outdated and bypass it whenever possible, without officially challenging it.", "isCorrect": false, "rationale": "This approach avoids direct action but still fails to engage with the principle of understanding the rule's purpose, potentially leading to unseen negative impacts or missed opportunities for informed change."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
