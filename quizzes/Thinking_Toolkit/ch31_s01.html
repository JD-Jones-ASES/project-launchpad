        <h2>Results</h2>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the Eisenhower Matrix?", "options": [{"text": "To manage a team's daily workflow effectively.", "isCorrect": false, "rationale": "While the matrix can indirectly influence team workflow, its primary purpose is individual or organizational task prioritization based on urgency and importance, not solely team management."}, {"text": "To prioritize tasks based on their urgency and importance.", "isCorrect": true, "rationale": "The text explicitly states the Eisenhower Matrix is a 'two-by-two grid that sorts every task into one of four quadrants based on two questions: Is it urgent? Is it important?' making prioritization its core function."}, {"text": "To identify tasks that can be delegated to others.", "isCorrect": false, "rationale": "Delegation might be a strategy for some Quadrant 3 tasks, but it's not the overarching primary purpose of the matrix itself, which is classification and prioritization."}, {"text": "To track completed tasks and measure productivity.", "isCorrect": false, "rationale": "The Eisenhower Matrix is a decision-making and prioritization tool, not a system for tracking task completion or measuring productivity metrics."}]}, {"question": "Which of the following tasks best exemplifies an activity belonging to Quadrant 1 of the Eisenhower Matrix?", "options": [{"text": "Developing a five-year strategic business plan.", "isCorrect": false, "rationale": "Strategic planning is important but not usually urgent on a daily basis, making it a Quadrant 2 activity."}, {"text": "Responding to a critical system outage impacting all customers.", "isCorrect": true, "rationale": "A critical system outage is a crisis that demands immediate attention and is highly important, fitting the description of Quadrant 1 tasks like 'crises, hard deadlines, and emergencies' that 'you handle immediately.'"}, {"text": "Sorting through accumulated unread emails.", "isCorrect": false, "rationale": "Most emails are considered Quadrant 3 (urgent but not important) or potentially Quadrant 4 (neither urgent nor important) if they are just busy work, not Quadrant 1 crises."}, {"text": "Engaging in daily meditation for stress reduction.", "isCorrect": false, "rationale": "Daily meditation is important for long-term well-being but not typically urgent, placing it in Quadrant 2."}]}, {"question": "According to the Eisenhower Matrix, where does 'the most valuable work' typically reside, and why is it often neglected?", "options": [{"text": "Quadrant 1: Urgent and Important, because its immediate demands ensure it gets done.", "isCorrect": false, "rationale": "Quadrant 1 contains crises, which are important, but 'most valuable work' refers to proactive, long-term activities that prevent crises, not the crises themselves."}, {"text": "Quadrant 2: Important but Not Urgent, because it lacks a forcing function and is easy to postpone.", "isCorrect": true, "rationale": "The text states, 'This is where the most valuable work lives' and notes that 'Because it lacks the forcing function of a deadline, it is perpetually postponed.'"}, {"text": "Quadrant 3: Urgent but Not Important, because its perceived urgency creates a sense of accomplishment.", "isCorrect": false, "rationale": "Quadrant 3 tasks are often interruptions that 'do not actually advance your goals,' and their 'urgency creates a false sense of importance,' making them not the 'most valuable work.'"}, {"text": "Quadrant 4: Neither Urgent Nor Important, because it provides a necessary relief valve from other tasks.", "isCorrect": false, "rationale": "Quadrant 4 tasks are 'time-wasters' that are 'regrettable in the aggregate,' clearly not representing the 'most valuable work.'"}]}, {"question": "A marketing manager receives numerous phone calls throughout the day that feel pressing but often involve minor issues or requests that could be handled later or by others. In which quadrant of the Eisenhower Matrix do these activities primarily fall?", "options": [{"text": "Quadrant 1: Urgent and Important.", "isCorrect": false, "rationale": "These calls are described as 'minor issues' that 'could be handled later or by others,' indicating they are not critical crises or 'important' in the long-term sense of Quadrant 1."}, {"text": "Quadrant 2: Important but Not Urgent.", "isCorrect": false, "rationale": "These are not examples of 'long-term planning, relationship-building, exercise, education,' or strategic work that defines Quadrant 2."}, {"text": "Quadrant 3: Urgent but Not Important.", "isCorrect": true, "rationale": "The text specifically lists 'Most phone calls' as an example of Quadrant 3 activities, which 'feel pressing but do not actually advance your goals' and where 'urgency creates a false sense of importance.'"}, {"text": "Quadrant 4: Neither Urgent Nor Important.", "isCorrect": false, "rationale": "While they may not be important, they are described as 'pressing' and have 'urgency,' distinguishing them from pure time-wasters in Quadrant 4."}]}, {"question": "A student spends several hours browsing social media feeds and watching non-educational videos instead of preparing for an upcoming project. Which quadrant best describes these activities?", "options": [{"text": "Quadrant 1: Urgent and Important.", "isCorrect": false, "rationale": "Browsing social media and watching non-educational videos are not crises or hard deadlines, nor are they inherently important for the project."}, {"text": "Quadrant 2: Important but Not Urgent.", "isCorrect": false, "rationale": "These activities do not contribute to long-term planning, education, or strategic thinking related to the project."}, {"text": "Quadrant 3: Urgent but Not Important.", "isCorrect": false, "rationale": "These activities lack inherent urgency; they are not interruptions that 'feel pressing' in the way a ringing phone might, even if they delay important work."}, {"text": "Quadrant 4: Neither Urgent Nor Important.", "isCorrect": true, "rationale": "The text defines Quadrant 4 as 'Time-wasters. Mindless scrolling, excessive television, busy work that accomplishes nothing.' This perfectly describes the student's activities in this scenario."}]}, {"question": "The text states that 'neglecting Quadrant 2 is exactly what generates the crises in Quadrant 1.' What is the main implication of this statement?", "options": [{"text": "Spending too much time in Quadrant 1 makes all other tasks feel less important.", "isCorrect": false, "rationale": "While a consequence of being in Q1, this doesn't capture the generative link between neglecting Q2 and the *creation* of Q1 crises."}, {"text": "Proactive planning and preventive measures (Quadrant 2) can reduce the number of emergencies and hard deadlines (Quadrant 1).", "isCorrect": true, "rationale": "This directly reflects the text's examples, such as 'The person who never exercises eventually has a health emergency' and 'The organization that never does strategic planning eventually faces a competitive crisis,' illustrating how proactive Q2 work prevents Q1 crises."}, {"text": "Urgent tasks always take precedence over important tasks, leading to perpetual firefighting.", "isCorrect": false, "rationale": "This describes a common pattern, but not the implication that neglecting Q2 *generates* Q1. It's about cause and effect, not just precedence."}, {"text": "Most people naturally gravitate towards Quadrant 3 because of its perceived immediate reward.", "isCorrect": false, "rationale": "This is an observation about human behavior, but not the direct implication of Q2 neglect generating Q1 crises."}]}, {"question": "What is the key practical discipline recommended by the Eisenhower Matrix to manage Quadrant 2 tasks effectively?", "options": [{"text": "Delegate all Quadrant 2 tasks to subordinates.", "isCorrect": false, "rationale": "While delegation can be part of time management, the text does not recommend delegating *all* Q2 tasks; many are personal or strategic and require individual engagement."}, {"text": "Schedule Quadrant 2 work deliberately and protect that time.", "isCorrect": true, "rationale": "The text explicitly states: 'The practical discipline is straightforward: schedule Quadrant 2 work deliberately. Do not wait for it to become urgent. Block time for it. Protect that time. Treat it as a non-negotiable appointment with your own future.'"}, {"text": "Wait for Quadrant 2 tasks to become urgent before acting on them.", "isCorrect": false, "rationale": "The text warns against this, stating 'Do not wait for it to become urgent' because doing so turns Q2 tasks into Q1 crises."}, {"text": "Address Quadrant 2 tasks only when all Quadrant 1 and 3 tasks are complete.", "isCorrect": false, "rationale": "This approach is precisely what leads to Q2 tasks being 'perpetually squeezed out' as Q1 and Q3 demands constantly arise."}]}, {"question": "The key concept 'Urgency Is Often the Enemy of Importance' suggests what about task prioritization?", "options": [{"text": "Tasks with immediate deadlines are inherently more valuable than long-term strategic work.", "isCorrect": false, "rationale": "This statement is contrary to the core insight of the Matrix, which posits that important but non-urgent (Q2) work is 'most valuable'."}, {"text": "The pressing nature of urgent tasks can lead to the postponement of truly important, but non-urgent, work.", "isCorrect": true, "rationale": "The text explains, 'Because it lacks the forcing function of a deadline, it is perpetually postponed in favor of tasks that are urgent but less important.' This captures how urgency 'attacks' importance."}, {"text": "All urgent tasks should be avoided as they rarely contribute to significant goals.", "isCorrect": false, "rationale": "Quadrant 1 tasks are both urgent and important and cannot be avoided. The concept refers to urgent *but less important* tasks overshadowing *important but not urgent* tasks."}, {"text": "Importance can only be determined once a task becomes urgent.", "isCorrect": false, "rationale": "Importance is an inherent quality of a task, related to one's goals, and exists independently of urgency. Waiting for urgency to determine importance is a reactive mistake."}]}, {"question": "An organizational leader constantly finds themselves 'putting out fires' and managing crises. Based on the 'Organizational leadership' real-world example, this situation is most likely a result of:", "options": [{"text": "Spending too much time in Quadrant 4, leading to chaos.", "isCorrect": false, "rationale": "While Quadrant 4 is unproductive, it typically leads to lack of progress rather than directly generating crises for a leader in the way neglecting strategic work does."}, {"text": "Neglecting Quadrant 2 activities like strategic planning and prevention.", "isCorrect": true, "rationale": "The text states, 'Leaders who spend all their time in Quadrant 1 (crisis management) are usually there because they neglected Quadrant 2 (prevention, planning, training).'"}, {"text": "Over-delegating important tasks to less experienced staff.", "isCorrect": false, "rationale": "The text does not mention over-delegation as a primary cause for a leader being stuck in Quadrant 1 firefighting."}, {"text": "Focusing excessively on Quadrant 3 tasks that appear urgent but are not important.", "isCorrect": false, "rationale": "While excessive Q3 can make a leader busy, the text specifically links Q2 neglect to the generation of Q1 crises, not Q3 focus."}]}, {"question": "If an individual 'spends their lives bouncing between Quadrant 1 (putting out fires) and Quadrant 3 (responding to interruptions), with Quadrant 4 as a relief valve,' what is the ultimate consequence regarding Quadrant 2?", "options": [{"text": "Quadrant 2 work becomes automatically integrated into daily routines due to necessity.", "isCorrect": false, "rationale": "The opposite is true; without deliberate scheduling, Q2 work does not automatically integrate but rather gets pushed aside."}, {"text": "The number of Quadrant 1 crises and Quadrant 3 interruptions will naturally decrease over time.", "isCorrect": false, "rationale": "Neglecting Q2 activities, which often involve prevention and planning, will lead to an *increase* in Q1 crises, not a decrease."}, {"text": "Quadrant 2—the important-but-not-urgent work—gets perpetually squeezed out, preventing long-term progress.", "isCorrect": true, "rationale": "The text explicitly states: 'Quadrant 2—the important-but-not-urgent work—gets perpetually squeezed out, even though it is the quadrant that would, over time, reduce the number of fires to fight and interruptions to manage.'"}, {"text": "This pattern ensures maximum productivity and efficiency by addressing immediate demands.", "isCorrect": false, "rationale": "This pattern describes a reactive and often inefficient way of working, leading to constant firefighting rather than proactive progress and effectiveness."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
