<script>
var QUESTIONS = [{"question": "The term \"fundamental attribution error\" (FAE) is also known as the \"correspondence bias.\" What is the core tendency described by these terms?", "options": [{"text": "The tendency to attribute our own successes to internal factors and our failures to external factors.", "isCorrect": false, "rationale": "This describes the self-serving bias, which is related to, but distinct from, the fundamental attribution error."}, {"text": "The tendency to assume that another person's behavior directly reflects their stable underlying character rather than situational pressures.", "isCorrect": true, "rationale": "The text defines FAE as 'the tendency to assume that behavior corresponds to an underlying disposition rather than reflecting situational pressures,' which accurately describes this option."}, {"text": "The tendency to overemphasize situational factors when explaining the behavior of others, especially when their behavior is negative.", "isCorrect": false, "rationale": "This is the opposite of the fundamental attribution error, which involves *underweighting* situational factors for others."}, {"text": "The tendency to attribute all human behavior to immutable genetic predispositions, ignoring environmental influences.", "isCorrect": false, "rationale": "While FAE emphasizes internal traits, it's not exclusively about genetics, and it specifically contrasts with situational factors rather than all environmental influences."}]}, {"question": "A student consistently performs poorly on exams. According to the fundamental attribution error, how would a peer most likely explain this student's performance, compared to how the student might explain their own poor performance?", "options": [{"text": "The peer would attribute it to the student's lack of effort, while the student would attribute it to their low intelligence.", "isCorrect": false, "rationale": "Both explanations here are internal to the student (character/disposition), failing to capture the asymmetry of FAE where one attributes external circumstances to oneself."}, {"text": "The peer would attribute it to the student's difficult home life, while the student would attribute it to their personal laziness.", "isCorrect": false, "rationale": "This option reverses the typical FAE asymmetry: the peer attributes an external situation, and the student attributes an internal character flaw."}, {"text": "The peer would attribute it to the student being unintelligent or lazy, while the student would attribute it to the exams being too hard or personal stress.", "isCorrect": true, "rationale": "This scenario perfectly illustrates the FAE asymmetry: the peer makes a character judgment ('unintelligent,' 'lazy') for others' bad behavior, while the student cites external circumstances ('exams too hard,' 'personal stress') for their own."}, {"text": "Both the peer and the student would attribute the poor performance to the professor's ineffective teaching methods.", "isCorrect": false, "rationale": "This option suggests a shared situational attribution, which means the fundamental attribution error is not occurring in this interaction."}]}, {"question": "Lee Ross referred to this bias as \"fundamental\" primarily because:", "options": [{"text": "It is considered the earliest cognitive bias to develop in human psychology, foundational to all others.", "isCorrect": false, "rationale": "The text does not state that FAE is the first bias to develop, nor is that the reason for 'fundamental.'"}, {"text": "It is based on fundamental biological instincts for survival, predating social learning.", "isCorrect": false, "rationale": "While an 'evolutionary logic' is mentioned, the term 'fundamental' was used by Ross to refer to its pervasive and deeply embedded nature in Western thought, not its biological origins alone."}, {"text": "It is a pervasive and deeply embedded feature of how Western cultures typically explain human behavior, amounting to a basic feature of thought.", "isCorrect": true, "rationale": "The text explicitly states: 'The term “fundamental” was used by Lee Ross because he considered this bias to be so pervasive and so deeply embedded in Western thinking that it amounts to a basic feature of how we explain human behavior.'"}, {"text": "It applies to all fundamental human activities, from basic survival to complex social interactions.", "isCorrect": false, "rationale": "This is a broad interpretation that doesn't align with the specific reason given in the text for the use of 'fundamental' by Lee Ross."}]}, {"question": "The text suggests that social psychology research, including studies like Milgram's obedience experiments and Zimbardo's Stanford prison experiment, primarily demonstrates what about human behavior?", "options": [{"text": "That individual character traits are the ultimate and unchangeable determinants of human action.", "isCorrect": false, "rationale": "The text directly states these experiments demonstrated the *opposite*: 'situational forces are far more powerful than most people believe,' challenging the idea that character is the ultimate determinant."}, {"text": "That individuals are inherently predisposed to cruelty when given any form of power or authority.", "isCorrect": false, "rationale": "The text clarifies that these experiments show 'ordinary people will behave cruelly when assigned the role of prison guard,' emphasizing the *situational* influence on ordinary people, rather than inherent predisposition to cruelty."}, {"text": "That situational forces often have a far more powerful influence on human behavior than most people typically recognize.", "isCorrect": true, "rationale": "The text explicitly uses these experiments to show that 'situational forces are far more powerful than most people believe,' countering the 'trait theorist' default."}, {"text": "That authority figures consistently underestimate the potential for their subordinates to rebel.", "isCorrect": false, "rationale": "While rebellion might be a theme in some social psychology, it's not the primary takeaway from these specific experiments as presented in the text regarding situational power."}]}, {"question": "While the fundamental attribution error had an 'evolutionary logic' in a world of small groups, it is considered more problematic in the 'complex modern world' because:", "options": [{"text": "Modern societies have entirely eradicated the need for quick character judgments.", "isCorrect": false, "rationale": "The text implies the need still exists, but the *effectiveness* of quick character judgments is diminished in modern contexts."}, {"text": "People in modern societies are inherently more judgmental and less empathetic than those in past societies.", "isCorrect": false, "rationale": "The text does not suggest a change in inherent judgmental tendencies, but rather a mismatch between the bias's utility and the modern context."}, {"text": "Most people you encounter are strangers whose specific situations and contexts you know nothing about.", "isCorrect": true, "rationale": "The text explains: 'But in a complex modern world, where most people you encounter are strangers whose situations you know nothing about, the default to character attribution is more often wrong than right.'"}, {"text": "Human evolution has selected against the ability to quickly analyze complex situations, making us prone to oversimplification.", "isCorrect": false, "rationale": "The evolutionary logic described in the text actually refers to the *benefit* of quick categorization in past environments, not a selection against complex analysis ability."}]}, {"question": "According to the text, how does the fundamental attribution error 'poison collective judgment' regarding societal issues like poverty or addiction?", "options": [{"text": "It encourages a focus on systematic, structural solutions rather than individual blame for social problems.", "isCorrect": false, "rationale": "This describes the *opposite* effect; the FAE leads to blaming individuals, not focusing on structural solutions."}, {"text": "It leads people to develop greater empathy for those struggling, recognizing their difficult circumstances.", "isCorrect": false, "rationale": "The FAE makes us *less* empathetic by leading us to blame character, not to recognize difficult circumstances."}, {"text": "It leads to conclusions that struggling individuals are lazy, weak-willed, or stupid, thereby overlooking significant structural barriers and situational difficulties.", "isCorrect": true, "rationale": "The text states: 'When we see people struggling — in poverty, in addiction, in academic failure — the attribution error leads us to conclude that they are lazy, weak-willed, or stupid. The possibility that their situation is overwhelmingly difficult... rarely occurs to us spontaneously.'"}, {"text": "It promotes the idea that character flaws are easily correctable through minimal policy interventions.", "isCorrect": false, "rationale": "The text does not discuss this particular consequence; rather, it highlights the misattribution of problems to character instead of situation."}]}, {"question": "What specific corrective action does the text propose to mitigate the fundamental attribution error in everyday interactions?", "options": [{"text": "To always assume the best possible intentions from others, regardless of their observed behavior.", "isCorrect": false, "rationale": "While a positive approach, this is not the specific, analytic corrective suggested by the text."}, {"text": "To actively seek to categorize people based on their observable traits in order to predict future behavior more accurately.", "isCorrect": false, "rationale": "This is precisely what the FAE encourages as a default ('trait theorists'), not a corrective for it."}, {"text": "To ask, 'What situation might make a reasonable person behave this way?' before reaching for a character judgment.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'The corrective is to ask: “What situation might make a reasonable person behave this way?” before reaching for a character judgment.'"}, {"text": "To conduct thorough psychological assessments of individuals before forming any opinions about their actions.", "isCorrect": false, "rationale": "This is an impractical and overly formal approach for everyday interactions, not the quick mental shift suggested by the text."}]}, {"question": "A manager observes an employee consistently missing deadlines and thinks, \"This employee is irresponsible and lacks commitment.\" The text would identify this as an example of the fundamental attribution error because:", "options": [{"text": "The manager is failing to acknowledge the employee's internal motivations for completing tasks.", "isCorrect": false, "rationale": "The FAE isn't about failing to acknowledge internal motivations; it's about making an *incorrect* internal (character) attribution when external (situational) factors are at play."}, {"text": "The manager is attributing the behavior to the employee's character without adequately considering potential situational constraints or pressures.", "isCorrect": true, "rationale": "This directly aligns with the 'Workplace evaluations' real-world example, where the manager 'sees the lateness and infers a character flaw' while ignoring the employee's specific situation."}, {"text": "The manager is extending too much generosity of interpretation to the employee's poor performance.", "isCorrect": false, "rationale": "This is the opposite of what is happening; the manager is *denying* generosity of interpretation by blaming character instead of situation."}, {"text": "The manager is making a judgment based solely on their own past experiences rather than objective facts.", "isCorrect": false, "rationale": "While personal bias might play a role, the specific error described by FAE is the misattribution of cause (character vs. situation), not necessarily the source of the manager's data."}]}, {"question": "Cross-cultural research on the fundamental attribution error suggests that:", "options": [{"text": "The bias is entirely absent in collectivist cultures due to their emphasis on group harmony.", "isCorrect": false, "rationale": "The text states: 'This does not mean the bias is absent in collectivist cultures — just that its strength varies.'"}, {"text": "It is universally strong across all cultures, which justifies its original designation as 'fundamental.'", "isCorrect": false, "rationale": "The text notes: 'The name “fundamental” is arguably an overstatement' precisely because its strength varies across cultures."}, {"text": "It is generally stronger in individualistic cultures (like the United States) compared to collectivist cultures (like Japan or India).", "isCorrect": true, "rationale": "The 'note' section explicitly states: 'Cross-cultural research suggests that the fundamental attribution error is stronger in individualistic cultures (such as the United States) than in collectivist cultures (such as Japan or India).'"}, {"text": "Collectivist cultures are more prone to the error because they prioritize social roles over individual autonomy.", "isCorrect": false, "rationale": "Collectivist cultures are described as being 'more attuned to situational and relational explanations of behavior,' which would make them *less* prone to FAE."}]}, {"question": "The text states that 'We are, by default, trait theorists.' In the context of the fundamental attribution error, what does this statement imply about how people explain behavior?", "options": [{"text": "It means we tend to believe that our own personality traits are flexible and can easily change with different situations.", "isCorrect": false, "rationale": "Being a 'trait theorist' implies assuming stable internal dispositions, not flexibility."}, {"text": "It means we inherently assume that people's observed behavior primarily stems from their stable, internal dispositions or character traits.", "isCorrect": true, "rationale": "The text defines 'trait theorists' by saying 'we assume that behavior flows from stable internal dispositions. The quiet person is an introvert. The generous person is virtuous. The rude person is a bad person.'"}, {"text": "It suggests that we naturally seek out situations that perfectly match our existing personality traits to maintain consistency.", "isCorrect": false, "rationale": "While people might do this, it's not the meaning of 'trait theorist' as used in the text to describe the default explanation for behavior."}, {"text": "It implies that we prioritize the scientific study of character development over situational influences in psychology.", "isCorrect": false, "rationale": "This refers to a research priority, not the default way individuals intuitively explain everyday behavior."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
