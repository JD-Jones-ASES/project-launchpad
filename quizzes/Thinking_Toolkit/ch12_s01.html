    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of Rawls's \"veil of ignorance\" thought experiment?", "options": [{"text": "To design a perfectly egalitarian society where everyone is equal in all aspects.", "isCorrect": false, "rationale": "The veil aims for fairness and allows for some inequalities under the difference principle, not strict equality in all aspects."}, {"text": "To ensure that fundamental societal rules are chosen impartially, free from personal biases and self-interest.", "isCorrect": true, "rationale": "The text states the veil of ignorance is 'a device for ensuring impartiality' by stripping away knowledge of one's future position, thus preventing individuals from rigging rules in their own favor."}, {"text": "To test people's inherent tendency towards selfishness when given the power to create societal rules.", "isCorrect": false, "rationale": "The goal is to *remove* self-interest as a factor in decision-making, not to test its presence."}, {"text": "To determine the most efficient economic system for maximizing total wealth and productivity.", "isCorrect": false, "rationale": "Rawls explicitly contrasts his approach with pure utilitarianism, which might prioritize total wealth; his focus is on the welfare of the least advantaged, not overall efficiency or maximum wealth."}]}, {"question": "Which of the following characteristics would a person *not* know about themselves when behind Rawls's veil of ignorance?", "options": [{"text": "Their capacity for rational thought and deliberation.", "isCorrect": false, "rationale": "The thought experiment assumes a group of 'rational people' behind the veil, implying they retain their capacity for reason."}, {"text": "The general principles of logic or basic societal functioning.", "isCorrect": false, "rationale": "Rational people would be assumed to have general knowledge about how societies and economies function, necessary to make informed choices about rules."}, {"text": "Their social status, intelligence, physical ability, or religious beliefs.", "isCorrect": true, "rationale": "The text explicitly lists these as unknowns: 'no one knows their race, sex, intelligence, physical ability, wealth, religious beliefs, or position in society.'"}, {"text": "The fact that they are participating in a hypothetical thought experiment.", "isCorrect": false, "rationale": "While in a hypothetical state, the participants are aware of the task at hand – to design a just society."}]}, {"question": "According to Rawls, what is the first principle rational people behind the veil of ignorance would agree upon?", "options": [{"text": "Economic inequalities are permissible only if they lead to significant technological advancement for the whole society.", "isCorrect": false, "rationale": "This principle is not mentioned by Rawls. His first principle concerns liberties, and the second (difference principle) concerns inequalities benefiting the least advantaged."}, {"text": "Each person should have equal basic liberties, such as freedom of speech, religion, and the right to vote.", "isCorrect": true, "rationale": "The text states: 'First, each person should have equal basic liberties — freedom of speech, religion, assembly, and the right to vote.'"}, {"text": "Society should strive for strict equality of income and wealth for all members.", "isCorrect": false, "rationale": "Rawls's second principle, the difference principle, explicitly allows for social and economic inequalities, as long as they benefit the least advantaged."}, {"text": "Individuals should be free to accumulate wealth without any governmental interference or redistribution.", "isCorrect": false, "rationale": "Rawls's theory, particularly the difference principle, implies potential redistribution to benefit the least advantaged, which contrasts with unrestricted wealth accumulation."}]}, {"question": "The \"difference principle\" in Rawls's theory states that social and economic inequalities are acceptable only if they:", "options": [{"text": "Reflect the natural differences in talent, effort, and contribution among individuals.", "isCorrect": false, "rationale": "While talent and effort might contribute to inequality, Rawls's principle focuses on the *outcome* for the least advantaged, not just the justification by merit."}, {"text": "Lead to a higher total amount of wealth or overall utility for society as a whole.", "isCorrect": false, "rationale": "This aligns more with utilitarianism, which Rawls contrasts with. His focus is specifically on benefiting the *least advantaged*, not just maximizing total wealth."}, {"text": "Are arranged in a way that makes the least advantaged members of society better off than they would be under strict equality.", "isCorrect": true, "rationale": "The text defines the difference principle: 'inequalities are acceptable only if they make the worst-off group better off than they would be under strict equality.'"}, {"text": "Are approved by a majority vote of the citizens in the society at regular intervals.", "isCorrect": false, "rationale": "The principle is about the substantive outcome for the least advantaged, not a procedural mechanism of approval like a majority vote."}]}, {"question": "Rawls's reasoning for choosing the difference principle is primarily rooted in which of the following decision strategies?", "options": [{"text": "Pure altruism, where individuals prioritize the welfare of others above their own potential well-being.", "isCorrect": false, "rationale": "While the outcome benefits others, the rationale is based on rational self-interest behind the veil – individuals want to ensure they are not in the worst possible position, thus leading them to protect the worst-off."}, {"text": "Maximizing total societal utility, achieving the greatest good for the greatest number of people.", "isCorrect": false, "rationale": "Rawls explicitly contrasts his theory with utilitarianism, which aims to maximize total utility. The difference principle focuses on the minimum outcome, not the aggregate."}, {"text": "Maximin, which involves maximizing the minimum outcome or insuring against the worst possible position in society.", "isCorrect": true, "rationale": "The text states: 'This is a decision strategy known as maximin: maximize the minimum outcome,' chosen due to risk aversion regarding one's future position."}, {"text": "Meritocracy, ensuring that those who work hardest and are most talented receive proportionally greater rewards.", "isCorrect": false, "rationale": "The difference principle focuses on the safety net for the least advantaged, not on justifying inequalities based solely on merit."}]}, {"question": "Consider two societies as presented in the text: Society A (bottom 10% earn $5,000) and Society B (bottom 10% earn $30,000). According to Rawls, behind the veil of ignorance, a rational person would choose Society B primarily because:", "options": [{"text": "Society B likely has a higher overall average income and greater economic growth.", "isCorrect": false, "rationale": "The text notes a utilitarian might prefer Society A if total wealth is higher, directly contradicting this as Rawls's primary reason for choosing B."}, {"text": "The wealth gap between the richest and poorest is smaller in Society B.", "isCorrect": false, "rationale": "While potentially true, the core reason for Rawls is the absolute condition of the worst-off, not solely the magnitude of the gap."}, {"text": "The worst possible outcome (the minimum position) in Society B is significantly better than in Society A.", "isCorrect": true, "rationale": "The text explains: 'you would choose Society B, because the worst position in B ($30,000) is far better than the worst position in A ($5,000).'"}, {"text": "Society B guarantees absolute income equality, which is always preferred by rational agents.", "isCorrect": false, "rationale": "Society B still features inequalities ('The top 10% earn $200,000'); Rawls's principles allow for inequalities if they benefit the least advantaged."}]}, {"question": "Robert Nozick's primary objection to Rawls's theory, as described in the text, focuses on:", "options": [{"text": "Rawls's assumption that individuals behind the veil would always act rationally.", "isCorrect": false, "rationale": "Nozick's objection detailed here is not about the rationality assumption but about property rights."}, {"text": "The cultural bias inherent in Rawls's proposed principles, assuming Western values.", "isCorrect": false, "rationale": "This is another objection mentioned in the text, but it is not attributed to Robert Nozick."}, {"text": "The potential violation of individual rights when redistributing justly acquired goods, regardless of the outcome for the least advantaged.", "isCorrect": true, "rationale": "The text states Nozick argued 'that Rawls's theory focuses too much on the distribution of goods and not enough on how those goods were acquired. If someone earned their wealth through voluntary exchange and honest labor, redistributing it to the worst-off may violate their rights.'"}, {"text": "Rawls's failure to adequately define what constitutes 'basic liberties' for all citizens.", "isCorrect": false, "rationale": "This is part of the 'Knowledge and motivation' objection, but not Nozick's specific critique mentioned."}]}, {"question": "One significant objection to Rawls's reliance on the maximin strategy for choosing societal rules is that it:", "options": [{"text": "Overestimates the actual risk aversion of all rational individuals, as some might prefer a riskier society with higher potential rewards.", "isCorrect": true, "rationale": "The text states: 'The maximin strategy assumes extreme risk aversion. But some rational people behind the veil might prefer a riskier society with higher potential rewards — a gambler's choice rather than an insurer's choice.'"}, {"text": "Fails to adequately account for the collective benefits that can arise from greater economic risk-taking.", "isCorrect": false, "rationale": "The objection focuses on individual risk preference behind the veil, not primarily on collective economic benefits."}, {"text": "Does not sufficiently prioritize the protection of basic liberties, favoring economic security instead.", "isCorrect": false, "rationale": "The maximin strategy applies to socio-economic inequalities, separate from the first principle of equal basic liberties, which Rawls prioritizes."}, {"text": "Leads to an inherently unstable social contract that cannot be maintained over time.", "isCorrect": false, "rationale": "While a possible critique, the text specifies the objection about maximin as related to individual risk tolerance, not direct societal instability."}]}, {"question": "Critics argue that Rawls's veil of ignorance might suffer from \"cultural blindness\" and issues related to \"knowledge and motivation\" because:", "options": [{"text": "It presupposes that individuals are inherently good and will always choose fair rules, which is unrealistic.", "isCorrect": false, "rationale": "The veil assumes rationality and a desire for impartiality, not inherent goodness, by removing self-interested knowledge."}, {"text": "It strips away so much information that it becomes difficult to define universal principles or apply them consistently across diverse cultural values.", "isCorrect": true, "rationale": "The text explains these objections: 'strips away so much information that it is unclear whether meaningful choices can be made at all' and 'assumes a Western, liberal set of values' behind a truly neutral veil."}, {"text": "It requires an advanced understanding of complex economic and political theories to participate effectively.", "isCorrect": false, "rationale": "While rational, the critique focuses on what's *removed* (personal identity/context) making choices hard, not necessarily the baseline knowledge required for participation."}, {"text": "It primarily focuses on economic distribution, neglecting moral and ethical considerations in society's design.", "isCorrect": false, "rationale": "Rawls's theory is a work of *political philosophy* fundamentally concerned with justice, which is a moral and ethical consideration."}]}, {"question": "Despite the objections, the text concludes that the veil of ignorance remains a powerful tool in political philosophy because it:", "options": [{"text": "Provides a definitive and universally accepted blueprint for a perfectly just society.", "isCorrect": false, "rationale": "The text acknowledges disagreements with Rawls's *specific conclusions* and mentions objections like cultural blindness, implying it's not a universally accepted definitive blueprint."}, {"text": "Offers a framework that has been proven to maximize economic efficiency and growth in real-world societies.", "isCorrect": false, "rationale": "The text does not claim this; Rawls's focus is on fairness and justice, not primarily economic efficiency."}, {"text": "Forces individuals to consider social arrangements from an impartial perspective, free from self-interest and bias.", "isCorrect": true, "rationale": "The text concludes: 'Even if you disagree with Rawls's specific conclusions, the thought experiment forces a valuable discipline: before defending any social arrangement, ask whether you would accept it if you did not know which position you would occupy.'"}, {"text": "Exclusively validates libertarian principles of minimal state intervention and individual property rights.", "isCorrect": false, "rationale": "Rawls's theory, with its difference principle, often implies significant state intervention for redistribution, which contrasts with strict libertarianism (as highlighted by Nozick's objection)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
