<script>
var QUESTIONS = [{"question": "What is the fundamental definition of 'feedback' as described in systems thinking?", "options": [{"text": "A process where an external force constantly intervenes to correct a system's course.", "isCorrect": false, "rationale": "The text defines feedback as an internal process within a system, not primarily an external intervention."}, {"text": "The output of a process looping back to influence its input.", "isCorrect": true, "rationale": "The text explicitly states: 'Feedback simply means that the output of a process loops back to influence the input.'"}, {"text": "Any change within a system that leads to its eventual collapse or growth.", "isCorrect": false, "rationale": "While feedback can lead to collapse or growth, this definition is too specific and misses the core 'looping back' mechanism, and also excludes stability."}, {"text": "A method used by engineers to stabilize complex mechanical systems.", "isCorrect": false, "rationale": "While feedback systems originated in engineering and can stabilize, the definition is much broader and applies to all dynamic systems, not just for stabilization."}]}, {"question": "Why is the term 'positive feedback' for reinforcing loops considered potentially misleading, according to the text?", "options": [{"text": "Because 'positive' implies a desirable outcome, but reinforcing loops can lead to collapse.", "isCorrect": true, "rationale": "The text clarifies: 'Reinforcing feedback loops (also called positive feedback, though “positive” here means amplifying, not good) are processes where change in one direction produces more change in the same direction.'"}, {"text": "Because it only applies to systems exhibiting growth, not collapse.", "isCorrect": false, "rationale": "Reinforcing loops drive both exponential growth (e.g., compound interest) and exponential collapse (e.g., a bank run), so this statement is incorrect."}, {"text": "Because Norbert Wiener originally preferred the term 'amplifying feedback.'", "isCorrect": false, "rationale": "The text does not mention Wiener's preference for 'amplifying feedback' over 'positive feedback' as the reason for it being misleading."}, {"text": "Because it is an outdated term replaced by 'amplifying feedback.'", "isCorrect": false, "rationale": "The text uses 'positive feedback' as an alternative name for reinforcing loops, but clarifies its meaning, not that it's outdated or replaced."}]}, {"question": "A new streaming service offers a free trial. Users who enjoy the trial tell their friends, who then sign up for their own free trials, potentially leading to more paid subscriptions. Which type of feedback loop best describes this initial growth phase?", "options": [{"text": "A balancing feedback loop, because eventually, the market for new users will saturate.", "isCorrect": false, "rationale": "While market saturation is a balancing force, the question specifically asks about the *initial growth phase*, which is driven by amplification."}, {"text": "A reinforcing feedback loop, as more satisfied users lead to more new users in a continuous cycle.", "isCorrect": true, "rationale": "This scenario describes a process where 'success breeds more success' – more users lead to more referrals, which leads to even more users, characteristic of a reinforcing loop driving growth."}, {"text": "A negative feedback loop, because the company will need to invest more in servers as user numbers increase.", "isCorrect": false, "rationale": "Increased investment in servers is a consequence of growth, not the loop driving the initial user acquisition. Also, 'negative feedback' is another term for balancing loops, which resist change, whereas this scenario describes amplification."}, {"text": "A stability loop, aiming to keep user numbers consistent.", "isCorrect": false, "rationale": "This process explicitly describes growth and acceleration, not stability or consistency, which are hallmarks of balancing loops."}]}, {"question": "A country's central bank raises interest rates to combat inflation. Higher interest rates make borrowing more expensive, which slows down economic activity and reduces demand, thereby bringing prices down. What kind of feedback loop is the central bank attempting to enact?", "options": [{"text": "A reinforcing feedback loop, as it aims to amplify a specific economic trend.", "isCorrect": false, "rationale": "The central bank's action is designed to *counter* the trend of rising inflation, not amplify it. Reinforcing loops amplify change in the same direction."}, {"text": "A positive feedback loop, because controlling inflation is a desired outcome.", "isCorrect": false, "rationale": "In systems thinking, 'positive feedback' means amplifying, not good or desirable. The central bank is resisting the change of inflation, not amplifying it."}, {"text": "A balancing feedback loop, as it creates a counterforce to the rising inflation.", "isCorrect": true, "rationale": "This describes a balancing loop: change in one direction (rising inflation) produces a counterforce (higher rates, reduced demand) that resists the original change, bringing the system back towards equilibrium (lower inflation)."}, {"text": "An exponential growth loop, designed to rapidly adjust the economy.", "isCorrect": false, "rationale": "An exponential growth loop is a type of reinforcing loop. The central bank's goal is to stabilize prices and slow growth, not accelerate it exponentially."}]}, {"question": "Which characteristic is *most* indicative of a reinforcing feedback loop?", "options": [{"text": "It drives a system towards a stable equilibrium or set point.", "isCorrect": false, "rationale": "This describes a balancing feedback loop, which seeks stability."}, {"text": "It produces change in one direction that creates a counterforce resisting that change.", "isCorrect": false, "rationale": "This describes a balancing feedback loop, which resists change."}, {"text": "It acts as an engine of acceleration, leading to exponential growth or collapse.", "isCorrect": true, "rationale": "The text states: 'Reinforcing feedback loops... are engines of acceleration — exponential growth or exponential collapse.'"}, {"text": "It primarily functions to maintain oscillation within predefined bounds.", "isCorrect": false, "rationale": "Maintaining oscillation within bounds is a characteristic of balancing loops (e.g., predator-prey cycles), not reinforcing loops which amplify change without bounds (until another loop intervenes)."}]}, {"question": "The text describes balancing feedback loops as 'engines of stability and equilibrium.' Which scenario best exemplifies this role?", "options": [{"text": "The spread of a viral video, leading to millions of views in a short period.", "isCorrect": false, "rationale": "The rapid, amplified spread of a viral video is an example of exponential growth, characteristic of a reinforcing loop."}, {"text": "A forest fire that, unchecked, consumes an entire region.", "isCorrect": false, "rationale": "An unchecked forest fire demonstrates exponential collapse (of the forest) or growth (of the fire), which is a reinforcing loop."}, {"text": "A body's internal temperature regulation, maintaining a narrow range despite external fluctuations.", "isCorrect": true, "rationale": "Maintaining a stable internal temperature (homeostasis) is a classic example of a balancing loop, similar to a thermostat, where deviations from a set point trigger counteractions to restore equilibrium."}, {"text": "An economic boom where rising profits lead to increased investment, further boosting profits.", "isCorrect": false, "rationale": "This is an example of 'success breeds more success' leading to exponential growth, characteristic of a reinforcing loop."}]}, {"question": "In a rapidly expanding city, a reinforcing loop exists where new jobs attract more people, leading to more businesses and even more jobs. However, a balancing loop also operates: as the population grows, housing becomes scarce and expensive, making it harder for new people to afford to move in. If the city's growth begins to slow down significantly, what would a systems thinker conclude?", "options": [{"text": "The reinforcing loop has completely disappeared.", "isCorrect": false, "rationale": "Feedback loops rarely disappear entirely, but their relative strength or dominance can change."}, {"text": "The city has reached its maximum possible population.", "isCorrect": false, "rationale": "While possible, the immediate conclusion from a slowdown is about loop dominance, not necessarily reaching a hard limit, which could be higher if balancing forces were weaker."}, {"text": "The balancing loop is currently dominating the reinforcing loop.", "isCorrect": true, "rationale": "The text explains that real-world systems are a tangle of loops, and 'Whether the market booms or stabilizes depends on which loop dominates at any given moment.' A slowdown indicates the forces resisting growth (the balancing loop of affordability) are now stronger than the forces driving growth (the reinforcing loop of jobs)."}, {"text": "Both loops have become equally powerful, resulting in stasis.", "isCorrect": false, "rationale": "While equilibrium can be a result, the question implies a *slowdown* of growth, suggesting one loop (the balancing one) is now exerting more influence, not necessarily perfect equality, or leading to stasis yet."}]}, {"question": "According to the section, what is the primary practical value of 'feedback thinking'?", "options": [{"text": "To eliminate all negative feedback loops from a system for optimal performance.", "isCorrect": false, "rationale": "Eliminating balancing (negative) feedback loops would remove stability and lead to uncontrolled growth or collapse. The goal is to understand and manage them, not eliminate them."}, {"text": "To predict the exact future state of any dynamic system with complete accuracy.", "isCorrect": false, "rationale": "While feedback thinking helps in prediction, complete accuracy in complex systems is unrealistic. The text emphasizes its diagnostic value for understanding *why* things are happening."}, {"text": "To identify which loops are driving observed system behaviors like growth, collapse, stability, or oscillation.", "isCorrect": true, "rationale": "The text states: 'The practical value of feedback thinking is diagnostic. When you see exponential growth or collapse, look for the reinforcing loop driving it. When you see stability or oscillation, look for the balancing loop maintaining it.'"}, {"text": "To design systems that only contain reinforcing loops for continuous improvement.", "isCorrect": false, "rationale": "Systems with only reinforcing loops are unstable, leading to unbounded growth or collapse. Stable, functional systems require balancing loops."}]}, {"question": "The 'realworld' example describes how social media algorithms often create self-reinforcing echo chambers. What is identified as the core issue regarding these algorithms?", "options": [{"text": "They fail to generate enough user engagement, leading to platform stagnation.", "isCorrect": false, "rationale": "The text states the opposite: 'Engagement rises. The algorithm responds by showing still more of the same.'"}, {"text": "They introduce too many diverse viewpoints, confusing users.", "isCorrect": false, "rationale": "The text indicates the feed 'narrows into a self-reinforcing echo chamber,' implying a lack of diverse viewpoints."}, {"text": "The reinforcing loop of engagement and similar content lacks a natural balancing mechanism.", "isCorrect": true, "rationale": "The text explicitly states: 'The reinforcing loop (engagement --> more similar content --> more engagement) has no natural balancing mechanism built into the platform.'"}, {"text": "They primarily promote content that causes exponential collapse rather than growth.", "isCorrect": false, "rationale": "The algorithms are designed to promote engagement, which is a form of growth for the platform's metrics, not collapse."}]}, {"question": "The 'keyconcept' summary states that 'Every dynamic system is built from reinforcing loops... and balancing loops...' What is presented as the foundation of systems thinking and the key to predicting system behavior?", "options": [{"text": "Eliminating all loops to achieve a truly static system.", "isCorrect": false, "rationale": "The text emphasizes that dynamic systems *are built from* these loops, implying they are fundamental, not to be eliminated."}, {"text": "Understanding the historical origins of feedback systems in engineering.", "isCorrect": false, "rationale": "While the origin is mentioned, the 'keyconcept' focuses on the *application* of understanding the loops within a system, not their history."}, {"text": "Identifying and understanding which loops dominate a system at any given time.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'Understanding which loops dominate a system at any given time is the foundation of systems thinking — and the key to predicting whether a system will accelerate, stabilize, or oscillate.'"}, {"text": "Focusing solely on the exponential growth aspects of reinforcing loops.", "isCorrect": false, "rationale": "This ignores balancing loops, the collapse aspect of reinforcing loops, and the interaction between them, which are all crucial for a complete understanding of dynamic systems."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
