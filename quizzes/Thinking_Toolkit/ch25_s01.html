    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "How does the Liar Paradox, embodied by the sentence 'This sentence is false,' create a logical dilemma?", "options": [{"text": "It relies on an ambiguous definition of 'false,' making interpretation subjective.", "isCorrect": false, "rationale": "The text does not suggest an ambiguous definition of 'false' is the source of the paradox. The meaning of 'false' is generally understood in this context."}, {"text": "Its truth value flips infinitely between true and false, preventing a stable and consistent assignment.", "isCorrect": true, "rationale": "The text states, 'It oscillates endlessly between the two values, never settling on either,' precisely describing this perpetual flipping without a stable truth value."}, {"text": "It secretly contains a hidden contradiction that is resolved by a clever, non-obvious interpretation.", "isCorrect": false, "rationale": "The text explicitly states it 'is not a trick or a riddle with a clever solution,' ruling out the idea of a hidden, resolvable contradiction."}, {"text": "It requires external information or a specific context to determine its truth value, which is usually missing.", "isCorrect": false, "rationale": "The Liar Paradox is self-contained; its truth value depends solely on its own statement, not external information."}], "id": "q01"}, {"question": "According to the text, what distinguishes the Liar Paradox as a 'genuine logical problem' rather than just a puzzle or riddle?", "options": [{"text": "Puzzles are always solvable, while paradoxes are inherently unsolvable by definition.", "isCorrect": false, "rationale": "While the Liar Paradox has 'resisted definitive resolution,' the text emphasizes its nature as exposing 'deep tension,' rather than a simple definition of 'unsolvable.'"}, {"text": "It exposes fundamental tensions and limits in our basic concepts of truth, meaning, and language.", "isCorrect": true, "rationale": "The text states it 'exposes a deep tension in our most basic concepts of truth, meaning, and language,' highlighting its foundational impact beyond a mere intellectual puzzle."}, {"text": "Paradoxes are typically much older and have been debated for longer periods than puzzles.", "isCorrect": false, "rationale": "While the Liar Paradox is ancient, its age is a historical detail, not the fundamental distinction in its logical nature as a 'genuine problem.'"}, {"text": "Puzzles rely on wordplay, whereas paradoxes involve rigorous mathematical proofs.", "isCorrect": false, "rationale": "The text does not generalize puzzles in this way, nor does it suggest paradoxes inherently require mathematical proofs, though some (like G\"odel's) derive from them."}], "id": "q02"}, {"question": "The text asserts that the Liar Paradox 'has teeth' and is 'not a toy problem.' What significant historical example is provided to illustrate its importance?", "options": [{"text": "Its role in the development of early philosophical schools in ancient Greece.", "isCorrect": false, "rationale": "While attributed to Eubulides of Miletus, the text emphasizes its *modern* impact beyond its ancient origins as a 'toy problem.'"}, {"text": "Its application in artificial intelligence to teach machines how to handle logical inconsistencies.", "isCorrect": false, "rationale": "The text does not mention applications in artificial intelligence."}, {"text": "Kurt G\"odel's use of its self-referential structure to prove his incompleteness theorems.", "isCorrect": true, "rationale": "The text explicitly states, 'Kurt G\"odel used a version of the Liar's self-referential structure to prove his incompleteness theorems,' marking it as a critical result in mathematics."}, {"text": "Its frequent appearance in legal documents to expose loopholes and logical fallacies.", "isCorrect": false, "rationale": "The text does not mention legal applications; it notes its appearance in 'everyday life' but usually 'in diluted form.'"}], "id": "q03"}, {"question": "How does the 'Epimenides Paradox' ('All Cretans are liars') differ from the 'pure Liar Paradox' ('This sentence is false') in terms of its paradoxical nature?", "options": [{"text": "The Epimenides statement refers to a group and allows for conditions where it might not be strictly paradoxical.", "isCorrect": true, "rationale": "The text explains, 'The Epimenides version is not strictly paradoxical — Epimenides could be lying about all Cretans while some Cretans tell the truth,' indicating it’s not as stark or inescapable as the pure Liar."}, {"text": "The Epimenides paradox is based on a historical figure, while the pure Liar is a hypothetical construct.", "isCorrect": false, "rationale": "Both are logical constructs, though Epimenides is linked to a historical figure. The key difference is their logical structure, not their origin."}, {"text": "The pure Liar is resolvable through careful linguistic analysis, while Epimenides is not.", "isCorrect": false, "rationale": "The text states the pure Liar 'has resisted definitive resolution,' and implies Epimenides is less paradoxical, making this statement incorrect."}, {"text": "Epimenides involves a moral judgment (lying), whereas the pure Liar is about factual truth.", "isCorrect": false, "rationale": "Both involve truth claims, directly or indirectly. The paradox arises from the self-reference of the claim, not the specific content of 'lying' versus 'false.'"}], "id": "q04"}, {"question": "Alfred Tarski's proposed solution to the Liar Paradox involves a 'hierarchy of languages.' What is the central principle of this approach?", "options": [{"text": "Truth is an indefinable concept and therefore cannot be consistently used in formal logic.", "isCorrect": false, "rationale": "Tarski defines truth, but at a different linguistic level. He does not suggest it is indefinable."}, {"text": "Any language capable of consistently containing its own truth predicate must be informal.", "isCorrect": false, "rationale": "Tarski argued that a language *cannot* consistently contain its own truth predicate, whether formal or informal, leading to the need for a metalanguage."}, {"text": "To speak about the truth of a sentence, one must use a metalanguage external to the sentence's object language.", "isCorrect": true, "rationale": "Tarski argued 'a language cannot consistently contain its own truth predicate. To say 'This sentence is true,' you need a metalanguage that talks about sentences in the original object language.'"}, {"text": "The Liar Paradox can only exist in natural languages, not in formal logical systems.", "isCorrect": false, "rationale": "Tarski's solution applies to formal logic, and the text discusses the 'cost' that natural languages *do* contain their own truth predicates, implying the paradox could arise in them."}], "id": "q05"}, {"question": "What is the primary characteristic of paraconsistent logic as a strategy for handling paradoxes like the Liar?", "options": [{"text": "It aims to eliminate all contradictions from a logical system, regardless of their source.", "isCorrect": false, "rationale": "Paraconsistent logic does the opposite; it builds systems that *can tolerate* contradictions."}, {"text": "It redefines the concept of 'truth' to be dependent on the observer's perspective.", "isCorrect": false, "rationale": "The text does not mention paraconsistent logic redefining truth as subjective."}, {"text": "It allows a system to contain contradictions without collapsing into total incoherence, blocking the 'ex falso quodlibet' principle.", "isCorrect": true, "rationale": "The text states, 'Some logicians accept that the Liar sentence is both true and false simultaneously, and they build logical systems that can tolerate contradictions without collapsing into incoherence. In classical logic...paraconsistent logics block this explosive step.'"}, {"text": "It proposes that paradoxes are merely linguistic illusions that disappear with precise language.", "isCorrect": false, "rationale": "This aligns more with the 'Dismissal' approach regarding meaninglessness, not paraconsistent logic."}], "id": "q06"}, {"question": "How does Dialethism, championed by Graham Priest, offer a distinct perspective on the Liar Paradox compared to other proposed solutions?", "options": [{"text": "It suggests that the Liar sentence is structurally meaningless and thus incapable of expressing a proposition.", "isCorrect": false, "rationale": "This is the 'Dismissal' approach, not Dialethism."}, {"text": "It argues that the Liar Paradox requires a multi-valued logic with more than two truth values (true, false, indeterminate).", "isCorrect": false, "rationale": "While a 'thinkaboutit' explores this, Dialethism specifically claims that the sentence is *both* true and false, not indeterminate."}, {"text": "It contends that certain contradictions, like the Liar sentence being both true and false, are genuinely true features of reality.", "isCorrect": true, "rationale": "The text states, 'Dialethism holds that some contradictions are genuinely true — that the Liar sentence really is both true and false, and this is not a defect in our logic but a feature of reality.'"}, {"text": "It resolves the paradox by postulating an infinite hierarchy of self-referential statements.", "isCorrect": false, "rationale": "This sounds more like an adaptation of Tarski's approach, not Dialethism."}], "id": "q07"}, {"question": "One attempt to resolve the Liar Paradox is 'Dismissal,' which argues the sentence is meaningless. What is the primary challenge this approach faces?", "options": [{"text": "It is overly complex and requires advanced mathematical understanding to apply.", "isCorrect": false, "rationale": "The text describes Dismissal as having 'the appeal of simplicity,' contradicting this option."}, {"text": "It conflicts with the widely accepted Tarskian hierarchy of languages.", "isCorrect": false, "rationale": "Dismissal is a separate approach; its challenge isn't conflict with Tarski's work but its own inherent conceptual difficulty."}, {"text": "The Liar sentence appears grammatically well-formed and meaningful to most observers.", "isCorrect": true, "rationale": "The text notes this challenge: 'the sentence certainly looks meaningful. It is grammatically well-formed, uses familiar words, and seems to say something definite. Declaring it meaningless feels more like sweeping the problem under the rug than solving it.'"}, {"text": "It only works for the pure Liar Paradox and not for variations like Epimenides.", "isCorrect": false, "rationale": "The text discusses its general challenge, not its scope of application to specific variations."}], "id": "q08"}, {"question": "According to the 'keyconcept' summary, what fundamental logical structure is revealed by the Liar Paradox as creating deep logical problems?", "options": [{"text": "The inherent ambiguity of natural language when translated into formal systems.", "isCorrect": false, "rationale": "The summary points to a specific structural issue, not general linguistic ambiguity."}, {"text": "The combination of self-reference and negation within a statement.", "isCorrect": true, "rationale": "The 'keyconcept' explicitly states, 'self-reference, combined with negation, creates logical structures that no simple system of truth can accommodate.'"}, {"text": "The distinction between subjective belief and objective truth.", "isCorrect": false, "rationale": "The paradox deals with objective truth values and their assignment, not subjective belief."}, {"text": "The limitations of classical binary logic in representing complex reality.", "isCorrect": false, "rationale": "While the paradox might *lead* to considering such limitations, the 'keyconcept' identifies the *cause* as self-reference and negation, not just a general limitation of binary logic."}], "id": "q09"}, {"question": "The 'thinkaboutit' section presents a variation: 'This sentence is not true.' Based on the discussion of the original Liar Paradox, how would this variation primarily behave if analyzed under classical binary logic (true/false)?", "options": [{"text": "It would resolve into a definitively false statement, as 'not true' is a weaker claim than 'false.'", "isCorrect": false, "rationale": "In classical binary logic, 'not true' is equivalent to 'false.' If it's false, then it is 'not true,' making it true, and so on, creating the same loop."}, {"text": "It would function identically to 'This sentence is false,' leading to the same oscillating dilemma.", "isCorrect": true, "rationale": "In a classical binary logic system where a sentence is either true or false, 'not true' is equivalent to 'false.' Therefore, the statement 'This sentence is not true' creates the same self-referential loop and paradox as 'This sentence is false.'"}, {"text": "It would be easier to resolve because it only denies truth without directly asserting falsehood.", "isCorrect": false, "rationale": "The negation of 'true' ('not true') still forces the same paradoxical loop in a binary system; it doesn't make it easier to resolve without introducing new truth values."}, {"text": "It would be an example of a statement that is neither true nor false, thus resolving the paradox.", "isCorrect": false, "rationale": "The 'thinkaboutit' *suggests* allowing a third option, but this is a *potential resolution strategy*, not how the statement 'primarily behaves' under the principles discussed for the original Liar Paradox (which assumes binary logic)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
