<script>
var QUESTIONS = [{"question": "Which of the following best defines overfitting in the context of predictive modeling?", "options": [{"text": "A model's inability to learn complex patterns from historical data.", "isCorrect": false, "rationale": "Overfitting is characterized by a model learning *too much* from historical data, including noise, not an inability to learn complex patterns."}, {"text": "A model that performs poorly on both historical and new data due to insufficient parameters.", "isCorrect": false, "rationale": "Overfitting models perform brilliantly on historical data, and failure on new data is due to *too many* or overly tuned parameters, not too few."}, {"text": "A model that captures noise (random patterns) from past data, leading to excellent performance on historical data but poor performance on new data.", "isCorrect": true, "rationale": "This accurately defines overfitting: tuning a model so precisely to past data that it captures noise instead of genuine signal, resulting in strong performance on training data but collapse on unseen data."}, {"text": "A model's tendency to simplify complex relationships, making it more robust across various datasets.", "isCorrect": false, "rationale": "Simplifying relationships and robustness are characteristics of a good, non-overfit model, or the 'antidote' to overfitting, not overfitting itself."}]}, {"question": "The history exam analogy illustrates that relying on memorized specific past questions rather than understanding broad patterns leads to failure when new questions are introduced. Which of the following scenarios is an analogous example of overfitting?", "options": [{"text": "A student who studies general principles of physics and performs well on a novel problem-solving test.", "isCorrect": false, "rationale": "This student demonstrates understanding of broad patterns, which is the opposite of overfitting."}, {"text": "A chess player who memorizes specific opening moves from past games and struggles when an opponent uses an unexpected strategy.", "isCorrect": true, "rationale": "This player has 'memorized the last exam' (specific past moves) instead of 'learning the subject' (understanding chess principles), making them vulnerable to new, unseen conditions, which is the essence of overfitting."}, {"text": "A chef who experiments with new ingredients and techniques to create unique dishes.", "isCorrect": false, "rationale": "This chef is adaptable and not rigidly tied to past recipes, which is contrary to the concept of overfitting."}, {"text": "A programmer who writes flexible code that can handle various types of user input.", "isCorrect": false, "rationale": "This programmer creates a robust solution, which is an antidote to overfitting, not an example of it."}]}, {"question": "According to the text, what is a primary reason why a stock-trading algorithm backtested on ten years of market data might fail when deployed on live markets?", "options": [{"text": "The algorithm was designed with too few parameters, preventing it from capturing essential market trends.", "isCorrect": false, "rationale": "The text suggests overfitting often occurs with *enough* (or too many) parameters, allowing it to fit noise. Too few parameters might lead to underfitting, not typically overfitting."}, {"text": "The algorithm became too robust, ignoring specific profitable patterns it had learned.", "isCorrect": false, "rationale": "Robustness is the antidote to overfitting; an overfit algorithm would be fragile, not robust."}, {"text": "The algorithm found patterns that were coincidences specific to that decade, rather than genuine, repeatable market signals.", "isCorrect": true, "rationale": "Overfitting occurs when a model captures 'noise' (random fluctuations or coincidences) specific to the historical data, which then fail to hold true in new, live market conditions."}, {"text": "The historical data used was too general, leading the algorithm to miss lucrative, niche trading opportunities.", "isCorrect": false, "rationale": "The issue is not that the data was too general, but that the algorithm extracted overly specific, non-generalizable patterns from it."}]}, {"question": "The text states that 'overfitting is not just a technical problem in data science. It is a universal thinking error that appears wherever people mistake the specific for the general.' Which of the following situations exemplifies this broader concept of overfitting?", "options": [{"text": "A historian who analyzes diverse sources to identify overarching societal trends across different eras.", "isCorrect": false, "rationale": "This historian is looking for general patterns, which is the opposite of overfitting."}, {"text": "A city planner who designs a public transport system based solely on the specific travel habits observed during a short-term survey in one neighborhood.", "isCorrect": true, "rationale": "This planner is 'mistaking the specific for the general' by designing a system based on narrow, potentially unrepresentative data, analogous to overfitting."}, {"text": "A scientist who forms a hypothesis and then designs experiments to test its validity under varied conditions.", "isCorrect": false, "rationale": "This scientist is seeking generalizable truths and testing robustness, which counteracts overfitting."}, {"text": "A chef who masters a wide range of culinary techniques to adapt to different cuisines and ingredients.", "isCorrect": false, "rationale": "This chef demonstrates adaptability and broad skill, not a narrow focus on the specific."}]}, {"question": "France's construction of the Maginot Line after World War I is cited as an example of overfitting. What was the core error in this military strategy?", "options": [{"text": "They invested too little in defensive infrastructure, making it easy for an enemy to penetrate.", "isCorrect": false, "rationale": "The Maginot Line was an elaborate system of fortifications, implying significant investment, not too little."}, {"text": "They designed a defense perfectly suited for the *previous* war's tactics (trench warfare), failing to anticipate new approaches.", "isCorrect": true, "rationale": "This exemplifies preparing for the 'last war,' where the strategy was optimized for specific past conditions but failed against new, unpredicted conditions (Germany going around it)."}, {"text": "They focused on offensive strategies, neglecting defensive preparations entirely.", "isCorrect": false, "rationale": "The Maginot Line was a defensive structure, contradicting this option."}, {"text": "Their strategy was too robust, making it inflexible to adapt to changing battlefield conditions.", "isCorrect": false, "rationale": "The Maginot Line was *not* robust; its hyper-optimization for specific past conditions made it fragile to change, not flexible."}]}, {"question": "When designing educational curricula, the text suggests that training students in 'broad capacities' rather than 'narrow, immediately marketable skills' helps mitigate overfitting. Why is this approach more robust?", "options": [{"text": "Broad capacities ensure students can perfectly master current job requirements, making them highly optimized for today's economy.", "isCorrect": false, "rationale": "The text states that broad capacities are 'less optimized for today's job market' but 'more robust to tomorrow's.'"}, {"text": "Narrow skills are more likely to become obsolete quickly, while broad capacities like critical thinking enable adaptability to future unknown changes.", "isCorrect": true, "rationale": "Broad capacities foster adaptability and resilience, allowing individuals to navigate an evolving economy, whereas narrow skills, being specific, are vulnerable to obsolescence."}, {"text": "Focusing on broad capacities is a less expensive way to educate students, reducing the financial burden on institutions.", "isCorrect": false, "rationale": "The text does not discuss the financial cost of different educational approaches."}, {"text": "Narrow skills inherently lead to better job placement rates, despite potential future obsolescence.", "isCorrect": false, "rationale": "The text argues against narrow skills precisely because of their limited long-term utility and susceptibility to obsolescence."}]}, {"question": "An investment firm boasts a strategy that, after extensive backtesting, would have yielded an astonishing 50% annual return over the past 15 years. Based on the concept of overfitting, what is the most critical concern for investors considering this strategy?", "options": [{"text": "The strategy might be too simple and lack the necessary parameters to capture true market complexity.", "isCorrect": false, "rationale": "The text suggests more parameters and precise tuning increase the risk of overfitting, not that simplicity is the problem here. An astonishing past return often points to over-optimization."}, {"text": "The historical data used for backtesting was likely too generalized to reveal genuine profitable patterns.", "isCorrect": false, "rationale": "The problem is not that the data was too general, but that the strategy might have found non-generalizable, specific patterns within it."}, {"text": "The strategy may have captured noise or coincidences specific to that 15-year period and will likely fail in new market conditions.", "isCorrect": true, "rationale": "This is the core risk of overfitting in investment strategies: backtesting can tune a strategy to specific historical patterns that are merely noise and will not repeat in the future."}, {"text": "The high returns indicate a robust strategy that will likely continue to perform well regardless of market changes.", "isCorrect": false, "rationale": "Extraordinary past returns, especially from highly tuned strategies, are often a red flag for overfitting and indicate fragility, not robustness."}]}, {"question": "What does the text identify as the primary 'antidote to overfitting'?", "options": [{"text": "Increasing the number of parameters in a model to capture more nuances of the historical data.", "isCorrect": false, "rationale": "The text states 'Use fewer parameters' as part of the antidote and warns that 'The more parameters the strategy has... the more likely it is to fail.'"}, {"text": "Prioritizing optimization to achieve the highest possible performance on past data.", "isCorrect": false, "rationale": "The text explicitly states to 'Value robustness over optimization' as part of the antidote."}, {"text": "Deliberate simplicity, including fewer parameters, out-of-sample testing, and a preference for robustness.", "isCorrect": true, "rationale": "This option directly combines all the key elements of the antidote mentioned: 'deliberate simplicity,' 'fewer parameters,' 'Test your model on data it has never seen' (out-of-sample testing), and 'Value robustness over optimization.'"}, {"text": "Focusing exclusively on historical data to refine a model's accuracy before deployment.", "isCorrect": false, "rationale": "Overfitting *is* focusing too much on historical data. The antidote involves testing on *new* data (out-of-sample testing)."}]}, {"question": "The case of Long-Term Capital Management (LTCM) illustrates a critical vulnerability of overfit models. What was the fundamental flaw in LTCM's approach that led to its collapse?", "options": [{"text": "Their models were too robust, making them unable to capitalize on specific, high-return opportunities.", "isCorrect": false, "rationale": "LTCM's models were 'exquisitely calibrated,' indicating optimization, not robustness. Their failure demonstrated fragility, not excessive robustness."}, {"text": "They failed to use historical data, instead relying on untested theoretical models.", "isCorrect": false, "rationale": "The text explicitly states their models were 'exquisitely calibrated to historical market data.'"}, {"text": "Their models were perfectly tuned to specific historical market patterns, rendering them fragile and unable to handle unforeseen 'Black Swan' events outside that historical range.", "isCorrect": true, "rationale": "LTCM's models were overfit to specific past patterns ('tuned to the specific patterns of the recent past'), making them extremely vulnerable to novel market conditions (the 1998 Russian financial crisis) that fell 'outside the range of the historical data.'"}, {"text": "They used too few parameters, which prevented their models from accurately capturing market dynamics.", "isCorrect": false, "rationale": "Overfitting generally involves many parameters that capture noise. The models were 'exquisitely calibrated,' implying a high degree of complexity and tuning."}]}, {"question": "The 'connections' section links overfitting to 'Confirmation Bias'. How does confirmation bias contribute to the problem of overfitting?", "options": [{"text": "It encourages model builders to actively seek out data that challenges their existing patterns, thereby preventing overfitting.", "isCorrect": false, "rationale": "Confirmation bias is the tendency to interpret new evidence as confirmation of one's existing beliefs, not to challenge them."}, {"text": "It leads individuals to prioritize deliberate simplicity, ensuring models are less complex and more robust.", "isCorrect": false, "rationale": "Deliberate simplicity is the antidote, not a consequence of confirmation bias. Confirmation bias would likely encourage adding complexity to confirm perceived patterns."}, {"text": "It causes people to focus only on patterns that confirm their initial assumptions in historical data, reinforcing the belief that noise is a genuine signal.", "isCorrect": true, "rationale": "Confirmation bias can lead model builders to interpret random fluctuations in historical data as meaningful patterns because it aligns with their preconceived notions, thereby 'seeing patterns where none exist' and leading to overfitting."}, {"text": "It promotes out-of-sample testing, which is crucial for identifying when a model has overfit.", "isCorrect": false, "rationale": "Confirmation bias would discourage rigorous out-of-sample testing if it risks disproving favored patterns."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
