    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following conditions is NOT a defining characteristic of the Two Generals' Problem?", "options": [{"text": "The two parties must achieve a simultaneous action to succeed.", "isCorrect": false, "rationale": "This is a core condition; simultaneous action is necessary for success, and failure results if only one party acts."}, {"text": "Communication between parties occurs over an unreliable channel.", "isCorrect": false, "rationale": "The unreliability of the communication channel (messengers through enemy territory) is the central challenge of the problem."}, {"text": "Failure to coordinate results in a catastrophic outcome for at least one party.", "isCorrect": false, "rationale": "If only one general attacks, that general will be defeated, representing a catastrophic outcome that rational actors would avoid."}, {"text": "One general acts as the commander, issuing orders to the other general.", "isCorrect": true, "rationale": "The problem describes two allied generals who need to coordinate, implying a peer-to-peer relationship where both need to agree. There is no hierarchical command structure described where one simply orders the other."}]}, {"question": "The 'infinite regress' in the Two Generals' Problem primarily illustrates which fundamental challenge?", "options": [{"text": "The difficulty of ensuring message security and preventing interception.", "isCorrect": false, "rationale": "While messengers might be captured, the infinite regress isn't about message security, but about the lack of certainty of receipt, regardless of content."}, {"text": "The limited number of messengers available to transmit information.", "isCorrect": false, "rationale": "The problem states 'any messenger might be captured,' not that there's a limit to the number of messengers. The regress persists even with an infinite supply."}, {"text": "The impossibility of gaining absolute certainty that the last message sent was received by the other party.", "isCorrect": true, "rationale": "Each acknowledgment introduces a new message, and the sender of that acknowledgment can never be certain its own message was received, leading to an endless chain where perfect certainty is never achieved."}, {"text": "The time delay inherent in transmitting messages across a distance.", "isCorrect": false, "rationale": "Time delay is a practical concern but not the core reason for the infinite regress. The issue is the lack of guaranteed receipt, not merely the speed of transmission."}]}, {"question": "According to the text, why is the Two Generals' Problem considered 'provably unsolvable'?", "options": [{"text": "Because the enemy constantly intercepts all messages, making communication impossible.", "isCorrect": false, "rationale": "The problem states 'any messenger might be captured,' not all. The unsolvability stems from the *uncertainty* of message delivery, not a complete communication blockade."}, {"text": "Because it's impossible to design a communication channel that is absolutely reliable.", "isCorrect": false, "rationale": "This is a practical limitation of channels, but the proof of unsolvability is a logical argument that no protocol can *guarantee* coordination over *any* unreliable channel, even if some messages get through."}, {"text": "Because any proposed protocol can always be shown to fail if the last essential message is lost, leading to a contradiction.", "isCorrect": true, "rationale": "The proof demonstrates that if a protocol relies on a finite number of messages, the loss of the 'last' message renders that message unnecessary (as the parties cannot distinguish between a lost or late message), leading to a contradiction by induction."}, {"text": "Because the generals are unable to distinguish between a lost message and a malicious delay by the enemy.", "isCorrect": false, "rationale": "The proof hinges on not being able to distinguish between a lost message and a *late* one, not necessarily a malicious delay, making any final message effectively non-critical or leading to an infinite regress."}]}, {"question": "In everyday life, how do people typically 'solve' problems analogous to the Two Generals' Problem?", "options": [{"text": "By developing infinitely complex communication protocols to achieve absolute certainty.", "isCorrect": false, "rationale": "The text explicitly states that an infinite regress is involved and that people do not typically send 'Got your OK' confirmations endlessly. This contradicts the proof of unsolvability."}, {"text": "By avoiding coordination altogether when communication is unreliable.", "isCorrect": false, "rationale": "People frequently coordinate via unreliable channels (like texting). They don't simply give up; they adapt their expectations."}, {"text": "By accepting a reasonable probability of success and acting despite the lack of perfect certainty.", "isCorrect": true, "rationale": "The text explains that in everyday life, we 'solve this problem by accepting less than certainty' and 'act accordingly,' relying on social norms and tolerance for small risks."}, {"text": "By always using redundant communication channels and multiple messengers.", "isCorrect": false, "rationale": "While redundancy is a practical solution in some contexts (like military), it's not the typical 'everyday' solution for simple interactions like texting, which primarily relies on accepting risk."}]}, {"question": "Which of the following best describes the difference in how computer systems and humans approach the uncertainty of the Two Generals' Problem?", "options": [{"text": "Humans require absolute certainty, while computer systems are designed to operate with inherent uncertainty.", "isCorrect": false, "rationale": "This is backward. Humans accept less than certainty, while computer systems often have higher stakes and lower tolerance for failure, pushing for more robust (though not perfectly certain) solutions."}, {"text": "Computer systems exclusively rely on perfect, error-free communication channels, unlike human communication.", "isCorrect": false, "rationale": "The Two Generals' Problem is specifically about unreliable channels. Computer systems often face unreliable channels (e.g., the internet) and cannot assume perfect communication."}, {"text": "Computer systems demand a higher degree of reliability and precision, leading to probabilistic guarantees, whereas humans tolerate more risk.", "isCorrect": true, "rationale": "The text states, 'in computer systems, the stakes can be higher and the tolerance for failure lower,' leading to 'practical solutions involv[ing] probabilistic guarantees rather than absolute certainty,' which contrasts with human tolerance for small risks."}, {"text": "Humans use formal protocols to ensure coordination, while computer systems use informal social norms.", "isCorrect": false, "rationale": "This is also backward. Computer systems use protocols (like TCP), while humans rely on social norms and shared expectations to navigate uncertainty."}]}, {"question": "Consider an online banking transaction where a user transfers money. If the Two Generals' Problem is relevant, what is the primary challenge faced by the bank's server and the user's computer?", "options": [{"text": "Ensuring the physical security of the communication line between them.", "isCorrect": false, "rationale": "While security is crucial for banking, the Two Generals' Problem focuses on the *unreliability* of the channel (loss of messages), not necessarily physical security or interception, although both contribute to overall channel vulnerability."}, {"text": "Guaranteeing that both systems have the identical understanding of whether the transaction successfully occurred.", "isCorrect": true, "rationale": "The text explicitly states: 'If your computer thinks the purchase went through but the server does not, or vice versa, trouble follows.' This is precisely the coordination problem: both parties must agree on the state of the transaction despite an unreliable network."}, {"text": "Processing the transaction quickly enough to prevent timeouts.", "isCorrect": false, "rationale": "Speed is a performance metric. The Two Generals' Problem is about certainty of coordination, not just the speed of processing or avoiding timeouts, though timeouts can be a symptom of underlying communication uncertainty."}, {"text": "Encrypting the transaction data to protect sensitive financial information.", "isCorrect": false, "rationale": "Encryption addresses data privacy and integrity against eavesdropping, which is separate from the Two Generals' Problem's core issue of guaranteed message receipt and mutual certainty of action."}]}, {"question": "The TCP 'three-way handshake' is presented as a 'practical (not perfect) solution' to the Two Generals' Problem. What does this imply about its effectiveness?", "options": [{"text": "It eliminates all possibility of communication failure in establishing a connection.", "isCorrect": false, "rationale": "The text states it's 'not perfect' and 'cannot guarantee perfect coordination,' meaning it does not eliminate all possibility of failure, consistent with the provable unsolvability of the problem."}, {"text": "It guarantees absolute certainty of a connection being established, but at a high computational cost.", "isCorrect": false, "rationale": "It cannot guarantee absolute certainty because the Two Generals' Problem is provably unsolvable. Its practical nature implies it balances reliability with feasibility."}, {"text": "It achieves a very high level of reliability for establishing connections, though it can still theoretically fail under certain conditions.", "isCorrect": true, "rationale": "Being a 'practical' solution means it works reliably enough for real-world use ('achieves high reliability'), but 'not perfect' and the unsolvability of the underlying problem mean it cannot offer absolute guarantees and can theoretically fail."}, {"text": "It can only be used on perfectly reliable, error-free network channels.", "isCorrect": false, "rationale": "TCP is designed to work over unreliable channels (like the internet), which is precisely why it's a solution to the Two Generals' Problem, not a system that avoids the problem by requiring perfect channels."}]}, {"question": "In a real military operation facing the Two Generals' Problem, which strategy directly addresses the *uncertainty* of communication rather than just the risk of a single message loss?", "options": [{"text": "Using a single, highly encrypted communication channel to prevent interception.", "isCorrect": false, "rationale": "Encryption helps security but doesn't solve the core problem of whether a message (even if secure) was *received*. The channel could still be unreliable due to other factors (e.g., jamming, physical damage)."}, {"text": "Sending a single, critical message with explicit instructions and no expectation of a reply.", "isCorrect": false, "rationale": "This would exacerbate the uncertainty. Without an acknowledgment, the sender has no idea if the message was received, directly conflicting with the need for coordination."}, {"text": "Establishing standing orders that specify default actions if communication fails or is uncertain.", "isCorrect": true, "rationale": "The text mentions 'standing orders that specify default actions if communication fails.' This addresses uncertainty by providing a fallback plan that doesn't require confirmed communication for every decision, reducing the impact of communication failures."}, {"text": "Relying on direct line-of-sight visual signals instead of messengers.", "isCorrect": false, "rationale": "While visual signals might be more immediate, they are still subject to unreliability (e.g., fog, distance, enemy interference), and the Two Generals' Problem applies to any unreliable channel."}]}, {"question": "The 'key concept' states that 'perfect certainty of coordination is logically impossible' over an unreliable channel. Given this, what is the most appropriate long-term design principle for distributed systems?", "options": [{"text": "Continuously invest in technology to achieve perfectly reliable communication channels.", "isCorrect": false, "rationale": "The problem is 'provably unsolvable' over *any* unreliable channel, implying that perfect reliability is an unattainable ideal for practical, real-world channels like the internet. Focus should be on working around unreliability."}, {"text": "Design systems that can tolerate occasional failures and operate effectively with probabilistic guarantees.", "isCorrect": true, "rationale": "The text explicitly states that 'practical solutions involve probabilistic guarantees rather than absolute certainty' and that systems need to be 'building systems that tolerate occasional failures.' This aligns perfectly with the key concept's implication."}, {"text": "Limit the number of parties involved in coordination to reduce the complexity of message exchange.", "isCorrect": false, "rationale": "While complexity might increase with more parties, the fundamental logical impossibility of certainty remains even with just two parties. Reducing parties doesn't solve the core problem of unreliability."}, {"text": "Mandate that all distributed systems use only synchronous, blocking communication methods.", "isCorrect": false, "rationale": "Synchronous communication doesn't inherently solve the problem of an unreliable channel. A blocking call still might not guarantee receipt and could block indefinitely if a message is lost. The problem is about certainty, not synchronization method."}]}, {"question": "The problem was first described in the context of computer networking. What does this suggest about the fundamental nature of the challenge?", "options": [{"text": "It is primarily a historical curiosity with limited modern relevance outside of military strategy.", "isCorrect": false, "rationale": "The text clearly states its relevance to modern computer systems (online purchases, Internet protocols) and business, indicating its enduring and broad applicability."}, {"text": "It highlights that even seemingly simple tasks like sending a message have deep implications for distributed agreement.", "isCorrect": true, "rationale": "The problem arises from the basic act of sending a message over an unreliable channel and the need for mutual certainty, which are fundamental challenges in computer networking and distributed systems, making simple coordination remarkably complex."}, {"text": "It demonstrates that early computer networks were inherently more unreliable than current ones.", "isCorrect": false, "rationale": "While early networks might have been less reliable, the problem is a logical impossibility regardless of the specific technology. Modern networks are still built on unreliable underlying layers, making the problem ever-present."}, {"text": "It implies that the solution can only be found through advancements in network hardware.", "isCorrect": false, "rationale": "The problem is 'provably unsolvable' by protocol alone. Hardware improvements can reduce message loss but cannot eliminate the fundamental uncertainty, which is a logical, not purely hardware, limitation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
