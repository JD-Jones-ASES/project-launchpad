        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The \"Cobra Effect\" is named after an incident that primarily occurred in which context?", "options": [{"text": "French colonial rule in Hanoi, involving rat tails.", "isCorrect": false, "rationale": "While the Hanoi rat tail bounty is another classic example of the Cobra Effect, the original anecdote that gave the phenomenon its name occurred in British colonial India."}, {"text": "Modern healthcare systems, concerning patient mortality rates.", "isCorrect": false, "rationale": "Modern healthcare is cited as a contemporary example of perverse incentives, but it is not the origin of the term 'Cobra Effect'."}, {"text": "British colonial rule in India, involving venomous snakes.", "isCorrect": true, "rationale": "The text explicitly states the Cobra Effect is 'Named after an apocryphal episode during British colonial rule in India,' involving the bounty on cobras."}, {"text": "Academic research, regarding publication metrics.", "isCorrect": false, "rationale": "Academic publishing is mentioned as a 'realworld' example of perverse incentives, but not the historical origin of the 'Cobra Effect' name."}], "id": "q01"}, {"question": "What is the fundamental mechanism that leads to the \"Cobra Effect\"?", "options": [{"text": "A sudden, unforeseen natural disaster disrupting policy implementation.", "isCorrect": false, "rationale": "The Cobra Effect is a result of human behavioral responses to incentives, not natural disasters."}, {"text": "Government corruption diverting funds intended for public welfare.", "isCorrect": false, "rationale": "While corruption can undermine policies, the Cobra Effect specifically describes an unintended consequence arising from the design of an incentive, not necessarily corruption."}, {"text": "An incentive system rewarding a proxy metric, which agents then optimize for, often undermining the true goal.", "isCorrect": true, "rationale": "The text clearly states, 'The mechanism is always the same: the policy targets a proxy... rather than the actual goal... Clever agents then find ways to produce the proxy without achieving the goal — or even while undermining it.'"}, {"text": "A lack of public participation and awareness in government programs.", "isCorrect": false, "rationale": "The Cobra Effect usually involves active and clever participation from 'agents' who understand the incentive structure all too well."}], "id": "q02"}, {"question": "In the French colonial Hanoi example, how did residents exploit the rat tail bounty, demonstrating the Cobra Effect?", "options": [{"text": "They started domestic rat farms to supply tails, then released the rats when the bounty ended.", "isCorrect": false, "rationale": "This scenario describes what happened with the cobras in India, not the rats in Hanoi. In Hanoi, they focused on keeping rats alive to reproduce."}, {"text": "They imported chemicals to eliminate rats more efficiently, leading to environmental harm.", "isCorrect": false, "rationale": "The text does not mention chemical importation or environmental harm in this context; the gaming was directly related to the bounty itself."}, {"text": "They cut off rat tails for the bounty and then released the rats alive to breed more, or imported rats.", "isCorrect": true, "rationale": "The text states: 'Entrepreneurial residents quickly figured out that they could catch a rat, cut off its tail to collect the bounty, and release the rat alive to breed more rats. ... Some residents even imported rats from the countryside to increase their supply.'"}, {"text": "They organized large-scale hunts for wild rats, leading to an overpopulation of other pests.", "isCorrect": false, "rationale": "While they hunted rats, the key exploitation was releasing tailless rats or importing them to 'farm' tails, not just hunting efficiently."}], "id": "q03"}, {"question": "According to the text, which statement best defines a \"perverse incentive\"?", "options": [{"text": "An incentive that discourages innovation and creativity.", "isCorrect": false, "rationale": "While a perverse incentive might lead to misdirected 'creativity' (e.g., breeding cobras), its primary definition is not about discouraging innovation generally."}, {"text": "An incentive that is too complex for the target audience to understand.", "isCorrect": false, "rationale": "The problem with perverse incentives is not their complexity, but how cleverly agents exploit them."}, {"text": "An incentive that produces an outcome contrary to its original, intended goal.", "isCorrect": true, "rationale": "The text defines a perverse incentive as 'one that produces the opposite of its intended effect.'"}, {"text": "An incentive designed to benefit a select group rather than the general public.", "isCorrect": false, "rationale": "While some policies might have such an intent, a perverse incentive's defining characteristic is its counterproductive outcome relative to the stated goal, not its beneficiaries."}], "id": "q04"}, {"question": "A university decides to evaluate its professors primarily based on the number of research papers they publish annually. Based on the Cobra Effect, what is the most likely unintended consequence?", "options": [{"text": "Professors will focus on fewer, high-impact papers to improve quality.", "isCorrect": false, "rationale": "This would be the ideal outcome. However, the text's 'Academic publishing' example suggests the opposite, where quantity is prioritized over quality when publication count is the metric."}, {"text": "Professors will collaborate more to produce interdisciplinary research.", "isCorrect": false, "rationale": "While collaboration can be beneficial, the direct perverse incentive from a 'number of papers' metric is not necessarily increased, effective collaboration but rather quantity over quality."}, {"text": "Professors may publish many smaller, less significant papers to boost their count, potentially sacrificing depth.", "isCorrect": true, "rationale": "This aligns with the 'Academic publishing' real-world example: 'When researchers are evaluated by the number of papers they publish, the incentive favors many small papers over fewer, more significant works. The goal (advancing knowledge) diverges from the metric (publication count).'"}, {"text": "Professors will spend more time teaching to secure student satisfaction.", "isCorrect": false, "rationale": "The incentive is based on research papers, not teaching effectiveness or student satisfaction, so it would likely divert attention *away* from teaching if anything."}], "id": "q05"}, {"question": "Why does a policy susceptible to the Cobra Effect often fail to achieve its original, desired goal?", "options": [{"text": "The policy's goals are usually too ambitious and unrealistic from the start.", "isCorrect": false, "rationale": "The problem isn't necessarily the ambition of the goal, but the design of the incentive that aims to achieve it."}, {"text": "Agents lack the necessary resources or skills to implement the policy correctly.", "isCorrect": false, "rationale": "The text implies 'clever agents' who are resourceful in finding ways to game the system, not a lack of resources or skills."}, {"text": "The policy incentivizes a measurable proxy that can be achieved independently of, or even in opposition to, the actual goal.", "isCorrect": true, "rationale": "As explained in the text, 'The policy targets a proxy... rather than the actual goal... And the proxy, once it becomes the target, is gamed — often in ways that actively undermine the original goal.'"}, {"text": "Political interference frequently derails the long-term objectives of the policy.", "isCorrect": false, "rationale": "While political factors can influence policy, the Cobra Effect mechanism is specifically about how an incentive structure leads to self-defeating behavior, not general political interference."}], "id": "q06"}, {"question": "A city government, concerned about excessive litter, offers a substantial bounty for every kilogram of litter collected and brought to designated centers. Which outcome would most directly illustrate the Cobra Effect?", "options": [{"text": "The city becomes significantly cleaner as residents diligently collect litter.", "isCorrect": false, "rationale": "This is the intended positive outcome, not the perverse effect that defines the Cobra Effect."}, {"text": "A black market emerges for specific types of recyclable materials, increasing their value.", "isCorrect": false, "rationale": "While a possible unintended consequence, it doesn't directly involve creating the 'litter' (the proxy) to collect the bounty, which is the core of the Cobra Effect."}, {"text": "Residents begin intentionally scattering litter in specific areas to ensure a steady supply for collection.", "isCorrect": true, "rationale": "This directly parallels the cobra breeding and rat releasing examples. Agents would be producing the proxy (litter) to collect the reward, thereby undermining the actual goal (less litter)."}, {"text": "Waste management companies innovate new technologies for more efficient litter removal.", "isCorrect": false, "rationale": "This would be a beneficial innovation, unrelated to the perverse incentives of the Cobra Effect."}], "id": "q07"}, {"question": "According to the \"Caution\" section, what is the most effective antidote to prevent incentive systems from causing a Cobra Effect?", "options": [{"text": "Abandoning all incentive-based policies due to their inherent risks.", "isCorrect": false, "rationale": "The text explicitly states: 'The antidote is not to abandon incentives but to design them with an adversarial mindset.'"}, {"text": "Simplifying policy language to ensure easier public comprehension.", "isCorrect": false, "rationale": "While clear language is good, it doesn't address the fundamental issue of gaming the metric."}, {"text": "Designing incentives with an \"adversarial mindset,\" anticipating how they might be gamed without achieving the true goal.", "isCorrect": true, "rationale": "The text advises: 'The antidote is... to design them with an adversarial mindset — asking, 'If someone wanted to hit this target without achieving the actual goal, how would they do it?''"}, {"text": "Increasing the severity of penalties for non-compliance with policy regulations.", "isCorrect": false, "rationale": "The focus of the antidote is on proactive design to prevent gaming, not reactive punishment for non-compliance."}], "id": "q08"}, {"question": "When the text advises asking \"What other behaviors does this incentive also reward?\", it is primarily urging policy designers to consider what aspect of incentive structures?", "options": [{"text": "The ease of administration and enforcement of the incentive program.", "isCorrect": false, "rationale": "While important, this question is not primarily about administrative ease, but about potential behavioral responses."}, {"text": "The potential for agents to exploit loopholes or unintended pathways to maximize rewards.", "isCorrect": true, "rationale": "This question directly addresses the core issue of perverse incentives, which is that agents will find 'other behaviors' (like gaming the proxy) to get the reward, even if it undermines the true goal."}, {"text": "The long-term sustainability and cost-effectiveness of the incentive.", "isCorrect": false, "rationale": "This question is about anticipating behavioral responses to incentives, not directly about fiscal sustainability."}, {"text": "The ethical implications of offering rewards for certain actions.", "isCorrect": false, "rationale": "While ethical considerations are relevant to policy, the specific phrasing 'What other behaviors does it also reward?' focuses on anticipating unintended behavioral consequences, not solely ethics."}], "id": "q09"}, {"question": "How do \"welfare cliffs\" exemplify the concept of perverse incentives and the Cobra Effect?", "options": [{"text": "They encourage individuals to seek higher-paying jobs to escape poverty entirely.", "isCorrect": false, "rationale": "This is the intended goal of programs supporting employment, but welfare cliffs create a perverse incentive against this behavior."}, {"text": "They create a disincentive to earn more income, as doing so can lead to a net financial loss.", "isCorrect": true, "rationale": "The text states: 'The incentive structure penalizes the very behavior (earning more) that the program is supposed to encourage,' leading to a situation where earning more (the proxy for self-sufficiency) results in a loss of benefits, making the actual goal (financial independence) harder to achieve."}, {"text": "They are a direct result of government efforts to reduce the national debt.", "isCorrect": false, "rationale": "While budget constraints might inform policy, the 'welfare cliff' itself is a structural problem of incentive design, not primarily a debt reduction strategy."}, {"text": "They primarily affect individuals who are already wealthy and do not need assistance.", "isCorrect": false, "rationale": "Welfare cliffs affect individuals transitioning from social benefits to higher earnings, typically those moving out of poverty, not the wealthy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
