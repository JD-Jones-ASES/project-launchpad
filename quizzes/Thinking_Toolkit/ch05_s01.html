<div class="quiz-container">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following scenarios best illustrates the anchoring effect as described by Tversky and Kahneman?", "options": [{"text": "A person remembers a long list of items by associating them with a vivid story.", "isCorrect": false, "rationale": "This describes a memory technique, not the anchoring effect, which relates to numerical judgments being influenced by an initial reference point."}, {"text": "A customer is willing to pay more for a used car after seeing its initial high asking price, even though they negotiate it down significantly.", "isCorrect": true, "rationale": "This scenario demonstrates anchoring because the initial high asking price serves as a reference point, pulling the customer's perceived value and final offer upwards, even if they adjust downwards from the anchor."}, {"text": "A student performs better on a test after being told they are expected to do well.", "isCorrect": false, "rationale": "This describes the Pygmalion effect or self-fulfilling prophecy, where expectations influence performance, not the numerical judgment bias of anchoring."}, {"text": "An individual consistently chooses the middle option when presented with three choices of varying value.", "isCorrect": false, "rationale": "This might relate to a 'compromise effect' or a tendency to avoid extremes, but it doesn't align with the definition of anchoring, which involves an initial number influencing subsequent judgments."}], "id": "q01"}, {"question": "According to the text, what is a key characteristic of an anchor that still allows it to exert influence on subsequent judgments?", "options": [{"text": "It must be logically relevant to the judgment being made.", "isCorrect": false, "rationale": "The text explicitly states that anchoring works 'even when the anchor is arbitrary, irrelevant, or known to be meaningless,' disproving the necessity for logical relevance."}, {"text": "Its origin must be unknown to the individual.", "isCorrect": false, "rationale": "Tversky and Kahneman's 1974 study involved a 'wheel of fortune' spun 'right in front of participants, who knew it was random,' yet it still influenced their answers, indicating the origin does not need to be unknown."}, {"text": "It must be presented by an authoritative figure.", "isCorrect": false, "rationale": "While an authoritative figure might strengthen an anchor's effect, the text does not state this as a necessary condition; arbitrary numbers from a random wheel also work."}, {"text": "It can be arbitrary or known to be meaningless.", "isCorrect": true, "rationale": "The text explicitly states: 'the first number you encounter becomes a reference point that pulls your subsequent judgment toward it, even when the anchor is arbitrary, irrelevant, or known to be meaningless.'"}], "id": "q02"}, {"question": "A real estate agent appraises a house at a higher value when it's initially listed at $700,000 compared to a different agent appraising the same house at $600,000 when it's initially listed at $500,000. Which mechanism, according to the text, primarily explains why the first agent's appraisal is higher?", "options": [{"text": "Confirmation bias, as they seek information confirming the high price.", "isCorrect": false, "rationale": "While confirmation bias can play a role in information processing, the text attributes this specific anchoring effect primarily to insufficient adjustment and selective accessibility, not confirmation bias as a standalone mechanism for the shift in appraisal."}, {"text": "Insufficient adjustment, where the agent starts from the high listing price but does not adjust their appraisal far enough downwards.", "isCorrect": true, "rationale": "The text explains insufficient adjustment as starting from the anchor (the high listing price) and adjusting away from it, but 'not far enough.' This directly applies to the real estate agent scenario described."}, {"text": "Loss aversion, as they fear losing the potential high commission.", "isCorrect": false, "rationale": "Loss aversion relates to a stronger preference for avoiding losses over acquiring equivalent gains, and while linked to reference points, it's not given as a primary mechanism for the anchoring effect itself in this context."}, {"text": "Status quo bias, favoring the initial state of the market.", "isCorrect": false, "rationale": "Status quo bias refers to a preference for the current state of affairs and is mentioned as a related concept for how the current state serves as an anchor, but it is not one of the two main mechanisms for anchoring itself given in the text."}], "id": "q03"}, {"question": "Which of the following best exemplifies the 'selective accessibility' mechanism of anchoring?", "options": [{"text": "An expert witness gives a biased testimony to align with the prosecutor's initial claim.", "isCorrect": false, "rationale": "This scenario suggests intentional bias or persuasion, which is distinct from the automatic cognitive process of selective accessibility described for anchoring."}, {"text": "A person, after hearing '65%' as a possible percentage of African countries in the UN, automatically thinks of reasons why that number might be plausible, such as the large number of countries in Africa.", "isCorrect": true, "rationale": "This directly matches the text's explanation of selective accessibility: 'the anchor activates information in your memory that is consistent with it. When you hear “65%,” your mind automatically retrieves reasons why the number might be high... making the anchor feel more plausible than it is.'"}, {"text": "A judge consciously decides to hand down a longer sentence because they feel the initial high suggestion aligns with their own punitive philosophy.", "isCorrect": false, "rationale": "This describes a conscious decision based on personal philosophy, not the automatic, often unconscious, activation of consistent information in memory as explained by selective accessibility."}, {"text": "A negotiator refuses to budge from their initial offer, even when presented with compelling counter-arguments.", "isCorrect": false, "rationale": "This describes stubbornness or commitment to an initial position, rather than the cognitive mechanism of activating memory consistent with an anchor."}], "id": "q04"}, {"question": "In a salary negotiation, why does the text suggest it is advantageous for a job candidate to make a high salary expectation early in the process?", "options": [{"text": "It demonstrates confidence and a strong work ethic.", "isCorrect": false, "rationale": "While it might convey confidence, the text specifically attributes the advantage to the anchoring effect: 'The initial number anchors the entire conversation, and subsequent counteroffers adjust insufficiently away from it.'"}, {"text": "It ensures the employer perceives the candidate as highly qualified.", "isCorrect": false, "rationale": "Perception of qualification is important, but the text's reason for the advantage of a high opening offer is rooted in the anchoring effect on the negotiation itself, not directly on perceived qualification."}, {"text": "The high number will serve as an anchor, pulling the final offer upwards.", "isCorrect": true, "rationale": "The text states, 'Job candidates who name a high salary expectation early in the negotiation process tend to receive higher final offers... The initial number anchors the entire conversation, and subsequent counteroffers adjust insufficiently away from it.'"}, {"text": "It allows the candidate to dictate the terms of employment beyond just salary.", "isCorrect": false, "rationale": "The text focuses specifically on the salary offer being pulled upwards due to the anchor, not broader terms of employment."}], "id": "q05"}, {"question": "A charitable organization lists suggested donation amounts as $250, $500, $1,000, and $2,500. Another organization, with an identical mission, lists $10, $25, $50, and $100. Based on the concept of anchoring, what is the most likely outcome?", "options": [{"text": "Donors to the first organization will likely feel less generous due to the high suggested amounts.", "isCorrect": false, "rationale": "The text indicates the opposite: higher suggested amounts serve as a higher anchor, leading people to give more because the 'normal' contribution feels higher."}, {"text": "Donors to the second organization will likely feel more compelled to give because the amounts are more accessible.", "isCorrect": false, "rationale": "While accessibility might encourage participation, the anchoring effect suggests that the lower suggested amounts will result in lower average donations, as the 'normal' contribution is anchored lower."}, {"text": "The first organization will likely receive higher average donations.", "isCorrect": true, "rationale": "The text states: 'When a donation form suggests amounts of $50, $100, $250, and $500, people give more than when the same form suggests $10, $25, $50, and $100. The suggested amounts anchor the donor's sense of what a “normal” contribution looks like.'"}, {"text": "There will be no significant difference in average donation amounts, as donors give based on personal capacity.", "isCorrect": false, "rationale": "This contradicts the core finding of anchoring, which demonstrates that even arbitrary numbers influence judgments, including charitable giving."}], "id": "q06"}, {"question": "What is the 'antidote' suggested in the text to counteract the anchoring effect?", "options": [{"text": "Always consult with an expert before making a judgment.", "isCorrect": false, "rationale": "While expert advice can be valuable, the text notes that anchoring 'works on experts as well as novices,' so this is not the specific antidote proposed."}, {"text": "Delay your decision-making process to allow time for the anchor to fade.", "isCorrect": false, "rationale": "The text does not suggest delaying decisions as an antidote; it focuses on a cognitive check before reacting to the number."}, {"text": "Ask yourself, 'Would I have come up with this number independently?'", "isCorrect": true, "rationale": "The text explicitly states this as the antidote: 'The antidote: before reacting to any number, ask yourself, “Would I have come up with this number independently?”'"}, {"text": "Seek out as many different numbers as possible to broaden your reference points.", "isCorrect": false, "rationale": "While seeking information is generally good, simply encountering more numbers doesn't necessarily neutralize the first anchor; the antidote requires a specific self-reflection."}], "id": "q07"}, {"question": "Retailers frequently cross out an 'original price' next to a lower 'sale price.' How does the anchoring effect explain the effectiveness of this strategy?", "options": [{"text": "It creates a sense of urgency, encouraging immediate purchase.", "isCorrect": false, "rationale": "While it can contribute to urgency, the primary explanation given in the text for this tactic is anchoring: 'The 'original price' crossed out next to the 'sale price' is an anchor... The anchor makes the sale price seem low by comparison, regardless of the item's actual value.'"}, {"text": "It suggests the item is of higher quality than its current price indicates.", "isCorrect": false, "rationale": "Quality inference might occur, but the text focuses on the perception of the sale price as a bargain due to comparison with the anchor."}, {"text": "The higher 'original price' acts as an anchor, making the sale price appear to be a better deal by redefining what feels 'reasonable.'", "isCorrect": true, "rationale": "The text explains this directly: 'The anchor makes the sale price seem low by comparison, regardless of the item's actual value.' and 'The anchor redefines what feels “reasonable.”'"}, {"text": "Customers are inherently drawn to discounts, regardless of the original price.", "isCorrect": false, "rationale": "While customers like discounts, the text specifically attributes the *degree* of perceived bargain to the anchoring effect of the original price, not just the presence of a discount."}], "id": "q08"}, {"question": "The text states that 'The effect is astonishingly robust.' What evidence is provided to support this claim?", "options": [{"text": "It primarily influences individuals who are unfamiliar with negotiation tactics.", "isCorrect": false, "rationale": "The text explicitly refutes this by stating it 'works on experts as well as novices' and gives examples like experienced negotiators being anchored."}, {"text": "It has been replicated hundreds of times across diverse populations and domains, affecting experts like real estate agents and judges.", "isCorrect": true, "rationale": "The text states it 'has since been replicated hundreds of times across cultures, professions, and domains' and provides examples of its effect on 'experts as well as novices' including 'Real estate agents' and 'Judges'."}, {"text": "It is a newly discovered phenomenon that researchers are still trying to understand.", "isCorrect": false, "rationale": "The effect was 'Demonstrated experimentally by Amos Tversky and Daniel Kahneman in 1974,' indicating it's not newly discovered."}, {"text": "Its influence is limited to laboratory settings and rarely observed in real-world situations.", "isCorrect": false, "rationale": "The text provides numerous 'realworld' examples like salary negotiations, charitable giving, and retail pricing, demonstrating its applicability beyond laboratories."}], "id": "q09"}, {"question": "Consider a situation where a used car salesperson starts negotiations for a car at a very high price. Even if the buyer knows the price is exaggerated, they might still end up paying more than they initially intended. Which statement best analyzes the cognitive process occurring in the buyer?", "options": [{"text": "The buyer is trying to establish a good relationship with the salesperson by agreeing to a higher price.", "isCorrect": false, "rationale": "While social dynamics exist, the text's focus is on the cognitive bias of anchoring, not the buyer's attempt at relationship building as the primary driver of the higher payment."}, {"text": "The buyer's final offer is likely pulled upwards by the salesperson's initial high price, as their adjustments away from it are insufficient.", "isCorrect": true, "rationale": "This aligns perfectly with the mechanism of 'insufficient adjustment' where the buyer starts from the anchor (the high initial price) and adjusts, but not far enough, leading to a higher final price."}, {"text": "The buyer is consciously valuing the car based on the high initial price, believing it reflects true market value.", "isCorrect": false, "rationale": "The text states that anchoring works 'even when the anchor is arbitrary, irrelevant, or known to be meaningless,' implying the buyer doesn't necessarily believe the anchor is the true value, but is still influenced by it."}, {"text": "The buyer is employing selective accessibility, retrieving memories of other expensive cars to justify the high price.", "isCorrect": false, "rationale": "While selective accessibility activates consistent information, the primary driver for *ending up paying more* when knowing the initial price is exaggerated points more strongly to insufficient adjustment from that high anchor, rather than the buyer actively justifying the high price to themselves post-anchor."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
