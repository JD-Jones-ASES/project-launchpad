<script>
var QUESTIONS = [{"question": "The core problem illustrated by the Prisoner's Dilemma is that:", "options": [{"text": "Two suspects are offered vastly different deals to confess to a crime.", "isCorrect": false, "rationale": "The text states that police offer 'each the same deal,' making this option incorrect."}, {"text": "Individual rational choices, when made by all parties, can lead to a collectively suboptimal outcome.", "isCorrect": true, "rationale": "The text explicitly states: 'Individual rationality has produced a collectively terrible outcome' and 'stability and optimality are not the same thing,' which is the central lesson of the dilemma."}, {"text": "Cooperation is always the most stable and optimal strategy in a one-shot game.", "isCorrect": false, "rationale": "In a one-shot game, defection is the dominant strategy leading to a stable (Nash equilibrium) but suboptimal outcome, not cooperation."}, {"text": "Players can always unilaterally improve their outcome even when at a Nash equilibrium.", "isCorrect": false, "rationale": "A Nash equilibrium is defined as a situation where 'no player can improve their outcome by unilaterally changing their strategy,' making this option incorrect."}]}, {"question": "Which of the following real-world situations best exemplifies the core conflict of the Prisoner's Dilemma?", "options": [{"text": "Two friends coordinating to meet at a specific time and place.", "isCorrect": false, "rationale": "This is a coordination problem where mutual success benefits both, rather than a dilemma where individual rationality leads to collective failure."}, {"text": "Competing companies choosing between cutting prices for market share or maintaining high prices for higher collective profit.", "isCorrect": true, "rationale": "The text directly uses 'Price wars' as an example: 'Two companies would both profit more by keeping prices high (cooperation). But each can gain market share by cutting prices (defection). When both cut prices, both earn less.'"}, {"text": "A single consumer deciding whether to buy a product or not based on its price.", "isCorrect": false, "rationale": "The Prisoner's Dilemma involves a strategic interaction between at least two parties with interdependent outcomes, not a single-player decision."}, {"text": "Countries signing a bilateral trade agreement to reduce tariffs.", "isCorrect": false, "rationale": "While negotiations might involve PD-like elements, the outcome here describes successful cooperation, which the Prisoner's Dilemma predicts is difficult to achieve without external mechanisms."}]}, {"question": "In the single-round Prisoner's Dilemma, why is betrayal (defection) considered the 'individually rational choice' for a suspect?", "options": [{"text": "Because betraying guarantees the suspect goes free, regardless of the partner's choice.", "isCorrect": false, "rationale": "The suspect only goes free if their partner stays silent; if both betray, they each get five years, so it's not a guaranteed freedom."}, {"text": "Because it always yields a better outcome for the individual player, regardless of what the other player chooses.", "isCorrect": true, "rationale": "The text states: 'No matter what your partner does, betrayal is the individually rational choice' because it leads to going free (vs. 1 year) if the partner cooperates, and 5 years (vs. 10 years) if the partner defects."}, {"text": "Because the police offer a better deal for betrayal than for silence in all circumstances.", "isCorrect": false, "rationale": "The *structure* of the deals makes betrayal rational, not just that betrayal is 'better' in all scenarios. If both stay silent, they get 1 year, which is better than betraying and getting 5 years if the partner also betrays."}, {"text": "Because it leads to the best collective outcome for both suspects combined.", "isCorrect": false, "rationale": "Mutual betrayal leads to both getting five years, which is worse than mutual cooperation where both get one year; thus, it's a collectively terrible outcome."}]}, {"question": "According to the text, what do the 'higher numbers' in the Prisoner's Dilemma payoff matrix represent?", "options": [{"text": "Longer prison sentences for the players.", "isCorrect": false, "rationale": "The text clarifies: 'Here, the numbers represent years avoided (higher is better),' meaning higher numbers are positive, not negative."}, {"text": "Better outcomes for the player, specifically years avoided.", "isCorrect": true, "rationale": "The text explicitly states: 'By convention, higher numbers represent better outcomes for the player. Here, the numbers represent years avoided (higher is better).'"}, {"text": "The probability of each player defecting.", "isCorrect": false, "rationale": "Payoff matrices illustrate the outcomes (payoffs) of choices, not the probabilities of those choices."}, {"text": "The number of rounds played in the game.", "isCorrect": false, "rationale": "The payoff matrix is typically for a single-round game, and the numbers represent outcomes, not game duration."}]}, {"question": "Which statement accurately describes a Nash equilibrium in the context of the Prisoner's Dilemma?", "options": [{"text": "It is the outcome where both players achieve their individually optimal result, which is also the best collective outcome.", "isCorrect": false, "rationale": "While it's individually rational, the Nash equilibrium in the Prisoner's Dilemma (mutual defection) is a 'collectively terrible outcome,' not the best collective outcome."}, {"text": "It is a stable outcome from which no player can improve their result by changing their strategy alone.", "isCorrect": true, "rationale": "The text defines it as 'a situation in which no player can improve their outcome by unilaterally changing their strategy,' and further notes it is the 'stable outcome'."}, {"text": "It represents the best possible outcome for both players combined, often involving mutual cooperation.", "isCorrect": false, "rationale": "The text states: 'The Nash equilibrium is not the best outcome. It is the stable outcome.' Mutual cooperation (1 year each) is better than the Nash equilibrium of mutual defection (5 years each)."}, {"text": "It is only achievable if players have perfect information about each other's intentions before making a move.", "isCorrect": false, "rationale": "The concept of Nash equilibrium holds even when players do not know each other's move beforehand, as long as they are rational and assume the other player is also rational."}]}, {"question": "Considering the typical payoff structure of the Prisoner's Dilemma, what is identified as the 'dominant strategy' for each player?", "options": [{"text": "Mutual cooperation, as it leads to the best collective outcome.", "isCorrect": false, "rationale": "While mutual cooperation leads to the best collective outcome, defection is the dominant strategy because it always yields a better individual payoff regardless of the other's action."}, {"text": "Staying silent, because it carries the lowest individual risk.", "isCorrect": false, "rationale": "Staying silent carries the risk of getting ten years if the partner defects, which is the worst possible individual outcome."}, {"text": "Betrayal (defection), because it yields a better outcome for the player regardless of the other player's choice.", "isCorrect": true, "rationale": "The text states: 'defection is the 'dominant strategy' — it produces a better outcome for you regardless of what the other player does.'"}, {"text": "A random choice, as neither cooperation nor defection offers a clear advantage.", "isCorrect": false, "rationale": "There is a clear individual advantage to defection, making it the dominant strategy for a rational actor."}]}, {"question": "How does the 'iterated' Prisoner's Dilemma fundamentally change the strategic landscape compared to a single-round game?", "options": [{"text": "It eliminates the incentive for defection entirely.", "isCorrect": false, "rationale": "The incentive to defect still exists, but the long-term consequences of defection in repeated interactions make cooperation a viable, and often superior, strategy."}, {"text": "It allows for the possibility that cooperation can become a rational strategy.", "isCorrect": true, "rationale": "The text states: 'When the game is played many times, the situation changes dramatically' and concludes that 'Under the right conditions...cooperation is the rational strategy.'"}, {"text": "It ensures that the Nash equilibrium will always lead to the best collective outcome.", "isCorrect": false, "rationale": "The Nash equilibrium of the single-round game (mutual defection) is still suboptimal. The iterated game provides conditions to *escape* this equilibrium, not change its fundamental nature."}, {"text": "It removes the anonymity between players, making it impossible to defect.", "isCorrect": false, "rationale": "While it reduces anonymity (allowing reputation to develop), it does not make defection impossible; it just changes the incentives associated with it."}]}, {"question": "The 'tit-for-tat' strategy was successful in Robert Axelrod's tournament primarily because it embodies which combination of characteristics?", "options": [{"text": "Constant defection, to maximize individual gains at every opportunity.", "isCorrect": false, "rationale": "Tit-for-tat starts with cooperation and only defects in response to an opponent's defection, making this option incorrect."}, {"text": "Aggressive retaliation, never forgiving a defection once it occurs.", "isCorrect": false, "rationale": "Tit-for-tat is 'Forgiving,' returning to cooperation after the other player does, not holding grudges."}, {"text": "Initial cooperation, immediate retaliation for defection, and quick forgiveness.", "isCorrect": true, "rationale": "The text describes tit-for-tat as: 'Cooperate on the first round...After that, do whatever the other player did on the previous round.' It 'starts friendly, retaliates immediately...forgives immediately...and is completely transparent.'"}, {"text": "Extreme complexity, making it difficult for opponents to predict its moves.", "isCorrect": false, "rationale": "The text states 'Clear. Their behavior is predictable and easy for the other player to understand. Complexity breeds suspicion,' which is the opposite of tit-for-tat's characteristic."}]}, {"question": "According to the text, which of the following scenarios would most likely lead to the breakdown of cooperation in an iterated Prisoner's Dilemma?", "options": [{"text": "A situation where both players commit to a strategy of 'tit-for-tat.'", "isCorrect": false, "rationale": "Tit-for-tat is a highly successful strategy for *promoting* cooperation in iterated dilemmas."}, {"text": "An interaction where players can easily identify each other and track past behaviors.", "isCorrect": false, "rationale": "The ability to identify players and track behavior (reputation) is a condition that *supports* cooperation, as tit-for-tat relies on it."}, {"text": "A game where both players know the exact round on which the interaction will definitively end.", "isCorrect": true, "rationale": "The text describes this as 'A known endpoint,' leading to the 'backward induction problem,' where defection becomes rational in the last round, and this logic unravels backward to the first round, breaking cooperation."}, {"text": "An environment where the payoffs for cooperation are significantly higher than for defection.", "isCorrect": false, "rationale": "Higher payoffs for cooperation, while still maintaining the dilemma structure, would encourage cooperation rather than lead to its breakdown."}]}, {"question": "What is the fundamental insight the Prisoner's Dilemma offers about individual rationality and collective outcomes?", "options": [{"text": "Rational individuals will always prioritize the collective good over their self-interest.", "isCorrect": false, "rationale": "The Prisoner's Dilemma demonstrates the opposite: individual self-interest (defection) leads to a worse collective outcome (mutual defection)."}, {"text": "Perfect information and communication are sufficient to ensure optimal collective outcomes in any strategic interaction.", "isCorrect": false, "rationale": "While helpful, the core dilemma exists even with perfect information about the payoff structure. The problem is the incentive structure itself."}, {"text": "Individual rational choices, when aggregated, can result in an outcome that is worse for everyone involved than a cooperative alternative.", "isCorrect": true, "rationale": "The text states: 'Individual rationality has produced a collectively terrible outcome. If they had both stayed silent, they would each have served only one year.' This directly supports the idea that stable, individually rational choices can lead to suboptimal collective results."}, {"text": "Trust is an inherent human trait that reliably leads to cooperation in all strategic games.", "isCorrect": false, "rationale": "The text concludes: 'Trust is not automatic; it must be built, maintained, and protected,' implying it's not inherent or always reliable."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
