        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Edward Lorenz's discovery of the Butterfly Effect originated from a seemingly minor change in his weather simulation. What was this change?", "options": [{"text": "He deliberately introduced a random variable to test its impact on long-term forecasts.", "isCorrect": false, "rationale": "Lorenz's discovery was accidental, not deliberate random variable introduction. He was trying to save time by restarting a simulation."}, {"text": "He used rounded numbers from a printout as initial conditions, which differed minutely from the computer's internal precision.", "isCorrect": true, "rationale": "The text states, 'But the printout had rounded the numbers to three decimal places, while the computer used six. The difference — less than one part in a thousand — should have been trivial. Instead, the weather patterns diverged completely.'"}, {"text": "He changed the mathematical model used for the simulation partway through, causing divergence.", "isCorrect": false, "rationale": "The text indicates he was restarting the simulation using the same model, but with slightly different initial data due to rounding, not a change in the model itself."}, {"text": "The computer experienced a hardware malfunction, introducing errors into the calculations.", "isCorrect": false, "rationale": "The text attributes the divergence to the difference in input precision, not a hardware malfunction."}]}, {"question": "Which statement best describes 'chaos' in the mathematical sense, as presented in the text, in relation to the Butterfly Effect?", "options": [{"text": "It implies that systems are inherently random and unpredictable due to a lack of underlying rules.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not randomness. Chaos, in the mathematical sense, is fully deterministic — every state follows inevitably from the previous state according to fixed rules.'"}, {"text": "It refers to systems where future states are entirely arbitrary and bear no relation to previous conditions.", "isCorrect": false, "rationale": "Mathematical chaos is deterministic; future states are entirely dependent on previous conditions, just not predictably over the long term due to amplification of small differences."}, {"text": "It describes deterministic systems where small initial differences amplify exponentially, making long-term prediction practically impossible.", "isCorrect": true, "rationale": "The text defines chaos as fully deterministic, following fixed rules, but with rapid amplification of small differences, making long-term prediction impossible. This is the essence of sensitive dependence on initial conditions."}, {"text": "It suggests that systems are predictable only if infinite computational power is applied to forecast every possible outcome.", "isCorrect": false, "rationale": "While infinite precision would be needed for perfect long-term prediction, the definition of chaos itself focuses on the amplification of differences in deterministic systems, not simply the need for infinite power to predict outcomes."}]}, {"question": "According to the text, what is a key limitation of long-term weather forecasting due to the Butterfly Effect?", "options": [{"text": "Current weather models are fundamentally flawed and cannot accurately represent atmospheric processes.", "isCorrect": false, "rationale": "The limitation is not attributed to flawed models but to the inherent nature of chaotic systems and sensitive dependence, regardless of model quality."}, {"text": "There are not enough weather sensors globally to gather the necessary data for accurate predictions.", "isCorrect": false, "rationale": "While data collection is important, the text emphasizes that even with perfect data, the exponential amplification of tiny initial differences makes long-term specific prediction impossible."}, {"text": "The atmosphere amplifies tiny initial perturbations so rapidly that specific prediction becomes impossible beyond about ten days.", "isCorrect": true, "rationale": "The text explicitly states: 'Weather can be forecast reasonably well for about ten days. Beyond that, the sensitivity to initial conditions makes specific prediction impossible.'"}, {"text": "Human intervention, such as cloud seeding, constantly alters weather patterns unpredictably.", "isCorrect": false, "rationale": "The text does not mention human intervention as the primary cause for the limits of long-term weather prediction; it focuses on the intrinsic properties of the atmospheric system."}]}, {"question": "The text states that the magnitude of the cause bears no reliable relationship to the magnitude of the effect in systems exhibiting sensitive dependence. Which of the following examples best illustrates this principle?", "options": [{"text": "A large asteroid impact causing a global extinction event.", "isCorrect": false, "rationale": "This example shows a large cause leading to a large effect, which is a proportional relationship, not the disproportionality central to sensitive dependence."}, {"text": "A minor policy change altering incentives that eventually transforms an entire market.", "isCorrect": true, "rationale": "The text provides this as an example: 'A minor policy change alters incentives that shift behavior that transforms a market.' This clearly shows a small cause (minor policy change) leading to a vast effect (transformed market)."}, {"text": "A building collapsing due to structural fatigue over many years.", "isCorrect": false, "rationale": "This describes a cumulative process where a long-term cause leads to an effect, rather than a small, isolated cause having a disproportionately large, cascading effect."}, {"text": "An earthquake causing extensive damage in a specific region.", "isCorrect": false, "rationale": "An earthquake is a significant event with significant, localized effects. This does not exemplify a tiny cause leading to a vast, cascading, and unpredictable outcome across a system."}]}, {"question": "Considering the implications of the Butterfly Effect for planning, what is the recommended approach?", "options": [{"text": "Focus on gathering infinitely precise data to achieve perfect long-term predictions for specific outcomes.", "isCorrect": false, "rationale": "The text explicitly states that 'To predict the weather perfectly for a month, you would need to know the current state of the atmosphere with essentially infinite precision,' implying this is practically impossible and therefore not a viable planning strategy."}, {"text": "Assume randomness and avoid any long-term planning, as all efforts will be futile.", "isCorrect": false, "rationale": "The text clarifies: 'This does not mean that everything is random or that planning is futile.' It advocates for a different *kind* of planning, not abandoning it."}, {"text": "Build systems that are robust to surprise and perform well across a range of potential future scenarios.", "isCorrect": true, "rationale": "The text advises: 'Instead of betting everything on one specific forecast, build systems that perform reasonably well across a range of scenarios. Instead of trying to predict the future with precision, prepare for the possibility that the future will look nothing like your prediction.'"}, {"text": "Limit planning to very short time horizons where specific predictions are still relatively accurate.", "isCorrect": false, "rationale": "While short-term prediction is possible, the text's core message about planning is not to *limit* it, but to *adapt* the *nature* of long-term planning to account for unpredictability."}]}, {"question": "The 'Lorenz attractor' is mentioned as an icon of chaos theory. What does this refer to?", "options": [{"text": "A mathematical model designed to precisely predict the long-term behavior of weather systems.", "isCorrect": false, "rationale": "The Lorenz attractor illustrates the *chaotic* nature of systems, showing how trajectories diverge, which is antithetical to precise long-term prediction."}, {"text": "The butterfly-shaped pattern traced by Lorenz's equations in three-dimensional space, demonstrating sensitive dependence.", "isCorrect": true, "rationale": "The 'personbox' states: 'The “Lorenz attractor” — the butterfly-shaped pattern traced by his equations in three-dimensional space — became an icon of chaos theory.'"}, {"text": "A theoretical device used to measure the exact initial conditions of any complex system.", "isCorrect": false, "rationale": "The Lorenz attractor is a mathematical visualization, not a physical measuring device. The text implies infinite precision is practically impossible to achieve."}, {"text": "A metaphor for the powerful influence of a single, small event on a global scale.", "isCorrect": false, "rationale": "While the Butterfly Effect itself is a metaphor for this influence, the Lorenz attractor is a specific mathematical construct, not just a metaphor for the influence."}]}, {"question": "How does the real-world example of Archduke Franz Ferdinand's assassination illustrate the Butterfly Effect?", "options": [{"text": "It shows how a powerful individual's death inevitably leads to large-scale conflict.", "isCorrect": false, "rationale": "The text emphasizes the 'wrong turn by a driver' as the 'butterfly's wing,' highlighting the small, chance event that amplified, not the inevitability of conflict from a powerful individual's death."}, {"text": "It demonstrates that global events are entirely random and without underlying causes.", "isCorrect": false, "rationale": "The Butterfly Effect is not about randomness; it's about deterministic chaos where small causes amplify. The assassination had clear causes but was affected by a tiny, chance event."}, {"text": "A seemingly insignificant event, a driver's wrong turn, triggered a chain of interactions that vastly altered the course of history.", "isCorrect": true, "rationale": "The text states: 'A wrong turn by a driver — a butterfly's wing — and the entire twentieth century unfolded differently than it might have.' This exemplifies a tiny cause leading to vast, amplified effects."}, {"text": "It proves that historical events are always predictable if all political alliances are known.", "isCorrect": false, "rationale": "The example serves to show how an unpredictable, tiny event can derail even seemingly determined paths, making specific long-term prediction difficult, even with knowledge of alliances."}]}, {"question": "The text suggests that understanding the Butterfly Effect means we can talk about 'climate' but not 'weather' in the distant future. What is the fundamental difference being highlighted here?", "options": [{"text": "Climate refers to short-term, specific atmospheric conditions, while weather is long-term statistical patterns.", "isCorrect": false, "rationale": "This statement reverses the definitions. Weather is specific conditions on a specific day, and climate is long-term statistical patterns."}, {"text": "Climate involves human-caused changes, whereas weather is purely natural phenomena.", "isCorrect": false, "rationale": "The distinction in the text relates to predictability based on sensitive dependence, not the origin of atmospheric phenomena."}, {"text": "Climate focuses on predictable, general long-term statistical patterns, while weather concerns specific, unpredictable conditions on a future day.", "isCorrect": true, "rationale": "The text states: 'We can talk about climate (long-term statistical patterns) but not about weather (specific conditions on a specific day far in the future).' This highlights the distinction between predicting aggregate trends versus exact individual outcomes."}, {"text": "Weather can be influenced by feedback loops, but climate is immune to them.", "isCorrect": false, "rationale": "Both weather and climate systems involve feedback loops. The core distinction here is about the ability to make specific predictions versus statistical patterns in the face of chaos."}]}, {"question": "What core characteristic of chaotic systems, as described by the Butterfly Effect, makes long-term specific prediction impossible even when the system is deterministic?", "options": [{"text": "The existence of external, unpredictable forces constantly disrupting the system.", "isCorrect": false, "rationale": "The text focuses on internal dynamics: 'the system amplifies small differences so rapidly,' not external forces as the primary reason for impossible prediction."}, {"text": "The inherent randomness that governs the transitions between states.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not randomness. Chaos, in the mathematical sense, is fully deterministic.'"}, {"text": "The gradual accumulation of small differences over time, leading to minor deviations.", "isCorrect": false, "rationale": "The text emphasizes 'exponential' amplification and 'vastly different outcomes,' not gradual accumulation or minor deviations."}, {"text": "The exponential amplification of tiny differences in initial conditions, leading to vastly different outcomes over time.", "isCorrect": true, "rationale": "The 'keyconcept' box clearly states: 'In chaotic systems, tiny differences in starting conditions amplify exponentially over time, producing dramatically different outcomes. This makes long-term specific prediction impossible, even when the system is fully deterministic.'"}]}, {"question": "Which of the following scenarios is LEAST likely to exhibit the characteristics of sensitive dependence on initial conditions, as described by the Butterfly Effect?", "options": [{"text": "The long-term trajectory of a financial market following a minor regulatory change.", "isCorrect": false, "rationale": "The text explicitly mentions 'Financial markets' and 'A minor policy change alters incentives that shift behavior that transforms a market' as examples of systems exhibiting sensitive dependence."}, {"text": "The specific path of a social movement after an offhand remark by a public figure.", "isCorrect": false, "rationale": "The text includes 'social movements, and political events' and 'An offhand remark by a public figure goes viral and changes the course of an election' as examples, fitting the pattern of sensitive dependence."}, {"text": "The precise conditions of local weather two months from now.", "isCorrect": false, "rationale": "The text extensively uses weather forecasting as the primary example of a system exhibiting sensitive dependence, with long-term specific prediction being impossible beyond ~10 days."}, {"text": "The exact time an object dropped from a fixed height will hit the ground, neglecting air resistance.", "isCorrect": true, "rationale": "This scenario describes a simple, predictable physical system governed by basic laws (e.g., gravity), where initial conditions (height) directly and predictably determine the outcome without exponential amplification of tiny perturbations. It's not a complex, interconnected system typically associated with the Butterfly Effect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
