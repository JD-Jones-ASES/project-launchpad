        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the central claim of Arrow's Impossibility Theorem regarding collective decision-making?", "options": [{"text": "Democracy is inherently flawed and should be abandoned as a form of governance.", "isCorrect": false, "rationale": "The text explicitly states, 'The theorem does not say that democracy is impossible or that voting is pointless.' Instead, it highlights trade-offs."}, {"text": "For three or more options, no voting system can simultaneously satisfy a set of reasonable fairness conditions.", "isCorrect": true, "rationale": "This accurately summarizes Arrow's central claim: no 'perfect' voting system exists that can meet Unanimity, Non-dictatorship, and Independence of Irrelevant Alternatives when there are three or more choices."}, {"text": "Simple majority voting is the most effective system for aggregating individual preferences into a collective decision.", "isCorrect": false, "rationale": "The text demonstrates that simple majority voting can lead to preference cycles, showing it's not always effective or 'perfect' and violates requirements related to IIA."}, {"text": "Individual preferences cannot be aggregated into a group ranking under any circumstances.", "isCorrect": false, "rationale": "The theorem states that aggregation is possible, but not without violating at least one of the core fairness conditions. It doesn't claim impossibility of *any* aggregation, but of *perfect* aggregation."}], "id": "q01"}, {"question": "In which of the following scenarios would Arrow's Impossibility Theorem most directly apply?", "options": [{"text": "A single person deciding which of two movies to watch for entertainment.", "isCorrect": false, "rationale": "Arrow's theorem applies to group decisions involving 'three or more options' and multiple voters, not a single individual choosing between two options."}, {"text": "A committee of five members selecting one of four qualified candidates for a job opening.", "isCorrect": true, "rationale": "This scenario involves a group (committee) making a collective decision among 'three or more options' (four candidates), which is precisely the context where Arrow's theorem applies."}, {"text": "A country holding a national referendum on whether to approve a single new constitutional amendment.", "isCorrect": false, "rationale": "A referendum on a single amendment typically presents only two options (yes/no), which falls outside the 'three or more options' condition of the theorem."}, {"text": "A chef choosing ingredients for a new dish from a vast pantry based on personal taste.", "isCorrect": false, "rationale": "This involves a single decision-maker, not a group aggregating preferences, making it irrelevant to Arrow's theorem."}], "id": "q02"}, {"question": "According to Arrow's Impossibility Theorem, the Unanimity (Pareto) condition requires that:", "options": [{"text": "The group's preference between any two options is entirely independent of a third, 'irrelevant' option.", "isCorrect": false, "rationale": "This describes the Independence of Irrelevant Alternatives (IIA) condition, not Unanimity."}, {"text": "No single voter's preferences should automatically determine the group's overall ranking.", "isCorrect": false, "rationale": "This describes the Non-dictatorship condition, not Unanimity."}, {"text": "If every single voter prefers option A to option B, then the collective group ranking must place A above B.", "isCorrect": true, "rationale": "The Unanimity (Pareto) condition explicitly states: 'If every voter prefers option A to option B, the group ranking should place A above B.'"}, {"text": "The outcome of any voting system must always result in a clear and undisputed winner.", "isCorrect": false, "rationale": "While a desired outcome, this is not one of Arrow's specific conditions. Preference cycles, which violate principles related to IIA, can prevent a clear winner."}], "id": "q03"}, {"question": "The Independence of Irrelevant Alternatives (IIA) condition, as defined by Arrow, implies that:", "options": [{"text": "All voters must independently decide their preferences without any external influence or campaigning.", "isCorrect": false, "rationale": "This relates to individual autonomy but is not the definition of IIA in Arrow's theorem."}, {"text": "The introduction or removal of a third, less preferred option should not change the group's relative ranking of the two primary options.", "isCorrect": true, "rationale": "IIA states that 'The group's ranking of A versus B should depend only on individual preferences between A and B — not on how voters feel about some third option C.' This means an 'irrelevant' alternative shouldn't impact the relative ordering of two others."}, {"text": "The group's decision-making process should be free from any irrelevant information or biases.", "isCorrect": false, "rationale": "While a general principle of fairness, this is a broader concept than the specific, technical definition of IIA in Arrow's theorem concerning pair-wise rankings."}, {"text": "Only options deemed 'relevant' by a majority of voters should be included in the final ballot.", "isCorrect": false, "rationale": "IIA concerns the *impact* of a third option on the relative ranking of two others, not the initial inclusion of options on a ballot."}], "id": "q04"}, {"question": "When simple majority voting leads to preference cycles, as illustrated in the dinner example (Italian beats Thai, Thai beats Mexican, but Mexican beats Italian), which of Arrow's conditions is most directly implicated as being difficult or impossible to satisfy for a coherent group ranking?", "options": [{"text": "Unanimity (Pareto)", "isCorrect": false, "rationale": "Simple majority voting typically satisfies the Unanimity condition, as if everyone prefers A to B, A will win in a head-to-head vote."}, {"text": "Non-dictatorship", "isCorrect": false, "rationale": "Simple majority voting generally satisfies Non-dictatorship, as no single voter's preferences automatically dictate the outcome."}, {"text": "Independence of Irrelevant Alternatives (IIA)", "isCorrect": true, "rationale": "The text explicitly links preference cycles to violating 'the requirement for a coherent ranking, which relates to IIA.' The Condorcet Paradox, a form of cycling, demonstrates how the relative preference between two options can depend on the presence or ranking of a third 'irrelevant' option."}, {"text": "The ability to reach any collective decision.", "isCorrect": false, "rationale": "While preference cycles make a 'clear' decision difficult, the specific condition that aims to prevent such inconsistencies, where the ranking of A vs B is stable regardless of C, is IIA."}], "id": "q05"}, {"question": "A theoretical voting system structured as a pure dictatorship would satisfy the Unanimity and Independence of Irrelevant Alternatives (IIA) conditions, but would fundamentally violate which other condition?", "options": [{"text": "Non-dictatorship", "isCorrect": true, "rationale": "By definition, a dictatorship violates the Non-dictatorship condition, as one person's preferences automatically determine the group ranking. The text explicitly states, 'A dictatorship satisfies unanimity and IIA, but violates non-dictatorship.'"}, {"text": "Unanimity (Pareto)", "isCorrect": false, "rationale": "A dictator's preferences would reflect unanimous preferences if the dictator happened to share them, and the system would consistently produce an outcome if everyone agreed on a pair, thus satisfying Unanimity for any given pair."}, {"text": "Independence of Irrelevant Alternatives (IIA)", "isCorrect": false, "rationale": "A dictator's ranking of A vs B would depend only on the dictator's preferences for A vs B, irrespective of C, thus satisfying IIA."}, {"text": "The ability to produce a coherent group ranking.", "isCorrect": false, "rationale": "A dictatorship produces a perfectly coherent group ranking (the dictator's own ranking); the problem is whose preferences it represents."}], "id": "q06"}, {"question": "What is a key practical implication of Arrow's Impossibility Theorem regarding the search for an 'ideal' or 'perfect' voting system?", "options": [{"text": "A sufficiently complex voting algorithm could eventually overcome the theorem's limitations and find a perfect system.", "isCorrect": false, "rationale": "The theorem proves a mathematical impossibility, implying no algorithm, regardless of complexity, can bypass its findings for three or more options. The search for a 'perfect' system is 'provably futile'."}, {"text": "The theorem encourages the continuous development of new voting systems until a single, universally fair one is discovered.", "isCorrect": false, "rationale": "On the contrary, the theorem suggests that no such 'universally fair' or 'perfect' system exists, making the search for one futile."}, {"text": "It proves that no voting system can simultaneously achieve all desirable fairness criteria when there are three or more choices, necessitating trade-offs.", "isCorrect": true, "rationale": "This is the core implication: 'Every voting system involves trade-offs, and that the search for a “perfect” system is provably futile.' It highlights the necessity of choosing which conditions to prioritize."}, {"text": "The theorem only applies to very specific, theoretical voting scenarios and has little relevance to real-world political systems.", "isCorrect": false, "rationale": "The text states that the result 'matters far beyond academic political science' and applies to corporate boards, committees, and families."}], "id": "q07"}, {"question": "Why is the condition of 'three or more options' crucial for Arrow's Impossibility Theorem to hold true?", "options": [{"text": "With only two options, it is possible for a voting system to satisfy all three of Arrow's conditions simultaneously.", "isCorrect": true, "rationale": "The complexities like preference cycles (Condorcet Paradox), which the theorem generalizes, typically arise with three or more options. With only two options, a simple majority rule can satisfy all conditions without encountering such paradoxes."}, {"text": "Voters are generally incapable of consistently ranking more than two options without making errors.", "isCorrect": false, "rationale": "The theorem focuses on the aggregation mechanism's properties, not the cognitive abilities of individual voters."}, {"text": "The mathematical complexity of calculating outcomes increases exponentially with more than two options.", "isCorrect": false, "rationale": "While complexity does increase, the core issue is the mathematical impossibility of satisfying all conditions simultaneously, not merely the difficulty of computation."}, {"text": "The theorem only applies to scenarios where a clear majority for any single option is impossible to achieve.", "isCorrect": false, "rationale": "The theorem is about the conflict between specific fairness conditions, not solely the absence of a majority, although cycles can prevent a majority winner."}], "id": "q08"}, {"question": "How does Arrow's Impossibility Theorem relate to the Condorcet Paradox?", "options": [{"text": "Arrow's theorem disproves the existence of the Condorcet Paradox by offering a more robust voting solution.", "isCorrect": false, "rationale": "Arrow's theorem does not disprove the Condorcet Paradox; rather, it formalizes and generalizes the problem demonstrated by such cycles."}, {"text": "The Condorcet Paradox, which involves cycling preferences, is a specific instance of the broader issues that Arrow's theorem mathematically generalizes.", "isCorrect": true, "rationale": "The text states, 'The Condorcet Paradox — the cycling preferences illustrated in our dinner example — which Arrow's theorem generalizes.' The paradox is a concrete example of the type of inconsistency Arrow's conditions aim to prevent but cannot all simultaneously."}, {"text": "They are two entirely separate concepts in social choice theory with no direct connection or overlap.", "isCorrect": false, "rationale": "The text explicitly states that Arrow's theorem 'generalizes' the Condorcet Paradox, indicating a direct relationship."}, {"text": "The Condorcet Paradox primarily demonstrates violations of the Unanimity condition, while Arrow's theorem focuses on Non-dictatorship.", "isCorrect": false, "rationale": "The Condorcet Paradox primarily illustrates issues with producing a coherent ranking due to cycling preferences, which relates to the Independence of Irrelevant Alternatives, not directly Unanimity or exclusively Non-dictatorship."}], "id": "q09"}, {"question": "According to the text, why is the choice of a particular voting system itself considered a 'political decision'?", "options": [{"text": "Because only politicians are qualified to design and implement complex voting systems.", "isCorrect": false, "rationale": "The text does not state this; it discusses the inherent biases of systems, not who designs them."}, {"text": "Because every voting system, by its inherent design and trade-offs, can favor certain outcomes or groups over others, making no system truly neutral.", "isCorrect": true, "rationale": "The text states, 'the choice of a voting system is itself a political decision, because different systems favor different outcomes — and no system is neutral.' This highlights the non-neutral impact of system design."}, {"text": "Because voting systems are always subject to partisan manipulation regardless of their initial design.", "isCorrect": false, "rationale": "While manipulation can occur, the text emphasizes the inherent biases and non-neutrality of system design itself, rather than external manipulation as the primary reason for it being a political decision."}, {"text": "Because the theorem dictates which voting system is objectively best for a given political context.", "isCorrect": false, "rationale": "The theorem proves that no *perfect* system exists, meaning no single system is 'objectively best' across all criteria. The choice then becomes a political one based on priorities."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
