        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Dunbar's Number primarily defined as?", "options": [{"text": "The maximum number of people one can recognize by face.", "isCorrect": false, "rationale": "The text explicitly states that Dunbar's Number is 'Not recognize, not follow on social media, not have in your phone contacts — but genuinely know?'"}, {"text": "The approximate number of stable social relationships an individual can genuinely maintain.", "isCorrect": true, "rationale": "Dunbar's Number refers to the 'roughly 150' stable social relationships characterized by personal knowledge, trust, and awareness of connections."}, {"text": "The ideal size for a large-scale international organization.", "isCorrect": false, "rationale": "Dunbar's Number is a cognitive limit for personal relationships, not an ideal size for complex large-scale organizations which require formal structures."}, {"text": "The average number of followers a person has on social media.", "isCorrect": false, "rationale": "The text specifically distinguishes Dunbar's Number from passive social media connections, stating that active interaction still clusters around 150."}]}, {"question": "How did Robin Dunbar initially arrive at his predicted group size for humans?", "options": [{"text": "By analyzing the average size of personal social networks through Christmas card lists.", "isCorrect": false, "rationale": "While this was used to *confirm* his prediction, it was not the initial method for generating the number. The prediction came first."}, {"text": "By conducting surveys on the number of close friends people reported having.", "isCorrect": false, "rationale": "The text does not mention surveys as the primary method for deriving the initial prediction."}, {"text": "By extrapolating from the relationship between neocortex size and group size observed in other primates.", "isCorrect": true, "rationale": "Dunbar 'extrapolated from the relationship between brain size and group size in other primates to predict a natural group size for humans' based on neocortex size."}, {"text": "By studying the historical sizes of successful military units and villages.", "isCorrect": false, "rationale": "Historical examples like Roman centuriae and Neolithic villages were used to *confirm* the prediction, not to derive it initially."}]}, {"question": "According to Dunbar's theory, what is the primary reason an organization might begin to 'struggle' when its membership grows from 30 to 200 people?", "options": [{"text": "The inevitable decline in leadership quality as organizations expand.", "isCorrect": false, "rationale": "The text states this transition 'is not caused by bad leadership (though bad leadership can make it worse),' but rather by a cognitive limit."}, {"text": "A natural shift towards greater individual autonomy and less cooperation.", "isCorrect": false, "rationale": "The text focuses on the breakdown of *informal* social control, not a general shift away from cooperation."}, {"text": "The inability of the human brain to maintain effective personal relationships with everyone in a larger group.", "isCorrect": true, "rationale": "The text explains this struggle is due to 'running into a cognitive wall that is built into the human brain,' where 'social bookkeeping is cognitively expensive' beyond 150 relationships."}, {"text": "Increased competition among employees for resources and recognition.", "isCorrect": false, "rationale": "While competition might occur, the text identifies the cognitive limits of social processing as the fundamental cause of struggle for growing organizations."}]}, {"question": "Which part of the primate brain did Dunbar identify as crucial for complex thought and social processing, linking its size to group size?", "options": [{"text": "The cerebellum", "isCorrect": false, "rationale": "The cerebellum is primarily involved in motor control and balance, not complex social processing as described by Dunbar."}, {"text": "The brainstem", "isCorrect": false, "rationale": "The brainstem handles basic life functions and is not the part of the brain linked by Dunbar to social group size."}, {"text": "The neocortex", "isCorrect": true, "rationale": "Dunbar noticed a consistent relationship between 'the size of the neocortex (the part of the brain responsible for complex thought and social processing)' and social group size."}, {"text": "The hippocampus", "isCorrect": false, "rationale": "The hippocampus plays a key role in memory formation, but Dunbar's theory focuses on the neocortex for social processing."}]}, {"question": "How do groups typically function when their size is below Dunbar's Number?", "options": [{"text": "They rely heavily on written rules, hierarchies, and bureaucratic procedures.", "isCorrect": false, "rationale": "These formal structures are characteristic of groups *above* Dunbar's Number, when informal mechanisms break down."}, {"text": "They experience constant conflicts due to a lack of formal authority.", "isCorrect": false, "rationale": "The text states that below Dunbar's Number, 'Conflicts are resolved through personal relationships, gossip, and reputation,' implying effective functioning."}, {"text": "They operate effectively on personal knowledge, informal trust, and reputation-based social control.", "isCorrect": true, "rationale": "The text states, 'Below Dunbar's Number, groups can function on personal knowledge and informal trust... Everyone knows who is reliable and who is not.'"}, {"text": "They struggle with decision-making due to an excess of personal opinions.", "isCorrect": false, "rationale": "The text describes these groups as 'functioning beautifully' due to informal trust, not struggling with decision-making."}]}, {"question": "Why are formal structures like hierarchies, job titles, and written rules considered 'necessary adaptations' for organizations above Dunbar's Number?", "options": [{"text": "To reduce the overall number of employees and streamline operations.", "isCorrect": false, "rationale": "Formal structures are implemented to manage larger groups effectively, not to reduce their size."}, {"text": "To prevent internal competition and foster a sense of collective identity.", "isCorrect": false, "rationale": "While these might be secondary goals, the primary reason given is to manage the cognitive limits of social processing."}, {"text": "To substitute for the breakdown of personal knowledge and informal trust mechanisms.", "isCorrect": true, "rationale": "The text explains, 'Organizations must substitute formal structures for personal ones... These structures are not signs of organizational failure — they are necessary adaptations to the cognitive limits of human social processing.'"}, {"text": "To enhance individual creativity and innovation within a structured environment.", "isCorrect": false, "rationale": "The text highlights their role in maintaining cohesion and order due to cognitive limits, not primarily to enhance creativity."}]}, {"question": "Which of the following best exemplifies a real-world application of Dunbar's Number by a corporate entity?", "options": [{"text": "A large corporation centralizing all decision-making to a single executive board.", "isCorrect": false, "rationale": "Centralization is a common hierarchical structure but doesn't directly illustrate the application of capping group size based on Dunbar's Number."}, {"text": "A software company like W. L. Gore capping the size of its individual facilities at around 150 employees.", "isCorrect": true, "rationale": "The text explicitly states that 'W. L. Gore (makers of Gore-Tex) have experimented with capping facility size at roughly 150 employees, creating new facilities rather than expanding existing ones beyond the Dunbar limit.'"}, {"text": "A company encouraging its employees to connect with as many people as possible on professional social networks.", "isCorrect": false, "rationale": "While encouraging networking is common, Dunbar's Number emphasizes active, genuine relationships over mere connections, and the text notes social media interaction still clusters around 150."}, {"text": "A startup deliberately keeping its employee count below 10 to ensure maximum personal attention.", "isCorrect": false, "rationale": "While small, 10 is well below the 150 threshold; the example of W. L. Gore specifically targets the ~150 limit, rather than an arbitrary small number."}]}, {"question": "What important caveat does the text provide regarding Dunbar's Number?", "options": [{"text": "It is a precise biological constant that applies universally to all individuals without variation.", "isCorrect": false, "rationale": "The text states, 'Dunbar's Number is an approximation, not a precise constant. Individual variation is significant.'"}, {"text": "It only applies to face-to-face interactions and is irrelevant in the age of digital communication.", "isCorrect": false, "rationale": "The text mentions social media studies confirm active interaction with ~150 contacts, showing its relevance beyond just physical proximity."}, {"text": "The '150' figure is an approximation and refers to a specific type of relationship, with more intimate circles of fewer people nested within it.", "isCorrect": true, "rationale": "The text clarifies, 'Dunbar's Number is an approximation... And the “150” figure refers to a specific type of relationship... Dunbar himself describes a series of concentric circles: about 5 intimate friends, 15 close friends, 50 good friends, 150 casual friends...'"}, {"text": "It is a historical observation relevant only to pre-industrial societies.", "isCorrect": false, "rationale": "The text provides modern examples like military units, corporate teams, and social media, indicating its contemporary relevance."}]}, {"question": "When the text refers to genuinely 'knowing' someone in the context of Dunbar's Number, what level of understanding is implied?", "options": [{"text": "The ability to recall their name and face upon seeing them.", "isCorrect": false, "rationale": "The text explicitly states, 'Not recognize... but genuinely know?' as distinct from mere recognition."}, {"text": "Possessing their contact information, such as a phone number or email address.", "isCorrect": false, "rationale": "The text explicitly states, 'Not have in your phone contacts — but genuinely know?'"}, {"text": "Having deep personal knowledge of their personality, history, and relationships within the group.", "isCorrect": true, "rationale": "The text asks, 'Know their personality, their history, your relationship with them, their relationship with everyone else in the group?' to define genuine knowing."}, {"text": "Being aware of their public achievements or professional status.", "isCorrect": false, "rationale": "The emphasis is on personal, intimate knowledge and social connections, not just public accolades."}]}, {"question": "What is the overarching implication of Dunbar's Number for human organizations and social structures?", "options": [{"text": "Technological advancements can fully eliminate the cognitive constraints on social group size.", "isCorrect": false, "rationale": "The text notes that even with social media, active interaction still clusters around 150, suggesting technology facilitates connection but doesn't erase the cognitive limit on genuine relationships."}, {"text": "All organizations, regardless of size, should strive to operate solely on informal trust.", "isCorrect": false, "rationale": "The text clearly states that 'Above Dunbar's Number, these mechanisms break down' and formal structures become necessary."}, {"text": "Human social capacity is fundamentally limited, requiring structural adaptations as groups grow beyond a certain size.", "isCorrect": true, "rationale": "The 'keyconcept' summarizes this: 'The human brain can maintain approximately 150 stable social relationships... Beyond this number, groups require formal institutions (hierarchies, rules, bureaucracy) to maintain cohesion. This cognitive limit shapes the structure of every human organization.'"}, {"text": "Larger groups are inherently more efficient and cooperative than smaller groups due to diverse perspectives.", "isCorrect": false, "rationale": "The text describes struggles and breakdowns in informal mechanisms when groups exceed Dunbar's Number, implying challenges to efficiency and cooperation without adaptation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
