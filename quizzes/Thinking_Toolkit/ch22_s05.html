<script>
var QUESTIONS = [{"question": "1. Who coined the acronym PoSiWiD, and what does it stand for?", "options": [{"text": "Donella Meadows, The Power of Systemic Wisdom and Design", "isCorrect": false, "rationale": "Donella Meadows was a prominent systems thinker, but the text explicitly states that Stafford Beer coined PoSiWiD, and it stands for 'The Purpose of a System Is What It Does.'"}, {"text": "Stafford Beer, The Purpose of a System Is What It Does", "isCorrect": true, "rationale": "The text explicitly states that PoSiWiD was coined by Stafford Beer, a British cyberneticist, and stands for 'The Purpose of a System Is What It Does.'"}, {"text": "Peter Senge, Principles of Systemic Innovation and Development", "isCorrect": false, "rationale": "Peter Senge is known for his work on learning organizations, but the text attributes the coining of PoSiWiD to Stafford Beer, and specifies its meaning as 'The Purpose of a System Is What It Does.'"}, {"text": "Jay Forrester, Practical Observations on Systemic Inputs and Outputs", "isCorrect": false, "rationale": "Jay Forrester was a pioneer in system dynamics, but the text identifies Stafford Beer as the originator of PoSiWiD, and states its full meaning as 'The Purpose of a System Is What It Does.'"}]}, {"question": "2. According to Stafford Beer's PoSiWiD principle, what is the ultimate determinant of a system's true purpose?", "options": [{"text": "The intentions of its designers and operators", "isCorrect": false, "rationale": "The text explicitly states, 'The purpose of a system, Beer insisted, is what it does — not what its designers intended, not what its mission statement proclaims, not what its operators believe.'"}, {"text": "Its official mission statement or charter", "isCorrect": false, "rationale": "The text clearly distinguishes between stated purposes and actual outputs, noting 'If you want to understand what a system is 'for,' do not read its charter. Observe its outputs.'"}, {"text": "What the system reliably produces as its output and behavior", "isCorrect": true, "rationale": "PoSiWiD emphasizes that 'The purpose of a system is what it does.' The text states, 'The outputs are the truth; the intentions are commentary' and 'The system reveals itself through its behavior, not its brochure.'"}, {"text": "The feedback it receives from stakeholders and external environments", "isCorrect": false, "rationale": "While feedback is crucial in systems thinking (and is mentioned in 'Connections'), PoSiWiD's core tenet focuses on the system's own consistent outputs as the definition of its purpose, rather than external feedback being the ultimate determinant of that purpose."}]}, {"question": "3. A country's healthcare system claims to provide universal access and quality care. However, data consistently shows that it primarily generates significant profits for private insurance companies and pharmaceutical corporations, while a large segment of the population remains uninsured or underinsured. Applying PoSiWiD, what is the functional purpose of this healthcare system?", "options": [{"text": "Universal access and quality care, despite challenges in execution.", "isCorrect": false, "rationale": "PoSiWiD argues against judging a system by its stated goals or intentions. The consistent outputs, not the stated purpose, reveal the system's true function."}, {"text": "Profit generation for private entities, with healthcare access as a secondary outcome.", "isCorrect": true, "rationale": "The text gives this exact example: 'If a healthcare system produces profit more reliably than it produces health, then profit is its de facto purpose.' The consistent outputs define the functional purpose."}, {"text": "Providing employment for healthcare professionals.", "isCorrect": false, "rationale": "While employment is a byproduct, it is not presented as the primary, reliably produced output that consistently diverges from the stated goal in this scenario. The text highlights profit generation as the de facto purpose in such cases where health access is compromised."}, {"text": "Balancing public health needs with economic realities.", "isCorrect": false, "rationale": "This option offers a justification for the observed outcomes but does not identify the functional purpose based on the *actual, consistent output* (profit generation and limited access) as PoSiWiD demands. PoSiWiD is diagnostic, focusing on 'what it does,' not 'why it does it' or 'what it balances.'"}]}, {"question": "4. The text describes PoSiWiD as a 'diagnostic tool, not a cynical conclusion.' What is the primary implication of this distinction?", "options": [{"text": "It means PoSiWiD should only be used to identify positive system outcomes.", "isCorrect": false, "rationale": "PoSiWiD is used to identify *actual* outcomes, which can be positive or negative relative to stated goals. Its diagnostic nature is about objectivity and understanding the true function, not limiting it to positive findings."}, {"text": "It suggests that systems are inherently flawed and designers' intentions are always irrelevant.", "isCorrect": false, "rationale": "PoSiWiD does not claim intentions are irrelevant, but rather that outputs are paramount for defining purpose. It provides a way to understand the system as it *is*, enabling effective intervention, rather than simply being a pessimistic or condemnatory stance."}, {"text": "It provides a method for objectively analyzing system behavior to identify underlying functions, rather than simply criticizing stated intentions.", "isCorrect": true, "rationale": "The text clarifies that PoSiWiD 'strips away the comfortable stories we tell about institutions and forces us to confront their actual behavior.' It helps diagnose the 'what is' to enable better understanding and potential intervention, rather than just being a cynical critique of intentions."}, {"text": "Its purpose is to assign blame for system failures rather than understand their causes.", "isCorrect": false, "rationale": "As a diagnostic tool, PoSiWiD aims to understand *what* a system does and *what* its functional purpose is. While this understanding can inform accountability, its primary goal is not to assign blame but to provide insight into system behavior."}]}, {"question": "5. When attempting to discern a system's true purpose using PoSiWiD, what specific aspects should an observer primarily focus on?", "options": [{"text": "The historical context and founding documents of the system.", "isCorrect": false, "rationale": "The text states, 'If you want to understand what a system is 'for,' do not read its charter. Observe its outputs.' This indicates that historical documents and founding principles are not the primary focus for determining *actual* purpose."}, {"text": "The qualifications and ethical standards of the system's leadership.", "isCorrect": false, "rationale": "While leadership is important, PoSiWiD focuses on the system's *reliable outputs* and *behavior* as the definitive indicators of purpose, not the individual qualities or intentions of its operators."}, {"text": "The measurable outputs, consistent behaviors, and resource flows (money, time, attention).", "isCorrect": true, "rationale": "The text advises, 'Observe its outputs. Count what it produces. Follow the money, the time, the attention. The system reveals itself through its behavior, not its brochure.' These are the key areas of focus for PoSiWiD analysis."}, {"text": "Surveys of public opinion regarding the system's effectiveness.", "isCorrect": false, "rationale": "Public opinion, while valuable for assessing perception, is subjective and does not directly reveal the system's *functional purpose* as defined by its consistent, measurable outputs."}]}, {"question": "6. A public library system states its mission is to promote literacy and provide free access to information for all community members. However, an analysis reveals that its budget is increasingly allocated to maintaining outdated physical collections, fines for overdue books disproportionately affect low-income patrons, and digital resources are difficult for non-tech-savvy individuals to access, leading to declining engagement among the broader community. Based on PoSiWiD, what is the functional purpose of this library system?", "options": [{"text": "To promote literacy and provide free access to information, despite operational challenges.", "isCorrect": false, "rationale": "PoSiWiD emphasizes actual outputs over stated goals. The consistent pattern of outcomes (outdated resources, exclusionary fines, inaccessible digital content) suggests a different functional purpose than the stated mission, rather than just 'challenges.'"}, {"text": "To perpetuate its existing operational structure and potentially exclude certain demographics through barriers.", "isCorrect": true, "rationale": "The system consistently produces outcomes (maintaining outdated collections, disproportionate fines, difficult digital access, declining engagement) that lead to the perpetuation of its current state and effectively create barriers for some patrons. Its 'purpose' is thus revealed by these reliable outputs, which diverge from its stated mission."}, {"text": "To serve as a community hub for social interaction.", "isCorrect": false, "rationale": "While libraries *can* be community hubs, the provided analysis focuses on how the system's outputs *fail* to align with its stated mission concerning literacy and access, not on its success or failure as a social hub. The observed outputs don't consistently point to social interaction as its primary functional purpose."}, {"text": "To manage and preserve historical artifacts and documents.", "isCorrect": false, "rationale": "Maintaining outdated physical collections is a symptom of the system's actual behavior, but it's not the overarching functional purpose implied by the combination of all observed outputs that deviate from promoting literacy and access for *all*."}]}, {"question": "7. PoSiWiD was developed within Stafford Beer's broader work in cybernetics and management theory. Which of the following concepts is most closely associated with his comprehensive approach to understanding organizations?", "options": [{"text": "The Learning Organization, focusing on continuous adaptation and innovation.", "isCorrect": false, "rationale": "While related to adaptation, the 'Learning Organization' concept is primarily associated with Peter Senge. The text explicitly links Beer to the Viable System Model."}, {"text": "Scientific Management, emphasizing efficiency through task analysis.", "isCorrect": false, "rationale": "Scientific Management is associated with Frederick Winslow Taylor and represents an earlier, different management philosophy. Stafford Beer's work is in cybernetics and management cybernetics."}, {"text": "The Viable System Model, analyzing how organizations maintain identity and adapt to their environments.", "isCorrect": true, "rationale": "The text explicitly states: 'Beer developed the idea [PoSiWiD] within his broader framework for understanding organizations, including his Viable System Model, which analyzed how organizations maintain identity and adapt to their environments.'"}, {"text": "Total Quality Management, focusing on continuous improvement in production.", "isCorrect": false, "rationale": "Total Quality Management (TQM) is a management approach popular in the late 20th century, but it is not directly associated with Stafford Beer or the Viable System Model."}]}, {"question": "8. The text includes a 'caution' about applying PoSiWiD. In which of the following scenarios would PoSiWiD be *least* useful for diagnosing a system's true, underlying purpose?", "options": [{"text": "A prison system consistently produces high recidivism rates despite multiple reform efforts aimed at rehabilitation.", "isCorrect": false, "rationale": "This is a prime example where PoSiWiD is highly useful. The consistent divergence from stated goals over time, despite reform efforts, strongly indicates a different functional purpose than rehabilitation."}, {"text": "A newly built bridge collapses due to an unforeseen material defect, representing a single, isolated failure.", "isCorrect": true, "rationale": "The 'caution' specifically states: 'A bridge that collapses is not 'purposely' a pile of rubble; it is a failed bridge. PoSiWiD is most useful when a system persistently produces outcomes that diverge from stated goals despite repeated reform efforts. That pattern of persistent divergence — not a single failure — is the signal that the system's actual function differs from its stated one.'"}, {"text": "An education system reliably sorts students into social tiers regardless of its mission to cultivate understanding.", "isCorrect": false, "rationale": "This scenario describes a persistent and reliable outcome (sorting) that diverges from the stated mission (cultivating understanding), making PoSiWiD a highly relevant diagnostic tool to identify sorting as the functional purpose."}, {"text": "A government agency repeatedly misses its stated targets for public service delivery, while consistently expanding its internal bureaucracy.", "isCorrect": false, "rationale": "The consistent pattern of failing service delivery coupled with continuous bureaucratic growth suggests that the system's functional purpose may be self-preservation or bureaucratic expansion, making PoSiWiD applicable to diagnose this underlying purpose."}]}, {"question": "9. 'The outputs are the truth; the intentions are commentary.' This statement from the text encapsulates a core tenet of PoSiWiD. What does it fundamentally mean?", "options": [{"text": "System designers' personal beliefs are irrelevant and should be ignored entirely.", "isCorrect": false, "rationale": "The statement suggests intentions are secondary ('commentary'), not necessarily completely irrelevant. The focus is on the primacy of outputs for defining purpose, rather than dismissing all internal thoughts or beliefs."}, {"text": "A system's actual behavior and reliable results definitively reveal its purpose, regardless of the stated goals or beliefs of its designers or operators.", "isCorrect": true, "rationale": "This option directly reflects the core message of PoSiWiD: what a system *does* (its consistent outputs and behavior) is the definitive indicator of its purpose, overriding what it *claims* to be for or what its creators *intended*."}, {"text": "Only measurable, quantitative data can be considered valid evidence in system analysis.", "isCorrect": false, "rationale": "While PoSiWiD emphasizes measurable results ('Count what it produces'), the statement 'outputs are the truth' is about the *primacy* of outcomes over intentions for purpose, not a strict exclusion of all qualitative data. The focus is on the reliable production of outcomes."}, {"text": "Intentions are inherently deceptive and are used to hide a system's malicious true purpose.", "isCorrect": false, "rationale": "PoSiWiD is presented as a diagnostic tool, not inherently cynical. It acknowledges that intentions may be well-meaning but ultimately secondary to the functional purpose revealed by outputs. It doesn't necessarily assume malice or deception."}]}, {"question": "10. PoSiWiD is presented as a systems-thinking equivalent to the legal principle that 'people are presumed to intend the natural consequences of their actions.' What does this comparison emphasize about systems?", "options": [{"text": "Systems are legally accountable for their failures in the same way individuals are.", "isCorrect": false, "rationale": "The analogy is about functional purpose and responsibility for outcomes in a conceptual sense, not literal legal accountability for systems as legal entities."}, {"text": "Systems are capable of conscious intention, similar to human beings.", "isCorrect": false, "rationale": "The analogy is about *functional* purpose and observable outcomes, not attributing consciousness or explicit intent to inanimate systems. It focuses on what the system *does* consistently."}, {"text": "Systems, like individuals, are functionally responsible for the outcomes they reliably produce, even if those outcomes were not explicitly desired.", "isCorrect": true, "rationale": "This directly captures the essence of the analogy: if a system consistently produces certain outcomes, then functionally, that is its purpose, regardless of designers' stated or unstated intentions. It's about what is 'done' and its consequences defining its purpose."}, {"text": "Understanding a system's true purpose requires consulting its founders for their original intent.", "isCorrect": false, "rationale": "This contradicts the core PoSiWiD principle, which explicitly states that intentions (even founders' original intent) are secondary to actual outputs in determining true purpose. The analogy reinforces focusing on consequences, not initial intent."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
