    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Aristotle, what constitutes \"eudaimonia\" or the \"good life\"?", "options": [{"text": "A feeling of intense happiness and contentment.", "isCorrect": false, "rationale": "The text explicitly states, \"Happiness, for Aristotle, is not a feeling.\""}, {"text": "An activity of living virtuously, sustained over a complete life.", "isCorrect": true, "rationale": "The text defines eudaimonia as \"the activity of living in accordance with virtue, sustained over a complete life.\""}, {"text": "The pursuit of pleasure and avoidance of pain.", "isCorrect": false, "rationale": "While these might be components of a life, Aristotle's definition of eudaimonia is more profound and focused on virtue, not merely sensory experience."}, {"text": "The accumulation of wealth and social status.", "isCorrect": false, "rationale": "The text does not link eudaimonia to external possessions or social standing, but rather to an internal state of character and activity."}], "id": "q01"}, {"question": "How does Aristotle define virtue (aretē) in relation to the Golden Mean?", "options": [{"text": "Virtue is a fixed set of moral rules that apply universally to all people.", "isCorrect": false, "rationale": "The text specifies that the mean is \"relative to us\" and not a \"moral algorithm,\" indicating it's not a fixed set of universal rules in that sense."}, {"text": "Virtue is a disposition to choose the exact mathematical midpoint between two vices.", "isCorrect": false, "rationale": "The text explicitly states, \"the mean is 'relative to us' — it is not a mathematical midpoint.\""}, {"text": "Virtue is a disposition to act at the mean between an excess and a deficiency.", "isCorrect": true, "rationale": "This directly aligns with the text's opening definition: \"Virtue (aretē) is a disposition to act at the mean between two extremes — one of excess and one of deficiency.\""}, {"text": "Virtue is an innate quality that some people possess naturally and others do not.", "isCorrect": false, "rationale": "The text emphasizes that finding the mean requires \"phronesis,\" a skill developed through \"experience, reflection, and practice,\" not an innate quality."}], "id": "q02"}, {"question": "If a person consistently avoids speaking their mind for fear of offending others, but also refrains from outright lying, which virtue-vice spectrum might they be struggling with, according to Aristotle's framework?", "options": [{"text": "Courage, erring towards recklessness.", "isCorrect": false, "rationale": "Avoiding speaking one's mind is not recklessness; it leans toward deficiency rather than excess in the context of courage."}, {"text": "Generosity, erring towards stinginess.", "isCorrect": false, "rationale": "This scenario describes communication and truthfulness, not the giving or receiving of resources."}, {"text": "Honesty, erring towards self-deprecation.", "isCorrect": true, "rationale": "The text states, \"Honesty is the mean between self-deprecation and boastfulness.\" Avoiding speaking one's mind out of fear of offense can be seen as a deficiency in expressing truth, leaning towards self-deprecation or an overly humble expression of one's views."}, {"text": "Patience, erring towards impulsiveness.", "isCorrect": false, "rationale": "This scenario is about communication and truth-telling, not the ability to endure or delay."}], "id": "q03"}, {"question": "When Aristotle states that the mean is \"relative to us,\" what is the most significant implication for applying the Golden Mean?", "options": [{"text": "Moral truths are entirely subjective and vary from person to person without any objective standard.", "isCorrect": false, "rationale": "While relative, it's guided by practical wisdom and the *right* response for circumstances, not pure subjectivity. There's an objective goal (virtue), even if the specific action is contextual."}, {"text": "The virtuous action is not a fixed point but depends on the individual's circumstances and capabilities.", "isCorrect": true, "rationale": "The text clearly states, \"The mean is contextual, not formulaic,\" and provides examples like food for athletes versus sedentary workers, or courageous response for soldiers versus civilians."}, {"text": "Virtues are culturally determined and have no universal application across societies.", "isCorrect": false, "rationale": "The text focuses on individual context, not broad cultural relativism regarding the existence of virtues themselves."}, {"text": "Only philosophers with specialized knowledge can determine the correct mean for any given situation.", "isCorrect": false, "rationale": "The text emphasizes practical wisdom (phronesis) developed through experience and practice, not exclusive academic knowledge."}], "id": "q04"}, {"question": "Which of the following best describes \"phronesis\" (practical wisdom) in Aristotle's ethics?", "options": [{"text": "A comprehensive moral algorithm that provides definitive answers for every ethical dilemma.", "isCorrect": false, "rationale": "The text explicitly states, \"He does not give you a moral algorithm,\" and phronesis is not a \"rule you can memorize.\""}, {"text": "An intuitive sense of right and wrong that is present from birth.", "isCorrect": false, "rationale": "The text describes phronesis as a skill developed through \"experience, reflection, and practice,\" implying it's not innate."}, {"text": "A skill developed through experience, reflection, and practice, enabling one to perceive situational demands.", "isCorrect": true, "rationale": "This directly matches the text: \"Phronesis is not a rule you can memorize. It is a skill you develop through experience, reflection, and practice...\""}, {"text": "Knowledge acquired primarily from studying ethical textbooks and memorizing rules.", "isCorrect": false, "rationale": "The text notes, \"You cannot learn practical wisdom from a textbook any more than you can learn to play piano from a textbook.\""}], "id": "q05"}, {"question": "The text highlights that Aristotle \"does not give you a moral algorithm.\" What does this emphasize about his ethical framework?", "options": [{"text": "It provides a flexible framework for character development rather than a rigid set of rules.", "isCorrect": true, "rationale": "The text states, \"He gives you a framework for developing the kind of character that tends to find the right answer. The focus is not on rules but on the person...\""}, {"text": "It implies that ethical decisions are purely arbitrary and lack any guiding principles.", "isCorrect": false, "rationale": "While not an algorithm, it's a \"framework\" and still aims for \"the right answer,\" not arbitrary choices."}, {"text": "It suggests that morality is too complex to be understood or taught systematically.", "isCorrect": false, "rationale": "Aristotle does offer a systematic way of understanding and approaching ethics, even if it's not a simple algorithm."}, {"text": "It focuses exclusively on the outcome of actions, disregarding the character of the actor.", "isCorrect": false, "rationale": "The text explicitly states, \"The focus is not on rules but on the person following (or not following) the rules,\" indicating character is central."}], "id": "q06"}, {"question": "A common misreading of the Golden Mean is to assume it advocates for \"always taking the moderate position.\" Why is this interpretation incorrect according to the text?", "options": [{"text": "Because some situations demand extreme responses to be virtuous.", "isCorrect": true, "rationale": "The \"caution\" box states: \"Some situations call for extreme responses — extreme courage in the face of extreme danger, extreme generosity in the face of extreme need.\""}, {"text": "Because moderation is not a virtue in itself, but a vice.", "isCorrect": false, "rationale": "Moderation can be part of a virtuous response, but it's not the *sole* definition of the mean, and certainly not a vice itself."}, {"text": "Because Aristotle believes that all virtues are inherently extreme.", "isCorrect": false, "rationale": "Virtues are means, not extremes. The text clarifies that the *mean* itself might, in context, be an extreme *response*, but not that the *virtue* is an extreme."}, {"text": "Because the mean is purely subjective and has no connection to moderation.", "isCorrect": false, "rationale": "While relative, the mean is about the *right* response, which often involves some form of balance, though not necessarily a *middling* moderation."}], "id": "q07"}, {"question": "A project manager notices that their team consistently misses deadlines because they spend too much time perfecting minor details, fearing any imperfection. Using the Golden Mean as a diagnostic tool, what might be the project manager's initial step to address this issue?", "options": [{"text": "Implement stricter penalties for missing deadlines to force faster work.", "isCorrect": false, "rationale": "This is a managerial tactic, but doesn't address the underlying character imbalance of the team members from an Aristotelian perspective."}, {"text": "Encourage the team to aim for \"good enough\" rather than perfection, identifying it as an excess of thoroughness.", "isCorrect": true, "rationale": "This directly applies the diagnostic tool concept: \"Ask whether you are erring toward excess or deficiency.\" Perfectionism in this context could be seen as an excess (e.g., of thoroughness or caution), and the solution involves moving towards the mean."}, {"text": "Assign different team members to tasks they are inherently better at to avoid detail fixation.", "isCorrect": false, "rationale": "While good management, this doesn't directly use the Golden Mean as a diagnostic tool for the *character pattern* of the team."}, {"text": "Provide a detailed checklist for every task to ensure all steps are followed precisely.", "isCorrect": false, "rationale": "This would likely exacerbate the tendency towards excess thoroughness rather than correcting it by seeking the mean."}], "id": "q08"}, {"question": "Considering Aristotle's view of eudaimonia, virtue as a mean, and the role of phronesis, what is the ultimate aim of engaging with the Golden Mean framework?", "options": [{"text": "To memorize a list of virtues and vices to apply to all situations.", "isCorrect": false, "rationale": "The text emphasizes developing character and practical wisdom over rote memorization."}, {"text": "To develop a character that consistently discerns and enacts the appropriate response to life's challenges.", "isCorrect": true, "rationale": "This synthesizes the core ideas: eudaimonia as virtuous activity, virtue as the mean, and phronesis as the skill to find that mean, all leading to a well-formed character. The text states Aristotle \"gives you a framework for developing the kind of character that tends to find the right answer.\""}, {"text": "To achieve immediate feelings of happiness and contentment through balanced actions.", "isCorrect": false, "rationale": "Eudaimonia is \"not a feeling\" and is \"sustained over a complete life,\" not immediate."}, {"text": "To formulate universal ethical laws that can govern all human behavior.", "isCorrect": false, "rationale": "Aristotle's approach is explicitly not a \"moral algorithm\" or formula for universal rules, but context-dependent character development."}], "id": "q09"}, {"question": "The text contrasts Aristotle's approach to finding truth with that of Plato's. What is Aristotle's distinguishing characteristic in this regard?", "options": [{"text": "Aristotle sought truth in abstract Forms, while Plato looked for it in the empirical world.", "isCorrect": false, "rationale": "This reverses the description provided in the text."}, {"text": "Aristotle focused on practical application, while Plato was more concerned with theoretical knowledge.", "isCorrect": false, "rationale": "While Aristotle was practical, the text's specific contrast is about *where* they sought truth."}, {"text": "Aristotle looked for truth in the empirical world, while Plato sought it in abstract Forms.", "isCorrect": true, "rationale": "The \"personbox\" explicitly states: \"Where Plato sought truth in abstract Forms, Aristotle looked for it in the empirical world.\""}, {"text": "Aristotle believed truth was relative to each individual, while Plato believed in universal truths.", "isCorrect": false, "rationale": "While the mean is \"relative to us,\" Aristotle still believes in objective virtues and a \"good life,\" not purely subjective truth. The text's contrast with Plato is more about methodology."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
