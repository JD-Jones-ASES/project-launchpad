    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the core phenomenon described by Simpson's Paradox?", "options": [{"text": "A trend appears only in combined data but not in any subgroups.", "isCorrect": false, "rationale": "This describes the opposite of Simpson's Paradox, where trends in subgroups are hidden by aggregation."}, {"text": "A trend appearing in every subgroup can reverse when the subgroups are combined.", "isCorrect": true, "rationale": "The text explicitly defines Simpson's Paradox as occurring when 'a trend that appears in every subgroup can reverse when the subgroups are combined'."}, {"text": "A statistically significant trend in a population is always mirrored in its subgroups.", "isCorrect": false, "rationale": "Simpson's Paradox demonstrates that a statistically significant trend in a population can be misleading and not mirrored in its subgroups."}, {"text": "Data aggregation always clarifies hidden trends.", "isCorrect": false, "rationale": "The text emphasizes that aggregation can obscure or reverse trends, making the overall picture misleading, not always clarifying."}], "id": "q01"}, {"question": "In the University of California, Berkeley admissions case, what was identified as the confounding variable that led to Simpson's Paradox?", "options": [{"text": "The overall GPA of the applicants.", "isCorrect": false, "rationale": "While GPA is relevant to admissions, the text does not identify it as the specific confounding variable responsible for the paradox in this case."}, {"text": "The specific departments to which men and women disproportionately applied.", "isCorrect": true, "rationale": "The text states, 'The explanation lies in a confounding variable: the departments women applied to. Women disproportionately applied to smaller programs with low admission rates for everyone.'"}, {"text": "The number of available slots in the graduate programs.", "isCorrect": false, "rationale": "The number of available slots contributes to departmental admission rates but is not the confounding variable that led to the paradox between male and female applicants; rather, it's the differential application patterns."}, {"text": "The gender of the admissions committee members.", "isCorrect": false, "rationale": "The text explicitly notes that 'There was no departmental-level discrimination,' ruling out gender bias by committee members as the confounding factor."}], "id": "q02"}, {"question": "Consider a scenario where a new teaching method is introduced. Initial data shows students taught with the new method have higher average test scores than those taught with the old method in both math and science subjects. However, when all subjects are combined, students taught with the old method have higher overall scores. Which of the following is the most likely explanation for this reversal?", "options": [{"text": "The new teaching method is inherently flawed and less effective overall.", "isCorrect": false, "rationale": "The paradox implies the new method is better in each subgroup, so it's not inherently flawed overall; the overall reversal is due to aggregation."}, {"text": "Students using the new method took more subjects with inherently lower average scores.", "isCorrect": false, "rationale": "If students using the new method took more subjects with lower average scores, this would depress the new method's overall average, but the paradox states that the old method ends up with higher overall scores despite the new method being better in each subject. This scenario would contribute to the new method looking worse overall, but not necessarily that the *old* method looks better."}, {"text": "The old teaching method was disproportionately applied to subjects where students generally perform better.", "isCorrect": true, "rationale": "For the old method to appear better overall despite being worse in each subject, it must have been applied more often in 'easier' subjects (e.g., subjects where all students score higher), artificially inflating its overall average. This is a classic explanation for Simpson's Paradox."}, {"text": "Students using the new method were disproportionately enrolled in the 'easier' of the two subjects (math or science).", "isCorrect": false, "rationale": "If the new method was primarily used in 'easier' subjects, its overall score would likely be *inflated*, making it appear even better overall, which would work against the paradox described where the old method has higher overall scores."}], "id": "q03"}, {"question": "In the context of Simpson's Paradox, what is a 'lurking variable'?", "options": [{"text": "A variable that is not statistically significant in any subgroup analysis.", "isCorrect": false, "rationale": "Statistical significance is not the defining characteristic of a lurking variable in this context; its role is about confounding the relationship between other variables."}, {"text": "A variable that is deliberately hidden by researchers to mislead the public.", "isCorrect": false, "rationale": "While it can mislead, a lurking variable isn't necessarily deliberately hidden; it's often an overlooked or unmeasured factor."}, {"text": "A variable that is correlated with both the grouping variable and the outcome variable, but not included in the initial analysis.", "isCorrect": true, "rationale": "The text states, 'Simpson's Paradox occurs whenever a lurking variable — one not included in the analysis — is correlated with both the grouping variable (sex, in the Berkeley case) and the outcome variable (admission rate).'"}, {"text": "A variable that only influences the outcome in combined, aggregate data, but not in subgroups.", "isCorrect": false, "rationale": "A lurking variable affects outcomes in subgroups as well; its effect is simply obscured or reversed upon aggregation."}], "id": "q04"}, {"question": "A city has two hospitals, A and B. Hospital A has a higher overall patient survival rate than Hospital B. Based on the concept of Simpson's Paradox, which of the following scenarios would best explain why Hospital B might actually provide better care despite its lower overall survival rate?", "options": [{"text": "Hospital B treats a significantly higher proportion of patients with severe illnesses.", "isCorrect": true, "rationale": "This directly mirrors the 'realworld' medical example. If Hospital B treats more severe cases, its overall survival rate would naturally be lower, even if its care is superior for both mild and severe cases individually. Patient severity acts as the confounding variable."}, {"text": "Hospital A is a smaller hospital with fewer beds and staff, leading to less efficient care.", "isCorrect": false, "rationale": "While hospital size or efficiency might affect care quality, this explanation doesn't describe how Hospital B could be better in subgroups but worse overall due to aggregation bias."}, {"text": "Hospital A specializes in elective surgeries, which generally have lower risks.", "isCorrect": false, "rationale": "If Hospital A primarily handles low-risk procedures, its overall survival rate would be artificially inflated, making it appear better. This scenario explains why Hospital A's overall rate is high, but doesn't explain why Hospital B, despite its lower overall rate, might provide better care for individual patient groups."}, {"text": "Hospital B has a higher rate of readmissions for its patients.", "isCorrect": false, "rationale": "Readmission rates are an outcome metric, but do not directly explain the phenomenon of Simpson's Paradox where a hospital is better in all subgroups but worse overall."}], "id": "q05"}, {"question": "What is the 'stark practical lesson' derived from understanding Simpson's Paradox?", "options": [{"text": "Always assume that aggregate data accurately reflects trends within subgroups.", "isCorrect": false, "rationale": "This is the opposite of the practical lesson, as Simpson's Paradox shows aggregate data can be highly misleading."}, {"text": "Combine all available data to reveal a more comprehensive truth.", "isCorrect": false, "rationale": "The paradox demonstrates that combining data can obscure the truth and even reverse trends, making the overall picture less truthful."}, {"text": "Never trust aggregate data without asking whether the groups being combined are comparable.", "isCorrect": true, "rationale": "The text explicitly states, 'The practical lesson is stark: never trust aggregate data without asking whether the groups being combined are comparable.'"}, {"text": "Statistical significance is irrelevant when subgroups show conflicting trends.", "isCorrect": false, "rationale": "Statistical significance remains relevant, but its interpretation must be cautious and consider the possibility of lurking variables that cause the paradox."}], "id": "q06"}, {"question": "How do modern clinical trials attempt to prevent Simpson's Paradox from distorting results, particularly in medical studies?", "options": [{"text": "By limiting the number of subgroups analyzed to prevent overcomplication.", "isCorrect": false, "rationale": "Limiting subgroup analysis might hide the paradox, but it does not prevent the underlying confounding variables that cause it."}, {"text": "By using randomization and stratification to neutralize confounding variables.", "isCorrect": true, "rationale": "The text states, 'This is why modern clinical trials use randomization and stratification — techniques designed to neutralize confounding variables and prevent Simpson's Paradox from distorting the results.'"}, {"text": "By only reporting overall aggregate outcomes, assuming subgroups are balanced.", "isCorrect": false, "rationale": "Reporting only aggregate data is precisely what the paradox warns against, as it can be highly misleading if subgroups are not comparable."}, {"text": "By allowing patients to self-select into treatment groups based on their preference.", "isCorrect": false, "rationale": "Patient self-selection can introduce significant confounding variables and bias, making Simpson's Paradox more likely, not less."}], "id": "q07"}, {"question": "A football player (Player X) has a higher passing completion rate than another player (Player Y) in both rainy conditions and sunny conditions for a season. However, Player Y has a higher overall passing completion rate for the entire season. This is an example of Simpson's Paradox. What is the most probable explanation for Player Y's overall advantage?", "options": [{"text": "Player X played significantly more games in sunny conditions, which generally inflate completion rates.", "isCorrect": false, "rationale": "If Player X played more in sunny (easier) conditions, his overall average would be inflated, making it less likely for Player Y to have a higher overall average. This would work against the described paradox."}, {"text": "Player Y played significantly more games in sunny conditions, where completion rates are generally higher for all players.", "isCorrect": true, "rationale": "For Player Y to have a higher overall completion rate despite being worse in each subgroup, Player Y must have played disproportionately in the 'easier' condition (sunny), where overall completion rates are higher. This boosts Y's aggregate average, creating the paradox."}, {"text": "Player Y is a more experienced player who performs better under pressure in difficult conditions.", "isCorrect": false, "rationale": "This suggests Player Y is simply a better player, which contradicts the premise that Player X has higher completion rates in *both* subgroups (rainy and sunny)."}, {"text": "The overall defensive strength faced by Player X was much higher, regardless of weather conditions.", "isCorrect": false, "rationale": "While defensive strength is a general confounding factor, the paradox in this question is specifically tied to the 'weather conditions' as the confounding variable, which reverses the trend between subgroups and the aggregate."}], "id": "q08"}, {"question": "Who is credited with describing the phenomenon now known as Simpson's Paradox in a 1951 paper?", "options": [{"text": "Karl Pearson", "isCorrect": false, "rationale": "Karl Pearson had noted the phenomenon earlier (1899) but did not name it or publish the definitive paper."}, {"text": "Udny Yule", "isCorrect": false, "rationale": "Udny Yule had noted the phenomenon earlier (1903) but did not name it or publish the definitive paper."}, {"text": "Edward H. Simpson", "isCorrect": true, "rationale": "The text explicitly states, 'Named after the British statistician Edward H. Simpson, who described it in a 1951 paper...'"}, {"text": "The University of California, Berkeley researchers", "isCorrect": false, "rationale": "The University of California, Berkeley was the subject of a famous real-world example of the paradox, but its researchers did not name the phenomenon."}], "id": "q09"}, {"question": "How does understanding Simpson's Paradox primarily differ from understanding 'Base Rate Neglect' or 'Confirmation Bias' as discussed in the 'connections' section?", "options": [{"text": "Simpson's Paradox highlights how individual biases lead to misinterpretation of data, similar to confirmation bias.", "isCorrect": false, "rationale": "While individual biases can contribute to falling victim to the paradox, Simpson's Paradox itself is a statistical phenomenon concerning data structure and aggregation, not primarily an individual psychological bias."}, {"text": "Simpson's Paradox focuses on the mathematical effect of aggregation on data trends, whereas the others relate to psychological tendencies in interpreting data.", "isCorrect": true, "rationale": "Simpson's Paradox is a statistical phenomenon explaining how data aggregation can mislead. Base Rate Neglect and Confirmation Bias are psychological cognitive biases that affect how people process and interpret information, often leading to faulty conclusions irrespective of the data structure itself."}, {"text": "Base Rate Neglect and Confirmation Bias explain why people look for confounding variables, while Simpson's Paradox explains why they ignore them.", "isCorrect": false, "rationale": "This statement reverses the roles; Base Rate Neglect and Confirmation Bias often lead people to *ignore* relevant information (like base rates or confounding variables), whereas understanding Simpson's Paradox *prompts* one to look for confounding variables."}, {"text": "All three concepts equally emphasize the importance of statistical significance in complex datasets.", "isCorrect": false, "rationale": "While all three relate to data interpretation, Simpson's Paradox specifically highlights the pitfalls of aggregate data and the need to investigate confounding variables, which is a distinct emphasis from the general importance of statistical significance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
