<script>
var QUESTIONS = [{"question": "What is the core challenge presented by the Non-Identity Problem, as identified by Derek Parfit?", "options": [{"text": "It highlights the difficulty in convincing current generations to make sacrifices for future generations.", "isCorrect": false, "rationale": "While true that this is a challenge, it is not the specific philosophical puzzle of the Non-Identity Problem. The problem goes deeper into the nature of harm and identity."}, {"text": "It complicates the concept of 'harm' because policies that degrade future conditions also determine *who* will exist, meaning those people were not made worse off than their only alternative (non-existence).", "isCorrect": true, "rationale": "This accurately describes the central paradox of the Non-Identity Problem: the people who live in a degraded world under a certain policy would not have existed at all under an alternative, better policy, thus they cannot claim to have been 'harmed' by being brought into existence under those conditions, so long as their lives are worth living."}, {"text": "It argues that future generations have no moral rights, as they do not yet exist.", "isCorrect": false, "rationale": "The problem does not argue that future generations have no rights, but rather that our *standard* rights-based frameworks struggle to apply to them when their very identity is contingent on our choices."}, {"text": "It suggests that ethical decision-making should prioritize the welfare of existing individuals over hypothetical future ones.", "isCorrect": false, "rationale": "The Non-Identity Problem doesn't advocate for prioritizing current over future welfare; rather, it identifies a difficulty in articulating *how* we owe obligations to future people when harm cannot be established in the traditional sense."}], "id": "q01"}, {"question": "A government is debating two proposals for building a new city. Proposal X involves sustainable practices, ensuring a high quality of life but requiring a longer construction period, delaying the birth of the city's first generation by 20 years. Proposal Y uses rapid, less sustainable methods, leading to environmental issues but allowing the city to be populated sooner. According to the Non-Identity Problem, what is the most significant ethical challenge in evaluating Proposal Y?", "options": [{"text": "The immediate economic benefits of Proposal Y might outweigh its long-term environmental costs.", "isCorrect": false, "rationale": "This is a general cost-benefit analysis issue but does not address the specific paradox of identity and harm central to the Non-Identity Problem."}, {"text": "The people who will live in the degraded city under Proposal Y cannot claim they were harmed, as they would not have existed had Proposal X been chosen.", "isCorrect": true, "rationale": "This is a direct application of the Non-Identity Problem. The choice of Proposal Y affects who is born and when. The specific individuals born under Proposal Y, even if facing worse conditions, would not have existed if Proposal X had been implemented. Therefore, they cannot claim to have been made 'worse off' by Policy Y, as their only alternative was non-existence."}, {"text": "It is impossible to predict the exact quality of life for future generations, making ethical comparisons speculative.", "isCorrect": false, "rationale": "While predicting the future is difficult, the Non-Identity Problem assumes we can reasonably compare the *conditions* of future lives, but then highlights the issue of comparing *who* lives them."}, {"text": "The government has an inherent duty to develop infrastructure as quickly as possible to meet current population needs.", "isCorrect": false, "rationale": "This statement represents a specific policy priority and does not reflect the ethical challenge posed by the Non-Identity Problem itself."}], "id": "q02"}, {"question": "The text states that the non-identity problem is 'hard to solve' because 'our standard moral concepts — harm, rights, obligations — seem to require an identifiable victim who is made worse off.' Which of the following best explains why this requirement poses a problem in non-identity cases?", "options": [{"text": "It's difficult to predict who will be born in the future, making it impossible to identify specific victims.", "isCorrect": false, "rationale": "While prediction is difficult, the core issue isn't just knowing *who* will be born, but the logical impossibility of claiming harm for individuals whose very existence is contingent on the 'harming' policy."}, {"text": "The decisions affect entire populations, making it impractical to assess harm on an individual basis.", "isCorrect": false, "rationale": "This is a practical difficulty in assessing large-scale harm, but it doesn't get to the philosophical heart of why the 'identifiable victim' concept fails in non-identity cases."}, {"text": "The people who would be victims of a 'worse' policy would not exist at all under a 'better' policy, meaning they cannot be said to have been made 'worse off' than their alternative.", "isCorrect": true, "rationale": "This is the precise reason. Standard moral concepts of harm imply a comparison between two states for the *same individual*. In non-identity cases, the individual in the 'worse' state would not exist in the 'better' state, making the 'worse off' comparison impossible for that individual."}, {"text": "Contemporary legal frameworks only recognize harm to currently living individuals, not future ones.", "isCorrect": false, "rationale": "This refers to legal frameworks, which may be influenced by the philosophical problem, but it's not the fundamental ethical reason why the 'identifiable victim' concept fails in these scenarios."}], "id": "q03"}, {"question": "Which of the following types of decisions is *least likely* to give rise to the non-identity problem, based on the text's description?", "options": [{"text": "A national policy dictating the optimal age for first-time parents.", "isCorrect": false, "rationale": "This type of policy directly influences when and by whom children are conceived, thereby affecting the identity of future individuals. It fits the criteria for decisions that give rise to the non-identity problem."}, {"text": "A global agreement on carbon emission reduction targets for the next century.", "isCorrect": false, "rationale": "As explicitly stated in the 'realworld' example, climate change policies significantly alter environmental conditions and thus affect who meets whom, who reproduces, and therefore the identities of future people. This is a prime example of the non-identity problem."}, {"text": "A medical ethics committee debating whether to allow a new gene-editing therapy for inheritable diseases.", "isCorrect": false, "rationale": "Medical advances, especially those related to reproduction or survivability, can enable people to exist who otherwise would not have, directly changing the composition of future populations and raising non-identity issues."}, {"text": "An individual choosing between two job offers, both of which are short-term contracts.", "isCorrect": true, "rationale": "While an individual's personal choices can affect who is born (e.g., 'when to have children, where to live'), choosing between two short-term job offers, without further context linking them to long-term reproductive or societal changes, is the least likely scenario among the options to trigger the broad, generational identity shifts central to the Non-Identity Problem."}], "id": "q04"}, {"question": "The 'impersonal value' approach to solving the non-identity problem suggests that what matters is whether 'the overall state of the world is better or worse, regardless of who inhabits it.' What is the main criticism of this approach mentioned in the text?", "options": [{"text": "It fails to account for the unique experiences and suffering of individuals.", "isCorrect": false, "rationale": "While this is a general criticism of impersonal approaches, it is not the *main* specific criticism highlighted in the text for this context."}, {"text": "It is too difficult to quantify 'overall state of the world' in a meaningful way.", "isCorrect": false, "rationale": "This is a practical challenge but not the core philosophical critique presented in the text regarding the impersonal value approach."}, {"text": "It potentially leads to the Repugnant Conclusion, where a vast population of barely happy people is preferred over a smaller population of very happy ones.", "isCorrect": true, "rationale": "The text explicitly states that this approach 'leads toward the Repugnant Conclusion,' which is a well-known philosophical problem that questions the implications of solely aggregating overall value."}, {"text": "It only considers environmental outcomes and neglects social or economic well-being.", "isCorrect": false, "rationale": "The impersonal value approach aims to consider the overall state of the world, which would typically include more than just environmental outcomes."}], "id": "q05"}, {"question": "According to Derek Parfit, what is the significance of the non-identity problem?", "options": [{"text": "It proves that all moral obligations are ultimately self-serving.", "isCorrect": false, "rationale": "The text does not suggest this conclusion. Parfit considered the problem a challenge to *how* we formulate obligations, not that they don't exist."}, {"text": "It is primarily an academic exercise with little real-world application.", "isCorrect": false, "rationale": "The text explicitly states that it is 'not merely an academic exercise' and has relevance for 'climate policy, genetic engineering, or long-term resource management.'"}, {"text": "It represents one of the most important and difficult challenges in ethics, with significant implications for real-world policies like climate change.", "isCorrect": true, "rationale": "The text states that Parfit 'considered the non-identity problem one of the most important and difficult challenges in ethics' and emphasizes its direct relevance to real-world policy discussions."}, {"text": "It can be easily resolved by adopting a purely utilitarian framework for moral decision-making.", "isCorrect": false, "rationale": "The text discusses several proposed solutions, including impersonal value (a form of utilitarian thinking), but highlights their difficulties, implying no easy resolution."}], "id": "q06"}, {"question": "The text discusses rights-based approaches as a potential solution to the non-identity problem. Why is this approach considered difficult to implement in this context?", "options": [{"text": "It is challenging to establish a universal set of rights that applies across different cultures and generations.", "isCorrect": false, "rationale": "While a general challenge for rights-based theories, it's not the specific difficulty highlighted by the text in the context of the non-identity problem."}, {"text": "The concept of a 'right-holder' becomes circular when an individual's very existence depends on the policy in question.", "isCorrect": false, "rationale": "This specific difficulty is attributed to 'Contractualism' in the text, not the general rights-based approaches."}, {"text": "Rights-based frameworks often conflict with economic efficiency, making them unpopular with policymakers.", "isCorrect": false, "rationale": "This is a practical concern, but not the philosophical difficulty the text identifies with rights-based approaches in relation to the non-identity problem."}, {"text": "It is hard to define what a 'right to a certain quality of life' consists of when the right-holder's very existence depends on the policy in question.", "isCorrect": true, "rationale": "The text states that 'it is difficult to specify what this right consists of when the right-holder's very existence depends on the policy in question,' making this the specific reason for its difficulty in this context."}], "id": "q07"}, {"question": "A new medical technology allows individuals with a rare genetic condition, who would otherwise die in childhood, to live full, healthy lives and have children. However, the technology is extremely expensive, diverting significant resources from other public health programs. From the perspective of the Non-Identity Problem, what is the most salient moral consideration if these individuals then have children who inherit the condition, requiring the same expensive treatment?", "options": [{"text": "Whether the overall health budget can sustain the long-term costs of this technology.", "isCorrect": false, "rationale": "This is a practical resource allocation problem but doesn't directly engage the core identity aspect of the Non-Identity Problem."}, {"text": "Whether the initial decision to fund the technology was fair to other public health programs.", "isCorrect": false, "rationale": "This relates to the justice of resource allocation for the original generation, not the specific identity issues for future generations."}, {"text": "Whether the children born with the genetic condition, who would not have existed without the technology, can claim they were harmed by needing expensive treatment.", "isCorrect": true, "rationale": "This directly applies the Non-Identity Problem. The children owe their existence to the very technology that allows them to live, albeit with ongoing treatment needs. They would not have existed at all without it, making a claim of 'harm' (being made worse off than their alternative) problematic."}, {"text": "Whether the parents have a moral obligation to prevent their children from inheriting the condition.", "isCorrect": false, "rationale": "This is a question of parental responsibility and genetic ethics, but not the fundamental identity paradox of the Non-Identity Problem."}], "id": "q08"}, {"question": "The 'keyconcept' box summarizes the non-identity problem. What fundamental shift in ethical thinking does it suggest might be necessary to address this problem?", "options": [{"text": "A greater emphasis on individual autonomy and personal choice in reproductive decisions.", "isCorrect": false, "rationale": "The text doesn't suggest this as a fundamental shift to *address* the problem, but rather as one of the factors that can *create* it."}, {"text": "Moving beyond purely 'person-centered' moral theories to consider 'impersonal values' and the overall quality of outcomes.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'The non-identity problem challenges person-centered moral theories and suggests that ethics may need to account for impersonal values: the quality of outcomes, not just the welfare of identifiable individuals.'"}, {"text": "The development of new legal frameworks that grant personhood to future, non-existent individuals.", "isCorrect": false, "rationale": "The text discusses rights-based approaches but highlights their difficulty, not the specific need for granting personhood to non-existent individuals as a solution."}, {"text": "Prioritizing short-term benefits to existing populations over uncertain long-term consequences for future ones.", "isCorrect": false, "rationale": "The text does not advocate for this prioritization; rather, it seeks to understand how to ground obligations to future generations despite the problem."}], "id": "q09"}, {"question": "The text draws a 'connection' between the non-identity problem and 'The Repugnant Conclusion.' What is the nature of this connection, as implied by the discussion of 'impersonal value' as a solution?", "options": [{"text": "Both problems demonstrate the impossibility of making any moral judgments about future generations.", "isCorrect": false, "rationale": "The problems highlight difficulties, not impossibility, of moral judgment regarding future generations."}, {"text": "Both problems highlight the inherent selfishness of human nature when faced with long-term ethical dilemmas.", "isCorrect": false, "rationale": "The text discusses logical and conceptual challenges, not human selfishness."}, {"text": "The 'impersonal value' approach, when applied to the non-identity problem, tends to lead to the same kind of counterintuitive outcome as the Repugnant Conclusion (vast numbers of barely happy lives).", "isCorrect": true, "rationale": "The text explicitly states: 'But this [impersonal value] approach leads toward the Repugnant Conclusion (Section ): if impersonal value is all that matters, then a vast population of barely-happy people outweighs a small population of very happy ones.' This shows the shared philosophical difficulty encountered by impersonal value theories."}, {"text": "They are both purely theoretical puzzles with no practical relevance to real-world policy-making.", "isCorrect": false, "rationale": "The text emphasizes that the Non-Identity Problem, and by extension its related concepts, are highly relevant to real-world policies like climate change."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
