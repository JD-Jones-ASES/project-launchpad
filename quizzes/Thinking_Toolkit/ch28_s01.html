        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the optimal strategy in the Monty Hall Problem after the host reveals a goat?", "options": [{"text": "Staying with your original door, as the odds become 50/50 for the two remaining doors.", "isCorrect": false, "rationale": "The text explicitly states that this common intuition ('the odds are 50/50') is 'wrong' and that staying only gives a 1/3 chance of winning."}, {"text": "Switching to the other unopened door, as it doubles your probability of winning to 2/3.", "isCorrect": true, "rationale": "The text clearly states, 'You should always switch. Switching gives you a 2/3 chance of winning; staying gives you only 1/3.' It also notes that switching 'doubles your probability of winning'."}, {"text": "Choosing randomly between the two remaining doors, as there is no strategic advantage.", "isCorrect": false, "rationale": "The text refutes the idea of no strategic advantage, proving that switching is a superior strategy with a 2/3 chance compared to a 1/3 chance for staying."}, {"text": "Switching only if your initial pick was Door 1.", "isCorrect": false, "rationale": "The initial door pick (e.g., Door 1) is arbitrary in the problem setup; the strategy to switch applies regardless of which door was initially chosen."}]}, {"question": "The intuition that the odds are 50/50 after a goat is revealed fails primarily because of which crucial detail?", "options": [{"text": "The problem only involves three doors, which is too small a sample size for accurate probability.", "isCorrect": false, "rationale": "While the number of doors is small, the core issue is not the sample size itself, but the nature of the information revealed, as explained in the text."}, {"text": "The player's initial choice was purely random, which makes it less likely to be correct.", "isCorrect": false, "rationale": "The initial choice being random is part of the problem setup, but it doesn't explain why the intuition about the remaining doors is wrong. The issue lies with the host's action, not the player's initial randomness."}, {"text": "The host's action of opening a goat door is not random but constrained by his knowledge of the car's location.", "isCorrect": true, "rationale": "The text explicitly states, 'The crucial detail is that Monty always opens a door with a goat — he never opens the door with the car, and he never opens the door you picked. This means his action is not random. He is constrained by his knowledge...'"}, {"text": "The game show itself is designed to trick contestants into making incorrect choices.", "isCorrect": false, "rationale": "The problem explores a statistical paradox, not a deliberate trick designed by the show. The focus is on the probabilistic implications of the host's actions."}]}, {"question": "When you first pick Door 1 in the Monty Hall Problem, what is the initial probability that the car is behind one of the *other* two doors (Door 2 or Door 3 combined)?", "options": [{"text": "1/3", "isCorrect": false, "rationale": "1/3 is the initial probability that the car is behind *your* chosen door. The question asks for the probability that it's behind the *other* two doors combined."}, {"text": "1/2", "isCorrect": false, "rationale": "This represents the common, incorrect intuition after a door is opened, not the initial combined probability of the other two doors."}, {"text": "2/3", "isCorrect": true, "rationale": "The text explains: 'when you first picked Door 1, there was a 1/3 chance you picked the car and a 2/3 chance the car was behind one of the other two doors.'"}, {"text": "0", "isCorrect": false, "rationale": "This would mean the car is guaranteed to be behind your chosen door, which contradicts the problem setup where the car's location is initially unknown."}]}, {"question": "According to the 'Three Cases' analysis, in which scenario(s) does switching lead to a win?", "options": [{"text": "Only when the car is behind your initially picked door.", "isCorrect": false, "rationale": "The text states that if the car is behind your initially picked door (Case 1), 'If you switch, you get a goat. Switching loses.'"}, {"text": "When the car is behind either of the two doors you did *not* initially pick.", "isCorrect": true, "rationale": "The text's Case 2 (car behind Door 2) and Case 3 (car behind Door 3) both conclude: 'If you switch... you get the car. Switching wins.' These are the two doors not initially picked."}, {"text": "Only when the host opens Door 3, regardless of your initial pick.", "isCorrect": false, "rationale": "The specific door the host opens is less important than the *fact* that he opens a goat door, which shifts probabilities. The win depends on where the car is, not which specific goat door is opened."}, {"text": "Switching never guarantees a win; it only offers slightly better odds.", "isCorrect": false, "rationale": "While it doesn't guarantee a win every single time, switching *does* guarantee a win in 2 out of 3 specific scenarios outlined in the formal analysis, leading to a 2/3 overall probability of winning."}]}, {"question": "What happens to the 2/3 probability that the car was initially behind one of the two doors you *didn't* pick, after Monty Hall reveals a goat behind one of them?", "options": [{"text": "It splits evenly, making both your original door and the other unopened door 1/2.", "isCorrect": false, "rationale": "This is the incorrect intuition the text addresses, stating, 'that 2/3 probability does not split evenly between the two remaining doors.'"}, {"text": "It concentrates entirely on the door Monty did not open, making that door's probability 2/3.", "isCorrect": true, "rationale": "The text explains: 'that 2/3 probability does not split evenly between the two remaining doors. It concentrates entirely on the door Monty did not open, because Monty was forced to avoid the car. The door you picked still has a 1/3 chance. The other unopened door now has 2/3.'"}, {"text": "It becomes irrelevant, as the focus shifts to the two remaining doors.", "isCorrect": false, "rationale": "The initial probabilities remain highly relevant; they form the basis for understanding how the host's action shifts the conditional probabilities."}, {"text": "It decreases, as one of the 'other' doors has been revealed as a goat.", "isCorrect": false, "rationale": "The *combined* probability of 2/3 for the 'other' doors doesn't decrease; rather, it fully transfers to the *one* remaining unopened door among them."}]}, {"question": "The 100-door version of the Monty Hall Problem (where you pick one door and Monty opens 98 goat doors) helps clarify the correct strategy by:", "options": [{"text": "Highlighting that your initial pick had an extremely low chance of being correct (1/100), making the benefit of switching obvious.", "isCorrect": true, "rationale": "The text states: 'Now the intuition is clear: your original pick had a 1/100 chance. The remaining door has a 99/100 chance. Of course you switch.'"}, {"text": "Demonstrating that the host's actions become less random with more doors.", "isCorrect": false, "rationale": "The host's actions are never random to begin with, as he always knows where the car is. The 100-door version just makes this non-randomness more intuitively impactful."}, {"text": "Proving that the game is designed to be unfair to the player.", "isCorrect": false, "rationale": "The problem illustrates a probabilistic paradox, not a design flaw intended to be unfair. The fairness is in the initial 1/100 chance for any door."}, {"text": "Making it clear that switching is only beneficial with a large number of doors.", "isCorrect": false, "rationale": "The text emphasizes that switching is beneficial even with three doors; the 100-door analogy merely makes the underlying logic more apparent."}]}, {"question": "Marilyn vos Savant's publication of the correct solution to the Monty Hall Problem in 1990 led to what significant reaction?", "options": [{"text": "Widespread acceptance and praise for her clear explanation.", "isCorrect": false, "rationale": "The text states she received 'approximately 10,000 letters, many from professors and mathematicians, telling her she was wrong,' indicating widespread disagreement, not acceptance."}, {"text": "A formal change in how the game show 'Let's Make a Deal' was played.", "isCorrect": false, "rationale": "The problem is based on the show but exists as a theoretical probability puzzle; there's no indication in the text that the show itself changed its rules."}, {"text": "Thousands of angry letters, including many from PhD mathematicians, insisting she was wrong.", "isCorrect": true, "rationale": "The text explicitly mentions: 'she received approximately 10,000 letters, many from professors and mathematicians, telling her she was wrong.'"}, {"text": "The problem being officially retired from probability textbooks due to its controversial nature.", "isCorrect": false, "rationale": "The Monty Hall Problem remains a classic example in probability, used to teach conditional probability, as suggested by its inclusion in this textbook."}]}, {"question": "The Monty Hall Problem serves as a powerful demonstration that conditional probability often conflicts with human intuition. What is 'conditional probability' in this context?", "options": [{"text": "The probability of an event occurring regardless of any new information.", "isCorrect": false, "rationale": "This describes independent or simple probability, not conditional probability, which is specifically about how new information changes probabilities."}, {"text": "The probability of an event based solely on the initial conditions of a problem.", "isCorrect": false, "rationale": "This would be initial probability. Conditional probability updates these initial probabilities based on new information."}, {"text": "Probability updated by new information, particularly when a knowledgeable agent alters the information landscape.", "isCorrect": true, "rationale": "The text explains, 'conditional probability — probability updated by new information — does not follow the rules our intuitions suggest,' and emphasizes the role of the 'knowledgeable agent (Monty)'."}, {"text": "The probability that an event will occur only if another, unrelated event also occurs.", "isCorrect": false, "rationale": "While conditional probability involves related events, the key aspect highlighted in the text is the *updating* of probabilities due to specific, relevant information, especially from a knowledgeable source."}]}, {"question": "How does the Monty Hall logic apply to real-world scenarios like medical testing or hiring, according to the text?", "options": [{"text": "It suggests that in such scenarios, all remaining options become equally likely once some are eliminated.", "isCorrect": false, "rationale": "The text explicitly states this is incorrect: 'the remaining probabilities are not simply “split evenly” among whatever is left.'"}, {"text": "It demonstrates that the initial probabilities of various outcomes are always irrelevant in professional decision-making.", "isCorrect": false, "rationale": "The text argues the opposite: understanding how initial probabilities shift with new information (conditional probability) is essential."}, {"text": "It illustrates that a knowledgeable agent's elimination of certain options changes the probabilities of the remaining ones, which are then not equally likely.", "isCorrect": true, "rationale": "The 'realworld' section states: 'a doctor who rules out certain diagnoses (based on knowledge the patient does not have) changes the probability of the remaining diagnoses — and the remaining probabilities are not simply “split evenly” among whatever is left.' The same logic applies to a recruiter eliminating candidates."}, {"text": "It implies that making a random choice after initial eliminations is usually the best strategy.", "isCorrect": false, "rationale": "The core lesson is that informed choices (like switching in Monty Hall) are better than random ones, especially when a knowledgeable agent has provided information."}]}, {"question": "Which of the following concepts is *not* listed in the 'connections' section as related to the Monty Hall Problem's lesson on misjudging probabilities?", "options": [{"text": "Base Rate Neglect", "isCorrect": false, "rationale": "The text lists 'Base Rate Neglect (Chapter ) — another case where we misjudge probabilities by ignoring relevant information' in the 'connections' section."}, {"text": "The Gambler's Fallacy", "isCorrect": false, "rationale": "The text lists 'The Gambler's Fallacy (this chapter) — misunderstanding independence and randomness' in the 'connections' section."}, {"text": "Simpson's Paradox", "isCorrect": false, "rationale": "The text lists 'Simpson's Paradox (this chapter) — another case where aggregation distorts probability' in the 'connections' section."}, {"text": "The Sunk Cost Fallacy", "isCorrect": true, "rationale": "The Sunk Cost Fallacy is not mentioned in the 'connections' section, which lists Base Rate Neglect, The Gambler's Fallacy, and Simpson's Paradox as related concepts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
