    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 19, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central assertion of Goodhart's Law, as stated in its most widely quoted form?", "options": [{"text": "Statistical regularities are inherently unstable and change over time.", "isCorrect": false, "rationale": "While regularities can collapse, this option misses the specific condition of them being used for policy as the cause according to Goodhart's Law."}, {"text": "The introduction of new policies inevitably leads to unforeseen negative consequences.", "isCorrect": false, "rationale": "This is a general statement about policy, not the specific mechanism or assertion of Goodhart's Law regarding measures and targets."}, {"text": "When a measure becomes a target, it ceases to be a good measure.", "isCorrect": true, "rationale": "This is the exact widely quoted form of Goodhart's Law provided in the text."}, {"text": "Complex systems cannot be effectively managed through numerical metrics.", "isCorrect": false, "rationale": "The text states that 'measurement is essential' and the problem is how measures are used, not measurement itself."}]}, {"question": "In the hospital administrator example, how did Goodhart's Law manifest?", "options": [{"text": "The target of reducing average length of stay led to patients being discharged prematurely, worsening outcomes.", "isCorrect": true, "rationale": "The text explicitly states, 'Patients are being discharged before they are ready, only to return sicker than before. The number moved in the right direction, but the reality moved in the wrong one.'"}, {"text": "Healthier patients naturally recovered faster, making the measure redundant.", "isCorrect": false, "rationale": "This describes the initial observation, not the negative consequence of Goodhart's Law after the measure became a target."}, {"text": "The hospital staff intentionally manipulated discharge data to meet the target.", "isCorrect": false, "rationale": "The text describes premature discharge as the mechanism, not data manipulation, for this specific example."}, {"text": "The hospital discovered that patient outcomes were unrelated to their length of stay.", "isCorrect": false, "rationale": "Patient outcomes did worsen, indicating a negative relationship formed when the measure became a target."}]}, {"question": "According to the text, what is the primary mechanism by which Goodhart's Law operates when a measure becomes a target?", "options": [{"text": "People stop trusting the measure because it is too easy to manipulate.", "isCorrect": false, "rationale": "The issue is that people do manipulate it, rather than losing trust in it as a target."}, {"text": "The underlying reality the measure represents naturally changes due to external factors.", "isCorrect": false, "rationale": "The text describes a behavioral change in response to the target, not a natural, external change in reality."}, {"text": "Individuals optimize their behavior to improve the numerical target rather than the actual reality it was designed to reflect.", "isCorrect": true, "rationale": "The text states, 'people begin optimizing for the number rather than for the reality it was supposed to represent. The measure becomes a target, and the target becomes a game.'"}, {"text": "The measure becomes too complex to understand once incentives are attached to it.", "isCorrect": false, "rationale": "Complexity is not cited as the primary mechanism; rather, it's the redirection of effort towards the number itself."}]}, {"question": "Which of the following best illustrates an application of Goodhart's Law in the context of standardized testing, as described in the section?", "options": [{"text": "Schools identify struggling students more accurately when test scores are used for funding decisions.", "isCorrect": false, "rationale": "This describes a positive, intended outcome of measurement, which is typically undermined by Goodhart's Law."}, {"text": "Teachers focus on developing critical thinking skills across a broad curriculum to improve overall student performance.", "isCorrect": false, "rationale": "The text indicates that the curriculum is narrowed, and teaching focuses on the test, not broader skills."}, {"text": "Curricula are narrowed, and teaching focuses on specific test content, potentially improving scores without deeper learning.", "isCorrect": true, "rationale": "The text states, 'Teachers “teach to the test,” drilling students... Schools narrow their curricula... The scores go up, but the learning may not.'"}, {"text": "Standardized tests are revised frequently to prevent them from becoming targets.", "isCorrect": false, "rationale": "Test revisions are not mentioned as a direct manifestation of Goodhart's Law; rather, the gaming behavior in response to current tests is."}]}, {"question": "The text suggests several 'antidotes' to Goodhart's Law. Which of the following is NOT one of the recommended approaches?", "options": [{"text": "Using multiple measures to assess performance.", "isCorrect": false, "rationale": "This is a recommended approach; the text explicitly states, 'use multiple measures.'"}, {"text": "Constantly rotating the measures used for evaluation.", "isCorrect": false, "rationale": "This is a recommended approach; the text explicitly states, 'to rotate them.'"}, {"text": "Eliminating all measurement to prevent gaming.", "isCorrect": true, "rationale": "The text explicitly refutes this, stating, 'The antidote is not to stop measuring but to use multiple measures...'"}, {"text": "Prioritizing the underlying reality over the numerical targets.", "isCorrect": false, "rationale": "This is a recommended approach; the text states, 'to never lose sight of the underlying reality the numbers are supposed to represent.'"}]}, {"question": "A software development team is tasked with increasing their 'lines of code written' (LOC) metric, which is tied to quarterly bonuses. According to Goodhart's Law, what is the most probable outcome?", "options": [{"text": "The team will focus on writing more efficient and concise code to meet the target.", "isCorrect": false, "rationale": "Efficient and concise code would likely reduce LOC, not increase it, making this contrary to optimizing for the numerical target."}, {"text": "The team's overall productivity and software quality will significantly improve due to clear incentives.", "isCorrect": false, "rationale": "Goodhart's Law predicts that optimizing for the number often degrades the underlying reality, such as quality or true productivity."}, {"text": "Developers might write unnecessary or redundant code to inflate their LOC count, without improving actual software functionality.", "isCorrect": true, "rationale": "This exemplifies optimizing for the numerical measure (LOC) rather than the underlying reality (good software functionality), akin to 'teaching to the test' or reclassifying crimes."}, {"text": "The team will identify new, more relevant metrics to accurately assess their performance.", "isCorrect": false, "rationale": "This describes an antidote or solution to Goodhart's Law, not a probable direct outcome when a measure has already become a gamed target."}]}, {"question": "The Wells Fargo account scandal, where employees opened unauthorized accounts, is presented as a 'real-world' example of Goodhart's Law. What critical element of Goodhart's Law does this scandal highlight?", "options": [{"text": "The inherent dishonesty of corporate employees when faced with any performance metrics.", "isCorrect": false, "rationale": "The text does not make a general claim about inherent dishonesty, but rather focuses on the corrupting influence of specific incentive structures."}, {"text": "The danger of using a single, highly incentivized measure, leading to widespread unethical behavior and systemic corruption.", "isCorrect": true, "rationale": "The text notes 'Under intense pressure to meet targets' and 'The stronger the incentives attached to the measure, the faster and more thoroughly it is corrupted,' resulting in 'fraud on a massive scale' and the measure 'consumed the institution.'"}, {"text": "The difficulty in accurately measuring customer satisfaction in financial services.", "isCorrect": false, "rationale": "The gamed metric was 'new accounts opened,' not customer satisfaction, although customer satisfaction would have plummeted as a result."}, {"text": "The inevitability of reputational damage for any company that uses KPIs.", "isCorrect": false, "rationale": "While reputational damage occurred, this is a consequence, not the core element of how Goodhart's Law operates in this context; the focus is on the mechanism of gaming the measure."}]}, {"question": "Charles Goodhart originally formulated his law in the context of what specific domain?", "options": [{"text": "Corporate key performance indicators (KPIs).", "isCorrect": false, "rationale": "This is one of the later generalized applications, not the original context."}, {"text": "Educational standardized testing.", "isCorrect": false, "rationale": "This is one of the later generalized applications, not the original context."}, {"text": "Monetary policy in the United Kingdom.", "isCorrect": true, "rationale": "The text explicitly states, 'Originally formulated in the context of monetary policy in the United Kingdom' and the personbox confirms his role in the Bank of England's Monetary Policy Committee."}, {"text": "Hospital administration and patient outcomes.", "isCorrect": false, "rationale": "This is one of the illustrative examples used to explain the law, not its original domain."}]}, {"question": "According to the text, which statement accurately distinguishes a 'good measure' from a 'target' in the context of Goodhart's Law?", "options": [{"text": "A good measure is inherently objective, while a target is always subjective.", "isCorrect": false, "rationale": "Both can be objective metrics; the distinction lies in their use and the incentives attached."}, {"text": "A good measure captures something about reality because it is not being manipulated; a target is optimized for its numerical value, irrespective of reality.", "isCorrect": true, "rationale": "The text states, 'A good measure captures something about reality. It works precisely because nobody is trying to manipulate it. The moment you attach rewards or punishments to the number, people begin optimizing for the number rather than for the reality.'"}, {"text": "A good measure is quantitative, whereas a target is qualitative.", "isCorrect": false, "rationale": "Both measures and targets, in the context of Goodhart's Law, are typically quantitative metrics."}, {"text": "A good measure is typically easier to achieve, while a target is intentionally challenging.", "isCorrect": false, "rationale": "The ease or difficulty of achievement is not the defining characteristic distinguishing a good measure from a target under Goodhart's Law."}]}, {"question": "What 'deeper lesson' about measurement does Goodhart's Law impart, beyond simply identifying a problem?", "options": [{"text": "All statistical measures are fundamentally flawed and should be distrusted.", "isCorrect": false, "rationale": "The text states, 'The deeper lesson is not that measurement is bad. Measurement is essential.'"}, {"text": "The more incentives attached to a single measure, the more aggressively it will be gamed, necessitating a multi-faceted approach.", "isCorrect": true, "rationale": "The text explains, 'the more weight you put on a single measure, the more aggressively it will be gamed. The antidote is... to use multiple measures, to rotate them, to hold them loosely, and — most importantly — to never lose sight of the underlying reality.'"}, {"text": "Human behavior is too unpredictable for any system of measurement to be truly effective.", "isCorrect": false, "rationale": "The text doesn't suggest futility but offers strategies for effective measurement despite human behavior."}, {"text": "Only qualitative assessments, rather than quantitative metrics, can reliably capture complex realities.", "isCorrect": false, "rationale": "The text emphasizes using quantitative measures correctly, not abandoning them for qualitative ones."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
