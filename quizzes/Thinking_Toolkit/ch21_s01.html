        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 1</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Streisand Effect was named after Barbra Streisand due to which specific event?", "options": [{"text": "Her public protests against paparazzi, highlighting privacy concerns.", "isCorrect": false, "rationale": "While Streisand is known for privacy concerns, the Streisand Effect is named after a very specific event, not general protests."}, {"text": "Her lawsuit demanding the removal of an aerial photograph of her Malibu home from a website.", "isCorrect": true, "rationale": "The text explicitly states the term was coined after Streisand's attempt to suppress a photograph of her Malibu home through a lawsuit."}, {"text": "Her successful campaign to remove a controversial film from circulation.", "isCorrect": false, "rationale": "The origin story involves a photograph and an unsuccessful attempt at suppression, not a film or a successful campaign."}, {"text": "Her public criticism of online media outlets for spreading misinformation.", "isCorrect": false, "rationale": "The naming event was a specific legal action regarding a photograph, not general criticism of media."}]}, {"question": "Prior to Barbra Streisand's lawsuit, how many times had the specific photograph of her home been downloaded from Kenneth Adelman's website?", "options": [{"text": "More than 420,000 times.", "isCorrect": false, "rationale": "420,000 views occurred *after* the lawsuit made headlines, not before."}, {"text": "Exactly six times, with two of those by her own attorneys.", "isCorrect": true, "rationale": "The text states: 'Before the lawsuit, the photograph had been downloaded exactly six times — two of which were by Streisand's own attorneys.'"}, {"text": "Only once, by the photographer himself.", "isCorrect": false, "rationale": "The text provides a specific number of downloads, which is more than one."}, {"text": "An unknown but negligible number of times.", "isCorrect": false, "rationale": "The text provides a precise number of downloads before the lawsuit."}]}, {"question": "According to the text, what is the primary mechanism by which the Streisand Effect causes information to spread?", "options": [{"text": "The information itself is inherently scandalous and generates viral interest.", "isCorrect": false, "rationale": "While information can be scandalous, the text emphasizes that it's the *attempted suppression* that makes previously uninteresting information become newsworthy and generate curiosity."}, {"text": "The act of suppression signals that the information is important, interesting, or threatening, piquing public curiosity.", "isCorrect": true, "rationale": "The text explains: 'Attempts at suppression signal that the information is important, interesting, or threatening. The act of censorship is itself newsworthy. People who would never have sought out the original information become curious precisely because someone is trying to hide it.'"}, {"text": "Whistleblowers intentionally leak suppressed information to expose censorship.", "isCorrect": false, "rationale": "While this can happen, the text describes a broader mechanism of public curiosity and the suppression *becoming the story*, rather than focusing specifically on whistleblowers."}, {"text": "Legal battles always attract media attention, regardless of the subject.", "isCorrect": false, "rationale": "The text focuses on the *content* of the suppression and the curiosity it generates, not just the general newsworthiness of any legal battle."}]}, {"question": "How has the architecture of the internet significantly amplified the Streisand Effect compared to pre-internet suppression attempts?", "options": [{"text": "It has reduced the overall volume of information, making individual suppressed items stand out more.", "isCorrect": false, "rationale": "The internet has vastly *increased* the volume of information, not reduced it."}, {"text": "It allows information to flow through millions of channels simultaneously, making removal from one site trigger copies on others.", "isCorrect": true, "rationale": "The text states: 'On the internet, information flows through millions of channels simultaneously. Removing content from one site triggers copies on dozens of others. Legal threats become screenshots. Takedown notices become news stories. The architecture of the internet is hostile to suppression.'"}, {"text": "It centralizes information control, making it easier for powerful actors to pressure specific platforms.", "isCorrect": false, "rationale": "The text argues the opposite; the internet's decentralized nature makes it harder to control information compared to pre-internet channels."}, {"text": "It primarily facilitates official government censorship efforts more efficiently.", "isCorrect": false, "rationale": "While governments *can* suppress, the text highlights that the general 'architecture of the internet is hostile to suppression' in open environments, making the Streisand Effect more powerful."}]}, {"question": "A small, independent blogger publishes a critical but factually minor piece of information about a large corporation. The corporation's internal team debates whether to send a legal cease-and-desist letter or ignore it. Applying the strategic lesson of the Streisand Effect, which approach is recommended?", "options": [{"text": "Immediately issue a public statement refuting the claims and demanding a retraction.", "isCorrect": false, "rationale": "This is a public response that would draw attention to the previously obscure information, potentially triggering the Streisand Effect."}, {"text": "Send a legal cease-and-desist letter to demonstrate the corporation's seriousness and protect its reputation.", "isCorrect": false, "rationale": "This is a direct attempt at suppression, analogous to Streisand's lawsuit, which the text identifies as a 'catastrophe' because it amplifies attention."}, {"text": "Ignore the information, as a legal challenge could draw far more attention to it than leaving it alone.", "isCorrect": true, "rationale": "The strategic lesson states: 'sometimes the best response to unwanted information is no response at all. A photograph viewed six times is not a problem. A lawsuit over a photograph viewed six times is a catastrophe.'"}, {"text": "Offer the blogger a confidential settlement to remove the content quietly.", "isCorrect": false, "rationale": "While less public than a lawsuit, any attempt to remove or hide information carries the risk of being exposed and thus drawing more attention, especially if it leaks."}]}, {"question": "Which statement best encapsulates the core definition of the Streisand Effect?", "options": [{"text": "The accidental discovery of private information due to technological advancements.", "isCorrect": false, "rationale": "The Streisand Effect is about the *attempted suppression* of information, not merely its discovery."}, {"text": "The phenomenon where an attempt to suppress or censor information inadvertently draws significantly more attention to it.", "isCorrect": true, "rationale": "This statement directly matches the definition provided in the text: 'This pattern — where the attempt to hide, remove, or censor information draws far more attention to it than leaving it alone would have — is now called the Streisand Effect.'"}, {"text": "The legal precedent set when a celebrity sues a photographer for invasion of privacy.", "isCorrect": false, "rationale": "This describes the specific event that gave the effect its name, not the general phenomenon itself."}, {"text": "The challenge of fact-checking and debunking misinformation on the internet.", "isCorrect": false, "rationale": "While related to information on the internet, this is not the core definition of the Streisand Effect, which focuses on the backfiring of suppression attempts."}]}, {"question": "The text acknowledges that the Streisand Effect doesn't mean all information is impossible to suppress. Which scenario is presented as a potential limitation or exception to the Streisand Effect?", "options": [{"text": "When information is only spread through private, invitation-only networks.", "isCorrect": false, "rationale": "This specific scenario is not mentioned as a limitation in the text."}, {"text": "When powerful actors can bury unflattering information under a flood of alternative content.", "isCorrect": true, "rationale": "The text states: 'Powerful actors can sometimes bury unflattering information under a flood of alternative content,' indicating a method that might circumvent the Streisand Effect."}, {"text": "When the suppressed information is entirely false and easily disproven.", "isCorrect": false, "rationale": "While being false might reduce its long-term credibility, the text does not say this prevents the initial amplification caused by suppression attempts."}, {"text": "When the information is deemed irrelevant by mainstream media outlets.", "isCorrect": false, "rationale": "The Streisand Effect often makes previously irrelevant information *highly relevant* by signaling its importance through suppression."}]}, {"question": "A company discovers a slightly embarrassing, but not highly damaging, internal email thread has been leaked and posted on a niche industry forum with only a few hundred members. Based on the Streisand Effect, which action would most likely cause the information to spread widely?", "options": [{"text": "Issue a company-wide memo cautioning employees against future leaks without addressing the specific incident publicly.", "isCorrect": false, "rationale": "An internal memo is unlikely to reach the broader public and thus would not directly trigger widespread attention to the leaked content."}, {"text": "Engage a legal team to demand the forum administrator remove the thread and threaten further action.", "isCorrect": true, "rationale": "This action is a direct attempt at suppression, analogous to Barbra Streisand's lawsuit. Such legal threats are likely to become news themselves, drawing public curiosity to the original content and causing it to spread beyond the niche forum."}, {"text": "Post a humorous, self-deprecating comment on the forum from an official company account, acknowledging the leak good-naturedly.", "isCorrect": false, "rationale": "This approach acknowledges the leak but avoids heavy-handed suppression, potentially defusing the situation or preventing widespread curiosity generated by censorship attempts."}, {"text": "Do nothing, allowing the content to remain on the niche forum where it likely won't gain traction.", "isCorrect": false, "rationale": "According to the Streisand Effect's strategic lesson, 'no response at all' is often the best way to prevent amplification. This option would *avoid* spreading the information widely, not cause it."}]}, {"question": "The text describes Barbra Streisand's lawsuit over the photograph as a 'catastrophe.' Why is this term used?", "options": [{"text": "Because she lost the lawsuit and was forced to pay the photographer damages.", "isCorrect": false, "rationale": "The text does not mention the legal outcome or if she paid damages; it focuses solely on the impact of the lawsuit on the photograph's visibility."}, {"text": "Because the attempt to suppress the image backfired spectacularly, drawing vastly more attention to it than it had before.", "isCorrect": true, "rationale": "The text clearly states the attempt 'produced a result spectacularly opposite to the one intended' and 'The cure was worse than the disease — not marginally worse, but orders of magnitude worse,' thus classifying it as a catastrophe."}, {"text": "Because the photograph contained highly sensitive personal information that became widely public.", "isCorrect": false, "rationale": "The text does not describe the content as 'highly sensitive,' but rather emphasizes the *amplification* of attention, turning an almost unseen image into one of the most discussed."}, {"text": "Because it established a legal precedent that made it harder for public figures to protect their privacy.", "isCorrect": false, "rationale": "The text focuses on the effect of the suppression on information spread, not on its impact on legal precedent."}]}, {"question": "The 'Think About It' section prompts consideration of when suppression might be worth the risk, especially for genuinely harmful or false information. Given the mechanisms described for the Streisand Effect, which scenario would present the strongest argument for considering suppression, despite the risks?", "options": [{"text": "A celebrity's embarrassing photo that is getting moderate attention on a gossip site.", "isCorrect": false, "rationale": "This is a classic Streisand Effect scenario where ignoring the photo would likely be the safest bet to prevent amplification."}, {"text": "A small but vocal group spreading a conspiracy theory that is rapidly gaining traction and inciting public panic.", "isCorrect": true, "rationale": "The 'Think About It' section specifically asks about 'genuinely harmful or false information.' If information is 'rapidly gaining traction and inciting public panic,' it implies significant, ongoing harm that might necessitate intervention, even if risky. This scenario moves beyond mere 'unwanted information' to potentially dangerous content that could justify weighing the risks of suppression against the harm of inaction."}, {"text": "An outdated, inaccurate product review for a company's old model that appears low in search results.", "isCorrect": false, "rationale": "This scenario describes information with minimal current impact, making it a prime candidate for the 'ignore it' strategy to avoid drawing attention."}, {"text": "A competitor's advertisement containing a minor factual inaccuracy that only industry experts would notice.", "isCorrect": false, "rationale": "This describes a low-impact inaccuracy, making it unlikely that suppression would be 'worth the risk' of amplification, as the harm from ignoring it is minimal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
