        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 5</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, who first described the halo effect and what was the initial context of its observation?", "options": [{"text": "Daniel Kahneman, studying cognitive biases in economic decisions.", "isCorrect": false, "rationale": "The text attributes the first description of the halo effect to Edward Thorndike, not Daniel Kahneman, and the context was military officer evaluations."}, {"text": "Edward Thorndike, observing military officer evaluations.", "isCorrect": true, "rationale": "The first paragraph explicitly states: 'The halo effect was first described by the psychologist Edward Thorndike in a 1920 paper based on military officer evaluations.'"}, {"text": "Amos Tversky, analyzing the impact of stereotypes on judgment.", "isCorrect": false, "rationale": "The text does not mention Amos Tversky as the originator of the halo effect description."}, {"text": "Sigmund Freud, examining unconscious influences on personality.", "isCorrect": false, "rationale": "Sigmund Freud is not mentioned in the text as describing the halo effect."}]}, {"question": "Which of the following best describes the core mechanism of the 'halo effect' as explained in the text?", "options": [{"text": "People tend to attribute their successes to internal factors and failures to external factors.", "isCorrect": false, "rationale": "This describes the Fundamental Attribution Error, which is a related concept but not the halo effect itself."}, {"text": "A single negative trait casts a shadow, influencing negative judgment of all other traits.", "isCorrect": false, "rationale": "This describes the 'horn effect,' the negative counterpart to the halo effect."}, {"text": "An initial positive quality creates a favorable impression that colors judgment of unrelated traits.", "isCorrect": true, "rationale": "The text defines the halo effect as 'a single salient positive quality... creates a “halo” that colors our judgment of every other quality. We do not evaluate traits independently. One good impression spills over into everything.'"}, {"text": "Individuals seek out and interpret information in a way that confirms their pre-existing beliefs.", "isCorrect": false, "rationale": "This describes Confirmation Bias, which is mentioned as a concept that interacts with the halo/horn effect, but is not the halo effect itself."}]}, {"question": "A person makes a grammatical error in an email during a job application process. According to the text, if this leads the hiring manager to judge them as less competent and less trustworthy overall, even for tasks unrelated to writing, which phenomenon is at play?", "options": [{"text": "The Representativeness Heuristic.", "isCorrect": false, "rationale": "The Representativeness Heuristic involves judging based on resemblance to a stereotype, not a single negative trait coloring all judgments."}, {"text": "The Horn Effect.", "isCorrect": true, "rationale": "The text states the horn effect is when 'One negative trait — an unpleasant voice, a visible tattoo, a grammatical error in an email — casts a shadow over everything else. A person who makes a bad first impression is judged as less competent, less trustworthy, and less likable across the board.'"}, {"text": "The Fundamental Attribution Error.", "isCorrect": false, "rationale": "The Fundamental Attribution Error concerns attributing causes of behavior (internal vs. external), not the spillover of a single trait to overall judgment."}, {"text": "Confirmation Bias.", "isCorrect": false, "rationale": "While confirmation bias might reinforce this negative judgment, the initial spread of the negative impression from the error to overall competence is the horn effect."}]}, {"question": "A new student is neatly dressed, polite, and attentive on the first day of class. Their teacher subsequently interprets ambiguous answers as 'almost right' and behavioral infractions as 'anomalies.' This scenario is a clear example of what?", "options": [{"text": "The teacher employing structured evaluation.", "isCorrect": false, "rationale": "Structured evaluation is presented as the 'antidote' to these effects, not the effect itself. The teacher's subjective interpretation indicates a lack of structured evaluation."}, {"text": "The student exhibiting exceptional academic potential.", "isCorrect": false, "rationale": "While the student might have potential, the scenario focuses on the *teacher's biased interpretation* of performance and behavior, not an objective assessment of potential."}, {"text": "The halo effect, where a positive first impression influences subsequent judgments.", "isCorrect": true, "rationale": "The text explicitly states: 'In the classroom, a teacher who forms a positive first impression of a student... will tend to interpret that student's subsequent performance more charitably. Ambiguous answers are read as 'almost right' rather than 'wrong.'' This perfectly matches the description."}, {"text": "Confirmation bias, as the teacher seeks evidence of the student's politeness.", "isCorrect": false, "rationale": "Confirmation bias helps sustain the halo, but the initial charitable interpretation of ambiguous answers and behaviors due to a positive first impression is the manifestation of the halo effect itself."}]}, {"question": "The text states that celebrity endorsements exploit the halo effect. Why is this considered an exploitation of the halo effect?", "options": [{"text": "Consumers consciously decide to buy products because they admire the celebrity's business acumen.", "isCorrect": false, "rationale": "The text explicitly states, 'We do not think this through consciously' and notes that the athlete's excellence is in sports, not necessarily business acumen related to the product."}, {"text": "The celebrity's fame and positive image transfer to the product, making it seem better, despite no logical connection.", "isCorrect": true, "rationale": "The text explains: 'The athlete's excellence at sports has nothing to do with watches, but the positive feelings we associate with the celebrity transfer to the product. ...it simply feels like the watch must be good, because the person recommending it is someone we admire.'"}, {"text": "Celebrities are paid to use products, which inherently makes the products superior.", "isCorrect": false, "rationale": "The payment to celebrities doesn't inherently make products superior; it's about the psychological transfer of positive feelings, not a change in product quality."}, {"text": "Consumers are making an informed decision based on the celebrity's direct experience with the product's quality.", "isCorrect": false, "rationale": "The text emphasizes the 'no logical connection' aspect, implying that the decision is not necessarily informed by direct, relevant experience."}]}, {"question": "To mitigate the halo and horn effects in a hiring process, the text recommends which approach?", "options": [{"text": "Relying solely on a single, comprehensive interview by a senior manager.", "isCorrect": false, "rationale": "The text states 'Unstructured interviews are dominated by halo and horn effects,' and a single comprehensive interview by one person would likely be unstructured and prone to bias."}, {"text": "Implementing structured interviews where candidates answer the same questions, scored independently.", "isCorrect": true, "rationale": "The 'realworld' section on 'Job interviews' states: 'Structured interviews — where each candidate answers the same questions, scored independently — reduce the halo effect by forcing evaluators to assess specific competencies rather than overall impressions.'"}, {"text": "Encouraging evaluators to form an overall impression quickly to save time.", "isCorrect": false, "rationale": "Forming an overall impression quickly would exacerbate, not mitigate, the halo and horn effects, as it relies on initial, potentially biased, judgments."}, {"text": "Having candidates submit only their resumes, without any personal interaction.", "isCorrect": false, "rationale": "While removing personal interaction might reduce some biases, the text specifically recommends 'structured evaluation' for *assessing* qualities, implying an active, organized evaluation process beyond just resume submission."}]}, {"question": "The text highlights the danger of the halo and horn effects in combination with confirmation bias. What is this danger?", "options": [{"text": "It leads individuals to overthink initial impressions, causing decision paralysis.", "isCorrect": false, "rationale": "The text suggests the opposite: impressions become 'self-sustaining' and lead to selective evidence, not paralysis."}, {"text": "It ensures that all subsequent evidence is evaluated objectively against the initial impression.", "isCorrect": false, "rationale": "This is incorrect; the combination leads to *non-objective* evaluation, filtering evidence."}, {"text": "It creates a filter that selectively admits evidence consistent with the initial impression, ignoring contradictory information.", "isCorrect": true, "rationale": "The text states: 'Once the halo is in place, we notice the person's good qualities and overlook the bad. Once the horns are in place, we notice the flaws and ignore the virtues. The initial impression creates a filter that selectively admits evidence consistent with itself.'"}, {"text": "It causes individuals to constantly change their judgments as new information becomes available.", "isCorrect": false, "rationale": "The effects, especially combined with confirmation bias, make judgments 'self-sustaining' and resistant to change, not constantly changing."}]}, {"question": "When Edward Thorndike conducted his study on military officers, what was his expectation regarding the ratings of various traits, and what did he actually find?", "options": [{"text": "He expected ratings to be highly correlated and found them to be mostly independent.", "isCorrect": false, "rationale": "This is the opposite of what Thorndike expected and found."}, {"text": "He expected ratings to vary independently but found them to be overwhelmingly correlated.", "isCorrect": true, "rationale": "The text states: 'He expected the ratings to vary independently... Instead, Thorndike found that the ratings were overwhelmingly correlated.'"}, {"text": "He expected ratings to be influenced by external factors and found them to be purely subjective.", "isCorrect": false, "rationale": "The text focuses on the correlation between subjective trait ratings, not external factors versus pure subjectivity."}, {"text": "He expected officers to rate subordinates honestly and found significant evidence of deliberate deception.", "isCorrect": false, "rationale": "The study was about unconscious bias in judgment, not deliberate deception."}]}, {"question": "Apple, Google, and other strong brands benefit from corporate halo effects. Based on the text, what does this mean for a consumer who loves Apple's phones?", "options": [{"text": "The consumer will logically deduce that Apple's other products are superior due to shared technology.", "isCorrect": false, "rationale": "The text suggests that the halo effect is not about logical deduction but rather a transfer of positive feelings, where things 'feel good' without conscious thought."}, {"text": "The consumer will evaluate Apple's computers, watches, and streaming service more favorably than identical products from less-loved brands.", "isCorrect": true, "rationale": "The 'realworld' section on 'Brand loyalty' states: 'A consumer who loves Apple's phones evaluates Apple's computers, watches, and streaming service more favorably than identical products from less-loved brands. The halo generated by one excellent product extends to the entire product line.'"}, {"text": "The consumer will be immune to the horn effect when considering Apple's competitor products.", "isCorrect": false, "rationale": "The text doesn't suggest immunity to the horn effect for competitors; it focuses on the positive spillover for the favored brand's products."}, {"text": "The consumer will only purchase Apple products and actively avoid all other brands.", "isCorrect": false, "rationale": "The text says 'more favorably,' which implies a preference, not necessarily exclusive purchasing or active avoidance of all competitors."}]}, {"question": "The text states that the halo effect 'shapes decisions with real consequences.' Which of the following examples from the text best illustrates this point?", "options": [{"text": "A military officer rating a soldier's physique and leadership.", "isCorrect": false, "rationale": "This describes Thorndike's initial *observation* of the effect, but not necessarily a direct, tangible 'real consequence' in the same way as other examples."}, {"text": "A person interpreting an ambiguous email from a colleague.", "isCorrect": false, "rationale": "While an example of the effect, the consequence of interpreting an ambiguous email is generally less impactful than the legal or career examples given."}, {"text": "Physically attractive defendants receiving lighter sentences in criminal courts.", "isCorrect": true, "rationale": "The text explicitly states this as a 'real consequence': 'Attractive defendants receive lighter sentences in criminal courts.' This has significant, tangible impacts on individuals' lives and freedom."}, {"text": "A consumer preferring a celebrity-endorsed watch.", "isCorrect": false, "rationale": "While a consequence for product sales, the impact on a consumer's life or legal standing is less 'real' in the severe sense of 'lighter sentences.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
