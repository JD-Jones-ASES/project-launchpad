<script>
var QUESTIONS = [{"question": "According to Thomas Kuhn, what does a 'paradigm shift' fundamentally entail, in its precise and radical sense?", "options": [{"text": "The smooth, cumulative addition of new facts to existing scientific knowledge.", "isCorrect": false, "rationale": "Kuhn explicitly argued against the idea that science progresses by smooth, cumulative addition. This describes normal science, not a paradigm shift."}, {"text": "A wholesale transformation of the foundational assumptions, methods, and vocabulary of an entire field of science.", "isCorrect": true, "rationale": "Kuhn defined a paradigm shift as a radical change where the entire framework—questions, methods, and even key terms—is redefined, requiring scientists to 'rebuild their intellectual furniture'."}, {"text": "A minor adjustment or refinement within an established scientific framework to better explain new observations.", "isCorrect": false, "rationale": "Minor adjustments or refinements are characteristic of 'normal science' operating within an existing paradigm, not a revolutionary shift from one paradigm to another."}, {"text": "The process of setting aside unexplained observations or treating them as errors within a scientific theory.", "isCorrect": false, "rationale": "Setting aside anomalies is an initial reaction within normal science when confronted with problems, but it is not the definition of a paradigm shift itself; rather, it's a precursor."}]}, {"question": "Which of the following activities best exemplifies 'normal science' in Kuhn's framework?", "options": [{"text": "Proposing a completely new theory that overturns the current understanding of gravity.", "isCorrect": false, "rationale": "Proposing theories that overturn fundamental understandings is characteristic of revolutionary science, not normal science."}, {"text": "A Darwinian biologist tracing lines of descent to extend and refine the theory of evolution.", "isCorrect": true, "rationale": "This describes 'puzzle-solving' within an accepted framework, using established methods and questions, which is Kuhn's definition of normal science."}, {"text": "Debating the fundamental meaning of 'mass' and 'time' after a major scientific breakthrough.", "isCorrect": false, "rationale": "Changes in the meaning of key terms occur during a paradigm shift (revolutionary science), not during normal science, where terms are generally understood and stable."}, {"text": "Rejecting an existing scientific model because it cannot explain a growing number of anomalies.", "isCorrect": false, "rationale": "Rejecting an existing model in favor of a new one is part of a scientific revolution, not the everyday work of normal science operating within that model."}]}, {"question": "What role do 'anomalies' play in initiating a scientific revolution, according to Kuhn?", "options": [{"text": "They are immediately discarded as errors, strengthening the existing paradigm by confirming its predictive power.", "isCorrect": false, "rationale": "While initially anomalies might be treated as errors, if they accumulate significantly, they undermine the paradigm, rather than strengthening it."}, {"text": "They lead to minor adjustments and expansions of the paradigm, ensuring its long-term stability without radical change.", "isCorrect": false, "rationale": "Minor adjustments are part of normal science, but if anomalies persist and accumulate, they signal a crisis that cannot be resolved by minor adjustments."}, {"text": "They are irrelevant to scientific progress, as new facts are simply added to old ones regardless of inconsistencies.", "isCorrect": false, "rationale": "Kuhn specifically states that science does not progress by the smooth addition of facts, and anomalies are crucial catalysts for change."}, {"text": "They accumulate until the paradigm can no longer explain them, paving the way for a rival framework to emerge.", "isCorrect": true, "rationale": "Kuhn posits that anomalies, when numerous and persistent, create a crisis for the existing paradigm, making it vulnerable to replacement by a new framework that can explain both old successes and new puzzles."}]}, {"question": "The text describes the transition from one paradigm to another as 'messy, contentious, and often generational.' What does this imply about the nature of scientific progress during a revolution?", "options": [{"text": "It is a calm, purely rational process of weighing evidence, leading to immediate consensus.", "isCorrect": false, "rationale": "Kuhn explicitly states the transition is 'not a calm, rational process' and involves significant contention, implying it is far from immediate consensus."}, {"text": "It primarily involves the older generation of scientists quickly adopting the new ideas.", "isCorrect": false, "rationale": "The text notes it is 'often generational,' meaning older scientists often resist, and the new paradigm sometimes wins out as the old guard retires, not through quick adoption."}, {"text": "It is a gradual, smooth progression where new information seamlessly integrates with existing theories.", "isCorrect": false, "rationale": "Kuhn argues against this 'smooth, cumulative addition' model, emphasizing the disruptive and revolutionary nature of paradigm shifts."}, {"text": "It involves significant intellectual struggle and resistance from proponents of the old paradigm.", "isCorrect": true, "rationale": "The description 'messy, contentious' and the statement that 'defenders of the old paradigm do not simply concede; they fight' directly support that it is a struggle with resistance."}]}, {"question": "When a new paradigm, such as Einstein's relativity replacing Newton's physics, emerges, what is its most profound impact according to Kuhn?", "options": [{"text": "It primarily adds new, more accurate facts to the existing body of Newtonian knowledge.", "isCorrect": false, "rationale": "Kuhn emphasizes that a new paradigm does not just add facts; it fundamentally alters the framework. Einstein's work changed the very meaning of 'mass' and 'time' rather than just adding new data points to Newton's equations."}, {"text": "It simplifies scientific methodologies, making research easier and more accessible.", "isCorrect": false, "rationale": "The text does not suggest new paradigms necessarily simplify methods; instead, they change them entirely, requiring new ways of thinking and experimenting."}, {"text": "It changes the fundamental questions deemed worth asking, the legitimate methods, and the meaning of key scientific terms.", "isCorrect": true, "rationale": "This directly aligns with Kuhn's assertion that a new paradigm 'changes the questions, the methods, and sometimes the very meaning of key terms,' requiring a complete re-evaluation of the field."}, {"text": "It immediately invalidates all previous scientific findings and renders them completely useless.", "isCorrect": false, "rationale": "A new paradigm often explains the successes of the old one in addition to the new puzzles, meaning old findings are reinterpreted within the new framework rather than simply invalidated."}]}, {"question": "The Copernican revolution, which saw the Earth-centered Ptolemaic model replaced by a Sun-centered model, illustrates which key characteristic of a Kuhnian paradigm shift?", "options": [{"text": "The rapid and universal adoption of a new, immediately superior model.", "isCorrect": false, "rationale": "The text explicitly states Copernicus's model was 'initially less accurate' and the shift was 'not a single moment of triumph but a decades-long struggle,' refuting rapid adoption."}, {"text": "The smooth integration of new astronomical data into the existing Ptolemaic framework.", "isCorrect": false, "rationale": "The shift involved replacing the core assumption of the Earth at the center, not smoothly integrating data into the old model, which relied on increasingly awkward patches."}, {"text": "A situation where the new paradigm initially offers less accuracy but fundamentally redefines the universe's structure, eventually gaining acceptance through further developments and evidence.", "isCorrect": true, "rationale": "The text highlights that Copernicus's model was 'initially less accurate' but 'proposed that the Sun was at the center,' fundamentally changing the cosmic structure, and 'took Kepler's ellipses and Galileo's telescope observations to tip the balance,' illustrating a multi-stage revolutionary process."}, {"text": "A process driven solely by the irrational resistance of old-guard scientists to any new ideas.", "isCorrect": false, "rationale": "The text notes 'the old guard had legitimate objections,' indicating their resistance was not purely irrational but based on the existing evidence and framework."}]}, {"question": "The 'caution' section warns that 'paradigm shift' has been diluted by overuse. Which of the following would *not* qualify as a genuine Kuhnian paradigm shift?", "options": [{"text": "The replacement of a vitalist theory of life with a mechanistic, biochemical understanding.", "isCorrect": false, "rationale": "This would represent a fundamental change in the underlying assumptions about life itself, aligning with Kuhn's definition of a wholesale transformation of foundational assumptions."}, {"text": "A pharmaceutical company introducing a new drug delivery system that is more efficient.", "isCorrect": true, "rationale": "This is an innovation or improvement within an existing scientific or technological framework, not a 'wholesale transformation of the foundational assumptions, methods, and vocabulary of an entire field'."}, {"text": "The transition from an alchemical view of matter to modern chemistry with its atomic theory.", "isCorrect": false, "rationale": "As explicitly mentioned in the text, 'When chemistry replaced alchemy, 'element' changed its meaning,' indicating a fundamental shift in concepts and methods."}, {"text": "The acceptance of plate tectonics as the unifying theory for geology, explaining earthquakes, volcanoes, and continental drift.", "isCorrect": false, "rationale": "The emergence of plate tectonics as a unifying theory redefined geological questions and methods, acting as a new paradigm for the field."}]}, {"question": "The 'thinkaboutit' section raises the question: if scientists on opposite sides of a paradigm shift are 'speaking different languages' with different meanings for the same words, what is the core challenge this poses for scientific progress?", "options": [{"text": "It makes it impossible for scientists to collaborate on research projects during a period of normal science.", "isCorrect": false, "rationale": "This issue arises during revolutionary science, not normal science, where scientists within a paradigm share a common language and framework."}, {"text": "It prevents the accumulation of any new empirical data until a consensus is reached.", "isCorrect": false, "rationale": "Data can still be accumulated, but its interpretation and significance change, making it difficult to use as a neutral arbiter between paradigms."}, {"text": "It complicates rational debate and objective comparison between the competing paradigms.", "isCorrect": true, "rationale": "If fundamental terms and concepts have different meanings (incommensurability), it becomes extremely difficult for proponents of different paradigms to engage in truly rational, objective debate, as they may not even agree on what constitutes 'evidence' or a 'good answer'."}, {"text": "It leads to the immediate abandonment of the older paradigm as soon as the new one appears.", "isCorrect": false, "rationale": "The text notes the transition is 'messy, contentious' and 'generational,' indicating a prolonged struggle, not immediate abandonment."}]}, {"question": "According to Kuhn, why do truly revolutionary ideas face fierce resistance, making scientific progress feel 'jerky and contentious' from the inside?", "options": [{"text": "Because scientists are inherently conservative and resist any form of intellectual change.", "isCorrect": false, "rationale": "While resistance exists, Kuhn suggests it's not simply an inherent conservatism but a logical defense of a well-established framework that has successfully solved many puzzles."}, {"text": "Because revolutionary ideas are almost always less accurate than established theories when first proposed.", "isCorrect": false, "rationale": "While a new paradigm might initially be less accurate (like Copernicus), this is not the universal reason for fierce resistance, nor the primary reason given by Kuhn for the 'rebuild intellectual furniture' aspect."}, {"text": "Because they are not just adding new facts, but asking everyone to rebuild their fundamental intellectual frameworks.", "isCorrect": true, "rationale": "This directly quotes and summarizes Kuhn's insight: revolutionary ideas demand a complete reorientation of understanding, which is a massive and difficult undertaking, thus causing fierce resistance."}, {"text": "Because the proponents of new ideas lack the social and institutional power to enforce their views.", "isCorrect": false, "rationale": "While institutional power dynamics can play a role, Kuhn's primary explanation for 'fierce resistance' lies in the profound intellectual and conceptual upheaval a revolution entails."}]}, {"question": "Based on the entire section, what is the overarching model of scientific progress proposed by Thomas Kuhn?", "options": [{"text": "Science progresses through a continuous, incremental accumulation of new observations and experimental data.", "isCorrect": false, "rationale": "Kuhn specifically rejected this 'smooth, cumulative addition of new facts' model, which is a common misconception he sought to correct."}, {"text": "Science advances primarily by scientists working within an accepted framework, gradually refining it over time.", "isCorrect": false, "rationale": "This describes 'normal science,' which is only one of Kuhn's two modes; it doesn't encompass the revolutionary aspect that drives fundamental change."}, {"text": "Science progresses through alternating periods of stable, puzzle-solving 'normal science' and disruptive 'revolutionary science' that replaces paradigms.", "isCorrect": true, "rationale": "This statement accurately captures Kuhn's core thesis: the alternation between normal science (operating within a paradigm) and revolutionary science (replacing the paradigm), explaining the 'jerky' nature of progress."}, {"text": "Scientific progress is entirely irrational, with new ideas simply winning out when older scientists retire.", "isCorrect": false, "rationale": "While Kuhn acknowledges the generational aspect and the difficulty of rational debate during a shift, he doesn't claim the entire process is 'entirely irrational,' but rather that it is 'messy, contentious,' and not purely rational."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
