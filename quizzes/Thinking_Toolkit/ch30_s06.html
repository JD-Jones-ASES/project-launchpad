<script>
var QUESTIONS = [{"question": "What is a common characteristic that makes the Straw Man, Red Herring, and False Dilemma fallacies particularly effective and difficult to counter in real-time debates?", "options": [{"text": "They rely on highly complex logical structures that confuse the audience.", "isCorrect": false, "rationale": "The text states these fallacies are 'easy to deploy' and 'distort the terms of a debate so subtly,' implying they don't rely on complex logical structures but rather on misdirection and distortion."}, {"text": "They directly challenge the opponent's core premises with factual inaccuracies.", "isCorrect": false, "rationale": "While they might involve inaccuracies, their primary mechanism is to 'distort' or 'divert,' rather than directly challenging core factual premises, which would be more easily spotted."}, {"text": "They subtly distort the terms of the debate, often going unnoticed by inattentive audiences.", "isCorrect": true, "rationale": "The text explicitly states these fallacies 'corrupt with misdirection. Each one distorts the terms of a debate so subtly that the audience—and sometimes even the participants—may not notice,' making them effective on 'inattentive audiences.'"}, {"text": "They are primarily effective because they appeal to universal human values like justice and fairness.", "isCorrect": false, "rationale": "While a red herring might divert to a topic the audience cares about (which might involve values), the text attributes the effectiveness of all three generally to 'misdirection' and 'subtle distortion,' not primarily to a direct appeal to universal values."}]}, {"question": "Which of the following best exemplifies a Straw Man fallacy?", "options": [{"text": "If we don't increase military spending, our nation will be completely vulnerable to attack, or we'll be forced to surrender our sovereignty.", "isCorrect": false, "rationale": "This statement presents only two extreme options when more likely exist, making it an example of a False Dilemma."}, {"text": "When asked about declining school performance, a principal responds, 'What we really need to focus on is supporting our dedicated teachers and staff.'", "isCorrect": false, "rationale": "While supporting teachers is worthy, it avoids the question about declining school performance by introducing a related but irrelevant topic, characteristic of a Red Herring."}, {"text": "Responding to an argument for stricter environmental regulations by saying, 'So you want to shut down all industries and make everyone unemployed?'", "isCorrect": true, "rationale": "This is a direct example of a Straw Man. The original argument for 'stricter environmental regulations' is distorted into an extreme caricature ('shut down all industries, make everyone unemployed') that is easier to attack, as explained in the text's example of public transportation."}, {"text": "Presenting statistics on economic growth while ignoring unemployment rates when discussing economic policy.", "isCorrect": false, "rationale": "This may be an incomplete argument or cherry-picking data, but it doesn't fit the definition of a Straw Man, which specifically involves distorting an opponent's *argument*."}]}, {"question": "A senator argues for increased funding for renewable energy research. An opponent responds, 'My colleague clearly wants to eliminate all jobs in the fossil fuel industry immediately, leaving thousands without work.' According to the text, what is the most effective immediate remedy for the senator to address this Straw Man?", "options": [{"text": "Immediately pivot to a different topic, such as national security.", "isCorrect": false, "rationale": "This would be engaging in a Red Herring fallacy, not defending against a Straw Man. The defense for a Red Herring is to steer the conversation *back* to the original topic."}, {"text": "Introduce a new, unrelated policy proposal to shift the debate.", "isCorrect": false, "rationale": "Similar to option A, this tactic would be a Red Herring, diverting attention rather than correcting the distortion of the original argument."}, {"text": "Restate their original position on renewable energy research to clarify that it doesn't propose immediate elimination of fossil fuel jobs.", "isCorrect": true, "rationale": "The text advises: 'before criticizing a position, restate it in a way your opponent would accept.' By clarifying their actual position, the senator dismantles the distorted 'straw man' version."}, {"text": "Attack the opponent's character for making a dishonest claim.", "isCorrect": false, "rationale": "While the opponent's claim might be dishonest, an ad hominem attack on character does not address the distorted argument itself and can escalate the debate negatively without clarifying the original point."}]}, {"question": "Which scenario most clearly demonstrates the Red Herring fallacy?", "options": [{"text": "An activist argues, 'Either we fully fund universal healthcare, or countless citizens will die preventable deaths.'", "isCorrect": false, "rationale": "This is a False Dilemma, presenting only two extreme options when other solutions or middle grounds might exist."}, {"text": "During a debate on education reform, a speaker begins discussing the importance of parental involvement and moral education, shifting away from specific policy proposals for funding and curriculum.", "isCorrect": true, "rationale": "This aligns with the definition of a Red Herring: 'introduces an irrelevant topic to divert attention from the original issue.' While parental involvement is important, it diverts from the specific policy proposals on education reform."}, {"text": "A politician states, 'My opponent's plan to reduce crime is absurd; they clearly want to defund all police departments and let criminals run free.'", "isCorrect": false, "rationale": "This is a Straw Man, as it distorts the opponent's plan into an extreme and easily attackable version."}, {"text": "A company advertises its product by claiming competitors 'cut corners,' without specific evidence or relating it to a direct claim made by competitors.", "isCorrect": false, "rationale": "This could be a form of misleading advertising or an unsupported generalization, but it's not a Red Herring because it's not diverting from an original question or argument within a debate context, nor is it clearly distorting an opponent's stated argument."}]}, {"question": "During a town hall meeting, a citizen asks a mayor about the city's rising crime rate. The mayor responds by discussing the city's new parks and recreation initiatives, highlighting their benefits for community well-being. What is the most appropriate defense against the mayor's Red Herring?", "options": [{"text": "Interrupt the mayor and accuse them of avoiding the question.", "isCorrect": false, "rationale": "While direct, the text suggests a more disciplined and explicit approach to steer the conversation back, rather than just an accusation which might be perceived as aggressive."}, {"text": "Explicitly acknowledge the new parks as a positive development, but then firmly steer the conversation back to the original question about crime rates.", "isCorrect": true, "rationale": "The text advises: 'The defense is to say, explicitly, 'That is an important topic, but it is not the question I asked. Can we return to the original question?'' This option perfectly matches that advice."}, {"text": "Present statistics showing that the new parks have not reduced crime rates.", "isCorrect": false, "rationale": "This would engage with the irrelevant topic of parks, thereby validating the mayor's diversion rather than redirecting to the original question about the crime rate."}, {"text": "Change the subject to a different issue that is also important to the community.", "isCorrect": false, "rationale": "This would be a Red Herring itself, diverting the conversation even further from the original question."}]}, {"question": "According to the text, what is the fundamental flaw of a False Dilemma?", "options": [{"text": "It attacks a distorted version of an opponent's argument.", "isCorrect": false, "rationale": "This describes a Straw Man fallacy."}, {"text": "It introduces an irrelevant topic to distract from the main issue.", "isCorrect": false, "rationale": "This describes a Red Herring fallacy."}, {"text": "It presents only two options when a wider range of possibilities actually exists.", "isCorrect": true, "rationale": "The text states, 'A false dilemma presents only two options when more exist.' This is its defining characteristic and fundamental flaw."}, {"text": "It uses overly emotional language to bypass rational thought.", "isCorrect": false, "rationale": "While false dilemmas can be effective in emotional contexts, the *flaw* itself is the limitation of choices, not the emotional language used to present them."}]}, {"question": "Why is the False Dilemma particularly effective in emotional contexts, according      to the text?", "options": [{"text": "Emotional contexts make people more skeptical of simple choices.", "isCorrect": false, "rationale": "The text states the opposite: simplicity becomes appealing."}, {"text": "The complexity of multiple options feels overwhelming, making simple binary choices appealing.", "isCorrect": true, "rationale": "The text explains: 'When people are frightened or angry, the complexity of multiple options feels overwhelming, and the simplicity of 'A or B' is appealing.' This is precisely why it's effective in emotional contexts."}, {"text": "Emotions cause people to seek out and consider all available options thoroughly.", "isCorrect": false, "rationale": "This is contrary to the text's explanation. Emotional contexts tend to reduce the desire for complex analysis."}, {"text": "It allows for a more nuanced and detailed discussion of difficult topics.", "isCorrect": false, "rationale": "A false dilemma eliminates nuance by restricting choices, rather than fostering detailed discussion."}]}, {"question": "The 'Three Workhorses of Bad Argument' (Straw Man, Red Herring, False Dilemma) all share a common defense strategy. Which of the following best describes this overarching approach?", "options": [{"text": "Immediately counter with a personal attack on the arguer's credibility.", "isCorrect": false, "rationale": "Personal attacks (ad hominem) are fallacies themselves and are not the recommended defense against these specific fallacies."}, {"text": "Force the arguer to defend the logical validity of their premise.", "isCorrect": false, "rationale": "While important in general logic, the text's common defense for these three is more specific to exposing the misdirection or distortion, rather than solely focusing on logical validity of a premise."}, {"text": "Slow down the exchange, restate the original claim, and verify if the response truly addresses it.", "isCorrect": true, "rationale": "The 'keyconcept' section states: 'The common defense: slow down, restate the original claim, and check whether the response actually addresses it.' This strategy counters the 'misdirection' common to all three."}, {"text": "Introduce a different, equally compelling topic to shift the debate's focus.", "isCorrect": false, "rationale": "This would be employing a Red Herring fallacy, which is a tactic of bad argument, not a defense against it."}]}, {"question": "In a television debate, a politician says, 'My opponent believes we should cut all social programs, leaving the poor and elderly destitute! Either you support my plan for comprehensive welfare, or you want people to suffer.' This statement likely employs which two fallacies?", "options": [{"text": "Red Herring and Gish Gallop.", "isCorrect": false, "rationale": "There is no indication of a Red Herring (irrelevant topic diversion) or a Gish Gallop (overwhelming with quantity) in this statement. The first part is distortion, the second is limited options."}, {"text": "False Dilemma and Straw Man.", "isCorrect": true, "rationale": "The claim 'My opponent believes we should cut all social programs, leaving the poor and elderly destitute!' is a Straw Man, distorting the opponent's likely more nuanced position. The statement 'Either you support my plan... or you want people to suffer' is a False Dilemma, presenting only two extreme choices."}, {"text": "Straw Man and Red Herring.", "isCorrect": false, "rationale": "While the first part is a Straw Man, the second part ('Either/or...') is a False Dilemma, not a Red Herring."}, {"text": "False Dilemma and Moving the Goalposts.", "isCorrect": false, "rationale": "There is no evidence of Moving the Goalposts (changing criteria for success) in this statement. The fallacies present are clearly Straw Man and False Dilemma."}]}, {"question": "The 'thinkaboutit' section states that recognizing these patterns in one's own reasoning is harder—and more valuable—than spotting them in others. Why is this often the case?", "options": [{"text": "People are naturally more forgiving of their own logical inconsistencies.", "isCorrect": false, "rationale": "While some self-forgiveness may exist, the text implies a deeper cognitive challenge of objective self-assessment rather than simply being 'forgiving' of inconsistencies."}, {"text": "Our own arguments are usually more complex, making fallacies harder to discern.", "isCorrect": false, "rationale": "The complexity of one's own arguments is not cited as the primary reason for difficulty. The difficulty comes from a lack of critical distance."}, {"text": "We are often less critical of our own premises and reasoning, making it difficult to objectively identify our own distortions or evasions.", "isCorrect": true, "rationale": "The text implicitly points to cognitive biases in self-assessment. When we construct an argument, we are typically invested in its success and believe in its validity, making it challenging to critically examine it for subtle distortions or diversions that we might easily spot in an opponent's argument."}, {"text": "Opponents are typically less skilled at deploying these fallacies, making them easier to spot when used by others.", "isCorrect": false, "rationale": "The text makes no claim about the skill level of opponents. The difficulty is internal to self-reflection, not external to the other party's abilities."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
