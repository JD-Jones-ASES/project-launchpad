        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 3</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which statement best summarizes Parfit's Repugnant Conclusion?", "options": [{"text": "A smaller population of very happy people is always preferable to a larger population of barely happy people.", "isCorrect": false, "rationale": "This contradicts the Repugnant Conclusion, which states that by total utilitarian standards, a much larger population of barely happy people can be better."}, {"text": "A world with a vast number of people living lives barely worth living can be considered better than a world with fewer, very happy people, according to total utilitarianism.", "isCorrect": true, "rationale": "The Repugnant Conclusion highlights that, when measuring value by total happiness, the sheer number of barely-worth-living lives in World Z outweighs the smaller number of wonderful lives in World A."}, {"text": "The average happiness per person decreases as population size increases, making larger populations inherently worse.", "isCorrect": false, "rationale": "This describes a concern related to average utilitarianism, not the core statement of the Repugnant Conclusion itself, which is based on total happiness."}, {"text": "Maximizing total happiness inevitably leads to a population where everyone is miserable.", "isCorrect": false, "rationale": "The lives in World Z are described as 'barely worth living,' not miserable, and the conclusion is about the *total* happiness, not universal misery."}], "id": "q01"}, {"question": "According to total utilitarianism, if World A has 10 billion very happy people and World Z has 100 trillion people living lives barely worth living, which world is considered 'better' and why?", "options": [{"text": "World A, because the quality of life for individuals is higher.", "isCorrect": false, "rationale": "Total utilitarianism focuses on the sum of happiness, not the individual quality of life, when making such comparisons."}, {"text": "World Z, because the sheer number of lives, even if barely happy, results in a greater sum of happiness.", "isCorrect": true, "rationale": "The text explicitly states that if value is measured by total happiness, World Z is better because 'the sheer number of barely-happy lives outweighs the smaller number of wonderful lives.'"}, {"text": "Neither, as happiness cannot be quantitatively compared between such different scenarios.", "isCorrect": false, "rationale": "Total utilitarianism, by its nature, attempts to make precisely this kind of quantitative comparison."}, {"text": "World A, because average happiness is maximized.", "isCorrect": false, "rationale": "This would be the conclusion of average utilitarianism, not total utilitarianism."}], "id": "q02"}, {"question": "Why did Derek Parfit label the conclusion 'repugnant'?", "options": [{"text": "Because the mathematical calculation involved is inherently flawed and cannot be trusted.", "isCorrect": false, "rationale": "The text describes the logic as 'simple multiplication' and the arithmetic as 'seemingly unassailable,' implying the calculation itself is not the problem."}, {"text": "Because it implies that individual suffering is acceptable if it benefits the overall population.", "isCorrect": false, "rationale": "The lives in World Z are 'barely worth living,' not suffering, though the conclusion still feels wrong."}, {"text": "Because it conflicts with widely held intuitions about what constitutes a good or desirable world, despite being logically derived from total utilitarian principles.", "isCorrect": true, "rationale": "The text explains the paradox as 'the tension between our intuitive rejection of this result and the seemingly unassailable arithmetic that produces it.'"}, {"text": "Because it suggests that populations should be kept small to maximize happiness.", "isCorrect": false, "rationale": "The Repugnant Conclusion, from a total utilitarian perspective, suggests that a larger population of barely happy people can be 'better' than a smaller population of very happy people, which is the opposite of keeping populations small to maximize total happiness."}], "id": "q03"}, {"question": "Which philosopher is primarily credited with developing and extensively discussing the Repugnant Conclusion?", "options": [{"text": "John Stuart Mill", "isCorrect": false, "rationale": "While a prominent utilitarian, Mill is not the originator of the Repugnant Conclusion."}, {"text": "Derek Parfit", "isCorrect": true, "rationale": "The section explicitly names 'Derek Parfit, Reasons and Persons, 1984' as the source for the Repugnant Conclusion."}, {"text": "Immanuel Kant", "isCorrect": false, "rationale": "Kant is a deontological philosopher whose work is distinct from utilitarianism and the Repugnant Conclusion."}, {"text": "Robert Nozick", "isCorrect": false, "rationale": "Nozick is known for his work in political philosophy and libertarianism, not for the Repugnant Conclusion."}], "id": "q04"}, {"question": "How does average utilitarianism attempt to avoid the Repugnant Conclusion, and what is its immediate implication for comparing World A and World Z?", "options": [{"text": "It focuses on maximizing the total sum of happiness, leading it to prefer World Z.", "isCorrect": false, "rationale": "This describes total utilitarianism, not average utilitarianism, and average utilitarianism would prefer World A."}, {"text": "It prioritizes the happiness of existing individuals, thus not comparing different-sized populations.", "isCorrect": false, "rationale": "This describes person-affecting views, not average utilitarianism."}, {"text": "It aims to maximize happiness per person, which would lead it to prefer World A over World Z.", "isCorrect": true, "rationale": "Average utilitarianism 'Instead of maximizing total happiness, maximize average happiness per person. World A wins easily' because individual lives in World A are far happier on average."}, {"text": "It sets a critical threshold for welfare, disregarding lives below that level, making World Z less valuable.", "isCorrect": false, "rationale": "This describes critical-level theories, not average utilitarianism."}], "id": "q05"}, {"question": "A government is considering two infrastructure projects. Project X would create a small, highly developed region where 10 million citizens live very fulfilling lives. Project Y would enable a much larger population of 100 million people to live lives that are barely worth living, but the sum of their minimal happiness is greater than the total happiness in Project X. A strict total utilitarian would likely recommend:", "options": [{"text": "Project X, because it maximizes the individual quality of life for its citizens.", "isCorrect": false, "rationale": "A strict total utilitarian would prioritize the overall sum of happiness, not individual quality of life."}, {"text": "Project Y, because the aggregate welfare from the larger population, however minimal per person, exceeds that of Project X.", "isCorrect": true, "rationale": "This scenario mirrors the core of the Repugnant Conclusion. A total utilitarian would choose Project Y because its 'higher total of welfare' outweighs the higher individual standard of living in Project X."}, {"text": "Neither project, as the ethical implications of comparing populations of different sizes are too complex to resolve.", "isCorrect": false, "rationale": "A strict total utilitarian framework aims to resolve such comparisons based on aggregate welfare, not defer them."}, {"text": "Project X, only if a critical level of happiness is established above the 'barely worth living' threshold.", "isCorrect": false, "rationale": "This approach is characteristic of critical-level theories, not strict total utilitarianism."}], "id": "q06"}, {"question": "One significant problem with average utilitarianism, as described, is that it:", "options": [{"text": "Struggles to compare populations of different sizes, especially when individual happiness levels vary greatly.", "isCorrect": false, "rationale": "Average utilitarianism explicitly makes such comparisons, often preferring smaller, happier populations."}, {"text": "Can lead to the counter-intuitive conclusion that adding a happy person might be undesirable if their happiness lowers the overall average.", "isCorrect": true, "rationale": "The text states that average utilitarianism 'implies that adding a very happy person to an already-happy population could be wrong (if the new person's happiness is below the current average).'"}, {"text": "Fails to account for the total sum of happiness, thereby potentially leading to a world with less overall well-being.", "isCorrect": false, "rationale": "While it doesn't maximize total happiness, this is a defining feature, not its specific 'problem' in the context of the text's critique."}, {"text": "Requires setting an arbitrary threshold for what counts as a life worth living.", "isCorrect": false, "rationale": "This is a problem associated with critical-level theories, not average utilitarianism."}], "id": "q07"}, {"question": "What is the main philosophical hurdle for critical-level theories in avoiding the Repugnant Conclusion?", "options": [{"text": "They fail to consider the quality of life for individuals below the critical threshold.", "isCorrect": false, "rationale": "Critical-level theories explicitly count lives as *not contributing* below the threshold, but the problem isn't this exclusion itself but how the threshold is justified."}, {"text": "They lead to a similar 'repugnant' result when the threshold is set too low.", "isCorrect": false, "rationale": "The purpose of critical-level theories is to *avoid* the Repugnant Conclusion, not reproduce it."}, {"text": "The difficulty in objectively and non-arbitrarily determining where to set the critical threshold for a life to contribute to overall value.", "isCorrect": true, "rationale": "The text states: 'The challenge: setting the threshold. Any specific level seems arbitrary.'"}, {"text": "They cannot account for the welfare of people who do not yet exist.", "isCorrect": false, "rationale": "This issue is more closely associated with person-affecting views and the Non-Identity Problem."}], "id": "q08"}, {"question": "Person-affecting views attempt to avoid the Repugnant Conclusion by not comparing populations of different sizes. However, they face a significant challenge known as the Non-Identity Problem. This problem primarily arises because:", "options": [{"text": "It becomes difficult to assign moral responsibility when the number of people changes due to policy decisions.", "isCorrect": false, "rationale": "While related, the Non-Identity Problem specifically focuses on the identity of the people themselves, not just general responsibility."}, {"text": "It's unclear how to weigh the welfare of existing individuals against the potential welfare of future, non-existent individuals.", "isCorrect": false, "rationale": "Person-affecting views specifically *limit* consideration to people who exist or will exist *given our choices*, which aims to simplify this, but creates the Non-Identity Problem."}, {"text": "Different policy choices can lead to the existence of entirely different individuals, making it hard to claim that one policy harms *those same* individuals.", "isCorrect": true, "rationale": "The text states that 'this approach struggles with the Non-Identity Problem... where different policies produce different people entirely,' meaning the 'same' people aren't harmed."}, {"text": "The theory struggles to define what constitutes a 'person' for the purpose of welfare calculation.", "isCorrect": false, "rationale": "The problem isn't defining a 'person' but rather tracking the *identity* of persons across different possible worlds or policy outcomes."}], "id": "q09"}, {"question": "According to Parfit, why does population ethics, particularly the Repugnant Conclusion, represent one of the most difficult and unsolved problems in moral philosophy?", "options": [{"text": "Because current mathematical models are insufficient to accurately calculate total happiness across large populations.", "isCorrect": false, "rationale": "The text indicates the math is 'simple multiplication' and 'seemingly unassailable,' suggesting the issue isn't the calculation itself but its unsettling result."}, {"text": "Because there is no general consensus among philosophers on the definition of 'happiness' or 'welfare.'", "isCorrect": false, "rationale": "While a broader philosophical debate, the text focuses on the specific tension generated by the Repugnant Conclusion and attempts to solve it."}, {"text": "Because all proposed solutions designed to avoid the Repugnant Conclusion introduce new, equally problematic or counter-intuitive implications.", "isCorrect": true, "rationale": "Parfit 'was never fully satisfied with any solution' because each 'comes with its own costs,' leading to a situation 'where our intuitions pull in incompatible directions and no theory captures all of them.'"}, {"text": "Because it relies on hypothetical scenarios that have no real-world application or policy relevance.", "isCorrect": false, "rationale": "The text explicitly counters this, stating, 'The Repugnant Conclusion is not just a puzzle about hypothetical populations. It strikes at the foundations of how we think about welfare, progress, and policy.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
