<script>
var QUESTIONS = [{"question": "What is the central tension between the Lindy Effect and the Black Swan concept as discussed in the text?", "options": [{"text": "The Lindy Effect suggests systems are always robust, while the Black Swan suggests they are always fragile.", "isCorrect": false, "rationale": "This option presents an oversimplified, absolute view that contradicts the text's nuanced explanation that 'stability and fragility are not opposites' but coexist."}, {"text": "The Lindy Effect implies longevity leads to continued survival, while the Black Swan highlights that long stability can mask growing vulnerabilities.", "isCorrect": true, "rationale": "This option accurately captures the core tension: Lindy's promise of continued endurance versus Black Swan's warning that periods of calm can conceal the accumulation of risks, leading to sudden, catastrophic events."}, {"text": "The Lindy Effect applies only to physical objects, while the Black Swan applies only to abstract ideas.", "isCorrect": false, "rationale": "This option misrepresents the scope of both concepts. The Lindy Effect applies to 'non-perishable, idea-like things' like books, and the Black Swan applies to 'complex, tightly coupled systems' like financial markets, which are not exclusively abstract."}, {"text": "The Lindy Effect predicts long survival for all things, while the Black Swan focuses only on natural disasters.", "isCorrect": false, "rationale": "The Lindy Effect is not universally applicable to 'all things' but specifically to certain types of systems. The Black Swan is not limited to natural disasters but encompasses rare, high-impact, unpredictable events across various domains."}], "id": "q01"}, {"question": "The text states, 'stability and fragility are not opposites. They coexist, often in the same system, at the same moment.' Which of the following best exemplifies this principle?", "options": [{"text": "A well-maintained bridge that is regularly inspected and repaired, ensuring its continued safety.", "isCorrect": false, "rationale": "This scenario describes a system actively managed for robustness, where fragility is continuously addressed, not hidden within stability."}, {"text": "A newly launched software application that experiences frequent crashes during its initial weeks.", "isCorrect": false, "rationale": "This example demonstrates obvious fragility from the outset, rather than hidden fragility masked by a long period of apparent stability."}, {"text": "A mature forest ecosystem that has thrived for centuries but is now unknowingly vulnerable to a new invasive species due0 to climate change.", "isCorrect": true, "rationale": "This scenario perfectly illustrates the coexistence: the forest appears stable for centuries (Lindy-like longevity) but harbors a hidden, growing fragility (Black Swan-prone vulnerability) to a future shock."}, {"text": "An ancient mathematical theorem that has been proven correct for millennia and remains foundational in modern mathematics.", "isCorrect": false, "rationale": "This is an example of a genuinely Lindy-prone item (an idea) that maintains its robustness without accumulating hidden fragility in the same way complex systems do."}], "id": "q02"}, {"question": "The 'Turkey Problem' illustrates a crucial flaw in inductive reasoning when applied to certain systems. What is the primary takeaway from this parable?", "options": [{"text": "Humans are inherently benevolent providers, just like the turkey's owner.", "isCorrect": false, "rationale": "This misinterprets the parable's allegorical intent. The focus is on the turkey's flawed perception, not human benevolence."}, {"text": "Long periods of consistent evidence always guarantee future outcomes will follow the same pattern.", "isCorrect": false, "rationale": "This is the opposite of the parable's lesson, which shows how consistent past evidence can be dangerously misleading in the face of a hidden discontinuity."}, {"text": "Inductive reasoning can be dangerously misleading in systems with hidden, catastrophic discontinuities.", "isCorrect": true, "rationale": "The Turkey Problem demonstrates that inductive reasoning, while seemingly rational based on sampled evidence, fails catastrophically when the system's underlying dynamics include rare, high-impact events not represented in the sampled data."}, {"text": "Statistical models are useless in predicting any future events.", "isCorrect": false, "rationale": "The text implies a limitation in specific contexts (systems with hidden discontinuities), not a universal dismissal of all statistical models."}], "id": "q03"}, {"question": "According to the text, which type of system is most likely to reliably follow the Lindy Effect?", "options": [{"text": "Complex, tightly coupled financial markets.", "isCorrect": false, "rationale": "The text explicitly categorizes financial markets as 'Black Swan-prone' due to their complexity and potential for hidden risks, not reliably Lindy."}, {"text": "Political regimes with long histories.", "isCorrect": false, "rationale": "The text uses examples like the Ottoman Empire and the Soviet Union to show that political regimes, despite long histories, can be Black Swan-prone and collapse abruptly."}, {"text": "Infrastructure projects like dams and bridges.", "isCorrect": false, "rationale": "While designed for longevity, such infrastructure can accumulate hidden fragilities (e.g., neglect, new stresses) that make them vulnerable to Black Swans, similar to the riverbank example."}, {"text": "Non-perishable, idea-like things such as ancient texts or mathematical theorems.", "isCorrect": true, "rationale": "The text specifically identifies 'non-perishable, idea-like things (books, religions, mathematical theorems, cooking recipes)' as those that 'tend to follow the Lindy Effect reliably'."}], "id": "q04"}, {"question": "The example of the riverbank that holds for decades then collapses during a 'hundred-year flood' primarily serves to illustrate which concept?", "options": [{"text": "The inevitable failure of all natural systems over time.", "isCorrect": false, "rationale": "While systems can fail, the example's core message is more specific: how perceived stability can lead to *human actions* (reduced maintenance) that increase fragility, not just natural decay."}, {"text": "How increased confidence due to stability can lead to reduced maintenance and accumulation of hidden vulnerabilities.", "isCorrect": true, "rationale": "This option correctly identifies the central lesson of the riverbank parable: long periods of stability breed overconfidence, leading to neglect and the quiet accumulation of fragility, which then makes the system vulnerable to an eventual shock."}, {"text": "The unreliability of engineering models in predicting environmental events.", "isCorrect": false, "rationale": "The example focuses on the human response to *perceived* stability rather than the accuracy of engineering models themselves, although model blind spots are a related theme in Taleb's work."}, {"text": "The superiority of empirical observation over theoretical predictions.", "isCorrect": false, "rationale": "The example shows how empirical observation (decades of stability) can lead to a *false* sense of security because it doesn't account for rare, extreme events, thus undermining the idea of its superiority in this context."}], "id": "q05"}, {"question": "Which of the following scenarios best represents a 'Black Swan-prone' system as described in the text?", "options": [{"text": "A restaurant chain that consistently uses the same successful recipe for its signature dish for fifty years.", "isCorrect": false, "rationale": "A recipe is an 'idea-like thing' that, if continuously successful, reliably follows the Lindy Effect, rather than being Black Swan-prone in the context of systemic collapse."}, {"text": "A global supply chain network that has optimized for efficiency over decades, removing redundancies, and relying on just-in-time delivery.", "isCorrect": true, "rationale": "This describes a 'complex, tightly coupled system' that has prioritized efficiency over resilience, potentially accumulating hidden systemic risk (e.g., lack of 'margin of safety'). Such a system is vulnerable to unexpected disruptions, fitting the Black Swan-prone description."}, {"text": "A traditional folk song that has been passed down through generations for centuries.", "isCorrect": false, "rationale": "A folk song is an 'idea-like thing' whose continued existence demonstrates the Lindy Effect, with no inherent hidden fragilities that would lead to a sudden, catastrophic failure."}, {"text": "A perennial plant species that reliably blooms every spring for thousands of years.", "isCorrect": false, "rationale": "While biological systems can face threats, this example does not fit the description of a complex, tightly coupled human-made or organized system accumulating hidden risk in the way discussed for Black Swan-prone systems."}], "id": "q06"}, {"question": "The text identifies 'the most dangerous cases' as systems that 'look Lindy but are actually Black Swan–prone.' Why are these particularly dangerous?", "options": [{"text": "They are inherently designed to deceive observers.", "isCorrect": false, "rationale": "The text does not imply malicious intent or deliberate deception in the design of such systems; rather, it's about the misinterpretation of their apparent stability."}, {"text": "Their apparent long-term stability generates false confidence, leading to underestimation of risk.", "isCorrect": true, "rationale": "This option directly addresses why such systems are dangerous: their deceptive appearance of robustness (Lindy) lulls observers into a false sense of security, causing them to ignore or underestimate the hidden fragilities that make them vulnerable to Black Swan events."}, {"text": "They are impossible to analyze using any known scientific methods.", "isCorrect": false, "rationale": "The text suggests these systems are difficult to predict accurately with *traditional inductive methods*, but not that they are entirely beyond analysis or understanding."}, {"text": "They only fail if they are intentionally sabotaged.", "isCorrect": false, "rationale": "The text focuses on internal vulnerabilities and external shocks, not solely on deliberate sabotage as the cause of failure."}], "id": "q07"}, {"question": "When assessing a long-surviving institution or system, the text suggests asking a key question. What is that question?", "options": [{"text": "'How much capital has this system accumulated over its lifespan?'", "isCorrect": false, "rationale": "While financial health can be a factor, this question is too narrow and doesn't capture the essence of discerning genuine robustness from hidden fragility."}, {"text": "'Who founded this system, and what were their original intentions?'", "isCorrect": false, "rationale": "Historical details about founding are interesting but don't directly address the *current* nature of its survival in terms of Lindy vs. Black Swan principles."}, {"text": "'Is this thing surviving because it is genuinely robust, or because it has not yet encountered the shock that would destroy it?'", "isCorrect": true, "rationale": "This question is quoted directly from the text as the 'key question to ask,' encapsulating the practical lesson of distinguishing between genuine Lindy-like robustness and stability that merely masks accumulating Black Swan-prone fragilities."}, {"text": "'What is the average growth rate of this system over the last decade?'", "isCorrect": false, "rationale": "Growth rate is a performance metric, not a diagnostic question about the fundamental nature of its survival and resilience to extreme events."}], "id": "q08"}, {"question": "The collapse of the Ottoman Empire and the Soviet Union are presented as real-world examples. What do these examples primarily demonstrate in the context of the chapter?", "options": [{"text": "That all empires and political systems are ultimately destined to fail.", "isCorrect": false, "rationale": "The examples illustrate a specific dynamic of failure, not a universal rule that *all* such systems are doomed, regardless of their nature or context."}, {"text": "How systems that appear stable for extended periods can possess hidden weaknesses that lead to abrupt failure.", "isCorrect": true, "rationale": "Both examples highlight how 'decades of apparent stability masked internal weaknesses that became visible only in retrospect,' demonstrating the Black Swan-prone nature of complex systems where fragility coexists with stability."}, {"text": "The superior resilience of cultural artifacts over political structures.", "isCorrect": false, "rationale": "While the text contrasts these with Shakespeare's works (a Lindy phenomenon), the primary purpose of these two examples is to show hidden fragility in political systems, not a general comparison of categories."}, {"text": "That geopolitical analysis is always accurate in predicting long-term outcomes.", "isCorrect": false, "rationale": "The text explicitly states the Soviet Union 'appeared geopolitically permanent to most Western analysts in 1985,' indicating that analysis was *not* always accurate in predicting its eventual collapse."}], "id": "q09"}, {"question": "While not explicitly defining 'Antifragile,' the text notes it's from one of Taleb's works. Given the discussion on hidden fragility and Black Swans, what concept, mentioned in the 'connections' section, would be a *precautionary measure* against such risks?", "options": [{"text": "Feedback Loops", "isCorrect": false, "rationale": "Feedback loops explain *how* systems can become stable or unstable, but they are not a precautionary measure in themselves."}, {"text": "The Lindy Effect", "isCorrect": false, "rationale": "The Lindy Effect is a heuristic for assessing longevity, not a strategy or precautionary measure to build resilience against Black Swans in vulnerable systems."}, {"text": "Margin of Safety", "isCorrect": true, "rationale": "The text links 'Margin of Safety' to 'building in slack precisely because we know our models have blind spots' – this directly addresses the need for precautions against underestimated risks and hidden fragilities, which is a core theme in antifragility."}, {"text": "The Black Swan", "isCorrect": false, "rationale": "The Black Swan describes the phenomenon of rare, high-impact events; it is not a precautionary measure against them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
