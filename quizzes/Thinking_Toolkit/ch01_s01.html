        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the central psychological insight conveyed by the \"Boiling Frog\" metaphor, despite its biological inaccuracy?", "options": [{"text": "Frogs are not as intelligent as commonly believed when faced with environmental changes.", "isCorrect": false, "rationale": "This option focuses on the biological inaccuracy of the metaphor regarding frogs' intelligence, rather than the psychological insight about human behavior that the text emphasizes."}, {"text": "Humans tend to overlook and adapt to slow, incremental changes until their cumulative effect becomes significant and potentially irreversible.", "isCorrect": true, "rationale": "The text explicitly states that the metaphor endures because 'it captures something deeply true about human psychology: when change is slow and incremental, we fail to notice it' until it's too late."}, {"text": "Major changes always announce themselves with clear, unmistakable warnings that are difficult to ignore.", "isCorrect": false, "rationale": "This statement contradicts the core message of the metaphor, which is that gradual changes are often missed because they do not present as 'clear warnings' in their initial stages."}, {"text": "Rapid, drastic changes are generally easier for individuals to adapt to than slow, prolonged ones.", "isCorrect": false, "rationale": "While rapid changes can certainly be challenging, the metaphor specifically focuses on the problem of *inattention* to *gradual* change, not the comparative ease of adapting to different paces of change."}]}, {"question": "According to the text, why does the \"Boiling Frog\" metaphor continue to be popular and insightful, even though its biological premise is false?", "options": [{"text": "Its biological accuracy was only disproven recently, so the metaphor has not yet faded from popular use.", "isCorrect": false, "rationale": "The text states that physiologist Friedrich Goltz demonstrated the biological inaccuracy in the nineteenth century, indicating it was disproven long ago, not recently."}, {"text": "It accurately reflects how humans often overlook and adapt to gradual changes, making it a powerful psychological analogy.", "isCorrect": true, "rationale": "The text clarifies that 'the metaphor endures because it captures something deeply true about human psychology: when change is slow and incremental, we fail to notice it'."}, {"text": "People are inherently drawn to vivid, disturbing images regardless of their factual basis.", "isCorrect": false, "rationale": "While the image is vivid, the text attributes its endurance to its psychological insight, not merely a preference for disturbing imagery."}, {"text": "The metaphor serves as a reminder that animals can teach us valuable lessons about survival instincts.", "isCorrect": false, "rationale": "The text explicitly states that the lesson is 'about human perception, not amphibian physiology,' indicating it's not primarily about animal survival lessons."}]}, {"question": "Which of the following scenarios best exemplifies the \"Boiling Frog\" phenomenon in human behavior?", "options": [{"text": "A community experiences a slow, steady increase in air pollution over two decades, leading to a significant rise in respiratory illnesses before collective action is considered.", "isCorrect": true, "rationale": "This scenario perfectly illustrates the 'Boiling Frog' phenomenon: a gradual, unnoticed change (pollution increase) accumulating to a catastrophic effect (illnesses) before a response is mounted."}, {"text": "A company suddenly faces a massive data breach due to a single, critical security flaw that was overlooked.", "isCorrect": false, "rationale": "This describes a sudden, critical failure rather than a gradual, incremental change that went unnoticed over time, which is the hallmark of the 'Boiling Frog' metaphor."}, {"text": "An athlete immediately recognizes and corrects a flaw in their technique after a coach points it out during practice.", "isCorrect": false, "rationale": "This involves immediate recognition and response to a problem, which is the opposite of the 'Boiling Frog' phenomenon where changes go unnoticed."}, {"text": "A government rapidly implements a new policy in response to an urgent and unexpected economic crisis.", "isCorrect": false, "rationale": "This scenario describes a rapid and responsive reaction to a crisis, not a situation where a gradual problem was ignored until it became critical."}]}, {"question": "What is presented as the primary antidote to the \"Boiling Frog\" phenomenon?", "options": [{"text": "Regularly comparing the present state to the immediate past to identify minor shifts.", "isCorrect": false, "rationale": "The text explicitly advises against this, stating, 'Do not compare today to yesterday,' because small changes compared to yesterday often feel insignificant."}, {"text": "Deliberately measuring current conditions against a fixed, pre-established benchmark.", "isCorrect": true, "rationale": "The text clearly states, 'The antidote to the boiling frog is deliberate measurement against a fixed benchmark. Do not compare today to yesterday—compare today to a standard you set in advance.'"}, {"text": "Relying on intuition and subjective feelings to gauge the significance of changes.", "isCorrect": false, "rationale": "The metaphor's insight is precisely that intuition and subjective feelings often *fail* to notice gradual changes, thus the antidote must be objective measurement."}, {"text": "Waiting for external warning signs or catastrophic events to signal a need for action.", "isCorrect": false, "rationale": "This describes the consequence of failing to address the 'Boiling Frog' problem, where one waits until 'it may be too late to respond,' rather than an antidote."}]}, {"question": "The text states that real frogs will jump out of gradually heated water. What is the significance of this biological fact within the context of the \"Boiling Frog\" discussion?", "options": [{"text": "It proves that the metaphor should be abandoned entirely due to its scientific inaccuracy.", "isCorrect": false, "rationale": "The 'caution' section directly refutes this, stating that dismissing the metaphor due to biological inaccuracy 'missed the point' of its psychological insight."}, {"text": "It highlights the contrast between actual frog behavior and the metaphor's intended lesson about human psychological blind spots to gradual change.", "isCorrect": true, "rationale": "The text uses this biological fact to emphasize that while frogs *are* smarter, humans *are not*, thus underscoring the metaphor's relevance to human psychology by contrast."}, {"text": "It suggests that humans are inherently less adaptable than frogs in dangerous situations.", "isCorrect": false, "rationale": "The text focuses on human *perception* and *inattention* to gradual change, not a general statement about adaptability compared to frogs."}, {"text": "It confirms that animals are generally more sensitive to environmental changes than humans.", "isCorrect": false, "rationale": "While it shows frogs are sensitive to temperature, the main point is about human failure to perceive *gradual* change, not a general comparison of sensitivity."}]}, {"question": "A student consistently performs slightly below their academic potential, receiving grades that are 'not terrible' but slowly declining. Applying the antidote from the text, what action would be most effective for this student?", "options": [{"text": "Comparing this semester's grades to last semester's to see if there's a noticeable difference.", "isCorrect": false, "rationale": "This aligns with 'comparing today to yesterday,' which the text identifies as ineffective because small, incremental declines might not seem significant enough to prompt action."}, {"text": "Setting a clear, objective goal, such as 'achieve an A- or higher in every core subject,' and regularly checking progress against it.", "isCorrect": true, "rationale": "This exemplifies the antidote: 'deliberate measurement against a fixed benchmark.' Setting a specific academic standard allows for early detection of drift from the desired performance."}, {"text": "Trusting that if there was a real problem, their teachers or parents would alert them.", "isCorrect": false, "rationale": "This is a passive approach that relies on external intervention after a problem might have already become noticeable, rather than proactive measurement."}, {"text": "Waiting until they fail a major exam to realize the severity of the situation.", "isCorrect": false, "rationale": "This represents waiting for a 'catastrophe' to become obvious, which is precisely the failure mode the 'Boiling Frog' metaphor describes and the antidote seeks to prevent."}]}, {"question": "Kodak's failure, as described in the text, primarily illustrates which aspect of the \"Boiling Frog\" metaphor?", "options": [{"text": "The importance of being the first to invent new technology.", "isCorrect": false, "rationale": "The text notes Kodak 'actually invented the first digital camera,' so their failure was not due to a lack of invention, but rather their response to the gradual market shift."}, {"text": "The danger of dismissing small, incremental declines as insignificant until the cumulative effect leads to irreversible loss.", "isCorrect": true, "rationale": "Kodak's story highlights how 'Each annual report showed only a small decline. No single quarter screamed “catastrophe.”' and by the time the shift was 'undeniable,' it was too late, directly illustrating the boiling frog effect."}, {"text": "The inevitability of market disruption for established companies.", "isCorrect": false, "rationale": "While market disruption is part of the context, the text focuses on *how* Kodak failed to perceive and adapt to the *gradual* shift, rather than disruption being an unavoidable force itself."}, {"text": "The difficulty of adapting to sudden, radical shifts in consumer demand.", "isCorrect": false, "rationale": "The text specifies that 'the shift from film to digital happened gradually,' making this option incorrect as the shift was not sudden."}]}, {"question": "The \"caution\" section warns against dismissing the metaphor by saying \"actually, frogs jump out.\" What is the main reason this dismissal misses the point?", "options": [{"text": "The person making the dismissal likely misunderstands basic amphibian physiology.", "isCorrect": false, "rationale": "While the person might misunderstand amphibian physiology, the text's caution is about *missing the metaphor's intended lesson*, not about the factual accuracy of the dismissal itself."}, {"text": "The metaphor is primarily intended to be a scientific claim about animal behavior, not human psychology.", "isCorrect": false, "rationale": "The text explicitly states, 'This is a metaphor, not a scientific claim. The lesson is about human perception, not amphibian physiology.'"}, {"text": "It focuses on a minor biological inaccuracy rather than engaging with the metaphor's significant psychological insight about human perception.", "isCorrect": true, "rationale": "The caution states that focusing on the biological inaccuracy 'is, ironically, a small example of the very pattern the metaphor describes: focusing on a minor detail while the larger truth goes unaddressed.'"}, {"text": "All metaphors are inherently flawed and should not be critically examined.", "isCorrect": false, "rationale": "This is a broad philosophical statement about metaphors in general and does not address the specific reason why this particular dismissal misses the point of the 'Boiling Frog' metaphor."}]}, {"question": "Which of the following situations, if observed, would indicate that the \"Boiling Frog\" phenomenon has been successfully avoided?", "options": [{"text": "A business uses quarterly metrics to track employee satisfaction against a target score, implementing changes proactively if the score drops even slightly.", "isCorrect": true, "rationale": "This scenario demonstrates the application of the antidote: 'deliberate measurement against a fixed benchmark.' By setting a target score and acting on slight drops, the business prevents gradual decline from becoming catastrophic."}, {"text": "A government continuously introduces small policy changes that incrementally erode citizen rights, each deemed minor on its own.", "isCorrect": false, "rationale": "This is a classic example of the 'Boiling Frog' phenomenon, where democratic institutions erode through 'a series of small precedents, each one defensible in isolation.'"}, {"text": "An individual slowly develops poor posture habits over years, only noticing the cumulative strain when experiencing chronic back pain.", "isCorrect": false, "rationale": "This is a personal life example of the 'Boiling Frog' effect, where a gradual accumulation of small unhealthy choices leads to a dramatic cumulative effect unnoticed until it's a crisis."}, {"text": "An environmental agency observes a gradual increase in ocean acidity over decades but postpones significant policy changes due to a lack of immediate crisis.", "isCorrect": false, "rationale": "This illustrates the 'Boiling Frog' effect in environmental change, where a slow, incremental problem is 'psychologically easy to dismiss' until cumulative effects are severe."}]}, {"question": "Based on the \"keyconcept\" section, what is the fundamental problem that the \"Boiling Frog\" metaphor highlights regarding human response to change?", "options": [{"text": "The difficulty in implementing rapid responses to sudden, unexpected threats.", "isCorrect": false, "rationale": "The key concept focuses on 'slow and incremental' change, not sudden threats. The problem highlighted is the *failure to notice* gradual change."}, {"text": "Our tendency to ignore or adapt to gradual changes until their collective impact becomes catastrophic and irreversible.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'When change is slow and incremental, we fail to notice it until the cumulative effect becomes catastrophic.' This option directly rephrases that core idea."}, {"text": "The inherent human resistance to any form of change, regardless of its pace.", "isCorrect": false, "rationale": "The metaphor points to *inattention* and *normalization* of gradual change, not an overall resistance to all change. Humans often adapt to small changes, sometimes to their detriment."}, {"text": "The inability to accurately predict future outcomes even with extensive data.", "isCorrect": false, "rationale": "While predicting the future can be challenging, the core problem addressed by the metaphor is about perceiving *current* gradual changes and their accumulation, not specifically about future prediction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
