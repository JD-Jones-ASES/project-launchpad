        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the core concept of the Dunning-Kruger effect?", "options": [{"text": "Highly skilled individuals tend to be arrogant and overestimate their abilities compared to others.", "isCorrect": false, "rationale": "The text states that highly skilled individuals tend to *underestimate* their performance, not overestimate it."}, {"text": "Individuals with low ability overestimate their competence, while those with high ability tend to modestly underestimate theirs.", "isCorrect": true, "rationale": "This statement directly reflects the definition provided in the text: 'people with low ability tend to dramatically overestimate their competence, while people with high ability tend to modestly underestimate theirs.'"}, {"text": "People with low competence in a domain often accurately assess their lack of skill, leading to humility.", "isCorrect": false, "rationale": "The opposite is true; individuals with low competence fail to recognize their own incompetence, leading to inflated self-assessments."}, {"text": "The effect primarily describes how experts are often overconfident in their judgment of others' abilities.", "isCorrect": false, "rationale": "While the 'caution' section touches on overconfidence in judging others, the primary Dunning-Kruger effect describes self-assessment of one's *own* abilities relative to others."}], "id": "q01"}, {"question": "In Dunning and Kruger's original 1999 study, what was a key finding regarding participants' self-assessments?", "options": [{"text": "Top-performing participants generally had an accurate understanding of their high ability.", "isCorrect": false, "rationale": "The study found that top-performing participants consistently *underestimated* their performance."}, {"text": "Participants with the lowest scores frequently believed they outperformed the majority of their peers.", "isCorrect": true, "rationale": "The text states, 'Participants who scored in the bottom quartile — the worst performers — estimated that they had performed better than roughly two-thirds of their peers.'"}, {"text": "Both high and low-performing participants showed a tendency to underestimate their performance.", "isCorrect": false, "rationale": "Low-performing participants *overestimated* their performance, while high-performing participants *underestimated* theirs."}, {"text": "Self-assessments were largely accurate across all performance levels, indicating good metacognition.", "isCorrect": false, "rationale": "The study's results showed striking inaccuracies in self-assessment, particularly at the extreme ends of competence, indicating a problem with metacognition."}], "id": "q02"}, {"question": "According to the text, the primary reason individuals with low ability overestimate their competence is because:", "options": [{"text": "They actively choose to ignore evidence of their poor performance.", "isCorrect": false, "rationale": "The text attributes this to a lack of recognition skills, not an active choice to ignore evidence."}, {"text": "They lack the necessary skills to even recognize their own incompetence, creating a cognitive catch-22.", "isCorrect": true, "rationale": "The text explains, 'The skills required to produce correct answers in a domain are the same skills required to recognize correct answers' and describes it as a 'cognitive catch-22' where one needs the skill to recognize the lack of it."}, {"text": "They receive too much positive feedback from others, leading to inflated self-views.", "isCorrect": false, "rationale": "The text focuses on internal cognitive mechanisms and lack of skill, not external feedback, as the primary cause."}, {"text": "They are inherently more confident by nature than highly skilled individuals.", "isCorrect": false, "rationale": "The explanation is tied to domain-specific skills and metacognition, not a general personality trait of confidence."}], "id": "q03"}, {"question": "Why do highly competent individuals tend to underestimate their abilities, according to the Dunning-Kruger effect?", "options": [{"text": "They are often modest and genuinely believe they are not exceptional.", "isCorrect": false, "rationale": "While modesty might play a role, the text specifically identifies a cognitive mechanism: the projection of their own ease."}, {"text": "They project their own ease with a task onto others, assuming their high skill is common.", "isCorrect": true, "rationale": "The text states, 'Experts find certain tasks easy and assume others do too...They project their own ease onto others, leading to the false assumption that their skills are common rather than exceptional.'"}, {"text": "They compare themselves only to other experts, making their own skills seem less remarkable.", "isCorrect": false, "rationale": "The text emphasizes assuming *others* (a broader group) find things equally easy, rather than just comparison with an elite peer group."}, {"text": "They frequently receive negative feedback from peers, diminishing their confidence.", "isCorrect": false, "rationale": "The text does not mention negative feedback as a mechanism for the underestimation by highly competent individuals."}], "id": "q04"}, {"question": "Based on Dunning and Kruger's experiments, what proved most effective in helping low-performing individuals achieve more accurate self-assessments?", "options": [{"text": "Receiving a lecture on the importance of humility and modesty.", "isCorrect": false, "rationale": "The text explicitly states, 'The cure for overconfidence was not a lecture on humility — it was genuine competence.'"}, {"text": "Observing the performance of their highly skilled peers.", "isCorrect": false, "rationale": "While exposure to good work is helpful, the text highlights the direct improvement of *actual skills*."}, {"text": "Acquiring genuine competence through training and improved skills.", "isCorrect": true, "rationale": "The text clearly states that 'when the low-performing participants were given training that improved their actual skills, their self-assessments became more accurate. The cure for overconfidence... was genuine competence.'"}, {"text": "Engaging in self-reflection exercises to better understand their limitations.", "isCorrect": false, "rationale": "While self-reflection is part of metacognition, the direct 'cure' highlighted in the experiments was the development of genuine competence."}], "id": "q05"}, {"question": "The text describes the Dunning-Kruger effect as a problem of metacognition. This means that:", "options": [{"text": "Individuals are unable to form new thoughts or ideas in a specific domain.", "isCorrect": false, "rationale": "Metacognition refers to 'thinking about thinking,' not the inability to generate thoughts."}, {"text": "People lack the ability to effectively monitor and evaluate their own thought processes and performance.", "isCorrect": true, "rationale": "The text defines metacognition as 'thinking about thinking' and explains that to know how good you are, you need a mental model, which requires the expertise you lack to build. This directly relates to monitoring and evaluating one's own performance."}, {"text": "The effect is primarily about cognitive biases that lead to irrational decision-making.", "isCorrect": false, "rationale": "While it involves cognitive biases, the text specifically frames it as a problem of *metacognition* related to self-assessment."}, {"text": "It is an issue where individuals are too preoccupied with others' thoughts rather than their own.", "isCorrect": false, "rationale": "The Dunning-Kruger effect, particularly for low ability individuals, is about their misjudgment of *their own* performance."}], "id": "q06"}, {"question": "Which statement best reflects the caution advised against misusing the Dunning-Kruger effect?", "options": [{"text": "It should only be used to diagnose psychological disorders in a clinical setting.", "isCorrect": false, "rationale": "The text states it is 'not a universal law of confidence' and cannot be 'diagnose[d] in a single individual from a single conversation,' implying it's not a clinical diagnostic tool."}, {"text": "The effect is a universal law of confidence that applies equally to all individuals in all situations.", "isCorrect": false, "rationale": "The text explicitly states it is 'not a universal law of confidence' but a 'statistical tendency observed in controlled experiments about domain-specific skills.'"}, {"text": "Attributing the effect to an individual without careful evidence is often an insult and a form of overconfidence itself.", "isCorrect": true, "rationale": "The text warns, 'Calling someone “a Dunning-Kruger case” is not an argument. It is an insult dressed in scientific clothing' and that doing so 'might itself be an example of overconfidence about one's ability to judge others.'"}, {"text": "The effect is only relevant in academic discussions and has no practical implications for real-world interactions.", "isCorrect": false, "rationale": "The 'realworld' section provides examples of how the effect manifests in new employees/students and online discourse, demonstrating its practical relevance."}], "id": "q07"}, {"question": "A new programmer starts learning a complex coding language. Initially, they feel quite confident in their abilities, despite making many mistakes. After a few months, they become acutely aware of how much they don't know and feel overwhelmed. According to the text, what phase of the learning arc are they likely entering after their initial confidence?", "options": [{"text": "The peak of genuine competence, where confidence aligns with skill.", "isCorrect": false, "rationale": "The peak of genuine competence comes after the 'valley of despair' and involves calibrated confidence, not feeling overwhelmed by lack of knowledge."}, {"text": "The 'valley of despair,' characterized by recognizing their knowledge gap.", "isCorrect": true, "rationale": "The text describes this phase as 'they learn enough to recognize the gap,' which aligns with becoming 'acutely aware of how much they don't know and feel overwhelmed.'"}, {"text": "A state of continued, unwavering overconfidence.", "isCorrect": false, "rationale": "The described scenario indicates a shift from initial overconfidence, not a continuation of it."}, {"text": "The Dunning-Kruger plateau, where no further progress is made.", "isCorrect": false, "rationale": "The text describes an 'arc' of progression, not a plateau of stagnation."}], "id": "q08"}, {"question": "How does the Dunning-Kruger effect manifest in online discourse, according to the text?", "options": [{"text": "Experts often hesitate to share their knowledge online, leading to a silence of the qualified.", "isCorrect": false, "rationale": "While this might be a secondary effect, the text focuses on the *unqualified* being the most vocal and confident."}, {"text": "The most confident and vocal commenters on complex topics are frequently those with the least actual expertise.", "isCorrect": true, "rationale": "The text states, 'the people most confident in their opinions are often the least qualified to hold them. The person posting the longest, most certain commentary...may be the person who knows the least about the subject.'"}, {"text": "Online platforms primarily facilitate accurate and well-reasoned debates due to diverse participation.", "isCorrect": false, "rationale": "The text suggests the opposite, where lack of expertise prevents recognition of errors, hindering accurate discourse."}, {"text": "Users tend to become more self-aware of their knowledge gaps when exposed to a wide range of opinions.", "isCorrect": false, "rationale": "The text suggests the unqualified 'will never know it, because they lack the expertise to recognize their own errors,' implying limited self-awareness even with diverse exposure."}], "id": "q09"}, {"question": "Which conclusion can be drawn by synthesizing the mechanisms of both low-ability overestimation and high-ability underestimation in the Dunning-Kruger effect?", "options": [{"text": "Effective self-assessment is primarily a matter of inherent personality traits, not learned skills.", "isCorrect": false, "rationale": "The text repeatedly emphasizes the role of *skills* and *genuine competence* in both the cause and cure of the effect."}, {"text": "The ability to accurately judge one's own competence is itself a skill that improves with genuine domain expertise.", "isCorrect": true, "rationale": "For low ability, genuine competence cures overconfidence. For high ability, their expertise leads them to project ease. Both illustrate that accurate self-assessment is intertwined with the domain skills themselves, and 'the path to accurate self-assessment runs through genuine learning.'"}, {"text": "Overcoming the Dunning-Kruger effect requires individuals to simply try harder to be more modest.", "isCorrect": false, "rationale": "The text explicitly states that 'the cure for overconfidence was not a lecture on humility — it was genuine competence.'"}, {"text": "The effect suggests that all individuals are fundamentally incapable of objective self-evaluation.", "isCorrect": false, "rationale": "The text describes tendencies and a 'predictable arc' for learners, indicating that self-evaluation can become more calibrated with learning, not that it's impossible."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
