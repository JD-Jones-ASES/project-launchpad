        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central assertion of the Banach-Tarski Paradox?", "options": [{"text": "Any solid object can be duplicated physically using a finite number of cuts and rearrangements.", "isCorrect": false, "rationale": "The paradox is a mathematical theorem, not a physical recipe, and explicitly states it does not apply to physical matter."}, {"text": "A solid sphere can be decomposed into a finite number of pieces and reassembled into two spheres identical to the original, using only rotations and translations.", "isCorrect": true, "rationale": "This statement directly describes the core result of the Banach-Tarski Paradox as presented in the text."}, {"text": "Infinite pieces are required to reassemble a single sphere into two identical spheres.", "isCorrect": false, "rationale": "The theorem specifies a 'finite number of pieces' (five will do) are sufficient, not an infinite number."}, {"text": "The volume of a solid sphere can be precisely halved by cutting it into two pieces and reassembling them.", "isCorrect": false, "rationale": "The paradox states the original sphere can be reassembled into *two* identical spheres, effectively doubling the apparent volume, not halving it."}], "id": "q01"}, {"question": "Which fundamental axiom of set theory is essential for the Banach-Tarski Paradox to be proven?", "options": [{"text": "The Continuum Hypothesis", "isCorrect": false, "rationale": "The text does not mention the Continuum Hypothesis as essential to the Banach-Tarski Paradox."}, {"text": "The Zermelo-Fraenkel Axioms without Choice", "isCorrect": false, "rationale": "The text explicitly states that the theorem 'depends on the Axiom of Choice', meaning Zermelo-Fraenkel without it would be insufficient."}, {"text": "The Axiom of Choice", "isCorrect": true, "rationale": "The text explicitly states, 'It depends on the Axiom of Choice, one of the standard axioms of set theory.'"}, {"text": "Peano's Axioms for natural numbers", "isCorrect": false, "rationale": "Peano's Axioms are foundational for natural numbers, but the text identifies the Axiom of Choice as the specific dependency for this paradox."}], "id": "q02"}, {"question": "The Banach-Tarski Paradox is considered 'unsettling' or 'paradoxical' primarily because:", "options": [{"text": "It contradicts the known laws of thermodynamics.", "isCorrect": false, "rationale": "The text clarifies that the paradox 'does not violate physics' or 'conservation of mass'."}, {"text": "Its proof relies on unverified conjectures.", "isCorrect": false, "rationale": "The text states it is a 'rigorous mathematical result, not a conjecture' and 'has been proven with the same certainty as the Pythagorean theorem'."}, {"text": "It describes a mathematical possibility that defies basic human intuition about volume and matter.", "isCorrect": true, "rationale": "The text explains it 'describes something that seems flatly impossible — a violation of the most basic intuitions about volume and matter' and 'defies finite intuition'."}, {"text": "It suggests that mathematics itself is flawed and inconsistent.", "isCorrect": false, "rationale": "The text explicitly states, 'This is not a flaw in mathematics.'"}], "id": "q03"}, {"question": "What is the distinguishing characteristic of the 'pieces' into which a sphere is decomposed in the Banach-Tarski Paradox?", "options": [{"text": "They are physically constructible but extremely small.", "isCorrect": false, "rationale": "The text states the pieces 'cannot be physically constructed' and 'are not solid chunks or thin slices'."}, {"text": "They are non-measurable sets, meaning they have no well-defined volume.", "isCorrect": true, "rationale": "The text defines these pieces as 'non-measurable sets' and states they are 'so pathologically scattered and fragmented that no consistent notion of volume applies to them'."}, {"text": "They are finite in number but infinitely divisible in volume.", "isCorrect": false, "rationale": "While finite in number, the key characteristic is their lack of a *well-defined* volume, not just infinite divisibility of an existing volume."}, {"text": "They are solid chunks or thin slices that can be cut with a knife.", "isCorrect": false, "rationale": "The text explicitly states, 'The pieces are what mathematicians call non-measurable sets' and 'They are not solid chunks or thin slices'."}], "id": "q04"}, {"question": "Why does the Banach-Tarski Paradox *not* violate physical laws like conservation of mass?", "options": [{"text": "Because physical objects are made of atoms, which cannot be decomposed into non-measurable sets.", "isCorrect": true, "rationale": "The text explains, 'Physical matter is made of atoms, and you cannot decompose a physical sphere into non-measurable sets,' clarifying that the theorem applies to mathematical points in continuous space, not physical objects."}, {"text": "Because the theorem applies only to two-dimensional objects, not three-dimensional ones.", "isCorrect": false, "rationale": "The text explicitly mentions a 'solid sphere' and 'three-dimensional space,' indicating it applies to 3D objects."}, {"text": "Because the rearrangement process involves an infinite amount of energy.", "isCorrect": false, "rationale": "The text does not mention energy as a factor for why it doesn't violate physics; the distinction between mathematical and physical objects is the key."}, {"text": "Because the paradox is merely a thought experiment, not a rigorous proof.", "isCorrect": false, "rationale": "The text clearly states it is 'not a thought experiment' but a 'proven theorem' and 'rigorous mathematical result'."}], "id": "q05"}, {"question": "If a set is 'non-measurable' in the context of the Banach-Tarski Paradox, what is a direct implication regarding its properties?", "options": [{"text": "Its density is infinite.", "isCorrect": false, "rationale": "The text focuses on volume (or lack thereof), not density, as the defining characteristic of non-measurable sets."}, {"text": "It can be precisely described using ordinary geometric terms.", "isCorrect": false, "rationale": "The text states these pieces 'cannot even describe in ordinary geometric terms'."}, {"text": "It has no consistent, well-defined volume.", "isCorrect": true, "rationale": "The text defines non-measurable sets as those 'to which a well-defined volume (or area, or length) can be assigned,' and states they 'have no well-defined volume at all'."}, {"text": "It is a finite collection of points.", "isCorrect": false, "rationale": "Non-measurable sets are typically infinite collections of points, 'pathologically scattered and fragmented'."}], "id": "q06"}, {"question": "What fundamental insight does the Banach-Tarski Paradox offer about the nature of mathematics, particularly concerning continuous space?", "options": [{"text": "That the concept of 'volume' is inherently flawed and should be discarded.", "isCorrect": false, "rationale": "The text states, 'This is not a flaw in mathematics,' but rather a consequence of working with specific types of sets."}, {"text": "That our intuitive notion of volume does not apply universally to all subsets of three-dimensional space.", "isCorrect": true, "rationale": "The text explicitly states the paradox 'shows that our intuitive notion of “volume” does not extend to all subsets of three-dimensional space'."}, {"text": "That all mathematical proofs are subject to intuitive verification.", "isCorrect": false, "rationale": "The paradox itself highlights how rigorous mathematical proofs can lead to results that defy intuition."}, {"text": "That infinite sets can always be reduced to finite, measurable components.", "isCorrect": false, "rationale": "The paradox demonstrates the opposite; infinite sets can yield non-measurable components that challenge traditional volume concepts."}], "id": "q07"}, {"question": "Based on the text, which statement correctly clarifies a common misconception about the Banach-Tarski Paradox?", "options": [{"text": "It is a proof that demonstrates the possibility of perpetual motion.", "isCorrect": false, "rationale": "The text does not discuss perpetual motion; it focuses on geometry, volume, and set theory."}, {"text": "It suggests a method for physically duplicating resources without cost.", "isCorrect": false, "rationale": "The text provides a specific 'caution' that it is 'not a recipe for duplicating physical objects'."}, {"text": "It is a mathematical theorem showing the limits of intuition regarding infinite, continuous sets, not a practical physical application.", "isCorrect": true, "rationale": "This statement accurately synthesizes the key points from the 'caution' box and the overall explanation of 'What the Paradox Reveals'."}, {"text": "It is an unproven hypothesis about the behavior of matter at quantum levels.", "isCorrect": false, "rationale": "The text explicitly states it is a 'proven theorem' and does not relate it to quantum physics."}], "id": "q08"}, {"question": "The text emphasizes that the Banach-Tarski Paradox is a consequence of working with:", "options": [{"text": "Imperfect mathematical models.", "isCorrect": false, "rationale": "The text explicitly states, 'This is not a flaw in mathematics.'"}, {"text": "Finite, discrete sets.", "isCorrect": false, "rationale": "The text states it is a 'consequence of working with infinite, continuous sets'."}, {"text": "Infinite, continuous sets.", "isCorrect": true, "rationale": "The text explains, 'It is a consequence of working with infinite, continuous sets — the kind of sets that make up the real number line and the points in space.'"}, {"text": "Euclidean geometry exclusively.", "isCorrect": false, "rationale": "While it relates to geometry, its dependency on the Axiom of Choice and its implications for volume measurement extend beyond simple Euclidean geometry into the foundations of set theory."}], "id": "q09"}, {"question": "The text repeatedly stresses that the Banach-Tarski Paradox is:", "options": [{"text": "A philosophical thought experiment without mathematical proof.", "isCorrect": false, "rationale": "The text states it is 'not a magic trick, a thought experiment,' but a 'rigorous mathematical result, not a conjecture'."}, {"text": "An approximation of a physical phenomenon.", "isCorrect": false, "rationale": "The text clarifies it is 'not a physicist's approximation' and is about mathematical points, not physical matter."}, {"text": "A logically certain, rigorously proven mathematical theorem.", "isCorrect": true, "rationale": "The text emphasizes it is a 'rigorous mathematical result,' 'proven with the same certainty as the Pythagorean theorem,' and 'as logically certain as 2 + 2 = 4'."}, {"text": "A conjecture based on the latest advancements in quantum physics.", "isCorrect": false, "rationale": "The text states it is 'not a conjecture' and does not connect it to quantum physics."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
