    };

<body>
<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 3</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Betteridge's Law of Headlines, what is the default answer to any headline that ends in a question mark?", "options": [{"text": "Maybe", "isCorrect": false, "rationale": "Betteridge's Law posits a definitive 'no,' not a 'maybe,' as the most likely answer, implying a lack of strong evidence."}, {"text": "No", "isCorrect": true, "rationale": "The law explicitly states that 'Any headline that ends in a question mark can be answered by the word “no.”'"}, {"text": "Yes, if it's a scientific claim", "isCorrect": false, "rationale": "The text specifically uses scientific and health claims as examples where the law often applies, indicating a 'no' answer rather than a 'yes.'"}, {"text": "It depends on the publication's reputation", "isCorrect": false, "rationale": "While publication reputation is relevant in journalism, Betteridge's Law provides a general heuristic applicable across publications for question-mark headlines."}]}, {"question": "What is the primary reason, according to the text, that a publication uses a question-mark headline instead of a declarative statement?", "options": [{"text": "To encourage deeper reader engagement and critical thinking about the topic.", "isCorrect": false, "rationale": "While engagement might be a secondary effect, the text explicitly states the primary reason is to 'imply a possibility while avoiding the liability of asserting a fact,' due to insufficient evidence."}, {"text": "To allow the author creative freedom in framing complex information.", "isCorrect": false, "rationale": "The text frames the question mark as a strategic device to manage evidence and liability, not primarily for creative freedom."}, {"text": "To capture reader attention by implying a possibility while avoiding the liability of stating an unproven fact.", "isCorrect": true, "rationale": "The text explains the question mark 'signals that the publication does not have enough evidence to make the claim outright but wants to capture the reader's attention anyway,' acting as 'a hedge' and 'avoiding the liability of asserting a fact.'"}, {"text": "To indicate that the article presents multiple, conflicting viewpoints on a subject.", "isCorrect": false, "rationale": "The text focuses on the question mark as an admission of insufficient evidence for a *single* implied claim, not necessarily to signal conflicting viewpoints."}]}, {"question": "Which of the following scenarios best exemplifies a situation where Betteridge's Law would be a useful 'quick filter'?", "options": [{"text": "You are reading a government report on economic policy changes.", "isCorrect": false, "rationale": "Government reports are typically expected to be factual and evidence-based; Betteridge's Law is more relevant for sensational or attention-grabbing claims in popular media."}, {"text": "You encounter a news article with the headline 'Is This New Diet Pill the Key to Effortless Weight Loss?'", "isCorrect": true, "rationale": "This headline fits the pattern of a sensational claim ending in a question mark, typical of health journalism prone to overselling, making Betteridge's Law a useful tool for immediate skepticism."}, {"text": "You are reviewing a peer-reviewed scientific paper on climate change.", "isCorrect": false, "rationale": "Peer-reviewed papers adhere to strict academic standards and present findings based on data, making Betteridge's Law less applicable than for popular media headlines."}, {"text": "You are researching historical facts for an academic essay.", "isCorrect": false, "rationale": "Historical research focuses on verified facts and sources, which is not the context Betteridge's Law addresses for evaluating speculative claims."}]}, {"question": "The text suggests that Betteridge's Law is not absolute. In what circumstance might a question-mark headline genuinely not conform to the 'answer 'no'' rule?", "options": [{"text": "When the headline is published by a reputable news organization.", "isCorrect": false, "rationale": "While reputable organizations exist, the text states 'the law is not absolute' generally, and even reputable sources might use the question mark for hedging. The specific exception mentioned is different."}, {"text": "When the question mark is used in the headline of a fictional story or satire.", "isCorrect": false, "rationale": "The context of the law is evaluating factual claims in journalism, not fiction or satire."}, {"text": "When the publication genuinely intends to investigate the topic seriously and the headline is exploratory.", "isCorrect": true, "rationale": "The text explicitly states: 'Occasionally a question-mark headline is genuinely exploratory, introducing a topic the publication intends to investigate seriously.'"}, {"text": "When the article contains a direct quote from an expert posing the question.", "isCorrect": false, "rationale": "While an article might contain an expert's quote, the law applies to the headline's intent as a publication's claim, not embedded quotes."}]}, {"question": "What 'deeper lesson' does Betteridge's Law reveal about the media landscape?", "options": [{"text": "Journalists prioritize accuracy above all else, even at the cost of reader engagement.", "isCorrect": false, "rationale": "The text states the opposite, highlighting that 'Headlines exist to get clicks, not to inform,' implying attention often takes precedence over pure accuracy in headlines."}, {"text": "The public is generally uninterested in nuanced scientific findings and prefers simple, declarative statements.", "isCorrect": false, "rationale": "While simplification might occur, the 'deeper lesson' is focused on the media's strategy to capture attention, not solely on public preference for simplicity."}, {"text": "Headlines are primarily designed to attract clicks and manipulate attention, rather than to accurately inform.", "isCorrect": true, "rationale": "The text states, 'Headlines exist to get clicks, not to inform' and describes Betteridge's Law as 'a decoder ring for this particular form of attention manipulation.'"}, {"text": "The most effective headlines always use direct, factual claims without any ambiguity.", "isCorrect": false, "rationale": "The law implies that direct, factual claims are stronger *if supported*, but the 'deeper lesson' points out how ambiguity (via the question mark) is used strategically to gain attention when facts are weak."}]}, {"question": "According to the 'realworld' example, why are health and science journalism particularly prone to question-mark headlines?", "options": [{"text": "Because health and science topics are inherently more speculative than other news areas.", "isCorrect": false, "rationale": "It's not that they are inherently more speculative, but that 'preliminary research generates findings that are genuinely interesting but nowhere near conclusive.'"}, {"text": "To accurately reflect the complex and often unresolved nature of scientific inquiry.", "isCorrect": false, "rationale": "While science is complex, the text clarifies the question mark is used to 'capture the excitement of the research while technically avoiding a false claim' despite inconclusive evidence, which is more about attention than pure accuracy."}, {"text": "Preliminary research often yields interesting but inconclusive findings, which question-mark headlines can oversell without making false claims.", "isCorrect": true, "rationale": "The text states, 'preliminary research generates findings that are genuinely interesting but nowhere near conclusive,' and the question mark 'allows the publication to capture the excitement of the research while technically avoiding a false claim' even if 'the headline is overselling it.'"}, {"text": "To prompt readers to seek out the original scientific papers for verification.", "isCorrect": false, "rationale": "The motivation for such headlines is to attract readers to the article itself, not necessarily to encourage further independent research."}]}, {"question": "Which phrase best describes the role of the question mark in a headline when Betteridge's Law applies?", "options": [{"text": "A direct invitation for reader participation in forming an opinion.", "isCorrect": false, "rationale": "Its role is more about managing the publication's liability and attracting attention due to lack of strong evidence, rather than a direct invitation for opinion formation."}, {"text": "An admission of insufficient evidence disguised as an intriguing possibility.", "isCorrect": true, "rationale": "The 'keyconcept' section explicitly states, 'The question mark is a hedge — an admission of insufficient evidence disguised as an intriguing possibility.'"}, {"text": "A standard journalistic practice for introducing highly debated topics.", "isCorrect": false, "rationale": "While it can introduce topics, its primary function here is tied to insufficient evidence and avoiding liability, not just a general practice for debates."}, {"text": "A stylistic choice to make headlines more engaging and aesthetically pleasing.", "isCorrect": false, "rationale": "The text attributes a deeper, strategic purpose to the question mark beyond mere style."}]}, {"question": "The text links Betteridge's Law to 'The Availability Heuristic' and 'Confirmation Bias.' What does this connection imply about the effectiveness of question-mark headlines?", "options": [{"text": "Such headlines are ineffective because readers are often biased against uncertain claims.", "isCorrect": false, "rationale": "The opposite is implied; these cognitive biases explain *why* such headlines are effective at capturing attention, as people are drawn to dramatic claims and information that confirms existing beliefs."}, {"text": "These headlines exploit cognitive biases, making dramatic but unsubstantiated claims more appealing and memorable.", "isCorrect": true, "rationale": "The Availability Heuristic makes dramatic claims capture attention disproportionately, and Confirmation Bias makes us 'more likely to click on headlines that confirm what we already want to believe,' suggesting these headlines exploit biases for effectiveness."}, {"text": "Readers who understand these biases are immune to the manipulative tactics of question-mark headlines.", "isCorrect": false, "rationale": "Understanding biases helps, but the text doesn't suggest complete immunity; it presents the law as a 'decoder ring' and heuristic to counter these tendencies, implying they still exist."}, {"text": "The connections are merely academic references and have no practical bearing on journalistic practices.", "isCorrect": false, "rationale": "The 'connections' section is provided precisely to show the practical psychological underpinnings of why such journalistic practices are effective."}]}, {"question": "Which of the following headlines would be least likely to be accurately described by Betteridge's Law?", "options": [{"text": "Can a New AI Algorithm Predict Stock Market Crashes with 100% Accuracy?", "isCorrect": false, "rationale": "This headline presents a sensational claim with a question mark, making it a prime candidate for Betteridge's Law (answer 'no')."}, {"text": "Is It Possible for Humans to Live Indefinitely, According to Leading Scientists?", "isCorrect": false, "rationale": "This headline asks about a speculative future possibility, making it likely to fall under Betteridge's Law's 'no' answer, as definitive proof is likely absent."}, {"text": "Are You Getting Enough Sleep? The Science Behind Rest and Recovery.", "isCorrect": true, "rationale": "This headline is genuinely exploratory or a rhetorical question leading into a general informational piece about a well-established topic (sleep science), rather than a speculative claim lacking evidence, which is an exception noted in the text."}, {"text": "Will This Breakthrough Technology Solve All of Humanity's Energy Problems?", "isCorrect": false, "rationale": "This is a highly speculative and grand claim, making it very likely that Betteridge's Law would apply (answer 'no')."}]}, {"question": "Ian Betteridge articulated his law in what year and context?", "options": [{"text": "In a 2009 blog post as a British technology journalist.", "isCorrect": true, "rationale": "The text states: 'Ian Betteridge, a British technology journalist, articulated the principle in a 2009 blog post.'"}, {"text": "In a 1999 academic paper on media studies.", "isCorrect": false, "rationale": "The law was articulated in 2009, not 1999, and in a blog post, not an academic paper."}, {"text": "In a 2015 TED Talk about online misinformation.", "isCorrect": false, "rationale": "The text specifies a 2009 blog post, not a 2015 TED Talk."}, {"text": "In a historical analysis of newspaper headlines from the early 20th century.", "isCorrect": false, "rationale": "While the underlying observation is older, Betteridge himself articulated it in 2009, not in a historical analysis."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
