    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the idiom 'rearranging deck chairs on the Titanic' as described in the text?", "options": [{"text": "Optimizing minor details to improve overall efficiency in a complex system.", "isCorrect": false, "rationale": "While it involves optimizing details, the core of the idiom is ignoring a catastrophic problem, not improving overall efficiency in a positive sense. The optimization is 'futile'."}, {"text": "Investing effort in trivial improvements while ignoring a catastrophic underlying problem.", "isCorrect": true, "rationale": "This option precisely captures the idiom's definition: misallocating effort to minor, irrelevant tasks while a major, critical issue remains unaddressed."}, {"text": "Delaying important tasks by focusing on comfortable, familiar work.", "isCorrect": false, "rationale": "This describes a psychological driver (avoidance/comfort of competence) that leads to the behavior, but it's not the primary definition of the idiom itself, which focuses on the misdirection of effort."}, {"text": "Demonstrating leadership by maintaining order in a chaotic and hopeless situation.", "isCorrect": false, "rationale": "The idiom portrays the action as absurd and misdirected, not as a demonstration of effective leadership. It highlights the futility, not a positive trait."}], "id": "q01"}, {"question": "Which psychological factor best explains why individuals might 'rearrange deck chairs' instead of addressing a ship's sinking hull?", "options": [{"text": "The desire to maintain a calm and orderly environment.", "isCorrect": false, "rationale": "While order might be a side effect, the text identifies deeper psychological drives like the 'comfort of competence' and 'avoidance' as the primary reasons for this misdirection of effort."}, {"text": "The satisfaction derived from completing solvable problems, even if trivial, when important tasks feel impossible.", "isCorrect": true, "rationale": "This directly aligns with 'the comfort of competence,' where individuals gravitate towards tasks they know how to do, providing a sense of accomplishment in overwhelming situations."}, {"text": "A deliberate attempt to deceive others about the severity of the problem.", "isCorrect": false, "rationale": "The text suggests the behavior is often unconscious, driven by coping mechanisms, rather than a conscious effort to deceive."}, {"text": "A belief that small improvements will eventually resolve the larger issue.", "isCorrect": false, "rationale": "This aligns more with 'the illusion of progress,' which is a related but distinct driver from the 'comfort of competence,' which focuses on the ability to solve the task itself."}], "id": "q02"}, {"question": "How does the 'illusion of progress' contribute to the behavior of 'rearranging deck chairs on the Titanic'?", "options": [{"text": "It makes individuals feel productive and accomplished, even when their efforts are misdirected from the actual problem.", "isCorrect": true, "rationale": "The 'illusion of progress' means that being busy provides psychological cover, making one feel like they are addressing the situation, even if they are not addressing anything that matters."}, {"text": "It encourages comprehensive planning and analysis before executing any tasks.", "isCorrect": false, "rationale": "The 'illusion of progress' promotes superficial activity, not comprehensive planning, as a means to feel productive without confronting the core issue."}, {"text": "It allows for a deep understanding of the problem by focusing on small, manageable parts.", "isCorrect": false, "rationale": "This illusion prevents a deep understanding by diverting attention from the real problem entirely, focusing on irrelevant parts instead."}, {"text": "It convinces external stakeholders that the situation is under control, reducing panic.", "isCorrect": false, "rationale": "While busyness might give that impression, the text emphasizes the internal psychological effect on the individual (feeling of accomplishment) rather than external perception as the primary mechanism of the illusion of progress."}], "id": "q03"}, {"question": "A tech startup is losing market share rapidly to competitors with superior products. The executive team decides to invest heavily in a new, flashy marketing campaign and office redecoration. According to the text, this scenario most clearly exemplifies:", "options": [{"text": "A strategic pivot to address customer perception through branding.", "isCorrect": false, "rationale": "While marketing and branding can be strategic, in this context, the text would categorize them as 'deck chairs' if the core 'hull problem' (inferior products) is ignored. A 'strategic pivot' would address the product issue itself."}, {"text": "A necessary investment in brand identity and employee morale.", "isCorrect": false, "rationale": "These are generally valuable, but if the 'ship is sinking' due to product issues, these become 'trivial improvements' that distract from the 'catastrophic underlying problem.'"}, {"text": "Optimizing the irrelevant while ignoring a catastrophic underlying problem.", "isCorrect": true, "rationale": "The rapidly losing market share due to superior competitor products is the 'sinking ship.' The marketing campaign and office redecoration are 'deck chairs' – improvements that are irrelevant to the existential threat."}, {"text": "A proactive measure to boost team morale during challenging times.", "isCorrect": false, "rationale": "While it might coincidentally affect morale, the text's focus is on the misallocation of resources away from the fundamental problem, not the secondary benefits of the misdirected effort."}], "id": "q04"}, {"question": "Under what specific condition, as described in the text, would applying the 'rearranging deck chairs' metaphor be considered an 'unfair accusation'?", "options": [{"text": "When the person genuinely believes their small task will eventually fix the major problem.", "isCorrect": false, "rationale": "This belief aligns with the 'illusion of progress,' which is one of the drivers of 'rearranging deck chairs,' not a condition that makes the metaphor unfair."}, {"text": "When the major problem is so complex that no single individual could possibly solve it.", "isCorrect": false, "rationale": "While complexity is a factor, the text emphasizes the individual's *control* and *ability* to act on the problem, not just its inherent complexity."}, {"text": "When the individual has no control or ability to address the catastrophic problem and is doing what they can within their limited scope.", "isCorrect": true, "rationale": "The text explicitly states the metaphor is unfair when 'the small task is the only one within your control' and the person 'cannot fix the company's strategy' or 'solve a national crisis.'"}, {"text": "When the small task, though seemingly trivial, is a necessary precursor to addressing the larger issue.", "isCorrect": false, "rationale": "The metaphor applies when the activity is 'catastrophically misallocated relative to the urgency of the real problem,' implying it's not a necessary precursor but an irrelevant distraction."}], "id": "q05"}, {"question": "The fundamental message of the 'Rearranging Deck Chairs on the Titanic' idiom is a warning against:", "options": [{"text": "Laziness or inactivity when faced with significant challenges.", "isCorrect": false, "rationale": "The text explicitly states, 'It is not about doing nothing. The deck-chair arranger is busy, perhaps even productive in a narrow sense.' The issue is misdirected activity, not idleness."}, {"text": "Misallocating effort and resources to trivial tasks while a critical, catastrophic issue escalates.", "isCorrect": true, "rationale": "This option accurately summarizes the core warning: effort is spent 'where it is comfortable rather than where it is needed,' ignoring the existential threat."}, {"text": "Over-optimizing processes that are already efficient and effective.", "isCorrect": false, "rationale": "The problem isn't just over-optimizing; it's optimizing things that are irrelevant to the *catastrophic underlying problem* that is being ignored."}, {"text": "Underestimating the importance of details in crisis management.", "isCorrect": false, "rationale": "On the contrary, the idiom warns against *overestimating* the importance of trivial details to the detriment of addressing the major crisis."}], "id": "q06"}, {"question": "A government is facing a severe national economic recession. Instead of implementing difficult fiscal reforms, the legislature focuses its efforts on passing numerous minor bills, such as designating a new state flower and renaming historical landmarks. This behavior is most directly explained by which psychological driver?", "options": [{"text": "The comfort of competence, as renaming things is a known legislative process.", "isCorrect": false, "rationale": "While the tasks are within their competence, the text highlights 'avoidance' as the primary driver when a problem is 'so frightening, so large, or so painful' that attention is unconsciously redirected."}, {"text": "The illusion of progress, as passing many bills creates a sense of accomplishment.", "isCorrect": false, "rationale": "While an illusion of progress may result, the deeper, primary motivation for *why* they choose to divert from the 'terrifying' recession is avoidance, as explained in the text."}, {"text": "Avoidance, as the economic crisis is too frightening and painful to confront directly.", "isCorrect": true, "rationale": "This directly matches the text's description of avoidance, where individuals or institutions redirect attention to manageable tasks to cope with anxiety caused by a large, painful, or frightening real problem."}, {"text": "A strategic decision to maintain public morale by demonstrating activity.", "isCorrect": false, "rationale": "The text describes avoidance as an unconscious coping mechanism, not a conscious, deliberate strategy to manage public perception, though that might be an unintentional side effect."}], "id": "q07"}, {"question": "A university department's enrollment numbers are declining sharply, threatening its long-term viability. The department head convenes meetings to discuss a new color scheme for the department's brochures and the design of new faculty office nameplates. Applying the diagnostic questions from the text, which conclusion is most appropriate?", "options": [{"text": "The department head is exhibiting strategic planning by focusing on branding and internal aesthetics.", "isCorrect": false, "rationale": "While branding can be strategic, the text would categorize a new color scheme and nameplates as 'trivial improvements' if the 'catastrophic' problem of declining enrollment is being ignored. It's 'optimizing the irrelevant.'"}, {"text": "The department head is effectively managing what is within their immediate control, given the university's bureaucracy.", "isCorrect": false, "rationale": "A department head typically has significant control and ability to influence enrollment strategy. Therefore, this is unlikely a situation where the metaphor is unfair, but rather one where they *could* address the hull."}, {"text": "The ship is clearly sinking, and the department head is capable of working on the hull but choosing to focus on the deck chairs.", "isCorrect": true, "rationale": "Declining enrollment that threatens viability is the 'sinking ship.' A department head has the 'ability to address the real problem' (e.g., curriculum, recruitment strategies) but is instead 'choosing to optimize the irrelevant' (brochure colors, nameplates)."}, {"text": "The metaphor is unfair because designing brochures and nameplates are small, manageable tasks that don't harm anyone.", "isCorrect": false, "rationale": "The fairness of the metaphor depends on whether the person *could* address the real problem, not just on the size or harmlessness of the task. A department head typically has agency over enrollment issues."}], "id": "q08"}, {"question": "The text states that the metaphor 'captures a specific failure mode.' What is this specific failure mode?", "options": [{"text": "Laziness in the face of a crisis.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'It is not about doing nothing... The problem is that the productivity is aimed at the wrong target.'"}, {"text": "Disregarding all minor details in favor of the big picture.", "isCorrect": false, "rationale": "The failure mode is precisely the opposite: *over*-focusing on minor details while neglecting the big, catastrophic picture."}, {"text": "Optimizing the irrelevant.", "isCorrect": true, "rationale": "This phrase is directly quoted from the text as the 'specific failure mode' captured by the metaphor."}, {"text": "Procrastination due to overwhelming tasks.", "isCorrect": false, "rationale": "While procrastination is a related behavior often driven by avoidance (one of the psychological forces), the specific failure mode identified by the metaphor is 'optimizing the irrelevant,' which describes the *nature* of the misdirected activity."}], "id": "q09"}, {"question": "The text connects 'Rearranging Deck Chairs' to 'The Streetlight Effect' and 'The Eisenhower Matrix.' What common theme links these concepts, suggesting why they are cross-referenced?", "options": [{"text": "All three emphasize the importance of meticulous organization and planning.", "isCorrect": false, "rationale": "While the Eisenhower Matrix involves planning, the Streetlight Effect is about misdirected search, and 'Deck Chairs' is about misdirected *effort*, not primarily about organization or planning itself."}, {"text": "They all provide frameworks for identifying urgent tasks in a crisis.", "isCorrect": false, "rationale": "The Eisenhower Matrix does this directly, but the Streetlight Effect focuses on where one *looks* for answers (comfort over true necessity), and 'Deck Chairs' is about *what one does* (trivial over critical), not just urgency."}, {"text": "They all highlight the human tendency to misdirect attention or effort from critical problems to easier, more comfortable, or less impactful areas.", "isCorrect": true, "rationale": "This accurately captures the commonality: 'Deck Chairs' is optimizing irrelevant; 'Streetlight Effect' is searching where it's easy/comfortable (under the light); the Eisenhower Matrix helps distinguish 'urgent' (often comfortable) from 'important' (often difficult), all relating to misdirected focus."}, {"text": "They are all historical idioms related to maritime disasters and problem-solving.", "isCorrect": false, "rationale": "Only the Titanic idiom is related to a maritime disaster; the Streetlight Effect is a general idiom, and the Eisenhower Matrix is a modern management framework."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
