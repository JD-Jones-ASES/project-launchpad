    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a 'Pyrrhic victory'?", "options": [{"text": "A victory achieved through innovative and unconventional tactics.", "isCorrect": false, "rationale": "While Pyrrhus used innovative tactics like war elephants, the defining characteristic of a Pyrrhic victory is not the method of winning but the unsustainable cost."}, {"text": "A tactical win that comes at such a high cost it undermines or reverses the victor's strategic position.", "isCorrect": true, "rationale": "This accurately defines a Pyrrhic victory as a tactical success that leads to a strategic failure due to its excessive cost, as stated in the text."}, {"text": "A battle won by a numerically superior army against a smaller, weaker foe.", "isCorrect": false, "rationale": "The concept of a Pyrrhic victory is independent of the numerical strength of the forces involved; it focuses on the outcome's cost relative to its benefit."}, {"text": "A victory that results in the complete annihilation of the enemy's forces, regardless of friendly losses.", "isCorrect": false, "rationale": "A Pyrrhic victory focuses on the *victor's* devastating losses and compromised strategic position, not necessarily the total destruction of the enemy."}], "id": "q01"}, {"question": "Despite winning battles against the Romans, why was King Pyrrhus's campaign in Italy ultimately considered a Pyrrhic victory?", "options": [{"text": "The Romans quickly adopted Pyrrhus's war elephant tactics, negating his advantage.", "isCorrect": false, "rationale": "The text states Romans had never encountered war elephants, implying they were a novel advantage, not something quickly adopted by the Romans in that campaign."}, {"text": "His victories depleted his irreplaceable veterans and best officers, making long-term success impossible.", "isCorrect": true, "rationale": "The text explicitly states: 'His best officers were dead. His irreplaceable veterans — professionals who had trained for years and could not be quickly replaced — were gone.'"}, {"text": "He failed to secure any strategic alliances with local Italian tribes, isolating his forces.", "isCorrect": false, "rationale": "While strategic alliances are important, the text emphasizes the devastating cost in terms of human resources as the reason his victories were Pyrrhic, not a lack of alliances."}, {"text": "He ran out of critical supplies due to being far from home and having a long supply chain.", "isCorrect": false, "rationale": "The text mentions being 'fighting far from home, with no easy way to recruit reinforcements,' but the primary reason for the Pyrrhic nature of the *victories* was the irreplaceable losses, not specifically supply shortages."}], "id": "q02"}, {"question": "The concept of a Pyrrhic victory highlights a fundamental distinction between which two aspects of conflict or competition?", "options": [{"text": "Offensive and defensive strategies.", "isCorrect": false, "rationale": "While part of military strategy, this is not the fundamental distinction highlighted by a Pyrrhic victory."}, {"text": "Short-term gains (tactical success) and long-term consequences (strategic success).", "isCorrect": true, "rationale": "The text explicitly states: 'It reveals a fundamental distinction between tactical success (winning the immediate contest) and strategic success (advancing your long-term position).'"}, {"text": "Military might and diplomatic influence.", "isCorrect": false, "rationale": "These are different dimensions of power, but not the core distinction emphasized by the Pyrrhic victory concept."}, {"text": "Individual achievement and team collaboration.", "isCorrect": false, "rationale": "This distinction is unrelated to the concept of a Pyrrhic victory as described in the text."}], "id": "q03"}, {"question": "A start-up company successfully sues a large tech giant for patent infringement, winning a substantial monetary award. However, the lawsuit took five years, cost more in legal fees and executive time than the award, and damaged the company's reputation, deterring potential investors. This scenario is an example of a:", "options": [{"text": "Strategic alliance.", "isCorrect": false, "rationale": "This scenario describes a conflict and its outcome, not an alliance."}, {"text": "Pyrrhic victory.", "isCorrect": true, "rationale": "This scenario perfectly matches the example given in the text for a lawsuit: winning in court but spending so much on legal fees and enduring so much scrutiny that the victory is worse than an alternative outcome."}, {"text": "Tactical retreat.", "isCorrect": false, "rationale": "The company 'won' the lawsuit, so it was not a retreat."}, {"text": "Zero-sum game.", "isCorrect": false, "rationale": "While the lawsuit is competitive, the term 'zero-sum game' merely implies one party's gain is another's loss. A Pyrrhic victory specifically highlights that even the 'winner' can end up worse off, which is a more specific and fitting description."}], "id": "q04"}, {"question": "According to the text, the common error made by those who achieve Pyrrhic victories is:", "options": [{"text": "Underestimating the opponent's resolve and resources.", "isCorrect": false, "rationale": "While underestimation can be a mistake, the text focuses on a different, internal error related to goal-setting."}, {"text": "Failing to adapt to changing market or battlefield circumstances.", "isCorrect": false, "rationale": "Adaptability is important, but the core error identified is more about the focus of optimization."}, {"text": "Optimizing for the immediate contest rather than the larger, long-term objective.", "isCorrect": true, "rationale": "The text explicitly states: 'In each case, the error is the same: optimizing for the immediate contest rather than for the larger objective. Pyrrhic victors win the wrong game.'"}, {"text": "Over-relying on a single dominant strategy without backup plans.", "isCorrect": false, "rationale": "This describes a strategic flaw, but not the specific 'error' that defines why a victory itself becomes Pyrrhic according to the text."}], "id": "q05"}, {"question": "Which of the following psychological biases is NOT mentioned in the text as contributing to individuals or groups falling into the Pyrrhic victory trap?", "options": [{"text": "Loss aversion.", "isCorrect": false, "rationale": "Loss aversion is mentioned: 'Loss aversion makes the prospect of “losing” (even a battle within a larger war) feel intolerable.'"}, {"text": "Confirmation bias.", "isCorrect": true, "rationale": "Confirmation bias is not listed among the biases that conspire to cause Pyrrhic victories in the text. The mentioned biases are sunk-cost fallacy, loss aversion, ego, and emotional momentum of competition."}, {"text": "Sunk-cost fallacy.", "isCorrect": false, "rationale": "The sunk-cost fallacy is mentioned: 'The sunk-cost fallacy makes us reluctant to walk away from a contest we have already invested in.'"}, {"text": "Ego.", "isCorrect": false, "rationale": "Ego is mentioned: 'Ego makes us confuse winning with being right.'"}], "id": "q06"}, {"question": "What does the text propose as the 'antidote' to avoiding Pyrrhic victories?", "options": [{"text": "Aggressive pre-emptive strikes to eliminate potential threats early.", "isCorrect": false, "rationale": "This is a military tactic and not the general antidote for avoiding Pyrrhic victories in any context, as described in the text."}, {"text": "Strategic awareness, involving regular re-evaluation of long-term objectives and costs.", "isCorrect": true, "rationale": "The text explicitly states: 'The antidote is strategic awareness: the discipline of regularly stepping back from the immediate contest and asking, “Even if I win this, will I be better off?”'"}, {"text": "Negotiating favorable settlement terms before any conflict can escalate.", "isCorrect": false, "rationale": "While a good practice, this is a specific action within a conflict, not the overarching 'antidote' of a mindset proposed by the text."}, {"text": "Relying on experienced advisors for all major strategic decisions.", "isCorrect": false, "rationale": "Good advice, but the text emphasizes a specific internal discipline—strategic awareness—as the antidote."}], "id": "q07"}, {"question": "Based on the 'Pyrrhus of Epirus' personbox, what is the key lesson from Pyrrhus's overall career?", "options": [{"text": "Superior tactical brilliance guarantees lasting strategic success.", "isCorrect": false, "rationale": "The personbox explicitly states the opposite: 'Yet Pyrrhus's career is a case study in brilliant tactics without sustainable strategy.'"}, {"text": "Even the greatest commanders can meet an undignified end, highlighting the unpredictability of life.", "isCorrect": false, "rationale": "While true that he met an undignified end, the 'key lesson' about his *career* as a case study specifically relates to the effectiveness of his military campaigns, not his death."}, {"text": "Brilliant tactics, without a sustainable strategy, often fail to produce lasting results.", "isCorrect": true, "rationale": "The personbox states: 'Pyrrhus's career is a case study in brilliant tactics without sustainable strategy. He won battles... but his victories were so costly that none of them produced lasting results.'"}, {"text": "War elephants were an ineffective weapon in ancient warfare due to their high maintenance.", "isCorrect": false, "rationale": "The text implies war elephants were formidable but contributed to the *cost* of victory, not that they were inherently ineffective as a weapon."}], "id": "q08"}, {"question": "In the technology industry, how might a 'patent war' exemplify a Pyrrhic victory?", "options": [{"text": "It always results in a clear winner who gains dominant market share and lasting profitability.", "isCorrect": false, "rationale": "This describes a beneficial outcome, not a Pyrrhic one, which implies the 'win' comes at too high a cost."}, {"text": "The legal fees and executive attention required to win can outweigh the actual value of the patents themselves.", "isCorrect": true, "rationale": "The 'realworld' example section states: 'Companies that engage in patent wars sometimes 'win' rulings that cost more in legal fees and executive attention than the patents were ever worth.'"}, {"text": "It fosters innovation by forcing companies to develop new, uninfringed technologies.", "isCorrect": false, "rationale": "While innovation might be an indirect consequence, the *Pyrrhic* aspect relates to the disproportionate cost of the 'win,' not the innovation."}, {"text": "It typically leads to mutually beneficial cross-licensing agreements between competitors.", "isCorrect": false, "rationale": "This describes a cooperative, positive outcome, not a costly or detrimental victory."}], "id": "q09"}, {"question": "The overarching message of the 'Pyrrhic Victory' section is to emphasize the importance of:", "options": [{"text": "Always avoiding conflict, regardless of the stakes, to prevent losses.", "isCorrect": false, "rationale": "The section does not advocate avoiding all conflict, but rather strategically assessing the true value and cost of engaging and winning."}, {"text": "Prioritizing long-term objectives and evaluating the true cost and value of immediate wins.", "isCorrect": true, "rationale": "This synthesizes the core message about strategic awareness, distinguishing tactical from strategic success, and the need to weigh the cost of winning against the value of the prize."}, {"text": "Concentrating all available resources on achieving a decisive tactical victory at any cost.", "isCorrect": false, "rationale": "This is precisely the mindset that leads to Pyrrhic victories, as it disregards the long-term strategic implications of the cost."}, {"text": "Learning from historical military campaigns to inform all modern decision-making.", "isCorrect": false, "rationale": "While the section uses historical examples, its message extends beyond military history to general decision-making, emphasizing a principle rather than just historical learning."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
