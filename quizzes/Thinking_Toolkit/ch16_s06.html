<script>
var QUESTIONS = [{"question": "Which statement best defines Gresham's Law?", "options": [{"text": "Governments printing too much money leads to inflation.", "isCorrect": false, "rationale": "While related to economics, this statement describes general inflation and not the specific mechanism of Gresham's Law, which concerns the circulation of different intrinsic values at the same face value."}, {"text": "The intrinsic value of money always exceeds its face value.", "isCorrect": false, "rationale": "Gresham's Law often highlights situations where the face value of 'bad money' is disproportionately high compared to its intrinsic value, leading to it dominating circulation."}, {"text": "When two forms of money circulate at the same face value but differ in intrinsic value, the less valuable form dominates circulation.", "isCorrect": true, "rationale": "This statement accurately captures the essence of Gresham's Law as presented: 'bad money drives out good' under conditions of uniform face value but differing intrinsic value."}, {"text": "Good quality goods always command higher prices in a competitive market.", "isCorrect": false, "rationale": "This statement assumes transparency in quality. Gresham's Law specifically addresses situations where quality differences are *hidden* by uniform pricing or standards, leading to the opposite outcome."}]}, {"question": "While named after Sir Thomas Gresham, who else is noted in the text for observing the principle of 'bad money drives out good' prior to him?", "options": [{"text": "George Akerlof", "isCorrect": false, "rationale": "George Akerlof applied the principle to used car markets ('lemons') much later in the 20th century, but he did not predate Gresham in the observation of the core principle."}, {"text": "Nicolaus Copernicus and Nicole Oresme", "isCorrect": true, "rationale": "The text explicitly states that 'the principle was noted by Nicolaus Copernicus in 1526 and by the medieval scholar Nicole Oresme in the fourteenth century,' both predating Sir Thomas Gresham."}, {"text": "Adam Smith and John Maynard Keynes", "isCorrect": false, "rationale": "These are prominent economists, but the text does not mention them in connection with the early observation of Gresham's Law."}, {"text": "Queen Elizabeth I", "isCorrect": false, "rationale": "Sir Thomas Gresham was a financial adviser to the English Crown during this period, but the text does not identify the monarch as an observer of the principle."}]}, {"question": "In the context of sixteenth-century English coinage described, why would a rational individual choose to spend a clipped coin rather than a full-weight coin, both stamped as one shilling?", "options": [{"text": "Clipped coins were easier to acquire due to their abundance.", "isCorrect": false, "rationale": "The abundance of clipped coins is a *result* of Gresham's Law, not the primary motivation for spending them. The decision to spend is based on immediate transaction value versus intrinsic value."}, {"text": "The lighter coin still bought the same amount in the marketplace, while the heavier coin retained more intrinsic value as silver.", "isCorrect": true, "rationale": "As the text explains, 'The lighter coin buys just as much in the marketplace (a shilling is a shilling), but the heavier coin is worth more as silver.' Rational self-interest dictates spending the less valuable coin and hoarding the more valuable one."}, {"text": "Full-weight coins were illegal to spend due to government regulations.", "isCorrect": false, "rationale": "The text does not mention any illegality associated with spending full-weight coins; rather, the decision was driven by individual economic rationality."}, {"text": "People preferred the aesthetic of clipped coins.", "isCorrect": false, "rationale": "The aesthetic appeal of coins is not mentioned as a factor influencing the rational decision-making process described in Gresham's Law."}]}, {"question": "The core mechanism behind Gresham's Law, as illustrated by the coinage example, is that rational self-interest leads individuals to:", "options": [{"text": "Prioritize intrinsic value over face value in all transactions.", "isCorrect": false, "rationale": "In a transaction, people prioritize the accepted face value. The intrinsic value is considered for what to *hoard* or *keep out of circulation*, not necessarily for every transaction."}, {"text": "Spend goods or currency with lower intrinsic value while hoarding those with higher intrinsic value when they circulate at the same face value.", "isCorrect": true, "rationale": "This accurately describes the behavior of 'bad money drives out good.' Individuals will use the less valuable currency or item for transactions, preserving the more valuable one for its intrinsic worth."}, {"text": "Always seek to reduce their precious metal holdings.", "isCorrect": false, "rationale": "The opposite is true; individuals hoard the precious metal when it's undervalued by its face value, seeking to *retain* their precious metal holdings."}, {"text": "Demand government intervention to standardize currency.", "isCorrect": false, "rationale": "While standardization could be a solution, this option describes a potential external response, not the internal mechanism of rational self-interest that drives Gresham's Law."}]}, {"question": "How does George Akerlof's 'Market for Lemons' paper illustrate Gresham's Law in the context of used cars?", "options": [{"text": "It shows that car manufacturers deliberately produce low-quality vehicles.", "isCorrect": false, "rationale": "Akerlof's paper focuses on information asymmetry (sellers know quality, buyers don't), not the intent of manufacturers to produce low-quality goods."}, {"text": "It demonstrates that buyers, unable to distinguish quality, offer lower prices, leading sellers of good cars to withdraw and the market to be dominated by poor cars.", "isCorrect": true, "rationale": "The text explicitly states this: 'Sellers of good cars know their vehicles are worth more than the average market price, so they are reluctant to sell. Sellers of poor cars know their vehicles are worth less than the market price, so they are eager to sell. Over time, the market becomes dominated by poor cars...'"}, {"text": "It argues that all used cars are inherently 'lemons' and should not be purchased.", "isCorrect": false, "rationale": "The paper identifies a market problem, not a universal condemnation of used cars. The 'lemons' problem refers to the market becoming dominated by low-quality cars."}, {"text": "It suggests that government regulation is always necessary to ensure product quality.", "isCorrect": false, "rationale": "While regulation can be a solution, Akerlof's paper primarily identifies and analyzes the *mechanism* of quality uncertainty and market deterioration, not prescriptive government intervention."}]}, {"question": "Which of the following situations would LEAST likely be described as an example of Gresham's Law?", "options": [{"text": "A market where consumers can easily verify the quality of all available products before purchase.", "isCorrect": true, "rationale": "Gresham's Law operates when quality differences are *hidden* by uniform pricing or standards. If consumers can easily verify quality (i.e., there is transparency), then the core condition for Gresham's Law is absent, and good quality goods would not be driven out by bad."}, {"text": "An academic journal that prioritizes the sheer number of submissions over their research rigor.", "isCorrect": false, "rationale": "The text explicitly cites this as an example: 'when quantity of publications matters more than quality, the system floods with mediocre papers.'"}, {"text": "A political debate where nuanced policy discussions are consistently overshadowed by emotionally charged sound bites.", "isCorrect": false, "rationale": "The text explicitly cites this as an example: 'when sound bites and slogans circulate at the same “face value” as nuanced arguments, the sound bites drive out the nuance.'"}, {"text": "An online marketplace where an abundance of fake positive reviews makes it difficult to trust genuine customer feedback.", "isCorrect": false, "rationale": "The text explicitly cites this as an example: 'The “bad money” of fake feedback drives out the “good money” of honest assessment.'"}]}, {"question": "According to the text, what is the primary antidote to the operation of Gresham's Law?", "options": [{"text": "Imposing stricter government regulations on prices.", "isCorrect": false, "rationale": "While price regulation can have economic effects, the text specifically identifies 'transparency' as the antidote, focusing on making quality visible rather than controlling prices directly."}, {"text": "Increasing the face value of all currency.", "isCorrect": false, "rationale": "Changing the face value of currency does not address the underlying problem of hidden quality differences between items that circulate at the same value."}, {"text": "Transparency—mechanisms that make quality visible.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'The antidote is transparency — mechanisms that make quality visible.'"}, {"text": "Encouraging consumers to always pay more for perceived higher quality.", "isCorrect": false, "rationale": "If quality is hidden or uncertain, merely 'perceiving' higher quality is difficult or unreliable. The solution lies in making actual quality discernible."}]}, {"question": "The text describes online reviews as an example of Gresham's Law where:", "options": [{"text": "The sheer volume of reviews makes it impossible for consumers to make informed choices.", "isCorrect": false, "rationale": "While a large volume can be overwhelming, the core Gresham's Law mechanism described is about the *quality* of reviews, not just their quantity."}, {"text": "Genuine, honest assessments are diluted and driven out by cheaply produced fake positive reviews.", "isCorrect": true, "rationale": "The 'realworld' section states: 'When fake positive reviews are cheap to produce, they dilute the signal from genuine reviews. The 'bad money' of fake feedback drives out the 'good money' of honest assessment.'"}, {"text": "Review platforms charge higher fees for verified reviews, making them inaccessible.", "isCorrect": false, "rationale": "This specific scenario regarding fees is not mentioned in the provided text."}, {"text": "Reviewers often have personal biases that skew the overall ratings.", "isCorrect": false, "rationale": "While biases can exist, the text's specific application of Gresham's Law to online reviews focuses on the distinction between *fake* and *genuine* reviews, not general biases."}]}, {"question": "How does professional licensing and certification function as a mechanism against Gresham's Law, according to the text?", "options": [{"text": "It limits the total number of practitioners in a given field, increasing demand.", "isCorrect": false, "rationale": "While licensing can affect supply, the text states its function related to Gresham's Law is to make quality visible, not primarily to control numbers or increase demand."}, {"text": "It ensures that all professionals charge uniform prices for their services.", "isCorrect": false, "rationale": "The problem Gresham's Law addresses is uniform pricing *hiding* quality differences; licensing does not aim to enforce uniform pricing, but rather to differentiate quality."}, {"text": "It makes quality visible, thereby preventing low-quality practitioners from undercutting and driving out high-quality ones.", "isCorrect": true, "rationale": "The 'realworld' section explicitly states: 'One function of licensing and certification is to make quality visible, preventing the Gresham's Law dynamic in which low-quality practitioners undercut high-quality ones.'"}, {"text": "It provides a means for governments to collect taxes from service providers.", "isCorrect": false, "rationale": "While licensing may involve fees that generate revenue, its primary function in the context of Gresham's Law is about quality assurance and visibility, not taxation."}]}, {"question": "Based on the text, what is a fundamental condition for Gresham's Law to operate beyond just coinage?", "options": [{"text": "The presence of a government-issued currency.", "isCorrect": false, "rationale": "The text explicitly states the principle 'extends far beyond coinage' and applies to goods and services, indicating it's not limited to government-issued currency."}, {"text": "A market where all goods and services are intrinsically identical.", "isCorrect": false, "rationale": "Gresham's Law operates precisely when goods or services *differ* in intrinsic value or quality, but these differences are obscured."}, {"text": "Situations where quality differences are hidden behind uniform pricing, labeling, or standards.", "isCorrect": true, "rationale": "The text emphasizes this condition multiple times: 'Gresham's Law operates wherever quality differences are hidden behind uniform pricing or uniform standards' and 'When quality differences are hidden by uniform pricing, labeling, or standards...'"}, {"text": "A complete absence of any competition among sellers.", "isCorrect": false, "rationale": "Competition can still exist; the key factor is the inability of buyers to discern quality differences amidst that competition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
