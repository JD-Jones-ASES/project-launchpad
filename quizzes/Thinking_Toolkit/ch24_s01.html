<script>
var QUESTIONS = [{"question": "The Sorites Paradox primarily highlights a fundamental problem concerning which aspect of language and logic?", "options": [{"text": "The existence of inherently contradictory statements.", "isCorrect": false, "rationale": "While logic deals with contradictions, the Sorites Paradox specifically addresses the challenge presented by vague terms, not just contradictory statements in general."}, {"text": "The difficulty in establishing precise boundaries for vague categories.", "isCorrect": true, "rationale": "The paradox demonstrates that many common terms (like 'heap,' 'bald,' 'tall') lack sharp, definable boundaries, making it impossible to pinpoint when a transition from 'not-X' to 'X' occurs through incremental changes."}, {"text": "The inability of human language to describe physical reality accurately.", "isCorrect": false, "rationale": "The paradox is not about the general accuracy of language, but specifically about the problems caused by vagueness within language when precise logical distinctions are required."}, {"text": "The limited scope of classical logic in resolving philosophical dilemmas.", "isCorrect": false, "rationale": "While some solutions propose modifying classical logic (e.g., abandoning bivalence), the core problem identified by Sorites is the vagueness of predicates, which challenges classical logic's assumption of sharp categories, rather than logic's general scope."}], "id": "q01"}, {"question": "Which statement accurately describes the structure of the Sorites Paradox argument presented in the text?", "options": [{"text": "Two premises that are obviously false, leading to an obviously true conclusion.", "isCorrect": false, "rationale": "The text states that both premises 'seem obviously true,' and the conclusion is 'obviously false.'"}, {"text": "One undeniable premise, one intuitively true premise, and an inescapable, but false, conclusion.", "isCorrect": true, "rationale": "The argument structure is: 'One grain of sand is not a heap' (undeniable Premise 1), 'Adding one grain of sand to a non-heap does not make it a heap' (intuitively true Premise 2), which logically leads to the 'obviously false' conclusion that 'no number of grains is a heap.'"}, {"text": "A series of true statements that contradict each other in their final implication.", "isCorrect": false, "rationale": "The problem isn't direct contradiction between true statements, but a valid logical progression from seemingly true premises to a false conclusion, exposing the issue of vagueness."}, {"text": "An argument based on an illogical leap from specific examples to a universal generalization.", "isCorrect": false, "rationale": "The logic is stated as 'valid' and the conclusion 'follows inescapably' if premises are accepted, indicating it's not an illogical leap but a problem arising from the premises themselves."}], "id": "q02"}, {"question": "Consider a legal dispute over the 'excessive noise' emanating from a new concert venue. Which of the following best explains why 'excessive noise' presents a Sorites-like challenge?", "options": [{"text": "Noise levels are subjective and vary greatly from person to person.", "isCorrect": false, "rationale": "While subjectivity can play a role, the core of the Sorites paradox is about incremental change and a lack of a definitive boundary, not primarily individual subjective perception, although vagueness can lead to perceptual differences."}, {"text": "There is no universally agreed-upon definition of what constitutes 'noise'.", "isCorrect": false, "rationale": "The term 'noise' itself might be defined, but 'excessive' is the vague predicate here. The challenge lies in the boundary of 'excessive,' not the base term 'noise.'"}, {"text": "Each decibel increase, by itself, doesn't definitively make 'non-excessive' noise 'excessive', yet at some point, the noise clearly becomes excessive.", "isCorrect": true, "rationale": "This aligns perfectly with the Sorites Paradox: a single incremental change (one decibel) doesn't seem to transform non-excessive noise into excessive noise, yet a cumulative increase undeniably results in excessive noise. This points to the absence of a sharp boundary for the predicate 'excessive.'"}, {"text": "The concept of 'noise' is a socially constructed idea with no basis in physical reality.", "isCorrect": false, "rationale": "Noise has a physical basis (sound waves). The problem is with the *vagueness* of 'excessive,' not the unreality of 'noise.'"}], "id": "q03"}, {"question": "Epistemicism, as a proposed solution to the Sorites Paradox, faces significant criticism primarily because:", "options": [{"text": "It requires the abandonment of the principle of bivalence, stating that statements can be neither true nor false.", "isCorrect": false, "rationale": "This describes a criticism of Supervaluationism, not Epistemicism. Epistemicism explicitly aims to preserve classical logic and bivalence."}, {"text": "It suggests that there is a precise, unknowable boundary for vague predicates, which many find implausible.", "isCorrect": true, "rationale": "Epistemicism posits that a definite threshold (e.g., exactly 4,327 grains) exists, but we are simply ignorant of it. The text notes that this 'strikes most people as deeply implausible' because it feels arbitrary to have such a precise, yet hidden, point."}, {"text": "It replaces discrete truth values with a continuous scale from 0 to 1, leading to new philosophical puzzles.", "isCorrect": false, "rationale": "This describes a characteristic of Fuzzy Logic, not Epistemicism."}, {"text": "It demands that all vague terms be 'precisified' in multiple legitimate ways, leading to ambiguity.", "isCorrect": false, "rationale": "This is a characteristic of Supervaluationism, where predicates can be precisified, but it's not the primary criticism of Epistemicism."}], "id": "q04"}, {"question": "How does Supervaluationism attempt to resolve the Sorites Paradox, particularly in borderline cases?", "options": [{"text": "It asserts that for any vague predicate, there is one objectively correct and precise boundary, even if unknown.", "isCorrect": false, "rationale": "This is the stance of Epistemicism, not Supervaluationism."}, {"text": "It assigns a numerical degree of truth between 0 and 1 to statements involving vague predicates.", "isCorrect": false, "rationale": "This is the approach taken by Fuzzy Logic."}, {"text": "It allows for multiple legitimate 'precisifications' of a vague predicate, deeming statements neither true nor false if they are true on some but not all precisifications.", "isCorrect": true, "rationale": "Supervaluationism holds that a statement is true only if true under all legitimate ways of making the vague term precise, false if false under all, and neither true nor false in borderline cases, thereby abandoning bivalence for these cases."}, {"text": "It argues that the truth value of a statement involving a vague predicate depends entirely on the context of its utterance.", "isCorrect": false, "rationale": "While contextualism is mentioned as another approach, Supervaluationism's core mechanism involves precisifications and the abandonment of bivalence for borderline cases, not solely context."}], "id": "q05"}, {"question": "According to the 'Key Concept' box, what is a practical lesson derived from understanding the Sorites Paradox?", "options": [{"text": "That all categories are arbitrary and therefore meaningless.", "isCorrect": false, "rationale": "The text states that categories are essential, but the lesson is to be suspicious of arguments demanding *precise* boundaries where none exist, not that categories are meaningless."}, {"text": "To always seek precise numerical thresholds for all concepts to avoid vagueness.", "isCorrect": false, "rationale": "The text advises suspicion of arguments *demanding* precise boundaries where none exist, and highlights that such lines are often 'stipulated, not discovered.' It doesn't advocate for *always* seeking them arbitrarily."}, {"text": "To be wary of arguments that demand precise boundaries where none exist, and those that exploit the absence of a boundary to deny a real difference.", "isCorrect": true, "rationale": "The 'Key Concept' box explicitly states: 'be suspicious of any argument that demands a precise boundary where none exists, and be equally suspicious of any argument that exploits the absence of a boundary to deny a real difference.'"}, {"text": "That vagueness is merely a sign of sloppiness in our language that can be easily corrected.", "isCorrect": false, "rationale": "The text explicitly states: 'Vagueness is not sloppiness in our language; it is a structural feature of how concepts work.'"}], "id": "q06"}, {"question": "The 'Real World' section discusses how legal systems handle vague concepts. What is the primary reason for establishing 'bright lines' (e.g., 18 years old for adulthood, 0.08 BAC for intoxication) in law?", "options": [{"text": "To discover the objectively true threshold for a vague concept.", "isCorrect": false, "rationale": "The text states these lines are 'stipulated, not discovered,' acknowledging their arbitrary nature rather than claiming they represent objective truths."}, {"text": "To allow legal institutions to function by providing clear, albeit arbitrary, operational definitions.", "isCorrect": true, "rationale": "Legal systems must make decisions, and vague terms hinder this. 'Bright lines' are 'useful fictions that allow institutions to function' by providing clear, enforceable rules, even if the underlying concept remains vague."}, {"text": "To eliminate the vagueness inherent in philosophical concepts entirely.", "isCorrect": false, "rationale": "The text implies that the underlying concepts remain vague; the bright lines simply serve a practical purpose, not to eliminate vagueness itself."}, {"text": "To encourage judges to interpret vague terms on a case-by-case basis, promoting flexibility.", "isCorrect": false, "rationale": "While 'Think About It' discusses this option, the 'Real World' section focuses on *stipulated* bright lines as a way to avoid the inconsistency of pure case-by-case interpretation for certain crucial legal definitions."}], "id": "q07"}, {"question": "If Fuzzy Logic were applied to the concept of 'baldness,' what would be a key difference from classical logic?", "options": [{"text": "A person is either 100% bald or 0% bald; there is no in-between.", "isCorrect": false, "rationale": "This describes classical logic's binary approach, which Fuzzy Logic seeks to move beyond."}, {"text": "Baldness would be defined by an unknowable, precise number of hairs on the head.", "isCorrect": false, "rationale": "This is characteristic of Epistemicism."}, {"text": "A person could be considered 0.6 true bald or 0.3 true bald, rather than simply bald or not bald.", "isCorrect": true, "rationale": "Fuzzy Logic replaces binary true/false with a 'continuous scale from 0 to 1,' allowing for degrees of truth for vague predicates like 'bald.'"}, {"text": "The definition of baldness would depend entirely on cultural context and personal opinion.", "isCorrect": false, "rationale": "While context can influence perception, Fuzzy Logic is about assigning numerical degrees of truth, not solely relying on subjective or cultural definitions, although these could inform the truth value assignments."}], "id": "q08"}, {"question": "The paradox of the heap can also be formulated by *removing* grains from a large heap one by one. This reverse formulation primarily emphasizes which aspect of the paradox?", "options": [{"text": "The arbitrary nature of language in defining physical objects.", "isCorrect": false, "rationale": "While language is central, the reverse formulation specifically highlights the incremental nature of the change and the difficulty of pinpointing a boundary, not just general arbitrariness."}, {"text": "That no single incremental change seems to make a difference, yet the overall state undeniably transforms.", "isCorrect": true, "rationale": "The 'paradoxbox' states: 'If removing one grain from a heap still leaves a heap, and we repeat this process until a single grain remains, at what point did it stop being a heap? If no single removal makes the difference, how can the heap ever disappear — and yet it does?' This perfectly captures the essence of incremental change leading to a definite, yet boundary-less, transformation."}, {"text": "The psychological illusion that leads us to believe in heaps.", "isCorrect": false, "rationale": "The text confirms that 'heaps exist' and the problem is logical, not merely a psychological illusion."}, {"text": "The idea that identity is preserved despite minor physical alterations over time.", "isCorrect": false, "rationale": "This relates more to the Ship of Theseus, mentioned in the 'Connections' box, which is about identity, whereas the Sorites Paradox is about the boundaries of categories."}], "id": "q09"}, {"question": "Based on the discussion, what is considered a 'vague predicate' in philosophical terms?", "options": [{"text": "A term whose meaning is completely subjective and varies wildly for every individual.", "isCorrect": false, "rationale": "While some vague terms have subjective elements, the core definition is about having 'borderline cases' where application is neither clearly correct nor incorrect, not necessarily complete individual variance."}, {"text": "A term that refers to an abstract concept rather than a concrete object.", "isCorrect": false, "rationale": "Many abstract concepts are precise, and many concrete terms (like 'heap' or 'tall') are vague. The distinction is not between abstract and concrete."}, {"text": "A term that admits 'borderline cases' where its application is neither clearly correct nor clearly incorrect.", "isCorrect": true, "rationale": "The text explicitly defines vague predicates as those that 'admit borderline cases where applying the term seems neither clearly correct nor clearly incorrect.'"}, {"text": "A term that has multiple distinct definitions depending on its grammatical usage.", "isCorrect": false, "rationale": "This describes lexical ambiguity, not vagueness. Vagueness relates to the fuzziness of a single concept's boundaries, not multiple distinct meanings."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
