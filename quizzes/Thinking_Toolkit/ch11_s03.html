    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the initial moral conclusion drawn from the hypothetical Drowning Child scenario presented in the text?", "options": [{"text": "It's acceptable to prioritize personal belongings and appointments over a child's life if the cost is high.", "isCorrect": false, "rationale": "The text states that 'No pair of shoes and no meeting is worth a child's life,' making this option incorrect. Anyone who kept walking would be 'morally monstrous.'"}, {"text": "Saving the child is an obvious moral imperative, regardless of minor personal inconvenience like ruined shoes or being late.", "isCorrect": true, "rationale": "The text explicitly states, 'The answer is obviously yes. No pair of shoes and no meeting is worth a child's life. Anyone who kept walking would be regarded as morally monstrous. This is not a close call.'"}, {"text": "The decision to save the child is a close call that depends on the monetary value of the shoes.", "isCorrect": false, "rationale": "The text clarifies that 'This is not a close call,' emphasizing the clear moral obligation over material possessions."}, {"text": "One should only save the child if it causes no inconvenience whatsoever to their daily routine.", "isCorrect": false, "rationale": "The scenario involves ruining 'expensive new shoes' and being 'late for a meeting,' indicating that some inconvenience is expected but overridden by the moral imperative."}], "id": "q01"}, {"question": "Which statement best summarizes Peter Singer's core ethical principle as paraphrased from his 1972 paper?", "options": [{"text": "We are only obligated to help those in our immediate vicinity whom we can directly see suffering.", "isCorrect": false, "rationale": "Singer explicitly argues that 'Distance does not change the moral calculus,' challenging the idea that proximity limits obligation."}, {"text": "If it is in our power to prevent something very bad from happening, without thereby sacrificing anything of comparable moral importance, we ought to do it.", "isCorrect": true, "rationale": "This statement is a direct paraphrase of Singer's central argument provided in the text, forming the foundation of his demanding conclusion."}, {"text": "Moral obligations are primarily determined by our emotional responses and feelings towards suffering individuals.", "isCorrect": false, "rationale": "Singer acknowledges psychological differences in feelings but argues they are not 'morally relevant,' suggesting emotions don't dictate obligation."}, {"text": "Charitable giving is a supererogatory act, admirable but not morally required.", "isCorrect": false, "rationale": "Singer's argument is that if one would save the drowning child, they are 'logically committed to a much more demanding conclusion,' implying a moral requirement, not just an admirable act."}], "id": "q02"}, {"question": "According to Singer's argument, why does geographical distance between an individual and a suffering child not alter one's moral obligation to help?", "options": [{"text": "Because modern communication technology makes everyone feel equally close to distant suffering.", "isCorrect": false, "rationale": "The text notes that people *feel* less obligated to distant children, even with modern communication, and Singer's argument is based on moral principle, not emotional response."}, {"text": "Because the severity of the suffering, such as death, remains the same regardless of the victim's location.", "isCorrect": true, "rationale": "The text states, 'The child dying of malaria in a distant country is just as dead as the child drowning at your feet,' highlighting that the moral gravity of the harm is unchanged by distance."}, {"text": "Because international laws and treaties dictate universal moral responsibilities to all children globally.", "isCorrect": false, "rationale": "The argument presented by Singer is philosophical and ethical, not based on legal frameworks."}, {"text": "Because identifying specific victims is now easier in distant countries due to global media coverage.", "isCorrect": false, "rationale": "While media might help, the text identifies 'identifiability' as a *psychological* factor that makes people *feel* differently, not a moral justification for distance being irrelevant."}], "id": "q03"}, {"question": "Which of the following is presented in the text as a *psychological* reason why people might feel less obligated to help a distant dying child compared to a nearby drowning child?", "options": [{"text": "The belief that distant children are inherently less valuable or deserving of aid.", "isCorrect": false, "rationale": "The text does not suggest people hold this morally abhorrent belief. Instead, it focuses on psychological mechanisms that influence feelings of obligation."}, {"text": "The 'identifiable victim effect,' where individuals respond more strongly to specific, visible individuals than to statistics.", "isCorrect": true, "rationale": "The text explicitly lists 'Identifiability. The drowning child is a specific, visible individual. The distant child is a statistic. We respond more strongly to identified victims — a phenomenon psychologists call the identifiable victim effect.'"}, {"text": "A strong, conscious moral principle that prioritizes local community welfare above all else.", "isCorrect": false, "rationale": "The text mentions 'evolved psychology' for small communities but frames this as a limit of intuition, not a justifiable moral principle endorsed by Singer in this context."}, {"text": "The certainty that international aid organizations are fully capable of handling all global suffering without individual contributions.", "isCorrect": false, "rationale": "The text lists 'uncertainty' about whether donated money will reach the right people and be used effectively as a psychological factor, not certainty of success."}], "id": "q04"}, {"question": "How does Singer respond to the psychological differences (like the identifiable victim effect or diffusion of responsibility) that explain why people *feel* less obligated to distant children?", "options": [{"text": "He argues that these psychological factors are valid moral justifications for different obligations based on proximity.", "isCorrect": false, "rationale": "Singer explicitly states that 'none of them is morally relevant' and that 'The fact that we feel less obligated to the distant child does not mean we are less obligated.'"}, {"text": "He acknowledges them as explanations for human behavior but contends they do not diminish the moral obligation itself.", "isCorrect": true, "rationale": "Singer acknowledges these differences but argues they are not 'morally relevant.' He sees them as reflecting 'the limits of our evolved psychology,' not as excuses for inaction or reduced moral duty."}, {"text": "He suggests that individuals should entirely ignore their feelings when making moral decisions.", "isCorrect": false, "rationale": "While he critiques the moral relevance of feelings, he doesn't suggest ignoring them entirely, but rather understanding their origin and not letting them dictate moral principle."}, {"text": "He believes these differences are simply innate and unchangeable aspects of human nature, thus excusing inaction.", "isCorrect": false, "rationale": "Singer attributes them to 'evolved psychology' but does not use this to excuse inaction; rather, he argues our intuitions need to 'catch up' with modern realities."}], "id": "q05"}, {"question": "If a person were to follow Singer's original 1972 argument to its 'logical conclusion,' what would be the practical implication for their personal finances?", "options": [{"text": "They should donate a fixed, small percentage of their income to charity, such as one percent.", "isCorrect": false, "rationale": "This describes Singer's *moderated* position from 'The Life You Can Save,' not the 'logical conclusion' of his original, more demanding argument."}, {"text": "They would be morally required to donate the vast majority of their disposable income until their own suffering became comparable to those they help.", "isCorrect": true, "rationale": "The text states that the logical conclusion is 'extremely demanding' and implies for a typical middle-class person, 'donating the vast majority of one's income,' until 'the marginal cost to you equals the marginal benefit to others.'"}, {"text": "They would only need to donate if it caused them no personal inconvenience or financial strain at all.", "isCorrect": false, "rationale": "Singer's principle involves preventing bad things 'without thereby sacrificing anything of comparable moral importance,' which allows for significant personal sacrifice, unlike this option."}, {"text": "They should prioritize investing their money to generate more wealth for future charitable giving, rather than immediate donations.", "isCorrect": false, "rationale": "The text focuses on direct giving to prevent immediate suffering, not on wealth accumulation strategies for future philanthropy."}], "id": "q06"}, {"question": "How does Singer's later, moderated position in 'The Life You Can Save' (2009) differ from the logical conclusion of his original 1972 argument regarding how much one should give?", "options": [{"text": "The moderated position suggests no giving is strictly required, only strongly encouraged as a noble act.", "isCorrect": false, "rationale": "Singer still argues for a moral obligation to give, but modifies the *practical recommendation*, not the core principle."}, {"text": "The moderated position proposes a more achievable, sliding scale of giving based on income, while the original conclusion was extremely demanding.", "isCorrect": true, "rationale": "The text explicitly states Singer 'has moderated this position... arguing... for a more achievable standard: a sliding scale of giving based on income,' in contrast to the original, 'extremely demanding' logical conclusion."}, {"text": "The moderated position emphasizes the importance of giving exclusively to local charities rather than international ones.", "isCorrect": false, "rationale": "The focus remains on helping those in need globally, not restricting it to local causes."}, {"text": "The moderated position entirely rejects the concept of a moral obligation to distant strangers.", "isCorrect": false, "rationale": "The text clarifies that 'The philosophical principle remains demanding,' even if the 'practical recommendation is calibrated to what people might actually do.' The obligation isn't rejected."}], "id": "q07"}, {"question": "The text states that Singer's drowning child argument 'reveals' a genuine tension in moral theory. What is this tension specifically between?", "options": [{"text": "Individual rights versus collective duties to the community.", "isCorrect": false, "rationale": "While related, the text specifies a different, more precise tension."}, {"text": "Impartiality (treating everyone's interests equally) and partiality (giving special weight to those closest to you).", "isCorrect": true, "rationale": "The text explicitly states this tension: 'between impartiality (treating everyone's interests equally) and partiality (giving special weight to those closest to you).'"}, {"text": "Ethical egoism, which prioritizes self-interest, and altruism, which prioritizes others' well-being.", "isCorrect": false, "rationale": "These are related concepts, but the text specifically defines the tension using impartiality and partiality."}, {"text": "Consequentialism, which focuses on outcomes, and deontology, which focuses on duties and rules.", "isCorrect": false, "rationale": "These are major ethical frameworks, but not the specific tension identified by the text in relation to Singer's argument."}], "id": "q08"}, {"question": "Beyond his arguments on global poverty, Peter Singer is noted for his significant contributions to which other major ethical movement, as mentioned in the text?", "options": [{"text": "Environmental conservation and climate change activism.", "isCorrect": false, "rationale": "While he may have views on this, the text highlights a different specific movement as his other major contribution."}, {"text": "The modern animal rights movement, particularly through his work 'Animal Liberation'.", "isCorrect": true, "rationale": "The 'personbox' states, 'His work on animal ethics, as presented in Animal Liberation (1975), helped launch the modern animal rights movement.'"}, {"text": "International human rights law and justice.", "isCorrect": false, "rationale": "The text mentions his work on animal ethics and global poverty, not specifically human rights law."}, {"text": "The development of business ethics and corporate social responsibility.", "isCorrect": false, "rationale": "This is not listed as one of his primary areas of influence in the text."}], "id": "q09"}, {"question": "Considering the 'keyconcept' box, what is the crucial distinction Singer makes regarding the psychological differences between helping a nearby child versus a distant child?", "options": [{"text": "These differences justify why most people do not help distant children, making inaction morally acceptable.", "isCorrect": false, "rationale": "The key concept states they 'may not justify different obligations,' directly contradicting this option."}, {"text": "These differences explain why we *feel* different obligations, but they do not necessarily *justify* different obligations morally.", "isCorrect": true, "rationale": "The key concept explicitly states: 'The psychological differences between nearby and distant suffering — visibility, certainty, diffusion of responsibility — explain why we feel different obligations, but they may not justify different obligations.'"}, {"text": "These differences demonstrate the superiority of intuitive moral responses when dealing with immediate, tangible suffering.", "isCorrect": false, "rationale": "Singer argues that our 'evolved psychology' leads to these intuitions, but that these intuitions have not 'caught up' with a globalized world, implying they are not always superior."}, {"text": "These differences are entirely irrelevant for both our feelings and our moral obligations.", "isCorrect": false, "rationale": "Singer acknowledges they affect our *feelings* ('explain why we feel different obligations'), so they are not entirely irrelevant."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
