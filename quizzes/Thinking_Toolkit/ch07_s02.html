<script>
var QUESTIONS = [{"question": "What is the primary finding of the Peak-End Rule, as identified by Daniel Kahneman and collaborators?", "options": [{"text": "People accurately recall the total sum of pleasure and pain from past events.", "isCorrect": false, "rationale": "The text states that we are 'not rational accountants of experience,' indicating that total sum is not accurately recalled."}, {"text": "Past experiences are judged primarily by their most intense moment and how they concluded.", "isCorrect": true, "rationale": "This option directly states the core definition of the Peak-End Rule: 'we judge past experiences not by their total or average quality, but by how they felt at their most intense moment (the peak) and how they felt at the end.'"}, {"text": "The duration of an experience is the most critical factor in how it is remembered.", "isCorrect": false, "rationale": "This contradicts the related phenomenon of duration neglect, which states that 'the length of an experience has remarkably little effect on how it is remembered.'"}, {"text": "Memories are systematically distorted to recall only positive events.", "isCorrect": false, "rationale": "While memories are edited, the text does not state they only recall positive events; a bad ending can make an overall good experience remembered as bad."}]}, {"question": "In the cold-water experiment described, why did a majority of subjects prefer to repeat the longer trial, which involved more total discomfort?", "options": [{"text": "They were unconsciously biased towards experiences that offered a greater variety of sensations.", "isCorrect": false, "rationale": "The text does not attribute the preference to a desire for variety, but specifically to the nature of the ending."}, {"text": "The memory of the slightly less painful ending disproportionately influenced their overall judgment.", "isCorrect": true, "rationale": "The text explains that the longer trial, despite more total pain, 'ended slightly better,' and this ending is what stuck, making subjects prefer to repeat it."}, {"text": "The subjects correctly calculated that the additional 30 seconds of discomfort was negligible.", "isCorrect": false, "rationale": "The text explicitly states this result 'violates what we might call common-sense rationality' and that the longer trial was 'objectively worse,' indicating no rational calculation of negligible pain."}, {"text": "Their experiencing self overrode the preferences of their remembering self.", "isCorrect": false, "rationale": "The opposite is true: the remembering self (which preferred the longer trial) overrode the suffering experienced by the experiencing self."}]}, {"question": "Daniel Kahneman distinguishes between the 'experiencing self' and the 'remembering self.' Which statement accurately describes their potential interaction regarding an unpleasant event?", "options": [{"text": "The experiencing self primarily guides future decisions, while the remembering self records factual data.", "isCorrect": false, "rationale": "The text implies the remembering self often guides decisions, and it constructs a 'story,' which isn't always purely factual."}, {"text": "The remembering self may prefer an experience that the experiencing self found more painful, due to the nature of memory.", "isCorrect": true, "rationale": "The text explicitly states this: 'The experiencing self suffered more during the longer cold-water trial. The remembering self preferred it.'"}, {"text": "The experiencing self focuses on peaks, while the remembering self focuses solely on the ending.", "isCorrect": false, "rationale": "The 'remembering self' judges by both the peak and the end, not just the ending. The 'experiencing self' lives through all moments."}, {"text": "Both selves consistently agree on the overall quality and duration of past experiences.", "isCorrect": false, "rationale": "The text states that these two selves 'can disagree sharply' and 'sometimes want different things.'"}]}, {"question": "Consider a family vacation where the first week was filled with exciting adventures, but the second week was marred by continuous rain and a lost passport on the last day. According to the Peak-End Rule, how is this vacation most likely to be remembered?", "options": [{"text": "As an average vacation, balancing the good and bad weeks.", "isCorrect": false, "rationale": "The Peak-End Rule states we don't judge by total or average quality, but by peak and end moments."}, {"text": "As a primarily negative vacation due to the miserable ending.", "isCorrect": true, "rationale": "Similar to the food poisoning example, a miserable ending 'sticks' and can disproportionately spoil the memory of an otherwise good experience, despite the exciting adventures earlier."}, {"text": "As a fantastic vacation, because the initial exciting adventures served as the peak.", "isCorrect": false, "rationale": "While the peak is important, the rule emphasizes that 'the ending is what sticks' and can 'spoil an excellent one,' especially if it's very negative."}, {"text": "The memory will be highly subjective and vary greatly among family members, making prediction impossible.", "isCorrect": false, "rationale": "The Peak-End Rule identifies a 'systematic' divergence in remembered experience, suggesting a predictable pattern for 'most people'."}]}, {"question": "Duration neglect suggests that for two painful medical procedures with similar peak pain and endings, the one lasting five minutes versus twenty minutes will be remembered how?", "options": [{"text": "The twenty-minute procedure will be remembered as significantly worse due to its greater length.", "isCorrect": false, "rationale": "This contradicts duration neglect, which states 'the length of an experience has remarkably little effect on how it is remembered.'"}, {"text": "Both procedures will be remembered as roughly equally unpleasant.", "isCorrect": true, "rationale": "The text explicitly states: 'A painful medical procedure that lasts five minutes and one that lasts twenty minutes are remembered as roughly equally unpleasant, provided their peaks and endings are similar.'"}, {"text": "The five-minute procedure will be remembered as worse, as its pain was more concentrated.", "isCorrect": false, "rationale": "The text offers no support for this claim; the focus is on peak and end similarity, not concentration of pain."}, {"text": "The duration will only matter if the patient was explicitly timing the procedures.", "isCorrect": false, "rationale": "Duration neglect describes an automatic process of memory, not something that requires conscious timing."}]}, {"question": "The text states that 'we are not rational accountants of experience. We are editors.' This metaphor primarily highlights which aspect of human memory?", "options": [{"text": "Our ability to meticulously track every detail and duration of an experience.", "isCorrect": false, "rationale": "This contradicts 'duration neglect' and the idea that we are 'not rational accountants,' which suggests we don't track all details."}, {"text": "The tendency to selectively focus on and amplify specific vivid moments, especially the peak and end, when recalling an event.", "isCorrect": true, "rationale": "The text explains 'editors' means 'We compress hours, days, and years into a handful of vivid moments, and those moments—especially the peak and the ending—determine how we feel about the whole experience.'"}, {"text": "Our conscious effort to falsify memories to make them more palatable.", "isCorrect": false, "rationale": "While memory can be inaccurate, the 'editors' metaphor in this context refers to selective attention and compression, not necessarily intentional falsification."}, {"text": "The influence of external sources on shaping our personal narratives.", "isCorrect": false, "rationale": "The metaphor of 'editors' refers to an internal cognitive process, not external influences on memory."}]}, {"question": "Based on the Peak-End Rule, which strategy would be most effective for a hospital aiming to improve patient satisfaction with potentially uncomfortable medical procedures like colonoscopies?", "options": [{"text": "Significantly reducing the total duration of the procedure, even if it means slightly more intense pain at the start.", "isCorrect": false, "rationale": "Duration neglect indicates reducing total duration isn't the primary factor, and a 'more intense pain at the start' could create a negative peak."}, {"text": "Ensuring the procedure ends with a less painful or more comfortable phase, even if it adds a little time.", "isCorrect": true, "rationale": "The text directly states: 'Doctors have learned that slightly extending a colonoscopy with a less painful final phase improves patients' willingness to return... even though the longer procedure involves more total discomfort.'"}, {"text": "Providing patients with a detailed minute-by-minute breakdown of their experience beforehand.", "isCorrect": false, "rationale": "This approach aligns with 'rational accountants' rather than the 'editors' we are, and wouldn't address how the experience is *remembered*."}, {"text": "Offering a monetary discount for procedures that are particularly long or painful.", "isCorrect": false, "rationale": "While a discount might improve satisfaction for financial reasons, it does not address the psychological mechanism of how the procedure itself is remembered according to the Peak-End Rule."}]}, {"question": "A customer service manager is reviewing call center performance. According to the Peak-End Rule, which scenario would likely lead to the highest customer satisfaction despite a potentially long call?", "options": [{"text": "A call where the customer's issue was resolved quickly, but the agent was rude at the very end.", "isCorrect": false, "rationale": "A rude ending would likely 'spoil' the overall positive impression, despite quick resolution."}, {"text": "A call with a long hold time, but the agent was exceptionally empathetic and resolved the issue generously at the end.", "isCorrect": true, "rationale": "The text mentions that 'resolving a complaint generously at the end of a call matters more than minimizing hold time,' directly applying the Peak-End Rule and duration neglect."}, {"text": "A call with no hold time, but the customer's problem remained partially unresolved.", "isCorrect": false, "rationale": "An unresolved ending would be a bad ending, regardless of minimal hold time."}, {"text": "A call where the agent consistently maintained a polite tone throughout, regardless of the outcome.", "isCorrect": false, "rationale": "While politeness is good, the rule emphasizes the disproportionate impact of the *peak* and *ending* resolution over consistent, average quality."}]}, {"question": "The text states, 'a good ending can redeem a mediocre experience, and a bad ending can spoil an excellent one.' This highlights the disproportionate impact of the ending due to:", "options": [{"text": "The brain's natural tendency to remember only the most recent information.", "isCorrect": false, "rationale": "While recency plays a role, the Peak-End Rule specifically highlights the *weight* given to the ending in forming an overall judgment, not merely remembering it."}, {"text": "The remembering self's reliance on the final moments to construct the overall narrative of an event.", "isCorrect": true, "rationale": "The 'remembering self' constructs the story, and the ending is a crucial part of that constructed narrative, disproportionately influencing the memory."}, {"text": "The experiencing self's preference for closure and resolution.", "isCorrect": false, "rationale": "It is the *remembering* self that forms the retrospective judgment of the overall experience, not the experiencing self which lives moment-by-moment."}, {"text": "The conscious decision to overlook earlier discomfort in favor of a positive conclusion.", "isCorrect": false, "rationale": "The text implies this is a systematic, often unconscious, cognitive bias, not a deliberate 'conscious decision' to overlook discomfort."}]}, {"question": "What is the most crucial practical lesson derived from the Peak-End Rule and duration neglect for individuals or organizations managing experiences?", "options": [{"text": "Always strive to make experiences as short as possible to minimize perceived discomfort.", "isCorrect": false, "rationale": "Duration neglect means length is largely irrelevant if peak and end are similar; a short experience with a bad end is still remembered poorly."}, {"text": "Focus entirely on creating an incredibly intense 'peak' moment, as this is the only thing people remember.", "isCorrect": false, "rationale": "The rule emphasizes both the 'peak' AND the 'end,' not just the peak alone. A bad ending can still spoil an experience even with a good peak."}, {"text": "Understand that people do not recall the total sum of an experience, so managing the most intense moment and the conclusion is paramount.", "isCorrect": true, "rationale": "This synthesizes the core lesson: we are 'editors,' not 'rational accountants,' and therefore strategically managing the 'peak' and the 'ending' is key to shaping remembered experience."}, {"text": "Encourage individuals to consciously rationalize their experiences to gain a more objective perspective.", "isCorrect": false, "rationale": "The text highlights that people are *not* rational accountants and that the remembering self often diverges from objective experience, implying this conscious rationalization is not how memory naturally works according to the rule."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
