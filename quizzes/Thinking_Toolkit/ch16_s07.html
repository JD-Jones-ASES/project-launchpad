<script>
var QUESTIONS = [{"question": "What is the fundamental difference between winning a traditional beauty contest (judging objective beauty) and winning the Keynesian beauty contest as described in the text?", "options": [{"text": "In a traditional contest, the prize goes to the most popular choice, whereas in the Keynesian contest, it goes to the choice of experts.", "isCorrect": false, "rationale": "The text does not suggest traditional contests are based on popularity or that the Keynesian contest relies on expert choice; rather, it highlights the difference in criteria for selection."}, {"text": "A traditional contest rewards subjective preference, while the Keynesian contest rewards an objective assessment of beauty.", "isCorrect": false, "rationale": "This statement is the opposite of what the text implies. The traditional contest might seem to reward objective beauty (though still subjective in practice), while the Keynesian contest explicitly moves away from personal preference or objective assessment."}, {"text": "The traditional contest rewards choosing objectively attractive faces, while the Keynesian contest rewards predicting the average selection of all other participants.", "isCorrect": true, "rationale": "The text clearly states the prize 'goes not to the person who picks the objectively most attractive faces, but to the person whose selections most closely match the average selections of all other participants.'"}, {"text": "The traditional contest focuses on individual artistic merit, while the Keynesian contest is a game of chance.", "isCorrect": false, "rationale": "The Keynesian beauty contest is a strategic game based on predicting others' behavior, not a game of chance, nor is a traditional beauty contest primarily about individual artistic merit."}], "id": "q01"}, {"question": "In the context of the Keynesian beauty contest, what is implied by the phrase 'an infinite regress of expectations about expectations'?", "options": [{"text": "Participants must continuously refine their personal aesthetic preferences.", "isCorrect": false, "rationale": "The infinite regress moves away from personal preferences, focusing instead on anticipating others' thoughts, not refining one's own."}, {"text": "The ideal strategy involves choosing faces that are universally recognized as beautiful, regardless of other participants' opinions.", "isCorrect": false, "rationale": "This contradicts the core premise that one should not pick faces based on objective beauty but on what others will pick."}, {"text": "Success requires anticipating what others think about what others think, leading to a strategy detached from intrinsic value.", "isCorrect": true, "rationale": "The text explains this regress: 'you need to anticipate what others think others think others think... in a potentially infinite regress of expectations about expectations,' leading to detachment from the actual prettiest faces."}, {"text": "The game is inherently unwinnable due to the unpredictable nature of human psychology.", "isCorrect": false, "rationale": "While complex, the analogy describes a strategic environment where a winning strategy exists, albeit one based on recursive expectations, not pure unpredictability."}], "id": "q02"}, {"question": "According to Keynes's analogy, why might an investor rationally purchase a stock that appears overvalued by traditional financial metrics such as revenue or earnings?", "options": [{"text": "They believe the company's underlying fundamentals are stronger than current reports indicate, providing a hidden value.", "isCorrect": false, "rationale": "The text explicitly states the stock 'can be overvalued by every measure — revenue, earnings, growth prospects' and still be a rational purchase, indicating the investor is not relying on hidden fundamental strength."}, {"text": "They anticipate that other investors will continue to buy the stock, pushing its price even higher, allowing for a profitable resale.", "isCorrect": true, "rationale": "The text explains this directly: 'A stock can be overvalued... and still be a rational purchase if you believe other investors will push its price even higher. You are not buying the company; you are buying a prediction about other people's predictions.'"}, {"text": "They prioritize long-term dividend yield over immediate capital gains, making current price less relevant.", "isCorrect": false, "rationale": "The context is about speculative behavior driving prices higher for short-term gains, not long-term income from dividends."}, {"text": "They are using a contrarian strategy, buying when others are selling to capitalize on future market corrections.", "isCorrect": false, "rationale": "This scenario describes buying an *overvalued* stock in anticipation of further price increases due to others' actions, which is not a contrarian strategy but rather playing into the herd mentality described."}], "id": "q03"}, {"question": "The text states that when prices are driven by expectations about expectations, 'the anchor dissolves.' What 'anchor' is primarily being referred to, and why does its dissolution lead to instability?", "options": [{"text": "The anchor of government regulation; its absence leads to unchecked speculative trading.", "isCorrect": false, "rationale": "The text focuses on economic principles and investor behavior, not the role of government regulation as the primary anchor for prices."}, {"text": "The anchor of historical price data; its irrelevance makes future price predictions impossible.", "isCorrect": false, "rationale": "While historical data might become less reliable, the core 'anchor' discussed is related to intrinsic value, not just past prices."}, {"text": "The anchor of fundamental value; its detachment from prices allows for extended periods of overvaluation, risking sudden crashes.", "isCorrect": true, "rationale": "The text explicitly states: 'When prices are driven by fundamental value, there is an anchor: eventually, a company's earnings justify (or fail to justify) its stock price. But when prices are driven by expectations about expectations, the anchor dissolves.'"}, {"text": "The anchor of market sentiment; its volatility causes unpredictable shifts in investor confidence.", "isCorrect": false, "rationale": "Market sentiment is part of the problem (expectations about expectations), not the 'anchor' that dissolves. The dissolved anchor is the underlying, measurable value."}], "id": "q04"}, {"question": "Which of the following situations is LEAST likely to be described by the Keynesian beauty contest analogy?", "options": [{"text": "A fashion designer predicting what clothing styles consumers will find most desirable next season.", "isCorrect": false, "rationale": "The text lists fashion trends as a direct example where 'Designers predict what consumers will want, but consumers buy what they think others will find stylish,' fitting the analogy."}, {"text": "A social media content creator optimizing their posts for maximum engagement based on what algorithms and audiences reward.", "isCorrect": false, "rationale": "The text uses 'Social media virality' as an example, stating creators 'optimize not for what they think is good but for what they think the algorithm and audience will reward,' which is a prediction about others' engagement."}, {"text": "A scientist designing an experiment to objectively measure the melting point of a specific chemical compound.", "isCorrect": true, "rationale": "This scenario seeks an objective, measurable truth independent of human opinion or prediction about others' beliefs, directly contrasting with the Keynesian beauty contest's focus on subjective social dynamics and recursive expectations."}, {"text": "An individual investing in a new cryptocurrency primarily because they observe widespread market hype and believe others will continue to buy it.", "isCorrect": false, "rationale": "The text explicitly mentions 'cryptocurrency speculation' as an example involving 'layers of expectation about what other people expect,' aligning with the analogy."}], "id": "q05"}, {"question": "The 'keyconcept' section states that in competitive prediction environments, the winning strategy is often to predict what others will choose. What is the primary consequence of this strategy on collective behavior?", "options": [{"text": "It strengthens the link between market prices and objective, fundamental value.", "isCorrect": false, "rationale": "The text states the opposite: this strategy 'can detach collective behavior from underlying fundamentals.'"}, {"text": "It leads to a more efficient and rational allocation of resources based on intrinsic qualities.", "isCorrect": false, "rationale": "Efficiency and rationality based on intrinsic qualities are undermined when behavior is driven by expectations about expectations, not fundamentals."}, {"text": "It creates recursive layers of expectation, leading to collective behavior that can detach from underlying fundamentals.", "isCorrect": true, "rationale": "The 'keyconcept' section directly states this: 'This creates recursive layers of expectation — beliefs about beliefs — that can detach collective behavior from underlying fundamentals.'"}, {"text": "It ensures market stability by aligning individual predictions with expert forecasts and objective data.", "isCorrect": false, "rationale": "This behavior creates instability, as prices can detach from fundamentals, and it's driven by social dynamics, not necessarily expert forecasts or objective data."}], "id": "q06"}, {"question": "During the dot-com bubble of the late 1990s, many investors bought technology stocks knowing they were overvalued. This behavior exemplifies the Keynesian beauty contest primarily because:", "options": [{"text": "Investors had access to superior information about the fundamental, long-term earnings potential of these companies.", "isCorrect": false, "rationale": "The text notes investors 'acknowledged that technology stocks were overvalued,' indicating they were not relying on superior fundamental information but rather on market dynamics."}, {"text": "Their investment decisions were based on the belief that other investors would continue to buy, driving prices even higher, irrespective of underlying value.", "isCorrect": true, "rationale": "The 'realworld' example explicitly states: 'many investors acknowledged that technology stocks were overvalued but continued buying them, reasoning that prices would continue to rise. They were playing the beauty contest, not valuing companies.'"}, {"text": "Government policies at the time encouraged speculative investment in the technology sector through tax incentives.", "isCorrect": false, "rationale": "The text does not mention government policies influencing this behavior but focuses on the speculative actions of investors themselves."}, {"text": "They were implementing a 'buy low, sell high' strategy, anticipating a correction after the bubble burst.", "isCorrect": false, "rationale": "Buying overvalued stocks in anticipation of further price increases is not a 'buy low, sell high' strategy; it's a speculative strategy betting on continued upward momentum."}], "id": "q07"}, {"question": "When choosing which college to attend, if a student primarily considers which institution their peers and family will approve of, rather than their own academic interests or ideal learning environment, they are primarily engaging in a dynamic similar to the Keynesian beauty contest by:", "options": [{"text": "Prioritizing objective academic ranking and prestige over personal fit.", "isCorrect": false, "rationale": "While academic ranking can be a factor, the question specifies 'peers and family will approve of,' which points to social approval rather than objective academic metrics alone."}, {"text": "Seeking an anchor in the fundamental educational value of the institution.", "isCorrect": false, "rationale": "Focusing on what others will approve of means detaching from the 'fundamental' value (academic interests, learning environment) for oneself, which is a characteristic of the beauty contest."}, {"text": "Basing their decision on expectations about others' expectations and approvals, rather than their own intrinsic preferences.", "isCorrect": true, "rationale": "The 'thinkaboutit' section directly asks this: 'to what extent are you choosing based on your own preferences — and to what extent are you predicting what others will approve of?' This aligns with the recursive expectation characteristic of the beauty contest."}, {"text": "Avoiding the speculative and unstable behavior seen in financial markets by making a more conservative choice.", "isCorrect": false, "rationale": "The scenario describes a behavior pattern, not necessarily a conservative choice. The analogy applies to the *mechanism* of decision-making, not its outcome as stable or unstable."}], "id": "q08"}, {"question": "The 'connections' section mentions 'The Price Signal as Information' as a contrasting view to the Keynesian beauty contest. How does the Keynesian beauty contest concept fundamentally differ from 'The Price Signal as Information'?", "options": [{"text": "The beauty contest suggests prices reflect objective fundamental value, while price signals are primarily about subjective speculation.", "isCorrect": false, "rationale": "This is incorrect; the beauty contest explicitly describes prices detaching from fundamental value due to speculation."}, {"text": "The beauty contest views prices as reflecting beliefs about other people's beliefs, while price signals suggest prices convey genuine and objective information about an asset's underlying value.", "isCorrect": true, "rationale": "The text states the beauty contest mechanism means prices reflect 'what investors believe other investors believe the stock is worth,' detaching from underlying value. 'The Price Signal as Information' is presented as a 'contrasting view of prices as carriers of genuine information,' implying objective value."}, {"text": "The beauty contest applies only to financial markets, whereas the concept of price signals is broader, encompassing all economic transactions.", "isCorrect": false, "rationale": "The text clearly states the beauty contest 'is not limited to stock markets' and applies to fashion, viral content, etc., making this statement incorrect."}, {"text": "The beauty contest emphasizes individual irrationality, while price signals highlight collective rationality.", "isCorrect": false, "rationale": "The beauty contest describes a form of *rational* behavior within a specific context ('rational purchase if you believe other investors will push its price even higher'), not necessarily irrationality. The contrast is about the *source* of the price, not rationality versus irrationality."}], "id": "q09"}, {"question": "The text states that in a Keynesian beauty contest scenario, 'when it stops working, prices crash.' What specific reasoning 'stops working' that typically leads to a price crash?", "options": [{"text": "The belief that the fundamental value of the asset will eventually catch up to its inflated price.", "isCorrect": false, "rationale": "The core of the beauty contest is that fundamental value is *ignored* for extended periods; investors are not waiting for fundamentals to catch up but for others to keep pushing the price up."}, {"text": "The expectation that interest rates will remain low indefinitely, supporting high valuations.", "isCorrect": false, "rationale": "While interest rates can influence asset prices, the text attributes the crash directly to the failure of the beauty contest logic, not specifically to changes in interest rate expectations."}, {"text": "The shared belief among participants that 'I know it's overpriced, but I think someone else will pay even more.'", "isCorrect": true, "rationale": "The text directly states: 'This reasoning works — until it doesn't. And when it stops working, prices crash,' referring to the 'every buyer is reasoning, “I know it's overpriced, but I think someone else will pay even more”' mindset."}, {"text": "The algorithm's ability to accurately predict audience engagement for viral content, leading to market confusion.", "isCorrect": false, "rationale": "This refers to a specific real-world example but is not the general 'reasoning' that stops working across all applications of the Keynesian beauty contest described as leading to a crash."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
