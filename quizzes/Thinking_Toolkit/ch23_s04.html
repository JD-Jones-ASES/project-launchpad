    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary objective of implementing a pre-mortem analysis in project planning?", "options": [{"text": "To establish a chronological record of project milestones after completion.", "isCorrect": false, "rationale": "A pre-mortem is conducted before project execution, not after completion, and its main goal is risk identification, not milestone recording."}, {"text": "To overcome optimism bias and identify potential risks that conventional methods might miss.", "isCorrect": true, "rationale": "The text explicitly states that Gary Klein developed the pre-mortem to overcome 'the optimism bias that distorts project planning and risk assessment' and that it 'surfaced risks that standard risk assessment missed.'"}, {"text": "To allocate resources more efficiently by identifying redundant tasks during project execution.", "isCorrect": false, "rationale": "While efficient resource allocation is a project goal, the pre-mortem's primary focus is on proactively identifying potential failure modes before execution, not optimizing tasks during the project."}, {"text": "To retrospectively evaluate the performance of team members on past projects.", "isCorrect": false, "rationale": "This describes a post-mortem or performance review, not a pre-mortem, which is forward-looking and focuses on project failure scenarios."}]}, {"question": "How does the pre-mortem technique effectively change group dynamics compared to a typical planning meeting asking for problems?", "options": [{"text": "It forces team members to publicly defend their individual sections of the plan.", "isCorrect": false, "rationale": "The pre-mortem encourages shared identification of potential failures, not individual defense of plan sections. Independent thinking is followed by sharing, but the goal is collective risk assessment."}, {"text": "It reframes criticism of the plan as a creative exercise in explaining a past failure, reducing social pressure.", "isCorrect": true, "rationale": "The text states it 'changes the social dynamics by changing the frame. Instead of asking people to criticize the plan (socially risky), it asks them to explain a failure that has already occurred (a creative exercise). This puts everyone on the same team.'"}, {"text": "It primarily empowers the project leader to dictate potential failure scenarios to the team.", "isCorrect": false, "rationale": "The pre-mortem empowers team members to independently identify failure reasons, contrasting with a scenario where the leader dictates. It aims to surface hidden risks."}, {"text": "It encourages team members to compete in identifying the most obscure potential problems.", "isCorrect": false, "rationale": "While it increases the quantity and quality of identified risks, the goal is collaborative risk identification for plan improvement, not competitive problem-finding."}]}, {"question": "Which cognitive ability does the pre-mortem technique intentionally 'harness' to improve risk identification?", "options": [{"text": "Confirmation bias, by reinforcing existing beliefs about project success.", "isCorrect": false, "rationale": "Confirmation bias would reinforce optimism, which the pre-mortem aims to counteract. It does not reinforce beliefs about success but rather challenges them by imagining failure."}, {"text": "The planning fallacy, by making project timelines more realistic.", "isCorrect": false, "rationale": "The pre-mortem 'counteracts the optimism bias that makes planning so dangerous,' which includes the planning fallacy, but it doesn't harness the fallacy itself. It counteracts it by making people think about potential delays and issues."}, {"text": "Hindsight bias, by redirecting our skill at constructing plausible narratives toward future failures.", "isCorrect": true, "rationale": "The text explicitly states, 'The technique works because it harnesses the same cognitive abilities that produce hindsight bias — our skill at constructing plausible narratives for known outcomes — and redirects them toward the future.'"}, {"text": "Anchoring bias, by setting an initial, low expectation for project success.", "isCorrect": false, "rationale": "Anchoring bias relates to relying too heavily on an initial piece of information. While it may influence perception, the pre-mortem specifically harnesses the narrative-building aspect of hindsight bias, not anchoring."}]}, {"question": "A project team has just finished developing a comprehensive plan for a new product launch. According to the pre-mortem procedure, what is the immediate next step?", "options": [{"text": "Begin executing the plan to gather initial performance data.", "isCorrect": false, "rationale": "The pre-mortem is conducted 'before execution begins' to identify risks that can inform modifications to the plan before launch."}, {"text": "Ask each team member to independently imagine the project has failed badly and write down reasons.", "isCorrect": true, "rationale": "The procedure specifies: 'Gather the project team after the plan has been developed but before execution begins. Ask each member to imagine that the project has been completed and has failed badly. Each member independently writes down the reasons for the failure.'"}, {"text": "Hold a group discussion to brainstorm potential challenges and solutions.", "isCorrect": false, "rationale": "Group discussion comes later. The procedure emphasizes 'No discussion yet — independent thinking prevents groupthink' during the initial writing phase."}, {"text": "Present the plan to stakeholders for final approval and feedback.", "isCorrect": false, "rationale": "While stakeholder approval is part of project management, it's not the immediate next step in the pre-mortem process, which focuses on internal risk identification and plan modification first."}]}, {"question": "Why does the pre-mortem procedure specifically require team members to *independently* write down reasons for failure before any group discussion?", "options": [{"text": "To assess individual team members' creativity and critical thinking skills.", "isCorrect": false, "rationale": "While these skills are involved, the primary reason for independent work is not individual assessment but rather to improve the quality of risk identification by avoiding groupthink."}, {"text": "To prevent groupthink and ensure a wider, more diverse range of potential failure modes are captured.", "isCorrect": true, "rationale": "The text states: 'Each member independently writes down the reasons for the failure. No discussion yet — independent thinking prevents groupthink.' This ensures that initial thoughts are not swayed by others or by social pressure."}, {"text": "To streamline the process by avoiding lengthy debates and disagreements.", "isCorrect": false, "rationale": "While it might make the initial phase more efficient, the core reason is about the quality and breadth of identified risks, not just speed or avoiding debate, which will occur later during review."}, {"text": "To ensure that only the most obvious and surface-level risks are considered first.", "isCorrect": false, "rationale": "The pre-mortem aims to surface 'deeper, more uncomfortable risks' that are often suppressed in typical meetings. Independent thinking helps bring these out."}]}, {"question": "After identifying a comprehensive list of potential failure modes through a pre-mortem, what is the crucial next step for the project team?", "options": [{"text": "Archive the list for future reference and proceed with the original plan.", "isCorrect": false, "rationale": "Simply archiving the list negates the purpose of the pre-mortem, which is to proactively address identified risks. The goal is to improve the plan."}, {"text": "Assign blame to team members responsible for potential failures identified.", "isCorrect": false, "rationale": "The pre-mortem is a forward-looking risk assessment, not a blame assignment exercise. It's about 'figuring out why things went wrong' in an imagined future, not attributing fault to current team members."}, {"text": "Review the list to identify the most plausible and damaging failure modes, then modify the plan to address them.", "isCorrect": true, "rationale": "The procedure concludes with: 'Review the list. Identify the most plausible and most damaging failure modes. Modify the plan to address them.' This ensures the insights gained are acted upon."}, {"text": "Conduct a post-mortem immediately to understand the root causes of the imagined failure.", "isCorrect": false, "rationale": "A post-mortem is done after a real failure. The pre-mortem already involves imagining the failure and its causes. The next step is about plan modification, not a new analysis type."}]}, {"question": "A new startup is about to launch a revolutionary product. The CEO, highly confident, asks the team, 'What could possibly go wrong?' Based on the principles of the pre-mortem, what is a likely outcome of this direct question compared to a pre-mortem exercise?", "options": [{"text": "The team will generate a comprehensive and highly specific list of potential catastrophic failures.", "isCorrect": false, "rationale": "The text states that a team asked 'What could go wrong?' will 'generate a short, generic list,' due to social pressure and the difficulty of predicting failure."}, {"text": "Team members will openly challenge the CEO's optimism and provide frank, critical feedback.", "isCorrect": false, "rationale": "In a typical planning meeting, 'social pressure suppresses dissent' and 'pointing out risks feels unsupportive, pessimistic, even disloyal' if the leader is enthusiastic."}, {"text": "The team will likely produce a short, generic list of risks due to social pressure and the difficulty of predicting future failures.", "isCorrect": true, "rationale": "The text explains: 'A team asked “What could go wrong?” will generate a short, generic list. The same team asked “It went wrong — why?” will generate a long, specific, and uncomfortably realistic list.'"}, {"text": "The CEO's confidence will inspire the team to find innovative solutions to any identified problems.", "isCorrect": false, "rationale": "While inspiration can be positive, the pre-mortem highlights that leader enthusiasm can suppress dissent and prevent deep risk identification, rather than enhance it."}]}, {"question": "The 'Red Team' concept in military planning, as described, serves a similar function to the pre-mortem technique by:", "options": [{"text": "Focusing solely on validating the initial intelligence assessment without challenging it.", "isCorrect": false, "rationale": "The Red Team's role is to 'argue the enemy's case and attack the plan,' which involves challenging, not validating, the initial assessment."}, {"text": "Assigning a group to actively identify ways the plan could fail and the intelligence could be wrong.", "isCorrect": true, "rationale": "The text states, 'a separate team was asked to identify every way the intelligence assessment could be wrong and every way the mission could fail,' directly aligning with this option."}, {"text": "Ensuring strict adherence to established protocols and minimizing deviation from the original strategy.", "isCorrect": false, "rationale": "Both pre-mortem and Red Team exercises aim to identify flaws and prompt plan modifications, which implies a willingness to deviate from the original strategy for improvement."}, {"text": "Primarily serving as a training exercise for new recruits in strategic analysis.", "isCorrect": false, "rationale": "While training might be a secondary benefit, the primary purpose is to rigorously test and improve high-stakes plans by actively looking for failure modes."}]}, {"question": "Considering the 'Inversion' concept mentioned in the 'connections' section, how does the pre-mortem technique exemplify this broader strategy?", "options": [{"text": "It focuses on maximizing potential gains rather than minimizing potential losses.", "isCorrect": false, "rationale": "Inversion involves thinking backward or about the opposite. Maximizing gains is a direct approach, not an inversion. The pre-mortem focuses on *preventing* loss (failure) by imagining it."}, {"text": "It approaches problem-solving by thinking about desired outcomes and working backward.", "isCorrect": false, "rationale": "While working backward from an outcome is a form of inversion, the pre-mortem specifically inverts the focus from 'how to succeed' to 'why might we fail,' not just any desired outcome."}, {"text": "It shifts the focus from directly achieving success to identifying and understanding potential failures.", "isCorrect": true, "rationale": "The 'connections' section defines Inversion as 'the broader strategy of approaching problems by thinking about failure rather than success,' which is exactly what the pre-mortem does."}, {"text": "It prioritizes individual contributions over group collaboration in decision-making.", "isCorrect": false, "rationale": "While independent thinking is a step, the pre-mortem is a group collaboration that uses independent thought as a phase to enhance the collective outcome. Its core is about changing the problem-solving frame, not collaboration dynamics per se."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
