<script>
var QUESTIONS = [{"question": "What is the critical distinguishing rule of the Dollar Auction game, beyond awarding the dollar to the highest bidder?", "options": [{"text": "Bids must increase by exactly one dollar each time.", "isCorrect": false, "rationale": "The text states that 'increases go in five-cent increments,' not one dollar."}, {"text": "The second-highest bidder must also pay their bid and receives nothing.", "isCorrect": true, "rationale": "This is the unique and crucial 'twist' rule explicitly stated in the section: 'the second-highest bidder must also pay their bid and gets nothing in return.'"}, {"text": "The auctioneer takes a 10% commission from the winner.", "isCorrect": false, "rationale": "There is no mention of an auctioneer's commission in the rules provided."}, {"text": "The game ends immediately if any bid exceeds one dollar.", "isCorrect": false, "rationale": "The text explicitly states that 'the bidding continues past $1.00, past $2.00, sometimes past $5.00.'"}], "id": "q01"}, {"question": "In the Dollar Auction, why do rational bidders often continue bidding past one dollar, even though the prize is only a single dollar bill?", "options": [{"text": "They believe the dollar bill might be a rare collector's item worth more.", "isCorrect": false, "rationale": "The text does not suggest the bidders believe the dollar has any value beyond its face value; the escalation is due to the game's mechanics and psychological traps."}, {"text": "To minimize their losses from their previous bid, by attempting to win and only lose a small net amount.", "isCorrect": true, "rationale": "The text illustrates this with Bob's calculation: 'If he stops, he loses ninety-five cents. If he bids $1.05, he wins the dollar and loses only five cents net.' This local rationality drives the bids higher."}, {"text": "The rules state that the auction automatically continues until two bidders drop out consecutively.", "isCorrect": false, "rationale": "The provided rules do not include such a condition for ending the auction."}, {"text": "They are collectively trying to prove a point to the auctioneer about the absurdity of the game.", "isCorrect": false, "rationale": "The text emphasizes that 'each individual bid was locally rational' and the outcome was 'collectively insane,' implying individual self-interest, not a collective protest."}], "id": "q02"}, {"question": "Which of the following psychological forces is *not* explicitly identified in the text as contributing to the 'escalation trap' in the Dollar Auction?", "options": [{"text": "The sunk-cost fallacy.", "isCorrect": false, "rationale": "The text explicitly mentions the sunk-cost fallacy ('I've already invested so much, I can't stop now') as a contributing force."}, {"text": "Loss aversion.", "isCorrect": false, "rationale": "The text explicitly mentions loss aversion ('stopping means a certain loss') as a contributing force."}, {"text": "Competitive pride.", "isCorrect": false, "rationale": "The text explicitly mentions competitive pride ('I refuse to let the other person win') as a contributing force."}, {"text": "Overconfidence bias.", "isCorrect": true, "rationale": "While overconfidence might indirectly play a role in some escalation scenarios, it is not one of the three psychological forces explicitly identified in the text as combining to form the Dollar Auction's escalation trap."}], "id": "q03"}, {"question": "A government has invested heavily in a new public transportation project. Despite clear signs that the project is over budget and will not meet its ridership targets, officials decide to allocate more funds, arguing that abandoning it now would 'waste' all previous investment. This situation is an example of the principles at play in which of the following?", "options": [{"text": "A zero-sum game, where one party's gain is another's loss.", "isCorrect": false, "rationale": "While the project might involve resource allocation, the core issue described is not about one party gaining at another's expense but about continued investment in a failing venture to avoid prior losses, which is characteristic of an escalation trap."}, {"text": "The Dollar Auction's escalation trap, driven by sunk costs and the hope of recovery.", "isCorrect": true, "rationale": "This scenario directly mirrors the definition of an escalation trap and the example of 'Military escalation: Governments commit more troops and resources to a losing conflict because withdrawal would 'waste' the sacrifices already made.' The decision to continue spending to avoid 'wasting' past investment is a clear application of the sunk-cost fallacy, a key driver of the Dollar Auction."}, {"text": "A simple cost-benefit analysis, where the benefits eventually outweigh the costs.", "isCorrect": false, "rationale": "The scenario describes a situation where the project is likely failing, and further investment is justified by past spending, not by a clear expectation that future benefits will outweigh total costs."}, {"text": "A case of perfect information, allowing rational decision-making at every stage.", "isCorrect": false, "rationale": "The problem arises precisely because new information (over budget, not meeting targets) suggests the original decision was flawed, and continued investment is irrational despite 'clear signs' against it."}], "id": "q04"}, {"question": "The text describes the Dollar Auction outcome as a sequence of 'locally rational' decisions leading to a 'collectively insane outcome.' What does this paradox primarily reveal about human behavior in such traps?", "options": [{"text": "Individuals are inherently irrational when money is involved.", "isCorrect": false, "rationale": "The text explicitly states participants were 'not stupid' and each bid was 'locally rational,' contradicting the idea of inherent irrationality."}, {"text": "The sum of individually sensible choices can lead to a disastrous collective result.", "isCorrect": true, "rationale": "This is the core insight: 'Each individual bid was locally rational... But the sequence of rational decisions led to a collectively insane outcome.' It highlights how micro-rationality can lead to macro-irrationality."}, {"text": "People deliberately choose to lose money for the sake of competition.", "isCorrect": false, "rationale": "Participants are trying to minimize their losses or achieve a small gain, not to deliberately lose money for competition's sake, although competitive pride contributes to the trap."}, {"text": "Only unintelligent people fall into escalation traps.", "isCorrect": false, "rationale": "The section opens by stating the game 'reliably makes intelligent people behave foolishly,' directly refuting this claim."}], "id": "q05"}, {"question": "The Dollar Auction game, designed as a demonstration of irrational escalation, was first published by whom and in what year?", "options": [{"text": "Daniel Kahneman in 1979.", "isCorrect": false, "rationale": "Daniel Kahneman is a prominent economist, but he did not design the Dollar Auction. He is known for his work with Amos Tversky on Prospect Theory, published in 1979."}, {"text": "Martin Shubik in 1971.", "isCorrect": true, "rationale": "The text explicitly states: 'Designed by economist Martin Shubik in 1971... First published in the Journal of Conflict Resolution. Martin Shubik, 'The Dollar Auction Game...' 15, no. 1 (1971).'"}, {"text": "Richard Thaler in 1980.", "isCorrect": false, "rationale": "Richard Thaler is a notable economist, but he did not design the Dollar Auction. His work often focuses on behavioral economics, but at a later date for his key contributions mentioned."}, {"text": "Amos Tversky in 1974.", "isCorrect": false, "rationale": "Amos Tversky was a psychologist who collaborated extensively with Daniel Kahneman, but he did not design the Dollar Auction."}], "id": "q06"}, {"question": "According to the 'keyconcept Escalation Traps' section, what is the most reliable way to avoid or escape an escalation trap?", "options": [{"text": "Outbid opponents aggressively to force them to quit early.", "isCorrect": false, "rationale": "This strategy is precisely what fuels the escalation trap, leading to higher losses for all participants, not an escape."}, {"text": "Seek external mediation to resolve the conflict.", "isCorrect": false, "rationale": "While mediation can be helpful in real-world conflicts, the text does not mention it as 'the only reliable escape' or a primary strategy within the context of the Dollar Auction's mechanics."}, {"text": "Recognize the trap before entering it, or set and honor a firm exit point in advance.", "isCorrect": true, "rationale": "The 'keyconcept Escalation Traps' section explicitly states: 'The only reliable escape is to recognize the trap before entering it — or to set a firm exit point in advance and honor it regardless of what happens.'"}, {"text": "Continually re-evaluate the potential future returns to justify continued investment.", "isCorrect": false, "rationale": "This is often the flawed logic used *within* the trap to justify continued investment based on 'diminishing chance of recovery,' rather than a reliable escape."}], "id": "q07"}, {"question": "Which of the following scenarios *best* fits the definition of an 'escalation trap' as described in the text?", "options": [{"text": "A situation where multiple parties compete for a finite resource, leading to higher prices.", "isCorrect": false, "rationale": "While this describes an auction, it doesn't capture the critical element of the second-highest bidder paying or the core problem of loss aversion driving bids beyond rational value, which defines the 'escalation trap' in the text."}, {"text": "A decision point where stopping an endeavor incurs a definite loss, while continuing offers a diminishing chance of recovery.", "isCorrect": true, "rationale": "This statement is almost verbatim the definition provided in the text: 'Any situation where stopping incurs a definite loss and continuing offers a chance (however diminishing) of recovery has this structure.'"}, {"text": "An environment where initial investments are so small that the risks are negligible.", "isCorrect": false, "rationale": "The Dollar Auction demonstrates that even small initial stakes can lead to disproportionately large losses once trapped, contradicting the idea of negligible risks."}, {"text": "A negotiation where both sides refuse to compromise, leading to a stalemate.", "isCorrect": false, "rationale": "While related to conflict, this describes a deadlock, not necessarily the sequential escalation of costs and commitment to avoid a prior loss, which is central to the Dollar Auction's trap structure."}], "id": "q08"}, {"question": "The text connects the Dollar Auction to other concepts. While the Sunk-Cost Fallacy is a 'psychological engine' and Pyrrhic Victory relates to 'winning at unsustainable cost,' which other concept is mentioned as a 'model of mutually destructive standoffs' that is distinct from, but related to, the Dollar Auction?", "options": [{"text": "The Prisoner's Dilemma.", "isCorrect": false, "rationale": "The Prisoner's Dilemma is a well-known game theory concept, but it is not mentioned in the 'connections' section of this text."}, {"text": "The Availability Heuristic.", "isCorrect": false, "rationale": "The Availability Heuristic is a cognitive bias, but it is not mentioned in the 'connections' section of this text."}, {"text": "The Game of Chicken.", "isCorrect": true, "rationale": "The 'connections' section explicitly states: 'See also... The Game of Chicken (this chapter) for another model of mutually destructive standoffs.'"}, {"text": "Groupthink.", "isCorrect": false, "rationale": "Groupthink is a psychological phenomenon related to group decision-making, but it is not mentioned in the 'connections' section of this text."}], "id": "q09"}, {"question": "The 'thinkaboutit' section raises a question about the reliability of 'pre-commitment plans' (e.g., 'I'll quit if it goes past X') in the context of the Dollar Auction. What is the primary implication suggested by the game's typical outcome regarding such plans?", "options": [{"text": "Pre-commitment plans are generally effective because people are rational by nature.", "isCorrect": false, "rationale": "The text directly contradicts this, stating, 'Before an auction begins, every participant believes they will stop bidding at a rational point. Yet in practice, almost no one does,' implying that rational intentions often fail in the face of the trap."}, {"text": "While well-intentioned, pre-commitment plans are often difficult to uphold in the face of escalating losses and competitive pressures.", "isCorrect": true, "rationale": "The 'thinkaboutit' section directly asks, 'What does this tell us about the reliability of our 'pre-commitment' plans? When you say 'I'll quit if it goes past X,' how confident should you be that you actually will?' The preceding content shows that intelligent people fail to uphold such plans, indicating their unreliability under pressure."}, {"text": "Such plans are only reliable if the stakes are very low, not in high-stakes situations.", "isCorrect": false, "rationale": "While stakes might influence adherence, the core implication is the difficulty of adhering *at all* once the escalation trap takes hold, regardless of the initial stake, making this option not the primary implication."}, {"text": "The game proves that pre-commitment plans are unnecessary if one is truly intelligent.", "isCorrect": false, "rationale": "The text notes that 'intelligent people behave foolishly' in this game, suggesting intelligence alone is not a safeguard and implies that pre-commitment, though difficult, might be a necessary *attempt* to escape, not an unnecessary one."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
