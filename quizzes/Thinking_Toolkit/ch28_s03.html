<script>
var QUESTIONS = [{"question": "What is the fundamental objective of Fermi estimation, as described in the text?", "options": [{"text": "To provide exact, verifiable numerical answers to complex problems.", "isCorrect": false, "rationale": "The text explicitly states that Fermi estimation is about 'useful approximate answers' and getting within the 'right order of magnitude,' not exact figures."}, {"text": "To arrive at useful approximate answers to questions that seem unanswerable, by breaking them into tractable sub-problems.", "isCorrect": true, "rationale": "This option directly matches the definition provided in the text: 'Fermi estimation: the art of arriving at useful approximate answers to questions that seem unanswerable, by decomposing them into tractable sub-problems and combining rough estimates.'"}, {"text": "To develop highly precise mathematical models requiring extensive computational resources.", "isCorrect": false, "rationale": "Fermi estimation relies on 'rough guesses and simple arithmetic,' not complex models or extensive computation, to achieve its approximations."}, {"text": "To meticulously collect all available data before making any calculations.", "isCorrect": false, "rationale": "The method is designed for situations with 'minimal data' or when 'precise data is unavailable,' allowing for estimates without extensive data collection."}]}, {"question": "The text attributes the power of Fermi estimation to two mathematical facts. One is that 'errors tend to cancel.' What is the other crucial fact?", "options": [{"text": "The exact numerical answer is always less important than the method of calculation.", "isCorrect": false, "rationale": "While the method is important, this option doesn't capture the mathematical reason. The text focuses on the utility of an approximate answer's scale."}, {"text": "Advanced statistical analysis can always correct for individual estimation errors.", "isCorrect": false, "rationale": "The text highlights the cancellation of errors as an inherent property of combining independent estimates, not through 'advanced statistical analysis.'"}, {"text": "Order of magnitude is usually enough for many questions.", "isCorrect": true, "rationale": "The text explicitly states this as the second reason: 'Order of magnitude is usually enough. For many questions, knowing whether the answer is 100 or 1,000 or 10,000 is far more useful than knowing the exact figure.'"}, {"text": "All individual sub-estimates are inherently precise.", "isCorrect": false, "rationale": "Fermi estimation relies on 'rough estimates' and 'rough guesses.' The power comes from errors cancelling, not individual precision."}]}, {"question": "In the 'Piano Tuners of Chicago' example, what was the estimated fraction of households in Chicago having a piano?", "options": [{"text": "Approximately 1 in 50 households (2%).", "isCorrect": false, "rationale": "The estimate given in the text was '1 in 20, or about 5%,' not 1 in 50."}, {"text": "Approximately 1 in 10 households (10%).", "isCorrect": false, "rationale": "The estimate given in the text was '1 in 20, or about 5%,' not 1 in 10."}, {"text": "Approximately 1 in 20 households (5%).", "isCorrect": true, "rationale": "The text states, 'Estimate 1 in 20, or about 5%. That gives roughly 60,000 pianos.'"}, {"text": "Approximately 1 in 5 households (20%).", "isCorrect": false, "rationale": "The estimate given in the text was '1 in 20, or about 5%,' which is significantly lower than 1 in 5."}]}, {"question": "According to the text, what is the 'deeper skill' embedded within Fermi estimation, beyond mere arithmetic?", "options": [{"text": "The ability to recall a vast database of statistical facts.", "isCorrect": false, "rationale": "The text emphasizes decomposition and approximate reasoning when data is unavailable, not memorization of facts."}, {"text": "The discipline of decomposition and approximate reasoning, akin to first-principles thinking.", "isCorrect": true, "rationale": "The text explicitly states: 'It is a way of thinking — a discipline of decomposition and approximate reasoning that applies to any domain where precise data is unavailable... It is, in essence, first-principles thinking applied to quantitative estimation.'"}, {"text": "The capacity to perform complex mathematical operations without a calculator.", "isCorrect": false, "rationale": "While some mental math is involved, the text highlights the conceptual skill of problem-breaking rather than just arithmetic speed or complexity."}, {"text": "The talent for convincing others of the accuracy of your random guesses.", "isCorrect": false, "rationale": "Fermi estimation is based on structured reasoning and making assumptions explicit, not arbitrary guessing or persuasion."}]}, {"question": "Why do Google and other technology companies famously use Fermi questions in job interviews?", "options": [{"text": "To verify a candidate's specific knowledge about niche topics like population statistics or market sizes.", "isCorrect": false, "rationale": "The text clarifies it's 'not because they care about the answer' but about the reasoning process."}, {"text": "To assess a candidate's ability to structure ambiguous problems, demonstrate analytical skill, and comfort with uncertainty.", "isCorrect": true, "rationale": "The text states: 'Google and other technology companies famously use Fermi questions in job interviews — not because they care about the answer, but because the candidate's reasoning process reveals analytical skill, comfort with uncertainty, and the ability to structure ambiguous problems.'"}, {"text": "To determine if a candidate can quickly find exact answers using external resources.", "isCorrect": false, "rationale": "The method is about estimating from 'minimal data' and 'without looking anything up,' focusing on internal reasoning."}, {"text": "To evaluate how well a candidate can avoid making any assumptions during problem-solving.", "isCorrect": false, "rationale": "Fermi estimation explicitly involves making assumptions visible and estimating, not avoiding them entirely."}]}, {"question": "A business consultant is tasked with quickly estimating the market potential for a new product with limited existing data. Applying Fermi estimation, what would be the most appropriate first step?", "options": [{"text": "Commission a comprehensive market research study involving thousands of surveys.", "isCorrect": false, "rationale": "Fermi estimation is used when 'precise data is unavailable' and focuses on quick, approximate answers, not extensive, time-consuming research."}, {"text": "Guess a market size based on intuition and present it as the final estimate.", "isCorrect": false, "rationale": "While it involves 'rough guesses,' Fermi estimation is a 'discipline of decomposition and approximate reasoning,' not just an arbitrary guess."}, {"text": "Break down the overall market problem into smaller, more manageable sub-components that can be individually estimated.", "isCorrect": true, "rationale": "This aligns perfectly with the core mechanism of Fermi estimation: 'breaking the problem into smaller pieces, each of which you can estimate' and 'decomposing them into tractable sub-problems.'"}, {"text": "Search for an existing, precise market report for a similar product, regardless of its relevance.", "isCorrect": false, "rationale": "Fermi estimation is for questions 'that seem unanswerable' due to a lack of data, implying direct reports are often unavailable or insufficient."}]}, {"question": "Enrico Fermi was renowned for his ability to make quick, accurate estimates. Which of his famous questions is known as the Fermi Paradox?", "options": [{"text": "How many piano tuners are in Chicago?", "isCorrect": false, "rationale": "This is his most famous example for Fermi estimation, but the text explicitly names 'Where is everybody?' as the Fermi Paradox."}, {"text": "How much water does your city use per day?", "isCorrect": false, "rationale": "This is listed as another example of a Fermi question, not the Fermi Paradox."}, {"text": "Where is everybody?", "isCorrect": true, "rationale": "The 'personbox' section states: 'His famous question about extraterrestrial life (“Where is everybody?”) is known as the Fermi Paradox.'"}, {"text": "How many golf balls fit in a school bus?", "isCorrect": false, "rationale": "This is listed as another example of a Fermi question, not the Fermi Paradox."}]}, {"question": "What does the text imply is the primary benefit of making your assumptions explicit during Fermi estimation?", "options": [{"text": "It ensures that the final answer will be exactly correct.", "isCorrect": false, "rationale": "Fermi estimation does not guarantee exact correctness, but useful approximation. Making assumptions explicit allows for checking the reasoning, not ensuring exactness."}, {"text": "It removes the need for any further calculations or reasoning.", "isCorrect": false, "rationale": "Making assumptions explicit is part of the reasoning process, not an end to it."}, {"text": "It forces you to identify what you do and do not know, and to check the plausibility of your conclusion.", "isCorrect": true, "rationale": "The text states: 'Breaking a question into its components forces you to identify what you do and do not know, to make your assumptions explicit, and to check whether your conclusion is even in the right neighborhood.'"}, {"text": "It demonstrates a mastery of advanced statistical methodologies.", "isCorrect": false, "rationale": "The skill is about decomposition and approximate reasoning, not necessarily advanced statistics."}]}, {"question": "Considering the 'connections' section, how does Fermi estimation relate to 'The Planning Fallacy'?", "options": [{"text": "It is an example of the Planning Fallacy, demonstrating overly optimistic projections.", "isCorrect": false, "rationale": "The text lists Fermi estimation as 'a corrective to optimistic projections,' meaning it helps mitigate the Planning Fallacy, not exemplify it."}, {"text": "It is a corrective mechanism to optimistic projections, helping to provide realistic estimates.", "isCorrect": true, "rationale": "The text explicitly states: 'The Planning Fallacy (Chapter ) — Fermi estimation as a corrective to optimistic projections'."}, {"text": "Both concepts encourage reasoning from foundations rather than analogy.", "isCorrect": false, "rationale": "This describes the connection to 'First Principles Thinking,' not 'The Planning Fallacy.'"}, {"text": "Fermi estimation shares no direct relation or connection with the Planning Fallacy.", "isCorrect": false, "rationale": "The 'connections' section clearly links the two concepts."}]}, {"question": "If a physicist uses Fermi estimation to check if a calculation's result is 'plausible' before detailed computation, what core principle of Fermi estimation are they applying?", "options": [{"text": "The necessity of absolute precision in scientific endeavors.", "isCorrect": false, "rationale": "Fermi estimation is about approximation and getting the 'order of magnitude,' not absolute precision."}, {"text": "The idea that errors in estimation always perfectly cancel out.", "isCorrect": false, "rationale": "The text says errors 'tend to cancel' and 'works surprisingly well,' not that they 'always perfectly cancel out.'"}, {"text": "The utility of knowing the answer's general scale (order of magnitude) for sanity-checking.", "isCorrect": true, "rationale": "The text states: 'Order of magnitude is usually enough. For many questions, knowing whether the answer is 100 or 1,000 or 10,000 is far more useful than knowing the exact figure.' This is applied in physics to 'check whether a calculation's result is plausible.'"}, {"text": "The belief that all scientific problems can be solved with minimal data.", "isCorrect": false, "rationale": "Fermi estimation provides a useful *approximation* from minimal data for *unanswerable-seeming* questions, not a solution for *all* scientific problems."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
