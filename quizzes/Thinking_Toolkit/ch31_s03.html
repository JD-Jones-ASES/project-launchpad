        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 31, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the Regret Minimization framework?", "options": [{"text": "To make quick decisions without thorough analysis.", "isCorrect": false, "rationale": "The text explicitly states, 'This does not mean you should leap into every opportunity without analysis.'"}, {"text": "To overcome short-term anxieties by considering long-term regret.", "isCorrect": true, "rationale": "The text explains that the framework 'cuts through the noise of short-term anxieties' by projecting forward to age eighty and focusing on what one would regret over a lifetime."}, {"text": "To identify the financial risks associated with a new venture.", "isCorrect": false, "rationale": "While financial concerns might be part of 'proximate concerns,' the framework's primary purpose is broader: transcending all short-term anxieties, not specifically financial risk identification."}, {"text": "To avoid any form of regret throughout one's life.", "isCorrect": false, "rationale": "The framework aims to 'Minimize Lifetime Regret,' particularly from inaction, but acknowledges that 'Time heals the sting of failed attempts,' implying some regret may occur but is manageable."}]}, {"question": "The 'project yourself forward to age eighty' thought experiment is central to regret minimization because it:", "options": [{"text": "Provides a fixed timeline for achieving life goals.", "isCorrect": false, "rationale": "The age eighty is used as a vantage point for reflection on past choices, not a deadline for future goals."}, {"text": "Helps to quantify potential financial losses.", "isCorrect": false, "rationale": "The framework focuses on emotional and existential regret from inaction, not direct quantification of financial outcomes."}, {"text": "Shifts focus from immediate concerns to what truly matters over a lifetime.", "isCorrect": true, "rationale": "The text states this shift helps 'see past short-term anxieties to what actually matters over a lifetime,' as the eighty-year-old self won't recall 'proximate concerns' but will remember if a chance was taken."}, {"text": "Encourages an aggressive pursuit of all opportunities regardless of risk.", "isCorrect": false, "rationale": "The text explicitly warns against recklessness, stating it is 'a test for courage, not for recklessness,' and applies only where 'the downside is survivable.'"}]}, {"question": "According to psychologists cited in the text, what is the nature of most people's deepest long-term regrets?", "options": [{"text": "Regrets about bad actions taken in the short term.", "isCorrect": false, "rationale": "The text specifies these are 'bad actions in the short term,' but 'in the long term the regrets that haunt us are the things we did not do.'"}, {"text": "Regrets about the things they did not do (inaction).", "isCorrect": true, "rationale": "The text clearly states, 'in the long term the regrets that haunt us are the things we did not do: the trip not taken, the relationship not pursued, the business not started, the conversation not had.'"}, {"text": "Regrets about the opinions of colleagues and peers.", "isCorrect": false, "rationale": "The text dismisses these as 'proximate concerns' that the 'eighty-year-old version of you will not remember.'"}, {"text": "Regrets about financial failures from trying new things.", "isCorrect": false, "rationale": "While failures can occur, the text emphasizes that 'Time heals the sting of failed attempts far more effectively than it heals the ache of roads not traveled,' highlighting inaction as the deeper regret."}]}, {"question": "When Jeff Bezos applied the Regret Minimization framework to his decision to start Amazon, what was the 'asymmetry' that proved decisive for him?", "options": [{"text": "The difference in potential earnings between his hedge fund job and Amazon.", "isCorrect": false, "rationale": "While earnings were a factor in leaving a 'lucrative finance career,' the 'asymmetry' specifically referred to the nature of regret itself."}, {"text": "The contrast between regretting trying and failing versus regretting never having tried.", "isCorrect": true, "rationale": "The text states, 'At eighty, would he regret not having tried? The answer was clearly yes. At eighty, would he regret having tried and failed? Probably not...The asymmetry was decisive.'"}, {"text": "The imbalance between his current job security and the uncertainty of a startup.", "isCorrect": false, "rationale": "This represents the 'short-term anxieties' that the framework helps to overcome, rather than the core 'asymmetry' of regret itself."}, {"text": "The gap between his boss's opinion and his own ambition.", "isCorrect": false, "rationale": "His boss's opinion was part of the 'noise' the framework aims to cut through, not the decisive 'asymmetry' of regret."}]}, {"question": "Which of the following scenarios is LEAST appropriate for applying the Regret Minimization framework, according to the text?", "options": [{"text": "Deciding whether to pursue a new career path that aligns with a long-held passion.", "isCorrect": false, "rationale": "This is given as a prime example of an appropriate decision: 'Quitting your job to pursue a passion is a regret-minimization decision.'"}, {"text": "Choosing whether to invest in a potentially groundbreaking but risky startup company.", "isCorrect": false, "rationale": "If the downside is 'survivable' and it's a 'significant, meaningful decision,' this could be appropriate. The text allows for risk if it's not reckless."}, {"text": "Considering whether to move to a new country for a significant life experience.", "isCorrect": false, "rationale": "This aligns with a 'significant, meaningful decision' where the regret of inaction ('trip not taken') could be substantial and the downside survivable."}, {"text": "Betting a significant portion of your family's savings on a highly speculative investment tip.", "isCorrect": true, "rationale": "The text explicitly states, 'Betting your children's college fund on a cryptocurrency tip is not' a regret-minimization decision, as it constitutes recklessness where the downside may not be survivable."}]}, {"question": "How does Regret Minimization effectively 'cut through the noise of short-term anxieties'?", "options": [{"text": "By focusing on immediate consequences and practical outcomes.", "isCorrect": false, "rationale": "The framework intentionally shifts *away* from immediate concerns, labeling them 'short-term anxieties' or 'proximate concerns'."}, {"text": "By encouraging individuals to ignore all current responsibilities.", "isCorrect": false, "rationale": "It doesn't advocate ignoring responsibilities, but rather re-evaluating their long-term significance in the context of one's entire life."}, {"text": "By shifting the decision-maker's time horizon to a long-term perspective.", "isCorrect": true, "rationale": "The core mechanism is to 'project yourself forward to age eighty,' which changes 'which concerns feel important and which feel trivial,' moving past short-term worries."}, {"text": "By providing a definitive answer to complex financial dilemmas.", "isCorrect": false, "rationale": "It's a framework for decision-making and reflection on regret, not a tool for generating definitive answers, especially not solely for financial ones."}]}, {"question": "The text distinguishes between using regret minimization as a 'test for courage' versus 'recklessness.' What is the primary factor that differentiates these two applications?", "options": [{"text": "The potential for high financial returns.", "isCorrect": false, "rationale": "The framework focuses on regret from inaction and the survivability of downsides, not primarily on the potential for financial gains."}, {"text": "Whether the decision aligns with societal expectations.", "isCorrect": false, "rationale": "Societal expectations (e.g., 'what will my colleagues think') are presented as part of the 'noise' the framework helps to ignore."}, {"text": "The survivability of the decision's potential downside.", "isCorrect": true, "rationale": "The text explicitly states, 'Regret minimization is best applied to significant, meaningful decisions where the downside is survivable. It is a test for courage, not for recklessness.'"}, {"text": "The number of people who support the decision.", "isCorrect": false, "rationale": "The opinions of others are categorized as 'proximate concerns' that the framework aims to bypass."}]}, {"question": "Which of the following decisions would most align with the appropriate application of the Regret Minimization framework as described?", "options": [{"text": "Choosing which brand of coffee to buy at the grocery store.", "isCorrect": false, "rationale": "This is a trivial daily decision, not a 'significant, meaningful decision' that would cause profound long-term regret from inaction."}, {"text": "Deciding whether to accept an offer for a challenging leadership role that involves significant personal growth but also a risk of failure.", "isCorrect": true, "rationale": "This represents a 'significant, meaningful decision' with a potentially 'survivable downside' (risk of failure) and high potential for long-term regret of inaction ('opportunity not pursued'), making it a 'test for courage.'"}, {"text": "Picking lottery numbers based on a 'gut feeling.'", "isCorrect": false, "rationale": "This is a form of reckless gambling with a non-survivable downside (lost money for a statistically unlikely gain) and does not involve the kind of deep personal regret from inaction that the framework addresses."}, {"text": "Opting for a cheaper, less reliable car to save money on immediate expenses.", "isCorrect": false, "rationale": "This is a practical, short-term financial decision that doesn't typically involve the kind of profound, lifelong regret of inaction that the framework is designed to address."}]}, {"question": "According to the 'keyconcept' summary, what is the ultimate benefit of using the Regret Minimization framework?", "options": [{"text": "To guarantee success in all risky ventures.", "isCorrect": false, "rationale": "The framework acknowledges 'trying and failing' as a possibility, and does not guarantee success in any venture."}, {"text": "To eliminate all forms of anxiety related to decision-making.", "isCorrect": false, "rationale": "It helps to 'cut through' short-term anxieties, not to eliminate all anxiety, which is an unrealistic expectation."}, {"text": "To align current choices with long-term values and avoid inaction regret.", "isCorrect": true, "rationale": "The keyconcept states it helps 'see past short-term anxieties to what actually matters over a lifetime' and highlights that 'Long-term regret is more often caused by inaction than by action.'"}, {"text": "To gain approval from peers and mentors for ambitious plans.", "isCorrect": false, "rationale": "The text explicitly categorizes concerns about what 'colleagues think' as 'noise' to be overcome, not a goal of the framework."}]}, {"question": "The 'thinkaboutit' section prompts the reader to consider how shifting their time horizon changes which concerns feel important. This exercise primarily serves to:", "options": [{"text": "Quantify the exact financial impact of a decision.", "isCorrect": false, "rationale": "The exercise focuses on the emotional and existential importance of concerns over time, not financial quantification."}, {"text": "Reinforce the idea that long-term concerns often overshadow short-term worries.", "isCorrect": true, "rationale": "The prompt asks, 'Does this change how the decision feels? Notice how the shift in time horizon changes which concerns feel important and which feel trivial,' directly reinforcing the core message of the section."}, {"text": "Prove that all short-term anxieties are ultimately baseless and should be ignored.", "isCorrect": false, "rationale": "The text acknowledges that short-term concerns 'are real,' but emphasizes that they are 'overwhelmingly short-term' compared to long-term regret."}, {"text": "Prepare the reader for the subsequent chapters on related concepts.", "isCorrect": false, "rationale": "While it might indirectly aid in understanding connections, its primary purpose within this section is to help the reader internalize and apply the regret minimization concept directly."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
