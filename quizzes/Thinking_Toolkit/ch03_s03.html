    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary critique the text offers regarding the popular 'light-bulb moment' stories, such as Archimedes' 'Eureka!'?", "options": [{"text": "They are entirely fictional and never happened.", "isCorrect": false, "rationale": "The text states 'The eureka moment is real' and describes the stories as irresistible, but 'misleading' in a crucial sense, indicating they are not entirely fictional."}, {"text": "They mislead people into believing great ideas appear suddenly without prior effort.", "isCorrect": true, "rationale": "The text highlights that these stories 'suggest that great ideas arrive as bolts from the blue—sudden, effortless, magical,' but then clarifies that 'the eureka moment is almost always preceded by a long period of conscious effort.'"}, {"text": "They focus too much on ancient historical figures rather than modern examples.", "isCorrect": false, "rationale": "While the text uses ancient examples, its critique is not about the age of the examples but the misleading portrayal of the creative process."}, {"text": "They discourage individual creativity by highlighting specific geniuses.", "isCorrect": false, "rationale": "The text's critique is not about discouragement but about the inaccurate representation of how insights truly occur."}]}, {"question": "According to the section on 'Thinking Outside the Box,' what is the most common reason people initially struggle to solve the nine-dot puzzle?", "options": [{"text": "They lack the necessary spatial reasoning skills.", "isCorrect": false, "rationale": "The text does not attribute the difficulty to a lack of spatial reasoning but to a cognitive trap related to perceived boundaries."}, {"text": "They unconsciously impose a constraint that the lines must stay within the perceived grid boundary.", "isCorrect": true, "rationale": "The text explicitly states: 'The puzzle is impossible if you assume that the lines must stay within the square formed by the dots. The solution requires extending the lines beyond the boundary... outside the 'box' that most people unconsciously impose.'"}, {"text": "They are unfamiliar with the concept of straight lines.", "isCorrect": false, "rationale": "This option is absurd and not supported by the text."}, {"text": "They are limited to using only four lines instead of more.", "isCorrect": false, "rationale": "The limit of four lines is a genuine constraint of the puzzle, not an assumed one. The difficulty comes from assuming the lines can't go 'outside the box' formed by the dots."}]}, {"question": "A software engineer has been intensely debugging a complex program for days, but hits a wall. She decides to take a break and go for a run. During her run, a novel solution to the bug suddenly becomes clear. In the context of the Poincaré-Wallas stages of insight, which stage does the run primarily represent?", "options": [{"text": "Preparation", "isCorrect": false, "rationale": "Preparation involves 'conscious, deliberate engagement with the problem,' which was the intense debugging, not the run itself."}, {"text": "Incubation", "isCorrect": true, "rationale": "The text describes Incubation as when 'The problem is set aside, but the unconscious mind continues to process it. Sleep, walks, baths, and unrelated activities provide the space for this processing.' The run fits this description perfectly."}, {"text": "Illumination", "isCorrect": false, "rationale": "Illumination is the 'aha' moment when the solution appears, not the activity leading up to it."}, {"text": "Verification", "isCorrect": false, "rationale": "Verification is testing the insight against reality, which would occur after the solution has appeared."}]}, {"question": "Which statement best encapsulates the true lesson of 'thinking outside the box' as explained in the text?", "options": [{"text": "Creativity is about completely disregarding all existing rules and conventions.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating creative insight is 'not a breezy disregard for them [constraints]'. Instead, it involves understanding rules thoroughly to know which ones are genuine vs. assumed."}, {"text": "It involves recognizing and challenging the unstated, assumed constraints that limit problem-solving.", "isCorrect": true, "rationale": "The text states the lesson is 'noticing the assumed constraint and questioning it,' and that creative people 'can identify which ones are genuine and which ones are assumed—and then violate only the assumed ones.'"}, {"text": "It is a personality trait that some individuals possess and others do not.", "isCorrect": false, "rationale": "The 'caution' section clarifies: 'It is not. It is a skill built on domain knowledge and practiced constraint-questioning.'"}, {"text": "Solutions to difficult problems often come from random, spontaneous brainstorming sessions.", "isCorrect": false, "rationale": "The text emphasizes deep engagement, preparation, and understanding constraints, rather than purely random spontaneity."}]}, {"question": "The text asserts that 'creative insight is the product of deep engagement with constraints, not a breezy disregard for them.' What is a practical implication of this for someone striving for creative breakthroughs in their field?", "options": [{"text": "They should avoid specializing too much, as broad knowledge fosters creativity.", "isCorrect": false, "rationale": "Deep engagement with constraints suggests specialization and thorough understanding of a specific domain, rather than avoiding it."}, {"text": "They must first master the foundational knowledge and existing rules of their domain.", "isCorrect": true, "rationale": "The text uses examples like jazz musicians mastering scales and novelists internalizing conventions, concluding that creative people 'understand the rules so thoroughly that they can identify which ones are genuine and which ones are assumed.'"}, {"text": "They should actively seek out and ignore any perceived limitations to their work.", "isCorrect": false, "rationale": "The advice is to identify *assumed* constraints and violate *only* those, not to ignore *any* perceived limitation, as some are genuine."}, {"text": "Creative solutions are primarily a matter of innate talent rather than learned skill.", "isCorrect": false, "rationale": "The 'caution' section explicitly states creativity 'is not' a personality trait but 'is a skill built on domain knowledge and practiced constraint-questioning.'"}]}, {"question": "According to the text, why is the advice 'be creative' considered unhelpful?", "options": [{"text": "It implies that creativity is an optional quality rather than a necessity.", "isCorrect": false, "rationale": "The text's critique is not about the perceived optionality of creativity, but its practical utility as advice."}, {"text": "It describes a desired outcome without providing any actionable method or process.", "isCorrect": true, "rationale": "The text states: 'This is unhelpful for the same reason 'be taller' is unhelpful. It describes the desired outcome without providing a method.'"}, {"text": "It places undue pressure on individuals to perform at an unrealistic level.", "isCorrect": false, "rationale": "While it might create pressure, the text's primary reason for calling it 'bad advice' is its lack of instructional value."}, {"text": "It is often delivered by people who are not themselves creative.", "isCorrect": false, "rationale": "The text does not discuss the source of the advice, only its effectiveness and meaninglessness."}]}, {"question": "Based on the section's discussion of constraints, what is the fundamental difference between a 'genuine' constraint and an 'assumed' constraint?", "options": [{"text": "Genuine constraints are those that are explicitly stated in a problem, while assumed ones are implied.", "isCorrect": false, "rationale": "While genuine constraints might be stated, the core distinction lies in their nature. The text emphasizes that assumed constraints are 'rules we add ourselves' because of how a problem 'looks like a boundary,' not just whether they are explicit or implied."}, {"text": "Genuine constraints are fundamental limitations inherent to the problem's nature, whereas assumed constraints are self-imposed misinterpretations of the problem's boundaries.", "isCorrect": true, "rationale": "The text explains that creative people 'understand the rules so thoroughly that they can identify which ones are genuine and which ones are assumed.' Regarding assumed constraints, it states 'We add that rule ourselves, because the grid looks like a boundary.'"}, {"text": "Genuine constraints are those set by an authority figure, while assumed constraints are personal beliefs.", "isCorrect": false, "rationale": "This definition is too narrow and doesn't capture the essence of what makes a constraint 'genuine' or 'assumed' within the problem-solving context."}, {"text": "Genuine constraints lead to logical solutions, while assumed constraints always lead to dead ends.", "isCorrect": false, "rationale": "Assumed constraints limit the solution space, but don't necessarily lead to dead ends; they simply prevent 'outside the box' solutions. Genuine constraints don't guarantee 'logical solutions' in the sense implied."}]}, {"question": "In Graham Wallas's four stages of insight, what is the primary purpose of the 'Verification' stage?", "options": [{"text": "To allow the unconscious mind to process the problem without conscious effort.", "isCorrect": false, "rationale": "This describes the Incubation stage."}, {"text": "To consciously and deliberately engage with the problem through research and experimentation.", "isCorrect": false, "rationale": "This describes the Preparation stage."}, {"text": "To test the discovered insight against reality and ensure its validity.", "isCorrect": true, "rationale": "The text states: 'The insight is tested against reality. Many eureka moments turn out to be wrong upon examination. The ones that survive verification are the ones we remember.'"}, {"text": "To experience the sudden 'aha!' moment where the solution appears.", "isCorrect": false, "rationale": "This describes the Illumination stage."}]}, {"question": "If Archimedes had not been deeply engaged in the problem of the gold crown for days or weeks prior to his bath, what would the text suggest about his 'eureka' experience?", "options": [{"text": "He likely would have still discovered the displacement principle, as genius is innate.", "isCorrect": false, "rationale": "The text directly contradicts this by emphasizing that 'Insight Follows Preparation' and that the 'light-bulb moment is the reward for sustained engagement.'"}, {"text": "The rising water would have provided a trigger, but he wouldn't have recognized its significance.", "isCorrect": true, "rationale": "The text states: 'The bath provided a trigger, but the preparation made the trigger meaningful. If you or I had gotten into that bath, we would have noticed the water rising and thought nothing of it.'"}, {"text": "His unconscious mind would have worked on a different problem during the incubation period.", "isCorrect": false, "rationale": "While his mind might have processed other things, the core point is the lack of meaningful context for the water displacement trigger without prior preparation on that specific problem."}, {"text": "He would have skipped directly to the Verification stage without Illumination.", "isCorrect": false, "rationale": "The text clearly states, 'you cannot skip to stage three. There is no illumination without preparation,' implying a sequential process."}]}, {"question": "The 'caution' section recommends asking specific questions like 'Which box? What are its walls made of? Which walls are real and which are assumed?' when told to 'think outside the box.' What is the underlying purpose of these questions?", "options": [{"text": "To challenge the person giving the advice and prove their ignorance.", "isCorrect": false, "rationale": "The purpose is productive inquiry, not confrontation or proving someone wrong."}, {"text": "To concretely define the existing constraints and identify opportunities to challenge the assumed ones.", "isCorrect": true, "rationale": "The text explains these questions are 'far more productive than the generic exhortation to be creative' because they guide 'practiced constraint-questioning' and help distinguish 'real ones from the assumed ones.'"}, {"text": "To encourage a purely philosophical discussion about the nature of creativity.", "isCorrect": false, "rationale": "The text aims for practical problem-solving and skill development, not just philosophical debate."}, {"text": "To delay problem-solving until all possible variables are identified.", "isCorrect": false, "rationale": "The questions are meant to *clarify* the problem and its boundaries, leading to more effective problem-solving, not to delay it indefinitely."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
