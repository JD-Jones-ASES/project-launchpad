        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 31, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Suzy Welch, what is the primary purpose of the 10/10/10 Rule?", "options": [{"text": "To guarantee the optimal outcome for every decision.", "isCorrect": false, "rationale": "The text states the framework 'does not always produce a clear answer,' indicating it doesn't guarantee optimal outcomes but rather 'better thinking.'"}, {"text": "To provide a simple framework for breaking through short-term emotion in decision-making.", "isCorrect": true, "rationale": "The text explicitly states the 10/10/10 Rule is 'A simple framework for breaking through the fog of short-term emotion in decision-making.'"}, {"text": "To encourage quick decision-making under pressure.", "isCorrect": false, "rationale": "The rule is designed to make you 'step outside the emotional immediacy of the present,' which often counters the impulse for quick decisions."}, {"text": "To prioritize immediate satisfaction over all other considerations.", "isCorrect": false, "rationale": "The rule aims to differentiate between 'short-term comfort' and 'long-term value,' often showing that immediate satisfaction conflicts with long-term well-being."}]}, {"question": "What are the three specific time horizons one should consider when applying the 10/10/10 Rule?", "options": [{"text": "10 minutes, 10 days, 10 months.", "isCorrect": false, "rationale": "The text specifies '10 months' and '10 years,' not '10 days.'"}, {"text": "10 minutes, 10 weeks, 10 years.", "isCorrect": false, "rationale": "The text specifies '10 months,' not '10 weeks.'"}, {"text": "10 minutes, 10 months, 10 years.", "isCorrect": true, "rationale": "The text explicitly lists these three questions: 'How will I feel about this decision in 10 minutes? How will I feel about it in 10 months? How will I feel about it in 10 years?'"}, {"text": "10 hours, 10 days, 10 weeks.", "isCorrect": false, "rationale": "None of these timeframes match those specified in the 10/10/10 Rule."}]}, {"question": "The text states that the power of the 10/10/10 rule lies in its ability to expose a crucial gap. What gap is this?", "options": [{"text": "The gap between rational thought and impulsive action.", "isCorrect": false, "rationale": "While related, the text uses a more specific phrasing directly tied to the rule's mechanism."}, {"text": "The gap between individual desires and societal expectations.", "isCorrect": false, "rationale": "This concept is not discussed in the provided text."}, {"text": "The gap between short-term emotion and long-term value.", "isCorrect": true, "rationale": "The text explicitly states: 'The power of the 10/10/10 rule lies in its ability to expose the gap between short-term emotion and long-term value.'"}, {"text": "The gap between perceived difficulty and actual feasibility of a decision.", "isCorrect": false, "rationale": "This concept is not discussed in the provided text."}]}, {"question": "You receive an email from a colleague taking credit for your work. Applying the 10/10/10 rule, what perspective would likely emerge regarding sending a 'blistering reply'?", "options": [{"text": "It would be satisfying in 10 minutes, irrelevant in 10 months, and beneficial in 10 years.", "isCorrect": false, "rationale": "The text suggests such a reply 'might have damaged a working relationship' in 10 months, not be irrelevant or beneficial."}, {"text": "It would be satisfying in 10 minutes, potentially damaging to relationships in 10 months, and inconsequential in 10 years.", "isCorrect": true, "rationale": "This directly matches the example in the text: 'In 10 minutes, sending a blistering reply would feel satisfying. In 10 months, that reply might have damaged a working relationship... In 10 years, neither the email nor the reply will matter at all—but the relationship might.'"}, {"text": "It would be damaging immediately, resolved in 10 months, and a positive memory in 10 years.", "isCorrect": false, "rationale": "The text states it would feel 'satisfying' in 10 minutes, not immediately damaging, and the long-term effect is generally negative or inconsequential."}, {"text": "It would feel bad in 10 minutes, good in 10 months, and excellent in 10 years.", "isCorrect": false, "rationale": "This is the opposite of the scenario described, which states satisfaction in 10 minutes and potential damage later."}]}, {"question": "By forcing a decision-maker to consider different time horizons, the 10/10/10 rule primarily helps them to:", "options": [{"text": "Minimize all potential risks associated with the decision.", "isCorrect": false, "rationale": "The rule helps in 'better thinking' and weighing values, but doesn't guarantee risk minimization."}, {"text": "Determine whether they are optimizing for short-term comfort or long-term value.", "isCorrect": true, "rationale": "The text states the rule 'forces you to step outside the emotional immediacy of the present and consider whether you are optimizing for short-term comfort or long-term value.'"}, {"text": "Eliminate all emotional influence from the decision-making process.", "isCorrect": false, "rationale": "The rule helps 'break through the fog of short-term emotion' but doesn't claim to eliminate all emotions, rather to put them in perspective."}, {"text": "Quickly arrive at a definitive 'yes' or 'no' answer for every choice.", "isCorrect": false, "rationale": "The text explicitly states the framework 'does not always produce a clear answer.'"}]}, {"question": "According to the 'realworld' examples, how does the 10/10/10 framework characterize consistent saving compared to impulse purchases?", "options": [{"text": "Both consistent saving and impulse purchases score high at ten minutes.", "isCorrect": false, "rationale": "The text notes consistent saving scores 'low at ten minutes (boring).'"}, {"text": "Consistent saving scores low at ten minutes and high at ten years, while impulse purchases score high at ten minutes and low at ten months.", "isCorrect": true, "rationale": "This statement directly reflects the 'realworld' example: 'Impulse purchases score high at ten minutes (retail therapy!) and low at ten months (buyer's remorse). Consistent saving scores low at ten minutes (boring) and high at ten years (financial security).'"}, {"text": "Impulse purchases provide long-term financial security, while consistent saving leads to buyer's remorse.", "isCorrect": false, "rationale": "This is the opposite of what the text states regarding financial outcomes."}, {"text": "The framework shows that consistent saving and impulse purchases have similar long-term outcomes.", "isCorrect": false, "rationale": "The text states the framework 'makes the tradeoff explicit,' highlighting their differing long-term outcomes."}]}, {"question": "For which type of decisions is the 10/10/10 rule stated to be 'particularly useful'?", "options": [{"text": "Routine, low-stakes decisions with clear outcomes.", "isCorrect": false, "rationale": "The rule is presented as a 'tool for high-stakes decisions' and for when 'emotions are running high.'"}, {"text": "Decisions driven by strong emotions such as anger, excitement, fear, or social pressure.", "isCorrect": true, "rationale": "The text states: 'The 10/10/10 rule is particularly useful for decisions driven by strong emotions: anger, excitement, fear, romantic infatuation, or social pressure.'"}, {"text": "Decisions that have already been made and need retrospective analysis.", "isCorrect": false, "rationale": "The rule is meant to be applied 'Before you decide,' not for retrospective analysis."}, {"text": "Decisions requiring complex mathematical calculations and data analysis.", "isCorrect": false, "rationale": "The rule is described as a 'simple framework' for emotional decision-making, not complex analysis."}]}, {"question": "Based on the principles of the 10/10/10 rule, a decision that feels 'urgent and consequential in the moment' but is primarily driven by the 'ten-minute window' perspective is most likely to:", "options": [{"text": "Align perfectly with long-term goals and values.", "isCorrect": false, "rationale": "The rule's purpose is to 'expose the gap between short-term emotion and long-term value,' suggesting a potential misalignment."}, {"text": "Produce 'better thinking' by itself without further consideration.", "isCorrect": false, "rationale": "Better thinking comes from considering *all three* time horizons, not just the immediate one."}, {"text": "Lead to outcomes that are regretted or irrelevant in the longer term.", "isCorrect": true, "rationale": "The text states such decisions 'look very different when projected across three time horizons,' giving examples like damaging relationships, misery, or regret over avoidance in the longer term."}, {"text": "Be an easy decision to reverse without any lasting impact.", "isCorrect": false, "rationale": "The examples (damaged relationships, misery from relocation, festering issues) demonstrate lasting impacts, not easy reversibility."}]}, {"question": "Consider the 'realworld' example of skipping a workout. Applying the 10/10/10 rule, what is the likely long-term consequence mentioned?", "options": [{"text": "Skipping a workout consistently will have no significant health impact in ten years.", "isCorrect": false, "rationale": "The text states 'the cumulative effect of consistent exercise—or consistent avoidance—is transformative.'"}, {"text": "While it feels good at ten minutes, the habit of skipping can take hold, leading to transformative negative effects in ten years.", "isCorrect": true, "rationale": "The text explains: 'Skipping a workout feels great at ten minutes. At ten months, the habit of skipping has taken hold. At ten years, the cumulative effect of consistent exercise—or consistent avoidance—is transformative.'"}, {"text": "The initial good feeling from skipping a workout will persist and improve over ten months and ten years.", "isCorrect": false, "rationale": "The text implies the good feeling is only 'at ten minutes,' with negative long-term consequences from the habit."}, {"text": "Skipping a workout is only problematic if done for ten months, but not if it becomes a ten-year habit.", "isCorrect": false, "rationale": "The text emphasizes the 'cumulative effect' over ten years being 'transformative,' indicating a long-term habit is indeed problematic."}]}, {"question": "Which statement best describes the ultimate outcome or benefit of applying the 10/10/10 rule, according to the text?", "options": [{"text": "It guarantees a perfect, clear answer for every difficult decision.", "isCorrect": false, "rationale": "The text explicitly states, 'The framework does not always produce a clear answer.'"}, {"text": "It reliably produces better thinking by forcing consideration of long-term value over short-term emotion.", "isCorrect": true, "rationale": "The text states, 'The framework does not always produce a clear answer, but it reliably produces better thinking. It forces you to step outside the emotional immediacy... and consider whether you are optimizing for short-term comfort or long-term value.'"}, {"text": "It eliminates the need for any emotional input in decision-making.", "isCorrect": false, "rationale": "The rule acknowledges and helps manage emotions, but it doesn't aim to eliminate them entirely from decision-making."}, {"text": "It simplifies complex decisions into a single, immediate best choice.", "isCorrect": false, "rationale": "The rule requires projecting across three distinct time horizons, which is a more nuanced process than simplifying to a single immediate choice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
