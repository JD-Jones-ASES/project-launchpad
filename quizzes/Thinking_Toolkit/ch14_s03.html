        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 3</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Garrett Hardin's original formulation, what is the primary structural cause behind the \"tragedy of the commons\"?", "options": [{"text": "A general lack of scientific understanding regarding environmental limits.", "isCorrect": false, "rationale": "While awareness can play a role, Hardin's analysis focuses on the incentive structure, not primarily a lack of scientific knowledge."}, {"text": "An incentive structure where individuals gain private benefits while the costs are distributed among many.", "isCorrect": true, "rationale": "The text explicitly states the tragedy arises from \"private benefits, shared costs, and no mechanism to limit individual use of the shared resource,\" making this the core structural cause."}, {"text": "The inherent greed and irrationality of human nature.", "isCorrect": false, "rationale": "The text explicitly states: \"The tragedy of the commons is not caused by greed or irrationality but by the structure of incentives.\""}, {"text": "The absence of any shared moral or ethical framework within a community.", "isCorrect": false, "rationale": "While moral frameworks can influence behavior, Hardin's core argument focuses on the economic and structural incentives, which can override individual morals in the absence of other mechanisms."}], "id": "q01"}, {"question": "Which of the following real-world scenarios best exemplifies the \"tragedy of the commons\" as described in the text?", "options": [{"text": "A private company dumping waste into a river it owns, affecting downstream communities.", "isCorrect": false, "rationale": "This describes pollution with external costs but not necessarily a shared, rivalrous, unregulated resource in the same sense as the commons, as the company *owns* the source of pollution (the river, in this interpretation), rather than just using a shared resource."}, {"text": "Multiple international fishing fleets overexploiting shared ocean fisheries, leading to stock collapses.", "isCorrect": true, "rationale": "This aligns perfectly with the example given in the text: \"Overfishing. The ocean's fish stocks are a commons. Each fishing fleet has an incentive to catch as much as possible before others do. The result: collapsed fisheries around the world.\""}, {"text": "A monopoly raising prices on essential goods, making them unaffordable for many consumers.", "isCorrect": false, "rationale": "This describes market failure due to lack of competition, not the overexploitation of a shared, rivalrous resource."}, {"text": "A national park restricting access to protect endangered species from excessive tourism.", "isCorrect": false, "rationale": "This is an example of regulation *preventing* a tragedy of the commons, not an example of the tragedy itself unfolding."}], "id": "q02"}, {"question": "The text outlines four key conditions for the tragedy of the commons to occur. Which of the following is NOT one of these conditions?", "options": [{"text": "The resource is shared and no one owns it exclusively.", "isCorrect": false, "rationale": "This is explicitly stated as a key condition: \"The resource is shared. No one owns it exclusively; everyone has access.\""}, {"text": "The resource is rivalrous, meaning one person's use diminishes what is available for others.", "isCorrect": false, "rationale": "This is explicitly stated as a key condition: \"The resource is rivalrous. One person's use diminishes what is available for others.\""}, {"text": "Individual use of the resource is largely unregulated.", "isCorrect": false, "rationale": "This is explicitly stated as a key condition: \"Individual use is unregulated. There is no mechanism — no fence, no quota, no social norm — to limit how much each person takes.\""}, {"text": "The group exploiting the resource is small enough that individual actions have a noticeable impact.", "isCorrect": true, "rationale": "The text states the opposite: \"The group is large enough that individual restraint is negligible.\" If the group were small enough for individual actions to have a noticeable impact, self-regulation might be more feasible, thus reducing the likelihood of tragedy."}], "id": "q03"}, {"question": "How does the \"tragedy of the commons\" relate to the Prisoner's Dilemma, according to the text?", "options": [{"text": "They are unrelated concepts, as one focuses on resource management and the other on individual moral choices.", "isCorrect": false, "rationale": "The text explicitly links them, stating the tragedy is an 'extension' of the Prisoner's Dilemma."}, {"text": "The tragedy of the commons is a multi-player extension of the Prisoner's Dilemma's core logic.", "isCorrect": true, "rationale": "The text states: \"The tragedy of the commons is a multi-player extension of the Prisoner's Dilemma.\""}, {"text": "The Prisoner's Dilemma offers a straightforward solution to avoid the tragedy of the commons.", "isCorrect": false, "rationale": "The Prisoner's Dilemma describes a problem of individual incentives leading to suboptimal collective outcomes, not a solution."}, {"text": "Both describe situations where players are better off defecting, but cooperation leads to individual ruin.", "isCorrect": false, "rationale": "In both scenarios, players are better off cooperating collectively, but each has an individual incentive to defect (or overuse, in the commons)."}], "id": "q04"}, {"question": "In the shared pasture example, why does each individual herder rationally decide to add another cow, even though it collectively leads to overgrazing?", "options": [{"text": "They are unaware of the long-term ecological consequences of overgrazing.", "isCorrect": false, "rationale": "While true for some, the text emphasizes the rational economic calculation: \"For each individual herder, the rational calculation is clear: add the cow.\""}, {"text": "The personal benefit of the extra cow is fully captured by the herder, while the cost of degradation is shared by all.", "isCorrect": true, "rationale": "The text states: \"The benefit of the extra cow...goes entirely to the individual herder. The cost of the extra cow...is shared among all herders.\" This makes adding a cow individually rational."}, {"text": "They believe other herders will reduce their herd size, making their own additional cow negligible.", "isCorrect": false, "rationale": "While a herder might hope others restrain, the core rationale presented is the direct benefit-cost calculation for *their own* cow, not an assumption about others' actions."}, {"text": "There are no alternative pastures or livelihoods available to the herders, forcing them to maximize short-term gains.", "isCorrect": false, "rationale": "The text does not mention the availability of alternative livelihoods as the reason for the rational calculation; it focuses on the structure of incentives for the shared resource."}], "id": "q05"}, {"question": "Garrett Hardin initially argued that the tragedy of the commons could be averted through two main approaches. What were these?", "options": [{"text": "Voluntary restraint and education.", "isCorrect": false, "rationale": "Hardin did not primarily propose voluntary restraint; his analysis highlighted why individual rationality prevents it. Education was not one of his primary structural solutions."}, {"text": "Privatization or government regulation.", "isCorrect": true, "rationale": "The text states: \"Hardin argued that the tragedy of the commons could be averted in two ways: privatization... or government regulation.\""}, {"text": "Technological innovation and international treaties.", "isCorrect": false, "rationale": "While these can be solutions in some contexts, they were not Hardin's two main proposed approaches."}, {"text": "Community self-governance and social norms.", "isCorrect": false, "rationale": "Community self-governance was the 'third option' that Hardin 'overlooked,' according to Ostrom's work, not one of his initial proposals."}], "id": "q06"}, {"question": "What was the fundamental oversight in Garrett Hardin's original analysis of the tragedy of the commons, as identified by Elinor Ostrom?", "options": [{"text": "He underestimated the global impact of climate change on shared atmospheric resources.", "isCorrect": false, "rationale": "While carbon emissions are a real-world example, Ostrom's critique was about the *management* of commons, not a specific type of resource or environmental issue."}, {"text": "He assumed that all commons were unmanaged and lacked any existing rules or institutions for governance.", "isCorrect": true, "rationale": "The text explicitly states: \"Hardin's analysis assumes that commons are unmanaged — that no rules, norms, or institutions govern their use.\" Ostrom's work showed this assumption was often false."}, {"text": "He failed to acknowledge the potential for technological solutions to resource scarcity.", "isCorrect": false, "rationale": "Ostrom's critique focused on social and institutional solutions, not primarily technological ones."}, {"text": "He did not provide sufficient empirical evidence or real-world examples to support his theory.", "isCorrect": false, "rationale": "Hardin's pasture example was canonical, and the concept resonated widely; Ostrom's work was a *correction* to his theory, not a dismissal of its foundation due to lack of evidence."}], "id": "q07"}, {"question": "A community successfully manages a local fishing ground without external government intervention or privatization, ensuring sustainable yields for generations. Based on Elinor Ostrom's work, which factor is most likely a key reason for their success?", "options": [{"text": "The fishing ground is so vast that one person's catch has no measurable impact on the resource.", "isCorrect": false, "rationale": "This would mean the resource isn't truly 'rivalrous' in a practical sense, contradicting the conditions for a tragedy. Ostrom's work focuses on managing *rivalrous* resources."}, {"text": "The community relies solely on the inherent altruism and goodwill of its individual members.", "isCorrect": false, "rationale": "Ostrom's research showed that successful commons management relies on clear rules, monitoring, and sanctions, not just voluntary altruism, which Hardin's initial analysis suggested was insufficient."}, {"text": "They have clear rules defining who can fish, user participation in rule-making, and graduated sanctions for violations.", "isCorrect": true, "rationale": "These are direct applications of Ostrom's identified conditions for successful community management: \"Clear boundaries defining who has access,\" \"Participation of users in making and modifying the rules,\" and \"Graduated sanctions for rule violations.\""}, {"text": "The community has completely isolated itself from all external markets and economic pressures.", "isCorrect": false, "rationale": "While local conditions are important, the text does not suggest complete isolation is a necessary condition for successful management; rather, it emphasizes institutional arrangements."}], "id": "q08"}, {"question": "Based on the combined insights from both Hardin and Ostrom, what is the most accurate conclusion regarding the \"tragedy of the commons\"?", "options": [{"text": "It is an inevitable outcome for any shared resource, regardless of the community or context.", "isCorrect": false, "rationale": "This aligns with Hardin's initial implication, but Ostrom directly corrected this, stating: \"The tragedy of the commons is real, but it is not inevitable.\""}, {"text": "It is primarily caused by individual greed and irrationality, which can only be overcome through strict moral education.", "isCorrect": false, "rationale": "The text explicitly states it's not caused by greed or irrationality, but by incentive structures, and solutions involve changing those structures, not just moral education."}, {"text": "It is a potential outcome of shared resources that can be averted through privatization, government regulation, or effective community self-governance.", "isCorrect": true, "rationale": "This synthesizes both Hardin's initial solutions and Ostrom's crucial addition, providing a comprehensive and accurate understanding of how the tragedy can be avoided by changing incentive structures."}, {"text": "It mainly affects natural resources and is largely irrelevant to modern social or economic systems.", "isCorrect": false, "rationale": "The text provides diverse examples like carbon emissions, antibiotic resistance, and traffic congestion, demonstrating its relevance beyond natural resources."}], "id": "q09"}, {"question": "The text differentiates a 'rivalrous' resource in a commons from a 'public good' like national defense. What is the key functional difference between them?", "options": [{"text": "Public goods are exclusively owned by governments, while commons are always publicly accessible.", "isCorrect": false, "rationale": "Ownership structure is not the primary functional distinction highlighted here. Many public goods are provided by governments, but the core difference lies in their consumption characteristics."}, {"text": "One person's consumption of a public good does not diminish its availability for others, unlike a rivalrous resource in a commons.", "isCorrect": true, "rationale": "The text states that a rivalrous resource is one where \"One person's use diminishes what is available for others\" and then distinguishes a commons \"from a public good like national defense, which is not diminished by use.\" This is the precise distinction."}, {"text": "Public goods generate private benefits for individuals, whereas commons generate shared benefits.", "isCorrect": false, "rationale": "Both can generate shared benefits. The issue with commons is the *private capture* of benefits with *shared costs* and *diminished availability*."}, {"text": "Commons are excludable, meaning access can be restricted, while public goods are non-excludable.", "isCorrect": false, "rationale": "The text's primary distinction focuses on rivalrousness. While public goods are non-excludable, a commons can sometimes be managed to *become* excludable (e.g., through clear boundaries), but its inherent rivalrous nature remains the key differentiator from a public good."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
