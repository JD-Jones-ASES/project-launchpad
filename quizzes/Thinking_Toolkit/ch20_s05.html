<script>
var QUESTIONS = [{"question": "Which of the following best describes the key distinction between the individual and institutional Boiling Frog metaphors as discussed in the text?", "options": [{"text": "The individual metaphor emphasizes rapid, noticeable change, while the institutional metaphor focuses on slow, imperceptible change.", "isCorrect": false, "rationale": "Both metaphors deal with slow, imperceptible change. The distinction lies in who is affected and their capacity to respond."}, {"text": "The individual can jump out of the pot, but institutions often cannot because internal norms shift, making the danger invisible to those inside.", "isCorrect": true, "rationale": "The text explicitly states, 'Individual frogs can jump out of the pot. Institutions often cannot, because the people inside them have adjusted their sense of 'normal' at every step along the way.' This highlights the core difference in responsiveness due to internal normalization."}, {"text": "The individual metaphor applies to personal habits, whereas the institutional metaphor applies only to large corporations.", "isCorrect": false, "rationale": "While the institutional metaphor can apply to large corporations, the text gives examples beyond just corporations (news organizations, democratic institutions, professional communities). The individual metaphor applies broadly to personal inattention, not just habits."}, {"text": "Institutional boiling is less dangerous than individual boiling because institutions have more resources to adapt.", "isCorrect": false, "rationale": "The text implies institutional boiling is more disturbing and harder to detect/correct, making it potentially more dangerous due to collective inattention and internal normalization, despite resource availability."}], "id": "q01"}, {"question": "The term 'normalization of deviance' was coined to explain which specific event?", "options": [{"text": "The gradual shift in Boeing's culture from engineering-driven to finance-driven leading to the 737 MAX crashes.", "isCorrect": false, "rationale": "While the Boeing example illustrates 'institutional boiling' and a form of normalization of deviance, the text specifically attributes the coinage of the term to describe what happened before the Challenger disaster."}, {"text": "The slow concentration of power in executive branches of democratic institutions.", "isCorrect": false, "rationale": "This is an example of institutional boiling, but not the specific event for which the term 'normalization of deviance' was coined."}, {"text": "The Challenger disaster in 1986, where O-ring erosion became an 'expected behavior'.", "isCorrect": true, "rationale": "The text explicitly states: 'The sociologist Diane Vaughan coined the term 'normalization of deviance' to describe what happened inside NASA before the Challenger disaster in 1986' regarding the O-rings."}, {"text": "The historical process of replacing investigative reporting with opinion commentary in news organizations.", "isCorrect": false, "rationale": "This is another example of institutional boiling, but not the origin of the 'normalization of deviance' term."}], "id": "q02"}, {"question": "A software development team initially considered any bug in a new feature 'critical' and requiring an immediate fix. Over several months, as project deadlines became tighter, minor bugs that didn't crash the system were gradually reclassified as 'low priority' or even 'acceptable quirks' if they occurred rarely. Eventually, a significant bug that had been previously categorized as 'critical' was deemed 'not urgent enough' and led to a major system failure in production. This scenario best illustrates:", "options": [{"text": "An efficient adaptation of bug prioritization based on empirical data.", "isCorrect": false, "rationale": "While it involves adaptation, the eventual system failure suggests it was not an efficient adaptation, but rather a dangerous drift from original standards, aligning with normalization of deviance."}, {"text": "The phenomenon of individual inattention to rapidly escalating problems.", "isCorrect": false, "rationale": "This describes a team-wide, institutional shift in standards over time, not just individual inattention, and the changes were gradual, not rapid."}, {"text": "The normalization of deviance within a professional community.", "isCorrect": true, "rationale": "The team's gradual reclassification of bugs from critical to acceptable, driven by expediency and past non-catastrophic occurrences, mirrors the O-ring example in the text, where an 'alarming anomaly' becomes 'expected behavior' and leads to eventual failure. This is a clear example of normalization of deviance."}, {"text": "A successful application of Chesterton's Fence principle.", "isCorrect": false, "rationale": "Chesterton's Fence is an antidote to this problem, involving comparison to fixed standards. This scenario describes the problem itself, not the solution."}], "id": "q03"}, {"question": "Why are individuals within an institution often poorly positioned to recognize significant institutional drift or decay?", "options": [{"text": "They intentionally ignore warning signs to protect their careers.", "isCorrect": false, "rationale": "While individual incentives might play a role, the text emphasizes a more fundamental cognitive issue: a shifted perception of 'normal,' not necessarily deliberate ignorance."}, {"text": "Their sense of 'normal' has shifted in lockstep with the incremental changes, making continuity, not deviation, perceptible.", "isCorrect": true, "rationale": "The text explicitly states, 'They are the frogs in the water. They have adjusted to each incremental change. Their sense of 'normal' has shifted in lockstep with the temperature. An outsider looking at the organization might be alarmed, but insiders experience only continuity.'"}, {"text": "They lack access to historical data or founding principles.", "isCorrect": false, "rationale": "While they might not actively compare to these, the core problem isn't necessarily lack of access but rather the internal adjustment to the new 'normal' that makes such comparison seem unnecessary or makes the deviation invisible."}, {"text": "Outsiders are always more biased and therefore see more clearly.", "isCorrect": false, "rationale": "Outsiders are mentioned as potentially alarmed, but the reason for insider blindness is internal adjustment, not merely a contrast with outsider bias."}], "id": "q04"}, {"question": "According to the text, what is the antidote to institutional boiling, drawing a parallel to Chesterton's Fence?", "options": [{"text": "Implement more rapid, dramatic changes to shock the system into awareness.", "isCorrect": false, "rationale": "The problem is gradual change and the normalization of it. Rapid changes might cause other issues and don't address the underlying perceptual shift. The antidote focuses on consistent measurement, not further disruption."}, {"text": "Compare current practices exclusively to those of the most successful competitors.", "isCorrect": false, "rationale": "While external benchmarking can be useful, the text's antidote is specific: 'deliberate comparison to a fixed standard' within the institution itself, not just external comparison which might also involve moving targets."}, {"text": "Encourage insiders to trust their instincts about whether things feel 'normal'.", "isCorrect": false, "rationale": "The core problem is that insiders' sense of 'normal' has already shifted. Trusting that instinct would perpetuate the drift, not correct it."}, {"text": "Deliberately compare current reality to fixed, original standards, founding principles, or written policies.", "isCorrect": true, "rationale": "The text explicitly states: 'The antidote is the same one Chesterton's Fence demands: deliberate comparison to a fixed standard. Do not compare this year to last year. Compare this year to the founding principles. Compare current practice to the written policy. Compare the actual culture to the aspirational one.'"}], "id": "q05"}, {"question": "A university department has a published mission statement emphasizing student-centered learning and innovative research. Over a decade, budget cuts lead to larger class sizes, reduced faculty research time, and increased reliance on adjunct instructors. Department meetings increasingly focus on administrative compliance rather than pedagogical innovation. To assess if institutional boiling is occurring, which comparison would be most effective?", "options": [{"text": "Comparing this year's student satisfaction scores to last year's scores.", "isCorrect": false, "rationale": "Comparing 'this year to last year' is explicitly advised against in the text because it is a comparison to the recent past, which itself might be part of the drift. Student satisfaction could also have shifted over time, making it a moving target."}, {"text": "Comparing the current departmental practices and priorities to its original mission statement.", "isCorrect": true, "rationale": "The text states the antidote is to 'Compare current practice to the written policy. Compare the actual culture to the aspirational one' and 'Compare this year to the founding principles.' The mission statement serves as a fixed, foundational standard against which to measure drift."}, {"text": "Comparing the department's budget allocations this year to those of ten years ago.", "isCorrect": false, "rationale": "While budget is a factor, merely comparing budget numbers doesn't directly assess the drift from the mission. Also, changes in budget might be seen as 'normal' year over year, making it a moving target if not explicitly tied to the mission."}, {"text": "Comparing the number of adjunct faculty this year to that of similar departments at other universities.", "isCorrect": false, "rationale": "Comparing to other universities (external benchmarks) can be useful but doesn't directly address the *department's own* drift from *its* fixed standards, which is the core of the antidote described."}], "id": "q06"}, {"question": "The 'note' section clarifies that the institutional Boiling Frog is the 'same metaphor applied at a different scale.' What makes the collective, institutional version 'harder to detect and harder to correct' than the individual version?", "options": [{"text": "Institutional changes are always more complex than individual changes, requiring more sophisticated analytical tools.", "isCorrect": false, "rationale": "While institutions are complex, the text's specific reason for increased difficulty is not general complexity but the collective nature of the normalization."}, {"text": "It requires an entire institution to recognize a drift that each member has individually normalized.", "isCorrect": true, "rationale": "The 'note' explicitly states it 'is harder to detect and harder to correct, because it requires the entire institution to recognize a drift that each member has individually normalized.' This collective denial or blind spot is the key difficulty."}, {"text": "Individual frogs can actively resist the temperature change, whereas institutional members are passive.", "isCorrect": false, "rationale": "The text suggests individual frogs *can jump out*, implying agency, but institutional members also adjust their 'normal,' making them passive in detecting the drift, not necessarily completely passive from the start."}, {"text": "External forces influencing institutions are more powerful than those affecting individuals.", "isCorrect": false, "rationale": "The difficulty stems from internal perception and normalization, not solely from the strength of external forces."}], "id": "q07"}, {"question": "Which of the following scenarios best reflects the 'slow boiling' experienced by engineers at Boeing, as described in the 'realworld' example?", "options": [{"text": "A sudden and unexpected corporate mandate that instantly replaced safety protocols with cost-cutting measures.", "isCorrect": false, "rationale": "The text emphasizes that 'No single decision was catastrophic in isolation' and describes a 'slow boiling' where 'each year's cost pressures seemed only slightly worse than the last,' directly contradicting a 'sudden and unexpected' mandate."}, {"text": "Engineers knowingly compromised safety for profit, fully aware of the lethal consequences.", "isCorrect": false, "rationale": "The 'slow boiling' implies a gradual shift in what was considered acceptable, where engineers adjusted their sense of normal, rather than a conscious, immediate decision to compromise safety with full awareness of catastrophic outcomes."}, {"text": "A series of incremental cost pressures and organizational changes that, individually, seemed minor but cumulatively eroded the engineering-driven safety culture.", "isCorrect": true, "rationale": "This accurately reflects the description: 'Cost-cutting measures, the relocation of headquarters away from manufacturing centers, and a series of organizational changes slowly eroded the engineering culture... No single decision was catastrophic in isolation. But the cumulative drift contributed...' and 'each year's cost pressures seemed only slightly worse than the last.'"}, {"text": "A rapid industry-wide shift in safety standards that forced Boeing to adapt quickly.", "isCorrect": false, "rationale": "The text describes an internal cultural shift at Boeing, driven by internal decisions and pressures (merger, cost-cutting), not a rapid external industry-wide shift."}], "id": "q08"}, {"question": "The section discusses how a news organization might 'gradually replace investigative reporting with opinion commentary.' This drift is characterized as not happening through a single editorial decision, but through 'hundreds of small budget reallocations, hiring choices, and content decisions spread over years.' This exemplifies:", "options": [{"text": "A planned strategic pivot to align with market demands.", "isCorrect": false, "rationale": "While some changes might be strategic, the text characterizes this as a 'drift' and 'institutional boiling,' implying an unacknowledged erosion of core values, not necessarily a conscious, deliberate, and fully understood strategic pivot."}, {"text": "The danger of rapid, top-down institutional mandates.", "isCorrect": false, "rationale": "The text explicitly states 'not in a single editorial decision' and highlights 'hundreds of small budget reallocations,' emphasizing gradual, decentralized changes rather than rapid, top-down mandates."}, {"text": "How incremental, unnoticeable changes can collectively transform an organization's core function without conscious recognition.", "isCorrect": true, "rationale": "This perfectly aligns with the core concept of institutional boiling: 'The temperature rises one degree at a time. Each degree is barely noticeable against the previous one. No single step crosses a bright line. But the cumulative effect is a complete transformation of what the organization considers acceptable.'"}, {"text": "The successful adaptation of an organization to evolving media consumption habits.", "isCorrect": false, "rationale": "While it might superficially appear as adaptation, the text frames it as 'decay' and 'drift' from original standards, rather than a successful or desirable evolution. The context of 'institutional and cultural decay' implies a negative connotation."}], "id": "q09"}, {"question": "Considering the 'connections' mentioned at the end of the text, which concept is most directly related to the idea that insiders experience 'continuity' despite significant organizational drift?", "options": [{"text": "The Overton Window, which describes how the range of acceptable ideas shifts over time.", "isCorrect": false, "rationale": "While relevant to shifting norms, the Overton Window describes the *public* perception of political acceptability, not directly the *insiders' experience* of continuity despite drift. Status Quo Bias is a more direct fit for internal perception of continuity."}, {"text": "Chesterton's Fence, which emphasizes understanding the purpose behind existing structures before changing them.", "isCorrect": false, "rationale": "Chesterton's Fence is presented as the antidote, focusing on maintaining or understanding fixed standards, not the phenomenon of experiencing continuity during drift."}, {"text": "The original individual-level Boiling Frog metaphor from Chapter X.", "isCorrect": false, "rationale": "While related, the individual Boiling Frog focuses on personal inattention. 'Status Quo Bias' is a more direct psychological explanation for *why* continuity is perceived despite change, as listed in the connections."}, {"text": "Status Quo Bias, which describes a psychological preference for the current state of affairs.", "isCorrect": true, "rationale": "The text links 'Status Quo Bias' to the Boiling Frog concept. The preference for the current state (the 'status quo') directly explains why insiders would experience 'continuity' and resist recognizing drift, as their perception of 'normal' aligns with the current state."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
