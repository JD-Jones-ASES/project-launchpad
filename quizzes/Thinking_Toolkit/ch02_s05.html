    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental diagnostic question one must answer before redoubling efforts when stuck?", "options": [{"text": "Am I passionate enough about this goal?", "isCorrect": false, "rationale": "While passion is related to 'grit' and effort, the text specifically identifies the 'mountain or maze' question as the fundamental diagnostic before increasing effort."}, {"text": "Is your situation a mountain or a maze?", "isCorrect": true, "rationale": "The text states, 'Before you redouble your efforts... you need to answer a fundamental diagnostic question: Is your situation a mountain or a maze?'"}, {"text": "Do I have the necessary skills to overcome this challenge?", "isCorrect": false, "rationale": "Skills are important for mountains, but this question doesn't capture the structural versus effort-responsive distinction that is central to the diagnostic."}, {"text": "Is this problem harder than problems others are facing?", "isCorrect": false, "rationale": "Comparing one's difficulty to others is not the primary diagnostic presented; the focus is on the *nature* of the problem itself."}], "id": "q01"}, {"question": "Which of the following scenarios best represents a 'maze' problem according to the definitions provided?", "options": [{"text": "Training for a marathon, where consistent running and diet lead to improved performance over time.", "isCorrect": false, "rationale": "Training for a marathon is explicitly given as an example of a 'mountain' problem, where effort and persistence are rewarded."}, {"text": "A bureaucratic Catch-22, where rules prevent progress regardless of the effort applied.", "isCorrect": true, "rationale": "The text states, '“Just try harder” is cruel advice for someone stuck in a bureaucratic Catch-22,' identifying it as a structural problem unresponsive to effort."}, {"text": "Learning to play a complex musical instrument, requiring hours of practice and dedication.", "isCorrect": false, "rationale": "Learning a musical instrument is provided as a clear example of a 'mountain' problem, which rewards sustained effort."}, {"text": "Building expertise in a demanding craft, which requires years of sustained learning and application.", "isCorrect": false, "rationale": "Building expertise in a craft or profession is another example of a 'mountain' problem, where difficulty is real but effort is rewarded."}], "id": "q02"}, {"question": "The text warns that applying 'mountain advice' to a 'maze' problem is not just ineffective but 'actively harmful.' What is a primary negative consequence highlighted?", "options": [{"text": "It leads to the person giving up too early, missing out on potential success.", "isCorrect": false, "rationale": "Giving up too early is a danger of applying 'maze advice' to a 'mountain,' not the other way around."}, {"text": "It forces the individual to switch strategies constantly, preventing deep engagement.", "isCorrect": false, "rationale": "Switching strategies is a potential response to a maze, but applying mountain advice in a maze usually means *not* switching strategies, instead doubling down on effort."}, {"text": "It blames the victim, trapping them in cycles of intensified effort, frustration, and self-blame.", "isCorrect": true, "rationale": "The text explicitly states: 'The danger of mountain advice in a maze... is that it blames the victim. If effort is the answer and you are not succeeding, the implication is that you are not trying hard enough. This can trap people in cycles of intensifying effort, mounting frustration, and deepening self-blame.'"}, {"text": "It makes the problem objectively harder to solve for everyone involved.", "isCorrect": false, "rationale": "While it makes it harder for the individual, the primary harm described is the psychological toll and misdirection of effort, particularly the aspect of victim-blaming."}], "id": "q03"}, {"question": "A first-generation college student navigating the admissions process without guidance is presented as a 'maze' problem. Why is this classification appropriate?", "options": [{"text": "Because the student simply needs to apply more effort to find the right information.", "isCorrect": false, "rationale": "The text explicitly states this is a maze because 'the system assumes knowledge and resources that she does not have. The barrier is not effort or intelligence but structural access to information and support.'"}, {"text": "Because the challenge is difficult and requires significant dedication to overcome.", "isCorrect": false, "rationale": "Difficulty and dedication are characteristics of a mountain. A maze's core issue is structural, not merely hard work."}, {"text": "Because the system itself is designed with structural barriers, assuming knowledge and resources the student lacks.", "isCorrect": true, "rationale": "The text states, 'The barrier is not effort or intelligence but structural access to information and support,' making it a classic maze where the system's structure is the problem."}, {"text": "Because the student can easily switch to a different 'maze' (e.g., a different college) if this one proves too difficult.", "isCorrect": false, "rationale": "While 'finding a different maze' is a strategy, the *reason* it's a maze is the structural barrier, not the ease of switching."}], "id": "q04"}, {"question": "Which of the following is NOT one of the diagnostic questions provided in the text to help distinguish between a mountain and a maze?", "options": [{"text": "Do other people succeed in this situation using the approach I am using?", "isCorrect": false, "rationale": "This is one of the four diagnostic questions mentioned in the text."}, {"text": "Am I making any progress at all?", "isCorrect": false, "rationale": "This is one of the four diagnostic questions mentioned in the text."}, {"text": "Is this problem causing me too much stress?", "isCorrect": true, "rationale": "While stress is a relevant factor in problem-solving, this question is not listed as one of the four diagnostic questions in the text."}, {"text": "Is the system designed to produce the outcome I want?", "isCorrect": false, "rationale": "This is one of the four diagnostic questions mentioned in the text."}], "id": "q05"}, {"question": "An employee is trying to get promoted, but the organization has a strict policy of only promoting individuals based on seniority, regardless of performance. Which diagnostic question is most relevant here, and what does it suggest?", "options": [{"text": "'Am I making any progress at all?' suggesting it's a mountain because progress is just slow.", "isCorrect": false, "rationale": "While progress might be slow, the core issue is the promotion system itself. The seniority system negates the impact of performance, making progress (based on performance) irrelevant."}, {"text": "'Do other people succeed in this situation using the approach I am using?' suggesting it's a mountain because others eventually get promoted.", "isCorrect": false, "rationale": "Others might succeed *through seniority*, not through performance. This question would suggest a maze if performance-based approaches aren't working for anyone."}, {"text": "'Would a change in strategy help, or would it just move me to a different dead end?' suggesting it's a mountain because the only strategy is persistence.", "isCorrect": false, "rationale": "Persistence in performance won't help if seniority is the sole criterion. A strategic change (e.g., finding a different organization) is implied if the structure is the problem."}, {"text": "'Is the system designed to produce the outcome I want?' suggesting it's a maze because the system doesn't reward performance.", "isCorrect": true, "rationale": "The text states: 'A promotion system that is entirely based on seniority will not reward performance, no matter how brilliant your work. Recognizing this is not cynicism; it is structural awareness.' This directly addresses the 'Is the system designed...' question and identifies it as a maze."}], "id": "q06"}, {"question": "What is the primary danger of mistakenly treating a 'mountain' problem as a 'maze'?", "options": [{"text": "It leads to blaming others for your lack of progress.", "isCorrect": false, "rationale": "Blaming others is not the primary danger identified for this specific error; self-blame is associated with applying mountain advice to a maze."}, {"text": "It encourages intensifying effort, leading to burnout without results.", "isCorrect": false, "rationale": "Intensifying effort despite no results is the danger of applying 'mountain advice' to a 'maze,' not the reverse."}, {"text": "It results in giving up too early or switching strategies when persistence was actually required.", "isCorrect": true, "rationale": "The text states: 'If you treat a mountain as a maze—if you assume the problem is structural when it is actually effort-responsive—you will give up too early. You will switch strategies, change directions, or abandon the climb when what you actually needed was to keep going.'"}, {"text": "It makes the problem less visible to others, reducing chances of support.", "isCorrect": false, "rationale": "This consequence is not highlighted in the text for this specific error."}], "id": "q07"}, {"question": "In the context of 'Systems Thinking,' what does the text imply is the crucial action when facing a 'maze' problem?", "options": [{"text": "Increase your speed and determination to find the exit faster.", "isCorrect": false, "rationale": "The text explicitly states: 'In a maze, effort alone does not help. You can run faster, but if you are running down the wrong corridor, speed just gets you to the dead end sooner.'"}, {"text": "Persist with the current approach, as breakthrough is just around the corner.", "isCorrect": false, "rationale": "Persistence with the current approach is 'mountain advice,' which is harmful in a maze."}, {"text": "Change the structure of the maze or find a different maze altogether.", "isCorrect": true, "rationale": "The key concept summary states: 'On a mountain, persist. In a maze, change the structure—or find a different maze.'"}, {"text": "Seek motivational literature to reignite your passion and focus.", "isCorrect": false, "rationale": "Motivational literature typically offers 'mountain advice,' which is ineffective and potentially harmful in a maze."}], "id": "q08"}, {"question": "A team consistently misses deadlines because their project requires approvals from seven different departments, each with its own backlog and priorities. How would the text classify this situation, and what would be the recommended approach?", "options": [{"text": "A mountain; the team needs to work harder and manage their time more efficiently.", "isCorrect": false, "rationale": "The problem is structural (too many approval layers), not a lack of effort. More effort won't resolve the bottlenecks created by the system."}, {"text": "A maze; the team needs to apply more pressure on the approving departments.", "isCorrect": false, "rationale": "While pressure might be part of a strategy, the core recommendation for a maze is to change the structure or find a different maze, not just apply more effort/pressure within the flawed structure."}, {"text": "A mountain; the team must develop better negotiation skills to accelerate the approval process.", "isCorrect": false, "rationale": "While skills are relevant for mountains, the fundamental issue here is the *number* of layers and their inherent delays, which is a structural problem."}, {"text": "A maze; the organization needs to restructure the approval process to reduce dependencies or layers.", "isCorrect": true, "rationale": "The text identifies 'too many approval layers' as an example of organizational dysfunction that makes timely delivery 'structurally impossible,' thus classifying it as a maze problem requiring structural change."}], "id": "q09"}, {"question": "The text mentions 'Inversion' (Chapter X) as a related concept, asking 'What would guarantee failure?' as a way to identify whether a problem is structural. How does this 'Inversion' method align with diagnosing a 'maze' problem?", "options": [{"text": "It helps determine if increasing effort will lead to success.", "isCorrect": false, "rationale": "Inversion, by focusing on what guarantees failure, helps identify structural issues that *prevent* success regardless of effort, which is characteristic of a maze."}, {"text": "It encourages finding the easiest path to the desired outcome.", "isCorrect": false, "rationale": "Inversion is a diagnostic tool for understanding constraints, not necessarily for finding the easiest path. It's about identifying fundamental barriers."}, {"text": "It helps identify the inherent structural obstacles or design flaws that would ensure failure, irrespective of effort or skill.", "isCorrect": true, "rationale": "If a problem is structural (a maze), certain elements 'guarantee failure' if not addressed. Inversion helps expose these fundamental, effort-resistant barriers, thereby aligning with the diagnosis of a maze."}, {"text": "It primarily applies to 'mountain' problems by clarifying the necessary steps for success.", "isCorrect": false, "rationale": "Inversion is more useful for identifying structural issues (mazes) by considering what would guarantee failure, rather than simply clarifying steps for a mountain."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
