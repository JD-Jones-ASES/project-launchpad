<script>
var QUESTIONS = [{"question": "Which statement best summarizes the core principle of Amara's Law?", "options": [{"text": "Technological advancements are always unpredictable, making all forecasts unreliable.", "isCorrect": false, "rationale": "While the timing of impact can be unpredictable, Amara's Law describes a consistent *pattern* in how we perceive technology's short-term and long-term effects, not that all forecasts are unreliable."}, {"text": "We tend to underestimate the effect of a technology in the short run and overestimate it in the long run.", "isCorrect": false, "rationale": "This reverses the core principle of Amara's Law, which states the opposite: overestimation in the short term and underestimation in the long term."}, {"text": "We tend to overestimate the effect of a technology in the short run and underestimate its effect in the long run.", "isCorrect": true, "rationale": "This statement is the precise definition of Amara's Law, highlighting the consistent pattern of inflated short-term expectations followed by a surprising, greater-than-anticipated long-term impact."}, {"text": "The impact of new technologies is consistently overestimated in both the short and long term.", "isCorrect": false, "rationale": "Amara's Law differentiates between short-term overestimation and long-term *underestimation*, not consistent overestimation."}], "id": "q01"}, {"question": "A new smart home device is launched with significant media hype, predicting it will fully automate households within two years. Five years later, adoption is slow, and many consider it a novelty. According to Amara's Law, what is the most likely long-term outcome for this technology?", "options": [{"text": "It will likely fade into obscurity as its initial promises remain unfulfilled, proving skeptics correct.", "isCorrect": false, "rationale": "This aligns with the short-term skepticism but ignores the long-term pattern of Amara's Law, where technologies often exceed expectations."}, {"text": "Its practical barriers will prove too great, and fundamental flaws will prevent any significant future impact.", "isCorrect": false, "rationale": "Amara's Law suggests that initial barriers are overcome over time, and the problem is usually perception and adoption, not fundamental flaws."}, {"text": "It will quietly integrate into daily life over the next two decades, reshaping household management in ways more profound than initially predicted.", "isCorrect": true, "rationale": "This option perfectly illustrates the long-term effect of Amara's Law: after initial short-term overestimation and a period of skepticism, the technology's true, often underestimated, impact unfolds over a longer horizon."}, {"text": "It will experience a sudden surge in adoption within the next year, finally meeting its original ambitious short-term forecasts.", "isCorrect": false, "rationale": "Amara's Law indicates that short-term forecasts are often wrong. The long-term impact unfolds gradually and consistently, not through a sudden, delayed fulfillment of initial hype."}], "id": "q02"}, {"question": "According to the text, why do we tend to overestimate the effect of a technology in the short run?", "options": [{"text": "Because the technology is fundamentally flawed and incapable of delivering on its promises.", "isCorrect": false, "rationale": "Amara's Law suggests the issue is typically with the *perception* and *adoption barriers*, not fundamental flaws in the technology itself."}, {"text": "We focus on the technology's potential while underestimating practical barriers like infrastructure, cost, and user behavior.", "isCorrect": true, "rationale": "The text explicitly states this as the reason for short-term overestimation: focusing on potential leads us to overlook the significant practical hurdles to widespread adoption."}, {"text": "Market researchers intentionally inflate expectations to generate initial sales, leading to inevitable disappointment.", "isCorrect": false, "rationale": "While marketing plays a role, the text attributes short-term overestimation to human cognitive biases regarding potential versus practical barriers, not intentional deception."}, {"text": "The rapid pace of technological change makes it impossible to accurately predict short-term outcomes.", "isCorrect": false, "rationale": "The issue is not the impossibility of prediction, but a consistent *pattern* of overestimating short-term effects due to specific cognitive biases."}], "id": "q03"}, {"question": "The text explains that long-term underestimation occurs because 'we think linearly about exponential processes.' What is the implication of thinking linearly about an exponential process?", "options": [{"text": "It means we correctly predict the steady, predictable growth of technology over long periods.", "isCorrect": false, "rationale": "Linear thinking predicts steady growth, but exponential processes accelerate rapidly, meaning linear predictions will *underestimate* the actual long-term impact."}, {"text": "It leads us to fail to account for compounding effects of infrastructure, adoption, and innovation, which accelerate impact beyond expectations.", "isCorrect": true, "rationale": "Thinking linearly prevents us from grasping how compounding factors cause exponential growth to accelerate rapidly, leading to the long-term impact vastly exceeding initial, modest projections."}, {"text": "It suggests that most people are unable to understand complex technological concepts, thus underestimating their potential.", "isCorrect": false, "rationale": "The text refers to a cognitive bias in how we *project growth*, not a lack of understanding of complex concepts."}, {"text": "It indicates that technological progress is inherently chaotic and does not follow any discernible pattern.", "isCorrect": false, "rationale": "Amara's Law describes a *predictable pattern* of perception and adoption, despite the underlying exponential growth."}], "id": "q04"}, {"question": "Which historical example from the text best illustrates the 'trough of disillusionment' phase predicted by Amara's Law for a technology?", "options": [{"text": "Henry Ford opening his first factory, ushering in the era of mass automobile production.", "isCorrect": false, "rationale": "This marks the acceleration of adoption, not a period of disillusionment."}, {"text": "The internet revolutionizing commerce and education in the 2010s, far beyond initial predictions.", "isCorrect": false, "rationale": "This represents the long-term impact exceeding expectations, *after* any trough of disillusionment."}, {"text": "The 'AI winters' of the 1970s and 1980s following the failure of earlier predictions for machines matching human intelligence.", "isCorrect": true, "rationale": "The text explicitly cites the 'AI winters' as a direct consequence of early, optimistic predictions failing to materialize, perfectly illustrating a trough of disillusionment."}, {"text": "Early automobiles being dismissed as 'toys for the rich' because they were expensive and unreliable.", "isCorrect": false, "rationale": "This describes the initial skepticism and barriers, not necessarily a widespread 'trough of disillusionment' after failed hype, but rather an early assessment that underestimated potential."}], "id": "q05"}, {"question": "What advice does Amara's Law offer to an 'enthusiast' who believes a new technology will fundamentally change the world?", "options": [{"text": "Focus all efforts on achieving immediate, widespread adoption, as failure to do so guarantees the technology's demise.", "isCorrect": false, "rationale": "Amara's Law implies that immediate widespread adoption is often difficult, and failure to meet short-term goals does not equate to long-term failure."}, {"text": "Be prepared for significant short-term disappointment and slow adoption, but remain confident in the long-term vision.", "isCorrect": true, "rationale": "The text counsels 'patience' for enthusiasts, stating 'your timeline is probably wrong even if your vision is right,' which aligns with being prepared for initial disappointment while trusting the long-term potential."}, {"text": "Downplay the technology's capabilities to avoid overhyping it and manage public expectations.", "isCorrect": false, "rationale": "The advice is about realistic timelines and patience, not necessarily downplaying the technology's true potential."}, {"text": "Seek immediate government regulation to overcome infrastructure and cost barriers as quickly as possible.", "isCorrect": false, "rationale": "While regulation can be a barrier, the text focuses on patience and the natural course of adoption, not on immediately seeking regulatory intervention as the primary advice for enthusiasts."}], "id": "q06"}, {"question": "A 'skeptic' dismisses a nascent technology, arguing that because it hasn't delivered on its much-hyped promises within a few years, it will never achieve significant impact. According to Amara's Law, what is the flaw in the skeptic's reasoning?", "options": [{"text": "They are likely underestimating the technology's short-term potential to rapidly improve and gain market share.", "isCorrect": false, "rationale": "The skeptic is likely *correct* about the short-term overestimation, but wrong about the long-term implications. Amara's Law doesn't suggest short-term potential is underestimated."}, {"text": "They fail to recognize that the gap between early hype and eventual impact is a normal phase of technological adoption, not evidence of failure.", "isCorrect": true, "rationale": "The text explicitly states: 'The fact that a technology has not yet delivered on its promises does not mean it never will. The gap between early hype and eventual impact is not evidence of failure. It is the normal shape of technological adoption.' This is the counsel of 'humility' for skeptics."}, {"text": "They are not considering the possibility that the technology's developers might abandon it if it fails early.", "isCorrect": false, "rationale": "Amara's Law focuses on the adoption pattern, not the likelihood of developers abandoning a project, and the 'normal shape' implies it *persists* despite early failures."}, {"text": "They are correctly identifying fundamental flaws that prevent the technology from ever becoming viable.", "isCorrect": false, "rationale": "Amara's Law suggests that initial barriers are practical and surmountable, not necessarily fundamental flaws indicating non-viability."}], "id": "q07"}, {"question": "The text mentions the automobile as another example of Amara's Law. Which observation best reflects its initial 'short-term overestimation' or early skepticism?", "options": [{"text": "Within a generation, the automobile had reshaped cities and created suburbs.", "isCorrect": false, "rationale": "This describes the *long-term impact* of the automobile, far exceeding initial expectations, not the short-term overestimation or skepticism."}, {"text": "Many observers dismissed early cars as 'toys for the rich' because they were expensive, unreliable, and slower than horses.", "isCorrect": true, "rationale": "This directly illustrates the initial skepticism and underestimation of the automobile's potential due to its early limitations, reflecting the short-term perception aspect of Amara's Law."}, {"text": "Henry Ford's first factory revolutionized production methods and made cars accessible to the masses.", "isCorrect": false, "rationale": "This is a key development that led to the automobile's eventual long-term impact, not an observation of its early perceived limitations."}, {"text": "The automobile transformed warfare and generated entirely new industries.", "isCorrect": false, "rationale": "These are examples of the profound, long-term societal changes brought by the automobile, which were largely unanticipated initially."}], "id": "q08"}, {"question": "The 'keyconcept' section highlights 'Short-Term Overestimation, Long-Term Underestimation' and states 'The pattern is predictable; the timing is not.' What does this imply for innovators and investors?", "options": [{"text": "They should only invest in technologies that show immediate, rapid growth within their first few years.", "isCorrect": false, "rationale": "This contradicts Amara's Law, which suggests that initially underwhelming performance is common, and true impact takes longer to materialize."}, {"text": "They can anticipate the general arc of a technology's adoption (initial hype, then slow growth, then acceleration), but cannot reliably predict *when* major breakthroughs or widespread adoption will occur.", "isCorrect": true, "rationale": "This accurately reflects the statement. The pattern (overestimation then underestimation leading to eventual significant impact) is predictable, but the specific timeline for its unfolding is not."}, {"text": "They should prioritize technologies with clear, quantifiable short-term benefits over those with ambiguous long-term potential.", "isCorrect": false, "rationale": "This would lead to missing out on technologies with massive long-term potential simply because their short-term benefits are hard to quantify or are overshadowed by barriers."}, {"text": "They should expect every new technology to follow a perfectly linear growth path, with predictable returns on investment.", "isCorrect": false, "rationale": "Amara's Law specifically addresses how we *misunderstand* the non-linear, exponential nature of technological impact, making linear expectations incorrect."}], "id": "q09"}, {"question": "According to Amara's Law, the 'gap between early hype and eventual impact is not evidence of failure. It is the normal shape of technological adoption.' What is a critical takeaway from this 'normal shape' for evaluating emerging technologies?", "options": [{"text": "Most emerging technologies are destined to fail, so skepticism is always the most prudent approach.", "isCorrect": false, "rationale": "Amara's Law suggests that many technologies, despite early failures to meet hype, go on to have profound long-term impacts, contradicting universal skepticism as prudent."}, {"text": "Rapid, widespread adoption in the first few years is the only true indicator of a technology's revolutionary potential.", "isCorrect": false, "rationale": "This contradicts the short-term overestimation aspect; technologies with revolutionary potential often face significant barriers in their early years."}, {"text": "Patience and a long-term perspective are essential, as initial slow progress or disappointment does not preclude massive future impact.", "isCorrect": true, "rationale": "This option directly captures the essence of the 'normal shape' – understanding that the initial phase of unmet hype is part of the journey, requiring patience for the significant long-term impact to unfold."}, {"text": "Technologies that do not deliver on their initial promises should be abandoned quickly in favor of more promising alternatives.", "isCorrect": false, "rationale": "This goes against the advice of patience and humility for skeptics, as initial failure to deliver on promises is normal, not a sign to abandon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
