        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of David Hilbert's Grand Hotel thought experiment?", "options": [{"text": "To prove that hotels can accommodate an infinite number of guests with clever management.", "isCorrect": false, "rationale": "While the hotel does accommodate guests, the thought experiment's purpose is not to offer practical management solutions, but to illustrate a mathematical concept."}, {"text": "To illustrate the counterintuitive properties of infinite sets.", "isCorrect": true, "rationale": "The text explicitly states that Hilbert used the hotel 'to illustrate the counterintuitive properties of infinite sets, building on Georg Cantor's revolutionary work'."}, {"text": "To demonstrate the limits of Georg Cantor's theories on infinity.", "isCorrect": false, "rationale": "The experiment builds on and validates Cantor's work, rather than limiting it. It applies Cantor's definitions of infinite sets."}, {"text": "To propose a practical solution for overbooked establishments.", "isCorrect": false, "rationale": "The text specifies it is a 'thought experiment' and 'not a blueprint for the hospitality industry', indicating it's not a practical solution."}], "id": "q01"}, {"question": "When a single weary traveler arrives at Hilbert's Grand Hotel, which is initially full, how does the manager create a vacant room?", "options": [{"text": "She builds an additional room for the traveler.", "isCorrect": false, "rationale": "The hotel has a fixed, albeit infinite, number of rooms. No new rooms are constructed in the scenario."}, {"text": "She asks the guest in Room 1 to move to Room 2, making Room 1 available.", "isCorrect": false, "rationale": "This is only part of the solution; if only Room 1's guest moves, Room 2 would become double-occupied. A chain reaction is required."}, {"text": "She instructs every guest in Room n to move to Room n+1, thereby vacating Room 1.", "isCorrect": true, "rationale": "The text describes this exact mechanism: 'Please move from your current room to the room with the next higher number. Room n moves to Room n+1.' This vacates Room 1."}, {"text": "She assigns the new traveler to share a room with an existing guest.", "isCorrect": false, "rationale": "The text explicitly states: 'No one was displaced. No one is sharing. Everyone has a private room, and so does the newcomer.'"}], "id": "q02"}, {"question": "If an infinitely long bus arrives with infinitely many new guests, how does Hilbert's Grand Hotel accommodate them without displacing existing guests?", "options": [{"text": "All existing guests are asked to check out to make room for the new arrivals.", "isCorrect": false, "rationale": "The hotel accommodates new guests without any existing guests being displaced, as stated in the text."}, {"text": "Existing guests move from Room n to Room 2n, leaving all odd-numbered rooms vacant for the new guests.", "isCorrect": true, "rationale": "This is the precise method described: 'All current guests, please move from Room n to Room 2n.' This leaves all odd-numbered rooms empty, providing infinite new rooms for the infinite new guests."}, {"text": "Existing guests are moved to rooms with numbers less than their current room, creating space at the higher end.", "isCorrect": false, "rationale": "Guests are moved to higher-numbered rooms (2n), not lower. Moving to lower-numbered rooms would not free up consecutive rooms in the way required."}, {"text": "The manager simply declares the hotel 'full' and turns the bus away, as infinite capacity is impossible.", "isCorrect": false, "rationale": "The central point of the thought experiment is to show that a 'full' infinite hotel *can* accommodate more, hence demonstrating the counterintuitive nature of infinity."}], "id": "q03"}, {"question": "The 'key insight' behind Hilbert's Hotel regarding the nature of infinity is best summarized as:", "options": [{"text": "Infinite sets are merely very large finite sets and behave similarly in most respects.", "isCorrect": false, "rationale": "The text states: 'infinity does not behave like a very large number. It behaves like something qualitatively different.'"}, {"text": "For infinite sets, a proper subset can have the same 'size' (cardinality) as the original set, unlike finite sets.", "isCorrect": true, "rationale": "This is the core insight explained in the text: 'For finite sets, the whole is always greater than the part... But for infinite sets, this rule breaks down.'"}, {"text": "Infinity implies that any hotel can always add more rooms if needed.", "isCorrect": false, "rationale": "The thought experiment deals with rearranging existing infinite rooms, not adding new physical rooms. This focuses too much on the literal hotel analogy."}, {"text": "The concept of 'full' is meaningless when discussing infinite quantities.", "isCorrect": false, "rationale": "While the hotel can accommodate more guests even when 'full,' the *reason* for this is the breakdown of the 'whole is greater than the part' rule, which option B directly addresses."}], "id": "q04"}, {"question": "According to Georg Cantor, what does it mean for two sets to have the same cardinality?", "options": [{"text": "Both sets contain an infinite number of elements.", "isCorrect": false, "rationale": "While both sets may be infinite, this definition doesn't distinguish between different 'sizes' of infinity (e.g., countable vs. uncountable), which Cantor's work does."}, {"text": "Their elements can be placed into a one-to-one correspondence, with nothing left over.", "isCorrect": true, "rationale": "The text states: 'Cantor defined two sets as having the same cardinality (the same “size”) if their elements can be placed in one-to-one correspondence.'"}, {"text": "They occupy the same amount of space on a number line.", "isCorrect": false, "rationale": "Cardinality is a measure of the 'number' of elements, not their spatial arrangement or density on a number line."}, {"text": "When elements are removed from both sets, they remain equally large.", "isCorrect": false, "rationale": "The 'Think About It' section illustrates that 'infinity minus infinity' can yield different results, showing that simple subtraction doesn't reliably maintain 'equality' in this sense."}], "id": "q05"}, {"question": "Which of the following sets is *not* described as having the same cardinality as the natural numbers (aleph-null) in the text?", "options": [{"text": "The set of even numbers.", "isCorrect": false, "rationale": "The text explicitly states that 'the set of even numbers... is a proper subset of the natural numbers... And yet the two sets have the same “size”' (aleph-null)."}, {"text": "The set of odd numbers.", "isCorrect": false, "rationale": "By extension, if even numbers have the same cardinality, and the natural numbers can be put into one-to-one correspondence with themselves minus one (as in the first scenario), then the odd numbers also have aleph-null cardinality."}, {"text": "The set of rational numbers.", "isCorrect": false, "rationale": "The text states: 'the natural numbers, the even numbers, the odd numbers, the integers, and even the rational numbers all have the same cardinality — a size called aleph-null.'"}, {"text": "The set of real numbers.", "isCorrect": true, "rationale": "The text clearly states: 'the real numbers... have a strictly larger infinity.' This is distinguished from the countable infinity of the natural numbers."}], "id": "q06"}, {"question": "Cantor's diagonal argument fundamentally demonstrated which revolutionary concept about infinity?", "options": [{"text": "That all infinite sets, no matter how vast, ultimately have the same size.", "isCorrect": false, "rationale": "The diagonal argument proved the exact opposite: that some infinities are larger than others."}, {"text": "That it's possible to construct a hierarchy of infinities, where some infinities are strictly larger than others.", "isCorrect": true, "rationale": "The text states: 'One of Cantor's most stunning discoveries was that the answer is no... The real numbers... have a strictly larger infinity. This means there is not just “infinity” but a hierarchy of infinities.'"}, {"text": "That numbers cannot be accurately represented on an infinite list.", "isCorrect": false, "rationale": "The argument shows that *any* attempt to list *all* real numbers between 0 and 1 will always miss at least one, proving the uncountability, not the inaccuracy of listing."}, {"text": "That certain mathematical problems are undecidable, even with infinite computational power.", "isCorrect": false, "rationale": "While related to the limits of mathematical systems, this concept is more directly associated with G\"odel's incompleteness theorems, which are mentioned later in the 'connections' box, not Cantor's diagonal argument specifically."}], "id": "q07"}, {"question": "The 'Think About It' section presents two scenarios where 'infinity minus infinity' yields different results (infinity vs. 5). What is the primary lesson this variant illustrates?", "options": [{"text": "It is impossible to subtract infinite quantities in mathematics.", "isCorrect": false, "rationale": "The scenarios show that 'subtraction' of infinities can lead to results, but not in a consistent, finite-arithmetic way."}, {"text": "The result of 'infinity minus infinity' is undefined and depends entirely on the specific infinite sets being considered.", "isCorrect": true, "rationale": "The key concept demonstrated is that standard arithmetic rules do not apply to infinity; the outcome of 'infinity minus infinity' is indeterminate and depends on how the infinite quantities are defined or constructed (which elements are removed)."}, {"text": "For infinite sets, subtraction is only meaningful if the remaining set is finite.", "isCorrect": false, "rationale": "One example resulted in an infinite set remaining, so this statement is incorrect."}, {"text": "In an infinite hotel, the number of guests remaining after some leave is always random.", "isCorrect": false, "rationale": "The results are not random; they are specific and predictable based on the rule applied for guests checking out, but inconsistent with finite arithmetic."}], "id": "q08"}, {"question": "The mathematics underpinning Hilbert's Hotel and Cantor's work on infinite sets has practical consequences in which of the following real-world fields?", "options": [{"text": "Only in theoretical mathematics, with no applications outside of academia.", "isCorrect": false, "rationale": "The 'realworld' box explicitly details practical applications."}, {"text": "Hospitality management, by providing strategies for overbooked hotels.", "isCorrect": false, "rationale": "The text states it's 'not a blueprint for the hospitality industry' and is a 'thought experiment'."}, {"text": "Modern computing (computability theory), cryptography, and physics (nature of spacetime).", "isCorrect": true, "rationale": "The 'realworld' box directly lists these fields: 'It underpins modern computing (the theory of computability rests on countability arguments), cryptography (the security of encryption schemes depends on the structure of number sets), and physics (the question of whether spacetime is continuous or discrete is fundamentally a question about infinity).'"}, {"text": "Economic modeling of infinite growth markets.", "isCorrect": false, "rationale": "This specific application is not mentioned in the provided text."}], "id": "q09"}, {"question": "Based on the entirety of the 'Hilbert's Grand Hotel' section, what is the most fundamental characteristic of infinite quantities demonstrated?", "options": [{"text": "Infinite quantities are simply very, very large finite numbers, and behave largely the same.", "isCorrect": false, "rationale": "The text repeatedly emphasizes that 'infinity does not behave like a very large number' and 'defies ordinary arithmetic'."}, {"text": "Infinite sets can appear 'full' yet still accommodate additional elements by rearrangement, defying finite intuitions and ordinary arithmetic.", "isCorrect": true, "rationale": "This option synthesizes the core message from the 'key concept' box and the hotel scenarios, highlighting how infinity violates finite intuitions and the rules of ordinary arithmetic while still allowing for seemingly impossible accommodations."}, {"text": "The concept of 'size' or 'fullness' is entirely subjective and not mathematically definable for infinite sets.", "isCorrect": false, "rationale": "Cantor's work on cardinality precisely defines the 'size' of infinite sets, making it a mathematically objective concept, not subjective."}, {"text": "The number of elements in an infinite set can always be precisely counted, given enough time.", "isCorrect": false, "rationale": "The text explains Cantor's discovery of 'uncountably infinite' sets (like real numbers), which cannot be precisely counted or listed, even theoretically."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
