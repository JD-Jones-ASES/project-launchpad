<script>
var QUESTIONS = [{"question": "Which of the following best defines hindsight bias, as described in the text?", "options": [{"text": "The tendency to selectively remember information that confirms one's existing beliefs.", "isCorrect": false, "rationale": "This describes confirmation bias, a related concept mentioned in the 'connections' section, but not the primary definition of hindsight bias itself."}, {"text": "The illusion that an event was more predictable or obvious after its outcome has become known.", "isCorrect": true, "rationale": "The text states that hindsight bias is when 'once people know the outcome of an event, they systematically overestimate how predictable that outcome was,' also calling it the 'knew-it-all-along effect.'"}, {"text": "The error of underestimating the time and resources required to complete future tasks.", "isCorrect": false, "rationale": "This describes the planning fallacy, another related concept mentioned in the 'connections' section, distinct from hindsight bias."}, {"text": "The psychological phenomenon of experiencing a situation or event that feels familiar, even if it is new.", "isCorrect": false, "rationale": "This describes déjà vu, which is not mentioned or related to hindsight bias in the provided text."}], "id": "q01"}, {"question": "According to the text, who is credited with experimentally demonstrating hindsight bias?", "options": [{"text": "Daniel Kahneman", "isCorrect": false, "rationale": "Kahneman is a prominent psychologist in behavioral economics, but the text specifically attributes the experimental demonstration of hindsight bias to someone else."}, {"text": "Baruch Fischhoff", "isCorrect": true, "rationale": "The text explicitly states, 'Experimentally demonstrated by Baruch Fischhoff in a series of studies beginning in 1975.'"}, {"text": "Amos Tversky", "isCorrect": false, "rationale": "Tversky was a collaborator with Kahneman, but the text attributes the specific studies on hindsight bias to a different researcher."}, {"text": "Richard Thaler", "isCorrect": false, "rationale": "Thaler is a Nobel laureate in economics known for his work in behavioral economics, but not for the initial experimental demonstration of hindsight bias according to the text."}], "id": "q02"}, {"question": "How does the brain primarily facilitate hindsight bias, as explained in the section?", "options": [{"text": "By consciously fabricating false memories to protect one's self-image.", "isCorrect": false, "rationale": "The text explicitly states that hindsight bias 'is not a deliberate lie' and the process is 'unconsciously' done, not a conscious fabrication."}, {"text": "By unconsciously reorganizing past information to make known outcomes appear more foreseeable and coherent.", "isCorrect": true, "rationale": "The text explains, 'Your brain, confronted with the known outcome, automatically reorganizes the evidence to make that outcome look foreseeable... The narrative is cleaned up, the ambiguity removed, and the past is transformed into a tidy story.'"}, {"text": "By actively suppressing all information that contradicts the known outcome.", "isCorrect": false, "rationale": "While contradictory facts fade, the text describes a reorganization and salience of supporting facts, rather than an active, total suppression of all contradictory information."}, {"text": "By creating a deliberate and justified narrative to explain why an event had to happen.", "isCorrect": false, "rationale": "The text emphasizes that the process is 'unconsciously' done and is a 'genuine failure of memory,' not a deliberate creation of a justified narrative."}], "id": "q03"}, {"question": "An executive reviews a failed product launch. Knowing the product failed, they conclude that the initial decision to greenlight the project was 'obviously wrong' and fire the project manager, despite the fact that market data at the time suggested it was a reasonable risk. This scenario best illustrates:", "options": [{"text": "Confirmation bias", "isCorrect": false, "rationale": "Confirmation bias involves seeking and interpreting evidence to confirm existing beliefs, not re-evaluating past decisions based on a known outcome."}, {"text": "The planning fallacy", "isCorrect": false, "rationale": "The planning fallacy refers to underestimating the time or resources needed for future tasks, which is not the core issue in this scenario."}, {"text": "Hindsight bias", "isCorrect": true, "rationale": "This is a direct application of the text's example: 'In corporate boardrooms, executives who know a project failed judge the original decision as obviously flawed, firing the people responsible — even when the original decision was perfectly reasonable given the information available at the time.'"}, {"text": "The Black Swan theory", "isCorrect": false, "rationale": "The Black Swan theory deals with genuinely unpredictable, high-impact events, but hindsight bias is about perceiving past events as predictable, not the nature of the event itself."}], "id": "q04"}, {"question": "A significant negative consequence of hindsight bias, particularly for personal and organizational growth, is that it:", "options": [{"text": "Causes individuals to be overly optimistic about future challenges.", "isCorrect": false, "rationale": "While hindsight bias can lead to overconfidence, the text emphasizes how it prevents learning from past events, rather than directly causing generalized optimism about future challenges."}, {"text": "Prevents genuine learning by creating an illusion of prior knowledge and making outcomes seem inevitable.", "isCorrect": true, "rationale": "The text explicitly states, 'Hindsight bias also sabotages learning. If every outcome feels predictable after the fact, then there is nothing to learn from it — you 'already knew.' The illusion of foresight prevents the genuine analysis...'"}, {"text": "Leads to an increased willingness to take irrational risks.", "isCorrect": false, "rationale": "The text does not suggest that hindsight bias directly leads to increased risk-taking; instead, it focuses on distorted evaluations of past risks and outcomes."}, {"text": "Makes people more skeptical of expert opinions and advice.", "isCorrect": false, "rationale": "Hindsight bias makes people feel more 'prescient' themselves, which might lead them to *trust* their own retrospective judgment more, rather than making them broadly skeptical of all expert opinions."}], "id": "q05"}, {"question": "Which statement accurately describes the nature of hindsight bias, according to the text?", "options": [{"text": "It is a conscious distortion of past events to avoid blame or embarrassment.", "isCorrect": false, "rationale": "The text explicitly states, 'Hindsight bias is not a deliberate lie.'"}, {"text": "It is a deliberate attempt to appear more intelligent or prescient to others.", "isCorrect": false, "rationale": "The text describes it as an 'unconscious' process and a 'genuine failure of memory,' not a deliberate act of impression management."}, {"text": "It is an unconscious memory reconstruction that makes past outcomes seem more foreseeable than they actually were.", "isCorrect": true, "rationale": "The text explains it as an 'unconsciously' rewritten past and a 'genuine failure of memory' where the brain 'automatically reorganizes the evidence to make that outcome look foreseeable.'"}, {"text": "It is a form of self-deception that involves actively denying past mistakes.", "isCorrect": false, "rationale": "While it can make one seem more prescient, the text frames it as an unconscious memory process rather than an active denial or intentional self-deception."}], "id": "q06"}, {"question": "Based on the text, what is presented as an effective antidote to hindsight bias?", "options": [{"text": "Consulting more expert opinions after an event has occurred.", "isCorrect": false, "rationale": "Consulting experts after an event might provide more information, but it doesn't directly address the memory distortion that causes hindsight bias."}, {"text": "Actively challenging one's initial reactions to known outcomes.", "isCorrect": false, "rationale": "While critical thinking is good, the text provides a more specific and proactive method."}, {"text": "Recording one's predictions before an event's outcome is known and then honestly comparing them afterwards.", "isCorrect": true, "rationale": "The 'keyconcept' section states, 'The antidote is to record your predictions before you know the outcome — and then honestly compare.'"}, {"text": "Focusing solely on the outcome itself, ignoring prior conditions.", "isCorrect": false, "rationale": "This approach would exacerbate hindsight bias by preventing a balanced evaluation of prior information and conditions."}], "id": "q07"}, {"question": "How does hindsight bias specifically impact evaluations in professional settings like courtrooms or strategic reviews?", "options": [{"text": "It encourages a more objective and fair assessment of past decisions.", "isCorrect": false, "rationale": "The text states it leads to being 'too harsh in judging others' past decisions' and 'distorts our understanding of strategic competence,' indicating a lack of objectivity and fairness."}, {"text": "It makes it easier to understand the full context of a decision at the time it was made.", "isCorrect": false, "rationale": "It removes ambiguity and cleans up the narrative, making it harder, not easier, to appreciate the original context and uncertainty."}, {"text": "It leads to judging past behavior and decisions as more flawed or reckless simply because the negative outcome is known.", "isCorrect": true, "rationale": "The text provides examples: 'jurors who know that a defendant caused harm judge the defendant's prior behavior as more reckless' and 'executives who know a project failed judge the original decision as obviously flawed.'"}, {"text": "It promotes a greater appreciation for the uncertainty faced by decision-makers in the past.", "isCorrect": false, "rationale": "Hindsight bias removes ambiguity and makes the past seem like a 'tidy story with a clear trajectory,' thereby diminishing appreciation for past uncertainty."}], "id": "q08"}, {"question": "The text suggests that hindsight bias can lead to overconfidence in one's ability to predict the future because:", "options": [{"text": "It reinforces the belief that one consistently 'knew it all along,' even when they didn't, creating an illusion of foresight.", "isCorrect": true, "rationale": "The text states, 'The illusion of foresight prevents the genuine analysis... This makes us overconfident in our ability to foresee the future.'"}, {"text": "It encourages individuals to seek out more information before making future predictions.", "isCorrect": false, "rationale": "If one 'already knew' everything, there's less perceived need to seek out more information, counter to genuine learning."}, {"text": "It allows for a more accurate assessment of unpredictable 'Black Swan' events.", "isCorrect": false, "rationale": "The text notes that Black Swans are explained away in hindsight, implying that hindsight bias distorts, rather than improves, the assessment of truly unpredictable events."}, {"text": "It sharpens one's analytical skills by revealing genuine patterns in past events.", "isCorrect": false, "rationale": "Hindsight bias creates an illusion of a tidy, predictable past, which isn't the same as genuinely sharpened analytical skills or uncovering objective patterns."}], "id": "q09"}, {"question": "After a major technological innovation fails to gain market traction, a pundit remarks, 'It was clear from the start that this product wouldn't succeed; the company should have seen the obvious flaws.' This statement exemplifies hindsight bias primarily because the pundit:", "options": [{"text": "Is demonstrating a deep understanding of market dynamics.", "isCorrect": false, "rationale": "While the pundit might have market understanding, the statement's certainty *after* the outcome is characteristic of hindsight bias, not necessarily genuine foresight."}, {"text": "Is using knowledge of the outcome to reconstruct the past predictability of the event.", "isCorrect": true, "rationale": "The pundit's claim that the failure was 'clear from the start' after it has already happened is a classic manifestation of the 'knew-it-all-along effect' and 'reconstructing memory of prior beliefs' to make the outcome seem predictable."}, {"text": "Is correctly identifying the actual cause of the product's failure.", "isCorrect": false, "rationale": "Hindsight bias is about the perception of predictability, not necessarily the accuracy of the causal analysis. The text shows the crash was *not* obvious before it happened."}, {"text": "Is highlighting the importance of thorough market research before product launches.", "isCorrect": false, "rationale": "While important, the statement's emphasis is on the supposed 'obviousness' of the failure *in retrospect*, which is the hallmark of hindsight bias, not a call for better research."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
