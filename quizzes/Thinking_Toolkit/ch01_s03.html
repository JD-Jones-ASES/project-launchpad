    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines the rhetorical tactic of 'moving the goalposts'?", "options": [{"text": "Stating clear success criteria at the outset of an argument and adhering to them.", "isCorrect": false, "rationale": "This describes the antidote to moving the goalposts, not the tactic itself."}, {"text": "Redefining the standard of success or sufficiency after the original, previously agreed-upon criteria have already been met.", "isCorrect": true, "rationale": "This option precisely matches the core definition provided in the text: 'changing the criteria for success after the original criteria have been met.'"}, {"text": "Refusing to engage in an argument unless all criteria for success are explicitly pre-defined and documented.", "isCorrect": false, "rationale": "While related to the antidote, this is not the definition of moving the goalposts; it's a defensive measure against it."}, {"text": "Conceding a point in an argument only after overwhelming and undeniable evidence has been presented.", "isCorrect": false, "rationale": "This describes a reasonable response to evidence, which is the opposite of the bad faith implied by moving the goalposts."}]}, {"question": "A team completes a project on time and under budget, meeting all stated objectives. Their manager then says, 'That's great, but did it significantly enhance our market share by at least 5%?' This scenario is an example of which informal logical tactic?", "options": [{"text": "Ad hominem", "isCorrect": false, "rationale": "Ad hominem attacks the person, not their achievement or argument."}, {"text": "Straw man fallacy", "isCorrect": false, "rationale": "A straw man misrepresents an opponent's argument to make it easier to attack, which is not what the manager is doing here."}, {"text": "Moving the goalposts", "isCorrect": true, "rationale": "The manager shifts the criterion for success (from meeting objectives, time, and budget to market share) after the initial goals were already achieved."}, {"text": "Appeal to emotion", "isCorrect": false, "rationale": "An appeal to emotion attempts to manipulate feelings rather than logic, which is not evident in the manager's statement."}]}, {"question": "What is the primary distinction between moving the goalposts as a 'deliberate rhetorical tactic' versus an 'unconscious defense mechanism'?", "options": [{"text": "The deliberate tactic is always successful in misleading, while the unconscious one rarely achieves its aim.", "isCorrect": false, "rationale": "The text does not discuss the success rate of either manifestation, but rather their underlying intent."}, {"text": "The deliberate tactic involves a conscious strategy to avoid conceding a point, whereas the unconscious defense protects a cherished belief without a conscious intent to deceive or manipulate.", "isCorrect": true, "rationale": "The text explains that the deliberate tactic is a 'form of bad faith' to avoid conceding, while the unconscious defense is a 'genuine psychological defense' to protect a belief, where one 'genuinely feel[s] that the new evidence is 'not quite enough''."}, {"text": "The unconscious defense is exclusively used in personal relationships, while the deliberate tactic is reserved for formal debates.", "isCorrect": false, "rationale": "While contexts may vary, the text does not specify exclusive domains for each manifestation."}, {"text": "Only the deliberate tactic is related to confirmation bias, as the unconscious form relies on other cognitive biases.", "isCorrect": false, "rationale": "The text explicitly states that the unconscious pattern is 'closely related to confirmation bias' and 'is what confirmation bias looks like in a conversation'."}]}, {"question": "According to the text, what is the most reliable test for determining if someone is genuinely asking good questions or 'moving the goalposts' in an argument?", "options": [{"text": "Observing if the person displays any emotional signs of frustration or anger during the discussion.", "isCorrect": false, "rationale": "Emotional cues can be misleading and are not presented as the primary test in the text."}, {"text": "Checking whether they clearly stated their criteria for being convinced before the evidence was presented.", "isCorrect": true, "rationale": "The text explicitly states: 'The test for whether someone is genuinely asking good questions or moving the goalposts is this: Did they state their criteria for being convinced before the evidence was presented?'"}, {"text": "Analyzing the number of specific details and follow-up questions they ask about the evidence.", "isCorrect": false, "rationale": "While detailed questions can be part of a genuine inquiry, the number alone does not determine intent; the *timing* of the criteria shift is key."}, {"text": "Determining if the new criteria they introduce are objectively more challenging than the previous ones.", "isCorrect": false, "rationale": "The difficulty of the new criteria is not the key factor; the shift itself, especially after initial criteria are met, indicates moving the goalposts."}]}, {"question": "How does 'moving the goalposts' relate to 'confirmation bias'?", "options": [{"text": "They are unrelated concepts; one is a rhetorical tactic, the other a cognitive bias.", "isCorrect": false, "rationale": "The text explicitly states they are closely related."}, {"text": "Moving the goalposts is a specific observable behavior that manifests or 'looks like' confirmation bias in a conversational setting.", "isCorrect": true, "rationale": "The text directly states: 'Moving the goalposts is what confirmation bias looks like in a conversation.'"}, {"text": "Confirmation bias primarily prevents individuals from moving the goalposts by anchoring them to their initial beliefs.", "isCorrect": false, "rationale": "Confirmation bias, by favoring existing beliefs, can *cause* one to move the goalposts to protect those beliefs, not prevent it."}, {"text": "Moving the goalposts is a tactic used to overcome one's own confirmation bias.", "isCorrect": false, "rationale": "It's the opposite; it's a manifestation of confirmation bias, not a tool to overcome it."}]}, {"question": "In the context of conspiracy theories, how does the 'moving the goalposts' tactic typically operate?", "options": [{"text": "It helps simplify complex conspiracy narratives by filtering out irrelevant information.", "isCorrect": false, "rationale": "It complicates by reinterpreting counter-evidence rather than simplifying."}, {"text": "It enables proponents to absorb any disconfirming evidence into the conspiracy narrative itself, making the theory appear unfalsifiable.", "isCorrect": true, "rationale": "The text explains: 'Present evidence against the conspiracy, and the conspiracy theorist incorporates the evidence into the conspiracy... The theory is unfalsifiable not because it is true but because every possible piece of evidence is reinterpreted as confirmation.'"}, {"text": "It ensures that only evidence from official, government-approved sources is considered valid proof of the conspiracy.", "isCorrect": false, "rationale": "Conspiracy theories often reject official sources; moving the goalposts reinterprets all evidence, regardless of source."}, {"text": "It leads to the rapid disproof of conspiracy theories by constantly adjusting the criteria for evidence.", "isCorrect": false, "rationale": "It has the opposite effect, making theories impervious to disproof."}]}, {"question": "When the text describes a theory as 'unfalsifiable' due to moving the goalposts, what is the key implication, according to Karl Popper's criterion?", "options": [{"text": "The theory is definitively true because it cannot be disproven by any available evidence.", "isCorrect": false, "rationale": "Unfalsifiability means it cannot be tested or disproven, not that it is true. The text specifically states, 'not because it is true'."}, {"text": "The theory cannot, even in principle, be disproven by any empirical evidence, suggesting it is a commitment rather than a testable claim about the world.", "isCorrect": true, "rationale": "The text explains this directly: 'a claim that cannot, even in principle, be disproven by any evidence is not a claim about the world. It is a commitment masquerading as a hypothesis.'"}, {"text": "The theory is so complex that it requires an infinite amount of evidence to be fully understood.", "isCorrect": false, "rationale": "The issue is not complexity or quantity of evidence, but the ability to test and potentially disprove."}, {"text": "The theory is universally accepted due to its robustness against all counter-arguments.", "isCorrect": false, "rationale": "Unfalsifiable theories are often dismissed by the scientific community because they lack empirical testability."}]}, {"question": "According to the 'keyconcept' summary, what is the primary antidote or recommended strategy to counter the 'moving the goalposts' tactic?", "options": [{"text": "To immediately disengage from any argument where the criteria for success are not perfectly clear at the outset.", "isCorrect": false, "rationale": "While establishing clear criteria is important, immediately disengaging might be an extreme measure not presented as the primary antidote."}, {"text": "To consistently demand even stronger evidence than what the opponent requests, thereby reversing the tactic.", "isCorrect": false, "rationale": "This would likely be a form of moving the goalposts oneself, escalating the issue rather than resolving it."}, {"text": "To define clear and agreed-upon success criteria *before* examining any evidence and to hold oneself to the same standard.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'The antidote is to define success criteria before examining the evidence—and to hold yourself to the same standard you demand of others.'"}, {"text": "To appeal to a neutral third party to mediate and establish fair criteria for the argument.", "isCorrect": false, "rationale": "While mediation can be helpful, it is not explicitly mentioned as the primary antidote in the text's key concept."}]}, {"question": "In the political argument example ('A: “The new policy has reduced crime by 15%.” B: “But has it reduced violent crime?”'), what does B's continuous shifting of criteria primarily reveal about their underlying intention?", "options": [{"text": "B is genuinely seeking a comprehensive and nuanced understanding of the policy's full impact.", "isCorrect": false, "rationale": "The text states, 'B has no intention of being persuaded,' which contradicts genuine inquiry."}, {"text": "B is attempting to gather as much data as possible from A before forming a conclusive opinion.", "isCorrect": false, "rationale": "While data is being gathered, the text indicates the purpose is not persuasion but evasion of concession."}, {"text": "B has no intention of being persuaded by any evidence, as they will continually redefine what constitutes sufficient proof.", "isCorrect": true, "rationale": "The text explains this pattern: 'B has no intention of being persuaded. No evidence will ever be sufficient, because the standard of sufficiency is being redefined at each step.'"}, {"text": "B believes A is deliberately presenting misleading statistics and is trying to expose the deception.", "isCorrect": false, "rationale": "The text does not suggest B thinks A is lying, but rather B is unwilling to be convinced, regardless of the evidence's veracity."}]}, {"question": "What is the ultimate consequence for an individual or entity attempting to meet criteria when the 'moving the goalposts' tactic is consistently employed against them?", "options": [{"text": "They are forced to develop more flexible and adaptable strategies for future engagements.", "isCorrect": false, "rationale": "While they might adapt, the core negative impact is not about improved strategy but invalidation."}, {"text": "Their achievements are continually invalidated, making genuine success or satisfaction with their efforts impossible to attain.", "isCorrect": true, "rationale": "The text states: 'No achievement is ever sufficient, because the standard of sufficiency is redefined the moment you meet it.' This leads to perpetual invalidation and unattainability of success."}, {"text": "They gain a deeper understanding of the complexities and nuances of the argument or task at hand.", "isCorrect": false, "rationale": "The tactic aims to frustrate and invalidate, not to foster deeper understanding for the target."}, {"text": "They are encouraged to set even higher and more ambitious standards for themselves in future endeavors.", "isCorrect": false, "rationale": "Such constant invalidation is more likely to lead to demotivation and disillusionment rather than increased ambition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
