<script>
var QUESTIONS = [{"question": "What is the fundamental principle of Occam's Razor as described in the text?", "options": [{"text": "Always choose the explanation that requires the least amount of supporting evidence.", "isCorrect": false, "rationale": "Occam's Razor doesn't focus on the *amount of evidence* required but on the *number of assumptions* when evidence is equally accounted for. It's about parsimony of entities/causes, not ease of evidence gathering."}, {"text": "When two explanations account for the same evidence, prefer the one that requires the fewest assumptions.", "isCorrect": true, "rationale": "This statement directly reflects the core claim of Occam's Razor as presented in the text: 'when two explanations account for the same evidence, prefer the simpler one,' where 'simpler' is defined by requiring fewer assumptions, entities, or causes."}, {"text": "The most complex explanation is always closer to the truth, as nature is rarely simple.", "isCorrect": false, "rationale": "This contradicts the core principle of Occam's Razor, which prioritizes simplicity as a starting point. While the text acknowledges that nature is not always simple, it advises adding complexity only when evidence demands it, not starting with it."}, {"text": "Dismiss any explanation that cannot be immediately proven true with simple observation.", "isCorrect": false, "rationale": "Occam's Razor is a heuristic for choosing among competing explanations, not a rule for immediate proof or dismissal. It guides initial preference, not final truth determined by simple observation."}], "id": "q01"}, {"question": "A group of archaeologists discovers ancient ruins with intricate carvings. One theory suggests the carvings depict a complex mythos involving multiple deities and supernatural events. Another theory proposes the carvings are astronomical maps, using symbolic representations of celestial bodies and their movements. Both theories are consistent with the visual evidence. Which would Occam's Razor initially favor, and why?", "options": [{"text": "The complex mythos, because ancient cultures often had elaborate belief systems.", "isCorrect": false, "rationale": "Occam's Razor does not prioritize cultural norms or perceived likelihood without explicit evidence. It focuses on the number of assumptions required by the explanation itself."}, {"text": "The astronomical map theory, because it likely involves fewer supernatural entities or unexplained phenomena, making it simpler in terms of assumptions.", "isCorrect": true, "rationale": "The astronomical map theory relies on observable natural phenomena (celestial bodies) and human interpretation, whereas the mythos theory invokes multiple deities and supernatural events, which are additional, unsubstantiated assumptions. Occam's Razor would prefer the explanation with fewer extraordinary assumptions."}, {"text": "Neither, because Occam's Razor is only applicable to scientific observations, not historical interpretations.", "isCorrect": false, "rationale": "The text states William of Ockham applied the principle 'throughout his philosophical work' and provides examples from various scientific fields, indicating its broad applicability beyond strict scientific observation."}, {"text": "The complex mythos, because it would require more specialized knowledge to interpret, thus being more profound.", "isCorrect": false, "rationale": "The depth of knowledge required or the perceived profundity of an explanation are not criteria for Occam's Razor. The razor focuses on the parsimony of assumptions."}], "id": "q02"}, {"question": "Which of the following statements about William of Ockham, the figure associated with Occam's Razor, is most accurate according to the text?", "options": [{"text": "He was the first philosopher to conceive of the idea of preferring simpler explanations.", "isCorrect": false, "rationale": "The text explicitly states that 'The principle was not original to Ockham—Aristotle had expressed a similar idea centuries earlier.'"}, {"text": "He was a medieval Franciscan friar and logician who applied the principle of parsimony so relentlessly that it became associated with his name.", "isCorrect": true, "rationale": "The text identifies him as a 'medieval Franciscan friar, philosopher, and logician' and notes that 'Ockham applied it so relentlessly that it became permanently associated with his name.'"}, {"text": "He developed the principle during the Enlightenment period as a reaction against religious dogma.", "isCorrect": false, "rationale": "William of Ockham lived from c. 1287–1347, which is the medieval period, long before the Enlightenment. He was also a Franciscan friar, indicating a religious background, not necessarily a reaction against dogma in this context."}, {"text": "He was an ancient Greek philosopher who debated with Aristotle over the nature of simplicity.", "isCorrect": false, "rationale": "He was a medieval logician, not ancient Greek. While Aristotle had similar ideas, there is no mention of Ockham debating with him, as they lived centuries apart."}], "id": "q03"}, {"question": "The text describes Occam's Razor as a 'guide, not a guarantee' and warns against its misapplication. Which of the following scenarios best represents a misunderstanding or incorrect application of Occam's Razor?", "options": [{"text": "A scientist proposes a new, complex theory about dark matter, acknowledging its complexity but providing extensive experimental data to support it.", "isCorrect": false, "rationale": "This aligns with the proper use of the razor: 'add complexity only when the evidence demands it.' If the evidence is extensive, a complex theory may be warranted."}, {"text": "A doctor diagnoses a patient with a common cold based on symptoms, rather than immediately suspecting a rare tropical disease.", "isCorrect": false, "rationale": "This is an appropriate application of Occam's Razor, starting with the simpler and more probable explanation (common cold) before considering rarer, more complex ones."}, {"text": "A researcher dismisses a highly detailed and nuanced explanation for climate change as 'too complex' without thoroughly examining the substantial evidence supporting its intricate variables.", "isCorrect": true, "rationale": "The text explicitly states, 'Using the razor to dismiss a complex explanation without examining the evidence is itself a reasoning error.' This scenario precisely describes such a misapplication, where complexity is rejected prematurely without considering the evidence."}, {"text": "An engineer chooses a simpler design for a bridge that uses fewer materials, assuming it will also be more stable.", "isCorrect": false, "rationale": "This is a practical application of parsimony in design, which may or may not be successful, but it doesn't represent a misunderstanding of Occam's Razor as a logical principle for evaluating explanations."}], "id": "q04"}, {"question": "The text cites several historical scientific breakthroughs as examples of Occam's Razor in action. Which of these examples highlights its power in unifying disparate phenomena under a single, simpler framework?", "options": [{"text": "Copernicus proposing that the Earth orbits the Sun, reducing the need for numerous epicycles in astronomical models.", "isCorrect": false, "rationale": "While Copernicus's system was simpler by reducing epicycles, Newton's example is a clearer instance of *unifying* previously separate *domains* (terrestrial and celestial mechanics)."}, {"text": "William of Ockham insisting that explanations should not invoke more entities than necessary in philosophy.", "isCorrect": false, "rationale": "This describes Ockham's general philosophical application of parsimony, not a specific scientific breakthrough that unified disparate phenomena."}, {"text": "Newton unifying terrestrial and celestial mechanics under a single law of gravitation, replacing a complex array of separate explanations.", "isCorrect": true, "rationale": "The text specifically states Newton 'replaced a complex array of separate explanations with one elegant principle,' directly illustrating the unification of distinct physical domains (terrestrial and celestial) under a single, simpler law."}, {"text": "Darwin explaining the diversity of life through natural selection, replacing separate creation events for each species.", "isCorrect": false, "rationale": "Darwin's theory replaced multiple creation events with a single mechanism. While a powerful simplification, Newton's example more directly fits the description of unifying 'terrestrial and celestial mechanics' or 'separate explanations' into one single law."}], "id": "q05"}, {"question": "According to the text, what is the primary role of Occam's Razor in the process of reasoning and inquiry, particularly when facing multiple explanations?", "options": [{"text": "To serve as an absolute guarantee of truth, identifying the definitively correct explanation.", "isCorrect": false, "rationale": "The text explicitly states, 'But Occam's Razor is a guide, not a guarantee. The simplest explanation is not always the correct one.'"}, {"text": "To act as a reliable starting point, directing inquiry towards the simpler explanation first, adding complexity only when evidence necessitates it.", "isCorrect": true, "rationale": "The text emphasizes, 'The razor says: start with the simpler explanation, and add complexity only when the evidence demands it' and 'Simplicity is not proof of truth, but it is a reliable starting point.'"}, {"text": "To discourage any further investigation into complex explanations once a simple one is found.", "isCorrect": false, "rationale": "The razor encourages starting simple but allows for adding complexity when 'the evidence demands it,' implying further investigation is needed if the simpler explanation is insufficient."}, {"text": "To always choose the explanation that requires the least amount of experimental verification.", "isCorrect": false, "rationale": "The razor is about the conceptual parsimony of assumptions, not the ease or difficulty of experimental verification. Complex theories still require rigorous testing."}], "id": "q06"}, {"question": "When the text states that Occam's Razor advises preferring the 'simpler' explanation, what characteristic of an explanation is it primarily referring to?", "options": [{"text": "The ease with which the explanation can be understood by a layperson.", "isCorrect": false, "rationale": "Simplicity in this context refers to the structure of the explanation (fewer assumptions/entities), not necessarily its pedagogical accessibility."}, {"text": "The aesthetic elegance or beauty of the explanation's formulation.", "isCorrect": false, "rationale": "While simplicity can often lead to elegance, the core meaning of 'simpler' for Occam's Razor is about the number of fundamental components or assumptions, not aesthetic qualities."}, {"text": "The number of assumptions, entities, or causes invoked by the explanation.", "isCorrect": true, "rationale": "The text explains Ockham's principle as 'insisting that explanations should not invoke more entities, causes, or assumptions than necessary' and uses the horse/zebra example to show 'fewer assumptions' is simpler."}, {"text": "The brevity of the explanation's verbal or written statement.", "isCorrect": false, "rationale": "A brief statement might still imply many underlying assumptions. Simplicity is about the conceptual parsimony, not the length of its description."}], "id": "q07"}, {"question": "The text highlights that quantum mechanics is vastly more complex than classical mechanics but also more accurate, and that explanations of the climate system cannot be truly 'simple.' What key limitation or nuance of Occam's Razor do these examples primarily illustrate?", "options": [{"text": "Occam's Razor is only applicable to philosophical arguments, not scientific theories.", "isCorrect": false, "rationale": "The text clearly provides scientific examples (Copernicus, Newton, Darwin) where the razor was productive, refuting this claim."}, {"text": "The simplest explanation is not always the correct one, as nature itself is not always simple.", "isCorrect": true, "rationale": "The text directly states, 'But Occam's Razor is a guide, not a guarantee. The simplest explanation is not always the correct one. Nature is under no obligation to be simple,' and uses these examples to reinforce this point."}, {"text": "Complex theories are inherently superior to simple ones because they account for more variables.", "isCorrect": false, "rationale": "The text doesn't suggest complexity is inherently superior, but that it's necessary when the evidence demands it, regardless of the razor's initial preference for simplicity."}, {"text": "Scientists should always strive for the most complex explanation possible to ensure accuracy.", "isCorrect": false, "rationale": "This contradicts the razor's advice to 'start with the simpler explanation' and only add complexity when evidence demands it. It doesn't advocate for complexity for its own sake."}], "id": "q08"}, {"question": "The example of hearing hoofbeats and hypothesizing a horse versus a zebra escaping from a zoo is used in the text to primarily illustrate which aspect of Occam's Razor?", "options": [{"text": "The razor's ability to definitively prove which explanation is true.", "isCorrect": false, "rationale": "The text states the razor is 'a guide, not a guarantee,' and the example itself doesn't offer definitive proof, but an initial preference."}, {"text": "How the razor helps cut away unnecessary assumptions by favoring the explanation that requires fewer of them.", "isCorrect": true, "rationale": "The text explains that 'the horse hypothesis requires fewer assumptions' and that 'Occam's Razor says to prefer the horse—not because zebras are impossible, but because the simpler explanation should be your starting point.' This highlights the razor's function in preferring fewer assumptions."}, {"text": "That rare events are inherently impossible and should always be dismissed without consideration.", "isCorrect": false, "rationale": "The text explicitly states, 'not because zebras are impossible,' indicating that the razor doesn't dismiss possibilities as impossible, but as less preferred initial explanations due to higher assumptions."}, {"text": "The importance of considering exotic possibilities, even if they seem unlikely.", "isCorrect": false, "rationale": "While considering all possibilities is part of good reasoning, the example specifically uses the razor to *initially prefer the less exotic* (horse) over the more exotic (zebra), not to emphasize the importance of exotic ones."}], "id": "q09"}, {"question": "Beyond his significant association with the principle of parsimony, William of Ockham is also credited in the text with contributions to which of the following philosophical ideas?", "options": [{"text": "Empiricism and the scientific method during the Renaissance.", "isCorrect": false, "rationale": "William of Ockham lived in the medieval period, long before the Renaissance, and while he was a logician, the text does not attribute empiricism or the scientific method to him specifically."}, {"text": "Nominalism and early arguments for the separation of church and state.", "isCorrect": true, "rationale": "The 'personbox' explicitly states that 'His philosophical work also contributed to nominalism (the view that universals are names, not real entities) and to early arguments for the separation of church and state.'"}, {"text": "The theory of Forms and the Socratic method in ancient Greece.", "isCorrect": false, "rationale": "The theory of Forms and the Socratic method are associated with ancient Greek philosophers Plato and Socrates, respectively, not William of Ockham, who was a medieval logician."}, {"text": "Utilitarianism and ethical hedonism in the modern era.", "isCorrect": false, "rationale": "Utilitarianism and ethical hedonism are philosophical movements from the modern era (much later than Ockham) associated with thinkers like Jeremy Bentham and John Stuart Mill."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
