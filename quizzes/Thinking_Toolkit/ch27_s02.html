    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental question the Halting Problem addresses?", "options": [{"text": "Can a computer program perfectly optimize all code for speed and efficiency?", "isCorrect": false, "rationale": "While code optimization relates to undecidable problems, the Halting Problem's core question is specifically about program termination, not optimization."}, {"text": "Given any computer program and its input, will the program eventually stop running or loop forever?", "isCorrect": true, "rationale": "This accurately states the central question of the Halting Problem as introduced in the text, defining whether a program 'halts' or 'loops.'"}, {"text": "Is it possible to develop an artificial intelligence that can pass the Turing Test?", "isCorrect": false, "rationale": "The Turing Test is a concept related to Alan Turing's work on AI, but it is a separate question from the Halting Problem, which concerns program termination."}, {"text": "Can a computer system prove all mathematical truths within a given formal system?", "isCorrect": false, "rationale": "This describes Gödel's Incompleteness Theorems, which are analogous to the Halting Problem but address mathematical proof rather than computational halting."}]}, {"question": "Alan Turing's proof of the Halting Problem's undecidability relies on what logical strategy?", "options": [{"text": "Empirical observation of program behavior across various inputs.", "isCorrect": false, "rationale": "Turing's proof is a mathematical contradiction, not an empirical observation. It demonstrates that no *general* algorithm can exist, regardless of observations."}, {"text": "Extrapolation from the limitations of current computing technology.", "isCorrect": false, "rationale": "The text explicitly states that it is 'not a limitation of current technology' but a 'mathematical impossibility,' meaning it doesn't depend on present technological capabilities."}, {"text": "A self-referential argument that leads to a contradiction.", "isCorrect": true, "rationale": "The proof constructs a program 'D' that asks a hypothetical halting detector 'H' about 'D' itself, then does the opposite of 'H's prediction, leading to a logical contradiction. This is the 'self-referential strategy' mentioned in the text."}, {"text": "A demonstration that certain complex programs require infinite processing power.", "isCorrect": false, "rationale": "The problem isn't about infinite processing power, but about the inherent inability of *any* algorithm to make a correct universal prediction about halting, even with infinite time and resources."}]}, {"question": "Consider a hypothetical program H(P, I) that is claimed to be a universal halting detector. According to Turing's proof, what must be true about H?", "options": [{"text": "H will always correctly predict halting for simple programs but fail for complex ones.", "isCorrect": false, "rationale": "The proof shows that H must fail for *some* program (specifically D(D)), and since H is assumed to be universal, its failure for even one case means it cannot exist as a universal detector."}, {"text": "H can exist only if it sometimes produces an incorrect answer or goes into an infinite loop itself.", "isCorrect": true, "rationale": "If a universal H existed, the construction of D(D) would force H to give a wrong answer, leading to a contradiction. Therefore, no such H can exist universally without giving incorrect answers for some input (like D(D))."}, {"text": "H would require an infinite amount of time to process some inputs, making it practically useless.", "isCorrect": false, "rationale": "The issue is not the time it takes, but the logical impossibility of its existence as a *correct* universal predictor, regardless of computational resources or time."}, {"text": "H is a theoretical construct but could be implemented with future quantum computing advancements.", "isCorrect": false, "rationale": "The text clarifies that the Halting Problem is a 'mathematical impossibility,' not a technological one. No future computing advancement, quantum or otherwise, can circumvent a mathematical impossibility."}]}, {"question": "The program 'D' (for 'diabolical') in Turing's proof is designed to:", "options": [{"text": "Analyze the source code of any program 'P' to identify potential infinite loops.", "isCorrect": false, "rationale": "While D interacts with a hypothetical halting detector, its purpose isn't direct source code analysis but to create a paradoxical situation using the detector's output."}, {"text": "Demonstrate that some programs are inherently complex and cannot be fully understood.", "isCorrect": false, "rationale": "The goal of D is not to show complexity, but to expose a fundamental logical flaw in the assumption that a universal halting detector H can exist."}, {"text": "Do the opposite of what the hypothetical halting detector 'H' predicts for 'D' when given 'D' as input.", "isCorrect": true, "rationale": "The text explicitly states: 'D does the opposite of what H predicts.' When H(D, D) says 'halts,' D loops; when H(D, D) says 'loops,' D halts. This is the core of the contradiction."}, {"text": "Optimize any given program 'P' to ensure it always halts in a finite amount of time.", "isCorrect": false, "rationale": "Optimization is a different problem, and D is constructed specifically to challenge the halting problem, not to optimize other programs."}]}, {"question": "Which statement best characterizes the Halting Problem's implications for the power of computation?", "options": [{"text": "It demonstrates that computers are fundamentally limited by their processing speed and memory capacity.", "isCorrect": false, "rationale": "The text states it's 'not a limitation of current technology' but a 'mathematical impossibility,' meaning it applies regardless of speed or memory."}, {"text": "It implies that given enough time and resources, any computational problem can eventually be solved.", "isCorrect": false, "rationale": "The Halting Problem explicitly proves that some computational problems are fundamentally unsolvable by algorithms, regardless of resources."}, {"text": "It establishes a permanent boundary on what any computer, no matter how powerful, can ever achieve.", "isCorrect": true, "rationale": "The text clearly states, 'No matter how fast, how large, or how sophisticated a computer becomes, it will never be able to determine... whether that program will halt. This is a mathematical impossibility — a permanent boundary on the power of computation.'"}, {"text": "It suggests that certain problems are computationally difficult but could be solved by quantum computers.", "isCorrect": false, "rationale": "The Halting Problem is undecidable, meaning it cannot be solved by *any* algorithm, classical or quantum, as it's a logical impossibility, not a matter of computational difficulty."}]}, {"question": "How is the Halting Problem analogous to Gödel's incompleteness theorems?", "options": [{"text": "Both prove that complex systems always contain internal contradictions.", "isCorrect": false, "rationale": "While Turing's proof uses contradiction, the core analogy is about limitations: Gödel for provable truths, Turing for answerable questions, both using self-reference."}, {"text": "Both are concerned with the practical limitations of modern computing technology.", "isCorrect": false, "rationale": "Both are fundamental mathematical/logical limitations, not practical or technological ones."}, {"text": "Both use self-reference to construct a statement or program that defeats any system claiming to be universal.", "isCorrect": true, "rationale": "The text explicitly states that 'Both results use self-reference to construct a statement (or a program) that defeats any system claiming to be universal.' Gödel for formal systems and Turing for algorithms."}, {"text": "Both predict the eventual obsolescence of human mathematicians and programmers.", "isCorrect": false, "rationale": "Neither theorem predicts obsolescence; rather, they define fundamental limits of formal systems and computation, highlighting the enduring role of human insight."}]}, {"question": "A software company develops an 'Advanced Halting Predictor' (AHP) that correctly determines if a program halts for 99.9% of all test cases. Which of the following is true based on the Halting Problem?", "options": [{"text": "The AHP contradicts Turing's proof, as it demonstrates a near-universal solution.", "isCorrect": false, "rationale": "Turing's proof states no algorithm can solve it for *all* possible inputs. A 99.9% success rate means there's still at least 0.1% for which it fails, thus not contradicting the universal undecidability."}, {"text": "The AHP is valuable but inherently cannot be 100% accurate for all programs and inputs.", "isCorrect": true, "rationale": "Turing's proof means no algorithm can solve it for *all* possible inputs. While a program can be useful for *most* cases, it will always fail for some, confirming its undecidability."}, {"text": "The AHP must be using an approach not based on algorithms, such as human intuition or quantum mechanics.", "isCorrect": false, "rationale": "The Halting Problem applies to *any* algorithm. If AHP is a program, it's an algorithm. Quantum mechanics doesn't change logical impossibilities."}, {"text": "The existence of AHP disproves the practical relevance of the Halting Problem in real-world software.", "isCorrect": false, "rationale": "Its existence reaffirms the practical relevance, as it shows the difficulty in achieving perfection for problems derived from the Halting Problem, like program verification."}]}, {"question": "Which real-world problem is NOT directly mentioned in the text as an 'ancestor' or consequence of the Halting Problem's undecidability?", "options": [{"text": "Perfect detection of all possible malware.", "isCorrect": false, "rationale": "The text states: 'no antivirus program can perfectly detect all possible malware (malware detection reduces to the Halting Problem).'"}, {"text": "Universal automated verification that all software is bug-free.", "isCorrect": false, "rationale": "The text states: 'no universal automated verifier exists for all programs.'"}, {"text": "Perfect optimization of all code by a compiler.", "isCorrect": false, "rationale": "The text states: 'no compiler can perfectly optimize all code (determining whether dead code is truly unreachable is undecidable).'"}, {"text": "Predicting stock market fluctuations with 100% accuracy.", "isCorrect": true, "rationale": "While complex, predicting stock market fluctuations is not mentioned in the text as a problem whose undecidability stems from the Halting Problem. The examples given are specifically computational problems related to program analysis."}]}, {"question": "Based on the 'personbox' about Alan Turing, which statement about his contributions is most accurate?", "options": [{"text": "He primarily focused on the practical applications of early computers, such as business automation.", "isCorrect": false, "rationale": "While he worked on early computer design, his primary contributions highlighted were theoretical foundations (Turing machine, Halting Problem, AI foundations) and wartime code-breaking."}, {"text": "He proved the Halting Problem, invented the first electronic computer, and developed the internet.", "isCorrect": false, "rationale": "He proved the Halting Problem, but he did not invent the first electronic computer (though he contributed to early designs), nor did he develop the internet."}, {"text": "He established computability theory, played a key role in breaking the Enigma cipher, and proposed the Turing Test.", "isCorrect": true, "rationale": "The text explicitly states he 'established the field of computability theory' (via Turing machine and Halting Problem), 'played a central role in breaking the German Enigma cipher,' and 'proposing what is now called the Turing Test.'"}, {"text": "His work was limited to theoretical mathematics and had no significant real-world impact.", "isCorrect": false, "rationale": "His work had immense real-world impact, notably in breaking the Enigma cipher during WWII, and foundational impact on computer science and AI."}]}, {"question": "What is the key takeaway from the Halting Problem for anyone studying computer science?", "options": [{"text": "All sufficiently complex programs will eventually halt, given enough time and resources.", "isCorrect": false, "rationale": "The Halting Problem proves the opposite: some programs will loop forever, and we cannot universally determine which ones."}, {"text": "There are fundamental, mathematical limits to what algorithms and computers can ever achieve.", "isCorrect": true, "rationale": "This statement encapsulates the core message presented in the 'What It Means' section and the 'keyconcept' box: the Halting Problem establishes 'a mathematical impossibility — a permanent boundary on the power of computation.'"}, {"text": "The current limitations of computing are solely due to technological constraints that will eventually be overcome.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating it is 'not a limitation of current technology' but a 'mathematical impossibility.'"}, {"text": "With improved programming languages and methodologies, all program bugs can eventually be eliminated.", "isCorrect": false, "rationale": "Program verification is listed as an undecidable problem because 'no universal automated verifier exists for all programs,' meaning perfect bug elimination is not universally achievable by algorithms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
