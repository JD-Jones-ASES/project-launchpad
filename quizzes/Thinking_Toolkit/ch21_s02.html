    };

        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core premise of Cunningham's Law, as stated in the provided text?", "options": [{"text": "Asking direct questions on the internet is the most efficient way to get accurate information.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'The best way to get the right answer on the internet is not to ask a question; it is to post the wrong answer.'"}, {"text": "Posting a confidently incorrect answer is more likely to elicit correct information than asking a direct question.", "isCorrect": true, "rationale": "This aligns directly with the formulation provided: 'The best way to get the right answer on the internet is not to ask a question; it is to post the wrong answer.'"}, {"text": "Expert contributors are the only reliable source of information on the internet.", "isCorrect": false, "rationale": "While experts contribute, Cunningham's Law focuses on the *mechanism* of eliciting information, not the exclusive source, and the Wikipedia example shows collective correction by many, not just experts."}, {"text": "Information accuracy online is best achieved through strict moderation and content filtering.", "isCorrect": false, "rationale": "The text describes a psychological mechanism for self-correction and engagement, not a reliance on external moderation for accuracy."}], "id": "q01"}, {"question": "Which of the following best describes the psychological motivation driving people to correct wrong answers, according to the text?", "options": [{"text": "A selfless desire to always help strangers who are mistaken.", "isCorrect": false, "rationale": "The text states the impulse 'is not entirely flattering to human nature' and 'has as much to do with demonstrating one's own knowledge as with helping.'"}, {"text": "The innate human curiosity to learn new things and expand one's knowledge.", "isCorrect": false, "rationale": "While curiosity is a factor in learning, the text emphasizes the 'irresistible urge to correct someone who is mistaken' and 'demonstrating one's own knowledge,' rather than just curiosity to learn."}, {"text": "An irresistible urge to set the record straight, often linked to demonstrating one's own knowledge.", "isCorrect": true, "rationale": "The text highlights 'the irresistible urge to correct someone who is mistaken' and notes that this impulse often relates to 'demonstrating one's own knowledge.'"}, {"text": "The expectation of receiving recognition or rewards for contributing correct information.", "isCorrect": false, "rationale": "The text does not mention external rewards or recognition as a primary motivator for correction."}], "id": "q02"}, {"question": "Beyond internet forums, where else does the text suggest Cunningham's Law can be practically applied to generate discussion and feedback?", "options": [{"text": "Only in highly specialized academic peer-review processes.", "isCorrect": false, "rationale": "The text mentions broader applications like 'Teachers have long known,' 'meetings, brainstorming sessions, and editorial processes,' not just specialized academic peer-review."}, {"text": "Classroom discussions, business meetings, brainstorming sessions, and editorial processes.", "isCorrect": true, "rationale": "The text explicitly lists these as practical applications: 'Teachers have long known that one of the most effective ways to generate class discussion is not to ask a question but to make a deliberately provocative or slightly incorrect statement. The same dynamic operates in meetings, brainstorming sessions, and editorial processes.'"}, {"text": "Primarily in political debates to sway public opinion.", "isCorrect": false, "rationale": "While it might occur in political debates, the text doesn't specifically highlight this as a practical application but rather mentions classrooms, meetings, brainstorming, and editorial processes."}, {"text": "In legal proceedings to challenge witness testimonies.", "isCorrect": false, "rationale": "Legal proceedings are not mentioned as a practical application in the provided text."}], "id": "q03"}, {"question": "The text identifies a 'shadow side' to Cunningham's Law. What does this refer to?", "options": [{"text": "The potential for online platforms to become overwhelmed by an excessive number of corrections.", "isCorrect": false, "rationale": "The text does not mention an 'overwhelm' of corrections but rather the deliberate exploitation of the tendency."}, {"text": "The risk that genuine errors might go unnoticed amidst a flood of incorrect information.", "isCorrect": false, "rationale": "The law implies errors *attract* notice and correction, rather than being missed."}, {"text": "The blurring of the line between genuine mistakes and intentional provocations to increase engagement.", "isCorrect": true, "rationale": "The text states: 'In an information environment where wrong answers are strategically posted to generate engagement, the line between a genuine error and deliberate provocation blurs.'"}, {"text": "The fact that corrections are often less detailed and helpful than direct answers.", "isCorrect": false, "rationale": "The text states the opposite: corrections are 'often more detailed, more thorough, and more helpful than the answers a direct question would have elicited.'"}], "id": "q04"}, {"question": "How does Wikipedia exemplify the principles of Cunningham's Law?", "options": [{"text": "It relies on a small group of highly-trained, paid editors to maintain accuracy.", "isCorrect": false, "rationale": "The text states 'anyone can edit' and that it works 'not because every contributor is an expert' but due to error correction."}, {"text": "Its accuracy is sustained by its ability to immediately prevent all errors from being published.", "isCorrect": false, "rationale": "The text implies errors *are* introduced ('A vandal or well-meaning but mistaken editor introduces an error') but are then quickly fixed."}, {"text": "It harnesses the human tendency to correct errors as a 'self-healing mechanism' for content accuracy.", "isCorrect": true, "rationale": "The text explains: 'The system harnesses the human compulsion to correct errors and turns it into a self-healing mechanism. Wikipedia's accuracy... is sustained by exactly the dynamic Cunningham's Law describes.'"}, {"text": "It primarily functions by encouraging users to ask questions on article talk pages to improve content.", "isCorrect": false, "rationale": "While questions might be asked, the example specifically focuses on the correction of *errors* as the driving force for accuracy."}], "id": "q05"}, {"question": "According to the 'keyconcept' section, Cunningham's Law also helps explain a concerning trend in modern information environments. What is it?", "options": [{"text": "Why accurate information always travels faster than misinformation.", "isCorrect": false, "rationale": "The text states it explains 'why outrage and error spread faster than curiosity and accuracy.'"}, {"text": "Why constructive dialogue is more prevalent than heated arguments online.", "isCorrect": false, "rationale": "The text highlights the spread of 'outrage and error' which suggests the opposite of universally constructive dialogue."}, {"text": "Why outrage and error tend to spread more rapidly than curiosity and accuracy.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'it also explains why outrage and error spread faster than curiosity and accuracy in information environments.'"}, {"text": "Why highly detailed answers are rarely found online.", "isCorrect": false, "rationale": "The main text states corrections are 'often more detailed, more thorough, and more helpful' than direct answers."}], "id": "q06"}, {"question": "Ward Cunningham is credited with what specific invention, as mentioned in the text?", "options": [{"text": "The first online social media platform.", "isCorrect": false, "rationale": "The text does not credit him with the first social media platform."}, {"text": "The concept of internet forums for question and answer sessions.", "isCorrect": false, "rationale": "While the law applies to forums, Cunningham is specifically linked to the wiki concept, not forums themselves."}, {"text": "The wiki concept.", "isCorrect": true, "rationale": "The text explicitly states: 'Attributed to Ward Cunningham, the inventor of the wiki' and 'the programmer who invented the wiki concept in 1995.'"}, {"text": "The algorithm for search engine optimization.", "isCorrect": false, "rationale": "The text does not mention him in connection with search engine optimization."}], "id": "q07"}, {"question": "In an editorial process, according to Cunningham's Law, why would a rough draft with errors be more effective than a blank page requesting input?", "options": [{"text": "A blank page allows for more creative freedom, leading to better input.", "isCorrect": false, "rationale": "The text states 'A rough draft with errors generates more useful feedback than a blank page with a request for input,' implying less useful feedback from a blank page."}, {"text": "Errors in a draft provide concrete points for people to correct, leveraging their natural inclination.", "isCorrect": true, "rationale": "This directly applies Cunningham's Law: the 'wrong answer' (the errors) provokes correction and 'more useful feedback' than a 'request for input' (asking a question)."}, {"text": "People are generally less critical when faced with a complete, albeit flawed, document.", "isCorrect": false, "rationale": "The law suggests the opposite; errors *provoke* criticism/correction."}, {"text": "Editors prefer to see the author's original vision, even if imperfect.", "isCorrect": false, "rationale": "The text focuses on the *mechanism* of provoking feedback, not editors' preference for original vision."}], "id": "q08"}, {"question": "What is the primary difference in motivation for responding to a direct question versus correcting a wrong answer, according to the text?", "options": [{"text": "Responding to a question is driven by the desire for public recognition, while correcting an error is purely altruistic.", "isCorrect": false, "rationale": "The text suggests correcting errors can be about 'demonstrating one's own knowledge,' which isn't purely altruistic, and doesn't specify recognition for questions."}, {"text": "Direct questions appeal to generosity, whereas wrong answers appeal to a stronger urge to correct mistakes.", "isCorrect": true, "rationale": "The text states: 'Questions appeal to generosity: someone has to volunteer their time and expertise to help a stranger. Wrong answers appeal to something stronger: the irresistible urge to correct someone who is mistaken.'"}, {"text": "People respond to questions for financial incentives, but correct errors for intellectual challenge.", "isCorrect": false, "rationale": "Financial incentives are not mentioned in the text as a motivator for either action."}, {"text": "Correcting errors is a passive activity, while answering questions requires active engagement.", "isCorrect": false, "rationale": "Correcting an error is an active form of engagement; the text suggests it's a stronger form of engagement than answering a question."}], "id": "q09"}, {"question": "Considering the constructive applications and the 'shadow side' of Cunningham's Law, what is a balanced overall assessment of its implications?", "options": [{"text": "It is an outdated principle, mostly irrelevant in today's complex information environment.", "isCorrect": false, "rationale": "The text discusses its modern applications and implications for social media, indicating its continued relevance."}, {"text": "It describes a purely negative aspect of human psychology that only leads to conflict and misinformation.", "isCorrect": false, "rationale": "The text notes it can be 'exploited constructively' and details positive applications like generating discussion and improving drafts."}, {"text": "It highlights a powerful human tendency that can be strategically used for positive outcomes but also exploited with negative consequences.", "isCorrect": true, "rationale": "This synthesizes both aspects: 'can be exploited constructively — to generate discussion, elicit expertise, and improve drafts — but it also explains why outrage and error spread faster... exploiting this tendency is not always benign.'"}, {"text": "It implies that all information shared online, regardless of its source, is inherently unreliable.", "isCorrect": false, "rationale": "The law is about *how* accuracy can be achieved (through correction), not about the inherent unreliability of all information."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
