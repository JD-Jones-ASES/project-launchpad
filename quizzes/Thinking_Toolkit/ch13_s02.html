        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following best describes the 'brain in a vat' thought experiment?", "options": [{"text": "A scenario where a scientist tries to prove the existence of an external world using brain simulations.", "isCorrect": false, "rationale": "The brain in a vat scenario is designed to raise doubt about the external world's existence, not to prove it."}, {"text": "A hypothetical situation where a disembodied brain is kept alive in a vat and fed simulated sensory input by a computer, making its experiences indistinguishable from reality.", "isCorrect": true, "rationale": "This accurately describes the core setup of the brain-in-a-vat thought experiment, where all sensory experiences are computer-generated simulations."}, {"text": "A historical experiment by René Descartes to test the limits of human sensory perception.", "isCorrect": false, "rationale": "It's a modern version of Descartes's thought experiment, not a historical physical experiment, and his focus was on absolute certainty, not just sensory perception."}, {"text": "A theory suggesting that all human consciousness is a product of advanced artificial intelligence living in a virtual reality.", "isCorrect": false, "rationale": "The thought experiment focuses on the nature of our reality and perception, not on the origin of consciousness as a product of AI."}]}, {"question": "René Descartes's 'evil demon hypothesis' served what primary purpose in his philosophy?", "options": [{"text": "To demonstrate the power of sensory experience in forming reliable knowledge.", "isCorrect": false, "rationale": "Descartes used the evil demon to *doubt* the reliability of sensory experience, not to demonstrate its power."}, {"text": "To explore the ethical implications of technological advancements in simulating reality.", "isCorrect": false, "rationale": "While related to simulations, Descartes's original hypothesis was from the 17th century and focused on epistemological doubt, not modern technology or ethics."}, {"text": "To push skepticism to its absolute limit, seeking to discover if anything could be known with absolute certainty.", "isCorrect": true, "rationale": "Descartes introduced the evil demon as the most extreme source of deception to systematically doubt everything and find an indubitable foundation for knowledge."}, {"text": "To prove the existence of God as the ultimate guarantor of truth and reality.", "isCorrect": false, "rationale": "While Descartes later addressed God in his Meditations, the evil demon hypothesis itself was a tool for radical doubt, not a direct proof of God's existence."}]}, {"question": "Descartes's famous conclusion 'I think, therefore I am' (cogito ergo sum) is significant because it establishes:", "options": [{"text": "The certainty of the external world's existence.", "isCorrect": false, "rationale": "The cogito explicitly states that everything *else* (including the external world) remains in doubt; it only secures the existence of the doubter."}, {"text": "The indubitability of one's own existence as a thinking being, even in the face of radical deception.", "isCorrect": true, "rationale": "The very act of doubting or being deceived proves that there must be an 'I' who doubts or is deceived, establishing one's existence as a thinking thing."}, {"text": "The unreliability of all forms of reasoning and logic.", "isCorrect": false, "rationale": "The cogito itself is a product of reasoning, showing that at least some logical deductions can lead to certainty."}, {"text": "That other minds exist and are genuinely conscious.", "isCorrect": false, "rationale": "The text explicitly states that the cogito 'leaves nearly everything else in doubt,' including 'whether other minds exist.'"}]}, {"question": "While the cogito provides a point of certainty, what fundamental aspect of knowledge does Descartes's initial radical skepticism, inspired by the evil demon, *not* immediately resolve?", "options": [{"text": "Whether the act of doubting itself is real.", "isCorrect": false, "rationale": "The cogito resolves this, as the act of doubting confirms the existence of the doubter."}, {"text": "The existence of one's own thoughts and feelings.", "isCorrect": false, "rationale": "These are part of being a 'thinking thing' whose existence is confirmed by the cogito."}, {"text": "The reality of the external world and the genuineness of one's memories.", "isCorrect": true, "rationale": "The text states that after the cogito, 'You know you exist, but you do not know whether the world around you is real, whether other minds exist, or whether your memories are genuine.'"}, {"text": "The validity of logical deductions from established premises.", "isCorrect": false, "rationale": "Descartes relied on logical deduction to reach the cogito, indicating its presumed validity."}]}, {"question": "What is the surprising conclusion Hilary Putnam reaches about the 'brain-in-a-vat' hypothesis in his self-refutation argument?", "options": [{"text": "That the simulation is physically impossible to create due to technological limitations.", "isCorrect": false, "rationale": "Putnam's argument is philosophical and linguistic, not based on technological feasibility."}, {"text": "That it is impossible for a brain in a vat to truthfully state, 'I am a brain in a vat.'", "isCorrect": true, "rationale": "Putnam argues that if you are a brain in a vat, your words 'brain' and 'vat' would not refer to actual brains and vats, making the statement necessarily false when uttered by a BIV."}, {"text": "That once aware, a brain in a vat can easily escape the simulation.", "isCorrect": false, "rationale": "Putnam's argument does not address the possibility or method of escape from the vat."}, {"text": "That semantic externalism is an outdated theory of meaning.", "isCorrect": false, "rationale": "Putnam's argument *depends* on semantic externalism; he does not argue it is outdated."}]}, {"question": "Putnam's self-refutation argument against the brain-in-a-vat hypothesis hinges on which theory of meaning?", "options": [{"text": "Internalism, which states that meaning is solely determined by a speaker's mental states.", "isCorrect": false, "rationale": "Putnam's argument relies on semantic *externalism*, which contrasts with internalism."}, {"text": "Semantic externalism, which posits that the meaning of a word is causally connected to the external objects or concepts it refers to.", "isCorrect": true, "rationale": "The text explicitly states that Putnam's reasoning 'draws on a theory of meaning called semantic externalism,' where 'for a word to refer to something, it must be causally connected to that thing.'"}, {"text": "Pragmatism, asserting that the truth of a statement depends on its practical consequences.", "isCorrect": false, "rationale": "Pragmatism is not the theory of meaning foundational to Putnam's BIV argument as presented."}, {"text": "Referentialism, which claims all words refer to abstract ideas rather than concrete objects.", "isCorrect": false, "rationale": "While it deals with reference, semantic externalism emphasizes causal connection to *actual physical objects* in the world, not solely abstract ideas."}]}, {"question": "According to Putnam's argument, if you were a brain in a vat, why couldn't your statement 'I am a brain in a vat' be true?", "options": [{"text": "Because the computer simulation would immediately correct your belief, making the statement false.", "isCorrect": false, "rationale": "The text states the computer 'generates the appropriate reassuring signals,' not necessarily correcting this specific meta-belief in a way that makes the statement untrue in Putnam's sense."}, {"text": "Because your words 'brain' and 'vat' would refer only to simulated electrical patterns, not to actual physical brains and vats in the real world.", "isCorrect": true, "rationale": "Based on semantic externalism, a BIV has only interacted with simulated 'brains' and 'vats,' so its words would refer to these simulated concepts, not the real objects necessary to make the statement true."}, {"text": "Because your brain would lack the necessary neural pathways to form such a complex thought.", "isCorrect": false, "rationale": "This is a biological claim, not the philosophical and linguistic argument Putnam makes."}, {"text": "Because the very act of speaking implies an external, non-simulated body.", "isCorrect": false, "rationale": "Putnam's argument focuses on the *reference* of words, not on the physical act of speech implying a body."}]}, {"question": "What is a significant criticism leveled against Putnam's self-refutation argument?", "options": [{"text": "It fails to account for the possibility of dreams and hallucinations.", "isCorrect": false, "rationale": "The BIV scenario itself is analogous to a highly sophisticated hallucination or dream, so this criticism doesn't directly target Putnam's specific argument."}, {"text": "It relies too heavily on empirical scientific evidence, which is inherently uncertain.", "isCorrect": false, "rationale": "Putnam's argument is philosophical and linguistic, not primarily based on empirical scientific evidence."}, {"text": "Its validity depends on accepting semantic externalism, a theory not universally endorsed by philosophers.", "isCorrect": true, "rationale": "The text states, 'Critics point out that it depends on accepting semantic externalism — a theory that not all philosophers endorse.'"}, {"text": "It contradicts Descartes's cogito, thereby undermining its own logical foundation.", "isCorrect": false, "rationale": "Putnam offers a different approach to the BIV problem; his argument doesn't contradict the cogito but rather addresses a different aspect of skepticism."}]}, {"question": "The 'Radical Skepticism and Its Limits' key concept box suggests a deeper lesson from the brain-in-a-vat scenario beyond just the difficulty of proving the external world. What is this lesson?", "options": [{"text": "That advanced technology will eventually make it impossible to distinguish reality from simulation.", "isCorrect": false, "rationale": "While related, the 'deeper lesson' is not purely about technology but a fundamental philosophical insight."}, {"text": "That human beings are fundamentally incapable of achieving any form of knowledge.", "isCorrect": false, "rationale": "Descartes found one certainty, and Putnam offered a refutation, implying some knowledge or limits of skepticism exist."}, {"text": "That we must navigate the world using unprovable assumptions, which is a fundamental aspect of the human condition.", "isCorrect": true, "rationale": "The text states, 'But the deeper lesson is about the limits of certainty: we navigate the world using assumptions that cannot be proven from the ground up, and this is a feature of the human condition, not a failure.'"}, {"text": "That philosophical thought experiments are ultimately impractical and irrelevant to real-world concerns.", "isCorrect": false, "rationale": "The text explicitly links the BIV to popular culture and modern questions, showing its relevance."}]}, {"question": "How does the 'real-world' implications section connect the brain-in-a-vat scenario to contemporary culture and technology?", "options": [{"text": "By arguing that ancient philosophical ideas are becoming obsolete with new scientific discoveries.", "isCorrect": false, "rationale": "The section shows the *continued relevance* of the idea, not its obsolescence."}, {"text": "By highlighting how films like The Matrix and the development of virtual reality raise similar questions about the nature of experienced reality.", "isCorrect": true, "rationale": "The 'realworld' box directly states, 'Films like The Matrix (1999) and The Truman Show (1998) explore versions of the same idea' and links it to 'virtual reality systems.'"}, {"text": "By suggesting that all current scientific research is actually a sophisticated simulation.", "isCorrect": false, "rationale": "This is an extreme and unsupported claim not made in the text."}, {"text": "By proposing that future human societies will inevitably choose simulated lives over real ones.", "isCorrect": false, "rationale": "This relates more to 'The Experience Machine' (mentioned in 'connections') which is an ethical question, not the primary focus of the 'realworld' box about cultural and technological connections to the BIV concept."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
