    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is Karl Popper's primary reason for proposing falsifiability as a criterion?", "options": [{"text": "To determine if a claim is ultimately true.", "isCorrect": false, "rationale": "Popper explicitly states that a scientific claim isn't defined by its truth, as many scientific claims have turned out to be false. Falsifiability is about the potential to be proven wrong, not about current truth status."}, {"text": "To differentiate scientific claims from non-scientific claims.", "isCorrect": true, "rationale": "The text states Popper proposed falsifiability as the 'demarcation criterion separating science from non-science.' This is its core purpose."}, {"text": "To establish the usefulness of a theory.", "isCorrect": false, "rationale": "Popper argues that usefulness does not make a claim scientific; folk remedies can be useful without being scientific. Falsifiability is distinct from utility."}, {"text": "To ensure a theory is based purely on observation.", "isCorrect": false, "rationale": "The text points out that observation alone isn't sufficient, as 'astrologers observe the stars quite carefully' but their claims are not scientific by Popper's criterion."}], "id": "q01"}, {"question": "According to Popper, a claim is scientific *if and only if* it is, in principle, falsifiable. Which of the following best describes what falsifiability means in this context?", "options": [{"text": "The claim has already been proven false by observation.", "isCorrect": false, "rationale": "Falsifiability means the *potential* or *capability* of being proven false, not that it *is* false. A scientific claim can be true, but still must be falsifiable."}, {"text": "The claim is based on observations that are highly unlikely to be true.", "isCorrect": false, "rationale": "The likelihood of observations is not the criterion. Falsifiability concerns whether the claim makes predictions specific enough to be testable against *any* conceivable observation that could prove it wrong, regardless of its probability."}, {"text": "The claim makes specific predictions that could conceivably be proven wrong by observation.", "isCorrect": true, "rationale": "The text defines falsifiability as meaning 'the claim makes predictions specific enough that some conceivable observation could prove it wrong.'"}, {"text": "The claim is provisional and open to being updated with new evidence.", "isCorrect": false, "rationale": "While scientific claims are provisional, falsifiability specifically refers to the possibility of being *refuted* by a specific observation, not just generally updated. This option is too broad and doesn't capture the specificity of Popper's criterion."}], "id": "q02"}, {"question": "Consider the following claims:\n1. 'Regular consumption of Vitamin X significantly reduces the incidence of common colds.'\n2. 'All bachelors are unmarried men.'\n3. 'Whatever is meant to be, will be.'\nWhich of these claims is (are) scientific according to Popper's criterion?", "options": [{"text": "1 only", "isCorrect": true, "rationale": "Claim 1 is scientific because it makes a specific, testable prediction that could be proven false (e.g., if a study shows no reduction in colds, or even an increase). Claim 2 is a definition, true by linguistic convention, not an empirical scientific claim. Claim 3 is a vague, unfalsifiable statement that can accommodate any outcome, similar to 'everything happens for a reason'."}, {"text": "2 only", "isCorrect": false, "rationale": "Claim 2 is an analytic truth (true by definition), not a scientific claim about the world that can be falsified by observation."}, {"text": "1 and 3", "isCorrect": false, "rationale": "Claim 3 is unfalsifiable, as no observation could ever count against it. It cannot be proven wrong."}, {"text": "All of them", "isCorrect": false, "rationale": "Only claim 1 meets the criterion of falsifiability. Claims 2 and 3 are not scientific in Popper's sense."}], "id": "q03"}, {"question": "Popper criticized Marxist historians and Freudian psychoanalysts because their theories:", "options": [{"text": "Lacked empirical evidence altogether.", "isCorrect": false, "rationale": "The text states they 'could explain anything after the fact,' implying they did engage with evidence, but interpreted it in a way that always confirmed their theories, rather than risked refutation."}, {"text": "Were developed by individuals with political or personal biases.", "isCorrect": false, "rationale": "While bias may be a factor in any field, Popper's criticism focuses on the *structure* of the theories themselves—their ability to explain away any contradictory evidence—rather than the personal motives of their originators."}, {"text": "Could explain any outcome, both confirming and contradicting, making them immune to refutation.", "isCorrect": true, "rationale": "The text directly states: 'If a revolution occurred, Marxism predicted it. If a revolution did not occur, Marxism explained why... No possible outcome could embarrass the theory, and Popper argued this was precisely the problem. A theory that explains everything explains nothing.'"}, {"text": "Were too complex and difficult for the average person to understand.", "isCorrect": false, "rationale": "Complexity is not the issue Popper raised. His concern was the theories' inherent ability to adapt to any evidence, rendering them untestable and thus unscientific."}], "id": "q04"}, {"question": "Which historical event is presented in the text as a prime example of a scientific theory's willingness to be proven wrong, thus demonstrating falsifiability?", "options": [{"text": "The discovery of penicillin.", "isCorrect": false, "rationale": "While a significant scientific discovery, the text does not use the discovery of penicillin to illustrate falsifiability."}, {"text": "Arthur Eddington's 1919 solar eclipse expedition confirming Einstein's general relativity.", "isCorrect": true, "rationale": "The text explicitly highlights this event, stating that Einstein's prediction 'could have failed' and if the starlight had not bent, 'general relativity would have been in serious trouble.' This willingness to be wrong made it genuinely scientific."}, {"text": "Isaac Newton's formulation of the laws of motion.", "isCorrect": false, "rationale": "Newton's work is foundational but is not used in the text as the primary example for illustrating falsifiability in the way Einstein's theory is."}, {"text": "Charles Darwin's voyage on the HMS Beagle leading to the theory of evolution.", "isCorrect": false, "rationale": "Darwin's work is a cornerstone of science but is not the specific example used in the text to demonstrate Popper's concept of falsifiability."}], "id": "q05"}, {"question": "The text states that 'unfalsifiable claims are not scientific claims,' but also that 'every unfalsifiable claim is not worthless.' What does this distinction imply?", "options": [{"text": "Only scientific claims are valuable in society.", "isCorrect": false, "rationale": "The text refutes this directly by stating that an unfalsifiable claim like 'Be kind to others' is a 'perfectly good moral principle,' implying value beyond scientific status."}, {"text": "Claims that are not scientific cannot be true or meaningful.", "isCorrect": false, "rationale": "The text explicitly states unfalsifiable claims 'may be important, meaningful, even true,' separating their truth/meaning from their scientific status."}, {"text": "The value of a claim is separate from its status as scientific.", "isCorrect": true, "rationale": "This aligns with the text's nuanced view: 'Popper's point was narrower: unfalsifiable claims are not scientific claims. They may be important, meaningful, even true. They are just playing a different game, with different rules.'"}, {"text": "Falsifiability is a moral judgment on the claim's importance.", "isCorrect": false, "rationale": "Falsifiability is a criterion for *scientific* demarcation, not a moral judgment on a claim's importance or goodness. It defines the rules of the 'science game.'"}], "id": "q06"}, {"question": "A company executive states, 'Our new business strategy is a success because we're focusing on customer-centric growth, which is always good for business.' Based on the concept of falsifiability, why might this statement be problematic from a scientific perspective?", "options": [{"text": "It relies on a subjective interpretation of 'customer-centric growth.'", "isCorrect": false, "rationale": "While subjectivity can hinder measurement, the core issue with respect to falsifiability is the lack of specific, observable outcomes that could prove the strategy *wrong*, not just the definition of its components."}, {"text": "It fails to specify measurable outcomes that could demonstrate the strategy's failure.", "isCorrect": true, "rationale": "The 'realworld' section explains: 'A company that says “our strategy is working” regardless of revenue, market share, or customer satisfaction has an unfalsifiable strategy. Good strategic planning specifies in advance what outcomes would signal that the strategy has failed.' The executive's statement offers no such conditions for failure."}, {"text": "It lacks comparative data with previous strategies or competitors.", "isCorrect": false, "rationale": "Comparative data is vital for robust evaluation, but the primary falsifiability problem is the absence of any condition under which the *current* strategy would be deemed unsuccessful, making it immune to refutation."}, {"text": "It doesn't consider external market factors affecting growth.", "isCorrect": false, "rationale": "Considering external factors is good business practice, but the core issue related to falsifiability is the strategy's internal structure and its capacity to be proven wrong by specific outcomes."}], "id": "q07"}, {"question": "The text clarifies that falsifiability does *not* mean a claim is false. Which of the following statements further elaborates on what Popper argues is *not* the essence of a scientific claim?", "options": [{"text": "That it is useful, even if it works (like folk remedies).", "isCorrect": true, "rationale": "The text explicitly states: 'Not even that it is useful—folk remedies sometimes work without being scientific.' Usefulness is not Popper's criterion for scientific demarcation."}, {"text": "That it is widely accepted by the scientific community.", "isCorrect": false, "rationale": "While scientific consensus is important for established theories, Popper's criterion for *demarcation* is the theory's inherent testability, not its popularity or acceptance."}, {"text": "That it is derived through rigorous mathematical proof.", "isCorrect": false, "rationale": "Mathematical proof is applicable in formal sciences, but empirical scientific claims, which Popper addresses, rely on observations that can potentially refute them, not just logical deduction."}, {"text": "That it can be replicated by independent researchers.", "isCorrect": false, "rationale": "Replicability is a crucial aspect of good science, but it's a consequence of falsifiable claims making specific, repeatable predictions, rather than the primary definition of what makes a claim scientific for Popper."}], "id": "q08"}, {"question": "Popper's statement, 'A theory that explains everything explains nothing,' refers to the issue where:", "options": [{"text": "Theories become too broad to provide specific insights.", "isCorrect": false, "rationale": "While broadness can be a challenge, the core problem is not just lack of specificity but the theory's inherent ability to be confirmed by *any* outcome, making it untestable."}, {"text": "Overly complex theories are difficult to test empirically.", "isCorrect": false, "rationale": "Difficulty in testing is a practical concern, but Popper's point is about the *design* of the theory itself—if it can always find an explanation, it cannot be genuinely tested and therefore yields no real knowledge."}, {"text": "Theories are constructed to accommodate any possible evidence, rendering them immune to refutation.", "isCorrect": true, "rationale": "This is the essence of Popper's criticism of unfalsifiable theories like Marxism and Freudianism. If a theory can explain both an outcome and its opposite, it makes no genuine prediction and cannot be disproven, thus 'explains nothing' in a scientific sense."}, {"text": "Scientists become complacent and stop looking for new evidence once a theory seems universally applicable.", "isCorrect": false, "rationale": "Popper's statement focuses on the nature of the theory itself, not primarily on the behavior of scientists who might use it. The problem lies with a theory that is intrinsically immune to challenge."}], "id": "q09"}, {"question": "A medical researcher is designing a study to test a new drug for anxiety. To ensure the study adheres to Popper's criterion of falsifiability, which approach is most crucial?", "options": [{"text": "Ensuring the study is double-blinded to prevent bias.", "isCorrect": false, "rationale": "Double-blinding is vital for a fair and unbiased experiment, but it's a method to *execute* a test fairly, not the core design principle that allows the hypothesis to be *falsified*."}, {"text": "Pre-defining specific, measurable outcomes that, if not met, would lead to the rejection of the drug's effectiveness.", "isCorrect": true, "rationale": "This directly applies the 'Medical testing' example: 'A drug trial is designed so that the hypothesis (“this drug reduces symptoms”) can be falsified: if the treatment group does no better than the placebo group, the hypothesis fails.' Setting clear conditions for failure is key to falsifiability."}, {"text": "Gathering as much anecdotal evidence as possible from early users of the drug.", "isCorrect": false, "rationale": "The text explicitly states that 'without this structure, every anecdote becomes 'evidence' and useless remedies persist for centuries.' Anecdotal evidence is generally unfalsifiable and not considered scientific in this context."}, {"text": "Focusing solely on the positive changes observed in patients taking the drug.", "isCorrect": false, "rationale": "This approach represents confirmation bias, where only evidence supporting the hypothesis is sought, making the hypothesis unfalsifiable because no evidence would count against it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
