        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>

        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which individual is credited with pioneering the modern experimental study of confirmation bias in the 1960s?", "options": [{"text": "Francis Bacon", "isCorrect": false, "rationale": "Francis Bacon recognized the tendency in 1620, but he did not pioneer its modern experimental study."}, {"text": "Peter Wason", "isCorrect": true, "rationale": "Peter Wason is explicitly named as the pioneer of the modern experimental study of confirmation bias with his 'selection task' and '2-4-6 problem' in the 1960s."}, {"text": "Karl Popper", "isCorrect": false, "rationale": "Karl Popper is mentioned in the 'connections' section regarding falsifiability, which is related to but not the pioneering experimental study of confirmation bias itself."}, {"text": "Daniel Kahneman", "isCorrect": false, "rationale": "Daniel Kahneman, while a prominent figure in cognitive psychology, is not mentioned in the text as pioneering the experimental study of confirmation bias."}]}, {"question": "In Wason's '2-4-6 problem,' subjects failed to discover the actual rule ('any three ascending numbers') because they primarily:", "options": [{"text": "Lacked the intelligence to deduce a simple rule under experimental conditions.", "isCorrect": false, "rationale": "The text implies the rule was simple ('any three ascending numbers') and the failure was due to a cognitive bias, not intelligence."}, {"text": "Were biased towards odd numbers, which prevented them from seeing the correct pattern.", "isCorrect": false, "rationale": "The text states subjects hypothesized 'ascending even numbers,' indicating a bias towards even numbers, not odd ones."}, {"text": "Only sought sequences that confirmed their existing hypothesis, rather than attempting to falsify it.", "isCorrect": true, "rationale": "The text clearly states they 'only tested sequences they expected to work' and 'never tried... the kinds of tests that could have falsified their hypothesis,' which is the essence of confirmation bias in this experiment."}, {"text": "Were misled by Wason intentionally making the rule too ambiguous for straightforward discovery.", "isCorrect": false, "rationale": "The rule ('any three ascending numbers') was simple and clear; the subjects' failure stemmed from their testing strategy, not the rule's ambiguity."}]}, {"question": "Which of the following statements best encapsulates the definition of confirmation bias as described in the text?", "options": [{"text": "The tendency to randomly process information without any discernible pattern or preference.", "isCorrect": false, "rationale": "Confirmation bias involves a very specific, non-random pattern of information processing based on existing beliefs."}, {"text": "The inclination to interpret all new information as equally valid, regardless of its source or content.", "isCorrect": false, "rationale": "Confirmation bias involves selective interpretation and valuation of information, not treating all information equally."}, {"text": "The tendency to actively seek, notice, interpret, and remember information that aligns with one's existing beliefs, while ignoring or discounting contradictory evidence.", "isCorrect": true, "rationale": "This statement directly reflects the comprehensive definition provided in the text: 'the tendency to seek, notice, interpret, and remember information that confirms what we already believe, while ignoring, discounting, or forgetting information that contradicts it.'"}, {"text": "The predisposition to continuously revise one's beliefs in response to every new piece of information encountered.", "isCorrect": false, "rationale": "Confirmation bias leads to resistance to belief revision, as contradictory information is ignored or discounted."}]}, {"question": "A person who strongly believes that climate change is a hoax spends hours online looking for articles and videos that support their viewpoint, while actively avoiding news reports and scientific studies that present evidence for climate change. This behavior primarily demonstrates which stage of confirmation bias?", "options": [{"text": "Remembering confirming evidence.", "isCorrect": false, "rationale": "While remembering confirming evidence is a stage, this scenario specifically describes the active search for supportive content, not just recall."}, {"text": "Noticing confirming evidence.", "isCorrect": false, "rationale": "Noticing implies recognizing already present information. This scenario involves actively searching for it."}, {"text": "Seeking confirming evidence.", "isCorrect": true, "rationale": "The act of 'spending hours online looking for articles and videos that support their viewpoint' is a clear example of actively 'seeking confirming evidence,' as described in the text."}, {"text": "Interpreting ambiguous evidence as confirming.", "isCorrect": false, "rationale": "This scenario describes seeking specific types of information, not interpreting ambiguous information to fit a belief."}]}, {"question": "Two friends watch a basketball game. One is a fan of Team A, and the other is a fan of Team B. After the game, each friend emphatically states that the referees were biased against their team, pointing to several marginal calls they believe unfairly favored the opponent. This situation is an example of confirmation bias operating through:", "options": [{"text": "Seeking confirming evidence, as they intentionally looked for biased referee calls.", "isCorrect": false, "rationale": "They were watching the game as it happened, not actively seeking information prior to the event. Their bias affects how they perceive calls during the game."}, {"text": "Forgetting contradictory information, as they likely forgot calls that favored their team.", "isCorrect": false, "rationale": "While forgetting is a component, the primary action here is the interpretation of the calls as they occur, not primarily forgetting later."}, {"text": "Interpreting ambiguous evidence as confirming, seeing marginal calls as proof of bias.", "isCorrect": true, "rationale": "The text states, 'We interpret ambiguous evidence as confirming: the sports fan who believes referees are biased against his team sees every marginal call as proof.' This perfectly matches the scenario."}, {"text": "Recalling confirming evidence more readily, explaining their ability to list specific calls.", "isCorrect": false, "rationale": "While recall might play a role later, the immediate assertion that calls were biased points to interpretation as the primary operation at the time of observation."}]}, {"question": "In the Wason selection task, given the rule 'If a card has a vowel on one side, then it has an even number on the other,' and visible cards A, K, 4, 7, why is turning over the 7 card critical to properly test the rule?", "options": [{"text": "It ensures that cards with odd numbers never have consonants, which is part of the rule.", "isCorrect": false, "rationale": "The rule does not state anything about odd numbers and consonants; it specifically links vowels to even numbers."}, {"text": "It represents the only scenario where the rule can be definitively proven true.", "isCorrect": false, "rationale": "The task is about falsification. Turning over the 7 card is crucial for *disproving* the rule, not proving it true."}, {"text": "If the 7 card has a vowel on its other side, it would falsify the rule by presenting a vowel with an odd number.", "isCorrect": true, "rationale": "The rule states 'If Vowel, then Even.' If the 7 (an odd number) has a vowel on its flip side, it directly violates the rule, thus falsifying it. This is the critical test for disconfirmation."}, {"text": "It is merely an additional card to turn over, but not as important as the 'A' card for testing.", "isCorrect": false, "rationale": "The text emphasizes that the 7 card is the 'critical test' for falsification, often overlooked due to confirmation bias."}]}, {"question": "According to the text, what makes confirmation bias particularly dangerous for individuals?", "options": [{"text": "It exclusively affects people with lower intelligence, making them susceptible to manipulation by others.", "isCorrect": false, "rationale": "The text does not state that confirmation bias affects only people with lower intelligence; it's a fundamental cognitive bias that can affect anyone."}, {"text": "It leads individuals to consciously and maliciously ignore evidence, indicating a lack of ethical judgment.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not feel yourself ignoring contrary evidence. You feel like you are being thorough and rational,' indicating it is often unconscious rather than malicious."}, {"text": "It operates invisibly, causing individuals to perceive their biased search for evidence as thorough and rational inquiry.", "isCorrect": true, "rationale": "The text states, 'Confirmation bias is particularly dangerous because it is invisible to the person experiencing it. You feel like you are being thorough and rational. The search was rigged from the start, but from the inside it looked like honest inquiry.'"}, {"text": "It primarily motivates individuals to deliberately spread misinformation to others to reinforce their own views.", "isCorrect": false, "rationale": "While it can contribute to the spread of misinformation, the text emphasizes the danger to the individual's own perception and reasoning, not necessarily an active intent to mislead others."}]}, {"question": "Based on the 'keyconcept' box, what is identified as the strongest antidote to confirmation bias?", "options": [{"text": "Relying solely on one's intuition to form and maintain beliefs.", "isCorrect": false, "rationale": "Intuition can be a source of bias; relying solely on it would not counteract confirmation bias."}, {"text": "Avoiding all information that might challenge existing beliefs to prevent cognitive dissonance.", "isCorrect": false, "rationale": "This action would amplify, rather than counteract, confirmation bias, as it means actively ignoring contradictory information."}, {"text": "Actively seeking out and engaging with the strongest arguments that contradict one's own position.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states, 'The strongest antidote is to actively seek out the strongest arguments against your position.'"}, {"text": "Only consuming news and information from sources that explicitly claim to be unbiased.", "isCorrect": false, "rationale": "While source evaluation is important, this doesn't guarantee a challenge to one's own biases and doesn't involve the active seeking of counter-arguments as the antidote suggests."}]}, {"question": "A medical doctor forms an early hypothesis about a patient's condition after reviewing initial symptoms. Instead of ordering a broad range of tests, the doctor specifically requests tests that are likely to confirm their initial diagnosis, potentially overlooking other possibilities. This scenario is a real-world example of:", "options": [{"text": "The '2-4-6 problem' in a medical context.", "isCorrect": false, "rationale": "The '2-4-6 problem' is a specific puzzle about number sequences, not a general term for medical diagnosis issues."}, {"text": "The Wason selection task applied to patient care.", "isCorrect": false, "rationale": "The Wason selection task involves logical reasoning with cards, not medical diagnostic processes in this context."}, {"text": "Diagnostic anchoring, where an initial hypothesis is reinforced by confirmation bias.", "isCorrect": true, "rationale": "The 'realworld' section describes this exact scenario as 'diagnostic anchoring' where 'a doctor who forms an early hypothesis... will often seek tests that confirm the hypothesis rather than tests that could rule it out.'"}, {"text": "A deliberate act of medical negligence for financial gain.", "isCorrect": false, "rationale": "The text attributes this to a cognitive bias, 'diagnostic anchoring' (anchoring plus confirmation bias), not necessarily intentional negligence or financial motivation."}]}, {"question": "Which statement best summarizes the overarching impact and characteristics of confirmation bias as presented in the text?", "options": [{"text": "It is a minor cognitive quirk that primarily affects individuals in academic settings, with little impact on daily life.", "isCorrect": false, "rationale": "The text states it is 'arguably the single most important cognitive bias' and impacts various real-world scenarios like politics and medicine, not just academia."}, {"text": "It is a conscious decision to avoid inconvenient truths, easily overcome with basic critical thinking skills.", "isCorrect": false, "rationale": "The text emphasizes its invisibility and how it 'feels like you are being thorough and rational,' making it difficult to consciously overcome without active effort."}, {"text": "It is a fundamental and often invisible cognitive bias that underlies and amplifies many others, further exacerbated by modern influences like social media algorithms.", "isCorrect": true, "rationale": "The text calls it 'the single most important cognitive bias, the one that underlies and amplifies many others,' notes its invisibility, and explains how 'Social media algorithms amplify confirmation bias,' synthesizing its key characteristics and impact."}, {"text": "It is an outdated concept primarily relevant to historical studies, with little relevance in contemporary psychological understanding.", "isCorrect": false, "rationale": "The text refers to its modern experimental study in the 1960s, its standard use by the 1980s, and its relevance to modern phenomena like social media, indicating its continued importance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
