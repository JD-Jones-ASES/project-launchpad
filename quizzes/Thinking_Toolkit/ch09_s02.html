    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the central challenge posed by Agrippa's Trilemma?", "options": [{"text": "It proves that all knowledge is inherently false and unreliable.", "isCorrect": false, "rationale": "The text explicitly states, 'The trilemma does not prove that knowledge is impossible.' It challenges the justification of knowledge, not its existence."}, {"text": "It demonstrates that every attempt to justify a belief eventually leads to an unsatisfactory outcome from three exhaustive options.", "isCorrect": true, "rationale": "This option accurately captures the core message of Agrippa's Trilemma, which identifies three unavoidable and flawed pathways for any chain of justification: infinite regress, circularity, or dogmatism."}, {"text": "It argues that only scientific knowledge can be truly justified, while other forms of knowledge cannot.", "isCorrect": false, "rationale": "The trilemma applies to 'every system of belief,' including scientific ones, as indicated by examples like the scientific method's reliance on unproven assumptions."}, {"text": "It provides a method for achieving absolute certainty in any given belief system.", "isCorrect": false, "rationale": "On the contrary, the trilemma shows that 'certain knowledge — knowledge justified all the way down, with no gaps and no assumptions — is impossible.'"}]}, {"question": "According to the text, what is the primary flaw of an 'infinite regress' in the context of justifying a belief?", "options": [{"text": "It relies on an arbitrary, unjustified starting point.", "isCorrect": false, "rationale": "This describes the flaw of dogmatism (or foundationalism), not infinite regress, where the chain never stops."}, {"text": "It is logically empty because it merely restates the initial belief.", "isCorrect": false, "rationale": "This describes the flaw of circular reasoning, where justification loops back on itself without independent foundation."}, {"text": "It is intellectually honest but practically impossible to trace an endless chain of reasons to find solid ground.", "isCorrect": true, "rationale": "The text states that infinite regress means 'You never reach solid ground because there is no bottom. This is intellectually honest but practically impossible — we cannot trace an infinite chain of reasons.'"}, {"text": "It depends on a self-evident truth that requires no further proof.", "isCorrect": false, "rationale": "This describes a tenet of foundationalism/dogmatism, which aims to stop the regress, not embody it."}]}, {"question": "The analogy of Baron M\"unchhausen pulling himself out of a swamp by his own hair is used to illustrate which aspect of Agrippa's Trilemma?", "options": [{"text": "The difficulty of establishing genuinely self-justifying beliefs.", "isCorrect": false, "rationale": "This relates to foundationalism. The M\"unchhausen analogy specifically addresses the impossibility of self-sustained justification without external support."}, {"text": "The impracticality of an infinite chain of justifications.", "isCorrect": false, "rationale": "This relates to infinite regress. The M\"unchhausen analogy points to the logical emptiness of a self-referential system."}, {"text": "The logical emptiness and lack of independent foundation in circular reasoning.", "isCorrect": true, "rationale": "The text explicitly states: 'The chain has no loose end, but it also has no independent foundation. It holds itself up like Baron M\"unchhausen pulling himself out of a swamp by his own hair — which is, of course, impossible.'"}, {"text": "The arbitrary nature of asserting a belief without further justification.", "isCorrect": false, "rationale": "This relates to dogmatism. The M\"unchhausen analogy is about a system that appears self-sustaining but ultimately lacks external support."}]}, {"question": "Which of the following statements most accurately reflects the concept of 'dogmatism' as described by Agrippa's Trilemma?", "options": [{"text": "A belief system where justifications are endlessly provided without conclusion.", "isCorrect": false, "rationale": "This describes an infinite regress, not dogmatism, which is characterized by the chain of justification stopping."}, {"text": "A system where beliefs are mutually justified, forming a coherent web.", "isCorrect": false, "rationale": "This describes coherentism, a philosophical response to the trilemma, not dogmatism itself."}, {"text": "A chain of justification that stops at a belief simply asserted without further proof, deemed 'self-evident' or 'basic.'", "isCorrect": true, "rationale": "The text defines dogmatism (or foundationalism) as when 'The chain stops at some belief that is simply asserted without further justification: 'This is self-evident.' 'This is a basic axiom.' 'This is just obvious.''"}, {"text": "Justifications that loop back on themselves, creating a closed system of support.", "isCorrect": false, "rationale": "This describes circular reasoning, where the justification refers back to itself."}]}, {"question": "Which philosophical response to Agrippa's Trilemma seeks to identify beliefs that are 'genuinely self-justifying,' such as Descartes' 'I think, therefore I am'?", "options": [{"text": "Coherentism", "isCorrect": false, "rationale": "Coherentism accepts circularity, viewing justification as a web where beliefs mutually support each other, not as single self-justifying foundations."}, {"text": "Infinitism", "isCorrect": false, "rationale": "Infinitism accepts the idea of an infinite regress, arguing it's not absurd, rather than seeking a definitive stopping point."}, {"text": "Skepticism", "isCorrect": false, "rationale": "While Agrippa was a Skeptic, skepticism itself is not presented as one of the three 'responses' that embrace a horn of the trilemma in the way foundationalism, coherentism, and infinitism are."}, {"text": "Foundationalism", "isCorrect": true, "rationale": "The text states: 'Foundationalists accept the third option (dogmatism) and try to identify beliefs that are genuinely self-justifying — beliefs so basic that they need no external support. Descartes' 'I think, therefore I am' is the classic example.'"}]}, {"question": "A scientist asserts that 'the laws of physics are uniform throughout the universe' as a necessary assumption for their experiments, without offering further proof for this uniformity. According to Agrippa's Trilemma, this scenario most closely exemplifies which horn?", "options": [{"text": "Infinite Regress", "isCorrect": false, "rationale": "An infinite regress involves an unending chain of justifications, which is not what happens when an assumption is simply asserted as a stopping point."}, {"text": "Circular Reasoning", "isCorrect": false, "rationale": "Circular reasoning would involve justifying the uniformity of nature by referring back to experiments that assume that uniformity, creating a loop. Here, it's an assertion that stops the chain."}, {"text": "Dogmatism (or Foundationalism)", "isCorrect": true, "rationale": "The text explains dogmatism as when 'The chain stops at some belief that is simply asserted without further justification: 'This is self-evident.' 'This is a basic axiom.' 'This is just obvious.' The scientist's assertion of uniformity acts as such an unjustified assumption."}, {"text": "Coherentism", "isCorrect": false, "rationale": "Coherentism involves a web of mutually supporting beliefs. Asserting a single, unproven assumption as a starting point does not fit this model."}]}, {"question": "How does Coherentism propose to overcome the problem of justification, according to the text?", "options": [{"text": "By arguing that an infinite chain of justifications is not inherently problematic.", "isCorrect": false, "rationale": "This is the approach taken by Infinitism, which accepts the first option of the trilemma (infinite regress)."}, {"text": "By finding a bedrock of self-evident truths that require no external support.", "isCorrect": false, "rationale": "This is the approach taken by Foundationalism, which accepts the third option (dogmatism)."}, {"text": "By viewing justification as a web where beliefs mutually justify each other, emphasizing overall system coherence.", "isCorrect": true, "rationale": "The text states: 'Coherentists accept a version of the second option (circular reasoning) and argue that justification is not a chain but a web. No single belief is the foundation; instead, beliefs justify each other mutually, and the strength of the system lies in its overall coherence.'"}, {"text": "By asserting certain beliefs without justification, accepting them as arbitrary starting points.", "isCorrect": false, "rationale": "This describes dogmatism, the problem Coherentism attempts to address by creating a network of justification rather than an arbitrary stop."}]}, {"question": "Which statement best summarizes the overall implication of Agrippa's Trilemma regarding the nature of knowledge systems?", "options": [{"text": "It implies that rigorous knowledge systems, like science, are immune to these justification problems.", "isCorrect": false, "rationale": "The text explicitly states that 'All knowledge systems, including the most rigorous sciences, rest on foundations they cannot independently prove.'"}, {"text": "It suggests that achieving 'certain knowledge'—justified 'all the way down'—is impossible.", "isCorrect": true, "rationale": "The text clearly states, 'The trilemma does not prove that knowledge is impossible. Rather, it shows that certain knowledge — knowledge justified all the way down, with no gaps and no assumptions — is impossible.'"}, {"text": "It provides a clear method for definitively proving the truth of any given belief.", "isCorrect": false, "rationale": "The trilemma highlights the inherent difficulties in achieving ultimate justification, not a method for definitive proof."}, {"text": "It encourages intellectual despair by showing that all beliefs are ultimately baseless.", "isCorrect": false, "rationale": "The text calls it 'not a counsel of despair — it is a counsel of humility,' emphasizing its value for intellectual honesty rather than nihilism."}]}, {"question": "What is the key takeaway regarding Agrippa's Trilemma's 'real value' in practical intellectual discourse?", "options": [{"text": "It serves as a puzzle for philosophers to solve and achieve consensus on a single perfect justification method.", "isCorrect": false, "rationale": "The text states, 'But its real value is not as a puzzle to be solved — it is as a tool for intellectual honesty.'"}, {"text": "It proves that all arguments presented with absolute certainty are inherently false.", "isCorrect": false, "rationale": "It invites us to question what certainty rests on, not to declare all 'certain' arguments false outright. It's about scrutiny, not dismissal."}, {"text": "It is a tool for intellectual honesty, inviting inquiry into the foundations of claims of absolute certainty.", "isCorrect": true, "rationale": "The text states: 'But its real value is not as a puzzle to be solved — it is as a tool for intellectual honesty. Whenever someone presents you with an argument that seems to rest on absolute certainty, Agrippa's Trilemma invites you to ask: what is this certainty resting on?'"}, {"text": "It is a debater's ploy used to discredit any argument that attempts to establish a truth.", "isCorrect": false, "rationale": "The text explicitly denies this, stating: 'This is not a trick or a debater's ploy. It is a genuine structural feature of the concept of justification itself.'"}]}, {"question": "How do G\"odel's Incompleteness Theorems relate to Agrippa's Trilemma, according to the text?", "options": [{"text": "They demonstrate that mathematical systems can achieve absolute certainty, unlike philosophical ones.", "isCorrect": false, "rationale": "The text presents G\"odel's theorems as 'a formal version of the trilemma's insight,' meaning they show limitations, not absolute certainty, in formal systems."}, {"text": "They provide a method for avoiding all three horns of the trilemma within formal mathematical systems.", "isCorrect": false, "rationale": "G\"odel's theorems actually prove limitations, showing that any sufficiently powerful formal system contains truths it cannot prove from within, which is akin to the trilemma's insights about unproven foundations."}, {"text": "They show that mathematical proofs, like other justifications, ultimately rest on assumptions or circularity, or require infinite regress.", "isCorrect": true, "rationale": "The text describes G\"odel's Incompleteness Theorems as proving 'that any sufficiently powerful formal system contains truths it cannot prove from within — a formal version of the trilemma's insight.' This aligns with the idea that even rigorous systems cannot avoid resting on something unproven or self-referential."}, {"text": "They are unrelated concepts, as G\"odel's theorems apply only to logic, not epistemology.", "isCorrect": false, "rationale": "The 'connections' section explicitly links G\"odel's theorems as the 'mathematical counterpart of this philosophical puzzle,' indicating a strong relationship."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
