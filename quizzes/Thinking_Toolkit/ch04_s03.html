<script>
var QUESTIONS = [{"question": "What does \"base rate neglect\" primarily describe?", "options": [{"text": "Overestimating the accuracy of a medical test due to its complexity.", "isCorrect": false, "rationale": "Base rate neglect is not about overestimating the technical accuracy of a test itself, but rather misinterpreting the implications of its results by ignoring broader statistical context."}, {"text": "The tendency to focus on specific evidence while ignoring the overall frequency or prior probability of an event.", "isCorrect": true, "rationale": "This option accurately captures the definition provided in the text: 'the tendency to focus on the specific evidence (the positive test result) while ignoring the prior probability (the base rate of the disease in the population).'"}, {"text": "The inability to understand complex statistical formulas, such as those used in Bayesian probability.", "isCorrect": false, "rationale": "While statistical concepts can be complex, base rate neglect is a cognitive bias in intuitive judgment, not merely an inability to perform calculations, as Kahneman and Tversky demonstrated it affects even those with statistical knowledge."}, {"text": "A tendency to seek out and interpret evidence in a way that confirms one's pre-existing beliefs.", "isCorrect": false, "rationale": "This describes confirmation bias, which is a different cognitive bias not directly defined as base rate neglect in the provided text."}], "id": "q01"}, {"question": "Who are credited with demonstrating that people systematically ignore base rates in their decision-making?", "options": [{"text": "Thomas Bayes", "isCorrect": false, "rationale": "Thomas Bayes formalized Bayesian probability theory in the 18th century, which is the mathematical foundation, but he did not demonstrate the cognitive bias of base rate neglect."}, {"text": "Kahneman and Tversky", "isCorrect": true, "rationale": "The text explicitly states: 'Kahneman and Tversky demonstrated in the 1970s that people systematically ignore base rates when evaluating evidence.'"}, {"text": "Gigerenzer and colleagues", "isCorrect": false, "rationale": "Gigerenzer and colleagues studied base rate neglect in the context of mammography screening, but Kahneman and Tversky were the original researchers to demonstrate the systematic nature of the bias."}, {"text": "Isaac Newton", "isCorrect": false, "rationale": "Isaac Newton was a physicist and mathematician centuries before the concept of base rate neglect was identified."}], "id": "q02"}, {"question": "In the provided medical test scenario (disease affects 1 in 1,000, test sensitivity 99%, specificity 95%), a positive test result means the probability of actually having the disease is approximately 2%. Which factor is most responsible for this counterintuitive result?", "options": [{"text": "The test's low sensitivity, meaning it misses many true cases.", "isCorrect": false, "rationale": "The test's sensitivity is explicitly stated as 99%, which is high, not low. A low sensitivity would lead to many false negatives, not necessarily a low probability of disease given a positive result."}, {"text": "An extremely high false-negative rate for the test.", "isCorrect": false, "rationale": "The false-negative rate is 1% (100% - 99% sensitivity), which is very low. A high false-negative rate would mean many sick people test negative."}, {"text": "The very low prevalence (base rate) of the disease in the overall population.", "isCorrect": true, "rationale": "The text explains that when the disease is rare (1 in 1,000), even a small false-positive rate (5%) generates a 'flood of false alarms' that vastly outnumber the true cases, leading to a low posterior probability of actually having the disease despite a positive test."}, {"text": "The miscalibration of the testing equipment used in the study.", "isCorrect": false, "rationale": "The scenario assumes the test parameters (sensitivity and specificity) are accurate and calibrated; the problem arises from interpreting results given these known parameters and the base rate."}], "id": "q03"}, {"question": "When presented with the medical test scenario, why do most people, including doctors, intuitively overestimate the probability of having the disease after a positive test?", "options": [{"text": "They correctly recognize that a highly sensitive test is almost always indicative of the disease.", "isCorrect": false, "rationale": "While a highly sensitive test is good at catching true positives, this statement embodies the neglect of the base rate, which is the core error."}, {"text": "They focus too much on the test's high accuracy rates (sensitivity and specificity) and too little on the disease's rarity (base rate).", "isCorrect": true, "rationale": "The text states that base rate neglect is 'the tendency to focus on the specific evidence (the positive test result) while ignoring the prior probability (the base rate of the disease in the population).' People are drawn to the 99% sensitivity or 95% specificity and overlook the 1 in 1,000 disease prevalence."}, {"text": "They are deliberately trying to sensationalize the test results.", "isCorrect": false, "rationale": "The text implies a systematic cognitive error or bias, not a deliberate attempt to sensationalize or mislead."}, {"text": "They mistakenly believe that a negative test result is more informative than a positive one.", "isCorrect": false, "rationale": "The common intuition leans towards a positive test being highly indicative, rather than less informative."}], "id": "q04"}, {"question": "According to the text, what is the primary consequence when even a highly accurate test is used to screen for a very rare condition across a large population?", "options": [{"text": "The test's intrinsic accuracy (sensitivity and specificity) significantly decreases.", "isCorrect": false, "rationale": "The text states the test is 'highly accurate' and its inherent properties don't change. The issue is how results are interpreted given the base rate."}, {"text": "It leads to an increase in false-negative results, missing many people who have the condition.", "isCorrect": false, "rationale": "A highly accurate test (high sensitivity) would ideally have a low false-negative rate. The problem described relates to positive results, not missed cases."}, {"text": "It generates a large number of false-positive results relative to true positives.", "isCorrect": true, "rationale": "The text explains: 'when the disease is rare, even a small false-positive rate generates a flood of false alarms that vastly outnumber the true cases.'"}, {"text": "The cost of performing the test becomes astronomically high for each true positive.", "isCorrect": false, "rationale": "While cost can be an issue, the primary consequence highlighted is the proliferation of false positives and the misinterpretation of results, not just the raw financial cost of the test itself."}], "id": "q05"}, {"question": "A forensic DNA match indicates a profile found in 1 in a million people. In a country of 330 million people, a prosecutor argues this is overwhelming evidence of guilt. Applying the concept of base rate neglect, what critical piece of information might be overlooked?", "options": [{"text": "The DNA test's sensitivity might be lower than reported, making the match unreliable.", "isCorrect": false, "rationale": "Base rate neglect doesn't question the test's stated sensitivity, but rather how the result is interpreted given the prevalence of the characteristic."}, {"text": "The probability that the suspect could have an identical twin with the same DNA profile.", "isCorrect": false, "rationale": "While identical twins share DNA, the core issue of base rate neglect in this example is about the broader population prevalence of the specific DNA profile, not a specific familial relationship."}, {"text": "The large number of other individuals in the population (roughly 330) who could also share that DNA profile.", "isCorrect": true, "rationale": "The text states: 'A DNA profile that occurs in 1 in a million people sounds like a slam dunk, but in a country of 330 million, roughly 330 people share that profile.' The overlooked base rate is the number of people in the population who possess that specific DNA profile, diminishing the uniqueness of the match."}, {"text": "The possibility of contamination at the crime scene leading to a false match.", "isCorrect": false, "rationale": "Contamination is a valid concern in forensics but is a different type of issue than base rate neglect, which focuses on the statistical interpretation of the match itself."}], "id": "q06"}, {"question": "Why might a widespread screening program for a rare but dangerous condition, even if using an accurate test, lead to significant societal costs and anxiety?", "options": [{"text": "The cost of manufacturing the test kits is always prohibitive for rare diseases.", "isCorrect": false, "rationale": "While costs are a factor, the text focuses on consequences stemming from the *results* of the screening, not just the initial manufacturing cost."}, {"text": "The high base rate of the condition leads to an overwhelming number of true positives, straining healthcare resources.", "isCorrect": false, "rationale": "The problem arises when the condition is *rare* (low base rate), not high. A high base rate would mean many true positives, but not necessarily a high proportion of false positives."}, {"text": "The low base rate of the condition ensures that most positive results will be false alarms, leading to unnecessary interventions and emotional distress.", "isCorrect": true, "rationale": "The text explicitly states: 'A screening program that sounds sensible... may generate far more false positives than true positives, causing unnecessary anxiety, follow-up procedures, and expense.' This happens precisely because of the low base rate."}, {"text": "People refuse to participate in screening programs, making them ineffective regardless of test accuracy.", "isCorrect": false, "rationale": "The text describes problems *after* people participate and receive positive results, not due to lack of participation."}], "id": "q07"}, {"question": "In Bayesian reasoning as applied to the medical test example, which term represents the 'base rate' that people typically neglect?", "options": [{"text": "Sensitivity, P(+|D)", "isCorrect": false, "rationale": "Sensitivity (P(+|D)) is 'how likely the evidence is if the hypothesis is true'—the probability of testing positive if you have the disease. It is a key piece of specific evidence, not the base rate."}, {"text": "False-positive rate, P(+|~D)", "isCorrect": false, "rationale": "The false-positive rate (P(+|~D)) is the probability of testing positive if you do *not* have the disease. This is also specific evidence related to the test's accuracy, not the base rate of the disease itself."}, {"text": "Prior probability, P(D)", "isCorrect": true, "rationale": "The text defines 'Prior probability (base rate): The probability you have the disease before the test is P(D) = 0.001 (1 in 1,000).' This is the 'how likely the hypothesis was before seeing the evidence' component, which is typically neglected."}, {"text": "Posterior probability, P(D|+)", "isCorrect": false, "rationale": "Posterior probability (P(D|+)) is 'what we want'—the updated belief of having the disease given a positive test. It's the *result* of applying Bayesian reasoning, not the neglected base rate input."}], "id": "q08"}, {"question": "The text states, 'The test is accurate in the sense that it rarely misses a sick person and usually clears a healthy one.' However, it concludes that 'the prior matters.' How can a test be considered 'accurate' yet still lead to highly misleading conclusions if base rates are ignored?", "options": [{"text": "Test accuracy only refers to its speed, not its correctness in identifying conditions.", "isCorrect": false, "rationale": "This misdefines accuracy. The text clearly refers to the test's correctness (sensitivity and specificity) when it calls it 'accurate'."}, {"text": "'Accuracy' here refers to its technical performance (sensitivity/specificity), but doesn't inherently account for the real-world probability of the condition in the general population.", "isCorrect": true, "rationale": "This option correctly explains that a test's individual performance metrics (sensitivity, specificity) are distinct from its predictive value in a population with a given base rate. An accurate test can still produce many false positives if the base rate is low."}, {"text": "People deliberately misinterpret the test results to suit their biases, regardless of the test's true accuracy.", "isCorrect": false, "rationale": "Base rate neglect is a cognitive bias that often occurs unconsciously, not a deliberate misinterpretation."}, {"text": "The test's accuracy decreases significantly when applied to rare diseases because of their low prevalence.", "isCorrect": false, "rationale": "The intrinsic accuracy (sensitivity and specificity) of the test does not change based on the prevalence of the disease; what changes is the *predictive value* of a positive result."}], "id": "q09"}, {"question": "Based on the entire section, what is the most crucial action an individual should take to avoid base rate neglect when evaluating new evidence or test results?", "options": [{"text": "Solely rely on the reported sensitivity and specificity of the test, as these indicate its direct performance.", "isCorrect": false, "rationale": "This is precisely what people tend to do when neglecting the base rate, leading to erroneous conclusions. While sensitivity and specificity are important, they are not sufficient on their own."}, {"text": "Assume that the new evidence automatically confirms the hypothesis with a high degree of certainty.", "isCorrect": false, "rationale": "This assumption is a direct consequence of base rate neglect and would lead to overconfidence in the hypothesis, especially for rare conditions."}, {"text": "Always consider the prior probability or base rate of the event or condition in the relevant population.", "isCorrect": true, "rationale": "The text's 'Key Concept' states, 'The Prior Matters... Always ask: 'What is the base rate?'' This is the central lesson for avoiding base rate neglect."}, {"text": "Seek out additional, more expensive tests until a consistent result is obtained.", "isCorrect": false, "rationale": "While seeking more information can be useful, it doesn't address the core cognitive bias of neglecting the base rate in interpreting any test result, expensive or otherwise. The issue is *how* we interpret the data, not just the quantity of data."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
