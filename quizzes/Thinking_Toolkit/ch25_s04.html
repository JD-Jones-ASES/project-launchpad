    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 25, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following accurately describes the two primary conditions given by the judge in the Unexpected Hanging Paradox?", "options": [{"text": "The hanging must occur on a weekend, and the prisoner must be able to deduce the day.", "isCorrect": false, "rationale": "The judge stated the hanging would be 'one day next week' and 'the day of the hanging will be a surprise,' meaning the prisoner should not be able to deduce it."}, {"text": "The hanging will occur sometime next week, and the prisoner must not be able to deduce it the evening before.", "isCorrect": true, "rationale": "The judge's conditions were: 'You will be hanged one day next week,' and 'the day of the hanging will be a surprise. You will not be able to deduce, the evening before, that the hanging will occur the following day.'"}, {"text": "The hanging will occur on Monday or Tuesday, and the prisoner will be told the day 24 hours in advance.", "isCorrect": false, "rationale": "The judge did not specify particular days of the week, and the condition was that the hanging would be a surprise, precluding advance notice."}, {"text": "The hanging can occur any day, but the prisoner must be allowed to appeal the evening before.", "isCorrect": false, "rationale": "The judge did not mention an appeal, and the primary condition was the element of surprise regarding the day."}], "id": "q01"}, {"question": "The prisoner's initial step in reasoning eliminates Friday as a possible day for the hanging. What is the core logic he uses to do this?", "options": [{"text": "He knows Friday is a holiday, so no hanging can occur.", "isCorrect": false, "rationale": "The text does not mention Friday being a holiday or this reasoning by the prisoner."}, {"text": "If not hanged by Thursday, Friday would be the only remaining day, making it no surprise.", "isCorrect": true, "rationale": "The prisoner reasons: 'If I have not been hanged by Thursday evening, then Friday is the only day left. I would know Thursday night that the hanging must be on Friday. That means it would not be a surprise. So the judge's conditions rule out Friday.'"}, {"text": "The judge explicitly stated Friday was not an option.", "isCorrect": false, "rationale": "The judge's statement was general, not specifying or eliminating any particular day."}, {"text": "He believed he had an alibi for Friday.", "isCorrect": false, "rationale": "The text does not mention the prisoner having or reasoning about an alibi."}], "id": "q02"}, {"question": "Based on the prisoner's complete chain of backward reasoning, what is his ultimate conclusion about the hanging?", "options": [{"text": "He can only be hanged on Monday.", "isCorrect": false, "rationale": "The prisoner eliminates Monday through the same backward reasoning process, concluding it cannot happen then either."}, {"text": "The hanging is inevitable, and he cannot escape it.", "isCorrect": false, "rationale": "The prisoner's conclusion is precisely the opposite: that the hanging cannot occur."}, {"text": "The judge's sentence is self-contradictory, and the hanging cannot occur at all.", "isCorrect": true, "rationale": "After eliminating each day, the prisoner 'Triumphantly, he concludes that the hanging cannot happen at all — the judge's sentence is self-contradictory.'"}, {"text": "The judge will pardon him due to the logical flaw.", "isCorrect": false, "rationale": "The text does not mention any expectation of a pardon from the prisoner."}], "id": "q03"}, {"question": "Despite the prisoner's logical conclusion, what actually happens in the paradox, and what is the prisoner's reaction?", "options": [{"text": "The judge cancels the hanging, confirming the prisoner's logic.", "isCorrect": false, "rationale": "The text explicitly states that the hanging *does* occur, contrary to the prisoner's conclusion."}, {"text": "The executioner arrives on Thursday, and the prisoner is not surprised.", "isCorrect": false, "rationale": "The executioner arrives on Wednesday morning, and the prisoner is genuinely surprised, which contradicts this option."}, {"text": "The executioner arrives on Wednesday morning, and the prisoner is genuinely surprised.", "isCorrect": true, "rationale": "The text states: 'Then, on Wednesday morning, the executioner arrives. The prisoner is genuinely surprised.'"}, {"text": "The executioner arrives on Friday, as the prisoner initially predicted.", "isCorrect": false, "rationale": "The prisoner eliminated Friday as a possibility, and the executioner arrived on Wednesday."}], "id": "q04"}, {"question": "The explanation 'The knowledge problem' suggests the prisoner's argument is 'self-undermining.' How does his reasoning achieve this?", "options": [{"text": "By proving the hanging cannot happen, he destroys the certainty that it *will* happen, thus allowing it to be a surprise.", "isCorrect": true, "rationale": "The text states: 'if his argument proves that the hanging cannot happen, then he cannot know it will happen on any remaining day, which means it can be a surprise after all. The argument saws off the branch it sits on.'"}, {"text": "By focusing on his own knowledge, he neglects external factors like the executioner's schedule.", "isCorrect": false, "rationale": "While true that external factors are involved, the 'knowledge problem' specifically refers to how his *own reasoning* undermines his ability to know, not merely a neglect of external factors."}, {"text": "He fails to account for the judge's potential to change the rules mid-week.", "isCorrect": false, "rationale": "The problem lies within the structure of the reasoning itself, not a change in the judge's rules."}, {"text": "His logic is fundamentally flawed because he starts with a false premise.", "isCorrect": false, "rationale": "The paradox arises because the prisoner's reasoning 'seems valid at each step,' not because of an explicitly false initial premise."}], "id": "q05"}, {"question": "How does the concept of 'self-reference' apply to the Unexpected Hanging Paradox, as explained in the text?", "options": [{"text": "The judge's sentence directly refers to the prisoner's previous criminal record.", "isCorrect": false, "rationale": "The text does not state that the judge's sentence refers to the prisoner's criminal record."}, {"text": "The paradox arises because the judge's sentence refers to the prisoner's own state of knowledge, creating a feedback loop.", "isCorrect": true, "rationale": "The text states: 'the judge's sentence refers to the prisoner's own state of knowledge, which in turn depends on the sentence. The prisoner is trying to reason about a system that includes his own reasoning as a component, and this creates a feedback loop.'"}, {"text": "The prisoner's reasoning is solely about himself and his own survival, making it selfish.", "isCorrect": false, "rationale": "While the prisoner is reasoning about himself, the 'self-reference' in this context is a logical term, not a judgment on his motivations."}, {"text": "The executioner refers back to previous hangings as a precedent.", "isCorrect": false, "rationale": "The text does not mention the executioner's actions involving self-reference."}], "id": "q06"}, {"question": "The explanation 'The gap between logic and experience' suggests what about the prisoner's reasoning?", "options": [{"text": "His logic is faulty because it doesn't align with the emotional reality of facing execution.", "isCorrect": false, "rationale": "This explanation focuses on formal logic versus the actual world, not the emotional aspect."}, {"text": "While logically valid in a narrow formal sense, his deduction proves something about a world that doesn't match the actual world where events simply occur.", "isCorrect": true, "rationale": "The text states: 'The prisoner's logical deduction is valid in a narrow formal sense, but it proves something about a world that does not match the actual world — because in the actual world, the executioner simply shows up.'"}, {"text": "He lacked the practical experience of predicting hangings to make an accurate deduction.", "isCorrect": false, "rationale": "The explanation is about the nature of logic versus reality, not the prisoner's personal experience level."}, {"text": "The judge used an illogical sentence, making any logical deduction impossible.", "isCorrect": false, "rationale": "The explanation doesn't say the judge's sentence is illogical; it addresses the outcome of the prisoner's 'valid' deduction."}], "id": "q07"}, {"question": "In the 'thinkaboutit' scenario, a student applies the prisoner's logic to a professor's promise of a 'surprise quiz next week' and concludes no quiz is possible. If the professor *does* give the quiz on Tuesday and the student is surprised, what crucial flaw in the student's reasoning, as identified by the paradox explanations, is highlighted?", "options": [{"text": "The student failed to account for the professor's authority to override logical conclusions.", "isCorrect": false, "rationale": "The paradox doesn't highlight authority overriding logic, but the inherent self-undermining nature of the logic itself."}, {"text": "The student's logical elimination destroyed their knowledge that the quiz *would* occur, making it a surprise when it did.", "isCorrect": true, "rationale": "This aligns with 'The knowledge problem' explanation: 'if his argument proves that the hanging cannot happen, then he cannot know it will happen on any remaining day, which means it can be a surprise after all.'"}, {"text": "The student should have reasoned forward instead of backward through the week.", "isCorrect": false, "rationale": "The method of reasoning (backward elimination) is 'locally valid at each step'; the flaw is in its global effect on knowledge, not the direction."}, {"text": "A quiz is not as serious as a hanging, so the paradox doesn't apply.", "isCorrect": false, "rationale": "The text explicitly uses the 'surprise quiz' as an analogous situation, implying the logical structure of the paradox applies regardless of the stakes."}], "id": "q08"}, {"question": "According to the 'keyconcept' summary, what is the central insight revealed by the Unexpected Hanging Paradox?", "options": [{"text": "That judges are inherently contradictory and cannot be trusted.", "isCorrect": false, "rationale": "The 'keyconcept' focuses on the nature of reasoning about knowledge and surprise, not a critique of judicial integrity."}, {"text": "Logical reasoning can always predict future events with certainty if done correctly.", "isCorrect": false, "rationale": "The paradox demonstrates the opposite: that seemingly valid logic can fail to predict actual future events, especially when self-referential."}, {"text": "Reasoning about one's own future knowledge, particularly concerning surprise, can be treacherous and lead to self-defeating conclusions.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'The Unexpected Hanging Paradox shows that reasoning about one's own future knowledge can be treacherous. The prisoner's backward elimination is locally valid at each step but globally self-defeating...'"}, {"text": "The world operates purely on formal logic, and experience is secondary.", "isCorrect": false, "rationale": "The paradox highlights 'the gap between logic and experience,' showing that reality 'cheerfully ignores' some logical conclusions."}], "id": "q09"}, {"question": "The text mentions that the Unexpected Hanging Paradox, like the Liar Paradox, is rooted in what fundamental concept?", "options": [{"text": "The fallibility of human memory.", "isCorrect": false, "rationale": "The text does not link either paradox to human memory."}, {"text": "The subjective nature of truth.", "isCorrect": false, "rationale": "While related to truth, 'self-reference' is the specific concept highlighted by the text."}, {"text": "The problem of self-reference, where a statement refers to itself or its own truth value.", "isCorrect": true, "rationale": "Under 'What Went Wrong?', the text states: 'Like the Liar Paradox, the Unexpected Hanging involves self-reference.' The 'connections' section also lists 'The Liar Paradox... another paradox rooted in self-reference.'"}, {"text": "The limitations of language to express simple truths.", "isCorrect": false, "rationale": "The focus is on the logical structure of self-reference, not a general limitation of language."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
