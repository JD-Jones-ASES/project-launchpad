<script>
var QUESTIONS = [{"question": "What is the fundamental difference between a 'one-way door' and a 'two-way door' decision according to the text?", "options": [{"text": "The amount of financial investment required.", "isCorrect": false, "rationale": "While financial investment might be a factor in some decisions, the text does not define the distinction based on the amount of money involved; it focuses on reversibility."}, {"text": "Whether the decision can be easily reversed or not.", "isCorrect": true, "rationale": "The text explicitly states, 'A one-way door is an irreversible decision. Once you walk through it, you cannot walk back.' and 'A two-way door is a reversible decision. If it does not work out, you can walk back through and try something else.' This defines the core distinction."}, {"text": "The number of people involved in making the decision.", "isCorrect": false, "rationale": "The number of people involved in a decision is a procedural aspect, not the fundamental characteristic distinguishing one-way from two-way doors."}, {"text": "How quickly the decision's outcome becomes apparent.", "isCorrect": false, "rationale": "The speed of outcome is not the primary defining characteristic; reversibility is the key differentiator described in the text."}]}, {"question": "A company decides to completely overhaul its core product, replacing its existing software platform with an entirely new one built from scratch, with no immediate rollback plan. Based on the text, how should this decision primarily be classified?", "options": [{"text": "A two-way door, because technology is always changing.", "isCorrect": false, "rationale": "While technology evolves, the decision to replace a core platform from scratch without a rollback is presented as a high-stakes, difficult-to-undo move, not easily reversible like launching a new feature that can be rolled back."}, {"text": "A one-way door, due to the significant, likely irreversible commitment and consequences.", "isCorrect": true, "rationale": "The text defines one-way doors as 'irreversible decisions' with long-term consequences, giving examples like 'publishing a book' or 'selling your business.' A complete overhaul of a core product with no rollback plan fits this description due to its high cost, time investment, and profound impact, making it difficult or impossible to revert without significant loss."}, {"text": "A Type 2 decision, as all product decisions are reversible over time.", "isCorrect": false, "rationale": "A Type 2 decision is defined as reversible. This scenario, with 'no immediate rollback plan' and a complete overhaul, implies irreversibility, aligning with Type 1 (one-way door)."}, {"text": "A Type 1 decision, but it should be treated with two-way door speed.", "isCorrect": false, "rationale": "While it is a Type 1 decision, treating it with 'two-way door speed' (i.e., less deliberation) would be contrary to the text's advice for one-way doors, which deserve 'careful analysis, deliberation, and consultation.'"}]}, {"question": "According to Jeff Bezos's insight, what is the primary consequence when most organizations treat two-way door decisions with one-way door caution?", "options": [{"text": "Increased accountability and improved decision quality.", "isCorrect": false, "rationale": "Treating two-way doors with one-way door caution typically leads to over-analysis and delay, not necessarily improved decision quality, and can actually hinder productive accountability by deferring action."}, {"text": "A reduction in overall organizational risk.", "isCorrect": false, "rationale": "While caution aims to reduce risk, excessive caution on reversible decisions actually introduces the risk of inaction, which the text calls 'the costliest choice of all,' implying it does not reduce overall risk effectively."}, {"text": "Organizational paralysis, leading to missed opportunities.", "isCorrect": true, "rationale": "The text states, 'The insight, as Bezos has argued... is that most decisions are two-way doors, but most organizations treat them as one-way doors. The result is paralysis. ...By the time the decision is made, the opportunity has often passed.'"}, {"text": "More thorough data collection and analysis.", "isCorrect": false, "rationale": "While more data might be collected, the text emphasizes that this excessive process delays the decision, often past the point of opportunity, indicating a negative outcome rather than a benefit."}]}, {"question": "Which psychological biases are explicitly mentioned in the text as contributing to the misclassification of two-way doors as one-way doors?", "options": [{"text": "Confirmation bias and sunk cost fallacy.", "isCorrect": false, "rationale": "While these are valid psychological biases, they are not mentioned in this specific section as reasons for the misclassification discussed."}, {"text": "Anchoring bias and availability heuristic.", "isCorrect": false, "rationale": "While these are valid psychological biases, they are not mentioned in this specific section as reasons for the misclassification discussed."}, {"text": "Loss aversion and status quo bias.", "isCorrect": true, "rationale": "The text directly states, 'The reason for this mismatch is psychological. Loss aversion... makes us overweight the downside of any decision. Status quo bias... makes the current state feel safer than any alternative.'"}, {"text": "Self-serving bias and fundamental attribution error.", "isCorrect": false, "rationale": "While these are valid psychological biases, they are not mentioned in this specific section as reasons for the misclassification discussed."}]}, {"question": "Before a team invests significant time and energy into deciding on a new marketing campaign, what is the most critical first question they should ask, according to the practical framework presented?", "options": [{"text": "What is the potential return on investment for this campaign?", "isCorrect": false, "rationale": "While ROI is important, the text emphasizes classifying the type of decision first to determine the appropriate level of deliberation, before diving into detailed analysis."}, {"text": "Is this a one-way door or a two-way door decision?", "isCorrect": true, "rationale": "The practical framework states, 'Before investing significant time and energy in a decision, ask: is this a one-way door or a two-way door?' This is the foundational step for calibrating deliberation."}, {"text": "How will this campaign affect our market share?", "isCorrect": false, "rationale": "Market share impact is a consequence to analyze, but the text's framework prioritizes classifying the decision type before extensive analysis begins."}, {"text": "Who needs to approve this decision?", "isCorrect": false, "rationale": "Approval processes are important, but the text's framework places the classification of the decision type as the initial and most critical step before engaging in procedural elements."}]}, {"question": "The text suggests a 'fix' for organizational paralysis caused by misclassifying decisions. What does this fix primarily involve?", "options": [{"text": "Forming more committees to ensure all perspectives are heard.", "isCorrect": false, "rationale": "The text criticizes the formation of committees as contributing to paralysis when applied to two-way doors, making this an unlikely fix."}, {"text": "Streamlining approval processes for all types of decisions.", "isCorrect": false, "rationale": "While streamlining can be beneficial, the text's core 'fix' is about appropriate deliberation for each *type* of decision, not a blanket streamlining that might lead to rash one-way door decisions."}, {"text": "Classifying the decision type first, then adjusting deliberation speed accordingly.", "isCorrect": true, "rationale": "The 'keyconcept' summary states, 'The fix: classify the decision first, then calibrate your deliberation accordingly.' This directly addresses the problem of treating two-way doors with one-way door caution."}, {"text": "Minimizing risk by avoiding any decision that might have a downside.", "isCorrect": false, "rationale": "Avoiding any decision with a downside would lead to complete inaction and missed opportunities, which is contrary to the spirit of the text's advice to act quickly on two-way doors."}]}, {"question": "For which type of decision does the text recommend 'much less deliberation'?", "options": [{"text": "Decisions involving legal implications.", "isCorrect": false, "rationale": "Decisions with legal implications typically require careful analysis and deliberation, aligning more with one-way door caution."}, {"text": "One-way door decisions.", "isCorrect": false, "rationale": "The text explicitly states that one-way door decisions 'deserve careful analysis, deliberation, and consultation.'"}, {"text": "Two-way door decisions.", "isCorrect": true, "rationale": "The text explicitly states, 'A two-way door... They deserve much less deliberation, because the cost of being wrong is low.'"}, {"text": "Decisions with high financial stakes.", "isCorrect": false, "rationale": "Decisions with high financial stakes are often one-way doors and deserve careful analysis, not less deliberation."}]}, {"question": "A person is considering trying a new, exotic cuisine for dinner. Based on the text's real-world examples, how should this decision be approached?", "options": [{"text": "With careful analysis, as it's a one-way door that could lead to an expensive, disliked meal.", "isCorrect": false, "rationale": "This suggests an overly cautious approach that contradicts the advice for reversible, low-cost decisions."}, {"text": "As a two-way door, deserving less deliberation because the cost of being wrong is low.", "isCorrect": true, "rationale": "The 'realworld' section gives 'cooking an unfamiliar recipe' and 'trying a new restaurant' as examples of two-way doors, stating, 'If it does not work out, the cost is one evening. The potential upside is discovering something you love.' This aligns directly with 'trying a new, exotic cuisine.'"}, {"text": "As a high-stakes Type 1 decision, requiring consultation with others.", "isCorrect": false, "rationale": "Trying a new cuisine is presented as a low-stakes, reversible decision, not a high-stakes Type 1 decision."}, {"text": "By commissioning a study on the cuisine's ingredients and reviews.", "isCorrect": false, "rationale": "This would be an example of treating a two-way door with one-way door caution, leading to unnecessary paralysis for a low-stakes decision."}]}, {"question": "The text argues that in organizations, the incentive structure often rewards inaction. Why is this the case?", "options": [{"text": "Inaction always guarantees the status quo, which is inherently safe.", "isCorrect": false, "rationale": "While inaction does maintain the status quo, the text attributes the reward for inaction to the blame structure, not solely the inherent safety of the status quo (though status quo bias is a related psychological factor)."}, {"text": "Nobody gets blamed for a decision they never made, only for decisions that went wrong.", "isCorrect": true, "rationale": "The text states, 'And in organizations, nobody gets blamed for a decision they never made—only for decisions that went wrong. The incentive structure rewards inaction, even when inaction is the costliest choice of all.'"}, {"text": "Committees are too slow to approve action, making inaction the default.", "isCorrect": false, "rationale": "While committees can be slow, the incentive structure discussed focuses on individual blame and avoidance of negative consequences, not just committee speed."}, {"text": "Most opportunities pass quickly, making quick action irrelevant.", "isCorrect": false, "rationale": "This statement is incorrect; the text argues opportunities do pass quickly, which makes inaction costly and highlights the importance of timely action on two-way doors, not their irrelevance."}]}, {"question": "Consider the statement: 'Agonizing for months over the 'perfect' first job often costs more than picking a good-enough option and learning from the experience.' This statement most directly supports which core argument of the section?", "options": [{"text": "That career choices are inherently one-way doors that require extensive deliberation.", "isCorrect": false, "rationale": "This directly contradicts the text, which classifies first job choices as two-way doors, emphasizing their reversibility."}, {"text": "That organizations should always avoid forming committees for decisions.", "isCorrect": false, "rationale": "While the text criticizes excessive committee use, this specific quote is about personal career choice, not organizational structure, and doesn't advocate avoiding all committees."}, {"text": "That most decisions, like choosing a first job, are two-way doors and benefit from speed over excessive deliberation.", "isCorrect": true, "rationale": "The 'realworld' section explicitly uses 'Choosing a first job after college' as an example of a decision that 'feels like a one-way door but is usually a two-way door.' It then states, 'Agonizing for months... often costs more than picking a good-enough option and learning from the experience,' directly advocating for speed and action on reversible decisions."}, {"text": "That it's impossible to make a perfect decision, so any choice is equally valid.", "isCorrect": false, "rationale": "The text doesn't argue that all choices are equally valid, but rather that taking a 'good-enough option' for a reversible decision is often superior to prolonged inaction and the cost of over-deliberation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
