<script>
var QUESTIONS = [{"question": "According to Daniel Kahneman and Amos Tversky, what is the core characteristic of the Planning Fallacy?", "options": [{"text": "Our tendency to accurately estimate the time, cost, and risk for future projects, especially when we are experts.", "isCorrect": false, "rationale": "The planning fallacy describes our *systematic tendency to underestimate* time, cost, and risk, not to estimate accurately."}, {"text": "A systematic tendency to underestimate the time, cost, and risk of future projects while overestimating their benefits.", "isCorrect": true, "rationale": "This option precisely matches the definition of the planning fallacy provided by Kahneman and Tversky in the text."}, {"text": "The occasional occurrence of projects taking longer or costing more than expected due to unforeseen external circumstances or bad luck.", "isCorrect": false, "rationale": "The text explicitly states that it is 'not bad luck' but a 'systematic bias' and a 'deeply rooted feature of how human minds construct predictions.'"}, {"text": "A strategy used by organizations to secure project approval by presenting realistic, but often unfavorable, budgets.", "isCorrect": false, "rationale": "Motivated reasoning, a component of the planning fallacy, describes institutional pressure to *underestimate* budgets to win approval, not present realistic ones."}]}, {"question": "What is the fundamental difference between the 'inside view' and the 'outside view' in the context of the planning fallacy?", "options": [{"text": "The inside view prioritizes historical data and base rates, while the outside view focuses on the unique details of the current project.", "isCorrect": false, "rationale": "This option incorrectly swaps the definitions. The inside view focuses on unique details, and the outside view focuses on historical data."}, {"text": "The inside view considers the specific details and best-case scenarios of a particular project, whereas the outside view considers the actual outcomes and distribution of similar past projects.", "isCorrect": true, "rationale": "This accurately distinguishes the two views: inside focuses on the specific (often optimistic) case, while outside uses a reference class of similar past projects."}, {"text": "The inside view is inherently optimistic, while the outside view is inherently pessimistic.", "isCorrect": false, "rationale": "While optimism bias plays a role in the inside view, the core difference is about the *source of information* (project specifics vs. historical base rates), not just the emotional slant."}, {"text": "The inside view generates more accurate estimates due to its detailed focus, while the outside view is less reliable because it ignores specific project complexities.", "isCorrect": false, "rationale": "The text states the opposite: the outside view is 'dramatically more accurate' because the inside view often ignores reality."}]}, {"question": "A student is planning to write a research paper. She thinks about her chosen topic, her outline, and imagines completing the work smoothly in a few focused sessions, not considering how long her previous research papers typically took. Which cognitive approach is she primarily using?", "options": [{"text": "Reference class forecasting.", "isCorrect": false, "rationale": "Reference class forecasting (the outside view) would involve considering how long similar past projects (like previous research papers) actually took."}, {"text": "The outside view.", "isCorrect": false, "rationale": "The outside view involves consulting historical records of similar projects, which the student is specifically *not* doing here."}, {"text": "The inside view.", "isCorrect": true, "rationale": "The student is focusing on the unique details of her current project and imagining a best-case scenario, ignoring past performance—a classic example of the inside view."}, {"text": "Motivated reasoning.", "isCorrect": false, "rationale": "While motivated reasoning can influence estimates, this scenario primarily highlights the cognitive process of focusing on internal project details and an ideal outcome, which is the definition of the inside view."}]}, {"question": "To counteract the planning fallacy, a software development lead decides to use 'reference class forecasting' for a new product launch. Which action best exemplifies this approach?", "options": [{"text": "Basing the launch timeline solely on the most aggressive schedule proposed by the marketing team to generate excitement.", "isCorrect": false, "rationale": "This reflects anchoring and motivated reasoning, not reference class forecasting, as it focuses on an internal, optimistic estimate."}, {"text": "Consulting a database of previous product launches by their company and competitors, analyzing their actual development times and delays, and using that distribution as a baseline.", "isCorrect": true, "rationale": "This option perfectly describes reference class forecasting (the outside view), which involves finding a class of similar past projects and using their actual outcomes as a baseline."}, {"text": "Focusing intently on the unique technological innovations and specialized expertise required for the current product to determine its schedule.", "isCorrect": false, "rationale": "This is an example of the inside view, where the focus is on the specific, unique details of the current project, ignoring broader historical data."}, {"text": "Encouraging the development team to work extra hours and cut scope to meet an ambitious, internally generated deadline.", "isCorrect": false, "rationale": "This describes a project management tactic, not a forecasting method. It doesn't address the cognitive bias in estimation."}]}, {"question": "Which of the following is NOT identified in the text as a primary reason why individuals and teams tend to default to the 'inside view' when making project predictions?", "options": [{"text": "Anchoring, where initial estimates (often best-case scenarios) become reference points that are insufficiently adjusted.", "isCorrect": false, "rationale": "The text explicitly lists anchoring as a reason why we default to the inside view."}, {"text": "Optimism bias, leading individuals to genuinely believe their specific project will go better than average.", "isCorrect": false, "rationale": "Optimism bias is the first force listed that conspires to make us default to the inside view."}, {"text": "Motivated reasoning, where low estimates are generated to win approval for a project, especially in organizational settings.", "isCorrect": false, "rationale": "Motivated reasoning is explicitly stated as a reason for underestimation, particularly in organizations."}, {"text": "A deliberate strategic choice to increase perceived value by intentionally understating costs and timelines.", "isCorrect": true, "rationale": "While motivated reasoning involves institutional pressure leading to low estimates, the planning fallacy is described as a 'systematic tendency' and 'cognitive error,' implying it's not always a deliberate 'strategic choice' in the cynical sense, but rather a subconscious bias. The other options are direct cognitive biases or pressures, whereas 'deliberate strategic choice' implies a fully conscious and potentially manipulative act, which isn't the primary emphasis of why the *fallacy* occurs inherently."}]}, {"question": "Kahneman's experience with the curriculum-design project, where his team's internal estimate was two years but the project ultimately took eight (despite a colleague's expert estimate of seven to ten years), demonstrates what key aspect of the planning fallacy?", "options": [{"text": "The unreliability of expert opinions regarding project timelines, even those knowledgeable about the fallacy.", "isCorrect": false, "rationale": "The colleague's expert opinion (7-10 years) was actually much closer to the project's actual duration (8 years), suggesting the *expert* was more reliable, not unreliable."}, {"text": "That even with explicit knowledge and awareness of the planning fallacy, individuals and teams can still fall victim to its effects.", "isCorrect": true, "rationale": "The text explicitly states, 'Even knowing about the planning fallacy did not protect Kahneman's team from falling victim to it,' highlighting its deep-seated nature."}, {"text": "The inherent unpredictability of complex, long-term projects, making accurate forecasting impossible.", "isCorrect": false, "rationale": "The colleague's accurate estimate (outside view) suggests that accurate forecasting is possible by using different methods, rather than being inherently impossible."}, {"text": "The effectiveness of setting ambitious targets to motivate teams to finish projects faster.", "isCorrect": false, "rationale": "The project took four times longer than the team's ambitious estimate, indicating that ambitious targets did not lead to faster completion in this case."}]}, {"question": "The statement 'This is not bad luck. It is not laziness. It is a deeply rooted feature of how human minds construct predictions about the future' emphasizes which characteristic of the planning fallacy?", "options": [{"text": "Its infrequent and unpredictable nature, making it difficult to prevent.", "isCorrect": false, "rationale": "The text describes it as a 'systematic tendency' and 'universal pattern,' indicating it is frequent and predictable, not infrequent."}, {"text": "Its foundation in a systematic cognitive bias or error, rather than external circumstances, random chance, or personal failings.", "isCorrect": true, "rationale": "The statement directly refutes external factors ('bad luck') and personal failings ('laziness'), attributing the fallacy to an inherent 'deeply rooted feature' of human cognition, i.e., a systematic cognitive bias."}, {"text": "Its prevalence only among individuals who lack experience in project management or proper planning techniques.", "isCorrect": false, "rationale": "The examples (Kahneman's team of experts, software developers, megaprojects) show it affects experienced individuals and professionals, not just those lacking experience."}, {"text": "Its primary cause being a lack of sufficient effort or motivation from the project team members.", "isCorrect": false, "rationale": "The text explicitly states, 'It is not laziness,' directly refuting this option."}]}, {"question": "The Sydney Opera House and Boston's Big Dig are cited as examples primarily to illustrate which point about the planning fallacy?", "options": [{"text": "That only megaprojects are susceptible to the planning fallacy, given their immense complexity and budgets.", "isCorrect": false, "rationale": "The text states, 'The planning fallacy operates at every scale' and 'But you do not need megaprojects to see the pattern,' disproving this option."}, {"text": "That the planning fallacy is a recent phenomenon unique to modern, technologically advanced construction projects.", "isCorrect": false, "rationale": "The fallacy was identified in 1979, and the Sydney Opera House project began in the 1950s, showing it's not a recent phenomenon."}, {"text": "The universal scale and significant financial and temporal impact of underestimation across different types and sizes of projects.", "isCorrect": true, "rationale": "These examples, alongside students and software developers, demonstrate that the 'pattern is universal' and 'operates at every scale,' with dramatic cost and time overruns."}, {"text": "The unique challenges of government-funded projects compared to privately financed ventures.", "isCorrect": false, "rationale": "While these are government projects, the text uses them to illustrate the universal cognitive mechanism, not specific challenges of public funding."}]}, {"question": "Which strategy is presented in the text as the most effective antidote to the planning fallacy?", "options": [{"text": "Developing a highly detailed and optimistic project plan to ensure maximum enthusiasm and commitment from the team.", "isCorrect": false, "rationale": "This describes aspects of the 'inside view' and optimism bias, which are causes of the fallacy, not antidotes."}, {"text": "Frequently reminding team members of the potential negative consequences or penalties for missing deadlines.", "isCorrect": false, "rationale": "While this might influence behavior, it's not a method to improve initial forecasting accuracy against the cognitive bias, nor is it mentioned as an antidote in the text."}, {"text": "Employing reference class forecasting by systematically examining the actual outcomes of comparable past projects before making an estimate.", "isCorrect": true, "rationale": "The text explicitly identifies reference class forecasting as the 'antidote' and explains it involves asking 'how long comparable projects have actually taken.'"}, {"text": "Relying heavily on the project team's collective intuition and best-case scenario predictions to foster a positive work environment.", "isCorrect": false, "rationale": "Relying on intuition and best-case scenarios is characteristic of the 'inside view,' which leads to the planning fallacy, not away from it."}]}, {"question": "The section states that the planning fallacy 'operates at every scale' and that 'the pattern is universal because the cognitive mechanism is universal.' This implies that the fallacy is most likely to affect which of the following?", "options": [{"text": "Only large, complex government projects like infrastructure developments and major software launches.", "isCorrect": false, "rationale": "The text explicitly states 'operates at every scale' and includes examples like student essays and home renovations, contradicting 'only large, complex projects.'"}, {"text": "Only individuals planning personal tasks, as they lack the institutional data available to large organizations.", "isCorrect": false, "rationale": "While it affects individuals, the text also gives examples of megaprojects and professional teams (software developers, Kahneman's team), showing it's not 'only' individuals."}, {"text": "Any project or task, regardless of its size, complexity, or the expertise of the individuals or teams involved, due to inherent human cognitive biases.", "isCorrect": true, "rationale": "This option accurately captures the universal nature of the fallacy, affecting 'every scale' and stemming from a 'universal cognitive mechanism,' impacting everyone from students to expert teams on megaprojects."}, {"text": "Projects where the team is intentionally trying to deceive stakeholders about the true costs and timelines for personal gain.", "isCorrect": false, "rationale": "While 'motivated reasoning' can involve pressure to underestimate for approval, the fallacy itself is described as a 'cognitive error' and 'systematic bias,' not solely intentional deception for personal gain."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
