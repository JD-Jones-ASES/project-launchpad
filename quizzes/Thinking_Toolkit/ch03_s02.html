<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What reward was prophesied for the person who solved the puzzle of the Gordian Knot, according to the ancient legend?", "options": [{"text": "Control over the ancient city of Gordium.", "isCorrect": false, "rationale": "While the knot was in Gordium, the prophecy's scope was much grander than just the city itself."}, {"text": "Becoming the ruler of all Asia.", "isCorrect": true, "rationale": "The text explicitly states: 'An oracle declared that whoever untied the Gordian Knot would rule all of Asia.'"}, {"text": "Unearthing a vast treasure hidden within the knot.", "isCorrect": false, "rationale": "The legend does not mention any treasure associated with the knot."}, {"text": "Gaining ultimate wisdom and foresight from the oracle.", "isCorrect": false, "rationale": "The reward was political power, not personal enlightenment."}]}, {"question": "How did Alexander the Great's resolution of the Gordian Knot exemplify the profound insight about problem-solving described in the text?", "options": [{"text": "He meticulously studied the knot's structure to find the precise sequence of untying it.", "isCorrect": false, "rationale": "Alexander did not untie the knot; he cut it, rejecting the assumed method of solution."}, {"text": "He strictly adhered to the traditional methods of knot-tying and untying, demonstrating mastery.", "isCorrect": false, "rationale": "Alexander explicitly went against the assumed traditional method of 'untying' the knot."}, {"text": "He reframed the problem by rejecting the assumed constraint of 'untying' and found an alternative solution.", "isCorrect": true, "rationale": "The text highlights that Alexander 'reframed the problem by rejecting the assumed constraint and found a solution that was invisible to everyone working within the original framework.'"}, {"text": "He sought a compromise, partially untying the knot before deciding to cut the remaining strands.", "isCorrect": false, "rationale": "The most popular version of the story indicates he simply cut it in half."}]}, {"question": "Which of the following scenarios best represents an 'assumed constraint' as defined in the text?", "options": [{"text": "A software development team cannot release their product because it fails to meet government security regulations.", "isCorrect": false, "rationale": "Government regulations are presented as 'real constraints' (legal requirements) that must be respected."}, {"text": "A marketing department insists on advertising only through print media because 'that's how we've always reached our audience.'", "isCorrect": true, "rationale": "This describes an 'inherited habit' or 'conventional wisdom,' which the text identifies as a type of assumed constraint that narrows the solution space without justification."}, {"text": "A medical research team cannot complete a drug trial due to a global shortage of a critical chemical compound.", "isCorrect": false, "rationale": "A global shortage is a 'real constraint' related to resource limitations."}, {"text": "An architect must design a building that withstands specific seismic activity based on geological data.", "isCorrect": false, "rationale": "Laws of physics and environmental factors are 'real constraints' that must be respected."}]}, {"question": "The text warns about 'The Risk of the Sword' when cutting through problems. What is the primary risk associated with rejecting constraints without proper examination?", "options": [{"text": "You might be perceived as arrogant or uncooperative by your peers and superiors.", "isCorrect": false, "rationale": "While social consequences might occur, the text emphasizes the functional risks, not primarily the social ones."}, {"text": "You might inadvertently increase the problem's complexity by introducing too many new variables.", "isCorrect": false, "rationale": "The risk is not about complexity per se, but about ignoring valid constraints."}, {"text": "You might be ignoring real constraints that exist for good reasons, potentially creating new and more serious problems.", "isCorrect": true, "rationale": "The text states, 'When you cut through a problem by rejecting its constraints, you may be brilliantly reframing the situation—or you may be ignoring constraints that exist for good reasons... creating a new one.'"}, {"text": "The solution, while effective, might not be replicable for future similar problems.", "isCorrect": false, "rationale": "The text does not discuss replicability as the primary risk of 'cutting the knot'."}]}, {"question": "According to the text, what diagnostic question should one ask when trying to identify and challenge assumed constraints?", "options": [{"text": "\"What are the best practices in this field, and how can I implement them more efficiently?\"", "isCorrect": false, "rationale": "This question focuses on working within existing frameworks rather than questioning their validity."}, {"text": "\"How can I apply more resources or exert greater effort to overcome this obstacle?\"", "isCorrect": false, "rationale": "This question suggests working harder within the current framework, which is what 'Gordian Knot thinking' seeks to avoid when constraints are assumed."}, {"text": "\"Am I solving the right problem? Are the rules I am following actually rules, or are they habits?\"", "isCorrect": true, "rationale": "This question is directly quoted from the text as the key diagnostic question to examine constraints."}, {"text": "\"What is the minimum viable solution that addresses the immediate symptoms of the problem?\"", "isCorrect": false, "rationale": "This focuses on immediate solutions, not on challenging the underlying constraints that define the problem."}]}, {"question": "Joseph Lister's introduction of antiseptic techniques in surgery is cited as a 'Gordian Knot' solution in medicine. Which assumed constraint did his innovation primarily challenge?", "options": [{"text": "The belief that surgical operations should only be performed as a last resort due to their inherent dangers.", "isCorrect": false, "rationale": "The text focuses on Lister's impact on reducing infection, not on the frequency of surgery."}, {"text": "The idea that surgeons must operate faster to minimize patient exposure to airborne pathogens.", "isCorrect": false, "rationale": "Operating faster was a solution *within* the assumed constraint of infection being inevitable; Lister challenged the inevitability itself."}, {"text": "The assumption that infection was an inevitable and unavoidable feature of surgical procedures.", "isCorrect": true, "rationale": "The text states: 'The assumed constraint—that infection was an inevitable feature of surgery—turned out to be an assumption, not a law.'"}, {"text": "The necessity of using complex and expensive instruments for successful surgical outcomes.", "isCorrect": false, "rationale": "Lister's innovation was about preventing infection through cleanliness, not about instrument cost or complexity."}]}, {"question": "According to the 'keyconceptRedefining the Problem' section, what is the 'most powerful problem-solving move' when a problem seems intractable?", "options": [{"text": "Applying a methodical, step-by-step approach to analyze all possible solutions within the current framework.", "isCorrect": false, "rationale": "The text suggests that working harder within the existing framework is often not the most powerful move when problems are intractable due to assumed constraints."}, {"text": "Seeking expert advice and external consultation to gain new perspectives on existing methods.", "isCorrect": false, "rationale": "While helpful, this is not described as the 'most powerful move' in the context of challenging fundamental constraints."}, {"text": "Stepping outside the existing framework entirely and questioning whether the constraints are real or merely habits.", "isCorrect": true, "rationale": "The text states: 'The most powerful problem-solving move is sometimes not working harder within the existing framework but stepping outside it entirely and asking: Are these constraints real, or are they habits?'"}, {"text": "Increasing resources and effort to force a breakthrough within the accepted parameters of the problem.", "isCorrect": false, "rationale": "This is precisely what the 'Gordian Knot' thinking advises against when the difficulty lies in assumed constraints."}]}, {"question": "A student is agonizing over choosing between two prestigious universities, feeling immense pressure to pick the 'better' one. Applying the Gordian Knot principle to this 'false binary,' what might be a productive next step for the student?", "options": [{"text": "Conduct more extensive research on both universities to find a definitive answer.", "isCorrect": false, "rationale": "This approach keeps the student trapped within the 'false binary' by only analyzing the two given options more deeply."}, {"text": "Create a detailed pros and cons list for each university and assign weights to each factor.", "isCorrect": false, "rationale": "This also keeps the student confined to the two-option choice, rather than challenging the assumption of choice itself."}, {"text": "Question if 'choosing one of these two' is an assumed constraint and explore alternative paths like a gap year or a third, different institution.", "isCorrect": true, "rationale": "The text's 'personal decisions' example directly addresses this: 'The Gordian Knot question is: Must I choose one of these two? Perhaps a third option... dissolves the dilemma.'"}, {"text": "Seek advice from alumni of both universities to understand their post-graduation success.", "isCorrect": false, "rationale": "This focuses on gathering more data within the existing constrained choice, rather than challenging the constraint itself."}]}, {"question": "The historical footnote mentions an alternative account where Alexander solved the knot by pulling out a pin. What is the significance of this alternative version?", "options": [{"text": "It proves that Alexander was a less decisive leader than commonly depicted.", "isCorrect": false, "rationale": "The text describes Alexander as a pragmatist, and the method was 'equally effective,' not indicative of indecisiveness."}, {"text": "It suggests that the original legend of cutting the knot is likely a dramatic embellishment.", "isCorrect": false, "rationale": "The text states 'some ancient sources describe,' but does not claim it disproves the cutting version, only offers an alternative."}, {"text": "It reinforces the central lesson that the solution came from thinking outside the conventional framework, regardless of the specific method.", "isCorrect": true, "rationale": "The text explicitly states: 'The lesson is the same either way: the solution lay outside the frame that everyone else was using.'"}, {"text": "It implies that ancient knots were designed with hidden mechanisms for easy untying.", "isCorrect": false, "rationale": "The text focuses on Alexander's problem-solving, not on ancient knot design techniques."}]}, {"question": "Which of the following approaches is LEAST characteristic of effective 'Gordian Knot thinking' as described in the section?", "options": [{"text": "Audaciously challenging established norms and conventions to achieve a desired outcome.", "isCorrect": false, "rationale": "The text describes Alexander's solution as 'audacious' and a characteristic of this type of thinking."}, {"text": "Diligently working harder and longer to find a solution within the already defined boundaries of the problem.", "isCorrect": true, "rationale": "The text states that the 'most powerful problem-solving move is sometimes not working harder within the existing framework but stepping outside it entirely.'"}, {"text": "Examining whether the perceived constraints of a problem are fundamental truths or merely inherited assumptions.", "isCorrect": false, "rationale": "This is a core diagnostic step and characteristic of Gordian Knot thinking."}, {"text": "Reframing an intractable problem by looking for solutions entirely outside the original framework.", "isCorrect": false, "rationale": "This is the essence of 'Gordian Knot thinking' – stepping outside the framework."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
