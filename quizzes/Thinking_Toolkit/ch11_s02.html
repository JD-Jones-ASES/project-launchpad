    };

<body>

        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary philosophical point Thomson's Violinist thought experiment is designed to make?", "options": [{"text": "To prove that all individuals have an absolute right to life, regardless of circumstances.", "isCorrect": false, "rationale": "Thomson's experiment does not assert an absolute right to life above all else, but rather explores the *scope* of that right when it conflicts with other rights, specifically bodily autonomy."}, {"text": "To argue that individuals are never morally obligated to help strangers in need.", "isCorrect": false, "rationale": "Thomson does not deny all obligation to strangers, but distinguishes between minimal decency and supererogation, arguing that extraordinary sacrifice is not always obligatory. She clarifies the *limits* of obligation, not its complete absence."}, {"text": "To demonstrate that even if a person has a full right to life, they do not necessarily have a right to use another person's body to sustain it.", "isCorrect": true, "rationale": "The text states the experiment is 'designed to separate the question of rights from the question of moral status' and that 'even if we grant that another person has a full right to life, it does not follow that they have a right to use your body to sustain that life.'"}, {"text": "To establish that kidnapping is always morally unjustifiable, even for a noble cause.", "isCorrect": false, "rationale": "While kidnapping is certainly morally unjustifiable, the thought experiment uses it as a premise to set up the core ethical dilemma, not as its primary point of exploration. The focus is on the moral obligation of the kidnapped person."}], "id": "q01"}, {"question": "What distinction is central to Thomson's argument regarding the moral obligation to stay connected to the violinist?", "options": [{"text": "The difference between voluntary and involuntary acts of charity.", "isCorrect": false, "rationale": "While the involuntary nature of the connection is key to the scenario, the core distinction of the argument is broader than just voluntariness; it concerns the nature of moral responsibility when someone else's life depends on your bodily support."}, {"text": "The distinction between actively killing someone and passively allowing them to die due to withholding aid.", "isCorrect": true, "rationale": "The text explicitly states: 'She argues that there is a difference between killing someone and declining to sustain someone at significant personal cost.' and 'The distinction between active killing and withholding aid reappears throughout moral philosophy, and the violinist is one of the clearest illustrations of why the distinction matters.'"}, {"text": "The ethical implications of medical emergencies versus planned interventions.", "isCorrect": false, "rationale": "This distinction is not the central focus of Thomson's argument, which is more concerned with the rights and obligations that arise from one person's dependence on another's body, regardless of how that dependence originated (emergency or planned)."}, {"text": "The contrast between legal obligations and moral responsibilities.", "isCorrect": false, "rationale": "While the 'realworld' section touches on legal systems, the primary focus of Thomson's philosophical argument is on the *moral* obligation, not the legal one."}], "id": "q02"}, {"question": "According to Thomson's analysis, which of the following claims about 'a right to life' is considered more controversial and potentially untenable if expanded?", "options": [{"text": "A has a right to life, meaning others may not kill A without justification.", "isCorrect": false, "rationale": "The text states: 'Most people accept the first claim without hesitation.' This is the less controversial claim."}, {"text": "A has a right to bodily autonomy, allowing A to control their own physical self.", "isCorrect": false, "rationale": "This is a right attributed to the person being asked to help, not a controversial expansion of the 'right to life' of the person in need."}, {"text": "A has a right to whatever is needed to sustain A's life, obligating others to provide resources or bodily support.", "isCorrect": true, "rationale": "The text calls this 'a much stronger claim' and states that 'Thomson argues that this expansion is untenable,' as it would mean the 'right to life' expands into 'a right to commandeer other people's bodies.'"}, {"text": "A has a right to choose the circumstances of their own death.", "isCorrect": false, "rationale": "This concept is not directly addressed by the two specific claims about 'a right to life' that Thomson analyzes in the text."}], "id": "q03"}, {"question": "How does the concept of bodily autonomy primarily function within Thomson's argument?", "options": [{"text": "It suggests that individuals have no moral obligation to help others, regardless of the cost.", "isCorrect": false, "rationale": "Thomson's argument sets limits on obligation, but doesn't dismiss all obligation entirely. It clarifies that extraordinary personal cost isn't necessarily obligatory."}, {"text": "It establishes that the kidnapped person has a stronger moral claim than the violinist simply because they were unwillingly involved.", "isCorrect": false, "rationale": "The argument isn't about one party having a generally 'stronger' moral claim, but about the specific right to control one's own body in relation to another's right to life."}, {"text": "It serves as the basis for the argument that a person's right to life does not automatically entail a right to use another's body.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'A person's right to life does not automatically generate a right to use another person's body to sustain that life.' This is grounded in the helper's bodily autonomy."}, {"text": "It implies that medical decisions should always prioritize the donor's well-being over the recipient's life.", "isCorrect": false, "rationale": "While bodily autonomy informs decisions regarding donation, Thomson's argument is broader, establishing a philosophical principle rather than a strict medical protocol for all situations."}], "id": "q04"}, {"question": "If one chooses to remain connected to the violinist for nine months, how does Thomson characterize this act?", "options": [{"text": "A morally required act, constituting the bare minimum of human decency.", "isCorrect": false, "rationale": "Thomson explicitly states that 'Staying connected to the violinist for nine months would be an act of extraordinary generosity, well beyond what minimal decency requires.'"}, {"text": "An act of extraordinary generosity and admirable self-sacrifice, but not a moral obligation.", "isCorrect": true, "rationale": "The text describes it as a 'generous and admirable act — but generosity is not the same as obligation,' aligning it with the 'Good Samaritan' and supererogatory acts."}, {"text": "An irrational decision driven by guilt rather than genuine ethical consideration.", "isCorrect": false, "rationale": "The text does not ascribe motives like 'guilt' or 'irrationality' to such a choice. It focuses on the moral categorization of the act itself."}, {"text": "A violation of one's own bodily autonomy, even if performed willingly.", "isCorrect": false, "rationale": "If performed willingly, it is not a violation but an exercise of one's own choice, albeit one involving a significant sacrifice of autonomy."}], "id": "q05"}, {"question": "Which of the following statements does Thomson explicitly *not* deny in her argument regarding the violinist?", "options": [{"text": "That the violinist is a person with rights.", "isCorrect": true, "rationale": "The text clearly states: 'Thomson does not deny that the violinist is a person with rights. She does not deny that disconnecting him will kill him.'"}, {"text": "That the kidnapped person has no moral obligations whatsoever.", "isCorrect": false, "rationale": "Thomson explores the *limits* and *degrees* of moral obligation, rather than denying its existence entirely. She discusses 'minimal decency' and the 'supererogatory'."}, {"text": "That kidnapping is a morally justifiable act under certain circumstances.", "isCorrect": false, "rationale": "The text does not discuss the morality of kidnapping itself, only the ethical implications for the person who is kidnapped into the situation."}, {"text": "That providing aid for 9 months would be an insignificant personal cost.", "isCorrect": false, "rationale": "Thomson explicitly characterizes staying connected as incurring 'significant personal cost,' thus she *does* deny it would be insignificant."}], "id": "q06"}, {"question": "According to Thomson's framework, if remaining connected to the violinist for nine months is considered supererogatory, what does this imply about the moral requirement to do so?", "options": [{"text": "It is morally required because it saves a life, even if difficult.", "isCorrect": false, "rationale": "The definition of a supererogatory act is one that is 'morally praiseworthy but not morally required,' directly contradicting this option."}, {"text": "It is morally praiseworthy but not something one is obligated to do.", "isCorrect": true, "rationale": "The text defines a supererogatory act as 'morally praiseworthy but not morally required — going above and beyond the call of duty.' This aligns perfectly with the description of staying connected for nine months."}, {"text": "It is a minimally decent act that all morally responsible individuals should perform.", "isCorrect": false, "rationale": "The text explicitly states that staying connected for nine months is 'well beyond what minimal decency requires.'"}, {"text": "It is morally wrong because it infringes upon one's bodily autonomy.", "isCorrect": false, "rationale": "If done willingly, an act of supererogation does not represent a moral wrong or infringement, but a choice to make an extraordinary sacrifice."}], "id": "q07"}, {"question": "The real-world examples discussed, such as compelling blood donation or parental organ donation, primarily illustrate which aspect of Thomson's argument?", "options": [{"text": "The absolute right to life supersedes all other individual rights in legal contexts.", "isCorrect": false, "rationale": "The examples actually show the opposite; legal systems generally do *not* compel bodily donations, indicating that individual rights (like bodily autonomy) often limit the scope of an 'absolute right to life' in practice."}, {"text": "The state has the authority to mandate significant personal sacrifices for the greater good.", "isCorrect": false, "rationale": "The examples provided (compelling blood/organ donation) are given with the answer 'no' in most legal systems, suggesting a *limit* to the state's authority to mandate such sacrifices, even for a great good."}, {"text": "Legal systems generally acknowledge a distinction between causing harm and failing to provide extraordinary aid to save a life.", "isCorrect": true, "rationale": "The text explicitly states: 'The law generally distinguishes between harming someone and failing to rescue them, and Thomson's thought experiment illuminates why that distinction exists.'"}, {"text": "Moral obligations are always legally enforceable, especially in life-or-death situations.", "isCorrect": false, "rationale": "The examples show that even in life-or-death situations where there's a clear moral appeal to help (like parental organ donation), the moral obligation is often *not* legally enforceable, especially when it involves bodily contributions."}], "id": "q08"}, {"question": "Thomson's argument emphasizes the moral significance of the distinction between active killing and withholding aid. Why does this distinction matter according to the text?", "options": [{"text": "Active killing is inherently more morally reprehensible than any form of withholding aid.", "isCorrect": false, "rationale": "While often true, the text focuses on why the distinction is critical for *this specific argument*, clarifying that not helping is not equivalent to causing harm when one did not create the situation or volunteer for it."}, {"text": "It allows for a nuanced understanding where declining to make extraordinary sacrifices is not equated with wrongful killing.", "isCorrect": true, "rationale": "The text explains, 'not helping him is not the same as killing him. The distinction between active killing and withholding aid reappears throughout moral philosophy, and the violinist is one of the clearest illustrations of why the distinction matters.'"}, {"text": "Withholding aid is always morally permissible if the person requiring aid is a stranger.", "isCorrect": false, "rationale": "The text does not claim that withholding aid is *always* permissible, but rather that it is not the same as *killing*. The permissibility still depends on context, cost, and degree of obligation."}, {"text": "It ensures that only those who directly cause a problem are held morally accountable for its resolution.", "isCorrect": false, "rationale": "This is too strong a claim. While Thomson highlights that the kidnapped person 'did not create the violinist's condition,' the argument is more about the limits of obligation for bystanders than a universal rule about accountability."}], "id": "q09"}, {"question": "Thomson states that moral obligations 'come in degrees.' Which of the following factors is NOT explicitly mentioned in the text as influencing the degree of moral obligation?", "options": [{"text": "The cost to the person being asked to help.", "isCorrect": false, "rationale": "The text explicitly states: 'the degree depends on the cost to the person being asked to help.'"}, {"text": "The severity of the need of the person requiring help.", "isCorrect": false, "rationale": "The text explicitly states: 'the degree depends on... the severity of the need.'"}, {"text": "The nature of the relationship between the parties.", "isCorrect": false, "rationale": "The text explicitly states: 'the degree depends on... the nature of the relationship between the parties.'"}, {"text": "The perceived character or worthiness of the person in need.", "isCorrect": true, "rationale": "While the character or worthiness of the person in need might be a factor in some ethical frameworks, it is not explicitly mentioned in this section as one of the factors influencing the degree of moral obligation for Thomson."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
