        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of Robert Nozick's Utility Monster thought experiment?", "options": [{"text": "To prove that creatures with infinite pleasure capacity exist.", "isCorrect": false, "rationale": "The text explicitly states, 'The Utility Monster is not meant to be realistic. No such creature exists.' Its purpose is philosophical, not factual."}, {"text": "To demonstrate that wealth redistribution is always unjust.", "isCorrect": false, "rationale": "While the experiment results in extreme inequality, its target is simple utilitarianism's logic, not all forms of wealth redistribution. The focus is on the mechanism of maximizing total happiness."}, {"text": "To serve as a reductio ad absurdum of classical utilitarianism.", "isCorrect": true, "rationale": "The text clearly states the thought experiment is 'designed as a reductio ad absurdum of classical utilitarianism.' It pushes utilitarian logic to an absurd conclusion to highlight its flaws."}, {"text": "To advocate for a purely egoistic moral philosophy.", "isCorrect": false, "rationale": "Nozick's purpose is to critique utilitarianism from a perspective that values individual rights and claims, not to promote egoism."}], "id": "q01"}, {"question": "According to simple utilitarianism, what would be the prescribed action regarding resource distribution when confronted with the Utility Monster's immense capacity for pleasure?", "options": [{"text": "Resources should be distributed equally among all individuals, including the monster, to ensure fairness.", "isCorrect": false, "rationale": "Simple utilitarianism prioritizes maximizing total happiness, not equal distribution, if an unequal distribution yields more aggregate pleasure."}, {"text": "All resources should be given to the Utility Monster to maximize total happiness, regardless of others' well-being.", "isCorrect": true, "rationale": "The text states, 'If the monster gets a thousand units of pleasure from your dollar and you get only one, then total happiness is maximized by giving everything to the monster. Every dollar, every meal, every resource should flow to the being that derives the most pleasure from it.'"}, {"text": "Resources should be withheld from the monster to protect the rights and dignity of ordinary people.", "isCorrect": false, "rationale": "Simple utilitarianism, as described in the context of the monster, does not inherently prioritize individual rights over the maximization of aggregate pleasure."}, {"text": "A mixed approach combining equal distribution with some preferential allocation to the monster.", "isCorrect": false, "rationale": "Simple utilitarianism, as presented in the thought experiment, is a straightforward calculation to maximize total happiness, leading to an extreme outcome, not a compromise."}], "id": "q02"}, {"question": "Robert Nozick describes the outcome of applying simple utilitarianism to the Utility Monster scenario as 'grotesque.' What fundamental flaw does he primarily identify in utilitarian thinking through this observation?", "options": [{"text": "Its inability to accurately quantify and compare different individuals' levels of happiness.", "isCorrect": false, "rationale": "While a practical challenge, Nozick's fundamental critique is structural, assuming such a comparison is possible for the thought experiment's sake. The text focuses on the *consequences* of the calculus, not its measurement difficulty."}, {"text": "Its focus on individual preferences rather than objective pleasure.", "isCorrect": false, "rationale": "This relates to a utilitarian response (preference utilitarianism), not Nozick's core critique of simple utilitarianism's structural vulnerability."}, {"text": "Its lack of internal mechanisms to prevent one entity's immense pleasure capacity from overriding everyone else's resources and individual rights.", "isCorrect": true, "rationale": "The text states, 'The problem is that utilitarianism has no internal mechanism to prevent one entity's enormous capacity for pleasure from swallowing everyone else's share of resources. It treats people as vessels for happiness rather than as individuals with rights and claims of their own.'"}, {"text": "Its reliance on unrealistic scenarios, which makes it impractical for real-world application.", "isCorrect": false, "rationale": "Nozick acknowledges the monster isn't realistic but argues its point is 'structural,' applying even to less fantastical scenarios."}], "id": "q03"}, {"question": "The text states that the Utility Monster is 'not meant to be realistic.' What 'structural point' does Nozick intend to reveal despite its fantastical nature?", "options": [{"text": "That moral theories must prioritize realism over abstract principles to be valid.", "isCorrect": false, "rationale": "The point of a thought experiment is often to test abstract principles, not to dismiss them for lacking realism."}, {"text": "That only theories considering individual rights can effectively maximize overall happiness.", "isCorrect": false, "rationale": "This is a conclusion some might draw, but Nozick's 'structural point' is about the vulnerability of *total welfare* maximization."}, {"text": "That any theory exclusively focused on maximizing total welfare is vulnerable to scenarios where wildly unequal distributions are deemed 'optimal.'", "isCorrect": true, "rationale": "The text explicitly states: 'Nozick's point is structural: any theory that cares only about maximizing total welfare is vulnerable to scenarios in which a wildly unequal distribution is “optimal.”'"}, {"text": "That the concept of 'total happiness' is inherently unmeasurable and thus useless.", "isCorrect": false, "rationale": "Nozick's critique assumes 'total happiness' can be calculated within the thought experiment; his concern is with the *implications* of that calculation."}], "id": "q04"}, {"question": "Consider a hypothetical scenario where torturing one innocent person would bring immense happiness to millions of spectators. Which ethical framework, according to the text, would struggle most to explain why this action should not be done, and why?", "options": [{"text": "Rights-based ethics, because it focuses on the aggregate pleasure of the majority.", "isCorrect": false, "rationale": "Rights-based ethics would strongly oppose torturing an innocent person, prioritizing the individual's rights regardless of the aggregate pleasure."}, {"text": "Consequentialism (simple utilitarianism), because the calculation of total pleasure would justify the action.", "isCorrect": true, "rationale": "The text directly addresses this: 'If torturing one innocent person would bring immense happiness to millions of spectators, simple utilitarianism struggles to explain why we should not do it. The numbers add up.'"}, {"text": "Deontology, because it emphasizes duties and rules irrespective of outcomes.", "isCorrect": false, "rationale": "Deontology would likely have a strong rule against torturing innocents, so it would not struggle; it would condemn the action."}, {"text": "Virtue ethics, as it prioritizes character development over specific actions.", "isCorrect": false, "rationale": "While virtue ethics would likely oppose such an act, the text specifically identifies consequentialism as the framework that struggles in this type of scenario due to its focus on outcomes."}], "id": "q05"}, {"question": "Which of the following utilitarian responses to the Utility Monster argument suggests that an equal distribution of resources may, in fact, maximize total happiness because additional units of a resource yield less joy?", "options": [{"text": "Rule utilitarianism", "isCorrect": false, "rationale": "Rule utilitarianism focuses on the long-term consequences of adopting general rules, not on the diminishing returns of individual resource units."}, {"text": "Preference utilitarianism", "isCorrect": false, "rationale": "Preference utilitarianism focuses on satisfying people's actual desires and preferences, not on the inherent diminishing value of resources."}, {"text": "Diminishing marginal utility", "isCorrect": true, "rationale": "The text states: 'Diminishing marginal utility. In practice, each additional unit of a resource produces less happiness than the last. ...If utility diminishes fast enough, equal distribution may in fact maximize total happiness.'"}, {"text": "Act utilitarianism", "isCorrect": false, "rationale": "Act utilitarianism is the 'simplest form' critiqued by the monster, as it evaluates each action individually for maximum happiness, without the 'diminishing utility' caveat as an internal mechanism."}], "id": "q06"}, {"question": "How would a rule utilitarian likely respond to the scenario where giving all resources to a Utility Monster maximizes instantaneous total happiness?", "options": [{"text": "They would approve, as maximizing total happiness in the moment is the primary goal.", "isCorrect": false, "rationale": "This describes act utilitarianism, not rule utilitarianism. Rule utilitarians consider the long-term effects of general rules."}, {"text": "They would reject it, arguing that a rule allowing one entity to monopolize resources would lead to negative long-term outcomes like instability and loss of trust.", "isCorrect": true, "rationale": "The text explains: 'Rule utilitarianism...ask which rules would maximize happiness if everyone followed them. A rule that allows one entity to commandeer all resources would produce terrible outcomes in the long run — instability, rebellion, loss of trust. So the utilitarian rule would prohibit it.'"}, {"text": "They would suggest that the monster's preferences might not be genuine.", "isCorrect": false, "rationale": "This aligns with preference utilitarianism, which focuses on the satisfaction of actual preferences, not rule utilitarianism."}, {"text": "They would argue that the monster's immense pleasure is impossible to measure accurately.", "isCorrect": false, "rationale": "While a practical concern, this is not the specific theoretical response attributed to rule utilitarianism in the text."}], "id": "q07"}, {"question": "According to Nozick, what is the ultimate implication of the various utilitarian responses (like diminishing marginal utility or rule utilitarianism) to the Utility Monster?", "options": [{"text": "They completely invalidate Nozick's original critique of utilitarianism.", "isCorrect": false, "rationale": "Nozick believes these responses *support* his point rather than invalidating it."}, {"text": "They prove that classical utilitarianism is robust and requires no fundamental changes.", "isCorrect": false, "rationale": "Nozick's view is that these responses show a *need* for change or supplementation."}, {"text": "They concede his point that pure, simple utilitarianism needs to be supplemented or modified to avoid morally monstrous conclusions.", "isCorrect": true, "rationale": "The text states: 'Nozick would argue that they concede his point: pure, simple utilitarianism needs to be supplemented or modified to avoid monstrous conclusions. The supplements — diminishing marginal utility, rules, preferences — all introduce considerations beyond total happiness.'"}, {"text": "They transform utilitarianism into an entirely rights-based ethical theory.", "isCorrect": false, "rationale": "While they introduce other considerations, they do not abandon the core utilitarian aim of maximizing happiness or satisfying preferences, thus not becoming purely rights-based."}], "id": "q08"}, {"question": "The text draws a parallel between the Utility Monster's logic and a real-world debate. Which of these scenarios best exemplifies the core dilemma presented by the Utility Monster, according to the text?", "options": [{"text": "A government implementing a universal healthcare system to ensure equal access to medical services for all citizens.", "isCorrect": false, "rationale": "Universal healthcare aims for equal treatment, which contrasts with the monster's logic of prioritizing disproportionate benefit."}, {"text": "A company distributing equal bonuses to all employees, regardless of individual performance or contribution.", "isCorrect": false, "rationale": "This scenario emphasizes equality, whereas the Utility Monster logic is about giving to 'whoever benefits most' even if it creates extreme inequality."}, {"text": "A hospital allocating scarce organs to patients who will gain the most life-years, even if other patients have more urgent but less 'efficient' needs.", "isCorrect": true, "rationale": "The text directly uses this example: 'Should a hospital allocate scarce organs to the patients who will gain the most life-years? In each case, the utilitarian logic of 'give to whoever benefits most' runs into competing claims of fairness and equal treatment.'"}, {"text": "A school providing additional resources to all students struggling academically, regardless of their potential for future success.", "isCorrect": false, "rationale": "This focuses on helping the worst-off, which is different from the utilitarian logic of maximizing overall return from those who benefit most (like gifted students mentioned in the text)."}], "id": "q09"}, {"question": "The Utility Monster thought experiment is presented as highlighting a sharp divergence between which two major ethical frameworks?", "options": [{"text": "Deontology and Virtue Ethics.", "isCorrect": false, "rationale": "While distinct, these are not the primary frameworks whose divergence is sharpened by the Utility Monster, according to the text."}, {"text": "Ethical Relativism and Moral Absolutism.", "isCorrect": false, "rationale": "These meta-ethical positions are not the focus of the thought experiment's immediate ethical dilemma."}, {"text": "Consequentialism and Rights-based Ethics.", "isCorrect": true, "rationale": "The text states: 'This is the point where consequentialism and rights-based ethics diverge most sharply. A consequentialist says: the right action produces the best outcome. A rights theorist says: some things may not be done to a person regardless of the outcome.'"}, {"text": "Egoism and Altruism.", "isCorrect": false, "rationale": "While related to motivations, these are not the two ethical frameworks directly contrasted by the Utility Monster thought experiment in the provided text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
