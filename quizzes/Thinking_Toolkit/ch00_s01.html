<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who coined the phrase 'The map is not the territory'?", "options": [{"text": "Abraham Kaplan", "isCorrect": false, "rationale": "Abraham Kaplan formulated the Law of the Instrument, not the 'map is not the territory' phrase."}, {"text": "Alfred Korzybski", "isCorrect": true, "rationale": "The text states that 'the Polish-American philosopher Alfred Korzybski stood before the American Association for the Advancement of Science and offered a deceptively simple observation: \"The map is not the territory.\"'"}, {"text": "Daniel Kahneman", "isCorrect": false, "rationale": "Kahneman is mentioned later in the text in relation to cognitive biases, not this phrase."}, {"text": "Nassim Nicholas Taleb", "isCorrect": false, "rationale": "Taleb is mentioned in the text but is not the originator of this phrase."}]}, {"question": "According to the text, what is a mental model?", "options": [{"text": "A mathematical equation that perfectly describes reality", "isCorrect": false, "rationale": "Mental models are simplified representations, not perfect descriptions of reality."}, {"text": "Any simplified representation of reality that helps you navigate, predict, or decide", "isCorrect": true, "rationale": "The text defines a mental model as 'any simplified representation of reality that helps you navigate, predict, or decide.'"}, {"text": "A visual diagram you draw on paper", "isCorrect": false, "rationale": "While diagrams can be mental models, the definition is much broader — including rules of thumb, analogies, stories, and metaphors."}, {"text": "A scientific theory that has been proven true", "isCorrect": false, "rationale": "Mental models include informal rules of thumb and analogies, not just proven theories."}]}, {"question": "What are the three categories of thinking tools described in the text?", "options": [{"text": "Facts, opinions, and theories", "isCorrect": false, "rationale": "The text does not use these as its three categories."}, {"text": "Heuristics, biases, and paradoxes/thought experiments", "isCorrect": true, "rationale": "The text describes three categories: heuristics (mental shortcuts), biases (systematic errors), and paradoxes and thought experiments (puzzles that expose hidden assumptions)."}, {"text": "Logic, emotion, and intuition", "isCorrect": false, "rationale": "These are not the three categories named in the text."}, {"text": "Deduction, induction, and abduction", "isCorrect": false, "rationale": "These are types of reasoning, not the three categories described in the text."}]}, {"question": "According to the text, how many bits of sensory information does the brain process per second?", "options": [{"text": "About fifty", "isCorrect": false, "rationale": "Fifty is how many bits the conscious mind can handle, not total sensory input."}, {"text": "About eleven million", "isCorrect": true, "rationale": "The text states: 'Your brain processes roughly eleven million bits of sensory information per second, but your conscious mind can handle only about fifty.'"}, {"text": "About one million", "isCorrect": false, "rationale": "The text specifies eleven million, not one million."}, {"text": "About one hundred thousand", "isCorrect": false, "rationale": "The text specifies eleven million bits per second."}]}, {"question": "What is the Law of the Instrument as described in the text?", "options": [{"text": "The idea that the best tool is always the simplest one", "isCorrect": false, "rationale": "The Law of the Instrument is about over-applying a single tool, not preferring simple tools."}, {"text": "Give a small boy a hammer, and he will find that everything he encounters needs pounding", "isCorrect": true, "rationale": "The text quotes Abraham Kaplan: 'Give a small boy a hammer, and he will find that everything he encounters needs pounding.' When you have one model, everything looks like a case for that model."}, {"text": "Every instrument has exactly one correct use", "isCorrect": false, "rationale": "The Law of the Instrument is about the tendency to over-apply a familiar tool, not about correct uses."}, {"text": "New instruments always replace old ones", "isCorrect": false, "rationale": "This is not what the Law of the Instrument describes."}]}, {"question": "What is Occam's Razor as mentioned in the text?", "options": [{"text": "A bias that makes us prefer complicated explanations", "isCorrect": false, "rationale": "Occam's Razor is the opposite — it favors simpler explanations."}, {"text": "A heuristic that says to prefer the simpler explanation", "isCorrect": true, "rationale": "The text lists Occam's Razor as an example of a heuristic: 'Occam's Razor — prefer the simpler explanation — is a heuristic.'"}, {"text": "A paradox about cutting things in half infinitely", "isCorrect": false, "rationale": "Occam's Razor is a heuristic about simplicity, not a paradox about division."}, {"text": "A bias that makes us trust authority figures", "isCorrect": false, "rationale": "Trusting authority is described as a different heuristic. Occam's Razor is about preferring simpler explanations."}]}, {"question": "What does the text say biases are?", "options": [{"text": "Random mistakes in thinking that happen unpredictably", "isCorrect": false, "rationale": "The text explicitly states biases 'are not random mistakes; they are predictable patterns of misjudgment.'"}, {"text": "Systematic errors that heuristics produce — predictable patterns of misjudgment", "isCorrect": true, "rationale": "The text defines biases as 'the systematic errors that our heuristics produce. They are not random mistakes; they are predictable patterns of misjudgment built into the architecture of human cognition.'"}, {"text": "Deliberate lies people tell to manipulate others", "isCorrect": false, "rationale": "Biases are not deliberate; they are built into human cognition."}, {"text": "Signs of low intelligence", "isCorrect": false, "rationale": "The text says biases 'are not signs of stupidity — they are features of a brain optimized for quick decisions.'"}]}, {"question": "What does the text say is the most dangerous type of thinker?", "options": [{"text": "Someone who knows no models at all", "isCorrect": false, "rationale": "The text explicitly says the most dangerous thinker is not the one who knows no models."}, {"text": "Someone who knows one model very well", "isCorrect": true, "rationale": "The text states: 'The most dangerous thinker is not the one who knows no models but the one who knows one model very well.'"}, {"text": "Someone who trusts their intuition", "isCorrect": false, "rationale": "While over-reliance on intuition is discussed, the text specifically identifies knowing only one model well as the greatest danger."}, {"text": "Someone who ignores all biases", "isCorrect": false, "rationale": "The text identifies knowing only one model as more dangerous than ignoring biases."}]}, {"question": "When did Korzybski present his famous idea to the American Association for the Advancement of Science?", "options": [{"text": "1933", "isCorrect": false, "rationale": "1933 is when his book Science and Sanity was published, not when he gave the presentation."}, {"text": "1931", "isCorrect": true, "rationale": "The text states: 'In 1931, the Polish-American philosopher Alfred Korzybski stood before the American Association for the Advancement of Science.'"}, {"text": "1879", "isCorrect": false, "rationale": "1879 is Korzybski's birth year."}, {"text": "1950", "isCorrect": false, "rationale": "1950 is when Korzybski died."}]}, {"question": "What does the text say about confirmation bias?", "options": [{"text": "It causes us to forget information that we have already learned", "isCorrect": false, "rationale": "Confirmation bias is about seeking confirming evidence, not forgetting information."}, {"text": "We search for evidence that confirms what we already believe and ignore evidence that contradicts it", "isCorrect": true, "rationale": "The text describes confirmation bias as: 'We search for evidence that confirms what we already believe and ignore evidence that contradicts it.'"}, {"text": "It makes us overestimate our own abilities", "isCorrect": false, "rationale": "Overestimating abilities is the Dunning-Kruger Effect, not confirmation bias."}, {"text": "It causes us to always agree with authority figures", "isCorrect": false, "rationale": "Agreeing with authority figures is a different concept. Confirmation bias is about seeking confirming evidence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
