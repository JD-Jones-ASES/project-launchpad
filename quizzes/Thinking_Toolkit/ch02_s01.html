        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the defining feature of a Catch-22?", "options": [{"text": "A rule that is intentionally hidden from those it affects, making escape impossible.", "isCorrect": false, "rationale": "The text states that 'the trap is not hidden. Everyone can see it. The rule is openly stated.'"}, {"text": "A self-referential rule that creates a logical loop, making a desired outcome impossible.", "isCorrect": true, "rationale": "The text explicitly defines a Catch-22 as a 'self-referential rule that makes escape logically impossible' and whose 'rules create a logical loop that makes the desired outcome impossible.'"}, {"text": "A situation where multiple rules interact to create an unexpected problem without a clear solution.", "isCorrect": false, "rationale": "While Catch-22s involve interacting rules and unexpected problems, this definition is too broad and misses the critical element of 'self-reference' which is the defining feature."}, {"text": "A bureaucratic inefficiency that individual employees lack the power or incentive to fix.", "isCorrect": false, "rationale": "This describes a consequence or characteristic of Catch-22s in everyday life, not their fundamental defining feature, which is the self-referential logical loop."}], "id": "q01"}, {"question": "In Joseph Heller's novel, why was Yossarian unable to be grounded from combat missions under Catch-22?", "options": [{"text": "He lacked the necessary paperwork to officially prove his insanity to the military doctors.", "isCorrect": false, "rationale": "The text does not mention paperwork as a barrier; the issue was the logic of the rule itself, not administrative hurdles."}, {"text": "His commanding officer actively prevented him from filing the request for being grounded.", "isCorrect": false, "rationale": "The problem stemmed from the rule's internal logic, not from an individual's obstruction of the process."}, {"text": "The very act of asking to be grounded demonstrated his rationality, thereby disqualifying him from being considered insane.", "isCorrect": true, "rationale": "The text explains, 'The act of asking to be grounded proves that you are rational and sane (because only a sane person would want to avoid danger), and therefore you cannot be grounded.'"}, {"text": "Only physically injured soldiers, not those with mental health concerns, could be grounded from flying.", "isCorrect": false, "rationale": "The rule explicitly stated 'anyone who is insane can be grounded,' making this option incorrect."}], "id": "q02"}, {"question": "The text states that a Catch-22's loop is 'not a bug in the system—or rather, it is a bug, but one that no individual within the system has the authority or incentive to fix.' What does this imply about the nature of Catch-22s?", "options": [{"text": "Catch-22s are always created maliciously by those in power to trap individuals.", "isCorrect": false, "rationale": "The text suggests that 'Each rule makes sense on its own terms,' implying that they are not necessarily malicious, but their interaction creates the trap."}, {"text": "The logical flaw of a Catch-22 becomes apparent only when rules interact, making internal correction difficult.", "isCorrect": true, "rationale": "The text explains, 'Each rule makes sense on its own terms. It is only when they interact that the trap appears,' which makes internal correction by individuals within the system unlikely."}, {"text": "Individuals within the system are typically too irrational or ignorant to recognize the self-defeating logic of a Catch-22.", "isCorrect": false, "rationale": "The text clarifies that 'The genius of Heller's invention is that the trap is not hidden. Everyone can see it.'"}, {"text": "External forces are solely responsible for introducing Catch-22s into a system, making them untouchable by internal mechanisms.", "isCorrect": false, "rationale": "The text attributes the trap to the system's own 'internal logic' and 'self-referential' nature, not external introduction."}], "id": "q03"}, {"question": "Which of the following scenarios best exemplifies a Catch-22, based on the definition provided in the text?", "options": [{"text": "A student needing to complete an advanced course, but the course has too many prerequisites they haven't met yet.", "isCorrect": false, "rationale": "This is a linear prerequisite problem, not a self-referential loop where the act of trying to meet a prerequisite disqualifies one from it."}, {"text": "A person needing a job to gain experience, but all available entry-level jobs require prior experience.", "isCorrect": true, "rationale": "This is a direct example from the text, known as 'The experience paradox,' which is a classic Catch-22 because gaining experience requires a job, which in turn requires experience, forming a self-defeating loop."}, {"text": "A political candidate losing an election due to a lack of campaign funding, which they needed to win the election.", "isCorrect": false, "rationale": "While funding helps win, the act of seeking funding does not logically prevent one from winning. It's a resource problem, not a self-defeating logical loop created by rules."}, {"text": "A factory worker unable to meet production quotas because their machinery is constantly breaking down.", "isCorrect": false, "rationale": "This is a problem caused by external factors (faulty machinery), not a self-referential rule that makes the desired outcome impossible based on its own logic."}], "id": "q04"}, {"question": "According to the text, what is the most effective general strategy for breaking out of a Catch-22?", "options": [{"text": "Diligently following all the rules within the system to eventually find a hidden loophole.", "isCorrect": false, "rationale": "The text states, 'The exit is rarely found by engaging with the rule on its own terms' and 'the trap is built into the logic of the rule itself,' implying no hidden loopholes within the existing system."}, {"text": "Petitioning authorities within the system to acknowledge and fix the logical flaw of the rules.", "isCorrect": false, "rationale": "The text notes that 'no individual within the system has the authority or incentive to fix' the loop."}, {"text": "Introducing a new variable or finding a path completely outside the logical loop of the existing rules.", "isCorrect": true, "rationale": "The text explicitly advises that Catch-22s are broken 'not by working within the rules but by changing them—or by finding a path outside the logical loop' and by 'introduc[ing] a new variable that the original loop did not account for.'"}, {"text": "Accepting the situation as unsolvable and adapting to its inherent constraints.", "isCorrect": false, "rationale": "The text provides strategies and examples of how to break out of Catch-22s, indicating they are not truly unsolvable."}], "id": "q05"}, {"question": "When the text describes solutions like internships for the experience paradox or secured credit cards for credit history, what common structure do these successful solutions share?", "options": [{"text": "They involve a direct appeal to the original rule-makers for an exception or special consideration.", "isCorrect": false, "rationale": "The text's solutions focus on bypassing the system's logic, not appealing to those within it."}, {"text": "They demonstrate the inherent irrationality of the existing rules, compelling their removal or alteration.", "isCorrect": false, "rationale": "While they expose the problem, the solutions themselves are practical bypasses rather than philosophical demonstrations aimed at rule removal."}, {"text": "They provide a means to achieve the desired outcome by introducing a factor not accounted for in the original self-referential loop.", "isCorrect": true, "rationale": "The text states, 'The solutions share a common structure: they introduce a new variable that the original loop did not account for.'"}, {"text": "They streamline the existing bureaucratic process, making it easier for individuals to navigate the system.", "isCorrect": false, "rationale": "The solutions do not streamline the *existing* loop; instead, they offer an alternative path entirely separate from the original loop."}], "id": "q06"}, {"question": "Consider the bureaucratic loop example: 'To get your driver's license, you need a birth certificate. To get your birth certificate, you need a valid photo ID. To get a valid photo ID, you need your driver's license.' What is the critical assumption this loop relies on that prevents an individual from obtaining these documents?", "options": [{"text": "That individuals will always try to obtain these documents in a specific, circular order.", "isCorrect": false, "rationale": "The order is a symptom of the problem, not the underlying assumption. The problem is that *any* order within the loop leads to a requirement for something you don't have."}, {"text": "That all required documents must be government-issued and cannot be substituted.", "isCorrect": false, "rationale": "While these are government-issued documents, the critical assumption of the *loop* itself is about the dependency, not the source of the documents."}, {"text": "That a single document cannot simultaneously fulfill multiple identification requirements for different agencies.", "isCorrect": false, "rationale": "This isn't the core issue. The problem is needing document A for B, B for C, and C for A, without any independent starting point."}, {"text": "That you must already possess one of the documents to obtain another, without an alternative starting point or external proof.", "isCorrect": true, "rationale": "The loop functions by assuming a pre-existing credential is required for each step, without accounting for how someone acquires the *first* credential if they have none, thus trapping them in a 'chicken or egg' situation."}], "id": "q07"}, {"question": "According to the 'Joseph Heller' person box, what is a significant and rare aspect of his literary contribution?", "options": [{"text": "He accurately depicted the psychological trauma of World War II in a groundbreaking novel.", "isCorrect": false, "rationale": "While true, the text highlights his 'rare' contribution as introducing a new concept into common speech, not just accurate depiction of war."}, {"text": "He was one of the few authors who also served in combat during the war before becoming a renowned writer.", "isCorrect": false, "rationale": "This is a biographical detail, but not what the text identifies as his 'rare' literary contribution to language."}, {"text": "He introduced a new conceptual term, 'catch-22,' into common English language and thought.", "isCorrect": true, "rationale": "The text explicitly states he was 'one of the rare novelists to contribute a new concept to common speech' with the phrase 'catch-22'."}, {"text": "His novel was an immediate and overwhelming commercial success upon its initial release.", "isCorrect": false, "rationale": "The text notes that his novel 'was initially a modest commercial success' before becoming widely recognized later."}], "id": "q08"}, {"question": "The 'connections' box mentions 'Mountain to Climb vs. Maze with No Exit' as a diagnostic question. How does this help distinguish a Catch-22 from a difficult but solvable problem?", "options": [{"text": "A Catch-22 is like a mountain: difficult but ultimately achievable with sustained effort and persistence.", "isCorrect": false, "rationale": "The text implies a Catch-22 is like a 'maze with no exit,' meaning effort within the system is futile, unlike climbing a mountain which implies effort *within* the problem space can lead to a solution."}, {"text": "A Catch-22 is like a maze with no exit: no amount of effort *within* the system can solve it because the logic itself is flawed.", "isCorrect": true, "rationale": "This aligns with the text's core message that the trap is built into the logic, and escape 'is rarely within the system,' requiring a path 'outside the logical loop.'"}, {"text": "A Catch-22 involves overcoming purely physical obstacles, while a solvable problem is always intellectual.", "isCorrect": false, "rationale": "The diagnostic question refers to the nature of the *problem's structure* (solvable vs. unsolvable within its own terms), not the type of obstacles."}, {"text": "A Catch-22 requires a large-scale, team effort, whereas a solvable problem can often be tackled individually.", "isCorrect": false, "rationale": "The text does not discuss team effort as a distinguishing factor; it focuses on the logical structure of the problem itself."}], "id": "q09"}, {"question": "When faced with a Catch-22, the text advises stepping 'outside the system and asking: What assumption is this loop built on, and can I bypass it?' What kind of thinking does this approach primarily require?", "options": [{"text": "Deductive reasoning to meticulously apply existing rules to new situations and find a specific solution.", "isCorrect": false, "rationale": "Deductive reasoning works *within* existing rules, but the text advises stepping 'outside the system' and not 'engaging with the rule on its own terms' to solve a Catch-22."}, {"text": "Creative problem-solving that challenges the fundamental premises and self-referential logic of the trap.", "isCorrect": true, "rationale": "Stepping 'outside the system' and identifying / bypassing 'assumptions' directly relates to creative problem-solving that re-frames or avoids the original, flawed logic."}, {"text": "Inductive reasoning to generalize from previous successful solutions and apply them to the current Catch-22.", "isCorrect": false, "rationale": "While learning from past solutions (inductive) can be helpful, the *primary* requirement for breaking down a specific Catch-22 involves critically analyzing its unique assumptions to find a bypass, which requires more than just generalization."}, {"text": "Critical evaluation of the motivations and intentions of those who created the rules forming the Catch-22.", "isCorrect": false, "rationale": "The text focuses on the logic of the rules and their interaction, not the motivations of rule-makers, which are often irrelevant to the trap's self-defeating nature."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
