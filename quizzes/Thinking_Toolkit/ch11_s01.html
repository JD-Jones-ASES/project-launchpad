<body>

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "In the original trolley problem, where a lever can divert a runaway trolley from five workers to one, what is the most common immediate justification given by most people for pulling the lever?", "options": [{"text": "The principle of inherent human dignity, which dictates saving the majority.", "isCorrect": false, "rationale": "The principle of inherent human dignity is a deontological concept that often focuses on the rights of individuals not to be used, rather than a calculation of the majority. This is not the immediate justification for the lever case."}, {"text": "The arithmetic of saving more lives, where one death is preferable to five.", "isCorrect": true, "rationale": "The text states, 'Most people say yes, and they say it quickly. The arithmetic seems straightforward: one death is better than five.' This highlights a consequentialist intuition focused on the outcome."}, {"text": "The prohibition against using a person as a means to an end.", "isCorrect": false, "rationale": "This prohibition is a core tenet of deontological ethics, particularly relevant to the Footbridge and Transplant variants, where individuals are used as a means. It's not the primary justification for pulling the lever in the original case."}, {"text": "The contact principle, which minimizes direct physical harm.", "isCorrect": false, "rationale": "The contact principle is relevant to the Footbridge variant, where direct physical contact is involved. Pulling a lever is considered impersonal, so this principle does not apply as the primary justification here."}]}, {"question": "What is the fundamental difference identified in the text between the original trolley problem (lever) and the Footbridge variant that causes most people to recoil from pushing the man?", "options": [{"text": "The total number of lives at stake in each scenario.", "isCorrect": false, "rationale": "The text explicitly states that both scenarios involve the 'same arithmetic: one life traded for five,' so the number of lives is not the differentiating factor."}, {"text": "The location of the bystander relative to the tracks.", "isCorrect": false, "rationale": "While the physical setup differs, the location itself (beside the tracks vs. on a footbridge) is not the fundamental moral distinction the text emphasizes for the divergence in intuition."}, {"text": "Whether the harm caused is a side effect of diverting a threat or a direct means to achieve a desired outcome.", "isCorrect": true, "rationale": "The text explains this under 'Means vs. side effect,' stating, 'In the lever case, the one worker's death is a side effect of diverting the trolley. In the footbridge case, the large man's death is the means by which the five are saved.'"}, {"text": "The legal ramifications associated with pulling a lever versus pushing a person.", "isCorrect": false, "rationale": "The text focuses on moral philosophy and psychological intuitions, not legal implications of the actions."}]}, {"question": "How does the Doctrine of Double Effect, rooted in medieval Catholic theology, apply to the original trolley problem and the Footbridge variant?", "options": [{"text": "It permits pushing the man off the footbridge because the intention is to save five lives, which is a good end.", "isCorrect": false, "rationale": "The Doctrine of Double Effect prohibits actions where harm is intended as a means to an end. Pushing the man uses his death as the means, so it would not be permitted under this doctrine."}, {"text": "It prohibits pulling the lever because the death of the one worker is a direct and foreseen consequence of the action.", "isCorrect": false, "rationale": "The doctrine distinguishes between intended harm and foreseen, unintended harm. In the lever case, the death of the one is a foreseen but *unintended* consequence (a side effect), which the doctrine generally permits if the good end is significant."}, {"text": "It distinguishes between harm intended as a means to an end and harm merely foreseen as a side effect, generally permitting the lever action but prohibiting the push action.", "isCorrect": true, "rationale": "The text states, 'Pulling the lever saves five people (the intended effect); the death of the one is a foreseen but unintended consequence. Under the doctrine of double effect, the action is permissible.' It also notes that the doctrine 'prohibits' using the large man as a tool (a means)."}, {"text": "It supports the transplant surgeon's decision to save five lives by sacrificing one, as the overall good outweighs the individual harm.", "isCorrect": false, "rationale": "The transplant surgeon scenario, like the footbridge, involves using a person as a means to an end (their organs for others' survival), which is typically prohibited by the Doctrine of Double Effect."}]}, {"question": "The Transplant Surgeon variant, where a healthy person is sacrificed to provide organs for five dying patients, challenges pure consequentialism most strongly by highlighting which specific moral consideration?", "options": [{"text": "The idea that all medical interventions must prioritize patient autonomy above all else.", "isCorrect": false, "rationale": "While patient autonomy is important in medical ethics, the text emphasizes a broader philosophical point about rights, not solely patient autonomy in this context."}, {"text": "The moral distinction between 'doing' harm versus 'allowing' harm to occur.", "isCorrect": false, "rationale": "While 'doing vs. allowing' is a factor in moral intuitions, the transplant case is clearly 'doing.' The text highlights a different, more fundamental challenge to pure consequentialism in this specific variant."}, {"text": "A strong intuition about individual rights, such as the right not to be killed, that pure consequentialism struggles to justify.", "isCorrect": true, "rationale": "The text explicitly states, 'The answer most people reach for is something about rights: the healthy person has a right not to be killed, even if killing them would produce a better outcome. This is the point at which pure consequentialism...starts to feel inadequate.'"}, {"text": "The notion that dilemmas become easier to solve when they involve professionals with established ethical codes.", "isCorrect": false, "rationale": "The text implies the opposite; this dilemma is widely considered unacceptable despite the potential to save more lives, indicating the difficulty it poses even for professionals."}]}, {"question": "Which identified factor explaining the divergence in intuitions emphasizes the emotional and physical aspects of causing harm, distinguishing between dilemmas that activate 'emotional brain regions' versus 'calculating, utilitarian reasoning'?", "options": [{"text": "Doing vs. allowing", "isCorrect": false, "rationale": "This factor focuses on the moral difference between active intervention and passive non-intervention, not specifically on the emotional or physical nature of the harm."}, {"text": "Intended vs. foreseen harm", "isCorrect": false, "rationale": "This factor relates to the Doctrine of Double Effect, distinguishing between the cognitive aim of an action and its side effects, rather than the emotional impact of the act itself."}, {"text": "Personal vs. impersonal", "isCorrect": true, "rationale": "The text states, 'Neuroscience research...suggests that 'personal' moral dilemmas (involving direct physical harm) activate emotional brain regions, while 'impersonal' dilemmas (pulling a lever) engage more calculating, utilitarian reasoning.'"}, {"text": "Rights and dignity", "isCorrect": false, "rationale": "This factor pertains to deontological ethics and the inherent worth of individuals, focusing on principles rather than the emotional or physical nature of the act of causing harm."}]}, {"question": "If an autonomous vehicle is programmed based on a strict consequentialist framework, how would it most likely be designed to act in a real-world 'trolley problem' scenario where it must choose between hitting one pedestrian or swerving into a group of three?", "options": [{"text": "It would prioritize avoiding direct physical contact with any human, regardless of the number.", "isCorrect": false, "rationale": "Avoiding direct physical contact aligns with the 'contact principle' or 'personal vs. impersonal,' but strict consequentialism would prioritize the outcome over the *how*."}, {"text": "It would choose the action that minimizes the overall number of casualties, even if it involves intentionally harming one person.", "isCorrect": true, "rationale": "Strict consequentialism dictates that 'the right action is the one that produces the best outcome.' In this context, the 'best outcome' is the one with the fewest deaths, meaning saving the larger group at the expense of the smaller."}, {"text": "It would randomly choose an action to avoid making a 'moral' decision.", "isCorrect": false, "rationale": "Random selection would not be consistent with a strict consequentialist framework, which aims to produce the best outcome, not a random one."}, {"text": "It would always protect the vehicle's occupants first, as they are its direct responsibility.", "isCorrect": false, "rationale": "While a manufacturer might program for occupant safety, a 'strict consequentialist framework' (as defined by the text) would consider all lives equally in its calculation of the best outcome, not just the occupants."}]}, {"question": "According to the text, what is a core tenet of deontological ethics, particularly as associated with Immanuel Kant?", "options": [{"text": "The rightness of an action is determined primarily by its consequences.", "isCorrect": false, "rationale": "This statement describes consequentialism, not deontology. Deontology holds that actions are right or wrong regardless of their consequences."}, {"text": "Persons have inherent dignity and may not be used merely as means to others' ends.", "isCorrect": true, "rationale": "The text defines deontological ethics, stating it 'holds that persons have inherent dignity and may not be used merely as means to others' ends — a principle most associated with Immanuel Kant.'"}, {"text": "Moral principles are primarily subjective and vary significantly across cultures.", "isCorrect": false, "rationale": "The text does not discuss cultural relativism; deontological ethics, especially Kantian, typically proposes universal duties."}, {"text": "The primary goal of ethical inquiry is the cultivation of virtuous character traits.", "isCorrect": false, "rationale": "This describes virtue ethics, which Philippa Foot contributed to, but it is not the core tenet of deontological ethics as defined in the text."}]}, {"question": "What does the text identify as the primary power or contribution of the trolley problem to moral philosophy?", "options": [{"text": "To definitively prove that consequentialism is the only consistent moral framework.", "isCorrect": false, "rationale": "The text explicitly states, 'The power of the trolley problem lies not in settling the debate between consequentialism and deontology...'"}, {"text": "To make the abstract debate between consequentialism and deontology vivid and relatable through concrete dilemmas.", "isCorrect": true, "rationale": "The text states its power 'lies not in settling the debate...but in making the debate vivid. Before Foot's 1967 paper, these were abstract philosophical positions. After it, they became gut-level choices with human faces.'"}, {"text": "To provide clear and unambiguous rules for navigating real-world ethical dilemmas like medical triage.", "isCorrect": false, "rationale": "The trolley problem highlights the complexity and tension in moral reasoning, rather than providing simple rules. It is used to *discuss* real-world dilemmas, not solve them definitively."}, {"text": "To demonstrate that all human moral intuitions are purely emotional and lack any rational basis.", "isCorrect": false, "rationale": "The text acknowledges both emotional brain regions and 'calculating, utilitarian reasoning,' suggesting a mix of factors rather than purely emotional responses."}]}, {"question": "Philippa Foot, in introducing the original trolley problem in 1967, was primarily interested in investigating which specific moral principle?", "options": [{"text": "The formulation of a universal algorithm for autonomous vehicle decision-making.", "isCorrect": false, "rationale": "Autonomous vehicles are a modern application of the trolley problem, not Foot's original interest in 1967."}, {"text": "The Doctrine of Double Effect, distinguishing between intended harm and foreseen harm.", "isCorrect": true, "rationale": "The text explicitly states, 'Foot was not primarily interested in trolleys. She was investigating the doctrine of double effect — the moral principle...that distinguishes between harm you intend and harm you merely foresee as a side effect.'"}, {"text": "The justification for military collateral damage in wartime scenarios.", "isCorrect": false, "rationale": "While the Doctrine of Double Effect applies to military decisions, this was not Foot's *primary* interest in introducing the trolley problem specifically."}, {"text": "The development of a new branch of virtue ethics focused on action-based dilemmas.", "isCorrect": false, "rationale": "While Foot was known for reviving virtue ethics, her use of the trolley problem was specifically to explore the Doctrine of Double Effect within a different ethical framework."}]}, {"question": "Based on the 'Key Concept' box, which statement best encapsulates the complex nature of our moral judgments as revealed by the trolley problem?", "options": [{"text": "Moral judgments are solely driven by the number of lives saved or lost, making consequentialism the only logical framework.", "isCorrect": false, "rationale": "The Key Concept box explicitly states, 'The trolley problem reveals that our moral judgments are not driven by a single principle,' contradicting the idea of being 'solely driven' by outcomes."}, {"text": "Our moral thinking consistently follows a single, universally applicable principle across all ethical dilemmas.", "isCorrect": false, "rationale": "The Key Concept box directly refutes this, stating, 'The trolley problem reveals that our moral judgments are not driven by a single principle.'"}, {"text": "Our moral judgments consider both the outcomes (how many die) and the method by which those outcomes are produced (e.g., means vs. side effect, personal vs. impersonal).", "isCorrect": true, "rationale": "The Key Concept box states, 'We care about outcomes (how many die), but we also care about how those outcomes are produced — whether harm is a side effect or a means, whether it is personal or impersonal, whether it involves violating someone's rights.'"}, {"text": "Emotional responses always override rational calculation in ethical decision-making, demonstrating the irrationality of human morality.", "isCorrect": false, "rationale": "The text acknowledges the role of emotional responses but also mentions 'calculating, utilitarian reasoning' and the 'tension between these factors,' not a complete override or irrationality."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
