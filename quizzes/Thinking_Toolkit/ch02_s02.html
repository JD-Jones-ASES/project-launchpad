    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the strategic principle illustrated by Hernán Cortés's actions of making retreat impossible?", "options": [{"text": "It demonstrated superior military tactics against indigenous populations.", "isCorrect": false, "rationale": "The text focuses on the psychological and strategic commitment, not the effectiveness of specific military tactics or superiority over others."}, {"text": "It transformed the psychology of his expedition by forcing full commitment to going forward.", "isCorrect": true, "rationale": "The text explicitly states: 'by removing the option of retreat, Cortés transformed the psychology of his expedition. There was no going back. The only way was forward.'"}, {"text": "It allowed him to quickly resupply his forces from his ships.", "isCorrect": false, "rationale": "The ships were scuttled or beached, making them unavailable for resupply; their purpose was to remove retreat."}, {"text": "It prevented rival Spanish factions from seizing his vessels.", "isCorrect": false, "rationale": "While political maneuvering within his own ranks was mentioned as a nuance, the overarching strategic principle highlighted was the forcing of commitment, not the prevention of seizure by rivals."}]}, {"question": "In game theory, what is a 'commitment device' as described in the text?", "options": [{"text": "A tool used to intimidate opponents into immediate surrender.", "isCorrect": false, "rationale": "While it can influence opponents, its primary function is to establish credibility by making your own position irreversible, not solely to intimidate."}, {"text": "A mechanism that makes it costly or impossible to change your mind.", "isCorrect": true, "rationale": "The text defines a commitment device directly as: 'a mechanism that makes it costly or impossible to change your mind.'"}, {"text": "A method to gather more options before making a decision.", "isCorrect": false, "rationale": "A commitment device works by reducing or eliminating options, not gathering more."}, {"text": "A psychological trick to make others believe you are bluffing.", "isCorrect": false, "rationale": "Conversely, a commitment device makes your threats and promises more believable and credible, ensuring others take you seriously, rather than assume you are bluffing."}]}, {"question": "The text states that 'reducing your own options can increase your power.' How does it explain this counterintuitive idea?", "options": [{"text": "It makes you appear more unpredictable to opponents.", "isCorrect": false, "rationale": "The text suggests it makes your commitment predictable and credible, not unpredictable."}, {"text": "It forces opponents to also reduce their options in response.", "isCorrect": false, "rationale": "While this can happen in competitive situations, the direct explanation for *your* increased power is related to your own credibility, not the forced actions of others."}, {"text": "It makes your threats and promises more believable because retreat is not an option.", "isCorrect": true, "rationale": "The text explains, 'But if you have burned your ships—if retreat is literally not an option—your commitment becomes credible, and your opponent must take it seriously.'"}, {"text": "It simplifies decision-making by eliminating complex choices.", "isCorrect": false, "rationale": "While reducing options might simplify decision-making, this is not the specific reason given for why it 'increases your power' in a strategic sense."}]}, {"question": "A CEO publicly announces a bold new product direction for her company. According to the text, how does this action relate to 'burning bridges,' and why?", "options": [{"text": "It's an example of tragic bridge-burning because it exposes the company to unnecessary risk.", "isCorrect": false, "rationale": "The text uses this as an example of 'strategic commitment,' not tragic bridge-burning, which is characterized by emotion over judgment."}, {"text": "It's an example of strategic irreversibility, as it creates social pressure that makes retreat more embarrassing than pushing forward.", "isCorrect": true, "rationale": "The text explicitly states: 'A CEO who announces a bold new product direction has made retreat more embarrassing than pushing forward,' classifying this under 'Irreversibility as Strategy' as a commitment device."}, {"text": "It's a sign of emotional irreversibility, driven by a desire for quick success without proper planning.", "isCorrect": false, "rationale": "The scenario describes a strategic decision to commit, not necessarily one driven by unbridled emotion without planning."}, {"text": "It's an effective way to test market demand before committing resources.", "isCorrect": false, "rationale": "The act of publicly announcing a 'bold new product direction' implies commitment, not preliminary testing of demand."}]}, {"question": "What is identified as the 'common thread' in tragic bridge-burning scenarios?", "options": [{"text": "A lack of viable alternative paths forward.", "isCorrect": false, "rationale": "Tragic bridge-burning often *destroys* viable paths, rather than being a result of their initial absence."}, {"text": "The strategic removal of retreat options based on a flawed plan.", "isCorrect": false, "rationale": "This describes a failed strategic move. Tragic bridge-burning is specifically linked to emotional impulsiveness, not necessarily a 'plan' at all."}, {"text": "Emotion outrunning judgment, leading to decisions regretted in hindsight.", "isCorrect": true, "rationale": "The text clearly states: 'The common thread in tragic bridge-burning is emotion outrunning judgment. The decision feels good in the moment—cathartic, decisive, liberating—and disastrous in retrospect.'"}, {"text": "A deliberate attempt to sever ties with adversaries to achieve a competitive advantage.", "isCorrect": false, "rationale": "This describes a strategic move. Tragic bridge-burning typically involves self-sabotage or regret in personal or professional contexts."}]}, {"question": "A manager, frustrated after a difficult meeting, drafts a scathing resignation email, considering sending it immediately. Which of the diagnostic questions from the text is most pertinent to this situation?", "options": [{"text": "How will this impact my reputation in the industry?", "isCorrect": false, "rationale": "While a valid consideration, this is not one of the two specific diagnostic questions provided in the text."}, {"text": "Am I doing this because I have thought it through, or because I am angry, afraid, or exhausted?", "isCorrect": true, "rationale": "This question directly addresses whether the decision is driven by emotion ('angry, afraid, or exhausted') or careful consideration, which is the primary distinction between strategic and tragic irreversibility."}, {"text": "Can I find a new job within a week?", "isCorrect": false, "rationale": "This is a practical concern about consequences, but it is not one of the two diagnostic questions provided in the text for evaluating the act of burning a bridge itself."}, {"text": "What is on the other side?", "isCorrect": false, "rationale": "While also a diagnostic question, the *immediate* issue in an emotionally charged situation is discerning the *motive* for the action, making the 'thought through vs. emotional' question more directly pertinent."}]}, {"question": "According to the text, what is the primary factor that distinguishes strategic bridge-burning from tragic bridge-burning?", "options": [{"text": "The scale of the decision and the number of people affected.", "isCorrect": false, "rationale": "While scale can vary, the text emphasizes the *nature* of the decision-making process, not merely its scope, as the key differentiator."}, {"text": "Whether the irreversibility is deliberate and planned or impulsive and reactive.", "isCorrect": true, "rationale": "The 'keyconcept' summary explicitly states: 'The difference lies in whether the irreversibility is deliberate and planned or impulsive and reactive.'"}, {"text": "The immediate financial cost associated with the action.", "isCorrect": false, "rationale": "The text focuses on the psychological, strategic, and emotional dimensions, not primarily the financial cost, as the differentiating factor."}, {"text": "The likelihood of an opponent retreating first.", "isCorrect": false, "rationale": "This relates to the outcome in competitive scenarios but does not define the fundamental difference in how one *approaches* the act of bridge-burning."}]}, {"question": "The text mentions an ultimatum in a relationship ('Either we get married or I leave') as a bridge-burning move. Under what condition would this most likely be considered strategic, rather than tragic, according to the text's principles?", "options": [{"text": "If it forces the other person to immediately comply out of fear.", "isCorrect": false, "rationale": "While ultimatums can induce fear, the text's definition of strategic bridge-burning emphasizes deliberate planning and a clear purpose, not just causing fear."}, {"text": "If it is delivered in the heat of an argument out of frustration.", "isCorrect": false, "rationale": "This scenario aligns with tragic bridge-burning, where 'emotion outrunning judgment' is the common thread."}, {"text": "If it is a planned move to resolve a long-standing issue and the person is prepared for either outcome.", "isCorrect": true, "rationale": "Strategic bridge-burning is characterized by being 'planned in advance' and having 'a plan for what came next.' Being prepared for either outcome suggests thoughtful consideration rather than impulsive emotion."}, {"text": "If it results in the immediate end of the relationship, avoiding further conflict.", "isCorrect": false, "rationale": "The outcome (ending the relationship) doesn't define whether the act was strategic or tragic; the *intent* and *planning* behind the ultimatum do."}]}, {"question": "Based on the two diagnostic questions, what is the most critical element for 'burning a bridge' to be considered a strategic masterstroke rather than recklessness?", "options": [{"text": "The public announcement of the decision to maximize social pressure.", "isCorrect": false, "rationale": "While public commitment can be part of strategy, the diagnostic questions focus on internal judgment and planning, which are more fundamental."}, {"text": "A clear, well-considered plan for what lies on the other side of the irreversible decision.", "isCorrect": true, "rationale": "The second diagnostic question states: 'If you have no plan for the other side of the bridge, burning it is not boldness—it is recklessness.' This highlights the critical importance of a clear plan."}, {"text": "The complete absence of any alternative options or paths to success.", "isCorrect": false, "rationale": "Strategic bridge-burning involves *deliberately removing* options, not necessarily starting from a position where no alternatives exist."}, {"text": "The emotional conviction that the decision is the only right path.", "isCorrect": false, "rationale": "Emotional conviction without clear judgment is characteristic of tragic bridge-burning, not a strategic masterstroke."}]}, {"question": "How does a commitment device specifically solve a 'credibility problem' in strategic situations?", "options": [{"text": "It demonstrates a willingness to take risks, making opponents underestimate your resolve.", "isCorrect": false, "rationale": "It makes your resolve *more credible*, causing opponents to take it seriously, rather than underestimate it."}, {"text": "By removing the option of retreat, it makes your threats and promises more convincing and believable.", "isCorrect": true, "rationale": "The text explains: 'If your opponent knows you can retreat, your threat to stand firm is less convincing. But if you have burned your ships... your commitment becomes credible, and your opponent must take it seriously.'"}, {"text": "It allows you to gather more information about your opponent's intentions.", "isCorrect": false, "rationale": "A commitment device is about signaling *your* intentions and resolve, not primarily about gathering information on opponents."}, {"text": "It creates an opportunity for both sides to find a mutually beneficial compromise.", "isCorrect": false, "rationale": "While it can lead to resolution, its direct function in solving a credibility problem is making *your* position firm and believable, not necessarily initiating compromise."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
