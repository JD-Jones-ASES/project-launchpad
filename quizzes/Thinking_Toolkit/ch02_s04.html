    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Henry David Thoreau's interpretation, what is the fundamental issue with \"castles in the air\"?", "options": [{"text": "The dreams themselves are inherently flawed and unattainable.", "isCorrect": false, "rationale": "Thoreau explicitly states, \"If you have built castles in the air, your work need not be lost,\" indicating that the dreams are not inherently flawed but require grounding."}, {"text": "They lack the necessary foundations to connect them to reality.", "isCorrect": true, "rationale": "The text highlights Thoreau's twist: \"The problem is not the castle. The problem is the missing foundation.\" The lack of foundations is what makes them unmoored from reality."}, {"text": "They are too elaborate and beautiful to ever be built in reality.", "isCorrect": false, "rationale": "The text argues that a castle with foundations is \"not less beautiful than a castle in the air—it is more beautiful, because it is real,\" implying grand visions can indeed be made real."}, {"text": "They are solely the product of imagination, with no practical component at all.", "isCorrect": false, "rationale": "The text clarifies that \"vision without execution is fantasy,\" implying vision itself is a valuable component, but it requires execution to avoid being a fantasy."}], "id": "q01"}, {"question": "Which statement best captures the primary characteristic of a \"castle in the air\" as described in \"The Anatomy of a Castle in the Air\"?", "options": [{"text": "It is a vision that is universally acknowledged as impossible to achieve.", "isCorrect": false, "rationale": "The problem isn't inherent impossibility, but the lack of a 'how.' Many 'castles' could be built with proper foundations."}, {"text": "It describes an ambitious outcome in vivid detail but lacks specific execution mechanisms.", "isCorrect": true, "rationale": "This aligns with the description: \"Rich in aspiration, poor in mechanism. The plan describes what will be achieved in vivid detail but is vague or silent about how.\""}, {"text": "It exclusively involves personal goals, not business or political aspirations.", "isCorrect": false, "rationale": "The 'realworld' examples clearly demonstrate castles in the air in startup culture, personal goals, and political programs."}, {"text": "It is a plan that has been thoroughly tested against potential failures and risks.", "isCorrect": false, "rationale": "A key feature of castles in the air is 'resistance to reality-testing,' meaning they avoid questions about potential failures."}], "id": "q02"}, {"question": "A marketing team spends weeks developing a highly detailed, visually appealing strategy document for a new product launch, but then delays implementing any of the actual marketing campaigns, citing the need for \"perfect timing.\" This behavior most closely exemplifies which feature of a \"castle in the air\"?", "options": [{"text": "Resistance to reality-testing.", "isCorrect": false, "rationale": "While the delay might hint at avoiding reality, the primary issue described is the *substitute* nature of the plan, not direct resistance to 'how' questions."}, {"text": "Rich in aspiration, poor in mechanism.", "isCorrect": false, "rationale": "The scenario describes a 'highly detailed... strategy document,' suggesting mechanisms *were* detailed, but execution is lacking, which points to a different problem."}, {"text": "Confusing the plan with the accomplishment.", "isCorrect": true, "rationale": "This perfectly matches 'planning as procrastination,' where 'writing out the business plan feels like progress toward building the business' and the plan becomes a substitute for actual work."}, {"text": "A lack of available resources.", "isCorrect": false, "rationale": "The problem is described as delaying implementation, not a lack of resources to perform the actions outlined in the detailed plan."}], "id": "q03"}, {"question": "According to the text's explanation of Thoreau's advice, what is the fundamental purpose of \"putting the foundations under\" a castle in the air?", "options": [{"text": "To reduce the grandness of the vision to a more manageable size.", "isCorrect": false, "rationale": "The text states, 'A castle with foundations is not less beautiful than a castle in the air—it is more beautiful,' implying the grandness isn't reduced, but made real."}, {"text": "To test if the original dream was truly worthwhile to pursue.", "isCorrect": false, "rationale": "The advice focuses on *how* to build the dream, not questioning its inherent worth, as Thoreau says, 'your work need not be lost.'"}, {"text": "To connect the ambitious dream to tangible reality and make it achievable.", "isCorrect": true, "rationale": "The text explicitly states, 'These questions do not destroy the dream. They connect it to reality.'"}, {"text": "To ensure that the plan relies solely on existing resources without seeking new ones.", "isCorrect": false, "rationale": "While 'What resources do you actually have?' is a question, the overall goal is connecting to reality, which may involve acquiring resources or adjusting the plan based on current ones, not strictly limiting it."}], "id": "q04"}, {"question": "An aspiring author shares their concept for a groundbreaking novel but becomes defensive and dismisses questions about their writing process, daily word count goals, or editing strategy as \"unnecessary details that stifle creativity.\" This reaction is a clear indication of which \"anatomy\" feature?", "options": [{"text": "Confusing the plan with the accomplishment.", "isCorrect": false, "rationale": "While possibly related, the primary described behavior is defensive dismissal of practical 'how' questions, rather than simply substituting planning for work."}, {"text": "Resistance to reality-testing.", "isCorrect": true, "rationale": "This scenario directly reflects 'Resistance to reality-testing,' where 'Castle-builders often resist the question “Yes, but how?” because the question threatens the beautiful structure.'"}, {"text": "Rich in aspiration, poor in mechanism.", "isCorrect": false, "rationale": "The scenario describes a *reaction* to questions about mechanisms, not just the initial absence of them. The resistance itself is the key feature here."}, {"text": "A focus on long-term goals over immediate steps.", "isCorrect": false, "rationale": "While this might be true for the author, the core feature being demonstrated is the active dismissal of practical implementation questions."}], "id": "q05"}, {"question": "The text states, \"Vision without execution is fantasy, but execution without vision is drudgery.\" What is the main implication of this statement regarding successful endeavors?", "options": [{"text": "A clear vision is more crucial for success than consistent effort.", "isCorrect": false, "rationale": "The statement uses a conjunction 'but,' implying both vision and execution are necessary, not that one is more crucial than the other."}, {"text": "Overly ambitious visions invariably lead to unfulfilling work.", "isCorrect": false, "rationale": "The text does not condemn ambitious visions but rather the lack of foundations to support them, suggesting ambition can be fulfilling when paired with execution."}, {"text": "Both a compelling vision and practical implementation are indispensable for meaningful achievement.", "isCorrect": true, "rationale": "The statement explicitly highlights the negative outcomes of having one without the other, concluding that 'What you need is both.'"}, {"text": "Focusing on daily tasks without a larger purpose makes work easier to manage.", "isCorrect": false, "rationale": "The text characterizes 'execution without vision' as 'drudgery,' suggesting it is unfulfilling, not necessarily easier to manage."}], "id": "q06"}, {"question": "A team is developing a new educational app. Instead of building all features at once, they decide to launch a basic version with only core functionality to a small group of users to gather feedback before adding more complex elements. Which of Thoreau's \"foundation questions\" are they primarily addressing?", "options": [{"text": "What is the first concrete step?", "isCorrect": false, "rationale": "While launching a basic version is a first step, the specific focus on *basic* or *core* functionality for testing aligns more precisely with the smallest viable version."}, {"text": "What resources do you actually have?", "isCorrect": false, "rationale": "The scenario focuses on the *scope* of the product iteration, not directly on a self-assessment of available resources."}, {"text": "What does the smallest viable version look like?", "isCorrect": true, "rationale": "The text asks, 'Can you build a one-room cottage before you build a castle? Can you test the idea on a small scale before committing everything?' This directly corresponds to launching a basic version for testing."}, {"text": "What could go wrong?", "isCorrect": false, "rationale": "While testing a smallest viable version can help uncover what could go wrong, the primary intent described is to test the idea on a small scale, not just to list potential failures."}], "id": "q07"}, {"question": "Which of the following is NOT listed as one of the practical questions for \"putting the foundations under them\"?", "options": [{"text": "What is the first concrete step?", "isCorrect": false, "rationale": "This question is explicitly listed: 'What is the first concrete step? Not the vision statement. Not the five-year plan. What do you need to do tomorrow morning?'"}, {"text": "What market share do you project to achieve in five years?", "isCorrect": true, "rationale": "This question focuses on a long-term outcome or aspiration, which the text contrasts with foundational questions like 'first concrete step' or 'smallest viable version.'"}, {"text": "What resources do you actually have?", "isCorrect": false, "rationale": "This question is explicitly listed: 'What resources do you actually have? Not the resources you wish you had... What do you have right now?'"}, {"text": "What could go wrong?", "isCorrect": false, "rationale": "This question is explicitly listed: 'What could go wrong? If you cannot name at least three ways the plan could fail, you have not thought about it carefully enough.'"}], "id": "q08"}, {"question": "The text emphasizes asking \"What could go wrong?\" and states that if you cannot name at least three ways a plan could fail, you \"have not thought about it carefully enough.\" What is the primary implication of ignoring this question?", "options": [{"text": "It suggests an overly optimistic outlook, which is beneficial for motivation.", "isCorrect": false, "rationale": "The text implies a lack of careful thought and a potential disconnect from reality, not a beneficial motivational state."}, {"text": "The plan is likely based on unrealistic assumptions and lacks a connection to potential challenges.", "isCorrect": true, "rationale": "Ignoring potential failures means the plan hasn't been 'thought about carefully enough,' implying it's unmoored from the practical realities and obstacles it might face."}, {"text": "The plan is too simple and lacks the necessary complexity for true innovation.", "isCorrect": false, "rationale": "The issue is the lack of *forethought* regarding risks, not the inherent simplicity or complexity of the plan itself."}, {"text": "It indicates that the planner has absolute confidence, guaranteeing success.", "isCorrect": false, "rationale": "The text warns against this, linking a lack of failure analysis to insufficient thought, not guaranteed success."}], "id": "q09"}, {"question": "A political candidate promises to eliminate all national debt within their term without providing any specific policies for budget cuts, tax reforms, or economic growth strategies. Based on the \"realworld\" examples provided, this promise is an example of what?", "options": [{"text": "An effective long-term political strategy.", "isCorrect": false, "rationale": "The text categorizes such proposals as 'castles in the air' and a source of 'electorate's frustration,' indicating they are not effective strategies in their current form."}, {"text": "A vision without sufficient foundational mechanisms.", "isCorrect": true, "rationale": "This directly matches the 'Political programs' example: 'Grand policy proposals that promise sweeping benefits without specifying implementation mechanisms, funding sources, or trade-offs are castles in the air.'"}, {"text": "A focus on reality-testing within political discourse.", "isCorrect": false, "rationale": "The absence of specific policies and funding sources indicates a *lack* of reality-testing, not a focus on it."}, {"text": "An instance of \"planning as procrastination\" at the governmental level.", "isCorrect": false, "rationale": "While there might be procrastination, the core issue described is the *absence* of mechanisms for a grand promise, rather than the plan becoming a substitute for work."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
