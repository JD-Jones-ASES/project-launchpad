        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 7, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the central paradox described by Hofstadter's Law?", "options": [{"text": "That our ability to plan improves significantly with each failed attempt.", "isCorrect": false, "rationale": "Hofstadter's Law suggests the opposite: that even with awareness of past failures, our planning bias persists and even applies to our attempts to correct it."}, {"text": "That even when we account for our tendency to underestimate tasks, our adjustment will still be insufficient.", "isCorrect": true, "rationale": "This option correctly captures the core of Hofstadter's Law, which states that 'It always takes longer than you expect, even when you take into account Hofstadter's Law.' The law applies to itself, making self-correction inherently flawed."}, {"text": "That tasks always take exactly the amount of time we initially estimate.", "isCorrect": false, "rationale": "This contradicts both the Planning Fallacy (which Hofstadter's Law comments on) and Hofstadter's Law itself, which emphasizes underestimation."}, {"text": "That external data is inherently biased and unreliable for project planning.", "isCorrect": false, "rationale": "The text explicitly states that external data (the 'outside view') is the most reliable escape precisely because 'The data does not care about your biases.'"}]}, {"question": "The phrase 'It is turtles all the way down' is used in the text to illustrate which aspect of Hofstadter's Law?", "options": [{"text": "The cumulative effect of minor delays leading to major project overruns.", "isCorrect": false, "rationale": "While cumulative delays are part of project overruns, the 'turtles all the way down' analogy specifically refers to the infinite regression or recursive nature of the problem, not just the accumulation of delays."}, {"text": "The hierarchical structure of project management and task breakdown.", "isCorrect": false, "rationale": "The analogy is about the recursive nature of the bias itself, not the organizational structure of a project."}, {"text": "The endless recursion of bias, where attempts to correct for a bias are themselves subject to the same bias.", "isCorrect": true, "rationale": "This accurately reflects the meaning in the text: 'You are trying to correct for a bias, but the correction is itself subject to the same bias. It is turtles all the way down,' highlighting the self-referential and never-ending nature of the problem."}, {"text": "The fundamental unpredictability of complex systems, regardless of planning.", "isCorrect": false, "rationale": "While complexity contributes to unpredictability, the 'turtles all the way down' analogy specifically refers to the recursive nature of human planning *bias*, not just general unpredictability."}]}, {"question": "A software developer knows they often underestimate coding time. For a new feature, they initially estimate 3 days, then add a 2-day buffer based on past experience, making it 5 days. According to Hofstadter's Law, what is the likely outcome?", "options": [{"text": "The 5-day estimate will be perfectly accurate because the developer applied metacognition.", "isCorrect": false, "rationale": "The text states that 'metacognition — thinking about thinking — is itself a kind of thinking, subject to the same limitations,' implying that such internal adjustments are unlikely to achieve perfect accuracy."}, {"text": "The 5-day estimate will still likely be too short, as the buffer itself was generated by the same underlying bias.", "isCorrect": true, "rationale": "Hofstadter's Law predicts that 'even your buffered estimate will be too low — because the buffer itself was generated by the same mind that produced the original underestimate,' making this the most likely outcome."}, {"text": "The developer will complete the task in under 3 days due to increased awareness.", "isCorrect": false, "rationale": "This contradicts the premise of both the Planning Fallacy and Hofstadter's Law, which focuses on underestimation."}, {"text": "The task will take exactly 3 days, as the initial estimate is usually the most reliable.", "isCorrect": false, "rationale": "The text clearly indicates that initial estimates are often underestimates and that adding a buffer is an attempt to correct this, but even the correction is flawed."}]}, {"question": "How does Hofstadter's Law deepen our understanding of biases like the Planning Fallacy, rather than merely restating it?", "options": [{"text": "It provides a mathematical formula for calculating the exact degree of underestimation.", "isCorrect": false, "rationale": "The text does not mention any mathematical formula for calculating underestimation; its focus is on the qualitative nature of the recursive bias."}, {"text": "It explains that knowing about a bias intellectually is often insufficient to overcome it experientially, due to the recursive nature of self-correction.", "isCorrect": true, "rationale": "This option captures the key insight: 'We can know about our biases intellectually without being able to correct for them experientially,' because 'the thinking is the problem' even when trying to correct bias."}, {"text": "It suggests that the Planning Fallacy only applies to complex tasks, not simple ones.", "isCorrect": false, "rationale": "The text does not make a distinction between complex and simple tasks regarding the applicability of the Planning Fallacy or Hofstadter's Law."}, {"text": "It identifies the specific neural pathways responsible for biased thinking.", "isCorrect": false, "rationale": "The text discusses cognitive science broadly but does not delve into specific neural pathways."}]}, {"question": "The text states that 'We can know about our biases intellectually without being able to correct for them experientially.' What is the primary reason given for this phenomenon?", "options": [{"text": "Biases are deliberately reinforced by external social pressures.", "isCorrect": false, "rationale": "The text does not attribute the persistence of bias to external social pressures but rather to internal cognitive limitations."}, {"text": "Biases operate at a level below conscious awareness, making metacognitive correction difficult.", "isCorrect": true, "rationale": "The text explicitly states: 'The biases operate at a level below conscious awareness, and no amount of metacognitive sophistication fully neutralizes them.'"}, {"text": "People simply choose not to apply their knowledge to real-world situations.", "isCorrect": false, "rationale": "The text implies a limitation of cognitive ability, not a lack of choice or willingness to apply knowledge."}, {"text": "The human brain is incapable of learning from past mistakes.", "isCorrect": false, "rationale": "This is too extreme; the text suggests limitations in self-correction, not a complete inability to learn from mistakes."}]}, {"question": "According to the text, what is presented as the most reliable method for escaping the recursive underestimation described by Hofstadter's Law?", "options": [{"text": "Intensive introspection and self-analysis to pinpoint the roots of one's biases.", "isCorrect": false, "rationale": "The text argues that 'you cannot bootstrap your way to accuracy by thinking harder about your own thinking, because the thinking is the problem,' making introspection an unreliable solution."}, {"text": "Applying an 'outside view' by consulting external data from similar projects.", "isCorrect": true, "rationale": "The text states: 'The outside view (reference class forecasting...) provides a genuine improvement — not because it eliminates our bias, but because it replaces introspection with data.'"}, {"text": "Developing advanced metacognitive strategies to monitor one's own planning process more closely.", "isCorrect": false, "rationale": "The text indicates that 'metacognition — thinking about thinking — is itself a kind of thinking, subject to the same limitations,' meaning it's not a full escape."}, {"text": "Consulting with expert planners to get their subjective, experienced-based estimates.", "isCorrect": false, "rationale": "While expert advice can be valuable, the text emphasizes the objectivity of 'external data' over subjective estimates, even expert ones, to bypass personal biases."}]}, {"question": "Hofstadter's Law serves as a 'useful corrective to overconfidence in our own self-knowledge.' What does this imply about metacognition?", "options": [{"text": "Metacognition is generally ineffective and should be abandoned in favor of intuition.", "isCorrect": false, "rationale": "The text doesn't advocate abandoning metacognition entirely but highlights its limitations, not its ineffectiveness."}, {"text": "Thinking about thinking is itself a form of thinking, and thus subject to the same biases and limitations.", "isCorrect": true, "rationale": "This directly reflects the text's explanation: 'metacognition — thinking about thinking — is itself a kind of thinking, subject to the same limitations as the object-level thought it is trying to monitor.'"}, {"text": "Metacognition is a powerful tool that, with enough practice, can completely eliminate planning biases.", "isCorrect": false, "rationale": "The text states 'no amount of metacognitive sophistication fully neutralizes them,' contradicting the idea of complete elimination."}, {"text": "Only highly intelligent individuals are capable of effective metacognition.", "isCorrect": false, "rationale": "The text does not make any claims about the relationship between intelligence and the effectiveness of metacognition."}]}, {"question": "Beyond coining Hofstadter's Law, Douglas Hofstadter is recognized for his broader academic work, which often explores what concept?", "options": [{"text": "The principles of classical economic theory and market behavior.", "isCorrect": false, "rationale": "Hofstadter's work, as described in the 'personbox,' is in cognitive science, focusing on self-reference and related concepts, not economics."}, {"text": "The precise mathematical modeling of atmospheric and climate systems.", "isCorrect": false, "rationale": "This field is unrelated to Hofstadter's described work."}, {"text": "Self-reference, strange loops, and the interdisciplinary connections between mathematics, art, and philosophy.", "isCorrect": true, "rationale": "The 'personbox' explicitly states that Hofstadter's work 'explores self-reference, analogy, consciousness, and the strange loops that arise when systems represent themselves,' highlighting his interdisciplinary approach."}, {"text": "The psychological effects of artificial intelligence on human consciousness.", "isCorrect": false, "rationale": "While he works in areas related to AI, the specific focus highlighted in the text is on self-reference and strange loops in a broader interdisciplinary context, rather than solely on AI's psychological effects."}]}, {"question": "The 'Key Concept: Recursive Underestimation' section highlights that 'Self-correction has limits because the correcting mechanism shares the flaws of what it is trying to correct.' Which of the following best exemplifies this principle?", "options": [{"text": "A scientist double-checking their experimental data for anomalies.", "isCorrect": false, "rationale": "This is a standard verification process, not an example of the recursive flaw where the correction method itself is biased in the same way."}, {"text": "A student adding extra study time for an exam, but that additional time still being too little because their estimation of how much 'extra' was needed was also underestimated.", "isCorrect": true, "rationale": "This scenario perfectly illustrates recursive underestimation: the attempt to correct for the initial underestimate (adding study time) is itself subject to the same underlying bias, leading to an insufficient correction."}, {"text": "A chef tasting their dish and adjusting the seasoning based on feedback.", "isCorrect": false, "rationale": "This involves direct sensory feedback and an objective adjustment based on immediate results, not a recursive cognitive bias in planning."}, {"text": "A financial analyst using historical market data to predict future stock prices.", "isCorrect": false, "rationale": "This describes using external data (the 'outside view'), which the text presents as the *solution* to recursive underestimation, not an example of the problem itself."}]}, {"question": "Given the insights of Hofstadter's Law, which of the following statements about human judgment and planning would be most consistent with the author's overall message?", "options": [{"text": "With sufficient personal experience, individuals can entirely overcome their inherent cognitive biases.", "isCorrect": false, "rationale": "Hofstadter's Law argues against the ability to entirely overcome biases through internal means, stating that 'our inability to fully step outside our own perspective' persists."}, {"text": "While awareness of biases is helpful, relying solely on internal mental adjustments for planning will likely remain insufficient.", "isCorrect": true, "rationale": "This statement summarizes the core lesson: intellectual knowledge of biases (awareness) does not equate to experiential correction, and internal adjustments are flawed because the 'thinking is the problem.'"}, {"text": "All forms of planning are ultimately futile because human judgment is fundamentally flawed.", "isCorrect": false, "rationale": "The text offers a solution ('outside view') and explicitly states, 'Does this mean we are helpless? Not entirely,' suggesting planning is not futile but requires different approaches."}, {"text": "Expert opinion, no matter how subjective, is always superior to objective data for predicting future outcomes.", "isCorrect": false, "rationale": "The text champions the 'outside view' which 'replaces introspection with data' over subjective internal estimates, implying data's superiority in overcoming bias."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
