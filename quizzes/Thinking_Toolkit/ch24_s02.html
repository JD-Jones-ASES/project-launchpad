    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the *most significant* insight provided by the concept of the Overton Window?", "options": [{"text": "It identifies the exact boundary between acceptable and unacceptable political ideas at any given moment.", "isCorrect": false, "rationale": "The text states that the key insight is not that the window exists (implying its boundaries), but that it moves, meaning the boundaries are not fixed."}, {"text": "It highlights that the range of mainstream acceptable ideas for public discussion is not fixed but dynamic, shifting over time.", "isCorrect": true, "rationale": "The text explicitly states, 'The key insight is not that the window exists — that much is obvious — but that it moves.' This dynamism and shifting nature is the core insight."}, {"text": "It primarily describes how politicians create and introduce new, radical policy ideas to the public.", "isCorrect": false, "rationale": "The text clarifies that politicians typically 'follow the window,' adopting positions already acceptable or nearly so, rather than leading its movement or creating radical ideas."}, {"text": "It emphasizes that public opinion on major issues remains largely static over generations, making fundamental change difficult.", "isCorrect": false, "rationale": "This option contradicts the central idea that the window moves, with ideas once 'unthinkable' becoming 'policy' and vice versa over generations."}], "id": "q01"}, {"question": "According to the text, which group or factor is *primarily responsible* for shifting the Overton Window?", "options": [{"text": "Political leaders and policymakers who introduce new legislation.", "isCorrect": false, "rationale": "The text explicitly states, 'The Overton Window does not move because politicians lead public opinion. It moves because conditions outside the political arena change.'"}, {"text": "Activists, intellectuals, journalists, technological advancements, and societal crises.", "isCorrect": true, "rationale": "The text lists these as the key drivers: 'activists push ideas, intellectuals write books, journalists cover stories, technologies create new realities, and crises make previously unthinkable options suddenly thinkable.'"}, {"text": "Lobbyists and special interest groups directly influencing politicians' voting decisions.", "isCorrect": false, "rationale": "While lobbying exists, the text emphasizes indirect methods of change and attributes window shifts to broader cultural and societal changes, not primarily direct political pressure."}, {"text": "International organizations dictating global policy norms that national governments then adopt.", "isCorrect": false, "rationale": "The text does not mention international organizations as a primary driver of the Overton Window's movement within a society."}], "id": "q02"}, {"question": "Imagine a society where the idea of universal basic income (UBI) is currently widely debated among experts and the public, considered a legitimate and viable, albeit ambitious, proposal for economic reform. According to Overton's spectrum of public acceptability, which stage best describes the current public acceptability of UBI in this scenario?", "options": [{"text": "Unthinkable", "isCorrect": false, "rationale": "If UBI is 'widely debated' and 'legitimate,' it has clearly moved beyond being 'unthinkable' in public discourse."}, {"text": "Radical", "isCorrect": false, "rationale": "While ambitious, the description 'legitimate and viable' suggests it has moved beyond merely 'radical' and is entering the realm of serious consideration."}, {"text": "Sensible", "isCorrect": true, "rationale": "The description 'widely debated,' 'legitimate,' and 'viable' aligns well with the 'sensible' stage, where an idea is seen as making sense and being a reasonable course of action, even if not yet universally popular or enacted policy."}, {"text": "Policy", "isCorrect": false, "rationale": "The scenario states UBI is a 'proposal' and 'debated,' indicating it has not yet been adopted as 'policy.'"}], "id": "q03"}, {"question": "How do 'fringe activists' described in the text *unintentionally* contribute to shifting the Overton Window for more moderate ideas?", "options": [{"text": "By directly lobbying politicians to adopt their extreme positions, which then influences broader debate.", "isCorrect": false, "rationale": "The text describes this as an 'unintentional purpose' for moderates, and the mechanism is contrast, not direct lobbying for their own extreme positions to benefit moderates."}, {"text": "By making more moderate ideas appear relatively reasonable and centered by comparison to their own extreme views.", "isCorrect": true, "rationale": "The text states, 'the radical flank makes the moderate position look like the reasonable middle ground,' serving an unintentional purpose for moderate reformers."}, {"text": "By discrediting the entire spectrum of policy debate, thereby causing public apathy and a desire for new solutions.", "isCorrect": false, "rationale": "The text does not suggest fringe activists cause apathy; rather, they can make moderate positions seem more appealing by contrast."}, {"text": "By demonstrating the feasibility and benefits of their extreme ideas through real-world examples and experiments.", "isCorrect": false, "rationale": "Their role is in making moderate ideas look good by contrast, not necessarily in proving their own extreme ideas' feasibility."}], "id": "q04"}, {"question": "The text cautions against interpreting the Overton Window as a 'strategic playbook.' What is the primary danger or misuse highlighted in this caution?", "options": [{"text": "Overestimating the power of politicians to influence public opinion, leading to ineffective lobbying efforts.", "isCorrect": false, "rationale": "The caution focuses on the misuse of the model by individuals, not on the miscalculation of political power. The model itself clarifies politicians' role."}, {"text": "Believing that social change only happens gradually, thus ignoring the potential for sudden, crisis-driven shifts.", "isCorrect": false, "rationale": "The text explicitly states the window moves fastest during crises, so this is a misunderstanding of the model, not its primary misuse caution."}, {"text": "Deliberately making extreme claims or promoting radical ideas with the intent to manipulate public discourse and normalize one's actual position.", "isCorrect": true, "rationale": "The caution states, 'Some people interpret it as a mandate to 'say extreme things to shift the window' — a kind of deliberate radicalism designed to make their real position look moderate. This is a cynical misuse... it does not validate the technique of making outrageous claims in order to manipulate public discourse.'"}, {"text": "Failing to recognize when an idea has moved from 'sensible' to 'policy,' thereby missing opportunities for legislative action.", "isCorrect": false, "rationale": "This describes a failure of observation or timing, not the specific 'cynical misuse' of the model as a manipulative 'playbook' that the text warns against."}], "id": "q05"}, {"question": "According to the text, what impact do significant societal crises, such as pandemics or financial emergencies, typically have on the Overton Window?", "options": [{"text": "They slow down the window's movement as people prioritize stability and resist new ideas.", "isCorrect": false, "rationale": "The text states the opposite: 'The window moves fastest during crises'."}, {"text": "They cause the window to temporarily disappear, eliminating all policy debate until the crisis subsides.", "isCorrect": false, "rationale": "Crises accelerate the window's movement, they do not make it disappear or halt debate. They change what's debatable."}, {"text": "They accelerate the window's shift, making previously unthinkable policies suddenly seem necessary and viable.", "isCorrect": true, "rationale": "The text states, 'The window moves fastest during crises: wartime measures, pandemic restrictions, and financial emergencies routinely make previously unthinkable policies suddenly “necessary.”'"}, {"text": "They force politicians to lead public opinion, which is contrary to the typical mechanism of the window's movement.", "isCorrect": false, "rationale": "While policies may change quickly, politicians still adopt what becomes 'necessary' or acceptable due to crisis conditions, not necessarily initiating the shift themselves in public opinion."}], "id": "q06"}, {"question": "Based on the concept of the Overton Window, what does it imply about the nature of 'common sense' in a society?", "options": [{"text": "'Common sense' is a universal and unchanging set of beliefs shared across all cultures and generations.", "isCorrect": false, "rationale": "The text explicitly states 'common sense' is 'not fixed but historically contingent,' meaning it changes with history and culture."}, {"text": "'Common sense' is a static concept that resists any efforts to shift it over time, ensuring societal stability.", "isCorrect": false, "rationale": "This contradicts the core concept that the Overton Window, and thus what is considered 'common sense,' moves over time."}, {"text": "'Common sense' is dynamic and evolves over time, influenced by cultural shifts and external factors.", "isCorrect": true, "rationale": "The text explains that the window 'helps explain why 'common sense' is not fixed but historically contingent — and why yesterday's radical idea can become tomorrow's conventional wisdom.'"}, {"text": "'Common sense' is primarily determined by the legislative actions of elected officials and government mandates.", "isCorrect": false, "rationale": "The text indicates politicians 'follow' the window; they don't primarily determine what constitutes 'common sense,' which is driven by broader cultural shifts."}], "id": "q07"}, {"question": "Which of the following historical shifts best exemplifies an idea moving from 'policy' to 'unthinkable' within the Overton Window?", "options": [{"text": "The legalization of previously prohibited recreational substances in some regions.", "isCorrect": false, "rationale": "This represents a move from 'unthinkable' or 'radical' towards 'acceptable' or 'policy,' the opposite direction."}, {"text": "The widespread adoption of environmental protection laws that were once considered dangerous radicalism.", "isCorrect": false, "rationale": "This is an example of an idea moving from 'radicalism' to 'mainstream policy,' the opposite direction described."}, {"text": "The societal rejection of child labor in factories, which was once a common and legal practice.", "isCorrect": true, "rationale": "The text specifically mentions 'child labor in factories' as an example of a position that 'moved from “policy” to “unthinkable” over the course of decades.'"}, {"text": "The establishment of universal healthcare systems in countries where it was previously a fringe concept.", "isCorrect": false, "rationale": "This represents a shift from 'fringe' or 'radical' to 'policy,' moving in the opposite direction from the question."}], "id": "q08"}, {"question": "How does the text characterize the typical relationship between politicians and the movement of the Overton Window?", "options": [{"text": "Politicians are the primary drivers, leading public opinion to new policy positions through their legislative agendas.", "isCorrect": false, "rationale": "The text states, 'The Overton Window does not move because politicians lead public opinion.'"}, {"text": "Politicians primarily react to and adopt ideas that are already within the range of public acceptability or only a single step outside it.", "isCorrect": true, "rationale": "The text explains, 'Politicians then follow the window — they adopt positions that are already within the range of acceptability, or at most one step outside it.'"}, {"text": "Politicians consistently challenge the boundaries of the window, often pushing truly radical ideas into policy to test public reaction.", "isCorrect": false, "rationale": "Politicians generally adhere closely to the window, not consistently challenging its boundaries with truly radical ideas, which would be outside their acceptable range."}, {"text": "Politicians are largely irrelevant to the window's movement, having no significant impact on what society considers acceptable.", "isCorrect": false, "rationale": "While politicians don't *lead* the window, they do *adopt* positions within it, thereby formalizing and legitimizing ideas. Their actions are consequential, even if reactive."}], "id": "q09"}, {"question": "A group of activists intentionally adopts an extremely radical position, hoping that by contrast, their *actual* moderate policy goals will seem more palatable to the mainstream. Based on the 'caution' section, what is a potential *unintended negative consequence* of this specific strategy?", "options": [{"text": "Politicians will likely ignore both the radical and moderate positions altogether, viewing them as disingenuous.", "isCorrect": false, "rationale": "The text doesn't suggest politicians ignore the ideas, but rather that the radical ideas themselves might become normalized."}, {"text": "The radical ideas themselves might become normalized and gain public acceptance, shifting the window in an unintended direction.", "isCorrect": true, "rationale": "The caution states, 'Moreover, the window can shift in directions you do not intend: pushing extreme ideas into the public arena can normalize them rather than making moderate alternatives look better.'"}, {"text": "The moderate policy goals will become even more unpopular due to their association with the deliberately radical positions.", "isCorrect": false, "rationale": "The text suggests the radical flank can make moderate positions look 'reasonable,' so this specific negative outcome is not directly supported by the caution section's point about unintended shifts."}, {"text": "The window will become fixed, preventing any further shifts in public opinion due to the saturation of extreme views.", "isCorrect": false, "rationale": "The window is dynamic and constantly shifting; even extreme views contribute to its movement, they don't fix it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
