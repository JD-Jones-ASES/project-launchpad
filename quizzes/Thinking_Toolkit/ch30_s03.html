        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the core principle embodied by Hanlon's Razor?", "options": [{"text": "Always assume the worst intentions in others to prepare for potential threats.", "isCorrect": false, "rationale": "Hanlon's Razor advocates for the opposite: considering innocent explanations before malice."}, {"text": "Never attribute to malice that which is adequately explained by incompetence.", "isCorrect": true, "rationale": "This is the direct quote and central tenet of Hanlon's Razor as stated in the text."}, {"text": "People are inherently good and never act with malicious intent, only by mistake.", "isCorrect": false, "rationale": "The text explicitly cautions that malice does exist and the razor should not be pushed 'too far', so this statement is an oversimplification and goes against the nuance provided."}, {"text": "Complex problems invariably have complex causes that are difficult to uncover.", "isCorrect": false, "rationale": "While true in some cases, this does not capture the essence of Hanlon's Razor, which prioritizes simpler, less sinister explanations for behavior."}]}, {"question": "The text mentions several historical figures who expressed sentiments similar to Hanlon's Razor. Which individual is explicitly credited with *attributing* the specific adage 'Never attribute to malice that which is adequately explained by incompetence' in a 1980 compilation?", "options": [{"text": "Johann Wolfgang von Goethe", "isCorrect": false, "rationale": "Goethe expressed a similar idea about misunderstandings, but is not credited with the specific formulation or attribution of Hanlon's Razor."}, {"text": "Napoleon Bonaparte", "isCorrect": false, "rationale": "Napoleon reportedly advised against assuming conspiracy when stupidity would suffice, a similar sentiment, but he did not attribute Hanlon's Razor itself."}, {"text": "Robert J. Hanlon", "isCorrect": true, "rationale": "Robert J. Hanlon is explicitly named as the one who submitted the razor to a 1980 compilation, making him the attributor of the specific phrase."}, {"text": "Murphy", "isCorrect": false, "rationale": "Murphy's Law Book Two is the compilation where it appeared, but Murphy is not identified as the person who attributed Hanlon's Razor."}]}, {"question": "According to the text, why do people often find it challenging to apply Hanlon's Razor and instead tend to suspect malicious intent?", "options": [{"text": "Most people possess an inherent cynical worldview that predisposes them to distrust.", "isCorrect": false, "rationale": "The text attributes this tendency to cognitive wiring (threat detection) rather than a general cynical worldview."}, {"text": "Applying the razor requires a level of factual investigation that is usually impractical in daily situations.", "isCorrect": false, "rationale": "The razor suggests *considering* simpler explanations, not necessarily conducting extensive investigations as a prerequisite."}, {"text": "Human minds are wired to detect threats, and this pattern-recognition can lead to perceiving conspiracies in what are often just organizational failures.", "isCorrect": true, "rationale": "The text states that 'our minds are wired to detect threats. The same pattern-recognition that helped our ancestors spot predators now makes us see conspiracies in what are often just organizational failures.'"}, {"text": "Societal norms encourage swift blame assignment, discouraging charitable interpretations.", "isCorrect": false, "rationale": "The text does not mention societal norms as a primary reason; it focuses on inherent cognitive biases."}]}, {"question": "How does Hanlon's Razor specifically aim to correct for the Fundamental Attribution Error (FAE)?", "options": [{"text": "It suggests that the FAE is an entirely distinct psychological phenomenon unrelated to attributing behavior.", "isCorrect": false, "rationale": "The text explicitly states Hanlon's Razor is 'closely related' to the FAE, not distinct from it."}, {"text": "It encourages individuals to always attribute their own failures to external circumstances rather than personal character.", "isCorrect": false, "rationale": "While FAE describes this tendency for self-attribution, Hanlon's Razor applies this charitable interpretation to *others*, correcting the asymmetry."}, {"text": "It corrects the FAE by reminding us to extend to others the same charitable interpretation we naturally give ourselves for our own actions.", "isCorrect": true, "rationale": "The text states, 'Hanlon's Razor corrects for this asymmetry by reminding us to extend to others the same charitable interpretation we naturally give ourselves.'"}, {"text": "It primarily focuses on eliminating the FAE in professional settings, while ignoring personal relationships.", "isCorrect": false, "rationale": "The razor is presented as a general 'rule of thumb for navigating daily life' and its utility extends beyond just professional settings."}]}, {"question": "From a pragmatic perspective, what is the primary benefit of assuming incompetence over malice when someone's actions cause harm or frustration?", "options": [{"text": "It guarantees that the problem will be resolved immediately without any further effort.", "isCorrect": false, "rationale": "Assuming incompetence makes resolution *more likely* and productive, but does not guarantee instant, effortless resolution."}, {"text": "It typically leads to more constructive responses, such as explaining the problem or designing a better system, which solves problems rather than escalating conflicts.", "isCorrect": true, "rationale": "The text explains: 'If you assume incompetence, your response is more likely to be constructive... The first approach creates enemies; the second solves problems.'"}, {"text": "It absolves the other party of all responsibility for their actions, fostering an environment of forgiveness.", "isCorrect": false, "rationale": "Assuming incompetence does not absolve responsibility entirely; it reframes the approach to correction and improvement rather than punishment."}, {"text": "It inevitably uncovers a hidden malicious intent, proving the initial suspicion was correct.", "isCorrect": false, "rationale": "The razor suggests the opposite: that incompetence is often the correct, simpler explanation, not that malice will ultimately be found."}]}, {"question": "Consider a situation where a colleague consistently fails to forward important emails that are relevant to your projects. Applying Hanlon's Razor, what would be your initial and most constructive hypothesis?", "options": [{"text": "The colleague is intentionally sabotaging your work to make you look bad.", "isCorrect": false, "rationale": "This assumes malice, which Hanlon's Razor advises against as a first assumption, especially when simpler explanations exist."}, {"text": "The colleague might be overwhelmed, disorganized, or simply not paying sufficient attention to email distribution.", "isCorrect": true, "rationale": "This aligns with the razor's advice to consider 'incompetence, ignorance, and inattention' as more common and simpler explanations before malice, leading to a constructive conversation."}, {"text": "The colleague is secretly conspiring with management to exclude you from important communications.", "isCorrect": false, "rationale": "This is a malicious conspiracy theory, which the razor guides us away from by suggesting simpler explanations first."}, {"text": "You should immediately confront the colleague with accusations of professional misconduct.", "isCorrect": false, "rationale": "This aggressive response is typical of assuming malice, which tends to escalate conflicts rather than solve problems constructively."}]}, {"question": "You encounter a new government regulation that is remarkably confusing and difficult to interpret. Following Hanlon's Razor, what is the most productive perspective to adopt when approaching this situation?", "options": [{"text": "Assume the confusion is deliberate, intended to obscure specific details or create loopholes for favored groups.", "isCorrect": false, "rationale": "This aligns with assuming malice ('deliberate confusion') which the razor cautions against as an initial hypothesis."}, {"text": "Believe the regulation is likely a result of bureaucratic inertia, jurisdictional confusion, or the sheer difficulty of coordinating large organizations.", "isCorrect": true, "rationale": "The text lists these exact reasons ('bureaucratic inertia, jurisdictional confusion, conflicting mandates, and the sheer difficulty of coordinating large organizations') as better explanations for confusing policies than conspiracy."}, {"text": "Conclude that all government agencies are inherently incompetent and incapable of producing clear directives.", "isCorrect": false, "rationale": "While it considers incompetence, this is an overgeneralization and still presents a negative, unconstructive judgment rather than a specific, actionable hypothesis."}, {"text": "Immediately dismiss the regulation as invalid due to its lack of clarity.", "isCorrect": false, "rationale": "This avoids addressing the problem, and doesn't engage with the razor's advice on understanding the underlying cause, whether malicious or incompetent."}]}, {"question": "The text includes a 'caution' about Hanlon's Razor. What is the fundamental message conveyed in this caution?", "options": [{"text": "Malice is a figment of imagination; therefore, the razor should be applied universally without any exceptions.", "isCorrect": false, "rationale": "The caution explicitly states: 'Sometimes malice is the correct explanation. Fraud, manipulation, and deliberate cruelty are real.' This option contradicts that."}, {"text": "The razor is primarily suitable for minor inconveniences and should not be used in situations involving serious harm or wrongdoing.", "isCorrect": false, "rationale": "The text presents the razor as a 'useful rule of thumb for navigating daily life,' not strictly for minor issues, and implies its use can inform approaches to more significant issues (e.g., politics, workplace conflict)."}, {"text": "Hanlon's Razor should be treated as a default hypothesis to consider, but not as a rigid dogma that precludes the possibility of actual malice when evidence supports it.", "isCorrect": true, "rationale": "The text states: 'The razor does not say malice never exists—it says not to start there. Use it as a default hypothesis, not as a dogma. If the evidence points to intentional wrongdoing after you have considered more innocent explanations, trust the evidence.'"}, {"text": "Relying on Hanlon's Razor too frequently can make an individual appear naive and susceptible to exploitation.", "isCorrect": false, "rationale": "The caution focuses on the *truth* of malice sometimes existing and the correct application of the razor, not on the social perception of the user."}]}, {"question": "According to the text, if you consistently default to assuming malice in others' actions, what is the most probable long-term outcome for your interactions?", "options": [{"text": "You will develop a keen ability to accurately identify all malicious actors and effectively protect yourself from harm.", "isCorrect": false, "rationale": "While vigilance can be useful, constantly assuming malice often leads to misinterpretation and negative outcomes, not guaranteed accuracy or protection."}, {"text": "You will foster a cooperative and trusting environment by clearly delineating boundaries and expectations.", "isCorrect": false, "rationale": "Assuming malice 'creates enemies' and 'escalates conflicts,' the opposite of fostering cooperation and trust."}, {"text": "Your responses are likely to become aggressive, defensive, or retaliatory, which tends to escalate conflicts and create enemies.", "isCorrect": true, "rationale": "The text explicitly states: 'If you assume malice, your response is likely to be aggressive, defensive, or retaliatory—which tends to escalate conflicts. ... The first approach creates enemies; the second solves problems.'"}, {"text": "You will always arrive at the simplest and most accurate explanation for complex interpersonal issues.", "isCorrect": false, "rationale": "Assuming malice often leads to complex conspiracy theories, whereas the razor promotes simpler explanations (incompetence)."}]}, {"question": "Based on the provided text, which of the following statements does Hanlon's Razor *not* assert or imply?", "options": [{"text": "Human limitation (incompetence, ignorance) is a more frequent cause of bad outcomes than human wickedness.", "isCorrect": false, "rationale": "The 'keyconcept' box explicitly states: 'Bad outcomes more often result from human limitation than from human wickedness.'"}, {"text": "The razor should be used as a default hypothesis to consider, rather than an unbreakable rule.", "isCorrect": false, "rationale": "The 'caution' section explicitly states: 'Use it as a default hypothesis, not as a dogma.'"}, {"text": "It is always morally wrong to assume malice, regardless of any evidence presented.", "isCorrect": true, "rationale": "The text cautions *against* assuming malice *to start*, but explicitly allows for trusting evidence of malice: 'If the evidence points to intentional wrongdoing after you have considered more innocent explanations, trust the evidence.' It does not claim it's always morally wrong, merely that it should not be the default assumption."}, {"text": "It encourages applying a charitable interpretation to others' behaviors, similar to how one might interpret their own.", "isCorrect": false, "rationale": "The text relates it to the Fundamental Attribution Error, stating it corrects 'this asymmetry by reminding us to extend to others the same charitable interpretation we naturally give ourselves.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
