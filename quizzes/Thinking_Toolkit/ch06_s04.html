<script>
var QUESTIONS = [{"question": "The term 'Curse of Knowledge' was coined by economists Colin Camerer, George Loewenstein, and Martin Weber. What core phenomenon does it describe?", "options": [{"text": "The tendency for individuals to overestimate their own competence in a skill they barely possess.", "isCorrect": false, "rationale": "This describes the Dunning-Kruger effect, which the text explicitly contrasts with the Curse of Knowledge."}, {"text": "The difficulty experts have in understanding complex subjects once they have forgotten the foundational principles.", "isCorrect": false, "rationale": "The Curse of Knowledge is about an expert's inability to imagine *not* knowing something, not forgetting foundational principles."}, {"text": "The inability of an expert to imagine what it's like not to possess their knowledge, leading them to overestimate novices' understanding.", "isCorrect": true, "rationale": "This accurately defines the Curse of Knowledge, emphasizing the expert's inability to revert to a state of ignorance and their subsequent misjudgment of others."}, {"text": "The psychological bias where individuals believe they knew an outcome all along after it has occurred.", "isCorrect": false, "rationale": "This describes Hindsight Bias, which is mentioned as a related concept but is not the core definition of the Curse of Knowledge."}], "id": "q01"}, {"question": "In Elizabeth Newton's 1990 'tapping experiment,' what was the striking discrepancy observed between the tappers' expectations and the listeners' actual success rate?", "options": [{"text": "Tappers estimated listeners would identify the song 2.5% of the time, and listeners actually succeeded 50% of the time.", "isCorrect": false, "rationale": "This option reverses the actual percentages and expectations mentioned in the text."}, {"text": "Tappers estimated listeners would identify the song 50% of the time, and listeners actually succeeded 50% of the time.", "isCorrect": false, "rationale": "This option indicates a correct estimation, which contradicts the core finding of the experiment demonstrating the Curse of Knowledge."}, {"text": "Tappers estimated listeners would identify the song 50% of the time, but listeners only succeeded 2.5% of the time.", "isCorrect": true, "rationale": "The text clearly states tappers estimated a 50% success rate, while the actual success rate was a mere 2.5%, highlighting the tappers' inability to understand the listener's perspective."}, {"text": "Tappers made no specific estimation; the listeners' surprising 2.5% success rate was discovered post-experiment.", "isCorrect": false, "rationale": "The text explicitly states that tappers *did* estimate the odds of success, making this option incorrect."}], "id": "q02"}, {"question": "The text states, 'Her knowledge has become a prison: she cannot return to the state of ignorance that would let her understand what the listener experiences.' This metaphor primarily illustrates which aspect of the Curse of Knowledge?", "options": [{"text": "The emotional toll that deep expertise can take on individuals.", "isCorrect": false, "rationale": "The text focuses on the cognitive difficulty in empathizing with a novice, not an emotional toll."}, {"text": "The neurological phenomenon where experts 'truly, neurologically forget' what it was like not to know a concept.", "isCorrect": true, "rationale": "This accurately reflects the text's explanation that experts neurologically lose the ability to perceive information as a novice would, making their knowledge a 'prison' from which they cannot escape."}, {"text": "The deliberate isolation experts create by using specialized jargon to exclude outsiders.", "isCorrect": false, "rationale": "The text explicitly states that experts are 'not being deliberately obscure' but rather have lost the ability to see from a newcomer's perspective."}, {"text": "The difficulty in learning new information once one has mastered a particular field.", "isCorrect": false, "rationale": "The 'prison' refers to the inability to *un-know* existing knowledge to understand others, not difficulty in acquiring *new* knowledge."}], "id": "q03"}, {"question": "According to the text, how does the Curse of Knowledge serve as a 'mirror image' to the Dunning-Kruger effect?", "options": [{"text": "The Curse of Knowledge applies to novices overestimating experts, while Dunning-Kruger applies to experts underestimating novices.", "isCorrect": false, "rationale": "This option misrepresents both effects. Dunning-Kruger is about self-overestimation by the unskilled."}, {"text": "Dunning-Kruger describes how the unskilled overestimate their own abilities, while the Curse of Knowledge describes how the skilled misjudge the understanding of others.", "isCorrect": true, "rationale": "The text clearly states this distinction: Dunning-Kruger is about novices misjudging themselves, while the Curse of Knowledge is about experts misjudging others."}, {"text": "Both effects illustrate how experts become arrogant and believe they are superior to others.", "isCorrect": false, "rationale": "The text clarifies that the tapper 'is not being arrogant' and that the curse 'does not feel like a bias,' but rather transforms an empathy problem."}, {"text": "The Curse of Knowledge is about individual self-assessment, whereas Dunning-Kruger is about group dynamics.", "isCorrect": false, "rationale": "Both effects are individual cognitive biases, though the Curse of Knowledge has implications for group communication."}], "id": "q04"}, {"question": "A medical doctor explains a complex diagnosis using highly technical terminology that her patient, an average layperson, cannot understand. Based on the text, what is the most likely underlying cause of this communication breakdown?", "options": [{"text": "The doctor is intentionally trying to confuse the patient to avoid difficult questions.", "isCorrect": false, "rationale": "The text indicates that experts experiencing the curse are 'not being deliberately obscure' and genuinely believe their message is clear."}, {"text": "The patient is not paying sufficient attention or lacks the necessary intelligence to grasp the explanation.", "isCorrect": false, "rationale": "The Curse of Knowledge transforms an empathy problem into what *looks like* an intelligence problem in the other person, but the text attributes the problem to the expert's perspective."}, {"text": "The doctor's deep knowledge prevents her from understanding what it's like not to know the medical terminology, making her unable to simplify effectively.", "isCorrect": true, "rationale": "This aligns with the Curse of Knowledge, where the expert 'has simply lost the ability to see her own language through a newcomer's eyes' and forgets what it felt like not to know."}, {"text": "The patient's anxiety about their diagnosis makes them unable to process information clearly.", "isCorrect": false, "rationale": "While anxiety can affect comprehension, the text specifically attributes such communication breakdowns to the expert's Curse of Knowledge, not primarily the patient's state."}], "id": "q05"}, {"question": "The text criticizes many textbooks for being 'impenetrable to beginners.' This is attributed to the Curse of Knowledge because:", "options": [{"text": "Professors intentionally write complex books to challenge students and weed out less dedicated learners.", "isCorrect": false, "rationale": "The text states experts are 'not being deliberately obscure'; their actions are rooted in a cognitive bias, not malicious intent."}, {"text": "The professor's deep understanding makes every concept and step feel obvious, leading them to omit necessary explanations and assume background knowledge.", "isCorrect": true, "rationale": "This directly matches the text's explanation: 'Every concept feels clear, every step in the argument feels obvious. She writes accordingly — and produces a book that is comprehensible only to people who already understand the subject.'"}, {"text": "Textbooks are inherently limited in their ability to convey complex information to a broad audience.", "isCorrect": false, "rationale": "The issue is with *how* textbooks are written due to the author's knowledge state, not an inherent limitation of the medium itself."}, {"text": "Publishers encourage the use of jargon to make textbooks appear more authoritative.", "isCorrect": false, "rationale": "The text places the blame on the professor's cognitive state due to the curse, not on publisher directives."}], "id": "q06"}, {"question": "Which of the following scenarios best exemplifies the application of an antidote to the Curse of Knowledge, as suggested in the text?", "options": [{"text": "A CEO holds an internal meeting with senior executives to review a new company policy for clarity.", "isCorrect": false, "rationale": "Senior executives are likely to share a similar level of 'cursed' knowledge, making it difficult for them to identify points of confusion for novices."}, {"text": "A software company focuses intensely on user experience (UX) research by testing their product with brand-new users.", "isCorrect": true, "rationale": "The text specifically highlights UX research as an antidote, allowing engineers to see the product through a beginner's eyes by testing with actual novices and observing where they get confused."}, {"text": "A professor creates a comprehensive glossary of terms at the beginning of their textbook.", "isCorrect": false, "rationale": "While helpful, a glossary alone doesn't address the underlying issue of the expert's inability to identify which steps or concepts need further explanation from a novice's perspective."}, {"text": "A doctor uses a complex medical analogy to explain a condition, assuming it will simplify the concept for the patient.", "isCorrect": false, "rationale": "Using a complex analogy without first testing its comprehensibility on a novice may itself be a manifestation of the Curse of Knowledge, where the doctor assumes the analogy is clear."}], "id": "q07"}, {"question": "The text suggests that 'the best teachers are often not the top experts in a field, but people who remember vividly what it was like to struggle with the material.' This is primarily because:", "options": [{"text": "Top experts are often too busy with research to dedicate time to teaching.", "isCorrect": false, "rationale": "While this might be true in some cases, the text's explanation is rooted in the cognitive impact of the Curse of Knowledge, not time management."}, {"text": "Individuals who struggled remember the specific confusions and wrong turns, making them better equipped to guide novices through those challenges.", "isCorrect": true, "rationale": "This directly aligns with the text's rationale: 'because the student can still recall the specific confusions and wrong turns' they experienced as novices."}, {"text": "Students are more likely to respect and relate to a tutor who is closer to their own academic level.", "isCorrect": false, "rationale": "While relatability might play a role, the text specifically attributes the better tutoring to the ability to remember the novice's struggle, which is a direct consequence of avoiding the Curse of Knowledge."}, {"text": "Top experts tend to be overly critical of students who make mistakes.", "isCorrect": false, "rationale": "The text does not imply that experts are overly critical; rather, they simply cannot perceive the difficulty from a novice's perspective."}], "id": "q08"}, {"question": "Why is the Curse of Knowledge described as 'particularly insidious'?", "options": [{"text": "It only affects a small, highly specialized group of individuals, making it hard to identify.", "isCorrect": false, "rationale": "The text provides numerous examples across various professions, indicating it is not a rare phenomenon but rather widespread."}, {"text": "It causes experts to deliberately withhold information from novices, creating an unfair advantage.", "isCorrect": false, "rationale": "The text explicitly states experts are 'not being deliberately obscure.' The insidious nature comes from the misinterpretation of the problem, not malicious intent."}, {"text": "It makes the expert feel as though the listener is not paying attention or is unintelligent, transforming an empathy problem into a perceived intelligence problem in others.", "isCorrect": true, "rationale": "This accurately reflects the text: 'The curse of knowledge transforms an empathy problem into what looks like an intelligence problem in the other person,' making it difficult for the expert to recognize their own bias."}, {"text": "It can lead to oversimplification of complex ideas, leaving novices with an incomplete understanding.", "isCorrect": false, "rationale": "The curse generally leads to *under*-simplification and skipping steps, assuming clarity, rather than oversimplification."}], "id": "q09"}, {"question": "Considering the various examples provided in the text (textbooks, corporate communication, product design, medical explanations), what is the overarching consequence of the Curse of Knowledge?", "options": [{"text": "It encourages experts to focus solely on theoretical knowledge, neglecting practical applications.", "isCorrect": false, "rationale": "The text focuses on communication and understanding gaps, not a neglect of practical application."}, {"text": "It universally increases the efficiency of communication among highly skilled professionals.", "isCorrect": false, "rationale": "While communication *among* experts might be efficient, the curse describes how it *hinders* communication with novices."}, {"text": "It systematically impedes effective communication and teaching by making experts unable to accurately gauge a novice's comprehension level.", "isCorrect": true, "rationale": "This statement synthesizes the various examples provided, highlighting how the Curse of Knowledge acts as a major 'obstacle to communication' and makes experts 'a poor judge of how difficult the concept is for someone learning it for the first time.'"}, {"text": "It leads to a reduction in creativity and innovation within expert communities.", "isCorrect": false, "rationale": "The text does not discuss the impact of the curse on creativity or innovation, but rather on communication and instruction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
