<script>
var QUESTIONS = [{"question": "What is the core conflict highlighted by the St. Petersburg Paradox?", "options": [{"text": "The game is too complex to be understood by the average person.", "isCorrect": false, "rationale": "While the expected value calculation can be counter-intuitive, the game's rules themselves are simple, and the paradox is about a fundamental conflict in decision theory, not complexity."}, {"text": "The mathematically infinite expected monetary value of the game contrasts with people's finite, modest willingness to pay to play it.", "isCorrect": true, "rationale": "The paradox arises precisely because standard expected value theory suggests one should pay any finite amount for an infinite expected return, yet rational individuals would only pay a small sum."}, {"text": "The probabilities of winning large amounts are so low that the game is effectively worthless.", "isCorrect": false, "rationale": "While probabilities of very large wins are low, each potential outcome contributes positively to the expected value, leading to an infinite sum. The paradox is about why people *don't* value that infinite sum highly."}, {"text": "It is impossible to conduct a fair coin flip repeatedly an infinite number of times in practice.", "isCorrect": false, "rationale": "The paradox is a theoretical construct about decision-making under uncertainty, not about the practical limitations of infinite physical events."}], "id": "q01"}, {"question": "In the St. Petersburg game, if the first tails appears on flip $n$, the payoff is $2^n$ dollars, and the probability of this event is $1/2^n$. What is the contribution of each possible outcome (e.g., tails on flip 1, tails on flip 2, etc.) to the game's total expected value?", "options": [{"text": "It decreases as the number of flips ($n$) increases, eventually approaching zero.", "isCorrect": false, "rationale": "While the probability $1/2^n$ decreases and the payoff $2^n$ increases, their product ($1/2^n \\times 2^n$) remains constant."}, {"text": "It is always $1, regardless of the flip number ($n$).", "isCorrect": true, "rationale": "The contribution of each term to the expected value is (probability × payoff) = $(1/2^n) \\times 2^n = 1$. Since there are infinitely many such terms, the total expected value is $1+1+1... = \\infty$."}, {"text": "It is always $2, regardless of the flip number ($n$).", "isCorrect": false, "rationale": "The product of the probability and payoff for each term is $1, not $2."}, {"text": "It increases as the number of flips ($n$) increases, contributing increasingly to the total.", "isCorrect": false, "rationale": "The contribution of each term is constant at $1, it does not increase or decrease."}], "id": "q02"}, {"question": "Daniel Bernoulli resolved the St. Petersburg Paradox by proposing the concept of 'expected utility'. What is the core idea behind this resolution?", "options": [{"text": "People are generally irrational when faced with gambles involving large sums of money.", "isCorrect": false, "rationale": "Bernoulli's resolution provides a framework for understanding seemingly 'irrational' behavior as actually rational when considering subjective utility, rather than simply labeling it irrational."}, {"text": "What matters to a decision-maker is the subjective satisfaction (utility) derived from money, not its objective monetary value, and utility increases at a decreasing rate with wealth.", "isCorrect": true, "rationale": "Bernoulli's insight was that people don't value dollars linearly; the same amount of money means more to a poorer person than to a richer person, a concept known as diminishing marginal utility."}, {"text": "The St. Petersburg game can never actually be played an infinite number of times, so its expected value is irrelevant.", "isCorrect": false, "rationale": "Bernoulli's resolution addresses the *theoretical* conflict between infinite expected value and finite willingness to pay, rather than dismissing the theoretical model itself."}, {"text": "The expected value calculation for the St. Petersburg game contains a mathematical error.", "isCorrect": false, "rationale": "The calculation of the infinite expected value is mathematically sound; the paradox lies in the discrepancy between this mathematical result and human intuition/behavior."}], "id": "q03"}, {"question": "Which of the following best exemplifies the principle of 'diminishing marginal utility of wealth' as described in the text?", "options": [{"text": "Someone who saves all their money instead of spending it on luxuries.", "isCorrect": false, "rationale": "This describes financial prudence or different spending preferences, not necessarily diminishing marginal utility."}, {"text": "The difference in satisfaction between having $0 and $1,000 is far greater than the difference between having $1,000,000 and $1,001,000.", "isCorrect": true, "rationale": "This directly illustrates diminishing marginal utility: the first $1,000 provides a significant boost in satisfaction (utility), while an additional $1,000 when one is already wealthy provides much less additional satisfaction."}, {"text": "A person preferring a guaranteed $50 over a 50% chance of $100.", "isCorrect": false, "rationale": "This is an example of risk aversion, which is *explained* by diminishing marginal utility, but not a direct definition of the concept itself."}, {"text": "Someone paying more for insurance than the expected loss from a potential catastrophe.", "isCorrect": false, "rationale": "This is an application of expected utility theory and diminishing marginal utility, explaining why insurance is rational, but not a definition of diminishing marginal utility itself."}], "id": "q04"}, {"question": "According to the text, why is paying for insurance considered rational under expected utility theory, even when the premium exceeds the expected monetary loss?", "options": [{"text": "People are generally bad at calculating probabilities and overestimate their risk.", "isCorrect": false, "rationale": "While miscalculation can occur, the text states that paying for insurance is 'rational under expected utility theory,' implying a deeper explanation than mere error."}, {"text": "The utility cost of suffering a catastrophic financial loss far outweighs the utility cost of paying the insurance premium.", "isCorrect": true, "rationale": "Due to diminishing marginal utility, losing a large sum of money when you have little is devastating (high utility cost), whereas paying a smaller premium is a much smaller utility sacrifice."}, {"text": "Insurance companies offer additional services that add value beyond monetary compensation.", "isCorrect": false, "rationale": "The text focuses on the utility of money and risk, not additional services."}, {"text": "Insurance provides a positive expected monetary value in the long run.", "isCorrect": false, "rationale": "The text explicitly states that people 'pay more than the expected loss to insure,' implying a negative expected monetary value for the insured, but a rational decision nonetheless."}], "id": "q05"}, {"question": "The text states that 'Most people prefer a certain $50 to a 50% chance of $100, even though the expected values are identical.' How does Bernoulli's resolution explain this common preference?", "options": [{"text": "People inherently distrust gambles and prefer guaranteed outcomes.", "isCorrect": false, "rationale": "While true that people may distrust gambles, Bernoulli's theory provides a more fundamental explanation related to how utility is valued."}, {"text": "The expected utility of the certain $50 is higher than the expected utility of the gamble, due to diminishing marginal utility.", "isCorrect": true, "rationale": "Due to diminishing marginal utility, the utility gained from the first $50 is proportionally greater than the additional utility gained from the second $50 (going from $50 to $100). Thus, the utility of a certain $50 is greater than 0.5 * utility($100)."}, {"text": "The expected monetary value of the certain $50 is higher.", "isCorrect": false, "rationale": "The text explicitly states that 'the expected values are identical' (both $50)."}, {"text": "People underestimate the probability of winning the $100.", "isCorrect": false, "rationale": "The explanation focuses on the utility of the money, not an miscalculation of probabilities, which are clearly stated as 50%."}], "id": "q06"}, {"question": "What profound insight did the St. Petersburg Paradox and Bernoulli's resolution contribute to economics and decision theory?", "options": [{"text": "It proved that all financial markets are inherently irrational.", "isCorrect": false, "rationale": "It showed that decisions that *appear* irrational under expected value theory are rational under expected utility theory, providing a deeper understanding of rationality."}, {"text": "It established that objective monetary value is the only reliable guide for rational decision-making.", "isCorrect": false, "rationale": "This is the opposite of the paradox's conclusion; it demonstrated that objective monetary value (expected value) is *not* a sufficient guide."}, {"text": "It identified a fundamental distinction between the objective magnitude of an outcome and its subjective value (utility) to the person experiencing it.", "isCorrect": true, "rationale": "This is the central takeaway: the difference between 'dollars' and 'what dollars do for us', and how this relationship is non-linear."}, {"text": "It demonstrated that games with infinite expected values are purely theoretical and have no real-world application.", "isCorrect": false, "rationale": "The text links the paradox to real-world phenomena like insurance, risk aversion, and tail risk, showing its practical relevance."}], "id": "q07"}, {"question": "The text mentions that financial markets sometimes produce 'St. Petersburg-like payoff structures' and specifically cites the 2008 financial crisis. What lesson from the paradox is illustrated by such events?", "options": [{"text": "That financial institutions should always avoid any investment with a high probability of a small loss.", "isCorrect": false, "rationale": "The focus is on rare, enormous consequences, not frequent small losses."}, {"text": "That focusing solely on expected monetary value and ignoring the non-linear relationship between dollars and disaster in rare, high-impact events can lead to catastrophic outcomes.", "isCorrect": true, "rationale": "The paradox highlights the danger of 'tail risk' – rare events with huge consequences – where the diminishing marginal utility of money means the utility cost of a disaster is disproportionately high compared to its monetary expectation."}, {"text": "That financial models should incorporate infinite series to accurately predict market behavior.", "isCorrect": false, "rationale": "The lesson is about *utility* and *risk* assessment, not about directly applying infinite series models to market prediction."}, {"text": "That all financial crises are caused by a single, identifiable game with an infinite expected value.", "isCorrect": false, "rationale": "It's about *structures* that are analogous, not a direct cause, and the principle of ignoring utility."}], "id": "q08"}, {"question": "How does the St. Petersburg Paradox's resolution help explain why people buy lottery tickets, even though they typically have a negative expected monetary value?", "options": [{"text": "People are often unaware that lottery tickets have a negative expected value.", "isCorrect": false, "rationale": "While some may be unaware, the paradox provides a deeper psychological explanation that applies even when the negative expected value is known."}, {"text": "The small chance of a life-changing jackpot, combined with the utility derived from dreaming or the thrill of playing, can provide subjective value that outweighs the negative expected monetary value.", "isCorrect": true, "rationale": "This aligns with expected utility theory, where the immense utility of a jackpot (especially for someone with low wealth) and the non-monetary utility of entertainment can make a purchase rational from a utility perspective."}, {"text": "Lottery tickets are a form of investment that guarantees a return over a long period.", "isCorrect": false, "rationale": "Lottery tickets are not guaranteed investments; they have negative expected value."}, {"text": "The government subsidizes lottery tickets to encourage participation.", "isCorrect": false, "rationale": "Lotteries generate revenue for the government, they are not subsidized to be attractive in terms of expected monetary return."}], "id": "q09"}, {"question": "Which of the following statements summarizes the 'key concept' presented in the text regarding the St. Petersburg Paradox?", "options": [{"text": "The St. Petersburg Paradox proves that expected value is never a useful metric in decision-making.", "isCorrect": false, "rationale": "Expected value is useful but not *sufficient* on its own for rational decision-making, as the paradox demonstrates its limitations."}, {"text": "The paradox shows that a game can have infinite expected monetary value but only be worth a modest amount to a real person, due to diminishing marginal utility and the importance of expected utility over expected value.", "isCorrect": true, "rationale": "This directly captures the essence of the key concept box: the conflict between infinite EV and finite WTP, and its resolution via expected utility and diminishing marginal utility."}, {"text": "The St. Petersburg Paradox is a historical curiosity with no relevance to modern economics or finance.", "isCorrect": false, "rationale": "The text explicitly discusses why it 'Still Matters' and its echoes in modern economics, finance, and risk theory."}, {"text": "Rational decision-making always requires ignoring intuition and relying solely on objective mathematical calculations.", "isCorrect": false, "rationale": "The paradox shows that intuition, when guided by subjective utility, can be more rational than 'objective' expected value alone."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
