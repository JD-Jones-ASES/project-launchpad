<script>
var QUESTIONS = [{"question": "What is the fundamental difference between the individual Streetlight Effect and its institutional counterpart, as presented in the text?", "options": [{"text": "The individual effect is a deliberate choice to ignore difficult measures, while the institutional effect is an unconscious bias.", "isCorrect": false, "rationale": "The text states the substitution is 'not out of dishonesty, but out of convenience,' implying a systemic issue rather than just a deliberate choice or unconscious bias at the institutional level, and both can be biases. The key difference lies in scale and impact."}, {"text": "The individual effect is a personal cognitive bias, whereas the institutional effect is a systematic organizational tendency with significant power to reshape fields.", "isCorrect": true, "rationale": "The text clearly states the individual version is a 'personal thinking error' or 'cognitive bias,' while the institutional version is a 'systematic tendency of institutions' that 'have budgets, mandates, and the power to reshape entire fields.'"}, {"text": "The individual effect focuses on maximizing personal gain, while the institutional effect prioritizes organizational ethics.", "isCorrect": false, "rationale": "The text does not frame the Streetlight Effect in terms of personal gain versus organizational ethics. It focuses on the convenience of measurement overriding the importance of what is being measured."}, {"text": "The individual effect is easily corrected through self-awareness, but the institutional effect is impossible to change.", "isCorrect": false, "rationale": "While the text highlights the self-reinforcing nature and difficulty of challenging institutional metrics, it does not state it is 'impossible' to change, nor does it claim individual bias is 'easily corrected.'"}], "id": "q01"}, {"question": "Which of the following scenarios best illustrates the institutional Streetlight Effect?", "options": [{"text": "A student consistently studies only the topics that are clearly outlined in the textbook, ignoring broader conceptual understanding.", "isCorrect": false, "rationale": "This describes an individual's study habit, which aligns with the individual cognitive bias version of the Streetlight Effect, not the institutional one."}, {"text": "A non-profit organization measures its success by the number of awareness campaigns launched rather than the actual reduction in the problem it aims to solve.", "isCorrect": true, "rationale": "This example directly matches the description of the institutional Streetlight Effect: an organization (non-profit) measures what is easy to quantify (campaigns launched) instead of the more difficult but meaningful outcome (problem reduction)."}, {"text": "A scientist chooses to research a less impactful but personally interesting topic over a more significant but less engaging one.", "isCorrect": false, "rationale": "This scenario describes an individual's choice based on personal interest, which is not the systematic organizational bias described by the institutional Streetlight Effect."}, {"text": "A company invests in a new product line based on market research indicating high demand, but the product ultimately fails due to poor execution.", "isCorrect": false, "rationale": "This describes a business decision and execution failure, not the systematic measurement of an easy proxy instead of a meaningful outcome."}], "id": "q02"}, {"question": "According to the text, why does the institutional Streetlight Effect possess a 'self-reinforcing quality' that the individual version lacks?", "options": [{"text": "Because institutional metrics are inherently more accurate and thus gain greater acceptance over time.", "isCorrect": false, "rationale": "The text explicitly states the problem is 'not the quality of the measurement but the choice of what to measure' and that precision about the wrong thing is 'sophisticated ignorance.' Accuracy is not the reinforcing factor."}, {"text": "Because the individuals involved are too lazy to seek out better, more challenging metrics.", "isCorrect": false, "rationale": "The text states it's 'not out of dishonesty, but out of convenience' and describes it as 'structural,' implying it's not simply individual laziness."}, {"text": "Because careers, departments, and reporting structures become organized around the chosen metric, making it politically dangerous to question.", "isCorrect": true, "rationale": "The text clearly states, 'Once an institution commits to a particular metric, careers are built around it. Departments are organized to improve it. Reports are structured to highlight it. Questioning the metric becomes politically dangerous.'"}, {"text": "Because institutions are legally mandated to use specific metrics once they are adopted, preventing any deviation.", "isCorrect": false, "rationale": "The text mentions 'mandates' in a general sense of organizational responsibilities, but does not suggest legal mandates enforce specific metrics to the point of preventing internal questioning."}], "id": "q03"}, {"question": "The text describes the institutional Streetlight Effect as 'particularly insidious because it looks like rigor.' What does this phrase imply about organizations affected by this bias?", "options": [{"text": "They intentionally deceive stakeholders by presenting misleading data.", "isCorrect": false, "rationale": "The text explicitly states the substitution is 'not out of dishonesty,' implying a lack of malicious intent, though the outcomes can be detrimental."}, {"text": "They often appear to be data-driven and accountable due to precise, detailed metrics, even if those metrics don't capture what truly matters.", "isCorrect": true, "rationale": "The text explains, 'An organization that produces detailed metrics, colorful dashboards, and quarterly reports appears to be data-driven and accountable. The metrics may be precise, well-collected, and honestly reported. The problem is not the quality of the measurement but the choice of what to measure.'"}, {"text": "They are typically more efficient at data collection and analysis than organizations free of the bias.", "isCorrect": false, "rationale": "The text focuses on the *choice* of what to measure, not the efficiency of collection. It suggests that even precise collection of the wrong data is problematic."}, {"text": "They prioritize internal measurement consistency over external relevance.", "isCorrect": false, "rationale": "While internal consistency might be a byproduct of focusing on easy metrics, the core implication of 'looks like rigor' is about how they *appear* to others, masking the true underlying issue of measuring the wrong things."}], "id": "q04"}, {"question": "Consider a national education system that introduces a new standardized test to evaluate teacher performance. The test measures students' rote memorization of facts but fails to assess critical thinking or creativity. How would the institutional Streetlight Effect manifest in this scenario?", "options": [{"text": "Teachers would deliberately inflate test scores to avoid negative repercussions.", "isCorrect": false, "rationale": "While 'Goodhart's Law' (mentioned in connections) deals with measures becoming targets and leading to manipulation, the core Streetlight Effect is about the *choice* of metric due to ease of quantification, not necessarily direct dishonesty, though it can lead to it as a consequence."}, {"text": "The education system would begin to prioritize teaching critical thinking and creativity, despite the limitations of the test.", "isCorrect": false, "rationale": "The Streetlight Effect suggests the opposite: the system would likely 'rearrange the furniture' to focus on what the test measures, even if it's not the most important outcome."}, {"text": "The system would increasingly focus resources and curriculum on rote memorization, defining 'good teaching' by performance on the easily quantifiable test.", "isCorrect": true, "rationale": "This demonstrates the institutional Streetlight Effect where the easily quantifiable metric (rote memorization) becomes the de facto definition of success, shaping resource allocation and curriculum, even though more meaningful outcomes (critical thinking, creativity) are ignored."}, {"text": "Parents and students would lose trust in the education system due to the irrelevant nature of the test.", "isCorrect": false, "rationale": "While this might be a potential outcome, the Streetlight Effect describes the internal institutional behavior and its self-reinforcing nature, not primarily external stakeholder reactions."}], "id": "q05"}, {"question": "The text states that in organizations affected by the Streetlight Effect, measurable proxies are substituted for meaningful outcomes 'not out of dishonesty, but out of convenience.' What does this suggest about the underlying motivation?", "options": [{"text": "Organizations are actively trying to mislead the public about their true impact.", "isCorrect": false, "rationale": "The phrase 'not out of dishonesty' directly contradicts the idea of active deception."}, {"text": "The difficulty and cost associated with accurately measuring truly important outcomes make readily available metrics more appealing.", "isCorrect": true, "rationale": "The text highlights that 'the things that matter most... are hard to measure. The things that are easy to measure... become the de facto definition of success,' pointing to convenience driven by the practical challenges of measuring complex, meaningful outcomes."}, {"text": "Leadership intentionally chooses metrics that will make the organization look good, regardless of reality.", "isCorrect": false, "rationale": "Again, 'not out of dishonesty' suggests the primary driver isn't a deliberate attempt to manipulate perceptions, but rather the ease of measurement."}, {"text": "Employees lack the skills required to measure complex, qualitative aspects of their work.", "isCorrect": false, "rationale": "While skill gaps might contribute, the text emphasizes 'convenience' and the inherent difficulty of measuring certain things, rather than a general lack of employee skill."}], "id": "q06"}, {"question": "How does the institutional Streetlight Effect specifically impact academic research, according to the passage?", "options": [{"text": "It forces researchers to prioritize qualitative methods over quantitative ones to capture nuanced phenomena.", "isCorrect": false, "rationale": "The text states the opposite: 'entire fields drift toward studying whatever yields clean numbers,' favoring quantifiable results."}, {"text": "It encourages a balance between easy-to-measure and difficult-to-measure research questions to ensure comprehensive understanding.", "isCorrect": false, "rationale": "The passage highlights a *bias* towards easy quantification, not a balance."}, {"text": "It favors studies that produce clean, quantifiable results and statistically significant effects, potentially neglecting important but complex, ambiguous questions.", "isCorrect": true, "rationale": "The text explicitly states: 'Studies that produce clean, quantifiable results get published more easily... A researcher who can show a statistically significant effect size... will advance faster than one who produces a nuanced, qualitative account... entire fields drift toward studying whatever yields clean numbers, even if the most important questions... resist quantification.'"}, {"text": "It leads to greater funding for research into 'messy, ambiguous phenomena' because of their perceived importance.", "isCorrect": false, "rationale": "The text suggests these 'messy' phenomena are *less* likely to receive attention because they are harder to quantify and publish."}], "id": "q07"}, {"question": "In the 'Body counts in Vietnam' example, what was the primary issue with using enemy body counts as a measure of progress in the war?", "options": [{"text": "The commanders were not diligent enough in collecting accurate data, leading to incomplete reports.", "isCorrect": false, "rationale": "The text indicates pressure to produce *impressive* numbers, which suggests data *manipulation* (inflation, misclassification), not simply a lack of diligence in collection."}, {"text": "The metric, while easy to quantify, did not reflect the true determinants of winning the war, leading to a misallocation of focus and resources.", "isCorrect": true, "rationale": "The text clearly states body counts were 'easy to quantify and report,' but 'the factors that actually determined whether the war was being won — popular support, political legitimacy, logistical sustainability — resisted easy quantification and received far less institutional attention.' This perfectly encapsulates the Streetlight Effect."}, {"text": "The public opposed the use of such a gruesome metric, undermining support for the war effort.", "isCorrect": false, "rationale": "While public opinion is a factor in war, the text focuses on the internal military measurement bias and its operational consequences, not primarily public perception of the metric itself."}, {"text": "Enemy body counts were irrelevant to military strategy and had no place in operational planning.", "isCorrect": false, "rationale": "While it wasn't the *sole* determinant, information on enemy casualties can be relevant. The problem, as per the text, was its overemphasis as the *primary* measure of success, to the exclusion of other vital factors."}], "id": "q08"}, {"question": "The institutional Streetlight Effect is described as leading to 'precision about the wrong thing' which is 'a more sophisticated form of ignorance.' This suggests that:", "options": [{"text": "Organizations are often unaware that their chosen metrics are flawed, despite evidence to the contrary.", "isCorrect": false, "rationale": "The term 'sophisticated ignorance' implies a deeper, more entrenched problem than simple unawareness. It suggests a system that appears rigorous but fundamentally misses the point."}, {"text": "The problem lies not in the accuracy or detail of the data collected, but in the fundamental choice of what aspects of reality to measure.", "isCorrect": true, "rationale": "This directly echoes the text: 'The metrics may be precise, well-collected, and honestly reported. The problem is not the quality of the measurement but the choice of what to measure. Precision about the wrong thing is not rigor. It is a more sophisticated form of ignorance.'"}, {"text": "Organizations deliberately choose less relevant metrics to simplify their reporting processes.", "isCorrect": false, "rationale": "While 'convenience' is a factor, 'sophisticated ignorance' suggests a deeper, potentially unintentional, systemic blindness rather than deliberate simplification."}, {"text": "The over-reliance on data and metrics inevitably leads to a decline in organizational knowledge.", "isCorrect": false, "rationale": "It's not that data itself leads to ignorance, but rather the *misapplication* of data by precisely measuring the *wrong things* that creates this form of ignorance, masking what truly matters."}], "id": "q09"}, {"question": "Which of the following statements best encapsulates the core message of the section 'Streetlight Revisited' regarding institutional measurement bias?", "options": [{"text": "Institutions, unlike individuals, are immune to cognitive biases when making measurement decisions.", "isCorrect": false, "rationale": "The entire section argues the opposite, extending the cognitive bias to an institutional level and describing it as even worse."}, {"text": "While challenging, organizations should prioritize measuring what is truly important, even if difficult, to avoid the pitfalls of focusing on easily quantifiable but less meaningful proxies.", "isCorrect": true, "rationale": "This summarizes the central problem identified (measuring easy over important) and implies the normative solution. The entire section is a critique of 'measuring what is easy, not what matters' and highlights the negative consequences."}, {"text": "The quality and accuracy of data collection are the most critical factors in preventing institutional measurement bias.", "isCorrect": false, "rationale": "The text emphasizes that 'the problem is not the quality of the measurement but the choice of what to measure.' Precise measurement of the wrong thing is still problematic."}, {"text": "Institutional metrics, once adopted, are inherently robust and reliably reflect success over the long term.", "isCorrect": false, "rationale": "The text argues that the self-reinforcing nature of metrics makes them difficult to question, even when they 'clearly fail to capture the reality it is supposed to represent,' indicating they are not reliably robust."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
