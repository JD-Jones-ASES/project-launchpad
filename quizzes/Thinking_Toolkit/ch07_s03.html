    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'status quo bias' as presented in the text?", "options": [{"text": "A deliberate and rational decision to maintain one's current path after thorough evaluation.", "isCorrect": false, "rationale": "The text explicitly states that status quo bias is 'not the same as a deliberate decision to maintain course' and 'goes beyond what rational analysis would justify.' It involves not weighing alternatives, or weighing them with a bias."}, {"text": "A disproportionate preference for the current state of affairs, often persisting even when rational analysis would suggest a change.", "isCorrect": true, "rationale": "The text defines status quo bias as 'a preference for the existing state of affairs that goes beyond what rational analysis would justify' and notes the 'core observation: people disproportionately prefer the current state of affairs.'"}, {"text": "The psychological phenomenon where individuals always seek out change, regardless of the potential risks.", "isCorrect": false, "rationale": "This is the opposite of status quo bias, which describes a preference for maintaining the current state, even if it involves avoiding beneficial changes."}, {"text": "The tendency to make decisions based solely on the advice of experts, ignoring personal preferences.", "isCorrect": false, "rationale": "While relying on experts might be a factor in some decisions, it is not the definition of status quo bias, which is about an intrinsic preference for the existing state."}], "id": "q01"}, {"question": "According to the text, which psychological mechanism is described as the 'most powerful' contributor to status quo bias?", "options": [{"text": "Anchoring, where initial reference points strongly influence subsequent judgments.", "isCorrect": false, "rationale": "Anchoring is mentioned in the 'connections' section as a related concept, but not as the 'most powerful' mechanism feeding into status quo bias. The text specifically attributes this to loss aversion."}, {"text": "Loss aversion, where the pain of potential losses from changing is greater than the pleasure of equivalent gains.", "isCorrect": true, "rationale": "The text states, 'The most powerful is loss aversion... because losses hurt roughly twice as much as equivalent gains feel good, any change from the status quo is psychologically framed as a potential loss.'"}, {"text": "The endowment effect, which describes how people value things they own more highly.", "isCorrect": false, "rationale": "The endowment effect is mentioned as a related concept to status quo bias, but the text identifies loss aversion as the 'most powerful' mechanism."}, {"text": "Cognitive dissonance, the mental discomfort experienced when holding conflicting beliefs.", "isCorrect": false, "rationale": "Cognitive dissonance is not mentioned in the text as a mechanism feeding into status quo bias."}], "id": "q02"}, {"question": "The 'default effect' is presented as a cognitive dimension of status quo bias. How does it primarily influence decisions?", "options": [{"text": "It compels individuals to thoroughly research and compare all alternatives before making a choice.", "isCorrect": false, "rationale": "The text explains the opposite: 'evaluating alternatives takes mental effort. The status quo requires no effort at all. You do not need to research, compare, or decide. You just do nothing.'"}, {"text": "It causes people to select the pre-selected option because it requires the least mental effort.", "isCorrect": true, "rationale": "The text defines the default effect as 'whatever option is pre-selected tends to win, not because it is best, but because it is effortless' and ties it to the cognitive dimension where evaluating alternatives takes mental effort."}, {"text": "It encourages individuals to always choose the option that promises the highest financial return.", "isCorrect": false, "rationale": "The default effect is not about choosing the 'best' option in terms of financial return, but about choosing the 'easiest' or pre-selected option, regardless of its objective merit."}, {"text": "It leads individuals to frequently change their preferences based on new information.", "isCorrect": false, "rationale": "This contradicts the core idea of status quo bias and the default effect, both of which describe a tendency to stick with existing or pre-selected options."}], "id": "q03"}, {"question": "Based on the organ donation example, what is the key factor that causes significant differences in donation rates between countries?", "options": [{"text": "Differences in cultural values and religious beliefs concerning organ donation.", "isCorrect": false, "rationale": "The text explicitly states, 'The difference is not a matter of cultural values — neighboring countries with similar cultures end up on opposite sides of this divide, depending entirely on how the form is designed.'"}, {"text": "The level of public awareness campaigns about the importance of organ donation.", "isCorrect": false, "rationale": "While awareness campaigns are important, the text highlights the design of the form (opt-in vs. opt-out) as the 'entirely' determining factor for the dramatic difference in rates."}, {"text": "Whether citizens are required to opt-in or opt-out of organ donation through the design of the choice architecture.", "isCorrect": true, "rationale": "The text shows dramatically different donation rates (4-27% for opt-in vs. 86-100% for opt-out), concluding that 'The difference... depending entirely on how the form is designed' and 'People are not choosing to donate or not donate. They are choosing to accept the default.'"}, {"text": "The average age of the population in different countries.", "isCorrect": false, "rationale": "The text does not mention population age as a factor influencing organ donation rates in this context; it focuses on the default setting."}], "id": "q04"}, {"question": "How does status quo bias manifest when someone inherits a portfolio of stocks they wouldn't have chosen themselves?", "options": [{"text": "They meticulously analyze each stock and immediately sell those that don't align with their investment strategy.", "isCorrect": false, "rationale": "The text states that if they are like 'most people in Samuelson and Zeckhauser's experiments, you do not' sell them immediately, suggesting that meticulous analysis and immediate selling are not typical behaviors influenced by status quo bias."}, {"text": "They keep the inherited portfolio largely as it is, primarily because it's already in place, despite personal preferences.", "isCorrect": true, "rationale": "The text explains, 'You keep the inherited portfolio roughly as it is — not because you have analyzed each holding and concluded it is optimal, but because it is already there. The current arrangement exerts a gravitational pull simply by being current.'"}, {"text": "They invest additional funds into the inherited stocks to demonstrate confidence in the original choices.", "isCorrect": false, "rationale": "The text describes maintaining the existing portfolio due to inertia, not actively investing more based on confidence in past choices, especially if they are stocks the individual wouldn't have chosen."}, {"text": "They seek out professional advice and always follow it, regardless of their own judgment.", "isCorrect": false, "rationale": "While seeking advice might be a rational step, the example highlights the tendency to stick with the status quo 'not because you have analyzed each holding and concluded it is optimal,' but because it's the default."}], "id": "q05"}, {"question": "Richard Thaler and Cass Sunstein's concept of 'libertarian paternalism' (from Nudge) suggests what approach to system design?", "options": [{"text": "Removing all choices from individuals to ensure they follow the optimal path.", "isCorrect": false, "rationale": "The text states 'preserving freedom of choice,' which contradicts the idea of removing all choices."}, {"text": "Presenting choices in a completely neutral way, allowing individuals to make decisions without any influence.", "isCorrect": false, "rationale": "Libertarian paternalism actively 'structur[es] the choice environment so that the easiest path is also the best path,' which is not a neutral presentation."}, {"text": "Structuring the choice environment so that the easiest path is also the most beneficial one, while still allowing for freedom of choice.", "isCorrect": true, "rationale": "The text defines libertarian paternalism as 'preserving freedom of choice while structuring the choice environment so that the easiest path is also the best path.'"}, {"text": "Educating individuals extensively so they always make rational choices, irrespective of system design.", "isCorrect": false, "rationale": "While education can be helpful, libertarian paternalism focuses on environmental design (defaults) to influence behavior, rather than solely on individual education to overcome biases."}], "id": "q06"}, {"question": "The text suggests an 'antidote' to status quo bias. What is it?", "options": [{"text": "Actively seeking out novel experiences and changes without considering their costs or benefits.", "isCorrect": false, "rationale": "The antidote is about critical evaluation, not indiscriminate change. Seeking change 'without considering their costs or benefits' is not a rational antidote."}, {"text": "Relying on others to make decisions for you to avoid personal effort.", "isCorrect": false, "rationale": "This would likely reinforce the default effect, which is a component of status quo bias, rather than countering it."}, {"text": "Periodically asking, 'If I were starting from scratch today, would I choose this?'", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states, 'The antidote is to periodically ask: 'If I were starting from scratch today, would I choose this?'' This forces a re-evaluation beyond inertia."}, {"text": "Ignoring past decisions and focusing only on future possibilities.", "isCorrect": false, "rationale": "The antidote involves evaluating current arrangements as if they were new choices, which requires acknowledging the current state and comparing it to alternatives, not ignoring past decisions entirely."}], "id": "q07"}, {"question": "How does the example of 401(k) auto-enrollment demonstrate the default effect in retirement savings?", "options": [{"text": "It proves that employees are naturally highly motivated to plan for retirement, regardless of the enrollment process.", "isCorrect": false, "rationale": "The text states, 'The employees did not suddenly become more interested in retirement planning. The default changed, and the default won,' indicating it wasn't natural motivation but the system design."}, {"text": "It shows that offering more investment options significantly boosts participation rates.", "isCorrect": false, "rationale": "The example focuses on the enrollment mechanism (auto-enroll vs. opt-in), not the number of investment options, as the driver of participation rate changes."}, {"text": "It illustrates that when employees are automatically enrolled (default), participation rates dramatically increase because it's the path of least resistance.", "isCorrect": true, "rationale": "The text states, 'When companies automatically enroll employees in 401(k) plans (with the option to opt out), participation rates jump from roughly 50% to over 90%... The default changed, and the default won.'"}, {"text": "It indicates that financial incentives are the sole reason employees decide to save for retirement.", "isCorrect": false, "rationale": "While incentives play a role, the example highlights the power of the default setting over individual motivation, not just financial incentives."}], "id": "q08"}, {"question": "What 'warning' does understanding status quo bias offer to individuals regarding their own life choices?", "options": [{"text": "That changes are always beneficial and should be pursued regardless of the effort involved.", "isCorrect": false, "rationale": "The warning isn't that *all* changes are beneficial, but that *current arrangements* might not be optimal. The antidote involves critical evaluation, not blind pursuit of change."}, {"text": "That your current life arrangements may persist due to inertia and the effort required for change, rather than being genuinely optimal.", "isCorrect": true, "rationale": "The text states, 'The warning: your current arrangements — your job, your city, your relationships, your daily routines — may be persisting not because they are optimal but because change requires activation energy you have not mustered.'"}, {"text": "That relying on defaults is always a bad strategy and should be avoided at all costs.", "isCorrect": false, "rationale": "The text also presents an 'opportunity' to 'harness the default effect for good,' indicating that defaults can be beneficial if designed correctly."}, {"text": "That it is impossible to overcome behavioral biases without external intervention.", "isCorrect": false, "rationale": "The text offers an 'antidote' (periodically asking 'If I were starting from scratch...') which is an internal strategy for overcoming the bias, implying it is not impossible."}], "id": "q09"}, {"question": "The text connects status quo bias to several other behavioral concepts. Which combination accurately represents these connections?", "options": [{"text": "Confirmation bias, availability heuristic, and the sunk cost fallacy.", "isCorrect": false, "rationale": "These concepts are not explicitly mentioned in the 'connections' section or as direct mechanisms of status quo bias within this text."}, {"text": "Loss aversion, the endowment effect, and the default effect.", "isCorrect": true, "rationale": "The text explicitly states status quo bias is 'Related to loss aversion... and the endowment effect' and later introduces the 'default effect' as a direct manifestation of its cognitive dimension."}, {"text": "Gambler's fallacy, self-serving bias, and herd mentality.", "isCorrect": false, "rationale": "These concepts are not mentioned in the text in relation to status quo bias."}, {"text": "Halo effect, planning fallacy, and fundamental attribution error.", "isCorrect": false, "rationale": "These concepts are not mentioned in the text in relation to status quo bias."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
