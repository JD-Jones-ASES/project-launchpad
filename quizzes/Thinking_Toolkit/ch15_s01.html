<script>
var QUESTIONS = [{"question": "Which of the following scenarios best represents the core structure of the Game of Chicken?", "options": [{"text": "Two individuals collaborating on a project, where both benefit if they contribute equally, but one can free-ride if the other does all the work.", "isCorrect": false, "rationale": "This scenario describes a free-rider problem or a coordination game, not the confrontational, mutual destruction risk of the Game of Chicken."}, {"text": "Two drivers approaching each other on a narrow road, where backing down is humiliating but continuing straight risks a catastrophic collision.", "isCorrect": true, "rationale": "This is the classic example used in the text to define the Game of Chicken, perfectly illustrating the dilemma of humiliation versus mutual destruction."}, {"text": "A negotiation where both parties have a clear dominant strategy that leads to a suboptimal outcome for both, regardless of the other's choice.", "isCorrect": false, "rationale": "This describes the Prisoner's Dilemma, which the text explicitly differentiates from the Game of Chicken due to the differing nature of their dominant strategies."}, {"text": "A situation where multiple parties contribute resources to a common pool, which is depleted if too many take without contributing.", "isCorrect": false, "rationale": "This describes the 'Tragedy of the Commons,' a different game theory concept, not the head-on confrontation of the Game of Chicken."}], "id": "q01"}, {"question": "According to the text, what is the primary danger associated with employing the 'strategy of commitment' in a Game of Chicken?", "options": [{"text": "It always leads to the 'chicken' outcome for the committing player.", "isCorrect": false, "rationale": "The strategy of commitment is designed to avoid being the 'chicken' by forcing the opponent to swerve, though it carries a significant risk."}, {"text": "It can be easily countered if the opponent also feigns commitment, leading to a draw.", "isCorrect": false, "rationale": "While an opponent might feign commitment, the text highlights a more severe danger than a draw if both are truly committed."}, {"text": "If both players credibly commit to not swerving, it inevitably leads to mutual destruction.", "isCorrect": true, "rationale": "The text explicitly states: 'But here is the danger: if both players throw away their steering wheels, both crash.' This is the catastrophic outcome if both sides are equally committed."}, {"text": "It makes the player appear too rational, thus losing the strategic advantage of apparent madness.", "isCorrect": false, "rationale": "The text states 'the more irrational you appear, the more powerful your position,' so appearing rational would negate the intended effect, but it's not the primary *danger* of commitment itself."}], "id": "q02"}, {"question": "In the context of the Cuban Missile Crisis, how did President Kennedy and Premier Khrushchev ultimately resolve their Game of Chicken, according to the text?", "options": [{"text": "Both leaders publicly declared their absolute commitment, forcing an international body to mediate a resolution.", "isCorrect": false, "rationale": "The text indicates a bilateral resolution, not intervention by an international body, and while they initially declared commitment, they eventually backed down."}, {"text": "Khrushchev alone 'swerved' by removing missiles without any reciprocal action from the U.S.", "isCorrect": false, "rationale": "The text states Khrushchev 'swerved' in exchange for a secret American commitment, implying a reciprocal action, not a unilateral retreat."}, {"text": "Both 'swerved' by making secret, reciprocal concessions to avoid a catastrophic crash.", "isCorrect": true, "rationale": "The text states Khrushchev 'swerved' by agreeing to remove missiles in exchange for a secret American commitment, and 'Kennedy swerved too, quietly.' This indicates both found a way to step back with mutual concessions."}, {"text": "Kennedy successfully forced Khrushchev to be the 'chicken' through a public show of military superiority.", "isCorrect": false, "rationale": "While Kennedy imposed a blockade, the resolution involved a secret reciprocal agreement, not a straightforward win/loss scenario for one side."}], "id": "q03"}, {"question": "What is the key distinction between the Game of Chicken and the Prisoner's Dilemma, as described in the 'caution' section?", "options": [{"text": "The Game of Chicken is about cooperation, while the Prisoner's Dilemma is about competition.", "isCorrect": false, "rationale": "Both games involve strategic conflict, not primarily cooperation in the Game of Chicken."}, {"text": "In the Prisoner's Dilemma, players always choose to cooperate; in Chicken, they always defect.", "isCorrect": false, "rationale": "In the Prisoner's Dilemma, the dominant strategy is to defect. In Chicken, the best response is contingent on the other player's move."}, {"text": "In Chicken, the best response depends on the opponent's move, whereas in the Prisoner's Dilemma, the dominant strategy is independent of the opponent's move.", "isCorrect": true, "rationale": "The text states: 'In the Prisoner's Dilemma, the dominant strategy is to defect regardless of what the other player does. In Chicken, the best response depends entirely on what the other player does.'"}, {"text": "The Game of Chicken involves more than two players, unlike the Prisoner's Dilemma.", "isCorrect": false, "rationale": "Both classic Chicken and Prisoner's Dilemma are typically framed as two-player games. The number of players is not the key distinction provided."}], "id": "q04"}, {"question": "Which of the following scenarios best illustrates the concept of 'brinksmanship' as a strategic asset in the Game of Chicken?", "options": [{"text": "A company offering a generous severance package to avoid a strike, ensuring a peaceful resolution.", "isCorrect": false, "rationale": "This describes a conciliatory action, which is the opposite of brinksmanship's aggressive, commit-to-no-retreat approach."}, {"text": "A political leader making a public, irreversible pledge to maintain a highly unpopular policy, despite potential negative consequences.", "isCorrect": true, "rationale": "This exemplifies brinksmanship by credibly committing to a potentially self-destructive course ('apparent madness') to force the opponent to back down."}, {"text": "Two nations signing a treaty to limit arms, reducing the risk of conflict through mutual agreement.", "isCorrect": false, "rationale": "This is an act of de-escalation and cooperation, not brinksmanship, which involves escalating the risk of conflict to gain advantage."}, {"text": "A negotiator carefully assessing an opponent's true bottom line to find a mutually beneficial compromise.", "isCorrect": false, "rationale": "This describes standard negotiation tactics focused on compromise, not the coercive strategy of brinksmanship."}], "id": "q05"}, {"question": "According to Thomas Schelling, how does making a 'credible commitment' function as a source of power in bargaining and deterrence?", "options": [{"text": "It guarantees that the opponent will always swerve, ensuring a win for the committing player.", "isCorrect": false, "rationale": "While it's the *goal* for the opponent to swerve, commitment doesn't guarantee it, especially if the opponent also commits, leading to catastrophe."}, {"text": "It simplifies the decision-making process for both parties by eliminating uncertainty.", "isCorrect": false, "rationale": "Commitment increases tension and uncertainty for the opponent, forcing them into a difficult decision, rather than simplifying it for both."}, {"text": "It forces the cost of a collision onto the other side by removing one's own options to retreat.", "isCorrect": true, "rationale": "Schelling argued that 'The player who removes their own options forces the cost of collision onto the other side,' making the opponent's only rational move to swerve."}, {"text": "It builds trust and goodwill between parties, leading to more cooperative outcomes.", "isCorrect": false, "rationale": "Commitment in Chicken is a confrontational tactic, not one designed to build trust or cooperation; it is about forcing an opponent's hand."}], "id": "q06"}, {"question": "Which of the following is NOT listed as a real-world example of the Game of Chicken dynamics in the text?", "options": [{"text": "Geopolitical nuclear deterrence.", "isCorrect": false, "rationale": "The text explicitly lists 'Geopolitics: Nuclear deterrence' as an example of Chicken dynamics."}, {"text": "Labor negotiations threatening a strike.", "isCorrect": false, "rationale": "The text explicitly lists 'Labor relations: A union threatens a strike' as an example of Chicken dynamics."}, {"text": "Competitive bidding in an auction for a unique item.", "isCorrect": true, "rationale": "While bidding involves competition, the text does not mention competitive auctions as an example of Chicken. It does mention 'The Dollar Auction' in connections, but not competitive bidding generally as a *Chicken* dynamic."}, {"text": "Two stubborn people in a personal disagreement.", "isCorrect": false, "rationale": "The text explicitly lists 'Personal relationships: Two stubborn people in a disagreement' as an example of Chicken dynamics."}], "id": "q07"}, {"question": "What does the text imply is the reason 'apparent madness' can become a strategic asset in the Game of Chicken?", "options": [{"text": "It causes the opponent to underestimate your strategic capabilities.", "isCorrect": false, "rationale": "Apparent madness is meant to signal unwavering commitment, not to be underestimated; it's a demonstration of resolve."}, {"text": "It makes your commitment to a course of action so credible that the opponent's only rational option is to back down.", "isCorrect": true, "rationale": "The text states: 'The more irrational you appear, the more powerful your position... apparent madness becomes a strategic asset' because it credibly convinces the opponent you will not swerve."}, {"text": "It creates confusion, leading the opponent to make unpredictable moves.", "isCorrect": false, "rationale": "The goal is to *predict* the opponent's move (swerving), not to induce unpredictable behavior through confusion."}, {"text": "It forces both players into a mutually beneficial compromise due to fear.", "isCorrect": false, "rationale": "Apparent madness aims to force the opponent to back down, not necessarily to achieve a mutually beneficial compromise (which might be the outcome if both swerve, but not the direct aim of this specific tactic)."}], "id": "q08"}, {"question": "The Game of Chicken was formalized in game theory during which decade?", "options": [{"text": "1940s", "isCorrect": false, "rationale": "The text specifies the 1950s for its formalization."}, {"text": "1950s", "isCorrect": true, "rationale": "The text explicitly states: 'Formalized in game theory during the 1950s'."}, {"text": "1960s", "isCorrect": false, "rationale": "While significant developments and applications (like Schelling's work and the Cuban Missile Crisis) occurred in the 1960s, the formalization was in the 1950s."}, {"text": "1970s", "isCorrect": false, "rationale": "The text places its formalization earlier than the 1970s."}], "id": "q09"}, {"question": "Consider a situation where two countries are engaged in a trade war, each imposing tariffs that harm both economies. Each country's leader publicly declares they will not be the first to lift tariffs, even if it causes significant domestic hardship. This scenario most directly exemplifies which aspect of the Game of Chicken?", "options": [{"text": "The initial embarrassment of a draw.", "isCorrect": false, "rationale": "This scenario describes a deepening confrontation through commitment, not the resolution of a draw, which typically involves both backing down."}, {"text": "The difficulty of finding a secret concession.", "isCorrect": false, "rationale": "While a secret concession might resolve it, the scenario described is about the public declaration of commitment, not the difficulty of a secret deal."}, {"text": "The dangerous consequence of mutual, credible commitment leading to catastrophe.", "isCorrect": true, "rationale": "Both countries are demonstrating a credible commitment to not swerving, leading to a 'collision' (economic harm) for both, exactly fitting the danger identified by the text when both throw away their steering wheels."}, {"text": "The strategic advantage of appearing rational.", "isCorrect": false, "rationale": "The text emphasizes that *apparent irrationality* (unwavering commitment despite risk) is the strategic asset, not rationality."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
