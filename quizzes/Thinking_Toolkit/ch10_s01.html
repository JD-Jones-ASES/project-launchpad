    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason Socrates engages Euthyphro in a discussion about piety outside the Athenian court?", "options": [{"text": "Socrates seeks Euthyphro's legal advice for his own upcoming trial for impiety.", "isCorrect": false, "rationale": "While Socrates is on trial for impiety, his engagement with Euthyphro is not to seek legal advice but to challenge Euthyphro's understanding of piety."}, {"text": "Socrates is genuinely impressed by Euthyphro's decision to prosecute his own father and wishes to learn from him.", "isCorrect": false, "rationale": "The text states Socrates uses 'characteristic irony,' indicating he is not genuinely impressed but rather probing Euthyphro's overconfidence in his moral judgment."}, {"text": "Socrates observes Euthyphro's supreme confidence in his understanding of piety and uses irony to prompt a deeper philosophical inquiry.", "isCorrect": true, "rationale": "Socrates' 'characteristic irony' is employed precisely because Euthyphro 'is supremely confident that this is the pious thing to do,' leading Socrates to question the basis of this certainty."}, {"text": "Socrates aims to dissuade Euthyphro from prosecuting his father, believing such an act to be inherently impious.", "isCorrect": false, "rationale": "Socrates does not explicitly challenge the act itself as impious, but rather Euthyphro's professed certainty about what constitutes piety."}]}, {"question": "In its modern interpretation, what is the central question posed by the Euthyphro Dilemma regarding the nature of morality?", "options": [{"text": "Is morality relative to cultural norms, or is it universally objective across all societies?", "isCorrect": false, "rationale": "While a significant ethical question, this phrasing does not capture the specific dilemma involving divine command and the source of goodness as presented in the text."}, {"text": "Is something good because God commands it, or does God command it because it is good?", "isCorrect": true, "rationale": "This is the exact modern phrasing of the Euthyphro Dilemma, directly quoted from the text, which explores the relationship between divine authority and the nature of goodness."}, {"text": "Is piety defined by adherence to religious rituals, or by one's personal devotion and inner conviction?", "isCorrect": false, "rationale": "This reflects the original context of Socrates' discussion with Euthyphro about 'piety' but does not represent the broader philosophical dilemma about the foundation of 'goodness' in modern terms."}, {"text": "Does humanity derive its moral compass from innate reason and conscience, or from external societal laws and traditions?", "isCorrect": false, "rationale": "This question addresses a different aspect of moral philosophy, focusing on human sources of morality rather than the dilemma's core focus on divine authority."}]}, {"question": "According to the text, what is a significant 'cost' associated with accepting the view that something is good *because* God commands it (Divine Command Theory)?", "options": [{"text": "Morality becomes too subjective and dependent on individual interpretation of divine commands.", "isCorrect": false, "rationale": "Divine Command Theory typically implies an objective, absolute morality based on divine will, not subjective individual interpretation."}, {"text": "It limits divine sovereignty by suggesting God must adhere to external, independently existing moral standards.", "isCorrect": false, "rationale": "This is a criticism of the *second* horn of the dilemma (God commands it because it is good), where morality is independent of God, not the first horn."}, {"text": "Goodness becomes arbitrary, implying God could command cruelty and it would be considered good.", "isCorrect": true, "rationale": "The text explicitly states this: 'if God commanded cruelty, cruelty would be good. Goodness becomes arbitrary — not a quality that actions possess inherently but a label applied by divine fiat.'"}, {"text": "It makes morality inaccessible or irrelevant to those who do not believe in a divine being.", "isCorrect": false, "rationale": "While a practical implication, the text focuses on the philosophical cost of arbitrariness regarding the nature of goodness itself, rather than accessibility."}]}, {"question": "If one accepts that God commands something *because* it is good, what is a primary implication concerning divine sovereignty?", "options": [{"text": "God's commands are necessarily arbitrary, lacking a stable, inherent foundation for goodness.", "isCorrect": false, "rationale": "This consequence applies to the *first* horn of the dilemma, where goodness is solely defined by divine command, not the second."}, {"text": "Morality becomes independent of God, suggesting God is a reliable reporter of good rather than its ultimate author and source.", "isCorrect": true, "rationale": "The text clearly states this as the cost: 'morality is now independent of God. Goodness exists as a standard that even God recognizes and follows. This seems to limit divine sovereignty — God is not the author of morality but a particularly reliable reporter of it.'"}, {"text": "Divine authority is significantly strengthened, as God is seen as the ultimate judge and enforcer of all moral actions.", "isCorrect": false, "rationale": "This view actually 'limits divine sovereignty' by suggesting God follows an external standard, rather than strengthening divine authority as the sole source."}, {"text": "The concept of goodness loses its objectivity and becomes purely a matter of divine will and personal revelation.", "isCorrect": false, "rationale": "This option *preserves* the intuition that goodness is a real, objective quality, as it exists independently for God to command."}]}, {"question": "The Euthyphro Dilemma fundamentally challenges individuals who wish for morality to simultaneously possess which two characteristics?", "options": [{"text": "Morality that is both personal and universally applicable across all cultures.", "isCorrect": false, "rationale": "While a broader ethical debate, this is not the specific tension the Euthyphro Dilemma addresses, which focuses on divine authority."}, {"text": "Morality that is both objective and grounded in divine will.", "isCorrect": true, "rationale": "The text states, 'Both options are uncomfortable for anyone who wants morality to be both objective and grounded in divine will,' highlighting this core conflict."}, {"text": "Morality that is derived from human reason and also compatible with scientific discovery.", "isCorrect": false, "rationale": "This points to secular ethical considerations, which are distinct from the dilemma's focus on divine authority."}, {"text": "Morality that is culturally sensitive yet provides clear, unambiguous guidelines for behavior.", "isCorrect": false, "rationale": "This relates to cultural relativism versus universalism, which is not the central conflict illuminated by the Euthyphro Dilemma."}]}, {"question": "How does the Divine Nature Theory attempt to resolve the Euthyphro Dilemma, according to the text?", "options": [{"text": "By asserting that God arbitrarily chooses what is good, thereby establishing absolute moral truths.", "isCorrect": false, "rationale": "This describes Divine Command Theory, which the Divine Nature Theory attempts to move beyond by addressing the problem of arbitrariness."}, {"text": "By suggesting that God discovers goodness from an external, pre-existing moral standard that God then upholds.", "isCorrect": false, "rationale": "This represents the second horn of the dilemma, where morality is independent of God, which the Divine Nature Theory also tries to avoid."}, {"text": "By positing that goodness flows necessarily from God's intrinsic character and being, so God's commands reflect His good nature.", "isCorrect": true, "rationale": "The text explains, 'goodness flows from God's own nature — God is good, and God's commands reflect that nature necessarily, not arbitrarily,' aiming to 'thread the needle' between the two horns."}, {"text": "By arguing that morality is purely a human construct, independent of any divine influence or command.", "isCorrect": false, "rationale": "This is a secular ethical position and does not represent a resolution within a framework that seeks to ground morality in divine authority."}]}, {"question": "The 'thinkaboutit' section raises a further question about the Divine Nature Theory. What is the essence of this lingering challenge?", "options": [{"text": "Whether God's nature is truly knowable to humans, thus making divine commands inscrutable.", "isCorrect": false, "rationale": "The challenge raised is more fundamental about the *definition* of good in relation to God's nature, not primarily about the knowability of God's nature."}, {"text": "Whether calling God's nature 'good' merely renames the problem of arbitrariness without fundamentally solving it.", "isCorrect": true, "rationale": "The text asks, 'Or does it just rename the problem — now we must ask, “Is God's nature good because of what it is, or is `good' just a label for whatever God's nature happens to be?”' This highlights the concern that the dilemma resurfaces at a different level."}, {"text": "Whether God's nature can change over time, thereby making morality unstable and unpredictable.", "isCorrect": false, "rationale": "The Divine Nature Theory generally assumes God's nature is immutable, and the 'thinkaboutit' section does not question its stability."}, {"text": "Whether God's nature provides a sufficient basis for universal moral principles applicable to all cultures and situations.", "isCorrect": false, "rationale": "This is a broader question about the universality of ethics, not the specific philosophical challenge regarding the definition of 'good' within the Divine Nature Theory itself."}]}, {"question": "Regardless of how one attempts to resolve it, what is the primary achievement of the Euthyphro Dilemma, according to the text?", "options": [{"text": "It definitively proves that divine authority cannot be the sole basis for objective morality.", "isCorrect": false, "rationale": "The dilemma presents a choice and clarifies implications, but the text does not claim it definitively proves one option over the other or negates religious ethics entirely."}, {"text": "It forces individuals to articulate with precision what they mean by 'good' and exactly what role, if any, divine authority plays in that judgment.", "isCorrect": true, "rationale": "The text states: 'What the Euthyphro Dilemma achieves, regardless of how one resolves it, is clarity: it forces you to articulate exactly what you mean when you say something is 'good' and exactly what role, if any, divine authority plays in that judgment.'"}, {"text": "It leads to the conclusion that all religious ethics are inherently flawed and arbitrary.", "isCorrect": false, "rationale": "The text explicitly states the dilemma 'does not destroy religious ethics — but it demands that religious ethics be articulated with precision,' indicating it's not about destruction but clarity."}, {"text": "It successfully reconciles the concepts of divine sovereignty and moral objectivity within a single framework.", "isCorrect": false, "rationale": "The dilemma highlights the tension between these concepts and forces a choice or a sophisticated response, rather than achieving a direct reconciliation."}]}, {"question": "Euthyphro's supreme confidence in prosecuting his father, as described by Socrates with irony, best illustrates a belief that:", "options": [{"text": "Morality is entirely subjective, and each individual defines their own version of piety.", "isCorrect": false, "rationale": "Euthyphro's 'supreme confidence' implies he believes his understanding of piety is objectively correct and universally applicable, not merely subjective."}, {"text": "He possesses an unusually clear, possibly absolute or divinely revealed, understanding of moral truth (piety).", "isCorrect": true, "rationale": "Socrates' ironic remark that Euthyphro 'must have an unusually clear understanding of what piety is' points to Euthyphro's conviction that his moral judgment is absolute and infallible, aligning with a belief in a clear, perhaps divinely given, truth."}, {"text": "Moral principles should always prioritize legal justice and public duty over familial loyalty.", "isCorrect": false, "rationale": "While he is prosecuting his father, the text focuses on his *confidence in knowing what is pious*, not a general principle about prioritizing legal duty over family."}, {"text": "Legal justice is entirely separate from and irrelevant to matters of moral piety.", "isCorrect": false, "rationale": "Euthyphro is using the legal system to pursue what he believes is pious, indicating he sees a connection, not a separation."}]}, {"question": "Which of the following scenarios best illustrates the concern that 'goodness becomes arbitrary,' a criticism leveled against the first horn of the Euthyphro Dilemma?", "options": [{"text": "A society where different religious traditions have conflicting moral codes, leading to moral relativism among groups.", "isCorrect": false, "rationale": "This scenario relates to cultural or religious relativism, which is distinct from the arbitrariness within a single divine command framework as critiqued in the first horn."}, {"text": "A divine being commanding an action, such as causing suffering, which human moral intuitions would deem evil, yet is considered good solely because it was divinely commanded.", "isCorrect": true, "rationale": "This directly reflects the text's example ('if God commanded cruelty, cruelty would be good') where goodness is not an inherent quality but a label applied by divine fiat, making it arbitrary and potentially counter-intuitive."}, {"text": "A philosopher arguing that fundamental moral principles can be discovered through pure reason and logic, independent of any religious texts.", "isCorrect": false, "rationale": "This describes a position aligned with the second horn of the dilemma (morality is independent of God) or secular ethics, not the criticism of arbitrariness in divine command theory."}, {"text": "A religious adherent faithfully following a divine law, even if they don't fully understand the divine rationale, trusting in the ultimate goodness of the commander.", "isCorrect": false, "rationale": "This describes faith and obedience, but it doesn't capture the *criticism* of arbitrariness where the command *defines* goodness, rather than being an inherently good act commanded by a good being."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
