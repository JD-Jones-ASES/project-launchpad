    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The original context of Captain Edward Murphy Jr.'s statement, which led to Murphy's Law, primarily concerned:", "options": [{"text": "The inherent incompetence of all human technicians.", "isCorrect": false, "rationale": "While a technician's error prompted the observation, Murphy's Law in its original context was about system design that *allows* for errors, not a blanket statement on human incompetence. The text states: 'The designer's job is not to hope for competent users but to make incompetent use impossible.'"}, {"text": "An engineering observation about designing systems that allow for incorrect installation.", "isCorrect": true, "rationale": "The text clearly states: 'Murphy's observation was not that the universe is hostile but that any system designed in a way that allows a component to be installed incorrectly will eventually have that component installed incorrectly.' This refers to the engineering context of Project MX981."}, {"text": "A philosophical statement about the universe's inherent hostility.", "isCorrect": false, "rationale": "The text explicitly distinguishes this from the original meaning, stating: 'But the original context was not philosophical resignation. It was engineering.' The idea of a hostile universe is associated with the popular, fatalistic version."}, {"text": "The statistical likelihood of bad luck in experiments.", "isCorrect": false, "rationale": "The text specifies: 'It is not a statement about luck or cosmic malice.' The engineering version is a design principle based on predictable failure modes, not random bad luck."}], "id": "q01"}, {"question": "Which statement best captures the core principle of Murphy's Law in its useful, engineering version?", "options": [{"text": "Complex systems are destined to fail regardless of design efforts.", "isCorrect": false, "rationale": "While complex systems have a high probability of something going wrong, the engineering principle is not about fatalism but about proactive design to mitigate or prevent failure. The text emphasizes 'design principle' and 'preparation,' not despair."}, {"text": "If a failure mode exists, it will eventually be activated, necessitating design to prevent or mitigate it.", "isCorrect": true, "rationale": "The text defines this directly: 'This is the engineering version of Murphy's Law, and it is profoundly useful. ...if a failure mode exists, assume it will eventually be activated.'"}, {"text": "The probability of any single component failing is always high.", "isCorrect": false, "rationale": "The text clarifies that 'even if the probability of any specific thing going wrong is low,' the system's overall reliability can be low. The principle focuses on the certainty of failure activation *if* the mode exists, not necessarily a high individual component failure rate."}, {"text": "Designers should aim for perfect components to ensure system reliability.", "isCorrect": false, "rationale": "The text argues against hoping for perfection, stating: 'The proper response is not to hope for perfection but to design systems that remain safe and functional when imperfect humans interact with them in imperfect conditions.'"}], "id": "q02"}, {"question": "According to the engineering version of Murphy's Law, what is the designer's primary responsibility regarding potential user error?", "options": [{"text": "To provide extensive training and clear warning labels for all users.", "isCorrect": false, "rationale": "The text explicitly states that 'A warning label that can be ignored will be ignored,' indicating that such measures are insufficient. The engineering principle goes further than just informing users."}, {"text": "To create systems that are aesthetically pleasing and intuitive, reducing the likelihood of error.", "isCorrect": false, "rationale": "While good design often includes these elements, the core responsibility under Murphy's Law is more absolute: to make errors impossible or harmless, not just less likely. Intuitive design reduces errors but doesn't eliminate all failure modes."}, {"text": "To make incompetent use either impossible or non-catastrophic through defensive design.", "isCorrect": true, "rationale": "The text directly states: 'The designer's job is not to hope for competent users but to make incompetent use impossible — or at least non-catastrophic.' This aligns with 'defensive design' or 'poka-yoke'."}, {"text": "To hope for competent users who will follow instructions meticulously.", "isCorrect": false, "rationale": "The text directly refutes this: 'The designer's job is not to hope for competent users...'"}], "id": "q03"}, {"question": "Which of the following scenarios best exemplifies the application of 'poka-yoke' or defensive design, as described in the text?", "options": [{"text": "A software program that includes a comprehensive help manual and tutorials for new users.", "isCorrect": false, "rationale": "Help manuals and tutorials assist users but do not make errors impossible or non-catastrophic; users can still make mistakes even with guidance. Poka-yoke aims to prevent the mistake itself."}, {"text": "A manufacturing process that uses highly skilled and certified technicians to assemble critical components.", "isCorrect": false, "rationale": "This relies on human competence, which the engineering version of Murphy's Law assumes will eventually fail ('assume it will eventually be activated'). Poka-yoke designs the system to prevent error regardless of skill level."}, {"text": "A medical device that uses a uniquely shaped connector for each type of input, preventing incorrect attachments.", "isCorrect": true, "rationale": "This is a direct application of poka-yoke (mistake-proofing) because it physically prevents an incorrect action, making the error impossible. The text provides similar examples like 'USB plugs are designed so they cannot be inserted into Ethernet ports.'"}, {"text": "A safety checklist that operators must complete before starting a complex machine.", "isCorrect": false, "rationale": "Checklists can reduce errors but can be ignored or incorrectly performed. Poka-yoke aims to make the error impossible at the design stage, rather than relying on procedural adherence."}], "id": "q04"}, {"question": "The text states that the pop-culture version of Murphy's Law ('everything goes wrong') is 'less useful but not entirely wrong.' This is primarily because it captures:", "options": [{"text": "The reality that human beings are prone to making mistakes in any situation.", "isCorrect": false, "rationale": "While human error is a factor, the text's specific explanation for 'not entirely wrong' focuses on the statistical nature of complex systems, not just general human fallibility. It highlights 'a statistical truth.'"}, {"text": "A fatalistic acceptance of bad luck as an unavoidable aspect of life.", "isCorrect": false, "rationale": "The text explicitly contrasts the useful engineering version with the 'fatalism' and 'cosmic pessimism' of the popular version. The 'not entirely wrong' part refers to a statistical truth, not fatalism."}, {"text": "The statistical truth that in a complex system with many components, the overall probability of at least one failure is high.", "isCorrect": true, "rationale": "The text explains: 'It captures a statistical truth: in any complex system with many components, the probability that at least one thing goes wrong is very high, even if the probability of any specific thing going wrong is low.'"}, {"text": "The observation that errors tend to occur at the worst possible time, as described by Finagle's Law.", "isCorrect": false, "rationale": "The text notes that Finagle's Law (errors at the worst time) is often confused with Murphy's Law, but this specific 'not entirely wrong' explanation refers to the statistical probability of *any* failure in a complex system, not the timing of it."}], "id": "q05"}, {"question": "What is the primary practical takeaway for organizations and designers when applying the properly understood Murphy's Law?", "options": [{"text": "To avoid complex systems altogether, as they are inherently unreliable.", "isCorrect": false, "rationale": "The text emphasizes how to manage and design for reliability in complex systems, not to avoid them. It states 'redundancy... is essential in complex engineering.'"}, {"text": "To consistently blame human error when failures occur, promoting accountability.", "isCorrect": false, "rationale": "The engineering principle shifts the focus from blame to design solutions. The designer's job is to prevent incompetent use, not merely to assign blame after it occurs."}, {"text": "To incorporate redundancy, margin, and proactive failure analysis like pre-mortems.", "isCorrect": true, "rationale": "The text explicitly states: 'The practical takeaway is not despair but preparation. Murphy's Law, properly understood, is an argument for redundancy, margin, and humility. Assume things will go wrong. Build in backup systems. Test failure modes. Run pre-mortems.'"}, {"text": "To ensure every component has a 100% reliability rate to prevent any system failure.", "isCorrect": false, "rationale": "The text uses the example of 99% reliable components leading to low system reliability, implying that 100% reliability for all components in a complex system is an unrealistic goal; the solution is design for failure, not achieving perfection."}], "id": "q06"}, {"question": "The Three Mile Island accident is presented as a real-world example primarily to illustrate which aspect of Murphy's Law?", "options": [{"text": "The effectiveness of single safety systems in preventing catastrophic failures.", "isCorrect": false, "rationale": "The text states that 'no single safety system was designed to handle' the crisis, indicating the *failure* of individual systems to cope with a cascade of events."}, {"text": "The unpredictability of component failure rates in nuclear power plants.", "isCorrect": false, "rationale": "While component failure is part of it, the main point is the *interaction* of multiple failures, not just the individual unpredictability of one component. Each individual failure was 'individually unlikely.'"}, {"text": "How a cascade of individually unlikely small failures can combine in unexpected and catastrophic ways.", "isCorrect": true, "rationale": "The text describes it as 'not caused by a single catastrophic failure but by a cascade of small failures, each of which was individually unlikely... the something is often a combination of small failures that interact in unexpected ways.'"}, {"text": "The direct influence of cosmic pessimism on engineering outcomes.", "isCorrect": false, "rationale": "This example relates to the engineering principle of how failures manifest in complex systems, not the fatalistic, popular version of the law."}], "id": "q07"}, {"question": "The text contrasts the 'popular form' of Murphy's Law with the 'engineering version.' What is the fundamental difference highlighted?", "options": [{"text": "The popular form is American, while the engineering version is Japanese ('poka-yoke').", "isCorrect": false, "rationale": "Both versions of Murphy's Law originate from Captain Edward A. Murphy Jr. in the U.S. Poka-yoke is a related Japanese concept, not the engineering version of Murphy's Law itself."}, {"text": "The popular form is about individual failures, while the engineering version focuses on systemic unreliability.", "isCorrect": false, "rationale": "While the engineering version addresses systemic issues, the core difference isn't just the scope of failure, but the underlying philosophical stance towards it. Both can refer to individual failures or systems."}, {"text": "The popular form implies fatalism and cosmic pessimism, whereas the engineering version is a practical design principle for mitigating failure.", "isCorrect": true, "rationale": "The text explicitly states: '“Anything that can go wrong will go wrong.” This is Murphy's Law in its popular form, and in this form it sounds like fatalism — a shrug of cosmic pessimism... But the original context was not philosophical resignation. It was engineering. This is the engineering version of Murphy's Law, and it is profoundly useful.'"}, {"text": "The popular form emphasizes bad luck, while the engineering version emphasizes the importance of skilled operators.", "isCorrect": false, "rationale": "The engineering version emphasizes designing systems to be impervious to human error ('incompetent use impossible'), not relying solely on operator skill."}], "id": "q08"}, {"question": "The calculation '$0.99^{100} = 0.366$' is used in the text to illustrate:", "options": [{"text": "The average reliability of a single component in a complex system.", "isCorrect": false, "rationale": "The calculation shows the system's overall reliability, not the average reliability of a single component (which is given as 0.99)."}, {"text": "The inherent unreliability of engineering components over time.", "isCorrect": false, "rationale": "The calculation is a statistical snapshot of system reliability based on component reliability, not a measure of component degradation or lifespan."}, {"text": "How quickly a system's overall reliability decreases as the number of highly reliable individual components increases.", "isCorrect": true, "rationale": "The text explains: 'A machine with a hundred parts, each with 99% reliability, has a system reliability of about 37% — worse than a coin flip.' This demonstrates how many components, even reliable ones, reduce overall system reliability."}, {"text": "The maximum number of components a reliable system can safely contain.", "isCorrect": false, "rationale": "It illustrates a consequence of complex systems, not a defined maximum limit for components. The solution offered is redundancy, not limiting complexity."}], "id": "q09"}, {"question": "Which of the following concepts is *least directly* aligned with the proactive, preventative approach advocated by the engineering version of Murphy's Law?", "options": [{"text": "Pre-Mortem Analysis, for imagining failure before it happens.", "isCorrect": false, "rationale": "The text explicitly lists 'Run pre-mortems' as a key practical takeaway from properly understanding Murphy's Law, making it directly aligned with the proactive approach."}, {"text": "The assumption that users will always follow instructions precisely if given clear guidelines.", "isCorrect": true, "rationale": "The engineering version of Murphy's Law explicitly advises against this assumption, stating, 'The designer's job is not to hope for competent users but to make incompetent use impossible.' It assumes misuse, not perfect adherence."}, {"text": "Margin of Safety, for building in slack for predicted failures.", "isCorrect": false, "rationale": "The text makes a direct connection: 'See also: Margin of Safety (Chapter ) for the practice of building in slack for the failures Murphy's Law predicts.'"}, {"text": "Redundancy, such as backup systems and spare parts.", "isCorrect": false, "rationale": "Redundancy is presented as an 'essential' response to the statistical truth of failure in complex systems and a core 'argument for' Murphy's Law, making it highly aligned."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
