<script>
var QUESTIONS = [{"question": "What is the fundamental purpose of a margin of safety, according to the text?", "options": [{"text": "To maximize efficiency by precisely matching capacity to expected needs.", "isCorrect": false, "rationale": "The text explicitly states that the cost of a margin of safety is 'inefficiency,' as it involves building capacity beyond expected needs, not precisely matching them for maximum efficiency."}, {"text": "To ensure that systems can withstand conditions far beyond their initially predicted maximums.", "isCorrect": true, "rationale": "The text defines margin of safety as the difference between expected load and actual capacity, designed to 'absorb everything the engineer did not or could not predict' and to 'build in room to be wrong without catastrophe'."}, {"text": "To eliminate the possibility of any errors or unexpected events occurring.", "isCorrect": false, "rationale": "The text notes that margins 'did not prevent the failure' (Apollo 13), but 'made the failure survivable,' indicating it's about managing the impact of errors and unexpected events, not eliminating them."}, {"text": "To primarily reduce the initial cost of construction or investment.", "isCorrect": false, "rationale": "The text states that a bridge built with a margin uses 'more material' and that 'cash sitting in an emergency fund earns less,' indicating an increased, not reduced, initial cost or opportunity cost."}], "id": "q01"}, {"question": "How does Benjamin Graham's application of the margin of safety in investing mirror its original use in engineering?", "options": [{"text": "Both focus on precisely calculating the maximum expected load or value and building exactly to that specification.", "isCorrect": false, "rationale": "Both engineering and investing applications advocate for building *beyond* exact specifications, not precisely to them, to accommodate errors and unknowns."}, {"text": "Both involve designing with a buffer to absorb unpredicted variables and errors in initial estimates.", "isCorrect": true, "rationale": "Graham's approach is to buy 'substantially below' intrinsic value so the 'margin absorbs your errors of estimation,' which directly parallels the engineering concept of absorbing what 'did not or could not predict.'"}, {"text": "Both primarily aim to prevent any failures from occurring in the first place.", "isCorrect": false, "rationale": "While desirable, the primary aim is to ensure survival *when* failures or errors occur, not necessarily to prevent them, as demonstrated by the Apollo 13 example."}, {"text": "Both suggest finding the cheapest materials or securities to ensure a large profit margin.", "isCorrect": false, "rationale": "While Graham advocates buying below intrinsic value, the focus is on safety and resilience, not simply finding the cheapest option for profit maximization without considering quality or underlying value."}], "id": "q02"}, {"question": "Warren Buffett's 'thin margin' bridge analogy (truck weighing 9,800 lbs on a 10,000 lbs bridge) primarily illustrates which aspect of the margin of safety principle?", "options": [{"text": "That precise mathematical calculations are always sufficient for safety.", "isCorrect": false, "rationale": "Buffett's analogy argues against relying solely on precise calculations, emphasizing that 'your estimate of the truck's weight might be off' or 'the bridge's capacity might have degraded,' meaning calculations alone are insufficient."}, {"text": "The importance of accounting for the potential compounding of multiple small, individually minor errors.", "isCorrect": true, "rationale": "Buffett explains, 'Any single error is unlikely to be catastrophic. But the combination of multiple small errors can be,' highlighting the risk of a thin margin when several slight inaccuracies combine."}, {"text": "That engineers consistently overestimate the capacity of their designs.", "isCorrect": false, "rationale": "The analogy focuses on the dangers of *underestimating* risks or having insufficient buffer, not on engineers' overestimations."}, {"text": "The inherent wastefulness of building in excessive slack.", "isCorrect": false, "rationale": "Buffett's analogy warns against *insufficient* slack (a thin margin), not the wastefulness of excessive slack. The text separately addresses inefficiency as a 'cost,' not the primary point of this specific analogy."}], "id": "q03"}, {"question": "The text explicitly states that the cost of a margin of safety is:", "options": [{"text": "Increased risk of catastrophic failure.", "isCorrect": false, "rationale": "The margin of safety is designed to *reduce* the risk of catastrophic failure, not increase it."}, {"text": "Inefficiency due to unused capacity or resources.", "isCorrect": true, "rationale": "The text clearly states, 'The cost of a margin of safety is inefficiency. A bridge built to ten times the expected load uses more material... Cash sitting in an emergency fund earns less... Buffer time in a schedule means some hours may go 'unused.''"}, {"text": "Reduced flexibility in adapting to new conditions.", "isCorrect": false, "rationale": "A margin of safety generally provides *more* flexibility by allowing systems to absorb unexpected changes, not less."}, {"text": "A guarantee against all future unforeseen problems.", "isCorrect": false, "rationale": "The text clarifies that margins 'did not prevent the failure' but made it survivable, and that the unexpected is a 'certainty,' not eliminated by a margin."}], "id": "q04"}, {"question": "Based on the text, which of the following scenarios *best* exemplifies the application of the margin of safety principle?", "options": [{"text": "A company cutting its emergency reserves to invest more aggressively in high-growth stocks.", "isCorrect": false, "rationale": "This action reduces 'emergency reserves for expenses you cannot predict,' which is the opposite of applying a margin of safety in financial planning."}, {"text": "A student scheduling exactly enough time for a project, assuming no interruptions or difficulties.", "isCorrect": false, "rationale": "This approach 'design[s] to the edge' and ignores the principle of 'build in room to be wrong without catastrophe,' often falling prey to the Planning Fallacy."}, {"text": "A person maintaining a level of physical fitness above what is minimally required for daily activities.", "isCorrect": true, "rationale": "The text explicitly states this application: 'maintain fitness above the minimum rather than at the minimum, so that an illness or injury does not push you into crisis.'"}, {"text": "A project manager creating a detailed timeline without any buffer for potential delays.", "isCorrect": false, "rationale": "This scenario directly contradicts the advice to 'build in buffer time for the delays that the Planning Fallacy guarantees you will underestimate.'"}], "id": "q05"}, {"question": "The Apollo 13 mission serves as a powerful example of the margin of safety because:", "options": [{"text": "The engineers perfectly predicted the oxygen tank explosion and designed specific systems to prevent it.", "isCorrect": false, "rationale": "The text states the margins were 'designed for scenarios no one specifically predicted,' indicating the explosion itself was unforeseen, not perfectly predicted or specifically prevented by those margins."}, {"text": "The mission succeeded by rigidly sticking to its original plan without any deviations.", "isCorrect": false, "rationale": "The mission required significant improvisation and repurposing of systems (like the Lunar Module as a lifeboat), indicating deviations from the original plan were crucial for survival."}, {"text": "Redundant systems and backup capacities allowed the crew to survive a failure that was not specifically foreseen.", "isCorrect": true, "rationale": "The text highlights 'Backup power systems, redundant life support, multiple navigation methods, and the Lunar Module' as buffers that 'made the failure survivable' despite not being designed for the specific explosion."}, {"text": "It demonstrated that margins of safety are primarily effective at preventing rather than surviving failures.", "isCorrect": false, "rationale": "The text explicitly states, 'The margins did not prevent the failure. They made the failure survivable,' directly refuting this option."}], "id": "q06"}, {"question": "The statement 'when you know you might be wrong — and you are always wrong about something — build in room to be wrong without catastrophe' suggests which core belief underpinning the margin of safety?", "options": [{"text": "Perfection in prediction is achievable with enough effort.", "isCorrect": false, "rationale": "The phrase 'you are always wrong about something' directly contradicts the idea that perfection in prediction is achievable."}, {"text": "Errors are rare and generally inconsequential in complex systems.", "isCorrect": false, "rationale": "The need to build 'room to be wrong without catastrophe' implies errors are expected and potentially consequential, requiring deliberate planning."}, {"text": "It is impossible to fully eliminate uncertainty and error in planning and design.", "isCorrect": true, "rationale": "The acknowledgment that 'you are always wrong about something' and that the unexpected is a 'certainty' underscores the inherent and inescapable nature of uncertainty and error."}, {"text": "Catastrophic events only occur when no margin of safety is present.", "isCorrect": false, "rationale": "While a margin helps mitigate catastrophe, the text does not claim it's the *only* factor, nor that all catastrophic events are solely due to its absence. The Apollo 13 example shows a failure occurred *with* margins."}], "id": "q07"}, {"question": "An investor estimates a company's intrinsic value at $120 per share. To apply the margin of safety principle effectively, according to Benjamin Graham, at what price should the investor consider buying?", "options": [{"text": "$118, as it's slightly below the estimated value.", "isCorrect": false, "rationale": "Graham argued investors should buy 'substantially below' the intrinsic value. A slight difference like $2 ($118 vs $120) provides a very thin margin, which Buffett's analogy would warn against."}, {"text": "$120, as it matches the estimated intrinsic value.", "isCorrect": false, "rationale": "Buying at the estimated intrinsic value provides no margin of safety whatsoever, leaving no buffer for estimation errors."}, {"text": "$80, as it provides a substantial buffer below the estimated value.", "isCorrect": true, "rationale": "This option represents buying 'substantially below' the estimated intrinsic value ($120), creating a significant 'margin' of $40 ($120 - $80), consistent with Graham's advice to buy at '$60 or $70' for a $100 stock."}, {"text": "$125, as market prices often reflect future growth.", "isCorrect": false, "rationale": "Buying *above* the estimated intrinsic value would mean there is no margin of safety; instead, there's a negative margin, increasing risk if the estimate is wrong."}], "id": "q08"}, {"question": "The text mentions the 'Planning Fallacy' in connection with the margin of safety. This connection implies that:", "options": [{"text": "The Planning Fallacy makes margins of safety unnecessary because plans are always accurate.", "isCorrect": false, "rationale": "The Planning Fallacy describes our tendency to *underestimate* task completion times and costs, making margins of safety *more* necessary, not less."}, {"text": "Understanding the Planning Fallacy highlights why we often *underestimate* the need for buffer time.", "isCorrect": true, "rationale": "The connection explicitly states 'build in buffer time for the delays that the Planning Fallacy (Chapter ) guarantees you will underestimate,' showing it's a reason *why* margins are often overlooked but crucial."}, {"text": "The Planning Fallacy is a synonym for the margin of safety principle itself.", "isCorrect": false, "rationale": "The Planning Fallacy is a cognitive bias that *causes* us to need a margin of safety, not the principle itself."}, {"text": "Margins of safety are only relevant when a plan is intentionally designed to fail.", "isCorrect": false, "rationale": "Margins of safety are for unexpected failures or deviations, not intentionally designed failures."}], "id": "q09"}, {"question": "The text concludes that while a margin of safety comes at the cost of inefficiency, it is 'not waste.' Instead, it is characterized as 'insurance against the unexpected.' This distinction emphasizes:", "options": [{"text": "The belief that all forms of inefficiency are ultimately beneficial.", "isCorrect": false, "rationale": "The text only argues that this specific inefficiency (margin of safety) is beneficial, not *all* forms of inefficiency."}, {"text": "That the value of preventing catastrophe outweighs the cost of carrying extra capacity.", "isCorrect": true, "rationale": "By calling it 'insurance' against 'the unexpected' and saying 'the benefit is survival when conditions deviate,' the text clearly implies that the protective value and the avoidance of catastrophe justify the cost of inefficiency."}, {"text": "That insurance policies are always a better solution than building in physical buffers.", "isCorrect": false, "rationale": "The term 'insurance' is used as an analogy for the function of the margin, not to suggest that literal insurance policies are always superior to inherent system buffers."}, {"text": "The idea that 'the unexpected' is a rare occurrence that can be easily dismissed.", "isCorrect": false, "rationale": "The text states 'the unexpected is not a possibility but a certainty,' directly contradicting the idea that it's rare or dismissible."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
