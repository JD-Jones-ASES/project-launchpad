<script>
var QUESTIONS = [{"question": "What is the primary characteristic of the rhetorical 'motte' in the Motte and Bailey maneuver?", "options": [{"text": "It is a strong, controversial claim that attracts attention.", "isCorrect": false, "rationale": "This describes the 'bailey,' not the 'motte.' The motte is weak and indisputable."}, {"text": "It is a modest, nearly indisputable claim used as a fallback position.", "isCorrect": true, "rationale": "The text states the motte is 'a much weaker, almost indisputable claim' to which the speaker retreats when challenged."}, {"text": "It represents the core, undefended argument that the speaker hopes to reintroduce.", "isCorrect": false, "rationale": "The 'motte' is defended; it's the 'bailey' that is the core, undefended strong claim the speaker wants to return to."}, {"text": "It is the initial bold statement made to provoke a challenger.", "isCorrect": false, "rationale": "This describes the 'bailey,' which is the bold, controversial claim made initially."}], "id": "q01"}, {"question": "According to Nicholas Shackel, the Motte and Bailey rhetorical maneuver borrows its name from which historical concept?", "options": [{"text": "A philosophical debate strategy from ancient Greece.", "isCorrect": false, "rationale": "The text explicitly states the term borrows from medieval castle architecture, not ancient Greek philosophy."}, {"text": "Medieval castle architecture, specifically a fortified tower and its courtyard.", "isCorrect": true, "rationale": "The text clearly states the term 'borrows from medieval castle architecture: the motte is a heavily fortified stone tower on a hill; the bailey is the larger, less defensible courtyard below.'"}, {"text": "A legal defense tactic used in 17th-century European courts.", "isCorrect": false, "rationale": "The text attributes the term to medieval castle architecture, not 17th-century legal tactics."}, {"text": "An economic theory describing market fluctuations.", "isCorrect": false, "rationale": "The term's origin is tied to architecture, not economic theory."}], "id": "q02"}, {"question": "Why is the Motte and Bailey maneuver described as particularly insidious?", "options": [{"text": "It always involves intentional deception and malicious intent.", "isCorrect": false, "rationale": "The text notes it is 'often unconscious,' meaning it doesn't always involve intentional deception."}, {"text": "The person employing it may genuinely believe they have successfully defended their original claim.", "isCorrect": true, "rationale": "The text explains, 'The person employing it may genuinely believe they have answered the objection. They retreat to the motte, feel vindicated because the motte is defensible, and return to the bailey without recognizing that the original strong claim was never actually defended.'"}, {"text": "It is frequently used by skilled debaters to confuse their opponents with complex arguments.", "isCorrect": false, "rationale": "While it can be used by debaters, its insidious nature stems from its often unconscious application, not necessarily its complexity."}, {"text": "It relies on misinterpreting the opponent's weak counter-arguments.", "isCorrect": false, "rationale": "The maneuver involves the speaker retreating to a weak claim, not misinterpreting an opponent's weak counter-arguments."}], "id": "q03"}, {"question": "A company advertises its new product as 'a revolutionary breakthrough that will change your life' (Bailey). When an investor asks for evidence of this revolution, the CEO responds, 'We're simply providing consumers with more innovative choices' (Motte). What is the CEO attempting to achieve with this rhetorical retreat?", "options": [{"text": "To genuinely clarify the innovative aspects of their product without hyperbole.", "isCorrect": false, "rationale": "The text implies the retreat deflects scrutiny rather than offering genuine clarification of the original strong claim."}, {"text": "To shift the focus from a strong, potentially indefensible claim to a weaker, easily defensible one.", "isCorrect": true, "rationale": "As per the 'Corporate communications' example, the 'revolutionary claim attracts attention; the modest claim deflects scrutiny' by shifting to a weaker, defensible position."}, {"text": "To escalate the argument by introducing a new, stronger claim.", "isCorrect": false, "rationale": "The retreat to the motte involves a *weaker* claim, not a stronger one."}, {"text": "To demonstrate humility and acknowledge potential overstatements.", "isCorrect": false, "rationale": "While it might seem like humility, the core maneuver involves returning to the strong claim once pressure is off, suggesting the primary goal isn't genuine concession."}], "id": "q04"}, {"question": "What is the recommended remedy for countering a Motte and Bailey maneuver, as described in the text?", "options": [{"text": "Agree with the weaker claim (motte) and then immediately present a stronger counter-argument.", "isCorrect": false, "rationale": "While agreeing with the weaker claim is part of it, the key is to then demand defense of the *original* strong claim, not to introduce a new counter-argument before that defense."}, {"text": "Ignore the weaker claim and focus solely on disproving the speaker's emotional state.", "isCorrect": false, "rationale": "Ignoring the weaker claim is not the strategy; acknowledging it is important before redirecting. Focusing on emotion is irrelevant to the logical maneuver."}, {"text": "Hold the speaker to their original, stronger claim and demand its direct defense, or explicit abandonment.", "isCorrect": true, "rationale": "The text states the remedy is: 'When someone retreats to a weaker position, the right response is: 'I agree with the weaker claim. But that is not what you originally said. Do you still hold the stronger claim? If so, please defend it.' This forces the speaker to either defend the bailey on its own terms or explicitly abandon it.'"}, {"text": "Shift the conversation to an entirely different, unrelated topic.", "isCorrect": false, "rationale": "This would allow the speaker to escape scrutiny of their original claim, which is the opposite of the recommended remedy."}], "id": "q05"}, {"question": "In the example 'You never listen to me' (bailey), the speaker then says 'I'm not saying never, I just mean sometimes I feel unheard' (motte). If the speaker continues to act as though their partner 'never listens' after this exchange, what does this demonstrate about the Motte and Bailey maneuver?", "options": [{"text": "The speaker has successfully defended their original position by clarifying it.", "isCorrect": false, "rationale": "The speaker retreated to a weaker claim; they did not defend the original, absolute 'never listen' claim. Returning to the original claim without defending it is the essence of the maneuver."}, {"text": "The motte was insufficient as a defensive position, requiring a new bailey.", "isCorrect": false, "rationale": "The motte *was* sufficient as a defensive position because it was indisputable. The issue is the speaker returning to the indefensible bailey."}, {"text": "The speaker has reoccupied the bailey without actually defending the strong claim.", "isCorrect": true, "rationale": "This is precisely what the Motte and Bailey maneuver entails: retreating to the motte when challenged, and then 'quietly reoccupies the bailey, acting as though the strong claim was never challenged.'"}, {"text": "The challenger failed to understand the nuance of the speaker's initial statement.", "isCorrect": false, "rationale": "The problem lies with the speaker's rhetoric, not the challenger's comprehension of the initial strong claim."}], "id": "q06"}, {"question": "The medieval castle analogy describes the motte as 'cramped and austere.' How does this characteristic relate to the rhetorical 'motte'?", "options": [{"text": "The rhetorical motte is also a physically uncomfortable position to hold in an argument.", "isCorrect": false, "rationale": "The 'cramped and austere' refers to the physical castle motte. The rhetorical motte is modest and true, not physically uncomfortable."}, {"text": "It signifies that the rhetorical motte is a limited, less ambitious claim compared to the bailey.", "isCorrect": true, "rationale": "The 'cramped and austere' nature of the castle motte corresponds to the rhetorical motte being a 'true, modest' and limited claim, contrasting with the 'spacious and desirable' but vulnerable bailey."}, {"text": "It implies that making a weak, indisputable claim is a sign of intellectual humility.", "isCorrect": false, "rationale": "While the motte is modest, the maneuver itself is not necessarily a sign of humility, especially when the speaker returns to the bold claim without defense."}, {"text": "The rhetorical motte is a rarely used part of the argument, much like the castle motte is only used in emergencies.", "isCorrect": false, "rationale": "The rhetorical motte is used whenever the bailey is challenged, which can be frequent. The analogy refers to its limited *scope* compared to the bailey, not its frequency of use."}], "id": "q07"}, {"question": "Consider the example: 'Science is just another belief system' (bailey). When challenged, the speaker retreats to 'Well, all I mean is that scientists are human and can make mistakes' (motte). What critical difference exists between these two statements?", "options": [{"text": "The bailey is a factual statement, while the motte is an opinion.", "isCorrect": false, "rationale": "The bailey ('Science is just another belief system') is a controversial claim about epistemic standing, not a simple factual statement. The motte is an indisputable truth."}, {"text": "The bailey asserts a strong, controversial claim, while the motte is a modest, nearly indisputable truth.", "isCorrect": true, "rationale": "The text explicitly defines the bailey as a 'strong claim—the bailey—asserting that scientific knowledge has no special epistemic standing' and the motte as 'true, modest, and almost impossible to dispute.'"}, {"text": "The bailey is an example of confirmation bias, and the motte is a Gish Gallop.", "isCorrect": false, "rationale": "While other fallacies are mentioned in 'connections,' these specific fallacies are not demonstrated by the example statements themselves, and the question is about the difference between the motte and bailey."}, {"text": "The bailey is a valid scientific hypothesis, and the motte is a disproven theory.", "isCorrect": false, "rationale": "Neither statement is presented as a scientific hypothesis or theory in this context. The bailey is a rhetorical claim, and the motte is a concession of human fallibility."}], "id": "q08"}, {"question": "Which of the following scenarios best exemplifies the rhetorical Motte and Bailey maneuver?", "options": [{"text": "A student initially claims 'All history textbooks are biased,' but when asked to defend this, changes their mind and agrees that some textbooks are objective.", "isCorrect": false, "rationale": "This scenario describes a genuine change of mind or concession, where the speaker *abandons* the strong claim, rather than retreating and then quietly reoccupying it."}, {"text": "A politician argues for 'drastic cuts to public spending' (bailey), and when pressed for specifics, states, 'We just need to ensure fiscal responsibility' (motte), later campaigning as if their call for 'drastic cuts' was never challenged.", "isCorrect": true, "rationale": "This perfectly matches the political rhetoric example in the text: a bold, strong claim (bailey) is made, a retreat to a vague, indisputable claim (motte) occurs when challenged, and then the strong claim is reoccupied without being defended."}, {"text": "A scientist presents a groundbreaking theory, which is then thoroughly scrutinized and validated by peers through rigorous experimentation.", "isCorrect": false, "rationale": "This describes the scientific process of peer review and validation, not a rhetorical maneuver to avoid defending a claim."}, {"text": "A debater intentionally misrepresents their opponent's argument to make it easier to attack.", "isCorrect": false, "rationale": "This describes a 'Straw Man' fallacy, which is a different rhetorical maneuver, mentioned in the 'connections' but not the Motte and Bailey."}], "id": "q09"}, {"question": "When a speaker, employing the Motte and Bailey, retreats to the 'motte,' they often feel vindicated. What is the basis for this feeling of vindication?", "options": [{"text": "The challenger's inability to understand the original strong claim.", "isCorrect": false, "rationale": "The feeling of vindication comes from the defensibility of the motte, not the challenger's understanding."}, {"text": "The fact that the 'motte' claim is genuinely true and almost impossible to dispute.", "isCorrect": true, "rationale": "The text states: 'They retreat to the motte, feel vindicated because the motte is defensible, and return to the bailey without recognizing that the original strong claim was never actually defended.' The defensibility of the motte is key."}, {"text": "The successful diversion of the challenger to an entirely unrelated topic.", "isCorrect": false, "rationale": "The retreat is to a related, but weaker, claim, not an entirely unrelated topic. The vindication comes from the motte's defensibility, not a diversion."}, {"text": "The implicit agreement from the challenger that the 'bailey' was incorrect.", "isCorrect": false, "rationale": "The challenger agrees with the *motte*, not the bailey. The speaker interprets the challenger's giving up as vindication for their overall position, even if the bailey was not defended."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
