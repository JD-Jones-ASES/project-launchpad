    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following best describes the core concept of underdetermination in science?", "options": [{"text": "Scientific theories are often proven false by new evidence.", "isCorrect": false, "rationale": "While theories can be falsified, underdetermination specifically addresses situations where evidence is *insufficient* to prove or disprove a theory, not just its falsification."}, {"text": "For any given body of evidence, there are multiple theories that can fit the observations equally well.", "isCorrect": true, "rationale": "This option directly reflects the definition provided in the text: 'the evidence never fully determines which theory is correct. For any body of data, there are always multiple theories that fit the observations equally well.'"}, {"text": "Scientists frequently disagree on the interpretation of experimental data, leading to controversy.", "isCorrect": false, "rationale": "Disagreement in interpretation can occur, but underdetermination is a more fundamental philosophical point about the inherent limitations of evidence, not just human disagreement."}, {"text": "Theoretical predictions are often too vague to be empirically tested effectively.", "isCorrect": false, "rationale": "Underdetermination does not imply vagueness in predictions; rather, it suggests that even precise predictions can be equally well-explained by competing theories."}]}, {"question": "The historical competition between the Ptolemaic and Copernican models of the solar system is presented as a prime example of underdetermination because:", "options": [{"text": "The Ptolemaic model was demonstrably false from the outset due to its complexity.", "isCorrect": false, "rationale": "The text explicitly states the Ptolemaic system 'could be adjusted to match almost any observation' and was initially comparable in accuracy to the Copernican model, not demonstrably false."}, {"text": "Astronomers in 1550, using the best available data, could not definitively choose between the two models based on evidence alone.", "isCorrect": true, "rationale": "The text highlights that 'both models predicted planetary positions in the sky with roughly comparable accuracy' and an astronomer 'could not definitively choose between them on the basis of evidence alone.'"}, {"text": "The Copernican model was immediately accepted due to its inherent simplicity and elegance.", "isCorrect": false, "rationale": "The text notes that the Copernican system was 'initially less accurate' and required non-observational 'values like simplicity' to eventually tip the balance, not immediate acceptance."}, {"text": "Later discoveries like Kepler's ellipses proved that the Ptolemaic model was theoretically impossible.", "isCorrect": false, "rationale": "Kepler's discoveries made the heliocentric model more elegant and predictive, but the text states Galileo's observations were 'very difficult (though not strictly impossible) to accommodate in the Ptolemaic framework,' not that it was theoretically impossible."}]}, {"question": "According to the text, what factors, beyond pure observational data, played a crucial role in the eventual acceptance of the Copernican model over the Ptolemaic model?", "options": [{"text": "The development of more powerful telescopes and precise mathematical calculations.", "isCorrect": false, "rationale": "While important for scientific progress, the text emphasizes 'values like simplicity, elegance, unifying power, and fruitfulness for future research' rather than just technological or computational advancements as the decisive factors beyond pure observation."}, {"text": "Public opinion, religious authority, and political mandates.", "isCorrect": false, "rationale": "The text focuses on philosophical 'virtues' of theories within the scientific community, not external societal pressures, as the factors tipping the balance in this context."}, {"text": "Simplicity, elegance, unifying power, and fruitfulness for future research.", "isCorrect": true, "rationale": "The text explicitly lists these as the 'values' or 'real virtues' that influenced the choice between theories when data alone was insufficient."}, {"text": "The direct refutation of Ptolemy's core assumptions through irrefutable, single-point observations.", "isCorrect": false, "rationale": "The text notes that even Galileo's evidence was 'very difficult (though not strictly impossible)' to accommodate in the Ptolemaic framework, indicating it wasn't a simple, direct refutation in isolation."}]}, {"question": "Pierre Duhem's contribution to the concept of underdetermination primarily argues that:", "options": [{"text": "Scientific theories can only be proven true through rigorous mathematical proofs, not empirical evidence.", "isCorrect": false, "rationale": "Duhem's point is about the difficulty of falsification or verification of a single hypothesis, not about abandoning empirical evidence for mathematical proof."}, {"text": "No single hypothesis can be tested in isolation, as experiments always rely on a web of background assumptions.", "isCorrect": true, "rationale": "The text states: 'The philosopher Pierre Duhem made a related point in 1906: you can never test a single hypothesis in isolation. Every experiment relies on a web of background assumptions.'"}, {"text": "Scientific instruments are inherently unreliable, leading to ambiguous experimental results.", "isCorrect": false, "rationale": "While instrument calibration is a background assumption, Duhem's broader point is about the entire 'web of beliefs' and not just instrument unreliability as the primary issue."}, {"text": "Theories should be chosen based solely on their ability to generate new, testable predictions.", "isCorrect": false, "rationale": "Fruitfulness is one virtue, but Duhem's point concerns the holistic nature of testing, not a singular criterion for theory choice."}]}, {"question": "If an experiment yields an unexpected result, how does Duhem's perspective on underdetermination suggest we should interpret it?", "options": [{"text": "The primary hypothesis under investigation must be incorrect.", "isCorrect": false, "rationale": "Duhem argues that 'the experiment alone cannot tell you which part' of your web of beliefs is wrong. It could be the hypothesis, the instrument, or a confounding variable."}, {"text": "The experiment is flawed and should be discarded.", "isCorrect": false, "rationale": "While an experiment might be flawed, Duhem's point is more about identifying *where* the error lies within the interconnected system of beliefs, rather than dismissing the experiment outright."}, {"text": "Something within the 'web of beliefs'—which includes the hypothesis, instruments, and background assumptions—is wrong, but the experiment alone cannot pinpoint the error.", "isCorrect": true, "rationale": "This accurately reflects Duhem's argument that an unexpected result indicates an error within the interconnected 'web of beliefs,' and further investigation is needed to identify the specific faulty element."}, {"text": "The unexpected result indicates a completely new scientific phenomenon, requiring a new theory.", "isCorrect": false, "rationale": "While possible, Duhem's point is that the result first signals an inconsistency within the *existing* framework, without immediately identifying the source or demanding an entirely new theory."}]}, {"question": "W. V. O. Quine extended the Duhem thesis by arguing that:", "options": [{"text": "Only mathematical axioms can truly withstand empirical scrutiny.", "isCorrect": false, "rationale": "Quine's extension focuses on the flexibility of our empirical beliefs in the face of evidence, not on prioritizing mathematical axioms."}, {"text": "Our entire system of beliefs faces experience as a whole, and any belief can be maintained if adjustments are made elsewhere in the system.", "isCorrect": true, "rationale": "The text states: 'W. V. O. Quine extended this in 1951, arguing that our entire system of beliefs faces experience as a whole. Any belief can be maintained in the face of any evidence, provided we are willing to make adjustments elsewhere in the system.'"}, {"text": "Scientific progress is impossible due to the inherent subjectivity of all beliefs.", "isCorrect": false, "rationale": "While raising a 'puzzle,' Quine's thesis does not conclude that science is impossible or purely subjective; rather, it highlights the complex and interconnected nature of belief revision."}, {"text": "The only reliable scientific theories are those that can be directly observed and verified.", "isCorrect": false, "rationale": "Quine's argument challenges direct verification and emphasizes the holistic nature of how beliefs interact with experience, rather than advocating for direct observability as the sole criterion."}]}, {"question": "How do working scientists typically manage the challenge of underdetermination in practice?", "options": [{"text": "They abandon theories that do not perfectly align with every piece of empirical data.", "isCorrect": false, "rationale": "The text implies that perfect alignment is rarely achievable and that scientists instead 'manage' underdetermination by applying other criteria, not by abandoning theories prematurely."}, {"text": "They rely solely on direct empirical evidence, discarding any theoretical virtues as unscientific.", "isCorrect": false, "rationale": "The text states that theory choice depends 'not just on data but on values like simplicity,' indicating that empirical evidence is not the sole reliance."}, {"text": "They choose theories that are simpler, more fruitful, more unifying, and better at generating new predictions, based on a pragmatic track record.", "isCorrect": true, "rationale": "The text explains: 'The answer, for most working scientists, is pragmatic. We choose theories that are simpler, more fruitful, more unifying, and better at generating new predictions—not because these criteria are logically guaranteed to lead to truth, but because they have an extraordinary track record.'"}, {"text": "They often accept multiple, contradictory theories simultaneously, acknowledging the arbitrary nature of scientific truth.", "isCorrect": false, "rationale": "While acknowledging complexity, the text does not suggest accepting contradictory theories or that science is arbitrary; instead, it describes a 'disciplined management' through virtues."}]}, {"question": "The 'real-world' example of medical diagnosis illustrates underdetermination because:", "options": [{"text": "Doctors often make errors in judgment due to lack of experience.", "isCorrect": false, "rationale": "The example focuses on the inherent nature of symptoms, not on human error. It's about symptoms being consistent with multiple conditions, regardless of a doctor's experience level."}, {"text": "A patient's symptoms alone can be consistent with many different conditions, requiring additional tests and background knowledge to narrow the diagnosis.", "isCorrect": true, "rationale": "The text explains: 'A patient presents with fatigue, weight loss, and joint pain. These symptoms are consistent with dozens of conditions... The symptoms alone underdetermine the diagnosis.'"}, {"text": "Medical research is often influenced by pharmaceutical company funding, leading to biased results.", "isCorrect": false, "rationale": "This example focuses on the diagnostic process for an individual patient and the challenge of interpreting symptoms, not on systemic issues in medical research funding."}, {"text": "Many diseases have no clear symptoms, making diagnosis impossible.", "isCorrect": false, "rationale": "The example describes symptoms being present but ambiguous, not absent or making diagnosis impossible. It's about 'underdetermination,' not 'impossibility.'"}]}, {"question": "What is the fundamental difference highlighted in the text between 'empirical evidence' and 'theoretical virtues' like simplicity or elegance?", "options": [{"text": "Empirical evidence is objective, while theoretical virtues are entirely subjective opinions.", "isCorrect": false, "rationale": "The text acknowledges theoretical virtues as 'real virtues' and having an 'excellent track record,' implying they are more than just subjective opinions, though not empirical evidence."}, {"text": "Empirical evidence directly corresponds to observable facts, whereas theoretical virtues are criteria for judging a theory's quality that are not identical to observational data.", "isCorrect": true, "rationale": "The text states that theoretical virtues 'are real virtues, but they are not the same as empirical evidence,' emphasizing their role as evaluative criteria distinct from direct observational data."}, {"text": "Theoretical virtues are always more important than empirical evidence in deciding which theory is correct.", "isCorrect": false, "rationale": "The text implies a balance; theory choice depends 'not just on data but on values,' not that one is always superior to the other. Evidence remains crucial."}, {"text": "Empirical evidence is always ambiguous, while theoretical virtues provide definitive proof.", "isCorrect": false, "rationale": "The text suggests evidence can be ambiguous in determining a single theory, but theoretical virtues don't provide 'definitive proof' in the way logical deduction would; they are pragmatic guides."}]}, {"question": "Considering the concept of underdetermination, what is the text's ultimate conclusion about the relationship between evidence and scientific truth?", "options": [{"text": "Evidence directly and undeniably 'proves' a theory to be true, making scientific truth absolute.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'the evidence never fully determines which theory is correct' and 'the relationship between evidence and theory is more complex than 'the data proves it.''."}, {"text": "Scientific theories are merely arbitrary stories, as evidence cannot compel their acceptance or rejection.", "isCorrect": false, "rationale": "While Quine's strong form 'raises a genuine puzzle,' the pragmatic answer for scientists is that 'disciplined management of underdetermination' through theoretical virtues prevents science from being 'just storytelling.'"}, {"text": "The relationship is complex; science manages underdetermination by applying theoretical virtues, recognizing that it's not simply deduction from data to truth.", "isCorrect": true, "rationale": "The text concludes, 'Science is not deduction from data to truth. It is the disciplined management of underdetermination through the careful application of theoretical virtues,' and that 'the relationship between evidence and theory is more complex than 'the data proves it.''"}, {"text": "Future technological advancements will eventually eliminate underdetermination, leading to definitive scientific truths.", "isCorrect": false, "rationale": "Underdetermination is presented as a fundamental philosophical theme, not a temporary technological limitation. Even with 'best observational data,' it persisted in historical examples."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
