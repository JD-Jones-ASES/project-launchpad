        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>

        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason the 'safe choice' in the Stag Hunt parable is to hunt a hare, rather than a stag?", "options": [{"text": "The hunters prefer hares to stags due to their smaller size and ease of transport.", "isCorrect": false, "rationale": "The text explicitly states, 'Both hunters want the stag,' indicating a preference for the larger prize, not the hare."}, {"text": "Hunting a hare guarantees a prize, regardless of the other hunter's actions, mitigating risk.", "isCorrect": true, "rationale": "The text explains, 'A hare is a smaller prize, but it is guaranteed: you can catch one on your own regardless of what the other hunter does.' This certainty makes it the safe choice."}, {"text": "Hunting a stag requires significantly more effort and time than hunting a hare, making it less appealing.", "isCorrect": false, "rationale": "While a stag is a 'large prize' that 'neither can catch alone' implying effort, the primary driver for the 'safe choice' is the guarantee of a prize, not simply effort level."}, {"text": "The stag population is too low to reliably find one, making the pursuit inherently uncertain.", "isCorrect": false, "rationale": "The text does not mention population levels; the uncertainty stems from the partner's choice, not the availability of the stag itself."}], "id": "q01"}, {"question": "Jean-Jacques Rousseau introduced the Stag Hunt parable primarily to illustrate which of the following concepts?", "options": [{"text": "The inherent selfishness and competitive nature of human beings in a state of nature.", "isCorrect": false, "rationale": "The text states, 'The dilemma is not about selfishness,' directly contradicting this option."}, {"text": "How social cooperation might emerge and the inherent fragility of such cooperation.", "isCorrect": true, "rationale": "Rousseau introduced the parable 'to illustrate how social cooperation might emerge — and how fragile it is.'"}, {"text": "The economic benefits of individualistic pursuits when collective action is too risky.", "isCorrect": false, "rationale": "While the hare is a safe individual pursuit, Rousseau's purpose was to show the challenges of cooperation, not to endorse individualism over cooperation in general."}, {"text": "The necessity of external authorities and enforcement mechanisms for any form of social contract.", "isCorrect": false, "rationale": "While external authorities are discussed later as solutions for the Prisoner's Dilemma, Rousseau's initial illustration focused on the internal dynamics of cooperation's emergence and fragility."}], "id": "q02"}, {"question": "What is the critical distinction between the Stag Hunt and the Prisoner's Dilemma, as presented in the text?", "options": [{"text": "In the Stag Hunt, players have opposed interests, whereas in the Prisoner's Dilemma, interests are aligned.", "isCorrect": false, "rationale": "The text explicitly states for the Stag Hunt: 'The players do not have opposed interests. They have aligned interests.' This option reverses the characteristics."}, {"text": "The Prisoner's Dilemma features defection as a dominant strategy, while in the Stag Hunt, mutual cooperation is a stable equilibrium.", "isCorrect": true, "rationale": "The text highlights this key difference: 'In the Prisoner's Dilemma, defection is the dominant strategy... In the Stag Hunt, mutual cooperation is an equilibrium.'"}, {"text": "The Stag Hunt always leads to a higher collective reward than the Prisoner's Dilemma, making it easier to solve.", "isCorrect": false, "rationale": "The text does not compare the overall reward levels between the two games, and the Stag Hunt's problem is risk, not necessarily ease of solution."}, {"text": "Trust is irrelevant in the Stag Hunt but is the central element in determining outcomes in the Prisoner's Dilemma.", "isCorrect": false, "rationale": "Trust is explicitly central to the Stag Hunt problem ('The problem is trust'), whereas in the Prisoner's Dilemma, defection is rational regardless of trust."}], "id": "q03"}, {"question": "According to the game theory formalization, what are the Nash equilibria in the Stag Hunt scenario?", "options": [{"text": "Only one Nash equilibrium exists, where both hunters choose to hunt the stag, representing the ideal outcome.", "isCorrect": false, "rationale": "The text clearly states there are two Nash equilibria, not just one."}, {"text": "Two Nash equilibria: both hunters choose stag (high reward, requires trust) and both hunters choose hare (low reward, no trust required).", "isCorrect": true, "rationale": "The text identifies these two outcomes as the Nash equilibria: 'both hunt stag (high reward, requires trust) and both hunt hare (low reward, requires no trust).'"}, {"text": "Three Nash equilibria: one for each hunter successfully getting a prize, and a third where both fail.", "isCorrect": false, "rationale": "The text identifies two Nash equilibria; outcomes where one player succeeds and the other fails are not equilibria in the Stag Hunt as defined."}, {"text": "No Nash equilibria, because the players' uncertainty always leads to unstable and unpredictable choices.", "isCorrect": false, "rationale": "The text explicitly states the Stag Hunt 'has two Nash equilibria,' disproving this option."}], "id": "q04"}, {"question": "The text describes the Stag Hunt as a model primarily of:", "options": [{"text": "Situations of direct conflict where players have fundamentally opposed goals and interests.", "isCorrect": false, "rationale": "The text clarifies, 'The players do not have opposed interests.' Instead, their interests are aligned."}, {"text": "Coordination problems arising from aligned interests but mutual uncertainty and fear of vulnerability.", "isCorrect": true, "rationale": "The text states, 'This makes the Stag Hunt a model of coordination, not conflict. The players do not have opposed interests. They have aligned interests and a mutual fear of being left exposed. The obstacle is not selfishness; it is uncertainty about what the other person will do.'"}, {"text": "Instances where individual irrationality consistently leads to suboptimal collective outcomes.", "isCorrect": false, "rationale": "The text asserts, 'The problem is not that cooperation is irrational but that it is risky,' distinguishing it from irrationality."}, {"text": "The impact of inherent human selfishness on the failure of collective action.", "isCorrect": false, "rationale": "The text repeatedly states that the problem in the Stag Hunt is not selfishness, but trust and uncertainty."}], "id": "q05"}, {"question": "Considering the Stag Hunt model, why might countries hesitate to commit to international climate agreements even if all countries would benefit from collective emissions reductions?", "options": [{"text": "Each country prioritizes its own immediate economic growth over any long-term environmental benefits.", "isCorrect": false, "rationale": "While economic growth is a factor, the text emphasizes that the failure is 'not selfishness but lack of confidence in coordination,' suggesting the problem is trust, not purely self-interest overriding collective benefit."}, {"text": "They fear that their own efforts to reduce emissions will be negated if other countries do not follow through with their commitments.", "isCorrect": true, "rationale": "The text directly states this example: 'But each country fears that others will not follow through, making its own sacrifices futile (hunting hare alone).'"}, {"text": "The scientific evidence for climate change is too ambiguous for countries to justify significant policy changes.", "isCorrect": false, "rationale": "The text focuses on the strategic interaction and trust, not the scientific basis of climate change."}, {"text": "International climate agreements are typically too complex and unwieldy to be effectively implemented.", "isCorrect": false, "rationale": "The complexity of agreements is not highlighted as the core Stag Hunt problem; rather, it's the lack of confidence in others' participation."}], "id": "q06"}, {"question": "A new communication standard, such as a novel messaging app, might fail to achieve widespread adoption even if it offers superior features. According to the Stag Hunt model, what is the most likely underlying cause?", "options": [{"text": "The app's developers are too focused on profit, making the service too expensive for the average user.", "isCorrect": false, "rationale": "The text does not link the failure to developer's profit motives or pricing, but to user adoption dynamics."}, {"text": "Individual users are reluctant to switch to the new app until they are confident that many others will do the same.", "isCorrect": true, "rationale": "This aligns with the example: 'Each person waits to see if others will switch, and the superior technology may never reach critical mass.' This is the 'hare' strategy due to uncertainty."}, {"text": "The technology itself is too complex for most users to understand, leading to low engagement.", "isCorrect": false, "rationale": "The scenario assumes the technology is 'superior,' implying it functions well. The problem isn't technical difficulty but the coordination of adoption."}, {"text": "Established competitors actively work to sabotage the new standard's reputation and user base.", "isCorrect": false, "rationale": "While competitive sabotage can happen, the Stag Hunt model focuses on internal coordination challenges and mutual uncertainty, not external conflict."}], "id": "q07"}, {"question": "The 'keyconcept' section states that cooperation can fail in a Stag Hunt even when everyone prefers the cooperative outcome. What is identified as the core problem preventing cooperation in such cases?", "options": [{"text": "Conflicting interests among the participants, leading to a struggle for individual gain.", "isCorrect": false, "rationale": "The text explicitly states, 'The problem is not conflicting interests but uncertainty about others' choices.'"}, {"text": "The inherent irrationality of individuals when faced with complex decisions.", "isCorrect": false, "rationale": "The text clarifies that the problem 'is not that cooperation is irrational but that it is risky.'"}, {"text": "Uncertainty about others' choices, which makes committing to the cooperative outcome seem risky.", "isCorrect": true, "rationale": "The text states: 'The problem is not conflicting interests but uncertainty about others' choices. Building trust... can shift groups from the safe-but-low-reward equilibrium (hare) to the risky-but-high-reward equilibrium (stag).'"}, {"text": "A lack of sufficient resources to achieve the high-reward cooperative outcome.", "isCorrect": false, "rationale": "The problem isn't a lack of resources but the coordination and trust required to pool efforts effectively for the 'large prize.'"}], "id": "q08"}, {"question": "For policy implications, what type of mechanism is most effective for addressing cooperation failures in a Stag Hunt situation, as opposed to a Prisoner's Dilemma?", "options": [{"text": "Strict enforcement mechanisms, such as contracts, penalties, and external authorities.", "isCorrect": false, "rationale": "The text states these are needed for a 'true Prisoner's Dilemma,' not a Stag Hunt."}, {"text": "Mechanisms that make defection the dominant strategy, forcing players to compete more effectively.", "isCorrect": false, "rationale": "This would exacerbate the problem, encouraging players to choose the 'hare' strategy, or convert it into a Prisoner's Dilemma scenario."}, {"text": "Assurance mechanisms, like public commitments or credible signals, to build confidence in mutual cooperation.", "isCorrect": true, "rationale": "The text advises, 'In a Stag Hunt, you may only need assurance: credible signals that others will cooperate. A handshake, a public commitment, or even a shared history of successful cooperation can be enough.'"}, {"text": "Mandatory arbitration and judicial intervention to resolve disputes between parties.", "isCorrect": false, "rationale": "While dispute resolution is important in general, it's not the primary 'assurance' mechanism suggested for moving from hare to stag in a Stag Hunt."}], "id": "q09"}, {"question": "According to the 'realworld' section, what is a crucial role that leadership often plays in moving a group toward the cooperative 'stag' outcome?", "options": [{"text": "To establish a system of individual rewards that incentivizes competitive behavior among group members.", "isCorrect": false, "rationale": "This would encourage individualism ('hare' thinking) and undermine cooperation, rather than facilitate it."}, {"text": "To be the first to commit to the 'stag' strategy and make that commitment clearly visible to others.", "isCorrect": true, "rationale": "The text explicitly states, 'Leadership often consists of being the first to commit to the stag and making that commitment visible.' This acts as an assurance mechanism."}, {"text": "To enforce compliance through threats of punishment for any individual who chooses the 'hare' strategy.", "isCorrect": false, "rationale": "While enforcement is a tool, for Stag Hunts, 'assurance' is needed, not necessarily 'enforcement mechanisms' which are more for Prisoner's Dilemmas."}, {"text": "To obscure information about other players' intentions, thereby encouraging independent decision-making.", "isCorrect": false, "rationale": "Obscuring information would increase uncertainty, which is the core problem in the Stag Hunt, making cooperation less likely."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
