<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the core principle of the Lindy Effect?", "options": [{"text": "The longer something has existed, the more likely it is to decay quickly.", "isCorrect": false, "rationale": "This statement is the opposite of the Lindy Effect's principle for non-perishable items."}, {"text": "For non-perishable things, the future life expectancy is proportional to how long they have already survived.", "isCorrect": true, "rationale": "This accurately defines the Lindy Effect, stating that longevity predicts future longevity for non-perishable items."}, {"text": "New ideas and technologies are inherently more valuable and durable than older ones.", "isCorrect": false, "rationale": "The Lindy Effect suggests the opposite, favoring things with a proven track record of survival over new, unproven ones."}, {"text": "All things, whether living or non-living, have a fixed, predetermined lifespan.", "isCorrect": false, "rationale": "The Lindy Effect specifically distinguishes between perishable (living) and non-perishable items regarding their lifespan predictions, contradicting a fixed lifespan for all."}], "id": "q01"}, {"question": "The Lindy Effect was originally observed by comedians at Lindy's delicatessen in New York City in the 1960s. What specific phenomenon were they observing?", "options": [{"text": "The duration of political careers.", "isCorrect": false, "rationale": "The text states the observation was about Broadway shows, not political careers."}, {"text": "The lifespan of new restaurants and eateries.", "isCorrect": false, "rationale": "The observation was specifically about shows, not restaurants in general."}, {"text": "The future life expectancy of Broadway shows.", "isCorrect": true, "rationale": "The text explicitly states that comedians observed the future life expectancy of a Broadway show was proportional to how long it had already been running."}, {"text": "The durability of physical buildings and infrastructure.", "isCorrect": false, "rationale": "This is a perishable item context and not what the original observation was about, which focused on cultural artifacts like shows."}], "id": "q02"}, {"question": "How does the Lindy Effect fundamentally challenge our common intuition about aging and decay?", "options": [{"text": "It suggests that all things, including living organisms, tend to live longer the older they get.", "isCorrect": false, "rationale": "The text explicitly states that for living things, 'age means decay,' directly contrasting with this option."}, {"text": "It argues that decay is an illusion and nothing truly perishes over time.", "isCorrect": false, "rationale": "The text acknowledges that things go out of print, become obsolete, etc., but focuses on *what survives* and why."}, {"text": "It posits that for non-perishable items, longevity itself is evidence of robustness and a predictor of future survival, unlike perishable items where age typically signals decline.", "isCorrect": true, "rationale": "This captures the core distinction: perishable items decay with age, while non-perishable items gain expected lifespan with age due to having passed tests of time."}, {"text": "It claims that all things eventually become obsolete, regardless of their initial design or utility.", "isCorrect": false, "rationale": "The Lindy Effect highlights items that *don't* become obsolete easily, showing evidence of enduring utility."}], "id": "q03"}, {"question": "According to the text, the Lindy Effect works for non-perishable things because they are subjected to a process analogous to:", "options": [{"text": "Planned obsolescence, where items are designed to fail after a certain period.", "isCorrect": false, "rationale": "Planned obsolescence is the opposite of the survival mechanism described by the Lindy Effect."}, {"text": "Random mutation and genetic drift.", "isCorrect": false, "rationale": "While related to biological evolution, the text uses a more general term for the process of survival of the fittest."}, {"text": "Natural selection, where only the most robust and useful items survive the test of time.", "isCorrect": true, "rationale": "The text explicitly states, 'The Lindy Effect works because non-perishable things face a kind of natural selection.'"}, {"text": "Market demand, where popularity alone determines survival.", "isCorrect": false, "rationale": "While market demand plays a role, the text emphasizes inherent 'quality' and 'usefulness' as the reason for survival, tested by time, not just fleeting popularity."}], "id": "q04"}, {"question": "A five-year-old startup company and a two-hundred-year-old university both exist today. Based on the Lindy Effect, which of the following is the most reasonable conclusion about their future survival?", "options": [{"text": "The startup, being innovative, is more likely to survive for another five years than the university for another two hundred.", "isCorrect": false, "rationale": "The Lindy Effect would suggest the opposite: the university's long survival is evidence of its robustness, while the startup's future is still highly uncertain."}, {"text": "The university's track record of surviving wars, crises, and revolutions makes it far more likely to continue surviving than the startup.", "isCorrect": true, "rationale": "The text states, 'A two-hundred-year-old university has already demonstrated its ability to survive... That track record is informative,' which is a direct application of the Lindy Effect."}, {"text": "Both institutions are equally likely to fail in the next decade, as the future is unpredictable.", "isCorrect": false, "rationale": "The Lindy Effect provides a predictive heuristic, suggesting that past survival is *not* irrelevant for non-perishable entities."}, {"text": "The Lindy Effect does not apply to companies or universities because they are economic entities.", "isCorrect": false, "rationale": "The text explicitly mentions 'institutions' as a category to which the Lindy Effect applies, and universities are institutions. Startups, as individual companies, are an area where caution is advised, but the *contrast* between them still illustrates the effect."}], "id": "q05"}, {"question": "According to the Lindy Effect, when evaluating advice or wisdom, which approach is most favored?", "options": [{"text": "Prioritizing the latest productivity hacks and contemporary self-help trends.", "isCorrect": false, "rationale": "The text contrasts 'the latest productivity hack' with 'wisdom that has persisted across centuries and cultures,' suggesting the latter is favored."}, {"text": "Focusing solely on advice that has been scientifically validated, regardless of its age.", "isCorrect": false, "rationale": "While scientific validation is good, the Lindy Effect emphasizes longevity as evidence of soundness, not just recent scientific backing."}, {"text": "Seeking wisdom that has persisted across centuries and cultures.", "isCorrect": true, "rationale": "The text explicitly states that the Lindy Effect 'suggests that wisdom that has persisted across centuries and cultures... is more likely to be sound than the latest productivity hack.'"}, {"text": "Discarding any advice that is more than a decade old as outdated.", "isCorrect": false, "rationale": "This contradicts the core premise of the Lindy Effect, which values long-standing wisdom."}], "id": "q06"}, {"question": "The caution section notes that the Lindy Effect applies to non-perishable things. Which of the following examples is *specifically identified* as a perishable thing to which the Lindy Effect would NOT apply in the same way?", "options": [{"text": "The concept of compound interest.", "isCorrect": false, "rationale": "Concepts are non-perishable; the text lists compound interest as an example of something that survives due to usefulness."}, {"text": "A two-hundred-year-old university.", "isCorrect": false, "rationale": "Universities are institutions, considered non-perishable, and are used as an example of something to which the Lindy Effect *does* apply."}, {"text": "A bridge that has stood for a century and whose materials have degraded.", "isCorrect": true, "rationale": "The text specifically uses a 'bridge that has stood for a century [that] may be closer to collapse' as an example of a physical structure subject to material fatigue, a perishable item."}, {"text": "The programming language Python.", "isCorrect": false, "rationale": "Programming languages are technologies, considered non-perishable, and Python is used as an example of a language that has demonstrated utility over decades."}], "id": "q07"}, {"question": "Based on the 'realworld' example of programming languages, why would an organization choose to use a language like C (created 1972) for a new, critical production system in the mid-2020s, despite the existence of much newer alternatives?", "options": [{"text": "C is a 'cutting-edge' language that guarantees superior performance over modern alternatives.", "isCorrect": false, "rationale": "C is an old language; while it can offer performance, the text emphasizes its longevity rather than 'cutting-edge' status for the Lindy Effect."}, {"text": "The decades of its use have demonstrated its utility and robustness across a wide range of conditions, making its continued survival highly probable.", "isCorrect": true, "rationale": "The text states, 'Languages that have survived decades of technological change have demonstrated their utility across a wide range of conditions,' applying the Lindy Effect to C."}, {"text": "Newer languages are inherently more complex and difficult to integrate into existing systems.", "isCorrect": false, "rationale": "The text does not make this general claim; it focuses on the proven track record of older languages as the key factor."}, {"text": "The cost of developing in C is significantly lower than for any modern language.", "isCorrect": false, "rationale": "The text does not mention cost as a factor for choosing C based on the Lindy Effect."}], "id": "q08"}, {"question": "The text states, 'Longevity is evidence of robustness.' For what type of entities is this statement most applicable according to the Lindy Effect?", "options": [{"text": "Living organisms, such as humans and animals.", "isCorrect": false, "rationale": "The text explicitly contrasts living things, where age means decay, with non-perishable things for the Lindy Effect."}, {"text": "Physical structures like cars and bridges that are subject to material fatigue.", "isCorrect": false, "rationale": "The caution section specifically uses a bridge as an example of something where material degradation makes this statement less applicable."}, {"text": "Non-perishable items such as ideas, technologies, books, and institutions.", "isCorrect": true, "rationale": "The 'keyconcept' box directly applies this to 'non-perishable things — ideas, technologies, books, institutions.'"}, {"text": "Individual companies and careers, which often have unpredictable lifespans.", "isCorrect": false, "rationale": "The caution section mentions 'individual companies, careers' as perishable things to which the Lindy Effect does not apply."}], "id": "q09"}, {"question": "A content creator is deciding whether to focus their educational content on a recently trending online phenomenon or on a foundational concept that has been taught for centuries. How would the Lindy Effect influence their decision if their goal is long-term relevance?", "options": [{"text": "They should focus on the trending phenomenon, as novelty attracts more attention and guarantees relevance.", "isCorrect": false, "rationale": "This contradicts the Lindy Effect, which suggests new things are unproven and may be merely fashionable."}, {"text": "They should choose the foundational concept, as its long survival suggests enduring usefulness and a high probability of continued relevance.", "isCorrect": true, "rationale": "This is a direct application of the Lindy Effect: 'If you want to know which ideas will still matter in a century, look at which ideas have already mattered for a century.'"}, {"text": "The Lindy Effect is irrelevant here, as both content types appeal to different audiences.", "isCorrect": false, "rationale": "The Lindy Effect provides a 'powerful filter for separating the durable from the fashionable,' making it highly relevant to content relevance."}, {"text": "They should combine both, as the Lindy Effect advocates for a blend of old and new for optimal reach.", "isCorrect": false, "rationale": "While a balanced approach might have other merits, the Lindy Effect's specific advice is to 'bet on what has already survived' for durability, not necessarily a blend."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
