        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 32, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core definition of the Lollapalooza Effect, as described by Charlie Munger?", "options": [{"text": "A single, powerful psychological bias that dictates human behavior.", "isCorrect": false, "rationale": "The text explicitly states that the Lollapalooza Effect is not a single bias but a convergence of multiple forces."}, {"text": "The simultaneous convergence of multiple psychological biases, incentives, and forces pushing in the same direction.", "isCorrect": true, "rationale": "The text defines the Lollapalooza Effect as occurring 'when multiple biases, incentives, and psychological forces all push in the same direction simultaneously.'"}, {"text": "The phenomenon where individuals can easily manage and correct for their biases one at a time.", "isCorrect": false, "rationale": "The text states that while a single bias is manageable, the combined effect of multiple biases is 'almost irresistible,' making rational analysis collapse."}, {"text": "A type of cognitive bias where people intentionally ignore warning signs due to overconfidence.", "isCorrect": false, "rationale": "This describes a symptom or a related bias (like confirmation bias), but not the overarching Lollapalooza Effect itself."}]}, {"question": "According to the text, what is the primary consequence when the Lollapalooza Effect is strongly at play?", "options": [{"text": "Individuals become more adept at identifying and correcting their personal biases.", "isCorrect": false, "rationale": "The text states that when multiple forces align, 'rational analysis collapses' and people do 'obviously foolish' things, indicating a decrease in bias correction."}, {"text": "Rational analysis often collapses, leading otherwise intelligent people to make decisions that seem foolish in retrospect.", "isCorrect": true, "rationale": "The text states, 'Rational analysis collapses. Otherwise intelligent people do things that, in retrospect, seem obviously foolish.'"}, {"text": "It consistently leads to spectacular achievements and prevents catastrophic failures.", "isCorrect": false, "rationale": "The text mentions it explains 'both the most spectacular achievements and the most catastrophic failures.'"}, {"text": "It simplifies decision-making by clarifying the most logical path forward.", "isCorrect": false, "rationale": "The effect makes decisions 'feel obvious and irresistible' due to biased reinforcement, not necessarily because they are actually sound or logical."}]}, {"question": "How does the Lollapalooza Effect fundamentally differ from managing a single psychological bias?", "options": [{"text": "A single bias is always more powerful than the Lollapalooza Effect.", "isCorrect": false, "rationale": "The text explicitly states that 'each individual force may be modest; their convergence produces effects that are far greater than any single bias could achieve.'"}, {"text": "The Lollapalooza Effect involves a convergence of multiple forces, making its influence almost irresistible, whereas a single bias is often manageable.", "isCorrect": true, "rationale": "The text differentiates by stating 'A single bias is manageable... But when confirmation bias, social proof, commitment and consistency bias, loss aversion, and incentive-driven reasoning all align... the combined effect is almost irresistible.'"}, {"text": "Single biases exclusively affect individual behavior, while the Lollapalooza Effect only impacts group dynamics.", "isCorrect": false, "rationale": "The effect can influence both individual decisions (e.g., in an auction) and group behavior (e.g., institutional corruption, cults)."}, {"text": "The Lollapalooza Effect is inherently positive, while single biases are always negative.", "isCorrect": false, "rationale": "The text clarifies that the effect can lead to 'spectacular achievements' (positive) or 'catastrophic failures' (negative)."}]}, {"question": "In the example of open-outcry auctions, which specific combination of psychological forces is cited as contributing to the Lollapalooza Effect?", "options": [{"text": "Authority bias, deindividuation, and intrinsic motivation.", "isCorrect": false, "rationale": "These biases are mentioned in the context of institutional corruption or positive team dynamics, not open-outcry auctions."}, {"text": "Social proof, commitment and consistency, reciprocity, scarcity, and loss aversion.", "isCorrect": true, "rationale": "The text explicitly lists these five forces as converging in an auction setting: 'social proof... commitment and consistency... reciprocity... scarcity... and loss aversion.'"}, {"text": "Anchoring, confirmation bias, and fear of missing out.", "isCorrect": false, "rationale": "While related, these are specifically linked to the financial housing bubble example, not the auction example in the text."}, {"text": "Shared purpose, mutual trust, and clear incentives.", "isCorrect": false, "rationale": "These are described as positive forces contributing to 'great teams,' not typical auction behavior."}]}, {"question": "What practical lesson does the text emphasize as an antidote to the negative influence of the Lollapalooza Effect?", "options": [{"text": "To focus solely on identifying and correcting each individual bias in isolation.", "isCorrect": false, "rationale": "The text states the lesson is 'not just to learn individual biases but to watch for convergence,' indicating that individual correction alone is insufficient."}, {"text": "To become suspicious of absolute certainty in a decision, particularly when multiple psychological forces are reinforcing that direction.", "isCorrect": true, "rationale": "The text advises: 'When you find yourself feeling absolutely certain about a decision, ask: how many separate psychological forces are pushing me in this direction? The more forces that align, the more suspicious you should be of your own certainty.'"}, {"text": "To always trust one's initial intuition, as it is often free from the influence of biases.", "isCorrect": false, "rationale": "The text suggests the opposite, that a decision feeling 'obvious and irresistible' may be so precisely due to reinforcing biases, not soundness."}, {"text": "To seek out environments where psychological biases are entirely absent to ensure rational decision-making.", "isCorrect": false, "rationale": "The text focuses on awareness and critical thinking in existing situations, not on finding bias-free environments, which are generally unrealistic."}]}, {"question": "Which set of factors was explicitly identified as contributing to the Lollapalooza Effect during the housing bubble of the mid-2000s?", "options": [{"text": "Reciprocity, deindividuation, and commitment escalation.", "isCorrect": false, "rationale": "These factors are primarily associated with the examples of open-outcry auctions (reciprocity) and institutional corruption/cults (deindividuation, commitment escalation)."}, {"text": "Shared purpose, mutual trust, and complementary skills.", "isCorrect": false, "rationale": "These factors describe the positive manifestation of the Lollapalooza Effect in 'great teams,' not the financial bubble."}, {"text": "Social proof, anchoring, incentive misalignment, confirmation bias, and loss aversion (fear of missing out).", "isCorrect": true, "rationale": "The text explicitly states: 'The housing bubble of the mid-2000s combined social proof... anchoring... incentive misalignment... confirmation bias... and loss aversion (fear of missing out).'"}, {"text": "Authority bias, social isolation, and intrinsic motivation.", "isCorrect": false, "rationale": "These biases are characteristic of cults and high-control groups (authority bias, social isolation), while intrinsic motivation is a positive force."}]}, {"question": "The text describes the individual forces contributing to the Lollapalooza Effect as typically:", "options": [{"text": "Overwhelmingly powerful on their own, often sufficient to cause extreme behavior.", "isCorrect": false, "rationale": "The text states, 'Each force, individually, is a modest push,' and 'No single factor would be sufficient,' implying they are not overwhelmingly powerful on their own."}, {"text": "Modest pushes that, when combined, become nearly irresistible and produce effects far greater than any single bias.", "isCorrect": true, "rationale": "The 'keyconcept' section states: 'Each individual force may be modest; their convergence produces effects that are far greater than any single bias could achieve.'"}, {"text": "Unrelated to known psychological biases, instead stemming from unique situational pressures.", "isCorrect": false, "rationale": "The text clearly identifies these forces as known psychological biases like 'confirmation bias, social proof, commitment and consistency bias, loss aversion,' etc."}, {"text": "Always negative in their impact, leading exclusively to failures and poor decisions.", "isCorrect": false, "rationale": "The text includes 'Great teams' as an example of positive Lollapalooza Effect, showing it's not always negative."}]}, {"question": "In the context of institutional corruption, beyond authority bias, social proof, and incentive structures, what additional factors emphasize the difficulty of resistance once minor wrongdoing has begun?", "options": [{"text": "Intrinsic motivation and shared purpose.", "isCorrect": false, "rationale": "Intrinsic motivation and shared purpose are positive forces, associated with great teams, not with the escalation of institutional corruption."}, {"text": "Deindividuation and commitment escalation.", "isCorrect": true, "rationale": "The text states, 'commitment escalation (having already participated in minor wrongdoing), and deindividuation (the diffusion of personal responsibility in a group)' contribute to institutional corruption."}, {"text": "Reciprocity and scarcity.", "isCorrect": false, "rationale": "These factors are specifically mentioned in the example of open-outcry auctions, not institutional corruption."}, {"text": "Anchoring and loss aversion.", "isCorrect": false, "rationale": "These biases are cited in the context of financial bubbles and open-outcry auctions, not specifically institutional corruption's escalation of wrongdoing."}]}, {"question": "The Lollapalooza Effect is often associated with negative outcomes, but the text provides an example of its positive manifestation. Which of the following best represents this positive application?", "options": [{"text": "Successful open-outcry auctions where items consistently sell for fair market value.", "isCorrect": false, "rationale": "Open-outcry auctions are presented as an example of the Lollapalooza Effect leading to people paying 'three times an item's value,' a negative outcome."}, {"text": "Financial bubbles that, despite initial excesses, correct themselves efficiently without widespread damage.", "isCorrect": false, "rationale": "The housing bubble is used as an example of the Lollapalooza Effect causing 'historic proportions' of damage, not a positive or self-correcting outcome."}, {"text": "Great teams achieving extraordinary results through the convergence of shared purpose, mutual trust, clear incentives, intrinsic motivation, and complementary skills.", "isCorrect": true, "rationale": "The 'realworld' section explicitly states: 'When shared purpose, mutual trust, clear incentives, intrinsic motivation, and complementary skills all converge, teams achieve things that none of their members could accomplish individually.'"}, {"text": "Individuals successfully overcoming multiple personal biases solely through increased self-awareness and rational thought.", "isCorrect": false, "rationale": "While self-awareness is part of the antidote, this describes an individual effort to counter biases, not the Lollapalooza Effect itself which involves reinforcing forces."}]}, {"question": "Who is primarily credited in the text with coining and popularizing the concept of the Lollapalooza Effect?", "options": [{"text": "The anonymous author of this textbook section.", "isCorrect": false, "rationale": "The text specifically attributes the concept to a well-known individual."}, {"text": "A leading financial analyst during the 2008 global financial crisis.", "isCorrect": false, "rationale": "While related to finance, the description points to a broader psychological theorist."}, {"text": "Charlie Munger.", "isCorrect": true, "rationale": "The first paragraph states: 'Charlie Munger, described in his influential 1995 talk 'The Psychology of Human Misjudgment' and in numerous subsequent lectures and interviews... Charlie Munger calls this convergence the Lollapalooza Effect.'"}, {"text": "A charismatic leader of a high-control group.", "isCorrect": false, "rationale": "Charismatic leaders are mentioned as *exploiting* the Lollapalooza Effect, not as its originator."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
