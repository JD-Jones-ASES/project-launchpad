<script>
var QUESTIONS = [{"question": "What was Theodore Sturgeon's primary motivation for coining 'Sturgeon's Law'?", "options": [{"text": "To argue that all literature, including science fiction, is inherently flawed.", "isCorrect": false, "rationale": "While Sturgeon acknowledged flaws, his motivation was not to condemn all literature but to defend a specific genre against unfair criticism."}, {"text": "To defend science fiction against critics by asserting that most things, not just sci-fi, are of poor quality.", "isCorrect": true, "rationale": "The text explicitly states Sturgeon's retort was 'ninety percent of science fiction is crud, but ninety percent of everything is crud,' directly defending his genre by universalizing the problem of mediocrity."}, {"text": "To establish a universal metric for evaluating the quality of art and media.", "isCorrect": false, "rationale": "Sturgeon's Law is described as a 'calibration tool' for expectations, not a metric for assigning a quality score to individual works."}, {"text": "To highlight the unique challenges faced by science fiction authors in the mid-20th century.", "isCorrect": false, "rationale": "While science fiction faced challenges, the law itself broadened the observation beyond the genre, making its primary motivation a general defense rather than a genre-specific complaint."}]}, {"question": "The phrase 'ninety percent of everything is crud' primarily serves to:", "options": [{"text": "Discourage engagement with popular culture due to its generally low quality.", "isCorrect": false, "rationale": "The law's purpose is not to discourage engagement but to help individuals wisely allocate their attention to find the good 10%."}, {"text": "Calibrate expectations, recognizing that mediocrity is the statistical norm across all domains.", "isCorrect": true, "rationale": "The text states, 'Sturgeon's Law is a calibration tool. It sets your expectations correctly.' It emphasizes that this base rate of mediocrity is 'normal, not alarming.'"}, {"text": "Criticize the decline in quality of various forms of media over time.", "isCorrect": false, "rationale": "The text clarifies, 'This is not a crisis. This is the base rate,' implying it's a constant phenomenon rather than a decline."}, {"text": "Suggest that the pursuit of excellence is a futile endeavor.", "isCorrect": false, "rationale": "On the contrary, the law encourages the 'invest[ment of] energy in finding the few' excellent pieces."}]}, {"question": "According to Sturgeon's Law, how should one approach seeking out new books or media?", "options": [{"text": "Expect every new piece of content to be excellent to maintain high standards.", "isCorrect": false, "rationale": "The text warns that expecting every book to be excellent will lead to 'perpetual disappointment.'"}, {"text": "Prioritize quantity over quality, consuming as much as possible to increase chances of finding something good.", "isCorrect": false, "rationale": "While more content might mean more good, the law emphasizes *investing energy* in finding the good, implying a more selective approach rather than indiscriminate consumption."}, {"text": "Understand that most offerings will be forgettable, and focus energy on identifying the exceptional few.", "isCorrect": true, "rationale": "This directly aligns with the text: 'If you understand that most books are forgettable and a few are life-changing, you will invest your energy in finding the few rather than lamenting the many.'"}, {"text": "Conclude that since most things are mediocre, serious engagement with new content is rarely worthwhile.", "isCorrect": false, "rationale": "This misinterprets the law, which aims to help one find the good 10%, not to dismiss engagement entirely."}]}, {"question": "A critic dismisses modern music, stating, 'This new pop song with simplistic lyrics proves that all contemporary music lacks depth.' How would Sturgeon's Law apply to this argument?", "options": [{"text": "It supports the critic's view by acknowledging that 90% of pop music is indeed shallow.", "isCorrect": false, "rationale": "Sturgeon's Law is a defense 'against a common rhetorical trick: dismissing an entire category by pointing to its worst examples.'"}, {"text": "It suggests the critic is making a valid point about the overall decline in musical quality.", "isCorrect": false, "rationale": "The law challenges the generalization from a single bad example to an entire category, rather than validating it."}, {"text": "It highlights that using a single poor example to condemn an entire category is a failure of base-rate reasoning.", "isCorrect": true, "rationale": "The text states this is a 'common rhetorical trick' where 'the critic has found a specimen from the ninety percent and used it to condemn the whole,' which is a 'failure of base-rate reasoning.'"}, {"text": "It implies that the critic should instead focus on comparing modern music to historical masterpieces.", "isCorrect": false, "rationale": "While comparisons are valuable, the law's specific point here is about the logical fallacy of using a worst example to dismiss the whole category."}]}, {"question": "The text states, 'Pointing to the brilliant ten percent does not redeem the mediocre ninety percent.' What core idea does this statement convey?", "options": [{"text": "Exceptional examples elevate the overall quality perception of a field, even if undeserved.", "isCorrect": false, "rationale": "The statement argues the opposite: the good examples *do not* redeem the mediocre ones, meaning they don't elevate the overall quality perception truthfully."}, {"text": "The presence of high-quality work in a field does not guarantee the general reliability or excellence of that field.", "isCorrect": true, "rationale": "This aligns directly with the text's example: 'The existence of Shakespeare does not mean that most plays are good. The existence of a few rigorous nutrition studies does not mean that the field of nutrition science is generally reliable.'"}, {"text": "Truly brilliant works are so rare they have little impact on the average quality of a genre.", "isCorrect": false, "rationale": "The statement isn't about the impact of brilliant works but about the fallacy of using them to generalize about the overall quality of the mediocre majority."}, {"text": "Critics should only focus on the worst examples to identify areas needing improvement.", "isCorrect": false, "rationale": "Focusing solely on the worst examples is the *other* error of base-rate reasoning that Sturgeon's Law guards against."}]}, {"question": "How has the internet age affected the applicability of Sturgeon's Law?", "options": [{"text": "It has made the law less relevant because the quality of content has generally improved due to wider access.", "isCorrect": false, "rationale": "The text explicitly states the law has become 'more relevant, not less,' because while access is wonderful, it has worsened the 'signal-to-noise ratio.'"}, {"text": "The law is more relevant as the explosion of content has amplified both the volume of 'crud' and the challenge of finding 'excellence.'", "isCorrect": true, "rationale": "The text notes, 'The absolute quantity of crud grows enormously — but so does the absolute quantity of excellence. The percentage may not have changed. The challenge has shifted from scarcity... to curation...'"}, {"text": "The internet's democratizing effect has largely eliminated the '90% crud' problem by allowing more diverse voices to contribute.", "isCorrect": false, "rationale": "Democratization of production means 'anyone can publish anything,' leading to an *increase* in absolute crud, not an elimination of the problem."}, {"text": "It has shifted the focus from quality assessment to merely celebrating the sheer volume of available information.", "isCorrect": false, "rationale": "The focus has shifted to 'curation' and developing 'filters' to find the good, implying an ongoing need for quality assessment, not just volume celebration."}]}, {"question": "The text identifies 'developing filters' as a practical skill in a noisy world. Which of the following best exemplifies such a filter?", "options": [{"text": "Consuming all available content in a genre to ensure no good pieces are missed.", "isCorrect": false, "rationale": "This approach would lead to being overwhelmed by noise rather than effectively filtering it."}, {"text": "Relying solely on popular trends and best-seller lists for recommendations.", "isCorrect": false, "rationale": "While popular trends can point to good content, they often include much of the 90% 'crud,' making them an insufficient filter alone."}, {"text": "Cultivating critical judgment and seeking recommendations from trusted experts or sources.", "isCorrect": true, "rationale": "The text lists 'taste, expertise, trusted curators, and critical judgment' as examples of such filters."}, {"text": "Assuming most content will be bad and thus avoiding engagement with new material altogether.", "isCorrect": false, "rationale": "This defeats the purpose of the law, which is to help find the valuable 10%, not to disengage entirely."}]}, {"question": "The 'personbox' mentions that Sturgeon's observation has been applied 'far beyond literary criticism to any domain where quality varies widely — which is to say, every domain.' What does this statement imply about the law's nature?", "options": [{"text": "It is primarily a tool for literary analysis and should be used cautiously in other fields.", "isCorrect": false, "rationale": "The statement explicitly says it applies 'far beyond literary criticism' to 'every domain,' contradicting this option."}, {"text": "Its principle of base-rate mediocrity is a universal characteristic of human production and output.", "isCorrect": true, "rationale": "The application to 'every domain' implies that the observation about 90% crud is a fundamental, universal truth about human endeavors, regardless of the specific field."}, {"text": "It means that while the law originated in literature, its direct application to science or business is limited.", "isCorrect": false, "rationale": "The text's broad phrasing 'any domain where quality varies widely' (i.e., every domain) contradicts the idea of limited application."}, {"text": "The law's main utility is in discrediting entire categories, regardless of their domain.", "isCorrect": false, "rationale": "The law serves as a defense *against* discrediting entire categories and is a 'calibration tool,' not a discrediting tool."}]}, {"question": "Regarding the 'replication crisis' in psychology, Sturgeon's Law helps by:", "options": [{"text": "Excusing the problem of unreliable research by stating that most fields have similar issues.", "isCorrect": false, "rationale": "The text explicitly states that Sturgeon's Law 'does not excuse the problem — unreliable research is a serious institutional failure.'"}, {"text": "Providing a framework to understand that the existence of much unreliable research doesn't invalidate all psychological insights.", "isCorrect": true, "rationale": "The text explains, 'The existence of a large volume of unreliable research does not mean psychology has no insights to offer. It means that the filtering mechanisms... need to work harder.'"}, {"text": "Suggesting that the field of psychology should be entirely dismissed due to its high rate of irreproducible studies.", "isCorrect": false, "rationale": "This is the exact type of 'dismissing an entire category by pointing to its worst examples' that Sturgeon's Law advises against."}, {"text": "Highlighting that psychology is uniquely prone to producing 'crud' compared to other scientific fields.", "isCorrect": false, "rationale": "Sturgeon's Law applies to 'every domain,' implying that the base rate of mediocrity is not unique to psychology."}]}, {"question": "Considering Sturgeon's Law, if a new online platform launches, claiming to offer 'only the best' content by using a secret algorithm, what expectation should a discerning user have?", "options": [{"text": "The platform will likely succeed in filtering out 90% of crud, making content discovery effortless.", "isCorrect": false, "rationale": "The universal base rate suggests that even with sophisticated tools, completely eliminating the 'crud' is highly improbable, and filtering remains a challenge."}, {"text": "Despite the claim, the user should still expect to encounter a significant amount of mediocre content and employ personal filters.", "isCorrect": true, "rationale": "Sturgeon's Law implies that the '90% crud' is a base rate for *everything*, meaning even with curation efforts, a user must maintain realistic expectations and utilize their own judgment ('filters') to find the true signal."}, {"text": "The platform's algorithm, if truly secret, might bypass Sturgeon's Law, making it an exception.", "isCorrect": false, "rationale": "Sturgeon's Law describes a fundamental observation about human output; it's not something that can be easily 'bypassed' by a technological solution."}, {"text": "Such a platform is probably fraudulent, as no system can completely overcome the inherent mediocrity of most content.", "isCorrect": false, "rationale": "While skepticism is warranted, labeling it 'fraudulent' is too extreme; it's more about realistic expectations of what even advanced filtering can achieve against a universal base rate."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
