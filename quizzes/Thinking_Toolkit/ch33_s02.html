    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference between a 'tool' and an 'ideology' in the context of the models presented in the book?", "options": [{"text": "Tools are simple to understand, while ideologies are complex systems of thought.", "isCorrect": false, "rationale": "The text does not define the difference based on complexity. Instead, it focuses on the user's control over their application."}, {"text": "A tool is consciously chosen for specific situations, whereas an ideology unconsciously shapes all perceptions.", "isCorrect": true, "rationale": "The text states, 'A tool is something you pick up when you need it and put down when you are finished. An ideology is something that picks you up. Once it has you, you no longer choose when to apply it—it applies itself to everything, reshaping your perception so thoroughly that you cannot see the world without it.'"}, {"text": "Ideologies are inherently bad and lead to poor thinking, while tools are always beneficial.", "isCorrect": false, "rationale": "The text does not assign a moral judgment (good/bad) to tools or ideologies; it describes their operational nature and impact on perception."}, {"text": "Tools are subject to scientific testing and validation, but ideologies are not.", "isCorrect": false, "rationale": "While true that models (tools) can be tested, this is not the fundamental distinction between a tool and an ideology presented in the text."}]}, {"question": "Which statement best encapsulates the essence of intellectual humility as described in the text?", "options": [{"text": "It involves avoiding strong convictions and treating all ideas as equally valid.", "isCorrect": false, "rationale": "The text explicitly states, 'It does not mean refusing to hold strong opinions, declining to argue, or treating every idea as equally valid.'"}, {"text": "It means holding convictions firmly enough to act on them while remaining genuinely open to the possibility that you are wrong.", "isCorrect": true, "rationale": "This statement directly reflects the definition provided: 'Intellectual humility means holding your convictions firmly enough to act on them while remaining genuinely open to the possibility that you are wrong.'"}, {"text": "It is a form of intellectual timidity that discourages argument or debate.", "isCorrect": false, "rationale": "The text clarifies, 'Intellectual humility is not the same as intellectual timidity.'"}, {"text": "It requires accepting the certainty of one's own ignorance in all matters.", "isCorrect": false, "rationale": "Intellectual humility is about openness to being mistaken based on evidence, not a claim of certain ignorance in all areas, which might discourage firm convictions."}]}, {"question": "The author clarifies that intellectual humility is NOT any of the following EXCEPT:", "options": [{"text": "Refusing to hold strong opinions.", "isCorrect": false, "rationale": "The text explicitly states intellectual humility does NOT mean 'refusing to hold strong opinions.'"}, {"text": "Declining to argue or debate.", "isCorrect": false, "rationale": "The text explicitly states intellectual humility does NOT mean 'declining to argue.'"}, {"text": "Treating every idea as equally valid.", "isCorrect": false, "rationale": "The text explicitly states intellectual humility does NOT mean 'treating every idea as equally valid.'"}, {"text": "Being willing to say, 'I was mistaken,' and meaning it.", "isCorrect": true, "rationale": "This is precisely what intellectual humility IS. The question asks what it is NOT, EXCEPT for one option. Therefore, this option is the one that is NOT *not* intellectual humility."}]}, {"question": "Sarah, a scientist, is presented with new data that contradicts a long-held hypothesis she strongly advocated. Which of the following actions demonstrates intellectual humility according to the text?", "options": [{"text": "She dismisses the new data, stating her original hypothesis is well-established and unlikely to be wrong.", "isCorrect": false, "rationale": "This action demonstrates a lack of openness to being wrong and resistance to new evidence, contrary to intellectual humility."}, {"text": "She expresses doubt about her hypothesis and actively seeks to understand the new evidence, considering how it might change her understanding.", "isCorrect": true, "rationale": "This action exemplifies 'remaining genuinely open to the possibility that you are wrong' and responding honestly to evidence, which are key components of intellectual humility."}, {"text": "She argues vigorously against the new data, asserting that all scientific ideas are equally valid until proven with absolute certainty.", "isCorrect": false, "rationale": "The text states intellectual humility does not mean treating every idea as equally valid or declining to argue, but vigorous rejection of evidence is not humble."}, {"text": "She publicly retracts her hypothesis immediately without thoroughly evaluating the new data, out of fear of being wrong.", "isCorrect": false, "rationale": "Intellectual humility is an 'honest response to evidence,' not a 'social performance' driven by fear, and still involves holding convictions firmly enough to act."}]}, {"question": "The mention of biases like the Dunning-Kruger Effect, Confirmation Bias, and Hindsight Bias primarily serves to emphasize which point in the context of intellectual humility?", "options": [{"text": "That only unintelligent or poorly educated people are susceptible to cognitive errors.", "isCorrect": false, "rationale": "The text states these biases 'tell us we are human—and that being human means having systematic blind spots that no amount of intelligence can fully eliminate.'"}, {"text": "That human beings have systematic blind spots that even intelligence cannot overcome, necessitating humility.", "isCorrect": true, "rationale": "The text explains that these findings 'tell us we are human—and that being human means having systematic blind spots that no amount of intelligence can fully eliminate. Each of these findings is, in its own way, a call to humility.'"}, {"text": "That all human judgment is inherently unreliable and should be disregarded entirely.", "isCorrect": false, "rationale": "The text suggests using models to see more clearly, not to disregard all judgment. The goal is clarity, not complete self-distrust."}, {"text": "That these specific biases can be completely eliminated through diligent intellectual effort and self-awareness.", "isCorrect": false, "rationale": "The text explicitly states 'no amount of intelligence can fully eliminate' these systematic blind spots."}]}, {"question": "When the text applies Chesterton's Fence to the models themselves (e.g., Kahneman and Tversky, Kuhn, Popper), what is the core implication for how one should approach these models?", "options": [{"text": "One should only accept models that have stood the test of time and tradition without question.", "isCorrect": false, "rationale": "Chesterton's Fence is about understanding the *reason* for something's existence before dismantling it, not about blind adherence to tradition."}, {"text": "It is crucial to understand the specific problem a model was designed to solve before challenging or dismissing it.", "isCorrect": true, "rationale": "The text states, 'Before you dismiss any of these models, make sure you understand the problem it was built to solve. If you cannot explain why the fence was built, you do not yet understand the terrain well enough to take it down.'"}, {"text": "All established models, like fences, should never be questioned or altered in any way.", "isCorrect": false, "rationale": "The text later argues that all models are incomplete and subject to refinement and challenge, indicating they can and should be questioned, but thoughtfully."}, {"text": "The originators of the models were inherently right because they saw something important, making their models immune to criticism.", "isCorrect": false, "rationale": "While the originators 'saw something important,' the text clarifies that 'every one of these models is incomplete' and subject to refinement, meaning they are not immune to criticism."}]}, {"question": "The text states that 'every one of these models is incomplete' and 'all partial.' What is the central argument derived from this characteristic of the models?", "options": [{"text": "That the models are fundamentally flawed and should therefore not be used in any practical application.", "isCorrect": false, "rationale": "The text states, 'The models are not wrong, exactly, but they are all partial,' implying they are still valuable as tools, not fundamentally flawed."}, {"text": "That acknowledging their partiality is a weakness of the book's overall argument, demonstrating its limitations.", "isCorrect": false, "rationale": "The text explicitly refutes this: 'Recognizing this is not a weakness of the book—it is the book's central argument.'"}, {"text": "That each model offers a piece of the truth but leaves something out, underscoring the need for intellectual humility in their application.", "isCorrect": true, "rationale": "This directly aligns with the text: 'They each capture a piece of the truth and leave something out. Recognizing this is... the book's central argument,' emphasizing the need for humility when using them."}, {"text": "That future research will eventually create a single, perfectly complete model that encompasses all truths.", "isCorrect": false, "rationale": "The text focuses on the current nature of models as partial and the ongoing effort to think clearly, rather than promising a future, perfectly complete model."}]}, {"question": "What does the author identify as the book's 'central argument' regarding the models discussed?", "options": [{"text": "That all existing models are flawed and should be replaced with new, more accurate ones.", "isCorrect": false, "rationale": "The text states 'The models are not wrong, exactly, but they are all partial,' indicating they are not fundamentally flawed but incomplete."}, {"text": "That while models capture a piece of the truth, their inherent incompleteness is a crucial aspect to recognize and integrate into one's thinking.", "isCorrect": true, "rationale": "The text explicitly states: 'The models are not wrong, exactly, but they are all partial. They each capture a piece of the truth and leave something out. Recognizing this is not a weakness of the book—it is the book's central argument.'"}, {"text": "That the models provide definitive, unchallengeable truths about human cognition that should be universally accepted.", "isCorrect": false, "rationale": "This contradicts the idea that models are 'incomplete,' 'partial,' and 'subject to revision.'"}, {"text": "That the models, once understood, should be integrated into a new, comprehensive worldview to achieve intellectual certainty.", "isCorrect": false, "rationale": "The text distinguishes models as 'tools, not a worldview' and states 'The goal is not certainty.'"}]}, {"question": "According to the 'keyconcept' summary, what is the ultimate goal of intellectual humility in the application of models?", "options": [{"text": "To achieve absolute certainty in one's understanding of the world by using the most robust models.", "isCorrect": false, "rationale": "The text explicitly states, 'The goal is not certainty.'"}, {"text": "To engage in an honest, ongoing effort to think more clearly.", "isCorrect": true, "rationale": "The key concept summary directly states: 'The goal is not certainty but the honest, ongoing effort to think more clearly.'"}, {"text": "To develop a personal philosophy of life based on the insights gained from the various models.", "isCorrect": false, "rationale": "The text distinguishes the models as 'tools' and states they 'are not a worldview. They are not a philosophy of life.'"}, {"text": "To prove the superiority of one's own intellectual frameworks over those of others through rigorous debate.", "isCorrect": false, "rationale": "This is antithetical to the concept of intellectual humility, which involves openness to being wrong and avoiding intellectual timidity or arrogance."}]}, {"question": "The key concept 'Tools, Not Ideologies' implies that when applying the models from the book, one should primarily:", "options": [{"text": "Adopt them as a fixed worldview to interpret all aspects of reality without question.", "isCorrect": false, "rationale": "This is precisely what the text warns against, defining it as an 'ideology' that 'uses you' rather than a tool you choose to use."}, {"text": "Use them selectively when appropriate, understanding their limitations, and be open to revising them with new evidence.", "isCorrect": true, "rationale": "This option combines 'valuable in its domain, limited outside it, and always subject to revision in the light of new evidence,' which is the core meaning of treating models as tools."}, {"text": "Criticize them heavily because they are all incomplete and partial, and thus unreliable.", "isCorrect": false, "rationale": "The text states models are 'not wrong, exactly,' but partial. Recognizing incompleteness leads to humility, not outright dismissal."}, {"text": "Rely solely on their insights for decision-making, ignoring any conflicting perspectives or personal intuitions.", "isCorrect": false, "rationale": "This would be similar to an ideology, applying itself universally, rather than a tool used selectively with awareness of limitations and the need to 'take it down from your eye.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
