    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the core principle of the IKEA effect, as defined in the text?", "options": [{"text": "Consumers consistently prefer products that are technically superior and optimized for ease of use.", "isCorrect": false, "rationale": "The General Mills example shows that technical superiority and ease of use (like the original cake mix) did not guarantee sales; consumers felt it was 'too easy' and didn't value it as much."}, {"text": "People tend to place a disproportionately high value on things they have had a hand in creating, regardless of objective quality.", "isCorrect": true, "rationale": "This is the direct definition provided: 'we place disproportionately high value on things we have had a hand in creating, even when our contribution is modest and the final product is objectively no better than — or even worse than — something we could have bought ready-made.'"}, {"text": "Marketing strategies that involve ancient psychological phenomena are always more effective than modern approaches.", "isCorrect": false, "rationale": "While the phenomenon is ancient, the text does not claim that such strategies are *always* more effective, nor is it the core definition of the IKEA effect itself. It focuses on the specific bias of overvaluation due to creation."}, {"text": "The act of purchasing a product from a specific, well-known brand increases its perceived value for the consumer.", "isCorrect": false, "rationale": "The IKEA effect is about personal involvement and creation, not brand recognition or the act of purchasing from a particular brand. The experiments involved self-assembly, not brand loyalty."}], "id": "q01"}, {"question": "The change suggested by Ernest Dichter for General Mills' instant cake mix (requiring bakers to add a fresh egg) best illustrates which key aspect of the IKEA effect?", "options": [{"text": "The importance of optimizing product ingredients for superior objective quality.", "isCorrect": false, "rationale": "The text states the cakes were 'no better (arguably slightly worse)' after the change, indicating that objective quality improvement was not the goal or outcome. The powdered eggs were already optimized."}, {"text": "The preference for convenience over any form of personal involvement in product preparation.", "isCorrect": false, "rationale": "This is incorrect; sales were disappointing when the product was 'too easy.' Adding an egg, which made it less convenient, actually increased sales, demonstrating the opposite preference."}, {"text": "The psychological satisfaction and sense of ownership derived from investing personal labor and creativity.", "isCorrect": true, "rationale": "Adding an egg gave bakers 'a sense of personal involvement — of labor, of creation,' which led to increased sales. This directly aligns with the IKEA effect's emphasis on labor leading to attachment."}, {"text": "The financial benefit companies gain by transferring preparation labor from the manufacturer to the consumer.", "isCorrect": false, "rationale": "While this might be a side effect, the text focuses on the *psychological* reason for increased sales and satisfaction ('felt like theirs'), not the company's cost savings."}], "id": "q02"}, {"question": "According to the research by Norton, Mochon, and Ariely, what is the critical factor for the IKEA effect to manifest fully?", "options": [{"text": "The amount of time and effort an individual spends on the creation process, regardless of the outcome.", "isCorrect": false, "rationale": "The text explicitly states: 'It is not mere exposure or time spent that creates the attachment.' The key is not just the time but the successful conclusion."}, {"text": "The objective superiority of the self-created product compared to a ready-made alternative.", "isCorrect": false, "rationale": "The text states the effect occurs 'even when our contribution is modest and the final product is objectively no better than — or even worse than — something we could have bought ready-made.'"}, {"text": "The successful completion of the creation task, transforming effort into a sense of identity.", "isCorrect": true, "rationale": "The text emphasizes: 'The key finding was that the effect depends on successful completion. If participants started assembling something but were prevented from finishing, the extra valuation disappeared. ... Completion transforms effort into identity.'"}, {"text": "The monetary value attached to the raw materials used in the creation process.", "isCorrect": false, "rationale": "The text does not mention the cost of raw materials as a critical factor for the effect to manifest. The focus is on the labor and completion."}], "id": "q03"}, {"question": "How does the IKEA effect primarily impact an individual's evaluation of their own ideas or work, such as a business plan they spent months developing?", "options": [{"text": "It leads to a more objective and balanced assessment because the creator is intimately familiar with all aspects of the work.", "isCorrect": false, "rationale": "The text states the opposite: 'The IKEA effect means that creators are systematically biased judges of their own creations,' making objective evaluation nearly impossible."}, {"text": "It systematically biases their judgment, making their creations seem more brilliant or sound than they might objectively be.", "isCorrect": true, "rationale": "The text directly addresses this: 'The business plan you spent three months writing feels more brilliant than it might actually be. The strategy you developed feels more sound than the one your colleague proposed, not because you evaluated both objectively, but because one of them has your fingerprints on it.'"}, {"text": "It encourages critical self-reflection and prompt identification of flaws, leading to continuous improvement.", "isCorrect": false, "rationale": "The bias associated with the IKEA effect makes objective evaluation difficult, often leading to defense of one's creations rather than critical flaw identification."}, {"text": "It increases the likelihood of seeking external validation to confirm the objective quality of their work.", "isCorrect": false, "rationale": "While seeking outside evaluation is the antidote, the IKEA effect itself *causes* the bias, making someone less likely to perceive the need for external, objective validation, as they already overvalue their work."}], "id": "q04"}, {"question": "A manager consistently defends a failing restructuring plan they personally designed, advocated for, and implemented, despite growing evidence of its ineffectiveness. This behavior is most directly explained by which aspect of the IKEA effect?", "options": [{"text": "The sunk-cost fallacy, as they have already invested too much time and resources into the plan.", "isCorrect": false, "rationale": "While the sunk-cost fallacy might be at play (as noted in the software development example), the question asks for the *IKEA effect* explanation. The sunk-cost fallacy focuses on past investment distorting future decisions, while the IKEA effect specifically highlights personal ownership and identity with the creation."}, {"text": "The tendency to prefer familiar over novel solutions in high-stress organizational environments.", "isCorrect": false, "rationale": "This describes a general cognitive preference but is not the core mechanism of the IKEA effect, which is about overvaluing due to personal creation."}, {"text": "The feeling that 'killing the plan feels like killing a part of yourself,' making objective evaluation nearly impossible.", "isCorrect": true, "rationale": "This is a direct quote from the text, explicitly used to explain how the IKEA effect manifests in organizational settings: 'A restructuring plan that you designed, advocated for, and implemented becomes your plan in a way that makes objective evaluation nearly impossible. Killing the plan feels like killing a part of yourself.'"}, {"text": "A strategic move to maintain authority and demonstrate leadership within the organization.", "isCorrect": false, "rationale": "While managers might have such motivations, the IKEA effect explains the *internal psychological bias* toward their own creations, not external strategic maneuvering for power."}], "id": "q05"}, {"question": "Which of the following scenarios best represents the *positive* side of the IKEA effect as described in the text?", "options": [{"text": "A professional chef earning widespread acclaim for a technically perfect dish, demonstrating objective culinary excellence.", "isCorrect": false, "rationale": "This scenario focuses on objective quality and external recognition, not the intrinsic satisfaction derived from personal creation, which is the positive aspect of the IKEA effect."}, {"text": "A person feeling greater satisfaction and enjoyment from a meal they cooked entirely from scratch, even if it objectively tastes no better than a restaurant version.", "isCorrect": true, "rationale": "The text explicitly states: 'A meal cooked from scratch genuinely does provide more satisfaction than an identical meal from a restaurant — not because it tastes better (it probably does not), but because the labor invested creates a sense of accomplishment and ownership.'"}, {"text": "A consumer buying an expensive, ready-made luxury item for its perceived status and prestige.", "isCorrect": false, "rationale": "This involves purchasing a ready-made item based on external perceptions (status), not personal labor or creation, which is central to the IKEA effect."}, {"text": "An employee successfully negotiating a higher salary by showcasing the tangible results of their valuable contributions to a project.", "isCorrect": false, "rationale": "This involves a tangible reward for work, not the intrinsic satisfaction or increased valuation due to the act of creation itself. It's about performance and compensation, not the IKEA effect."}], "id": "q06"}, {"question": "The key concept 'Labor Leads to Love' summarizes the IKEA effect by emphasizing what crucial relationship?", "options": [{"text": "That investing extensive labor guarantees a high-quality, objectively superior outcome for the creator.", "isCorrect": false, "rationale": "The text clarifies that the result can be 'mediocre' and 'objectively no better than — or even worse than' ready-made items, contradicting the idea of guaranteed high quality."}, {"text": "That the act of contributing labor, even minimally, creates emotional attachment and leads to an overvaluation of the created item.", "isCorrect": true, "rationale": "The 'key concept' states: 'We overvalue things we helped create, even when our contribution is small and the result is mediocre.' This directly aligns with labor leading to emotional 'love' (attachment and overvaluation)."}, {"text": "That a pre-existing love or passion for a product must be present before an individual will invest labor in its creation.", "isCorrect": false, "rationale": "The phrase 'Labor Leads to Love' implies the opposite causality: the labor itself *generates* the 'love' or attachment, rather than being a prerequisite."}, {"text": "That only significant, highly skilled labor can truly lead to a deep sense of ownership and satisfaction.", "isCorrect": false, "rationale": "The text highlights 'even when our contribution is small' and demonstrates with simple tasks like assembling IKEA boxes or folding origami, suggesting that even modest labor can have this effect."}], "id": "q07"}, {"question": "In the 'realworld' example of software development, where engineers are reluctant to discard their code, the text states this is the IKEA effect *plus* the sunk-cost fallacy. What is the key distinction between the IKEA effect and the sunk-cost fallacy in this specific context?", "options": [{"text": "The sunk-cost fallacy explains the emotional attachment to the code due to personal involvement, while the IKEA effect focuses on the financial investment made in the project.", "isCorrect": false, "rationale": "This reverses the definitions. The IKEA effect is about emotional attachment due to *creation* and involvement, while the sunk-cost fallacy relates to past *investments* (time, money) distorting future decisions."}, {"text": "The IKEA effect refers to the overvaluation stemming from the act of *creating* the code, making it feel like 'theirs,' while the sunk-cost fallacy relates to the reluctance to abandon past *investments* (time/effort).", "isCorrect": true, "rationale": "The text explains the IKEA effect as the 'emotional weight of the hours spent writing it' because it's *their* creation. The sunk-cost fallacy (as per 'connections' section) is about 'how past investment distorts future decisions.' The distinction is between the 'love' of creation (IKEA) and the reluctance to waste past input (sunk-cost)."}, {"text": "The IKEA effect applies specifically to abstract concepts like code, whereas the sunk-cost fallacy is exclusive to tangible, physical objects.", "isCorrect": false, "rationale": "The IKEA effect applies to both physical items (IKEA boxes, origami) and abstract ideas (business plans, strategies). The sunk-cost fallacy also applies to both tangible and intangible investments."}, {"text": "The sunk-cost fallacy explains the increase in perceived objective quality of the code, while the IKEA effect explains the reluctance to seek outside evaluation.", "isCorrect": false, "rationale": "Neither statement is accurate for the primary distinction. The sunk-cost fallacy is about continuing investment due to past ones, not increasing perceived objective quality. The IKEA effect causes overvaluation, which *leads* to reluctance to seek objective evaluation, but that's an implication, not the core distinction from sunk-cost."}], "id": "q08"}, {"question": "A new online furniture retailer wants to leverage the IKEA effect to increase customer satisfaction and perceived value. Which strategy would be most effective, based on the principles discussed?", "options": [{"text": "Offering exclusively pre-assembled premium furniture options at a significantly higher price point.", "isCorrect": false, "rationale": "This strategy removes customer labor and involvement, directly counteracting the IKEA effect, which relies on the customer's contribution."}, {"text": "Providing highly detailed, step-by-step assembly instructions and all necessary tools with every standard furniture purchase.", "isCorrect": false, "rationale": "While helpful, standard assembly with detailed instructions might not foster the *unique* sense of creation or personalization needed for the full IKEA effect. The Build-a-Bear example shows deliberate *injection* of customer choice and labor beyond mere assembly."}, {"text": "Allowing customers to choose specific fabrics, finishes, and configurations for their furniture, and then requiring them to perform some final, significant assembly steps.", "isCorrect": true, "rationale": "This strategy directly mirrors the Build-a-Bear example by 'injecting customer labor into the product — choosing fabrics, stuffing the toy, adding a 'heart'' and then combining it with the assembly aspect, increasing both personalization and personal involvement."}, {"text": "Emphasizing the objective quality and durability of their furniture through expert reviews and certifications.", "isCorrect": false, "rationale": "This focuses on objective value and external validation, which does not leverage the IKEA effect. The IKEA effect functions even when the product is objectively no better than alternatives."}], "id": "q09"}, {"question": "Based on the text, what is presented as the most effective antidote to mitigate the negative biases introduced by the IKEA effect when evaluating one's own projects or ideas?", "options": [{"text": "To pause and reflect deeply on the project's journey, considering all challenges and successes from a personal perspective.", "isCorrect": false, "rationale": "While reflection is useful, the IKEA effect itself is a bias that makes objective self-evaluation difficult. Personal reflection alone might not overcome this inherent bias."}, {"text": "To ensure that all team members contribute equally to a project's creation, thus diffusing individual ownership.", "isCorrect": false, "rationale": "Equal contribution might spread the bias, but it doesn't eliminate the collective bias of the creating group. The text focuses on the individual's bias towards *their own* creation."}, {"text": "To meticulously document the project's objective performance metrics and compare them against industry benchmarks.", "isCorrect": false, "rationale": "While important for evaluation, the IKEA effect causes creators to be 'systematically biased judges' of their own work, meaning they might interpret these metrics differently or disproportionately, thus documentation alone isn't the antidote."}, {"text": "To actively seek objective outside evaluation from individuals who were not involved in the creation process.", "isCorrect": true, "rationale": "The text explicitly states: 'The antidote is not to stop creating — it is to seek outside evaluation from people who did not do the building.' This provides an unbiased perspective."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
