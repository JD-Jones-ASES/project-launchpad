<script>
var QUESTIONS = [{"question": "What is the core premise of the Chinese Room thought experiment regarding the person inside the room?", "options": [{"text": "The person inside the room eventually learns Chinese due to the extensive instruction manual.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not understand a word of Chinese' and 'You — the person inside the room — understand nothing,' despite following instructions perfectly. There is no mention of eventual learning."}, {"text": "The person understands nothing of Chinese but produces appropriate Chinese responses by following formal rules.", "isCorrect": true, "rationale": "The text clearly states the person does not understand Chinese but 'manipulating symbols according to rules' results in responses 'indistinguishable from those of a native Chinese speaker.'"}, {"text": "The person inside the room, combined with the manual, paper, and room, collectively understands Chinese.", "isCorrect": false, "rationale": "This describes the 'Systems Reply' objection, which Searle counters by stating that even if the entire system is internalized by the person, they still wouldn't understand Chinese. It is not the core premise of the initial setup, but an objection to Searle's conclusion."}, {"text": "The observers outside the room are immediately aware that the person inside does not understand Chinese.", "isCorrect": false, "rationale": "The text states that 'From outside the room, your responses are indistinguishable from those of a native Chinese speaker,' implying observers believe the room understands, making them unaware of the lack of understanding inside."}], "id": "q01"}, {"question": "John Searle introduced the Chinese Room argument primarily as a challenge to which specific claim?", "options": [{"text": "The claim that computers can simulate intelligent behavior (Weak AI).", "isCorrect": false, "rationale": "Searle explicitly states he 'had no objection to weak AI.' His target was the stronger claim that simulation *is* the real thing."}, {"text": "The claim that human consciousness can be fully explained by neuroscience.", "isCorrect": false, "rationale": "While related to the philosophy of mind, Searle's argument specifically targets the nature of understanding in artificial intelligence, not the broader scientific explanation of human consciousness."}, {"text": "The claim that a computer running the right program literally understands and has a mind (Strong AI).", "isCorrect": true, "rationale": "The text states the argument was 'designed as a direct challenge to what Searle called 'strong AI' — the claim that a computer running the right program literally understands and has a mind in the same sense that humans do.'"}, {"text": "The claim that language is solely a product of social interaction.", "isCorrect": false, "rationale": "The argument is about whether machines can genuinely understand language, not about the origins or nature of human language acquisition."}], "id": "q02"}, {"question": "According to Searle's three-step argument against Strong AI, what is the crucial distinction between programs and human minds?", "options": [{"text": "Programs operate on binary code, while human minds use natural language.", "isCorrect": false, "rationale": "While true that computers use binary and humans use natural language, this is a technical implementation detail and not the 'crucial distinction' Searle emphasizes. His focus is on how symbols are processed relative to meaning."}, {"text": "Programs are purely formal, manipulating symbols by syntactic rules, whereas human minds have semantics, understanding what symbols mean.", "isCorrect": true, "rationale": "Searle's argument states: 'Programs are purely formal — they manipulate symbols according to syntactic rules without regard to meaning,' and 'Human minds have semantics — they do not merely manipulate symbols but understand what those symbols mean.'"}, {"text": "Programs are limited by computational power, while human minds have infinite processing capacity.", "isCorrect": false, "rationale": "The argument does not center on the relative processing power or capacity, but on the qualitative difference in how symbols are handled (form vs. meaning)."}, {"text": "Programs are created by humans, while human minds are products of biological evolution.", "isCorrect": false, "rationale": "This is a statement about origin, not the functional or cognitive distinction that Searle's argument makes regarding understanding and mind."}], "id": "q03"}, {"question": "Which of Searle's replies would directly counter the claim that 'understanding is a property of the entire system — person, rule book, paper, room — not of any single component'?", "options": [{"text": "The Robot Reply", "isCorrect": false, "rationale": "The Robot Reply addresses the idea that physical interaction with the world might lead to understanding, not the idea that understanding emerges from the combined components of the Chinese Room itself."}, {"text": "The Brain Simulator Reply", "isCorrect": false, "rationale": "The Brain Simulator Reply deals with the idea that simulating neural activity would lead to understanding, which is distinct from the Systems Reply's claim about the Chinese Room's components."}, {"text": "The Other Minds Reply", "isCorrect": false, "rationale": "The Other Minds Reply questions how we know any other entity understands based on behavior, which is a different line of argument than the Systems Reply's claim about the system's collective understanding."}, {"text": "The Systems Reply (and Searle's counter-argument to it)", "isCorrect": true, "rationale": "The text explicitly states: 'The Systems Reply. The person in the room does not understand Chinese, but perhaps the system as a whole... does.' Searle's response is to imagine internalizing the system, concluding the individual still wouldn't understand."}], "id": "q04"}, {"question": "A modern AI system can generate remarkably fluent text, carry on extended conversations, and solve complex problems. According to Searle's argument, what conclusion can we *not* necessarily draw from these capabilities?", "options": [{"text": "That the AI system is an incredibly useful tool for studying the mind.", "isCorrect": false, "rationale": "Searle had 'no objection to weak AI,' which considers computers 'useful tools for studying the mind.' So, this conclusion is perfectly consistent with Searle's views."}, {"text": "That the AI system is truly 'intelligent' in the human sense.", "isCorrect": true, "rationale": "Searle's argument contends that 'running a program is not sufficient for understanding.' Even highly sophisticated symbol manipulation does not constitute 'genuine comprehension,' meaning we cannot conclude it is truly intelligent simply from its outputs."}, {"text": "That the AI system is processing inputs and generating outputs according to formal rules.", "isCorrect": false, "rationale": "This is precisely what Searle argues computers do: 'processing inputs and generating outputs according to formal rules.' This is a factual statement about how programs work, not a conclusion we cannot draw."}, {"text": "That the AI system is demonstrating complex behavioral patterns.", "isCorrect": false, "rationale": "The ability to generate fluent text and carry conversations is indeed a demonstration of complex behavioral patterns. Searle's argument acknowledges intelligent behavior but questions the underlying understanding."}], "id": "q05"}, {"question": "Searle rebuts the Brain Simulator Reply by using an analogy. What is the essence of this analogy?", "options": [{"text": "A simulated brain can only produce simulated thoughts, not real ones.", "isCorrect": false, "rationale": "While this aligns with Searle's overall point, the specific analogy he uses is more concrete and direct than a general statement about 'simulated thoughts.'"}, {"text": "Simulating a physical process does not make the simulation produce the physical process itself (e.g., simulating digestion does not digest anything).", "isCorrect": true, "rationale": "The text states: 'Searle's response: even a perfect neuron-by-neuron simulation is still a simulation. Simulating digestion does not digest anything; simulating a storm does not get anything wet. Why should simulating a brain produce understanding?'"}, {"text": "Just as a map is not the territory, a brain simulation is not the actual brain.", "isCorrect": false, "rationale": "This is a common philosophical analogy, but it is not the one Searle specifically used in the text to counter the Brain Simulator Reply."}, {"text": "A computer model of a brain can never capture the complexity of real neural networks.", "isCorrect": false, "rationale": "Searle's argument for the Brain Simulator Reply even considers a *perfect* neuron-by-neuron simulation, so its rebuttal doesn't rely on the current limitations of modeling complexity."}], "id": "q06"}, {"question": "The 'Robot Reply' suggests that a computer interacting with the real world via sensors and robotic limbs might develop genuine understanding. How does Searle specifically respond to this?", "options": [{"text": "He concedes that such an embodied system might indeed achieve genuine understanding.", "isCorrect": false, "rationale": "Searle's response is a rebuttal, not a concession. He maintains his central argument."}, {"text": "He argues that adding sensors and motors still means the computer is merely manipulating formal symbols according to a program.", "isCorrect": true, "rationale": "Searle's response is: 'adding sensors and motors does not change the fundamental issue. The computer is still running a program, still manipulating formal symbols.'"}, {"text": "He claims that only biological brains can interface with the real world in a way that leads to understanding.", "isCorrect": false, "rationale": "While he references biological brains in other contexts (Other Minds Reply), his specific counter to the Robot Reply focuses on the symbolic nature of the program, not the biological necessity of the interface."}, {"text": "He suggests that such a robot would only be demonstrating 'weak AI,' not 'strong AI.'", "isCorrect": false, "rationale": "While it falls under weak AI if it only simulates, Searle's specific response addresses *why* it doesn't achieve *strong AI* (genuine understanding) despite embodiment, pointing to the underlying programmatic symbol manipulation."}], "id": "q07"}, {"question": "What does the Chinese Room argument, according to the text, *not* definitively prove?", "options": [{"text": "That programs are purely formal and manipulate symbols syntactically.", "isCorrect": false, "rationale": "This is a core premise of Searle's argument, which he presents as a given characteristic of programs, not something the argument itself is trying to prove."}, {"text": "That human minds possess semantics and understand meaning.", "isCorrect": false, "rationale": "This is another core premise of Searle's argument, taken as a characteristic of human minds, not a conclusion the argument is designed to prove about them."}, {"text": "That machines are fundamentally incapable of understanding language under any circumstances.", "isCorrect": true, "rationale": "The text states: 'Searle's argument does not prove that machines cannot understand. It argues that running a program is not sufficient for understanding.' It leaves open the possibility of other mechanisms."}, {"text": "That behaving intelligently is not equivalent to genuinely being intelligent.", "isCorrect": false, "rationale": "This is a central conclusion and implication of the argument, highlighting the gap between performance and comprehension. The 'Key Concept' box explicitly reinforces this idea."}], "id": "q08"}, {"question": "The 'thinkaboutit' section prompts reflection on where understanding resides, asking if the room-plus-person-plus-rulebook system might understand Chinese. What philosophical concept is this question primarily exploring?", "options": [{"text": "The nature of consciousness as an emergent property of complex systems.", "isCorrect": false, "rationale": "While related, the question specifically focuses on 'understanding' as a property, and the idea that it might reside in a 'system' rather than a 'component,' which aligns more directly with holism or emergent properties of systems in general, rather than solely consciousness."}, {"text": "The distinction between syntax and semantics in language processing.", "isCorrect": false, "rationale": "While central to Searle's overall argument, the 'thinkaboutit' question shifts focus from the syntax/semantics distinction itself to *where* understanding (semantics) could potentially be located within a complex system."}, {"text": "The idea of understanding as a property of a holistic system rather than individual parts.", "isCorrect": true, "rationale": "The question explicitly asks, 'If understanding is a property of systems rather than components, then perhaps the room-plus-person-plus-rulebook system understands Chinese,' directly exploring the philosophical concept of understanding as a holistic or systemic property."}, {"text": "The ethical implications of developing artificial intelligence.", "isCorrect": false, "rationale": "The question is a metaphysical/cognitive one about the nature and location of understanding, not an ethical one about AI development."}], "id": "q09"}, {"question": "According to the 'keyconcept' box, what is the 'gap' highlighted by the Chinese Room argument, even if a system passes a behavioral test for intelligence?", "options": [{"text": "The gap between simulating intelligence and achieving human-level intelligence.", "isCorrect": false, "rationale": "The argument addresses the nature of understanding itself, not just the level of intelligence compared to humans. A system could be 'human-level' in behavior but still lack understanding according to Searle."}, {"text": "The gap between merely manipulating symbols according to rules and genuinely understanding their meaning.", "isCorrect": true, "rationale": "The 'keyconcept' states: 'The Chinese Room argues that manipulating symbols according to formal rules — no matter how perfectly — is not the same as understanding what those symbols mean.' This is precisely the gap between behaving intelligently (manipulating symbols) and being intelligent (understanding meaning)."}, {"text": "The gap between current AI capabilities and future AI potential.", "isCorrect": false, "rationale": "The argument is a philosophical one about the nature of intelligence and understanding, not a technological forecast of AI capabilities."}, {"text": "The gap between computational efficiency and complex problem-solving.", "isCorrect": false, "rationale": "The argument does not focus on efficiency or the ability to solve problems, but on the presence or absence of genuine understanding behind those problem-solving behaviors."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
