<script>
var QUESTIONS = [{"question": "What is the fundamental difference between a valid slippery slope argument and a fallacious slippery slope argument?", "options": [{"text": "The number of steps in the causal chain.", "isCorrect": false, "rationale": "The text does not specify that the number of steps differentiates a valid from a fallacious slippery slope. Both can have multiple steps."}, {"text": "The presence or absence of a specified causal mechanism.", "isCorrect": true, "rationale": "The text explicitly states: 'The difference is whether a causal mechanism is specified.' A legitimate slippery slope identifies this mechanism, while a fallacious one asserts the chain without it."}, {"text": "The desirability of the eventual outcome.", "isCorrect": false, "rationale": "While slippery slope arguments often lead to undesirable outcomes, the desirability of the outcome itself is not the diagnostic criterion for validity. Both valid and fallacious arguments can project undesirable endpoints."}, {"text": "Whether the argument is deployed in debates about technology or civil liberties.", "isCorrect": false, "rationale": "The text notes that slippery slope arguments are deployed in various domains, but the domain of application does not determine its logical validity."}]}, {"question": "Consider the argument: 'If we allow students to use calculators on exams, next they will stop learning math entirely, and eventually no one will be able to add.' Based on the text, this argument is most likely an example of:", "options": [{"text": "A valid slippery slope, because it describes a chain of consequences.", "isCorrect": false, "rationale": "While it describes a chain, the text clarifies that merely asserting a chain without a causal mechanism is the hallmark of a fallacy, not a valid argument."}, {"text": "A fallacious slippery slope, because it fails to specify causal mechanisms linking each step.", "isCorrect": true, "rationale": "This argument jumps from calculator use to a complete lack of math ability without explaining the 'mechanism by which calculator use on exams causes people to forget addition,' aligning with the text's description of a fallacious slippery slope."}, {"text": "A valid slippery slope, because the final outcome is undesirable.", "isCorrect": false, "rationale": "The desirability of the outcome does not determine the validity of the argument. A valid slippery slope requires a specified causal mechanism, not just an undesirable end."}, {"text": "A fallacious slippery slope, because the initial step (calculators) is too minor to have such extreme effects.", "isCorrect": false, "rationale": "The problem isn't necessarily the 'minorness' of the first step, but the lack of a plausible, specified mechanism connecting that step to the extreme conclusion. The text mentions 'equivocation' where a mild first step is connected to an alarming last step without bridging the logical gap."}]}, {"question": "According to the section, what is the 'diagnostic question' for evaluating any slippery slope argument?", "options": [{"text": "Is the final outcome truly undesirable?", "isCorrect": false, "rationale": "While slippery slope arguments often project undesirable outcomes, the diagnostic test focuses on the *mechanism* of progression, not the desirability of the end state."}, {"text": "Can you identify the specific mechanism by which each step leads to the next?", "isCorrect": true, "rationale": "The text explicitly states: 'The diagnostic question for any slippery slope argument is straightforward: Can you identify the specific mechanism by which each step leads to the next?'"}, {"text": "Has this argument been deployed in debates about technology or regulation?", "isCorrect": false, "rationale": "The text notes that these arguments are used in various domains, but this is not the diagnostic question for evaluating their validity."}, {"text": "How many intermediate steps are explicitly stated between A and Z?", "isCorrect": false, "rationale": "The number of stated steps is less critical than the presence of a *causal mechanism* for each link. A fallacious argument might omit steps or be vague about them, but the core issue is the lack of mechanism."}]}, {"question": "The text describes drug tolerance as an example of a 'real' slippery slope. Which aspect of drug tolerance *most* clearly illustrates the validity of this type of argument?", "options": [{"text": "The increasing dose over time.", "isCorrect": false, "rationale": "The increasing dose is a *consequence* within the chain, not the underlying reason for the slope's validity. It's an observable effect, not the causal mechanism itself."}, {"text": "The patient's desire for pain relief.", "isCorrect": false, "rationale": "The patient's desire is the initial motivation, but not the specific mechanism that makes the slope slippery. The slope's slipperiness is physiological, not psychological motivation."}, {"text": "The well-understood physiological mechanisms linking tolerance, dependency, and withdrawal.", "isCorrect": true, "rationale": "The text explicitly states, 'Each step has a well-understood physiological mechanism. The slope is slippery because the causal chain is real.' This directly identifies the reason for its validity."}, {"text": "The eventual development of withdrawal symptoms.", "isCorrect": false, "rationale": "Withdrawal symptoms are an outcome of the process, a later step in the chain. The validity comes from the mechanisms *leading* to those symptoms, not the symptoms themselves."}]}, {"question": "Which of the following is *not* listed as a rhetorical trick typically used in a fallacious slippery slope argument?", "options": [{"text": "Vagueness about intermediate steps.", "isCorrect": false, "rationale": "The text lists this as a rhetorical trick: 'Vagueness about intermediate steps. The arguer says 'A will lead to Z' and lets the listener's imagination fill in a plausible chain.'"}, {"text": "Equivocation, subtly redefining terms from a mild first step to an alarming last step.", "isCorrect": false, "rationale": "The text lists this as a rhetorical trick: 'Equivocation. The arguer describes the first step in mild, reasonable terms and the last step in extreme, alarming terms, obscuring the logical gap between them.'"}, {"text": "Explicitly stating a specific mechanism for each step.", "isCorrect": true, "rationale": "Explicitly stating a specific mechanism for each step is the characteristic of a *valid* slippery slope argument, not a trick used in a fallacious one. The absence of such mechanisms defines the fallacy."}, {"text": "Retreating to generalities like 'It is just common sense that one thing leads to another.'", "isCorrect": false, "rationale": "This is described as a specific way arguer's retreat when pressed for specifics about intermediate steps, which is part of the 'vagueness' trick."}]}, {"question": "A local city council passes a minor ordinance allowing dog owners to walk their leashed pets in a small section of a city park. A resident argues, 'If we let them walk dogs there, next they'll be demanding off-leash areas, then allowing pets in buildings, and soon the entire city will be overrun by animals.' For this to be considered a *valid* slippery slope argument based on regulatory precedent, what would the resident need to demonstrate?", "options": [{"text": "That the eventual outcome (city overrun by animals) is highly undesirable.", "isCorrect": false, "rationale": "The undesirability of the outcome does not validate the causal chain. The focus must be on the mechanisms linking steps."}, {"text": "That other cities have experienced similar outcomes after passing minor dog ordinances.", "isCorrect": false, "rationale": "While analogous situations might offer supporting evidence, the core requirement for a valid slippery slope is to show the *mechanism* by which *this specific* first step leads to the next within the given context, not just that similar things happened elsewhere."}, {"text": "That the city council members personally own dogs.", "isCorrect": false, "rationale": "The personal interests of the council members are irrelevant to the logical validity of the slippery slope argument."}, {"text": "How each step (e.g., allowing leashed dogs -> demanding off-leash areas) specifically lowers the barrier or establishes a precedent for the next, perhaps through changes in legal interpretation or public expectation.", "isCorrect": true, "rationale": "The text explains regulatory precedent as valid when 'Each precedent lowers the barrier for the next.' To be valid, the resident would need to explain the mechanism (e.g., legal, social expectation) by which the initial allowance makes subsequent steps easier or more likely."}]}, {"question": "Why does the text state that an argument structured as 'A will somehow lead to Z' is insufficient for a legitimate causal argument?", "options": [{"text": "It implies a lack of scientific rigor.", "isCorrect": false, "rationale": "While potentially true, the text's specific reason is more fundamental than just a 'lack of scientific rigor'; it's about the missing causal links."}, {"text": "It asserts a chain of consequences without specifying the causal mechanisms that link each step.", "isCorrect": true, "rationale": "The text directly contrasts this with a legitimate argument: 'The argument is not 'A will somehow lead to Z'; it is 'A will cause B because of mechanism M, B will cause C because of mechanism N, and so on.'' The 'somehow' indicates the absence of a specified mechanism."}, {"text": "It focuses too much on the undesirable endpoint Z.", "isCorrect": false, "rationale": "Focusing on the endpoint isn't the problem; the problem is the unjustified leap to it from the first step."}, {"text": "It usually involves too many steps between A and Z.", "isCorrect": false, "rationale": "The number of steps is not the determining factor for insufficiency; the absence of specified causal mechanisms is."}]}, {"question": "How does 'technological lock-in' serve as an example of a real slippery slope?", "options": [{"text": "It demonstrates how adopting a technology inevitably leads to its complete obsolescence.", "isCorrect": false, "rationale": "The text does not suggest lock-in leads to obsolescence. It highlights the difficulty of *switching* technologies."}, {"text": "It highlights the difficulty in switching technologies due to accumulated infrastructure, training, and habits, making each year of use deepen the commitment.", "isCorrect": true, "rationale": "The text states: 'Adopting a particular technology creates infrastructure, training, and institutional habits that make it increasingly difficult to switch to an alternative. Each year of use deepens the commitment.' This describes the causal mechanism of lock-in."}, {"text": "It shows that initial small technological changes always result in dramatic and undesirable consequences.", "isCorrect": false, "rationale": "While the consequences can be undesirable, the 'always' makes this too absolute, and the core point is the mechanism of increasing difficulty, not just any dramatic outcome."}, {"text": "It describes how new technologies always create unforeseen ethical dilemmas.", "isCorrect": false, "rationale": "The text does not link technological lock-in to ethical dilemmas; it links it to the increasing difficulty of switching due to sunk costs and ingrained practices."}]}, {"question": "The text warns against reflexively dismissing an argument simply because it is labeled a 'slippery slope.' Why is this warning given?", "options": [{"text": "Because all slippery slope arguments are inherently complex and deserve deep consideration.", "isCorrect": false, "rationale": "While some are complex, the warning is not about universal complexity, but about the specific error of dismissal without evaluation."}, {"text": "Because dismissing an argument by its label, without evaluating its underlying mechanism, can itself be an error if the slope is genuinely slippery.", "isCorrect": true, "rationale": "The caution section explicitly states: '“Slippery slope” is often used as a dismissal... But this dismissal is only valid if the argument lacks a causal mechanism. Some slopes are real, and dismissing them reflexively is as much an error as asserting them without evidence.'"}, {"text": "Because calling something a 'slippery slope' is an ad hominem attack.", "isCorrect": false, "rationale": "Calling something a 'slippery slope' is not an ad hominem attack (which targets the person, not the argument). It's a classification of an argument form or fallacy."}, {"text": "Because the term 'slippery slope' is only used in informal logic, not in formal debates.", "isCorrect": false, "rationale": "The text states it's part of 'informal logic and rhetoric' but also acknowledges it's 'deployed in debates about technology, regulation, civil liberties,' indicating its use in various formal and informal contexts."}]}, {"question": "Which statement best encapsulates the core distinction between a legitimate slippery slope argument and a fallacious one, as presented in the text?", "options": [{"text": "A legitimate slippery slope details how a small first step *might* lead to an extreme conclusion, while a fallacious one asserts it *will*.", "isCorrect": false, "rationale": "The distinction isn't primarily about 'might' vs. 'will,' but about the presence of a causal explanation for the progression, regardless of the certainty of the assertion."}, {"text": "A legitimate slippery slope explicitly identifies the specific causal chain and mechanisms linking each step, whereas a fallacious one asserts the chain without such explanation, often relying on vagueness or equivocation.", "isCorrect": true, "rationale": "This statement synthesizes the 'Key Concept' box and other parts of the text, highlighting that the presence of specified causal mechanisms (and the absence of rhetorical tricks) is the defining difference."}, {"text": "A legitimate slippery slope focuses on physiological or regulatory mechanisms, while a fallacious one typically involves social or educational scenarios.", "isCorrect": false, "rationale": "While the examples of legitimate slopes include physiological and regulatory contexts, the text clarifies that the *presence of a mechanism*, not the *type of context*, is the differentiator. Fallacious arguments can also appear in various contexts."}, {"text": "A legitimate slippery slope is concerned with second-order effects, while a fallacious one only considers first-order effects.", "isCorrect": false, "rationale": "The 'Connections' section mentions 'Second-Order Effects' as a broader framework, but this is not presented as the *core distinction* between a legitimate and fallacious slippery slope itself. Both types of arguments concern chains of consequences (which often involve second-order effects)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
