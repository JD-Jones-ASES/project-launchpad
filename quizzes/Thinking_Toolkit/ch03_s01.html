<script>
var QUESTIONS = [{"question": "What is the central idea behind the 'Eat the Frog' principle?", "options": [{"text": "To complete all easy tasks first to build momentum for harder ones.", "isCorrect": false, "rationale": "While 'small wins' is mentioned as an alternative, the core 'Eat the Frog' principle advocates tackling the hardest task first, not easier ones."}, {"text": "To identify and complete your most dreaded task first, leveraging peak energy and willpower.", "isCorrect": true, "rationale": "The text clearly states the 'frog' is the most dreaded task, and the principle is to do it first, often in the morning when energy and self-discipline are strongest, so the 'worst is behind you'."}, {"text": "To delegate difficult tasks to others to avoid personal discomfort and anxiety.", "isCorrect": false, "rationale": "The 'Eat the Frog' principle is about personal productivity and overcoming procrastination by facing the difficult task yourself, not delegating it."}, {"text": "To categorize tasks into urgent and non-urgent, prioritizing urgent tasks regardless of difficulty.", "isCorrect": false, "rationale": "The principle focuses on dread and difficulty, not solely urgency, although dreaded tasks are often important. The Eisenhower Matrix, mentioned in connections, deals with urgency and importance, but is not the core of 'Eat the Frog'."}], "id": "q01"}, {"question": "According to the 'Eat the Frog' principle, which of the following scenarios best represents 'eating a frog'?", "options": [{"text": "Answering 20 routine emails first thing in the morning to clear your inbox.", "isCorrect": false, "rationale": "The text states that routine emails are 'tasks that can be done on an empty battery' and are not 'frogs' because they don't require peak willpower or cause significant dread."}, {"text": "Calling a difficult client to address a complex complaint before starting any other work.", "isCorrect": true, "rationale": "A 'difficult conversation' or 'phone call you do not want to make' is explicitly given as an example of a 'frog' – a dreaded task that, left undone, would cause anxiety and drain energy."}, {"text": "Spending an hour organizing your desk and files to create a tidy workspace.", "isCorrect": false, "rationale": "The text uses 'Organizing your desk' as an example of 'comfortable activities' or 'wrong things' that feel productive but are often forms of emotional avoidance from the actual 'frog'."}, {"text": "Reviewing social media and news headlines to stay informed before starting your workday.", "isCorrect": false, "rationale": "This is a distracting activity that offers immediate satisfaction and would likely deplete willpower or delay tackling a 'frog', rather than being a frog itself."}], "id": "q02"}, {"question": "What do procrastination researchers identify as the primary driver behind avoiding 'frogs'?", "options": [{"text": "A fundamental lack of discipline or laziness.", "isCorrect": false, "rationale": "The text explicitly states, 'The answer is not laziness. Procrastination researchers have found that people who put off difficult tasks are often highly productive'."}, {"text": "An excess of emotional avoidance, seeking immediate satisfaction to escape discomfort.", "isCorrect": true, "rationale": "The text clearly states, 'The driving force behind procrastination is usually not a lack of discipline but an excess of emotional avoidance. The dreaded task provokes anxiety, discomfort, or fear of failure, and the brain seeks relief by switching to something that provides immediate satisfaction.'"}, {"text": "A lack of clear instructions or understanding of the task requirements.", "isCorrect": false, "rationale": "While unclear instructions can certainly lead to delays, the text focuses on the psychological aspect of avoidance rather than task clarity as the primary driver of procrastination."}, {"text": "Insufficient time allocated to complete the task effectively.", "isCorrect": false, "rationale": "Insufficient time can be a factor, but the text emphasizes emotional avoidance as the root cause, leading to tasks being put off even when time is available."}], "id": "q03"}, {"question": "How does the 'eat the frog' heuristic effectively counteract procrastination?", "options": [{"text": "By encouraging individuals to break down all tasks into smaller, more manageable steps before starting.", "isCorrect": false, "rationale": "While breaking down large tasks is mentioned for 'eating a piece of the frog,' it's not the primary mechanism for short-circuiting the avoidance loop in general, which applies even to single dreaded tasks."}, {"text": "It short-circuits the emotional avoidance loop by ensuring the dreaded task is done before willpower is depleted or alternatives become seductive.", "isCorrect": true, "rationale": "The text explains: 'The “eat the frog” heuristic works because it short-circuits this avoidance loop. By committing to do the dreaded task first—before your willpower has been depleted... before the comfortable alternatives have had time to seduce you—you use your morning energy... on the task that needs it most.'"}, {"text": "By establishing a reward system for completing difficult tasks, thereby increasing motivation.", "isCorrect": false, "rationale": "The text does not discuss reward systems as the mechanism; it focuses on strategic timing and leveraging peak willpower to overcome avoidance."}, {"text": "By outsourcing the most challenging tasks to others to reduce personal stress.", "isCorrect": false, "rationale": "Similar to a previous option, the strategy is about personally tackling the frog, not outsourcing it."}], "id": "q04"}, {"question": "Based on the concept of willpower as a finite resource, what is the most strategic approach to daily task management?", "options": [{"text": "Start with easy, quick wins to build confidence and then move to harder tasks.", "isCorrect": false, "rationale": "The text warns against this, stating that 'warming up' with easier material often expands to fill available time, leaving hard tasks untouched, and suggests using the 'fullest charge on the hardest task'."}, {"text": "Allocate your peak mental energy and self-discipline to the most challenging and dreaded tasks first.", "isCorrect": true, "rationale": "The text states, 'If willpower is a battery that drains over the course of the day, the implication is clear: use the fullest charge on the hardest task. Do not spend the first hour of your morning answering routine emails... The frog cannot.'"}, {"text": "Distribute difficult tasks evenly throughout the day to avoid burnout.", "isCorrect": false, "rationale": "While avoiding burnout is important, the strategy emphasizes tackling the most difficult task when willpower is highest, typically at the beginning of the day, rather than spreading them out when willpower might be lower."}, {"text": "Prioritize tasks that provide immediate satisfaction to maintain a positive mood.", "isCorrect": false, "rationale": "Seeking immediate satisfaction is identified as a characteristic of procrastination and emotional avoidance, not a strategic use of finite willpower."}], "id": "q05"}, {"question": "Which of the following adjustments or alternative strategies is NOT explicitly mentioned as a valid adaptation or exception to the strict 'eat the frog first thing in the morning' rule?", "options": [{"text": "Eating a 'piece of the frog' each day when the frog is too large to consume in one sitting.", "isCorrect": false, "rationale": "This is explicitly mentioned as a valid adaptation for large frogs: 'eat a piece of the frog each day—make meaningful progress on the hardest task before turning to easier ones.'"}, {"text": "Performing the 'frog' task during your peak energy and focus period, if you're not a morning person.", "isCorrect": false, "rationale": "This is explicitly mentioned as a valid adaptation: 'For them, “eat the frog first” should be reinterpreted as “eat the frog at your peak.”'"}, {"text": "Delegating the 'frog' to a less busy colleague to ensure its completion without personal discomfort.", "isCorrect": true, "rationale": "The text discusses limitations and adaptations for *personally* tackling the frog, but it does not suggest delegating the frog as a valid strategy for the 'Eat the Frog' principle itself. The principle is about facing your own dreaded task."}, {"text": "Achieving a small win early in the day to build momentum before tackling the frog later.", "isCorrect": false, "rationale": "This is explicitly mentioned as a legitimate alternative strategy: 'Occasionally, a small win early in the day builds momentum that makes the frog easier to face later. This is a legitimate alternative strategy...'"}], "id": "q06"}, {"question": "Consider a scenario where a student has a massive research paper due in a month. Applying the 'Eat the Frog' principle, what strategy would be most appropriate for this specific 'frog'?", "options": [{"text": "Work exclusively on the paper during the last week before the deadline, focusing all available energy then.", "isCorrect": false, "rationale": "This approach risks 'the planning fallacy' (mentioned in connections) and contradicts the strategy for large frogs, which is to make daily progress rather than postpone entirely."}, {"text": "Complete a small, unrelated, easy academic task each morning to feel productive, then consider the paper.", "isCorrect": false, "rationale": "This exemplifies the 'warm-up' that 'often expands to fill the available time, leaving the hard subject untouched,' which the text advises against for academic work."}, {"text": "Dedicate a specific block of time each day to make meaningful progress on a 'piece of the frog' (the paper).", "isCorrect": true, "rationale": "The text explicitly states: 'Some frogs are so large that they cannot be eaten in one sitting... In these cases, eat a piece of the frog each day—make meaningful progress on the hardest task before turning to easier ones.'"}, {"text": "Identify the hardest section of the paper and complete it entirely on the first day to get it over with.", "isCorrect": false, "rationale": "While the spirit is correct, a 'massive research paper' cannot be completed in one day, even the hardest section. The strategy is to eat a 'piece' each day, implying sustained, incremental progress."}], "id": "q07"}, {"question": "A student has three study tasks for the evening: review easy vocabulary, complete a medium-difficulty math problem set, and write the introduction to a challenging history essay. Applying the 'Eat the Frog' principle as described for academic work, which task should they tackle first?", "options": [{"text": "Review easy vocabulary.", "isCorrect": false, "rationale": "The text advises against starting with easier material, as it often expands to fill time and leaves the hard subject untouched. Reviewing easy vocabulary would be a 'warm-up' in this context."}, {"text": "Complete a medium-difficulty math problem set.", "isCorrect": false, "rationale": "While more challenging than vocabulary, the math set is described as 'medium-difficulty,' whereas the history essay introduction is 'challenging.' The principle is to do the *hardest* thing first."}, {"text": "Write the introduction to a challenging history essay.", "isCorrect": true, "rationale": "The text's 'realworld' example for academic work states: 'Students who begin their study sessions with the hardest subject consistently outperform those who “warm up” with easier material.' The challenging history essay is the 'hardest subject' or 'frog' among the options."}, {"text": "Any of these tasks, as long as they dedicate equal time to each.", "isCorrect": false, "rationale": "The 'Eat the Frog' principle is about strategic *order* of tasks based on difficulty and dread, not just equal time allocation, to leverage willpower effectively."}], "id": "q08"}, {"question": "What is the fundamental purpose of employing the 'Eat the Frog' strategy beyond simply getting difficult tasks done?", "options": [{"text": "To strictly adhere to a rigid morning routine for maximum efficiency.", "isCorrect": false, "rationale": "The text mentions flexibility for 'non-morning people' and other limitations, indicating that rigidity is not the fundamental purpose. The purpose is about strategic allocation."}, {"text": "To cultivate a habit of suffering through unpleasant tasks to build resilience.", "isCorrect": false, "rationale": "The text explicitly states: 'The heuristic is not about suffering; it is about strategic allocation of a finite resource—your willpower.'"}, {"text": "To strategically allocate a finite resource—your willpower—to the tasks that need it most.", "isCorrect": true, "rationale": "The 'keyconcept' box directly states: 'The heuristic is not about suffering; it is about strategic allocation of a finite resource—your willpower.'"}, {"text": "To eliminate the need for self-discipline by making tasks less daunting.", "isCorrect": false, "rationale": "The strategy *requires* self-discipline to initiate the dreaded task and is designed to leverage peak self-discipline, not eliminate its need. It doesn't inherently make tasks less daunting, but helps overcome the dread."}], "id": "q09"}, {"question": "When deciding which task is your 'frog,' understanding the 'connections' section suggests that identifying your frog is most closely related to distinguishing between which two types of tasks?", "options": [{"text": "Tasks that require deep focus versus tasks that are mentally stimulating.", "isCorrect": false, "rationale": "While focus is relevant to task completion, this distinction is not directly made or linked in the 'connections' section."}, {"text": "Tasks that you enjoy doing versus tasks that you find boring.", "isCorrect": false, "rationale": "The 'frog' is defined by dread and discomfort, not necessarily boredom versus enjoyment, although boring tasks can be dreaded."}, {"text": "Tasks that are important versus tasks that are merely urgent.", "isCorrect": true, "rationale": "The 'connections' section points to 'The Eisenhower Matrix (Chapter )—a framework for distinguishing important tasks from merely urgent ones.' The 'frog' is often the important task that provokes dread and is thus often postponed."}, {"text": "Tasks that can be completed quickly versus tasks that require significant time investment.", "isCorrect": false, "rationale": "The 'Planning Fallacy' (also in connections) relates to underestimating time, but the direct connection for identifying the 'frog' itself is to the Eisenhower Matrix's importance/urgency distinction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
