    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which statement best defines an individual's \"circle of competence\" according to the text?", "options": [{"text": "The range of topics they have a strong opinion about or casual familiarity with.", "isCorrect": false, "rationale": "The text explicitly states that a circle of competence is 'not casual familiarity, not a surface impression, but the kind of deep knowledge that lets you evaluate new information.'"}, {"text": "Subjects where they possess genuine, deep knowledge that allows them to make reliable judgments and evaluate new information.", "isCorrect": true, "rationale": "The text defines the circle of competence as 'the set of subjects where you have genuine understanding—not casual familiarity... but the kind of deep knowledge that lets you evaluate new information, recognize what is important, and make reliable judgments.'"}, {"text": "Any subject they have read at least one book on or followed extensively in the news.", "isCorrect": false, "rationale": "The text warns that 'Reading one book about a subject does not put it inside your circle. Following the news about an industry does not make you an expert.'"}, {"text": "Areas where they feel confident speaking publicly, regardless of their actual expertise.", "isCorrect": false, "rationale": "While people might speak confidently outside their circle, this describes a failure of discipline, not the definition of the circle itself. The circle is about genuine understanding."}], "id": "q01"}, {"question": "What is the core principle articulated by Warren Buffett and Charlie Munger regarding the \"Circle of Competence\"?", "options": [{"text": "Always seek out new challenges to expand your knowledge rapidly into diverse fields.", "isCorrect": false, "rationale": "The text emphasizes slow, hard work for expansion and discipline to stay within current boundaries, not rapid, diverse expansion."}, {"text": "Understand your knowledge boundaries and operate strictly within them.", "isCorrect": true, "rationale": "The text states their principle as: 'know what you know, know the boundary of what you know, and stay inside it.'"}, {"text": "Focus on developing strong opinions about a wide range of subjects to appear well-informed.", "isCorrect": false, "rationale": "The text warns against having strong opinions without genuine knowledge and the social rewards of speaking confidently on any topic as a reason for failure."}, {"text": "Publicly acknowledge areas of ignorance to build trust and humility.", "isCorrect": false, "rationale": "While acknowledging ignorance is part of the discipline, the core principle is about understanding and staying within the boundaries of competence, not just public acknowledgment."}], "id": "q02"}, {"question": "According to the text, why is \"knowing the boundary\" of one's circle of competence considered the hardest part?", "options": [{"text": "It requires extensive formal education to precisely map out all knowledge domains.", "isCorrect": false, "rationale": "The difficulty is attributed to self-awareness and the nature of not knowing what you don't know, not necessarily formal education."}, {"text": "Social pressures often discourage individuals from admitting their limitations to others.", "isCorrect": false, "rationale": "Social pressure relates to the *discipline to stay inside* the circle, not the inherent difficulty of *knowing the boundary* itself."}, {"text": "The boundary is internally invisible, and a lack of knowledge in a subject makes it difficult to recognize how little one knows.", "isCorrect": true, "rationale": "The text explicitly states: 'The boundary of your competence is invisible from the inside. You cannot feel yourself crossing it. The Dunning-Kruger Effect... predicts exactly this: the less you know about a subject, the less capable you are of recognizing how little you know.'"}, {"text": "Expanding the circle makes the boundary constantly shift, making it impossible to precisely define.", "isCorrect": false, "rationale": "While the circle can expand, the difficulty lies in recognizing the *current* boundary due to lack of awareness, not constant, unmanageable shifts."}], "id": "q03"}, {"question": "The text suggests that most people fail at the third component of the \"Circle of Competence,\" which is having the discipline to stay inside it. What is the primary reason for this failure?", "options": [{"text": "A lack of opportunities for deep study and practice to expand their circle, forcing them to venture out.", "isCorrect": false, "rationale": "The failure in discipline is about *staying inside* the current circle, not about the inability to expand it."}, {"text": "The inherent difficulty in distinguishing between genuine understanding and superficial knowledge.", "isCorrect": false, "rationale": "This relates to the first component ('know what is inside your circle'), not specifically the discipline to stay within it."}, {"text": "The social rewards, excitement, and confidence associated with offering opinions on any topic, even outside one's expertise.", "isCorrect": true, "rationale": "The text explains: 'It is boring to say “I don't know.” It is exciting to have an opinion about everything. It is socially rewarding to speak confidently on any topic.'"}, {"text": "A natural tendency to underestimate the complexity of new subjects.", "isCorrect": false, "rationale": "While related to the Dunning-Kruger Effect, the text specifically attributes the failure in discipline to social and psychological incentives of 'having an opinion' and 'speaking confidently.'"}], "id": "q04"}, {"question": "Which of the following actions is presented as an effective way to genuinely expand one's circle of competence?", "options": [{"text": "Following news about an industry regularly and reading a few articles.", "isCorrect": false, "rationale": "The text states: 'Following the news about an industry does not make you an expert in that industry.'"}, {"text": "Reading a single comprehensive book on a new subject.", "isCorrect": false, "rationale": "The text clarifies: 'Reading one book about a subject does not put it inside your circle.'"}, {"text": "Engaging in deliberate study, sustained practice, and learning from mistakes over years.", "isCorrect": true, "rationale": "The text emphasizes: 'You can expand it through deliberate study and practice... Genuine competence is earned through years of engagement, and there is no shortcut.'"}, {"text": "Expressing strong opinions on a subject to gain confidence and familiarity, even if knowledge is superficial.", "isCorrect": false, "rationale": "This contradicts the core principle of genuine understanding and is a behavior the text identifies as a failure of discipline."}], "id": "q05"}, {"question": "The Dunning-Kruger Effect is mentioned in relation to which aspect of the \"Circle of Competence\"?", "options": [{"text": "The slow and difficult process of expanding one's competence through hard work.", "isCorrect": false, "rationale": "While expansion is slow, the Dunning-Kruger effect is linked to a different aspect."}, {"text": "The social pressure to appear knowledgeable on all topics, leading to overconfidence.", "isCorrect": false, "rationale": "This relates more to the 'discipline to stay inside' component and social rewards, not the core of Dunning-Kruger as explained in the text."}, {"text": "The challenge of recognizing the boundaries of one's own knowledge, particularly when one lacks understanding.", "isCorrect": true, "rationale": "The text states: 'The Dunning-Kruger Effect... predicts exactly this: the less you know about a subject, the less capable you are of recognizing how little you know. Staying inside your circle requires a level of self-awareness that does not come naturally.'"}, {"text": "The importance of having the discipline to stay within one's known areas to avoid mistakes.", "isCorrect": false, "rationale": "While Dunning-Kruger makes staying inside harder, its direct link in the text is to the difficulty of *recognizing* the boundary."}], "id": "q06"}, {"question": "Based on the 'real-world' example provided, why did Warren Buffett famously avoid investing in technology stocks for decades?", "options": [{"text": "He believed technology stocks were inherently bad or risky investments.", "isCorrect": false, "rationale": "The text explicitly states: 'not because he thought they were bad investments.'"}, {"text": "He lacked the genuine understanding of the technology sector to evaluate these investments with his usual confidence.", "isCorrect": true, "rationale": "The text explains he avoided them 'not because he thought they were bad investments, but because they were outside his circle of competence. He could not evaluate them with the same confidence he brought to consumer brands and financial companies.'"}, {"text": "He preferred to focus solely on consumer brands and financial companies, which offered higher returns.", "isCorrect": false, "rationale": "His preference for consumer brands and financial companies stemmed from his competence in those areas, but the *reason* for avoiding tech was the lack of competence, not simply preference for others."}, {"text": "The technology sector was too volatile and unpredictable for his conservative investment strategy.", "isCorrect": false, "rationale": "The text does not mention volatility as his reason; it focuses on his inability to evaluate them due to lack of competence."}], "id": "q07"}, {"question": "A highly successful architect, known for innovative building designs, frequently makes public statements on climate change policy, despite having no background in environmental science or policy. Which concept from the text best explains this behavior?", "options": [{"text": "The natural and healthy desire to continuously expand one's circle of competence into new areas.", "isCorrect": false, "rationale": "Making confident statements without deep study is not genuine expansion; it's venturing outside the circle without the necessary work."}, {"text": "The tendency for confidence gained through expertise in one domain to mistakenly transfer to unrelated domains.", "isCorrect": true, "rationale": "The text states: 'Expertise in one domain does not transfer automatically to another, but the confidence that comes with expertise often does. This is how smart people make foolish pronouncements.'"}, {"text": "A deliberate attempt to challenge the public's perception of expertise and promote interdisciplinary thinking.", "isCorrect": false, "rationale": "The text does not suggest such a motive; it focuses on the internal psychological aspects and consequences of venturing outside the circle."}, {"text": "The Dunning-Kruger Effect, indicating a lack of self-awareness regarding his architectural skills.", "isCorrect": false, "rationale": "The Dunning-Kruger Effect applies to his lack of knowledge in climate change, but the direct explanation for *why* a 'smart person makes foolish pronouncements' in a new field is the *transfer of confidence* from his area of expertise."}], "id": "q08"}, {"question": "Maya, an experienced chef, is offered a job as a food critic, a role she's always been interested in. She has read many restaurant reviews and watched cooking shows but has never formally studied culinary journalism or food science. According to the \"Circle of Competence\" framework, what best describes this job opportunity for Maya?", "options": [{"text": "A job squarely within her circle, allowing her to perform at a high level with confidence.", "isCorrect": false, "rationale": "While related, being a food critic requires specific skills (journalism, analytical writing) and deep knowledge beyond just cooking, which she hasn't 'done the work' for."}, {"text": "A stretch job, potentially valuable for growth but carrying inherent risk.", "isCorrect": true, "rationale": "The text describes: 'A job at the edge of your circle is a stretch—potentially valuable for growth but risky.' Her culinary experience makes it not 'well outside,' but her lack of specific critic training places it at the edge."}, {"text": "A job well outside her circle, representing a significant gamble.", "isCorrect": false, "rationale": "Her background as a chef provides relevant context, so it's not 'well outside,' but rather on the periphery of her existing competence."}, {"text": "An ideal opportunity to rapidly expand her circle of competence with minimal effort.", "isCorrect": false, "rationale": "The text stresses that expanding a circle is 'slow, hard work' and 'no shortcut,' not rapid or minimal effort."}], "id": "q09"}, {"question": "Ultimately, what is the most significant benefit of diligently practicing the \"Circle of Competence\" principle?", "options": [{"text": "It guarantees financial success and eliminates all investment risks.", "isCorrect": false, "rationale": "While helpful in investing, the text doesn't claim it guarantees success or eliminates all risks; it's a principle for judgment, not a magical solution."}, {"text": "It fosters a sense of intellectual superiority over those who venture outside their competence.", "isCorrect": false, "rationale": "The principle emphasizes humility and self-awareness, not a feeling of superiority."}, {"text": "It protects individuals from overconfidence and leads to more reliable judgments and decisions.", "isCorrect": true, "rationale": "The key concept summary states: 'Operating inside your circle protects you from overconfidence... Your circle of competence is the area where your knowledge is deep enough to support reliable judgment.'"}, {"text": "It allows for rapid expansion of knowledge into diverse, unrelated fields.", "isCorrect": false, "rationale": "The text explicitly states that expanding competence is 'slow, hard work' and requires 'years of engagement,' not rapid expansion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
