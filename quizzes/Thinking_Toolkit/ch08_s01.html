    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What central philosophical question did Plutarch's original Ship of Theseus puzzle aim to explore?", "options": [{"text": "How many repairs can a ship undergo before it is no longer seaworthy?", "isCorrect": false, "rationale": "The puzzle is not about the functional capacity or structural integrity of the ship, but its identity."}, {"text": "What makes something the 'same' thing across time when its parts have changed?", "isCorrect": true, "rationale": "The text explicitly states this as the 'oldest and most enduring puzzles in Western philosophy, asking what makes something the “same” thing across time when its parts have changed.'"}, {"text": "Who holds ownership of a historical artifact after significant modifications?", "isCorrect": false, "rationale": "While a practical question, ownership is not the core philosophical issue of identity raised by Plutarch."}, {"text": "How reliable are historical accounts of ancient vessels?", "isCorrect": false, "rationale": "The puzzle uses a historical account as a premise, but its aim is philosophical inquiry into identity, not historical accuracy."}]}, {"question": "An individual arguing that the Ship of Theseus remains the 'same' ship after all its planks are replaced is primarily appealing to which concept?", "options": [{"text": "Material identity", "isCorrect": false, "rationale": "Material identity argues that the thing *is* its parts, so if parts change, the thing changes. This is the opposing view."}, {"text": "Continuity of existence", "isCorrect": true, "rationale": "The text states that saying 'yes, it is still the same ship' means 'you are appealing to continuity — an unbroken chain of existence in which the ship was never destroyed, merely repaired.'"}, {"text": "Functional preservation", "isCorrect": false, "rationale": "While the ship might retain its function, the core argument for sameness in this context is based on its unbroken historical existence, not just its utility."}, {"text": "Sentient identity", "isCorrect": false, "rationale": "Sentient identity refers to a conscious being's self-perception, which is not the primary argument for an inanimate object like a ship, although an analogy to human identity is drawn later."}]}, {"question": "According to the 'material identity' argument, why would the Ship of Theseus *not* be considered the same ship after all its planks have been replaced?", "options": [{"text": "Its form or shape would inevitably change with new planks.", "isCorrect": false, "rationale": "The argument doesn't necessarily depend on a change in form, but specifically on the *material* components."}, {"text": "The original components that constituted the ship are no longer present.", "isCorrect": true, "rationale": "The text explains that if you say 'no, it is a different ship, you are appealing to material identity — the thing is its parts, and when the parts are gone, the original thing is gone too.'"}, {"text": "Its historical significance would be diminished by the replacement of parts.", "isCorrect": false, "rationale": "While true, this is not the philosophical basis for the material identity argument itself."}, {"text": "It would lack a continuous history of repairs.", "isCorrect": false, "rationale": "Lacking continuous history would argue against continuity, not for material identity. The ship in this scenario *does* have a continuous history of repairs."}]}, {"question": "Thomas Hobbes's addition to the Ship of Theseus paradox, involving the reassembly of the original discarded planks, primarily serves to highlight what?", "options": [{"text": "The environmental impact of replacing ship parts.", "isCorrect": false, "rationale": "The philosophical thought experiment is not concerned with environmental issues."}, {"text": "The possibility of creating an exact replica of a historical artifact.", "isCorrect": false, "rationale": "While it describes a replica, the core point is the *conflict* it creates, not just the possibility of replication."}, {"text": "The conflicting nature of continuity and material identity as criteria for 'sameness.'", "isCorrect": true, "rationale": "Hobbes's twist creates two ships: one with continuous history, and one with original material. This directly forces a choice between these two competing definitions of 'sameness,' making their conflict explicit."}, {"text": "The practical difficulties of ship maintenance over long periods.", "isCorrect": false, "rationale": "The puzzle is a philosophical exercise, not a practical guide to shipbuilding."}]}, {"question": "Which of the following is NOT presented in the text as a real-world example of the 'identity through change' puzzle?", "options": [{"text": "A corporation that has replaced all employees, products, and relocated its headquarters.", "isCorrect": false, "rationale": "This is explicitly mentioned in the text as a practical example."}, {"text": "A childhood friend encountered after thirty years, having changed beliefs, habits, body, and career.", "isCorrect": false, "rationale": "This is explicitly mentioned in the text as a practical example."}, {"text": "An antique furniture piece restored with no original wood remaining.", "isCorrect": true, "rationale": "While a valid example of identity through change, this specific scenario is not listed among the practical examples in the provided text section."}, {"text": "A nation that has rewritten its constitution, changed borders, and replaced its population over centuries.", "isCorrect": false, "rationale": "This is explicitly mentioned in the text as a practical example."}]}, {"question": "The ultimate revelation of the Ship of Theseus puzzle regarding our concept of 'sameness' is that it is:", "options": [{"text": "Primarily an emotional and subjective feeling, devoid of logical basis.", "isCorrect": false, "rationale": "While intuition is mentioned, the text points to a bundle of *criteria* rather than purely subjective feeling, and discusses logical arguments."}, {"text": "A simple, binary property where something is either completely 'the same' or completely 'different.'", "isCorrect": false, "rationale": "The text explicitly states: 'The puzzle reveals that our concept of “sameness” is not a single, clear idea but a bundle of different criteria.'"}, {"text": "A bundle of different criteria (e.g., continuity, material composition) that can diverge.", "isCorrect": true, "rationale": "The text concludes that 'our concept of “sameness” is not a single, clear idea but a bundle of different criteria (continuity, material composition, form, function, memory) that usually travel together but sometimes come apart.'"}, {"text": "Determined solely by the original purpose or function of an object.", "isCorrect": false, "rationale": "Function is listed as one criterion, but not the sole determinant, nor the ultimate revelation about 'sameness' as a concept."}]}, {"question": "Based on the 'personbox' description, Plutarch's approach to philosophy is best characterized as:", "options": [{"text": "A system-builder who created comprehensive philosophical doctrines.", "isCorrect": false, "rationale": "The text explicitly states Plutarch was 'not a system-builder like Plato or Aristotle.'"}, {"text": "A humanist who used biography and anecdote to explore questions of character and identity.", "isCorrect": true, "rationale": "The text describes him as 'a humanist who used biography and anecdote to explore questions of character, virtue, and identity.'"}, {"text": "A logician focused on formalizing paradoxes with mathematical precision.", "isCorrect": false, "rationale": "While he posed a paradox, his method was biographical and anecdotal, not primarily formal logic or mathematics."}, {"text": "A historian whose main contribution was cataloging ancient technologies.", "isCorrect": false, "rationale": "He was a biographer and essayist, exploring philosophical questions, not primarily a historian of technology."}]}, {"question": "In the context of 'digital identity' discussed in the 'realworld' section, if a 'perfect copy' of your mind is uploaded and your biological brain is destroyed, the core challenge to identity arises because:", "options": [{"text": "The uploaded mind would necessarily lose aspects of your memories and personality.", "isCorrect": false, "rationale": "The text specifies it's a 'perfect copy' with 'your memories, your personality, your patterns of thought.'"}, {"text": "The upload is a copy rather than a continuation, breaking the chain of biological existence.", "isCorrect": true, "rationale": "The text states: 'The upload has your memories, your personality, your patterns of thought. But it was never continuous with your biological existence. It is a copy, not a continuation.'"}, {"text": "Digital systems are fundamentally incapable of self-awareness.", "isCorrect": false, "rationale": "The puzzle assumes the 'perfect copy' functions as 'you,' abstracting from technical limitations to explore identity."}, {"text": "Legal frameworks for digital personhood are currently undeveloped.", "isCorrect": false, "rationale": "While true, the challenge discussed is philosophical (identity), not purely legal or practical."}]}, {"question": "When the text states, 'When they come apart, our intuitions fracture, and no purely logical argument can reassemble them,' what does 'they' refer to?", "options": [{"text": "The physical and spiritual components of a being.", "isCorrect": false, "rationale": "While related to identity, the text's direct context refers to specific criteria for 'sameness' rather than a spiritual/physical dichotomy."}, {"text": "Different philosophical theories about the nature of reality.", "isCorrect": false, "rationale": "The statement refers to the breakdown of intuitive understanding within the context of the puzzle, not a general philosophical disagreement."}, {"text": "The various criteria for 'sameness' (e.g., continuity, material composition, form).", "isCorrect": true, "rationale": "The preceding sentence states: 'our concept of “sameness” is not a single, clear idea but a bundle of different criteria (continuity, material composition, form, function, memory) that usually travel together but sometimes come apart.' 'They' directly refers to these criteria."}, {"text": "Past and future versions of an object or person.", "isCorrect": false, "rationale": "While the puzzle deals with identity across time, 'they' in this specific sentence refers to the *criteria* by which we judge that identity, not the temporal states themselves."}]}, {"question": "Ultimately, the Ship of Theseus puzzle is valuable not because it provides a definitive answer, but because it:", "options": [{"text": "Offers a historical lesson on ancient Greek naval engineering.", "isCorrect": false, "rationale": "The historical context is merely a vehicle for the philosophical question, not the primary value of the puzzle."}, {"text": "Conclusively proves that material composition is secondary to historical continuity.", "isCorrect": false, "rationale": "The puzzle demonstrates the *conflict* between these criteria, not the superiority of one over the other. The text implies neither is definitively 'correct.'"}, {"text": "Forces us to think more carefully about the nuanced and ambiguous meanings of 'sameness.'", "isCorrect": true, "rationale": "The 'keyconcept' box states: 'Recognizing this ambiguity is the first step toward thinking more carefully about what we mean when we say something (or someone) is “still the same.”'"}, {"text": "Discourages the repair or modification of any object of historical importance.", "isCorrect": false, "rationale": "The puzzle is a philosophical exercise, not a practical directive on preservation methods."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
