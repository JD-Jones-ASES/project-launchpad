<script>
var QUESTIONS = [{"question": "Kahneman and Tversky's Prospect Theory fundamentally challenged which classical economic assumption?", "options": [{"text": "People always act rationally to maximize utility.", "isCorrect": false, "rationale": "While related, the specific classical assumption challenged by Prospect Theory, as stated in the text, was about how people evaluate outcomes."}, {"text": "People evaluate outcomes in absolute terms, caring about total wealth.", "isCorrect": true, "rationale": "The text explicitly states: 'It challenged the classical assumption that people evaluate outcomes in absolute terms... Classical economic theory assumed that people evaluate outcomes in absolute terms — you care about your total wealth, not about whether you gained or lost relative to some starting point. Prospect theory showed that this assumption is deeply wrong.'"}, {"text": "People's preferences for risk are consistent across gains and losses.", "isCorrect": false, "rationale": "This is what Prospect Theory *disproved* by showing the reversal of risk preference, not the assumption it challenged about evaluation itself."}, {"text": "People evaluate outcomes relative to a reference point.", "isCorrect": false, "rationale": "This is a core insight of Prospect Theory, what it *demonstrated*, not the classical assumption it challenged."}]}, {"question": "According to Kahneman and Tversky's research, what is the approximate psychological impact ratio between the pain of a loss and the pleasure of an equivalent gain?", "options": [{"text": "Gains feel twice as good as losses hurt.", "isCorrect": false, "rationale": "This statement reverses the finding described in the text."}, {"text": "Losses hurt about the same as gains feel good.", "isCorrect": false, "rationale": "This contradicts the core concept of asymmetry central to loss aversion."}, {"text": "Losses hurt roughly twice as intensely as equivalent gains feel good.", "isCorrect": true, "rationale": "The text states: 'Kahneman and Tversky found that the pain of losing a given amount was roughly twice as intense as the pleasure of gaining the same amount.'"}, {"text": "Losses hurt ten times more than equivalent gains feel good.", "isCorrect": false, "rationale": "This ratio is an exaggeration and not supported by the text's specific finding."}]}, {"question": "A person is given two choices:\n1. A guaranteed gain of $300.\n2. A 50% chance of gaining $600 and a 50% chance of gaining nothing.\nMost people choose option 1.\nIf the choices were changed to:\n3. A guaranteed loss of $300.\n4. A 50% chance of losing $600 and a 50% chance of losing nothing.\nBased on Prospect Theory, which option would most people likely choose, and why?", "options": [{"text": "Option 3, because people are always risk-averse regardless of framing.", "isCorrect": false, "rationale": "This contradicts the core finding of Prospect Theory, which shows a reversal of risk preference based on framing as gains or losses."}, {"text": "Option 4, because people become risk-seeking to avoid a sure loss.", "isCorrect": true, "rationale": "The text explains this exact phenomenon: 'When the question is about gains, you are risk-averse... When the question is about losses, you become risk-seeking: you gamble to avoid a sure loss.'"}, {"text": "Option 3, because the expected value is the same, making the sure loss preferable.", "isCorrect": false, "rationale": "While the expected value is the same, Prospect Theory demonstrates that framing (gain vs. loss) reverses preference, showing people prefer gambling in the loss domain despite the sure loss having the same expected value."}, {"text": "Option 4, because losses are less impactful than gains, making the gamble less risky.", "isCorrect": false, "rationale": "Losses are presented as *more* impactful psychologically, which is why people try harder to avoid them, even through gambling."}]}, {"question": "The text states that 'people evaluate outcomes relative to a reference point.' Which of the following best describes the significance of this concept in contrast to classical economic theory?", "options": [{"text": "It highlights that individuals are primarily concerned with their absolute total wealth.", "isCorrect": false, "rationale": "This describes the classical economic assumption that Prospect Theory challenged, not its significance in contrast to it."}, {"text": "It suggests that decision-making is static and unaffected by prior experiences.", "isCorrect": false, "rationale": "The text implies that reference points are 'flexible and manipulable,' indicating decisions are not static."}, {"text": "It introduces flexibility, showing that a person's current position influences their perception of gains and losses, rather than just the final state.", "isCorrect": true, "rationale": "The text explains, 'People evaluate outcomes relative to a reference point... not in absolute terms.' This means a person's current state or starting point (the reference point) profoundly alters how they perceive changes from that point."}, {"text": "It proves that all individuals have identical psychological responses to risk.", "isCorrect": false, "rationale": "Loss aversion is described as a 'deep feature of human psychology,' implying a general tendency, but not that all individuals have identical responses."}]}, {"question": "An investor frequently sells their profitable stocks shortly after modest gains but holds onto their unprofitable stocks for extended periods, hoping they will 'get back to even.' This behavior is best explained by which concept from the text?", "options": [{"text": "The endowment effect, as they value their current holdings too much.", "isCorrect": false, "rationale": "While related to ownership, the endowment effect specifically refers to valuing something more *once you own it*, not the specific pattern of selling winners and holding losers in investment portfolios."}, {"text": "The disposition effect, driven by loss aversion making the realization of a loss painful.", "isCorrect": true, "rationale": "The text describes this exact pattern as the disposition effect: 'People hold losing investments far too long, hoping to 'get back to even,' because selling at a loss would make the loss feel real and final. Meanwhile, they sell winning investments too quickly... This pattern — called the disposition effect — is exactly backwards from what rational portfolio management would recommend.'"}, {"text": "Risk-seeking behavior for gains, as they want to maximize immediate profit.", "isCorrect": false, "rationale": "Selling winning investments quickly indicates risk-averse behavior for gains, not risk-seeking."}, {"text": "Rational portfolio management, aiming to minimize transaction costs.", "isCorrect": false, "rationale": "The text explicitly states this behavior is 'exactly backwards from what rational portfolio management would recommend.'"}]}, {"question": "A car dealership wants to encourage customers to pay cash instead of using credit cards. Based on the principles of loss aversion and framing, which of the following approaches would likely be most effective?", "options": [{"text": "Offering a '$200 discount for cash payments.'", "isCorrect": false, "rationale": "This frames the cash price as a gain, which the text suggests is less effective than framing the credit card price as a loss due to loss aversion."}, {"text": "Charging a '$200 surcharge for credit card payments.'", "isCorrect": true, "rationale": "The text directly addresses this example: 'A store that offers a '$5 discount for cash' frames the cash price as a gain. A store that charges a '$5 surcharge for credit cards' frames the credit price as a loss. Loss aversion predicts — and experiments confirm — that the surcharge framing is more effective at driving people toward cash, even though the prices are identical.'"}, {"text": "Stating that 'credit card payments are subject to a standard processing fee.'", "isCorrect": false, "rationale": "While a fee, 'standard processing fee' might soften the psychological impact of a 'surcharge' and may not leverage loss aversion as effectively."}, {"text": "Highlighting the security benefits of using cash for large transactions.", "isCorrect": false, "rationale": "This is a different psychological appeal (security) and does not directly relate to the principle of framing gains vs. losses in pricing as described in the text."}]}, {"question": "The text describes that people are 'risk-averse' when facing potential gains but 'risk-seeking' when facing potential losses, even if the expected value is identical. What is the underlying psychological mechanism that causes this reversal in preference?", "options": [{"text": "A fundamental misunderstanding of probability, leading to inconsistent choices.", "isCorrect": false, "rationale": "While cognitive biases can affect probability assessment, the text attributes the reversal primarily to the asymmetric impact of gains and losses, not explicitly to a misunderstanding of probability."}, {"text": "The desire to always choose the option with the highest potential positive outcome.", "isCorrect": false, "rationale": "If this were true, people would always gamble on gains, which contradicts the finding that they prefer a sure gain."}, {"text": "The asymmetric psychological impact of losses (which hurt more) versus gains (which feel less good), relative to a reference point.", "isCorrect": true, "rationale": "The text states: 'the psychological impact of moving away from that reference point is asymmetric: losses hurt more than equivalent gains feel good. ...This asymmetry — loss aversion — is a deep feature of human psychology.'"}, {"text": "An adaptive evolutionary trait that encourages minimizing resource acquisition risk and maximizing resource retention.", "isCorrect": false, "rationale": "While loss aversion may have evolutionary roots, the text specifically identifies the *asymmetric psychological impact* as the direct mechanism for the observed behavior."}]}, {"question": "Sarah buys a unique coffee mug for $10. A week later, a friend offers to buy it from her. Based on the endowment effect, how much would Sarah likely demand for the mug compared to what she paid for it?", "options": [{"text": "Approximately $5, as the mug has likely depreciated in value.", "isCorrect": false, "rationale": "This contradicts the endowment effect, which suggests an increase in perceived value."}, {"text": "Exactly $10, as that is its objective market value.", "isCorrect": false, "rationale": "The endowment effect demonstrates that perceived value is not solely based on objective market value once ownership is established."}, {"text": "Roughly $20, because ownership has created a new reference point, making selling it feel like a loss.", "isCorrect": true, "rationale": "The text states: 'Once you own something, you value it more than you did before you owned it — because giving it up now feels like a loss. In experiments, people given a coffee mug demanded roughly twice as much to sell it as others were willing to pay to buy it.'"}, {"text": "Whatever the friend is willing to pay, demonstrating rational market behavior.", "isCorrect": false, "rationale": "The endowment effect highlights a deviation from purely rational market behavior."}]}, {"question": "Why does loss aversion explain why people might 'over-insure' or purchase extended warranties that are rarely economically rational?", "options": [{"text": "People accurately assess the high probability of catastrophic events.", "isCorrect": false, "rationale": "The text indicates the opposite, that the potential loss looms large 'however unlikely' it might be, suggesting an overestimation of risk or impact rather than an accurate assessment."}, {"text": "The potential future loss, even if unlikely, is psychologically amplified and feels unbearable to contemplate.", "isCorrect": true, "rationale": "The text explains: 'The potential loss (however unlikely) looms so large psychologically that we pay far more in premiums than the expected loss would justify. Extended warranties on electronics are almost never worth the price, but the dread of a broken laptop without coverage feels unbearable.'"}, {"text": "Insurance companies offer such attractive deals that they become irresistible.", "isCorrect": false, "rationale": "The text mentions extended warranties are 'almost never worth the price,' suggesting the deals are not economically attractive."}, {"text": "It reflects a rational calculation of the maximum possible financial impact of an unforeseen event.", "isCorrect": false, "rationale": "The text states people pay 'far more in premiums than the expected loss would justify,' indicating an irrational rather than a rational calculation."}]}, {"question": "The combined insights of Prospect Theory and loss aversion primarily demonstrate which of the following about human economic decision-making?", "options": [{"text": "Human behavior consistently aligns with the principles of classical economic rationality.", "isCorrect": false, "rationale": "The text explicitly states that Prospect Theory 'challenged the classical assumption' and describes behaviors like the disposition effect as 'irrational.'"}, {"text": "People are inherently rational but make mistakes due to incomplete information.", "isCorrect": false, "rationale": "The theory highlights systematic psychological biases (loss aversion, framing effects) that influence decisions, not merely incomplete information."}, {"text": "Psychological factors, such as the framing of outcomes and the impact of reference points, profoundly and systematically influence perceived value and risk preference.", "isCorrect": true, "rationale": "This summarizes the core insights: 'The framing as gain or loss completely reverses your preference,' 'People evaluate outcomes relative to a reference point,' and 'Losses sting harder than gains feel good... This asymmetry drives risk aversion for gains, risk seeking for losses, and a host of irrational behaviors.'"}, {"text": "The expected value of a choice is the sole determinant of a person's preference, irrespective of context.", "isCorrect": false, "rationale": "The text directly refutes this: 'The expected value is the same in both cases ($500), but the framing as gain or loss completely reverses your preference.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
