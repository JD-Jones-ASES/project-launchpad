    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to Richard Feynman, what is the fundamental characteristic that distinguishes \"cargo cult science\" from genuine scientific inquiry?", "options": [{"text": "The use of complex statistical models without proper theoretical grounding.", "isCorrect": false, "rationale": "While cargo cult science might misuse statistics, this is a specific manifestation, not the fundamental characteristic Feynman identified. The core issue is the lack of underlying substance, not just complexity of tools."}, {"text": "The appearance of scientific rigor without the underlying commitment to self-correction and honesty.", "isCorrect": true, "rationale": "Feynman explicitly states that cargo cult science 'has the appearance of scientific rigor... but is missing the essential ingredient that makes science work: a ruthless commitment to not fooling yourself.'"}, {"text": "The inability to secure sufficient funding for large-scale experimental replication.", "isCorrect": false, "rationale": "Insufficient funding is an external challenge to research, but it does not define the internal methodological flaws or lack of integrity characteristic of cargo cult science."}, {"text": "The focus on applied research rather than purely theoretical investigations.", "isCorrect": false, "rationale": "Cargo cult science can occur in both applied and theoretical research. The type of research is irrelevant; the critical factor is the adherence to the scientific method's substance."}]}, {"question": "In Feynman's analogy of cargo cults, what did the islanders' imitation airfields lack that is comparable to what \"cargo cult science\" lacks?", "options": [{"text": "Modern communication technology to contact the outside world.", "isCorrect": false, "rationale": "The text states the islanders had replicated the form with 'extraordinary care,' implying they knew the visible features. The missing element was deeper than communication technology."}, {"text": "The genuine desire for the return of Allied forces.", "isCorrect": false, "rationale": "The islanders genuinely hoped for the return of the cargo planes, so desire was not the missing element. Their method for achieving it was flawed."}, {"text": "The underlying logistical network and production systems that generated the cargo.", "isCorrect": true, "rationale": "The text explicitly states: 'What they lacked was the substance—the network of factories, logistics, and military operations that actually produced the cargo.' This substance is analogous to the 'ruthless commitment to not fooling yourself' in science."}, {"text": "Advanced engineering knowledge to construct durable airstrips.", "isCorrect": false, "rationale": "The text notes they replicated the form 'with extraordinary care,' suggesting they were capable of building the physical structures. The deficit was in the functional system, not necessarily the construction skill."}]}, {"question": "Feynman states, \"the first principle of scientific integrity is that you must not fool yourself—and you are the easiest person to fool.\" What does this statement imply about the nature of scientific practice?", "options": [{"text": "Scientists are inherently prone to dishonesty and require external oversight.", "isCorrect": false, "rationale": "Feynman's point is not about inherent dishonesty, but about the unconscious human tendency towards self-deception and bias, even in well-intentioned individuals."}, {"text": "The most significant barrier to objective scientific discovery often comes from a researcher's own biases and expectations.", "isCorrect": true, "rationale": "This statement highlights that personal biases and the desire for certain outcomes can unconsciously lead researchers astray, making self-deception the 'easiest' way to undermine scientific integrity. This requires active self-policing."}, {"text": "Collaborative research teams are generally less susceptible to error than individual scientists.", "isCorrect": false, "rationale": "While collaboration can help, Feynman's principle addresses the individual's susceptibility to self-deception. Group dynamics can also introduce biases, and simply having a team doesn't eliminate the fundamental challenge of self-correction."}, {"text": "Rigorous peer review is sufficient to eliminate all forms of self-deception in scientific work.", "isCorrect": false, "rationale": "The 'thinkaboutit' section specifically asks if peer review is 'enough,' implying it may not fully address the challenge of self-deception, which often operates at a more fundamental, internal level."}]}, {"question": "Which of the following scenarios is the most direct example of \"cargo cult science\" as described by Feynman?", "options": [{"text": "A climate scientist publishes a model's predictions, noting its limitations and assumptions.", "isCorrect": false, "rationale": "Acknowledging limitations and assumptions is a sign of good scientific practice, demonstrating honesty and a commitment to not fooling oneself."}, {"text": "A medical researcher publishes a study finding a statistically significant effect after conducting 15 trials, but only the one with a positive result is highlighted.", "isCorrect": true, "rationale": "This directly mirrors Feynman's example of the pharmaceutical company publishing only the one positive trial out of twenty, representing selective reporting and a failure to report all results, a key tenet of cargo cult science."}, {"text": "An astrophysicist proposes a new theory based on observational data and invites critical review from peers.", "isCorrect": false, "rationale": "Proposing a theory based on evidence and inviting peer critique are fundamental aspects of the scientific process, demonstrating openness and a commitment to self-correction."}, {"text": "A botanist meticulously documents the growth of a new plant species, publishing all raw data for others to analyze.", "isCorrect": false, "rationale": "Transparency through publishing raw data is an excellent practice that enables replication and scrutiny, directly countering cargo cult science principles."}]}, {"question": "Feynman \"boiled it down to a kind of radical honesty\" when describing the \"substance\" missing from cargo cult science. Which of the following best encapsulates this radical honesty?", "options": [{"text": "Presenting only the most compelling evidence to build a strong case for a hypothesis.", "isCorrect": false, "rationale": "This is precisely what Feynman argued against; it's a form of selective reporting that avoids confronting contradictory evidence and thus fosters self-deception."}, {"text": "Actively seeking out evidence that could disprove one's theory and reporting all results, regardless of outcome.", "isCorrect": true, "rationale": "This aligns with Feynman's definition of substance: 'report all your results, not just the ones that support your hypothesis...actively seeking out reasons your theory might fail, rather than constructing experiments designed to confirm it.'"}, {"text": "Collaborating with other researchers to share data and interpretations.", "isCorrect": false, "rationale": "While collaboration is beneficial, 'radical honesty' as defined by Feynman focuses on the individual researcher's internal commitment to truth, beyond just sharing data."}, {"text": "Ensuring that research methods are complex and cutting-edge to demonstrate expertise.", "isCorrect": false, "rationale": "This describes a focus on the 'form' or appearance of sophistication, rather than the 'substance' of honest inquiry. Complexity does not equate to integrity."}]}, {"question": "How do the \"incentive structures of modern academia\" described in the text often contribute to the prevalence of cargo cult science?", "options": [{"text": "They prioritize interdisciplinary research over deep specialization.", "isCorrect": false, "rationale": "The text does not mention interdisciplinary research as a factor contributing to cargo cult science. The focus is on how publication and results drive incentives."}, {"text": "They reward novel, positive findings while de-emphasizing replication or null results.", "isCorrect": true, "rationale": "The text explicitly states: 'Scientists are rewarded for publishing novel, positive results, not for replicating old ones or reporting null findings.' This creates an environment where researchers are incentivized to engage in practices that resemble cargo cult science."}, {"text": "They encourage competition among researchers, leading to faster discovery.", "isCorrect": false, "rationale": "While competition exists, the text highlights the specific *type* of results that are rewarded (novel, positive) as the problem, not competition itself or the speed of discovery."}, {"text": "They require excessive administrative paperwork, distracting from core research.", "isCorrect": false, "rationale": "Administrative burdens can be a problem, but the text focuses on publication incentives as the driver for cargo cult science, not paperwork."}]}, {"question": "A junior researcher wants to ensure their work embodies genuine scientific rigor and avoids the pitfalls of cargo cult science. Based on Feynman's principles, what is the *most crucial* step they should take?", "options": [{"text": "Use the most advanced statistical software available for data analysis.", "isCorrect": false, "rationale": "Using advanced tools addresses the 'form' of science. However, without the underlying commitment to honesty, even advanced tools can be misused to produce cargo cult science."}, {"text": "Design experiments specifically to confirm their initial hypothesis.", "isCorrect": false, "rationale": "This is a direct example of cargo cult science, as Feynman stated, it means 'constructing experiments designed to confirm it,' rather than 'actively seeking out reasons your theory might fail.'"}, {"text": "Pre-register their study methods and analysis plan, committing to publish all results regardless of statistical significance.", "isCorrect": true, "rationale": "Pre-registration addresses several core principles: it ensures reproducibility by making methods public before data collection, prevents data-dredging, and commits to reporting all results (positive or null), embodying 'radical honesty' and avoiding self-deception."}, {"text": "Secure funding from prestigious organizations to enhance their study's credibility.", "isCorrect": false, "rationale": "Funding from prestigious sources might enhance perceived credibility, but it does not inherently guarantee scientific rigor or protect against self-deception, which is an internal commitment."}]}, {"question": "The text describes the \"replication crisis\" as a \"cargo cult crisis.\" What does this imply about the studies failing to replicate?", "options": [{"text": "They were typically conducted by inexperienced researchers.", "isCorrect": false, "rationale": "The text does not attribute the crisis to a lack of experience, but rather to systemic issues in how science was practiced and incentivized. Experienced researchers can also fall prey to these issues."}, {"text": "They lacked the genuine commitment to self-correction, despite appearing scientifically sound.", "isCorrect": true, "rationale": "The text states the 'replication crisis... is, in Feynman's framework, a cargo cult crisis: the outward forms of science were maintained while the inner commitment to self-correction eroded.' This directly points to the lack of substance behind the form."}, {"text": "Their findings were inherently false and fabricated.", "isCorrect": false, "rationale": "While some fabrication might occur, the replication crisis primarily highlights methodological issues (small samples, flexible methods, selective reporting) leading to non-replicable results, not necessarily outright fabrication."}, {"text": "The scientific community intentionally suppressed negative findings.", "isCorrect": false, "rationale": "While selective reporting is a problem, the 'replication crisis' points to published studies that were deemed significant at the time but later failed to hold up, suggesting issues with the original studies' rigor, not just suppression of others."}]}, {"question": "A new health study announces a \"statistically significant\" link between consuming a specific obscure berry and increased lifespan, found after correlating thousands of dietary variables with thousands of health outcomes. Based on the text, what critical question should be immediately raised about this finding?", "options": [{"text": "Was the research funded by the berry industry?", "isCorrect": false, "rationale": "While conflict of interest is an important consideration in research, the specific methodology described (correlating thousands of variables) points to a different, more direct cargo cult sin identified in the text."}, {"text": "Were all other tested correlations, including non-significant ones, also reported in the study?", "isCorrect": true, "rationale": "This scenario perfectly matches the 'nutritional epidemiology' example of data-dredging where researchers 'test hundreds of correlations and reporting only the “significant” ones.' A critical question is whether selective reporting occurred."}, {"text": "Was the sample size large enough to detect such a small effect?", "isCorrect": false, "rationale": "Sample size is crucial, but the core issue highlighted by the text in this type of study is the 'data-dredging' approach (testing many variables) which can yield spurious significant results even with adequate sample sizes for individual tests."}, {"text": "Is the observed effect biologically plausible given current scientific understanding?", "isCorrect": false, "rationale": "Biological plausibility is important for evaluating the validity of a finding, but the question asks about the *methodology* and its relation to cargo cult science, which is addressed by the 'data-dredging' aspect."}]}, {"question": "Feynman's warning, \"you are the easiest person to fool,\" serves as a foundational challenge in scientific integrity. What is the most profound implication of this statement for scientific progress?", "options": [{"text": "That all scientific findings should be treated with skepticism until independently verified.", "isCorrect": false, "rationale": "While healthy skepticism is good, Feynman's statement highlights an *internal* challenge within the scientific process itself, not just how findings are received externally."}, {"text": "That the scientific method, despite its rigor, is fundamentally vulnerable to unconscious biases and motivated reasoning if not actively countered.", "isCorrect": true, "rationale": "This captures the essence of Feynman's message: the scientific method requires a constant, active, and 'ruthless commitment' to honesty precisely because human nature (our ease of fooling ourselves) poses a persistent threat to objectivity, even when all the 'forms' are present."}, {"text": "That the public often misunderstands scientific data, leading to misinterpretations.", "isCorrect": false, "rationale": "This statement focuses on the challenges of public communication, not the primary internal challenge of self-deception that Feynman addresses for the scientist."}, {"text": "That scientists should rely primarily on machine learning algorithms to eliminate human error in data analysis.", "isCorrect": false, "rationale": "While technology can aid in analysis, the core problem of self-deception is human, affecting interpretation, design, and reporting, not just technical data processing. It requires a fundamental shift in mindset, not just a tool."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
