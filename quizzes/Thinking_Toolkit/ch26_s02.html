    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Zeno's paradoxes of motion fundamentally rested on which flawed assumption?", "options": [{"text": "That mathematical concepts could accurately model physical reality.", "isCorrect": false, "rationale": "Zeno's paradoxes were not about the validity of mathematical models but rather an issue with an intuitive assumption about infinite processes."}, {"text": "That motion is an illusion and does not exist.", "isCorrect": false, "rationale": "While Zeno's paradoxes made motion seem impossible, his core assumption was about the time required for infinite tasks, not that motion itself was an illusion. The ancient Greeks 'could feel in their bones that motion was real'."}, {"text": "That completing an infinite number of tasks must take an infinite amount of time.", "isCorrect": true, "rationale": "The text explicitly states: 'Zeno's paradox assumed that completing infinitely many tasks must take infinitely long.' This hidden assumption is identified as the source of his error."}, {"text": "That distance can always be infinitely divided into smaller segments.", "isCorrect": false, "rationale": "Zeno was correct that a journey can be divided into infinitely many parts; his error was in the implication for the time taken to cover those parts."}], "id": "q01"}, {"question": "What mathematical development, emerging in the 17th century, provided the key to resolving Zeno's paradoxes?", "options": [{"text": "Euclidean geometry", "isCorrect": false, "rationale": "Euclidean geometry was well-established long before the 17th century and did not provide the specific tools needed for Zeno's paradoxes related to infinite sums."}, {"text": "Calculus", "isCorrect": true, "rationale": "The text states, 'That machinery arrived in the 17th century with the development of calculus, and it rests on a single, profound idea: an infinite sum can have a finite total.'"}, {"text": "Boolean algebra", "isCorrect": false, "rationale": "Boolean algebra was developed much later (19th century) and is not the mathematical tool identified for resolving Zeno's paradoxes."}, {"text": "Set theory", "isCorrect": false, "rationale": "Set theory, while dealing with infinity, was primarily developed in the late 19th and early 20th centuries, not the 17th century, and is not the direct 'machinery' mentioned for this resolution."}], "id": "q02"}, {"question": "The central mathematical insight that resolves Zeno's paradoxes is that...", "options": [{"text": "all infinite processes are inherently impossible to complete.", "isCorrect": false, "rationale": "This contradicts the core resolution, which shows that certain infinite processes (like summing a convergent series) are completable in finite time/value."}, {"text": "an infinite sum can have a finite total.", "isCorrect": true, "rationale": "The text explicitly states this as 'a single, profound idea' that calculus provides: 'an infinite sum can have a finite total.'"}, {"text": "all numbers are ultimately finite, regardless of how large they seem.", "isCorrect": false, "rationale": "While true that individual numbers are finite, this doesn't capture the essence of summing infinitely many of them to a finite result, which is the key idea."}, {"text": "intuitive understanding is always superior to mathematical proofs.", "isCorrect": false, "rationale": "The resolution of Zeno's paradoxes demonstrates the opposite, showing how mathematics can correct faulty intuition."}], "id": "q03"}, {"question": "In the context of Zeno's dichotomy paradox for crossing a room of length 1, the infinite series 1/2 + 1/4 + 1/8 + ... represents the sum of...", "options": [{"text": "the infinite number of time intervals required to complete the journey.", "isCorrect": false, "rationale": "While time intervals also form a convergent series, this specific series (1/2 + 1/4 + 1/8 + ...) is presented in the text as representing the 'distances you must cover to cross a room of length 1'."}, {"text": "the cumulative errors made in measuring the distance.", "isCorrect": false, "rationale": "The series represents actual distances, not measurement errors."}, {"text": "the successively smaller distances that must be traversed to reach the destination.", "isCorrect": true, "rationale": "The text states, 'Consider the series produced by Zeno's dichotomy — the distances you must cover to cross a room of length 1: 1/2 + 1/4 + 1/8 + 1/16 + ...'"}, {"text": "an approximation of the total distance, but not the exact value.", "isCorrect": false, "rationale": "The text clarifies that the sum 'equals exactly 1' in the precise mathematical sense of a limit, not 'approximately 1'."}], "id": "q04"}, {"question": "For an infinite geometric series like the one resolving Zeno's paradoxes to converge to a finite sum, what condition must its common ratio (r) satisfy?", "options": [{"text": "r must be exactly 1.", "isCorrect": false, "rationale": "If r = 1, the series would be a + a + a + ... which would diverge (grow infinitely) unless a=0. The text example has r = 1/2."}, {"text": "r must be greater than 1.", "isCorrect": false, "rationale": "If r > 1, the terms would grow larger or stay large, causing the series to diverge (grow infinitely). The text shows r = 1/2, for which (1/2)^n gets closer to 0."}, {"text": "The absolute value of r (|r|) must be less than 1.", "isCorrect": true, "rationale": "The text demonstrates that for the series to converge, (1/2)^n must approach 0 as n grows. This occurs when the absolute value of the common ratio is less than 1 (|r| < 1)."}, {"text": "r must be a positive integer.", "isCorrect": false, "rationale": "If r is a positive integer greater than or equal to 1, the series would not converge. The example uses r = 1/2, which is not an integer."}], "id": "q05"}, {"question": "How does the concept of convergent infinite series apply to Achilles catching the tortoise, according to the text?", "options": [{"text": "It proves that Achilles actually never reaches the tortoise, only gets infinitely close.", "isCorrect": false, "rationale": "The resolution proves that Achilles *does* reach and overtake the tortoise, as the infinite sum of distances (and times) converges to a finite total."}, {"text": "It shows that Achilles covers an infinite number of sub-distances, but the total distance is finite, and the total time taken to cover these distances is also finite because the time intervals form a convergent series.", "isCorrect": true, "rationale": "The text explains: 'He crosses those infinitely many intervals in a finite amount of time, because the time intervals also form a convergent series.'"}, {"text": "It demonstrates that the tortoise must stop moving for Achilles to catch up.", "isCorrect": false, "rationale": "The resolution doesn't rely on the tortoise stopping; it addresses the apparent paradox of motion continuing."}, {"text": "It implies that Achilles can only move for a finite number of steps before stopping.", "isCorrect": false, "rationale": "Achilles completes an infinite number of steps; the key is that these steps sum to a finite distance and are completed in finite time."}], "id": "q06"}, {"question": "The statement that the infinite series 1/2 + 1/4 + 1/8 + ... 'equals 1' in a precise mathematical sense, rather than 'approaches 1,' signifies what about the nature of its sum?", "options": [{"text": "That the sum will eventually reach 1 if enough terms are added, but never truly be 1.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating 'Not “approximately 1” or “approaching 1.”' The sum is precisely 1 in the limit."}, {"text": "That the concept of infinity is only an approximation in mathematics.", "isCorrect": false, "rationale": "The resolution highlights the precise mathematical handling of infinity, not its approximate nature."}, {"text": "That the total value of the infinite series is exactly 1, determined by the limit of its partial sums as the number of terms goes to infinity.", "isCorrect": true, "rationale": "The text states: 'In the precise mathematical sense of a limit, the sum equals 1.' This means the limit of the partial sums *is* 1, not just approaches it."}, {"text": "That the calculations are rounded to the nearest integer.", "isCorrect": false, "rationale": "This is a misinterpretation of 'precise mathematical sense' and 'equals.' The sum is exact, not rounded."}], "id": "q07"}, {"question": "Why were the ancient Greeks unable to mathematically resolve Zeno's paradoxes, despite their strong intuition about motion?", "options": [{"text": "They lacked accurate instruments to measure very small distances and times.", "isCorrect": false, "rationale": "The problem was conceptual and mathematical, not one of measurement technology. The text mentions 'mathematical machinery'."}, {"text": "They believed all numbers were finite and thus could not conceive of an infinite sum.", "isCorrect": false, "rationale": "The issue wasn't a belief that all numbers were finite, but a lack of tools to handle infinite sums in a way that yielded finite results. They did conceptualize infinite divisions."}, {"text": "They lacked the mathematical tools, specifically the concepts of infinite series and convergence, which would come with calculus.", "isCorrect": true, "rationale": "The text states: 'They lacked the mathematical machinery to explain why the paradox fails. That machinery arrived in the 17th century with the development of calculus...'"}, {"text": "Their philosophical traditions discouraged challenging established paradoxes.", "isCorrect": false, "rationale": "The text does not suggest philosophical discouragement but rather a mathematical deficiency."}], "id": "q08"}, {"question": "Based on the 'note' section, what is the critical factor determining whether an infinite series converges to a finite sum or diverges (grows without bound)?", "options": [{"text": "Whether all the terms in the series are positive.", "isCorrect": false, "rationale": "Both Zeno's series and the harmonic series have all positive terms, but only Zeno's converges. So, positivity alone isn't the critical factor."}, {"text": "Whether the terms in the series are getting smaller and smaller.", "isCorrect": false, "rationale": "The text explicitly states: 'Convergence depends not just on the terms getting small but on them getting small fast enough.' The harmonic series' terms get smaller but it still diverges."}, {"text": "Whether the terms in the series get smaller 'fast enough' for their sum to be finite.", "isCorrect": true, "rationale": "The 'note' section clearly states: 'Convergence depends not just on the terms getting small but on them getting small fast enough.'"}, {"text": "Whether the first term of the series is a fraction.", "isCorrect": false, "rationale": "The value of the first term does not solely determine convergence. The harmonic series starts with 1, but still diverges."}], "id": "q09"}, {"question": "The resolution of Zeno's paradoxes serves as a powerful illustration of which broader philosophical or mathematical lesson?", "options": [{"text": "That complex mathematical problems often have simple, intuitive solutions.", "isCorrect": false, "rationale": "The resolution was not simple or intuitive; it required advanced mathematical machinery (calculus) to overcome faulty intuition."}, {"text": "That common sense and intuition are always reliable guides in understanding phenomena.", "isCorrect": false, "rationale": "The text implies the opposite, stating 'infinity often behaves in ways that contradict our finite intuitions'."}, {"text": "That infinity often behaves in ways that contradict our finite intuitions, but careful mathematics can provide clarity and make sense of it.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states this as 'a broader lesson — infinity often behaves in ways that contradict our finite intuitions, but careful mathematics can make sense of it.'"}, {"text": "That philosophical dilemmas are ultimately beyond the scope of mathematical analysis.", "isCorrect": false, "rationale": "The resolution shows how mathematics *can* resolve such philosophical dilemmas."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
