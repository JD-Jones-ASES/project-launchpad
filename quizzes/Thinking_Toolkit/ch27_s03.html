<script>
var QUESTIONS = [{"question": "Which statement accurately describes the historical context and current status of the P vs. NP problem?", "options": [{"text": "It was solved by Stephen Cook in 1971, proving P = NP.", "isCorrect": false, "rationale": "Stephen Cook formalized the problem and introduced NP-completeness, but he did not solve it. The problem remains unsolved."}, {"text": "It is one of the Millennium Prize Problems, formalized in the early 1970s, and remains unsolved today.", "isCorrect": true, "rationale": "The problem was formalized by Stephen Cook in 1971 and Leonid Levin in 1973, listed as a Millennium Prize Problem in 2000, and is still unsolved."}, {"text": "It was proposed by the Clay Mathematics Institute in 2000 and was quickly solved shortly thereafter.", "isCorrect": false, "rationale": "The Clay Mathematics Institute listed it as a Millennium Prize Problem in 2000, but it was formalized decades earlier and has not been solved since."}, {"text": "It is a philosophical question about computational limits, not a formal computer science problem.", "isCorrect": false, "rationale": "P vs. NP is a deeply formal problem in computational complexity theory, with precise definitions for P and NP classes."}]}, {"question": "The P vs. NP question fundamentally asks:", "options": [{"text": "Whether all problems are solvable by computers.", "isCorrect": false, "rationale": "While related to computability, the P vs. NP question is specifically about the *efficiency* of solving problems whose solutions can be efficiently verified, not whether they are solvable at all (some problems, like the Halting Problem, are provably unsolvable)."}, {"text": "If problems that are easy to verify also have solutions that are easy to find.", "isCorrect": true, "rationale": "This is the core of the P vs. NP question: does the ability to quickly check a solution guarantee the ability to quickly find one? This is the definition of the distinction between P and NP classes."}, {"text": "If every problem in P is also an NP-complete problem.", "isCorrect": false, "rationale": "This is incorrect. While problems in P are also in NP, NP-complete problems are the *hardest* problems in NP. It is generally believed (P!=NP) that P is a proper subset of NP, and NP-complete problems are outside P."}, {"text": "How to design faster algorithms for known hard problems.", "isCorrect": false, "rationale": "While the resolution of P vs. NP would impact algorithm design, the question itself is about the fundamental relationship between solution-finding and solution-verification efficiency, not a guide for algorithm development."}]}, {"question": "Which of the following problems would be classified as belonging to the class P?", "options": [{"text": "Finding the optimal route for a traveling salesman visiting many cities.", "isCorrect": false, "rationale": "The Traveling Salesman Problem (TSP) is a classic example of an NP-complete problem, widely believed to not be in P."}, {"text": "Verifying whether a given solution to a jigsaw puzzle is correct.", "isCorrect": false, "rationale": "Verifying a jigsaw puzzle solution is efficient, meaning the problem is in NP. However, the *problem of finding* the solution to a jigsaw puzzle (from scratch) is generally considered hard, so it's not known to be in P. The question asks for a problem belonging *to P* (solvable efficiently)."}, {"text": "Sorting a list of one billion numbers from smallest to largest.", "isCorrect": true, "rationale": "Sorting problems are explicitly mentioned as examples of problems in P, meaning they can be solved efficiently with algorithms whose time complexity is a polynomial function of the input size."}, {"text": "Factoring a very large number into its prime components.", "isCorrect": false, "rationale": "Factoring large numbers is considered computationally hard (though not NP-complete in the classical sense) and is the basis for much modern cryptography, suggesting it is not in P."}]}, {"question": "A key characteristic of problems in the class NP is that:", "options": [{"text": "They can only be solved using non-deterministic computers.", "isCorrect": false, "rationale": "The 'N' in NP stands for 'nondeterministic,' referring to a theoretical model of computation where all possible paths can be explored simultaneously. However, the practical definition for NP is that solutions can be *verified* efficiently on a deterministic (standard) computer."}, {"text": "Their solutions can be verified quickly, even if finding the solution might be difficult.", "isCorrect": true, "rationale": "This is the precise definition of problems in the class NP. The 'nondeterministic polynomial time' means a solution can be *verified* in polynomial time."}, {"text": "They are always harder to solve than any problem in the class P.", "isCorrect": false, "rationale": "Every problem in P is also in NP. Therefore, problems in NP can be as 'easy' as problems in P. The question is whether *all* problems in NP are as easy as problems in P."}, {"text": "They cannot be solved in any practical amount of time, regardless of the input size.", "isCorrect": false, "rationale": "This is too strong a claim. Many NP problems have heuristic or approximation algorithms that find 'good enough' solutions. The issue is finding the *optimal* solution efficiently for all instances."}]}, {"question": "If it were proven that P = NP, what would be the most significant implication for modern cryptography?", "options": [{"text": "It would become impossible to create new encryption algorithms.", "isCorrect": false, "rationale": "It wouldn't make it impossible to create *new* algorithms, but it would fundamentally undermine the security of current systems. New cryptographic approaches would be needed, potentially based on different mathematical principles not reliant on 'hard' problems."}, {"text": "Most current encryption systems, which rely on one-way functions, would become easily breakable.", "isCorrect": true, "rationale": "Modern cryptography relies on problems that are 'easy' in one direction (e.g., multiplying primes) but 'hard' in the reverse (factoring). If P=NP, the 'hard' direction would become easy, allowing encrypted messages to be decrypted efficiently."}, {"text": "Only quantum computers would be able to break cryptographic codes.", "isCorrect": false, "rationale": "If P=NP, even classical computers would be able to break current encryption, making quantum computers less relevant for this specific task, as the problems themselves would no longer be considered 'hard'."}, {"text": "The development of secure communication protocols would accelerate dramatically.", "isCorrect": false, "rationale": "While optimization in general might accelerate, the immediate impact on cryptography would be a crisis, as existing systems would be compromised, requiring a complete paradigm shift for secure communication."}]}, {"question": "Consider a research team trying to design a new protein with specific folding properties. They currently use approximation algorithms because finding the absolute optimal fold is computationally intractable. What does this scenario imply about the P vs. NP question?", "options": [{"text": "It suggests that P = NP, as they are actively seeking an optimal solution.", "isCorrect": false, "rationale": "The use of approximation algorithms for protein folding (an NP-complete problem) is strong practical evidence that P ≠ NP. If P = NP, finding the optimal fold would be efficient, rendering approximation algorithms less necessary for optimality."}, {"text": "It supports the belief that P ≠ NP, as they rely on heuristics for an NP-complete problem.", "isCorrect": true, "rationale": "Protein folding is an NP-complete problem. The fact that researchers resort to approximation algorithms rather than finding exact optimal solutions efficiently is a real-world manifestation of the belief that P ≠ NP, meaning finding the optimal solution is fundamentally hard."}, {"text": "It indicates that the problem is not in NP, since approximation algorithms are used.", "isCorrect": false, "rationale": "Protein folding is indeed considered to be in NP (and NP-complete). The use of approximation algorithms does not remove it from NP; it's a pragmatic approach *because* it's in NP and likely not in P."}, {"text": "It has no bearing on the P vs. NP question, as protein folding is a biological problem.", "isCorrect": false, "rationale": "Computational problems arising from biological challenges like protein folding are precisely the kind of real-world scenarios that fall under the P vs. NP question, demonstrating its practical relevance."}]}, {"question": "What defines an NP-complete problem?", "options": [{"text": "It is a problem in P that also has an efficient verification process.", "isCorrect": false, "rationale": "NP-complete problems are the *hardest* problems in NP. While problems in P are also in NP, it is generally believed that NP-complete problems are not in P."}, {"text": "It is a problem that cannot be solved by any known algorithm.", "isCorrect": false, "rationale": "NP-complete problems *can* be solved (e.g., by brute-force checking all possibilities), but not necessarily *efficiently* in polynomial time. This statement describes an uncomputable problem, which is a different concept."}, {"text": "It is a problem within NP such that if it can be solved efficiently, then all problems in NP can be solved efficiently.", "isCorrect": true, "rationale": "This is the definition of an NP-complete problem: if an efficient (polynomial-time) algorithm exists for *any* NP-complete problem, then such an algorithm could be transformed to solve *all* problems in NP efficiently, implying P = NP."}, {"text": "It is a problem whose solution can be verified quickly, but only on a non-deterministic machine.", "isCorrect": false, "rationale": "Solutions for problems in NP (including NP-complete) can be verified quickly on a *deterministic* (standard) computer. The 'nondeterministic' part refers to the theoretical model where the solution itself might be 'found' efficiently."}]}, {"question": "The fact that most computer scientists believe P ≠ NP is primarily supported by:", "options": [{"text": "Mathematical proofs demonstrating the impossibility of P = NP.", "isCorrect": false, "rationale": "No such mathematical proof exists; proving P ≠ NP is the ongoing challenge. The text explicitly states, 'But no one has been able to prove this.'"}, {"text": "The discovery of a problem in NP that has been definitively shown to be outside P.", "isCorrect": false, "rationale": "Discovering such a problem would *be* the proof that P ≠ NP. This has not happened."}, {"text": "Decades of failed attempts to find efficient algorithms for NP-complete problems.", "isCorrect": true, "rationale": "The text states that 'The fact that no efficient algorithm has been found for any of them [NP-complete problems], despite decades of trying, is the strongest evidence (though not proof) that P ≠ NP.'"}, {"text": "The inherent complexity of designing sophisticated new computer hardware.", "isCorrect": false, "rationale": "Hardware complexity is largely irrelevant to the theoretical question of P vs. NP, which deals with the fundamental computational difficulty of problems, irrespective of specific hardware advancements."}]}, {"question": "If P = NP were proven true, how would the field of mathematical proof be impacted?", "options": [{"text": "Mathematicians would no longer be needed, as computers could generate all new proofs instantly.", "isCorrect": false, "rationale": "While finding proofs would become efficient, the role of human intuition, problem formulation, and interpreting results would likely remain crucial. It would augment, not replace, mathematicians."}, {"text": "Verifying a proof would become computationally intractable, leading to an inability to confirm new theorems.", "isCorrect": false, "rationale": "Verifying a proof is already considered to be in NP (meaning efficient verification). If P=NP, finding proofs would become efficient, but verification would remain efficient, not become intractable."}, {"text": "Computers could discover mathematical proofs as easily as they currently check them.", "isCorrect": true, "rationale": "The text states: 'Verifying a proof is in NP. If P = NP, finding proofs would also be efficient — a computer could discover proofs as easily as it checks them.' This describes a transformative shift."}, {"text": "The definition of what constitutes a 'valid' proof would become more stringent.", "isCorrect": false, "rationale": "The truth of P=NP would affect the *process* of finding proofs, not the fundamental standards or validity criteria for proofs themselves."}]}, {"question": "The use of 'good enough' solutions by GPS systems for routes and airlines for crew scheduling is a real-world consequence that directly supports the practical implications of:", "options": [{"text": "The Halting Problem, which demonstrates certain problems are unsolvable.", "isCorrect": false, "rationale": "The Halting Problem concerns computability (whether a program finishes), not the efficiency of finding optimal solutions for solvable problems like routing or scheduling."}, {"text": "The belief that P = NP, suggesting optimal solutions are within reach with better algorithms.", "isCorrect": false, "rationale": "The reliance on approximation and heuristics for these NP-complete problems is precisely because optimal solutions are *not* easily within reach, thus supporting the belief that P ≠ NP."}, {"text": "The No Free Lunch Theorem, indicating no single algorithm is best for all problems.", "isCorrect": false, "rationale": "While related to algorithm design, the No Free Lunch Theorem speaks to the generality of algorithms across problem spaces. The GPS/airline examples relate specifically to the *intractability* of finding *optimal* solutions for individual, complex problems, which is a P vs. NP issue."}, {"text": "The difficulty of solving NP-complete problems efficiently, implying P ≠ NP.", "isCorrect": true, "rationale": "GPS and airline scheduling are examples of optimization problems that are NP-complete. The necessity of using 'approximation algorithms' or 'heuristics' for 'good enough' solutions, rather than finding optimal ones efficiently, is a direct practical consequence of the belief that P ≠ NP, meaning these problems are fundamentally hard to solve optimally."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
