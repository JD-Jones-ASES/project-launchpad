<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 18, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "How does the organizational planning fallacy fundamentally differ from the individual planning fallacy as described in the text?", "options": [{"text": "The individual fallacy is driven by social pressures, while the organizational fallacy is purely cognitive.", "isCorrect": false, "rationale": "This is incorrect. The text states the individual fallacy is cognitive ('inside view'), while the organizational fallacy involves structural forces, group dynamics, and incentives, which go beyond purely cognitive aspects."}, {"text": "The individual fallacy stems from an 'inside view,' while the organizational fallacy is primarily structural, involving incentives, group dynamics, and complexity.", "isCorrect": true, "rationale": "This is correct. The text explicitly states that at the organizational level, the forces producing the fallacy 'are not merely cognitive. They are structural,' detailing incentives, group optimism, and complexity as key drivers, contrasting with the individual 'inside view.'"}, {"text": "The organizational fallacy applies only to private sector projects, whereas the individual fallacy affects public works.", "isCorrect": false, "rationale": "This is incorrect. Flyvbjerg's research covers 'large infrastructure projects around the world,' including public works, and the text makes no distinction between private and public sectors for the applicability of the organizational fallacy."}, {"text": "The individual planning fallacy leads to cost overruns, but the organizational fallacy primarily results in schedule delays.", "isCorrect": false, "rationale": "This is incorrect. Both individual and organizational planning fallacies are described as leading to both cost overruns and schedule delays. For organizational projects, the text highlights 'cost overruns and schedule delays are not exceptions — they are the norm.'"}]}, {"question": "According to Bent Flyvbjerg's research on large infrastructure projects, what is the prevalent trend regarding project outcomes?", "options": [{"text": "A slight majority of projects meet their original budgets and schedules, with exceptions being rare.", "isCorrect": false, "rationale": "This is incorrect. The text states that 'cost overruns and schedule delays are not exceptions — they are the norm,' directly contradicting this option."}, {"text": "Approximately nine out of ten projects experience cost overruns, indicating that exceeding budgets is the norm.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'nine out of ten large infrastructure projects exceed their budgets,' confirming that cost overruns are a consistent pattern."}, {"text": "While cost overruns are common, they typically remain below 10% of the original budget.", "isCorrect": false, "rationale": "This is incorrect. Flyvbjerg's analysis found 'an average cost overrun of 28% for roads, 45% for rail, and 20% for buildings,' far exceeding 10%."}, {"text": "Schedule delays are more frequent than cost overruns, but their financial impact is generally minimal.", "isCorrect": false, "rationale": "This is incorrect. The text mentions both 'cost overruns and schedule delays' as significant and represents 'billions of dollars and years of delay,' indicating substantial financial and temporal impact for both."}]}, {"question": "Which of the following best describes 'strategic misrepresentation' in the context of organizational planning fallacy?", "options": [{"text": "Planners intentionally lie about costs to secure personal financial gain.", "isCorrect": false, "rationale": "This is incorrect. The text clarifies that strategic misrepresentation is 'not necessarily through conscious dishonesty,' and focuses on organizational competition for funding rather than personal gain."}, {"text": "Estimates are optimistically biased to make a project proposal more attractive and win funding competition.", "isCorrect": true, "rationale": "This is correct. The text defines strategic misrepresentation as estimates being 'shaded not because planners are foolish but because honest estimates lose the competition for approval,' to make proposals 'more attractive' for funding."}, {"text": "Project managers consistently provide honest, conservative estimates but are overruled by senior management.", "isCorrect": false, "rationale": "This is incorrect. Strategic misrepresentation is about the *act* of presenting optimistic forecasts, not being overruled after providing honest ones."}, {"text": "It refers to the inability of planners to accurately forecast technical challenges due to lack of expertise.", "isCorrect": false, "rationale": "This is incorrect. While lack of expertise might lead to miscalculations, 'strategic misrepresentation' specifically refers to the *incentive-driven* shading of estimates to gain a competitive advantage, not an inherent technical inability."}]}, {"question": "A project planning committee consistently downplays potential risks and challenges, with members reluctant to voice concerns that might suggest the project is too ambitious. This scenario primarily illustrates which organizational force contributing to the planning fallacy?", "options": [{"text": "Incentives to underestimate.", "isCorrect": false, "rationale": "While related, 'incentives to underestimate' primarily refers to external competition for funding. This scenario focuses on internal group dynamics suppressing dissent."}, {"text": "Complexity and interdependence.", "isCorrect": false, "rationale": "This is incorrect. Complexity and interdependence relate to the technical challenges of integrating many tasks. The scenario describes social dynamics within the committee."}, {"text": "Group optimism.", "isCorrect": true, "rationale": "This is correct. The text states that 'planning committees tend to reinforce each other's optimism. Raising concerns... is socially costly... The planning process becomes a ritual of collective reassurance,' which perfectly matches the scenario."}, {"text": "The inside view.", "isCorrect": false, "rationale": "The 'inside view' is an individual cognitive bias. While the *outcome* might be similar, the *force* at play in this group scenario is organizational group optimism, which compounds the individual bias."}]}, {"question": "A software development project involves integrating 50 different modules, each developed by a separate team. The overall project manager estimates the total timeline by summing the estimated time for each module. What specific aspect of the organizational planning fallacy is most likely to lead to delays in this scenario?", "options": [{"text": "Strategic misrepresentation.", "isCorrect": false, "rationale": "This is incorrect. Strategic misrepresentation involves optimistically biasing estimates for competitive advantage, which isn't described in the scenario of simply summing estimates."}, {"text": "Groupthink among the module development teams.", "isCorrect": false, "rationale": "While groupthink (a form of group optimism) might influence individual module estimates, the core problem highlighted by *summing* estimates without considering interactions is different."}, {"text": "Neglecting the base rate for similar software projects.", "isCorrect": false, "rationale": "While neglecting the base rate is a general problem, the scenario specifically points to an issue with *how* the sum is calculated, not just the initial estimates for individual components."}, {"text": "Complexity and interdependence, leading to cascading delays from unforeseen interactions.", "isCorrect": true, "rationale": "This is correct. The text explains that 'planners who estimate each component separately and then add the estimates together systematically undercount the interactions and cascading delays between components,' which is precisely what occurs in this scenario with 50 interdependent modules."}]}, {"question": "To apply reference class forecasting to a proposed new public transportation system, what would be the most crucial step?", "options": [{"text": "Developing detailed, optimistic scenarios based on the unique features and innovative aspects of the proposed system.", "isCorrect": false, "rationale": "This is incorrect. This approach describes the 'inside view' and is what reference class forecasting aims to *correct*, not apply."}, {"text": "Gathering data on the actual costs and timelines of similar public transportation projects completed in the past.", "isCorrect": true, "rationale": "This is correct. The text states reference class forecasting involves asking, 'How long did similar projects actually take?' and adjusting estimates to align with 'the historical base rate.'"}, {"text": "Asking project team members to individually estimate each component of the new system and then averaging their responses.", "isCorrect": false, "rationale": "This is incorrect. This method would still rely on individual estimates, likely influenced by the 'inside view,' rather than external historical data."}, {"text": "Focusing solely on the projected benefits and positive economic impact to build stakeholder support.", "isCorrect": false, "rationale": "This is incorrect. This relates to project justification and persuasion, not the methodology for accurate forecasting itself."}]}, {"question": "Why do organizations often resist implementing reference class forecasting, despite its proven effectiveness?", "options": [{"text": "It requires specialized statistical software that is prohibitively expensive for most organizations.", "isCorrect": false, "rationale": "This is incorrect. The text does not mention technical or cost barriers related to software; the resistance described is psychological and organizational."}, {"text": "It forces a painful admission that the current project is not uniquely exceptional and its optimistic assumptions are likely flawed.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'This approach sounds obvious, but it requires a painful admission: that your project is not special, that your team is not uniquely competent, and that the optimistic assumptions embedded in your plan are probably wrong.'"}, {"text": "It leads to overly conservative estimates that deter potential investors and funding bodies.", "isCorrect": false, "rationale": "This is incorrect. While the estimates become less optimistic, the resistance is not described as being due to 'overly conservative' deterrence, but rather the internal challenge to the organization's self-perception and project narratives."}, {"text": "It only works for very simple projects and is unsuitable for complex, large-scale infrastructure.", "isCorrect": false, "rationale": "This is incorrect. The text presents reference class forecasting as the 'most promising antidote' specifically for the 'organizational planning fallacy' which is described in the context of 'large-scale project forecasting' and 'large infrastructure projects.'"}]}, {"question": "Which of the following is NOT described as a contributing factor or characteristic of the organizational planning fallacy in the provided text?", "options": [{"text": "Decision-makers deliberately inflating cost estimates to create budget buffers.", "isCorrect": true, "rationale": "This is correct. The text describes 'incentives to underestimate' and 'strategic misrepresentation' as *shading estimates to look faster and cheaper* to win funding, not inflating them to create buffers. The problem is systematic underestimation, not deliberate overestimation."}, {"text": "Group dynamics that suppress dissenting opinions and reinforce collective optimism.", "isCorrect": false, "rationale": "This is incorrect. This describes 'group optimism,' which is explicitly listed as a key organizational factor."}, {"text": "The inherent difficulty of accounting for cascading delays in highly complex projects.", "isCorrect": false, "rationale": "This is incorrect. This describes 'complexity and interdependence,' which is explicitly listed as a key organizational factor."}, {"text": "Competitive pressures that incentivize optimistic forecasts to secure project approval.", "isCorrect": false, "rationale": "This is incorrect. This describes 'incentives to underestimate' and 'strategic misrepresentation,' which is explicitly listed as a key organizational factor."}]}, {"question": "The Sydney Opera House project famously went from an estimated $7 million and four years to ultimately costing $102 million and sixteen years. While the design was innovative, the initial estimate was not grounded in realistic assessment. This example best illustrates the combined effect of which factors described in the text?", "options": [{"text": "Strategic misrepresentation and a lack of technical expertise in its unique design.", "isCorrect": false, "rationale": "While strategic misrepresentation might have played a role in initial approval, the text's specific phrasing 'not grounded in any realistic assessment' directly points to the *method* of estimation being flawed, rather than *intentional* misrepresentation, and doesn't explicitly link it to 'lack of technical expertise' but rather a failure to assess challenges."}, {"text": "The 'inside view' bias, where planners focused on the project's unique features and neglected the base rate of similar, complex undertakings.", "isCorrect": true, "rationale": "This is correct. The text states the estimate 'was not grounded in any realistic assessment of the challenges involved' despite the 'genuinely innovative' design. This is a classic manifestation of the 'inside view,' where the uniqueness of the project leads planners to construct optimistic scenarios without considering the historical outcomes (base rate) of similar complex projects."}, {"text": "Group optimism, where the design team refused to acknowledge potential structural challenges.", "isCorrect": false, "rationale": "While group optimism could contribute, the text emphasizes the initial estimate *not being grounded in realistic assessment*, which is a broader issue related to the method of forecasting (inside view vs. outside view), rather than solely group dynamics."}, {"text": "A deliberate decision by planners to underestimate costs, knowing that the government would eventually cover the overruns.", "isCorrect": false, "rationale": "This is incorrect. The text generally describes strategic misrepresentation as shading estimates due to competitive incentives, not necessarily deliberate decisions based on government coverage, and clarifies it's 'not necessarily through conscious dishonesty.' The description 'not grounded in any realistic assessment' suggests a systemic flaw in estimation."}]}, {"question": "According to the 'keyconcept' box, what is the core nature of Institutional Optimism Bias at the organizational level?", "options": [{"text": "It is solely a result of individual planners' cognitive errors aggregated across an organization.", "isCorrect": false, "rationale": "This is incorrect. The keyconcept box explicitly states it is 'not merely a cognitive error — it is structurally reinforced' and lists competitive incentives, group dynamics, and complexity as factors."}, {"text": "It is a structurally reinforced phenomenon driven by competitive incentives, group dynamics, and project complexity.", "isCorrect": true, "rationale": "This is correct. The keyconcept box states, 'At the organizational level, the planning fallacy is not merely a cognitive error — it is structurally reinforced by competitive incentives to underestimate, group dynamics that suppress dissent, and the complexity of large projects.'"}, {"text": "It refers to the tendency of organizations to always choose the most optimistic project among several options.", "isCorrect": false, "rationale": "This is incorrect. While optimism plays a role in project selection, the keyconcept's definition is more specific, focusing on *how* estimates are biased due to structural factors, not just the choice of the most optimistic project."}, {"text": "It is a bias primarily observed in public sector projects due to a lack of market discipline.", "isCorrect": false, "rationale": "This is incorrect. The text mentions Flyvbjerg's work on 'hundreds of major projects across twenty countries,' not exclusively public sector, and does not attribute the bias solely to a lack of market discipline in its core definition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
