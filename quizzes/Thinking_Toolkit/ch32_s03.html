    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 32, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Charlie Munger, what is the single most powerful predictor of human behavior?", "options": [{"text": "Personal values and moral convictions.", "isCorrect": false, "rationale": "While personal values and moral convictions play a role, the text emphasizes that incentives often win when in conflict with these, and Munger posits incentives as the most powerful predictor."}, {"text": "Incentive structures.", "isCorrect": true, "rationale": "The text explicitly states that Charlie Munger has 'repeatedly argued that incentive structures are the single most powerful predictor of human behavior.'"}, {"text": "Stated intentions and official policies.", "isCorrect": false, "rationale": "The text notes that behavior follows incentive structures 'often regardless of stated intentions, personal values, or official policies.'"}, {"text": "Intrinsic motivation and loyalty.", "isCorrect": false, "rationale": "Intrinsic motivation and loyalty are mentioned as factors that play roles, but the text positions incentives as the 'most powerful, more reliable, and more universal' principle."}], "id": "q01"}, {"question": "The text states that observing behavior follows incentives is 'not a cynical observation about human nature.' What does this statement imply?", "options": [{"text": "It suggests that people are inherently good and only bad incentives make them act poorly.", "isCorrect": false, "rationale": "The text describes it as a factual observation, not a judgment about inherent goodness or badness, but rather how people respond rationally to structures."}, {"text": "It implies that people are generally selfless and act for the benefit of others regardless of personal gain.", "isCorrect": false, "rationale": "This contradicts the examples provided, such as doctors recommending more procedures or salespeople selling aggressively, which show self-interested responses to incentives."}, {"text": "It means the principle is based on objective observation rather than a negative judgment of individuals' character.", "isCorrect": true, "rationale": "The text clarifies it's a 'factual one' and emphasizes that 'the problem is the incentive structure, not the people,' indicating it's an objective observation of behavior mechanics."}, {"text": "It indicates that individuals are always aware of and intentionally manipulating incentive structures for their own benefit.", "isCorrect": false, "rationale": "The text notes that people respond to incentives 'often unconsciously,' suggesting their actions are not always deliberate manipulation."}], "id": "q02"}, {"question": "A technology company aims to foster a highly collaborative environment where teams share knowledge and work together seamlessly. Based on the 'Corporate culture' real-world example, which incentive design is most likely to achieve this goal?", "options": [{"text": "Awarding bonuses and promotions based solely on individual project completions.", "isCorrect": false, "rationale": "The text states that compensating individuals for solo achievements will lead to competition, not collaboration, even if teamwork is valued."}, {"text": "Implementing inspirational posters in break rooms emphasizing teamwork.", "isCorrect": false, "rationale": "The text advises skepticism when stated intentions conflict with incentives, noting that 'intentions are cheap' and posters alone won't change behavior if incentives are misaligned."}, {"text": "Designing evaluation systems that reward successful cross-functional team projects and shared metrics.", "isCorrect": true, "rationale": "The text's core advice is to 'design systems where incentives and good behavior point in the same direction.' Rewarding team-based achievements directly incentivizes collaboration."}, {"text": "Encouraging employees to state their commitment to teamwork during performance reviews.", "isCorrect": false, "rationale": "Stated intentions or commitments are less powerful than actual incentives in shaping behavior, especially when incentives for solo work might exist."}], "id": "q03"}, {"question": "When 'bad behavior' arises, even from 'good people,' what does the text identify as the fundamental problem?", "options": [{"text": "A lack of moral conviction among the individuals involved.", "isCorrect": false, "rationale": "The text explicitly states: 'The problem is the incentive structure, not the people,' directly contradicting this option."}, {"text": "The inherent dishonesty of human nature.", "isCorrect": false, "rationale": "The text refutes this, stating, 'This is not a cynical observation about human nature—it is a factual one.'"}, {"text": "Poorly designed incentive structures.", "isCorrect": true, "rationale": "The text clearly states, 'poorly designed incentives produce bad behavior—even from good people' and concludes, 'The problem is the incentive structure, not the people.'"}, {"text": "A misunderstanding of official policies and stated intentions.", "isCorrect": false, "rationale": "Behavior follows incentives 'often regardless of stated intentions, personal values, or official policies,' meaning misunderstanding isn't the fundamental problem."}], "id": "q04"}, {"question": "The Cobra Effect, where a bounty on cobras led to cobra farming, is cited as a dramatic illustration of what principle?", "options": [{"text": "The power of intrinsic motivation to override external incentives.", "isCorrect": false, "rationale": "The Cobra Effect demonstrates how an external incentive (the bounty) had an unintended and perverse outcome, not how intrinsic motivation prevailed."}, {"text": "How well-designed incentives always produce good behavior.", "isCorrect": false, "rationale": "This is an example of a *poorly* designed incentive leading to an undesirable outcome, directly contradicting this statement."}, {"text": "That when a measure becomes a target, people optimize the measure at the expense of the underlying goal.", "isCorrect": false, "rationale": "This specific principle describes Goodhart's Law, which is mentioned as 'another' illustration, but the Cobra Effect directly shows perverse incentives leading to the opposite of the desired outcome."}, {"text": "How poorly designed incentives can produce behavior contrary to the desired outcome, even from rational actors.", "isCorrect": true, "rationale": "The Cobra Effect shows that the incentive (bounty for dead cobras) led to the opposite of the desired outcome (more cobras due to farming), which is a direct consequence of a poorly designed incentive structure."}], "id": "q05"}, {"question": "According to Munger's practical advice, what should be the *first* step when trying to understand why people behave the way they do?", "options": [{"text": "Ask them about their personal values and intentions.", "isCorrect": false, "rationale": "The text states, 'Intentions are cheap,' and behavior often follows incentives regardless of stated intentions or values."}, {"text": "Examine the incentive structures they face.", "isCorrect": true, "rationale": "Munger's practical advice is clear: 'when you want to understand why people behave the way they do, look at the incentives first.'"}, {"text": "Review official policies and rules.", "isCorrect": false, "rationale": "Behavior follows incentives 'often regardless of stated intentions, personal values, or official policies,' making incentives a more fundamental predictor than policies alone."}, {"text": "Analyze their past behavior patterns over a long period.", "isCorrect": false, "rationale": "While potentially useful, the text specifically prioritizes looking at incentives as the primary driver to understand behavior."}], "id": "q06"}, {"question": "The text acknowledges that intrinsic motivation and moral conviction play roles in human behavior. However, what does it suggest happens 'more often than most of us would like to admit' when incentives and stated values conflict?", "options": [{"text": "Intrinsic motivation reliably triumphs over external incentives.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'when incentives and stated values conflict, incentives win more often.'"}, {"text": "People consistently align their actions with their stated values.", "isCorrect": false, "rationale": "The text warns against this assumption, noting that behavior often diverges from stated values when incentives conflict."}, {"text": "Incentives ultimately prevail and shape behavior.", "isCorrect": true, "rationale": "The text clearly states, 'But when incentives and stated values conflict, incentives win more often than most of us would like to admit.'"}, {"text": "A balance is struck, leading to moderately ethical behavior.", "isCorrect": false, "rationale": "The text emphasizes that incentives 'win,' implying they dictate the outcome rather than a balanced compromise."}], "id": "q07"}, {"question": "Consider two healthcare systems: one that pays doctors a fixed amount per patient (capitated care) and another that pays per procedure (fee-for-service). Based on the text, which statement accurately reflects the *likely* impact of these different incentive designs?", "options": [{"text": "Fee-for-service incentivizes more treatments, while capitated care incentivizes fewer treatments.", "isCorrect": true, "rationale": "The 'Healthcare' real-world example directly states: 'Fee-for-service medicine incentivizes more treatments. Capitated care (fixed payment per patient) incentivizes fewer treatments.'"}, {"text": "Both systems perfectly align the doctor's financial interest with the patient's health.", "isCorrect": false, "rationale": "The text explicitly states, 'Neither system perfectly aligns the doctor's financial interest with the patient's health.'"}, {"text": "Doctors in capitated care systems are inherently more ethical than those in fee-for-service systems.", "isCorrect": false, "rationale": "The core principle is that behavior follows incentives, not that people are inherently better or worse; the problem is the structure, not the people."}, {"text": "The quality of care will be higher in fee-for-service systems due to the incentive for more procedures.", "isCorrect": false, "rationale": "More procedures do not necessarily equate to higher quality or better patient outcomes, and could lead to unnecessary care driven by financial incentives."}], "id": "q08"}, {"question": "The text explicitly states, 'This does not mean people are only motivated by incentives.' What other factors are mentioned as playing roles in human motivation?", "options": [{"text": "Economic prosperity and social status.", "isCorrect": false, "rationale": "While incentives can be designed around these, they are not listed as distinct, non-incentive motivations in this specific section."}, {"text": "Intrinsic motivation, moral conviction, love, loyalty, and sheer habit.", "isCorrect": true, "rationale": "The text lists these precisely: 'Intrinsic motivation, moral conviction, love, loyalty, and sheer habit all play roles.'"}, {"text": "Fear of punishment and desire for power.", "isCorrect": false, "rationale": "These are not listed in the paragraph discussing motivations beyond incentives."}, {"text": "Public recognition and media praise.", "isCorrect": false, "rationale": "These are not explicitly mentioned as independent factors alongside intrinsic motivation and moral conviction."}], "id": "q09"}, {"question": "What is the 'wise approach' to dealing with the power of incentives, according to the text?", "options": [{"text": "To deny the power of incentives and focus solely on intrinsic motivation.", "isCorrect": false, "rationale": "The text states, 'The wise approach is not to deny the power of incentives.'"}, {"text": "To design systems where incentives and good behavior point in the same direction.", "isCorrect": true, "rationale": "The text directly advises: 'The wise approach is not to deny the power of incentives but to design systems where incentives and good behavior point in the same direction.'"}, {"text": "To rely on people's stated intentions and values to guide their behavior.", "isCorrect": false, "rationale": "The text warns against this, stating, 'Intentions are cheap. Incentives are powerful,' and that incentives often override stated values."}, {"text": "To implement strict rules and policies that punish any deviation from desired behavior.", "isCorrect": false, "rationale": "While rules exist, the text emphasizes proactive incentive design ('align incentives with desired outcomes') over merely punishing bad behavior."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
