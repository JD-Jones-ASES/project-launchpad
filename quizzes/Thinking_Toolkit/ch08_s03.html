<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of the magical ring discovered by Gyges in Plato's story?", "options": [{"text": "It grants immense physical strength.", "isCorrect": false, "rationale": "The story explicitly states the ring makes Gyges invisible, not physically stronger."}, {"text": "It allows him to control the minds of others.", "isCorrect": false, "rationale": "The ring's power is invisibility, not mind control."}, {"text": "It renders him completely invisible, making him undetectable.", "isCorrect": true, "rationale": "The text clearly states, 'A shepherd named Gyges discovers a ring that makes him invisible.' This invisibility removes accountability."}, {"text": "It bestows eternal youth and immortality.", "isCorrect": false, "rationale": "The text does not mention any powers related to youth or immortality for the ring."}], "id": "q01"}, {"question": "Glaucon's challenge to Socrates, based on the Ring of Gyges, primarily aims to question:", "options": [{"text": "Whether humans are naturally inclined towards altruism.", "isCorrect": false, "rationale": "Glaucon's challenge suggests the opposite, questioning if people would be just without external pressure, implying they are not naturally altruistic."}, {"text": "If justice is intrinsically valuable or merely a social construct to avoid negative consequences.", "isCorrect": true, "rationale": "The text states, 'Is justice intrinsically valuable — good in itself, regardless of consequences — or is it merely a social contract, a deal we make because the alternative (a war of all against all) is worse?' This is the core question Glaucon presses."}, {"text": "The existence of absolute moral truths.", "isCorrect": false, "rationale": "While related to moral philosophy, Glaucon's challenge is more focused on the motivation for just behavior rather than the existence of absolute truths."}, {"text": "The necessity of a monarchical government for maintaining order.", "isCorrect": false, "rationale": "The story involves a king, but the central philosophical question is about individual justice and motivation, not a specific form of government."}], "id": "q02"}, {"question": "According to the perspective that views justice as a 'social contract,' what is the logical conclusion for a rational person possessing the Ring of Gyges?", "options": [{"text": "They would uphold justice strictly, understanding it as the foundation of society.", "isCorrect": false, "rationale": "This aligns with intrinsic justice, not the social contract view where enforcement is key. If the contract dissolves without enforcement, they wouldn't uphold it purely out of principle."}, {"text": "They would use the ring for personal gain, as the contract's enforcement mechanism is removed.", "isCorrect": true, "rationale": "The text explains, 'If justice is only a social contract, then the rational person who finds Gyges' ring should use it. The contract only binds when enforcement is possible. Remove enforcement, and the contract dissolves.'"}, {"text": "They would seek to expose the ring's power to reform societal laws.", "isCorrect": false, "rationale": "This is not suggested by the social contract view, which implies self-interest when accountability is removed."}, {"text": "They would feel morally obligated to share the ring's power with others.", "isCorrect": false, "rationale": "This is contrary to the self-interested motivation implied by the social contract view when enforcement is absent."}], "id": "q03"}, {"question": "Socrates' primary refutation of Glaucon's challenge centers on the idea that:", "options": [{"text": "Divine judgment will always find a way to punish the unjust, regardless of invisibility.", "isCorrect": false, "rationale": "Socrates' argument focuses on internal states, not external divine intervention."}, {"text": "The unjust person, even if successful externally, suffers from an internally disordered and unfree soul.", "isCorrect": true, "rationale": "The text states Socrates' answer is that 'the unjust person... has a disordered soul. Justice is not about external rewards and punishments but about the internal harmony of a person's character.'"}, {"text": "Societal structures would inevitably collapse if everyone acted with impunity.", "isCorrect": false, "rationale": "While possibly true, Socrates' argument in the Republic focuses on the individual's internal state, not the societal collapse as the primary refutation."}, {"text": "True justice requires a government with absolute power to enforce laws.", "isCorrect": false, "rationale": "Socrates' argument is about internal character, not an external governmental structure's power."}], "id": "q04"}, {"question": "A person decides to return a lost wallet with a significant amount of money, even though no one saw them find it and there's no way they could be caught. This action most strongly suggests a commitment to what type of justice, according to the text?", "options": [{"text": "Instrumental justice", "isCorrect": false, "rationale": "Instrumental justice is driven by external incentives or consequences. In this scenario, there are no external incentives or risk of punishment."}, {"text": "Distributive justice", "isCorrect": false, "rationale": "Distributive justice concerns the fair allocation of resources, which is not the primary issue in this scenario."}, {"text": "Intrinsic justice", "isCorrect": true, "rationale": "Intrinsic justice means behaving well because justice is constitutive of a good life, regardless of external success or detection. This scenario perfectly fits that definition by removing external factors."}, {"text": "Retributive justice", "isCorrect": false, "rationale": "Retributive justice deals with punishment for wrongdoing, which is not applicable to an act of honesty."}], "id": "q05"}, {"question": "The 'realworld' section draws a parallel between the Ring of Gyges and certain aspects of modern life. Which of the following best captures this comparison?", "options": [{"text": "The increasing complexity of global supply chains.", "isCorrect": false, "rationale": "This is unrelated to the ethical dilemma of invisibility and accountability."}, {"text": "Situations like anonymous online behavior or unsupervised authority, where individuals perceive a lack of accountability.", "isCorrect": true, "rationale": "The text states, 'Modern life offers many situations of effective invisibility — anonymous online behavior, unsupervised authority... The internet, in many ways, is Gyges' ring: a space where people can act without consequences, or at least believe they can.'"}, {"text": "The widespread availability of surveillance technology.", "isCorrect": false, "rationale": "Surveillance technology increases visibility and accountability, which is the opposite of the Ring of Gyges' effect."}, {"text": "The challenges of ethical leadership in large corporations.", "isCorrect": false, "rationale": "While a context for ethics, the specific parallel drawn is about unsupervised or anonymous power, not just leadership challenges in general."}], "id": "q06"}, {"question": "According to Socrates' view, as presented in the text, why might a tyrant who achieves everything they desire through injustice still be considered 'miserable'?", "options": [{"text": "Because they are constantly haunted by the fear of being overthrown or discovered.", "isCorrect": false, "rationale": "Socrates' argument focuses on internal disorder, not primarily external fears of detection or overthrow."}, {"text": "Because their soul is enslaved to appetites that can never be fully satisfied, leading to internal chaos.", "isCorrect": true, "rationale": "The text states, 'his soul is enslaved to appetites that can never be fully satisfied.' This leads to a disordered and unhappy soul, regardless of external success."}, {"text": "Because they lack the respect and admiration of genuinely just citizens.", "isCorrect": false, "rationale": "Socrates' argument is about internal harmony, not the opinions of others."}, {"text": "Because they are always busy managing their ill-gotten gains, leaving no time for leisure.", "isCorrect": false, "rationale": "This is a practical consequence, not the philosophical reason Socrates gives for their misery related to the state of their soul."}], "id": "q07"}, {"question": "The question 'would you be moral if no one were watching?' is described as a 'sharpest diagnostic tool in ethics' because it helps reveal:", "options": [{"text": "The statistical probability of individuals acting morally under specific conditions.", "isCorrect": false, "rationale": "The text emphasizes what it reveals about beliefs, not statistical probabilities."}, {"text": "An individual's fundamental beliefs about morality and human nature.", "isCorrect": true, "rationale": "The text directly states, 'Your answer reveals not just what you believe about morality but what you believe about human nature.'"}, {"text": "The limitations of philosophical thought experiments in practical application.", "isCorrect": false, "rationale": "The phrase implies its utility, not its limitations."}, {"text": "The historical context of ancient Greek philosophy.", "isCorrect": false, "rationale": "While the story is ancient, the purpose of the 'diagnostic tool' is contemporary understanding of ethics."}], "id": "q08"}, {"question": "The 'thinkaboutit' section raises a critical point about Plato's answer to the Ring of Gyges. What is the essence of this critique?", "options": [{"text": "That Plato's argument is too complex for the average person to understand.", "isCorrect": false, "rationale": "The critique is not about complexity but about the potential truthfulness and comfort of the conclusion."}, {"text": "That Plato's idea of a 'disordered soul' is a wishful philosophical narrative that avoids the uncomfortable truth that some unjust people may be genuinely happy.", "isCorrect": true, "rationale": "The text asks, 'Or does it seem like a philosopher's wishful thinking — a story we tell ourselves because the alternative (that some people profit from injustice and are perfectly happy about it) is too uncomfortable to accept?'"}, {"text": "That Plato contradicts himself by asserting justice is internal while also discussing societal implications.", "isCorrect": false, "rationale": "The text does not imply a contradiction in Plato's argument."}, {"text": "That external punishments are, in fact, more effective at ensuring justice than internal harmony.", "isCorrect": false, "rationale": "This is a comparison of effectiveness, but the core critique is about the truth of Plato's claim regarding happiness."}], "id": "q09"}, {"question": "The Ring of Gyges thought experiment forces us to distinguish between two theories of justice: instrumental and intrinsic. Which of the following statements accurately describes instrumental justice?", "options": [{"text": "We behave well because it aligns with our deepest moral convictions, regardless of external outcomes.", "isCorrect": false, "rationale": "This describes intrinsic justice, where behavior is driven by internal values."}, {"text": "We behave well because of the inherent beauty and harmony it brings to our character.", "isCorrect": false, "rationale": "This also describes intrinsic justice, focusing on internal state and character."}, {"text": "We behave well because of external incentives such as reputation, avoiding punishment, or gaining rewards.", "isCorrect": true, "rationale": "The 'keyconcept' box defines instrumental justice as: 'we behave well because of external incentives (reputation, punishment, reward).'"}, {"text": "We behave well only when compelled by direct legal authority.", "isCorrect": false, "rationale": "While legal authority is an external incentive, instrumental justice is broader, including reputation and rewards, not just direct compulsion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
