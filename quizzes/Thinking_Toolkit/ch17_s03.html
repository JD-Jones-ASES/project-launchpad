    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between the Two Generals' Problem and the Byzantine Generals Problem?", "options": [{"text": "The Two Generals' Problem assumes communication is impossible, while BGP assumes it's merely difficult.", "isCorrect": false, "rationale": "The Two Generals' Problem assumes messages might be lost, making communication unreliable, but not necessarily impossible. The core distinction lies elsewhere."}, {"text": "The Two Generals' Problem deals with unreliable communication, whereas BGP adds the challenge of intentional deception.", "isCorrect": true, "rationale": "The text states: 'The Two Generals' Problem showed that coordination is impossible when messages might be lost. The Byzantine Generals Problem asks a harder question: what if some of the generals are traitors?' This clearly distinguishes the two problems by the addition of traitors and intentional deception in BGP."}, {"text": "The Two Generals' Problem focuses on resource allocation, while BGP focuses on decision-making.", "isCorrect": false, "rationale": "Both problems are about reaching a common decision or coordination. Resource allocation is not the primary focus of either."}, {"text": "The Two Generals' Problem involves two parties, while BGP involves multiple parties.", "isCorrect": false, "rationale": "While the 'Two Generals' implies two parties, the core distinction drawn in the text is not the number of parties but the nature of the communication challenge (unreliability vs. deception)."}], "id": "q01"}, {"question": "According to Lamport and colleagues' findings, if there are 10 generals total and 3 of them are traitors, is consensus possible, and why?", "options": [{"text": "No, because the number of loyal generals is not sufficient to overcome the traitors by more than two to one.", "isCorrect": false, "rationale": "This option misinterprets the condition. The condition 'n > 3t' means the total generals must outnumber traitors by more than two to one, but the specific calculation for n=10, t=3 makes consensus possible."}, {"text": "Yes, because the total number of generals (n=10) is greater than three times the number of traitors (3t=9).", "isCorrect": true, "rationale": "The text states consensus is possible only if n > 3t. With n=10 and t=3, 3t = 9. Since 10 > 9, the condition is met, and consensus is possible."}, {"text": "No, because with 3 traitors, consensus is always impossible regardless of the total number of generals.", "isCorrect": false, "rationale": "This is incorrect. The possibility of consensus depends on the ratio of loyal generals to traitors (n > 3t), not just the absolute number of traitors."}, {"text": "Yes, because the loyal generals (7) significantly outnumber the traitors (3).", "isCorrect": false, "rationale": "While the loyal generals (7) do outnumber the traitors (3), the specific condition required for consensus is n > 3t, which is a stricter requirement than simply 'outnumbering'. The correct rationale uses the precise formula."}], "id": "q02"}, {"question": "Why is consensus impossible in the Byzantine Generals Problem with three generals and one traitor?", "options": [{"text": "The loyal generals cannot establish a secure communication channel, making all messages untrustworthy.", "isCorrect": false, "rationale": "The problem isn't about lack of secure channels, but rather the inability to discern truth from deception within the channels due to the traitor's actions."}, {"text": "The traitor can send conflicting messages, and the two loyal generals lack sufficient independent reports to identify the deception.", "isCorrect": true, "rationale": "The text explains: 'With one traitor among three generals, the two loyal generals cannot tell whether the conflicting information they receive comes from the traitor or from a confused loyal general. They lack enough independent confirmation to distinguish truth from deception.'"}, {"text": "The traitors can physically overpower the loyal generals due to the small total number.", "isCorrect": false, "rationale": "The problem is a logical puzzle about information and trust, not physical conflict or power dynamics."}, {"text": "The problem inherently requires an odd number of loyal generals, and two is an even number.", "isCorrect": false, "rationale": "The text does not state a requirement for an odd number of loyal generals. The issue is the insufficient ratio for discerning truth through majority rule."}], "id": "q03"}, {"question": "Which of the following scenarios best exemplifies a 'Byzantine failure' in a distributed system, as described in the text?", "options": [{"text": "A server crashes unexpectedly and stops responding to all requests.", "isCorrect": false, "rationale": "This is described as a 'crash failure,' which is easier to handle because the component simply stops working consistently."}, {"text": "A network cable is severed, preventing any communication between two nodes.", "isCorrect": false, "rationale": "This is a communication failure, not a Byzantine failure. The component isn't sending inconsistent information; it's sending no information."}, {"text": "A sensor in an aircraft control system consistently sends an incorrect but identical reading to all connected modules.", "isCorrect": false, "rationale": "While incorrect, the sensor is behaving consistently. A Byzantine failure involves inconsistent behavior to different observers."}, {"text": "A compromised database server sends accurate transaction data to the main ledger but sends outdated, incorrect data to an analytics dashboard.", "isCorrect": true, "rationale": "The text defines 'Byzantine failure' as when 'a component behaves inconsistently — giving different responses to different observers.' This scenario perfectly matches, as the server provides different data to different parts of the system."}], "id": "q04"}, {"question": "The central challenge that the Byzantine Generals Problem addresses is primarily about:", "options": [{"text": "Ensuring message delivery across unreliable networks.", "isCorrect": false, "rationale": "This is the focus of the Two Generals' Problem. The Byzantine Generals Problem assumes messages get through but some might be deceptive."}, {"text": "Overcoming physical distance limitations for communication.", "isCorrect": false, "rationale": "While distance can affect communication, it's not the central problem addressed by the Byzantine Generals Problem, which focuses on deception."}, {"text": "Maintaining trust and reaching consensus in the presence of active deception.", "isCorrect": true, "rationale": "The text explicitly states: 'The challenge is not just communication reliability (messages get through) but trust in the face of potential deception.' and 'How can the loyal generals reach consensus when they cannot distinguish between honest messages and treacherous ones?'"}, {"text": "Optimizing communication bandwidth for large groups.", "isCorrect": false, "rationale": "Bandwidth optimization is a technical detail of communication, not the core problem of trust and deception at the heart of BGP."}], "id": "q05"}, {"question": "How does Bitcoin's proof-of-work mechanism fundamentally address the Byzantine Generals Problem in a decentralized network?", "options": [{"text": "It makes it computationally prohibitively expensive for a single attacker to generate enough false information to deceive the majority of the network.", "isCorrect": true, "rationale": "The text states: 'Bitcoin... proposed a novel solution to the Byzantine Generals Problem using proof-of-work: instead of requiring a supermajority of honest participants, the system makes deception computationally expensive. To corrupt the ledger, an attacker would need more computing power than the rest of the network combined — a condition that economic incentives make prohibitively costly.'"}, {"text": "It relies on a central authority to validate all transactions, thereby eliminating the need for trust among participants.", "isCorrect": false, "rationale": "Bitcoin is explicitly a decentralized system, designed to operate without a central authority, which is precisely its innovation in solving this problem."}, {"text": "It ensures perfect message delivery, preventing any loss of information that could be exploited by traitors.", "isCorrect": false, "rationale": "Proof-of-work does not guarantee perfect message delivery. Its function is to secure the ledger against malicious alteration, not to prevent message loss."}, {"text": "It designates a specific set of trusted nodes responsible for verifying all transactions, forming a 'supermajority.'", "isCorrect": false, "rationale": "Bitcoin avoids designating specific trusted nodes to maintain decentralization. Its security comes from the computational cost of attacking the entire network, not from a trusted subset."}], "id": "q06"}, {"question": "Consider a scenario with 7 generals. What is the maximum number of traitors that could be present while still allowing the loyal generals to reach consensus?", "options": [{"text": "1 traitor", "isCorrect": false, "rationale": "If t=1, n=7. 7 > 3(1) = 3. Consensus is possible, but more traitors could be accommodated."}, {"text": "2 traitors", "isCorrect": true, "rationale": "The condition for consensus is n > 3t. If n=7 and t=2, then 3t=6. Since 7 > 6, consensus is possible. If t were 3, then 3t=9, and 7 > 9 is false, making consensus impossible. Thus, 2 traitors is the maximum."}, {"text": "3 traitors", "isCorrect": false, "rationale": "If t=3, n=7. 3t = 9. Since 7 is NOT greater than 9, consensus would be impossible."}, {"text": "4 traitors", "isCorrect": false, "rationale": "If t=4, n=7. 3t = 12. Since 7 is NOT greater than 12, consensus would be impossible."}], "id": "q07"}, {"question": "In computer science, what does the term 'Byzantine failure' primarily refer to?", "options": [{"text": "A system component that completely stops functioning.", "isCorrect": false, "rationale": "The text specifies this as a 'crash failure,' which is distinct from a Byzantine failure."}, {"text": "A component that behaves erratically, sending different, conflicting information to different parts of the system.", "isCorrect": true, "rationale": "The note explicitly states: 'The phrase 'Byzantine failure' has become standard terminology in computer science for any failure mode where a component behaves inconsistently — giving different responses to different observers.'"}, {"text": "A failure where a system loses all its data due to a power outage.", "isCorrect": false, "rationale": "This describes data loss, which could be a consequence of various failures, but is not the definition of a Byzantine failure."}, {"text": "A security breach where an unauthorized user gains access to a system.", "isCorrect": false, "rationale": "While a security breach could lead to Byzantine behavior, the term 'Byzantine failure' specifically describes the inconsistent output of a component, not the unauthorized access itself."}], "id": "q08"}, {"question": "What is the primary mechanism that allows loyal generals to reach consensus when the condition 'n > 3t' is met, as explained in the text?", "options": [{"text": "The loyal generals can use cryptographic signatures to verify the authenticity of messages from other generals.", "isCorrect": false, "rationale": "While cryptographic signatures can be part of solutions, the text specifically attributes the possibility of consensus to the numerical advantage enabling majority voting, not a technical communication protocol like cryptography."}, {"text": "The number of honest reports received by any loyal general will outweigh any conflicting dishonest reports, enabling majority voting.", "isCorrect": true, "rationale": "The text states: 'With four generals and only one traitor, the two honest reports outnumber the one dishonest report, and the loyal generals can use majority voting among the messages they receive.' This principle is why n > 3t works."}, {"text": "Traitors are identified and eliminated from the communication network before any decisions are made.", "isCorrect": false, "rationale": "The problem description explicitly states 'they cannot distinguish between honest messages and treacherous ones,' meaning identification of traitors is not the primary mechanism, but rather working around their presence."}, {"text": "The system automatically routes messages through a trusted central arbiter, bypassing potentially deceptive generals.", "isCorrect": false, "rationale": "The Byzantine Generals Problem is typically framed in a decentralized context where a single trusted arbiter is not available or desired."}], "id": "q09"}, {"question": "Which of the following real-world systems would likely employ strategies to mitigate the Byzantine Generals Problem due to its critical nature?", "options": [{"text": "A personal blog platform where occasional content errors are acceptable.", "isCorrect": false, "rationale": "While desirable, strict Byzantine fault tolerance is generally not a critical requirement for a personal blog platform where small errors are tolerated."}, {"text": "A social media network where user-generated content might sometimes be false.", "isCorrect": false, "rationale": "Social media content can be false, but the system itself doesn't typically face 'Byzantine failures' in its core operational components in the same life-critical way, and 'false content' is a different problem from inconsistent component behavior."}, {"text": "An air traffic control system where consistency and reliability are paramount for safety.", "isCorrect": true, "rationale": "The 'realworld' section explicitly mentions 'Aviation systems: Flight-critical systems use redundant sensors and voting mechanisms.' These systems require extremely high reliability and must tolerate arbitrary failures, including Byzantine ones, due to safety implications."}, {"text": "An online retail website experiencing occasional delays in displaying product availability.", "isCorrect": false, "rationale": "Occasional delays or inconsistencies in product display, while inconvenient, do not typically rise to the level of requiring Byzantine fault tolerance, which addresses much more severe and deceptive failure modes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
