    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference in timing and purpose between a pre-mortem and a post-mortem, according to the provided text?", "options": [{"text": "A post-mortem reviews successes, while a pre-mortem predicts future successes.", "isCorrect": false, "rationale": "This statement is incorrect. A post-mortem reviews failures, and a pre-mortem anticipates failures, not successes."}, {"text": "A post-mortem analyzes past failures to learn, while a pre-mortem anticipates future failures to prevent them.", "isCorrect": true, "rationale": "The text states, 'A post-mortem examines what went wrong after a project has failed. A pre-mortem does something more useful: it examines what could go wrong before the project begins.' This option accurately captures the distinction in timing and goal."}, {"text": "A pre-mortem examines what went wrong after failure, while a post-mortem examines potential issues before a project.", "isCorrect": false, "rationale": "This statement incorrectly swaps the definitions of pre-mortem and post-mortem regarding when they occur."}, {"text": "Both occur before a project, but a pre-mortem focuses on internal factors and a post-mortem on external ones.", "isCorrect": false, "rationale": "This statement is incorrect. A post-mortem occurs after failure, and the distinction is not primarily about internal vs. external factors, but about timing and purpose."}], "id": "q01"}, {"question": "According to the explicit steps outlined in the text, which of the following is NOT a distinct step in performing a pre-mortem exercise?", "options": [{"text": "Assume failure.", "isCorrect": false, "rationale": "'Assume failure' is the very first step of the pre-mortem process."}, {"text": "Evaluate team performance.", "isCorrect": true, "rationale": "The listed steps are 'Assume failure,' 'Explain why,' 'Compile and prioritize,' and 'Mitigate.' 'Evaluate team performance' is not mentioned as a distinct step of the pre-mortem exercise itself."}, {"text": "Compile and prioritize.", "isCorrect": false, "rationale": "'Compile and prioritize' is one of the distinct steps in the pre-mortem process."}, {"text": "Mitigate.", "isCorrect": false, "rationale": "'Mitigate' is the final distinct step in the pre-mortem process."}], "id": "q02"}, {"question": "The pre-mortem counteracts optimism bias primarily by:", "options": [{"text": "Forcing team members to explicitly list reasons for expected success.", "isCorrect": false, "rationale": "This action would reinforce optimism bias, not counteract it, as it focuses on positive outcomes."}, {"text": "Providing a structured environment where hypothetical failure is an acceptable topic for discussion.", "isCorrect": true, "rationale": "The text states, 'Asking people to explain a hypothetical failure gives them permission to raise concerns they might otherwise suppress.' This directly addresses optimism bias by creating a safe space to consider negative outcomes."}, {"text": "Encouraging individuals to challenge the project leader's positive outlook directly.", "isCorrect": false, "rationale": "While concerns are raised, the mechanism isn't direct confrontation, but the reframing of the discussion around hypothetical failure."}, {"text": "Requiring a numerical probability assessment of project success and failure.", "isCorrect": false, "rationale": "The text does not mention numerical probability assessment as a mechanism for counteracting optimism bias in the pre-mortem process."}], "id": "q03"}, {"question": "In a team setting, how does the pre-mortem effectively address the issue of groupthink?", "options": [{"text": "It assigns a 'devil's advocate' role to a specific team member.", "isCorrect": false, "rationale": "While a 'devil's advocate' role can address groupthink, it is not the specific mechanism described for the pre-mortem in the text."}, {"text": "It frames expressing doubts as a constructive contribution, making dissent socially safe.", "isCorrect": true, "rationale": "The text explains, 'The pre-mortem reframes dissent as a contribution. You are not criticizing the plan—you are helping to stress-test it. The pessimist becomes the realist, and the exercise makes it safe to voice doubts.' This directly counters groupthink by removing the social cost of dissent."}, {"text": "It ensures all discussions are anonymous to prevent personal conflict.", "isCorrect": false, "rationale": "While individual writing is part of it, the overall process involves compiling and discussing explanations, not necessarily full anonymity as the primary mechanism to combat groupthink."}, {"text": "It focuses only on external risks, avoiding internal team dynamics.", "isCorrect": false, "rationale": "The pre-mortem considers all reasons for failure, including internal factors like assumptions proving false, not just external risks."}], "id": "q04"}, {"question": "A software development team is about to launch a new product feature. Before doing so, they conduct a pre-mortem. Which outcome is *most likely* to result directly from this exercise, according to the text?", "options": [{"text": "A unanimous agreement that the feature is ready for launch without any changes.", "isCorrect": false, "rationale": "The pre-mortem aims to uncover flaws, making unanimous agreement without changes unlikely if the exercise is effective."}, {"text": "A comprehensive list of potential edge cases, security vulnerabilities, and user-experience problems.", "isCorrect": true, "rationale": "The 'realworld' example for software development explicitly states that 'engineering teams that conduct pre-mortems consistently identify edge cases, security vulnerabilities, and user-experience problems' that would otherwise be caught post-launch."}, {"text": "An increased sense of team cohesion and shared optimism about the product's success.", "isCorrect": false, "rationale": "While collaboration is involved, the primary direct outcome is identifying risks and preparing for failure, rather than simply increasing optimism."}, {"text": "A formal review of past successful product launches to replicate their strategies.", "isCorrect": false, "rationale": "Reviewing past successes is not part of the described pre-mortem process, which focuses on anticipating future failures."}], "id": "q05"}, {"question": "Gary Klein found that imagining failure has *already happened* makes the pre-mortem more effective than simply asking 'What could go wrong?' because:", "options": [{"text": "It reduces the psychological impact of admitting potential weaknesses.", "isCorrect": false, "rationale": "While it makes it safer to voice concerns, the primary reason for increased effectiveness is how the framing concretizes the issues, not a direct reduction of psychological impact itself."}, {"text": "It makes the potential reasons for failure feel more concrete and specific, rather than abstract.", "isCorrect": true, "rationale": "The text explains, 'The difference is the framing: imagining that the failure has already happened makes the reasons feel concrete and specific rather than abstract and hypothetical.'"}, {"text": "It encourages team members to propose solutions even before risks are fully identified.", "isCorrect": false, "rationale": "Identifying risks ('Explain why') precedes brainstorming solutions ('Mitigate') in the pre-mortem steps. The framing helps with identification, not premature solutioning."}, {"text": "It shifts the focus from proactive prevention to reactive problem-solving.", "isCorrect": false, "rationale": "The pre-mortem is fundamentally about *proactive* prevention by diagnosing failure *before* it happens, not reactive problem-solving."}], "id": "q06"}, {"question": "Which statement best encapsulates the fundamental principle behind the pre-mortem decision tool?", "options": [{"text": "To retrospectively analyze project failures for future prevention.", "isCorrect": false, "rationale": "This describes a post-mortem or general learning from experience, not the forward-looking nature of a pre-mortem."}, {"text": "To enhance team morale by focusing on potential successes.", "isCorrect": false, "rationale": "While team involvement is present, the core focus of the pre-mortem is on diagnosing potential failures, not primarily on morale or successes."}, {"text": "To proactively diagnose potential failures and mitigate risks before execution.", "isCorrect": true, "rationale": "The 'keyconcept' section states: 'The pre-mortem asks you to imagine that a project has already failed and then explain why. This simple reframing counteracts optimism bias and groupthink, surfacing risks that would otherwise go unexamined. The best time to discover a fatal flaw in your plan is before you execute it.'"}, {"text": "To prioritize optimism over realism in high-stakes decisions.", "isCorrect": false, "rationale": "The pre-mortem actively counteracts optimism bias by forcing a realistic consideration of potential failures."}], "id": "q07"}, {"question": "You are considering purchasing a new car, a major decision for you. Applying the pre-mortem technique, what would be your *first* step?", "options": [{"text": "Researching the car's best features and positive reviews.", "isCorrect": false, "rationale": "While useful, this focuses on positive aspects and would reinforce optimism, not apply the pre-mortem's core premise."}, {"text": "Imagining six months from now, you deeply regret buying the car, and writing down all the reasons why.", "isCorrect": true, "rationale": "The text explains for personal decisions, 'Before committing to a major purchase, imagine that six months later you wish you had not made it. Why?' This directly applies the 'Assume failure' and 'Explain why' steps to a personal context."}, {"text": "Asking friends and family for their opinions on the car.", "isCorrect": false, "rationale": "This is a general step in decision-making, but not the specific 'assume failure' framing of the pre-mortem."}, {"text": "Creating a detailed budget plan to ensure affordability.", "isCorrect": false, "rationale": "This is a practical planning step, but the pre-mortem explicitly involves imagining regret and its causes, not just financial planning."}], "id": "q08"}, {"question": "Beyond surfacing risks, what additional, less obvious benefit does the pre-mortem provide in a team dynamic, as implied by the text?", "options": [{"text": "It eliminates the need for further risk assessment tools.", "isCorrect": false, "rationale": "The pre-mortem is a powerful tool, but it doesn't eliminate the need for a comprehensive risk management strategy or other tools."}, {"text": "It fosters a culture where challenging assumptions is valued and safe, transforming pessimists into realists.", "isCorrect": true, "rationale": "The text states that the pre-mortem 'reframes dissent as a contribution... The pessimist becomes the realist, and the exercise makes it safe to voice doubts,' indicating a cultural shift towards valuing realistic assessment over uncritical optimism."}, {"text": "It guarantees project success by identifying all potential flaws.", "isCorrect": false, "rationale": "No tool can guarantee project success; the pre-mortem aims to significantly improve the chances of success by mitigating known risks."}, {"text": "It simplifies decision-making by reducing the number of options considered.", "isCorrect": false, "rationale": "By surfacing more potential issues, the pre-mortem can initially make decision-making seem more complex as new factors are introduced, though ultimately leading to better decisions."}], "id": "q09"}, {"question": "A project team performs an exercise where they list all possible obstacles they might encounter, such as technical glitches, budget overruns, or team conflicts. While valuable for risk planning, how does this differ from the *specific framing* of a pre-mortem as described by Gary Klein?", "options": [{"text": "The team's exercise focuses on internal factors, whereas a pre-mortem considers external ones.", "isCorrect": false, "rationale": "The pre-mortem considers both internal (e.g., assumptions proving false) and external (e.g., risks materialized) factors, so this distinction is incorrect."}, {"text": "The team's exercise identifies general problems, while a pre-mortem requires imagining *complete, spectacular failure*.", "isCorrect": true, "rationale": "The text specifically emphasizes the framing: 'Assume failure. Imagine that you are one year in the future and the project has failed completely. Not partially, not in a recoverable way—it has failed spectacularly.' The team's exercise, while identifying obstacles, lacks this critical 'spectacular failure' framing."}, {"text": "The team's exercise is done individually, while a pre-mortem is always a group activity.", "isCorrect": false, "rationale": "The text explicitly states the pre-mortem can be done alone ('if working alone, sit down with a notebook') or with a team, and involves individual writing even in a group setting. The key difference is not individual vs. group."}, {"text": "The team's exercise is about brainstorming solutions, whereas a pre-mortem only identifies problems.", "isCorrect": false, "rationale": "The pre-mortem includes a 'Mitigate' step, which involves determining 'what can we do now to prevent this, reduce its likelihood, or limit its impact,' clearly encompassing solutions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
