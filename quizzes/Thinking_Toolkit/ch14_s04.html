    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In the Ultimatum Game, what is the primary role of Player Two?", "options": [{"text": "To propose the initial split of the money.", "isCorrect": false, "rationale": "Player One, the proposer, is responsible for deciding how to divide the money, not Player Two."}, {"text": "To accept or reject Player One's offer.", "isCorrect": true, "rationale": "The text states that 'Player Two (the responder) can either accept the offer... or reject it,' clearly defining their primary role."}, {"text": "To negotiate a better offer with Player One.", "isCorrect": false, "rationale": "The game's rules specify that Player Two can only accept or reject the offer, not negotiate for a different amount."}, {"text": "To determine the total amount of money available.", "isCorrect": false, "rationale": "The total amount of money ($10) is given at the start of the game, not determined by Player Two."}], "id": "q01"}, {"question": "According to traditional economic theory, assuming players are rational and self-interested, what is the predicted outcome of the Ultimatum Game?", "options": [{"text": "An even split ($5, $5) as a result of negotiation.", "isCorrect": false, "rationale": "Economic theory predicts a minimal offer, not an even split, and there is no negotiation phase in the game."}, {"text": "Player One offers the smallest possible amount, and Player Two accepts it.", "isCorrect": true, "rationale": "The text explains that 'If both players are rational and self-interested, Player One should offer the smallest possible amount — say, $1 — and Player Two should accept, because $1 is better than nothing.'"}, {"text": "Player Two rejects any offer less than an even split.", "isCorrect": false, "rationale": "Traditional economic theory predicts Player Two would accept any positive offer, as 'something is better than nothing,' regardless of fairness."}, {"text": "Both players walk away with nothing due to disagreement.", "isCorrect": false, "rationale": "This outcome contradicts the theory's prediction that Player Two would accept any positive offer to avoid getting nothing."}], "id": "q02"}, {"question": "Which of the following statements accurately reflects the typical experimental results of the Ultimatum Game?", "options": [{"text": "Most offers are rejected, regardless of the amount.", "isCorrect": false, "rationale": "The text indicates that only low offers are frequently rejected, while generous offers are typically accepted."}, {"text": "Proposers rarely offer more than 20% of the total.", "isCorrect": false, "rationale": "The text states that 'Proposers typically offer between 40% and 50% of the total,' which is significantly higher than 20%."}, {"text": "Responders frequently reject offers below 30%, even though it means getting nothing.", "isCorrect": true, "rationale": "The text clearly states: 'Offers below 30% are rejected roughly half the time. Offers below 20% are rejected the vast majority of the time. Players reject money.'"}, {"text": "Offers of $1 are almost always accepted due to rationality.", "isCorrect": false, "rationale": "This is what economic theory predicts, but the actual results show that such low offers are rejected 'the vast majority of the time' due to perceived unfairness."}], "id": "q03"}, {"question": "A responder rejects an offer of $1 out of $10, even though they receive nothing. Which of the following *best* synthesizes the various psychological and social reasons provided in the text for this behavior?", "options": [{"text": "The responder seeks to maximize their long-term financial gain through strategic play.", "isCorrect": false, "rationale": "While 'reputation and signaling' can have long-term benefits, the immediate act of rejection is a short-term financial loss and is also driven by other non-financial factors like fairness and emotion."}, {"text": "The responder prioritizes punishing perceived unfairness and upholding social norms over immediate material gain.", "isCorrect": true, "rationale": "The text lists 'Fairness norms,' 'Negative reciprocity' (punishing injustice), and 'Emotion' as reasons, all of which involve rejecting money to respond to perceived injustice or enforce norms, overriding pure self-interest."}, {"text": "The responder is primarily driven by an irrational fear of losing money.", "isCorrect": false, "rationale": "The rejection is not driven by a fear of losing the offered money, but by a willingness to forgo it to punish the proposer and enforce fairness."}, {"text": "The responder misunderstands the rules of the game and their own self-interest.", "isCorrect": false, "rationale": "The text attributes the behavior to deep-seated human tendencies like fairness and reciprocity, not a misunderstanding of the game or a lack of self-awareness."}], "id": "q04"}, {"question": "A proposer offers $4 out of $10 to Player Two. According to the text, what is the most likely primary motivation for this seemingly generous offer?", "options": [{"text": "The proposer genuinely believes in sharing wealth equally.", "isCorrect": false, "rationale": "The text states that proposers offer fair splits 'not out of pure generosity but because they expect that unfair offers will be rejected.'"}, {"text": "The proposer anticipates Player Two will reject a smaller, unfair offer.", "isCorrect": true, "rationale": "The text explicitly says, 'And proposers, anticipating this, offer generous splits to avoid rejection' and 'Even selfish proposers behave fairly when they know the other party can punish them.'"}, {"text": "The proposer is trying to establish a good reputation for future games.", "isCorrect": false, "rationale": "While reputation is mentioned as a reason for responders to reject, the primary driver for proposers' generous offers in a one-shot game is to avoid immediate rejection."}, {"text": "The proposer wants to minimize their own payout while still getting something.", "isCorrect": false, "rationale": "A $4 offer for Player Two means the proposer gets $6, which is less than what they could potentially get by offering $1 if Player Two were purely rational."}], "id": "q05"}, {"question": "What insight does cross-cultural research into the Ultimatum Game offer regarding fairness norms?", "options": [{"text": "Fairness norms are universal and identical across all societies.", "isCorrect": false, "rationale": "The text notes 'meaningful variation' across cultures, indicating they are not identical."}, {"text": "Societies with less market integration tend to make more generous offers.", "isCorrect": false, "rationale": "The research found the opposite: 'people in societies with more market exchange tended to make higher offers.'"}, {"text": "Fairness norms are exclusively innate and unaffected by external factors.", "isCorrect": false, "rationale": "The text states: 'This suggests that fairness norms are not purely innate. They are shaped by culture, institutions, and the economic structures in which people live.'"}, {"text": "Economic structures, such as market integration, can shape and influence the development of fairness norms.", "isCorrect": true, "rationale": "The text highlights that 'the degree of market integration in a society predicted how generous offers were' and 'Markets... may actually cultivate habits of fair dealing.'"}], "id": "q06"}, {"question": "The Ultimatum Game challenges the concept of *Homo economicus* primarily because it demonstrates that:", "options": [{"text": "People are often irrational and make random decisions.", "isCorrect": false, "rationale": "The behavior is not random but systematically influenced by specific non-material factors, rather than a general irrationality."}, {"text": "Real-world economic decisions are significantly influenced by factors beyond pure self-interest and rationality, such as fairness and emotion.", "isCorrect": true, "rationale": "The text explicitly states: '*Homo economicus* is an idealization. The perfectly rational, purely self-interested agent of economic theory does not describe how real people behave. Fairness, reciprocity, and emotion all influence decisions.'"}, {"text": "Individuals in economic experiments always prioritize the collective good over personal gain.", "isCorrect": false, "rationale": "While rejection of unfair offers can contribute to collective norms, the primary motivation for rejection is often personal indignation or a desire to punish, not necessarily prioritizing collective good in every instance."}, {"text": "The amount of money involved in economic games is too small to motivate rational behavior.", "isCorrect": false, "rationale": "The core finding is that people prioritize fairness over even small amounts of money, implying that it's the principles, not just the stakes, that drive behavior."}], "id": "q07"}, {"question": "An employer offers a highly skilled job candidate a salary significantly below market rate, believing the candidate will accept it because 'some money is better than no money.' Based on the insights from the Ultimatum Game, what is the most likely outcome?", "options": [{"text": "The candidate will almost certainly accept the offer, recognizing it as a starting point for negotiation.", "isCorrect": false, "rationale": "The text's 'realworld' section suggests the opposite: 'Employers who offer insultingly low salaries find that candidates reject offers rather than accept 'something rather than nothing.''"}, {"text": "The candidate will reject the offer due to perceiving it as unfair and disrespectful, even if they need the job.", "isCorrect": true, "rationale": "This aligns directly with the 'realworld' application: 'people care about the process and perceived fairness of an offer, not only its absolute value. An offer that leaves the other party feeling disrespected is often worse than no offer at all.'"}, {"text": "The candidate will accept the offer but immediately begin looking for a new job.", "isCorrect": false, "rationale": "While a possible secondary action, the primary lesson from the Ultimatum Game is about the immediate rejection of perceived unfairness."}, {"text": "The employer's strategy will succeed if the candidate is truly desperate for employment.", "isCorrect": false, "rationale": "The text implies that even when 'switching is costly' (analogous to needing the job), people will reject unfair terms, overriding immediate self-interest."}], "id": "q08"}, {"question": "The text describes 'altruistic punishment' as being 'irrational in a narrow sense.' What characteristic of altruistic punishment makes it seem irrational from a purely self-interested perspective, and why is it nevertheless considered important?", "options": [{"text": "It involves punishing oneself to benefit the proposer, but it's important for individual reputation.", "isCorrect": false, "rationale": "Altruistic punishment involves the responder bearing a cost (punishing themselves by getting nothing) to punish the proposer, not benefit them. Its importance is for maintaining social norms, not solely individual reputation."}, {"text": "It means sacrificing personal gain (the offered money) to punish an unfair proposer, which is essential for maintaining social norms.", "isCorrect": true, "rationale": "The text states: 'People are willing to bear personal costs to punish unfairness. This 'altruistic punishment' is irrational in a narrow sense but essential for maintaining cooperative social norms.' Rejecting money is a personal cost."}, {"text": "It encourages unfair offers, but it's important for creating competition.", "isCorrect": false, "rationale": "Altruistic punishment discourages unfair offers by making them costly for the proposer, and its importance is for social norms, not competition."}, {"text": "It is an emotional response without any logical basis, yet it always leads to a better outcome.", "isCorrect": false, "rationale": "While emotion plays a role, altruistic punishment has a logical basis in enforcing social norms, even if it doesn't always lead to a 'better outcome' for the individual in the immediate game."}], "id": "q09"}, {"question": "Imagine you are Player One in an Ultimatum Game with $10. Based on the insights from the text, what is the most effective strategy to ensure Player Two accepts your offer, assuming you want to maximize your own gain while still getting an acceptance?", "options": [{"text": "Offer $1, relying on Player Two's rationality to accept 'something rather than nothing.'", "isCorrect": false, "rationale": "The text shows that offers below 20% ($2) are 'rejected the vast majority of the time,' making a $1 offer highly likely to be rejected."}, {"text": "Offer $9, as this is the largest possible amount for Player Two and guarantees acceptance.", "isCorrect": false, "rationale": "While this would likely guarantee acceptance, it would not maximize Player One's gain ($1) and goes against the goal of maximizing Player One's own take *while* getting acceptance."}, {"text": "Offer between $4 and $5, as this signals fairness and significantly reduces the likelihood of rejection.", "isCorrect": true, "rationale": "The text states, 'Proposers typically offer between 40% and 50% of the total — close to an even split' to avoid rejection, indicating this range balances proposer gain with perceived fairness for acceptance."}, {"text": "Make an offer without explanation, to avoid influencing Player Two's decision.", "isCorrect": false, "rationale": "The text emphasizes the *amount* and *perceived fairness* of the offer as the key determinants of acceptance, not the presence or absence of an explanation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
