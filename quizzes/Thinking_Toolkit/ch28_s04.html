<script>
var QUESTIONS = [{"question": "Which of the following best defines the Gambler's Fallacy?", "options": [{"text": "The belief that in a truly random process, past outcomes will eventually be corrected by future outcomes to maintain balance.", "isCorrect": false, "rationale": "This describes the intuitive, but incorrect, understanding of how balance is achieved, which is central to the Gambler's Fallacy, but not the most precise definition. The fallacy is specifically about the *influence* of past outcomes on future ones, not just a general belief about balance."}, {"text": "The belief that past outcomes in a random, independent process influence future outcomes.", "isCorrect": true, "rationale": "This definition directly matches the text: 'This is the Gambler's Fallacy: the belief that past outcomes in a random, independent process influence future outcomes.'"}, {"text": "The phenomenon where individuals tend to remember vivid streaks more than their true frequency suggests.", "isCorrect": false, "rationale": "This describes the Availability Heuristic, which can contribute to the *perception* of streaks, but it is not the definition of the Gambler's Fallacy itself."}, {"text": "The tendency to ignore base probabilities when evaluating the likelihood of specific events.", "isCorrect": false, "rationale": "This describes Base Rate Neglect, another cognitive bias, which can interact with probabilistic reasoning but is distinct from the Gambler's Fallacy."}], "id": "q01"}, {"question": "A fair coin has landed on heads 9 times in a row. According to the principles discussed in the text, what is the most accurate statement about the 10th flip?", "options": [{"text": "The probability of tails is now slightly greater than 50% to 'catch up' and restore balance.", "isCorrect": false, "rationale": "This is the essence of the Gambler's Fallacy. The text explicitly states, 'False: After a run of heads, tails must “catch up” to restore the balance. This is the Gambler's Fallacy.'"}, {"text": "The probability of heads remains exactly 50%, as each flip is an independent event.", "isCorrect": true, "rationale": "The text clearly states that for independent events like coin flips, 'Each spin is independent of every previous spin. The probability of red on the next spin is exactly the same as it was before the streak began.' The same logic applies to a fair coin."}, {"text": "The probability of heads is now slightly greater than 50% due to a 'hot hand' effect for the coin.", "isCorrect": false, "rationale": "The 'hot hand' effect applies to non-random processes involving skill, not to genuinely independent random processes like coin flips. The text explicitly states the hot hand 'certainly does not apply to roulette wheels or coin flips.'"}, {"text": "The Law of Large Numbers dictates that the next flip must be tails for the proportion to approach 50%.", "isCorrect": false, "rationale": "The Law of Large Numbers works by dilution, not by correction. It does not dictate individual outcomes, but describes the long-term trend. The text differentiates: 'The law of large numbers does not work by correcting past outcomes. It works by diluting them.'"}], "id": "q02"}, {"question": "The Monte Carlo Casino incident of 1913, where black came up 26 times in a row, resulted in gamblers losing millions betting on red. This historical event serves as a classic illustration of:", "options": [{"text": "The Law of Large Numbers, demonstrating how extreme streaks are eventually balanced out.", "isCorrect": false, "rationale": "While the streak did eventually end, the gamblers' mistake was not understanding the Law of Large Numbers but rather misapplying it. The Law of Large Numbers explains dilution, not correction of past outcomes."}, {"text": "The Hot Hand Fallacy, as gamblers mistakenly believed the roulette wheel had a 'hot streak' for black.", "isCorrect": false, "rationale": "The Hot Hand Fallacy assumes streaks are self-reinforcing (success breeds success). The gamblers were betting *against* the streak, believing red was 'due,' which is the opposite of the Hot Hand, and characteristic of the Gambler's Fallacy."}, {"text": "A genuine statistical anomaly, proving that roulette wheels can sometimes become biased.", "isCorrect": false, "rationale": "The text presents this as an example of a random, albeit extremely unlikely, streak, not a proof of bias. The core message is about human misinterpretation of randomness."}, {"text": "The Gambler's Fallacy, as players incorrectly believed red was 'due' because of the long streak of black.", "isCorrect": true, "rationale": "The text explicitly states: 'The Monte Carlo incident of 1913 illustrates the cost of the fallacy. When black came up an extraordinary number of times in a row, gamblers lost millions of francs betting on red, convinced that the streak must end.'"}], "id": "q03"}, {"question": "How does the Law of Large Numbers achieve a long-term balance in the proportion of outcomes, according to the text?", "options": [{"text": "By actively correcting past imbalances, such that after a streak of one outcome, the opposite outcome becomes more likely.", "isCorrect": false, "rationale": "This describes the mistaken intuition of the Gambler's Fallacy, not how the Law of Large Numbers works. The text states: 'The law of large numbers does not work by correcting past outcomes.'"}, {"text": "By ensuring that random processes inherently 'remember' past outcomes and adjust probabilities accordingly.", "isCorrect": false, "rationale": "Random processes like coin flips or roulette spins have no memory, as explicitly stated in the text: 'The roulette wheel has no memory. Each spin is independent of every previous spin.'"}, {"text": "By diluting past extreme streaks with a large number of subsequent, approximately 50/50 outcomes, making the initial imbalance statistically negligible.", "isCorrect": true, "rationale": "The text explains: 'The law of large numbers does not work by correcting past outcomes. It works by diluting them... The imbalance is swamped, not corrected.'"}, {"text": "By causing the underlying probabilities of outcomes to shift over time, favoring the less frequent outcome.", "isCorrect": false, "rationale": "For fair random processes, the underlying probabilities do not shift. The Law of Large Numbers describes the behavior of proportions over many trials, not a change in the probability of individual events."}], "id": "q04"}, {"question": "Initially, Gilovich, Vallone, and Tversky (1985) concluded that the 'hot hand' in basketball was an illusion. However, Miller and Sanjurjo (2018) later provided a different perspective. What was the key finding of Miller and Sanjurjo's research regarding the hot hand?", "options": [{"text": "They found that the original 1985 study exaggerated the hot hand effect due to faulty data collection methods.", "isCorrect": false, "rationale": "Miller and Sanjurjo found a statistical bias that made the hot hand seem *smaller* or invisible, not exaggerated. Their work rehabilitated the idea, suggesting it was understated."}, {"text": "They discovered a subtle statistical bias in the original analysis that suppressed the observed hot hand effect, suggesting it might be real to a modest degree.", "isCorrect": true, "rationale": "The text states: 'In 2018, economists Joshua Miller and Adam Sanjurjo demonstrated a subtle statistical bias in the original analysis... After correcting for this bias, Miller and Sanjurjo found evidence of a small but real hot-hand effect in some of the original data.'"}, {"text": "They proved that the hot hand is a powerful and consistently observable phenomenon in all sports, far more significant than previously thought.", "isCorrect": false, "rationale": "Miller and Sanjurjo suggested a 'small but real' effect, and noted it's 'probably much smaller than fans believe.' It's not described as powerful or consistently observable in *all* sports."}, {"text": "They concluded that the hot hand effect is entirely dependent on external factors like crowd noise and has no basis in player skill or confidence.", "isCorrect": false, "rationale": "The text suggests that factors like a player's confidence, fatigue, and defensive attention could introduce genuine dependencies, implying it's not solely external or independent of the player."}], "id": "q05"}, {"question": "The primary distinction between situations where the Gambler's Fallacy applies and situations where the Hot Hand might genuinely exist is:", "options": [{"text": "The length of the streak; short streaks are subject to the Gambler's Fallacy, while long streaks indicate a hot hand.", "isCorrect": false, "rationale": "The length of the streak is not the distinguishing factor. Both fallacies pertain to how people interpret streaks regardless of length, based on assumptions about underlying processes."}, {"text": "Whether the events are truly independent or if there are underlying dependencies that can influence outcomes.", "isCorrect": true, "rationale": "The text emphasizes: 'The key question is always: are the events independent? Coin flips are. Roulette spins are. Basketball shots may not be... The error is in failing to ask whether the process is truly random.'"}, {"text": "The emotional state of the observer; the Gambler's Fallacy stems from anxiety, while the Hot Hand stems from optimism.", "isCorrect": false, "rationale": "While emotions might play a role in human decision-making, the text focuses on the *statistical* and *cognitive* errors related to misunderstanding independence, not primarily the emotional drivers."}, {"text": "The type of game being played; card games are prone to the Gambler's Fallacy, while sports are prone to the Hot Hand.", "isCorrect": false, "rationale": "While examples are given for different contexts, the core principle applies across various situations. The distinction isn't the game type itself, but whether the events within that game are independent or dependent."}], "id": "q06"}, {"question": "An investor observes that a particular stock has increased in value for eight consecutive trading days. Believing that 'what goes up must come down,' they decide to short-sell the stock, expecting a correction. This investor is most likely demonstrating which concept from the text?", "options": [{"text": "The Hot Hand belief, assuming past success will continue.", "isCorrect": false, "rationale": "The Hot Hand belief assumes success breeds success, leading one to expect the streak to *continue*. This investor expects the opposite, indicating a different fallacy."}, {"text": "The Law of Large Numbers, correctly applying its principles to financial markets.", "isCorrect": false, "rationale": "The Law of Large Numbers describes long-term averages by dilution, not by predicting individual 'corrections.' Misapplying it in this way would be a fallacy."}, {"text": "An accurate understanding of market cycles, indicating a genuine dependency in stock prices.", "isCorrect": false, "rationale": "The text explicitly mentions: 'Investors who believe a stock is “due for a correction” after a long rise — or “due for a rebound” after a long fall — are committing the Gambler's Fallacy if the stock's movements are independent.'"}, {"text": "The Gambler's Fallacy, assuming that a streak in one direction makes the opposite outcome more likely.", "isCorrect": true, "rationale": "This scenario perfectly aligns with the Gambler's Fallacy: 'The Gambler's Fallacy falsely assumes that past outcomes in a random process make opposite outcomes more likely.' The investor believes the stock is 'due for a correction' because of the prior rise."}], "id": "q07"}, {"question": "Which statement accurately describes the relationship between the Gambler's Fallacy and the Hot Hand belief, as presented in the text?", "options": [{"text": "They are both always true for genuinely independent random processes.", "isCorrect": false, "rationale": "Both are described as errors for independent events. The Gambler's Fallacy is wrong, and the strong form of the Hot Hand is also wrong for independent events."}, {"text": "They represent opposite misunderstandings of randomness, both stemming from a failure to assess event independence.", "isCorrect": true, "rationale": "The text explicitly states: 'The Gambler's Fallacy and the Hot Hand represent two opposite ways of misunderstanding randomness... Both errors stem from the same root: a failure to assess whether successive events are truly independent.'"}, {"text": "The Gambler's Fallacy applies to human performance, while the Hot Hand applies to inanimate random events.", "isCorrect": false, "rationale": "This is the inverse of what the text implies. The Gambler's Fallacy applies to independent random events (roulette, coin flips), while the Hot Hand might have some validity in human performance (basketball) due to dependencies."}, {"text": "The Hot Hand is a newer term for what was previously known as the Gambler's Fallacy.", "isCorrect": false, "rationale": "The text clearly presents them as distinct concepts, identified at different times and representing opposite errors. The Gambler's Fallacy has been recognized for centuries, while the Hot Hand was identified later by Gilovich, Vallone, and Tversky."}], "id": "q08"}, {"question": "According to the text, why might the 'hot hand' effect be partially real in contexts like basketball, even though it's a fallacy for roulette or coin flips?", "options": [{"text": "Basketball players are not subject to the same laws of probability as inanimate objects.", "isCorrect": false, "rationale": "While players are not inanimate, the laws of probability apply to all events. The difference lies in whether the events are truly independent or if human factors introduce dependencies."}, {"text": "A player's confidence, fatigue, defensive attention, and shot selection can change during a streak, introducing genuine dependencies.", "isCorrect": true, "rationale": "The text explains: 'Basketball shots may not be — a player's confidence, fatigue, defensive attention, and shot selection all change during a streak, introducing genuine dependencies.'"}, {"text": "Spectators and commentators create a 'hot hand' effect through their expectations, influencing player performance.", "isCorrect": false, "rationale": "While external factors can play a role, the text specifically points to *player-internal* and *game-situational* changes (confidence, defense, etc.) as introducing dependencies, not just observer expectation."}, {"text": "The sample size of basketball shots is typically too small for the Law of Large Numbers to apply effectively.", "isCorrect": false, "rationale": "The Law of Large Numbers applies to large numbers of trials. While individual streaks are short, the discussion about the hot hand centers on dependencies, not sample size issues with the Law of Large Numbers."}], "id": "q09"}, {"question": "A lottery player consistently avoids picking numbers that have won in the past week, believing those numbers are 'used up' and less likely to appear again. What is the most accurate assessment of this strategy based on the text?", "options": [{"text": "It is a rational strategy based on the Law of Large Numbers, ensuring a more balanced selection over time.", "isCorrect": false, "rationale": "The Law of Large Numbers does not suggest that past winning numbers become less likely. This strategy is an application of the Gambler's Fallacy."}, {"text": "It is an example of the Hot Hand belief, where the player expects non-winning numbers to continue their streak of not winning.", "isCorrect": false, "rationale": "The Hot Hand belief assumes success breeds success. This player is assuming past success (a number winning) makes future success *less* likely, which is the Gambler's Fallacy."}, {"text": "It is an instance of the Gambler's Fallacy, as each lottery drawing is an independent event, and past wins do not affect future probabilities.", "isCorrect": true, "rationale": "The text states: 'Lottery players who avoid numbers that have recently won are no more likely to pick winning numbers than those who do not.' This is a direct application of the Gambler's Fallacy to independent lottery events."}, {"text": "It is a valid approach, as lottery numbers, like basketball players, can exhibit genuine dependencies over short periods.", "isCorrect": false, "rationale": "Lottery drawings are described as genuinely independent random processes. The dependencies seen in contexts like basketball do not apply to lotteries."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
