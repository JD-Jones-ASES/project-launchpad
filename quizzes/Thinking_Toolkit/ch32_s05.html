        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Benjamin Graham's allegory, what is the most distinctive characteristic of Mr. Market's daily offers to buy or sell shares?", "options": [{"text": "They are consistently aligned with the business's long-term intrinsic value.", "isCorrect": false, "rationale": "The text explicitly states Mr. Market's moods are 'often unrelated to the actual performance of the business,' meaning his offers are not consistently aligned with intrinsic value."}, {"text": "They are primarily driven by Mr. Market's unpredictable and often emotional mood swings.", "isCorrect": true, "rationale": "The allegory emphasizes that Mr. Market's 'mood swings are dramatic, unpredictable, and often unrelated to the actual performance of the business,' making his offers highly emotional and inconsistent."}, {"text": "They reflect a careful, rational assessment of the company's daily operational changes.", "isCorrect": false, "rationale": "The text contrasts Mr. Market's mood with 'the company's factories, patents, or customer base,' indicating his offers are not based on rational operational assessments."}, {"text": "They are designed to coerce the owner into making impulsive trades.", "isCorrect": false, "rationale": "While his moods might provoke impulsive reactions, the primary characteristic is his emotional volatility, not a deliberate design to coerce, although that can be an outcome."}]}, {"question": "What is considered the 'crucial point' an investor should grasp when dealing with Mr. Market?", "options": [{"text": "Investors are legally bound to accept Mr. Market's offers periodically to maintain their stake.", "isCorrect": false, "rationale": "The text states: 'you are not obligated to trade with him,' directly contradicting this option."}, {"text": "Mr. Market's emotional volatility creates opportunities for astute investors, rather than obligations.", "isCorrect": true, "rationale": "The text explicitly identifies this as the 'crucial point': 'Your advantage lies in recognizing that his emotional volatility creates opportunities, not obligations.'"}, {"text": "It is always advisable to follow Mr. Market's latest price movements to stay competitive.", "isCorrect": false, "rationale": "The allegory advises against following his moods, suggesting instead to 'ignore him entirely and focus on the underlying business.'"}, {"text": "The investor's primary goal should be to stabilize Mr. Market's mood swings through consistent trading.", "isCorrect": false, "rationale": "Investors have no control over Mr. Market's moods; the focus is on how to react to them, not to change them."}]}, {"question": "A popular restaurant's business spikes after a viral review, then crashes after a negative social media post, despite no changes in its food quality or service. This scenario is best described as an example of:", "options": [{"text": "Efficient market hypothesis in action, where prices rapidly reflect all available information.", "isCorrect": false, "rationale": "While prices may reflect information, the Mr. Market allegory suggests this is more about sentiment/mood than a true change in underlying value, which contradicts the efficient market hypothesis's assumption of rational pricing."}, {"text": "The restaurant's true underlying value fluctuating in response to public demand.", "isCorrect": false, "rationale": "The text states 'the food did not change overnight,' indicating the underlying value did not fluctuate with the public's mood."}, {"text": "A 'Mr. Market situation' where public opinion fluctuates more wildly than underlying reality.", "isCorrect": true, "rationale": "This directly mirrors the text's application of the allegory: 'A restaurant's popularity may spike after a viral review and crash after a bad Yelp post, but the food did not change overnight.'"}, {"text": "The natural economic cycle of boom and bust affecting the hospitality industry.", "isCorrect": false, "rationale": "This is too general. While economic cycles exist, the specific point here is the disconnect between public sentiment (Mr. Market) and unchanging underlying reality, which is the core of the allegory."}]}, {"question": "Benjamin Graham's core teaching, central to the Mr. Market allegory, is the fundamental distinction between which two concepts?", "options": [{"text": "Supply and Demand.", "isCorrect": false, "rationale": "While relevant to markets, supply and demand is a general economic principle and not Graham's specific core teaching highlighted in this context."}, {"text": "Assets and Liabilities.", "isCorrect": false, "rationale": "Assets and liabilities are accounting terms, not the core distinction Graham makes within the Mr. Market allegory."}, {"text": "Price (what Mr. Market offers) and Value (what the business is actually worth).", "isCorrect": true, "rationale": "The 'Benjamin Graham' personbox explicitly states: 'Graham's core teaching was the distinction between price (what Mr. Market offers) and value (what the business is actually worth).'"}, {"text": "Growth and Income.", "isCorrect": false, "rationale": "Growth and income are investment strategies or characteristics, but not the fundamental distinction Graham emphasizes in the context of Mr. Market."}]}, {"question": "What action would an investor, applying the Mr. Market allegory, most likely take during a significant market downturn where stock prices are falling dramatically across the board without major changes in company fundamentals?", "options": [{"text": "Sell all holdings immediately to avoid further losses, following the market's trend.", "isCorrect": false, "rationale": "This would be 'following Mr. Market's mood,' which the text advises against. The Real-World example states, 'Investors who sold at the bottom were following Mr. Market's mood.'"}, {"text": "Use the opportunity to buy shares at what Mr. Market is offering as 'absurdly low' prices.", "isCorrect": true, "rationale": "The text states, 'You can buy when his price is absurdly low' and 'Investors who held or bought [during the market crash] were using him as a servant, not a guide.'"}, {"text": "Publicly criticize Mr. Market for his irrational behavior.", "isCorrect": false, "rationale": "While Mr. Market may be irrational, criticizing him is not an investment strategy derived from the allegory."}, {"text": "Wait for Mr. Market to regain his composure and return to euphoric pricing before making any moves.", "isCorrect": false, "rationale": "Waiting until prices are high again misses the opportunity to 'buy when his price is absurdly low' and use his despondency to one's advantage."}]}, {"question": "The text states that 'A company that was worth a hundred million dollars on Monday did not become worth eighty million on Tuesday because the stock price dropped twenty percent.' What is the primary implication of this statement?", "options": [{"text": "Stock market prices are inherently meaningless and should always be ignored.", "isCorrect": false, "rationale": "Prices aren't meaningless; they represent opportunities. The point is not to be guided by them but to use them strategically."}, {"text": "The true value of a business is highly volatile and can change drastically overnight.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'the underlying value of the businesses those stocks represent changes far more slowly.'"}, {"text": "Mr. Market's mood swings often cause price fluctuations that are decoupled from a company's fundamental worth.", "isCorrect": true, "rationale": "This statement highlights the core of the allegory: 'Something changed in Mr. Market's mood, not in the company's factories, patents, or customer base,' demonstrating a disconnect between price and value."}, {"text": "Companies should implement daily financial reporting to prevent such discrepancies.", "isCorrect": false, "rationale": "This is a proposed solution that is outside the scope of the allegory's implication about the nature of market fluctuations versus underlying value."}]}, {"question": "How does the Mr. Market allegory apply to someone making career decisions, particularly when a field becomes 'hot' or 'falls out of fashion'?", "options": [{"text": "It suggests always pursuing 'hot' fields to maximize perceived value and income.", "isCorrect": false, "rationale": "The allegory advises against following perceived value driven by 'Mr. Market's mood' without independent judgment."}, {"text": "It advises evaluating the underlying value of one's skills and job satisfaction, rather than just market fashion.", "isCorrect": true, "rationale": "The 'realworld' example for Career decisions states: 'The underlying value of your skills and the satisfaction you derive from your work change much more slowly than fashion,' aligning with evaluating underlying value over market sentiment."}, {"text": "It implies that career choices are purely dictated by Mr. Market's whims and are beyond individual control.", "isCorrect": false, "rationale": "The allegory's central discipline is independent judgment, empowering individuals to act against Mr. Market's whims."}, {"text": "It encourages swift career changes to adapt to Mr. Market's changing demands and capitalize on fleeting opportunities.", "isCorrect": false, "rationale": "This contradicts the idea of focusing on underlying value which 'change much more slowly' than fashion, implying stability rather than frequent changes based on fleeting trends."}]}, {"question": "The 'discipline' that the Mr. Market allegory primarily teaches is most accurately described as:", "options": [{"text": "The ability to predict Mr. Market's mood swings with perfect accuracy.", "isCorrect": false, "rationale": "The text states Mr. Market's moods are 'unpredictable,' so perfect prediction is not the discipline."}, {"text": "Strict adherence to market trends and public sentiment in all decision-making.", "isCorrect": false, "rationale": "This is the opposite of what the allegory teaches; it explicitly advises against 'following the crowd's mood.'"}, {"text": "The practice of independent judgment, focusing on underlying reality and value over market noise.", "isCorrect": true, "rationale": "The text states: 'The discipline that the Mr. Market allegory teaches is the discipline of independent judgment. Instead of reacting to price movements, evaluate value.'"}, {"text": "Regularly engaging with Mr. Market to negotiate better prices regardless of his mood.", "isCorrect": false, "rationale": "While you can trade with him, the core discipline isn't about negotiation but about internal evaluation and selective action based on value."}]}, {"question": "During the market crash of March 2020, the S&P 500 lost a third of its value, then recovered within five months. According to the Mr. Market allegory, which investor action best exemplifies using Mr. Market as a 'servant, not a guide'?", "options": [{"text": "Selling all shares during the panic to avoid potential further losses.", "isCorrect": false, "rationale": "The text specifically states that 'Investors who sold at the bottom were following Mr. Market's mood,' meaning they were being guided by him."}, {"text": "Holding existing investments or buying more shares while prices were low, based on an assessment of underlying business value.", "isCorrect": true, "rationale": "The 'realworld' example for stock market volatility states: 'Investors who held or bought were using him as a servant, not a guide,' as they acted on underlying value, not panic."}, {"text": "Diversifying investments across various sectors to mitigate Mr. Market's impact.", "isCorrect": false, "rationale": "Diversification is a good general investment strategy but doesn't directly illustrate the 'servant, not guide' principle in the context of reacting to Mr. Market's emotional swings."}, {"text": "Advocating for government intervention to stabilize market prices.", "isCorrect": false, "rationale": "This is a political or regulatory action, not an individual investor's action in response to Mr. Market's offers."}]}, {"question": "Warren Buffett described The Intelligent Investor as 'the best book on investing ever written.' What is his connection to Benjamin Graham, the author of the book?", "options": [{"text": "Buffett was a close personal friend who helped Graham write the book.", "isCorrect": false, "rationale": "The text does not mention Buffett assisting in writing the book or being a close personal friend, though they had a strong professional relationship."}, {"text": "Buffett was Graham's most famous student at Columbia Business School.", "isCorrect": true, "rationale": "The 'Benjamin Graham' personbox states: 'His most famous student was Warren Buffett, who studied under Graham at Columbia Business School.'"}, {"text": "Buffett was a co-founder of Graham's investment firm.", "isCorrect": false, "rationale": "The text does not mention Buffett as a co-founder of Graham's firm."}, {"text": "Buffett was a contemporary investor who independently arrived at similar investment philosophies.", "isCorrect": false, "rationale": "While Buffett did develop his own insights, he explicitly learned from Graham, making him a student, not solely an independent contemporary."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
