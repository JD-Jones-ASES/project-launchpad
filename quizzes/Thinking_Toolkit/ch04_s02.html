        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines the representativeness heuristic?", "options": [{"text": "Judging the probability of an event based on how easily examples come to mind.", "isCorrect": false, "rationale": "This describes the availability heuristic, which is a different cognitive bias."}, {"text": "The tendency to seek out and interpret information that confirms one's existing beliefs.", "isCorrect": false, "rationale": "This describes confirmation bias, which is distinct from the representativeness heuristic."}, {"text": "Judging the probability that something belongs to a category by how much it resembles the typical member of that category, often ignoring statistical base rates.", "isCorrect": true, "rationale": "This accurately defines the representativeness heuristic as described in the text, highlighting its focus on resemblance over actual statistical probability and its tendency to ignore base rates."}, {"text": "The tendency to overestimate the likelihood of positive events and underestimate the likelihood of negative events.", "isCorrect": false, "rationale": "This describes optimism bias, which is not the representativeness heuristic."}], "id": "q01"}, {"question": "In the famous 'Linda problem,' why do most people incorrectly rate 'Linda is a bank teller and is active in the feminist movement' as more probable than 'Linda is a bank teller'?", "options": [{"text": "Because 'bank teller' is a less specific description, making it inherently less appealing.", "isCorrect": false, "rationale": "The appeal of the description does not dictate its statistical probability; 'bank teller' is a broader, thus more probable, category."}, {"text": "Because adding specific details always increases the statistical probability of an event.", "isCorrect": false, "rationale": "The opposite is true; adding a condition (like 'and is active in the feminist movement') can only narrow the category and reduce or keep the probability the same, never expand it."}, {"text": "Because the description of Linda better resembles the mental portrait of a 'feminist bank teller,' illustrating the conjunction fallacy.", "isCorrect": true, "rationale": "This is the core explanation provided in the text. People substitute resemblance to a stereotype for actual probability, leading to the conjunction fallacy where a conjunction of events is judged more likely than a single event."}, {"text": "Because feminist movements are statistically more prevalent among philosophy majors than general bank tellers.", "isCorrect": false, "rationale": "While the description suggests Linda might be a feminist, this doesn't make the *conjunction* more probable than the single category. The error lies in ignoring the set relationship."}], "id": "q02"}, {"question": "A shy, quiet person who loves order and detail is described. When asked if this person is more likely a librarian or a salesperson, most people incorrectly choose librarian. This error primarily demonstrates the representativeness heuristic's tendency to:", "options": [{"text": "Prioritize vivid, personal anecdotes over objective data.", "isCorrect": false, "rationale": "While representativeness can be influenced by vividness, the primary error highlighted in this example is the neglect of statistical prevalence, not just anecdotal evidence."}, {"text": "Ignore base rate information about the actual prevalence of different professions in the population.", "isCorrect": true, "rationale": "The text explicitly states that 'the representativeness heuristic ignores this base rate information entirely,' referring to the fact that there are far more salespeople than librarians, making a salesperson with those traits more likely despite the 'fit' to a librarian stereotype."}, {"text": "Focus on a single, salient trait rather than considering a holistic profile.", "isCorrect": false, "rationale": "The error isn't about focusing on a *single* trait, but rather how the *entire profile* 'resembles' a stereotype, leading to neglect of broader statistical data."}, {"text": "Assume that specific personality traits always predict specific career paths accurately.", "isCorrect": false, "rationale": "The error isn't an assumption of perfect prediction, but rather the flawed method of judging probability by resemblance instead of statistical likelihood."}], "id": "q03"}, {"question": "The representativeness heuristic leads to errors primarily because it causes individuals to:", "options": [{"text": "Systematically seek out information that confirms their initial hypotheses, ignoring contradictory evidence.", "isCorrect": false, "rationale": "This describes confirmation bias. While related, it's not the primary mechanism of error for the representativeness heuristic itself."}, {"text": "Substitute resemblance to a stereotype or mental portrait for actual statistical probability.", "isCorrect": true, "rationale": "The text clearly states, 'So you judged (b) as more likely, substituting resemblance to a stereotype for actual probability.' This is the core mechanism of how the heuristic leads to errors."}, {"text": "Overestimate their own knowledge and abilities, leading to poor decision-making.", "isCorrect": false, "rationale": "This describes overconfidence, which is a different cognitive bias."}, {"text": "Underestimate the impact of external factors on outcomes, attributing too much to internal characteristics.", "isCorrect": false, "rationale": "This relates to the fundamental attribution error, not the representativeness heuristic."}], "id": "q04"}, {"question": "Under what conditions does the representativeness heuristic work 'reasonably well' in everyday situations?", "options": [{"text": "Only when the statistical base rates are explicitly provided and considered.", "isCorrect": false, "rationale": "The heuristic often involves *ignoring* base rates; it works well when resemblance *aligns* with probability, even if base rates aren't consciously considered."}, {"text": "When the resemblance between an item and a category's typical member accurately reflects the actual probability of belonging to that category.", "isCorrect": true, "rationale": "The text states: 'This heuristic works reasonably well in many everyday situations. If something looks like a duck, walks like a duck, and quacks like a duck, it probably is a duck.' This illustrates that it works when resemblance and probability align."}, {"text": "When decisions need to be made very quickly without time for detailed analysis.", "isCorrect": false, "rationale": "While heuristics are used for quick decisions, this option describes *why* they are used, not the conditions under which the representativeness heuristic specifically produces accurate results."}, {"text": "When individuals have extensive prior experience with the specific situation being judged.", "isCorrect": false, "rationale": "Experience can refine judgments, but the heuristic's effectiveness depends on the congruence of resemblance and probability, not just experience."}], "id": "q05"}, {"question": "In medical diagnosis, applying the representativeness heuristic can lead to which of the following errors?", "options": [{"text": "Over-reliance on common symptoms, potentially overlooking rare but serious conditions.", "isCorrect": false, "rationale": "The heuristic's error here is often the opposite: focusing on resemblance to a rare condition *despite* the higher probability of a common one."}, {"text": "Diagnosing a patient with a rare disease because their symptoms 'look like' it, even when a common condition is far more probable given the base rates.", "isCorrect": true, "rationale": "The text explicitly mentions this scenario: 'a patient whose symptoms 'look like' a rare disease may receive that diagnosis even when a common condition is far more probable given the base rates.'"}, {"text": "Failing to consider a patient's medical history when making a diagnosis.", "isCorrect": false, "rationale": "While a potential diagnostic error, it's not a direct consequence of the representativeness heuristic as described."}, {"text": "Ordering an excessive number of tests due to uncertainty about the diagnosis.", "isCorrect": false, "rationale": "This describes a different diagnostic strategy, not an error stemming from representativeness."}], "id": "q06"}, {"question": "The 'hot hand' phenomenon in basketball, where fans perceive a player making multiple shots in a row as having genuine skill, illustrates the representativeness heuristic because:", "options": [{"text": "Players who believe they have a 'hot hand' actually improve their performance due to increased confidence.", "isCorrect": false, "rationale": "The text notes a 'twist' that recent research found a small real effect, but the original point about representativeness focuses on the fan's *perception* and statistical analysis, not the player's internal state."}, {"text": "It demonstrates how random sequences of events can create illusions of patterns, which the heuristic interprets as 'skilled streaks'.", "isCorrect": true, "rationale": "The text explains that 'sequences of hits resemble what we think skilled streaks should look like' even if they are consistent with random chance. This is the essence of representativeness: judging by resemblance to an expected pattern."}, {"text": "It is an example of the availability heuristic, where memorable streaks are overemphasized in memory.", "isCorrect": false, "rationale": "While availability might play a role in recalling streaks, the primary explanation given in the text is that the sequence *resembles* a pattern of skill, which is representativeness."}, {"text": "Fans attribute success to skill rather than external factors like luck or easy shots.", "isCorrect": false, "rationale": "This relates more to attribution theory; the representativeness aspect is about how the *pattern* of hits is perceived."}], "id": "q07"}, {"question": "A company's practice of hiring for 'cultural fit' can become a 'trap' related to the representativeness heuristic when it leads to:", "options": [{"text": "An over-reliance on objective metrics and standardized assessment tools.", "isCorrect": false, "rationale": "The 'cultural fit' trap, as described, is about subjective judgment based on resemblance, not objective metrics."}, {"text": "Systematically selecting candidates who resemble existing team members in background, mannerisms, or style, potentially excluding highly capable individuals who don't fit the stereotype.", "isCorrect": true, "rationale": "The text states that 'companies that hire for 'cultural fit' often select candidates who resemble the existing team... This feels like good judgment... but it systematically filters out people who might perform well despite not matching the stereotype.'"}, {"text": "Prioritizing individual technical skills over teamwork and collaboration.", "isCorrect": false, "rationale": "While a potential hiring pitfall, it's not directly described as a consequence of the representativeness heuristic in this context."}, {"text": "Ignoring the importance of diversity and inclusion in the workplace.", "isCorrect": false, "rationale": "While the outcome of the 'cultural fit' trap (lack of diversity) is related, the mechanism described in the text is the heuristic-driven judgment based on resemblance to a stereotype, not a conscious decision to ignore diversity."}], "id": "q08"}, {"question": "The section states that the conjunction fallacy 'reveals the representativeness heuristic in action.' This implies that:", "options": [{"text": "The conjunction fallacy is a rare and isolated cognitive error unrelated to other heuristics.", "isCorrect": false, "rationale": "The text explicitly links the conjunction fallacy to the representativeness heuristic as a demonstration of its operation."}, {"text": "The representativeness heuristic is a less common bias than the conjunction fallacy.", "isCorrect": false, "rationale": "The heuristic is a general mental shortcut, and the conjunction fallacy is one specific type of error it causes."}, {"text": "The conjunction fallacy occurs when people mistakenly judge a more specific condition as more probable than a general one, driven by its better 'fit' to a mental stereotype.", "isCorrect": true, "rationale": "The text explains that the conjunction fallacy happens because 'Feminist bank teller' matches the mental portrait better than 'bank teller' alone, leading people to substitute resemblance for actual probability."}, {"text": "The conjunction fallacy is simply another name for the representativeness heuristic.", "isCorrect": false, "rationale": "The representativeness heuristic is the underlying cognitive process; the conjunction fallacy is a specific error (a fallacy) that results from this heuristic when judging compound probabilities."}], "id": "q09"}, {"question": "According to the 'keyconcept' box, when we employ the representativeness heuristic, the question 'How likely is this, given the numbers?' is replaced by which alternative question?", "options": [{"text": "'How easily can I recall similar instances?'", "isCorrect": false, "rationale": "This question is characteristic of the availability heuristic, not the representativeness heuristic."}, {"text": "'How typical does this seem?'", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'The question 'How typical does this seem?' replaces the question 'How likely is this, given the numbers?'"}, {"text": "'How much personal effort will this require?'", "isCorrect": false, "rationale": "This question is unrelated to how the representativeness heuristic operates."}, {"text": "'How confident am I in my initial judgment?'", "isCorrect": false, "rationale": "This relates to overconfidence, which is a separate cognitive phenomenon, not the question that replaces probability assessment."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
