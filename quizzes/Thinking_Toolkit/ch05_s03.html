<script>
var QUESTIONS = [{"question": "Which of the following best defines the sunk-cost fallacy?", "options": [{"text": "The tendency to overestimate the future returns of an investment.", "isCorrect": false, "rationale": "This describes a different cognitive bias (e.g., optimism bias) and not the core mechanism of the sunk-cost fallacy, which is about past investments influencing current decisions."}, {"text": "The tendency to continue an endeavor due to previously invested resources rather than its future value.", "isCorrect": true, "rationale": "This accurately defines the sunk-cost fallacy as described in the text: making decisions based on unrecoverable past investments (time, money, effort) instead of objective future prospects."}, {"text": "The mistake of failing to account for all potential future costs of a project.", "isCorrect": false, "rationale": "While important in decision-making, this focuses on *future* costs and not the critical role of *past*, unrecoverable costs in the sunk-cost fallacy."}, {"text": "The belief that all investments must eventually pay off, regardless of current indicators.", "isCorrect": false, "rationale": "This describes a form of irrational optimism or wishful thinking, which can contribute to the fallacy, but it's not the definition of the fallacy itself, which specifically links to *past investments*."}], "id": "q01"}, {"question": "The vivid nickname 'Concorde fallacy' originates from which historical project?", "options": [{"text": "The construction of the Panama Canal, which faced severe financial and engineering challenges.", "isCorrect": false, "rationale": "While the Panama Canal was a massive project with challenges, the text explicitly attributes the 'Concorde fallacy' nickname to the supersonic airliner."}, {"text": "The British-French supersonic airliner whose funding continued despite clear commercial non-viability.", "isCorrect": true, "rationale": "The text clearly states that the nickname 'Concorde fallacy' comes from the British-French supersonic airliner, which governments continued to fund long after it was clear it would never be commercially viable."}, {"text": "The development of early transatlantic telegraph cables, which incurred massive costs.", "isCorrect": false, "rationale": "Early telegraph cables were costly, but they are not the source of the 'Concorde fallacy' nickname as explained in the text."}, {"text": "The construction of the Channel Tunnel, which significantly exceeded its budget and timeline.", "isCorrect": false, "rationale": "The Channel Tunnel is another large-scale project that faced cost overruns, but it is not the origin of the 'Concorde fallacy' as detailed in the reading."}], "id": "q02"}, {"question": "According to the text, what central psychological mechanism helps explain why people fall for the sunk-cost fallacy?", "options": [{"text": "Confirmation bias, where individuals seek information that confirms their initial decision.", "isCorrect": false, "rationale": "Confirmation bias can play a role in maintaining a course of action, but the text specifically identifies 'loss aversion' as playing a 'central role' in why abandoning a project feels like a definitive loss."}, {"text": "Loss aversion, as abandoning a project makes the prior investment feel like a definitive loss.", "isCorrect": true, "rationale": "The text explicitly states that 'Loss aversion plays a central role. Abandoning a project makes the prior investment feel like a definitive loss,' making this the correct answer."}, {"text": "Anchoring bias, where an initial piece of information disproportionately influences subsequent decisions.", "isCorrect": false, "rationale": "Anchoring bias influences initial judgments, but the text attributes the persistence in sunk-cost scenarios primarily to loss aversion and identity, not anchoring."}, {"text": "The availability heuristic, where easily recalled information influences decision-making.", "isCorrect": false, "rationale": "The availability heuristic relates to recall and perceived frequency, which is not the central mechanism for the sunk-cost fallacy described in the text."}], "id": "q03"}, {"question": "A small business owner has spent two years and a significant amount of capital developing a new product. Market research now indicates very low demand and high production costs, suggesting it will never be profitable. However, the owner decides to launch the product anyway, stating, 'I've put too much into this to give up now.' This decision is an example of which phenomenon?", "options": [{"text": "The planning fallacy.", "isCorrect": false, "rationale": "The planning fallacy refers to underestimating the time, costs, and risks of future actions. The scenario describes a decision based on *past* investment, not underestimation of *future* project parameters."}, {"text": "The sunk-cost fallacy.", "isCorrect": true, "rationale": "The owner is continuing with the product launch based on the resources (time, money) already invested, despite clear indicators that its future value is poor. This perfectly aligns with the definition and examples of the sunk-cost fallacy."}, {"text": "Opportunity cost neglect.", "isCorrect": false, "rationale": "While neglecting opportunity costs might be an outcome of this decision (e.g., missed chances to invest in better products), the core *reason* for the decision presented is the past investment, which points directly to the sunk-cost fallacy."}, {"text": "The endowment effect.", "isCorrect": false, "rationale": "The endowment effect is the tendency to value something more once one owns it. While the owner might feel a connection to the product, the primary driver stated ('too much into this') directly reflects past investment rather than an elevated valuation simply due to ownership."}], "id": "q04"}, {"question": "How does the text suggest one can differentiate between legitimate persistence in a project and the sunk-cost fallacy?", "options": [{"text": "Legitimate persistence is always rewarded with ultimate success, whereas the fallacy leads to failure.", "isCorrect": false, "rationale": "Success is not a guaranteed outcome of legitimate persistence, nor is failure a definitive identifier of the fallacy. The text focuses on the *reason* for continuing."}, {"text": "The difference lies in whether the reason for continuing is 'the future still looks promising' or 'I have already put so much into this.'", "isCorrect": true, "rationale": "The 'caution' box explicitly states this distinction: 'The difference is whether your reason for continuing is “the future still looks promising” or “I have already put so much into this.” The first is a legitimate forward-looking reason. The second is the fallacy.'"}, {"text": "Legitimate persistence is typically observed in individual endeavors, while the fallacy is common in organizational settings.", "isCorrect": false, "rationale": "The text notes the fallacy is *amplified* in organizations but occurs at all scales, including individual decisions like watching a bad movie or staying in a relationship. Persistence can also be individual or organizational."}, {"text": "One should always stop a project if the initial budget has been exceeded, regardless of future prospects.", "isCorrect": false, "rationale": "Exceeding a budget might be a signal, but the text emphasizes that future prospects, not past spending limits, should drive the decision. A project can exceed budget but still have promising future value."}], "id": "q05"}, {"question": "According to the key concept outlined in the text, what role should previously invested resources (money, time, effort) play in a current decision about an ongoing project?", "options": [{"text": "They should be given significant weight, as they represent a commitment that should be honored.", "isCorrect": false, "rationale": "The text explicitly states that sunk costs 'should play no role in your current decision' because they are gone and cannot be recovered."}, {"text": "They should be weighed against potential future gains and losses.", "isCorrect": false, "rationale": "While future gains and losses are crucial, the text clarifies that *only* future costs and benefits should inform the decision, implying past investments are irrelevant and not to be weighed."}, {"text": "They should be considered only if there is a possibility of recovering a portion of the investment.", "isCorrect": false, "rationale": "The definition of a sunk cost is an investment that 'cannot be recovered regardless of what you do next.' Therefore, the possibility of recovery is not a condition for its irrelevance in decision-making."}, {"text": "They should play no role whatsoever, as they are unrecoverable.", "isCorrect": true, "rationale": "The text unequivocally states, 'The money you already spent is a sunk cost... and it should play no role in your current decision.' This is the core principle of avoiding the fallacy."}], "id": "q06"}, {"question": "The text highlights that the sunk-cost fallacy is amplified in organizations. What is a primary reason given for this amplification?", "options": [{"text": "Organizational projects typically involve larger sums of money, making losses more significant.", "isCorrect": false, "rationale": "While organizational projects involve large sums, the text focuses on human factors as the reason for amplification, not just the scale of investment itself."}, {"text": "A manager's personal reputation and career are often tied to the success of projects they championed.", "isCorrect": true, "rationale": "The text states, 'A manager who championed a project has personal reputation tied to its success. Admitting failure means admitting that she was wrong, which has career consequences.' This directly explains the amplification."}, {"text": "Organizations have more complex decision-making processes, leading to slower recognition of failure.", "isCorrect": false, "rationale": "Complexity might contribute to difficulty in decision-making, but the text specifically points to the personal reputational stake of individuals within organizations as the amplifying factor."}, {"text": "The distributed nature of responsibility in organizations makes it harder to assign blame for failing projects.", "isCorrect": false, "rationale": "Difficulty in assigning blame might exist, but the text emphasizes the *individual* manager's stake and the consequences of *admitting* failure for their own reputation, rather than the distribution of blame."}], "id": "q07"}, {"question": "What 'test' does the text propose to determine if one is falling for the sunk-cost fallacy when evaluating an ongoing project?", "options": [{"text": "Calculate the total amount of money, time, and effort already invested in the project.", "isCorrect": false, "rationale": "While knowing past investment is factual, this action doesn't serve as the 'test' for the fallacy; the test is about a forward-looking hypothetical scenario."}, {"text": "Ask: 'If I were starting fresh today, knowing what I now know, would I begin this project?'", "isCorrect": true, "rationale": "The text presents this exact question as the 'test' in the 'keyconcept' box: 'The test: If I were starting fresh today, knowing what I now know, would I begin this project? If the answer is no, then the right move is to stop...'"}, {"text": "Consult with external experts to get an unbiased opinion on the project's viability.", "isCorrect": false, "rationale": "Seeking expert opinion is a good practice, but it's not the specific 'test' for the sunk-cost fallacy described in the text, which focuses on a personal hypothetical evaluation."}, {"text": "Project the potential profits or benefits that would be gained if the project were completed successfully.", "isCorrect": false, "rationale": "Forecasting future benefits is part of rational decision-making, but it doesn't directly address the influence of sunk costs or serve as the specific test described."}], "id": "q08"}, {"question": "How does the 'realworld' example of military escalation illustrate the sunk-cost fallacy?", "options": [{"text": "It shows how military leaders often fail to secure sufficient funding for long-term operations.", "isCorrect": false, "rationale": "The example focuses on past sacrifices influencing future decisions, not insufficient funding."}, {"text": "It demonstrates how past sacrifices of soldiers are used as a reason to prolong wars, creating a cycle of further commitment.", "isCorrect": true, "rationale": "The text states, 'The reasoning “We have already lost so many soldiers; we cannot let their sacrifice be in vain” has prolonged wars... Each additional sacrifice becomes a reason for the next, creating a tragic loop where sunk costs generate more sunk costs.' This is a direct explanation."}, {"text": "It highlights the difficulty in accurately assessing enemy capabilities during prolonged conflicts.", "isCorrect": false, "rationale": "While military conflicts involve assessing enemy capabilities, this is not the specific point made about the sunk-cost fallacy in the example provided."}, {"text": "It suggests that political considerations always outweigh military objectives in wartime decisions.", "isCorrect": false, "rationale": "The text mentions 'rational military objective' but the core of the example is about past sacrifices (sunk costs) driving future commitment, not simply political considerations broadly."}], "id": "q09"}, {"question": "When did the systematic study of the sunk-cost fallacy as a psychological phenomenon gain significant momentum?", "options": [{"text": "Since the 19th century, when economists first understood the concept of sunk costs.", "isCorrect": false, "rationale": "The text clarifies that the *concept* of sunk costs was understood in economics since the 19th century, but the *systematic study of the sunk-cost fallacy as a psychological phenomenon* accelerated later."}, {"text": "In the 1960s, with the rise of cognitive psychology.", "isCorrect": false, "rationale": "While cognitive psychology was developing, the text specifies a later decade for the acceleration of this particular phenomenon's study."}, {"text": "In the 1980s.", "isCorrect": true, "rationale": "The text explicitly states: 'the systematic study of the sunk-cost fallacy as a psychological phenomenon accelerated in the 1980s.'"}, {"text": "During the early 2000s, with advancements in neuroscience.", "isCorrect": false, "rationale": "The text identifies an earlier period for the acceleration of the psychological study of the sunk-cost fallacy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
