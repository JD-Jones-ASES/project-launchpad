        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is an analogy, as defined in this section?", "options": [{"text": "An argument that draws a conclusion from a large number of observed examples.", "isCorrect": false, "rationale": "Drawing conclusions from many examples is inductive generalization. An analogy compares two specific things and reasons from known similarities to an unknown one."}, {"text": "A comparison between two things that are alike in some ways, used to reason that they are probably alike in some further way.", "isCorrect": true, "rationale": "This is the section's definition. The key pattern is: A and B share properties 1, 2, 3; A has property X; therefore B probably has property X too."}, {"text": "A type of argument that uses 'All,' 'Some,' or 'No' to describe categories.", "isCorrect": false, "rationale": "Arguments using 'All,' 'Some,' or 'No' are categorical syllogisms. Analogies compare two specific things, not categories."}, {"text": "A figurative expression used to make writing more vivid.", "isCorrect": false, "rationale": "Analogies can appear in literature, but the section focuses on their role as a form of reasoning used to draw conclusions — not as a literary device."}]}, {"question": "In the New Restaurant example, what makes the reasoning an argument by analogy rather than a guaranteed conclusion?", "options": [{"text": "The two restaurants are in different locations, which automatically weakens the argument.", "isCorrect": false, "rationale": "Location difference is noted but is not the core reason the conclusion is uncertain. The analogical reasoning is probabilistic because future experience may not match past patterns."}, {"text": "Restaurant analogies are never reliable enough to reason from.", "isCorrect": false, "rationale": "The section presents this as a 'reasonable guess' — not a certain proof, but a legitimate analogy. It does not dismiss restaurant comparisons as unreliable."}, {"text": "The conclusion (that the new restaurant has a cozy atmosphere) is based on similarities, not certainty — the new place might be huge and noisy.", "isCorrect": true, "rationale": "The section states: 'Is this guaranteed? Nope. The new place might be huge and noisy. But it's a reasonable guess based on the similarities.' Analogies give probable, not certain, conclusions."}, {"text": "The argument uses more than three premises, which makes it an induction rather than an analogy.", "isCorrect": false, "rationale": "The number of shared properties does not convert an analogy into a different argument type. The structure — two things compared — makes it an analogy regardless of how many similarities are cited."}]}, {"question": "What is a 'relevant similarity' in the context of evaluating an analogy?", "options": [{"text": "Any feature the two things share, regardless of whether it connects to the conclusion.", "isCorrect": false, "rationale": "This describes any similarity, relevant or irrelevant. The section distinguishes: a relevant similarity actually matters for the conclusion being drawn."}, {"text": "A shared feature that actually matters for the conclusion being drawn.", "isCorrect": true, "rationale": "The section defines it as: 'a way in which two things are alike that actually matters for the conclusion being drawn.' Irrelevant similarities (like both having schedules) don't strengthen the analogy."}, {"text": "A similarity that two things share for historical or cultural reasons.", "isCorrect": false, "rationale": "Historical or cultural origin has no bearing on whether a similarity is relevant. Relevance is determined by whether the similarity logically connects to the conclusion."}, {"text": "The single most important way two things are alike.", "isCorrect": false, "rationale": "There can be multiple relevant similarities, and none is necessarily the 'single most important.' The concept describes any shared feature that bears on the conclusion."}]}, {"question": "According to the section's evaluation of the 'School Is Like a Factory' analogy, why is this analogy considered weak?", "options": [{"text": "Because schools and factories share no similarities at all.", "isCorrect": false, "rationale": "The section acknowledges real similarities: both have schedules, authority figures, and rules. The weakness is not a lack of similarities but that the similarities are superficial for the specific conclusion drawn."}, {"text": "Because the shared features (schedules, rules, authority figures) are superficial and do not support the conclusion that schools 'produce products.'", "isCorrect": true, "rationale": "The section's verdict: 'The similarities are superficial — they don't connect to what schools actually do.' Factories make identical items on an assembly line; schools help unique individuals grow — a key relevant difference."}, {"text": "Because factories are a negative concept, making the analogy unfair to schools.", "isCorrect": false, "rationale": "The evaluation is logical, not emotional. The analogy is weak because the relevant differences undermine the conclusion, not because factories are viewed negatively."}, {"text": "Because the analogy uses too many similarities, making it an inductive generalization instead.", "isCorrect": false, "rationale": "The number of similarities does not change the argument type. The school-factory comparison remains an analogy, and the problem is the irrelevance of those similarities to the conclusion."}]}, {"question": "The section's checklist for evaluating analogies asks three questions. Which of the following is ONE of those three questions?", "options": [{"text": "Is the analogy used in a formal or informal setting?", "isCorrect": false, "rationale": "The checklist does not ask about the setting. The three questions concern relevant similarities, important differences, and boldness of the conclusion."}, {"text": "Are there important differences that matter to the conclusion?", "isCorrect": true, "rationale": "This is the second checklist question. Big differences in areas relevant to the conclusion weaken the analogy, even if many similarities also exist."}, {"text": "Was the analogy used by a credible source?", "isCorrect": false, "rationale": "Source credibility is an appeal to authority, not part of evaluating the internal logical strength of an analogy. The checklist focuses on the content of the comparison."}, {"text": "Does the analogy use emotional language?", "isCorrect": false, "rationale": "Emotional language relates to loaded language from Chapter 2. The analogy checklist focuses on the logical relationship between the compared items, not their rhetorical framing."}]}, {"question": "Why is the Video Game/Basketball analogy considered fairly strong?", "options": [{"text": "Because both basketball and video games are popular among young people.", "isCorrect": false, "rationale": "Popularity with young people is an irrelevant similarity for the conclusion about daily practice leading to improvement. Relevant similarities must connect logically to the conclusion."}, {"text": "Because the similarities (practice, rules, improvement over time) are genuinely relevant to the conclusion about daily practice improving performance.", "isCorrect": true, "rationale": "The section states: 'The similarities... are genuinely relevant to the conclusion about daily practice leading to improvement.' The main difference (physical vs. digital) does not undermine the specific point about consistent practice."}, {"text": "Because there are no important differences between basketball and video games.", "isCorrect": false, "rationale": "The section explicitly notes one difference: one is physical, one is digital. But this difference does not undermine the conclusion about consistent practice — so the analogy remains strong."}, {"text": "Because basketball and video games are both forms of entertainment.", "isCorrect": false, "rationale": "Being forms of entertainment is a shared feature, but it is not relevant to the specific conclusion about how daily practice leads to improvement."}]}, {"question": "According to the Logic Legend box, what kind of reasoning did Sherlock Holmes ACTUALLY use most often, despite claiming to use 'deduction'?", "options": [{"text": "Deduction — reasoning from universal rules to specific cases.", "isCorrect": false, "rationale": "The section argues that Holmes' methods were more inductive and analogical than truly deductive. He reasoned from observed patterns (clues) to probable conclusions."}, {"text": "Induction and analogy — reasoning from past patterns and comparing new cases to previous ones.", "isCorrect": true, "rationale": "The section states: 'Holmes claimed to use \"deduction,\" but much of what he actually did was induction and analogy.' He inferred from clues (induction) and compared new scenes to past cases (analogy)."}, {"text": "Formal syllogistic reasoning — using 'All,' 'Some,' and 'No' statements.", "isCorrect": false, "rationale": "Syllogistic reasoning is not described as Holmes' method in the section. His reasoning is characterized as inductive and analogical."}, {"text": "Pure observation without any inference — he only described what he saw.", "isCorrect": false, "rationale": "Holmes actively inferred conclusions from observations. The section specifically describes his reasoning as moving from clues to conclusions through patterns and analogies."}]}, {"question": "The checklist states: 'How bold is the conclusion? A modest conclusion needs less support than a sweeping one.' What does this mean for evaluating analogies?", "options": [{"text": "A stronger analogy is one that makes the most extreme possible claim.", "isCorrect": false, "rationale": "The checklist advises caution with bold conclusions, not a preference for extreme claims. A sweeping conclusion requires more and stronger relevant similarities."}, {"text": "An analogy that says 'it might' need only weak similarities to support it, while an analogy that says 'it definitely' requires much stronger relevant similarities.", "isCorrect": true, "rationale": "This is the principle: the bolder the claim, the more support is required. A tentative conclusion ('probably') can be supported by fewer strong similarities than a certain claim ('definitely will')."}, {"text": "Modest conclusions are never appropriate in formal logic.", "isCorrect": false, "rationale": "Modesty in conclusions is often appropriate — especially in analogical reasoning, which yields probability rather than certainty. Hedged conclusions are intellectually honest."}, {"text": "The boldness of a conclusion is irrelevant to how strong the analogy needs to be.", "isCorrect": false, "rationale": "The checklist explicitly makes boldness relevant: 'A modest conclusion needs less support than a sweeping one.' The required strength of an analogy scales with the confidence of the conclusion."}]}, {"question": "What does the 'Think About It' box ask students to consider regarding car advertisements?", "options": [{"text": "Whether cars are actually as fast as cheetahs.", "isCorrect": false, "rationale": "The exercise is about evaluating the analogy's logical structure, not verifying the literal truth of the speed comparison."}, {"text": "What relevant similarities the car-cheetah analogy highlights and what important differences it hides.", "isCorrect": true, "rationale": "The section asks: 'What relevant similarities does this analogy highlight? What important differences does it hide?' This applies the analogy evaluation checklist to advertising."}, {"text": "Whether cheetahs are better symbols than other animals for car ads.", "isCorrect": false, "rationale": "The exercise is not about advertising effectiveness or animal symbolism. It is about identifying which similarities are relevant and which differences are concealed."}, {"text": "How to write a counter-analogy comparing the car to a different animal.", "isCorrect": false, "rationale": "Writing counter-analogies is not the task. The exercise asks students to analyze the existing car-cheetah analogy using the relevant similarities framework."}]}, {"question": "What is the key lesson the section draws from the Logic Legend about Sherlock Holmes?", "options": [{"text": "Fictional detectives are not good role models for real-world logical thinking.", "isCorrect": false, "rationale": "The section uses Holmes positively. The lesson is that even a brilliant fictional thinker used the same reasoning skills students are learning."}, {"text": "Even the world's greatest fictional detective used induction and analogy — the same reasoning skills covered in this course — until they became second nature.", "isCorrect": true, "rationale": "The section states: 'Even the world's greatest fictional detective relied on the same kinds of reasoning you're learning right now. The difference is that Holmes practiced until these thinking skills became second nature.'"}, {"text": "Deduction is superior to induction and analogy because Holmes was famous for it.", "isCorrect": false, "rationale": "The section argues that Holmes actually used induction and analogy more than deduction. It does not rank one method as superior."}, {"text": "Crime-solving requires special reasoning abilities that cannot be learned in school.", "isCorrect": false, "rationale": "The section makes the opposite point: the reasoning Holmes used is exactly what students are learning. Practice makes these skills natural."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
