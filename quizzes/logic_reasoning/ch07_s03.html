    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'correlation' according to the text?", "options": [{"text": "One event directly causes another event.", "isCorrect": false, "rationale": "This describes causation, not correlation. Correlation simply means two things tend to happen together without necessarily one causing the other."}, {"text": "Two things tend to happen together, where one goes up as the other goes up or down.", "isCorrect": true, "rationale": "The text defines correlation as existing 'when two things tend to happen together — when one goes up, the other goes up (or down).'"}, {"text": "A hidden factor that influences two related things.", "isCorrect": false, "rationale": "This describes a confounding variable, not correlation itself."}, {"text": "The mistake of thinking that because event B happened after event A, A caused B.", "isCorrect": false, "rationale": "This describes the post hoc fallacy, not correlation."}], "id": "q01"}, {"question": "In the example 'A study finds that students who wear expensive sneakers tend to get higher grades,' what is identified as the likely confounding variable?", "options": [{"text": "The brand of sneakers worn by the students.", "isCorrect": false, "rationale": "The brand of sneakers is part of the observed correlation, not the hidden factor influencing both."}, {"text": "The students' natural intelligence.", "isCorrect": false, "rationale": "While a possible factor in grades, the text specifically identifies a different confounding variable in its example."}, {"text": "The amount of time students spend studying.", "isCorrect": false, "rationale": "While a possible factor in grades, the text specifically identifies a different confounding variable in its example."}, {"text": "Family income.", "isCorrect": true, "rationale": "The text explicitly states: 'The confounding variable is likely family income. Families with more money can afford both expensive sneakers and resources that help with school (tutors, books, a quiet place to study).'"}], "id": "q02"}, {"question": "A basketball player believes that every time she eats a banana before a game, her team wins. She concludes that eating bananas causes her team to win. This reasoning is an example of what?", "options": [{"text": "A controlled experiment.", "isCorrect": false, "rationale": "This is an observation, not a controlled experiment, as no variables are systematically manipulated or controlled."}, {"text": "A confounding variable.", "isCorrect": false, "rationale": "While other factors might contribute to wins, the *reasoning* described here—assuming causation simply because one event followed another—is the fallacy."}, {"text": "The post hoc fallacy.", "isCorrect": true, "rationale": "The player is assuming that because eating the banana (event A) happened before the win (event B), event A must have caused event B, which is the definition of the post hoc fallacy ('after this, therefore because of this')."}, {"text": "Establishing a causal mechanism.", "isCorrect": false, "rationale": "No plausible mechanism explaining how bananas cause team wins is provided; the conclusion is based purely on sequence."}], "id": "q03"}, {"question": "The text states, 'The biggest misconception is that correlation never means causation.' What does this imply about the relationship between correlation and causation?", "options": [{"text": "All correlations are actually coincidences and have no underlying connection.", "isCorrect": false, "rationale": "The text states that 'sometimes correlated things are causally connected,' which contradicts the idea that all correlations are just coincidences."}, {"text": "While correlation doesn't *prove* causation, some correlated things *are* causally connected.", "isCorrect": true, "rationale": "The 'Common Misconceptions' note clarifies, 'sometimes correlated things are causally connected — the point is that correlation alone doesn't prove it.'"}, {"text": "Causation can always be inferred directly from a strong correlation.", "isCorrect": false, "rationale": "This directly contradicts the key rule: 'Correlation does not equal causation.' A strong correlation merely suggests a relationship, not necessarily a causal one."}, {"text": "If two things are correlated, it's impossible for one to cause the other.", "isCorrect": false, "rationale": "This is an absolute statement that the text explicitly corrects. Correlation does not prove causation, but it doesn't rule it out either."}], "id": "q04"}, {"question": "According to the section, which of the following is a key strategy scientists use to establish causation?", "options": [{"text": "Assuming that if event B always follows event A, then A causes B.", "isCorrect": false, "rationale": "This is the definition of the post hoc fallacy, which the text explicitly warns against as a logical error in determining causation."}, {"text": "Identifying a plausible mechanism that explains how one event could lead to another.", "isCorrect": true, "rationale": "The text lists 'Look for a mechanism' as one of the strategies to establish causation, noting that a plausible explanation strengthens the causal claim."}, {"text": "Focusing solely on observing strong correlations between events.", "isCorrect": false, "rationale": "The text explicitly states that 'correlation isn't enough' to establish causation and that 'correlation does not equal causation.'"}, {"text": "Relying on anecdotal evidence and personal testimonies.", "isCorrect": false, "rationale": "While anecdotes might spark observation, scientific methods to establish causation require systematic testing and evidence beyond personal stories."}], "id": "q05"}, {"question": "A local news report shows that cities with more parks also have lower crime rates. The reporter concludes that building more parks directly causes a reduction in crime. What critical element is the reporter likely overlooking, according0 to the principles discussed in the text?", "options": [{"text": "The need for replication in other cities.", "isCorrect": false, "rationale": "While replication is important for strengthening causal claims, the most immediate oversight when inferring direct causation from correlation is the presence of other factors."}, {"text": "The possibility of a confounding variable like city wealth or community engagement.", "isCorrect": true, "rationale": "The reporter is inferring causation from correlation without considering hidden factors. Wealthier cities, for example, might be able to afford more parks AND have more resources for crime reduction programs, making wealth a confounding variable."}, {"text": "The fact that correlation can never indicate causation.", "isCorrect": false, "rationale": "The text clarifies that correlation doesn't *prove* causation, but correlated things *can* sometimes be causally connected. The reporter's main error is assuming direct causation without investigation, not overlooking an absolute rule."}, {"text": "The exact definition of a 'park.'", "isCorrect": false, "rationale": "While clarity in definitions is generally good, it's not the primary logical flaw in concluding causation from a correlation in this context."}], "id": "q06"}, {"question": "The 'How Scientists Use Induction' spotlight describes a cycle. What is the typical sequence of steps in this inductive scientific process?", "options": [{"text": "Generalize, Observe, Revise, Test.", "isCorrect": false, "rationale": "This order is incorrect. Observation typically comes first."}, {"text": "Test, Generalize, Observe, Revise.", "isCorrect": false, "rationale": "This order is incorrect. Observation typically comes first, and testing usually follows generalization."}, {"text": "Observe, Generalize, Test, Revise.", "isCorrect": true, "rationale": "The text explicitly states this sequence: 'Observe a pattern... Generalize inductively... Test the generalization with experiments... Revise if needed.'"}, {"text": "Revise, Test, Observe, Generalize.", "isCorrect": false, "rationale": "This order is incorrect. Revision occurs after testing, and observation initiates the cycle."}], "id": "q07"}, {"question": "To definitively determine if listening to music *causes* improved study habits, as opposed to merely being correlated, what would be the most effective approach based on the text's guidance?", "options": [{"text": "Ask students who get good grades if they listen to music while studying.", "isCorrect": false, "rationale": "This is an observational method that would only reveal a correlation, not causation, as noted in the 'Does Music Help You Study?' example."}, {"text": "Conduct a controlled experiment where one group studies with music and another studies without, keeping other factors constant.", "isCorrect": true, "rationale": "The text explicitly states: 'How would you test it? You'd need a controlled experiment: have some students study with music and others study without, keep everything else the same, and compare the results.' This is the strongest method for establishing causation."}, {"text": "Observe if successful musicians tend to be good students.", "isCorrect": false, "rationale": "This is an observational approach that would only show a correlation and be prone to many confounding variables."}, {"text": "Interview students about their personal preferences for studying with or without music.", "isCorrect": false, "rationale": "Interviews would provide subjective opinions and preferences, not objective evidence of causation regarding study effectiveness."}], "id": "q08"}, {"question": "When the text mentions that 'in science, a theory is a generalization that has survived enormous amounts of testing,' what is it trying to convey about scientific theories?", "options": [{"text": "Scientific theories are simply educated guesses that are yet to be proven.", "isCorrect": false, "rationale": "The text directly refutes this common misconception, stating that a theory is 'the strongest kind of inductive conclusion there is' after extensive testing."}, {"text": "Theories represent the strongest form of inductive conclusion, backed by substantial evidence, though not 100% certain.", "isCorrect": true, "rationale": "The text states scientists 'can never be 100% certain' but that a theory is 'the strongest kind of inductive conclusion there is,' indicating it's well-supported but open to revision."}, {"text": "Theories are fixed, unchanging facts that are beyond any further revision or testing.", "isCorrect": false, "rationale": "The text mentions 'Revise if needed,' indicating theories are not absolutely fixed and can be refined with new evidence."}, {"text": "The term 'theory' implies a lack of practical application in scientific understanding.", "isCorrect": false, "rationale": "The text emphasizes that theories are fundamental to scientific understanding and are 'well-supported' explanations, which implies practical application and explanatory power."}], "id": "q09"}, {"question": "Consider the claim: 'People who eat organic food live longer.' To critically evaluate this claim for causation, which of the following questions is *least* relevant according to the section's advice?", "options": [{"text": "Is there a plausible biological mechanism by which organic food extends lifespan?", "isCorrect": false, "rationale": "This is highly relevant. The text advises to 'Look for a mechanism' to establish causation, as a plausible 'how' strengthens the claim."}, {"text": "Have controlled experiments been conducted comparing organic vs. non-organic diets on lifespan, controlling for other lifestyle factors?", "isCorrect": false, "rationale": "This is highly relevant. The text highlights 'Controlled experiments' as a key strategy to establish causation, isolating the variable of interest."}, {"text": "Could there be confounding variables, such as overall healthier lifestyles or higher income among organic food consumers?", "isCorrect": false, "rationale": "This is highly relevant. The text stresses the importance of asking 'Could there be a confounding variable?' and to 'Rule out confounding variables' when assessing causation."}, {"text": "Does an authoritative celebrity endorse organic food for longevity?", "isCorrect": true, "rationale": "Celebrity endorsement, regardless of authority, is not a scientific method or a critical thinking strategy mentioned in the text for establishing causation. It relies on appeal to authority rather than evidence."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
