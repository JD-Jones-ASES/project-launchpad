    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which characteristic best defines the 'Weak Evidence Fallacies — Jumping to Conclusions' group, as described in the text?", "options": [{"text": "They rely on irrelevant information to distract the audience.", "isCorrect": false, "rationale": "This describes fallacies that win by being irrelevant, not weak evidence fallacies, which focus on insufficient evidence."}, {"text": "They manipulate emotions to persuade rather than using logic.", "isCorrect": false, "rationale": "This describes fallacies that mess with emotions, not weak evidence fallacies, which present weak logical evidence."}, {"text": "They offer evidence that sounds logical but is insufficient to support the conclusion.", "isCorrect": true, "rationale": "The text states these fallacies 'offer “evidence” that sounds logical but is actually way too weak to support the conclusion,' and 'take a tiny piece of evidence and stretch it way too far.'"}, {"text": "They attack the character of the person making the argument instead of the argument itself.", "isCorrect": false, "rationale": "This describes ad hominem fallacies, which are not covered in this section and are not characterized by weak evidence."}]}, {"question": "A local coffee shop starts playing classical music. The following week, their sales increase by 15%. The owner concludes, 'Our new classical music playlist is definitely making customers buy more coffee!' Which fallacy is the owner committing?", "options": [{"text": "Slippery Slope", "isCorrect": false, "rationale": "Slippery Slope involves predicting a chain of extreme consequences, which is not present here."}, {"text": "Hasty Generalization", "isCorrect": false, "rationale": "Hasty Generalization involves making a broad conclusion from too few examples about a group or type, not about a cause-effect relationship between two events."}, {"text": "False Dilemma", "isCorrect": false, "rationale": "False Dilemma presents only two options when more exist, which is not the issue in this scenario."}, {"text": "False Cause (Post Hoc)", "isCorrect": true, "rationale": "The owner assumes that because the classical music started playing *before* the sales increase, the music *caused* the increase, without considering other possible factors. This is the definition of a False Cause fallacy."}]}, {"question": "A student exclaims, 'Every time I forget my umbrella, it rains! My forgetfulness must be causing the rain!' Which of the following best explains why this statement is a False Cause fallacy?", "options": [{"text": "The student is generalizing from a single instance.", "isCorrect": false, "rationale": "While the evidence might be limited, the core error is attributing causality based solely on sequence, not making a general rule about a group from too few examples."}, {"text": "There are likely many other factors influencing the weather besides the student's memory.", "isCorrect": true, "rationale": "The fallacy lies in assuming a direct causal link between two events (forgetting an umbrella and rain) simply because one happened before the other, ignoring countless other meteorological factors. This aligns with the text's explanation of 'What went wrong?' in False Cause examples."}, {"text": "The student is presenting only two options: either they cause the rain or they don't.", "isCorrect": false, "rationale": "This describes a False Dilemma, which is not the primary error in the student's reasoning about causation."}, {"text": "The student is predicting an inevitable chain of extreme consequences.", "isCorrect": false, "rationale": "This describes a Slippery Slope fallacy, which is not what the student is doing here."}]}, {"question": "An activist argues, 'If we allow even a single small tax increase, next the government will confiscate all our income, leading to complete economic collapse and widespread poverty!' What fallacy is most clearly demonstrated in this argument?", "options": [{"text": "Hasty Generalization", "isCorrect": false, "rationale": "Hasty generalization involves drawing a broad conclusion from insufficient examples, not predicting a chain of future events."}, {"text": "False Cause", "isCorrect": false, "rationale": "False Cause assumes one event caused another because it happened first; this argument is about a future chain of events, not a past cause."}, {"text": "False Dilemma", "isCorrect": false, "rationale": "False Dilemma presents only two choices, while this argument focuses on a sequence of consequences."}, {"text": "Slippery Slope", "isCorrect": true, "rationale": "The argument suggests that one small action (a small tax increase) will inevitably lead to a chain of increasingly extreme and negative consequences (confiscating all income, economic collapse), without providing sufficient evidence for each step. This is the definition of a Slippery Slope fallacy."}]}, {"question": "A politician states, 'If we implement this new regulation to limit plastic straw use, it will create a precedent for government overreach, leading to restrictions on all consumer choices, and eventually our personal freedoms will be completely eroded.' For this to be considered a *fallacy*, what must be true about the politician's argument?", "options": [{"text": "The politician failed to offer any alternative solutions.", "isCorrect": false, "rationale": "Failing to offer alternatives relates more to problem-solving or completeness, not directly to the logical structure of a slippery slope fallacy."}, {"text": "The politician cited only one example of government overreach.", "isCorrect": false, "rationale": "Citing one example for a general rule would be Hasty Generalization, but this argument is about a chain of future events."}, {"text": "The politician did not adequately demonstrate why each step in the chain of consequences is likely to occur.", "isCorrect": true, "rationale": "The text explains that a slippery slope is a fallacy 'when someone exaggerates the chain of events or doesn't explain why each step would actually happen.' If the steps are not connected by real evidence, it's a fallacy."}, {"text": "The politician incorrectly assumed that the first event caused the last event directly.", "isCorrect": false, "rationale": "This describes a False Cause fallacy. A Slippery Slope fallacy is about an *inevitable chain* of events, not a direct single cause."}]}, {"question": "After visiting one restaurant in Paris, a tourist declares, 'Parisian food is terrible!' Which fallacy is the tourist committing?", "options": [{"text": "False Dilemma", "isCorrect": false, "rationale": "The tourist is not being forced to choose between only two options."}, {"text": "False Cause", "isCorrect": false, "rationale": "The tourist is not attributing a cause-effect relationship between two sequential events."}, {"text": "Slippery Slope", "isCorrect": false, "rationale": "The tourist is not predicting a chain of extreme consequences."}, {"text": "Hasty Generalization", "isCorrect": true, "rationale": "The tourist is making a broad conclusion about all Parisian food based on a single, insufficient example. This perfectly matches the definition of Hasty Generalization ('makes a broad conclusion from too few examples')."}]}, {"question": "Which of the following scenarios primarily demonstrates a **Hasty Generalization** rather than a **False Cause** fallacy?", "options": [{"text": "A student wears their lucky sweater on exam day and passes. They conclude, 'This sweater makes me pass exams!'", "isCorrect": false, "rationale": "This is a False Cause fallacy because it assumes a causal link between wearing the sweater and passing, based on sequence (wearing before passing)."}, {"text": "A new traffic light is installed at an intersection. The next month, accidents decrease. A resident says, 'The traffic light fixed all the accident problems.'", "isCorrect": false, "rationale": "This is a False Cause fallacy, as it attributes the decrease in accidents solely to the traffic light based on its prior installation, without considering other factors."}, {"text": "A traveler encounters one unfriendly person in a new city and later tells friends, 'Everyone in that city is rude.'", "isCorrect": true, "rationale": "This is a Hasty Generalization because the traveler is making a broad, universal claim about *everyone* in a city based on a single, insufficient example of an unfriendly person. It's generalizing about a group, not establishing a cause-effect relationship."}, {"text": "A child believes that turning off the lights makes the television stop working, because their parent always turns off the lights before bed when the TV is on.", "isCorrect": false, "rationale": "This is a False Cause fallacy, as the child is attributing causality (lights off *causes* TV off) based on observed sequence."}]}, {"question": "A parent tells their child, 'Either you get straight A's this semester, or you'll never get into a good college and ruin your future.' What fallacy is the parent using?", "options": [{"text": "Slippery Slope", "isCorrect": false, "rationale": "While there's an element of negative consequences, the primary error is presenting only two extreme choices rather than an escalating chain."}, {"text": "Hasty Generalization", "isCorrect": false, "rationale": "There is no generalization being made from too few examples here."}, {"text": "False Cause", "isCorrect": false, "rationale": "There is no assumption of a causal link based on sequence."}, {"text": "False Dilemma", "isCorrect": true, "rationale": "The parent presents only two extreme options (straight A's or ruined future), ignoring many other possibilities (e.g., getting B's, attending a good but not 'top-tier' college, different career paths). This is the definition of a False Dilemma."}]}, {"question": "Imagine a student group is debating the school's new uniform policy. One student argues, 'If we don't support the uniform policy, then we're clearly against school spirit and don't care about our community.' What is the underlying flaw in this student's argument, according to the principles of weak evidence fallacies?", "options": [{"text": "It exaggerates the potential negative outcomes of not supporting the policy.", "isCorrect": false, "rationale": "While exaggeration might be present, the core flaw is not a chain of events but limiting choices, which points to a False Dilemma."}, {"text": "It makes a broad generalization about all students based on a few examples.", "isCorrect": false, "rationale": "The argument is not generalizing about all students from a small sample."}, {"text": "It assumes a causal relationship between not supporting the policy and a lack of school spirit.", "isCorrect": false, "rationale": "While a connection is implied, the fundamental trick is forcing an 'either/or' choice, not just a cause-effect assumption. It's not saying 'not supporting *causes* lack of spirit' but 'not supporting *is equivalent to* lack of spirit' by excluding alternatives."}, {"text": "It presents only two options when other reasons for not supporting the policy might exist.", "isCorrect": true, "rationale": "The student is creating a False Dilemma by stating that if you don't support the policy, you must be against school spirit. There could be many reasons to not support the policy that don't imply a lack of school spirit or care for the community (e.g., concerns about cost, comfort, personal expression)."}]}, {"question": "A city council member proposes banning all sugary drinks in public parks, arguing: 'First, people will stop buying sugary drinks in parks, then they'll stop buying them elsewhere, which will lead to a complete ban on all unhealthy foods, and eventually the government will control every aspect of our diets.' What type of fallacy is the council member committing, and why?", "options": [{"text": "Hasty Generalization, because they are generalizing about people's eating habits from a single proposed ban.", "isCorrect": false, "rationale": "The argument is not generalizing from a sample; it's predicting future consequences."}, {"text": "False Cause, because they are assuming the ban will directly cause a change in diet everywhere else.", "isCorrect": false, "rationale": "While there's an assumption of influence, the primary error is the *chain* of extreme, unsupported consequences, not just a single cause-effect link."}, {"text": "Slippery Slope, because they are asserting an unsupported chain of increasingly extreme consequences from a single action.", "isCorrect": true, "rationale": "The council member is arguing that a small initial action (banning sugary drinks in parks) will inevitably lead to a drastic, unsupported chain of events (bans everywhere, then all unhealthy foods, then complete government control over diets). This is the hallmark of a Slippery Slope fallacy."}, {"text": "False Dilemma, because they are presenting only two choices: either ban sugary drinks or allow government control of diets.", "isCorrect": false, "rationale": "The argument does not present an 'either/or' choice; it presents a supposed inevitable sequence of events."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
