        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 2, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic of ambiguity?", "options": [{"text": "It involves intentionally misleading someone through false statements.", "isCorrect": false, "rationale": "While ambiguity can lead to misunderstanding, the text emphasizes that it is usually accidental, not a deliberate attempt to lie or mislead."}, {"text": "It occurs when a word, phrase, or sentence has more than one possible meaning.", "isCorrect": true, "rationale": "This aligns directly with the definition provided in the text: 'Ambiguity occurs when a word, phrase, or sentence has more than one possible meaning. An ambiguous statement can be understood in two or more different ways.'"}, {"text": "It refers to a lack of complete information, making it impossible to form an opinion.", "isCorrect": false, "rationale": "Ambiguity is about multiple interpretations, not necessarily a complete lack of information that prevents any opinion. It's about *which* opinion is correct among several possibilities."}, {"text": "It describes words that are difficult to pronounce or understand due to their complexity.", "isCorrect": false, "rationale": "Ambiguity is about multiple meanings, not necessarily difficulty in pronunciation or inherent complexity of individual words."}]}, {"question": "According to the 'Common Misconceptions' note, what is a key distinction between ambiguity and lying?", "options": [{"text": "Lying only happens in spoken language, while ambiguity is exclusive to written text.", "isCorrect": false, "rationale": "Both lying and ambiguity can occur in both spoken and written communication."}, {"text": "Ambiguity is typically accidental, whereas lying is usually intentional deception.", "isCorrect": true, "rationale": "The text explicitly states: 'Students often think ambiguity is the same as lying. Emphasize that ambiguity is usually accidental — the speaker doesn't realize their words could mean two things.'"}, {"text": "Lying weakens an argument, but ambiguity can strengthen it by adding depth.", "isCorrect": false, "rationale": "The text clearly states that ambiguity 'can actually wreck an argument' and 'derails arguments' rather than strengthening them."}, {"text": "Ambiguity involves a shift in meaning, while lying involves a shift in facts.", "isCorrect": false, "rationale": "While lying involves distorting facts, the core distinction highlighted in the text is the intent behind the communication, not just the type of 'shift'."}]}, {"question": "Which of the following sentences most clearly demonstrates lexical ambiguity?", "options": [{"text": "The swift runner finished the race in record time.", "isCorrect": false, "rationale": "This sentence is clear and contains no words with multiple meanings that create confusion in this context."}, {"text": "She decided to *bank* her savings instead of spending them.", "isCorrect": true, "rationale": "The word 'bank' here has two common meanings (financial institution or river's edge). While the context ('savings') clarifies it, the word itself is capable of causing confusion without context, exemplifying lexical ambiguity."}, {"text": "He quickly jumped over the tall fence.", "isCorrect": false, "rationale": "This sentence is clear and contains no words with multiple meanings that create confusion in this context."}, {"text": "The old house stood silently on the hill.", "isCorrect": false, "rationale": "This sentence is clear and contains no words with multiple meanings that create confusion in this context."}]}, {"question": "According to the section, how does context primarily function in relation to ambiguous words?", "options": [{"text": "It always eliminates all possible multiple meanings, making the statement perfectly clear.", "isCorrect": false, "rationale": "The text states, 'But sometimes context doesn't help, and that's when things get messy,' indicating context doesn't *always* eliminate all ambiguity."}, {"text": "It provides additional words and ideas that help determine the intended meaning.", "isCorrect": true, "rationale": "The text explains, 'Most of the time, you can figure out which meaning someone intended from the context — the other words and ideas around it.'"}, {"text": "It introduces more layers of ambiguity to a statement by adding irrelevant details.", "isCorrect": false, "rationale": "Context is described as a tool for clarification, not for adding more confusion."}, {"text": "It identifies the speaker's emotional state, which is crucial for understanding ambiguous statements.", "isCorrect": false, "rationale": "While emotional state can sometimes influence communication, the text defines context specifically as 'the other words and ideas around it' for resolving ambiguity, not primarily emotional cues."}]}, {"question": "In the 'Argument Gone Wrong' example ('Nothing is better than pizza. A soggy sandwich is better than nothing. Conclusion: A soggy sandwich is better than pizza.'), what is the fundamental flaw?", "options": [{"text": "The premises are factually incorrect about universal food preferences.", "isCorrect": false, "rationale": "The argument's flaw is logical, not necessarily about the factual accuracy of subjective food preferences. The problem exists even if one *could* argue the premises are factually correct for some people."}, {"text": "The word 'nothing' is used with different meanings in each premise, breaking the logical connection.", "isCorrect": true, "rationale": "The text explicitly states: 'The trick is that “nothing” means two different things. In Premise 1, it means “no food surpasses pizza.” In Premise 2, it means “having zero food.” Because “nothing” shifts its meaning, the conclusion doesn't actually follow.'"}, {"text": "The conclusion introduces a new, unrelated concept not mentioned in the premises.", "isCorrect": false, "rationale": "The conclusion directly uses terms from the premises ('soggy sandwich,' 'pizza,' 'better than'). The issue is the inconsistent meaning of a linking term."}, {"text": "It uses overly complex vocabulary that is difficult for the average reader to understand.", "isCorrect": false, "rationale": "The words used ('nothing,' 'better,' 'pizza,' 'sandwich') are very common and simple, so vocabulary complexity is not the issue."}]}, {"question": "A student is evaluating an argument where the term 'freedom' is used in the first premise to mean 'political liberty' and in the second premise to mean 'absence of responsibility.' According to 'The Ambiguity Check,' what should the student conclude?", "options": [{"text": "The argument is strong because it explores multiple valid aspects of 'freedom.'", "isCorrect": false, "rationale": "The Ambiguity Check states that if an important word shifts meaning between premises or premise and conclusion, the argument is flawed, regardless of how many aspects it explores."}, {"text": "The argument is valid as long as both definitions of 'freedom' are universally accepted.", "isCorrect": false, "rationale": "Universal acceptance of multiple definitions does not negate the flaw caused by using different meanings within the same argument's logical structure."}, {"text": "The argument is flawed because a key word's meaning shifts, undermining its logical coherence.", "isCorrect": true, "rationale": "This directly applies the 'Ambiguity Check' rule: 'If an important word is used with one meaning in the premises and a different meaning in the conclusion, the argument is flawed — no matter how convincing it sounds.'"}, {"text": "The argument is only flawed if 'freedom' is not a universally understood term by the audience.", "isCorrect": false, "rationale": "The flaw is in the inconsistent use of the word *within* the argument, not the general understanding of the word outside of it."}]}, {"question": "Which of the following sentences is an example of syntactic (structural) ambiguity?", "options": [{"text": "The patient waited calmly for the doctor to arrive.", "isCorrect": false, "rationale": "This sentence is clear. 'Patient' functions as a noun, and 'calmly' modifies 'waited'. There's no structural confusion."}, {"text": "I spotted the student with the red backpack.", "isCorrect": true, "rationale": "This sentence is syntactically ambiguous. It could mean 'I spotted the student who was carrying a red backpack' (the student has the backpack) or 'I used a red backpack to spot the student' (I used the backpack as an instrument for spotting)."}, {"text": "He purchased a new book from the local bookstore.", "isCorrect": false, "rationale": "This sentence is clear and does not present multiple meanings due to its structure."}, {"text": "She learned how to play the guitar proficiently.", "isCorrect": false, "rationale": "This sentence is clear and does not present multiple meanings due to its structure."}]}, {"question": "An advertisement states, 'Our new beverage is *pure* enjoyment.' Which of the following best explains how this statement might use ambiguity to influence consumers?", "options": [{"text": "The ad claims the drink provides 'enjoyment,' which is a subjective experience and not a measurable fact.", "isCorrect": false, "rationale": "While 'enjoyment' is subjective, the core ambiguity here lies in the word 'pure,' not just the subjectivity of 'enjoyment' itself."}, {"text": "The word 'pure' could refer to its natural ingredients, its unadulterated quality, or simply imply complete satisfaction, making the claim seem stronger than it is.", "isCorrect": true, "rationale": "Similar to the 'part of a complete breakfast' example, 'pure' has multiple positive connotations (natural, unmixed, absolute) that the advertiser can leverage without committing to a single verifiable meaning, making the claim sound better due to ambiguity."}, {"text": "The advertisement does not specify the price of the beverage, which is essential information.", "isCorrect": false, "rationale": "The omission of price is not an example of ambiguity in the language used in the claim 'pure enjoyment'."}, {"text": "The statement is too short to provide sufficient information about the product's benefits.", "isCorrect": false, "rationale": "Brevity itself isn't the source of ambiguity; it's the multiple interpretations of the word 'pure' that create it here."}]}, {"question": "Consider the sentence: 'Visiting relatives can be annoying.' This sentence is an example of which type of ambiguity?", "options": [{"text": "Semantic ambiguity.", "isCorrect": false, "rationale": "Semantic ambiguity is a broader category. The text specifically details 'lexical' and 'syntactic' as the main types, and this example fits a more specific one."}, {"text": "Lexical ambiguity.", "isCorrect": false, "rationale": "Lexical ambiguity occurs when a single word has multiple meanings (e.g., 'bank'). Here, individual words ('visiting,' 'relatives,' 'can be,' 'annoying') are clear; the confusion comes from their arrangement."}, {"text": "Syntactic ambiguity.", "isCorrect": true, "rationale": "This sentence is syntactically ambiguous because its structure allows for two interpretations: either the act of *you* visiting your relatives is annoying, or the relatives *who are visiting you* are annoying. This is exactly what syntactic ambiguity (structural ambiguity) describes: 'when the arrangement of words in a sentence creates confusion.'"}, {"text": "Rhetorical ambiguity.", "isCorrect": false, "rationale": "Rhetorical ambiguity is not one of the types of ambiguity described in this section."}]}, {"question": "Based on the section, what is the most effective strategy for resolving ambiguity in one's own communication?", "options": [{"text": "Using more complex vocabulary to ensure a sophisticated understanding by the audience.", "isCorrect": false, "rationale": "More complex vocabulary can often introduce *more* opportunities for misunderstanding or simply make the message harder to follow, rather than resolving ambiguity."}, {"text": "Asking the audience to guess the intended meaning after the communication is delivered.", "isCorrect": false, "rationale": "This places the burden of clarification on the audience after the fact, which is reactive and less effective than proactive clear communication."}, {"text": "Rewriting the statement or sentence to make the specific intended meaning explicitly clear.", "isCorrect": true, "rationale": "The text explicitly states: 'The good news is that ambiguity is fixable. You can almost always rewrite a confusing sentence to make your meaning crystal clear. Instead of “I saw her duck,” say “I saw her pet duck” or “I saw her duck behind the desk.”'"}, {"text": "Adding disclaimers about potential misunderstandings to every ambiguous statement.", "isCorrect": false, "rationale": "While disclaimers acknowledge potential ambiguity, they do not resolve the ambiguity itself. The goal is to make the meaning clear, not just warn about its unclarity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
