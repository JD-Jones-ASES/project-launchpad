<script>
var QUESTIONS = [{"question": "In the following syllogism, what is the 'middle term'? 1. All students are learners. 2. Sarah is a student. 3. Therefore, Sarah is a learner.", "options": [{"text": "Sarah", "isCorrect": false, "rationale": "Sarah is the 'minor term' because it is the subject (first category) of the conclusion."}, {"text": "Learners", "isCorrect": false, "rationale": "Learners is the 'major term' because it is the predicate (second category) of the conclusion."}, {"text": "Student", "isCorrect": true, "rationale": "The middle term is the category that appears in both premises ('student' in premise 1 and 2) but not in the conclusion."}, {"text": "All", "isCorrect": false, "rationale": "'All' is a quantifier, not a term (category) in the syllogism."}]}, {"question": "According to the textbook, a syllogism is considered 'valid' if:", "options": [{"text": "Its conclusion is factually true, regardless of the premises.", "isCorrect": false, "rationale": "The text explicitly states: 'Reinforce that validity is about structure, not truth. A valid argument can have a false conclusion if a premise is false.'"}, {"text": "Its structure ensures that if the premises are true, the conclusion *must* be true.", "isCorrect": true, "rationale": "Validity in logic refers to the structural integrity of an argument, meaning that if the premises are accepted as true, the conclusion cannot logically be false. This is distinct from the factual truth of the statements themselves."}, {"text": "All of its premises are factually true in the real world.", "isCorrect": false, "rationale": "While true premises are desirable, the factual truth of premises is about 'soundness,' not 'validity.' A valid argument can have false premises and still be structurally valid."}, {"text": "It uses common-sense reasoning that people generally agree with.", "isCorrect": false, "rationale": "Common sense can sometimes mislead in logic. Validity is based on strict rules of inference, not general agreement or intuition, as shown by examples of invalid arguments with 'true-sounding' conclusions."}]}, {"question": "Which of the following syllogisms correctly follows the valid 'Barbara' pattern ('All M are P. All S are M. Therefore, all S are P.')?", "options": [{"text": "All birds are animals. All robins are birds. Therefore, all robins are animals.", "isCorrect": true, "rationale": "This syllogism matches the Barbara pattern: 'birds' (M) are 'animals' (P); 'robins' (S) are 'birds' (M); therefore, 'robins' (S) are 'animals' (P)."}, {"text": "All cats are mammals. Some animals are cats. Therefore, some animals are mammals.", "isCorrect": false, "rationale": "This syllogism includes 'Some' statements and does not follow the 'All...All...All' structure of Barbara."}, {"text": "All fish live in water. All whales live in water. Therefore, all whales are fish.", "isCorrect": false, "rationale": "This is an example of an 'undistributed middle' error, where the middle term ('live in water') is not distributed in either premise, despite the conclusion sounding plausible to some."}, {"text": "No dogs are cats. All poodles are dogs. Therefore, no poodles are cats.", "isCorrect": false, "rationale": "This syllogism contains a 'No' statement and follows the 'Celarent' pattern, not Barbara."}]}, {"question": "The 'Celarent' pattern is given as: 'No M are P. All S are M. Therefore, no S are P.' Which of the following best exemplifies this valid pattern?", "options": [{"text": "No fruits are vegetables. All apples are fruits. Therefore, no apples are vegetables.", "isCorrect": true, "rationale": "This syllogism perfectly matches the Celarent pattern: 'fruits' (M) are not 'vegetables' (P); 'apples' (S) are 'fruits' (M); therefore, 'apples' (S) are not 'vegetables' (P)."}, {"text": "All books are paper. No essays are books. Therefore, no essays are paper.", "isCorrect": false, "rationale": "This does not follow Celarent's structure because the first premise is an 'All' statement, not a 'No' statement, and the middle term placement is different."}, {"text": "Some students are athletes. All athletes are healthy. Therefore, some students are healthy.", "isCorrect": false, "rationale": "This syllogism includes 'Some' statements and does not match the 'No...All...No' structure of Celarent."}, {"text": "No cars are airplanes. No bicycles are cars. Therefore, no bicycles are airplanes.", "isCorrect": false, "rationale": "This syllogism has two negative premises ('No... No...'), which is one of the rules for invalid syllogisms, making it structurally invalid and not Celarent."}]}, {"question": "According to the provided quick guide, a term is 'undistributed' in a statement if:", "options": [{"text": "The statement makes a claim about every single member of that category.", "isCorrect": false, "rationale": "This describes a 'distributed' term. A term is distributed if the statement says something about every member of that category."}, {"text": "The statement only says something about some members of that category, or doesn't cover the whole group.", "isCorrect": true, "rationale": "The definition states that a term is undistributed if the statement only says something about some members or doesn't cover the whole group."}, {"text": "It appears in the conclusion but not in either premise.", "isCorrect": false, "rationale": "A term that appears in the conclusion but not in a premise would indicate an incorrectly formed syllogism (not having exactly three terms), not necessarily an undistributed term within a statement."}, {"text": "It is the subject of an 'All A are B' statement.", "isCorrect": false, "rationale": "In 'All A are B,' the subject 'A' is distributed (we talk about every A), but the predicate 'B' is not distributed."}]}, {"question": "In the statement 'Some A are not B,' which term(s) is/are distributed?", "options": [{"text": "Only A", "isCorrect": false, "rationale": "The term 'A' is undistributed in 'Some A are not B' because the statement only refers to 'some' A, not every A."}, {"text": "Only B", "isCorrect": true, "rationale": "According to the quick guide, in 'Some A are not B,' only B is distributed because the statement claims that 'A is completely outside of B for at least one A,' meaning it speaks about the entirety of B in relation to that A."}, {"text": "Both A and B", "isCorrect": false, "rationale": "Only B is distributed in this statement. A is undistributed."}, {"text": "Neither A nor B", "isCorrect": false, "rationale": "While 'Some A are B' has neither distributed, 'Some A are not B' distributes B."}]}, {"question": "Consider the following syllogism: 'All politicians are speakers. All actors are speakers. Therefore, all actors are politicians.' What logical flaw makes this argument invalid?", "options": [{"text": "Illicit Major", "isCorrect": false, "rationale": "Illicit Major occurs when the major term is distributed in the conclusion but not in its premise. Here, the major term ('politicians') is distributed in the conclusion ('All actors are politicians') but also in a premise ('All politicians are speakers', where 'politicians' is the subject of an 'All' statement, making it distributed). However, the primary flaw isn't Illicit Major."}, {"text": "Illicit Minor", "isCorrect": false, "rationale": "Illicit Minor occurs when the minor term is distributed in the conclusion but not in its premise. Here, the minor term ('actors') is distributed in the conclusion ('All actors are politicians') and also in its premise ('All actors are speakers', where 'actors' is the subject of an 'All' statement, making it distributed)."}, {"text": "Undistributed Middle", "isCorrect": true, "rationale": "The middle term is 'speakers.' In Premise 1 ('All politicians are speakers'), 'speakers' is the predicate of an 'All' statement, making it undistributed. In Premise 2 ('All actors are speakers'), 'speakers' is again the predicate of an 'All' statement, making it undistributed. Since the middle term is never distributed, the syllogism commits the fallacy of the undistributed middle, failing to connect the major and minor terms."}, {"text": "It has two negative premises.", "isCorrect": false, "rationale": "Both premises ('All politicians are speakers' and 'All actors are speakers') are affirmative, not negative. Therefore, this rule is not broken."}]}, {"question": "Examine this syllogism: 'All dogs are mammals. No cats are dogs. Therefore, no cats are mammals.' This argument is invalid because it commits which specific error?", "options": [{"text": "Undistributed Middle term.", "isCorrect": false, "rationale": "The middle term is 'dogs.' In 'All dogs are mammals,' 'dogs' is distributed (subject of an 'All' statement). In 'No cats are dogs,' 'dogs' is also distributed (predicate of a 'No' statement). So, the middle term is distributed at least once, meaning this is not an undistributed middle."}, {"text": "Illicit Major term.", "isCorrect": true, "rationale": "The major term is 'mammals' (predicate of the conclusion). In the conclusion ('no cats are mammals'), 'mammals' is distributed. However, in its premise ('All dogs are mammals'), 'mammals' is the predicate of an 'All' statement, which means it is undistributed. Thus, the major term is distributed in the conclusion but not in its premise, making it an illicit major."}, {"text": "Illicit Minor term.", "isCorrect": false, "rationale": "The minor term is 'cats' (subject of the conclusion). In the conclusion ('no cats are mammals'), 'cats' is distributed. In its premise ('No cats are dogs'), 'cats' is also distributed (subject of a 'No' statement). So, the minor term is properly distributed in both its premise and the conclusion."}, {"text": "It includes a term that does not appear in the conclusion.", "isCorrect": false, "rationale": "This statement describes the middle term, which by definition appears in the premises but not the conclusion. This is a characteristic of all syllogisms, not a flaw."}]}, {"question": "According to the 'Three Rules for Valid Syllogisms' in the text, which of the following is a necessary condition for a syllogism to be valid?", "options": [{"text": "The conclusion must always be factually true.", "isCorrect": false, "rationale": "The text emphasizes that validity is about structural integrity, not the factual truth of the conclusion. A valid argument can have a false conclusion if its premises are false."}, {"text": "The middle term must be distributed in at least one premise.", "isCorrect": true, "rationale": "This is explicitly listed as the first key rule: 'The middle term must be distributed in at least one premise.' Failure to meet this condition results in the 'undistributed middle' fallacy."}, {"text": "Both premises must be universal statements (e.g., 'All' or 'No').", "isCorrect": false, "rationale": "While many valid forms have universal premises (like Barbara and Celarent), the text notes that 'A valid syllogism cannot have two particular premises (two “Some” statements),' implying that one particular premise is acceptable in some valid forms (e.g., Darii, Ferio, or Baroco as hinted in 'thinkaboutit')."}, {"text": "A valid syllogism cannot have a negative conclusion.", "isCorrect": false, "rationale": "The Celarent pattern, which is valid, explicitly has a negative conclusion ('No S are P'). The rule actually states that a valid syllogism 'can have at most one negative premise'."}]}, {"question": "Consider the syllogism presented in the 'thinkaboutit' section: 1. All video games require electricity. 2. Some homework does not require electricity. 3. Therefore, some homework is not a video game. Based on the principles of syllogism validity discussed, is this syllogism valid or invalid, and why?", "options": [{"text": "Invalid, because the middle term 'electricity' is undistributed in the second premise.", "isCorrect": false, "rationale": "In the second premise, 'Some homework does not require electricity,' the term 'electricity' (B in 'Some A are not B') is distributed. Therefore, the middle term 'electricity' is distributed in at least one premise (the second one), so this is not an undistributed middle."}, {"text": "Valid, because the premises logically force the conclusion, as confirmed by a Venn diagram.", "isCorrect": true, "rationale": "The 'thinkaboutit' section explicitly states, '(Hint: it is valid! This is a pattern called Baroco.)' This confirms that the structure of the premises guarantees the truth of the conclusion if the premises are true, and it can be verified using a Venn diagram."}, {"text": "Invalid, because it contains a negative premise, which always leads to an invalid conclusion.", "isCorrect": false, "rationale": "The text states that a valid syllogism 'can have at most one negative premise.' This syllogism has only one negative premise ('Some homework does not require electricity'), so the presence of a negative premise alone does not make it invalid."}, {"text": "Valid, because the conclusion sounds true, implying a correct logical structure.", "isCorrect": false, "rationale": "The text warns against assuming a syllogism is valid because the conclusion 'sounds true.' Validity is about structure, not just perceived truth. While this conclusion is true, its validity comes from its structure, not its 'sound' appearance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
