<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In logic, how is an 'argument' primarily defined?", "options": [{"text": "A heated disagreement between two or more people.", "isCorrect": false, "rationale": "This is a common misconception. In logic, an argument is not a fight, but a structured set of statements."}, {"text": "A set of statements in which one or more statements are offered as reasons to believe another statement.", "isCorrect": true, "rationale": "This is the precise definition provided in the text: an argument is a set of premises (reasons) supporting a conclusion (claim)."}, {"text": "Any collection of sentences conveying an opinion.", "isCorrect": false, "rationale": "Bare opinions or unsupported claims are not logical arguments. An argument requires statements offered as reasons or evidence."}, {"text": "A series of questions intended to provoke thought.", "isCorrect": false, "rationale": "Questions are not statements and cannot serve as premises or conclusions in a logical argument. Arguments consist of declarative statements."}], "id": "q01"}, {"question": "Consider the argument: 'You should definitely watch this movie *because* it won an Oscar and has amazing special effects.' Which part is the conclusion?", "options": [{"text": "It won an Oscar.", "isCorrect": false, "rationale": "This statement is offered as a reason to watch the movie, making it a premise."}, {"text": "It has amazing special effects.", "isCorrect": false, "rationale": "This statement is also offered as a reason to watch the movie, making it another premise."}, {"text": "You should definitely watch this movie.", "isCorrect": true, "rationale": "This is the claim that the speaker is trying to convince you of, supported by the other two statements. The word 'because' signals that the reasons follow, pointing back to this conclusion."}, {"text": "The word 'because'.", "isCorrect": false, "rationale": "While 'because' is a signal word, it is not a statement itself, nor is it the conclusion of the argument."}], "id": "q02"}, {"question": "According to the section, what is a fundamental structural characteristic of every logical argument?", "options": [{"text": "It must have at least two premises and one conclusion.", "isCorrect": false, "rationale": "The text states an argument has 'at least one premise,' not necessarily two."}, {"text": "It can have multiple conclusions if they are related.", "isCorrect": false, "rationale": "The text explicitly states: 'Every argument has... exactly one conclusion.'"}, {"text": "It has at least one premise and exactly one conclusion.", "isCorrect": true, "rationale": "This statement directly reflects the structural rule given: 'Every argument has at least one premise and exactly one conclusion.'"}, {"text": "The number of premises and conclusions must always be equal.", "isCorrect": false, "rationale": "There is no such rule. Arguments can have many premises but only one conclusion."}], "id": "q03"}, {"question": "When encountering signal words like 'since' or 'because' in a statement, what do they typically indicate?", "options": [{"text": "The upcoming statement is a conclusion.", "isCorrect": false, "rationale": "'Since' and 'because' are premise signals; they introduce reasons, not the main claim."}, {"text": "The preceding statement was a conclusion.", "isCorrect": false, "rationale": "While the conclusion might appear before these words, the words themselves point to the reasons that follow them."}, {"text": "The following statements are premises.", "isCorrect": true, "rationale": "The text explains, 'Premise signals say 'here comes a reason.'' Words like 'since' and 'because' introduce the reasons or evidence."}, {"text": "The argument is incomplete and requires more information.", "isCorrect": false, "rationale": "Signal words help identify parts of an argument; they do not indicate incompleteness."}], "id": "q04"}, {"question": "Imagine a friend says, 'The library is closed. I saw a sign on the door, and the lights are off inside.' What is the conclusion in this argument?", "options": [{"text": "I saw a sign on the door.", "isCorrect": false, "rationale": "This is a piece of evidence offered to support the main claim, making it a premise."}, {"text": "The lights are off inside.", "isCorrect": false, "rationale": "This is another piece of evidence offered to support the main claim, making it a premise."}, {"text": "The library is closed.", "isCorrect": true, "rationale": "This is the statement your friend is trying to get you to believe, supported by the observations (premises) about the sign and the lights. This demonstrates the 'good trick' of asking 'Which statement is the author trying to get me to believe?'"}, {"text": "There is no conclusion because there are no signal words.", "isCorrect": false, "rationale": "The text explicitly states that 'not every sentence has signal words' and provides a trick for identifying the conclusion without them."}], "id": "q05"}, {"question": "According to the 'Common Misconceptions' section, which of the following is NOT considered a logical argument?", "options": [{"text": "A set of reasons supporting a claim about a movie.", "isCorrect": false, "rationale": "This is a perfect example of a logical argument, fitting the definition of premises supporting a conclusion."}, {"text": "A statement of personal preference, like 'Chocolate is the best ice cream.'", "isCorrect": true, "rationale": "The text stresses that 'bare opinions are not arguments' unless they are supported by reasons."}, {"text": "An explanation of why a particular historical event occurred.", "isCorrect": false, "rationale": "Explanations often involve presenting evidence (premises) to support a claim (conclusion) about causation."}, {"text": "A debate about the best approach to solve a community problem.", "isCorrect": false, "rationale": "Debates are often composed of individuals presenting logical arguments to support their positions."}], "id": "q06"}, {"question": "The text uses the analogy of an argument as a 'little machine' where 'reasons are the fuel; the claim is the destination.' What do the 'reasons' in this analogy correspond to in terms of logical argument components?", "options": [{"text": "The conclusion.", "isCorrect": false, "rationale": "The conclusion is the 'claim' or 'destination,' not the 'reasons' or 'fuel.'"}, {"text": "The signal words.", "isCorrect": false, "rationale": "Signal words are like 'road signs' guiding the argument, but they are not the core reasons themselves."}, {"text": "The premises.", "isCorrect": true, "rationale": "Premises are defined as the statements offered as 'reasons' or 'evidence,' directly aligning with the 'fuel' in the machine analogy."}, {"text": "The entire logical process.", "isCorrect": false, "rationale": "The 'reasons' refer to a specific component (premises), not the entire process."}], "id": "q07"}, {"question": "You are trying to convince your friend that 'we should leave for the concert early.' You state, 'Traffic will be heavy, and parking will be difficult if we don't.' What strategy are you using to identify the conclusion in your own argument?", "options": [{"text": "Looking for signal words like 'therefore' or 'thus.'", "isCorrect": false, "rationale": "While useful, these specific signal words are not present in the given statement."}, {"text": "Identifying the statement that summarizes the main idea of your conversation.", "isCorrect": false, "rationale": "While related, the conclusion is a specific claim, not just a general summary. The 'good trick' offers a more direct method."}, {"text": "Asking yourself, 'Which statement am I trying to get my friend to believe?'", "isCorrect": true, "rationale": "This is the 'good trick' explicitly mentioned in the text for identifying the conclusion when signal words are absent or unclear."}, {"text": "Assuming the first statement you make is always the conclusion.", "isCorrect": false, "rationale": "The position of the conclusion can vary; it is not always the first statement."}], "id": "q08"}, {"question": "In the example, 'All dogs are animals. Buddy is a dog. Therefore, Buddy is an animal.' Statements 1 and 2 serve what function?", "options": [{"text": "They are both conclusions.", "isCorrect": false, "rationale": "An argument has only one conclusion. Statement 3 ('Buddy is an animal') is the conclusion."}, {"text": "They are signal words indicating the conclusion.", "isCorrect": false, "rationale": "Statements 1 and 2 are declarative sentences providing information, not signal words. 'Therefore' is the signal word for the conclusion."}, {"text": "They are premises, offering reasons to believe statement 3.", "isCorrect": true, "rationale": "As defined, premises are statements offered as reasons or evidence. Statements 1 and 2 provide the logical support for statement 3."}, {"text": "They are opinions, not meant to be proven.", "isCorrect": false, "rationale": "These are statements of fact (within the context of the argument) that are used as evidence, not bare opinions."}], "id": "q09"}, {"question": "The 'did you know' section states that the Latin word 'argumentum' means 'evidence' or 'proof.' How does this historical meaning align with the logical definition of 'argument' presented in the text?", "options": [{"text": "It emphasizes that arguments are primarily about winning a debate.", "isCorrect": false, "rationale": "The text explicitly distinguishes logical argument from a 'fight' or 'shouting match,' emphasizing reason and support over winning."}, {"text": "It highlights that the purpose of an argument is to offer statements as reasons or proof for a claim.", "isCorrect": true, "rationale": "The logical definition states that premises are 'offered as reasons to believe another statement,' which directly corresponds to providing 'evidence' or 'proof' for the conclusion."}, {"text": "It suggests that arguments are only valid if they are formally written.", "isCorrect": false, "rationale": "The historical origin doesn't impose restrictions on the format of an argument. Logical arguments can be spoken or written."}, {"text": "It implies that every argument must include statistical data or scientific findings.", "isCorrect": false, "rationale": "While data can be evidence, 'evidence' or 'proof' in logic encompasses a broader range of supporting statements, not exclusively scientific or statistical data."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
