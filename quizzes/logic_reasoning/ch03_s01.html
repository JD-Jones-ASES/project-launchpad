    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a syllogism, as defined in Chapter 3?", "options": [{"text": "Any argument that uses logical language such as 'all,' 'some,' or 'no.'", "isCorrect": false, "rationale": "Not every argument using these terms is a syllogism. A syllogism specifically has exactly two premises and one conclusion, all of which are categorical statements."}, {"text": "An argument with exactly two premises and one conclusion, where all three statements are categorical statements.", "isCorrect": true, "rationale": "This is the section's definition. The famous example — 'All humans are mortal. Socrates is a human. Therefore, Socrates is mortal.' — illustrates all three requirements."}, {"text": "Any deductive argument with a true conclusion.", "isCorrect": false, "rationale": "A syllogism is defined by its structure (two premises, one conclusion, all categorical), not by whether the conclusion happens to be true."}, {"text": "An argument invented by Socrates to prove philosophical claims.", "isCorrect": false, "rationale": "The syllogism is credited to Aristotle, not Socrates. Socrates appears as an example subject in the famous syllogism, but he did not develop the logical form."}]}, {"question": "What is a categorical statement?", "options": [{"text": "A statement that is known to be absolutely true.", "isCorrect": false, "rationale": "Categorical does not mean certain or verified. A categorical statement is about the relationship between two groups, regardless of whether it is true."}, {"text": "A statement that says something about the relationship between two categories or groups.", "isCorrect": true, "rationale": "The section defines it as: a statement that 'says something about the relationship between two categories (groups) — telling whether members of one group belong or don't belong to another.'"}, {"text": "Any statement that uses the word 'all.'", "isCorrect": false, "rationale": "'All' appears only in two of the four forms (All A are B; No A are B uses 'no' rather than 'all'). Categorical statements can use 'no,' 'some,' or 'some…not' as well."}, {"text": "A statement that provides a reason for a conclusion.", "isCorrect": false, "rationale": "A statement that provides a reason for a conclusion is a premise. Categorical statements can serve as premises or conclusions, but the definition concerns their group-relationship content, not their role in an argument."}]}, {"question": "Which form of categorical statement is called a 'universal affirmative'?", "options": [{"text": "No A are B", "isCorrect": false, "rationale": "'No A are B' is a universal negative — universal because it covers all of group A, negative because it completely excludes A from B."}, {"text": "Some A are B", "isCorrect": false, "rationale": "'Some A are B' is a particular affirmative — particular because it addresses only part of group A, affirmative because it says at least one member belongs to B."}, {"text": "All A are B", "isCorrect": true, "rationale": "'All A are B' is the universal affirmative: universal because it covers every member of group A, affirmative because it says A is included in B."}, {"text": "Some A are not B", "isCorrect": false, "rationale": "'Some A are not B' is a particular negative — particular because it concerns only some of A, negative because it excludes those members from B."}]}, {"question": "In logic, what does the word 'some' mean in a categorical statement?", "options": [{"text": "A small number, but not a majority.", "isCorrect": false, "rationale": "This reflects everyday English usage. In logic, 'some' does not imply a small quantity — it means at least one and allows for any number up to all."}, {"text": "Exactly half of the group.", "isCorrect": false, "rationale": "Logic gives 'some' no precise quantitative meaning other than 'at least one.' It could refer to one, a few, most, or even all members."}, {"text": "At least one — possibly more, possibly all.", "isCorrect": true, "rationale": "The section explicitly states: 'in logic, \"some\" means at least one. It could be one. It could be most. It could even be all! \"Some\" just guarantees that the number isn't zero.'"}, {"text": "Fewer than all but more than none.", "isCorrect": false, "rationale": "While 'some' guarantees at least one, it does not cap out before 'all.' In logic, 'some' is compatible with all members belonging — it simply guarantees at least one."}]}, {"question": "Which of the following is a 'particular negative' categorical statement?", "options": [{"text": "All dogs are animals.", "isCorrect": false, "rationale": "This is a universal affirmative ('All A are B') — it covers all dogs and makes a positive inclusion claim."}, {"text": "No triangles are circles.", "isCorrect": false, "rationale": "This is a universal negative ('No A are B') — it covers all triangles and completely excludes them from circles."}, {"text": "Some birds are not able to fly.", "isCorrect": true, "rationale": "This matches the 'Some A are not B' form — particular (at least one bird) and negative (excluded from 'able to fly'). The section gives this exact example with penguins."}, {"text": "Some students play soccer.", "isCorrect": false, "rationale": "This is a particular affirmative ('Some A are B') — it says at least one student belongs to the 'plays soccer' group."}]}, {"question": "What does 'scope' refer to in the classification of categorical statements?", "options": [{"text": "Whether the statement connects or separates the two groups.", "isCorrect": false, "rationale": "Whether a statement connects or separates groups is quality (affirmative vs. negative), not scope."}, {"text": "How many members of the subject group the statement is about — all of them (universal) or at least one (particular).", "isCorrect": true, "rationale": "The section defines scope as: 'all of them (universal) or at least one (particular).' It tells you the quantity of the subject group addressed."}, {"text": "Whether the terms in the statement are vague or precise.", "isCorrect": false, "rationale": "Precision of terms relates to clarity and definition (Chapter 2), not to the classification of categorical statements."}, {"text": "Whether the statement is used as a premise or a conclusion.", "isCorrect": false, "rationale": "The role of a statement in an argument (premise vs. conclusion) is independent of its scope. A universal affirmative can serve as either."}]}, {"question": "The statement 'No fish are mammals' is best classified as which type of categorical statement?", "options": [{"text": "Universal affirmative", "isCorrect": false, "rationale": "A universal affirmative has the form 'All A are B' — it includes A in B. 'No fish are mammals' excludes, not includes."}, {"text": "Universal negative", "isCorrect": true, "rationale": "This matches the 'No A are B' form: universal (covers all fish) and negative (completely excludes fish from the category of mammals). Zero overlap."}, {"text": "Particular affirmative", "isCorrect": false, "rationale": "A particular affirmative has the form 'Some A are B,' which says at least one member of A belongs to B. This statement says the opposite."}, {"text": "Particular negative", "isCorrect": false, "rationale": "A particular negative has the form 'Some A are not B,' which says at least one member of A is excluded from B. 'No fish are mammals' is stronger — it says ALL fish are excluded."}]}, {"question": "According to the 'Did You Know' box, from which Latin words do the letter names A, E, I, O come?", "options": [{"text": "From 'aequus' (equal) and 'ordo' (order).", "isCorrect": false, "rationale": "These are not the Latin words cited. The section specifies two particular Latin verbs that gave rise to the four letters."}, {"text": "From 'affirmo' (I affirm) and 'nego' (I deny) — A and I from 'affirmo,' E and O from 'nego.'", "isCorrect": true, "rationale": "The section states this explicitly: 'A and I are the vowels from affirmo; E and O are the vowels from nego.' This is how medieval logicians named the four forms."}, {"text": "From 'aliquis' (someone) and 'esse' (to be).", "isCorrect": false, "rationale": "These Latin words are not cited in the section. The letter names derive from affirmo and nego, the verbs for affirming and denying."}, {"text": "From the first four letters of the Latin alphabet.", "isCorrect": false, "rationale": "A, E, I, O are not the first four letters of the Latin alphabet. They were chosen specifically because they are the vowels in affirmo and nego."}]}, {"question": "Why might someone falsely conclude 'All animals are dogs' from 'All dogs are animals'?", "options": [{"text": "Because 'some' was confused with 'all.'", "isCorrect": false, "rationale": "Neither statement uses 'some.' This error involves reversing the terms in a universal affirmative, not confusing quantifiers."}, {"text": "Because they confused the subject and predicate — assuming the relationship is reversible when it is not.", "isCorrect": true, "rationale": "The section warns that 'All dogs are animals' does NOT mean 'All animals are dogs.' The relationship points one way: dogs are a subset of animals, not the reverse."}, {"text": "Because both statements use the word 'all,' making them appear equivalent.", "isCorrect": false, "rationale": "Using 'all' in both does not make them equivalent. The direction of inclusion matters: which group is the subset and which is the superset."}, {"text": "Because this is a case of equivocation — 'dogs' means something different in each statement.", "isCorrect": false, "rationale": "'Dogs' is used consistently in both statements. The error is logical (false conversion), not semantic (equivocation)."}]}, {"question": "Aristotle is credited with developing the rules for syllogisms. When did he live, according to the section?", "options": [{"text": "Around 400–350 BC", "isCorrect": false, "rationale": "These dates are slightly too early. The section provides specific birth and death years for Aristotle."}, {"text": "384–322 BC", "isCorrect": true, "rationale": "The section's 'Classic Problem' box states: 'The ancient Greek philosopher Aristotle (384–322 BC).' He is also credited as the first to write down the rules for syllogisms."}, {"text": "470–399 BC", "isCorrect": false, "rationale": "These dates correspond to Socrates, not Aristotle. Socrates appears as the subject of the famous syllogism, but Aristotle is the one who developed the logical rules."}, {"text": "300–250 BC", "isCorrect": false, "rationale": "These dates are approximately a century too late. Aristotle lived from 384–322 BC."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
