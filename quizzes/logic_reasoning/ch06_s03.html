    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, why is learning about your brain's biases described as 'great news'?", "options": [{"text": "It means our initial judgments are always accurate.", "isCorrect": false, "rationale": "The text states that biases are 'traps' and 'fool you,' indicating initial judgments are not always accurate."}, {"text": "It proves that emotions should always guide our decision-making.", "isCorrect": false, "rationale": "The text mentions 'emotions can cloud your judgment,' suggesting they don't always lead to good decisions."}, {"text": "It provides strategies to recognize and overcome these cognitive traps.", "isCorrect": true, "rationale": "The text explicitly states, 'now that you know about these traps, you can learn strategies to avoid them,' comparing it to spotting optical illusions."}, {"text": "It confirms that most people are inherently unbiased.", "isCorrect": false, "rationale": "The premise of the section is that everyone, including oneself, has biases, making this option incorrect."}], "id": "q01"}, {"question": "A student group is proposing a new policy for their school. Sarah suggests, 'Before we finalize this, let's think of every possible reason why this policy might fail or have negative consequences, even if we don't believe those reasons ourselves.' What debiasing tool is Sarah demonstrating?", "options": [{"text": "Steelmanning", "isCorrect": false, "rationale": "Steelmanning involves restating someone else's argument in its strongest form, not arguing against your own position."}, {"text": "Playing Devil's Advocate", "isCorrect": true, "rationale": "Playing devil's advocate means deliberately looking for reasons why your own position might be wrong, arguing against it to test its strength, which is precisely what Sarah is doing."}, {"text": "Cherry-picking statistics", "isCorrect": false, "rationale": "Cherry-picking statistics is a media bias trick involving selective use of data, which is unrelated to Sarah's action."}, {"text": "Considering the opposite", "isCorrect": false, "rationale": "While related, 'considering the opposite' specifically refers to asking 'What would change my mind?'. Playing devil's advocate is a more active form of seeking counterarguments for one's own position."}], "id": "q02"}, {"question": "During a debate, Participant A says, 'My opponent's environmental plan is just a radical scheme to shut down all industries and force everyone into poverty!' Participant B responds, 'My plan aims to incentivize green technologies and invest in sustainable job creation, which I believe will boost the economy in the long term.' Participant A's initial statement is an example of which logical fallacy or bias?", "options": [{"text": "Steelmanning", "isCorrect": false, "rationale": "Steelmanning would involve representing the opponent's plan in its strongest, fairest light, which Participant A did not do."}, {"text": "Playing Devil's Advocate", "isCorrect": false, "rationale": "Playing devil's advocate involves testing one's own position or a group's shared belief, not misrepresenting an opponent's argument."}, {"text": "A straw man", "isCorrect": true, "rationale": "Participant A is creating a 'straw man' by misrepresenting and exaggerating their opponent's plan (making it sound ridiculous and easy to defeat) rather than addressing the actual argument."}, {"text": "Considering the opposite", "isCorrect": false, "rationale": "Considering the opposite is a personal reflection tool to challenge one's own strong beliefs, not a tactic used in a debate to misrepresent an opponent."}], "id": "q03"}, {"question": "A student holds a strong belief about a particular social issue. When asked what evidence or information might convince them to reconsider their stance, they genuinely cannot think of anything. According to the section, what does this inability to identify counter-evidence signify?", "options": [{"text": "It means their belief is exceptionally well-founded and cannot be disproven.", "isCorrect": false, "rationale": "The text identifies this as a 'red flag,' suggesting a potential bias rather than irrefutable truth."}, {"text": "It indicates they have successfully used steelmanning against their own arguments.", "isCorrect": false, "rationale": "Steelmanning applies to understanding others' arguments, not one's own unwavering beliefs."}, {"text": "It suggests their 'elephant' (emotions/biases) might be in charge and their 'rider' (rational thought) has fallen asleep.", "isCorrect": true, "rationale": "The text explicitly states that if you can't think of anything that would change your mind, 'your elephant is in charge and your rider has fallen asleep.'"}, {"text": "It shows they have effectively framed the issue in their mind.", "isCorrect": false, "rationale": "Framing is about presenting information to others to influence their perception, not a symptom of an unchallenged personal belief."}], "id": "q04"}, {"question": "Two news outlets report on the same economic data. Headline X reads: 'Unemployment rate holds steady at 5.5%, indicating stability.' Headline Y reads: 'Over 8 million still jobless as unemployment lingers at 5.5%.' This difference in presentation of identical facts primarily demonstrates which concept?", "options": [{"text": "Cherry-picked statistics", "isCorrect": false, "rationale": "Both headlines use the same statistic (5.5%), so it's not about picking different data, but presenting the same data differently."}, {"text": "Unnamed sources", "isCorrect": false, "rationale": "The issue is not the source of information, but how the information itself is conveyed."}, {"text": "Steelmanning", "isCorrect": false, "rationale": "Steelmanning is about strengthening an opponent's argument, not about how facts are presented in news headlines."}, {"text": "Framing", "isCorrect": true, "rationale": "Framing is 'the way information is presented to influence how you think about it.' The example in the text with '30% failed' vs. '70% passed' is a direct parallel to this scenario."}], "id": "q05"}, {"question": "A local politician states, 'Our city's average income has increased by 20% in the last year!' Further investigation reveals this is true, but the increase is due to a few extremely wealthy individuals moving into the city, while the majority of residents saw stagnant or decreasing incomes. What bias-detection tool is most relevant to critically evaluate this statement?", "options": [{"text": "Playing Devil's Advocate", "isCorrect": false, "rationale": "While a critical mindset is needed, a more specific tool applies to this data manipulation."}, {"text": "Steelmanning", "isCorrect": false, "rationale": "Steelmanning applies to arguments, not the presentation of data itself."}, {"text": "Recognizing cherry-picked statistics", "isCorrect": true, "rationale": "This is a classic example of cherry-picking, where the politician 'selected only the data that supports your point while hiding data that doesn't' to create a misleading impression."}, {"text": "Considering the opposite", "isCorrect": false, "rationale": "This tool is for challenging one's own deeply held beliefs, not for analyzing misleading public statements."}], "id": "q06"}, {"question": "Which of the following is NOT listed as a 'red flag' to watch out for in media?", "options": [{"text": "Emotional headlines like 'SHOCKING!'", "isCorrect": false, "rationale": "The text lists 'Emotional headlines' as a red flag designed to trigger the availability heuristic."}, {"text": "Missing context, such as 'Crime is up 50%!' without baseline data.", "isCorrect": false, "rationale": "The text lists 'Missing context' as a red flag, using the 'Crime is up 50%' example."}, {"text": "Clearly cited and diverse expert sources.", "isCorrect": true, "rationale": "The text warns against 'Unnamed sources.' Clearly cited and diverse sources would generally be a sign of *reliable* reporting, not a red flag."}, {"text": "Articles presenting only one side of an argument.", "isCorrect": false, "rationale": "The text lists 'Only one side presented' as a red flag, indicating potential framing to push a conclusion."}], "id": "q07"}, {"question": "The section highlights the existence of fact-checking websites. What critical piece of advice is given regarding the use of these resources?", "options": [{"text": "Blindly trust the conclusions of the most popular fact-checking sites.", "isCorrect": false, "rationale": "The text explicitly states, 'The goal isn't to find one source you trust blindly.'"}, {"text": "Use them only if you are a struggling student.", "isCorrect": false, "rationale": "The text implies their utility for all critical thinkers, including advanced students who can 'analyze a full news article.'"}, {"text": "Check multiple fact-checking sources and evaluate their methods, not just their conclusions.", "isCorrect": true, "rationale": "The text advises, 'even fact-checkers can have biases. That's why good critical thinkers check multiple fact-checking sources and look at their methods, not just their conclusions.'"}, {"text": "Assume any claim not addressed by a fact-checker is automatically true.", "isCorrect": false, "rationale": "This is a logical leap and contrary to the principles of critical thinking presented."}], "id": "q08"}, {"question": "A journalist is writing an article about a new scientific discovery. To ensure balanced reporting and avoid bias, which approach would best align with the tools presented in the section?", "options": [{"text": "Highlighting only the most exciting aspects of the discovery to capture reader attention.", "isCorrect": false, "rationale": "This would be a form of framing and potentially cherry-picking, focusing only on one positive aspect."}, {"text": "Seeking out respected scientists who disagree with the discovery, presenting their strongest counterarguments, and considering potential negative implications or alternative explanations.", "isCorrect": true, "rationale": "This integrates 'playing devil's advocate' (considering negative implications/alternative explanations) and 'steelmanning' (presenting strongest counterarguments from those who disagree), promoting a balanced analysis."}, {"text": "Quoting only anonymous sources to protect their identities and promote a sense of intrigue.", "isCorrect": false, "rationale": "The text lists 'Unnamed sources' as a red flag in media bias."}, {"text": "Framing the discovery using highly emotional language to evoke a strong response from readers.", "isCorrect": false, "rationale": "This aligns with 'emotional headlines' and manipulative framing, which are red flags for bias."}], "id": "q09"}, {"question": "Which of the following scenarios best demonstrates a comprehensive effort to overcome personal cognitive biases, combining several strategies taught in the section?", "options": [{"text": "A manager only consults employees who agree with their proposed business strategy to ensure team cohesion.", "isCorrect": false, "rationale": "This is an example of confirmation bias, actively avoiding dissenting opinions, which is the opposite of debiasing."}, {"text": "A student, after forming a strong opinion on a historical event, researches opposing viewpoints, tries to articulate the strongest possible version of those views, and identifies specific evidence that would lead them to reconsider their initial conclusion.", "isCorrect": true, "rationale": "This demonstrates 'playing devil's advocate' (researching opposing viewpoints), 'steelmanning' (articulating the strongest version of those views), and 'considering the opposite' (identifying evidence that would make them reconsider), thus combining multiple debiasing strategies."}, {"text": "A journalist exclusively uses data from a single, well-known research institution to support their article's claims.", "isCorrect": false, "rationale": "While the source might be well-known, relying on only one source can still lead to a lack of context or a one-sided presentation, which are red flags for media bias."}, {"text": "An individual avoids all news and social media to prevent exposure to biased information.", "isCorrect": false, "rationale": "While it avoids bias, this strategy also avoids information and engagement, which is not what the section promotes for becoming a 'good critical thinker.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
