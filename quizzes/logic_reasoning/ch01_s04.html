<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, what is the recommended first step when analyzing a passage for an argument?", "options": [{"text": "Underline every sentence in the passage.", "isCorrect": false, "rationale": "Underlining every sentence is explicitly warned against. Background information, greetings, and off-topic sentences are not part of the argument."}, {"text": "Find the conclusion first by asking what the speaker is trying to convince you of.", "isCorrect": true, "rationale": "The 'detective tip' in the section states: find the conclusion first, then look for the premises that support it."}, {"text": "Count how many sentences are in the passage.", "isCorrect": false, "rationale": "Counting sentences has no role in argument analysis. The goal is to identify logical structure, not length."}, {"text": "Decide whether the argument is valid before reading the full passage.", "isCorrect": false, "rationale": "You cannot evaluate validity before identifying premises and the conclusion. Reading the full passage comes first."}]}, {"question": "In Passage 1 (The School Uniform Debate), which sentences contain the premises of the argument?", "options": [{"text": "The first and last sentences.", "isCorrect": false, "rationale": "The section's hint says the first and last sentences frame the argument. The middle sentences are the actual reasons (premises)."}, {"text": "Only the sentence about discipline problems.", "isCorrect": false, "rationale": "There are two distinct premises: the discipline-problems claim AND the money-saving claim. Only listing one misses the full argument."}, {"text": "The sentences stating that uniforms reduce discipline problems and that uniforms save families money.", "isCorrect": true, "rationale": "These two middle sentences are the reasons given to support the conclusion. The hint confirms the middle sentences are the premises."}, {"text": "All sentences except 'Good morning, everyone.'", "isCorrect": false, "rationale": "The conclusion sentence ('uniforms would be a great choice') and the framing opener are not premises. Premises are specifically the reasons given for the conclusion."}]}, {"question": "What is the conclusion in Passage 2 (The Video Game Argument)?", "options": [{"text": "The speaker finished their homework.", "isCorrect": false, "rationale": "This is a premise — a reason offered to support the speaker's request. It is not what the speaker is trying to convince Mom to agree to."}, {"text": "The speaker cleaned their room.", "isCorrect": false, "rationale": "Cleaning the room is another premise, not the conclusion. It is one of the reasons the speaker gives."}, {"text": "The speaker has earned some extra screen time and wants to play video games for one more hour.", "isCorrect": true, "rationale": "The speaker is trying to convince Mom to allow more gaming. This is what the argument is designed to prove — the conclusion."}, {"text": "It is Friday night and there is no school tomorrow.", "isCorrect": false, "rationale": "This is the third premise — a supporting reason. The conclusion is the claim being supported, not a supporting fact."}]}, {"question": "Why is Passage 3 (the elephant passage) NOT considered an argument?", "options": [{"text": "Because elephants are not a logical topic.", "isCorrect": false, "rationale": "Any topic can be the subject of an argument. The problem is structural, not topical."}, {"text": "Because it contains false statements.", "isCorrect": false, "rationale": "The facts about elephants in the passage are true. The issue is not truth but the absence of a logical structure: no statement is offered as a reason to believe another."}, {"text": "Because no statement is offered as a reason to believe another statement — it is just a collection of facts.", "isCorrect": true, "rationale": "The section explains this directly: 'Elephants are truly incredible creatures' might look like a conclusion, but the other sentences don't logically support it — they're just descriptions."}, {"text": "Because the passage has no conclusion sentence at all.", "isCorrect": false, "rationale": "There is a sentence that looks like a conclusion ('Elephants are truly incredible creatures'), but the other sentences don't function as logical support — they're just factual descriptions."}]}, {"question": "How many premises does Passage 4 (The Sports Captain) contain?", "options": [{"text": "One", "isCorrect": false, "rationale": "There is more than one reason given. The speaker offers multiple distinct facts to support their claim to be captain."}, {"text": "Two", "isCorrect": false, "rationale": "There are more than two reasons. The hint in the section identifies three separate premises."}, {"text": "Three", "isCorrect": true, "rationale": "The three premises are: (1) the speaker has been on the team longest, (2) the speaker scored the most goals last season, and (3) all players trust the speaker's leadership."}, {"text": "Four", "isCorrect": false, "rationale": "The conclusion appears twice (at the beginning and end), but restating a conclusion does not create additional premises. There are exactly three premises."}]}, {"question": "According to the section, what is a notable structural feature of Passage 4 (The Sports Captain)?", "options": [{"text": "The conclusion is never stated directly.", "isCorrect": false, "rationale": "The conclusion is stated explicitly — in fact, the section notes it appears twice, once at the beginning and once at the end."}, {"text": "The conclusion is stated at both the beginning and the end of the passage in different words.", "isCorrect": true, "rationale": "The section's hint explicitly points this out: the conclusion appears at both the beginning ('I should be the captain') and the end ('it just makes sense that I should be captain')."}, {"text": "The passage contains no premises — only a repeated conclusion.", "isCorrect": false, "rationale": "There are three clear premises (length of service, goals scored, team trust). Restating the conclusion does not eliminate premises."}, {"text": "The passage is an example of a non-argument, like the elephant passage.", "isCorrect": false, "rationale": "Unlike the elephant passage, Passage 4 has a genuine argument: identifiable premises offered as reasons for a specific conclusion."}]}, {"question": "Which skill is NOT listed in the four-step detective task at the start of the section?", "options": [{"text": "Underlining every premise.", "isCorrect": false, "rationale": "Underlining premises is explicitly listed as step 1 of the four-step task."}, {"text": "Circling the conclusion.", "isCorrect": false, "rationale": "Circling the conclusion is step 2 of the detective task."}, {"text": "Rewriting the argument in standard form.", "isCorrect": true, "rationale": "Rewriting in standard form is not part of the four-step task described. The steps are: underline premises, circle conclusion, judge validity, then judge soundness if valid."}, {"text": "Deciding if the argument is valid or invalid.", "isCorrect": false, "rationale": "Judging validity is step 3 of the detective task."}]}, {"question": "What does the section say about sentences that provide 'background information' in a passage containing an argument?", "options": [{"text": "They should be underlined as premises.", "isCorrect": false, "rationale": "Background information is not part of the logical argument. The section explicitly says to skip those sentences."}, {"text": "They serve as hidden conclusions.", "isCorrect": false, "rationale": "Background information does not function as a conclusion. A conclusion is the claim the speaker is trying to prove, not scene-setting."}, {"text": "They should be skipped — only premises and the conclusion should be marked.", "isCorrect": true, "rationale": "The section states clearly: 'Not every sentence in a passage is part of the argument. Some sentences are just background information... Skip those.'"}, {"text": "They weaken the argument by adding irrelevant detail.", "isCorrect": false, "rationale": "Background information does not logically weaken an argument; it simply lies outside the argument's logical structure."}]}, {"question": "The section states that arguments 'show up in speeches, everyday conversations, and even in debates with your parents.' What is the main lesson the author draws from this?", "options": [{"text": "Arguments in everyday life are always invalid.", "isCorrect": false, "rationale": "The section makes no claim that everyday arguments are invalid. It emphasizes that arguments are everywhere and that practice improves detection skills."}, {"text": "Practicing argument detection sharpens thinking in all areas of life.", "isCorrect": true, "rationale": "The section concludes: 'The more you practice spotting them, the sharper your thinking will become.' The point is that these skills transfer broadly."}, {"text": "You should avoid making arguments in casual conversation.", "isCorrect": false, "rationale": "The section encourages students to spot and analyze arguments, not to avoid them. Making and evaluating arguments is presented as a positive skill."}, {"text": "Only formal speeches contain real arguments.", "isCorrect": false, "rationale": "The section explicitly says arguments appear in 'speeches, everyday conversations, and even in debates with your parents' — not just in formal settings."}]}, {"question": "A student reads a passage and underlines the conclusion as if it were a premise. What specific advice does the section give to avoid this mistake?", "options": [{"text": "Read the passage backward from the last sentence.", "isCorrect": false, "rationale": "The section does not suggest reading backward. The advice is to start by identifying what the speaker wants to prove."}, {"text": "Find the premise first, then look for what it supports.", "isCorrect": false, "rationale": "The section says the opposite: find the conclusion first ('What is the speaker trying to convince me of?'), then locate the premises supporting it."}, {"text": "Ask 'What is the speaker trying to convince me of?' to find the conclusion first, then identify the premises.", "isCorrect": true, "rationale": "The detective tip reads: 'find the conclusion first... Once you've found the conclusion, the premises are the sentences that give reasons for that conclusion.'"}, {"text": "Ignore any sentence that begins with 'because' or 'since.'", "isCorrect": false, "rationale": "Indicator words like 'because' and 'since' actually signal premises. Ignoring them would make premise identification harder, not easier."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
