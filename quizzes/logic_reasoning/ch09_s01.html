        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the definition provided, what is the fundamental characteristic that defines a logic puzzle?", "options": [{"text": "It requires creative guessing to find a solution.", "isCorrect": false, "rationale": "The text explicitly states, \"There's no guessing, no tricks — just pure thinking.\" It emphasizes reasoning over guessing."}, {"text": "It is a problem that can be solved entirely through reasoning using a set of clues.", "isCorrect": true, "rationale": "The definition states, \"A logic puzzle is a problem that can be solved entirely through reasoning. You are given a set of clues, and by combining them carefully, you can figure out the one correct answer.\""}, {"text": "It always involves mathematical calculations and complex equations.", "isCorrect": false, "rationale": "While some logic puzzles might involve numbers, the core definition focuses on reasoning and clues, not necessarily mathematical calculations. The examples provided (pets, instruments, lunch) are not primarily mathematical."}, {"text": "It is designed to be impossible to solve without external hints.", "isCorrect": false, "rationale": "The text states that logic puzzles \"figure out the answer using clues and careful reasoning,\" implying they are solvable with the provided information, not impossible without external hints."}], "id": "q01"}, {"question": "When setting up and using an elimination grid, what is the meaning of placing an 'X' in a cell?", "options": [{"text": "It indicates that these two items definitely match.", "isCorrect": false, "rationale": "A checkmark (✓), not an 'X', is used to mean \"yes, these match!\""}, {"text": "It signifies that these two items do not go together.", "isCorrect": true, "rationale": "The text clearly states: \"Put an X in a cell to mean “no, these don't go together.”\""}, {"text": "It marks a cell as 'uncertain' or 'maybe'.", "isCorrect": false, "rationale": "Grid puzzles rely on definitive eliminations or matches. There is no 'uncertain' mark; 'X' means 'no'."}, {"text": "It suggests that further clues are needed for this specific cell.", "isCorrect": false, "rationale": "An 'X' is a definitive mark of elimination based on existing clues or deductions, not an indication for more clues."}], "id": "q02"}, {"question": "A student is working on a grid puzzle. In a particular row, they have placed 'X's in three out of four cells. According to the 'Last One Standing Rule,' what should the student do next?", "options": [{"text": "Wait for a new clue to confirm the remaining cell.", "isCorrect": false, "rationale": "The 'Last One Standing Rule' states that if all options except one are eliminated, that one *must* be the answer without needing further confirmation."}, {"text": "Mark the remaining cell with an 'X' to eliminate it as well.", "isCorrect": false, "rationale": "Marking the last remaining option with an 'X' would contradict the rule and leave no valid option for that row or column."}, {"text": "Mark the remaining cell with a checkmark and then eliminate the rest of its row and column.", "isCorrect": true, "rationale": "The 'Last One Standing Rule' dictates: \"If every option in a row (or column) has been eliminated except one, that remaining option must be the answer. Mark it with a ✓ right away!\" After marking ✓, the constraints of the puzzle (one ✓ per row/column) require eliminating the rest of that row and column."}, {"text": "Guess the answer for the remaining cell and move on.", "isCorrect": false, "rationale": "The text explicitly discourages guessing, stating \"Stress that every mark on the grid must come from a clue or a logical deduction.\" The Last One Standing rule is a logical deduction."}], "id": "q03"}, {"question": "Why is 'elimination' described as the 'secret weapon' for solving grid puzzles?", "options": [{"text": "It allows solvers to guess the answer quickly without needing all clues.", "isCorrect": false, "rationale": "Elimination is a process of systematic deduction, directly opposing guessing, and requires careful use of clues."}, {"text": "It provides a clear pathway to identify the correct answer by systematically ruling out incorrect possibilities.", "isCorrect": true, "rationale": "The definition states: \"Elimination is the process of ruling out options that cannot be correct. When you eliminate enough wrong answers, the right answer is the only one left.\" This systematic ruling out is its power."}, {"text": "It helps in identifying which clues are misleading or irrelevant to the puzzle.", "isCorrect": false, "rationale": "Elimination helps process clues, not dismiss them as misleading. All clues are assumed to be relevant and truthful in a standard logic puzzle."}, {"text": "It is a complex mathematical formula used to calculate probabilities.", "isCorrect": false, "rationale": "Elimination is a logical process of deduction, not a mathematical formula for probability calculation. It deals with certainties (yes/no) rather than probabilities."}], "id": "q04"}, {"question": "Which common misconception do students often make when solving grid puzzles, according to the 'teachernote' section?", "options": [{"text": "They overuse the 'last one standing' rule, applying it incorrectly.", "isCorrect": false, "rationale": "The text notes students *forget* the 'last one standing' rule, not that they overuse or misapply it. It's a tool they often miss."}, {"text": "They try to guess answers instead of using logical elimination based on clues.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states: \"Students try to guess instead of using elimination. Stress that every mark on the grid must come from a clue or a logical deduction.\""}, {"text": "They combine all clues at once, leading to confusion.", "isCorrect": false, "rationale": "While students might struggle to combine clues, the suggested approach is to work through them one at a time and revisit, not that combining them *all at once* is the specific misconception mentioned as a primary one."}, {"text": "They draw their grids too small, making them difficult to read.", "isCorrect": false, "rationale": "This is a practical issue not mentioned as a 'common misconception' in the provided text's dedicated section."}], "id": "q05"}, {"question": "Consider the 'Pet Puzzle' example. If the second clue was 'Blake does not have a dog, and Blake does not have a fish,' and the grid was set up, what is the immediate logical deduction for Blake's pet?", "options": [{"text": "Blake must have a dog.", "isCorrect": false, "rationale": "The clue explicitly states Blake does not have a dog, so this is incorrect."}, {"text": "Blake's pet remains unknown until more clues are found.", "isCorrect": false, "rationale": "This specific clue, by eliminating two out of three possibilities, allows for an immediate deduction using the 'Last One Standing Rule' within Blake's row."}, {"text": "Blake must have a cat.", "isCorrect": true, "rationale": "If Blake does not have a dog (X) and does not have a fish (X), and there are only three pet options (cat, dog, fish), then by the 'Last One Standing Rule,' Blake must have the cat (✓)."}, {"text": "The clue provides no new information without knowing Alex's pet.", "isCorrect": false, "rationale": "The clue provides direct information about Blake that can be used independently to make a deduction about Blake's pet, regardless of Alex's."}], "id": "q06"}, {"question": "When a checkmark (✓) is placed in a cell to indicate a definite match, what immediate action should be taken regarding the rest of that row and column?", "options": [{"text": "All other cells in that row and column should be marked with question marks.", "isCorrect": false, "rationale": "The puzzle uses 'X' for 'no,' not question marks, and definitive eliminations are required."}, {"text": "All other cells in that row and column can be ignored as they are no longer relevant.", "isCorrect": false, "rationale": "Ignoring them is not the correct procedural step; they must be explicitly marked 'X' to reflect the puzzle's constraints."}, {"text": "All other cells in that row and column must be marked with an 'X'.", "isCorrect": true, "rationale": "The text states: \"The key rule: every row gets exactly one ✓ and every column gets exactly one ✓. These are the constraints of the puzzle — the rules that limit what's allowed. Once you place a ✓, you can X out the rest of that row and column.\""}, {"text": "The puzzle is complete, and no further marks are needed.", "isCorrect": false, "rationale": "Placing one checkmark does not complete the entire puzzle; it's a step that leads to further deductions and eliminations, which must be explicitly marked."}], "id": "q07"}, {"question": "Moving from a 3x3 grid puzzle to a 4x4 grid puzzle, as described in the text, primarily introduces which new challenge or characteristic?", "options": [{"text": "A completely different set of rules for marking the grid.", "isCorrect": false, "rationale": "The text states: \"The strategy is exactly the same,\" meaning the rules for marking (X and ✓) and 'last one standing' remain consistent."}, {"text": "The requirement for using advanced mathematical equations to solve.", "isCorrect": false, "rationale": "The text does not mention advanced math for 4x4 grids; it remains a logical deduction process."}, {"text": "More items in each category, leading to more clues, more eliminations, and increased complexity.", "isCorrect": true, "rationale": "The text explains: \"A 4x4 grid puzzle has four items in each category. More items means more clues, more X's, and more satisfying 'aha!' moments.\" This signifies increased complexity due to more variables."}, {"text": "The need to guess more frequently due to fewer definitive clues.", "isCorrect": false, "rationale": "The text emphasizes that guessing is to be avoided, and more items typically mean more clues, not fewer, to ensure solvability."}], "id": "q08"}, {"question": "The 'thinkaboutit' section explains that the process of elimination is a form of which type of reasoning?", "options": [{"text": "Inductive reasoning", "isCorrect": false, "rationale": "Inductive reasoning involves forming generalizations from specific observations, which is different from elimination, which deduces specific conclusions from established premises."}, {"text": "Abductive reasoning", "isCorrect": false, "rationale": "Abductive reasoning involves inferring the most likely explanation for a set of observations, which is not the same as systematically ruling out possibilities to arrive at a certain conclusion."}, {"text": "Deductive reasoning", "isCorrect": true, "rationale": "The text states: \"Why does elimination work? ... This is actually a form of deductive reasoning that you learned about earlier in this book!\" Deductive reasoning ensures that if the premises are true, the conclusion must also be true."}, {"text": "Analogical reasoning", "isCorrect": false, "rationale": "Analogical reasoning involves drawing comparisons between two similar situations, which is not the core mechanism of elimination."}], "id": "q09"}, {"question": "What significant contribution did Lewis Carroll make to the field of logic, as highlighted in the 'logiclegend' section?", "options": [{"text": "He invented the 5x5 'Einstein's Riddle' puzzle.", "isCorrect": false, "rationale": "The text notes that 'Einstein's Riddle' was probably not written by Einstein, and it does not attribute its invention to Carroll."}, {"text": "He wrote 'Alice's Adventures in Wonderland' as a complex logic textbook.", "isCorrect": false, "rationale": "While he wrote 'Alice's Adventures in Wonderland,' the text states he also wrote 'The Game of Logic,' emphasizing that he believed logic should be fun, not that Wonderland *is* a textbook."}, {"text": "He proved that logic puzzles are purely entertainment and have no educational value.", "isCorrect": false, "rationale": "The text states, \"Carroll showed the world that puzzles aren't just entertainment; they're a workout for your brain,\" directly contradicting this option."}, {"text": "He invented numerous logic puzzles and games, emphasizing that logic should be fun and a 'workout for your brain'.", "isCorrect": true, "rationale": "The text explains: \"Carroll invented dozens of logic puzzles and games, and he wrote a book called The Game of Logic that taught reasoning... He believed that logic should be fun — and that's exactly the spirit of this chapter. Carroll showed the world that puzzles aren't just entertainment; they're a workout for your brain.\""}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
