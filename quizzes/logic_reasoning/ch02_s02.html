    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a circular definition?", "options": [{"text": "A definition that is too broad and includes too many things.", "isCorrect": false, "rationale": "A too-broad definition is a separate type of bad definition. Circularity specifically means using the defined word (or a form of it) within the definition itself."}, {"text": "A definition that uses the word being defined, or a form of it, in the definition itself.", "isCorrect": true, "rationale": "This is the exact definition given in the section. Examples: 'A clock is a device that clocks time' or 'Freedom is the state of being free.'"}, {"text": "A definition that applies to only one specific example.", "isCorrect": false, "rationale": "A definition that is too restrictive is called a too-narrow definition, not a circular one."}, {"text": "A definition that uses emotional language to persuade the reader.", "isCorrect": false, "rationale": "Using emotional language is related to loaded language and connotation, not to the logical problem of circularity."}]}, {"question": "Which of the following is an example of a circular definition?", "options": [{"text": "A vehicle is a machine with four wheels that uses gasoline.", "isCorrect": false, "rationale": "This is an example of a too-narrow definition — it excludes motorcycles, electric cars, and boats. It is not circular."}, {"text": "A dog is an animal with four legs.", "isCorrect": false, "rationale": "This is a too-broad definition — it also describes cats, horses, and elephants. It does not use 'dog' inside the definition."}, {"text": "A brave person is someone who has bravery.", "isCorrect": true, "rationale": "This uses 'bravery' (a form of 'brave') to define 'brave person' — it goes in a circle and provides no new information."}, {"text": "A triangle is a shape with exactly three straight sides.", "isCorrect": false, "rationale": "This is an example of a good definition: it names the category (shape) and the differentia (three straight sides). It is not circular."}]}, {"question": "What problem does a too-broad definition create?", "options": [{"text": "It uses the word being defined in its own explanation.", "isCorrect": false, "rationale": "Using a word in its own definition is the problem with circular definitions, not too-broad ones."}, {"text": "It leaves out things that should be included in the definition.", "isCorrect": false, "rationale": "Leaving out things that should be included is the problem with too-narrow definitions."}, {"text": "It accidentally includes too many things, failing to narrow down the concept adequately.", "isCorrect": true, "rationale": "A too-broad definition applies to many things beyond its intended target. For example, 'an animal with four legs' as a definition of dog also includes cats, horses, and elephants."}, {"text": "It uses shifting word meanings to disguise an invalid argument.", "isCorrect": false, "rationale": "Shifting word meanings within an argument is the equivocation fallacy, a separate concept from too-broad definitions."}]}, {"question": "The section describes 'The Goldilocks Rule' for definitions. What does this rule state?", "options": [{"text": "A good definition should always include an example.", "isCorrect": false, "rationale": "Examples are helpful but are not what the Goldilocks Rule requires. The rule is about the scope of the definition itself."}, {"text": "A good definition should be not too broad, not too narrow, but just right — including everything the word covers and excluding everything it doesn't.", "isCorrect": true, "rationale": "This is the Goldilocks Rule as stated in the section. A correct definition has exact scope: it includes all instances and excludes all non-instances."}, {"text": "A good definition must use simple, everyday language.", "isCorrect": false, "rationale": "Simplicity of language is not the Goldilocks criterion. Technical language (like 'Canis familiaris') is acceptable if it achieves the right scope."}, {"text": "A good definition should be neither circular nor equivocal.", "isCorrect": false, "rationale": "While avoiding circularity and equivocation is important, the Goldilocks Rule specifically addresses the scope (too broad vs. too narrow) of definitions."}]}, {"question": "According to the section, what are the two components of a strong definition?", "options": [{"text": "The denotation and the connotation.", "isCorrect": false, "rationale": "Denotation and connotation describe aspects of word meaning, but they are not the two-part method for writing strong definitions described in this section."}, {"text": "The premise and the conclusion.", "isCorrect": false, "rationale": "Premises and conclusions are parts of arguments, not components of definitions. The section introduces a different two-part structure for definitions."}, {"text": "The category (genus) and the difference (differentia).", "isCorrect": true, "rationale": "The section explains: first identify the general group the thing belongs to (genus), then identify what makes it distinct from other members of that group (differentia)."}, {"text": "The denotation and the differentia.", "isCorrect": false, "rationale": "While 'differentia' is one of the two components, the other is the genus (category), not the denotation. These are distinct concepts in the section."}]}, {"question": "Which of the following definitions of 'bicycle' best applies the category + difference method?", "options": [{"text": "A bicycle is something you ride.", "isCorrect": false, "rationale": "This is too broad — it also describes horses, motorcycles, and elevators. It names no specific category and provides no differentiating features."}, {"text": "A bicycle is what people use instead of a car.", "isCorrect": false, "rationale": "This is a functional comparison, not a proper definition. It does not specify the category or distinguishing features."}, {"text": "A bicycle is a human-powered vehicle with two wheels, a frame, and pedals.", "isCorrect": true, "rationale": "This applies the method correctly: 'vehicle' is the genus (category), and 'human-powered, two wheels, frame, pedals' are the differentia that distinguish it from other vehicles."}, {"text": "A bicycle is a machine that bicyclists use to bicycle.", "isCorrect": false, "rationale": "This is circular — it uses 'bicyclist' and 'bicycle' to define 'bicycle,' which provides no new information."}]}, {"question": "What is equivocation?", "options": [{"text": "A definition that is too vague to apply in real situations.", "isCorrect": false, "rationale": "Vagueness is a word-meaning problem covered in the next section. Equivocation is a specific fallacy involving word-meaning shifts within a single argument."}, {"text": "Using a word with two or more different meanings within the same argument, making the argument appear valid when it isn't.", "isCorrect": true, "rationale": "This is the exact definition from the section. The classic example: 'The sign said fine for parking here. So I parked there. It's fine!' — where 'fine' shifts from penalty to acceptable."}, {"text": "Using emotionally charged words to manipulate the reader's feelings.", "isCorrect": false, "rationale": "Using emotional words to manipulate is loaded language (or connotation), not equivocation. Equivocation is specifically about a word shifting meanings mid-argument."}, {"text": "Providing a definition that excludes important cases.", "isCorrect": false, "rationale": "Excluding important cases is the problem with too-narrow definitions. Equivocation is about word-meaning shifts, not definitional scope."}]}, {"question": "In the example 'Only man is rational. No woman is a man. Therefore, no woman is rational,' what word shifts meaning?", "options": [{"text": "'Rational'", "isCorrect": false, "rationale": "'Rational' is used consistently throughout the argument. The equivocation occurs with a different word."}, {"text": "'Only'", "isCorrect": false, "rationale": "'Only' is a quantifier and does not shift meaning across the argument. The fallacy lies with a different word."}, {"text": "'Man'", "isCorrect": true, "rationale": "In the first premise, 'man' means 'humankind' (all rational beings). In the second premise, 'man' means 'male person.' This shift makes the argument appear valid while it is actually fallacious."}, {"text": "'Woman'", "isCorrect": false, "rationale": "'Woman' is used consistently to mean 'female person' throughout the argument. The shift occurs with 'man,' not 'woman.'"}]}, {"question": "What is the difference between the denotation and the connotation of a word?", "options": [{"text": "Denotation is the emotional meaning; connotation is the dictionary meaning.", "isCorrect": false, "rationale": "This reverses the definitions. Denotation is the literal/dictionary meaning; connotation is the emotional or associative meaning."}, {"text": "Denotation is the literal dictionary definition; connotation is the emotions, feelings, or associations the word carries.", "isCorrect": true, "rationale": "The section states: denotation of 'home' is 'a place where someone lives.' Its connotation includes warmth, family, and safety — feelings beyond the literal definition."}, {"text": "Denotation is specific to formal writing; connotation is used only in everyday speech.", "isCorrect": false, "rationale": "Both denotation and connotation exist in all uses of language. The distinction is about the type of meaning, not the register of writing."}, {"text": "Denotation and connotation are two ways of saying the same thing — they refer to the same meaning.", "isCorrect": false, "rationale": "The section's example illustrates a clear contrast: 'home' and 'residence' share the same denotation but have very different connotations."}]}, {"question": "How does the section recommend spotting equivocation in an argument?", "options": [{"text": "Check whether the argument uses any vague or loaded words.", "isCorrect": false, "rationale": "Vague and loaded words are related but different problems. The test for equivocation specifically involves checking whether a word is being used the same way each time it appears."}, {"text": "Ask: 'Is this word being used the same way every time it appears? If not, equivocation has occurred.'", "isCorrect": true, "rationale": "The section states this explicitly: 'Ask yourself, \"Is this word being used the same way every time it appears?\" If not, you've found equivocation.'"}, {"text": "Replace every technical term with its category and differentia.", "isCorrect": false, "rationale": "The category + differentia method is for writing definitions, not for detecting equivocation. Equivocation detection requires tracking word meanings across uses."}, {"text": "Determine whether the argument has a false premise.", "isCorrect": false, "rationale": "Identifying false premises relates to evaluating soundness. Equivocation is a structural fallacy that can occur even when premises are technically true — but only if the same word is read consistently."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
