<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following sentences is a proposition according to the definition provided in the text?", "options": [{"text": "Please close the door quietly!", "isCorrect": false, "rationale": "This is a command, which cannot be labeled as true or false. Therefore, it is not a proposition."}, {"text": "What is the capital of France?", "isCorrect": false, "rationale": "This is a question, which cannot be labeled as true or false. Therefore, it is not a proposition."}, {"text": "The Eiffel Tower is located in Paris.", "isCorrect": true, "rationale": "This sentence makes a factual claim that can be definitively labeled as either true or false (in this case, true). Therefore, it is a proposition."}, {"text": "Oh, what a beautiful day!", "isCorrect": false, "rationale": "This is an exclamation, which expresses emotion and cannot be labeled as true or false. Therefore, it is not a proposition."}]}, {"question": "A student is told, 'You need a permission slip AND a packed lunch for the field trip.' If the student only brings a packed lunch but no permission slip, what is the logical outcome according to the 'AND' connective?", "options": [{"text": "The statement is true because they brought one of the required items.", "isCorrect": false, "rationale": "The 'AND' connective requires *both* parts to be true for the overall statement to be true. Bringing only one item does not satisfy this condition."}, {"text": "The student can still go on the trip because 'AND' means at least one item is sufficient.", "isCorrect": false, "rationale": "'AND' does not mean 'at least one item is sufficient'; that is the definition of 'OR' in logic. For 'AND', both conditions must be met."}, {"text": "The statement 'You need a permission slip AND a packed lunch' is false, and the student will likely not go.", "isCorrect": true, "rationale": "For an 'AND' statement to be true, both propositions connected by 'AND' must be true. Since the student lacks the permission slip, the first proposition ('You need a permission slip') is not met, making the entire 'AND' statement false, meaning the condition for the trip is not met."}, {"text": "The statement is neither true nor false; it depends on the teacher's discretion.", "isCorrect": false, "rationale": "In propositional logic, statements are strictly true or false. The truth value of an 'AND' statement is determined solely by the truth values of its component propositions."}]}, {"question": "The text states that in logic, the 'OR' connective is inclusive. If a restaurant offers 'soup OR salad' with a meal, and a customer, through a special request, receives both soup and salad, how would this outcome be evaluated logically based on the provided definition of 'OR'?", "options": [{"text": "The statement 'soup OR salad' is false because the customer received both, violating the 'either/or' expectation.", "isCorrect": false, "rationale": "This reflects the common misconception of 'either/or' (exclusive OR). In logical 'OR' (inclusive), if both parts are true, the overall statement is still true."}, {"text": "The statement 'soup OR salad' is true because 'OR' in logic means 'at least one' part is true, and receiving both fulfills this.", "isCorrect": true, "rationale": "The text explicitly states that in logic, 'OR' is inclusive, meaning it is true even if both parts are true. Receiving both soup and salad means 'at least one' condition is met, thus the statement is logically true."}, {"text": "The statement 'soup OR salad' cannot be evaluated as true or false in this scenario.", "isCorrect": false, "rationale": "A logical 'OR' statement always has a definite truth value based on its components. The inclusive nature of 'OR' allows for evaluation even when both components are true."}, {"text": "The restaurant's offer becomes ambiguous and requires clarification.", "isCorrect": false, "rationale": "While 'or' can be ambiguous in everyday language, the text clarifies that in propositional logic, 'OR' has a precise, inclusive meaning."}]}, {"question": "Let proposition P be 'The sky is blue.' What is the truth value of the statement ' NOT P' if the sky is actually green?", "options": [{"text": "True", "isCorrect": true, "rationale": "If the sky is green, then the proposition P ('The sky is blue') is false. The 'NOT' connective flips the truth value, so 'NOT P' (It is not true that the sky is blue) becomes true."}, {"text": "False", "isCorrect": false, "rationale": "If P is false (because the sky is green), then 'NOT P' must be true. The 'NOT' connective reverses the truth value."}, {"text": "Cannot be determined", "isCorrect": false, "rationale": "The truth value can be determined. Given that P is false, 'NOT P' is definitively true."}, {"text": "Depends on the observer", "isCorrect": false, "rationale": "The truth value in logic is objective, not subjective. If 'The sky is blue' is false, then 'NOT The sky is blue' is true."}]}, {"question": "Which of the following scenarios best illustrates the application of the 'IF THEN' connective, as described in the text?", "options": [{"text": "A recipe that requires flour AND sugar.", "isCorrect": false, "rationale": "This scenario requires two conditions to be met simultaneously, which is characteristic of the 'AND' connective, not 'IF THEN'."}, {"text": "A student can choose to write an essay OR give a presentation for their final project.", "isCorrect": false, "rationale": "This scenario offers two alternatives, where at least one needs to be chosen, which is characteristic of the 'OR' connective."}, {"text": "A sign that says, 'If you are late, then you will miss the first act.'", "isCorrect": true, "rationale": "This statement clearly sets up a condition ('you are late' - antecedent) and a consequence ('you will miss the first act' - consequent), which is the definition of the 'IF THEN' connective."}, {"text": "A weather report stating that it is NOT raining.", "isCorrect": false, "rationale": "This scenario involves negating a single statement, which is the function of the 'NOT' connective."}]}, {"question": "Consider the statement: 'If you study, then you'll do well on the test.' Based on the text's discussion of the 'IF THEN' connective, what conclusion can be drawn if a student does *not* study?", "options": [{"text": "The student will definitely do badly on the test.", "isCorrect": false, "rationale": "The text explicitly states that 'The conditional only promises what happens when the “if” part is true.' It does not make a promise about what happens if the 'if' part is false (i.e., if you don't study)."}, {"text": "The student might still do well on the test, as the conditional only specifies what happens when the antecedent is true.", "isCorrect": true, "rationale": "The text clarifies that the 'IF THEN' statement only guarantees a consequence when the 'if' part is met. If the 'if' part is not met (student doesn't study), the statement doesn't specify an outcome for the test, meaning doing well is still a possibility (perhaps due to prior knowledge or luck)."}, {"text": "The statement becomes entirely false.", "isCorrect": false, "rationale": "The truth value of an 'IF THEN' statement when the antecedent is false is more complex and will be covered in Section 4.2, but it is not necessarily false if the antecedent is not met. The text implies a lack of guarantee, not a guaranteed falsity."}, {"text": "The conditional relationship is reversed, meaning 'If you do badly, then you didn't study.'", "isCorrect": false, "rationale": "The text cautions against thinking 'if then' means the same thing both directions. Reversing the conditional is a common logical fallacy and is not implied by the original statement."}]}, {"question": "A logical connective is defined as a word or phrase that joins propositions together to make a new, bigger proposition. Which of the following best exemplifies this definition?", "options": [{"text": "'Close the door!' which is a command.", "isCorrect": false, "rationale": "A command is not a proposition, and 'Close the door!' is a single statement, not a combination of propositions."}, {"text": "'7 + 5 = 12,' which is a single true proposition.", "isCorrect": false, "rationale": "This is an example of a proposition, but it is a simple one, not a combination of two propositions using a connective."}, {"text": "'The cafeteria serves pizza on Fridays,' which is a verifiable statement.", "isCorrect": false, "rationale": "This is also an example of a simple proposition, not a larger proposition formed by joining two smaller ones with a connective."}, {"text": "'It is raining AND I forgot my umbrella,' which combines two simple statements.", "isCorrect": true, "rationale": "This statement uses the 'AND' connective to join two separate propositions ('It is raining' and 'I forgot my umbrella') into a single, larger proposition."}]}, {"question": "If P = 'The library is open' and Q = 'I can study there,' how would the statement 'If the library is not open, then I cannot study there' be written in symbolic form?", "options": [{"text": "NOT P AND Q", "isCorrect": false, "rationale": "This translates to 'The library is not open AND I can study there,' which uses the wrong connective (AND instead of IF THEN) and does not negate Q."}, {"text": "IF NOT P THEN NOT Q", "isCorrect": true, "rationale": "The phrase 'If the library is not open' translates to 'NOT P', and 'then I cannot study there' translates to 'NOT Q'. The 'If...then' structure connects them as IF NOT P THEN NOT Q."}, {"text": "IF P THEN NOT Q", "isCorrect": false, "rationale": "This translates to 'If the library is open, then I cannot study there,' which negates the consequent but not the antecedent."}, {"text": "IF P THEN Q", "isCorrect": false, "rationale": "This translates to 'If the library is open, then I can study there,' which is the converse of the intended statement and negates neither component."}]}, {"question": "Which of the following propositions best demonstrates the concept of 'negation' (NOT)?", "options": [{"text": "The cat is either black or white.", "isCorrect": false, "rationale": "This uses the 'OR' connective, indicating disjunction, not negation."}, {"text": "The sun is shining AND the birds are singing.", "isCorrect": false, "rationale": "This uses the 'AND' connective, indicating conjunction, not negation."}, {"text": "It is not raining outside.", "isCorrect": true, "rationale": "This statement directly applies 'NOT' to the proposition 'It is raining outside,' flipping its truth value and exemplifying negation."}, {"text": "If it snows, then school will be canceled.", "isCorrect": false, "rationale": "This uses the 'IF THEN' connective, indicating a conditional relationship, not negation."}]}, {"question": "The 'didyouknow' section mentions that logic gates in computers perform AND, OR, and NOT operations. What is the main implication of this for understanding these connectives?", "options": [{"text": "The symbols $$, $$, and $$ are primarily used in computer programming languages.", "isCorrect": false, "rationale": "While related to computer logic, the text clarifies that the symbols are for logical notation, and understanding the words is more important than memorizing symbols immediately. The primary implication isn't about the symbols themselves."}, {"text": "Understanding logical AND, OR, and NOT helps in comprehending the fundamental operations underlying digital technology.", "isCorrect": true, "rationale": "The text states that 'when you understand AND, OR, and NOT, you're speaking the language of computers,' directly implying that these connectives are the basic building blocks of digital operations and fundamental to understanding how computers work."}, {"text": "The 'IF THEN' connective is not used in computer logic.", "isCorrect": false, "rationale": "The 'didyouknow' section specifically mentions AND, OR, and NOT, but it does not state that 'IF THEN' is excluded from computer logic, which also utilizes conditional statements (though often implemented through combinations of other gates)."}, {"text": "Propositional logic is only relevant for advanced computer science students.", "isCorrect": false, "rationale": "The text is introducing these concepts at a basic level, suggesting their broad applicability and importance, even for general understanding, not just advanced students."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
