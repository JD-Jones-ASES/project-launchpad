<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic of a 'credible' source according to the text?", "options": [{"text": "It has a professional website design.", "isCorrect": false, "rationale": "The text identifies the assumption that 'if a website looks professional, it must be trustworthy' as a common misconception. Design quality and factual accuracy are different things."}, {"text": "It provides good reasons to believe its information is accurate.", "isCorrect": true, "rationale": "The definition of credibility states, 'A credible source is one that gives you good reasons to believe its information is accurate.'"}, {"text": "It appears first in search engine results.", "isCorrect": false, "rationale": "The text explicitly states it's a misconception to believe 'if something shows up on a search engine, it must be true,' as search rankings are based on popularity, not accuracy."}, {"text": "It uses strong emotional language to convince the reader.", "isCorrect": false, "rationale": "Emotional language is listed as a 'red flag' and often indicates a purpose to persuade rather than to inform accurately, which detracts from credibility."}]}, {"question": "Which of the following statements represents a common misconception about evaluating online information, as identified in the text?", "options": [{"text": "Professional-looking websites are always trustworthy.", "isCorrect": true, "rationale": "The text lists 'Students assume that if a website looks professional, it must be trustworthy' as a common misconception, emphasizing that design quality and factual accuracy are different."}, {"text": "Even well-known sources can have bias or errors.", "isCorrect": false, "rationale": "This is a factual statement presented in the text to correct a misconception ('Students think only “fake news” sites are unreliable'). It is not a misconception itself."}, {"text": "Lateral reading is a useful technique for verifying claims.", "isCorrect": false, "rationale": "Lateral reading is presented as a 'pro tip' and an effective strategy for evaluating sources, not a misconception."}, {"text": "Good arguments are built on good evidence.", "isCorrect": false, "rationale": "This is a foundational truth presented in the text ('Good arguments are built on good evidence.'). It is not a misconception."}]}, {"question": "You find an article titled 'The Future of Space Travel' published in 2008. If you are researching current advancements in space technology, which CRAAP test criterion would raise a 'red flag'?", "options": [{"text": "Relevance", "isCorrect": false, "rationale": "The topic 'The Future of Space Travel' is relevant to 'current advancements in space technology,' so this criterion is likely met in terms of subject matter."}, {"text": "Authority", "isCorrect": false, "rationale": "The prompt does not provide information about the author or their qualifications, so we cannot evaluate Authority based on this specific information."}, {"text": "Currency", "isCorrect": true, "rationale": "An article from 2008 is over 15 years old. For 'current advancements' in a rapidly evolving field like space technology, this information is likely 'outdated,' which directly relates to the Currency criterion."}, {"text": "Purpose", "isCorrect": false, "rationale": "The prompt does not provide information about why the article was written (e.g., to inform, persuade, sell), so we cannot evaluate Purpose based on this information."}]}, {"question": "A blog post about a new medical treatment is written by 'WellnessGuru23' with no further information about their background or credentials. Which CRAAP test criterion is most severely lacking?", "options": [{"text": "Accuracy", "isCorrect": false, "rationale": "While the information might be inaccurate, the *lack of information* about the author's qualifications is the primary issue presented in the scenario, making Authority the more direct answer."}, {"text": "Currency", "isCorrect": false, "rationale": "The scenario does not provide a date for the blog post, so we cannot assess its currency."}, {"text": "Authority", "isCorrect": true, "rationale": "The Authority criterion asks 'Who wrote this? What are their qualifications?' A generic screen name like 'WellnessGuru23' with no bio indicates a severe lack of information regarding the author's expertise, making it difficult to trust their claims about a medical treatment."}, {"text": "Relevance", "isCorrect": false, "rationale": "Assuming the medical treatment is what you are researching, the topic itself would be relevant."}]}, {"question": "A website claims that a specific food can 'instantly cure all allergies' and provides no scientific studies, data, or expert endorsements to back this up. Which CRAAP test criterion is primarily violated?", "options": [{"text": "Purpose", "isCorrect": false, "rationale": "While such a claim might be designed to sell something, the immediate and most glaring issue is the absence of supporting evidence, which falls under Accuracy."}, {"text": "Accuracy", "isCorrect": true, "rationale": "The Accuracy criterion asks, 'Is the information supported by evidence? Can you verify it elsewhere? If a claim has no sources, data, or references, be suspicious.' Making a grandiose claim ('instantly cure all allergies') without any supporting evidence directly violates this criterion."}, {"text": "Relevance", "isCorrect": false, "rationale": "The claim about food curing allergies would be relevant if you were researching allergy treatments."}, {"text": "Authority", "isCorrect": false, "rationale": "The scenario doesn't mention the author, but the *nature of the claim* and the *lack of evidence* are the core issues, making Accuracy more central than Authority in this specific description."}]}, {"question": "An article uses highly emotional language, makes sweeping generalizations, and encourages readers to buy a specific 'miracle product' mentioned throughout the text. This primarily indicates a problem with which CRAAP test criterion?", "options": [{"text": "Currency", "isCorrect": false, "rationale": "The scenario provides no information about when the article was written or updated."}, {"text": "Authority", "isCorrect": false, "rationale": "While the author's authority might be questionable given the content, the emotional language and sales pitch directly speak to the 'Why was this written?' question."}, {"text": "Purpose", "isCorrect": true, "rationale": "The Purpose criterion asks, 'Why was this written? Is the author trying to inform you, persuade you, sell you something, or entertain you?' Emotional language, sweeping generalizations, and encouraging product purchases clearly indicate a persuasive or selling purpose, which can signal bias and affect credibility."}, {"text": "Relevance", "isCorrect": false, "rationale": "The article's subject could still be relevant to a user's research, even if its purpose is biased."}]}, {"question": "When a professional fact-checker encounters 'The Global Truth Alliance' website making a controversial claim, they immediately open a new tab to search 'What is The Global Truth Alliance?'. This action is an example of which technique?", "options": [{"text": "Applying the Currency criterion.", "isCorrect": false, "rationale": "Checking the date of the claim or website would be applying Currency, but searching for information about the organization itself is different."}, {"text": "Identifying anecdotal evidence.", "isCorrect": false, "rationale": "This action is about evaluating the source, not looking for personal stories within its content."}, {"text": "Performing lateral reading.", "isCorrect": true, "rationale": "The text defines lateral reading as 'Instead of spending a long time reading one source carefully, open new tabs and search for what other people say about that source or claim.' This example perfectly matches that description."}, {"text": "Evaluating the website's design for professionalism.", "isCorrect": false, "rationale": "While a website's design might be observed, the specific action of searching for information about the organization in a new tab is lateral reading, not design evaluation."}]}, {"question": "You encounter an online article with the headline 'YOU WON'T BELIEVE What Scientists Just Discovered About Your Brain!' The article lacks an author's name, has no date, and is surrounded by numerous pop-up advertisements. Which of these elements is *not* listed in the text as a 'red flag'?", "options": [{"text": "No author listed.", "isCorrect": false, "rationale": "'No author listed' is explicitly mentioned as a red flag in the text."}, {"text": "No date.", "isCorrect": false, "rationale": "'No date' is explicitly mentioned as a red flag in the text."}, {"text": "Emotional headline.", "isCorrect": false, "rationale": "'Emotional headlines' like 'You WON'T BELIEVE What Happens Next!' are explicitly mentioned as a red flag designed to grab clicks, not inform."}, {"text": "The scientific content being too complex.", "isCorrect": true, "rationale": "The text does not list 'scientific content being too complex' as a red flag for unreliability. The other options are direct red flags from the 'Red Flags to Watch For' section."}]}, {"question": "You need to find a credible source for a research paper on climate change. Which of the following would generally be considered the *most* reliable option based on the CRAAP test principles?", "options": [{"text": "A 2010 blog post titled 'Climate Change is a Myth' by 'EarthSavior22.'", "isCorrect": false, "rationale": "This source fails on Currency (old), Authority (anonymous screen name), Accuracy (likely biased claims), and Purpose (persuasive, not informative)."}, {"text": "A recently updated report from a government science agency, citing multiple studies.", "isCorrect": true, "rationale": "This option passes all CRAAP criteria: Currency (recently updated), Relevance (about climate change), Authority (government science agency, implying credentialed scientists), Accuracy (citing multiple studies), and Purpose (to inform)."}, {"text": "A viral social media post claiming a new 'secret' about the atmosphere.", "isCorrect": false, "rationale": "Social media posts are often unreliable; this option lacks Authority (unspecified author), Accuracy (unverified 'secret'), and Purpose (likely sensationalism), and possibly Currency."}, {"text": "An article from a news website known for sensational headlines and political commentary.", "isCorrect": false, "rationale": "Such a source might have issues with Accuracy (sensationalism), Purpose (to excite or persuade rather than inform objectively), and Authority (depending on the specific authors and editorial standards)."}]}, {"question": "Someone argues, 'My cousin tried that diet and lost 20 pounds in a week, so it must be really effective for everyone!' This statement is an example of what kind of fallacious reasoning?", "options": [{"text": "Appealing to authority.", "isCorrect": false, "rationale": "Appealing to authority would involve citing an expert or a figure of authority, not a personal relative."}, {"text": "Confirmation bias.", "isCorrect": false, "rationale": "Confirmation bias is the tendency to seek out and interpret information that confirms one's existing beliefs, but this statement is about using a single instance as proof."}, {"text": "Anecdotal evidence.", "isCorrect": true, "rationale": "The 'Fallacy Alert!' section defines anecdotal evidence as 'when someone uses a single personal story as proof of a general claim,' matching this example perfectly."}, {"text": "Slippery slope.", "isCorrect": false, "rationale": "A slippery slope fallacy argues that a single action will inevitably lead to a chain of negative consequences, which is not what this statement describes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
