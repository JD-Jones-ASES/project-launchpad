    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements is NOT a rule for solving a 4x4 Sudoku puzzle, as described in the text?", "options": [{"text": "Each row must contain each number from 1 to 4 exactly once.", "isCorrect": false, "rationale": "This is a fundamental rule of Sudoku, explicitly stated in the 'Sudoku Rules' section."}, {"text": "Each column must contain each number from 1 to 4 exactly once.", "isCorrect": false, "rationale": "This is a fundamental rule of Sudoku, explicitly stated in the 'Sudoku Rules' section."}, {"text": "The sum of the numbers in each row, column, and 2x2 box must always equal 10.", "isCorrect": true, "rationale": "The text explicitly states 'Students think Sudoku requires math — it doesn't! The numbers are just symbols.' Sudoku is about unique placement, not mathematical summation. This option represents a common misconception."}, {"text": "Each bold-outlined 2x2 box must contain each number from 1 to 4 exactly once.", "isCorrect": false, "rationale": "This is a fundamental rule of Sudoku, explicitly stated in the 'Sudoku Rules' section."}], "id": "q01"}, {"question": "The primary strategy for solving Sudoku puzzles, as described in the text, relies on which of the following approaches?", "options": [{"text": "Intuitively guessing numbers for empty cells and adjusting them until the puzzle is solved.", "isCorrect": false, "rationale": "While some trial and error might occur, the primary strategy emphasized is methodical elimination, not random guessing."}, {"text": "Performing complex calculations to determine the numerical relationships between cells.", "isCorrect": false, "rationale": "The text specifically states that Sudoku does not require math; numbers are treated as symbols, making numerical calculations irrelevant to the core logic."}, {"text": "Eliminating possibilities for each empty cell by identifying numbers already present in its corresponding row, column, and 2x2 box.", "isCorrect": true, "rationale": "The text clearly states, 'The strategy? You guessed it — elimination! For each empty cell, figure out which numbers are already in its row, column, and box. Cross those off. If only one number is left, that's your answer.'"}, {"text": "Working backward from a pre-determined solution to fill in the initial empty cells.", "isCorrect": false, "rationale": "The method described is about forward-solving using elimination based on the given numbers, not working backward from a known end state."}], "id": "q02"}, {"question": "According to the 'Common Misconceptions' section, why is it incorrect to think that Sudoku requires strong mathematical skills?", "options": [{"text": "Sudoku is primarily about spatial reasoning and geometric pattern recognition, not arithmetic.", "isCorrect": false, "rationale": "While spatial reasoning is involved, the text's specific explanation for the math misconception is different."}, {"text": "The numbers in Sudoku are merely symbols that could be replaced by colors or letters without changing the puzzle's logic.", "isCorrect": true, "rationale": "The text directly states: 'Students think Sudoku requires math — it doesn't! The numbers are just symbols. You could replace them with colors or letters and the puzzle would work the same way.'"}, {"text": "Most Sudoku puzzles are designed to be solved quickly, leaving no time for complex mathematical operations.", "isCorrect": false, "rationale": "The speed of solving is not the reason why math skills are not required; it's the nature of the numbers as symbols."}, {"text": "Only advanced 9x9 Sudoku puzzles require math, while 4x4 puzzles do not.", "isCorrect": false, "rationale": "The text states the principle applies generally to Sudoku, not just the 4x4 version, as a common misconception."}], "id": "q03"}, {"question": "The definition of Lateral Thinking provided in the text emphasizes which approach to problem-solving?", "options": [{"text": "Following a rigid, predefined set of steps to systematically arrive at a solution.", "isCorrect": false, "rationale": "This describes a methodical, linear approach, which is contrasted with lateral thinking's 'stepping sideways' approach."}, {"text": "Analyzing statistical data to identify trends and predict future outcomes.", "isCorrect": false, "rationale": "Lateral thinking is about creative problem-solving and challenging assumptions, not statistical analysis."}, {"text": "Approaching problems from an unexpected direction and considering possibilities that are not immediately obvious.", "isCorrect": true, "rationale": "The text defines lateral thinking as 'a way of solving problems by approaching them from an unexpected direction. Instead of following the obvious path, you step sideways and consider possibilities that aren't immediately obvious.'"}, {"text": "Relying on previously memorized solutions to similar problems.", "isCorrect": false, "rationale": "Lateral thinking encourages novel approaches, rather than simply recalling past solutions."}], "id": "q04"}, {"question": "The 'Elevator Riddle' and 'Two Coins Riddle' are examples of lateral thinking riddles because they primarily teach solvers to:", "options": [{"text": "Develop the ability to quickly perform mental arithmetic.", "isCorrect": false, "rationale": "Neither riddle primarily tests mathematical ability; they test the ability to interpret language and situations."}, {"text": "Identify and challenge unstated assumptions that limit conventional thinking.", "isCorrect": true, "rationale": "The text explicitly states for the Elevator Riddle, 'The trick was that most people assume she chooses to walk the last 6 floors.' and for the Two Coins Riddle, 'People get tricked because they hear 'one of them is not a nickel' and assume 'neither of them is a nickel.'' Both examples demonstrate the importance of questioning assumptions."}, {"text": "Recall obscure historical facts or trivia.", "isCorrect": false, "rationale": "The riddles do not rely on external knowledge of facts, but rather on how one interprets the given information."}, {"text": "Apply a complex series of logical deductions in a step-by-step manner.", "isCorrect": false, "rationale": "While logic is involved, lateral thinking often involves a 'creative leap' rather than a purely linear deduction, distinguishing it from Sudoku or escape-room chains."}], "id": "q05"}, {"question": "According to the 'Common Misconceptions' section, what is a frequent reason students get stuck when trying to solve lateral thinking riddles?", "options": [{"text": "They fail to break the problem down into smaller, manageable steps.", "isCorrect": false, "rationale": "This is a pitfall for multi-step logic chains, not specifically lateral thinking riddles."}, {"text": "They assume extra constraints or information that are not explicitly provided in the puzzle.", "isCorrect": true, "rationale": "The text states: 'For lateral thinking riddles, students get stuck because they assume extra constraints that aren't in the puzzle. Remind them: only the information given matters.'"}, {"text": "They try to apply mathematical formulas to verbal riddles.", "isCorrect": false, "rationale": "While a misconception, it's not listed as the *frequent reason* students get stuck on lateral thinking riddles; that's more related to Sudoku."}, {"text": "They do not ask enough yes/no questions to gather more information.", "isCorrect": false, "rationale": "Asking yes/no questions is a 'Discussion Tip' for building deductive reasoning, not a common pitfall for getting stuck on lateral thinking riddles themselves."}], "id": "q06"}, {"question": "What is the defining characteristic of an 'escape-room logic chain' as illustrated by 'The Locker Code' example?", "options": [{"text": "All puzzles can be solved independently, with the final answer being a combination of all individual solutions.", "isCorrect": false, "rationale": "The text states, 'each answer gives you information needed for the next puzzle,' implying interdependence, not independence."}, {"text": "The puzzles are intentionally misleading to prevent direct logical deduction.", "isCorrect": false, "rationale": "While challenging, the puzzles are designed to be solvable through logic, not to be misleading in a way that prevents deduction."}, {"text": "Each puzzle's solution provides a crucial piece of information or clue required to solve the subsequent puzzle in the sequence.", "isCorrect": true, "rationale": "The text clearly explains, 'In an escape room, you solve a series of puzzles where each answer gives you information needed for the next puzzle. It's like a chain of logic where every link matters.'"}, {"text": "Success depends primarily on the physical dexterity and speed of the participants.", "isCorrect": false, "rationale": "The focus is on logic and problem-solving skills ('each step uses a different logic skill'), not physical attributes."}], "id": "q07"}, {"question": "According to the text, what is the primary educational value or purpose of 'escape-room puzzles' within the context of the book?", "options": [{"text": "They introduce entirely new types of logic puzzles not covered in previous chapters.", "isCorrect": false, "rationale": "The text states they 'use a different logic skill you've learned in this book,' implying a synthesis of existing skills, not necessarily entirely new ones."}, {"text": "They serve as the ultimate test, requiring the application and synthesis of various logic skills learned throughout the entire textbook.", "isCorrect": true, "rationale": "The text explicitly states: 'Each step uses a different logic skill you've learned in this book... Escape-room puzzles are the ultimate test of everything you know.'"}, {"text": "They are designed to improve students' ability to memorize facts and figures quickly.", "isCorrect": false, "rationale": "The focus is on applying logic skills (syllogisms, fallacies, truth tables), not rote memorization."}, {"text": "They primarily develop skills in collaborative teamwork and communication.", "isCorrect": false, "rationale": "While teamwork can be part of an escape room activity, the text's focus for *logic chains* is on the individual's application of logic skills."}], "id": "q08"}, {"question": "One of the 'Logic Puzzle Strategies — A Summary' points advises to 'Work one step at a time — especially in multi-step chains.' Which common pitfall does this strategy directly help students avoid?", "options": [{"text": "Failing to read all the clues before starting to solve.", "isCorrect": false, "rationale": "While important, 'reading all clues first' is a separate strategy, not directly addressed by 'working one step at a time.'"}, {"text": "Skipping ahead or attempting to solve later steps before completing earlier, prerequisite steps.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section specifically notes: 'In multi-step logic chains, students skip ahead instead of solving one step at a time. Encourage a methodical approach.' This strategy directly counters that pitfall."}, {"text": "Assuming extra constraints that are not actually part of the puzzle.", "isCorrect": false, "rationale": "This is a pitfall related to lateral thinking, addressed by 'Question your assumptions,' not 'working one step at a time.'"}, {"text": "Getting stuck on a single difficult step and giving up entirely.", "isCorrect": false, "rationale": "While a consequence of getting stuck, 'working one step at a time' is about sequential progression, not about overcoming a single blocker. The strategy 'If you're stuck, try a different starting point' is more relevant here."}], "id": "q09"}, {"question": "A student is struggling with a puzzle that requires them to identify a subtle, non-obvious aspect of a situation to find the solution. Based on the section content, which strategy would be MOST appropriate for this specific type of puzzle?", "options": [{"text": "Systematically eliminate possibilities for each unknown element.", "isCorrect": false, "rationale": "This is the primary strategy for Sudoku and similar grid puzzles, where options are clearly defined and can be crossed off."}, {"text": "Assume a potential answer and then rigorously check for contradictions.", "isCorrect": false, "rationale": "This strategy is useful for certain types of logic puzzles (like 'assume and check') but doesn't specifically address subtle, non-obvious aspects."}, {"text": "Question all initial assumptions and look at the problem from an unexpected direction.", "isCorrect": true, "rationale": "This directly aligns with the definition and examples of 'Lateral Thinking,' which focuses on stepping sideways and considering non-obvious possibilities by challenging assumptions."}, {"text": "Break the puzzle into discrete, sequential steps and solve them one at a time.", "isCorrect": false, "rationale": "This is crucial for 'Escape-Room Logic Chains' but less directly addresses the need to find a 'subtle, non-obvious aspect' in a single riddle or problem."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
