    <meta charset="UTF-8">

    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental purpose of using Venn diagrams in logic, as described in the text?", "options": [{"text": "To illustrate the aesthetic beauty of mathematical relationships.", "isCorrect": false, "rationale": "While Venn diagrams can be visually appealing, their primary purpose in logic is not aesthetic but rather to visually represent relationships and test arguments."}, {"text": "To provide a visual representation of how categories are connected and to test the validity of arguments.", "isCorrect": true, "rationale": "The text states, 'A Venn diagram is a picture that uses overlapping circles to show the relationship between categories' and highlights their use to 'see whether an argument made from those statements actually works'."}, {"text": "To count the exact number of items within overlapping sets.", "isCorrect": false, "rationale": "Venn diagrams in logic show the existence or non-existence of items within regions ('at least one thing is there' or 'empty'), not an exact count."}, {"text": "To identify common misconceptions students have about logical reasoning.", "isCorrect": false, "rationale": "Common misconceptions are *about* drawing Venn diagrams correctly, not the purpose *of* the diagrams themselves."}]}, {"question": "According to the conventions for Venn diagrams, what does shading a specific region indicate?", "options": [{"text": "That the region contains at least one item.", "isCorrect": false, "rationale": "Placing an 'X' mark indicates that at least one item exists in a region, not shading."}, {"text": "That the region is empty, meaning nothing exists there.", "isCorrect": true, "rationale": "The 'keyrule' explicitly states, 'Shading a region means it is empty — nothing is there. Think of shading as crossing out that area.'"}, {"text": "That the region is the primary focus of the statement.", "isCorrect": false, "rationale": "Shading conveys information about the contents of a region (emptiness), not its importance or focus."}, {"text": "That the exact number of items in that region is unknown.", "isCorrect": false, "rationale": "Shading provides definite information: the region is empty. An 'X' indicates 'at least one,' where the exact number is unknown but not zero."}]}, {"question": "When drawing a Venn diagram, what is the significance of placing an 'X' mark within a particular region?", "options": [{"text": "It means that region is open for further definition.", "isCorrect": false, "rationale": "An 'X' provides a definite statement about existence, not an open-ended definition."}, {"text": "It signifies that at least one thing exists in that specific area.", "isCorrect": true, "rationale": "The 'keyrule' states, 'An X in a region means at least one thing is there. The X is like a little flag that says, “Something lives here!”'"}, {"text": "It marks a region that is conditionally empty.", "isCorrect": false, "rationale": "An 'X' indicates existence, not conditional emptiness. Shading indicates definite emptiness."}, {"text": "It is a placeholder for information not yet diagrammed.", "isCorrect": false, "rationale": "An 'X' is a definite part of the diagramming process, representing specific information, not a placeholder."}]}, {"question": "You need to diagram the statement 'All professors are scholars' using a two-circle Venn diagram, with 'Professors' as circle A and 'Scholars' as circle B. Which action correctly represents this statement?", "options": [{"text": "Place an 'X' in the overlap region of A and B.", "isCorrect": false, "rationale": "Placing an 'X' in the overlap represents 'Some A are B' (e.g., 'Some professors are scholars')."}, {"text": "Shade the region of circle A that does not overlap with circle B.", "isCorrect": true, "rationale": "The text explains for 'All A are B': 'If all A are B, then there is nothing in A that is outside of B. The part of circle A that doesn't overlap with circle B must be empty. So we shade that region.'"}, {"text": "Shade the entire overlap region of A and B.", "isCorrect": false, "rationale": "Shading the overlap region represents 'No A are B' (e.g., 'No professors are scholars')."}, {"text": "Place an 'X' in the region outside both circles.", "isCorrect": false, "rationale": "Placing an 'X' outside both circles would imply 'Some things are neither professors nor scholars,' which does not represent 'All professors are scholars'."}]}, {"question": "To diagram the statement 'No insects are birds' (with 'Insects' as circle A and 'Birds' as circle B), which region should be marked, and how?", "options": [{"text": "Place an 'X' in the region of A that does not overlap with B.", "isCorrect": false, "rationale": "This action represents 'Some A are not B' (e.g., 'Some insects are not birds')."}, {"text": "Shade the entire overlap region between A and B.", "isCorrect": true, "rationale": "The text states for 'No A are B': 'If no A are B, then there is nothing in the overlap... So we shade the entire overlap region.'"}, {"text": "Place an 'X' in the overlap region between A and B.", "isCorrect": false, "rationale": "This action represents 'Some A are B' (e.g., 'Some insects are birds')."}, {"text": "Shade the region of B that does not overlap with A.", "isCorrect": false, "rationale": "This action would represent 'All B are A' (e.g., 'All birds are insects'), which is incorrect and not how 'No A are B' is directly diagrammed."}]}, {"question": "A student is diagramming 'Some fruits are sweet' (Circle A = Fruits, Circle B = Sweet things). The student correctly places an 'X' in the overlap region. Which categorical form does this diagramming convention specifically represent?", "options": [{"text": "'All A are B'", "isCorrect": false, "rationale": "'All A are B' is represented by shading the A-only region."}, {"text": "'No A are B'", "isCorrect": false, "rationale": "'No A are B' is represented by shading the overlap region."}, {"text": "'Some A are B'", "isCorrect": true, "rationale": "The text states for 'Some A are B': 'If some A are B, then there is at least one thing in the overlap. We mark this by placing an X in the overlap region.'"}, {"text": "'Some A are not B'", "isCorrect": false, "rationale": "'Some A are not B' is represented by placing an 'X' in the A-only region."}]}, {"question": "Consider the statement: 'Some doctors are not surgeons.' If circle A represents 'Doctors' and circle B represents 'Surgeons', where should an 'X' be placed?", "options": [{"text": "In the region where circle A and circle B overlap.", "isCorrect": false, "rationale": "This placement represents 'Some A are B' ('Some doctors are surgeons')."}, {"text": "In the part of circle A that does not overlap with circle B.", "isCorrect": true, "rationale": "The text states for 'Some A are not B': 'We place an X in the part of circle A that does not overlap with circle B.'"}, {"text": "In the part of circle B that does not overlap with circle A.", "isCorrect": false, "rationale": "This placement would represent 'Some B are not A' ('Some surgeons are not doctors')."}, {"text": "Outside both circle A and circle B.", "isCorrect": false, "rationale": "This placement would represent 'Some things are neither doctors nor surgeons'."}]}, {"question": "When testing a three-circle syllogism, after drawing the circles and labeling them, what is the *next* logical step before determining validity?", "options": [{"text": "Diagram the conclusion first to see if it's already true.", "isCorrect": false, "rationale": "The instructions explicitly state, 'Do not diagram the conclusion yet' in step 2 of testing syllogisms."}, {"text": "Place X marks for all particular statements from the premises.", "isCorrect": false, "rationale": "The 'Important rule' states: 'Always diagram universal statements (“All” and “No”) before particular statements (“Some”).'"}, {"text": "Diagram only the premises, shading and placing X marks according to their forms.", "isCorrect": true, "rationale": "Step 2 for testing syllogisms is: 'Diagram the premises only. Shade and place X marks according to the two premises.'"}, {"text": "Analyze the argument's structure without drawing anything.", "isCorrect": false, "rationale": "The question is specifically about the steps for using Venn diagrams to test a syllogism, implying drawing is involved."}]}, {"question": "The text emphasizes a crucial rule for diagramming syllogisms: 'Always diagram universal statements... before particular statements...' What is the primary reason for this sequence?", "options": [{"text": "Universal statements are inherently more important than particular ones in logical proofs.", "isCorrect": false, "rationale": "The reason is practical for diagramming accuracy, not a matter of inherent logical importance."}, {"text": "Shading from universal statements might make a region empty, preventing an X for a particular statement from being placed incorrectly.", "isCorrect": true, "rationale": "The 'keyrule' states: 'Universal statements shade regions, and that shading might affect where you need to place your X. If a region gets shaded, the X can't go there!'"}, {"text": "Particular statements are more complex and require a clearer diagram background.", "isCorrect": false, "rationale": "The complexity of the statement is not the reason for the order; it's about the interaction of shading and 'X' marks."}, {"text": "It saves time by marking large empty regions first.", "isCorrect": false, "rationale": "While it might save time, the primary reason given is to ensure correctness by preventing improper X placement."}]}, {"question": "John Venn's system of Venn diagrams, introduced in 1880, significantly advanced logical reasoning. What was a key innovation of his system compared to previous methods using circles?", "options": [{"text": "He was the first to use any circles at all to represent categories.", "isCorrect": false, "rationale": "The text clarifies, 'Before Venn, other mathematicians had used circles to represent categories'."}, {"text": "His system provided clear rules about shading and overlapping, allowing reliable testing of syllogisms.", "isCorrect": true, "rationale": "The 'logiclegend' section states: 'Venn's system — with its clear rules about shading and overlapping — was the first one that could reliably test whether syllogisms were valid.'"}, {"text": "He developed the concept of a 'universe of discourse' represented by a rectangle.", "isCorrect": false, "rationale": "The text mentions the rectangle but does not credit Venn specifically with this concept or suggest it was his primary innovation compared to prior circle methods."}, {"text": "He proved that all syllogisms could be reduced to a maximum of three premises.", "isCorrect": false, "rationale": "The text does not mention Venn making such a proof; his contribution was a method for testing syllogisms, not a theory about their structure or number of premises."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
