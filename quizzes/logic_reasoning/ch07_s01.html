        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Every morning for the past month, Sarah's bus has arrived at 7:30 AM. Based on this, Sarah concludes that her bus will probably arrive at 7:30 AM tomorrow. Which type of reasoning is Sarah using?", "options": [{"text": "Deductive reasoning, because the conclusion is guaranteed if the premises are true.", "isCorrect": false, "rationale": "Deductive reasoning leads to conclusions that must be true if the premises are true, and it typically moves from general principles to specific conclusions. Sarah's reasoning moves from specific observations (past bus arrivals) to a general expectation (tomorrow's arrival), and the conclusion is only 'probably true,' not guaranteed."}, {"text": "Inductive reasoning, because she is moving from specific observations to a general conclusion that is probably true.", "isCorrect": true, "rationale": "Inductive reasoning involves moving from specific observations or examples to a general conclusion. The text defines induction as reasoning where the conclusion is 'probably true, but not guaranteed to be true,' which perfectly matches Sarah's situation and her use of 'probably.'"}, {"text": "Abductive reasoning, because she is forming the best explanation for her observations.", "isCorrect": false, "rationale": "Abductive reasoning, while related to forming explanations, is not directly discussed in the text and is a different form of reasoning than the inductive reasoning Sarah is employing here, which focuses on predicting a future event based on past patterns."}, {"text": "Circular reasoning, because her conclusion relies on the same past experiences it aims to predict.", "isCorrect": false, "rationale": "While David Hume's 'Problem of Induction' highlights a philosophical challenge related to using past experience to justify future expectations, Sarah's immediate act of predicting based on observed patterns is an example of standard inductive reasoning, not a logical fallacy like circular reasoning in this context."}], "id": "q01"}, {"question": "A local newspaper surveyed 500 residents in one neighborhood about their preferred mayoral candidate and found that 65% supported Candidate A. The newspaper then reported, 'It is likely that Candidate A will win the city-wide election.' In this scenario, what represents the 'population' in the inductive generalization?", "options": [{"text": "The 500 residents surveyed in one neighborhood.", "isCorrect": false, "rationale": "The 500 residents surveyed constitute the 'sample' – the observed members of the group – not the entire group (population) the generalization is about."}, {"text": "The 65% of residents who supported Candidate A.", "isCorrect": false, "rationale": "This represents a specific finding within the sample, not the entire group (population) to which the conclusion is being generalized."}, {"text": "All registered voters in the city.", "isCorrect": true, "rationale": "An inductive generalization is a conclusion about an entire group (the population) based on observations of some members of that group (the sample). The newspaper's conclusion is about 'the city-wide election,' meaning it generalizes to all registered voters in the city, making them the population."}, {"text": "Candidate A.", "isCorrect": false, "rationale": "Candidate A is the subject of the election, not the group (population) that is being generalized about."}], "id": "q02"}, {"question": "Which statement best captures the fundamental difference between deductive and inductive reasoning as described in the text?", "options": [{"text": "Deductive reasoning is used in science, while inductive reasoning is only used in everyday life.", "isCorrect": false, "rationale": "The text explicitly states that science, medicine, and everyday life all depend on induction. Both forms of reasoning have broad applications."}, {"text": "Deductive conclusions are about the past, and inductive conclusions are about the future.", "isCorrect": false, "rationale": "The focus is not on past vs. future. Deductive conclusions are guaranteed if premises are true, regardless of time, and inductive conclusions are probable, which can apply to past, present, or future predictions."}, {"text": "If the premises are true, a deductive conclusion must be true, whereas an inductive conclusion is only probably true.", "isCorrect": true, "rationale": "The text clearly states: 'Deductive reasoning... If the premises are true, the conclusion must be true. It's airtight.' And 'Inductive reasoning... If the premises are true, the conclusion is probably true. It's our best guess based on the evidence.'"}, {"text": "Deductive reasoning moves from specific examples to general conclusions, and inductive reasoning does the opposite.", "isCorrect": false, "rationale": "This is precisely reversed. Inductive reasoning moves from specific examples to general conclusions, while deductive reasoning often moves from general principles to specific conclusions."}], "id": "q03"}, {"question": "A student wants to determine if a new school policy on cell phone use is popular among students. Which approach would result in the strongest inductive generalization?", "options": [{"text": "Asking their three closest friends their opinions.", "isCorrect": false, "rationale": "This approach uses a very small and unrepresentative sample (only three friends), making the generalization extremely weak according to the text's criteria for strong inductions (sample size and representativeness)."}, {"text": "Asking all members of the school's debate club for their opinions.", "isCorrect": false, "rationale": "While the sample size might be larger than three friends, the debate club is unlikely to be representative of the entire student body, as their opinions might differ from other students, weakening the generalization."}, {"text": "Conducting an anonymous survey of 500 randomly selected students across all grade levels.", "isCorrect": true, "rationale": "This approach utilizes a large sample size (500 students) and aims for representativeness (random selection across all grade levels), which are key factors for a strong induction as outlined in the text (sample size, representativeness, and diversity of observations)."}, {"text": "Observing student reactions to the policy during lunch in the cafeteria.", "isCorrect": false, "rationale": "Observation alone is less systematic than a survey, and reactions during lunch might not capture overall sentiment or be representative of the entire school population, especially if only a few vocal students are observed."}], "id": "q04"}, {"question": "Imagine you are trying to generalize about the average time students spend on homework each night. You survey 100 students, but all of them are from the advanced placement (AP) calculus class. Why might your inductive generalization be weak?", "options": [{"text": "The sample size is too small for any generalization.", "isCorrect": false, "rationale": "While larger samples are generally better, 100 students is not necessarily 'too small' in all contexts. The primary weakness here is not just size, but who was surveyed."}, {"text": "The students in AP calculus are not representative of the entire student population.", "isCorrect": true, "rationale": "The text emphasizes that 'your sample should look like the population.' AP calculus students likely have different study habits and homework loads than the average student, making them unrepresentative of the entire student body, thus weakening the generalization."}, {"text": "You did not observe students directly, only asked them questions.", "isCorrect": false, "rationale": "Surveys are a valid method for gathering data. The issue is not the method of data collection but the selection of the sample."}, {"text": "The question is too specific to form a generalization.", "isCorrect": false, "rationale": "The question about average homework time is a common type of question suitable for inductive generalization, provided the sample is well-chosen."}], "id": "q05"}, {"question": "You conclude, 'All video games are violent' based on having played three action-adventure games that contained combat. According to the text, what factor would most significantly strengthen this generalization?", "options": [{"text": "Ensuring the three games you played were all from different game developers.", "isCorrect": false, "rationale": "While diversity of developers could be a minor factor, it doesn't directly address the primary weakness. The core issue is the very limited and non-diverse *type* of games played."}, {"text": "Playing many more games across a variety of genres, like puzzle, simulation, and role-playing games.", "isCorrect": true, "rationale": "The text states that 'diversity of observations' (seeing something in many different situations) strengthens an induction. Playing only action-adventure games is a narrow context; broadening to various genres would significantly improve the basis for a generalization about 'all video games.'"}, {"text": "Confirming that your three action-adventure games were rated 'M for Mature.'", "isCorrect": false, "rationale": "This would only confirm the violence of the games you already played, not help generalize about *all* video games. It doesn't diversify your observations."}, {"text": "Asking friends who also play action-adventure games if they agree.", "isCorrect": false, "rationale": "This would only expand a biased sample within the same narrow context, not introduce the diversity needed to generalize about 'all video games.'"}], "id": "q06"}, {"question": "A student tells you, 'I've only eaten vegetables three times in my life, and each time they tasted terrible. Therefore, all vegetables taste terrible.' What makes this an example of a weak induction?", "options": [{"text": "The conclusion is too specific to be an inductive generalization.", "isCorrect": false, "rationale": "The conclusion 'all vegetables taste terrible' is a clear generalization about an entire group (vegetables) based on a sample, making it an inductive generalization, albeit a weak one."}, {"text": "The student's personal experience cannot be used as a premise.", "isCorrect": false, "rationale": "Personal experience can certainly be a premise in inductive reasoning; the problem lies in the quality and scope of that experience for generalization."}, {"text": "The sample size is tiny, and there's no diversity in the observations.", "isCorrect": true, "rationale": "This aligns with the text's criteria for a weak induction. The sample size is 'tiny' (only three experiences), and there's a lack of 'diversity of observations' (only three vegetables, potentially prepared in a similar way), making the generalization 'all vegetables' extremely broad and unsupported."}, {"text": "The conclusion is stated as 'definitely true' rather than 'probably true.'", "isCorrect": false, "rationale": "While the student's language is absolute ('all vegetables taste terrible'), the primary weakness of the induction stems from the insufficient premises (tiny sample, no diversity), not just the phrasing of the conclusion. A strong induction might use careful language, but a weak one's fundamental flaw is its poor supporting evidence."}], "id": "q07"}, {"question": "The discovery of black swans in Australia challenged the long-held generalization 'all swans are white.' What is the most significant lesson this 'black swan event' teaches us about inductive generalizations?", "options": [{"text": "Inductive generalizations are never useful and should be avoided in scientific reasoning.", "isCorrect": false, "rationale": "The text explicitly states that 'science, medicine, and everyday life all depend on induction,' despite its limitations. The lesson is not to avoid it but to understand its probabilistic nature."}, {"text": "Inductive generalizations can only be made about observable phenomena, not theoretical concepts.", "isCorrect": false, "rationale": "The example is about an observable phenomenon (swans). The lesson is about the certainty of the conclusion, not the nature of the subject matter."}, {"text": "No matter how much evidence supports an inductive generalization, there's always a possibility it could be proven wrong.", "isCorrect": true, "rationale": "The text explains the 'black swan event' specifically to illustrate that 'no matter how many examples support your generalization, there's always a chance the next observation will prove you wrong.' This highlights the inherent probabilistic nature of induction."}, {"text": "Only observations from geographically diverse regions can lead to strong inductive generalizations.", "isCorrect": false, "rationale": "While diversity of observations is important, the core lesson of the black swan event is the fallibility of even well-supported generalizations, not strictly that geographic diversity is the *only* path to strength."}], "id": "q08"}, {"question": "David Hume's 'Problem of Induction' primarily questions which fundamental assumption underlying all inductive reasoning?", "options": [{"text": "That human senses accurately perceive reality.", "isCorrect": false, "rationale": "While sensory perception is a philosophical concern, Hume's problem of induction, as presented, focuses on the uniformity of nature, not the accuracy of senses directly."}, {"text": "That the future will be similar to the past, or that nature is uniform.", "isCorrect": true, "rationale": "The text directly states, 'Hume pointed out that all inductive reasoning depends on an assumption we can't prove: that nature is uniform, that patterns will continue.' He questions 'How do we know that the future will be like the past?'"}, {"text": "That logical reasoning is superior to empirical observation.", "isCorrect": false, "rationale": "Hume's problem doesn't argue for the superiority of one over the other but rather highlights a limitation in deriving certainty from empirical observation alone for future predictions."}, {"text": "That small samples can adequately represent large populations.", "isCorrect": false, "rationale": "While small samples are a practical weakness of induction, Hume's problem is a deeper philosophical challenge about the *justification* for induction itself, even with large, representative samples."}], "id": "q09"}, {"question": "A research team conducted a study where they observed 1,000 unique interactions between students and teachers in 50 different schools across various socioeconomic backgrounds. They noted that in 95% of these interactions, teachers used positive reinforcement when students answered questions correctly. They concluded, 'It is highly probable that teachers generally use positive reinforcement in classrooms.' Based on the text, how would you evaluate this inductive generalization?", "options": [{"text": "It is weak because inductive conclusions are never certain, regardless of the evidence.", "isCorrect": false, "rationale": "While no induction is 100% certain, the text differentiates between strong and weak inductions. This argument meets the criteria for strength, even if not certain."}, {"text": "It is strong due to the large sample size, representativeness, and diversity of observations, combined with cautious language.", "isCorrect": true, "rationale": "This conclusion is strong because it meets all three criteria: 'Bigger samples are better' (1,000 interactions), 'Your sample should look like the population' (50 different schools, various backgrounds), and 'Diversity of observations' (unique interactions, different schools). The use of 'highly probable' and 'generally' also reflects the 'careful language' of a strong induction."}, {"text": "It is weak because student-teacher interactions are too complex to generalize reliably.", "isCorrect": false, "rationale": "The complexity of the subject doesn't inherently make the induction weak if the methodology is robust. The goal of induction is to make the best guess based on available evidence, even for complex phenomena."}, {"text": "It is deductive reasoning, not inductive, as it draws a specific conclusion from extensive data.", "isCorrect": false, "rationale": "This is inductive reasoning. It moves from specific observations (1,000 interactions) to a general conclusion about 'teachers generally' and is probabilistic ('highly probable'), which are hallmarks of induction, not deduction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
