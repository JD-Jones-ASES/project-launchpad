</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 0, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the three 'superpowers' the book promises to develop?", "options": [{"text": "Speed Reader, Math Wizard, and Science Expert", "isCorrect": false, "rationale": "These are not the three superpowers described in the text."}, {"text": "Argument Detective, Fallacy Finder, and Puzzle Master", "isCorrect": true, "rationale": "The text describes three superpowers: 'Argument Detective' (taking apart arguments), 'Fallacy Finder' (recognizing tricks), and 'Puzzle Master' (solving logic puzzles)."}, {"text": "Critical Thinker, Creative Writer, and Problem Solver", "isCorrect": false, "rationale": "These are not the three superpowers named in the text."}, {"text": "Debate Champion, Essay Writer, and Test Taker", "isCorrect": false, "rationale": "These are not the three superpowers named in the text."}], "id": "q01"}, {"question": "What does the Argument Detective superpower allow you to do?", "options": [{"text": "Win every argument you enter", "isCorrect": false, "rationale": "The skill is about understanding arguments, not winning them."}, {"text": "Take apart any argument, spot the premises and conclusion, and know whether it holds together or falls apart", "isCorrect": true, "rationale": "The text says: 'You'll be able to take apart any argument and see how it works. You'll spot the reasons (premises) and the main claim (conclusion). You'll know whether the argument holds together or falls apart.'"}, {"text": "Memorize the rules of formal logic", "isCorrect": false, "rationale": "The Argument Detective skill is about practical analysis, not memorization."}, {"text": "Write perfect persuasive essays", "isCorrect": false, "rationale": "The skill is about analyzing arguments, not writing essays."}], "id": "q02"}, {"question": "Which chapters build the Argument Detective skill?", "options": [{"text": "Chapters 5 and 6", "isCorrect": false, "rationale": "Chapters 5 and 6 are for the Fallacy Finder skill."}, {"text": "Chapters 1 through 4", "isCorrect": true, "rationale": "The text states: 'Chapters 1 through 4 build this skill step by step.'"}, {"text": "Chapters 7 and 8", "isCorrect": false, "rationale": "Chapters 7 and 8 build reasoning about evidence for the Puzzle Master skill."}, {"text": "Chapter 9", "isCorrect": false, "rationale": "Chapter 9 is the 'grand finale: a logic puzzle championship.'"}], "id": "q03"}, {"question": "What does the Fallacy Finder superpower help you recognize?", "options": [{"text": "Mathematical errors in calculations", "isCorrect": false, "rationale": "The Fallacy Finder is about reasoning tricks, not math errors."}, {"text": "Sneaky tricks people use to make bad arguments sound good", "isCorrect": true, "rationale": "The text says: 'You'll learn to recognize the sneaky tricks people use — sometimes on purpose, sometimes without realizing it — to make bad arguments sound good.'"}, {"text": "Grammar mistakes in written arguments", "isCorrect": false, "rationale": "Fallacy Finder is about logical tricks, not grammar."}, {"text": "Hidden messages in advertisements", "isCorrect": false, "rationale": "While ads may use fallacies, the skill is specifically about recognizing reasoning tricks."}], "id": "q04"}, {"question": "How many parts is the book divided into?", "options": [{"text": "Three parts", "isCorrect": false, "rationale": "The text lists five parts."}, {"text": "Five parts", "isCorrect": true, "rationale": "The text lists: Part I (Foundations), Part II (Deductive Reasoning), Part III (Spotting Bad Thinking), Part IV (Inductive Reasoning), and Part V (Finale)."}, {"text": "Seven parts", "isCorrect": false, "rationale": "The text lists five parts, not seven."}, {"text": "Nine chapters with no parts", "isCorrect": false, "rationale": "There are nine chapters organized into five parts."}], "id": "q05"}, {"question": "What does Part II: Deductive Reasoning cover?", "options": [{"text": "Patterns, analogies, and evidence evaluation", "isCorrect": false, "rationale": "Those topics are in Part IV: Inductive Reasoning."}, {"text": "Syllogisms, Venn diagrams, truth tables, and 'If...Then' logic", "isCorrect": true, "rationale": "The text states Part II covers: 'Syllogisms, Venn diagrams, truth tables, and \"If...Then\" logic. (Chapters 3–4)'"}, {"text": "Logical fallacies and cognitive biases", "isCorrect": false, "rationale": "Those are in Part III: Spotting Bad Thinking."}, {"text": "Logic puzzles and brain games", "isCorrect": false, "rationale": "Those are in Part V: Finale."}], "id": "q06"}, {"question": "What does Part III: Spotting Bad Thinking cover?", "options": [{"text": "How to write good arguments", "isCorrect": false, "rationale": "Part III focuses on recognizing bad reasoning, not writing good arguments."}, {"text": "Logical fallacies and cognitive biases — the tricks that fool smart people", "isCorrect": true, "rationale": "The text states Part III covers: 'Logical fallacies and cognitive biases — the tricks that fool smart people. (Chapters 5–6)'"}, {"text": "Probability and statistics", "isCorrect": false, "rationale": "Probability is mentioned in Part IV, not Part III."}, {"text": "Venn diagrams and truth tables", "isCorrect": false, "rationale": "Those are in Part II: Deductive Reasoning."}], "id": "q07"}, {"question": "What is Chapter 9, the grand finale, about?", "options": [{"text": "A comprehensive final exam", "isCorrect": false, "rationale": "Chapter 9 is a logic puzzle championship, not a final exam."}, {"text": "A logic puzzle championship", "isCorrect": true, "rationale": "The text says: 'Chapter 9 is the grand finale: a logic puzzle championship.'"}, {"text": "A review of all vocabulary terms", "isCorrect": false, "rationale": "Chapter 9 is about logic puzzles, not vocabulary review."}, {"text": "Real-world applications of logic", "isCorrect": false, "rationale": "Chapter 9 is specifically described as a logic puzzle championship."}], "id": "q08"}, {"question": "What types of puzzles does the Puzzle Master superpower involve?", "options": [{"text": "Crossword puzzles and word searches", "isCorrect": false, "rationale": "The text describes logic-specific puzzles, not word puzzles."}, {"text": "Grid challenges, truth-teller-and-liar problems, and riddles", "isCorrect": true, "rationale": "The text says: 'You'll use logic to solve brain-bending puzzles — grid challenges, truth-teller-and-liar problems, and riddles that will make your head spin.'"}, {"text": "Math word problems and equations", "isCorrect": false, "rationale": "The book earlier states that logic is not math."}, {"text": "Jigsaw puzzles and mazes", "isCorrect": false, "rationale": "These are not the types of puzzles described in the text."}], "id": "q09"}, {"question": "What humorous point does the 'Think About It' prompt make at the end of the section?", "options": [{"text": "That logic puzzles are harder than they look", "isCorrect": false, "rationale": "The humorous point is about committing a fallacy, not about puzzle difficulty."}, {"text": "If you picked a superpower 'because everyone else picked that one,' you may have committed your first fallacy", "isCorrect": true, "rationale": "The text says: 'But if you said \"because everyone else picked that one,\" well...you might have just committed your first fallacy. Don't worry — you'll learn about that one in Chapter 5!'"}, {"text": "That there is always a right answer to logic problems", "isCorrect": false, "rationale": "The text's humorous point is about bandwagon reasoning, not about right answers."}, {"text": "That the Puzzle Master is the most popular choice", "isCorrect": false, "rationale": "The text doesn't claim any superpower is most popular — it warns against the bandwagon fallacy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
