    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Jonathan Haidt's metaphor, what do the \"elephant\" and the \"rider\" primarily represent in human decision-making?", "options": [{"text": "Physical strength and mental agility.", "isCorrect": false, "rationale": "This option interprets the metaphor too literally. The metaphor is about psychological functions, not physical attributes."}, {"text": "Instincts/emotions and logical/deliberate thinking.", "isCorrect": true, "rationale": "The text explicitly states: 'The elephant represents your emotions, gut feelings, and instincts. The rider represents your logical, deliberate thinking.'"}, {"text": "Unconscious biases and conscious awareness.", "isCorrect": false, "rationale": "While related, the core representation described in the text is more directly about emotions/instincts versus conscious logical thought, not exclusively biases."}, {"text": "Past experiences and future planning.", "isCorrect": false, "rationale": "This option describes aspects that might influence decisions but does not capture the fundamental emotional vs. logical components of the metaphor."}], "id": "q01"}, {"question": "Sarah feels a strong urge to buy a new, expensive gadget, even though she knows she should be saving money for college. Which statement best describes this situation using the elephant and rider metaphor?", "options": [{"text": "Her rider is successfully guiding the elephant toward her long-term goal.", "isCorrect": false, "rationale": "Sarah's 'knowing' she should save indicates her rider's awareness, but the 'strong urge' to buy suggests the elephant is currently winning, not being guided."}, {"text": "Her elephant is overriding her rider's logical financial planning.", "isCorrect": true, "rationale": "Sarah's logical understanding (rider) suggests saving, but her emotional urge (elephant) for the gadget is powerful, illustrating the elephant overpowering the rider, similar to the 'should study but felt like playing video games' example."}, {"text": "Her elephant and rider are in agreement, leading to a quick decision.", "isCorrect": false, "rationale": "There is a conflict between what she 'knows' and what she 'feels,' indicating disagreement, not agreement."}, {"text": "Her rider is trying to convince the elephant that the gadget is a good investment.", "isCorrect": false, "rationale": "The scenario implies the rider is being overpowered, not actively trying to rationalize the elephant's desire. The rider knows she *should* save, indicating conflict, not rationalization of the impulse."}], "id": "q02"}, {"question": "The section states, \"emotions are real, but they aren't evidence.\" What is the most accurate implication of this statement?", "options": [{"text": "Emotions should always be ignored when making important decisions.", "isCorrect": false, "rationale": "The text emphasizes that emotions are powerful and important, not to be ignored. The 'Teacher Note' explicitly calls this a common misconception."}, {"text": "Strong feelings indicate that a belief is likely to be true.", "isCorrect": false, "rationale": "This directly contradicts the core idea that 'feeling strongly doesn't make something true' and 'a strong feeling... is not a reason to believe something is true.'"}, {"text": "While feelings are valid, they do not inherently prove the truth or falsity of a situation.", "isCorrect": true, "rationale": "This correctly interprets the statement. Emotions are acknowledged as real and important motivators, but the text clarifies they do not serve as proof or evidence for the truth of a claim."}, {"text": "Logical thinking is superior to emotions in all circumstances.", "isCorrect": false, "rationale": "The text advocates for emotions and logic working together, and highlights situations where gut feelings are helpful, not that logic is unilaterally superior in all cases."}], "id": "q03"}, {"question": "If emotions aren't arguments, what useful roles do they play according to the text?", "options": [{"text": "They provide irrefutable proof for our beliefs and decisions.", "isCorrect": false, "rationale": "The text explicitly states that emotions 'aren't evidence' and do not prove beliefs."}, {"text": "They motivate action, indicate what matters, and help connect with others.", "isCorrect": true, "rationale": "The text states: 'Emotions tell you what matters to you. They motivate you to act. They help you connect with other people.'"}, {"text": "They allow us to avoid logical thinking altogether in complex situations.", "isCorrect": false, "rationale": "The text identifies complex situations as one where gut feelings tend to be misleading, requiring logical thinking rather than avoiding it."}, {"text": "They are primarily useful for making quick decisions without any need for deliberation.", "isCorrect": false, "rationale": "While quick decisions can be a strength of gut feelings, this is not their primary or only role, and 'without any need for deliberation' is an overstatement and can be misleading."}], "id": "q04"}, {"question": "A pharmaceutical company announces a new drug for a rare disease. You feel incredibly optimistic about its success because it's mentioned on social media by an influencer you admire. Based on the text, why might your gut feeling be misleading in this situation?", "options": [{"text": "You have a lot of experience evaluating pharmaceutical claims.", "isCorrect": false, "rationale": "Extensive experience would make a gut feeling more reliable, not misleading, according to the text's criteria for helpful gut feelings."}, {"text": "The situation is unfamiliar and involves complex scientific claims and statistics.", "isCorrect": true, "rationale": "The text identifies 'unfamiliar or complex' situations and where 'statistics or probability matter' as times when gut feelings tend to be misleading. Evaluating a new drug involves complex science and statistics."}, {"text": "You need to make a fast decision with limited information.", "isCorrect": false, "rationale": "This is a criterion for when gut feelings tend to be helpful, not misleading."}, {"text": "You are recognizing a familiar pattern in the company's announcements.", "isCorrect": false, "rationale": "Pattern recognition is a criterion for when gut feelings tend to be helpful, not misleading."}], "id": "q05"}, {"question": "A seasoned firefighter enters a burning building and \"just knows\" which way to turn to avoid a collapse, despite heavy smoke. According to the text, why might this gut feeling be helpful?", "options": [{"text": "Strong emotions are involved, leading to heightened awareness.", "isCorrect": false, "rationale": "The text states that 'strong emotions' can make gut feelings misleading, not helpful."}, {"text": "The situation is unfamiliar and complex, requiring intuitive leaps.", "isCorrect": false, "rationale": "Unfamiliar/complex situations are listed as times when gut feelings are misleading, not helpful."}, {"text": "The firefighter has extensive experience in similar situations, enabling pattern recognition.", "isCorrect": true, "rationale": "The text states gut feelings are helpful when 'You have a lot of experience in that area' and 'The situation involves pattern recognition.' A 'seasoned' firefighter fits this description."}, {"text": "Statistical probability suggests this particular path is safer.", "isCorrect": false, "rationale": "Situations where 'statistics or probability matter' are listed as times when gut feelings are misleading, as they often don't align with statistical realities."}], "id": "q06"}, {"question": "You read a news headline that makes you intensely angry. According to the \"Emotions vs. Evidence\" key rule, what should be your next step?", "options": [{"text": "Immediately share the headline, trusting your anger means it's true.", "isCorrect": false, "rationale": "The key rule emphasizes that a strong feeling is not a reason to believe something is true, so immediately believing and sharing would be an error."}, {"text": "Dismiss your anger as irrational and ignore the news entirely.", "isCorrect": false, "rationale": "The text suggests emotions 'tell you what matters' and should be noticed, not ignored. Dismissing them entirely goes against the advice to work with emotions."}, {"text": "Recognize your anger as a signal, then seek evidence to determine the truth of the headline.", "isCorrect": true, "rationale": "The key rule states: 'A strong feeling is a reason to pay attention, but it's not a reason to believe something is true. Always ask: “Do I believe this because I have good evidence, or because I feel like it's true?”' This option perfectly aligns with that guidance."}, {"text": "Assume the headline is false because strong emotions are involved.", "isCorrect": false, "rationale": "While strong emotions can make gut feelings misleading, it doesn't automatically mean the opposite is true. The emotion itself doesn't prove falsity either; evidence is still needed."}], "id": "q07"}, {"question": "The text describes emotions and logic as interacting partners. Which statement best captures this dynamic?", "options": [{"text": "Logic's primary role is to suppress emotions, ensuring rational choices prevail.", "isCorrect": false, "rationale": "The text advises noticing emotions and using logic to guide them, not suppress them. The 'Teacher Note' specifically addresses this misconception."}, {"text": "Emotions are powerful forces that always dictate the ultimate decision, regardless of logic.", "isCorrect": false, "rationale": "While the elephant 'usually wins' when they disagree, the text provides an example of the rider guiding the elephant (Jayden's anger) and the overall message is about balance and questioning emotions with logic."}, {"text": "Emotions provide motivation and highlight importance, while logic evaluates the truth and plans the best course.", "isCorrect": true, "rationale": "This accurately summarizes the complementary roles described: emotions 'tell you what matters to you. They motivate you to act,' and logic 'needs a partner: logical thinking' when 'it comes to figuring out what's true.'"}, {"text": "They are fundamentally in opposition, and one must always be chosen over the other.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'It sounds like emotions and logic are enemies, right? Like you have to pick one or the other. Here's the truth: that's not how your brain works at all. Emotions and logic work together every day.'"}], "id": "q08"}, {"question": "The \"Teacher Note\" explicitly warns against the misconception that \"emotions are 'bad' or that you should always ignore your feelings.\" Which of the following statements from the main text directly addresses and corrects this misconception?", "options": [{"text": "Feeling scared on an airplane doesn't mean flying is dangerous.", "isCorrect": false, "rationale": "This statement illustrates that emotions aren't evidence, but it doesn't directly address the broader misconception that emotions are 'bad' or should be ignored entirely."}, {"text": "Emotions are real, but they aren't evidence.", "isCorrect": false, "rationale": "Similar to the above, this explains what emotions are not, but doesn't emphasize their importance or the strategy for dealing with them rather than ignoring."}, {"text": "The strongest thinkers aren't the ones who ignore their emotions. They're the ones who notice their emotions and then ask, 'Is there also good evidence for what I'm feeling?'", "isCorrect": true, "rationale": "This statement directly corrects the misconception by asserting that strong thinkers do NOT ignore emotions, but rather notice them and engage logic. It emphasizes their presence and role, albeit requiring scrutiny."}, {"text": "When the elephant and rider agree, everything is great.", "isCorrect": false, "rationale": "This describes a harmonious interaction but doesn't explicitly counter the idea that emotions are 'bad' or should be ignored when they are present."}], "id": "q09"}, {"question": "What is the most effective strategy for making sound decisions, according to \"The Bottom Line\" section?", "options": [{"text": "To always prioritize gut feelings, as they are often more efficient than logic.", "isCorrect": false, "rationale": "The text clarifies that gut feelings are only helpful in specific situations and can be misleading in others, so always prioritizing them is not the advised strategy."}, {"text": "To suppress all emotional reactions to ensure purely logical thought.", "isCorrect": false, "rationale": "The text explicitly states that emotions are a 'powerful part of who you are' and the elephant isn't an 'enemy,' contradicting the idea of suppression."}, {"text": "To acknowledge emotions as powerful signals and then critically examine them with logical evidence.", "isCorrect": true, "rationale": "This aligns perfectly with 'The Bottom Line' which states: 'The strongest thinkers aren't the ones who ignore their emotions. They're the ones who notice their emotions and then ask, “Is there also good evidence for what I'm feeling?”'"}, {"text": "To make quick decisions, as deliberation often overcomplicates matters.", "isCorrect": false, "rationale": "While quick decisions can be useful in certain scenarios (as per helpful gut feelings), the overall strategy emphasizes noticing and questioning emotions with evidence, which implies deliberation, not always rushing to decide."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
