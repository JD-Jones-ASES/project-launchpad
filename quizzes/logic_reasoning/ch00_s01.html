    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the text define logic?", "options": [{"text": "The study of mathematical equations", "isCorrect": false, "rationale": "The text explicitly says 'Logic is not math' and defines logic differently."}, {"text": "The study of good reasoning", "isCorrect": true, "rationale": "The text defines logic as 'the study of good reasoning. It gives us tools to figure out whether an argument makes sense — whether the reasons someone gives actually support what they're trying to prove.'"}, {"text": "The art of winning debates", "isCorrect": false, "rationale": "The text explicitly states 'Logic is not debate club. Debate is about persuading people.'"}, {"text": "The study of personal opinions", "isCorrect": false, "rationale": "The text states 'Logic is not about opinions.'"}]}, {"question": "According to the text, how old is the study of logic?", "options": [{"text": "About 500 years old", "isCorrect": false, "rationale": "The text says logic is much older than 500 years."}, {"text": "Over 2,300 years old", "isCorrect": true, "rationale": "The text states: 'Logic is over 2,300 years old! A Greek philosopher named Aristotle wrote the first books about logic around 350 BC.'"}, {"text": "About 1,000 years old", "isCorrect": false, "rationale": "The text says logic dates back over 2,300 years."}, {"text": "About 200 years old", "isCorrect": false, "rationale": "The text says logic dates back to Aristotle around 350 BC."}]}, {"question": "Who wrote the first books about logic?", "options": [{"text": "Plato", "isCorrect": false, "rationale": "While Plato was a Greek philosopher, the text credits Aristotle with writing the first books about logic."}, {"text": "Aristotle", "isCorrect": true, "rationale": "The text states: 'A Greek philosopher named Aristotle wrote the first books about logic around 350 BC.'"}, {"text": "Socrates", "isCorrect": false, "rationale": "The text credits Aristotle, not Socrates, with writing the first logic books."}, {"text": "Euclid", "isCorrect": false, "rationale": "Euclid is known for geometry, not for writing the first books about logic."}]}, {"question": "Why does the text say logic is NOT the same as debate?", "options": [{"text": "Because debate uses spoken words and logic uses written words", "isCorrect": false, "rationale": "The distinction is not about spoken vs. written but about persuasion vs. reasoning."}, {"text": "Because debate is about persuading people, while logic is about figuring out if reasoning actually works", "isCorrect": true, "rationale": "The text states: 'Debate is about persuading people. Logic is about figuring out if reasoning actually works — whether or not anyone is persuaded. You can win a debate with a terrible argument if you're charming enough.'"}, {"text": "Because debate is older than logic", "isCorrect": false, "rationale": "The text does not compare the ages of debate and logic."}, {"text": "Because debate requires two people and logic requires only one", "isCorrect": false, "rationale": "This is not the distinction the text makes."}]}, {"question": "What analogy does the text use to explain logic?", "options": [{"text": "Logic is like a calculator for your emotions", "isCorrect": false, "rationale": "The text does not compare logic to a calculator."}, {"text": "Logic is like a ruler for your thinking", "isCorrect": true, "rationale": "The text says: 'A ruler doesn't care what you're measuring. It just helps you measure accurately. Logic is like a ruler for your thinking.'"}, {"text": "Logic is like a map for your journey", "isCorrect": false, "rationale": "The text uses the ruler analogy, not a map analogy."}, {"text": "Logic is like a hammer for your arguments", "isCorrect": false, "rationale": "The text uses the ruler analogy for logic."}]}, {"question": "What does the text say logic is about?", "options": [{"text": "The structure of reasoning, not about any particular topic", "isCorrect": true, "rationale": "The text states: 'logic is about the structure of reasoning, not about any particular topic. You can use logic to think about science, history, sports, video games, or what to have for lunch.'"}, {"text": "Only topics in science and philosophy", "isCorrect": false, "rationale": "The text says logic applies to any topic, not just science and philosophy."}, {"text": "Being right and winning arguments", "isCorrect": false, "rationale": "The teacher note warns that students often think logic means 'being right' or 'winning arguments' but this is a misconception."}, {"text": "Mathematical proofs and equations", "isCorrect": false, "rationale": "The text explicitly says logic is not math."}]}, {"question": "What is the difference between an opinion and an argument according to the text?", "options": [{"text": "There is no difference — they are the same thing", "isCorrect": false, "rationale": "The text clearly distinguishes opinions from arguments."}, {"text": "An opinion is a personal preference; an argument uses reasons to support a claim that logic can evaluate", "isCorrect": true, "rationale": "The text gives the example: '\"I like chocolate ice cream\" is an opinion. \"Chocolate ice cream is the best because it won a taste test\" is an argument — and logic can help us evaluate it.'"}, {"text": "Opinions are always wrong; arguments are always right", "isCorrect": false, "rationale": "The text does not say opinions are wrong. It says logic helps us see when opinions are well-supported by reasons."}, {"text": "Arguments must be loud; opinions are quiet", "isCorrect": false, "rationale": "The text defines arguments as reasoning with premises and conclusions, not about volume."}]}, {"question": "According to the text, you can win a debate with a terrible argument if you are what?", "options": [{"text": "Loud enough", "isCorrect": false, "rationale": "The text says 'charming enough,' not loud enough."}, {"text": "Charming enough", "isCorrect": true, "rationale": "The text states: 'You can win a debate with a terrible argument if you're charming enough. Logic wouldn't be impressed.'"}, {"text": "Smart enough", "isCorrect": false, "rationale": "The text specifically says 'charming enough,' not smart enough."}, {"text": "Prepared enough", "isCorrect": false, "rationale": "The text specifically says 'charming enough' to make the point about persuasion vs. reasoning."}]}, {"question": "What common misconception do students have about logic, according to the teacher note?", "options": [{"text": "Students think logic is only useful in school", "isCorrect": false, "rationale": "The teacher note identifies a different misconception."}, {"text": "Students think logic means 'being right' or 'winning arguments'", "isCorrect": true, "rationale": "The teacher note states: 'Students often think logic means \"being right\" or \"winning arguments.\" Emphasize that logic is about the process of reasoning, not about any particular conclusion.'"}, {"text": "Students think logic requires advanced math", "isCorrect": false, "rationale": "While the text addresses the logic-math relationship, the noted misconception is about 'being right' or 'winning.'"}, {"text": "Students think logic is boring", "isCorrect": false, "rationale": "This is not the misconception identified in the teacher note."}]}, {"question": "What everyday examples of using logic does the text give?", "options": [{"text": "Solving math problems and writing essays", "isCorrect": false, "rationale": "The text explicitly says logic is not math. The examples given are about everyday reasoning."}, {"text": "Explaining why you deserve a later bedtime, figuring out who ate the last cookie, and deciding if a rumor is true", "isCorrect": true, "rationale": "The text says: 'When you explain why you deserve a later bedtime, when you figure out who ate the last cookie based on clues, or when you decide whether a rumor at school is probably true — you're using logic.'"}, {"text": "Reading books and watching educational videos", "isCorrect": false, "rationale": "These are not the examples given in the text."}, {"text": "Playing chess and completing crossword puzzles", "isCorrect": false, "rationale": "These are not the examples given in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
