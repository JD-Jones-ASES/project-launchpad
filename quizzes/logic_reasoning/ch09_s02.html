<script>
var QUESTIONS = [{"question": "What is the fundamental difference between a knight and a knave on the Island of Knights and Knaves?", "options": [{"text": "Knights are brave and solve puzzles, while knaves are cowardly and create them.", "isCorrect": false, "rationale": "The text defines knights and knaves purely by their relationship to truth and lies, not by bravery or puzzle-solving roles."}, {"text": "Knights always tell the truth, and knaves always lie.", "isCorrect": true, "rationale": "This is the core definition of knights and knaves as stated in the section: 'every person is either a knight (who always tells the truth) or a knave (who always lies).'"}, {"text": "Knights live in caves, and knaves live on beaches.", "isCorrect": false, "rationale": "The treasure's location is mentioned as a potential clue in a puzzle, but it does not define the people's types or dwelling places."}, {"text": "Knights are residents of the island, while knaves are visitors.", "isCorrect": false, "rationale": "The text specifies that 'exactly two types of people live' on the island, implying both knights and knaves are residents."}], "id": "q01"}, {"question": "When solving a Knights and Knaves puzzle, what is the primary strategy recommended in the text?", "options": [{"text": "Guessing randomly until a solution appears to fit the statements.", "isCorrect": false, "rationale": "Random guessing is inefficient and not the systematic 'assume and check' strategy taught in the text."}, {"text": "Assuming one person's type (knight or knave) and then checking for contradictions in their statements or the statements of others.", "isCorrect": true, "rationale": "The text explicitly states, 'you assume someone is a knight (or a knave), then check whether their statements make sense' and 'If you hit a contradiction... then your assumption was wrong.'"}, {"text": "Asking each person a series of direct questions until their type is revealed.", "isCorrect": false, "rationale": "The puzzles are solved based on the given statements, not by interacting with the characters through further questioning."}, {"text": "Looking for physical characteristics or behaviors that differentiate knights from knaves.", "isCorrect": false, "rationale": "Knights and knaves are distinguished solely by their truth-telling or lying nature, not by physical traits."}], "id": "q02"}, {"question": "In the 'assume and check' strategy, what does it mean if an assumption (e.g., 'Person X is a knight') leads to a contradiction?", "options": [{"text": "The puzzle is inherently unsolvable or a paradox.", "isCorrect": false, "rationale": "While some specific statements like 'I am a knave' create paradoxes, a contradiction usually means your initial assumption was incorrect, not that the puzzle is unsolvable."}, {"text": "Your initial assumption about that person's type was incorrect, and the opposite type must be true.", "isCorrect": true, "rationale": "The text states: 'If you hit a contradiction... then your assumption was wrong. Flip it around and try the other option.'"}, {"text": "All other people involved in the puzzle must be knaves.", "isCorrect": false, "rationale": "A contradiction only invalidates the specific assumption made, it doesn't automatically determine the type of all other characters."}, {"text": "You need to restart the entire puzzle from scratch without making any assumptions.", "isCorrect": false, "rationale": "A contradiction provides valuable information, indicating that you should try the alternative assumption for the person you initially picked, rather than starting entirely over."}], "id": "q03"}, {"question": "If a Knave says, 'The treasure is in the cave,' and you know the treasure is either in the cave or on the beach, what can you definitively conclude about the treasure's location?", "options": [{"text": "The treasure is definitely in the cave, because the knave must be tricking you.", "isCorrect": false, "rationale": "A knave always lies. If they say something, the opposite is true, not that they are 'tricking' you in a way that confirms their statement."}, {"text": "The treasure is definitely NOT in the cave, meaning it is on the beach.", "isCorrect": true, "rationale": "Since a knave always lies, their statement 'The treasure is in the cave' must be false. Given the options, if it's not in the cave, it must be on the beach."}, {"text": "The treasure's location cannot be determined from this single statement.", "isCorrect": false, "rationale": "Because knaves always lie, their statement provides definitive information by negating what they said."}, {"text": "The knave is actually a knight who made a mistake.", "isCorrect": false, "rationale": "The fundamental rules of Knights and Knaves state that people are one type or the other, and their nature (truth-telling or lying) is absolute."}], "id": "q04"}, {"question": "According to the 'I Am a Knight' Trap, why is a person's statement 'I am a knight' by itself unhelpful in determining their type?", "options": [{"text": "Because only knights are allowed to make statements about their own type.", "isCorrect": false, "rationale": "Both knights and knaves can make statements about their type."}, {"text": "Because only knaves would ever lie about being a knight.", "isCorrect": false, "rationale": "While knaves would lie about being a knight, knights would also truthfully state they are a knight, making the statement ambiguous on its own."}, {"text": "Because both knights and knaves would say 'I am a knight,' but for different reasons (truth for a knight, lie for a knave).", "isCorrect": true, "rationale": "The text explicitly states this: 'Both knights and knaves will say “I am a knight.” A knight says it because it’s true. A knave says it because it’s a lie.'"}, {"text": "Because the statement itself creates a logical paradox.", "isCorrect": false, "rationale": "The statement 'I am a knight' does not create a paradox; it's ambiguous. The paradox arises from statements like 'I am a knave'."}], "id": "q05"}, {"question": "Person B says two things: 'I am a knight.' and 'The treasure is in the cave.' You also know the treasure is either in the cave or on the beach. If you assume B is a knave, what can you deduce about the treasure?", "options": [{"text": "The treasure is in the cave, because B's first statement ('I am a knight') is false, making B a knave.", "isCorrect": false, "rationale": "If B is a knave, *both* statements must be false. The first statement being false confirms B is a knave, but doesn't make the second statement true."}, {"text": "The treasure is on the beach, because B's second statement ('The treasure is in the cave') must be false.", "isCorrect": true, "rationale": "If B is a knave, all their statements are lies. Therefore, 'The treasure is in the cave' must be false, meaning the treasure is on the beach."}, {"text": "The treasure's location cannot be determined, as B's statements contradict each other under this assumption.", "isCorrect": false, "rationale": "Under the assumption that B is a knave, both statements being false is consistent: 'I am a knight' (false, B is a knave) and 'The treasure is in the cave' (false, treasure is on beach). No contradiction here."}, {"text": "B is actually a knight, so the treasure is in the cave.", "isCorrect": false, "rationale": "This option contradicts the premise of assuming B is a knave. The question asks what you deduce *if* you assume B is a knave."}], "id": "q06"}, {"question": "Consider the puzzle: Person C says 'D is a knave.' Person D says 'C and I are both knights.' If you begin by assuming C is a knave, what contradiction will you find?", "options": [{"text": "C's statement ('D is a knave') would be true, which contradicts C being a knave.", "isCorrect": false, "rationale": "If C is a knave, C lies, so 'D is a knave' must be false. This means D is a knight, which is consistent with C being a knave."}, {"text": "D's statement ('C and I are both knights') would have to be true, but it would be false because C is a knave.", "isCorrect": true, "rationale": "If C is a knave, C lies, meaning 'D is a knave' is false, so D is a knight. If D is a knight, D's statement 'C and I are both knights' must be true. However, since C is a knave, 'C and I are both knights' is actually false. This creates a contradiction: D (a knight) says something that must be true, but it is actually false."}, {"text": "D would be a knave, but D's statement ('C and I are both knights') would be true.", "isCorrect": false, "rationale": "If C is a knave, D is a knight. This option states D would be a knave, which is incorrect under the assumption."}, {"text": "Both C and D would be knights, which contradicts C being a knave.", "isCorrect": false, "rationale": "If C is a knave, then D is a knight. So, it would not lead to both being knights; one is a knave and one is a knight."}], "id": "q07"}, {"question": "The person in 'example[One Person, One Statement]' says, 'I am a knave.' Why is this statement considered a paradox in the context of Knights and Knaves?", "options": [{"text": "It's impossible for a knave to identify their own type without being caught.", "isCorrect": false, "rationale": "The issue is not being caught, but the logical impossibility of the statement itself."}, {"text": "Assuming the person is a knight leads to a contradiction, and assuming they are a knave also leads to a contradiction.", "isCorrect": true, "rationale": "As explained in the example, if a knight says 'I am a knave,' it's a contradiction. If a knave says 'I am a knave,' it's also a contradiction. This makes the statement a paradox."}, {"text": "Knights are never supposed to make statements involving knaves.", "isCorrect": false, "rationale": "There is no such rule in Knights and Knaves puzzles; characters frequently make statements about each other's types."}, {"text": "Paradoxes only occur in two-person or three-person puzzles, not one-person puzzles.", "isCorrect": false, "rationale": "The example clearly demonstrates a paradox in a one-person scenario."}], "id": "q08"}, {"question": "According to the step-by-step strategy for solving Knights and Knaves puzzles, what is the *first* action you should take?", "options": [{"text": "Check every person's statement to see if any are immediately false.", "isCorrect": false, "rationale": "You cannot determine if a statement is false without first assuming the speaker's type. This comes later in the process."}, {"text": "Pick one person and assume they are a knight.", "isCorrect": true, "rationale": "The strategy clearly states: 'Pick one person and assume they are a knight.' This is the starting point for the 'assume and check' method."}, {"text": "Identify all potential contradictions before making any assumptions.", "isCorrect": false, "rationale": "Contradictions are discovered *after* making an assumption and following the logical chain, not before."}, {"text": "Determine whether it is a one-person, two-person, or three-person puzzle.", "isCorrect": false, "rationale": "While knowing the number of people is helpful for context, the first active step in solving, as per the strategy, is to make an assumption about a person's type."}], "id": "q09"}, {"question": "The 'Think About It' section connects Knights and Knaves puzzles to what broader logical concept?", "options": [{"text": "Modus Tollens, a specific form of deductive argument.", "isCorrect": false, "rationale": "While Modus Tollens might be used within the reasoning, the text specifies a broader concept."}, {"text": "Categorical Syllogisms, which deal with categories and quantifiers.", "isCorrect": false, "rationale": "Categorical syllogisms are a different type of logical structure from the conditional reasoning central to these puzzles."}, {"text": "Conditional reasoning (IF-THEN thinking), like that practiced in Chapter 4.", "isCorrect": true, "rationale": "The text explicitly states: 'Knights and knaves puzzles are really about conditional reasoning — the same IF THEN thinking you practiced in Chapter 4!' and gives an example of an 'IF THEN' chain."}, {"text": "Inductive reasoning, which involves making generalizations from specific observations.", "isCorrect": false, "rationale": "Knights and knaves puzzles rely on deductive logic, deriving specific conclusions from given rules and statements, not inductive generalization."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
