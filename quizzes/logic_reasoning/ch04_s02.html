    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a truth table in propositional logic?", "options": [{"text": "To list all logical fallacies.", "isCorrect": false, "rationale": "While truth tables can be used in evaluating arguments for fallacies, their primary purpose is more fundamental: to define the truth values of propositions and compound statements."}, {"text": "To show every possible combination of true/false for a set of propositions and their resulting truth value.", "isCorrect": true, "rationale": "The text states, 'A truth table is a chart that shows every possible combination of true and false for a set of propositions — and tells you whether the result is true or false.' This directly matches the definition."}, {"text": "To visualize argument structures.", "isCorrect": false, "rationale": "Truth tables show the internal logic of statements, not necessarily argument structures themselves, though they are a component."}, {"text": "To determine the rhetorical effectiveness of an argument.", "isCorrect": false, "rationale": "Truth tables are about logical truth and falsity, not rhetorical effectiveness or persuasion."}], "id": "q01"}, {"question": "If a proposition P is true, what is the truth value of NOT P?", "options": [{"text": "True", "isCorrect": false, "rationale": "The NOT connective flips the truth value. If P is true, NOT P will be false."}, {"text": "False", "isCorrect": true, "rationale": "The truth table for NOT clearly shows that if P is True, then NOT P is False. NOT simply flips the value."}, {"text": "Cannot be determined", "isCorrect": false, "rationale": "The truth value of NOT P is definitively determined by the truth value of P; it is not ambiguous."}, {"text": "Sometimes true, sometimes false", "isCorrect": false, "rationale": "The operation is deterministic; if P is true, NOT P is always false."}], "id": "q02"}, {"question": "Consider the statement: 'The sky is blue AND the grass is purple.' If we know 'The sky is blue' is true, what must be true for the entire compound statement to be true?", "options": [{"text": "The grass is not purple.", "isCorrect": false, "rationale": "If 'The grass is not purple' is true, then 'The grass is purple' is false, making the entire AND statement false."}, {"text": "The grass is purple.", "isCorrect": true, "rationale": "The text states: 'AND is only true in one row — when both P and Q are true. If even one part is false, the whole thing is false.' For 'The sky is blue AND the grass is purple' to be true, both parts must be true. Since 'The sky is blue' is given as true, 'the grass is purple' must also be true."}, {"text": "The sky is not blue.", "isCorrect": false, "rationale": "If 'The sky is not blue' is true, the first part of the AND statement would be false, making the entire AND statement false."}, {"text": "The statement is always false regardless of the grass color.", "isCorrect": false, "rationale": "The statement's truth value depends on both components; it is not always false if one component is true. If the grass were purple, the statement would be true."}], "id": "q03"}, {"question": "A restaurant sign says, 'We serve coffee OR tea.' On a particular day, the restaurant serves both coffee and tea. According to the truth table for OR (inclusive), what is the truth value of the sign's statement?", "options": [{"text": "False, because 'OR' implies one or the other, not both.", "isCorrect": false, "rationale": "The text explicitly states that the OR discussed is 'inclusive or — 'both true' still counts!'"}, {"text": "True, because at least one of the conditions is met.", "isCorrect": true, "rationale": "The truth table for OR shows that it is true if at least one of the propositions (P or Q) is true, including when both are true. Since both coffee and tea are served, the 'OR' statement is true."}, {"text": "False, because the sign should have said 'AND' if both are available.", "isCorrect": false, "rationale": "Inclusive OR correctly represents situations where either or both conditions can be met for the overall statement to be true. The sign is not misleading based on the logical definition of OR."}, {"text": "Cannot be determined without knowing if customers prefer coffee or tea.", "isCorrect": false, "rationale": "The truth value of the logical statement depends on the factual availability of coffee and tea, not subjective customer preference."}], "id": "q04"}, {"question": "A teacher promises: 'IF you complete all homework (P), THEN you will pass the course (Q).' A student does NOT complete all homework (P is false) but still passes the course (Q is true) due to excellent exam scores. Has the teacher's promise been broken?", "options": [{"text": "Yes, because the condition (homework) was not met.", "isCorrect": false, "rationale": "This is a common misconception. A conditional statement is not false just because the antecedent (P) is false. The promise was only about what would happen if the homework *was* completed."}, {"text": "No, because the outcome (passing) still occurred, and the teacher didn't guarantee failure if homework wasn't done.", "isCorrect": true, "rationale": "The text explains that a conditional 'is only false when the 'if' part is true but the 'then' part is false. That's a broken promise.' In this scenario, the 'if' part (P: complete homework) was false. Since the 'if' part was not met, the promise could not have been broken, regardless of whether the student passed (Q) or not."}, {"text": "Yes, a conditional statement is false if the 'if' part is false.", "isCorrect": false, "rationale": "This directly contradicts the explanation for the conditional truth table, specifically rows 3 and 4 where P is false but the conditional P -> Q is true."}, {"text": "Cannot be determined without knowing the teacher's intention.", "isCorrect": false, "rationale": "The truth value of a conditional in logic is determined by the truth values of its components, not subjective intention."}], "id": "q05"}, {"question": "When constructing a truth table for the compound statement $ Q (P Q)$, what is the correct order of evaluation according to the rules of operations?", "options": [{"text": "Evaluate $Q$ first, then $P$, then combine with OR.", "isCorrect": false, "rationale": "This order ignores parentheses and incorrectly combines the terms, not following the specified logical order of operations."}, {"text": "Evaluate $P Q$ first (inside parentheses), then combine the result with $Q$ using OR.", "isCorrect": true, "rationale": "The keyrule 'Order of Operations for Logic' states: 'Parentheses (innermost first)' then 'OR ($$).' Therefore, the conditional $P Q$ must be evaluated first as it's inside parentheses, and its result is then combined with $Q$ using the OR connective."}, {"text": "Evaluate $P Q$ first, then apply NOT to the result.", "isCorrect": false, "rationale": "This option incorrectly applies NOT after the conditional, and also misinterprets the OR connective as NOT."}, {"text": "Evaluate $Q$ and $P$ separately, then apply NOT to $P$, then combine with OR.", "isCorrect": false, "rationale": "This misinterprets the order of operations and the structure of the compound statement, specifically ignoring the parentheses around the conditional."}], "id": "q06"}, {"question": "The statement $[P (P Q)] Q$ is identified as a tautology. What does this mean about its truth value?", "options": [{"text": "It is true only when P is true.", "isCorrect": false, "rationale": "A tautology is true in *all* circumstances, not just when P is true. Its truth value does not depend on the truth value of individual propositions like P or Q."}, {"text": "It is always true, regardless of the truth values of P and Q.", "isCorrect": true, "rationale": "The text defines a tautology as 'A statement that is always true — it's true in every single row!' and explicitly identifies $[P (P Q)] Q$ (Modus Ponens) as such."}, {"text": "It is true only when Q is true.", "isCorrect": false, "rationale": "A tautology is true in *all* circumstances, not just when Q is true. Its truth value does not depend on the truth value of individual propositions like P or Q."}, {"text": "It is always false, regardless of the truth values of P and Q.", "isCorrect": false, "rationale": "A statement that is always false is called a contradiction, not a tautology."}], "id": "q07"}, {"question": "Given the conditional statement 'If it is raining (P), then the ground is wet (Q),' what is its contrapositive?", "options": [{"text": "If the ground is wet, then it is raining.", "isCorrect": false, "rationale": "This is the converse ($Q P$), which is formed by swapping the antecedent and consequent."}, {"text": "If the ground is not wet, then it is not raining.", "isCorrect": true, "rationale": "The contrapositive of $P Q$ is $Q P$. If P is 'it is raining' and Q is 'the ground is wet', then $Q$ is 'the ground is not wet' and $P$ is 'it is not raining.' This matches the structure: 'If NOT Q, then NOT P'."}, {"text": "If it is not raining, then the ground is not wet.", "isCorrect": false, "rationale": "This is the inverse ($P Q$), which negates both the antecedent and consequent."}, {"text": "If it is raining, then the ground is not wet.", "isCorrect": false, "rationale": "This statement changes the consequent to its negation while keeping the original antecedent, which is not one of the standard related conditional forms (converse, inverse, contrapositive)."}], "id": "q08"}, {"question": "Which of the following statements is logically equivalent to the original conditional statement $P Q$?", "options": [{"text": "The converse, $Q P$.", "isCorrect": false, "rationale": "The text explicitly states, 'The converse is not guaranteed to be true' and 'The converse and inverse are not equivalent to the original.'"}, {"text": "The inverse, $P Q$.", "isCorrect": false, "rationale": "The text explicitly states, 'The inverse is not guaranteed to be true either' and 'The converse and inverse are not equivalent to the original.'"}, {"text": "The contrapositive, $Q P$.", "isCorrect": true, "rationale": "The 'keyrule' section states: 'A conditional ($P Q$) and its contrapositive ($ Q P$) always have the same truth value. If one is true, the other is true. If one is false, the other is false.'"}, {"text": "All of the above are logically equivalent.", "isCorrect": false, "rationale": "Only the contrapositive is logically equivalent to the original conditional. The converse and inverse are not."}], "id": "q09"}, {"question": "George Boole's significant contribution to logic, as described in the text, was:", "options": [{"text": "Inventing the concept of truth tables.", "isCorrect": false, "rationale": "While Boole's work laid groundwork, the concept of truth tables in their modern form was developed later. The text focuses on his algebraization of logic."}, {"text": "Showing how logical operations (AND, OR, NOT) could be expressed as mathematical equations.", "isCorrect": true, "rationale": "The 'Logic Legend' box states Boole 'figured out something amazing: you can do math with logic. In 1854, he published a book showing that AND, OR, and NOT could be written as equations, just like addition and multiplication. His system is called Boolean algebra.'"}, {"text": "Proving that conditional statements are always true.", "isCorrect": false, "rationale": "Boole did not prove that conditionals are always true; in fact, the truth table shows they can be false."}, {"text": "Developing the first programming language for computers.", "isCorrect": false, "rationale": "While Boolean algebra is the foundation of computers, Boole himself did not develop the first programming language. His work provided the theoretical basis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
