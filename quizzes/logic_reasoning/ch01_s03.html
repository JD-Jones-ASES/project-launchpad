<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does it mean for an argument to be valid?", "options": [{"text": "All of its premises are true.", "isCorrect": false, "rationale": "Truth of premises is required for soundness, not validity. An argument can be valid even with false premises."}, {"text": "If all the premises were true, the conclusion would have to be true.", "isCorrect": true, "rationale": "Validity is about structure: if we assume the premises, the conclusion must follow necessarily."}, {"text": "The conclusion is true in the real world.", "isCorrect": false, "rationale": "A true conclusion does not guarantee validity; the structure — the logical connection — is what matters."}, {"text": "The argument contains no false statements.", "isCorrect": false, "rationale": "Validity says nothing about whether any statement is actually true or false; it only concerns whether the conclusion follows from the premises."}], "id": "q01"}, {"question": "Consider this argument: 'All cats can fly. Whiskers is a cat. Therefore, Whiskers can fly.' Which statement best describes this argument?", "options": [{"text": "It is both valid and sound.", "isCorrect": false, "rationale": "The argument cannot be sound because the first premise ('All cats can fly') is false. Soundness requires all premises to be true."}, {"text": "It is valid but unsound.", "isCorrect": true, "rationale": "The structure is correct — if the premises were true, the conclusion would follow. But Premise 1 is false, so the argument fails the soundness test."}, {"text": "It is invalid and unsound.", "isCorrect": false, "rationale": "The structure is actually correct (valid), even though the premise is false. Invalid means the conclusion would not follow even if the premises were true."}, {"text": "It is invalid but sound.", "isCorrect": false, "rationale": "A sound argument must be valid first. An invalid argument cannot be sound by definition."}], "id": "q02"}, {"question": "What two conditions must BOTH be met for an argument to be sound?", "options": [{"text": "The conclusion must be true, and the premises must be relevant.", "isCorrect": false, "rationale": "Soundness is defined by validity and true premises, not by relevance or a separately verified true conclusion."}, {"text": "The argument must be valid, and all its premises must be actually true.", "isCorrect": true, "rationale": "This is the exact definition of soundness: valid structure plus genuinely true premises guarantees a true conclusion."}, {"text": "The premises must be true, and the conclusion must follow from at least one of them.", "isCorrect": false, "rationale": "Validity requires the conclusion to follow from ALL premises together, not just one. Partial support is not enough."}, {"text": "The argument must use logical language, and the author must be credible.", "isCorrect": false, "rationale": "Soundness is a formal logical property, not dependent on the author's credibility or the language used."}], "id": "q03"}, {"question": "Which of the following is the correct formula presented in the section?", "options": [{"text": "Validity = Sound + True Premises", "isCorrect": false, "rationale": "This reverses the relationship. Validity is a component of soundness, not the other way around."}, {"text": "Sound = Valid − True Premises", "isCorrect": false, "rationale": "Soundness requires both validity AND true premises; you cannot subtract premises from it."}, {"text": "Sound = Valid + True Premises", "isCorrect": true, "rationale": "This is the formula stated directly in the section. Soundness is validity plus the bonus of all premises being actually true."}, {"text": "Valid = Sound + True Conclusion", "isCorrect": false, "rationale": "Validity does not depend on soundness or a verified true conclusion; validity is purely about structure."}], "id": "q04"}, {"question": "An argument has true premises but its conclusion does not follow from those premises. How should this argument be classified?", "options": [{"text": "Valid and sound", "isCorrect": false, "rationale": "If the conclusion does not follow, the argument is invalid; an invalid argument cannot be sound."}, {"text": "Valid but unsound", "isCorrect": false, "rationale": "If the conclusion does not follow from the premises, the argument is invalid — not merely unsound."}, {"text": "Invalid and therefore unsound", "isCorrect": true, "rationale": "A broken structure makes the argument invalid, and since soundness requires validity, it is also unsound — regardless of whether the premises happen to be true."}, {"text": "Sound but invalid", "isCorrect": false, "rationale": "It is impossible for an argument to be sound without first being valid. Soundness includes validity as a necessary condition."}], "id": "q05"}, {"question": "The section uses a 'bridge analogy' to explain validity and soundness. In that analogy, what does a sound argument correspond to?", "options": [{"text": "A bridge blueprint that is well-designed but made of weak materials.", "isCorrect": false, "rationale": "This describes a valid-but-unsound argument: good structure, but the 'materials' (premises) are not genuinely strong (true)."}, {"text": "A bridge that could hold weight if the materials were strong.", "isCorrect": false, "rationale": "This describes a valid argument. The bridge could hold weight — but it has not been verified that the materials actually are strong."}, {"text": "A bridge that actually does hold weight.", "isCorrect": true, "rationale": "A sound argument has both correct structure (valid) and true premises — so the 'bridge' really does hold weight in practice."}, {"text": "A bridge that has collapsed due to poor design.", "isCorrect": false, "rationale": "A collapsed bridge represents an invalid argument — the structure fails, so the conclusion doesn't follow even if the premises were true."}], "id": "q06"}, {"question": "According to the Validity–Soundness Checklist, what is the first step when evaluating an argument?", "options": [{"text": "Check whether the conclusion is widely accepted.", "isCorrect": false, "rationale": "Popular acceptance is irrelevant to logical evaluation. Validity is about structure, not public opinion."}, {"text": "Check whether all the premises are actually true.", "isCorrect": false, "rationale": "Checking premises for truth is the second step. The checklist says to check validity first."}, {"text": "Check validity by asking whether the conclusion must be true if the premises are assumed true.", "isCorrect": true, "rationale": "The checklist begins with validity. If the argument is invalid, we stop — it cannot be sound regardless of the premises."}, {"text": "Check whether the conclusion and premises are all about the same topic.", "isCorrect": false, "rationale": "Topical consistency is not the validity test. Validity asks only whether the conclusion necessarily follows from the premises."}], "id": "q07"}, {"question": "Which example from the section demonstrates an invalid argument even though BOTH premises are true?", "options": [{"text": "'All cats are mammals. Whiskers is a cat. Therefore, Whiskers is a mammal.'", "isCorrect": false, "rationale": "This argument is both valid and sound — it has a correct structure and true premises."}, {"text": "'All cats can fly. Whiskers is a cat. Therefore, Whiskers can fly.'", "isCorrect": false, "rationale": "This argument is valid (correct structure) but unsound (false first premise), not an example of invalid with true premises."}, {"text": "'Some birds can fly. Penguins are birds. Therefore, penguins can fly.'", "isCorrect": true, "rationale": "Both premises are true, yet the conclusion is false because 'some' does not mean 'all.' The structure is broken — a classic example of an invalid argument with true premises."}, {"text": "'All humans are mortal. Socrates is a human. Therefore, Socrates is mortal.'", "isCorrect": false, "rationale": "This is the famous sound syllogism — valid structure and all premises true."}], "id": "q08"}, {"question": "Why does the text say that validity is 'about the shape of the argument, not about whether premises are true'?", "options": [{"text": "Because logicians only care about conclusions, not premises.", "isCorrect": false, "rationale": "Logicians care about premises deeply — they are essential to evaluating soundness. But for validity alone, their actual truth value is set aside."}, {"text": "Because validity asks a hypothetical question: IF the premises were true, WOULD the conclusion follow?", "isCorrect": true, "rationale": "Validity is a conditional test. We assume the premises for the sake of argument and ask whether the conclusion necessarily follows — irrespective of real-world truth."}, {"text": "Because false premises always produce invalid arguments.", "isCorrect": false, "rationale": "The flying-cats example shows that an argument with a false premise can still be perfectly valid. Falsity of premises affects soundness, not validity."}, {"text": "Because truth is impossible to verify in logic.", "isCorrect": false, "rationale": "Truth can be verified — that is exactly what the soundness check requires. The point is that validity is a structural test evaluated independently of actual truth."}], "id": "q09"}, {"question": "Can a sound argument ever have a false conclusion? Why or why not?", "options": [{"text": "Yes, because some premises might be hidden and false.", "isCorrect": false, "rationale": "If any premise is false, the argument is unsound by definition. A truly sound argument has no false premises."}, {"text": "Yes, if the argument is valid but the conclusion is unusual.", "isCorrect": false, "rationale": "Unusualness or surprise does not make a conclusion false. In a sound argument, the true premises and valid structure guarantee a true conclusion."}, {"text": "No — a sound argument is valid and has all true premises, so the conclusion must be true.", "isCorrect": true, "rationale": "By definition, a sound argument is valid (the conclusion must follow) AND all premises are true. Therefore the conclusion is guaranteed to be true."}, {"text": "No, but only if the conclusion is short and simple.", "isCorrect": false, "rationale": "The length or complexity of the conclusion is irrelevant. Soundness guarantees a true conclusion regardless of how the conclusion is phrased."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
