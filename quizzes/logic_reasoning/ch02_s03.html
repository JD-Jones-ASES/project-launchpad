    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is vagueness, as defined in this section?", "options": [{"text": "A word that has two or more completely distinct meanings.", "isCorrect": false, "rationale": "A word with two or more distinct meanings is ambiguous, not vague. The section explicitly distinguishes the two concepts."}, {"text": "A word or phrase with no clear boundary or cutoff point — a fuzzy, sliding-scale meaning.", "isCorrect": true, "rationale": "This is the definition given in the section. 'Tall' is the primary example: there is no precise line separating 'tall' from 'not tall.'"}, {"text": "A word chosen to trigger strong emotional reactions in the audience.", "isCorrect": false, "rationale": "Words chosen to trigger emotions are examples of loaded language, a distinct concept covered later in the section."}, {"text": "A word that appears in a definition without clarifying meaning.", "isCorrect": false, "rationale": "A word used in its own definition without adding clarity is an example of a circular definition from Chapter 2, not vagueness."}], "id": "q01"}, {"question": "What is the key difference between ambiguity and vagueness?", "options": [{"text": "Ambiguity involves emotional manipulation; vagueness involves factual errors.", "isCorrect": false, "rationale": "Neither ambiguity nor vagueness inherently involves emotional manipulation or factual error. They are both problems of unclear word meaning but in structurally different ways."}, {"text": "Ambiguous words have two or more distinct, separate meanings; vague words have a fuzzy, sliding-scale meaning with no clear cutoff.", "isCorrect": true, "rationale": "The section's key rule states this distinction precisely. 'Bat' (animal vs. sports equipment) is ambiguous; 'tall' (how tall is tall?) is vague."}, {"text": "Vague words are always harmful; ambiguous words can be used correctly.", "isCorrect": false, "rationale": "The section makes no such moral ranking. Both cause problems in reasoning; context and purpose determine whether they are used appropriately."}, {"text": "Ambiguity occurs only in writing; vagueness occurs only in speech.", "isCorrect": false, "rationale": "Both ambiguity and vagueness can appear in any form of communication — written or spoken. The medium is irrelevant to this distinction."}], "id": "q02"}, {"question": "The school phone rule example ('Students must not use their phones excessively during lunch') illustrates which problem?", "options": [{"text": "Equivocation — the word 'phone' has two different meanings.", "isCorrect": false, "rationale": "'Phone' does not shift meaning in this rule. The problem is that 'excessively' has no clear boundary, not that any word has two distinct meanings."}, {"text": "Circular definition — the rule defines excessive use in terms of itself.", "isCorrect": false, "rationale": "The rule does not use 'excessively' to define 'excessive.' The problem is a fuzzy, unmeasured standard — classic vagueness."}, {"text": "Vagueness — 'excessively' has no defined cutoff, so different people can enforce the rule differently.", "isCorrect": true, "rationale": "The section uses this example to illustrate vagueness: without a specific number (like '10 minutes'), 'excessively' means different things to different people."}, {"text": "Loaded language — 'excessively' is a negative word designed to make students feel guilty.", "isCorrect": false, "rationale": "While 'excessively' has a slightly negative connotation, the main problem illustrated in the section is the lack of a precise cutoff — vagueness, not loaded language."}], "id": "q03"}, {"question": "Which of the following words is identified in the section as a vague term that causes problems in reasoning?", "options": [{"text": "Triangle", "isCorrect": false, "rationale": "'Triangle' has a precise geometric definition: a shape with exactly three straight sides. It is not cited as vague in the section."}, {"text": "Mammal", "isCorrect": false, "rationale": "'Mammal' has a clear biological definition. It is not listed among vague terms in this section."}, {"text": "Fair", "isCorrect": true, "rationale": "The section lists 'fair' as 'maybe the trickiest one of all' among common vague terms. Its meaning varies greatly depending on context and perspective."}, {"text": "Circular", "isCorrect": false, "rationale": "'Circular' is a technical term used in this chapter to describe a type of bad definition. It is not discussed as an example of vague everyday language."}], "id": "q04"}, {"question": "What is loaded language?", "options": [{"text": "Language that has no clear denotation, only connotation.", "isCorrect": false, "rationale": "Loaded words typically do have denotations; the issue is that their strong connotations are used to influence emotions rather than convey neutral information."}, {"text": "The use of words with strong positive or negative connotations to influence emotions and opinions rather than present information neutrally.", "isCorrect": true, "rationale": "This is the section's definition. Loaded language 'weaponizes' connotation — the same event can be described as 'reckless spending' or 'ambitious investment' with very different emotional effects."}, {"text": "The use of technical jargon that most readers cannot understand.", "isCorrect": false, "rationale": "Technical jargon may be unclear, but loaded language is specifically about emotional manipulation through word choice, not difficulty of comprehension."}, {"text": "A fallacy that shifts the meaning of a key word between premises.", "isCorrect": false, "rationale": "Shifting word meanings between premises is equivocation. Loaded language involves choosing emotionally charged words, not changing definitions mid-argument."}], "id": "q05"}, {"question": "Two news headlines cover the same event: 'Mayor's reckless spending plan sparks outrage' vs. 'Mayor's ambitious investment proposal generates debate.' What concept does this example illustrate?", "options": [{"text": "Vagueness — neither headline is specific enough about what the Mayor actually proposed.", "isCorrect": false, "rationale": "While the headlines lack detail, the section uses this example to illustrate loaded language: emotionally charged word choices ('reckless' vs. 'ambitious') that shape the reader's attitude."}, {"text": "Loaded language — the same event is described using words with opposite emotional connotations.", "isCorrect": true, "rationale": "The section's 'Think About It' box uses this example to show how loaded language works: 'reckless' and 'outrage' create a negative frame, while 'ambitious' and 'debate' create a neutral or positive frame."}, {"text": "Circular definition — each headline defines the Mayor's plan in terms of itself.", "isCorrect": false, "rationale": "No circular reasoning is present. The headlines describe an event using different value-laden words — a loaded language technique."}, {"text": "Equivocation — the word 'plan' means something different in each headline.", "isCorrect": false, "rationale": "'Plan' and 'proposal' are near-synonyms here; no meaning shift occurs. The contrast is in the emotionally loaded adjectives and nouns, not in a shifting key term."}], "id": "q06"}, {"question": "According to the section, why is the advertising phrase 'Made with all-natural ingredients!' potentially misleading?", "options": [{"text": "Because 'natural' is a circular definition of itself.", "isCorrect": false, "rationale": "The issue is not circularity. 'All-natural' is loaded language — it sounds positive, but the word is so broadly applicable as to be meaningless."}, {"text": "Because 'all-natural' is vague and loaded — poison ivy and volcanoes are also all-natural, so the phrase doesn't actually guarantee safety or quality.", "isCorrect": true, "rationale": "The section uses this exact example to show how loaded language works: 'all-natural' triggers positive emotions without conveying any meaningful or verifiable quality standard."}, {"text": "Because the phrase uses technical jargon that consumers cannot verify.", "isCorrect": false, "rationale": "'All-natural' is not technical jargon — it is simple language chosen precisely because it sounds reassuring and positive to consumers."}, {"text": "Because it is ambiguous — 'natural' could mean 'from nature' or 'normal.'", "isCorrect": false, "rationale": "While 'natural' has some ambiguity, the section's point here is about loaded language: the positive connotation is being exploited, not a genuine two-meaning ambiguity."}], "id": "q07"}, {"question": "What is the first of the three strategies the section recommends for defending against vagueness and loaded language?", "options": [{"text": "Swap in neutral words to test whether the argument stands on logic alone.", "isCorrect": false, "rationale": "Swapping in neutral words is strategy 2, not strategy 1. The section lists three strategies in numbered order."}, {"text": "Check the denotation by stripping away connotations.", "isCorrect": false, "rationale": "Checking the denotation is strategy 3. The section's first recommendation concerns vague quantitative language."}, {"text": "Ask for numbers when someone uses vague words like 'a lot,' 'soon,' or 'most.'", "isCorrect": true, "rationale": "Strategy 1 is: 'Ask for numbers.' The section recommends asking 'How many exactly?' or 'By when?' to force precision when vague quantifiers are used."}, {"text": "Identify whether the speaker is using connotation to replace evidence.", "isCorrect": false, "rationale": "This describes the general goal behind all three strategies, not any single numbered step. The first concrete action is asking for specific numbers."}], "id": "q08"}, {"question": "The spotlight box discusses a legal case involving whether a tomato is a 'fruit' or 'vegetable.' What lesson does this illustrate?", "options": [{"text": "Courts always defer to scientific definitions over everyday language.", "isCorrect": false, "rationale": "The example shows the opposite: the U.S. Supreme Court ruled the tomato a vegetable for legal purposes, overriding its scientific classification as a fruit."}, {"text": "The exact meaning of words can have major real-world consequences, which is why legal contracts strive to eliminate vagueness.", "isCorrect": true, "rationale": "The spotlight uses this case to show that word definitions are not trivial — tax law, contract enforcement, and court outcomes can all hinge on precisely how a word is defined."}, {"text": "Scientists and lawyers always agree on word meanings.", "isCorrect": false, "rationale": "The tomato case illustrates the opposite: scientific meaning ('fruit') and legal/everyday meaning ('vegetable') diverged, and the court had to choose."}, {"text": "Vague language is useful in legal settings because it gives judges flexibility.", "isCorrect": false, "rationale": "The section argues that vagueness creates problems in law. The reason contracts are 'so long and detailed' is precisely to remove vagueness and prevent disputes."}], "id": "q09"}, {"question": "Strategy 2 for countering loaded language is to 'swap in neutral words.' What is the purpose of this strategy?", "options": [{"text": "To make the argument easier to understand by simplifying the vocabulary.", "isCorrect": false, "rationale": "Simplification is not the goal. The purpose is to test whether the argument's force comes from evidence and logic, or solely from the emotional power of word choice."}, {"text": "To reveal whether the argument's persuasive force relies on emotion rather than logic.", "isCorrect": true, "rationale": "The section states: 'Does the argument still hold up? If not, the argument was relying on emotion, not logic.' Replacing loaded words with neutral ones exposes whether substance remains."}, {"text": "To translate the argument into formal logical symbols.", "isCorrect": false, "rationale": "Formal symbolization is a technique from formal logic and is not mentioned in this section. The strategy here is informal word substitution."}, {"text": "To make the speaker's position seem weaker than it really is.", "isCorrect": false, "rationale": "The strategy is not about undermining the speaker unfairly, but about separating emotional rhetoric from genuine evidence. The goal is honest evaluation, not bias."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
