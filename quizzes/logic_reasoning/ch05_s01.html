<script>
var QUESTIONS = [{"question": "What is the fundamental characteristic that defines a 'relevance fallacy'?", "options": [{"text": "It attacks the character or motives of the person making the argument.", "isCorrect": false, "rationale": "While attacking the person (Ad Hominem) is a type of relevance fallacy, it is not the fundamental characteristic of all relevance fallacies. The core issue is the irrelevance of the 'evidence' or argument presented."}, {"text": "It introduces information or evidence that is logically unrelated to the argument's conclusion.", "isCorrect": true, "rationale": "The text states that relevance fallacies are 'bad arguments that try to win by bringing up something that has nothing to do with the real issue. The 'evidence' they offer is irrelevant. It doesn't actually connect to the conclusion.'"}, {"text": "It misrepresents an opponent's argument to make it easier to refute.", "isCorrect": false, "rationale": "Misrepresenting an opponent's argument is specific to the Straw Man fallacy, which is one type of relevance fallacy, but not the defining characteristic of the broader category."}, {"text": "It attempts to deflect criticism by pointing out similar faults in the accuser.", "isCorrect": false, "rationale": "This describes the Tu Quoque fallacy, which is another specific type of relevance fallacy, not the overarching definition."}]}, {"question": "During a debate about the city's budget, Councilwoman Jenkins states, 'Councilman Smith's proposal to increase funding for public parks is ill-conceived. Remember, he was fined last year for failing to maintain his own private garden.' Which fallacy is Councilwoman Jenkins committing?", "options": [{"text": "Straw Man", "isCorrect": false, "rationale": "A Straw Man fallacy would involve misrepresenting Councilman Smith's proposal to make it easier to attack, which is not what Jenkins does here."}, {"text": "Red Herring", "isCorrect": false, "rationale": "A Red Herring would involve changing the subject entirely. While the private garden issue is irrelevant, it's used to discredit Smith personally, not to divert from the overall topic of the budget."}, {"text": "Ad Hominem", "isCorrect": true, "rationale": "Councilwoman Jenkins attacks Councilman Smith's personal action (failing to maintain his garden) instead of addressing the merits of his public parks funding proposal. This fits the definition of Ad Hominem: 'attacks the person making the argument instead of addressing the argument itself.'"}, {"text": "Tu Quoque", "isCorrect": false, "rationale": "Tu Quoque involves deflecting criticism by pointing out hypocrisy in the accuser. Here, Jenkins is criticizing Smith, not deflecting criticism directed at her."}]}, {"question": "The textbook clarifies a common misconception about ad hominem fallacies. Which of the following situations most accurately illustrates an ad hominem fallacy, distinguishing it from a mere insult?", "options": [{"text": "Shouting 'You're just a crybaby if you think that!' during an argument.", "isCorrect": false, "rationale": "While 'crybaby' is an insult, it doesn't explicitly reject the argument based on the person's identity or character as a *reason* for the argument itself being bad. It's more of a general dismissal."}, {"text": "Rejecting a climate scientist's findings by saying, 'She only argues for climate change research because she gets grants for it; she's just greedy.'", "isCorrect": true, "rationale": "This is an Ad Hominem because it questions the scientist's motives ('she's just greedy') as a reason to dismiss her scientific findings, rather than evaluating the logic and evidence of her argument. The text lists 'Questioning motives' as a disguise for Ad Hominem."}, {"text": "Stating, 'Your proposal is fundamentally flawed because it relies on outdated statistics and ignores current economic realities.'", "isCorrect": false, "rationale": "This statement critiques the substance and evidence of the argument itself, which is a legitimate form of criticism, not an Ad Hominem."}, {"text": "Calling someone 'uninformed' because they hold an opinion you disagree with.", "isCorrect": false, "rationale": "While calling someone 'uninformed' can be an insult, for it to be an Ad Hominem, the claim would need to be that the argument is invalid *because* the person is uninformed, specifically trying to make you think 'this person is bad, so their argument must be bad too' based on that characteristic."}]}, {"question": "A student proposes, 'Our school should implement a 'no-phone' policy during class time to improve focus.' Another student replies, 'So, you want to confiscate everyone's phones the moment they walk onto campus and make us completely isolated from the outside world? That's ridiculous!' What fallacy is the second student using?", "options": [{"text": "Ad Hominem", "isCorrect": false, "rationale": "The reply does not attack the character or personal traits of the student making the proposal."}, {"text": "Red Herring", "isCorrect": false, "rationale": "The reply stays on the topic of phones and school policy; it does not introduce a completely unrelated subject."}, {"text": "Straw Man", "isCorrect": true, "rationale": "The second student misrepresents the original proposal ('no-phone policy during class time') by exaggerating it to 'confiscate everyone's phones... and make us completely isolated.' This is a classic Straw Man, twisting the words to make the argument easier to attack, as described in the 'Straw Man in a Family Debate' example."}, {"text": "Tu Quoque", "isCorrect": false, "rationale": "There is no attempt to deflect criticism by pointing out hypocrisy; the second student is attacking the (misrepresented) proposal directly."}]}, {"question": "The core mechanism of a straw man fallacy involves:", "options": [{"text": "Shifting the conversation to a completely different, unrelated topic.", "isCorrect": false, "rationale": "This describes a Red Herring fallacy, not a Straw Man."}, {"text": "Discrediting an argument by pointing out flaws in the arguer's personal character.", "isCorrect": false, "rationale": "This describes an Ad Hominem fallacy, not a Straw Man."}, {"text": "Creating a distorted or exaggerated version of an opponent's argument to make it easier to defeat.", "isCorrect": true, "rationale": "The text defines a Straw Man as misrepresenting 'someone's argument to make it easier to attack. Instead of responding to what the person actually said, you respond to a weaker, twisted version of it.'"}, {"text": "Arguing that a criticism is invalid because the person making it is also guilty of the same fault.", "isCorrect": false, "rationale": "This describes a Tu Quoque fallacy, not a Straw Man."}]}, {"question": "During a town hall meeting, a citizen asks the mayor, 'What are you doing to address the rising crime rate in our city?' The mayor responds, 'I'm glad you asked about our city's well-being! We've made great strides in revitalizing the downtown area, bringing new businesses and jobs to our community.' Which fallacy has the mayor committed?", "options": [{"text": "Ad Hominem", "isCorrect": false, "rationale": "The mayor does not attack the character of the citizen asking the question."}, {"text": "Straw Man", "isCorrect": false, "rationale": "The mayor does not misrepresent the citizen's question about the crime rate."}, {"text": "Red Herring", "isCorrect": true, "rationale": "The mayor introduces an unrelated topic (downtown revitalization and jobs) to distract from the original question about the rising crime rate. This is precisely how the text defines a Red Herring: 'introduces an unrelated topic to distract from the original argument.'"}, {"text": "Tu Quoque", "isCorrect": false, "rationale": "The mayor is not deflecting criticism by pointing out the citizen's own faults."}]}, {"question": "According to the textbook's 'Common Misconceptions' section, what is the primary difference between a red herring and a straw man fallacy?", "options": [{"text": "A red herring attacks the person, while a straw man misrepresents their argument.", "isCorrect": false, "rationale": "Attacking the person is an Ad Hominem, not a Red Herring."}, {"text": "A red herring changes the topic entirely, while a straw man distorts the opponent's actual argument.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states: 'students may confuse red herring with straw man — emphasize that a red herring changes the topic, while a straw man changes the argument.'"}, {"text": "A red herring points out hypocrisy, while a straw man introduces irrelevant evidence.", "isCorrect": false, "rationale": "Pointing out hypocrisy is characteristic of Tu Quoque. Both red herring and straw man involve irrelevant evidence, but in different ways."}, {"text": "A red herring is always intentional, while a straw man is usually accidental.", "isCorrect": false, "rationale": "The text does not differentiate these fallacies based on the arguer's intent."}]}, {"question": "A teacher tells a student, 'You need to be more responsible and turn in your assignments on time.' The student replies, 'But Mrs. Davis, you were late to class yourself yesterday!' Which fallacy is the student using?", "options": [{"text": "Ad Hominem", "isCorrect": false, "rationale": "The student is not attacking Mrs. Davis's character to dismiss her argument entirely, but rather deflecting the criticism by pointing out her hypocrisy."}, {"text": "Straw Man", "isCorrect": false, "rationale": "The student is not misrepresenting the teacher's instruction about assignments."}, {"text": "Red Herring", "isCorrect": false, "rationale": "While Mrs. Davis being late is a diversion, it's specifically used to deflect a criticism by accusing the critic of the same fault, which is Tu Quoque, not a general topic change."}, {"text": "Tu Quoque", "isCorrect": true, "rationale": "The student deflects the teacher's criticism by pointing out that the teacher 'does the same thing' (was late). This is the definition of Tu Quoque: 'deflects criticism by pointing out that the other person does the same thing. It's the classic 'you do it too!' defense.'"}]}, {"question": "Why is a tu quoque fallacy considered a logical error, even if the person making the accusation is indeed hypocritical?", "options": [{"text": "Because hypocrisy automatically invalidates any criticism someone might offer.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'even if the other person is a hypocrite, that doesn't make their argument wrong.'"}, {"text": "Because it distracts from the validity of the original argument by focusing on the accuser's behavior.", "isCorrect": true, "rationale": "The text explains that 'the real question is whether their argument makes sense.' A Tu Quoque shifts focus from the argument's logic to the arguer's consistency, making it irrelevant to the argument's truth or falsity."}, {"text": "Because it is impossible for someone who is a hypocrite to make a valid point.", "isCorrect": false, "rationale": "This is contradicted by the text's example: 'A doctor who smokes is still right that smoking is unhealthy.'"}, {"text": "Because it always involves a misrepresentation of the opponent's argument.", "isCorrect": false, "rationale": "Misrepresentation is the characteristic of a Straw Man fallacy, not Tu Quoque."}]}, {"question": "Sarah argues that the school should invest in better cybersecurity measures due to recent data breaches at other schools. Mark responds, 'Sarah, you're always losing your charger, so why should we trust you with digital security decisions?' Meanwhile, Emily chimes in, 'Security? What about the school's terrible food? We need more options in the cafeteria!'", "options": [{"text": "Mark committed a Straw Man fallacy.", "isCorrect": false, "rationale": "Mark did not misrepresent Sarah's argument; instead, he attacked her personal habits to discredit her, which is an Ad Hominem."}, {"text": "Emily committed a Tu Quoque fallacy.", "isCorrect": false, "rationale": "Emily did not point out hypocrisy in Sarah or Mark; she changed the subject entirely, which is a Red Herring."}, {"text": "Mark committed an Ad Hominem, and Emily committed a Red Herring.", "isCorrect": true, "rationale": "Mark attacks Sarah's personal habit (losing chargers) instead of her argument about cybersecurity, fitting the definition of Ad Hominem. Emily introduces a completely unrelated topic (cafeteria food) to distract from the security discussion, which is a Red Herring."}, {"text": "Both Mark and Emily committed Ad Hominem fallacies.", "isCorrect": false, "rationale": "Only Mark committed an Ad Hominem. Emily changed the topic, committing a Red Herring, not attacking a person."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
