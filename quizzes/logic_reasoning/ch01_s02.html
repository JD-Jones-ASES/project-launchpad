<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes an argument from a non-argument, according to the provided text?", "options": [{"text": "It must be presented in a formal setting, such as a debate.", "isCorrect": false, "rationale": "The text states that arguments 'pop up in ordinary conversations all the time' and can be found in stories and news, indicating they are not limited to formal settings."}, {"text": "It consists of a claim that is supported by one or more reasons.", "isCorrect": true, "rationale": "The text defines an argument as a claim backed up by reasons, where premises support a conclusion. This is the core definition provided and illustrated throughout the section."}, {"text": "It always uses signal words like 'because' or 'therefore'.", "isCorrect": false, "rationale": "The text explicitly mentions that 'Students may struggle with arguments that lack signal words,' implying arguments can exist without them, requiring students to ask 'Is there a claim backed up by reasons?'"}, {"text": "It expresses a personal belief or preference.", "isCorrect": false, "rationale": "The text clarifies that 'an opinion without reasons is just a claim, not an argument,' distinguishing opinions from arguments which require support."}]}, {"question": "Which of the following statements is an argument, based on the criteria presented in the text?", "options": [{"text": "Turn off the lights when you leave the room.", "isCorrect": false, "rationale": "This is a command or instruction, which the text identifies as a type of non-argument because it does not make a claim supported by reasons."}, {"text": "The new cafe has excellent coffee because they roast their beans fresh daily.", "isCorrect": true, "rationale": "This statement presents a claim ('The new cafe has excellent coffee') and provides a reason ('they roast their beans fresh daily') to support it, fitting the definition of an argument."}, {"text": "What is your favorite type of music?", "isCorrect": false, "rationale": "This is a question, which the text explicitly states is 'not an argument. Questions don't make claims or give reasons.'"}, {"text": "I enjoy reading mystery novels.", "isCorrect": false, "rationale": "This is an opinion or statement of preference without any supporting reasons, thus it is not an argument according to the text."}]}, {"question": "Consider the statement: 'Cats are better pets than dogs.' According to the text, why is this statement, in isolation, *not* an argument?", "options": [{"text": "It is a factually incorrect statement.", "isCorrect": false, "rationale": "The truthfulness of a statement does not determine if it is an argument; an argument just needs a claim and reasons, regardless of accuracy. The text doesn't discuss factual correctness as a defining factor for arguments."}, {"text": "It expresses a personal opinion without providing reasons to support the preference.", "isCorrect": true, "rationale": "The text states, 'an opinion without reasons is just a claim, not an argument.' This statement is a preference lacking supporting premises."}, {"text": "It is too short to be considered a full argument.", "isCorrect": false, "rationale": "The length of a statement is not a criterion for whether it constitutes an argument; what matters is the presence of a claim supported by reasons."}, {"text": "It uses subjective language that cannot be objectively proven.", "isCorrect": false, "rationale": "While true, the text does not use subjectivity as the primary distinction between an opinion and an argument; the key is the presence or absence of supporting reasons."}]}, {"question": "In the example from a news headline: 'City Council Should Build New Park, Residents Say, Citing Lack of Green Space and Rising Childhood Obesity,' what is the conclusion of the residents' argument?", "options": [{"text": "There is a lack of green space.", "isCorrect": false, "rationale": "This is identified as a premise, providing a reason for the conclusion."}, {"text": "Childhood obesity is rising.", "isCorrect": false, "rationale": "This is identified as a premise, offering another reason for the conclusion."}, {"text": "The city council should build a new park.", "isCorrect": true, "rationale": "This is the main claim that the residents are trying to persuade the City Council to accept, supported by the given premises."}, {"text": "The residents are making a statement, not an argument.", "isCorrect": false, "rationale": "The text explicitly breaks down this example as an argument, identifying its premises and conclusion."}]}, {"question": "According to the 'Common Misconceptions' section, what is a frequent mistake students make when trying to identify arguments?", "options": [{"text": "They expect arguments to always be about serious or complex topics.", "isCorrect": false, "rationale": "The text does not mention this as a common misconception. It focuses on the structural elements of an argument."}, {"text": "They assume that any group of sentences automatically forms an argument.", "isCorrect": false, "rationale": "While related, the more specific misconception highlighted is labeling *every opinion* as an argument. The text broadly states 'Not every group of sentences is an argument' as a warning."}, {"text": "They confuse arguments with rhetorical questions.", "isCorrect": false, "rationale": "This is not explicitly listed as a common misconception in the provided text."}, {"text": "They incorrectly label every opinion as an argument.", "isCorrect": true, "rationale": "The text states: 'Students may label every opinion as an argument. Remind them that an opinion without reasons is just a claim, not an argument.'"}]}, {"question": "If Jordan, in 'The Movie Debate' example, had said 'I'd rather watch a comedy because we've seen too many action movies lately,' what would be the effect on Jordan's statement?", "options": [{"text": "It would still be just a preference, as comedy is subjective.", "isCorrect": false, "rationale": "The text clarifies that by adding reasons, Jordan *would* be making an argument, regardless of the subjective nature of the preference."}, {"text": "It would become a command or instruction.", "isCorrect": false, "rationale": "Adding reasons for a preference turns it into an argument, not a command. Commands lack premises supporting a conclusion."}, {"text": "It would transform into an argument with a conclusion and a premise.", "isCorrect": true, "rationale": "The text directly states: 'If Jordan said, 'I'd rather watch a comedy because we've seen too many action movies lately,' that would be an argument.' The preference becomes the conclusion, and 'we've seen too many action movies lately' becomes the premise."}, {"text": "It would be an example of a description.", "isCorrect": false, "rationale": "A description simply states facts or characteristics. Jordan's revised statement would be a claim supported by a reason, not just a description."}]}, {"question": "The text advises students struggling with arguments lacking signal words to ask a specific question. What is that question?", "options": [{"text": "'Is this statement factually accurate?'", "isCorrect": false, "rationale": "The advice is not about factual accuracy, but about identifying the structure of an argument. An argument can be factually inaccurate but still be an argument."}, {"text": "'Who is the speaker or author of this statement?'", "isCorrect": false, "rationale": "While context can be helpful, the specific advice focuses on the internal structure of the statement itself, not external factors."}, {"text": "'Is there a claim backed up by reasons?'", "isCorrect": true, "rationale": "The text explicitly states: 'Encourage them to ask: “Is there a claim backed up by reasons?”' This helps identify premises and conclusions even without explicit signal words."}, {"text": "'Does this statement include an opinion or a fact?'", "isCorrect": false, "rationale": "The focus is on whether an opinion/claim is *supported* by reasons, not merely its nature as an opinion or fact."}]}, {"question": "Based on the 'tryit' example, if a statement says, 'You should join the robotics club because it looks great on college applications, and you already love building things,' what are the premises?", "options": [{"text": "'You should join the robotics club.'", "isCorrect": false, "rationale": "This is the conclusion, the main claim being advocated for."}, {"text": "'It looks great on college applications' and 'you already love building things.'", "isCorrect": true, "rationale": "These are the two reasons provided to support the idea that 'You should join the robotics club,' making them the premises of the argument."}, {"text": "The statement contains no clear premises, only a suggestion.", "isCorrect": false, "rationale": "The 'tryit' example is presented as an argument, and these two clauses are explicitly the supporting reasons."}, {"text": "Only 'it looks great on college applications' is a premise.", "isCorrect": false, "rationale": "Both reasons are presented as supporting the conclusion, thus both function as premises."}]}, {"question": "Who is recognized as the 'Father of Logic' for his systematic study of arguments, as mentioned in the 'logiclegend' section?", "options": [{"text": "Plato", "isCorrect": false, "rationale": "Plato was Aristotle's teacher, but the text identifies Aristotle as the 'Father of Logic.'"}, {"text": "Alexander the Great", "isCorrect": false, "rationale": "Alexander the Great was Aristotle's student, not the 'Father of Logic.'"}, {"text": "Socrates", "isCorrect": false, "rationale": "Socrates was an influential Greek philosopher, but the text specifically names Aristotle for his contributions to logic."}, {"text": "Aristotle", "isCorrect": true, "rationale": "The 'logiclegend' section explicitly states: 'Aristotle (384–322 BC) was an ancient Greek philosopher who is often called the 'Father of Logic.''"}]}, {"question": "When the Big Bad Wolf says, 'Then I'll huff, and I'll puff, and I'll blow your house in!', the text identifies this as:", "options": [{"text": "An argument, as it implies a consequence for the pig's refusal.", "isCorrect": false, "rationale": "The text states, 'Is there an argument here? Not really — the wolf is making a threat, and the pig is refusing. There are no premises supporting a conclusion.'"}, {"text": "A description of the wolf's actions.", "isCorrect": false, "rationale": "While it describes potential actions, its primary function in the narrative is a threat, not a neutral description."}, {"text": "A command given by the wolf.", "isCorrect": false, "rationale": "It's more of a threat than a direct command, and commands are non-arguments anyway. The text specifies it as a threat."}, {"text": "A threat, rather than an argument, because it lacks premises supporting a conclusion.", "isCorrect": true, "rationale": "The text explicitly clarifies: 'Is there an argument here? Not really — the wolf is making a threat, and the pig is refusing. There are no premises supporting a conclusion.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
