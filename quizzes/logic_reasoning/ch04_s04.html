<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "A university policy states: \"If a student submits their assignment late OR without a proper cover sheet, then they will receive a penalty.\" Which logical statement accurately translates this policy?", "options": [{"text": "$(L \\land C) \\rightarrow P$", "isCorrect": false, "rationale": "This statement uses the 'AND' connective, which means both submitting late AND not having a cover sheet must occur for a penalty. The policy uses 'OR', indicating that either condition is sufficient for a penalty."}, {"text": "$(L \\lor C) \\rightarrow P$", "isCorrect": true, "rationale": "This statement correctly uses the 'OR' connective to represent that if a student submits their assignment late (L) OR without a proper cover sheet (C), then they will receive a penalty (P). This accurately captures the policy's condition."}, {"text": "$P \\rightarrow (L \\lor C)$", "isCorrect": false, "rationale": "This statement reverses the conditional, implying that if a student receives a penalty, then they must have submitted late or without a cover sheet. While this might be true in practice, it does not represent the original policy's condition for *receiving* a penalty."}, {"text": "$L \\rightarrow (C \\land P)$", "isCorrect": false, "rationale": "This statement incorrectly groups the conditions and consequence. It suggests that submitting late implies both not having a cover sheet AND receiving a penalty, which is not what the original rule states. The conditional's antecedent should include both L and C connected by OR."}], "id": "q01"}, {"question": "A company policy states: \"If an employee works overtime, then they receive bonus pay.\" Which of the following statements represents the converse of this policy, and is it necessarily true?", "options": [{"text": "\"If an employee receives bonus pay, then they worked overtime.\" (Necessarily true)", "isCorrect": false, "rationale": "This is the correct converse, but it is not necessarily true. An employee might receive bonus pay for reasons other than working overtime, such as exceptional performance or a holiday bonus, as explained in the text regarding school rules."}, {"text": "\"If an employee receives bonus pay, then they worked overtime.\" (Not necessarily true)", "isCorrect": true, "rationale": "The converse of 'If O, then B' is 'If B, then O'. This statement accurately represents the converse. As the text explains, the converse of a real-world rule is not automatically true, because other conditions might lead to the 'then' part (e.g., bonus pay for other reasons)."}, {"text": "\"If an employee does not work overtime, then they do not receive bonus pay.\" (Necessarily true)", "isCorrect": false, "rationale": "This is the inverse of the original policy. The inverse is not necessarily true, and it is not the converse. An employee might still receive bonus pay for other reasons even if they don't work overtime."}, {"text": "\"If an employee does not receive bonus pay, then they did not work overtime.\" (Not necessarily true)", "isCorrect": false, "rationale": "This is the contrapositive of the original policy, and the contrapositive is logically equivalent to the original statement, meaning it *is* necessarily true if the original is true. However, the question asks for the converse, not the contrapositive."}], "id": "q02"}, {"question": "A friend promises, \"If I go to the concert, then I will text you a photo.\" You later learn your friend did go to the concert. Based on the rules of propositional logic, what is the expected outcome?", "options": [{"text": "Your friend might text you a photo, but it's not guaranteed.", "isCorrect": false, "rationale": "According to Modus Ponens, if the 'if' part (going to the concert) is true, then the 'then' part (texting a photo) must logically follow. This option suggests uncertainty, which contradicts Modus Ponens."}, {"text": "Your friend will definitely text you a photo.", "isCorrect": true, "rationale": "This is an application of Modus Ponens. If the premise (going to the concert) is true, and the conditional statement (if I go, then I will text) is true, then the conclusion (texting a photo) must logically follow."}, {"text": "Your friend will not text you a photo because other factors might interfere.", "isCorrect": false, "rationale": "While real life can introduce interference, propositional logic dictates what *should* happen based on the given rule and truth of the antecedent. Introducing external factors violates the premise of applying logic directly to the statement."}, {"text": "There is no logical conclusion about a photo because the 'then' part could be false.", "isCorrect": false, "rationale": "This is incorrect. If the 'if' part of a true conditional is true, the 'then' part cannot be false. That would make the entire conditional false, contradicting the premise of a true promise."}], "id": "q03"}, {"question": "A sign at a library states: \"If you borrow a book, then you must have a library card.\" A person enters the library but does not borrow a book. Based on this rule, what can be concluded about whether they have a library card?", "options": [{"text": "They definitely do not have a library card.", "isCorrect": false, "rationale": "This is an example of the fallacy of denying the antecedent. The rule only specifies what happens if you *do* borrow a book. It says nothing about what happens if you *don't*."}, {"text": "They definitely have a library card.", "isCorrect": false, "rationale": "The rule does not provide any information to conclude that they *must* have a library card if they don't borrow a book. This is an invalid inference."}, {"text": "We cannot logically conclude whether they have a library card.", "isCorrect": true, "rationale": "This scenario demonstrates 'denying the antecedent,' which is an invalid form of argument. The rule 'If B, then C' only tells us about the consequence (C) when the antecedent (B) is true. If B is false, we cannot logically conclude anything about C; the person might or might not have a card."}, {"text": "They might have a library card, but it's against the rules for them to enter.", "isCorrect": false, "rationale": "The rule only concerns borrowing books and having a card; it doesn't mention rules for entering the library. This introduces external information and makes an invalid conclusion about entry rules."}], "id": "q04"}, {"question": "A software update process follows these rules: (1) If the internet connection is unstable, then the update will fail. (2) If the update fails, then the system will revert to a previous version. If your internet connection is unstable, what is the logical conclusion?", "options": [{"text": "The system will definitely revert to a previous version.", "isCorrect": true, "rationale": "This is a chain of conditionals. If 'internet unstable' (I) then 'update fails' (F) ($I \\rightarrow F$). If 'update fails' (F) then 'system reverts' (R) ($F \\rightarrow R$). If I is true, then by Modus Ponens F must be true. If F is true, then by Modus Ponens R must be true. Therefore, if the internet is unstable, the system will revert to a previous version ($I \\rightarrow R$). "}, {"text": "The update might fail, but the system won't necessarily revert.", "isCorrect": false, "rationale": "If the internet is unstable, the update *will* fail by the first rule. If the update fails, the system *will* revert by the second rule. So, the system reverting is a direct logical consequence."}, {"text": "The update will succeed, but the system might still revert.", "isCorrect": false, "rationale": "This contradicts the first rule, which states that an unstable internet connection leads to update failure, not success. The conclusion is therefore incorrect."}, {"text": "The internet connection will stabilize, preventing the update failure.", "isCorrect": false, "rationale": "The rules describe consequences *if* the internet is unstable; they do not suggest the internet will stabilize. This introduces an unstated premise not supported by the given rules."}], "id": "q05"}, {"question": "Consider these rules for an online course: (1) If the course website is down, then students cannot access readings. (2) If students cannot access readings, then they cannot complete the quiz. (3) If students cannot complete the quiz, then their grade will be affected. If the course website is down, what is the ultimate logical conclusion based on all three rules?", "options": [{"text": "Students cannot access readings.", "isCorrect": false, "rationale": "This is an intermediate conclusion (from rule 1), but not the ultimate conclusion of the entire chain of conditionals."}, {"text": "Students cannot complete the quiz.", "isCorrect": false, "rationale": "This is an intermediate conclusion (from rules 1 and 2), but not the ultimate conclusion of the entire chain of conditionals."}, {"text": "Students' grades will be affected.", "isCorrect": true, "rationale": "This is the ultimate logical conclusion. The rules form a chain: Website Down (W) $\\rightarrow$ Cannot Access Readings (R) $\\rightarrow$ Cannot Complete Quiz (Q) $\\rightarrow$ Grade Affected (G). If W is true, then R, Q, and finally G must also be true."}, {"text": "The course website will eventually come back online.", "isCorrect": false, "rationale": "The rules describe the consequences *if* the website is down; they do not provide any information or conclusion about when or if the website will come back online. This introduces an external assumption."}], "id": "q06"}, {"question": "A cafe offers a free drink if a customer has loyalty points AND orders a pastry. Which logical statement represents the condition for receiving a free drink?", "options": [{"text": "$L \\lor P \\rightarrow F$", "isCorrect": false, "rationale": "This statement uses 'OR', implying that either loyalty points or ordering a pastry alone would qualify for a free drink, which contradicts the stated requirement of 'AND'."}, {"text": "$L \\land P \\rightarrow F$", "isCorrect": true, "rationale": "This statement correctly represents the condition: if a customer has loyalty points (L) AND orders a pastry (P), then they receive a free drink (F). Both conditions must be met."}, {"text": "$F \\rightarrow L \\land P$", "isCorrect": false, "rationale": "This statement reverses the conditional, implying that receiving a free drink means the customer *must* have had loyalty points AND ordered a pastry. While often true in this specific context, it doesn't represent the *condition for receiving* the drink."}, {"text": "$L \\rightarrow P \\land F$", "isCorrect": false, "rationale": "This statement incorrectly groups the conditions and consequence. It suggests that having loyalty points implies both ordering a pastry AND receiving a free drink, which is not the full or correct representation of the rule."}], "id": "q07"}, {"question": "According to the \"Common misconceptions\" note, what is a key point to remember when applying propositional logic to real-world rules like \"If you study diligently, then you will pass the exam\"?", "options": [{"text": "Logic guarantees that if you study diligently, you *will* pass the exam, without exception.", "isCorrect": false, "rationale": "This statement reflects the misconception. The note explicitly states that logic tells us 'what should follow — not that it always does happen' in real life."}, {"text": "Logic describes what *should* happen based on the rule, not that it *always* happens in reality.", "isCorrect": true, "rationale": "The 'Common misconceptions' note clarifies that translating a rule into $P \\rightarrow Q$ means logic tells us what *should* follow, not that the rule can't be broken or that its outcome is guaranteed to happen in every real-world instance."}, {"text": "The rule itself implies that diligent study is the *only* way to pass the exam.", "isCorrect": false, "rationale": "A conditional statement ($P \\rightarrow Q$) does not imply that P is the *only* way to achieve Q. It only states what happens if P occurs. Other ways to achieve Q might exist, or Q might occur for other reasons. This is related to the fallacy of affirming the consequent if reversed."}, {"text": "Breaking the rule ($P \\rightarrow Q$) makes the entire logical statement false.", "isCorrect": false, "rationale": "Breaking a real-world rule means the 'then' part didn't follow despite the 'if' part being true. This would make the *real-world application* of the rule problematic, but the logical statement itself (as an abstract representation) describes what *should* happen, not necessarily what does."}], "id": "q08"}, {"question": "A student is researching the environmental impact of plastic but wants to exclude information related to plastic surgery. Which Boolean search query would best achieve this goal?", "options": [{"text": "\"plastic AND environmental OR surgery\"", "isCorrect": false, "rationale": "This query would search for pages mentioning 'plastic' and 'environmental' OR pages mentioning 'surgery'. It would include results about surgery, which is what the student wants to exclude."}, {"text": "\"plastic OR environmental -surgery\"", "isCorrect": false, "rationale": "This query would search for pages mentioning 'plastic' OR 'environmental', while excluding 'surgery'. However, it might return pages only about 'plastic' (e.g., plastic toys) or only about 'environmental' (e.g., environmental policies) without linking them to the core topic, and it incorrectly applies the NOT operator only to 'environmental'."}, {"text": "\"plastic environmental -surgery\"", "isCorrect": true, "rationale": "As the text explains, Google defaults to 'AND' for multiple terms, so 'plastic environmental' is equivalent to 'plastic AND environmental'. The minus sign ('-') is used for 'NOT'. Thus, this query effectively searches for pages containing both 'plastic' and 'environmental' but excludes any that also contain 'surgery'."}, {"text": "\"plastic AND environmental AND NOT surgery\"", "isCorrect": false, "rationale": "While logically correct, the prompt specifically shows the minus sign as the operator for 'NOT' in Boolean search. The format 'plastic environmental -surgery' is the direct application of the syntax provided in the example for Google's Boolean search capabilities."}], "id": "q09"}, {"question": "Based on the \"Real-Life Applications\" section, what is the primary benefit of understanding propositional logic in everyday scenarios?", "options": [{"text": "To guarantee that all rules and promises are always followed without exception.", "isCorrect": false, "rationale": "The section explicitly addresses the misconception that logic guarantees rules can't be broken, stating that logic tells us what *should* follow, not that it *always* happens."}, {"text": "To identify when others are making logical errors in their arguments.", "isCorrect": false, "rationale": "While a benefit of logic, the section primarily focuses on *personal* application in understanding rules, promises, and future scenarios, rather than policing others' arguments."}, {"text": "To predict and understand the logical consequences of rules and conditions before they occur.", "isCorrect": true, "rationale": "The section highlights 'What If?' scenario analysis as one of the coolest things, enabling individuals to 'think through scenarios before they happen' and 'figure out the logical consequences,' which is the primary benefit emphasized."}, {"text": "To simplify complex language into basic \"if-then\" statements without deeper analysis.", "isCorrect": false, "rationale": "While logic helps translate complex language, the emphasis of the section is on the *analysis* and understanding of consequences derived from these simplified statements, not merely the simplification itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
