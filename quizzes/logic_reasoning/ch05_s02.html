    };

<body>
<div class="quiz-container">

        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Appeal fallacies primarily aim to win an argument by:", "options": [{"text": "Attacking the personal character of the opposing arguer.", "isCorrect": false, "rationale": "Attacking the person (ad hominem) is a different type of fallacy, an 'irrelevant' one, not an appeal fallacy focused on feelings."}, {"text": "Manipulating the audience's emotions instead of providing logical evidence.", "isCorrect": true, "rationale": "The text explicitly states that appeal fallacies 'try to win by messing with your emotions' and that 'the fallacy happens when emotion is used instead of evidence,' making this the core mechanism."}, {"text": "Distorting the opponent's argument to make it easier to attack.", "isCorrect": false, "rationale": "Distorting an argument (straw man) is another type of 'irrelevant' fallacy, distinct from appeal fallacies that specifically target emotions."}, {"text": "Introducing irrelevant information to divert attention from the main point.", "isCorrect": false, "rationale": "Introducing irrelevant information (red herring) is a type of 'irrelevant' fallacy, separate from appeal fallacies that operate by influencing feelings."}], "id": "q01"}, {"question": "Which of the following scenarios best exemplifies the bandwagon fallacy?", "options": [{"text": "A public health official advises getting a flu shot based on current epidemiological data.", "isCorrect": false, "rationale": "This is a legitimate appeal to expert knowledge and data, not an argument based on popularity."}, {"text": "A political candidate states, 'Opinion polls show that 70% of the population supports my proposal, so it must be the right path for our country.'", "isCorrect": true, "rationale": "This aligns with the bandwagon fallacy (also appeal to popularity), arguing that something is good or true simply because many people believe or do it, as indicated by poll results, without providing actual evidence for its merit."}, {"text": "An advertisement features a famous athlete endorsing a new brand of sports drink.", "isCorrect": false, "rationale": "This is an example of an appeal to authority fallacy if the athlete lacks relevant expertise, as their fame is used in place of proper evidence."}, {"text": "A charity commercial uses images of suffering animals to encourage viewers to donate.", "isCorrect": false, "rationale": "This is an example of an appeal to emotion fallacy, specifically pity, used to solicit donations."}], "id": "q02"}, {"question": "According to the text, when is citing an expert's opinion *not* considered an appeal to authority fallacy?", "options": [{"text": "When the expert is widely recognized globally, regardless of their specific field of knowledge.", "isCorrect": false, "rationale": "The text explicitly states it's only a fallacy when the 'authority' isn't an expert in the *relevant* area, meaning global recognition alone is insufficient."}, {"text": "When the expert's knowledge and qualifications are directly relevant to the topic being discussed.", "isCorrect": true, "rationale": "The text clarifies that citing an expert (like a heart surgeon on heart surgery) is 'perfectly fine' when 'they are an expert' in the relevant area, distinguishing it from the fallacy."}, {"text": "When the expert expresses a personal opinion that aligns with the general public's beliefs.", "isCorrect": false, "rationale": "An expert's personal opinion, even if popular, doesn't automatically make it non-fallacious unless their expertise is relevant to the topic; popularity itself can be a bandwagon argument."}, {"text": "When the expert is paid a significant amount to endorse a product or idea.", "isCorrect": false, "rationale": "Payment for endorsement does not automatically validate the expertise or remove the fallacious nature if the person lacks relevant knowledge."}], "id": "q03"}, {"question": "A popular social media influencer, primarily known for their fashion advice, posts a video claiming that a specific diet trend is the secret to perfect health, citing their own experience. What fallacy is this most clearly demonstrating?", "options": [{"text": "Bandwagon", "isCorrect": false, "rationale": "While the influencer's followers might jump on board, the primary fallacious element is the influencer's non-expert claim, not an argument based on widespread adoption (though it might lead to that)."}, {"text": "Appeal to Emotion", "isCorrect": false, "rationale": "The influencer is not primarily trying to evoke strong emotions like pity or guilt, but rather relying on their perceived authority based on fame."}, {"text": "Appeal to Authority", "isCorrect": true, "rationale": "This is an appeal to authority fallacy because the influencer, despite their popularity, lacks relevant expertise in health or diet to offer medical advice, similar to the text's example of a singer giving health advice."}, {"text": "Appeal to Fear", "isCorrect": false, "rationale": "There is no explicit warning of dire consequences for not following the diet trend."}], "id": "q04"}, {"question": "A non-profit organization's fundraising campaign features a commercial that shows an impoverished child with sad music playing, followed by a plea to donate 'to give this child hope.' No specific information about how donations are used or the organization's efficacy is provided. Which fallacy is most prominently employed?", "options": [{"text": "Appeal to Authority", "isCorrect": false, "rationale": "There is no 'authority' figure being cited in this scenario to back the claim."}, {"text": "Appeal to Fear", "isCorrect": false, "rationale": "While there might be an implicit desire to avoid the child's continued suffering, the primary tactic is to evoke pity and sadness, which falls under the broader 'appeal to emotion' definition more precisely than the specific 'appeal to fear'."}, {"text": "Appeal to Emotion", "isCorrect": true, "rationale": "This scenario directly uses sad images and music to evoke pity and guilt, making the audience 'feel a strong emotion... instead of giving you real evidence' about the organization's effectiveness, matching the text's definition and example."}, {"text": "Bandwagon", "isCorrect": false, "rationale": "The commercial is not arguing that you should donate because 'everyone else is doing it'."}], "id": "q05"}, {"question": "During a debate about a proposed school policy change, a student argues, 'If we don't adopt this new policy, our school will inevitably fall behind others, students will fail, and our reputation will be ruined!' This statement primarily uses which appeal fallacy?", "options": [{"text": "Appeal to Emotion", "isCorrect": false, "rationale": "While fear is an emotion, 'appeal to fear' is a more specific fallacy described in the text where a speaker warns of terrible things to scare someone into agreement, making it a more precise classification here."}, {"text": "Appeal to Fear", "isCorrect": true, "rationale": "The student is trying to scare listeners into agreeing by warning of 'terrible things that will happen' (falling behind, students failing, reputation ruined) if the policy isn't adopted, fitting the definition of appeal to fear."}, {"text": "Bandwagon", "isCorrect": false, "rationale": "The argument is not based on what 'everyone else is doing' but on potential negative consequences."}, {"text": "Appeal to Authority", "isCorrect": false, "rationale": "No expert or authority figure is being cited to support the claim about future outcomes."}], "id": "q06"}, {"question": "The textbook clarifies a common misconception regarding emotion in arguments. Which statement accurately reflects this clarification?", "options": [{"text": "Any time emotion is present in an argument, it automatically constitutes a fallacy.", "isCorrect": false, "rationale": "The text explicitly states: 'Students often think that any use of emotion in an argument is a fallacy. Clarify that emotions can be part of a good argument.'"}, {"text": "Emotions are never appropriate in any form of logical argumentation.", "isCorrect": false, "rationale": "This is incorrect; the text clarifies that emotions *can* be part of a good argument, but not as a substitute for evidence."}, {"text": "An argument becomes fallacious when emotion is used *instead of* logical evidence or reasoning.", "isCorrect": true, "rationale": "The text states, 'the fallacy happens when emotion is used instead of evidence,' making this the correct distinction."}, {"text": "Only negative emotions like fear or anger can lead to appeal fallacies, while positive emotions are always acceptable.", "isCorrect": false, "rationale": "The definition of appeal to emotion includes 'pity, happiness, anger, guilt,' not just negative emotions, and the issue is using emotion *instead* of evidence, regardless of its valence."}], "id": "q07"}, {"question": "Aristotle's contribution to the study of logical fallacies, as mentioned in the 'logiclegend' section, is significant because he:", "options": [{"text": "Argued that all arguments should primarily appeal to human emotions.", "isCorrect": false, "rationale": "Aristotle was a proponent of formal logic and reason, and his work was about identifying *bad* arguments, not advocating for emotional appeals."}, {"text": "Was the first to invent the concept of 'fake news' and warn against it.", "isCorrect": false, "rationale": "While related to deceptive arguments, the text describes his work as the 'first systematic catalog of logical fallacies,' not specifically 'fake news.'"}, {"text": "Developed the world's first systematic catalog of logical fallacies, identifying common types of bad arguments.", "isCorrect": true, "rationale": "The text explicitly states he wrote 'Sophistical Refutations, which was the world's first systematic catalog of logical fallacies,' identifying 'thirteen types of bad arguments.'"}, {"text": "Believed that the popularity of an idea was the ultimate measure of its truth.", "isCorrect": false, "rationale": "This describes the bandwagon fallacy, which Aristotle likely identified as a bad argument, not something he endorsed as a measure of truth."}], "id": "q08"}, {"question": "An advertisement for a brand of athletic shoes features a famous movie star (not an athlete or shoe designer) wearing the shoes and confidently stating, 'All the top performers are switching to these shoes, and you'll miss out if you don't!' This ad primarily employs which two appeal fallacies?", "options": [{"text": "Appeal to Emotion and Appeal to Fear", "isCorrect": false, "rationale": "While 'miss out' could induce a mild sense of anxiety (a type of fear), the core fallacies here are more directly about the celebrity's influence and the claim of widespread adoption, rather than general emotional manipulation (like pity) or severe threats."}, {"text": "Appeal to Authority and Bandwagon", "isCorrect": true, "rationale": "The use of a movie star (a non-expert in athletic shoes) to endorse the product is an appeal to authority. The claim that 'All the top performers are switching to these shoes' is a classic bandwagon appeal (popularity), reinforced by the pressure of 'you'll miss out if you don't!'"}, {"text": "Bandwagon and Appeal to Fear", "isCorrect": false, "rationale": "While bandwagon and a mild form of appeal to fear are present, this option misses the prominent appeal to authority created by the movie star endorsement, which is a key element of the ad's strategy."}, {"text": "Appeal to Authority and Appeal to Emotion", "isCorrect": false, "rationale": "The primary emotional appeal isn't a general 'appeal to emotion' (like pity or happiness) but rather the pressure to conform (bandwagon) and a hint of fear of missing out, making 'Bandwagon' a more specific and fitting choice than generic 'Appeal to Emotion' in this context."}], "id": "q09"}, {"question": "When political advertisements use appeal fallacies like 'Join the millions of Americans who support Candidate X!' or 'If Candidate Y wins, our schools will be ruined!', what is the core strategy they rely on, according to the 'spotlight' section?", "options": [{"text": "Presenting complex policy details in an easily digestible format for the public.", "isCorrect": false, "rationale": "The text notes these ads provide 'very few actual facts' and instead 'try to make me feel something,' which contradicts presenting complex policy details."}, {"text": "Encouraging voters to critically evaluate the economic implications of each candidate's platform.", "isCorrect": false, "rationale": "The strategy is to 'make me feel something' and bypass logical evaluation, rather than encourage critical analysis of policies."}, {"text": "Evoking strong emotional responses to bypass logical evaluation and prompt a desired action.", "isCorrect": true, "rationale": "The 'spotlight' section concludes by asking, 'What evidence did they actually give me? Or did they just try to make me feel something?' indicating that the core strategy is to use emotion to circumvent facts and logic to persuade."}, {"text": "Providing comprehensive and unbiased arguments supported by peer-reviewed research.", "isCorrect": false, "rationale": "The text contrasts fallacies with 'actual facts' and evidence, implying that the strategy of ads using appeal fallacies is the opposite of providing unbiased, research-backed arguments."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
