        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following best describes an \"unlikely\" event according to the probability scale presented in the section?", "options": [{"text": "An event that has zero chance of occurring.", "isCorrect": false, "rationale": "This describes an 'impossible' event, not an 'unlikely' one, as stated in the section: 'Impossible — It cannot happen. There is zero chance.'"}, {"text": "An event that could happen, but probably won't.", "isCorrect": true, "rationale": "The section defines 'unlikely' as an event that 'could happen, but it probably won't.'"}, {"text": "An event that is guaranteed to happen.", "isCorrect": false, "rationale": "This describes a 'certain' event, not an 'unlikely' one, as stated in the section: 'Certain — It will happen. There is no doubt.'"}, {"text": "An event that will probably happen, but isn't guaranteed.", "isCorrect": false, "rationale": "This describes a 'likely' event, not an 'unlikely' one, as stated in the section: 'Likely — It will probably happen, but it's not guaranteed.'"}]}, {"question": "Based on the definition provided in the section, which of these events is \"impossible\"?", "options": [{"text": "Flipping a coin and getting tails five times in a row.", "isCorrect": false, "rationale": "While highly improbable, this event is not impossible; it falls under 'unlikely' as it 'could happen, but it probably won't.'"}, {"text": "The sun rising in the west tomorrow morning.", "isCorrect": true, "rationale": "An 'impossible' event 'cannot happen' and has 'zero chance.' The sun rising in the west goes against fundamental physical laws, making it truly impossible in our observable universe."}, {"text": "Winning a small local raffle.", "isCorrect": false, "rationale": "Winning a raffle is generally 'unlikely' (or 'possible' with a small chance), but it is not impossible as some people do win."}, {"text": "It raining sometime next year in a desert city.", "isCorrect": false, "rationale": "While rare, rain in a desert city is 'unlikely' or 'possible,' not 'impossible,' as even deserts receive some precipitation occasionally."}]}, {"question": "What is the primary distinction between an event being \"possible\" and \"probable\"?", "options": [{"text": "Possible implies an event is guaranteed, while probable means it might happen.", "isCorrect": false, "rationale": "This statement reverses the definitions. 'Possible' means 'could happen,' not guaranteed, and 'probable' means 'likely will happen,' not just 'might happen.'"}, {"text": "Possible means there's some chance, even tiny, while probable means the chances are good it will happen.", "isCorrect": true, "rationale": "The section explicitly states: 'Possible means it could happen — there's some chance, even if it's tiny. Probable means it likely will happen — the chances are good.'"}, {"text": "Probable refers to events that are impossible, while possible refers to certain events.", "isCorrect": false, "rationale": "This statement is entirely incorrect. 'Probable' refers to events likely to happen, and 'possible' refers to events that could happen, while 'impossible' and 'certain' are at the extremes of the probability scale."}, {"text": "There is no significant difference; the terms can be used interchangeably.", "isCorrect": false, "rationale": "The section highlights this as a common misconception, explicitly stating, 'Here's a distinction that trips people up all the time: something can be possible without being probable.'"}]}, {"question": "Sarah dreams of becoming a professional dancer. While she works hard, she understands that very few dancers make it to the top professional level. Which statement accurately reflects the probability of her dream coming true, based on the section's discussion of 'possible' vs. 'probable'?", "options": [{"text": "It is certain she will become a professional dancer if she works hard.", "isCorrect": false, "rationale": "Hard work increases her chances, but it does not make the outcome 'certain' because the professional level is extremely competitive and the base rate of success is very low."}, {"text": "It is impossible for her to become a professional dancer.", "isCorrect": false, "rationale": "The section's example of becoming a professional athlete states, 'Some people do!' indicating it's not impossible, just highly improbable."}, {"text": "It is possible, but not probable, for her to become a professional dancer.", "isCorrect": true, "rationale": "Following the example of professional athletes, it is 'possible' for an individual to achieve such a rare feat, but 'not probable' due to the very small number of people who actually succeed."}, {"text": "It is highly probable because she is dedicated.", "isCorrect": false, "rationale": "While dedication is important, 'highly probable' implies the chances are good, which is not true for a career path with such a low overall success rate, regardless of individual effort."}]}, {"question": "According to the section, why are anecdotes considered unreliable evidence, even if they are very vivid and dramatic?", "options": [{"text": "Anecdotes are always fictional stories made up to deceive.", "isCorrect": false, "rationale": "The section implies anecdotes are personal experiences, not necessarily fictional. Their unreliability stems from being single instances, not from being fabricated."}, {"text": "They represent what is generally true for the majority of people.", "isCorrect": false, "rationale": "The section explicitly states, 'one story — no matter how dramatic — doesn't tell you what's generally true.'"}, {"text": "A single story doesn't account for other variables and doesn't reflect general trends.", "isCorrect": true, "rationale": "The section explains: 'One person's unusual experience doesn't overturn what's true for millions' and 'One story can't control for all those variables.'"}, {"text": "They only apply to scientific data and not to personal experiences.", "isCorrect": false, "rationale": "Anecdotes *are* personal experiences. The issue is using a single personal experience to make broad generalizations."}]}, {"question": "A friend tells you, \"I know a guy who never wore a helmet while biking, fell off, and was completely fine. So helmets aren't really necessary.\" How should you evaluate this claim based on the principles discussed in the section?", "options": [{"text": "Your friend's story proves that helmets are not necessary.", "isCorrect": false, "rationale": "A single anecdote, no matter how compelling, does not provide statistically reliable evidence to disprove the general necessity of helmets."}, {"text": "The story is a vivid anecdote and does not override general data about helmet safety.", "isCorrect": true, "rationale": "This reflects the section's warning that 'one person's unusual experience doesn't overturn what's true for millions' and that anecdotes don't control for variables."}, {"text": "This is an example of a base rate, indicating that most people don't need helmets.", "isCorrect": false, "rationale": "This is an anecdote, a single story, not a base rate, which is about how common something is in the overall population."}, {"text": "It suggests that safety rules are often based on exaggerated fears rather than reality.", "isCorrect": false, "rationale": "This conclusion is a common fallacy resulting from overweighting anecdotal evidence, which the section warns against."}]}, {"question": "Which of the following best defines a \"base rate\"?", "options": [{"text": "The probability of an event happening based on a single, personal experience.", "isCorrect": false, "rationale": "This describes an anecdote, not a base rate. Base rates relate to the overall population, not individual experiences."}, {"text": "How common something is in the general population or the background probability.", "isCorrect": true, "rationale": "The section defines a base rate as 'how common something is in the overall population. It's the 'background' probability before you know anything else.'"}, {"text": "A numerical formula used to calculate complex probabilities.", "isCorrect": false, "rationale": "The section deliberately avoids math formulas and focuses on the intuitive understanding of probability language. Base rates are a conceptual tool, not necessarily a formula."}, {"text": "The percentage chance of an event that is considered 'unlikely.'", "isCorrect": false, "rationale": "A base rate can apply to any event's commonness, whether likely, unlikely, or in between, not just 'unlikely' events."}]}, {"question": "A new diagnostic test for a very rare condition (affecting 1 in 100,000 people) is developed, claiming 98% accuracy. Why is it crucial to consider the base rate of the condition when evaluating the usefulness of this test for screening the general population?", "options": [{"text": "High accuracy always means the test is perfectly reliable regardless of how rare the condition is.", "isCorrect": false, "rationale": "The section's example of a test for a rare disease shows that even with high accuracy, a low base rate can lead to a high number of false positive results, making the test less reliable for general screening."}, {"text": "Without the base rate, you might overestimate the number of true positive results compared to false positives.", "isCorrect": true, "rationale": "As demonstrated by the rare disease example, a low base rate means that even a small false alarm rate in an accurate test can lead to many more healthy people being incorrectly flagged than actual cases, causing an overestimation of true positives."}, {"text": "The base rate only matters for common conditions, not rare ones.", "isCorrect": false, "rationale": "The section's example specifically uses a 'rare disease' to illustrate why base rates are critical, indicating they matter significantly for rare conditions."}, {"text": "The accuracy percentage already accounts for the rarity of the disease.", "isCorrect": false, "rationale": "Accuracy describes the test's performance, but it does not inherently account for the prevalence (base rate) of the condition in the population being tested. These are separate but equally important factors."}]}, {"question": "A news report states, \"Incidents of shark attacks have increased by 100% this year in a local beach area!\" Before panicking, what crucial piece of information, emphasized in this section, should you seek to understand the true risk?", "options": [{"text": "Personal stories from people who have been attacked.", "isCorrect": false, "rationale": "The section warns that anecdotes are not reliable evidence and do not reflect general trends or true risk."}, {"text": "The exact type of shark involved in the attacks.", "isCorrect": false, "rationale": "While potentially useful for prevention, knowing the shark type doesn't address the core probability question of the overall risk level in the context of a percentage increase."}, {"text": "The base rate of shark attacks in that area in previous years.", "isCorrect": true, "rationale": "The section's 'Always Ask: How Common Is It?' rule emphasizes that a percentage increase ('100% more than almost never is still almost never') is only meaningful when compared to the base rate."}, {"text": "The likelihood of a tsunami occurring at the same beach.", "isCorrect": false, "rationale": "The likelihood of a tsunami is irrelevant to understanding the risk of shark attacks or the meaning of the reported increase."}]}, {"question": "One of the main goals of this section, as highlighted in the \"Common Misconceptions,\" is to help students overcome which common error in thinking about probability?", "options": [{"text": "Believing that all probability discussions require complex mathematical formulas.", "isCorrect": true, "rationale": "The 'Common Misconceptions' notes: 'Students think probability requires math formulas. This section deliberately avoids formulas and focuses on intuition and language' to address this exact misconception."}, {"text": "Underestimating the reliability of dry statistics compared to dramatic stories.", "isCorrect": false, "rationale": "While the section aims to correct the tendency to overweight vivid personal stories (which implicitly leads to underestimating dry statistics), the text specifically states the section's design (avoiding formulas) addresses the belief that math formulas are required, making it a more direct answer to the question about overcoming a 'common error'."}, {"text": "Assuming that events defined as \"certain\" can still have some doubt.", "isCorrect": false, "rationale": "The section defines 'certain' as 'no doubt' but does not list this as a specific 'Common Misconception' that the section aims to overcome."}, {"text": "Confusing 'impossible' events with 'unlikely' events.", "isCorrect": false, "rationale": "The section notes students confuse 'possible' with 'likely,' but does not list confusing 'impossible' with 'unlikely' as a specific 'Common Misconception' it aims to overcome."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
