    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the core idea of 'scientific thinking without the lab coat'?", "options": [{"text": "It means science can only be done by highly trained professionals outside traditional laboratories.", "isCorrect": false, "rationale": "The text explicitly states that scientific thinking is an everyday process and doesn't require a lab coat, making this option incorrect as it limits scientific thinking to a specific group and setting."}, {"text": "It emphasizes that complex scientific experiments are simplified for everyday use.", "isCorrect": false, "rationale": "While simplification might occur, the core idea is that the *process* of scientific thinking itself is universally applicable, not just a simplified version of complex experiments."}, {"text": "It refers to using a careful, organized way of asking questions and finding answers in everyday situations.", "isCorrect": true, "rationale": "The text defines scientific thinking as 'a careful, organized way of asking questions and finding answers' and notes that 'you already do a version of it every day — you just might not realize it.'"}, {"text": "It suggests that scientific discoveries made in labs are often inspired by everyday observations.", "isCorrect": false, "rationale": "While true, this option focuses on the origin of discoveries rather than the nature and application of scientific thinking itself in daily life, which is the main point of the section."}], "id": "q01"}, {"question": "According to the text, what is a key characteristic that distinguishes a good scientific hypothesis from a random guess?", "options": [{"text": "It must be proven true before any testing begins.", "isCorrect": false, "rationale": "A hypothesis is a proposed explanation to be tested, not something that must be proven true upfront. The entire scientific cycle is about testing its validity."}, {"text": "It is an educated guess that is specific enough to be tested and potentially proven wrong.", "isCorrect": true, "rationale": "The text emphasizes a hypothesis is an 'educated guess' and 'specific enough that you can test it — you can design a way to check if it's right or wrong,' directly addressing the concept of testability and falsifiability."}, {"text": "It always requires complex laboratory equipment to investigate.", "isCorrect": false, "rationale": "The section title and examples (phone not charging, plants in classroom) clearly show that scientific thinking and hypothesis testing can occur without complex lab equipment."}, {"text": "It should explain everything observed, regardless of the outcome of any test.", "isCorrect": false, "rationale": "A hypothesis aims to explain an observation but must be able to be contradicted by evidence. A claim that explains everything 'no matter what happens' is described as not falsifiable and thus not truly scientific."}], "id": "q02"}, {"question": "A student observes that their house plants only thrive when placed near a specific window. Which of the following represents the 'prediction' step in the scientific thinking cycle for this observation?", "options": [{"text": "Observing that plants near the south-facing window grow better than others.", "isCorrect": false, "rationale": "This is the initial 'observation' step, identifying the puzzling phenomenon."}, {"text": "Hypothesizing that the specific window provides more optimal sunlight for the plants.", "isCorrect": false, "rationale": "This is the 'hypothesis' step, proposing an explanation for the observation."}, {"text": "If the hypothesis is correct, then moving a struggling plant to that window should improve its health.", "isCorrect": true, "rationale": "The 'prediction' step involves figuring out what *should happen* if the hypothesis is correct. In this case, if sunlight is the cause (hypothesis), then changing the sunlight exposure should alter the plant's health as predicted."}, {"text": "Moving a struggling plant to the specific window and monitoring its growth for two weeks.", "isCorrect": false, "rationale": "This is the 'test' step, carrying out the action described in the prediction."}], "id": "q03"}, {"question": "What does it mean for a claim to be 'falsifiable' in a scientific context?", "options": [{"text": "The claim has already been proven wrong through scientific testing.", "isCorrect": false, "rationale": "The text explicitly states: 'That doesn't mean it's false! It means there has to be some possible way to prove it wrong.'"}, {"text": "The claim is based on speculation and lacks any supporting evidence.", "isCorrect": false, "rationale": "Falsifiability is about testability, not about the current evidence base. A well-supported claim is still falsifiable if future evidence could potentially disprove it."}, {"text": "There is an imaginable observation or test result that could demonstrate the claim is incorrect.", "isCorrect": true, "rationale": "The definition provided is: 'A claim is falsifiable if you can imagine an observation or test result that would show the claim is wrong.'"}, {"text": "It means the claim can be adapted to explain any outcome, making it universally true.", "isCorrect": false, "rationale": "This describes a non-falsifiable claim, which is the opposite of what 'falsifiable' means. Claims that explain everything no matter what are not scientific."}], "id": "q04"}, {"question": "Which of the following claims is *least* likely to be considered falsifiable according to the principles discussed in the text?", "options": [{"text": "Eating breakfast improves academic performance in students.", "isCorrect": false, "rationale": "This claim is falsifiable. One could compare the academic performance of students who eat breakfast versus those who don't, controlling for other variables. If there's no difference or if non-breakfast eaters perform better, the claim could be disproven."}, {"text": "The moon is made of green cheese, but only on Tuesdays when no one is looking.", "isCorrect": true, "rationale": "This claim is designed to be untestable due to its specific, unobservable conditions ('only on Tuesdays when no one is looking'), making it practically impossible to imagine an observation that would definitively prove it wrong. It's similar to the 'invisible dragons' example."}, {"text": "A specific type of fertilizer increases the yield of corn crops.", "isCorrect": false, "rationale": "This claim is falsifiable. One could apply the fertilizer to some corn crops and not others (a control group) and compare their yields. If the yield doesn't increase, the claim is disproven."}, {"text": "Humans perform better on memory tasks after a full night's sleep.", "isCorrect": false, "rationale": "This claim is falsifiable. One could test memory performance in groups with differing amounts of sleep. If a full night's sleep doesn't lead to better performance, the claim would be disproven."}], "id": "q05"}, {"question": "Karl Popper's view on science, as described in the text, emphasizes that:", "options": [{"text": "The primary goal of science is to accumulate evidence that proves theories to be absolutely true.", "isCorrect": false, "rationale": "Popper argued the opposite: 'science works by trying to prove things false,' rather than proving them true. He believed absolute truth is difficult to achieve, but falsification makes theories stronger."}, {"text": "A theory is scientific only if it makes bold predictions that could potentially be proven wrong.", "isCorrect": true, "rationale": "The text states: 'His big idea was falsifiability: a theory is scientific only if it makes predictions that could, in principle, turn out to be wrong.' This aligns with making 'bold, risky predictions that could have been proven wrong.'"}, {"text": "Scientific theories should be flexible enough to explain all possible outcomes, making them universally applicable.", "isCorrect": false, "rationale": "Popper criticized theories that explained 'everything no matter what happens,' arguing they are not useful. Scientific theories must 'stick its neck out — and risks being wrong.'"}, {"text": "Complex theories are inherently more scientific than simple ones because they cover more ground.", "isCorrect": false, "rationale": "The text does not discuss complexity of theories as a measure of their scientific nature. Popper's focus was on falsifiability, not complexity."}], "id": "q06"}, {"question": "A student wants to test if playing classical music improves their concentration while studying. They play classical music for one hour while studying for a math test and then take the test. In this scenario, what is the independent variable?", "options": [{"text": "The student's concentration level during studying.", "isCorrect": false, "rationale": "Concentration is likely what the student is trying to measure the effect on, making it a dependent variable or an outcome, not what is being purposely changed."}, {"text": "The score on the math test.", "isCorrect": false, "rationale": "The math test score would be a dependent variable, as it is what is measured to see the effect of the music."}, {"text": "The playing of classical music while studying.", "isCorrect": true, "rationale": "The independent variable is 'the variable you change on purpose.' In this setup, the student is purposefully introducing or changing the presence of classical music."}, {"text": "The amount of time spent studying.", "isCorrect": false, "rationale": "While 'one hour' is given, it's a fixed condition for the test, implying it is a controlled variable, not the variable being changed to observe an effect."}], "id": "q07"}, {"question": "Referring to the scenario in Question 7 (student testing classical music and concentration), what would be the dependent variable?", "options": [{"text": "Whether classical music is played or not.", "isCorrect": false, "rationale": "This is the independent variable, the factor being manipulated or changed."}, {"text": "The specific classical music piece chosen.", "isCorrect": false, "rationale": "The specific piece would be a characteristic of the independent variable or a potential control, not the measured outcome."}, {"text": "The student's score on the math test.", "isCorrect": true, "rationale": "The dependent variable is 'the variable you measure to see what happens.' The math test score is the measurable outcome used to assess the effect of the music on concentration/performance."}, {"text": "The type of math problems studied.", "isCorrect": false, "rationale": "The type of math problems would be a control, something kept consistent to ensure the test is fair and relevant to the study material."}], "id": "q08"}, {"question": "Why is it crucial to 'change only one thing at a time' when testing a hypothesis, as highlighted by the 'Golden Rule of Testing'?", "options": [{"text": "To ensure the experiment is always easy to replicate by others.", "isCorrect": false, "rationale": "While simplifying an experiment might aid replication, the primary reason for changing one thing at a time relates to cause-and-effect, not ease of replication."}, {"text": "To keep the experimental setup simple and cost-effective.", "isCorrect": false, "rationale": "Simplicity and cost-effectiveness are practical benefits, but not the fundamental scientific reason behind the 'Golden Rule.' The rule is about valid inference."}, {"text": "To avoid bias in the interpretation of the results.", "isCorrect": false, "rationale": "Avoiding bias is important, but changing one variable at a time is about isolating cause and effect, which is different from cognitive bias in interpretation."}, {"text": "To clearly identify which specific change caused the observed result.", "isCorrect": true, "rationale": "The text states: 'If you change two things at once, you can't tell which one caused the result.' This directly explains why isolating variables is essential for determining cause and effect."}], "id": "q09"}, {"question": "A person claims their new running shoes improve their speed. To scientifically test this hypothesis, which approach would be most effective, based on the principles of variables, controls, and falsifiability?", "options": [{"text": "Run a marathon with the new shoes and then claim they are faster because a marathon is a rigorous test.", "isCorrect": false, "rationale": "This doesn't involve a comparison or control, making it impossible to attribute any change in speed solely to the shoes. It's an anecdotal observation, not a controlled test."}, {"text": "Run several races using the new shoes and several using old shoes, ensuring all other conditions (distance, track, effort) are consistent.", "isCorrect": true, "rationale": "This approach correctly identifies the independent variable (shoes) and sets up a controlled comparison by keeping other factors (distance, track, effort) the same. It also allows for measuring a dependent variable (speed) and provides a basis for falsification if no speed improvement is observed."}, {"text": "Measure their speed while wearing the new shoes and then assume any improvement is due to the shoes.", "isCorrect": false, "rationale": "This lacks a baseline comparison (speed with old shoes or no change in shoes) and assumes causation without isolating variables, violating the 'Golden Rule of Testing'."}, {"text": "Consult a shoe expert to get their opinion on whether the shoes are designed for speed improvement.", "isCorrect": false, "rationale": "While expert opinion can be valuable, it does not constitute a scientific test of the specific claim as outlined in the hypothesis-test cycle. It's not a direct empirical test."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
