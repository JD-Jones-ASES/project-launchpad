<script>
var QUESTIONS = [{"question": "A student is given the conditional statement: 'If the library is open (P), then I can check out a book (Q).' The student then observes that the library is open. Based on Modus Ponens, what is the valid conclusion?", "options": [{"text": "The student cannot check out a book.", "isCorrect": false, "rationale": "This conclusion denies the consequent, which is not what Modus Ponens dictates. Modus Ponens affirms the consequent when the antecedent is affirmed."}, {"text": "The student can check out a book.", "isCorrect": true, "rationale": "Modus Ponens states that if 'If P, then Q' is true, and P is true, then Q must also be true. Here, P (library is open) is affirmed, so Q (can check out a book) is the valid conclusion."}, {"text": "The library might be closed later.", "isCorrect": false, "rationale": "This statement is irrelevant to the deduction pattern of Modus Ponens, which focuses on the immediate logical consequence of the given premises."}, {"text": "Checking out a book means the library was open.", "isCorrect": false, "rationale": "This reverses the implication and represents affirming the consequent, which is an invalid deduction pattern, not Modus Ponens."}], "id": "q01"}, {"question": "Consider the statement: 'If a car runs out of gas (P), then it will stop (Q).' A mechanic observes that a particular car did not stop. Using Modus Tollens, what is the logical conclusion?", "options": [{"text": "The car definitely ran out of gas.", "isCorrect": false, "rationale": "This conclusion affirms the antecedent (P), which is incorrect for Modus Tollens. Modus Tollens denies the antecedent based on the denial of the consequent."}, {"text": "The car did not run out of gas.", "isCorrect": true, "rationale": "Modus Tollens dictates that if 'If P, then Q' is true, and Q is not true, then P cannot be true. Since the car did not stop (not Q), it logically follows that it did not run out of gas (not P)."}, {"text": "The car stopped for another reason.", "isCorrect": false, "rationale": "This conclusion is irrelevant to the Modus Tollens pattern, which focuses on the logical consequence of the conditional's contrapositive."}, {"text": "Running out of gas might not always stop a car.", "isCorrect": false, "rationale": "This challenges the initial conditional premise itself, which is assumed to be true for applying Modus Tollens. It does not follow from the pattern."}], "id": "q02"}, {"question": "Which of the following scenarios best illustrates the invalid deduction pattern known as 'Affirming the Consequent'?", "options": [{"text": "If it is Tuesday, then we have a test. It is Tuesday. Therefore, we have a test.", "isCorrect": false, "rationale": "This is a correct application of Modus Ponens, where the antecedent ('it is Tuesday') is affirmed, leading to the conclusion that the consequent ('we have a test') is true."}, {"text": "If it rains, the ground is wet. The ground is wet. Therefore, it rained.", "isCorrect": true, "rationale": "This is an example of 'Affirming the Consequent.' The conditional states 'If P, then Q.' The consequent (Q) 'the ground is wet' is affirmed, and an invalid conclusion is drawn that P ('it rained') must be true. However, other reasons (like sprinklers or a hose) could make the ground wet, so P is not necessarily true."}, {"text": "If you are a bird, you have feathers. You do not have feathers. Therefore, you are not a bird.", "isCorrect": false, "rationale": "This is a correct application of Modus Tollens, where the consequent ('you have feathers') is denied, leading to the conclusion that the antecedent ('you are a bird') is false."}, {"text": "If a student studies, they will pass. The student did not study. Therefore, the student will not pass.", "isCorrect": false, "rationale": "This is an example of 'Denying the Antecedent,' an invalid deduction pattern. While studying often leads to passing, not studying doesn't guarantee failure; a student might still pass through other means or prior knowledge."}], "id": "q03"}, {"question": "The text states that 'Modus Tollens is really just Modus Ponens applied to the contrapositive.' Why is this connection significant for understanding Modus Tollens?", "options": [{"text": "It means Modus Tollens is a more powerful form of deduction than Modus Ponens.", "isCorrect": false, "rationale": "The connection highlights their underlying logical equivalence, not that one is 'more powerful' than the other. Both are equally valid and powerful deduction patterns."}, {"text": "It explains why Modus Tollens is an invalid deduction pattern.", "isCorrect": false, "rationale": "Both Modus Ponens and Modus Tollens are valid deduction patterns. The connection to the contrapositive further solidifies the validity of Modus Tollens."}, {"text": "It demonstrates that denying the consequent and then denying the antecedent is logically equivalent to affirming the antecedent and then affirming the consequent of the contrapositive.", "isCorrect": true, "rationale": "The contrapositive of 'If P, then Q' is 'If not Q, then not P.' When Modus Tollens starts by denying Q (not Q) and concludes denying P (not P), it is effectively applying Modus Ponens to the contrapositive statement. This shows their logical equivalence and reinforces the validity of Modus Tollens."}, {"text": "It implies that Modus Tollens is only used when working backward in time.", "isCorrect": false, "rationale": "While Modus Tollens 'works backward from the result,' this refers to its logical structure (from Q to P), not a temporal aspect. The connection to the contrapositive is about logical equivalence, not time."}], "id": "q04"}, {"question": "A common misconception is that 'denying the antecedent' is a valid argument. Which of the following examples effectively counters this misconception by demonstrating its invalidity?", "options": [{"text": "If a plant is watered, it will grow. This plant was watered. Therefore, it will grow.", "isCorrect": false, "rationale": "This is an example of Modus Ponens, a valid argument. It doesn't demonstrate the invalidity of denying the antecedent."}, {"text": "If it rains, the ground is wet. It didn't rain. Therefore, the ground isn't wet.", "isCorrect": true, "rationale": "This is the classic example of 'denying the antecedent.' It assumes that if the 'if' part (P) didn't happen, the 'then' part (Q) couldn't have happened. However, as the text's 'sprinkler examples' suggest, the ground could be wet for other reasons, even if it didn't rain, thus proving the pattern invalid."}, {"text": "If you are a student, you attend classes. You do not attend classes. Therefore, you are not a student.", "isCorrect": false, "rationale": "This is an example of Modus Tollens, a valid argument. It demonstrates validity, not the invalidity of denying the antecedent."}, {"text": "If a car has gas, it will run. The car is running. Therefore, it has gas.", "isCorrect": false, "rationale": "This is an example of 'affirming the consequent,' which is also an invalid argument, but it specifically demonstrates the invalidity of affirming the consequent, not denying the antecedent."}], "id": "q05"}, {"question": "Which of the following scenarios demonstrates the pattern of Modus Ponens?", "options": [{"text": "If the oven is on, it is hot. The oven is not on. Therefore, it is not hot.", "isCorrect": false, "rationale": "This is an example of 'denying the antecedent,' an invalid deduction pattern. The oven could be hot from previous use even if it's currently off."}, {"text": "If the alarm sounds, the fire department is called. The fire department was called. Therefore, the alarm sounded.", "isCorrect": false, "rationale": "This is an example of 'affirming the consequent,' an invalid deduction pattern. The fire department could have been called for reasons other than the alarm sounding."}, {"text": "If a plant gets sunlight, it performs photosynthesis. This plant gets sunlight. Therefore, it performs photosynthesis.", "isCorrect": true, "rationale": "This perfectly matches Modus Ponens: 'If P, then Q' (If a plant gets sunlight, it performs photosynthesis). 'P is true' (This plant gets sunlight). 'Therefore, Q is true' (Therefore, it performs photosynthesis)."}, {"text": "If you study hard, you will pass. You did not pass. Therefore, you did not study hard.", "isCorrect": false, "rationale": "This is an example of Modus Tollens, a valid deduction pattern, but not Modus Ponens."}], "id": "q06"}, {"question": "An environmental scientist states: 'If pollution levels exceed a certain threshold (P), then fish populations will decline (Q).' Later, a study reveals that fish populations have not declined. What is the most appropriate logical conclusion based on Modus Tollens?", "options": [{"text": "Pollution levels definitely exceeded the threshold.", "isCorrect": false, "rationale": "This conclusion affirms the antecedent (P), which is the opposite of what Modus Tollens concludes when the consequent (Q) is denied."}, {"text": "Fish populations might decline in the future.", "isCorrect": false, "rationale": "This statement is a speculation about the future and does not follow directly from the application of Modus Tollens to the given premises."}, {"text": "Pollution levels did not exceed the certain threshold.", "isCorrect": true, "rationale": "Modus Tollens states: If 'If P, then Q' is true, and 'Q is not true' (fish populations have not declined), then 'P is not true' (pollution levels did not exceed the threshold). This is the correct logical conclusion."}, {"text": "The initial statement about pollution and fish is incorrect.", "isCorrect": false, "rationale": "Modus Tollens assumes the initial conditional statement ('If P, then Q') is true. This conclusion questions the premise itself, rather than applying the deductive pattern."}], "id": "q07"}, {"question": "Consider the statement: 'If a student completes all homework, then they will earn an A in the class.' A student earns an A in the class. The student then concludes, 'Therefore, I must have completed all homework.' What kind of deduction pattern is this?", "options": [{"text": "Modus Ponens, because the student correctly drew a conclusion.", "isCorrect": false, "rationale": "This is not Modus Ponens. Modus Ponens would affirm the antecedent ('completes all homework') to conclude the consequent ('earns an A'). Here, the consequent is affirmed to conclude the antecedent."}, {"text": "Modus Tollens, because it works backward from the result.", "isCorrect": false, "rationale": "This is not Modus Tollens. Modus Tollens would deny the consequent ('did not earn an A') to conclude the denial of the antecedent ('did not complete all homework')."}, {"text": "Affirming the Consequent, an invalid pattern.", "isCorrect": true, "rationale": "This is a classic example of Affirming the Consequent. The pattern is 'If P, then Q. Q is true. Therefore, P is true.' Earning an A (Q) does not necessarily mean completing all homework (P); there could be other factors like exceptional test scores. Thus, it's an invalid deduction."}, {"text": "Denying the Antecedent, an invalid pattern.", "isCorrect": false, "rationale": "Denying the Antecedent would be: 'If a student completes all homework, then they will earn an A. The student did not complete all homework. Therefore, they will not earn an A.' This scenario does not fit that pattern."}], "id": "q08"}, {"question": "Why is 'If P, then Q. P is not true. Therefore, Q is not true.' considered an invalid deduction pattern?", "options": [{"text": "Because it incorrectly assumes that P is the only possible cause for Q.", "isCorrect": true, "rationale": "This pattern (Denying the Antecedent) is invalid because it assumes that if P doesn't happen, Q cannot happen. However, Q might still occur due to other reasons or conditions not covered by P, as shown in the 'You are not a dog, therefore you are not a mammal' example."}, {"text": "Because it fails to affirm the consequent, which is necessary for validity.", "isCorrect": false, "rationale": "Affirming the consequent is itself an invalid pattern. A valid deduction like Modus Ponens affirms the antecedent, not the consequent, to draw a conclusion about the consequent."}, {"text": "Because it should always lead to the conclusion that P is true, not false.", "isCorrect": false, "rationale": "This statement is incorrect. A pattern where P is affirmed to conclude Q is Modus Ponens, which is valid. But this question describes 'Denying the Antecedent,' which is invalid and makes a different claim about P."}, {"text": "Because the Latin names 'Modus Ponens' and 'Modus Tollens' only apply to valid deductions.", "isCorrect": false, "rationale": "While 'Modus Ponens' and 'Modus Tollens' are names for valid patterns, the invalidity stems from the logical structure of the argument itself, not just the naming convention. The text uses distinct terms for the invalid patterns."}], "id": "q09"}, {"question": "In the 'Tricky Promise' example, your friend says: 'If you lend me your bike, then I'll give you five dollars.' After a week, you haven't received the money. Your friend's argument 'I said I'd give you five dollars — I never said when!' highlights a key limitation of formal propositional logic when applied to real-world scenarios. What is this limitation?", "options": [{"text": "Formal logic always includes implicit deadlines for conditional statements.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'In strict logic, the conditional P Q doesn't include a time limit.' This is precisely the point the 'Tricky Promise' illustrates."}, {"text": "Formal logic prioritizes social norms over strict logical conclusions.", "isCorrect": false, "rationale": "Formal logic is concerned with validity based on structure, not social norms. The example shows how social expectations (like timely payment) diverge from strict logical implications."}, {"text": "Formal logic does not inherently account for temporal aspects or implicit timelines in its conditional statements.", "isCorrect": true, "rationale": "The 'Tricky Promise' demonstrates that while the conditional 'If P, then Q' implies Q will happen if P does, it doesn't specify *when* Q will happen. Real-world contracts and promises often require additional details like deadlines, which formal logic alone does not provide."}, {"text": "Formal logic proves that all promises must be fulfilled immediately.", "isCorrect": false, "rationale": "Formal logic makes no such claim. The example shows that without explicit temporal clauses, the promise is technically not broken 'yet' in a purely logical sense."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
