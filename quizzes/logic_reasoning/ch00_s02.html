<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 0, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, every time you try to convince someone of something, you are making what?", "options": [{"text": "A speech", "isCorrect": false, "rationale": "The text says you are making an argument, not a speech."}, {"text": "An argument", "isCorrect": true, "rationale": "The text states: 'Every time you try to convince someone of something, you're making an argument. And every time someone tries to convince you, they're making one too.'"}, {"text": "A mistake", "isCorrect": false, "rationale": "Making arguments is described as a natural everyday activity, not a mistake."}, {"text": "A prediction", "isCorrect": false, "rationale": "The text uses the word 'argument' specifically."}], "id": "q01"}, {"question": "What does the text say about the advertising claim 'Nine out of ten dentists recommend this toothpaste'?", "options": [{"text": "It is a reliable scientific fact", "isCorrect": false, "rationale": "The text questions this claim by asking 'who are these dentists? And what does the tenth one think?'"}, {"text": "It should be questioned — who are these dentists, and what does the tenth one think?", "isCorrect": true, "rationale": "The text presents this as an example of a claim that feels persuasive but raises logical questions: 'But who are these dentists? And what does the tenth one think?'"}, {"text": "It is completely false", "isCorrect": false, "rationale": "The text doesn't say it is false — it says we should question it."}, {"text": "It proves the toothpaste is the best", "isCorrect": false, "rationale": "The text presents this as an example of a claim that doesn't necessarily make logical sense."}], "id": "q02"}, {"question": "What is wrong with the argument 'This celebrity wears our sneakers, so you should too'?", "options": [{"text": "Celebrities never actually wear the products they endorse", "isCorrect": false, "rationale": "The text doesn't claim celebrities don't wear the products."}, {"text": "Being famous does not make someone an expert on shoes", "isCorrect": true, "rationale": "The text asks: 'Does being famous make someone an expert on shoes?' highlighting that celebrity status doesn't equal expertise."}, {"text": "Sneakers are not worth buying", "isCorrect": false, "rationale": "The issue is about the reasoning, not the product itself."}, {"text": "Only athletes should endorse sneakers", "isCorrect": false, "rationale": "The text is making a point about fame vs. expertise, not about who should endorse products."}], "id": "q03"}, {"question": "In the 'Spotlight' section, how does the text describe the role of logic in the courtroom?", "options": [{"text": "Only judges use logic; lawyers use emotions", "isCorrect": false, "rationale": "The text describes both prosecutors and defense lawyers as building and evaluating arguments."}, {"text": "Lawyers build arguments, judges and juries use logic to decide who makes the better case — the entire justice system runs on logical reasoning", "isCorrect": true, "rationale": "The text states lawyers build arguments, defense lawyers look for holes in reasoning, and 'The entire justice system runs on logical reasoning!'"}, {"text": "Courts don't actually use logic — they rely only on evidence", "isCorrect": false, "rationale": "The text explicitly says the justice system runs on logical reasoning."}, {"text": "Logic is only used in criminal cases, not civil cases", "isCorrect": false, "rationale": "The text does not distinguish between types of cases."}], "id": "q04"}, {"question": "What is the logical problem with the advertising claim 'Everyone is switching to our phone plan'?", "options": [{"text": "Phone plans are all the same", "isCorrect": false, "rationale": "The text doesn't discuss whether phone plans are the same."}, {"text": "Just because everyone does something doesn't make it right — the text notes everyone used to think the Earth was flat", "isCorrect": true, "rationale": "The text responds to this claim with: 'So what? Everyone used to think the Earth was flat.' The popularity of something doesn't prove it is good."}, {"text": "The claim cannot be verified", "isCorrect": false, "rationale": "While verification is a concern, the text specifically addresses the logical flaw of appealing to popularity."}, {"text": "Only experts should recommend phone plans", "isCorrect": false, "rationale": "The text's point is about popularity not equaling correctness."}], "id": "q05"}, {"question": "Which of these is an example of an argument with friends and family from the text?", "options": [{"text": "'I'm hungry, let's eat.'", "isCorrect": false, "rationale": "This is not one of the examples given in the text."}, {"text": "'We should get a dog because dogs are loyal and they help people exercise.'", "isCorrect": true, "rationale": "This is one of the three examples listed in the text as everyday arguments with friends and family."}, {"text": "'I don't want to go to school today.'", "isCorrect": false, "rationale": "This is not one of the examples given in the text."}, {"text": "'My favorite color is blue.'", "isCorrect": false, "rationale": "This is a statement of opinion, not an argument with reasons."}], "id": "q06"}, {"question": "What argument does the student make about phones in class?", "options": [{"text": "'Phones should be allowed because they are expensive.'", "isCorrect": false, "rationale": "The text gives a different argument about phones."}, {"text": "'It's not fair that we can't use phones in class. We could use them for research!'", "isCorrect": true, "rationale": "The text gives this exact example: 'It's not fair that we can't use phones in class. We could use them for research!'"}, {"text": "'Everyone else gets to use their phones at other schools.'", "isCorrect": false, "rationale": "This is not the argument presented in the text."}, {"text": "'Phones help students stay organized with calendars.'", "isCorrect": false, "rationale": "This is not the argument presented in the text."}], "id": "q07"}, {"question": "How does the teacher counter the student's argument about phones in class?", "options": [{"text": "'Because I said so.'", "isCorrect": false, "rationale": "The teacher provides a logical counter-argument with reasons, not an appeal to authority."}, {"text": "'Phones are distracting. When students use them, test scores go down.'", "isCorrect": true, "rationale": "The text gives the teacher's response: 'Phones are distracting. When students use them, test scores go down. So we keep them put away.'"}, {"text": "'Other schools ban phones too.'", "isCorrect": false, "rationale": "This is not the counter-argument given in the text."}, {"text": "'Students are too young to have phones.'", "isCorrect": false, "rationale": "This is not the counter-argument given in the text."}], "id": "q08"}, {"question": "What extension activity does the teacher note suggest?", "options": [{"text": "Write a persuasive essay about logic", "isCorrect": false, "rationale": "The teacher note suggests a different activity."}, {"text": "Keep an 'Argument Journal' for one day, noting every argument you hear or make", "isCorrect": true, "rationale": "The teacher note says: 'Ask students to keep an \"Argument Journal\" for one day, noting every argument they hear or make.'"}, {"text": "Watch a courtroom drama and identify the arguments", "isCorrect": false, "rationale": "This is not the extension activity described in the teacher note."}, {"text": "Debate a classmate on a topic of their choice", "isCorrect": false, "rationale": "This is not the extension activity described in the teacher note."}], "id": "q09"}, {"question": "What does the text say logic gives you the tools to do when encountering social media claims?", "options": [{"text": "Report false information to the platform", "isCorrect": false, "rationale": "The text does not mention reporting; it focuses on critical thinking skills."}, {"text": "Ask the right questions instead of just believing everything you read", "isCorrect": true, "rationale": "The text states: 'Logic gives you the tools to ask the right questions instead of just believing everything you read.'"}, {"text": "Avoid social media entirely", "isCorrect": false, "rationale": "The text does not advise avoiding social media."}, {"text": "Only trust information from verified accounts", "isCorrect": false, "rationale": "The text focuses on asking the right questions, not on verification badges."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
