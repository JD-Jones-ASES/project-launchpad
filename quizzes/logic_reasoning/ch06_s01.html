    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/logic_reasoning.html">&larr; Back to Logic and Reasoning for Middle School</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook section, which of the following best defines a cognitive bias?", "options": [{"text": "A deliberate choice made by the brain to ignore facts that contradict one's beliefs.", "isCorrect": false, "rationale": "The text states that biases 'happen automatically — you don't choose to have them,' making them not a deliberate choice."}, {"text": "A pattern of thinking that causes the brain to make errors in judgment.", "isCorrect": true, "rationale": "The definition provided is 'A cognitive bias is a pattern of thinking that causes your brain to make errors in judgment.'"}, {"text": "A mental shortcut used for making quick decisions, which always leads to correct outcomes.", "isCorrect": false, "rationale": "This describes a heuristic, not a cognitive bias, and heuristics 'can lead to mistakes' so they don't always lead to correct outcomes."}, {"text": "A rare neurological condition that affects only a small percentage of the population.", "isCorrect": false, "rationale": "The text explicitly states that 'Everyone has them — scientists, doctors, judges, teachers, your parents, and yes, even the authors of this book.'"}], "id": "q01"}, {"question": "What is the primary reason your brain uses heuristics, as explained in the text?", "options": [{"text": "To intentionally create errors in judgment as a learning mechanism.", "isCorrect": false, "rationale": "Heuristics are not for intentionally creating errors; they are for efficiency, though errors can be a side effect."}, {"text": "To carefully analyze every piece of information received by the senses.", "isCorrect": false, "rationale": "The text states the opposite: 'If your brain tried to carefully analyze every single piece of information, you'd never make it through breakfast.'"}, {"text": "To save time and energy by making quick decisions and simplifying complex information.", "isCorrect": true, "rationale": "The text explains, 'Heuristics save time and energy, but they can lead to mistakes when your brain takes the 'fast route' instead of thinking carefully.'"}, {"text": "To reinforce existing beliefs by filtering out contradictory information.", "isCorrect": false, "rationale": "This describes confirmation bias, a specific type of cognitive bias, not the general purpose of heuristics."}], "id": "q02"}, {"question": "Marcus believes his math teacher is unfair. When the teacher offers extra help after school, Marcus interprets it as the principal forcing her to do so. When she gives a hard test, he sees it as proof she's 'trying to make them fail.' Which cognitive bias is Marcus demonstrating?", "options": [{"text": "Anchoring", "isCorrect": false, "rationale": "Anchoring involves relying on an initial piece of information, often a number, which is not the primary issue in Marcus's scenario."}, {"text": "Availability Heuristic", "isCorrect": false, "rationale": "The availability heuristic involves judging likelihood based on ease of recall, which doesn't fit Marcus's consistent interpretation of events."}, {"text": "Confirmation Bias", "isCorrect": true, "rationale": "Marcus's behavior exemplifies confirmation bias because he 'filters information to match that belief' (that the teacher is unfair) and 'interprets it as evidence that she's unfair,' regardless of her actions."}, {"text": "The Dunning-Kruger Effect", "isCorrect": false, "rationale": "The Dunning-Kruger effect is not one of the core biases explained in this section, and it relates to overestimating one's abilities, which is not what Marcus is doing here."}], "id": "q03"}, {"question": "A clothing store advertises a coat with an 'original price' of $300, but it is currently on sale for $100. Many customers perceive the $100 price as an excellent deal, even if the coat rarely, if ever, sold for $300 and its actual value is closer to $80. This scenario is a clear example of which cognitive bias?", "options": [{"text": "Confirmation Bias", "isCorrect": false, "rationale": "This scenario does not involve searching for or interpreting information to match an existing belief."}, {"text": "Availability Heuristic", "isCorrect": false, "rationale": "This is not about judging the likelihood of an event based on how easily examples come to mind."}, {"text": "Anchoring", "isCorrect": true, "rationale": "The 'original price' of $300 serves as an anchor, influencing customers' perception of the sale price ($100) and making it seem like a better deal than it might actually be, even if the anchor is irrelevant."}, {"text": "Sunk Cost Fallacy", "isCorrect": false, "rationale": "The sunk cost fallacy involves continuing an endeavor due to past investment, which is not applicable here."}], "id": "q04"}, {"question": "After watching a dramatic documentary about shark attacks, a person becomes excessively worried about swimming in the ocean, despite knowing that the statistical risk of a shark attack is extremely low. This heightened fear is an example of:", "options": [{"text": "Confirmation Bias", "isCorrect": false, "rationale": "This situation is not about seeking information that confirms a pre-existing belief, but rather about an inflated perception of risk."}, {"text": "Anchoring", "isCorrect": false, "rationale": "There is no initial numerical 'anchor' being used to influence a subsequent estimate or decision."}, {"text": "Availability Heuristic", "isCorrect": true, "rationale": "The vivid and dramatic examples of shark attacks from the documentary make it easier to recall such events, leading the person to 'overestimate how common they are,' fitting the definition of the availability heuristic."}, {"text": "The M\"uller-Lyer illusion", "isCorrect": false, "rationale": "The M\"uller-Lyer illusion is an optical illusion, not a cognitive bias affecting risk perception."}], "id": "q05"}, {"question": "According to the text, what is the key difference between a 'heuristic' and a 'cognitive bias'?", "options": [{"text": "Heuristics are deliberate choices to simplify problems, while cognitive biases are always accidental.", "isCorrect": false, "rationale": "Both heuristics and biases happen automatically and are not deliberate choices."}, {"text": "Heuristics are mental shortcuts that can lead to quick decisions, while cognitive biases are the errors in judgment that can result when those shortcuts lead us astray.", "isCorrect": true, "rationale": "The text defines heuristics as 'mental shortcut your brain uses to make quick decisions' and cognitive biases as 'a pattern of thinking that causes your brain to make errors in judgment,' explaining that heuristics 'can lead to mistakes' which are cognitive biases."}, {"text": "Cognitive biases are always beneficial for survival, whereas heuristics always lead to mistakes.", "isCorrect": false, "rationale": "Both can lead to mistakes, and biases are not always beneficial, though they evolved for efficiency."}, {"text": "Heuristics are only used by 'dumb' people, while cognitive biases affect everyone.", "isCorrect": false, "rationale": "The text emphasizes that 'Everyone — including scientists, doctors, and teachers — has cognitive biases,' and heuristics are universal mental shortcuts."}], "id": "q06"}, {"question": "Daniel Kahneman's work, for which he won the Nobel Prize, fundamentally challenged what common assumption about human thinking?", "options": [{"text": "That humans are primarily emotional beings incapable of rational thought.", "isCorrect": false, "rationale": "Kahneman's work focused on cognitive processes and shortcuts, not solely on emotional limitations."}, {"text": "That humans are inherently good at predicting future events accurately.", "isCorrect": false, "rationale": "While his work has implications for prediction, the core challenge was about rationality, not just predictive ability."}, {"text": "That humans are perfectly rational thinkers who always make logical decisions.", "isCorrect": true, "rationale": "The text states, 'Their research showed that humans are not the perfectly rational thinkers that economists and philosophers had assumed.'"}, {"text": "That humans are incapable of learning from their mistakes and improving their decision-making.", "isCorrect": false, "rationale": "His work aims to improve decision-making through awareness, not to claim inability to learn."}], "id": "q07"}, {"question": "The text refers to cognitive biases as 'a feature of the human brain, not a bug.' What is the key implication of this statement regarding how we should approach biases?", "options": [{"text": "That biases are inherently good and should be embraced without question, as they always lead to correct outcomes.", "isCorrect": false, "rationale": "While a 'feature,' biases 'can lead to mistakes,' so they shouldn't be blindly embraced."}, {"text": "That biases are an unavoidable flaw in human intelligence and there's nothing we can do about them.", "isCorrect": false, "rationale": "While unavoidable, the goal is 'awareness, not perfection,' implying we can mitigate their negative effects."}, {"text": "That biases evolved to help us make fast decisions and survive, and the goal is to become aware of them to think more carefully when it matters.", "isCorrect": true, "rationale": "The text explains, 'They evolved because they usually help us survive and make fast decisions. ... The goal is to notice when they might be affecting your thinking, so you can slow down and think more carefully when it matters.'"}, {"text": "That only less intelligent individuals experience biases, while smarter people are immune.", "isCorrect": false, "rationale": "The text explicitly refutes this misconception, stating 'everyone — including scientists, doctors, and teachers — has cognitive biases.'"}], "id": "q08"}, {"question": "A person is convinced that their favorite sports team's rivals consistently receive favorable calls from referees. They can easily recall numerous instances of calls that went against their team when playing the rival, but struggle to remember any similar calls that went in their team's favor. This selective recall and interpretation is most strongly influenced by which two biases mentioned in the text?", "options": [{"text": "Anchoring and Availability Heuristic", "isCorrect": false, "rationale": "While vivid examples might be recalled (availability), the core issue isn't an initial numerical anchor, but rather a filtering of information and ease of recalling specific types of events."}, {"text": "Confirmation Bias and Availability Heuristic", "isCorrect": true, "rationale": "The 'convinced that their favorite sports team's rivals consistently receive favorable calls' aligns with confirmation bias (seeing what they want to see). The 'easily recall numerous instances' and 'struggle to remember any similar calls' reflects the availability heuristic, where easily recalled (negative) examples are overweighted, and difficult-to-recall (positive) examples are ignored, reinforcing the initial belief."}, {"text": "Confirmation Bias and Anchoring", "isCorrect": false, "rationale": "There is no clear anchoring effect present in this scenario (no initial number influencing subsequent judgments)."}, {"text": "The M\"uller-Lyer illusion and Sunk Cost Fallacy", "isCorrect": false, "rationale": "Neither of these concepts is relevant to the scenario described. The M\"uller-Lyer illusion is an optical illusion, and the sunk cost fallacy is not about biased recall or interpretation of current events."}], "id": "q09"}, {"question": "Which of the following scenarios best demonstrates the concept of System 1 thinking, as described by Daniel Kahneman?", "options": [{"text": "A scientist meticulously reviews all data points, performs complex calculations, and critically evaluates alternative hypotheses before drawing a conclusion.", "isCorrect": false, "rationale": "This describes System 2 thinking, which is slow, deliberate, and effortful."}, {"text": "A student carefully reads a challenging textbook chapter multiple times, taking detailed notes and creating a study guide.", "isCorrect": false, "rationale": "This involves effortful and deliberate processing, typical of System 2 thinking."}, {"text": "Someone instantly flinches and pulls their hand away from a hot stove without conscious thought.", "isCorrect": true, "rationale": "System 1 is described as 'fast, automatic, and full of shortcuts.' An immediate, reflexive action like pulling a hand from a hot stove is a perfect example of such a quick, automatic response."}, {"text": "A person spends hours weighing the pros and cons of purchasing a new car, considering budgets, features, and long-term costs.", "isCorrect": false, "rationale": "This involves significant deliberation and effort, characteristic of System 2 thinking."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
