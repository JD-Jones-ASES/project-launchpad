<script>
var QUESTIONS = [{"question": "What is the fundamental principle behind how a choropleth map displays data?", "options": [{"text": "It uses symbols of varying sizes to represent data values within regions.", "isCorrect": false, "rationale": "Choropleth maps use color or shading, not varying symbol sizes, to encode data within regions. Symbol maps use varying sizes or shapes."}, {"text": "It colors geographic regions based on a specific data value.", "isCorrect": true, "rationale": "The definition of a choropleth map states that geographic regions are colored or shaded according to the value of a data variable. This is its primary method of data display."}, {"text": "It connects points of equal value with lines to show data distribution.", "isCorrect": false, "rationale": "Connecting points of equal value with lines describes a contour map, not a choropleth map. Choropleth maps fill regions with color."}, {"text": "It shows population movement between different geographic areas.", "isCorrect": false, "rationale": "Maps that show movement between areas are typically called flow maps. Choropleth maps focus on values within fixed regions."}]}, {"question": "A student is looking at a choropleth map showing population density. They observe that Alaska is very large geographically but colored light yellow, indicating 'Low density' in the legend. What is the correct interpretation based on the principles of choropleth maps?", "options": [{"text": "Alaska likely has a very high population density despite its large size.", "isCorrect": false, "rationale": "The legend explicitly states light yellow means 'Low density.' Assuming high density contradicts the map's color encoding."}, {"text": "The map designer made an error because large states should always have higher values.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text: 'Students often confuse large area with large value.' The color, not the size, shows the value."}, {"text": "The light yellow color accurately indicates that Alaska has a low population density.", "isCorrect": true, "rationale": "The text emphasizes that 'color shows the value, not the size.' The light yellow color, as per the legend, directly represents low density, regardless of the state's geographic area."}, {"text": "The color scale is probably inverted, meaning light colors represent high values.", "isCorrect": false, "rationale": "While color scales can be inverted, the prompt states light yellow indicates 'Low density' in the legend. Assuming an error in the legend without further information is incorrect; one must always read the legend as given."}]}, {"question": "According to the text, why is it essential to 'always read the legend first' when interpreting a choropleth map?", "options": [{"text": "The legend provides historical context for the data values shown.", "isCorrect": false, "rationale": "The legend (color scale) tells you what data values correspond to which colors, not the historical background or reasons behind the data values."}, {"text": "It ensures you know whether darker colors represent higher values or lower values.", "isCorrect": true, "rationale": "The text explicitly warns, 'Color-scale direction: students may not realize whether darker = higher or lighter = higher. Always read the legend first.' This prevents misinterpretation of the color gradient."}, {"text": "It explains why certain regions have particular data values.", "isCorrect": false, "rationale": "The legend defines the range of values for each color, but it does not explain the underlying reasons or causes for why a region has a particular data value."}, {"text": "The legend defines the political boundaries of the regions on the map.", "isCorrect": false, "rationale": "The map's visual representation itself shows the geographic and political boundaries. The legend is for interpreting the data represented by the colors within those boundaries."}]}, {"question": "You are tasked with finding the geographic area on a choropleth map that represents the lowest incidence of a particular disease. Which step from the 'How to Read A Choropleth Map' section would be most relevant for this task?", "options": [{"text": "Find the darkest regions.", "isCorrect": false, "rationale": "The 'How to Read' section states, 'Find the darkest regions. These have the highest values.' To find the lowest incidence, you would look for the opposite."}, {"text": "Look for patterns.", "isCorrect": false, "rationale": "While looking for patterns is a general step, it's too broad for specifically identifying the *lowest* value. A more direct step is provided for that."}, {"text": "Find the lightest regions.", "isCorrect": true, "rationale": "The 'How to Read' section advises, 'Find the lightest regions. These have the lowest values.' This directly corresponds to finding the lowest incidence of a disease."}, {"text": "Identify outliers.", "isCorrect": false, "rationale": "Identifying outliers means finding regions that are very different from their neighbors, which might include low values, but 'find the lightest regions' is a more direct approach to locating the absolute lowest values across the map."}]}, {"question": "The word 'choropleth' comes from Greek words meaning 'choro' (area/place) and 'plethos' (multitude/fullness). What does the combined term 'choropleth' literally mean in this context?", "options": [{"text": "Moving population", "isCorrect": false, "rationale": "This interpretation does not align with 'area/place' and 'multitude/fullness.' It also suggests movement, which choropleth maps do not primarily show."}, {"text": "Filled area", "isCorrect": true, "rationale": "The text explicitly states: 'The word “choropleth” comes from Greek: choro (area/place) and plethos (multitude/fullness). It simply means “filled area.”'"}, {"text": "Shaded boundary", "isCorrect": false, "rationale": "The term refers to the 'area' being 'filled' or 'full,' not just the boundary being shaded."}, {"text": "Variable intensity", "isCorrect": false, "rationale": "While choropleth maps use variable intensity of color, this describes *how* they display data, not the literal meaning derived from the Greek roots."}]}, {"question": "When a choropleth map designer creates a color scheme, they divide it into distinct steps to represent different ranges of data values. What are these steps commonly called?", "options": [{"text": "Gradients", "isCorrect": false, "rationale": "A gradient refers to the smooth transition of colors in the overall scheme, not the individual discrete steps or divisions within it."}, {"text": "Bins or classes", "isCorrect": true, "rationale": "The text states: 'The designer chooses a color scheme... and divides it into steps (called bins or classes).'"}, {"text": "Scales or ramps", "isCorrect": false, "rationale": "A color scale or color ramp refers to the entire legend that shows the range of colors and their corresponding values, not the individual steps within that range."}, {"text": "Outliers or clusters", "isCorrect": false, "rationale": "Outliers and clusters describe patterns found in the data values across regions on the map, not the divisions within the color scheme itself."}]}, {"question": "On a choropleth map, what characteristic most accurately defines an 'outlier'?", "options": [{"text": "A region that is geographically very large compared to its neighbors.", "isCorrect": false, "rationale": "An outlier is defined by its data value being different, not its geographic size. Size is a common misconception regarding value."}, {"text": "A region with a data value significantly different from its surrounding regions.", "isCorrect": true, "rationale": "The 'How to Read' section states to 'Identify outliers. Are there any regions that look very different from their neighbors?' This directly defines an outlier in the context of choropleth maps."}, {"text": "A region located on the edge or border of the map.", "isCorrect": false, "rationale": "The location of a region on the map (e.g., edge or center) does not inherently make it an outlier; its data value relative to its neighbors does."}, {"text": "A region colored with a unique color not found in the legend.", "isCorrect": false, "rationale": "A unique color not found in the legend would indicate a map error, not a data-driven outlier, as all colors on the map should correspond to the legend."}]}, {"question": "Which of the following statements represents a common misconception when reading choropleth maps, according to the text?", "options": [{"text": "Regions with darker colors always indicate higher data values.", "isCorrect": false, "rationale": "While often true, the text states 'some maps use dark = high; others use light = high. ...Always check the legend.' Assuming 'dark = high' without checking the legend is a misconception about color scale direction, but not about *adjacency*."}, {"text": "Adjacent geographic regions necessarily have similar data values.", "isCorrect": true, "rationale": "The text explicitly lists this as a common misconception: 'Students may assume that adjacent regions must have similar values. Point out that borders are political, not based on the data.'"}, {"text": "The title of the map indicates the type of data being measured.", "isCorrect": false, "rationale": "This is a correct practice in reading a map ('Read the title. What is being measured?'), not a misconception."}, {"text": "Choropleth maps can be used for various types of data, like weather or elections.", "isCorrect": false, "rationale": "This is a correct statement about the versatility and real-world applications of choropleth maps, not a misconception."}]}, {"question": "Based on the real-world examples provided, which scenario would LEAST likely be represented by a standard choropleth map?", "options": [{"text": "Showing the average rainfall across different states in a country.", "isCorrect": false, "rationale": "This is a classic application of choropleth maps, where regions (states) are colored based on a data value (average rainfall)."}, {"text": "Illustrating the number of people who migrated from one country to another.", "isCorrect": true, "rationale": "Choropleth maps show values *within* regions. Migration *between* regions typically requires a flow map or similar visualization that depicts movement, rather than simply coloring static regions by an internal value."}, {"text": "Displaying the percentage of households with internet access by county.", "isCorrect": false, "rationale": "This is a common use case for choropleth maps, coloring counties based on a percentage value."}, {"text": "Presenting the overall Gross Domestic Product (GDP) for various nations.", "isCorrect": false, "rationale": "This is a suitable application for choropleth maps, coloring nations based on their GDP values."}]}, {"question": "A choropleth map shows 'Unemployment Rate by State' using a gradient from light blue (low rate) to dark blue (high rate). If you see a very small state like Rhode Island colored in dark blue, what can you infer?", "options": [{"text": "Rhode Island has a geographically large area that contributes to its high unemployment.", "isCorrect": false, "rationale": "This statement contains two errors: Rhode Island is a small state, and the text explicitly warns against confusing 'large area' with 'large value' (or vice versa)."}, {"text": "Rhode Island has a significantly high unemployment rate compared to other states.", "isCorrect": true, "rationale": "Given the legend (dark blue = high rate) and the color of Rhode Island (dark blue), the correct inference is that it has a high unemployment rate. The geographic size of the state is irrelevant to its data value."}, {"text": "The data for Rhode Island is an error because small states usually have low unemployment.", "isCorrect": false, "rationale": "Assuming data error or a correlation between state size and unemployment rate is a misconception. Political borders and geographic size do not determine data values, and data should be interpreted as presented by the map."}, {"text": "The color scale is likely reversed, and dark blue indicates a low unemployment rate.", "isCorrect": false, "rationale": "The problem statement explicitly defines the legend: 'light blue (low rate) to dark blue (high rate).' You should always trust the given legend unless there's clear evidence of error, which is not provided here."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
