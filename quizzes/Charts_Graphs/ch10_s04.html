<div class="quiz-container">

        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 10, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A researcher wants to compare the median and interquartile range (IQR) of test scores between three different schools. Which data display would be most effective for this comparison?", "options": [{"text": "A stem-and-leaf plot, as it shows individual data points.", "isCorrect": false, "rationale": "While stem-and-leaf plots show individual points, comparing three distinct groups side-by-side for median and IQR would be cumbersome and less intuitive than a box plot."}, {"text": "A histogram, as it clearly shows the shape of each distribution.", "isCorrect": false, "rationale": "Histograms are good for shape, but comparing medians and IQRs across multiple groups is difficult. The text specifically notes histograms are 'hard to compare two groups side by side'."}, {"text": "A box plot, as it instantly shows the median, spread (IQR), and extremes for easy group comparison.", "isCorrect": true, "rationale": "The text states that a strength of box plots is that they 'instantly shows median, spread (IQR), and extremes' and are 'easy to compare two or more groups side by side'."}, {"text": "A simple list of all data points, as it's the most precise.", "isCorrect": false, "rationale": "A list of data points is precise but offers no visual summary or easy comparison of central tendency and spread across multiple groups."}], "id": "q01"}, {"question": "What unique insight does a histogram typically provide about a data set's distribution that a box plot cannot easily show?", "options": [{"text": "The exact values of the minimum and maximum data points.", "isCorrect": false, "rationale": "While a histogram implies the range, it doesn't show the exact minimum and maximum values; a box plot shows these extremes as 'whiskers' or outlier dots."}, {"text": "The presence of a bimodal distribution (two distinct peaks).", "isCorrect": true, "rationale": "The text explicitly states that a strength of histograms is that they 'reveals bimodal distributions (two separate peaks)', which box plots cannot show because they 'cannot show the shape of the distribution'."}, {"text": "The precise value of the median and quartiles (Q1, Q3).", "isCorrect": false, "rationale": "Histograms cannot easily show exact median, Q1, Q3; this is a strength of box plots."}, {"text": "The identification of individual outlier data points.", "isCorrect": false, "rationale": "Box plots clearly flag outlier dots, whereas outliers can be harder to discern as individual points in a histogram without detailed inspection."}], "id": "q02"}, {"question": "Which of the following is a primary limitation of a box plot compared to a histogram?", "options": [{"text": "It cannot effectively flag outlier data points.", "isCorrect": false, "rationale": "This is incorrect. The text states that 'Outlier dots are clearly flagged' in box plots."}, {"text": "It hides the number of data points in the dataset.", "isCorrect": true, "rationale": "A weakness of box plots is that they 'Hides how many data points there are'. A histogram, by contrast, shows frequency counts in its bar heights."}, {"text": "It is difficult to compare across multiple groups.", "isCorrect": false, "rationale": "This is incorrect. The text states that a strength of box plots is that they are 'Easy to compare two or more groups side by side'."}, {"text": "Its appearance changes significantly based on bin size.", "isCorrect": false, "rationale": "This limitation applies to histograms, not box plots, as box plots do not use bins."}], "id": "q03"}, {"question": "A data presenter chooses to display a histogram with only 3 bins for a dataset of 100 observations. What is the most likely consequence or intention of this choice?", "options": [{"text": "To reveal the precise location of gaps and clusters in the data.", "isCorrect": false, "rationale": "Too few bins, like 3, would obscure detail, making it harder to see precise gaps and clusters. The text says 'Too few bins and the detail disappears'."}, {"text": "To highlight the presence of bimodal distributions.", "isCorrect": false, "rationale": "Very few bins would likely smooth over any bimodal peaks, making them difficult to discern. A moderate number of bins is usually better for showing shape."}, {"text": "To obscure variations and make the data appear more uniform than it is.", "isCorrect": true, "rationale": "The text explicitly warns that 'If someone wants to hide variation in the data, they might choose very few bins.' This makes the distribution look less detailed and potentially more uniform."}, {"text": "To emphasize every individual data point's contribution to the distribution.", "isCorrect": false, "rationale": "Too few bins would combine many data points into broad categories, hiding individual contributions, not emphasizing them. A stem-and-leaf plot or list would do this."}], "id": "q04"}, {"question": "Based on the provided stem-and-leaf plot example, what is the maximum quiz score shown?", "options": [{"text": "90", "isCorrect": false, "rationale": "The stem '9' has leaves '0' and '3', meaning 90 and 93. 90 is not the maximum score."}, {"text": "55", "isCorrect": false, "rationale": "The first row (stem = 5, leaves = 5 8) shows scores 55 and 58. 55 is the minimum score, not the maximum."}, {"text": "93", "isCorrect": true, "rationale": "The example states, 'The maximum score is 93,' which is derived from the last stem (9) and its largest leaf (3)."}, {"text": "9", "isCorrect": false, "rationale": "9 is a leaf, not a full score. The highest stem is 9, but the score is the stem combined with the leaf."}], "id": "q05"}, {"question": "The textbook highlights a common misconception: thinking one data display (histogram or box plot) is 'always better' than the other. What is the main reason this belief is considered a misconception?", "options": [{"text": "Because stem-and-leaf plots are universally superior for all data types.", "isCorrect": false, "rationale": "While stem-and-leaf plots are useful, they are best for small datasets and the text does not claim them to be 'universally superior'."}, {"text": "Both displays have distinct strengths and weaknesses, making their suitability dependent on the specific question being asked.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section directly states: 'Neither is universally superior — the choice depends on the question being asked.' The subsequent sections detail their specific strengths and weaknesses."}, {"text": "Only highly skilled statisticians can truly determine which plot is better.", "isCorrect": false, "rationale": "This implies a level of expertise not aligned with the 'key data literacy skill' mentioned, and it ignores the practical guidelines provided for choosing displays."}, {"text": "One display is always better, but students just haven't learned which one yet.", "isCorrect": false, "rationale": "This directly contradicts the core message of the misconception, which is that no single display is always better."}], "id": "q06"}, {"question": "If you are analyzing a dataset and suspect it might contain two distinct groups of values, leading to a 'bimodal' distribution, which type of plot would be best suited to visually confirm this characteristic?", "options": [{"text": "A box plot, as it clearly shows the overall spread of the data.", "isCorrect": false, "rationale": "Box plots 'cannot show the shape of the distribution (bimodal, skewed)' and thus would not reveal a bimodal pattern."}, {"text": "A stem-and-leaf plot, as it lists all individual values.", "isCorrect": false, "rationale": "While a stem-and-leaf plot shows individual values and some shape, a bimodal pattern is more clearly and explicitly visible as two distinct peaks in a histogram, especially for larger datasets."}, {"text": "A histogram, as it excels at showing the exact shape of the distribution and revealing peaks.", "isCorrect": true, "rationale": "A key strength of histograms is that they 'Shows the exact shape of the distribution' and 'Reveals bimodal distributions (two separate peaks)'."}, {"text": "A simple frequency table, as it counts occurrences of each value.", "isCorrect": false, "rationale": "A frequency table provides counts but does not offer the visual representation of shape, peaks, or gaps as effectively as a histogram."}], "id": "q07"}, {"question": "A small dataset (e.g., 20 quiz scores) needs to be displayed in a way that shows both the overall shape of the distribution AND every individual data value. Which plot type is specifically described as offering this 'best of both worlds'?", "options": [{"text": "A histogram with a very large number of bins.", "isCorrect": false, "rationale": "A histogram, even with many bins, does not show every individual value, but rather bars representing ranges. Too many bins can also make it noisy and messy, hiding true shape."}, {"text": "A box plot with outlier dots clearly marked.", "isCorrect": false, "rationale": "A box plot summarizes data into five numbers and explicitly 'Hides how many data points there are' and cannot show every individual value."}, {"text": "A stem-and-leaf plot.", "isCorrect": true, "rationale": "The section 'Stem-and-Leaf Plots: The Best of Both Worlds' states it 'shows both the shape (like a histogram) and every individual value (like a list)'."}, {"text": "A scatter plot of the data points.", "isCorrect": false, "rationale": "A scatter plot is typically used for showing relationships between two variables, not for displaying the distribution of a single variable, and would not inherently show a clear 'shape' of the distribution in the same way."}], "id": "q08"}, {"question": "Which statistical measure is instantly visible on a box plot, allowing for quick identification, but is difficult to determine precisely from a histogram?", "options": [{"text": "The mean (average) of the dataset.", "isCorrect": false, "rationale": "Neither a box plot nor a histogram instantly shows the exact mean. The mean requires calculation. A box plot shows the median, not the mean."}, {"text": "The frequency of the most common data value (mode).", "isCorrect": false, "rationale": "The mode is typically easier to estimate from a histogram (the tallest bar) than from a box plot, which gives no frequency information."}, {"text": "The median (Q2) and the first and third quartiles (Q1, Q3).", "isCorrect": true, "rationale": "A key strength of box plots is that they 'Instantly shows median, spread (IQR), and extremes'. The text also lists 'Cannot easily show exact median, Q1, Q3' as a weakness of histograms."}, {"text": "The total number of data points in the dataset.", "isCorrect": false, "rationale": "A box plot 'Hides how many data points there are', while a histogram's total bar area/sum of frequencies can indicate the number of points."}], "id": "q09"}, {"question": "The text states that 'Two very different distributions can produce the same box plot.' What is the most significant implication of this weakness?", "options": [{"text": "Box plots are always less reliable than histograms for data analysis.", "isCorrect": false, "rationale": "This is an overgeneralization. Both plots have their uses, and reliability depends on the analytical goal. The text emphasizes that neither is 'always better'."}, {"text": "Box plots are only useful for identifying outliers, nothing else.", "isCorrect": false, "rationale": "This is incorrect. Box plots are also useful for showing median, IQR, and extremes, and for comparing groups, as highlighted in their strengths."}, {"text": "Box plots can obscure the detailed shape or specific characteristics of a distribution.", "isCorrect": true, "rationale": "This statement is a direct consequence of the weakness. If different shapes produce the same box plot, it means the box plot loses information about the specific shape, such as bimodality or skewness, which is a stated weakness: 'Cannot show the shape of the distribution'."}, {"text": "The bin size used in creating the box plot was inappropriate.", "isCorrect": false, "rationale": "Box plots do not use bins, so bin size is irrelevant to their construction or interpretation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
