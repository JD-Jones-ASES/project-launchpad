    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "A teacher has student scores ranging from 0 to 100. Why would they likely choose a grouped frequency table over a regular frequency table?", "options": [{"text": "To hide individual student scores for privacy.", "isCorrect": false, "rationale": "While privacy can be a factor in data reporting, the primary reason for using a grouped frequency table is to organize and summarize wide-ranging data, not to intentionally obscure specific data points."}, {"text": "To make the data more manageable and easier to read due to the wide range of possible scores.", "isCorrect": true, "rationale": "The text explains that a non-grouped table for scores from 0-100 would have 101 rows, which is 'impractical' and 'nearly impossible to read'. Grouping solves this problem by consolidating data into fewer, more digestible intervals."}, {"text": "Because grouped tables are always more accurate than regular frequency tables.", "isCorrect": false, "rationale": "Grouped frequency tables summarize data into ranges, which means some individual detail is lost. Regular frequency tables, which list every individual value, are technically more precise for exact counts of specific values, but impractical for wide ranges."}, {"text": "To only show scores above a certain passing threshold.", "isCorrect": false, "rationale": "A grouped frequency table presents all data within its defined intervals, not just scores above a specific threshold. While you can analyze data relative to a threshold using the table, its purpose isn't to filter data."}], "id": "q01"}, {"question": "In the context of a grouped frequency table, what does an 'interval' (or 'bin') represent?", "options": [{"text": "The total number of data points included in the table.", "isCorrect": false, "rationale": "The total number of data points is the sum of all frequencies, not an interval itself."}, {"text": "A specific range of data values that are grouped together.", "isCorrect": true, "rationale": "The definition states that an interval 'is a range of values grouped together in a frequency table'. For example, '60–69' is an interval."}, {"text": "The difference between the highest and lowest values in the entire dataset.", "isCorrect": false, "rationale": "This describes the range of the entire dataset, not an individual interval within a grouped frequency table."}, {"text": "The most frequently occurring individual data point in the dataset.", "isCorrect": false, "rationale": "This describes the mode of the data, which might be an individual value or an interval with the highest frequency, but not the definition of an interval itself."}], "id": "q02"}, {"question": "The textbook highlights a common misconception about interval boundaries. If an interval is labeled '60–69', what does a score of 70 signify according to the correct interpretation?", "options": [{"text": "It belongs in the '60–69' interval, as 69 rounds up to 70.", "isCorrect": false, "rationale": "Intervals are precise ranges and do not involve rounding for boundary placement. A score of 70 is explicitly outside the '60–69' range."}, {"text": "It belongs in the *next* interval, as '60–69' is exclusive at the top, meaning it includes 60 through 69.", "isCorrect": true, "rationale": "The 'Common Misconception' note explicitly states: 'Make clear that each interval is exclusive at the top: “60–69” means 60, 61, 62, , 69 — not 70. A score of 70 goes in the next interval.'"}, {"text": "It is an outlier and should be excluded from the table.", "isCorrect": false, "rationale": "A score of 70 is a valid data point and should be included in an appropriate interval, typically '70–79' or similar, not excluded."}, {"text": "It indicates an error in the table's design or interval definition.", "isCorrect": false, "rationale": "A score of 70 doesn't indicate an error if the intervals are designed correctly (e.g., 60-69, 70-79). The error would be if 70 fell into multiple or no intervals."}], "id": "q03"}, {"question": "Which of the following is NOT a required characteristic for intervals in a well-constructed grouped frequency table?", "options": [{"text": "Intervals must be equal in width.", "isCorrect": false, "rationale": "The text explicitly states, 'Be equal in width (e.g., all intervals span 10 values)' as a requirement."}, {"text": "Intervals must not overlap.", "isCorrect": false, "rationale": "The text explicitly states, 'Not overlap (a value belongs to exactly one interval)' and emphasizes this in the 'Intervals Must Not Overlap' section."}, {"text": "Intervals must contain an equal number of data points.", "isCorrect": true, "rationale": "The frequency (number of data points) within each interval will naturally vary depending on the data distribution. The requirement is for intervals to be equal in *width*, not to contain an equal *count* of data points."}, {"text": "Intervals must cover all the data with no gaps between them.", "isCorrect": false, "rationale": "The text explicitly states, 'Cover all the data with no gaps between intervals' as a requirement."}], "id": "q04"}, {"question": "Based on Mr. Okonkwo's class grouped frequency table, if a student needs to score at least 80 to pass with distinction, what percentage of students achieved this distinction?", "options": [{"text": "40%", "isCorrect": false, "rationale": "40% would be 12 out of 30 students, which is only those in the 80-89 range. Distinction requires 'at least 80', so 90-99 must also be included."}, {"text": "66.7%", "isCorrect": true, "rationale": "Students scoring 'at least 80' are those in the '80–89' interval (12 students) plus those in the '90–99' interval (8 students). This totals 12 + 8 = 20 students. Out of 30 total students, 20/30 = 2/3, which is approximately 66.7%."}, {"text": "30%", "isCorrect": false, "rationale": "30% would be 9 out of 30 students, which doesn't correspond to the data for scores 80 or above."}, {"text": "20%", "isCorrect": false, "rationale": "20% would be 6 out of 30 students, which is too low based on the provided data for scores 80 and above."}], "id": "q05"}, {"question": "In a grouped frequency table, if the interval '70-79' has a frequency of 15, what does this information primarily convey?", "options": [{"text": "The average value in that range is 75.", "isCorrect": false, "rationale": "Frequency tells us how many values are in the interval, not their average. Calculating an exact average from a grouped frequency table is not possible without the raw data."}, {"text": "There are exactly 15 unique scores between 70 and 79.", "isCorrect": false, "rationale": "Frequency refers to the total count of data points. There could be duplicate scores within the 15 values, meaning fewer than 15 *unique* scores."}, {"text": "15 data values fall within the range of 70 to 79, inclusive.", "isCorrect": true, "rationale": "Frequency explicitly means 'how many values fell in that range' (as per 'How to Read a Grouped Frequency Table'). Therefore, 15 data values are between 70 and 79, including 70 and 79 themselves based on the convention."}, {"text": "The interval '70-79' is the most common range of values.", "isCorrect": false, "rationale": "To determine the most common range, one would need to compare the frequency of '70-79' to the frequencies of all other intervals. 15 might be a high frequency, but not necessarily the highest."}], "id": "q06"}, {"question": "A researcher is creating a grouped frequency table for data ranging from 1 to 100. Which set of intervals best adheres to the guidelines for choosing good intervals?", "options": [{"text": "1–10, 11–25, 26–50, 51–100", "isCorrect": false, "rationale": "These intervals are not equal in width (widths are 10, 15, 25, 50), which violates a key guideline ('Make intervals equal in width')."}, {"text": "0–9, 10–19, 20–29, ..., 90–99", "isCorrect": true, "rationale": "These intervals are equal in width (10 values each), use round numbers (multiples of 10), do not overlap, cover the likely range (0-99), and result in 10 intervals, which is within the recommended 5–10 range."}, {"text": "0–50, 51–100", "isCorrect": false, "rationale": "This setup uses only two intervals, which is 'fewer than 5' and would 'hide too much detail', violating a guideline for good intervals."}, {"text": "1–5, 6–10, 11–15, ..., 96–100", "isCorrect": false, "rationale": "While these intervals are equal width, non-overlapping, and use round numbers, they result in 20 intervals, which is 'More than 10' and 'gets overwhelming', according to the guidelines."}], "id": "q07"}, {"question": "Consider these proposed intervals for a grouped frequency table: '10–20', '20–30', '30–40'. What is the primary issue with this setup?", "options": [{"text": "The intervals are not wide enough for meaningful analysis.", "isCorrect": false, "rationale": "The width (10 units) itself isn't inherently problematic; the issue lies elsewhere."}, {"text": "The intervals do not cover the full data range.", "isCorrect": false, "rationale": "The problem statement doesn't specify the full data range, so we cannot assume this is the primary issue. The listed intervals are sequential."}, {"text": "Values exactly at the boundary (like 20 or 30) could fall into multiple intervals.", "isCorrect": true, "rationale": "The 'Intervals Must Not Overlap' section specifically warns against this exact scenario: 'Where does a score of exactly 90 go? It fits in both! That is a problem.' A score of 20 could fit in '10–20' and '20–30', causing ambiguity."}, {"text": "The intervals use non-round numbers, making them difficult to interpret.", "isCorrect": false, "rationale": "The numbers used (10, 20, 30, 40) are round numbers, so this is not an issue."}], "id": "q08"}, {"question": "If a grouped frequency table uses very wide intervals (e.g., only 2-3 intervals for data ranging from 0-100), what is the most likely consequence?", "options": [{"text": "It would be too overwhelming to read for the audience.", "isCorrect": false, "rationale": "Using too *many* intervals (more than 10) makes a table overwhelming. Too few intervals simplify the table, but at a cost."}, {"text": "It would hide too much detail, making it difficult to discern patterns or specific data characteristics.", "isCorrect": true, "rationale": "The 'Choosing Good Intervals' section states, 'Fewer than 5 hides too much detail.' Very wide intervals condense a lot of data, obscuring patterns and trends within those large ranges."}, {"text": "It would necessarily lead to overlapping intervals.", "isCorrect": false, "rationale": "Interval width and overlap are separate characteristics. Wide intervals can still be designed without overlap (e.g., 0-49, 50-100)."}, {"text": "It would be impossible to calculate the total frequency of the data.", "isCorrect": false, "rationale": "The total frequency can still be calculated by summing the frequencies of the few wide intervals, as long as all data is covered."}], "id": "q09"}, {"question": "What is the fundamental difference in the *application* between a regular frequency table and a grouped frequency table?", "options": [{"text": "Regular tables are always more accurate for displaying data.", "isCorrect": false, "rationale": "Regular tables retain more detail, but 'accuracy' isn't the primary distinction in application. Grouped tables are designed for practicality when individual detail is overwhelming."}, {"text": "Grouped tables are preferred for data with a wide range or continuous values, while regular tables are suitable for discrete data with a limited number of unique values.", "isCorrect": true, "rationale": "The text explicitly states the motivation for grouping is when there's a wide range ('scores from 61 to 98' would be 38 rows, '0 to 100' would be 101 rows), making regular tables impractical. This highlights the differing applications based on data type and spread."}, {"text": "Regular tables always require fewer rows than grouped tables.", "isCorrect": false, "rationale": "This is incorrect. Regular tables require a row for *each unique value*, which can be significantly more rows than a grouped table if the data has a wide range of unique values."}, {"text": "Grouped tables only show percentages, while regular tables show raw counts.", "isCorrect": false, "rationale": "Both types of tables typically show raw frequencies (counts). While percentages can be derived and added to either, it's not a fundamental difference in their primary display purpose."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
