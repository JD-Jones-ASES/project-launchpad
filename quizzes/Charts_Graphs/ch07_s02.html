<script>
var QUESTIONS = [{"question": "What is the fundamental structure of a waffle chart?", "options": [{"text": "A series of interconnected nodes showing relationships.", "isCorrect": false, "rationale": "This describes a network or graph chart, not a waffle chart, which represents parts of a whole."}, {"text": "A 10x10 grid of 100 equal cells, where each cell represents 1% of the total.", "isCorrect": true, "rationale": "The definition explicitly states that a waffle chart is a 10x10 grid of 100 equal cells, with each cell representing 1% of the total."}, {"text": "A bar graph where the bars are arranged in a circular pattern.", "isCorrect": false, "rationale": "This describes a radial bar chart or similar, which is not a waffle chart. Waffle charts use a grid, not bars."}, {"text": "A collection of nested rectangles, each representing a hierarchical category.", "isCorrect": false, "rationale": "This describes a treemap, which is mentioned as a different type of chart suitable for complex hierarchies, unlike a waffle chart."}]}, {"question": "Why might a data visualization specialist choose a waffle chart over a pie chart to display simple percentage data?", "options": [{"text": "Waffle charts can display more categories simultaneously without clutter.", "isCorrect": false, "rationale": "Both charts can become cluttered with too many categories, but waffle charts don't inherently handle more categories better than pie charts. Their advantage lies in precision."}, {"text": "Waffle charts are better at showing complex hierarchical relationships.", "isCorrect": false, "rationale": "Treemaps are noted as being better for complex hierarchies. Waffle charts are for simple 'parts of a whole' percentages."}, {"text": "Our eyes are generally better at judging counts of discrete squares than angles and small differences in pie slices.", "isCorrect": true, "rationale": "The text states that 'Pie charts can be hard to read precisely — our eyes are not very good at judging angles and small differences between slices,' and waffle charts allow one to 'literally count the data and every percentage is shown as an exact number of squares.'"}, {"text": "Pie charts cannot display data that sums to 100%, whereas waffle charts can.", "isCorrect": false, "rationale": "Both pie charts and waffle charts are designed to display 'parts of a whole' where the sum is 100%. This statement is incorrect about pie charts."}]}, {"question": "A student wants to create a waffle chart to show the breakdown of favorite colors among their 50 classmates. If 15 students prefer blue, 20 prefer green, and 15 prefer red, what is the crucial first step before drawing the waffle chart?", "options": [{"text": "Adjust the grid size to 5x10 to accommodate 50 students directly.", "isCorrect": false, "rationale": "The grid size of a waffle chart is always 10x10 (100 cells). Adjusting it would violate the chart's definition and purpose."}, {"text": "Assign a unique color to each student's favorite color.", "isCorrect": false, "rationale": "While assigning colors is part of the process, the more crucial first step for waffle charts with raw counts is percentage conversion."}, {"text": "Convert the counts for each color into percentages of the total number of students.", "isCorrect": true, "rationale": "The text explicitly states: 'A waffle chart ONLY works when your data adds up to 100%. If you have counts... you must convert them to percentages first.' (e.g., Blue: 15/50 = 30%, Green: 20/50 = 40%, Red: 15/50 = 30%)."}, {"text": "Draw the 10x10 grid and randomly color cells until all 50 students are represented.", "isCorrect": false, "rationale": "Coloring should not be random, and simply representing 50 students in a 100-cell grid without percentage conversion would be incorrect. Each cell represents 1%."}]}, {"question": "Which statement best describes the key difference between a waffle chart and a heatmap?", "options": [{"text": "A heatmap always uses a 10x10 grid, while a waffle chart can have variable grid sizes.", "isCorrect": false, "rationale": "This is incorrect. A waffle chart always uses a 10x10 grid, while a heatmap can have various dimensions depending on the data."}, {"text": "In a waffle chart, color identifies distinct categories, whereas in a heatmap, color represents magnitude.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section clarifies this: 'in a waffle chart, color identifies category (like a legend); in a heatmap, color represents magnitude.'"}, {"text": "Waffle charts are used for time-series data, and heatmaps are used for categorical data.", "isCorrect": false, "rationale": "This is incorrect. Waffle charts are for categorical percentages, and heatmaps can be used for various data types, often showing patterns over time or across categories based on magnitude."}, {"text": "Heatmaps require data to sum to 100%, but waffle charts do not.", "isCorrect": false, "rationale": "This is incorrect. Waffle charts critically require data to sum to 100%, while heatmaps do not have this specific requirement for the sum of all data points."}]}, {"question": "A survey of 200 students found that 90 ride the bus, 50 walk, 40 come by car, and 20 bike. How many cells on a waffle chart would be colored for the 'Bus' category?", "options": [{"text": "90 cells", "isCorrect": false, "rationale": "90 is the raw count, not the percentage. A waffle chart uses percentages."}, {"text": "45 cells", "isCorrect": true, "rationale": "The 'Bus' category is 90 out of 200 students. To convert this to a percentage: (90 / 200) * 100 = 0.45 * 100 = 45%. Therefore, 45 cells would be colored."}, {"text": "20 cells", "isCorrect": false, "rationale": "20 cells would represent 20%, which is the 'Car' category's percentage (40/200 * 100 = 20%)."}, {"text": "9 cells", "isCorrect": false, "rationale": "This would represent 9%, which is incorrect for the 'Bus' category."}]}, {"question": "When reading a waffle chart, after identifying the title and legend, what is the next logical step according to the 'How to Read A Waffle Chart' section?", "options": [{"text": "Draw conclusions about the most common categories.", "isCorrect": false, "rationale": "Drawing conclusions is the final step after counting and checking the total. You need to count the cells first."}, {"text": "Compare the different colored groups to see which is largest.", "isCorrect": false, "rationale": "Comparing groups is the step after checking the total. You need to count the cells first."}, {"text": "Count the cells of each color to determine its percentage.", "isCorrect": true, "rationale": "Step 3 in 'How to Read A Waffle Chart' is 'Count the cells of each color. Because the grid has 100 cells total, the number of cells of one color equals that category's percentage directly.'"}, {"text": "Verify that the data sums to 100% before proceeding.", "isCorrect": false, "rationale": "Checking the total is step 4, after counting the individual categories. You count the cells first."}]}, {"question": "What is a common challenge when a category's percentage, such as 33.3%, does not come out to a whole number for a waffle chart?", "options": [{"text": "It requires creating a grid larger than 10x10 to represent fractions of cells.", "isCorrect": false, "rationale": "The grid is always 10x10. It does not expand to accommodate fractions, which would go against the chart's simplicity."}, {"text": "The entire chart becomes invalid and cannot be used.", "isCorrect": false, "rationale": "The chart is still valid; it just requires a practical approach to represent the percentage."}, {"text": "It requires careful rounding to the nearest whole cell (e.g., 33 or 34 cells).", "isCorrect": true, "rationale": "The 'Common Misconceptions' and 'Quick Tip' sections mention this: 'Students may struggle with rounding (e.g., a 33.3% category cannot be shown exactly). Briefly discuss rounding to whole cells.' and 'If a category is 33.3%, you must round to 33 or 34 cells.'"}, {"text": "Each cell must be split into smaller sub-cells to show the precise decimal.", "isCorrect": false, "rationale": "Splitting cells would complicate the chart and defeat the purpose of each cell representing 1% clearly."}]}, {"question": "For which scenario would a waffle chart be least appropriate?", "options": [{"text": "Showing the percentage of different types of energy sources used by a country.", "isCorrect": false, "rationale": "This is a perfect use case for a waffle chart, as it involves showing parts of a whole (percentages of energy sources)."}, {"text": "Comparing the change in stock prices of 10 different companies over a year.", "isCorrect": true, "rationale": "Comparing changes over time (time-series data) is not suited for waffle charts. Waffle charts show a static breakdown of a whole at a single point in time, not trends or magnitude changes. Line charts or sparklines would be more appropriate."}, {"text": "Displaying the breakdown of a budget into different spending categories.", "isCorrect": false, "rationale": "This is a suitable use case, as budget breakdown represents parts of a total budget (percentages)."}, {"text": "Illustrating the proportion of different blood types in a population.", "isCorrect": false, "rationale": "This is an ideal use case, as blood types represent distinct categories whose percentages sum to 100% of the population."}]}, {"question": "A student is creating a hand-drawn waffle chart for an extension activity. They surveyed their classmates about favorite seasons. After collecting the data, what is a key step they must remember to do to accurately represent the data on the chart?", "options": [{"text": "Ensure that the grid is exactly 8x8 cells to fit on standard graph paper.", "isCorrect": false, "rationale": "The grid for a waffle chart is always 10x10 (100 cells), regardless of the paper size. An 8x8 grid would be incorrect."}, {"text": "Convert the number of students for each season into a percentage of the total surveyed.", "isCorrect": true, "rationale": "The 'Extension Activity' notes to 'reinforce the percentage conversion step,' and the 'Quick Tip' emphasizes that waffle charts 'ONLY work when your data adds up to 100%' and that counts must be converted to percentages first."}, {"text": "Use a complex color gradient to represent the magnitude of preference for each season.", "isCorrect": false, "rationale": "Waffle charts use distinct colors for categories, not color gradients for magnitude (which is more akin to a heatmap). The goal is clarity through distinct categories."}, {"text": "Label each individual cell with the name of the season it represents.", "isCorrect": false, "rationale": "Labeling individual cells would be overly cluttered and unnecessary. The legend identifies the colors, and grouped cells represent the category percentage."}]}, {"question": "In the 'How Do Students Get to School?' example, the 'Bus' category is 45% and 'Walk' is 25%. What conclusion can be drawn from these percentages about the transportation methods?", "options": [{"text": "The number of students who ride the bus is exactly twice the number who walk.", "isCorrect": false, "rationale": "45% is not twice 25%. It is less than twice (25% * 2 = 50%)."}, {"text": "More than two-thirds of students combined use the bus or walk to school.", "isCorrect": true, "rationale": "Bus (45%) + Walk (25%) = 70%. Two-thirds is approximately 66.67%. Since 70% is greater than 66.67%, more than two-thirds of students use these methods."}, {"text": "Walking is a more common mode of transportation than riding the bus.", "isCorrect": false, "rationale": "The 'Bus' category (45%) is significantly larger than the 'Walk' category (25%), meaning riding the bus is more common, not less."}, {"text": "The remaining 30% of students use bikes exclusively.", "isCorrect": false, "rationale": "The remaining categories are Car (20%) and Bike (10%), which sum to 30%. This 30% is not exclusively bikes; it's a combination of cars and bikes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
