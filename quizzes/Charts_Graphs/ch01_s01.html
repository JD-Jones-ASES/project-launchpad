        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of drawing the fifth tally mark diagonally across a group of four vertical marks?", "options": [{"text": "It helps to visually differentiate between different categories in the chart.", "isCorrect": false, "rationale": "While clarity is a goal of tally charts, the diagonal mark specifically serves to group tallies, not to differentiate categories, which are usually separated by rows or columns."}, {"text": "It makes counting faster and easier by bundling marks into groups of five.", "isCorrect": true, "rationale": "The text explicitly states that 'After four marks, the fifth mark is drawn diagonally across the group, creating a bundle of five. This makes counting faster: you just count bundles of five plus any leftover marks.'"}, {"text": "It indicates that the data collection for that specific category is complete.", "isCorrect": false, "rationale": "The diagonal mark is part of the ongoing counting process for a category, not an indicator of completion. Counting continues with new bundles after one is formed."}, {"text": "It signifies that a particular item counted is of higher importance than others in its category.", "isCorrect": false, "rationale": "Tally marks are used for simple, uniform counts; they do not convey different levels of importance for individual items within a category."}], "id": "q01"}, {"question": "According to the text, what is the most common mistake students make when creating tally marks?", "options": [{"text": "Forgetting to write down the category names in the left column.", "isCorrect": false, "rationale": "While a mistake in setting up a chart, the text specifically identifies a different, very common error related to the marks themselves in the 'Watch Out Simple' section."}, {"text": "Drawing five vertical lines instead of four vertical lines and one diagonal slash for a group of five.", "isCorrect": true, "rationale": "The 'Watch Out Simple' box states: 'The most common tally mistake is drawing five vertical lines instead of four lines plus one diagonal slash.' This misrepresents a group of five as six individual marks."}, {"text": "Incorrectly adding the total count for all categories at the end.", "isCorrect": false, "rationale": "This is a potential mistake, and the 'Quick Tip' advises against it, but the text highlights the formation of the bundle of five as the 'most common' error."}, {"text": "Using different colored pens for different tally marks within the same category.", "isCorrect": false, "rationale": "The text does not mention the use of different colors for tally marks as a common mistake; it focuses on the structure of the marks themselves."}], "id": "q02"}, {"question": "A student is tracking the number of different types of books checked out from the school library in one hour. If the 'Fiction' category has three full bundles of five and two additional vertical marks, how many fiction books were checked out?", "options": [{"text": "12", "isCorrect": false, "rationale": "Three full bundles of five equals 15 (3 * 5), plus two additional marks makes 17, not 12."}, {"text": "15", "isCorrect": false, "rationale": "Three full bundles of five equals 15, but there are also two additional marks, making the total 17, not 15."}, {"text": "17", "isCorrect": true, "rationale": "Three full bundles of five represent 3 * 5 = 15 items. Adding the two additional vertical marks (15 + 2) gives a total of 17 fiction books checked out."}, {"text": "23", "isCorrect": false, "rationale": "Three full bundles and two marks equates to 17. The number 23 is significantly higher and would imply more bundles or more leftover marks."}], "id": "q03"}, {"question": "Which of the following scenarios is *most* appropriate for using a tally chart, according to the provided section?", "options": [{"text": "Analyzing the precise average rainfall data for a region over the past 50 years.", "isCorrect": false, "rationale": "Tally charts are for 'quick, rough counts — not exact calculations' and are not ideal for analyzing pre-collected, precise historical data."}, {"text": "Recording the popularity of 75 different ice cream flavors at a large festival, needing exact percentages.", "isCorrect": false, "rationale": "The text states tally charts are not ideal for 'hundreds of categories' or 'when you need precise calculations.' 75 categories is too many for a tally chart's efficiency."}, {"text": "Counting the number of different types of birds visiting a backyard feeder over an hour.", "isCorrect": true, "rationale": "This scenario fits the criteria for using a tally chart: 'counting in real time,' likely 'a small number of categories,' and needing 'a quick, rough count.'"}, {"text": "Managing an inventory of thousands of different products in a large warehouse.", "isCorrect": false, "rationale": "This involves a very large number of items and categories ('hundreds of categories' or more) and would require precise calculations, making a tally chart an unsuitable tool."}], "id": "q04"}, {"question": "When reading a completed tally chart, what is the recommended first step?", "options": [{"text": "Find the total by adding all the row counts together.", "isCorrect": false, "rationale": "Calculating the total is an important step, but it is not the very first. You need to understand what you're counting first."}, {"text": "Draw conclusions about which category has the most or fewest marks.", "isCorrect": false, "rationale": "Drawing conclusions is the final step after all counting and totaling are complete, not the initial one."}, {"text": "Count the tally marks in each row, starting with full bundles of five.", "isCorrect": false, "rationale": "Counting marks in each row is the second step. Before counting, you need to understand what each row represents."}, {"text": "Read the category names in the left column to understand what each row represents.", "isCorrect": true, "rationale": "The section 'How to Read a Tally Chart' lists this as the first step: 'Read the category names in the left column. Each row represents one group or choice.'"}], "id": "q05"}, {"question": "Based on the example 'Car Colors in the School Parking Lot' chart provided, how many more white cars were counted than red cars?", "options": [{"text": "5", "isCorrect": false, "rationale": "The chart shows 15 white cars and 8 red cars. The difference is 15 - 8 = 7, not 5."}, {"text": "7", "isCorrect": true, "rationale": "The 'Car Colors' example shows 15 white cars and 8 red cars. The difference between them is 15 - 8 = 7 cars."}, {"text": "8", "isCorrect": false, "rationale": "8 is the count for red cars, not the difference between white and red cars."}, {"text": "15", "isCorrect": false, "rationale": "15 is the count for white cars, not the difference between white and red cars."}], "id": "q06"}, {"question": "What ancient artifact is mentioned in the 'Did You Know' section as potential evidence of early tally mark use?", "options": [{"text": "The Rosetta Stone", "isCorrect": false, "rationale": "The Rosetta Stone is famous for its trilingual inscription, not for tally marks."}, {"text": "The Code of Hammurabi", "isCorrect": false, "rationale": "The Code of Hammurabi is an ancient set of laws, not a tally mark artifact."}, {"text": "The Ishango bone", "isCorrect": true, "rationale": "The 'Did You Know' section specifically states: 'The Ishango bone, discovered in Africa, has notches arranged in patterns that some scientists believe represent early arithmetic or lunar tracking.'"}, {"text": "The Venus de Milo", "isCorrect": false, "rationale": "The Venus de Milo is a famous ancient Greek statue, not related to early counting methods."}], "id": "q07"}, {"question": "Why is it important to 'Double-Check Your Total' after filling in a tally chart?", "options": [{"text": "To ensure that the chart has an even number of categories.", "isCorrect": false, "rationale": "The total check is for accuracy of counts, not for the number of categories being even or odd."}, {"text": "To confirm that no counting mistakes were made when recording the data.", "isCorrect": true, "rationale": "The 'Quick Tip' states: 'If your counts do not add up to your total, you miscounted somewhere. Find the mistake before you move on!' This emphasizes catching counting errors."}, {"text": "To verify that each category has at least one tally mark.", "isCorrect": false, "rationale": "Some categories might genuinely have zero counts. The purpose of checking the total is broader: to ensure all individual counts sum up correctly to the overall total."}, {"text": "To make sure the chart is visually appealing and easy to read.", "isCorrect": false, "rationale": "While clarity is good, the double-check is a functional step to ensure mathematical accuracy, not aesthetic appeal."}], "id": "q08"}, {"question": "Which of the following situations would generally make a tally chart an *ineffective* tool?", "options": [{"text": "Collecting data on student preferences for 5 different lunch options in real time.", "isCorrect": false, "rationale": "This scenario fits the criteria for effective tally chart use: real-time counting, small number of categories."}, {"text": "Counting the number of cars passing a specific point on a road over a 15-minute period.", "isCorrect": false, "rationale": "This involves real-time counting and is suitable for a quick, rough count with a tally chart."}, {"text": "Analyzing precise demographic data from a national census with hundreds of categories and requiring complex calculations.", "isCorrect": true, "rationale": "The text states tally charts are 'not the best tool when you have hundreds of categories, when you need precise calculations, or when you are working from data that has already been collected.' This scenario meets all these conditions for ineffectiveness."}, {"text": "Tracking the number of goals scored by a soccer team across 8 different games in a season.", "isCorrect": false, "rationale": "This involves a small number of categories (games) and a relatively simple count, which could be handled by a tally chart for a quick overview."}], "id": "q09"}, {"question": "A teacher is collecting data on students' favorite colors by asking each student once. So far, the tally chart shows: Red $IIII$, Blue $III$, Green $IIII II$. How many students have been surveyed?", "options": [{"text": "12 students", "isCorrect": false, "rationale": "Red (4) + Blue (3) + Green (7) = 14 students, not 12."}, {"text": "13 students", "isCorrect": false, "rationale": "Red (4) + Blue (3) + Green (7) = 14 students, not 13."}, {"text": "14 students", "isCorrect": true, "rationale": "Counting the tallies: Red has 4 marks. Blue has 3 marks. Green has one bundle of five plus two extra marks, totaling 7 marks. Adding these together (4 + 3 + 7) gives a total of 14 students surveyed."}, {"text": "15 students", "isCorrect": false, "rationale": "Red (4) + Blue (3) + Green (7) = 14 students, not 15."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
