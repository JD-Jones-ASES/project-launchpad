        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>

        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central message of the section 'Correlation Is Not Causation'?", "options": [{"text": "If two variables move together, one must cause the other.", "isCorrect": false, "rationale": "This is a common misconception that the text directly refutes, stating that just because two things are correlated does not mean one causes the other."}, {"text": "Correlation means two variables are related, but one doesn't necessarily cause the other.", "isCorrect": true, "rationale": "The text explicitly states: 'Just because two things are correlated — just because they move together on a scatter plot — does not mean that one causes the other.' It emphasizes that correlation is evidence of a possible relationship but not proof of causation."}, {"text": "Negative correlations prove there is no causation.", "isCorrect": false, "rationale": "The text clarifies a common misconception: 'correlation direction (positive/negative) and causation are separate questions.' A negative correlation can still be part of a causal relationship."}, {"text": "Data cannot be trusted to show relationships between variables.", "isCorrect": false, "rationale": "The section highlights how to interpret data relationships correctly, not to distrust data entirely. Correlation can show a relationship, but it's not sufficient proof of causation."}]}, {"question": "A study finds that cities with more public parks tend to have lower rates of respiratory illnesses. Which of the following is most likely a lurking variable explaining this correlation?", "options": [{"text": "The number of trees in private gardens.", "isCorrect": false, "rationale": "While related to greenery, this is a more specific and less overarching factor compared to broader city-level influences that could explain both parks and general health outcomes."}, {"text": "The average daily temperature in the city.", "isCorrect": false, "rationale": "Temperature could affect certain illnesses, but it's not as direct an explanation for a consistent correlation between public parks (a policy choice) and overall respiratory health across different urban environments as socioeconomic factors."}, {"text": "The overall wealth and public health infrastructure of the city.", "isCorrect": true, "rationale": "Wealthier cities often invest more in public amenities like parks and also have better healthcare, pollution controls, and public health initiatives. These underlying factors could cause both more parks AND lower rates of respiratory illnesses, acting as a lurking variable that makes parks and health appear correlated."}, {"text": "The prevalence of certain genetic predispositions in the population.", "isCorrect": false, "rationale": "Genetic predispositions are individual biological factors and wouldn't typically act as a city-wide lurking variable explaining a correlation between urban planning (parks) and population-level health statistics."}]}, {"question": "John Snow's work on the cholera epidemic is presented as an example of proving causation, unlike the ice cream/drowning example. What was the critical difference in Snow's approach that led to this conclusion?", "options": [{"text": "He used a map, which is inherently more accurate than a scatter plot for proving causation.", "isCorrect": false, "rationale": "While he used a map, the text emphasizes that the key was his identification of the *mechanism*, not just the mapping technique itself. The map was a tool to visualize the correlation, not the cause of proving causation."}, {"text": "He identified a clear mechanism (contaminated water) linking the cause and effect.", "isCorrect": true, "rationale": "The text states: 'He didn't just find a correlation — he found the mechanism (contaminated water), which is why his conclusion was accepted as causation.' This mechanism provided the direct link, moving beyond mere correlation."}, {"text": "He only considered deaths, not illnesses, making his data clearer.", "isCorrect": false, "rationale": "Focusing on deaths was a pragmatic data collection choice, but the clarity of data alone wasn't what proved causation. It was the identification of the underlying process."}, {"text": "His findings were supported by the prevailing scientific beliefs of his time.", "isCorrect": false, "rationale": "The text notes that 'most scientists believed cholera spread through 'bad air',' meaning Snow's findings actually challenged, rather than supported, the prevailing beliefs, making his proof of mechanism even more significant."}]}, {"question": "According to the text, what is a 'lurking variable'?", "options": [{"text": "A variable that is difficult to measure accurately.", "isCorrect": false, "rationale": "While lurking variables might sometimes be difficult to measure, their defining characteristic is their causal role in creating an apparent correlation, not their measurability."}, {"text": "A variable that directly causes another variable to change.", "isCorrect": false, "rationale": "This describes a direct causal relationship between two variables, not a lurking variable, which acts as a third, hidden cause for both variables in question."}, {"text": "A hidden variable that causes two other variables to appear correlated without having a direct relationship with each other.", "isCorrect": true, "rationale": "The definition box in the text clearly states: 'A lurking variable (also called a confounding variable or third variable) is a hidden variable that causes two other variables to both change, making them appear correlated without having a direct relationship with each other.'"}, {"text": "A variable that only appears in negative correlations.", "isCorrect": false, "rationale": "Lurking variables can cause both positive and negative apparent correlations; their presence is not limited by the direction of the observed relationship."}]}, {"question": "A politician claims, 'Our new policy led to a 10% increase in employment because the two events happened concurrently.' Based on the 'Evaluating a Claimed Correlation' steps, what is the most important next question to ask?", "options": [{"text": "What was the exact date the policy was enacted?", "isCorrect": false, "rationale": "While important for establishing concurrency, this question alone doesn't address whether the policy *caused* the increase, which is the core of the politician's claim."}, {"text": "Are there any other factors that could have influenced employment rates during that period?", "isCorrect": true, "rationale": "The 'Evaluating a Claimed Correlation' steps include: 'Ask: Is there a lurking variable? Could a third factor cause both A and B to change?' This question directly addresses that crucial step by seeking alternative explanations beyond simple concurrency."}, {"text": "Did other countries also experience an employment increase?", "isCorrect": false, "rationale": "This might be part of a broader economic analysis but is not the most immediate or direct question for evaluating the causal claim within the given framework, which prioritizes looking for lurking variables or direct mechanisms within the specific context."}, {"text": "How does a 10% increase compare to previous years?", "isCorrect": false, "rationale": "This question helps assess the significance or unusualness of the increase but doesn't directly address the causal link. A large increase could still be due to a lurking variable."}]}, {"question": "The text notes a common misconception: 'Students may think that a negative correlation cannot be causal.' Why is this misconception incorrect?", "options": [{"text": "Negative correlations are simply harder to interpret, but still imply causation.", "isCorrect": false, "rationale": "The text doesn't state that negative correlations are harder to interpret regarding causation, but rather that the *direction* of correlation is a separate question from causation itself."}, {"text": "The direction of a correlation (positive or negative) is distinct from the question of whether a causal link exists.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states: 'Clarify: correlation direction (positive/negative) and causation are separate questions.' A causal relationship can lead to either a positive or negative correlation."}, {"text": "Only strong positive correlations can demonstrate a causal relationship.", "isCorrect": false, "rationale": "This is incorrect. Causation can be observed in both positive and negative relationships, provided a direct mechanism is established and lurking variables are ruled out."}, {"text": "Negative correlations always imply a lurking variable, never direct causation.", "isCorrect": false, "rationale": "This is false. Like positive correlations, negative correlations *could* be due to a lurking variable, or they could be a direct causal relationship. The presence of a lurking variable isn't exclusive to negative correlations."}]}, {"question": "The text states that 'Experiments are the gold standard for proving causation.' Why is this the case?", "options": [{"text": "Experiments always use larger datasets than observational studies.", "isCorrect": false, "rationale": "While experiment design often involves specific sample sizes, the size of the dataset is not the primary reason experiments are the 'gold standard' for proving causation."}, {"text": "Experiments allow researchers to manipulate one variable and observe the direct effect on another, controlling for lurking variables through random assignment.", "isCorrect": true, "rationale": "The text mentions: 'If you randomly assigned people to one group vs. another, would the effect still appear? (Experiments are the gold standard for proving causation.)' Random assignment helps distribute potential lurking variables evenly across groups, allowing researchers to isolate the effect of the manipulated variable."}, {"text": "Experiments are the only method that can identify correlations between variables.", "isCorrect": false, "rationale": "Observational studies, like scatter plots, are effective at identifying correlations. Experiments go a step further to establish causation."}, {"text": "Experiments are less susceptible to human error in data collection.", "isCorrect": false, "rationale": "All research methods can be susceptible to human error. The 'gold standard' status of experiments for causation stems from their design principles, not necessarily a guaranteed lack of error."}]}, {"question": "The 'Spurious Correlations' website is mentioned as a reminder that:", "options": [{"text": "All correlations are eventually proven to be causal given enough time.", "isCorrect": false, "rationale": "This contradicts the core message of the section that correlation is not causation, and that many correlations are coincidental."}, {"text": "Strong correlations can sometimes occur purely by chance between unrelated variables.", "isCorrect": true, "rationale": "The 'didyouknow' box states that the website collects 'hilarious examples of strong correlations between completely unrelated variables — like the number of Nicolas Cage movies released per year and the number of people who drowned by falling into swimming pools. The cause? Pure coincidence in the numbers.'"}, {"text": "Data collection methods are inherently flawed and produce misleading results.", "isCorrect": false, "rationale": "The website highlights how correlations can be misinterpreted, not that the data collection methods themselves are universally flawed."}, {"text": "Only human-generated data can lead to spurious correlations.", "isCorrect": false, "rationale": "The examples on the website are typically from real-world, observed data, not just hypotheticals. The point is about statistical chance, not the data source."}]}, {"question": "Why does understanding the difference between correlation and causation matter in evaluating health claims, as mentioned in the text?", "options": [{"text": "It helps people identify which medical professionals are trustworthy.", "isCorrect": false, "rationale": "While critical thinking is good, the text specifically focuses on evaluating the claims themselves, not assessing the trustworthiness of professionals based solely on this principle."}, {"text": "It ensures that all health research is conducted using randomized experiments.", "isCorrect": false, "rationale": "Understanding the difference informs how to interpret research, but it doesn't mean all health research *must* be experimental; observational studies are often necessary and can still provide valuable insights (though not causation)."}, {"text": "It prevents misinterpreting associations as direct causes, such as assuming 'People who eat breakfast weigh less' means skipping breakfast causes weight gain.", "isCorrect": true, "rationale": "The text directly uses this example: '“People who eat breakfast weigh less” does not mean skipping breakfast causes weight gain — many factors differ between breakfast eaters and non-eaters.' This illustrates how recognizing lurking variables is crucial for health claims."}, {"text": "It allows individuals to self-diagnose based on observed correlations in their own health.", "isCorrect": false, "rationale": "Understanding correlation vs. causation promotes skepticism and careful analysis, which would discourage self-diagnosis based merely on observed personal correlations without professional medical input."}]}, {"question": "The section states that learning 'Correlation is not causation' will 'protect you from being fooled by data for the rest of your life.' What deeper implication does this statement suggest about data interpretation?", "options": [{"text": "That most data presented to the public is intentionally misleading.", "isCorrect": false, "rationale": "The text emphasizes careful interpretation, not an inherent distrust or assumption of malicious intent in most data presentations."}, {"text": "That critical thinking and skepticism are essential when interpreting statistical relationships.", "isCorrect": true, "rationale": "The statement implies that without understanding this principle, one is vulnerable to misinterpretations. Applying critical thinking, asking questions about lurking variables, and seeking mechanisms are key to not being fooled by data."}, {"text": "That one should never trust any statistical claim unless it comes from an academic source.", "isCorrect": false, "rationale": "The text provides tools for evaluating claims from various sources (advertising, politics, medicine), rather than advocating for blanket distrust of non-academic claims."}, {"text": "That correlation is a meaningless concept and should be disregarded entirely.", "isCorrect": false, "rationale": "The text positions correlation as 'evidence of a possible relationship' and a starting point for further investigation, not a meaningless concept to be disregarded. The lesson is about correct interpretation, not dismissal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
