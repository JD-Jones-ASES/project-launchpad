        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 12, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason why critical evaluation of infographics is emphasized as \"the most important skill of all\" in the text?", "options": [{"text": "Infographics are inherently more complex than other charts.", "isCorrect": false, "rationale": "While some infographics can be complex, the text does not emphasize complexity as the primary reason for critical evaluation being 'the most important skill.' Instead, it points to their deceptive nature."}, {"text": "Their attractive design can lower a reader's guard, making them more prone to misleading.", "isCorrect": true, "rationale": "The text explicitly states: 'Infographics can mislead just as easily as any other chart — sometimes more so, because their attractive design can lower your guard.' This is the core reason for emphasizing critical evaluation."}, {"text": "Most infographics contain intentional misinformation.", "isCorrect": false, "rationale": "The text states infographics 'can mislead,' not that 'most' contain intentional misinformation. The emphasis is on the potential for misleading, whether intentional or accidental."}, {"text": "It's difficult to find infographics with cited sources.", "isCorrect": false, "rationale": "While a missing source is a red flag, it's a specific problem identified within critical evaluation, not the overarching reason for the skill's importance itself."}]}, {"question": "According to the critical evaluation checklist, which of the following is an immediate and significant \"red flag\" when evaluating an infographic?", "options": [{"text": "The infographic uses too many colors.", "isCorrect": false, "rationale": "Aesthetic choices like color use are not identified as a critical problem or 'red flag' in the evaluation checklist."}, {"text": "The icons used are not aesthetically pleasing.", "isCorrect": false, "rationale": "Aesthetics are subjective and not a measure of an infographic's accuracy or trustworthiness according to the checklist."}, {"text": "There is no footnote, caption, or small text citing the data source.", "isCorrect": true, "rationale": "The checklist explicitly states, 'Is the source cited? ... If there is no source, the numbers could be made up.' The 'Common Misconceptions' section also notes that omitting a source is 'itself a red flag, not just a neutral oversight.'"}, {"text": "The infographic's title is too long.", "isCorrect": false, "rationale": "The length of a title is a stylistic choice and is not part of the critical evaluation checklist for accuracy or reliability."}]}, {"question": "An infographic presents the results of a survey about favorite ice cream flavors, showing \"Chocolate 40%\", \"Vanilla 30%\", and \"Strawberry 25%\". What problem does this infographic most likely have based on the critical evaluation checklist?", "options": [{"text": "The visuals are not proportional to the data.", "isCorrect": false, "rationale": "While this could be a problem, there's no information about the visual representation given. The most immediate and direct problem is with the presented numbers themselves."}, {"text": "Important context might be missing about the survey participants.", "isCorrect": false, "rationale": "This is a valid point of critical evaluation, but the given percentages already reveal a more fundamental and immediate mathematical flaw."}, {"text": "The numbers do not add up to 100%.", "isCorrect": true, "rationale": "Adding the percentages (40% + 30% + 25% = 95%) reveals they do not sum to 100%, which is a direct violation of the 'Do the numbers add up?' checklist item for a single-choice survey."}, {"text": "The source of the data is not credible.", "isCorrect": false, "rationale": "No source is provided, so its credibility cannot be assessed. The problem lies with the internal consistency of the numbers themselves."}]}, {"question": "An infographic uses icons to represent data. If an icon for \"Product A\" (representing 60% market share) is drawn three times the height of an icon for \"Product B\" (representing 30% market share), which critical problem from the checklist is evident?", "options": [{"text": "The source is likely untrustworthy.", "isCorrect": false, "rationale": "The visual distortion relates to how data is presented, not directly to the trustworthiness of the source, though it could be a tactic of a biased source."}, {"text": "Important context about the market is missing.", "isCorrect": false, "rationale": "This problem describes a visual misrepresentation, not a lack of broader contextual information about the market."}, {"text": "The numbers don't add up correctly.", "isCorrect": false, "rationale": "The percentages (60% and 30%) might add up correctly with other categories; the problem here is with their visual translation."}, {"text": "The visuals are not proportional to the data.", "isCorrect": true, "rationale": "60% is twice 30%, so the icon for 'Product A' should be twice the area (or height/width if comparing linear dimensions appropriately) of 'Product B', not three times the height. This is a direct violation of 'Are the visuals proportional to the data?'"}]}, {"question": "The \"School Lunch Preferences\" infographic concluded, \"Students overwhelmingly prefer hot food options. Our school should expand the pizza and burger menu,\" despite the numbers being flawed. This conclusion best illustrates a potential issue with which part of the critical evaluation checklist?", "options": [{"text": "The \"numbers add up\" check.", "isCorrect": false, "rationale": "While the numbers were indeed flawed, the *conclusion* drawn from them and the recommendation made points to a specific type of bias or agenda, rather than just the mathematical error itself."}, {"text": "The \"source cited\" check.", "isCorrect": false, "rationale": "The absence of a source is a problem, but the specific phrasing of the conclusion highlights how the infographic's creator wants to influence the reader, which relates to their agenda."}, {"text": "The \"what story is being told — and who benefits?\" check.", "isCorrect": true, "rationale": "The conclusion explicitly pushes an agenda (expanding pizza and burger menus) that benefits certain options. This aligns perfectly with asking 'Who made this infographic? Do they have an agenda...?'"}, {"text": "The \"visuals proportional\" check.", "isCorrect": false, "rationale": "This issue relates to the textual conclusion and recommendation, not to the visual representation of data."}]}, {"question": "According to the \"Quick Tip\" about the \"Who Benefits?\" question, why is it crucial to consider the creator's motivation even if an infographic is \"technically accurate\"?", "options": [{"text": "To ensure the infographic is completely unbiased and objective.", "isCorrect": false, "rationale": "The text states 'Bias doesn't make an infographic wrong, but it means you should look extra carefully.' The goal isn't necessarily to eliminate all bias but to understand how it shapes the presentation."}, {"text": "Because a motivated creator might strategically present only favorable data, not the full truth.", "isCorrect": true, "rationale": "The quick tip explains: 'A pizza company's infographic... might be technically accurate but strategically present only the data that makes pizza look good. That's not lying — but it is not the full truth either.'"}, {"text": "To identify potential errors in mathematical calculations.", "isCorrect": false, "rationale": "The 'Who Benefits?' question primarily addresses agenda and strategic presentation, not mathematical accuracy, which is covered by a separate checklist item."}, {"text": "To determine if the infographic uses too many colors or complex designs.", "isCorrect": false, "rationale": "This question is about the creator's intent and how data is framed, not about design aesthetics or complexity."}]}, {"question": "A local council publishes an infographic titled \"Community Recycling Efforts\" showing a bar chart of recycling rates for the past three years, all showing increasing rates. There is no mention of recycling rates from five years ago, which were significantly higher, and the bar for the most recent year is visually exaggerated compared to its actual percentage. Which two critical problems are most clearly present?", "options": [{"text": "Missing context and disproportionate visuals.", "isCorrect": true, "rationale": "The omission of significantly higher rates from five years ago is a classic example of 'cherry-picking favorable data' and thus 'missing important context.' The 'visually exaggerated' bar directly indicates that 'the visuals are not proportional to the data.'"}, {"text": "Numbers don't add up and no source cited.", "isCorrect": false, "rationale": "While these could be problems, the scenario explicitly describes issues with missing historical data and visual proportionality, not internal mathematical sums or absence of a source."}, {"text": "Untrustworthy source and incorrect mathematical calculations.", "isCorrect": false, "rationale": "The source is the local council (which may or may not be trustworthy, but isn't explicitly stated as untrustworthy), and no specific mathematical calculation errors (like sums) are mentioned, only visual distortion."}, {"text": "Overly complex design and irrelevant data.", "isCorrect": false, "rationale": "The scenario does not describe an overly complex design or irrelevant data. The data presented is relevant, but incomplete and visually distorted."}]}, {"question": "In the \"Data Detective Challenge,\" if Pizza's percentage is corrected to 45% and Salad's to 20% to make the numbers add up (along with Burger at 35%), and the pizza icon has an area of 45 square units, what should be the proportional area for the salad icon?", "options": [{"text": "10 square units.", "isCorrect": false, "rationale": "If 45% = 45 sq units, then 10% would be 10 sq units. Salad's corrected percentage is 20%."}, {"text": "20 square units.", "isCorrect": true, "rationale": "The problem states the area should be proportional to the percentage. If 45% corresponds to an area of 45 square units, then 20% should correspond to an area of 20 square units."}, {"text": "25 square units.", "isCorrect": false, "rationale": "This would correspond to 25% if the proportionality holds, but Salad's corrected percentage is 20%."}, {"text": "30 square units.", "isCorrect": false, "rationale": "This would correspond to 30% if the proportionality holds, but Salad's corrected percentage is 20%."}]}, {"question": "What common misconception about infographic accuracy do students often hold, according to the \"Common Misconceptions\" section?", "options": [{"text": "That an infographic's data is always up-to-date.", "isCorrect": false, "rationale": "While keeping data up-to-date is important, this specific misconception is not mentioned in the text."}, {"text": "That all infographics are created by expert data scientists.", "isCorrect": false, "rationale": "This misconception is not mentioned in the provided text."}, {"text": "That if a number in an infographic \"feels right,\" it must be accurate.", "isCorrect": true, "rationale": "The text states: 'Students may think that if a number in an infographic “feels right,” it must be accurate. Teach them to check math directly...'"}, {"text": "That attractive designs always indicate reliable data.", "isCorrect": false, "rationale": "The text states attractive design can 'lower your guard,' but doesn't explicitly state students hold the misconception that attractive design *indicates* reliability."}]}, {"question": "A student wants to share an interesting infographic they found on social media. Before sharing, the \"Missing Source Trap\" advice suggests they should always:", "options": [{"text": "Recreate the infographic with their own design to make it more appealing.", "isCorrect": false, "rationale": "Redesigning doesn't address the credibility or accuracy of the data, which is the focus of the 'Missing Source Trap'."}, {"text": "Verify that a real, credible source is cited for the data.", "isCorrect": true, "rationale": "The 'Missing Source Trap' section explicitly advises: 'Before sharing an infographic on social media or using it in a report, always verify that a real, credible source is cited.'"}, {"text": "Check if the infographic uses animation or interactive features.", "isCorrect": false, "rationale": "Features like animation or interactivity are design elements and do not speak to the data's credibility or source."}, {"text": "Assume the data is accurate if it's from a well-known social media account.", "isCorrect": false, "rationale": "This directly contradicts the advice to be suspicious of missing sources and to verify credibility, regardless of where it was found."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
