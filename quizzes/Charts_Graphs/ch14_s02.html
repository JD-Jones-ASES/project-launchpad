    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A bar chart comparing two competing phone brands shows Brand X with 31% market share and Brand Y with 29% market share. The y-axis starts at 28%. How does this design choice likely affect the viewer's perception of the market share difference?", "options": [{"text": "It accurately highlights the slight lead Brand X has over Brand Y.", "isCorrect": false, "rationale": "By truncating the axis, small differences appear much larger, so it does not accurately highlight a slight lead; instead, it exaggerates it."}, {"text": "It makes Brand X's market share appear significantly larger than Brand Y's, even though the actual difference is small.", "isCorrect": true, "rationale": "Starting the y-axis at a value above zero (like 28% instead of 0%) exaggerates the visual difference between bars, making a 2-percentage-point lead appear much more substantial than it is in reality."}, {"text": "It creates a 3D effect, making the bars look taller than they are.", "isCorrect": false, "rationale": "Truncating the axis is distinct from 3D distortion. The visual exaggeration comes from the axis scale, not a third dimension."}, {"text": "It hides the true market share values, making it impossible to compare the brands.", "isCorrect": false, "rationale": "The true values are still present on the axis; the issue is the visual distortion of their relative differences, not their concealment."}], "id": "q01"}, {"question": "A company's website displays a line graph showing its stock price over 'the past year,' which rises steeply from left to right. Upon closer inspection, the x-axis labels reveal that the data only covers October through December of the previous year. Which misleading technique is being employed?", "options": [{"text": "Inconsistent Intervals", "isCorrect": false, "rationale": "Inconsistent intervals relate to uneven spacing of time points on the x-axis, not the overall selection of the time range itself."}, {"text": "Missing Context", "isCorrect": false, "rationale": "While related to context, 'Cherry-Picked Time Range' is the more specific and accurate term for deliberately selecting a favorable subset of a timeline."}, {"text": "Cherry-Picked Time Range", "isCorrect": true, "rationale": "This technique involves selecting only a specific portion of a timeline (like a brief period of growth) to support a particular conclusion while omitting broader data that might contradict it."}, {"text": "Dual-Axis Deception", "isCorrect": false, "rationale": "Dual-axis deception involves using two y-axes with different scales to create a false visual correlation between two variables, which is not the case in this scenario."}], "id": "q02"}, {"question": "A pictograph compares the enrollment of two schools. School A has 300 students, and School B has 600 students. The icon representing School B is designed to be twice as tall and twice as wide as the icon for School A. How many times larger does School B's icon visually appear compared to School A's?", "options": [{"text": "Twice as large", "isCorrect": false, "rationale": "While the linear dimensions (height and width) are doubled, the visual perception of size in icons is based on area, not linear dimensions alone."}, {"text": "Three times as large", "isCorrect": false, "rationale": "This is not the correct multiplicative factor for doubling both height and width."}, {"text": "Four times as large", "isCorrect": true, "rationale": "If both the height and width of an icon are doubled, its area becomes 2 (height) * 2 (width) = 4 times larger. This creates a misleading visual perception that the data is four times greater when it is only twice as large."}, {"text": "Six times as large", "isCorrect": false, "rationale": "This is an incorrect multiplicative factor. Doubling linear dimensions results in a quadrupling of area."}], "id": "q03"}, {"question": "When analyzing a chart that features two distinct y-axes, one on the left and one on the right, what crucial step should a critical viewer take to avoid being misled?", "options": [{"text": "Assume that any lines tracking together imply a strong correlation between the variables.", "isCorrect": false, "rationale": "This is precisely what a dual-axis chart can deceptively imply. The visual alignment can be manipulated without a real statistical correlation."}, {"text": "Check both y-axis labels and scales to understand if the visual overlap represents actual relationships or scale manipulation.", "isCorrect": true, "rationale": "The scales of the two axes can be adjusted independently to force lines to appear to converge or track together, even if the variables have weak or no real correlation. Always comparing both scales is key to spotting this trick."}, {"text": "Ignore the right y-axis, as it is often redundant.", "isCorrect": false, "rationale": "Ignoring one of the axes means ignoring crucial context and potentially missing the misleading aspect of the chart."}, {"text": "Only focus on the trend of the line associated with the left y-axis, as it is usually the primary data.", "isCorrect": false, "rationale": "Both axes are integral to the chart's message, and a deceptive chart can manipulate either or both to mislead the viewer."}], "id": "q04"}, {"question": "Why are 3D effects generally considered misleading when applied to charts like pie charts or bar charts?", "options": [{"text": "They add too much visual clutter, making the data points harder to read.", "isCorrect": false, "rationale": "While visual clutter can be an issue, the primary reason 3D effects are misleading is the optical illusion they create, not just clutter."}, {"text": "They create an optical illusion where slices or bars in the foreground appear larger than those in the background, distorting true proportions.", "isCorrect": true, "rationale": "3D effects introduce perspective depth, which makes elements closer to the viewer (in the 'foreground') appear larger than those further away (in the 'background'), even if their actual data values are the same or smaller."}, {"text": "They prevent the use of accurate color scales for data representation.", "isCorrect": false, "rationale": "3D distortion is about perspective, not color scale issues, which is a separate misleading technique."}, {"text": "They are only useful for displaying geographical data, not statistical comparisons.", "isCorrect": false, "rationale": "3D charts can be used for various data types, but the issue of distortion remains regardless of the data type."}], "id": "q05"}, {"question": "A time-series chart shows fluctuations in a company's quarterly sales. However, the x-axis has labels for 'Q1 2020,' 'Q2 2020,' 'Q4 2020,' 'Q1 2021,' and 'Q3 2021.' What misleading technique is present, and what is its effect?", "options": [{"text": "Truncated Y-Axis; it makes the sales fluctuations appear less significant.", "isCorrect": false, "rationale": "The issue is with the x-axis intervals, not the y-axis starting point. A truncated y-axis usually exaggerates differences."}, {"text": "Inconsistent Intervals; it can make lines that look steep represent slower changes, or flat lines represent faster changes than reality.", "isCorrect": true, "rationale": "Uneven spacing between time points on the x-axis (e.g., skipping Q3 2020 and Q2 2021) distorts the visual slope of the line, making changes appear faster or slower than they actually occurred over consistent time periods."}, {"text": "Cherry-Picked Time Range; it omits important historical data for context.", "isCorrect": false, "rationale": "While some quarters are missing, the primary issue is the *unevenness* of the intervals shown, not the overall selection of a specific continuous range."}, {"text": "Missing Context; it doesn't provide the total sales figures.", "isCorrect": false, "rationale": "Missing context refers to absence of comparison points, sources, or baseline data. The problem here is specifically about the x-axis spacing."}], "id": "q06"}, {"question": "A news article headline states, 'Local Crime Rate Drops by 15%!' and features a simple bar chart. What critical piece of information, if missing, would represent a 'Missing Context' misleading technique?", "options": [{"text": "The specific types of crimes included in the statistic.", "isCorrect": false, "rationale": "While potentially useful, the specific types of crimes would be a detail within the context, not the overarching missing context trick itself. The missing context trick focuses on baseline, comparison, or source."}, {"text": "A comparison point, such as the crime rate in previous years or the national average.", "isCorrect": true, "rationale": "Missing context often involves the absence of a comparison point. A 15% drop is only meaningful if you know what it's being compared against (e.g., last year, the average, or a neighboring city) to assess its significance."}, {"text": "The font used for the chart's title.", "isCorrect": false, "rationale": "The font choice is a stylistic element and has no bearing on whether critical data context is present or missing."}, {"text": "A decorative border around the chart.", "isCorrect": false, "rationale": "A decorative border is a visual design element and completely unrelated to the data's context or potential misleading techniques."}], "id": "q07"}, {"question": "Which type of color scale is generally recommended for heatmaps or choropleth maps to accurately represent a progression from low to high values, and why are 'rainbow' color scales often misleading?", "options": [{"text": "Diverging color scales; rainbow scales are misleading because they use too many colors.", "isCorrect": false, "rationale": "Diverging scales are for data with a meaningful midpoint. Rainbow scales are misleading not just for having many colors, but because the human eye doesn't perceive them as a smooth progression, and certain colors (like yellow) stand out disproportionately."}, {"text": "Sequential color scales; rainbow scales are misleading because the human eye does not perceive rainbow colors as a smooth progression, making mid-range values appear extreme.", "isCorrect": true, "rationale": "Sequential color scales (light to dark within one hue) clearly show progression. Rainbow scales are problematic because colors like yellow appear unnaturally bright, causing mid-range data to attract undue attention and seem more significant than they are."}, {"text": "Rainbow color scales; they are the most visually appealing and easy to understand.", "isCorrect": false, "rationale": "The text explicitly states that rainbow color scales are misleading because they are not perceived as a smooth progression and can distort perception."}, {"text": "Grayscale; rainbow scales are too complex for most viewers.", "isCorrect": false, "rationale": "While grayscale can be effective, sequential color scales are generally preferred for showing progression. The issue with rainbow scales isn't complexity but perceptual distortion."}], "id": "q08"}, {"question": "A politician proudly announces, 'Our new policy led to a 50% increase in job creation!' To critically evaluate this claim, what crucial questions should a discerning audience ask, according to the 'Misleading Percentages' trick?", "options": [{"text": "What color was the chart used to display this data?", "isCorrect": false, "rationale": "The color of the chart is a stylistic choice and irrelevant to understanding the base or context of a percentage claim."}, {"text": "What is the base (the starting value) from which the percentage increased, and does this percentage correspond to a meaningful absolute change?", "isCorrect": true, "rationale": "A 50% increase can be dramatic or negligible depending on the base value (e.g., 50% of 2 is 1, 50% of 1,000,000 is 500,000). Understanding the starting point and absolute change is crucial for assessing its true impact."}, {"text": "Was this data collected by a government agency or a private firm?", "isCorrect": false, "rationale": "While the data source is part of 'Missing Context,' the 'Misleading Percentages' trick specifically focuses on understanding the meaning and implications of the percentage itself, particularly its base."}, {"text": "How many other policies were implemented at the same time?", "isCorrect": false, "rationale": "This question addresses causality or confounding factors, which is beyond the scope of how a percentage itself can be misleading, as described in the text's definition."}], "id": "q09"}, {"question": "The text emphasizes that misleading charts do not necessarily contain lies, but rather deceive through their visual design. Which statement best captures the core concept of a misleading chart?", "options": [{"text": "Misleading charts contain entirely fabricated data points designed to trick the viewer.", "isCorrect": false, "rationale": "The text explicitly states that 'every number can be technically accurate while the visual still deceives,' indicating that the data itself is often real, not fabricated."}, {"text": "A misleading chart presents technically accurate data in a visual format that distorts perception and shapes conclusions different from what the raw data would suggest.", "isCorrect": true, "rationale": "This aligns perfectly with the common misconception addressed: the numbers are accurate, but the visual presentation (e.g., truncated axis, 3D effect, cherry-picked data) creates a deceptive impression."}, {"text": "Misleading charts are characterized by poor aesthetic design, making them difficult to read.", "isCorrect": false, "rationale": "While poor aesthetics can hinder readability, a misleading chart specifically manipulates perception of the data, which is distinct from merely being aesthetically unpleasing or hard to read."}, {"text": "Any chart that uses bright colors can be considered misleading.", "isCorrect": false, "rationale": "Bright colors are not inherently misleading, though specific applications like rainbow scales can be. The definition of a misleading chart is much broader than just color choice."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
