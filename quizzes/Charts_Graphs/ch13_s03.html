        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 13, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements accurately distinguishes a network diagram from a flow diagram (Sankey diagram)?", "options": [{"text": "Network diagrams always show quantities flowing in one direction, while flow diagrams show bidirectional connections.", "isCorrect": false, "rationale": "This statement is incorrect. The text explicitly states that Sankey diagrams (flow diagrams) show quantities flowing in one direction, while network diagrams show connections that can be bidirectional and do not show quantity."}, {"text": "Network diagrams visualize connections between objects without necessarily showing quantity or direction, whereas flow diagrams illustrate the quantity and direction of movement between points.", "isCorrect": true, "rationale": "This statement correctly identifies the key difference. Network diagrams focus on relationships and connections, which can be bidirectional, and do not typically show quantity. Flow diagrams (Sankey) are designed to show quantities moving in one specific direction."}, {"text": "The physical distance between nodes in a network diagram carries significant meaning, unlike in flow diagrams.", "isCorrect": false, "rationale": "This statement is incorrect. The text notes that a common misconception is that physical distance between nodes in a network diagram has meaning; usually, position is for readability, not distance. This is not a distinction from flow diagrams."}, {"text": "Flow diagrams use nodes and edges, while network diagrams use only lines and arrows.", "isCorrect": false, "rationale": "This statement is incorrect. Both types of diagrams use elements like nodes (or points) and connections (lines/edges). The core difference lies in what these elements represent and whether quantity and direction are emphasized."}]}, {"question": "In the context of network diagrams, what is the primary significance of a node being identified as a 'hub'?", "options": [{"text": "It indicates that the node is physically located in the center of the diagram for aesthetic purposes.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states that 'position is chosen for readability, not to represent distance' and that a hub's importance is 'regardless of its position on the page'."}, {"text": "It signifies that the node is an isolated element with no connections to other nodes.", "isCorrect": false, "rationale": "This is incorrect. A node with no connections is an 'isolated node,' which is the opposite of a hub."}, {"text": "It means the node has a high 'degree,' indicating a large number of connections and often a central role within the network.", "isCorrect": true, "rationale": "This is correct. The text defines a hub as 'a node with many connections (many edges)' and states that 'a hub has a high degree' and is 'often the most important node'."}, {"text": "It implies that the node represents a quantity or flow rather than a relationship.", "isCorrect": false, "rationale": "This is incorrect. Network diagrams show relationships/connections, not quantities or flows, which are characteristic of Sankey diagrams. The definition of a hub relates to the number of connections."}]}, {"question": "Consider a social media platform where users are nodes and 'following' another user creates a directed edge. If user A follows user B, but user B does not follow user A, how would this relationship be represented and interpreted in a network diagram?", "options": [{"text": "It would be an undirected edge between A and B, indicating a mutual connection.", "isCorrect": false, "rationale": "This is incorrect. An undirected edge signifies a mutual connection where no arrows are present, but the scenario describes a one-way relationship."}, {"text": "It would be an isolated node, as there isn't a reciprocal connection.", "isCorrect": false, "rationale": "This is incorrect. An isolated node has no connections at all. User A still follows user B, which is a connection."}, {"text": "It would be a directed edge with an arrow pointing from User A to User B, showing that A follows B but not vice versa.", "isCorrect": true, "rationale": "This is correct. The text states: 'If the edges have arrows, the connection goes in one direction only (A follows B doesn't mean B follows A). If no arrows, the connection is mutual.' This scenario perfectly describes a directed edge from A to B."}, {"text": "It would be represented by two separate nodes with no edge, as the friendship is not complete.", "isCorrect": false, "rationale": "This is incorrect. Even a one-way 'following' constitutes a connection, which would be represented by an edge."}]}, {"question": "In the provided 'Friendship Network Among 8 Students' example, Alex and Fran are identified as the biggest hubs. What characteristic makes them hubs according to the definition?", "options": [{"text": "Their names start with 'A' and 'F', making them alphabetically central.", "isCorrect": false, "rationale": "This is incorrect. The text's definition of a hub has nothing to do with alphabetical order. It is based on connections."}, {"text": "They are the only students without any 'isolated node' characteristics.", "isCorrect": false, "rationale": "This is incorrect. While true they are not isolated, this is not what defines them as hubs. Other nodes also are not isolated."}, {"text": "Each of them has 3 connections (edges) to other students, which is the highest number in this specific network.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'Biggest hub: Alex and Fran, each with 3 connections,' which aligns with the definition of a hub having many connections or a high degree."}, {"text": "They are positioned at the top and bottom of the diagram, respectively, indicating leadership.", "isCorrect": false, "rationale": "This is incorrect. Node position is generally for readability, not to indicate importance or leadership, as noted in the common misconceptions."}]}, {"question": "An ecologist is mapping a food web where different species are nodes and 'eats' relationships are directed edges. If removing a specific species from the ecosystem causes a widespread collapse of many other species' populations, what concept from network diagrams best describes this critical species?", "options": [{"text": "An isolated node", "isCorrect": false, "rationale": "An isolated node has no connections, meaning its removal would have no impact on others in the network. This is the opposite of the scenario described."}, {"text": "A path", "isCorrect": false, "rationale": "A path is a sequence of connections between two nodes, not a characteristic of a single critical node."}, {"text": "A hub (or keystone species)", "isCorrect": true, "rationale": "The text states: 'Food webs (ecology): Species are nodes; 'eats' relationships are directed edges. Removing a hub species (a keystone species) can collapse the entire network.' This perfectly describes the scenario."}, {"text": "An undirected edge", "isCorrect": false, "rationale": "An undirected edge is a type of connection between two nodes, not a description of a single critical node's role within the network."}]}, {"question": "According to the section, what does the 'degree' of a node in a network diagram signify?", "options": [{"text": "Its physical distance from the center of the diagram.", "isCorrect": false, "rationale": "The text explicitly states that physical distance in a network diagram typically has no meaning; position is for readability."}, {"text": "The number of edges (connections) attached to that node.", "isCorrect": true, "rationale": "This is correct. The text defines 'Degree' as 'The number of edges connected to a node.' It further explains that 'A hub has a high degree; an isolated node has degree 0.'"}, {"text": "The number of other nodes it can reach through any path.", "isCorrect": false, "rationale": "While related to connectivity, 'degree' specifically refers to direct connections, not all reachable nodes, which would be a measure of centrality or reachability."}, {"text": "Whether the node is part of a cluster or isolated.", "isCorrect": false, "rationale": "Degree helps determine if a node is part of a cluster or isolated, but 'degree' itself is the numerical count of connections, not the classification."}]}, {"question": "When first approaching a new network diagram, what is the most crucial initial step to understanding its purpose and content?", "options": [{"text": "Immediately identifying all isolated nodes to assess data completeness.", "isCorrect": false, "rationale": "While an important step, it is not the *most crucial initial* step. One needs to know what the nodes represent first."}, {"text": "Counting the total number of edges in the diagram.", "isCorrect": false, "rationale": "Counting edges is a useful step but comes after understanding what the nodes and edges actually represent."}, {"text": "Reading the title to understand what the nodes and edges represent.", "isCorrect": true, "rationale": "This is the correct answer. The 'How To Read A Network Diagram' section lists 'Read the title. What do the nodes represent? What do the edges represent?' as the very first step, as this context is fundamental to all further analysis."}, {"text": "Determining if all edges are directed or undirected.", "isCorrect": false, "rationale": "This is an important analytical step, but it relies on first understanding what the connections (edges) themselves signify, which is learned from the title and legends."}]}, {"question": "The concept of 'six degrees of separation' in social science, which suggests any two people are connected through at most 6 friendship links, is an example of studying what key concept in network diagrams?", "options": [{"text": "Node degree", "isCorrect": false, "rationale": "Node degree refers to the number of direct connections a single node has, not the length of a connection path between two distant nodes."}, {"text": "Hub identification", "isCorrect": false, "rationale": "Hub identification focuses on nodes with many connections, not on the sequence of connections between any two arbitrary nodes."}, {"text": "Path", "isCorrect": true, "rationale": "This is correct. The text defines 'Path' as 'A route through the network from one node to another, following edges' and then immediately gives the 'six degrees of separation' as an example of social scientists studying paths."}, {"text": "Isolated nodes", "isCorrect": false, "rationale": "Isolated nodes have no connections, which is irrelevant to finding a connection route between two people."}]}, {"question": "Which of the following real-world examples primarily utilizes a network diagram to understand how influence or communication spreads through a population?", "options": [{"text": "A physical map showing the elevation changes across a mountain range.", "isCorrect": false, "rationale": "This describes a topographical map, not a network diagram, and focuses on physical attributes rather than connections or spread of influence."}, {"text": "An airline route map where airports are nodes and flights are edges, and major airports are hubs.", "isCorrect": false, "rationale": "While a valid network diagram application, this primarily illustrates transportation routes and connectivity for travel, not the spread of influence or communication through a *population* in the way disease or social media would."}, {"text": "A graph tracking changes in stock prices over a year.", "isCorrect": false, "rationale": "This describes a time-series graph, not a network diagram, and focuses on financial trends, not connections between entities in a population."}, {"text": "Epidemiological models of disease spread during the COVID-19 pandemic.", "isCorrect": true, "rationale": "This is correct. The text states: 'Disease spread (epidemiology): In the COVID-19 pandemic, scientists modeled how people connected to each other to predict how a virus would spread through a population.' This directly relates to understanding how something (a virus) spreads via connections within a population."}]}, {"question": "The Friendship Network example shows Alex, Blake, Casey, and Dana forming a 'tight cluster.' What does this 'cluster' suggest about their relationships within the broader group of eight students?", "options": [{"text": "They are the only students with any connections in the entire network.", "isCorrect": false, "rationale": "This is incorrect. The example clearly shows other students like Ellis, Fran, Gray, and Hana also have connections."}, {"text": "They represent an 'isolated node' within the network.", "isCorrect": false, "rationale": "This is incorrect. An isolated node has no connections. A cluster implies strong internal connections."}, {"text": "They are highly connected to each other but less connected to the rest of the students in the dataset.", "isCorrect": true, "rationale": "This is correct. The 'How to Read' section explains: 'Look for clusters. Are there groups of nodes that are highly connected to each other but not to the rest? (In social networks, these are cliques or friend groups.)' The example demonstrates this by stating 'all four are connected to each other directly or through one step' and implies their relative strong ties compared to students outside this group."}, {"text": "Their connections are all directed, showing a clear hierarchy.", "isCorrect": false, "rationale": "This is incorrect. The example describes friendships, which are typically undirected. Clusters don't inherently imply directed edges or hierarchy in this context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
