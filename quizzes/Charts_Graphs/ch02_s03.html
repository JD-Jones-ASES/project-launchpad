<script>
var QUESTIONS = [{"question": "In a pictograph, if a 2D symbol representing a value is doubled in height while maintaining its original proportions, how does its apparent size (area) change?", "options": [{"text": "It doubles, accurately reflecting the value change.", "isCorrect": false, "rationale": "This is a common misconception. When a 2D symbol's height is doubled and its proportions are maintained, its width also doubles. The area is then calculated as (2x height) * (2x width) = 4x the original area."}, {"text": "It quadruples, making the difference appear much larger.", "isCorrect": true, "rationale": "As explained in 'The Area Problem,' doubling both the height and width of a 2D picture results in an area that is four times larger. This causes the viewer's brain to perceive a difference that is four times bigger than the actual value change."}, {"text": "It triples, confusing the viewer about the actual ratio.", "isCorrect": false, "rationale": "While the visual deception is significant, the geometric change in area when dimensions are doubled is not a triple; it's a quadruple."}, {"text": "It remains the same, as height alone doesn't affect perceived size.", "isCorrect": false, "rationale": "This is incorrect. Changing the height while maintaining proportions directly impacts the area, and therefore the perceived size of the icon."}]}, {"question": "A company wants to visually represent that their product sales increased by 50% from Q1 to Q2. If they were to create a *misleading* pictograph using a single icon for each quarter, what visual deception would most likely occur if the Q2 icon was scaled up to represent the 1.5x increase in sales?", "options": [{"text": "The Q2 icon would appear exactly 1.5 times larger in area than the Q1 icon.", "isCorrect": false, "rationale": "If the icon's area accurately reflected the 1.5x increase, it would not be a misleading pictograph via area distortion. This would be an honest visual representation if areas directly mapped to values, but the text warns against scaling single icons this way."}, {"text": "The Q2 icon would appear more than twice as large in area, exaggerating the 50% increase.", "isCorrect": true, "rationale": "An actual 50% increase means the value is 1.5 times the original. If a single icon's height (and thus width) is scaled by 1.5, its area becomes 1.5 * 1.5 = 2.25 times the original. Since the viewer's brain reads area, the icon would look 2.25 times larger, significantly exaggerating the actual 1.5 times increase in sales (2.25 is 'more than twice' 1.5)."}, {"text": "The Q2 icon would appear only slightly larger than Q1, making the increase seem insignificant.", "isCorrect": false, "rationale": "Area distortion typically exaggerates differences, making them appear larger, not smaller or insignificant, unless the scaling is done in a very specific, unintuitive way to minimize impact."}, {"text": "The Q1 icon would seem to shrink in comparison, despite no actual change.", "isCorrect": false, "rationale": "The deception comes from scaling the 'new' value icon, not from changing the 'old' value icon. The perception of shrinkage for Q1 is not the primary mechanism of this specific distortion."}]}, {"question": "The text explains that 'Your brain reads the area of the image, not just its height.' Based on this, why is doubling a pictograph icon's height (and width) to represent a doubled value considered deceptive?", "options": [{"text": "Because our eyes are naturally drawn to the tallest objects, regardless of their other dimensions.", "isCorrect": false, "rationale": "While height can draw attention, the text specifically states the brain reads the *area*, not just height, as the primary source of deception."}, {"text": "Because the increased height makes the icon appear less detailed, suggesting a lower quality.", "isCorrect": false, "rationale": "The level of detail is not the cause of the deception described; the visual magnitude perceived from the area is."}, {"text": "Because the human perception of magnitude is primarily influenced by the overall visual footprint, causing a quadruple area to be interpreted as significantly more than double the value.", "isCorrect": true, "rationale": "The text explicitly states the brain reads the 'area of the image.' When the area quadruples while the actual value only doubles, the viewer's perception of the difference is greatly exaggerated, leading to deception."}, {"text": "Because doubling the height makes the icon disproportionate, which viewers instinctively dislike.", "isCorrect": false, "rationale": "The text specifies 'When you double the height of a picture and keep it in proportion (same shape), the width doubles too.' The deception occurs precisely because it maintains proportion while scaling, not because it becomes disproportionate."}]}, {"question": "According to the text, what is 'Area Distortion' in a pictograph?", "options": [{"text": "It's when a 3D icon is used, making it impossible to accurately measure its dimensions.", "isCorrect": false, "rationale": "This describes a related issue (3D icons are even more misleading) but is not the definition of 'Area Distortion' for 2D symbols."}, {"text": "It's when symbol sizes are scaled up to show larger values, but the viewer's brain interprets the exaggerated area, leading to an overestimation of differences.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Area distortion occurs in a pictograph when symbol sizes are scaled up to show larger values. Doubling a symbol's height (and width) quadruples its area, making the difference look four times bigger than it really is. This misleads viewers into overestimating differences.'"}, {"text": "It's the visual effect of using too many symbols in a row, making the chart cluttered and hard to read.", "isCorrect": false, "rationale": "While clutter can be a problem, it's not the definition of area distortion. Area distortion specifically refers to scaling individual symbol sizes."}, {"text": "It's when the symbols in a pictograph are not consistent across different categories, causing confusion.", "isCorrect": false, "rationale": "This describes 'Inconsistent symbols,' which is another pictograph trick, but not 'Area Distortion.'"}]}, {"question": "A company wants to honestly show that their sales increased from 100 units in January to 200 units in February. Following the principles of an honest pictograph, how should they represent this data?", "options": [{"text": "By drawing one large phone icon for February that is twice as tall as January's icon.", "isCorrect": false, "rationale": "This is the specific example of a misleading pictograph discussed in the text, as doubling the height (and width) quadruples the area, exaggerating the actual doubling of sales."}, {"text": "By using a key where 1 icon equals 25 units, then showing 4 equal-sized icons for January and 8 equal-sized icons for February.", "isCorrect": true, "rationale": "The text explicitly states that for an honest pictograph, 'The only thing that should vary in a proper pictograph is the number of symbols per row, not the size of the symbols.' This option correctly applies that principle using a consistent key and varying the number of identical symbols."}, {"text": "By using a 3D phone icon for February and a 2D icon for January to highlight the growth.", "isCorrect": false, "rationale": "Using 3D icons is mentioned as 'even more misleading' than 2D area distortion, and using different types of symbols for comparison is 'inconsistent symbols,' both being deceptive practices."}, {"text": "By showing a half icon for January and a full icon for February.", "isCorrect": false, "rationale": "While potentially used to show ratios, the text warns about 'misleading half symbols' and the principle is to use multiple full, equal-sized symbols for clarity and honesty."}]}, {"question": "The text mentions '3D icons' as another pictograph trick. If a 3D object representing a value is doubled in height, width, and depth, how does its apparent size (volume) change relative to the original?", "options": [{"text": "It doubles, similar to a 2D object's height.", "isCorrect": false, "rationale": "This is incorrect. Doubling one dimension does not reflect the total volume change. This is a common misconception that the text warns against."}, {"text": "It quadruples, similar to a 2D object's area.", "isCorrect": false, "rationale": "Quadrupling applies to the area of a 2D object when height and width are doubled. For a 3D object, the calculation is different."}, {"text": "It octuples (becomes eight times larger), making the deception even more pronounced.", "isCorrect": true, "rationale": "The text states: 'A 3D object doubled in size is eight times the volume (height × width × depth all double).' This means 2 × 2 × 2 = 8 times the original volume."}, {"text": "It becomes impossible to accurately perceive its size due to the lack of perspective.", "isCorrect": false, "rationale": "While perspective can be challenging, the core issue with 3D icons is the geometric increase in volume (8x) when dimensions are doubled, which is a measurable distortion, not merely an impossibility of perception."}]}, {"question": "A student is evaluating a news infographic. They see a pictograph illustrating economic growth, where a moneybag icon for 'current year' is noticeably larger than the moneybag icon for 'previous year.' Based on the provided text, what should be the student's immediate suspicion?", "options": [{"text": "The chart is likely missing a source or scale information.", "isCorrect": false, "rationale": "While checking source and scale is good practice (as mentioned in Critical Thinking), the immediate suspicion based *specifically* on different-sized icons is related to distortion, not just missing information."}, {"text": "The icons are inconsistent, making fair comparison impossible.", "isCorrect": false, "rationale": "Inconsistent icons refer to using different *types* of symbols in different rows for the same category. Here, it's the *same* symbol type but *different sizes*, which points to area distortion."}, {"text": "The chart may be intentionally distorting the data by using area or volume to exaggerate differences, rather than varying the number of symbols.", "isCorrect": true, "rationale": "The text clearly states, 'Whenever you see a pictograph where the icons are different sizes, be suspicious.' This is the primary visual cue for area (or volume) distortion, where the larger icon exaggerates the true difference in value."}, {"text": "The infographic is probably using half symbols incorrectly, leading to misinterpretation.", "isCorrect": false, "rationale": "Misleading half symbols refer to how partial values are represented (e.g., cutting vertically vs. horizontally). The direct issue here is the difference in overall icon size."}]}, {"question": "The 'Critical Thinking' note asks, 'Why might someone want to make a chart misleading?' Based on the examples and context in the section, which scenario best illustrates a common motive for creating a misleading pictograph?", "options": [{"text": "A scientific researcher presenting data to peers for academic review, aiming for absolute precision.", "isCorrect": false, "rationale": "Scientific research typically prioritizes accuracy and honesty, making intentional deception highly unlikely and unethical in this context."}, {"text": "A government agency providing transparent public health statistics to inform policy decisions.", "isCorrect": false, "rationale": "Government agencies are generally expected to provide clear and honest data for public understanding and policy-making, not to mislead."}, {"text": "An advertising firm creating a campaign to show their client's product has significantly outperformed competitors, even if the actual difference is modest.", "isCorrect": true, "rationale": "The 'Critical Thinking' note explicitly mentions 'advertising' and 'political persuasion' as motives for making a chart misleading. An advertising firm would have a strong incentive to exaggerate positive results to sway public opinion or drive sales, fitting the description of using visual deception to make modest differences appear significant."}, {"text": "An educator designing a clear visual aid to help students understand complex historical trends.", "isCorrect": false, "rationale": "An educator's goal is to clarify and inform, not to deceive or misrepresent data to students."}]}, {"question": "Otto Neurath, who developed the ISOTYPE system, is highlighted for his fundamental rule for honest pictographs. What was this rule?", "options": [{"text": "Always use the most visually appealing and detailed icons to engage the audience.", "isCorrect": false, "rationale": "While ISOTYPE used simple icons, the primary rule was about honesty and clarity through consistent size, not necessarily aesthetic appeal above all else."}, {"text": "To show more, always use more symbols of the same size, never a bigger symbol.", "isCorrect": true, "rationale": "The text states Neurath's 'key rule: always change the number of symbols, never their size.' This is reiterated in the 'Honest Pictograph Rule' quick tip."}, {"text": "Ensure all pictographs are three-dimensional to provide a sense of depth and realism.", "isCorrect": false, "rationale": "This is incorrect; 3D icons are specifically identified as 'even more misleading' than 2D ones, directly contradicting Neurath's principle of honesty."}, {"text": "Only use pictographs for data that involves simple comparisons, avoiding complex statistics.", "isCorrect": false, "rationale": "Neurath's ISOTYPE aimed to make *all* statistics, including complex ones, accessible to the general public through clear, icon-based charts."}]}, {"question": "The section lists several 'Other Pictograph Tricks' besides area distortion. Which of the following visual choices, if found in a pictograph, would *not* be considered one of these specific additional deceptive practices outlined in the text?", "options": [{"text": "A missing key that leaves the reader unable to determine the value each symbol represents.", "isCorrect": false, "rationale": "The text lists 'Missing key' as one of the tricks, stating it makes the chart 'unreadable at best, deceptive at worst.'"}, {"text": "Using distinct, appropriately chosen symbols (e.g., a car icon for car sales, a truck icon for truck sales) to represent different, non-comparable categories within the same chart.", "isCorrect": true, "rationale": "This is a standard and acceptable practice in pictographs to differentiate distinct categories. The text's 'Inconsistent symbols' trick refers to using different symbols *within* a comparison or for the *same* category in different rows, making fair comparison impossible, not simply using different symbols for genuinely different categories."}, {"text": "Employing 3D icons where doubling the dimensions leads to an eight-fold increase in perceived volume.", "isCorrect": false, "rationale": "The text explicitly lists '3D icons' as a misleading trick, noting their volume distortion exaggerates differences significantly."}, {"text": "Representing a half-value by cutting a symbol horizontally in one instance and vertically in another, leading to visual confusion.", "isCorrect": false, "rationale": "The text identifies 'Misleading half symbols' as a trick, specifically mentioning that a symbol cut horizontally 'looks different from one cut vertically,' confusing readers."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
