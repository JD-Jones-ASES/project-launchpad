    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, why are line graphs particularly powerful and thus easily misused for deception?", "options": [{"text": "Their complex algorithms make them difficult for the average person to understand.", "isCorrect": false, "rationale": "The text does not suggest line graphs use complex algorithms, but rather their visual simplicity can be deceiving. The power lies in our natural trust, not complexity."}, {"text": "People naturally trust the visual shape of a line to convey accurate information.", "isCorrect": true, "rationale": "The text explicitly states: 'Because we naturally trust the shape of a line to tell us something true, it is especially easy to fool someone with a line graph.'"}, {"text": "They are the only graph type capable of displaying time-series data.", "isCorrect": false, "rationale": "While line graphs are excellent for time-series data, other graph types can also display it. This is not the reason for their susceptibility to misuse mentioned in the text."}, {"text": "They always require dual y-axes, which inherently causes confusion.", "isCorrect": false, "rationale": "Line graphs do not always require dual y-axes, and the dual-axis is just one of the four tricks discussed, not the fundamental reason for their general misuse."}], "id": "q01"}, {"question": "What is the primary effect of using a 'Truncated Y-Axis' in a line graph?", "options": [{"text": "It hides the overall trend of the data, making it appear flat.", "isCorrect": false, "rationale": "A truncated y-axis typically exaggerates trends, making them appear steeper or more dramatic, rather than hiding them."}, {"text": "It makes small changes or differences in the data appear significantly more dramatic.", "isCorrect": true, "rationale": "The text states: 'When you chop off the bottom of the scale, small differences in the data can look enormous' and 'This can make small changes look dramatic.'"}, {"text": "It causes the intervals on the x-axis to become uneven, distorting the slope.", "isCorrect": false, "rationale": "This describes the 'Inconsistent Time Intervals' trick, not the truncated y-axis."}, {"text": "It allows for the comparison of two entirely unrelated variables on the same chart.", "isCorrect": false, "rationale": "This describes the 'Dual-Axis Deception' trick, not the truncated y-axis."}], "id": "q02"}, {"question": "A financial report displays a graph of a company's stock price, which increased from $100.50 to $101.50 over a month. The graph's y-axis starts at $100.00 and shows a very steep upward climb. Which trick is most likely being used, and what is its intention?", "options": [{"text": "Cherry-picking; to only show the most favorable period of stock growth.", "isCorrect": false, "rationale": "While cherry-picking might be a factor in selecting the time range, the primary deceptive element described (y-axis starting at $100.00 showing a steep climb for a small price increase) points to a different trick."}, {"text": "Inconsistent time intervals; to compress the timeframe of slow growth.", "isCorrect": false, "rationale": "The description focuses on the y-axis scale, not uneven time intervals on the x-axis."}, {"text": "Truncated y-axis; to exaggerate a relatively small 1% increase into a dramatic surge.", "isCorrect": true, "rationale": "By starting the y-axis close to the data's minimum value, the $1.00 increase (approximately 1% of the initial value) appears much larger and more significant than it is when viewed in the context of a y-axis starting at zero. This perfectly matches the definition and example of a truncated y-axis."}, {"text": "Dual-axis deception; to correlate stock price with another unrelated metric.", "isCorrect": false, "rationale": "The problem describes a single data series and a single y-axis, not two axes or implied correlation between different variables."}], "id": "q03"}, {"question": "When evaluating a line graph, you notice that the x-axis labels jump from 'January 2022' to 'March 2022,' then to 'July 2022,' and finally to 'Annual 2023.' What misleading technique does this most strongly suggest?", "options": [{"text": "Truncated y-axis.", "isCorrect": false, "rationale": "A truncated y-axis relates to the starting point of the vertical axis, not the spacing of the horizontal axis."}, {"text": "Dual-axis deception.", "isCorrect": false, "rationale": "Dual-axis deception involves two separate y-axes to imply false correlations, which is not suggested by the x-axis intervals."}, {"text": "Inconsistent time intervals.", "isCorrect": true, "rationale": "The text explicitly warns: 'If the gaps between years, months, or days are uneven, the slope of the line is misleading.' The given scenario clearly shows uneven gaps (2 months, then 4 months, then annual data)."}, {"text": "Cherry-picked time ranges.", "isCorrect": false, "rationale": "While cherry-picking might occur by selecting certain periods, the core issue described here is the *unevenness* of the intervals, which distorts the visual slope regardless of the specific range chosen."}], "id": "q04"}, {"question": "A politician shares a line graph showing a decrease in crime rates over their last three years in office, making it appear as if their policies were highly effective. However, the graph starts exactly when a major national initiative against crime began, and omits the previous five years when crime rates were rising significantly. Which misleading technique is the politician most clearly employing?", "options": [{"text": "Inconsistent time intervals.", "isCorrect": false, "rationale": "The problem describes selecting a specific, favorable period, not uneven spacing of time units within the displayed period."}, {"text": "Truncated y-axis.", "isCorrect": false, "rationale": "The deception relates to the *range of time* shown, not the starting point of the vertical axis."}, {"text": "Cherry-picked time ranges.", "isCorrect": true, "rationale": "The definition of cherry-picking is 'selecting only the data points or time period that support a particular conclusion, while leaving out data that would tell a different story.' This scenario perfectly fits that definition."}, {"text": "Dual-axis deception.", "isCorrect": false, "rationale": "There is no mention of two y-axes or an implied false correlation with another variable."}], "id": "q05"}, {"question": "What is a key characteristic of a 'Dual-Axis Chart' that makes it prone to deception?", "options": [{"text": "It always truncates one of its y-axes, making it misleading by default.", "isCorrect": false, "rationale": "While a dual-axis chart *could* have a truncated axis, truncation is not an inherent or defining characteristic of a dual-axis chart's deception. Its danger lies in scale manipulation."}, {"text": "It displays two different data series using two independent y-axes, which can be manipulated to imply a false correlation.", "isCorrect": true, "rationale": "The text states: 'by adjusting the two y-axis scales independently, a chart maker can make any two lines appear to move perfectly together — even if the real relationship is weak or non-existent.'"}, {"text": "It combines monthly and annual data on the x-axis, distorting time perception.", "isCorrect": false, "rationale": "This describes inconsistent time intervals, which is unrelated to the defining characteristic of a dual-axis chart."}, {"text": "It only shows a selected subset of time, omitting important historical data.", "isCorrect": false, "rationale": "This describes cherry-picking, not the specific deceptive characteristic of a dual-axis chart."}], "id": "q06"}, {"question": "A real estate agent presents a graph showing that average house prices (left y-axis) have risen in perfect synchronicity with local interest rates (right y-axis) over the last year. The lines on the graph visually overlap almost exactly. What critical step should a cautious observer take to detect potential deception?", "options": [{"text": "Check if the x-axis has consistent time intervals, such as monthly or quarterly.", "isCorrect": false, "rationale": "While good practice, this addresses 'inconsistent time intervals' rather than the specific danger of a dual-axis chart implying false correlation."}, {"text": "Determine if the left y-axis begins at zero.", "isCorrect": false, "rationale": "This addresses a 'truncated y-axis,' which is a separate trick and not the primary concern for a dual-axis chart showing perfect overlap."}, {"text": "Carefully examine the units and scales on both y-axes to see if they were chosen to force the visual alignment of the lines.", "isCorrect": true, "rationale": "The text advises: 'Check the units and scales on each axis separately. Ask: “If I plotted each line on its own graph, would I still see the same relationship?”' This directly addresses how a dual-axis chart can be manipulated."}, {"text": "Ask to see the data for other cities to compare market trends.", "isCorrect": false, "rationale": "While comparing to other cities could offer context, it doesn't directly address the potential manipulation of the *scales* within the presented dual-axis graph."}], "id": "q07"}, {"question": "The textbook mentions that a y-axis not starting at zero (truncation) isn't always wrong. In which scenario would a truncated y-axis be considered appropriate and not misleading?", "options": [{"text": "When the goal is to make a small change look as significant as possible.", "isCorrect": false, "rationale": "This is precisely the misleading intent of truncation, making it inappropriate."}, {"text": "When comparing two entirely different data sets on the same graph.", "isCorrect": false, "rationale": "This relates to dual-axis charts, not the appropriateness of a truncated single y-axis."}, {"text": "When focusing on subtle variations within a narrow, high range of data where the absolute zero point is irrelevant for the analysis, such as monitoring slight temperature fluctuations.", "isCorrect": true, "rationale": "The text provides this exact example: 'In fact, truncation is sometimes appropriate (e.g., tracking body temperature between 97 and 103$^$F). The key question is whether the truncation creates a false impression.'"}, {"text": "When simplifying the graph for an audience with limited mathematical understanding.", "isCorrect": false, "rationale": "Simplification by truncation can often lead to misinterpretation, rather than improved understanding, especially if it distorts the perception of change."}], "id": "q08"}, {"question": "To correct a line graph that uses inconsistent time intervals, what is the most effective approach for ensuring an honest representation?", "options": [{"text": "Start the y-axis at zero to provide proper context for the data.", "isCorrect": false, "rationale": "Starting the y-axis at zero corrects a 'truncated y-axis' but does not address inconsistent time intervals."}, {"text": "Ensure that all intervals on the x-axis are evenly spaced and represent consistent durations.", "isCorrect": true, "rationale": "The text states: 'A line graph should have evenly spaced intervals on the x-axis. If the intervals are uneven, the slope of the line will be distorted...' Therefore, correcting this distortion requires making the intervals consistent."}, {"text": "Add a second y-axis to clarify the relationship between time and the data.", "isCorrect": false, "rationale": "Adding a second y-axis (dual-axis) is a different technique and could introduce its own forms of deception if not handled carefully. It doesn't solve inconsistent time intervals."}, {"text": "Only display annual data, as monthly or quarterly data is too volatile.", "isCorrect": false, "rationale": "While changing the frequency of data might be part of a solution, simply showing annual data doesn't guarantee consistency or honesty if the annual data itself is cherry-picked or still contains uneven intervals between annual points."}], "id": "q09"}, {"question": "Which of the following scenarios best demonstrates a line graph using the 'cherry-picked time ranges' trick?", "options": [{"text": "A graph showing global temperature changes with a y-axis that starts at 14 degrees Celsius, making small fluctuations appear extreme.", "isCorrect": false, "rationale": "This describes a 'truncated y-axis,' as the deception comes from the y-axis starting point, not the selection of the time range."}, {"text": "A graph comparing unemployment rates with GDP growth, where the two lines perfectly overlap due to scale adjustments on the dual y-axes.", "isCorrect": false, "rationale": "This describes the 'dual-axis deception,' which aims to imply a false correlation between two variables."}, {"text": "A graph of a stock's performance that only shows its growth during a bull market, intentionally omitting its significant decline during a prior bear market.", "isCorrect": true, "rationale": "Cherry-picking involves 'selecting only the data points or time period that support a particular conclusion, while leaving out data that would tell a different story.' Showing only the 'good years' while omitting the 'bad years' is a classic example."}, {"text": "A graph plotting daily sales figures for the first week of the month, then weekly averages for the rest of the month, then a single annual sum for the year.", "isCorrect": false, "rationale": "This scenario primarily describes 'inconsistent time intervals' due to the varied aggregation periods within the x-axis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
