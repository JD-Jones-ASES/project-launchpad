<script>
var QUESTIONS = [{"question": "If a bubble chart is designed using radius scaling, and the underlying data value doubles, how much larger will the bubble *appear* in terms of its area?", "options": [{"text": "2 times larger", "isCorrect": false, "rationale": "If the radius doubles, the area increases by the square of the ratio, not the ratio itself. So, it won't just appear 2 times larger."}, {"text": "4 times larger", "isCorrect": true, "rationale": "When radius is scaled proportionally to the data value, the area grows by the square of that ratio. If the data value doubles, the radius doubles (2r), and the area becomes (2r)^2 = 4r^2, appearing four times larger."}, {"text": "8 times larger", "isCorrect": false, "rationale": "The area increases by the square of the radius scaling, not the cube. Doubling the radius results in a 4x increase in area, not 8x."}, {"text": "16 times larger", "isCorrect": false, "rationale": "16 times larger would occur if the data value (and thus radius) increased by a factor of 4, as 4^2 = 16. For a doubled data value, it's 4 times larger."}], "id": "q01"}, {"question": "The primary reason radius scaling in bubble charts is considered misleading is that:", "options": [{"text": "It makes the chart difficult to read in black and white due to loss of contrast.", "isCorrect": false, "rationale": "While contrast can be an issue in any chart, the core problem with radius scaling isn't related to black and white readability but how magnitudes are perceived."}, {"text": "Human perception primarily interprets the *area* of a circle, not its radius, to represent magnitude, leading to exaggerated differences.", "isCorrect": true, "rationale": "The text states, 'The key insight: we perceive area, not radius, when we look at circles.' When radius is scaled by value, the area (which we perceive) grows quadratically, making differences look far bigger."}, {"text": "It requires complex calculations for the chart creator, leading to frequent errors.", "isCorrect": false, "rationale": "While calculation errors are possible in any chart creation, the fundamental misleading nature of radius scaling is due to perception, not calculation difficulty for the creator."}, {"text": "It only works for very large datasets and becomes inaccurate for small ones.", "isCorrect": false, "rationale": "Radius scaling is misleading regardless of dataset size; its inaccuracy stems from the perceptual mismatch, not data volume."}], "id": "q02"}, {"question": "A bubble chart uses radius scaling to represent data. If Country A has a population of 200 million and Country B has a population of 800 million, how much larger will Country B's bubble *appear* in area compared to Country A's?", "options": [{"text": "4 times larger", "isCorrect": false, "rationale": "Country B's population is 4 times Country A's. If area were scaled correctly, it would appear 4 times larger. However, with radius scaling, the perceived area difference is squared."}, {"text": "8 times larger", "isCorrect": false, "rationale": "This calculation is incorrect for the relationship between radius scaling and perceived area."}, {"text": "16 times larger", "isCorrect": true, "rationale": "Country B's population (800M) is 4 times Country A's (200M). If the radius is scaled proportionally to the data value, Country B's radius will be 4 times larger. Since area grows with the square of the radius (r^2), Country B's bubble will appear 4^2 = 16 times larger in area."}, {"text": "64 times larger", "isCorrect": false, "rationale": "This would imply a radius scaling of 8x (since 8^2=64), but the population ratio is only 4x."}], "id": "q03"}, {"question": "Which of the following describes the correct approach for scaling bubbles in a bubble chart to accurately represent data values?", "options": [{"text": "Set the bubble radius proportional to the data value.", "isCorrect": false, "rationale": "This is the 'radius scaling trap' and is misleading because our perception of area exaggerates the differences."}, {"text": "Set the bubble diameter proportional to the square root of the data value.", "isCorrect": false, "rationale": "While the square root is involved, it's the area that should be proportional to the data, making the radius (and thus diameter) proportional to the square root of the data value."}, {"text": "Set the bubble area proportional to the data value, meaning the radius is proportional to the square root of the data value.", "isCorrect": true, "rationale": "As defined in the text, 'Area scaling means setting bubble areas proportional to the data values, which is the correct approach. Because the area of a circle equals r², the radius should be proportional to the square root of the data value.'"}, {"text": "Set the bubble circumference proportional to the data value.", "isCorrect": false, "rationale": "Circumference scaling is not the standard or recommended method for accurate data representation in bubble charts, and it would not align with human perception of area."}], "id": "q04"}, {"question": "You encounter a bubble chart with a legend that states, 'Bubble size indicates value based on radius.' Based on the provided text, what can you conclude about this chart?", "options": [{"text": "The chart is correctly designed for visual accuracy, as radius is a direct measure of size.", "isCorrect": false, "rationale": "The text clearly states that if a chart scales the radius directly by value, 'the chart is misleading' because area perception exaggerates the differences."}, {"text": "The chart accurately represents smaller differences but exaggerates larger ones.", "isCorrect": false, "rationale": "Radius scaling exaggerates all differences proportionally to the square of the ratio, not just larger ones, making the chart generally misleading."}, {"text": "The chart is likely misleading because differences in values will appear exaggerated due to radius scaling.", "isCorrect": true, "rationale": "The 'watchout' section explicitly states, 'If it says “bubble radius” or just scales the radius directly by value, the chart is misleading,' as the area (what we perceive) grows by the square of the radius ratio."}, {"text": "The chart is only misleading if the values are very close together, as small differences are harder to discern.", "isCorrect": false, "rationale": "The misleading nature of radius scaling is due to the quadratic relationship between radius and area, which affects all data ranges, not just closely spaced values."}], "id": "q05"}, {"question": "Which of the following is NOT listed as a problem with using a rainbow (jet) color scale in heatmaps?", "options": [{"text": "Uneven brightness changes, creating false visual boundaries in smooth data.", "isCorrect": false, "rationale": "This is explicitly listed as a problem: 'Uneven brightness changes: Yellow is much brighter than blue or red. Our eyes perceive a sharp boundary... even when the data changes smoothly.'"}, {"text": "Difficulty for individuals with color blindness to distinguish certain data points.", "isCorrect": false, "rationale": "This is explicitly listed as a problem: 'Colorblind unfriendly: About 8% of males cannot distinguish red from green. A rainbow scale... is unreadable for these viewers.'"}, {"text": "It makes the heatmap incompatible with most modern software tools.", "isCorrect": true, "rationale": "The text states that 'many software tools default to a rainbow scale,' indicating compatibility, not incompatibility. This is therefore NOT a listed problem."}, {"text": "Creation of false patterns or 'cliffs' in data that changes smoothly.", "isCorrect": false, "rationale": "This is explicitly listed as a problem: 'False patterns: The brightness variations create the illusion of sudden jumps or boundaries in the data that do not actually exist.'"}], "id": "q06"}, {"question": "A data analyst wants to create a heatmap for a report. Which color scale characteristic would indicate the *most effective* and accurate representation of sequential data?", "options": [{"text": "A scale that transitions through multiple bright, distinct colors like blue-green-yellow-red.", "isCorrect": false, "rationale": "This describes a rainbow scale, which the text identifies as problematic due to uneven brightness changes and creating false patterns."}, {"text": "A scale where lighter shades represent lower values and darker shades represent higher values, using a single color hue.", "isCorrect": true, "rationale": "The 'quicktip' for a good heatmap color scale states it 'Uses one color that gets darker as values increase (e.g., white -> light blue -> dark blue)' and 'Is readable in black and white (lighter = lower, darker = higher).'"}, {"text": "A scale that uses random colors for each data range to ensure maximum contrast.", "isCorrect": false, "rationale": "Random colors would introduce visual noise and make it impossible to interpret the underlying sequential data effectively."}, {"text": "A scale that is designed to look aesthetically pleasing, regardless of its perceived brightness changes.", "isCorrect": false, "rationale": "Aesthetics should not override accuracy and clear interpretation; uneven brightness changes are a major problem for accurate perception of data."}], "id": "q07"}, {"question": "A user observes a heatmap where certain cells are blank. They assume these cells represent a value of zero. According to the text, why might this assumption be problematic?", "options": [{"text": "Blank cells always indicate an error in the data collection process that invalidates the entire heatmap.", "isCorrect": false, "rationale": "While errors can occur, blank cells often genuinely represent missing data, not necessarily a systemic error invalidating the whole chart. The problem is misinterpreting their meaning."}, {"text": "Missing data cells can be left blank, making them appear like zero values when data is actually unavailable.", "isCorrect": true, "rationale": "The text explicitly warns: 'Missing cells are sometimes left blank... which can make them look like a zero value when there is actually no data at all.'"}, {"text": "Heatmaps are never supposed to have blank cells; they must always contain data for every cell.", "isCorrect": false, "rationale": "Heatmaps can and often do have missing data; the issue is how these missing cells are represented and interpreted, not their mere existence."}, {"text": "Blank cells typically represent an average of the surrounding data points, not a zero.", "isCorrect": false, "rationale": "Blank cells in a heatmap typically indicate a lack of data for that specific cell, not an imputed average, unless explicitly stated otherwise in the legend or footnotes."}], "id": "q08"}, {"question": "You are presented with a bubble chart comparing two companies, Zeta and Alpha. The chart shows Zeta's bubble having an area that appears 4 times larger than Alpha's. If Zeta's actual revenue is 2 times Alpha's revenue, what type of scaling was most likely used for the bubbles?", "options": [{"text": "Area scaling, which is the correct method.", "isCorrect": false, "rationale": "If area scaling were used, Zeta's bubble area would appear 2 times larger, matching the revenue ratio. Since it appears 4 times larger, area scaling was not used."}, {"text": "Radius scaling, which exaggerates the difference.", "isCorrect": true, "rationale": "If Zeta's revenue is 2 times Alpha's, and the radius was scaled proportionally to revenue, Zeta's radius would be 2 times Alpha's. The perceived area would then be 2^2 = 4 times larger, which matches the observation. This is characteristic of misleading radius scaling."}, {"text": "Circumference scaling, which is a less common but accurate method.", "isCorrect": false, "rationale": "Circumference scaling is not the correct or common accurate method, and it would not result in a 4x area appearance for a 2x revenue difference."}, {"text": "Diameter scaling, which is an alternative correct method.", "isCorrect": false, "rationale": "Diameter scaling is essentially radius scaling. If diameter scales by 2x, area still scales by 4x, making it misleading, not correct."}], "id": "q09"}, {"question": "Which of the following practices would make a data visualization *most* susceptible to misinterpretation according to the principles discussed?", "options": [{"text": "Using a single-hue color gradient from light to dark in a heatmap.", "isCorrect": false, "rationale": "This is described as a characteristic of a good heatmap color scale, which enhances clarity and reduces misinterpretation."}, {"text": "Clearly labeling all axes and providing a detailed legend for bubble sizes.", "isCorrect": false, "rationale": "Clear labels and legends are fundamental for accurate interpretation and reduce ambiguity in any chart."}, {"text": "Representing data values by scaling the radius of bubbles and using a rainbow color scale in a heatmap.", "isCorrect": true, "rationale": "This option combines two major pitfalls discussed: radius scaling in bubble charts (exaggerates differences) and rainbow color scales in heatmaps (creates false patterns, colorblind issues). Both actively lead to misinterpretation, making this the most problematic combination."}, {"text": "Displaying missing data cells with a distinct, neutral gray color.", "isCorrect": false, "rationale": "The text suggests using a neutral gray for missing data as a good practice to avoid them being confused with zero values, thus reducing misinterpretation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
