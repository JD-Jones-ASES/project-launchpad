        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a clustered bar chart?", "options": [{"text": "To show the total sum of values for different categories.", "isCorrect": false, "rationale": "Stacked bar charts are designed to show the total sum of values for different categories, not clustered bar charts."}, {"text": "To compare two or more groups (series) across the same set of categories.", "isCorrect": true, "rationale": "The definition states that a clustered bar chart displays two or more series of data side by side within each category, allowing comparison of groups across categories."}, {"text": "To display data trends over a continuous period.", "isCorrect": false, "rationale": "Line graphs are typically used to display data trends over a continuous period, not clustered bar charts."}, {"text": "To illustrate parts of a whole for a single category.", "isCorrect": false, "rationale": "Pie charts or single bar charts can illustrate parts of a whole for a single category, but this is not the primary purpose of a clustered bar chart."}]}, {"question": "A common misconception about clustered bar charts is that students sometimes add together the bars in a cluster. This practice is actually appropriate for which type of chart?", "options": [{"text": "A regular (simple) bar chart.", "isCorrect": false, "rationale": "A regular bar chart has only one bar per category, so there are no bars to add within a cluster."}, {"text": "A line graph.", "isCorrect": false, "rationale": "Line graphs show trends over time and do not involve adding bars within categories."}, {"text": "A stacked bar chart.", "isCorrect": true, "rationale": "The text explicitly states, 'Emphasize that in a clustered chart, you compare bars within a cluster to each other — you do not sum them (that's what stacked charts are for).'"}, {"text": "A pie chart.", "isCorrect": false, "rationale": "Pie charts show proportions of a whole for a single set of data, not sums of components across multiple categories."}]}, {"question": "A marketing team wants to compare the quarterly sales performance of two different product lines (Product A and Product B) across four regions (North, South, East, West). Which type of chart would be most appropriate for this comparison?", "options": [{"text": "A regular bar chart, showing total sales per region.", "isCorrect": false, "rationale": "A regular bar chart would only show one bar per region, losing the ability to compare Product A and Product B directly within each region."}, {"text": "A stacked bar chart, showing total sales per region broken down by product line.", "isCorrect": false, "rationale": "While it shows both product lines, a stacked bar chart emphasizes the total sales per region, making direct comparison of Product A vs. Product B's individual performance within each region less intuitive than a clustered chart."}, {"text": "A clustered bar chart, showing sales for Product A and Product B side-by-side for each region.", "isCorrect": true, "rationale": "The 'quicktip' states, 'Use a clustered bar chart when you want to compare two or more groups across the same set of categories.' This scenario perfectly fits that description, allowing direct comparison of Product A and Product B within each region."}, {"text": "A scatter plot, plotting sales of Product A against Product B.", "isCorrect": false, "rationale": "A scatter plot is used to show relationships or correlations between two numerical variables, not for comparing categorical data like regional sales of distinct products."}]}, {"question": "According to the 'howtoread' section, what is the *second* crucial step a user should take when interpreting a clustered bar chart, immediately after reading the title?", "options": [{"text": "Identify the categories along the x-axis.", "isCorrect": false, "rationale": "Identifying categories is Step 3 in the 'howtoread' section."}, {"text": "Read the legend to understand which color represents which group.", "isCorrect": true, "rationale": "The 'howtoread' section lists 'Read the legend. Which color represents which group or series?' as Step 2, right after reading the title."}, {"text": "Compare the values of bars within each cluster.", "isCorrect": false, "rationale": "Comparing bars within a cluster is Step 4 in the 'howtoread' section."}, {"text": "Check the scale of the y-axis.", "isCorrect": false, "rationale": "Checking the scale is Step 6 in the 'howtoread' section."}]}, {"question": "A student is trying to determine the number of girls participating in Basketball from the 'Sports Participation' chart. They correctly identify the 'Basketball' category but then read the value from the blue bar instead of the orange bar. Which common misconception are they exhibiting?", "options": [{"text": "They are adding together the bars in a cluster.", "isCorrect": false, "rationale": "Adding bars is a different misconception; this student is reading a single bar, but the wrong one."}, {"text": "They are confused about which bar belongs to which series.", "isCorrect": true, "rationale": "The text states, 'Students may get confused identifying which bar belongs to which series (group). Emphasize reading the legend first, then color-matching.' Reading the blue bar for 'Girls' indicates confusion about the series."}, {"text": "They are failing to identify the categories correctly.", "isCorrect": false, "rationale": "The student correctly identified 'Basketball' as the category."}, {"text": "They are not comparing values across categories.", "isCorrect": false, "rationale": "This error occurs before any attempt to compare across categories; it's about correctly reading a single value."}]}, {"question": "Based on the 'Sports Participation' clustered bar chart (Boys vs. Girls in Basketball, Soccer, Swimming), which sport shows the largest *absolute difference* in participation between boys and girls?", "options": [{"text": "Basketball", "isCorrect": false, "rationale": "Basketball has a difference of 24 (Boys) - 18 (Girls) = 6. This is not the largest difference."}, {"text": "Soccer", "isCorrect": false, "rationale": "Soccer has a difference of 30 (Boys) - 26 (Girls) = 4. This is not the largest difference."}, {"text": "Swimming", "isCorrect": true, "rationale": "Swimming has a difference of 22 (Girls) - 15 (Boys) = 7. This is the largest absolute difference among the three sports."}, {"text": "All sports have similar differences.", "isCorrect": false, "rationale": "The differences are 6, 4, and 7, which are not similar."}]}, {"question": "From the 'Sports Participation' chart and its analysis, what conclusion can be drawn about girls' participation across the three sports?", "options": [{"text": "Girls participate most in Basketball.", "isCorrect": false, "rationale": "According to the chart analysis, Soccer is the most popular sport for girls (26 participants), not Basketball (18 participants)."}, {"text": "Girls show a more even spread of participation across the three sports compared to boys.", "isCorrect": true, "rationale": "Step 4 of the example analysis explicitly states, 'Girls show a more even spread across the three sports than boys do.'"}, {"text": "Swimming is the least popular sport for girls.", "isCorrect": false, "rationale": "Basketball (18) is less popular for girls than Swimming (22)."}, {"text": "Girls consistently outparticipate boys in all three sports.", "isCorrect": false, "rationale": "The analysis shows boys outparticipate girls in Basketball and Soccer, only in Swimming do girls outparticipate boys."}]}, {"question": "A data analyst creates a clustered bar chart comparing 'Website Traffic Sources (e.g., Organic, Paid, Direct)' by 'Device Type (e.g., Desktop, Mobile, Tablet)'. If 'Device Type' is represented by different clusters on the x-axis, what would typically be represented by the different colors *within* each cluster?", "options": [{"text": "The total website traffic for each device type.", "isCorrect": false, "rationale": "The total would be the sum of the bars in a cluster, which is not what the colors themselves represent in a clustered chart."}, {"text": "The individual device types (Desktop, Mobile, Tablet).", "isCorrect": false, "rationale": "If device types are the clusters on the x-axis, then the individual device types define the clusters themselves, not the colors within them."}, {"text": "The different website traffic sources (Organic, Paid, Direct).", "isCorrect": true, "rationale": "Each bar in a cluster represents a different group or series. In this setup, 'Website Traffic Sources' would be the different groups (series) that are being compared across each 'Device Type' category, making them the colors within each cluster."}, {"text": "The specific dates or time periods of the traffic.", "isCorrect": false, "rationale": "Dates or time periods are typically represented on an axis (like a line chart) or as categories, not as the colored series within categories in this context."}]}, {"question": "When following the 'howtoread' step to 'Read each cluster,' the instruction is to 'compare the bars within the cluster: which series is highest? Which is lowest? Are they close or far apart?' What type of comparison is this instruction primarily guiding the reader to make?", "options": [{"text": "A comparison of a single group's performance across different categories.", "isCorrect": false, "rationale": "Comparing a single group's performance across different categories is described in 'Compare across categories' (Step 5), not 'Read each cluster'."}, {"text": "A comparison of the relative performance of different groups within a specific category.", "isCorrect": true, "rationale": "Comparing 'which series is highest? Which is lowest? Are they close or far apart?' directly refers to comparing the different groups (series) that make up a single cluster (category)."}, {"text": "A comparison of the total sum of all groups' values for that category.", "isCorrect": false, "rationale": "The text specifically warns against summing bars in a clustered chart, as that is for stacked charts."}, {"text": "A comparison of the absolute values against a predefined target.", "isCorrect": false, "rationale": "While one might compare values to a target, the instruction's primary focus is on the *relative* performance among the series themselves within that category."}]}, {"question": "The discussion prompt asks to imagine showing boys' and girls' club participation side by side, rather than as a simple bar chart. What key advantage does a clustered bar chart offer in this scenario compared to separate simple bar charts for boys and girls?", "options": [{"text": "It allows for a clearer visualization of the overall total participation in each club.", "isCorrect": false, "rationale": "A stacked bar chart would be better for visualizing overall total participation, as clustered charts emphasize individual group comparisons."}, {"text": "It makes it easier to compare the participation of boys directly against girls for *each specific club*.", "isCorrect": true, "rationale": "The main benefit of a clustered bar chart is precisely this: putting two or more bars side by side in each category allows for direct comparison of groups (boys vs. girls) within each category (club)."}, {"text": "It eliminates the need for a legend, simplifying interpretation.", "isCorrect": false, "rationale": "The text explicitly states that the legend is 'crucial' for a clustered bar chart."}, {"text": "It can display more categories on the x-axis without becoming cluttered.", "isCorrect": false, "rationale": "Adding more groups and categories can increase clutter in a clustered bar chart, not reduce it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
