        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental relationship between a frequency table and a dot plot, as described in the text?", "options": [{"text": "They always represent different datasets that are related by a common theme.", "isCorrect": false, "rationale": "The text explicitly states that frequency tables and dot plots 'organize the same data', not different datasets."}, {"text": "A dot plot provides more detailed individual data points than a frequency table.", "isCorrect": false, "rationale": "This is identified as a 'Common Misconception' in the text; both representations contain the 'same information'."}, {"text": "They are two different ways to organize and present the exact same set of data.", "isCorrect": true, "rationale": "The text states, 'Frequency tables and dot plots are two different ways to organize the same data.'"}, {"text": "Frequency tables are used for quantitative data, while dot plots are exclusively for qualitative data.", "isCorrect": false, "rationale": "Both examples in the text (spelling quiz scores and creative hobby hours) use quantitative data for both representations."}]}, {"question": "A frequency table indicates that 6 students scored a perfect 10 on a math quiz. How would this information be visually represented on a dot plot?", "options": [{"text": "A single dot would be placed at the '10' position on the number line, with the number '6' written next to it.", "isCorrect": false, "rationale": "While the frequency is 6, a dot plot uses dots to represent each data point, not a numerical label for the stack."}, {"text": "Six separate dots would be drawn horizontally along the number line, starting from the '10' position.", "isCorrect": false, "rationale": "Dots are stacked vertically above the corresponding value, not spread horizontally."}, {"text": "Six dots would be stacked vertically, one above the other, directly above the '10' on the number line.", "isCorrect": true, "rationale": "The method described is 'For each row in the table, place that many dots above the corresponding value on the number line.'"}, {"text": "No dots would be placed, as perfect scores are typically handled separately from the main data set.", "isCorrect": false, "rationale": "All valid data points are included in both representations, regardless of their value."}]}, {"question": "If a dot plot shows a stack of 3 dots above the number 5, how would this specific information be recorded in its corresponding frequency table?", "options": [{"text": "A row showing 'Value: 3, Frequency: 5'.", "isCorrect": false, "rationale": "The 'Value' in the table corresponds to the position on the number line, and 'Frequency' corresponds to the count of dots."}, {"text": "A row showing 'Value: 5, Frequency: 3'.", "isCorrect": true, "rationale": "To convert a dot plot to a frequency table, you 'Count the dots above each number line position and write that count as the frequency in a table.'"}, {"text": "Three separate rows, each showing 'Value: 5, Frequency: 1'.", "isCorrect": false, "rationale": "A frequency table consolidates all occurrences of a value into a single frequency count."}, {"text": "The number '3' would be listed under 'Value' and the number '5' under 'Frequency'.", "isCorrect": false, "rationale": "The 'Value' and 'Frequency' columns represent specific data points and their counts, respectively, not arbitrary numbers."}]}, {"question": "According to the text, what is a key advantage of using a dot plot over a frequency table for data analysis?", "options": [{"text": "A dot plot allows for more precise calculation of statistical measures like the mean and median.", "isCorrect": false, "rationale": "While you can calculate these, a frequency table might be more direct for calculations. The text emphasizes visual aspects for dot plots."}, {"text": "A dot plot makes it easier to visually identify the mode, spread, and overall shape of the data.", "isCorrect": true, "rationale": "The spelling quiz example explicitly states that 'The result is a dot plot that visually shows the mode... the spread... and the shape...'"}, {"text": "A dot plot can accommodate a much larger range of data values than a frequency table.", "isCorrect": false, "rationale": "Both can handle wide ranges; the number line or table rows can be extended as needed."}, {"text": "A dot plot provides a more compact representation, saving space compared to a frequency table.", "isCorrect": false, "rationale": "Depending on the data, a dot plot can sometimes take up more space, especially with many unique values. The main benefit is visual insight, not compactness."}]}, {"question": "Under what circumstance might a frequency table be a more practical data representation than a dot plot, based on the general implications in the text?", "options": [{"text": "When the goal is to quickly discern the overall distribution pattern of the data.", "isCorrect": false, "rationale": "The text suggests dot plots are better for visually seeing 'shape' and 'clusters'."}, {"text": "When the dataset contains a very large number of distinct values, making a dot plot cumbersome to draw or read.", "isCorrect": true, "rationale": "While not explicitly stated as 'better,' if there are too many unique values, a dot plot would have many single-dot stacks and lose its visual clarity, making a table more practical for exact counts. This aligns with 'sometimes a table is better'."}, {"text": "When a strong visual impact is desired for presentation to a non-technical audience.", "isCorrect": false, "rationale": "Dot plots (and other charts) are generally preferred for visual impact."}, {"text": "When you want to emphasize the presence of outliers in the data.", "isCorrect": false, "rationale": "Outliers are typically easier to spot visually on a dot plot as isolated points."}]}, {"question": "What common misconception regarding frequency tables and dot plots does the text specifically address?", "options": [{"text": "That dot plots are only suitable for small datasets, while frequency tables are for large ones.", "isCorrect": false, "rationale": "The text does not mention this misconception."}, {"text": "That converting data from a dot plot to a frequency table is significantly harder than the reverse.", "isCorrect": false, "rationale": "The text states 'Going the other direction is just as easy.'"}, {"text": "That a dot plot visually displays more unique data points than its corresponding frequency table.", "isCorrect": false, "rationale": "The misconception is about showing 'more data' in general, not necessarily 'more unique data points.'"}, {"text": "That a dot plot presents more data or information than its corresponding frequency table.", "isCorrect": true, "rationale": "The 'Common Misconception' section explicitly states: 'Students sometimes think a dot plot shows more data than a frequency table. Clarify that both representations contain the same information.'"}]}, {"question": "A researcher constructs a frequency table for survey responses, and the sum of all frequencies is 150. What must be true about the dot plot created from this same data?", "options": [{"text": "The dot plot must have a range of values that covers exactly 150 units.", "isCorrect": false, "rationale": "The range is the difference between maximum and minimum values, not related to the total count."}, {"text": "The dot plot must contain exactly 150 individual dots.", "isCorrect": true, "rationale": "The 'Total Must Match!' warning states: 'If your frequency table has frequencies that add up to 25, your dot plot must have exactly 25 dots. If they do not match, you made an error somewhere.'"}, {"text": "The tallest stack of dots in the plot must represent a frequency of 150.", "isCorrect": false, "rationale": "The tallest stack represents the mode, which is the most frequent single value, not the total number of data points."}, {"text": "The dot plot will only be able to show data up to a maximum value of 150.", "isCorrect": false, "rationale": "The maximum value on the number line is independent of the total count of data points."}]}, {"question": "In the 'Spelling Quiz Scores' example, the resulting dot plot is described as 'visually show[ing] the mode (8 points — the tallest stack), the spread (5 to 10), and the shape (more students scored on the higher end).' This highlights which aspect of a dot plot?", "options": [{"text": "Its ability to precisely calculate the mean and standard deviation of the data.", "isCorrect": false, "rationale": "While possible to calculate, the description focuses on what is 'visually shown' and 'immediately apparent,' not on calculation precision."}, {"text": "Its superior capacity for storing large quantities of diverse data points.", "isCorrect": false, "rationale": "The example emphasizes visual interpretation of existing data, not storage capacity."}, {"text": "Its effectiveness in providing immediate visual insights into data distribution and key characteristics.", "isCorrect": true, "rationale": "The text explicitly points out that the dot plot 'visually shows' the mode, spread, and shape, making these insights immediately apparent."}, {"text": "Its necessity for converting numerical data into categorical labels for clearer understanding.", "isCorrect": false, "rationale": "The data remains numerical (quiz scores), and the dot plot visualizes these numbers directly."}]}, {"question": "Referencing the 'creative hobbies' dataset and its analysis, what does the 'clustered on the left' description of the data's shape imply about the students' hobby hours?", "options": [{"text": "The hobby hours are spread out evenly across the entire range.", "isCorrect": false, "rationale": "Clustered on the left implies an uneven distribution, with most data points grouped at the lower end."}, {"text": "Most students spend a low number of hours on creative hobbies.", "isCorrect": true, "rationale": "As stated in the 'teacheranswers,' 'Clustered on the left (most students spend 0–5 hours),' indicating that the majority of data points are at the lower end of the scale."}, {"text": "Most students spend a high number of hours on creative hobbies.", "isCorrect": false, "rationale": "Clustered on the left indicates lower values, while clustered on the right would indicate higher values."}, {"text": "There are no clear patterns or trends in the students' hobby hours.", "isCorrect": false, "rationale": "Clustering is a pattern; 'clustered on the left' is a clear description of a trend."}]}, {"question": "Based on the storytelling analysis of the 'creative hobbies' data, what is the most compelling 'story' this particular dot plot tells about the group of students?", "options": [{"text": "Students generally spend a consistent, moderate amount of time on creative hobbies.", "isCorrect": false, "rationale": "The data is 'clustered on the left' and 'skewed to the right' with outliers, indicating inconsistency and a lack of moderate consistency."}, {"text": "A large proportion of students are highly dedicated, spending many hours on their hobbies, with only a few spending very little.", "isCorrect": false, "rationale": "The analysis states 'most students spend fewer than 6 hours,' contradicting the idea of a large proportion spending many hours."}, {"text": "While most students spend relatively little time on creative hobbies, a small, dedicated group commits significantly more hours.", "isCorrect": true, "rationale": "The analysis explicitly states 'Most students spend fewer than 6 hours per week... A small number of students are very serious hobbyists, spending 10–15 hours per week,' summarizing this exact story."}, {"text": "There is no discernible pattern in student hobby hours; they vary widely and unpredictably.", "isCorrect": false, "rationale": "The analysis identifies clear patterns: 'clustered on the left,' 'outliers,' and 'skewed to the right,' which contradicts unpredictability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
