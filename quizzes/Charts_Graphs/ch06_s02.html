        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most significant structural difference between a donut chart and a pie chart?", "options": [{"text": "A donut chart always uses 3D effects, while a pie chart does not.", "isCorrect": false, "rationale": "The text explicitly states that donut charts, like pie charts, should not use 3D effects for best readability."}, {"text": "A donut chart divides a ring into segments, whereas a pie chart divides a full circle.", "isCorrect": true, "rationale": "The definition of a donut chart highlights its central hole, which results in the data being represented by segments of a ring rather than a solid circle."}, {"text": "Donut charts can display more categories than pie charts.", "isCorrect": false, "rationale": "Both donut charts and pie charts recommend using six or fewer categories for best readability, so there isn't a difference in category capacity."}, {"text": "Donut charts represent part-to-whole relationships, while pie charts show trends over time.", "isCorrect": false, "rationale": "Both donut charts and pie charts are designed to represent part-to-whole relationships, not trends over time."}], "id": "q01"}, {"question": "According to the text, what is the primary reason designers often choose to place a number or label in the center of a donut chart?", "options": [{"text": "To indicate that some data is missing from the chart.", "isCorrect": false, "rationale": "The text identifies this as a common misconception, clarifying that the hole does not represent missing data."}, {"text": "To simplify the chart by removing unnecessary segments.", "isCorrect": false, "rationale": "The hole does not remove segments; all data is contained within the ring segments."}, {"text": "To highlight a key metric, total, or percentage relevant to the entire dataset.", "isCorrect": true, "rationale": "The text explicitly states that the center space provides a convenient place to display a total, percentage, or label that helps the reader understand the chart at a glance."}, {"text": "To add an aesthetic design element without functional purpose.", "isCorrect": false, "rationale": "While it can be aesthetic, the text emphasizes its functional purpose of displaying a key number or label."}], "id": "q02"}, {"question": "A student states that the empty space in the center of a donut chart signifies that some of the data was not collected or is incomplete. Based on the provided text, why is this statement incorrect?", "options": [{"text": "The hole is used to hide sensitive data from the viewer.", "isCorrect": false, "rationale": "The text does not mention the hole being used for hiding sensitive data."}, {"text": "The text clarifies that the hole is purely a design choice and does not represent missing data.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section directly addresses this, stating, 'Clarify that the hole is purely a design choice; the ring and its segments contain all the data.'"}, {"text": "The hole is where the chart's title should always be placed.", "isCorrect": false, "rationale": "While a label can be in the center, the main title is typically above the chart, and the text focuses on key numbers/labels, not specifically the title."}, {"text": "The entire chart's data is embedded within the hole, not the segments.", "isCorrect": false, "rationale": "The data is always represented by the colored segments of the ring, not the hole itself."}], "id": "q03"}, {"question": "A data analyst needs to design a dashboard that displays various metrics at a glance, with a clear focus on a total value for each category. Based on the section, which chart type would be most appropriate and why?", "options": [{"text": "A pie chart, because it is the original and most traditional form of part-to-whole visualization.", "isCorrect": false, "rationale": "While pie charts are traditional, they lack the dedicated central space for a key number that is beneficial for dashboards."}, {"text": "A donut chart, because its center space can effectively display a key number or total, enhancing readability in a dashboard context.", "isCorrect": true, "rationale": "The text states, 'Donut charts have become very popular in dashboards... The hole provides a convenient place to display a total, a percentage, or a label...'"}, {"text": "A 3D donut chart, because it looks more modern and visually appealing.", "isCorrect": false, "rationale": "The text explicitly advises against using 3D effects for donut charts, just like pie charts, due to readability issues."}, {"text": "A simple bar chart, as it is generally easier to compare segments.", "isCorrect": false, "rationale": "While bar charts excel at segment comparison, the question specifically asks about displaying a 'total value for each category' prominently in a dashboard, which is a key advantage of the donut chart's center."}], "id": "q04"}, {"question": "Which of the following rules applies universally to both pie charts and donut charts, according to the text?", "options": [{"text": "Always use 3D effects for a modern look.", "isCorrect": false, "rationale": "The text states that 'Donut charts follow all the same rules as pie charts... do not use 3D effects.'"}, {"text": "Segments must sum to exactly 100%.", "isCorrect": true, "rationale": "The text explicitly states this as a rule: 'Donut charts follow all the same rules as pie charts: segments must sum to 100%...'"}, {"text": "The chart must have a central hole for a key number.", "isCorrect": false, "rationale": "Only donut charts have a central hole; pie charts are solid circles."}, {"text": "Use as many categories as possible to show detailed data.", "isCorrect": false, "rationale": "The text recommends using 'six or fewer categories for best readability' for both chart types."}], "id": "q05"}, {"question": "Imagine you are presented with a donut chart titled 'Annual Household Energy Consumption' with a number in the center. According to the 'How to Read A Donut Chart' section, what should be your *first* step to understand the chart?", "options": [{"text": "Immediately try to find the largest and smallest segments.", "isCorrect": false, "rationale": "Finding largest/smallest segments is a later step after understanding the chart's context."}, {"text": "Calculate the exact dollar amounts for each segment.", "isCorrect": false, "rationale": "Calculating specific amounts is an application step, not the initial reading step."}, {"text": "Read the title to understand what the whole ring represents.", "isCorrect": true, "rationale": "The 'How to Read A Donut Chart' section lists 'Read the title. What does the whole ring represent?' as the very first step."}, {"text": "Verify that all percentages add up to 100%.", "isCorrect": false, "rationale": "Verifying percentages is an important step for accuracy, but it follows the initial steps of understanding the chart's context and central message."}], "id": "q06"}, {"question": "A donut chart shows that 'Transportation' accounts for 25% of a student's total monthly allowance. If the center of the chart displays '$240' as the total monthly allowance, how much money does the student spend on Transportation?", "options": [{"text": "$25", "isCorrect": false, "rationale": "This option incorrectly assumes the percentage directly translates to a dollar amount without calculation."}, {"text": "$60", "isCorrect": true, "rationale": "To find the dollar amount, you calculate 25% of the total allowance: 0.25 * $240 = $60. This applies the method described in the 'Worked Example'."}, {"text": "$240", "isCorrect": false, "rationale": "This is the total allowance, not the amount spent on a specific segment."}, {"text": "$100", "isCorrect": false, "rationale": "This is an arbitrary amount and does not reflect the given percentage or total."}], "id": "q07"}, {"question": "Beyond providing space for a key number, what other visual advantage do designers often attribute to donut charts compared to traditional pie charts?", "options": [{"text": "They are easier to create without specialized software.", "isCorrect": false, "rationale": "Both types of charts typically require software for creation, and ease of creation isn't a stated visual advantage."}, {"text": "They allow for more precise comparison of segment sizes.", "isCorrect": false, "rationale": "While visual comparison can be challenging for both, the text does not claim donut charts inherently improve this more than pie charts; rather, it highlights other benefits."}, {"text": "They offer a cleaner, more modern, and less cluttered visual appearance.", "isCorrect": true, "rationale": "The text explicitly states: 'Many designers feel donut charts look more modern and less cluttered than filled pie charts, especially in digital dashboards.'"}, {"text": "They can display data for more than 10 categories effectively.", "isCorrect": false, "rationale": "The text advises limiting categories to 'six or fewer' for best readability, regardless of the chart type."}], "id": "q08"}, {"question": "The text mentions that William Playfair invented the pie chart in 1801, but the donut chart became popular much later. What technological development is cited as a key factor in the donut chart's rise in popularity?", "options": [{"text": "The invention of printing presses in the 15th century.", "isCorrect": false, "rationale": "Printing presses existed centuries before the pie chart and the computer graphics era mentioned for donut charts."}, {"text": "The advent of computer graphics, making it easy to create a 'hole' digitally.", "isCorrect": true, "rationale": "The 'didyouknow' section states, 'The donut chart became popular in the era of computer graphics when making a “hole” became easy with software.'"}, {"text": "The development of advanced mathematical theories for data visualization.", "isCorrect": false, "rationale": "While mathematical theories are foundational, the text attributes the *popularity* of donut charts specifically to ease of digital creation."}, {"text": "The widespread use of physical compasses for drawing circles.", "isCorrect": false, "rationale": "Compasses were used long before the digital era and don't explain the *later* popularity of donut charts specifically."}], "id": "q09"}, {"question": "To ensure the best readability for a donut chart, especially in a professional dashboard, what guideline regarding the number of categories should be followed?", "options": [{"text": "There is no limit; the more categories, the more detailed the chart.", "isCorrect": false, "rationale": "Too many categories severely reduce readability, making segments too small to interpret."}, {"text": "Use exactly two categories for maximum simplicity.", "isCorrect": false, "rationale": "While simple, limiting to two isn't a general guideline for best readability; the recommended number is a range."}, {"text": "Limit the number of categories to six or fewer.", "isCorrect": true, "rationale": "The text explicitly states, 'segments must sum to 100%, use six or fewer categories for best readability...'"}, {"text": "Always group small categories into an 'Other' segment, regardless of total count.", "isCorrect": false, "rationale": "Grouping small categories is a good practice, but the overall recommendation is still to limit the *total* distinct categories (including 'Other') to six or fewer."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
