<div class="quiz-container">

        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental distinction between a scatter plot and a bubble chart?", "options": [{"text": "A bubble chart uses lines, while a scatter plot uses dots.", "isCorrect": false, "rationale": "Both scatter plots and bubble charts conceptually use points or dots to represent data, making this statement incorrect."}, {"text": "A bubble chart encodes a third variable using bubble size, unlike a scatter plot which only uses two variables.", "isCorrect": true, "rationale": "The text explicitly states that the key difference is that bubble charts have a third variable (bubble size), while scatter plots use only two variables."}, {"text": "A scatter plot can only show positive correlations, whereas a bubble chart shows all types.", "isCorrect": false, "rationale": "Both scatter plots and bubble charts can display various types of correlations (positive, negative, or none), depending on the data."}, {"text": "A bubble chart is always animated, while a scatter plot is static.", "isCorrect": false, "rationale": "While animated bubble charts are popular (e.g., Hans Rosling's), a bubble chart itself is not inherently animated; static bubble charts are common, and animation is an enhancement, not a defining characteristic."}], "id": "q01"}, {"question": "In a standard bubble chart, which three properties are typically used to encode distinct numerical variables?", "options": [{"text": "Color, shape, and x-axis position.", "isCorrect": false, "rationale": "The text specifies x-position, y-position, and bubble size as the encoded variables, not color or shape."}, {"text": "X-axis position, y-axis position, and bubble size.", "isCorrect": true, "rationale": "The definition of a bubble chart states that the x-axis and y-axis encode two numerical variables, and the size of each bubble encodes a third numerical variable."}, {"text": "Bubble diameter, y-axis position, and background pattern.", "isCorrect": false, "rationale": "Bubble diameter is related to bubble size, not a distinct third variable, and background patterns are not used to encode variables in this context."}, {"text": "Title, axis labels, and legend.", "isCorrect": false, "rationale": "These are essential elements for reading a chart, but they are not the properties used to encode the actual data variables themselves."}], "id": "q02"}, {"question": "Consider the 'Worked Example' bubble chart where GDP per capita is on the x-axis, life expectancy on the y-axis, and population by bubble size. A country represented by a small bubble located in the far upper-right corner of the chart would indicate what?", "options": [{"text": "Low GDP, low life expectancy, and low population.", "isCorrect": false, "rationale": "The upper-right corner indicates high values for both x (GDP) and y (life expectancy)."}, {"text": "High GDP, high life expectancy, and high population.", "isCorrect": false, "rationale": "A small bubble indicates a low value for the third variable, which in this case is population."}, {"text": "High GDP, high life expectancy, and low population.", "isCorrect": true, "rationale": "The upper-right corner signifies high GDP per capita (x-axis) and high life expectancy (y-axis). A small bubble indicates a low population. This is exemplified by Iotara in the worked example."}, {"text": "Low GDP, high life expectancy, and high population.", "isCorrect": false, "rationale": "The upper-right corner indicates high GDP, not low GDP."}], "id": "q03"}, {"question": "A common misconception about bubble charts is assuming a larger bubble represents a 'better' or more desirable outcome. Why is this assumption often incorrect?", "options": [{"text": "Bubble size only indicates the age of the data point, not its value.", "isCorrect": false, "rationale": "Bubble size encodes a numerical value of a third variable, not the age of the data point."}, {"text": "The aesthetic appeal of larger bubbles is subjective and not data-driven.", "isCorrect": false, "rationale": "While aesthetics are subjective, the core reason for the misconception is how the encoded variable relates to 'good' or 'bad' outcomes."}, {"text": "Bubble size encodes a third variable, and whether a large value for that variable is 'good' or 'bad' depends entirely on the context of the data.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states, 'Remind them that bubble size encodes a THIRD variable — whether large is good or bad depends entirely on the context.'"}, {"text": "Only the x and y axes are used to determine desirability, never the bubble size.", "isCorrect": false, "rationale": "All three variables (x, y, and size) contribute to the overall interpretation and understanding of the data point, including its desirability in context."}], "id": "q04"}, {"question": "According to the text, how should bubble size be proportional to the data value it represents in a bubble chart?", "options": [{"text": "By its radius.", "isCorrect": false, "rationale": "The 'Bubble Size' definition explicitly states, 'Bubble size in a bubble chart should be proportional to the data value it represents by area (not by radius or diameter).'"}, {"text": "By its diameter.", "isCorrect": false, "rationale": "The 'Bubble Size' definition explicitly states, 'Bubble size in a bubble chart should be proportional to the data value it represents by area (not by radius or diameter).'"}, {"text": "By its area.", "isCorrect": true, "rationale": "The 'Bubble Size' definition clearly states that bubble size should be proportional to the data value by area, ensuring accurate visual representation of quantities."}, {"text": "By its circumference.", "isCorrect": false, "rationale": "The text specifies proportionality by area, not by circumference."}], "id": "q05"}, {"question": "When interpreting a bubble chart, the 'How To Read A Bubble Chart' section recommends which of the following as the first step after reading the title and axis labels?", "options": [{"text": "Identify outliers in the data.", "isCorrect": false, "rationale": "Identifying outliers is listed as a later step (Step 6) in the 'How To Read A Bubble Chart' section."}, {"text": "Read the size legend to understand what bubble size represents.", "isCorrect": true, "rationale": "After reading the title and axis labels, the next step listed in the 'How To Read A Bubble Chart' section is 'Read the size legend.'"}, {"text": "Locate specific bubbles and estimate their x and y values.", "isCorrect": false, "rationale": "Locating specific bubbles and reading their values is a later step (Step 4) after understanding the legend."}, {"text": "Look for the overall x–y trend.", "isCorrect": false, "rationale": "Looking for the overall x-y trend is listed as a later step (Step 5) in the 'How To Read A Bubble Chart' section."}], "id": "q06"}, {"question": "Based on the 'Worked Example: GDP, Life Expectancy, and Population' chart, what general correlation is observed between GDP per capita and life expectancy?", "options": [{"text": "A negative correlation, meaning higher GDP per capita tends to lead to shorter life expectancy.", "isCorrect": false, "rationale": "The text states the opposite: 'The bubbles rise from lower-left to upper-right — countries with higher GDP per capita tend to have higher life expectancy.'"}, {"text": "No clear correlation, as the bubbles are randomly scattered.", "isCorrect": false, "rationale": "The text explicitly identifies a clear trend, not random scattering."}, {"text": "A positive correlation, meaning countries with higher GDP per capita tend to have higher life expectancy.", "isCorrect": true, "rationale": "Step 1 of the 'exampleReading the Country Bubble Chart' states: 'The bubbles rise from lower-left to upper-right — countries with higher GDP per capita tend to have higher life expectancy. This is a positive correlation between wealth and life expectancy.'"}, {"text": "A curvilinear correlation, where life expectancy increases initially with GDP but then declines.", "isCorrect": false, "rationale": "The text describes a consistent positive correlation, not a curvilinear one."}], "id": "q07"}, {"question": "The text describes Kappala as having a GDP of $3,500, life expectancy of 55 years, and an 'enormous bubble' representing 500M people. What critical insight does the position and size of Kappala on the example chart help to demonstrate?", "options": [{"text": "Countries with extremely large populations are always the least prosperous and healthy.", "isCorrect": false, "rationale": "The text states 'does not mean' or 'does not guarantee,' which implies it's not always the case, and there can be exceptions or independence."}, {"text": "A large population size does not inherently guarantee high quality of life or prosperity.", "isCorrect": true, "rationale": "The example of Kappala (large population, low GDP/life expectancy) and Iotara (small population, high GDP/life expectancy) leads to the conclusion: 'Being the most populous does not mean being the wealthiest or healthiest. Population and prosperity are completely different variables.'"}, {"text": "Population size is a direct indicator of a country's life expectancy and GDP.", "isCorrect": false, "rationale": "The text concludes the opposite, stating that population size is 'largely independent' of wealth and health."}, {"text": "All countries with low GDP and life expectancy have enormous populations.", "isCorrect": false, "rationale": "While Kappala fits this, the chart doesn't suggest this is universally true for *all* such countries. The point is about the *independence* of variables."}], "id": "q08"}, {"question": "What was a central message conveyed by Hans Rosling through his famous animated bubble charts?", "options": [{"text": "Data visualization is only useful for showing negative global trends.", "isCorrect": false, "rationale": "Rosling's message was one of optimism, showing improvement, not solely negative trends."}, {"text": "The world's health and income statistics have remained largely unchanged over the past 200 years.", "isCorrect": false, "rationale": "His charts explicitly showed countries moving and improving over 200 years, indicating significant change."}, {"text": "Animated bubble charts are primarily for entertainment and not for serious data analysis.", "isCorrect": false, "rationale": "Rosling used them for serious, impactful data analysis to educate millions."}, {"text": "The world has generally improved in terms of health and income over time.", "isCorrect": true, "rationale": "The 'chartchampionHans Rosling' section concludes with his message: 'The world is better than you think, and getting better all the time.'"}], "id": "q09"}, {"question": "Imagine a bubble chart where the x-axis represents 'Daily Hours of Exercise,' the y-axis represents 'Average Energy Level,' and bubble size represents 'Number of Meals Consumed Daily.' If you observe a cluster of large bubbles in the upper-right quadrant, what would be a reasonable inference?", "options": [{"text": "People who exercise less tend to have higher energy levels and eat more meals.", "isCorrect": false, "rationale": "The upper-right quadrant indicates high values for both x-axis (exercise) and y-axis (energy level), not less exercise."}, {"text": "People who exercise more tend to have higher energy levels, regardless of their meal consumption.", "isCorrect": false, "rationale": "The bubble size (meal consumption) is significant; ignoring it would be missing a key piece of information provided by the chart."}, {"text": "Individuals who exercise more and have higher energy levels also tend to consume more meals daily.", "isCorrect": true, "rationale": "The upper-right quadrant signifies high daily hours of exercise (x-axis) and high average energy level (y-axis). Large bubbles signify a high number of meals consumed daily. Combining these, the inference is that these three high values tend to occur together."}, {"text": "There is no correlation between exercise, energy level, and meal consumption.", "isCorrect": false, "rationale": "A 'cluster' of bubbles implies a relationship or correlation among the variables, not an absence of one."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
