not work out evenly, causing calculation errors.", "isCorrect": false, "rationale": "A scale of 1 will always work out evenly for whole number data, as each item is represented by one symbol."}]}, {"question": "A teacher wants to create a pictograph for student scores: 20, 30, 45, and 50. Which scale would be the *most* appropriate for this data, considering the 'golden rules'?", "options": [{"text": "1 symbol = 2 scores", "isCorrect": false, "rationale": "A scale of 2 would require 22.5 symbols for a score of 45, which involves an awkward fraction (not a simple half) and results in more symbols than necessary for clear representation."}, {"text": "1 symbol = 5 scores", "isCorrect": true, "rationale": "This scale works perfectly: 20/5=4, 30/5=6, 45/5=9, 50/5=10. All values result in whole numbers of symbols, making it clear and easy to read without any fractions."}, {"text": "1 symbol = 10 scores", "isCorrect": false, "rationale": "A scale of 10 would require 4.5 symbols for a score of 45, meaning a half symbol. While half symbols are acceptable, a scale of 5 is *more* appropriate here as it avoids fractions entirely for these specific data points."}, {"text": "1 symbol = 25 scores", "isCorrect": false, "rationale": "A scale of 25 would result in awkward fractions like 20/25 (0.8 symbols) or 30/25 (1.2 symbols), which are difficult to draw and read accurately."}]}, {"question": "For data values 14, 21, 28, and 35, a pictograph is created using a scale of 10. What specific issue will arise from this choice, according to the textbook's guidelines?", "options": [{"text": "The pictograph will have too many symbols per row, making it unreadable.", "isCorrect": false, "rationale": "For values in the tens, a scale of 10 would result in a small number of symbols (1.4, 2.1, 2.8, 3.5), not too many."}, {"text": "Some symbols will need to be represented as awkward fractions (e.g., a 0.4 or 0.1 symbol), which are hard to draw and read.", "isCorrect": true, "rationale": "Dividing 14 by 10 yields 1.4 symbols, 21 by 10 yields 2.1, etc. The text warns that 'anything smaller than a half' is a sign the scale is wrong due to difficulty in drawing and reading."}, {"text": "All data values will require half symbols, making the chart less clear.", "isCorrect": false, "rationale": "Only 35/10 would yield a half symbol (3.5). The other values (1.4, 2.1, 2.8) result in more complex, difficult-to-draw fractions."}, {"text": "The scale of 10 is not considered a 'round number' for easy calculations.", "isCorrect": false, "rationale": "The text lists 10 as one of the common 'round numbers' that work best because the math is easy; the issue is its fit with these specific data values."}]}, {"question": "The 'golden rules' for picking a scale suggest using round numbers like 2, 5, 10, 25, 50, or 100. Why are these values preferred?", "options": [{"text": "They always result in perfectly even numbers of symbols, avoiding all fractions.", "isCorrect": false, "rationale": "While preferred for ease, they don't *always* prevent fractions; it depends on the specific data values (e.g., 15 with a scale of 10 still needs a half symbol)."}, {"text": "The math involved in calculating the number of symbols is generally easier with these values.", "isCorrect": true, "rationale": "The text explicitly states that these 'round numbers work best because the math is easy.'"}, {"text": "They allow for the greatest flexibility in symbol design and artistic expression.", "isCorrect": false, "rationale": "The choice of scale numerical value has no direct relation to symbol design or artistic expression."}, {"text": "These are the only scale values supported by standard pictograph software.", "isCorrect": false, "rationale": "The text does not mention software limitations, and this is an arbitrary claim."}]}, {"question": "A survey found that 350 people preferred cats, 420 preferred dogs, and 180 preferred birds. If you were to create a pictograph, which scale would best adhere to the rule of 'avoid too many symbols per row' while still being practical?", "options": [{"text": "1 symbol = 10 people", "isCorrect": false, "rationale": "A scale of 10 would require 42 symbols for dogs, which could be considered 'unreadably long' for a single row, similar to the text's warning about 200 symbols."}, {"text": "1 symbol = 20 people", "isCorrect": true, "rationale": "This scale results in 21 symbols for dogs (420/20=21), 17.5 for cats (350/20=17.5), and 9 for birds (180/20=9). This avoids excessively long rows, and the required half symbol for cats is considered acceptable by the text."}, {"text": "1 symbol = 50 people", "isCorrect": false, "rationale": "This scale would result in awkward fractions like 8.4 symbols for dogs (420/50) and 3.6 for birds (180/50), which are 'smaller than a half' and explicitly warned against as a sign of a bad scale."}, {"text": "1 symbol = 100 people", "isCorrect": false, "rationale": "This scale would lead to even more difficult-to-draw fractions like 4.2 symbols for dogs (420/100) and 1.8 for birds (180/100), violating the guideline against small fractions."}]}, {"question": "According to the text, when is needing a fractional symbol a 'strong sign that your scale is wrong'?", "options": [{"text": "When the fraction required is exactly one-half of a symbol.", "isCorrect": false, "rationale": "The text states, 'A half symbol works fine,' indicating it is generally acceptable and not a sign of a wrong scale."}, {"text": "When the pictograph involves any fraction, regardless of its size.", "isCorrect": false, "rationale": "This is incorrect; half symbols are explicitly noted as acceptable."}, {"text": "When the fraction required is anything smaller than a half (e.g., a quarter or three-eighths of a symbol).", "isCorrect": true, "rationale": "The text warns, 'If you find yourself needing anything smaller than a half, it is a strong sign that your scale is wrong.'"}, {"text": "When the fractional symbol causes the total number of symbols to be an odd number.", "isCorrect": false, "rationale": "The parity of the total symbol count is not mentioned as a criterion for a good or bad scale."}]}, {"question": "In the provided example, Scale A (1 symbol = 5 students) is stated to work 'much better' than Scale B (1 symbol = 2 students) for the data (10, 15, 20, 25). What is the primary reason for Scale A's superiority *as explained in the text*?", "options": [{"text": "Scale A uses a larger key value, which inherently makes any pictograph clearer.", "isCorrect": false, "rationale": "The 'Common Misconception' section clarifies that a larger key value isn't *always* better; it depends on fitting the data. While it helps here, it's not the primary reason given for its 'much better' performance."}, {"text": "Scale A results in only whole numbers of symbols for all data values, avoiding all fractions.", "isCorrect": true, "rationale": "The text explicitly states: 'Scale A works much better here. All values (10, 15, 20, 25) are multiples of 5, so no fractions needed.'"}, {"text": "Scale A results in significantly shorter rows, which is always preferred visually.", "isCorrect": false, "rationale": "While shorter rows are a benefit, the text's primary explanation for superiority focuses on the absence of fractions rather than just the row length."}, {"text": "Scale B is not a 'round number' as recommended by the golden rules, unlike Scale A.", "isCorrect": false, "rationale": "Both 2 and 5 are listed as 'round numbers' in the 'golden rules' section, so this is not why Scale B is inferior in this context."}]}, {"question": "The 'Common Misconception' section states that 'Students sometimes think that a larger key value is always better because it results in fewer symbols.' Why is this considered a misconception?", "options": [{"text": "Larger key values often lead to a pictograph with an unreadably small number of symbols.", "isCorrect": false, "rationale": "The concern with larger key values is not usually too few symbols, but rather the creation of difficult fractions if the data doesn't align."}, {"text": "A larger key value can complicate the math involved in calculating the number of symbols.", "isCorrect": false, "rationale": "The text indicates that 'round numbers' (which include larger values like 50, 100) simplify math, not complicate it."}, {"text": "The scale must fit the specific data; if data values are not multiples of the key, awkward fractions result.", "isCorrect": true, "rationale": "The text explains the misconception by stating: 'Explain that the scale must fit the data: if the data values are not multiples of the key, you end up with awkward fractions of symbols that are hard to draw and read.'"}, {"text": "Smaller key values always provide more accurate and detailed representations of the data.", "isCorrect": false, "rationale": "Accuracy is ensured by correct calculation, regardless of scale size. Too many symbols (from a small scale) can make a graph unreadable, negating any perceived 'detail'."}]}, {"question": "You are creating a pictograph for the number of pets owned by students in different classes: Class A (18 pets), Class B (24 pets), Class C (30 pets), Class D (42 pets). Which scale would be the *best* choice, considering all the 'golden rules'?", "options": [{"text": "1 symbol = 2 pets", "isCorrect": false, "rationale": "While this scale works out evenly for all values (9, 12, 15, 21 symbols), the highest row would have 21 symbols, which is quite long and potentially violates the 'avoid too many symbols per row' rule if a more compact option exists."}, {"text": "1 symbol = 3 pets", "isCorrect": true, "rationale": "This scale is ideal: 18/3=6, 24/3=8, 30/3=10, 42/3=14. All values result in whole numbers of symbols, and the number of symbols per row (max 14) is very manageable, adhering to all 'golden rules'."}, {"text": "1 symbol = 5 pets", "isCorrect": false, "rationale": "This scale would result in awkward fractions like 18/5 (3.6 symbols), 24/5 (4.8 symbols), and 42/5 (8.4 symbols), which are 'smaller than a half' and difficult to draw and read."}, {"text": "1 symbol = 10 pets", "isCorrect": false, "rationale": "This scale would result in awkward fractions like 18/10 (1.8 symbols), 24/10 (2.4 symbols), and 42/10 (4.2 symbols), making the pictograph unclear and violating the 'make values work out evenly' rule."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
