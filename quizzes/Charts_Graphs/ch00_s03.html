<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Charts, Graphs, and Diagrams &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 0, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How many parts is this book organized into?", "options": [{"text": "Five parts", "isCorrect": false, "rationale": "The text lists seven parts, not five."}, {"text": "Seven parts", "isCorrect": true, "rationale": "The text states: 'This book is organized into seven parts, each one building on the last.'"}, {"text": "Ten parts", "isCorrect": false, "rationale": "The text specifies seven parts."}, {"text": "Three parts", "isCorrect": false, "rationale": "The text specifies seven parts."}]}, {"question": "Which part of the book covers bar charts?", "options": [{"text": "Part 1: Tables and Basic Charts", "isCorrect": false, "rationale": "Part 1 covers tally charts, frequency tables, pictographs, and dot plots — not bar charts."}, {"text": "Part 2: Bar Charts and Their Cousins (Chapters 4–5)", "isCorrect": true, "rationale": "The text states Part 2 covers 'basic bars, clustered bars, stacked bars, and diverging bars.'"}, {"text": "Part 3: Parts of a Whole", "isCorrect": false, "rationale": "Part 3 covers pie charts, donut charts, treemaps, and waffle charts."}, {"text": "Part 7: Putting It All Together", "isCorrect": false, "rationale": "Part 7 is the review and chart-choosing chapter."}]}, {"question": "What types of charts are covered in Part 3: Parts of a Whole?", "options": [{"text": "Bar charts and scatter plots", "isCorrect": false, "rationale": "Bar charts are in Part 2 and scatter plots are in Part 5."}, {"text": "Pie charts, donut charts, treemaps, and waffle charts", "isCorrect": true, "rationale": "The text states: 'Pie charts, donut charts, treemaps, and waffle charts all show how parts add up to a total.'"}, {"text": "Line graphs and area charts", "isCorrect": false, "rationale": "Line graphs and area charts are covered in Part 4: Data Over Time."}, {"text": "Heatmaps and bubble charts", "isCorrect": false, "rationale": "Heatmaps and bubble charts are covered in Part 6: Specialized Visualizations."}]}, {"question": "Which part of the book explains why 'correlation does not mean causation'?", "options": [{"text": "Part 4: Data Over Time", "isCorrect": false, "rationale": "Part 4 focuses on line graphs and time-series data."}, {"text": "Part 5: Relationships and Comparisons (Chapters 9–10)", "isCorrect": true, "rationale": "The text states that Part 5 covers scatter plots, histograms, and box plots, and 'You will also learn why correlation does not mean causation.'"}, {"text": "Part 7: Putting It All Together", "isCorrect": false, "rationale": "Part 7 focuses on chart selection and reviewing misleading tricks."}, {"text": "Part 1: Tables and Basic Charts", "isCorrect": false, "rationale": "Part 1 covers basic data organization like tally charts and frequency tables."}]}, {"question": "According to the 'Real World' box, which of these is an example of data visualization in everyday life?", "options": [{"text": "A printed novel", "isCorrect": false, "rationale": "A novel is not listed as an example of a data visualization."}, {"text": "Weather apps using line graphs to show temperature forecasts", "isCorrect": true, "rationale": "The text states: 'Weather apps use line graphs to show temperature forecasts' as one example of charts in everyday life."}, {"text": "A handwritten grocery list", "isCorrect": false, "rationale": "A grocery list is not listed as an example of a data visualization."}, {"text": "A photograph of a mountain", "isCorrect": false, "rationale": "A photograph is not a data visualization example mentioned in the text."}]}, {"question": "What does Part 1 of the book cover?", "options": [{"text": "Line graphs and area charts", "isCorrect": false, "rationale": "Line graphs and area charts are in Part 4: Data Over Time."}, {"text": "Tally charts, frequency tables, pictographs, and dot plots", "isCorrect": true, "rationale": "The text states: Part 1 covers 'the simplest ways to organize data: tally charts, frequency tables, pictographs, and dot plots.'"}, {"text": "Pie charts and donut charts", "isCorrect": false, "rationale": "Pie charts and donut charts are covered in Part 3."}, {"text": "Heatmaps, dashboards, and maps", "isCorrect": false, "rationale": "Those are covered in Part 6: Specialized Visualizations."}]}, {"question": "What is the final chapter of the book about?", "options": [{"text": "A history of charts throughout the ages", "isCorrect": false, "rationale": "The history of charts is touched on in the introduction, not the final chapter."}, {"text": "A systematic process for choosing the right chart and a master review of misleading tricks", "isCorrect": true, "rationale": "The text says Part 7 (Chapter 14) is about 'a systematic process for choosing the right chart for any situation — and a master review of every misleading trick in the book.'"}, {"text": "Advanced statistics and data analysis", "isCorrect": false, "rationale": "The final chapter focuses on chart selection and misleading tricks, not advanced statistics."}, {"text": "How to create charts using computer software", "isCorrect": false, "rationale": "The text describes the final chapter as focused on chart choice and spotting misleading charts."}]}, {"question": "According to the 'Real World' box, what does YouTube show using a bar graph?", "options": [{"text": "The number of subscribers per channel", "isCorrect": false, "rationale": "The text does not mention subscriber counts."}, {"text": "Your watch time per day", "isCorrect": true, "rationale": "The text states: 'YouTube shows a bar graph of your watch time per day.'"}, {"text": "Video upload dates", "isCorrect": false, "rationale": "Upload dates are not mentioned in this context."}, {"text": "Trending video rankings", "isCorrect": false, "rationale": "Trending rankings are not mentioned in the Real World box."}]}, {"question": "What visualization types are covered in Part 6: Specialized Visualizations?", "options": [{"text": "Bar charts, pie charts, and line graphs", "isCorrect": false, "rationale": "These common chart types are covered in earlier parts of the book."}, {"text": "Heatmaps, bubble charts, infographics, dashboards, maps, network diagrams, word clouds, and Venn diagrams", "isCorrect": true, "rationale": "The text lists all of these visualization types under Part 6: Specialized Visualizations (Chapters 11–13)."}, {"text": "Scatter plots, histograms, and box plots", "isCorrect": false, "rationale": "These are covered in Part 5: Relationships and Comparisons."}, {"text": "Tally charts and frequency tables", "isCorrect": false, "rationale": "These basic tools are covered in Part 1."}]}, {"question": "What does the text warn about bar charts in Part 2?", "options": [{"text": "They are difficult to create", "isCorrect": false, "rationale": "The text does not warn about difficulty creating bar charts."}, {"text": "They can be made to lie", "isCorrect": true, "rationale": "The text states: 'You will also learn how bar charts can be made to lie.'"}, {"text": "They should only be used for scientific data", "isCorrect": false, "rationale": "The text says bar charts are 'one of the most common charts in the world,' not limited to science."}, {"text": "They are being replaced by newer chart types", "isCorrect": false, "rationale": "The text does not suggest bar charts are being replaced."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
