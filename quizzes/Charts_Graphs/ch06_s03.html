    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary objective of learning about misleading pie charts in this section?", "options": [{"text": "To appreciate the artistic freedom in data visualization.", "isCorrect": false, "rationale": "The section emphasizes identifying and correcting deceptive techniques, not promoting artistic freedom that distorts data."}, {"text": "To master creating visually stunning 3D charts.", "isCorrect": false, "rationale": "The text explicitly advises against using 3D charts because they distort perception and mislead readers."}, {"text": "To identify common deceptive techniques and describe how to correct them.", "isCorrect": true, "rationale": "The learning objectives state students will 'identify three types of misleading pie charts... explain why each technique is misleading, and describe how to correct each problem.'"}, {"text": "To understand the history of pie chart invention.", "isCorrect": false, "rationale": "While the history of pie charts is briefly mentioned, it is not the primary objective of understanding misleading charts."}]}, {"question": "A student argues that a 3D pie chart is not misleading as long as the correct percentages are clearly labeled on each slice. How should an instructor respond based on the text?", "options": [{"text": "Agree, as numerical labels override visual distortion.", "isCorrect": false, "rationale": "The text explicitly states this is a 'Common Misconception' and that 'readers form impressions from the visual size, not the label, and the visual is what misleads them.'"}, {"text": "Disagree, explaining that visual size impressions often dominate numerical labels, leading to misinterpretation.", "isCorrect": true, "rationale": "The section clarifies that even with correct labels, the visual distortion of 3D charts causes slices at the front to appear larger and misleads the reader's perception."}, {"text": "Suggest using a different color palette to make the 3D chart clearer.", "isCorrect": false, "rationale": "Color palette changes do not address the fundamental issue of visual distortion caused by the 3D effect itself."}, {"text": "Advise adding more slices to distribute the distortion evenly.", "isCorrect": false, "rationale": "Adding more slices makes a pie chart harder to read and does not resolve the inherent distortion of a 3D effect."}]}, {"question": "You are presented with two pie charts showing election results. Chart X is tilted, making Candidate A's slice at the front appear significantly larger than Candidate B's, even though their actual percentages are only 3 points apart. Chart Y is a flat circle, where the difference between A and B is appropriately subtle. Which misleading technique is Chart X employing?", "options": [{"text": "Exploded slices.", "isCorrect": false, "rationale": "Exploded slices involve segments pulled away from the pie, not a tilting effect that distorts depth perception."}, {"text": "Slices not summing to 100%.", "isCorrect": false, "rationale": "This technique refers to the numerical percentages themselves being incorrect, not a visual distortion of correctly represented percentages."}, {"text": "3D distortion.", "isCorrect": true, "rationale": "The description matches the definition of 3D distortion, where 'Slices at the “front” of the tilted chart appear visually larger than slices at the “back,” even when they represent the same percentage.'"}, {"text": "Too many slices.", "isCorrect": false, "rationale": "This technique refers to having an excessive number of categories, making the chart difficult to read, not a visual distortion of individual slices due to perspective."}]}, {"question": "The primary reason 3D distortion in a pie chart is misleading is that it:", "options": [{"text": "Adds too much information, overwhelming the reader.", "isCorrect": false, "rationale": "The text states that adding a third dimension to a 2D dataset 'never adds information and always distorts perception.'"}, {"text": "Prevents accurate calculation of slice percentages.", "isCorrect": false, "rationale": "While the visual is distorted, the underlying percentages can still be displayed correctly, it's the visual impression that's wrong."}, {"text": "Makes slices at the front appear disproportionately larger than those at the back, even if percentages are similar.", "isCorrect": true, "rationale": "The definition of 3D distortion explicitly states this: 'Slices at the “front” of the tilted chart appear visually larger than slices at the “back,” even when they represent the same percentage.'"}, {"text": "Confuses readers with an excessive number of colors.", "isCorrect": false, "rationale": "Color choice is not the primary factor in 3D distortion; the tilting and depth effect are."}]}, {"question": "An 'exploded slice' in a pie chart is considered misleading when:", "options": [{"text": "It highlights the smallest category in the chart.", "isCorrect": false, "rationale": "Highlighting a specific category is identified as a legitimate use of an exploded slice, as long as it doesn't distort proportion."}, {"text": "It makes the separated slice visually appear to be a larger proportion than its data supports.", "isCorrect": true, "rationale": "The text states, 'But when exploding a slice makes it appear to be a larger proportion of the whole, it becomes misleading.'"}, {"text": "It uses a contrasting color for the separated slice.", "isCorrect": false, "rationale": "Color contrast can draw attention but is not inherently misleading in the way visual size distortion is."}, {"text": "It is used to draw attention to a specific category.", "isCorrect": false, "rationale": "The text states this can be a legitimate use if it does not make the slice appear to be a larger proportion."}]}, {"question": "A survey asks, 'Which of these features do you find most appealing? (Select all that apply).' The results are then presented as a pie chart where each feature's percentage is shown. Why might this chart be misleading?", "options": [{"text": "The question structure inherently leads to responses that do not sum to 100% for a part-to-whole visualization.", "isCorrect": true, "rationale": "The text explains that if 'The question allowed respondents to pick more than one option, but the chart treats it like a part-to-whole visualization (when it shouldn't be),' the percentages will not add up to 100% and will create a false picture."}, {"text": "Pie charts are not suitable for displaying survey data.", "isCorrect": false, "rationale": "Pie charts can be suitable for single-choice survey data, but not for multiple-choice where responses overlap."}, {"text": "The number of features selected is too high for a pie chart.", "isCorrect": false, "rationale": "While 'too many slices' is a different misleading technique, the core issue here is the sum of percentages due to the survey question type, not necessarily the quantity of features alone."}, {"text": "Only 3D pie charts are misleading in survey contexts.", "isCorrect": false, "rationale": "Misleading charts due to percentages not summing to 100% can occur with 2D charts as well, independent of 3D effects."}]}, {"question": "What is a significant problem associated with a pie chart containing 'too many slices,' such as 12 different categories?", "options": [{"text": "It makes the chart appear more sophisticated and detailed.", "isCorrect": false, "rationale": "The text focuses on the negative impact on readability and comparison, not perceived sophistication."}, {"text": "It becomes difficult to accurately compare the relative sizes of similar slices and determine their rank.", "isCorrect": true, "rationale": "The example states, 'Many slices are nearly the same size. It is difficult to tell which slice is 3rd or 4th largest,' making comparison challenging."}, {"text": "It always signifies that the data has been manipulated.", "isCorrect": false, "rationale": "Having too many slices is a design flaw that hinders readability, not necessarily an indication of data manipulation."}, {"text": "It automatically triggers 3D distortion, regardless of design.", "isCorrect": false, "rationale": "The number of slices is unrelated to whether a chart employs 3D distortion."}]}, {"question": "You have data on the market share of 15 different smartphone brands. If you were to visualize this data, which type of chart would be *most appropriate* to clearly show the ranking and relative sizes of each brand, and why?", "options": [{"text": "A 3D pie chart, because it makes smaller slices more noticeable.", "isCorrect": false, "rationale": "3D pie charts are misleading and do not improve visibility of small slices; they distort perception."}, {"text": "An exploded slice pie chart, to highlight the top 3 brands.", "isCorrect": false, "rationale": "Even with exploded slices, a pie chart with 15 categories would be difficult to read and compare effectively due to 'too many slices.'"}, {"text": "A horizontal bar chart, because it allows for easy ranking and comparison of many categories.", "isCorrect": true, "rationale": "The text states a horizontal bar chart 'solves all these problems' when there are too many slices, as 'Bars are easy to rank from longest to shortest' and 'Small differences between similar values are visible.'"}, {"text": "A pie chart with a very detailed legend to match colors.", "isCorrect": false, "rationale": "A detailed legend does not resolve the fundamental difficulty of comparing many small, similar-sized slices in a pie chart."}]}, {"question": "Who is credited with inventing the pie chart?", "options": [{"text": "Candidate A.", "isCorrect": false, "rationale": "Candidate A is a hypothetical figure from an election results example, not the inventor."}, {"text": "William Playfair.", "isCorrect": true, "rationale": "The 'chartchampion' section explicitly states: 'William Playfair (1759–1823) — Inventor of the Pie Chart... In 1801, he published a statistical atlas that contained the first known pie charts.'"}, {"text": "Chart Champion.", "isCorrect": false, "rationale": "Chart Champion is the title of the section highlighting the inventor, not the inventor's name."}, {"text": "John Tukey.", "isCorrect": false, "rationale": "John Tukey is a notable statistician but is not mentioned in the text as the inventor of the pie chart."}]}, {"question": "Based on the principles learned in this section, if you encounter a pie chart online that shows 'Customer Preferences for New Features' with 3D effects and one slice slightly pulled out, what is the *most responsible* action to take to ensure accurate interpretation?", "options": [{"text": "Assume the chart is entirely accurate as long as it looks professional.", "isCorrect": false, "rationale": "The text warns that misleading charts can be intentionally designed and appearance does not guarantee accuracy."}, {"text": "Focus solely on the visual impression of the largest slice.", "isCorrect": false, "rationale": "The text advises against trusting visual impressions, especially with 3D charts, as they can be highly misleading about relative sizes."}, {"text": "Disregard the chart completely as all pie charts are inherently misleading.", "isCorrect": false, "rationale": "The text states, 'Pie charts can be honest and useful,' provided they avoid misleading techniques."}, {"text": "Seek out the percentage labels for all slices and consider a 2D alternative to cross-reference visual distortion.", "isCorrect": true, "rationale": "The 'watchout' section advises: 'Always look for a flat 2D pie chart, and always read the percentage labels rather than trusting your eye's impression of slice size' when seeing 3D or tilted charts. Exploded slices also warrant checking if they truly represent proportion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
