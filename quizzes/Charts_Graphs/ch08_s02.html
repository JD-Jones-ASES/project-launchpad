<script>
var QUESTIONS = [{"question": "A data analyst needs to compare the population growth of five different countries over a decade. Which of the following best explains why a multi-line graph would be the most effective visualization tool for this task?", "options": [{"text": "It allows for the addition of all five countries' population data to show a total global trend.", "isCorrect": false, "rationale": "This describes a common misconception mentioned in the text: students sometimes try to add the lines together instead of reading them separately. The purpose of a multi-line graph is to compare individual trends, not sum them."}, {"text": "It enables instant comparison of trends and differences between countries on a single set of axes.", "isCorrect": true, "rationale": "The text states, 'That way you can see the trends together and spot the differences instantly,' which is the primary benefit of a multi-line graph for comparison."}, {"text": "It provides separate, detailed views for each country, avoiding visual clutter.", "isCorrect": false, "rationale": "Drawing separate graphs would provide separate views but makes comparison harder. A multi-line graph combines them precisely for comparison, which can introduce some clutter if poorly designed, but its advantage is the direct comparison."}, {"text": "It simplifies data by averaging the population growth across all countries.", "isCorrect": false, "rationale": "A multi-line graph displays individual data series and does not automatically average them. Its purpose is to show distinct trends side-by-side, not a single averaged trend."}]}, {"question": "According to the 'how to read' section, after reading the title of a multi-line graph, what is the *next* essential step to ensure accurate interpretation?", "options": [{"text": "Immediately identify the highest and lowest values on the y-axis.", "isCorrect": false, "rationale": "Identifying highest and lowest values is part of comparing the lines, which comes later in the process after understanding the axes and individual trends."}, {"text": "Read the legend to match each line's color or style to its represented group.", "isCorrect": true, "rationale": "The 'howtoread' section explicitly lists 'Read the legend' as Step 2, immediately following 'Read the title.' The text also stresses, 'Always model “check the legend first” as a habit.'"}, {"text": "Describe the trend of each individual line separately.", "isCorrect": false, "rationale": "Describing individual trends is Step 4 in the 'howtoread' process, occurring after reading the title, legend, and axis labels."}, {"text": "Determine where any lines cross to identify points of equality.", "isCorrect": false, "rationale": "Identifying crossing points is part of comparing the lines, which is Step 5 in the reading process, coming much later than the initial steps."}]}, {"question": "On a multi-line graph, if the blue line (representing City A's average temperature) crosses the orange line (representing City B's average temperature) in July, what does this signify?", "options": [{"text": "City A's temperature consistently exceeds City B's after July.", "isCorrect": false, "rationale": "A crossing point only indicates equality at that specific moment. While one line might go above the other, 'consistently exceeds' cannot be concluded solely from the crossing point without observing the subsequent trend."}, {"text": "The average temperatures for City A and City B were equal in July.", "isCorrect": true, "rationale": "The 'watchout' section explicitly states, 'When two lines cross on a multi-line graph, it means those two groups had equal values at that moment.' The 'Common Misconceptions' also clarifies, 'At the crossing point, the two values are equal.'"}, {"text": "Both City A and City B experienced unusual temperature spikes in July.", "isCorrect": false, "rationale": "A crossing point indicates equality, not necessarily a 'spike' or an 'unusual' event. It's a natural point of comparison in the data."}, {"text": "The data for City A and City B cannot be accurately compared in July due to the overlap.", "isCorrect": false, "rationale": "The crossing point is a crucial moment for comparison, signifying exactly when the two values were identical, not when data becomes incomparable."}]}, {"question": "A student is analyzing a multi-line graph showing sales for three product categories. They are observed trying to sum the values of all three lines at each point in time. Which common misconception are they likely exhibiting?", "options": [{"text": "Overlooking the legend and assuming lines are directly labeled.", "isCorrect": false, "rationale": "This is a different common misconception mentioned in the text, relating to identifying which line belongs to which group, not how the data on the lines should be interpreted."}, {"text": "Attempting to add the lines together instead of reading them separately.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states: 'Students sometimes try to add the lines together instead of reading them separately. Stress that each line tells one group's story independently.'"}, {"text": "Confusing crossing lines as a point where data becomes invalid.", "isCorrect": false, "rationale": "This is another common misconception, but it pertains to the meaning of crossing lines, not the summing of individual line values."}, {"text": "Misinterpreting the x-axis as representing categories instead of time.", "isCorrect": false, "rationale": "While a possible error in reading graphs, this specific misconception is not listed in the 'Common Misconceptions' section of the provided text."}]}, {"question": "Based on the 'Worked Example: Rainfall in Three Cities' graph, if a farming community requires consistent rainfall throughout the first half of the year (January-June) to support its crops, which city would best meet their needs?", "options": [{"text": "Sunport, because its rainfall decreases steadily, indicating predictable dryness.", "isCorrect": false, "rationale": "Sunport's rainfall decreases from January to June, meaning it is not consistent and becomes drier, which is unsuitable for a community needing consistent rainfall."}, {"text": "Rainville, as its rainfall increases, ensuring sufficient water by June.", "isCorrect": false, "rationale": "Rainville's rainfall increases steadily, meaning it is not consistent throughout the period. It starts low and ends high, not a flat, consistent pattern."}, {"text": "Mist Creek, due to its flat trend, maintaining rainfall around 2.0-2.2 inches.", "isCorrect": true, "rationale": "The 'Worked Example' describes Mist Creek (green) as having a 'flat' trend, stating it 'Stays close to 2.0–2.2 inches all six months. Trend: flat. Mist Creek has consistent rainfall year-round.' This directly matches the requirement for consistent rainfall."}, {"text": "Both Sunport and Rainville, as their lines cross, indicating periods of shared rainfall patterns.", "isCorrect": false, "rationale": "The crossing point signifies equality at one moment, not consistent rainfall throughout the period for both cities. Their individual trends (decreasing for Sunport, increasing for Rainville) are not consistent."}]}, {"question": "Referencing the 'Worked Example: Rainfall in Three Cities' graph, in which month did Rainville begin to consistently receive more rainfall than Sunport?", "options": [{"text": "January, as Rainville starts lower but quickly surpasses Sunport.", "isCorrect": false, "rationale": "In January, Sunport is significantly rainier (3.2 inches) than Rainville (1.5 inches), so Rainville did not receive more rainfall."}, {"text": "March-April, around the time their lines cross, marking the shift.", "isCorrect": true, "rationale": "The 'Worked Example' states, 'The Sunport and Rainville lines cross somewhere around March or April — the point where their rainfall amounts were about equal.' After this crossing point, Rainville's line goes above Sunport's, indicating Rainville receives more rain."}, {"text": "June, when the widest gap between them is observed.", "isCorrect": false, "rationale": "By June, Rainville is already receiving significantly more rainfall than Sunport (widest gap). The shift where Rainville *began* to receive more occurred earlier, at the crossing point."}, {"text": "It's impossible to tell, as their trends are too divergent.", "isCorrect": false, "rationale": "The crossing point clearly indicates when their values become equal and subsequently, when one begins to consistently exceed the other. This is a key analytical point for multi-line graphs."}]}, {"question": "Considering the trend description in the 'Worked Example' for the rainfall graph, which statement accurately characterizes the rainfall pattern for Rainville from January through June?", "options": [{"text": "Rainville experiences a decreasing rainfall trend, becoming drier over time.", "isCorrect": false, "rationale": "This describes Sunport's trend, not Rainville's. Rainville's trend is explicitly stated as increasing."}, {"text": "Rainville maintains a consistent rainfall level, showing a flat trend.", "isCorrect": false, "rationale": "This describes Mist Creek's trend. Rainville's trend is clearly increasing, not flat."}, {"text": "Rainville shows an increasing rainfall trend, with its rainy season occurring in the summer.", "isCorrect": true, "rationale": "The 'Worked Example' explicitly states for Rainville: 'Starts low (1.5 inches in January) and increases steadily to 4.2 inches in June. Trend: increasing. Rainville's rainy season is in the summer.'"}, {"text": "Rainville's rainfall fluctuates significantly, with no clear trend identifiable.", "isCorrect": false, "rationale": "The example states Rainville's rainfall 'increases steadily,' indicating a clear and consistent increasing trend, not significant fluctuation without a trend."}]}, {"question": "Based on the 'Worked Example' analysis of the rainfall graph, when does the widest gap between Sunport and Rainville occur, and what does it signify?", "options": [{"text": "In January, indicating Sunport has significantly more rain than Rainville.", "isCorrect": false, "rationale": "In January, Sunport has more rain, but the difference is 1.7 inches (3.2 - 1.5). This is not the *widest* gap mentioned in the example."}, {"text": "Around March or April, signifying the point where their rainfall amounts are equal.", "isCorrect": false, "rationale": "March or April is when the lines cross, meaning their rainfall amounts are equal, not when the widest gap occurs. A gap of zero is not the 'widest.'"}, {"text": "In June, showing Rainville has 3.0 more inches of rain than Sunport.", "isCorrect": true, "rationale": "The 'Worked Example' states: 'The widest gap between Sunport and Rainville occurs in June, when Rainville has 3.0 more inches than Sunport (4.2 - 1.2 = 3.0 inches).'"}, {"text": "It's impossible to determine the widest gap without additional data points.", "isCorrect": false, "rationale": "The 'Worked Example' explicitly provides this information based on the graph presented, demonstrating that it *is* determinable."}]}, {"question": "According to the 'howtoread' section, which step should be performed immediately *after* reading the legend and matching lines to groups, but *before* describing each line's trend separately?", "options": [{"text": "Compare the lines to identify highest and lowest values.", "isCorrect": false, "rationale": "Comparing lines is Step 5 in the process, which comes after describing each line's trend individually."}, {"text": "Read the axis labels to understand what x and y represent.", "isCorrect": true, "rationale": "The 'howtoread' section lists: 1. Read the title, 2. Read the legend, 3. Read the axis labels. Therefore, reading axis labels comes after the legend and before describing individual trends (Step 4)."}, {"text": "Read the title of the graph.", "isCorrect": false, "rationale": "Reading the title is Step 1, which occurs *before* reading the legend."}, {"text": "Draw a conclusion based on the overall data.", "isCorrect": false, "rationale": "Drawing a conclusion is the final step in the process, after all analysis and comparisons have been made."}]}, {"question": "The text mentions William Playfair in the 'didyouknow' section. What is his primary contribution to data visualization, as implied by the passage?", "options": [{"text": "He developed the concept of adding lines together on a graph.", "isCorrect": false, "rationale": "Adding lines together is identified as a common misconception to avoid, not a contribution to data visualization by Playfair."}, {"text": "He was the first to create digital graphs for data analysis.", "isCorrect": false, "rationale": "Playfair lived in the 1780s, long before digital technology existed. His contributions were to manual graphing techniques."}, {"text": "He popularized the use of color to distinguish multiple lines and invented several fundamental chart types.", "isCorrect": true, "rationale": "The 'didyouknow' section states he 'popularized the idea of using color to distinguish multiple lines' and 'invented the line graph, the bar chart, AND the pie chart.'"}, {"text": "He designed the first legend key for interpreting complex charts.", "isCorrect": false, "rationale": "While he popularized distinguishing lines with color, the text doesn't explicitly state he designed 'the first legend key.' It focuses on his broader inventions and popularization of chart elements."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
