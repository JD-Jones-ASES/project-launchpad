<div class="quiz-container">

        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the primary purpose of studying correlation in a scatter plot?", "options": [{"text": "To determine the exact mathematical formula linking the two variables.", "isCorrect": false, "rationale": "While correlation suggests a relationship, the text emphasizes 'eyeballing' and estimation rather than exact mathematical formulas for trend lines at this level, and correlation itself only describes the *tendency*."}, {"text": "To identify whether two variables tend to move together or in opposite directions, or if there's no clear relationship.", "isCorrect": true, "rationale": "The definition states correlation 'describes the relationship between two variables' and explicitly mentions increasing together (positive), one increasing as the other decreases (negative), or no visible pattern (no correlation). This captures the essence of the primary purpose."}, {"text": "To calculate the average value of each variable independently.", "isCorrect": false, "rationale": "Calculating the average of individual variables is a separate statistical task and not the primary purpose of analyzing correlation in a scatter plot, which focuses on the relationship *between* variables."}, {"text": "To visualize the distribution of a single variable.", "isCorrect": false, "rationale": "Scatter plots and correlation analysis always involve *two* variables to show their relationship, not just the distribution of a single variable."}]}, {"question": "A researcher collects data on the number of hours students spend playing video games each week and their average GPA. They observe that as video game hours increase, the average GPA tends to decrease. What type of correlation is this likely to be?", "options": [{"text": "Positive correlation", "isCorrect": false, "rationale": "A positive correlation would mean that as video game hours increase, GPA would also tend to increase."}, {"text": "No correlation", "isCorrect": false, "rationale": "No correlation would mean there is no visible pattern or trend between video game hours and GPA."}, {"text": "Strong correlation", "isCorrect": false, "rationale": "While it might be strong, 'strong' describes the *strength* of the relationship (how tightly clustered the dots are), not the *direction* (positive or negative). The question specifically asks for the *type* based on direction."}, {"text": "Negative correlation", "isCorrect": true, "rationale": "The text defines negative correlation as 'one tends to decrease as the other increases'. In this scenario, as video game hours (one variable) increase, GPA (the other variable) tends to decrease, fitting this definition."}]}, {"question": "Which visual characteristic on a scatter plot indicates 'no correlation'?", "options": [{"text": "The dots generally slope upward from left to right.", "isCorrect": false, "rationale": "Dots sloping upward from left to right indicate a positive correlation."}, {"text": "The dots are tightly clustered around a diagonal line.", "isCorrect": false, "rationale": "Tightly clustered dots indicate a strong correlation, which can be positive or negative, but not 'no correlation'."}, {"text": "The dots appear as a random cloud with no discernible pattern or direction.", "isCorrect": true, "rationale": "The text explicitly states for no correlation: 'there is no visible trend. The dots look like a random cloud.'"}, {"text": "The dots generally slope downward from left to right.", "isCorrect": false, "rationale": "Dots sloping downward from left to right indicate a negative correlation."}]}, {"question": "What is the key indicator that a correlation is considered 'strong' rather than 'weak'?", "options": [{"text": "The correlation is positive, meaning both variables increase together.", "isCorrect": false, "rationale": "Strength ('strong' or 'weak') refers to how tightly the dots cluster, while 'positive' refers to the direction. A negative correlation can also be strong."}, {"text": "The dots are widely scattered across the plot, making the trend hard to discern.", "isCorrect": false, "rationale": "Widely scattered dots indicate a *weak* correlation, as the trend is harder to see amid the scatter."}, {"text": "The dots cluster tightly around a diagonal direction, making the trend easy to see.", "isCorrect": true, "rationale": "The definition states: 'A strong correlation is one where the dots cluster tightly around a diagonal direction — it is easy to see the trend.'"}, {"text": "There are very few data points plotted on the scatter plot.", "isCorrect": false, "rationale": "The number of data points can influence the perceived clarity, but 'strong' or 'weak' specifically refers to the *clustering* of the points, regardless of their total count, assuming enough points to establish a pattern."}]}, {"question": "A common misconception is confusing 'strong' correlation with 'positive' correlation. How does the text clarify this distinction?", "options": [{"text": "It states that all strong correlations must be positive, and weak correlations are always negative.", "isCorrect": false, "rationale": "This statement is incorrect. The text clarifies that strength (tightly clustered vs. widely scattered) is independent of direction (positive vs. negative)."}, {"text": "It explains that 'strong' refers to how tightly clustered the dots are, while 'positive' refers to the direction of the trend.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states: 'Students sometimes confuse “strong” with “positive” (thinking negative correlation is weaker). Strong means tightly clustered; weak means widely scattered — positive vs. negative is just the direction.'"}, {"text": "It suggests that only positive correlations can have a trend line drawn through them.", "isCorrect": false, "rationale": "Trend lines can be drawn for both strong positive and strong negative correlations."}, {"text": "It notes that 'strong' correlation implies a perfectly straight line, while 'positive' allows for some curvature.", "isCorrect": false, "rationale": "The text mentions curved patterns are also correlations but states the trend line approach (straight line) is more complex for them. It doesn't link 'strong' directly to a perfectly straight line versus 'positive' allowing curvature."}]}, {"question": "What is the primary purpose of drawing a trend line through a scatter plot?", "options": [{"text": "To connect every single dot on the scatter plot for perfect accuracy.", "isCorrect": false, "rationale": "A trend line summarizes the overall relationship and doesn't connect individual dots; in fact, about half the dots should be above and half below it."}, {"text": "To identify outliers that don't fit the general pattern.", "isCorrect": false, "rationale": "While a trend line can make outliers more apparent, its primary purpose is to summarize the central tendency, not solely to identify outliers."}, {"text": "To summarize the overall direction and general relationship between the variables.", "isCorrect": true, "rationale": "The definition states a trend line 'summarizes the overall direction of the relationship' and 'summarizes the relationship' in the preceding paragraph."}, {"text": "To calculate the precise value of the y-variable for any given x-variable without any error.", "isCorrect": false, "rationale": "The 'Watch Out' section emphasizes that 'The Trend Line Is Not Perfect' and provides an 'estimate — individual results will vary,' meaning it's not for precise, error-free calculation."}]}, {"question": "When drawing a trend line by eye, which of the following steps is crucial for accurately representing the data's overall direction?", "options": [{"text": "Ensuring the line only passes through existing data points.", "isCorrect": false, "rationale": "The instructions for drawing a trend line by eye do not require the line to pass through existing data points; rather, it should represent the general pattern, with points above and below."}, {"text": "Tilting the ruler to match the general direction of the dots, ensuring roughly equal numbers of dots above and below the line.", "isCorrect": true, "rationale": "The 'Drawing a Trend Line by Eye' section explicitly states: 'Place your ruler through that center point, tilting it to match the direction of the dots.' and 'Aim to have roughly the same number of dots above the line as below.'"}, {"text": "Making sure the line starts at the origin (0,0) of the scatter plot.", "isCorrect": false, "rationale": "The line should start and end at points that represent the range of the data, not necessarily the origin, unless the data naturally starts there."}, {"text": "Only drawing the line through the strongest correlation clusters, ignoring any weaker parts.", "isCorrect": false, "rationale": "A trend line is meant to summarize the *entire* relationship shown by *all* the dots in the pattern, not just selected clusters."}]}, {"question": "Based on the 'Worked Example: Study Hours vs. Test Scores,' if a student studied for 3.5 hours, the trend line suggested a score of roughly 77–78. What does this 'suggested score' primarily represent?", "options": [{"text": "The minimum score a student studying 3.5 hours would definitely achieve.", "isCorrect": false, "rationale": "The text states it's an 'estimate' and 'individual results will vary,' so it's not a guaranteed minimum."}, {"text": "The exact score that any student studying 3.5 hours would receive without fail.", "isCorrect": false, "rationale": "The 'Watch Out' section explicitly warns that 'The Trend Line Is Not Perfect' and individual points scatter above and below, meaning it's not an exact guarantee."}, {"text": "The average or typical test score expected for a student who studied 3.5 hours.", "isCorrect": true, "rationale": "The text states, 'A trend line tells you what a “typical” result looks like given a certain x-value.' and 'The line shows the average tendency — not a guarantee.'"}, {"text": "The highest possible score a student could achieve with 3.5 hours of study.", "isCorrect": false, "rationale": "The trend line represents the average, not the maximum possible score. Students could potentially score higher than the trend line predicts."}]}, {"question": "The 'Watch Out' section titled 'The Trend Line Is Not Perfect' emphasizes a critical point about using trend lines. What is this point?", "options": [{"text": "Trend lines are only useful for positive correlations, not negative ones.", "isCorrect": false, "rationale": "Trend lines are used for both positive and negative correlations to summarize their relationships."}, {"text": "All data points must fall precisely on the trend line for it to be valid.", "isCorrect": false, "rationale": "The text explicitly states 'individual data points will scatter above and below the line,' and the drawing instruction says 'About half the dots should fall above the line and half below.'"}, {"text": "A trend line shows the average tendency, but individual results will vary and may not match the line exactly.", "isCorrect": true, "rationale": "The 'Watch Out' section concludes: 'The line shows the average tendency — not a guarantee.' It also mentions 'individual data points will scatter above and below the line' and 'individual results will vary.'"}, {"text": "It is impossible to draw a trend line accurately without complex mathematical formulas.", "isCorrect": false, "rationale": "The text provides instructions for 'Drawing a Trend Line by Eye' and states 'You do not need a formula to draw a trend line by eye' at this level."}]}, {"question": "Consider a scatter plot showing a strong negative correlation between the hours spent exercising per week and resting heart rate. If the trend line suggests that 5 hours of exercise correlates to a resting heart rate of 60 bpm, what would a reasonable estimate for a student exercising 7 hours per week be, assuming the trend continues?", "options": [{"text": "A resting heart rate of approximately 60 bpm, as the trend line is constant.", "isCorrect": false, "rationale": "A negative correlation means as one variable increases, the other decreases. Therefore, increased exercise hours should lead to a *lower* resting heart rate, not a constant one."}, {"text": "A resting heart rate lower than 60 bpm.", "isCorrect": true, "rationale": "Given a strong *negative* correlation, as the hours of exercise (x-variable) increase from 5 to 7, the resting heart rate (y-variable) is expected to *decrease*. Therefore, a reasonable estimate would be lower than 60 bpm."}, {"text": "A resting heart rate higher than 60 bpm.", "isCorrect": false, "rationale": "A higher heart rate would indicate a positive correlation, but the question specifies a *negative* correlation."}, {"text": "The trend line provides no basis for estimation beyond the specific points given.", "isCorrect": false, "rationale": "The text explicitly states: 'Use the trend line for estimation,' demonstrating that trend lines can be used to estimate values for x-values not explicitly plotted, assuming the trend continues."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
