    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, approximately how fast can the human brain process an image?", "options": [{"text": "About 1 second", "isCorrect": false, "rationale": "The text states the brain can process an image much faster than one second."}, {"text": "About 13 milliseconds", "isCorrect": true, "rationale": "The text states that 'Scientists estimate that the human brain can process an image in as little as 13 milliseconds — way faster than reading rows of numbers.'"}, {"text": "About 100 milliseconds", "isCorrect": false, "rationale": "While fast, 100 milliseconds is not what the text specifies. The text says 13 milliseconds."}, {"text": "About 5 seconds", "isCorrect": false, "rationale": "Five seconds is far too slow. The text emphasizes the brain's visual processing speed is measured in milliseconds."}], "id": "q01"}, {"question": "Who is credited with inventing the bar chart, the line graph, and the pie chart?", "options": [{"text": "Florence Nightingale", "isCorrect": false, "rationale": "Florence Nightingale used charts to save soldiers' lives, but she did not invent the bar chart, line graph, or pie chart."}, {"text": "William Playfair", "isCorrect": true, "rationale": "The text states that William Playfair 'invented the bar chart in 1786, the line graph around the same time, and the pie chart in 1801.'"}, {"text": "Leonardo da Vinci", "isCorrect": false, "rationale": "Leonardo da Vinci is not mentioned in the text as the inventor of these chart types."}, {"text": "Isaac Newton", "isCorrect": false, "rationale": "Isaac Newton is not mentioned in the text as the inventor of these chart types."}], "id": "q02"}, {"question": "In what year did William Playfair invent the bar chart?", "options": [{"text": "1801", "isCorrect": false, "rationale": "1801 is the year Playfair invented the pie chart, not the bar chart."}, {"text": "1759", "isCorrect": false, "rationale": "1759 is the year Playfair was born, not when he invented the bar chart."}, {"text": "1786", "isCorrect": true, "rationale": "The text explicitly states that Playfair 'invented the bar chart in 1786.'"}, {"text": "1823", "isCorrect": false, "rationale": "1823 is the year Playfair died, not when he invented the bar chart."}], "id": "q03"}, {"question": "What was William Playfair's nationality and profession?", "options": [{"text": "An English mathematician", "isCorrect": false, "rationale": "Playfair was Scottish, not English, and was described as an engineer and economist."}, {"text": "A Scottish engineer and economist", "isCorrect": true, "rationale": "The text describes William Playfair as 'a Scottish engineer and economist who basically invented the modern chart.'"}, {"text": "A French artist and inventor", "isCorrect": false, "rationale": "Playfair was Scottish, not French, and was an engineer and economist."}, {"text": "An American statistician", "isCorrect": false, "rationale": "Playfair was Scottish, not American, and was described as an engineer and economist."}], "id": "q04"}, {"question": "What common misconception about charts does the text address?", "options": [{"text": "Students think charts are only used in math class.", "isCorrect": false, "rationale": "The text mentions charts appearing in many contexts but does not cite this as the common misconception."}, {"text": "Students think charts are just 'decoration' for numbers.", "isCorrect": true, "rationale": "The teacher note explicitly states: 'Students sometimes think charts are just \"decoration\" for numbers. Emphasize that a well-made chart reveals patterns that would be nearly impossible to see in a raw table.'"}, {"text": "Students think charts are too difficult to read.", "isCorrect": false, "rationale": "The text does not identify difficulty reading charts as a common misconception."}, {"text": "Students think only scientists use charts.", "isCorrect": false, "rationale": "The text does not identify this as a common misconception."}], "id": "q05"}, {"question": "What was Playfair's stated goal for his charts?", "options": [{"text": "To make tables of numbers obsolete", "isCorrect": false, "rationale": "Playfair did not say he wanted to make tables obsolete."}, {"text": "To make as much information as possible visible at a single glance", "isCorrect": true, "rationale": "The text quotes Playfair as writing that his goal was to make 'as much information as possible visible at a single glance.'"}, {"text": "To entertain the public with colorful pictures", "isCorrect": false, "rationale": "Playfair's stated goal was about efficient information communication, not entertainment."}, {"text": "To replace written language with visual symbols", "isCorrect": false, "rationale": "Playfair's goal was about making data visible quickly, not replacing written language."}], "id": "q06"}, {"question": "According to the 'Did You Know' box, what is the oldest known data visualization?", "options": [{"text": "A cave painting of animal herds", "isCorrect": false, "rationale": "While cave paintings are mentioned, they are not identified as the oldest known data visualization."}, {"text": "William Playfair's first bar chart", "isCorrect": false, "rationale": "Playfair's bar chart was from 1786, far more recent than the oldest known visualization."}, {"text": "A 10th-century astronomical chart showing planetary positions across time", "isCorrect": true, "rationale": "The text states: 'The oldest known data visualization is a 10th-century astronomical chart discovered in a medieval manuscript, showing the positions of the planets across time.'"}, {"text": "Florence Nightingale's chart of soldier deaths", "isCorrect": false, "rationale": "Nightingale's charts were from the 19th century, much more recent than the oldest known visualization."}], "id": "q07"}, {"question": "How did Florence Nightingale use charts according to the text?", "options": [{"text": "She used charts to track hospital construction costs.", "isCorrect": false, "rationale": "The text does not mention hospital construction costs in relation to Nightingale."}, {"text": "She used charts to save soldiers' lives.", "isCorrect": true, "rationale": "The text states: 'Florence Nightingale used charts to save soldiers' lives.'"}, {"text": "She used charts to teach mathematics to nurses.", "isCorrect": false, "rationale": "The text does not mention teaching mathematics in relation to Nightingale."}, {"text": "She invented the pie chart for medical reports.", "isCorrect": false, "rationale": "The pie chart was invented by William Playfair, not Florence Nightingale."}], "id": "q08"}, {"question": "Why does the text compare a table of data to a bar chart showing the same information?", "options": [{"text": "To prove that tables are always inferior to charts", "isCorrect": false, "rationale": "The text does not claim tables are always inferior; it makes the point about speed of pattern recognition."}, {"text": "To show that bar charts use less space than tables", "isCorrect": false, "rationale": "The comparison is not about space but about how quickly the brain processes visual vs. numerical information."}, {"text": "To demonstrate that the chart reveals patterns almost instantly compared to the table", "isCorrect": true, "rationale": "The text shows both formats and notes that 'The bar chart reveals the pattern — Math is the most popular subject — almost instantly,' demonstrating visual processing speed."}, {"text": "To show that charts are more colorful than tables", "isCorrect": false, "rationale": "The comparison is about pattern recognition speed, not aesthetics."}], "id": "q09"}, {"question": "According to the text, how far back might data tracking with ancient bone tools go?", "options": [{"text": "About 1,000 years", "isCorrect": false, "rationale": "The 1,000-year figure refers to the 10th-century astronomical chart, not the ancient bone tools."}, {"text": "About 5,000 years", "isCorrect": false, "rationale": "The text states a much larger figure for the age of potential bone tool data tracking."}, {"text": "About 20,000 years", "isCorrect": true, "rationale": "The text states: 'some ancient bone tools may have been used for tallying and tracking data as far back as 20,000 years ago.'"}, {"text": "About 2,300 years", "isCorrect": false, "rationale": "2,300 years is not mentioned in this section; the text says ancient bone tools may date back 20,000 years."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
