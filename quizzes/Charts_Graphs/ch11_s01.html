    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of a heatmap as described in the text?", "options": [{"text": "To display precise numerical values for individual data points in a table.", "isCorrect": false, "rationale": "While a heatmap can show values, its primary power is in visualizing patterns and trends through color intensity, not precise numerical display like a table."}, {"text": "To represent values in a grid using color intensity, where darker colors typically indicate higher values.", "isCorrect": true, "rationale": "The definition states, 'A heatmap is a data visualization that uses color intensity to represent values in a grid... The darker (or more intense) the cell's color, the higher its value.'"}, {"text": "To compare two separate datasets side-by-side using different color schemes.", "isCorrect": false, "rationale": "A heatmap typically visualizes one dataset with two categorical dimensions, not two entirely separate datasets side-by-side."}, {"text": "To track changes in data over time using a line graph format with varying color thickness.", "isCorrect": false, "rationale": "Heatmaps use a grid structure for two categories, not a line graph format for time series data."}]}, {"question": "Why is the color scale (also called a color ramp or legend) considered an essential component of a heatmap?", "options": [{"text": "It helps to make the heatmap visually appealing by adding diverse colors.", "isCorrect": false, "rationale": "While aesthetics can be a factor, the primary purpose of the color scale is not just visual appeal, but accurate data representation."}, {"text": "It defines the categories represented on the heatmap's horizontal and vertical axes.", "isCorrect": false, "rationale": "The axis labels define the categories, not the color scale."}, {"text": "It provides the key that shows which colors in the grid correspond to specific numerical values.", "isCorrect": true, "rationale": "The text defines the color scale as 'the key that shows which colors correspond to which values. It typically appears as a vertical or horizontal bar that grades from the minimum to the maximum value in the data.'"}, {"text": "It automatically highlights the hot spots and cold spots without user interpretation.", "isCorrect": false, "rationale": "The color scale helps the user interpret values to find hot and cold spots; it doesn't highlight them automatically."}]}, {"question": "According to the 'Common Misconceptions' section, what might be an incorrect assumption if a student sees a very light cell on a heatmap?", "options": [{"text": "That the cell indicates a missing or corrupted data point.", "isCorrect": false, "rationale": "A light cell indicates a low value, not necessarily missing data. Missing data might be represented differently or not at all."}, {"text": "That the cell always represents a value of exactly zero.", "isCorrect": true, "rationale": "The text states, 'Students may assume a white or light cell means zero. In most heatmaps, light means low (but not necessarily zero). Check the color scale minimum to know the actual lowest value.'"}, {"text": "That the cell signifies a 'hot spot' due to its distinct appearance.", "isCorrect": false, "rationale": "A light cell signifies a 'cold spot' (lowest values), not a 'hot spot' (highest values)."}, {"text": "That the color scale is improperly configured for the data.", "isCorrect": false, "rationale": "A light cell simply reflects a value at the lower end of the correctly configured color scale."}]}, {"question": "A teacher is looking at a heatmap displaying student performance on a test, where darker red indicates lower scores. They observe a dark red 'hot spot' in the 'Algebra' subject for 'Monday' students. Based on the textbook's advice, what should the teacher immediately consider before drawing conclusions?", "options": [{"text": "That 'hot spots' always represent positive or desirable outcomes.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text: 'Students sometimes think a “hot” color (red/dark) always means good or desirable. Context matters: in a heatmap of error rates, dark red means bad.'"}, {"text": "That the heatmap is likely mislabeled and the colors are reversed.", "isCorrect": false, "rationale": "There is no indication the heatmap is mislabeled; the interpretation depends on the context provided by the title and axis labels."}, {"text": "The specific context of what the color intensity represents, as 'hot' colors can indicate negative outcomes depending on the data.", "isCorrect": true, "rationale": "The text emphasizes that 'Context matters: in a heatmap of error rates, dark red means bad. Always read the title and axis labels first.' Here, lower scores are bad, so a dark red hot spot is a negative outcome."}, {"text": "That 'hot spots' are typically ignored in favor of overall patterns.", "isCorrect": false, "rationale": "Hot spots are crucial for identifying areas of highest values (which could be good or bad depending on context) and are explicitly part of heatmap analysis."}]}, {"question": "When you are first learning 'How to Read a Heatmap,' what is the recommended initial step to gain an overall understanding of the data being presented?", "options": [{"text": "Immediately find the darkest cell to identify the highest value.", "isCorrect": false, "rationale": "Finding hot spots is a later step. The first step involves understanding the overall context."}, {"text": "Scan individual cells from left to right, like reading text, to get a detailed view.", "isCorrect": false, "rationale": "The 'Common Misconceptions' section explicitly warns against this, recommending to 'step back and look for overall gradients, hot regions, and cold regions.'"}, {"text": "Read the title and axis labels to understand what the heatmap measures and the categories it represents.", "isCorrect": true, "rationale": "The first two steps under 'How to Read a Heatmap' are: '1. Read the title.' and '2. Read the axis labels.'"}, {"text": "Find the color scale and determine if it's a sequential or diverging scale.", "isCorrect": false, "rationale": "Reading the color scale is Step 3, coming after understanding the title and axis labels."}]}, {"question": "Based on the 'Worked Example: Homework Completion by Subject and Day,' what does the consistently lighter coloring for Friday across most subjects suggest?", "options": [{"text": "Students consistently find Friday subjects inherently more difficult than Monday subjects.", "isCorrect": false, "rationale": "The heatmap shows completion rates, not subject difficulty. The pattern suggests a decline in completion, not necessarily increased difficulty."}, {"text": "Students consistently prioritize Monday homework over Friday homework.", "isCorrect": false, "rationale": "While completion is lower, the example suggests general fatigue or decreasing motivation as the week progresses, not necessarily direct prioritization of Monday's tasks over Friday's."}, {"text": "Homework completion tends to decline as the week progresses, possibly due to end-of-week fatigue or extracurricular activities.", "isCorrect": true, "rationale": "The example notes, 'Friday is consistently lighter than Monday across most subjects. Homework completion drops as the week progresses.' The discussion prompt also suggests 'end-of-week fatigue, extracurricular activities.'"}, {"text": "The subjects assigned on Friday have lower maximum possible completion rates.", "isCorrect": false, "rationale": "Completion rates are percentages and are independent of maximum possible rates. The lightness indicates lower observed completion, not a limit on potential completion."}]}, {"question": "In the homework completion heatmap example, what specific pattern indicates that 'Art' homework is consistently prioritized or found easier by students?", "options": [{"text": "Art on Monday (95%) being a hot spot.", "isCorrect": false, "rationale": "While Art on Monday is a hot spot, it doesn't indicate *consistent* prioritization across the *entire week*. A pattern across the whole column is needed."}, {"text": "Art having the lowest completion rate on Friday (65%).", "isCorrect": false, "rationale": "Art actually has high completion rates throughout the week, and Math has the lowest on Friday."}, {"text": "Art being dark throughout the week (85–95%), suggesting high completion rates consistently.", "isCorrect": true, "rationale": "The example states, 'Art is dark throughout the week (85–95%), suggesting students consistently prioritize Art homework.' This describes a column pattern."}, {"text": "The entire 'Art' column being lighter than other subjects.", "isCorrect": false, "rationale": "The 'Art' column is described as consistently *dark*, not lighter, indicating high completion."}]}, {"question": "Which of the following describes a 'hot spot' on a heatmap?", "options": [{"text": "A region where the colors are lightest, indicating the lowest values.", "isCorrect": false, "rationale": "This describes a 'cold spot,' not a 'hot spot'."}, {"text": "A region where the color is most intense (darkest), indicating the highest values.", "isCorrect": true, "rationale": "The definition states, 'A hot spot is a region of a heatmap where the color is most intense (darkest), indicating the highest values.'"}, {"text": "Any cell that falls exactly in the middle of the color scale.", "isCorrect": false, "rationale": "A hot spot specifically refers to the highest values, not middle values."}, {"text": "An area of the heatmap that has no data recorded.", "isCorrect": false, "rationale": "Hot spots represent actual data points with high values, not missing data."}]}, {"question": "Why does the textbook advise against using rainbow (jet or spectrum) color scales for heatmaps, recommending sequential color scales instead?", "options": [{"text": "Rainbow scales are generally less vibrant and harder to distinguish colors.", "isCorrect": false, "rationale": "Rainbow scales are often very vibrant, but their issue is not about vibrancy but interpretation."}, {"text": "Sequential scales are easier to program and require less computational power.", "isCorrect": false, "rationale": "The text focuses on interpretability, not technical implementation difficulty."}, {"text": "Rainbow scales can create misleading visual 'boundaries' due to uneven changes in brightness, making true data patterns harder to discern.", "isCorrect": true, "rationale": "The 'Watch Out' section explicitly states: 'Rainbow scales look exciting, but they have a serious problem: the colors do not increase in brightness evenly, so some regions look more intense than others even when the actual values are close together.'"}, {"text": "Sequential scales are better for representing both positive and negative values simultaneously.", "isCorrect": false, "rationale": "Diverging color scales are designed for both positive and negative values around a central point, not typically sequential scales."}]}, {"question": "Which of the following real-world applications is best suited for visualization using a heatmap, according to the examples provided?", "options": [{"text": "Tracking the daily closing price of a single stock over a year.", "isCorrect": false, "rationale": "This is time-series data, best visualized with a line graph, not a heatmap."}, {"text": "Displaying the exact count of various types of items in a store's inventory.", "isCorrect": false, "rationale": "For exact counts of distinct categories, a bar chart or a detailed table would be more appropriate than a heatmap, which emphasizes patterns over precision."}, {"text": "Visualizing website visitor activity, showing which areas of a webpage users click most often.", "isCorrect": true, "rationale": "The 'Real World' section mentions: 'Website analytics: Businesses use “click heatmaps” to see which parts of a web page visitors click most often,' which perfectly fits this description."}, {"text": "Comparing the heights of individual students in two different classes.", "isCorrect": false, "rationale": "While comparisons can be made, a scatter plot, box plot, or bar chart might be more direct for individual comparisons of heights across two groups."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
