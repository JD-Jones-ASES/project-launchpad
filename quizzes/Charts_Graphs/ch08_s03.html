<script>
var QUESTIONS = [{"question": "What is the primary difference between a line graph and a single-series area chart, as described in the text?", "options": [{"text": "Line graphs are used for discrete data points, while area charts are for continuous data.", "isCorrect": false, "rationale": "The text states an area chart starts with a line graph, implying both handle continuous data over time. The key difference is not discrete vs. continuous data."}, {"text": "An area chart fills the space between the line and the x-axis with color to emphasize the total cumulative value over time.", "isCorrect": true, "rationale": "The definition states, 'An area chart is a line graph in which the region between the line and the x-axis is filled with color or shading. The shaded area emphasizes the total cumulative value over time...'"}, {"text": "Line graphs can only show one data series, while area charts can show multiple series.", "isCorrect": false, "rationale": "Line graphs can show multiple series (multiple lines). Stacked area charts show multiple series, but single-series area charts exist, so this is not the primary difference from a general line graph."}, {"text": "Area charts are exclusively used for showing negative values, unlike line graphs.", "isCorrect": false, "rationale": "The text does not mention this limitation or feature for area charts; they are typically used for positive cumulative values."}], "id": "q01"}, {"question": "Which of the following scenarios would be *most* appropriate for using a stacked area chart?", "options": [{"text": "Tracking the daily high temperature in one city over a month.", "isCorrect": false, "rationale": "This is a single data series and primarily focuses on trend; a regular line graph would be more appropriate as there is no 'total' to emphasize from combined parts."}, {"text": "Comparing the performance of two different stocks side-by-side over a year.", "isCorrect": false, "rationale": "While it involves multiple series, these are typically not combined to form a total, making a multi-line graph generally clearer for direct comparison of individual trends."}, {"text": "Visualizing how a company's total annual sales are broken down by region (North, South, East, West) over the past decade.", "isCorrect": true, "rationale": "The text states, 'Use an area chart... when you are showing how multiple parts combine to make a total.' This scenario perfectly fits the description, showing how regional sales (parts) sum to total annual sales."}, {"text": "Displaying the frequency of a single event occurring each day for a week.", "isCorrect": false, "rationale": "This is a single series and a line graph or bar chart might be more suitable, as there's no emphasis on a combined total from multiple components."}], "id": "q02"}, {"question": "According to the 'Common Misconceptions' section, what is a frequent error students make when reading a middle band in a stacked area chart?", "options": [{"text": "They assume the x-axis represents units other than time.", "isCorrect": false, "rationale": "The x-axis often represents time in area charts, and this is not listed as a common misconception."}, {"text": "They try to read the value of the middle band directly from the y-axis.", "isCorrect": true, "rationale": "The text explicitly states: 'In stacked area charts, students may try to read the value of a middle band directly from the y-axis. Remind them that each band starts where the one below it ends — so they must subtract the bottom boundary from the top boundary to find a middle band's value.'"}, {"text": "They confuse the total height of the chart with the value of the bottom band.", "isCorrect": false, "rationale": "While possible, this specific misconception is not listed in the text's 'Common Misconceptions' section."}, {"text": "They overlook the title and legend, leading to misinterpretation of the data.", "isCorrect": false, "rationale": "While important to read, this is a general data visualization error, not the specific misconception highlighted for stacked area charts regarding middle bands."}], "id": "q03"}, {"question": "To find the value of a middle band in a stacked area chart, such as 'Social Media' in the 'Weekly Screen Time' example, what calculation must be performed?", "options": [{"text": "Read the top edge of the 'Social Media' band directly from the y-axis.", "isCorrect": false, "rationale": "Reading the top edge directly only gives the cumulative total of 'Gaming' + 'Social Media', not just 'Social Media's value."}, {"text": "Read the bottom edge of the 'Social Media' band directly from the y-axis.", "isCorrect": false, "rationale": "Reading the bottom edge directly only gives the value of 'Gaming' (the band below it), not 'Social Media's value."}, {"text": "Subtract the value of the bottom boundary of the 'Social Media' band from its top boundary.", "isCorrect": true, "rationale": "The 'How to Read an Area Chart' section clearly states: 'For any other band: subtract its bottom edge from its top edge.' The worked example for 'Social Media' also demonstrates this: '$105 - 60 = 45$ minutes of social media.'"}, {"text": "Add the value of the bottom band ('Gaming') to the value of the topmost band ('Homework').", "isCorrect": false, "rationale": "This calculation is incorrect for finding the value of a middle band; it would combine unrelated values."}], "id": "q04"}, {"question": "Based on the 'Weekly Screen Time' worked example, what was the total screen time on Friday?", "options": [{"text": "90 minutes", "isCorrect": false, "rationale": "90 minutes was the 'Gaming' time on Friday, not the total screen time."}, {"text": "40 minutes", "isCorrect": false, "rationale": "40 minutes was the 'Homework' time on Friday, not the total screen time."}, {"text": "135 minutes", "isCorrect": false, "rationale": "135 minutes was the total screen time on Monday, which was the lowest of the week."}, {"text": "190 minutes", "isCorrect": true, "rationale": "The worked example states: 'The top edge of the topmost band gives the total screen time. On Friday, the total reaches 190 minutes — the highest of the week.'"}], "id": "q05"}, {"question": "Using the 'Weekly Screen Time' worked example, calculate the duration of Homework usage on Wednesday.", "options": [{"text": "160 minutes", "isCorrect": false, "rationale": "160 minutes was the total screen time on Wednesday, not just 'Homework'."}, {"text": "90 minutes", "isCorrect": false, "rationale": "90 minutes was the top of the 'Social Media' band on Wednesday, representing 'Gaming' + 'Social Media'."}, {"text": "70 minutes", "isCorrect": true, "rationale": "The worked example calculates: 'On Wednesday: total = 160, top of social media = 90. $160 - 90 = 70$ minutes of homework.'"}, {"text": "50 minutes", "isCorrect": false, "rationale": "This value does not correspond to any correct calculation for Homework on Wednesday."}], "id": "q06"}, {"question": "Based on the 'Trend analysis' from the 'Weekly Screen Time' example, what is a notable trend observed?", "options": [{"text": "Homework usage consistently increases throughout the week.", "isCorrect": false, "rationale": "The analysis states: 'Homework drops on Friday (from 65 to 40 minutes),' contradicting a consistent increase."}, {"text": "The total screen time shows a decreasing trend across the week.", "isCorrect": false, "rationale": "The analysis states: 'The total screen time increases across the week — screen time peaks on Friday,' contradicting a decreasing trend."}, {"text": "Gaming activity spikes dramatically on Friday.", "isCorrect": true, "rationale": "The analysis explicitly states: 'Gaming spikes dramatically on Friday (from 55 to 90 minutes).'"}, {"text": "Social Media usage remains relatively stable and unchanging.", "isCorrect": false, "rationale": "The values for social media (e.g., 45 on Tuesday, 30 on Wednesday, 50 on Thursday) show variation, not stability."}], "id": "q07"}, {"question": "According to the 'quicktip' section, when should you *not* use an area chart?", "options": [{"text": "When you want to emphasize the total volume of something over time.", "isCorrect": false, "rationale": "The quick tip states this is precisely when to use an area chart: 'when you want to emphasize the total volume of something over time.'"}, {"text": "When you are showing how multiple parts combine to make a total.", "isCorrect": false, "rationale": "The quick tip states this is precisely when to use an area chart: 'or when you are showing how multiple parts combine to make a total.'"}, {"text": "If you only care about the trend and not the total amount.", "isCorrect": true, "rationale": "The quick tip advises: 'If you only care about the trend and not the total amount, a regular line graph is usually cleaner and easier to read.'"}, {"text": "When the data series represent categories with no natural ordering.", "isCorrect": false, "rationale": "The text does not mention this as a criterion for when to avoid an area chart. Area charts typically use a time-based x-axis."}], "id": "q08"}, {"question": "The 'Discussion Prompt' asks students to choose between three separate line graphs or one stacked area chart to show total weekly screen time broken down by gaming, social media, and homework. Which of the learning objectives is *most directly* addressed by this prompt?", "options": [{"text": "Students will read total values from a single-series area chart.", "isCorrect": false, "rationale": "The prompt is about a *breakdown* into components, implying multiple series, not a single-series total."}, {"text": "Students will understand that an area chart is a line graph with the region below the line shaded.", "isCorrect": false, "rationale": "While foundational, the prompt asks for a choice between chart types based on purpose, not the basic definition of an area chart."}, {"text": "Students will read individual contributions from a stacked area chart.", "isCorrect": false, "rationale": "While a stacked area chart allows reading individual contributions, the prompt's core question is *which chart type is more useful* for showing a breakdown, not how to read it."}, {"text": "Students will identify when a stacked area chart is appropriate.", "isCorrect": true, "rationale": "The prompt directly asks students to decide which chart type is 'more useful' for a specific breakdown scenario, which aligns perfectly with the objective of identifying when a stacked area chart is appropriate."}], "id": "q09"}, {"question": "What is the key purpose of the shading in a single-series area chart, as stated in its definition?", "options": [{"text": "To add an aesthetic appeal to the graph, making it more visually engaging.", "isCorrect": false, "rationale": "The text acknowledges shading 'does more than look pretty,' indicating its purpose goes beyond aesthetics."}, {"text": "To make it easier to compare overall cumulative volumes over time.", "isCorrect": true, "rationale": "The definition states: 'The shaded area emphasizes the total cumulative value over time, making it easier to compare overall volumes.'"}, {"text": "To highlight individual data points along the line graph more effectively.", "isCorrect": false, "rationale": "The shading emphasizes the *total amount over time*, not individual data points. A line graph itself is often better for emphasizing individual points."}, {"text": "To differentiate between positive and negative trends in the data.", "isCorrect": false, "rationale": "The text does not mention this as a purpose of shading in an area chart. Area charts are typically used for non-negative cumulative values."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
