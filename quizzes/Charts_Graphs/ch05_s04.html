        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>

        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 5, Section 4</div>

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinguishing feature that makes a bar chart 'diverging'?", "options": [{"text": "It always displays data using a rainbow color scheme for visual appeal.", "isCorrect": false, "rationale": "While diverging charts can use color, it is not their defining characteristic. The core feature is how bars are positioned relative to a center point."}, {"text": "It places bars on both sides of a center line, with each side representing opposing values or sentiments.", "isCorrect": true, "rationale": "The text explicitly defines a diverging bar chart as having a center line and bars extending to the left for one kind of value and to the right for the opposite."}, {"text": "It is exclusively used to display data that contains negative numerical values.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text. Diverging charts can show negative numbers but are also widely used for opinion data (e.g., agree vs. disagree) where values aren't strictly negative."}, {"text": "It always compares more than five categories of data simultaneously.", "isCorrect": false, "rationale": "The number of categories is not a defining feature of a diverging bar chart. Its purpose is to show a balance between opposing values."}], "id": "q01"}, {"question": "For which type of data would a diverging bar chart be most appropriate, according to the section?", "options": [{"text": "Tracking the growth of a company's revenue over ten fiscal quarters.", "isCorrect": false, "rationale": "Revenue growth over time is typically best represented by a line chart, as it emphasizes trends and continuity, rather than a balance of opposing values."}, {"text": "Comparing the market share of different brands in a single product category.", "isCorrect": false, "rationale": "Comparing market shares is usually done with a standard bar chart or a pie chart if showing part-to-whole relationships, as there isn't a natural 'diverging' aspect to the data."}, {"text": "Survey responses collected using a Likert scale (e.g., 'Strongly Agree' to 'Strongly Disagree').", "isCorrect": true, "rationale": "The text explicitly states that diverging bar charts are 'often used for Likert scale surveys' and provide an example of student satisfaction survey results using such a scale."}, {"text": "Displaying the distribution of ages within a population group.", "isCorrect": false, "rationale": "Age distribution is typically shown with a histogram or a simple bar chart, as it does not inherently split into two opposing directions around a neutral point."}], "id": "q02"}, {"question": "A common misconception about diverging bar charts is that students may try to read them using only the right side of the center line. Why is this incorrect?", "options": [{"text": "Because the right side always represents positive values, and ignoring the left side would miss all negative data.", "isCorrect": false, "rationale": "The right side doesn't always represent 'positive' values; it represents one of two opposing values. Also, the misconception is about ignoring the left side, not the specific nature of the right side's values."}, {"text": "Bars to the LEFT of center have a different meaning and represent different values than bars to the RIGHT, so both sides are crucial for interpretation.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section specifically states to 'Emphasize that bars to the LEFT of center have a different meaning than bars to the RIGHT,' highlighting the necessity of reading both sides."}, {"text": "The center line is the only part that needs to be read, as it summarizes the entire dataset.", "isCorrect": false, "rationale": "The center line represents the midpoint (neutral/zero), but it does not summarize the entire dataset; the bars on both sides are essential for full interpretation."}, {"text": "Only the longest bar, regardless of direction, holds significant meaning in a diverging chart.", "isCorrect": false, "rationale": "While bar length is important, focusing only on the longest bar ignores the meaning and distribution of all other responses across both directions."}], "id": "q03"}, {"question": "When reading a diverging bar chart, if the bar for a specific survey question extends primarily to the left side, what does this generally indicate?", "options": [{"text": "The responses for that question are largely neutral or undecided.", "isCorrect": false, "rationale": "Neutral responses would be concentrated at the center line (or in the gray neutral section), not primarily on one side."}, {"text": "The predominant sentiment or response aligns with the category assigned to the left side (e.g., 'Agree' or 'Positive').", "isCorrect": true, "rationale": "The 'howtoread' section and the 'Worked Example' show that bars extending to a particular side indicate a concentration of responses for the value assigned to that side."}, {"text": "The question was not understood by most respondents, leading to skewed results.", "isCorrect": false, "rationale": "A bar extending to one side indicates a clear preference, not necessarily a lack of understanding of the question."}, {"text": "There are more negative responses than positive responses for that particular question.", "isCorrect": false, "rationale": "If the left side represents 'Agree' or 'Positive,' then a bar extending primarily to the left indicates more positive responses, not negative."}], "id": "q04"}, {"question": "In the 'Student Satisfaction Survey' example, if the chart showed that 'The lunch menu has good variety' had 40% agree/strongly agree and 40% disagree/strongly disagree, with 20% neutral, what does this 'balance' tell us?", "options": [{"text": "Students are overwhelmingly satisfied with the lunch variety.", "isCorrect": false, "rationale": "Overwhelming satisfaction would mean a much larger percentage on the 'agree' side, not an even split."}, {"text": "There is a strong consensus that the lunch variety needs significant improvement.", "isCorrect": false, "rationale": "A strong consensus for improvement would mean a much larger percentage on the 'disagree' side."}, {"text": "Student opinion on the lunch variety is evenly split or highly controversial.", "isCorrect": true, "rationale": "The example directly states: 'The opinion is evenly split! The bars extend roughly equally on both sides,' indicating a controversial or divided opinion."}, {"text": "The majority of students have no strong feelings about the lunch variety.", "isCorrect": false, "rationale": "While 20% are neutral, 80% have an opinion (40% agree, 40% disagree), indicating strong feelings on both sides, making it controversial rather than indifferent."}], "id": "q05"}, {"question": "According to the definition, what does the center line in a diverging bar chart typically represent?", "options": [{"text": "The maximum possible value for either side of the data.", "isCorrect": false, "rationale": "The center line is a reference point, not a maximum value. Maximum values are determined by the longest bars."}, {"text": "The midpoint, such as zero or a neutral point, separating two opposing types of values.", "isCorrect": true, "rationale": "The 'definition' section clearly states: 'A diverging bar chart has a center line (usually representing zero or a neutral point).'"}, {"text": "The cumulative total of all responses across both directions.", "isCorrect": false, "rationale": "The center line serves as a divider, not a cumulative total. Totals are derived from the sum of bar lengths."}, {"text": "The point where the chart transitions from displaying numerical data to categorical data.", "isCorrect": false, "rationale": "Diverging bar charts display both numerical (e.g., percentages) and categorical (e.g., agree/disagree) data, and the center line's role is not about data type transition."}], "id": "q06"}, {"question": "Why is a diverging bar chart generally considered better than a regular bar chart for displaying Likert scale survey results (e.g., 'Strongly Agree' to 'Strongly Disagree')?", "options": [{"text": "It requires less space on a page, making it more efficient for large surveys.", "isCorrect": false, "rationale": "Space efficiency is not the primary advantage; the main benefit lies in how it presents the nature of the data."}, {"text": "It allows direct visual comparison of the balance between positive and negative (or opposing) responses around a neutral point.", "isCorrect": true, "rationale": "The 'datadetective' section asks 'Why is a diverging bar chart better than a regular bar chart for showing survey results like these?', implying its strength is in showing the 'balance between opposing values'."}, {"text": "It can only be created using specific statistical software, ensuring data accuracy.", "isCorrect": false, "rationale": "The tool used for creation does not define its effectiveness for a specific data type, and accuracy depends on data collection, not chart type."}, {"text": "It is easier to identify trends in data over a long period of time.", "isCorrect": false, "rationale": "Diverging bar charts are not primarily designed for showing trends over time; they focus on the current distribution of opposing sentiments."}], "id": "q07"}, {"question": "A school principal is reviewing a diverging bar chart of student survey results. If the question 'School bathrooms are clean' shows a bar that extends heavily to the right side (representing 'Disagree' and 'Strongly Disagree'), what would be the most logical conclusion for the principal?", "options": [{"text": "Students are largely satisfied with the cleanliness of the bathrooms.", "isCorrect": false, "rationale": "A heavy extension to the 'disagree' side indicates dissatisfaction, not satisfaction."}, {"text": "The question regarding bathroom cleanliness was likely ambiguous and needs revision.", "isCorrect": false, "rationale": "While survey design is important, a strong lean to one side usually indicates clear sentiment, not ambiguity."}, {"text": "Bathroom cleanliness is a significant area of concern that requires immediate attention and improvement.", "isCorrect": true, "rationale": "The text's 'Comparing questions' example notes that 'A question where the bar leans heavily right indicates students mostly disagree,' implying a need for action if the disagreement is significant."}, {"text": "The school should conduct another survey focused solely on student preferences for bathroom decor.", "isCorrect": false, "rationale": "The issue is cleanliness, not decor preferences. The data points to a problem that needs to be addressed, not a different survey."}], "id": "q08"}, {"question": "According to the 'howtoread' section, what essential information does the legend provide when interpreting a diverging bar chart?", "options": [{"text": "The total number of survey participants for each question.", "isCorrect": false, "rationale": "The legend typically defines what the visual elements (like colors or bar directions) represent, not the total count of participants."}, {"text": "It clarifies which direction (left or right) corresponds to which type of value (e.g., 'Agree' vs. 'Disagree').", "isCorrect": true, "rationale": "Step 2 of 'howtoread A Diverging Bar Chart' is 'Read the legend. Which direction is which? (Left = Agree? Right = Disagree?)', emphasizing its role in mapping direction to meaning."}, {"text": "The exact percentage of neutral responses for every surveyed item.", "isCorrect": false, "rationale": "The neutral responses are shown at the center, often with a specific color, but the legend's primary role is to define the opposing sides, not list specific percentages."}, {"text": "The historical context of the survey data over previous years.", "isCorrect": false, "rationale": "The legend defines current chart elements; historical context would typically come from separate charts or additional text."}], "id": "q09"}, {"question": "To determine which question in a diverging bar chart received the most positive overall responses, what should an analyst primarily look for?", "options": [{"text": "The question where the bar segment representing 'Neutral' responses is the smallest.", "isCorrect": false, "rationale": "A small neutral segment means strong opinions, but not necessarily overwhelmingly positive ones; it could be strongly negative or controversial."}, {"text": "The question with the longest combined length of bars extending to the side designated for positive responses (e.g., 'Agree' and 'Strongly Agree').", "isCorrect": true, "rationale": "The 'Comparing questions' example states, 'If the chart shows that “Lunch line moves quickly” has most of its bar extending to the left (agree side), that question received mostly positive responses,' indicating that the length on the positive side is key."}, {"text": "The question that has the largest absolute difference between the 'Strongly Agree' and 'Strongly Disagree' percentages.", "isCorrect": false, "rationale": "While difference is a factor, the question asks for the 'most positive overall responses,' which is best indicated by the total proportion of positive responses, not just the difference between extremes."}, {"text": "The question where the bar extending to the negative response side is completely absent.", "isCorrect": false, "rationale": "While a complete absence of negative responses would indicate all positive, it's unlikely for most survey questions and focusing on the largest 'positive' extension is more general."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
