        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 5, Section 2</div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a stacked bar chart, as described in the text?", "options": [{"text": "To allow for direct visual comparison of individual data series across different categories.", "isCorrect": false, "rationale": "This is the primary purpose of a clustered bar chart, not a stacked bar chart, as highlighted in the distinction section."}, {"text": "To display how much each sub-category contributes to a total for each main category.", "isCorrect": true, "rationale": "The text explicitly states that 'The full height of the bar shows the total, and each segment shows how much of that total comes from each part' or sub-category."}, {"text": "To show the trend of a single data series over time.", "isCorrect": false, "rationale": "Stacked bar charts are generally used for categorical comparisons of parts to a whole, not for time-series trends, which are typically shown with line charts."}, {"text": "To compare only the total values between different categories without showing their composition.", "isCorrect": false, "rationale": "While stacked bar charts do allow comparison of total values, they also importantly show the composition of those totals through their segments, making this option incomplete."}], "id": "q01"}, {"question": "A student is trying to determine the value of a middle segment in a stacked bar chart. They trace the top of the segment directly to the y-axis and read the value. Why is this approach incorrect?", "options": [{"text": "Middle segments should always be read from the x-axis, not the y-axis.", "isCorrect": false, "rationale": "The x-axis typically represents the categories, while the y-axis represents the values, so reading from the x-axis for segment height is incorrect."}, {"text": "The value read from the y-axis for a middle segment represents the sum of that segment and all segments below it.", "isCorrect": true, "rationale": "The text explicitly states that 'students try to read segment heights directly from the y-axis for middle segments. They must subtract the bottom of the segment from the top.' This means the y-axis value at the top of a middle segment is its cumulative sum from the base of the bar."}, {"text": "Middle segments must always have the same value as the bottom segment.", "isCorrect": false, "rationale": "There is no rule in stacked bar charts stating that all segments must have equal values; their values depend on the data."}, {"text": "Only the very top segment can be read directly from the y-axis.", "isCorrect": false, "rationale": "Similar to middle segments, the top segment's value is calculated by subtracting the value at its bottom from the total height of the bar (which is its top point)."}], "id": "q02"}, {"question": "According to the 'howtoread' section, what is the *first* step a user should take when interpreting a stacked bar chart?", "options": [{"text": "Calculate the total height of each bar.", "isCorrect": false, "rationale": "Calculating total height is a subsequent step after understanding the chart's labels. The first step involves understanding what the chart is showing generally."}, {"text": "Identify which color corresponds to which sub-category using the legend.", "isCorrect": false, "rationale": "While crucial, identifying legend colors is part of the first step, which encompasses reading the title and legend, but not the complete first step."}, {"text": "Read the title and legend to identify what each color represents.", "isCorrect": true, "rationale": "The first step in the 'howtoread' guide is explicitly 'Read the title and legend. Identify what each color represents.'"}, {"text": "Trace the bottom segment to the y-axis to find its value.", "isCorrect": false, "rationale": "Reading the bottom segment is a later step in the process, only after understanding the chart's overall context from the title and legend."}], "id": "q03"}, {"question": "In the 'School Fundraiser' example, if the Bake Sale segment for Grade 7 reaches $100 on the y-axis and the top of the Raffle segment reaches $210, what was the value contributed by the Raffle for Grade 7?", "options": [{"text": "$100", "isCorrect": false, "rationale": "$100 is the value of the Bake Sale segment, or the cumulative value up to the end of the Bake Sale segment. It's not the Raffle's individual contribution."}, {"text": "$210", "isCorrect": false, "rationale": "$210 is the cumulative value of the Bake Sale and Raffle combined. It is not the individual contribution of the Raffle."}, {"text": "$110", "isCorrect": true, "rationale": "As per the 'Reading Stacked Bar Segments' and 'Worked Example', you must subtract the bottom of the segment from its top: $210 (top of Raffle) - $100 (bottom of Raffle) = $110."}, {"text": "$310", "isCorrect": false, "rationale": "This value would be incorrect as it implies adding the two cumulative points ($100 + $210), which does not represent the segment's value."}], "id": "q04"}, {"question": "A student needs to quickly compare the *total* amount raised by Grade 8 versus Grade 7. Which chart type is explicitly stated to make this comparison easier: a stacked bar chart or a clustered bar chart?", "options": [{"text": "A clustered bar chart, because it allows for direct comparison of each series.", "isCorrect": false, "rationale": "While clustered bar charts allow for direct comparison of series, the text specifically states, 'In a clustered chart, can I see whether Grade 8 raised more total money than Grade 7? It's harder. In a stacked chart, the total height gives me the answer immediately'."}, {"text": "A stacked bar chart, because the full height of the bar immediately shows the total.", "isCorrect": true, "rationale": "The discussion prompt clearly states, 'In a stacked chart, the total height gives me the answer immediately' when comparing total money raised between grades."}, {"text": "Both chart types offer the same ease of comparison for totals.", "isCorrect": false, "rationale": "The text explicitly distinguishes between the ease of comparing totals (stacked) versus individual series (clustered), indicating they are not the same."}, {"text": "Neither chart type is good for comparing totals; a pie chart would be better.", "isCorrect": false, "rationale": "The text directly addresses the comparison of totals using stacked bars, making this statement incorrect."}], "id": "q05"}, {"question": "One common misconception is that the segments of a stacked bar must all be the same category as the bars themselves. What do the stacked segments actually represent?", "options": [{"text": "They represent different time periods for the main category.", "isCorrect": false, "rationale": "Stacked bar charts are generally not designed for time-series data in this manner. Segments represent parts of a whole, not time progression."}, {"text": "They represent sub-categories that compose the main category displayed on the x-axis.", "isCorrect": true, "rationale": "The text explicitly states in the common misconceptions, 'Remind them: the bar categories are on the x-axis; the stacked segments represent sub-categories.'"}, {"text": "They represent entirely unrelated data points grouped together for visual aesthetics.", "isCorrect": false, "rationale": "The segments are related, as they form parts of the total represented by the bar, and are not for aesthetic grouping of unrelated data."}, {"text": "They represent the highest and lowest values observed for the main category.", "isCorrect": false, "rationale": "Segments represent distinct sub-categories that sum to the total, not merely the highest and lowest values."}], "id": "q06"}, {"question": "A key distinction between stacked bar charts and clustered bar charts is their primary strength. What is the strength of a clustered bar chart that a stacked bar chart struggles with?", "options": [{"text": "Showing the total value for each main category.", "isCorrect": false, "rationale": "Stacked bar charts excel at showing total values for each main category, while clustered bar charts make this harder to see visually."}, {"text": "Comparing individual series (sub-categories) directly across different main categories.", "isCorrect": true, "rationale": "The text states, 'clustered bars allow direct visual comparison of individual series,' while 'in a stacked chart, the total height gives me the answer immediately — but then I need to work harder to compare individual fundraising methods.'"}, {"text": "Illustrating the composition of a total from its constituent parts.", "isCorrect": false, "rationale": "This is the primary strength of a stacked bar chart, as each bar is divided into segments representing sub-categories that sum to the total."}, {"text": "Providing an accurate numerical representation of data points.", "isCorrect": false, "rationale": "Both chart types aim to provide accurate numerical representation, though the ease of reading values differs."}], "id": "q07"}, {"question": "Imagine a stacked bar chart where a segment for 'Product A' starts at a y-axis value of 50 units and ends at a y-axis value of 120 units. What is the value of 'Product A' for that category?", "options": [{"text": "50 units", "isCorrect": false, "rationale": "50 units represents the cumulative value of all segments below 'Product A' (or its starting point), not 'Product A' itself."}, {"text": "120 units", "isCorrect": false, "rationale": "120 units represents the cumulative value of 'Product A' and all segments below it (its ending point), not 'Product A' itself."}, {"text": "70 units", "isCorrect": true, "rationale": "As explained in 'Reading Stacked Bar Segments' and the 'watchoutsimple', the value of a middle segment is calculated by subtracting its bottom value from its top value: 120 - 50 = 70 units."}, {"text": "170 units", "isCorrect": false, "rationale": "170 units would be the sum of the two y-axis readings (50 + 120), which is not how segment values are determined in a stacked bar chart."}], "id": "q08"}, {"question": "Based on the 'Worked Example: School Fundraiser', which statement is a correct observation or conclusion about the fundraising data?", "options": [{"text": "Grade 6 raised the most money overall.", "isCorrect": false, "rationale": "The example states, 'Grade 8 raised the most overall ($400)', making this statement incorrect."}, {"text": "The Car Wash was a consistently major source of funds for all grades.", "isCorrect": false, "rationale": "The example notes, 'The Car Wash was the smallest source for Grade 6 ($60) but grew significantly for Grade 8 ($120)', indicating it was not consistently major for all grades."}, {"text": "Bake Sales contributed the largest single segment to the total for every grade.", "isCorrect": true, "rationale": "The example directly states, 'Bake Sales are the largest single segment for every grade', confirming this observation."}, {"text": "The Raffle was the highest-grossing method for Grade 7.", "isCorrect": false, "rationale": "For Grade 7, Bake Sale was $100, Raffle was $110, and Car Wash was $90. The Raffle was not the highest-grossing method; it was higher than Bake Sale but not the largest overall for Grade 7 (which would be the total of all segments for Grade 7)."}], "id": "q09"}, {"question": "Why is it important to read the legend of a stacked bar chart carefully before attempting to interpret the data?", "options": [{"text": "The legend dictates the order in which the bars are displayed on the x-axis.", "isCorrect": false, "rationale": "The legend identifies what the colors represent, not the order of the main categories on the x-axis."}, {"text": "Without the legend, it is impossible to know what each colored segment within a bar represents.", "isCorrect": true, "rationale": "The definition states, 'A legend identifies which color corresponds to which sub-category,' and the 'howtoread' section lists 'Read the title and legend. Identify what each color represents' as the crucial first step. Without it, the colored segments are meaningless."}, {"text": "The legend provides the raw numerical data for each segment, eliminating the need for calculations.", "isCorrect": false, "rationale": "The legend identifies the sub-categories by color, but it does not typically provide the raw numerical data for each segment directly; that must be read from the chart or calculated."}, {"text": "The legend is only necessary for comparing total values across different bars.", "isCorrect": false, "rationale": "The legend is essential for understanding the composition of each bar (the sub-categories) and for any type of comparison involving those sub-categories, not just totals."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
