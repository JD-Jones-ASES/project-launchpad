<script>
var QUESTIONS = [{"question": "What is the primary advantage of a treemap over a traditional pie chart when dealing with complex datasets?", "options": [{"text": "Treemaps only display a small number of categories, making them less cluttered.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states that treemaps are useful when pie charts become a 'confusing mess' with many pieces, indicating treemaps handle a larger number of categories effectively."}, {"text": "Treemaps can show hierarchical data and accommodate a large number of categories.", "isCorrect": true, "rationale": "The text highlights that treemaps solve the problems of pie charts by handling 'a large number of pieces' and 'categories inside categories' (hierarchical data)."}, {"text": "Treemaps display exact numerical values on an axis, unlike pie charts.", "isCorrect": false, "rationale": "This is incorrect. The text states, 'You do not read numbers off an axis the way you do with a bar chart.' Instead, values are compared by eye using area."}, {"text": "Treemaps are designed exclusively for time-series data visualization.", "isCorrect": false, "rationale": "This is incorrect. While treemaps have diverse applications, their primary strength emphasized here is hierarchical data, not exclusively time-series data."}]}, {"question": "In a treemap, how does a rectangle's size convey the value it represents?", "options": [{"text": "Its height alone indicates the value, similar to a bar chart.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text. The 'watchoutsimple' section and common misconceptions explicitly state that value is not represented by height or width alone."}, {"text": "Its width alone indicates the value, allowing for quick horizontal comparisons.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text. The 'watchoutsimple' section and common misconceptions explicitly state that value is not represented by height or width alone."}, {"text": "The area (width multiplied by height) of the rectangle is proportional to its value.", "isCorrect": true, "rationale": "The definition of a treemap and the 'watchoutsimple' section both clearly state that 'Each rectangle's area (width times height) is proportional to the value it represents.'"}, {"text": "The border thickness of the rectangle signifies its relative importance.", "isCorrect": false, "rationale": "This is incorrect. Border thickness is not mentioned as an encoding method for value in the text."}]}, {"question": "Which of the following best describes 'hierarchical data' as it relates to treemaps?", "options": [{"text": "Data sorted alphabetically or numerically from smallest to largest.", "isCorrect": false, "rationale": "This describes sorting, not hierarchy. While treemap programs might sort, it's not the defining characteristic of hierarchical data."}, {"text": "Data where items are organized into nested levels, with larger groups containing smaller sub-groups.", "isCorrect": true, "rationale": "The text provides a clear definition of hierarchy: 'A hierarchy is a structure where items are organized into levels, with larger groups containing smaller sub-groups.'"}, {"text": "Data that changes over time, showing trends and patterns.", "isCorrect": false, "rationale": "This describes time-series data, which is different from hierarchical data."}, {"text": "Data that includes only two distinct categories for simple comparison.", "isCorrect": false, "rationale": "Treemaps are useful for many categories and multiple levels, not limited to just two."}]}, {"question": "When reading a treemap, if you want to determine which sub-category within the 'Facilities' budget has the largest expenditure, what action should you take?", "options": [{"text": "Look for the sub-rectangle with the tallest height, regardless of width.", "isCorrect": false, "rationale": "This relies on the common misconception of confusing height with area. The text stresses comparing the 'SIZE (area)' of each rectangle."}, {"text": "Locate the color legend to identify the sub-category.", "isCorrect": false, "rationale": "The color legend usually indicates which top-level group a sub-rectangle belongs to, not necessarily for identifying the largest sub-category within a group by itself."}, {"text": "Compare the relative areas of the sub-rectangles contained within the 'Facilities' top-level group.", "isCorrect": true, "rationale": "The 'How to Read A Treemap' section advises to 'Compare areas within one group. Which sub-category has the largest rectangle? That sub-category has the largest value within that group.'"}, {"text": "Read the exact numerical values from an attached bar chart.", "isCorrect": false, "rationale": "This is incorrect; treemaps are self-contained visualizations, and values are primarily interpreted by comparing areas, though labels may provide precise numbers."}]}, {"question": "Based on the 'Westview Middle School Budget' example, what analytical conclusion can be drawn by comparing across the main budget sections?", "options": [{"text": "The 'Administration' budget allocates more to salaries than the 'Academics' budget.", "isCorrect": false, "rationale": "This is incorrect. The example states 'Teacher salaries' alone ($45,000) are much larger than the entire 'Administration' budget ($14,000)."}, {"text": "'Teacher salaries' alone ($45,000) constitute a larger expenditure than the entire 'Facilities' budget ($31,000).", "isCorrect": true, "rationale": "The example explicitly states in Step 4, 'Teacher salaries alone ($45,000) is larger than the entire Facilities budget ($31,000).'"}, {"text": "'Books & supplies' ($12,000) within Academics is the largest single line item across the entire budget.", "isCorrect": false, "rationale": "This is incorrect. 'Teacher salaries' ($45,000) is clearly identified as the largest sub-rectangle."}, {"text": "The school spends roughly equal amounts on Academics, Facilities, and Administration.", "isCorrect": false, "rationale": "This is incorrect. The example shows significant differences: Academics (59%), Facilities (28%), Administration (13%)."}]}, {"question": "A student is comparing two rectangles in a treemap. Rectangle A is tall and narrow, while Rectangle B is short and wide. Both appear to have roughly the same area. The student concludes that Rectangle A represents a much larger value because it is taller. What common misconception is the student demonstrating?", "options": [{"text": "Assuming treemaps require data to be sorted by size.", "isCorrect": false, "rationale": "While a common misconception, the student's error is about how value is encoded, not about sorting order."}, {"text": "Trying to compare rectangles across different parent categories.", "isCorrect": false, "rationale": "The problem describes comparing two rectangles, not necessarily across different *parent* categories, and the core error is about measurement, not context."}, {"text": "Confusing height with area when determining the value represented by a rectangle.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section and 'Area, Not Height!' watchout box directly address this: 'Students almost universally confuse height with area. Stress that the SIZE (area = width $$ height) of each rectangle represents the value, not just its height or width alone.'"}, {"text": "Neglecting to read the treemap's title and total value.", "isCorrect": false, "rationale": "While important for overall understanding, this is not the specific error demonstrated in comparing the values of two rectangles based on their dimensions."}]}, {"question": "A government agency wants to visualize its budget, which has several large departments, each with many sub-departments, and some sub-departments even have smaller line items. Which visualization tool would be most appropriate for this task, and why?", "options": [{"text": "A pie chart, because it clearly shows parts of a whole.", "isCorrect": false, "rationale": "The text states pie charts are only good for 'a small number of pieces' and 'cannot show that kind of structure' (hierarchy), making it inappropriate for this complex hierarchical data."}, {"text": "A bar chart, because it allows for precise reading of individual values.", "isCorrect": false, "rationale": "While good for precise values, bar charts are not as effective for displaying complex hierarchical relationships across multiple levels simultaneously as a treemap."}, {"text": "A treemap, because it effectively displays hierarchical data and can handle a large number of categories while showing proportional areas.", "isCorrect": true, "rationale": "The description perfectly matches the definition and utility of a treemap, which 'displays data as a set of nested rectangles' and is 'especially useful for showing hierarchical data — data that has categories inside categories.'"}, {"text": "A scatter plot, because it can show relationships between multiple variables.", "isCorrect": false, "rationale": "A scatter plot is used to show relationships between two quantitative variables, which is not the primary goal for visualizing a hierarchical budget structure."}]}, {"question": "Which step is NOT a correct description of how a treemap is conceptually built according to the text?", "options": [{"text": "Starting with a rectangle representing the whole budget.", "isCorrect": false, "rationale": "The 'How a Treemap is Built' section starts with, 'Imagine you have a rectangle that represents your school's entire annual budget.'"}, {"text": "Cutting the whole rectangle into large pieces proportional to major spending areas.", "isCorrect": false, "rationale": "The next step described is, 'Now cut it into large pieces proportional to the major spending areas.'"}, {"text": "Subdividing each large piece into smaller pieces proportional to its sub-categories' spending.", "isCorrect": false, "rationale": "This is the final step described: 'Each large piece is then cut into smaller pieces proportional to how that area spends its money.'"}, {"text": "Arranging all sub-rectangles in alphabetical order by their labels.", "isCorrect": true, "rationale": "The text states that 'While many programs sort by size automatically, the key feature is proportional area, not order.' Alphabetical order is not a defining or necessary step in the conceptual construction described."}]}, {"question": "What problem was computer scientist Ben Shneiderman trying to solve when he invented treemaps in 1990?", "options": [{"text": "Visualizing stock market fluctuations more clearly.", "isCorrect": false, "rationale": "While treemaps are used for stock market dashboards today, this was not the original problem Shneiderman was trying to solve."}, {"text": "Displaying music streaming app data more engagingly.", "isCorrect": false, "rationale": "This is a modern application of treemaps, not the original motivation for their invention."}, {"text": "Understanding which files were consuming hard drive space.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states: 'He was trying to solve a frustrating problem: his computer's hard drive was almost full, and he could not figure out which files were taking up so much space.'"}, {"text": "Improving the readability of traditional pie charts with too many slices.", "isCorrect": false, "rationale": "While treemaps address this problem, it was not the specific personal problem that led to their invention according to the text."}]}, {"question": "According to the learning objectives for this section, which of the following is NOT a skill students are expected to acquire regarding treemaps?", "options": [{"text": "Explaining what a treemap is and when it is appropriate.", "isCorrect": false, "rationale": "This is listed directly as a learning objective: 'Students will explain what a treemap is and when it is appropriate'."}, {"text": "Identifying main categories and sub-categories displayed.", "isCorrect": false, "rationale": "This is listed directly as a learning objective: 'identify the main categories and sub-categories displayed in a treemap'."}, {"text": "Calculating exact numerical values for each rectangle by hand using a ruler.", "isCorrect": true, "rationale": "The text states, 'You do not read numbers off an axis... Instead, you compare sizes by eye.' While values may be labeled, precise hand calculation is not a stated learning objective for reading a treemap."}, {"text": "Comparing relative sizes of rectangles within the same level.", "isCorrect": false, "rationale": "This is listed directly as a learning objective: 'compare relative sizes of rectangles within the same level'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
