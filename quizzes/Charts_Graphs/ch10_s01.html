    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinguishing feature between a histogram and a regular bar chart?", "options": [{"text": "Histograms always use colors, while bar charts are black and white.", "isCorrect": false, "rationale": "Color usage is a stylistic choice and not a defining characteristic that distinguishes histograms from bar charts."}, {"text": "Histograms display continuous numerical data with no gaps between bars, while bar charts display categorical data with gaps.", "isCorrect": true, "rationale": "The text explicitly states that histograms display continuous numerical data using bins without gaps between bars, whereas bar charts display categorical data where bars typically have gaps between them, as categories are distinct."}, {"text": "Bar charts have an x-axis, but histograms do not.", "isCorrect": false, "rationale": "Both bar charts and histograms have an x-axis. The difference lies in what the x-axis represents: categories for bar charts and continuous numerical intervals for histograms."}, {"text": "Histograms are used only for very small datasets, while bar charts are for large datasets.", "isCorrect": false, "rationale": "The size of the dataset is not a defining factor for choosing between a histogram and a bar chart. Both can be used for various data sizes."}], "id": "q01"}, {"question": "Which of the following types of data would be most appropriate to display using a histogram?", "options": [{"text": "Favorite type of pet (dog, cat, bird, fish)", "isCorrect": false, "rationale": "Favorite type of pet is categorical data, as it consists of distinct groups. A bar chart would be more appropriate for this data."}, {"text": "The number of students who prefer specific school subjects (Math, Science, English)", "isCorrect": false, "rationale": "School subjects are distinct categories, making this categorical data. A bar chart is suitable for comparing frequencies across these categories."}, {"text": "The heights of students in centimeters", "isCorrect": true, "rationale": "Heights in centimeters represent continuous numerical data, as they can take any value within a range. Histograms are specifically designed to display the distribution of continuous data."}, {"text": "Different colors of cars sold in a month (red, blue, black, white)", "isCorrect": false, "rationale": "Car colors are distinct categories. This is categorical data, best represented by a bar chart."}], "id": "q02"}, {"question": "In a histogram, what does the height of each bar represent?", "options": [{"text": "The average value of the data within that bin.", "isCorrect": false, "rationale": "The height of a bar in a histogram indicates the frequency or count of data values, not the average, within that specific bin."}, {"text": "The range of values covered by the bin.", "isCorrect": false, "rationale": "The width of the bar (or the segment on the x-axis) represents the range of values (the bin interval), not its height."}, {"text": "The frequency or count of data values that fall within that specific interval (bin).", "isCorrect": true, "rationale": "The text explicitly states that 'the height of each bar shows how many data values fall within that interval,' indicating frequency or count."}, {"text": "The cumulative total of all data values up to that bin.", "isCorrect": false, "rationale": "The height represents the frequency for that specific bin, not a cumulative total, which would be represented by a cumulative frequency graph."}], "id": "q03"}, {"question": "Consider a dataset representing the salaries of all employees at a large company. Which shape would the histogram of this data most likely exhibit?", "options": [{"text": "Symmetric distribution", "isCorrect": false, "rationale": "Salary data is typically not symmetric because there are usually many employees earning moderate amounts and a smaller number of high earners, pulling the tail to the right."}, {"text": "Right-skewed distribution", "isCorrect": true, "rationale": "Salary data is a classic example of a right-skewed distribution. Most people earn moderate amounts, forming a peak on the left, while a few individuals earn extremely high salaries, creating a long tail stretching to the right."}, {"text": "Left-skewed distribution", "isCorrect": false, "rationale": "A left-skewed distribution would imply that most people earn very high salaries, with a few earning very low salaries, which is generally not the case for overall company salaries."}, {"text": "Uniform distribution", "isCorrect": false, "rationale": "A uniform distribution would mean that roughly the same number of employees fall into each salary range, which is highly unlikely for real-world salary data."}], "id": "q04"}, {"question": "A histogram shows a 'left-skewed' distribution. What does this indicate about the data?", "options": [{"text": "The peak of the data is on the left side, with a short tail.", "isCorrect": false, "rationale": "This describes a right-skewed distribution where the bulk (peak) is on the left, but a left-skewed distribution has its peak on the right."}, {"text": "The data values are evenly spread across all bins.", "isCorrect": false, "rationale": "This describes a uniform distribution, not a skewed one."}, {"text": "The bulk of the data is on the right, and there is a long tail stretching to the left.", "isCorrect": true, "rationale": "A left-skewed distribution means the majority of the data points (the 'bulk' or 'peak') are on the right side of the graph, and there is a long tail extending towards the lower values (left side)."}, {"text": "The data is perfectly symmetrical around its center.", "isCorrect": false, "rationale": "This describes a symmetric distribution, not a skewed one."}], "id": "q05"}, {"question": "Based on the 'Worked Example: Student Heights' histogram, how many students are between 165 cm and 169 cm tall?", "options": [{"text": "8 students", "isCorrect": false, "rationale": "8 students are in the 155–159 cm range and 8 students are in the 170–174 cm range, not 165–169 cm."}, {"text": "14 students", "isCorrect": false, "rationale": "14 students are in the 160–164 cm range, which is the tallest bar."}, {"text": "13 students", "isCorrect": true, "rationale": "According to 'Step 2: Read the bar heights (frequencies)' in the 'Worked Example', the 165–169 cm bin contains 13 students."}, {"text": "3 students", "isCorrect": false, "rationale": "3 students are in the 175–179 cm range, which is the shortest bar on the right."}], "id": "q06"}, {"question": "What is the significance of the fact that histogram bars touch each other?", "options": [{"text": "It means the data is discrete and distinct.", "isCorrect": false, "rationale": "Gaps between bars typically signify discrete or categorical data. Touching bars signify continuous data, not discrete data."}, {"text": "It visually emphasizes that the data is continuous, with no natural gaps between measurement intervals.", "isCorrect": true, "rationale": "The text explicitly states, 'This is the most important thing to remember about histograms: the bars touch each other. There are no gaps. Why? Because the data is continuous. Continuous data can take any value within a range — there is no natural gap between 164 cm and 165 cm, so the bars for those ranges should not have a gap between them either.'"}, {"text": "It indicates that the histogram is poorly drawn and needs correction.", "isCorrect": false, "rationale": "Touching bars are a correct and essential feature of a histogram, not an error."}, {"text": "It shows that the data has a very small range.", "isCorrect": false, "rationale": "The range of the data is independent of whether the bars touch. Touching bars relates to the continuous nature of the data, not its spread."}], "id": "q07"}, {"question": "Which of the following describes a symmetric distribution in a histogram?", "options": [{"text": "The bulk of the data is concentrated on one side, with a long tail on the other.", "isCorrect": false, "rationale": "This describes a skewed distribution (either left or right), not a symmetric one."}, {"text": "The left side is a mirror image of the right side, with the peak in the middle.", "isCorrect": true, "rationale": "The text defines a symmetric distribution as one where 'the left side is a mirror image of the right side. The peak is in the middle. Most data falls near the center.'"}, {"text": "All bars are approximately the same height.", "isCorrect": false, "rationale": "This describes a uniform distribution, where frequencies are roughly equal across all bins, which is different from a symmetric distribution that has a distinct peak."}, {"text": "There are large gaps between most of the bars.", "isCorrect": false, "rationale": "Gaps between bars are not characteristic of any standard histogram distribution shape and indicate that the data is not continuous."}], "id": "q08"}, {"question": "What is the definition of a 'bin' in the context of a histogram?", "options": [{"text": "A single, isolated data point within the dataset.", "isCorrect": false, "rationale": "A bin is an interval that groups multiple data points, not a single isolated point."}, {"text": "The label on the y-axis that indicates the frequency.", "isCorrect": false, "rationale": "The y-axis label indicates the frequency count, but it is not a bin itself. A bin refers to the interval on the x-axis."}, {"text": "One of the equal-width intervals into which continuous data is divided on the x-axis.", "isCorrect": true, "rationale": "The text defines a bin as 'one of the equal-width groups into which the data is divided on a histogram,' located on the x-axis for continuous data."}, {"text": "The entire range of data values from the minimum to the maximum.", "isCorrect": false, "rationale": "The entire range is the spread of the data, while a bin is just one segment of that range."}], "id": "q09"}, {"question": "A student constructs a histogram showing the ages at which people retire. Most people retire in their 60s, but a few individuals retire much earlier, in their 40s or even 30s. What shape would this histogram most likely have?", "options": [{"text": "Right-skewed, because the 'bulk' of retirement ages is higher.", "isCorrect": false, "rationale": "If the 'bulk' is higher (60s), and the tail extends to lower values (30s-40s), it's a left-skewed distribution. The skew direction is determined by the tail."}, {"text": "Left-skewed, because the 'tail' extends towards the lower (earlier) ages.", "isCorrect": true, "rationale": "This scenario describes a left-skewed distribution. The majority of people retire in their 60s (bulk of data on the right), but the few who retire early create a long 'tail' stretching to the left (lower ages), as stated in the example for left-skewed distributions."}, {"text": "Symmetric, because there's a mix of early and late retirements.", "isCorrect": false, "rationale": "The presence of a few significantly earlier retirements compared to the majority of later retirements would make the distribution asymmetric, not symmetric."}, {"text": "Uniform, because there's a wide range of retirement ages.", "isCorrect": false, "rationale": "A uniform distribution would imply roughly equal numbers of people retiring at all ages within the range, which contradicts the scenario where most retire in their 60s."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
