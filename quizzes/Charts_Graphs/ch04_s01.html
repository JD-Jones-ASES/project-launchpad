    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary advantage of using a bar chart over a simple list of numbers to represent data, as highlighted in the text?", "options": [{"text": "Bar charts can store more data points than a list.", "isCorrect": false, "rationale": "The text does not state that bar charts store more data points; rather, they present existing data in a visual format. A list of numbers can theoretically hold an infinite amount of data."}, {"text": "They allow for quick visual comparison and understanding of differences between data values.", "isCorrect": true, "rationale": "The text states, 'Looking at a list like… is fine — but a bar chart turns those numbers into tall rectangles that your eyes can compare in an instant.' This emphasizes the ease of visual comparison as the primary advantage."}, {"text": "Bar charts always provide more precise values than a list.", "isCorrect": false, "rationale": "While bar charts visually represent values, reading exact numbers often requires tracing to an axis, and estimations are sometimes necessary between gridlines. A list explicitly states the precise values."}, {"text": "They eliminate the need for any labels or titles, making them universally understandable.", "isCorrect": false, "rationale": "The text explicitly lists 'Title,' 'Labels,' and 'Axis labels' as key parts of a bar chart, all of which are crucial for understanding the data presented."}], "id": "q01"}, {"question": "On a standard vertical bar chart, which component is typically found on the horizontal line at the bottom and lists the distinct items or groups being compared?", "options": [{"text": "The value axis", "isCorrect": false, "rationale": "The value axis (y-axis) is typically the vertical line and shows the numerical values, not the categories."}, {"text": "The category axis", "isCorrect": true, "rationale": "The text defines the 'Category axis (usually the x-axis, the horizontal line at the bottom)' as the component that 'lists the categories being compared.'"}, {"text": "The chart title", "isCorrect": false, "rationale": "The title tells you what the chart is about and is typically placed at the top of the chart, not along the horizontal bottom."}, {"text": "The gridlines", "isCorrect": false, "rationale": "Gridlines are light lines that extend from the axes to help trace values, but they do not list categories themselves."}], "id": "q02"}, {"question": "A common misconception described in the text is that students sometimes read the label at the top of a bar to determine its value. What does the text recommend instead to accurately read a bar's value?", "options": [{"text": "Always look for a legend to find the correct value corresponding to the bar's color.", "isCorrect": false, "rationale": "While legends can be present, the text does not mention them as the primary method for reading individual bar heights, nor does it link them to this specific misconception. The issue is about reading height on the value axis."}, {"text": "Estimate the value based on the general appearance of the bar's height relative to other bars.", "isCorrect": false, "rationale": "Estimation is used for values between gridlines, but for reading an exact value, a more precise method is taught, not just general appearance."}, {"text": "Trace a horizontal line from the top of the bar to the value axis.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section specifically states to 'Emphasize tracing a horizontal line from the bar top to the value axis' to counter this error."}, {"text": "Consult the chart's 'Quick Tip' section for the value of each bar.", "isCorrect": false, "rationale": "The 'Quick Tip' section provides guidance on estimation, not a list of values for each bar in a given chart."}], "id": "q03"}, {"question": "According to the 'How to Read a Vertical Bar Chart' section, what is the very first step you should take when interpreting any bar chart?", "options": [{"text": "Identify the tallest bar to find the highest value.", "isCorrect": false, "rationale": "Identifying the tallest bar is listed as the fourth step, after understanding the chart's context and scale."}, {"text": "Check the scale of the value axis.", "isCorrect": false, "rationale": "Checking the scale is the third step in the process, not the first."}, {"text": "Read the title of the chart.", "isCorrect": true, "rationale": "The first step listed under 'How to Read A Vertical Bar Chart' is 'Read the title. What is this chart about? What data does it show?'"}, {"text": "Read the labels on both axes.", "isCorrect": false, "rationale": "Reading the axis labels is the second step, following the title."}], "id": "q04"}, {"question": "Using the 'Favorite School Subjects' bar chart example provided, how many students chose Science as their favorite subject?", "options": [{"text": "28 students", "isCorrect": false, "rationale": "28 students chose Math, not Science, according to the example."}, {"text": "22 students", "isCorrect": true, "rationale": "In 'Step 3: Read the exact values' of the worked example, it clearly states: 'Science: 22 students.'"}, {"text": "19 students", "isCorrect": false, "rationale": "19 students chose English, not Science, according to the example."}, {"text": "14 students", "isCorrect": false, "rationale": "14 students chose PE, not Science, according to the example."}], "id": "q05"}, {"question": "The value axis of a bar chart must adhere to specific characteristics regarding its scale. Which of the following accurately describes a requirement for the value axis scale?", "options": [{"text": "It must start at the lowest data value present in the chart, not necessarily zero.", "isCorrect": false, "rationale": "The text explicitly states: 'The scale must start at zero and go up by equal steps.'"}, {"text": "It can use uneven steps if the data range is very wide to save space.", "isCorrect": false, "rationale": "The text specifies: 'The scale must start at zero and go up by equal steps,' meaning uneven steps are not permitted."}, {"text": "It must always increase by increments of 5 or 10.", "isCorrect": false, "rationale": "The text states 'go up by equal steps,' but does not specify that these steps must be 5 or 10. They could be 1, 2, 20, etc., as long as they are equal."}, {"text": "It must start at zero and go up by equal steps.", "isCorrect": true, "rationale": "The text states this directly in the 'Anatomy of a Bar Chart' section under 'Scale': 'The scale must start at zero and go up by equal steps.'"}], "id": "q06"}, {"question": "If a bar on a chart has a value axis with gridlines at 0, 5, 10, 15, 20, and the bar's top lands exactly halfway between the 15 and 20 gridlines, what is the best estimate for its value?", "options": [{"text": "15", "isCorrect": false, "rationale": "15 is the lower gridline; the bar extends past this point."}, {"text": "20", "isCorrect": false, "rationale": "20 is the upper gridline; the bar does not reach this point."}, {"text": "17.5", "isCorrect": true, "rationale": "The 'Quick Tip' section explains that if a bar is halfway between two gridlines (like 15 and 20), its value is about halfway, which is 17.5. The tip gives 'about 17 or 18' as an example for similar increments."}, {"text": "It is impossible to estimate accurately without more gridlines.", "isCorrect": false, "rationale": "The 'Quick Tip' section specifically addresses how to estimate values between gridlines, confirming that it is possible and encouraged."}], "id": "q07"}, {"question": "In the 'Favorite School Subjects' example, which two subjects are described as having almost exactly equal popularity?", "options": [{"text": "Math and Art", "isCorrect": false, "rationale": "Math (28) and Art (12) have significantly different values, with Math being 'about twice as popular' as Art, not almost equal."}, {"text": "Science and English", "isCorrect": false, "rationale": "Science (22) and English (19) are close, but the example specifically highlights another pair as 'almost exactly equal' and uses Science and English for a different comparison."}, {"text": "PE and History", "isCorrect": true, "rationale": "In 'Step 5: Make comparisons' of the worked example, it states: 'PE (14) and History (15) are almost exactly equal — the bars are nearly the same height.'"}, {"text": "Math and History", "isCorrect": false, "rationale": "Math (28) and History (15) have values that are quite different, not almost equal."}], "id": "q08"}, {"question": "The text identifies a common misconception where students believe a taller bar signifies something is 'better' or 'more important.' How does the text advise educators to address this misinterpretation?", "options": [{"text": "By adding a disclaimer to all bar charts explicitly stating that taller doesn't mean better.", "isCorrect": false, "rationale": "While a disclaimer might help, the text recommends an instructional approach rather than a design modification to every chart."}, {"text": "By only using bar charts for data where 'taller' genuinely implies a positive outcome.", "isCorrect": false, "rationale": "This would severely limit the utility of bar charts, which are used for all kinds of data, positive or negative. The advice is about teaching interpretation, not restricting use."}, {"text": "By reinforcing that bar height solely represents the data value, not quality or significance.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section states: 'Reinforce that height only represents the data value, not quality.'"}, {"text": "By ignoring the misconception, as students will eventually grasp the correct meaning through exposure.", "isCorrect": false, "rationale": "The text explicitly lists this as a 'Common Misconception' that needs to be addressed, not ignored."}], "id": "q09"}, {"question": "Which of the following statements accurately reflects a specific comparison made in 'Step 5: Make comparisons' using the 'Favorite School Subjects' example data?", "options": [{"text": "Math is exactly twice as popular as Art.", "isCorrect": false, "rationale": "The text states 'Math (28) is about twice as popular as Art (12),' noting that 12 * 2 = 24, which is close to 28, implying an approximation, not an exact doubling."}, {"text": "PE is slightly more popular than History.", "isCorrect": false, "rationale": "The text states 'PE (14) and History (15) are almost exactly equal,' indicating very little difference and not a clear 'more popular' statement from the comparison section."}, {"text": "Science and English combined account for more students than Math alone.", "isCorrect": true, "rationale": "The text explicitly states: 'Science and English together (22 + 19 = 41) account for more students than Math alone (28).' This is a direct comparison made in the example."}, {"text": "Art is chosen by the fewest students overall.", "isCorrect": false, "rationale": "While true that Art is the shortest bar/lowest value, this is an identification (Step 2/3), not a 'comparison' made in Step 5 of the worked example. Step 5 focuses on relative magnitudes between different categories."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
