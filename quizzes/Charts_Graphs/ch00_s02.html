<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Charts, Graphs, and Diagrams &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 0, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the title of a chart tell you?", "options": [{"text": "Where the data came from", "isCorrect": false, "rationale": "Where the data came from is described by the 'source,' not the title."}, {"text": "What the chart is about — it answers the question 'What am I looking at?'", "isCorrect": true, "rationale": "The text states: 'The title is the name of the chart. It tells you, in a few words, what the chart is about. A good title answers the question: \"What am I looking at?\"'"}, {"text": "What the units of measurement are", "isCorrect": false, "rationale": "Units of measurement are part of the scale and labels, not the title."}, {"text": "How many data points are in the chart", "isCorrect": false, "rationale": "The number of data points is not what the title communicates."}]}, {"question": "Which axis typically runs left to right (horizontal) and usually shows categories or time?", "options": [{"text": "The y-axis", "isCorrect": false, "rationale": "The y-axis runs up and down (vertically) and usually shows values."}, {"text": "The x-axis", "isCorrect": true, "rationale": "The text states: 'The x-axis runs left to right (horizontal). It usually shows categories or time.'"}, {"text": "The z-axis", "isCorrect": false, "rationale": "A z-axis is not discussed in this section; basic charts use x and y axes."}, {"text": "The legend axis", "isCorrect": false, "rationale": "There is no such thing as a 'legend axis.' The legend is a separate chart element."}]}, {"question": "What is the difference between an axis and a label?", "options": [{"text": "They are the same thing", "isCorrect": false, "rationale": "The text explicitly addresses this misconception: 'the axis is the line itself; the label is the text that names what the axis measures.'"}, {"text": "The axis is the line itself; the label is the text that names what the axis measures", "isCorrect": true, "rationale": "The teacher note clarifies: 'Students often mix up \"axis\" and \"label.\" Clarify: the axis is the line itself; the label is the text that names what the axis measures.'"}, {"text": "The axis shows data values; the label shows categories", "isCorrect": false, "rationale": "Both axes and labels serve different functions. The axis is a reference line, while the label is text describing what is being measured."}, {"text": "The label is inside the chart; the axis is outside it", "isCorrect": false, "rationale": "This is not the distinction the text makes. The axis is a line; the label is the text naming it."}]}, {"question": "What does a legend (also called a key) explain on a chart?", "options": [{"text": "The range of numbers on the axis", "isCorrect": false, "rationale": "The range of numbers on the axis is described by the scale, not the legend."}, {"text": "What colors, patterns, or symbols in the chart represent", "isCorrect": true, "rationale": "The text defines the legend as 'a small box that explains what colors, patterns, or symbols in the chart represent.'"}, {"text": "The source of the data", "isCorrect": false, "rationale": "The source is a separate chart element noted at the bottom of the chart."}, {"text": "The title and subtitle of the chart", "isCorrect": false, "rationale": "The title is a separate chart element from the legend."}]}, {"question": "What is the scale on a chart?", "options": [{"text": "The title at the top of the chart", "isCorrect": false, "rationale": "The title and scale are different chart elements."}, {"text": "The categories listed along the x-axis", "isCorrect": false, "rationale": "Categories are a separate concept from the scale."}, {"text": "The range of numbers shown on an axis and the spacing between them", "isCorrect": true, "rationale": "The text defines scale as 'the range of numbers shown on an axis and the spacing between them. For example, an axis might go from 0 to 50, counting by tens.'"}, {"text": "The size of the chart on the page", "isCorrect": false, "rationale": "Scale refers to the numerical range on the axis, not the physical size of the chart."}]}, {"question": "What is a data point?", "options": [{"text": "The title of a chart", "isCorrect": false, "rationale": "The title is a separate element that names the chart."}, {"text": "One piece of information plotted on a chart", "isCorrect": true, "rationale": "The text defines a data point as 'one piece of information plotted on a chart. On a bar chart, each bar represents one data point. On a scatter plot, each dot is a data point.'"}, {"text": "The source where data came from", "isCorrect": false, "rationale": "The source tells where data came from; a data point is one piece of plotted information."}, {"text": "A label on the y-axis", "isCorrect": false, "rationale": "A label names what the axis measures; a data point is one plotted value."}]}, {"question": "According to the 'Quick Tip,' what are the three steps to orient yourself when looking at any chart?", "options": [{"text": "Count the data points, check the legend, read the source", "isCorrect": false, "rationale": "These are not the three steps given in the Quick Tip."}, {"text": "Read the title, read the axis labels, check the scale", "isCorrect": true, "rationale": "The Quick Tip says: '1. Read the title — what is this about? 2. Read the axis labels — what is being measured? 3. Check the scale — what are the units and the range?'"}, {"text": "Find the legend, count the categories, calculate the total", "isCorrect": false, "rationale": "These are not the three steps described in the Quick Tip."}, {"text": "Look at the colors, find the highest bar, read the source", "isCorrect": false, "rationale": "These are not the three steps described in the Quick Tip."}]}, {"question": "How many key vocabulary terms does the text say make up your 'chart-reading toolkit'?", "options": [{"text": "Five", "isCorrect": false, "rationale": "The text lists more than five terms in the toolkit."}, {"text": "Seven", "isCorrect": false, "rationale": "The text specifies nine terms, not seven."}, {"text": "Nine", "isCorrect": true, "rationale": "The text says: 'title, axes, labels, legend, scale, data points, categories, values, source. These nine terms are your chart-reading toolkit.'"}, {"text": "Twelve", "isCorrect": false, "rationale": "The text specifies exactly nine terms in the chart-reading toolkit."}]}, {"question": "Why is the source important on a chart?", "options": [{"text": "It makes the chart look more professional", "isCorrect": false, "rationale": "While sources look professional, their purpose is about data verification and trust."}, {"text": "It tells you who made the chart", "isCorrect": false, "rationale": "The source tells you where the data came from so readers can check the information, not necessarily who designed the chart."}, {"text": "It says where the data came from so readers can check the information", "isCorrect": true, "rationale": "The text defines source as 'a note at the bottom of the chart that says where the data came from. A good chart always cites its source so readers can check the information.'"}, {"text": "It explains the colors used in the chart", "isCorrect": false, "rationale": "Explaining colors is the job of the legend, not the source."}]}, {"question": "What might a misleading chart do, according to the 'Putting It Together' subsection?", "options": [{"text": "Use too many colors", "isCorrect": false, "rationale": "The text does not mention excessive color use as a specific misleading tactic."}, {"text": "Hide the source, scramble the scale, or leave out the labels", "isCorrect": true, "rationale": "The text states: 'A misleading chart might hide the source, scramble the scale, or leave out the labels — and you will learn to spot those tricks in later chapters.'"}, {"text": "Include too many data points", "isCorrect": false, "rationale": "Having many data points is not listed as a misleading technique."}, {"text": "Use a horizontal layout instead of vertical", "isCorrect": false, "rationale": "Horizontal vs. vertical layout is not mentioned as a misleading technique."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
