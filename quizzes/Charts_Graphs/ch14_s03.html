<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of applying the Five Questions framework when encountering a chart?", "options": [{"text": "To verify if the chart's design is aesthetically pleasing and modern.", "isCorrect": false, "rationale": "The text explicitly states that 'polished design does not equal honest data' and that critical readers focus on data soundness, not just looks."}, {"text": "To determine the author's contact information for further inquiry about the data.", "isCorrect": false, "rationale": "While knowing the source is crucial, the primary purpose of the framework is to interrogate the chart's data and message, not to gather contact details."}, {"text": "To evaluate if the chart's data and message are honest and accurately represented.", "isCorrect": true, "rationale": "The introduction states that a critical reader 'interrogates' a chart to understand its purpose and whether it truly informs or misleads, ensuring the data and message are honest."}, {"text": "To quickly form an opinion about the chart's findings within eight seconds.", "isCorrect": false, "rationale": "The 'Did You Know' section highlights that viewers *typically* spend less than eight seconds, which is why misleading designs work well, emphasizing the need to *slow down* and apply the questions, not to rush."}]}, {"question": "According to the 'Common Misconceptions' section, which of the Five Questions for any chart should *always* be applied with scrutiny, even when evaluating a chart from a highly reputable scientific journal?", "options": [{"text": "'What is missing?' because even reputable sources might inadvertently omit crucial context or comparison baselines.", "isCorrect": false, "rationale": "While 'What is missing?' (Q3) is always a valid question, the text specifically identifies a misconception related to Question 1: 'Students may think Question 1 (source) is only for suspicious charts. In fact, all charts deserve source scrutiny, including those from reputable outlets.'"}, {"text": "'What is the source?' because all charts, regardless of origin, should be evaluated for potential incentives or biases.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states, 'Students may think Question 1 (source) is only for suspicious charts. In fact, all charts deserve source scrutiny, including those from reputable outlets.' This is to ensure that even reputable sources, while generally reliable, are still assessed for any subtle incentives that might influence data presentation."}, {"text": "'Is the visual proportional to the data?' to ensure that the graphical elements accurately reflect numerical values.", "isCorrect": false, "rationale": "Proportionality (Q4) is a key aspect of honest charting, but the specific misconception highlighted for reputable sources in the text relates to Question 1, not Question 4."}, {"text": "'What story is being told?' to distinguish between emotional impact and the mathematical facts.", "isCorrect": false, "rationale": "Distinguishing the emotional and mathematical story (Q5) is important, and is mentioned as a common struggle. However, the specific misconception about applying scrutiny to *reputable sources* is tied to Question 1 in the text."}]}, {"question": "A news report features a bar chart showing a 15% increase in local housing prices over the past year. The y-axis starts at $300,000 and ends at $350,000. What critical issue does this chart likely present, based on the Five Questions?", "options": [{"text": "The source of the data is questionable, as it's from a news report.", "isCorrect": false, "rationale": "While the source should always be checked (Q1), the question specifically points to the y-axis starting point, which relates to 'Scale' (Q2), not an inherently questionable source simply because it's a news report."}, {"text": "Crucial comparative data, such as national trends or previous decades, is likely missing.", "isCorrect": false, "rationale": "Missing data (Q3) is a potential issue for any chart, but the provided information focuses on the y-axis scale, making this a secondary concern given the specific details."}, {"text": "The visual proportionality of the bars is distorted due to the truncated y-axis.", "isCorrect": true, "rationale": "Question 2, 'What is the scale?', explicitly warns that if the y-axis 'does not start at zero, small differences will appear dramatically large.' A truncated axis distorts the visual representation, making small changes appear much more significant, which directly impacts proportionality."}, {"text": "The units on the y-axis are probably unclear, leading to misinterpretation of monetary values.", "isCorrect": false, "rationale": "The y-axis units (dollars) are implied by 'housing prices.' While units should always be checked (Q2), the more direct and significant issue described by a truncated y-axis is the distortion of visual proportionality, not necessarily unclear units in this scenario."}]}, {"question": "An advertisement for a new health supplement claims, 'Our product boosts energy by 25%!' The accompanying chart shows a single bar representing 'Energy Boost' at 25%, with no other bars or labels. Which of the Five Questions would most directly highlight the chart's significant flaw?", "options": [{"text": "What is the source? (Q1)", "isCorrect": false, "rationale": "While the source (an advertisement) inherently has an incentive to persuade, the most direct flaw highlighted by the chart's *content* relates to missing comparative data, not solely the source's bias."}, {"text": "What is the scale? (Q2)", "isCorrect": false, "rationale": "There's no information provided about the axis scale being truncated or uneven. The issue is with the lack of context, not the scaling itself in this specific case."}, {"text": "What is missing? (Q3)", "isCorrect": true, "rationale": "Question 3, 'What is missing?', specifically asks if there is 'no comparison baseline.' The example provided in the text 'Our product reduces headaches by 40%!' directly mirrors this scenario, emphasizing that without comparison (e.g., to a placebo or doing nothing), the number is 'impossible to evaluate.'"}, {"text": "Is the visual proportional to the data? (Q4)", "isCorrect": false, "rationale": "With only one bar, there's nothing to compare its proportionality to. The flaw is not in the visual representation of that single number, but in the lack of context provided by other data points."}]}, {"question": "A company's internal report uses icons to represent customer growth. One icon, representing 100 new customers, is depicted as a small figure. Another icon, representing 900 new customers, is shown as a figure with a radius three times larger than the first. What specific issue does this raise according to the Five Questions?", "options": [{"text": "The 'Story' being told might be too positive, exaggerating the growth.", "isCorrect": false, "rationale": "While the chart might be trying to tell a positive story, the immediate and specific issue here is a misrepresentation of scale, not just the narrative intent."}, {"text": "The 'Scale' of the y-axis is likely inconsistent or starts at a non-zero value.", "isCorrect": false, "rationale": "This scenario describes issues with icon size, not specifically the y-axis scale. While related to 'scale' in a broader sense, Q2 refers to axis scaling, not icon scaling."}, {"text": "The visual is not proportional to the data, specifically regarding area vs. radius scaling.", "isCorrect": true, "rationale": "Question 4, 'Is the visual proportional to the data?', explicitly warns that if 'a bubble looks nine times bigger than another bubble, the data value should be nine times larger (area-scaled, not radius-scaled).' If the radius is three times larger, the area (and thus the perceived size) is 3^2 = nine times larger, misrepresenting the data value of 900 which is only 9 times 100."}, {"text": "Crucial data, such as competitor growth rates, is likely 'Missing.'", "isCorrect": false, "rationale": "Missing data (Q3) is always a potential concern, but the question's scenario directly describes a problem with visual representation of the *given* data, not the absence of additional data points."}]}, {"question": "A student views a bar chart that displays a company's sales figures, with a dramatically truncated y-axis making small increases appear massive. The student feels the company is experiencing explosive growth. According to the text, what is the student primarily experiencing?", "options": [{"text": "An accurate assessment of the company's financial health based on visual cues.", "isCorrect": false, "rationale": "The text explicitly states that a truncated axis makes small differences 'appear dramatically large,' leading to a misleading impression, not an accurate assessment."}, {"text": "The 'mathematical story' of the data, despite the visual distortion.", "isCorrect": false, "rationale": "The 'mathematical story' is what the numbers actually say, which would show a small increase with a zero-based axis. The student is experiencing the *emotional* story, which diverges from the mathematical one."}, {"text": "The 'emotional story' of the chart, which diverges from the 'mathematical story.'", "isCorrect": true, "rationale": "Question 5, 'What story is being told — and is it honest?', discusses this divergence. The 'emotional story' is 'what the chart makes you feel,' while the 'mathematical story' is 'what the numbers actually say.' A truncated axis intends to evoke an emotional response of 'enormous' difference, even if the numbers show otherwise."}, {"text": "A critical application of 'What is missing?' to identify the chart's flaws.", "isCorrect": false, "rationale": "Applying 'What is missing?' (Q3) would involve looking for absent context. The student is described as *feeling* a certain way due to the visual, not actively critiquing it through the framework yet."}]}, {"question": "A small startup publishes a chart titled 'Our Market Share Dominance!' showing a pie chart where their slice is 40% and labeled 'Us', while the remaining 60% is labeled 'Everyone Else'. What combination of critical questions should be applied most rigorously to this chart?", "options": [{"text": "Q1 (Source) and Q2 (Scale) to check if the company is trustworthy and the axis starts at zero.", "isCorrect": false, "rationale": "While Q1 is relevant due to incentives, Q2 (Scale) primarily applies to bar/line charts with axes, less directly to pie charts. The core issues here are about context and framing."}, {"text": "Q3 (Missing) and Q5 (Story) to assess what competitors are excluded and if 'dominance' is truly supported.", "isCorrect": true, "rationale": "Q3 'What is missing?' is critical because 'Everyone Else' likely aggregates numerous competitors, obscuring individual market shares and potentially excluding significant players. Q5 'What story is being told?' is crucial because the chart wants you to believe 'dominance,' but the framing (Us vs. Everyone Else) and missing detail might make this an 'emotional' story diverging from the 'mathematical' one (e.g., they might be the largest, but 40% isn't 'dominance' in a highly fragmented market)."}, {"text": "Q2 (Scale) and Q4 (Proportionality) to ensure pie slices accurately reflect percentages.", "isCorrect": false, "rationale": "Pie charts, by nature, generally show proportionality of parts to a whole. The issue is less about the visual proportion of the 40% slice *itself* and more about the *context* and *interpretation* of that slice in relation to the whole and what is missing."}, {"text": "Q1 (Source) and Q4 (Proportionality) to confirm the company isn't biased and the labels are clear.", "isCorrect": false, "rationale": "Q1 is good, but Q4 is less of a direct issue for simple pie charts where percentages are usually directly proportional to slice size. The main problem is the *interpretation* and *completeness* of the data presented, not typically the visual proportionality of the labeled slice."}]}, {"question": "Which of the following is NOT a valid reason to be a critical reader of a chart, according to the provided text?", "options": [{"text": "The chart was made by a person with a purpose, which might be to persuade or sell.", "isCorrect": false, "rationale": "The text explicitly states, 'Every chart you encounter... was made by a person with a purpose. Sometimes that purpose is purely to inform. Other times, the purpose is to persuade, sell, or support a particular point of view.' This is a primary reason for critical reading."}, {"text": "The chart's design looks official and polished, making it seem trustworthy.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section warns, 'Students sometimes focus only on whether a chart “looks official” rather than whether the data is sound. Reinforce that polished design does not equal honest data.' Therefore, an official look is *not* a reason to trust it blindly, but rather to be *more* critical."}, {"text": "The chart might present an 'emotional story' that differs from the 'mathematical story' of the data.", "isCorrect": false, "rationale": "Question 5 and the 'Common Misconceptions' highlight this as a key reason for critical reading, as misleading charts often make the emotional and mathematical stories diverge."}, {"text": "The y-axis might not start at zero, making small differences appear dramatically large.", "isCorrect": false, "rationale": "This is a direct example of a common trick identified in Question 2 (Scale) that necessitates critical reading to avoid misinterpretation."}]}, {"question": "A data analyst is redesigning a company's profit chart that previously used a truncated y-axis to exaggerate growth. Based on the 'Fix' suggestion in the 'Worked Example,' what is the most fundamental change they should make to improve honesty?", "options": [{"text": "Add a 'did you know' factoid to engage readers for more than eight seconds.", "isCorrect": false, "rationale": "While engaging readers is good, adding a factoid doesn't fundamentally address the dishonesty of the chart's data presentation."}, {"text": "Change the chart type from a bar chart to a line graph to better show trends.", "isCorrect": false, "rationale": "Changing chart type might be suitable for data, but it doesn't directly fix the specific issue of a truncated y-axis that exaggerates differences."}, {"text": "Start the y-axis at $0 to accurately represent the magnitude of change.", "isCorrect": true, "rationale": "The 'Worked Example' explicitly states the fix for a truncated y-axis is to 'Start the y-axis at $0' to accurately reflect the actual differences rather than making small changes appear dramatic. This is the most fundamental fix for that specific problem."}, {"text": "Highlight the highest profit year with a brighter color to emphasize success.", "isCorrect": false, "rationale": "Using color to highlight might draw attention, but it doesn't correct the underlying misrepresentation caused by the truncated axis; it could even further emphasize a misleading impression if the scale isn't fixed."}]}, {"question": "The 'Did You Know' section mentions that most viewers spend less than eight seconds looking at a chart. What is the primary implication of this finding for critical readers?", "options": [{"text": "It proves that highly complex charts are ineffective for quick communication.", "isCorrect": false, "rationale": "The text doesn't claim complex charts are ineffective; it highlights that misleading designs work well because viewers don't scrutinize them."}, {"text": "It reinforces the need to apply the Five Questions framework to avoid being misled.", "isCorrect": true, "rationale": "The text directly states, 'That is why misleading designs work so well — and why learning to slow down and apply the Five Questions is such a powerful skill.' The short viewing time makes people susceptible to misleading designs, making the framework essential."}, {"text": "It suggests that charts should always be accompanied by a detailed written explanation.", "isCorrect": false, "rationale": "While supplementary text can be helpful, the core takeaway is about developing critical viewing skills, not necessarily adding more text to every chart."}, {"text": "It indicates that chart designers should focus solely on making charts visually appealing.", "isCorrect": false, "rationale": "The 'Common Misconceptions' explicitly warns against focusing only on whether a chart 'looks official' and reinforces that 'polished design does not equal honest data.' Critical readers prioritize data soundness over mere appeal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
