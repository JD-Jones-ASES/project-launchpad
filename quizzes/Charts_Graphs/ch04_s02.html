<script>
var QUESTIONS = [{"question": "What is the defining characteristic that distinguishes a horizontal bar chart from a vertical bar chart?", "options": [{"text": "The bars extend upwards from the bottom of the chart.", "isCorrect": false, "rationale": "This describes a vertical bar chart, where bars typically rise from a baseline."}, {"text": "The categories are listed along the x-axis (bottom).", "isCorrect": false, "rationale": "In a horizontal bar chart, categories are on the y-axis (left side), and values are on the x-axis (bottom)."}, {"text": "The bars extend left to right across the chart.", "isCorrect": true, "rationale": "As stated in the definition, a horizontal bar chart is one where the bars extend left to right rather than bottom to top."}, {"text": "The value axis is always positioned on the left side of the chart.", "isCorrect": false, "rationale": "In a horizontal bar chart, the value axis runs along the bottom (x-axis), while the category axis is on the left (y-axis)."}], "id": "q01"}, {"question": "In a horizontal bar chart, which statement accurately describes the placement of the category and value axes?", "options": [{"text": "The categories are on the x-axis (bottom), and the values are on the y-axis (left).", "isCorrect": false, "rationale": "This reverses the correct placement. The text explicitly states categories go on the y-axis and values on the x-axis for horizontal charts."}, {"text": "The categories are on the y-axis (left side), and the values are on the x-axis (bottom).", "isCorrect": true, "rationale": "The section clarifies that in a horizontal bar chart, 'categories go on the y-axis (left side) and values go on the x-axis (bottom).'"}, {"text": "Both categories and values are always displayed on the x-axis.", "isCorrect": false, "rationale": "A bar chart always uses two distinct axes to represent categories and their corresponding values."}, {"text": "Both categories and values are always displayed on the y-axis.", "isCorrect": false, "rationale": "A bar chart always uses two distinct axes to represent categories and their corresponding values."}], "id": "q02"}, {"question": "A research team needs to visualize the average annual snowfall for the 'Top 10 Snowiest Cities in the World,' some with very long and descriptive names like 'Aomori, Japan (Northern Honshu).' Which chart orientation would be most effective for this data, and why?", "options": [{"text": "A vertical bar chart, because it is the most commonly used format for city comparisons.", "isCorrect": false, "rationale": "While common, vertical bar charts would likely lead to cramped and tilted labels for long city names, as noted in the text under 'Long category names'."}, {"text": "A horizontal bar chart, to provide ample space for displaying the long city names clearly.", "isCorrect": true, "rationale": "The text explicitly recommends horizontal bar charts when 'categories have long names' to give 'each label plenty of room on the left side'."}, {"text": "A pie chart, as it excels at showing the distribution of snowfall amounts.", "isCorrect": false, "rationale": "Pie charts are typically for parts of a whole and are difficult to read with many categories, especially when precise comparisons between individual items are needed."}, {"text": "A line graph, because it effectively shows changes and trends in snowfall over time.", "isCorrect": false, "rationale": "Line graphs are best for time-series data or trends, not for comparing discrete values across categories at a single point or period."}], "id": "q03"}, {"question": "A product manager wants to create a bar chart to compare the customer satisfaction scores of their 12 different product lines. Many of these product names are similar in length, but displaying all 12 as vertical bars makes the chart feel crowded and hard to read. Which type of chart would best address this issue?", "options": [{"text": "A vertical bar chart with narrower bars to fit all 12 categories.", "isCorrect": false, "rationale": "While making bars narrower might fit them, it would still likely feel crowded and make comparisons difficult, especially with many categories, which the text advises against for vertical charts."}, {"text": "A horizontal bar chart, allowing the numerous categories to spread out more naturally on the page.", "isCorrect": true, "rationale": "The text states that 'When you have 8, 10, or more bars, a vertical chart can get very crowded. Horizontal bars spread out more naturally on a page,' making this the ideal choice."}, {"text": "A stacked bar chart to show the cumulative satisfaction across all products.", "isCorrect": false, "rationale": "A stacked bar chart shows parts of a whole or cumulative totals, which isn't the primary problem here; the issue is the number of categories and crowding."}, {"text": "A clustered column chart, which organizes data into distinct groups for easier comparison.", "isCorrect": false, "rationale": "A clustered column chart is a type of vertical bar chart, and thus would still suffer from the same crowding issue with many categories."}], "id": "q04"}, {"question": "An online gaming platform wants to display a 'leaderboard' showing the top 10 highest-scoring players for a new game, from highest to lowest score. How can a horizontal bar chart be specifically utilized to emphasize this ranking effectively?", "options": [{"text": "By using a horizontal bar chart with different colors for each player's bar to make them visually distinct.", "isCorrect": false, "rationale": "While distinct colors can aid readability, they don't inherently emphasize ranking in the way a specific chart orientation and ordering does."}, {"text": "By creating a 'ranked bar chart' where categories are ordered from longest to shortest, making the ranking instantly clear.", "isCorrect": true, "rationale": "The 'quicktip' defines a ranked bar chart as a horizontal bar chart where categories are listed from longest to shortest (or vice-versa), making it 'instantly clear which item is first, second, third, and so on'."}, {"text": "By omitting the value axis to encourage viewers to focus solely on the relative lengths of the bars.", "isCorrect": false, "rationale": "Omitting the value axis would make it impossible to read precise scores and is not a recommended practice for clear data visualization."}, {"text": "By displaying player names on the x-axis and scores on the y-axis, which is standard for ranking.", "isCorrect": false, "rationale": "This describes a vertical bar chart, which is less ideal for ranking compared to a horizontal chart where the eye naturally reads down the list of ranks."}], "id": "q05"}, {"question": "A common misconception when reading horizontal bar charts is reading the bar from the right end instead of tracing it to the value axis. According to the text, what is the correct method to accurately read the value of a specific bar?", "options": [{"text": "Read the number directly next to the category label on the y-axis.", "isCorrect": false, "rationale": "The y-axis contains category labels, not the specific value for each bar. The value axis is at the bottom."}, {"text": "Trace vertically down from the right end of the bar to the value axis on the bottom.", "isCorrect": true, "rationale": "The 'How to Read' section advises to 'Trace from the right end of each bar straight down to the value axis. The number below the bar tip is its value.'"}, {"text": "Trace horizontally from the left end of the bar to the value axis on the top.", "isCorrect": false, "rationale": "The value axis is at the bottom, and tracing from the left end would not give the bar's full value."}, {"text": "Estimate the value by visually comparing the bar's length to the longest bar on the chart.", "isCorrect": false, "rationale": "Estimation is not accurate reading; precise values require tracing to the value axis."}], "id": "q06"}, {"question": "A horizontal bar chart shows 'Average Monthly Temperatures (in °C)' for several European cities. To determine which city experienced the highest average temperature, what action should you take?", "options": [{"text": "Find the city name that is listed highest on the y-axis.", "isCorrect": false, "rationale": "The position on the y-axis relates to the category order, not necessarily its value."}, {"text": "Identify the bar that is the shortest in length.", "isCorrect": false, "rationale": "The shortest bar would represent the lowest value, not the highest."}, {"text": "Locate the bar that extends furthest to the right.", "isCorrect": true, "rationale": "The 'How to Read' section states 'The longest bar has the highest value,' and in a horizontal chart, this means extending furthest to the right."}, {"text": "Check the title of the chart for the maximum temperature recorded.", "isCorrect": false, "rationale": "The title explains what is being compared, but not the specific value of any bar or the maximum overall value."}], "id": "q07"}, {"question": "A student is tasked with creating a chart to visualize the 'Top 5 Most Popular Dog Breeds,' ordered from most to least popular. They decide to use a horizontal bar chart and arrange the breeds according to their popularity. What specific type of chart have they created, and what is its primary benefit?", "options": [{"text": "A categorical bar chart, primarily useful for grouping similar breeds.", "isCorrect": false, "rationale": "While it is a categorical chart, 'categorical bar chart' doesn't capture the specific benefit of ordering for ranking. Grouping isn't its main benefit here."}, {"text": "A ranked bar chart, which makes the hierarchy of popularity instantly discernible.", "isCorrect": true, "rationale": "The 'quicktip' explicitly states that a horizontal bar chart listing categories from longest to shortest is a 'ranked bar chart,' which makes it 'instantly clear which item is first, second, third, and so on'."}, {"text": "A comparative bar chart, primarily for direct numerical comparison between breeds.", "isCorrect": false, "rationale": "While comparison occurs, 'comparative bar chart' isn't the specific term used for this ordered arrangement, and 'ranked' highlights the primary benefit more accurately."}, {"text": "A frequency distribution chart, to show how often each breed appears.", "isCorrect": false, "rationale": "A frequency distribution shows the count of occurrences within bins or categories, which is not the same as ranking based on popularity scores."}], "id": "q08"}, {"question": "Which of the following scenarios would be *least* likely to benefit from using a horizontal bar chart?", "options": [{"text": "Comparing the average price of 10 different car models, some with long, descriptive names.", "isCorrect": false, "rationale": "This scenario has many categories and potentially long names, both of which are strong reasons to use a horizontal bar chart."}, {"text": "Displaying the top 7 best-selling books of the year, ranked from highest to lowest sales.", "isCorrect": false, "rationale": "This involves ranking data, which is explicitly listed as a situation where horizontal bar charts excel due to natural readability."}, {"text": "Illustrating the quarterly revenue growth of a single company over the past two years.", "isCorrect": true, "rationale": "This is time-series data, typically best visualized with a line graph to show trends, or a vertical bar chart if the quarters are few and distinct, rather than a horizontal bar chart which is for comparing discrete categories."}, {"text": "Showing the voting results for 12 candidates in an election, where candidate names vary in length.", "isCorrect": false, "rationale": "This scenario involves many categories and potentially long names, both benefiting from a horizontal bar chart's layout."}], "id": "q09"}, {"question": "In the 'World's Longest Rivers' example, it's noted that 'The Yellow (5,464 km) and Ob (5,410 km) are very close in length — only 54 km apart.' If you encounter a horizontal bar chart where two bars appear almost identical in length, what analytical conclusion is most appropriate?", "options": [{"text": "The categories represented by these bars likely share a common, underlying characteristic that makes their values converge.", "isCorrect": false, "rationale": "While possible in real data, the chart itself only tells us about the values, not the underlying reasons for similarity. This is an inference beyond chart interpretation."}, {"text": "The data collection for these two categories was probably imprecise, leading to artificially close measurements.", "isCorrect": false, "rationale": "Assuming data inaccuracy based solely on close bar lengths is not a valid analytical conclusion from reading the chart itself. Close values are simply close values."}, {"text": "The values for these two categories are very similar, requiring careful tracing to the value axis to distinguish their precise differences.", "isCorrect": true, "rationale": "The example highlights that even very close lengths represent distinct, albeit similar, values. Accurate reading requires tracing, and the conclusion is that the values are indeed close."}, {"text": "One of the bars must be an outlier or error, as perfectly equal lengths are rare in real-world data.", "isCorrect": false, "rationale": "Close values are common and not inherently indicative of an outlier or error; they simply reflect the data being compared."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
