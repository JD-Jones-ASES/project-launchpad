<script>
var QUESTIONS = [{"question": "A student designs a bar chart comparing two datasets using only bright red and vibrant green bars for distinction. Why might this design choice be problematic for the intended audience?", "options": [{"text": "Red and green are clashing colors, making the chart aesthetically displeasing.", "isCorrect": false, "rationale": "While aesthetics are a factor, the primary issue is not just clashing colors but an accessibility problem for a specific group of readers, as detailed in the text."}, {"text": "A significant portion of the male population experiences red-green colorblindness, making these colors indistinguishable.", "isCorrect": true, "rationale": "The text explicitly states that 'About 8% of males and 0.5% of females have some form of color vision deficiency,' with red-green colorblindness being the most common type, making these colors look 'nearly identical' for affected individuals."}, {"text": "The vibrant colors could distract from the data's main message.", "isCorrect": false, "rationale": "While true that excessive vibrancy can distract, the core problem described in the text for red and green is about color vision deficiency, not merely distraction."}, {"text": "Red and green typically have negative and positive connotations, which could bias interpretation.", "isCorrect": false, "rationale": "Color connotations can influence perception, but the most direct and significant problem cited in the text for using red and green as the *only* distinction is accessibility for colorblind individuals."}]}, {"question": "A data analyst creates a single line graph that displays five different trends, uses a dual Y-axis for different units, and highlights three specific points with annotations. After reviewing it, a colleague suggests breaking it into multiple charts. Which of the seven principles of good chart design is the colleague likely trying to uphold?", "options": [{"text": "Label everything.", "isCorrect": false, "rationale": "While good labeling is crucial, the problem described—cramming too much information—points to a violation of simplicity, not necessarily labeling issues."}, {"text": "Keep it simple.", "isCorrect": true, "rationale": "The first principle states: 'Every chart should communicate one main message. If you find yourself cramming three trends, four categories, and a subgroup comparison into a single chart, break it into two or three separate charts.'"}, {"text": "Use the right chart type for your data.", "isCorrect": false, "rationale": "The choice of a line graph might be appropriate for trends, but the issue is the sheer volume of trends and axes within one chart, not the chart type itself."}, {"text": "Cite your source.", "isCorrect": false, "rationale": "Citing a source is important for trustworthiness, but it doesn't address the internal complexity of the chart's design."}]}, {"question": "A news website publishes a bar chart showing a slight increase in unemployment rates from 4.8% to 5.0%. The Y-axis starts at 4.7% and goes up to 5.1%, making the increase appear dramatically larger. What principle of good chart design is violated, and why is this problematic?", "options": [{"text": "Choose colorblind-friendly colors, because the colors might obscure the true change.", "isCorrect": false, "rationale": "This principle relates to color choice for accessibility, not the scaling of the y-axis."}, {"text": "Label everything, because the axis units are missing.", "isCorrect": false, "rationale": "While axis labels are vital, the problem described is specifically about the starting point of the Y-axis, not necessarily missing labels."}, {"text": "Start axes at zero (usually), because truncating a bar chart's Y-axis distorts the visual comparison of magnitudes.", "isCorrect": true, "rationale": "The text explicitly states: 'Bar charts must start at zero. A bar's height is meaningless unless it is measured from the ground up.' Truncating the axis in a bar chart can exaggerate differences, leading to misinterpretation."}, {"text": "Test with a friend, because a friend would immediately notice the small change.", "isCorrect": false, "rationale": "Testing with a friend helps with overall clarity, but the fundamental issue here is a principle violation that inherently distorts the data, which should be corrected before testing."}]}, {"question": "According to Edward Tufte, what is the primary goal of maximizing the data-ink ratio in a visualization?", "options": [{"text": "To make the chart more aesthetically pleasing with a minimalist design.", "isCorrect": false, "rationale": "While minimalism can be aesthetically pleasing, it's a byproduct. Tufte's primary goal is about conveying information efficiently, not just beauty."}, {"text": "To ensure every visual element on the chart conveys meaningful data, eliminating 'chart junk.'", "isCorrect": true, "rationale": "The text defines the data-ink ratio as 'the idea that every drop of ink on a chart should carry useful information' and that 'chart junk' should be eliminated to ensure 'you cannot remove anything without losing meaning.'"}, {"text": "To reduce the printing costs associated with high-resolution graphics.", "isCorrect": false, "rationale": "This is a practical consideration but not the conceptual principle behind Tufte's data-ink ratio."}, {"text": "To allow for more complex data to be represented in a single chart.", "isCorrect": false, "rationale": "Maximizing the data-ink ratio focuses on efficiency and clarity, often promoting simplicity rather than encouraging more complexity in a single chart."}]}, {"question": "Which of the following actions would most effectively improve a chart's data-ink ratio?", "options": [{"text": "Adding a subtle background pattern to enhance visual appeal.", "isCorrect": false, "rationale": "Background patterns are considered 'chart junk' by Tufte as they add ink without conveying data, thus lowering the data-ink ratio."}, {"text": "Using a 3D effect for bar charts to make them stand out.", "isCorrect": false, "rationale": "The text specifically advises to 'Avoid 3D effects — they add ink without adding data,' reducing the data-ink ratio."}, {"text": "Replacing a separate legend with direct labels on the data series where possible.", "isCorrect": true, "rationale": "The text suggests, 'Use direct labels on bars or lines instead of a separate legend (when possible),' as this removes a redundant element and directly links labels to data, increasing the data-ink ratio."}, {"text": "Increasing the thickness and darkness of gridlines for better readability.", "isCorrect": false, "rationale": "The text recommends to 'Remove gridlines or make them very light gray,' indicating that thick, dark gridlines are often 'chart junk' that doesn't carry essential information."}]}, {"question": "A student creates a scatter plot showing the relationship between two variables. The chart has a title 'Data Trends' and a cloud of points, but the X and Y axes are only labeled as 'Variable 1' and 'Variable 2,' with no indication of units or what the variables represent. There's also no source for the data. Which core principle of good chart design is most significantly neglected?", "options": [{"text": "Start axes at zero (usually).", "isCorrect": false, "rationale": "While important, especially for bar charts, this principle is not the primary neglect in a scatter plot lacking descriptive labels and units, nor is it as encompassing as 'Label everything.'"}, {"text": "Cite your source.", "isCorrect": false, "rationale": "Citing the source is neglected, but the question lists multiple issues (title, axis labels, units) that fall under a broader principle."}, {"text": "Label everything.", "isCorrect": true, "rationale": "The second principle, 'Label everything,' requires 'A descriptive title,' 'Labeled axes with units,' and 'A source note at the bottom,' all of which are missing or insufficient in the described chart."}, {"text": "Keep it simple.", "isCorrect": false, "rationale": "The chart might be simple in its visual elements, but simplicity doesn't excuse a lack of essential contextual information."}]}, {"question": "After designing a complex visualization, a student shares it with a classmate who has no prior knowledge of the data. The student asks the classmate, 'What message does this chart communicate to you?' What is the primary purpose of this feedback step in the chart design process?", "options": [{"text": "To identify any grammatical errors in the chart's title or labels.", "isCorrect": false, "rationale": "While a friend might catch grammatical errors, this is a minor benefit, not the primary purpose of 'Test with a friend.'"}, {"text": "To ensure the chart is aesthetically pleasing to a fresh pair of eyes.", "isCorrect": false, "rationale": "Aesthetics are secondary to clarity and message communication in this context, according to the text."}, {"text": "To verify that the chart's intended main message is clear and easily understood by an uninformed reader.", "isCorrect": true, "rationale": "The text states, 'Ask them to tell you, in one sentence, what the chart shows. If their answer matches your intended message, you are done. If not, simplify.' This directly addresses the clarity of the main message."}, {"text": "To gather suggestions for additional data or analysis that could be included.", "isCorrect": false, "rationale": "The purpose is to refine the existing message's clarity, not to expand the data or analysis, which would violate the 'Keep it simple' principle if done excessively."}]}, {"question": "Many beginning chart designers believe that using 3D effects and intricate patterns makes a chart look more 'professional' or 'sophisticated.' However, this section advises against such elements. What is the fundamental reason for this advice?", "options": [{"text": "3D effects and patterns often make charts load slower on web pages.", "isCorrect": false, "rationale": "This is a practical concern, but not the fundamental design principle discussed in the text regarding visual elements and data integrity."}, {"text": "They can make the chart appear too childish for a professional audience.", "isCorrect": false, "rationale": "This is a subjective judgment and not the primary principle-based reason for avoiding these elements."}, {"text": "These elements typically add 'chart junk' by increasing ink without conveying additional data, thus lowering the data-ink ratio.", "isCorrect": true, "rationale": "The text highlights Tufte's principle that 'complexity is not the same as sophistication' and advises avoiding '3D effects — they add ink without adding data,' classifying them as 'chart junk' that reduces the data-ink ratio."}, {"text": "They are difficult to implement correctly in most standard charting software.", "isCorrect": false, "rationale": "This is a software-specific challenge and not the core design philosophy being taught."}]}, {"question": "A data journalist at a reputable newspaper is creating an infographic about public health trends for a national audience. Beyond ensuring clarity and visual accessibility, what critical element must they include to uphold journalistic integrity and allow readers to scrutinize the findings?", "options": [{"text": "An interactive version of the chart allowing readers to filter data.", "isCorrect": false, "rationale": "While an interactive chart is a good enhancement, it's not a fundamental requirement for the core journalistic integrity of a static visualization."}, {"text": "A detailed explanation of the statistical methods used for analysis.", "isCorrect": false, "rationale": "A detailed methodological explanation might be in an accompanying article, but it's typically too extensive for the chart itself and less fundamental than citing the source."}, {"text": "The full dataset in an appended spreadsheet.", "isCorrect": false, "rationale": "Providing the full dataset is a practice of open data, but for a public-facing chart, a clear source citation is the immediate and essential requirement for verification and trust."}, {"text": "A clear citation of the data source at the bottom of the chart.", "isCorrect": true, "rationale": "The text states, 'Always note where your data came from... Without a source, your chart cannot be verified or trusted.' This is reinforced by the 'Realworld [Data Journalism]' section emphasizing honesty and trustworthiness."}]}, {"question": "Considering the 'Seven Principles of Good Chart Design' and Edward Tufte's data-ink ratio, what is the ultimate, overarching goal for creating effective data visualizations?", "options": [{"text": "To impress the audience with visually stunning and intricate designs.", "isCorrect": false, "rationale": "This contradicts Tufte's emphasis on data-ink ratio and the principle of keeping it simple; complexity is not sophistication."}, {"text": "To ensure the data is communicated as clearly, honestly, and efficiently as possible to the broadest audience.", "isCorrect": true, "rationale": "This encapsulates all principles: simplicity for clarity, starting axes at zero for honesty, labeling and sources for trust, colorblind-friendly palettes for broad accessibility, and the data-ink ratio for efficiency in conveying information ('show the data')."}, {"text": "To adhere strictly to software defaults for consistency across all charts.", "isCorrect": false, "rationale": "Software defaults often do not follow best practices, such as starting bar chart axes at zero or using colorblind-friendly palettes, and should not be strictly adhered to."}, {"text": "To always produce charts that are printable in black and white to save ink.", "isCorrect": false, "rationale": "While a practical consideration, this is not the fundamental goal of effective data visualization, which prioritizes clear and honest communication above all else."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
