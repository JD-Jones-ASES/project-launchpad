<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Charts, Graphs, and Diagrams &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes a pictograph from other types of charts?", "options": [{"text": "It uses numbers only.", "isCorrect": false, "rationale": "Pictographs are defined by their use of picture symbols, not just numbers."}, {"text": "It uses repeated picture symbols to represent data.", "isCorrect": true, "rationale": "The definition states, 'A pictograph... is a chart that uses repeated picture symbols to represent data.'"}, {"text": "It always shows percentages.", "isCorrect": false, "rationale": "Pictographs typically represent raw counts, not necessarily percentages."}, {"text": "It compares data using bars.", "isCorrect": false, "rationale": "A chart that uses bars for comparison is a bar graph, not a pictograph."}]}, {"question": "According to the text, why is it essential to 'Always check the key first!' when reading a pictograph?", "options": [{"text": "The key provides the title of the chart.", "isCorrect": false, "rationale": "The title is separate from the key. The key's purpose is to explain symbol value."}, {"text": "Without the key, you cannot accurately understand what each symbol's value is.", "isCorrect": true, "rationale": "The text explicitly states, 'Without the key, you cannot read the chart correctly,' emphasizing its role in defining symbol value."}, {"text": "The key lists all the categories of data being compared.", "isCorrect": false, "rationale": "Categories are typically indicated by labels for rows or columns, not by the key itself."}, {"text": "It tells you who created the pictograph.", "isCorrect": false, "rationale": "The key's function is to explain data representation, not authorship."}]}, {"question": "A pictograph shows 'Apples Sold' where each apple symbol represents 5 apples. If a row for 'Monday' has 7 full apple symbols, how many apples were sold on Monday?", "options": [{"text": "7 apples", "isCorrect": false, "rationale": "This only counts the symbols without applying the key's value, which is a common mistake noted in the text."}, {"text": "12 apples", "isCorrect": false, "rationale": "This incorrectly adds the number of symbols to the key's value, instead of multiplying."}, {"text": "35 apples", "isCorrect": true, "rationale": "To find the total, you multiply the number of symbols by the value each symbol represents: 7 symbols * 5 apples/symbol = 35 apples."}, {"text": "50 apples", "isCorrect": false, "rationale": "This would be the total if there were 10 symbols, not 7."}]}, {"question": "If a pictograph's key states that one full symbol represents 10 items, what value does a half symbol represent?", "options": [{"text": "10 items", "isCorrect": false, "rationale": "This is the value of a full symbol, not a half symbol."}, {"text": "20 items", "isCorrect": false, "rationale": "This would be the value of two full symbols."}, {"text": "5 items", "isCorrect": true, "rationale": "The text defines a half symbol as representing 'exactly half the value of one full symbol.' Half of 10 items is 5 items."}, {"text": "2.5 items", "isCorrect": false, "rationale": "This would be a quarter of the full symbol's value, or half the value if the full symbol was 5 items."}]}, {"question": "Considering the overall description of pictographs, what is their primary advantage in displaying data compared to a simple table of numbers?", "options": [{"text": "They can display more precise data values than tables.", "isCorrect": false, "rationale": "Pictographs, especially with half symbols, can sometimes be less precise than exact numbers in a table."}, {"text": "They make data more 'fun-looking' and visually intuitive, aiding quick comparison.", "isCorrect": true, "rationale": "The text highlights pictographs as 'fun-looking charts' and emphasizes visual comparison to find 'most, least, and any interesting patterns.'"}, {"text": "They are always more complex to create than other charts.", "isCorrect": false, "rationale": "The complexity depends on the data and design; they are often used for simplicity."}, {"text": "They eliminate the need for a title or categories.", "isCorrect": false, "rationale": "The 'How to Read a Pictograph' section explicitly states to 'Read the title' and compare 'rows or columns.'"}]}, {"question": "Which of the following is NOT listed as a step in 'How to Read a Pictograph'?", "options": [{"text": "Read the title to understand what is being compared.", "isCorrect": false, "rationale": "This is the first step listed: 'Read the title — what is being compared?'"}, {"text": "Check the key to understand symbol value.", "isCorrect": false, "rationale": "This is the second step listed: 'Check the key — what does each symbol represent?'"}, {"text": "Calculate the percentage of each category compared to the total.", "isCorrect": true, "rationale": "The 'How to Read' steps focus on counting symbols, multiplying by the key, and comparing raw totals, not calculating percentages."}, {"text": "Count full and half symbols, then multiply by the key's value.", "isCorrect": false, "rationale": "This is a key part of the reading process: 'Count the symbols... Multiply: number of symbols × value of each symbol.'"}]}, {"question": "A pictograph uses a symbol of a star to represent 4 movie tickets. If a student watched 10 movies, how would this be represented on the pictograph?", "options": [{"text": "Two full stars and one half star.", "isCorrect": true, "rationale": "Two full stars represent 2 * 4 = 8 tickets. One half star represents half of 4, which is 2 tickets. 8 + 2 = 10 tickets."}, {"text": "Two full stars.", "isCorrect": false, "rationale": "Two full stars would only represent 8 tickets (2 * 4)."}, {"text": "Five full stars.", "isCorrect": false, "rationale": "Five full stars would represent 20 tickets (5 * 4)."}, {"text": "One full star and three half stars.", "isCorrect": false, "rationale": "This would also equal 10 (4 + 2 + 2 + 2), but the standard and 'cleaner' representation for 10 tickets would be 2 full stars and 1 half star, as the text implies efficient use of half symbols."}]}, {"question": "Based on the 'Common Misconception' and 'Quick Tip' sections, what is the most frequent error students make when interpreting pictographs?", "options": [{"text": "Forgetting to read the chart's title.", "isCorrect": false, "rationale": "While important, this is not highlighted as the 'most common mistake' in the text."}, {"text": "Miscounting the total number of rows or columns.", "isCorrect": false, "rationale": "This is not specifically identified as the most common error."}, {"text": "Forgetting to multiply the symbol count by the scale (key value).", "isCorrect": true, "rationale": "The text explicitly states: 'Common Misconception: Students often forget to multiply the symbol count by the scale' and 'The most common mistake when reading a pictograph is forgetting to multiply by the key value.'"}, {"text": "Confusing a full symbol with a half symbol.", "isCorrect": false, "rationale": "Although possible, the text emphasizes forgetting the multiplication as the primary common mistake."}]}, {"question": "Why does the text suggest that 'pictograph scales need to be chosen carefully,' especially when dealing with half symbols?", "options": [{"text": "Because using half symbols makes the chart too long.", "isCorrect": false, "rationale": "Chart length is not the reason cited for careful scale selection."}, {"text": "To ensure data values can be represented cleanly, avoiding situations where exact halves don't fit.", "isCorrect": true, "rationale": "The text explains, 'If Sam had read 11 books with a key of '1 symbol = 4 books,' there is no neat way to show 11. That is one reason pictograph scales need to be chosen carefully.'"}, {"text": "To make the symbols easier to draw for students.", "isCorrect": false, "rationale": "The discussion is about interpretation and representation, not ease of drawing."}, {"text": "So that the total number of items is always an odd number.", "isCorrect": false, "rationale": "The goal is clean representation for all data, not to force totals into odd numbers."}]}, {"question": "According to the 'Pictographs in the Real World' section, which of these would NOT typically be considered an example of a pictograph?", "options": [{"text": "Sun and cloud symbols on a weather chart.", "isCorrect": false, "rationale": "The text explicitly mentions 'Weather charts sometimes use sun and cloud symbols' as an example."}, {"text": "Public restroom signs using a person symbol.", "isCorrect": false, "rationale": "The text states, 'Public restroom signs are basically pictographs — one person symbol represents a whole group.'"}, {"text": "A spreadsheet listing company sales figures in numbers.", "isCorrect": true, "rationale": "A spreadsheet with numbers is a table of data, not a pictograph, which is defined by using 'repeated picture symbols.'"}, {"text": "Olympic medal counts displayed with gold, silver, and bronze medal icons.", "isCorrect": false, "rationale": "The text includes 'Olympic medal counts... shown with gold, silver, and bronze medal icons' as an example."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
