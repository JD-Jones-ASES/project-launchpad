    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best captures the primary purpose of an infographic as described in the text?", "options": [{"text": "To replace lengthy textual reports entirely, making reading unnecessary.", "isCorrect": false, "rationale": "While infographics summarize, they are designed to complement, not entirely replace, detailed reports. They aim for quick understanding, allowing deeper dives into details if desired."}, {"text": "To communicate data or ideas quickly and clearly through a single visual design.", "isCorrect": true, "rationale": "The definition states an infographic 'is a visual display that combines charts, icons, images, and text into a single design to communicate data or ideas quickly and clearly.'"}, {"text": "To showcase a designer's artistic skills and ability to use advanced visualization software.", "isCorrect": false, "rationale": "Design quality is a means to an end, not the primary purpose. The goal is communication, not simply showcasing artistic talent."}, {"text": "To present only the most dramatic and attention-grabbing statistics to go viral on social media.", "isCorrect": false, "rationale": "While infographics often use key numbers to grab attention and can be shared, their purpose is to tell a 'story at a glance' comprehensively, not just to present dramatic data for virality."}], "id": "q01"}, {"question": "When evaluating the trustworthiness of an infographic, which specific component is highlighted as 'extremely important' for a critical reader to locate and assess?", "options": [{"text": "The headline, to understand the main message.", "isCorrect": false, "rationale": "The headline helps grasp the main message, but it doesn't confirm the accuracy or reliability of the underlying data itself."}, {"text": "Key numbers, to identify the most impactful statistics.", "isCorrect": false, "rationale": "Key numbers grab attention but do not inherently vouch for the data's credibility. They are often pulled from the data, which needs external verification."}, {"text": "Explanatory text, to clarify what charts and numbers mean.", "isCorrect": false, "rationale": "Explanatory text helps in understanding, but it doesn't provide the origin or validation of the data being explained."}, {"text": "The data source, to verify where the information originated.", "isCorrect": true, "rationale": "The text explicitly states the 'Data source' is 'extremely important for evaluating whether the infographic is trustworthy.'"}], "id": "q02"}, {"question": "An infographic about environmental conservation uses a small image of a leaf next to statistics on deforestation. According to the text, what building block of an infographic does this leaf represent?", "options": [{"text": "A chart or graph.", "isCorrect": false, "rationale": "Charts and graphs are data visualization elements like bar charts or pie charts, not simple images."}, {"text": "A key number.", "isCorrect": false, "rationale": "Key numbers are large, bold statistics pulled out of the data."}, {"text": "An icon.", "isCorrect": true, "rationale": "The text defines icons as 'Simple, small images (a water droplet for water usage, a person silhouette for population) that make the infographic look friendly and help readers grasp concepts quickly.'"}, {"text": "Explanatory text.", "isCorrect": false, "rationale": "Explanatory text consists of short paragraphs or captions."}], "id": "q03"}, {"question": "According to the 'How to read an Infographic' section, what is the very first step a reader should take when interpreting a new infographic?", "options": [{"text": "Scan the layout to understand its organization.", "isCorrect": false, "rationale": "Scanning the layout is mentioned as the second step in the 'How to read An Infographic' enumeration."}, {"text": "Read the headline to grasp the main message.", "isCorrect": true, "rationale": "The first step listed is 'Read the headline first. What is the main message the designer wants you to walk away with?'"}, {"text": "Find the data source to check for credibility.", "isCorrect": false, "rationale": "Finding the data source is listed as the fifth step in the 'How to read An Infographic' enumeration."}, {"text": "Identify each element, such as charts or icons.", "isCorrect": false, "rationale": "Identifying each element is mentioned as the third step in the 'How to read An Infographic' enumeration."}], "id": "q04"}, {"question": "A student encounters an infographic on social media that is visually appealing, with professional graphics and a modern layout. Based on the common misconceptions and risks discussed, what critical caution should the student exercise?", "options": [{"text": "The infographic must contain reliable data due to its professional design.", "isCorrect": false, "rationale": "This is a common misconception. The text explicitly warns: 'Students often assume that a visually attractive infographic must contain accurate or reliable data. Emphasize that design quality has nothing to do with data quality.'"}, {"text": "The visual appeal means the information is likely simplified and lacks depth.", "isCorrect": false, "rationale": "While infographics simplify, visual appeal itself doesn't mean it lacks depth; rather, it's a design choice. The primary caution is about data quality."}, {"text": "Design quality has no bearing on data quality, so the data must still be evaluated independently.", "isCorrect": true, "rationale": "The text states: 'design quality has nothing to do with data quality' and 'Your job as a reader is to look past the design and evaluate the data itself.'"}, {"text": "The infographic is probably trustworthy because it's shared widely on social media.", "isCorrect": false, "rationale": "Widespread sharing does not equate to trustworthiness. The text cautions against unverified data in such contexts."}], "id": "q05"}, {"question": "An infographic presents compelling statistics about global health but notably lacks a visible 'Data source' at the bottom. Applying the text's guidance on trustworthiness, how should a critical reader proceed?", "options": [{"text": "Assume the data is publicly known and therefore reliable.", "isCorrect": false, "rationale": "The text advises against such assumptions. Without a source, data cannot be verified as publicly known or reliable."}, {"text": "Treat the numbers with serious skepticism until a source can be verified.", "isCorrect": true, "rationale": "The 'Watch Out!' section clearly states: 'Always check the data source. If there is no source, treat the numbers with serious skepticism.'"}, {"text": "Focus only on the charts and ignore the text, as text is more prone to bias.", "isCorrect": false, "rationale": "All components need evaluation, and ignoring text doesn't solve the issue of missing data source for the charts."}, {"text": "Accept the information as fact, as reputable sources don't always list their data.", "isCorrect": false, "rationale": "Reputable sources almost always list their data sources for transparency and credibility. Accepting information without a source is risky."}], "id": "q06"}, {"question": "W.E.B. Du Bois, through his hand-drawn charts at the 1900 Paris Exhibition, demonstrated a profound understanding of infographics beyond mere information display. What key insight did his work highlight?", "options": [{"text": "That complex data could only be understood by a highly educated audience.", "isCorrect": false, "rationale": "Du Bois aimed to counter racist myths with 'hard facts and stunning graphics,' implying a desire for broader impact and understanding, not exclusivity."}, {"text": "That infographics are primarily artistic expressions for museum display.", "isCorrect": false, "rationale": "While his charts are now in museums, his original intent was to use them to 'tell the story of Black life in America,' indicating a purpose beyond pure art."}, {"text": "That data visualization could be a powerful tool for making arguments and changing minds.", "isCorrect": true, "rationale": "The text states: 'Du Bois understood something... that infographics are not just information — they are arguments. Choose the right data, visualize it powerfully, and you can change minds.'"}, {"text": "That only quantitative data, not qualitative, could be effectively visualized.", "isCorrect": false, "rationale": "The text focuses on his use of data to make arguments, not a limitation on data types. His charts showed social facts like property ownership and literacy rates, which are quantitative."}], "id": "q07"}, {"question": "In the section 'The Building Blocks of an Infographic,' which component is explicitly defined as 'the evidence supporting the headline'?", "options": [{"text": "Key numbers.", "isCorrect": false, "rationale": "Key numbers are 'large, bold statistics pulled out of the data to grab attention,' but are not described as the primary evidence."}, {"text": "Explanatory text.", "isCorrect": false, "rationale": "Explanatory text 'explain what the charts and numbers mean,' but they are not the evidence itself."}, {"text": "Charts and graphs.", "isCorrect": true, "rationale": "The text states: 'Charts and graphs — The data visualization elements... These are the evidence supporting the headline.'"}, {"text": "Icons.", "isCorrect": false, "rationale": "Icons are 'simple, small images... that make the infographic look friendly and help readers grasp concepts quickly,' not the core evidence."}], "id": "q08"}, {"question": "A student is analyzing an infographic about global population growth and notices a massive number, '8 Billion,' prominently displayed as a 'key number.' According to the 'how to read' section, what *additional* step should the student take regarding this number?", "options": [{"text": "Assume the number is accurate because it's bold and prominent.", "isCorrect": false, "rationale": "The text advises against assuming accuracy based on visual prominence alone."}, {"text": "Check the claims to see if this number matches numbers in charts or text and aligns with the data source.", "isCorrect": true, "rationale": "The final step in 'How to read An Infographic' is 'Check the claims. Do the numbers in the text match the numbers in the charts? Do the icons and visuals match the data?' This applies to key numbers as well."}, {"text": "Identify the icon associated with the number to understand its visual representation.", "isCorrect": false, "rationale": "Identifying icons is a separate step and doesn't address the verification of the key number's value or consistency."}, {"text": "Immediately look for a different infographic to cross-reference the number.", "isCorrect": false, "rationale": "While cross-referencing is good practice, the 'how to read' steps focus on evaluating *within* the given infographic first before moving to external sources."}], "id": "q09"}, {"question": "The text states that the *idea* of combining pictures with data long predates the widespread use of the word 'infographic' around 2010. Which historical example is specifically cited in the text as essentially an early infographic?", "options": [{"text": "The charts presented by W.E.B. Du Bois in 1900.", "isCorrect": false, "rationale": "While Du Bois's charts are a strong early example of data visualization, the 'didyouknow' section explicitly identifies other figures as 'essentially an early infographic' or 'an infographic over 150 years before the term existed.'"}, {"text": "Social media graphics created to spread information quickly.", "isCorrect": false, "rationale": "Social media usage is noted as making the *word* infographic popular around 2010, not predating the concept."}, {"text": "Florence Nightingale's rose diagram from 1858.", "isCorrect": true, "rationale": "The 'didyouknow' section explicitly states: 'Florence Nightingale's rose diagram from 1858 (Chapter 3) was essentially an early infographic.'"}, {"text": "Online dashboards displaying real-time business metrics.", "isCorrect": false, "rationale": "Online dashboards are a modern application of infographics, not an historical precursor."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
