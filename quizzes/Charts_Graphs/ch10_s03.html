        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 10, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is considered one of the greatest strengths of box plots, especially when placed side-by-side?", "options": [{"text": "Displaying the detailed shape of a distribution, including specific peaks and gaps.", "isCorrect": false, "rationale": "The text states that box plots do NOT show the detailed shape of the distribution; histograms are used for that."}, {"text": "Comparing two or more distributions instantly on the same scale.", "isCorrect": true, "rationale": "The section explicitly states, 'One of the greatest strengths of box plots is that you can place two (or more) of them side by side on the same scale and compare them instantly.'"}, {"text": "Identifying the exact mean of a dataset precisely.", "isCorrect": false, "rationale": "Box plots primarily show the median, not the mean, as a measure of center, and they summarize data rather than providing exact points."}, {"text": "Showing every individual data point for small datasets.", "isCorrect": false, "rationale": "Box plots summarize data; dot plots or raw data are used to show individual points. The text even suggests using box plots when there's 'too much data for a dot plot'."}], "id": "q01"}, {"question": "When comparing two side-by-side box plots, what does a group with a higher median typically indicate?", "options": [{"text": "It has a wider overall range of data.", "isCorrect": false, "rationale": "A wider overall range is indicated by longer whisker lengths, not directly by a higher median."}, {"text": "It has more variability in its middle 50% of data.", "isCorrect": false, "rationale": "More variability in the middle 50% is indicated by a wider Interquartile Range (IQR), or box, not the median itself."}, {"text": "Its center is generally higher.", "isCorrect": true, "rationale": "The text states that the median is the 'fairest single-number summary of the center,' so a higher median indicates a higher center for that group."}, {"text": "It always has a higher maximum value.", "isCorrect": false, "rationale": "The text explicitly warns against the 'Common Misconception' that a group with a higher median always has a higher maximum, providing counterexamples."}], "id": "q02"}, {"question": "If Group A's box plot shows an IQR of 2.0 and Group B's box plot shows an IQR of 4.5, what can be concluded about Group B compared to Group A?", "options": [{"text": "Group B has a higher median value.", "isCorrect": false, "rationale": "The IQR measures spread, not the center. A higher or lower IQR does not directly imply a higher or lower median."}, {"text": "Group B's data is more consistent in the middle 50%.", "isCorrect": false, "rationale": "A larger IQR indicates greater variability, meaning the data in the middle 50% is less consistent or more spread out, not more consistent."}, {"text": "Group B's middle 50% of data is more spread out.", "isCorrect": true, "rationale": "The text defines IQR as indicating 'more variability in the middle 50% of the data,' and a wider box (larger IQR) means more spread out."}, {"text": "Group B has more extreme outliers.", "isCorrect": false, "rationale": "The IQR measures the spread of the middle data, not the presence or number of outliers. Outliers are represented by individual dots outside the whiskers."}], "id": "q03"}, {"question": "According to the 'Common Misconceptions' note, what is a key misunderstanding students might have when interpreting whisker lengths?", "options": [{"text": "That a long whisker signifies the absence of any extreme values.", "isCorrect": false, "rationale": "A long whisker indicates data extending far out, but doesn't preclude the existence of outliers beyond it, which are usually marked separately."}, {"text": "That a short whisker suggests a highly variable overall dataset.", "isCorrect": false, "rationale": "A short whisker typically suggests a smaller range for that portion of the data, indicating less variability in that segment, not more for the whole dataset."}, {"text": "That a long whisker means most of the data points are located within that extended part of the range.", "isCorrect": true, "rationale": "The text specifically warns, 'A long whisker just means data extends far — not that most data is out there.'"}, {"text": "That whisker lengths are not useful for comparing the overall range between groups.", "isCorrect": false, "rationale": "The text advises comparing whisker lengths to see 'which group has a longer range overall,' so they are useful for range comparison."}], "id": "q04"}, {"question": "Based on the 'Sleep Hours' worked example, what is a primary conclusion drawn about school night sleep compared to weekend sleep?", "options": [{"text": "Students sleep more variably on school nights than on weekends.", "isCorrect": false, "rationale": "The example's conclusion states that school-night sleep is 'more consistent (less variable),' while 'Weekend sleep is more variable.'"}, {"text": "School night sleep hours consistently have a higher median.", "isCorrect": false, "rationale": "The example shows the School nights median as 7.5 hours and Weekend median as 9.5 hours, indicating school nights have a lower median."}, {"text": "School night sleep is more consistent (less variable) than weekend sleep.", "isCorrect": true, "rationale": "The conclusion explicitly states: 'Students consistently sleep less on school nights, and their school-night sleep is also more consistent (less variable).'"}, {"text": "Weekend sleep consistently has a smaller overall range.", "isCorrect": false, "rationale": "The example shows Weekend range: 6.0 hours, and School nights range: 4.5 hours, meaning weekends have a wider overall range."}], "id": "q05"}, {"question": "For which of the following scenarios would side-by-side box plots be the LEAST appropriate choice?", "options": [{"text": "Comparing the distribution of student ages across two different grade levels.", "isCorrect": false, "rationale": "This scenario involves comparing two groups on a numerical measurement (age) and is suitable for box plots to examine center, spread, and extreme values."}, {"text": "Analyzing the effectiveness of two different fertilizers on crop yield in bushels per acre.", "isCorrect": false, "rationale": "This is a classic use case for comparing two groups' numerical outcomes to see differences in performance and variability, which box plots are excellent for."}, {"text": "Displaying the detailed shape of a single distribution, including specific peaks, gaps, and skewness.", "isCorrect": true, "rationale": "The text explicitly states: 'Do NOT use side-by-side box plots when you want to show the detailed shape of the distribution — use histograms for that (Section 10.1).'"}, {"text": "Comparing the distribution of daily temperatures in two different cities over a year, with many data points.", "isCorrect": false, "rationale": "This involves comparing two groups on a numerical measurement with a large amount of data, making box plots a suitable tool to compare center, spread, and extremes."}], "id": "q06"}, {"question": "A teacher displays box plots for test scores from two classes. Class A has a median score of 80, and Class B has a median score of 75. However, Class B's highest score is 98, while Class A's highest score is 90. This scenario directly illustrates which common misconception mentioned in the text?", "options": [{"text": "Comparing whisker lengths without understanding their representation of data extension.", "isCorrect": false, "rationale": "This scenario focuses on the relationship between median and maximum, not solely on the interpretation of whisker lengths in isolation."}, {"text": "Incorrectly assuming that a group with a higher median always has a higher maximum.", "isCorrect": true, "rationale": "The text warns against this specific misconception: 'Students may incorrectly assume that a group with a higher median always has a higher maximum. Show counterexamples where a group has a lower median but a higher maximum.' This example is precisely such a counterexample."}, {"text": "Mistaking the Interquartile Range (IQR) for the overall range of the data.", "isCorrect": false, "rationale": "The scenario is not about confusing IQR with the overall range, but rather about the relative positions of the median and maximum."}, {"text": "Believing that outliers are present in every dataset, regardless of the data.", "isCorrect": false, "rationale": "The scenario does not discuss the presence or absence of outliers, nor a misconception about their universality."}], "id": "q07"}, {"question": "A sports analyst uses side-by-side box plots to compare the points scored per game for Team X and Team Y over a season. Team X's box plot shows a smaller IQR and a slightly lower median than Team Y. Team Y, however, also has a significantly lower minimum score than Team X. What is a reasonable conclusion the analyst might draw?", "options": [{"text": "Team X typically scores higher than Team Y, but with more variability.", "isCorrect": false, "rationale": "Team X has a *lower* median (typical score) and a *smaller* IQR (less variability/more consistency)."}, {"text": "Team Y is more consistent in its scoring, but with a lower typical performance.", "isCorrect": false, "rationale": "Team Y has a *larger* IQR (less consistent) but a *higher* median (higher typical performance), and a lower minimum score indicating some bad games."}, {"text": "Team X is more consistent in its scoring, while Team Y typically scores higher but can also have worse games.", "isCorrect": true, "rationale": "Team X's smaller IQR indicates more consistency. Team Y's higher median suggests a higher typical score, but its significantly lower minimum indicates a greater potential for very low-scoring, or 'worse,' games, aligning with the real-world example description."}, {"text": "Both teams exhibit similar levels of consistency and overall scoring ability.", "isCorrect": false, "rationale": "The described differences in IQR, median, and minimum clearly indicate that the teams are not similar in consistency or overall scoring ability."}], "id": "q08"}, {"question": "Which of the following is NOT listed as one of the four key elements to compare when analyzing two side-by-side box plots?", "options": [{"text": "Medians", "isCorrect": false, "rationale": "Medians are listed as the first element to compare, summarizing the center."}, {"text": "Interquartile Ranges (IQRs)", "isCorrect": false, "rationale": "IQRs are listed as the second element to compare, indicating variability in the middle 50%."}, {"text": "Overall Averages (Means)", "isCorrect": true, "rationale": "While means are a measure of center, the text specifically lists 'Medians' as the single-number summary of the center to compare for box plots, not means."}, {"text": "Outliers", "isCorrect": false, "rationale": "Outliers are listed as the fourth element to compare, indicating unusual extreme values."}], "id": "q09"}, {"question": "Based on the 'Discussion Prompt' in the teacher's note, what additional information would be useful to consider when deciding if a school should change its start time based on sleep hours data?", "options": [{"text": "The exact sleep hours of individual students on the honor roll.", "isCorrect": false, "rationale": "While specific student data might be interesting, the prompt asks for 'other information,' implying broader factors beyond individual high-achievers. The detailed sleep times of a specific subset aren't directly implied by 'What other information would you want?'"}, {"text": "The students' preferences for morning classes versus afternoon classes.", "isCorrect": false, "rationale": "Student preferences for class times are not explicitly mentioned in the context of the provided sleep data or the prompt for 'other information' needed to make a school start time decision, which typically focuses on health and academic performance impacts related to sleep."}, {"text": "Information about academic performance, attendance, or student well-being related to sleep patterns.", "isCorrect": true, "rationale": "Changing a school start time based on sleep data would primarily aim to improve student outcomes. Therefore, data connecting sleep patterns to academic performance, attendance, or overall well-being would be crucial 'other information' to justify such a decision."}, {"text": "The school's budget for extracurricular activities.", "isCorrect": false, "rationale": "While school budgets are always a factor in operational decisions, the prompt is specifically about changing start times based on sleep data, implying information relevant to the impact on students. Extracurricular budget is a distant concern for this specific prompt."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
