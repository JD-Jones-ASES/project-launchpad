<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes a dashboard from a single chart, according to the text?", "options": [{"text": "Dashboards always use real-time data, while single charts do not.", "isCorrect": false, "rationale": "The text does not state that dashboards *always* use real-time data or that single charts never do. While many modern dashboards are real-time, it's not the defining characteristic mentioned."}, {"text": "A dashboard displays multiple charts, graphs, or summaries on a single screen to show many aspects of one topic.", "isCorrect": true, "rationale": "The definition states, 'A dashboard is a visual display that combines multiple charts, graphs, or data summaries on a single screen or page, allowing a reader to understand many aspects of a topic at once.'"}, {"text": "Single charts are interactive, whereas dashboards are static images.", "isCorrect": false, "rationale": "The text does not make this distinction; in fact, many dashboards are highly interactive, while single charts can be static or interactive."}, {"text": "Dashboards are exclusively used for business or academic purposes, not personal use.", "isCorrect": false, "rationale": "The text mentions examples like sports statistics and personal homework completion, indicating they are not exclusive to business or academia."}], "id": "q01"}, {"question": "According to the 'Common Misconceptions' section, what is a crucial aspect to remember when interpreting the panels within a good dashboard?", "options": [{"text": "Each panel should be analyzed in isolation to avoid bias from other data.", "isCorrect": false, "rationale": "The text explicitly states, 'Students may treat each panel as completely independent. Emphasize that a good dashboard tells one unified story; the panels work together,' directly contradicting this option."}, {"text": "The panels work together to tell one unified story about a single topic.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section emphasizes, 'Emphasize that a good dashboard tells one unified story; the panels work together.'"}, {"text": "Readers should try to understand all panels simultaneously for quick insights.", "isCorrect": false, "rationale": "The text advises, 'Students sometimes try to read all panels simultaneously. Guide them to read one panel at a time, then synthesize,' making this option incorrect."}, {"text": "Only the most important panel, typically in the top-left, needs thorough examination.", "isCorrect": false, "rationale": "While the top-left is for important information, the text instructs to read all panels and connect them for the full story, implying all are important."}], "id": "q02"}, {"question": "A school principal wants to create a dashboard panel to visualize 'the proportion of students participating in different extracurricular activities (e.g., sports, arts, academic).' Which chart type would be most appropriate for this specific panel, based on dashboard design principles?", "options": [{"text": "Bar chart", "isCorrect": false, "rationale": "While bar charts are good for comparing categories, pie charts are specifically mentioned for answering 'what are the proportions?'"}, {"text": "Line graph", "isCorrect": false, "rationale": "Line graphs are best for showing how something changes over time, not for proportions of a whole."}, {"text": "Pie chart", "isCorrect": true, "rationale": "The text states, 'Pie charts answer 'what are the proportions?'' making it the most appropriate choice for displaying the proportion of students in different activities."}, {"text": "Histogram", "isCorrect": false, "rationale": "Histograms are used to show the distribution of a single continuous variable, not proportions across distinct categories."}], "id": "q03"}, {"question": "Why does the text suggest placing the most important information in the top-left corner of a dashboard?", "options": [{"text": "It is aesthetically pleasing and balances the visual weight of the dashboard.", "isCorrect": false, "rationale": "While aesthetics are important, the text provides a functional reason related to reader behavior."}, {"text": "Readers in left-to-right cultures naturally look there first, ensuring critical data is seen immediately.", "isCorrect": true, "rationale": "The text states, 'Most important information is usually placed in the top-left corner (where eyes go first in cultures that read left-to-right),' explaining this design principle."}, {"text": "This position allows for easier real-time data updates.", "isCorrect": false, "rationale": "The position of a panel on a screen does not inherently affect the ease of real-time data updates."}, {"text": "It is a traditional layout inherited from car dashboards.", "isCorrect": false, "rationale": "The car dashboard analogy explains the concept of displaying multiple measurements simultaneously, but not the specific top-left placement for importance."}], "id": "q04"}, {"question": "Before delving into the data of individual panels, what is the *initial recommended step* when reading any dashboard?", "options": [{"text": "Identify the chart type of each panel to anticipate its purpose.", "isCorrect": false, "rationale": "This is part of reading individual panels, which comes after understanding the overall context."}, {"text": "Immediately look for contradictions between different data sets.", "isCorrect": false, "rationale": "This is part of connecting the panels, which is a later step after individual panels are understood."}, {"text": "Read the overall title to understand the dashboard's main topic and time period.", "isCorrect": true, "rationale": "The first step listed under 'How to Read A Dashboard' is 'Read the overall title. What topic does this dashboard cover? What time period?'"}, {"text": "Check the scales and data sources for accuracy.", "isCorrect": false, "rationale": "This is the final step in the 'How to Read A Dashboard' guide."}], "id": "q05"}, {"question": "In the 'Worked Example: School Performance Dashboard,' what combined story emerges when connecting the trends from all four panels?", "options": [{"text": "Overall student performance is declining across all metrics.", "isCorrect": false, "rationale": "This is incorrect because the GPA trend (Panel 4) shows an improvement, contradicting a general decline."}, {"text": "Academic success is improving, but declining attendance poses a potential risk for future grades.", "isCorrect": true, "rationale": "The combined story explicitly states: 'Grades and long-term GPA are improving, which is great. But attendance is dropping, and December is a concern. Low attendance often leads to lower grades — so the principal needs to watch next semester's data carefully.'"}, {"text": "Club participation directly correlates with higher grades, suggesting more focus on extracurriculars.", "isCorrect": false, "rationale": "The example does not draw a correlation between club participation and grades, nor does it suggest focusing more on extracurriculars."}, {"text": "The school's academic programs are failing to engage students, leading to lower GPAs.", "isCorrect": false, "rationale": "This is incorrect as Panel 4 shows that GPA has been trending upward, indicating improving academic performance."}], "id": "q06"}, {"question": "A manager creates a dashboard for a retail store that includes a line graph of daily sales, a bar chart comparing weekly customer satisfaction scores, and a pie chart showing product category market share. By presenting these specific charts together, which core dashboard design principle is the manager primarily demonstrating?", "options": [{"text": "Consistent style", "isCorrect": false, "rationale": "Consistent style refers to uniform colors, fonts, and scales, which is not what combining different metrics demonstrates."}, {"text": "Logical layout", "isCorrect": false, "rationale": "Logical layout refers to the placement of panels, not the variety of information presented."}, {"text": "One topic, many views", "isCorrect": true, "rationale": "The dashboard presents multiple facets (sales, satisfaction, market share) all related to the single topic of 'retail store performance,' aligning with the 'One topic, many views' principle."}, {"text": "Check scales and sources", "isCorrect": false, "rationale": "Checking scales and sources is a step in reading a dashboard, not a design principle for its content."}], "id": "q07"}, {"question": "Referring to the 'School Performance Dashboard' example, which specific panel provides data that, when combined with other information, suggests a *potential future problem* despite current academic improvements?", "options": [{"text": "Panel 2: Grade Distribution (Histogram)", "isCorrect": false, "rationale": "This panel shows the current grade distribution but doesn't indicate a declining trend that points to a future problem."}, {"text": "Panel 4: GPA Trend (Line Graph)", "isCorrect": false, "rationale": "This panel shows that GPA has been improving, which is positive news, not a potential future problem."}, {"text": "Panel 3: Club Participation (Pie Chart)", "isCorrect": false, "rationale": "This panel shows current participation proportions and does not indicate a declining trend or future issue."}, {"text": "Panel 1: Attendance by Month (Bar Chart)", "isCorrect": true, "rationale": "Panel 1 shows that 'Attendance is declining' and 'December is lowest (holidays? illness?). This warrants attention.' The combined story further notes, 'Low attendance often leads to lower grades — so the principal needs to watch next semester's data carefully,' clearly identifying it as a potential future problem."}], "id": "q08"}, {"question": "Why is maintaining a 'consistent style' across colors, fonts, and scales crucial for an effective dashboard?", "options": [{"text": "It makes the dashboard appear more professional and visually appealing.", "isCorrect": false, "rationale": "While true, the text provides a more functional reason related to user comprehension, not just aesthetics."}, {"text": "It ensures that the dashboard can be easily printed and distributed.", "isCorrect": false, "rationale": "Printability is not the reason cited for consistent style in the text."}, {"text": "It prevents readers from having to re-learn how to interpret each panel, improving comprehension and speed.", "isCorrect": true, "rationale": "The text states, 'Consistent style: Colors, fonts, and scales are consistent across all panels so you don't have to re-learn each one,' directly supporting this option."}, {"text": "It reduces the computational resources needed to render the dashboard.", "isCorrect": false, "rationale": "Consistent styling is a design principle for user experience, not a technical optimization for rendering performance."}], "id": "q09"}, {"question": "Based on the 'Dashboards in the Real World' section, what is the overarching value or skill that understanding dashboards provides?", "options": [{"text": "The ability to create complex data visualizations from scratch.", "isCorrect": false, "rationale": "The focus of the text is on *reading* and *interpreting* dashboards, not necessarily creating them, although understanding them is a prerequisite."}, {"text": "Essential knowledge for a career exclusively in data science or analytics.", "isCorrect": false, "rationale": "The text states that this skill will serve 'in almost any career,' indicating it's not exclusive to data science."}, {"text": "The capacity to quickly understand multiple measurements of a topic simultaneously, applicable in many careers.", "isCorrect": true, "rationale": "The text emphasizes that dashboards allow 'a reader to understand many aspects of a topic at once' and that 'Knowing how to read a dashboard is a skill that will serve you in almost any career,' aligning with this option."}, {"text": "Expertise in identifying poorly designed charts and graphs.", "isCorrect": false, "rationale": "While a side benefit of critical reading, the primary value highlighted is understanding data, not just identifying flaws."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
