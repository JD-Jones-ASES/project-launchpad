<script>
var QUESTIONS = [{"question": "What is the fundamental question one must answer to correctly choose a data visualization chart, according to the textbook?", "options": [{"text": "How much data do I have?", "isCorrect": false, "rationale": "The quantity of data is a factor in choosing *which specific chart variation* to use (e.g., dot plot vs. histogram), but it is not the primary question for determining the overall purpose of the visualization."}, {"text": "What am I trying to show?", "isCorrect": true, "rationale": "The text explicitly states: 'The secret to choosing the right chart is to answer one question first: What am I trying to show?' This question leads to identifying one of the five main data visualization purposes."}, {"text": "Which chart looks the most aesthetically pleasing?", "isCorrect": false, "rationale": "While aesthetics are important for clarity and engagement, the primary goal of a chart is to convey information accurately and effectively. Choosing based on aesthetics alone can lead to misleading or muddy data stories, as highlighted by the 'screwdriver to hammer' analogy."}, {"text": "What software is available to create the chart?", "isCorrect": false, "rationale": "The choice of software is a practical consideration for implementation, not a guiding principle for determining the communicative purpose of the data visualization itself. The purpose should drive the chart choice, not the tool."}], "id": "q01"}, {"question": "A marketing team wants to display the sales performance of five different product lines over the last quarter. They need to easily identify which product line performed best and worst relative to the others. Which chart type is most appropriate for this goal?", "options": [{"text": "Line graph", "isCorrect": false, "rationale": "Line graphs are primarily used to show 'change over time' for one or a few series, which is not the main goal here. The goal is to compare distinct categories at a single point in time (the last quarter)."}, {"text": "Histogram", "isCorrect": false, "rationale": "Histograms are used to show the 'distribution' of continuous data, revealing how values are spread out, clustered, or show gaps. This scenario involves comparing discrete categories (product lines), not the distribution of a single continuous variable."}, {"text": "Vertical bar chart", "isCorrect": true, "rationale": "A vertical bar chart is explicitly recommended for 'Comparison' when categories have short names and you want to measure different groups against each other. It makes differences in values (sales performance) easy to spot."}, {"text": "Scatter plot", "isCorrect": false, "rationale": "Scatter plots are used to show the 'relationship' between two (or three) variables, looking for trends or correlations. This scenario focuses on comparing performance across distinct categories, not examining a relationship between variables."}], "id": "q02"}, {"question": "A company wants to visualize the breakdown of its annual budget across 15 different departments and several sub-departments, some of which have very small allocations. Which chart would be the most effective choice, and why?", "options": [{"text": "Pie chart, because it clearly shows parts of a whole.", "isCorrect": false, "rationale": "The text states pie charts are 'best for six or fewer slices' and highlights that treemaps handle many categories better. With 15 departments and sub-departments, a pie chart would be cluttered and make comparisons, especially of small allocations, very difficult to discern."}, {"text": "Treemap, because it handles many categories and hierarchies effectively.", "isCorrect": true, "rationale": "The text explicitly recommends treemaps for scenarios with 'many categories or a hierarchy' (e.g., budget by department, then by line item). Rectangles replace slices, making it suitable for displaying complex compositional data with varying sizes."}, {"text": "Waffle chart, because it shows exact percentages clearly.", "isCorrect": false, "rationale": "While waffle charts are good for showing exact percentages in a grid, they are less ideal for 15 hierarchical categories. They are typically used for a single composition to show specific percentage values rather than a complex breakdown with many parts."}, {"text": "Horizontal bar chart, because it can rank items.", "isCorrect": false, "rationale": "A horizontal bar chart is excellent for 'Comparison' or ranking categories, especially with long names. However, the primary goal here is to show 'Composition' (how a whole budget breaks down into parts, with hierarchy), for which a treemap is more specialized."}], "id": "q03"}, {"question": "According to the 'quicktip' in the text, what is a crucial rule for displaying data that shows 'change over time'?", "options": [{"text": "The y-axis must always represent time.", "isCorrect": false, "rationale": "The quicktip specifies that 'the x-axis (horizontal) should always represent time,' not the y-axis. The y-axis typically represents the measured value that is changing."}, {"text": "Time should be arranged from earliest (left) to most recent (right) on the x-axis.", "isCorrect": true, "rationale": "The quicktip explicitly states: 'For any chart showing change over time, the x-axis (horizontal) should always represent time — hours, days, months, or years — arranged from earliest (left) to most recent (right).' Scrambling the order 'breaks the story'."}, {"text": "Only line graphs can be used for time-series data.", "isCorrect": false, "rationale": "While line graphs are the 'first choice,' the text also mentions area charts and stacked area charts as appropriate for showing change over time, depending on the specific nuance (cumulative total, parts of a total)."}, {"text": "Data points should always be connected by dashed lines to indicate progression.", "isCorrect": false, "rationale": "The text does not specify dashed lines; it refers to 'connecting lines' in general. The focus is on the order of time on the axis, not the line style."}], "id": "q04"}, {"question": "A teacher wants to analyze the spread of scores on a recent exam for her class of 150 students, looking for clusters, gaps, and outliers. She also wants to compare this spread to the scores of another class. Which two chart types would be most suitable for her purposes?", "options": [{"text": "Vertical bar chart for the spread and pie chart for comparison.", "isCorrect": false, "rationale": "A vertical bar chart is for comparing categories, not showing the spread of continuous data. A pie chart shows composition, not a comparison of score distributions."}, {"text": "Histogram for the spread of scores and box plot for comparing distributions between classes.", "isCorrect": true, "rationale": "The text recommends a histogram for 'larger datasets of continuous data (like ... test scores) grouped into bins' to understand its shape. It also states a box plot is 'best when you want a compact summary (min, Q1, median, Q3, max) and especially when comparing distributions across two or more groups.' These align perfectly with the teacher's goals."}, {"text": "Line graph for the spread and scatter plot for comparison.", "isCorrect": false, "rationale": "Line graphs are for 'change over time.' Scatter plots are for showing 'relationships' between two variables. Neither is appropriate for visualizing the distribution of a single dataset or comparing distributions."}, {"text": "Waffle chart for the spread and clustered bar chart for comparison.", "isCorrect": false, "rationale": "Waffle charts show exact percentages of a whole, and clustered bar charts compare categories across multiple groups. Neither is designed for understanding the spread, clusters, and outliers of a continuous dataset or comparing its distribution to another."}], "id": "q05"}, {"question": "A researcher is studying the relationship between the amount of time students spend studying and their final exam scores. They want to see if there's a positive, negative, or no correlation. Which chart type should the researcher use?", "options": [{"text": "Stacked area chart", "isCorrect": false, "rationale": "Stacked area charts show how parts of a total change over time. This scenario involves two variables at a given point, not changes over time or parts of a whole."}, {"text": "Dot plot", "isCorrect": false, "rationale": "Dot plots show the distribution of individual points for small datasets. While each student is a point, the primary goal here is to see the 'relationship' between two different variables (study time and score), not just the distribution of one."}, {"text": "Scatter plot", "isCorrect": true, "rationale": "The text states, 'When you want to see how two variables relate to each other, a scatter plot is your go-to.' It is specifically designed to show trends (positive, negative, or no trend) between two variables, making it perfect for studying correlation between study time and scores."}, {"text": "Diverging bar chart", "isCorrect": false, "rationale": "Diverging bar charts are used for 'Comparison' when responses split in two directions (e.g., agree/disagree). This is not applicable to showing the correlation between two continuous variables."}], "id": "q06"}, {"question": "When comparing the same categories across multiple groups, such as 'boys vs. girls' or 'Year 1 vs. Year 2', what specific type of bar chart is recommended?", "options": [{"text": "Horizontal bar chart", "isCorrect": false, "rationale": "Horizontal bar charts are best for long category names or ranking from highest to lowest within a single grouping. They are not specifically optimized for comparing the same categories across *multiple* groups."}, {"text": "Vertical bar chart", "isCorrect": false, "rationale": "The vertical bar chart is the standard choice for simple comparison of 3-10 categories. While it can be adapted, the text specifies a more suitable variation for comparing categories across *multiple groups*."}, {"text": "Clustered bar chart", "isCorrect": true, "rationale": "The text explicitly states that a 'Clustered bar chart' is used 'when you are comparing the same categories across multiple groups (boys vs. girls, Year 1 vs. Year 2)', making it the ideal choice for this scenario."}, {"text": "Diverging bar chart", "isCorrect": false, "rationale": "Diverging bar charts are used when responses split in two opposing directions (e.g., 'strongly agree' to 'strongly disagree') around a central point. They are not designed for direct comparison of categories across separate groups in the way a clustered bar chart is."}], "id": "q07"}, {"question": "A chart displays the percentage contribution of different energy sources (solar, wind, fossil fuels) to a country's total power output over a period of twenty years. The regions below the lines are filled in to visually represent the cumulative total and how each part changes over time. What is the primary purpose of this chart, and what specific type of chart is it likely to be?", "options": [{"text": "Comparison; Clustered bar chart.", "isCorrect": false, "rationale": "The scenario involves changes over time and parts of a whole, not just a static comparison of categories. Clustered bar charts are for comparing discrete categories across groups."}, {"text": "Composition; Pie chart.", "isCorrect": false, "rationale": "While it shows composition, a pie chart represents a single point in time. This scenario describes changes over a twenty-year period, making a time-series chart more appropriate. Also, multiple energy sources would likely exceed the recommended slice limit for a pie chart if shown across years."}, {"text": "Change over time; Stacked area chart.", "isCorrect": true, "rationale": "This chart fits the 'Change over time' purpose, specifically a 'Stacked area chart,' which the text describes as 'for showing how parts of a total each change over time,' with the area filled in for visual weight, aligning with the description of energy source contributions to total power output over years."}, {"text": "Distribution; Box plot.", "isCorrect": false, "rationale": "The chart is not showing the spread or clustering of individual data points. Box plots are for summarizing and comparing the distribution of continuous data, not for visualizing how parts of a total evolve over time."}], "id": "q08"}, {"question": "A scientist wants to visualize data that includes the age of a participant, their reaction time to a stimulus, and the dosage of a medication they received. Which chart type could effectively display all three variables simultaneously?", "options": [{"text": "Scatter plot", "isCorrect": false, "rationale": "A standard scatter plot displays two variables (one per axis). While a third variable *could* be represented by color or shape, a more direct and often clearer method for a quantitative third variable is available."}, {"text": "Bubble chart", "isCorrect": true, "rationale": "The text states that a 'Bubble chart' is for 'three variables: x-position, y-position, and bubble size.' This directly applies to the scenario where age, reaction time, and dosage (as bubble size) can all be visualized on one chart to explore relationships."}, {"text": "Line graph", "isCorrect": false, "rationale": "Line graphs are used for showing 'change over time' with one or a few series. This scenario involves relationships between three distinct variables, not a time series."}, {"text": "Histogram", "isCorrect": false, "rationale": "Histograms are used to show the 'distribution' of a single continuous variable. They are not designed to simultaneously display relationships between three distinct variables."}], "id": "q09"}, {"question": "For visualizing the distribution of a small dataset (fewer than 30 values) where each individual data point needs to be visible, which chart type is recommended?", "options": [{"text": "Histogram", "isCorrect": false, "rationale": "Histograms are 'best for larger datasets of continuous data grouped into bins.' For very small datasets, grouping into bins can obscure individual points or lead to bins with too few observations."}, {"text": "Box plot", "isCorrect": false, "rationale": "Box plots provide a 'compact summary' (min, Q1, median, Q3, max) of a distribution. While useful for comparing distributions, they do not show each individual data point, which is a specific requirement of the question."}, {"text": "Dot plot", "isCorrect": true, "rationale": "The text specifies that a 'Dot plot' is 'best for small datasets (fewer than 30 values) where you want to see each individual point,' directly matching the requirements of the question."}, {"text": "Area chart", "isCorrect": false, "rationale": "Area charts are used for 'Change over time' to show the cumulative total. They are not designed for displaying the distribution of a small dataset with individual points visible."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
