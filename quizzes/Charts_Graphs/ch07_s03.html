<script>
var QUESTIONS = [{"question": "Which of the following is a primary limitation of pie charts that makes them unsuitable for certain part-to-whole data presentations?", "options": [{"text": "They cannot display exact percentage values directly on the chart.", "isCorrect": false, "rationale": "Pie charts can display exact percentage values, typically through labels or tooltips, so this is not a fundamental limitation."}, {"text": "They become difficult to read and compare proportions accurately when there are more than six categories or sub-categories.", "isCorrect": true, "rationale": "The text explicitly states that pie charts are challenged by having too many categories (e.g., 15) or when data includes sub-categories, making proportion comparisons difficult."}, {"text": "They are never suitable for conveying a quick visual impression of data distribution.", "isCorrect": false, "rationale": "The text notes that pie charts are good for a 'quick visual impression' when there are six or fewer categories."}, {"text": "They require all percentages to be rounded to whole numbers, sacrificing precision.", "isCorrect": false, "rationale": "The text does not state that pie charts require whole numbers for percentages. This is a characteristic sometimes considered for waffle charts, but not a limitation of pie charts in this context."}], "id": "q01"}, {"question": "While waffle charts are excellent for showing precise values, under what circumstance does their effectiveness significantly diminish, as noted in the text?", "options": [{"text": "When displaying only two categories, like a simple 'Yes' vs. 'No' split.", "isCorrect": false, "rationale": "Waffle charts work very well for showing a single percentage against its remainder (e.g., Yes vs. No), making the statistic tangible."}, {"text": "When the percentages are not whole numbers, as cells cannot be partially colored.", "isCorrect": false, "rationale": "The text mentions that waffle charts work well when percentages are 'whole numbers (or close to it),' implying a slight deviation is acceptable or can be handled with rounding."}, {"text": "When the data involves more than a small number of distinct categories, making the chart unreadable with too many colors.", "isCorrect": true, "rationale": "The text counters the misconception that waffle charts are 'always the best because they are most precise' by stating, 'a waffle chart with 18 colors would be unreadable,' highlighting this limitation."}, {"text": "When the primary goal is to illustrate hierarchical relationships between different parts of a total.", "isCorrect": false, "rationale": "Waffle charts do not show hierarchy, but this is a characteristic, not a specific circumstance that *diminishes their effectiveness* in their intended use."}], "id": "q02"}, {"question": "A university's budget committee wants to visualize how its $50 million budget is distributed among five major faculties (Arts, Sciences, Engineering, Medicine, Business), with each faculty further broken down into 3-5 specific departments. Which chart type would be most appropriate for this visualization?", "options": [{"text": "Pie chart", "isCorrect": false, "rationale": "A pie chart would struggle with this scenario due to the presence of sub-categories and the total number of distinct categories (5 faculties + 3-5 departments each)."}, {"text": "Waffle chart", "isCorrect": false, "rationale": "A waffle chart cannot effectively display hierarchical data, nor would it be readable with potentially 15-25 distinct categories."}, {"text": "Treemap", "isCorrect": true, "rationale": "The decision guide explicitly states: 'Does the data have sub-categories (categories within categories)? If YES --> use a treemap.' This scenario perfectly fits that criterion."}, {"text": "Line chart", "isCorrect": false, "rationale": "A line chart is used to show trends over time, not to display part-to-whole relationships or hierarchical structures."}], "id": "q03"}, {"question": "A market research firm is presenting data on the market share of 12 different companies in a highly fragmented industry. Their goal is to show each company's percentage contribution to the total market. Which chart type is best suited for this purpose?", "options": [{"text": "Pie chart", "isCorrect": false, "rationale": "A pie chart is generally unsuitable for more than six categories due to the difficulty in distinguishing and comparing many small slices."}, {"text": "Treemap", "isCorrect": true, "rationale": "The decision guide states: 'Do you have more than 6 categories? If YES --> use a treemap (or a bar chart).' With 12 companies, a treemap can gracefully handle the visualization of numerous distinct proportions within a total."}, {"text": "Waffle chart", "isCorrect": false, "rationale": "A waffle chart with 12 different colors would be highly unreadable, making it impractical for this many categories."}, {"text": "Scatter plot", "isCorrect": false, "rationale": "A scatter plot is used to show the relationship between two numerical variables, not for displaying part-to-whole proportions."}], "id": "q04"}, {"question": "A health organization wants to create an easily digestible public awareness graphic to highlight that 73% of adults in a region have received a flu shot. Which chart type would best make this specific statistic feel tangible and impactful to a general audience?", "options": [{"text": "Pie chart", "isCorrect": false, "rationale": "While a pie chart could show 73% vs. 27%, a waffle chart makes the 'out of 100' more explicitly tangible and impactful for a single key statistic."}, {"text": "Treemap", "isCorrect": false, "rationale": "A treemap is designed for multiple categories or hierarchical data, which is not present in this simple two-part scenario (73% vs. 27%)."}, {"text": "Waffle chart", "isCorrect": true, "rationale": "The text explains, for a scenario like 67% smartphone ownership, that 'showing 67 colored cells out of 100 makes the statistic feel tangible.' This applies directly to the flu shot statistic."}, {"text": "Bar chart", "isCorrect": false, "rationale": "While a bar chart could represent this, the specific impact and tangibility of 'X out of 100' are best conveyed by a waffle chart, as highlighted in the text."}], "id": "q05"}, {"question": "A small business owner wants to quickly visualize the proportion of their customer base that prefers one of four main communication channels: email, phone, social media, or in-person. They need a simple, immediate visual impression. Which chart is the most appropriate choice?", "options": [{"text": "Treemap", "isCorrect": false, "rationale": "With only four categories and no hierarchy, a treemap would be unnecessarily complex and less effective for a 'quick visual impression' than a simpler chart type."}, {"text": "Waffle chart", "isCorrect": false, "rationale": "While a waffle chart could show four categories, the text specifically notes that for 6 or fewer categories and a 'quick visual impression,' a pie chart is a solid choice."}, {"text": "Pie chart", "isCorrect": true, "rationale": "The decision guide states: 'Do you have 6 or fewer categories and want a quick visual impression? If YES --> a pie chart is a solid choice.' This scenario perfectly fits these criteria."}, {"text": "Line graph", "isCorrect": false, "rationale": "A line graph is used for showing trends over time, not for displaying static part-to-whole proportions."}], "id": "q06"}, {"question": "When comparing the transportation survey data (Bus 45%, Walk 25%, Car 20%, Bike 10%) across the three chart types, what unique characteristic did the treemap offer, even without a natural hierarchy in this particular dataset?", "options": [{"text": "It allowed for a rapid, accurate comparison of the exact percentage differences between similar-sized categories like Walk and Car.", "isCorrect": false, "rationale": "The text states the pie chart made 'telling the exact difference between Walk (25%) and Car (20%) from the slice angles alone is difficult,' and the treemap's strength here wasn't precise comparison but concrete representation."}, {"text": "It provided the most precise count of individual units (e.g., 45 'bus' cells out of 100 total).", "isCorrect": false, "rationale": "The waffle chart is noted as the 'easiest for reading precise values' through individual cell counts."}, {"text": "It made the proportions feel more concrete by completely filling a frame with distinct, proportional rectangles.", "isCorrect": true, "rationale": "The text explicitly states: 'The treemap is less natural for this particular data set... but it does make the proportions feel more concrete because the rectangles fill a frame completely.'"}, {"text": "It offered the quickest visual impression of the largest and smallest categories at a glance.", "isCorrect": false, "rationale": "The text attributes the 'quick visual impression' to the pie chart for this type of data."}], "id": "q07"}, {"question": "An environmental agency needs to present data on total waste composition, including major categories (e.g., Plastics, Paper, Organics, Metals) and detailed sub-categories within each (e.g., PET, HDPE, LDPE within Plastics). The audience includes both policymakers needing detailed breakdown and the general public needing overall understanding. Which chart type offers the best balance for this complex dataset?", "options": [{"text": "Pie chart", "isCorrect": false, "rationale": "A pie chart would be overwhelmed by the multiple categories and sub-categories, making it unreadable for both detailed and general understanding."}, {"text": "Waffle chart", "isCorrect": false, "rationale": "A waffle chart cannot effectively display hierarchical data and would become unmanageable with the likely large number of distinct sub-categories."}, {"text": "Treemap", "isCorrect": true, "rationale": "Treemaps are specifically designed for data with 'sub-categories (categories within categories)' and can handle many categories gracefully. This makes it ideal for showing both the major categories and their internal breakdowns within a single, comprehensive visualization."}, {"text": "Stacked bar chart", "isCorrect": false, "rationale": "While a stacked bar chart can show parts of a whole, the treemap is highlighted in the text as the superior choice for clearly representing hierarchical part-to-whole relationships in a single frame."}], "id": "q08"}, {"question": "Which scenario best exemplifies the unique strength of a treemap compared to a pie or waffle chart?", "options": [{"text": "Displaying the precise percentage of votes received by each of three political candidates.", "isCorrect": false, "rationale": "For three categories and precise percentages, a pie chart (for quick visual) or waffle chart (for tangible precision) might be more direct than a treemap."}, {"text": "Illustrating the breakdown of a company's sales by region, and further by product line within each region.", "isCorrect": true, "rationale": "This scenario involves clear hierarchical data (regions and sub-categories of product lines within regions), which is the primary and unique strength of treemaps among the options discussed."}, {"text": "Showing that 48% of survey respondents prefer online learning.", "isCorrect": false, "rationale": "For a single, prominent percentage against a remainder, a waffle chart would be most effective at making the statistic tangible."}, {"text": "Providing a quick visual comparison of the popularity of five different types of fruit among students.", "isCorrect": false, "rationale": "For a quick visual impression of a few categories, a pie chart is explicitly recommended in the text."}], "id": "q09"}, {"question": "What is the primary benefit of using a waffle chart, especially when presenting a single, clear percentage or when precision is paramount?", "options": [{"text": "Its ability to visually organize and compare multiple levels of hierarchical data.", "isCorrect": false, "rationale": "This is the primary strength of a treemap, not a waffle chart."}, {"text": "Its effectiveness in providing a quick visual impression of part-to-whole for many distinct categories.", "isCorrect": false, "rationale": "Waffle charts become unreadable with many categories; a treemap is better for many categories, and a pie chart for a quick impression of few categories."}, {"text": "Its concrete and tangible representation of precise values, making statistics out of 100 easily countable and understandable.", "isCorrect": true, "rationale": "The text highlights that the waffle chart is 'the easiest for reading precise values' and that 'showing 67 colored cells out of 100 makes the statistic feel tangible.'"}, {"text": "Its aesthetic appeal and traditional use in general-audience publications for any part-to-whole data.", "isCorrect": false, "rationale": "The text discusses specific use cases and limitations, not a universal aesthetic appeal. Waffle charts are not traditionally used for 'any' part-to-whole data, especially not for hierarchy or many categories."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
