        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most crucial requirement for setting up a fair visual comparison between two dot plots?", "options": [{"text": "Both plots must have an equal number of data points.", "isCorrect": false, "rationale": "While sample size is important for statistical inference, the text emphasizes that for a fair visual comparison, the *scale* is the non-negotiable requirement, not the number of data points."}, {"text": "Both plots must display data from the same time period.", "isCorrect": false, "rationale": "The time period is context-dependent for the data itself, but not a universal requirement for the visual setup of the dot plots to be comparable."}, {"text": "Both plots must use the same number line scale.", "isCorrect": true, "rationale": "The text explicitly states: 'When you compare two dot plots, you must use the same number line scale for both groups. Using different scales would make fair comparison impossible.'"}, {"text": "Both plots must have at least one outlier identified.", "isCorrect": false, "rationale": "Outliers are a feature to look for during comparison, not a requirement for the setup of the dot plots themselves."}], "id": "q01"}, {"question": "If Group X has a data range of 25 and Group Y has a data range of 10, what does this comparison primarily indicate about the two groups?", "options": [{"text": "Group X has higher average values than Group Y.", "isCorrect": false, "rationale": "Range describes spread, not necessarily the central tendency (average or mode) of the data. Group X could have lower values overall but still a wider spread."}, {"text": "Group Y has more data points than Group X.", "isCorrect": false, "rationale": "The range of a dataset does not provide information about the number of data points it contains."}, {"text": "Group X exhibits greater variability in its data than Group Y.", "isCorrect": true, "rationale": "The text states, 'A larger range means more variability.' Group X's range of 25 is larger than Group Y's range of 10, indicating more variability."}, {"text": "Group Y has a higher mode than Group X.", "isCorrect": false, "rationale": "Range does not directly tell us anything about the mode (most common value) of a dataset."}], "id": "q02"}, {"question": "When describing the 'center' of a dot plot according to the text, which characteristic is most commonly being referred to?", "options": [{"text": "The largest value in the dataset.", "isCorrect": false, "rationale": "The largest value is the maximum, not a measure of center."}, {"text": "The mode or typical value, around which data tends to cluster.", "isCorrect": true, "rationale": "The text provides examples of language for describing center: 'Group A tends to be centered around' and 'The typical value for Group B is,' directly linking 'center' to typical/most common values like the mode."}, {"text": "The average (mean) of all data points.", "isCorrect": false, "rationale": "While the mean is a measure of center, the text's guidance on comparing dot plots specifically mentions comparing 'modes' and using phrases like 'typical value' when discussing 'center,' which aligns more directly with mode in a dot plot context."}, {"text": "The total number of data points.", "isCorrect": false, "rationale": "The total number of data points refers to the sample size, not the center of the distribution."}], "id": "q03"}, {"question": "The textbook encourages using phrases like 'Group A tends to cluster around' instead of just listing individual values when describing dot plots. What is the primary reason for this recommendation?", "options": [{"text": "To make the description longer and more detailed.", "isCorrect": false, "rationale": "While it might add detail, the primary goal is not simply length but quality of description."}, {"text": "To avoid repetition of numbers in the description.", "isCorrect": false, "rationale": "Avoiding repetition is a minor benefit, but not the main reason highlighted by the textbook."}, {"text": "To describe the overall shape and tendencies of the data, addressing a common misconception.", "isCorrect": true, "rationale": "The 'Common Misconception' note explicitly states: 'Students sometimes describe dot plots by just listing individual values instead of describing the overall shape. Encourage language like 'Group A tends to cluster around' and 'Group B is more spread out than' rather than reciting all the numbers.'"}, {"text": "To demonstrate advanced statistical vocabulary.", "isCorrect": false, "rationale": "The goal is clarity and accurate description, not merely to use advanced vocabulary."}], "id": "q04"}, {"question": "Two classes took the same 20-point quiz. Class A's scores were mostly between 12 and 18, with a range of 8. Class B's scores ranged from 8 to 20, with a range of 12. Which conclusion is best supported by this information?", "options": [{"text": "Class A students generally scored higher than Class B students.", "isCorrect": false, "rationale": "While Class A's minimum score is higher (11 vs 8), the range alone doesn't confirm higher overall scores. Class B also had students scoring as high as 20, which Class A didn't."}, {"text": "Class B's performance showed more variation than Class A's.", "isCorrect": true, "rationale": "The text states 'A larger range means more variability.' Class B's range of 12 is larger than Class A's range of 8, directly indicating more variation in Class B's scores."}, {"text": "Class A had more students than Class B.", "isCorrect": false, "rationale": "The provided information about ranges and score clusters does not indicate the number of students in each class."}, {"text": "The most common score in Class A was higher than in Class B.", "isCorrect": false, "rationale": "The information provided only mentions ranges and general clustering, not the specific modes (most common scores) for each class."}], "id": "q05"}, {"question": "According to the 'How to Compare Two Dot Plots' section, what is the final step after checking scales, comparing modes, ranges, clusters, and outliers?", "options": [{"text": "Recalculate the mean for both groups to confirm initial observations.", "isCorrect": false, "rationale": "Recalculating the mean is not listed as a step in the 'How to Compare' section."}, {"text": "Construct new dot plots with adjusted scales for clearer visualization.", "isCorrect": false, "rationale": "The initial step is to *check* that scales are the same, not to reconstruct them after comparison steps."}, {"text": "Summarize what the comparison reveals in one or two plain-English sentences.", "isCorrect": true, "rationale": "The last step listed is 'Tell the story. Summarize what the comparison reveals in one or two plain-English sentences.'"}, {"text": "Identify additional potential outliers that might have been overlooked.", "isCorrect": false, "rationale": "Looking for outliers is an earlier step in the comparison process, not the final one."}], "id": "q06"}, {"question": "The example comparing Class A and Class B quiz scores concluded that 'Class A performed more consistently.' Which characteristic of Class A's dot plot, relative to Class B's, primarily led to this conclusion?", "options": [{"text": "Class A having similar modes to Class B.", "isCorrect": false, "rationale": "While both had similar modes, consistency primarily relates to how spread out the scores are, not just the most common score."}, {"text": "Class A's scores being more tightly clustered.", "isCorrect": true, "rationale": "The text states: 'Class A's scores are more tightly clustered, mostly between 12 and 18.' This tighter clustering, indicating less spread and variation, is the essence of 'more consistently' performing."}, {"text": "Class A having no student score below 11, unlike Class B.", "isCorrect": false, "rationale": "This indicates a higher minimum score for Class A, but it doesn't fully capture the overall consistency across the entire distribution as 'tightly clustered' does."}, {"text": "Class A having the same number of students as Class B.", "isCorrect": false, "rationale": "The number of students does not reflect the consistency of their performance."}], "id": "q07"}, {"question": "Florence Nightingale is highlighted in the text for her pioneering work in which specific area related to data?", "options": [{"text": "Inventing the modern dot plot for comparing medical data.", "isCorrect": false, "rationale": "The text states she used 'polar area diagram,' not dot plots, for her famous work."}, {"text": "Developing new surgical techniques during the Crimean War.", "isCorrect": false, "rationale": "Her work focused on medical conditions and public health through data, not new surgical techniques."}, {"text": "Using statistical graphics to advocate for public health improvements.", "isCorrect": true, "rationale": "The text explicitly states: 'She presented these visualizations to Queen Victoria and members of Parliament, and her data-driven arguments led to sweeping improvements in medical conditions. Nightingale proved that a well-made chart could literally save lives. She was one of the first people to use statistical graphics for public health advocacy.'"}, {"text": "Establishing the first formal nursing school.", "isCorrect": false, "rationale": "While true, the text specifically focuses on her contributions to data visualization and public health advocacy, not the founding of nursing schools."}], "id": "q08"}, {"question": "A local news channel displays two dot plots side-by-side to compare daily rainfall in two neighboring towns. Town A's plot uses a scale from 0 to 5 inches, while Town B's plot uses a scale from 2 to 10 inches. Both plots show dots clustered towards the middle of their respective scales. What warning from the textbook is most relevant here?", "options": [{"text": "Comparing the modes might be difficult due to differing cluster points.", "isCorrect": false, "rationale": "While modes might differ, the primary issue with different scales is more fundamental than just difficulty comparing modes."}, {"text": "Outliers in one town might disproportionately affect the overall comparison.", "isCorrect": false, "rationale": "Outliers are a separate element to consider in a comparison, but not the most pressing concern when the scales are inconsistent."}, {"text": "The differing scales could create a misleading comparison of the rainfall patterns.", "isCorrect": true, "rationale": "The 'quicktip' warns: 'If the scales are different, your eyes will be fooled into making an unfair comparison. In newspapers and textbooks, watch out for side-by-side charts with sneakily different scales — that is a common misleading trick!'"}, {"text": "The sample sizes for each town might be unequal, invalidating the comparison.", "isCorrect": false, "rationale": "Unequal sample sizes don't inherently invalidate a comparison if scales are consistent; the scale difference is the more direct problem here."}], "id": "q09"}, {"question": "What is the primary benefit of using a side-by-side dot plot comparison, as described in the introductory paragraph?", "options": [{"text": "To calculate precise statistical averages for each group.", "isCorrect": false, "rationale": "While averages can be calculated from the data, the 'at a glance' nature of dot plot comparison focuses on visual insights, not precise calculation."}, {"text": "To identify individual extreme data points within each group.", "isCorrect": false, "rationale": "Identifying outliers is one *step* in the comparison process, but not the overarching benefit of the side-by-side setup."}, {"text": "To answer questions about differences between groups quickly and visually.", "isCorrect": true, "rationale": "The text states: 'One of the most useful things you can do with a dot plot is compare two groups side by side... A side-by-side dot plot lets you answer these questions at a glance.'"}, {"text": "To organize large datasets into a more manageable format.", "isCorrect": false, "rationale": "This describes the general benefit of any dot plot, not specifically the *comparison* aspect of side-by-side plots."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
