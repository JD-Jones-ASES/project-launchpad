<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Charts, Graphs, and Diagrams &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a line graph?", "options": [{"text": "To compare discrete categories or items.", "isCorrect": false, "rationale": "While line graphs use categories on the x-axis, their primary purpose is not comparison between unrelated items, but rather tracking change over a continuous progression like time."}, {"text": "To show how a specific value changes over a continuous progression, typically time.", "isCorrect": true, "rationale": "The text defines a line graph as showing 'how a value changes over time' and emphasizes the x-axis representing 'a continuous progression (time, distance).' This is its central purpose."}, {"text": "To display parts of a whole or proportions.", "isCorrect": false, "rationale": "This describes the purpose of a pie chart, not a line graph."}, {"text": "To illustrate the frequency distribution of data.", "isCorrect": false, "rationale": "This describes the purpose of a histogram, not a line graph."}]}, {"question": "According to the common misconceptions, what must the x-axis (horizontal axis) represent for a line graph to be appropriate and meaningful?", "options": [{"text": "Any set of unrelated categories, such as different types of fruits or car models.", "isCorrect": false, "rationale": "The text explicitly states, 'You cannot meaningfully “connect” unrelated categories' on a line graph, as it creates a misleading trend."}, {"text": "A continuous progression, such as time, distance, or sequence.", "isCorrect": true, "rationale": "The text clarifies a common misconception, stating that 'the x-axis must represent a continuous progression (time, distance)' for a line graph to be appropriate."}, {"text": "The values being tracked on the y-axis, but in reverse order.", "isCorrect": false, "rationale": "The x-axis and y-axis measure different aspects of the data; the x-axis typically measures time or progression, while the y-axis measures the value."}, {"text": "Only values that start at zero and increase steadily.", "isCorrect": false, "rationale": "While the x-axis represents progression, the values themselves do not have to start at zero or increase steadily; they can fluctuate."}]}, {"question": "A very steep line segment on a line graph, moving upwards, primarily indicates what?", "options": [{"text": "That the current value is the highest ever recorded.", "isCorrect": false, "rationale": "Steepness shows the rate of change, not necessarily that the current value is the overall peak. A value could still go higher, or a steep line could occur at a lower overall value."}, {"text": "A rapid rate of increase in the value over that time period.", "isCorrect": true, "rationale": "The text states, 'A steep slope means a fast rate of change.' A steep line going upwards indicates a rapid increase."}, {"text": "A large absolute value on the y-axis.", "isCorrect": false, "rationale": "This is a common misconception highlighted in the text: 'Students may confuse a steep line with a large value. Clarify that steepness shows rate of change (how fast it is changing), not the size of the value.'"}, {"text": "A slow and gradual increase in the value.", "isCorrect": false, "rationale": "A slow and gradual increase would be represented by a less steep, more gradual upward slope."}]}, {"question": "When interpreting a line graph, what does a flat (horizontal) line segment signify?", "options": [{"text": "The value being tracked has reached zero.", "isCorrect": false, "rationale": "The text explicitly states this is a misconception: 'Some students think a flat line means zero. Remind them it means no change from the previous point — the value stays the same.'"}, {"text": "The value being tracked has remained constant or approximately the same.", "isCorrect": true, "rationale": "The text clarifies that a flat line 'means no change from the previous point — the value stays the same.'"}, {"text": "The data for that period is missing or incomplete.", "isCorrect": false, "rationale": "A flat line represents actual data points where the value did not change, not missing data."}, {"text": "The line graph is poorly constructed and unreliable.", "isCorrect": false, "rationale": "A flat line is a valid representation of data where no change occurred."}]}, {"question": "Why is it crucial to 'Always Read the Scale First' on the y-axis before drawing conclusions about a line graph's trends?", "options": [{"text": "To determine the exact time period the graph covers.", "isCorrect": false, "rationale": "The time period is indicated by the x-axis and the title, not primarily by the y-axis scale."}, {"text": "To identify the units of measurement for the x-axis.", "isCorrect": false, "rationale": "The units for the x-axis are found in its label, not the y-axis scale."}, {"text": "Because the visual appearance of steepness can be highly misleading depending on the chosen scale, even with identical data.", "isCorrect": true, "rationale": "The Quick Tip highlights this: 'A graph where the scale runs from 60 to 90 will look very different from the same data on a scale from 0 to 120 — even though the data is identical!' The scale greatly impacts the perceived steepness and magnitude of change."}, {"text": "To locate the peak and trough of the data.", "isCorrect": false, "rationale": "While the scale helps interpret peak/trough values, its primary importance before drawing *any* conclusion is understanding the visual representation's distortion potential."}]}, {"question": "In the 'Worked Example: Two Weeks of Temperature' graph, which of the following represents the peak temperature?", "options": [{"text": "Day 1 at 72°F", "isCorrect": false, "rationale": "Day 1 is an initial value, not the highest point on the graph."}, {"text": "Day 12 at 69°F", "isCorrect": false, "rationale": "Day 12 represents the trough, which is the lowest point, not the peak."}, {"text": "Day 7 at 82°F", "isCorrect": true, "rationale": "The 'Worked Example' explicitly identifies 'Peak: Day 7 at 82°F — the warmest day,' which is the highest point before the line turns downward."}, {"text": "Day 14 at 74°F", "isCorrect": false, "rationale": "Day 14 is the final data point shown, which is not the peak."}]}, {"question": "When following the 'How to Read a Line Graph' steps, what is the correct sequence to determine a specific value for a given time point?", "options": [{"text": "Trace left from the y-axis to the line, then down to the x-axis.", "isCorrect": false, "rationale": "This sequence would be used to find the time corresponding to a specific value, not the value for a specific time."}, {"text": "Read the title, then estimate the value based on the overall trend.", "isCorrect": false, "rationale": "Estimating is not precise enough for reading specific values. The process requires tracing."}, {"text": "Find the time on the x-axis, trace straight up to the line, then trace straight left to the y-axis to read the value.", "isCorrect": true, "rationale": "The text outlines this exact procedure: '1. Find the time (x-value) you want on the x-axis. 2. Trace straight up to the line. 3. Then trace straight left to the y-axis to read the value.'"}, {"text": "Locate the peak, then assume the value at any point is proportional to the peak.", "isCorrect": false, "rationale": "The peak is only one specific point; values at other points are independent of it in this manner."}]}, {"question": "What is the definition of a 'trough' on a line graph?", "options": [{"text": "The point where the line begins to flatten out.", "isCorrect": false, "rationale": "While a trough might be followed by an upward turn, the definition focuses on it being the lowest point, not just where it flattens."}, {"text": "The highest point on a line graph before the line turns downward.", "isCorrect": false, "rationale": "This describes a 'peak,' not a 'trough.'"}, {"text": "The point where two lines on a multi-line graph intersect.", "isCorrect": false, "rationale": "This definition is unrelated to a single line graph's features and applies to multi-line graphs not fully covered here."}, {"text": "The lowest point on a line graph before the line turns upward.", "isCorrect": true, "rationale": "The text defines a trough as 'the lowest point — a local low before the line turns upward.'"}]}, {"question": "If a company's monthly sales chart shows a line moving consistently 'down-right' over several consecutive months, what does this indicate about the sales trend?", "options": [{"text": "Sales are staying about the same.", "isCorrect": false, "rationale": "A horizontal or 'flat' line indicates sales staying about the same."}, {"text": "Sales are increasing rapidly.", "isCorrect": false, "rationale": "Rapidly increasing sales would be represented by a steep 'up-right' line."}, {"text": "Sales are decreasing over time.", "isCorrect": true, "rationale": "The text states, 'A line going down-right → the value is decreasing over time.' Therefore, sales are decreasing."}, {"text": "Sales have reached their highest point.", "isCorrect": false, "rationale": "Sales decreasing implies moving away from a highest point, or towards a potential trough, not reaching it."}]}, {"question": "Consider two scenarios: (1) a stock price rises by $50 in 1 day, and (2) the same stock price rises by $50 over 10 days. How would the 'rate of change' compare for these two scenarios on a line graph?", "options": [{"text": "Both lines would have the same steepness because the total change in value is identical.", "isCorrect": false, "rationale": "The text clarifies that steepness relates to how *quickly* a value changes, not just the total change: 'Picture temperature rising by 10 degrees in one day (steep!) versus rising by 10 degrees over two weeks (gradual). Both show the same total change, but the line looks very different.'"}, {"text": "The line representing the rise over 1 day would be significantly steeper, indicating a faster rate of change.", "isCorrect": true, "rationale": "A faster change (e.g., $50 in 1 day) results in a steeper slope, while a slower change (e.g., $50 over 10 days) results in a more gradual slope. The text defines 'steep slope means a fast rate of change; a gradual slope means a slow rate of change.'"}, {"text": "The line representing the rise over 10 days would be steeper, as the change occurs over a longer duration.", "isCorrect": false, "rationale": "A longer duration for the same change would make the line more gradual, not steeper."}, {"text": "The steepness cannot be determined without knowing the starting and ending values.", "isCorrect": false, "rationale": "The rate of change is about the *change* over time, which is given by the $50 rise in specified durations. We can compare steepness based on this information."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
