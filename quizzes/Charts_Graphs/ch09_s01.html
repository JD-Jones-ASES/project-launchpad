        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a scatter plot, according to the provided text?", "options": [{"text": "To show how a single variable changes over a period of time.", "isCorrect": false, "rationale": "This describes the purpose of a line graph, where time is typically involved and dots are connected to show progression. A scatter plot is used to show relationships between two variables, not just one over time."}, {"text": "To display the relationship or association between two different variables for a collection of individual items.", "isCorrect": true, "rationale": "The text defines a scatter plot as a graph that displays data as a collection of individual dots, where each dot represents a single item and shows the values of two different variables for that item, indicating whether they are related."}, {"text": "To connect data points in a specific order to create a continuous line, illustrating a sequence of events.", "isCorrect": false, "rationale": "This option describes a common misconception mentioned in the text: students often try to 'connect the dots' on a scatter plot, which is incorrect. Scatter plot dots are independent and not connected."}, {"text": "To compare the magnitudes of different categories using bars of varying lengths or heights.", "isCorrect": false, "rationale": "This describes a bar graph, which is used for comparing categorical data. Scatter plots are designed to show relationships between two quantitative variables."}]}, {"question": "According to the text, what is a key difference between a scatter plot and a line graph?", "options": [{"text": "On a scatter plot, the x-axis must always represent time, whereas on a line graph, it can represent any variable.", "isCorrect": false, "rationale": "The text states that in a scatter plot, 'time is usually not involved at all,' and order does not matter. Line graphs, conversely, often show change over time, and the order of dots is crucial."}, {"text": "Scatter plots always connect the dots to show a trend, while line graphs typically do not.", "isCorrect": false, "rationale": "This is a direct contradiction of the text, which explicitly states, 'on a scatter plot, the dots are NOT connected. Each dot stands alone.' This is a common misconception."}, {"text": "Each dot on a scatter plot is an independent observation representing two values for one item, and the dots are not connected.", "isCorrect": true, "rationale": "The text emphasizes that 'on a scatter plot, the dots are NOT connected. Each dot stands alone.' It also clarifies that 'Each dot represents a single item ... and shows the values of two different variables for that item.'"}, {"text": "Line graphs are used for showing relationships between two variables, while scatter plots show how one variable changes over time.", "isCorrect": false, "rationale": "This statement reverses the definitions. Line graphs show how one variable changes over time, while scatter plots show whether two variables are related to each other."}]}, {"question": "Imagine a scatter plot with 'Daily Hours of Exercise' on the x-axis and 'Resting Heart Rate (BPM)' on the y-axis. A single dot at position (1, 70) tells you:", "options": [{"text": "There is a general trend that exercising for 1 hour results in a resting heart rate of 70 BPM for everyone.", "isCorrect": false, "rationale": "A single dot represents one item, not a general trend for everyone. It shows specific values for one observation."}, {"text": "One individual in the data set exercised for 1 hour daily and has a resting heart rate of 70 beats per minute.", "isCorrect": true, "rationale": "As per the 'Reading One Dot' example, each dot tells you two things about one item. The x-coordinate (1) refers to the x-axis variable, and the y-coordinate (70) refers to the y-axis variable for that specific item."}, {"text": "Exercising for 1 hour causes a decrease in resting heart rate to 70 BPM.", "isCorrect": false, "rationale": "The text explicitly warns against assuming causation from correlation ('We say “associated with,” not “causes” — more on that in Section 9.3!'). A single dot only shows an association for one item."}, {"text": "The average resting heart rate for all individuals who exercise 1 hour daily is 70 BPM.", "isCorrect": false, "rationale": "A single dot represents one item, not an average of multiple items. To find an average, you would need to analyze multiple points at or near x=1."}]}, {"question": "Which of the following describes a 'positive trend' in a scatter plot?", "options": [{"text": "The dots generally form a random cloud with no clear direction.", "isCorrect": false, "rationale": "This describes 'no pattern' or 'no trend,' where the variables are not visibly related."}, {"text": "As the value on the x-axis increases, the value on the y-axis tends to decrease.", "isCorrect": false, "rationale": "This describes a 'downward pattern' or 'negative trend,' where the relationship is inverse."}, {"text": "The dots form a cloud that rises from the lower-left to the upper-right of the graph, indicating that as x increases, y tends to increase.", "isCorrect": true, "rationale": "The text states that an 'Upward pattern (positive trend)' occurs when 'As x increases, y tends to increase too. The dots form a cloud that rises from lower-left to upper-right.'"}, {"text": "There is no correlation between the variables, and all dots are clustered around the center.", "isCorrect": false, "rationale": "While 'no correlation' relates to 'no trend,' 'clustered around the center' doesn't fully capture the definition of a positive trend. A positive trend implies a specific direction, not just a cluster."}]}, {"question": "You are looking at a scatter plot showing 'Hours of TV Watched Per Week' on the x-axis and 'Average Weekly Quiz Score' on the y-axis. If the plot shows a 'negative trend,' what conclusion would be most appropriate?", "options": [{"text": "Students who watch more TV tend to achieve higher average quiz scores.", "isCorrect": false, "rationale": "This would indicate a positive trend, where an increase in one variable is associated with an increase in the other."}, {"text": "There is no clear relationship between the amount of TV watched and average quiz scores.", "isCorrect": false, "rationale": "This would describe a 'no pattern' or 'no trend' scenario, where the dots appear as random scatter."}, {"text": "As the hours of TV watched per week increase, the average weekly quiz scores tend to decrease.", "isCorrect": true, "rationale": "The text defines a 'downward pattern (negative trend)' as when 'As x increases, y tends to decrease.' This scenario directly aligns with that definition."}, {"text": "The number of hours of TV watched directly causes students to get lower quiz scores.", "isCorrect": false, "rationale": "The text explicitly states to say 'associated with,' not 'causes,' as causation is covered in a later section. A negative trend indicates an association, not necessarily a direct causal link."}]}, {"question": "What does it mean if a scatter plot displays 'no pattern' or 'no trend'?", "options": [{"text": "The dots show a consistent upward movement from left to right.", "isCorrect": false, "rationale": "This describes a 'positive trend,' not 'no trend.'"}, {"text": "The dots are all clustered together in one corner of the graph.", "isCorrect": false, "rationale": "While a cluster might exist, 'no trend' specifically implies no *direction* to the data, typically looking like random scatter, not necessarily confined to a corner."}, {"text": "The dots look like random scatter, and no visible direction (upward or downward) is apparent.", "isCorrect": true, "rationale": "The text defines 'no pattern (no trend)' as when 'The dots look like random scatter. No direction is visible.'"}, {"text": "There is a strong inverse relationship between the x and y variables.", "isCorrect": false, "rationale": "This describes a 'negative trend,' which is a very distinct pattern, not 'no trend.'"}]}, {"question": "According to the 'How to Read a Scatter Plot' steps, after reading the title, what is the next crucial step for understanding the graph?", "options": [{"text": "Immediately identifying any outliers.", "isCorrect": false, "rationale": "Identifying outliers is listed as Step 4 in the 'How to Read a Scatter Plot' section, coming after understanding the axes and overall pattern."}, {"text": "Connecting the dots to visualize the complete data path.", "isCorrect": false, "rationale": "The text explicitly warns against connecting dots as a common misconception. This action would create a meaningless zigzag and is not a valid reading step."}, {"text": "Reading the axis labels to understand what the x-axis and y-axis measure, including their units.", "isCorrect": true, "rationale": "Step 2 of 'How to Read a Scatter Plot' is 'Read the axis labels. What does the x-axis measure? What does the y-axis measure? What are the units?' This is critical for contextualizing the data."}, {"text": "Determining if the x-axis variable is causing changes in the y-axis variable.", "isCorrect": false, "rationale": "The text explicitly states that students should not assume 'cause' and 'effect' and that this assumption is covered more fully in Section 9.3. This is a common misconception, not a reading step for initial interpretation."}]}, {"question": "Why does the text strongly advise against connecting the dots on a scatter plot?", "options": [{"text": "Connecting the dots makes the graph visually confusing and difficult to interpret due to too many lines.", "isCorrect": false, "rationale": "While it can make it messy, the primary reason is not aesthetic but about misrepresenting the data's meaning."}, {"text": "The order of the dots on a scatter plot is generally irrelevant, so connecting them creates a meaningless zigzag that implies an incorrect sequence.", "isCorrect": true, "rationale": "The 'Key Difference from a Line Graph' section states, 'Order does not matter. Each dot is one independent observation.' The 'quicktip' reinforces this: 'the order of the dots does not matter. If you connect them, you create a meaningless zigzag that tells no story.'"}, {"text": "Scatter plots are exclusively for discrete data points, and lines can only be used for continuous data sets.", "isCorrect": false, "rationale": "Scatter plots can be used for both discrete and continuous data. The issue is the meaning of the connection, not the type of data."}, {"text": "Connecting dots is a technique reserved only for advanced statistical analysis, not basic reading.", "isCorrect": false, "rationale": "This is incorrect; connecting dots is fundamental to line graphs for showing change over time, not an advanced technique for scatter plots."}]}, {"question": "What is an 'outlier' in the context of a scatter plot?", "options": [{"text": "A data point that is exactly on the x-axis or y-axis.", "isCorrect": false, "rationale": "Being on an axis simply means one of the variable values is zero or the starting point, which isn't inherently an outlier unless it deviates from the overall pattern."}, {"text": "A data point that has an exceptionally high value for both the x and y variables.", "isCorrect": false, "rationale": "While high values might be large, an outlier is specifically defined by its deviation from the *general pattern* of the data, not just its magnitude."}, {"text": "A data point that lies far away from the rest of the data, not following the general pattern of the other dots.", "isCorrect": true, "rationale": "The text defines an outlier as 'a data point that lies far away from the rest of the data. On a scatter plot, an outlier is a dot that does not follow the general pattern of the other dots.'"}, {"text": "The data point that represents the average of all other data points in the plot.", "isCorrect": false, "rationale": "An outlier is an individual data point that deviates, not a summary statistic like an average."}]}, {"question": "When first examining a new scatter plot, after understanding what the axes measure, what is the next logical step recommended by the 'How to Read a Scatter Plot' section to gain an initial understanding of the data?", "options": [{"text": "Reading specific values from several individual dots.", "isCorrect": false, "rationale": "Reading specific values is Step 6, which comes after assessing the overall pattern and looking for outliers. It's too granular for an initial understanding."}, {"text": "Looking at the overall pattern to determine if there's a positive, negative, or no trend.", "isCorrect": true, "rationale": "Step 4 in the 'How to Read a Scatter Plot' section is 'Look at the overall pattern. Do the dots seem to go up... down... or look like a random cloud?' This provides the first broad understanding of the relationship."}, {"text": "Identifying any dots that are unusually far from the others.", "isCorrect": false, "rationale": "Identifying outliers is Step 5, which comes after assessing the overall pattern. You need to understand the pattern before you can identify points that deviate from it."}, {"text": "Drawing a straight line through the middle of the data to represent the trend.", "isCorrect": false, "rationale": "The text warns against connecting dots, and drawing a line of best fit is a more advanced step for quantifying a trend, not an initial reading step."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
