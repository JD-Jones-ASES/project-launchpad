    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines 'frequency' in the context of data collection?", "options": [{"text": "The percentage of times an event occurs in a dataset.", "isCorrect": false, "rationale": "Frequency is always a raw count, not a percentage. Percentages are derived from frequencies but are not frequency itself."}, {"text": "The number of categories present in a dataset.", "isCorrect": false, "rationale": "Frequency refers to the count of occurrences within a single category, not the total number of distinct categories."}, {"text": "The raw count of how many times something occurs in a dataset.", "isCorrect": true, "rationale": "According to the definition, frequency is the 'number of times something occurs in a dataset' or a 'raw count'."}, {"text": "The specific label given to a group of data points.", "isCorrect": false, "rationale": "This describes a 'category', not 'frequency'. Frequency is the count associated with a category."}]}, {"question": "What is the primary advantage of converting a tally chart into a frequency table?", "options": [{"text": "Frequency tables allow for the immediate calculation of percentages.", "isCorrect": false, "rationale": "While percentages can be calculated from frequencies, the primary advantage mentioned in the text for converting from a tally chart is organization and clarity, not immediate percentage calculation."}, {"text": "Tally charts are more accurate for counting large datasets.", "isCorrect": false, "rationale": "The text states that tally marks are 'messy' and 'hard to share neatly', implying frequency tables are better for organization and presentation, not that tally charts are less accurate for counting."}, {"text": "Frequency tables organize data into a clean, easy-to-read format for sharing and analysis.", "isCorrect": true, "rationale": "The text explains that tally marks are 'messy' and 'hard to share neatly,' and the solution is to 'clean them up into a frequency table,' highlighting organization and readability for sharing as the primary advantage."}, {"text": "Frequency tables always include a visual representation like a bar graph.", "isCorrect": false, "rationale": "A frequency table is a tabular format; while it can be used to create graphs, it does not inherently include them."}]}, {"question": "Which set of columns is typically considered essential for a basic frequency table?", "options": [{"text": "Categories, Tally Marks, Total", "isCorrect": false, "rationale": "While tally marks are often included, the definition states 'at least two columns: one for the categories... and one for the frequency'. A 'Total' column is not typically one of the main category columns but rather a sum."}, {"text": "Categories, Frequency, Percentages", "isCorrect": false, "rationale": "Percentages are not a required column in a basic frequency table and are explicitly noted as coming later than raw frequency counts."}, {"text": "Categories, Frequency", "isCorrect": true, "rationale": "The definition states a frequency table has 'at least two columns: one for the categories (the things being counted) and one for the frequency (how many times each category appears).'"}, {"text": "Tally Marks, Frequency, Mode", "isCorrect": false, "rationale": "Tally marks are optional, and the mode is an interpretation of the data, not a column in the table itself. Categories are essential."}]}, {"question": "Based on Ms. Takahashi's 'Favorite Ice Cream Flavors' frequency table, which flavor is the mode?", "options": [{"text": "Vanilla", "isCorrect": false, "rationale": "Vanilla has 8 votes, which is not the highest frequency. The mode is the category with the highest frequency."}, {"text": "Chocolate", "isCorrect": true, "rationale": "Chocolate has 11 votes, which is the highest frequency in the table, making it the mode or most common category."}, {"text": "Strawberry", "isCorrect": false, "rationale": "Strawberry has 6 votes, which is not the highest frequency. The mode is the category with the highest frequency."}, {"text": "Other", "isCorrect": false, "rationale": "Other has 2 votes, which is the lowest frequency, not the highest. The mode is the category with the highest frequency."}]}, {"question": "Using Ms. Takahashi's 'Favorite Ice Cream Flavors' frequency table, what was the total number of students surveyed?", "options": [{"text": "19", "isCorrect": false, "rationale": "19 is the combined frequency of Chocolate and Vanilla, not the total number of students surveyed. The total is found by summing all frequencies."}, {"text": "5", "isCorrect": false, "rationale": "5 represents the number of distinct categories, not the total number of students surveyed. The total is found by summing all frequencies."}, {"text": "30", "isCorrect": true, "rationale": "The sum of all frequencies ($11 + 8 + 6 + 3 + 2$) equals 30, which is the total number of students surveyed, as stated in the example description and confirmed by the 'Total check' in the text."}, {"text": "11", "isCorrect": false, "rationale": "11 is the frequency for Chocolate, which is only one category, not the total number of students surveyed. The total is found by summing all frequencies."}]}, {"question": "When 'Reading Between the Rows' of a frequency table, what kind of insight are you primarily trying to gain?", "options": [{"text": "The exact percentage of each category compared to the total.", "isCorrect": false, "rationale": "While percentages can be calculated, 'Reading Between the Rows' focuses on qualitative insights and relationships, such as significant gaps or overwhelming popularity, rather than just precise numerical calculations like percentages."}, {"text": "A deeper understanding of trends, disparities, and the 'story' the numbers tell.", "isCorrect": true, "rationale": "The text explains that 'a frequency table does not just tell you the numbers — it tells you a story,' asking readers to consider 'Which category is most popular? By how much?' and 'Are there any big gaps between categories?' This indicates seeking deeper insights and trends."}, {"text": "Confirmation that the sum of frequencies equals the total count.", "isCorrect": false, "rationale": "Checking the total is a fundamental step in reading a frequency table for accuracy, but 'Reading Between the Rows' goes beyond this basic check to interpret the meaning of the data."}, {"text": "The individual frequency for each category.", "isCorrect": false, "rationale": "Reading individual frequencies is a direct observation from the table, not an interpretation of the 'story' behind the numbers. 'Reading Between the Rows' focuses on comparative insights."}]}, {"question": "A common misconception is confusing frequency with percentage. What is the fundamental difference?", "options": [{"text": "Frequency is always a whole number, while percentage can be a decimal.", "isCorrect": false, "rationale": "While often true, this isn't the fundamental difference. The core distinction lies in what each represents numerically."}, {"text": "Frequency represents a raw count, while percentage represents a proportional share out of a total.", "isCorrect": true, "rationale": "The 'Common Misconception' note clarifies: 'frequency is always a raw count — the actual number of times something occurred. Percentages come later' and represent a 'proportional share' or part of a whole."}, {"text": "Frequency is used for qualitative data, while percentage is used for quantitative data.", "isCorrect": false, "rationale": "Both frequency and percentage can be used with both qualitative (categorical) and quantitative data, making this distinction incorrect."}, {"text": "Frequency is a measure of central tendency, while percentage is a measure of dispersion.", "isCorrect": false, "rationale": "Neither frequency nor percentage directly describes central tendency or dispersion; these are statistical measures that can be calculated from frequencies or percentages, but are not what frequency or percentage *are*."}]}, {"question": "In the 'Data Detective' example, the tally chart for 'Science' showed $IIII$ $|$ but the frequency count was listed as 7. What was the specific error identified?", "options": [{"text": "The tally marks should have been $IIII$ $II$ to correctly represent 7.", "isCorrect": false, "rationale": "The error was not in the representation of 7 with tallies, but rather that the provided tallies ($IIII$ $|$) actually represent 6, not 7."}, {"text": "The tally marks $IIII$ $|$ correctly represent 7, so the frequency count was correct.", "isCorrect": false, "rationale": "The tally marks $IIII$ $|$ represent 5 + 1 = 6, not 7. Therefore, the frequency count was incorrect relative to the tallies."}, {"text": "The tally marks $IIII$ $|$ actually represent 6, meaning the frequency count of 7 was incorrect.", "isCorrect": true, "rationale": "The 'teacheranswers' explicitly states: 'The “Science” row says the tally marks equal 7, but five vertical marks plus one more mark is 6, not 7.' This identifies the mismatch between the tally and the frequency."}, {"text": "The total sum of all categories was incorrect, not just the Science row.", "isCorrect": false, "rationale": "While the total sum was also incorrect due to this specific error and potentially others, the question asks for the *specific* error identified in the 'Science' row related to the tally marks and frequency count. The primary error was the mismatch in the Science row."}]}, {"question": "According to Ms. Takahashi's 'Favorite Ice Cream Flavors' frequency table, which flavor is the least popular?", "options": [{"text": "Chocolate", "isCorrect": false, "rationale": "Chocolate is the most popular flavor with 11 votes, not the least popular."}, {"text": "Mint Chip", "isCorrect": false, "rationale": "Mint Chip has 3 votes, which is not the lowest frequency. The least popular is the category with the lowest frequency."}, {"text": "Other", "isCorrect": true, "rationale": "The 'Other' category has 2 votes, which is the lowest frequency in the table, making it the least popular flavor."}, {"text": "Strawberry", "isCorrect": false, "rationale": "Strawberry has 6 votes, which is not the lowest frequency. The least popular is the category with the lowest frequency."}]}, {"question": "If students conduct a class survey on 'Favorite Type of Music' and want to build a frequency table 'from scratch' as suggested in the 'Extension' activity, what would be the logical first step *after* collecting individual responses?", "options": [{"text": "Calculate the percentage for each type of music.", "isCorrect": false, "rationale": "Calculating percentages comes after determining frequencies. The primary task after collecting raw responses is to count how many times each type occurred."}, {"text": "Create a bar graph to visualize the results.", "isCorrect": false, "rationale": "Creating a bar graph is a visualization step that typically happens *after* the frequency table has been constructed and frequencies are known."}, {"text": "Tally the occurrences of each type of music.", "isCorrect": true, "rationale": "The text states the extension 'reinforces both tally and frequency skills at once.' After collecting raw responses, the most logical first step to build a frequency table is to tally each occurrence to get the raw counts (frequencies)."}, {"text": "Determine the mode and least common type of music.", "isCorrect": false, "rationale": "Identifying the mode and least common category comes *after* frequencies have been determined and the table is largely complete; it's an interpretation step, not the first step in building the table itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
