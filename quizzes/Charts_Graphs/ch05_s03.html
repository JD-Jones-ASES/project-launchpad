<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes a 100% stacked bar chart from a regular stacked bar chart?", "options": [{"text": "A 100% stacked bar chart shows absolute counts for each segment, while a regular stacked bar chart shows proportions.", "isCorrect": false, "rationale": "This is incorrect. A 100% stacked bar chart specifically shows proportions (percentages), while a regular stacked bar chart displays absolute counts or values."}, {"text": "In a 100% stacked bar chart, all bars are scaled to the same total height, representing 100% of each group's total.", "isCorrect": true, "rationale": "This is correct. The defining feature of a 100% stacked bar chart is that every bar is scaled to reach exactly 100%, allowing for easy comparison of proportions across categories."}, {"text": "A 100% stacked bar chart is primarily used to compare the total sizes of different groups, while a regular stacked chart compares segment proportions.", "isCorrect": false, "rationale": "This is incorrect. A 100% stacked bar chart loses the ability to compare total group sizes because all bars are the same height. It is used to compare segment proportions, while a regular stacked chart allows comparison of total group sizes."}, {"text": "Regular stacked bar charts only display two categories per bar, whereas 100% stacked bar charts can display many categories.", "isCorrect": false, "rationale": "This is incorrect. Both regular and 100% stacked bar charts can display multiple categories (segments) within each bar; the number of categories is not a distinguishing factor between them."}]}, {"question": "When converting a regular stacked bar chart to a 100% stacked bar chart, what is the primary visual advantage gained?", "options": [{"text": "The ability to compare the total numerical sizes of different groups.", "isCorrect": false, "rationale": "This is incorrect. The ability to compare total group sizes is lost, not gained, because all bars become the same height."}, {"text": "A clearer understanding of the absolute difference in counts between segments.", "isCorrect": false, "rationale": "This is incorrect. Absolute differences in counts are obscured when segments are converted to percentages; only proportional differences are highlighted."}, {"text": "An easy visual comparison of proportions across different categories or bars.", "isCorrect": true, "rationale": "This is correct. Because all bars are scaled to 100%, the eye can easily focus on the start and end points of segments to compare their proportions across different bars."}, {"text": "The capacity to display more data points within the same chart space.", "isCorrect": false, "rationale": "This is incorrect. While both chart types can display many data points, converting from one to the other doesn't inherently change the capacity to display more points; it changes how the existing points are represented."}]}, {"question": "A common misconception about 100% stacked bar charts is that if all bars reach the same height (100%), it implies that:", "options": [{"text": "Each segment within the bars represents an equal numerical value.", "isCorrect": false, "rationale": "This is incorrect. Each segment represents a proportion of its own group's total, not necessarily an equal numerical value across different groups or even within the same group."}, {"text": "The total count or size of each group being compared is identical.", "isCorrect": true, "rationale": "This is correct. A significant misconception is believing that the uniform 100% height of the bars means all underlying groups have the same total count. In reality, 100% represents 100% of *each group's* potentially different total count."}, {"text": "The chart is not suitable for displaying more than two categories.", "isCorrect": false, "rationale": "This is incorrect. The chart can display multiple categories as segments within each bar, regardless of whether the total counts are the same."}, {"text": "The chart is displaying absolute values rather than proportions.", "isCorrect": false, "rationale": "This is incorrect. The 100% scaling explicitly means the chart is displaying proportions (percentages), not absolute values."}]}, {"question": "Consider a 100% stacked bar chart showing 'Device Usage by Age Group,' where High Schoolers have a 'phone segment' that is larger than the 'phone segment' for Middle Schoolers. What can be definitively concluded?", "options": [{"text": "More high school students use phones than middle school students.", "isCorrect": false, "rationale": "This cannot be definitively concluded. A larger segment only means a higher *proportion* of high schoolers use phones. Without knowing the total number of students in each group, we cannot compare absolute counts."}, {"text": "The total number of devices used by high schoolers is greater than by middle schoolers.", "isCorrect": false, "rationale": "This cannot be concluded. The chart only shows proportions of device usage within each group, not the total number of devices or the total number of users per group."}, {"text": "A higher percentage of high school students use phones compared to middle school students.", "isCorrect": true, "rationale": "This is correct. A larger segment in a 100% stacked bar chart directly indicates a higher proportion or percentage for that specific category within its respective group."}, {"text": "Middle school students use a wider variety of devices than high school students.", "isCorrect": false, "rationale": "This cannot be concluded from the relative size of a single segment. The chart shows proportions of specific device types, not the overall variety of devices used by each group."}]}, {"question": "You are analyzing a 100% stacked bar chart comparing 'product satisfaction' across three regions: North, South, and West. The 'satisfied' segment in the North region bar is visibly larger than the 'satisfied' segment in the South region bar. However, you know the South region has a much larger customer base. What critical insight is lost, or cannot be determined, from this chart alone?", "options": [{"text": "The overall product satisfaction level across all regions combined.", "isCorrect": false, "rationale": "While not directly presented as a single bar, one could potentially infer combined satisfaction if total customer numbers were provided separately. However, this is not the primary insight lost."}, {"text": "The specific reasons for varying satisfaction levels in each region.", "isCorrect": false, "rationale": "Reasons for satisfaction are not displayed in any bar chart type; this information would require additional data and analysis."}, {"text": "Whether the absolute number of satisfied customers in the South is actually higher than in the North.", "isCorrect": true, "rationale": "This is correct. A 100% stacked bar chart shows proportions. Even if the North has a higher *percentage* of satisfied customers, the South, having a much larger customer base, might have a greater *absolute number* of satisfied customers. This chart type does not allow comparison of group totals or absolute counts."}, {"text": "The trend of product satisfaction over time in each region.", "isCorrect": false, "rationale": "This is incorrect. A single 100% stacked bar chart does not inherently show trends over time; it presents a snapshot. Time-series data would require multiple charts or a different chart type."}]}, {"question": "When interpreting a 100% stacked bar chart, which characteristic of the y-axis and bars is considered normal and crucial for its function?", "options": [{"text": "The y-axis always displays absolute counts, ranging from 0 to the highest total group count.", "isCorrect": false, "rationale": "This is incorrect. The y-axis in a 100% stacked bar chart displays percentages, typically from 0% to 100%, not absolute counts."}, {"text": "Each individual bar may vary significantly in height, reflecting different group totals.", "isCorrect": false, "rationale": "This is incorrect. A defining feature of a 100% stacked bar chart is that *every bar reaches 100%*, meaning they are all the same height visually, regardless of underlying group totals."}, {"text": "The y-axis goes from 0% to 100%, and every bar reaches 100%.", "isCorrect": true, "rationale": "This is correct. The y-axis scaled from 0% to 100% and all bars reaching 100% are fundamental characteristics that allow for proportional comparison in this chart type."}, {"text": "Data labels are always present, showing exact numerical values for each segment.", "isCorrect": false, "rationale": "This is incorrect. While data labels can be present, they are not a 'normal and crucial' characteristic for the chart's function; percentages can also be read from the y-axis. Their absence does not negate the chart's purpose."}]}, {"question": "A researcher wants to compare the distribution of political affiliations (Democrat, Republican, Independent, Other) among voters in four different states. It is important to see how the *mix* of affiliations differs in each state, regardless of the total number of voters in that state. Which chart type is most appropriate for this goal?", "options": [{"text": "A standard bar chart showing the count of each affiliation per state.", "isCorrect": false, "rationale": "A standard bar chart would make it difficult to compare the *mix* or proportion of affiliations within each state, especially if the total number of voters varies greatly between states."}, {"text": "A regular stacked bar chart showing the absolute number of voters for each affiliation per state.", "isCorrect": false, "rationale": "A regular stacked bar chart would allow comparison of total voter counts per state but would not easily show how the *proportion* of each affiliation differs, as the varying bar heights would distract from internal segment comparisons."}, {"text": "A pie chart for each state.", "isCorrect": false, "rationale": "While pie charts show proportions, comparing multiple pie charts side-by-side to discern subtle proportional differences across states can be difficult and less efficient than a bar-based comparison."}, {"text": "A 100% stacked bar chart.", "isCorrect": true, "rationale": "This is correct. A 100% stacked bar chart is specifically designed to compare the mix or proportions of parts across different categories (states in this case), by scaling every bar to 100% and allowing the eye to focus on segment differences, regardless of total group size."}]}, {"question": "You are presented with a 100% stacked bar chart showing 'Internet Usage by Continent,' with segments for 'Social Media,' 'Streaming,' and 'Work/Education.' If the 'Streaming' segment for Africa appears smaller than the 'Streaming' segment for Europe, what does this immediately tell you?", "options": [{"text": "More people in Europe stream than in Africa.", "isCorrect": false, "rationale": "This is incorrect. A smaller segment only indicates a lower *proportion* of internet usage dedicated to streaming. It doesn't allow for comparison of the absolute number of users, as the total number of internet users in each continent could be vastly different."}, {"text": "The total volume of internet usage in Africa is less than in Europe.", "isCorrect": false, "rationale": "This is incorrect. A 100% stacked bar chart does not allow comparison of total volumes or group sizes. All bars are scaled to 100%, irrespective of their underlying total."}, {"text": "A lower percentage of internet usage in Africa is for streaming compared to Europe.", "isCorrect": true, "rationale": "This is correct. The direct interpretation of a smaller segment in a 100% stacked bar chart is that the corresponding proportion (percentage) is lower for that category within that group."}, {"text": "People in Africa spend less time on the internet overall compared to Europe.", "isCorrect": false, "rationale": "This is incorrect. The chart shows the *distribution* of internet usage activities, not the total time spent online or the overall volume of internet usage."}]}, {"question": "A company surveys its employees across two departments, 'Sales' and 'Marketing,' regarding their preferred communication method (Email, Chat, Phone). A 100% stacked bar chart shows that 70% of Sales prefers 'Email' and 50% of Marketing prefers 'Email.' If the Sales department has 50 employees and the Marketing department has 100 employees, which conclusion is valid?", "options": [{"text": "The Sales department has a higher absolute number of employees who prefer Email.", "isCorrect": false, "rationale": "This is incorrect. 70% of 50 Sales employees is 35. 50% of 100 Marketing employees is 50. So, Marketing has a higher absolute number of employees who prefer Email."}, {"text": "The total number of employees surveyed is 150, and 120 prefer Email.", "isCorrect": false, "rationale": "This is incorrect. The total number of employees is 150 (50+100). The total number preferring Email is 35 (Sales) + 50 (Marketing) = 85, not 120."}, {"text": "A greater proportion of Sales employees prefer Email compared to Marketing employees.", "isCorrect": true, "rationale": "This is correct. The chart directly shows that 70% of Sales employees prefer Email, which is a greater proportion than the 50% of Marketing employees who prefer Email. This is exactly what a 100% stacked bar chart is designed to convey."}, {"text": "The Marketing department's preference for Email is less significant than Sales' preference.", "isCorrect": false, "rationale": "This is subjective and cannot be concluded purely from the data. While the proportion is lower, the absolute number of Marketing employees preferring email is higher, which could be considered 'more significant' depending on the context."}]}, {"question": "What is the overarching purpose of using a 100% stacked bar chart?", "options": [{"text": "To highlight the growth or decline of total values over different categories.", "isCorrect": false, "rationale": "This is incorrect. This chart type explicitly 'loses' the ability to compare total values across categories because all bars are scaled to the same height. A regular stacked bar chart or a simple bar chart of totals would be better for this."}, {"text": "To show the specific magnitude of each component's contribution to an overall absolute total.", "isCorrect": false, "rationale": "This is incorrect. The chart shows proportional contribution to each *group's* total, not the specific magnitude of components to an overall absolute total across all groups combined, as absolute values are lost."}, {"text": "To easily compare how the internal composition or mix of parts differs across various categories, irrespective of their total sizes.", "isCorrect": true, "rationale": "This is correct. The primary purpose is to enable direct visual comparison of segment proportions (the 'mix of parts') between different categories, without the visual distraction of varying total group sizes."}, {"text": "To identify individual data points and their exact numerical values within large datasets.", "isCorrect": false, "rationale": "This is incorrect. While segments have percentages, the chart's strength is in visual comparison of proportions, not in pinpointing exact numerical values for individual data points, especially without explicit labels."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
