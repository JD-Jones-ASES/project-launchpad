<div class="quiz-container">

        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 4, Section 3</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary visual effect of a truncated y-axis in a bar chart?", "options": [{"text": "It makes all bars appear to be the same height, obscuring differences.", "isCorrect": false, "rationale": "A truncated y-axis has the opposite effect; it exaggerates differences, making them seem more pronounced, not obscuring them."}, {"text": "It visually exaggerates small differences between bars, making them look much larger than they actually are.", "isCorrect": true, "rationale": "According to the definition provided, a truncated axis 'By starting the axis at a higher number (like 80 instead of 0), small differences between bars are visually exaggerated — they look much larger than they really are.'"}, {"text": "It makes wider bars look more important than narrower bars.", "isCorrect": false, "rationale": "This effect is caused by inconsistent bar widths, not a truncated y-axis."}, {"text": "It hides certain data categories, giving an incomplete picture.", "isCorrect": false, "rationale": "This describes the 'cherry-picking' technique, not a truncated y-axis."}], "id": "q01"}, {"question": "A bar chart displays company profits over five years. The y-axis starts at $500,000 instead of $0. What is the most likely misleading impression this chart will create?", "options": [{"text": "It will inaccurately represent the total profit over the five years, making it seem lower.", "isCorrect": false, "rationale": "While it distorts the visual, the primary misleading effect of a truncated axis isn't to inaccurately represent the total, but to exaggerate differences between individual bars."}, {"text": "The visual differences between profit levels from year to year will appear more dramatic than they actually are.", "isCorrect": true, "rationale": "A truncated y-axis, starting at a number above zero, visually exaggerates the differences between bar heights, making small variations seem much more significant. In this case, profit fluctuations would look more dramatic."}, {"text": "It will make it impossible to determine the absolute profit for any single year without careful calculation.", "isCorrect": false, "rationale": "While the visual is distorted, the individual numbers might still be available or estimable from the axis, but the immediate visual impression is skewed."}, {"text": "It will make all profit figures seem very low, regardless of their actual value.", "isCorrect": false, "rationale": "A truncated axis starting at a high number usually makes the presented values seem like a significant portion of a smaller range, exaggerating differences rather than making values seem universally low."}], "id": "q02"}, {"question": "According to the text, why is it important to identify a truncated y-axis, even if the chart creator claims it was accidental or for convenience?", "options": [{"text": "Accidental truncation is always easier to correct than intentional deception, so identifying it speeds up the correction process.", "isCorrect": false, "rationale": "The text does not state that accidental truncation is easier to correct, but rather focuses on the impact on the reader."}, {"text": "The effect on readers—exaggerating differences—is the same regardless of the creator's intent.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section explicitly states: 'Emphasize that sometimes it happens accidentally or out of convenience, but the effect on readers is the same regardless of intent.'"}, {"text": "Bar charts with truncated axes cannot be used for any meaningful data analysis whatsoever.", "isCorrect": false, "rationale": "While misleading visually, if the numerical data is present and interpreted carefully, analysis is still possible, but the visual impression is compromised."}, {"text": "Only intentionally truncated axes are considered truly misleading; accidental ones are benign.", "isCorrect": false, "rationale": "This contradicts the text's clear statement that the effect on readers is the same regardless of intent, implying both intentional and accidental truncation are misleading."}], "id": "q03"}, {"question": "How do inconsistent bar widths mislead a reader in a bar chart?", "options": [{"text": "They make it harder to read the exact numerical value of each bar, causing confusion.", "isCorrect": false, "rationale": "While potentially distracting, the primary misleading effect isn't difficulty in reading numbers, but a distortion of visual importance."}, {"text": "Wider bars are visually perceived as representing a larger or more important quantity, even if their heights are similar.", "isCorrect": true, "rationale": "The definition states: 'Our eyes perceive wider bars as “bigger” even when comparing bar heights, which creates a false visual impression.'"}, {"text": "They cause the y-axis to start at a non-zero value, distorting proportions.", "isCorrect": false, "rationale": "This describes a truncated y-axis, not inconsistent bar widths."}, {"text": "They allow the chart creator to hide certain data points from view.", "isCorrect": false, "rationale": "This describes cherry-picking, not inconsistent bar widths."}], "id": "q04"}, {"question": "A bar chart comparing product sales shows 'Product A' with a significantly wider bar than 'Product B,' even though their heights represent similar sales volumes. What might a critical reader infer from this visual design?", "options": [{"text": "Product A generates much higher profits than Product B, despite similar sales volumes.", "isCorrect": false, "rationale": "The chart only shows sales volume, and wider bars falsely imply greater quantity or importance, not necessarily higher profit."}, {"text": "The chart is likely trying to make Product A appear more significant or successful than Product B, despite comparable sales.", "isCorrect": true, "rationale": "The text explains that 'your eye sees a wider bar as representing a bigger area — even if the heights are the same,' leading to a false visual impression of greater importance for the wider bar."}, {"text": "Product A has a broader range of sales data than Product B, justifying the width difference.", "isCorrect": false, "rationale": "In a standard bar chart, width should not represent a data range unless it's a histogram, which is a different type of chart. Inconsistent widths in a bar chart are considered misleading."}, {"text": "The chart is likely a histogram, where bar width legitimately represents a data interval.", "isCorrect": false, "rationale": "The text explicitly states this rule applies 'unless the width represents a meaningful data value (in which case the chart has a different name — a “histogram”...),' implying this is a bar chart where inconsistent widths are misleading."}], "id": "q05"}, {"question": "Which of the following best describes the misleading technique known as 'cherry-picking' in a bar chart?", "options": [{"text": "Presenting data from only the most recent time period to show current trends.", "isCorrect": false, "rationale": "While this can sometimes be part of cherry-picking, the core definition is about selective data to support a viewpoint, not just recent data."}, {"text": "Selecting only data that supports one viewpoint and leaving out data that contradicts it.", "isCorrect": true, "rationale": "The definition states: 'Cherry-picking means selecting only the data that supports one viewpoint and leaving out data that contradicts it.'"}, {"text": "Using bright colors for positive data and dull colors for negative data to influence perception.", "isCorrect": false, "rationale": "This is a stylistic choice, not one of the three specific misleading techniques identified in the text."}, {"text": "Displaying only the highest and lowest values to show the full range of data clearly.", "isCorrect": false, "rationale": "Cherry-picking involves omission of contradictory data, not merely showing extrema (which could be legitimate if done transparently)."}], "id": "q06"}, {"question": "A political campaign publishes a bar chart showing their candidate's approval ratings for only the months when they increased, omitting months when ratings declined or stayed flat. What misleading technique is this an example of?", "options": [{"text": "Truncated Y-Axis", "isCorrect": false, "rationale": "A truncated Y-axis involves altering the scale of the vertical axis, which is not described here."}, {"text": "Inconsistent Bar Widths", "isCorrect": false, "rationale": "Inconsistent bar widths involve making some bars wider than others, which is not described here."}, {"text": "Cherry-Picked Categories", "isCorrect": true, "rationale": "This is a classic example of cherry-picking, where data that supports a favorable viewpoint (increasing approval) is selected, and data that contradicts it (declining or flat ratings) is deliberately left out to present a biased picture."}, {"text": "Overly Complex Data Presentation", "isCorrect": false, "rationale": "The issue here is the selection of data, not its complexity."}], "id": "q07"}, {"question": "When evaluating a bar chart in a news report or advertisement, which of the following is the most comprehensive approach to determining its honesty, according to the text?", "options": [{"text": "Only check if the numerical labels on the bars are accurate.", "isCorrect": false, "rationale": "The text notes a common misconception that 'labels only help if you read them carefully — most readers form impressions from the visual, not the numbers,' so this alone is insufficient."}, {"text": "Verify that the y-axis starts at zero, all bars are the same width, and no critical categories are missing.", "isCorrect": true, "rationale": "This option combines the three key checks recommended in the 'realworld' section: '(1) Does the y-axis start at zero? (2) Are all the bars the same width? (3) Is there any category missing that might change the story?'"}, {"text": "Assume all charts from reputable news organizations are honest and accurate.", "isCorrect": false, "rationale": "The text explicitly states: 'News organizations and advertisers sometimes use these tricks accidentally — and sometimes on purpose.'"}, {"text": "Compare the chart to a line graph of the same data to see if trends match.", "isCorrect": false, "rationale": "While a good analytical strategy, it's not one of the specific checks for misleading bar chart techniques highlighted in this section."}], "id": "q08"}, {"question": "Some students believe that reading the numbers written on bars protects them from misleading charts. Why does the text argue this is often insufficient?", "options": [{"text": "Numbers on bars are frequently inaccurate or deliberately falsified, making them unreliable.", "isCorrect": false, "rationale": "The text does not claim that numbers on bars are often inaccurate or falsified, but rather that readers typically don't process them thoroughly."}, {"text": "The human brain primarily forms impressions from the visual aspects of a chart, not the detailed numerical labels.", "isCorrect": true, "rationale": "Under 'Common Misconceptions,' the text states: 'But labels only help if you read them carefully — most readers form impressions from the visual, not the numbers.'"}, {"text": "Numerical labels on bars are often too small to read effectively, especially in fast-paced media.", "isCorrect": false, "rationale": "While sometimes true, this isn't the primary reason cited in the text; the emphasis is on how the brain processes visual information over detailed numbers."}, {"text": "Bar charts are inherently too complex for most readers to fully comprehend the numbers presented.", "isCorrect": false, "rationale": "The text implies bar charts are powerful visual tools, but that the visual can be misleading, not that the numbers themselves are too complex."}], "id": "q09"}, {"question": "Who is credited with inventing the bar chart, the line graph, AND the pie chart?", "options": [{"text": "Florence Nightingale", "isCorrect": false, "rationale": "While a pioneer in data visualization, Florence Nightingale is not credited with inventing these three specific foundational chart types."}, {"text": "William Playfair", "isCorrect": true, "rationale": "The 'chartchampion' section explicitly states: 'Here's a fun fact: the bar chart, the line graph, AND the pie chart were all invented by the same person! William Playfair...'"}, {"text": "John Tukey", "isCorrect": false, "rationale": "John Tukey is known for contributions to exploratory data analysis, including the box plot, but not the invention of these three specific charts."}, {"text": "Charles Minard", "isCorrect": false, "rationale": "Charles Minard is famous for his flow map of Napoleon's Russian campaign, but not the invention of the bar, line, and pie charts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
