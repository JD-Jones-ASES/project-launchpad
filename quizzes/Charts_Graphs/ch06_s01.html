<div class="quiz-container">

        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a pie chart, as described in the textbook section?", "options": [{"text": "To show how a specific data value changes over a period of time.", "isCorrect": false, "rationale": "The text explicitly states that pie charts show parts of a whole at ONE point in time, and that line graphs should be used for change over time."}, {"text": "To illustrate how a whole entity is divided into its constituent parts at a single moment.", "isCorrect": true, "rationale": "The definition states, 'A pie chart... shows how a whole is divided into parts. The entire circle represents 100% of something.' It emphasizes 'one point in time'."}, {"text": "To compare the magnitudes of multiple independent variables against each other.", "isCorrect": false, "rationale": "While slices can be compared, the primary purpose is to show the *proportion* of parts to a *whole*, not just independent variable comparison."}, {"text": "To identify the correlation or relationship between two different sets of data.", "isCorrect": false, "rationale": "Pie charts are not designed to show correlation between different datasets; that is typically done with scatter plots or other chart types."}]}, {"question": "According to the 'Common Misconceptions' section, which statement about pie charts is INCORRECT?", "options": [{"text": "Pie charts are effective for showing data that changes over time.", "isCorrect": true, "rationale": "This is incorrect. The text explicitly warns against this misconception, stating, 'Emphasize: pie charts show parts of a whole at ONE point in time. For change over time, use a line graph.'"}, {"text": "The size of each slice reflects its percentage, not the number of sub-items it represents.", "isCorrect": false, "rationale": "This statement is correct and addresses another common misconception discussed in the text, so it's not the incorrect statement about pie charts."}, {"text": "All slices in a correctly constructed pie chart must sum to 100%.", "isCorrect": false, "rationale": "This statement is correct. The text highlights that 'Students may forget to check that slices sum to 100%. If they do not sum to 100%, something is wrong with the chart.'"}, {"text": "A pie chart's legend identifies which color corresponds to which category.", "isCorrect": false, "rationale": "This statement is correct. The 'Parts of a Pie Chart' section lists 'Legend (key) — identifies which color represents which category.'"}]}, {"question": "A research team collects data on how their department's annual budget is allocated across 15 different operational categories. Based on the textbook's advice, which chart type would be most appropriate for visualizing this data?", "options": [{"text": "A pie chart, because it clearly shows 'parts of a whole'.", "isCorrect": false, "rationale": "The 'When Pie Charts Work Well' section and the 'quicktip' both advise against using pie charts for more than six categories, as it makes the chart hard to read."}, {"text": "A pie chart, provided the smallest categories are combined into an 'Other' slice.", "isCorrect": false, "rationale": "While combining small categories can help, the general rule of 'more than 6 categories' still makes a pie chart suboptimal, even with combining."}, {"text": "A line graph, as it allows for easy comparison between many different categories.", "isCorrect": false, "rationale": "A line graph is primarily used for showing change over time, not for comparing distinct categories of a whole at one point in time."}, {"text": "A bar chart, as pie charts become hard to read with more than six categories.", "isCorrect": true, "rationale": "The 'quicktip' explicitly states: 'If your pie chart would have more than 6 slices, switch to a bar chart instead. Pie charts with many small slices are very hard to read...'"}]}, {"question": "Which of the following scenarios describes an APPROPRIATE use for a pie chart, according to the provided text?", "options": [{"text": "Showing the weekly fluctuations in a student's screen time over a semester.", "isCorrect": false, "rationale": "This involves 'change over time,' for which the text recommends a line graph, not a pie chart."}, {"text": "Comparing the total sales revenue generated by each of 8 distinct product lines in a company's portfolio for the last quarter.", "isCorrect": false, "rationale": "While showing 'parts of a whole,' 8 distinct product lines exceed the recommended maximum of six categories for effective pie chart use."}, {"text": "Displaying the proportion of a city's water consumption attributed to residential, commercial, and industrial sectors in a single year.", "isCorrect": true, "rationale": "This scenario fits all criteria: parts of a whole (consumption), single point in time (single year), and likely fewer than six categories (residential, commercial, industrial are three)."}, {"text": "Visualizing the frequency distribution of student scores on a 100-point exam.", "isCorrect": false, "rationale": "This typically involves numerical ranges and often many categories, making a histogram or bar chart more suitable than a pie chart for score distribution."}]}, {"question": "According to the 'How to Read A Pie Chart' section, what is the recommended *first* step when approaching a new pie chart?", "options": [{"text": "Locate the largest and smallest slices to understand the data's extremes.", "isCorrect": false, "rationale": "Finding the largest and smallest slices is Step 3, not the first step."}, {"text": "Read the chart's title to understand what the entire circle represents.", "isCorrect": true, "rationale": "Step 1 of 'howtoreadA Pie Chart' is 'Read the title. What does the whole circle represent?'"}, {"text": "Verify that all percentage labels sum up to exactly 100%.", "isCorrect": false, "rationale": "Checking the sum of percentages is Step 5, which comes later in the reading process."}, {"text": "Examine the legend or slice labels to identify each category.", "isCorrect": false, "rationale": "Reading the legend/slice labels is Step 2, following the title."}]}, {"question": "In the 'Class Time Allocation' example, if the total class time for the school day is 360 minutes, and Science accounts for 18% of this time, how many minutes are dedicated to Science?", "options": [{"text": "18 minutes", "isCorrect": false, "rationale": "This is simply the percentage value, not the conversion to minutes."}, {"text": "64.8 minutes", "isCorrect": true, "rationale": "To find the minutes, calculate 18% of 360 minutes: 0.18 * 360 = 64.8 minutes."}, {"text": "72 minutes", "isCorrect": false, "rationale": "This is a common calculation error (perhaps 20% of 360, or 18 * 4)."}, {"text": "90 minutes", "isCorrect": false, "rationale": "90 minutes corresponds to Math (25%) from the example, not Science."}]}, {"question": "Considering the 'Class Time Allocation' example, which subject, when combined with Social Studies (15%), makes up exactly 35% of the school day?", "options": [{"text": "Math (25%)", "isCorrect": false, "rationale": "Math (25%) + Social Studies (15%) = 40%, which is not 35%."}, {"text": "English (20%)", "isCorrect": true, "rationale": "English (20%) + Social Studies (15%) = 35% of the school day."}, {"text": "Science (18%)", "isCorrect": false, "rationale": "Science (18%) + Social Studies (15%) = 33%, which is not 35%."}, {"text": "Art/Music (12%)", "isCorrect": false, "rationale": "Art/Music (12%) + Social Studies (15%) = 27%, which is not 35%."}]}, {"question": "A student is creating a pie chart for their school project. They have one category representing 'Hobbies' which includes reading, sports, gaming, and art. They assume this 'Hobbies' slice will automatically be the largest because it contains the most sub-items. What misconception are they falling into?", "options": [{"text": "They are overlooking the importance of the chart's title.", "isCorrect": false, "rationale": "This relates to a different part of pie chart reading/creation."}, {"text": "They think the slice with the most categories is always the biggest.", "isCorrect": true, "rationale": "The 'Common Misconceptions' section states: 'Some students think the slice with the most categories is always the biggest. Remind them that the SIZE of each slice reflects its percentage, not the number of sub-items.'"}, {"text": "They are incorrectly applying the 100% sum rule.", "isCorrect": false, "rationale": "This is a different common misconception, not directly related to the number of sub-items within a slice."}, {"text": "They believe a pie chart can show change over time.", "isCorrect": false, "rationale": "This is another distinct common misconception discussed, but not the one demonstrated in the scenario."}]}, {"question": "Which component of a pie chart is crucial for understanding what each specific color or pattern represents?", "options": [{"text": "The circle itself, which always represents 100% of the data.", "isCorrect": false, "rationale": "The circle represents the whole, but doesn't tell you *what* each color means."}, {"text": "The percentage labels, indicating the value of each slice.", "isCorrect": false, "rationale": "Percentage labels show the magnitude, but don't identify the category unless combined with a direct label or legend."}, {"text": "The legend (key), which maps colors/patterns to their corresponding categories.", "isCorrect": true, "rationale": "The 'Parts of a Pie Chart' section defines the 'Legend (key)' as what 'identifies which color represents which category.'"}, {"text": "The title, which explains the overall subject of the chart.", "isCorrect": false, "rationale": "The title tells you what the whole pie represents, but not the specific meaning of individual colors/patterns."}]}, {"question": "Why is it important to ensure that all percentage labels in a pie chart add up to exactly 100%?", "options": [{"text": "To confirm that the chart is visually appealing and easy to read.", "isCorrect": false, "rationale": "While clarity is good, the 100% sum is about data accuracy, not aesthetics."}, {"text": "Because it ensures the chart only includes the most significant categories.", "isCorrect": false, "rationale": "The 100% rule applies to *all* categories, significant or not, to represent the complete whole."}, {"text": "It verifies that the pie chart accurately represents the entirety of the data, with no parts missing or duplicated.", "isCorrect": true, "rationale": "The text states, 'Do all the percentages add up to 100%? (They should — if not, the chart has an error!).' This confirms that the chart truly represents the whole and is error-free in its data distribution."}, {"text": "To show that the data points are independent of each other.", "isCorrect": false, "rationale": "Pie charts inherently show parts of a *whole*, implying a dependency (they must sum to 100%), rather than independence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
