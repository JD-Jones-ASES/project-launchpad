<script>
var QUESTIONS = [{"question": "What is the fundamental principle that distinguishes a Sankey chart from other types of flow diagrams in how it represents quantity?", "options": [{"text": "The length of the arrows or ribbons directly corresponds to the quantity being represented.", "isCorrect": false, "rationale": "This is a common misconception explicitly addressed in the text: 'The most important rule for reading a Sankey chart: the width of each ribbon shows the data value, not its length or position.'"}, {"text": "The width of the ribbons or arrows is proportional to the quantity of flow, with wider ribbons indicating more.", "isCorrect": true, "rationale": "The definition of a Sankey chart states: 'The width of each ribbon is proportional to the quantity it represents: a wider ribbon means more flow.'"}, {"text": "The color intensity of the ribbons indicates the quantity, with darker colors representing larger amounts.", "isCorrect": false, "rationale": "The text does not mention color intensity as a primary indicator of quantity; it focuses entirely on width."}, {"text": "The number of distinct arrows converging on a destination represents the total quantity received.", "isCorrect": false, "rationale": "The quantity is shown by the width of a single ribbon or arrow, not by counting multiple distinct arrows for a single flow."}]}, {"question": "A student observes a Sankey chart where a very short, wide ribbon represents 'Flow A' and a long, thin ribbon represents 'Flow B.' Based on the principles of Sankey charts, which conclusion is most accurate?", "options": [{"text": "Flow B carries a larger quantity than Flow A because its ribbon is longer, indicating a longer process.", "isCorrect": false, "rationale": "The text explicitly states: 'A short, wide ribbon represents more than a long, thin ribbon. Always read the width (and the labels showing percentages or amounts).' Length is not an indicator of quantity."}, {"text": "Flow A carries a larger quantity than Flow B because its ribbon is wider, regardless of length.", "isCorrect": true, "rationale": "The key rule is 'the width of each ribbon shows the data value, not its length or position.' Therefore, the wider ribbon (Flow A) represents a larger quantity."}, {"text": "Both Flow A and Flow B represent approximately equal quantities since ribbon length and width average out.", "isCorrect": false, "rationale": "This is incorrect. Width is the primary data-carrying element, and length is not considered. The quantities are not necessarily equal."}, {"text": "The chart is poorly designed and cannot be accurately interpreted without labels, as length and width are equally important.", "isCorrect": false, "rationale": "While labels are helpful for precision, the fundamental principle allows for interpretation based on width alone. The design isn't necessarily poor based on these two flows, and width is definitely not equally important as length for quantity."}]}, {"question": "According to the 'Common Misconceptions' section, which statement about Sankey chart design is generally true?", "options": [{"text": "All flows must originate from a single, unified source on the left side of the chart.", "isCorrect": false, "rationale": "The text states: 'Students may think all flows must start from one single source. In many Sankeys, there are multiple sources feeding into multiple destinations.'"}, {"text": "The order in which flows are presented (e.g., top to bottom) is typically ranked by their size, from largest to smallest.", "isCorrect": false, "rationale": "The text clarifies: 'The order of flows is aesthetic, not necessarily ranked by size. Teach students to check labels/percentages rather than inferring rank from position.'"}, {"text": "Sankey charts work best when showing a limited number of flows, ideally between 3 and 8.", "isCorrect": true, "rationale": "The 'Too Many Flows = Too Messy' section notes: 'Sankey charts work beautifully with 3–8 flows. When a designer tries to show 20 or 30 flows at once, the ribbons cross and tangle, making the chart nearly impossible to read.'"}, {"text": "The primary data-carrying element of a Sankey chart is the arrow's length, indicating the duration or distance of the flow.", "isCorrect": false, "rationale": "This reiterates the main misconception. The text emphasizes: 'Students often focus on the arrows/paths and forget to read the WIDTH, which is the data-carrying element. Reinforce: 'wider = more.''"}]}, {"question": "A school's Sankey chart shows that Lighting uses 30% of its electricity and Computers & Technology uses 25%. If the school's total monthly electricity input is 20,000 kWh, how much electricity is used by Lighting and Computers & Technology combined?", "options": [{"text": "5,000 kWh", "isCorrect": false, "rationale": "This would be 25% of 20,000 kWh, representing only Computers & Technology, not the combined total."}, {"text": "6,000 kWh", "isCorrect": false, "rationale": "This would be 30% of 20,000 kWh, representing only Lighting, not the combined total."}, {"text": "11,000 kWh", "isCorrect": true, "rationale": "Lighting (30%) + Computers & Technology (25%) = 55%. 55% of 20,000 kWh = 0.55 * 20,000 = 11,000 kWh."}, {"text": "10,000 kWh", "isCorrect": false, "rationale": "This would be 50% of 20,000 kWh, which is incorrect as the combined percentage is 55%."}]}, {"question": "Based on the 'Worked Example: School Energy Usage,' if the school wants to make the most significant impact on reducing its electricity consumption, which area should be prioritized for efficiency improvements?", "options": [{"text": "Purchasing more energy-efficient cafeteria equipment.", "isCorrect": false, "rationale": "Cafeteria equipment falls under 'Other,' which accounts for only 10% of total energy, making it a smaller target for significant impact compared to others."}, {"text": "Replacing all traditional light bulbs with LED lighting.", "isCorrect": false, "rationale": "Lighting accounts for 30%, which is significant, but not the largest single consumer. The text indicates a greater impact could be found elsewhere."}, {"text": "Upgrading classroom computers and projectors to newer, lower-power models.", "isCorrect": false, "rationale": "Computers & Technology accounts for 25% of energy, less than HVAC and Lighting."}, {"text": "Improving building insulation and using programmable thermostats for heating and cooling.", "isCorrect": true, "rationale": "The 'Key insight' states: 'HVAC alone uses more than one-third of the school's electricity (35%). Improving insulation or using programmable thermostats could have a big impact on energy costs.' This is the largest single category."}]}, {"question": "Which of the following scenarios best represents an appropriate application for a Sankey chart, based on the 'Where Sankey Charts Are Used' section?", "options": [{"text": "Tracking the daily high and low temperatures for a city over a year.", "isCorrect": false, "rationale": "This is time-series data, best suited for a line chart, not a flow diagram that tracks quantities moving between categories."}, {"text": "Illustrating the percentage breakdown of different gases in the Earth's atmosphere.", "isCorrect": false, "rationale": "This is a static composition, best shown with a pie chart or bar chart, not a flow chart that shows movement."}, {"text": "Showing how raw materials flow from various suppliers through different stages of manufacturing to become finished products.", "isCorrect": true, "rationale": "The text lists 'Supply chains: How raw materials (steel, plastic) flow from suppliers through manufacturing to products' as a real-world use case for Sankey charts."}, {"text": "Comparing the populations of different countries using proportional bar lengths.", "isCorrect": false, "rationale": "This is a comparison of discrete values, typically shown with a bar chart, not a flow chart depicting movement or transformation of a quantity."}]}, {"question": "What is the primary difference between a general 'flow diagram' and a 'Sankey chart,' as defined in the text?", "options": [{"text": "A flow diagram only shows processes, while a Sankey chart specifically focuses on energy flows.", "isCorrect": false, "rationale": "The definition of a flow diagram includes process charts, but also supply chain diagrams, and does not limit it to only processes. Sankey charts show various quantities, not just energy."}, {"text": "A Sankey chart is a specific type of flow diagram that uses ribbon width to quantify the flow, whereas general flow diagrams may use other methods or no quantification.", "isCorrect": true, "rationale": "The text defines 'Flow Diagram' as 'any chart that shows movement or transfer of a quantity from one category to another,' and then specifies: 'Sankey charts are the most common type' and are distinct because they use 'ribbons or arrows of varying width to show how a quantity flows.'"}, {"text": "Flow diagrams always show multiple sources, while Sankey charts always begin with a single source.", "isCorrect": false, "rationale": "The 'Common Misconceptions' section states that Sankey charts can have multiple sources, and the definitions do not restrict either type to a single or multiple source count."}, {"text": "Flow diagrams are only for qualitative data, while Sankey charts are for quantitative data.", "isCorrect": false, "rationale": "Both types of diagrams are generally used for quantitative data, as they represent the 'transfer of a quantity.' The key distinction for Sankey is the *method* of showing quantity."}]}, {"question": "Charles Joseph Minard's famous map of Napoleon's Russian campaign is cited as an early example of a Sankey diagram because it effectively visualized:", "options": [{"text": "The psychological impact of the brutal winter on the soldiers' morale.", "isCorrect": false, "rationale": "While the map included temperature data, its primary innovation as a Sankey-like diagram was not focused on morale, but on quantifiable loss."}, {"text": "The strategic decisions made by Napoleon during the advance and retreat.", "isCorrect": false, "rationale": "The map shows the *results* of the campaign, not the decision-making process itself."}, {"text": "The geographical route of the army's march and retreat, with the width of the band representing the diminishing number of soldiers.", "isCorrect": true, "rationale": "The text explains: 'The width of the band represents the number of soldiers — and as you trace the path, you watch the army shrink... In one chart, Minard captured geography, time, direction, army size, and temperature. Minard's map is essentially a Sankey diagram: flowing ribbons whose widths represent quantities.'"}, {"text": "The varying types of weaponry and supplies used by the French army.", "isCorrect": false, "rationale": "The map focused on the flow of soldiers (army size), not the types of equipment or supplies."}]}, {"question": "A data designer creates a Sankey chart with 25 distinct flows representing different categories of website traffic. Upon review, the chart appears chaotic with many overlapping and tangled ribbons. According to the 'Too Many Flows' warning, what is the most likely issue?", "options": [{"text": "The designer forgot to label the ribbons, making them impossible to distinguish.", "isCorrect": false, "rationale": "While labels are important, the primary issue described for 'too many flows' is the physical tangling and crossing of ribbons, not just a lack of labels."}, {"text": "The designer used too many distinct flows, exceeding the optimal range for Sankey chart readability.", "isCorrect": true, "rationale": "The text warns: 'Sankey charts work beautifully with 3–8 flows. When a designer tries to show 20 or 30 flows at once, the ribbons cross and tangle, making the chart nearly impossible to read. If you see a Sankey chart that looks like a plate of spaghetti, that is a design problem.'"}, {"text": "The ribbons are not color-coded, which is essential for distinguishing numerous flows.", "isCorrect": false, "rationale": "Color-coding can help, but the core problem with too many flows is the visual clutter and tangling, regardless of color."}, {"text": "The chart should have been animated to show the flow over time, rather than a static representation.", "isCorrect": false, "rationale": "The issue is with the number of concurrent flows, not necessarily the static nature of the chart. Animation would not resolve the tangling of 25 simultaneous flows."}]}, {"question": "Students are asked to draw a simple Sankey chart of their day, with 24 hours flowing into categories like sleep, school, homework, meals, and recreation. What is the primary learning objective of this activity?", "options": [{"text": "To practice calculating exact percentages of time spent on each activity.", "isCorrect": false, "rationale": "While percentage calculation is a learning objective (3), the hands-on drawing activity's main goal is to reinforce the visual representation aspect, specifically the 'ribbon widths proportional to hours.'"}, {"text": "To identify if their daily activities sum up to exactly 24 hours without any missing time.", "isCorrect": false, "rationale": "This is part of 'Check that flows add up' (step 5 of 'How to Read'), but the specific 'fun hands-on activity' emphasizes the visual proportionality."}, {"text": "To understand and apply the concept that wider ribbons represent a greater quantity (more hours).", "isCorrect": true, "rationale": "The 'Extension' section states: 'Using ribbon widths proportional to hours makes for a fun hands-on activity.' This directly addresses the first learning objective: 'Students will (1) define Sankey chart and explain how flow width represents quantity.'"}, {"text": "To illustrate the chronological order in which they perform their daily tasks.", "isCorrect": false, "rationale": "Sankey charts show quantity flow between categories, not necessarily the precise chronological order of activities. The order of flows is aesthetic, not time-based in this context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
