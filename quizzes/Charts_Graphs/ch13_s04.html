    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 13, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A school principal creates a word cloud from student feedback on new cafeteria food. The word \"pizza\" appears very large. What is the most accurate conclusion based on the principles of word clouds?", "options": [{"text": "Pizza is the most popular food item among students.", "isCorrect": false, "rationale": "While 'pizza' might be popular, a word cloud only indicates frequency, not necessarily popularity or importance. A word appearing frequently doesn't automatically mean it's the 'most popular' in a qualitative sense."}, {"text": "The school should order pizza every day to satisfy students.", "isCorrect": false, "rationale": "This is an over-application of the data. A word cloud shows frequency, not a mandate for action, nor does it quantify the level of satisfaction or importance. Frequency and importance are not the same."}, {"text": "The word \"pizza\" was mentioned more frequently than other words in the student feedback.", "isCorrect": true, "rationale": "According to the definition, 'Bigger words appear more often; smaller words appear less often.' This is the primary function of word clouds."}, {"text": "Exactly 150 students mentioned \"pizza\" in their feedback.", "isCorrect": false, "rationale": "Word clouds cannot show you exact counts. They are for quick visual impressions of frequency, not precise quantitative analysis."}]}, {"question": "For which of the following analytical tasks would a word cloud be the LEAST appropriate visualization?", "options": [{"text": "Getting a quick visual impression of the main themes in a collection of historical documents.", "isCorrect": false, "rationale": "This is an appropriate use case for a word cloud, as it quickly summarizes common words and themes in text."}, {"text": "Summarizing the most talked-about topics in a politician's speech.", "isCorrect": false, "rationale": "This is an appropriate use case. Word clouds are good for quickly highlighting frequently mentioned terms in spoken or written text."}, {"text": "Identifying the precise number of times each keyword appears in a research paper's abstract.", "isCorrect": true, "rationale": "Word clouds are 'decorative, not precise.' They cannot show exact counts. For precise frequency data, a bar chart would be more appropriate."}, {"text": "Displaying common responses from an open-ended survey question like 'What challenges do you face?'", "isCorrect": false, "rationale": "This is an appropriate use case for a word cloud, as it can visually summarize recurring terms in qualitative survey responses."}]}, {"question": "In a Venn diagram illustrating students' extracurricular activities, the intersection of the 'Music Club' circle and the 'Art Club' circle contains 10 students. What does this number represent?", "options": [{"text": "The total number of students who belong to either the Music Club or the Art Club.", "isCorrect": false, "rationale": "This would be the sum of students in both circles, minus the overlap to avoid double-counting, not just the intersection itself."}, {"text": "Students who belong to the Music Club but not the Art Club.", "isCorrect": false, "rationale": "This describes the portion of the Music Club circle that does not overlap with the Art Club circle."}, {"text": "Students who belong to both the Music Club AND the Art Club.", "isCorrect": true, "rationale": "The intersection in a Venn diagram specifically represents items or individuals that belong to all overlapping sets."}, {"text": "Students who belong to neither the Music Club nor the Art Club.", "isCorrect": false, "rationale": "This describes students represented outside both circles in the Venn diagram."}]}, {"question": "A product manager wants to identify potential market segments for a new smartphone feature. She surveys users, asking if they use 'Feature A,' 'Feature B,' or 'Both.' Which chart type is best suited to quickly visualize the number of users in each of these three groups?", "options": [{"text": "Radar Chart", "isCorrect": false, "rationale": "A radar chart is used for comparing multiple quantitative variables on radiating axes, not for showing relationships between sets of users."}, {"text": "Gantt Chart", "isCorrect": false, "rationale": "A Gantt chart is used for project scheduling and task timelines, not for showing relationships between user groups."}, {"text": "Word Cloud", "isCorrect": false, "rationale": "A word cloud is used for visualizing the frequency of words in a text, not for categorizing users by feature usage."}, {"text": "Venn Diagram", "isCorrect": true, "rationale": "A Venn diagram is ideal for showing the relationships and overlaps between two or more sets, such as users belonging to different feature groups."}]}, {"question": "Two job candidates, Sarah and Tom, are evaluated on five skills: Communication, Technical Prowess, Teamwork, Leadership, and Problem-Solving, using a radar chart. If Sarah's polygon bulges significantly outward in the 'Leadership' and 'Communication' axes, what does this indicate about Sarah?", "options": [{"text": "Sarah's overall performance across all five skills is weaker than Tom's.", "isCorrect": false, "rationale": "A bulge in specific areas only indicates higher scores in those areas, not necessarily a weaker overall performance. The overall shape and size of the polygon relative to another indicates overall strength."}, {"text": "Sarah scored highly in Leadership and Communication skills.", "isCorrect": true, "rationale": "In a radar chart, values are plotted on axes radiating from a central point. A larger, more 'filled' polygon or an outward bulge on specific axes means higher values in those categories."}, {"text": "The radar chart's axes were ordered incorrectly, leading to a distorted view.", "isCorrect": false, "rationale": "While axis order can change the *shape*, an outward bulge consistently signifies a higher value on that specific axis, regardless of its neighbors."}, {"text": "Sarah's scores in Technical Prowess and Teamwork are her strongest areas.", "isCorrect": false, "rationale": "The question states the bulge is in 'Leadership' and 'Communication', directly contradicting this option."}]}, {"question": "When interpreting a radar chart, why is it crucial to pay attention to the scale of each axis and the order in which the axes are arranged?", "options": [{"text": "The color of the polygon changes based on these factors, indicating different data sets.", "isCorrect": false, "rationale": "Color in a radar chart typically differentiates between different entities being compared (e.g., Alex vs. Sam), not determined by axis scale or order."}, {"text": "Only quantitative variables can be used if the axes are ordered correctly, preventing qualitative data.", "isCorrect": false, "rationale": "Radar charts always display quantitative variables. The axis order does not determine the data type."}, {"text": "Ignoring these elements can lead to misinterpretations of the actual data values and the perceived shape of the polygon.", "isCorrect": true, "rationale": "The text warns that 'Students may read the shape without checking the scale' and 'the shape of the polygon changes depending on which axes are placed next to each other.' Both can lead to misinterpretation."}, {"text": "These elements determine whether the chart is called a 'spider chart' or a 'web chart'.", "isCorrect": false, "rationale": "Spider chart and web chart are just synonyms for a radar chart; their names are not determined by axis scale or order."}]}, {"question": "A Gantt chart shows 'Task A' starting on June 1st and ending on June 7th, and 'Task B' starting on June 5th and ending on June 10th. Which statement is true based on this information?", "options": [{"text": "Task A is a longer duration than Task B.", "isCorrect": false, "rationale": "Task A is 7 days long (June 1-7), and Task B is 6 days long (June 5-10). Task A is slightly longer, but the difference is not significant enough to generalize, and this option states A is 'a longer duration' which is true, but another option may be more directly inferable about *overlap*."}, {"text": "Task B starts before Task A.", "isCorrect": false, "rationale": "Task A starts on June 1st, while Task B starts on June 5th, so Task A starts before Task B."}, {"text": "Tasks A and B are happening simultaneously for a period.", "isCorrect": true, "rationale": "Task A runs from June 1st to 7th, and Task B runs from June 5th to 10th. They overlap from June 5th to June 7th, meaning they happen at the same time during that period."}, {"text": "Task A finishes after Task B.", "isCorrect": false, "rationale": "Task A finishes on June 7th, and Task B finishes on June 10th, so Task A finishes before Task B."}]}, {"question": "An event planner needs to schedule the various activities for a large festival, including venue setup, vendor arrival, performance times, and cleanup, ensuring all tasks are completed on time and identifying potential overlaps. Which chart type is most suitable for this purpose?", "options": [{"text": "Word Cloud", "isCorrect": false, "rationale": "A word cloud visualizes word frequency in text, not project timelines or task management."}, {"text": "Venn Diagram", "isCorrect": false, "rationale": "A Venn diagram shows relationships between sets, not the scheduling and duration of tasks over time."}, {"text": "Radar Chart", "isCorrect": false, "rationale": "A radar chart compares multiple quantitative variables, not task schedules or dependencies."}, {"text": "Gantt Chart", "isCorrect": true, "rationale": "A Gantt chart is specifically designed to show a project schedule, displaying tasks against a timeline, making it ideal for planning and tracking events with start/end dates and overlaps."}]}, {"question": "You need to quickly assess which academic skills a student excels in (e.g., Math, Science, Art) relative to a benchmark or another student, visually identifying strengths and weaknesses across multiple attributes. Which chart type would be most effective?", "options": [{"text": "Gantt Chart", "isCorrect": false, "rationale": "A Gantt chart is for project scheduling and task management, not for comparing individual's performance across multiple skills."}, {"text": "Radar Chart", "isCorrect": true, "rationale": "A radar chart is ideal for displaying multiple quantitative variables (like skill scores) on radiating axes, making it easy to compare profiles and visually identify strengths and weaknesses across different categories, as shown in the example of comparing Alex and Sam's skills."}, {"text": "Word Cloud", "isCorrect": false, "rationale": "A word cloud visualizes word frequency in text, which is irrelevant for comparing academic skill levels."}, {"text": "Venn Diagram", "isCorrect": false, "rationale": "A Venn diagram shows relationships between sets, not the quantitative performance across multiple distinct skills."}]}, {"question": "Which of the following statements accurately describes a common misconception when interpreting one of the specialty chart types discussed in the section?", "options": [{"text": "For Venn diagrams, the portion of the diagram where circles overlap is always the largest or most important section.", "isCorrect": true, "rationale": "The text explicitly states this is a common misconception: 'Students sometimes think the intersection is the biggest or most important section. It's just the overlap.'"}, {"text": "For word clouds, the color of a word typically carries additional data meaning, such as sentiment or category.", "isCorrect": false, "rationale": "The text states: 'Color in a word cloud is usually decorative — it does NOT typically carry additional data meaning.'"}, {"text": "For Gantt charts, the right edge of a task bar always represents the task's mid-point.", "isCorrect": false, "rationale": "The text clarifies: 'The left edge of a bar = start; the right edge = end.'"}, {"text": "For radar charts, changing the order of the axes does not affect the visual shape of the polygon, only its orientation.", "isCorrect": false, "rationale": "The text warns: 'the shape of the polygon changes depending on which axes are placed next to each other. Rearranging the order of the spokes can make the same data look very different.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
