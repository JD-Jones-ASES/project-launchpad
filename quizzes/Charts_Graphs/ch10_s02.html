    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Charts_Graphs.html">&larr; Back to Reading Charts, Graphs, and Diagrams</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary advantage of a box plot compared to a histogram, as described in the text?", "options": [{"text": "It shows the exact count of every individual data point.", "isCorrect": false, "rationale": "The text states that box plots do not show individual counts and that this is a limitation."}, {"text": "It provides a simpler, more compact summary of key data features like the middle, spread, and extreme values.", "isCorrect": true, "rationale": "The text explicitly states: 'But sometimes you want a simpler, more compact summary — one that quickly tells you where the middle is, how spread out the data is, and whether there are any extreme values. That is the job of a box plot.'"}, {"text": "It displays the detailed shape of the entire data distribution with high precision.", "isCorrect": false, "rationale": "The text notes that 'A histogram shows the shape of a distribution in detail,' implying box plots offer a simpler, less detailed view of the shape."}, {"text": "It always places the median exactly in the geometric center of the box.", "isCorrect": false, "rationale": "This is listed as a 'Common Misconception' in the teacher's note. The median is the median of the data, not necessarily the geometric center of the box."}]}, {"question": "In a box plot, which of the five-number summary values represents the point that separates the bottom 25% of the data from the top 75%?", "options": [{"text": "The Minimum", "isCorrect": false, "rationale": "The minimum is the smallest value, representing the 0th percentile, not separating 25% from 75%."}, {"text": "The First Quartile (Q1)", "isCorrect": true, "rationale": "The definition of Q1 states it is 'the value that separates the bottom 25% of the data from the top 75%.'"}, {"text": "The Median", "isCorrect": false, "rationale": "The median separates the data into two halves, 50% below and 50% above."}, {"text": "The Third Quartile (Q3)", "isCorrect": false, "rationale": "The Third Quartile (Q3) separates the top 25% from the bottom 75%."}]}, {"question": "According to the text, what specific portion of the data set is enclosed by the rectangular 'box' on a box plot?", "options": [{"text": "The entire range from the minimum to the maximum value.", "isCorrect": false, "rationale": "The entire range is represented by the whiskers extending to the minimum and maximum, encompassing the box."}, {"text": "The bottom 25% of the data values.", "isCorrect": false, "rationale": "The bottom 25% is represented from the minimum to Q1, with the first quarter of the box covering values from Q1 to the median (if median is exactly central)."}, {"text": "The middle 50% of the data, spanning from Q1 to Q3.", "isCorrect": true, "rationale": "The text explicitly states: 'The box: a rectangle from Q1 to Q3. The box covers the middle 50% of all data values.' The 'quicktip' also reinforces this."}, {"text": "The top 25% of the data values.", "isCorrect": false, "rationale": "The top 25% is represented from Q3 to the maximum, with the last quarter of the box covering values from the median to Q3."}]}, {"question": "A data set has a First Quartile (Q1) of 45 and a Third Quartile (Q3) of 75. What is the Interquartile Range (IQR), and what does it signify?", "options": [{"text": "IQR = 30; It means the total spread of all data points is 30.", "isCorrect": false, "rationale": "While the calculation (75-45=30) is correct, this is the IQR, not the total spread (range = max - min) of all data points."}, {"text": "IQR = 120; It indicates the average value of the data set.", "isCorrect": false, "rationale": "120 is Q1+Q3, not the IQR. The IQR is a measure of spread, not an average."}, {"text": "IQR = 30; It represents how spread out the middle 50% of the data is.", "isCorrect": true, "rationale": "The text defines IQR as 'Q3 - Q1' (75-45 = 30) and states, 'It tells you how spread out the middle 50% of the data is.'"}, {"text": "IQR = 45; It is the value below which 25% of the data falls.", "isCorrect": false, "rationale": "45 is the value of Q1, not the IQR. Q1 represents the value below which 25% of the data falls."}]}, {"question": "If the median line within a box plot's box is noticeably closer to the Q1 (left) edge than to the Q3 (right) edge, what does this indicate about the distribution of the middle 50% of the data?", "options": [{"text": "The upper half of the middle 50% of the data (between the median and Q3) is more spread out.", "isCorrect": true, "rationale": "The text states: 'If it is closer to Q1, the lower half of the middle 50% is more spread out. If it is closer to Q3, the upper half is more spread out.' Rephrasing the first part, if median is closer to Q1, the interval (Q1, median) is shorter, implying (median, Q3) is longer, making the upper half (median to Q3) more spread out."}, {"text": "The entire middle 50% of the data is perfectly symmetrical.", "isCorrect": false, "rationale": "A median line not in the center of the box indicates asymmetry in the middle 50%."}, {"text": "There are many more data points in the lower quarter of the middle 50%.", "isCorrect": false, "rationale": "The position of the median line indicates spread, not the count of data points within segments."}, {"text": "The median value is also the minimum value of the data set.", "isCorrect": false, "rationale": "The median is within the box (between Q1 and Q3), while the minimum is the leftmost point of the whisker."}]}, {"question": "A box plot shows a significantly longer whisker on the right side compared to the left. Based on the common misconceptions discussed, what does this primarily imply?", "options": [{"text": "There are many more data points in the upper 25% of the data.", "isCorrect": false, "rationale": "The text specifically lists this as a 'Common Misconception,' stating 'a long whisker just means the data extends to an extreme value — there may be very few points in that region.'"}, {"text": "The data values in the upper 25% extend to more extreme high values.", "isCorrect": true, "rationale": "The text explains: 'Long whiskers mean data extends to extreme values on that side.'"}, {"text": "The maximum value is very close to the Q3 value.", "isCorrect": false, "rationale": "A long whisker indicates the maximum value is far from Q3, not close."}, {"text": "The distribution of the data is perfectly symmetrical.", "isCorrect": false, "rationale": "Unequal whisker lengths suggest asymmetry in the distribution."}]}, {"question": "How are outlier values explicitly represented on a box plot, according to the provided text?", "options": [{"text": "By a distinct color change in the whisker extending to them.", "isCorrect": false, "rationale": "The text does not mention color changes for whiskers representing outliers."}, {"text": "By individual dots plotted beyond the whiskers.", "isCorrect": true, "rationale": "The text states under 'The Parts of a Box Plot': 'Outlier dots: individual dots plotted beyond the whiskers for extreme values...'"}, {"text": "By an unusually long whisker on one side of the box plot.", "isCorrect": false, "rationale": "While an outlier can contribute to a long whisker if not specifically identified as an outlier, the text distinguishes between whiskers (extending to min/max *excluding* outliers) and 'outlier dots' explicitly plotted beyond them."}, {"text": "They are not shown on a box plot, only in a histogram.", "isCorrect": false, "rationale": "The text explicitly describes how outliers are represented on a box plot."}]}, {"question": "A student is looking at a box plot and wants to determine the exact number of data points represented between Q1 and the median. Based on the 'Discussion Prompt' in the teacher's notes, why would they be unable to do this?", "options": [{"text": "Box plots only show the total number of data points, not counts within sections.", "isCorrect": false, "rationale": "The text explicitly states that 'you cannot!' guess how many total data points a box plot represents, making this statement incorrect."}, {"text": "Box plots do not display individual data counts, only summaries of spread and position.", "isCorrect": true, "rationale": "The 'Discussion Prompt' answer states: 'you cannot! Box plots do not show individual counts. This is a limitation discussed in Section 10.4.'"}, {"text": "The median is always exactly in the center of the box, making individual counts irrelevant.", "isCorrect": false, "rationale": "This is a misconception about the median's position, and even if it were true, it wouldn't allow for counting individual points."}, {"text": "This information is only available if there are outlier dots present on the plot.", "isCorrect": false, "rationale": "The presence or absence of outliers does not change the fundamental limitation of box plots regarding individual data counts."}]}, {"question": "You are analyzing two box plots. Box Plot A has a very narrow box, while Box Plot B has a very wide box. What does the difference in box width primarily communicate about the data sets?", "options": [{"text": "Box Plot A has more data points than Box Plot B.", "isCorrect": false, "rationale": "Box plots do not show the number of data points; box width indicates data spread."}, {"text": "The middle 50% of data in Box Plot A is tightly clustered, while in Box Plot B it is widely spread out.", "isCorrect": true, "rationale": "The 'How to Read a Box Plot' section states: 'A wide box means the middle 50% is spread out. A narrow box means it is tightly clustered.'"}, {"text": "Box Plot A has a larger Interquartile Range (IQR) than Box Plot B.", "isCorrect": false, "rationale": "A narrow box means a smaller IQR, while a wide box means a larger IQR."}, {"text": "The maximum value in Box Plot A is necessarily lower than in Box Plot B.", "isCorrect": false, "rationale": "Box width relates to the spread of the middle 50%, not necessarily the maximum value, which is shown by the end of the whisker."}]}, {"question": "In the 'Worked Example: Class Test Scores,' the median is 80, Q1 is 72, and Q3 is 88. The left whisker spans from 55 (minimum) to 72 (Q1), and the right whisker spans from 88 (Q3) to 98 (maximum). What can be concluded about the overall spread of scores?", "options": [{"text": "The scores above the median are generally more spread out than those below the median.", "isCorrect": false, "rationale": "The right whisker (88-98 = 10 points) is shorter than the left whisker (55-72 = 17 points), indicating less spread for the upper 25% of scores compared to the lower 25%."}, {"text": "The middle 50% of scores is highly skewed towards lower values.", "isCorrect": false, "rationale": "The example states the median (80) 'sits roughly in the center of the box,' suggesting the middle 50% is 'fairly symmetric around 80.'"}, {"text": "The lower 25% of scores (below Q1) are more widely distributed than the upper 25% (above Q3).", "isCorrect": true, "rationale": "The example's interpretation states: 'The left whisker is longer, meaning the lower scores are more spread out.'"}, {"text": "All test scores are tightly clustered around the median score of 80.", "isCorrect": false, "rationale": "The presence of an IQR of 16 points for the middle 50%, a wider overall range (55-98), and an outlier at 42 suggests the data is not tightly clustered."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
