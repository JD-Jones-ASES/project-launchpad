        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Norman Conquest significantly impacted England beyond a change in monarchy by:", "options": [{"text": "Primarily focusing on expanding England's maritime trade routes.", "isCorrect": false, "rationale": "The text does not mention maritime trade routes as a primary impact of the Norman Conquest and the feudal system."}, {"text": "Introducing a centralized legal code based on Roman precedents.", "isCorrect": false, "rationale": "The text explicitly contrasts the decentralized nature of feudalism with the centralized system of the Roman Empire, indicating the Normans did not introduce a Roman-style centralized legal code."}, {"text": "Establishing a thoroughly articulated feudal system that transformed social and economic life.", "isCorrect": true, "rationale": "The text states, 'He imported an entire social and economic system from the continent... they had imposed it on England with a thoroughness that transformed every aspect of life.'"}, {"text": "Promoting the immediate widespread emancipation of all peasants.", "isCorrect": false, "rationale": "The text describes the establishment of villeinage, which legally bound peasants to the land, rather than emancipating them."}], "id": "q01"}, {"question": "In the feudal pyramid, what was the primary obligation of a baron to the king?", "options": [{"text": "To provide direct governance for all peasants in the kingdom.", "isCorrect": false, "rationale": "Barons governed their own fiefs, but the king's ultimate landlord status was theoretical, and peasants were primarily bound to their immediate lord, not directly the king for governance."}, {"text": "To supply a specified number of armed knights for military service.", "isCorrect": true, "rationale": "The text states, 'each baron was obligated to supply a specified number of armed knights when the king called' in exchange for land."}, {"text": "To act as a direct administrator of justice in the king's name across all manors.", "isCorrect": false, "rationale": "Barons administered justice within their own fiefs, but their first loyalty was to their immediate lord, not always directly to the distant king, and not 'across all manors' in the kingdom."}, {"text": "To ensure all land within their fiefs was consistently left fallow.", "isCorrect": false, "rationale": "Fallow fields were part of the three-field system for soil fertility, but this was a manor-level agricultural practice, not a primary obligation of a baron to the king."}], "id": "q02"}, {"question": "Which statement accurately describes the status and obligations of a medieval villein?", "options": [{"text": "Villeins were free to leave their lord's land, marry anyone they chose, and paid no fees.", "isCorrect": false, "rationale": "The text explicitly states villeins 'could not leave their lord's land without permission, could not marry without the lord's consent, and owed labor service and fees to the lord.'"}, {"text": "Villeins were slaves who could be bought and sold independently of the land.", "isCorrect": false, "rationale": "The text clarifies that villeins 'were not slaves—they could not be bought and sold apart from the land—but they were not free either.'"}, {"text": "Villeins were legally bound to the lord's land, owed labor service and fees, and required permission for major life events.", "isCorrect": true, "rationale": "The definition of a villein states they were 'legally bound to the land of a lord's manor,' 'could not leave... without permission,' 'could not marry without the lord's consent,' and 'owed labor service and fees to the lord.'"}, {"text": "Villeins owned their strips of land outright and only paid a small tax to the king.", "isCorrect": false, "rationale": "Villeins worked strips of land but did not own them outright; they owed labor and dues to their local lord, not primarily a small tax directly to the king."}], "id": "q03"}, {"question": "According to the 'Then and Now' section, a key difference between the Roman Empire's provincial administration and the feudal system in medieval Europe was:", "options": [{"text": "Rome delegated power to local lords, while feudalism maintained a strong central government.", "isCorrect": false, "rationale": "This is the opposite of what the text states. Rome was centralized, and feudalism involved delegation and a less unified central government."}, {"text": "The Roman system prioritized mutual obligation between levels, whereas feudalism used direct imperial commands.", "isCorrect": false, "rationale": "This is also the opposite. Feudalism was characterized by 'mutual obligation,' while Rome used 'direct imperial commands' from a centralized emperor."}, {"text": "Feudalism relied on a chain of obligation where a baron's primary loyalty was to his immediate lord, unlike Rome's direct loyalty to the emperor.", "isCorrect": true, "rationale": "The text states, 'A baron's first loyalty was to his immediate lord, not to the king,' in contrast to Rome where 'power flowed from the emperor outward' and governors were 'directly answerable to Rome.'"}, {"text": "Both systems successfully achieved unified action across large territories due to their centralized structures.", "isCorrect": false, "rationale": "The text states that feudalism 'could not produce the kind of unified action Rome achieved,' highlighting decentralization as a weakness for unified action in feudalism."}], "id": "q04"}, {"question": "Which of the following best describes the medieval manor?", "options": [{"text": "A specialized military encampment used exclusively for training knights.", "isCorrect": false, "rationale": "While manors might have military ties through the lord, their primary description in the text is as the 'basic unit of medieval economic life,' not exclusively military."}, {"text": "The king's personal treasury and administrative headquarters for the entire kingdom.", "isCorrect": false, "rationale": "A manor was 'a lord's estate,' not necessarily the king's central treasury or administrative headquarters for the whole kingdom."}, {"text": "The basic unit of medieval economic life, encompassing a lord's estate, a village, farmland, and essential services like a mill.", "isCorrect": true, "rationale": "The text defines a manor as 'The basic unit of medieval economic life—a lord's estate' and lists its typical components: 'the lord's hall or castle, a village with peasant cottages, farmland..., a church, a mill, and perhaps a forge and a bakehouse.'"}, {"text": "A large trading post situated on a river, primarily focused on international commerce.", "isCorrect": false, "rationale": "The manor was primarily an agricultural and self-sufficient economic unit, not specifically described as a trading post focused on international commerce."}], "id": "q05"}, {"question": "The primary purpose of the three-field system in medieval agriculture was to:", "options": [{"text": "Maximize the immediate yield of grain crops by planting all fields every year.", "isCorrect": false, "rationale": "The system involved leaving one field fallow each year, meaning not all fields were planted, which would not maximize immediate yield but sustain long-term fertility."}, {"text": "Introduce new cash crops from distant lands to increase lordly revenues.", "isCorrect": false, "rationale": "The text describes staple crops (wheat, rye, beans, peas, barley) and focuses on soil fertility, not the introduction of new cash crops."}, {"text": "Allow soil to recover fertility through crop rotation and the use of fallow fields.", "isCorrect": true, "rationale": "The text states its purpose was to solve 'how do you keep soil fertile year after year? The answer was crop rotation,' with one field 'left fallow (unplanted, to rest and recover fertility).'"}, {"text": "Consolidate all farmland into a single, large, centrally managed estate for efficiency.", "isCorrect": false, "rationale": "The system divided farmland into three large fields for rotation, not necessarily for central management in a consolidated estate sense, and its primary goal was fertility, not just efficiency through consolidation."}], "id": "q06"}, {"question": "Beyond working their own strips of land, what significant obligations did a medieval villein owe to their lord?", "options": [{"text": "Weekly attendance at mandatory military training and providing financial loans to the lord.", "isCorrect": false, "rationale": "Military service was an obligation for knights and barons, not villeins, and financial loans are not mentioned as a regular obligation."}, {"text": "Two or three days of labor per week on the lord's demesne fields, plus fees for using the lord's mill and bakehouse.", "isCorrect": true, "rationale": "The text states a 'villein owed his lord typically two or three days per week of labor on the lord's own fields—the demesne' and 'owed fees for using the lord's mill and bakehouse, a payment when his daughter married, and a payment when he died'."}, {"text": "A monthly payment of gold coins and the construction of new castles for the lord.", "isCorrect": false, "rationale": "Payments were typically in kind, labor, or specific fees, not monthly gold, and castle construction, while using forced labor, was not a regular, direct obligation described for villeins."}, {"text": "Providing educational services for the lord's children and managing the manor's accounting records.", "isCorrect": false, "rationale": "The text does not mention educational or accounting duties as obligations for villeins."}], "id": "q07"}, {"question": "How did the transition from motte-and-bailey castles to stone keeps reflect the evolving needs of Norman rule in England?", "options": [{"text": "Motte-and-bailey castles were for defense against internal rebellions, while stone keeps were for defense against foreign invaders.", "isCorrect": false, "rationale": "Both types of castles served as instruments of conquest and defense against local resistance, not necessarily differentiating between internal and foreign threats in this way."}, {"text": "Stone keeps were faster to build and less expensive, making them ideal for initial conquest compared to motte-and-bailey.", "isCorrect": false, "rationale": "The text states motte-and-bailey castles were 'fast to build' while 'Stone keeps were expensive and slow to build,' indicating the opposite."}, {"text": "Motte-and-bailey castles served as temporary fortifications during initial conquest, while stone keeps provided long-term, nearly impregnable symbols of permanent control.", "isCorrect": true, "rationale": "The text describes motte-and-bailey castles as 'fast to build' and 'primary instruments of Norman conquest,' while stone keeps 'became the standard form' and were 'nearly impregnable,' symbolizing more permanent and robust control."}, {"text": "The shift reflected a move away from military control towards purely administrative centers.", "isCorrect": false, "rationale": "Castles, regardless of type, remained symbols and instruments of power, control, and defense, not a move 'away from military control'."}], "id": "q08"}, {"question": "The Domesday Book is described as a 'window into medieval England' primarily because it:", "options": [{"text": "Detailed the construction plans for all major Norman castles built across England.", "isCorrect": false, "rationale": "While castles were important, the Domesday Book's primary focus was on landholding, resources, and value, not architectural plans."}, {"text": "Provided a comprehensive record of land ownership, population, and economic value before and after the Norman Conquest.", "isCorrect": true, "rationale": "The text states the Domesday survey 'recorded, for virtually every estate in England: Who held the land in 1066... Who holds it now (1086)? How many villagers... How many ploughs? What was it worth in 1066? What is it worth now?'"}, {"text": "Served as a guide for trade routes and markets, stimulating economic growth after the Conquest.", "isCorrect": false, "rationale": "The text does not describe the Domesday Book as a guide for trade routes or markets."}, {"text": "Documented the genealogies of all Norman noble families to establish their lineage.", "isCorrect": false, "rationale": "While it recorded new Norman landholders, its primary purpose was a comprehensive survey of land and resources, not a genealogical record of all noble families."}], "id": "q09"}, {"question": "The existence of the Angevin Empire, where Henry II controlled more French territory than the King of France, best illustrates which characteristic of the feudal system?", "options": [{"text": "The inherent power of a centralized monarch to directly command all vassals across diverse territories.", "isCorrect": false, "rationale": "The text highlights feudalism's decentralized nature and the limitation of a king's direct command over a baron's vassal."}, {"text": "The fragmented and decentralized nature of political power, allowing powerful vassals to accumulate vast personal holdings across different kingdoms.", "isCorrect": true, "rationale": "Henry II's accumulation of territories 'through inheritance and conquest' meant he, as a powerful lord/vassal (to the French king for some lands), could hold vast lands, illustrating how feudal power was fragmented and decentralized, enabling powerful lords to amass significant holdings independent of a single centralized monarchy."}, {"text": "The complete irrelevance of royal authority when a baron or duke became powerful enough.", "isCorrect": false, "rationale": "While power was decentralized, royal authority was not irrelevant; it formed the apex of the theoretical pyramid, even if practical loyalties were often to immediate lords."}, {"text": "The direct influence of the Roman Empire's administrative system on medieval European governance.", "isCorrect": false, "rationale": "The 'Then and Now' section contrasts feudalism with the Roman system, indicating differences rather than direct influence."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
