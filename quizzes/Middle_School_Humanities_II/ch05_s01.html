</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which of the following accurately identifies the three primary catastrophes that constituted the 'Late Medieval Crisis' in rapid succession?", "options": [{"text": "The Great Schism, the Crusades, and the Mongol Invasions", "isCorrect": false, "rationale": "The Great Schism, Crusades, and Mongol Invasions were significant historical events but are not identified in the text as the three overlapping shocks of the Late Medieval Crisis between 1315-1453. The text specifies the Great Famine, Black Death, and Hundred Years' War."}, {"text": "The Great Famine, the Black Death, and the Hundred Years' War", "isCorrect": true, "rationale": "The text explicitly defines the 'Late Medieval Crisis' as a cluster of disasters including The Great Famine (1315–1322), The Black Death (1347–1353), and The Hundred Years' War (1337–1453), stating they 'arrived in rapid succession'."}, {"text": "The Peasant Revolts, the Fall of Constantinople, and the Reconquista", "isCorrect": false, "rationale": "While peasant revolts occurred during this period, and the Fall of Constantinople and Reconquista were important, they are not listed as the three core 'overlapping shocks' of the Late Medieval Crisis according to the provided text."}, {"text": "The Avignon Papacy, the rise of powerful city-states, and widespread Viking raids", "isCorrect": false, "rationale": "The Avignon Papacy was concurrent but not listed as one of the three 'overlapping shocks.' The rise of city-states was a longer trend, and widespread Viking raids had largely ended centuries before the Late Medieval Crisis began in the 14th century."}]}, {"question": "The Black Death had profound demographic and social consequences. Which statement best analyzes how the plague directly impacted the feudal system and the status of serfs in Western Europe?", "options": [{"text": "The plague strengthened the feudal system by eliminating rebellious peasants, leading to stricter enforcement of labor services.", "isCorrect": false, "rationale": "The text states the opposite: 'Landlords resisted—they passed laws fixing wages at pre-plague levels—but they could not ultimately stop the change.' The severe labor shortage empowered survivors, weakening the old system."}, {"text": "The massive reduction in population led to a surplus of available land, allowing lords to consolidate power and further bind serfs to their manors.", "isCorrect": false, "rationale": "While there was a surplus of land, the critical factor was the *shortage of labor*. This labor shortage, not land surplus, gave peasants leverage to demand better conditions and freedom, weakening the lords' power over them."}, {"text": "The drastic decline in the workforce gave surviving peasants economic leverage, enabling them to demand higher wages and ultimately leading to the collapse of serfdom in Western Europe.", "isCorrect": true, "rationale": "The text explicitly states: 'When a third of the workforce is dead, the survivors suddenly have economic power they never had before.' It further explains that 'serfdom effectively ended within a generation of the plague' due to labor shortages, allowing peasants to negotiate for freedom or better terms."}, {"text": "The Church's weakened authority post-plague led to a resurgence of local feudal lords, who then reinforced serfdom as a means of controlling fragmented populations.", "isCorrect": false, "rationale": "The text notes the Church's authority was shaken, but it does not describe a resurgence of feudal lords reinforcing serfdom. Instead, the economic power shift towards peasants led to the decline of serfdom."}]}, {"question": "Medieval physicians attempted various treatments for the Black Death, such as bleeding and herbal remedies. What does their approach reveal about their understanding of the disease, as described in the text?", "options": [{"text": "They had a rudimentary understanding of germ theory, focusing on sanitation and isolating infected individuals to prevent spread.", "isCorrect": false, "rationale": "The text explicitly states: 'Medieval medicine had no understanding of bacteria or viruses.' Their treatments were not based on germ theory or effective sanitation practices."}, {"text": "They correctly identified the connection between rats, fleas, and the transmission of the plague, but lacked the medicines to cure it.", "isCorrect": false, "rationale": "The text mentions that 'some communities, not understanding the connection between rats and disease, kept cats away to prevent “witchcraft,” which may have worsened the epidemic.' This indicates a clear lack of understanding of the true transmission vectors."}, {"text": "Their reliance on theories like 'poisoned air' (miasma) or divine judgment demonstrates a lack of scientific understanding regarding infectious diseases.", "isCorrect": true, "rationale": "The text states physicians debated whether the plague was caused by 'poisoned air (miasma), by a bad alignment of the planets, or by God's judgment on a sinful world.' These explanations show a lack of scientific understanding of the biological causes of the disease, rendering their treatments 'useless'."}, {"text": "They understood the airborne nature of pneumonic plague and developed effective quarantines based on this knowledge.", "isCorrect": false, "rationale": "While pneumonic plague was airborne, the text notes 'medieval medicine had no understanding of bacteria or viruses' and their treatments were 'useless.' Effective quarantines based on a scientific understanding of airborne transmission are not mentioned as a medieval medical achievement for the plague."}]}, {"question": "Which of the following describes the rarest and most deadly form of the Black Death, according to the text?", "options": [{"text": "Bubonic plague, characterized by swollen lymph nodes and a 60-70% fatality rate.", "isCorrect": false, "rationale": "Bubonic plague was the most common form, not the rarest. While deadly, its fatality rate was 60-70%, making it less deadly than the rarest form."}, {"text": "Pneumonic plague, an airborne form that attacked the lungs and was almost always fatal.", "isCorrect": false, "rationale": "Pneumonic plague was airborne and 'almost always fatal,' but the text identifies septicemic plague as the 'rarest and most deadly' overall."}, {"text": "Septicemic plague, where the blood itself became infected, leading to death within hours.", "isCorrect": true, "rationale": "The text describes Septicemic plague as 'The rarest and most deadly form, in which the blood itself became infected. Death occurred within hours.'"}, {"text": "Caspian plague, a localized strain that remained confined to Central Asia.", "isCorrect": false, "rationale": "The text mentions the plague originated in the grasslands around the Caspian Sea but does not identify a specific 'Caspian plague' as one of the three forms of the disease that spread to Europe."}]}, {"question": "The text mentions that 'in their terror, some communities turned on the Jewish populations' during the Black Death. What historical lesson does the 'caution' note draw from this event?", "options": [{"text": "It demonstrates how religious differences can prevent effective cooperation during a crisis.", "isCorrect": false, "rationale": "While religious differences existed, the 'caution' note specifically highlights 'scapegoating—blaming a vulnerable group for a disaster they did not cause' as the lesson, not merely a lack of cooperation."}, {"text": "It shows that isolated communities were more susceptible to both the plague and social unrest.", "isCorrect": false, "rationale": "The 'caution' note points out that 'Jews in isolated communities were dying of the plague just as Christians were,' disproving the accusation against them, but this is not the central lesson about fear and ignorance."}, {"text": "It serves as a warning about how fear and ignorance can lead people to blame vulnerable groups for disasters they did not cause.", "isCorrect": true, "rationale": "The 'caution' note explicitly states: 'This kind of scapegoating—blaming a vulnerable group for a disaster they did not cause—has appeared throughout history. It is a warning about what fear and ignorance can lead people to do.'"}, {"text": "It illustrates the historical origins of anti-Semitic policies enacted by medieval monarchs.", "isCorrect": false, "rationale": "The event is an example of anti-Semitism, but the primary lesson drawn by the 'caution' note is about the broader phenomenon of scapegoating driven by fear and ignorance, not specifically the origins of governmental policies."}]}, {"question": "The Hundred Years' War saw significant English victories at battles like Crècy and Agincourt. What was a primary reason for these English successes, according to the text, and what did it signal about medieval warfare?", "options": [{"text": "Superior English naval power, indicating a shift towards sea-based dominance in warfare.", "isCorrect": false, "rationale": "The text focuses on land battles and the use of the longbow, not naval power, as the key factor in English victories."}, {"text": "The use of gunpowder artillery by the English, which rendered traditional fortifications obsolete.", "isCorrect": false, "rationale": "While gunpowder was emerging, the text specifically credits the English longbow, not artillery, as the decisive weapon in these battles."}, {"text": "The tactical advantage of the English longbow against French heavy cavalry, signaling the decline of the armored knight as the decisive unit.", "isCorrect": true, "rationale": "The text highlights the longbow's effectiveness: 'English and Welsh archers could fire ten to twelve arrows per minute. The French cavalry was cut to pieces before it reached the English lines. The age of the armored knight as the decisive unit of battle was ending.'"}, {"text": "A greater reliance on mercenary armies by the English, demonstrating a move away from feudal levies.", "isCorrect": false, "rationale": "The text does not mention the composition of the armies (mercenaries vs. feudal levies) as the primary reason for English victories. It emphasizes weapon technology and tactics."}]}, {"question": "What was the main cause of the Hundred Years' War, as stated in the text?", "options": [{"text": "A religious dispute between the English and French monarchies over papal authority.", "isCorrect": false, "rationale": "The text clearly states the war began as 'a dispute over the French throne,' not a religious conflict over papal authority."}, {"text": "Economic competition and control over lucrative trade routes in the English Channel.", "isCorrect": false, "rationale": "While economic factors might have played a role, the text explicitly identifies the primary cause as the English king's claim to the French throne."}, {"text": "England's King Edward III claiming the right to rule France through his mother, a French princess.", "isCorrect": true, "rationale": "The text states: 'It began as a dispute over the French throne: England's King Edward III claimed the right to rule France through his mother, a French princess.'"}, {"text": "French aggression and attempts to expand their territory into English-controlled Aquitaine.", "isCorrect": false, "rationale": "The text frames the war's origin around the English claim to the French throne, not French expansion into English territories as the initial cause."}]}, {"question": "The text describes the human cost of the Black Death as staggering, with Europe's population falling from roughly 75 million to 45-50 million by 1400. Which group was particularly vulnerable due to their duties and living conditions, and why?", "options": [{"text": "Nobility, because their large estates meant they often traveled, increasing exposure.", "isCorrect": false, "rationale": "While nobility died, the text notes the wealthy died 'in their manor houses.' The text does not attribute their deaths primarily to travel but rather indicates no social class was immune."}, {"text": "Merchants, because their extensive travel along trade routes exposed them to the disease in every port.", "isCorrect": false, "rationale": "While merchants played a role in spreading the disease, the question asks about a group 'particularly vulnerable due to their duties and living conditions' in terms of mortality rate, and the text highlights another group for this."}, {"text": "Clergy, because they remained with the sick and lived in close quarters in convents and monasteries.", "isCorrect": true, "rationale": "The text specifically states: 'The clergy died in large numbers because they remained with the sick—and because convents and monasteries, where people lived in close quarters, were especially vulnerable.'"}, {"text": "Soldiers, due to their constant engagement in the Hundred Years' War, which created ideal conditions for plague transmission.", "isCorrect": false, "rationale": "While soldiers faced dangers, the text does not single them out as particularly vulnerable to the plague more so than the clergy or peasants due to their living conditions or duties specific to plague exposure."}]}, {"question": "Giovanni Boccaccio's Decameron and Geoffrey Chaucer's Canterbury Tales are mentioned as reflecting specific societal responses to the Black Death. What aspect of this response do these works illustrate?", "options": [{"text": "The widespread belief in medical cures and the advancements in public health measures.", "isCorrect": false, "rationale": "The text indicates medieval medicine was ineffective and mentions 'gallows humor and social critique,' not advancements in public health or belief in cures."}, {"text": "The resurgence of fervent religious devotion and the rise of flagellant movements.", "isCorrect": false, "rationale": "While flagellant movements occurred, the text says some turned to 'extreme piety' *or* 'cynicism, spending their remaining days in pleasure.' The Decameron and Canterbury Tales are explicitly linked to 'gallows humor and social critique,' reflecting the latter."}, {"text": "The gallows humor, cynicism, and social critique of a civilization overwhelmed by death.", "isCorrect": true, "rationale": "The text states, 'Both Boccaccio's Decameron and Chaucer's Canterbury Tales reflect the gallows humor and social critique of a civilization that has seen too much death,' indicating a cynical, pleasure-seeking response alongside social commentary."}, {"text": "The renewed confidence in the Church as a mediator between God and humanity.", "isCorrect": false, "rationale": "The text says the plague 'shook people's faith—not necessarily in God, but in the Church as the mediator between God and humanity,' directly contradicting this option."}]}, {"question": "Joan of Arc played a crucial role in transforming the Hundred Years' War for France. What was her specific, immediate impact on the conflict?", "options": [{"text": "She negotiated a peace treaty with England, leading to the end of hostilities.", "isCorrect": false, "rationale": "The text describes Joan of Arc as a military and inspirational leader who 'lifted the siege of Orléans' and led Charles VII to his coronation, not a diplomat who negotiated peace."}, {"text": "She developed new military technologies that gave French armies an advantage over the English longbowmen.", "isCorrect": false, "rationale": "The text attributes her impact to her leadership, visions, and role in specific military victories, not to the invention or development of new military technologies."}, {"text": "She led French troops to lift the siege of Orléans and facilitated the coronation of Charles VII, boosting French morale and leadership.", "isCorrect": true, "rationale": "The text states she 'was given command of French troops, lifted the siege of Orléans (1429), and led Charles VII to his coronation at Reims.' These actions directly transformed the war's trajectory for France."}, {"text": "She united the French nobility against the monarchy, leading to internal reforms that strengthened France's war effort.", "isCorrect": false, "rationale": "The text does not mention Joan of Arc uniting nobility against the monarchy or leading internal reforms; her role was as an inspirational and military figure supporting the dauphin (Charles VII)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
