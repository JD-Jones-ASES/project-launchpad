<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the state of the Catholic Church on the eve of the Reformation, according to the text?", "options": [{"text": "It was primarily a spiritual institution focused solely on religious doctrine.", "isCorrect": false, "rationale": "The text states that 'the Catholic Church was not merely a religious institution—it was the most powerful organization in Europe,' indicating a significant involvement in secular affairs beyond just spiritual doctrine."}, {"text": "It held immense power and influence across Europe, extending into political, economic, and social spheres, but suffered from widespread corruption.", "isCorrect": true, "rationale": "The text explicitly mentions the Church owning land, running institutions, collecting taxes, appointing bishops, crowning kings, and the Pope humbling emperors, alongside descriptions of simony, illiterate priests, and wealthy monasteries, all pointing to both vast power and significant corruption."}, {"text": "It was a declining power, struggling to maintain authority against rising secular monarchs.", "isCorrect": false, "rationale": "The text contradicts this by highlighting the Church's peak power, stating that the Pope 'wielded an authority that could humble emperors,' suggesting strength rather than decline."}, {"text": "It had already undergone significant internal reforms to address issues like simony and clerical illiteracy.", "isCorrect": false, "rationale": "The text describes these issues as prevalent problems on the eve of the Reformation, indicating that reforms had not yet successfully addressed them, but rather that 'thoughtful Christians had been complaining about Church corruption for more than a century.'"}]}, {"question": "The movements of John Wycliffe and Jan Hus, though raising similar criticisms to Luther's, ultimately failed to spark widespread reform primarily due to which crucial factor that was present in 1517?", "options": [{"text": "They lacked support from powerful secular rulers, unlike Luther.", "isCorrect": false, "rationale": "While true that Luther eventually gained protection, the text specifically emphasizes a different technological factor as the key difference. The primary factor highlighted in the 'teachernote' and 'keyconcept' boxes is not political support but a new technology."}, {"text": "Their theological arguments were less compelling or systematic than Luther's.", "isCorrect": false, "rationale": "The text does not evaluate the comparative theological depth of Wycliffe/Hus versus Luther, but rather focuses on the mechanism of idea dissemination. It states they 'raised similar questions' but their movements were 'suppressed'."}, {"text": "The absence of the printing press limited the rapid dissemination of their ideas.", "isCorrect": true, "rationale": "The 'teachernote' and 'keyconcept' boxes explicitly state that Wycliffe and Hus's movements failed 'partly because they lacked the printing press,' and that the printing press made it 'impossible to silence Luther the way Hus had been silenced' by enabling rapid distribution of his theses."}, {"text": "Their criticisms focused solely on clerical abuses, not on fundamental theological doctrines.", "isCorrect": false, "rationale": "The text mentions Wycliffe arguing 'that Scripture, not the Pope, was the final authority in matters of faith,' which is a fundamental theological challenge, not just a criticism of abuse."}]}, {"question": "According to Catholic teaching described in the text, what was the primary purpose of an indulgence certificate?", "options": [{"text": "To guarantee immediate salvation for the purchaser, bypassing purgatory entirely.", "isCorrect": false, "rationale": "The definition states it 'claimed to reduce the amount of time a soul would spend in purgatory,' not to bypass it entirely or guarantee immediate salvation."}, {"text": "To absolve the purchaser of future sins not yet committed.", "isCorrect": false, "rationale": "The definition clarifies that indulgences reduced punishment for 'sins already forgiven,' not for future sins."}, {"text": "To reduce the amount of time a soul would spend in purgatory for sins already forgiven.", "isCorrect": true, "rationale": "The definition of indulgence 7.2 explicitly states it was 'a certificate issued by the Catholic Church that claimed to reduce the punishment in purgatory for sins already forgiven.'"}, {"text": "To fund missionary work in newly discovered lands.", "isCorrect": false, "rationale": "While indulgences were sold for money, the text specifies the proceeds from the 1517 campaign were for the Archbishop of Mainz's debt and the building of St. Peter's Basilica, not for missionary work."}]}, {"question": "What pivotal personal experience led Martin Luther to abandon his legal studies and commit to monastic life?", "options": [{"text": "A profound theological debate with a university professor that convinced him of a monk's calling.", "isCorrect": false, "rationale": "The text describes a specific, dramatic event, not a debate, as the catalyst for his decision."}, {"text": "A visit to Rome where he witnessed the Pope's lavish lifestyle and clerical corruption.", "isCorrect": false, "rationale": "While Luther did eventually react to Church corruption, the text states his vow to become a monk was made after a thunderstorm incident, prior to his later theological struggles and public condemnations of Church practices."}, {"text": "Surviving a violent thunderstorm during which he vowed to St. Anne to become a monk.", "isCorrect": true, "rationale": "The text clearly states, 'in the summer of 1505, was caught in a violent thunderstorm. A lightning bolt struck near him. Terrified, he cried out to St. Anne and vowed that if he survived, he would become a monk. He survived. He kept his vow.'"}, {"text": "His father's persistent encouragement to enter the clergy despite Luther's initial reluctance.", "isCorrect": false, "rationale": "The text states, 'His father was furious' about Luther's decision to become a monk, indicating his father did not encourage it."}]}, {"question": "Luther's theological breakthrough of 'sola fide' (by faith alone) fundamentally challenged the traditional Catholic understanding of salvation by asserting what?", "options": [{"text": "That salvation is earned primarily through charitable acts and good works, without the need for church rituals.", "isCorrect": false, "rationale": "Luther's doctrine *sola fide* explicitly rejected the idea that salvation is earned by human effort or good works, which he felt left him in despair."}, {"text": "That salvation is a free gift from God, received solely through faith, independent of human effort, penance, or indulgences.", "isCorrect": true, "rationale": "The text states Luther 'came to believe that salvation was not earned by human effort at all—it was a free gift from God, received through faith alone.' The definition of *sola fide* reiterates this: 'salvation is received through faith in Christ, not earned by human works or purchased through indulgences.'"}, {"text": "That salvation is predestined by God before birth, regardless of an individual's faith or works.", "isCorrect": false, "rationale": "While predestination is a concept of the Reformation, it is specifically associated with John Calvin, not Martin Luther's *sola fide* doctrine directly as his foundational breakthrough."}, {"text": "That salvation can be achieved through a combination of personal faith and adherence to papal decrees.", "isCorrect": false, "rationale": "Luther's doctrine positioned faith alone as the means of salvation, and his later actions, such as burning the papal bull, showed his rejection of papal decrees as ultimate authority in matters of faith."}]}, {"question": "What was Martin Luther's initial intention when he posted his Ninety-Five Theses in 1517?", "options": [{"text": "To declare a formal break from the Catholic Church and establish a new denomination.", "isCorrect": false, "rationale": "The text clearly states, 'He did not intend to break up the Church.' His actions at this stage were aimed at internal reform."}, {"text": "To start an academic debate among theologians about the practice and theology of indulgences.", "isCorrect": true, "rationale": "The text explicitly says, 'He intended to start an academic debate' about the theological basis of indulgences."}, {"text": "To personally profit from the controversy by gaining followers and notoriety.", "isCorrect": false, "rationale": "The text provides no indication of Luther having such intentions; his motivation is portrayed as theological anguish and fury over the crude commercialism of indulgences."}, {"text": "To persuade the Pope to immediately halt the sale of all indulgences worldwide.", "isCorrect": false, "rationale": "While he opposed the sale, his method of posting theses in Latin for academic debate suggests an initial aim for theological discussion and reform, not an immediate, global papal decree."}]}, {"question": "At the Diet of Worms, Luther's statement, 'My conscience is captive to the Word of God. I cannot and will not retract anything, since to act against conscience is neither safe nor right before God. Here I stand,' primarily asserted which of the following principles?", "options": [{"text": "The supremacy of papal authority over individual conscience.", "isCorrect": false, "rationale": "Luther explicitly states he does 'not trust either in the Pope or in councils alone' and that his conscience is 'captive to the Word of God,' directly opposing papal supremacy."}, {"text": "The right of secular rulers to dictate religious doctrine.", "isCorrect": false, "rationale": "While he was before the Emperor, Luther's appeal was to Scripture and conscience, not to secular authority's right to define faith."}, {"text": "The final authority of Scripture and individual conscience informed by it, over the authority of the Pope or Church councils.", "isCorrect": true, "rationale": "Luther's quote directly states, 'Unless I am convinced by the testimony of Scripture or by clear reason—for I do not trust either in the Pope or in councils alone... I am bound by the Scriptures I have quoted. My conscience is captive to the Word of God.' This champions Scripture and conscience over ecclesiastical authority."}, {"text": "The necessity of appealing to physical force to defend one's religious beliefs.", "isCorrect": false, "rationale": "Luther's statement is about his theological conviction and refusal to recant based on conscience and Scripture, not an advocacy for physical force."}]}, {"question": "The Reformation doctrine of 'sola scriptura' (by Scripture alone) had a revolutionary implication regarding access to religious texts. What was it?", "options": [{"text": "It asserted that only trained clergy should read and interpret the Bible to avoid misinterpretations.", "isCorrect": false, "rationale": "The text states the opposite: 'if Scripture is the highest authority, every Christian who can read should be able to read it,' driving demand for vernacular translations."}, {"text": "It promoted the idea that the Pope's interpretations of Scripture were the sole infallible guide.", "isCorrect": false, "rationale": "Sola scriptura directly challenged the authority of the Pope and church councils, placing the Bible above them."}, {"text": "It led to a demand for the Bible to be translated into vernacular languages so all literate Christians could read it.", "isCorrect": true, "rationale": "The definition of *sola scriptura* explicitly states, 'This doctrine had a revolutionary implication: if Scripture is the highest authority, every Christian who can read should be able to read it. This drove the demand for Bible translation into the vernacular languages.' Luther's own translation of the New Testament into German is an example."}, {"text": "It mandated that all church services be conducted exclusively in Latin to preserve scriptural accuracy.", "isCorrect": false, "rationale": "The push for vernacular Bibles aimed to make Scripture accessible in common languages, implicitly favoring the use of vernacular over Latin for understanding."}]}, {"question": "How did the doctrine of 'sola gratia' (by grace alone) directly challenge the medieval penitential system, including the sale of indulgences?", "options": [{"text": "It argued that salvation could only be attained through strict adherence to canon law and monastic vows.", "isCorrect": false, "rationale": "Sola gratia emphasizes God's free gift, not adherence to laws or vows as the means of salvation."}, {"text": "It posited that human works, penance, or purchased indulgences could contribute significantly to earning God's favor for salvation.", "isCorrect": false, "rationale": "The text explicitly states *sola gratia* means salvation is 'not the result of human merit, penance, pilgrimage, or any other human effort,' directly contradicting the idea that these contribute to earning favor."}, {"text": "It maintained that salvation is entirely God's free and undeserved gift, rendering human efforts like penance, pilgrimages, or purchasing indulgences irrelevant for earning salvation.", "isCorrect": true, "rationale": "The definition of *sola gratia* states it is 'entirely God's free and undeserved gift—not the result of human merit, penance, pilgrimage, or any other human effort.' It concludes that Luther 'believed that the entire medieval penitential system, including indulgences, was built on the false assumption that human works could contribute to salvation.'"}, {"text": "It suggested that God's grace was selectively given only to those who demonstrated exceptional piety through lifelong service to the Church.", "isCorrect": false, "rationale": "Sola gratia emphasizes God's grace as a free, undeserved gift, not based on human merit or exceptional piety."}]}, {"question": "Which of the following theological concepts is most closely associated with John Calvin, as mentioned in the text?", "options": [{"text": "The rejection of all sacraments as non-biblical traditions.", "isCorrect": false, "rationale": "While Calvin did reform sacramental theology, the text doesn't highlight the rejection of *all* sacraments as his most distinct concept. The passage focuses on 'predestination' as a key aspect of Calvinism."}, {"text": "The establishment of the Pope's absolute authority as head of the Church.", "isCorrect": false, "rationale": "Calvin, as a Protestant reformer, completely rejected papal authority. This concept is contrary to his beliefs."}, {"text": "The doctrine of predestination, emphasizing God's sovereign choice in salvation before creation.", "isCorrect": true, "rationale": "The text explicitly states that Calvin's system of theology, 'called Calvinism, emphasized the absolute sovereignty of God, the total depravity of human nature, and the doctrine of predestination—the idea that God, before the creation of the world, had already chosen who would be saved.'"}, {"text": "The belief that salvation is a universal offer to all humanity, contingent only on individual free will.", "isCorrect": false, "rationale": "Predestination implies a specific, prior choice by God, rather than a universal offer contingent on human free will alone."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
