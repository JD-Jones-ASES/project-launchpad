<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the defining characteristic of the High Middle Ages as described in the text?", "options": [{"text": "A period of societal collapse due to widespread famine and disease.", "isCorrect": false, "rationale": "While the High Middle Ages did end with a catastrophe (the Black Death), the period itself was characterized by 'building upward in every sense' rather than collapse."}, {"text": "An era focused solely on military expansion and conquest.", "isCorrect": false, "rationale": "The text highlights intellectual, architectural, and spiritual achievements, not primarily military expansion."}, {"text": "A civilization marked by upward building in architecture, intellect, trade, and philosophy, pointing towards divine truth.", "isCorrect": true, "rationale": "The text explicitly states it was 'a civilization building upward in every sense' – including cathedrals, universities, trade, and philosophical systems that integrated faith and reason."}, {"text": "A time when pagan philosophies completely replaced Christian theology.", "isCorrect": false, "rationale": "Thomas Aquinas integrated classical philosophy with Christian theology, demonstrating how they could serve each other, rather than replacing theology."}], "id": "q01"}, {"question": "An architect in the High Middle Ages wants to design a cathedral with incredibly tall walls and vast stained-glass windows. Which architectural innovation would be most crucial for achieving this design, according to the text?", "options": [{"text": "The Romanesque rounded arch.", "isCorrect": false, "rationale": "The Romanesque system, with its heavy arches and vaults, required thick walls and did not allow for the extreme heights and large windows characteristic of Gothic cathedrals."}, {"text": "The flying buttress.", "isCorrect": true, "rationale": "Flying buttresses are described as the innovation that transferred the outward thrust of heavy vaults to outer piers, 'freeing the wall between them from bearing weight' and allowing for thinner walls, large windows, and greater height."}, {"text": "The barrel vault.", "isCorrect": false, "rationale": "Barrel vaults are heavy structures that require substantial wall support and do not facilitate the thin walls and large windows typical of Gothic architecture."}, {"text": "The classical Greek column.", "isCorrect": false, "rationale": "While columns were used in various architectural styles, they are not the specific High Medieval innovation that enabled the unique features of Gothic cathedrals like soaring heights and vast windows."}], "id": "q02"}, {"question": "The text describes Chartres Cathedral's stained-glass windows transforming the interior into 'something like a vision of the New Jerusalem.' This detail primarily illustrates which key aspect of High Medieval cathedrals?", "options": [{"text": "Their function as centers for secular political gatherings.", "isCorrect": false, "rationale": "While cathedrals were important civic buildings, their primary purpose as described was theological and spiritual, not secular political gatherings."}, {"text": "Their role as practical schools for teaching basic literacy.", "isCorrect": false, "rationale": "The images taught Scripture to those who couldn't read, but the overall experience of light was designed to mediate spiritual realities, not merely teach literacy."}, {"text": "Their theological purpose of mediating spiritual realities through physical space and light.", "isCorrect": true, "rationale": "The text explains that light was a symbol of God and that people were meant to 'feel—physically, in your body—what it was like to be in the presence of divine light,' reflecting a 'sacramental worldview'."}, {"text": "Their primary economic importance as trading hubs.", "isCorrect": false, "rationale": "Cathedrals required enormous resources, but their purpose was worship and devotion, not to serve as trading hubs."}], "id": "q03"}, {"question": "Which combination of architectural features is most characteristic of Gothic architecture, as defined in the text?", "options": [{"text": "Thick walls, small windows, and barrel vaults.", "isCorrect": false, "rationale": "These features are characteristic of the older Romanesque style, which Gothic architecture evolved from and surpassed."}, {"text": "Pointed arches, ribbed vaults, and flying buttresses.", "isCorrect": true, "rationale": "The definition of Gothic architecture explicitly lists these three features as its primary characteristics, enabling extraordinary height and large windows."}, {"text": "Flat roofs, Doric columns, and open courtyards.", "isCorrect": false, "rationale": "These features belong to classical Greek architecture, not the Gothic style of the High Middle Ages."}, {"text": "Dome structures, mosaics, and minarets.", "isCorrect": false, "rationale": "These features are characteristic of Byzantine or Islamic architecture, not Gothic cathedrals."}], "id": "q04"}, {"question": "A student enrolling in a medieval university would first study the 'trivium.' What subjects did the trivium encompass, laying the foundation for further learning?", "options": [{"text": "Arithmetic, geometry, and astronomy.", "isCorrect": false, "rationale": "These subjects are part of the 'quadrivium,' the second stage of medieval university education, not the foundational trivium."}, {"text": "Grammar, rhetoric, and logic.", "isCorrect": true, "rationale": "The text defines the 'trivium' as the 'three foundational arts of language' covering grammar, rhetoric, and logic."}, {"text": "Theology, philosophy, and law.", "isCorrect": false, "rationale": "These were advanced fields of study, often pursued after completing both the trivium and quadrivium, not the initial trivium itself."}, {"text": "Medicine, engineering, and architecture.", "isCorrect": false, "rationale": "These were practical professions, not the core liberal arts curriculum of the trivium."}], "id": "q05"}, {"question": "The scholastic method, used in medieval universities, is best characterized by which approach to knowledge?", "options": [{"text": "Accepting all propositions based solely on the authority of ancient texts.", "isCorrect": false, "rationale": "The text explicitly states that 'Nothing was accepted simply because an authority said so; everything had to be defended with argument.'"}, {"text": "Employing rigorous systematic argumentation to resolve debated propositions through reason.", "isCorrect": true, "rationale": "The scholastic method involved a master stating a proposition, presenting arguments for and against it, and then reasoning toward a resolution, emphasizing 'systematic argumentation' and 'careful distinctions'."}, {"text": "Prioritizing empirical experimentation over logical deduction.", "isCorrect": false, "rationale": "While observation was used (e.g., Aquinas's Five Ways), the method was primarily one of 'systematic argument' and 'logical deduction' rather than experimental science in the modern sense."}, {"text": "Dismissing theological questions as beyond the scope of human reason.", "isCorrect": false, "rationale": "Scholastics applied their method to 'the most important questions in existence: Does God exist? What is the nature of the soul?,' explicitly demonstrating that reason was applied to theological matters."}], "id": "q06"}, {"question": "Thomas Aquinas's 'great achievement' as described in the text involved what significant intellectual integration?", "options": [{"text": "Demonstrating that Christian faith could only be understood by rejecting all classical philosophy.", "isCorrect": false, "rationale": "Aquinas did the opposite; he showed how classical philosophy, particularly Aristotle's, could be reconciled with Christian theology."}, {"text": "Showing how Aristotle's logic and natural philosophy could serve Christian theology rather than threaten it.", "isCorrect": true, "rationale": "The text states Aquinas's 'great achievement was to take Aristotle... and show that Aristotle's logic and natural philosophy, far from threatening Christianity, could actually serve it.'"}, {"text": "Arguing that divine revelation was entirely unnecessary, as reason alone sufficed for all truth.", "isCorrect": false, "rationale": "Aquinas believed some truths (like the Trinity) exceeded reason's reach and required revelation, though reason could discover many truths about God."}, {"text": "Developing an entirely new philosophical system that had no roots in previous thought.", "isCorrect": false, "rationale": "Aquinas built upon Aristotle's philosophy, adapting and integrating it, rather than creating a system with no roots in previous thought."}], "id": "q07"}, {"question": "When Thomas Aquinas's Five Ways argue for God's existence by starting with observations like 'things move' or 'things are caused,' what primary intellectual path is he utilizing?", "options": [{"text": "Divine revelation found in Scripture.", "isCorrect": false, "rationale": "The text explicitly states that the Five Ways 'do not begin with Scripture or Church authority.'"}, {"text": "Logical reasoning based on observable facts of the natural world.", "isCorrect": true, "rationale": "The text states the Five Ways 'draw entirely on observation of the natural world and logical reasoning,' reasoning 'from these observable facts to the conclusion that there must be an unmoved mover...'"}, {"text": "Personal mystical experience and intuition.", "isCorrect": false, "rationale": "Aquinas's method was systematic and rational, not based on personal mystical experiences or intuition."}, {"text": "Blind faith, unsupported by any empirical evidence.", "isCorrect": false, "rationale": "His arguments are based on 'observable facts' and logical reasoning, demonstrating they are not based on 'blind faith'."}], "id": "q08"}, {"question": "How did Francis of Assisi's approach to religious life, through the Franciscan Order, distinctly differ from earlier monastic orders like the Benedictines, as presented in the text?", "options": [{"text": "Franciscans focused exclusively on scholarly pursuits within university walls.", "isCorrect": false, "rationale": "While universities were important, Franciscans were 'traveling preachers' who went into the world, not primarily confined to scholarly institutions."}, {"text": "Franciscans retreated from the world into isolated monasteries to live a life of prayer.", "isCorrect": false, "rationale": "This describes the older monastic orders like the Benedictines; Franciscans 'went into the world' and were 'traveling preachers'."}, {"text": "Franciscans actively engaged with the world, preaching among the poor and sick while owning nothing.", "isCorrect": true, "rationale": "The text states Franciscans 'went into the world: into the city streets, the leper colonies, the markets,' living on alms and 'owning nothing,' which was 'something genuinely new'."}, {"text": "Franciscans emphasized militant crusades to spread Christianity by force.", "isCorrect": false, "rationale": "The text describes Franciscans preaching the Gospel with joy and love, with no mention of militant crusades."}], "id": "q09"}, {"question": "The High Middle Ages, as summarized, presented a period where human endeavors—from cathedral building to philosophical inquiry—often shared a common underlying goal. What was this goal?", "options": [{"text": "To establish political dominance over rival empires through military might.", "isCorrect": false, "rationale": "While military conflicts occurred, the overarching goal described for the era's major achievements (cathedrals, universities, philosophy) was not political dominance."}, {"text": "To systematically dismantle ancient traditions in favor of entirely new societal structures.", "isCorrect": false, "rationale": "The period built upon and integrated ancient traditions (like Aristotle's philosophy and the seven liberal arts) rather than dismantling them."}, {"text": "To understand and honor divine truth through both rational investigation and material expression.", "isCorrect": true, "rationale": "The era is characterized by 'building toward heaven' in cathedrals (theology in stone) and universities pursuing 'divine truth' through reason, aiming to show how 'faith and reason could work together'."}, {"text": "To prioritize individual economic gain above communal and spiritual pursuits.", "isCorrect": false, "rationale": "Cathedrals required 'enormous resources from the whole community' and devotion, and figures like Francis of Assisi embodied radical poverty, directly contrasting individual economic gain as a priority."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
