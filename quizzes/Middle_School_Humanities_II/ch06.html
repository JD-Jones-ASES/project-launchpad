<script>
var QUESTIONS = [{"question": "What is the Renaissance, and what is the origin of the term?", "options": [{"text": "The Renaissance was a medieval theological movement focused on building cathedrals; the term means 'rebuilding.'", "isCorrect": false, "rationale": "The Renaissance was a revival of ancient Greek and Roman learning, art, and philosophy; 'renaissance' means 'rebirth,' not 'rebuilding.'"}, {"text": "The Renaissance was the period roughly from 1350 to 1600 in which European scholars, artists, and thinkers consciously revived ancient Greek and Roman learning; 'Renaissance' is a French word meaning 'rebirth,' coined by later historians though the people themselves spoke of a 'restoration' of learning.", "isCorrect": true, "rationale": "The text notes that the word 'Renaissance' was not used by those who lived through it; they spoke of restoration. The label was applied by later historians. Petrarch called himself one of the 'diggers' uncovering buried classical learning."}, {"text": "The Renaissance was primarily a scientific revolution; the term 'renaissance' means 'experiment.'", "isCorrect": false, "rationale": "The Renaissance was primarily a literary, artistic, and philosophical revival of classical antiquity; the Scientific Revolution was a later development."}, {"text": "The Renaissance began in Germany when Luther rediscovered the New Testament; 'renaissance' means 'rediscovery.'", "isCorrect": false, "rationale": "The Renaissance began in the Italian city-states around 1350, more than a century before Luther; its focus was on ancient Greek and Roman learning."}], "id": "q01"}, {"question": "Why did the Renaissance begin in Italy specifically?", "options": [{"text": "Italy had a stronger Catholic Church than other countries, so religious learning flourished there first.", "isCorrect": false, "rationale": "The text gives five reasons for Italy's primacy, none of which is a stronger Church; the Church was equally powerful across Catholic Europe."}, {"text": "Italy had the right combination of wealth from Mediterranean trade, physical ruins of Rome everywhere, close Latin-to-Italian linguistic proximity, Greek scholars fleeing Constantinople, and a competitive city-state political culture.", "isCorrect": true, "rationale": "All five factors combined uniquely in Italy: (1) merchant wealth to fund art and scholarship; (2) Roman ruins physically present; (3) Latin closer to Italian than any other vernacular; (4) Greek manuscripts arriving after 1453; (5) city-states competing through cultural patronage."}, {"text": "Italy was chosen by Pope Julius II as the center of Renaissance activity in a formal papal decree.", "isCorrect": false, "rationale": "The Renaissance was not decreed; it emerged organically from social, economic, and intellectual conditions."}, {"text": "Italy was the only country in Europe with universities during this period.", "isCorrect": false, "rationale": "Universities existed across Europe; Oxford, Paris, and Bologna were all medieval foundations. Italy's advantage was specific to the Renaissance combination of factors."}], "id": "q02"}, {"question": "What is Renaissance humanism, and is it anti-Christian?", "options": [{"text": "Renaissance humanism was a secular philosophy that rejected God and placed human beings at the center of the universe — explicitly anti-Christian.", "isCorrect": false, "rationale": "The text explicitly states that most Renaissance humanists were devout Christians; they saw no conflict between faith and classical learning. The word 'humanism' today can mean something different from what it meant in the Renaissance."}, {"text": "Renaissance humanism was a scholarly programme — the disciplined study of ancient Greek and Roman texts in their original languages — that most humanists saw as compatible with and enriching to Christian faith, not opposed to it.", "isCorrect": true, "rationale": "Petrarch, Erasmus, and More were all devout Christians. Renaissance humanism was about studying the studia humanitatis — grammar, rhetoric, poetry, history, moral philosophy — as preparation for a good and virtuous life."}, {"text": "Renaissance humanism was a secret pagan religion practiced by artists in Florence; it was publicly condemned by the Church.", "isCorrect": false, "rationale": "Humanism was an openly practiced scholarly and educational programme; the Church largely supported and funded it, with popes as major Renaissance patrons."}, {"text": "Renaissance humanism was identical to medieval scholasticism; the two terms refer to the same intellectual movement.", "isCorrect": false, "rationale": "Humanists and scholastics had different emphases: humanists focused on ancient literary and rhetorical texts; scholastics used Aristotelian logic to systematize theology."}], "id": "q03"}, {"question": "Who was Petrarch, and why is he considered the 'father of humanism'?", "options": [{"text": "Petrarch was a medieval monk who invented the printing press and made classical texts widely available.", "isCorrect": false, "rationale": "Petrarch (1304–1374) was a poet and scholar, not a monk; the printing press was Gutenberg's invention, a century after Petrarch."}, {"text": "Petrarch was a 14th-century Italian poet and scholar who was captivated by Latin writers of ancient Rome, spent his life searching for lost classical manuscripts, and self-consciously modeled his writing on ancient forms — becoming the first major voice calling for a 'restoration' of classical learning.", "isCorrect": true, "rationale": "Petrarch's enthusiasm for ancient Rome, his search for manuscripts, and his contemptuous coining of the term 'Dark Ages' for the post-Roman centuries established the intellectual agenda that defined humanism."}, {"text": "Petrarch was an English diplomat who brought ancient manuscripts from Constantinople to London after the city fell.", "isCorrect": false, "rationale": "Petrarch was Italian (born 1304); Constantinople fell in 1453, over 75 years after Petrarch's death."}, {"text": "Petrarch wrote exclusively in Greek because he believed Latin was a corrupted language.", "isCorrect": false, "rationale": "Petrarch wrote primarily in Latin and Italian; he celebrated Latin as the language of ancient Rome."}], "id": "q04"}, {"question": "What role did the Medici family play in the Renaissance?", "options": [{"text": "The Medici were military commanders who conquered Florence and used their power to destroy medieval art and replace it with classical copies.", "isCorrect": false, "rationale": "The Medici were bankers and merchants who became political rulers of Florence through wealth and patronage, funding art and scholarship rather than destroying medieval works."}, {"text": "The Medici were a family of Florentine bankers who became the greatest patrons of art and learning in Europe — funding translation of Plato, establishing the Platonic Academy, and supporting Botticelli, the young Michelangelo, and Leonardo da Vinci.", "isCorrect": true, "rationale": "Cosimo de' Medici funded Plato's translation and founded the Platonic Academy. Lorenzo the Magnificent was the golden age of Medici patronage, with Botticelli, Michelangelo, and Leonardo at his court."}, {"text": "The Medici were popes who used Church wealth to fund the Renaissance exclusively in Rome.", "isCorrect": false, "rationale": "The Medici were a secular family of Florentine bankers and rulers; they did produce a few popes (Leo X was a Medici), but the core of Medici patronage was in Florence, not Rome."}, {"text": "The Medici were opposed to the arts; they funded only banking and military campaigns.", "isCorrect": false, "rationale": "The Medici are historically synonymous with Renaissance patronage; their funding of arts and learning was central to their political power and legacy."}], "id": "q05"}, {"question": "What is linear perspective, and why was it revolutionary in art?", "options": [{"text": "Linear perspective is the use of bright colors and gold leaf to make religious figures appear luminous, developed by Giotto.", "isCorrect": false, "rationale": "Gold backgrounds and luminous colors are characteristics of medieval (pre-Renaissance) Byzantine art; linear perspective is about three-dimensional depth, not color."}, {"text": "Linear perspective is a mathematical system for representing three-dimensional space on a flat surface — parallel lines converging at a vanishing point — developed by Brunelleschi around 1420, which transformed European painting from flat symbolic representation to convincing three-dimensional illusion.", "isCorrect": true, "rationale": "Before linear perspective, medieval painting used hierarchical sizing and gold backgrounds. After Brunelleschi codified the rules and Alberti described them in On Painting (1435), flat symbolic art was replaced within a generation by images of convincing depth."}, {"text": "Linear perspective is the technique of painting figures from above (bird's-eye view), giving an impression of height.", "isCorrect": false, "rationale": "Linear perspective involves a single vanishing point on the horizon, creating depth — not a bird's-eye view."}, {"text": "Linear perspective was invented by Michelangelo specifically for the Sistine Chapel ceiling paintings.", "isCorrect": false, "rationale": "Linear perspective was developed by Brunelleschi around 1420 and codified by Alberti; Michelangelo used it, but did not invent it."}], "id": "q06"}, {"question": "What makes Leonardo da Vinci the supreme example of the 'Renaissance man'?", "options": [{"text": "Leonardo was the only Renaissance figure who could speak multiple languages fluently.", "isCorrect": false, "rationale": "Linguistic ability is not the defining characteristic of the 'Renaissance man'; the term refers to mastery across multiple fields of knowledge and skill."}, {"text": "Leonardo was simultaneously a painter, sculptor, architect, engineer, anatomist, and scientist — his notebooks filled with scientific observations, mechanical designs, and anatomical drawings — embodying the Renaissance ideal that art and investigation of nature are unified pursuits.", "isCorrect": true, "rationale": "The Mona Lisa and The Last Supper are among the most studied paintings in history; Leonardo's notebooks reveal a mind that refused to separate art from science. He is the archetype of the 'uomo universale' (universal man)."}, {"text": "Leonardo's greatest achievement was theological — he wrote a commentary on the Book of Genesis that influenced the Reformation.", "isCorrect": false, "rationale": "Leonardo's greatness was in visual art, science, engineering, and anatomy — not theology."}, {"text": "Leonardo was the first person to use oil paint, which he invented in 1480.", "isCorrect": false, "rationale": "Oil painting was developed in the Low Countries, notably by Jan van Eyck, before Leonardo; Leonardo's innovation was in observation and technique, not the medium itself."}], "id": "q07"}, {"question": "How did Gutenberg's printing press transform European society?", "options": [{"text": "The printing press had little immediate impact — it took over a century for books to become affordable enough for anyone but the wealthy.", "isCorrect": false, "rationale": "The text describes dramatic near-immediate consequences: books became cheaper within a generation, literacy spread, and ideas spread faster than authorities could control them."}, {"text": "The printing press made books dramatically cheaper within a generation, spread literacy, allowed ideas to spread faster than any authority could suppress them, and standardized texts — directly enabling the Protestant Reformation.", "isCorrect": true, "rationale": "Before Gutenberg, a skilled scribe produced one book per year; a Gutenberg press produced hundreds in days. Luther's 95 Theses circulated across Germany within weeks. The text explicitly calls the press 'the engine that drove the Reformation.'"}, {"text": "The printing press was used exclusively by the Church to print papal bulls and indulgences; it did not affect secular publishing.", "isCorrect": false, "rationale": "The printing press quickly spread beyond Church control; pamphlets, humanist texts, and Reformation treatises all circulated through print."}, {"text": "The printing press replaced manuscript copying in monasteries immediately and completely; no hand-copying occurred after 1455.", "isCorrect": false, "rationale": "Hand-copying continued for specialized purposes, but the press rapidly displaced it for most texts as costs fell."}], "id": "q08"}, {"question": "What was Machiavelli's key argument in The Prince, and why was it shocking?", "options": [{"text": "Machiavelli argued that the ideal prince should be the most virtuous man in his kingdom, combining Christian piety with ancient Roman courage.", "isCorrect": false, "rationale": "Machiavelli explicitly departed from the tradition of ideal kingship; he argued a prince must learn how to not be good when circumstances require it."}, {"text": "Machiavelli argued that a prince must learn how to not be good when circumstances require it — analyzing politics as a science of power separate from theology and morality, asking whether it is better to be feared or loved (answer: ideally both, but fear is more reliable).", "isCorrect": true, "rationale": "This was a shocking departure from the medieval tradition that kings ruled for their people's good under God's authority. Machiavelli treated politics empirically — how power actually works — rather than ideally — how it should work."}, {"text": "Machiavelli argued that the Church should govern all European states, since only religious authority could produce truly moral rulers.", "isCorrect": false, "rationale": "Machiavelli analyzed politics as entirely separate from religion and morality — the opposite of clerical governance."}, {"text": "Machiavelli argued for democracy, saying power should be distributed equally among all citizens.", "isCorrect": false, "rationale": "The Prince is about how an individual ruler wins and keeps power — it is not a democratic tract."}], "id": "q09"}, {"question": "Who was Erasmus, and what distinguished him from both Machiavelli and Luther?", "options": [{"text": "Erasmus was a soldier who used force to reform the Church; his campaigns were known as the 'Erasmian Crusade.'", "isCorrect": false, "rationale": "Erasmus was a scholar, not a soldier; he advocated reform through scholarship and satire, not force."}, {"text": "Erasmus was a Dutch Christian humanist who produced a critical edition of the Greek New Testament, wrote The Praise of Folly mocking Church corruption with wit, and wanted to reform the Church from within — horrified when Luther's Reformation split it.", "isCorrect": true, "rationale": "Erasmus combined humanist scholarship with Christian piety. He differed from Machiavelli (who separated politics from morality) and from Luther (who broke from Rome). Erasmus wanted internal reform, not rupture."}, {"text": "Erasmus rejected all classical learning as pagan; he believed Christian faith required complete separation from ancient Rome.", "isCorrect": false, "rationale": "Erasmus was a Christian humanist who embraced classical learning as compatible with and enriching to Christian faith."}, {"text": "Erasmus became a Lutheran after reading Luther's 95 Theses and spent the rest of his life defending the Reformation.", "isCorrect": false, "rationale": "Erasmus was horrified by the Reformation's split of the Church; he opposed Luther's break with Rome and remained Catholic."}], "id": "q10"}, {"question": "Who was Thomas More, and what was Utopia?", "options": [{"text": "Thomas More was Martin Luther's closest ally in England; Utopia was his manifesto for the Protestant Reformation.", "isCorrect": false, "rationale": "More opposed Luther's Reformation and was executed for refusing to acknowledge Henry VIII's break with Rome."}, {"text": "Thomas More was an English lawyer and statesman, Erasmus's closest friend; Utopia (1516) described an imaginary island where property was held in common and poverty abolished — both a critique of European society and a humanist display piece; More died refusing to compromise his Catholic conscience.", "isCorrect": true, "rationale": "More's 'Utopia' is Greek for 'no place' (outopia) and 'good place' (eutopia) — a philosophical joke. More was executed in 1535 for refusing to swear the Oath of Supremacy acknowledging Henry VIII as head of the Church of England."}, {"text": "Utopia was a travel narrative describing More's personal exploration of the New World.", "isCorrect": false, "rationale": "Utopia is a work of fiction describing an imaginary island society; More never traveled to the Americas."}, {"text": "Thomas More was an Italian artist who painted the original portrait of Erasmus used in all modern biographies.", "isCorrect": false, "rationale": "Thomas More was an English statesman and scholar, not an Italian artist."}], "id": "q11"}, {"question": "What was the significance of Christopher Columbus's 1492 voyage?", "options": [{"text": "Columbus proved that the earth was round — a fact previously unknown to Europeans.", "isCorrect": false, "rationale": "Educated Europeans already knew the earth was round; ancient Greek geographers had established this. Columbus's error was miscalculating the earth's size."}, {"text": "Columbus, sailing under Spanish patronage, crossed the Atlantic and reached the Caribbean while believing he had found a route to Asia — instead opening contact between Europe and the Americas with enormous and devastating consequences for indigenous peoples.", "isCorrect": true, "rationale": "Columbus's error about the earth's size led him to believe he had reached Asia; his actual achievement was opening a permanent connection between Europe and the Americas, transforming both worlds."}, {"text": "Columbus reached India successfully and established the first European trading colony in Calcutta.", "isCorrect": false, "rationale": "Columbus reached the Caribbean in 1492; Vasco da Gama reached India in 1498."}, {"text": "Columbus's voyage was funded by Portugal and immediately recognized as the discovery of a new continent.", "isCorrect": false, "rationale": "Columbus's voyage was funded by Spain; he believed he had reached Asia, not a new continent."}], "id": "q12"}, {"question": "How did the Renaissance prepare the ground for the Protestant Reformation?", "options": [{"text": "The Renaissance had nothing to do with the Reformation; they were entirely separate and unrelated movements.", "isCorrect": false, "rationale": "The text explicitly identifies three ways the Renaissance prepared for the Reformation: textual criticism, the printing press, and the humanist critique of Church corruption."}, {"text": "The Renaissance prepared for the Reformation through three paths: humanist textual criticism (Erasmus's Greek New Testament showed the Vulgate contained errors), the printing press (spread ideas faster than authorities could suppress them), and the humanist critique of Church corruption (prepared educated Europeans for reform demands).", "isCorrect": true, "rationale": "All three paths were directly causal: without Erasmus's scholarship, Luther's textual arguments would have had less credibility; without the press, his theses would not have spread; without the existing critique of corruption, educated Europeans would not have been receptive."}, {"text": "The Renaissance caused the Reformation by teaching Europeans to reject all religious authority in favor of human reason.", "isCorrect": false, "rationale": "Most Renaissance humanists were devout Christians; the Reformation was about reforming the Church, not rejecting religion."}, {"text": "The Renaissance prevented the Reformation by strengthening Church authority through papal patronage of the arts.", "isCorrect": false, "rationale": "Papal arts patronage was seen by reformers as evidence of the Church's worldliness; it contributed to rather than preventing the Reformation's appeal."}], "id": "q13"}, {"question": "What is Christian humanism, and how did Erasmus exemplify it?", "options": [{"text": "Christian humanism was a medieval movement that rejected both ancient learning and Church authority in favor of personal mystical experience.", "isCorrect": false, "rationale": "Christian humanism embraced both classical learning and Church tradition; it rejected neither, seeking to use one to purify and strengthen the other."}, {"text": "Christian humanism combined humanist scholarship with Christian devotion to reform the Church from within — Erasmus exemplified it by producing a critical Greek New Testament, writing Praise of Folly to mock corruption, and insisting Christianity could be purified through returning to its original sources.", "isCorrect": true, "rationale": "The key word is 'from within.' Christian humanists like Erasmus and More believed the Church could and should be reformed; they broke with Luther when he insisted on breaking from Rome entirely."}, {"text": "Christian humanism was identical to Lutheranism; Erasmus and Luther shared all the same views.", "isCorrect": false, "rationale": "Erasmus and Luther both wanted reform but took completely different paths: Erasmus from within the Church, Luther by breaking from it. Erasmus was horrified by the split."}, {"text": "Christian humanism valued pagan philosophy above Scripture; Erasmus believed Plato was more reliable than Paul.", "isCorrect": false, "rationale": "Christian humanists used classical learning as a tool; they did not place pagan philosophy above Scripture."}], "id": "q14"}, {"question": "What was the caravel, and why was it significant for the Age of Exploration?", "options": [{"text": "The caravel was a massive, heavily armed warship used by Spain to conquer the Americas.", "isCorrect": false, "rationale": "The caravel was a small, highly maneuverable sailing ship; its advantage was agility and the ability to sail into the wind, not military firepower."}, {"text": "The caravel was a small, highly maneuverable Portuguese ship with lateen (triangular) sails that could sail closer into the wind than traditional square-rigged ships, making it the primary vessel of the Age of Exploration.", "isCorrect": true, "rationale": "The caravel's ability to tack into the wind allowed Portuguese explorers to systematically explore the African coast and eventually round the Cape of Good Hope — journeys impossible for ships that could only sail with the wind."}, {"text": "The caravel was invented by Columbus in 1490 specifically for his Atlantic crossing.", "isCorrect": false, "rationale": "The caravel was developed by Portuguese navigators in the early fifteenth century, decades before Columbus's voyage; Prince Henry the Navigator's Portuguese expeditions used it from the 1420s onward."}, {"text": "The caravel was a land vehicle — a covered wagon designed for Silk Road trade caravans.", "isCorrect": false, "rationale": "A caravel was a sailing ship, not a land vehicle; 'caravan' and 'caravel' are distinct words."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
