        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The introduction to the section highlights that Dante, Aquinas, Marco Polo, and Francis of Assisi, while contemporaries, approached their literary contributions from \"very different angles.\" Which of the following statements best illustrates this diversity in approach?", "options": [{"text": "Dante used precise philosophical arguments, while Aquinas employed soaring poetic imagery.", "isCorrect": false, "rationale": "This statement reverses the actual approaches of Dante and Aquinas as described in the text. Aquinas used precise philosophical argument, and Dante used soaring poetic imagery."}, {"text": "Aquinas sought to answer theological questions through logical reasoning, whereas Dante mapped the moral universe using poetic narrative.", "isCorrect": true, "rationale": "The text states Aquinas used 'precise philosophical argument' to answer 'every important question about God,' and Dante used 'soaring poetic imagery' to 'map the entire moral and spiritual universe.' This accurately reflects their distinct angles."}, {"text": "Marco Polo focused on detailed scientific observations, while Francis of Assisi wrote political commentaries.", "isCorrect": false, "rationale": "Marco Polo used 'careful observation of a merchant and traveler,' but the text does not describe his work as 'detailed scientific observations.' Francis of Assisi sang a 'hymn to creation,' not political commentaries."}, {"text": "Francis of Assisi described vast foreign lands, while Dante advocated for the use of Latin in serious literature.", "isCorrect": false, "rationale": "Marco Polo described vast foreign lands, not Francis of Assisi. Dante made the revolutionary decision to write in the Tuscan dialect, *not* advocating for Latin in serious literature."}], "id": "q01"}, {"question": "Dante Alighieri's decision to write *The Divine Comedy* in the Tuscan dialect of Italian, rather than in Latin, was revolutionary because it demonstrated:", "options": [{"text": "A personal preference for the vernacular due to his exile and inability to access classical texts.", "isCorrect": false, "rationale": "The text indicates a conscious, revolutionary choice, not a mere preference or lack of access. Dante revered classical poets like Virgil, demonstrating familiarity with classical texts."}, {"text": "His belief that the profound truths of Christian faith should be accessible to ordinary people.", "isCorrect": true, "rationale": "The 'note' explicitly states that 'Dante was saying that the greatest truths of Christian faith deserved to be expressed in the language that ordinary people actually spoke.'"}, {"text": "His political rebellion against the Roman Catholic Church's authority regarding language use.", "isCorrect": false, "rationale": "While Dante was involved in political conflicts, his choice of language is presented as a statement about the accessibility of faith's truths, not primarily a direct political rebellion against the Church's doctrines on literary language."}, {"text": "His desire to obscure the poem's meaning from foreign scholars unfamiliar with Italian.", "isCorrect": false, "rationale": "The goal of using the vernacular was accessibility, not obscurity from any group of readers."}], "id": "q02"}, {"question": "In *The Divine Comedy*, Virgil guides Dante through Hell and Purgatory but cannot lead him into Heaven. According to the teacher's note, what profound idea does Virgil's limitation symbolize in Dante's work?", "options": [{"text": "That ancient Roman culture, while revered, was fundamentally flawed and irrelevant to Christian salvation.", "isCorrect": false, "rationale": "Dante revered Virgil as 'the greatest poet of the ancient world,' placing him and other virtuous pagans in Limbo with honor, not deeming them irrelevant."}, {"text": "The necessity of faith, represented by Beatrice, to achieve the ultimate vision of God, beyond the scope of classical reason.", "isCorrect": true, "rationale": "The teacher's note states: 'This is Dante's meditation on the relationship between classical reason and Christian faith: reason can guide us through Hell and Purgatory... but the final vision of God requires faith—Beatrice—to lead the way.'"}, {"text": "Dante's personal resentment towards classical poets for their lack of Christian knowledge.", "isCorrect": false, "rationale": "The text emphasizes Dante's reverence for Virgil and other classical poets, honoring them despite their pre-Christian existence, rather than showing resentment."}, {"text": "The superiority of Italian vernacular poetry over Latin classical works in matters of divine truth.", "isCorrect": false, "rationale": "The symbolism is about the limits of human reason (represented by Virgil) in achieving divine vision, not a comparison of the superiority of one language's poetry over another."}], "id": "q03"}, {"question": "The \"Logic of Dante's Hell\" key concept explains that punishments are not random but \"fit the crimes.\" Which of the following scenarios best exemplifies this principle?", "options": [{"text": "A gluttonous person suffers at the very bottom of Hell, close to Satan, for their excess.", "isCorrect": false, "rationale": "The key concept states that 'Those who sinned through weakness of will (lust, gluttony, anger) are punished near the top,' not at the bottom where fraud and treachery reside."}, {"text": "A soul who never chose between good or evil is placed near the gate of Hell, existing in a 'blind life' and envying all other lots.", "isCorrect": true, "rationale": "Canto III describes souls who 'could not commit to either good or evil' being placed at the entrance, having 'no hope of death' and envying 'every other lot,' a punishment that perfectly mirrors their indecisive, uncommitted earthly existence."}, {"text": "Someone who committed a minor offense is subjected to the most intense physical torment for eternity.", "isCorrect": false, "rationale": "The logic implies proportionate punishment, meaning minor offenses would not lead to the most intense torment, which is reserved for the worst sins."}, {"text": "Betrayers are eternally forced to write poetry, reflecting their twisted creativity.", "isCorrect": false, "rationale": "Betrayers, like Judas Iscariot, are described as being chewed by Satan at the very bottom of Hell, reflecting the ultimate degradation of their sin, not a form of ironic artistic punishment."}], "id": "q04"}, {"question": "Dante's depiction of Satan at the very bottom of Hell, frozen and weeping while eternally chewing traitors, serves to convey which theological concept?", "options": [{"text": "The heroic defiance of ultimate evil against divine authority.", "isCorrect": false, "rationale": "The teacher's note explicitly contrasts Dante's Satan with 'the terrifying, magnificent rebel of later imagination,' describing him as a 'grotesque, weeping figure,' not heroic or defiant."}, {"text": "That the rejection of God, taken to its logical extreme, leads to powerlessness, degradation, and the absence of good.", "isCorrect": true, "rationale": "The teacher's note clearly states: 'This is Dante's point: the rejection of God, carried to its logical extreme, leads not to heroic independence but to nothingness and helplessness. Evil has no power of its own; it is only the absence of good.'"}, {"text": "The ultimate power of human will to reject God and maintain dignity even in damnation.", "isCorrect": false, "rationale": "Satan is portrayed as 'mindless' and 'helpless,' actively contradicting any notion of maintaining dignity or power through defiance."}, {"text": "God's unending mercy, allowing even Satan a form of redemption through suffering.", "isCorrect": false, "rationale": "Satan's state is one of eternal punishment and complete degradation, not a path towards or demonstration of redemption."}], "id": "q05"}, {"question": "Thomas Aquinas's *Summa Theologica* is characterized by its systematic approach to theological and philosophical questions. Which statement accurately describes its distinctive methodology?", "options": [{"text": "It primarily uses parables and allegories to illustrate complex spiritual truths.", "isCorrect": false, "rationale": "The text emphasizes Aquinas's use of 'careful logical argument' and a very specific, structured format, not primarily parables or allegories."}, {"text": "It presents a question, states objections, offers a reply, and then systematically addresses each objection.", "isCorrect": true, "rationale": "The text directly describes the *Summa Theologica*'s format: 'each question is posed, objections are stated, a reply is given, and then the objections are answered one by one.'"}, {"text": "It dismisses opposing viewpoints outright to affirm Church dogma without challenge.", "isCorrect": false, "rationale": "The text explicitly states, 'Nothing is dismissed; everything is taken seriously,' indicating a thorough engagement with all viewpoints."}, {"text": "It relies solely on biblical scripture for its arguments, avoiding any philosophical reasoning.", "isCorrect": false, "rationale": "The teacher's note on the Five Ways highlights that they 'are not arguments from Scripture or Church authority—they are arguments from reason alone.'"}], "id": "q06"}, {"question": "The *teachernote* on Aquinas's Five Ways emphasizes that these arguments are crucial for understanding his broader theological project. What is the core message Aquinas sought to convey through these arguments?", "options": [{"text": "That human reason is inherently limited and cannot truly grasp divine truths without direct revelation.", "isCorrect": false, "rationale": "Aquinas's Five Ways aim to show that reason *can* lead to conclusions about God's existence, not that it is inherently limited in this regard."}, {"text": "That reason, when properly employed and starting from observable facts, leads to conclusions consistent with Christian faith, demonstrating no contradiction between the two.", "isCorrect": true, "rationale": "The teacher's note states: 'Aquinas is demonstrating that reason, properly used, leads to the same conclusions as faith... showing that there is no contradiction between natural philosophy (what we would call science) and Christian theology.'"}, {"text": "That God's existence can only be proven through direct appeals to biblical scripture and Church authority.", "isCorrect": false, "rationale": "The *teachernote* explicitly clarifies that the Five Ways 'are not arguments from Scripture or Church authority—they are arguments from reason alone.'"}, {"text": "That philosophical arguments are ultimately superior to faith as a means of understanding the divine.", "isCorrect": false, "rationale": "Aquinas aims to show the harmony and consistency between reason and faith, not the superiority of one over the other."}], "id": "q07"}, {"question": "One of Aquinas's Five Ways, the argument from motion, posits that \"whatever is in motion is put in motion by another,\" leading to the necessity of a \"first mover, put in motion by no other.\" This argument directly reflects the influence of which ancient philosopher?", "options": [{"text": "Plato, known for his theory of Forms and ideal realities.", "isCorrect": false, "rationale": "While an influential Greek philosopher, Plato is not specifically associated with the 'unmoved mover' argument in the way Aristotle is for Aquinas."}, {"text": "Aristotle, who developed the concept of the \"unmoved mover\" in his *Physics* and *Metaphysics*.", "isCorrect": true, "rationale": "The *teachernote* states: 'The argument from motion (the unmoved mover) is directly drawn from Aristotle's Physics and Metaphysics.'"}, {"text": "Socrates, famous for his method of questioning and ethical inquiries.", "isCorrect": false, "rationale": "Socrates' primary philosophical contributions do not include the argument from motion as used by Aquinas."}, {"text": "Homer, the epic poet whose works Dante also referenced.", "isCorrect": false, "rationale": "Homer was an epic poet, not a philosopher whose work contributed to the logical arguments for a 'first mover.'"}], "id": "q08"}, {"question": "Marco Polo's *The Travels* was a significant literary work for medieval Europeans primarily because it:", "options": [{"text": "Was a theological treatise that attempted to reconcile Eastern and Western religious doctrines.", "isCorrect": false, "rationale": "The text describes *The Travels* as a 'remarkable travel book,' providing descriptions of various regions, not a theological treatise."}, {"text": "Provided the first detailed and comprehensive account of the world east of Persia.", "isCorrect": true, "rationale": "The text explicitly states that *The Travels* 'gave medieval Europeans their first detailed picture of the world east of Persia.'"}, {"text": "Documented his personal political struggles within the Mongol Empire's court.", "isCorrect": false, "rationale": "Polo is described as regarding Kublai Khan with 'genuine admiration' and detailing the court, not documenting personal political struggles against it."}, {"text": "Was written in the vernacular Italian, inspiring other European authors to abandon Latin.", "isCorrect": false, "rationale": "While written in an era of vernacular emergence (dictated to Rustichello), the text does not highlight its linguistic impact or inspiration for other authors in the same revolutionary way as it does for Dante's *Divine Comedy*."}], "id": "q09"}, {"question": "The High Middle Ages, as described in the introduction, produced literature that was \"as ambitious as its cathedrals.\" Which of the following literary projects from the section best exemplifies this ambition through its systematic scope and aim?", "options": [{"text": "Francis of Assisi's hymn to creation, notable for its simple, grateful language.", "isCorrect": false, "rationale": "While significant, Francis's hymn is characterized by 'simple, grateful language,' which contrasts with the grand, systematic ambition implied by 'as ambitious as its cathedrals.'"}, {"text": "Marco Polo's *The Travels*, which described the vast world east of Persia based on careful observation.", "isCorrect": false, "rationale": "Marco Polo's work is ambitious in its geographic scope and detailed observation, but its aim is descriptive, not a comprehensive intellectual or spiritual mapping in the same way a cathedral or a systematic treatise would be."}, {"text": "Thomas Aquinas's *Summa Theologica*, which systematically attempted to answer every important question about God, the soul, and reality.", "isCorrect": true, "rationale": "The *Summa Theologica* is described as 'a systematic attempt to answer every important theological and philosophical question,' reflecting an intellectual architecture and exhaustive comprehension that aligns strongly with the ambition and comprehensive scope of cathedrals."}, {"text": "Dante Alighieri's *Divine Comedy*, which mapped the entire moral and spiritual universe through a personal journey.", "isCorrect": false, "rationale": "Dante's *Divine Comedy* is also exceptionally ambitious, mapping a 'moral and spiritual universe.' However, Aquinas's explicit aim to 'answer every important question' on God, soul, and reality, using a 'systematic' structure, perhaps aligns more directly with the intellectual and systematic building implied by 'as ambitious as its cathedrals' in its exhaustive comprehension."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
