<script>
var QUESTIONS = [{"question": "What claim did William of Normandy use to justify his invasion of England in 1066?", "options": [{"text": "He claimed descent from Alfred the Great through the female line.", "isCorrect": false, "rationale": "William claimed Edward the Confessor had promised him the throne and that Harold had sworn an oath on holy relics to support his claim."}, {"text": "He claimed Edward the Confessor had promised him the English throne, and that Harold had sworn on holy relics to support his claim.", "isCorrect": true, "rationale": "These dual claims — Edward's promise and Harold's broken oath — were central to William's justification, and he secured Pope Alexander II's blessing for the invasion."}, {"text": "He claimed the English throne through his Danish ancestry, as a descendant of Cnut.", "isCorrect": false, "rationale": "William was Norman, descended from Viking settlers in France; his claim was based on Edward's supposed promise, not Danish ancestry."}, {"text": "He claimed England as a prize of war, with no need for legal justification.", "isCorrect": false, "rationale": "William went to considerable lengths to justify his claim legally and obtain papal blessing."}], "id": "q01"}, {"question": "What was the tactical turning point at the Battle of Hastings?", "options": [{"text": "Harold's cavalry broke the Norman shield wall in the morning, forcing William to retreat.", "isCorrect": false, "rationale": "It was the English, not the Normans, who used a shield wall; Harold fought on foot and his cavalry was not the decisive factor."}, {"text": "Norman cavalry feigned a retreat, luring some English forces off the ridge, breaking the shield wall.", "isCorrect": true, "rationale": "William's cavalry repeatedly failed to break the English shield wall until the feigned retreat drew some of Harold's men off the ridge in pursuit, creating gaps in the English line."}, {"text": "The Normans used siege engines to destroy the English fortifications on the ridge.", "isCorrect": false, "rationale": "The battle was a field engagement, not a siege; no siege engines are mentioned."}, {"text": "Harold's housecarls deserted at a critical moment, leaving Harold exposed.", "isCorrect": false, "rationale": "Harold's housecarls held the ridge throughout the morning; the turning point was the feigned retreat, not desertion."}], "id": "q02"}, {"question": "What were housecarls, and what happened to them after the Norman Conquest?", "options": [{"text": "Housecarls were Viking mercenaries who fought for whoever paid them; after 1066 they were hired by the Normans.", "isCorrect": false, "rationale": "Housecarls were professional household warriors of Anglo-Saxon lords, not mercenaries. After the Conquest, the institution disappeared."}, {"text": "Professional warriors in the personal household of an Anglo-Saxon king or lord; they disappeared after 1066 as Norman lords replaced Anglo-Saxon ones.", "isCorrect": true, "rationale": "Housecarls were full-time soldiers who formed the backbone of Harold's army. After the Conquest, the Norman system of feudal knights replaced the housecarl institution."}, {"text": "Housecarls were the fyrd — ordinary freemen who served as militia. They became the core of the new Norman army.", "isCorrect": false, "rationale": "Housecarls were professional warriors distinct from the fyrd (militia). The two were separate institutions."}, {"text": "Housecarls were monks who served as chaplains to Anglo-Saxon kings; after 1066 they were expelled from England.", "isCorrect": false, "rationale": "Housecarls were warriors, not monks."}], "id": "q03"}, {"question": "What was the Harrying of the North, and why did William order it?", "options": [{"text": "William systematically destroyed villages, farms, food stores, and livestock in Yorkshire to suppress a combined Danish-English uprising in 1069–1070.", "isCorrect": true, "rationale": "When a Danish fleet joined an English uprising in the north, William's response was deliberate devastation — burning crops, slaughtering livestock, destroying seed grain — leaving a famine that Orderic Vitalis recorded killed over 100,000 people."}, {"text": "William ordered the burning of northern towns to punish them for sheltering fugitive Anglo-Saxon nobles.", "isCorrect": false, "rationale": "While nobles may have been involved, the Harrying was a response to a specific military threat — the Danish-English uprising of 1069–1070."}, {"text": "William burned the north to prevent the Scots from using it as a base of invasion.", "isCorrect": false, "rationale": "The Harrying was in response to the specific Danish-English threat, not a preemptive measure against Scotland."}, {"text": "The Harrying of the North was a Viking raid that William failed to prevent, resulting in mass starvation.", "isCorrect": false, "rationale": "The Harrying was William's own deliberate act, not a Viking raid."}], "id": "q04"}, {"question": "What was the Domesday Book, and why was it significant?", "options": [{"text": "A record of English history from the Anglo-Saxons to 1086, written by monks at the command of the Archbishop of Canterbury.", "isCorrect": false, "rationale": "The Domesday Book was a survey of landholdings, not a historical chronicle; it was commissioned by William, not the Archbishop."}, {"text": "A comprehensive survey of virtually every manor and estate in England, commissioned by William in 1086 to record ownership, value, and population for taxation and military planning.", "isCorrect": true, "rationale": "Royal commissioners questioned local witnesses under oath about every estate. It is the most detailed record of a medieval kingdom's resources that survives from anywhere in Europe. Its decisions could no more be appealed than the Last Judgment."}, {"text": "A book of laws written by William replacing Alfred's law code with Norman law.", "isCorrect": false, "rationale": "The Domesday Book was an administrative survey, not a law code."}, {"text": "A census of the entire English population, recording the names and occupations of all free men.", "isCorrect": false, "rationale": "The Domesday Book recorded land ownership and values, not a general census of the population."}], "id": "q05"}, {"question": "How does feudalism work, and how did William apply it to England?", "options": [{"text": "Feudalism was a system where peasants owned their own land and paid taxes directly to the king.", "isCorrect": false, "rationale": "Under feudalism, land was held from a lord in exchange for military service; peasants did not own land outright."}, {"text": "William applied feudalism systematically: treating all English land as his personal property conquered by right of war, granting it to Norman followers in exchange for military service.", "isCorrect": true, "rationale": "William held all land as tenant-in-chief; great barons held from him; knights from the barons. Each baron owed a specific quota of knights, giving William firmer control over his nobility than almost any European ruler."}, {"text": "Feudalism was the Anglo-Saxon system that William found when he arrived; he preserved it unchanged.", "isCorrect": false, "rationale": "Feudalism was the Norman system the Conquerors brought; the Anglo-Saxons had a different, less systematically hierarchical arrangement."}, {"text": "William abolished feudalism in England, preferring a system where all warriors were paid royal soldiers.", "isCorrect": false, "rationale": "William imposed feudalism more thoroughly in England than it existed in almost any other European country."}], "id": "q06"}, {"question": "What was the Investiture Controversy, and why did it matter?", "options": [{"text": "A dispute between England and France over who controlled the English Church; resolved by the Treaty of Wedmore.", "isCorrect": false, "rationale": "The Investiture Controversy was between popes and Holy Roman Emperors; the Treaty of Wedmore dealt with the Danelaw, not church appointments."}, {"text": "The dispute between popes and Holy Roman Emperors over the right to appoint bishops, raising fundamental questions about the relationship between religious and political authority.", "isCorrect": true, "rationale": "Bishops controlled vast land and wealth, so appointing them was enormously consequential. The controversy reached its peak when Gregory VII excommunicated Henry IV, who stood barefoot in the snow at Canossa for three days seeking reconciliation."}, {"text": "A dispute over which cardinals had the right to elect a new pope; resolved by the Great Western Schism.", "isCorrect": false, "rationale": "The Great Western Schism was a separate later crisis; the Investiture Controversy concerned the appointment of bishops, not the election of popes."}, {"text": "A controversy over whether monks or secular clergy should run parish churches in England.", "isCorrect": false, "rationale": "The Investiture Controversy concerned high-level appointments (bishops and abbots), not parish churches."}], "id": "q07"}, {"question": "What is scholasticism, and who is credited with founding it?", "options": [{"text": "The medieval practice of monks copying manuscripts in monasteries; founded by Benedict of Nursia.", "isCorrect": false, "rationale": "Scholasticism is an intellectual method using philosophical reasoning to explore theology; Benedict of Nursia founded the Benedictine monastic order."}, {"text": "The medieval intellectual method of using philosophical reasoning — especially Aristotelian logic — to explore and defend theological questions; Anselm of Canterbury is often called its founder.", "isCorrect": true, "rationale": "Anselm's motto was fides quaerens intellectum — 'faith seeking understanding.' He believed faith and reason were partners, not enemies. Thomas Aquinas two centuries later was its greatest practitioner."}, {"text": "The system of educating knights in chivalric virtues; founded by Charlemagne in the ninth century.", "isCorrect": false, "rationale": "Scholasticism is a theological and philosophical method, not a system for training knights."}, {"text": "The practice of translating the Bible into vernacular languages; founded by Wycliffe in the fourteenth century.", "isCorrect": false, "rationale": "Wycliffe was associated with Bible translation, not with scholasticism. Scholasticism used Latin and was associated with cathedral schools and universities."}], "id": "q08"}, {"question": "What was Henry II's greatest domestic achievement, and how did it shape the English-speaking world?", "options": [{"text": "Henry II built Westminster Abbey, creating the ceremonial heart of English royal power.", "isCorrect": false, "rationale": "Westminster Abbey was built by Edward the Confessor. Henry II's achievement was in law, not architecture."}, {"text": "Henry II systematized English common law by sending royal judges on regular circuits, applying consistent legal principles across all of England — the foundation of law in the US, Canada, and Australia.", "isCorrect": true, "rationale": "Before Henry, justice was local and inconsistent. His justices in eyre created a uniform 'common' law. Henry also expanded the use of jury trial — twelve sworn men determining facts and judging disputes."}, {"text": "Henry II conquered France and created an empire that lasted until the twentieth century.", "isCorrect": false, "rationale": "Henry controlled much of France (the Angevin Empire), but it was not a permanent conquest; Normandy was lost under King John."}, {"text": "Henry II established the first Parliament, giving barons a permanent voice in royal government.", "isCorrect": false, "rationale": "Parliament developed later; Henry's contribution was to royal justice and common law, not parliamentary government."}], "id": "q09"}, {"question": "Why was the murder of Thomas Becket so catastrophic for Henry II?", "options": [{"text": "Becket's murder caused a civil war between the Church and the crown that lasted twenty years.", "isCorrect": false, "rationale": "There was no civil war; the consequences were religious and political — Henry's humiliation, Becket's canonization, and Canterbury as a pilgrimage site."}, {"text": "Becket was proclaimed a martyr almost immediately, was canonized in 1173, Canterbury became a major pilgrimage site, and Henry had to do public penance including a ritual flogging by monks.", "isCorrect": true, "rationale": "Four of Henry's knights murdered Becket at the altar of Canterbury Cathedral in 1170. The outrage across Christendom was enormous; Henry's penance was public and humiliating."}, {"text": "Becket's murder caused Pope Alexander III to place England under interdict, suspending all church services.", "isCorrect": false, "rationale": "The interdict was associated with King John's reign, not Henry II's. After Becket's murder, Henry did penance but England was not placed under interdict."}, {"text": "Becket's murder discredited the Church entirely, accelerating the move toward secular law.", "isCorrect": false, "rationale": "The murder actually enhanced the Church's prestige — Becket became a saint and pilgrim destination, strengthening Church authority rather than undermining it."}], "id": "q10"}, {"question": "What was the Anarchy (1135–1154), and how was it resolved?", "options": [{"text": "A period of Viking raids that destroyed northern England; resolved when Alfred defeated the Danes.", "isCorrect": false, "rationale": "The Anarchy was twelfth-century, not related to Alfred or the Vikings."}, {"text": "A civil war between King Stephen and the Empress Matilda for the English throne; resolved when Henry II came to power in 1154, founding the Plantagenet dynasty.", "isCorrect": true, "rationale": "After Henry I died without a clear male heir, his daughter Matilda and his nephew Stephen fought for the throne. Henry II emerged as the solution — Matilda's son, founding the Plantagenet line."}, {"text": "A popular revolt by English peasants against Norman rule; resolved by the Magna Carta.", "isCorrect": false, "rationale": "The Magna Carta dealt with baronial rights in 1215; the Anarchy was a succession dispute between the nobility, not a peasant revolt."}, {"text": "A religious crisis when two popes claimed authority over England; resolved by the Concordat of Worms.", "isCorrect": false, "rationale": "The Concordat of Worms resolved the Investiture Controversy in 1122; the Anarchy was a dynastic civil war."}], "id": "q11"}, {"question": "Why was King John's reign significant despite his many failures?", "options": [{"text": "John conquered Scotland and expanded England's northern border to its modern extent.", "isCorrect": false, "rationale": "John was not known for northern conquests; he is known for losing Normandy and facing baronial rebellion."}, {"text": "John's failures — losing Normandy, arbitrary taxation, conflict with the Pope — provoked the baronial rebellion that produced the Magna Carta in 1215.", "isCorrect": true, "rationale": "Though John himself had no intention of keeping the Magna Carta, the barons' forced concession created the document that became the cornerstone of English constitutional thought."}, {"text": "John reformed the English legal system and created the first Parliament.", "isCorrect": false, "rationale": "Legal reforms were Henry II's achievement; John's reign was characterized by legal abuses, not reforms."}, {"text": "John successfully defended England against a French invasion and was celebrated as a great military hero.", "isCorrect": false, "rationale": "John was a military failure who lost Normandy; he is remembered as one of England's worst kings."}], "id": "q12"}, {"question": "What does the Magna Carta establish as a principle, and why has it proven so consequential?", "options": [{"text": "The Magna Carta established democracy by giving all English men the right to vote for their representatives.", "isCorrect": false, "rationale": "The Magna Carta of 1215 protected baronial rights, not democratic voting. It became foundational for constitutional thought but was not a democracy document."}, {"text": "The Magna Carta established that no free man shall be imprisoned or harmed except by the lawful judgment of his peers and the law of the land — the principle that even the king is subject to the law.", "isCorrect": true, "rationale": "This rule-of-law principle (clauses 39–40) became the ancestor of habeas corpus, trial by jury, and the due process clause of the US Constitution. American colonists cited it in the 1770s."}, {"text": "The Magna Carta established the right of Parliament to approve all royal taxes.", "isCorrect": false, "rationale": "Parliamentary taxation rights developed gradually after Magna Carta; the document itself focused on baronial rights, not parliamentary procedure."}, {"text": "The Magna Carta abolished feudalism and replaced it with a system of paid royal service.", "isCorrect": false, "rationale": "The Magna Carta did not abolish feudalism; it placed limits on how the king could exercise feudal power."}], "id": "q13"}, {"question": "How does the Song of Roland's depiction of Roland's refusal to blow his horn reflect the chivalric value system?", "options": [{"text": "Roland refuses because he is a coward who hopes to escape while his men die.", "isCorrect": false, "rationale": "Roland refuses because of his extraordinary pride in honor — he will not admit he cannot handle the enemy alone. The text explicitly calls this heroic, even if tragically flawed."}, {"text": "Roland refuses because blowing the horn would be dishonorable — calling for help against 'Paynim' (pagans) would shame his lineage, making his refusal both heroic and tragic.", "isCorrect": true, "rationale": "Oliver pleads; Roland refuses, saying: 'That shame shall never fall upon my kindred.' His courage springs from genuine pride, but condemns his men to death — the poem presents this as both admirable and catastrophic."}, {"text": "Roland refuses because Charlemagne told him not to summon help under any circumstances.", "isCorrect": false, "rationale": "There is no such order from Charlemagne; the decision is entirely Roland's own, driven by his sense of honor."}, {"text": "Roland refuses because he knows the horn cannot be heard at the distance Charlemagne is away.", "isCorrect": false, "rationale": "In the poem, Charlemagne does hear the horn when Roland finally blows it — from thirty leagues away — showing the horn would have worked earlier."}], "id": "q14"}, {"question": "What does William of Malmesbury's account of the Norman Conquest reveal about his perspective and method?", "options": [{"text": "Malmesbury was a Norman propagandist who celebrated the Conquest as a gift to a barbaric English people.", "isCorrect": false, "rationale": "Malmesbury was half Norman and half English; he tried to see both sides and lamented the cultural loss suffered by the English."}, {"text": "Malmesbury was a half-Norman, half-English historian who tried to understand the Conquest fairly, lamenting that England had become 'the residence of foreigners' while preserving memory of the Anglo-Saxon heritage.", "isCorrect": true, "rationale": "Writing seventy years after the Conquest, Malmesbury explicitly states he is writing to preserve what is glorious in England's ancestors lest it be buried in oblivion — a historian motivated by cultural preservation."}, {"text": "Malmesbury was a contemporary eyewitness who watched the battle and took detailed notes on the tactics.", "isCorrect": false, "rationale": "Malmesbury was born c. 1095 and wrote around 1125; he was not a contemporary eyewitness of the 1066 battle."}, {"text": "Malmesbury's account is purely fictional — he invented all the details of Hastings with no historical basis.", "isCorrect": false, "rationale": "Malmesbury drew on earlier sources; his account is considered one of the most important near-contemporary sources for the Conquest."}], "id": "q15"}, {"question": "How did the Bayeux Tapestry contribute to our understanding of the Norman Conquest?", "options": [{"text": "The Bayeux Tapestry is a woven document that records an accurate verbatim account of William's coronation speech.", "isCorrect": false, "rationale": "The Bayeux Tapestry is a visual embroidery (not actually a tapestry), depicting events in images, not words."}, {"text": "The Bayeux Tapestry is an approximately 70-metre embroidery from the 1070s depicting the events leading to the Conquest from William's point of view, providing extraordinary visual detail about ships, weapons, armour, and key figures.", "isCorrect": true, "rationale": "Made probably in England in the 1070s, it depicts the Conquest with Norman bias but with remarkable detail about the material world of 1066 — faces, equipment, buildings — making it one of our most important sources."}, {"text": "The Bayeux Tapestry was created in the nineteenth century as a nationalist monument to French history.", "isCorrect": false, "rationale": "The Bayeux Tapestry dates to the 1070s, shortly after the Conquest; it is medieval, not modern."}, {"text": "The Bayeux Tapestry is written in Latin and provides the most detailed textual account of the battle.", "isCorrect": false, "rationale": "The Bayeux Tapestry is a visual embroidery with brief Latin captions; it is primarily an image-based source, not a text."}], "id": "q16"}, {"question": "What principle does the Magna Carta's clause 'To no one will we sell, to no one will we deny or delay, right or justice' establish?", "options": [{"text": "That the king must hold regular markets and cannot charge merchants for trading licences.", "isCorrect": false, "rationale": "This clause refers to justice, not commerce. 'Sell' means selling judicial decisions, not market licences."}, {"text": "That justice must be impartial and accessible — the king cannot sell favorable verdicts, deny justice entirely, or delay proceedings indefinitely as instruments of oppression.", "isCorrect": true, "rationale": "This clause establishes that the administration of justice must be fair and equal — the king cannot use the courts as a revenue source by selling verdicts, or weaponize delay and denial against subjects."}, {"text": "That all free men have the right to trade freely without royal taxation.", "isCorrect": false, "rationale": "This clause concerns the administration of justice, not trade or taxation."}, {"text": "That the pope cannot sell church offices in England without the king's permission.", "isCorrect": false, "rationale": "The Magna Carta addressed the relationship between the king and his barons, not specifically the sale of church offices."}], "id": "q17"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
