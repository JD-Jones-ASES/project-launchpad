<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the fundamental shift in artistic representation that linear perspective enabled during the Renaissance, as demonstrated by Brunelleschi?", "options": [{"text": "To create more vibrant and diverse color palettes previously unseen.", "isCorrect": false, "rationale": "While color use evolved, the core breakthrough of linear perspective was not primarily about color palettes but about spatial representation."}, {"text": "To represent the world based on spiritual meaning rather than physical space.", "isCorrect": false, "rationale": "This describes the medieval approach to art, which the Renaissance artists deliberately moved away from. Renaissance artists wanted to show the world as the eye actually sees it."}, {"text": "To accurately depict three-dimensional space on a two-dimensional surface, mimicking human vision.", "isCorrect": true, "rationale": "Brunelleschi's demonstration proved that mathematical rules could represent three-dimensional space on a flat surface with perfect accuracy, reflecting how the eye sees the world."}, {"text": "To focus solely on religious figures, making them larger than secular ones.", "isCorrect": false, "rationale": "This was a characteristic of medieval art, where importance determined size, not physical reality. Renaissance perspective aimed for realistic proportions."}]}, {"question": "A Renaissance painter wants to create a convincing illusion of depth in a landscape scene featuring a long road. According to the principles of linear perspective, which technique should they primarily employ?", "options": [{"text": "Painting distant objects with brighter, more vivid colors.", "isCorrect": false, "rationale": "The text states that shadows, relative brightness of colors, and sharpness of edges provide cues about depth, implying that distant objects appear less bright and sharp, not more vivid."}, {"text": "Ensuring all figures, regardless of distance, maintain the same proportional size to emphasize their importance.", "isCorrect": false, "rationale": "This approach aligns with medieval art, where importance dictated size. Linear perspective dictates that objects farther from the viewer appear smaller according to a precise ratio."}, {"text": "Making parallel lines of the road converge at a single vanishing point on the horizon.", "isCorrect": true, "rationale": "The text explicitly states that 'Every set of parallel lines that runs into the distance appears to converge at a single point on the horizon, called the vanishing point,' which is a key rule of linear perspective."}, {"text": "Using thick impasto techniques to add physical texture to distant objects.", "isCorrect": false, "rationale": "While texture can add to art, it's not a primary rule of linear perspective for conveying depth, and detail generally diminishes with distance, rather than being emphasized with thick texture."}]}, {"question": "The Renaissance workshop system had a significant impact on the production of art by:", "options": [{"text": "Promoting the isolation of individual master artists, fostering unique styles.", "isCorrect": false, "rationale": "The workshop system was about collaboration and structured training, not isolation. Master artists supervised apprentices and journeymen."}, {"text": "Allowing patrons to directly commission individual apprentices without master supervision.", "isCorrect": false, "rationale": "Patrons hired the 'whole production team,' meaning the master and his workshop, not individual apprentices independently."}, {"text": "Systematically teaching and preserving artistic skills across generations, ensuring consistent quality and output.", "isCorrect": true, "rationale": "The text states that this system 'meant that the skills of Renaissance art...were systematically taught and preserved from one generation to the next.'"}, {"text": "Eliminating the need for patrons, as artists produced work independently for sale.", "isCorrect": false, "rationale": "The workshop system was integral to fulfilling commissions from patrons, who remained central to art production."}]}, {"question": "Beyond simply increasing the speed of book production, what was one of the most significant long-term impacts of Gutenberg's printing press on European society?", "options": [{"text": "It solidified the Church's control over information dissemination by making religious texts more uniform.", "isCorrect": false, "rationale": "While it made texts uniform, the printing press ultimately challenged the Church's control by allowing ideas that countered Church doctrine, like those of Luther, to spread rapidly."}, {"text": "It led to a decline in literacy rates as fewer people needed to learn to read handwritten texts.", "isCorrect": false, "rationale": "The increased affordability and availability of books due to the printing press would have encouraged, rather than declined, literacy rates among a broader population."}, {"text": "It caused a dramatic increase in the cost of books, making them luxury items for the elite.", "isCorrect": false, "rationale": "The text explicitly states that 'as supply increased, prices collapsed,' making books affordable to merchants and tradespeople, not just nobles."}, {"text": "It enabled the rapid and widespread dissemination of standardized ideas, facilitating intellectual and social change.", "isCorrect": true, "rationale": "The printing press's impact included speed of ideas and standardization, meaning a 'single, consistent text' could 'spread across Europe in weeks rather than years,' driving change like the Reformation."}]}, {"question": "The text highlights that the printing press made the Reformation 'unstoppable.' This was primarily because:", "options": [{"text": "It allowed Martin Luther to personally distribute his 95 Theses to every household in Germany.", "isCorrect": false, "rationale": "While Luther's ideas spread widely, the printing press allowed for the multiplication and sale of copies, not necessarily personal distribution by Luther himself to every household."}, {"text": "It enabled the rapid multiplication and circulation of Luther's ideas, making them impossible for authorities to contain.", "isCorrect": true, "rationale": "The text explicitly states that 'When Martin Luther published his 95 Theses in 1517...copies were printed and sold at markets across Germany within two weeks...With the press, there was no containing Luther.'"}, {"text": "It produced such high-quality images that people were convinced by the visual arguments against the Church.", "isCorrect": false, "rationale": "The key impact on the Reformation was the spread of Luther's written 'words' (95 Theses), not primarily high-quality images."}, {"text": "It introduced a new language for religious texts that only Luther's followers could understand.", "isCorrect": false, "rationale": "The printing press standardized existing languages and texts, it didn't introduce a new, exclusive language."}]}, {"question": "Which combination of navigational technologies was crucial for allowing Portuguese captains to venture into the open ocean and calculate their position with reasonable accuracy?", "options": [{"text": "The telescope, the sextant, and the steamship.", "isCorrect": false, "rationale": "These technologies were developed much later than the Age of Exploration discussed in the context of the Renaissance."}, {"text": "The magnetic compass, the astrolabe, and the caravel.", "isCorrect": true, "rationale": "The text lists these three specific technologies as those that 'made the Age of Exploration possible,' allowing navigators to determine direction, latitude, and sail effectively."}, {"text": "The printing press, gunpowder, and the wheelbarrow.", "isCorrect": false, "rationale": "These inventions are unrelated to the specific challenges of oceanic navigation mentioned in the section."}, {"text": "The clock, the barometer, and the rudder.", "isCorrect": false, "rationale": "While useful, the clock (for longitude) and barometer are not listed as the primary, crucial technologies alongside the compass, astrolabe, and caravel for early exploration."}]}, {"question": "The astrolabe was a vital tool for Age of Exploration navigators because it allowed them to:", "options": [{"text": "Accurately measure the depth of the ocean floor.", "isCorrect": false, "rationale": "The astrolabe's function was celestial observation, not measuring ocean depth."}, {"text": "Determine their direction relative to magnetic north.", "isCorrect": false, "rationale": "This was the function of the magnetic compass, not the astrolabe."}, {"text": "Calculate their latitude by measuring the altitude of celestial bodies.", "isCorrect": true, "rationale": "The definition states the astrolabe was used 'to measure the altitude of the sun or stars above the horizon. By knowing the altitude of the sun at noon, a navigator could calculate the ship's latitude.'"}, {"text": "Sail closer to the wind than traditional square-rigged vessels.", "isCorrect": false, "rationale": "This was a capability of the caravel ship with its lateen sails, not the astrolabe instrument."}]}, {"question": "The Medici family and other Renaissance patrons commissioned extensive works of art for reasons beyond mere aesthetic appreciation. Which of the following best summarizes the multifaceted motivations for their artistic patronage?", "options": [{"text": "To provide employment for struggling artists and stimulate the local economy.", "isCorrect": false, "rationale": "While it did provide employment, the text lists specific, deeper motivations like piety, pride, power, and legacy, rather than just economic stimulus."}, {"text": "Primarily for personal enjoyment and to decorate their private residences.", "isCorrect": false, "rationale": "The text emphasizes public and lasting reasons for patronage, such as civic pride and legacy, rather than solely private enjoyment or decoration."}, {"text": "As acts of religious piety, displays of civic pride, assertions of political power, and a means to secure a lasting legacy.", "isCorrect": true, "rationale": "The text explicitly lists all four of these reasons: Religious piety, Civic pride, Political power, and Legacy, as 'interlocking reasons' for commissioning art."}, {"text": "To fund scientific research and technological innovations, disguised as art projects.", "isCorrect": false, "rationale": "While Leonardo blurred these lines, the primary motivations for patronage were directly related to the art itself and its symbolic value, not as disguised funding for science."}]}, {"question": "Leonardo da Vinci is presented as the quintessential \"uomo universale\" of the Renaissance. What characteristic most strongly exemplifies this ideal as embodied by Leonardo?", "options": [{"text": "His mastery of a single artistic medium, such as fresco painting.", "isCorrect": false, "rationale": "The 'uomo universale' ideal means skill across many fields, not mastery of a single one."}, {"text": "His exclusive focus on scientific experimentation, rejecting artistic pursuits.", "isCorrect": false, "rationale": "Leonardo was both a painter of the first rank and a scientist; he integrated his artistic and scientific interests."}, {"text": "His profound conviction that art and science were unified by the pursuit of accurate observation and understanding.", "isCorrect": true, "rationale": "The text states that 'What unified Leonardo's apparently scattered interests was a conviction that the artist and the scientist were doing the same thing: learning to see accurately.'"}, {"text": "His humble rejection of public recognition, preferring to work in isolation.", "isCorrect": false, "rationale": "The text does not mention this characteristic, and the workshop system suggests a more collaborative and public engagement with art."}]}, {"question": "The text concludes by stating that the Renaissance did not simply \"photocopy antiquity\" but rather created \"something genuinely new.\" This \"newness\" is best characterized by:", "options": [{"text": "A complete rejection of classical learning and Christian faith in favor of purely secular innovation.", "isCorrect": false, "rationale": "The text states the Renaissance combined classical learning and Christian faith, not rejected them. It created a 'new confidence in human reason and observation.'"}, {"text": "An exact reproduction of ancient Roman and Greek artistic styles and philosophical thought.", "isCorrect": false, "rationale": "The text explicitly states 'The Renaissance did not simply photocopy antiquity. It used antiquity as a model, a measure, and a mirror,' implying adaptation rather than exact reproduction."}, {"text": "A unique synthesis of classical learning, Christian faith, and a novel confidence in human reason and observation.", "isCorrect": true, "rationale": "The concluding paragraph states this combination: 'a European culture that combined classical learning, Christian faith, and a new confidence in human reason and observation.'"}, {"text": "A focus solely on spiritual meaning and the eternal realm, similar to medieval art but with improved techniques.", "isCorrect": false, "rationale": "This describes the medieval approach, which the Renaissance moved away from by focusing on physical appearances and human observation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
