<script>
var QUESTIONS = [{"question": "What is the core idea behind the term “Renaissance” as understood by the scholars, artists, and writers of the period, despite the term being coined later?", "options": [{"text": "A rejection of religious faith in favor of secular learning.", "isCorrect": false, "rationale": "The text explicitly states that Renaissance humanism was often practiced by devout Christians and saw no conflict between faith and classical learning."}, {"text": "A belief that European history had been 'asleep' and was now 'waking up' through a revival of ancient knowledge.", "isCorrect": true, "rationale": "The text explains that Renaissance thinkers called the preceding centuries the 'middle age,' implying history had been 'asleep,' and they were 'waking it up' through a 'restoration' of ancient Greek and Roman learning."}, {"text": "The invention of new technologies, such as the printing press, that transformed society.", "isCorrect": false, "rationale": "While the printing press was significant, the core idea of the Renaissance for its participants was the revival of classical learning, not technological innovation."}, {"text": "The establishment of powerful, unified nation-states across Europe.", "isCorrect": false, "rationale": "Italy, where the Renaissance began, was characterized by competing city-states, not unified nation-states, and this was not the core idea of the 'rebirth' itself."}]}, {"question": "How did the Renaissance thinkers' concept of the 'Dark Ages' contrast with modern historical understanding of the medieval period, as explained in the text?", "options": [{"text": "Renaissance thinkers saw the Middle Ages as a period of significant cultural and intellectual achievement, while modern historians view it as a decline.", "isCorrect": false, "rationale": "This statement inverts the historical perspectives. Renaissance thinkers viewed the Middle Ages as a 'Dark Ages' where learning was buried."}, {"text": "Renaissance thinkers believed the Middle Ages were a time of lost learning, whereas modern historians acknowledge substantial medieval contributions like cathedrals and universities.", "isCorrect": true, "rationale": "The text states Petrarch called the centuries after Rome's fall the 'Dark Ages' where 'learning had been buried.' The 'note' section clarifies that modern historians consider this 'misleading,' highlighting medieval achievements like cathedrals, universities, and important literature."}, {"text": "Both Renaissance thinkers and modern historians agree that the Middle Ages were characterized by the collapse of all centralized authority.", "isCorrect": false, "rationale": "The text does not suggest agreement on this point. While Rome fell, medieval Europe developed complex political and religious structures, not a total collapse of all authority."}, {"text": "Modern historians completely dismiss the 'Dark Ages' as a fabrication, while Renaissance thinkers accurately described a total absence of innovation.", "isCorrect": false, "rationale": "Modern historians consider the term 'misleading,' not a complete fabrication, and the text contradicts the idea of a 'total absence of innovation' by listing medieval achievements."}]}, {"question": "A historian argues that the geographic location of the Italian city-states was the single most crucial factor for the Renaissance's emergence there. Based on the 'Why Italy First?' key concept, which of the following provides the strongest counterargument to this claim?", "options": [{"text": "Italy's location meant it was too far from burgeoning Northern European trade routes to gain significant wealth.", "isCorrect": false, "rationale": "The text states Italy's 'wealth from Mediterranean trade' was a key factor, indicating its geographic location was advantageous for trade, not a hindrance."}, {"text": "The presence of ancient Roman ruins and the closeness of Latin to Italian were more important than geographic trade advantages.", "isCorrect": false, "rationale": "While these were crucial factors, stating they were 'more important' than geography for trade doesn't directly counter the claim that location was the 'single most crucial factor' as much as other non-geographic reasons do."}, {"text": "The competitive political environment among city-states and the influx of Greek scholars contributed equally, if not more, to the Renaissance's unique development.", "isCorrect": true, "rationale": "The 'Why Italy First?' section lists five distinct factors, only one of which is 'wealth from Mediterranean trade and banking' (linked to geography). The 'competitive political culture' and 'Greek scholars fled to Italy' are presented as equally vital, independent factors, directly challenging the idea of geography being the *single most crucial* one."}, {"text": "Florence, the center of the early Renaissance, was landlocked, proving trade routes were irrelevant.", "isCorrect": false, "rationale": "Florence was a major banking center, benefiting from the broader Italian commercial success. Its landlocked status does not negate the importance of Mediterranean trade to the overall Italian city-state wealth and the Renaissance."}]}, {"question": "A contemporary student hears the term 'humanism' and assumes it refers to a philosophy that rejects religious belief. Based on the provided text, what would be the most accurate clarification for this student regarding Renaissance humanism?", "options": [{"text": "Renaissance humanism was primarily a political movement focused on establishing secular governments.", "isCorrect": false, "rationale": "The text defines Renaissance humanism as a 'scholarly programme' centered on the study of ancient texts, not primarily a political movement."}, {"text": "Renaissance humanism was a scholarly program centered on classical texts, often practiced by devout Christians, distinct from modern secular humanism.", "isCorrect": true, "rationale": "The text explicitly states: 'This does not mean what the word “humanism” sometimes means today (a philosophy that rejects God). Renaissance humanism was a scholarly programme... Most Renaissance humanists were devout Christians who saw no conflict between faith and classical learning.'"}, {"text": "Renaissance humanism only studied pagan texts and actively sought to discredit Christian theology.", "isCorrect": false, "rationale": "While humanists studied pagan antiquity, the text clarifies that they were often devout Christians and saw no conflict with their faith; they were not seeking to discredit Christian theology."}, {"text": "While it did reject God, Renaissance humanism laid the groundwork for the scientific revolution by emphasizing empirical observation.", "isCorrect": false, "rationale": "The text directly refutes the idea that Renaissance humanism 'rejects God' and focuses its emphasis on the study of classical literature and philosophy, not primarily empirical scientific observation."}]}, {"question": "The Medici family's patronage significantly influenced the Renaissance. If a modern city wanted to replicate the Medici's impact on its local arts and culture scene, what strategy would be most aligned with their historical approach?", "options": [{"text": "Investing primarily in public education programs to make art accessible to all citizens.", "isCorrect": false, "rationale": "While education is important, the Medici's influence stemmed from direct patronage of specific artists and scholars, not primarily broad public education initiatives."}, {"text": "Establishing a democratic system where artists' projects are chosen by public vote.", "isCorrect": false, "rationale": "The Medici were a powerful banking family that dominated Florence, not a democratic system. Their patronage was centralized and strategically chosen for prestige."}, {"text": "Wealthy individuals or institutions commissioning major artistic and scholarly works to enhance their prestige and civic pride.", "isCorrect": true, "rationale": "The text explains that the Medici were wealthy bankers who funded 'scholarship and art' for 'prestige, influence, and power,' and that this 'Medici model—wealthy merchants using art to express piety, civic pride, and political power simultaneously—spread throughout Italy.'"}, {"text": "Encouraging artists to work independently without financial support, believing true genius flourishes without external influence.", "isCorrect": false, "rationale": "The text explicitly states that 'Patronage was the economic engine of Renaissance art: artists needed patrons to survive,' directly contradicting this idea."}]}, {"question": "Francesco Petrarca (Petrarch) is described as the 'founder and hero of Renaissance humanism.' Which of the following best exemplifies his contribution to this movement?", "options": [{"text": "Developing the mathematical rules for linear perspective in painting.", "isCorrect": false, "rationale": "Filippo Brunelleschi and Leon Battista Alberti are credited with developing and codifying linear perspective, not Petrarch."}, {"text": "Advocating for a return to the study of ancient Greek and Roman literature and modeling his own writings on classical forms.", "isCorrect": true, "rationale": "The text states Petrarch 'spent his life searching for lost classical manuscripts and writing letters, poetry, and essays that self-consciously modeled themselves on ancient forms,' making him central to the revival of classical learning."}, {"text": "Commissioning the Sistine Chapel ceiling and rebuilding St. Peter's Basilica.", "isCorrect": false, "rationale": "Pope Julius II commissioned these works, not Petrarch."}, {"text": "Founding the Platonic Academy in Florence and translating Plato's complete works into Latin.", "isCorrect": false, "rationale": "Cosimo de' Medici founded the Platonic Academy and funded the translation of Plato's works, not Petrarch."}]}, {"question": "The development of linear perspective by Brunelleschi and Alberti 'transformed European painting and architecture.' Which statement best analyzes the *significance* of this transformation?", "options": [{"text": "It allowed artists to depict religious figures with greater symbolic meaning, emphasizing their divinity.", "isCorrect": false, "rationale": "Linear perspective primarily focused on creating realistic spatial depth, not enhancing symbolic meaning, which was more characteristic of medieval art."}, {"text": "It enabled artists to create the illusion of three-dimensional depth on a flat surface, making painted scenes appear more realistic and immersive.", "isCorrect": true, "rationale": "The text defines linear perspective as 'A mathematical system for representing three-dimensional space on a flat surface,' which created 'the illusion of depth' and replaced 'the flat symbolic style of medieval painting' with 'images of convincing three-dimensional depth.'"}, {"text": "It shifted artistic focus from religious subjects to purely mythological themes favored by patrons like the Medici.", "isCorrect": false, "rationale": "The text states that Renaissance masters 'applied perspective to religious and secular subjects alike,' indicating it didn't solely shift focus away from religious themes."}, {"text": "It introduced new color palettes and materials, making artworks more vibrant and durable.", "isCorrect": false, "rationale": "Linear perspective is a technique for representing space, not directly related to color palettes or materials."}]}, {"question": "How did Venice's patronage of art and its overall character differ from that of Florence during the Renaissance?", "options": [{"text": "Venice, as a papal state, focused primarily on rebuilding St. Peter's Basilica, while Florence focused on secular art.", "isCorrect": false, "rationale": "Rome, not Venice, was the papal center focused on rebuilding St. Peter's. Venice was a trading republic."}, {"text": "Venice, enriched by sea trade, funded art that celebrated its glory with rich color and ceremony, contrasting with Florence's emphasis on art funded by bankers and humanist scholarship.", "isCorrect": true, "rationale": "The text states 'Venice was Europe's greatest trading city... enriched by centuries of commerce. Venice's wealth funded art of a different kind: rich color, elaborate ceremony, and the celebration of the city's glory.' This contrasts with Florence being 'ruled by the powerful Medici family of bankers' and becoming 'the greatest patron of art and learning in Europe,' associated with humanists."}, {"text": "Venice prioritized engineering and anatomical studies, whereas Florence specialized in large-scale mythological frescoes.", "isCorrect": false, "rationale": "Leonardo da Vinci, known for engineering and anatomy, was associated with Florence. While Botticelli painted mythological subjects in Florence, this option mischaracterizes Venice's distinct artistic focus."}, {"text": "Venice promoted anonymous craftsmanship, while Florence championed individual artistic genius and signed works.", "isCorrect": false, "rationale": "The text does not provide information to support this distinction; both cities were centers for renowned individual artists."}]}, {"question": "Leonardo da Vinci is presented as the 'supreme example of the Renaissance man.' Which scenario best illustrates the qualities of a 'Renaissance man' based on his description?", "options": [{"text": "A scholar who dedicates his life to translating ancient Greek texts into vernacular languages.", "isCorrect": false, "rationale": "This describes a humanist scholar, like Petrarch, but not the multi-disciplinary breadth of a 'Renaissance man' as exemplified by Leonardo."}, {"text": "An artist who exclusively focuses on painting religious frescoes for the Church, emphasizing spiritual themes.", "isCorrect": false, "rationale": "While some Renaissance artists focused on religious themes, the description of a 'Renaissance man' implies a much broader range of interests and skills than a singular artistic focus."}, {"text": "An individual who excels in multiple diverse fields, such as art, science, and engineering, demonstrating a broad intellectual curiosity.", "isCorrect": true, "rationale": "The text describes Leonardo as 'a painter, sculptor, architect, engineer, anatomist, and scientist in one,' with notebooks 'filled with scientific observations, mechanical designs, and anatomical drawings,' which perfectly encapsulates the idea of a broadly talented 'Renaissance man.'"}, {"text": "A patron who uses their wealth to fund numerous artists and scholars, fostering a vibrant cultural scene.", "isCorrect": false, "rationale": "This describes a patron, like the Medici family, not an individual who is a 'Renaissance man' in the sense of being a polymath artist/scholar."}]}, {"question": "Renaissance humanists believed that the 'studia humanitatis' would produce 'better people: more eloquent, more virtuous, more capable of civic life.' What underlying assumption does this belief reveal about their view of classical learning?", "options": [{"text": "That classical texts contained secret knowledge for achieving immortality.", "isCorrect": false, "rationale": "The text does not suggest humanists believed in secret knowledge for immortality but rather in moral and civic improvement."}, {"text": "That engaging with ancient wisdom could directly cultivate moral character and effective leadership qualities.", "isCorrect": true, "rationale": "The humanists believed classical texts were 'the foundation of a good and virtuous life' and had 'things to teach a Christian world about rhetoric, politics, history, and ethics,' directly linking ancient wisdom to moral and civic competence."}, {"text": "That the only way to challenge the authority of the Church was through understanding pagan philosophy.", "isCorrect": false, "rationale": "The text explicitly states 'Most Renaissance humanists were devout Christians who saw no conflict between faith and classical learning' and were not primarily focused on challenging the Church's authority through pagan philosophy."}, {"text": "That the primary purpose of education was to prepare individuals for monastic life and contemplation.", "isCorrect": false, "rationale": "The emphasis on being 'capable of civic life' suggests an active, public role, contrasting with the monastic life of withdrawal and contemplation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
