<script>
var QUESTIONS = [{"question": "What is the primary purpose of studying Beowulf, The Anglo-Saxon Chronicle, and Asser's Life of King Alfred together, as described in the introduction?", "options": [{"text": "To compare their literary styles and narrative techniques.", "isCorrect": false, "rationale": "While comparing literary styles might be a secondary benefit, the introduction explicitly states a broader purpose than just stylistic comparison."}, {"text": "To gain an internal perspective on the Viking Age from those who lived through it.", "isCorrect": true, "rationale": "The introduction states, 'Together, these texts help us see the Viking Age from the inside—not as outsiders looking back, but as the people who lived through it.'"}, {"text": "To understand how different authors portrayed Alfred the Great.", "isCorrect": false, "rationale": "Only Asser's text is primarily about Alfred. Beowulf and The Anglo-Saxon Chronicle focus on broader cultural ideals and historical events of the era."}, {"text": "To identify the influences of Christian theology on early English literature.", "isCorrect": false, "rationale": "While Beowulf indeed features Christian themes, this is only one aspect of the three texts and not the overarching 'primary purpose' for studying all of them together."}], "id": "q01"}, {"question": "Which of the following accurately describes the major events in the epic poem Beowulf?", "options": [{"text": "Beowulf helps King Alfred fight the Danes, then leads his people in a battle against a dragon.", "isCorrect": false, "rationale": "Beowulf precedes King Alfred's time and his initial conflict is with Grendel, not the Danes."}, {"text": "Beowulf defeats Grendel and Grendel's mother, and later dies fighting a dragon as an old king.", "isCorrect": true, "rationale": "The text explicitly states: 'Beowulf kills Grendel, then kills Grendel's mother. Fifty years later, as an old king, he fights and kills a dragon—but dies of his wounds.'"}, {"text": "Beowulf travels to Holy Island to defend a monastery from a Viking raid, then returns home to rule.", "isCorrect": false, "rationale": "This mixes elements from The Anglo-Saxon Chronicle (Viking raid on Holy-island) with Beowulf's journey, which is set in Scandinavia."}, {"text": "Beowulf compiles a historical chronicle of his people's struggles, including an account of a dragon attack.", "isCorrect": false, "rationale": "Beowulf is a warrior hero, not a chronicler. This describes a role similar to that of the Anglo-Saxon Chronicle's authors."}], "id": "q02"}, {"question": "The Beowulf poet, a Christian, portrays a pre-Christian world. How does the poem reconcile Christian and pagan values?", "options": [{"text": "It explicitly rejects pagan values in favor of Christian virtues like humility and forgiveness.", "isCorrect": false, "rationale": "The text states the poem 'celebrates—courage, loyalty, generosity, the willingness to fight for your people—are the older Germanic virtues,' which are not rejected but explored alongside Christian themes."}, {"text": "It suggests that heroic virtues like courage and loyalty can align with Christian ideals, asking if a warrior's sacrifice is holy.", "isCorrect": true, "rationale": "The 'keyconcept Christian Themes in a Pagan Setting' section asks: 'how does Christian virtue relate to heroic virtue? Is the brave warrior who dies for his people doing something holy?' indicating an exploration of their relationship."}, {"text": "It presents Grendel as a symbol of paganism being defeated by Christian faith.", "isCorrect": false, "rationale": "Grendel is described as a 'descendant of Cain,' a Christian reference, positioning him as an embodiment of evil within a Christian framework, not just paganism."}, {"text": "It uses the pre-Christian setting to critique the moral failures of the contemporary Christian society.", "isCorrect": false, "rationale": "There is no indication in the text that the poem serves as a critique of contemporary Christian society; rather, it explores the virtues of an earlier time."}], "id": "q03"}, {"question": "Based on the primary source excerpt describing Grendel's attack (ll. 710–745), what can be inferred about the monster's character and intent?", "options": [{"text": "Grendel is a stealthy and sorrowful creature, seeking only to scare the warriors.", "isCorrect": false, "rationale": "The excerpt describes him as 'wearing God's anger' and a 'foul ravager' with an 'angry mood,' who hoped 'to take the life from each,' contradicting a sorrowful or merely frightening intent."}, {"text": "Grendel embodies divine wrath and harbors murderous intentions against humans.", "isCorrect": true, "rationale": "The text states Grendel came 'wearing God's anger' and saw the sleeping men, with 'his hopes were high to take the life from each,' clearly indicating murderous intent and a connection to divine displeasure."}, {"text": "Grendel is a misunderstood beast, lashing out due to human provocation.", "isCorrect": false, "rationale": "There is no mention of human provocation; Grendel is depicted as an aggressive, pre-meditated attacker from the darkness."}, {"text": "Grendel is a desperate creature seeking food, driven by famine from the moorland.", "isCorrect": false, "rationale": "While he devours warriors, the text emphasizes his 'foul ravager' nature, 'God's anger,' and 'angry mood,' suggesting malice rather than simple hunger as the primary driver."}], "id": "q04"}, {"question": "The text highlights a significant difference in tone between the 793 and 878 entries of The Anglo-Saxon Chronicle. What does this contrast primarily reveal about the chronicler's perspective?", "options": [{"text": "The chronicler became more objective and less superstitious over time.", "isCorrect": false, "rationale": "While a change in perspective might occur, the text focuses on the specific tones of these two entries rather than a general evolution of the chronicler's overall beliefs."}, {"text": "The 793 entry reflects a theological interpretation of events, while the 878 entry presents a stark, factual account of a human catastrophe.", "isCorrect": true, "rationale": "The text states the 793 entry is 'almost apocalyptic—the chronicler sees the Viking raid as a sign of divine judgment, accompanied by portents in the sky,' while the 878 entry is 'stark and almost matter-of-fact about a catastrophe.'"}, {"text": "The early entries were written by different authors who had distinct writing styles.", "isCorrect": false, "rationale": "Though updated by various monks, the text emphasizes the *difference in how events were reported* for these specific entries, implying a shift in focus or interpretation, not merely different authors."}, {"text": "The later Viking raids were considered less significant than the earlier ones.", "isCorrect": false, "rationale": "The 878 entry describes a major catastrophe where the Danish army subdued much of the land and King Alfred was forced to hide, indicating its high significance."}], "id": "q05"}, {"question": "Why should a reader approach Asser's Life of King Alfred with a critical perspective, despite it being a near-contemporary biography?", "options": [{"text": "Asser was known to have fictionalized many historical events for dramatic effect.", "isCorrect": false, "rationale": "The text does not suggest Asser fictionalized events, but rather that his portrayal might be idealized."}, {"text": "Asser wrote his biography after Alfred's death, lacking direct personal knowledge.", "isCorrect": false, "rationale": "The text explicitly states Asser wrote it 'while Alfred was still alive,' indicating direct contemporary knowledge."}, {"text": "Asser, as Alfred's recruit, likely presented an idealized portrait to serve Alfred's agenda.", "isCorrect": true, "rationale": "The teacher note explains: 'biographers, even contemporary ones, have agendas. Asser was writing for an audience at Alfred's court. He would not write anything Alfred did not want written. Does that mean his portrait is untrustworthy? Not necessarily—but it means we read it critically.'"}, {"text": "Asser's Welsh background made him inherently biased against English kings.", "isCorrect": false, "rationale": "The text states Asser 'clearly admired Alfred,' which contradicts a bias against him."}], "id": "q06"}, {"question": "Asser describes young Alfred's 'love of learning.' What specific detail from the provided primary source best exemplifies this passion despite his early illiteracy?", "options": [{"text": "He was loved by his father and mother, and indeed by all the people.", "isCorrect": false, "rationale": "This indicates his popularity and affection from others, not his personal passion for learning."}, {"text": "He remained illiterate till he was twelve years old, or even till he was older.", "isCorrect": false, "rationale": "This details his challenge and circumstance, not his active pursuit of learning."}, {"text": "He listened attentively to Saxon poems day and night, and committed them to memory.", "isCorrect": true, "rationale": "Despite being illiterate, Alfred's active engagement with and memorization of Saxon poems demonstrates a clear and strong desire for knowledge and culture."}, {"text": "He was without equal in hunting exercises.", "isCorrect": false, "rationale": "This highlights his skill in hunting, which is distinct from his love of intellectual learning."}], "id": "q07"}, {"question": "The concluding section, 'Reading Across the Three Texts,' suggests that Alfred the Great was 'not an accident.' How do Beowulf and The Anglo-Saxon Chronicle contribute to this argument?", "options": [{"text": "Beowulf details his family lineage, while The Anglo-Saxon Chronicle records his birth year.", "isCorrect": false, "rationale": "Neither Beowulf nor the provided excerpts from The Anglo-Saxon Chronicle offer details on Alfred's family lineage or birth."}, {"text": "Beowulf illustrates the heroic ideals Alfred embodied, and The Anglo-Saxon Chronicle shows the challenges he faced and overcame.", "isCorrect": true, "rationale": "The text states 'Beowulf shows us the values...that Anglo-Saxon culture held up as ideals' and 'The Anglo-Saxon Chronicle shows us the events: terse, factual, sometimes horrifying.' Alfred, embodying those ideals, faced the events described in the Chronicle."}, {"text": "Beowulf describes the monsters Alfred fought, and The Anglo-Saxon Chronicle lists his military victories.", "isCorrect": false, "rationale": "Beowulf is a mythological hero fighting monsters, not a direct account of Alfred's battles. The Chronicle notes events, but the focus isn't solely on Alfred's personal victories in the provided content."}, {"text": "Beowulf explains the Christian virtues Alfred embraced, and The Anglo-Saxon Chronicle praises his piety.", "isCorrect": false, "rationale": "Beowulf explores Christian themes in a pagan setting, not Alfred's specific Christian virtues. The Chronicle is largely factual and terse, not primarily focused on praising piety."}], "id": "q08"}, {"question": "According to the text, which literary work provides insights into 'the values...that Anglo-Saxon culture held up as ideals'?", "options": [{"text": "Asser's Life of King Alfred.", "isCorrect": false, "rationale": "Asser primarily provides insight into Alfred's character as a man and an ideal king, rather than broader cultural ideals."}, {"text": "The Anglo-Saxon Chronicle.", "isCorrect": false, "rationale": "The Chronicle focuses on recording historical events, not explicitly detailing cultural values or ideals."}, {"text": "Beowulf.", "isCorrect": true, "rationale": "The 'Reading Across the Three Texts' section explicitly states: 'Beowulf shows us the values—courage, loyalty, the good king who protects his people—that Anglo-Saxon culture held up as ideals.'"}, {"text": "All three texts equally.", "isCorrect": false, "rationale": "Each text offers distinct insights into the period, with Beowulf specifically highlighted for revealing cultural ideals."}], "id": "q09"}, {"question": "A student argues that The Anglo-Saxon Chronicle is the most reliable historical source among the three because of its factual, year-by-year entries. What aspect of the Chronicle, as described in the text, might lead one to critically evaluate its 'factual' nature?", "options": [{"text": "Its primary focus on royal lineage rather than common people.", "isCorrect": false, "rationale": "While the Chronicle might focus more on royalty, this doesn't directly challenge its factual reliability regarding what it does report."}, {"text": "The inclusion of portents and divine judgment in some entries, suggesting interpretive bias.", "isCorrect": true, "rationale": "The text points out that the 793 entry is 'almost apocalyptic—the chronicler sees the Viking raid as a sign of divine judgment, accompanied by portents in the sky.' This interpretive lens indicates that not all entries are purely 'factual' and can carry subjective bias."}, {"text": "Its discontinuation in the mid-twelfth century, leaving later events undocumented.", "isCorrect": false, "rationale": "Its discontinuation affects its completeness for later periods, but not the factual reliability of the entries it *does* contain for its active period."}, {"text": "The fact that it was begun by Alfred's command, implying potential propaganda.", "isCorrect": false, "rationale": "While Alfred initiated it, the text describes the Chronicle's entries as 'terse and factual,' implying a resistance to overt propaganda, unlike Asser's biography, where this concern is explicitly raised."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
