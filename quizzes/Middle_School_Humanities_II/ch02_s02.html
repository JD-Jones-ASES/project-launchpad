<script>
var QUESTIONS = [{"question": "The introduction to the section describes \"Three Voices of the Norman World.\" Which statement accurately differentiates the primary purpose and audience of The Song of Roland from William of Malmesbury's Chronicle?", "options": [{"text": "The Song of Roland aimed to legally constrain royal power for an English readership, while William of Malmesbury celebrated Christian knightly ideals for a French aristocracy.", "isCorrect": false, "rationale": "This option incorrectly reverses the purposes and audiences of the two texts. The Song of Roland celebrated knightly ideals, and William of Malmesbury focused on the Conquest's impact on the English."}, {"text": "The Song of Roland celebrated Christian knightly ideals for a French-speaking aristocracy, while William of Malmesbury sought to understand the Conquest from the perspective of the conquered for an educated English readership.", "isCorrect": true, "rationale": "This option accurately reflects the text's description: The Song of Roland was for a French-speaking aristocracy, celebrating Christian knight ideals, and William of Malmesbury wrote for an educated English readership, trying to understand the Conquest from the perspective of the conquered."}, {"text": "The Song of Roland was a dry legal document for barons, while William of Malmesbury provided a complex narrative of betrayal for a wider public.", "isCorrect": false, "rationale": "This option mischaracterizes both texts. The Song of Roland is a literary work, not a legal document, and William of Malmesbury's work is history with a specific perspective, not solely a narrative of betrayal."}, {"text": "Both texts were primarily concerned with documenting the specific feudal grievances of 1215 for an Anglo-Norman court.", "isCorrect": false, "rationale": "This option describes the Magna Carta's context, not the purposes of The Song of Roland or William of Malmesbury's Chronicle, and therefore does not differentiate them."}]}, {"question": "Roland's refusal to blow the Olifant when urged by Oliver is described as the poem's central crisis. This act most directly reveals Roland's profound commitment to which aspect of the chivalric value system, as interpreted in the text?", "options": [{"text": "Obedience to his lord, Charlemagne, by not alarming the main army unnecessarily.", "isCorrect": false, "rationale": "Roland's refusal to call for help put Charlemagne's rearguard at extreme risk, which is contrary to the idea of obedience that would ensure the safety of his lord's forces. His choice was about personal honor, not strategic obedience to Charlemagne."}, {"text": "Protecting the weak by ensuring the main army is not drawn into an ambush.", "isCorrect": false, "rationale": "Roland's refusal to blow the horn did not protect the main army from an ambush; rather, it condemned his own rearguard, including Oliver and the 'peers of France,' to certain death by denying them potential reinforcements."}, {"text": "Personal honor and pride in his lineage, believing it would be a shame to call for help against the 'Paynim.'", "isCorrect": true, "rationale": "The primary source quote explicitly states Roland's reason: 'Now God forbid it ever should be spoken / That living man saw me wind horn for Paynim! / That shame shall never fall upon my kindred.' This clearly indicates his decision is driven by a deep sense of personal and familial honor and pride, making it shameful to ask for aid against the enemy."}, {"text": "Devotion to the Christian faith by accepting martyrdom without seeking human intervention.", "isCorrect": false, "rationale": "While Roland's death is later framed as martyrdom and tied to his Christian faith, his initial refusal to blow the horn is presented primarily as a matter of personal honor and shame, not an active pursuit of martyrdom at that specific moment. Martyrdom is the outcome, not the immediate motivation for the refusal."}]}, {"question": "The definition of chivalry includes 'loyalty to one's lord, courage in battle, protection of the weak, and devotion to the Christian faith.' Which of Roland's actions, as depicted in the poem, best exemplifies a conflict between two of these core chivalric ideals?", "options": [{"text": "His final act of blowing the horn, which demonstrates courage but comes too late to protect his men.", "isCorrect": false, "rationale": "While blowing the horn does show courage, it is not presented as a conflict of ideals in the moment of decision, but rather a final, desperate act after his initial refusal had sealed their fate."}, {"text": "His refusal to blow the Olifant, which prioritizes personal honor and courage over his implicit duty to protect his rearguard and ensure the mission's success.", "isCorrect": true, "rationale": "Roland's refusal pits his personal pride and courage (a chivalric ideal) against his duty to protect his men (another implicit chivalric ideal for a commander) and, by extension, his lord's wider army by not warning them. This creates a tragic conflict where his extreme honor leads to the demise of those he should protect."}, {"text": "His betrayal by Ganelon, which highlights the absence of loyalty rather than a conflict within Roland's own ideals.", "isCorrect": false, "rationale": "Ganelon's betrayal is an external conflict for Roland, illustrating a lack of loyalty in Ganelon, not an internal conflict of chivalric ideals within Roland himself."}, {"text": "His surrender of his glove to God before dying, which represents devotion to faith but not a conflict of active choices.", "isCorrect": false, "rationale": "This act is a clear expression of devotion to the Christian faith, which is a chivalric ideal, but it is a singular act of submission at the end of his life, not a moment of conflicting ideals in a critical decision."}]}, {"question": "William of Malmesbury's historical account of the Norman Conquest is noted for its 'remarkable perspective.' What specific aspect of his background contributed most significantly to this unique viewpoint?", "options": [{"text": "His position as a high-ranking cleric in the English church during the immediate aftermath of the Conquest.", "isCorrect": false, "rationale": "While William was a cleric, the text emphasizes his mixed heritage, not his clerical position during the immediate aftermath (he was born decades later), as the source of his unique perspective."}, {"text": "His direct involvement in the Battle of Hastings, allowing him firsthand observation of both sides.", "isCorrect": false, "rationale": "William of Malmesbury was born around 1095, nearly 30 years after the Battle of Hastings in 1066, so he could not have been a firsthand observer."}, {"text": "His mixed Anglo-Norman heritage, enabling him to view the Conquest from both the perspective of the conquerors and the conquered.", "isCorrect": true, "rationale": "The text explicitly states: 'He was himself half Norman and half English, which gave him a remarkable perspective: he could see both sides of the Conquest.' This mixed heritage is the key to his unique viewpoint."}, {"text": "His access to exclusive royal archives, which provided an unbiased factual record of the events.", "isCorrect": false, "rationale": "The text does not mention exclusive royal archives as the primary reason for his unique perspective; rather, it highlights his personal background as crucial to his ability to understand both sides."}]}, {"question": "William of Malmesbury lamented that England 'has become the residence of foreigners, and the property of aliens.' Given this sentiment, what was a primary underlying purpose for his historical writing, beyond simply chronicling events?", "options": [{"text": "To promote reconciliation between the Norman conquerors and the English populace through shared historical narratives.", "isCorrect": false, "rationale": "While history can sometimes serve reconciliation, William's lament indicates a focus on loss for the English, and his specific stated purpose is about preserving their past, not necessarily immediate reconciliation."}, {"text": "To provide a justification for the Norman Conquest by highlighting the perceived failings of the Anglo-Saxons.", "isCorrect": false, "rationale": "The text states William 'does not simply celebrate William the Conqueror as a hero, nor does he condemn him as a villain' and his lament is for the English, indicating he's not trying to justify the conquest."}, {"text": "To preserve the memory and 'glorious' achievements of the Anglo-Saxon ancestors lest they be 'buried in oblivion' by the new foreign rule.", "isCorrect": true, "rationale": "William's primary source quote states: 'This is the reason why I have attempted to write of the ancient kings of the English... lest that which is glorious in our ancestors might be buried in oblivion.' This clearly identifies his purpose."}, {"text": "To establish a new legal framework for land ownership and succession under the Norman kings.", "isCorrect": false, "rationale": "William of Malmesbury was a historian, and his work was a chronicle of kings, not a legal document aimed at establishing new laws for land ownership or succession."}]}, {"question": "The Magna Carta (1215) emerged from a specific set of grievances against King John. Which option correctly identifies the primary circumstances that led to the barons forcing the king to agree to the document?", "options": [{"text": "King John's popular reforms to standardize weights and measures, which were resisted by conservative barons.", "isCorrect": false, "rationale": "Standardization of weights and measures was a minor clause within the Magna Carta; it was not the primary cause of baronial discontent or the document's creation. King John's actions were largely unpopular."}, {"text": "King John's successful military campaigns, which ironically led to increased demands for greater baronial representation in Parliament.", "isCorrect": false, "rationale": "King John was largely unsuccessful in his military campaigns, particularly losing Normandy, which led to the need for heavy taxes, a key grievance, not greater representation stemming from success."}, {"text": "King John's loss of Normandy, imposition of heavy taxes, and arbitrary treatment of his barons, which provoked their rebellion.", "isCorrect": true, "rationale": "The text explicitly states: 'King John had lost Normandy to the French king in 1204, imposed crushing taxes to try to win it back, quarreled with the Pope, and treated his barons with suspicion and arbitrary cruelty. By 1215, the barons had had enough.'"}, {"text": "A widespread peasant revolt inspired by new ideas of liberty, forcing the king to grant concessions to all 'free men.'", "isCorrect": false, "rationale": "The Magna Carta was primarily the result of a baronial rebellion, not a widespread peasant revolt, and initially, its protections applied only to 'free men,' excluding most of the peasant population (villeins)."}]}, {"question": "Clauses 39 and 40 of the Magna Carta, though initially applicable only to 'free men,' are considered foundational principles in Western history. What enduring idea do these clauses primarily establish?", "options": [{"text": "The divine right of kings to rule without challenge, provided they ensure prosperity.", "isCorrect": false, "rationale": "The Magna Carta, particularly Clauses 39 and 40, fundamentally challenged the idea of a king ruling without challenge by establishing legal limits on his power, contrary to the concept of divine right."}, {"text": "The absolute right of commoners to vote and participate directly in legal judgments.", "isCorrect": false, "rationale": "While the clauses refer to 'lawful judgment of his peers,' this initially applied to 'free men' (primarily barons and knights), not all commoners, and did not establish universal voting rights."}, {"text": "The principle that a ruler's power is limited by law and that individuals have rights to due process and justice.", "isCorrect": true, "rationale": "Clause 39 ('except by the lawful judgment of his peers and the law of the land') and Clause 40 ('To no one will we sell, to no one will we deny or delay, right or justice') establish the groundbreaking idea that even the king is subject to law and that individuals have rights to legal process and timely justice, thus limiting arbitrary power."}, {"text": "The requirement for all legal documents to be written in English for public accessibility.", "isCorrect": false, "rationale": "The Magna Carta was originally written in Latin, not English. This specific requirement is not among the foundational principles established by Clauses 39 and 40."}]}, {"question": "The text states that the Magna Carta’s principle 'proved explosive' and that later generations could point to it to argue against a ruler's overstepping. This illustrates Magna Carta's role as a:", "options": [{"text": "Precedent for future monarchs to unilaterally impose taxes without baronial consent.", "isCorrect": false, "rationale": "The Magna Carta was specifically created to *limit* the king's arbitrary power, including his ability to impose taxes without consent, and therefore it did not set a precedent for unilateral taxation."}, {"text": "Static document that precisely defined the unchanging legal rights of all citizens throughout history.", "isCorrect": false, "rationale": "The text notes its initial limitations ('only to free men') and how later generations 'needed to argue' using it, indicating it was not static but rather a principle that was interpreted and applied to expanding groups over time."}, {"text": "Flexible legal tool that could be invoked and reinterpreted by subsequent generations to challenge arbitrary power and advocate for expanded rights.", "isCorrect": true, "rationale": "The text explains that 'Every time a later generation needed to argue that the ruler was overstepping, they could point to Magna Carta and say: the king himself agreed to this.' This highlights its enduring adaptability and utility as a foundational argument against arbitrary power."}, {"text": "Symbolic gesture that had little practical impact on limiting royal authority after its initial signing.", "isCorrect": false, "rationale": "The text directly contradicts this by stating it 'proved explosive' and was a 'foundational moment in the history of constitutional government,' indicating significant and practical impact beyond mere symbolism."}]}, {"question": "The 'teachernote' for The Song of Roland asks students to compare Roland's Christian heroism to Beowulf's pagan heroism. What is identified as a key differentiating element in Roland's story that elevates his death beyond mere heroic sacrifice?", "options": [{"text": "Roland's tactical brilliance in battle, ensuring a strategic victory despite his personal loss.", "isCorrect": false, "rationale": "Roland's refusal to blow the horn early on led to his rearguard being overwhelmed and slaughtered; it was not a display of tactical brilliance leading to victory."}, {"text": "The secular celebration of his strength and martial prowess by his companions and king.", "isCorrect": false, "rationale": "While Roland's strength and prowess are celebrated, the 'teachernote' specifically asks about the *Christian element* as the differentiator, which goes beyond secular celebration."}, {"text": "The depiction of his death as a martyrdom, where his soul is borne to Paradise by angels, connecting his struggle to a larger divine cause.", "isCorrect": true, "rationale": "The 'keyconcept' box and 'teachernote' explicitly state: 'His death is not merely tragedy—it is martyrdom, attended by angels. ...can a warrior be a saint? The answer, for the medieval Christian knight, was yes—if his violence is directed against the enemies of the faith and his soul is surrendered to God.' This is the distinct Christian element."}, {"text": "His profound grief and bitterness over his failure to protect his sword, Durendal.", "isCorrect": false, "rationale": "Roland does express grief, but this personal emotion is not highlighted as the *differentiating Christian element* that elevates his death to something distinct from pagan heroism in the context of the 'teachernote' discussion."}]}, {"question": "The section concludes by stating that The Song of Roland, William of Malmesbury, and the Magna Carta collectively 'remind us that every age has its ideals, its tragedies, and its moments when the oppressed find a way to say: this is not right, and it must stop.' Which statement best synthesizes the core lesson derived from reading these three texts together?", "options": [{"text": "Military prowess and legal codes are the sole determinants of historical progress and societal change.", "isCorrect": false, "rationale": "This option is too narrow, as it omits the significant role of cultural identity (William of Malmesbury), personal honor and ideals (Song of Roland), and the human struggle against injustice beyond just legal codes."}, {"text": "Historical narratives are always subjective and primarily serve to justify the actions of the ruling class.", "isCorrect": false, "rationale": "While narratives can be subjective, William of Malmesbury offers a complex, multi-sided view, and the Magna Carta represents a challenge *to* the ruling class, not a justification *of* it."}, {"text": "Even amidst grand ideals and the costs of conquest, humanity consistently struggles with defining justice, limiting power, and upholding honor.", "isCorrect": true, "rationale": "This option synthesizes the key themes: The Song of Roland (ideals, honor), William of Malmesbury (costs of conquest, justice for the conquered), and the Magna Carta (limiting power, fighting injustice). It captures the ongoing human struggles highlighted by all three 'voices.'"}, {"text": "The feudal system, despite its flaws, was ultimately successful in maintaining social order and preventing widespread dissent.", "isCorrect": false, "rationale": "The Magna Carta specifically details widespread baronial dissent against King John's arbitrary power, indicating that the feudal system did not always prevent such challenges to social order."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
