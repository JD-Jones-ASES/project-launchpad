<script>
var QUESTIONS = [{"question": "According to the introduction, why is engaging with the primary sources of the Reformers crucial for understanding the Protestant Reformation?", "options": [{"text": "Because they provide definitive proof of political motivations behind the movement.", "isCorrect": false, "rationale": "The text emphasizes that Reformers were pastors and scholars, not primarily politicians at the beginning, and their concern was the eternal fate of souls. While there were political ramifications, the primary reason given for studying the sources is theological and argumentative."}, {"text": "To appreciate the artistic merit and literary techniques of sixteenth-century writing.", "isCorrect": false, "rationale": "While some Reformation writings had literary merit (like Cranmer's), the introduction states that the primary purpose of reading these sources is to understand the actual arguments about salvation, frustrations with the Church, and visions of reformed Christian life, which were believed to affect the eternal fate of souls."}, {"text": "To grasp the specific theological arguments, frustrations, and visions that drove the Reformers, as they believed the eternal fate of souls depended on them.", "isCorrect": true, "rationale": "The introduction explicitly states, 'To understand the Reformation, you have to read what the Reformers actually wrote—their arguments about salvation, their frustrations with the Church, their visions of a reformed Christian life. The documents in this section... are the voices of men who believed the eternal fate of souls depended on getting the answer right.'"}, {"text": "They serve primarily as dry historical records that catalog events chronologically.", "isCorrect": false, "rationale": "The text directly contradicts this, stating, 'The documents in this section are not dry historical records. They are the voices of men who believed the eternal fate of souls depended on getting the answer right.'"}], "id": "q01"}, {"question": "Martin Luther's Ninety-Five Theses challenged the sale of indulgences. Which of the following theses directly critiques the popular belief that buying an indulgence immediately releases a soul from purgatory?", "options": [{"text": "Thesis 1: 'When our Lord and Master Jesus Christ said “Repent” (Matt. 4:17), He willed that the entire life of believers should be one of repentance.'", "isCorrect": false, "rationale": "Thesis 1 focuses on the concept of lifelong repentance, arguing against shortcuts to salvation, but does not directly address the 'money clinks' belief about purgatory."}, {"text": "Thesis 5: 'The Pope neither desires nor is able to remit any penalties except those imposed by his own authority or by that of the canons.'", "isCorrect": false, "rationale": "Thesis 5 discusses the limits of papal authority regarding penalties but does not specifically target the immediate release from purgatory via payment."}, {"text": "Thesis 27: 'They preach mere human folly who say that as soon as the money clinks in the chest, the soul flies out of purgatory.'", "isCorrect": true, "rationale": "Thesis 27 is a direct and explicit refutation of the specific sales pitch attributed to indulgence sellers like Tetzel, clearly stating that the idea of a soul flying out of purgatory upon payment is 'mere human folly.'"}, {"text": "Thesis 86: 'Again: Why does not the Pope, whose wealth today is greater than the richest of the rich, build this one Basilica of St. Peter's with his own money rather than with the money of poor believers?'", "isCorrect": false, "rationale": "Thesis 86 is a political and moral critique of papal wealth and the financing of St. Peter's Basilica, not a direct challenge to the theological efficacy of indulgences for souls in purgatory."}], "id": "q02"}, {"question": "In his *Address to the Christian Nobility of the German Nation*, Luther used the metaphor of 'three walls' built by the Romanists. What was the primary purpose of these 'walls'?", "options": [{"text": "To establish a clear separation between spiritual and secular governance.", "isCorrect": false, "rationale": "While the first wall deals with spiritual vs. temporal power, the overall purpose of all three walls, as presented by Luther, was not to simply separate powers but to 'protect themselves so that no one has been able to reform them.'"}, {"text": "To ensure the Pope's exclusive right to interpret Scripture and doctrine for all believers.", "isCorrect": false, "rationale": "This describes the second wall, but it's only one of three, and the overall purpose was broader than just this one right."}, {"text": "To defend the Roman Church from any attempts at reform or challenge to its authority.", "isCorrect": true, "rationale": "Luther explicitly states that the Romanists 'have built three walls around themselves, by which they have hitherto protected themselves so that no one has been able to reform them; whereby all Christendom has suffered terribly.' This clearly indicates the walls were mechanisms to resist reform."}, {"text": "To prevent common people from accessing the Bible and participating in church councils.", "isCorrect": false, "rationale": "The walls related to the Pope's exclusive interpretation of Scripture and the Pope's exclusive right to call a council, which indirectly affected common people, but the direct purpose of the walls was to protect the hierarchy from reform, not simply to restrict access for laypeople."}], "id": "q03"}, {"question": "If a German prince in the 16th century wished to reform the church within his own territory but faced resistance from the Roman Church hierarchy, which of Luther's 'three walls' would he most directly need to challenge to assert his right to enact such reforms?", "options": [{"text": "The wall claiming that no one can call a council but the Pope.", "isCorrect": false, "rationale": "Challenging this wall would enable broader Church reform through a council, but it wouldn't directly empower a *secular ruler* to initiate reforms in his *own territory* if the Church claimed immunity from his authority."}, {"text": "The wall asserting that the interpretation of the Scriptures belongs to the Pope alone.", "isCorrect": false, "rationale": "This wall relates to theological authority. While crucial for the overall Reformation, it does not directly address the *jurisdictional power* of a secular prince to reform the church in his domain."}, {"text": "The wall stating that the spiritual power is above the temporal power and has no temporal jurisdiction over it.", "isCorrect": true, "rationale": "Luther's first wall explicitly states that 'the temporal power has no jurisdiction over them, but, on the contrary, that the spiritual is above the temporal power.' For a secular prince to reform the Church in his territory, he would first need to assert his temporal authority *over* the spiritual powers within his domain, directly challenging this first wall."}, {"text": "The wall symbolizing papal infallibility in all matters of faith and morals.", "isCorrect": false, "rationale": "While related to papal authority, the text does not list 'papal infallibility' as one of the 'three walls' in this specific section. The closest would be the Pope's exclusive right to interpret Scripture, but the first wall is the most direct barrier to temporal rulers' jurisdiction over the Church."}], "id": "q04"}, {"question": "John Calvin's doctrine of predestination, as described in the *Institutes of the Christian Religion*, emphasizes that salvation is entirely God's free gift. How does this doctrine *go further* than Luther's *sola gratia* ('by grace alone') in explaining God's role in salvation?", "options": [{"text": "It suggests that individuals can earn their salvation through good works if they are among the 'elect.'", "isCorrect": false, "rationale": "Calvin's doctrine, like Luther's *sola gratia*, adamantly denies that salvation can be earned by human works. It emphasizes God's sovereign choice as the sole basis."}, {"text": "It asserts that God actively and eternally determines who will be saved and who will be condemned, rather than merely offering grace to all who believe.", "isCorrect": true, "rationale": "The text explains that Calvin's predestination is an 'eternal decree of God, by which He determined in Himself what He wished to happen with regard to every man,' specifically stating 'some are preordained to eternal life, others to eternal damnation.' This proactive, eternal determination of individuals is where it extends beyond a general offer of grace."}, {"text": "It implies that God's mercy is arbitrary and cruel, lacking any discernible reason for His choices.", "isCorrect": false, "rationale": "The *teachernote* explicitly states, 'Calvin is not arguing that God is arbitrary or cruel. He is arguing that salvation is entirely God's free gift—that no one deserves it and no one earns it, and therefore the only reason anyone is saved at all is God’s sovereign mercy.'"}, {"text": "It proposes that human free will plays a significant role in accepting or rejecting God's grace, thus affecting predestination.", "isCorrect": false, "rationale": "Calvin's doctrine of predestination largely minimizes human free will in salvation, asserting God's sovereign choice as the determining factor, contrasting with an emphasis on human acceptance or rejection."}], "id": "q05"}, {"question": "What was Thomas Cranmer's most significant contribution to the English Reformation, as described in the text?", "options": [{"text": "Translating the Bible into English, making it accessible to the common people.", "isCorrect": false, "rationale": "While Bible translation was a significant part of the Reformation, Cranmer's primary contribution noted here was the *Book of Common Prayer*, which influenced English writing 'almost as profoundly as the King James Bible,' implying the KJB was the main Bible translation."}, {"text": "Serving as a fiery preacher who directly challenged the Pope's authority through sermons.", "isCorrect": false, "rationale": "This description aligns more with Luther's style, not Cranmer's role as the architect of worship life and author of the *Book of Common Prayer*."}, {"text": "Composing the *Book of Common Prayer*, an English liturgy that blended Reformed theology with traditional worship aesthetics and profoundly influenced the English language.", "isCorrect": true, "rationale": "The text explicitly states, 'He was the architect of the English Reformation's worship life, producing the Book of Common Prayer (1549)—a liturgy in English that gave the English church a distinctive voice combining Reformed theology with the beauty of the Latin tradition.' It also notes its influence on English writing."}, {"text": "Establishing a system of state-controlled education to spread Protestant doctrine.", "isCorrect": false, "rationale": "The text does not mention Cranmer's involvement in establishing state-controlled education."}], "id": "q06"}, {"question": "The Collect for Purity from the *Book of Common Prayer* begins with the lines: 'Almighty God, unto whom all hearts be open, all desires known, and from whom no secrets are hid.' What theological statement does this opening clause primarily convey about prayer?", "options": [{"text": "It suggests that God only listens to prayers spoken with complete sincerity and transparency.", "isCorrect": false, "rationale": "While sincerity is valued, the statement is not about God *only listening* but rather about God's inherent knowledge of all thoughts and desires, making pretense in prayer impossible. The 'no secrets are hid' part is key."}, {"text": "It serves as a polite and formal address to God, typical of traditional liturgical language.", "isCorrect": false, "rationale": "The *teachernote* specifically states, 'This is not merely a polite opening—it is a theological statement about the nature of prayer. You cannot pretend with God.'"}, {"text": "It underscores God's omniscience and the idea that true prayer requires complete honesty and transparency, as nothing can be hidden from Him.", "isCorrect": true, "rationale": "The *teachernote* clarifies this, stating, 'This is not merely a polite opening—it is a theological statement about the nature of prayer. You cannot pretend with God,' directly implying God's omniscience and the need for honesty."}, {"text": "It indicates that God expects believers to confess every single secret thought before praying for anything else.", "isCorrect": false, "rationale": "While it calls for honesty, it doesn't necessarily impose a prerequisite of confessing *every* secret thought explicitly before *any* prayer, but rather highlights God's pre-existing knowledge and the futility of hiding anything from Him."}], "id": "q07"}, {"question": "The General Confession from the *Book of Common Prayer* includes the line, 'And there is no health in us.' This statement, alongside the prayer's overall tone, strongly aligns with which core Reformation theological principle?", "options": [{"text": "Sola Scriptura (Scripture alone), emphasizing the Bible as the ultimate authority.", "isCorrect": false, "rationale": "While *Sola Scriptura* is a core Reformation principle, this specific line and the context of the prayer are about human sinfulness and inability, not the authority of scripture."}, {"text": "Sola Fide (faith alone), highlighting that salvation comes through faith, not works.", "isCorrect": false, "rationale": "While related, the phrase 'no health in us' speaks more directly to the human condition of sinfulness and inability to save oneself, which is a prerequisite for understanding *sola gratia*."}, {"text": "Sola Gratia (grace alone), affirming that salvation is entirely God's unmerited favor, as humanity is inherently incapable of earning it.", "isCorrect": true, "rationale": "The *teachernote* explicitly connects 'no health in us' to 'sola gratia,' stating it is 'theologically precise (sola gratia: 'there is no health in us').' This phrase underscores humanity's complete inability to achieve salvation on its own and thus its utter reliance on God's grace."}, {"text": "Solus Christus (Christ alone), asserting that Christ is the only mediator between God and humanity.", "isCorrect": false, "rationale": "While the prayer mentions 'through Christ our Lord,' the specific phrase 'no health in us' and its primary implication is about human inability and the necessity of grace, not primarily Christ's unique mediatorial role."}], "id": "q08"}, {"question": "The *teachernote* connects Cranmer's General Confession to Luther's Thesis 1, which states that 'the entire life of believers should be one of repentance.' What common understanding of the human spiritual condition do these two documents share?", "options": [{"text": "That repentance is a one-time act of conversion that guarantees immediate salvation.", "isCorrect": false, "rationale": "Luther's Thesis 1 explicitly says 'the *entire life* of believers should be one of repentance,' contradicting the idea of a one-time act. The General Confession also implies ongoing struggle with sin."}, {"text": "That human beings are capable of achieving spiritual perfection through consistent effort and adherence to religious rituals.", "isCorrect": false, "rationale": "The General Confession states 'there is no health in us' and speaks of having 'erred, and strayed from thy ways,' indicating an inability to achieve perfection. Luther's thesis also points to a continuous need for repentance, not a path to perfection through effort."}, {"text": "That humanity is in a perpetual state of sinfulness and is in constant need of God's mercy and forgiveness.", "isCorrect": true, "rationale": "The General Confession's litany of sins ('We have erred... We have followed... We have offended... We have left undone... We have done...') and the plea 'have mercy upon us, miserable offenders' clearly expresses a continuous state of sinfulness. This aligns with Luther's view that repentance is a lifelong process because human nature remains fallen."}, {"text": "That forgiveness is primarily granted through the Church's sacramental system and hierarchical authority.", "isCorrect": false, "rationale": "While both documents operate within a Christian framework, their emphasis, particularly the General Confession's plea for mercy 'According to thy promises declared unto mankind in Christ Jesu our Lord,' leans towards direct divine grace and personal repentance rather than solely through hierarchical church mechanisms."}], "id": "q09"}, {"question": "The *teachernote* for Calvin's section mentions that 'Many Reformation-era Christians found predestination deeply comforting... while others found it terrifying.' Which of the following best explains why some might find it comforting?", "options": [{"text": "It implied that their good deeds and moral living would guarantee their election.", "isCorrect": false, "rationale": "Calvin's doctrine explicitly states salvation is God's 'free gift' and 'no one earns it,' meaning good deeds are not the *cause* of election but rather a *result* or *evidence* of it, not the guarantee itself."}, {"text": "It suggested that if God had chosen them from eternity, nothing, including their own failings, could ultimately separate them from salvation.", "isCorrect": true, "rationale": "The *teachernote* directly states this: 'Many Reformation-era Christians found predestination deeply comforting (if God chose you from eternity, nothing can unsave you).' This provides a profound sense of security in their eternal destiny."}, {"text": "It meant they were exempt from the need for repentance and living a godly life.", "isCorrect": false, "rationale": "Both Luther and Calvin emphasized the importance of a reformed, godly life as a response to grace, not an exemption from it. The General Confession, for example, prays for a 'godly, righteous, and sober life hereafter.'"}, {"text": "It validated their belief that they could choose God, and therefore their salvation was a result of their own decision.", "isCorrect": false, "rationale": "Calvin's doctrine of predestination emphasizes God's sovereign choice as primary, rather than human free will in choosing God. Salvation flows from God's eternal election, not human decision."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
