    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introduction, what is the fundamental challenge historians encounter when relying on eyewitness accounts?", "options": [{"text": "Eyewitnesses deliberately falsify facts to serve their own agendas.", "isCorrect": false, "rationale": "While agendas can influence accounts, the text states eyewitnesses 'interpret what they saw through the lenses of their culture, their loyalties, and their assumptions,' not necessarily that they deliberately falsify facts."}, {"text": "Eyewitnesses interpret events through personal biases, making purely objective reporting difficult.", "isCorrect": true, "rationale": "The introduction explicitly states, 'eyewitnesses do not simply report what happened. They interpret what they saw through the lenses of their culture, their loyalties, and their assumptions,' highlighting the inherent subjectivity."}, {"text": "Eyewitnesses often lack the technological means to record events accurately.", "isCorrect": false, "rationale": "The text mentions writing technology in relation to Robert the Monk's account not being verbatim, but the fundamental challenge is about interpretation, not technological limitation for reporting 'what happened'."}, {"text": "Eyewitnesses only provide factual data, lacking any interpretive depth.", "isCorrect": false, "rationale": "This is the opposite of what the text states. The problem is precisely that eyewitnesses *do* interpret, adding depth but also bias."}], "id": "q01"}, {"question": "Based on the 'Problem of the Eyewitness,' how does the text advise historians to approach multiple, potentially conflicting, accounts of the same historical event?", "options": [{"text": "Prioritize the account written closest to the actual events for maximum accuracy.", "isCorrect": false, "rationale": "While proximity in time can be a factor, the text emphasizes interpretation and bias, meaning even contemporary accounts can differ widely. The advice is more nuanced than simply picking the earliest."}, {"text": "Disregard all eyewitness accounts due to their inherent unreliability and bias.", "isCorrect": false, "rationale": "The text explicitly states the answer is 'not “none of them”' but '“all of them, carefully, together.”'"}, {"text": "Trust a single, most reputable eyewitness while dismissing others.", "isCorrect": false, "rationale": "The text argues against trusting a single voice alone, emphasizing the need for multiple perspectives."}, {"text": "Analyze all accounts critically and comparatively, using them together to construct a fuller understanding.", "isCorrect": true, "rationale": "The text concludes by stating the answer to 'whose account do we trust?' is '“all of them, carefully, together,”' implying critical comparison and synthesis."}], "id": "q02"}, {"question": "Robert the Monk's account of Pope Urban II's speech is best characterized as:", "options": [{"text": "A verbatim transcription recorded with medieval technology.", "isCorrect": false, "rationale": "The text explicitly states, 'Robert's account of Urban's speech is not a verbatim transcript—writing was not that kind of technology in the Middle Ages.'"}, {"text": "A neutral, objective report of the speech's political impact.", "isCorrect": false, "rationale": "Robert was a 'believer writing for believers' and his account was 'polished, powerful, and clearly shaped by the values of a man who believed every word of it,' indicating it was far from neutral or objective."}, {"text": "A literary reconstruction shaped by his faith and memory, intended for believers.", "isCorrect": true, "rationale": "The text describes it as 'a literary reconstruction: Robert wrote down what he remembered, what others told him, and what he believed Urban had said,' shaped by his values and written 'for believers.'"}, {"text": "A skeptical analysis questioning the Pope's motives for calling the Crusade.", "isCorrect": false, "rationale": "Robert was a faithful Benedictine who believed the Crusade was God's will, not a skeptic questioning the Pope's motives."}], "id": "q03"}, {"question": "The teacher's note suggests that Robert the Monk's version of Urban II's speech included an economic argument about Western Europe being 'overcrowded.' What does this inclusion primarily reveal about Robert's understanding or the historical dynamics of the First Crusade?", "options": [{"text": "Robert's desire to exaggerate the poverty in Europe to make the Crusade seem more heroic.", "isCorrect": false, "rationale": "While Robert shaped the speech, the text suggests this element 'accurately reflects the real dynamics,' rather than being an exaggeration for heroic effect."}, {"text": "A subtle critique by Robert of the Pope's focus on material gains over spiritual ones.", "isCorrect": false, "rationale": "Robert was a devout believer who saw the Crusade as 'God's will,' not a critic of its spiritual purity."}, {"text": "Robert's awareness that practical concerns like land and population pressure motivated some Crusaders alongside religious fervor.", "isCorrect": true, "rationale": "The teacher's note states, 'Many historians believe this accurately reflects the real dynamics: younger sons who could not inherit, knights who needed land, and populations that had grown beyond their agricultural base.' This shows an understanding of the mixed motivations."}, {"text": "That Urban II's actual speech was primarily focused on economic relief rather than religious liberation.", "isCorrect": false, "rationale": "The text says Urban's offer was controversial and theological boundaries were not always defined, but it does not suggest the speech was *primarily* economic. It was an argument 'alongside a religious one.'"}], "id": "q04"}, {"question": "In medieval Catholic theology, what was the primary purpose of an indulgence, as offered to participating Crusaders by Urban II?", "options": [{"text": "To grant immediate entry into heaven, bypassing purgatory entirely.", "isCorrect": false, "rationale": "An indulgence remitted temporal punishment, but did not guarantee immediate entry to heaven, nor did it bypass the need for prior forgiveness of sins."}, {"text": "To provide full remission of all past and future sins, eliminating the need for confession.", "isCorrect": false, "rationale": "The definition states it was for 'sins *already forgiven* in confession' and did not remit future sins. It reduced a 'debt to be paid,' not eliminated the need for confession."}, {"text": "To release individuals from the temporal punishment due for sins already forgiven through confession.", "isCorrect": true, "rationale": "The definition clearly states an indulgence was 'a remission of the temporal punishment due for sins already forgiven in confession,' and that 'indulgences reduced this debt.'"}, {"text": "To allow Crusaders to commit new sins without incurring divine wrath, as long as they were fighting pagans.", "isCorrect": false, "rationale": "This is an abuse/misunderstanding of indulgences, which remitted punishment for past, forgiven sins, not granted license for future ones."}], "id": "q05"}, {"question": "Which statement most accurately describes Geoffrey of Villehardouin's perspective on the Fourth Crusade's sack of Constantinople?", "options": [{"text": "He expressed deep remorse and moral horror over the destruction of a Christian city.", "isCorrect": false, "rationale": "The text states he described the sack 'with the detachment of a man cataloguing treasure, not with the horror of a man who has just helped destroy the crown jewel of Christendom.' He expressed 'no doubt about whether what he had done was right.'"}, {"text": "He presented a detached, almost celebratory account, focusing on the material gains and divine validation of the 'victory.'", "isCorrect": true, "rationale": "Villehardouin 'catalogs the loot with visible satisfaction,' calls it a 'victory God had vouchsafed to them,' and expresses 'no doubt about whether what he had done was right.' This reflects a detached and celebratory tone regarding the gains."}, {"text": "He critically analyzed the political missteps that led to the diversion of the Crusade to Constantinople.", "isCorrect": false, "rationale": "He tells 'what happened with considerable clarity' but does not 'always see—or will not say—is how morally disastrous it was,' which includes the missteps."}, {"text": "He questioned the legitimacy of calling the Crusaders 'pilgrims' after their actions.", "isCorrect": false, "rationale": "On the contrary, he himself called the Crusaders 'Pilgrims' and the sack a 'victory God had given them,' without questioning the terms."}], "id": "q06"}, {"question": "The text states Villehardouin was 'remarkable not for his piety but for his honesty—in a limited sense.' What does this 'limited sense' primarily refer to in his account of the Fourth Crusade?", "options": [{"text": "His willingness to admit to acts of cowardice during battle.", "isCorrect": false, "rationale": "The text does not mention his honesty about cowardice, but rather his selective vision regarding the moral implications of the Crusade."}, {"text": "His failure to acknowledge or critically assess the moral implications and devastation caused by the Crusaders' actions.", "isCorrect": true, "rationale": "The text explains his 'limited sense' as his inability to 'always see—or will not say—is how morally disastrous it was,' focusing instead on cataloging treasure and celebrating the 'victory' without moral reflection."}, {"text": "His inaccurate reporting of the numerical strength of the Byzantine forces.", "isCorrect": false, "rationale": "The text notes he tells 'what happened with considerable clarity' regarding events, but not about moral assessment."}, {"text": "His overt criticism of the Pope's authority in diverting the Crusade.", "isCorrect": false, "rationale": "Villehardouin saw the actions as a 'victory God had vouchsafed to them,' showing no criticism of the diversion or the authorities involved."}], "id": "q07"}, {"question": "How does Geoffrey of Villehardouin's account best illustrate 'The Problem of Self-Justification in History'?", "options": [{"text": "He meticulously documented the negative consequences of the Crusade, despite his personal involvement.", "isCorrect": false, "rationale": "Villehardouin did not document the negative consequences; he overlooked them, focusing on the 'booty' and 'victory.'"}, {"text": "He openly confessed to the atrocities committed, demonstrating deep regret for his actions.", "isCorrect": false, "rationale": "The text states he 'does not express any doubt about whether what he had done was right,' indicating no confession or regret."}, {"text": "He portrayed the looting and destruction of Constantinople as a divinely sanctioned 'victory' and source of 'great gain,' seemingly without moral doubt.", "isCorrect": true, "rationale": "The key concept states, 'Most people who do terrible things believe they have good reasons. Villehardouin genuinely seems to have believed the Fourth Crusade was a holy enterprise, even as he helped loot a Christian city.' He interpreted the events as a 'victory God had vouchsafed to them' and a source of 'great gain,' effectively self-justifying the actions."}, {"text": "He used his narrative to explicitly criticize the motivations of other Crusaders, while exempting himself.", "isCorrect": false, "rationale": "Villehardouin did not criticize other Crusaders' motivations, and he included himself in the general narrative of victory and gain."}], "id": "q08"}, {"question": "Despite being fellow Christians, how did Anna Komnene primarily characterize the Crusaders from the Byzantine perspective?", "options": [{"text": "As disciplined, sophisticated allies who respected Byzantine customs and theology.", "isCorrect": false, "rationale": "Anna viewed them as 'violent, undisciplined, greedy, and theologically unsophisticated,' which is the opposite of disciplined and sophisticated."}, {"text": "As heroic liberators fulfilling God's will to reclaim the Holy Land.", "isCorrect": false, "rationale": "For Anna, the Crusaders were 'not heroic liberators.' She saw them as destabilizing and greedy, not divine agents."}, {"text": "As violent, greedy, undisciplined 'barbarians' whose presence was destabilizing.", "isCorrect": true, "rationale": "The text explicitly states, 'For Anna, the Crusaders were not heroic liberators. They were barbarians: violent, undisciplined, greedy, and theologically unsophisticated.'"}, {"text": "As humble supplicants seeking military guidance and resources from the superior Byzantine Empire.", "isCorrect": false, "rationale": "Anna saw them as 'bold, but unpredictable; moved by religion, but also by greed; as likely to demand favors as to render them,' not humble supplicants."}], "id": "q09"}, {"question": "Anna Komnene's portrayal of the Crusaders as 'Franks' and her emphasis on their 'strange theology' and alien customs primarily serves to highlight what crucial historical reality?", "options": [{"text": "The shared cultural identity and unified political goals of all Christian nations in the medieval era.", "isCorrect": false, "rationale": "Anna's perspective explicitly contradicts the idea of shared identity, emphasizing division. The teacher's note clarifies this point."}, {"text": "The internal theological disputes within the Western Church that led to the Protestant Reformation.", "isCorrect": false, "rationale": "While theology is mentioned, Anna's focus is on the difference between Eastern and Western Christianity, not internal Western disputes that would lead to the Reformation centuries later."}, {"text": "The significant cultural, political, and theological chasm that existed between the Eastern and Western branches of 'Christendom.'", "isCorrect": true, "rationale": "The teacher's note directly addresses this: 'Anna calls the Crusaders “Franks”... This reminds us that “Christendom” was not a unified civilization. The Eastern and Western churches had been drifting apart for centuries.'"}, {"text": "The Byzantine Empire's outright rejection of Christianity in favor of a new, unique religious identity.", "isCorrect": false, "rationale": "The Byzantine Empire was deeply Christian; Anna's account highlights differences within Christianity, not a rejection of it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
