    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did the Crusades fundamentally alter the nature of pilgrimage to Jerusalem?", "options": [{"text": "They made the journey inaccessible to all but military personnel.", "isCorrect": false, "rationale": "The text states that the Crusades made pilgrimage 'far more common,' indicating increased accessibility, not restriction."}, {"text": "They transformed it from a personal spiritual journey into a military expedition.", "isCorrect": true, "rationale": "The text explicitly states: 'The Crusades transformed pilgrimage from a personal spiritual journey into a military expedition.'"}, {"text": "They shifted the primary travel routes away from ancient Roman roads and established trade routes.", "isCorrect": false, "rationale": "The text clarifies that the Crusaders 'followed ancient Roman roads and established trade routes,' not that they abandoned them."}, {"text": "They ensured all pilgrims received military training before departing.", "isCorrect": false, "rationale": "While pilgrimage became a military expedition, the text does not state that all individual pilgrims received military training, focusing instead on the changed character of the journey itself."}]}, {"question": "The text suggests that contact with Islamic civilization during the Crusades was significant because:", "options": [{"text": "It introduced Western Europeans to a culture primarily focused on agricultural advancements.", "isCorrect": false, "rationale": "The text highlights Islamic advancements in mathematics, medicine, astronomy, architecture, and philosophy, not primarily agriculture."}, {"text": "It was the first time Western Europeans encountered any non-Christian culture.", "isCorrect": false, "rationale": "The text states it was for many Crusaders their 'first real encounter with a culture that... was in many ways more sophisticated,' implying prior contact with other cultures, but not necessarily this level of sophistication."}, {"text": "Islamic society in the eleventh and twelfth centuries was often more sophisticated than its Western European counterpart.", "isCorrect": true, "rationale": "The text explicitly states that Islamic culture 'was in many ways more sophisticated than their own' (Western European culture)."}, {"text": "Western Europeans provided crucial scientific and philosophical knowledge to the Islamic world.", "isCorrect": false, "rationale": "The text describes the opposite: Arab scholars preserved and extended Greek knowledge which was then transferred to the West."}]}, {"question": "Which of the following represents a direct intellectual or technological contribution from the Islamic world to Europe, as described in the text?", "options": [{"text": "The concept of representative government and legal codes.", "isCorrect": false, "rationale": "The text does not mention these as contributions from the Islamic world to Europe during this period."}, {"text": "The development of gunpowder and the printing press.", "isCorrect": false, "rationale": "These innovations are typically associated with China, and are not attributed to the Islamic world in this section."}, {"text": "Arabic numerals, algebra, the astrolabe, and the pointed arch.", "isCorrect": true, "rationale": "The text specifically lists Arabic numerals, algebra, the astrolabe, and the pointed arch as contributions from the Islamic world to Europe."}, {"text": "The invention of the compass and the longbow.", "isCorrect": false, "rationale": "These are not listed as contributions from the Islamic world to Europe in the provided text."}]}, {"question": "The economic prosperity generated by the accelerated spice trade during the Crusade era had a profound long-term impact on Europe primarily by:", "options": [{"text": "Enabling the widespread adoption of Eastern agricultural techniques.", "isCorrect": false, "rationale": "While agricultural exchange might have occurred, the text highlights the funding of the Renaissance as the primary long-term impact of this wealth."}, {"text": "Funding the cultural and intellectual movement known as the Renaissance.", "isCorrect": true, "rationale": "The text explicitly states, 'This trade enriched the Italian city-states enormously, and it was this wealth that would eventually fund the Renaissance.'"}, {"text": "Shifting European economic centers from Italy to Northern Europe.", "isCorrect": false, "rationale": "The trade 'enriched the Italian city-states enormously,' making them centers of wealth, not shifting them away."}, {"text": "Eliminating the need for precious metals like silver and gold in European markets.", "isCorrect": false, "rationale": "The text states the East primarily wanted 'silver and gold' from Europe, indicating their continued value and demand."}]}, {"question": "According to the text, what was a primary commodity that the Islamic world sought from Europe during the Crusade era?", "options": [{"text": "Spices and fine cotton.", "isCorrect": false, "rationale": "Spices and fine cotton were desired by Europeans from the East, not the other way around."}, {"text": "Silver, gold, and timber.", "isCorrect": true, "rationale": "The text explicitly states: 'What did the East want from Europe? Primarily silver and gold...Also timber (the Levant was deforested), iron, wool, and weapons.'"}, {"text": "Advanced medical texts and astronomical instruments.", "isCorrect": false, "rationale": "These were intellectual and technological contributions from the Islamic world to Europe, not goods the East wanted from Europe."}, {"text": "Gothic architectural designs and castle-building expertise.", "isCorrect": false, "rationale": "European architecture, including Gothic elements, borrowed from Islamic designs, rather than the Islamic world seeking European designs."}]}, {"question": "The development of the concentric castle in the Crusader states was primarily a response to what challenge?", "options": [{"text": "The need for more aesthetically pleasing and less functional strongholds.", "isCorrect": false, "rationale": "The text emphasizes practical military necessity, such as defense against overwhelming numbers, not aesthetics."}, {"text": "The desire to emulate Roman military encampments for prestige.", "isCorrect": false, "rationale": "The text states Crusaders learned from Byzantine and Arab fortification, driven by immediate defensive needs, not Roman emulation."}, {"text": "The requirement to defend large territories with small garrisons against numerically superior enemies.", "isCorrect": true, "rationale": "The text explains the concentric castle was developed as a response to 'a dry landscape, hostile on all sides, where small garrisons had to hold large territories against enemies who outnumbered them many times over.'"}, {"text": "A shift in European warfare favoring light cavalry over siege engines.", "isCorrect": false, "rationale": "The design of concentric castles, with features like multiple walls and granaries for sieges, suggests a continued threat from siege warfare, not its decline."}]}, {"question": "The passage highlights the Krak des Chevaliers as an exemplary Crusader castle. How did the innovations seen in such castles impact European military architecture?", "options": [{"text": "They led to a complete abandonment of stone castles in favor of timber motte-and-bailey designs.", "isCorrect": false, "rationale": "The Crusaders arrived with motte-and-bailey castles and then developed the more advanced stone concentric castles; they didn't revert."}, {"text": "They primarily influenced Byzantine and Islamic fortifications, with little impact on Western Europe.", "isCorrect": false, "rationale": "The text explicitly states the designs 'were brought back to Europe, where it influenced English castle-building,' such as Edward I's Welsh castles."}, {"text": "They were adopted and adapted in Europe, exemplified by castles like Edward I's in Wales, reshaping fortification for centuries.", "isCorrect": true, "rationale": "The text states: 'When the Crusaders returned to Europe, they brought these new architectural ideas with them,' citing Edward I's castles as examples and noting they 'reshaped European fortification for two centuries.'"}, {"text": "Their complex designs proved too expensive and difficult to replicate in Europe, limiting their spread.", "isCorrect": false, "rationale": "The text provides examples of European adoption, like Edward I's castles, contradicting the idea that they were too difficult or expensive to replicate."}]}, {"question": "Which statement best describes the nature of chivalry as presented in the text?", "options": [{"text": "It was a universally adopted and consistently practiced code of conduct by all medieval knights.", "isCorrect": false, "rationale": "The text states it 'was never fully achieved in practice' and 'Most knights fell far short of it,' indicating it wasn't universally or consistently practiced."}, {"text": "It was an aspirational ideal for Christian warriors, combining military skill with moral and social virtues, even if rarely perfectly enacted.", "isCorrect": true, "rationale": "The text describes chivalry as an 'aspirational, not descriptive' ideal, combining military skill, Christian piety, loyalty, and courteous behavior, aiming to impose moral limits on violence."}, {"text": "It primarily served to distinguish European knights from their Islamic counterparts based solely on fighting prowess.", "isCorrect": false, "rationale": "While it was a code for Christian warriors, it also emphasized respect even for enemies (like Saladin), and wasn't solely about fighting prowess but also moral conduct."}, {"text": "Its main function was to regulate trade practices between Christian and Muslim territories during the Crusades.", "isCorrect": false, "rationale": "Chivalry was a code of conduct for knights and warfare, not for regulating trade practices."}]}, {"question": "The 'then and now' section compares Crusade-era Mediterranean trade with Roman trade networks. What was a crucial difference between them?", "options": [{"text": "Roman trade focused exclusively on luxury goods, while Crusade-era trade prioritized necessities.", "isCorrect": false, "rationale": "Roman trade included necessities like grain, wine, and olive oil, as well as luxury goods. Crusade-era trade also included both."}, {"text": "Crusade-era trade was held together by commercial interest among competing powers, unlike Roman trade unified by a single empire's force.", "isCorrect": true, "rationale": "The text states Roman trade was 'held together by Roman military power and Roman law,' while Crusade-era trade was characterized by 'competing powers...achieved a kind of anarchic order through commercial interest.'"}, {"text": "Only Roman networks involved sea routes, whereas medieval trade was exclusively overland.", "isCorrect": false, "rationale": "Both Roman and Crusade-era trade utilized sea routes; the text mentions goods moved 'across the Mediterranean' in both contexts."}, {"text": "The Islamic world was a primary trading partner for the Romans, but not for medieval Europeans.", "isCorrect": false, "rationale": "The text clearly indicates the Islamic world was a vital trading partner for medieval Europeans, providing many desired goods."}]}, {"question": "The passage concludes by highlighting a recurring pattern in Western history: the transfer of knowledge and technology between civilizations, even in conflict. Which of the following best exemplifies this pattern in the context of the Crusades?", "options": [{"text": "The Crusades leading to the complete destruction of all pre-existing knowledge in the Holy Land.", "isCorrect": false, "rationale": "The text argues the opposite, showing how knowledge (like Greek philosophy) was transferred *from* the Islamic world to Europe."}, {"text": "Western Europeans teaching the Islamic world new methods of shipbuilding and navigation.", "isCorrect": false, "rationale": "The text indicates that the astrolabe, a navigational instrument, was a contribution from the Islamic world, suggesting the flow was often in the other direction for such technologies."}, {"text": "The recovery of Greek philosophical texts in Latin translation due to Arab preservation and Crusade-era contact.", "isCorrect": true, "rationale": "The text explicitly states: 'The Crusades accelerated the recovery of Greek philosophical texts in Latin translation—including Aristotle—because Arab scholars had preserved them and now contact between civilizations made them available.'"}, {"text": "The exclusive exchange of military tactics without any broader cultural or intellectual diffusion.", "isCorrect": false, "rationale": "While military architecture was exchanged, the text details extensive cultural and intellectual diffusion in mathematics, medicine, astronomy, architecture, and philosophy, not just military tactics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
