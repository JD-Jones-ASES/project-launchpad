<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "The first recorded Viking raid on the British Isles, which shocked Christian Europe and prompted a dire warning from the monk Alcuin, targeted what specific location?", "options": [{"text": "The royal court of Charlemagne", "isCorrect": false, "rationale": "Charlemagne's court was where Alcuin was writing from, but it was not the target of the raid."}, {"text": "The island monastery of Lindisfarne", "isCorrect": true, "rationale": "The text explicitly states that 'The first Viking raid on the British Isles struck the island monastery of Lindisfarne on June 8, 793.'"}, {"text": "The Anglo-Saxon kingdom of Wessex", "isCorrect": false, "rationale": "Wessex became a primary target later during the Viking invasions, but it was not the site of the first raid described."}, {"text": "The fortified burh of London", "isCorrect": false, "rationale": "London was not a 'burh' at this early stage and was not the site of the first Viking raid mentioned."}], "id": "q01"}, {"question": "Alcuin's interpretation of the Lindisfarne raid as a sign of divine judgment, rather than merely a political or military event, best reflects which aspect of the medieval worldview?", "options": [{"text": "A belief in the inherent superiority of Scandinavian culture and its right to conquer.", "isCorrect": false, "rationale": "Alcuin was appalled by the raid and viewed the Vikings as 'heathens,' not as superior, aligning with a view of divine punishment for England's sins."}, {"text": "The conviction that historical events, especially disasters, were often direct responses from God to human morality and national sin.", "isCorrect": true, "rationale": "The text and accompanying teacher note highlight Alcuin's belief that the raid was 'a sign of divine judgment—that God had permitted the heathens to punish England for its sins,' which is a recurring theme in the medieval understanding of history."}, {"text": "An early form of geopolitical analysis based primarily on economic factors and military strength.", "isCorrect": false, "rationale": "While economic factors contributed to Viking raids, Alcuin's interpretation was theological, not primarily geopolitical or economic."}, {"text": "A detached, objective approach to historical causation, devoid of religious or moral implications.", "isCorrect": false, "rationale": "Alcuin's language ('apocalyptic') and rationale clearly indicate a highly subjective and religiously charged interpretation, not a detached one."}], "id": "q02"}, {"question": "The revolutionary design of the Viking longship directly contributed to which of the following strategic advantages for Viking raiders?", "options": [{"text": "Its massive size allowed it to carry siege engines for attacking heavily fortified castles.", "isCorrect": false, "rationale": "The longship was known for its speed and shallow draft, not its capacity for carrying large siege engines for castle attacks, which were not their primary targets."}, {"text": "Its advanced weaponry enabled long-range naval bombardment of coastal targets.", "isCorrect": false, "rationale": "Viking ships did not possess long-range naval bombardment capabilities; their raids involved direct landings and close-quarters combat."}, {"text": "Its capacity to navigate both open oceans and shallow rivers allowed access to previously unreachable inland targets.", "isCorrect": true, "rationale": "The keyconcept box states the longship 'combined ocean-going capacity with extreme shallowness of draft,' allowing Vikings 'access to targets that no sea power had ever reached before: monasteries and towns far inland, hundreds of miles from the coast.'"}, {"text": "Its stealth technology made it invisible to early warning systems, ensuring surprise attacks.", "isCorrect": false, "rationale": "While surprise was a factor, the longship did not possess 'stealth technology' in the modern sense; its speed and unexpected inland access were its primary advantages."}], "id": "q03"}, {"question": "What marked a significant escalation in Viking activity in England beginning in 865, fundamentally changing the nature of their presence?", "options": [{"text": "The first successful circumnavigation of the British Isles by a Viking fleet.", "isCorrect": false, "rationale": "While Vikings explored widely, the text does not mention a circumnavigation as the defining escalation of 865."}, {"text": "The systematic conquest of Anglo-Saxon kingdoms by the Great Heathen Army.", "isCorrect": true, "rationale": "The text states that 'By 865, the raiding had become invasion. The Great Heathen Army... began the systematic conquest of the Anglo-Saxon kingdoms,' marking a shift from raids to full-scale invasion and occupation."}, {"text": "The establishment of permanent Viking settlements exclusively in the far north of Scotland.", "isCorrect": false, "rationale": "The Great Heathen Army's focus was on the Anglo-Saxon kingdoms of England (Northumbria, East Anglia, Mercia), not exclusively far northern Scotland."}, {"text": "The signing of a peace treaty between all Anglo-Saxon kings and the Viking leaders.", "isCorrect": false, "rationale": "The period beginning in 865 was one of intensified conflict and conquest, not general peace treaties across all kingdoms."}], "id": "q04"}, {"question": "Before his decisive victory at the Battle of Edington, Alfred the Great's situation was characterized by which of the following?", "options": [{"text": "He was leading a successful offensive, having already pushed the Danes out of England.", "isCorrect": false, "rationale": "Alfred's offensive came after his period of hiding; before Edington, he was on the defensive and in retreat."}, {"text": "He controlled all four Anglo-Saxon kingdoms, having unified them against the invaders.", "isCorrect": false, "rationale": "At this point, only Wessex remained unconquered, and Alfred was struggling to defend it. The unification happened much later."}, {"text": "He had been driven from his kingdom and was hiding in the marshes of Somerset, calling for his militia.", "isCorrect": true, "rationale": "The text describes Alfred being 'driven from his kingdom' by King Guthrum and fleeing 'into the marshes of Somerset at a place called Athelney,' from where he 'sent messengers throughout Wessex, calling the fyrd—the Anglo-Saxon militia—to meet him.'"}, {"text": "He was negotiating a peaceful settlement that would give the Danes permanent control of Wessex.", "isCorrect": false, "rationale": "Alfred's actions at this point were about military resistance and regaining his kingdom, not surrendering Wessex through negotiation."}], "id": "q05"}, {"question": "The Treaty of Wedmore (878) and the subsequent establishment of the Danelaw primarily represented which outcome of Alfred's victory?", "options": [{"text": "A complete and permanent expulsion of all Viking forces from England.", "isCorrect": false, "rationale": "The Treaty of Wedmore did not expel all Vikings; it established a defined area (the Danelaw) where Danish law and custom prevailed."}, {"text": "The permanent unification of all Anglo-Saxon kingdoms under Alfred's direct rule.", "isCorrect": false, "rationale": "While Alfred became powerful, the Treaty established a division, not immediate unification of all Anglo-Saxon kingdoms. Unification was achieved by his descendants."}, {"text": "A division of England into an Anglo-Saxon south and west and a Danish north and east, with Viking leaders converting to Christianity.", "isCorrect": true, "rationale": "The text states the Treaty 'divided England into an Anglo-Saxon south and west and a Danish north and east' and that Guthrum 'agreed to convert to Christianity' with Alfred as godfather."}, {"text": "An agreement for annual tribute payments from Wessex to the Great Heathen Army.", "isCorrect": false, "rationale": "The Treaty of Wedmore was a result of Alfred's victory, establishing boundaries and religious conversion, not an ongoing tribute payment to the Danes."}], "id": "q06"}, {"question": "Alfred the Great's ambitious program of translating important Latin books into Old English, and his preface to the *Pastoral Care*, primarily aimed to address what critical issue?", "options": [{"text": "To promote the exclusive use of Latin in all future English scholarly and religious texts.", "isCorrect": false, "rationale": "Alfred's program aimed to translate *from* Latin *into* English, indicating a desire to broaden access to knowledge beyond those fluent in Latin, not to promote Latin exclusively."}, {"text": "To make essential knowledge accessible to a broader, vernacular-speaking educated class, thereby rebuilding literacy and learning after the Viking devastation.", "isCorrect": true, "rationale": "Alfred 'recognized that the Viking raids had devastated English literacy and learning' and in his preface, he lamented that 'So few there were who could understand their church services in English, or translate even a letter from Latin into English.' His solution was to 'translate some of the books most needful for all men to know into the language that we can all understand.'"}, {"text": "To completely abolish Latin as a language of learning in England.", "isCorrect": false, "rationale": "Alfred's goal was to make knowledge accessible via English, not to abolish Latin, which remained the language of the Church and higher learning. He aimed for a multilingual educated class, with English as a foundation."}, {"text": "To provide entertainment literature for the common peasant class across Wessex.", "isCorrect": false, "rationale": "While some might find the works engaging, Alfred's stated purpose was to address a 'collapse of Latin literacy' among the 'educated class' and clergy, not to provide entertainment for peasants."}], "id": "q07"}, {"question": "Which of Alfred's initiatives best exemplifies his dedication to preserving and shaping English national identity and historical consciousness for future generations?", "options": [{"text": "His conversion of King Guthrum to Christianity.", "isCorrect": false, "rationale": "While religiously significant, the conversion of Guthrum primarily secured peace and religious alignment, rather than directly fostering a continuous English national identity for generations."}, {"text": "His personal translation of Boethius's *Consolation of Philosophy*.", "isCorrect": false, "rationale": "This was part of his educational reform, important for individual learning, but not as direct a tool for national historical consciousness as the Chronicle."}, {"text": "His creation of the *Anglo-Saxon Chronicle*, a year-by-year record of English history, written in Old English.", "isCorrect": true, "rationale": "The *Anglo-Saxon Chronicle* was a 'year-by-year record of English history, written in Old English rather than Latin, that continued to be updated for centuries after his death,' making it a foundational text for a shared English historical narrative and identity."}, {"text": "His reorganization of the *fyrd* into rotating shifts.", "isCorrect": false, "rationale": "The reorganization of the fyrd was a military reform for defense, not a direct effort to shape national identity or historical consciousness."}], "id": "q08"}, {"question": "The construction of *burhs* (fortified towns) and the reorganization of the *fyrd* (militia) under Alfred the Great were strategically designed to achieve what primary goal?", "options": [{"text": "To centralize all political power in the royal court, diminishing local authority.", "isCorrect": false, "rationale": "While they strengthened royal authority, their primary purpose was defense, not solely political centralization at the expense of local governance."}, {"text": "To create an offensive army capable of conquering continental Europe.", "isCorrect": false, "rationale": "Alfred's focus was on defending and reclaiming England from the Danes, not on continental conquest."}, {"text": "To establish a robust, decentralized defensive network against future Viking incursions, ensuring rapid response.", "isCorrect": true, "rationale": "The text explains burhs were 'built or strengthened by Alfred as part of a defensive network against Viking raids' and placed 'no more than a day's march apart,' complemented by a reorganized 'fyrd' to ensure 'Wessex always had a defensive force ready.'"}, {"text": "To dismantle all existing Anglo-Saxon military structures in favor of a mercenary army.", "isCorrect": false, "rationale": "Alfred reformed and reorganized existing Anglo-Saxon military structures (like the fyrd and thegns), he did not dismantle them for a mercenary army."}], "id": "q09"}, {"question": "The text describes the Norman Conquest of 1066 as ending 'Anglo-Saxon England as a culture and replaced the Old English language with a Norman-French ruling class,' while also noting that 'Alfred's legacy survived.' This apparent contradiction suggests that:", "options": [{"text": "The Norman Conquest was a minor event with no lasting impact on English society or institutions.", "isCorrect": false, "rationale": "The text explicitly calls 1066 'one of the most consequential dates in English history' and states English law, church, and aristocracy were 'remade,' contradicting the idea of a minor impact."}, {"text": "While the ruling class, dominant language, and much of the aristocracy were changed by the Normans, fundamental institutional and legal frameworks, partially shaped by Alfred, persisted and evolved.", "isCorrect": true, "rationale": "The 'keyconcept' box on 1066 states, 'Yet Alfred's legacy survived: the English common law, the concept of the king as p-...' (the text cuts off, but implies continuation of fundamental concepts), indicating that despite cultural and linguistic shifts, underlying structures remained or were adapted."}, {"text": "Alfred's legacy only survived because the Normans actively promoted Old English and Anglo-Saxon customs throughout their new kingdom.", "isCorrect": false, "rationale": "The Normans replaced Old English with Norman-French in the ruling class; they did not actively promote Old English or most Anglo-Saxon customs among the elite."}, {"text": "The concept of a unified England disappeared entirely after 1066, only to be rediscovered centuries later.", "isCorrect": false, "rationale": "While the Anglo-Saxon culture shifted, the Norman conquest solidified England as a single political entity under a new ruling dynasty, building upon the unification work started by Alfred's descendants."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
