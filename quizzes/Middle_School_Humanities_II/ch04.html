<script>
var QUESTIONS = [{"question": "What architectural innovations made Gothic cathedrals possible, and what was their theological purpose?", "options": [{"text": "Gothic cathedrals used Roman concrete and flat roofs; their purpose was to house the bishop's government offices.", "isCorrect": false, "rationale": "Gothic cathedrals used pointed arches, ribbed vaults, and flying buttresses; they were places of worship, not government offices."}, {"text": "The flying buttress, pointed arch, and ribbed vault allowed cathedral walls to be thinned and filled with enormous stained-glass windows; the theological purpose was to fill the interior with colored light symbolizing divine presence.", "isCorrect": true, "rationale": "Medieval theologians believed light itself was a symbol of God. Chartres Cathedral's 170+ windows were designed to make worshippers feel physically in the presence of divine light — theology expressed through architecture."}, {"text": "Gothic cathedrals were entirely underground to protect worshippers from Viking raids; their stained glass faced outward as signals.", "isCorrect": false, "rationale": "Gothic cathedrals were very much above ground, rising to heights meant to point toward heaven."}, {"text": "Gothic architecture was imported from China by Marco Polo; before his return, European cathedrals were made of wood.", "isCorrect": false, "rationale": "Gothic architecture developed in France and northern Europe; Marco Polo returned to Venice in 1295, but Chartres was begun in 1194."}], "id": "q01"}, {"question": "What is a flying buttress, and why was it a revolutionary engineering innovation?", "options": [{"text": "A buttress is a decorative gargoyle that channels rainwater away from cathedral walls.", "isCorrect": false, "rationale": "Gargoyles do channel water, but flying buttresses are structural arched supports that transfer vault thrust to outer piers."}, {"text": "An arched stone support that transfers the outward thrust of a heavy stone vault to an outer pier, freeing the wall from bearing weight and allowing large windows to replace solid stone.", "isCorrect": true, "rationale": "Before flying buttresses, walls had to be massive and solid to support the vault's thrust. Flying buttresses transferred this thrust outside the building, allowing the revolutionary thinning of walls and filling with stained glass."}, {"text": "A device for lifting heavy stones during construction, powered by horses walking in a circle.", "isCorrect": false, "rationale": "Flying buttresses are permanent structural elements of the finished building, not construction equipment."}, {"text": "An interior column system that supported the cathedral floor against flooding from underground springs.", "isCorrect": false, "rationale": "Flying buttresses are exterior structural elements supporting the walls against the outward thrust of the vault."}], "id": "q02"}, {"question": "What did medieval universities teach, and what was the trivium?", "options": [{"text": "Medieval universities taught only theology; secular subjects were forbidden as distractions from God.", "isCorrect": false, "rationale": "Medieval universities taught a structured curriculum: the trivium (grammar, rhetoric, logic) and quadrivium (arithmetic, geometry, music, astronomy), with theology as the culminating goal."}, {"text": "The trivium was the first stage of medieval university education: grammar, rhetoric, and logic — the arts of language — preparing students for the more advanced quadrivium and ultimately theology.", "isCorrect": true, "rationale": "The trivium and quadrivium together formed the seven liberal arts. The trivium taught students to read, write, and argue in Latin; the quadrivium added mathematical arts; together they prepared for theology."}, {"text": "The trivium was a system for selecting students: those who passed would go on to become knights; those who failed became monks.", "isCorrect": false, "rationale": "The trivium was a curriculum covering grammar, rhetoric, and logic — it had nothing to do with selecting knights."}, {"text": "The trivium was a guild system in which master craftsmen trained apprentices in three trades simultaneously.", "isCorrect": false, "rationale": "The trivium was an intellectual curriculum, not a craft training system."}], "id": "q03"}, {"question": "What was Thomas Aquinas's great intellectual achievement, and what is his argument called?", "options": [{"text": "Aquinas proved that reason and faith are completely incompatible and that theology must reject philosophy.", "isCorrect": false, "rationale": "The opposite: Aquinas's entire achievement was showing that faith and reason are not enemies but partners, each illuminating the other."}, {"text": "Aquinas took Aristotle's philosophy and showed that its logic and natural philosophy, far from threatening Christianity, could actually serve it — demonstrating that reason properly used arrives at conclusions faith already knows.", "isCorrect": true, "rationale": "The Five Ways — five rational arguments for God's existence beginning from observation of the natural world — demonstrate Aquinas's method: reason starting from observable facts arrives at conclusions (an unmoved mover, an uncaused cause) that faith calls God."}, {"text": "Aquinas argued that Aristotle was a secret Christian and had already discovered all the doctrines of the Church.", "isCorrect": false, "rationale": "Aquinas did not claim Aristotle was secretly Christian; he argued that Aristotle's philosophical method, applied correctly, converges toward Christian truth."}, {"text": "Aquinas rejected Aristotle entirely and based Christian theology solely on Plato's philosophy.", "isCorrect": false, "rationale": "Aquinas used Aristotle specifically; Plato was championed by other thinkers like those in the Medici's Platonic Academy (Chapter 6)."}], "id": "q04"}, {"question": "What are Aquinas's 'Five Ways,' and what do they demonstrate?", "options": [{"text": "The Five Ways are five methods of prayer described by Aquinas for different types of Christians.", "isCorrect": false, "rationale": "The Five Ways are arguments — rational demonstrations of God's existence from observations of the natural world."}, {"text": "The Five Ways are five arguments for God's existence drawn entirely from observation of the natural world and logical reasoning — beginning from the facts that things move, things are caused, and things exist contingently, arriving at an unmoved mover, uncaused cause, and necessary being.", "isCorrect": true, "rationale": "Aquinas did not begin with Scripture or Church authority in the Five Ways; he began with observable facts and reasoned toward conclusions that faith already knows as God."}, {"text": "The Five Ways are five different editions of the Summa Theologica, each for a different audience.", "isCorrect": false, "rationale": "The Five Ways are arguments within the Summa Theologica, not different editions of it."}, {"text": "The Five Ways are five Church councils that Aquinas organized to decide questions of doctrine.", "isCorrect": false, "rationale": "Aquinas was a theologian and friar, not a council organizer; the Five Ways are philosophical arguments."}], "id": "q05"}, {"question": "How did Francis of Assisi's approach to religious life differ from traditional monasticism?", "options": [{"text": "Francis built the largest monastery in Europe and retreated completely from the world.", "isCorrect": false, "rationale": "Francis and his Franciscans deliberately went into the world — cities, streets, leper colonies, markets — rather than withdrawing."}, {"text": "Francis founded a community of friars who owned nothing, lived on alms, and preached the Gospel among the poor and sick — going into the world rather than retreating from it as traditional monastic orders did.", "isCorrect": true, "rationale": "The old monastic orders (like the Benedictines) retreated behind monastery walls. The Franciscans went into the world: their poverty was not withdrawal but engagement."}, {"text": "Francis believed monks should own comfortable property to better serve the wealthy noble class who funded the Church.", "isCorrect": false, "rationale": "Francis gave away all his possessions and insisted on absolute poverty; he opposed Church wealth."}, {"text": "Francis founded the Dominican Order, which specialized in studying theology at universities.", "isCorrect": false, "rationale": "Francis founded the Franciscans; the Dominicans were a separate mendicant order founded by Dominic de Guzmán around the same time."}], "id": "q06"}, {"question": "What was the Pax Mongolica, and how did it affect European knowledge of the world?", "options": [{"text": "The Pax Mongolica was a peace treaty between the Mongols and the Crusader states that allowed trade through the Holy Land.", "isCorrect": false, "rationale": "The Pax Mongolica was the period of relative stability across Eurasia created by Mongol control of all trade routes from China to Eastern Europe — not a specific treaty with Crusaders."}, {"text": "The Pax Mongolica was the period of relative stability across Eurasia under Mongol control, during which merchants, missionaries, and diplomats could travel safely from China to Eastern Europe — enabling Marco Polo's journey.", "isCorrect": true, "rationale": "A single power controlling all the Eurasian trade routes created unprecedented safe conditions for long-distance travel. This window of opportunity enabled the Polo family's twenty-four-year journey to China and back."}, {"text": "The Pax Mongolica was a permanent peace because the Mongols converted to Christianity and became allies of the Pope.", "isCorrect": false, "rationale": "The Mongols did not permanently convert to Christianity; some later Mongol rulers converted to Islam. The Pax Mongolica was a practical consequence of unified Mongol control, not a religious alliance."}, {"text": "The Pax Mongolica ended Viking raids on Europe, finally bringing peace to the continent.", "isCorrect": false, "rationale": "The Pax Mongolica was about trade routes across central Eurasia, not about Viking raids on Europe."}], "id": "q07"}, {"question": "What did Marco Polo describe in his accounts of China, and why were his readers skeptical?", "options": [{"text": "Marco Polo described China as a poor, undeveloped country — far inferior to Europe.", "isCorrect": false, "rationale": "Marco Polo described China as vastly more advanced than Europe in many respects — which is precisely why his readers were skeptical."}, {"text": "Marco Polo described cities of a million people (vs. 100,000 in the largest European cities), paper money, coal as fuel, postal systems with horses every few miles, and palaces of marble and jade — so far beyond European experience that many readers did not believe him.", "isCorrect": true, "rationale": "Marco Polo's Travels described a world that made Europe look small and underdeveloped. He died insisting he had told only half of what he had seen."}, {"text": "Marco Polo described China as a Christian kingdom that had converted centuries before Europe.", "isCorrect": false, "rationale": "Marco Polo described China under Kublai Khan, the Mongol ruler; it was not a Christian kingdom."}, {"text": "Marco Polo's account of China was entirely fictional and was recognized as such by his contemporaries.", "isCorrect": false, "rationale": "Marco Polo's accounts have been largely confirmed by modern historians; his contemporaries who doubted him were simply unable to imagine China's scale."}], "id": "q08"}, {"question": "What is Dante's Divine Comedy, and why was his choice to write it in Italian rather than Latin significant?", "options": [{"text": "The Divine Comedy is a short poem about Dante's childhood in Florence, written in Latin for a scholarly audience.", "isCorrect": false, "rationale": "The Divine Comedy is a very long poem in three parts describing a journey through Hell, Purgatory, and Heaven — and Dante deliberately wrote in Italian, not Latin."}, {"text": "The Divine Comedy is a three-part poem (Hell, Purgatory, Heaven) describing Dante's imagined journey through the afterlife; writing it in Italian was revolutionary because serious literature was expected in Latin — Dante declared that the deepest truths of faith could be expressed in the language ordinary people spoke.", "isCorrect": true, "rationale": "The choice of Italian was itself a theological statement: the greatest Christian truths should not be locked away in an academic language. Dante's Italian became the model for the standard Italian language."}, {"text": "The Divine Comedy is a travel narrative describing Dante's actual journey to Palestine during the Crusades.", "isCorrect": false, "rationale": "The Divine Comedy describes an imagined journey through the afterlife, not a real journey; Dante never went on a Crusade."}, {"text": "Dante wrote the Divine Comedy in both Latin and Italian, with the Italian version intended only for women who could not read Latin.", "isCorrect": false, "rationale": "Dante wrote in Italian because he believed the vernacular was a worthy vehicle for the greatest themes — not as a concession to any limited audience."}], "id": "q09"}, {"question": "Why does Dante place Virgil in Limbo rather than in Hell or Heaven?", "options": [{"text": "Dante placed Virgil in Limbo as punishment for writing immoral poetry that glorified the pagan gods.", "isCorrect": false, "rationale": "Dante revered Virgil as the greatest poet of the ancient world; Virgil is in Limbo not as punishment but because he lived before Christ and could not be baptized."}, {"text": "Dante placed Virgil in Limbo — a comfortable but cheerless place — because Virgil was a virtuous pagan who lived before Christ and thus could not enter Heaven, reflecting Dante's meditation on the limits of reason without faith.", "isCorrect": true, "rationale": "Virgil can guide Dante through Hell and Purgatory (reason illuminating sin and the path of repentance) but cannot enter Heaven — because the final vision of God requires faith, represented by Beatrice."}, {"text": "Dante placed Virgil in Hell because he was a Roman who had persecuted Christians.", "isCorrect": false, "rationale": "Virgil died before Christianity existed (19 BC); Dante honored him too highly to place him in Hell."}, {"text": "Dante placed Virgil in Paradise because all great artists are automatically saved regardless of their religion.", "isCorrect": false, "rationale": "Dante explicitly could not bring himself to place Virgil in either Hell or Heaven; Limbo is the solution — honored but incomplete."}], "id": "q10"}, {"question": "Who was Roger Bacon, and why is he significant for the history of science?", "options": [{"text": "Roger Bacon was a medieval pope who banned all scientific study in universities.", "isCorrect": false, "rationale": "Roger Bacon was an English Franciscan friar who advocated experimental science; he was not a pope."}, {"text": "Roger Bacon was an English Franciscan friar (c. 1214–1294) who argued ahead of his time that knowledge of the natural world should be based on observation and experiment; he studied optics, described telescopes and flying machines, and represented the seeds of modern scientific method within medieval Christian learning.", "isCorrect": true, "rationale": "Bacon's scientia experimentalis anticipated the Scientific Revolution's emphasis on empirical observation. He represents the point that medieval Christianity was not the enemy of science — the road to modern science runs through the medieval university."}, {"text": "Roger Bacon invented the printing press in 1294 and began the Renaissance.", "isCorrect": false, "rationale": "The printing press was invented by Gutenberg around 1440–1455; Roger Bacon died in 1294."}, {"text": "Roger Bacon was a student of Aquinas who devoted his life to completing the Summa Theologica after Aquinas's death.", "isCorrect": false, "rationale": "Bacon and Aquinas were contemporaries, not teacher and student; Bacon's focus was on natural science, not completing theological treatises."}], "id": "q11"}, {"question": "What does the Canticle of the Sun reveal about Francis of Assisi's theology?", "options": [{"text": "The Canticle of the Sun reveals that Francis worshipped nature rather than God.", "isCorrect": false, "rationale": "Francis celebrates creation as a gift from God — he calls the sun 'brother' and the moon 'sister' as acts of gratitude to God, not worship of nature."}, {"text": "The Canticle of the Sun — one of the earliest poems in Italian — reveals Francis's theology of joyful gratitude: creation is God's gift, and everything in it (sun, moon, wind, water) is a reason for praise.", "isCorrect": true, "rationale": "Francis did not fast and pray with grim severity — he sang. The Canticle reflects a theology where God's goodness flows through creation and back in gratitude, celebrated with joy rather than renunciation."}, {"text": "The Canticle of the Sun is a battle hymn Francis wrote for Crusade campaigns in the Holy Land.", "isCorrect": false, "rationale": "The Canticle of the Sun is a celebration of creation, not a battle hymn."}, {"text": "The Canticle of the Sun was written in Latin and aimed at educating scholars in Franciscan theology.", "isCorrect": false, "rationale": "The Canticle was written in Italian — the vernacular language of central Italy — as one of the earliest examples of Italian literature."}], "id": "q12"}, {"question": "How does Aquinas's understanding of faith and reason differ from both fideism and rationalism?", "options": [{"text": "Aquinas was a pure rationalist who believed human reason could discover all theological truths without need for faith or revelation.", "isCorrect": false, "rationale": "Aquinas explicitly held that some truths (the Trinity, Incarnation, Resurrection) exceed reason's reach and are revealed through Scripture and tradition."}, {"text": "Aquinas held that faith and reason are two distinct paths to truth leading to the same destination: reason can discover that God exists and is good, but cannot reach revealed mysteries like the Trinity; faith and reason complement rather than contradict each other.", "isCorrect": true, "rationale": "This is Aquinas's distinctive position. Fideism ignores reason; rationalism ignores faith. Aquinas insists God is the author of both the natural world (which reason investigates) and Scripture (which faith receives) — so they cannot genuinely contradict."}, {"text": "Aquinas believed that faith and reason always contradict each other, and that Christians must choose faith when the conflict arises.", "isCorrect": false, "rationale": "Aquinas held the opposite: if faith and reason appear to contradict, either the reasoning is flawed or the Scripture is misunderstood."}, {"text": "Aquinas had no position on faith and reason because he only wrote about political theory.", "isCorrect": false, "rationale": "The faith-reason relationship is central to Aquinas's entire theological project; the Summa Theologica is almost entirely about this."}], "id": "q13"}, {"question": "What is a friar, and how did the mendicant orders differ from traditional monastic orders?", "options": [{"text": "Friars were enclosed monks who lived entirely within monastery walls, never venturing into society.", "isCorrect": false, "rationale": "Friars traveled and preached in the world; it was the monks who were enclosed."}, {"text": "Friars were members of mendicant (begging) religious orders who lived on charity and traveled in the world to preach, unlike monks who were enclosed in monasteries on their own lands.", "isCorrect": true, "rationale": "The Franciscans and Dominicans went into city streets, leper colonies, and markets. Their poverty was not withdrawal but active engagement with the world — a fundamentally different spirituality from Benedictine monasticism."}, {"text": "Friars were royal officials who collected taxes for the Church from secular estates.", "isCorrect": false, "rationale": "Friars lived by begging (mendicancy), not by collecting taxes. They owned nothing individually or collectively."}, {"text": "Friars were university professors who taught theology in cathedral schools; they owned no property but lived on university salaries.", "isCorrect": false, "rationale": "Some friars did teach at universities (including Aquinas himself), but the friar's vocation was primarily preaching and ministry among the poor."}], "id": "q14"}, {"question": "What was the Mongol Empire, and what was paradoxical about its consequences?", "options": [{"text": "The Mongol Empire was entirely destructive and had no positive consequences whatsoever.", "isCorrect": false, "rationale": "The text presents both sides: enormously destructive conquests AND the Pax Mongolica that enabled unprecedented cross-Eurasian travel and trade."}, {"text": "The Mongol Empire was the largest contiguous land empire in history; paradoxically, the same conquests that were enormously destructive (Baghdad sacked, millions dead) also created the Pax Mongolica — unprecedented stability for trade and travel from China to Eastern Europe.", "isCorrect": true, "rationale": "Genghis Khan's conquests destroyed entire civilizations, including throwing the contents of Baghdad's great library into the Tigris River. Yet Mongol control of all routes created the conditions for Marco Polo's journey and unprecedented Eurasian exchange."}, {"text": "The Mongol Empire was beneficial for all it conquered because the Mongols were peaceful traders, not warriors.", "isCorrect": false, "rationale": "The Mongol conquests were terrifying — the text notes that estimates of the dead run into the millions."}, {"text": "The Mongol Empire never reached Europe, so it had no relevance to the study of European history.", "isCorrect": false, "rationale": "The Mongols reached Poland and Persia; their trade network extended to Eastern Europe; and the Pax Mongolica enabled Marco Polo's journey which transformed European understanding of the world."}], "id": "q15"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
