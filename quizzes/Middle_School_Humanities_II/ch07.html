<script>
var QUESTIONS = [{"question": "What was the state of the Catholic Church on the eve of the Reformation, and why had earlier reform movements failed?", "options": [{"text": "The Church was widely admired and corruption-free; the Reformation happened because Luther was personally ambitious.", "isCorrect": false, "rationale": "The text describes extensive corruption: simony, illiterate clergy, worldly monasteries. And the questions raised by Wycliffe and Hus had never been answered — only silenced."}, {"text": "The Church was the most powerful organization in Europe but deeply corrupt — bishops purchased positions through simony, clergy were barely literate, and earlier reformers like Wycliffe and Hus had been suppressed rather than answered.", "isCorrect": true, "rationale": "The Church owned a third of all land in Germany, ran hospitals and universities, collected taxes. But corruption was endemic. Wycliffe (1384) and Hus (1415) had raised the same questions Luther raised — but without the printing press, they could be silenced."}, {"text": "The Church had already successfully reformed itself through the Council of Trent before Luther was born; the Reformation was unnecessary.", "isCorrect": false, "rationale": "The Council of Trent met in 1545–1563, decades after Luther's 1517 theses. Reform came in response to the Reformation, not before it."}, {"text": "The Church was financially bankrupt in 1517 and the Reformation happened because it could no longer pay its clergy.", "isCorrect": false, "rationale": "The Church was financially powerful, not bankrupt — it owned vast lands and collected enormous revenues. The crisis was moral and spiritual, not financial."}]}, {"question": "What was simony, and why was it so harmful to the Church?", "options": [{"text": "Simony was the practice of monks marrying secretly; it was forbidden by Church law.", "isCorrect": false, "rationale": "Simony is the buying and selling of church offices; it is named for Simon Magus, who tried to buy the power of the Holy Spirit in Acts 8."}, {"text": "Simony was the buying and selling of church offices; wealthy families paid to place relatives as bishops or abbots regardless of spiritual qualification, filling the Church's leadership with people who had bought their positions and had no intention of doing religious work.", "isCorrect": true, "rationale": "When bishops purchased their positions, they owed their appointments to money, not to God. The result was leadership throughout the Church that was worldly, absentee, or openly venal — the opposite of what the office required."}, {"text": "Simony was the sale of indulgences; it was the immediate cause of Luther's 95 Theses.", "isCorrect": false, "rationale": "Simony refers specifically to the sale of church offices, not indulgences. Luther attacked indulgences specifically."}, {"text": "Simony was the practice of printing unauthorized copies of the Bible; it was punished by excommunication.", "isCorrect": false, "rationale": "Bible printing was a Reformation concern (Tyndale's unauthorized translations); simony is specifically the sale of church offices."}]}, {"question": "What was the immediate cause of Luther's 95 Theses, and what did they originally challenge?", "options": [{"text": "Luther wrote the 95 Theses to challenge the Pope's authority over secular rulers; they had nothing to do with indulgences.", "isCorrect": false, "rationale": "The 95 Theses specifically challenged the theological basis of indulgences; the question of papal authority emerged later as the debate escalated."}, {"text": "The Dominican friar Johann Tetzel was selling indulgences near Wittenberg to fund St. Peter's Basilica; Luther wrote the 95 Theses in October 1517 as a formal academic challenge to the theological basis of indulgences — intending to start a debate, not a schism.", "isCorrect": true, "rationale": "Tetzel's sales pitch — 'as soon as the coin in the coffer rings, the soul from purgatory springs' — represented the crude commercialism that infuriated Luther. His Theses were written in Latin as an academic document; it was the printing press that made them revolutionary."}, {"text": "Luther wrote the 95 Theses after witnessing corruption among the German nobility; they concerned political rather than religious reforms.", "isCorrect": false, "rationale": "The 95 Theses were specifically about indulgences — a religious and theological matter, not political."}, {"text": "Luther's 95 Theses were a secret document that he never intended to be published or distributed.", "isCorrect": false, "rationale": "Luther sent the theses to the Archbishop of Mainz and apparently posted or distributed them; once printed, they spread across Germany within weeks."}]}, {"question": "What is sola fide, and how did Luther arrive at it?", "options": [{"text": "Sola fide means 'by faith alone' and was Luther's doctrine that good works, not faith, were all that mattered for salvation.", "isCorrect": false, "rationale": "Sola fide means 'by faith alone' — salvation is received through faith, not earned by works. The answer has the doctrine exactly backwards."}, {"text": "Sola fide means 'by faith alone' — Luther's foundational doctrine that salvation is not earned by human effort but received through faith in Christ; he arrived at it while studying Romans 1:17 ('the righteous shall live by faith'), finding the answer to his agonized question about how a sinner could stand before a holy God.", "isCorrect": true, "rationale": "Luther had agonized over salvation: no amount of penance, good works, or indulgences left him feeling justified. The breakthrough from Romans 1:17 revealed to him that salvation is God's free gift received through faith, not a human achievement."}, {"text": "Sola fide means 'by the faith of the Church alone' — Luther believed only the institutional Church could determine who was saved.", "isCorrect": false, "rationale": "Sola fide is precisely the opposite: it removes the institutional Church as the necessary mediator of salvation, saying each person is justified by personal faith in Christ."}, {"text": "Luther invented sola fide as a completely new doctrine with no precedent in Christian history.", "isCorrect": false, "rationale": "Luther believed sola fide was Paul's own doctrine in Romans and Galatians, obscured by centuries of tradition. He saw himself as recovering something ancient, not inventing something new."}]}, {"question": "What happened at the Diet of Worms (1521), and why is it considered a defining moment?", "options": [{"text": "At the Diet of Worms, Luther agreed to recant his writings in exchange for a guarantee of safety.", "isCorrect": false, "rationale": "Luther famously refused to recant, saying his conscience was captive to the Word of God and he could not act against conscience."}, {"text": "At the Diet of Worms, Luther was summoned before the Holy Roman Emperor to recant; he refused, declaring his conscience was captive to the Word of God and he could not act against it — making the individual conscience's claim against institutional authority the defining statement of the Reformation.", "isCorrect": true, "rationale": "'Here I stand. I cannot do otherwise.' The statement (whether verbatim or not) captured the Reformation's spiritual core: that individual conscience, bound by Scripture, stands above pope and councils. The Emperor declared Luther an outlaw; Luther's protector Frederick the Wise arranged his 'kidnapping' and hiding at the Wartburg."}, {"text": "At the Diet of Worms, Luther was condemned and immediately executed; the Reformation died with him.", "isCorrect": false, "rationale": "Luther was not executed; he was declared an outlaw, then protected by Frederick the Wise and hidden at the Wartburg Castle, where he translated the New Testament into German."}, {"text": "At the Diet of Worms, Luther and the Pope reached a compromise agreement that preserved Church unity.", "isCorrect": false, "rationale": "No compromise was reached; Luther refused to recant, the Emperor declared him an outlaw, and the Reformation split became permanent."}]}, {"question": "What are the three 'solas' of the Protestant Reformation, and what does each mean?", "options": [{"text": "The three solas are: sola scriptura (by the Church alone), sola fide (by works alone), and sola gratia (by the Pope alone).", "isCorrect": false, "rationale": "This answer has all three solas exactly backwards; they are specifically rejections of these authorities."}, {"text": "The three solas are: sola fide (by faith alone — salvation through faith, not works), sola scriptura (by Scripture alone — the Bible, not popes or councils, is the final authority), and sola gratia (by grace alone — salvation is entirely God's free gift, not earned).", "isCorrect": true, "rationale": "These three Latin phrases became the rallying cries of the Protestant Reformation. Together they dismantled the medieval penitential system: if salvation is by grace through faith as revealed in Scripture, there is no role for indulgences, merits, or papal authority over salvation."}, {"text": "The three solas are: sola traditio (by tradition alone), sola ecclesia (by the Church alone), and sola pontifex (by the Pope alone).", "isCorrect": false, "rationale": "These are actually the positions Luther was arguing against, not his own doctrines."}, {"text": "The three solas were invented by Calvin, not Luther; Luther had only one doctrine — justification by faith.", "isCorrect": false, "rationale": "The three solas emerged from the Reformation broadly; Luther's doctrines included all three, and they were articulated across the Reformation movement."}]}, {"question": "How did John Calvin's theology differ from Luther's, and what is predestination?", "options": [{"text": "Calvin agreed with Luther on every point; Calvinism and Lutheranism are identical.", "isCorrect": false, "rationale": "While Calvin and Luther shared the core Reformation doctrines (sola fide, sola scriptura, sola gratia), Calvin's theology emphasized the absolute sovereignty of God and predestination in ways that went further than Luther's."}, {"text": "Calvin built a 'godly city' in Geneva on Reformed theology, with his Institutes of the Christian Religion systematizing Reformed doctrine; predestination — God's eternal election of the saved before creation, not based on any foreseen merit — was Calvin's distinctive emphasis.", "isCorrect": true, "rationale": "Calvin's system emphasized God's absolute sovereignty and the total depravity of human nature. Predestination said God had chosen who would be saved from eternity — not because of anything foreseen in them, but solely according to God's own will."}, {"text": "Calvin rejected all the Reformation's doctrines and returned to traditional Catholic theology.", "isCorrect": false, "rationale": "Calvin was a Reformed theologian who built on Luther's Reformation; he did not return to Catholic theology."}, {"text": "Calvin established the papacy in Geneva, claiming to be the true pope in opposition to Rome.", "isCorrect": false, "rationale": "Calvin established a form of church government ruled by elders (presbyterian polity), not papal hierarchy; he was opposed to all forms of episcopal hierarchy."}]}, {"question": "How did the English Reformation differ from the Continental Reformation?", "options": [{"text": "The English Reformation was initiated by a theologian like Luther who disputed about doctrine; it was more theologically radical than the German Reformation.", "isCorrect": false, "rationale": "The English Reformation was initiated by a king wanting a divorce, not a theologian disputing doctrine; at first it was theologically conservative."}, {"text": "The English Reformation was initiated not by theological dispute but by Henry VIII's desire for an annulment from Catherine of Aragon; through the Act of Supremacy (1534), Henry declared himself Supreme Head of the Church of England — breaking with Rome for political, not doctrinal, reasons.", "isCorrect": true, "rationale": "Henry was not a Lutheran; he had no interest in sola fide. He wanted control of the Church in England to get his annulment. The theological dimensions developed later under Edward VI and then Elizabeth I."}, {"text": "The English Reformation was accepted unanimously by all English clergy, who voluntarily recognized Henry as head of the Church.", "isCorrect": false, "rationale": "Thomas More and Bishop John Fisher refused the Oath of Supremacy and were executed; the Reformation met significant resistance."}, {"text": "The English Reformation occurred only after Henry VIII died; it was his son Edward VI who first declared himself head of the Church.", "isCorrect": false, "rationale": "Henry VIII declared himself Supreme Head of the Church of England through the Act of Supremacy in 1534, during his own reign."}]}, {"question": "Who was William Tyndale, and why was he historically significant?", "options": [{"text": "Tyndale was a German monk who translated the Old Testament into English; his translation was immediately approved by Henry VIII.", "isCorrect": false, "rationale": "Tyndale was English; he translated the New Testament (not the Old Testament) and it was illegal — he worked in exile and was eventually betrayed, arrested, and executed."}, {"text": "Tyndale was an Oxford- and Cambridge-educated priest who translated the New Testament into English in 1525 while in exile; his translation was smuggled into England, he was betrayed and burned in 1536, but his dying prayer was reportedly answered — within three years an English Bible was in every church in England.", "isCorrect": true, "rationale": "Tyndale's translation shaped the English language nearly as much as Shakespeare. His dying prayer — 'Lord, open the King of England's eyes' — was fulfilled within three years when Henry VIII authorized an English Bible for every church."}, {"text": "Tyndale was a bishop who published the first authorized version of the English Bible with full royal approval.", "isCorrect": false, "rationale": "Tyndale was not a bishop; his work was unauthorized and illegal; he was executed before royal authorization came."}, {"text": "Tyndale survived his trial and spent his remaining years teaching Greek in Oxford.", "isCorrect": false, "rationale": "Tyndale was betrayed, arrested in Antwerp, tried for heresy, strangled, and burned in 1536."}]}, {"question": "What was the Counter-Reformation, and what did the Council of Trent accomplish?", "options": [{"text": "The Counter-Reformation was a military campaign by Catholic powers to conquer Protestant territories.", "isCorrect": false, "rationale": "The Counter-Reformation was primarily a theological and institutional reform movement, though it did have political dimensions; the Council of Trent was its intellectual center, not a military campaign."}, {"text": "The Counter-Reformation was the Catholic Church's vigorous response beginning in the 1540s; the Council of Trent (1545–1563) clarified Catholic doctrine against Protestant challenges, affirmed salvation requires faith and works, required bishops to live in their dioceses, and established seminaries to properly train priests.", "isCorrect": true, "rationale": "The Council of Trent addressed both doctrine (affirming Catholic positions on every point Luther challenged) and genuine abuses (requiring clergy education, ending absentee bishops). The Church that emerged from Trent was leaner and more theologically rigorous."}, {"text": "The Council of Trent agreed with Luther on sola fide and sola scriptura, but rejected his position on indulgences.", "isCorrect": false, "rationale": "The Council of Trent specifically rejected sola fide and sola scriptura; it affirmed that salvation requires faith and works, and that Scripture and tradition together constitute authority."}, {"text": "The Counter-Reformation succeeded in eliminating Protestantism from Europe completely by 1600.", "isCorrect": false, "rationale": "Protestantism was not eliminated; the Peace of Augsburg (1555) already acknowledged permanent religious division, and Protestantism continued to grow throughout Europe."}]}, {"question": "Who were the Jesuits, and what role did they play in the Counter-Reformation?", "options": [{"text": "The Jesuits were a Protestant order founded by Luther to train preachers for the Reformation.", "isCorrect": false, "rationale": "The Jesuits (Society of Jesus) were founded by Ignatius of Loyola as the elite intellectual and missionary force of the Catholic Counter-Reformation."}, {"text": "The Jesuits were a Catholic religious order founded by Ignatius of Loyola (1540) — trained scholars, educators, and missionaries who became the elite intellectual force of the Counter-Reformation, educating Catholic Europe's elite and carrying Christianity to India, Japan, and the Americas.", "isCorrect": true, "rationale": "Ignatius underwent a spiritual conversion after being wounded in battle. The Jesuits combined rigorous intellectual training with missionary zeal; their schools educated Catholic elites across Europe, and their missionaries reached Asia and the New World."}, {"text": "The Jesuits were founded by Thomas More as a peaceful alternative to Luther's confrontational approach.", "isCorrect": false, "rationale": "Thomas More was executed in 1535; the Jesuits were founded by Ignatius of Loyola in 1540. More and Loyola were contemporaries, not collaborators."}, {"text": "The Jesuits were condemned by the Council of Trent and suppressed as theologically dangerous.", "isCorrect": false, "rationale": "The Jesuits were the Council of Trent's intellectual allies, not its opponents. They were the Counter-Reformation's most effective force."}]}, {"question": "What was the Peace of Augsburg (1555), and what principle did it establish?", "options": [{"text": "The Peace of Augsburg ended all religious wars in Europe and established complete religious toleration for all faiths.", "isCorrect": false, "rationale": "The Peace of Augsburg established toleration only for Lutheranism (not Calvinism) in the Holy Roman Empire; it did not end religious wars — the Thirty Years' War (1618–1648) would be far more destructive."}, {"text": "The Peace of Augsburg (1555) recognized permanent religious division in the Holy Roman Empire through the principle cuius regio, eius religio ('whose realm, his religion') — each prince could determine whether his territory would be Catholic or Lutheran; subjects who disagreed could emigrate.", "isCorrect": true, "rationale": "This was a revolutionary acknowledgment: the unity of Christendom under a single church was no longer achievable. Religious difference would be managed politically. It was the first major European treaty recognizing religious pluralism within Christendom."}, {"text": "The Peace of Augsburg required all Protestant princes to return to Catholicism by 1560 or face expulsion.", "isCorrect": false, "rationale": "The Peace of Augsburg recognized Lutheran territories as legitimate, not requiring their return to Catholicism."}, {"text": "The Peace of Augsburg was a document signed by Luther and the Pope establishing the boundaries of Protestant Europe.", "isCorrect": false, "rationale": "Luther died in 1546, before the Peace of Augsburg in 1555. It was signed by Emperor Charles V and the Protestant princes, not by the Pope."}]}, {"question": "What is cuius regio, eius religio, and what were its limitations?", "options": [{"text": "Cuius regio, eius religio meant that individual citizens could choose their own religion regardless of their prince's faith.", "isCorrect": false, "rationale": "It meant the opposite: the prince's religion determined the territory's religion. Citizens who disagreed had the right to emigrate — not the right to practice differently in the same territory."}, {"text": "Cuius regio, eius religio ('whose realm, his religion') gave each prince the right to determine his territory's religion (Catholic or Lutheran only — not Calvinist); its limitation was that it left Calvinism unrecognized and left individual conscience subordinate to political authority.", "isCorrect": true, "rationale": "The principle acknowledged division as permanent but managed it politically rather than respecting individual conscience fully. Calvinist territories were not recognized; dissenters had to emigrate rather than practice freely. The religious wars of the 17th century showed its inadequacy."}, {"text": "Cuius regio, eius religio was a medieval feudal principle about land ownership, with no religious implications.", "isCorrect": false, "rationale": "It was a principle specifically about religious authority in the Holy Roman Empire, established by the Peace of Augsburg in 1555."}, {"text": "Cuius regio, eius religio required each prince to practice both Catholic and Lutheran worship in his territory to maintain peace.", "isCorrect": false, "rationale": "The principle allowed each prince to establish a single religion in his territory; it did not require practicing both."}]}, {"question": "What were the four ways the Reformation reshaped European civilization?", "options": [{"text": "The Reformation's four changes were: more wars, more taxes, more corruption, and more poverty — it made everything worse.", "isCorrect": false, "rationale": "This is a purely negative assessment that ignores the text's balanced account of genuine transformations across religious, political, educational, and cultural dimensions."}, {"text": "The Reformation reshaped European civilization religiously (Western Christianity permanently divided), politically (papal authority collapsed in Protestant countries), educationally (vernacular Bible reading drove literacy), and culturally (individual conscience as a concept planted seeds of individual rights).", "isCorrect": true, "rationale": "All four dimensions are directly from the text's concluding key concept box. The cultural dimension — individual conscience as the ultimate authority — is particularly significant for the later development of individual rights and democratic thought."}, {"text": "The Reformation had no lasting effects; Europe returned to its pre-Reformation state within two generations.", "isCorrect": false, "rationale": "The Reformation permanently divided Western Christianity and reshaped European politics, culture, and education — effects visible today."}, {"text": "The Reformation changed only theology; it had no political, educational, or cultural consequences.", "isCorrect": false, "rationale": "The text explicitly identifies political, educational, and cultural consequences alongside the religious ones."}]}, {"question": "Why was Luther's translation of the New Testament into German, completed in eleven weeks at the Wartburg Castle, historically significant?", "options": [{"text": "It was significant because it was the first time any part of the Bible had ever been translated from Greek; no translation had previously existed.", "isCorrect": false, "rationale": "The Bible had been translated into many languages before Luther; the Latin Vulgate was Jerome's fourth-century translation. Wycliffe and Tyndale also translated into English."}, {"text": "Luther's German New Testament made Scripture directly accessible to ordinary German-speaking people; combined with the printing press it enabled mass Bible reading and shaped the German language itself — just as Tyndale's English New Testament shaped the English language.", "isCorrect": true, "rationale": "The power of sola scriptura depended on people actually being able to read Scripture. Luther's German Bible was a literary as well as religious landmark; combined with the printing press, it enabled the Protestant vision of universal Scripture literacy."}, {"text": "The translation was historically insignificant because most Germans were literate in Latin and already had access to Scripture.", "isCorrect": false, "rationale": "Most Germans could not read Latin; the whole point was that Luther's German translation made Scripture accessible to people who had previously depended entirely on clergy to interpret it."}, {"text": "Luther translated only the Old Testament into German; the New Testament remained available only in Latin.", "isCorrect": false, "rationale": "The text specifically says Luther translated the entire New Testament into German in eleven weeks at Wartburg Castle."}]}, {"question": "How did the Reformation's concept of individual conscience connect to later political developments?", "options": [{"text": "The Reformation's individual conscience concept had no political implications; it was purely religious.", "isCorrect": false, "rationale": "The text explicitly notes that the idea of individual conscience — that each person must answer for themselves before God without a priest as intermediary — planted seeds that would eventually flower into individual rights, freedom of conscience, and democratic thought."}, {"text": "Luther's declaration at Worms that conscience bound by Scripture stands above popes and councils planted seeds that would eventually flower into individual rights, freedom of conscience, and democratic thought — though Luther himself never drew these political conclusions.", "isCorrect": true, "rationale": "The Reformation did not produce democracy directly — Luther was not a democrat, and the Peace of Augsburg subordinated individual conscience to princely authority. But the principle that individual conscience has a claim that cannot be entirely suppressed eventually expanded into political form over the following centuries."}, {"text": "The Reformation immediately produced modern democracy; within a decade of the 95 Theses, all European states had elected parliaments.", "isCorrect": false, "rationale": "Democracy developed gradually over centuries; the Reformation planted seeds, not a fully formed democratic system."}, {"text": "The Reformation's individual conscience concept was explicitly condemned by Luther as dangerous to social order; he never applied it to politics.", "isCorrect": false, "rationale": "Luther's own appeal to conscience at Worms was the most famous invocation of individual conscience in the Reformation; while Luther was politically conservative, his theological stance had the implications the text describes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
