    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a common characteristic shared by Renaissance writers like Machiavelli, Erasmus, Thomas More, and Petrarch?", "options": [{"text": "They strictly adhered to the theological doctrines of the medieval Church in all their writings.", "isCorrect": false, "rationale": "Renaissance writers, while often religious, were known for challenging received wisdom and exploring human nature and political life from new perspectives, often diverging from strict medieval theological frameworks."}, {"text": "They focused exclusively on romantic love and personal introspection, avoiding political or social commentary.", "isCorrect": false, "rationale": "While Petrarch's 'Canzoniere' dealt with love, authors like Machiavelli and More were deeply concerned with political life and societal structures, and Erasmus with social and religious satire."}, {"text": "They were deeply influenced by the ancient Greeks and Romans, concerned with human nature and political life, and willing to challenge existing norms.", "isCorrect": true, "rationale": "The introduction explicitly states these three points as shared characteristics of Renaissance writers: reading ancient Greeks and Romans, concern with human nature and political life, and willingness to challenge received wisdom."}, {"text": "They primarily aimed to write detailed historical accounts of their contemporary European conflicts.", "isCorrect": false, "rationale": "While some historical context is present, their primary output was in political philosophy, satire, and poetry, rather than detailed historical chronicles."}], "id": "q01"}, {"question": "Machiavelli states that he intends 'to write a thing which shall be useful to him who apprehends it,' by following 'the real truth of a matter than the imagination of it.' What is the practical implication of this approach for a prince?", "options": [{"text": "A prince should prioritize developing an ideal moral character, believing it will naturally lead to effective governance.", "isCorrect": false, "rationale": "Machiavelli explicitly criticizes those who focus on 'how one ought to live' over 'how one lives,' arguing that such idealism leads to ruin rather than preservation. His focus is on practical, effective rule, not ideal morality."}, {"text": "A prince should base his actions on observable human behavior and political realities, even if it means departing from traditional moral ideals.", "isCorrect": true, "rationale": "This option directly reflects Machiavelli's core argument in Chapter XV: abandoning idealized republics and principalities to focus on 'the real truth' of how power is gained and kept, which often requires actions contrary to traditional virtues."}, {"text": "A prince must meticulously study historical examples of ideal societies to emulate their perfect systems of government.", "isCorrect": false, "rationale": "Machiavelli dismisses 'republics and principalities which in fact have never been known or seen,' indicating a rejection of purely ideal or imagined systems in favor of practical realities."}, {"text": "A prince's primary goal should be to inspire love and loyalty among his subjects through virtuous acts, ensuring long-term stability.", "isCorrect": false, "rationale": "Machiavelli later argues that it is 'much safer to be feared than loved,' suggesting that relying solely on inspiring love through virtue is not the most effective strategy for maintaining power."}], "id": "q02"}, {"question": "According to Machiavelli in 'The Prince,' why is it 'much safer to be feared than loved' for a ruler, if one cannot be both?", "options": [{"text": "Love is a stronger bond that ensures unwavering loyalty from subjects in all circumstances.", "isCorrect": false, "rationale": "Machiavelli argues the opposite, stating that friendships based on 'payments' or promises are not secure and cannot be relied upon in times of need, unlike fear."}, {"text": "Subjects are inherently rational and will always act in their own best interest, which aligns with fearing a strong ruler.", "isCorrect": false, "rationale": "Machiavelli describes men as 'ungrateful, fickle, false, cowardly, covetous,' implying they are not always rational or reliable in their loyalty based on self-interest alone, making fear a more consistent motivator."}, {"text": "Fear provides a more reliable and consistent control over subjects, who are generally ungrateful and turn against a prince when need approaches.", "isCorrect": true, "rationale": "Machiavelli states that men are 'ungrateful, fickle... and as long as you succeed they are yours entirely... but when it approaches they turn against you.' Fear, being sustained by a 'dread of punishment,' is a stronger and more reliable bond."}, {"text": "A feared prince will avoid alliances, making him less vulnerable to betrayal by other rulers.", "isCorrect": false, "rationale": "The text focuses on the prince's relationship with subjects, not external alliances, and Machiavelli's advice for fear relates to maintaining internal control."}], "id": "q03"}, {"question": "Machiavelli advises a prince to 'choose the fox and the lion.' What specific political strategies do these two animals represent in the context of maintaining power?", "options": [{"text": "The lion represents open warfare and conquest, while the fox represents economic manipulation and trade agreements.", "isCorrect": false, "rationale": "The text describes the lion as unable to defend against snares and the fox as unable to defend against wolves, implying strategic defense and cunning rather than economic policy or broad conquest."}, {"text": "The fox represents cunning and shrewdness to avoid traps, and the lion represents strength and intimidation to deter enemies.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'it is necessary to be a fox to discover the snares and a lion to terrify the wolves.' This aligns with cunning (fox) to foresee and evade threats, and brute strength/authority (lion) to deter opposition."}, {"text": "The lion signifies unwavering adherence to moral principles, and the fox signifies adaptability in governance.", "isCorrect": false, "rationale": "Machiavelli's advice often separates politics from personal morality, and the 'lion' here represents power/force, not necessarily moral adherence. The fox is about avoiding traps, not simply adaptability in general."}, {"text": "A prince should be outwardly aggressive like a lion but secretly benevolent like a fox.", "isCorrect": false, "rationale": "The 'fox' in Machiavelli's context is about cunning and deceit when necessary, not benevolence. The text focuses on practical survival skills for a ruler."}], "id": "q04"}, {"question": "Machiavelli argues that it is 'not necessary for a prince to have all the good qualities I have enumerated, but it is very necessary to appear to have them.' Furthermore, 'to have them and always to observe them is injurious, and that to appear to have them is useful.' What does this imply about the relationship between a ruler's true character and public perception?", "options": [{"text": "A prince should strive to genuinely embody all virtues, as this will naturally lead to public adoration and effective rule.", "isCorrect": false, "rationale": "Machiavelli explicitly states that *always* observing good qualities can be 'injurious,' contradicting the idea of genuinely embodying them at all times."}, {"text": "Public perception of a prince's virtues is more crucial for maintaining power than the prince's actual moral conduct.", "isCorrect": true, "rationale": "This statement directly reflects Machiavelli's emphasis on appearance over reality. A prince must cultivate a public image of virtue because it is 'useful,' even if he must act contrary to those virtues in private for the sake of power."}, {"text": "A prince's true character is irrelevant to his rule, as long as he governs justly according to divine law.", "isCorrect": false, "rationale": "Machiavelli challenges the idea of ruling solely 'under God's law' and explicitly links actions to power, often separate from traditional justice. The focus is on effectiveness and appearance."}, {"text": "The more virtuous a prince is, the more effectively he can deceive his enemies and maintain control.", "isCorrect": false, "rationale": "While deception is part of Machiavelli's advice (fox), his point here is not that *actual* virtue enhances deception, but that the *appearance* of virtue is strategically beneficial."}], "id": "q05"}, {"question": "How did Machiavelli's political philosophy, as presented in 'The Prince,' fundamentally break with traditional Medieval political thought?", "options": [{"text": "He argued that rulers should always prioritize the well-being of their subjects, a concept absent in medieval thought.", "isCorrect": false, "rationale": "Medieval political thought, influenced by Christian virtue, also emphasized a good king ruling justly for his subjects. Machiavelli's break was not in valuing subjects' well-being, but in how he advised rulers to achieve power and order."}, {"text": "He insisted that kingship must be tied directly to Christian virtue and moral righteousness above all else.", "isCorrect": false, "rationale": "This is precisely the medieval tradition that Machiavelli challenged. He explicitly stated that a prince must be willing to 'act against virtue when power requires it,' separating politics from personal morality."}, {"text": "He advocated for a democratic system where subjects elect their rulers, rejecting the divine right of kings.", "isCorrect": false, "rationale": "Machiavelli focused on how princes gain and keep power in monarchical systems, not on advocating for democratic governance."}, {"text": "He separated politics from personal morality, arguing that a prince must be willing to act against virtue when it is necessary to maintain power.", "isCorrect": true, "rationale": "The 'keyconcept' note explicitly states that Machiavelli's break was in arguing that princes 'must be willing to act against virtue when power requires it,' thereby separating politics from personal morality, which was 'deeply unsettling to his contemporaries.'"}], "id": "q06"}, {"question": "In Erasmus's 'The Praise of Folly,' Folly herself praises her own indispensability to human life. What is the primary purpose of this satirical technique?", "options": [{"text": "To genuinely celebrate the universal benefits of irrationality and foolish behavior in society.", "isCorrect": false, "rationale": "While Folly praises herself, the note clarifies that this is a 'technique of using a fictional speaker or mask to deliver sharp criticism' (irony/satirical persona), meaning the praise is not genuine but a vehicle for critique."}, {"text": "To provide a direct, serious argument for reforming the Catholic Church's theological practices.", "isCorrect": false, "rationale": "It's a satire written 'as a joke' with 'devastating wit,' using irony rather than a direct, serious argument. While it criticizes the Church, it does so indirectly."}, {"text": "To offer Erasmus a protective 'cover' to deliver sharp criticisms of societal and ecclesiastical pretensions without directly stating them as his own.", "isCorrect": true, "rationale": "The note explicitly states that Folly speaking 'gives Erasmus cover to say things about the Church that would be dangerous to say directly. This technique...is called irony or satirical persona.'"}, {"text": "To establish Folly as a beloved and respected figure, whose wisdom should be heeded by all.", "isCorrect": false, "rationale": "Folly is used as a mask for satire, not as a figure whose 'wisdom' should be taken at face value. Her praise of herself is part of the ironic technique."}], "id": "q07"}, {"question": "Erasmus, through the persona of Folly, targets several groups in 'The Praise of Folly.' Which of the following best represents the primary targets of his satirical critique?", "options": [{"text": "The general populace, for their lack of intellectual curiosity and engagement in civic life.", "isCorrect": false, "rationale": "While the satire has broad implications, the excerpts specifically highlight 'grammarians,' 'theology,' 'monks, ...popes, cardinals, and bishops' as targets, focusing on intellectual and ecclesiastical figures."}, {"text": "Foreign invaders and competing monarchs for their aggressive territorial expansion.", "isCorrect": false, "rationale": "The excerpts provided focus on internal criticisms of scholars and churchmen, not external political conflicts."}, {"text": "Scholars, monks, theologians, and high-ranking church officials for their pretensions, hypocrisy, and detachment from practical wisdom.", "isCorrect": true, "rationale": "The primary sources explicitly show Folly skewering 'grammarians,' 'them that so hugely flatter themselves with the empty title of theology,' and 'monks, ...many popes, cardinals, and bishops' for their perceived flaws and self-importance."}, {"text": "Farmers and laborers, for their superstitious beliefs and resistance to scientific innovation.", "isCorrect": false, "rationale": "The text does not mention farmers or laborers as targets. The satire is directed at intellectual and religious elites."}], "id": "q08"}, {"question": "Thomas More's 'Utopia' describes an ideal society where 'every man has a right to everything' and 'there is no unequal distribution, so that no man is poor, none in necessity.' What is the fundamental principle of property ownership that allows this system to function?", "options": [{"text": "A robust system of private property rights ensures that individual wealth contributes to collective prosperity.", "isCorrect": false, "rationale": "The text states 'though no man has anything, yet they are all rich,' which directly contradicts a system of private property. It emphasizes collective ownership."}, {"text": "A strict hierarchical society where the wealthiest citizens are obligated to care for the poor.", "isCorrect": false, "rationale": "Utopia aims for 'no unequal distribution' and 'no man is poor,' which implies the absence of distinct rich and poor classes or a hierarchical system of charity."}, {"text": "The communal ownership of property and resources, eliminating individual accumulation and want.", "isCorrect": true, "rationale": "The statement 'where every man has a right to everything' and 'no unequal distribution' directly points to common or communal property, where 'no private man can want anything' because 'the public stores [are] full.'"}, {"text": "A meritocratic system where wealth is distributed based on an individual's contribution to society.", "isCorrect": false, "rationale": "While Utopians might contribute, the core principle described is the elimination of want through shared resources, not distribution based on individual merit, which could still lead to inequality."}], "id": "q09"}, {"question": "Consider the approaches of Machiavelli and Thomas More. While Machiavelli offered pragmatic advice for actual rulers, More presented an ideal society in 'Utopia.' What common underlying motivation did both authors share, despite their different methods?", "options": [{"text": "Both sought to provide a direct blueprint for establishing democratic republics in their own nations.", "isCorrect": false, "rationale": "Machiavelli focused on princely rule, and while More's Utopia has elected officials, he was not directly advocating for a democratic revolution in England. Their focus was on effective or just governance, not necessarily democracy."}, {"text": "Both were primarily interested in documenting historical events without offering personal commentary or critique.", "isCorrect": false, "rationale": "Both Machiavelli and More were highly interpretive and critical. Machiavelli offered prescriptive advice, and More used satire to critique society, neither merely documented history."}, {"text": "Both engaged in profound critical analysis of political power and societal structures, aiming to understand or improve governance, albeit through contrasting lenses.", "isCorrect": true, "rationale": "Machiavelli rigorously analyzed 'how princes gain and keep power' (critical analysis of power), and More used his 'Utopia' as a 'mirror to critique English society' and 'all the other governments that I see or know' (critical analysis of societal structures). Both were deeply concerned with governance, one practically, the other idealistically."}, {"text": "Both believed that a ruler's primary responsibility was to inspire religious devotion among their subjects.", "isCorrect": false, "rationale": "Machiavelli prioritized power maintenance, often separate from morality or religion. More's critique of society was not primarily about religious devotion, though he was a devout Catholic. This was not a shared primary motivation in their writings on governance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
