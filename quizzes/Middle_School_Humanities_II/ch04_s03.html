<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental shift in Western European society from the early Middle Ages to the High Middle Ages, as described in the text?", "options": [{"text": "A transition from a predominantly urban, trade-focused society to a rural, agrarian one.", "isCorrect": false, "rationale": "The text states the opposite: early Middle Ages were rural, and the High Middle Ages saw a revival of urban life."}, {"text": "A resurgence of urban life, commercial activity, and the growth of self-governing towns.", "isCorrect": true, "rationale": "The section 'The Towns Come Alive' explicitly details the return of genuine urban life, commercial activity, and the development of communes after centuries."}, {"text": "A period of stagnant population growth leading to less demand for goods and services.", "isCorrect": false, "rationale": "The text indicates that 'Population was growing,' which contributed to the changes."}, {"text": "A decline in agricultural innovation, causing people to rely more on long-distance trade for food.", "isCorrect": false, "rationale": "Agricultural improvements like the heavy plow and three-field system were key factors producing more food, not declining."}], "id": "q01"}, {"question": "The German proverb 'Stadtluft macht frei' ('Town air makes you free') best illustrates which significant development of the High Middle Ages?", "options": [{"text": "The ability of lords to legally restrict movement between manors and towns.", "isCorrect": false, "rationale": "The proverb refers to freedom gained in towns, contrasting with the restrictions of feudalism."}, {"text": "The emergence of towns as centers of relative personal and political freedom, attracting serfs from the countryside.", "isCorrect": true, "rationale": "The text states that 'in a chartered town, a man who lived there for a year and a day was legally free,' drawing people from the countryside seeking freedom from feudal ties."}, {"text": "The elimination of all taxes and feudal obligations for anyone residing within town limits.", "isCorrect": false, "rationale": "While providing freedom, towns still had their own systems of governance and taxation, not an elimination of all obligations."}, {"text": "The widespread adoption of democratic governance systems in all medieval towns.", "isCorrect": false, "rationale": "Towns were 'self-governing' communes, but this doesn't imply modern democratic systems universally."}], "id": "q02"}, {"question": "A central purpose of the guild system, beyond simply organizing workers, was to:", "options": [{"text": "Promote unfettered competition among craftsmen to drive down prices.", "isCorrect": false, "rationale": "Guilds were designed to regulate quality, set prices, and protect members from outside competition, not to promote unfettered competition."}, {"text": "Ensure a consistent standard of quality for goods and provide consumer protection in an unregulated market.", "isCorrect": true, "rationale": "The text explicitly states that 'The guild system was, among other things, a quality-control mechanism' and that 'The guild's mark on a product was a guarantee of quality'."}, {"text": "Facilitate rapid industrialization by mass-producing goods in large factories.", "isCorrect": false, "rationale": "The guild system predates industrialization and focused on artisanal production and craft regulation."}, {"text": "Undermine the authority of town charters and establish independent political rule.", "isCorrect": false, "rationale": "Guilds were organizations within the towns and worked to regulate trade, not to establish independent political rule separate from the town's charter."}], "id": "q03"}, {"question": "In the medieval guild system, a 'journeyman' was characterized by which of the following?", "options": [{"text": "He was a boy living with a master craftsman, receiving training without wages for several years.", "isCorrect": false, "rationale": "This description refers to an apprentice."}, {"text": "He was a craftsman who had completed his apprenticeship and traveled to improve skills, paid by the day, working towards a masterpiece.", "isCorrect": true, "rationale": "The text defines a journeyman as having 'finished his apprenticeship and was paid by the day. He traveled from master to master, improving his skills, until he could produce a masterpiece'."}, {"text": "He was a master craftsman who owned his own shop and was authorized to take on apprentices.", "isCorrect": false, "rationale": "This description refers to a master."}, {"text": "He was a merchant engaged in long-distance trade, responsible for creating the first banks.", "isCorrect": false, "rationale": "This describes a member of a merchant guild, not a journeyman in a craft guild."}], "id": "q04"}, {"question": "The Champagne Fairs were significant not only as markets for goods but also as crucial centers for:", "options": [{"text": "The revival of Roman legal systems and the establishment of new imperial courts.", "isCorrect": false, "rationale": "While Roman law was revived, this happened primarily in universities like Bologna, not the Champagne Fairs."}, {"text": "The development of sophisticated financial instruments like bills of exchange, double-entry bookkeeping, and early insurance.", "isCorrect": true, "rationale": "The text notes that 'The Champagne Fairs were not just markets—they were also the center of an emerging financial system' where Italians developed instruments like 'the bill of exchange... double-entry bookkeeping, and the early forms of insurance'."}, {"text": "The exchange of theological doctrines and the refinement of scholastic philosophy.", "isCorrect": false, "rationale": "Theological developments were centered in universities, particularly Paris, not the trade fairs."}, {"text": "The mass production of agricultural tools and the distribution of staple foods across Europe.", "isCorrect": false, "rationale": "The fairs focused on luxury goods and sophisticated financial transactions, not agricultural tools or staple food distribution."}], "id": "q05"}, {"question": "According to the text, the emphasis on height and abundant light in Gothic cathedral architecture was primarily intended to convey which theological concept?", "options": [{"text": "The practical need for better ventilation and visibility during long services.", "isCorrect": false, "rationale": "While these might be secondary effects, the text emphasizes the theological meaning, not practical utility."}, {"text": "A symbolic representation of God's presence as pure light and the soul's aspiration towards the divine.", "isCorrect": true, "rationale": "The text states: 'Height expressed the aspiration of the soul toward God. Light expressed the presence of God in creation... physical light was the closest thing in creation to the divine nature'."}, {"text": "A demonstration of the local lord's wealth and power through architectural extravagance.", "isCorrect": false, "rationale": "While cathedrals demonstrated wealth, the text focuses on their theological arguments rather than political or economic display."}, {"text": "The architectural innovation of using new, lighter building materials.", "isCorrect": false, "rationale": "The text describes the Gothic cathedral's innovation as replacing thick walls with glass, but the *reason* for this was theological, not just material science."}], "id": "q06"}, {"question": "How did the medieval university, as a 'universitas magistrorum et scholarium,' fundamentally differ from the earlier cathedral schools it evolved from?", "options": [{"text": "Cathedral schools exclusively taught theology, while universities offered a broader curriculum including the liberal arts.", "isCorrect": false, "rationale": "Cathedral schools already trained clergy in Latin, theology, and the liberal arts. The key difference lies in structure and authority."}, {"text": "Universities were primarily funded by student fees, whereas cathedral schools were entirely supported by the Church.", "isCorrect": false, "rationale": "While some universities (like Bologna) had students paying professors, the defining difference was not primarily funding structure across all universities."}, {"text": "Universities received charters from kings or popes, granting them self-governance and the right to grant recognized degrees.", "isCorrect": true, "rationale": "The text defines universitas as a 'corporation of masters and scholars, which received a charter from a pope or king giving it the right to grant degrees and govern itself,' distinguishing it from less formal cathedral schools."}, {"text": "Cathedral schools focused on training clergy, while universities were exclusively for secular scholars and merchants.", "isCorrect": false, "rationale": "Universities continued to train clergy, especially in theology (like Paris), and their degrees were recognized for teaching anywhere in Christendom, including ecclesiastical roles."}], "id": "q07"}, {"question": "If a medieval student was particularly interested in pursuing advanced studies in the systematic recovery and application of Roman law, which university would have been his most logical choice, according to the text?", "options": [{"text": "Oxford, known for its work in natural philosophy and kinematics.", "isCorrect": false, "rationale": "Oxford specialized in natural philosophy and what we call science."}, {"text": "Paris, the theological center of Christendom and home to the scholastic method.", "isCorrect": false, "rationale": "Paris was the center for theology."}, {"text": "Bologna, which specialized in law and was notable for students running the university.", "isCorrect": true, "rationale": "The text explicitly states: 'Bologna (founded c. 1088) specialized in law, particularly Roman law, which was being recovered and systematized'."}, {"text": "Prague, as it was the first university to offer degrees recognized throughout Christendom.", "isCorrect": false, "rationale": "Prague is mentioned in the context of recognized degrees, but not as the 'first,' nor its primary specialization in law."}], "id": "q08"}, {"question": "The 'scholastic method,' characteristic of the medieval university, was designed primarily to achieve what?", "options": [{"text": "Promote rote memorization of sacred texts without questioning their content.", "isCorrect": false, "rationale": "The scholastic method emphasized rigorous questioning and argument, not rote memorization."}, {"text": "Simplify complex theological arguments for a wider, less educated audience.", "isCorrect": false, "rationale": "It was a rigorous academic method for scholars, not for simplification for a general audience."}, {"text": "Force a rigorous examination of every claim by stating questions, listing objections, and providing reasoned defenses.", "isCorrect": true, "rationale": "The definition states: 'The method was designed to force rigorous examination of every claim. Nothing was simply asserted; everything had to be defended with argument'."}, {"text": "Encourage a purely scientific approach to knowledge, rejecting all religious doctrine.", "isCorrect": false, "rationale": "The scholastic method, particularly in Paris, was central to working out the relationship between faith and reason, not rejecting religious doctrine."}], "id": "q09"}, {"question": "Which of the following innovations, transmitted to Europe via the Silk Road, had the most direct and revolutionary impact on the dissemination of knowledge and literacy in the High Middle Ages?", "options": [{"text": "Gunpowder, which transformed military technology and altered the feudal order.", "isCorrect": false, "rationale": "Gunpowder had a profound military impact, but its direct influence on knowledge dissemination was less than that of paper."}, {"text": "Silk and spices, which generated wealth for Italian trading cities.", "isCorrect": false, "rationale": "Silk and spices were luxury goods with economic significance, but they did not directly impact the spread of knowledge or literacy."}, {"text": "The Hindu-Arabic numeral system, which simplified calculation for scholars and merchants.", "isCorrect": false, "rationale": "This system was crucial for mathematics and commerce, but paper had a broader and more fundamental impact on the physical means of knowledge dissemination."}, {"text": "Paper, which replaced expensive parchment and made books cheaper and more plentiful.", "isCorrect": true, "rationale": "The text explicitly states that paper 'replaced the expensive parchment... Paper made books cheaper and more plentiful,' directly leading to wider dissemination of knowledge and supporting literacy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
