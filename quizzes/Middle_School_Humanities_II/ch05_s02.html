        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what common characteristic defines the three literary works of Froissart, Boccaccio, and Chaucer in the Late Middle Ages?", "options": [{"text": "They were primarily romantic tales celebrating courtly love.", "isCorrect": false, "rationale": "The text explicitly states these works were 'not romances or epics,' focusing instead on real-world descriptions."}, {"text": "They served as didactic texts to educate the illiterate masses.", "isCorrect": false, "rationale": "While literature can educate, the text does not emphasize this as their primary common characteristic, nor does it discuss their target audience in this way."}, {"text": "They provided vivid, often brutal, eyewitness accounts of a civilization under pressure.", "isCorrect": true, "rationale": "The text states they are 'vivid, often brutal descriptions of the world as it actually was' and 'eyewitness accounts' that 'give us something no other source provides: the sound and texture of a civilization under pressure.'"}, {"text": "They were epic poems glorifying national heroes and battles.", "isCorrect": false, "rationale": "The text clarifies that these works were 'not romances or epics,' distinguishing them from traditional heroic narratives."}], "id": "q01"}, {"question": "The 'teachernote' highlights the different literary forms employed by Froissart, Boccaccio, and Chaucer. Which option accurately describes what each author's chosen form primarily allowed them to do?", "options": [{"text": "Froissart sketched character; Boccaccio reported events; Chaucer gave physical sensation.", "isCorrect": false, "rationale": "This option incorrectly assigns the primary functions of each author's work as described in the teachernote."}, {"text": "Froissart gave physical sensation; Boccaccio sketched character; Chaucer reported events.", "isCorrect": false, "rationale": "This option incorrectly assigns the primary functions of each author's work as described in the teachernote."}, {"text": "Froissart reported events; Boccaccio provided physical sensation and emotional texture; Chaucer sketched character.", "isCorrect": true, "rationale": "The teachernote explicitly states: 'Froissart reports events; Boccaccio gives us physical sensation and emotional texture; Chaucer sketches character.'"}, {"text": "Froissart offered moral judgment; Boccaccio analyzed political structures; Chaucer celebrated knightly virtues.", "isCorrect": false, "rationale": "This option describes broader thematic elements or analytical lenses not specifically tied to the primary 'allowance' of their literary form as detailed in the teachernote."}], "id": "q02"}, {"question": "Giovanni Boccaccio's Decameron features an introduction that is considered a crucial eyewitness account of which specific historical event?", "options": [{"text": "The Battle of Crécy.", "isCorrect": false, "rationale": "The Battle of Crécy is a focus of Froissart's *Chronicles*, not Boccaccio's *Decameron*."}, {"text": "The Peasants' Revolt of 1381.", "isCorrect": false, "rationale": "The Peasants' Revolt of 1381 is documented by Froissart, not Boccaccio."}, {"text": "The Black Death in Florence in 1348.", "isCorrect": true, "rationale": "The text explicitly states that Boccaccio 'was present in Florence during the Black Death of 1348' and his Introduction to *The Decameron* is 'perhaps the most important eyewitness account of the Black Death in any language.'"}, {"text": "The opening of the Hundred Years' War.", "isCorrect": false, "rationale": "The Hundred Years' War is the primary focus of Froissart's *Chronicles*, not Boccaccio's *Decameron*."}], "id": "q03"}, {"question": "Froissart's description of the Battle of Crécy vividly illustrates how 'a new kind of warfare destroy[ed] the old chivalric order.' Which detail from the text best supports this analysis?", "options": [{"text": "The English archers' precise formations, allowing them to advance one step forward and shoot.", "isCorrect": false, "rationale": "While the English archers' effectiveness is key, this option focuses on their organized approach rather than the 'destruction of the old order' caused by the conflict between old and new tactics/weapons."}, {"text": "The French cavalry riding down their own Genoese crossbowmen, creating disorder amidst the English longbow barrage.", "isCorrect": true, "rationale": "The note explains this event as a 'disaster caused partly by the new weapon and partly by the breakdown of command and discipline in the French army,' which directly reflects the chaos and futility that challenged the traditional chivalric ideals of warfare."}, {"text": "The Genoese crossbowmen cutting the strings of their bows in fear, demonstrating their cowardice.", "isCorrect": false, "rationale": "This detail describes the Genoese reaction to the arrows but does not fully encapsulate the broader 'destruction of the old chivalric order' that involves the breakdown of command and the ineffectiveness of established military units."}, {"text": "The sumptuous equipment of the horsemen, indicating the wealth of the medieval nobility.", "isCorrect": false, "rationale": "The sumptuous equipment is a detail of the scene but does not directly explain how a 'new kind of warfare destroy[ed] the old chivalric order.'"}], "id": "q04"}, {"question": "Froissart's account of the Peasants' Revolt of 1381 includes the peasants' declaration, 'at the beginning of the world there were no slaves, and that no one ought to be treated as such.' This statement primarily reflects which significant social change influenced by the Black Death?", "options": [{"text": "The growing power of the urban merchant class.", "isCorrect": false, "rationale": "While the merchant class might have been growing, the peasants' declaration specifically addresses their own status as 'slaves' and 'bondage,' referring to rural serfdom rather than urban class dynamics."}, {"text": "A demand for religious reform and an end to papal authority.", "isCorrect": false, "rationale": "The declaration is about social equality and freedom from servitude, not directly about religious doctrine or papal authority."}, {"text": "A challenge to the traditional feudal hierarchy and demands for an end to serfdom.", "isCorrect": true, "rationale": "The text states that Froissart's description 'shows how the Black Death changed the relationship between lords and workers' and the peasants' quotes directly articulate their desire to not be treated as 'slaves' or 'beasts,' which is a direct challenge to the feudal system of serfdom."}, {"text": "The establishment of new legal systems based on Roman law.", "isCorrect": false, "rationale": "The passage does not mention legal systems; it focuses on the peasants' grievances regarding their social status and labor conditions."}], "id": "q05"}, {"question": "The 'keyconcept' box compares Boccaccio's and Thucydides' accounts of plague. What is identified as a crucial difference in their perspectives?", "options": [{"text": "Thucydides described a more severe plague, while Boccaccio's was less impactful.", "isCorrect": false, "rationale": "The comparison focuses on their *perspectives* and interpretations, not the relative severity of the plagues they described. Both depicted extremely impactful events."}, {"text": "Boccaccio focused on political consequences, while Thucydides emphasized individual suffering.", "isCorrect": false, "rationale": "Both authors touch upon social and individual impacts. The key difference lies in their analytical frameworks, not their primary focus on political versus individual aspects."}, {"text": "Thucydides approached the plague clinically and rationally, while Boccaccio incorporated a Christian framework of sin and divine judgment.", "isCorrect": true, "rationale": "The text states: 'Thucydides was a rationalist who tried to describe the plague clinically, as a doctor might. Boccaccio is more emotional and morally engaged... Boccaccio adds the Christian framework: sin, divine judgment, and the need for penance.'"}, {"text": "Thucydides saw social breakdown as unique to Athens, whereas Boccaccio believed it was universal.", "isCorrect": false, "rationale": "The text highlights that both observed *similar* social breakdown, and Thucydides' rationalism implies broader human nature under stress, not a unique Athenian phenomenon. The comparison emphasizes the similarity in human experience of epidemic."}], "id": "q06"}, {"question": "Which aspect of social breakdown during the Black Death in Florence did Boccaccio emphasize as 'scarcely to be believed'?", "options": [{"text": "The failure of medical remedies and reliance on superstitions.", "isCorrect": false, "rationale": "While Boccaccio mentions the failure of human remedy, the specific phrase 'scarcely to be believed' is used in relation to family abandonment."}, {"text": "The abandonment of children by their own parents.", "isCorrect": true, "rationale": "Boccaccio writes: 'nay, what is more, and scarcely to be believed, fathers and mothers were found to abandon their own children, untended, unvisited, to their fate, as if they had been strangers.'"}, {"text": "The widespread panic and theft of property.", "isCorrect": false, "rationale": "The text describes social breakdown generally but does not use 'scarcely to be believed' for panic and theft in this excerpt."}, {"text": "The lack of leadership from religious and political authorities.", "isCorrect": false, "rationale": "The passage implies a general collapse of social order, but the specific phrase 'scarcely to be believed' refers to family abandonment, not leadership failures."}], "id": "q07"}, {"question": "Chaucer's Canterbury Tales opens with a detailed description of spring. According to the accompanying note, what symbolic significance does this setting hold for the pilgrims' journey?", "options": [{"text": "It represents the peak season for travel in medieval England due to better roads.", "isCorrect": false, "rationale": "This is a practical consideration but not the symbolic meaning highlighted in the text's note."}, {"text": "It signifies a period of economic prosperity and abundant harvests.", "isCorrect": false, "rationale": "While spring is associated with growth, the note specifically connects it to renewal and spiritual significance, not primarily economic prosperity."}, {"text": "It invokes the ancient connection between spring, fertility, and spiritual renewal, symbolizing new life after winter and plague.", "isCorrect": true, "rationale": "The note explicitly states: 'Chaucer is invoking the ancient connection between spring, fertility, and spiritual renewal. The world is coming back to life after winter (and, for Chaucer's readers, after a generation of plague).'"}, {"text": "It establishes a lighthearted tone, contrasting with the serious themes of some of the tales.", "isCorrect": false, "rationale": "While the spring setting might contribute to a tone, the note emphasizes its symbolic connection to renewal and recovery from crisis, which is a deeper thematic significance."}], "id": "q08"}, {"question": "Chaucer's portrayal of the Prioress, Madam Eglantine, with her 'simple and coy' smile and French spoken 'After the scole of Stratford atte Bowe, For Frenssh of Parys was to hire unknowe,' best exemplifies which aspect of his Canterbury Tales?", "options": [{"text": "His deep admiration for the piety and humility of the clergy.", "isCorrect": false, "rationale": "The description of her French suggests a subtle affectation rather than genuine piety or humility, hinting at a more complex characterization than pure admiration."}, {"text": "His detailed historical accuracy in describing linguistic differences.", "isCorrect": false, "rationale": "While linguistically accurate, the *purpose* of including this detail in a character portrait is not simply historical reporting, but rather characterization and social commentary."}, {"text": "His use of gentle, sometimes not so gentle, satire to observe social nuances and affectations.", "isCorrect": true, "rationale": "The General Prologue is described as 'a masterwork of social observation, sympathy, and gentle (sometimes not so gentle) satire.' The Prioress's affected mannerisms and 'country' French are subtle satirical touches highlighting social aspirations or pretenses."}, {"text": "His focus on the internal spiritual struggles of individuals.", "isCorrect": false, "rationale": "Chaucer's portraits, while revealing character, often focus on external behaviors and social presentation that imply internal states, rather than directly detailing spiritual struggles in this manner."}], "id": "q09"}, {"question": "Considering the introductions to Froissart's Chronicles, Boccaccio's Decameron, and Chaucer's Canterbury Tales, what overarching theme most accurately unifies these 'eyewitness accounts' of the Late Middle Ages?", "options": [{"text": "The celebration of heroic feats and the glory of medieval chivalry.", "isCorrect": false, "rationale": "While Froissart admired courage, he also recorded its 'futility,' and Boccaccio and Chaucer's works focus on plague, social change, and human nature, not solely on celebrating heroism."}, {"text": "The profound impact of crises like war and plague on human society and individual experience.", "isCorrect": true, "rationale": "The introductory section explicitly states these works provide the 'sound and texture of a civilization under pressure,' referring to the Black Death and the Hundred Years' War, which profoundly impacted society and individuals as detailed in each author's section."}, {"text": "The rise of new literary genres and the decline of traditional forms.", "isCorrect": false, "rationale": "While the text discusses different genres, this is a structural point about literature itself, not the unifying *thematic content* of their eyewitness accounts."}, {"text": "The enduring power of religious faith in a time of widespread doubt.", "isCorrect": false, "rationale": "While religion is present in Boccaccio's perspective and Chaucer's pilgrimage, it is not the primary unifying theme that covers Froissart's detailed chronicles of war and social upheaval equally."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
