</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>

        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 3, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    </div>

<script>
var QUESTIONS = [{"question": "Before the First Crusade, how did the rise of the Seljuk Turks fundamentally alter the security and religious practices of Christians in the Holy Land and the Byzantine Empire?", "options": [{"text": "They outlawed all forms of Christian pilgrimage, leading to widespread rebellion.", "isCorrect": false, "rationale": "The text states that early Arab rulers generally tolerated Christian pilgrims, and while the Seljuks did raid pilgrims, the text does not say they 'outlawed all forms' or that this led to widespread rebellion among Christians."}, {"text": "They established a new Caliphate in Jerusalem, unifying all Muslim lands against Byzantium.", "isCorrect": false, "rationale": "The text mentions the Seljuks building a powerful empire across Persia, Iraq, Syria, and Anatolia, but does not state they established a new Caliphate in Jerusalem or unified all Muslim lands in this manner prior to the Crusades. Saladin later unified Egypt and Syria."}, {"text": "Their military conquests threatened the Byzantine heartland and disrupted safe passage for Christian pilgrims, prompting an appeal for Western aid.", "isCorrect": true, "rationale": "The text explicitly states that the Seljuks 'shattered the Byzantine army' at Manzikert, 'began to overrun the Byzantine heartland,' and pushed to within a hundred miles of Constantinople, leading Emperor Alexios I Komnenos to appeal to the Pope. The definition of Seljuk Turks also notes their 'raids on Christian pilgrims to Jerusalem were among the immediate causes' of the First Crusade."}, {"text": "They converted to Eastern Orthodoxy, creating a schism within Islam that weakened Muslim defenses in the region.", "isCorrect": false, "rationale": "The text clearly states the Seljuk Turks 'converted to Sunni Islam,' not Eastern Orthodoxy."}], "id": "q01"}, {"question": "Pope Urban II's call for the First Crusade included a significant theological incentive for participants. Which of the following statements best describes this incentive, as presented in the text?", "options": [{"text": "He promised immediate salvation for anyone who died fighting in the Holy Land, regardless of their past sins.", "isCorrect": false, "rationale": "The 'teachernote' clarifies that Urban was 'not offering salvation by works,' but 'remission of sins,' which is distinct from guaranteed salvation regardless of past sins."}, {"text": "He declared that fighting in the Crusade would lead to a guaranteed place in heaven, akin to martyrdom.", "isCorrect": false, "rationale": "While a powerful spiritual benefit, the text specifically states 'God will forgive your sins' and 'those who died were promised remission of their sins,' not a guaranteed place in heaven directly as a result of death, distinguishing it from a blanket promise of salvation or martyrdom."}, {"text": "He offered participants full remission of their sins, framing the Crusade as a legitimate form of penance for their earthly transgressions.", "isCorrect": true, "rationale": "The text states Urban said, 'Go to the Holy Land... And God will forgive your sins.' The 'teachernote' further explains, 'Urban was not offering salvation by works, but offering the Crusade as a form of penance,' and the definition of Crusade notes, 'those who died were promised remission of their sins.'"}, {"text": "He asserted that God had chosen the Western European knights as His instruments to convert all Muslims to Christianity.", "isCorrect": false, "rationale": "Urban's primary call was to 'Free Jerusalem' and help 'Eastern Christians under Turkish rule,' not explicitly to convert all Muslims to Christianity."}], "id": "q02"}, {"question": "After the First Crusade, the Crusader States were established in the Holy Land. Which characteristic best describes these states, according to the text?", "options": [{"text": "They were a unified, centrally governed empire designed to control all of the Middle East.", "isCorrect": false, "rationale": "The text describes them as 'four principalities,' 'small Christian kingdoms in the middle of a Muslim world,' and notes the First Crusade itself 'was not a unified army under a single command.' This indicates a lack of central unity or aim for a vast empire."}, {"text": "They were self-sufficient entities that quickly integrated into the local Muslim economy and culture.", "isCorrect": false, "rationale": "The text states they were 'dependent on resupply from Europe' and 'constantly under pressure from their neighbors,' indicating they were far from self-sufficient or fully integrated."}, {"text": "They were vulnerable, isolated Christian strongholds requiring continuous external support and military presence for survival.", "isCorrect": true, "rationale": "The text explicitly states they were 'small Christian kingdoms in the middle of a Muslim world,' 'constantly under pressure from their neighbors, dependent on resupply from Europe, and required a permanent military presence to survive.'"}, {"text": "They primarily served as trading posts to facilitate commerce between Europe and Asia.", "isCorrect": false, "rationale": "While trade may have occurred, the text highlights their role as Christian kingdoms carved out in a Muslim world, emphasizing their military and religious significance rather than a primary function as trading posts."}], "id": "q03"}, {"question": "The text emphasizes that the Crusades were driven by a 'complex mix of genuine religious devotion, political ambition, economic interest, and the culture of knightly warfare.' Given this, which of the following motivations would be LEAST consistent with this complex understanding for a knight joining the First Crusade?", "options": [{"text": "A younger son seeking land and status that he could not inherit in his homeland.", "isCorrect": false, "rationale": "The 'caution' section explicitly mentions 'others were younger sons seeking land they could not inherit at home,' making this a consistent motivation."}, {"text": "A lord seeking to expand his political influence and territorial control in a new region.", "isCorrect": false, "rationale": "The 'caution' section notes 'some lords saw opportunities for political expansion,' aligning with this motivation."}, {"text": "A deeply pious knight genuinely convinced that freeing Jerusalem was God's will and a path to penance.", "isCorrect": false, "rationale": "The text states 'genuine religious devotion' and 'some Crusaders were sincere pilgrims,' making this a highly consistent motivation, especially given Urban II's promise of remission of sins."}, {"text": "A peasant joining for the sole purpose of establishing a new, peaceful agricultural commune free from feudal lords.", "isCorrect": true, "rationale": "While peasants did join the Crusades (e.g., Peter the Hermit's People's Crusade), the 'caution' section specifically details the 'complex mix' of motivations for 'Crusaders' (often implied as knights/lords) as religious, political, economic, and related to 'knightly warfare.' The idea of establishing a 'peaceful agricultural commune free from feudal lords' is not listed among these complex motivations for joining a holy war, making it the least consistent with the text's description of Crusader motivations."}], "id": "q04"}, {"question": "How did Saladin's recapture of Jerusalem in 1187 distinctly differ from the Crusaders' capture of the city in 1099?", "options": [{"text": "Saladin immediately destroyed all Christian holy sites, whereas the Crusaders preserved Muslim holy sites.", "isCorrect": false, "rationale": "The text states Saladin 'allowed Christian pilgrims to continue visiting the holy sites' and 'forbade a massacre.' The Crusaders, in contrast, carried out a 'massacre' of Muslim and Jewish inhabitants, implying no special preservation of their sites."}, {"text": "Saladin imposed heavy taxes on all Christian inhabitants, which the Crusaders avoided doing with Muslim residents.", "isCorrect": false, "rationale": "The text states Saladin 'ransomed those who could pay' and 'forbade a massacre.' The Crusaders in 1099 carried out a 'massacre,' making a comparison about taxes irrelevant and inaccurate."}, {"text": "Saladin forbade a general massacre and allowed Christian pilgrims to visit, contrasting with the Crusaders' widespread slaughter of inhabitants.", "isCorrect": true, "rationale": "The text explicitly states, 'Saladin's behavior contrasted sharply with the Crusaders of 1099: he forbade a massacre, ransomed those who could pay, and allowed Christian pilgrims to continue visiting the holy sites.' In 1099, the Crusaders committed a 'massacre... in enormous numbers.'"}, {"text": "Saladin established a permanent truce with the remaining Crusader States, which the 1099 Crusaders refused to do with Muslim leaders.", "isCorrect": false, "rationale": "Saladin fought against the Crusader states (e.g., Battle of Hattin) and did not establish a permanent truce after recapturing Jerusalem in 1187. A truce with Richard I was negotiated later during the Third Crusade, but this question is about Saladin's actions in 1187."}], "id": "q05"}, {"question": "Which of the following military orders, described in the text, had an older origin, initially focused on caring for the sick and pilgrims before becoming a military force?", "options": [{"text": "The Teutonic Knights", "isCorrect": false, "rationale": "The Teutonic Knights are not mentioned in this section of the text."}, {"text": "The Knights Templar", "isCorrect": false, "rationale": "The text states the Knights Templar were 'founded c. 1119' as 'warrior-monks,' indicating their military purpose from their inception, not a prior hospital origin."}, {"text": "The Knights Hospitaller", "isCorrect": true, "rationale": "The text explicitly states, 'The Knights Hospitaller had an older origin—they began as a hospital order caring for sick pilgrims in Jerusalem, and only later took up arms.'"}, {"text": "The Order of Santiago", "isCorrect": false, "rationale": "The Order of Santiago is not mentioned in this section of the text."}], "id": "q06"}, {"question": "According to Bernard of Clairvaux's explanation for the catastrophic failure of the Second Crusade, what was the primary cause?", "options": [{"text": "The overwhelming numerical superiority of the unified Muslim armies led by Zengi.", "isCorrect": false, "rationale": "While Zengi's capture of Edessa inspired the crusade, Bernard's explanation for its failure was not about numerical superiority but rather a divine judgment."}, {"text": "A lack of coordination between the German and French armies and their attacks on inappropriate targets.", "isCorrect": false, "rationale": "The text states these were factual reasons for the Second Crusade's failure, but the question asks for *Bernard of Clairvaux's explanation*, which was different."}, {"text": "God's judgment on the sins and moral failings of the Crusaders themselves.", "isCorrect": true, "rationale": "The text states, 'Bernard, devastated, could only explain it as God's judgment on the sins of the Crusaders themselves.'"}, {"text": "A severe epidemic that decimated the Crusader forces before they reached the Holy Land.", "isCorrect": false, "rationale": "The text does not mention an epidemic as the cause for the Second Crusade's failure or as Bernard's explanation for it."}], "id": "q07"}, {"question": "Which statement best characterizes the military command structure of the *official* First Crusade?", "options": [{"text": "It was a highly centralized army led by a single, powerful Pope-appointed commander.", "isCorrect": false, "rationale": "The text explicitly states, 'This was not a unified army under a single command.'"}, {"text": "It was a coalition of independent forces under various lords, which sometimes cooperated and sometimes conflicted.", "isCorrect": true, "rationale": "The text describes it as 'assembled... under several great lords' and clarifies, 'it was a coalition of separate forces that sometimes cooperated and sometimes quarreled.'"}, {"text": "It was primarily composed of peasant militias led by charismatic preachers, like Peter the Hermit.", "isCorrect": false, "rationale": "This describes the 'unofficial' or 'People's Crusade,' not the 'official Crusade assembled... under several great lords.'"}, {"text": "It was an army fully integrated into the Byzantine military, operating under the Emperor's direct command.", "isCorrect": false, "rationale": "The text notes 'considerable friction with their supposed allies' (the Byzantine Empire), indicating a lack of full integration or direct command."}], "id": "q08"}, {"question": "A medieval Christian undertaking a journey from France to Santiago de Compostela in Spain to pray at the tomb of Saint James would be engaging in which significant religious practice, as defined in the text?", "options": [{"text": "A Crusade, because it involves travel to a holy site.", "isCorrect": false, "rationale": "A 'Crusade' is defined as a 'holy war called by the Pope' with military objectives, not simply any religious journey."}, {"text": "A peregrinatio, which is a specific term for a pilgrimage to a holy place for religious devotion.", "isCorrect": true, "rationale": "The 'definitionpilgrimage' section describes a pilgrimage as 'A journey made to a holy place as an act of religious devotion,' listing Santiago de Compostela as a prized destination. The 'definitionCrusade' further clarifies that Crusaders believed they were on a 'peregrinatio (pilgrimage).'"}, {"text": "A penance, which automatically remits all sins through the act of travel.", "isCorrect": false, "rationale": "While pilgrimage could be an act of penance, the term 'peregrinatio' or 'pilgrimage' refers to the journey itself, and the text doesn't state it automatically remitted 'all' sins simply through travel, unlike the specific papal offer for Crusaders."}, {"text": "A monastic mission, aimed at establishing new religious orders in Spain.", "isCorrect": false, "rationale": "The description is of a personal act of religious devotion to a holy site, not a mission to establish religious orders."}], "id": "q09"}, {"question": "Despite the presence of formidable leaders like Richard the Lionheart, the Third Crusade ultimately failed to achieve its primary objective of recapturing Jerusalem. Which factor, supported by the text, was a significant reason for this failure?", "options": [{"text": "Saladin's overwhelming numerical superiority and superior military technology prevented any successful siege.", "isCorrect": false, "rationale": "While Saladin was a 'brilliant military commander,' the text does not attribute the Third Crusade's failure to his overwhelming numerical superiority or superior technology, but rather to issues within the Crusader coalition."}, {"text": "The Crusader alliance dissolved due to internal conflicts and the premature departure or death of key European monarchs.", "isCorrect": true, "rationale": "The text states, 'Frederick Barbarossa drowned crossing a river... most of his army went home. Philip II quarreled with Richard and left early. That left Richard essentially alone—... But he could not take the city,' highlighting the disintegration of the alliance as a key factor."}, {"text": "A major epidemic swept through the Crusader camps, forcing a retreat before they could launch a final assault.", "isCorrect": false, "rationale": "The text mentions privation from hunger and disease during the First Crusade's siege of Antioch, but not a major epidemic as the cause for the Third Crusade's failure to take Jerusalem."}, {"text": "The Pope unexpectedly recalled the Crusade, declaring its objectives no longer necessary.", "isCorrect": false, "rationale": "The text states Pope Gregory VIII 'proclaimed a new Crusade immediately' after the fall of Jerusalem, and there is no mention of the Pope recalling it before its conclusion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
