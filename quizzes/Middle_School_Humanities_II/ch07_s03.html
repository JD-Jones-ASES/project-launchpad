        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>

        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "How did the printing press revolutionize the spread of Martin Luther's Ninety-Five Theses compared to earlier challenges to church authority?", "options": [{"text": "It allowed Luther to personally distribute hundreds of copies to every major city himself.", "isCorrect": false, "rationale": "The text states printers recognized Luther's theses would sell and distributed them. Luther did not personally distribute hundreds of copies across Europe; the printing press enabled rapid, widespread distribution by others."}, {"text": "It enabled his ideas to spread across Germany within two weeks and Europe within two months, making suppression much more difficult.", "isCorrect": true, "rationale": "The text explicitly states that within two weeks, copies had spread across Germany, and within two months, all of Europe knew his name. It also notes that unlike pre-print challenges, ideas could not be 'burned out of thousands of minds' once widely distributed."}, {"text": "It allowed Luther to publish his theses in Latin, which was the universally understood language across Europe.", "isCorrect": false, "rationale": "Luther initially sent a single document in Latin to an official, but the printing press's impact was primarily on the speed and scale of distribution, not the initial language choice, and later focused on vernacular texts for a mass audience."}, {"text": "It granted Luther an official license from the Emperor to disseminate his religious arguments widely.", "isCorrect": false, "rationale": "The text indicates that Luther was declared an outlaw at the Diet of Worms, not given an official license. The spread of his ideas was due to the technology, often despite authority, not because of official approval."}], "id": "q01"}, {"question": "The text states the printing press 'changed the nature of the argument itself.' Which of the following best exemplifies this change?", "options": [{"text": "It shifted the primary language of religious debate from Latin to local vernaculars.", "isCorrect": false, "rationale": "While the printing press facilitated vernacular translations, the 'change in the nature of the argument' refers more to the resilience of ideas against suppression than simply the language used for debate, though vernacular texts were a key part of the larger impact."}, {"text": "It made it nearly impossible for authorities to suppress dissenting ideas by simply seizing or burning manuscripts.", "isCorrect": true, "rationale": "The text explains that in the pre-print world, challenges could be suppressed by seizing and burning manuscripts. In the print world, 'there were always more copies. You could burn the books; you could not burn the idea out of the thousands of minds that had already read them.' This fundamentally altered how dissent could be handled."}, {"text": "It centralized religious authority by ensuring that only approved texts were widely published.", "isCorrect": false, "rationale": "The printing press had the opposite effect, shattering existing monopolies on information and enabling the rapid spread of diverse and often challenging ideas, rather than centralizing authority."}, {"text": "It ensured that only highly educated scholars could participate in theological discussions.", "isCorrect": false, "rationale": "The development of pamphlets and vernacular Bibles aimed to make religious ideas accessible to ordinary people, broadening participation in discussions rather than limiting it to scholars."}], "id": "q02"}, {"question": "According to the text, what was the primary significance of the 'pamphlet' as a medium during the Reformation?", "options": [{"text": "It was primarily used by the Catholic Church to distribute official doctrines and counter-Reformation arguments.", "isCorrect": false, "rationale": "While opponents might have used pamphlets, the text highlights Luther's mastery of the form, writing in a direct German for 'ordinary people,' positioning pamphlets as a tool for the Reformation rather than exclusively for the Church."}, {"text": "Pamphlets were lengthy, scholarly works intended only for academic debate among theologians.", "isCorrect": false, "rationale": "The definition states pamphlets were 'short, inexpensive printed booklet...short enough to be read in a single sitting,' and Luther wrote them in 'direct, vivid German that ordinary people could follow,' contradicting the idea of lengthy, scholarly works for academics only."}, {"text": "They served as the 'social media' of the sixteenth century, being cheap, easy to distribute, and accessible to a mass audience.", "isCorrect": true, "rationale": "The text directly defines pamphlets as 'the social media of the sixteenth century: cheap to print, easy to distribute, and short enough to be read in a single sitting,' emphasizing their role in mass communication."}, {"text": "They were expensive, rare documents produced exclusively for royal courts and wealthy patrons.", "isCorrect": false, "rationale": "The text describes pamphlets as 'inexpensive' and widely distributed, directly contradicting this option."}], "id": "q03"}, {"question": "Before the Reformation, what was the Catholic Church's general stance on ordinary people reading the Bible in their own language?", "options": [{"text": "The Church encouraged widespread Bible reading in vernacular languages to foster personal piety.", "isCorrect": false, "rationale": "The text states that the idea of ordinary people reading the Bible in their own language was 'revolutionary' in 1520 and that the Church insisted the authoritative text was the Latin Vulgate, with interpretation belonging to clergy, contradicting encouragement of widespread vernacular reading."}, {"text": "It insisted on the Latin Vulgate as the authoritative text and reserved interpretation for trained clergy, fearing the spread of heresy through unauthorized translations.", "isCorrect": true, "rationale": "The text clearly states the Church 'insisted that the authoritative text was the Latin Vulgate, and that interpretation of Scripture belonged to trained clergy and church authority,' adding that 'An unauthorized translation could spread heresy.'"}, {"text": "The Church explicitly banned all Bible translations into any language other than Latin globally.", "isCorrect": false, "rationale": "While the Constitutions of Oxford (1408) in England effectively banned English translations without episcopal approval, the Fourth Council of the Lateran (1215) had 'not explicitly banned translations,' indicating a nuanced, rather than global explicit ban on ALL translations."}, {"text": "Vernacular Bibles were common, but only in territories not under papal authority.", "isCorrect": false, "rationale": "The text emphasizes that the idea was 'revolutionary' in 1520, indicating vernacular Bibles were not common, especially in a way that would bypass papal authority widespreadly."}], "id": "q04"}, {"question": "Beyond simply translating the Bible, what significant long-term impact did Luther's and Tyndale's vernacular translations have, according to the text?", "options": [{"text": "They led directly to the immediate universal literacy of the entire European population within a generation.", "isCorrect": false, "rationale": "The text notes literacy was 'perhaps ten to twenty percent' in early 16th-century England and that the Reformation and spread of literacy 'moved together, each driving the other forward,' implying a gradual process, not immediate universal literacy."}, {"text": "They ensured that Latin remained the dominant scholarly language for centuries to come.", "isCorrect": false, "rationale": "By promoting vernacular languages and literacy, these translations contributed to the rise of national languages, thereby lessening the exclusive dominance of Latin in many spheres."}, {"text": "They helped standardize modern German and English languages and drove the gradual spread of literacy across Protestant Europe.", "isCorrect": true, "rationale": "The text states Luther 'helped standardize the modern German language,' and for Tyndale, it notes the 'Reformation and the gradual spread of literacy across Protestant Europe moved together, each driving the other forward' due to affordable printed Bibles."}, {"text": "Their primary impact was to unify all Christian denominations under a single, agreed-upon Bible translation.", "isCorrect": false, "rationale": "The Reformation led to Christian division, not unification under a single translation, as different groups often had their own preferred versions or interpretations."}], "id": "q05"}, {"question": "The German princes played a crucial role in the Lutheran Reformation. Which statement best describes the complex motivations behind their support for Luther?", "options": [{"text": "They were solely motivated by deep theological conviction in Lutheran doctrine.", "isCorrect": false, "rationale": "The 'teachernote' explicitly advises being 'honest with students about the mixed motives,' stating 'Many German princes genuinely believed in Lutheran doctrine. Many others recognized that the Reformation gave them an excuse to seize church lands...and break free from Roman financial obligations.'"}, {"text": "Their support was purely opportunistic, seeking to confiscate church lands and break free from Roman financial obligations.", "isCorrect": false, "rationale": "Similar to the above, the 'teachernote' highlights a mixture of motives, not purely opportunistic ones, acknowledging genuine belief as well."}, {"text": "Their motivations were a mixture of genuine religious conviction in Lutheran doctrine and political advantages like seizing church lands and reducing Roman influence.", "isCorrect": true, "rationale": "The 'teachernote' directly addresses this, stating the Reformation 'was driven by a mixture of genuine conviction and self-interest,' encompassing both theological belief and political/financial gains like seizing church lands."}, {"text": "They supported Luther primarily because they sought to unify the Holy Roman Empire into a single, centralized nation-state.", "isCorrect": false, "rationale": "The text describes the Holy Roman Empire as a 'loose confederation of hundreds of territories' and the princes' decisions as determining their territory's religion, which suggests a desire for regional autonomy, not a unified centralized state."}], "id": "q06"}, {"question": "Henry VIII's break from Rome is presented as a clear example of the political dimensions of religious change. What was the immediate primary driver for his actions?", "options": [{"text": "His profound theological agreement with Luther's Protestant doctrines.", "isCorrect": false, "rationale": "The text explicitly states Henry VIII 'was not a Protestant theologian' and had previously written a pamphlet defending the seven sacraments against Luther."}, {"text": "His desire to confiscate vast church lands to enrich the English monarchy.", "isCorrect": false, "rationale": "While this was a consequence and likely a secondary motivation, the text identifies the immediate primary driver as the 'marriage question,' not initially land confiscation."}, {"text": "His ambition to become the Emperor of the Holy Roman Empire.", "isCorrect": false, "rationale": "There is no information in the text to support this claim; Henry VIII's political ambitions were focused on England."}, {"text": "His personal marriage question and the inability to secure an annulment from the Pope.", "isCorrect": true, "rationale": "The text clearly states, 'His break from Rome was driven by the marriage question, not by theology.'"}], "id": "q07"}, {"question": "The section concludes by highlighting a consistent pattern in history regarding technology and the spread of ideas. Which statement accurately summarizes this pattern?", "options": [{"text": "New technologies always create revolutionary social and religious movements from scratch.", "isCorrect": false, "rationale": "The text states, 'The printing press did not create Martin Luther. It did not write his arguments.' And 'a new communications or transportation technology does not create a movement.' The ideas must already be compelling."}, {"text": "Compelling ideas can only spread widely if accompanied by significant military conquest.", "isCorrect": false, "rationale": "While military factors are mentioned (e.g., Ottoman Turks), the consistent pattern focuses on communications/transportation technology as the amplifier, not military conquest as a prerequisite for spread."}, {"text": "A new communications or transportation technology can transform a local movement with compelling ideas into a continental or 'viral' one.", "isCorrect": true, "rationale": "The text explicitly states this: 'a new communications or transportation technology does not create a movement, but it can transform a local movement into a continental one. The ideas must already be compelling. But technology determines whether compelling ideas stay local or go viral.'"}, {"text": "Technological advancements primarily serve to reinforce existing monopolies on information and power.", "isCorrect": false, "rationale": "The text suggests the opposite, stating technologies like the printing press and internet 'shattered existing monopolies on who got to speak and be heard' and 'empowered individuals against institutions.'"}], "id": "q08"}, {"question": "The 'Then and Now' keyconcept compares the printing press to the internet. Which of the following is NOT presented as a shared characteristic of their impact?", "options": [{"text": "Both lowered the cost of producing and distributing information to near zero.", "isCorrect": false, "rationale": "The text explicitly states: 'Both the Reformation press and the modern internet lowered the cost of producing and distributing information to near zero.'"}, {"text": "Both shattered existing monopolies on who got to speak and be heard.", "isCorrect": false, "rationale": "The text explicitly states: 'Both shattered existing monopolies on who got to speak and be heard.'"}, {"text": "Both empowered individuals against institutions.", "isCorrect": false, "rationale": "The text explicitly states: 'Both empowered individuals against institutions.'"}, {"text": "Both led to an immediate and unambiguous increase in clarity and certainty regarding truth.", "isCorrect": true, "rationale": "The text states: 'And both produced a flood of conflicting claims that made it harder to know what was true—alongside the true things.' This indicates a challenge to clarity and certainty, not an unambiguous increase."}], "id": "q09"}, {"question": "Which of the following is identified as a positive legacy of the Reformation, distinct from mere division and conflict?", "options": [{"text": "The establishment of a single, unified Christian Church across Europe.", "isCorrect": false, "rationale": "The text explicitly states, 'By 1560, Western Christianity had divided in ways that could not be undone. Europe was no longer a single Church,' directly contradicting this option."}, {"text": "The suppression of all forms of religious dissent and heresy.", "isCorrect": false, "rationale": "The Reformation itself was a massive act of religious dissent, and its legacy includes the idea of individual conscience, not the suppression of dissent."}, {"text": "The idea that individual conscience has rights the state cannot completely override, and a demand for educated laypeople that drove literacy and built schools.", "isCorrect": true, "rationale": "The text lists among the positive legacies: 'The idea that individual conscience has rights the state cannot completely override—a seed of modern religious freedom' and 'A demand for educated laypeople that built schools, universities, and eventually, systems of public education across Protestant Europe.'"}, {"text": "The universal abandonment of traditional church authority in favor of secular governance.", "isCorrect": false, "rationale": "While it challenged traditional church authority, it didn't lead to universal abandonment, nor was it solely replaced by secular governance; new church structures (Lutheran, Calvinist, Anglican) emerged with their own forms of authority."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
