<!DOCTYPE html>

    <title>History &amp; Humanities II &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Europe's population change between 1347 and 1400, and what was a significant contributing factor to this change?", "options": [{"text": "It increased to 75 million due to improved hygiene and agricultural practices.", "isCorrect": false, "rationale": "The text states that Europe's population was approximately 75 million before the Black Death and fell to 45-50 million by 1400. This option contradicts the demographic impact described."}, {"text": "It decreased by over 30% due to widespread famine and the devastating impact of the Black Death.", "isCorrect": true, "rationale": "The text indicates a population drop from 75 million to 45-50 million, which is a reduction of 33-40%. It also notes that the population was 'already weakened by years of famine' before the plague arrived."}, {"text": "It remained stable as new births quickly offset the deaths caused by localized conflicts.", "isCorrect": false, "rationale": "The text clearly describes a massive and long-lasting population decline, not stability, and attributes it primarily to the Black Death, not localized conflicts."}, {"text": "It decreased slightly, but fully recovered to pre-plague levels within a single generation.", "isCorrect": false, "rationale": "The text specifies that the population did not recover to its pre-plague level until the sixteenth century, roughly 150 years after the first outbreak, not within a single generation."}], "id": "q01"}, {"question": "The Black Death produced one of the greatest economic disruptions in European history. Which of the following best explains the fundamental economic shift it caused in Western Europe?", "options": [{"text": "It led to a surplus of land and a shortage of manufactured goods, driving urban prices down significantly.", "isCorrect": false, "rationale": "While there was a surplus of land due to depopulation, the core economic disruption was centered on labor scarcity, not primarily a general shortage of manufactured goods or a universal price drop."}, {"text": "It caused a severe labor scarcity, granting surviving peasants unprecedented economic bargaining power against landlords.", "isCorrect": true, "rationale": "The text explicitly states: 'when something becomes scarce, it becomes more valuable. After the plague, the thing that was most scarce was people.' This led directly to peasants gaining leverage and the ability to demand better conditions."}, {"text": "It solidified the feudal system by making lords more dependent on their remaining serfs, who were even more strictly bound to the land.", "isCorrect": false, "rationale": "The text explains the opposite: the labor scarcity allowed serfs to leave and find other lords, causing the 'old feudal system... [to] begin to break down.'"}, {"text": "It primarily impacted urban merchants, leading to a long-term decline in international trade routes and wealth accumulation.", "isCorrect": false, "rationale": "While trade was affected, the most 'fundamental economic disruption' described in detail was the transformation of the labor market and the end of serfdom in the West, which impacted rural and urban areas alike."}], "id": "q02"}, {"question": "The text describes the 'Unintended Revolution' that ended serfdom. Based on this concept, which scenario is most analogous to how serfdom effectively disappeared in Western Europe?", "options": [{"text": "A charismatic leader successfully organized a revolution to overthrow the ruling class and establish new agrarian laws.", "isCorrect": false, "rationale": "The text explicitly states: 'There was no reformer who organized the change.'"}, {"text": "A benevolent king, seeking to modernize his kingdom, issued a royal decree freeing all serfs and compensating landlords.", "isCorrect": false, "rationale": "The text clarifies: 'The serfs had not been freed by a royal decree.'"}, {"text": "A sudden, catastrophic event drastically altered the economic landscape, making the existing labor system unsustainable and unenforceable by traditional means.", "isCorrect": true, "rationale": "The Black Death, a 'catastrophe,' transformed the labor market by creating scarcity. This economic reality 'ultimately overpower[ed] even the most entrenched legal systems' like serfdom, making it impossible for landlords to enforce the old rules."}, {"text": "A widespread intellectual movement advocated for human rights, gradually convincing society to abandon serfdom on moral grounds.", "isCorrect": false, "rationale": "While ideas of equality (like John Ball's sermon) emerged, the text emphasizes economic realities as the primary driver for the end of serfdom, rather than a gradual shift in moral consensus alone."}], "id": "q03"}, {"question": "John Ball's famous sermon, 'When Adam delved and Eve span, who was then the gentleman?' during the Peasants' Revolt of 1381, primarily aimed to:", "options": [{"text": "Advocate for a return to traditional feudal labor services and fixed wages.", "isCorrect": false, "rationale": "John Ball was a radical priest and a leader of a revolt against the existing feudal order and attempts to hold down wages, making this option contradictory to his known stance."}, {"text": "Question the divine legitimacy of social hierarchy and inherited inequality among people.", "isCorrect": true, "rationale": "The text explains this quote as meaning: 'before the Fall, there were no nobles, no serfs, no social hierarchy. Where did inequality come from? Not from God, but from human tyranny,' directly challenging the existing social order."}, {"text": "Support the young King Richard II's authority against rebellious local lords.", "isCorrect": false, "rationale": "Ball was leading a revolt of peasants *against* the existing power structure, which included the King's officials, not supporting the King against other lords."}, {"text": "Blame the Church and its leaders for the economic hardships faced by peasants.", "isCorrect": false, "rationale": "While he was a priest, his sermon's direct message, as interpreted by the text, focused on the origins and legitimacy of secular social hierarchy and inequality, rather than an institutional critique of the Church itself."}], "id": "q04"}, {"question": "How did the English longbow significantly challenge the traditional military structure of medieval Europe during the Hundred Years' War?", "options": [{"text": "It required extensive training and equipment, making specialized infantry even more exclusive than mounted knights.", "isCorrect": false, "rationale": "While longbowmen were trained, the text emphasizes their low cost relative to knights, making them less exclusive."}, {"text": "It proved that full plate armor was largely impenetrable, making knights ultimately more dominant on the battlefield.", "isCorrect": false, "rationale": "The text states the longbow 'shattered the military dominance of the armored knight' and that plate armor 'could not stop a direct hit from a longbow at close range.'"}, {"text": "It allowed less-costly, common soldiers to effectively defeat highly expensive armored knights, rendering the traditional feudal warrior less decisive.", "isCorrect": true, "rationale": "The text highlights this by comparing a 'French noble in full plate armor...an investment of thousands of pounds' being killed by an arrow from an 'English yeoman who had earned a few pence a day,' concluding that the expensive mounted warrior 'was no longer the decisive unit of battle.'"}, {"text": "It directly led to the immediate and widespread development of firearms, rendering all traditional melee weapons obsolete.", "isCorrect": false, "rationale": "The longbow was the 'first revolution,' and gunpowder was the 'second,' arriving later and having its own distinct impact. The longbow did not directly *lead* to firearms."}], "id": "q05"}, {"question": "The text states that gunpowder 'transformed both warfare and the balance of social power.' Which of the following best illustrates the social consequence of gunpowder's introduction?", "options": [{"text": "It increased the value and demand for highly skilled individual fighters, making duels the primary mode of combat.", "isCorrect": false, "rationale": "Gunpowder weapons, especially cannons, emphasized technological power and massed forces, not individual melee skill or dueling."}, {"text": "It reinforced the existing social hierarchy by making warfare even more expensive and exclusive to the wealthy nobility.", "isCorrect": false, "rationale": "The text states the opposite: gunpowder made the 'expensive mounted warrior' obsolete and allowed 'trained men with guns' to be effective, undermining the knight's social privilege."}, {"text": "It democratized warfare by making effective soldiers less dependent on noble status, extensive training, or expensive personal equipment.", "isCorrect": true, "rationale": "The text explains: 'The knight...was no longer militarily necessary. Armies could now be trained men with guns, not expensively equipped warriors who had spent years learning to fight on horseback. The feudal order had lost its military justification.'"}, {"text": "It necessitated the construction of larger, more impregnable castles, thereby strengthening the power of local lords.", "isCorrect": false, "rationale": "The text explicitly states that gunpowder weapons (cannons) made 'castle walls...previously considered impregnable' vulnerable and that 'The age of the castle was over.'"}], "id": "q06"}, {"question": "The fall of Constantinople in 1453 is presented as a 'massive transfer of knowledge to the West.' Which aspect of this transfer had the most direct and immediate impact on the burgeoning Renaissance in Italy?", "options": [{"text": "The Ottoman conquest spurred Italian cities to seek new trade routes, stimulating economic growth and patronage for the arts.", "isCorrect": false, "rationale": "While the Ottoman conquest did spur the Age of Exploration (a separate Key Concept), this was an economic and exploratory impact, not the 'transfer of knowledge' that directly fueled the Renaissance in the immediate sense described."}, {"text": "The destruction of Constantinople's libraries forced Western scholars to rely more on their own innovative ideas, fostering independent thought.", "isCorrect": false, "rationale": "The text states that Byzantine scholars 'preserved ancient Greek texts' and took them to the West, implying preservation and transfer, not destruction leading to independent thought."}, {"text": "Fleeing Byzantine scholars brought preserved ancient Greek texts directly to Western European intellectual centers, especially in Italy.", "isCorrect": true, "rationale": "The text directly states: 'As the Ottoman army approached Constantinople...Greek scholars began leaving the city, taking their manuscripts with them. They went primarily to Italy... The arrival of these Greek manuscripts and the scholars who could read them directly accelerated the Renaissance.'"}, {"text": "The event demonstrated the military superiority of gunpowder, inspiring Italian states to invest heavily in new military technologies.", "isCorrect": false, "rationale": "This was a military implication of the fall of Constantinople, but it is distinct from the 'massive transfer of knowledge' that directly impacted the Renaissance culturally."}], "id": "q07"}, {"question": "The closure of the overland Silk Road due to the Ottoman conquest of Constantinople directly contributed to the Age of Exploration primarily by:", "options": [{"text": "Shifting European economic focus from international trade to localized agriculture and manufacturing.", "isCorrect": false, "rationale": "The text indicates that Europeans sought *new ways to reach Asia* for trade, implying a continuation of international trade interest, not a shift away from it."}, {"text": "Forcing European powers to seek alternative maritime routes around Africa and across the Atlantic to reach Asian markets.", "isCorrect": true, "rationale": "The text states: 'With the Ottomans controlling the eastern Mediterranean, access to Asian goods became more expensive and less reliable. European merchants and governments began asking: is there another way to reach Asia? This question... drove the Age of Exploration.'"}, {"text": "Causing a complete cessation of all trade between Europe and Asia, leading to widespread economic collapse.", "isCorrect": false, "rationale": "The text says access to Asian goods became 'more expensive and less reliable,' not that trade completely ceased or led to a total collapse."}, {"text": "Encouraging European nations to form military and economic alliances with the Ottoman Empire to secure trade routes.", "isCorrect": false, "rationale": "The impetus was to *bypass* Ottoman control, not to form alliances that would concede control."}], "id": "q08"}, {"question": "The 'Then and Now' section compares the Late Medieval Crisis to the Fall of Rome. A key difference highlighted is the 'resolution.' What does this comparison suggest about the long-term outcomes of these two catastrophic periods?", "options": [{"text": "Both periods led to prolonged eras of cultural stagnation and significant demographic decline.", "isCorrect": false, "rationale": "The text explicitly contrasts their resolutions, stating the LMC led to a 'creative explosion,' unlike the 'reduced complexity' after Rome's fall."}, {"text": "The Fall of Rome resulted in a rapid rebirth of civilization, while the Late Medieval Crisis led to a slower, more gradual process of change.", "isCorrect": false, "rationale": "This is the inverse of what the text states. Rome's fall produced 'five centuries of reduced complexity,' whereas the LMC produced rapid developments 'within a century.'"}, {"text": "The Late Medieval Crisis served as a catalyst for rapid innovation and the birth of new eras, unlike the protracted decline that followed Rome's collapse.", "isCorrect": true, "rationale": "The text states: 'The Late Medieval Crisis produced, within a century, the Renaissance, the Age of Exploration, and the Protestant Reformation—one of the most creative explosions in Western history. The fall of Rome produced five centuries of reduced complexity.'"}, {"text": "Both events primarily resulted in military overhauls without significant cultural or economic shifts.", "isCorrect": false, "rationale": "The text clearly outlines significant economic (end of serfdom) and cultural (Renaissance, knowledge transfer) shifts for both periods, in addition to military changes."}], "id": "q09"}, {"question": "Considering the various crises discussed—plague, war, and social upheaval—what is the most overarching and long-lasting impact these events had on Western European society by the 16th century?", "options": [{"text": "A return to a more centralized, unified imperial system resembling ancient Rome, overcoming feudal fragmentation.", "isCorrect": false, "rationale": "While monarchies gained power, the text does not describe a full return to a Roman-style unified empire. The feudal system broke down, but a new, highly centralized imperial system wasn't the immediate, overarching result across Western Europe."}, {"text": "The complete abolition of monarchical rule and the establishment of widespread democratic republics across the continent.", "isCorrect": false, "rationale": "Monarchical rule largely continued, though its nature changed. There was no widespread abolition of monarchy or establishment of democratic republics."}, {"text": "A fundamental restructuring of social, economic, and military systems, leading to new opportunities, innovations, and the forging of a new European identity.", "isCorrect": true, "rationale": "This option encompasses the end of serfdom (social/economic), the obsolescence of feudal warfare (military), the acceleration of the Renaissance (innovation), and the drive for exploration (new opportunities), aligning with the text's conclusion that 'Catastrophe is not always the end. Sometimes it is preparation' for a 'creative explosion.'"}, {"text": "A significant decline in population that permanently crippled Europe's ability to recover economically and politically.", "isCorrect": false, "rationale": "While there was a significant population decline, the text explicitly states the population did recover, and the crisis led to significant economic and social restructuring that facilitated new growth and developments, not permanent crippling."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
