</head>
<body>
<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The text states that \"within a generation of the Norman Conquest, almost all of it [Anglo-Saxon England's legacy] would be overlaid—though not destroyed—by a new ruling class.\" Which of the following best reflects this \"overlaying\" rather than destruction?", "options": [{"text": "The immediate eradication of English language and common law.", "isCorrect": false, "rationale": "The text emphasizes that Anglo-Saxon elements were 'overlaid, though not destroyed.' While French became the language of the elite, English survived, and common law developed later, incorporating elements rather than being immediately eradicated."}, {"text": "The replacement of all Anglo-Saxon administrative structures with entirely new continental models.", "isCorrect": false, "rationale": "Anglo-Saxon structures like shires and courts persisted, but with a new Norman ruling class overseeing them and introducing new concepts like continental feudalism, rather than a total replacement."}, {"text": "The introduction of a French-speaking, feudal aristocracy that dominated existing Anglo-Saxon institutions.", "isCorrect": true, "rationale": "This accurately describes the 'overlaying' mechanism: a new ruling class, speaking French and thinking in terms of feudalism, came to control and influence the existing Anglo-Saxon kingdom, rather than completely dismantling it."}, {"text": "The complete assimilation of Norman culture into the pre-existing Anglo-Saxon society.", "isCorrect": false, "rationale": "Initially, the Norman ruling class dominated and imposed its culture and structures, leading to a period of Norman influence over Anglo-Saxon society, not the other way around."}]}, {"question": "The definition states Normans were \"thoroughly Christianized and Frenchified—but had lost none of the Viking energy for conquest\" by 1066. What does this suggest about their identity and actions?", "options": [{"text": "They had abandoned their military ambitions in favor of religious piety and cultural refinement.", "isCorrect": false, "rationale": "The phrase 'had lost none of the Viking energy for conquest' directly contradicts the idea that they abandoned military ambitions. Their Christianization and Frenchification did not diminish their drive for expansion."}, {"text": "Their adaptation of Frankish culture and Christianity made them less effective as warriors.", "isCorrect": false, "rationale": "The text implies their 'Viking energy' remained, and their successful conquest of England demonstrates their continued military effectiveness. Cultural adaptation did not weaken their martial prowess."}, {"text": "They had integrated new cultural and religious identities while retaining a core drive for expansion and dominance.", "isCorrect": true, "rationale": "This option correctly synthesizes the two parts of the definition: they adopted Christianity and French culture ('Christianized and Frenchified') but maintained their aggressive, expansionist spirit inherited from their Viking ancestors ('lost none of the Viking energy for conquest')."}, {"text": "Their Frenchification meant they were indistinguishable from other French duchies, lacking unique Norman traits.", "isCorrect": false, "rationale": "Their specific history as descendants of Rollo and their distinct 'Viking energy for conquest' set them apart. While Frenchified, their identity wasn't entirely subsumed by other French duchies."}]}, {"question": "The Battle of Hastings saw the English shield wall hold firm for much of the day. According to the text, what specific tactical maneuver proved to be a decisive turning point for William's forces?", "options": [{"text": "A direct charge by Norman heavy cavalry that overwhelmed the housecarls.", "isCorrect": false, "rationale": "The text explicitly states that 'Norman cavalry repeatedly failed to break the English shield wall' for much of the morning, making a direct charge an unlikely turning point."}, {"text": "The use of archers to thin the English ranks before a final infantry assault.", "isCorrect": false, "rationale": "While archers may have been used, the text specifically identifies a different maneuver as 'the turning point,' focusing on the interaction between cavalry and the shield wall."}, {"text": "A feigned retreat by Norman cavalry that lured English soldiers from their defensive position.", "isCorrect": true, "rationale": "The text states: 'The turning point came when William's cavalry feigned retreat, luring some of Harold's men off the ridge in pursuit.' This broke the integrity of the English shield wall, leading to its collapse."}, {"text": "A surprise flanking maneuver by a hidden contingent of William's infantry.", "isCorrect": false, "rationale": "The text makes no mention of a surprise flanking maneuver by infantry. The described turning point involved cavalry tactics."}]}, {"question": "The Bayeux Tapestry is described as an \"extraordinarily detailed visual record\" but also noted for its \"Norman bias.\" How should a historian best utilize this source when studying the Norman Conquest?", "options": [{"text": "As a purely factual, objective account of events, given its visual detail.", "isCorrect": false, "rationale": "The text explicitly mentions its 'Norman bias' and that it 'depicts the events... from William's point of view,' meaning it cannot be considered purely factual or objective without critical analysis."}, {"text": "By cross-referencing its visual details with other textual sources to verify disputed points, while acknowledging its perspective.", "isCorrect": true, "rationale": "This approach acknowledges both the tapestry's value as a 'detailed visual record' and its inherent 'Norman bias.' Historians must critically evaluate biased sources by comparing them with other evidence to form a balanced understanding."}, {"text": "Primarily for understanding Norman propaganda, disregarding its depictions of battles or daily life.", "isCorrect": false, "rationale": "While it reflects Norman perspective, the text highlights its utility for understanding practical details: 'it shows ships, weapons, armour, horses, food, buildings, and the faces of named individuals,' making it valuable beyond just propaganda."}, {"text": "As an unreliable source due to its bias, and therefore not useful for historical reconstruction.", "isCorrect": false, "rationale": "The text calls it 'one of our most important sources,' indicating that despite its bias, it provides crucial information and cannot be simply discarded as unreliable."}]}, {"question": "The \"Harrying of the North\" is presented as a \"devastating act of deliberate destruction\" by William, yet the teacher's note suggests evaluating historical figures like William involves a complex ethical challenge. Which of the following best reflects this complexity?", "options": [{"text": "William's cruelty was an unfortunate but necessary evil to unify England, making him a morally admirable leader.", "isCorrect": false, "rationale": "The teacher's note explicitly states that a 'classical Christian perspective neither sanitizes evil nor denies achievement,' suggesting that acknowledging cruelty does not equate to finding it admirable or simply 'necessary evil' for moral justification."}, {"text": "William's military genius and administrative achievements are undeniable, but these do not absolve him of the moral condemnation for his brutal methods.", "isCorrect": true, "rationale": "This option perfectly aligns with the teacher's note: 'William was both a capable ruler who brought order to England and a man who committed terrible cruelty.' It recognizes both his accomplishments and the moral reprehensibility of his actions, illustrating the complex ethical challenge."}, {"text": "The Harrying of the North was an isolated incident that should not factor into a broader assessment of William's reign.", "isCorrect": false, "rationale": "The text describes it as 'one of the most devastating acts of deliberate destruction in English history' and highlights its long-term impact on the region and the Domesday Book, indicating it was a significant and integral part of his rule, not an isolated incident."}, {"text": "Historical figures should only be judged by the standards of their own time, making William's actions acceptable within the context of 11th-century warfare.", "isCorrect": false, "rationale": "While historical context is important, the teacher's note frames the Harrying as an ethical dilemma for students today, implying that modern moral evaluations are relevant and that the actions themselves were 'terrible cruelty,' regardless of period norms."}]}, {"question": "While the Domesday Book served William's immediate administrative goals of taxation and military planning, its enduring value for modern historians is multifaceted. Which statement best captures this broader historical significance?", "options": [{"text": "It proves the English language was completely replaced by French within two decades of the Conquest.", "isCorrect": false, "rationale": "The Domesday Book is a survey of land and resources, not a linguistic census. While French became the language of the elite, it did not entirely replace English."}, {"text": "It offers an unparalleled, detailed snapshot of eleventh-century English society, economy, and land ownership changes post-Conquest.", "isCorrect": true, "rationale": "The text states it provides an 'unparalleled window into life in eleventh-century England' and allows historians to 'trace the change of ownership from English to Norman lord estate by estate,' confirming its detailed insight into society, economy, and the impact of the Conquest."}, {"text": "It records William's personal philosophical reflections on governance and justice.", "isCorrect": false, "rationale": "The Domesday Book is a practical administrative survey, a record of facts and figures about landholdings, not a collection of William's personal philosophical or political reflections."}, {"text": "It solely documents the wealth of the new Norman elite, offering little insight into the lives of ordinary people.", "isCorrect": false, "rationale": "The survey covered 'virtually every manor, estate, and landholding' and inquired 'How many people live here?' indicating its scope extended beyond just the Norman elite to include details about the broader populace and their resources."}]}, {"question": "The text describes feudalism as an exchange of land for military service. How did William the Conqueror's application of this system in England specifically strengthen his royal authority compared to typical continental European feudalism?", "options": [{"text": "He allowed vassals to choose their military obligations, fostering goodwill.", "isCorrect": false, "rationale": "William's implementation was 'systematic' and designed for 'firmer control,' which suggests a more prescriptive approach to military obligations, not allowing vassals to choose freely."}, {"text": "By treating all English land as his personal property and granting it directly, he made his nobility uniquely dependent on him.", "isCorrect": true, "rationale": "The text states: 'He treated all English land as his personal property, conquered by right of war. He granted it to his Norman followers in exchange for military service... This system created a military force directly dependent on royal favor—and gave William firmer control over his nobility than almost any other ruler in Europe.'"}, {"text": "He abolished the concept of fealty, relying solely on economic incentives.", "isCorrect": false, "rationale": "Fealty (oath of loyalty) was a core component of feudalism, as explicitly defined in the text, so William would not have abolished it. The system relied on both land and loyalty/service."}, {"text": "He decentralized military power among many minor lords, preventing any single baron from becoming too powerful.", "isCorrect": false, "rationale": "While land was granted to barons, the system's design was to ensure their dependence on the king and create a military force 'directly dependent on royal favor,' thus centralizing control in William's hands, not decentralizing power."}]}, {"question": "The Investiture Controversy centered on the right to appoint bishops. Why was this power so fiercely contested by both popes and kings?", "options": [{"text": "Bishops were primarily spiritual figures whose loyalty did not impact secular governance.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'bishops controlled vast amounts of land and wealth, and a king who could appoint his own bishops had reliable allies in both church and state,' showing their significant secular influence."}, {"text": "The appointment of bishops was a symbolic gesture with no real practical implications for either party.", "isCorrect": false, "rationale": "The text clarifies that 'the issue seems technical, but it was enormous in practical terms,' indicating that the stakes were very high and the implications significant for both popes and kings."}, {"text": "Bishops controlled significant land and wealth, providing kings with powerful allies and resources if they could appoint them.", "isCorrect": true, "rationale": "This directly matches the text: 'bishops controlled vast amounts of land and wealth, and a king who could appoint his own bishops had reliable allies in both church and state.' This made their appointment a crucial lever of power."}, {"text": "Kings sought to appoint bishops to enforce royal law within church lands, which popes readily agreed to.", "isCorrect": false, "rationale": "The Investiture Controversy was a 'long dispute' and 'struggle' between popes and kings, indicating strong disagreement, not ready agreement from the popes regarding kings appointing bishops."}]}, {"question": "Anselm of Canterbury, a founder of scholasticism, operated under the motto \"fides quaerens intellectum\" (\"faith seeking understanding\"). Given this, how would Anselm likely view the statement: \"Faith and reason are fundamentally opposed and cannot coexist\"?", "options": [{"text": "He would agree, emphasizing that faith requires suspending rational thought.", "isCorrect": false, "rationale": "Anselm's motto, 'faith seeking understanding,' directly implies the use of intellect and reason to explore faith, rather than suspending it. He saw them as complementary."}, {"text": "He would disagree, arguing that faith and reason are partners that can reinforce each other in exploring Christian truths.", "isCorrect": true, "rationale": "The text states: 'He believed that faith and reason were not enemies but partners, and that the truths of Christianity could be explored and defended through careful argument.' This directly opposes the idea of them being fundamentally opposed."}, {"text": "He would assert that reason is superior to faith and should always be prioritized.", "isCorrect": false, "rationale": "While he valued reason, his motto 'fides quaerens intellectum' places faith as the starting point, suggesting that reason serves to understand and deepen faith, rather than being superior to it."}, {"text": "He would propose that reason is only applicable to secular matters, while faith handles spiritual ones exclusively.", "isCorrect": false, "rationale": "Scholasticism, which Anselm founded, is defined as 'using philosophical reasoning... to explore and defend theological questions,' meaning reason was applied to spiritual matters."}]}, {"question": "Considering the comprehensive changes brought by the Norman Conquest described in the text, which statement best summarizes its most significant and lasting impact on England?", "options": [{"text": "It completely eradicated all Anglo-Saxon governmental structures and cultural traditions, replacing them entirely.", "isCorrect": false, "rationale": "The text states that Anglo-Saxon legacy was 'overlaid—though not destroyed,' indicating continuity alongside transformation, not complete eradication."}, {"text": "It fundamentally reoriented England's political, social, and cultural landscape by establishing a new, centralized, French-speaking feudal aristocracy.", "isCorrect": true, "rationale": "This statement synthesizes the key impacts: the replacement of the Anglo-Saxon aristocracy with a new, French-speaking one, the thorough implementation of feudalism which centralized royal power, and the profound transformation of English society and governance."}, {"text": "It primarily resulted in a brief period of instability followed by a return to pre-Conquest Anglo-Saxon traditions.", "isCorrect": false, "rationale": "The Conquest led to lasting changes, including a new dynasty, language of power, and social system, none of which constituted a 'return' to pre-Conquest traditions, even after initial instability."}, {"text": "Its main legacy was limited to changes in military tactics, with little influence on civilian life or administration.", "isCorrect": false, "rationale": "The Domesday Book, the establishment of feudalism, the Harrying of the North, and the new ruling class all demonstrate profound and lasting influences on civilian life, administration, and the entire social structure, far beyond just military tactics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
