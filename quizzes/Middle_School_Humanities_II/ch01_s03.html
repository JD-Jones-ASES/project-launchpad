<div class="quiz-container">

        <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">History &amp; Humanities II &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which statement best describes how Scandinavia's geography influenced the initial development of the Viking people?", "options": [{"text": "The vast fertile plains encouraged large agricultural settlements, necessitating advanced transport for trade.", "isCorrect": false, "rationale": "The text explicitly states that Scandinavia had 'almost no flat farmland' in Norway, was 'low and marshy' in Denmark, and had 'limited fertile soil' in Sweden, contradicting the idea of vast fertile plains."}, {"text": "The mountainous and island-filled terrain, combined with limited arable land, fostered a seafaring culture and a need to seek resources elsewhere.", "isCorrect": true, "rationale": "The text highlights that Norway is mostly mountains, Denmark is low and marshy, and Sweden has limited fertile soil, leading to 'more people than it could easily feed'. It also states that 'travel by water is easier than travel by land', making them 'sailors who became invaders'."}, {"text": "The dense inland forests made land travel difficult, forcing the Vikings to rely solely on coastal fishing and trade.", "isCorrect": false, "rationale": "While Sweden had vast forests, the primary emphasis for Viking expansion and seafaring culture was the challenging agricultural conditions and the ease of water travel, not solely the difficulty of land travel within Scandinavia itself forcing only coastal activities. The text emphasizes outward expansion."}, {"text": "Abundant mineral resources in the mountains drove the development of advanced metalworking, which was then applied to shipbuilding.", "isCorrect": false, "rationale": "The text does not mention abundant mineral resources or their direct link to advanced metalworking for shipbuilding as a primary driver for Viking expansion based on geography."}], "id": "q01"}, {"question": "A Viking longship is navigating a shallow, winding river upstream against the current to reach a market town. Which combination of longship features would be most critical for this journey?", "options": [{"text": "Lightweight construction and symmetric design.", "isCorrect": false, "rationale": "While symmetric design is helpful for not turning around in narrow rivers, lightweight construction is primarily for portaging, not for upstream navigation against a current. The ability to row is more critical here."}, {"text": "Symmetric design and the ability to be rowed.", "isCorrect": true, "rationale": "The symmetric design allows the ship to be rowed in either direction without needing to turn around in narrow rivers, and the ability to be rowed is essential for moving against the wind or current when sailing is not possible or efficient, as implied by 'upstream against the current'."}, {"text": "Shallow draft and a large cargo capacity.", "isCorrect": false, "rationale": "Shallow draft is crucial for river navigation, but large cargo capacity is not mentioned as a defining feature or one critical for navigating against a current. The ability to row or the symmetric design would be more critical for movement in this scenario."}, {"text": "Flexibility to be rowed or sailed and a deep hull for stability.", "isCorrect": false, "rationale": "The flexibility to be rowed or sailed is correct for movement, but the text explicitly states longships had a 'shallow draft', not a deep hull, making this option contradictory to the provided information."}], "id": "q02"}, {"question": "The text states, 'The Vikings were not invaders who learned to sail. They were sailors who became invaders.' How does this statement connect to the description of Scandinavia's geography?", "options": [{"text": "Scandinavia's dense forests isolated communities, leading them to develop unique invasion strategies through sailing.", "isCorrect": false, "rationale": "While Sweden had forests, the text emphasizes water travel being easier than land travel due to fjords and islands, rather than isolation leading to invasion strategies. The primary driver was resource scarcity and pre-existing sailing expertise."}, {"text": "The harsh climate made agriculture impossible, so coastal inhabitants had to raid for food, eventually leading to sailing skills.", "isCorrect": false, "rationale": "The text mentions 'limited fertile soil' and 'more people than it could easily feed', implying difficult but not impossible agriculture. It also states they 'were already experienced sailors before they began to raid', reversing the cause and effect in this option."}, {"text": "The interconnected waterways and limited farmland in Scandinavia meant its people were inherently skilled in water travel, which they later applied to outward expansion due to population pressure.", "isCorrect": true, "rationale": "The text explains that Scandinavia's geography (fjords, islands, archipelagos) made water travel easier and that the people had 'more people than it could easily feed', implying a pre-existing seafaring culture ('experienced sailors') that then turned to 'invaders' for outward expansion and resources."}, {"text": "Scandinavia's geography provided natural defenses against invasion, allowing its people to focus on developing advanced naval technology for purely defensive purposes.", "isCorrect": false, "rationale": "The text describes Viking expansion and invasion, not a focus on defensive naval technology due to natural defenses. The emphasis is on outward movement, not inward protection."}], "id": "q03"}, {"question": "What significant historical distinction is attributed to Leif Eriksson's settlement at L'Anse aux Meadows?", "options": [{"text": "It was the first permanent Viking kingdom established outside Scandinavia.", "isCorrect": false, "rationale": "The text describes it as a 'settlement' and 'earliest confirmed European presence', but not necessarily a permanent kingdom in the sense of the Danelaw or Normandy. Its primary distinction is its location."}, {"text": "It marked the earliest confirmed European presence in the Americas.", "isCorrect": true, "rationale": "The text explicitly states that Leif Eriksson's settlement at L'Anse aux Meadows 'is the earliest confirmed European presence in the Americas'."}, {"text": "It was the first Viking trading post established along the Baltic-Black Sea route.", "isCorrect": false, "rationale": "L'Anse aux Meadows was in North America (Vinland), not along the Eastern trade routes from the Baltic to the Black Sea."}, {"text": "It demonstrated the longship's unique ability to navigate the ice-filled waters of the Arctic.", "isCorrect": false, "rationale": "While Vikings did reach Greenland, the text does not highlight L'Anse aux Meadows as a specific example of Arctic ice navigation; its distinction is purely its location in the Americas."}], "id": "q04"}, {"question": "An historian wants to illustrate the extent of Viking influence in specific regions of England. Which of the following would be the most effective and direct evidence to use, based on the provided text?", "options": [{"text": "Analysis of agricultural methods used in Anglo-Saxon villages compared to those in the Danelaw.", "isCorrect": false, "rationale": "While there might have been differences, the text does not describe distinct agricultural methods for the Danelaw vs. Anglo-Saxon areas as a primary marker of influence. It focuses on place names."}, {"text": "A map showing the distribution of place names ending in '-by' and '-thorpe' across England.", "isCorrect": true, "rationale": "The text explicitly states: 'Danelaw place names still cover the north and east of England: -by... -thwaite... -thorpe... You can literally map the Danish and Anglo-Saxon zones by looking at a list of English place names.' This directly identifies place names as a geographical indicator of influence."}, {"text": "Records detailing the administrative structure of Alfred's shires and hundreds.", "isCorrect": false, "rationale": "Alfred's administrative structures (shires and hundreds) applied to Anglo-Saxon England, not the Danelaw, and are explicitly presented as Anglo-Saxon initiatives contrasting with the Danelaw's influence."}, {"text": "Archaeological findings of longship wrecks along the coasts of England and Scotland.", "isCorrect": false, "rationale": "While longship wrecks would indicate Viking presence, the text specifically points to place names as a geographical and cultural division that 'can still be traced today' for illustrating the Danelaw's lasting influence, making it a more direct answer based on the provided content."}], "id": "q05"}, {"question": "The Varangians' activities in the East differed from the Norse settlement of Iceland primarily in their strategic objective. Which option best describes this difference?", "options": [{"text": "The Varangians focused on establishing military outposts to control the Baltic Sea, while Iceland was settled for religious freedom.", "isCorrect": false, "rationale": "The text describes Varangians as traders and mercenaries who founded trading cities and established commercial networks, not solely military outposts for Baltic control. It does not mention religious freedom as a primary driver for Iceland's settlement."}, {"text": "The Varangians prioritized establishing long-distance trade routes and serving as mercenaries, whereas Iceland was settled for permanent agricultural expansion.", "isCorrect": true, "rationale": "The text states Varangians 'followed the rivers... southward. They founded trading cities... and paddled and portaged their longships from the Baltic Sea all the way to the Black Sea and the Caspian Sea' and were hired as mercenaries ('Varangian Guard'). Iceland, along with Greenland and Vinland, represents a westward expansion for settlement."}, {"text": "The Varangians aimed to integrate into existing Slavic cultures, while the Icelandic Norse sought to preserve a purely Scandinavian identity.", "isCorrect": false, "rationale": "While Varangians founded cities, the text doesn't detail their integration into Slavic culture as a primary objective. The text also doesn't state the Icelandic Norse's explicit objective was cultural preservation over other factors like land or resources."}, {"text": "The Varangians conquered large territories to establish a new empire, while Iceland represented a temporary fishing and hunting ground.", "isCorrect": false, "rationale": "The Varangians founded trading cities and routes, not necessarily a vast new empire as their primary objective. Iceland was settled (c. 874), implying a more permanent presence than a 'temporary fishing and hunting ground'."}], "id": "q06"}, {"question": "Alfred the Great's reorganization of England into shires and hundreds had a lasting impact. Which statement accurately reflects this impact according to the text?", "options": [{"text": "It led to the immediate unification of the Danelaw with Anglo-Saxon England under a single legal system.", "isCorrect": false, "rationale": "The Treaty of Wedmore created a division, and Alfred's reforms were for 'his kingdom' (Anglo-Saxon south and west), not immediately unifying the Danelaw under his administrative system."}, {"text": "It significantly weakened the power of local lords by centralizing all authority in the royal court.", "isCorrect": false, "rationale": "While it strengthened royal authority through officers like ealdormen, the text doesn't suggest it 'significantly weakened' all local lords to the extent of full centralization, rather it was an administrative structure for governance."}, {"text": "It established an administrative geography that influenced the English county system for centuries.", "isCorrect": true, "rationale": "The text states: 'This administrative geography was one of Alfred's most lasting achievements. The English county system, in one form or another, persisted from Alfred's time until major local government reforms in the twentieth century.'"}, {"text": "It was primarily a military reform, designed to quickly raise large armies against Viking incursions.", "isCorrect": false, "rationale": "While military service was a responsibility of the ealdorman, the text describes shires and hundreds as 'administrative divisions' and 'subdivisions of the shire', emphasizing their broader governmental and land-based purpose, not solely military."}], "id": "q07"}, {"question": "The 'then and now' section compares Viking expansion to Greek civilization and Germanic tribes. What common pattern of historical development is highlighted across these distinct periods?", "options": [{"text": "The consistent establishment of democratic political systems in newly settled territories.", "isCorrect": false, "rationale": "The text does not mention the establishment of democratic systems for any of these groups; it focuses on expansion patterns, not political structures."}, {"text": "The transition from initial raiding or expansion to the establishment of permanent settlements and eventually new civilizations.", "isCorrect": true, "rationale": "The text states: 'The pattern of raid becoming settlement, settlement becoming civilization, is one of the recurring patterns of Western history. Compare: the Germanic tribes that settled in Rome's former territory after 476... followed the same path.' It also mentions 'the Norse also became settlers—in Ireland, England, France, Iceland, Russia'."}, {"text": "The exclusive reliance on superior naval technology to dominate weaker land-based empires.", "isCorrect": false, "rationale": "While Vikings used superior naval tech, and Greeks used sea power, the Germanic tribes' expansion after 476 was primarily land-based, so this is not a common pattern across all three."}, {"text": "The development of highly centralized bureaucratic empires through conquest.", "isCorrect": false, "rationale": "The text doesn't describe all these expansions as leading to highly centralized bureaucratic empires. While some form of governance emerged, 'highly centralized' might not apply to early Viking or Germanic settlements."}], "id": "q08"}, {"question": "Imagine you are an Anglo-Saxon farmer living in England in the late 9th century. If your village was suddenly under the direct governance of the 'Danelaw', what primary change would you likely observe in the official administration of your local area, according to the text?", "options": [{"text": "The introduction of a new system of shires and hundreds to organize your land and taxes.", "isCorrect": false, "rationale": "The system of shires and hundreds was an Anglo-Saxon administrative division strengthened by Alfred, governing the Anglo-Saxon south and west, not the Danelaw."}, {"text": "A shift in the legal and cultural framework, indicated by changes in local place names over time.", "isCorrect": true, "rationale": "The text states the Danelaw was a 'geographical and cultural division' that can be traced by place names, implying a change in the local legal and cultural framework ('Danelaw as Geography')."}, {"text": "The establishment of direct rule from Constantinople through Varangian mercenaries.", "isCorrect": false, "rationale": "Varangians were primarily active in Eastern Europe, serving the Byzantine Emperor in Constantinople; their influence did not extend to the Danelaw in England in this direct administrative way."}, {"text": "An immediate shift from a monetary economy to a purely barter system.", "isCorrect": false, "rationale": "The text does not provide information about changes in economic systems (monetary vs. barter) related to the Danelaw's administration."}], "id": "q09"}, {"question": "Which of the following scenarios best exemplifies the longship's unique ability to access the interior of Europe, as described in the text?", "options": [{"text": "A longship sailing across the Atlantic Ocean directly to Vinland.", "isCorrect": false, "rationale": "While longships sailed the ocean, the question asks about accessing the 'interior of Europe', which implies river navigation, not open ocean voyages to North America."}, {"text": "A fleet of longships establishing a large coastal trading hub on the English Channel.", "isCorrect": false, "rationale": "This scenario describes coastal activity, not access to the 'interior of Europe' via rivers, which is the specific unique ability highlighted for inland access."}, {"text": "Varangian longships being portaged across a land bridge between two major Russian river systems to reach the Black Sea.", "isCorrect": true, "rationale": "The text explicitly states the longship's 'lightweight' nature meant it 'could be portaged (carried overland) across the narrow land bridges between river systems', and that 'The rivers of France, Russia, and England became Viking highways', giving them 'access to the interior of Europe'."}, {"text": "Danish longships beaching on the open shores of the Mediterranean for a raid.", "isCorrect": false, "rationale": "Beaching on a shore demonstrates shallow draft, but accessing the 'interior of Europe' emphasizes river systems and portaging, not just coastal raiding."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
