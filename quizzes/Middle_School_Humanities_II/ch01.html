<script>
var QUESTIONS = [{"question": "What was the primary significance of the Viking raid on Lindisfarne in 793?", "options": [{"text": "It destroyed the last Anglo-Saxon kingdom.", "isCorrect": false, "rationale": "Lindisfarne was a monastery, not a kingdom, and Anglo-Saxon kingdoms continued for nearly three more centuries."}, {"text": "It shocked the Christian world because a great centre of learning had no defenses.", "isCorrect": true, "rationale": "The monastery had spent generations copying manuscripts and educating nobles, yet had no walls. The monk Alcuin called it unprecedented terror in Britain."}, {"text": "It was the first time Vikings had ever left Scandinavia.", "isCorrect": false, "rationale": "The text says Vikings began raiding from the late eighth century onward; this raid was the first on the British Isles, not the first Viking voyage."}, {"text": "It immediately triggered the Great Heathen Army invasion.", "isCorrect": false, "rationale": "The Great Heathen Army arrived in 865, more than 70 years after the Lindisfarne raid."}]}, {"question": "How did the monk Alcuin interpret the Viking raid on Lindisfarne, and what does this reveal about medieval thinking?", "options": [{"text": "He saw it as a purely military event requiring a political response.", "isCorrect": false, "rationale": "Alcuin's letter was theological, not political — he wrote to warn of divine judgment."}, {"text": "He believed it was a sign of divine judgment on England for its sins.", "isCorrect": true, "rationale": "Alcuin wrote to the King of Northumbria warning the raid was God permitting heathens to punish England, revealing the medieval worldview that national disaster reflects God's response to national sin."}, {"text": "He thought the Vikings were misunderstood traders who should be welcomed.", "isCorrect": false, "rationale": "Alcuin described the raid in apocalyptic terms, calling it a terror and describing the blood of saints."}, {"text": "He recommended building a navy to defend the coast.", "isCorrect": false, "rationale": "Alcuin's response was spiritual and theological, not military."}]}, {"question": "What technological advantage made the Viking longship so revolutionary?", "options": [{"text": "It was larger than any other ship and could carry hundreds of warriors.", "isCorrect": false, "rationale": "The longship's advantage was its shallowness of draft, not its size."}, {"text": "It could cross the open Atlantic and also navigate shallow rivers, enabling inland raids.", "isCorrect": true, "rationale": "The longship combined ocean-going capacity with extreme shallowness of draft, giving Vikings access to monasteries and towns far inland that no sea power had previously reached."}, {"text": "It was powered by steam, making it faster than any oared vessel.", "isCorrect": false, "rationale": "Steam power did not exist in the Viking Age; longships used oars and sails."}, {"text": "It was built with iron rather than wood, making it invulnerable to fire.", "isCorrect": false, "rationale": "Longships were wooden; their advantage was design, not materials."}]}, {"question": "What was Alfred's situation at Athelney in the winter of 878, and why is this moment significant?", "options": [{"text": "He was gathering a large army in preparation for an immediate counterattack.", "isCorrect": false, "rationale": "Alfred was a fugitive hiding in the Somerset marshes, not commanding a gathered army."}, {"text": "He had retreated to a fortified city where the Danes could not reach him.", "isCorrect": false, "rationale": "Alfred was hiding in marshes after being driven from his kingdom — Athelney was a refuge, not a fortification."}, {"text": "He was the king of Wessex reduced to hiding in a swamp, the lowest point before his greatest victory.", "isCorrect": true, "rationale": "The Danes under Guthrum had driven Alfred from his kingdom; he hid at Athelney before calling the fyrd, marching to Edington, and defeating Guthrum."}, {"text": "He was negotiating terms of surrender with King Guthrum.", "isCorrect": false, "rationale": "Alfred did not surrender; from Athelney he sent messengers to call the fyrd for a counterattack."}]}, {"question": "What were the key terms of the Treaty of Wedmore (878)?", "options": [{"text": "Guthrum agreed to leave England permanently and never return.", "isCorrect": false, "rationale": "Guthrum did not leave England; he withdrew to the area north and east of the Danelaw boundary."}, {"text": "Alfred paid a large sum of silver to buy peace from the Danes.", "isCorrect": false, "rationale": "The treaty resulted from Alfred's military victory at Edington, not a payment."}, {"text": "Guthrum agreed to convert to Christianity and withdraw his forces north and east of a line from London to Chester, creating the Danelaw.", "isCorrect": true, "rationale": "Alfred stood as Guthrum's godfather at baptism; Guthrum withdrew to what became the Danelaw, dividing England into Anglo-Saxon south/west and Danish north/east."}, {"text": "Alfred ceded Northumbria and Mercia to Danish rule in exchange for peace in Wessex.", "isCorrect": false, "rationale": "Northumbria and Mercia had already fallen before Wedmore; the treaty formalized the Danelaw boundary."}]}, {"question": "What was Alfred's educational programme, and what crisis was it designed to address?", "options": [{"text": "He established new monasteries to replace those destroyed by the Vikings.", "isCorrect": false, "rationale": "Alfred's programme focused on translating Latin books into Old English, not primarily on rebuilding monasteries."}, {"text": "He created a university in Winchester to train the next generation of clergy.", "isCorrect": false, "rationale": "Medieval universities did not exist in Alfred's time; his programme was translation-based, not institutional."}, {"text": "He gathered scholars to translate key Latin texts into Old English, responding to a collapse of Latin literacy so severe that clergy could not understand their own services.", "isCorrect": true, "rationale": "Alfred's preface to the Pastoral Care describes clergy who could not translate a letter from Latin into English; his response was vernacular translation of the most needful books."}, {"text": "He banned Latin entirely and required all Church services to be in Old English.", "isCorrect": false, "rationale": "Alfred did not ban Latin; he promoted translation to supplement literacy that had fallen, not to replace Latin."}]}, {"question": "What was the fyrd, and how did Alfred reform it?", "options": [{"text": "The fyrd was a professional standing army that Alfred expanded from 1,000 to 10,000 men.", "isCorrect": false, "rationale": "The fyrd was a militia of free men, not a professional army."}, {"text": "The fyrd was the Anglo-Saxon militia of free men; Alfred reorganized it into rotating shifts so Wessex always had a defensive force ready.", "isCorrect": true, "rationale": "Alfred divided the fyrd into shifts so that half could serve while the other half remained at home, ensuring continuous defensive coverage."}, {"text": "The fyrd was a naval force that Alfred created to match the Viking longships.", "isCorrect": false, "rationale": "The fyrd was a land militia; Alfred did build ships, but the fyrd was distinct."}, {"text": "The fyrd was Alfred's personal bodyguard of professional warriors called thegns.", "isCorrect": false, "rationale": "Thegns were the professional warriors of a lord's household; the fyrd represented ordinary freemen."}]}, {"question": "What were the burhs, and why were they strategically important?", "options": [{"text": "Burhs were Viking fortresses that Alfred captured and converted into defensive positions.", "isCorrect": false, "rationale": "Burhs were built or strengthened by Alfred, not captured from the Vikings."}, {"text": "Burhs were fortified towns built by Alfred no more than a day's march apart, so any point in Wessex could be defended quickly.", "isCorrect": true, "rationale": "The network of burhs placed no more than a day's march apart meant that Viking raiders could not strike anywhere in Wessex without running into a fortified position."}, {"text": "Burhs were monasteries that Alfred fortified to protect manuscripts and scholars.", "isCorrect": false, "rationale": "Burhs were fortified settlements designed for military defense, not primarily for protecting manuscripts."}, {"text": "Burhs were trading posts that Alfred established to generate revenue for his army.", "isCorrect": false, "rationale": "Burhs were primarily defensive, not commercial, though they did develop as towns."}]}, {"question": "How did Aethelstan complete the unification of England begun by Alfred?", "options": [{"text": "Aethelstan made peace with the Danish settlers and incorporated them peacefully.", "isCorrect": false, "rationale": "Aethelstan defeated the last Scandinavian king of York; unification came through military victory, not peaceful incorporation."}, {"text": "Aethelstan defeated the last Scandinavian king of York in 927 and took the title 'King of all Britain.'", "isCorrect": true, "rationale": "After Alfred's son Edward and daughter Aethelflaed pushed into the Danelaw, Alfred's grandson Aethelstan completed the process by defeating the last Scandinavian ruler of York."}, {"text": "Aethelstan married into the Danish royal family, uniting the two peoples.", "isCorrect": false, "rationale": "The text does not describe a dynastic marriage; Aethelstan unified England through conquest."}, {"text": "Aethelstan's unification was achieved by Alfred's daughter Aethelflaed alone.", "isCorrect": false, "rationale": "Aethelflaed contributed to recapturing the Danelaw, but it was Aethelstan who took the final step of defeating the last Scandinavian king."}]}, {"question": "Why is Cnut notable despite being a Danish conqueror of England?", "options": [{"text": "Cnut converted all the Danes in England to Christianity and forced them to speak English.", "isCorrect": false, "rationale": "While Cnut supported the Church, the text does not describe forced conversion or language policies."}, {"text": "Cnut ruled England well for nineteen years, maintained Alfred's laws, supported the Church, and created a North Sea empire.", "isCorrect": true, "rationale": "Despite being a conqueror, Cnut made peace with the Anglo-Saxon nobility and supported existing institutions, ruling more like an English king than a foreign occupier."}, {"text": "Cnut was the only Danish king who was also elected Pope.", "isCorrect": false, "rationale": "Cnut was never Pope; he was King of England, Denmark, and Norway."}, {"text": "Cnut drove Alfred's descendants off the throne and abolished English common law.", "isCorrect": false, "rationale": "Cnut maintained Alfred's laws; he did not abolish them."}]}, {"question": "What was the significance of the Battle of Hastings (1066) for Anglo-Saxon England?", "options": [{"text": "It briefly ended Viking raids but allowed Anglo-Saxon culture to survive intact.", "isCorrect": false, "rationale": "The Battle of Hastings ended Anglo-Saxon England as a culture; within a generation, English law, church, and aristocracy had been remade."}, {"text": "It ended Anglo-Saxon England as a culture, replacing the Old English ruling class with Norman-French speakers.", "isCorrect": true, "rationale": "The Norman Conquest replaced the entire Anglo-Saxon aristocracy with Normans, though Alfred's legacy survived in common law, the concept of kingship, and the English language."}, {"text": "It united the English and Normans under a single shared language and culture immediately.", "isCorrect": false, "rationale": "The Normans imposed a French-speaking ruling class; it took generations for English and Norman cultures to merge."}, {"text": "It ended Danish rule of England and restored the pure Anglo-Saxon kingdom.", "isCorrect": false, "rationale": "The Norman Conquest replaced the Anglo-Saxon English, not Danish rulers; the Normans were themselves descendants of Vikings."}]}, {"question": "What is Beowulf, and why is it significant for understanding the Viking Age?", "options": [{"text": "Beowulf is a Viking chronicle that describes the conquest of England from a Danish perspective.", "isCorrect": false, "rationale": "Beowulf is an Old English poem written by a Christian monk; it is set in Scandinavia but is Anglo-Saxon, not Viking, in origin."}, {"text": "Beowulf is the longest surviving Old English poem, written by a Christian monk drawing on older Germanic traditions, celebrating heroic values like courage and loyalty.", "isCorrect": true, "rationale": "Beowulf combines pre-Christian Germanic heroic values with Christian framing, showing how Anglo-Saxon culture understood heroism, loyalty, and mortality."}, {"text": "Beowulf is a historical biography of Alfred the Great written by Asser.", "isCorrect": false, "rationale": "Asser wrote the Life of King Alfred; Beowulf is an anonymous poem about a Geat warrior fighting monsters."}, {"text": "Beowulf is a legal document recording Alfred's law code, written in Old English.", "isCorrect": false, "rationale": "Beowulf is a poem, not a legal document. Alfred created a law code, but Beowulf is literature."}]}, {"question": "How does the Beowulf poet blend Christian and pre-Christian values?", "options": [{"text": "The poet argues that pre-Christian heroic values are sinful and must be abandoned.", "isCorrect": false, "rationale": "The poet treats Beowulf with great sympathy; he does not condemn heroic virtue."}, {"text": "The poet ignores Christianity entirely, keeping the poem purely pagan.", "isCorrect": false, "rationale": "The poet weaves Christian references throughout: Grendel is described as a descendant of Cain; God is referenced as creator."}, {"text": "The poet uses Christian references (Grendel as Cain's descendant) while celebrating older Germanic virtues of courage, loyalty, and generosity, asking how Christian and heroic virtue relate.", "isCorrect": true, "rationale": "The Beowulf poet was a Christian writing about a pre-Christian world, threading Christian themes through a poem that celebrates the older Germanic heroic code."}, {"text": "The poet presents Beowulf as a Christian saint whose miracles defeat the demons Grendel and the dragon.", "isCorrect": false, "rationale": "Beowulf is not presented as a saint performing miracles, but as a pagan hero whose courage and loyalty are celebrated on their own terms."}]}, {"question": "What does the Anglo-Saxon Chronicle reveal about how medieval people recorded history?", "options": [{"text": "Medieval chroniclers tried to be completely objective and avoided all emotional language.", "isCorrect": false, "rationale": "The 793 entry is apocalyptic in tone, describing portents and divine judgment — far from objective."}, {"text": "The Chronicle was written entirely in Latin to ensure it could be read across Europe.", "isCorrect": false, "rationale": "Alfred created the Chronicle in Old English, not Latin — it was part of his vernacular literacy programme."}, {"text": "The Chronicle blends terse factual recording with occasional apocalyptic interpretation, reflecting the medieval view that historical events carry spiritual meaning.", "isCorrect": true, "rationale": "Entries range from the stark matter-of-fact 878 entry about Alfred's flight to the apocalyptic 793 entry treating the Viking raid as accompanied by divine portents."}, {"text": "The Chronicle was a private diary kept by Alfred and never intended for wide distribution.", "isCorrect": false, "rationale": "Alfred created the Chronicle and sent copies to bishoprics; it continued being updated at various monasteries for centuries."}]}, {"question": "How does the Danelaw demonstrate the lasting cultural impact of the Viking Age on England?", "options": [{"text": "The Danelaw was completely erased by Aethelstan's conquest, leaving no trace.", "isCorrect": false, "rationale": "The text notes that Danish place names ending in -by, -thorpe, and -thwaite still mark the region today."}, {"text": "The Danelaw's Danish place names (ending in -by, -thorpe, -thwaite) still mark the region today, showing the permanent cultural imprint of Danish settlement.", "isCorrect": true, "rationale": "The Danelaw boundary ran from London to Chester; even after political unification, Danish cultural influence survived in place names and local customs."}, {"text": "The Danelaw became a separate country that eventually became Denmark.", "isCorrect": false, "rationale": "The Danelaw was reintegrated into England; it did not become a separate state."}, {"text": "The Danelaw produced a unique written language that eventually replaced Old English.", "isCorrect": false, "rationale": "The text does not describe a Danelaw written language; Old English survived and evolved into Middle English."}]}, {"question": "What is Asser's Life of King Alfred, and what are its limitations as a historical source?", "options": [{"text": "It is the first history of England, written by Alfred himself, covering all of English history.", "isCorrect": false, "rationale": "Asser, not Alfred, wrote the Life; it is a biography of Alfred, not a general history of England."}, {"text": "It is a near-contemporary biography by a Welsh monk who admired Alfred; its limitation is that Asser would not write anything Alfred did not want written, so it must be read critically.", "isCorrect": true, "rationale": "Written around 893 while Alfred was still alive, Asser's warm portrait of the ideal Christian king reflects the perspective of a court admirer writing for a court audience."}, {"text": "It is a forgery written 500 years after Alfred's death by a Norman monk.", "isCorrect": false, "rationale": "The text describes Asser as a contemporary Welsh scholar who served at Alfred's court; its authenticity is not questioned in the text."}, {"text": "It is an objective account by an enemy of Alfred who criticized his failures.", "isCorrect": false, "rationale": "Asser clearly admired Alfred; his portrait is warm and personal, not critical."}]}, {"question": "Why does Alfred's preface to the Pastoral Care compare to later Reformers like Tyndale, yet differ fundamentally?", "options": [{"text": "Both Alfred and Tyndale translated scripture with royal approval and no opposition.", "isCorrect": false, "rationale": "Tyndale worked against royal and papal authority, while Alfred worked with royal approval."}, {"text": "Both Alfred and Tyndale believed in translating important texts into the vernacular for wider access, but Alfred translated for the educated class while Tyndale envisioned universal Scripture literacy for all.", "isCorrect": true, "rationale": "Alfred did not envision ordinary farmers reading — he was translating for the educated class. Tyndale wanted every ploughman to read the Bible, reflecting a different vision of who deserves access to Scripture."}, {"text": "Alfred and Tyndale both died as martyrs for the cause of vernacular translation.", "isCorrect": false, "rationale": "Alfred died peacefully of old age; Tyndale was executed, but Alfred was not a martyr."}, {"text": "Neither Alfred nor Tyndale were concerned with literacy — both were primarily military figures.", "isCorrect": false, "rationale": "Both were deeply concerned with textual access; Alfred's educational programme was one of his defining achievements."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
