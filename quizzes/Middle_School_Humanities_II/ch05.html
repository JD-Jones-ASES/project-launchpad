<script>
var QUESTIONS = [{"question": "What three overlapping crises define the 'Late Medieval Crisis,' and how did they interact?", "options": [{"text": "The Viking raids, the Norman Conquest, and the Hundred Years' War.", "isCorrect": false, "rationale": "The Late Medieval Crisis refers to the 14th and early 15th century disasters: the Great Famine, the Black Death, and the Hundred Years' War — not the earlier Viking and Norman events."}, {"text": "The Great Famine (1315–1322), the Black Death (1347–1353), and the Hundred Years' War (1337–1453) — each undermined the social, economic, and religious foundations of medieval civilization.", "isCorrect": true, "rationale": "These three catastrophes arrived in rapid succession: famine weakened the population before the plague struck; the plague devastated the workforce just as the Hundred Years' War began destroying the French countryside. Together they shook every institution the Middle Ages had built."}, {"text": "The Avignon Papacy, the Great Western Schism, and the Ottoman conquest of Constantinople.", "isCorrect": false, "rationale": "These were Church crises within the Late Medieval period but were not the three main 'overlapping shocks' identified in the text's key concept box."}, {"text": "The Crusades, the Mongol invasions, and the collapse of the Florentine banking system.", "isCorrect": false, "rationale": "These belong to different periods and categories; the Late Medieval Crisis's three main components were specifically famine, plague, and war."}]}, {"question": "What caused the Black Death, and how did it spread across Europe?", "options": [{"text": "The Black Death was caused by a virus spread through contaminated water wells that Jews had deliberately poisoned.", "isCorrect": false, "rationale": "The Black Death was caused by the bacterium Yersinia pestis; the accusation that Jews poisoned wells was completely false and led to horrific massacres."}, {"text": "The Black Death was caused by the bacterium Yersinia pestis in fleas on rats; it spread from Central Asia along trade routes to Black Sea ports, arrived in Sicily in 1347, and followed European trade routes north and west.", "isCorrect": true, "rationale": "The bacterium lived in fleas infesting rats and other rodents. Mongol armies and merchant caravans spread infected rodents along the Silk Road; Genoese trading ships brought it to Sicily in 1347; from there it moved along roads and rivers reaching northern France and England by 1348."}, {"text": "The Black Death was a divine punishment with no natural cause; medieval physicians correctly identified it as supernatural.", "isCorrect": false, "rationale": "The Black Death had a clear natural cause (Yersinia pestis); medieval physicians' interpretations were mistaken, but the bacterium was the actual cause."}, {"text": "The Black Death was an airborne disease like influenza; it spread through sneezing and coughing only.", "isCorrect": false, "rationale": "The most common form (bubonic) spread by flea bites; pneumonic plague was airborne but was a secondary form. The primary transmission was flea-to-human."}]}, {"question": "What were the three forms of the plague, and which was most deadly?", "options": [{"text": "All three forms were equally deadly; there was no meaningful difference between them.", "isCorrect": false, "rationale": "The three forms had very different mortality rates: bubonic killed 60–70%, pneumonic was almost always fatal, and septicemic was the rarest but killed within hours."}, {"text": "Bubonic plague (swollen lymph nodes, flea bites, 60–70% fatal), pneumonic plague (airborne, attacked lungs, almost always fatal), and septicemic plague (blood infection, rarest, death within hours — the most deadly of all).", "isCorrect": true, "rationale": "The three forms had distinct transmission methods and mortality rates. Septicemic was the rarest but most deadly; pneumonic the most contagious; bubonic the most common."}, {"text": "The three forms were: plague in children, plague in adults, and plague in animals; only human forms are historically significant.", "isCorrect": false, "rationale": "The three forms are bubonic, pneumonic, and septicemic — distinguished by how the disease affected the body and how it was transmitted."}, {"text": "The three forms were spread by different animals: one by rats, one by dogs, and one by birds.", "isCorrect": false, "rationale": "All three forms were caused by the same bacterium (Yersinia pestis); the different forms reflect how the bacterium attacked the body, not which animal carried it."}]}, {"question": "How did the Black Death transform the economic relationship between peasants and landlords in Western Europe?", "options": [{"text": "The plague strengthened the feudal system because landlords had more land to distribute among the surviving workers.", "isCorrect": false, "rationale": "The opposite occurred: with a third of the workforce dead, the surviving workers had economic bargaining power they had never possessed, effectively ending serfdom in Western Europe within a generation."}, {"text": "When a third of the workforce died, the survivors gained economic bargaining power — peasants demanded higher wages, landlords could not enforce pre-plague laws, and serfdom effectively ended in Western Europe within a generation.", "isCorrect": true, "rationale": "Landlords tried to fix wages at pre-plague levels by law, but they needed workers too badly to enforce the old rules. Peasants who had been legally bound to the land found themselves effectively free."}, {"text": "The Black Death had no economic effects; medieval society returned to exactly the same structure after the plague passed.", "isCorrect": false, "rationale": "The text explicitly states the plague transformed society in ways that took a century to unfold."}, {"text": "The plague transferred most land from peasants to the Church, creating a theocracy across Western Europe.", "isCorrect": false, "rationale": "The Church itself was decimated by the plague and suffered severe loss of institutional authority."}]}, {"question": "Who were the flagellants, and what does their movement reveal about medieval responses to catastrophe?", "options": [{"text": "Flagellants were soldiers who whipped themselves as military training; they had no religious significance.", "isCorrect": false, "rationale": "Flagellants were religious groups who publicly whipped themselves as acts of penance, believing extreme self-punishment would appease God's wrath and end the plague."}, {"text": "Flagellants were religious groups who publicly whipped themselves as acts of penance during the Black Death, believing they could appease God's wrath — revealing a medieval worldview where disaster was understood as divine punishment requiring human expiation.", "isCorrect": true, "rationale": "The flagellant movement swept through Germany and the Low Countries in 1349. Pope Clement VI condemned it, but the movement shows how deeply the framework of sin-punishment-expiation governed medieval responses to catastrophe."}, {"text": "Flagellants were Jewish scholars who practiced a form of ritual prayer involving self-mortification; they were falsely accused of spreading the plague.", "isCorrect": false, "rationale": "Flagellants were Christian groups; the text distinguishes them from the Jewish communities who were falsely scapegoated."}, {"text": "Flagellants were Black Death survivors who developed immunity and went through special rituals to share their immunity with others.", "isCorrect": false, "rationale": "There is no evidence of immunity-sharing rituals; flagellants were responding to the plague with penance, not medicine."}]}, {"question": "Why were Jews falsely accused of causing the Black Death, and what were the consequences?", "options": [{"text": "Jewish communities were immune to the plague, which made neighbors suspicious; in reality, Jews had a different diet that protected them.", "isCorrect": false, "rationale": "The text explicitly states that Jewish communities died from the plague at the same rate as their neighbors; there was no immunity."}, {"text": "In terror and ignorance, some communities accused Jews of poisoning wells; this was entirely false — Jewish communities died at the same rate — but led to horrific massacres in France, Germany, and Switzerland, condemned even by Pope Clement VI.", "isCorrect": true, "rationale": "This is a classic case of scapegoating: when a disaster has no clear explanation, a vulnerable group becomes the target. Pope Clement VI pointed out that Jews in isolated communities were dying at the same rate, but the massacres happened anyway."}, {"text": "Jews were blamed because they refused to participate in Church burial rituals, which was seen as evidence of conspiracy.", "isCorrect": false, "rationale": "The specific accusation was well-poisoning, not refusal of burial rituals."}, {"text": "The accusation against Jews was investigated and found to be partially true by Church authorities in 1349.", "isCorrect": false, "rationale": "The accusation was completely false; Pope Clement VI specifically condemned it as baseless."}]}, {"question": "How did the English longbow change medieval warfare at Crécy (1346)?", "options": [{"text": "The longbow was ineffective against French armor; Crécy was decided by cavalry charges, not archery.", "isCorrect": false, "rationale": "The longbow was devastatingly effective at Crécy — English archers cut down the French cavalry before it reached the English lines, ending the age of the armored knight as the decisive battle unit."}, {"text": "Trained English and Welsh archers could fire ten to twelve arrows per minute, cutting down French armored cavalry before it reached the English lines — showing that the age of the armored knight as the decisive battle unit was ending.", "isCorrect": true, "rationale": "The French knights charged in the traditional way — armored, on horseback, relying on shock. English longbowmen at rates of 10–12 arrows per minute simply killed them and their horses before they arrived."}, {"text": "The longbow was a French invention that the English captured at Crécy and then used against France at Agincourt.", "isCorrect": false, "rationale": "The longbow was an English and Welsh weapon; the English brought it to Crécy."}, {"text": "The longbow was used to set fire to the French camp at night, not as a battlefield weapon.", "isCorrect": false, "rationale": "The longbow was a battlefield weapon used in the open field battle at Crécy during the day."}]}, {"question": "Who was Joan of Arc, and why is her story particularly significant for evaluating historical evidence?", "options": [{"text": "Joan of Arc was a French general who defeated the English through conventional military tactics; her religious claims were a later legend added centuries after her death.", "isCorrect": false, "rationale": "Joan's religious claims — hearing the voices of Saints Michael, Catherine, and Margaret — are attested in contemporary records including her trial testimony; they are not later additions."}, {"text": "Joan of Arc was a teenage peasant girl who claimed visions from saints commanding her to save France; she lifted the siege of Orleans, escorted Charles VII to coronation, was captured and burned at age 19, and was later canonized — raising important questions about faith, justice, and the corruption of courts.", "isCorrect": true, "rationale": "Joan's story raises three key questions: how we evaluate claims of supernatural experience, how judicial systems can be corrupted by political interests, and how the Church's later reversal of her conviction models institutional humility."}, {"text": "Joan of Arc was an English spy who pretended to be French and was eventually exposed and executed.", "isCorrect": false, "rationale": "Joan was genuinely French; the text presents her as one of the most remarkable figures in medieval history."}, {"text": "Joan of Arc was a wealthy noblewomen who funded the French resistance with her personal fortune.", "isCorrect": false, "rationale": "Joan was a peasant girl from the village of Domrémy in eastern France."}]}, {"question": "What was the Avignon Papacy, and why did critics call it the 'Babylonian Captivity of the Church'?", "options": [{"text": "The Avignon Papacy was a period when Muslim rulers controlled Rome and expelled the Pope to France.", "isCorrect": false, "rationale": "The Avignon Papacy resulted from French political influence, not Muslim conquest; the popes moved to Avignon under French pressure."}, {"text": "From 1309 to 1377, popes resided at Avignon under heavy French influence; critics called it the 'Babylonian Captivity' because, like Israel in Babylon, the Church seemed captive to a foreign power instead of having its rightful independence in Rome.", "isCorrect": true, "rationale": "All seven Avignon popes were French; critics argued the papacy had become a tool of the French crown. The biblical parallel (Israel exiled in Babylon) was made by reformers including Petrarch."}, {"text": "The Avignon Papacy was a blessed period when the popes reformed the Church, making it stronger and more independent.", "isCorrect": false, "rationale": "Critics — including Petrarch and later Wycliffe — saw the Avignon papacy as damaging to the Church's independence and credibility."}, {"text": "Avignon was selected as a permanent new home for the papacy because Rome was too dangerous due to the Black Death.", "isCorrect": false, "rationale": "The move to Avignon preceded the Black Death and was driven by French political influence, not plague safety."}]}, {"question": "What was the Great Western Schism, and how was it resolved?", "options": [{"text": "The Great Western Schism was a theological debate about the nature of Christ; resolved by a universal Church council at Nicaea.", "isCorrect": false, "rationale": "The Great Western Schism was a dispute over who was the legitimate pope; the Council of Nicaea (325 AD) was concerned with the Arian controversy, not the Schism."}, {"text": "The Great Western Schism (1378–1417) was a division in which two, then three, rival claimants each claimed to be the true pope; resolved at the Council of Constance, which deposed all claimants and elected a single new pope (Martin V).", "isCorrect": true, "rationale": "After Pope Gregory XI returned to Rome and died, French cardinals declared the election of his successor (Urban VI) invalid and elected a rival; later a third pope was added. The Council of Constance established conciliarism and resolved the division."}, {"text": "The Great Western Schism was the division between Eastern and Western Christianity caused by the Fourth Crusade's sack of Constantinople.", "isCorrect": false, "rationale": "That division between Eastern and Western Christianity predated the Schism and was worsened by the Fourth Crusade; the Great Western Schism was entirely within Western (Catholic) Christianity."}, {"text": "The Great Western Schism was never resolved; the multiple popes became the permanent structure of the Catholic Church.", "isCorrect": false, "rationale": "The Schism was resolved at the Council of Constance (1414–1418), which elected Martin V as the single legitimate pope."}]}, {"question": "Why are Wycliffe and Hus called the 'morning stars of the Reformation'?", "options": [{"text": "Wycliffe and Hus were the first to build Gothic cathedrals in northern Europe; their architectural legacy preceded the Reformation.", "isCorrect": false, "rationale": "Wycliffe and Hus were theologians and reformers, not architects. They are 'morning stars of the Reformation' for their theological ideas."}, {"text": "Wycliffe and Hus both argued for Scripture over Church tradition, attacked Church corruption, and advocated vernacular Bible access — the same three ideas that defined the Protestant Reformation a century later; Luther explicitly honored both as his predecessors.", "isCorrect": true, "rationale": "At the Council of Worms, Luther said 'I am a Hussite.' Both Wycliffe and Hus had raised the key Reformation ideas a century before Luther, but were suppressed because they lacked the printing press."}, {"text": "Wycliffe and Hus were the first Europeans to question Christianity entirely, becoming the founders of modern atheism.", "isCorrect": false, "rationale": "Wycliffe and Hus were deeply Christian reformers who wanted to purify the Church, not abandon Christianity."}, {"text": "Wycliffe and Hus both died peacefully at old age after successfully reforming the Church during their lifetimes.", "isCorrect": false, "rationale": "Hus was burned at the stake at the Council of Constance in 1415; Wycliffe died naturally, but his bones were posthumously exhumed and burned by the Council of Constance."}]}, {"question": "What was the significance of the fall of Constantinople in 1453?", "options": [{"text": "The fall of Constantinople ended the Hundred Years' War between England and France.", "isCorrect": false, "rationale": "The Hundred Years' War ended in 1453 as well, but the two events are not causally related; the fall of Constantinople was the Ottoman conquest of the Byzantine capital."}, {"text": "The fall of Constantinople ended the last remnant of the Roman Empire; Greek scholars fled to Italy with manuscripts, fueling the Renaissance; and the closing of overland Silk Road trade routes drove Portuguese and Spanish explorers to seek sea routes to Asia.", "isCorrect": true, "rationale": "Three major consequences: (1) Roman Empire's thousand-year survival after 476 finally ended; (2) Greek manuscript influx directly fueled the Renaissance; (3) trade disruption contributed to the Age of Exploration and the discovery of the Americas."}, {"text": "The fall of Constantinople was a minor event that had little impact on Western Europe.", "isCorrect": false, "rationale": "The text describes it as sending 'shockwaves through Western Europe' with major consequences for the Renaissance and the Age of Exploration."}, {"text": "The fall of Constantinople caused the Catholic Church to reunite with the Orthodox Church in response to the Ottoman threat.", "isCorrect": false, "rationale": "The churches did not reunite; the fall deepened the divisions between Eastern and Western Christianity."}]}, {"question": "How did Jan Hus's execution at the Council of Constance violate medieval principles of justice?", "options": [{"text": "Hus was executed without any trial; the council simply burned him immediately upon his arrival.", "isCorrect": false, "rationale": "Hus was tried before the council; the injustice was that a guarantee of safe conduct was violated, and the council decided a promise to a heretic did not have to be kept."}, {"text": "Hus was summoned to the Council of Constance under a guarantee of safe conduct, then tried and burned anyway on July 6, 1415 — the council ruling that a promise to a heretic did not have to be kept.", "isCorrect": true, "rationale": "The safe conduct guarantee was a fundamental medieval legal protection; its violation showed how political and ecclesiastical power could corrupt justice. Hus's execution sparked the Hussite Wars in Bohemia."}, {"text": "Hus was executed by English soldiers at Agincourt; the council had nothing to do with his death.", "isCorrect": false, "rationale": "Hus was burned at the Council of Constance in 1415, not at Agincourt."}, {"text": "Hus was executed justly because he had actually poisoned wells during the Black Death.", "isCorrect": false, "rationale": "The Black Death was decades before Hus; the charges against Hus were theological (heresy), not criminal."}]}, {"question": "How does Geoffrey Chaucer's Canterbury Tales reflect the social transformations of the Late Medieval Crisis?", "options": [{"text": "Chaucer celebrated the medieval feudal system and mourned its passing; his work is entirely nostalgic.", "isCorrect": false, "rationale": "Chaucer's General Prologue depicts a cross-section of medieval society with brilliant and often satirical observation — not nostalgic celebration."}, {"text": "Chaucer's pilgrim portraits in the General Prologue offer a sharp satirical cross-section of English society — the corrupt Pardoner selling indulgences, the prosperous bourgeoisie — reflecting the gallows humor and social critique of a civilization that has seen too much death.", "isCorrect": true, "rationale": "Chaucer (c. 1343–1400) lived through the Black Death, the Hundred Years' War, and the Peasants' Revolt. His Canterbury Tales' General Prologue introduces pilgrims — a knight, a corrupt pardoner, a prosperous merchant — with the ironic detachment of someone who has seen the social order shaken to its foundations."}, {"text": "Chaucer's Tales depict an idealized medieval world of perfect knights, selfless monks, and honest merchants.", "isCorrect": false, "rationale": "Chaucer is famously satirical; his characters include the corrupt Pardoner, the worldly Prioress, and the Miller who tells a bawdy tale."}, {"text": "Chaucer wrote only in Latin; the Canterbury Tales were later translated into English by Tyndale.", "isCorrect": false, "rationale": "Chaucer wrote the Canterbury Tales in Middle English; it is one of the founding works of English literature."}]}, {"question": "What does the Boccaccio Decameron Introduction reveal about the social breakdown caused by the Black Death in Florence?", "options": [{"text": "Boccaccio describes a community that responded to the plague with exemplary Christian solidarity and charitable behavior.", "isCorrect": false, "rationale": "Boccaccio describes the opposite: social bonds breaking down — people abandoning family members, friends deserting the sick, and both extreme piety and extreme hedonism as responses."}, {"text": "Boccaccio's eyewitness description reveals that the plague caused fundamental social breakdown — people abandoning the sick, fleeing the city, social norms collapsing — alongside vivid physical horror of the disease itself.", "isCorrect": true, "rationale": "The Introduction to the Decameron describes the black swellings, the collapse of social bonds, the breakdown of normal burial practices, and the extreme responses (extreme piety and extreme pleasure-seeking) of people who expected to die at any moment."}, {"text": "Boccaccio invented the plague scenario as a fictional framing device with no basis in historical reality.", "isCorrect": false, "rationale": "Boccaccio was present in Florence during the Black Death of 1348; his Introduction is considered one of the most important eyewitness accounts of the Black Death in any language."}, {"text": "Boccaccio describes the plague as having no effect on daily Florentine life; commerce and festivals continued normally.", "isCorrect": false, "rationale": "Boccaccio describes total disruption of Florentine life; the ten young people flee to a country villa specifically to escape the catastrophe consuming the city."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
