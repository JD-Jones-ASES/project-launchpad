<script>
var QUESTIONS = [{"question": "Why was Jerusalem uniquely significant to medieval Christians, and what changed in the late eleventh century to threaten access to it?", "options": [{"text": "Jerusalem was important only as a trading city; the Crusades were primarily about controlling the spice route.", "isCorrect": false, "rationale": "The text is explicit that Jerusalem was the holiest place on earth for Christians — the site of Christ's crucifixion, burial, and resurrection — and that the Crusades were driven by genuine religious devotion as well as other factors."}, {"text": "Jerusalem was the holiest place on earth for Christians; the change came when the Seljuk Turks converted to Islam, conquered much of the Byzantine Empire, threatened Constantinople, and disrupted Christian pilgrimages.", "isCorrect": true, "rationale": "The Seljuks shattered the Byzantine army at Manzikert (1071), pushed to within a hundred miles of Constantinople by the 1090s, and disrupted Christian access to holy sites — prompting the Byzantine Emperor's appeal to Rome."}, {"text": "Jerusalem became significant only after the First Crusade — before then, Christians did not care about the city.", "isCorrect": false, "rationale": "Christian pilgrims had traveled to Jerusalem for centuries before the Crusades; it had been holy since the early Christian period."}, {"text": "The Seljuk Turks destroyed the Church of the Holy Sepulchre, which was the direct cause of the First Crusade.", "isCorrect": false, "rationale": "The text does not say the Church of the Holy Sepulchre was destroyed; the issue was Muslim conquest and the threat to Christian pilgrimages and access."}], "id": "q01"}, {"question": "What were the multiple motivations Urban II offered in his speech at Clermont, and why is it important to recognize their complexity?", "options": [{"text": "Urban II's sole motivation was purely military — he wanted to defeat Islam.", "isCorrect": false, "rationale": "Urban's speech operated on religious, military, penitential, and even economic levels simultaneously."}, {"text": "Urban II offered religious motives (free holy places, help Christians), military logic (direct knightly violence toward holy war), and penitential promise (remission of sins for those who died); recognizing all three helps explain both the Crusades' mass appeal and their moral complexity.", "isCorrect": true, "rationale": "The speech worked because it addressed multiple audiences at once: the pious seeking forgiveness, the military class seeking honorable war, and even younger sons seeking land. Reducing it to any single motive distorts history."}, {"text": "Urban's only real motivation was to strengthen papal power politically; the religious language was entirely cynical.", "isCorrect": false, "rationale": "The text specifically warns against this oversimplification, noting that religious motivation was real even if it did not exclude other motivations."}, {"text": "Urban II was tricked by false reports about Seljuk atrocities; the speech was based entirely on misinformation.", "isCorrect": false, "rationale": "The Byzantine Emperor did appeal to Rome, and Seljuk military pressure on Christians was real. The text does not suggest Urban was deceived."}], "id": "q02"}, {"question": "What distinguished the official First Crusade from the People's Crusade?", "options": [{"text": "The People's Crusade was led by kings and arrived first; the official Crusade arrived later as a reserve force.", "isCorrect": false, "rationale": "The People's Crusade was led by Peter the Hermit and composed of common people; the official Crusade was led by great lords."}, {"text": "The official Crusade was organized by great lords such as Godfrey of Bouillon and Raymond of Toulouse; the People's Crusade was an unofficial, disorganized mass led by Peter the Hermit that was nearly destroyed by the Seljuks in Anatolia.", "isCorrect": true, "rationale": "The People's Crusade shows that the Crusades stirred the entire European population, not just the noble class. It also shows the danger of enthusiasm without military organization."}, {"text": "The People's Crusade eventually succeeded in capturing Jerusalem while the official Crusade failed.", "isCorrect": false, "rationale": "The People's Crusade was nearly destroyed before reaching the Holy Land; Jerusalem was captured by the organized First Crusade in 1099."}, {"text": "There was no difference — both were officially organized by the Pope.", "isCorrect": false, "rationale": "The People's Crusade was unofficial, departing before the nobles had finished organizing."}], "id": "q03"}, {"question": "What were the military orders, and why were they a remarkable innovation?", "options": [{"text": "The military orders were organizations of non-religious professional soldiers hired by the Church.", "isCorrect": false, "rationale": "The military orders combined the monastic vows of poverty, chastity, and obedience with the vow to fight for the faith — their members were religious men who were also warriors."}, {"text": "The military orders combined the life of a monk with the life of a warrior — members took monastic vows (poverty, chastity, obedience) and also vowed to fight for the faith, creating an institution unprecedented in the Christian world.", "isCorrect": true, "rationale": "The Crusader states needed permanent defenders; the solution was warrior-monks. The Templars and Hospitallers built the great stone castles of the Holy Land and became enormously powerful organizations."}, {"text": "The military orders were founded exclusively to care for sick pilgrims; they never engaged in combat.", "isCorrect": false, "rationale": "The Hospitallers began as a hospital order but took up arms; the Templars were warrior-monks from their founding."}, {"text": "The military orders were secular organizations funded by the kings of France and England to manage Crusade logistics.", "isCorrect": false, "rationale": "The military orders were religious, taking monastic vows. They were not royal organizations."}], "id": "q04"}, {"question": "Why was Saladin's behavior after the fall of Jerusalem in 1187 notable?", "options": [{"text": "Saladin massacred all the Crusader inhabitants just as the Crusaders had massacred Muslims in 1099.", "isCorrect": false, "rationale": "The text explicitly contrasts Saladin's behavior with 1099: he forbade a massacre, ransomed those who could pay, and allowed Christian pilgrims to continue visiting holy sites."}, {"text": "Saladin forbade a massacre, ransomed those who could pay, and allowed Christian pilgrims to continue visiting holy sites — behavior that contrasted sharply with the Crusaders' massacre in 1099 and was admired even by Christian chroniclers.", "isCorrect": true, "rationale": "This contrast is central to the text's moral complexity. Both sides were capable of brutality and magnanimity; Saladin's restraint in 1187 was notably humane by the standards of medieval warfare."}, {"text": "Saladin immediately demolished the Church of the Holy Sepulchre as a symbol of Muslim victory.", "isCorrect": false, "rationale": "Saladin allowed Christian pilgrims to visit holy sites; the text does not describe demolition of Christian churches."}, {"text": "Saladin converted all Christian inhabitants of Jerusalem to Islam by force.", "isCorrect": false, "rationale": "Saladin's behavior was notably merciful; he ransomed captives and allowed pilgrimage access."}], "id": "q05"}, {"question": "How did Richard I and Saladin's relationship during the Third Crusade illustrate the concept of chivalry?", "options": [{"text": "Richard and Saladin met in person and became personal friends who refused to fight each other.", "isCorrect": false, "rationale": "The text specifically notes the two never met face to face; their relationship was conducted through intermediaries and gestures."}, {"text": "Richard and Saladin never met but exchanged courtesies — Saladin sent Richard fresh fruit and ice when he was ill, and sent a replacement horse when Richard's was killed — reflecting a shared chivalric code about how an honorable enemy deserves to be treated.", "isCorrect": true, "rationale": "These gestures were expressions of the chivalric code: a shared warrior culture that recognized genuine mutual respect even across religious lines."}, {"text": "Richard and Saladin had no personal contact — their armies fought without any exchange of courtesies.", "isCorrect": false, "rationale": "The text describes specific courteous gestures: fresh fruit, ice from mountains, and a replacement horse."}, {"text": "Saladin converted to Christianity after admiring Richard's piety and courage during the Crusade.", "isCorrect": false, "rationale": "There is no evidence of Saladin's conversion; he died a Muslim in 1193."}], "id": "q06"}, {"question": "Why was the Fourth Crusade (1202–1204) a moral catastrophe?", "options": [{"text": "The Fourth Crusade failed militarily — it never left Europe and accomplished nothing.", "isCorrect": false, "rationale": "The Fourth Crusade did launch but ended by sacking Constantinople rather than fighting Muslims in Egypt or the Holy Land."}, {"text": "Crusaders sacked Constantinople — the greatest Christian city in the world — instead of fighting Muslims, looting its churches including the Great Church of Hagia Sophia, creating a wound between Eastern and Western Christianity that has never fully healed.", "isCorrect": true, "rationale": "Beginning as a crusade to Egypt, it was diverted first to Zara and then to Constantinople through debt to Venice and Byzantine political intrigue. Villehardouin's account records the enormous booty without apparent guilt."}, {"text": "The Fourth Crusade was the first to reach the Holy Land; it was a moral catastrophe because it massacred unarmed pilgrims.", "isCorrect": false, "rationale": "The Fourth Crusade never reached the Holy Land; it ended at Constantinople."}, {"text": "The Fourth Crusade was led by children (the Children's Crusade) who were sold into slavery.", "isCorrect": false, "rationale": "The Children's Crusade of 1212 was a separate, later event; the Fourth Crusade was led by adult nobles including Villehardouin."}], "id": "q07"}, {"question": "What is an indulgence, and why did Urban II's offer of one become so consequential in later history?", "options": [{"text": "An indulgence was a payment that guaranteed entry to heaven regardless of a person's sins.", "isCorrect": false, "rationale": "An indulgence was a remission of the temporal punishment due for sins already forgiven in confession — it did not guarantee heaven or forgive sins themselves."}, {"text": "An indulgence was a remission of the temporal punishment due for sins already forgiven; Urban II's offer of a plenary indulgence to Crusaders established a tradition that, expanded and commercialized over centuries, would become the immediate trigger for Martin Luther's protest in 1517.", "isCorrect": true, "rationale": "Urban's offer was the beginning of a tradition that evolved into the sale of indulgences criticized by Luther. The theological problem Luther identified in 1517 had roots in 1095."}, {"text": "An indulgence was a tax certificate issued by the Church to fund the Crusades; it had no theological significance.", "isCorrect": false, "rationale": "Indulgences had deep theological significance — they were based on the Church's treasury of merit and the doctrine of purgatory."}, {"text": "An indulgence was a papal document that allowed knights to break their vows without sin during wartime.", "isCorrect": false, "rationale": "Indulgences were about the remission of punishment for sin, not permission to commit sin or break vows."}], "id": "q08"}, {"question": "What were the Crusader states, and why were they fundamentally vulnerable?", "options": [{"text": "The Crusader states were powerful kingdoms that dominated the entire Middle East for centuries.", "isCorrect": false, "rationale": "The Crusader states were small, constantly under pressure from their Muslim neighbors, and dependent on resupply from Europe."}, {"text": "The Crusader states were four small Christian principalities carved out after 1099 — constantly under pressure from Muslim neighbors, dependent on European resupply, and requiring a permanent military presence to survive.", "isCorrect": true, "rationale": "County of Edessa, Principality of Antioch, County of Tripoli, and Kingdom of Jerusalem. Edessa fell first (1144). Jerusalem fell to Saladin in 1187. Acre, the last stronghold, fell in 1291."}, {"text": "The Crusader states were trading colonies with no military function; they were peaceful commercial outposts.", "isCorrect": false, "rationale": "The Crusader states had a permanently military character; the military orders were created specifically to defend them."}, {"text": "The Crusader states were never genuinely independent — they were always provinces of the Byzantine Empire.", "isCorrect": false, "rationale": "The Crusader states were independent of Byzantium; there was often considerable friction between Crusaders and their supposed Byzantine allies."}], "id": "q09"}, {"question": "What was the outcome of the Third Crusade, and why was it agonizing for Richard I?", "options": [{"text": "Richard I captured Jerusalem and held it against Saladin's counterattack.", "isCorrect": false, "rationale": "Richard came within twelve miles of Jerusalem twice but never captured it, recognizing he could not hold it even if he took it."}, {"text": "Richard reconquered the coastal strip and won key battles but could not take Jerusalem; the Treaty of Jaffa left Jerusalem in Muslim hands while allowing Christian pilgrims to visit freely.", "isCorrect": true, "rationale": "Richard won at Acre and Arsuf but knew that a besieged Jerusalem could not be held if Saladin threatened from outside. Twice he came within twelve miles and turned back. The treaty was the best he could achieve."}, {"text": "Richard was captured by Saladin before reaching the Holy Land and died in captivity.", "isCorrect": false, "rationale": "Richard was captured by the Duke of Austria while returning from the Crusade, not by Saladin, and was ransomed."}, {"text": "The Third Crusade completely failed — Richard never reached the Holy Land at all.", "isCorrect": false, "rationale": "Richard reached the Holy Land, reconquered Acre and the coastal strip, and came close to Jerusalem before concluding the Treaty of Jaffa."}], "id": "q10"}, {"question": "How should historians evaluate eyewitness sources like Villehardouin's account of the Fourth Crusade?", "options": [{"text": "Eyewitness accounts are always more reliable than later histories because the person was present.", "isCorrect": false, "rationale": "The text argues the opposite: Villehardouin was an eyewitness who cannot see — or will not let himself see — the moral disaster of what he participated in."}, {"text": "Eyewitnesses interpret events through the lenses of their loyalties and assumptions; Villehardouin describes the sack of Constantinople with satisfaction, not horror, illustrating how participants can be genuine yet morally blind.", "isCorrect": true, "rationale": "The key lesson is that Villehardouin is not lying — he is a man who participated in a moral disaster while genuinely believing he served God. His blindness is itself historically significant."}, {"text": "Eyewitness accounts should be rejected entirely if the author was personally involved in the events.", "isCorrect": false, "rationale": "The text says we should use all accounts 'carefully, together' — not reject any of them. Even biased sources reveal important truths."}, {"text": "Villehardouin's account is the most reliable because he was a professional historian trained to be objective.", "isCorrect": false, "rationale": "Villehardouin was a nobleman and participant, not a trained historian; his account reflects his loyalties and the limits of his moral perception."}], "id": "q11"}, {"question": "Who was Anna Komnene, and what unique perspective did she bring to the Crusades?", "options": [{"text": "Anna Komnene was a French princess who participated in the First Crusade as a nurse.", "isCorrect": false, "rationale": "Anna Komnene was the daughter of the Byzantine Emperor Alexios I Komnenos; she watched the First Crusade arrive from the Byzantine side."}, {"text": "Anna Komnene was the daughter of the Byzantine Emperor Alexios I, who watched the First Crusade from the Byzantine side — seeing the Crusaders very differently than they saw themselves.", "isCorrect": true, "rationale": "As a Byzantine princess, Anna saw the Crusaders as potentially dangerous interlopers in Byzantine territory, not simply as liberators. Her perspective reveals how the same events looked completely different to different observers."}, {"text": "Anna Komnene was a Muslim scholar who recorded Saladin's perspective on the Third Crusade.", "isCorrect": false, "rationale": "Anna Komnene was Byzantine (Christian) and wrote about the First Crusade, not Saladin or the Third Crusade."}, {"text": "Anna Komnene was a Crusader's wife who wrote letters home from the Holy Land.", "isCorrect": false, "rationale": "Anna Komnene was a Byzantine imperial princess and historian who stayed in Constantinople."}], "id": "q12"}, {"question": "What were the long-term consequences of the Crusades — both positive and negative?", "options": [{"text": "The Crusades succeeded in permanently establishing Christian control of the Holy Land.", "isCorrect": false, "rationale": "The Crusader states lasted only until 1291; the Crusades failed to permanently recover the Holy Land."}, {"text": "The Crusades failed militarily but had significant cultural consequences: accelerating exchange of knowledge between Christian and Islamic worlds (including Aristotle via Arabic), stimulating Italian trade, and leaving a legacy of bitterness between Christianity and Islam.", "isCorrect": true, "rationale": "Europe learned Arab mathematics, medicine, and philosophy through Crusade contact. Italian city-states grew rich from Crusade trade. But the massacres and the sack of Constantinople left deep wounds between Christianity and Islam, and between Eastern and Western Christianity."}, {"text": "The Crusades were entirely without positive consequences and only caused harm.", "isCorrect": false, "rationale": "The text notes genuine consequences: knowledge exchange, trade stimulation, and the preservation of pilgrimage access to the Holy Land."}, {"text": "The Crusades successfully stopped the advance of Islam into Europe.", "isCorrect": false, "rationale": "The Crusades did not stop Islam's advance — Constantinople fell to the Ottomans in 1453."}], "id": "q13"}, {"question": "How does a Christian ethical evaluation of the Crusades hold together seemingly contradictory truths?", "options": [{"text": "A Christian evaluation must either completely celebrate the Crusades as holy war or condemn them as evil.", "isCorrect": false, "rationale": "The text explicitly rejects this binary: a Christian evaluation must hold both truths simultaneously."}, {"text": "A Christian evaluation must hold that sincere faith does not prevent terrible acts — the Crusades involved genuine religious devotion and terrible moral failures simultaneously, showing that the ends do not justify any means.", "isCorrect": true, "rationale": "The massacres at Jerusalem (1099), the sack of Constantinople (1204), the persecution of European Jews, and the exploitation of holy war for politics all represent serious moral failures — even while the motivations of many Crusaders were genuine."}, {"text": "A Christian evaluation would simply praise the Crusades because they were called by the Pope.", "isCorrect": false, "rationale": "Papal authority does not make every decision morally correct; the text presents the Fourth Crusade as a case study in how good intentions can be corrupted."}, {"text": "A Christian evaluation would focus entirely on the Crusaders' failures and ignore any genuine religious motivation.", "isCorrect": false, "rationale": "The text presents the Crusaders' motivations as genuinely mixed — not simply cynical or simply pure. A fair evaluation must acknowledge both."}], "id": "q14"}, {"question": "What does Robert the Monk's account of Urban II's speech at Clermont reveal about historical sources and reliability?", "options": [{"text": "Robert the Monk's account is a verbatim transcript of Urban's speech, recorded on the spot.", "isCorrect": false, "rationale": "Robert wrote his account more than a decade after the events; it is a literary reconstruction from memory, other witnesses, and his own beliefs."}, {"text": "Robert the Monk wrote a literary reconstruction of Urban's speech more than a decade later, shaped by his beliefs as a man who thought every word was God's will — showing that no historical source is simply a transparent window onto the past.", "isCorrect": true, "rationale": "The speech in Robert's version is polished and powerful, clearly shaped by a believer writing for believers. Yet something in the real speech worked — the crowd's response is attested by every eyewitness. The text teaches students to read all sources with this critical awareness."}, {"text": "Robert the Monk's account is considered completely unreliable and should be discarded.", "isCorrect": false, "rationale": "The text says to use 'all of them, carefully, together' — not to discard any source."}, {"text": "Robert the Monk was a Muslim spy who recorded Urban's speech to help the Seljuks prepare a counterattack.", "isCorrect": false, "rationale": "Robert was a French Benedictine monk who believed in the Crusade."}], "id": "q15"}, {"question": "Why did the Crusades ultimately collapse, and when did the Crusader presence in the Holy Land end?", "options": [{"text": "The Crusades ended when both sides agreed to a permanent peace treaty in 1250.", "isCorrect": false, "rationale": "No permanent peace treaty was agreed; the Crusader presence simply ended when military power collapsed."}, {"text": "The final Crusader stronghold, Acre, fell to the Mamluk Sultan al-Ashraf Khalil in 1291, ending nearly two centuries of Crusader presence; later Crusades had accomplished little after the Fourth Crusade's disaster.", "isCorrect": true, "rationale": "After the Fourth Crusade diverted to Constantinople in 1204, the Crusade movement gradually lost momentum. The Fifth Crusade failed; Louis IX's Seventh and Eighth Crusades ended without recapturing Jerusalem; Louis died on the Eighth."}, {"text": "The Crusader states were destroyed by the Mongol invasion of 1258.", "isCorrect": false, "rationale": "The Mongols sacked Baghdad in 1258 but did not end the Crusader states directly; Acre fell to the Mamluks in 1291."}, {"text": "The Crusades ended when the Pope forbade further military campaigns in 1300.", "isCorrect": false, "rationale": "The text does not describe a papal prohibition; the Crusades simply lost momentum and support as repeated failures accumulated."}], "id": "q16"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
