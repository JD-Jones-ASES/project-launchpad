    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Ecological Tolerance and the Niche Concept</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Within a species' range of tolerance, where is the population's growth, reproduction, and survival typically maximized?", "options": [{"text": "At the absolute upper tolerance limit", "isCorrect": false, "rationale": "Performance approaches zero at tolerance limits; the upper limit is lethal, not optimal."}, {"text": "In the optimal range — the central portion of the tolerance curve", "isCorrect": true, "rationale": "Correct. Performance peaks at the optimum and declines symmetrically (or asymmetrically) toward each tolerance limit."}, {"text": "In the upper zone of physiological stress", "isCorrect": false, "rationale": "The zone of physiological stress is where the organism survives but at reduced performance — not maximum."}, {"text": "At the lower tolerance limit", "isCorrect": false, "rationale": "Performance falls to zero at this boundary; it is lethal, not optimal."}], "id": "q01"}, {"question": "Brook trout (Salvelinus fontinalis) survive at water temperatures from roughly 0 to 25 degrees C but thrive optimally between 12 and 17 degrees C. How does climate change directly threaten this species' geographic distribution?", "options": [{"text": "It introduces a novel pathogen that brook trout cannot resist", "isCorrect": false, "rationale": "Disease may indirectly contribute, but the direct mechanism described is temperature-driven niche shift, not pathogens."}, {"text": "It shifts stream temperatures from the optimal range into the upper stress zone (>21 degrees C) and lethal zone (>25 degrees C), compressing the geographic range of suitable streams toward higher elevations and latitudes", "isCorrect": true, "rationale": "Correct. Climate change is a direct shift along the tolerance axis from optimum to stress to lethal, narrowing the species' usable range."}, {"text": "It causes brook trout to evolve a higher upper tolerance limit within a few generations", "isCorrect": false, "rationale": "Evolution can occur, but on slow timescales relative to climate change; the direct threat is range loss, not adaptation."}, {"text": "It increases the species' fundamental niche through warming", "isCorrect": false, "rationale": "Warming compresses the available habitat, not expands the fundamental niche."}], "id": "q02"}, {"question": "Liebig's law of the minimum (1840) states that:", "options": [{"text": "A species' performance is determined by the average of its environmental conditions", "isCorrect": false, "rationale": "Liebig's law specifically rejects averaging; it focuses on the most limiting single factor."}, {"text": "A species' performance is limited by the single resource most scarce relative to its needs", "isCorrect": true, "rationale": "Correct. A nitrogen-poor soil limits tree growth even if temperature, water, and light are ideal — a corrective to additive thinking."}, {"text": "A species can survive if any one of its tolerance limits is exceeded", "isCorrect": false, "rationale": "Exceeding tolerance limits causes mortality; the law of the minimum addresses limiting factors within tolerance, not survival outside it."}, {"text": "Two species cannot coexist if they share the same niche", "isCorrect": false, "rationale": "This is the competitive exclusion principle (Gause), not Liebig's law."}], "id": "q03"}, {"question": "Which best describes the difference between fundamental and realized niches?", "options": [{"text": "The fundamental niche is geographic range; the realized niche is dietary range", "isCorrect": false, "rationale": "Both niches involve all dimensions of resource use; this is not the geographic-vs-dietary distinction."}, {"text": "The fundamental niche is the full niche space a species could occupy without competition or predation; the realized niche is the narrower subset it actually occupies in the presence of those biotic interactions", "isCorrect": true, "rationale": "Correct. Hutchinson formalized both as multidimensional hypervolumes; competition compresses the realized niche below the fundamental niche."}, {"text": "The fundamental niche is for primary consumers; the realized niche is for secondary consumers", "isCorrect": false, "rationale": "Niche-type distinction is not about trophic position."}, {"text": "The fundamental niche is climate-determined; the realized niche is soil-determined", "isCorrect": false, "rationale": "Both abiotic and biotic factors interact; the distinction between the two niche concepts is not climate vs soil."}], "id": "q04"}, {"question": "On Pacific rocky intertidal shores, Chthamalus barnacles settle across the full intertidal zone but are restricted to the upper zone in the presence of Balanus barnacles. When Balanus is experimentally removed, Chthamalus expands into the lower zone. This demonstrates that:", "options": [{"text": "Chthamalus has a smaller fundamental niche than Balanus", "isCorrect": false, "rationale": "The experiment shows Chthamalus's fundamental niche extends throughout the zone; competition restricts the realized niche."}, {"text": "Chthamalus's fundamental niche extends into the lower zone, but its realized niche is restricted by competition with Balanus", "isCorrect": true, "rationale": "Correct. The species can physiologically tolerate the lower zone; biotic interaction (competition with Balanus) is what excludes it."}, {"text": "Lower-zone abiotic conditions are too harsh for Chthamalus", "isCorrect": false, "rationale": "If abiotic conditions excluded Chthamalus, removing Balanus wouldn't allow expansion; the experimental result rules out abiotic limitation."}, {"text": "Balanus has a fundamental niche limited to the lower zone", "isCorrect": false, "rationale": "Balanus does occupy the lower zone, but the experimental finding pertains to Chthamalus's fundamental vs realized niche."}], "id": "q05"}, {"question": "Gause's experiments grew P. aurelia and P. caudatum together and separately on a bacterial food source. What was the result?", "options": [{"text": "Both species coexisted indefinitely in mixed culture", "isCorrect": false, "rationale": "The result was the opposite — coexistence failed in mixed culture."}, {"text": "P. aurelia consistently drove P. caudatum to extinction within two weeks in mixed culture, even though both thrived alone", "isCorrect": true, "rationale": "Correct. This established the competitive exclusion principle: two species with identical resource requirements cannot coexist indefinitely."}, {"text": "P. caudatum drove P. aurelia to extinction in mixed culture", "isCorrect": false, "rationale": "P. aurelia was the superior competitor in Gause's experiments, not the inferior one."}, {"text": "Both species developed character displacement and coexisted", "isCorrect": false, "rationale": "Character displacement was not observed in this two-week laboratory experiment; competitive exclusion was the result."}], "id": "q06"}, {"question": "Multiple woodpecker species coexist in a forest by foraging at different heights, on different tree species, and at different decay stages. What concept does this illustrate?", "options": [{"text": "Allopatric speciation", "isCorrect": false, "rationale": "Allopatric speciation is the formation of new species via geographic isolation; this is about coexistence within a community."}, {"text": "Resource partitioning — slight differences in resource use reduce competition enough for coexistence", "isCorrect": true, "rationale": "Correct. MacArthur's classic 1958 warbler study showed similar patterns: subtle partitioning of canopy zones, foraging times, and search behaviors enabled coexistence."}, {"text": "Mutualism between woodpecker species", "isCorrect": false, "rationale": "These woodpeckers are competitors, not mutualists."}, {"text": "Genetic drift across woodpecker populations", "isCorrect": false, "rationale": "Genetic drift relates to allele-frequency change in small populations, not niche-based coexistence."}], "id": "q07"}, {"question": "Why are specialist species (like the giant panda) typically more vulnerable to extinction than generalist species (like the raccoon)?", "options": [{"text": "Specialists have larger geographic ranges than generalists", "isCorrect": false, "rationale": "Specialists usually have narrower geographic ranges restricted by their resource needs."}, {"text": "Specialists depend on a narrow set of resources or habitat conditions, so any perturbation that degrades those specific resources can drive local extinction quickly", "isCorrect": true, "rationale": "Correct. The panda's near-total reliance on bamboo, sensitivity to bamboo die-offs, and need for forest connectivity make it acutely vulnerable to habitat loss and climate change."}, {"text": "Specialists have fewer offspring than generalists", "isCorrect": false, "rationale": "Reproductive output is not the defining feature of generalist-vs-specialist vulnerability; niche breadth is."}, {"text": "Specialists are biologically inferior to generalists", "isCorrect": false, "rationale": "Specialists are highly efficient within their niche (e.g., the panda's high-fiber digestive system); they are not biologically inferior, just narrowly adapted."}], "id": "q08"}, {"question": "The sea star Pisaster ochraceus is a keystone predator that preferentially consumes mussels. When Pisaster is removed, mussels expand to cover virtually the entire intertidal surface, displacing most other species. Using niche theory, this is best explained as:", "options": [{"text": "Mussels and sea stars share the same fundamental niche", "isCorrect": false, "rationale": "They occupy different niches; this scenario is about predator-prey and indirect competitive release, not shared niches."}, {"text": "Without Pisaster's predation pressure, mussels' realized niche expands toward their fundamental niche, and they competitively exclude many other intertidal species", "isCorrect": true, "rationale": "Correct. Predation had restricted the mussels' realized niche; removing the predator allows expansion, and superior competitive ability of mussels then excludes other species — driving down community diversity."}, {"text": "Mussels develop a new fundamental niche after Pisaster removal", "isCorrect": false, "rationale": "Fundamental niches are physiological and intrinsic; they do not change based on predator presence."}, {"text": "Pisaster removal increases species richness in the community", "isCorrect": false, "rationale": "The opposite occurs — removal collapses diversity as the dominant competitor takes over."}], "id": "q09"}, {"question": "Which is an example of a biotic factor (not an abiotic factor) that can reduce a species' realized niche below its fundamental niche?", "options": [{"text": "Soil pH lower than the species' physiological optimum", "isCorrect": false, "rationale": "Soil pH is an abiotic factor."}, {"text": "Daytime temperature exceeding the species' upper tolerance limit", "isCorrect": false, "rationale": "Temperature is an abiotic factor."}, {"text": "Interspecific competition with another species for shared food resources", "isCorrect": true, "rationale": "Correct. Competition is a biotic interaction; predation, parasitism, and disease are also biotic factors that compress the realized niche."}, {"text": "Insufficient nitrogen availability in the soil", "isCorrect": false, "rationale": "Nitrogen is an abiotic resource limitation (Liebig's law context), not a biotic factor."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
