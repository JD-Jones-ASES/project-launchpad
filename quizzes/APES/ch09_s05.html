    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Biodiversity Loss and the Sixth Extinction</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Paleontologists studying current extinction rates often describe the present period as a \"Sixth Extinction.\" Which observation BEST supports characterizing the contemporary biodiversity crisis as comparable in rate to the five mass extinctions of the geological past?", "options": [{"text": "More species are alive today than at any previous point in Earth history, so even small percentage losses are unprecedented in absolute terms.", "isCorrect": false, "rationale": "Total species richness has fluctuated through geological time, and absolute species counts are not the criterion for a mass extinction. The criterion is rate (and ultimately fractional magnitude) of loss."}, {"text": "The current observed extinction rate is estimated at 100-10,000 E/MSY, compared to a background rate of approximately 1 E/MSY — orders of magnitude above the natural rate inferred from the fossil record.", "isCorrect": true, "rationale": "Mass extinctions are defined by rapid, geologically brief losses of more than 75% of species. While the current event has not yet reached the fractional magnitude of past mass extinctions, the rate is at least 100 times background and possibly 1,000 times or higher — a defining feature of mass-extinction events."}, {"text": "All five previous mass extinctions involved climate change, and the current warming proves the pattern is repeating.", "isCorrect": false, "rationale": "Past mass extinctions had varied causes (asteroid impact, massive volcanism, ocean anoxia). The current event qualifies by rate, not by mechanism mimicry."}, {"text": "The Permian-Triassic extinction lost 96% of species, and the current 60% population decline already exceeds that level.", "isCorrect": false, "rationale": "60% population decline is not equivalent to 60% species loss; populations decline within still-extant species. The contemporary event has not approached Permian-Triassic magnitude."}]}, {"question": "E.O. Wilson's HIPPO acronym ranks five drivers of biodiversity loss roughly in order of current impact magnitude. Which driver does Wilson place FIRST, and what is the BEST evidence for that ranking?", "options": [{"text": "Pollution; air and water pollutants now cause more direct mortality than habitat conversion.", "isCorrect": false, "rationale": "Pollution is the third 'P' in HIPPO. While important, it ranks below habitat destruction in Wilson's ordering."}, {"text": "Habitat destruction and fragmentation; roughly 75% of the land surface and 66% of the ocean has been 'significantly altered' by human activity (IPBES Global Assessment 2019), eliminating the living space species require.", "isCorrect": true, "rationale": "Wilson placed habitat destruction first in HIPPO. The IPBES 2019 assessment quantifies this directly: most of Earth's land and a majority of its ocean are now significantly altered, and habitat loss combined with fragmentation eliminates the basic conditions species require."}, {"text": "Invasive species; introduced rats and cats have driven the largest number of documented extinctions in recorded history.", "isCorrect": false, "rationale": "Invasive species are the second letter (I) in HIPPO. While they have driven many island extinctions, habitat destruction has greater overall magnitude."}, {"text": "Overharvesting; commercial fishing has removed 90% of large predatory fish since 1950.", "isCorrect": false, "rationale": "Overharvesting (the final O in HIPPO) is severe but ranks below habitat destruction in current global impact. Wilson's ordering reflects relative magnitude, not specific cases."}]}, {"question": "PRIMARY SOURCE — Section 2 of the Endangered Species Act (1973) establishes that endangered species have \"esthetic, ecological, educational, historical, recreational, and scientific\" value. Which of the following BEST explains why this articulation represents a conceptual leap over the earlier Lacey Act (1900)?", "options": [{"text": "The ESA only protects animals, while the Lacey Act protected plants — a fundamental scope expansion.", "isCorrect": false, "rationale": "Both acts cover animal species, and the ESA explicitly extends protection to plants as well. Scope of taxa is not the conceptual leap."}, {"text": "The ESA protects ecosystems on which threatened and endangered species depend, not merely the species themselves — recognizing that effective species conservation requires habitat conservation.", "isCorrect": true, "rationale": "The ESA's stated purpose includes 'a means whereby the ecosystems upon which endangered species and threatened species depend may be conserved.' This systems-level protection is operationalized through critical habitat designation and Section 7 consultation, distinct from the Lacey Act's narrower trade-prohibition framework."}, {"text": "The ESA criminalizes commercial trade in wildlife, which the Lacey Act permitted.", "isCorrect": false, "rationale": "The Lacey Act of 1900 itself was a major federal effort to combat commercial wildlife trade. The conceptual difference is the ESA's protection of ecosystems, not species trade."}, {"text": "The ESA gives federal courts criminal jurisdiction over private landowners for the first time.", "isCorrect": false, "rationale": "Criminal jurisdiction over private landowners flows from the 'take' prohibition, but is not the 'conceptual leap' the question references. Ecosystem protection is the conceptual innovation."}]}, {"question": "PRIMARY SOURCE — Article II of CITES (1973) establishes a three-tier appendix system for regulating wildlife trade. Which of the following PROPERLY pairs an appendix with its level of trade restriction?", "options": [{"text": "Appendix I = species not threatened, Appendix II = threatened with extinction, Appendix III = listed by national request.", "isCorrect": false, "rationale": "This reverses Appendices I and II. Appendix I is the most restrictive (species threatened with extinction), Appendix II is intermediate (species that may become threatened without trade controls)."}, {"text": "Appendix I = species threatened with extinction (commercial trade prohibited; permits required only in exceptional circumstances), Appendix II = species not yet threatened but requiring strict regulation, Appendix III = species listed at the request of a single party for cooperation in trade control.", "isCorrect": true, "rationale": "This is the correct three-tier hierarchy. Article II of CITES graduates regulation by extinction risk: Appendix I has the strictest controls, Appendix II requires export permits with non-detriment findings, Appendix III allows national listings for cooperative trade control."}, {"text": "All three appendices have identical trade prohibition; the difference is administrative.", "isCorrect": false, "rationale": "The three appendices have substantively different levels of trade regulation. Appendix I prohibits commercial trade, while Appendix II permits regulated trade with findings, and Appendix III requires inter-party cooperation."}, {"text": "Appendix III is the most restrictive because it requires unanimous consent of all parties.", "isCorrect": false, "rationale": "Appendix III is actually the least restrictive — it allows a single party to list species and seek cooperation from others, without requiring stricter trade restrictions."}]}, {"question": "The Yellowstone wolf reintroduction (1995) is often cited as the classic example of a trophic cascade. Which sequence BEST describes the cascade ecologists documented?", "options": [{"text": "Wolves directly fertilized streamside vegetation through nutrient deposition, increasing plant biomass.", "isCorrect": false, "rationale": "The cascade was driven by predator behavior effects on elk, not direct nutrient deposition. While carnivore nutrient cycles exist, the Yellowstone cascade was about behavioral changes."}, {"text": "Wolf predation on elk altered elk grazing behavior; reduced grazing pressure on streamside vegetation allowed plants to recover, which reduced bank erosion, restored beaver habitat, and altered stream hydrology.", "isCorrect": true, "rationale": "The Yellowstone cascade demonstrates how a keystone predator's role in the ecosystem is disproportionately large relative to its abundance. Wolf presence changed elk distribution and grazing patterns, with effects propagating through vegetation, beaver populations, and stream geomorphology."}, {"text": "Wolves rapidly reduced the elk population to less than 10% of pre-introduction levels, eliminating grazing pressure.", "isCorrect": false, "rationale": "Elk populations declined moderately but were not reduced by 90%. The behavioral effect (where elk graze, when they graze) was as important as the demographic effect (how many elk)."}, {"text": "Wolves outcompeted coyotes, which then triggered an increase in small mammal populations.", "isCorrect": false, "rationale": "While wolf-coyote interactions did occur, the famous Yellowstone trophic cascade traces from wolves through elk to vegetation, beavers, and stream hydrology — not through small mammals."}]}, {"question": "An environmental policy student argues that CITES is a weak treaty because illegal wildlife trade remains a multibillion-dollar industry, ranking as the fourth most profitable illegal trade globally. Which response BEST evaluates the strength of CITES as a conservation tool?", "options": [{"text": "The student is correct that CITES has failed; no listed species has shown population recovery.", "isCorrect": false, "rationale": "CITES has been credited with stabilizing or recovering several heavily traded species, including some parrot populations, crocodilians, and certain whale populations after the 1986 moratorium. The 1989 ivory trade ban is the most celebrated case."}, {"text": "CITES has documented successes (1989 ivory ban, certain parrots, crocodilians, whale populations) but suffers from variable national enforcement, since CITES relies on each party's domestic legislation to implement provisions and penalties vary widely by country.", "isCorrect": true, "rationale": "This balanced response captures CITES's mixed record. The treaty's universal listings (~6,000 animals, 32,000 plants) and 184 parties give it substantial authority, but enforcement depends on national implementation, leaving gaps that trafficking exploits."}, {"text": "CITES is unenforceable because no international body has jurisdiction to prosecute violations.", "isCorrect": false, "rationale": "CITES does rely on national implementation, but parties enact domestic legislation to make provisions binding, and TRAFFIC plus Interpol's Project Predator provide monitoring intelligence. The system is not without enforcement, just variable."}, {"text": "Illegal trade volume is irrelevant to CITES effectiveness because CITES only regulates legal trade.", "isCorrect": false, "rationale": "CITES regulates legal trade through permits, but the treaty's effectiveness is precisely its ability to suppress illegal trade by removing legal cover and improving traceability. Trade volume IS a relevant metric for treaty performance."}]}, {"question": "Why are island ecosystems disproportionately vulnerable to invasive species?", "options": [{"text": "Island species evolved in the absence of mammalian predators and have no behavioral defenses against introduced rats, cats, or mongooses.", "isCorrect": true, "rationale": "Island fauna typically evolved without mammalian predators. Introduced rats, cats, and mongooses encounter naive prey that lack anti-predator behaviors, leading to disproportionate extinction rates. Numerous bird extinctions (dodo, great auk's relatives, Hawaiian honeycreepers) have followed this pattern."}, {"text": "Island ecosystems have lower biodiversity than mainland ecosystems, so each species loss is statistically more severe.", "isCorrect": false, "rationale": "While island ecosystems often have lower species richness, this alone does not explain vulnerability. The mechanistic reason is the absence of evolved defenses against introduced predators."}, {"text": "Island climates are too warm for invasive species to compete with natives.", "isCorrect": false, "rationale": "Climate is not the key factor. Many invasive species thrive in island climates, often becoming more successful than they are in their native ranges."}, {"text": "Islands are typically too small for invasive species populations to persist long-term.", "isCorrect": false, "rationale": "Many invasive species have established stable, persistent populations on islands. Island size is generally a vulnerability factor (small population sizes for natives), not a barrier to invaders."}]}, {"question": "A biologist studies the effect of pollinator decline on flowering plant reproduction. Which datum BEST quantifies the scope of the pollinator-biodiversity link?", "options": [{"text": "Approximately 10% of global food crops and 20% of flowering plant species depend on insect pollinators.", "isCorrect": false, "rationale": "These figures understate pollinator dependence. Approximately 35% of global food crops and 80% of flowering plant species depend on insect pollinators."}, {"text": "Approximately 35% of global food crops and 80% of flowering plant species depend on insect pollinators (honeybees, native bees, hoverflies, moths), so pollinator declines cascade through every food web that depends on seed and fruit production.", "isCorrect": true, "rationale": "These IPBES-cited figures emphasize that pollinator decline is not a niche conservation concern but a foundational threat to food production and plant community structure across most flowering-plant ecosystems."}, {"text": "Approximately 100% of all plant species are pollinated by honeybees alone.", "isCorrect": false, "rationale": "Honeybees pollinate many crops but not all. Wind pollination (grasses, conifers), water pollination, and self-pollination all exist. Native bees, hoverflies, moths, butterflies, and bats are also major pollinators."}, {"text": "Honeybee colony losses prove that all pollinator services are now collapsing.", "isCorrect": false, "rationale": "Honeybee colony losses are concerning but do not capture the full pollinator picture. Native bee declines are arguably more severe, and pollinator diversity (not just honeybees) supports food webs."}]}, {"question": "Which of the following BEST distinguishes the ESA from CITES as conservation tools?", "options": [{"text": "Both are treaties signed in 1973 with identical scope, but ESA covers Africa and CITES covers the Americas.", "isCorrect": false, "rationale": "ESA is a US federal statute, not a treaty. CITES is an international treaty. Their scopes (US v. global) and legal natures differ fundamentally."}, {"text": "ESA is a US federal statute that prohibits 'take' of listed species (extending to private landowners) and requires Section 7 consultation; CITES is an international treaty operating through trade permits and three-tier appendix listings.", "isCorrect": true, "rationale": "ESA is national legislation operating through prohibition of 'take' and Section 7 consultation, with the strongest national species-protection provisions in the world. CITES regulates international trade through the permit system, requiring national implementation. They operate at different scales and through different legal mechanisms."}, {"text": "ESA listings are based on economic factors; CITES listings are based on extinction risk only.", "isCorrect": false, "rationale": "This reverses the ESA's design. ESA listing decisions must be based solely on the best available scientific and commercial data — economic factors may NOT be considered at the listing stage."}, {"text": "CITES protects only animals; ESA protects only plants.", "isCorrect": false, "rationale": "Both ESA and CITES protect both animals and plants. CITES has approximately 6,000 listed animals and 32,000 listed plants."}]}, {"question": "An APES student examines a graph showing that 60% of monitored vertebrate populations have declined in abundance since 1970, even though many of these populations are within species not yet extinct. Why is this population-level decline ecologically significant?", "options": [{"text": "Population declines have no ecological consequence as long as species remain technically extant.", "isCorrect": false, "rationale": "Population declines are ecologically meaningful even without extinction. They erode genetic diversity, reduce ecosystem services, and remove ecological function from the system."}, {"text": "Population declines indicate that documented extinction counts overstate the magnitude of biodiversity loss.", "isCorrect": false, "rationale": "Population declines show that loss is MORE severe than extinction counts suggest, not less. Functional loss occurs before formal extinction."}, {"text": "Population declines represent functional erosion of biodiversity and ecosystem services — even non-extinct species lose their ability to provide pollination, seed dispersal, predator control, nutrient cycling, and other ecological functions when their numbers fall.", "isCorrect": true, "rationale": "Ecological function depends on population size, not just species presence. As populations crash, the species effectively withdraws from the food web, even if a few individuals survive in protected pockets. This is why the Living Planet Report emphasizes population declines as a complementary metric to extinction."}, {"text": "Population declines are a natural feature of all ecosystems and should not be a conservation concern.", "isCorrect": false, "rationale": "While population fluctuations are natural, sustained declines across most monitored populations indicate systemic stress. The 60% IPBES finding describes anthropogenic forcing, not natural fluctuation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
