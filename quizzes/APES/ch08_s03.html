<script>
var QUESTIONS = [{"question": "A developer proposes draining a 50-acre coastal wetland for a residential subdivision. Which set of ecosystem services would be lost, and why are these services difficult to replace with engineered infrastructure?", "options": [{"text": "Water filtration and flood attenuation; both can be fully replaced by stormwater pipes and sewage treatment plants at lower cost than wetland preservation.", "isCorrect": false, "rationale": "A single acre of wetland can remove hundreds of pounds of nitrogen per year — at far lower cost than engineered treatment infrastructure. Flood attenuation reduces downstream flood peaks by 20–60%; engineered alternatives are expensive and rarely match this performance for the same investment."}, {"text": "Water filtration through plant uptake and bacterial denitrification, flood attenuation through water storage, groundwater recharge, wildlife habitat, and carbon storage — all integrated functions that engineered alternatives replicate piecemeal at much higher cost.", "isCorrect": true, "rationale": "Wetlands function as the landscape's kidneys: a single acre removes hundreds of pounds of nitrogen annually, at far lower cost than engineered treatment. They reduce downstream flood peaks by 20–60% by storing water during rain events and releasing it slowly. They provide critical wildlife habitat (especially for migratory birds and fish nurseries) and carbon storage. No single engineered system replicates all these integrated functions; each replacement costs more than wetland preservation would have."}, {"text": "Only carbon sequestration; the other services are minor and easily replaced.", "isCorrect": false, "rationale": "Wetlands provide multiple major ecosystem services. The 50% historical loss of US wetland extent has produced documented increases in flooding, water-quality degradation, and waterfowl population declines — outcomes that demonstrate these services were not replaceable."}, {"text": "Wetland services are not significant enough to justify protection on a 50-acre site.", "isCorrect": false, "rationale": "Wetlands provide critical services per acre (hundreds of pounds of nitrogen removal, 20–60% flood-peak reduction, wildlife habitat) that compound across the landscape. Cumulative loss of 50% of US wetland extent is the structural reason CWA Section 404 was created."}], "id": "q01"}, {"question": "Sackett v. EPA (2023) significantly altered Clean Water Act jurisdiction over wetlands. Which of the following BEST describes the change and its implication?", "options": [{"text": "The Court extended CWA jurisdiction to all wetlands regardless of surface connection to navigable waters.", "isCorrect": false, "rationale": "Sackett did the opposite: it narrowed CWA jurisdiction. The pre-2023 standard covered most jurisdictional wetlands; Sackett restricted that reach."}, {"text": "The Supreme Court limited CWA jurisdiction to wetlands with a \"continuous surface connection\" to navigable waters, removing federal protection from tens of millions of acres of ephemeral and geographically isolated wetlands.", "isCorrect": true, "rationale": "Sackett v. EPA (2023) adopted a narrower interpretation of \"waters of the United States,\" requiring a continuous surface connection rather than the prior broader standard. This represents one of the most significant rollbacks of the CWA's reach since the Act's passage, leaving many ephemeral and isolated wetlands without federal protection unless covered by state law."}, {"text": "The Court eliminated CWA Section 404 entirely.", "isCorrect": false, "rationale": "Section 404 remains in force; what Sackett changed was the scope of waters and wetlands subject to its jurisdiction. The Army Corps of Engineers still issues permits, but for a narrower class of wetlands."}, {"text": "The Court required EPA to protect every wet area, including parking-lot puddles after rain.", "isCorrect": false, "rationale": "The Court narrowed jurisdiction; Sackett did not expand EPA reach to parking-lot puddles or any other category."}], "id": "q02"}, {"question": "A coastal community in Southeast Asia clears a 100-meter mangrove belt to build shrimp aquaculture ponds. A typhoon strikes 5 years later. Which outcome is MOST consistent with the cumulative-stress framework?", "options": [{"text": "The cleared coastline experiences storm-surge fatalities 4–10 times higher than nearby coastal communities behind intact mangrove belts, because the dense root and trunk structure of mangroves dissipates wave energy and slows surge propagation.", "isCorrect": true, "rationale": "Field studies following the 2004 Indian Ocean tsunami documented 4–10 times lower fatality rates in communities behind intact mangroves compared to exposed shorelines. A 100-meter mangrove belt can reduce wave height by 50–70%. Clearing for shrimp ponds delivers short-term economic benefit but eliminates the storm-surge protection that the community depended on — the cumulative-stress consequence is felt decades later."}, {"text": "The cleared coastline experiences identical storm-surge impact as protected coastlines because mangroves provide no measurable wave attenuation.", "isCorrect": false, "rationale": "This contradicts decades of field research. The 2004 tsunami showed 4–10x fatality differences and a 100-meter mangrove belt can reduce wave height by 50–70%."}, {"text": "The shrimp ponds themselves provide better storm-surge protection than mangroves because their pond walls block waves.", "isCorrect": false, "rationale": "Aquaculture pond walls are typically low earthen berms that provide negligible wave attenuation; they cannot replicate the dense, rooted, multi-layer wave dissipation of mangrove forests."}, {"text": "Mangrove clearance has no relationship to storm-surge vulnerability because surge is driven entirely by ocean depth.", "isCorrect": false, "rationale": "Coastal vegetation dissipates surge energy through friction and structural drag. Ocean depth contributes, but coastal vegetation is independently a major determinant of inland surge propagation."}], "id": "q03"}, {"question": "Which of the following BEST describes the cellular-level mechanism of coral bleaching?", "options": [{"text": "Coral polyps consume their own zooxanthellae for energy during cold stress, leading to white coloration.", "isCorrect": false, "rationale": "Bleaching is triggered by heat stress, not cold; the polyps expel — not consume — the zooxanthellae as a stress response."}, {"text": "When sea surface temperature exceeds the long-term summer maximum by 1°C or more for four or more weeks, zooxanthellae produce reactive oxygen species (ROS) toxic to the host polyp; the polyp expels the zooxanthellae as a stress response.", "isCorrect": true, "rationale": "Thermal stress raises zooxanthellae metabolic rates beyond the polyp's tolerance, producing reactive oxygen species (ROS) that damage cell membranes. The polyp expels zooxanthellae — the algae that provide approximately 90% of the coral's energy via photosynthesis and contribute to reef coloration. If heat stress persists, the polyp starves; if temperatures drop within weeks, some polyps may recover and reacquire zooxanthellae."}, {"text": "Coral bleaching is the loss of calcium carbonate skeletons; the white color comes from exposed bone.", "isCorrect": false, "rationale": "Bleaching is the loss of color from the living tissue, not the loss of skeletal CaCO₃. The white coloration comes from the calcium carbonate visible through tissue that has lost its zooxanthellae pigmentation."}, {"text": "Bleaching is caused by overfishing of parrotfish; thermal stress plays no role.", "isCorrect": false, "rationale": "Overfishing of herbivorous fish like parrotfish does increase algal overgrowth on reefs, but bleaching itself is primarily driven by thermal stress. The overfishing/algal-overgrowth mechanism is a separate threat in the cumulative-stress framework."}], "id": "q04"}, {"question": "Why are mangrove ecosystems considered among the most carbon-dense ecosystems on Earth, and what happens to their carbon stocks when mangroves are cleared?", "options": [{"text": "Mangroves contain only above-ground biomass; their carbon storage is identical to grasslands.", "isCorrect": false, "rationale": "Mangrove soils accumulate organic carbon at rates 3–5 times higher per hectare than tropical rainforest soils. Their distinctive feature is carbon-rich, waterlogged sediment combined with above-ground biomass — far exceeding grassland or upland forest stocks."}, {"text": "Mangrove soils accumulate organic carbon at rates 3–5 times higher per hectare than tropical rainforest soils, due to waterlogged anaerobic conditions; clearing or degrading mangroves releases this stored \"blue carbon\" to the atmosphere as CO₂.", "isCorrect": true, "rationale": "Mangroves are one of the world's most carbon-dense ecosystems because their waterlogged, anaerobic sediment slows decomposition and accumulates organic matter over centuries. Combined with above-ground biomass, this makes them globally significant carbon stores (\"blue carbon\"). Clearing or degrading mangroves releases this carbon to the atmosphere, contributing to climate forcing — adding a climate cost on top of the immediate ecological loss."}, {"text": "Mangrove carbon storage is in the leaves only; clearing them releases carbon harmlessly into the soil.", "isCorrect": false, "rationale": "Most mangrove carbon is stored in the soil, not the leaves. Clearing exposes that carbon to oxidation and respiration, releasing it as CO₂ — not retaining it in soil."}, {"text": "Mangroves sequester nitrogen, not carbon, and their disturbance has no climate impact.", "isCorrect": false, "rationale": "Mangroves are carbon sinks per hectare among the world's largest. Their disturbance has measurable climate impact through CO₂ release."}], "id": "q05"}, {"question": "The Great Barrier Reef has experienced unprecedented bleaching since 2016, including events in 2017, 2020, 2022, and 2024. Which interpretation BEST captures the GBR case within the cumulative-stress framework?", "options": [{"text": "Local stressor management (water quality, crown-of-thorns starfish control, Marine Park zoning) alone can prevent bleaching by buffering corals from global warming.", "isCorrect": false, "rationale": "Researchers are explicit that local management cannot prevent bleaching caused by global warming. Local stressor management buys time but cannot substitute for climate mitigation when SST exceeds the bleaching threshold by 1°C+ for four or more weeks."}, {"text": "Local stressors (sediment runoff, nutrient pollution, crown-of-thorns starfish, overfishing) weaken corals and reduce recovery capacity, but the immediate driver of bleaching events is global warming-driven SST anomalies; meeting the GBR's future requires both local management and climate mitigation.", "isCorrect": true, "rationale": "The cumulative-stress framework holds that ecosystems are simultaneously affected by multiple, interacting stressors at different spatial and temporal scales. Corals weakened by local stressors (nutrient pollution, sedimentation, overfishing) are then killed by warming events that push them past thermal thresholds they might otherwise have survived. Australia has invested heavily in local stressor management, but the GBR's future depends primarily on global greenhouse gas reductions."}, {"text": "The GBR is unaffected by global warming and bleaching is caused entirely by Australian water-quality programs failing.", "isCorrect": false, "rationale": "GBR bleaching is unambiguously linked to marine heatwaves driven by anthropogenic climate change. Australia's water-quality programs are ongoing and have prevented some local stressors, but they cannot prevent thermal events from global warming."}, {"text": "The GBR has fully recovered since 2024 because corals adapt rapidly to warming.", "isCorrect": false, "rationale": "Approximately 50% loss of coral cover on the GBR has occurred since 2000, with recovery between successive events incomplete. The interval between events has compressed from 25–30 years to less than a decade, leaving corals insufficient time to rebuild structural complexity."}], "id": "q06"}, {"question": "Approximately what percentage of marine species depend on coral reefs, and what does this imply for the consequences of large-scale reef loss?", "options": [{"text": "Coral reefs support approximately 25% of all marine species despite occupying less than 1% of the ocean floor; large-scale reef loss would be a major biodiversity crisis with cascading effects on fisheries and coastal protection.", "isCorrect": true, "rationale": "Coral reefs occupy less than 1% of the ocean floor but support an estimated 25% of all marine species. This biodiversity concentration is the basis for the \"rainforests of the sea\" epithet. Reef loss would devastate marine biodiversity, eliminate critical fishery nursery habitat, remove coastal protection (wave-break services valued at over $9 billion year⁻¹ globally), and end tourism economies dependent on reef ecosystems."}, {"text": "Coral reefs support less than 1% of marine species and their loss is ecologically insignificant.", "isCorrect": false, "rationale": "This drastically understates reef biodiversity. The figure 25% is the most cited estimate, and reefs are recognized as one of the most biodiverse ecosystems on Earth."}, {"text": "Coral reefs support 90% of marine species and reef loss would extinguish nearly all marine life.", "isCorrect": false, "rationale": "While reefs are biodiversity hotspots, they support ~25% of marine species, not 90%. Open ocean and benthic ecosystems support the bulk of total marine biodiversity."}, {"text": "Marine species depend on reef-derived chemicals only; reef loss has no biodiversity implications.", "isCorrect": false, "rationale": "Reefs provide critical structural habitat — shelter, breeding sites, and nursery grounds — for the species that depend on them. Their loss is not merely chemical."}], "id": "q07"}, {"question": "Beyond thermal stress, coral reefs face four major additional stressors. Which combination BEST captures the additional stressor categories?", "options": [{"text": "Ocean acidification, nutrient pollution, sedimentation, and overfishing of herbivorous fish.", "isCorrect": true, "rationale": "(1) Ocean acidification: rising atmospheric CO₂ dissolves into seawater, reducing pH and lowering carbonate saturation, making it harder for corals to build skeletons. (2) Nutrient pollution: coastal runoff promotes algal overgrowth that smothers corals. (3) Sedimentation: eroded sediment from deforested hillsides and construction sites smothers polyps and reduces light. (4) Overfishing: removal of herbivorous fish (parrotfish, surgeonfish) allows algae to outcompete corals for substrate. All four are documented in the cumulative-stress framework."}, {"text": "Volcanic eruptions, asteroid impacts, ocean tides, and lunar gravity.", "isCorrect": false, "rationale": "These are not the documented additional stressors beyond thermal stress. The actual list is ocean acidification, nutrient pollution, sedimentation, and overfishing."}, {"text": "Ozone depletion, UV radiation, freshwater intrusion, and increased atmospheric CO₂ alone.", "isCorrect": false, "rationale": "While elevated CO₂ contributes to ocean acidification, the other elements (ozone depletion, UV, freshwater intrusion) are not the primary stressor categories on coral reefs identified in the cumulative-stress framework."}, {"text": "Plastic pollution, oil spills, ship groundings, and tourism impacts only.", "isCorrect": false, "rationale": "These are stressors, but not the four major categories beyond thermal stress identified in the cumulative-stress framework. The canonical list is ocean acidification, nutrient pollution, sedimentation, and overfishing."}], "id": "q08"}, {"question": "Under IPCC projections, what proportion of tropical coral reefs is projected to be lost at 1.5°C of global warming above pre-industrial levels, and what condition is projected at 2°C?", "options": [{"text": "5–10% loss at 1.5°C; 50% loss at 2°C, all reversible within years.", "isCorrect": false, "rationale": "These projections substantially understate the IPCC findings. The actual numbers are 70–90% loss at 1.5°C and more than 99% experiencing annual or biannual bleaching at 2°C — conditions incompatible with reef recovery."}, {"text": "70–90% loss of tropical coral reefs at 1.5°C; more than 99% projected to experience annual or biannual bleaching at 2°C, conditions incompatible with reef recovery.", "isCorrect": true, "rationale": "IPCC models project 70–90% loss of tropical coral reefs at 1.5°C of warming, and at 2°C more than 99% of reefs are projected to experience annual or biannual bleaching — conditions incompatible with the recovery cycles that historically allowed reefs to persist between events. The narrow window between 1.5°C and 2°C is therefore catastrophically consequential for reef survival."}, {"text": "0% loss at 1.5°C; corals are entirely temperature-tolerant.", "isCorrect": false, "rationale": "Corals operate near their thermal limits in tropical waters; even small SST anomalies (1°C above the long-term summer maximum for 4+ weeks) trigger bleaching. The IPCC projections reflect this narrow thermal tolerance."}, {"text": "100% loss at 1.5°C; reefs cannot survive any warming above pre-industrial levels.", "isCorrect": false, "rationale": "While loss is projected to be severe (70–90% at 1.5°C), it is not 100%. Some reefs may persist depending on local cooling, deeper-water refugia, and assisted-recovery efforts."}], "id": "q09"}, {"question": "Which CWA provision historically protected most jurisdictional wetlands, and which agency administers it?", "options": [{"text": "Section 101, administered by the National Park Service.", "isCorrect": false, "rationale": "Section 101 sets the CWA's aspirational goals; it is not the wetland-protection mechanism. Wetland protection is under Section 404, administered by the Army Corps of Engineers."}, {"text": "Section 404, administered by the Army Corps of Engineers, which prohibits the discharge of dredged or fill material into \"waters of the United States\" without a permit.", "isCorrect": true, "rationale": "Section 404 of the Clean Water Act prohibits the discharge of dredged or fill material into waters of the US without a permit from the Army Corps of Engineers. For decades this provision protected most jurisdictional wetlands; Sackett v. EPA (2023) narrowed its reach. EPA shares some authority but the Corps has primary responsibility for issuing 404 permits."}, {"text": "Section 319, administered by NOAA.", "isCorrect": false, "rationale": "Section 319 is the CWA's nonpoint-source program, administered by EPA, and uses voluntary best management practices, not permit-based wetland protection."}, {"text": "NPDES, administered by the Department of the Interior.", "isCorrect": false, "rationale": "NPDES (administered by EPA, not Interior) covers point-source discharges, not wetland fill."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
