    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Earth&#x27;s Atmosphere: Composition, Structure, and Function</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Although N₂ and O₂ together make up more than 99% of the atmosphere by volume, neither is a significant greenhouse gas. CO₂, at only about 0.042% (420 ppm), plays a major role in Earth's energy budget. Which mechanism best explains this disproportionate influence?", "options": [{"text": "CO₂ molecules absorb and re-emit outgoing infrared (longwave) radiation from Earth's surface, slowing the escape of thermal energy to space; N₂ and O₂ are largely transparent at infrared wavelengths.", "isCorrect": true, "rationale": "Greenhouse gases like CO₂, water vapor, and methane have molecular vibrational modes that absorb infrared radiation. N₂ and O₂ are diatomic homonuclear molecules with no infrared-active modes — they are transparent to outgoing thermal radiation."}, {"text": "CO₂ scatters incoming visible solar radiation, blocking it from reaching Earth's surface.", "isCorrect": false, "rationale": "CO₂ is essentially transparent to incoming visible solar radiation. The greenhouse effect operates on outgoing infrared, not on incoming visible light."}, {"text": "N₂ and O₂ are dense and settle to ground level, leaving CO₂ free to dominate the upper atmosphere.", "isCorrect": false, "rationale": "Atmospheric gases are well-mixed by molecular diffusion and turbulence; gravity-driven settling does not produce the layered structure described."}, {"text": "CO₂ is a chemically active gas that participates in photosynthesis and dominates atmospheric chemistry.", "isCorrect": false, "rationale": "While CO₂ is involved in photosynthesis, that is not the mechanism that makes it a greenhouse gas. Its energy-budget role comes from infrared absorption."}]}, {"question": "Pre-industrial CO₂ was approximately 280 ppm. The current concentration is approximately 420 ppm. What is the percentage increase from pre-industrial levels, and what does this represent in absolute terms?", "options": [{"text": "About 50% increase; 140 ppm added to the atmosphere from human activities since the Industrial Revolution.", "isCorrect": true, "rationale": "(420-280)/280 = 0.50 = 50%, representing 140 ppm added. This rapid rise — and the current level being the highest in 800,000 years of ice-core record — drives anthropogenic warming."}, {"text": "About 20% increase; 70 ppm added.", "isCorrect": false, "rationale": "The arithmetic is wrong: (420-280)/280 = 0.50 = 50%, not 20%. Absolute increase is 140 ppm."}, {"text": "About 100% increase; CO₂ has doubled since pre-industrial times.", "isCorrect": false, "rationale": "CO₂ has not yet doubled. Doubling pre-industrial 280 ppm would require ~560 ppm; current value is 420 ppm."}, {"text": "About 33% increase; 93 ppm added.", "isCorrect": false, "rationale": "33% increase from 280 ppm would yield about 372 ppm; the actual current value is approximately 420 ppm, a 50% rise."}]}, {"question": "An atmospheric scientist measures temperature versus altitude and finds that temperature decreases from the surface to about 12 km, then INCREASES from 12 km to roughly 50 km. What explains this temperature inversion in the second layer?", "options": [{"text": "The ozone layer absorbs ultraviolet radiation and converts it to heat, warming the upper stratosphere relative to its base.", "isCorrect": true, "rationale": "Stratospheric ozone (O₃, peak between 15-35 km) absorbs UV-B and UV-C radiation, converting solar energy to heat. This produces the observed temperature inversion (warm above cold) and stabilizes the stratosphere against vertical mixing."}, {"text": "Heat from Earth's surface rises by convection, warming the upper layer first.", "isCorrect": false, "rationale": "Convection is suppressed in the stratosphere precisely because of the inversion. The warming source is solar UV absorption by ozone, not surface heat rising."}, {"text": "The descending branch of the Hadley cell warms adiabatically as it sinks into the stratosphere.", "isCorrect": false, "rationale": "Hadley cell descent occurs in the troposphere (around 30° latitude), not in the stratosphere. The stratospheric inversion is driven by ozone-UV absorption."}, {"text": "Mesospheric meteor ablation releases heat that warms the layers below.", "isCorrect": false, "rationale": "Meteors burn up in the mesosphere (50-80 km), well above the stratospheric inversion. Their energy contribution to stratospheric warming is negligible."}]}, {"question": "Stratospheric ozone shields Earth from UV-B radiation. Which of the following correctly distinguishes stratospheric from tropospheric (ground-level) ozone?", "options": [{"text": "Stratospheric ozone forms naturally between 15-35 km altitude and absorbs UV-B, protecting life; tropospheric ozone forms at ground level via photochemical reactions involving NOₓ and VOCs and is a respiratory irritant — they have opposite effects on human welfare.", "isCorrect": true, "rationale": "The two ozone phenomena are spatially and chemically distinct: stratospheric ozone is naturally produced from O₂ photodissociation and is a UV shield; tropospheric ozone is a pollutant generated from sunlight acting on automotive and industrial emissions."}, {"text": "Stratospheric ozone is harmful pollution; tropospheric ozone is beneficial UV protection.", "isCorrect": false, "rationale": "This reverses the relationship. Stratospheric ozone is the protective shield; tropospheric ozone is the pollutant."}, {"text": "Both forms of ozone are equally beneficial to human health.", "isCorrect": false, "rationale": "Tropospheric ozone is a respiratory irritant linked to asthma and reduced lung function; it is not beneficial to human health."}, {"text": "Both forms are stratospheric and both protect against UV radiation.", "isCorrect": false, "rationale": "Tropospheric ozone is at ground level (not stratospheric) and does not function as a UV shield from that altitude."}]}, {"question": "Approximately what fraction of the atmosphere's total mass lies in the troposphere?", "options": [{"text": "About 80%, along with virtually all of the atmosphere's water vapor and the layer in which all weather occurs and life exists.", "isCorrect": true, "rationale": "The troposphere (surface to ~12 km, deeper at the equator and shallower at the poles) holds about 80% of total atmospheric mass and essentially all water vapor; this is the layer that hosts weather, clouds, and life."}, {"text": "About 50%, with the rest evenly distributed across the stratosphere, mesosphere, and thermosphere.", "isCorrect": false, "rationale": "Atmospheric mass is heavily concentrated in the lowest layer; about 80%, not 50%, lies in the troposphere because gas density drops rapidly with altitude."}, {"text": "About 20%, with the bulk of mass concentrated in the thermosphere.", "isCorrect": false, "rationale": "The thermosphere has very low gas density — its 'temperature' is high but its mass is negligible compared to the troposphere."}, {"text": "About 99%, leaving only trace mass in upper layers.", "isCorrect": false, "rationale": "Closer to 80% than 99% — the stratosphere alone holds a non-trivial fraction of the remaining mass."}]}, {"question": "Without any atmosphere, Earth's average surface temperature would be approximately -18°C. With the natural greenhouse effect intact, the average is approximately +15°C. What is the magnitude of the natural greenhouse warming, and which gases drive it?", "options": [{"text": "Approximately 33°C of warming, driven primarily by water vapor (the most abundant greenhouse gas), CO₂, and methane.", "isCorrect": true, "rationale": "The 33°C natural greenhouse effect makes Earth habitable. Water vapor is the dominant greenhouse gas by concentration; CO₂ and CH₄ are also key, especially as drivers of long-term, anthropogenic enhancement of the natural effect."}, {"text": "About 5°C, with most warming due to direct solar absorption by O₂.", "isCorrect": false, "rationale": "The greenhouse effect is much larger than 5°C, and O₂ is not a greenhouse gas — it does not absorb infrared radiation strongly."}, {"text": "About 100°C; the atmosphere prevents Earth from freezing solid.", "isCorrect": false, "rationale": "100°C exceeds the actual greenhouse warming. The natural greenhouse effect is approximately 33°C."}, {"text": "About 150°C, mostly from CFCs and ozone.", "isCorrect": false, "rationale": "150°C is not the magnitude, and CFCs/ozone are not the dominant natural greenhouse gases. Water vapor and CO₂ are the primary natural drivers."}]}, {"question": "Although water vapor is the most abundant greenhouse gas by concentration, scientists do not generally treat it as the primary driver of anthropogenic climate change. Why?", "options": [{"text": "Atmospheric water vapor concentration is governed by temperature (the atmosphere holds more vapor when warmer), so water vapor acts as an amplifying feedback to warming caused by other gases rather than as an independent driver.", "isCorrect": true, "rationale": "Water vapor's residence time is short and its concentration tracks temperature. Adding water vapor without warming the atmosphere is impossible — it rains out. Long-lived gases like CO₂, by contrast, can change atmospheric concentration independently and drive temperature, with water vapor amplifying the resulting change."}, {"text": "Water vapor is not actually a greenhouse gas; it absorbs only visible light.", "isCorrect": false, "rationale": "Water vapor is a powerful infrared absorber and the most abundant greenhouse gas by concentration. The reason it is not the primary driver of anthropogenic change is its feedback role, not its absence as a greenhouse gas."}, {"text": "Water vapor is uniformly distributed and constant across the atmosphere.", "isCorrect": false, "rationale": "Water vapor is highly variable — near zero in polar air, up to 4% in humid tropical air. Its variability is part of why it functions as a feedback rather than a primary driver."}, {"text": "Water vapor reacts chemically with CO₂ and removes it from the atmosphere.", "isCorrect": false, "rationale": "There is no significant chemical reaction between water vapor and CO₂ on relevant atmospheric timescales; CO₂ is removed by photosynthesis, ocean uptake, and weathering."}]}, {"question": "Methane (CH₄) is present in the atmosphere at concentrations roughly 200 times lower than CO₂, yet has a global warming potential approximately 80 times that of CO₂ over a 20-year time horizon. What does this comparison illustrate?", "options": [{"text": "Per molecule, methane absorbs infrared radiation more strongly and over a different wavelength band; even small absolute concentrations of certain trace gases can have substantial climate effects.", "isCorrect": true, "rationale": "Methane's molecular structure makes it a more efficient infrared absorber per molecule than CO₂, especially in atmospheric windows where CO₂ absorption is weak. Concentration alone doesn't determine climate impact — radiative efficiency matters."}, {"text": "Methane reacts with stratospheric ozone, causing the entire ozone layer to disappear.", "isCorrect": false, "rationale": "Methane does interact with stratospheric chemistry but it does not cause complete ozone-layer destruction. The relevant comparison here is radiative efficiency, not ozone chemistry."}, {"text": "Methane is denser than CO₂ and therefore traps more heat at the surface.", "isCorrect": false, "rationale": "Methane is actually less dense than CO₂ at standard conditions; density does not determine greenhouse warming potential."}, {"text": "Methane breaks down into CO₂ and water within hours and is therefore irrelevant to climate.", "isCorrect": false, "rationale": "Methane has a tropospheric lifetime of about 9-12 years, not hours. While shorter-lived than CO₂, it is highly relevant to short-to-medium term climate forcing."}]}, {"question": "Which atmospheric layer hosts the aurora borealis and the orbit of the International Space Station, and what causes its dramatically high temperatures despite negligible heat transfer to physical objects?", "options": [{"text": "The thermosphere; high-energy solar UV and X-ray photons are absorbed by individual oxygen and nitrogen molecules, raising their kinetic energy enormously, but gas density is so low that little heat is transferred.", "isCorrect": true, "rationale": "Above ~80 km, the thermosphere has extreme thermodynamic temperatures (hundreds to over 2,000°C) reflecting molecular kinetic energy. Yet because the gas is so sparse, an astronaut would not feel intense heat — there are too few molecules to transfer energy to objects."}, {"text": "The mesosphere; meteor friction generates auroras and orbital heating.", "isCorrect": false, "rationale": "Aurora occur in the thermosphere, not the mesosphere. Meteors burn up in the mesosphere but do not generate aurora."}, {"text": "The stratosphere; ozone absorption and the ISS's ~30 km orbit overlap.", "isCorrect": false, "rationale": "The ISS orbits at roughly 400 km, well within the thermosphere, not the stratosphere. Ozone-UV absorption warms the stratosphere but doesn't reach thermospheric temperatures."}, {"text": "The troposphere; weather systems and the ISS's low-altitude orbit explain aurora.", "isCorrect": false, "rationale": "The ISS orbits far above the troposphere (which extends only to ~12 km), and aurora are not tropospheric phenomena."}]}, {"question": "The Moon, which lacks a substantial atmosphere, swings between approximately +127°C at noon and -173°C at night. Earth's surface, by contrast, experiences much smaller daily and seasonal temperature swings. What atmospheric property is primarily responsible for this moderation?", "options": [{"text": "The atmosphere — particularly its water vapor content — has substantial heat capacity, buffering temperature changes by storing and gradually releasing thermal energy.", "isCorrect": true, "rationale": "Atmospheric heat capacity, dominated by water vapor's latent heat of condensation/evaporation and the bulk thermal mass of N₂ and O₂, smooths temperature swings. The Moon, with virtually no atmosphere, has nothing to buffer extreme heating and cooling."}, {"text": "The atmosphere reflects all incoming sunlight, preventing surface heating during the day.", "isCorrect": false, "rationale": "About 70% of incoming sunlight reaches and is absorbed by Earth's surface or atmosphere; only ~30% is reflected. The atmosphere is largely transparent to visible light."}, {"text": "The atmosphere generates heat through chemical reactions during the day and absorbs heat at night.", "isCorrect": false, "rationale": "Chemical generation of heat is not how the atmosphere moderates temperature. The mechanism is heat capacity and the greenhouse effect."}, {"text": "Earth's rotation is faster than the Moon's, so daily heating is naturally lower.", "isCorrect": false, "rationale": "Rotation rate affects how long any one location is illuminated, but it does not by itself moderate the absolute swing — atmospheric heat capacity does."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
