        <div class="subtitle">AP Environmental Science &mdash; The Green Revolution and Industrial Agriculture</div>
    </div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "In 1944, Mexican wheat yields averaged barely 750 kilograms per hectare. By the 1960s, Norman Borlaug's program had increased yields more than 600 percent. Which technological breakthrough was central to Borlaug's wheat program?", "options": [{"text": "Genetic modification using recombinant DNA techniques to insert disease-resistance genes from bacteria.", "isCorrect": false, "rationale": "Recombinant DNA technology was not developed until the 1970s, after Borlaug's main work. His semi-dwarf wheat varieties were developed through CONVENTIONAL selective breeding, not genetic engineering."}, {"text": "Development of semi-dwarf wheat varieties with short, stiff stems that could support heavy grain heads under high-nitrogen fertilization without lodging.", "isCorrect": true, "rationale": "Borlaug's central innovation was semi-dwarf wheat: shorter-stemmed plants with stiff stems that could bear the weight of large grain heads without falling over (lodging). They were also photoperiod-insensitive (could grow at any latitude) and resistant to stem rust. Bred conventionally."}, {"text": "Hybrid corn crossing two unrelated species to produce sterile but high-yielding offspring.", "isCorrect": false, "rationale": "Borlaug worked on wheat, not corn. The breakthrough was within-species selective breeding for short-stemmed varieties, not interspecies hybridization."}, {"text": "Tissue culture cloning that produced genetically identical disease-resistant plants.", "isCorrect": false, "rationale": "Tissue culture techniques were not central to Borlaug's wheat program. His tools were conventional breeding and selection in field trials."}], "id": "q01"}, {"question": "The Haber-Bosch process, developed in 1909 and commercialized in 1913, was a critical foundation of the Green Revolution. What does this process do, and why is it considered a fossil-fuel-dependent technology?", "options": [{"text": "It extracts pure nitrogen gas from the soil, requiring no energy input.", "isCorrect": false, "rationale": "Haber-Bosch starts with atmospheric N2 gas, not soil. And it is highly energy-intensive — the textbook notes it consumes 1-2% of global energy production."}, {"text": "It synthesizes ammonia (NH3) from atmospheric nitrogen and hydrogen at high temperature and pressure; it depends primarily on fossil-fuel-derived hydrogen and consumes 1-2% of global energy production.", "isCorrect": true, "rationale": "The Haber-Bosch process: N2 + 3 H2 → 2 NH3 at high T/P over an iron catalyst. The hydrogen is sourced primarily from natural gas (steam methane reforming), making the entire system fossil-fuel-dependent. The textbook emphasizes the 1-2% global energy share. Approximately half of nitrogen atoms in current human bodies passed through Haber-Bosch."}, {"text": "It captures nitrous oxide from cattle waste and recycles it into liquid fertilizer.", "isCorrect": false, "rationale": "Haber-Bosch starts with N2 gas, not N2O from waste. The process is industrial chemical synthesis, not biological recovery."}, {"text": "It uses photosynthesis to produce carbohydrates that bond with nitrogen in plant roots.", "isCorrect": false, "rationale": "This describes a biological process; Haber-Bosch is industrial chemistry, not photosynthesis."}], "id": "q02"}, {"question": "A farmer in central India plants 200 hectares of a single high-yield wheat variety identical to that used by neighbors across thousands of hectares. The textbook identifies this practice as creating a specific vulnerability. What is the canonical historical example of this vulnerability, and why?", "options": [{"text": "The Dust Bowl of the 1930s, because monoculture caused soil erosion.", "isCorrect": false, "rationale": "The Dust Bowl was primarily a drought-and-soil-erosion phenomenon driven by inappropriate plowing of grassland; while monoculture played a role, the textbook's specific example for monoculture VULNERABILITY is the Irish Potato Famine, where a single pathogen swept through a uniform population."}, {"text": "The Irish Potato Famine of 1845-52, because nearly all Irish potatoes belonged to a single clonal variety (Lumper); when a new strain of Phytophthora infestans arrived, it swept through the entire cultivated area with no genetic resistance to stop it.", "isCorrect": true, "rationale": "The Irish Potato Famine is the textbook's archetype of monoculture vulnerability: genetic uniformity (single clonal variety) means a single pathogen can cause catastrophic, widespread crop failure with nothing to slow it. Modern corn and wheat face analogous risks because their genetic base is similarly narrow."}, {"text": "The 2008 financial crisis, because monoculture creates economic concentration risk.", "isCorrect": false, "rationale": "While economic concentration is a real concern, the textbook's specific MONOCULTURE VULNERABILITY example is biological/genetic, not financial."}, {"text": "The collapse of the Aral Sea, because monoculture irrigation depleted the lake.", "isCorrect": false, "rationale": "The Aral Sea collapse is the textbook's example of irrigation/water diversion in Section 5.4, not the biological vulnerability of genetic monoculture."}], "id": "q03"}, {"question": "The Ogallala Aquifer is being mined at an approximate 60:1 ratio (annual withdrawals to natural recharge). What does this implication mean for the agriculture supported by this aquifer?", "options": [{"text": "The agriculture is sustainable as long as additional wells are drilled to access deeper water.", "isCorrect": false, "rationale": "Drilling deeper wells does not solve the imbalance — it accelerates depletion of the same finite resource. The 60:1 mining ratio means continuing draw is mathematically time-limited."}, {"text": "Crops dependent on this water — wheat, corn, sorghum, cotton — face the prospect of irrigated agriculture becoming impossible in those regions within decades.", "isCorrect": true, "rationale": "The textbook explicitly states: 'Mining fossil-water aquifers for irrigation is economically similar to burning through a savings account.' The 30% reduction in saturated thickness and 60% reduction in parts of Kansas/Texas means current cropping systems will become economically unusable within decades. Crops have no proven alternative water source at scale."}, {"text": "The aquifer will recharge naturally if pumping is reduced by 10 percent.", "isCorrect": false, "rationale": "Recharge is approximately 0.5 cm/yr while pumping in some areas exceeds 30 cm/yr. A 10% pumping reduction (to 27 cm/yr) is still 54x recharge — far from sustainable. Full sustainability would require approaching the 0.5 cm/yr recharge rate."}, {"text": "The 60:1 ratio means the aquifer will last at least 600 years.", "isCorrect": false, "rationale": "60:1 is the mining RATE ratio (withdrawals to recharge), not the time-to-depletion. Time depends on remaining stock, which is shrinking."}], "id": "q04"}, {"question": "In the developed-country food system, the typical caloric ratio of fossil-fuel energy input to food calorie delivered is approximately 7-10 to 1. What does this ratio imply about the sustainability of the modern food system?", "options": [{"text": "The food system is highly energy-efficient because it uses fossil fuels rather than human labor.", "isCorrect": false, "rationale": "The 7-10:1 ratio means 7-10 calories of fossil-fuel input per calorie of food delivered — the system is energy-INefficient by ecological accounting. The substitution of fossil-fuel energy for human labor enables high productivity but at high energy cost."}, {"text": "The food system is energetically and economically precarious because it depends on a finite, non-renewable input that supplies far more energy than is delivered as food.", "isCorrect": true, "rationale": "The textbook explicitly states this ratio is 'ecologically and economically precarious.' Fertilizer synthesis (Haber-Bosch is energetically expensive), mechanization, irrigation pumping, and transport all run on fossil fuels. The food system is structurally dependent on a finite input."}, {"text": "The 7-10:1 ratio applies only to vegetarian diets; meat-based diets are more energy-efficient.", "isCorrect": false, "rationale": "Meat production typically has a HIGHER energy cost per food calorie than plant production (additional trophic step). The ratio is an industrial-system characteristic across diet types."}, {"text": "The ratio is irrelevant because food calories are not measured in fossil-fuel units.", "isCorrect": false, "rationale": "The ratio is a meaningful comparison: it converts both inputs (fossil-fuel energy) and outputs (food energy) to a common unit (calories) and reveals systemic energy dependency."}], "id": "q05"}, {"question": "The textbook identifies five components of the 'Green Revolution package': high-yield variety crop breeding, synthetic nitrogen fertilizer, mechanization, expanded irrigation, and commercial pesticides. Which statement best captures why all five were necessary?", "options": [{"text": "High-yield varieties alone, planted in any conditions, would have produced the same yield gains.", "isCorrect": false, "rationale": "The textbook explicitly notes that none of the components was 'fully effective without the others.' Semi-dwarf wheats need high N to express their yield potential; high-N applications need stiff stems to avoid lodging; high yields per hectare require irrigation in semiarid zones; dense monocultures require pesticides; mechanization scales the system."}, {"text": "The components were mutually reinforcing: semi-dwarf varieties needed high N to express yield; high-N applications needed stiff stems to avoid lodging; high yields per hectare required irrigation; dense monocultures required pesticides.", "isCorrect": true, "rationale": "This captures the system architecture. Semi-dwarf wheats convert extra N into grain rather than vegetative biomass — but only because of their stiff short stems. Tall wheats given the same N would lodge. Yields rose because all five elements were deployed together."}, {"text": "Each component independently doubled yields; combining them produced linear additive gains.", "isCorrect": false, "rationale": "The components were SYNERGISTIC, not linearly additive. None could fully express its yield potential without the others — a multiplicative rather than additive interaction."}, {"text": "Pesticides alone would have produced the same gains; the other components were marketing additions.", "isCorrect": false, "rationale": "Pesticides without high-yield varieties or fertilizer would not have raised yields meaningfully. The genetic potential of the seed sets the ceiling; pesticides just protect it."}], "id": "q06"}, {"question": "The textbook describes a 'productivity-vs-resilience tradeoff' as a property of the Green Revolution that is also general to highly optimized systems. Which best captures the tradeoff?", "options": [{"text": "Highly optimized systems achieve maximum efficiency at the cost of adaptability; they are vulnerable to perturbations they were not designed for.", "isCorrect": true, "rationale": "The textbook frames this as a general property of low-redundancy, highly-optimized systems. Green Revolution agriculture maximizes calories per hectare but creates dependence on fossil fuels, depleting aquifers, salinizing soils, accelerating erosion, breeding pesticide resistance, and narrowing genetic diversity — all of which reduce adaptability to novel pathogens or resource constraints."}, {"text": "Highly optimized systems are equally robust to all perturbations because they use scientific management.", "isCorrect": false, "rationale": "The opposite: scientific optimization for known parameters reduces robustness to UNKNOWN ones. The Green Revolution traded long-run adaptability for short-run yield."}, {"text": "Only agriculture has a productivity-resilience tradeoff; other industries are exempt.", "isCorrect": false, "rationale": "The textbook explicitly notes the tradeoff is 'a general property of highly optimized, low-redundancy systems' — it applies broadly, including to electrical grids, supply chains, and ecosystems."}, {"text": "Productivity gains always increase resilience because they generate buffer reserves.", "isCorrect": false, "rationale": "Productivity gains in industrial agriculture have not generated buffer reserves; they have been absorbed by population growth and consumption increases. The tradeoff is real and inverse, not aligned."}], "id": "q07"}, {"question": "The textbook notes that approximately half the nitrogen atoms in human body proteins have passed through a Haber-Bosch plant. What does this fact illustrate about industrial agriculture?", "options": [{"text": "Modern human protein nutrition has become structurally dependent on industrial nitrogen synthesis.", "isCorrect": true, "rationale": "Before Haber-Bosch, available nitrogen was a hard ceiling on crop yields; farmers depended on legume rotations, manure, and mined guano. The fact that ~50% of body N now traces to industrial synthesis means the human population is fed largely by an industrial process — not by biological N fixation alone."}, {"text": "Half of all human protein is artificial and not from natural food sources.", "isCorrect": false, "rationale": "The protein is 'natural' — it comes from food crops and animals — but the NITROGEN ATOMS were sourced via industrial synthesis. The food itself is real food."}, {"text": "Haber-Bosch produces nitrogen that is biologically inert and cannot be absorbed by humans.", "isCorrect": false, "rationale": "Haber-Bosch ammonia is converted to soil nitrate, taken up by plants, and incorporated into amino acids that humans then eat — fully bioavailable."}, {"text": "Half of the global population would already have starved without industrial nitrogen synthesis.", "isCorrect": false, "rationale": "Estimating the counterfactual is debated; the 50% figure is about CURRENT nitrogen flow, not specifically about how many would have starved. Borlaug's work is credited with preventing approximately 1 billion deaths, but the Haber-Bosch share of that is not directly the 50% figure."}], "id": "q08"}, {"question": "A genetically modified Bt corn variety expresses Bacillus thuringiensis toxin to kill specific insect pests. According to the National Academies of Sciences (2016) assessment cited in the textbook, what does the scientific consensus conclude about Bt crops?", "options": [{"text": "Bt crops cause cancer in humans who consume them.", "isCorrect": false, "rationale": "The 2016 National Academies assessment found no evidence that approved GMO crops pose health risks greater than conventional counterparts. The cancer claim is not supported by the consensus review."}, {"text": "Approved GMO crops do not pose health risks greater than their conventional counterparts; ecological and socioeconomic debates remain more contested.", "isCorrect": true, "rationale": "The textbook states this is the scientific consensus reflected in the 2016 National Academies assessment. The HEALTH question is settled relatively firmly; ECOLOGICAL effects (gene flow to wild relatives, pest resistance evolution) and SOCIOECONOMIC questions (corporate seed control) are more contested."}, {"text": "Bt crops produce higher yields than non-Bt counterparts but cause widespread environmental harm.", "isCorrect": false, "rationale": "While Bt crops can reduce insecticide use under good resistance management, the textbook's overall position is that ecological effects are 'contested' rather than 'widespread harm.'"}, {"text": "All GMO crops are illegal in the United States until further safety testing is completed.", "isCorrect": false, "rationale": "GMO crops are widely planted in the US under regulatory approval — Bt corn, Roundup Ready soybeans, Bt cotton, etc. The textbook describes them as approved technologies."}], "id": "q09"}, {"question": "Norman Borlaug received the Nobel Peace Prize in 1970 — the only agricultural scientist ever to do so. He is credited with preventing approximately how many deaths by famine, and what was his late-career warning?", "options": [{"text": "Approximately 100,000 deaths; he warned that GMOs would replace traditional crops.", "isCorrect": false, "rationale": "The textbook estimates 1 billion deaths prevented, not 100,000 — and his warning was about population, not GMOs."}, {"text": "An estimated 1 billion deaths; he warned in his Nobel lecture that population growth would eventually overtake productivity gains.", "isCorrect": true, "rationale": "The textbook cites the 1 billion figure for deaths prevented. In his Nobel lecture Borlaug specifically warned that population growth would eventually overtake productivity gains — a Malthusian concern he spent the rest of his career addressing."}, {"text": "He prevented no deaths; his work was theoretical.", "isCorrect": false, "rationale": "Borlaug's work directly enabled wheat production tripling in Mexico, India, and Pakistan within years of adoption. The textbook attributes specific famines averted to the spread of his varieties."}, {"text": "Approximately 50 million deaths; he warned that fossil fuels would become too expensive for fertilizer production.", "isCorrect": false, "rationale": "The 50 million figure is too low; the textbook's number is 1 billion. While fossil-fuel dependence is a textbook theme, it was not Borlaug's specific Nobel lecture warning."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
