<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Toxicology, Dose-Response Curves, and the LD50</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "A pesticide has an LD50 of 50 mg/kg in rats. A regulatory toxicologist applies a 1,000x safety factor when deriving a reference dose for human exposure. What is the resulting reference dose, and why is the safety factor larger than the standard 100x used in some other contexts?", "options": [{"text": "50,000 mg/kg; safety factors are added when extrapolating from rats because rats are physiologically more sensitive than humans.", "isCorrect": false, "rationale": "Safety factors divide, not multiply, the LD50 to derive reference doses. Also, the assumption is that humans may be more sensitive than the test species, not the other way around."}, {"text": "0.05 mg/kg; the larger safety factor accounts for interspecies extrapolation (rat to human), intraspecies variability (sensitive subpopulations such as children, pregnant women, the elderly), and data uncertainty when human clinical data are not available.", "isCorrect": true, "rationale": "Safe dose = LD50 / safety factor = 50 mg/kg / 1000 = 0.05 mg/kg. The 1,000x factor is conventionally decomposed into 10x for interspecies extrapolation, 10x for intraspecies variability, and 10x for data uncertainty when extrapolating from rodent acute studies to chronic human exposure. When data come from human clinical studies the factor can be smaller (often 100x); when genotoxic effects are suspected it can be larger (10,000x)."}, {"text": "0.5 mg/kg; the 1,000x factor accounts only for interspecies extrapolation.", "isCorrect": false, "rationale": "The math is wrong (50 / 1000 = 0.05, not 0.5) and the conceptual claim is incomplete — interspecies extrapolation is only one of several reasons for the factor."}, {"text": "5,000 mg/kg; safety factors are applied to scale doses up for larger species.", "isCorrect": false, "rationale": "Safety factors are reductions, not multiplications. They reduce the reference dose to provide an adequate margin of safety for sensitive populations."}], "id": "q01"}, {"question": "The graph below (described) shows mortality (%) on the y-axis versus log dose (mg/kg) on the x-axis for a hypothetical pesticide. The curve has a sigmoidal (S-shape) form rising from 0% mortality at low doses to 100% at very high doses. Which dose is the LD50, and why is the curve sigmoidal rather than linear?", "options": [{"text": "The LD50 is the dose at which mortality first becomes nonzero; the sigmoidal shape reflects measurement noise.", "isCorrect": false, "rationale": "The LD50 is defined at exactly 50% mortality, not at first detection. The sigmoidal shape reflects underlying biology, not noise."}, {"text": "The LD50 is the dose at which mortality reaches 50% of the test population; the sigmoidal shape reflects biological variability — individuals differ in body mass, metabolic rate, genetic sensitivity, and prior exposures, so some succumb at low doses while the most resistant survive until dose is very high.", "isCorrect": true, "rationale": "The midpoint of the curve at 50% mortality is the LD50 by definition. Plotted on a log-dose scale, the relationship for a lethal substance is sigmoidal because populations are heterogeneous: the most sensitive individuals die first, the median individual dies near the middle of the dose range, and the most resistant individuals survive until very high doses. The flat upper plateau represents the dose range above which no organisms survive."}, {"text": "The LD50 is the highest dose at which any organism survives; the curve is sigmoidal because of memory effects in the individual organism.", "isCorrect": false, "rationale": "LD50 is the median lethal dose, not the highest survival threshold. The sigmoidal shape is from population-level biological variability, not within-organism memory."}, {"text": "The LD50 is the dose at which 100% of organisms die; the sigmoidal shape is an artifact of using a log scale on the x-axis.", "isCorrect": false, "rationale": "100% mortality is the LD100, not the LD50. The shape reflects biology — it would still appear sigmoidal even if not plotted on log axes, though the linearization on log-dose simplifies regression analysis."}], "id": "q02"}, {"question": "A laboratory study on a hypothetical industrial chemical finds a NOAEL of 10 mg/kg/day and a LOAEL of 25 mg/kg/day for liver toxicity. The chemical is not classified as a genotoxic carcinogen. Which dose-response model should regulators apply, and identify ONE substance class for which the alternative model would instead be appropriate.", "options": [{"text": "Apply the threshold model because a NOAEL exists and the chemical is non-genotoxic; the linear-no-threshold (LNT) model would instead apply to ionizing radiation or genotoxic carcinogens such as benzene or formaldehyde.", "isCorrect": true, "rationale": "The threshold model holds that no measurable adverse effect occurs below the threshold dose because the body can repair damage, metabolize the substance, or compensate physiologically. For non-genotoxic chemicals with measurable NOAELs, regulators derive a reference dose by dividing the NOAEL by safety factors. The LNT model — which assumes any dose carries proportional risk — is reserved for ionizing radiation and genotoxic carcinogens (benzene, formaldehyde) where no safe dose can be defended biologically."}, {"text": "Apply the LNT model because all chemicals have linear no-threshold risk; the threshold model is appropriate only for nutrients.", "isCorrect": false, "rationale": "LNT is the regulatory default only for ionizing radiation and genotoxic carcinogens; most industrial chemicals and pharmaceuticals are regulated under threshold-model assumptions."}, {"text": "Apply the hormesis model because the NOAEL exists; the threshold model would apply only to alcohol.", "isCorrect": false, "rationale": "Hormesis describes biphasic dose-response curves where very low doses produce a beneficial effect opposite to harm seen at high doses. It is a narrowly applicable phenomenon, not the default regulatory framework. Alcohol is the classic human hormesis example, but it is not the only case."}, {"text": "Apply the threshold model; LNT is appropriate only for nutrients such as iodine and vitamin D.", "isCorrect": false, "rationale": "LNT is the regulatory default for genotoxic carcinogens and ionizing radiation, not for nutrients. Nutrients have a different, U-shaped dose-response with deficiency at low doses, sufficiency at intermediate doses, and toxicity at very high doses."}], "id": "q03"}, {"question": "A municipal water utility tests its supply after a road-salt runoff event and finds 3 g/L NaCl. A laboratory study has determined the LD50 for radish seedlings exposed to NaCl in irrigation water is 6 g/L. Compute the hazard quotient (HQ) and recommend an action.", "options": [{"text": "HQ = 0.5 (3 / 6); the exposure is below the LD50 but well above the regulatory safe dose of 0.06 g/L (LD50 / 100). For drinking-water and irrigation use, the utility should investigate the road-salt runoff event, since the HQ is approaching 1.0 and the safety margin from the safe dose is small.", "isCorrect": true, "rationale": "HQ = exposure / reference dose = 3 / 6 = 0.5. The HQ < 1 finding alone says exposure is below the lethal endpoint, but a hazard quotient of 0.5 leaves only a 2x margin from the LD50, which is far below the 100x safety factor regulators normally apply. The exposure is well above the regulatory safe dose of 0.06 g/L. Sensible actions include investigating the runoff event, monitoring the supply, and considering temporary alternative sources for sensitive use cases."}, {"text": "HQ = 2 (6 / 3); the exposure exceeds the LD50 and the utility should issue an immediate boil-water advisory.", "isCorrect": false, "rationale": "HQ is exposure / reference dose, not reference dose / exposure. The correct ratio is 0.5, not 2.0. Boiling does not remove dissolved salt."}, {"text": "HQ = 18 (3 × 6); the exposure is acutely lethal.", "isCorrect": false, "rationale": "HQ is a ratio, not a product. The exposure of 3 g/L is below the LD50 of 6 g/L, so it is not acutely lethal at the LD50 endpoint."}, {"text": "HQ = 0.5; no action is needed because HQ < 1 means there is no risk under any circumstance.", "isCorrect": false, "rationale": "An HQ below 1 indicates exposure is below the level of concern for the specific endpoint (here, LD50 mortality), but it does not mean zero risk. Chronic low-level salt stress can impair root development even below the LD50, and the safety margin between exposure and LD50 is small. Regulators generally apply additional safety factors beyond the LD50."}], "id": "q04"}, {"question": "Which best explains the concept of hormesis and how its existence complicates the design of regulatory standards for environmental chemicals?", "options": [{"text": "Hormesis is the principle that all chemicals are toxic at any dose; it eliminates the need for regulatory safety factors.", "isCorrect": false, "rationale": "Hormesis is the opposite — it proposes that very low doses can be stimulatory or beneficial. It does not eliminate the need for safety factors and is narrowly applicable rather than universal."}, {"text": "Hormesis is a biphasic dose-response in which very low doses produce a beneficial or stimulatory effect opposite to harm at high doses; it complicates regulation because a strict precautionary threshold could overshoot the beneficial zone, but most regulators conclude that hormesis is too narrowly applicable and uncertain to justify weakening default protection.", "isCorrect": true, "rationale": "Classic examples are alcohol (small amounts may reduce cardiovascular risk, large amounts cause liver disease) and certain herbicides that stimulate plant growth at sub-herbicidal doses. The regulatory complication: if a substance has true hormesis, setting a very low threshold could push society below the beneficial zone. The mainstream consensus is that hormesis, where it exists, is so narrowly bounded and chemical-specific that it does not undermine the precautionary framework for industrial pollutants."}, {"text": "Hormesis means that the LNT model always applies; it complicates regulation because LNT is hard to enforce.", "isCorrect": false, "rationale": "Hormesis is in fact incompatible with strict LNT, since LNT assumes monotonic risk. Hormesis adds a beneficial low-dose region that LNT cannot capture."}, {"text": "Hormesis is the same as the threshold model; it complicates regulation only because the threshold is hard to identify experimentally.", "isCorrect": false, "rationale": "Hormesis differs from the threshold model. The threshold model has zero effect below the threshold and harm above it. Hormesis has beneficial effect below the threshold and harm above it — a biphasic, not zero-then-positive, response."}], "id": "q05"}, {"question": "Which scenario best illustrates the distinction between acute and chronic exposure in toxicology?", "options": [{"text": "An adult who consumes 30,000 mg of table sugar in a single dessert (acute) versus an adult who consumes 30 mg of sugar daily for thirty years (chronic).", "isCorrect": false, "rationale": "Sugar at these doses is far below any toxicological threshold. The example does not illustrate a meaningful acute versus chronic toxicology distinction."}, {"text": "A worker accidentally exposed to a high concentration of pesticide during a chemical spill (acute, hours-to-days endpoints, often quantified by LD50) versus a child exposed daily to low levels of lead from old paint dust over years (chronic, long-latency endpoints such as neurological damage that may take decades to manifest).", "isCorrect": true, "rationale": "Acute exposure is a single or short-term high-dose event whose effects manifest quickly (hours to days); the LD50 is an acute measure. Chronic exposure is repeated or continuous low-level exposure over months to years; effects may take decades to become clinically apparent. Childhood lead exposure causing later neurological deficits is a textbook chronic exposure case, while acute pesticide spills are the canonical acute scenario."}, {"text": "A subject who breathes oxygen in normal atmospheric air (chronic) and another who breathes pure oxygen for 5 minutes (acute).", "isCorrect": false, "rationale": "While technically distinguishing exposure durations, this example does not illustrate the regulatory tension between acute (LD50, spills, accidents) and chronic (low-level lifetime, cancer, neurodevelopment) toxicology that the AP framework emphasizes."}, {"text": "An adult who drinks one glass of saltwater (acute) and an adult who drinks one glass of distilled water daily (chronic).", "isCorrect": false, "rationale": "Acute water and sodium toxicity require quantities far above one glass, and distilled water is not a toxicological exposure of regulatory concern at this dose."}], "id": "q06"}, {"question": "A lab routinely reports an ED50 (effective dose, 50%) for a pesticide rather than an LD50. Which statement BEST explains why ED50 may be more relevant for regulatory decisions about chronic environmental exposure?", "options": [{"text": "ED50 measures lethal effects more precisely than LD50 because it averages multiple lethal endpoints.", "isCorrect": false, "rationale": "ED50 is a sub-lethal, not lethal, measure. LD50 specifically measures mortality."}, {"text": "ED50 measures the dose at which 50% of the test population exhibits a defined sub-lethal biological effect — for example, half the animals show a measurable spike in liver enzymes or experience induced seizures — which is more relevant when the regulatory question concerns effects below mortality thresholds, as is typical for chronic environmental exposure.", "isCorrect": true, "rationale": "Most environmental and chronic-exposure regulation cares about effects long before mortality — reproductive impairment, developmental delays, enzyme inhibition, organ-system stress. ED50 quantifies these sub-lethal endpoints. The LD50 is a starting point and a comparative scale, but it does not capture the effects that drive most modern environmental regulation, such as endocrine disruption or chronic neurotoxicity."}, {"text": "ED50 is identical to LD50 but measured in different units.", "isCorrect": false, "rationale": "ED50 is conceptually distinct from LD50: ED is for sub-lethal effects, LD is for lethal effects. Both are reported in mg/kg."}, {"text": "ED50 is used only for pharmaceuticals, never for environmental chemicals.", "isCorrect": false, "rationale": "ED50 is widely used in both pharmacology and environmental toxicology for sub-lethal endpoints, including endocrine, immune, and reproductive effects."}], "id": "q07"}, {"question": "A chemical company argues a new compound should be approved because it is not acutely toxic to mammals (LD50 > 5,000 mg/kg). Which BEST explains why acute mammalian toxicity is an insufficient safety criterion under modern toxicology?", "options": [{"text": "Compounds with high LD50 cannot bioaccumulate or biomagnify, so they are inherently safe.", "isCorrect": false, "rationale": "LD50 says nothing about bioaccumulation. Many POPs (DDT, PCBs) have moderate-to-high LD50 values yet biomagnify catastrophically through food chains, exactly the lesson Carson's Silent Spring drew."}, {"text": "Many compounds with high acute LD50 nonetheless bioaccumulate, biomagnify, disrupt endocrine signaling at parts-per-trillion concentrations, or produce chronic effects (cancer, developmental delay) over decades — none of which are detected by acute mammalian LD50 tests.", "isCorrect": true, "rationale": "DDT had relatively high acute mammalian LD50 yet collapsed bird populations through eggshell thinning. Endocrine disruptors like atrazine cause effects at concentrations 10⁵-10⁷ below the acute LD50. PFAS show carcinogenic and immune effects at parts-per-trillion exposure, far below acute toxicity thresholds. Acute mammalian LD50 misses bioaccumulation, biomagnification, endocrine disruption, chronic carcinogenicity, and developmental endpoints. This is the conceptual basis for the precautionary principle and for the 2016 TSCA reforms requiring pre-market evaluation."}, {"text": "Acute mammalian LD50 tests are illegal under federal law and cannot be used in regulatory decisions.", "isCorrect": false, "rationale": "Acute LD50 testing remains a legitimate component of toxicology; it is the sufficiency of acute LD50 alone that is criticized, not its legitimacy."}, {"text": "Acute LD50 tests use only male rats, so the data cannot be applied to human populations of either sex.", "isCorrect": false, "rationale": "Modern toxicological testing addresses sex-based variation; this is a refinement issue, not the central reason acute LD50 is insufficient."}], "id": "q08"}, {"question": "An environmental risk assessor measures benzene at 0.05 mg/L in a community drinking-water supply. Benzene is a genotoxic carcinogen regulated under the linear-no-threshold (LNT) model. Why does the LNT framework imply that no exposure level can be deemed completely safe, and how does this differ from threshold-model regulation?", "options": [{"text": "LNT assumes any dose above zero carries a proportional cancer risk; halving the dose halves the risk but never reduces it to zero. Threshold-model regulation assumes no measurable adverse effect below a threshold dose, so the regulatory safe dose can in principle be set with zero predicted risk for non-genotoxic substances.", "isCorrect": true, "rationale": "LNT proposes that genotoxic carcinogens — substances that damage DNA — produce risk through a single damaging event whose probability scales linearly with dose. Under LNT, the dose-response line passes through the origin: zero risk requires zero dose. Regulators set 'acceptable' exposure levels (typically 1 cancer per 100,000 to 1 per 1,000,000 lifetime) but cannot claim true safety. Threshold-model substances, by contrast, allow for a true safe dose where biological repair, metabolism, and compensation make harm unmeasurable."}, {"text": "LNT applies only to nutrients; benzene should be regulated under the threshold model.", "isCorrect": false, "rationale": "LNT is the regulatory default for ionizing radiation and genotoxic carcinogens including benzene and formaldehyde; nutrients have their own U-shaped dose-response framework."}, {"text": "LNT is identical to the threshold model in regulatory implementation.", "isCorrect": false, "rationale": "LNT and the threshold model differ fundamentally: LNT denies a safe-dose threshold; the threshold model affirms one."}, {"text": "LNT requires zero exposure to all chemicals; threshold-model substances require zero exposure as well.", "isCorrect": false, "rationale": "LNT does not require zero exposure; it requires acknowledgment that any exposure carries proportional risk and that regulators set socially-acceptable risk thresholds rather than true 'safe' doses."}], "id": "q09"}, {"question": "A reference dose (RfD) for a non-genotoxic chemical is derived by dividing the NOAEL by the product of multiple safety factors. Why are these factors typically composed of multiple 10x components rather than a single large factor, and what does each component represent?", "options": [{"text": "A 10x for interspecies extrapolation (animal-to-human), 10x for intraspecies variability (sensitive subpopulations), and additional 10x components for data uncertainty (use of LOAEL instead of NOAEL, sub-chronic instead of chronic data) — together they explicitly account for the major sources of uncertainty in extrapolating animal acute studies to human chronic exposure.", "isCorrect": true, "rationale": "The composite safety factor decomposes into transparent components: 10x interspecies (humans may be more sensitive than rats), 10x intraspecies (sensitive subpopulations like infants and pregnant women within humans), and additional 10x factors as needed for uncertainty (using LOAEL instead of NOAEL, sub-chronic instead of chronic data, route extrapolation). This decomposition makes the regulatory judgment about uncertainty explicit and reviewable, rather than hiding it in a single large multiplier."}, {"text": "A single 1,000x factor would be too conservative; multiplying separate 10x factors produces a smaller adjustment.", "isCorrect": false, "rationale": "Multiplying 10 × 10 × 10 yields 1,000 — the same total reduction as a single 1,000x factor. Decomposition is about transparency, not about final magnitude."}, {"text": "Multiple 10x factors are used for accounting reasons because each is funded by a different agency.", "isCorrect": false, "rationale": "Safety factors are toxicological judgments, not accounting categories. They are not allocated by agency funding source."}, {"text": "Multiple 10x factors compensate for laboratory measurement error in the NOAEL determination.", "isCorrect": false, "rationale": "Safety factors are not designed to compensate for measurement error; they account for biological extrapolation uncertainty between test species and conditions and the actual exposed human population. Measurement error is handled separately through study design and statistical analysis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
