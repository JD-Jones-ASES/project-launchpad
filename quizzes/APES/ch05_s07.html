    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Mining, Urban Sprawl, and Ecological Footprints</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Acid mine drainage (AMD) is one of the most widespread water-quality problems associated with coal and metal mining. What is the chemical mechanism that produces it, and approximately what stream length in the United States is affected?", "options": [{"text": "Calcium carbonate in soil reacts with rainwater to produce acidic runoff. About 100 km of streams in the US are affected.", "isCorrect": false, "rationale": "Calcium carbonate produces ALKALINE water (it neutralizes acid), not acidic. AMD chemistry is sulfide-based, not carbonate-based. The textbook estimates >23,000 km of streams affected, not 100 km."}, {"text": "Pyrite (FeS2) in exposed rock and waste piles oxidizes by contact with oxygen and water, producing sulfuric acid (and ferric hydroxide); the acid then dissolves metals (iron, aluminum, manganese, arsenic, lead, cadmium). EPA estimates >23,000 km of US streams affected.", "isCorrect": true, "rationale": "The textbook gives the chemistry: FeS2 + oxygen + water → ferric hydroxide + sulfuric acid (the textbook shows the simplified equation). The sulfuric acid (pH 2-3, comparable to lemon juice) dissolves additional metals from surrounding rock. EPA estimates AMD affects more than 23,000 kilometers of US streams."}, {"text": "Coal dust dissolves directly into rivers, producing carbonic acid. About 5,000 km of US streams are affected.", "isCorrect": false, "rationale": "AMD chemistry is sulfide-pyrite oxidation, not coal-dust dissolution. The textbook explicitly identifies sulfuric acid (from sulfide oxidation) as the agent."}, {"text": "Mining gases (methane, hydrogen sulfide) dissolve in surface water. About 50 km of streams are affected.", "isCorrect": false, "rationale": "AMD is solid-water chemistry (pyrite oxidizing in contact with water), not gas dissolution. Stream lengths affected exceed 23,000 km."}]}, {"question": "Mountaintop removal (MTR) mining is practiced in Central Appalachia. What is the textbook's documented physical and ecological footprint of MTR operations?", "options": [{"text": "Removes up to 300 m of summit rock; valley fill has buried more than 3,200 km of headwater streams; affected more than 500 mountain summits; physical alteration is permanent because buried stream channels do not recover after mining ceases.", "isCorrect": true, "rationale": "The textbook gives precise figures. Heavy explosives blast up to 300 meters of summit; the spoil is dumped as 'valley fill' burying headwater streams. MTR has buried more than 3,200 km of Appalachian headwater streams and affected more than 500 summits. The alteration is permanent — buried stream channels do not recover after mining ceases."}, {"text": "Removes up to 30 m of summit rock; buries about 50 km of streams; recovery occurs within a decade.", "isCorrect": false, "rationale": "All numbers are far too low — the textbook gives 300 m of summit removal (not 30), 3,200 km of streams (not 50), and emphasizes that recovery does NOT occur within a decade — buried channels are permanent."}, {"text": "Removes only thin overburden; affects no streams; surface fully restored after mining.", "isCorrect": false, "rationale": "MTR removes up to 300 m of summit rock — far more than thin overburden — and the textbook documents permanent stream burial. Restoration to original contour is technically required by SMCRA but has been interpreted loosely."}, {"text": "Practiced only in Wyoming; no streams affected.", "isCorrect": false, "rationale": "MTR is practiced in CENTRAL APPALACHIA (West Virginia, Kentucky, Virginia, Tennessee), not Wyoming. And it has affected over 3,200 km of headwater streams."}]}, {"question": "The Surface Mining Control and Reclamation Act (SMCRA) of 1977 established federal regulation of surface coal mining. What does it require of operators, and what enforcement mechanism does it provide?", "options": [{"text": "It prohibits all surface mining; no operations are permitted.", "isCorrect": false, "rationale": "SMCRA REGULATES surface mining; it does not prohibit it. Surface mining accounts for ~60% of US mineral and coal production."}, {"text": "It requires operators to restore mined land to its approximate original contour and to a 'suitable' post-mining land use, with a performance bond held by regulators until reclamation is certified.", "isCorrect": true, "rationale": "The textbook describes SMCRA as requiring restoration to 'approximate original contour' and a 'suitable' post-mining land use, secured by a performance bond held by regulators until reclamation is certified. The 'approximate original contour' standard has been interpreted loosely for MTR, where summit removal makes literal restoration impossible."}, {"text": "It allows unlimited mining as long as operators pay royalties to the federal government.", "isCorrect": false, "rationale": "SMCRA imposes restoration and bond requirements, not just royalties. It is an environmental regulation, not just a fee structure."}, {"text": "It applies only to gold mining; coal mining is unregulated.", "isCorrect": false, "rationale": "SMCRA applies primarily to surface COAL mining (Surface Mining Control and Reclamation Act). It is the principal federal regulation of surface coal mining."}]}, {"question": "Urban sprawl refers to low-density, automobile-dependent expansion of urban land use outward from city centers. In the United States, the developed land area grew from about 25 million acres in 1945 to over 100 million acres by 2000. Which set of externalities does the textbook identify with sprawl?", "options": [{"text": "Loss of farmland and prime agricultural soils at the urban edge; increased vehicle miles traveled and GHG emissions; loss of forest and wetland ecosystem services; heat island intensification; spatial inequity.", "isCorrect": true, "rationale": "The textbook lists these externalities precisely: farmland loss at the urban edge (developed land doubled-plus while population merely doubled, indicating lower density); increased VMT and GHG emissions; ecosystem-service losses (carbon storage, flood control, water filtration); urban heat island intensification; spatial inequity (wealth concentrates in suburbs, central cities lose tax base)."}, {"text": "Improved air quality, lower transportation costs, and uniform wealth distribution.", "isCorrect": false, "rationale": "Sprawl produces the OPPOSITE: worse air quality (more VMT and emissions), higher transportation costs per household, and concentrated wealth in suburbs while leaving central cities with eroding tax bases."}, {"text": "No measurable externalities; sprawl reflects free consumer choice.", "isCorrect": false, "rationale": "Sprawl produces multiple measurable externalities. The textbook lists farmland loss, GHG emissions, ecosystem-service loss, heat islands, and inequity."}, {"text": "Only health benefits from rural living.", "isCorrect": false, "rationale": "Sprawl is associated with longer commutes, more sedentary patterns, and lower air quality near roads — health-mixed at best, not unambiguously beneficial."}]}, {"question": "Smart growth is a set of urban-planning principles designed to concentrate development. Which of the following is NOT one of the smart-growth tools listed in the textbook?", "options": [{"text": "Mixed-use zoning (combining residential, commercial, and employment uses in proximity)", "isCorrect": false, "rationale": "Mixed-use zoning IS a smart-growth tool listed in the textbook. The question asks which is NOT a smart-growth tool."}, {"text": "Transit-oriented development (concentrating density around light-rail and BRT stops)", "isCorrect": false, "rationale": "Transit-oriented development IS a smart-growth tool listed in the textbook. Not the answer to 'NOT' question."}, {"text": "Mandatory minimum lot sizes of 5+ acres in all new residential developments", "isCorrect": true, "rationale": "Large minimum lot sizes are the OPPOSITE of smart growth — they spread development thinly and intensify sprawl. Smart growth tools push toward higher density, not lower. The textbook lists mixed-use zoning, transit-oriented development, urban growth boundaries (Portland's 1979 UGB), and brownfield reclamation as smart-growth tools."}, {"text": "Urban growth boundaries (legal limits on outward expansion, e.g., Portland Oregon 1979)", "isCorrect": false, "rationale": "UGBs ARE a smart-growth tool listed in the textbook (Portland, Oregon's 1979 UGB is the studied US example). Not the answer to 'NOT' question."}]}, {"question": "The Easter Island case study is described in the textbook as a 'parable of overshoot.' What specific features of the situation made overshoot particularly irreversible once it began?", "options": [{"text": "The island's resource base was non-replaceable on human timescales once exhausted (no alternative timber for canoes, no replacement palm species), and the social institutions did not prevent depletion.", "isCorrect": true, "rationale": "The textbook explicitly identifies these features: 'the island's resource base was non-replaceable on human timescales once exhausted, and the social institutions that governed resource use did not prevent depletion.' With the forest gone, islanders could no longer build ocean-going canoes, eliminating deep-sea fishing as a protein source. Soil eroded; agricultural productivity declined; population fell from ~15,000 to ~2,000-3,000."}, {"text": "External climate cooling caused the forest collapse independent of human action.", "isCorrect": false, "rationale": "While debate exists about the relative contributions of rats vs. human clearing, the textbook attributes deforestation to islander activity (canoes, moai construction, agriculture, fuel) — not external climate cooling."}, {"text": "European disease and the slave trade caused all the population loss; no resource depletion occurred.", "isCorrect": false, "rationale": "The textbook does note revisionist scholarship suggesting European disease and slave-trade losses contributed, but ALSO emphasizes that the deforestation and erosion sequence is archaeologically well-documented. The case stands as a parable of overshoot."}, {"text": "Earthquake activity destroyed most of the trees in a single year.", "isCorrect": false, "rationale": "Easter Island deforestation occurred over centuries (~800-1500 CE), not in a single earthquake year. Pollen records document gradual transition over many generations."}]}, {"question": "The ecological footprint metric, developed by Wackernagel and Rees in the early 1990s, measures human demand on nature in global hectares. According to the textbook, which two values are critical to understanding 'ecological overshoot'?", "options": [{"text": "Global average footprint ~2.7 gha/person; Earth's biocapacity ~1.6 gha/person; the difference is overshoot — humanity consuming natural capital faster than regeneration. Current overshoot factor is ~1.7 (humanity consumes ~1.7 Earths per year).", "isCorrect": true, "rationale": "The textbook gives these precise values. Global average footprint ~2.7 gha; biocapacity ~1.6 gha; humanity has been in overshoot since the early 1970s; current overshoot factor ~1.7. The country variation is also stark: US ~8.1 gha, India ~1.2 gha. If everyone lived as the average American, ~5 Earths would be required."}, {"text": "Footprint ~10 gha; biocapacity ~10 gha; humanity is at exact equilibrium.", "isCorrect": false, "rationale": "The textbook documents OVERSHOOT (footprint > biocapacity), not equilibrium. The values are 2.7 and 1.6 gha respectively, with overshoot factor ~1.7."}, {"text": "Footprint ~1.0 gha; biocapacity ~5.0 gha; humanity is well within sustainable limits.", "isCorrect": false, "rationale": "The opposite: humanity exceeds biocapacity. Footprint ~2.7 gha exceeds biocapacity ~1.6 gha."}, {"text": "Footprint and biocapacity are not measurable; the metric is purely theoretical.", "isCorrect": false, "rationale": "The textbook treats the metric as quantifiable (despite methodological criticisms) — the 2.7/1.6 ratio is derived from agriculture, fisheries, forest products, and waste-absorption calculations."}]}, {"question": "An open-pit mine extracts copper at Bingham Canyon, Utah — described in the textbook as the largest man-made excavation on Earth. What environmental risks are associated with the waste-rock dumps adjacent to such operations?", "options": [{"text": "No environmental risks; waste rock is inert.", "isCorrect": false, "rationale": "Waste rock is NOT inert. The textbook identifies that waste dumps can be geologically unstable AND are sources of acid drainage if they contain sulfide minerals (which is common in copper mining)."}, {"text": "Waste dumps can be geologically unstable (slope failure risk) and are sources of acid drainage if they contain sulfide minerals (which is common in copper mining).", "isCorrect": true, "rationale": "The textbook explicitly states: 'Waste rock (overburden and non-ore material) is piled in adjacent waste dumps; waste dumps can be geologically unstable and are sources of acid drainage if they contain sulfide minerals.' Copper mining is particularly associated with sulfide-bearing rock and therefore high AMD risk."}, {"text": "Waste dumps generate revenue from rare-earth byproducts.", "isCorrect": false, "rationale": "Waste rock is by definition the non-ore fraction with little or no economic value. The risks are environmental (instability, AMD), not revenue opportunity."}, {"text": "Waste dumps absorb carbon dioxide, providing a climate benefit.", "isCorrect": false, "rationale": "Waste dumps do not significantly absorb CO2; the environmental concerns are slope stability and acid drainage."}]}, {"question": "Treatment of acid mine drainage (AMD) is technically possible but expensive. According to the textbook, what is the primary treatment approach, and why must treatment continue indefinitely at active and abandoned mines?", "options": [{"text": "Pumping water into deep wells; treatment ends when the pump is removed.", "isCorrect": false, "rationale": "Deep-well injection is not the textbook's treatment description. AMD treatment uses limestone or lime to neutralize pH and precipitate metals, NOT well injection."}, {"text": "Limestone or lime neutralization to raise pH and precipitate metals; treatment must continue indefinitely because the chemical reactions driving AMD continue as long as pyrite, oxygen, and water are in contact.", "isCorrect": true, "rationale": "The textbook describes the treatment as 'limestone or lime neutralization to raise pH and precipitate metals.' Treatment must continue indefinitely because the underlying chemical reaction (pyrite + oxygen + water → acid + iron) continues as long as the reactants are in contact. There is no way to stop the reaction at exposed pyrite surfaces; only the runoff can be neutralized."}, {"text": "Sealing mines with plastic membranes; treatment ends after one season.", "isCorrect": false, "rationale": "Plastic membrane sealing is not the textbook treatment. And AMD persists for centuries at abandoned sites — far longer than a season."}, {"text": "Allowing AMD to evaporate; no continuous treatment needed.", "isCorrect": false, "rationale": "AMD streams contain metals and sulfate that do not 'evaporate'; the metals persist in any concentrated solution. Treatment is required indefinitely."}]}, {"question": "A resident of the United States has an ecological footprint of approximately 8.1 gha; a resident of India approximately 1.2 gha. The textbook notes that 'if everyone on Earth lived as the average American, approximately five planet Earths would be required.' What conceptual point does this illustrate?", "options": [{"text": "Population growth is the only driver of overshoot.", "isCorrect": false, "rationale": "Both consumption per capita AND population matter. The 5-Earths-if-American-living illustrates that PER-CAPITA consumption levels are also a driver — not just total population. American footprint is ~7x Indian per-person."}, {"text": "Technology will resolve overshoot regardless of consumption levels.", "isCorrect": false, "rationale": "The textbook does not argue technology alone will resolve overshoot. The footprint comparison illustrates the structural gap between current consumption and planetary boundaries — the gap depends on both population and per-capita consumption."}, {"text": "Per-capita consumption levels — not just total population — drive ecological footprint; if global consumption converged on US patterns, planetary biocapacity would be exceeded by approximately 5x.", "isCorrect": true, "rationale": "The textbook precisely makes this point. The footprint metric provides a useful first-order illustration of the structural gap between current consumption patterns (highly unequal across countries) and planetary boundaries. The 5-Earths figure highlights that the developed-country lifestyle is mathematically incompatible with universalization at current population."}, {"text": "The footprint metric is meaningless because all countries should have equal footprints.", "isCorrect": false, "rationale": "The textbook does not advocate equal footprints; it uses the variation to highlight per-capita consumption differences and the implications of universalizing high-consumption lifestyles."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
