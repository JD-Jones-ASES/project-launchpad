<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Forestry, Clearcutting, and Public Land Management</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A forest manager argues that the most ethical use of a national forest is to harvest timber, graze livestock, allow recreation, and protect wildlife habitat simultaneously, with no single use dominating. Based on the textbook's framework, which philosophical tradition does this manager represent, and which federal agency embodies that mandate?", "options": [{"text": "Preservationism, embodied by the National Park Service.", "isCorrect": false, "rationale": "Preservationism in the Muir tradition seeks to protect nature from human alteration — it is incompatible with the multiple-use approach described. The NPS prohibits commercial extraction in parks."}, {"text": "Conservationism in the Pinchot tradition, embodied by the U.S. Forest Service under its multiple-use mandate.", "isCorrect": true, "rationale": "Pinchot's conservationism is utilitarian: nature has instrumental value, and the goal is the greatest good for the greatest number for the longest time. The U.S. Forest Service was established under this philosophy and operates under an explicit multiple-use mandate (timber, grazing, mining, recreation, wildlife)."}, {"text": "Pure ecocentrism, embodied by the Wilderness Preservation System.", "isCorrect": false, "rationale": "Ecocentrism (in Muir's tradition) rejects the use-balancing framework entirely; designated wilderness areas under the 1964 Wilderness Act are managed for non-alteration, not multi-use balancing."}, {"text": "Laissez-faire libertarianism, embodied by the Bureau of Land Management.", "isCorrect": false, "rationale": "Multiple-use management is decidedly NOT laissez-faire — it requires active scientific management to balance competing uses. The BLM does manage public lands but under various legal mandates, not libertarian non-intervention."}], "id": "q01"}, {"question": "John Muir led a national campaign in the early 20th century against the proposal to dam the Hetch Hetchy Valley inside Yosemite National Park to provide water to San Francisco. Despite his opposition, the Raker Act of 1913 authorized the dam. What broader precedent did this decision establish, and what congressional response did it eventually motivate?", "options": [{"text": "It established that all national parks are exempt from extractive use, and Congress took no further action because the issue was settled.", "isCorrect": false, "rationale": "The dam was authorized INSIDE a national park — the precedent was the opposite: parks could be vulnerable to development. The matter was not settled."}, {"text": "It established that even national park boundaries did not absolutely protect against development, motivating Congress to pass the Wilderness Act of 1964 to designate wilderness areas legally beyond development reach.", "isCorrect": true, "rationale": "The Hetch Hetchy decision showed that national park designation alone was not sufficient protection. The shock galvanized the preservation movement, eventually producing the 1964 Wilderness Act, which created a stronger legal status for areas to be left in their natural state, beyond development."}, {"text": "It established that conservation always wins over preservation, and Congress codified this in the Multiple-Use Sustained-Yield Act of 1960.", "isCorrect": false, "rationale": "The MUSY Act applied to national forests, not parks, and was a separate development. The Hetch Hetchy lesson was that preservation needed STRONGER protection than parks alone, leading to the Wilderness Act."}, {"text": "It established the principle of states' rights over federal land, motivating the Sagebrush Rebellion.", "isCorrect": false, "rationale": "Hetch Hetchy was a federal-vs-federal debate (San Francisco's water needs vs. national park preservation), not a states' rights issue. The Sagebrush Rebellion came decades later."}], "id": "q02"}, {"question": "A timber company proposes to clearcut 50 hectares of mature Douglas fir on a 25-degree mountainside drained by a salmon stream. Which environmental impact is most directly predicted by the textbook for this practice on this terrain?", "options": [{"text": "Improved salmon habitat because removed canopy will warm the stream, accelerating fish growth.", "isCorrect": false, "rationale": "Salmon are cold-water fish; warmer streams REDUCE their habitat quality and survival. Increased stream temperature is harmful, not beneficial."}, {"text": "Accelerated soil erosion on the steep slope, elevated stream temperatures harming cold-water salmon, and loss of multi-layer habitat structure that takes 50–100 years (or more) to recover.", "isCorrect": true, "rationale": "The textbook explicitly identifies these clearcutting impacts on steep slopes: accelerated erosion, complete canopy removal raising stream temperature (harming cold-water fish), and loss of structural complexity that may take centuries to fully recover for old-growth characteristics."}, {"text": "No measurable impact because Douglas fir is a shade-intolerant species that benefits from clearcutting.", "isCorrect": false, "rationale": "While Douglas fir IS shade-intolerant and regenerates well after clearcutting (one ecologically appropriate use), this does NOT eliminate the steep-slope erosion, stream-temperature, or biodiversity impacts the question asks about."}, {"text": "Increased biodiversity because the cleared area attracts new species of grasses and shrubs.", "isCorrect": false, "rationale": "While early-successional species do colonize clearcuts, the net effect on a forested ecosystem is reduced biodiversity due to loss of complex multi-layer habitat structure that supported species dependent on mature forest."}], "id": "q03"}, {"question": "The 1995 reintroduction of gray wolves to Yellowstone National Park triggered one of the most studied trophic cascades in ecological history. Which sequence of effects best describes the documented cascade?", "options": [{"text": "Wolves directly increased riparian willow biomass by fertilizing the soil, which then attracted elk back to the riparian zones.", "isCorrect": false, "rationale": "Wolves did not 'fertilize' the soil — the cascade was indirect: wolves reduced elk numbers and changed elk behavior (less time grazing in riparian zones), allowing willows to recover."}, {"text": "Wolves reduced elk overgrazing, allowing riparian willows and aspens to regenerate; this restored beaver populations, stabilized streambanks, and increased bird and fish diversity.", "isCorrect": true, "rationale": "This is the textbook's documented cascade: wolves' presence (and associated 'landscape of fear' shifting elk behavior) reduced grazing pressure on riparian vegetation, allowing willows and aspens to recover. Beaver populations rebounded to engineer wetlands; streambanks stabilized; fish and bird diversity increased."}, {"text": "Wolves caused elk extinction, eliminating all grazing pressure and producing a uniform riparian forest.", "isCorrect": false, "rationale": "Elk were not eliminated — their numbers were reduced and behavior altered. The cascade depended on the partial reduction, not extinction, of the elk population."}, {"text": "Wolves had no measurable effect on the riparian zone, and the willow recovery is attributable entirely to climate change.", "isCorrect": false, "rationale": "While climate factors complicate causal interpretation, the cascade has been well-documented in numerous peer-reviewed studies and is presented in the textbook as a touchstone case for ecosystem-service value generated by preservation management."}], "id": "q04"}, {"question": "Which of the four harvesting methods described in the textbook is generally most ecologically disruptive in the short term but cheapest per unit of timber produced?", "options": [{"text": "Selective cutting", "isCorrect": false, "rationale": "Selective cutting maintains continuous canopy cover and is LESS disruptive than alternatives but typically MORE expensive per unit timber due to the need for careful tree-by-tree harvest."}, {"text": "Strip cutting", "isCorrect": false, "rationale": "Strip cutting reduces edge effects and maintains forest connectivity; it is intermediate in cost and disruption."}, {"text": "Clearcutting", "isCorrect": true, "rationale": "Clearcutting removes ALL trees in a single operation regardless of species, age, or size. The textbook identifies it as both the cheapest and most efficient method AND the one with the most severe short-term ecological disruption (complete canopy removal, soil exposure, elevated erosion, stream warming)."}, {"text": "Shelterwood cutting", "isCorrect": false, "rationale": "Shelterwood is intermediate: trees are removed in 2-3 operations, leaving mature trees as a 'shelter' for regeneration. Lower disruption and higher cost than clearcutting."}], "id": "q05"}, {"question": "What is the operational definition of 'sustainable yield' in forestry, and what happens when this principle is violated?", "options": [{"text": "Annual harvest must exceed annual regrowth so the forest matures faster; violation leads to senescence and decreased productivity.", "isCorrect": false, "rationale": "The opposite: harvest exceeding regrowth leads to LIQUIDATION of the forest, not faster maturation. Forests do not require 'maturation through harvest.'"}, {"text": "Annual harvest must equal or fall below the annual rate of regrowth; when harvest exceeds regrowth, the forest is being liquidated rather than managed.", "isCorrect": true, "rationale": "Sustainable yield is the principle that annual harvest should not exceed annual regrowth (mean annual increment). When harvest exceeds regrowth, the forest stand is shrinking — natural capital is being liquidated rather than maintained at productive capacity."}, {"text": "Sustainable yield refers only to the financial return from harvest; ecological consequences are secondary.", "isCorrect": false, "rationale": "Sustainable yield in the textbook is fundamentally an ecological/biological concept — the productive capacity of the forest — not merely a financial return measure."}, {"text": "Sustainable yield is achieved when 100 percent of trees over a certain age are harvested each year; younger trees fill in naturally.", "isCorrect": false, "rationale": "This describes a particular management practice, not the definition of sustainable yield. Sustainable yield is the rate-balance principle (harvest ≤ regrowth), not a specific harvest rule."}], "id": "q06"}, {"question": "Theodore Roosevelt occupied a 'complex middle position' between Pinchot and Muir according to the textbook. Which of the following best characterizes that position?", "options": [{"text": "He fully embraced Muir's preservationism and opposed all extractive use of public lands.", "isCorrect": false, "rationale": "Roosevelt established the Forest Service under Pinchot for multiple-use management — he supported extractive use under scientific management, not its prohibition."}, {"text": "He was Pinchot's closest ally and most powerful patron, yet shared Muir's reverence for wild places; when forced to choose (as at Hetch Hetchy), he sided with Pinchot but never fully abandoned the preservationist impulse.", "isCorrect": true, "rationale": "The textbook describes Roosevelt as occupying 'a complex middle position between Pinchot and Muir' — Pinchot's closest ally institutionally, yet sharing Muir's visceral reverence. Hetch Hetchy forced his hand toward Pinchot's utilitarian position. He withdrew 230 million acres from sale and used the Antiquities Act 18 times."}, {"text": "He supported only state-level conservation and refused to use federal authority to protect public lands.", "isCorrect": false, "rationale": "Roosevelt was the most consequential federal land conservationist in U.S. history — he established the Forest Service, used the Antiquities Act, and convened the 1908 Governors' Conference on Conservation."}, {"text": "He aligned exclusively with industrial interests and worked to privatize federal lands.", "isCorrect": false, "rationale": "The opposite: Roosevelt withdrew approximately 230 million acres from private sale — an area larger than Texas and California combined."}], "id": "q07"}, {"question": "Which 1960 federal law codified the U.S. Forest Service's mandate to balance timber harvest, livestock grazing, mineral extraction, recreation, and wildlife habitat — with no single use allowed to dominate to the exclusion of others?", "options": [{"text": "The Wilderness Act", "isCorrect": false, "rationale": "The Wilderness Act was passed in 1964 (not 1960) and creates designated wilderness areas BEYOND multiple use — explicitly preservationist."}, {"text": "The Multiple-Use Sustained-Yield Act of 1960 (MUSY Act)", "isCorrect": true, "rationale": "The MUSY Act is the textbook's named law: it codified the multiple-use mandate (timber, grazing, mining, recreation, wildlife) and the sustained-yield principle (aggregate use must not exceed long-run productive capacity). It explicitly contrasts with the NPS preservation mandate."}, {"text": "The National Environmental Policy Act of 1969", "isCorrect": false, "rationale": "NEPA established environmental impact assessment requirements but did not codify the multiple-use mandate; that mandate predated NEPA by nearly a decade."}, {"text": "The Antiquities Act of 1906", "isCorrect": false, "rationale": "The Antiquities Act allows the President to designate national monuments — preservationist tool, not a multiple-use mandate."}], "id": "q08"}, {"question": "A logging company proposes to clearcut 1,000 hectares of forest where the average annual increment of growth is 5 cubic meters per hectare per year. The company plans to harvest 8,000 cubic meters per year. Is this harvest level sustainable under the textbook's definition?", "options": [{"text": "Yes, because the harvest is below the total volume of standing timber.", "isCorrect": false, "rationale": "Sustainability is defined by the rate of harvest vs. regrowth, NOT vs. standing volume. Standing volume can be very large but still drawn down if harvest exceeds regrowth."}, {"text": "No, because the annual harvest (8,000 m³) exceeds the annual regrowth (1,000 ha × 5 m³/ha/yr = 5,000 m³); the forest is being liquidated.", "isCorrect": true, "rationale": "Sustainable yield = harvest ≤ regrowth. Annual regrowth is 1,000 ha × 5 m³/ha/yr = 5,000 m³, while planned harvest is 8,000 m³. The 3,000 m³/yr deficit means the forest is being liquidated rather than managed sustainably."}, {"text": "Yes, because clearcutting allows fast regrowth that will compensate within five years.", "isCorrect": false, "rationale": "Forests do not regrow at a faster rate after clearcutting — to the contrary, regrowth times are typically decades. The harvest is unsustainable regardless of harvest method."}, {"text": "Insufficient information; sustainable yield requires knowing the species composition.", "isCorrect": false, "rationale": "While species composition affects management decisions, the basic sustainability check is just rate balance: 8,000 > 5,000, so unsustainable."}], "id": "q09"}, {"question": "Why is the 1908 Governors' Conference on Conservation considered a landmark in US environmental policy history?", "options": [{"text": "It was the first systematic national dialogue on natural-resource policy, convened at the White House by Theodore Roosevelt.", "isCorrect": true, "rationale": "The textbook describes the conference as 'the first systematic national dialogue on natural-resource policy.' Roosevelt convened it at the White House on May 13, 1908. It established a national policy framework for conservation that shaped 20th-century federal land management."}, {"text": "It established the National Park Service and signed the Wilderness Act into law.", "isCorrect": false, "rationale": "The NPS was created in 1916 (Organic Act) and the Wilderness Act in 1964 — neither at the 1908 conference. The 1908 conference itself produced no immediate legislation but set the policy agenda."}, {"text": "It transferred all federal lands to state control to reduce federal overreach.", "isCorrect": false, "rationale": "The opposite: the conference ESTABLISHED the federal role in resource conservation. State land transfers were not part of the agenda."}, {"text": "It was held to protest the creation of the U.S. Forest Service.", "isCorrect": false, "rationale": "The Forest Service was created in 1905 under Pinchot and was actively SUPPORTED by Roosevelt and the conservation philosophy at the conference."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
