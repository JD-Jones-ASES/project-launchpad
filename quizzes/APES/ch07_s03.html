<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Indoor Air Pollution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the EPA, indoor air pollutant concentrations can be how many times higher than typical outdoor concentrations?", "options": [{"text": "Always lower than outdoor concentrations", "isCorrect": false, "rationale": "Indoor concentrations frequently exceed outdoor levels."}, {"text": "Two to five times higher, and occasionally more than 100 times higher", "isCorrect": true, "rationale": "Correct. Combined with the fact that Americans spend ~90% of their time indoors, this drives a substantial population exposure burden."}, {"text": "Approximately equal to outdoor concentrations on average", "isCorrect": false, "rationale": "Indoor air typically carries higher pollutant loads from confined sources."}, {"text": "About 20% lower because of HVAC filtration", "isCorrect": false, "rationale": "Filtration helps but does not generally reduce indoor air below outdoor air."}], "id": "q01"}, {"question": "Why is radon the second-leading cause of lung cancer in the United States despite being a chemically inert noble gas?", "options": [{"text": "Radon itself reacts chemically with lung tissue", "isCorrect": false, "rationale": "Radon is chemically inert; its hazard comes from radioactive decay, not chemistry."}, {"text": "Radon decays into short-lived radioactive daughters (Po-218, Pb-214, Po-214) that are charged solid particles which deposit on airway surfaces and emit alpha particles directly into lung tissue", "isCorrect": true, "rationale": "Correct. The alpha-emitting decay products are the proximate cause of DNA damage and lung cancer; radon gas itself is not particularly dangerous."}, {"text": "Radon emits beta and gamma radiation that penetrate deep into the chest", "isCorrect": false, "rationale": "Alpha particles, not beta/gamma, are the primary radiation hazard at radon-relevant concentrations."}, {"text": "Radon dissolves in blood and reaches every organ", "isCorrect": false, "rationale": "Radon is poorly soluble; the hazard is local to the airway."}], "id": "q02"}, {"question": "[Stimulus] A homeowner installs new energy-efficient insulation and windows to reduce heating costs. After the upgrade, indoor radon test results are now well above the EPA action level of 4 pCi/L, even though the house and the underlying granite bedrock have not changed. What best explains this outcome?", "options": [{"text": "The new insulation contains radium, adding a new radon source", "isCorrect": false, "rationale": "Insulation does not typically contain radium; the radon source remains the underlying bedrock."}, {"text": "Reduced ventilation traps radon gas seeping from the soil, allowing concentrations to climb because the building's air-exchange rate is lower", "isCorrect": true, "rationale": "Correct. Tightly sealed, energy-efficient buildings have lower air-exchange rates, so radon entering through the foundation accumulates rather than dispersing."}, {"text": "Energy-efficient construction releases radon-equivalent particles into the air", "isCorrect": false, "rationale": "Insulation materials do not produce radon."}, {"text": "The bedrock began emitting more radon after the renovation", "isCorrect": false, "rationale": "Bedrock radon flux is set by the geology, not by building modifications."}], "id": "q03"}, {"question": "Which of the following is the most effective remediation for radon in a home with elevated levels?", "options": [{"text": "Replacing all carpeting and upholstery", "isCorrect": false, "rationale": "Carpet replacement does not address the foundation-borne radon source."}, {"text": "Sub-slab depressurization (a pipe and fan that draw air from beneath the foundation and exhaust it outside)", "isCorrect": true, "rationale": "Correct. Sub-slab depressurization typically reduces indoor radon by 80–99% by intercepting the soil-gas pathway."}, {"text": "Sealing all interior doors during the day", "isCorrect": false, "rationale": "Sealing rooms does not prevent soil-gas entry."}, {"text": "Continuous air-fryer use to convert radon to harmless gas", "isCorrect": false, "rationale": "Cooking appliances cannot affect radioactive decay."}], "id": "q04"}, {"question": "A homeowner finds intact, undisturbed asbestos-containing floor tiles in good condition during a planned room renovation. What does the EPA recommend?", "options": [{"text": "Immediate DIY removal because asbestos is always dangerous", "isCorrect": false, "rationale": "DIY removal is hazardous because removal generates the airborne fibers that cause disease."}, {"text": "In-place management — encapsulation and regular inspection — rather than automatic removal, since intact ACMs in good condition pose little risk", "isCorrect": true, "rationale": "Correct. Disturbance during removal creates the fiber-release hazard; intact materials are typically managed in place."}, {"text": "Painting over the tiles is sufficient regardless of condition", "isCorrect": false, "rationale": "Encapsulation must follow established protocols; mere paint may not provide reliable containment."}, {"text": "Burying or burning the materials in a household trash bin", "isCorrect": false, "rationale": "Asbestos disposal requires licensed handling and specialized facilities."}], "id": "q05"}, {"question": "Which three diseases are associated with inhaled asbestos fibers?", "options": [{"text": "Asbestosis, mesothelioma, and lung cancer", "isCorrect": true, "rationale": "Correct. Asbestosis is progressive lung scarring; mesothelioma is a pleural cancer with 20–40 year latency; lung cancer risk is also elevated."}, {"text": "Bronchitis, asthma, and emphysema", "isCorrect": false, "rationale": "These are common respiratory diseases, but they are not the canonical asbestos-fiber triad."}, {"text": "Tuberculosis, pneumonia, and influenza", "isCorrect": false, "rationale": "These are infectious diseases with different etiologies."}, {"text": "Hypertension, anemia, and diabetes", "isCorrect": false, "rationale": "These are systemic conditions unrelated to asbestos exposure."}], "id": "q06"}, {"question": "[Stimulus] A family is found unconscious in a closed garage where a vehicle had been left running. Emergency responders identify carbon monoxide poisoning as the cause. Why is CO especially dangerous in such enclosed-source scenarios?", "options": [{"text": "CO has a strong rotten-egg odor that residents quickly become desensitized to", "isCorrect": false, "rationale": "CO is colorless, odorless, and tasteless — there is no warning smell."}, {"text": "CO is colorless, odorless, and tasteless, and it binds hemoglobin with about 200× the affinity of oxygen, so victims can lose consciousness before noticing any symptom", "isCorrect": true, "rationale": "Correct. The lack of sensory warning combined with rapid hemoglobin saturation produces the characteristic 'silent killer' profile."}, {"text": "CO ignites at the air-fuel mixture present in garages", "isCorrect": false, "rationale": "CO is flammable but the dominant hazard in this scenario is asphyxiation, not fire."}, {"text": "CO triggers severe allergic reactions in most adults", "isCorrect": false, "rationale": "CO toxicity is not an allergic mechanism."}], "id": "q07"}, {"question": "Which volatile organic compound is most associated with off-gassing from pressed-wood products such as particleboard, MDF, and plywood, and is classified as a Group 1 carcinogen?", "options": [{"text": "Toluene", "isCorrect": false, "rationale": "Toluene is found in paints and varnishes but is not the dominant pressed-wood off-gas."}, {"text": "Formaldehyde (HCHO)", "isCorrect": true, "rationale": "Correct. Formaldehyde is released by urea-formaldehyde resins used as binders in pressed-wood products and is classified by the IARC as a Group 1 carcinogen."}, {"text": "Methane", "isCorrect": false, "rationale": "Methane is not a notable off-gas from building materials."}, {"text": "Helium", "isCorrect": false, "rationale": "Helium is inert and not a building-product off-gas."}], "id": "q08"}, {"question": "What is sick building syndrome?", "options": [{"text": "A formally diagnosed disease caused by a specific pathogen identified in a building", "isCorrect": false, "rationale": "That description fits 'building-related illness'; sick building syndrome lacks an identified specific cause."}, {"text": "A pattern of nonspecific symptoms (headache, eye and throat irritation, fatigue) reported by occupants of a specific building at rates higher than expected, typically tied to inadequate ventilation and elevated VOCs or mold", "isCorrect": true, "rationale": "Correct. SBS describes a symptom pattern without a single identifiable cause; building-related illness is reserved for cases with a specific cause and diagnosable disease."}, {"text": "Symptoms caused exclusively by exposure to lead paint", "isCorrect": false, "rationale": "SBS is a multi-cause ventilation/VOC/mold pattern, not a lead-specific syndrome."}, {"text": "An occupational disease only recognized in industrial settings", "isCorrect": false, "rationale": "SBS is documented across office, school, and residential settings."}], "id": "q09"}, {"question": "[Stimulus] The WHO estimates that household air pollution from solid-fuel combustion (wood, dung, charcoal, agricultural residue, coal) causes approximately 3.2 million premature deaths globally each year. Which factor most directly explains why this burden falls disproportionately on women and children in less-developed countries?", "options": [{"text": "Solid-fuel emissions are intrinsically more toxic than fossil-fuel emissions", "isCorrect": false, "rationale": "Although solid-fuel combustion produces a particularly toxic mix, the disproportionate burden is driven by exposure conditions, not toxicity differentials alone."}, {"text": "Open fires and rudimentary cookstoves burn wood, dung, or coal inside or adjacent to poorly ventilated dwellings, and women and children spend the most time near the fire — receiving exposures that far exceed any outdoor air-quality standard", "isCorrect": true, "rationale": "Correct. Source proximity, poor ventilation, and time near the fire combine to produce extreme PM2.5 and CO exposures concentrated on the household members tending the stove."}, {"text": "Children's lungs absorb more oxygen than adults, increasing their vulnerability proportionally", "isCorrect": false, "rationale": "Lung physiology differences are minor compared with exposure proximity in driving the burden."}, {"text": "Local genetics in affected regions confer reduced respiratory tolerance", "isCorrect": false, "rationale": "There is no genetic basis for the geographic distribution of the burden; it is exposure-driven."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
