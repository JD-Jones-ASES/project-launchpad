    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Biomass, Biofuels, and Hydroelectric Power</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Aggregate global statistics report that biomass supplies about 5% of primary energy. In which regions does biomass actually dominate household energy, and approximately how does the WHO estimate the indoor-air-pollution death toll from biomass combustion?", "options": [{"text": "Sub-Saharan Africa, South Asia, and parts of Latin America (60-80% of household energy from traditional biomass); WHO estimates approximately 3.8 million premature deaths annually from indoor air pollution, primarily affecting women and children.", "isCorrect": true, "rationale": "The text specifies 60-80% household biomass share in sub-Saharan Africa, South Asia, and parts of Latin America, with the 3.8 million premature deaths attributable to indoor air pollution from open fires and poorly vented cookstoves. Aggregate national statistics undercount this use because much of it is informal."}, {"text": "Northern Europe (60-80% household biomass from district heating); WHO estimates ~50,000 deaths annually.", "isCorrect": false, "rationale": "Northern European biomass use is largely modern district heating, not traditional cookstoves. The 60-80% household biomass figure applies to sub-Saharan Africa, South Asia, and Latin America."}, {"text": "OECD nations; WHO estimates effectively zero deaths because all combustion is well-vented.", "isCorrect": false, "rationale": "OECD nations are dominated by gas and oil; traditional biomass is not the primary household fuel. Indoor air pollution deaths are concentrated in low-income regions with traditional cookstoves."}, {"text": "China and India only; WHO estimates ~100,000 deaths annually.", "isCorrect": false, "rationale": "Sub-Saharan Africa, South Asia (which includes India), and parts of Latin America all have high traditional biomass use. The WHO global figure is ~3.8 million premature deaths, not 100,000."}], "id": "q01"}, {"question": "What is the net energy ratio (NER), and approximately how do US corn ethanol and Brazilian sugarcane ethanol compare on this metric?", "options": [{"text": "NER is the price per gallon ratio; corn ethanol is ~10x more expensive than sugarcane.", "isCorrect": false, "rationale": "NER is an energy metric, not a price metric. It compares energy content of the fuel to fossil energy invested in producing it."}, {"text": "NER is the ratio of energy content of the biofuel to fossil energy consumed in producing it. US corn ethanol NER ~1.3; Brazilian sugarcane ethanol NER ~8.0.", "isCorrect": true, "rationale": "The text gives NER (also called EROEI) as energy content of fuel divided by fossil energy consumed in producing it (farming, fertilizing, distilling, transporting). Corn ethanol delivers only 1.3 units per unit of fossil energy invested — marginal. Brazilian sugarcane ethanol delivers ~8.0 units, a substantially better return."}, {"text": "NER is the ratio of carbon emissions to fuel produced; both ethanol types have NER = 1.0.", "isCorrect": false, "rationale": "NER is an energy ratio, not a carbon-to-fuel ratio. The two ethanol types differ substantially: 1.3 vs. ~8.0."}, {"text": "NER is irrelevant to biofuel evaluation; only sticker price matters.", "isCorrect": false, "rationale": "NER is essential because a fuel with NER < 1 is an energy sink, not a source. Policy that mandates such a fuel imposes costs without delivering fossil-fuel displacement."}], "id": "q02"}, {"question": "Why does Brazilian sugarcane ethanol have a much higher net energy ratio than US corn ethanol?", "options": [{"text": "Sugar cane grows in colder climates with less fossil-fuel-intensive farming.", "isCorrect": false, "rationale": "Sugarcane grows in tropical climates, not cold. The advantage comes from yield per hectare and bagasse use, not climate-related fossil fuel reductions."}, {"text": "Sugarcane has a much higher yield of fermentable sugar per hectare than corn, and Brazilian mills burn the fibrous bagasse residue for process heat instead of using natural gas, dramatically reducing fossil energy inputs.", "isCorrect": true, "rationale": "The text gives both reasons: higher fermentable sugar yield per hectare (so less land/fertilizer/diesel per gallon of ethanol) and combustion of bagasse (the cellulosic residue) for process heat instead of fossil gas. Together these reduce fossil-energy inputs and raise NER from 1.3 (corn) to ~8.0 (sugarcane)."}, {"text": "Corn requires no nitrogen fertilizer while sugarcane does.", "isCorrect": false, "rationale": "Corn requires substantial nitrogen fertilizer; sugarcane fertilizer needs are also significant. The advantage comes from yield and bagasse, not fertilizer asymmetry."}, {"text": "Corn ethanol is distilled with diesel fuel while sugarcane ethanol is distilled with solar thermal.", "isCorrect": false, "rationale": "Corn ethanol is typically distilled using natural gas (not diesel), and sugarcane is typically distilled using bagasse (not solar). The distinction matters: cellulosic residue replaces fossil heat input."}], "id": "q03"}, {"question": "Why does the US corn ethanol mandate raise food-vs.-fuel concerns, and approximately how much of the US corn crop is diverted to ethanol production?", "options": [{"text": "Approximately 40% of the US corn crop is diverted to ethanol — large enough to influence global grain prices and raise food-staple costs in net-food-importing low-income countries.", "isCorrect": true, "rationale": "The text gives ~40% diversion in most years and explains the food-vs.-fuel debate: US ethanol policy directly raises global grain prices, and the impact falls hardest on low-income nations that import food. This is a major equity argument against grain-based first-generation biofuels."}, {"text": "Less than 1% of the US corn crop goes to ethanol, so food prices are unaffected.", "isCorrect": false, "rationale": "About 40% of the US corn crop is diverted to ethanol, not less than 1%. This share is large enough to influence global grain prices substantially."}, {"text": "100% of the US corn crop is converted to ethanol; food corn is imported entirely.", "isCorrect": false, "rationale": "About 40% goes to ethanol — large but not the entire crop. The US still produces and exports significant amounts of corn for food and feed."}, {"text": "10% of the US corn crop is diverted to ethanol; this has no effect on food prices.", "isCorrect": false, "rationale": "The actual share is ~40%, and diversion at this scale does influence global grain prices, with sharpest impacts on net-food-importing low-income countries."}], "id": "q04"}, {"question": "Which of the following best distinguishes second-generation biofuels from first-generation, and what is their main commercial barrier?", "options": [{"text": "First-generation biofuels use cellulose; second-generation use food crops; second-generation are cheaper.", "isCorrect": false, "rationale": "This reverses the actual definitions. First-generation uses food crops (corn, sugarcane, soybean); second-generation uses cellulosic feedstocks. Second-generation is more expensive, not cheaper."}, {"text": "Second-generation biofuels use cellulosic feedstocks (corn stover, wheat straw, switchgrass) — non-food residues that avoid the food-vs.-fuel conflict — but require enzyme cocktails or acid pretreatment to break down lignin, keeping them more expensive than corn ethanol.", "isCorrect": true, "rationale": "The text frames second-generation as cellulosic feedstocks (more abundant than grain starch and not directly food). The technical barrier is breaking the lignin-cellulose-hemicellulose matrix: enzyme cocktails and acid pretreatment add costs that have kept cellulosic ethanol from scaling up despite decades of research."}, {"text": "Second-generation biofuels require no farmland and use only seawater algae.", "isCorrect": false, "rationale": "Algal biofuels are third-generation, not second. Second-generation typically uses agricultural residues or terrestrial energy crops like switchgrass on land."}, {"text": "Second-generation biofuels are produced from waste motor oil.", "isCorrect": false, "rationale": "Waste motor oil is a fossil fuel residue, not a biofuel. Second-generation biofuels are produced from cellulosic plant material."}], "id": "q05"}, {"question": "What advantages do third-generation algal biofuels promise, and what has prevented commercial deployment as of 2024?", "options": [{"text": "Algae yield 10-100x more oil per hectare than soybeans, can grow on non-arable land using saline or wastewater, and avoid food crop competition; cost and scaling challenges have prevented commercial deployment.", "isCorrect": true, "rationale": "The text gives all three advantages and identifies cost and scaling as the persistent obstacles. Algal biofuels remain in research and demonstration phase. The yield-per-hectare advantage is potentially transformative, but the production economics have not yet supported commercial use."}, {"text": "Algae yield 100x less oil than soybeans but are extremely cheap to scale.", "isCorrect": false, "rationale": "This reverses the actual yield comparison. Algae yield 10-100x more oil per hectare than soybeans, but scaling has proven expensive."}, {"text": "Algae require prime farmland and freshwater, competing directly with food crops.", "isCorrect": false, "rationale": "A key advantage of algae is that they can grow on non-arable land using saline or wastewater, not requiring prime farmland or freshwater."}, {"text": "Algal biofuels are already the dominant US biofuel, having replaced corn ethanol.", "isCorrect": false, "rationale": "Algal biofuels remain in the research and demonstration phase as of 2024; corn ethanol still dominates US production."}], "id": "q06"}, {"question": "Hydroelectric generation supplies roughly 7% of global primary energy and 15% of global electricity. What distinguishes a run-of-river plant from a large reservoir dam?", "options": [{"text": "Run-of-river plants extract energy from the natural river flow without significant water storage, having minimal upstream flooding and relatively modest ecological footprint. Large reservoir dams provide storage and dispatchable generation but flood large areas, displace populations, and trap sediment.", "isCorrect": true, "rationale": "The text frames the key contrast: run-of-river has minimal storage and ecological/social impact but cannot generate on demand during low-flow periods; reservoir dams provide dispatchable renewable power but cause upstream flooding, population displacement, and downstream sediment disruption."}, {"text": "Run-of-river plants are larger than reservoir dams.", "isCorrect": false, "rationale": "Run-of-river plants are typically smaller; reservoir dams like Three Gorges (22.5 GW installed) are much larger."}, {"text": "Run-of-river plants require massive dams while reservoir dams use no dam.", "isCorrect": false, "rationale": "This reverses the relationship. Run-of-river plants have minimal damming; reservoir dams require large structures to impound the reservoir."}, {"text": "Run-of-river plants generate no electricity; only large reservoir dams generate power.", "isCorrect": false, "rationale": "Both generate electricity. Run-of-river plants generate from natural flow without significant storage; reservoir dams generate from impounded water released through turbines."}], "id": "q07"}, {"question": "The Three Gorges Dam (full operation 2012) on the Yangtze River has 22.5 GW installed capacity, making it the world's largest power station. What were two major social or environmental costs?", "options": [{"text": "Construction was free of social cost; environmental impact was minimal because the river continued to flow normally.", "isCorrect": false, "rationale": "Three Gorges had massive social and environmental costs: 1.4 million people relocated and major ecological disruption to the Yangtze. None of these is consistent with 'free of social cost.'"}, {"text": "Forced relocation of approximately 1.4 million people from 13 cities, 140 towns, and 1,000+ villages submerged by the reservoir; sediment trapping (~530 Mt/yr blocked) accelerating Yangtze Delta erosion and contributing to the functional extinction of the Yangtze River dolphin.", "isCorrect": true, "rationale": "The text identifies both the displacement (1.4 million people, often inadequate compensation, relocation to steep low-productivity slopes) and the ecological costs (sediment trap, delta erosion, dolphin extinction). The dam also induced landslides and seismicity around the reservoir margins."}, {"text": "The dam consumed enormous quantities of natural gas during operation.", "isCorrect": false, "rationale": "The dam generates electricity; it does not consume natural gas. Its operational emissions are minimal compared with fossil-fuel plants."}, {"text": "The dam released 530 Mt of sediment per year into the Yangtze, doubling delta growth.", "isCorrect": false, "rationale": "This reverses the actual effect. The dam traps ~530 Mt of sediment per year that would otherwise reach the delta, accelerating delta erosion and reducing downstream floodplain fertility."}], "id": "q08"}, {"question": "A policy analyst evaluates a proposed corn-ethanol mandate. Why is full lifecycle accounting essential, and what does land-use change have to do with it?", "options": [{"text": "Land-use change is irrelevant; only the NER of the finished fuel matters.", "isCorrect": false, "rationale": "Land-use change is one of the largest lifecycle emissions terms. Clearing grassland or forest to grow biofuel crops releases stored soil/biomass carbon that can take decades to repay."}, {"text": "An NER below 1.0 means the fuel is an energy sink. Even with NER above 1.0, clearing grassland or forest to grow biofuel crops releases stored carbon as CO2 that can take decades to repay even under favorable NER assumptions, so full lifecycle accounting must include these land-use change emissions.", "isCorrect": true, "rationale": "The text emphasizes both points: NER below 1.0 is a fatal flaw, but even modest-NER biofuels can have substantial lifecycle emissions if grasslands or forests are converted to grow them. A policy mandate without full lifecycle accounting can lock in negative outcomes."}, {"text": "Lifecycle accounting is unnecessary because biofuels are inherently carbon-neutral.", "isCorrect": false, "rationale": "Biofuels are not inherently carbon-neutral. Land-use change, fossil-energy inputs to farming and processing, and methane emissions from feedstock processing all contribute to lifecycle CO2."}, {"text": "Only the price of the finished fuel matters for policy evaluation.", "isCorrect": false, "rationale": "Price is an input, but environmental policy must evaluate net energy delivered and net emissions, including land-use change. Fuel with NER below 1 imposes costs without delivering benefits."}], "id": "q09"}, {"question": "Many low-income rural areas exhibit a cycle of forest degradation from biomass use. Identify the mechanism most clearly described in the source.", "options": [{"text": "Wood is harvested faster than forests can regenerate, particularly near urban centers where demand is high and alternative fuels are expensive, producing a cycle of forest degradation, reduced carbon storage, and continued dependence on the same depleting resource.", "isCorrect": true, "rationale": "The text describes the supply-demand mismatch around urban centers, the unsustainable harvest rate, and the feedback loop in which deforestation reduces carbon storage and forces continued reliance on the depleting resource. Indoor-air-pollution deaths and deforestation form a paired health/ecology cost of traditional biomass."}, {"text": "Modern biomass plants drive deforestation by burning whole logs from old-growth forests.", "isCorrect": false, "rationale": "The deforestation cycle described in the text is driven by traditional biomass collection in low-income rural areas, not by modern biomass plants. Modern biomass can be sustainable if managed carefully."}, {"text": "Forests regenerate faster than wood is harvested, so biomass is always sustainable.", "isCorrect": false, "rationale": "The text explicitly describes harvest outpacing regeneration in many low-income areas, especially near urban centers. Sustainability requires managed harvest rates."}, {"text": "Deforestation is solely caused by oil drilling.", "isCorrect": false, "rationale": "While oil and gas operations can contribute to deforestation, the cycle described in this section is driven by traditional biomass collection for cooking and heating fuel, not by drilling."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
