<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Case Studies in Demographic Change</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Stimulus: China's one-child policy (1980–2015) is estimated to have averted approximately 400 million births. Which of the following was an unintended consequence of the policy?", "options": [{"text": "A reduction in elderly dependency ratios as the population restructured", "isCorrect": false, "rationale": "The opposite occurred — the policy accelerated aging because small cohorts followed large pre-1980 cohorts."}, {"text": "A heavily skewed sex ratio at birth, with approximately 118 male births per 100 female births by 2010", "isCorrect": true, "rationale": "Cultural preference for male children combined with restricted family size produced sex-selective abortion and underreporting of female births, distorting the natural ratio of about 105:100."}, {"text": "An immediate rebound in TFR following the 2016 two-child policy", "isCorrect": false, "rationale": "TFR did not rebound significantly — urban couples express strong preferences for small families regardless of legal limit."}, {"text": "A complete elimination of the elderly dependency burden", "isCorrect": false, "rationale": "Aging accelerated; elderly dependency rose, not fell."}], "id": "q01"}, {"question": "Why did China's 2016 reversal to a two-child policy and 2021 reversal to a three-child policy fail to significantly raise TFR?", "options": [{"text": "Because the new policies were not legally binding", "isCorrect": false, "rationale": "The policies were legally allowable; the issue was preference, not law."}, {"text": "Because urban Chinese couples — having grown up as single children — express strong preferences for small families regardless of legal limits", "isCorrect": true, "rationale": "Once fertility norms shift, they are difficult to reverse by decree — illustrating that demographic momentum operates through cultural preferences, not just law."}, {"text": "Because birth rates were already at zero before the reversal", "isCorrect": false, "rationale": "Birth rates were positive but below replacement, not zero."}, {"text": "Because Chinese fertility was already rising before 2016", "isCorrect": false, "rationale": "TFR was below replacement for years before the reversal."}], "id": "q02"}, {"question": "Which of the following best characterizes Japan's demographic situation as an example of Stage 5 demographic transition?", "options": [{"text": "TFR ~3.5, rapid population growth, broad-base age pyramid", "isCorrect": false, "rationale": "These features describe Stage 2, not Stage 5."}, {"text": "TFR ~1.3, deaths exceeding births since 2007, projected population decline below 100 million by the 2060s", "isCorrect": true, "rationale": "Japan's TFR ~1.3 plus aging population with deaths outpacing births since 2007 places it in Stage 5; population peaked at ~128 million in 2010."}, {"text": "TFR exactly 2.1 with stable population", "isCorrect": false, "rationale": "Stable population at replacement TFR characterizes Stage 4, not Japan's actual below-replacement profile."}, {"text": "TFR ~6.5 with rapid youth bulge", "isCorrect": false, "rationale": "These features describe Niger or Mali, not Japan."}], "id": "q03"}, {"question": "Stimulus: A demographer projects that sub-Saharan Africa's working-age population will roughly double between 2020 and 2050, from about 500 million to 1 billion. Which outcome is most likely if job creation fails to match labor force growth?", "options": [{"text": "Automatic capture of the demographic dividend through demographic momentum alone", "isCorrect": false, "rationale": "Dividend is realized through productive employment of working-age cohorts — it does not happen automatically."}, {"text": "A youth bulge of unemployed or underemployed young adults — historically associated with political instability and emigration pressure", "isCorrect": true, "rationale": "When the labor market cannot absorb new entrants, the same demographic structure that could fuel growth instead generates instability and migration pressures."}, {"text": "A spontaneous transition to Stage 5 demographics", "isCorrect": false, "rationale": "Stage 5 requires sustained below-replacement fertility, not a jobs gap."}, {"text": "A rapid decline in fertility regardless of education levels", "isCorrect": false, "rationale": "Fertility decline depends on education, urbanization, and access to contraception — not on labor market dynamics directly."}], "id": "q04"}, {"question": "What is a climate migrant (or environmental refugee)?", "options": [{"text": "A person displaced from their home region by environmental changes such as sea level rise, drought, or heat stress", "isCorrect": true, "rationale": "Climate migrants are displaced by environmental drivers, distinct from political refugees. The IPCC (2018) projected up to 200 million such migrants by 2050 without major emission reductions."}, {"text": "A person who voluntarily relocates for better weather", "isCorrect": false, "rationale": "Climate migration involves displacement by deteriorating conditions, not lifestyle choice."}, {"text": "A person fleeing political persecution related to climate policy", "isCorrect": false, "rationale": "Political refugees are a separate category; climate migrants are displaced by environmental conditions, not policy."}, {"text": "A worker who travels seasonally for agricultural work", "isCorrect": false, "rationale": "Seasonal labor migration is not the same as climate-driven displacement."}], "id": "q05"}, {"question": "Stimulus: Yeast (Saccharomyces cerevisiae) is grown in 200 mL of glucose broth. Cell density is measured every 2 hours for 12 hours and plotted on linear and semi-log scales. The data show rapid increase in early hours, leveling off by hour 10. Which growth pattern best explains this trajectory?", "options": [{"text": "Pure exponential growth throughout the experiment", "isCorrect": false, "rationale": "Pure exponential would not level off — yeast clearly hits a resource limit."}, {"text": "Pure logistic growth with constant K from t = 0", "isCorrect": false, "rationale": "Logistic from t = 0 would not show distinct exponential phase early on."}, {"text": "Exponential growth when glucose is abundant, transitioning to logistic growth as glucose is depleted, leveling at K set by nutrient availability", "isCorrect": true, "rationale": "Early growth approximates exponential because resources are abundant; deceleration begins as glucose is consumed and waste accumulates, with K determined by resource limitation."}, {"text": "Density-independent regulation by temperature", "isCorrect": false, "rationale": "Temperature is held constant in the lab; the limiting factor is glucose, a density-dependent resource."}], "id": "q06"}, {"question": "In the yeast lab, which of the following is most likely the limiting factor that produces the braking effect in the logistic growth equation?", "options": [{"text": "Light availability for photosynthesis", "isCorrect": false, "rationale": "Yeast are heterotrophs and do not photosynthesize."}, {"text": "Predation pressure from contaminating bacteria", "isCorrect": false, "rationale": "Lab cultures are sterile to prevent contamination; the limiting factor is intrinsic to the medium."}, {"text": "Glucose depletion combined with accumulation of metabolic byproducts (e.g., ethanol)", "isCorrect": true, "rationale": "As yeast consume glucose, the resource declines while ethanol and CO₂ accumulate — both density-dependent factors that brake population growth as N approaches K."}, {"text": "Sudden temperature shifts unrelated to density", "isCorrect": false, "rationale": "Temperature is controlled; density-dependent resource depletion is the operative factor."}], "id": "q07"}, {"question": "Why is Japan's experience considered a warning for other Stage 4 countries?", "options": [{"text": "Because Stage 4 countries cannot industrialize further", "isCorrect": false, "rationale": "Stage 4 already implies industrialization — this is not the warning."}, {"text": "Because below-replacement fertility is easier to enter than to exit, and pro-natalist policy interventions have not significantly reversed the fertility trend", "isCorrect": true, "rationale": "Despite financial incentives, subsidized childcare, and visa expansion, Japan has not reversed its declining fertility — suggesting Stage 4 societies should consider this trajectory carefully."}, {"text": "Because all Stage 4 countries automatically transition to Stage 5", "isCorrect": false, "rationale": "Transition is not automatic; it depends on social and policy factors."}, {"text": "Because immigration is the only solution and Japan refused it", "isCorrect": false, "rationale": "Immigration is one option but not the only one; Japan's resistance is one factor, not the universal lesson."}], "id": "q08"}, {"question": "Which of the following best describes the central environmental challenge of the twenty-first century, according to the chapter?", "options": [{"text": "Population growth in isolation, regardless of consumption levels", "isCorrect": false, "rationale": "The chapter explicitly states this is not the central challenge — both population and consumption matter."}, {"text": "Per-capita consumption growth in high-income regions, regardless of population", "isCorrect": false, "rationale": "Consumption alone is also insufficient; both levers must be addressed."}, {"text": "The intersection of continued population growth in high-fertility, climate-vulnerable regions with continued consumption growth in high-income regions", "isCorrect": true, "rationale": "Neither population nor consumption alone explains global resource demand; together they define it. Effective interventions act on both levers — girls' education plus clean energy transitions."}, {"text": "The complete elimination of fossil fuel use through individual lifestyle changes", "isCorrect": false, "rationale": "While energy transitions matter, this oversimplifies the dual-lever framing."}], "id": "q09"}, {"question": "Which of the following sub-Saharan African economies has demonstrated rapid growth, suggesting demographic dividend potential?", "options": [{"text": "Niger and Chad", "isCorrect": false, "rationale": "Niger and Chad still have TFRs above 6.0 and have not yet captured a demographic dividend."}, {"text": "Ethiopia, Rwanda, Ghana, and Senegal", "isCorrect": true, "rationale": "These countries have demonstrated rapid growth with the right institutional and educational investments, suggesting demographic dividend capture is achievable in the region."}, {"text": "South Sudan and Mali", "isCorrect": false, "rationale": "These countries face high fertility and instability rather than dividend capture."}, {"text": "Japan and South Korea", "isCorrect": false, "rationale": "These are East Asian, not sub-Saharan African."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
