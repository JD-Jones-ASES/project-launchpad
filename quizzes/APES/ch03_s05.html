<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Population Growth Math: Rule of 70 and Doubling Time</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which formula correctly applies the Rule of 70 to estimate doubling time?", "options": [{"text": "T_double = 70 × r, where r is the growth rate as a decimal", "isCorrect": false, "rationale": "The formula divides 70 by r, not multiplies, and r must be in percent, not decimal."}, {"text": "T_double = 70 / r, where r is the growth rate in percent per year", "isCorrect": true, "rationale": "Standard form: at 2%, T = 70/2 = 35 years. The 70 numerator derives from the natural-log approximation of doubling."}, {"text": "T_double = r × 100, where r is the growth rate as a decimal", "isCorrect": false, "rationale": "This is not the Rule of 70 formula."}, {"text": "T_double = 70 / (r × 100), where r is the growth rate in percent", "isCorrect": false, "rationale": "Dividing by r × 100 underestimates doubling time by a factor of 100."}]}, {"question": "Stimulus: A country has 1,200,000 births, 600,000 deaths, and net immigration of 100,000 in a population of 50,000,000. What is the annual population growth rate r?", "options": [{"text": "0.7% per year", "isCorrect": false, "rationale": "0.7% would correspond to ΔN of 350,000 — incorrect for the values given."}, {"text": "1.0% per year", "isCorrect": false, "rationale": "1.0% would correspond to ΔN of 500,000 — close to natural increase but excludes migration."}, {"text": "1.4% per year", "isCorrect": true, "rationale": "ΔN = (1,200,000 - 600,000) + 100,000 = 700,000. r = 700,000/50,000,000 × 100% = 1.4%."}, {"text": "2.4% per year", "isCorrect": false, "rationale": "2.4% would correspond to ΔN of 1,200,000 — that is just the births, not net change."}]}, {"question": "Stimulus: Country Alpha grows at 4% per year and Country Beta grows at 1% per year. What is Alpha's doubling time using the Rule of 70?", "options": [{"text": "Approximately 17.5 years", "isCorrect": true, "rationale": "T_double = 70/4 = 17.5 years — within a single generation."}, {"text": "Approximately 35 years", "isCorrect": false, "rationale": "35 years corresponds to a 2% rate, not 4%."}, {"text": "Approximately 70 years", "isCorrect": false, "rationale": "70 years corresponds to a 1% rate."}, {"text": "Approximately 280 years", "isCorrect": false, "rationale": "This would result from incorrectly multiplying 70 by 4 instead of dividing."}]}, {"question": "If a country's population growth rate is given as 0.025 (a decimal), what is the correct procedure to calculate doubling time?", "options": [{"text": "T_double = 70 / 0.025 = 2,800 years", "isCorrect": false, "rationale": "Common exam error — Rule of 70 requires r as percent, not decimal."}, {"text": "Convert 0.025 to 2.5% first, then T_double = 70 / 2.5 = 28 years", "isCorrect": true, "rationale": "First convert decimal to percent (×100), then apply Rule of 70: 0.025 × 100 = 2.5%, so T = 70/2.5 = 28 years."}, {"text": "T_double = 0.025 × 70 = 1.75 years", "isCorrect": false, "rationale": "Multiplication is incorrect; the formula divides 70 by r."}, {"text": "T_double = 70 + 0.025 = 70.025 years", "isCorrect": false, "rationale": "Addition is not part of any growth-time formula."}]}, {"question": "Why was the Rule of 70 developed as an approximation rather than an exact formula?", "options": [{"text": "Because the exact formula is impossible to derive", "isCorrect": false, "rationale": "The exact doubling formula t = ln(2)/ln(1+r/100) ≈ 69.3/r is well known."}, {"text": "Because it is much easier to compute mentally and is accurate to within about 1% for realistic growth rates", "isCorrect": true, "rationale": "70/r is easy to compute and stays within ~1% of the exact value for r between 0.5% and 10% — covering virtually all national growth rates."}, {"text": "Because it accounts for migration that the exact formula ignores", "isCorrect": false, "rationale": "Both formulas treat r as the net growth rate, regardless of source."}, {"text": "Because it adjusts for inflation in long-term economic projections", "isCorrect": false, "rationale": "The Rule of 70 is purely about exponential growth, not economic deflators."}]}, {"question": "A country has CBR = 30 per 1,000 and CDR = 12 per 1,000. What is its natural rate of increase as a percentage per year?", "options": [{"text": "0.18% per year", "isCorrect": false, "rationale": "0.18% mistakes the divisor — natural increase per 1,000 must be divided by 10 (or by 1,000 then ×100), not by 100."}, {"text": "1.8% per year", "isCorrect": true, "rationale": "Natural rate per 1,000 = 30 - 12 = 18. Convert to percent: 18/1,000 × 100 = 1.8% per year."}, {"text": "18% per year", "isCorrect": false, "rationale": "Forgot to convert from per-1,000 to percent — that requires dividing by 10."}, {"text": "180% per year", "isCorrect": false, "rationale": "Vastly overstated; an annual rate of 180% would imply nearly tripling each year."}]}, {"question": "Stimulus: Two populations are growing exponentially. Population A grows at 1% per year; Population B grows at 3% per year. Over 70 years, by approximately what factor will each population grow?", "options": [{"text": "Both populations roughly double, since both have low growth rates", "isCorrect": false, "rationale": "Population B's higher rate produces multiple doublings over the same period."}, {"text": "Population A doubles once (factor of 2); Population B doubles three times (factor of 8)", "isCorrect": true, "rationale": "Population A: 70/1 = 70-year doubling, so one doubling in 70 years. Population B: 70/3 ≈ 23-year doubling, so three doublings = 2^3 = 8."}, {"text": "Both populations grow by roughly the same factor since the rate difference is small", "isCorrect": false, "rationale": "The compounding logic of the Rule of 70 is precisely that small rate differences produce large long-run differences."}, {"text": "Population A grows by a factor of 70; Population B grows by a factor of 210", "isCorrect": false, "rationale": "Growth is exponential, not multiplicative by the rate alone."}]}, {"question": "Why is it possible for the global population growth rate to be falling while the absolute number of people added per year remains stable?", "options": [{"text": "Because growth rate calculations always lag absolute numbers by 20 years", "isCorrect": false, "rationale": "There is no inherent lag in calculation; the explanation is the size of the population base."}, {"text": "Because the population base is so large that even a smaller percentage rate still produces a large absolute increment", "isCorrect": true, "rationale": "Absolute increment = r × N. As N grows, even falling r can yield similar or rising ΔN. Global rate peaked ~1968 but absolute increment peaked ~1989."}, {"text": "Because birth rates only affect rates, never absolute numbers", "isCorrect": false, "rationale": "Birth rates affect both — the distinction is mathematical, not categorical."}, {"text": "Because immigration adds people independent of fertility rates", "isCorrect": false, "rationale": "Immigration is a separate factor that does not explain the global pattern of rate vs. increment."}]}, {"question": "Stimulus: A classmate claims that a country growing at 3.5% per year will take exactly twice as long to double as one growing at 7%. Which response is most accurate?", "options": [{"text": "The claim is correct because doubling time is exactly inversely proportional to the growth rate", "isCorrect": true, "rationale": "Per the Rule of 70, T_double = 70/r. So at 3.5%, T = 20 years; at 7%, T = 10 years. Halving the growth rate doubles the doubling time."}, {"text": "The claim is incorrect because exponential growth makes doubling times non-linear", "isCorrect": false, "rationale": "Although growth is exponential, doubling time itself is inversely proportional to r — the claim holds within Rule of 70 accuracy."}, {"text": "The claim is incorrect because the Rule of 70 doesn't apply to rates above 5%", "isCorrect": false, "rationale": "The Rule of 70 is accurate for rates between 0.5% and 10%, including 7%."}, {"text": "The claim is correct only when growth rates are below 1%", "isCorrect": false, "rationale": "There is no such rate restriction — the inverse-proportionality applies broadly."}]}, {"question": "A country of 20 million people has 500,000 births and 200,000 deaths per year, with no net migration. What are r and T_double?", "options": [{"text": "r = 1.5%, T_double ≈ 47 years", "isCorrect": true, "rationale": "ΔN = 500,000 - 200,000 = 300,000. r = 300,000/20,000,000 × 100% = 1.5%. T_double = 70/1.5 ≈ 47 years."}, {"text": "r = 2.5%, T_double = 28 years", "isCorrect": false, "rationale": "2.5% would require ΔN = 500,000, not 300,000."}, {"text": "r = 0.15%, T_double = 467 years", "isCorrect": false, "rationale": "Off by a factor of 10 — likely failed to convert to percent correctly."}, {"text": "r = 15%, T_double ≈ 4.7 years", "isCorrect": false, "rationale": "15% is wildly too high — would imply rapid doubling each generation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
