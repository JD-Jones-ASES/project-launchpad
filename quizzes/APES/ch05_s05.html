    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Pesticides, IPM, and Sustainable Agriculture</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An insecticide kills 99.9% of an insect pest population each time it is sprayed. Within 10 generations, the same insecticide is largely ineffective. Which evolutionary mechanism best explains this loss of effectiveness, and what is the textbook's term for the cycle that drives it?", "options": [{"text": "Adaptive mutation triggered by the insecticide; the cycle is called the chemical adaptation curve.", "isCorrect": false, "rationale": "Mutations are not 'triggered' by insecticides — they are pre-existing or random. The textbook's specific term for the cycle is the 'pesticide treadmill,' not the 'chemical adaptation curve.'"}, {"text": "Natural selection: the 0.1% survivors are disproportionately carriers of resistance alleles; their offspring inherit resistance and proliferate. The cycle is the pesticide treadmill — each generation of pesticides selects for resistant pests, requiring more potent chemicals, which select for greater resistance.", "isCorrect": true, "rationale": "The textbook explicitly describes this as natural selection applied to populations with short generation times: survivors carry resistance alleles, reproduce, and within a few generations resistance dominates. The cycle is the 'pesticide treadmill': each chemical generation selects for resistance, requiring more potent chemicals."}, {"text": "The insecticide degrades into less effective metabolites in the environment, requiring stronger doses.", "isCorrect": false, "rationale": "While environmental degradation is a real phenomenon, the textbook's mechanism for resistance loss is GENETIC — natural selection on standing variation in the pest population, not chemical degradation."}, {"text": "Higher temperatures denature the pesticide, reducing effectiveness over time.", "isCorrect": false, "rationale": "Temperature effects on pesticide chemistry are not the textbook mechanism. The selection-driven evolution of resistance is the documented and tested mechanism."}], "id": "q01"}, {"question": "An IPM practitioner walks fields twice per week, counting pests and assessing crop damage. Spray decisions are made based on whether observed pest density exceeds an 'economic threshold' — the pest density at which the cost of crop damage exceeds the cost of control. What is the textbook's contrast to this approach, and why is it identified as the principal driver of resistance evolution?", "options": [{"text": "Calendar-based spraying ('spray every two weeks regardless'). The textbook calls this the principal driver of resistance evolution because consistent intense exposure rapidly eliminates susceptibles, leaving only resistant individuals to reproduce.", "isCorrect": true, "rationale": "The textbook explicitly identifies calendar-based spraying as the principal driver of resistance. Consistent intense pesticide exposure rapidly eliminates susceptible individuals, leaving only resistant survivors to reproduce. IPM's economic threshold approach delays resistance by leaving susceptibles in the population (resistance management)."}, {"text": "Organic-only farming, because it uses no chemicals.", "isCorrect": false, "rationale": "Organic farming uses biological inputs (Bt, pyrethrin from chrysanthemum) that can also select for resistance. The textbook's contrast to IPM is calendar-based spraying, not organic agriculture."}, {"text": "Integrated pest management with biological control. This drives resistance because biocontrols are too weak to fully suppress pests.", "isCorrect": false, "rationale": "IPM is the recommended approach, not the resistance driver. Biocontrol is part of IPM, not its opposite."}, {"text": "Crop rotation. This drives resistance because rotation creates evolutionary pressure on pests.", "isCorrect": false, "rationale": "Crop rotation is a CULTURAL CONTROL that REDUCES pest pressure (e.g., breaks corn rootworm cycle by alternating with soybeans). It does not drive resistance."}], "id": "q02"}, {"question": "The textbook lists Bt maize, modified to express Bacillus thuringiensis toxin, as an example of why even biological pesticides are not exempt from the pesticide treadmill. What management strategy was supposed to slow Bt resistance evolution, and why did large-scale planting fail to maintain it?", "options": [{"text": "Non-Bt 'refuge' areas planted adjacent to Bt fields; large-scale planting without adequate refuge areas allowed resistant rootworm populations to develop.", "isCorrect": true, "rationale": "The textbook explicitly states: 'large-scale planting without adequate non-Bt refuge areas allowed resistant rootworm populations to develop and spread across US corn-growing regions.' Refuge areas maintain susceptible populations that mate with resistant survivors, diluting resistance alleles. Inadequate refuges removed this dilution effect."}, {"text": "Heavier doses of Bt across all fields. Failure was due to under-dosing.", "isCorrect": false, "rationale": "The opposite: heavier exposure across all fields would ACCELERATE selection for resistance, not slow it. The strategy was to MAINTAIN susceptible populations through refuges, not increase exposure."}, {"text": "Crop rotation only. Failure was due to inadequate rotation length.", "isCorrect": false, "rationale": "Rotation is one tactic but not the specific Bt-resistance management strategy. The named strategy in the textbook is non-Bt refuge areas."}, {"text": "Seasonal application during winter only. Failure was due to early spring pests.", "isCorrect": false, "rationale": "Bt is expressed continuously by the GMO plant during the growing season, not applied seasonally. The refuge strategy is the textbook's specific answer."}], "id": "q03"}, {"question": "Organic agriculture, as a legally defined production system under the USDA National Organic Program, prohibits which of the following inputs and requires which of the following before farmers can sell with the USDA Organic seal?", "options": [{"text": "Prohibits synthetic pesticides AND synthetic nitrogen fertilizers; requires a three-year transition period during which no prohibited substances can be applied.", "isCorrect": true, "rationale": "The textbook describes organic certification as prohibiting synthetic pesticides AND synthetic nitrogen fertilizers, relying instead on biological nutrient cycling (cover crops, manure, green manure), mechanical weed control, and biological pest management. Certification requires a three-year transition period."}, {"text": "Prohibits all biological controls; requires only synthetic input replacement.", "isCorrect": false, "rationale": "Reversed: organic agriculture EMBRACES biological controls (Bt sprays, beneficial insect releases) and PROHIBITS synthetic inputs."}, {"text": "Prohibits only herbicides; requires immediate certification upon application.", "isCorrect": false, "rationale": "Synthetic insecticides and fungicides are also prohibited, not just herbicides. And there is a three-year transition period before certification, not immediate."}, {"text": "Prohibits all genetic modification; allows synthetic fertilizers in moderation.", "isCorrect": false, "rationale": "While GMOs are prohibited, synthetic FERTILIZERS are also fully prohibited — not allowed in moderation."}], "id": "q04"}, {"question": "A farmer wants to reduce pesticide use without losing yield. The IPM hierarchy of tactics begins with which approach, and uses chemical control under what condition?", "options": [{"text": "Begin with calendar-based spraying; use chemical control on a fixed schedule.", "isCorrect": false, "rationale": "Calendar-based spraying is the OPPOSITE of IPM — IPM specifically rejects fixed-schedule spraying as the principal driver of resistance."}, {"text": "Begin with scouting and monitoring to determine the economic threshold; use chemical control as a LAST RESORT, only after biological, cultural, and physical controls are insufficient and the threshold has been crossed.", "isCorrect": true, "rationale": "The textbook describes the IPM hierarchy: scouting and economic thresholds first; biological control (predators, parasitoids, pathogens); cultural controls (crop rotation, intercropping, trap crops); physical/mechanical controls (traps, row covers); and finally TARGETED chemical control as a last resort, with narrow-spectrum, short-residue pesticides at the lowest effective dose."}, {"text": "Begin with chemical control; add biological controls only if chemicals fail.", "isCorrect": false, "rationale": "The hierarchy is reversed: chemicals are last, not first. Beginning with chemicals is exactly what IPM is designed to avoid."}, {"text": "Eliminate all pests, regardless of population density; use chemical controls preventively.", "isCorrect": false, "rationale": "IPM does NOT aim to eliminate all pests — that is impossible and ecologically counterproductive. The goal is to keep pest populations BELOW the economic threshold."}], "id": "q05"}, {"question": "Crop rotation, intercropping, and trap crops are listed in the textbook as examples of which IPM tactic category, and how does each disrupt pest dynamics?", "options": [{"text": "Cultural controls. Crop rotation breaks the cycle of soilborne pathogens and root pests; intercropping disrupts pest visual/chemical cues for finding host plants in dense monocultures; trap crops attract pests to a sacrificial planting at the field margin.", "isCorrect": true, "rationale": "The textbook groups these as 'cultural controls' that modify farming practices to reduce pest establishment. Crop rotation (corn → soybeans) eliminates host habitat for one season for specialists like corn rootworm. Intercropping disrupts pests' ability to locate host plants via visual/chemical cues. Trap crops concentrate pests for targeted removal at the field margin."}, {"text": "Chemical controls. They use plant-based alternative pesticides.", "isCorrect": false, "rationale": "These are CULTURAL controls (modifying farming practice), not chemical controls. They do not use pesticides."}, {"text": "Biological controls. They use predator-prey interactions.", "isCorrect": false, "rationale": "Biological controls use LIVING ORGANISMS (predators, parasitoids, pathogens) directly. Cultural controls modify FARMING PRACTICES — different category."}, {"text": "Physical/mechanical controls. They use barriers and traps.", "isCorrect": false, "rationale": "Physical/mechanical controls (sticky traps, row covers, mulch barriers) are a separate category. Crop rotation, intercropping, and trap crops are cultural controls."}], "id": "q06"}, {"question": "Which of the following best characterizes Persistent Organic Pollutants (POPs) and the regulatory framework that addresses them?", "options": [{"text": "POPs are biodegradable chemicals regulated by the Federal Insecticide, Fungicide, and Rodenticide Act (FIFRA).", "isCorrect": false, "rationale": "POPs by definition RESIST biodegradation — that's why they are 'persistent.' And the textbook names the Stockholm Convention (2001), not FIFRA, as the regulatory framework."}, {"text": "POPs resist biodegradation, persist for years to decades, are typically lipophilic, bioaccumulate in fatty tissues, and biomagnify up trophic levels. Regulated under the Stockholm Convention (2001). Examples: DDT, PCBs, dioxins.", "isCorrect": true, "rationale": "The textbook defines POPs precisely this way: they resist biodegradation, persist in environment, are lipophilic (fat-soluble), bioaccumulate in fatty tissues, and biomagnify at higher trophic levels. The Stockholm Convention (2001) is the international regulatory framework. Examples include organochlorine pesticides (DDT, chlordane, dieldrin), industrial chemicals (PCBs), and combustion byproducts (dioxins)."}, {"text": "POPs are water-soluble chemicals that flush out of ecosystems quickly.", "isCorrect": false, "rationale": "POPs are LIPOPHILIC (fat-soluble), not water-soluble. They concentrate in fatty tissues and persist for years to decades. Water-soluble chemicals would not persist or biomagnify."}, {"text": "POPs are biodegradable in days; regulation is voluntary at the firm level.", "isCorrect": false, "rationale": "POPs by definition do NOT biodegrade rapidly, and the Stockholm Convention provides binding international regulation, not voluntary firm-level regulation."}], "id": "q07"}, {"question": "Which of the following sustainable agricultural systems is best characterized as integrating trees with crops or livestock in a single management unit, providing shade, biomass, nitrogen (if leguminous), and habitat for beneficial insects while crops/livestock benefit from modified microclimate?", "options": [{"text": "Hydroponics", "isCorrect": false, "rationale": "Hydroponics is soilless cultivation in nutrient solutions, not a tree-crop integration system."}, {"text": "Permaculture only — trees are not central to it.", "isCorrect": false, "rationale": "While permaculture emphasizes perennial plants and multi-layer production (which can include trees), the textbook's specific tree+crop+livestock integration system is named 'agroforestry,' not permaculture."}, {"text": "Agroforestry — examples include shade-grown coffee, cocoa under forest canopy, rice paddies bordered by bamboo, and silvopasture (trees with livestock).", "isCorrect": true, "rationale": "The textbook explicitly defines agroforestry as integrating trees with crops or livestock in a single management system. Listed examples: shade-grown coffee, cocoa under forest canopy, rice paddies bordered by bamboo, silvopasture. Agroforestry typically maintains higher biodiversity and lower synthetic input requirements than monocultures."}, {"text": "Industrial monoculture", "isCorrect": false, "rationale": "Monoculture is the OPPOSITE of agroforestry — it deliberately excludes trees and other species to optimize a single crop. The textbook contrasts monoculture with agroforestry's multispecies integration."}], "id": "q08"}, {"question": "The textbook describes biological control as 'classical' or 'augmentative.' What is the difference, and what is the textbook's example for each?", "options": [{"text": "Classical involves chemical synthesis of pheromones; augmentative involves recombinant DNA pest control.", "isCorrect": false, "rationale": "Both classical and augmentative biocontrol involve LIVING organisms, not chemical synthesis or recombinant DNA. The textbook is clear that biocontrol uses 'living organisms — predators, parasitoids, and pathogens.'"}, {"text": "Classical biocontrol involves the deliberate introduction of a pest's natural enemies from its region of origin; augmentative biocontrol involves releasing commercially raised natural enemies to augment existing populations. Examples: ladybird beetles and lacewings (predators); Trichogramma wasps (parasitoids); Bt sprays (pathogens).", "isCorrect": true, "rationale": "The textbook distinguishes classical biocontrol (deliberate introduction of natural enemies from a pest's region of origin) from augmentative biocontrol (mass-rearing and release of natural enemies to supplement existing populations). Listed examples cover predators (ladybirds, lacewings), parasitoids (Trichogramma wasps), and microbial pathogens (Bt as spray)."}, {"text": "Classical and augmentative biocontrol are synonyms.", "isCorrect": false, "rationale": "They have distinct definitions in the textbook. Classical = deliberate introduction from origin; augmentative = mass-rearing and supplemental release."}, {"text": "Classical means using only chemical pesticides; augmentative means using only biological agents.", "isCorrect": false, "rationale": "Both are biological methods. Neither involves chemical pesticides — that would make them chemical controls, a separate category."}], "id": "q09"}, {"question": "A farmer notices that an insecticide she has used for five years is becoming less effective against the same pest, requiring higher doses for the same kill rate. Using the concept of natural selection, what would slow further resistance development?", "options": [{"text": "Switch to calendar-based spraying with the same chemical to overwhelm resistance.", "isCorrect": false, "rationale": "Calendar-based spraying ACCELERATES resistance evolution because it consistently exposes the population, eliminating susceptibles and selecting for resistance. This is the opposite of what is needed."}, {"text": "Adopt IPM with scouting, economic thresholds, biological/cultural controls, and rotation among different chemical modes of action — leaving susceptible individuals in the population reduces selection pressure on any one resistance trait.", "isCorrect": true, "rationale": "Slowing resistance requires LEAVING SUSCEPTIBLE INDIVIDUALS in the population. IPM's economic threshold (spray only when pests exceed damage threshold) reduces total exposures. Biological controls, crop rotation, intercropping reduce chemical reliance. Rotating among different mode-of-action chemicals prevents any one resistance trait from dominating."}, {"text": "Increase the dose by 100% to kill all individuals including resistant ones.", "isCorrect": false, "rationale": "This is the 'pesticide treadmill' itself — escalating doses select for greater resistance. Higher doses also have higher off-target costs (non-target species, residue, cost). The textbook explicitly identifies this as the failure mode."}, {"text": "Stop monitoring fields entirely; let the pest population self-regulate.", "isCorrect": false, "rationale": "Without monitoring, the farmer cannot make rational decisions about when (or whether) to intervene. Monitoring is foundational to IPM."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
