<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Human Demographics and Age Structure</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An age-structure pyramid with a broad base and steeply tapering shape (similar to Niger) typically indicates:", "options": [{"text": "A population approaching demographic stability with replacement-level fertility", "isCorrect": false, "rationale": "Stable populations show roughly columnar pyramids, not broad-base triangles."}, {"text": "A rapidly growing population with high total fertility rates", "isCorrect": true, "rationale": "Each younger cohort is larger than the one above it, signaling sustained high fertility (~6.5 in Niger) and population momentum."}, {"text": "A population in long-term decline due to below-replacement fertility", "isCorrect": false, "rationale": "Declining populations show narrow-base, urn-shaped pyramids like Japan's."}, {"text": "A population that has just experienced mass adult mortality", "isCorrect": false, "rationale": "Mass adult mortality would create gaps in middle cohorts, not a broad base."}]}, {"question": "Stimulus: A demographer notes that even if every woman in Country X immediately switched to replacement-level fertility, the population would continue to grow for approximately 50 years. The most likely explanation is:", "options": [{"text": "Net immigration is exceeding net emigration", "isCorrect": false, "rationale": "Migration was not specified, and the question describes a fertility-driven phenomenon."}, {"text": "Population momentum from large existing youth cohorts moving through reproductive years", "isCorrect": true, "rationale": "Large young cohorts produced by past high fertility will continue to add births for decades, even at replacement-level TFR."}, {"text": "Density-independent climate factors temporarily lowering mortality", "isCorrect": false, "rationale": "Climate effects do not produce a 50-year fertility-related delay."}, {"text": "Crude birth rates exceeding total fertility rates", "isCorrect": false, "rationale": "These two metrics measure different things and are not directly comparable in this way."}]}, {"question": "Why is replacement-level fertility approximately 2.1 in high-income countries rather than exactly 2.0?", "options": [{"text": "Because immigration always adds 0.1 children per woman", "isCorrect": false, "rationale": "Replacement is a fertility concept, not a migration concept."}, {"text": "Because some female children will not survive to reproductive age, requiring slightly more than 2 births to replace each pair of parents", "isCorrect": true, "rationale": "Even with low child mortality, a small fraction of girls do not reach reproductive age, so >2.0 children per woman are needed for exact replacement."}, {"text": "Because the natural sex ratio favors males 105:100", "isCorrect": false, "rationale": "While the natural birth ratio does slightly favor males, the 0.1 buffer is primarily about survival to reproductive age."}, {"text": "Because women bear children only between ages 15 and 49", "isCorrect": false, "rationale": "Reproductive window does not change the math of replacement."}]}, {"question": "Stimulus: Japan has a TFR of approximately 1.3, a wide-middle/narrow-base \"urn\" pyramid, and population median age approaching 49. Which of the following will most likely strain Japan's economy in the coming decades?", "options": [{"text": "A high youth dependency ratio overwhelming schools and healthcare for children", "isCorrect": false, "rationale": "Niger faces high youth dependency; Japan faces the opposite — low youth, high elderly."}, {"text": "A rising elderly dependency ratio with fewer workers supporting more retirees", "isCorrect": true, "rationale": "Below-replacement fertility plus long lifespans produces shrinking workforce relative to retirees, straining pensions and elder care."}, {"text": "Rapid net immigration exceeding labor demand", "isCorrect": false, "rationale": "Japan has historically restricted immigration, not encouraged it."}, {"text": "A fertility surge producing a youth bulge", "isCorrect": false, "rationale": "Japan's TFR has remained low; no fertility surge is occurring."}]}, {"question": "What economic phenomenon describes the temporary period of opportunity when falling fertility produces a large working-age cohort relative to dependents?", "options": [{"text": "Population momentum", "isCorrect": false, "rationale": "Population momentum describes continued growth after fertility declines, not the working-age window."}, {"text": "The demographic dividend", "isCorrect": true, "rationale": "When fertility falls, the youth dependency burden eases before aging burdens rise — opening a window of high savings, capital accumulation, and growth."}, {"text": "The demographic transition", "isCorrect": false, "rationale": "The demographic transition is the broader process of birth- and death-rate decline; the dividend is one phase within it."}, {"text": "The replacement gap", "isCorrect": false, "rationale": "Not a standard demographic term."}]}, {"question": "Which countries are most often cited as having captured the demographic dividend in the late 20th century?", "options": [{"text": "Japan and Italy", "isCorrect": false, "rationale": "These are Stage 5 aging societies, not dividend-capturing economies."}, {"text": "Niger and Mali", "isCorrect": false, "rationale": "These are still in Stage 2 with high fertility and high youth dependency."}, {"text": "South Korea and Taiwan, particularly between roughly 1965 and 1995", "isCorrect": true, "rationale": "Falling fertility combined with productive employment of working-age cohorts drove rapid growth in this window."}, {"text": "Russia and Eastern European countries", "isCorrect": false, "rationale": "Many of these countries are in Stage 5 with shrinking populations and labor declines."}]}, {"question": "A near-rectangular age-structure pyramid like the United States typically reflects:", "options": [{"text": "Sustained below-replacement fertility for several generations", "isCorrect": false, "rationale": "Sustained below-replacement fertility produces narrow-base, urn-shaped pyramids."}, {"text": "Fertility close to replacement level combined with moderate immigration", "isCorrect": true, "rationale": "Roughly equal cohort sizes through middle age occur when fertility is near replacement and immigration replenishes younger cohorts."}, {"text": "A recent rapid increase in fertility", "isCorrect": false, "rationale": "Rising fertility would produce a broadening base, not a rectangle."}, {"text": "Mass mortality of working-age adults", "isCorrect": false, "rationale": "Mass mortality would create visible gaps in specific cohorts."}]}, {"question": "Stimulus: Country Y has a youth dependency ratio of 90 per 100 working-age adults and an elderly dependency ratio of 8 per 100 working-age adults. The country is most likely:", "options": [{"text": "A Stage 5 post-industrial country with below-replacement fertility", "isCorrect": false, "rationale": "Stage 5 countries have low youth dependency and high elderly dependency."}, {"text": "A Stage 2 high-fertility country with a broad-base pyramid", "isCorrect": true, "rationale": "Very high youth dependency and low elderly dependency are signatures of a high-fertility, young population — like Niger."}, {"text": "A country approaching demographic stability", "isCorrect": false, "rationale": "Stable countries have more balanced ratios, not 90-to-8."}, {"text": "A country with declining population due to mass emigration", "isCorrect": false, "rationale": "Emigration could distort cohorts, but the described skew points to high birth rates rather than emigration."}]}, {"question": "Why is the crude birth rate (CBR) less useful than the total fertility rate (TFR) for comparing fertility across countries?", "options": [{"text": "CBR is harder to measure than TFR", "isCorrect": false, "rationale": "Both rates are derivable from vital statistics; ease of measurement is similar."}, {"text": "CBR depends heavily on age structure, so a young population can show high CBR even with modest TFR", "isCorrect": true, "rationale": "A young population has many women in peak reproductive ages, inflating CBR even when each woman bears few children — TFR controls for this."}, {"text": "CBR includes immigration while TFR does not", "isCorrect": false, "rationale": "Neither rate directly includes immigration in its definition."}, {"text": "CBR cannot be calculated for countries with sex-ratio imbalances", "isCorrect": false, "rationale": "CBR is calculable for any population; the limitation is age-structure sensitivity."}]}, {"question": "An age-structure pyramid is most useful for demographers because it allows them to:", "options": [{"text": "Predict the next year's GDP growth precisely", "isCorrect": false, "rationale": "Pyramids inform demographic projections, not direct economic forecasts."}, {"text": "Infer past fertility and mortality patterns and project future population growth, labor force size, and dependency ratios", "isCorrect": true, "rationale": "Pyramids encode decades of demographic history and forecast what age cohorts will look like in 10–30 years."}, {"text": "Determine the carrying capacity of a country", "isCorrect": false, "rationale": "Carrying capacity is an ecological concept; pyramids describe age distribution."}, {"text": "Calculate the precise number of climate migrants", "isCorrect": false, "rationale": "Climate migration is a separate phenomenon shaped by environmental factors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
