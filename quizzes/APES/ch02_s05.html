    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Disturbance, Resilience, and Ecological Succession</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key difference between primary and secondary succession?", "options": [{"text": "Primary succession occurs in deserts; secondary in forests", "isCorrect": false, "rationale": "Both can occur in a wide range of biomes; the distinction is about substrate, not biome."}, {"text": "Primary succession occurs on newly exposed substrate that has no prior soil (bare rock, lava, fresh dunes); secondary succession occurs where disturbance has removed the community but the soil layer remains intact", "isCorrect": true, "rationale": "Correct. The presence or absence of soil is the defining difference, and it determines whether soil-building is required (primary) or skipped (secondary)."}, {"text": "Primary succession is faster than secondary succession", "isCorrect": false, "rationale": "The opposite is true — secondary succession is far faster because soil and seed bank persist."}, {"text": "Primary succession requires animal colonization first; secondary requires plants first", "isCorrect": false, "rationale": "Both modes typically begin with photosynthetic colonizers; animal colonization is generally later."}], "id": "q01"}, {"question": "Pioneer species in primary succession on bare rock are typically:", "options": [{"text": "Mature deciduous trees", "isCorrect": false, "rationale": "Mature trees require deep, established soil and cannot establish on bare mineral substrate."}, {"text": "Crustose lichens — composite organisms of fungi and photosynthetic algae or cyanobacteria — that tolerate desiccation, temperature swings, and absence of soil nutrients", "isCorrect": true, "rationale": "Correct. Lichens secrete organic acids that chemically weather rock and accumulate organic matter, gradually creating substrate for mosses and later species."}, {"text": "Carnivorous mammals", "isCorrect": false, "rationale": "Animals at higher trophic levels arrive much later, after autotrophic primary producers establish."}, {"text": "Climax-community canopy trees", "isCorrect": false, "rationale": "Climax species are the late-successional end state, not pioneers."}], "id": "q02"}, {"question": "At Glacier Bay, Alaska, alder thickets establish on glacially exposed substrate before Sitka spruce can. Why is the alder stage particularly important?", "options": [{"text": "Alders shade out competing species, allowing dominance", "isCorrect": false, "rationale": "Alders facilitate, not shade out, later species that need their nitrogen contribution."}, {"text": "Alders harbor nitrogen-fixing bacteria (Frankia) in root nodules and substantially increase soil nitrogen, enabling later establishment of nitrogen-demanding trees — a process called facilitation", "isCorrect": true, "rationale": "Correct. Facilitation is when early-successional species modify the environment in ways that enable later species, essentially engineering their own replacement."}, {"text": "Alders are pioneer species adapted to bare rock", "isCorrect": false, "rationale": "Alders are not first colonizers on bare rock; they establish after lichens, mosses, and herbs build initial soil."}, {"text": "Alders prevent any further succession from occurring", "isCorrect": false, "rationale": "Alders enable succession to continue toward Sitka spruce and hemlock; they do not arrest it."}], "id": "q03"}, {"question": "An abandoned agricultural field in the eastern US progresses through which approximate stage sequence?", "options": [{"text": "Bare rock - lichens - mosses - shrubs - trees", "isCorrect": false, "rationale": "This is primary succession; abandoned fields skip the rock-to-mosses stages because soil is intact."}, {"text": "Annual herbs (year 1) - perennial herbs/grasses (year 2) - shrubs (years 3-5) - pioneer trees (decade) - mixed forest (20-50 years)", "isCorrect": true, "rationale": "Correct. Secondary succession with intact soil and seed bank progresses rapidly through these stages on a typical timescale."}, {"text": "Mature forest within one growing season", "isCorrect": false, "rationale": "Mature forest takes decades to centuries even in optimal conditions."}, {"text": "Coniferous boreal forest in five years", "isCorrect": false, "rationale": "Boreal forest succession is regionally specific and takes longer than five years; the eastern-US sequence is broadleaved."}], "id": "q04"}, {"question": "Frederic Clements (1916) proposed that succession converges on a single stable end state determined by regional climate. What is this called, and how does modern ecology view it?", "options": [{"text": "Monoclimax theory; modern ecology has fully embraced it as the only correct view", "isCorrect": false, "rationale": "Modern ecology has substantially revised, not embraced, the strict monoclimax view."}, {"text": "Monoclimax theory; modern ecology has substantially revised it, recognizing that many communities are maintained in non-climax states by recurring disturbance and that late-successional composition varies by site history and chance colonization", "isCorrect": true, "rationale": "Correct. Gleason's individualistic view has largely won the debate while retaining 'climax' as a useful shorthand for relatively stable late-successional states."}, {"text": "Polyclimax theory; it is the universally accepted modern view", "isCorrect": false, "rationale": "Polyclimax is closer to but not identical with the modern individualistic view; the textbook frames the modern view as a Gleasonian revision."}, {"text": "Monoclimax theory; it has been completely abandoned", "isCorrect": false, "rationale": "It has been revised, not abandoned. The 'climax' concept retains some utility as shorthand for late-successional stability."}], "id": "q05"}, {"question": "Distinguish resistance from resilience using examples:", "options": [{"text": "Resistance and resilience mean the same thing", "isCorrect": false, "rationale": "They are distinct concepts that often trade off — communities high in one may be low in the other."}, {"text": "Resistance is the ability to avoid displacement when disturbed; resilience is the ability to recover after displacement. A community can be highly resistant but slow to recover, or easily displaced but quick to recover", "isCorrect": true, "rationale": "Correct. The two properties trade off, and managing for one may sacrifice the other."}, {"text": "Resistance applies only to plants; resilience applies only to animals", "isCorrect": false, "rationale": "Both properties apply to entire communities and ecosystems, not specific organism types."}, {"text": "Resistance is genetic; resilience is environmental", "isCorrect": false, "rationale": "Both are properties of communities and ecosystems, shaped by diversity, redundancy, connectivity, and disturbance history — not genetic vs environmental."}], "id": "q06"}, {"question": "Mount St. Helens erupted on 18 May 1980, leveling 600 km^2 of forest. What kind of succession followed and why?", "options": [{"text": "Secondary succession, because soil was preserved by snow", "isCorrect": false, "rationale": "The blast and pyroclastic flow stripped soil to bare tephra in many areas; primary succession is what proceeded there."}, {"text": "Primary succession on bare tephra, beginning with chemoautotrophic microbes deriving energy from mineral-rich substrate, followed by lupine (a nitrogen-fixer) and fireweed within years", "isCorrect": true, "rationale": "Correct. The eruption removed soil entirely in much of the blast zone, requiring primary succession to rebuild soil through pioneer species."}, {"text": "No succession occurred because the area was sterile", "isCorrect": false, "rationale": "Succession proceeded actively; chemoautotrophic microbes colonized first, followed by pioneer plants within two growing seasons."}, {"text": "Climax community immediately reformed", "isCorrect": false, "rationale": "Climax communities take decades to centuries to develop; the blast zone showed gradual succession through pioneer, mid-, and late-successional stages."}], "id": "q07"}, {"question": "What role did 'biological legacies' play in Mount St. Helens recovery?", "options": [{"text": "They prevented any colonization of the blast zone", "isCorrect": false, "rationale": "Biological legacies aided, not prevented, recovery."}, {"text": "They are surviving structures (logs, gopher-disturbed protected soil, surviving root systems) that provided habitat, nutrients, and surviving propagule sources during recovery", "isCorrect": true, "rationale": "Correct. Biological legacies (along with chance colonization and the surrounding landscape) shaped the trajectory of recovery and explain why succession was not a simple replay of pre-eruption conditions."}, {"text": "They are ash deposits that prevented soil formation", "isCorrect": false, "rationale": "Ash deposits are part of the disturbance, not biological legacies; legacies are the surviving biological/structural elements."}, {"text": "They are introduced species that dominate the new community", "isCorrect": false, "rationale": "Biological legacies are surviving native elements, not introduced species."}], "id": "q08"}, {"question": "An old field comparison study shows the field has higher Simpson's D than a managed lawn. Which management practice on the lawn most directly reduces D?", "options": [{"text": "Allowing all plants to grow without intervention", "isCorrect": false, "rationale": "This would increase D, not reduce it."}, {"text": "Regular mowing and herbicide application that suppress all plants except the desired turf grass, reducing both richness and evenness", "isCorrect": true, "rationale": "Correct. By selectively eliminating non-target plants, both species richness and evenness drop, lowering Simpson's D toward the dominance of one or a few grass species."}, {"text": "Adding fertilizer to encourage plant diversity", "isCorrect": false, "rationale": "Fertilizer typically favors competitive grasses, reducing diversity rather than increasing it."}, {"text": "Watering during droughts to keep all species alive", "isCorrect": false, "rationale": "Watering is not the primary mechanism by which lawn management reduces D; mowing and herbicide are."}], "id": "q09"}, {"question": "Aldo Leopold's 'land ethic' (1949) provides what argument for biodiversity conservation?", "options": [{"text": "That biodiversity protection should rest on economic utility alone", "isCorrect": false, "rationale": "Leopold's argument is precisely that economic utility is insufficient; moral obligation is also required."}, {"text": "That humans should expand their concept of community to include soils, waters, plants, and animals — grounding biodiversity protection in moral obligation as well as economic utility", "isCorrect": true, "rationale": "Correct. Leopold's argument, in A Sand County Almanac, is foundational to modern conservation biology because it legitimizes ecological-ethical reasoning alongside utilitarian arguments."}, {"text": "That ecological succession should always be prevented", "isCorrect": false, "rationale": "Leopold did not argue against succession; he argued for an ethical relationship with the entire biotic community."}, {"text": "That climax communities have no economic value", "isCorrect": false, "rationale": "Leopold did not make this claim; his argument expanded ethical consideration beyond, not against, economic value."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
