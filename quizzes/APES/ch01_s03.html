<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Biogeochemical Cycles I: Carbon and Hydrologic</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A biogeochemical cycle is defined as the path of a chemical element or compound through the biotic and abiotic components of an ecosystem. Which of the following correctly identifies the FOUR major reservoirs of the carbon cycle?", "options": [{"text": "Atmosphere, biosphere, hydrosphere, and lithosphere — with carbon stored as CO2/CH4 in air, organic compounds in organisms, dissolved CO2 and carbonate ions in water, and carbonate rocks/fossil fuels/soil organic matter in the lithosphere.", "isCorrect": true, "rationale": "These are the four reservoirs identified in the section. Each stores carbon for a characteristic residence time, and movement among them is what constitutes 'the carbon cycle.'"}, {"text": "Plants, animals, decomposers, and consumers.", "isCorrect": false, "rationale": "These are biotic categories within a single reservoir (the biosphere), not the four major reservoirs of the cycle."}, {"text": "The four spheres of Earth, but only the atmosphere holds carbon.", "isCorrect": false, "rationale": "All four spheres hold carbon. The atmosphere is one of the smaller reservoirs by mass; the lithosphere is by far the largest."}, {"text": "The atmosphere alone, since CO2 is the only carbon reservoir that matters environmentally.", "isCorrect": false, "rationale": "Carbon also resides in oceans, biomass, soils, and rocks. The cycle as a whole determines atmospheric CO2; restricting the answer to the atmosphere ignores the sinks and sources that drive change."}]}, {"question": "Residence time is the average length of time a substance spends in a given reservoir, calculated as reservoir size divided by outflow rate. Carbon in the atmosphere has a residence time on the order of years, while carbon in deep ocean sediments may reside for tens of millions of years. What does this contrast imply about the carbon cycle?", "options": [{"text": "All carbon reservoirs operate on the same timescale, because they exchange directly.", "isCorrect": false, "rationale": "The residence time contrast is precisely the point — different reservoirs operate on radically different timescales, which determines whether perturbations can be absorbed quickly."}, {"text": "The carbon cycle has both a fast loop (atmosphere-biosphere-ocean, years to centuries) and a slow loop (lithosphere, millions of years), with very different responses to perturbations.", "isCorrect": true, "rationale": "Short atmospheric residence time means atmosphere-biosphere-ocean exchange is rapid; long lithospheric residence time means rock-cycle carbon return takes millions of years. Human fossil-fuel use injects 'slow-loop' carbon into the 'fast loop' faster than sinks can absorb it."}, {"text": "Only atmospheric carbon is environmentally important, because deep-sediment carbon stays underground.", "isCorrect": false, "rationale": "Lithospheric carbon (fossil fuels, carbonate rocks) is environmentally critical when human activity transfers it to the atmosphere — exactly the issue with combustion."}, {"text": "Residence time is irrelevant to environmental policy because it cannot be measured.", "isCorrect": false, "rationale": "Residence time is well-quantified for major reservoirs and is central to projecting how long atmospheric CO2 will remain elevated under different emission scenarios."}]}, {"question": "Combustion of fossil fuels returns carbon to the atmosphere on a timescale of decades, whereas the natural process that sequestered that carbon — burial of organic matter under anoxic conditions and slow lithification — operates over millions of years. Why does this rate mismatch matter for understanding contemporary climate change?", "options": [{"text": "It does not matter; carbon is carbon regardless of source.", "isCorrect": false, "rationale": "Source matters because the rate of release determines whether sinks can keep up. Carbon released a million times faster than it was buried overwhelms the sinks."}, {"text": "Because the ocean and terrestrial sinks cannot absorb the excess CO2 quickly enough to match the rate of release, atmospheric CO2 rises — the fundamental driver of contemporary climate change.", "isCorrect": true, "rationale": "The section states this directly. Slow-loop carbon entering the fast loop at decadal rates exceeds sink capacity, driving atmospheric accumulation. This is the central mechanism behind anthropogenic CO2 increase."}, {"text": "Combustion of fossil fuels is a natural process and has no geological precedent for concern.", "isCorrect": false, "rationale": "The section emphasizes that 'human fossil-fuel use has no geological precedent in terms of rate.' Concern is justified by precisely this lack of precedent."}, {"text": "The mismatch matters only because volcanic CO2 emissions exceed those from fossil fuels.", "isCorrect": false, "rationale": "Anthropogenic CO2 emissions are roughly 100 times greater than current volcanic outgassing. Volcanoes are part of the slow loop and are not the dominant contemporary source."}]}, {"question": "A flux is the rate of flow of material between two reservoirs (e.g., Pg C/yr, where 1 Pg = 10^15 g). A reservoir whose total inflows exceed outflows is called a carbon SINK; one whose outflows exceed inflows is a SOURCE. Forests in the tropical zone currently absorb more CO2 through photosynthesis than they release through respiration. What does this imply about the tropical forest carbon balance?", "options": [{"text": "Tropical forests are currently a carbon source.", "isCorrect": false, "rationale": "If absorption exceeds release, the inflows exceed the outflows, making the system a sink, not a source."}, {"text": "Tropical forests are currently a carbon sink, removing more atmospheric carbon than they release.", "isCorrect": true, "rationale": "By the definitions in the section, a reservoir whose inflows exceed outflows is a sink. Photosynthetic uptake exceeding respiratory release places intact tropical forests in this category."}, {"text": "Tropical forests are exactly balanced, with no net carbon transfer.", "isCorrect": false, "rationale": "If inflows and outflows were exactly balanced, the system would be in dynamic equilibrium. The premise specifies that absorption exceeds release."}, {"text": "Tropical forests do not exchange carbon with the atmosphere.", "isCorrect": false, "rationale": "Photosynthesis and respiration both transfer carbon between forest and atmosphere; the question is the net direction, not whether exchange occurs."}]}, {"question": "Carbon sequestration is defined as long-term removal of CO2 from the atmosphere and storage in a reservoir with a long residence time. Which combination correctly distinguishes natural from engineered sequestration?", "options": [{"text": "Natural — capture at power plants and injection into geological formations; engineered — forest growth and ocean uptake.", "isCorrect": false, "rationale": "These pairings are inverted. Forest growth and ocean uptake are natural; capture-and-storage technologies are engineered."}, {"text": "Natural — forest growth and ocean uptake; engineered — capture at power plants and injection into geological formations.", "isCorrect": true, "rationale": "These match the section's definitions. Natural sequestration uses biological and physical-chemical processes; engineered sequestration uses industrial capture and geological injection."}, {"text": "Natural and engineered sequestration are the same process; the only difference is where the CO2 goes.", "isCorrect": false, "rationale": "The mechanisms differ substantially. Forest growth uses photosynthesis; engineered capture uses industrial absorbers and physical injection."}, {"text": "Both sequestration types operate only on the slow loop (millions of years).", "isCorrect": false, "rationale": "Forest sequestration operates on decadal-to-centennial timescales; geological injection aims at long but not millions-of-year storage. Both differ from natural slow-loop lithification."}]}, {"question": "Evapotranspiration (ET) is the combined water loss from a land surface through direct evaporation from soil and open water plus transpiration through plant stomata. The section states that the Amazon's forests effectively 'manufacture' much of their own rainfall. Which mechanism BEST explains this claim?", "options": [{"text": "Tropical forests transpire enormous quantities of water vapor that recycles back as rainfall on downwind portions of the same forest, sustaining the regional hydrologic cycle.", "isCorrect": true, "rationale": "Forest canopies move large volumes of soil water through roots, leaves, and stomata back to the atmosphere. In Amazonia much of that vapor returns as precipitation downwind, creating a self-sustaining moisture cycle that deforestation can break."}, {"text": "Trees physically condense water vapor in their cells and release liquid water as 'rainfall.'", "isCorrect": false, "rationale": "This is not the mechanism. Trees release water vapor through transpiration; condensation occurs later in the atmosphere, not in plant cells."}, {"text": "Tropical forests pump groundwater directly into the atmosphere through pressurized leaves.", "isCorrect": false, "rationale": "Transpiration is driven by passive evaporation from leaf surfaces and stomatal opening, not by leaf-driven pressurized ejection."}, {"text": "Amazonian rainfall is generated entirely by ocean evaporation upwind, with no contribution from forest transpiration.", "isCorrect": false, "rationale": "The Amazon's regional water budget receives a substantial contribution from forest transpiration, which is why deforestation can shift regional precipitation patterns."}]}, {"question": "A city paves over a large wetland for development, converting permeable soil and vegetation to impervious surfaces (roads, parking lots, roofs). Using the hydrologic cycle, which TWO consequences should you predict?", "options": [{"text": "Decreased runoff and increased groundwater recharge.", "isCorrect": false, "rationale": "Impervious surfaces have the opposite effect — they prevent water from infiltrating, so runoff goes up and recharge goes down."}, {"text": "Increased runoff (more water flows over surface to streams, raising flood risk) and decreased groundwater recharge (less water infiltrates to refill aquifers).", "isCorrect": true, "rationale": "These are the two textbook consequences of urbanization on the water cycle. Impervious surfaces shed precipitation as overland flow, both intensifying flood peaks and reducing the slow-percolation input that sustains aquifers."}, {"text": "Increased evapotranspiration because pavement retains heat.", "isCorrect": false, "rationale": "Pavement holds little water and supports no transpiring plants, so ET typically decreases — sometimes substantially — with urbanization."}, {"text": "No change, because the total volume of water entering the watershed is unchanged.", "isCorrect": false, "rationale": "Total precipitation may be unchanged, but its partitioning between runoff, infiltration, and ET shifts dramatically, with major hydrological consequences."}]}, {"question": "An aquifer is a permeable geological formation that stores and transmits groundwater. The Ogallala aquifer in the central United States accumulated over thousands of years under wetter climates and is now being drawn down faster than recharge can replace it. What term is used in the section for this kind of finite-water depletion, and what does it imply for management?", "options": [{"text": "'Renewable water,' implying that current extraction can continue indefinitely.", "isCorrect": false, "rationale": "The section calls this 'fossil water' depletion precisely because recharge is too slow to replace withdrawals on human timescales — the resource is effectively non-renewable."}, {"text": "'Fossil water' depletion, implying there is no short-term solution because recharge is too slow on human timescales.", "isCorrect": true, "rationale": "The section uses the phrase 'fossil water' to describe groundwater accumulated under past wetter climates and drawn down faster than it can be replaced. The implication is that depletion is, for practical purposes, permanent."}, {"text": "'Surface water' depletion, since aquifer water is identical to lake water.", "isCorrect": false, "rationale": "Aquifer water is groundwater; the management challenge is that recharge timescales are far slower than for surface water, where rainfall input is direct and seasonal."}, {"text": "'Ocean water' depletion, since all groundwater eventually flows to the sea.", "isCorrect": false, "rationale": "Groundwater eventually does interact with surface water and oceans, but the term 'fossil water' specifically captures the recharge-rate mismatch with current withdrawal."}]}, {"question": "The carbon cycle and the hydrologic cycle are intimately linked. Which of the following BEST describes a coupling between the two cycles that the section emphasizes?", "options": [{"text": "Soil moisture controls decomposition rates and therefore the release of CO2 from organic matter; changes in precipitation patterns alter terrestrial carbon storage.", "isCorrect": true, "rationale": "Decomposition is moisture-sensitive: dry soils slow microbial activity and store carbon; wet soils accelerate decomposition and release CO2. Shifts in regional precipitation therefore directly affect terrestrial carbon balance."}, {"text": "Water and carbon cycles are physically separate and never interact at the molecular level.", "isCorrect": false, "rationale": "Water is a reactant in photosynthesis and a product of respiration; the cycles are coupled at every step from molecule to ecosystem."}, {"text": "The hydrologic cycle has a slow loop in the lithosphere just like the carbon cycle does.", "isCorrect": false, "rationale": "The section explicitly states the hydrologic cycle has no significant geological slow loop; water cycles entirely through physical and biological processes on timescales of days to thousands of years."}, {"text": "Climate cooling accelerates the water cycle, whereas warming slows it.", "isCorrect": false, "rationale": "The section states climate warming accelerates the water cycle overall (more evaporation, more intense precipitation, faster melting). The relationship is the opposite of this option."}]}, {"question": "Which of the following BEST distinguishes a carbon source from a carbon sink, with a correct natural example of each?", "options": [{"text": "A source has inflows greater than outflows (example: ocean during glacial periods); a sink has outflows greater than inflows (example: volcano).", "isCorrect": false, "rationale": "The directions are inverted. A sink has inflows > outflows; a source has outflows > inflows. The examples are also miscategorized."}, {"text": "A sink has inflows greater than outflows so net carbon accumulates (example: a growing forest); a source has outflows greater than inflows so net carbon is released (example: combustion of fossil fuels or active volcano).", "isCorrect": true, "rationale": "These pairings are correct by the section's definitions. A growing forest takes up more CO2 than it releases (sink); volcanoes and fossil-fuel combustion release more than they absorb (source). The distinction is essential to understanding why current atmospheric CO2 is rising."}, {"text": "A sink and source are the same thing because matter is conserved.", "isCorrect": false, "rationale": "Conservation of matter does not collapse the source-sink distinction. Sources and sinks are defined by net flux direction at a given point in time, not by overall matter conservation."}, {"text": "Only artificial systems can be carbon sinks; natural systems cannot.", "isCorrect": false, "rationale": "Forests, oceans, and soils are major natural sinks. The section explicitly cites forest growth and ocean uptake as examples of natural sequestration."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
