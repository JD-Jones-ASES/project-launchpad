    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; The Greenhouse Effect and Anthropogenic Climate Change</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Earth's surface temperature is approximately 33 degrees C warmer than the temperature a bare rock at our distance from the Sun would equilibrate at. What molecular property of greenhouse gases enables this temperature difference?", "options": [{"text": "Greenhouse gases reflect incoming solar radiation back into space, warming the surface through albedo effects.", "isCorrect": false, "rationale": "Greenhouse gases do not significantly reflect incoming visible light; the atmosphere is largely transparent to incoming solar radiation. Surface warming is from outgoing infrared absorption."}, {"text": "Greenhouse gases (water vapor, CO2, methane, N2O, ozone) have three or more atoms whose molecular vibrations absorb outgoing infrared and re-radiate it in all directions, including back toward the surface.", "isCorrect": true, "rationale": "Triatomic and larger molecules vibrate at infrared frequencies. They absorb the long-wavelength infrared emitted by the warmed surface and re-emit it isotropically — half back toward the surface — which is the physical basis of the greenhouse effect."}, {"text": "Greenhouse gases trap incoming solar visible light directly in the atmosphere.", "isCorrect": false, "rationale": "Visible light passes through the atmosphere with little absorption. Only the outgoing infrared from the warmed surface is absorbed by greenhouse gases."}, {"text": "Greenhouse gases are denser than nitrogen and oxygen, so they form a thermal blanket near the surface.", "isCorrect": false, "rationale": "Density is not the mechanism. Greenhouse gases work via vibrational absorption of infrared, not by physical layering."}], "id": "q01"}, {"question": "The table compares four greenhouse gases on three dimensions:\n\nGas | Pre-industrial | 2024 concentration | GWP_100\nCO2 | 280 ppm | 422 ppm | 1\nCH4 | 700 ppb | 1930 ppb | 27-30\nN2O | 270 ppb | 336 ppb | 273\nSF6 | 0 | trace | 23,500\n\nWhich gas in the table contributes the most to current anthropogenic warming despite having the lowest GWP per molecule, and why?", "options": [{"text": "SF6, because its GWP is highest at 23,500.", "isCorrect": false, "rationale": "SF6 has the highest GWP but its concentration is at trace levels — its total contribution to forcing is small."}, {"text": "CO2, because its concentration and increase (51% above pre-industrial) and its decades-to-centuries atmospheric lifetime mean its cumulative contribution to total forcing far exceeds the others.", "isCorrect": true, "rationale": "Despite its GWP of 1, CO2's massive concentration increase (142 ppm) and persistence over decades to millennia produce the largest cumulative radiative forcing of any anthropogenic gas — about 2.1 W/m^2 alone."}, {"text": "CH4, because its GWP_100 is 27-30 times higher than CO2.", "isCorrect": false, "rationale": "Methane has higher GWP per molecule but a much shorter atmospheric lifetime (~12 years) and much lower total forcing than CO2."}, {"text": "N2O, because nitrogen fertilizers produce the largest absolute emissions.", "isCorrect": false, "rationale": "N2O fertilizer emissions are significant but much smaller in total forcing than CO2 from fossil fuel combustion."}], "id": "q02"}, {"question": "A skeptic argues: \"Water vapor is the most abundant greenhouse gas in the atmosphere, so human CO2 emissions are climatically unimportant.\" Why does this argument fail?", "options": [{"text": "Water vapor is not actually a greenhouse gas because it does not absorb infrared.", "isCorrect": false, "rationale": "Water vapor IS a greenhouse gas — in fact the strongest in the atmosphere. The skeptic's premise about water vapor is partly correct."}, {"text": "The argument confuses forcings and feedbacks. Water vapor concentration is determined by temperature (~7% increase per degree C) and acts as an amplifying feedback to whatever drives the initial warming. CO2 is a forcing — an external driver of the warming that water vapor then amplifies.", "isCorrect": true, "rationale": "Water vapor is a feedback (concentration responds to temperature), not a forcing (independent driver). CO2 sets the temperature change, and water vapor roughly doubles it. Removing CO2 forcing would reduce water vapor through feedback."}, {"text": "Water vapor is concentrated in the lower atmosphere where greenhouse effect is weaker.", "isCorrect": false, "rationale": "Water vapor is most concentrated in the lower atmosphere, but this is where most infrared exchange happens. The argument's failure is about feedback vs. forcing, not altitude."}, {"text": "Human emissions of water vapor exceed CO2, so they are equally important.", "isCorrect": false, "rationale": "Direct anthropogenic water vapor emissions are negligible compared to natural fluxes. The atmospheric water content is set by temperature, not by human emissions."}], "id": "q03"}, {"question": "Which feedback mechanism roughly doubles the direct warming that CO2 alone would produce, and is the largest single amplifying feedback in the climate system?", "options": [{"text": "Ice-albedo feedback in the Arctic.", "isCorrect": false, "rationale": "Ice-albedo feedback is important for Arctic amplification but its global magnitude is smaller than the water-vapor feedback."}, {"text": "Permafrost methane feedback as Arctic soils thaw.", "isCorrect": false, "rationale": "Permafrost feedback is concerning but operates on slower timescales and is smaller in current magnitude than the water-vapor feedback."}, {"text": "Water-vapor feedback (warmer air holds more water vapor, ~7% more per degree C, amplifying outgoing infrared trapping).", "isCorrect": true, "rationale": "Warmer air holds about 7% more water vapor per degree C of warming. The added vapor amplifies infrared trapping, roughly doubling the temperature response to CO2 forcing alone — the dominant amplifying feedback."}, {"text": "Cloud feedback from increased low-altitude cloud cover.", "isCorrect": false, "rationale": "Net cloud feedback sign and magnitude remain uncertain — clouds both reflect sunlight (cooling) and trap infrared (warming). Cloud feedback is the largest source of uncertainty, not the largest amplifier."}], "id": "q04"}, {"question": "A graph shows global average surface temperature anomaly relative to the 1850-1900 baseline rising sharply after about 1975. According to attribution science, which conclusion is best supported by climate model comparisons of natural-only versus natural-plus-anthropogenic forcing scenarios?", "options": [{"text": "Natural variability (volcanoes, solar output, ENSO) explains all the observed warming.", "isCorrect": false, "rationale": "Natural-forcing-only model runs cannot reproduce the post-1975 warming. Models including anthropogenic forcing match observations well; models without it diverge from observed temperature."}, {"text": "Anthropogenic emissions are the dominant cause of observed warming since the mid-20th century, as IPCC AR6 (2021) concluded with the language 'it is unequivocal that human influence has warmed the atmosphere, ocean and land.'", "isCorrect": true, "rationale": "AR6's use of 'unequivocal' reflects convergence across multiple independent lines of attribution evidence: model runs, paleoclimate reconstructions, and direct emission accounting all converge on anthropogenic dominance."}, {"text": "The observed warming is artifact of urban heat-island contamination of weather stations.", "isCorrect": false, "rationale": "Multiple analyses controlling for or excluding urban stations find the same warming trend. The signal is robust to that source of error."}, {"text": "Natural and anthropogenic forcings contribute equally to observed warming.", "isCorrect": false, "rationale": "Detection-attribution analyses consistently show that observed warming since the mid-20th century cannot be explained without anthropogenic forcing dominating."}], "id": "q05"}, {"question": "A student is asked to rank these greenhouse gases by GWP_100 from highest to lowest: CO2, CH4, N2O, SF6. Which order is correct?", "options": [{"text": "CO2 > CH4 > N2O > SF6", "isCorrect": false, "rationale": "CO2 has GWP_100 = 1 (the reference). The other three all have far higher GWP per molecule."}, {"text": "SF6 > N2O > CH4 > CO2", "isCorrect": true, "rationale": "GWP_100 values: SF6 ~23,500; N2O ~273; CH4 ~27-30; CO2 = 1 (reference). CO2's importance comes from concentration and lifetime, not GWP per molecule."}, {"text": "CH4 > SF6 > CO2 > N2O", "isCorrect": false, "rationale": "Methane has GWP_100 of about 27-30, well below SF6 and N2O."}, {"text": "N2O > SF6 > CH4 > CO2", "isCorrect": false, "rationale": "SF6 has the highest GWP_100 of any well-characterized atmospheric gas at approximately 23,500, exceeding N2O."}], "id": "q06"}, {"question": "Mars has a much higher CO2 percentage in its atmosphere than Earth does, yet has a much smaller greenhouse effect. What single variable best explains this paradox?", "options": [{"text": "The molecular structure of CO2 differs in lower atmospheric pressure.", "isCorrect": false, "rationale": "CO2 is the same molecule. The molecular properties do not change between planets."}, {"text": "Total atmospheric mass / column density. Mars's atmosphere is about 100 times less dense than Earth's, so even at high CO2 fraction the absolute number of CO2 molecules per unit area is small.", "isCorrect": true, "rationale": "Greenhouse warming depends on the column abundance of absorbing molecules, not the mixing ratio. Mars has high CO2 fraction but very thin atmosphere, so total CO2 column is small."}, {"text": "Mars receives less solar radiation, so the greenhouse effect cannot operate.", "isCorrect": false, "rationale": "Mars receives less solar radiation but the greenhouse mechanism still works — it just operates on a much smaller heat budget."}, {"text": "Mars lacks water vapor feedback, eliminating greenhouse warming entirely.", "isCorrect": false, "rationale": "Water-vapor feedback amplifies, but does not create, greenhouse warming. Even without water, CO2 alone would produce a measurable greenhouse effect on a thicker Mars atmosphere."}], "id": "q07"}, {"question": "The pre-industrial concentration of atmospheric CO2 was approximately 280 ppm; the 2024 value is approximately 422 ppm. Express this as a percent increase. The natural glacial-interglacial range visible in ice cores is roughly 180-280 ppm. What does the 2024 value indicate about the current atmospheric state?", "options": [{"text": "About a 25% increase, well within the natural range.", "isCorrect": false, "rationale": "(422 - 280) / 280 = 51%, not 25%. And 422 ppm is far above the 180-280 ppm natural range."}, {"text": "About a 51% increase; 2024 CO2 is well above the natural glacial-interglacial maximum, placing the atmosphere in a state unprecedented in the 800,000-year ice-core record.", "isCorrect": true, "rationale": "(422 - 280) / 280 = 142/280 = 51%. This places CO2 at roughly 142 ppm above the natural maximum (280 ppm) — a state not seen in 800,000 years of ice-core data."}, {"text": "About a 51% increase; the value lies at the upper end of the natural range.", "isCorrect": false, "rationale": "The 51% increase calculation is correct but 422 ppm is far above (not at the upper end of) the natural range of 180-280 ppm."}, {"text": "About a 142% increase; the value is consistent with the historical natural maximum.", "isCorrect": false, "rationale": "The percent change calculation is wrong (it should be 51%, not 142%), and 422 ppm is far above the historical maximum of 280 ppm."}], "id": "q08"}, {"question": "Which negative feedback ultimately prevents runaway warming and returns the climate system to energy balance at a higher temperature?", "options": [{"text": "Increased plant photosynthesis absorbing more atmospheric CO2.", "isCorrect": false, "rationale": "Plants do absorb additional CO2 (the CO2 fertilization effect), but this carbon-cycle feedback is small and saturates. It is not the primary thermodynamic stabilizer."}, {"text": "The Planck response: by the Stefan-Boltzmann law (radiation flux ~ T^4), a warmer Earth radiates more energy to space, returning the system to balance at a new, higher equilibrium temperature.", "isCorrect": true, "rationale": "Stefan-Boltzmann radiation increases as the fourth power of temperature, so any temperature rise produces a larger outgoing energy flux. This Planck response is the dominant negative feedback that prevents runaway warming."}, {"text": "Cloud feedbacks reflecting all additional incoming sunlight.", "isCorrect": false, "rationale": "Cloud feedbacks have uncertain net sign — some clouds warm, others cool. They do not reliably counteract additional warming."}, {"text": "Ocean absorption of CO2 indefinitely buffering atmospheric concentrations.", "isCorrect": false, "rationale": "Ocean CO2 uptake is significant but slowing as the surface ocean acidifies and saturates. It is not a fast or sufficient stabilizer."}], "id": "q09"}, {"question": "The principal anthropogenic greenhouse gas methane (CH4) has multiple sources. Which combination correctly identifies the main anthropogenic methane sources?", "options": [{"text": "Volcanic eruptions and wildfires are the dominant sources.", "isCorrect": false, "rationale": "Volcanoes and wildfires are minor methane sources. The dominant anthropogenic sources are fossil fuels, livestock, rice paddies, and landfills."}, {"text": "Fossil-fuel extraction and distribution leakage, livestock enteric fermentation, rice paddy flooding (anaerobic decomposition), landfill decomposition, and thawing permafrost.", "isCorrect": true, "rationale": "These are the principal anthropogenic methane sources. Fossil fuel leakage, ruminant digestion, flooded rice paddies (anaerobic), and decomposing organic waste all release methane."}, {"text": "Photosynthesis releases methane as a respiration byproduct.", "isCorrect": false, "rationale": "Photosynthesis produces oxygen, not methane. Plants do not release methane as a regular metabolic product."}, {"text": "Ocean acidification releases methane from carbonate dissolution.", "isCorrect": false, "rationale": "Ocean acidification involves CO2 chemistry, not methane release. Submarine methane hydrates can release CH4 if disturbed but this is not the dominant flux."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
