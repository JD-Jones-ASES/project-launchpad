    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Stratospheric Ozone Depletion and the Montreal Protocol</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A chemistry student measures CFC-12 (CCl2F2) concentrations at two altitudes: 5 km and 30 km. The 5 km sample is unchanged after 6 months, but the 30 km sample shows substantial breakdown. Which property of CFCs best explains why the molecule survives in the troposphere but breaks apart in the stratosphere?", "options": [{"text": "CFCs are denser than air, so they only mix into the stratosphere when wind currents lift them.", "isCorrect": false, "rationale": "CFCs do mix slowly upward, but density is not the cause of differential breakdown. The key difference is the radiation environment, not the lifting mechanism."}, {"text": "Tropospheric water vapor coats CFC molecules and protects them, while the dry stratosphere allows reactions to proceed.", "isCorrect": false, "rationale": "Water vapor does not coat CFCs. CFCs are notable for not reacting with water vapor or hydroxyl radicals, which is why they accumulate in the troposphere."}, {"text": "CFCs are chemically inert in the troposphere because they do not react with hydroxyl radicals or water, but in the stratosphere intense UV-C radiation cleaves their carbon-chlorine bonds and liberates free chlorine atoms.", "isCorrect": true, "rationale": "This is the central insight of Molina and Rowland's 1974 work. CFCs' tropospheric inertness made them appear safe, but it allows them to accumulate and drift across the tropopause where UV-C does what tropospheric chemistry could not."}, {"text": "Stratospheric oxygen levels are higher, providing reactive partners for CFC breakdown that are absent below.", "isCorrect": false, "rationale": "Stratospheric oxygen is actually less concentrated than tropospheric oxygen because air thins with altitude. UV radiation, not oxygen abundance, drives the breakdown."}]}, {"question": "Which step of the Cl-mediated catalytic ozone destruction cycle is responsible for regenerating the chlorine atom so that a single Cl can destroy roughly 100,000 ozone molecules?", "options": [{"text": "Cl + O3 -> ClO + O2", "isCorrect": false, "rationale": "This is the destruction step: ozone is consumed and chlorine monoxide is formed. The chlorine atom has not yet been regenerated."}, {"text": "ClO + O -> Cl + O2", "isCorrect": true, "rationale": "In this step, ClO reacts with atomic oxygen, releasing the chlorine atom in its original form so it can attack another O3. The catalyst is restored, enabling thousands of destruction cycles."}, {"text": "Cl + CH4 -> HCl + CH3", "isCorrect": false, "rationale": "This is a sink reaction that removes chlorine from the destruction cycle by sequestering it as the reservoir species HCl. It terminates rather than regenerates."}, {"text": "O2 + UV -> 2O", "isCorrect": false, "rationale": "This is part of the natural Chapman cycle that produces atomic oxygen, not part of the chlorine catalytic destruction loop itself."}]}, {"question": "A student in 1985 reads that British Antarctic Survey scientists at Halley Bay have discovered a 50% drop in October stratospheric ozone above Antarctica. Why is the ozone hole far more severe over Antarctica than over the mid-latitudes, even though CFCs are emitted globally?", "options": [{"text": "Antarctica produces more chlorofluorocarbons than the populated continents because of refrigeration in research stations.", "isCorrect": false, "rationale": "Antarctic CFC emissions are negligible. CFCs originate from industrial activity in inhabited regions and reach Antarctica by atmospheric transport."}, {"text": "The Antarctic stratosphere is colder, so polar stratospheric clouds form and their surfaces catalyze the conversion of stable chlorine reservoirs into reactive Cl2 that photodissociates when sunlight returns in spring.", "isCorrect": true, "rationale": "PSC ice crystals form below approximately -78 degrees Celsius and catalyze heterogeneous reactions converting HCl and ClONO2 into Cl2. When austral spring sun returns, Cl2 splits into Cl atoms that explosively destroy ozone."}, {"text": "The polar vortex pulls in CFC-rich air from the equator, concentrating chlorine over the pole.", "isCorrect": false, "rationale": "The polar vortex actually isolates Antarctic stratospheric air from mid-latitude air. The hole forms because the isolated air is trapped during long winter darkness, allowing chlorine activation chemistry to build up."}, {"text": "Solar UV intensity is naturally higher above Antarctica because of the angle of incidence.", "isCorrect": false, "rationale": "UV intensity is actually lower at the poles due to the oblique solar angle. The hole reflects unique polar chemistry, not unusual UV input."}]}, {"question": "The table below shows changes in the Antarctic ozone hole and global stratospheric chlorine over time:\n\nYear | Stratospheric Cl loading (ppb) | Hole area (million km^2)\n1980 | 1.5 | 0\n1997 | 3.5 | 22\n2006 | 3.4 | 29.9\n2023 | 2.7 | 22\n\nThe student concludes the Montreal Protocol has been effective. Which observation in the data most directly supports this conclusion?", "options": [{"text": "The hole reached its maximum extent in 2006, proving the protocol failed.", "isCorrect": false, "rationale": "Maximum hole extent in 2006 reflects past CFC emissions still active in the stratosphere. CFCs persist for decades, so the recovery signal is delayed even after emissions cease."}, {"text": "Stratospheric chlorine loading peaked around 1997 and has since declined to 2.7 ppb in 2023, showing the phase-out has reduced the source.", "isCorrect": true, "rationale": "Stratospheric Cl loading peaking in 1997 and declining since is the canonical compliance signal. NOAA and WMO atmospheric monitoring confirms this trajectory matches the projected protocol response."}, {"text": "The 2023 hole area is the same as 1997, indicating no recovery has occurred.", "isCorrect": false, "rationale": "Hole area is highly variable year to year due to weather patterns; the long-term recovery is signaled by chlorine loading, not single-year area readings."}, {"text": "Hole area in 1980 was zero, so depletion started after the protocol entered force.", "isCorrect": false, "rationale": "Hole area was small but nonzero in 1980; the issue is reverse causation. The protocol entered force in 1989, after the hole had already formed."}]}, {"question": "A textbook excerpt of Article 2A of the Montreal Protocol describes a stepped CFC reduction: freeze at 1986 levels, then 50% reduction, then complete elimination. What was the primary purpose of this stepped (rather than immediate) phase-out architecture?", "options": [{"text": "To allow industries time to develop and patent substitute chemicals and to give developing nations time to transition without economic shock.", "isCorrect": true, "rationale": "Stepped reduction with Article 5 grace periods gave chemical companies an incentive to invent substitutes (which they could patent) and gave developing nations time to acquire substitute technology, both essential for keeping the treaty politically viable."}, {"text": "To allow scientists time to confirm whether ozone depletion was actually occurring before mandating action.", "isCorrect": false, "rationale": "The science was already clear by 1987 (Molina-Rowland 1974, Farman 1985). The phased approach was a political and economic accommodation, not scientific hedging."}, {"text": "To reduce the financial penalty for non-compliance with the treaty's enforcement provisions.", "isCorrect": false, "rationale": "There were no major financial penalties for non-compliance. The protocol relies on multilateral consultation and trade restrictions, not fines."}, {"text": "To ensure CFC concentrations remained at 1986 levels permanently as a long-term compromise.", "isCorrect": false, "rationale": "The 1986 freeze was only an interim target. The complete elimination of Group I substances was the explicit endpoint of the schedule."}]}, {"question": "Which property is shared by tropospheric ozone and stratospheric ozone?", "options": [{"text": "Both protect humans from skin cancer and DNA damage.", "isCorrect": false, "rationale": "Only stratospheric ozone shields life from UV-B/UV-C. Tropospheric ozone is a respiratory irritant and a secondary pollutant."}, {"text": "Both consist of three oxygen atoms (O3) but differ profoundly in their effects on life depending on altitude.", "isCorrect": true, "rationale": "Both layers are made of the same molecule. The biological consequence depends entirely on where in the atmosphere the molecule is located: high it shields, low it injures."}, {"text": "Both are produced by Chapman-cycle photochemistry from molecular oxygen.", "isCorrect": false, "rationale": "Stratospheric ozone is from Chapman-cycle photochemistry. Tropospheric ozone is a secondary pollutant from NOx and VOC reactions in sunlight, a different chemical pathway."}, {"text": "Both are measured in Dobson units in the lower atmosphere.", "isCorrect": false, "rationale": "Dobson units describe stratospheric column abundance. Tropospheric ozone is measured in concentration units (ppb) at ground level."}]}, {"question": "The Kigali Amendment to the Montreal Protocol was added in 2016. Which gas family does it phase down, and why is this important for climate policy in addition to ozone protection?", "options": [{"text": "It phases down chlorofluorocarbons (CFCs) because their global warming potential remains too high.", "isCorrect": false, "rationale": "CFCs were already covered under the original protocol. By 2016 their production was largely phased out."}, {"text": "It phases down hydrofluorocarbons (HFCs), which do not deplete ozone but are potent greenhouse gases (GWP up to 14,800), with full compliance projected to prevent 0.3-0.5 degrees C of warming by 2100.", "isCorrect": true, "rationale": "HFCs were introduced as ozone-safe CFC replacements but turned out to be powerful greenhouse gases. Kigali makes the protocol the largest near-term climate co-benefit treaty in force."}, {"text": "It phases down sulfur hexafluoride (SF6) used in electrical switchgear.", "isCorrect": false, "rationale": "SF6 is a greenhouse gas of concern but is not regulated under Kigali; it is addressed through other mechanisms."}, {"text": "It phases down nitrous oxide (N2O) from synthetic fertilizers.", "isCorrect": false, "rationale": "N2O is the dominant ozone-depleting substance now that CFCs decline, but it is regulated under climate frameworks (UNFCCC), not the Montreal Protocol."}]}, {"question": "Why is one chlorine atom released by a single CFC molecule capable of destroying an estimated 100,000 ozone molecules before being neutralized?", "options": [{"text": "Because chlorine is a very reactive halogen and consumes ozone aggressively until depleted.", "isCorrect": false, "rationale": "Reactivity alone does not explain the magnification. The atom would be consumed once if not for regeneration."}, {"text": "Because the chlorine atom acts as a catalyst — it is regenerated at the end of each two-step cycle and can re-enter the destruction loop until a sink reaction (such as Cl + CH4 -> HCl) finally sequesters it.", "isCorrect": true, "rationale": "The catalytic two-step cycle (Cl + O3 -> ClO + O2; ClO + O -> Cl + O2) returns the chlorine in its original form, ready to destroy another ozone molecule. Only competing sink reactions terminate the cycle."}, {"text": "Because each CFC molecule releases multiple chlorine atoms over its lifetime through repeated UV exposure.", "isCorrect": false, "rationale": "A typical CFC molecule releases its chlorines in a single decomposition event. The amplification is from catalytic recycling of those chlorines, not from continuous release."}, {"text": "Because ozone molecules cluster densely in the stratosphere, making collision with chlorine very probable.", "isCorrect": false, "rationale": "Ozone is actually quite dilute in the stratosphere. The catalytic cycle is what makes the rate of destruction so high."}]}, {"question": "A student asks: \"If CFCs were stopped in 1996 in developed countries, why won't the Antarctic ozone hole disappear until around 2090?\" Which answer best explains the timeline?", "options": [{"text": "CFCs in the stratosphere are extremely stable and remain there for many decades, slowly being broken down. The atmospheric chlorine reservoir must decline before ozone can fully recover.", "isCorrect": true, "rationale": "CFCs have stratospheric residence times of 50-100+ years. Even after emissions stop, existing stratospheric chlorine continues to circulate and destroy ozone for decades."}, {"text": "Because PSCs continue to form in the Antarctic winter, they will keep producing reactive chlorine forever.", "isCorrect": false, "rationale": "PSCs only matter when reactive chlorine is present. As stratospheric chlorine declines, PSCs can no longer drive significant ozone destruction."}, {"text": "Because developing nations were given longer phase-out periods, their continued CFC use prevents recovery.", "isCorrect": false, "rationale": "Developing nation phase-outs (Article 5) are essentially complete. The recovery delay is dominated by stratospheric residence time, not ongoing emissions."}, {"text": "Because UV radiation continues to enter the stratosphere and create ozone hole conditions.", "isCorrect": false, "rationale": "UV is the energy source for ozone formation as well as destruction. The hole exists because of chlorine, not because of UV per se."}]}, {"question": "Which of the following represents the most important difference between the ozone problem and the climate-change problem that helps explain why the Montreal Protocol succeeded so much faster than international climate agreements?", "options": [{"text": "Ozone-depleting substances are produced by a small number of chemical companies, which could develop patentable substitutes; CO2 sources are diffuse across every economic sector and require systemic transformation.", "isCorrect": true, "rationale": "Concentrated industry meant the affected companies could profit from substitutes (DuPont and others). Diffuse CO2 emissions create no analogous winners; transition imposes costs on virtually every industry."}, {"text": "Ozone depletion is a regional problem confined to Antarctica, while climate change is global.", "isCorrect": false, "rationale": "Ozone depletion has global components; the Antarctic hole is just the most severe regional manifestation. Both are global atmospheric problems."}, {"text": "Ozone depletion was discovered earlier than climate change and had more time to be addressed.", "isCorrect": false, "rationale": "The greenhouse effect was understood by Arrhenius in 1896, well before CFCs were even invented. Time was not the limiting factor."}, {"text": "CFCs occur naturally in small amounts, so their reduction was easier than eliminating CO2.", "isCorrect": false, "rationale": "CFCs have no natural sources — their entire atmospheric burden is anthropogenic. This actually made elimination simpler, not harder."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
