<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Island Biogeography and Habitat Fragmentation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Who proposed the equilibrium theory of island biogeography in 1967, and what does it predict?", "options": [{"text": "Charles Darwin and Alfred Russel Wallace; species distributions reflect ancestral migration", "isCorrect": false, "rationale": "Darwin and Wallace developed evolution by natural selection, not the 1967 island-biogeography framework."}, {"text": "Robert MacArthur and Edward O. Wilson; island species richness reflects a dynamic balance between immigration and local extinction", "isCorrect": true, "rationale": "Correct. MacArthur and Wilson's 1967 theory predicts equilibrium species richness as a balance between immigration and extinction rates, varying with island size and isolation."}, {"text": "Gleason and Clements; community composition is climate-driven", "isCorrect": false, "rationale": "Gleason-Clements addressed succession and climax-community theory, not island biogeography."}, {"text": "Levins and Hanski; populations exist as patches of subpopulations", "isCorrect": false, "rationale": "Levins (1969) and Hanski developed metapopulation theory, an extension to fragmentation, not the 1967 island-biogeography theory itself."}]}, {"question": "The species-area relationship is expressed as S = c*A^z. Using z = 0.25, what fraction of the original 10,000 ha species count would a 5,000 ha fragment retain at long-term equilibrium?", "options": [{"text": "Approximately 0.50 — exactly half", "isCorrect": false, "rationale": "Halving area does not halve species count; the power-law z < 1 yields a smaller decline than 50%."}, {"text": "Approximately 0.84 — about 84% of the original species", "isCorrect": true, "rationale": "Correct. (5000/10000)^0.25 = 0.5^0.25 ~= 0.84, so each 5,000 ha fragment retains ~84% of the species the intact 10,000 ha reserve supports."}, {"text": "Approximately 0.10 — only 10% of species would persist", "isCorrect": false, "rationale": "This dramatically overstates the loss; the rule of thumb is roughly half of species lost when area drops by ~90%, not 50%."}, {"text": "Approximately 1.00 — fragmentation has no effect on species count", "isCorrect": false, "rationale": "The species-area relationship predicts a measurable loss; only intact reserves retain the full count."}]}, {"question": "Which two factors does MacArthur-Wilson theory identify as the primary determinants of equilibrium species richness on an island?", "options": [{"text": "Latitude and altitude", "isCorrect": false, "rationale": "Latitude and altitude affect climate but are not the two MacArthur-Wilson variables."}, {"text": "Number of species and number of individuals", "isCorrect": false, "rationale": "These are descriptive metrics rather than the two predictive variables of the theory."}, {"text": "Island area and distance from the mainland species source (isolation)", "isCorrect": true, "rationale": "Correct. Larger islands sustain more species (lower extinction); islands closer to the mainland receive more immigrants. Their intersection sets the equilibrium."}, {"text": "Soil pH and average annual rainfall", "isCorrect": false, "rationale": "These influence community composition locally but are not the central variables of MacArthur-Wilson theory."}]}, {"question": "In the SLOSS debate, which is a documented advantage of a Single Large reserve over Several Small reserves of equal total area?", "options": [{"text": "It captures a greater diversity of habitat types", "isCorrect": false, "rationale": "Several Small reserves spread across a landscape capture more habitat types, an SS advantage."}, {"text": "It minimizes the edge-to-interior ratio, reducing edge effects on interior specialists", "isCorrect": true, "rationale": "Correct. A single large block has proportionally less edge habitat, which favors area-sensitive interior specialists like ground-nesting forest birds."}, {"text": "Multiple populations reduce extinction risk through redundancy", "isCorrect": false, "rationale": "Population redundancy is an SS advantage; SL concentrates all conservation eggs in one basket."}, {"text": "It offers greater protection from interbreeding among isolated populations", "isCorrect": false, "rationale": "A single reserve does not face interbreeding among isolated populations because the population is one unit."}]}, {"question": "Why would an interior-specialist warbler likely decline faster in a small square forest fragment than in a long, thin corridor strip of equal area?", "options": [{"text": "The square fragment has more total area than the corridor", "isCorrect": false, "rationale": "The premise specifies equal area — the difference is geometric, not in total area."}, {"text": "Interior specialists prefer linear habitats for migration", "isCorrect": false, "rationale": "Interior specialists actually do worse in linear habitats; they require deep interior conditions."}, {"text": "Although equal in area, the corridor has even greater edge-to-interior ratio than the square, exposing more of its area to edge effects (the question is reversed; the square is better for interior specialists)", "isCorrect": false, "rationale": "This option misidentifies which fragment is worse; in fact, the corridor strip has more edge."}, {"text": "Both have similar area, but the small square may already drop most interior conditions and the corridor has even more edge per unit interior — interior specialists need core area with cool, dim, low-wind conditions, which both fragments lose, but the corridor loses more", "isCorrect": true, "rationale": "Correct. Edge effects reduce interior conditions (cooler, dimmer, less invasive pressure) that interior specialists require; thinner shapes have proportionally more edge."}]}, {"question": "Which of the following best describes the modern synthesis on the SLOSS debate?", "options": [{"text": "Several Small reserves always outperform Single Large reserves regardless of focal species", "isCorrect": false, "rationale": "SS performance depends strongly on the focal species; it does not always outperform SL."}, {"text": "Single Large reserves always outperform Several Small reserves regardless of focal species", "isCorrect": false, "rationale": "Likewise, SL is not universally better; small home-range and habitat-mosaic species favor SS."}, {"text": "A synthesis of large core reserves linked by biological corridors captures the benefits of both strategies", "isCorrect": true, "rationale": "Correct. Modern conservation design favors large cores supplemented by corridors that allow movement between reserves, maintaining gene flow and demographic rescue."}, {"text": "Reserves are no longer considered effective conservation tools", "isCorrect": false, "rationale": "Reserves remain a primary conservation tool; the debate has refined, not abandoned, them."}]}, {"question": "Which is NOT a documented effect of habitat fragmentation?", "options": [{"text": "Increased edge-to-interior ratio in remaining patches", "isCorrect": false, "rationale": "This is a well-documented geometric effect of fragmentation."}, {"text": "Reduced connectivity, halting demographic rescue between fragments", "isCorrect": false, "rationale": "Loss of connectivity is a defining consequence of fragmentation."}, {"text": "Genetic exchange and gene flow ceases between isolated fragments", "isCorrect": false, "rationale": "Genetic isolation is a recognized consequence; gene flow ceases without corridors."}, {"text": "Increased genetic diversity within each fragment due to founder effects", "isCorrect": true, "rationale": "Correct (this is the false statement — fragmentation causes inbreeding depression and reduces, not increases, within-fragment genetic diversity over time)."}]}, {"question": "Edge effects in a forest fragment typically include which of the following?", "options": [{"text": "Lower temperatures, higher humidity, reduced light penetration, fewer invasive species", "isCorrect": false, "rationale": "These describe interior, not edge, conditions; the edge is the opposite."}, {"text": "Greater light penetration, increased wind exposure, higher temperatures, lower humidity, and easier access for generalists and invasives", "isCorrect": true, "rationale": "Correct. Edge zones have all these characteristics, plus higher nest predation and brood parasitism rates that disadvantage interior specialists."}, {"text": "Increased nest survival rates for ground-nesting birds", "isCorrect": false, "rationale": "Edges actually have higher nest predation rates, harming ground-nesting birds."}, {"text": "No measurable difference from interior conditions", "isCorrect": false, "rationale": "Edges differ measurably from interior; this is why edge effects are an active conservation concern."}]}, {"question": "A biological corridor primarily addresses which fragmentation problem?", "options": [{"text": "It increases the total area of habitat available", "isCorrect": false, "rationale": "Corridors primarily provide connectivity; their area contribution is secondary."}, {"text": "It restores connectivity, allowing organisms to move between patches for dispersal, gene flow, and demographic rescue", "isCorrect": true, "rationale": "Correct. Corridors reduce effective isolation, enable gene flow, support demographic rescue after local extinction, and facilitate climate-driven range shifts."}, {"text": "It eliminates edge effects in the patches it connects", "isCorrect": false, "rationale": "Corridors actually have very high edge-to-interior ratios themselves and don't eliminate edge effects in connected patches."}, {"text": "It speeds primary succession in the matrix between patches", "isCorrect": false, "rationale": "Corridors are about animal movement, not succession; this misidentifies the function."}]}, {"question": "A 10,000 ha forest reserve is bisected by a new highway, producing two 5,000 ha fragments. Beyond the species-area calculation, which OTHER fragmentation effect would accelerate species loss in each fragment over time?", "options": [{"text": "Increased gene flow between fragments due to highway traffic", "isCorrect": false, "rationale": "Highways generally reduce, not increase, gene flow between fragments."}, {"text": "Reduced connectivity between the two fragments preventing demographic rescue and gene flow, leading to inbreeding depression and lower recolonization probability after local extinction", "isCorrect": true, "rationale": "Correct. Beyond raw area loss, the highway also severs connectivity, accelerating extinction risk via demographic and genetic mechanisms (the metapopulation framework)."}, {"text": "Decreased edge-to-interior ratio in the smaller fragments", "isCorrect": false, "rationale": "Smaller fragments have higher, not lower, edge-to-interior ratios."}, {"text": "Stabilization of the equilibrium species count via the species-area relationship", "isCorrect": false, "rationale": "The species-area relationship predicts decline, not stabilization, with fragmentation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
