<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Acid Deposition: Mechanics and Ecosystem Impacts</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the two dominant acidifying agents in acid deposition, and from what primary pollutants are they derived?", "options": [{"text": "Hydrochloric acid (HCl) from CFCs and carbonic acid (H2CO3) from CO2", "isCorrect": false, "rationale": "HCl from CFCs is associated with stratospheric ozone, and carbonic acid is responsible for naturally slightly acidic rain, not the acid-rain problem."}, {"text": "Sulfuric acid (H2SO4) from SO2 and nitric acid (HNO3) from NOx", "isCorrect": true, "rationale": "Correct. SO2 (mostly from coal combustion) becomes H2SO4 in the atmosphere, and NOx (mostly from vehicles and high-temperature combustion) becomes HNO3."}, {"text": "Acetic acid and formic acid from biomass combustion", "isCorrect": false, "rationale": "These are minor organic acids and not the dominant cause of acid deposition."}, {"text": "Phosphoric acid and boric acid from industrial discharges", "isCorrect": false, "rationale": "Not significant atmospheric acidifying agents."}], "id": "q01"}, {"question": "Which pH defines normal (slightly acidic) rain that is NOT considered acid rain?", "options": [{"text": "pH 7.0 (perfectly neutral)", "isCorrect": false, "rationale": "Pure neutral water is pH 7.0, but rain in equilibrium with atmospheric CO2 is slightly more acidic."}, {"text": "pH approximately 5.6 (slightly acidic from atmospheric CO2 forming carbonic acid)", "isCorrect": true, "rationale": "Correct. Atmospheric CO2 dissolves to form H2CO3, giving baseline rain a pH of about 5.6."}, {"text": "pH approximately 4.0 (heavily acidic)", "isCorrect": false, "rationale": "pH 4.0 represents severe acid rain, not normal rain."}, {"text": "pH approximately 9.0 (alkaline)", "isCorrect": false, "rationale": "Rain is not naturally alkaline."}], "id": "q02"}, {"question": "Which best distinguishes wet deposition from dry deposition?", "options": [{"text": "Wet deposition occurs in the troposphere; dry deposition occurs in the stratosphere", "isCorrect": false, "rationale": "Both occur in the troposphere; the distinction is the carrier medium, not the altitude."}, {"text": "Wet deposition refers to acidic compounds dissolved in precipitation (rain, snow, fog, cloud water); dry deposition refers to particulate or gaseous acids absorbing directly onto surfaces and vegetation between rainfall events", "isCorrect": true, "rationale": "Correct. Both pathways acidify ecosystems, but only wet deposition is captured by typical rain-chemistry monitoring networks."}, {"text": "Wet deposition occurs only in summer; dry deposition occurs only in winter", "isCorrect": false, "rationale": "Both pathways occur year-round."}, {"text": "Wet deposition acidifies soils; dry deposition acidifies the atmosphere", "isCorrect": false, "rationale": "Both pathways acidify soils and water bodies on the surface."}], "id": "q03"}, {"question": "[Stimulus] In a region with seasonal snowpacks, monitoring records show that wet deposition is roughly constant throughout the year, but lake pH drops sharply each spring. What best explains the spring acid pulse?", "options": [{"text": "Direct foliar damage from acid mist increases in spring", "isCorrect": false, "rationale": "Foliar damage is a forest impact; the lake-pH drop is driven by the spring meltwater carrying accumulated acid."}, {"text": "Acid pollutants accumulating in the snowpack throughout winter are released as a concentrated burst when the snow melts in spring, coinciding with amphibian breeding and fish egg-hatching", "isCorrect": true, "rationale": "Correct. Snowpack stores winter acid input and releases it in a brief, intense pulse during melt — which is also a vulnerable window for sensitive aquatic life."}, {"text": "Lakes naturally acidify in spring regardless of pollution", "isCorrect": false, "rationale": "Acid pulses depend on accumulated atmospheric input, not natural seasonal cycles."}, {"text": "Spring rains carry less acid than winter snow", "isCorrect": false, "rationale": "The opposite — winter snow concentrates acid until melt."}], "id": "q04"}, {"question": "Below approximately what pH are most fish species unable to survive in a lake?", "options": [{"text": "pH 8.0", "isCorrect": false, "rationale": "Most lake fish thrive near or just below pH 8."}, {"text": "pH 7.0", "isCorrect": false, "rationale": "Neutral pH is benign for most fish."}, {"text": "pH 5.0", "isCorrect": true, "rationale": "Correct. Below pH 6.0 invertebrate diversity drops; below pH 5.0 most fish species cannot survive — gill protein denaturation impairs ion regulation."}, {"text": "pH 2.0", "isCorrect": false, "rationale": "Most fish are gone well above pH 2.0; the threshold is closer to 5.0."}], "id": "q05"}, {"question": "Why are watersheds underlain by granite or quartzite particularly vulnerable to acid deposition compared with watersheds underlain by limestone?", "options": [{"text": "Granite watersheds receive more rainfall than limestone watersheds", "isCorrect": false, "rationale": "Acid sensitivity is set by chemistry, not precipitation."}, {"text": "Granite and quartzite are siliceous rocks with negligible buffering capacity, while limestone (CaCO3) dissolves in acid water and releases bicarbonate that neutralizes H+", "isCorrect": true, "rationale": "Correct. Buffer capacity from carbonate bedrock neutralizes incoming acidity; siliceous bedrock cannot, so granite-underlain Adirondack and Canadian Shield lakes acidified while limestone-underlain Midwest lakes resisted."}, {"text": "Granite emits sulfur compounds that compound atmospheric acid loading", "isCorrect": false, "rationale": "Granite does not emit sulfur compounds."}, {"text": "Limestone watersheds are typically further from coal-power plants, shielding them from acid deposition", "isCorrect": false, "rationale": "Geographic distance alone does not explain the resistance — the Midwest received heavy acid loading and still showed less lake acidification because of its limestone bedrock."}], "id": "q06"}, {"question": "Which mechanism is NOT a direct mechanism by which acid deposition damages forests?", "options": [{"text": "Acid mist leaches protective waxes and nutrients from conifer needles (direct foliar damage)", "isCorrect": false, "rationale": "This is a recognized forest-damage mechanism."}, {"text": "Soil acidification displaces base cations (Ca²⁺, Mg²⁺, K⁺) and exchanges them for H⁺ and Al³⁺, leaching nutrients", "isCorrect": false, "rationale": "This is a recognized forest-damage mechanism."}, {"text": "Aluminum mobilization at low pH releases Al³⁺ that is directly toxic to fine root tips", "isCorrect": false, "rationale": "This is a recognized forest-damage mechanism."}, {"text": "Acid deposition raises soil pH, killing acidophilic conifer species", "isCorrect": true, "rationale": "Correct. Acid deposition lowers, rather than raises, soil pH, and conifers are not damaged by alkalinity. The other three options are real forest-damage mechanisms."}], "id": "q07"}, {"question": "[Stimulus] The Title IV cap-and-trade program of the 1990 Clean Air Act Amendments reduced US power-plant SO2 emissions by approximately 88% from 1990 levels by 2020, at far lower cost than projected. What feature of cap-and-trade most directly explains the cost outcome?", "options": [{"text": "It set a uniform percentage reduction for every plant", "isCorrect": false, "rationale": "That describes command-and-control, which produces higher aggregate cost; cap-and-trade is the alternative to that approach."}, {"text": "Power plants that could reduce emissions cheaply did so and sold surplus allowances; plants facing higher reduction costs bought allowances instead — concentrating abatement at the lowest-cost sources nationwide", "isCorrect": true, "rationale": "Correct. Trading concentrates abatement effort at the lowest-cost reduction opportunities, lowering aggregate cost while the cap guarantees the overall reduction target."}, {"text": "Power plants were given unlimited free allowances and only fined for emissions above a certain threshold", "isCorrect": false, "rationale": "The cap was a binding ceiling; allowances were finite and got scarcer over time."}, {"text": "EPA paid every plant a subsidy to install scrubbers", "isCorrect": false, "rationale": "Cap-and-trade did not rely on direct subsidies; it relied on tradable allowances."}], "id": "q08"}, {"question": "Why has the SO2 cap-and-trade program been more politically successful than analogous attempts to apply cap-and-trade to CO2 emissions in the US?", "options": [{"text": "SO2 reductions are more chemically stable than CO2 reductions", "isCorrect": false, "rationale": "The chemistry is not the issue; the political economy is."}, {"text": "Acid-rain victims (New England lakes, Adirondack forests) were a politically legible domestic constituency, the sources (Midwestern coal plants) were a locatable industry, and the problem was contained within US jurisdiction — none of which is true for global CO2 externalities", "isCorrect": true, "rationale": "Correct. The structural conditions of identifiable victims, locatable sources, and domestic jurisdiction were absent for CO2, which is a global commons problem with diffuse stakeholders."}, {"text": "CO2 is not actually a greenhouse gas", "isCorrect": false, "rationale": "CO2 is unequivocally a greenhouse gas; the issue is political economy, not climate science."}, {"text": "The EPA has no statutory authority over CO2 emissions", "isCorrect": false, "rationale": "EPA has authority following Massachusetts v. EPA (2007) and the endangerment finding."}], "id": "q09"}, {"question": "Write the chemical reaction by which sulfuric acid is neutralized by limestone in a buffered watershed.", "options": [{"text": "CaCO3 + 2H+ → Ca²⁺ + H2O + CO2", "isCorrect": true, "rationale": "Correct. Limestone (calcite) dissolves in acid water, consuming H+ and releasing Ca²⁺ and CO2 — the buffering reaction that protects watersheds from acidification."}, {"text": "CaSO4 → CaCO3 + SO2", "isCorrect": false, "rationale": "This is not a real reaction in watershed buffering."}, {"text": "Ca(OH)2 + 2HNO3 → Ca(NO3)2 + 2H2O", "isCorrect": false, "rationale": "Buffering involves carbonate (CaCO3), not hydroxide-based reactions."}, {"text": "CaCO3 + H2O → Ca(OH)2 + CO2", "isCorrect": false, "rationale": "Calcite does not spontaneously decompose this way at surface conditions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
