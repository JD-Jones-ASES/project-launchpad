    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Energy Conservation, Efficiency, and CAFE Standards</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A coal-fired power plant operates with a thermal efficiency of 33%. The plant manager argues that incremental engineering improvements could push the efficiency to 100%. Using the Second Law of Thermodynamics and the Carnot equation, which response BEST explains why this goal is impossible?", "options": [{"text": "100% efficiency is impossible only because of friction in the turbine bearings; eliminating friction would allow it.", "isCorrect": false, "rationale": "Friction is one source of loss, but even a frictionless engine cannot exceed the Carnot ceiling. The Second Law imposes a fundamental limit independent of mechanical perfection."}, {"text": "The Carnot equation η_max = 1 − T_cold/T_hot shows that 100% efficiency would require an infinite hot reservoir or a cold reservoir at absolute zero — physically impossible. The Second Law guarantees some heat must be rejected.", "isCorrect": true, "rationale": "The Second Law states that any heat-to-work conversion must reject some waste heat. The Carnot ceiling η_max = 1 − T_cold/T_hot is reached only as T_cold → 0 K or T_hot → ∞. Real engines can be improved (e.g., higher T_hot in combined cycle plants), but never to 100%."}, {"text": "100% efficiency is achievable in principle, just not with current technology; future engines will reach it.", "isCorrect": false, "rationale": "100% efficiency is forbidden by the Second Law itself, not by current technological limits. No future technology can violate this physical law."}, {"text": "100% efficiency is impossible because energy is destroyed during combustion.", "isCorrect": false, "rationale": "The First Law states energy is conserved (not destroyed) during conversion. The relevant constraint is the Second Law, which mandates entropy increase and waste-heat rejection."}], "id": "q01"}, {"question": "A household receives a utility bill showing 800 kWh of electricity consumed in one month. Using the conversion 1 kWh = 3.6 MJ and a US-average emission factor of 0.4 kg CO2 per kWh, what is the household's monthly energy in MJ and its CO2 footprint?", "options": [{"text": "2,880 MJ; 320 kg CO2.", "isCorrect": true, "rationale": "Energy: 800 kWh × 3.6 MJ/kWh = 2,880 MJ. CO2: 800 kWh × 0.4 kg CO2/kWh = 320 kg CO2 per month."}, {"text": "800 MJ; 800 kg CO2.", "isCorrect": false, "rationale": "1 kWh = 3.6 MJ (not 1 MJ). The CO2 calculation also fails: 800 × 0.4 = 320 kg, not 800."}, {"text": "28,800 MJ; 32 kg CO2.", "isCorrect": false, "rationale": "Off by factors of 10: correct conversion is 800 × 3.6 = 2,880 MJ (not 28,800), and 800 × 0.4 = 320 kg CO2 (not 32)."}, {"text": "3,600 MJ; 400 kg CO2.", "isCorrect": false, "rationale": "These figures use round factors but apply them incorrectly. Correct: 800 × 3.6 = 2,880 MJ; 800 × 0.4 = 320 kg CO2."}], "id": "q02"}, {"question": "The Corporate Average Fuel Economy (CAFE) program was established in 1975 in response to the 1973 oil embargo. Which statement BEST captures how CAFE standards work and what they regulate?", "options": [{"text": "CAFE sets a maximum vehicle fuel-economy ceiling that no individual car may exceed, to ensure all manufacturers compete on equal footing.", "isCorrect": false, "rationale": "CAFE sets a minimum sales-weighted average fleet fuel economy, not a per-vehicle ceiling. Individual vehicles may be more or less efficient than the average."}, {"text": "CAFE requires automakers to meet a minimum sales-weighted average fuel economy across all passenger cars (and separately, light trucks) sold in a given model year.", "isCorrect": true, "rationale": "CAFE applies a fleet-wide sales-weighted average mpg standard. Manufacturers can sell less-efficient vehicles as long as more-efficient sales pull the average above the federal target. Standards have ratcheted upward — from ~18 mpg in 1978 to ~49 mpg targeted by 2026."}, {"text": "CAFE applies only to electric vehicles and exempts internal combustion engines.", "isCorrect": false, "rationale": "CAFE was created to regulate internal combustion engines. It applies to the full fleet of passenger cars and light trucks; EVs are simply credited as zero or near-zero emitters within the fleet calculation."}, {"text": "CAFE is enforced by state governments; each state sets its own mpg target.", "isCorrect": false, "rationale": "CAFE is a federal program administered jointly by NHTSA (fuel economy) and EPA (emissions), not a state-level regulation."}], "id": "q03"}, {"question": "A vehicle is driven 12,000 miles per year. Calculate the difference in annual CO2 emissions between operation at 30 mpg and at 50 mpg, given that combustion of one US gallon of gasoline releases approximately 8.89 kg of CO2.", "options": [{"text": "Difference: about 1,422 kg CO2 per year (3,556 kg at 30 mpg vs. 2,134 kg at 50 mpg) — roughly a 40% reduction.", "isCorrect": true, "rationale": "30 mpg: 12,000/30 = 400 gal × 8.89 = 3,556 kg CO2/yr. 50 mpg: 12,000/50 = 240 gal × 8.89 = 2,134 kg CO2/yr. Difference: 1,422 kg/yr; reduction: 1,422/3,556 ≈ 40%."}, {"text": "Difference: about 2,000 kg per year — roughly a 60% reduction.", "isCorrect": false, "rationale": "Math error: actual difference is 1,422 kg/yr (40% reduction), not 2,000 kg / 60%."}, {"text": "Difference: about 700 kg per year — roughly a 20% reduction.", "isCorrect": false, "rationale": "Underestimates the savings. Going from 30 to 50 mpg cuts gallons used by 40% (400 → 240), which translates directly to ~40% CO2 reduction."}, {"text": "No difference — both vehicles burn the same amount of fuel per mile.", "isCorrect": false, "rationale": "A 50-mpg car uses 60% as much fuel as a 30-mpg car (240 vs. 400 gal/yr) and emits proportionally less CO2. Mileage difference matters substantially."}], "id": "q04"}, {"question": "An LED bulb rated at 10 W replaces a 60 W incandescent bulb that produced the same lumen output. If the bulb operates for 5 hours per day, what is the approximate annual energy savings?", "options": [{"text": "About 91 kWh per year (60 W − 10 W = 50 W saved × 5 h × 365 d / 1,000 ≈ 91.25 kWh).", "isCorrect": true, "rationale": "Power saved: 60 W − 10 W = 50 W. Energy saved: 50 W × 5 h × 365 d = 91,250 Wh = 91.25 kWh per year. Multiplied across many bulbs and decades, lighting efficiency yields large electricity demand reductions."}, {"text": "About 50 kWh per year — equal to the wattage saved.", "isCorrect": false, "rationale": "Watts is a rate, not an energy quantity. To get kWh per year, multiply watts × hours/day × days/year ÷ 1,000."}, {"text": "About 18 kWh per year.", "isCorrect": false, "rationale": "Underestimates by a factor of 5. Correct: 50 W × 5 h × 365 d ≈ 91 kWh/yr."}, {"text": "About 365 kWh per year — one for each day.", "isCorrect": false, "rationale": "This formula has no physical basis. The correct calculation multiplies watts saved by hours of use per year, giving ~91 kWh."}], "id": "q05"}, {"question": "A heat pump claims a coefficient of performance (COP) of 3.5. Which statement BEST describes what this number means and how heat pumps achieve such high values?", "options": [{"text": "The heat pump consumes 3.5 units of electricity for every unit of heat delivered, making it less efficient than a furnace.", "isCorrect": false, "rationale": "This reverses the meaning of COP. COP = heat delivered / electrical input, so COP = 3.5 means 3.5 units of heat per unit of electricity, far better (not worse) than a furnace's typical efficiency of <1."}, {"text": "The heat pump delivers 3.5 units of heat per unit of electricity consumed by transferring (not generating) heat from outdoor air or the ground to the indoors. It does not violate the First Law because it moves heat rather than creating it.", "isCorrect": true, "rationale": "Heat pumps transfer heat from a cool reservoir (outdoor air or ground) to a warmer one using electrical work. Because the heat is moved rather than generated, COP can exceed 1 without violating energy conservation. Modern air-source heat pumps achieve COPs of 3.0+, cutting heating energy by 50–70% vs. resistance electric or natural gas."}, {"text": "The heat pump generates heat from electricity at 3.5 times the energy input, violating the First Law of Thermodynamics.", "isCorrect": false, "rationale": "Heat pumps do NOT violate the First Law because they move heat rather than generate it. The 'extra' heat comes from the outdoor environment, not from creation."}, {"text": "COP measures how loudly the unit operates; 3.5 is the average decibel rating.", "isCorrect": false, "rationale": "COP measures heat delivered per unit electricity input — a thermodynamic efficiency metric, not a noise rating."}], "id": "q06"}, {"question": "A combined-cycle natural gas turbine power plant achieves approximately 60% thermal efficiency, while a single-cycle gas turbine reaches only ~35%. What design feature explains the combined-cycle advantage?", "options": [{"text": "Combined-cycle plants burn the gas at lower temperatures, reducing waste heat losses.", "isCorrect": false, "rationale": "Combined-cycle plants actually operate at higher peak temperatures (~1,400°C in the gas turbine), which raises Carnot efficiency. Lower temperatures would reduce, not improve, performance."}, {"text": "Combined-cycle plants cascade a high-temperature gas turbine with a heat-recovery steam generator that extracts useful work from waste exhaust heat, capturing energy that would otherwise be discarded.", "isCorrect": true, "rationale": "The gas turbine generates electricity at high temperatures (~1,400°C). Its hot exhaust would normally be wasted, but in combined-cycle operation it heats water to drive a secondary steam turbine. Capturing this otherwise-rejected heat raises overall efficiency from ~35% to ~60%, well above any single-cycle plant."}, {"text": "Combined-cycle plants use only renewable natural gas, raising efficiency to 60%.", "isCorrect": false, "rationale": "Fuel source does not change thermal efficiency. The 60% figure comes from cascading turbines, not from the type of natural gas burned."}, {"text": "Combined-cycle plants use cooling towers that increase the cold-reservoir temperature, raising Carnot efficiency.", "isCorrect": false, "rationale": "Higher cold-reservoir temperature would LOWER Carnot efficiency. The actual mechanism is using waste heat to drive a second turbine, harvesting energy that would otherwise be rejected."}], "id": "q07"}, {"question": "Buildings account for approximately what percentage of US energy consumption, and which voluntary federal labeling program identifies appliances and electronics that exceed federal minimum efficiency standards?", "options": [{"text": "About 40%; Energy Star.", "isCorrect": true, "rationale": "Buildings consume ~40% of US energy. The Energy Star program (administered by the EPA) is voluntary and identifies appliances, electronics, and buildings that exceed federal minimum efficiency standards — typically using 10–50% less energy than minimum-standard alternatives."}, {"text": "About 10%; CAFE.", "isCorrect": false, "rationale": "Buildings account for ~40%, not 10%. CAFE applies to vehicles, not appliances or buildings."}, {"text": "About 70%; LEED.", "isCorrect": false, "rationale": "Buildings consume ~40% of US energy, not 70%. LEED is a building certification system, not an appliance label."}, {"text": "About 25%; the Clean Air Act.", "isCorrect": false, "rationale": "Buildings consume ~40% of US energy. The Clean Air Act regulates air pollutants — not an appliance efficiency labeling program."}], "id": "q08"}, {"question": "What is the role of LEED certification, and how does it differ from Energy Star?", "options": [{"text": "LEED is a federal regulation mandating minimum building efficiency; Energy Star is a voluntary certification.", "isCorrect": false, "rationale": "LEED is voluntary, not a regulation. Both LEED and Energy Star are voluntary recognition programs."}, {"text": "LEED is a voluntary green-building rating system administered by the US Green Building Council; it awards points for energy efficiency, water conservation, materials, indoor air quality, and site design. Energy Star focuses on individual appliance and equipment efficiency.", "isCorrect": true, "rationale": "LEED (Leadership in Energy and Environmental Design) is whole-building scope: certified buildings earn levels of Certified, Silver, Gold, or Platinum and typically use 25–30% less energy than code-minimum buildings. Energy Star is product- and equipment-focused, identifying appliances that exceed minimum federal standards."}, {"text": "LEED applies only to commercial buildings; Energy Star applies only to residential homes.", "isCorrect": false, "rationale": "LEED applies to many building types (commercial, residential, schools, hospitals, etc.) and Energy Star covers appliances in both residential and commercial contexts."}, {"text": "LEED measures only carbon emissions; Energy Star measures only water use.", "isCorrect": false, "rationale": "Both programs evaluate energy efficiency across multiple dimensions — neither is restricted to a single metric."}], "id": "q09"}, {"question": "The First Law of Thermodynamics is conservation of energy: E_input = E_useful + E_losses. The Second Law adds that some losses are unavoidable in any heat-to-work conversion. Which of the following BEST describes the practical consequence for energy planning?", "options": [{"text": "Energy planning should ignore the Second Law because efficiency improvements are always possible.", "isCorrect": false, "rationale": "The Second Law is a fundamental physical limit, not optional. Ignoring it leads to plans that violate physical reality."}, {"text": "Use high-quality energy (electricity, natural gas combustion) only for tasks that require it. Use lower-quality energy (warm water, solar heat) for tasks like space heating that do not need high temperatures.", "isCorrect": true, "rationale": "Efficiency improvements have diminishing returns: a coal plant from 33% to 40% saves 11% of input, but 50% to 57% saves only 9%, and the Carnot ceiling can never be passed. The leveraged response is to match energy quality to end-use needs — don't waste high-grade energy on low-grade tasks like room heating."}, {"text": "Replace all heat engines with combustion engines, since combustion is exempt from the Second Law.", "isCorrect": false, "rationale": "Combustion is not exempt from the Second Law. Combustion engines (and heat engines generally) all face the Carnot ceiling and waste-heat rejection."}, {"text": "Build only nuclear plants; nuclear is exempt from thermodynamic limits.", "isCorrect": false, "rationale": "Nuclear plants are heat engines too — they face the same Carnot ceiling. Their thermal efficiency is approximately 33%, similar to coal-fired plants."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
