<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Total Fertility Rate and the Demographic Transition</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines total fertility rate (TFR)?", "options": [{"text": "The number of births per 1,000 people in a population per year", "isCorrect": false, "rationale": "This is the crude birth rate, which is sensitive to age structure."}, {"text": "The average number of children a woman would bear over her reproductive lifetime if current age-specific fertility rates remained constant", "isCorrect": true, "rationale": "TFR is a hypothetical measure that controls for age structure by aggregating age-specific fertility rates into a per-woman total."}, {"text": "The number of children currently being raised per household", "isCorrect": false, "rationale": "TFR is a fertility rate, not a household-composition statistic."}, {"text": "The percentage of women in a population who are of reproductive age", "isCorrect": false, "rationale": "This describes a demographic share, not fertility."}]}, {"question": "In the demographic transition model, which stage is characterized by both high birth rates and high death rates that produce roughly stable, small populations?", "options": [{"text": "Stage 1 — Pre-industrial", "isCorrect": true, "rationale": "Stage 1 features 30–50 births and 30–50 deaths per 1,000, balancing each other and producing slow or static population growth, punctuated by famine and disease."}, {"text": "Stage 2 — Early industrial", "isCorrect": false, "rationale": "Stage 2 features falling death rates with persistent high birth rates, producing rapid growth."}, {"text": "Stage 4 — Post-industrial", "isCorrect": false, "rationale": "Stage 4 features low rates of both, not high rates."}, {"text": "Stage 5 — Below-replacement", "isCorrect": false, "rationale": "Stage 5 features deaths exceeding births in native populations, producing decline."}]}, {"question": "Which stage of the demographic transition produces the most rapid population growth?", "options": [{"text": "Stage 1 — Pre-industrial", "isCorrect": false, "rationale": "Stage 1 has roughly balanced high birth and death rates, producing slow growth."}, {"text": "Stage 2 — Early industrial, when death rates fall sharply but birth rates remain high", "isCorrect": true, "rationale": "The widening gap between still-high birth rates and falling death rates drives the most rapid natural increase observed in human populations."}, {"text": "Stage 4 — Post-industrial", "isCorrect": false, "rationale": "Stage 4 has near-zero growth as both rates are low and balanced."}, {"text": "Stage 5 — Below-replacement", "isCorrect": false, "rationale": "Stage 5 produces population decline, not growth."}]}, {"question": "Stimulus: A demographer reports that a country has TFR = 5.2 per woman, declining infant mortality, rising urbanization, and rapidly increasing female secondary school enrollment. According to the demographic transition model, this country is most likely entering or in:", "options": [{"text": "Stage 1, with a stable pre-industrial profile", "isCorrect": false, "rationale": "Stage 1 has high mortality, not declining mortality."}, {"text": "Stage 2 transitioning into Stage 3, with falling death rates and emerging fertility decline", "isCorrect": true, "rationale": "Falling mortality, urbanization, and rising female education are the classic Stage 3 onset signals — fertility will fall as these mature."}, {"text": "Stage 4, with low and stable birth and death rates", "isCorrect": false, "rationale": "TFR of 5.2 is far above Stage 4 levels."}, {"text": "Stage 5, with native-population decline", "isCorrect": false, "rationale": "TFR above replacement and rising education are inconsistent with Stage 5 decline."}]}, {"question": "Across nearly every region and culture studied, which factor is the single most consistent predictor of lower total fertility rates?", "options": [{"text": "GDP per capita", "isCorrect": false, "rationale": "While correlated, GDP is less consistent than education across diverse settings."}, {"text": "Educational attainment for women, particularly secondary schooling", "isCorrect": true, "rationale": "Women's education delays marriage and first birth, increases economic options, empowers contraceptive negotiation, and reduces perceived value of large families — the most reliably replicated finding in development demography."}, {"text": "Urbanization rate alone", "isCorrect": false, "rationale": "Urbanization is a contributor but not as consistent as women's education."}, {"text": "Average age at marriage alone", "isCorrect": false, "rationale": "Marriage age is itself partly downstream of education; education is the upstream driver."}]}, {"question": "Why do death rates fall before birth rates in the demographic transition?", "options": [{"text": "Because death rates are inherently easier to manipulate than birth rates", "isCorrect": false, "rationale": "Both rates respond to changing conditions; the asymmetry is about social timing."}, {"text": "Because public health and nutrition improvements act quickly on mortality, while social norms and economic incentives that drive high fertility persist longer", "isCorrect": true, "rationale": "Vaccination, sanitation, and clean water reduce mortality within years, but family-size norms shift only as urbanization, education, and child labor laws change — a slower process."}, {"text": "Because medical intervention is more profitable than family planning", "isCorrect": false, "rationale": "Profitability does not explain the timing pattern observed historically."}, {"text": "Because all countries enforce strict birth rate policies before they reduce mortality", "isCorrect": false, "rationale": "Most countries reduce mortality through public health long before they implement birth-rate policy."}]}, {"question": "Stimulus: South Korea currently records a TFR of approximately 0.78, the lowest ever recorded for a large country. This places South Korea in which demographic stage?", "options": [{"text": "Stage 2, due to ongoing population decline", "isCorrect": false, "rationale": "Stage 2 features high fertility and rapid growth, not deep below-replacement fertility."}, {"text": "Stage 3, with fertility actively transitioning from high to low", "isCorrect": false, "rationale": "Stage 3 describes active decline, not a TFR already deeply below replacement."}, {"text": "Stage 5, characterized by below-replacement fertility and projected population decline", "isCorrect": true, "rationale": "Stage 5 is recognized for countries with TFR well below replacement, such as Korea, Japan, and Italy, where deaths exceed births absent immigration."}, {"text": "Stage 1, returning to a pre-industrial demographic balance", "isCorrect": false, "rationale": "Stage 1 has high mortality and high fertility, not low fertility."}]}, {"question": "Why does the greatest twenty-first-century environmental pressure tend to come from Stage 3 countries rather than from Stage 2 or Stage 4?", "options": [{"text": "Because Stage 3 countries have higher TFRs than Stage 2 countries", "isCorrect": false, "rationale": "Stage 2 countries have higher TFRs; the issue with Stage 3 is consumption growth alongside continued population growth."}, {"text": "Because Stage 3 countries simultaneously experience continued population growth and rapidly rising per-capita consumption", "isCorrect": true, "rationale": "Stage 3 (India, Nigeria, Indonesia) combines large populations still growing with rapid GDP per capita growth, multiplying total resource demand."}, {"text": "Because Stage 3 countries have the highest mortality rates", "isCorrect": false, "rationale": "Stage 3 features falling mortality, not high mortality."}, {"text": "Because Stage 3 countries have the smallest populations", "isCorrect": false, "rationale": "Stage 3 countries are typically large and growing, not small."}]}, {"question": "How does declining infant mortality contribute to falling fertility?", "options": [{"text": "It directly forces couples to limit family size by law", "isCorrect": false, "rationale": "Mortality decline operates through changed incentives, not legal mandates."}, {"text": "It reduces the number of births required to achieve a target family size, since more children survive to adulthood", "isCorrect": true, "rationale": "When 30% of children die before age five, families plan for many births; when mortality falls below 1%, replacement calculations shift dramatically and fertility falls."}, {"text": "It increases the cost of childbirth, discouraging additional children", "isCorrect": false, "rationale": "While some healthcare costs may rise, the core mechanism is target-family-size adjustment."}, {"text": "It causes women to enter menopause earlier", "isCorrect": false, "rationale": "Infant mortality decline does not change reproductive biology."}]}, {"question": "Which of the following is NOT a recognized driver of fertility decline in Stage 3?", "options": [{"text": "Increased women's educational attainment", "isCorrect": false, "rationale": "Women's education is the most reliable driver — this is a real driver."}, {"text": "Urbanization shifting the economics of childrearing", "isCorrect": false, "rationale": "Urbanization is a confirmed driver."}, {"text": "Declining infant mortality reducing the need for many births", "isCorrect": false, "rationale": "Declining infant mortality is a confirmed driver."}, {"text": "Government-mandated three-child policies that increase target family size", "isCorrect": true, "rationale": "Mandated higher family sizes are not a recognized fertility-decline driver; in fact, China's recent policy reversals to allow more children have not raised TFR."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
