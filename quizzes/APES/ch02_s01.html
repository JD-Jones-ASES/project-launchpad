<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Metrics of Biodiversity and Ecosystem Services</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the three levels at which biodiversity is conventionally measured?", "options": [{"text": "Trophic, demographic, and behavioral diversity", "isCorrect": false, "rationale": "These are not the three biodiversity levels; the framework distinguishes genetic, species, and habitat diversity."}, {"text": "Genetic diversity, species diversity, and habitat diversity", "isCorrect": true, "rationale": "Correct. Biodiversity is a composite concept measured at the genetic (within/among populations), species (richness and abundance), and habitat (ecosystem-type variety) levels."}, {"text": "Population, community, and biome diversity", "isCorrect": false, "rationale": "These are organizational scales of ecology, not the standard biodiversity-measurement levels."}, {"text": "Alpha, beta, and gamma diversity", "isCorrect": false, "rationale": "These are spatial scales of species diversity (within, between, regional), not the three-level framework introduced in the section."}], "id": "q01"}, {"question": "Why is genetic uniformity in a population, like that observed in cheetahs, a conservation concern?", "options": [{"text": "It increases the population's resistance to disease through immune redundancy", "isCorrect": false, "rationale": "Genetic uniformity reduces, not increases, immune-system variability and disease resistance."}, {"text": "It accelerates allopatric speciation", "isCorrect": false, "rationale": "Speciation requires geographic isolation and divergence, not genomic uniformity within one population."}, {"text": "Reduced variation limits the population's capacity to respond to new selective pressures such as novel pathogens", "isCorrect": true, "rationale": "Correct. Captive cheetahs accept skin grafts from unrelated individuals, indicating genomic uniformity that translates into vulnerability to a single novel pathogen."}, {"text": "It causes random mutations to be more frequent", "isCorrect": false, "rationale": "Mutation rates per locus are not increased by reduced genetic diversity; rather, the diversity available to selection is depleted."}], "id": "q02"}, {"question": "Two grassland plots each contain 8 species. Plot X has 200 individuals distributed almost equally; Plot Y has 200 individuals of which one species accounts for 160. Which statement is correct?", "options": [{"text": "Plot Y has higher species evenness because one species is dominant", "isCorrect": false, "rationale": "Dominance reduces evenness; equitable distribution increases evenness."}, {"text": "Plot X and Plot Y have identical Simpson's D because richness is the same", "isCorrect": false, "rationale": "Simpson's D depends on both richness and the proportional distribution; uneven plots have lower D."}, {"text": "Plot X has higher Simpson's D because individuals are more evenly distributed across species", "isCorrect": true, "rationale": "Correct. With identical richness, the plot whose individuals are more evenly distributed yields a higher Simpson's D."}, {"text": "Plot Y has higher diversity because the dominant species indicates community success", "isCorrect": false, "rationale": "Dominance lowers diversity by Simpson's index; success of one species reduces overall diversity."}], "id": "q03"}, {"question": "A forest plot of 100 individuals contains 10 species each at 10 individuals (Plot A). What is its Simpson's Diversity Index, D?", "options": [{"text": "0.10", "isCorrect": false, "rationale": "0.10 is the value of the sum of squared proportions, not D itself; D = 1 minus that sum."}, {"text": "0.43", "isCorrect": false, "rationale": "This corresponds to the uneven Plot B in the worked example, not the equally distributed Plot A."}, {"text": "0.57", "isCorrect": false, "rationale": "This is D for the uneven Plot B (1 - 0.4291), not for Plot A."}, {"text": "0.90", "isCorrect": true, "rationale": "Correct. With 10 species each at p_i = 0.10, sum p_i^2 = 10(0.01) = 0.10, so D = 1 - 0.10 = 0.90."}], "id": "q04"}, {"question": "According to the Millennium Ecosystem Assessment (2005), into which category do pollination, water purification, and flood control fall?", "options": [{"text": "Provisioning services", "isCorrect": false, "rationale": "Provisioning services include tangible goods like food, fiber, and fresh water, not regulating processes."}, {"text": "Regulating services", "isCorrect": true, "rationale": "Correct. Regulating services include climate regulation, water purification, pollination, flood control, and disease regulation."}, {"text": "Cultural services", "isCorrect": false, "rationale": "Cultural services involve recreation, aesthetic value, and spiritual significance."}, {"text": "Supporting services", "isCorrect": false, "rationale": "Supporting services (nutrient cycling, soil formation, primary production) underpin the others rather than directly regulating processes."}], "id": "q05"}, {"question": "A developer proposes draining a coastal wetland. Which mechanism best explains how losing the wetland reduces a regulating service?", "options": [{"text": "The wetland produces lumber for construction, so removing it eliminates a provisioning good", "isCorrect": false, "rationale": "Lumber would be a provisioning service, not a regulating one."}, {"text": "Without the wetland's ability to absorb and slowly release runoff, the same rainfall arrives downstream faster and higher, increasing flood risk", "isCorrect": true, "rationale": "Correct. Intact wetlands attenuate flood peaks; their loss directly removes a flood-control regulating service."}, {"text": "Wetlands provide spiritual significance to local communities, which is the regulating service in question", "isCorrect": false, "rationale": "Spiritual significance is a cultural service, not regulating."}, {"text": "Wetlands carry out photosynthesis, which is a regulating service", "isCorrect": false, "rationale": "Primary production is a supporting service in the Millennium framework, not a regulating one."}], "id": "q06"}, {"question": "How does Shannon's H differ from Simpson's D as a diversity index?", "options": [{"text": "Shannon's H ignores rare species, whereas Simpson's D weights them heavily", "isCorrect": false, "rationale": "It is the reverse: Shannon's H is more sensitive to rare species due to its logarithmic term."}, {"text": "Shannon's H is more sensitive to rare species because the ln(p_i) term grows very negative as p_i approaches zero", "isCorrect": true, "rationale": "Correct. Shannon's logarithmic weighting amplifies the contribution of rare species relative to Simpson's index."}, {"text": "Shannon's H counts only species richness, while Simpson's D counts only evenness", "isCorrect": false, "rationale": "Both indices combine richness and evenness; they differ in how they weight rare species."}, {"text": "Simpson's D ranges from 0 to infinity, while Shannon's H ranges from 0 to 1", "isCorrect": false, "rationale": "Simpson's D ranges from 0 to nearly 1; Shannon's H is unbounded above and uses a logarithm."}], "id": "q07"}, {"question": "Why is functional redundancy considered a buffer against ecosystem-service loss?", "options": [{"text": "Because redundant species share genetic material that prevents extinction", "isCorrect": false, "rationale": "Redundancy is functional, not genetic, and does not prevent extinction of individual species."}, {"text": "Because each species in a redundant set delivers a different and unique service", "isCorrect": false, "rationale": "Redundancy means many species perform similar roles, not that each is unique."}, {"text": "When many species perform similar roles, the loss of one species does not collapse the function the group provides", "isCorrect": true, "rationale": "Correct. Functional redundancy buffers the system against the loss of any single species, in contrast to systems where one species alone delivers a critical function."}, {"text": "Redundant species are more resistant to mutation than rare species", "isCorrect": false, "rationale": "Functional redundancy is about ecological roles, not mutation rates."}], "id": "q08"}, {"question": "The passenger pigeon's extinction illustrates which environmental concept most directly?", "options": [{"text": "Allopatric speciation", "isCorrect": false, "rationale": "Allopatric speciation is a process of new-species formation, not extinction-driven service loss."}, {"text": "The loss of a species can also remove the disturbance and seed-dispersal services it uniquely provided to forests", "isCorrect": true, "rationale": "Correct. The passenger pigeon's mast-forest disturbance services disappeared with the species, illustrating loss of an ecosystem service when a uniquely functioning species goes extinct."}, {"text": "Habitat fragmentation due to road building", "isCorrect": false, "rationale": "While habitat loss contributed, the case study highlights loss of a service-providing species, not fragmentation per se."}, {"text": "Genetic drift in small populations", "isCorrect": false, "rationale": "Genetic drift was not the named cause; commercial hunting and habitat loss drove the extinction."}], "id": "q09"}, {"question": "Which of the following is an example of a supporting ecosystem service rather than a provisioning service?", "options": [{"text": "Soil microbial communities recycling nutrients that all photosynthesis depends on", "isCorrect": true, "rationale": "Correct. Nutrient cycling and soil formation are supporting services that underpin all provisioning services."}, {"text": "Wild fish harvested from oceans for food", "isCorrect": false, "rationale": "Harvested fish are a provisioning service (food)."}, {"text": "Timber from a managed forest", "isCorrect": false, "rationale": "Timber is a provisioning service (fiber/fuel)."}, {"text": "Genetic resources from a wild tomato relative used in crop breeding", "isCorrect": false, "rationale": "Genetic resources are listed as a provisioning service in the Millennium framework."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
