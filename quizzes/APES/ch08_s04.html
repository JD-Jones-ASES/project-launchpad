    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Bioaccumulation, Biomagnification, and Endocrine Disruptors</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A 1-kg fish in a contaminated lake contains 2 mg of DDT in its fatty tissue. A 10-kg predatory fish eats 50 such fish over its lifetime and retains 90% of the DDT it ingests. Calculate the DDT concentration (mg/kg) in the predatory fish, and determine the biomagnification factor between trophic levels.", "options": [{"text": "Predatory fish DDT = 9 mg/kg; biomagnification factor = 4.5x.", "isCorrect": true, "rationale": "Total DDT ingested: 50 fish × 2 mg/fish = 100 mg. Retained: 100 mg × 0.90 = 90 mg. Concentration: 90 mg ÷ 10 kg = 9 mg/kg. Biomagnification factor: 9 mg/kg ÷ 2 mg/kg = 4.5x. The factor of ~10x mentioned in the section is a typical approximation; specific calculations depend on exact ingestion and retention rates. Here the lower factor reflects the relatively modest 50-fish lifetime intake."}, {"text": "Predatory fish DDT = 100 mg/kg; biomagnification factor = 50x.", "isCorrect": false, "rationale": "This calculation does not account for the 90% retention rate or divide by predator body mass. Total ingested is 100 mg, but only 90 mg is retained, distributed across a 10-kg body."}, {"text": "Predatory fish DDT = 0.18 mg/kg; biomagnification factor = 0.09x.", "isCorrect": false, "rationale": "This calculation incorrectly multiplies by 0.90 retention to give 0.18 mg/kg, suggesting the predatory fish has less DDT than the prey. The actual calculation gives 9 mg/kg, a higher concentration than the prey, illustrating biomagnification."}, {"text": "Predatory fish DDT = 2 mg/kg; biomagnification factor = 1.0x.", "isCorrect": false, "rationale": "This claims no biomagnification despite the predator eating 50 prey items and retaining 90% of their DDT load. The actual biomagnification factor is 4.5x — a substantial increase."}], "id": "q01"}, {"question": "Why does methylmercury concentrate primarily in muscle tissue while DDT and PCBs concentrate primarily in fat, and what does this imply for fish-consumption advisories?", "options": [{"text": "All POPs concentrate identically in fat tissue; advisories should focus only on fatty fish.", "isCorrect": false, "rationale": "Methylmercury is unique among major POPs in concentrating in muscle, not fat. This is why advisories focus on large predatory fish (muscle mass) including shark, swordfish, king mackerel, tilefish, and bigeye tuna — not fatty fish per se."}, {"text": "Methylmercury binds to proteins in muscle tissue, while DDT and PCBs are lipophilic and partition to fatty tissue; FDA and EPA advise pregnant women and young children to limit consumption of large predatory fish (shark, swordfish, king mackerel, tilefish, bigeye tuna) due to methylmercury, regardless of body fat.", "isCorrect": true, "rationale": "Methylmercury (CH₃Hg⁺) binds to sulfur-containing amino acid residues in muscle proteins, partitioning differently than fat-soluble POPs. DDT and PCBs are highly lipophilic and concentrate in fatty tissue and lipid membranes. This means methylmercury risk depends on muscle mass of large predatory fish, not body fat — driving the FDA/EPA advisory specifically targeting shark, swordfish, king mackerel, tilefish, and bigeye tuna."}, {"text": "Methylmercury is water-soluble and is excreted within hours, posing no bioaccumulation risk.", "isCorrect": false, "rationale": "Methylmercury is highly bioaccumulative; it is the methylated organic form of mercury, lipid-soluble enough to cross cell membranes and persist in tissues. Pregnant women and young children are specifically advised to limit consumption of contaminated large predatory fish."}, {"text": "Methylmercury and DDT have identical tissue distribution; only their dosing rates differ.", "isCorrect": false, "rationale": "Their tissue distribution differs fundamentally — methylmercury binds proteins (muscle), POPs partition to fat (lipid membranes and fat deposits). Different distribution patterns drive different fish-advisory targeting strategies."}], "id": "q02"}, {"question": "Which property is the critical determinant of whether a chemical bioaccumulates in animal tissues, and which class of pollutants exemplifies this property?", "options": [{"text": "Lipophilicity (fat-solubility) is the critical property; persistent organic pollutants (POPs) — including DDT, PCBs, dioxins, and methylmercury — are the primary bioaccumulators because they partition into fatty tissues and lipid membranes rather than being excreted.", "isCorrect": true, "rationale": "Lipophilicity is the critical property. A water-soluble compound like table salt is rapidly excreted in urine; a fat-soluble compound dissolves into lipid membranes and fat deposits and is stored there. Each meal containing the compound adds to the stored load; excretion is minimal. POPs are the exemplary class — including DDT, PCBs, dioxins/furans, PFAS, and methylmercury — and are regulated internationally under the Stockholm Convention on Persistent Organic Pollutants (2001)."}, {"text": "Water-solubility is the critical property; bioaccumulating chemicals must dissolve in body water and be transported through blood.", "isCorrect": false, "rationale": "Water-soluble chemicals are typically excreted in urine and bile, preventing accumulation. The opposite property — lipophilicity — drives bioaccumulation."}, {"text": "Density determines bioaccumulation; heavy chemicals settle in tissues by gravity.", "isCorrect": false, "rationale": "Chemical density does not drive tissue distribution; lipophilicity (octanol-water partition coefficient) does."}, {"text": "Chemicals bioaccumulate only if they are radioactive; non-radioactive compounds are always excreted.", "isCorrect": false, "rationale": "Many bioaccumulating chemicals are non-radioactive (DDT, PCBs, methylmercury). Lipophilicity, not radioactivity, drives accumulation."}], "id": "q03"}, {"question": "Rachel Carson's Silent Spring (1962) made what central conceptual contribution that established the foundation of modern ecotoxicology?", "options": [{"text": "Carson argued that fat-soluble chemicals applied dilutely to the environment concentrate up food chains to reach dangerous levels in top predators and humans; she established that a chemical's harm cannot be assessed by examining its effects on a single species at the point of application but only by tracing it through the entire food web.", "isCorrect": true, "rationale": "Carson's central conceptual contribution was the systems-level insight that chemical impact propagates through trophic levels and across time. She argued in Silent Spring that the post-WWII chemical industry's broad-spectrum insecticides — particularly DDT — were causing cascading, ecosystem-wide damage that the industry had failed to study or had concealed. This systems-level thinking was radical in 1962 and remains the organizing principle of ecotoxicology and pesticide regulation today."}, {"text": "Carson argued that all pesticides are chemically identical and equally toxic; she rejected mechanism-based toxicology.", "isCorrect": false, "rationale": "Carson distinguished different classes of chemicals and their distinct mechanisms. Her concern with DDT was specifically about persistence, bioaccumulation, and biomagnification — properties that distinguished organochlorines from short-lived organic compounds."}, {"text": "Carson advocated for replacing all chemical regulation with industry self-policing.", "isCorrect": false, "rationale": "Carson's argument led to government regulation, including creation of the EPA (1970) and the DDT ban (1972) — the opposite of self-policing."}, {"text": "Carson opposed all use of pesticides, arguing for organic farming exclusively.", "isCorrect": false, "rationale": "Carson's argument was about the hazards of broad-spectrum, persistent insecticides — not categorical opposition to pest control. She advocated targeted, mechanism-aware approaches."}], "id": "q04"}, {"question": "DDE (a breakdown product of DDT) caused population collapse in bald eagles, ospreys, and peregrine falcons through which specific biochemical mechanism?", "options": [{"text": "DDE inhibits photosynthesis in algae that birds eat, causing nutritional starvation.", "isCorrect": false, "rationale": "Birds do not eat algae; the trophic chain runs algae → plankton → fish → fish-eating birds. Also, DDE's harm to birds is not through nutritional pathways but through direct enzyme inhibition affecting eggshell formation."}, {"text": "DDE inhibits the enzyme carbonic anhydrase in the shell-forming gland of bird ovaries, reducing calcium carbonate deposition into eggshell, producing shells 25–40% thinner than normal that incubating parents crush.", "isCorrect": true, "rationale": "DDT and its breakdown product DDE bioaccumulate in fatty fish and biomagnify in fish-eating birds. DDE specifically inhibits the enzyme carbonic anhydrase in the shell-forming gland of bird ovaries, reducing calcium carbonate deposition into eggshell. Shells become 25–40% thinner than normal — incubating parents crush their own eggs. Reproductive failure was catastrophic across populations of osprey, brown pelican, peregrine falcon, and bald eagle in the 1950s–1960s."}, {"text": "DDE causes immediate acute lethality in adult birds within hours of exposure.", "isCorrect": false, "rationale": "DDE's acute mammalian and avian toxicity is relatively low. The catastrophic harm is reproductive failure — eggshell thinning — not adult lethality. This is precisely why DDT was initially considered \"safe for vertebrates\" and why the eggshell mechanism took years to identify."}, {"text": "DDE blocks the migration instincts of birds, causing them to abandon nesting sites.", "isCorrect": false, "rationale": "DDE does not affect migration directly; the documented mechanism is eggshell thinning via carbonic anhydrase inhibition in the shell-forming gland."}], "id": "q05"}, {"question": "What was the population trajectory of bald eagles between 1963 and 2024 in the contiguous US, and what does this trajectory illustrate about the regulatory response to DDT?", "options": [{"text": "1963: 487 nesting pairs (down from estimated 100,000 pre-DDT). 1972: DDT banned. 2006: 9,789 nesting pairs; species delisted in 2007. 2024: > 70,000 breeding pairs — recovery from near-extinction within one human lifetime.", "isCorrect": true, "rationale": "The bald eagle case illustrates that environmental regulation can successfully reverse anthropogenic species declines when the causal mechanism is understood and the stressor is removed. Pre-DDT estimate: ~100,000 pairs. By 1963: 487 pairs (lowest documented). Listed as endangered in 1967. Ruckelshaus banned DDT in 1972. By 2006: 9,789 pairs; delisted from ESA in 2007. By 2024: > 70,000 breeding pairs — one of the great conservation success stories of the 20th century."}, {"text": "Bald eagles continue to decline despite the DDT ban; the species remains on the verge of extinction in 2024.", "isCorrect": false, "rationale": "Bald eagles have recovered dramatically post-1972, exceeding 70,000 breeding pairs by 2024. They were delisted from the ESA in 2007 due to documented recovery."}, {"text": "DDT was never banned; bald eagle recovery is unrelated to chemical regulation.", "isCorrect": false, "rationale": "EPA Administrator Ruckelshaus banned DDT in 1972 following an administrative hearing. Bald eagle populations began recovering within years, directly tied to DDT removal from the environment."}, {"text": "Bald eagles recovered fully by 1975, three years after the DDT ban.", "isCorrect": false, "rationale": "Recovery took decades due to legacy DDT/DDE in environmental sediments and slow population dynamics. By 2006 (over 30 years post-ban), pairs had reached 9,789 — full recovery to ESA delisting status came in 2007."}], "id": "q06"}, {"question": "The Minamata mercury poisoning case (1950s–1960s) established what novel concept about pollutant exposure that distinguishes it from prior toxicology?", "options": [{"text": "All pollutants affect adults and fetuses identically; there is no special concern for prenatal exposure.", "isCorrect": false, "rationale": "Minamata established the opposite: \"congenital Minamata disease\" demonstrated that fetal exposure can cause severe neurological damage even when the mother has no or mild symptoms. Prenatal exposure is often more severe than adult exposure."}, {"text": "Transplacental transfer of pollutants makes fetal exposure a distinct and often more severe risk than adult exposure; methylmercury crosses the placenta efficiently and damages developing brain tissue, producing congenital Minamata disease in infants of mothers showing no clinical symptoms.", "isCorrect": true, "rationale": "The Minamata case established the concept of transplacental transfer of pollutants as a distinct and more severe risk than adult exposure: a fetus may be harmed by chemicals that produce no detectable effect in the mother. Methylmercury crosses the placenta more efficiently than it affects adults, causing profound neurological injury during fetal development. This insight reshaped toxicology to consider developmental windows of heightened sensitivity."}, {"text": "Methylmercury is harmless to fetuses because the placenta filters all toxins.", "isCorrect": false, "rationale": "The placenta does not effectively filter methylmercury; this is precisely why prenatal exposure is so devastating in Minamata disease. The fetus receives high methylmercury concentrations through transplacental transfer."}, {"text": "Pollutant exposure cases require no government acknowledgment to drive scientific consensus.", "isCorrect": false, "rationale": "While the science was clear by the late 1950s, the Japanese government did not officially acknowledge the causal link until 1968 — a 12-year delay during which Chisso continued discharging. This delay illustrated political and social dimensions of pollution science, not its independence from acknowledgment."}], "id": "q07"}, {"question": "Which of the following is NOT among the four defining criteria of a Persistent Organic Pollutant (POP) under the Stockholm Convention framework?", "options": [{"text": "Resistance to environmental degradation (photolytic, biological, or chemical breakdown).", "isCorrect": false, "rationale": "This is the first criterion: persistence, the property from which POPs derive their name. Resistance to degradation distinguishes them from short-lived organic compounds."}, {"text": "Bioaccumulation in living tissue.", "isCorrect": false, "rationale": "This is the second criterion: bioaccumulation in tissue, driven by lipophilicity and slow excretion."}, {"text": "Long-range transport via air, water, and migratory organisms.", "isCorrect": false, "rationale": "This is the fourth criterion: ability to be transported long distances from the point of release. Mercury emitted from coal plants and PCBs from US factories have been documented in arctic biota thousands of kilometers from any source."}, {"text": "Acute toxicity to mammals at parts-per-billion concentrations.", "isCorrect": true, "rationale": "Acute mammalian toxicity is NOT a defining POP criterion. In fact, many POPs (including DDT) appeared safe based on acute mammalian toxicity tests at the time of their introduction. The four POP criteria are persistence, bioaccumulation, biomagnification, and long-range transport — together capturing properties that emerge over time and across food chains, not at the point of acute exposure."}], "id": "q08"}, {"question": "PFAS (\"forever chemicals\") have been linked to multiple health effects. Which of the following BEST describes their regulatory status as of 2024 and the structural reason for their persistence?", "options": [{"text": "PFAS contain carbon-fluorine bonds — among the strongest in organic chemistry — making them resistant to environmental degradation. EPA established Maximum Contaminant Levels of 4 parts per trillion (ppt) for PFOA and PFOS in drinking water in 2024 — among the strictest standards ever set.", "isCorrect": true, "rationale": "PFAS are a family of more than 12,000 synthetic compounds containing carbon-fluorine bonds, among the strongest bonds in organic chemistry. Their persistence stems from this molecular structure. Used in non-stick cookware (PTFE/Teflon), food packaging, stain-resistant fabrics, and firefighting foam (AFFF). PFAS contaminate drinking water at US military bases and airports that used AFFF. In 2024, EPA established MCLs of 4 ppt for PFOA and PFOS — among the strictest drinking-water standards ever set, linked to kidney cancer, thyroid disruption, immune suppression, and developmental effects."}, {"text": "PFAS biodegrade rapidly in soil and water within weeks; their regulation is unnecessary.", "isCorrect": false, "rationale": "The carbon-fluorine bond in PFAS is exceptionally stable; environmental persistence is precisely why they are called \"forever chemicals.\" Their regulation in 2024 reflected accumulating evidence of harm, not declining persistence."}, {"text": "PFAS are exempt from EPA regulation under the Toxic Substances Control Act (TSCA).", "isCorrect": false, "rationale": "EPA regulates PFAS under both TSCA and the Safe Drinking Water Act. The 2024 MCLs of 4 ppt for PFOA and PFOS are among the strictest standards ever set."}, {"text": "PFAS are confined to manufacturing sites and do not contaminate drinking water systems.", "isCorrect": false, "rationale": "PFAS contaminate drinking water at military bases and airports that used aqueous film-forming foam (AFFF), affecting communities far from manufacturing facilities. Their wide environmental distribution is documented."}], "id": "q09"}, {"question": "A water sample from a river receiving treated wastewater effluent contains atrazine at 0.1 ppb and ethinyl estradiol at 1 ppt. A scientist observes male fish in the river producing vitellogenin (an egg-yolk protein normally produced only by females). Which interpretation BEST captures the endocrine-disruption mechanism?", "options": [{"text": "The fish must be exposed to acutely lethal doses; vitellogenin production indicates cellular death, not endocrine disruption.", "isCorrect": false, "rationale": "Endocrine disruption occurs at concentrations far below acute lethality. Vitellogenin production in male fish is a sub-lethal endpoint indicating estrogenic disruption, not cellular death."}, {"text": "Pharmaceutical estrogens (ethinyl estradiol) and atrazine both interfere with hormonal signaling at extremely low concentrations; the endocrine system responds to hormones at parts-per-trillion, so both contaminants can produce reproductive abnormalities at doses well below conventional toxicological thresholds.", "isCorrect": true, "rationale": "Endocrine disruption can occur at extremely low concentrations — sometimes below conventional regulatory thresholds — because the endocrine system responds to hormones measured in parts per trillion. Synthetic estrogens (ethinyl estradiol from oral contraceptives) pass through human bodies and POTWs into receiving waters, where they cause male fish to produce vitellogenin — an estrogen-induced egg-yolk protein. Atrazine at concentrations as low as 0.1 ppb can demasculinize male frogs in laboratory studies."}, {"text": "Vitellogenin in male fish is a normal, healthy biological response and indicates no environmental concern.", "isCorrect": false, "rationale": "Male fish do not normally produce vitellogenin; its presence in male tissue is diagnostic of estrogenic disruption. This is the established biomarker for environmental estrogen exposure in fish."}, {"text": "Atrazine is banned in the United States, so it cannot be the cause of fish abnormalities here.", "isCorrect": false, "rationale": "Atrazine is banned in the European Union but remains in widespread use in the United States. It is the most widely used herbicide in US agriculture and is found in US drinking water at concentrations sufficient to demasculinize male frogs in laboratory studies."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
