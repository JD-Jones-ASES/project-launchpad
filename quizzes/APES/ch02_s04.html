<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Adaptation: Microevolution and Natural Selection</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which three conditions must hold simultaneously for natural selection to operate on a population?", "options": [{"text": "Variation, heritability, and differential reproductive success", "isCorrect": true, "rationale": "Correct. Without all three — heritable variation in a trait and consistent fitness differences among variants — allele frequencies will not shift across generations."}, {"text": "Mutation, migration, and genetic drift", "isCorrect": false, "rationale": "These are sources of variation or alternative evolutionary forces, not the three conditions for selection itself."}, {"text": "Allopatry, sympatry, and polyploidy", "isCorrect": false, "rationale": "These are speciation modes, not the conditions for natural selection."}, {"text": "Geographic isolation, large population size, and small mutation rate", "isCorrect": false, "rationale": "None of these are required for natural selection; large populations and isolation affect drift and speciation, not whether selection operates."}]}, {"question": "When a tan-to-dark-gray mouse population shifts mean coat color toward darker over twelve generations on a gray-rock substrate, which condition for natural selection is satisfied by the observed darkening itself?", "options": [{"text": "Variation only — the population shows multiple coat colors", "isCorrect": false, "rationale": "Variation is one condition, but the observed darkening across generations also evidences differential reproduction."}, {"text": "Heritability only — coat color is genetically transmitted", "isCorrect": false, "rationale": "Heritability is implied by the response to selection, but observing the shift across generations demonstrates more than heritability alone."}, {"text": "Differential reproduction — darker mice survive and reproduce more on the gray substrate", "isCorrect": true, "rationale": "Correct. The cross-generation shift to darker mean coat color implies that darker variants had higher fitness on gray rock — differential reproductive success."}, {"text": "Sexual selection only — mice prefer darker mates", "isCorrect": false, "rationale": "Sexual selection is a particular form of selection, but the scenario describes natural selection by camouflage on a gray substrate, not mate choice specifically."}]}, {"question": "How is fitness defined in evolutionary biology?", "options": [{"text": "Physical strength of an organism", "isCorrect": false, "rationale": "Fitness is not physical strength; it is reproductive success."}, {"text": "Lifespan of an organism", "isCorrect": false, "rationale": "Long lifespan does not equal fitness if reproduction is low."}, {"text": "The relative contribution of an individual or genotype to the next generation's gene pool, typically measured as the number of viable, fertile offspring that survive to reproductive age", "isCorrect": true, "rationale": "Correct. Fitness is always relative to the current environment; a trait that boosts fitness in one environment may be neutral or harmful in another."}, {"text": "An absolute measure of an organism's biological superiority", "isCorrect": false, "rationale": "There is no universal 'most fit' organism; fitness is always relative to specific environmental conditions."}]}, {"question": "During the 1976-77 Galapagos drought, the medium ground finch population on Daphne Major fell from approximately 1,200 to 180 individuals. The Grants documented that mean beak depth in subsequent generations increased by ~0.5 mm. Why was this conclusively natural selection rather than phenotypic plasticity?", "options": [{"text": "Because beak depth is environmentally induced and not heritable", "isCorrect": false, "rationale": "If beak depth were not heritable, the trait could not respond to selection. The Grants showed it is heritable."}, {"text": "Because beak depth in this species is highly heritable (h^2 ~ 0.65-0.70), so the trait shift in offspring of survivors reflects allele-frequency change", "isCorrect": true, "rationale": "Correct. High heritability means that the offspring of survivors inherited their parents' large-beak alleles, demonstrating that selection acted on heritable variation."}, {"text": "Because all the small-beaked birds died of unrelated causes", "isCorrect": false, "rationale": "The mortality was tied to the inability of small-beaked birds to crack hard caltrop seeds — a fitness-related cause."}, {"text": "Because the population size remained constant during the drought", "isCorrect": false, "rationale": "The population dropped from 1,200 to 180 — a major decline, not a stable size."}]}, {"question": "The 1976-77 drought demonstrated all THREE conditions of natural selection in the medium ground finch. Which of the following pairs the condition with its evidence correctly?", "options": [{"text": "Variation: existence of measurable differences in beak depth pre-drought", "isCorrect": true, "rationale": "Correct. Pre-drought measurements showed a normal distribution of beak depths, satisfying the variation condition."}, {"text": "Heritability: small-beaked birds had higher survival rates", "isCorrect": false, "rationale": "Higher survival rates document differential reproduction, not heritability. Heritability evidence comes from the offspring resembling parents (h^2 ~ 0.65-0.70)."}, {"text": "Differential reproduction: beak depth measurements were taken before the drought", "isCorrect": false, "rationale": "Pre-drought measurements document variation, not differential reproduction. Differential reproduction is shown by the survival differences during the drought."}, {"text": "Variation: the population size dropped from 1,200 to 180", "isCorrect": false, "rationale": "Population decline is a consequence of selection, not evidence of trait variation."}]}, {"question": "Distinguish allopatric from sympatric speciation:", "options": [{"text": "Allopatric requires hybridization; sympatric requires polyploidy", "isCorrect": false, "rationale": "Polyploidy is one mechanism of sympatric speciation, not a defining requirement; hybridization is not central to allopatric speciation."}, {"text": "Allopatric speciation occurs when a geographic barrier separates a population into reproductively isolated subpopulations; sympatric speciation occurs when new species arise within the same geographic area through ecological specialization, polyploidy, or sexual selection", "isCorrect": true, "rationale": "Correct. The defining difference is the presence (allopatric) or absence (sympatric) of an initial geographic barrier."}, {"text": "Allopatric is rapid; sympatric is gradual", "isCorrect": false, "rationale": "Speciation rate is not what distinguishes the two; geographic context is."}, {"text": "Allopatric occurs only in plants; sympatric occurs only in animals", "isCorrect": false, "rationale": "Both modes occur across many lineages; polyploidy is more common in plants but allopatric speciation is widespread in plants and animals."}]}, {"question": "Which feature of the Galapagos archipelago made it especially conducive to allopatric speciation in finches?", "options": [{"text": "Geographic isolation among islands combined with divergent selection pressures (different seed sizes, different habitats, different competition regimes)", "isCorrect": true, "rationale": "Correct. Isolation prevented gene flow, while different ecological conditions on each island drove divergent natural selection — the classic allopatric-speciation setup."}, {"text": "All islands share identical ecological conditions", "isCorrect": false, "rationale": "Identical conditions would not drive divergent selection; divergence requires different selection regimes."}, {"text": "Continuous landmass with no barriers to gene flow", "isCorrect": false, "rationale": "Continuous landmass favors sympatric processes, not allopatric isolation."}, {"text": "All finches share an identical fundamental niche", "isCorrect": false, "rationale": "Shared niches would not produce 14 divergent species; the radiation reflects differentiation, not uniformity."}]}, {"question": "What distinguishes microevolution from macroevolution?", "options": [{"text": "Microevolution involves genetic engineering; macroevolution does not", "isCorrect": false, "rationale": "Both are natural processes; genetic engineering is a separate human technology."}, {"text": "Microevolution refers to measurable changes in allele frequencies within a population over time; macroevolution refers to larger-scale patterns including the origin of new species and higher taxa", "isCorrect": true, "rationale": "Correct. The distinction is one of scale: micro = within-species change, macro = between-species and higher-taxon patterns."}, {"text": "Microevolution occurs only in plants; macroevolution only in animals", "isCorrect": false, "rationale": "Both processes occur in all lineages."}, {"text": "Microevolution requires polyploidy; macroevolution does not", "isCorrect": false, "rationale": "Polyploidy is one specific mechanism, not the distinguishing factor between micro and macro."}]}, {"question": "From an environmental-science perspective, why is the extinction of a species considered categorically different from other forms of environmental degradation?", "options": [{"text": "Extinction releases more pollution into the atmosphere than any other process", "isCorrect": false, "rationale": "Extinction does not directly release pollution; the categorical difference is about evolutionary irreversibility."}, {"text": "Speciation is irreversible and slow — a species lost represents millions of years of evolutionary history that cannot be reconstructed on any timescale relevant to human civilization", "isCorrect": true, "rationale": "Correct. Unlike pollution or habitat degradation, which are at least theoretically reversible, evolutionary lineages are nonrenewable on any human-relevant timescale."}, {"text": "All species can be cloned from preserved DNA", "isCorrect": false, "rationale": "While techniques like de-extinction are being explored, full-lineage reconstruction at scale is not feasible; the textbook frames extinction as effectively permanent."}, {"text": "Extinction events occur quickly and reverse themselves naturally", "isCorrect": false, "rationale": "The opposite is true — extinction is irreversible and speciation is slow."}]}, {"question": "What are the primary sources of new genetic variation in a population?", "options": [{"text": "Predation, competition, and disturbance", "isCorrect": false, "rationale": "These are ecological pressures that act on existing variation, not sources of new variation."}, {"text": "Mutation, genetic recombination during sexual reproduction, and gene flow from neighboring populations", "isCorrect": true, "rationale": "Correct. Mutations introduce novel alleles, recombination shuffles them in sexual species, and gene flow imports alleles from other populations."}, {"text": "Natural selection and genetic drift", "isCorrect": false, "rationale": "These act on existing variation; they sort variation rather than create it."}, {"text": "Allopatric speciation alone", "isCorrect": false, "rationale": "Allopatric speciation is an outcome that depends on existing genetic variation; it does not create new variation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
