        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; The Tragedy of the Commons and Sustainability Economics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A coastal village shares a common fishing ground in which any villager may set traps. Each villager realizes that adding one more lobster trap brings full personal income while the cost of stock depletion is shared across all villagers. Within a generation, the lobster population collapses. Which feature of the resource is the central driver of this collapse in Hardin's framework?", "options": [{"text": "The resource is excludable but non-rival, so individual users cannot be charged for use.", "isCorrect": false, "rationale": "This describes a club good, not a common-pool resource. Common-pool resources are rival, not non-rival."}, {"text": "The resource is rival but non-excludable, so individual benefits exceed each user's fractional share of collective harm.", "isCorrect": true, "rationale": "Hardin's tragedy emerges when a resource is rival (one user's catch reduces what is available for others) AND non-excludable (no one can be prevented from fishing). The mismatch between privatized benefit and socialized cost incentivizes overuse."}, {"text": "The resource is both rival and excludable, so private property rights are unenforceable.", "isCorrect": false, "rationale": "Rival + excludable describes a private good. These are not subject to the tragedy because owners bear the full cost of overuse themselves."}, {"text": "The resource is non-rival and non-excludable, so it qualifies as a public good and cannot be privatized.", "isCorrect": false, "rationale": "Non-rival + non-excludable describes a pure public good (e.g., national defense), which has different governance challenges than common-pool resources. Fish stocks ARE rival - one boat's catch reduces the next boat's catch."}]}, {"question": "A coal-fired power plant emits sulfur dioxide that causes acid rain damage to forests and lakes downwind. The market price of the plant's electricity reflects only fuel and labor costs, not the cost of the acid deposition. From an environmental economics standpoint, what term best describes this situation, and what policy tool was specifically designed by A. C. Pigou to correct it?", "options": [{"text": "A positive externality, corrected by a Pigovian subsidy that pays the plant to reduce emissions.", "isCorrect": false, "rationale": "Acid rain damage is a cost imposed on third parties, making it a negative externality, not a positive one. Pigovian subsidies are tools for positive externalities (e.g., vaccination)."}, {"text": "A negative externality, corrected by a Pigovian tax equal to the per-unit external cost of the activity.", "isCorrect": true, "rationale": "When a transaction imposes costs on third parties not party to it, that is a negative externality. A. C. Pigou proposed a per-unit tax equal to the external cost, raising market price to reflect true social cost and reducing output to socially optimal levels."}, {"text": "A common-pool resource problem, corrected only by command-and-control regulation that mandates specific technology.", "isCorrect": false, "rationale": "While acid rain involves the atmosphere as a shared sink, the textbook frames this as an externality problem (cost spillover). Pigou's tool was a tax, not technology mandate. Command-and-control is one option among several."}, {"text": "A market failure of underproduction, corrected by a cap-and-trade system that issues tradable permits.", "isCorrect": false, "rationale": "Negative externalities cause OVERproduction (too much pollution), not underproduction. Cap-and-trade is a valid tool but was not Pigou's specific contribution; Pigou is associated with corrective taxation."}]}, {"question": "The 1990 Clean Air Act Amendments established a cap-and-trade system for sulfur dioxide that achieved emission reductions at roughly half the projected cost of command-and-control regulation. Which structural feature of cap-and-trade explains this cost advantage?", "options": [{"text": "The cap guarantees a maximum total emission, but trading allows reductions to occur at firms with the lowest marginal abatement cost.", "isCorrect": true, "rationale": "Cap-and-trade fixes total emissions via the cap while letting the permit market reallocate reductions: firms that can cut cheaply sell permits to firms for which cuts are expensive. Aggregate compliance cost is minimized because abatement happens where it is cheapest."}, {"text": "Cap-and-trade does not require government to set any standards, eliminating administrative cost.", "isCorrect": false, "rationale": "Cap-and-trade requires government to set the cap and create/distribute permits — there is significant regulatory infrastructure. The cost advantage comes from market flexibility, not absence of regulation."}, {"text": "Cap-and-trade taxes emissions at a higher rate than command-and-control, generating revenue that offsets compliance cost.", "isCorrect": false, "rationale": "Cap-and-trade systems typically issue or auction permits but are not 'higher tax' systems. The cost savings come from flexibility in how reductions are achieved, not from higher rates."}, {"text": "Command-and-control imposes uniform technology mandates, while cap-and-trade exempts small emitters from any reduction obligation.", "isCorrect": false, "rationale": "Cap-and-trade does not categorically exempt small emitters. The advantage is flexibility in WHERE reductions occur, not in WHO is exempt."}]}, {"question": "Costanza et al. (1997) estimated that global ecosystem services were worth approximately $33 trillion per year — at the time roughly equal to global GDP — yet none of this value appeared in national accounts. Which conceptual point does ecological economics draw from this calculation?", "options": [{"text": "Natural resources have no economic value until they are extracted and brought to market.", "isCorrect": false, "rationale": "This is the opposite of the ecological economics view. The Costanza calculation precisely shows that ecosystems have enormous value EVEN BEFORE extraction — a value invisible in conventional accounts."}, {"text": "Markets that price extraction (e.g., timber) but not the standing services of natural capital (e.g., watershed function) systematically over-extract.", "isCorrect": true, "rationale": "Ecological economics treats forests, wetlands, fisheries as natural capital that generates ongoing flows of ecosystem services. When markets price the timber but not the watershed function, the forest is mathematically worth more cut than standing — leading to over-extraction."}, {"text": "Neoclassical economics already prices ecosystem services correctly through commodity markets.", "isCorrect": false, "rationale": "The Costanza estimate of $33 trillion reflects services that are NOT in commodity markets — pollination, flood buffering, climate regulation. Their absence from conventional accounts is precisely the point."}, {"text": "Ecosystem services should be ignored in policy because they cannot be priced precisely enough for cost-benefit analysis.", "isCorrect": false, "rationale": "Ecological economists argue the opposite: even imprecise estimates correct the bias of treating ecosystem services as worth zero, which is the implicit assumption when they are excluded entirely."}]}, {"question": "The global average ecological footprint is approximately 2.7 hectares per person while Earth's biocapacity is approximately 1.6 hectares per person. According to the Wackernagel-Rees framework, what term describes this gap, and what does it imply about humanity's current trajectory?", "options": [{"text": "Surplus capacity; humanity is investing biological savings for future generations.", "isCorrect": false, "rationale": "The footprint EXCEEDS biocapacity by ~1.1 hectares per person. This is a deficit, not surplus. There is no investment for future generations; instead, current consumption is drawing on stocks."}, {"text": "Ecological overshoot; humanity is consuming natural capital faster than it regenerates, drawing down stocks of forests, fisheries, aquifers, and soil.", "isCorrect": true, "rationale": "Wackernagel and Rees defined overshoot as the condition where aggregate footprint exceeds biocapacity. Because humanity cannot exceed regeneration permanently, overshoot must be financed by liquidating natural capital — exactly what is observed in declining fisheries, aquifers, and forests."}, {"text": "Substitution capacity; technology will allow synthetic alternatives to replace declining natural capital.", "isCorrect": false, "rationale": "Substitutability is precisely what ecological economics rejects for natural capital. Even if it were valid, it would not be implied by the footprint calculation itself, which simply documents the present consumption gap."}, {"text": "Resource neutrality; the gap exists only on paper because the footprint methodology overestimates demand.", "isCorrect": false, "rationale": "While methodologies have been criticized, the textbook treats the gap as real and refers to it specifically as 'overshoot' — humanity consuming faster than regeneration."}]}, {"question": "Suppose a policy analyst applies a 10% discount rate to a future cost of $100 in environmental damage occurring 30 years from now. The present value of that damage is mathematically small. Which critique of high discount rates does ecological economics emphasize in such cases?", "options": [{"text": "Discount rates apply only to monetary investments and cannot be used in environmental analysis at all.", "isCorrect": false, "rationale": "Discount rates ARE applied to environmental cost-benefit analyses. The ecological economics critique targets the high RATE choice, not the use of discounting per se."}, {"text": "High discount rates make over-harvesting 'rational' by undervaluing future costs imposed on people not yet born and unable to consent to the trade-off.", "isCorrect": true, "rationale": "The textbook's intergenerational equity argument: when the costs (depleted aquifers, climate destabilization, eroded soils) fall on people not yet born, mathematically discounting their welfare at market rates is morally indefensible — and in practice favors today's extraction over tomorrow's conservation."}, {"text": "High discount rates produce overinvestment in future-oriented environmental policies, wasting current resources.", "isCorrect": false, "rationale": "The opposite is true. High discount rates UNDERinvest in future-oriented policies because they treat future benefits as nearly worthless, biasing toward present consumption."}, {"text": "Discount rates higher than 5% are illegal under federal cost-benefit analysis rules.", "isCorrect": false, "rationale": "There is no such legal cap. Federal agencies use a range of rates (typically 3-7%); the argument is normative and contested, not legal."}]}, {"question": "Which of the following best distinguishes a Pigovian tax from a cap-and-trade permit system in terms of environmental certainty?", "options": [{"text": "Both tools guarantee a fixed emission level; they differ only in administrative complexity.", "isCorrect": false, "rationale": "Only cap-and-trade fixes the emission level. A Pigovian tax fixes price, leaving total emissions to depend on demand response."}, {"text": "A Pigovian tax sets the price of pollution but lets total emissions vary with demand; cap-and-trade sets the total quantity of pollution but lets the permit price vary.", "isCorrect": true, "rationale": "This is the core trade-off: tax gives price certainty (predictable per-unit cost) but quantity uncertainty. Cap-and-trade gives quantity certainty (the cap is the maximum) but price uncertainty (permit prices fluctuate). Cap-and-trade is therefore the stronger ENVIRONMENTAL guarantee."}, {"text": "A Pigovian tax is paid to the government; a cap-and-trade permit is paid to other firms — neither system reduces emissions.", "isCorrect": false, "rationale": "Both systems reduce emissions: the tax raises private cost (lowering output of polluting goods); the cap directly limits aggregate emissions. The claim that 'neither reduces emissions' is wrong."}, {"text": "A Pigovian tax provides stronger environmental certainty because the tax rate cannot be evaded; cap-and-trade allows polluters to buy unlimited permits.", "isCorrect": false, "rationale": "This reverses the actual relationship. Cap-and-trade fixes the quantity, providing stronger environmental certainty than a tax (which fixes only the price per unit)."}]}, {"question": "A municipal water utility charges residents a flat monthly fee regardless of how much water they use. Using Hardin's framework, what consumption pattern would you predict, and what fee structure would better align individual incentives with sustainable use?", "options": [{"text": "Consumption will decline because residents have no incentive to conserve once their fee is paid; a flat fee is sufficient.", "isCorrect": false, "rationale": "The opposite: flat fees encourage HIGH use because once paid, the marginal cost of additional water is zero. Residents face no individual disincentive to overuse."}, {"text": "Consumption will rise because the marginal cost of an additional unit of water is zero; a volumetric (per-unit) or tiered increasing-block rate would better align incentives by making private cost track use.", "isCorrect": true, "rationale": "Hardin's framework predicts overuse when individual cost of an additional unit is below collective cost. A flat fee makes the marginal cost zero, so use rises until physically constrained. Volumetric or block-tier pricing makes private cost rise with use, internalizing the cost of consumption."}, {"text": "Consumption will be unaffected because water demand is perfectly inelastic — people use what they need regardless of price.", "isCorrect": false, "rationale": "Empirically, residential water demand IS responsive to price (price elasticity around -0.3 to -0.4 in the U.S.). Tiered pricing reliably reduces use by 10-30%."}, {"text": "Consumption will decline because residents will associate the flat fee with environmental responsibility.", "isCorrect": false, "rationale": "The flat fee removes the marginal-cost signal that drives conservation behavior. Awareness alone, without price feedback, produces minimal behavioral change."}]}, {"question": "Elinor Ostrom's 2009 Nobel Prize-winning research challenged Hardin's framework in what specific way?", "options": [{"text": "She showed that all common-pool resources inevitably collapse, regardless of governance structure.", "isCorrect": false, "rationale": "Ostrom's finding was the OPPOSITE: communities frequently develop governance rules that PREVENT collapse, even without privatization or state regulation."}, {"text": "She demonstrated that communities frequently develop informal governance rules that prevent tragedy without requiring either privatization or state coercion.", "isCorrect": true, "rationale": "Ostrom's empirical research on irrigation cooperatives, fishery commons, and grazing pastures showed that self-organized communities reliably create rules (boundaries, monitoring, graduated sanctions) that sustainably manage shared resources without external enforcement."}, {"text": "She proved that Pigovian taxes are the only effective solution to externalities.", "isCorrect": false, "rationale": "Ostrom focused on community institutions, not Pigovian taxes. Her work is most often cited as a third path between Hardin's two solutions (privatization or state)."}, {"text": "She argued that population growth was the sole cause of resource collapse, vindicating Hardin's argument.", "isCorrect": false, "rationale": "Ostrom did not focus on population. Hardin extended his argument to population, but Ostrom's contribution was on governance, not demographics."}]}, {"question": "Which of the following situations represents a POSITIVE externality, and what is the predicted market failure that results?", "options": [{"text": "A factory emits particulate pollution; the market overproduces because the firm bears no cost of the harm.", "isCorrect": false, "rationale": "Pollution is a NEGATIVE externality (cost imposed on others), not positive. The diagnosis (overproduction) is correct, but the example is reversed."}, {"text": "A child vaccinated against a communicable disease protects unvaccinated neighbors through herd immunity; the market underproduces because the producer cannot capture the full social benefit.", "isCorrect": true, "rationale": "Vaccination confers benefits on third parties (unvaccinated neighbors get herd-immunity protection without paying), making it a positive externality. Markets underproduce positive externalities because the producer's private benefit is less than the social benefit."}, {"text": "A power plant emits sulfur dioxide causing acid rain; the market underproduces because regulatory costs are high.", "isCorrect": false, "rationale": "Acid rain is a negative externality, and negative externalities cause OVER-production, not under-production. Both elements of this option are wrong."}, {"text": "A traffic jam delays commuters; the market overproduces because driving is undertaxed.", "isCorrect": false, "rationale": "Traffic congestion IS a negative externality producing overuse — but this is a negative externality, not the positive externality the question asked for."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
