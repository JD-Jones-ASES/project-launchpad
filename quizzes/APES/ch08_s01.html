<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Point versus Nonpoint Source Pollution and Water Quality Indicators</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A federal inspector traces a discharge plume in a river back to a single outfall pipe at a paper mill. Under the Clean Water Act, how is this discharge classified, and what specific regulatory mechanism applies?", "options": [{"text": "It is a nonpoint source regulated under Section 319, which requires voluntary best management practices.", "isCorrect": false, "rationale": "Section 319 governs diffuse, landscape-scale pollution like agricultural runoff. A discrete pipe traceable to a single operator is a textbook point source, not a nonpoint source."}, {"text": "It is a point source regulated under the National Pollutant Discharge Elimination System (NPDES), which requires a permit specifying maximum allowable concentrations and loads.", "isCorrect": true, "rationale": "A discernible, confined, and discrete conveyance — including a pipe, ditch, or outfall — meets the statutory definition of a point source. NPDES permits set technology-based effluent limits and water-quality-based limits, with enforcement against named operators."}, {"text": "It is exempt from federal regulation because the Clean Water Act applies only to municipal sewage.", "isCorrect": false, "rationale": "The CWA covers industrial discharges as a major category of NPDES-regulated point sources, with technology-based effluent limits (best available technology, BAT) for industrial dischargers."}, {"text": "It is a combined sewer overflow regulated through Long-Term Control Plans only during storm events.", "isCorrect": false, "rationale": "CSOs are a specific subcategory of point source associated with older single-pipe systems carrying both sewage and stormwater. A continuous mill outfall is not a CSO; it is a routine industrial point source."}]}, {"question": "Which of the following BEST explains why agricultural runoff remains the leading remaining cause of water-quality impairment in the United States despite five decades of Clean Water Act enforcement?", "options": [{"text": "Agricultural runoff is technically a point source but EPA has chosen not to enforce NPDES permits against farmers.", "isCorrect": false, "rationale": "Agricultural runoff is a nonpoint source by definition — it is diffuse, spatially dispersed, and not attributable to a single discrete conveyance. The issue is statutory, not enforcement discretion."}, {"text": "Fertilizers and pesticides degrade so rapidly in soil that no monitoring program can detect them in surface water.", "isCorrect": false, "rationale": "The opposite is true: nitrate and phosphate from cropland are routinely detected in tile drains, streams, and coastal waters. Detection is not the limitation; the regulatory tool is."}, {"text": "Agricultural runoff is a nonpoint source largely excluded from NPDES; CWA Section 319 relies on voluntary best management practices and state planning rather than mandatory permits.", "isCorrect": true, "rationale": "Nonpoint sources cannot be traced to a single permitted facility, so the NPDES permit system does not apply. Section 319's voluntary BMP framework lacks the enforcement teeth that cleaned up industrial and municipal discharges after 1972, leaving agricultural pollution as the dominant remaining problem."}, {"text": "Most US farmland generates no measurable runoff because modern fertilizer practices apply nutrients only at rates plants can absorb.", "isCorrect": false, "rationale": "The quantity of nitrogen and phosphorus applied to US cropland far exceeds what plants can absorb; the excess migrates to tile drains and ultimately to rivers and coastal waters."}]}, {"question": "A water sample collected downstream from an unknown discharge has BOD₅ = 22 mg/L and DO = 1.8 mg/L. Which interpretation is MOST accurate?", "options": [{"text": "The water is well-oxygenated and capable of supporting a sensitive cold-water trout population.", "isCorrect": false, "rationale": "Trout require DO > 8 mg/L; a DO of 1.8 mg/L is well below even the general fish threshold of 5 mg/L. The water is clearly stressed."}, {"text": "The water is hypoxic (DO below 2 mg/L) with elevated organic loading; it cannot support trout and likely indicates a recent organic discharge.", "isCorrect": true, "rationale": "Hypoxic conditions occur below 2 mg/L DO; 1.8 mg/L meets this threshold. BOD₅ of 22 mg/L is roughly an order of magnitude above pristine streams (BOD < 2 mg/L), signaling heavy organic pollution. Trout require DO > 8 mg/L, so the water is unsuitable."}, {"text": "The water is anoxic and biologically dead, with no possibility of recovery downstream.", "isCorrect": false, "rationale": "Anoxic conditions occur below 0.5 mg/L; at 1.8 mg/L the water is hypoxic, not anoxic. The Streeter-Phelps oxygen sag model also predicts downstream recovery once organic load is depleted."}, {"text": "The BOD value indicates the water is safe for swimming because BOD measures only oxygen demand, not pathogens.", "isCorrect": false, "rationale": "BOD of 22 mg/L signals heavy organic pollution likely accompanied by fecal contamination. Recreational safety requires fecal coliform testing (E. coli < 235 CFU/100 mL), not BOD alone, and high BOD typically co-occurs with elevated coliform counts."}]}, {"question": "A monitoring station 1 km downstream of a wastewater outfall records DO approaching zero, hydrogen sulfide odor, and only tubifex worms surviving. According to the Streeter-Phelps oxygen sag model, this station is in which zone, and what process produces the conditions?", "options": [{"text": "The recovery zone, where re-aeration restores DO and bacterial populations crash.", "isCorrect": false, "rationale": "The recovery zone shows rising DO, declining BOD, and reappearance of pollution-sensitive species. The described conditions (zero DO, H₂S, only tolerant worms) are the opposite."}, {"text": "The septic zone, where DO approaches zero and anaerobic bacteria produce H₂S and CH₄ as decomposition byproducts.", "isCorrect": true, "rationale": "The septic zone is the most severe phase of the oxygen sag curve. Aerobic decomposition has exhausted DO; anaerobic bacteria take over, producing H₂S (rotten-egg odor) and methane. Only pollution-tolerant species like tubifex worms and chironomid midges can survive."}, {"text": "The degradation zone, where re-aeration exceeds bacterial oxygen demand.", "isCorrect": false, "rationale": "The degradation zone is where DO drops sharply because bacterial decomposition consumes O₂ faster than re-aeration can replace it. It is not where re-aeration exceeds demand — that occurs in the recovery zone."}, {"text": "The pristine baseline zone upstream of any human influence.", "isCorrect": false, "rationale": "Pristine baseline conditions show DO near saturation (often >8 mg/L), low BOD (<2 mg/L), and diverse aquatic life. Zero DO, H₂S, and dominance by tolerant worms are diagnostic of severe organic pollution."}]}, {"question": "An environmental scientist measures fecal coliform at 412 CFU/100 mL E. coli at a public swimming beach. Under EPA's recreational water-quality standard, what action is warranted, and what does the value indicate?", "options": [{"text": "No action is required because EPA's standard is 1,000 CFU/100 mL.", "isCorrect": false, "rationale": "EPA's recreational standard for E. coli is 235 CFU/100 mL, not 1,000. A reading of 412 is well above this threshold."}, {"text": "A beach closure is warranted because the value exceeds EPA's 235 CFU/100 mL recreational standard, and the count signals possible contamination by pathogens of fecal origin.", "isCorrect": true, "rationale": "EPA's recreational standard requires E. coli below 235 CFU/100 mL; exceedances trigger beach closures. Fecal coliform indicates contamination from humans or warm-blooded animals and signals possible co-occurring pathogens (gastroenteritis, hepatitis A, more serious waterborne illness)."}, {"text": "Coliform bacteria are not pathogenic, so no closure is warranted regardless of the value.", "isCorrect": false, "rationale": "While E. coli itself is not necessarily the disease-causing agent, its presence indicates fecal contamination and the likely co-occurrence of human pathogens. EPA's 235 CFU/100 mL threshold exists precisely because exceedances correlate with measurable illness risk to swimmers."}, {"text": "The value is below the threshold for nitrate concern, so the beach is safe.", "isCorrect": false, "rationale": "Nitrate (10 mg/L MCL) is a separate drinking-water indicator entirely unrelated to recreational fecal-contamination standards. Conflating the two confuses two different regulatory frameworks."}]}, {"question": "Which of the following BEST illustrates the structural asymmetry between point-source and nonpoint-source regulation under the Clean Water Act?", "options": [{"text": "Point sources require permits with enforceable numeric limits and named operators; nonpoint sources rely on voluntary best management practices, state planning, and incentive payments.", "isCorrect": true, "rationale": "Point sources are traceable to a discrete pipe and operator, so NPDES permits can specify enforceable limits and prosecute violators. Nonpoint sources cannot be traced to a single party, so Section 319 relies on landscape-scale incentives and voluntary BMPs. This asymmetry explains the rapid post-1972 progress on industrial/municipal pollution and the persistent agricultural problem."}, {"text": "Both point and nonpoint sources are regulated identically under NPDES, with the same numeric effluent limits.", "isCorrect": false, "rationale": "Nonpoint sources are largely excluded from NPDES. The two categories have fundamentally different regulatory mechanisms — that asymmetry is the point of the distinction."}, {"text": "Nonpoint sources have stricter regulatory limits than point sources because they collectively contribute more pollution.", "isCorrect": false, "rationale": "While nonpoint sources do contribute the majority of remaining water-quality impairment, they have weaker (largely voluntary) regulatory tools, not stricter ones."}, {"text": "Point sources are unregulated; only nonpoint sources are subject to EPA jurisdiction.", "isCorrect": false, "rationale": "This reverses the actual regulatory framework. Point sources are tightly regulated through NPDES; nonpoint sources are the regulatory gap."}]}, {"question": "Section 101 of the Clean Water Act set two famously aspirational goals: eliminate discharge of pollutants by 1985 and achieve fishable/swimmable waters by July 1, 1983. Neither was met. Which response BEST describes why aspirational goals can serve a useful regulatory function even when missed on schedule?", "options": [{"text": "Aspirational goals are legally binding deadlines, so missing them automatically triggers federal sanctions against the responsible states.", "isCorrect": false, "rationale": "Aspirational goals in CWA Section 101 are explicitly framed as national goals and policies, not legally binding deadlines with automatic sanctions. Their function is rhetorical and directional, not punitive."}, {"text": "Aspirational goals create a normative direction and benchmark for evaluating progress, justify continued federal funding, and political pressure even when the timeline is unrealistic; CWA succeeded in establishing NPDES permits and federal funding for POTWs even though both deadlines were missed.", "isCorrect": true, "rationale": "Aspirational goals frame the trajectory of regulatory effort and create a yardstick for evaluating progress. CWA's enduring successes — the NPDES permit system for point sources and federal financial assistance for publicly owned treatment works — flowed from this directional commitment, even though the specific deadlines were not met on schedule."}, {"text": "Aspirational goals are useful only if they are met within five years; otherwise they undermine regulatory credibility entirely.", "isCorrect": false, "rationale": "Despite missing both deadlines, CWA generated substantial improvements in water quality through NPDES permits and POTW funding. The premise that missed deadlines automatically destroy credibility is contradicted by the post-1972 record."}, {"text": "The 1983 swimmable goal was met; only the 1985 elimination goal failed.", "isCorrect": false, "rationale": "Both goals were missed. Many US waters still fail to meet fishable/swimmable standards, and pollutant discharge continues, although NPDES permits substantially reduced industrial and municipal contributions."}]}, {"question": "Why is phosphorus typically the limiting nutrient in freshwater systems while nitrogen is limiting in most coastal marine systems?", "options": [{"text": "Phosphorus is far more abundant in freshwater than nitrogen, while nitrogen is more abundant in seawater.", "isCorrect": false, "rationale": "The pattern is the opposite: phosphorus is typically scarce relative to algal demand in freshwater, making it the limiting nutrient. Nitrogen is the proximate control on algal growth in marine systems."}, {"text": "Phosphorus availability constrains algal growth in freshwater; nitrogen availability constrains algal growth in coastal marine systems.", "isCorrect": true, "rationale": "Most freshwater algal communities run out of phosphorus before nitrogen, so adding phosphorus triggers blooms. Most coastal marine algal communities run out of dissolved inorganic nitrogen first, so nitrogen loading drives marine eutrophication. This distinction shapes which fertilizer inputs cause the most harm in each system."}, {"text": "Both freshwater and marine systems are limited by phosphorus, with no meaningful difference between them.", "isCorrect": false, "rationale": "The freshwater/marine distinction is clinically relevant and shapes EPA priorities — freshwater nutrient management focuses on phosphorus controls (e.g., detergent phosphate bans), while marine eutrophication management targets nitrogen."}, {"text": "Sunlight, not nutrients, is the limiting factor in all aquatic systems.", "isCorrect": false, "rationale": "While light can limit photosynthesis at depth, the primary nutrient controlling algal growth in surface waters is phosphorus (freshwater) or nitrogen (marine). Light limitation does not displace nutrient limitation in shallow productive waters."}]}, {"question": "A combined sewer overflow (CSO) releases untreated sewage and stormwater into a river during a heavy rain. Which classification and regulatory framework applies?", "options": [{"text": "It is a nonpoint source because storm events are weather-driven and diffuse.", "isCorrect": false, "rationale": "Although triggered by weather, a CSO discharges through a discrete sewer outfall — a confined, identifiable conveyance. That makes it a point source under the CWA."}, {"text": "It is a point source subject to NPDES; EPA requires municipalities to develop Long-Term Control Plans to manage CSO discharges.", "isCorrect": true, "rationale": "CSOs occur in older cities with single-pipe systems carrying both sewage and stormwater; during heavy rain the combined flow exceeds plant capacity and overflows directly to receiving waters. CSOs are point sources under NPDES, and EPA requires Long-Term Control Plans to reduce CSO frequency and volume."}, {"text": "It is exempt from CWA jurisdiction because the discharge is intermittent.", "isCorrect": false, "rationale": "Intermittency does not exempt a discharge from NPDES; CSOs are explicitly regulated as point sources, with permit requirements for managing their discharges."}, {"text": "It is a combined sewer overflow only if the discharge contains industrial waste; municipal CSOs are unregulated.", "isCorrect": false, "rationale": "CSOs are defined by combining sewage and stormwater in a single pipe, regardless of industrial input. All CSOs are point sources subject to NPDES."}]}, {"question": "Atmospheric deposition of nitrogen from a coal-fired power plant 500 km away falls onto a coastal estuary. Within the CWA framework, how is this nitrogen input categorized, and what does it imply for management?", "options": [{"text": "It is a point source because the power plant is an identifiable facility with a stack.", "isCorrect": false, "rationale": "While the power plant emits via a stack, atmospheric deposition disperses the nitrogen across thousands of square kilometers before it reaches surface waters. By the time the nitrogen enters the estuary, it cannot be traced to a single conveyance — it is nonpoint."}, {"text": "It is a nonpoint source under the CWA. In coastal waters, atmospheric nitrogen deposition can contribute 10–40% of total nitrogen inputs and is largely outside NPDES jurisdiction, requiring instead air-quality controls under the Clean Air Act.", "isCorrect": true, "rationale": "Atmospheric deposition is a classic nonpoint source: the nitrogen oxides from vehicle exhaust and power plants disperse over wide regions and deposit diffusely. Coastal waters can receive 10–40% of their total nitrogen inputs from the atmosphere, but managing this loading requires Clean Air Act controls on emissions, not CWA permits on the receiving water."}, {"text": "It is regulated under CWA Section 404, which governs dredge and fill activities.", "isCorrect": false, "rationale": "Section 404 regulates dredged or fill material discharged into waters and wetlands. Atmospheric nitrogen deposition is governed instead through air-quality regulation (Clean Air Act) and is treated as a nonpoint contribution to water bodies."}, {"text": "It is exempt from all federal regulation because cross-state air pollution is excluded from environmental statutes.", "isCorrect": false, "rationale": "Cross-state air pollution is regulated under the Clean Air Act, including the Cross-State Air Pollution Rule. Atmospheric deposition contributing to water-quality impairment connects the two statutes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
