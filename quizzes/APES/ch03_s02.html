<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Carrying Capacity, Logistic and Exponential Growth</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes exponential growth?", "options": [{"text": "Population growth that decelerates as resources become scarce, producing an S-shaped curve", "isCorrect": false, "rationale": "This describes logistic growth, not exponential."}, {"text": "Population growth in which the per-capita rate of increase remains constant regardless of population density, producing a J-shaped curve", "isCorrect": true, "rationale": "Exponential growth assumes unlimited resources, so r stays constant and the curve becomes steeper over time."}, {"text": "Population growth where birth and death rates exactly balance", "isCorrect": false, "rationale": "Balanced rates produce zero growth, not exponential growth."}, {"text": "Population growth driven exclusively by immigration", "isCorrect": false, "rationale": "Exponential growth refers to natural increase patterns, not migration."}], "id": "q01"}, {"question": "Stimulus: A deer population of 500 occupies a habitat with carrying capacity K = 800 and intrinsic growth rate r = 0.3 per year. Using the logistic equation dN/dt = rN((K-N)/K), what is the approximate dN/dt?", "options": [{"text": "Approximately 56 deer per year", "isCorrect": true, "rationale": "dN/dt = 0.3 × 500 × ((800-500)/800) = 150 × (300/800) = 150 × 0.375 ≈ 56."}, {"text": "Approximately 150 deer per year", "isCorrect": false, "rationale": "150 is rN alone (exponential), but the logistic braking factor (K-N)/K = 0.375 reduces it."}, {"text": "Approximately 300 deer per year", "isCorrect": false, "rationale": "300 is K-N (the resource gap), not the actual population growth rate."}, {"text": "Approximately 240 deer per year", "isCorrect": false, "rationale": "This does not match the logistic formula calculation."}], "id": "q02"}, {"question": "Carrying capacity (K) is best described as:", "options": [{"text": "A fixed, unchanging environmental ceiling for any species in any habitat", "isCorrect": false, "rationale": "K is dynamic — it shifts with droughts, disease, and human activity."}, {"text": "The maximum population size that an environment can sustain indefinitely without resource degradation", "isCorrect": true, "rationale": "K reflects the balance between births/immigration and deaths/emigration, set by available resources."}, {"text": "The population size at which exponential growth begins", "isCorrect": false, "rationale": "Exponential growth occurs at any population size when resources are unlimited; K is the sustainable ceiling, not a starting point."}, {"text": "The number of individuals required for a species to avoid inbreeding", "isCorrect": false, "rationale": "This describes minimum viable population, a different concept."}], "id": "q03"}, {"question": "Stimulus: In 1944, 29 reindeer were released onto Saint Matthew Island, Alaska, with no predators and abundant lichen. By 1963, the population had grown to about 6,000. By 1969, only 42 reindeer remained. This pattern best illustrates:", "options": [{"text": "Logistic growth approaching equilibrium", "isCorrect": false, "rationale": "Logistic growth levels off smoothly at K — this case crashed catastrophically."}, {"text": "Density-independent regulation by climate", "isCorrect": false, "rationale": "Although Arctic climate matters, the crash was driven by overgrazing of the lichen food base, a density-dependent process."}, {"text": "Overshoot and dieback, where a population exceeds carrying capacity, depletes its resource base, and then crashes", "isCorrect": true, "rationale": "Reindeer overgrazed the slow-growing lichen, degraded the resource, and the population collapsed — a textbook overshoot scenario."}, {"text": "Constant per-capita growth at carrying capacity", "isCorrect": false, "rationale": "Per-capita growth fell to deeply negative values during the crash, the opposite of constant."}], "id": "q04"}, {"question": "Which is an example of a density-dependent limiting factor?", "options": [{"text": "A hurricane that destroys nesting sites", "isCorrect": false, "rationale": "Hurricanes affect populations regardless of density — density-independent."}, {"text": "A hard frost that kills aphids", "isCorrect": false, "rationale": "Frost kills the same percentage regardless of density — density-independent."}, {"text": "Infectious disease that spreads more rapidly when individuals are crowded", "isCorrect": true, "rationale": "Disease transmission scales with contact rates, which rise with density — a defining density-dependent factor."}, {"text": "A drought that kills the same percentage of a herd whether it has 200 or 2,000 animals", "isCorrect": false, "rationale": "This is the textbook example of density-independent regulation."}], "id": "q05"}, {"question": "On a logistic growth curve, the population growth rate (dN/dt) is greatest at:", "options": [{"text": "N very close to 0, when the population is just established", "isCorrect": false, "rationale": "When N is small, even at high per-capita r, the absolute increment is small because few individuals are reproducing."}, {"text": "N = K/2, the inflection point of the S-curve", "isCorrect": true, "rationale": "At K/2, the product of population size and the braking factor (K-N)/K is maximized, producing the steepest part of the S-curve."}, {"text": "N = K, when the population reaches carrying capacity", "isCorrect": false, "rationale": "At N = K the braking factor approaches 0 and growth slows toward zero."}, {"text": "N greater than K, after overshoot", "isCorrect": false, "rationale": "When N > K, dN/dt becomes negative — the population is shrinking."}], "id": "q06"}, {"question": "Stimulus: A grassland antelope herd of 2,000 individuals experiences a severe drought. About 60% of the herd dies. Two years later, climate normalizes and the population recovers rapidly. Which combination best explains this dynamic?", "options": [{"text": "Density-independent regulation drove the crash; reduced density-dependent competition allowed rapid recovery", "isCorrect": true, "rationale": "Drought is density-independent; with fewer survivors, resources are abundant per individual, weakening density-dependent constraints and allowing fast rebound."}, {"text": "Density-dependent disease drove the crash; predators caused the recovery", "isCorrect": false, "rationale": "Drought is density-independent, and predator dynamics were not described."}, {"text": "Carrying capacity permanently doubled, allowing recovery", "isCorrect": false, "rationale": "K does not double automatically; this misreads the scenario."}, {"text": "Both the crash and recovery were driven entirely by exponential dynamics", "isCorrect": false, "rationale": "This ignores the role of density and limiting factors in shaping recovery."}], "id": "q07"}, {"question": "Thomas Malthus's central argument in his 1798 Essay on the Principle of Population was that:", "options": [{"text": "Human population would always remain stable through voluntary fertility limitation", "isCorrect": false, "rationale": "Malthus believed voluntary restraint was insufficient and that population growth would always outpace resource gains."}, {"text": "Population grows geometrically while food supply grows arithmetically, so resource limits ultimately check population through misery and vice", "isCorrect": true, "rationale": "Malthus argued that geometric (exponential) population growth would always outstrip arithmetic food growth, leaving famine, disease, and war as the ultimate checks."}, {"text": "Industrial technology would permanently solve the problem of resource scarcity", "isCorrect": false, "rationale": "Malthus was deeply pessimistic and did not anticipate the productivity gains of industrial agriculture."}, {"text": "Natural selection would eliminate any population that exceeded its food supply", "isCorrect": false, "rationale": "Natural selection was Darwin's later insight; Malthus framed the resource-limit problem in pre-Darwinian terms."}], "id": "q08"}, {"question": "Why is overshoot particularly dangerous for long-term carrying capacity?", "options": [{"text": "It increases the carrying capacity by stimulating resource production", "isCorrect": false, "rationale": "Overshoot reduces, not increases, K by depleting resources."}, {"text": "It depletes resources faster than they can regenerate, so the post-crash carrying capacity may be permanently lower than before", "isCorrect": true, "rationale": "When resource regeneration is slow (e.g., Arctic lichen), overshoot can degrade the resource base such that K never recovers to its previous level."}, {"text": "It triggers an immediate density-independent event like a hurricane", "isCorrect": false, "rationale": "Overshoot is a density-dependent dynamic, not a trigger for weather events."}, {"text": "It only affects populations on islands and is irrelevant elsewhere", "isCorrect": false, "rationale": "Overshoot dynamics appear in fisheries collapses, eutrophic lakes, and global resource use — not just islands."}], "id": "q09"}, {"question": "Which of the following describes the relationship between exponential and logistic growth in real populations?", "options": [{"text": "Real populations follow exponential growth indefinitely once established", "isCorrect": false, "rationale": "Exponential growth cannot continue forever in a finite world."}, {"text": "Real populations always grow logistically; exponential growth never occurs in nature", "isCorrect": false, "rationale": "Exponential growth does occur, briefly, when populations colonize new habitats or rebound from bottlenecks."}, {"text": "Real populations often grow nearly exponentially when resources are abundant, then shift toward logistic dynamics as density-dependent factors take effect", "isCorrect": true, "rationale": "This captures how invasive species and recovering populations begin with near-exponential growth and decelerate as they approach K."}, {"text": "Real populations only follow these models when humans manage them", "isCorrect": false, "rationale": "These models describe natural population dynamics regardless of management."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
