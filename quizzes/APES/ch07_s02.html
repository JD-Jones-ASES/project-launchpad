<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Photochemical Smog and Thermal Inversions</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which three ingredients are essential for photochemical smog formation?", "options": [{"text": "SO2, hydrogen peroxide, and rain", "isCorrect": false, "rationale": "These describe acid-rain formation, not photochemical smog."}, {"text": "VOCs, NOx, and sunlight (UV)", "isCorrect": true, "rationale": "Correct. Removing any one of the three ingredients halts ground-level ozone and PAN formation."}, {"text": "CO2, methane, and water vapor", "isCorrect": false, "rationale": "These are greenhouse gases, not smog precursors."}, {"text": "CFCs, halons, and stratospheric ozone", "isCorrect": false, "rationale": "These relate to stratospheric ozone depletion, a different problem."}]}, {"question": "What role do VOCs play in the build-up of ground-level ozone during the day?", "options": [{"text": "VOCs absorb UV light and prevent ozone formation", "isCorrect": false, "rationale": "VOCs do not block UV; they participate in radical chemistry that promotes ozone."}, {"text": "VOCs react with hydroxyl radicals to form peroxy radicals (RO2·) that oxidize NO back to NO2 without consuming O3, allowing ozone to accumulate", "isCorrect": true, "rationale": "Correct. This amplification short-circuits the natural NO–O3 sink and drives the daytime ozone build-up."}, {"text": "VOCs combine directly with O2 to form ozone", "isCorrect": false, "rationale": "Ozone forms via O + O2 + M, not from VOCs + O2."}, {"text": "VOCs neutralize NO2 and stop the photolysis cycle", "isCorrect": false, "rationale": "VOCs amplify rather than neutralize the cycle."}]}, {"question": "[Stimulus] In Los Angeles, peak ozone concentrations typically occur in the early afternoon and several miles downwind of the city center, even though NOx and VOC precursors are released during morning rush hour near the urban core. What best explains this temporal and spatial pattern?", "options": [{"text": "Vehicles emit ozone directly during the afternoon commute", "isCorrect": false, "rationale": "Ozone is a secondary pollutant; vehicles emit precursors, not O3."}, {"text": "The chemistry requires time for radical buildup and continued sunlight, while wind transports the reacting air mass downwind during the hours required for accumulation", "isCorrect": true, "rationale": "Correct. The reaction sequence takes hours and proceeds while the precursor plume drifts downwind, so peak O3 occurs both later and in a downwind location."}, {"text": "Industrial sources release ozone only after work hours end", "isCorrect": false, "rationale": "No industrial source releases ozone directly."}, {"text": "Sunlight intensity is highest in the morning, then ozone diffuses downwind", "isCorrect": false, "rationale": "Sunlight intensity peaks near solar noon, contributing to afternoon rather than morning O3 highs."}]}, {"question": "Which atmospheric condition is required for a thermal inversion?", "options": [{"text": "A layer of warm air sits above cooler surface air, reversing the normal temperature-altitude relationship", "isCorrect": true, "rationale": "Correct. The inversion of the normal lapse-rate gradient suppresses convection and traps surface pollutants."}, {"text": "Surface air is warmer than air aloft, driving rapid vertical mixing", "isCorrect": false, "rationale": "This describes the normal (non-inverted) atmosphere, which favors mixing and dispersion."}, {"text": "Persistent cloud cover blocks all solar heating of the surface", "isCorrect": false, "rationale": "Clouds reduce surface heating but do not by themselves create an inversion."}, {"text": "Strong winds at the surface and calm winds aloft", "isCorrect": false, "rationale": "Inversions are associated with low surface winds, not strong winds."}]}, {"question": "Why is a thermal inversion described as a \"meteorological cap\" rather than a source of pollution?", "options": [{"text": "It generates new pollutants by photochemical reactions", "isCorrect": false, "rationale": "Inversions are physical conditions, not chemical sources."}, {"text": "It does not create pollution but concentrates emissions that already exist by suppressing the vertical mixing that would otherwise dilute them", "isCorrect": true, "rationale": "Correct. The inversion does not increase emissions; it eliminates the dilution pathway, allowing modest emission rates to produce dangerous concentrations."}, {"text": "It cools the atmosphere and converts pollutants into harmless gases", "isCorrect": false, "rationale": "Inversions warm a layer aloft; they do not convert pollutants."}, {"text": "It reflects pollution back into space, reducing surface concentrations", "isCorrect": false, "rationale": "The opposite — inversions trap pollution near the surface."}]}, {"question": "Which type of inversion typically forms when descending air in a high-pressure system warms adiabatically as it compresses, producing a persistent warm layer hundreds of meters above the surface?", "options": [{"text": "Radiation inversion", "isCorrect": false, "rationale": "Radiation inversions form on clear, calm nights via surface radiative cooling and break up after sunrise."}, {"text": "Subsidence inversion", "isCorrect": true, "rationale": "Correct. Subsidence inversions form within high-pressure systems and can persist for days to weeks — the dominant mechanism in chronic LA smog and the 1952 London Smog."}, {"text": "Valley inversion", "isCorrect": false, "rationale": "Valley inversions form when cold dense air drains into low terrain at night."}, {"text": "Frontal inversion", "isCorrect": false, "rationale": "Not the primary mechanism described in this section."}]}, {"question": "[Stimulus] During October 27–31, 1948, in Donora, Pennsylvania, twenty residents died and ~7,000 became ill while a temperature inversion settled over the Monongahela River valley, trapping zinc-smelter and steel-mill emissions of SO2, zinc oxide fumes, and fine particulates. Which feature of Donora's situation best explains why this episode produced documented mass casualties?", "options": [{"text": "The inversion alone caused the deaths regardless of emissions", "isCorrect": false, "rationale": "The inversion concentrated existing emissions; without the smelter source, no toxic plume would have accumulated."}, {"text": "Heavy industrial emissions in a steep, narrow river valley were trapped beneath a multi-day inversion that prevented dispersal", "isCorrect": true, "rationale": "Correct. The combination of concentrated industrial emission, valley topography, and a persistent inversion produced toxic concentrations far above thresholds."}, {"text": "An unusual meteorological cold front released chlorine gas from the smelters", "isCorrect": false, "rationale": "No chlorine release occurred; the toxic mix was SO2, zinc oxide, and fine particulates."}, {"text": "A volcanic eruption added sulfur dioxide to the atmosphere", "isCorrect": false, "rationale": "There was no volcanic source involved."}]}, {"question": "Which characteristic geographic conditions make a city particularly vulnerable to photochemical smog?", "options": [{"text": "Cool, cloudy climate with strong onshore winds", "isCorrect": false, "rationale": "Cool, cloudy climates lack the sunlight needed for photochemistry."}, {"text": "Coastal flatland with frequent rainfall", "isCorrect": false, "rationale": "Frequent rainfall washes out pollutants and disrupts smog formation."}, {"text": "Warm, sunny basin or valley topography with low winds and high vehicle density", "isCorrect": true, "rationale": "Correct. These conditions provide the UV, time, and confined air mass required for photochemical chemistry to dominate."}, {"text": "High-latitude tundra with strong winter inversions", "isCorrect": false, "rationale": "Although inversions occur, weak UV and low vehicle density limit photochemical smog at high latitudes."}]}, {"question": "Compared with the 1948 Donora episode, the 1952 London Great Smog featured a different dominant pollutant chemistry. Which best describes the difference?", "options": [{"text": "Donora was driven by zinc-smelter SO2 and metal fumes; London was driven by widespread coal-fired domestic hearths and diesel buses producing massive SO2 and smoke (soot) loads", "isCorrect": true, "rationale": "Correct. Donora's toxic plume was concentrated industrial; London's was diffuse residential plus transport, motivating different regulatory responses."}, {"text": "Donora was caused by ozone; London was caused by carbon monoxide", "isCorrect": false, "rationale": "Both episodes pre-date significant photochemical smog; their dominant pollutants were SO2 and fine particulates."}, {"text": "Donora and London both involved photochemical ozone formation", "isCorrect": false, "rationale": "Both episodes occurred in cool seasons with weak UV — not photochemical smog."}, {"text": "Donora involved automotive emissions; London involved aviation fuel emissions", "isCorrect": false, "rationale": "Donora was primarily industrial; London was primarily residential coal and diesel buses."}]}, {"question": "Why is peroxyacetyl nitrate (PAN) significant for regional rather than just local air quality?", "options": [{"text": "PAN is highly water-soluble and rains out within hours", "isCorrect": false, "rationale": "PAN is not particularly water-soluble and is removed slowly."}, {"text": "PAN is stable at low temperatures, allowing it to transport NOx hundreds of kilometers downwind and release it upon warming", "isCorrect": true, "rationale": "Correct. PAN acts as a NOx reservoir, extending the geographic reach of smog precursors well beyond the source area."}, {"text": "PAN is only a primary pollutant and emitted exclusively from refineries", "isCorrect": false, "rationale": "PAN is a secondary pollutant formed in photochemical smog."}, {"text": "PAN is converted directly to harmless oxygen by sunlight within minutes", "isCorrect": false, "rationale": "PAN is a stable secondary pollutant with significant lifetime."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
