    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Solar, Wind, Geothermal, and Hydrogen Fuel Cells</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A 400 MW offshore wind farm has a capacity factor of 50%. What is its actual annual electricity output, and how does this compare with a 400 MW nuclear plant operating at 92% capacity factor?", "options": [{"text": "Wind: ~400 MWh/yr; nuclear: ~736 MWh/yr.", "isCorrect": false, "rationale": "These figures are off by a factor of 1,000. Annual output is rated capacity × hours/yr × CF, giving MWh in the millions for a 400 MW plant."}, {"text": "Wind: ~1.752 million MWh/yr (400 MW × 8,760 h × 0.50). Nuclear: ~3.224 million MWh/yr (400 MW × 8,760 h × 0.92), about 1.84× the wind output.", "isCorrect": true, "rationale": "Annual output = rated capacity × 8,760 h/yr × capacity factor. Wind: 400 × 8,760 × 0.50 = 1,752,000 MWh. Nuclear: 400 × 8,760 × 0.92 = 3,223,680 MWh, roughly 1.84× the wind output. Capacity factor reflects variability, not technology quality."}, {"text": "Wind: ~3.5 million MWh/yr; nuclear: ~3.5 million MWh/yr; both are equal because they have the same nameplate capacity.", "isCorrect": false, "rationale": "Capacity factor differs (50% vs. 92%), so actual annual output differs even when nameplate capacity is identical. Nuclear delivers more energy because it operates closer to nameplate continuously."}, {"text": "Wind: 400 MW × 100% = 400 MWh/yr; nuclear: 400 MW × 92% = 368 MWh/yr.", "isCorrect": false, "rationale": "This omits the 8,760 h/yr conversion from MW (rate) to MWh (energy). Capacity factor multiplies the maximum hours per year, not the rated capacity directly."}], "id": "q01"}, {"question": "Why is hydrogen described as an 'energy carrier' rather than an 'energy source'?", "options": [{"text": "Hydrogen is the lightest gas in the universe, so it carries energy by floating.", "isCorrect": false, "rationale": "Energy carrier vs. source distinction is not about gas weight but about whether the substance exists in nature in usable form or must be made from other energy."}, {"text": "Hydrogen does not exist in useful quantities in nature and must be produced by consuming energy from another source — like a battery, it stores and releases energy rather than supplying it from a natural deposit.", "isCorrect": true, "rationale": "The text explicitly explains that hydrogen is an energy carrier, not a primary source. Whether it has low CO2 emissions depends entirely on how it was produced: green hydrogen (electrolysis from renewables) is near-zero; SMR (steam methane reforming) hydrogen emits substantial CO2."}, {"text": "Hydrogen is the only true energy source; everything else is a carrier.", "isCorrect": false, "rationale": "This reverses the actual relationship. Hydrogen must be produced from another energy source; it is the carrier, not the source."}, {"text": "Hydrogen produces electricity directly from the atmosphere without combustion.", "isCorrect": false, "rationale": "Hydrogen does not exist in atmospheric concentrations sufficient for energy use. It must be produced via electrolysis or steam methane reforming, which require energy inputs."}], "id": "q02"}, {"question": "What distinguishes 'green hydrogen' from 'grey hydrogen,' and which is currently dominant in commercial production?", "options": [{"text": "Green hydrogen is made via electrolysis of water powered by renewable electricity (near-zero lifecycle CO2). Grey hydrogen is made via steam methane reforming (substantial CO2 emissions). SMR/grey hydrogen is currently dominant in commercial production.", "isCorrect": true, "rationale": "The text contrasts green hydrogen (electrolysis from renewables) with SMR-derived 'grey hydrogen' from natural gas (substantial CO2). Most commercial hydrogen today is grey/SMR. 'Blue hydrogen' applies carbon capture to the SMR process."}, {"text": "Green hydrogen is from natural gas; grey hydrogen is from coal. Green dominates commercial production.", "isCorrect": false, "rationale": "Green hydrogen is from renewable electrolysis, not natural gas. SMR/grey hydrogen from natural gas is dominant, not green."}, {"text": "Green and grey hydrogen are chemically different molecules.", "isCorrect": false, "rationale": "All hydrogen is H2 chemically. The colors refer to production pathway and lifecycle CO2 emissions, not molecular structure."}, {"text": "Grey hydrogen is the only legal form of hydrogen in the US.", "isCorrect": false, "rationale": "There is no such legal restriction. Grey hydrogen dominates the market simply because SMR has historically been cheaper than electrolysis."}], "id": "q03"}, {"question": "Wind power scales as the cube of wind speed. If wind speed at an offshore site is 1.5 times the speed at a comparable onshore site, approximately how much more power per unit of installed capacity does the offshore site generate?", "options": [{"text": "1.5x more (linear with wind speed).", "isCorrect": false, "rationale": "Wind power scales as v^3, not linearly. The cubic relationship gives 1.5^3 = 3.375x, not 1.5x."}, {"text": "About 3.4x more (1.5^3 = 3.375), which is why offshore sites with consistently faster winds generate dramatically more energy per unit of installed capacity than onshore sites.", "isCorrect": true, "rationale": "Power is proportional to v^3, so doubling wind speed gives 8x more available power. At 1.5x wind speed, 1.5^3 = 3.375x more power. The text uses this cubic relationship to explain why offshore wind capacity factors (40-55%) substantially exceed onshore (30-40%)."}, {"text": "About 4.5x more (1.5 × 3 = 4.5).", "isCorrect": false, "rationale": "v^3 means cubed, not multiplied by 3. 1.5^3 = 3.375, not 4.5."}, {"text": "About 0.67x — slower winds generate more power because they are gentler on turbines.", "isCorrect": false, "rationale": "Faster winds (within design limits) generate more power, not less. Available power is P proportional to v^3."}], "id": "q04"}, {"question": "A photovoltaic (PV) cell converts sunlight directly into electricity. What is the typical single-junction efficiency of a commercial crystalline silicon PV panel, and what role does an inverter play in a utility-scale array?", "options": [{"text": "Commercial efficiency 95%; inverters convert sunlight into DC current.", "isCorrect": false, "rationale": "Commercial silicon PV efficiency is 20-23%, far below 95%. Inverters do not create DC; they convert DC from the panels to AC for the grid."}, {"text": "Commercial silicon PV averages 20-23% efficiency (laboratory multi-junction cells exceed 40%); inverters convert DC output from the panels into AC for grid injection.", "isCorrect": true, "rationale": "The text gives 20-23% commercial efficiency, with multi-junction lab cells exceeding 40%. Photons absorbed by the semiconductor knock electrons loose; the resulting DC current must be inverted to AC to match grid frequency before injection."}, {"text": "Commercial efficiency 5%; inverters store energy chemically.", "isCorrect": false, "rationale": "Commercial PV efficiency is 20-23%, far above 5%. Inverters do not store energy; they convert DC to AC. Storage requires batteries or other systems."}, {"text": "Commercial efficiency 50%; inverters convert AC to DC for grid injection.", "isCorrect": false, "rationale": "Commercial silicon PV is 20-23%, not 50%. Inverters convert DC (panel output) to AC (grid), not the other way around."}], "id": "q05"}, {"question": "How does Concentrated Solar Power (CSP) differ from photovoltaic (PV) generation, and what makes CSP dispatchable?", "options": [{"text": "CSP uses semiconductors and PV uses mirrors; CSP is dispatchable because semiconductors store electricity.", "isCorrect": false, "rationale": "This reverses the technologies. CSP uses mirrors/lenses to focus sunlight onto a thermal receiver; PV uses semiconductors. CSP is dispatchable through thermal storage, not semiconductor storage."}, {"text": "CSP uses mirrors or lenses to focus sunlight onto a receiver, generating high-temperature heat that drives a steam turbine. CSP plants with molten-salt thermal storage (typically 6-18 hours of stored heat) can generate after sunset, making them dispatchable on demand.", "isCorrect": true, "rationale": "CSP converts sunlight into high-temperature heat instead of electricity directly. Heat is easier to store than electricity; molten-salt storage of 6-18 hours allows generation after dark, making CSP dispatchable. CSP is most cost-effective in regions with very high direct normal irradiance (American Southwest, Spain, Middle East, Australia)."}, {"text": "CSP and PV are identical technologies; the difference is only the brand.", "isCorrect": false, "rationale": "CSP and PV are physically distinct: CSP uses thermal heat → steam turbine; PV uses photovoltaic semiconductors → DC electricity. They have different storage and dispatchability properties."}, {"text": "CSP works only at night; PV works only during the day.", "isCorrect": false, "rationale": "CSP operates during the day to generate heat; with thermal storage it can also generate at night. PV generates only when sunlight is available."}], "id": "q06"}, {"question": "What gives geothermal energy its unusually high capacity factor (~75%) compared with solar (~25%) or wind (~35%), and what is the main geographic limitation?", "options": [{"text": "Geothermal taps Earth's internal heat, which flows continuously regardless of weather, so plants can run 24/7. Hydrothermal resources are geographically concentrated in volcanically and tectonically active regions.", "isCorrect": true, "rationale": "Earth's internal heat is steady (not weather-dependent), so geothermal plants achieve ~75% capacity factor and serve as baseload renewable power. Capacity is geographically concentrated where volcanism or tectonics bring high heat flow near the surface (Iceland, California's Geysers complex, New Zealand's Wairakei, etc.)."}, {"text": "Geothermal works equally well everywhere on Earth; the high capacity factor comes from solar input.", "isCorrect": false, "rationale": "Hydrothermal resources are concentrated in tectonically and volcanically active regions; they are not equally available everywhere. The heat is from Earth's interior, not solar input."}, {"text": "Geothermal requires hot weather and so works only in summer.", "isCorrect": false, "rationale": "Geothermal taps Earth's internal heat, which is independent of surface weather. Plants operate year-round with high capacity factors."}, {"text": "Geothermal cannot be used for electricity; only for direct heating.", "isCorrect": false, "rationale": "Geothermal hydrothermal systems drive steam turbines for electricity. Iceland generates essentially 100% of its electricity from geothermal sources."}], "id": "q07"}, {"question": "What is Enhanced Geothermal Systems (EGS), and what concern is similar to fracking?", "options": [{"text": "EGS uses photovoltaic panels instead of geothermal heat; no fracking-related concerns.", "isCorrect": false, "rationale": "EGS is a geothermal technology that fractures hot dry rock; it is unrelated to photovoltaic panels."}, {"text": "EGS drills into hot dry rock (3-10 km, >150 deg C), injects water, fractures the rock to create permeability, heats the water, and returns it to the surface. Like fracking, it can induce seismicity from the fracturing process; high drilling costs have also limited deployment.", "isCorrect": true, "rationale": "EGS could in principle make geothermal energy available almost anywhere, but the rock-fracturing process can cause induced earthquakes (similar to fracking concerns), and deep drilling is expensive. The first utility-scale EGS project in the US entered operation in Nevada in 2024."}, {"text": "EGS uses pumped hydroelectric storage; it has no fracking-related concerns.", "isCorrect": false, "rationale": "EGS is geothermal, not pumped hydro. The fracking-similar concern is induced seismicity from rock fracturing."}, {"text": "EGS is identical to wind turbines; concerns are bird strikes.", "isCorrect": false, "rationale": "EGS is a geothermal technology, not wind. The concern is induced seismicity from fracturing hot dry rock, not bird strikes."}], "id": "q08"}, {"question": "A central challenge of variable renewables (solar, wind) is grid integration. Which three approaches does the text identify as ways to manage intermittency?", "options": [{"text": "Curtailment, blackouts, and rolling shutdowns.", "isCorrect": false, "rationale": "These are failure modes of an undermanaged grid, not solutions. The text identifies storage, transmission, and demand response as the solutions."}, {"text": "(1) Grid-scale storage (batteries, pumped hydro, hydrogen) to absorb excess and release on demand. (2) Long-distance transmission to aggregate generation across geographically diverse areas. (3) Demand response — flexible loads (EV charging, industrial processes) that shift consumption to times of surplus generation.", "isCorrect": true, "rationale": "These three approaches together address intermittency. None is cost-free, and grid planning must explicitly account for them when evaluating the true system cost of a variable-renewable portfolio. The text emphasizes that all three are typically needed, not just one."}, {"text": "Burning more coal during cloudy days; importing electricity from Russia.", "isCorrect": false, "rationale": "Backup fossil generation can fill gaps but is not the canonical 'managing intermittency' answer. The text identifies storage, transmission, and demand response."}, {"text": "Removing all variable renewables from the grid.", "isCorrect": false, "rationale": "The challenge is to integrate variable renewables, not remove them. Storage, transmission, and demand response are the standard tools."}], "id": "q09"}, {"question": "Which capacity factor ranking is most consistent with the text?", "options": [{"text": "Nuclear (~92%) > Geothermal (~75%) > Combined-cycle gas (~55%) > Offshore wind (~45-55%) > Hydroelectric (~40%) > Onshore wind (~35%) > Utility-scale solar PV (~25%).", "isCorrect": true, "rationale": "The text gives nuclear at ~92% (highest), geothermal at ~75%, combined-cycle gas at ~55% when used for baseload, offshore wind at 45-55%, hydroelectric (large dam) at ~40%, onshore wind at ~35%, and utility-scale solar PV at ~25%. The variability of the resource — not technology quality — drives these differences."}, {"text": "Solar PV (~92%) > Wind (~75%) > Nuclear (~25%) > Geothermal (~10%).", "isCorrect": false, "rationale": "This inverts the actual ordering. Solar PV is ~25% (variable), nuclear is ~92% (highest), and geothermal ~75% (high baseload)."}, {"text": "All sources have identical capacity factors of ~50%.", "isCorrect": false, "rationale": "Capacity factor varies dramatically by source — nuclear ~92%, solar PV ~25% — reflecting resource availability and dispatchability."}, {"text": "Capacity factor is irrelevant to power planning.", "isCorrect": false, "rationale": "Capacity factor is one of several key inputs to energy planning, alongside cost, dispatchability, land use, and CO2 intensity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
