<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Generalists, Specialists, and Survivorship Curves</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a generalist species?", "options": [{"text": "A species with a narrow ecological niche that depends on a specific food source", "isCorrect": false, "rationale": "This describes a specialist, not a generalist."}, {"text": "A species that tolerates a wide range of environmental conditions and can use diverse food resources", "isCorrect": true, "rationale": "Generalists have broad niches, eat diverse foods, and tolerate many conditions, like raccoons or crows."}, {"text": "A species that produces few offspring and invests heavily in each", "isCorrect": false, "rationale": "This describes a K-selected life-history pattern, not breadth of niche."}, {"text": "A species that can only thrive in stable, undisturbed environments", "isCorrect": false, "rationale": "Specialists, not generalists, typically dominate stable environments where their narrow resource is reliable."}]}, {"question": "A wildlife biologist studying a songbird population finds that 90% of birds die in their first year, but annual mortality for birds older than one year is only about 25%. Which survivorship curve does this population most likely show?", "options": [{"text": "Type I, because most individuals survive to old age before mortality rises sharply", "isCorrect": false, "rationale": "Type I curves show low early-life mortality; this population shows the opposite pattern."}, {"text": "Type II, because mortality is approximately constant across all age classes", "isCorrect": false, "rationale": "Type II curves are roughly linear on a log scale; here mortality drops sharply after year one."}, {"text": "Type III, because mortality is heavily concentrated in the early life stage and lower thereafter", "isCorrect": true, "rationale": "Type III curves drop steeply early, then level off — exactly the pattern described, where survivors past the first year face much lower mortality."}, {"text": "Type IV, because annual mortality declines linearly with age", "isCorrect": false, "rationale": "Only Types I, II, and III are recognized in standard survivorship classification."}]}, {"question": "Why are K-selected species disproportionately vulnerable to elevated adult mortality compared to r-selected species?", "options": [{"text": "K-selected species have shorter lifespans, so each adult death has a larger relative impact", "isCorrect": false, "rationale": "K-selected species are typically long-lived, not short-lived; vulnerability comes from slow replacement."}, {"text": "K-selected species reproduce slowly and produce few offspring, so populations recover slowly from declines", "isCorrect": true, "rationale": "Low reproductive output and high parental investment mean each lost adult cannot be quickly replaced — the central conservation concern for K-strategists."}, {"text": "K-selected species cannot reproduce more than once in their lifetime", "isCorrect": false, "rationale": "Most K-selected species reproduce repeatedly; the issue is low offspring numbers, not single reproduction."}, {"text": "K-selected species lack parental care and abandon young immediately", "isCorrect": false, "rationale": "K-selected species are characterized by high parental investment, the opposite of this claim."}]}, {"question": "Stimulus: A fisheries manager is setting harvest quotas for two species. Atlantic herring spawn millions of eggs, mature in 2 years, and live around 8 years. Atlantic grouper spawn thousands of eggs, mature in 5–10 years, and live up to 50 years. Which management approach is most appropriate?", "options": [{"text": "Equal harvest rates for both species, since both produce many eggs", "isCorrect": false, "rationale": "Egg counts alone do not determine sustainable harvest; life-history strategy matters more."}, {"text": "Higher allowable harvest for grouper because adults survive longer", "isCorrect": false, "rationale": "Long adult survival means slow recovery; grouper actually require more conservative harvest."}, {"text": "Higher allowable harvest for herring because they are r-selected and rapidly replenish populations, with stricter limits on grouper which are K-selected and slow to recover", "isCorrect": true, "rationale": "Herring's r-selected biology supports higher harvest; grouper's K-selected biology requires conservative limits because adult removal exceeds replacement easily."}, {"text": "Suspend harvest of both species until age structures equalize", "isCorrect": false, "rationale": "This ignores the practical management framework that scales harvest to life-history strategy."}]}, {"question": "Which of the following is a Type I survivorship pattern characteristic?", "options": [{"text": "Most mortality is concentrated in old age, with high survival through reproductive years", "isCorrect": true, "rationale": "Type I species (humans, elephants, whales) invest heavily in offspring survival, pushing mortality to late life."}, {"text": "Massive early-life mortality with low mortality afterward", "isCorrect": false, "rationale": "This describes Type III, not Type I."}, {"text": "Approximately constant mortality across all age classes", "isCorrect": false, "rationale": "This describes Type II."}, {"text": "Mortality unrelated to age, driven entirely by predation", "isCorrect": false, "rationale": "Mortality is age-related in Type I, concentrated at the oldest ages."}]}, {"question": "Why are specialist species disproportionately represented on global endangered species lists?", "options": [{"text": "Specialists have lower reproductive rates than generalists across the board", "isCorrect": false, "rationale": "Specialization is about niche breadth, not directly about reproductive rate."}, {"text": "Specialists evolved more recently, leaving them less adapted to current conditions", "isCorrect": false, "rationale": "Evolutionary age is not the explanatory factor; vulnerability arises from narrow resource dependence."}, {"text": "Specialists depend on specific resources or habitats, so disruptions to those resources can threaten the entire species", "isCorrect": true, "rationale": "Narrow niches mean any disturbance to the required resource (e.g., bamboo for pandas, prairie dogs for ferrets) can collapse the population."}, {"text": "Specialists are physically smaller, making them more vulnerable to predation", "isCorrect": false, "rationale": "Body size is not the key factor; resource specialization is."}]}, {"question": "On a survivorship curve plotted with the y-axis on a logarithmic scale, what does a perfectly straight, downward-sloping line indicate?", "options": [{"text": "A constant mortality rate across all age classes (Type II)", "isCorrect": true, "rationale": "A linear log-scale curve indicates equal proportional mortality at every age — the defining feature of Type II."}, {"text": "Heavy juvenile mortality and stable adult survival (Type III)", "isCorrect": false, "rationale": "Type III curves drop steeply at first, then flatten — they are not linear on a log scale."}, {"text": "Low juvenile mortality with sharp late-life mortality (Type I)", "isCorrect": false, "rationale": "Type I curves are concave: nearly flat early, then steep late — not a straight line."}, {"text": "An exponential increase in mortality with age", "isCorrect": false, "rationale": "Increasing mortality with age would not produce a straight line on a log scale."}]}, {"question": "Stimulus: An invasive insect species, recently introduced to a new continent, produces thousands of eggs per female, has no parental care, and shows roughly 95% mortality in the larval stage. From a life-history perspective, this species is best classified as:", "options": [{"text": "K-selected with a Type I survivorship curve", "isCorrect": false, "rationale": "Massive offspring numbers and high juvenile mortality are inconsistent with K-selected/Type I."}, {"text": "r-selected with a Type III survivorship curve", "isCorrect": true, "rationale": "High fecundity, no parental care, and heavy juvenile mortality are textbook r-selection paired with Type III survivorship."}, {"text": "K-selected with a Type II survivorship curve", "isCorrect": false, "rationale": "Type II implies constant mortality across ages, not the early-life cliff described."}, {"text": "Generalist-selected with a Type I survivorship curve", "isCorrect": false, "rationale": "Generalist refers to niche breadth, not life-history strategy; Type I is also incorrect for this profile."}]}, {"question": "Which environmental policy implication follows most directly from the concept of K-selection?", "options": [{"text": "K-selected species can sustain very high annual harvest rates without population decline", "isCorrect": false, "rationale": "The opposite is true: K-selected species cannot sustain high harvest because they reproduce slowly."}, {"text": "K-selected species require large protected habitats and tight limits on adult mortality, because populations recover slowly from declines", "isCorrect": true, "rationale": "Slow reproduction and few offspring per generation mean any elevated adult mortality may exceed replacement, making strong protections essential."}, {"text": "K-selected species are best protected by focusing on juvenile mortality reduction", "isCorrect": false, "rationale": "Adult mortality, not juvenile, is the demographic bottleneck for K-selected species."}, {"text": "K-selected species do not require habitat protection because they are evolutionarily robust", "isCorrect": false, "rationale": "K-selected species are uniquely vulnerable to habitat loss because of slow recovery."}]}, {"question": "Why are generalist species often described as the \"winners\" of the Anthropocene?", "options": [{"text": "They evolved more recently than specialists and are therefore better adapted", "isCorrect": false, "rationale": "Evolutionary timing is not the cause; flexibility is."}, {"text": "Their broad tolerance allows them to thrive in human-altered, disturbed, and edge habitats", "isCorrect": true, "rationale": "Generalists like raccoons, crows, and rats actually benefit from fragmentation, edges, and resource-rich human-disturbed environments."}, {"text": "They reproduce more slowly than specialists and conserve resources", "isCorrect": false, "rationale": "Generalist success is about niche flexibility, not slower reproduction."}, {"text": "They specialize in a single high-quality resource that humans rarely disturb", "isCorrect": false, "rationale": "This describes specialists; generalists do the opposite."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
