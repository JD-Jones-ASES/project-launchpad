<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; CAFOs, Overfishing, and Aquaculture</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The US EPA defines a CAFO (Concentrated Animal Feeding Operation) by what criteria, and approximately how many such operations are there in the United States?", "options": [{"text": "A facility that confines animals less than 10 days per year; about 8,000 operations exist nationally.", "isCorrect": false, "rationale": "The criterion is MORE than 45 days per year, not less than 10. And the textbook estimates approximately 80,000 operations, not 8,000."}, {"text": "A facility that confines animals for more than 45 days per year and exceeds size thresholds (e.g., 1,000+ cattle, 2,500+ pigs, 125,000+ broilers, 82,000+ laying hens); approximately 80,000 operations are currently in operation in the US.", "isCorrect": true, "rationale": "The textbook gives the EPA criteria precisely: more than 45 days of confinement per year AND size thresholds above which the operation is classified 'large' — 1,000 cattle, 2,500 pigs, 125,000 broilers, 82,000 laying hens. Approximately 80,000 operations are running nationally; the vast majority of US meat, eggs, and dairy comes from CAFOs."}, {"text": "Any farm that raises livestock outdoors; about 200,000 such farms exist.", "isCorrect": false, "rationale": "CAFOs by definition CONFINE animals indoors or in feedlots — outdoor pasture is the OPPOSITE of CAFO management."}, {"text": "Any farm that uses synthetic fertilizer to grow feed; about 500,000 farms qualify.", "isCorrect": false, "rationale": "The CAFO definition is about animal confinement, not fertilizer use for feed crops."}]}, {"question": "A single large hog CAFO with 10,000 animals produces more raw waste than a city of 40,000 people. Yet unlike municipal sewage, this waste is not treated to secondary standards before release. What are the predicted environmental consequences, according to the textbook?", "options": [{"text": "No environmental consequences because waste lagoons are designed to contain everything indefinitely.", "isCorrect": false, "rationale": "The textbook documents Hurricane Floyd (1999) lagoon failures contaminating North Carolina rivers with pathogens and nutrients. Lagoons fail during floods, ammonia volatilizes routinely, and over-application contaminates groundwater. Waste is NOT contained indefinitely."}, {"text": "Lagoon breaches (e.g., Hurricane Floyd 1999) contaminate rivers with pathogens/nutrients; ammonia volatilization contributes to acid deposition and eutrophication; land application can saturate soils with phosphorus and contaminate groundwater with nitrates and pathogens.", "isCorrect": true, "rationale": "The textbook documents three pathways. (1) Lagoons fail during floods (Hurricane Floyd 1999 cited explicitly), contaminating rivers. (2) Ammonia volatilizes into the air, contributing to acid deposition and eutrophication of downwind water bodies. (3) Land application of effluent — when applied beyond agronomic need — saturates soils with P and contaminates groundwater with nitrates and pathogens."}, {"text": "Only odor problems; no measurable water-quality impact.", "isCorrect": false, "rationale": "The textbook documents major water-quality impacts, including documented lagoon failures, nitrate groundwater contamination, and downstream eutrophication. Odor is one impact among many."}, {"text": "Greenhouse gas emissions are increased but no waterway impacts occur.", "isCorrect": false, "rationale": "Both impacts occur: GHG emissions (enteric fermentation methane, manure decomposition) AND waterway contamination. The textbook lists multiple environmental costs across air, water, and soil."}]}, {"question": "Approximately what percentage of medically important antibiotics sold in the United States is used in food-animal production (rather than human medicine), and what consequence does this create?", "options": [{"text": "About 5%; minor consequence because animal antibiotics are different molecules than human antibiotics.", "isCorrect": false, "rationale": "The textbook gives approximately 70%, not 5%. And many of the antibiotics overlap with human medicine — that is precisely why animal use accelerates resistance evolution that affects humans."}, {"text": "Approximately 70%; predominantly used as growth promoters rather than to treat disease, accelerating evolution of antibiotic-resistant bacteria that spread to humans through food, water, and direct animal contact.", "isCorrect": true, "rationale": "The textbook explicitly states this: ~70% of medically important antibiotics in the US go to food-animal production, predominantly as growth promoters. The constant selective pressure accelerates the evolution of antibiotic-resistant bacteria, which spread to humans via food, water, and direct contact. The WHO has designated antibiotic resistance as one of the greatest threats to global public health."}, {"text": "About 100%; all antibiotics in the US are now used for animals.", "isCorrect": false, "rationale": "70% goes to food-animal production; 30% remains in human medicine. The figure is ~70%, not 100%."}, {"text": "About 50%; consequence is increased pet population.", "isCorrect": false, "rationale": "70%, not 50%. And the consequence is antibiotic resistance, not pet population."}]}, {"question": "Maximum Sustainable Yield (MSY) is a foundational concept in fisheries management. What does it mean biologically, and why do real-world fishery quotas often exceed it?", "options": [{"text": "MSY is the maximum catch when 100% of the fish are removed each year. Quotas exceed it because of fishing efficiency.", "isCorrect": false, "rationale": "MSY is decidedly NOT 100% removal — the population would crash. MSY corresponds to harvesting at the point where net population growth is MAXIMIZED, typically near half the unexploited carrying capacity."}, {"text": "MSY is the largest average catch sustainable indefinitely without reducing reproductive capacity, biologically corresponding to harvest at the point of maximum net population growth (typically near half unexploited carrying capacity). Real-world quotas often exceed MSY due to political pressure from the fishing industry, leading to stock decline.", "isCorrect": true, "rationale": "The textbook defines MSY precisely this way and explicitly notes the political pressure problem: 'political pressure routinely results in quotas being set above scientifically recommended MSY levels.' The 1992 Atlantic cod collapse (Grand Banks) is the textbook's canonical example: scientific warnings through the 1980s were overridden by political pressure to maintain quotas, leading to collapse to ~1% of historical biomass."}, {"text": "MSY is the maximum catch in any single year. Quotas exceed it because fish populations grow exponentially.", "isCorrect": false, "rationale": "MSY is a sustainable AVERAGE annual rate, not a single-year maximum. Fish populations do not grow exponentially indefinitely — they have carrying-capacity ceilings."}, {"text": "MSY does not exist as a biological concept; it is purely an economic measure.", "isCorrect": false, "rationale": "MSY is fundamentally a BIOLOGICAL concept (population dynamics, net growth rate) that informs management. It is not purely economic."}]}, {"question": "Daniel Pauly documented in 1998 that the mean trophic level of global marine catch has been declining since the 1950s. What term did he give this phenomenon, and what does it imply about marine ecosystem health?", "options": [{"text": "'Trophic upgrading' — fishing improves ecosystem health by removing top predators.", "isCorrect": false, "rationale": "The textbook's term is 'fishing down the food web' (a decline, not improvement). Removing top predators leaves ecosystems simplified and reduces resilience, not improves it."}, {"text": "'Fishing down the food web' — large slow-reproducing apex predators (cod, halibut, bluefin tuna, swordfish, sharks) were depleted first; fishing effort then shifted to smaller, shorter-lived planktivores and invertebrates. Sequential depletion of higher trophic levels leaves marine ecosystems increasingly simplified and reduces overall resilience.", "isCorrect": true, "rationale": "The textbook's exact term is 'fishing down the food web.' Apex predators have long generation times and low reproductive rates, so they collapse first. Fleet effort then shifts to lower trophic levels (anchovies, krill, jellyfish in some cases). The result is a simplified, less resilient marine food web with reduced large fish stocks."}, {"text": "'Aquatic gentrification' — pricey fish replace cheap fish.", "isCorrect": false, "rationale": "Not a textbook term. The textbook is specific that the declining mean trophic level reflects sequential depletion, not market price changes."}, {"text": "'Catch maximization' — Pauly described it as a positive efficiency phenomenon.", "isCorrect": false, "rationale": "Pauly's analysis is critical, not celebratory. Declining mean trophic level is a SIGN of stress, not efficiency."}]}, {"question": "The 1992 Atlantic cod collapse on the Grand Banks (Newfoundland) is the textbook's canonical fisheries management failure. What was the magnitude of the collapse, and how has the fishery recovered?", "options": [{"text": "The fishery declined by 50% but has fully recovered to commercially significant levels.", "isCorrect": false, "rationale": "The textbook documents collapse to approximately 1% of historical biomass — far more severe than 50%. And the stock has NOT recovered to commercially significant levels in 30+ years."}, {"text": "The stock collapsed to approximately 1% of historical biomass; in the 30+ years since the moratorium, the cod stock has not recovered to commercially significant levels, and fishing communities have not economically recovered.", "isCorrect": true, "rationale": "The textbook precisely states: 'the stock had collapsed to approximately 1 percent of its historical biomass. Over 30 years later, the cod stock has not recovered to commercially significant levels, and the moratorium-era communities have not economically recovered.' The collapse illustrates that ecosystem state shifts can be very slow to reverse."}, {"text": "The stock fully recovered within 5 years of the moratorium.", "isCorrect": false, "rationale": "Over 30 years later, the textbook documents that the cod stock has NOT recovered to commercially significant levels. Recovery has been far slower than the depletion."}, {"text": "The fishery never collapsed; the moratorium was for unrelated reasons.", "isCorrect": false, "rationale": "The Atlantic cod collapse is one of the best-documented fishery collapses in history. The textbook describes it as 'the most frequently cited example of a fisheries management failure.'"}]}, {"question": "Bottom trawling drags heavy nets and metal rollers across the seafloor. What is the textbook's analogy for its ecological impact, and which seafloor habitats are at greatest risk?", "options": [{"text": "Analogous to selective harvesting; minimal seafloor impact.", "isCorrect": false, "rationale": "The textbook's analogy is to CLEARCUTTING — wholesale habitat destruction — not selective harvesting. The impacts are explicitly described as severe and slow to recover."}, {"text": "Analogous to clearcutting in its ecological effects: trawl gear destroys physical habitat structure (coral, sponge beds, rock outcrops) that provides nursery habitat for juvenile fish. Recovery times for heavily trawled habitats may exceed decades; deep-water coral communities may require centuries.", "isCorrect": true, "rationale": "The textbook explicitly states 'the ecological analogy to clearcutting is apt.' Trawl gear destroys structural habitat — coral, sponge beds, rock outcrops — that nurseries depend on. Recovery times exceed decades; deep-water coral communities disrupted by trawling may require centuries to reestablish. The damage is far worse than just removing target species."}, {"text": "Analogous to dolphin-safe fishing; reduces bycatch.", "isCorrect": false, "rationale": "Bottom trawling produces SIGNIFICANT bycatch (3-10 kg of non-target species per kg of shrimp retained, per the textbook's example). It is the OPPOSITE of dolphin-safe."}, {"text": "Analogous to selective fishery; supports juvenile fish populations.", "isCorrect": false, "rationale": "The opposite — trawling DESTROYS the habitat juvenile fish depend on, reducing rather than supporting populations."}]}, {"question": "Open-net salmon aquaculture (sea cages) in coastal fjords or bays is widely practiced, particularly in British Columbia, Norway, and Chile. What environmental impacts does the textbook identify, and which alternative production system avoids most of them?", "options": [{"text": "No measurable impacts; salmon farming is fully sustainable.", "isCorrect": false, "rationale": "The textbook documents multiple substantial impacts: sea lice outbreaks affecting wild salmon, seafloor smothering, high antibiotic use. Open-net salmon farming is NOT considered fully sustainable."}, {"text": "Sea lice outbreaks spread to wild salmon smolts; uneaten feed and waste smother the seafloor beneath cages; antibiotic use is among the highest in food-animal production. Recirculating Aquaculture Systems (RAS) treat and recycle water in closed facilities, eliminating effluent discharge.", "isCorrect": true, "rationale": "The textbook explicitly identifies these impacts: dense salmon populations breed sea lice (Lepeophtheirus salmonis) that spread to wild Pacific salmon smolts, contributing to wild salmon decline. Uneaten feed/waste smothers the seafloor. Antibiotic use is among the highest in food-animal production. RAS systems treat and recycle water in closed facilities, eliminating effluent discharge — siting can be inland, freed from coastal placement."}, {"text": "Only positive ecological impacts because farmed salmon prey on invasive jellyfish.", "isCorrect": false, "rationale": "The textbook does not mention jellyfish predation; the documented impacts are negative (sea lice, seafloor smothering, antibiotic resistance). The claim is fabricated."}, {"text": "Impacts are limited to local visual disruption.", "isCorrect": false, "rationale": "The textbook documents significant ECOLOGICAL impacts (wild salmon decline, seafloor smothering, antibiotic resistance) extending beyond visual concerns."}]}, {"question": "Tropical shrimp aquaculture, particularly in Southeast Asia, has been associated with the destruction of which key coastal ecosystem, and what fraction of the global area of that ecosystem has been lost since 1980?", "options": [{"text": "Coral reefs; approximately 5%.", "isCorrect": false, "rationale": "The textbook specifies MANGROVE forests (not coral reefs) and approximately 30% loss since 1980 (not 5%)."}, {"text": "Mangrove forests; approximately 30% of world mangrove area lost since 1980, in part due to shrimp aquaculture conversions to pond sites.", "isCorrect": true, "rationale": "The textbook precisely states: shrimp aquaculture in tropical coastal regions (Southeast Asia, Thailand, Bangladesh, Ecuador) has been associated with the destruction of mangrove forests for pond sites, contributing to ~30% loss of world mangrove area since 1980. Mangroves provide nursery habitat, storm-surge protection, and high carbon storage densities."}, {"text": "Tundra; approximately 10%.", "isCorrect": false, "rationale": "Shrimp aquaculture is in tropical/subtropical coastal regions, not tundra."}, {"text": "Boreal forest; approximately 50%.", "isCorrect": false, "rationale": "Shrimp aquaculture is coastal-tropical, not associated with boreal forest. Loss is ~30%, in mangroves specifically."}]}, {"question": "Apply Hardin's tragedy framework to the 1992 Atlantic cod collapse. What was the specific institutional failure that prevented sustainable management?", "options": [{"text": "Cod were a private resource owned by a single fishing company.", "isCorrect": false, "rationale": "Cod were a COMMON-POOL resource (rival, non-excludable on the high seas), not privately owned. Private ownership would have aligned incentives differently and was the OPPOSITE of the institutional setup."}, {"text": "Quotas were set above scientifically recommended MSY levels due to political pressure from the fishing industry; managers ignored stock decline warnings through the 1980s. The institutional failure was the gap between scientific advice and politically determined quotas.", "isCorrect": true, "rationale": "The textbook explicitly identifies this: 'Despite scientific warnings through the 1980s that cod stocks were below MSY, harvest quotas remained near or above sustainable levels due to political pressure from the fishing industry.' The institutional failure was that the quota-setting process was vulnerable to political pressure that overrode scientific recommendations. Possible alternatives include independent science-based quota setting (separating science from politics) or rights-based management (catch shares)."}, {"text": "Fishermen voluntarily reduced their effort to nothing in the 1990s.", "isCorrect": false, "rationale": "Voluntary reduction did NOT happen — quotas remained near or above sustainable levels until the 1992 moratorium was imposed."}, {"text": "Climate change directly killed the cod population without fishing pressure.", "isCorrect": false, "rationale": "The textbook attributes the collapse primarily to overfishing maintained by political pressure on quotas, not to direct climate effects."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
