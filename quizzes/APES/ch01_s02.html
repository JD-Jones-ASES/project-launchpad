<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Terrestrial and Aquatic Biomes</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A biogeographer plots mean annual temperature on one axis and mean annual precipitation on the other for sites worldwide. Each biome occupies a distinct, largely non-overlapping cluster on this plot. Which two corner combinations are correctly matched to their biomes?", "options": [{"text": "Hot and dry → tropical rainforest; cold and wet → tundra.", "isCorrect": false, "rationale": "Tropical rainforest occupies the hot-wet corner (>2000 mm rain, >18°C). Hot-dry is desert. Tundra is cold-dry, not cold-wet."}, {"text": "Hot and wet → tropical rainforest; cold and dry → tundra.", "isCorrect": true, "rationale": "Tropical rainforest occupies the hot-wet corner (equatorial, >2000 mm/yr, no pronounced dry season, >18°C). Tundra occupies the cold-dry corner (north of treeline, growing season <60 days, low precipitation)."}, {"text": "Hot and wet → desert; cold and dry → tropical rainforest.", "isCorrect": false, "rationale": "These pairings are inverted. Desert is defined by aridity (<250 mm/yr); tropical rainforest is defined by abundant precipitation."}, {"text": "Hot and dry → boreal forest; cold and wet → savanna.", "isCorrect": false, "rationale": "Boreal forest (taiga) is sub-Arctic — long cold winters, short cool summers. Savanna is tropical, with pronounced wet and dry seasons. Neither pairing is correct."}], "id": "q01"}, {"question": "A student claims that tropical rainforest soil should be highly fertile because the biome has the highest NPP on Earth. Why is this claim incorrect?", "options": [{"text": "Tropical rainforests have the lowest NPP of any biome, so soil fertility cannot be inferred from productivity.", "isCorrect": false, "rationale": "Tropical rainforests have the highest NPP per unit area of any terrestrial biome — the premise is correct. The error is in the inference about soils."}, {"text": "Decomposition is exceptionally rapid in warm, moist conditions, so most nutrients at any given moment are locked in living biomass rather than in the soil; once cleared, productivity collapses.", "isCorrect": true, "rationale": "Rapid decomposition means dead organic matter breaks down within weeks and nutrients are immediately taken up by living plants. Soils therefore hold few mineral nutrients. When the forest is cleared, the nutrient stock leaves with the biomass and crops fail after a brief productive period."}, {"text": "Tropical rainforest soils are saturated with toxic aluminum that kills crops.", "isCorrect": false, "rationale": "Aluminum toxicity does occur in some highly weathered tropical soils, but the central explanation in the section is the partitioning of nutrients into biomass rather than soil, driven by rapid decomposition."}, {"text": "Tropical rainforests have permafrost beneath the surface that prevents root penetration.", "isCorrect": false, "rationale": "Permafrost is a tundra characteristic, not a tropical rainforest one."}], "id": "q02"}, {"question": "An ecotone is described as a transition zone between two adjacent ecological communities. Why do ecotones often support higher species diversity than either adjacent community?", "options": [{"text": "Ecotones contain species characteristic of both adjacent biomes plus specialists adapted specifically to the edge conditions themselves.", "isCorrect": true, "rationale": "Ecotones host the species pool from each adjacent biome plus edge specialists, which can produce a diversity peak. This phenomenon is sometimes called the edge effect."}, {"text": "Ecotones are protected by international treaties from human disturbance.", "isCorrect": false, "rationale": "There is no general international protection for ecotones, and the high diversity is biological, not regulatory."}, {"text": "Ecotones have the highest temperatures of any biome.", "isCorrect": false, "rationale": "Ecotones are transition zones whose temperature is intermediate between adjacent biomes, not extreme."}, {"text": "Ecotones contain only species that cannot tolerate either of the adjacent biomes.", "isCorrect": false, "rationale": "Ecotones contain species from both adjacent biomes plus edge specialists. Excluding species from adjacent biomes contradicts the definition."}], "id": "q03"}, {"question": "The table below shows estimated mean net primary productivity (NPP) for selected biomes:\n\nTropical rainforest: 2200 g C/m²/yr\nTemperate deciduous forest: 1200 g C/m²/yr\nGrassland: 600 g C/m²/yr\nTundra: 140 g C/m²/yr\nOpen ocean: 125 g C/m²/yr\nDesert: 90 g C/m²/yr\n\nAlthough open ocean has one of the lowest NPP values per unit area, it contributes a large fraction of Earth's total annual carbon fixation. Which feature of the ocean BEST explains this apparent contradiction?", "options": [{"text": "Phytoplankton in the open ocean photosynthesize at higher rates per organism than terrestrial plants.", "isCorrect": false, "rationale": "Per-organism rates are not the explanation; per unit area, open ocean is far less productive than rainforest. The relevant scaling is total area."}, {"text": "The ocean covers roughly 75% of Earth's surface, so even a low NPP per unit area integrates over a vast area to produce a large total flux.", "isCorrect": true, "rationale": "Total annual fixation = NPP per unit area × total area. Although open-ocean NPP per m² is low, the ocean's enormous spatial extent (~75% of Earth's surface) makes its integrated total fixation large."}, {"text": "Open ocean is the most nutrient-rich biome on Earth.", "isCorrect": false, "rationale": "Open ocean is sometimes called a 'blue desert' because it is nutrient-poor; nutrients sink out of the photic zone and return only via slow upwelling."}, {"text": "Ocean water has higher dissolved CO2 than the atmosphere, which directly drives higher photosynthesis.", "isCorrect": false, "rationale": "The atmosphere-ocean CO2 exchange is roughly at equilibrium and is not the driver of NPP. Light and nutrient availability are the limiting factors for marine primary production."}], "id": "q04"}, {"question": "Coral reefs cover less than 1% of the ocean floor yet harbor roughly 25% of all marine species and exhibit productivity comparable to tropical rainforests. What mechanism explains this paradox of high productivity in nutrient-poor tropical waters?", "options": [{"text": "Coral reefs accumulate nutrients from heavy river runoff like estuaries do.", "isCorrect": false, "rationale": "Most coral reefs occur in oligotrophic (nutrient-poor) tropical seas with little river input. River runoff is more characteristic of estuaries and coastal upwelling zones."}, {"text": "Coral polyps fix nitrogen directly from seawater the way legumes fix it from air.", "isCorrect": false, "rationale": "Coral polyps do not perform nitrogen fixation. Nitrogen fixation is a microbial process; corals rely on a symbiotic algal partner for productivity."}, {"text": "A tight mutualism between coral polyps and photosynthetic Symbiodinium algae allows efficient internal nutrient and energy exchange in oligotrophic waters.", "isCorrect": true, "rationale": "The coral-Symbiodinium mutualism (zooxanthellae) is the engine of reef productivity. Algae produce sugars by photosynthesis; corals provide protection, CO2, and inorganic nitrogen and phosphorus, recycling nutrients efficiently within the holobiont."}, {"text": "Coral reefs are concentrated in the aphotic zone where decomposers dominate.", "isCorrect": false, "rationale": "Coral reefs require sunlight and occupy the photic zone — typically shallow tropical waters. The aphotic zone has no light and thus no photosynthesis."}], "id": "q05"}, {"question": "Tundra lies north of the treeline and is underlain by permafrost. Climate warming is now thawing this permafrost. According to the section, why is this thawing especially significant for the global carbon cycle?", "options": [{"text": "Thawing permafrost releases stored carbon, creating a positive feedback loop that further accelerates Arctic warming.", "isCorrect": true, "rationale": "The Arctic is warming at roughly twice the global rate. Thawing permafrost releases stored carbon (CO2 and CH4) to the atmosphere, which amplifies warming, which thaws more permafrost — the positive feedback loop noted in the text and explored further in Unit 9."}, {"text": "Thawing permafrost increases tundra NPP enough to absorb all released carbon, creating a negative feedback.", "isCorrect": false, "rationale": "Even with longer growing seasons, tundra NPP is among the lowest of any terrestrial biome. The small productivity gain cannot offset the large carbon release from thawing soils."}, {"text": "Thawing permafrost converts methane to CO2, reducing greenhouse warming overall.", "isCorrect": false, "rationale": "Anaerobic decomposition in waterlogged thawed soils actually releases methane (a potent greenhouse gas), in addition to CO2. The conversion direction described is incorrect."}, {"text": "Permafrost contains no carbon; it is purely frozen mineral soil.", "isCorrect": false, "rationale": "Permafrost contains substantial stored organic carbon accumulated over millennia. Its release on thawing is the central concern."}], "id": "q06"}, {"question": "Which two abiotic master variables organize aquatic biomes — distinct from the variables that organize terrestrial biomes?", "options": [{"text": "Temperature and precipitation, the same as terrestrial biomes.", "isCorrect": false, "rationale": "These are the master variables for terrestrial biomes. Aquatic biomes are organized by salinity and light penetration, as the section explicitly states."}, {"text": "Salinity (concentration of dissolved salts) and light penetration (which defines the photic zone).", "isCorrect": true, "rationale": "Salinity divides freshwater (<0.5 ppt), estuarine (variable), and marine (~35 ppt) systems. Light penetration defines the photic zone (top ~200 m in open ocean) where photosynthesis is possible. Together they organize aquatic biome distribution."}, {"text": "Wind speed and current velocity.", "isCorrect": false, "rationale": "These influence local conditions but are not the master variables that organize aquatic biomes globally."}, {"text": "pH and dissolved oxygen.", "isCorrect": false, "rationale": "Both are important locally — especially for water-quality issues — but the section explicitly identifies salinity and light penetration as the master organizing variables."}], "id": "q07"}, {"question": "The photic zone is the upper layer of a body of water through which sufficient sunlight penetrates to support photosynthesis. In the open ocean, how deep does it typically extend, and what dominates below it?", "options": [{"text": "Roughly 50 m, with autotrophs dominating below.", "isCorrect": false, "rationale": "The 50 m figure is too shallow for typical clear open-ocean conditions, and autotrophs cannot photosynthesize without light."}, {"text": "Roughly 200 m, with decomposers and chemolithotrophs dominating in the dark aphotic zone below.", "isCorrect": true, "rationale": "In clear open-ocean water the photic zone extends to ~200 m. Below it lies the aphotic zone, where photosynthesis is impossible and energy comes from decomposition of sinking organic matter or chemosynthesis at vents."}, {"text": "Roughly 1000 m, with terrestrial plant material dominating below.", "isCorrect": false, "rationale": "Photic zone depth is far less than 1000 m. Terrestrial plant material does not dominate any ocean zone."}, {"text": "Roughly 200 m, but only chemoautotrophs occur below; decomposers cannot survive in saltwater.", "isCorrect": false, "rationale": "The depth is correct but decomposers (bacteria and fungi) are abundant in the aphotic zone, processing sinking organic matter alongside chemolithotrophs at vents."}], "id": "q08"}, {"question": "Estuaries — where fresh and salt water mix — are among the most productive habitats on Earth, yet they are also disproportionately threatened. Which combination of features explains BOTH their high productivity AND their vulnerability?", "options": [{"text": "High productivity from nutrient mixing of fresh and salt water; vulnerability because their coastal accessibility and shallow waters make them prime targets for development and pollution.", "isCorrect": true, "rationale": "Estuarine mixing creates nutrient and salinity gradients that fuel high productivity and serve as fish nursery habitat. Their proximity to coastlines and ports makes them highly accessible to humans, leading to development, dredging, and pollution loading."}, {"text": "High productivity because they are isolated from human activity; vulnerability from invasive species only.", "isCorrect": false, "rationale": "Estuaries are not isolated — they are among the most heavily developed coastal ecosystems. Threat sources are broader than invasive species alone."}, {"text": "High productivity from very high salinity; vulnerability from natural drought.", "isCorrect": false, "rationale": "Estuaries have intermediate, variable salinity, not very high salinity. Drought affects them, but coastal development and pollution are the dominant threats."}, {"text": "High productivity from permafrost; vulnerability from sea-ice loss.", "isCorrect": false, "rationale": "Permafrost is irrelevant to estuaries; this answer confuses biome characteristics."}], "id": "q09"}, {"question": "Boreal forest (taiga) is the largest terrestrial biome by area. Which combination of climate features and adaptations BEST characterizes it?", "options": [{"text": "Long, cold winters and short, cool summers; evergreen conifers with needle-shaped leaves and waxy coatings; thin, acidic, nutrient-poor soils.", "isCorrect": true, "rationale": "These features are correctly matched. Needle leaves resist freezing and minimize winter water loss; waxy cuticles add freeze resistance; conifer litter and slow decomposition produce acidic, nutrient-poor podzolic soils."}, {"text": "Hot, wet year-round climate; broad-leaved evergreen trees; nutrient-rich soils.", "isCorrect": false, "rationale": "These features describe tropical rainforest, not boreal forest. Boreal forest is sub-Arctic, with long cold winters."}, {"text": "Short cold winters and long hot summers; deciduous trees only; deep, nutrient-rich soils.", "isCorrect": false, "rationale": "This is closer to temperate deciduous forest, not boreal forest. Boreal soils are thin, acidic, and poor."}, {"text": "Permafrost preventing tree growth; only mosses and sedges; growing season under 60 days.", "isCorrect": false, "rationale": "These features describe tundra, not boreal forest. The treeline is the boundary that distinguishes them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
