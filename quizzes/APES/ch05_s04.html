    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Water Use, Irrigation Methods, and Salinization</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A farm in California's Central Valley currently uses flood irrigation (approximately 50% efficiency). The owner is considering switching to drip irrigation (approximately 90% efficiency). For the same crop water requirement, what is the approximate ratio of water savings the switch would produce?", "options": [{"text": "Drip would use approximately twice as much water as flood, because it delivers more water to roots.", "isCorrect": false, "rationale": "Drip is the MOST efficient method and uses LESS water than flood for the same root-zone delivery. The high efficiency means little water is lost to evaporation, runoff, or deep percolation."}, {"text": "For each 100 units of crop water requirement, flood needs ~200 units (50% efficiency) while drip needs ~111 units (90% efficiency); drip saves ~45% of withdrawals.", "isCorrect": true, "rationale": "Efficiency = useful delivery / total withdrawal. To deliver 100 units to roots: flood needs 100/0.50 = 200 units; drip needs 100/0.90 = 111 units. Savings = (200-111)/200 = 44.5% reduction in total water withdrawal."}, {"text": "Flood and drip use identical water because crop needs do not change.", "isCorrect": false, "rationale": "Crop NEEDS are constant, but DELIVERY EFFICIENCY differs. The total withdrawal must be higher for less efficient methods to compensate for water lost en route."}, {"text": "Drip uses ~10% as much water as flood — a 90% reduction.", "isCorrect": false, "rationale": "The 90% figure is drip's efficiency, not its share of flood's withdrawal. The actual savings is ~45%, not 90%."}]}, {"question": "The Ogallala Aquifer underlies approximately 450,000 square kilometers of the Great Plains and supports irrigation of about 30% of US groundwater-irrigated cropland. Natural recharge averages roughly 0.5 cm/yr, while annual withdrawals in some areas exceed 30 cm/yr. What term best describes this withdrawal pattern, and why is it concerning?", "options": [{"text": "Sustainable harvest, because annual withdrawals are matched by drought-driven recharge.", "isCorrect": false, "rationale": "Withdrawals (30 cm/yr) exceed recharge (0.5 cm/yr) by a factor of 60 — this is unambiguously unsustainable. Drought-driven recharge is not real."}, {"text": "Mining of fossil water, because withdrawals exceed recharge by approximately 60-fold; the saturated thickness has declined ~30% on average and >60% in parts of Kansas/Texas, with portions becoming economically unusable within decades.", "isCorrect": true, "rationale": "The textbook calls this 'mining fossil-water aquifers,' analogous to burning through a savings account. The 60:1 ratio (30 cm/yr withdrawal vs. 0.5 cm/yr recharge) means the aquifer is being depleted, not maintained. The textbook documents 30% average and >60% local declines in saturated thickness."}, {"text": "Recharge equilibrium, because pumping causes infiltration to accelerate.", "isCorrect": false, "rationale": "Pumping does not accelerate recharge for fossil-water aquifers like the Ogallala. Recharge is a function of climate, geology, and surface water — not pumping rate."}, {"text": "Conjunctive use, because surface water is being substituted for groundwater.", "isCorrect": false, "rationale": "Conjunctive use is a management strategy combining surface and groundwater sources. The Ogallala situation involves groundwater mining, not conjunctive use balancing."}]}, {"question": "Why does irrigation in poorly drained fields lead to salinization, and what makes the process effectively irreversible?", "options": [{"text": "Irrigation water dissolves potassium from rock, which kills plants. The process is reversible by adding more potassium.", "isCorrect": false, "rationale": "Salinization involves accumulation of multiple soluble salts (sodium, calcium, magnesium chlorides and sulfates), not just potassium. And the process is largely irreversible without expensive intervention."}, {"text": "All irrigation water contains dissolved salts; when water evaporates and transpires through plants, salts are left behind in the soil. Without adequate drainage, salts accumulate over seasons. Reversal requires expensive leaching and drainage infrastructure.", "isCorrect": true, "rationale": "Even 'fresh' water has dissolved minerals. Evaporation and transpiration concentrate these salts in the root zone. Adequate drainage (subsurface drains, leaching with extra water) can flush salts, but this is expensive — and once severe salinization sets in, productivity loss is effectively permanent at scale. The textbook explicitly calls the process 'effectively irreversible without expensive leaching and drainage infrastructure.'"}, {"text": "Salinization is caused by acid rain, not irrigation, and is reversible by liming the soil.", "isCorrect": false, "rationale": "Acid rain causes acidification, not salinization. Liming addresses acidity, not salt accumulation."}, {"text": "Salinization is a temporary phenomenon that resolves after one growing season.", "isCorrect": false, "rationale": "The textbook documents salinization in lower Mesopotamia 4,000 years ago — a process that never resolved and contributed to civilizational collapse. Salts accumulate over decades without adequate drainage."}]}, {"question": "The Aral Sea, once the fourth-largest lake in the world (~68,000 km²), shrunk to approximately 10% of its original surface area between the 1960s and 2007. According to the textbook case study, what was the primary mechanism, and what was its secondary chain of consequences?", "options": [{"text": "Climate change directly evaporated the lake; the mechanism cannot be reversed.", "isCorrect": false, "rationale": "The textbook attributes the Aral Sea collapse primarily to Soviet diversion of the Amu Darya and Syr Darya rivers for cotton irrigation — a deliberate policy choice — not to climate change."}, {"text": "The Soviet Union diverted the Amu Darya and Syr Darya rivers for cotton irrigation; consequences included tenfold salinity increase, fishery collapse, exposed lake-bed dust storms causing respiratory disease, and continentalization of local climate.", "isCorrect": true, "rationale": "The Soviet diversion of both inflowing rivers is the textbook's primary mechanism. The secondary cascade: salinity rose from ~10 g/L to >100 g/L in the southern basin, killing all fish; the exposed Aralkum Desert became a source of pesticide-laden dust causing widespread respiratory disease; loss of the lake's moderating climate effect produced hotter summers, colder winters, shorter growing seasons."}, {"text": "Earthquake activity diverted the lake's underground outflow.", "isCorrect": false, "rationale": "The Aral Sea has no significant underground outflow; the loss was from inflow diversion, not subsurface drainage."}, {"text": "Fishing extracted too much water from the lake.", "isCorrect": false, "rationale": "Fishing does not remove water; it removes fish. The mechanism was river diversion for irrigation, not fishing."}]}, {"question": "California's Central Valley has experienced documented land subsidence of up to 9 meters over the past century of agricultural pumping. Why is this subsidence considered a permanent loss of aquifer capacity?", "options": [{"text": "The subsided land cannot be farmed because of the change in slope.", "isCorrect": false, "rationale": "Slope change is not the primary issue; the loss is BELOW ground. Subsided land typically can still be farmed; the lost capacity is in the aquifer system itself."}, {"text": "Fine-grained sediment layers compact when groundwater is removed, and these compacted clay layers cannot re-expand when water returns. Storage capacity is permanently destroyed.", "isCorrect": true, "rationale": "The textbook explains that 'subsidence permanently destroys aquifer storage capacity because the fine-grained sediment layers that collapse cannot re-expand when water returns.' Fine clays compact irreversibly under loading; once consolidated, they cannot rehydrate to their original porosity."}, {"text": "The water table rises after subsidence, eliminating the aquifer.", "isCorrect": false, "rationale": "Subsidence does not raise the water table; it lowers the land surface relative to the (already lowered) water table. The capacity loss is in subsurface storage volume."}, {"text": "Subsidence triggers earthquakes that fracture the aquifer rock.", "isCorrect": false, "rationale": "Subsidence is generally a slow, aseismic process. The capacity loss is from clay compaction, not earthquake-induced fracture."}]}, {"question": "Why is water described as a 'non-substitutable agricultural input,' and what does this property imply for the long-run viability of irrigated agriculture in regions like the Ogallala?", "options": [{"text": "Water is non-substitutable because no chemical substitute exists for plant photosynthesis and metabolism; aquifer-dependent agriculture faces hard physical limits that cannot be engineered around through chemistry or breeding alone.", "isCorrect": true, "rationale": "The textbook explicitly states that 'photosynthesis and plant metabolism require liquid water, and there is no synthetic equivalent.' Unlike fertilizer or pesticides which have alternatives, water has none. This is QUALITATIVELY different from other resource constraints — when the water is gone, irrigated production stops, full stop."}, {"text": "Water is substitutable in agriculture by using ammonia or methanol as a hydration source.", "isCorrect": false, "rationale": "Plants require liquid water specifically (H2O); ammonia and methanol cannot substitute. The textbook's point is that no chemical equivalent exists."}, {"text": "Water is non-substitutable only in commodity crops; high-value crops can be grown with synthetic alternatives.", "isCorrect": false, "rationale": "Photosynthesis requires water in ALL plants regardless of economic value. There is no synthetic substitute at any value level."}, {"text": "Water is non-substitutable, but irrigated agriculture in depleted regions can switch to dryland-adapted crops without efficiency loss.", "isCorrect": false, "rationale": "Dryland-adapted crops do exist and can be planted, but they typically yield much less per hectare than irrigated crops, so this is a capacity REDUCTION, not a non-loss substitution."}]}, {"question": "Rank the four irrigation methods (flood, furrow, sprinkler, drip) from LOWEST to HIGHEST water-use efficiency, with approximate efficiency values from the textbook.", "options": [{"text": "Drip (90%) > Sprinkler (75%) > Furrow (60%) > Flood (50%); rank from highest to lowest efficiency.", "isCorrect": false, "rationale": "This ranks from HIGHEST to LOWEST, but the question asks for LOWEST to HIGHEST. The values are correct but the order is reversed."}, {"text": "Flood (~50%) < Furrow (~60%) < Sprinkler (~75%) < Drip (~90%); flood loses most water to evaporation/runoff/deep percolation, drip delivers nearly all water to root zone via low-pressure emitters.", "isCorrect": true, "rationale": "The textbook gives these efficiency values: flood 50% (water spreads over field surface, half lost to evap/runoff/percolation); furrow 60% (channels concentrate water between rows); sprinkler 75% (some loss to evaporation in air, leaf interception); drip 90% (water delivered directly to root zone via low-pressure emitters, minimal evaporation)."}, {"text": "Sprinkler < Drip < Flood < Furrow; gravity-driven methods are most efficient.", "isCorrect": false, "rationale": "Gravity-driven methods (flood, furrow) are LEAST efficient, not most. Pressurized systems (sprinkler, drip) deliver water more precisely."}, {"text": "All four methods have approximately equal efficiency; the choice depends on cost only.", "isCorrect": false, "rationale": "Efficiency varies dramatically — from 50% (flood) to 90% (drip). The textbook identifies efficiency, not just cost, as the central differentiator."}]}, {"question": "Israel pioneered large-scale drip irrigation in the 1960s, and California's Central Valley and Spain's Almería region now rely heavily on it. Which factor best explains why drip irrigation is increasingly adopted despite its higher capital cost?", "options": [{"text": "Drip systems work only with low-value crops, so adoption is increasing as crop values decline.", "isCorrect": false, "rationale": "Drip is most cost-effective for HIGH-value crops (vegetables, fruits, vines) where water savings justify the higher capital cost. The textbook explicitly notes adoption for high-value crops."}, {"text": "In water-scarce regions, the 90% efficiency reduces total water demand, energy costs (lower pumping volumes), and salinization risk; these benefits are most justifiable for high-value crops.", "isCorrect": true, "rationale": "The textbook identifies drip irrigation's adoption drivers: water scarcity (high-efficiency means less withdrawal needed), energy savings (less water pumped means less pumping energy), and salinization risk reduction (less water passing through root zone means less salt deposit). Capital cost is amortized faster on high-value crops."}, {"text": "Drip systems are mandated by federal law in all California counties.", "isCorrect": false, "rationale": "There is no such universal mandate. Adoption is driven by water scarcity, economics, and crop value, not by federal mandate."}, {"text": "Drip eliminates the need for any other water source, including rainfall.", "isCorrect": false, "rationale": "Drip is an irrigation method that supplements or replaces rainfall delivery to roots; it does not 'eliminate' rainfall as a water source."}]}, {"question": "Salt-tolerant crops have higher salinity thresholds than sensitive ones. Which set of crops correctly represents the comparison?", "options": [{"text": "Tolerant: strawberries, soybeans, onions; sensitive: barley, sugar beet, cotton.", "isCorrect": false, "rationale": "This reverses the textbook's classification. Strawberries, soybeans, onions are SALT-SENSITIVE; barley, sugar beet, cotton are SALT-TOLERANT."}, {"text": "Tolerant: barley, sugar beet, cotton; sensitive: strawberries, soybeans, onions.", "isCorrect": true, "rationale": "The textbook lists barley, sugar beet, and cotton as salt-tolerant — they have higher thresholds for osmotic stress before yields decline. Strawberries, soybeans, and onions are sensitive — they suffer at lower salt concentrations. Even tolerant crops cannot persist indefinitely in heavily salinized soils."}, {"text": "All crops have the same salt tolerance.", "isCorrect": false, "rationale": "Crop salt tolerance varies by orders of magnitude. This is a significant management variable in salinized regions."}, {"text": "Tolerant: corn, wheat, rice; sensitive: cotton, sugar beet, barley.", "isCorrect": false, "rationale": "The textbook's specific tolerant crops are barley, sugar beet, cotton (not corn, wheat, rice). Wheat is moderately sensitive."}]}, {"question": "The Ogallala Aquifer recharges at approximately 0.5 cm/yr in the areas it supplies. A farm currently pumps water at a rate equivalent to removing 30 cm/yr from the aquifer depth. Calculate how many years it would take to deplete 300 cm (approximately 10 feet) of saturated aquifer thickness at this NET extraction rate.", "options": [{"text": "10 years, because the farm extracts 30 cm/yr from a 300 cm column.", "isCorrect": false, "rationale": "This ignores the recharge offset. The NET extraction is 30 - 0.5 = 29.5 cm/yr, slightly less than 30 cm/yr."}, {"text": "Approximately 10.2 years, because the net extraction (withdrawal minus recharge) is 30 - 0.5 = 29.5 cm/yr; 300 cm / 29.5 cm/yr ≈ 10.2 years.", "isCorrect": true, "rationale": "Net depletion = withdrawal (30 cm/yr) - recharge (0.5 cm/yr) = 29.5 cm/yr. Time to deplete 300 cm = 300 / 29.5 ≈ 10.17 years. The recharge is so small relative to withdrawal that it barely extends the depletion timeline. This is why the textbook calls Ogallala extraction 'mining' — recharge is essentially negligible at human timescales."}, {"text": "600 years, because the recharge will eventually replace what is extracted.", "isCorrect": false, "rationale": "Recharge (0.5 cm/yr) is far less than withdrawal (30 cm/yr); the deficit grows, not shrinks. 600 years is the order of magnitude for the FULL aquifer to NATURALLY recharge — but it does not offset 30 cm/yr withdrawals."}, {"text": "1 year, because aquifers behave like surface streams.", "isCorrect": false, "rationale": "Aquifers are subsurface storage and do not behave like streams. The depletion calculation requires accounting for both withdrawal and recharge rates and the stock being drawn down."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
