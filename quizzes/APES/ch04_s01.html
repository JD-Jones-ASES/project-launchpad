<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Plate Tectonics, Volcanism, and Seismic Activity</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A geophysicist studying the Cascade Range observes that the Juan de Fuca Plate is sinking beneath the North American Plate, and a chain of stratovolcanoes (Mount Rainier, Mount St. Helens, Mount Shasta) lies parallel to the coast. What boundary process best explains this volcanic arc, and what is the role of water in generating its magma?", "options": [{"text": "Transform faulting; horizontal sliding fractures rock and friction releases trapped water that initiates melting.", "isCorrect": false, "rationale": "Transform boundaries (e.g., the San Andreas) generate earthquakes but produce little volcanism because no plate descends into the mantle."}, {"text": "Subduction at a convergent boundary; the descending oceanic slab carries water-bearing minerals into the mantle, lowering the melting point of mantle rock to generate magma that rises through the overlying crust.", "isCorrect": true, "rationale": "Subduction-zone volcanism is driven by water released from the descending slab. That water lowers the solidus of mantle peridotite, producing the wet, viscous magma characteristic of stratovolcanoes."}, {"text": "Seafloor spreading at a divergent boundary; mantle decompression melting produces effusive lava flows.", "isCorrect": false, "rationale": "Divergent (mid-ocean ridge) volcanism is driven by decompression melting and produces basaltic lava flows, not the explosive stratovolcanoes of the Cascades."}, {"text": "Hotspot volcanism above a stationary mantle plume independent of plate motion.", "isCorrect": false, "rationale": "Hotspot volcanism (Hawaii, Yellowstone) is intraplate and produces island chains progressively older away from the plume; it does not explain the Cascade arc, which lies above a subduction zone."}]}, {"question": "The Hawaiian Islands form a chain that becomes progressively older to the northwest, with the Big Island actively erupting and Midway being the most eroded. What does this pattern most directly indicate?", "options": [{"text": "The Pacific Plate is moving northwest over a relatively stationary mantle hotspot, so each island formed when that section of crust was directly above the plume.", "isCorrect": true, "rationale": "Hotspots are anchored in the deep mantle while plates drift over them. The age progression along Hawaii's chain records the direction (northwest) and rate of Pacific Plate motion."}, {"text": "A divergent plate boundary is opening progressively from southeast to northwest, splitting Hawaii in two.", "isCorrect": false, "rationale": "There is no divergent boundary running through Hawaii; the chain is intraplate and far from any plate boundary."}, {"text": "Subduction is consuming Pacific crust beneath the islands, producing a volcanic arc.", "isCorrect": false, "rationale": "Subduction produces curved arcs along trench systems (e.g., the Aleutians, Japan). Hawaii sits in the middle of the Pacific Plate, far from any trench."}, {"text": "Transform motion is offsetting the islands sequentially along a fault.", "isCorrect": false, "rationale": "Transform boundaries displace landforms laterally without creating volcanism. They cannot generate a volcanic island chain with a clear age progression."}]}, {"question": "Approximately 75% of Earth's active volcanoes and 90% of all earthquakes occur along the Pacific Ring of Fire. What is the primary geological reason for this concentration?", "options": [{"text": "The Pacific Plate is the largest plate, and larger plates statistically produce more events.", "isCorrect": false, "rationale": "Plate size alone does not concentrate seismic and volcanic activity; what matters is the type and density of boundaries surrounding the plate."}, {"text": "The Pacific Basin is ringed by convergent (subduction) boundaries — beneath South America, Central America, the Pacific Northwest (Cascadia), the Aleutians, Japan, the Philippines, and New Zealand — which produce both explosive volcanism and major earthquakes.", "isCorrect": true, "rationale": "The Ring of Fire is defined by the chain of subduction zones encircling the Pacific. Subduction generates both arc volcanism (water-fluxed magma) and megathrust earthquakes, concentrating both hazards in this belt."}, {"text": "A single mantle hotspot underlies the entire Pacific Basin.", "isCorrect": false, "rationale": "Hotspots are localized plumes (Hawaii, Yellowstone). They cannot account for the continuous boundary-defined ring of seismicity and volcanism around the Pacific."}, {"text": "The Pacific Ocean's depth amplifies seismic waves and generates extra earthquakes.", "isCorrect": false, "rationale": "Ocean depth does not generate earthquakes. Earthquakes originate from elastic strain release at faults, which are concentrated at plate boundaries."}]}, {"question": "Mid-ocean ridges represent the longest mountain range on Earth, almost entirely submerged. What process forms new oceanic crust along these ridges?", "options": [{"text": "Subduction of oceanic plates produces hydrothermal vents that build ridges through chemical precipitation.", "isCorrect": false, "rationale": "Subduction destroys oceanic crust at trenches; it does not build ridges. Hydrothermal vents do form near ridges but they do not create the crust itself."}, {"text": "Seafloor spreading: as plates pull apart, magma wells up from the mantle, cools, and becomes new oceanic crust, widening the ocean basin (e.g., the Atlantic widens about 2.5 cm/year).", "isCorrect": true, "rationale": "Mid-ocean ridges are divergent boundaries. Mantle decompression melting produces basaltic magma that emerges, cools, and progressively adds new crust to either side of the ridge."}, {"text": "Transform faulting horizontally slices the seafloor and creates ridge topography from offset blocks.", "isCorrect": false, "rationale": "Transform faults offset ridge segments but do not generate new crust; ridges form by spreading, not by horizontal sliding."}, {"text": "Continental collisions buckle oceanic crust upward into the ridge system.", "isCorrect": false, "rationale": "Continental collisions produce continental mountain ranges (the Himalayas) above the surface, not submerged oceanic ridges."}]}, {"question": "A geologist comparing soils notes that volcanic-derived (Andisol) soils on the slopes of Java support some of the world's densest agricultural populations, while granite-derived soils nearby are markedly less productive. What feature of volcanic soils explains this fertility?", "options": [{"text": "Volcanic ash blocks rainfall, conserving water for crops.", "isCorrect": false, "rationale": "Ash neither blocks rain nor systematically conserves moisture for crops; if anything, ash falls can damage crops and infrastructure."}, {"text": "Volcanic soils are extraordinarily rich in potassium, phosphorus, calcium, and trace minerals — nutrients that are limiting in most tropical soils.", "isCorrect": true, "rationale": "Volcanic eruptions weather rapidly into mineral-rich soils. The high content of K, P, Ca, and trace elements directly addresses nutrient limitations of typical tropical (Oxisol) soils, which are deeply leached."}, {"text": "Volcanic soils have extremely low cation exchange capacity, so nutrients move quickly to roots.", "isCorrect": false, "rationale": "High fertility tracks with high CEC (cation retention), not low CEC. Low-CEC soils leach nutrients readily."}, {"text": "Volcanic soils are sterile and require no fertilizer because no microbes deplete them.", "isCorrect": false, "rationale": "Productive volcanic soils support thriving microbial communities; sterility would prevent the nutrient cycling that supports crops."}]}, {"question": "What property primarily makes the descending plate at a convergent boundary subduct beneath the overriding plate?", "options": [{"text": "Higher density: oceanic crust is denser than continental crust, and older oceanic crust is denser still, so it sinks beneath the less-dense plate.", "isCorrect": true, "rationale": "Subduction is gravity-driven by negative buoyancy. Oceanic crust (~3.0 g/cm³) is denser than continental crust (~2.7 g/cm³); when an oceanic and continental plate collide, the oceanic plate sinks."}, {"text": "Higher temperature: hotter rock is more buoyant and rises beneath the cooler plate.", "isCorrect": false, "rationale": "Hotter rock is less dense and tends to rise, not subduct. Subduction requires the descending slab to be denser, which usually means cooler and older."}, {"text": "Higher silica content: silica-rich rock sinks more readily than silica-poor rock.", "isCorrect": false, "rationale": "The opposite is true at the crustal scale: silica-rich (felsic) continental rocks are less dense than silica-poor (mafic) oceanic rocks. Continental rocks resist subduction."}, {"text": "Greater plate size: larger plates always subduct beneath smaller ones.", "isCorrect": false, "rationale": "Plate size does not determine which plate subducts; density does. Small dense plates can subduct beneath large less-dense ones."}]}, {"question": "When the Indian subcontinent collided with Eurasia roughly 50 million years ago, the Himalayas formed by uplift rather than subduction. Why didn't one plate simply descend under the other?", "options": [{"text": "Both plates carried continental crust, and continental crust is too buoyant to subduct deeply, so the colliding crust crumples and thickens upward into mountains.", "isCorrect": true, "rationale": "Continental-continental collisions produce uplift rather than subduction because both plates are felsic and buoyant. The thickened crust forms ranges like the Himalayas, which are still rising today."}, {"text": "The plates rotated past each other along a transform boundary, generating uplift through friction.", "isCorrect": false, "rationale": "Transform motion does not generate the sustained vertical uplift required to build the Himalayas; a head-on collision did."}, {"text": "Magma rising from a hotspot beneath the Himalayas pushed both plates upward.", "isCorrect": false, "rationale": "There is no major hotspot under the Himalayas; the range is a collisional belt, not a volcanic one."}, {"text": "Sea-level rise eroded both plates and forced them upward isostatically.", "isCorrect": false, "rationale": "Isostatic adjustment can produce uplift after erosion, but it cannot generate the Himalayan-scale orogeny; the cause is plate convergence."}]}, {"question": "The 1906 San Francisco earthquake ruptured approximately 470 km of the San Andreas Fault system. Which boundary type does this fault represent?", "options": [{"text": "A convergent boundary, where one plate subducts beneath the other.", "isCorrect": false, "rationale": "Convergent boundaries produce trenches, volcanic arcs, and deep earthquakes. The San Andreas neither produces volcanoes nor subduction-zone earthquakes."}, {"text": "A divergent boundary, where new crust is generated as plates pull apart.", "isCorrect": false, "rationale": "Divergent boundaries are mid-ocean ridges or rift valleys (East African Rift). The San Andreas does not create new crust."}, {"text": "A transform boundary, where the Pacific Plate slides horizontally past the North American Plate at roughly 5 cm/year, accumulating elastic strain that releases as earthquakes.", "isCorrect": true, "rationale": "Transform boundaries slide horizontally with no crust created or destroyed. The San Andreas is the type-example: long, mostly straight, prone to large strike-slip earthquakes, with little volcanism."}, {"text": "A hotspot, where the Pacific Plate moves over a deep mantle plume.", "isCorrect": false, "rationale": "There is no hotspot under California's coastal faults; the seismicity is driven by transform-boundary strain release."}]}, {"question": "Why does subduction-zone volcanism (Mount St. Helens) tend to be more explosive than divergent-boundary volcanism (Iceland)?", "options": [{"text": "Subduction-zone magma is water-rich and more silica-rich (viscous), trapping pressurized gases that release violently when the magma reaches the surface; divergent magma is dry, less viscous, and lets gases escape gradually.", "isCorrect": true, "rationale": "Water lowers the melting point and produces silica-rich, viscous magma that traps gas. When pressure releases, the gas expands explosively (pyroclastic eruptions). Mid-ocean ridge magma, water-poor and basaltic, vents lava effusively."}, {"text": "Divergent magma is hotter, so it explodes more violently when exposed to seawater.", "isCorrect": false, "rationale": "Phreatic explosions occur where lava meets water but they do not match the explosive scale of subduction-zone eruptions, which are driven by gas content and viscosity."}, {"text": "Subduction occurs faster than spreading, so eruption rates are higher and produce explosions.", "isCorrect": false, "rationale": "Eruption explosivity is controlled by magma viscosity and gas content, not boundary speed. Spreading rates can equal or exceed subduction rates without explosive eruptions."}, {"text": "Divergent volcanoes always erupt underwater, which prevents explosive activity.", "isCorrect": false, "rationale": "Iceland's divergent volcanism is partially subaerial (above water), and the eruptions are still effusive rather than explosive — confirming that water depth is not the controlling variable."}]}, {"question": "The Cascadia Subduction Zone is capable of producing a magnitude-9 earthquake. Modelers estimate this could cause tens of thousands of deaths and economic losses exceeding $300 billion in Seattle and Portland. Which feature of subduction zones makes such a large earthquake possible?", "options": [{"text": "Megathrust faults along subduction zones can rupture for hundreds of kilometers and slip many meters in a single event, releasing enormous accumulated elastic strain in one sustained rupture.", "isCorrect": true, "rationale": "Megathrust earthquakes occur on the locked interface between subducting and overriding plates. Long, locked rupture lengths and large slip distances make magnitude 9 possible — as occurred in Tohoku 2011 and the 2004 Indian Ocean event."}, {"text": "Volcanic eruptions on the overriding plate trigger the largest earthquakes.", "isCorrect": false, "rationale": "Volcanic earthquakes are typically small (M < 5). The largest earthquakes are tectonic ruptures along the megathrust interface, not volcanic events."}, {"text": "Hotspot volcanism above the subduction zone generates the seismic energy.", "isCorrect": false, "rationale": "There is no hotspot beneath Cascadia; the seismic risk is purely from megathrust rupture along the locked plate interface."}, {"text": "Subduction-zone earthquakes are deeper than transform earthquakes, and depth proportionally increases magnitude.", "isCorrect": false, "rationale": "Earthquake magnitude is determined by rupture area and slip, not directly by depth. Shallow megathrust events can be the largest of all."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
