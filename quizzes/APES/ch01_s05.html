    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Energy Flow and Trophic Dynamics</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The section establishes that 'matter cycles, but energy flows.' Which observation BEST captures this asymmetry as it applies to ecosystems?", "options": [{"text": "Carbon atoms move from atmosphere to plant to deer to wolf and back to soil indefinitely, while the energy captured in those bonds degrades to heat at every transfer and must be continuously resupplied by the sun.", "isCorrect": true, "rationale": "This captures both halves: matter is recyclable (atoms reused), energy is one-way (degrades to heat at each transfer per the Second Law). The asymmetry is the organizing principle of all ecological energetics."}, {"text": "Both carbon atoms and energy molecules degrade to heat at every transfer, requiring continuous solar resupply.", "isCorrect": false, "rationale": "Carbon atoms do not 'degrade to heat'; they are conserved. Only the energy in chemical bonds is lost as heat. Conflating matter and energy here is a common misconception."}, {"text": "Both carbon atoms and energy can be reused indefinitely by ecosystems with no external input.", "isCorrect": false, "rationale": "Energy cannot be reused indefinitely; the Second Law of Thermodynamics requires that some fraction be lost as heat at every transfer. Solar input is required to sustain ecosystems."}, {"text": "Energy is recycled in food webs, and matter flows in one direction from producers to apex consumers.", "isCorrect": false, "rationale": "This inverts the relationship. Matter cycles, energy flows. The reverse is the textbook misconception the section is correcting."}]}, {"question": "Gross primary productivity (GPP) and net primary productivity (NPP) are central to understanding energy flow. What is the relationship between them, and which is available to consumers?", "options": [{"text": "GPP = NPP + R_autotrophic; only NPP — the surplus after plant respiration — is available to consumers.", "isCorrect": true, "rationale": "Plants use a substantial fraction of fixed energy (R_autotrophic) for their own growth, reproduction, and maintenance. NPP = GPP - R_autotrophic is what remains for the rest of the food web. The section emphasizes this as the AP-essential relationship."}, {"text": "GPP and NPP are identical, since plants are passive solar collectors that lose no energy to respiration.", "isCorrect": false, "rationale": "Plants are not passive; they respire actively, consuming a substantial fraction of fixed energy. Conflating GPP and NPP misses a central concept."}, {"text": "GPP is available to consumers; NPP is reserved for plant use.", "isCorrect": false, "rationale": "The relationship is the opposite. GPP includes the energy plants use for their own respiration; only the NPP surplus is available to herbivores and the rest of the food web."}, {"text": "NPP is the energy lost as heat; GPP is the energy stored as biomass.", "isCorrect": false, "rationale": "Heat loss from autotrophic respiration is what reduces GPP to NPP, but NPP itself is biomass-stored energy, not heat. The option mislabels the components."}]}, {"question": "A grassland ecosystem fixes 10,000 kcal/m²/yr as grass NPP. Applying the 10% rule, how much energy is available at each successive trophic level (grasshoppers → frogs → snakes → hawk)?", "options": [{"text": "Grasshoppers 1,000 kcal; frogs 100 kcal; snakes 10 kcal; hawk 1 kcal — all per m² per year.", "isCorrect": true, "rationale": "The 10% rule transfers ~10% of energy at each step. 10,000 → 1,000 → 100 → 10 → 1 kcal/m²/yr. The hawk's tiny share explains why apex predators need very large territories."}, {"text": "Grasshoppers 9,000 kcal; frogs 8,100 kcal; snakes 7,290 kcal; hawk 6,561 kcal.", "isCorrect": false, "rationale": "These numbers retain ~90% per step, which is the opposite of the 10% rule. The 10% rule keeps 10% at each transfer, not 90%."}, {"text": "Grasshoppers 5,000 kcal; frogs 2,500 kcal; snakes 1,250 kcal; hawk 625 kcal.", "isCorrect": false, "rationale": "These figures correspond to 50% transfer efficiency, far higher than the 10% AP-canonical figure."}, {"text": "Grasshoppers 100 kcal; frogs 1 kcal; snakes 0.01 kcal; hawk 0.0001 kcal.", "isCorrect": false, "rationale": "These figures correspond to 1% transfer efficiency. The 10% rule is the AP-canonical figure; 1% is too aggressive."}]}, {"question": "On the AP exam you are told a hawk requires 1,000 kcal of energy per year. Working BACKWARD using the 10% rule, how much grass biomass must be available to support that hawk?", "options": [{"text": "10,000,000 kcal of grass per year (multiply by 10 for each of the four trophic levels below).", "isCorrect": true, "rationale": "Working backward: 1,000 hawk × 10 = 10,000 snakes × 10 = 100,000 frogs × 10 = 1,000,000 grasshoppers × 10 = 10,000,000 kcal of grass. The section provides this exact reverse-application example."}, {"text": "10,000 kcal of grass per year (multiply by 10 once for the producer level).", "isCorrect": false, "rationale": "Multiplying by 10 only once accounts for one trophic transfer, not the full path back to producers across four trophic levels."}, {"text": "1,000 kcal of grass per year (no multiplication is required).", "isCorrect": false, "rationale": "Without applying the 10% rule, you assume zero energy loss between levels — contradicting the Second Law."}, {"text": "100 kcal of grass per year (divide hawk requirement by 10 four times).", "isCorrect": false, "rationale": "Working backward requires multiplying, not dividing. Dividing would give the energy at a level above the hawk, which does not exist in this food chain."}]}, {"question": "The 10% rule (Lindeman's efficiency law) is sometimes stated as exactly 10% transfer at each trophic level. According to the section, how should this rule be qualified, and what does it imply about food-chain length?", "options": [{"text": "Actual transfer efficiencies range from ~5% (warm-blooded predators with high metabolic costs) to ~20% (small ectotherms); the 10% average constrains productive food chains to about four or five trophic levels and explains why apex predators are always rare relative to their prey.", "isCorrect": true, "rationale": "The section gives this exact range. Warm-blooded animals lose more to thermoregulation and movement; ectotherms lose less. The cumulative loss limits food-chain length and forces apex predators to be rare."}, {"text": "The rule is an exact biophysical constant of 10.0%; food chains have an unlimited number of trophic levels.", "isCorrect": false, "rationale": "The 10% figure is an average, not an exact constant. And food chains are constrained, not unlimited, by the cumulative energy losses at each trophic step."}, {"text": "The rule applies only to terrestrial ecosystems; aquatic ecosystems can sustain transfer efficiencies of 90%.", "isCorrect": false, "rationale": "The rule applies broadly to both aquatic and terrestrial systems. Aquatic ectotherms may be at the higher end (~20%), still well below 90%."}, {"text": "The rule is irrelevant to food-chain length, which is determined entirely by predator size.", "isCorrect": false, "rationale": "Energy flow, not predator size alone, is the dominant constraint on food-chain length. Larger animals require more energy per individual but face the same cumulative loss problem."}]}, {"question": "An autotroph is an organism that manufactures its own food from inorganic compounds and an energy source. Which of the following correctly distinguishes the two types of autotrophs and gives a representative example of each?", "options": [{"text": "Photoautotrophs (plants, algae, cyanobacteria) use sunlight; chemoautotrophs (deep-sea vent bacteria) use chemical-bond energy from inorganic compounds.", "isCorrect": true, "rationale": "These are the two recognized autotroph categories. Plants and algae are familiar photoautotrophs; deep-sea hydrothermal-vent bacteria oxidize H2S or other inorganic compounds to fix carbon without sunlight, supporting ecosystems independent of solar input."}, {"text": "Photoautotrophs use chemical-bond energy; chemoautotrophs use sunlight.", "isCorrect": false, "rationale": "These pairings are inverted. Photo- means light; chemo- means chemical."}, {"text": "All autotrophs use sunlight; chemical-bond energy is used only by consumers.", "isCorrect": false, "rationale": "Chemoautotrophs (vent bacteria) are autotrophs that fix carbon using inorganic chemical energy without sunlight. They are not consumers."}, {"text": "Autotrophs and heterotrophs both manufacture food internally.", "isCorrect": false, "rationale": "Heterotrophs (consumers) cannot manufacture food; they must consume other organisms. Only autotrophs are producers."}]}, {"question": "When energy is transferred from one trophic level to the next, only a fraction is incorporated into new tissue. According to the section, what are the THREE main pathways by which the rest is lost?", "options": [{"text": "Heat from cellular respiration (Second Law); feces and urine carrying undigested or excreted organic matter to decomposers; energy expended in movement, thermoregulation, and other non-biomass activities.", "isCorrect": true, "rationale": "These are the three pathways the section explicitly enumerates. Together they account for ~90% of energy loss at each trophic transfer, leaving only ~10% to be stored as new biomass."}, {"text": "Heat from photosynthesis; wind dispersal of pollen; sleep.", "isCorrect": false, "rationale": "Photosynthesis is the energy-fixing process, not a loss pathway for higher trophic levels. Pollen dispersal and sleep are not relevant categories of trophic energy loss."}, {"text": "Direct radiation to space; oxidation of nitrogen; lightning strikes.", "isCorrect": false, "rationale": "These are not the categories of trophic energy loss within food chains. They confuse global heat balance and atmospheric chemistry with energetics within an organism."}, {"text": "Reproduction; growth; tissue maintenance.", "isCorrect": false, "rationale": "These are uses of assimilated energy, not pathways of loss. They contribute to biomass production rather than dissipating energy."}]}, {"question": "The text claims that decomposers process orders of magnitude more energy per unit area than apex consumers in many ecosystems (e.g., forest soils, marine sediments). What mechanism explains this counterintuitive finding?", "options": [{"text": "More plant biomass enters the detrital pathway through leaf litter, dead roots, and woody debris than through direct herbivory; uneaten prey, dead herbivores, feces, and shed skin from every trophic level also feed decomposers, making the decomposer web energetically wealthier than the herbivory chain implies.", "isCorrect": true, "rationale": "The detritus pathway captures both the plants that escape herbivory and the byproducts of every higher trophic level. Decomposers therefore process the bulk of the ecosystem's energy budget, far more than any single apex consumer."}, {"text": "Decomposers are autotrophs and produce their own energy from sunlight.", "isCorrect": false, "rationale": "Decomposers are heterotrophs (chemoheterotrophs); they break down organic matter for energy. They do not photosynthesize."}, {"text": "Apex consumers do not exist in most ecosystems.", "isCorrect": false, "rationale": "Apex consumers do exist in most ecosystems but are rare and process only a small fraction of total energy; the question's premise about decomposer dominance does not require denying apex consumers."}, {"text": "Decomposers cycle matter rather than processing energy.", "isCorrect": false, "rationale": "Decomposers do both — they process energy from organic matter AND they recycle nutrients back to inorganic forms. The two are coupled, not opposing."}]}, {"question": "The Light-Bottle / Dark-Bottle method measures NPP and GPP in pond water. Which set of relationships correctly describes the calculation?", "options": [{"text": "NPP = Final DO_light - Initial DO; R = Initial DO - Final DO_dark; GPP = NPP + R.", "isCorrect": true, "rationale": "These are the section's exact formulas. The light bottle integrates photosynthesis minus respiration (NPP); the dark bottle isolates respiration only; their sum (NPP + R) gives GPP."}, {"text": "GPP = Final DO_light - Initial DO; NPP = Final DO_light - Final DO_dark; R = 0.", "isCorrect": false, "rationale": "Respiration is never zero in living systems. The light bottle integrates NPP (photosynthesis - respiration), not GPP."}, {"text": "NPP = Initial DO - Final DO_dark; R = Final DO_light - Initial DO; GPP = NPP - R.", "isCorrect": false, "rationale": "These assignments are inverted. The dark bottle measures respiration as a DO decrease; NPP is measured by the DO increase in the light bottle."}, {"text": "NPP = R = GPP, since photosynthesis and respiration are always exactly balanced.", "isCorrect": false, "rationale": "Photosynthesis and respiration are not always balanced; if they were, NPP would be zero and there would be no surplus for consumers."}]}, {"question": "A food chain reads phytoplankton → zooplankton → herring → tuna. If phytoplankton NPP is 8,000 kcal/m²/yr, applying the 10% rule, what energy is available to tuna per square meter per year, and what does this imply about tuna population density?", "options": [{"text": "8 kcal/m²/yr for tuna; tuna population density must be very low relative to phytoplankton because tuna require enormous areas of productive ocean to meet their energy needs.", "isCorrect": true, "rationale": "Three 10% transfers reduce 8,000 kcal to 800 (zooplankton), 80 (herring), 8 (tuna). The implication — that apex predators must be sparsely distributed — explains why fisheries quotas focus on species like tuna."}, {"text": "800 kcal/m²/yr for tuna; tuna can sustain population densities equal to phytoplankton.", "isCorrect": false, "rationale": "800 is the energy at the second trophic level (zooplankton), not at the fourth (tuna). And cumulative energy loss precludes equal population density."}, {"text": "0.8 kcal/m²/yr for tuna; tuna are essentially absent from the ocean.", "isCorrect": false, "rationale": "0.8 corresponds to four 10% transfers from 8,000, but the food chain has only three transfers between phytoplankton and tuna. Tuna are not absent — just sparse."}, {"text": "8,000 kcal/m²/yr for tuna; transfer efficiency does not apply at the apex.", "isCorrect": false, "rationale": "The 10% rule applies at every trophic transfer, including to apex consumers. Tuna do not receive the full producer flux."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
