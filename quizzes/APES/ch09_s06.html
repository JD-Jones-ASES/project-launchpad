<script>
var QUESTIONS = [{"question": "The 1992 UNFCCC established the principle of \"common but differentiated responsibilities and respective capabilities\" (CBDR-RC). Which observation BEST justifies the CBDR-RC principle on equity grounds?", "options": [{"text": "Developed countries have higher per-capita emissions today than developing countries.", "isCorrect": false, "rationale": "Per-capita emissions today are part of the picture, but CBDR-RC rests primarily on historical responsibility — the cumulative stock of CO2 already emitted, which persists for centuries in the atmosphere."}, {"text": "Developed countries have historically contributed most of the stock of atmospheric CO2 — so they bear a greater initial responsibility for stabilizing greenhouse gas concentrations, even though all countries share the responsibility to act.", "isCorrect": true, "rationale": "CBDR-RC was specifically designed to address the disproportionate historical contribution of developed economies. CO2 emitted in 1900 still warms the atmosphere today; equity demands that the countries responsible for the stock bear greater initial responsibility."}, {"text": "Developing countries do not need to reduce emissions at all because their populations are larger.", "isCorrect": false, "rationale": "CBDR-RC does not exempt developing countries; it differentiates initial responsibility while requiring all parties to participate. This is why the Paris Agreement requires NDCs from all parties, not just developed countries."}, {"text": "Developed countries have lower CO2 absorption capacity in their forests.", "isCorrect": false, "rationale": "Forest absorption capacity is not the basis for CBDR-RC. The principle rests on historical emission responsibility and economic capacity to act."}]}, {"question": "PRIMARY SOURCE — Article 2 of the Paris Agreement (2015) states the central temperature goal as \"holding the increase in the global average temperature to well below 2 degrees C above pre-industrial levels and pursuing efforts to limit the temperature increase to 1.5 degrees C.\" The agreement uses Nationally Determined Contributions (NDCs) rather than binding targets. Which of the following BEST describes ONE strength and ONE weakness of the NDC approach?", "options": [{"text": "Strength: NDCs are legally binding with international penalties; Weakness: only Annex I countries must submit them.", "isCorrect": false, "rationale": "This describes Kyoto, not Paris. Paris NDCs are NOT legally binding in their emission targets, and ALL parties (not just Annex I) must submit them."}, {"text": "Strength: voluntary, nationally-determined commitments achieved universal participation including the US, China, India, and EU under one framework; Weakness: no binding enforcement, so current NDCs put the world on a 2.5-2.9 degrees C trajectory by 2100 — well above the temperature targets.", "isCorrect": true, "rationale": "The Paris Agreement's strength is universal participation — its predecessor Kyoto failed because major emitters opted out. Its weakness is that NDC ambition is voluntary, and the UNEP Emissions Gap Report (2024) finds current NDCs insufficient to meet either the 1.5 or 2 C targets."}, {"text": "Strength: NDCs require all parties to adopt identical emission targets; Weakness: this prevents countries from designing climate policies suited to their economies.", "isCorrect": false, "rationale": "NDCs are explicitly NOT identical — they are nationally-determined to reflect circumstances. This flexibility is a strength, not a weakness."}, {"text": "Strength: NDCs are exempt from review; Weakness: parties cannot adjust targets if conditions change.", "isCorrect": false, "rationale": "This describes the opposite of the actual mechanism. Paris establishes a transparency framework with technical expert review (developed countries) and peer review (developing countries), and the ratchet mechanism explicitly requires NDC updates every five years."}]}, {"question": "The Kyoto Protocol's first commitment period (2008-2012) ended with mixed results: many EU nations met or exceeded targets (largely through deliberate policy and the post-Soviet collapse of heavy industry in Russia), while the US never ratified and Canada withdrew in 2011 to avoid penalties. Which BEST captures the fundamental architectural lesson of Kyoto for the design of subsequent climate treaties?", "options": [{"text": "International environmental law cannot succeed without a global police force to enforce penalties.", "isCorrect": false, "rationale": "Most successful environmental treaties (including Montreal Protocol) rely on domestic implementation rather than international police. Kyoto's failure was not enforcement design; it was inadequate participation by major emitters."}, {"text": "A treaty that imposes binding targets on only some major emitters — while developing countries including China, India, and Brazil have no binding obligations — cannot stabilize global atmospheric CO2 concentrations.", "isCorrect": true, "rationale": "Kyoto covered Annex I countries only. As Chinese and Indian emissions grew rapidly through the 2000s, the treaty's coverage became inadequate to address global CO2. Paris responded by requiring NDCs from all parties under one framework."}, {"text": "Carbon markets and emissions trading are fundamentally flawed and should not be part of climate treaty design.", "isCorrect": false, "rationale": "Kyoto's flexibility mechanisms (emissions trading, CDM, JI) had specific implementation problems (additionality failures), but they did generate emission reductions. The architectural lesson is about coverage of major emitters, not about market mechanisms per se."}, {"text": "Climate change cannot be addressed at all through international treaties because national sovereignty always trumps environmental protection.", "isCorrect": false, "rationale": "The Paris Agreement, with universal participation, has demonstrated that international climate cooperation is possible — even if current NDC ambition is insufficient. The lesson from Kyoto is about treaty architecture, not about whether treaties can work."}]}, {"question": "The Paris Agreement's ratchet mechanism requires each successive NDC to \"represent a progression beyond\" the previous one in ambition. The first global stocktake at COP28 (Dubai, 2023) concluded that current NDCs are insufficient, calling for a \"transition away from fossil fuels.\" Which design feature of the Paris Agreement is intended to compensate for the structural weakness that NDC emission targets are not legally binding?", "options": [{"text": "The transparency framework, which requires all parties to report greenhouse gas inventories and progress under a common reporting framework with independent technical expert review for developed countries and peer review for developing countries.", "isCorrect": true, "rationale": "Without binding emission targets, the Paris Agreement relies on transparent measurement, reporting, and verification (MRV) plus peer review to create reputational pressure for compliance and to expose ambition gaps. Combined with the ratchet mechanism and global stocktakes, this is the primary compliance lever."}, {"text": "The Multilateral Fund, which provides financial penalties for missed NDCs.", "isCorrect": false, "rationale": "The Multilateral Fund is a Montreal Protocol mechanism, not a Paris Agreement mechanism. Paris does not impose financial penalties for missed NDCs; that is precisely the structural weakness."}, {"text": "Article 5 grace periods that exempt developing countries from any reduction obligations.", "isCorrect": false, "rationale": "Article 5 is a Montreal Protocol provision, not a Paris one. Paris requires NDCs from all parties, including developing countries, but the NDCs are nationally-determined."}, {"text": "Mandatory carbon trading among Annex I countries.", "isCorrect": false, "rationale": "Mandatory carbon trading was a Kyoto feature. Paris allows voluntary use of internationally transferred mitigation outcomes (Article 6) but does not require it."}]}, {"question": "PRIMARY SOURCE — Principle 15 of the 1992 Rio Declaration codifies the precautionary principle: \"Where there are threats of serious or irreversible damage, lack of full scientific certainty shall not be used as a reason for postponing cost-effective measures to prevent environmental degradation.\" How does this principle apply specifically to the problem of permafrost methane release?", "options": [{"text": "It does not apply, because permafrost feedback is well-understood scientifically and certainty is not lacking.", "isCorrect": false, "rationale": "Permafrost feedback magnitude is among the largest sources of uncertainty in IPCC projections. The current rate of release is documented, but the trajectory of acceleration is not adequately modeled in most scenario calculations."}, {"text": "Permafrost release of CO2 and CH4 represents a potentially irreversible amplifying feedback (1,700 Pg of frozen carbon, ~2x atmospheric burden); under Principle 15, the substantial uncertainty about its trajectory cannot justify postponing emissions-reduction measures, even if precise quantification is unavailable.", "isCorrect": true, "rationale": "Principle 15 directly applies to permafrost: the threat is serious and irreversible (carbon released as CH4 cannot be recaptured), and uncertainty about magnitude or timing cannot be used to postpone action. The principle counsels mitigating warming below tipping-point thresholds even though the exact thresholds are uncertain."}, {"text": "It applies only after the scientific community reaches 100% consensus on permafrost feedback magnitudes.", "isCorrect": false, "rationale": "This contradicts Principle 15. The principle EXPRESSLY states that lack of full scientific certainty shall not be a reason for postponing cost-effective preventive measures."}, {"text": "It supports a 'wait and see' approach until permafrost release reaches at least 1 Pg C per year.", "isCorrect": false, "rationale": "A wait-and-see approach is the opposite of the precautionary principle. Principle 15 supports preventive action under uncertainty, especially where damage would be irreversible."}]}, {"question": "An environmental policy student examines the UNEP Emissions Gap Report (2024) finding that current NDCs put the world on a 2.5-2.9 C warming trajectory by 2100, while the Paris Agreement targets 1.5-2.0 C. Closing the gap to a 1.5 C pathway requires roughly a 42% reduction in global GHG emissions by 2030 relative to 2019 levels. Which of the following BEST evaluates the prospects for closing this ambition gap through Paris's compliance mechanisms?", "options": [{"text": "Peer pressure, market forces, and the ratchet mechanism are the primary compliance drivers; whether they prove sufficient depends on whether the next NDC cycle (2025) delivers substantially deeper reductions, which would require political conditions beyond Paris's control.", "isCorrect": true, "rationale": "Paris's compliance mechanisms are non-binding, so closing the gap depends on factors outside the treaty itself: domestic politics, technological deployment costs, market signals, and reputational concerns. The ratchet mechanism creates a procedural path for raising ambition, but cannot guarantee it."}, {"text": "The Paris Agreement automatically closes the gap because NDCs are legally binding.", "isCorrect": false, "rationale": "NDC emission targets are NOT legally binding. The structural design of Paris is voluntary commitment with transparency review, not enforced compliance."}, {"text": "The gap will close because climate finance flows from developed countries are now sufficient.", "isCorrect": false, "rationale": "The $100 billion/year climate finance target was not met until 2022, and estimates of actual need run into the trillions annually. Climate finance gaps remain substantial."}, {"text": "The Loss and Damage Fund will compensate for any failure to close the gap.", "isCorrect": false, "rationale": "The Loss and Damage Fund (established at COP27, 2022) provides compensation for climate harms to vulnerable countries — it does NOT close the emissions gap. Mitigation and compensation are distinct policy instruments."}]}, {"question": "The Vostok ice-core record (Antarctica) shows that atmospheric CO2 oscillated between approximately 180 ppm (glacial) and 280 ppm (interglacial) over the past 800,000 years. The modern Mauna Loa instrumental record shows CO2 has risen from 315 ppm in 1958 to 422 ppm in 2024. Which interpretation is BEST supported by these data?", "options": [{"text": "The 2024 value of 422 ppm is within the natural glacial-interglacial range, so the current perturbation is not unusual.", "isCorrect": false, "rationale": "The 2024 value of 422 ppm is far above the 280 ppm interglacial maximum observed over 800,000 years. The perturbation is unprecedented in this record."}, {"text": "The 2024 value lies approximately 50% above the natural interglacial maximum (280 ppm), placing the current atmospheric state outside the range observed over 800,000 years of ice-core data — clear evidence that the current perturbation departs from natural variability.", "isCorrect": true, "rationale": "The 422 ppm value represents about a 51% increase over pre-industrial 280 ppm, far above the maximum natural value seen in 800,000 years. This single fact is among the most powerful pieces of empirical evidence that the current trajectory is anthropogenic, not natural."}, {"text": "Ice-core data are unreliable because air bubbles can leak.", "isCorrect": false, "rationale": "Vostok ice-core measurements are highly reliable for past CO2 concentrations, with established techniques for handling bubble enclosure and gas exchange. Multiple independent ice-core records (EPICA, GISP2, etc.) corroborate the Vostok values."}, {"text": "The 2024 value can be attributed entirely to volcanic outgassing.", "isCorrect": false, "rationale": "Annual volcanic CO2 emissions are roughly 1% of anthropogenic emissions. Isotopic analysis (depleted 13C/12C ratio characteristic of fossil-fuel carbon) directly attributes the rise to anthropogenic combustion."}]}, {"question": "The 2022 COP27 in Sharm el-Sheikh established a Loss and Damage Fund for climate-vulnerable developing countries to receive compensation for climate harms beyond what can be adapted to. Why is this provision considered a major breakthrough in equity terms?", "options": [{"text": "Because it eliminates the need for emission reductions by funding compensation instead.", "isCorrect": false, "rationale": "Loss and Damage is not a substitute for mitigation; it addresses the residual harms from warming that cannot be avoided through adaptation, and operates alongside (not in place of) NDC ambition."}, {"text": "It formally acknowledges that climate-vulnerable developing countries will suffer harms beyond what adaptation can address — and that developed countries (responsible for most cumulative emissions) bear a moral obligation to compensate. Funding levels remain far below estimated need, but the principle is established.", "isCorrect": true, "rationale": "Loss and Damage represents a categorical recognition of climate liability that developed countries had resisted for decades. It complements the CBDR-RC principle by translating historical responsibility into compensation obligations, even though current funding falls far short of estimated need."}, {"text": "It mandates legally binding compensation payments enforced by the International Court of Justice.", "isCorrect": false, "rationale": "The Loss and Damage Fund is not legally binding in this sense. It establishes a fund to which developed countries make voluntary contributions; it does not impose ICJ-enforceable obligations."}, {"text": "It applies only to small island states and excludes other vulnerable countries.", "isCorrect": false, "rationale": "Loss and Damage Fund eligibility extends to climate-vulnerable developing countries broadly, though small island developing states (SIDS) have been particularly active in advocating for the mechanism."}]}, {"question": "A student is asked to compare the Kyoto Protocol and Paris Agreement on legal bindingness, coverage of major emitters, and enforcement. Which comparison is MOST accurate?", "options": [{"text": "Kyoto: binding targets but only on Annex I; Paris: voluntary NDCs but covers all major emitters under a single framework. Both rely primarily on domestic implementation rather than international enforcement penalties.", "isCorrect": true, "rationale": "This captures the fundamental trade-off between the two architectures. Kyoto traded binding force for limited coverage; Paris traded binding force for universal coverage. Neither has strong international enforcement penalties — both rely on domestic implementation, transparency, and reputational mechanisms."}, {"text": "Kyoto: voluntary NDCs covering all parties; Paris: binding targets on developed countries only.", "isCorrect": false, "rationale": "This reverses the architectures. Kyoto had binding targets on Annex I; Paris uses voluntary NDCs across all parties."}, {"text": "Both treaties have identical architectures; the only difference is the year adopted.", "isCorrect": false, "rationale": "The Paris Agreement was a deliberate redesign in response to Kyoto's failures. They differ fundamentally in coverage (some vs. all), bindingness (binding vs. voluntary targets), and compliance mechanisms (sanctions vs. ratchet)."}, {"text": "Kyoto has universal participation; Paris was rejected by China and India.", "isCorrect": false, "rationale": "This is reversed. The US never ratified Kyoto and Canada withdrew; China, India, and Brazil had no binding Kyoto targets. The Paris Agreement has 197 parties — including the US (after re-entry), China, India, and EU — making it nearly universal."}]}, {"question": "An APES student writing the synthesis essay traces Science Practice 6 (Mathematical Routines) across the textbook's nine units, ending with pH calculations in Unit 9. Which statement BEST captures the unifying logic of why mathematical routines recur across the entire APES curriculum?", "options": [{"text": "Mathematical routines are arbitrary; the College Board includes them only to make the exam harder.", "isCorrect": false, "rationale": "This is contrary to the design logic. Mathematical routines are pedagogically essential because environmental processes are quantifiable, and quantitative reasoning is required to evaluate scale, rate, and trajectory."}, {"text": "Environmental processes operate at quantitative scales (NPP rates, doubling times, energy conversions, pH on logarithmic scales) that cannot be evaluated qualitatively. Mathematical routines train students to convert verbal claims into measurable predictions and to detect errors of magnitude in policy proposals.", "isCorrect": true, "rationale": "Mathematical routines are central to the APES curriculum because environmental processes are inherently quantitative. NPP, doubling time, ecological footprint, dose-response curves, and pH calculations all require numeric reasoning to be applied correctly. Without math, claims about 'increasing,' 'rising,' or 'declining' cannot be verified."}, {"text": "The mathematical routines are required only for the FRQ section, not multiple choice.", "isCorrect": false, "rationale": "Mathematical routines appear in BOTH MC and FRQ sections. The College Board explicitly tests Science Practice 6 across the full exam."}, {"text": "Each unit's math is unrelated to the others; there is no unifying logic.", "isCorrect": false, "rationale": "The unifying logic is precisely that quantitative reasoning is required to evaluate environmental change at every scale, from cellular metabolism (NPP) to atmospheric chemistry (pH and CO2). The College Board organizes Science Practice 6 to develop this transferable skill."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
