<script>
var QUESTIONS = [{"question": "Earth is often described as a closed system for matter but an open system for energy. Which of the following observations BEST illustrates this asymmetry?", "options": [{"text": "Solar radiation arrives continuously from the sun and is balanced by infrared energy radiated back to space, while the same atoms that built Cambrian trilobites are recycled through living organisms today.", "isCorrect": true, "rationale": "This captures both halves of the asymmetry: energy enters and exits Earth (open energy system), while atoms are essentially neither added nor lost (closed matter system). The trilobite example illustrates that the matter pool is finite and recycled."}, {"text": "Greenhouse gases trap incoming solar radiation while plants release oxygen to the atmosphere through photosynthesis.", "isCorrect": false, "rationale": "This describes two separate processes but does not address the closed-matter / open-energy distinction. Trapping radiation is one part of the energy budget; photosynthesis is part of matter cycling, not the boundary between the two."}, {"text": "Volcanic outgassing adds new carbon to the atmosphere while meteorites add new water to the oceans, both expanding Earth's matter inventory.", "isCorrect": false, "rationale": "These exchanges occur but are negligible at the scale relevant to environmental science. Earth is treated as effectively closed for matter; meteoritic and outgassing additions do not produce a measurable net inflow of matter."}, {"text": "Energy and matter both leave Earth as heat, while only solar radiation arrives from outside.", "isCorrect": false, "rationale": "Matter does not leave Earth as heat. Heat is an energy form. This option conflates the two and misstates the closed-matter principle."}]}, {"question": "Arctic sea ice melts, exposing dark ocean water that absorbs more solar radiation than the reflective ice it replaced. The warmer ocean melts still more ice. Which type of feedback loop is described, and what is its role in system behavior?", "options": [{"text": "A negative feedback loop, because the system eventually returns to equilibrium once all the ice has melted.", "isCorrect": false, "rationale": "Negative feedbacks counteract a perturbation and push systems back toward their original state. The ice-albedo feedback amplifies the original warming rather than counteracting it."}, {"text": "A positive feedback loop that reinforces and accelerates the original change, potentially driving the system away from its baseline state.", "isCorrect": true, "rationale": "Positive feedback loops amplify a perturbation. Each cycle of melting exposes more dark water, which absorbs more radiation, which melts more ice. Such loops can convert small perturbations into large, rapid shifts."}, {"text": "A negative feedback loop, because dark water and reflective ice are opposites and cancel out.", "isCorrect": false, "rationale": "The ice-albedo system reinforces the original perturbation. The contrast between dark water and reflective ice is what drives the amplification, not what cancels it."}, {"text": "A positive feedback loop, but it stabilizes the system because warmer oceans evaporate more water and form clouds that reflect sunlight.", "isCorrect": false, "rationale": "While increased evaporation can produce reflective low clouds (a separate negative feedback), the ice-albedo loop itself is positive and amplifying. Mixing feedbacks misses the question's focus on the ice-albedo mechanism."}]}, {"question": "A forest in dynamic equilibrium adds biomass through photosynthesis at roughly the same rate it loses biomass through respiration and decomposition. What does this scenario illustrate about ecosystem stocks and flows?", "options": [{"text": "The forest's carbon stock is increasing rapidly because photosynthesis dominates respiration.", "isCorrect": false, "rationale": "Dynamic equilibrium means inflows and outflows are roughly balanced, so the stock is not changing rapidly in either direction."}, {"text": "The forest's total carbon stock remains roughly constant because inflows and outflows are balanced, even though atoms continuously move through the system.", "isCorrect": true, "rationale": "Dynamic equilibrium is the defining condition where inflows equal outflows, leaving stock size constant while material continues to flow. Individual trees are born and die, but the total biomass remains stable."}, {"text": "The forest has reached a static state in which no further change is possible.", "isCorrect": false, "rationale": "Dynamic equilibrium is not static. Material continues to flow through the system; only the net stock is stable."}, {"text": "The forest is operating as a closed system for both matter and energy.", "isCorrect": false, "rationale": "No ecosystem is closed for energy; sunlight enters and heat radiates out. Equilibrium describes the balance of flows, not closure."}]}, {"question": "An AP exam question asks: \"Explain how removing wolves from a Yellowstone food web would affect vegetation biomass.\" According to the science-practice guidance in this section, which response would earn full credit?", "options": [{"text": "Vegetation biomass would decrease because wolves protect plants.", "isCorrect": false, "rationale": "This states an outcome with no mechanism. The guidance explicitly notes that naming the mechanism is required for full credit."}, {"text": "Wolves keep ecosystems balanced, so removing them disrupts the system.", "isCorrect": false, "rationale": "This is a vague generality with no causal chain. AP graders require the specific mechanism by which the perturbation propagates."}, {"text": "Without wolves, deer and elk populations rise, leading to higher herbivory pressure on saplings and herbaceous plants, which reduces vegetation biomass and shifts plant community composition.", "isCorrect": true, "rationale": "This response names the mechanism step by step: predator removal increases herbivore population, which raises herbivory rate, which lowers vegetation biomass. The guidance specifically rewards this kind of mechanism-based explanation."}, {"text": "Vegetation biomass would not change because wolves are only one species in the ecosystem.", "isCorrect": false, "rationale": "This contradicts the well-documented trophic cascade observed when wolves were removed (and later reintroduced) in Yellowstone, and ignores the mechanism described in the section."}]}, {"question": "The biosphere extends from roughly 11 km below sea level (deep-ocean trenches) to roughly 15 km above (the upper limit of viable bacterial spores in the stratosphere). Which definition of the biosphere does this describe?", "options": [{"text": "Only the atmosphere where birds and flying insects can survive.", "isCorrect": false, "rationale": "The biosphere is not limited to the atmosphere or to flying organisms. It encompasses every region of Earth where life persists, including deep ocean and surface and subsurface zones."}, {"text": "The sum of all ecosystems on Earth — every region of the planet's surface, water, and lower atmosphere where living organisms exist and interact with their physical surroundings.", "isCorrect": true, "rationale": "This matches the formal definition. The biosphere is the global integration of all ecosystems, defined by where life exists and interacts with abiotic conditions, bounded vertically by where viable organisms have been documented."}, {"text": "Only the regions where humans have established settlements.", "isCorrect": false, "rationale": "Human settlement is irrelevant to the biosphere's extent. The biosphere is defined by the presence of any living organism, not just humans."}, {"text": "The lithosphere alone, since soil organisms are the most abundant form of life.", "isCorrect": false, "rationale": "The biosphere encompasses portions of all four spheres — atmosphere, hydrosphere, lithosphere, and the biological communities themselves — not the lithosphere alone."}]}, {"question": "Forests increase local humidity through transpiration, oyster reefs alter water-flow patterns, and soil organisms convert bedrock to topsoil. These examples support which conceptual claim about biotic and abiotic factors?", "options": [{"text": "Abiotic factors always determine biotic outcomes; the reverse is rare.", "isCorrect": false, "rationale": "Each example shows organisms modifying their abiotic environment, demonstrating that the relationship is bidirectional, not one-way."}, {"text": "Biotic and abiotic factors interact bidirectionally — abiotic conditions shape which organisms can survive, but organisms also modify their abiotic environment.", "isCorrect": true, "rationale": "The examples (forest humidity, oyster reef hydrology, soil formation) all illustrate organisms modifying abiotic conditions. The text explicitly states the relationship is bidirectional."}, {"text": "Biotic factors and abiotic factors are independent and rarely interact.", "isCorrect": false, "rationale": "This contradicts the section's central claim and the cited examples, which show direct biotic-abiotic interaction."}, {"text": "Biotic factors are physical and chemical; abiotic factors are biological.", "isCorrect": false, "rationale": "This inverts the definitions. Biotic factors are living components; abiotic factors are nonliving physical and chemical components."}]}, {"question": "The text states that \"a single nitrogen atom cannot cycle; it requires the coupled biochemistry of nitrogen-fixing bacteria, soil organisms, plant roots, and atmospheric chemistry.\" This passage illustrates which systems-thinking concept?", "options": [{"text": "Residence time, because nitrogen atoms spend different times in different reservoirs.", "isCorrect": false, "rationale": "Residence time is a separate concept relating to how long matter stays in a reservoir. The quote concerns whether cycling itself is possible from a single component, not duration."}, {"text": "Negative feedback, because the system stabilizes itself.", "isCorrect": false, "rationale": "Negative feedback describes a stabilizing causal loop. The quote is about whether a single component can perform a system function, not about stabilization."}, {"text": "Emergent properties — characteristics of a whole system that none of its individual parts possess.", "isCorrect": true, "rationale": "The nitrogen cycle is a property of the whole network of organisms, soil, and atmosphere. No single atom or organism cycles nitrogen; the cycling property emerges only from the coupled system."}, {"text": "Dynamic equilibrium, because nitrogen flows are balanced.", "isCorrect": false, "rationale": "Dynamic equilibrium describes balanced inflows and outflows. The quote is about the impossibility of a single atom performing what the system as a whole accomplishes."}]}, {"question": "A student writes: \"Ice melts because it warms.\" According to the science-practice guidance, why does this statement fail to earn AP credit, and what would correct it?", "options": [{"text": "It fails because it does not name the mechanism. A full-credit answer would identify that absorbed solar radiation exceeds the melting point, exposing dark water that absorbs more radiation, further raising ocean temperature.", "isCorrect": true, "rationale": "AP graders require the mechanism — the specific causal chain — not a description of the outcome. The guidance gives the exact contrast between insufficient and full-credit answers."}, {"text": "It fails because the statement is factually incorrect; ice does not melt from warming.", "isCorrect": false, "rationale": "Warming is in fact a proximate cause of ice melt. The problem is the absence of mechanism, not factual error."}, {"text": "It fails because it does not include a specific year or location.", "isCorrect": false, "rationale": "AP rubrics do not require a year or location. They require the causal mechanism."}, {"text": "It fails because it does not include a feedback loop, which is required for all AP responses.", "isCorrect": false, "rationale": "Not all AP responses require feedback loops. The general requirement is naming the mechanism, which may or may not involve a feedback."}]}, {"question": "A stock has a starting value of 1,000 units. Inflows total 200 units per year and outflows total 250 units per year, both held constant. What is the stock's behavior over time, and which systems concept best describes the resulting state?", "options": [{"text": "The stock will stay constant because outflow and inflow are both significant; this is dynamic equilibrium.", "isCorrect": false, "rationale": "Dynamic equilibrium requires inflow to equal outflow, not merely both to be significant. With outflow exceeding inflow, the stock declines."}, {"text": "The stock will grow indefinitely because both flows are positive numbers; this is a positive feedback loop.", "isCorrect": false, "rationale": "Inflow being positive is not the criterion for stock growth — only inflow exceeding outflow causes growth. And feedback loops describe causal coupling, not flow arithmetic."}, {"text": "The stock will decline at a net rate of 50 units per year, illustrating an imbalance where outflows exceed inflows; this is a system out of equilibrium.", "isCorrect": true, "rationale": "Stock change equals inflow minus outflow. With outflow exceeding inflow by 50 units/yr, the stock falls steadily. The system is not in dynamic equilibrium because flows are not balanced."}, {"text": "The stock will oscillate because feedback loops always cause oscillation.", "isCorrect": false, "rationale": "Constant flows produce monotonic change, not oscillation. Oscillation requires a different feedback mechanism (such as a delay)."}]}, {"question": "Which of the following BEST captures why systems thinking — rather than reductionist analysis of individual species — is essential to environmental science?", "options": [{"text": "Reducing environmental science to individual species or individual chemicals always misses something important, because emergent properties of the whole system arise from interactions that no part possesses on its own.", "isCorrect": true, "rationale": "This is the central justification given in the section: emergent properties (climate regulation, nitrogen cycling, ecosystem stability) cannot be understood by examining parts in isolation."}, {"text": "Individual species are unimportant; only chemical reactions matter at the system level.", "isCorrect": false, "rationale": "The text does not dismiss individual species. It says reductionism alone misses emergent properties — both species and processes are needed, in their interactions."}, {"text": "Systems thinking is preferred because it does not require quantitative measurement, unlike reductionist methods.", "isCorrect": false, "rationale": "Systems thinking is highly quantitative — stocks, flows, and feedback loops are formally defined. The text introduces them as borrowed from systems analysis, a quantitative discipline."}, {"text": "Systems thinking is required only for global problems like climate change, not for local issues.", "isCorrect": false, "rationale": "The section repeatedly applies systems thinking at local scales (Yellowstone wolves, forest equilibrium, deer populations), so this answer contradicts the section's framing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
