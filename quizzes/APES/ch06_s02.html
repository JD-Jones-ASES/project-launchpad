<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Coal, Oil, and Natural Gas — Extraction and Combustion</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A central Appalachian coalfield is mined by blasting off entire ridge summits and pushing the resulting debris into adjacent stream hollows. Which extraction method is being used, and what is its primary environmental signature?", "options": [{"text": "Longwall mining; surface subsidence above the mined panel.", "isCorrect": false, "rationale": "Longwall mining is an underground method that uses a shearing machine on a long coal face; subsidence is its trademark, but blasting ridge tops is a surface method, not longwall."}, {"text": "Mountaintop removal mining (MTR); valley fill burying headwater streams plus acid mine drainage from oxidized sulfur-bearing rock.", "isCorrect": true, "rationale": "MTR blasts off ridge summits and dumps the debris (valley fill) into adjacent hollows. More than 500 Appalachian mountaintops have been altered since the 1970s. Exposed sulfur-bearing rock oxidizes, creating acid mine drainage (pH sometimes <3) that mobilizes heavy metals into waterways."}, {"text": "Room-and-pillar mining; recoverable fraction limited to 40-60%.", "isCorrect": false, "rationale": "Room-and-pillar is an underground method that leaves rectangular coal pillars supporting the roof. It does not blast off ridge summits."}, {"text": "Hydraulic fracturing; flowback water containing radioactive material.", "isCorrect": false, "rationale": "Fracking targets oil and gas in shale, not surface coal extraction. Flowback water is a fracking concern, not an MTR concern."}]}, {"question": "Hydraulic fracturing injects a fluid mixture into shale at pressures above 70 MPa to create permeability. What is the approximate composition of the injected fluid, and what role does each major component play?", "options": [{"text": "Water (~50%), drilling mud (~40%), and proppant (~10%); the mud lubricates the bit while the proppant cools the wellbore.", "isCorrect": false, "rationale": "Drilling mud is used during drilling, not during fracturing. Fracking fluid is dominated by water and sand, not mud."}, {"text": "Water (~90%), sand proppant (8-9%), and chemical additives (<1%) including friction reducers, biocides, and scale inhibitors. Water creates fractures; sand props them open; additives manage flow and microbial growth.", "isCorrect": true, "rationale": "The text specifies water ~90%, sand proppant 8-9%, and chemical additives <1%. Water provides the hydraulic force to fracture rock; sand grains lodge in the fractures and keep them open after pressure is released; additives reduce friction, kill microbes, and prevent scaling."}, {"text": "Hydrochloric acid (~80%) with diesel fuel (~20%); the acid dissolves shale and the diesel reduces friction.", "isCorrect": false, "rationale": "Acid stimulation is a separate well-completion technique used in carbonate reservoirs; it is not the primary fracking fluid in shale, which is water-dominated."}, {"text": "Nitrogen gas (~95%) with steam (~5%); the gas displaces oil while the steam reduces viscosity.", "isCorrect": false, "rationale": "Nitrogen and steam are used in some enhanced oil recovery contexts (for example tar sands SAGD uses steam) but not in standard shale hydraulic fracturing."}]}, {"question": "A debate over whether natural gas is a 'clean' fossil fuel must consider methane leakage during extraction. Approximately how much more potent is methane than CO2 as a greenhouse gas over a 20-year horizon, and what is the typical estimated leakage rate from fracking operations?", "options": [{"text": "Methane is about 5x more potent than CO2; leakage is generally below 0.1% of production.", "isCorrect": false, "rationale": "Methane is far more potent than 5x CO2 over 20 years. Estimated leakage rates are typically in the 1-4% range, not below 0.1%."}, {"text": "Methane is approximately 80x more potent than CO2 over 20 years; estimated fugitive emissions from fracking range from about 1-4% of production.", "isCorrect": true, "rationale": "The text gives the 80x 20-year potency factor and the 1-4% leakage range. This range has large policy implications because at the high end of leakage, natural gas can lose much of its CO2-emissions advantage over coal on a lifecycle basis."}, {"text": "Methane is about half as potent as CO2; leakage is irrelevant.", "isCorrect": false, "rationale": "Methane is far more potent than CO2 on short time horizons. Leakage is not irrelevant — it is one of the central reasons natural gas is not unambiguously 'clean.'"}, {"text": "Methane has the same potency as CO2 because both are simple molecules; leakage exceeds 50%.", "isCorrect": false, "rationale": "Methane is roughly 80x more potent than CO2 over 20 years (different chemistry, different IR absorption). Leakage rates of 50% would render natural gas worse than coal on a lifecycle basis; documented rates are 1-4%."}]}, {"question": "A 500 MW coal-fired power plant operating at 33% efficiency burns bituminous coal with energy density 24 MJ/kg. Approximately how much coal does it consume per hour?", "options": [{"text": "About 75 tonnes/hr.", "isCorrect": false, "rationale": "This underestimates the heat input. The plant needs ~5.45 x 10^6 MJ/hr of heat input, requiring ~227 tonnes/hr of bituminous coal at 24 MJ/kg, not 75."}, {"text": "About 227 tonnes/hr.", "isCorrect": true, "rationale": "Step 1: 500 MW for 1 h = 500 MWh = 1.80 x 10^6 MJ output. Step 2: At 33% efficiency, heat input = 1.80 x 10^6 / 0.33 = 5.45 x 10^6 MJ. Step 3: Coal mass = 5.45 x 10^6 MJ / 24 MJ/kg = 2.27 x 10^5 kg/hr ≈ 227 tonnes/hr."}, {"text": "About 1,000 tonnes/hr.", "isCorrect": false, "rationale": "This overestimates by a factor of 4. The correct calculation gives ~227 tonnes/hr, not 1,000."}, {"text": "About 1.8 million tonnes/hr.", "isCorrect": false, "rationale": "1.8 million tonnes/yr is the correct annual figure (assuming 8,000 operating hours), not the hourly figure. Per hour the plant burns ~227 tonnes."}]}, {"question": "Which fossil fuel produces the most CO2 per unit of energy released, and why?", "options": [{"text": "Natural gas, because methane is a heavy molecule with high carbon content.", "isCorrect": false, "rationale": "Methane (CH4) has the highest hydrogen-to-carbon ratio of any fossil fuel, so it produces the least CO2 per unit of energy, not the most."}, {"text": "Coal, because coal has the lowest hydrogen-to-carbon ratio of the three fossil fuels.", "isCorrect": true, "rationale": "Coal is dominantly carbon with relatively little hydrogen. Combustion of carbon releases CO2; combustion of hydrogen releases H2O. With less hydrogen to convert to water, more of the energy comes from oxidizing carbon, so coal emits the most CO2 per unit of energy. Oil is intermediate; natural gas (CH4) emits the least."}, {"text": "All three fossil fuels produce identical CO2 per unit of energy because they are all hydrocarbons.", "isCorrect": false, "rationale": "Hydrogen-to-carbon ratio varies substantially among fuels. Coal is dominated by carbon; methane has 4 hydrogens per carbon. CO2 emissions per MJ differ accordingly."}, {"text": "Crude oil, because oil is denser than coal.", "isCorrect": false, "rationale": "Density is not the determinant; hydrogen-to-carbon ratio is. Oil falls between coal and gas in CO2 per unit energy."}]}, {"question": "Which atmospheric pollutant is primarily emitted from coal combustion, reacts with water vapor to form sulfuric acid, and is the main driver of acid deposition?", "options": [{"text": "Mercury (Hg).", "isCorrect": false, "rationale": "Coal combustion does emit trace mercury, which deposits into water bodies and is converted to neurotoxic methylmercury. But mercury is not the driver of acid deposition; sulfur dioxide is."}, {"text": "Sulfur dioxide (SO2), produced when sulfur impurities in coal are oxidized; coal combustion is the world's largest single source.", "isCorrect": true, "rationale": "SO2 reacts with atmospheric water vapor to form H2SO4 (sulfuric acid), the primary driver of acid deposition. Coal combustion is the largest single source of SO2 globally."}, {"text": "Carbon dioxide (CO2).", "isCorrect": false, "rationale": "CO2 is the primary greenhouse gas product, but it is not the driver of acid deposition. SO2 (forming sulfuric acid) is."}, {"text": "Particulate matter PM2.5.", "isCorrect": false, "rationale": "PM2.5 is associated with cardiovascular and respiratory mortality but is not the precursor of sulfuric acid in acid deposition. SO2 is the relevant pollutant."}]}, {"question": "On 20 April 2010, the Deepwater Horizon rig experienced a blowout in the Macondo Prospect. What was the immediate trigger, and approximately how much oil was ultimately released?", "options": [{"text": "An earthquake severed the wellhead; ~1 million barrels were released.", "isCorrect": false, "rationale": "The trigger was a misinterpreted negative-pressure test, not an earthquake. The release was ~4.9 million barrels, not 1 million."}, {"text": "A negative-pressure test was misinterpreted as successful, allowing high-pressure oil and gas to surge up the drill string and overwhelm the blowout preventer; approximately 4.9 million barrels (~779 million liters) were released over 87 days.", "isCorrect": true, "rationale": "The text describes the misread negative-pressure test, the BOP shear-ram failure, the rig fire and sinking, the 87-day uncontrolled flow, and the ~4.9 million barrels released. This was the largest accidental marine oil spill in US history."}, {"text": "A hurricane forced an emergency shutdown; ~50,000 barrels were released.", "isCorrect": false, "rationale": "The blowout occurred from a misinterpreted pressure test, not a hurricane. The release was ~4.9 million barrels."}, {"text": "A torpedo strike during a security incident; ~4.9 million barrels were released.", "isCorrect": false, "rationale": "There was no security incident. The blowout resulted from a misinterpreted negative-pressure test and a failed BOP."}]}, {"question": "Bitumen in Canadian oil sands is too viscous to flow at reservoir conditions. Which extraction method targets deposits within 70 m of the surface, and which is used for deeper deposits?", "options": [{"text": "Hydraulic fracturing for shallow deposits; conventional vertical wells for deep deposits.", "isCorrect": false, "rationale": "Fracking is used for shale gas and tight oil, not bitumen. Conventional vertical wells cannot extract bitumen because it does not flow at reservoir conditions."}, {"text": "Open-pit strip mining for shallow deposits within ~70 m; steam-assisted gravity drainage (SAGD), which injects steam to reduce bitumen viscosity, for deeper deposits.", "isCorrect": true, "rationale": "The text specifies that shallow Athabasca bitumen (within 70 m) is mined open-pit, while deeper deposits are extracted via SAGD, which injects steam into the formation. Steam reduces bitumen viscosity so it can be pumped, but this requires substantial natural-gas energy input."}, {"text": "Mountaintop removal for shallow deposits; underground room-and-pillar for deep deposits.", "isCorrect": false, "rationale": "MTR and room-and-pillar are coal extraction methods, not bitumen extraction methods."}, {"text": "Steam injection for shallow deposits; horizontal drilling for deep deposits.", "isCorrect": false, "rationale": "This reverses the actual setting. Shallow bitumen is open-pit mined; deeper deposits use SAGD steam injection."}]}, {"question": "Why are oil sands operations approximately twice as CO2-intensive per barrel of finished fuel as conventional oil?", "options": [{"text": "Oil sands contain twice as much sulfur as conventional crude.", "isCorrect": false, "rationale": "Sulfur content does not determine CO2 emissions per barrel. The difference comes from the energy required for extraction and upgrading bitumen to synthetic crude."}, {"text": "Bitumen extraction (open-pit or SAGD) and upgrading to synthetic crude require large additional energy inputs — primarily from natural gas — that are not needed for conventional crude.", "isCorrect": true, "rationale": "Bitumen does not flow at reservoir conditions, so steam-assisted gravity drainage requires burning substantial natural gas to generate steam. Upgrading the highly viscous bitumen to a refinable synthetic crude consumes additional energy. The Athabasca region is one of North America's largest single anthropogenic CO2 sources for these reasons."}, {"text": "Bitumen contains twice as much carbon per molecule as crude oil.", "isCorrect": false, "rationale": "All hydrocarbons have similar C content per unit mass. The CO2-intensity gap comes from the energy used to extract and upgrade bitumen, not from carbon content alone."}, {"text": "Oil sands operations release twice as much methane per barrel.", "isCorrect": false, "rationale": "Methane leakage is more associated with shale gas extraction. The doubled CO2 intensity in oil sands stems from natural-gas-fired steam and upgrading energy."}]}, {"question": "Economists describe market prices for fossil fuels as failing to capture their true social cost. What term applies to the unpriced damages, and what policy mechanisms attempt to internalize them?", "options": [{"text": "Subsidies; Pigouvian taxes correct subsidies.", "isCorrect": false, "rationale": "Subsidies actively reduce price below cost; the unpriced damages from emissions are externalities, which Pigouvian taxes can address. The terminology distinction matters here."}, {"text": "Negative externalities (healthcare costs, ecosystem damage, climate damages); carbon taxes and cap-and-trade systems internalize them by making polluters pay a portion of the external cost.", "isCorrect": true, "rationale": "Economists call the unpriced social costs of pollution and emissions negative externalities. The market price of fossil fuels fails to reflect them, leading to systematic over-consumption. Carbon taxes and cap-and-trade are the standard policy levers to bring price closer to true social cost."}, {"text": "Positive externalities; rebates increase fossil fuel consumption to capture them.", "isCorrect": false, "rationale": "The damages from fossil fuel combustion are negative, not positive, externalities. Rebates would worsen the market failure, not correct it."}, {"text": "Trade deficits; tariffs internalize them.", "isCorrect": false, "rationale": "Trade deficits and tariffs are unrelated to the externality framing of fossil-fuel damages. Carbon taxes and cap-and-trade are the relevant tools."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
