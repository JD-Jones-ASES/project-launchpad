<script>
var QUESTIONS = [{"question": "Which sequence correctly orders the EPA's solid waste hierarchy from most preferred to least preferred management strategy?", "options": [{"text": "Source reduction → reuse → recycling → composting → combustion with energy recovery → landfilling.", "isCorrect": true, "rationale": "The hierarchy encodes a thermodynamic principle: the earlier a waste is intercepted, the more of its embodied energy and materials are conserved and the less pollution is generated. Source reduction prevents waste at the design stage and conserves the most. Reuse keeps the product whole. Recycling requires reprocessing energy. Composting biologically converts organics. Combustion with energy recovery extracts thermal value but destroys the materials. Landfilling, last, squanders all embodied value and creates long-term contamination liability."}, {"text": "Recycling → reuse → source reduction → landfilling → composting → combustion.", "isCorrect": false, "rationale": "Recycling is commonly perceived as the 'best' solution, but the hierarchy ranks source reduction and reuse above it because reprocessing still consumes energy and materials. The ordering shown is incorrect."}, {"text": "Landfilling → combustion → composting → recycling → reuse → source reduction.", "isCorrect": false, "rationale": "This is the reverse of the actual hierarchy. Landfilling is the last resort, not the first."}, {"text": "Combustion with energy recovery → landfilling → recycling → composting → reuse → source reduction.", "isCorrect": false, "rationale": "The correct hierarchy puts source reduction first, not last. Energy recovery from combustion is fifth in the priority order."}]}, {"question": "Why is source reduction ranked above recycling in the EPA's solid waste hierarchy, even though recycling is widely perceived as the most environmentally preferable strategy?", "options": [{"text": "Source reduction is the preferred strategy because recycling is illegal in most US states.", "isCorrect": false, "rationale": "Recycling is legal and encouraged in every US state; the relative ranking is a thermodynamic and lifecycle judgment, not a legal one."}, {"text": "Recycling still requires energy and materials to collect, sort, transport, and reprocess waste; source reduction prevents the waste from being generated at all, conserving more embodied energy and materials and producing less pollution at every step of the lifecycle.", "isCorrect": true, "rationale": "Recycling is preferable to disposal but inferior to never generating the waste. Designing products to use less material, last longer, and contain fewer hazardous components saves the embodied energy and pollution of every downstream stage. A glass bottle never made requires no melting, no transport, no sorting; recycling reduces but cannot eliminate those costs."}, {"text": "Recycling produces toxic waste while source reduction does not.", "isCorrect": false, "rationale": "Recycling does not inherently produce toxic waste; the issue is the hierarchy's lifecycle accounting. Source reduction is preferred because it conserves more, not because recycling is toxic."}, {"text": "Source reduction is required by federal law; recycling is voluntary.", "isCorrect": false, "rationale": "Source reduction is not federally mandated, and recycling is voluntary in most jurisdictions. The hierarchy ranks them by lifecycle benefits, not legal status."}]}, {"question": "A modern sanitary landfill differs fundamentally from the open dumps that preceded the 1970s. Which engineered features must a sanitary landfill incorporate under RCRA Subtitle D, and what specific environmental risk does each address?", "options": [{"text": "Composite liner (clay + HDPE membrane), leachate collection pipes, daily soil cover, and methane capture; liner and collection prevent groundwater contamination by leachate, daily cover suppresses pests and odors, and methane capture reduces greenhouse gas emissions and explosion risk.", "isCorrect": true, "rationale": "Modern sanitary landfills are engineered to address each of the dominant disposal-site environmental risks: leachate (contaminated liquid percolating through waste) is intercepted by the composite liner and collected through perforated pipes for treatment, preventing aquifer contamination; daily cover suppresses vector animals and odors; and the methane gas collection system captures CH₄ generated by anaerobic decomposition, converting a potent greenhouse gas to electricity (or at least flaring it). Even with these controls, landfills remain the third-largest source of anthropogenic US methane emissions."}, {"text": "A single cement liner only; modern landfills do not require leachate collection or methane capture.", "isCorrect": false, "rationale": "A composite liner (clay plus HDPE membrane) is the regulatory standard, leachate collection is required, and methane capture is required for landfills above defined size thresholds."}, {"text": "Air filtration only; modern landfills are above-ground sealed structures with no soil interaction.", "isCorrect": false, "rationale": "Sanitary landfills are below-grade engineered cells; soil and groundwater interactions are precisely what the composite liner and leachate collection are designed to manage."}, {"text": "Chemical neutralization tanks at the perimeter; the landfill itself requires no liner.", "isCorrect": false, "rationale": "There is no perimeter neutralization mechanism; the engineering is at the base of the cell (composite liner, leachate collection) and the cap (cover, gas capture)."}]}, {"question": "Compare RCRA's regulatory approach to CERCLA's. What specific gap in RCRA's coverage does CERCLA address, and what legal mechanism does it use to ensure that polluters rather than taxpayers bear cleanup costs?", "options": [{"text": "RCRA covers only ongoing waste generation through cradle-to-grave manifest tracking from 1976 forward; CERCLA addresses the gap of legacy contamination from before RCRA's enactment by imposing strict, joint-and-several liability on potentially responsible parties (PRPs) — current owners, past owners, generators, and transporters — for cleanup costs at sites listed on the National Priorities List.", "isCorrect": true, "rationale": "RCRA created the cradle-to-grave manifest system in 1976 but cannot compel cleanup of contamination caused before that date. CERCLA (1980) fills that gap with strict liability (fault is irrelevant), joint-and-several liability (a single PRP can be held responsible for the entire cleanup cost), and retroactive application. The polluter-pays principle is the conceptual basis: those who profit from activities that generate hazardous waste internalize the social cost rather than passing it to taxpayers."}, {"text": "RCRA and CERCLA cover the same legal territory; CERCLA is just a renamed version of RCRA.", "isCorrect": false, "rationale": "RCRA and CERCLA address fundamentally different questions: RCRA prevents new contamination through forward-looking waste-handling controls; CERCLA cleans up legacy contamination from past disposal."}, {"text": "RCRA addresses legacy contamination only; CERCLA covers ongoing waste generation.", "isCorrect": false, "rationale": "This reverses the actual coverage. RCRA is forward-looking (cradle-to-grave for new waste); CERCLA is retrospective (legacy contamination)."}, {"text": "Both statutes rely entirely on voluntary corporate cleanup; neither uses liability provisions.", "isCorrect": false, "rationale": "CERCLA's strict, joint-and-several liability is the heart of its enforcement architecture; corporate participation is compelled, not voluntary, in most NPL site cleanups."}]}, {"question": "Trace the causal chain connecting the Love Canal contamination to the passage of CERCLA, identifying at least THREE actors and their roles.", "options": [{"text": "(1) Hooker Chemical Company — buried 21,000 metric tons of dioxins and chlorinated solvents into a former canal between 1942 and 1953 and sold the property for $1 to the Niagara Falls Board of Education with deeded notice. (2) Lois Gibbs — homeowner whose son attended the elementary school built on the site, organized the Love Canal Homeowners Association in 1978, conducted door-to-door canvassing, and forced national media attention. (3) President Carter — declared a federal health emergency in 1978 and again in 1980, authorized evacuation of nearly 1,000 households, and signed CERCLA in December 1980.", "isCorrect": true, "rationale": "These are the three canonical actors in the AP-tested chain: a corporate generator of legacy hazardous waste (Hooker Chemical), a community organizer whose grassroots mobilization forced the political crisis (Lois Gibbs and the Homeowners Association), and a federal executive whose emergency declarations and signature on CERCLA closed the loop. Other significant actors include New York State Health Department officials, EPA administrator Douglas Costle, and journalists who covered the story nationally."}, {"text": "Only the EPA was involved; Love Canal was a regulatory response with no role for community residents.", "isCorrect": false, "rationale": "The defining lesson of Love Canal is precisely the opposite — that community organizing by Lois Gibbs forced a regulatory response that technical reports alone had not prompted. Citizen science and grassroots mobilization are central to the case."}, {"text": "Hooker Chemical voluntarily cleaned up the site before residents learned of contamination; CERCLA was passed for reasons unrelated to Love Canal.", "isCorrect": false, "rationale": "Hooker Chemical did not voluntarily clean up the site; remediation was compelled by federal action after years of community pressure. CERCLA passed in December 1980, weeks after the second federal evacuation, and Love Canal is the canonical motivating event."}, {"text": "Love Canal was a federal nuclear test site; CERCLA addresses radiation rather than chemical waste.", "isCorrect": false, "rationale": "Love Canal was a chemical waste site (dioxins, chlorinated solvents), not a nuclear site. CERCLA addresses chemical hazardous waste primarily, though it can apply to radioactive contamination in some contexts."}]}, {"question": "A POTW receives raw municipal sewage with BOD₅ = 250 mg/L and total suspended solids (TSS) = 240 mg/L. After primary treatment, BOD₅ ≈ 175 mg/L and TSS ≈ 160 mg/L. After secondary treatment, BOD₅ ≈ 12 mg/L and TSS ≈ 12 mg/L. The receiving water has a TMDL for nitrogen and phosphorus. Which statement correctly characterizes treatment levels and identifies the next required step?", "options": [{"text": "Primary removed ~30% BOD/TSS by physical settling; secondary removed ~85-95% BOD/TSS through aerobic biological decomposition (activated sludge). Tertiary treatment is required to remove nitrogen and phosphorus before discharge to the TMDL-regulated water body.", "isCorrect": true, "rationale": "Primary treatment uses bar screens and settling tanks (clarifiers) to remove ~30-40% of TSS and ~30% of BOD by physical settling. Secondary treatment uses aerobic microorganisms (activated sludge process) to decompose dissolved and colloidal organic matter, achieving 85-95% BOD and TSS reduction. Secondary is the minimum legally required standard for US POTWs under the CWA. When the receiving water has a TMDL for nutrients, tertiary treatment — biological nutrient removal, membrane filtration, UV disinfection, activated carbon — must be added to remove nitrogen and phosphorus."}, {"text": "Primary removed BOD biologically; secondary added bar screens; the plant has met all requirements with no further treatment needed.", "isCorrect": false, "rationale": "This reverses the order: primary is physical (bar screens, settling), and secondary is biological. Bar screens are part of primary, not added in secondary. Also, the presence of a TMDL means tertiary treatment is required."}, {"text": "Primary and secondary treatment together remove all nutrients; tertiary treatment is unnecessary.", "isCorrect": false, "rationale": "Secondary treatment achieves 85-95% BOD and TSS reduction but does not effectively remove nitrogen or phosphorus. Tertiary treatment is precisely the stage that targets nutrients."}, {"text": "All three stages are biological; physical processes are not used in modern POTWs.", "isCorrect": false, "rationale": "Primary treatment is physical (bar screens, gravity settling). Secondary treatment is biological (activated sludge or trickling filters). Tertiary treatment can include physical (membrane filtration), biological (denitrification, biological P removal), and chemical (alum precipitation, UV) processes."}]}, {"question": "E-waste is the fastest-growing solid waste stream globally, with approximately 50 million metric tonnes generated annually. Why is the high economic value of materials in e-waste (gold, silver, copper, palladium) NOT sufficient to ensure environmentally sound recycling?", "options": [{"text": "Formal recycling using certified smelters is more expensive than informal processing in low-income countries, where workers — including children — burn circuit boards and cables to recover metals, releasing dioxins, furans, and heavy metals into air and soil. Only ~20% of global e-waste is formally recycled; the rest is exported (legally or illegally) under loopholes such as the 'second-hand goods' classification, despite the 1989 Basel Convention.", "isCorrect": true, "rationale": "Even though e-waste contains valuable recoverable metals, the cost differential between certified recycling (with environmental controls) and informal recovery is large enough that informal processing dominates globally. Sites like Agbogbloshie in Ghana have been documented for blood-lead levels far exceeding WHO guidelines among workers, including children. The Basel Convention (1989) restricts export of hazardous waste from industrialized to developing countries, but the 'second-hand goods' loophole was widely exploited until 2019 amendments closed some of the gaps."}, {"text": "Material values are too low to justify any recycling; e-waste should always be landfilled.", "isCorrect": false, "rationale": "E-waste contains gold, silver, copper, and palladium at concentrations orders of magnitude above those in mined ore — the values are not the limiting factor. The issue is environmentally sound recovery versus informal processing."}, {"text": "All e-waste is now formally recycled because the Basel Convention bans informal processing entirely.", "isCorrect": false, "rationale": "Only ~20% of global e-waste is formally recycled; the Basel Convention does not eliminate informal processing, particularly given the second-hand goods loophole that persisted until 2019 amendments."}, {"text": "E-waste contains no hazardous materials, so any recycling method is safe.", "isCorrect": false, "rationale": "E-waste contains lead solder, cadmium, mercury, brominated flame retardants, and PVC plastics — all hazardous when released through informal burning."}]}, {"question": "A property buyer purchases an industrial site that was contaminated by previous owners decades ago. Under CERCLA's strict, joint-and-several liability framework, can the new owner be held liable for cleanup costs even though they had no role in the original contamination? What defense exists?", "options": [{"text": "Yes — current ownership alone can trigger CERCLA liability for pre-purchase contamination. The 'innocent landowner' defense is available if the buyer conducted 'all appropriate inquiry' before purchase and had no knowledge of contamination; otherwise, current ownership exposes the buyer to liability for the entire cleanup cost.", "isCorrect": true, "rationale": "CERCLA Section 107 lists current owners and operators among those who can be held strictly, jointly, and severally liable for cleanup costs. The 'innocent landowner' defense — the buyer must conduct 'all appropriate inquiry' (typically a Phase I/II environmental site assessment) before purchase — was added to mitigate this harshness. The economic effect is to encourage rigorous environmental due diligence before any industrial property transaction. In practice, this is one of the central reasons for the Phase I environmental site assessment industry."}, {"text": "No — CERCLA exempts new owners from all liability for pre-purchase contamination automatically.", "isCorrect": false, "rationale": "There is no automatic exemption. The innocent landowner defense requires affirmative due diligence; without it, current ownership triggers liability."}, {"text": "Yes — but only if the new owner explicitly assumed environmental liability in the purchase contract.", "isCorrect": false, "rationale": "CERCLA's statutory liability does not require contractual assumption; current ownership alone is sufficient under the statute."}, {"text": "No — only the original polluter can ever be held liable, even if they no longer exist as a legal entity.", "isCorrect": false, "rationale": "If the original polluter no longer exists, joint-and-several liability allows EPA to pursue any remaining PRP — current owners included — to the extent of their liability. This is a deliberate policy choice to ensure cleanups are funded."}]}, {"question": "The Cuyahoga River fire of 1969 became a 'focusing event' that catalyzed the founding of EPA and passage of the Clean Water Act. Which BEST explains why this particular fire — among at least 13 fires on the same river since 1868 — generated the political momentum needed for major environmental legislation?", "options": [{"text": "The 1969 fire was the largest and most destructive in the river's history.", "isCorrect": false, "rationale": "The 1969 fire was actually smaller than the worst fire on the Cuyahoga (1952), which caused much greater property damage. The 1969 fire's significance is political and media-driven, not magnitude-driven."}, {"text": "Vivid, shareable imagery in Time magazine (using the 1952 photo with the 1969 story) and the inherent absurdity of a river catching fire converted normalized chronic pollution into a political emergency. The fire became a symbol of the failure of a regulatory regime that treated water bodies as free industrial sewers, generating the public outrage that produced the EPA (1970) and the CWA (1972).", "isCorrect": true, "rationale": "The 1969 Cuyahoga fire is a canonical example of a 'focusing event' — environmental disasters that generate vivid, shareable imagery shift public opinion and political will faster than years of scientific reports. The Time magazine photograph (technically of the worse 1952 fire) and the absurd image of a river burning crystallized accumulated frustration into political momentum that drove EPA's founding and the 1972 Clean Water Act. The lesson: chronic pollution can be normalized for decades until a focusing event forces a reaction."}, {"text": "The 1969 fire caused the river to permanently disappear; CWA was passed to restore it.", "isCorrect": false, "rationale": "The Cuyahoga did not disappear; it continues to flow through Cleveland and now supports fishing, kayaking, and a national park."}, {"text": "The 1969 fire was caused by intentional sabotage by environmentalists to push the CWA through Congress.", "isCorrect": false, "rationale": "There is no evidence the fire was intentional or staged. It was caused by accumulated industrial debris and oil on the water surface ignited by sparks from passing trains."}]}, {"question": "A small business contributed only a few percent of the total waste at a multi-party Superfund site. Under CERCLA's joint-and-several liability framework, can EPA hold this small contributor liable for the entire cleanup cost? What policy rationale and what practical mitigation exist?", "options": [{"text": "Yes, under joint-and-several liability EPA can hold any single PRP responsible for the entire cleanup cost regardless of their share. The policy rationale is to ensure cleanups proceed even when major contributors are insolvent or unidentifiable, putting the cost on parties whose activities generated the waste rather than on taxpayers. In practice, EPA often enters into settlement agreements with smaller contributors at reduced shares (de minimis settlements), and PRPs commonly seek contribution from one another through litigation to allocate costs.", "isCorrect": true, "rationale": "Joint-and-several liability is a deliberate policy choice. The rationale: when contamination at a multi-party site cannot be cleanly apportioned among contributors, holding any one PRP fully liable ensures cleanup proceeds and forces PRPs to settle the apportionment among themselves rather than placing the burden on taxpayers. The practical mitigations are de minimis settlements (small contributors pay reduced amounts) and CERCLA's contribution provisions (Section 113), which allow PRPs to sue one another to allocate costs. Critics argue this can be inequitable, but the alternative — proportional liability — would often leave sites unremediated when major contributors are insolvent."}, {"text": "No — under CERCLA, every PRP pays only an exact percentage of cleanup costs proportional to their waste contribution.", "isCorrect": false, "rationale": "CERCLA's strict liability is joint-and-several, not strictly proportional. Proportional allocation occurs through subsequent contribution litigation among PRPs, not at the EPA-enforcement stage."}, {"text": "No — small contributors are categorically exempt from CERCLA liability by statute.", "isCorrect": false, "rationale": "There is no categorical small-contributor exemption. De minimis settlements are negotiated remedies, not statutory exemptions."}, {"text": "Yes — but EPA cannot pursue any party except the most recent owner.", "isCorrect": false, "rationale": "CERCLA Section 107 explicitly lists past owners, generators, transporters, and current owners as PRPs. EPA can pursue any of them, not only the most recent owner."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
