<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Soil Formation, Horizons, and Composition</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "An Iowa farmer loses 5 mm of topsoil to a single wind-erosion event during a dust storm. Given that approximately 1 cm of topsoil takes 500 years to form under Midwestern conditions, roughly how many years of soil formation were lost in the storm, and what does the calculation imply about sustainability?", "options": [{"text": "About 5 years lost; the loss is replaced quickly through annual organic input.", "isCorrect": false, "rationale": "5 mm at 1 cm per 500 years = 250 years. Annual organic input does not replace the lost mineral substrate at the rate it is being eroded."}, {"text": "About 250 years lost; soil formation is so slow on human timescales that this loss is essentially irreversible, making the practice unsustainable.", "isCorrect": true, "rationale": "5 mm = 0.5 cm; (0.5 cm)(500 yr/cm) = 250 years. Soil formation operates on geological timescales while erosion can occur in a single season — the basis for treating soil as non-renewable on human planning horizons."}, {"text": "About 50 years lost; soil regenerates annually with cover-crop rotation.", "isCorrect": false, "rationale": "Cover crops can reduce erosion but do not change the fundamental rate of new topsoil formation, which remains on the order of centuries per centimeter."}, {"text": "About 2,500 years lost; this places soil among the most rapidly depleted resources on Earth.", "isCorrect": false, "rationale": "5 mm at 500 yr/cm yields 250 years, not 2,500. The arithmetic should reflect the 0.5 cm thickness."}], "id": "q01"}, {"question": "In a mature temperate-forest soil profile, you observe a dark brown layer near the surface rich in humus and roots, underlain by a reddish-brown layer enriched in clay and iron oxides, then a pale weathered layer resembling the bedrock beneath. Which sequence correctly identifies these horizons from top to bottom?", "options": [{"text": "C, B, A", "isCorrect": false, "rationale": "This is the reverse order. The C horizon (parent material) lies near the bottom, not the surface."}, {"text": "A, B, C — topsoil enriched in humus, illuvial subsoil enriched in clay and iron oxides, partially weathered parent material.", "isCorrect": true, "rationale": "Standard mineral-soil sequence: A (topsoil with accumulated humus, dark color, biological activity), B (illuvial zone where leached clay and Fe/Al oxides accumulate), C (regolith — partially weathered parent material). An overlying O horizon may be present in forests."}, {"text": "O, E, A — organic litter, eluviated pale layer, topsoil.", "isCorrect": false, "rationale": "O is the surface organic layer and E (eluvial) lies between A and B in some forested soils. The described profile shows mineral horizons (dark topsoil → reddish subsoil → weathered parent), which corresponds to A, B, C."}, {"text": "B, A, C — subsoil, topsoil, parent material.", "isCorrect": false, "rationale": "This order is incorrect; A always overlies B in standard profiles."}], "id": "q02"}, {"question": "Why does a soil with high cation exchange capacity (CEC) typically require less frequent fertilization than a sandy soil with low CEC?", "options": [{"text": "High-CEC soils retain positively charged nutrient ions (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) on negatively charged clay and humus surfaces, holding them against leaching and making them available to plant roots over time.", "isCorrect": true, "rationale": "Cation exchange is the storehouse of plant nutrients in soil. Clay-rich and humus-rich soils have many negatively charged exchange sites; sandy soils have few, so applied fertilizer leaches out quickly with rainfall or irrigation."}, {"text": "Sandy soils generate their own nutrients through quartz weathering, eliminating the need for external fertilizer.", "isCorrect": false, "rationale": "Quartz is essentially inert and does not release significant plant nutrients on agricultural timescales. Sandy soils are typically nutrient-poor."}, {"text": "High-CEC soils are sterile, so they hold nutrients without microbial competition.", "isCorrect": false, "rationale": "High-CEC soils typically support thriving microbial communities. CEC is a chemical property, not a measure of biological sterility."}, {"text": "Low-CEC soils naturally have higher pH and therefore retain nutrients better.", "isCorrect": false, "rationale": "CEC is independent of pH in this way; in fact, very low pH can reduce effective CEC. The correct mechanism involves charged exchange sites on clay and humus, abundant in high-CEC soils."}], "id": "q03"}, {"question": "The five soil-forming factors are summarized by the acronym CLORPT. Which letter represents the variable that determines how long soil stays in place and how much water it receives, with steeper slopes producing thinner, less developed soils?", "options": [{"text": "C — Climate", "isCorrect": false, "rationale": "Climate is the dominant large-scale driver but does not specifically capture the role of slope; it controls precipitation and temperature, not local relief."}, {"text": "L — Living organisms", "isCorrect": false, "rationale": "Living organisms (plants, fungi, earthworms, microbes) drive the biological dimension of soil formation but do not represent slope or topography."}, {"text": "O — Orography (relief and topography)", "isCorrect": true, "rationale": "Orography captures slope and relief. Steep slopes erode faster than they form soil, producing thin profiles; valley bottoms accumulate material and develop deep, rich soils. Slope aspect also affects moisture and temperature."}, {"text": "P — Parent material", "isCorrect": false, "rationale": "Parent material refers to the underlying bedrock or transported sediment from which soil minerals derive, not topographic position."}], "id": "q04"}, {"question": "Why are tropical Oxisols (deep, weathered tropical soils) typically nutrient-poor despite the immense biomass and rapid nutrient cycling above them in tropical rainforests?", "options": [{"text": "Centuries to millions of years of warm, wet conditions have intensely leached soluble minerals, leaving heavily weathered, nutrient-depleted soils; nutrients in the ecosystem are stored in the living biomass and cycled rapidly through litter, not stored in soil.", "isCorrect": true, "rationale": "Chemical weathering rates roughly double for every 10°C rise in warm ranges and are amplified by abundant rainfall. Tropical Oxisols are almost completely depleted of soluble minerals, so the rainforest's nutrient capital lies in living biomass — which is why slash-and-burn agriculture rapidly fails."}, {"text": "Tropical microbes consume soil nutrients faster than plants can absorb them.", "isCorrect": false, "rationale": "Microbial activity is part of nutrient cycling but does not by itself create nutrient depletion in tropical soils; weathering and leaching are the primary mechanisms."}, {"text": "Tropical soils have unusually high CEC, locking nutrients away from plants.", "isCorrect": false, "rationale": "Highly weathered tropical soils have low CEC because clay minerals (kaolinite) are 1:1 type with limited exchange sites, the opposite of the implied scenario."}, {"text": "Bacteria fix all nitrogen in the canopy, leaving none for the soil.", "isCorrect": false, "rationale": "Some tropical canopies host nitrogen-fixing organisms but this does not explain the broad pattern of leached, mineral-depleted tropical soils."}], "id": "q05"}, {"question": "Loam is described as the agronomically ideal soil texture. What balance of properties does loam provide that pure clay or pure sand cannot?", "options": [{"text": "Adequate drainage and aeration from sand combined with sufficient water and nutrient retention from silt and clay, plus workability — typically 25-50% sand, 25-50% silt, 10-30% clay.", "isCorrect": true, "rationale": "Sand provides large pores for drainage; clay provides surface area for water and nutrient retention; silt fills the middle. Loam combines these so plants get both moisture and oxygen, and farmers can till the soil without compaction or excessive draught."}, {"text": "Maximum drainage from a sand-only profile, eliminating waterlogging.", "isCorrect": false, "rationale": "Pure sand drains too quickly and retains few nutrients, making it agronomically poor despite easy drainage."}, {"text": "Maximum water-holding from a clay-only profile, eliminating drought stress.", "isCorrect": false, "rationale": "Pure clay holds too much water (waterlogging risk), aerates poorly, and is sticky when wet and hard when dry — agronomically inferior to loam."}, {"text": "High silt content alone provides ideal soil function.", "isCorrect": false, "rationale": "Silt by itself is susceptible to compaction and erosion; the balance with sand and clay is what gives loam its agronomic utility."}], "id": "q06"}, {"question": "Most crops grow best between pH 6.0 and 7.0. What happens to nutrient availability if the soil pH drops below 5.5?", "options": [{"text": "Aluminum and manganese become soluble at potentially toxic levels, damaging roots and reducing yields.", "isCorrect": true, "rationale": "Strongly acidic soils mobilize Al³⁺ and Mn²⁺. Aluminum toxicity is a leading cause of yield loss in acid-rain-affected and over-fertilized agricultural soils worldwide."}, {"text": "Phosphorus, iron, zinc, and boron become insoluble and unavailable.", "isCorrect": false, "rationale": "These micronutrients become unavailable above pH 7.5 (alkaline soils), not below 5.5. The acidic-soil problem is metal toxicity, not micronutrient deficiency."}, {"text": "Microbial activity ceases, eliminating decomposition.", "isCorrect": false, "rationale": "Microbial activity is reduced at low pH but does not cease, and reduced decomposition is not the primary harm at pH < 5.5; metal toxicity is."}, {"text": "Organic matter accumulates faster, raising fertility.", "isCorrect": false, "rationale": "Organic matter accumulation can occur in cold acid soils (peat, podzols), but this does not raise crop fertility; the acidity remains an obstacle to most crops."}], "id": "q07"}, {"question": "A gardener performs a ribbon test on her soil: a moistened sample squeezed between thumb and forefinger forms a long ribbon before breaking. What does this indicate about texture?", "options": [{"text": "Sand-dominant texture; the sample falls apart immediately.", "isCorrect": false, "rationale": "Sand-dominant samples produce no ribbon at all because sand particles do not adhere when wet."}, {"text": "Silt-dominant texture; a short, weak ribbon breaks quickly.", "isCorrect": false, "rationale": "Silt-clay or silt-dominant samples produce a short ribbon, not a long one."}, {"text": "High clay content; clay particles' large surface area and stickiness when wet allow long ribbons to form before breaking.", "isCorrect": true, "rationale": "The ribbon test exploits clay's plasticity. Long ribbons (>5 cm) indicate clay-dominant soils with strong cohesion when wet, which translate to high water and nutrient retention but poor drainage and aeration."}, {"text": "Pure organic matter; fibrous peat extrudes long ribbons.", "isCorrect": false, "rationale": "Peat does not extrude smooth ribbons because it lacks the plasticity of fine mineral particles. The long-ribbon outcome is diagnostic of clay."}], "id": "q08"}, {"question": "Why does the chernozem (\"black earth\") of the prairies of Ukraine, the American Midwest, and Argentina exhibit such high agricultural fertility compared with podzol soils of cool conifer forests?", "options": [{"text": "Centuries of grassland accumulation deposit dead roots annually and build a thick, humus-rich A horizon faster than the mild subhumid climate decomposes it; the resulting carbon-rich topsoil makes prairies the world's breadbaskets.", "isCorrect": true, "rationale": "The chernozem's defining feature is a deep, dark A horizon enriched by perennial grass roots that die annually and accumulate organic matter under a climate that doesn't decompose them quickly. Podzol soils, in contrast, suffer leaching of clay, iron, and aluminum into a pale E horizon, leaving acid, infertile topsoil."}, {"text": "Chernozems form on top of bedrock too hard to weather, so nutrients stay near the surface.", "isCorrect": false, "rationale": "Chernozems form on a variety of parent materials, often glacial loess. The fertility derives from organic matter accumulation, not bedrock chemistry."}, {"text": "Chernozems have lower CEC than podzols, allowing easier nutrient uptake.", "isCorrect": false, "rationale": "Chernozems have very high CEC (rich in humus and clay), which is the reverse of this claim. High CEC stores nutrients."}, {"text": "Chernozems form quickly through biotic action and reach maturity in only decades.", "isCorrect": false, "rationale": "Chernozems require centuries of grassland accumulation to develop; they are not rapidly formed."}], "id": "q09"}, {"question": "The salinization of irrigated farmland — where excessive dissolved salts damage root cells through osmotic stress — is a major sustainability challenge in arid agricultural regions. Which of the following best describes the typical mechanism?", "options": [{"text": "Irrigation water carries trace salts; under arid conditions, water evaporates from the surface while salts remain and accumulate. Capillary rise of saline groundwater can also concentrate salts at the root zone.", "isCorrect": true, "rationale": "Salinization in places like the American West, Central Asia, and the Middle East follows a predictable pattern: irrigation water deposits salts; arid evaporation concentrates them at the surface; rising water tables under irrigation accelerate the buildup. Eventually salt levels exceed crop tolerance and the land becomes unproductive."}, {"text": "Plants pump salts out of their roots, depositing them in surrounding soil.", "isCorrect": false, "rationale": "Halophytes (salt-tolerant plants) excrete salts but most crops do not. Crops are damaged by salt rather than depositing it themselves."}, {"text": "Saline groundwater bubbles up volcanically and replaces fresh soil moisture.", "isCorrect": false, "rationale": "Volcanic activity is not the source of agricultural salinization; the source is the irrigation-evaporation-capillarity cycle."}, {"text": "Acidic rainfall in arid regions converts soil minerals into salts.", "isCorrect": false, "rationale": "Acid rain is associated with industrial regions, not the primary cause of dryland salinization. Salinization is driven by water-balance dynamics, not rainfall acidity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
