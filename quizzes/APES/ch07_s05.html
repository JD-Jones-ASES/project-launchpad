<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Mitigation Technologies and the Clean Air Act</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which best distinguishes a source control from an end-of-pipe control?", "options": [{"text": "Source controls capture pollutants after combustion; end-of-pipe controls prevent them from forming", "isCorrect": false, "rationale": "This reverses the definitions."}, {"text": "Source controls change the process or fuel to prevent pollutants from forming; end-of-pipe controls capture or convert pollutants after they have formed but before they leave the stack or tailpipe", "isCorrect": true, "rationale": "Correct. Source controls eliminate the pollutant; end-of-pipe controls capture what remains. Both are required for comprehensive air-quality strategy."}, {"text": "Source controls are voluntary; end-of-pipe controls are mandated by EPA", "isCorrect": false, "rationale": "Both can be regulatory or voluntary depending on context."}, {"text": "Source controls apply only to mobile sources; end-of-pipe controls apply only to stationary sources", "isCorrect": false, "rationale": "Both strategies apply to both types of sources."}], "id": "q01"}, {"question": "Which technology removes SO2 from coal-fired power-plant flue gas by spraying an alkaline limestone slurry into the hot exhaust stream, with gypsum as a valuable by-product?", "options": [{"text": "Electrostatic precipitator (ESP)", "isCorrect": false, "rationale": "ESPs remove particulate matter, not SO2."}, {"text": "Selective catalytic reduction (SCR)", "isCorrect": false, "rationale": "SCR converts NOx to N2 using ammonia, not SO2 to gypsum."}, {"text": "Wet scrubber / flue gas desulfurization (FGD)", "isCorrect": true, "rationale": "Correct. FGD systems remove 95–99% of SO2 by reacting it with limestone slurry to form calcium sulfite/sulfate, with gypsum used in wallboard manufacturing."}, {"text": "Catalytic converter", "isCorrect": false, "rationale": "Catalytic converters are vehicle exhaust devices, not industrial scrubbers."}], "id": "q02"}, {"question": "An electrostatic precipitator (ESP) is used to control which type of pollutant from a coal-fired boiler?", "options": [{"text": "SO2 from sulfur-bearing coal", "isCorrect": false, "rationale": "SO2 is controlled by FGD scrubbers, not ESPs."}, {"text": "Fine particulate matter (PM10 and PM2.5)", "isCorrect": true, "rationale": "Correct. ESPs use high-voltage electric fields to charge particles and collect them on grounded plates, achieving >99% efficiency on fine PM."}, {"text": "NOx via reduction to nitrogen gas", "isCorrect": false, "rationale": "NOx control is the domain of SCR, not ESPs."}, {"text": "VOCs and organic vapors", "isCorrect": false, "rationale": "ESPs target solid/liquid particles; gaseous VOCs are not collected effectively."}], "id": "q03"}, {"question": "[Stimulus] Modern coal-fired power plants typically install both an electrostatic precipitator and a wet scrubber. Which combination of pollutants do these two technologies primarily target?", "options": [{"text": "ESP for VOCs and scrubber for ozone", "isCorrect": false, "rationale": "Neither device targets VOCs or ozone primarily."}, {"text": "ESP for fine particulate matter and scrubber (FGD) for SO2", "isCorrect": true, "rationale": "Correct. ESPs collect PM with >99% efficiency; FGD removes 95–99% of SO2 with gypsum as a valuable by-product."}, {"text": "ESP for CO2 and scrubber for NOx", "isCorrect": false, "rationale": "Neither device captures CO2 effectively, and NOx control uses SCR rather than scrubbers."}, {"text": "Both target only mercury emissions", "isCorrect": false, "rationale": "These technologies target SO2 and PM, not just mercury."}], "id": "q04"}, {"question": "What chemical species are produced by selective catalytic reduction (SCR) when ammonia or urea is injected into NOx-laden flue gas in the presence of a vanadium pentoxide or zeolite catalyst?", "options": [{"text": "N2 and water", "isCorrect": true, "rationale": "Correct. SCR converts NOx to harmless N2 and H2O at 80–95% efficiency. The reactions are 4NO + 4NH3 + O2 → 4N2 + 6H2O and 6NO2 + 8NH3 → 7N2 + 12H2O."}, {"text": "Ammonium nitrate and oxygen", "isCorrect": false, "rationale": "The product is N2 + H2O, not nitrate."}, {"text": "Sulfuric acid and methane", "isCorrect": false, "rationale": "These are not products of SCR."}, {"text": "Ozone and CO2", "isCorrect": false, "rationale": "These are not products of SCR."}], "id": "q05"}, {"question": "What three reactions does a modern three-way catalytic converter simultaneously drive in vehicle exhaust?", "options": [{"text": "It oxidizes CO and unburned hydrocarbons to CO2 and H2O, and reduces NOx to N2", "isCorrect": true, "rationale": "Correct. The platinum-palladium-rhodium catalysts on a ceramic honeycomb substrate carry out these three reactions, each with >95% efficiency at temperature."}, {"text": "It splits water into hydrogen and oxygen for fuel-cell use", "isCorrect": false, "rationale": "Not a catalytic-converter function."}, {"text": "It captures CO2 and converts it to limestone", "isCorrect": false, "rationale": "Catalytic converters do not target CO2."}, {"text": "It removes SO2 by reacting it with calcium carbonate", "isCorrect": false, "rationale": "That describes flue gas desulfurization in stationary sources."}], "id": "q06"}, {"question": "[Stimulus] The 1975 federal mandate for catalytic converters required the simultaneous availability of unleaded gasoline. Why?", "options": [{"text": "Lead in gasoline reacts with the catalyst-mounted ceramic substrate, causing it to crack", "isCorrect": false, "rationale": "The mechanism is chemical poisoning of active sites, not mechanical fracture."}, {"text": "Lead compounds adsorb onto the platinum and rhodium active sites and block them, deactivating the catalyst — so the catalytic-converter mandate forced the elimination of leaded gasoline", "isCorrect": true, "rationale": "Correct. Catalyst poisoning by lead made the converter mandate inseparable from a fuel transition. The result was a >90% reduction in US childhood blood-lead levels between 1976 and 2000."}, {"text": "Leaded gasoline burns at higher temperatures than unleaded, melting the converter", "isCorrect": false, "rationale": "Lead's effect on catalysts is chemical poisoning, not thermal damage."}, {"text": "Unleaded gasoline produces more SO2 than leaded gasoline", "isCorrect": false, "rationale": "The lead-fuel transition was driven by catalyst protection and lead-toxicity concerns, not by sulfur chemistry."}], "id": "q07"}, {"question": "Under New Source Performance Standards (NSPS, Clean Air Act §111), what kind of emission limit must new or significantly modified stationary sources meet?", "options": [{"text": "Cost-based limits identical to those for existing sources", "isCorrect": false, "rationale": "NSPS are stricter than existing-source standards and are technology-based, not cost-based parity."}, {"text": "Voluntary limits set by industry trade associations", "isCorrect": false, "rationale": "NSPS are mandatory federal standards."}, {"text": "Technology-based limits reflecting the 'best demonstrated technology' (BDT) commercially available for controlling each pollutant", "isCorrect": true, "rationale": "Correct. NSPS apply to designated industrial categories regardless of attainment status of the surrounding area."}, {"text": "Limits set by the state Implementation Plan only, with no federal floor", "isCorrect": false, "rationale": "NSPS are federal floors that all qualifying new sources must meet."}], "id": "q08"}, {"question": "Which 1990 Clean Air Act Amendments title established the cap-and-trade program for SO2 emissions from electric utilities, achieving an ~88% reduction by 2020?", "options": [{"text": "Title I (NAAQS)", "isCorrect": false, "rationale": "Title I deals with NAAQS and SIPs, not the SO2 trading program."}, {"text": "Title II (mobile source standards)", "isCorrect": false, "rationale": "Title II governs vehicle emissions, not stationary-source SO2 trading."}, {"text": "Title IV", "isCorrect": true, "rationale": "Correct. Title IV of the 1990 CAA Amendments established the national cap-and-trade program for SO2 from electric utilities."}, {"text": "Title VI (ODS phase-out)", "isCorrect": false, "rationale": "Title VI implements the Montreal Protocol phase-out of ozone-depleting substances, not the acid-rain program."}], "id": "q09"}, {"question": "[Stimulus] In a lichen-bioindicator transect, a student finds crustose lichens present even at Station A directly adjacent to a highway, but foliose and fruticose lichens are absent until Station D (300 m away). What does this pattern most likely reflect?", "options": [{"text": "Crustose lichens require higher pollution levels for survival", "isCorrect": false, "rationale": "Lichens generally do not require pollution; they tolerate it to varying degrees."}, {"text": "Crustose growth forms are the most pollution-tolerant; foliose and fruticose forms are progressively more sensitive, so the more pollution-sensitive growth forms appear only at greater distances where pollutant concentrations have declined", "isCorrect": true, "rationale": "Correct. Lichen growth-form sensitivity follows a known gradient: crustose < foliose < fruticose, allowing them to function as inexpensive integrative bioindicators of air quality."}, {"text": "Foliose and fruticose lichens require more sunlight than crustose lichens", "isCorrect": false, "rationale": "The pattern is driven by pollution sensitivity, not light requirements at this scale."}, {"text": "Crustose lichens are introduced species that outcompete native foliose and fruticose forms", "isCorrect": false, "rationale": "The crustose-foliose-fruticose distinction is morphological and pollution-sensitivity, not invasion biology."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
