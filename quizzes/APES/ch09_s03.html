    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Climate Consequences I: Sea Level, Albedo, and Permafrost</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Satellite altimeter measurements since 1993 show global mean sea level rising at approximately 3.4 mm per year — roughly double the rate measured by tide gauges in the first half of the 20th century. Which two physical mechanisms account for this rise, and what is their approximate proportional contribution?", "options": [{"text": "Ice melt from glaciers and ice sheets accounts for 100% of the rise; thermal expansion is negligible.", "isCorrect": false, "rationale": "Thermal expansion contributes about one-third of observed sea-level rise. Both mechanisms are major contributors, not just ice melt."}, {"text": "Thermal expansion of warming ocean water (about one-third) and melting land ice from mountain glaciers, the Greenland Ice Sheet, and the Antarctic Ice Sheet (about two-thirds).", "isCorrect": true, "rationale": "Thermal expansion accounts for approximately one-third of current sea-level rise. The remaining two-thirds comes from melting land ice. Sea ice melt does not directly raise sea level."}, {"text": "Melting Arctic sea ice (about 75%) and increased oceanic precipitation (about 25%).", "isCorrect": false, "rationale": "Melting sea ice does NOT directly raise sea level — sea ice already displaces its weight in water. Only land ice melt and thermal expansion contribute."}, {"text": "Underwater volcanic activity (~50%) and tidal forces (~50%).", "isCorrect": false, "rationale": "Volcanic activity and tides do not contribute to long-term sea-level rise. The mechanisms are thermal expansion and land-ice melt."}], "id": "q01"}, {"question": "Why is the Arctic warming approximately three times faster than the global average — a phenomenon called Arctic amplification?", "options": [{"text": "The Arctic receives more direct solar radiation than mid-latitudes due to atmospheric circulation.", "isCorrect": false, "rationale": "The Arctic actually receives less direct solar radiation than equatorial regions due to oblique solar angle. The amplification is from albedo feedback, not solar input."}, {"text": "The ice-albedo feedback: melting snow and sea ice (albedo 0.7-0.9) exposes darker ocean (albedo 0.06), absorbing roughly 14 times more solar radiation per square kilometer, generating further warming and more melt.", "isCorrect": true, "rationale": "The huge albedo contrast between ice (0.7-0.9) and ocean (0.06) means each km^2 of lost sea ice exposes a strongly absorbing surface. The positive feedback drives Arctic amplification."}, {"text": "Increased volcanic activity in Iceland and Greenland.", "isCorrect": false, "rationale": "Volcanic activity has not significantly increased in these regions; even if it had, volcanic eruptions tend to cool the climate via stratospheric aerosols."}, {"text": "Migration of equatorial ocean currents into Arctic basins.", "isCorrect": false, "rationale": "Ocean currents do transport heat poleward but they have not dramatically changed in the relevant timeframe; ice-albedo feedback explains the amplification."}], "id": "q02"}, {"question": "Permafrost stores approximately 1,700 Pg of frozen organic carbon. The current atmospheric carbon burden is approximately 860 Pg. Why is the permafrost carbon feedback considered particularly concerning from a policy standpoint, even though current permafrost emissions are small relative to industrial emissions?", "options": [{"text": "Because permafrost emissions are easier to capture and store than industrial emissions, making them a more cost-effective target.", "isCorrect": false, "rationale": "Permafrost emissions are diffuse and emitted over vast Arctic territory, making capture impractical. The concern is that they are not addressable by mitigation policy."}, {"text": "Because permafrost contains roughly twice the atmospheric carbon burden, and the feedback is self-reinforcing — warming releases carbon, which warms further, which thaws more permafrost. Most IPCC scenarios do not yet adequately represent this feedback.", "isCorrect": true, "rationale": "1,700 Pg permafrost C vs. 860 Pg atmospheric C means permafrost holds nearly 2x the atmospheric carbon. Self-reinforcing feedback plus underrepresentation in IPCC models means current projections may be conservative."}, {"text": "Because permafrost release would happen suddenly within 5-10 years.", "isCorrect": false, "rationale": "Permafrost thaw is gradual, not sudden. The concern is the irreversibility once thawing accelerates and the magnitude of total potential release."}, {"text": "Because permafrost carbon is composed entirely of methane, which has a higher GWP than CO2.", "isCorrect": false, "rationale": "Permafrost releases both CO2 (aerobic decomposition) and CH4 (anaerobic in flooded thermokarst), not exclusively methane."}], "id": "q03"}, {"question": "A graph shows Arctic September sea-ice extent declining approximately 13% per decade since 1979 satellite records began. Which statement best describes the relationship between sea-ice loss and ocean heat absorption?", "options": [{"text": "Lost sea ice has no effect on ocean heat absorption because the underlying ocean is already at thermal equilibrium.", "isCorrect": false, "rationale": "The exposed ocean absorbs much more solar radiation than the previous ice cover, fundamentally changing the surface energy budget."}, {"text": "Each km^2 of lost sea ice exposes ocean that absorbs roughly 14 times more solar radiation than it reflected, accelerating regional warming and further ice loss.", "isCorrect": true, "rationale": "Sea ice albedo (0.50-0.70) compared to ocean albedo (0.06) means the ocean absorbs ~14 times more solar radiation per unit area. This is the engine of Arctic amplification."}, {"text": "Sea-ice loss reduces ocean heat absorption because the bare ocean reflects more shortwave radiation than ice.", "isCorrect": false, "rationale": "The opposite is true. Ocean has lower albedo (0.06) than ice (0.50-0.70), so ocean absorbs MORE radiation."}, {"text": "Ocean heat absorption is determined entirely by latitude, not surface cover.", "isCorrect": false, "rationale": "Latitude affects insolation angle but surface albedo strongly modulates absorption regardless of latitude."}], "id": "q04"}, {"question": "The IPCC has identified the Greenland Ice Sheet as a potential tipping point at approximately 1.5-2.0 degrees C of global warming. What is meant by a climate tipping point, and why does crossing it matter for irreversibility?", "options": [{"text": "A point at which all climate change reverses naturally without human intervention.", "isCorrect": false, "rationale": "The opposite — tipping points are thresholds beyond which change becomes self-sustaining and difficult to reverse, not self-correcting."}, {"text": "A threshold beyond which a major component of the Earth system undergoes a rapid, self-sustaining transition that is difficult or impossible to reverse on human timescales. For Greenland, the lower elevation of a thinning ice sheet exposes it to warmer air, accelerating melt regardless of subsequent emissions.", "isCorrect": true, "rationale": "Tipping points imply non-linear response: once crossed, the process drives itself. For Greenland, ice-sheet thinning lowers the surface elevation, which exposes ice to warmer air, melting more ice — a self-amplifying loop."}, {"text": "A point at which climate change becomes immediately catastrophic for human life.", "isCorrect": false, "rationale": "Tipping points unfold on millennial timescales. Crossing one is not necessarily catastrophic on a human-lifetime scale; it removes the possibility of reversal."}, {"text": "A linear threshold at which warming proceeds at a fixed rate.", "isCorrect": false, "rationale": "The defining feature of a tipping point is non-linearity — the system accelerates after the threshold rather than continuing at a fixed rate."}], "id": "q05"}, {"question": "The IPCC AR6 (2021) projects sea-level rise by 2100 of 0.4-0.8 m under a moderate emissions scenario (SSP2-4.5) and 0.6-1.0 m under a high-emissions scenario (SSP5-8.5). Why do high-end projections carry such significant uncertainty?", "options": [{"text": "Tide gauge measurements are imprecise and disagree among themselves.", "isCorrect": false, "rationale": "Modern satellite altimetry is precise to mm/year. Measurement uncertainty is not the dominant source."}, {"text": "Marine-ice-sheet instability in West Antarctica is poorly constrained — bedrock geometry beneath the ice sheet could allow self-sustaining collapse adding several additional meters this century.", "isCorrect": true, "rationale": "West Antarctic Ice Sheet sits on bedrock that slopes inward toward the interior, creating conditions for marine-ice-sheet instability. If triggered, the collapse could add meters of sea-level rise rapidly, but the threshold is poorly known."}, {"text": "Tropical glacier retreat rates are unknown.", "isCorrect": false, "rationale": "Tropical glaciers are well-studied and contribute relatively little to global sea level. They are not the dominant uncertainty."}, {"text": "Thermal expansion is highly variable across ocean basins and unpredictable.", "isCorrect": false, "rationale": "Thermal expansion is well-constrained by ocean heat content measurements. The dominant uncertainty is Antarctic ice dynamics."}], "id": "q06"}, {"question": "Which of the following correctly compares albedo values for major Arctic surface types?", "options": [{"text": "Fresh snow ~0.06; ocean water ~0.80-0.90", "isCorrect": false, "rationale": "Reversed values. Fresh snow has high albedo (~0.80-0.90) because it scatters most incoming light; ocean has very low albedo (~0.06)."}, {"text": "Fresh snow ~0.80-0.90; sea ice ~0.50-0.70; vegetated tundra ~0.15-0.20; ocean water ~0.06", "isCorrect": true, "rationale": "Standard albedo values: snow scatters 80-90% of light back to space; sea ice (depending on age) reflects 50-70%; tundra reflects 15-20%; open ocean reflects only 6%."}, {"text": "All surfaces have approximately the same albedo (~0.30 average).", "isCorrect": false, "rationale": "Albedo varies dramatically by surface type, which is precisely what makes ice-albedo feedback significant."}, {"text": "Fresh snow ~0.30; sea ice ~0.30; tundra ~0.30; ocean water ~0.30", "isCorrect": false, "rationale": "These are not real albedo values for these surfaces; the actual contrast is large and is the basis of ice-albedo feedback."}], "id": "q07"}, {"question": "The Greenland Ice Sheet covers approximately 1.7 million km^2 and contains enough water to raise global sea level by approximately 7.4 m if fully melted. What was the approximate annual mass loss in the 1990s, and what is it currently?", "options": [{"text": "1990s: ~50 Gt/year; currently: ~250-280 Gt/year (roughly 5x increase).", "isCorrect": true, "rationale": "Mass loss accelerated from approximately 50 Gt/year in the 1990s to 150 Gt by the 2000s and 250-280 Gt/year by the 2010s — roughly a 5x increase, dominated by surface melt and meltwater lubrication of ice flow."}, {"text": "1990s: ~500 Gt/year; currently: ~50 Gt/year (mass loss has decreased).", "isCorrect": false, "rationale": "Direction is reversed. Greenland mass loss has accelerated, not decelerated, since 1990."}, {"text": "1990s: 0 Gt/year; currently: 50 Gt/year.", "isCorrect": false, "rationale": "Greenland was already losing mass in the 1990s at about 50 Gt/year, predominantly through calving."}, {"text": "Mass loss has been constant at 100 Gt/year throughout the period.", "isCorrect": false, "rationale": "Mass loss has accelerated significantly. It was not constant."}], "id": "q08"}, {"question": "When permafrost thaws in the Arctic, microbial decomposition of newly exposed organic matter produces both CO2 and CH4. Under what physical condition does CH4 dominate over CO2?", "options": [{"text": "Aerobic conditions where oxygen reaches the decomposing material.", "isCorrect": false, "rationale": "Aerobic decomposition produces CO2, not methane. Methane is produced under anaerobic conditions."}, {"text": "Anaerobic conditions in flooded thermokarst (collapsed ground) features where oxygen cannot reach the decomposing organic matter.", "isCorrect": true, "rationale": "Methanogenic archaea require anaerobic conditions. Flooded thermokarst depressions where collapsed ground holds water provide the oxygen-free environment for CH4 production rather than CO2."}, {"text": "When temperatures exceed 5 degrees C in the active layer.", "isCorrect": false, "rationale": "Temperature affects rate but not the gas type — anaerobic vs. aerobic conditions determine whether CO2 or CH4 dominates."}, {"text": "When carbon-to-nitrogen ratio is high in the soil.", "isCorrect": false, "rationale": "C:N ratio affects decomposition rate but not the choice of gas; oxygen availability does."}], "id": "q09"}, {"question": "Two students debate which sea-level-rise mechanism will continue for the longest time after greenhouse gas emissions stop. Which student is correct?", "options": [{"text": "Student A: Thermal expansion will continue for centuries because the deep ocean warms slowly and lags atmospheric temperature by decades.", "isCorrect": true, "rationale": "Thermal expansion is the longer-running mechanism. Deep ocean takes centuries to fully equilibrate with atmospheric warming, so thermal expansion continues even after stabilization. Ice melt also continues but on different timescales depending on region."}, {"text": "Student B: Ice melt stops immediately when emissions stop because the temperature stops rising.", "isCorrect": false, "rationale": "Ice melt does not stop immediately. Once an ice sheet has been thinned, it continues to lose mass even at constant temperature; tipping points further entrench the loss."}, {"text": "Both mechanisms cease immediately when emissions stop.", "isCorrect": false, "rationale": "Neither mechanism stops immediately. Both continue for decades to centuries due to ocean and ice-sheet inertia."}, {"text": "Sea-level rise reverses immediately when emissions stop because the ocean cools quickly.", "isCorrect": false, "rationale": "The ocean does not cool quickly — it has enormous heat capacity and slow mixing. Sea-level rise has a multi-century commitment from current warming."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
