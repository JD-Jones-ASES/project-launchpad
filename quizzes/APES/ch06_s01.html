<div class="quiz-container">

        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Global Energy Trends and Fossil Fuel Formation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Approximately what percentage of global primary energy consumption comes from fossil fuels (oil, coal, and natural gas combined) as of 2024?", "options": [{"text": "Approximately 50%, with renewables already supplying the majority of demand.", "isCorrect": false, "rationale": "Despite rapid renewable growth, fossil fuels still dominate. The 2024 share of fossil fuels is closer to 80%, not 50%."}, {"text": "Approximately 60%, reflecting steady decarbonization since 2000.", "isCorrect": false, "rationale": "Fossil fuel share has declined only modestly from 86% in 2000 because total demand has grown faster than renewable capacity has been built."}, {"text": "Approximately 80%, with oil at ~31%, coal at ~25%, and natural gas at ~24%.", "isCorrect": true, "rationale": "The text specifies oil ~31%, coal ~25%, and natural gas ~24%, summing to roughly 80% of global primary energy. This share has declined only modestly from 86% in 2000."}, {"text": "Approximately 95%, with biomass and hydro supplying the remainder.", "isCorrect": false, "rationale": "Hydroelectric (~7%), biomass (~5%), nuclear (~4%), and wind/solar (~5%) together supply roughly 20% of primary energy, so fossil fuels are about 80%, not 95%."}]}, {"question": "A geologist examining a black shale outcrop notes that catagenesis at temperatures of roughly 60 to 120 degrees Celsius converted kerogen in this rock into liquid hydrocarbons. Which fossil fuel formed under these conditions, and what is the technical name for this temperature range?", "options": [{"text": "Coal formed in the gas window through anaerobic peat compression.", "isCorrect": false, "rationale": "Coal forms from terrestrial plant biomass in Carboniferous swamps, not from marine kerogen. The gas window refers to oil cracking at temperatures above 150 degrees C."}, {"text": "Crude oil formed in the oil window through catagenesis of marine kerogen.", "isCorrect": true, "rationale": "Catagenesis at roughly 60 to 120 degrees C transforms kerogen derived from marine plankton into liquid crude oil. This temperature range is called the oil window. Above ~150 degrees C, oil cracks further into natural gas (the gas window)."}, {"text": "Natural gas formed in the oil window through methane condensation.", "isCorrect": false, "rationale": "Natural gas (predominantly methane) forms in the deeper, hotter gas window above ~150 degrees C, not in the cooler 60 to 120 degrees C oil window."}, {"text": "Anthracite coal formed through metamorphic recrystallization of bitumen.", "isCorrect": false, "rationale": "Anthracite is the highest rank of coal and forms from terrestrial plant biomass under intense heat and pressure, not from marine kerogen via catagenesis."}]}, {"question": "Why are major coal deposits geographically concentrated in regions such as the Appalachian Basin, the Powder River Basin, the Ruhr Basin, and the Bowen Basin in Australia?", "options": [{"text": "These regions all sit on active subduction zones that concentrate hydrocarbons through volcanism.", "isCorrect": false, "rationale": "Coal does not form via volcanism. Subduction-zone settings can produce some petroleum systems but are not the reason for coal-deposit clustering."}, {"text": "Carboniferous-age (300 to 360 Myr) wetland forests existed in those regions, accumulating peat that was later buried, heated, and pressurized into coal.", "isCorrect": true, "rationale": "Coal is solidified terrestrial biomass from Carboniferous swamps where lignin-rich plant matter accumulated faster than fungi could decompose it. Tectonic burial then drove off oxygen and hydrogen, raising carbon content over millions of years."}, {"text": "Cold, deep marine basins in those regions trapped phytoplankton remains under anoxic conditions.", "isCorrect": false, "rationale": "That is the mechanism for oil and natural gas formation, not coal. Coal forms from terrestrial plants in swamps, not marine plankton."}, {"text": "Continental rifting concentrated kerogen-rich shale in those regions.", "isCorrect": false, "rationale": "Rift basins host some petroleum systems but do not explain why coal in particular clusters in these specific regions; the Carboniferous swamp connection does."}]}, {"question": "An economist reports that a country's energy intensity has fallen by 50% over the past four decades while its absolute energy consumption has nearly tripled. What is the most likely explanation, and what does the trend imply?", "options": [{"text": "The country must have switched mostly to renewable energy, since intensity tracks renewable share.", "isCorrect": false, "rationale": "Energy intensity is a ratio of energy consumption to GDP, independent of energy source. Renewable share is a separate measure."}, {"text": "GDP grew faster than efficiency gains reduced per-dollar energy use, so absolute consumption rose despite falling intensity.", "isCorrect": true, "rationale": "Energy intensity is energy per dollar of GDP. If intensity falls 50% but GDP triples, absolute consumption rises (3 x 0.5 = 1.5x). The text gives the global figure: intensity is half of 1970s levels, yet absolute consumption has nearly tripled because the economy grew much faster than efficiency improvements."}, {"text": "Energy intensity always tracks population growth one-to-one.", "isCorrect": false, "rationale": "Energy intensity is the ratio of energy to GDP, not population. The two metrics are related but distinct."}, {"text": "The country must have moved into early industrialization, where intensity always rises.", "isCorrect": false, "rationale": "Falling intensity over four decades indicates a mature, post-industrial economy on the descending side of the hump-shaped curve, not early industrialization."}]}, {"question": "What is the key geological difference between coal formation and oil/natural gas formation?", "options": [{"text": "Coal forms in marine sediments while oil and gas form in terrestrial swamps.", "isCorrect": false, "rationale": "This reverses the actual settings. Coal forms from terrestrial plants in Carboniferous wetlands; oil and gas form from marine plankton in anoxic seafloor sediments."}, {"text": "Coal forms from terrestrial plant biomass in waterlogged swamps; oil and gas form from marine plankton accumulating in anoxic seafloor sediments and migrating into reservoir rocks under cap rock.", "isCorrect": true, "rationale": "Coal is solidified Carboniferous swamp biomass with lignin preservation. Oil and gas originate from microscopic marine plankton (phytoplankton, zooplankton, algae) preserved in anoxic seafloor mud, later transformed by catagenesis and migrating upward until trapped beneath impermeable cap rock."}, {"text": "Both coal and oil require Carboniferous-age source material.", "isCorrect": false, "rationale": "Oil and gas form in marine sedimentary basins of varied ages, not exclusively Carboniferous. Coal preferentially comes from Carboniferous swamps."}, {"text": "Coal requires aerobic decomposition; oil requires aerobic decomposition.", "isCorrect": false, "rationale": "Both processes require oxygen-limited conditions: waterlogged peat swamps for coal, and anoxic seafloor sediments for oil and gas. Aerobic decomposition would oxidize the organic carbon."}]}, {"question": "A student notes that coal rank progresses from peat (~50% C) to lignite (60-70% C) to bituminous (80-90% C) to anthracite (>90% C). Which physical property changes most dramatically with rising rank, and why?", "options": [{"text": "Color changes from black to brown as rank rises.", "isCorrect": false, "rationale": "Lower-rank coals like lignite are brownish; higher-rank coals are darker. The most consequential property change for energy use is energy density, not color."}, {"text": "Energy density rises (~15 MJ/kg for lignite vs ~32 MJ/kg for anthracite) because progressive burial drives off water, oxygen, and hydrogen, leaving more concentrated carbon.", "isCorrect": true, "rationale": "Heat and pressure during burial expel water, oxygen, and hydrogen, raising carbon fraction and energy density from ~15 MJ/kg in lignite to ~32 MJ/kg in anthracite. Higher-rank coals also burn more cleanly."}, {"text": "Sulfur content rises, making higher-rank coal cleaner than lignite.", "isCorrect": false, "rationale": "Higher-rank coals tend to burn more cleanly, but sulfur content varies by deposit and is not the systematic property that changes with rank in the way energy density does."}, {"text": "Hydrogen content rises with rank, increasing energy yield.", "isCorrect": false, "rationale": "Hydrogen is driven off during burial along with oxygen and water; that is why carbon content rises. Hydrogen does not increase with rank."}]}, {"question": "A 2024 country profile shows that traditional biomass (wood, charcoal, agricultural residues) supplies 70% of household energy, while aggregate national statistics report biomass at only 5% of primary energy. Where is this country most likely located, and why does the discrepancy exist?", "options": [{"text": "Northern Europe; aggregate statistics overcount biomass due to district heating.", "isCorrect": false, "rationale": "Northern European biomass use is largely modern and tracked in statistics. The pattern of 60-80% household biomass with low national-aggregate share matches sub-Saharan Africa, not Europe."}, {"text": "Sub-Saharan Africa; traditional biomass burned in homes for cooking and heating is largely invisible in aggregate statistics, even though it dominates household energy.", "isCorrect": true, "rationale": "The text explicitly identifies sub-Saharan Africa as the region where 60-80% of household energy comes from traditional biomass. This use is poorly measured in aggregate statistics, but carries serious health (indoor air pollution) and deforestation consequences."}, {"text": "China; coal dominates household and industrial energy and shows up clearly in statistics.", "isCorrect": false, "rationale": "China is dominated by coal in both household and aggregate statistics; it does not exhibit the 70% household biomass share described."}, {"text": "OECD nations; modern bioenergy plants supply most household heating.", "isCorrect": false, "rationale": "OECD nations are dominated by natural gas and oil. Traditional biomass is not the dominant household fuel there."}]}, {"question": "In Hubbert's 1956 model, what does the peak in the production curve represent, and approximately when did US conventional oil production peak as he predicted?", "options": [{"text": "The peak represents the year of largest discovery; US oil production peaked around 1990.", "isCorrect": false, "rationale": "The peak is the year of maximum production rate, not maximum discovery. Discovery typically peaks decades before production. US conventional production peaked around 1970."}, {"text": "The peak represents the year when about half the recoverable resource has been extracted; US conventional production peaked around 1970 at ~9.6 Mb/d.", "isCorrect": true, "rationale": "Hubbert argued that production from a finite reservoir follows a roughly bell-shaped curve, peaking when about half the recoverable resource has been extracted. He correctly predicted US conventional oil would peak around 1970, which it did at ~9.6 Mb/d before declining through the 1970s."}, {"text": "The peak represents the year of full depletion; US oil production hit zero around 1980.", "isCorrect": false, "rationale": "The peak is not depletion; production continues for decades after the peak, declining gradually. US oil production never hit zero."}, {"text": "The peak represents the year of lowest oil prices; US oil production peaked in 2008.", "isCorrect": false, "rationale": "Hubbert's peak is about production volume, not price. US conventional production peaked around 1970; the 2008-2023 surge from ~5 to ~13 Mb/d came from the fracking revolution, not conventional resources."}]}, {"question": "What development of the 2000s and 2010s most disrupted the simple Hubbert peak prediction in the United States, and how?", "options": [{"text": "Discovery of new conventional oil fields in the Gulf of Mexico tripled US production.", "isCorrect": false, "rationale": "Conventional offshore production was already mature; the post-2008 surge came from onshore tight oil unlocked by fracking, not Gulf discovery."}, {"text": "Hydraulic fracturing (fracking) unlocked oil and gas in low-permeability shale and tight sandstone, raising US production from about 5 Mb/d in 2008 to ~13 Mb/d by 2023.", "isCorrect": true, "rationale": "The fracking revolution accessed reserves that conventional drilling could not reach, reversing the post-1970 conventional decline and making the US the world's largest oil producer. Hubbert did not foresee tight-oil extraction technology."}, {"text": "Massive imports from Saudi Arabia replaced domestic production.", "isCorrect": false, "rationale": "Imports do not appear in domestic production statistics. The post-2008 surge in US production came from domestic tight-oil extraction, not imports."}, {"text": "Conversion of US coal mines to oil refineries quadrupled output.", "isCorrect": false, "rationale": "Coal and oil come from different deposits and refineries; coal mines are not converted to oil production. The fracking revolution drove the production surge."}]}, {"question": "Roughly how do the rates of fossil-fuel formation and consumption compare, and what does this mismatch imply for energy policy?", "options": [{"text": "Formation and consumption are balanced; fossil fuels regenerate within a decade.", "isCorrect": false, "rationale": "Coal required 50-100 Myr to form; oil and gas required similarly long marine deposition and catagenesis. Fossil fuels are non-renewable on any human timescale."}, {"text": "Coal required 50-100 Myr to form and oil/gas required similar timescales; humans are consuming in decades what took hundreds of millions of years to accumulate, so demand reduction and renewable transition are the only meaningful levers.", "isCorrect": true, "rationale": "The text emphasizes that no technical fix can speed up the geological processes; consumption depletes the finite stock and releases the stored carbon as atmospheric CO2. Strategic responses must focus on demand reduction and transition to truly renewable sources."}, {"text": "Fossil fuels regenerate via volcanic activity within centuries, so policy can rely on natural replacement.", "isCorrect": false, "rationale": "Volcanism does not produce fossil fuels. Fossil fuels are biological in origin and require geological timescales (50-100+ Myr)."}, {"text": "Renewable energy growth has already replaced fossil fuel consumption, so the timescale mismatch no longer matters.", "isCorrect": false, "rationale": "Fossil fuels still supply about 80% of global primary energy. Renewable growth is real but has not replaced fossil consumption; the timescale mismatch remains directly relevant to policy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
