    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Ocean Currents, Upwelling, and the El Niño–Southern Oscillation</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During a strong El Nino event, the Peruvian anchovy fishery — typically one of the world's largest single-species catches — collapses. What sequence of mechanisms best explains this collapse?", "options": [{"text": "Trade winds weaken, allowing the warm pool to migrate east; the thermocline deepens off Peru, suppressing cold upwelling; nutrient supply to the surface fails, phytoplankton productivity collapses, and the food web (zooplankton → anchovies) cannot support the fishery.", "isCorrect": true, "rationale": "El Nino's hallmark is the eastward migration of the western Pacific warm pool when trade winds weaken. The deepened eastern thermocline cuts off the cold, nutrient-rich upwelling that fuels primary production off Peru. Without nutrients, phytoplankton crash, and the anchovy fishery — wholly dependent on this productivity — collapses."}, {"text": "Trade winds intensify, pushing colder water against the Peruvian coast and freezing the anchovies.", "isCorrect": false, "rationale": "Intensified trade winds describe La Nina, the opposite of El Nino. Anchovies tolerate cold upwelling water; collapse during El Nino is from nutrient deprivation, not freezing."}, {"text": "An algal bloom poisons the anchovies as warm water spreads.", "isCorrect": false, "rationale": "Toxic algal blooms can occur during ENSO events but the dominant mechanism behind the well-documented anchovy collapse is the failure of upwelling-driven nutrient supply."}, {"text": "Anchovies migrate to the western Pacific to follow the warm pool.", "isCorrect": false, "rationale": "Anchovies do not migrate across the Pacific. They depend on the upwelling zone off Peru, and when upwelling fails their populations collapse in place."}]}, {"question": "What feature of the western boundary current called the Gulf Stream most directly explains why Western Europe is roughly 5-10°C warmer than its latitude alone would suggest?", "options": [{"text": "The Gulf Stream and its extension (the North Atlantic Drift) transport vast quantities of tropical heat poleward, releasing warmth to the atmosphere over the eastern North Atlantic and warming Western Europe through prevailing westerlies.", "isCorrect": true, "rationale": "Western boundary currents like the Gulf Stream are fast, narrow, deep, and warm. They transport heat equivalent to about 1,300 times the total US electricity capacity from the tropics to the high latitudes, where the heat is released and carried inland over Europe by the prevailing westerlies."}, {"text": "Europe sits closer to the Sun than other continents at the same latitude.", "isCorrect": false, "rationale": "Distance from the Sun does not vary with longitude on a planetary scale. The mechanism is poleward oceanic heat transport, not solar geometry."}, {"text": "The North Atlantic has higher salinity than other oceans and absorbs more solar heat.", "isCorrect": false, "rationale": "Higher salinity actually contributes to the formation of dense water that sinks (driving thermohaline circulation), but salinity itself does not directly heat the European climate."}, {"text": "Hot springs along the European coast supply geothermal heat.", "isCorrect": false, "rationale": "Geothermal heat flux is far too small to account for a 5-10°C climatic anomaly across an entire continent. Oceanic heat transport via the Gulf Stream is the mechanism."}]}, {"question": "Upwelling zones — covering only a few percent of the ocean's surface area — host some of Earth's most productive fisheries. What property of upwelled water makes this possible?", "options": [{"text": "Upwelled water comes from depths where organic matter has sunk and been remineralized by decomposers, so it is rich in nitrate and phosphate; when brought to the lighted surface, this nutrient supply fuels phytoplankton growth and the entire food web above it.", "isCorrect": true, "rationale": "Most of the ocean is nutrient-limited at the surface — phytoplankton consume nutrients faster than they are resupplied. Upwelling delivers cold, nutrient-rich water from depth to the photic zone, supporting massive primary productivity and the fisheries dependent on it (Humboldt Current/Peru, California Current, Canary, Benguela)."}, {"text": "Upwelled water is warm, allowing rapid metabolic rates and fish growth.", "isCorrect": false, "rationale": "Upwelled water is cold, not warm. Its nutrient richness — not temperature — is what supports productivity."}, {"text": "Upwelled water has unusually high salinity, attracting fish for osmotic reasons.", "isCorrect": false, "rationale": "Upwelled water salinity is roughly typical of ocean water; it is not an osmotic attractor. The relevant property is nutrient content."}, {"text": "Upwelled water has elevated dissolved oxygen, supporting larger fish populations.", "isCorrect": false, "rationale": "Upwelled water typically has LOWER dissolved oxygen because deep water has been respired by decomposers. The driver of productivity is nutrient supply, not oxygen."}]}, {"question": "How does the Coriolis effect contribute to coastal upwelling along eastern ocean boundaries (e.g., off California or Peru)?", "options": [{"text": "Equatorward winds parallel to the coast push surface water; the Coriolis effect deflects this surface water OFFSHORE (to the right in NH, left in SH), and cold deep water rises to replace the displaced surface water.", "isCorrect": true, "rationale": "Ekman transport — the integrated effect of Coriolis on wind-driven surface water — is 90° to the right of wind direction in the Northern Hemisphere. Equatorward coastal winds drive net surface transport offshore, and the resulting divergence is balanced by upwelling from depth."}, {"text": "The Coriolis effect deflects surface water onshore, piling it up against the coast and forcing colder water to rise.", "isCorrect": false, "rationale": "The deflection is OFFSHORE in upwelling zones, not onshore. Onshore deflection would suppress upwelling, not produce it."}, {"text": "The Coriolis effect makes the wind blow stronger on eastern coasts.", "isCorrect": false, "rationale": "The Coriolis effect deflects motion; it does not amplify wind speed at particular coastlines."}, {"text": "Eastern coastal winds are absent because of the Coriolis effect.", "isCorrect": false, "rationale": "Equatorward winds are PRESENT along eastern boundaries (California, Peru, Namibia, Morocco), and their interaction with Coriolis is precisely what drives upwelling."}]}, {"question": "Under neutral (normal) conditions in the tropical Pacific, where is the warm pool of surface water located, and what wind system maintains its position?", "options": [{"text": "Near Indonesia and the Philippines (western Pacific); maintained by strong southeast/east trade winds that push warm equatorial surface water westward.", "isCorrect": true, "rationale": "Under normal conditions, easterly trade winds push warm surface water westward, piling up a warm pool over Indonesia/Philippines. This warm pool is roughly 8-9°C warmer than the eastern equatorial Pacific. The thermocline tilts upward toward the east, allowing cold upwelling near Peru."}, {"text": "In the central Pacific; maintained by polar easterlies blowing from north and south.", "isCorrect": false, "rationale": "The trade winds (not polar easterlies) drive the warm pool, and under neutral conditions the warm pool is in the western Pacific, not the center."}, {"text": "Off the coast of Peru; maintained by upwelling that delivers warm water to the surface.", "isCorrect": false, "rationale": "Upwelling brings COLD water to the surface, and the eastern Pacific (off Peru) is cool under neutral conditions, not warm. The warm pool is in the western Pacific."}, {"text": "Distributed evenly across the equator; maintained only by solar heating.", "isCorrect": false, "rationale": "Solar heating is roughly uniform along the equator, but trade winds redistribute the warm water westward, creating an east-west temperature asymmetry of about 8-9°C."}]}, {"question": "A student claims that La Nina events are simply the absence of El Nino and have no distinctive impacts. Which of the following correctly distinguishes La Nina from neutral conditions?", "options": [{"text": "During La Nina, trade winds intensify beyond normal, pushing the warm pool further west and intensifying eastern Pacific upwelling. Consequences include flooding in Australia and Indonesia, drought in California and Peru, and often more active Atlantic hurricane seasons due to reduced wind shear.", "isCorrect": true, "rationale": "La Nina is the opposite extreme from El Nino, not the absence of it. Strengthened trade winds, intensified upwelling, and eastward-displaced warm pool produce a distinctive pattern of teleconnections that includes flooding in Australia/Indonesia, drought in the Americas, and often more severe Atlantic hurricane seasons."}, {"text": "La Nina is the same as neutral conditions; the difference is only in temperature scale used to define it.", "isCorrect": false, "rationale": "La Nina is operationally defined by negative Nino 3.4 SST anomalies (cooler than neutral), and produces distinct global teleconnections. It is not the same as neutral conditions."}, {"text": "La Nina events occur only in the southern hemisphere and have no impact in the north.", "isCorrect": false, "rationale": "La Nina drives global teleconnections in both hemispheres, including effects on Atlantic hurricanes and North American winter weather."}, {"text": "La Nina events bring uniformly cool weather everywhere on Earth.", "isCorrect": false, "rationale": "La Nina creates regional anomalies, not uniform global cooling. Some regions are wetter, others drier; some warmer, others cooler — exactly the pattern one would expect from teleconnections."}]}, {"question": "Thermohaline circulation — the global conveyor belt — operates on a timescale of approximately 1,000 years per full circuit. What two physical properties drive this circulation?", "options": [{"text": "Temperature and salinity, which together control water density: cold and salty water sinks, while warm or fresh water rises. North Atlantic Deep Water formation in the Labrador and Greenland-Iceland-Norwegian seas drives the global conveyor.", "isCorrect": true, "rationale": "Thermohaline circulation is driven by density differences, which depend on temperature (thermo-) and salinity (-haline). Cold dense water sinks in the North Atlantic and around Antarctica; the global circuit returns water to the surface through upwelling in the Indo-Pacific."}, {"text": "Wind speed and direction, with no role for water density.", "isCorrect": false, "rationale": "Wind drives surface currents but thermohaline circulation operates below the wind-mixed layer and is density-driven, not wind-driven."}, {"text": "Tides and solar heating only.", "isCorrect": false, "rationale": "Tides and solar heating affect ocean dynamics but do not drive the deep, density-driven thermohaline circulation."}, {"text": "Magnetic field interactions with seawater.", "isCorrect": false, "rationale": "Magnetic interactions with seawater are negligible at this scale. Thermohaline circulation is driven by density differences from temperature and salinity."}]}, {"question": "The Younger Dryas event approximately 12,900 years ago plunged Europe into centuries of rapid cooling despite the otherwise warming post-glacial climate. Modern researchers attribute this event to disruption of which oceanic system?", "options": [{"text": "The Atlantic Meridional Overturning Circulation (AMOC), slowed or stopped by a massive influx of glacial meltwater that freshened the North Atlantic, reduced surface density, and prevented North Atlantic Deep Water formation.", "isCorrect": true, "rationale": "Massive pulses of glacial meltwater freshened the North Atlantic, reducing the salinity and density needed for surface water to sink. The collapse of AMOC cut off poleward heat transport to Europe, plunging the region into cold for ~1,200 years. This is foundational evidence for AMOC sensitivity and informs modern projections of future Greenland ice melt impacts."}, {"text": "Walker circulation, which collapsed during the Younger Dryas due to atmospheric methane.", "isCorrect": false, "rationale": "Walker circulation is a tropical Pacific phenomenon and was not the cause of European cooling 12,900 years ago. The mechanism was AMOC disruption from glacial meltwater."}, {"text": "ENSO cycling, which entered a permanent El Nino state for centuries.", "isCorrect": false, "rationale": "There is no evidence of permanent El Nino during the Younger Dryas, and El Nino does not drive European cooling. The driver was AMOC slowdown from meltwater influx."}, {"text": "The Antarctic Circumpolar Current, which reversed direction.", "isCorrect": false, "rationale": "The Antarctic Circumpolar Current did not reverse during the Younger Dryas. The driver was North Atlantic AMOC, not Southern Hemisphere circulation."}]}, {"question": "ENSO is described as producing teleconnections — statistically robust correlations between climate anomalies at widely separated geographic locations. What atmospheric mechanism makes a 1-3°C temperature anomaly in the equatorial Pacific able to alter weather thousands of kilometers away?", "options": [{"text": "The tropical Pacific thermal anomaly reshapes the jet stream pattern through stationary atmospheric waves, shifting storm tracks and precipitation anomalies far from the original source region.", "isCorrect": true, "rationale": "ENSO modifies tropical convection, which sends Rossby wave trains poleward through the atmosphere. These wave patterns shift the jet stream, displacing storm tracks and producing dry/wet anomalies thousands of kilometers from the tropical Pacific. This is the mechanism behind, for instance, El Nino-induced winter storms on the US Gulf Coast and drought in southern Africa."}, {"text": "The warm Pacific water physically flows to other ocean basins and warms them directly.", "isCorrect": false, "rationale": "Ocean basins are largely separated by continents; warm water cannot physically flow from the equatorial Pacific to East Africa or the Atlantic in a year. The teleconnection is atmospheric, not direct oceanic transport."}, {"text": "The ozone hole expands during El Nino events, redistributing heat globally.", "isCorrect": false, "rationale": "The ozone hole is a stratospheric phenomenon over Antarctica and is not the mechanism behind ENSO teleconnections."}, {"text": "Earth's orbital eccentricity shifts during El Nino, altering global solar input.", "isCorrect": false, "rationale": "Earth's orbital parameters are stable on year-to-year timescales and do not respond to ENSO. The mechanism is atmospheric wave propagation in the jet stream."}]}, {"question": "The 2015-16 and 2023-24 El Nino events exhibited unusually severe ecological impacts, including widespread coral bleaching on the Great Barrier Reef. What additional factor, beyond ENSO itself, has 'supercharged' recent ENSO events?", "options": [{"text": "Anthropogenic warming has raised the background ocean temperature, so when ENSO-driven warm anomalies occur on top of this elevated baseline, marine heat waves and coral bleaching become more severe even when the atmospheric ENSO amplitude itself is unchanged.", "isCorrect": true, "rationale": "ENSO is a natural mode of variability whose impacts depend on the climate baseline. Anthropogenic ocean warming raises that baseline, so the same ENSO temperature anomaly now triggers coral bleaching, marine heat waves, and ecological damage at higher frequencies and severities than in past decades."}, {"text": "The Coriolis effect has weakened over time, reducing the deflection of trade winds.", "isCorrect": false, "rationale": "The Coriolis effect is set by Earth's rotation rate and has not measurably changed. Anthropogenic ocean warming, not Coriolis change, is the supercharging factor."}, {"text": "ENSO events now occur every year, doubling their cumulative impact.", "isCorrect": false, "rationale": "ENSO retains its irregular 2-7 year period. The intensification is from background warming superimposed on ENSO, not from increased event frequency."}, {"text": "Methane releases from melting permafrost are now driving El Nino.", "isCorrect": false, "rationale": "Permafrost methane is a climate concern but is not the driver of El Nino. ENSO is driven by tropical Pacific ocean-atmosphere coupling, with anthropogenic warming amplifying its impacts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
