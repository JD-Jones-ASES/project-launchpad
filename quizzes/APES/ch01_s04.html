        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Biogeochemical Cycles II: Nitrogen and Phosphorus</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Atmospheric nitrogen (N2) constitutes about 78% of Earth's air, yet nitrogen is frequently the limiting nutrient in many ecosystems. What chemical fact BEST explains this paradox?", "options": [{"text": "N2 is too dense to be inhaled by plants.", "isCorrect": false, "rationale": "Density is irrelevant; plants do not 'inhale' nitrogen. They take up nitrogen as ions (NH4+, NO3-) through roots, not from the air."}, {"text": "The triple bond in N2 makes the molecule chemically inert and unavailable to most organisms; only specialized prokaryotes (and the Haber-Bosch process) can break it.", "isCorrect": true, "rationale": "The strong N≡N triple bond is energetically expensive to break. Only nitrogen-fixing prokaryotes — and industrial Haber-Bosch — can convert atmospheric N2 into usable forms (NH3, NH4+). This is why nitrogen frequently limits productivity despite atmospheric abundance."}, {"text": "N2 has the same chemical structure as CO2, and both are equally available to plants.", "isCorrect": false, "rationale": "N2 and CO2 differ in chemistry. CO2 is readily incorporated into organic matter via photosynthesis; N2 requires fixation by specialized organisms or industrial processes."}, {"text": "Nitrogen is rare on Earth, making it scarce in ecosystems.", "isCorrect": false, "rationale": "Nitrogen is abundant — 78% of the atmosphere. The scarcity is in available forms, not in total nitrogen."}], "id": "q01"}, {"question": "The five key transformations of the nitrogen cycle are nitrogen fixation, nitrification, assimilation, ammonification, and denitrification. Which step converts atmospheric N2 into ammonium (NH4+), and what organisms perform it?", "options": [{"text": "Nitrification, performed by Nitrosomonas and Nitrobacter bacteria.", "isCorrect": false, "rationale": "Nitrification is the oxidation of NH4+/NH3 to NO2- and then NO3-, performed by Nitrosomonas and Nitrobacter. It does not start from N2."}, {"text": "Nitrogen fixation, performed almost exclusively by specialized prokaryotes such as free-living Azotobacter and cyanobacteria, and mutualistic Rhizobium in legume root nodules.", "isCorrect": true, "rationale": "Nitrogen fixation breaks the N≡N triple bond and produces NH4+ (or NH3). The named bacteria are the textbook examples; lightning provides a small additional natural contribution; industrially, the Haber-Bosch process replicates the chemistry."}, {"text": "Ammonification, performed by all decomposers.", "isCorrect": false, "rationale": "Ammonification is the breakdown of organic nitrogen back to ammonium by decomposers. It does not start from atmospheric N2."}, {"text": "Denitrification, performed by anaerobic bacteria.", "isCorrect": false, "rationale": "Denitrification is the reverse — converting nitrate (NO3-) back to N2 under anaerobic conditions, closing the cycle. It does not start from N2."}], "id": "q02"}, {"question": "A student is asked to trace a nitrogen atom from atmospheric N2 through a legume plant, a rabbit that eats the plant, and back to the atmosphere. Which sequence of microbial processes correctly describes this path?", "options": [{"text": "N2 → fixation by Rhizobium in legume root nodules → assimilation into plant amino acids → consumption by rabbit (organic N in animal tissue) → death and ammonification by decomposers → nitrification to NO3- → denitrification to N2 under anaerobic conditions.", "isCorrect": true, "rationale": "This is the canonical AP-style trace. Each step is named with its microbial process: fixation, assimilation, ammonification, nitrification, and denitrification. Tracing the atom this way is exactly the kind of AP free-response prompt cited in the section."}, {"text": "N2 → photosynthesis → animal protein → respiration → N2.", "isCorrect": false, "rationale": "Photosynthesis fixes carbon, not nitrogen. Respiration releases CO2 and H2O, not N2. The full microbial cycle is omitted."}, {"text": "N2 → direct uptake by legume root → animal tissue → exhalation as N2.", "isCorrect": false, "rationale": "Plants cannot uptake N2 directly; nitrogen fixation is required. Animals do not exhale N2 to close the cycle. Denitrification by bacteria is the cycle-closing step."}, {"text": "N2 → lightning fixation only → plant uptake → rabbit consumption → urine returns N2 to atmosphere directly.", "isCorrect": false, "rationale": "Lightning is a small natural fixation source; biological fixation by Rhizobium dominates in legumes. Animal urine releases urea/ammonium, not N2. The atmosphere is replenished by denitrification, not excretion."}], "id": "q03"}, {"question": "Nitrate (NO3-) is highly water-soluble. What environmental consequence follows from this property?", "options": [{"text": "Nitrate is the most plant-available form of inorganic nitrogen but is also the most easily leached from agricultural soils into streams and groundwater.", "isCorrect": true, "rationale": "Nitrate's solubility makes it both highly bioavailable to plants and highly mobile in water. Excess fertilizer nitrate leaches into groundwater (drinking-water contamination) and runs off into surface water (eutrophication trigger)."}, {"text": "Nitrate is held tightly by soil particles and never moves.", "isCorrect": false, "rationale": "The opposite is true. Nitrate carries a negative charge that is poorly retained by negatively-charged clay surfaces; it moves readily with water."}, {"text": "Nitrate decomposes immediately on contact with water.", "isCorrect": false, "rationale": "Nitrate is stable in oxic water. It is removed only by plant uptake (assimilation) or microbial denitrification under anaerobic conditions."}, {"text": "Nitrate is converted to N2 by direct sunlight.", "isCorrect": false, "rationale": "Solar photolysis of nitrate is negligible compared to biological denitrification. The cycle's atmospheric return depends on anaerobic bacteria."}], "id": "q04"}, {"question": "Phosphorus has no significant atmospheric form. What does this absence imply about the structure of the phosphorus cycle compared with the carbon and nitrogen cycles?", "options": [{"text": "Phosphorus has no fast 'reset' mechanism analogous to nitrogen's denitrification or carbon's atmospheric exchange; the cycle operates on much longer timescales, dominated by lithospheric weathering and ocean-sediment burial.", "isCorrect": true, "rationale": "Without a gaseous phase, phosphorus cannot rapidly redistribute through the atmosphere. Its movement depends on slow rock weathering and ocean-sediment burial that may take millions of years before tectonic uplift exposes the rock again."}, {"text": "Phosphorus cycles entirely through the atmosphere just like nitrogen.", "isCorrect": false, "rationale": "Phosphorus has no significant atmospheric form. This is the central distinguishing feature of the phosphorus cycle."}, {"text": "Phosphorus cycles are identical in structure to carbon cycles in every respect.", "isCorrect": false, "rationale": "Carbon has a major atmospheric reservoir (CO2). Phosphorus does not. Their cycles are structurally different."}, {"text": "Phosphorus is constantly created in the atmosphere by lightning, like a small fraction of nitrogen.", "isCorrect": false, "rationale": "Lightning fixes some atmospheric N2 but does not produce phosphorus, which has no atmospheric source."}], "id": "q05"}, {"question": "Which of the following pairs CORRECTLY identifies the typically limiting nutrient in marine versus freshwater ecosystems and why this matters for managing eutrophication?", "options": [{"text": "Marine — nitrogen-limited; freshwater — phosphorus-limited. Reducing the limiting nutrient is the most efficient eutrophication-control strategy in each system.", "isCorrect": true, "rationale": "Liebig's law of the minimum applies: productivity is constrained by whichever nutrient is in shortest supply. Cutting nitrogen loading is the priority for coastal hypoxic zones; cutting phosphorus loading is the priority for freshwater algal blooms. The section explicitly states this difference."}, {"text": "Both marine and freshwater systems are nitrogen-limited; phosphorus is irrelevant.", "isCorrect": false, "rationale": "Phosphorus is typically the limiting nutrient in freshwater. Ignoring phosphorus management in lakes would miss the dominant lever."}, {"text": "Both marine and freshwater systems are phosphorus-limited; nitrogen is irrelevant.", "isCorrect": false, "rationale": "Nitrogen is typically limiting in marine systems. The Gulf of Mexico dead zone is driven by Mississippi River nitrogen loading, not phosphorus alone."}, {"text": "Marine — phosphorus-limited; freshwater — nitrogen-limited.", "isCorrect": false, "rationale": "These pairings are inverted. Marine = nitrogen; freshwater = phosphorus is the AP-canonical pairing."}], "id": "q06"}, {"question": "Eutrophication is the process by which a body of water becomes enriched in dissolved nutrients (especially N and P), supporting dense algal and plant growth. The Gulf of Mexico dead zone covers thousands of square kilometers each summer. Which sequence correctly describes the causal mechanism by which fertilizer runoff produces a hypoxic dead zone?", "options": [{"text": "Fertilizer runoff supplies N and P → explosive algal bloom → bloom dies and decomposes → bacterial respiration strips oxygen from the water → hypoxic conditions kill or displace fish and other animals.", "isCorrect": true, "rationale": "This is the canonical eutrophication-to-hypoxia mechanism. Each step is causally linked: nutrient loading drives bloom; bloom collapse fuels bacterial respiration; respiration depletes dissolved oxygen; aquatic animals cannot survive."}, {"text": "Fertilizer runoff increases water temperature, killing fish directly.", "isCorrect": false, "rationale": "Fertilizer runoff does not significantly raise water temperature. The mechanism is biological (bloom collapse and bacterial decomposition), not thermal."}, {"text": "Fertilizer runoff makes the water acidic, killing all aquatic life.", "isCorrect": false, "rationale": "Eutrophication can shift pH locally but the dominant mortality mechanism in dead zones is oxygen depletion, not acidification."}, {"text": "Fertilizer runoff produces toxins directly; oxygen levels remain normal.", "isCorrect": false, "rationale": "Some algal blooms produce toxins (HABs), but the section's central dead-zone mechanism is hypoxia from bacterial respiration following bloom collapse."}], "id": "q07"}, {"question": "Before industrial agriculture, global nitrogen fixation was roughly 100-140 Tg N/yr (Tg = teragram = 10^12 g). The Haber-Bosch process now adds ~120 Tg N/yr for fertilizer production. What does this comparison imply about human alteration of the nitrogen cycle?", "options": [{"text": "Human industrial fixation has roughly doubled the rate at which reactive nitrogen enters the biosphere — one of the most profound human alterations of any biogeochemical cycle.", "isCorrect": true, "rationale": "120 Tg/yr industrial fixation is comparable to the entire pre-industrial natural fixation rate (100-140 Tg/yr), so anthropogenic + natural now totals roughly twice the natural baseline. This near-doubling is exactly what the section labels 'perhaps no human activity has altered a biogeochemical cycle more profoundly than nitrogen fixation.'"}, {"text": "Human activity has made nitrogen scarce by removing it from the atmosphere.", "isCorrect": false, "rationale": "Atmospheric N2 is essentially unchanged by Haber-Bosch operations. The issue is that fixed (reactive) nitrogen in soils, water, and air has roughly doubled, not that atmospheric N2 has been depleted."}, {"text": "Human activity has reduced nitrogen fixation by a factor of two.", "isCorrect": false, "rationale": "Industrial fixation has added roughly as much new fixed nitrogen as natural sources, doubling the total — not halving it."}, {"text": "Human activity is irrelevant to global nitrogen fluxes because lightning still dominates fixation.", "isCorrect": false, "rationale": "Lightning fixation is small relative to biological and industrial fixation. The section explicitly states industrial fixation 'now rivals all natural fixation combined.'"}], "id": "q08"}, {"question": "Phosphorus is described as a 'rare case of a nutrient whose long-term supply is genuinely finite.' Which combination of facts BEST justifies this assessment?", "options": [{"text": "Phosphate rock is a non-renewable resource mined primarily in Morocco, China, and Florida; estimates of recoverable reserves range from a few decades to a few centuries; and there is no technological substitute for phosphorus in agriculture.", "isCorrect": true, "rationale": "All three statements are direct from the section. The combination — finite reserves, geopolitical concentration, and no substitute — is what makes phosphorus uniquely concerning for long-term agricultural supply."}, {"text": "Phosphate rock is renewable on decadal timescales.", "isCorrect": false, "rationale": "Phosphate rock formation requires geological timescales (millions of years). It is non-renewable on any human timescale relevant to agricultural planning."}, {"text": "Phosphorus can be synthesized by industrial processes like nitrogen via Haber-Bosch.", "isCorrect": false, "rationale": "There is no industrial analog to Haber-Bosch for phosphorus. Nitrogen has an inexhaustible atmospheric source for industrial fixation; phosphorus has no atmospheric reservoir."}, {"text": "Phosphorus can be replaced by potassium in plant nutrition.", "isCorrect": false, "rationale": "Potassium and phosphorus serve different metabolic roles in plants (potassium in osmotic balance and enzyme function; phosphorus in ATP, DNA, RNA, phospholipids). They are not interchangeable."}], "id": "q09"}, {"question": "A limiting nutrient is the nutrient whose availability exerts the greatest control over the rate of primary production. Which prediction follows DIRECTLY from this definition for a freshwater lake where phosphorus is the limiting nutrient?", "options": [{"text": "Adding phosphorus to the lake will increase primary production; adding nitrogen alone will have little effect; reducing phosphorus loading is the most effective way to control eutrophication.", "isCorrect": true, "rationale": "By definition, the limiting nutrient controls productivity. Adding it raises production; adding non-limiting nutrients has minimal effect. The management implication — target the limiting nutrient — follows logically."}, {"text": "Adding nitrogen to the lake will produce a larger algal bloom than adding phosphorus.", "isCorrect": false, "rationale": "If phosphorus is limiting, adding nitrogen alone will not stimulate productivity; only adding phosphorus (or both) will."}, {"text": "Adding any nutrient — phosphorus, nitrogen, or others — will produce identical results.", "isCorrect": false, "rationale": "The whole point of a limiting nutrient is that one specific nutrient dominates productivity response. Identical results from any nutrient would contradict the definition."}, {"text": "Removing phosphorus would have no effect because nitrogen is the only relevant nutrient.", "isCorrect": false, "rationale": "If phosphorus is limiting, removing it should reduce productivity substantially. Nitrogen would not become a relevant control until phosphorus had been added."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
