<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Watersheds, Solar Radiation, and Earth&#x27;s Seasons</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A fertilizer application on an Iowa farm in mid-spring is followed by a heavy rain event two days later. Within weeks, downstream water-quality monitors record elevated nitrate concentrations all the way to the Gulf of Mexico, contributing to the seasonal hypoxic 'dead zone.' Which concept best explains why agricultural decisions hundreds of kilometers from the coast can affect Gulf water quality?", "options": [{"text": "The Coriolis effect deflects fertilizer plumes southward across state lines.", "isCorrect": false, "rationale": "The Coriolis effect deflects free-moving fluids on rotating Earth but does not steer dissolved pollutants through a river system. Drainage geometry, not Coriolis, links the Iowa farm to the Gulf."}, {"text": "All surface runoff and dissolved materials within a watershed eventually flow to the same outlet, regardless of political boundaries; the Iowa farm sits within the Mississippi River watershed, which drains to the Gulf of Mexico.", "isCorrect": true, "rationale": "A watershed is defined by topographic divides, not political lines. The Mississippi watershed covers ~3.2 million km^2 across 31 states and 2 Canadian provinces. Every drop of runoff inside the basin — and the nitrates dissolved in it — eventually exits at the Gulf of Mexico, where they fuel the hypoxic dead zone."}, {"text": "Groundwater flows quickly enough to carry nitrate from Iowa to the Gulf in two weeks.", "isCorrect": false, "rationale": "Groundwater moves on year-to-millennial timescales, not weeks. The fast pathway from a fertilized field to a downstream monitor is surface runoff through the river network, not groundwater."}, {"text": "Atmospheric deposition transports nitrate from Iowa to the Gulf by prevailing winds.", "isCorrect": false, "rationale": "Some nitrogen does cycle through the atmosphere, but the Mississippi-basin nitrate-to-Gulf signal is dominated by riverine transport of dissolved fertilizer, not atmospheric deposition."}]}, {"question": "The Ogallala (High Plains) Aquifer is recharged at roughly 1-3 cm/yr in most areas, but agricultural withdrawals in heavy-irrigation zones reach 30-60 cm/yr. Water tables have dropped 30 m or more in parts of Kansas, Texas, and Oklahoma since the 1950s. What term best describes the way this resource is being used?", "options": [{"text": "Sustainable yield management — extraction rates are calibrated to natural recharge.", "isCorrect": false, "rationale": "Sustainable yield requires withdrawals at or below recharge. Ogallala withdrawals exceed recharge by an order of magnitude, which is by definition NOT sustainable."}, {"text": "Renewable resource use — groundwater is replaced as fast as it is extracted.", "isCorrect": false, "rationale": "Groundwater that takes thousands of years to accumulate is not 'renewable' on human timescales when withdrawn at rates 10-60x faster than recharge. Groundwater is functionally non-renewable in this case."}, {"text": "Fossil water depletion — millennia of accumulated water are being mined faster than they recharge, converting a renewable-in-theory resource into a non-renewable one on human timescales.", "isCorrect": true, "rationale": "Fossil water describes groundwater accumulated under past wetter climates being extracted today at rates far exceeding recharge. The Ogallala is the canonical example: thousands of years of Pleistocene-era recharge depleted in decades of intensive irrigation."}, {"text": "Aquifer salinization — dissolved salts are accumulating in the aquifer and reducing its volume.", "isCorrect": false, "rationale": "Salinization is a soil and irrigation-water issue, not what's happening to the Ogallala. The Ogallala is being depleted by overdraft, not contaminated by salt accumulation."}]}, {"question": "Of the ~342 W/m^2 of solar radiation arriving at the top of Earth's atmosphere, approximately what happens to it on average?", "options": [{"text": "About 10% is reflected by clouds and the surface; the remaining 90% is absorbed by the atmosphere.", "isCorrect": false, "rationale": "Atmospheric absorption is ~20%, not 90%. The figures here misallocate where the energy goes."}, {"text": "About 30% is reflected back to space, ~20% is absorbed by the atmosphere, and ~50% is absorbed at the surface.", "isCorrect": true, "rationale": "These are the standard solar-radiation-budget partitions: 30% reflected (effective albedo ~0.30 — clouds reflect ~20%, the surface ~10%), 20% atmospheric absorption (water vapor, dust, ozone, clouds), and 50% surface absorption that drives evaporation, photosynthesis, and the thermal emissions trapped by greenhouse gases."}, {"text": "100% is absorbed by the atmosphere and re-emitted to space; none reaches the surface directly.", "isCorrect": false, "rationale": "About half of incoming solar radiation reaches and heats the surface — that absorbed surface energy is what drives climate, weather, and life. Without surface absorption, photosynthesis and surface warming could not occur."}, {"text": "About 30% is absorbed by the atmosphere, 50% reflected to space, 20% absorbed at the surface.", "isCorrect": false, "rationale": "These percentages reverse Earth's actual solar budget. Most reflected energy comes from clouds and surface, not absorbed-then-re-emitted radiation."}]}, {"question": "A region of boreal forest (albedo ~0.10) is clearcut and the area gradually converts to open grassland (albedo ~0.20). Holding all else equal, what is the most direct local climate effect predicted by the albedo data alone?", "options": [{"text": "Local warming, because grassland reflects more radiation back to space and that reflected energy heats the surrounding atmosphere.", "isCorrect": false, "rationale": "Reflected radiation escapes to space rather than warming the surrounding atmosphere. Higher albedo means less surface absorption, not more atmospheric heating."}, {"text": "Local cooling, because the higher-albedo grassland reflects more incoming solar radiation back to space, leaving less energy absorbed at the surface.", "isCorrect": true, "rationale": "Albedo ~0.20 grassland reflects roughly twice as much incoming radiation as ~0.10 boreal forest. With less energy absorbed locally, surface temperatures fall. This is why boreal-forest albedo effects can locally offset the carbon-uptake cooling benefit of forest, complicating climate-policy framings."}, {"text": "No change, because albedo affects only the upper atmosphere, not surface temperature.", "isCorrect": false, "rationale": "Albedo determines what fraction of solar radiation is reflected vs. absorbed at the surface. It directly controls surface energy budget and therefore surface temperature."}, {"text": "Strong warming, because removing trees releases carbon dioxide that warms the local atmosphere immediately.", "isCorrect": false, "rationale": "Carbon-driven warming acts globally and over years to decades, not locally and immediately. The question asks specifically about the albedo effect, which produces local cooling."}]}, {"question": "A geographer claims that summer in the Northern Hemisphere occurs in June because Earth is closer to the Sun then. What is the correct geophysical explanation for the seasons?", "options": [{"text": "Earth is closer to the Sun in June than in December; the increased solar radiation produces summer.", "isCorrect": false, "rationale": "This is the opposite of the truth. Earth is actually slightly closer to the Sun in January (perihelion) and farther in July (aphelion). Distance variation is only ~3% — too small to explain the seasonal cycle."}, {"text": "Earth's axis is tilted 23.5 degrees relative to its orbital plane. In June, the Northern Hemisphere tilts toward the Sun, so solar rays strike at a higher angle (more concentrated energy per area) and days are longer (more total daylight hours), producing summer.", "isCorrect": true, "rationale": "Seasons result from axial tilt, not orbital distance. Two effects combine: solar angle (concentration of energy per area) and day length (total energy delivered). Both are maximized in the hemisphere tilted toward the Sun, producing summer simultaneously while the opposite hemisphere experiences winter."}, {"text": "Earth's orbit is highly elliptical; the difference between perihelion and aphelion is ~30%, producing summer near perihelion.", "isCorrect": false, "rationale": "Earth's orbit is nearly circular — the perihelion-aphelion difference is only ~3%. Even if larger, simple distance effects would not produce opposite seasons in opposite hemispheres simultaneously, which is a hallmark of axial-tilt-driven seasons."}, {"text": "The Sun emits more radiation in June than December.", "isCorrect": false, "rationale": "Solar output is approximately constant on annual timescales. Variation in solar luminosity is far too small to drive Earth's seasonal cycle."}]}, {"question": "Arctic sea ice (albedo ~0.60) is melting and being replaced by open ocean water (albedo ~0.07). What feedback mechanism does this illustrate?", "options": [{"text": "A negative feedback that stabilizes Arctic temperatures, because dark water absorbs less radiation than ice.", "isCorrect": false, "rationale": "Dark water absorbs MORE radiation than ice, not less. The feedback is positive (amplifying), not negative (stabilizing)."}, {"text": "A positive (amplifying) ice-albedo feedback: melted ice exposes darker water (lower albedo), which absorbs more solar radiation, warming the ocean further, which melts more ice, etc.", "isCorrect": true, "rationale": "Ice-albedo feedback is one of the canonical climate amplifiers. As warming reduces sea ice, the exposed open water has albedo ~0.07 vs. ice at ~0.60. The dark water absorbs roughly 9x more solar energy per unit area, accelerating local warming and further ice loss. This is a primary reason Arctic warming runs 2-4x faster than global average."}, {"text": "A neutral exchange: the energy absorbed by water is balanced by energy reflected from clouds.", "isCorrect": false, "rationale": "There is no balancing mechanism that cancels the ice-albedo amplification. Cloud cover is itself responsive to surface temperatures and ice extent and does not generally cancel the feedback."}, {"text": "A photosynthetic feedback: marine algae bloom in newly exposed water, sequestering carbon and cooling the climate.", "isCorrect": false, "rationale": "Some algal-bloom carbon uptake does occur, but it is small relative to the radiative effect of replacing ice with open water. The dominant signal is the ice-albedo positive feedback."}]}, {"question": "On the equinoxes (~March 21 and September 22), what is true about solar geometry?", "options": [{"text": "The Sun's rays strike perpendicularly at the Tropic of Cancer (23.5 degrees N).", "isCorrect": false, "rationale": "Perpendicular insolation at the Tropic of Cancer occurs at the June solstice, not the equinoxes."}, {"text": "The Sun's rays strike perpendicularly at the equator, and day and night are approximately equal in length across the globe.", "isCorrect": true, "rationale": "An equinox is the moment when the Sun crosses the celestial equator. Solar rays strike perpendicular at the equator, the Sun rises due east and sets due west, and day and night are approximately 12 hours each at every latitude. Equinoxes mark the seasonal transitions between summer/winter and fall/spring."}, {"text": "The Sun does not rise above the horizon in the polar regions.", "isCorrect": false, "rationale": "Polar night occurs at the winter solstice, not the equinoxes. At the equinoxes, the Sun rises and sets normally even at the poles."}, {"text": "Earth is at perihelion in its orbit.", "isCorrect": false, "rationale": "Perihelion is in early January, near the December solstice — not at either equinox. Equinoxes are defined by Earth's tilt geometry relative to the Sun, not orbital distance."}]}, {"question": "An undeveloped watershed in the upper Midwest is mostly forested. A developer proposes converting 40% of it to suburban housing with roads, driveways, and parking lots. Which pair of hydrological consequences is most directly predicted by this land-use change?", "options": [{"text": "Higher peak storm runoff (because impervious surfaces shed water immediately) and reduced groundwater recharge (because infiltration is blocked by pavement).", "isCorrect": true, "rationale": "Impervious surfaces (asphalt, rooftops, concrete) prevent precipitation from infiltrating into the soil, sending it instead directly into storm sewers and streams. Two hydrologic consequences follow inevitably: peak streamflow during storms increases (more 'flashy' floods) while baseflow during dry periods decreases (because groundwater is no longer being recharged from the developed area)."}, {"text": "Lower peak storm runoff (because suburbs trap more water than forests) and increased groundwater recharge (because lawns absorb more than trees).", "isCorrect": false, "rationale": "This reverses the actual effects. Forests have far higher infiltration rates than suburban lawns, and impervious surfaces reduce — not increase — both infiltration and groundwater recharge."}, {"text": "Increased evapotranspiration and decreased surface runoff, because suburban vegetation transpires more water than forest.", "isCorrect": false, "rationale": "Forests transpire substantially more water than suburban lawns and impervious surfaces. Conversion to suburbs reduces evapotranspiration, not increases it."}, {"text": "No measurable hydrological change, because watershed geometry is fixed.", "isCorrect": false, "rationale": "Land cover within a fixed watershed boundary dramatically alters hydrology — peak flows, baseflow, infiltration, and water quality all change with development. The watershed boundary is geometric, but what happens inside it is not."}]}, {"question": "Confined aquifers and unconfined aquifers differ in how they receive recharge and how they yield water. Which statement is TRUE about confined aquifers?", "options": [{"text": "Confined aquifers are bounded above by an impermeable aquitard; they recharge slowly only where the aquifer outcrops at the surface, but pressure from elevated recharge zones can produce artesian flow when wells are drilled in.", "isCorrect": true, "rationale": "Confined aquifers are 'sandwiched' beneath an impermeable aquitard, so direct recharge from above is blocked. They recharge primarily where the aquifer formation outcrops far from the well location. Pressure transmitted from those elevated outcrops can be high enough that water rises to or above the land surface when a well is drilled — artesian flow."}, {"text": "Confined aquifers recharge instantaneously from precipitation directly above the wellhead.", "isCorrect": false, "rationale": "This describes an unconfined aquifer, not a confined one. The defining feature of a confined aquifer is the overlying impermeable layer that blocks direct recharge from above."}, {"text": "Confined aquifers cannot store groundwater because the aquitard prevents water from entering.", "isCorrect": false, "rationale": "Confined aquifers store substantial water — they are recharged at distant outcrops and held under pressure by the aquitard. Some of the world's largest aquifers (Ogallala portions, Great Artesian Basin in Australia) have confined sections."}, {"text": "Confined aquifers always have lower water quality than unconfined aquifers.", "isCorrect": false, "rationale": "Water quality depends on geology and contamination history, not on confinement. Confined aquifers are often less vulnerable to surface contamination because the aquitard blocks direct infiltration of pollutants from above."}]}, {"question": "Which best explains why latitudes around 0 degrees and 60 degrees tend to have abundant freshwater recharge, while latitudes around 30 degrees and the poles tend to be dry?", "options": [{"text": "Random distribution of rainfall around the planet — there is no systematic pattern.", "isCorrect": false, "rationale": "Earth's precipitation is highly structured by atmospheric circulation, not random. The latitude-based pattern is one of the most robust features of global climate."}, {"text": "Plate tectonics happens to place mountains in those zones, randomly creating wet and dry belts.", "isCorrect": false, "rationale": "Mountains produce orographic effects locally, but the global wet-dry latitude pattern is fundamentally driven by atmospheric circulation cells, not tectonic geography."}, {"text": "Air rises at 0 degrees (ITCZ) and 60 degrees (Ferrel/Polar boundary), cooling adiabatically and condensing moisture as precipitation; air descends at 30 degrees (Hadley descent) and the poles, warming adiabatically and inhibiting precipitation.", "isCorrect": true, "rationale": "Where air rises, it cools and loses moisture as precipitation: ITCZ at 0 degrees produces tropical rainforests, and the Ferrel-Polar convergence at ~60 degrees produces temperate/boreal forests. Where air descends, it warms and dries: subsidence at ~30 degrees creates Earth's great desert belt (Sahara, Arabian, Sonoran, Australian outback). The pole is also a descent zone, hosting cold deserts."}, {"text": "Ocean currents alone determine continental rainfall — atmospheric circulation has no role.", "isCorrect": false, "rationale": "Ocean currents matter (e.g., Humboldt Current contributes to Atacama dryness), but the dominant driver of latitudinal precipitation patterns is atmospheric circulation — Hadley/Ferrel/Polar cells and the rising/sinking branches that define convergent and divergent zones."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
