    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Global Wind, the Coriolis Effect, and Hadley Cells</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Sahara Desert lies at approximately 25°N latitude rather than at the equator, despite the equator receiving more direct solar radiation. Using the three-cell model, what mechanism best explains the latitudinal placement of the Sahara and other major deserts?", "options": [{"text": "Air rising at the equatorial ITCZ flows poleward at altitude, cools, and descends at approximately 30°N. This descending air warms adiabatically, increasing its capacity to hold water vapor and suppressing precipitation — the subtropical high-pressure belt creates Earth's deserts.", "isCorrect": true, "rationale": "Hadley cell descent at ~30° latitude in both hemispheres produces the subtropical high-pressure belt. Adiabatic warming dries the air, and the resulting subsidence inhibits precipitation. The world's great deserts — Sahara, Kalahari, Arabian, Sonoran, Australian — all sit on this belt."}, {"text": "The equator's intense rainfall washes away vegetation and soil, preventing forests from growing.", "isCorrect": false, "rationale": "The equator hosts tropical rainforests, not deserts; deserts form where descending dry air suppresses precipitation, not where intense rain occurs."}, {"text": "Major deserts form where ocean currents bring cold water inland, freezing precipitation.", "isCorrect": false, "rationale": "Cold ocean currents can amplify aridity along coasts (Atacama), but they cannot account for the broad latitudinal positioning of all 30° deserts."}, {"text": "The Coriolis effect deflects all moisture northward at low latitudes, depriving the equator of rain.", "isCorrect": false, "rationale": "The Coriolis effect deflects motion left or right relative to direction of travel; it does not selectively transport moisture to one hemisphere or remove rain from the equator."}]}, {"question": "A weather system moves eastward across the Rocky Mountains from the Pacific. The western slopes receive 2,000 mm of annual precipitation; the eastern plains receive 350 mm. What atmospheric mechanism is responsible for this contrast?", "options": [{"text": "Orographic lift on the windward (western) side cools rising air adiabatically, condensing moisture as precipitation; on the leeward (eastern) side, the air descends and warms adiabatically, increasing its moisture-holding capacity and suppressing precipitation — the rain shadow effect.", "isCorrect": true, "rationale": "Rain shadows operate by adiabatic cooling on the windward and warming on the leeward side of mountain ranges. The same mechanism produces the Atacama (leeward of the Andes), eastern Washington shrub steppe (leeward of Cascades), and Gobi (north of Tibetan Plateau)."}, {"text": "The Coriolis effect deflects clouds eastward, leaving the leeward side dry.", "isCorrect": false, "rationale": "The Coriolis effect does not selectively divert clouds; it deflects free-flowing air. Rain shadows are produced by orographic lift and adiabatic warming on descent."}, {"text": "The eastern plains have darker soil and absorb more heat, preventing rainfall.", "isCorrect": false, "rationale": "Soil color does not control regional precipitation patterns at this scale. The mechanism is atmospheric (orographic lift and adiabatic processes)."}, {"text": "Wind speeds are slower on the leeward side, so storms cannot organize.", "isCorrect": false, "rationale": "Wind speeds may differ slightly across mountain ranges but the dominant cause of the rain shadow is the moisture-removal during ascent and the warming/drying on descent, not wind speed."}]}, {"question": "How does the Coriolis effect convert the equatorward surface return flow of the Northern Hemisphere Hadley cell into the northeast trade winds?", "options": [{"text": "Air flowing southward from approximately 30°N is deflected to the right of its motion, producing a wind that originates from the northeast and blows toward the southwest.", "isCorrect": true, "rationale": "In the Northern Hemisphere, the Coriolis effect deflects free-moving objects (including air) to the right of their direction of motion. Air flowing south at the surface from 30°N is deflected rightward (westward), producing surface winds that come FROM the northeast — hence 'northeast trade winds'."}, {"text": "Air flowing south is deflected to the left, producing northwest trade winds.", "isCorrect": false, "rationale": "Northern Hemisphere deflection is to the right, not left. Leftward deflection occurs in the Southern Hemisphere."}, {"text": "Trade winds are caused by ocean currents that drag air with them.", "isCorrect": false, "rationale": "Trade winds drive ocean surface currents, not the reverse. The wind belts originate from atmospheric pressure gradients and Coriolis deflection."}, {"text": "Trade winds are upper-level westerlies funneled to the surface.", "isCorrect": false, "rationale": "Trade winds are surface return flow in the Hadley cell. The westerlies are surface flow in the Ferrel cell at higher latitudes."}]}, {"question": "An airliner flying westward from New York to San Francisco typically takes longer than the eastward return flight. Which atmospheric feature explains this difference?", "options": [{"text": "The mid-latitude westerlies blow predominantly from west to east, providing a tailwind for eastbound flights and a headwind for westbound flights.", "isCorrect": true, "rationale": "In both Northern and Southern Hemisphere mid-latitudes, the surface poleward flow of the Ferrel cell is deflected by Coriolis into westerly winds. These wind belts drive storms eastward across continents and add or subtract from aircraft ground speed depending on flight direction."}, {"text": "The Coriolis effect is stronger flying west than flying east.", "isCorrect": false, "rationale": "The Coriolis effect depends on speed and latitude, not on aircraft heading. The asymmetry in flight times is due to prevailing wind direction (westerlies), not Coriolis force."}, {"text": "Mountains slow westbound aircraft more than eastbound.", "isCorrect": false, "rationale": "Mountains affect both directions equally. The flight-time asymmetry comes from the prevailing west-to-east wind belt at flight altitudes."}, {"text": "Eastward flights gain energy from Earth's rotation.", "isCorrect": false, "rationale": "Aircraft rotate with Earth and do not gain or lose energy from Earth's rotation in this way. The driver is the prevailing westerly winds in the mid-latitude jet stream."}]}, {"question": "Which of the following correctly describes the location and characteristics of the Intertropical Convergence Zone (ITCZ)?", "options": [{"text": "Located near the equator (approximately 0° latitude); a zone of low surface pressure with rising warm, moist air, towering cumulonimbus clouds, heavy rainfall, and surface calms (the historical \"doldrums\"). Tropical rainforests cluster in this belt.", "isCorrect": true, "rationale": "The ITCZ is the surface convergence point of the trade winds and the rising branch of the Hadley cells. It produces the high precipitation that supports tropical rainforests and shifts seasonally with solar heating."}, {"text": "Located at 30° latitude; a zone of descending dry air responsible for desert formation.", "isCorrect": false, "rationale": "Descending dry air at 30° produces the subtropical high-pressure belt and Earth's deserts — the opposite of the ITCZ, which lies near the equator and produces rainforests."}, {"text": "Located at 60° latitude; a zone of polar high pressure where cold air sinks.", "isCorrect": false, "rationale": "Cold air sinks in the polar cells (poles, around 90°), and the sub-polar low is at ~60°. Neither corresponds to the equatorial ITCZ."}, {"text": "Located at the poles; a zone of intense polar precipitation.", "isCorrect": false, "rationale": "The poles host the polar high-pressure zones where cold dense air sinks, producing very low precipitation — not high precipitation as at the ITCZ."}]}, {"question": "Two adjacent regions are separated by a tall mountain range. The windward side of the range receives substantial rainfall and supports temperate rainforest, while the leeward side is a high desert. Which sequence correctly orders the air's adiabatic processes from windward to leeward?", "options": [{"text": "Rising air cools adiabatically and condenses moisture as precipitation; descending air warms adiabatically, increasing its capacity to hold water vapor and suppressing precipitation.", "isCorrect": true, "rationale": "Orographic lift forces air upward, where it expands and cools, dropping its moisture as precipitation on the windward side. As it descends on the leeward side, compression warms it, increasing its moisture-holding capacity and producing the dry rain-shadow climate."}, {"text": "Rising air warms adiabatically; descending air cools adiabatically.", "isCorrect": false, "rationale": "This reverses the actual adiabatic processes. Rising air cools; descending air warms."}, {"text": "The Coriolis force deflects rain to the leeward side and away from the windward.", "isCorrect": false, "rationale": "The Coriolis effect does not relocate rain across mountain ranges. The rain shadow is produced by adiabatic cooling and warming on the windward and leeward sides."}, {"text": "The mountain range generates fog that suppresses rain on the windward side.", "isCorrect": false, "rationale": "Mountains can generate orographic fog locally but the dominant effect is heavy windward precipitation, not fog-driven dryness."}]}, {"question": "The Coriolis effect deflects free-moving air to the right in the Northern Hemisphere and to the left in the Southern Hemisphere. Where on Earth is the Coriolis effect zero, and where is it maximum?", "options": [{"text": "Zero at the equator; maximum at the poles. The deflection is proportional to the sine of latitude.", "isCorrect": true, "rationale": "The Coriolis force is proportional to sin(latitude). At the equator, sin(0°) = 0, so freely moving objects are not deflected. At the poles, sin(90°) = 1, where the effect is maximum. This is why hurricanes do not form in the immediate vicinity of the equator."}, {"text": "Zero at the poles; maximum at the equator.", "isCorrect": false, "rationale": "This reverses the latitudinal pattern. The Coriolis effect is zero at the equator and maximum at the poles."}, {"text": "Constant across all latitudes.", "isCorrect": false, "rationale": "The Coriolis effect varies with latitude — that is why hurricanes can form in tropical latitudes (5-30°) but not at the equator."}, {"text": "Zero at 30° latitude; maximum at the equator.", "isCorrect": false, "rationale": "30° latitude is the descending branch of the Hadley cell, but the Coriolis effect is not zero there. Zero deflection occurs at the equator."}]}, {"question": "Saharan dust plumes travel westward across the Atlantic Ocean each summer, fertilizing Atlantic phytoplankton and the Amazon rainforest with mineral dust including iron and phosphorus. Which prevailing wind belt drives this dust transport?", "options": [{"text": "The northeast trade winds — surface return flow of the Northern Hemisphere Hadley cell deflected to the right by the Coriolis effect.", "isCorrect": true, "rationale": "The persistent westward transport across the tropical Atlantic is driven by the northeast trades. The same wind system that historically carried sailing ships from Europe to the Americas now delivers an estimated 0.1-0.4 billion tonnes of Saharan dust annually to the Atlantic and Amazon basin."}, {"text": "The mid-latitude westerlies, which blow from west to east.", "isCorrect": false, "rationale": "The westerlies blow eastward in the mid-latitudes (40-60°), the wrong direction for transport from West Africa to the Caribbean."}, {"text": "The polar easterlies, which deliver dust from the Arctic.", "isCorrect": false, "rationale": "The polar easterlies are weak winds at high latitudes and could not carry Saharan dust across the tropical Atlantic."}, {"text": "The southeast trade winds, which blow from west to east in the Southern Hemisphere.", "isCorrect": false, "rationale": "The southeast trades are in the Southern Hemisphere; the Sahara lies in the Northern Hemisphere, where the northeast trades dominate."}]}, {"question": "The three-cell model includes a Ferrel cell between approximately 30° and 60° latitude, which is described as a \"thermally indirect\" cell. What does this mean?", "options": [{"text": "The Ferrel cell is mechanically driven by the Hadley and Polar cells flanking it rather than directly by temperature contrasts; its surface flow goes from the cooler subtropical high to the warmer sub-polar low — opposite of what direct heating would predict.", "isCorrect": true, "rationale": "Hadley and Polar cells are thermally direct (driven directly by surface heating). The Ferrel cell, sandwiched between them, is mechanically driven and weaker, with surface flow that is opposite to a simple thermal expectation. This makes it less stable and more prone to wave-like disturbances (storms)."}, {"text": "The Ferrel cell's air flows in the opposite direction at the surface and aloft, indicating a complete reversal of the Hadley pattern.", "isCorrect": false, "rationale": "Both the Ferrel and Hadley cells have opposite directions at surface and aloft (this is what makes them convective cells). The 'thermally indirect' description refers to the cell's driving mechanism, not its vertical structure."}, {"text": "The Ferrel cell only exists in the Northern Hemisphere.", "isCorrect": false, "rationale": "The Ferrel cell exists in both hemispheres at the corresponding mid-latitudes."}, {"text": "The Ferrel cell is weaker than the others because it is in the Southern Hemisphere only.", "isCorrect": false, "rationale": "The Ferrel cell is weaker than the Hadley or Polar cells, but the reason is that it is thermally indirect — driven by mechanical interaction with neighboring cells, not by direct temperature contrasts."}]}, {"question": "How does an equatorward surface return flow in the Southern Hemisphere Hadley cell become deflected by the Coriolis effect, and what wind direction results?", "options": [{"text": "Air flowing northward (toward the equator) is deflected to the LEFT in the Southern Hemisphere, producing southeast trade winds — winds originating from the southeast and blowing toward the northwest.", "isCorrect": true, "rationale": "Southern Hemisphere Coriolis deflection is to the left. Northward equatorward flow deflected leftward becomes a westward and equatorward wind, which by convention is named for its origin (southeast) — hence 'southeast trades'."}, {"text": "Air is deflected to the right, producing northeast trade winds in both hemispheres.", "isCorrect": false, "rationale": "Coriolis deflection is to the right ONLY in the Northern Hemisphere. In the Southern Hemisphere it is to the left, producing southeast (not northeast) trade winds."}, {"text": "There is no Coriolis deflection in the Southern Hemisphere.", "isCorrect": false, "rationale": "Coriolis deflection occurs in both hemispheres, with opposite sign. It is zero only at the equator."}, {"text": "The deflection in the Southern Hemisphere is the same as in the Northern Hemisphere; both produce northeast trades.", "isCorrect": false, "rationale": "The deflections are MIRROR images. Northern Hemisphere produces northeast trades; Southern Hemisphere produces southeast trades."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
