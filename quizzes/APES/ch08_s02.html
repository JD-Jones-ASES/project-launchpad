<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Cultural Eutrophication and Hypoxic Dead Zones</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which sequence correctly traces the mechanism by which excess nitrogen fertilizer applied to an Iowa cornfield converts to a hypoxic dead zone in the Gulf of Mexico?", "options": [{"text": "Nutrient loading → algal bloom → light attenuation kills SAV → algal die-off → bacterial decomposition consumes DO → hypoxia and fish kills.", "isCorrect": true, "rationale": "This is the six-step pathway from agricultural field to hypoxic coastal water. Nitrogen and phosphorus inputs trigger explosive phytoplankton growth; dense surface mats shade and kill submerged aquatic vegetation; when blooms collapse, vast quantities of dead algal biomass sink and aerobic bacteria decompose them, consuming dissolved oxygen faster than re-aeration can replace it; below 2 mg/L DO, mobile organisms flee and sessile organisms die."}, {"text": "Nutrient loading → instant fish kills from chemical toxicity → algal bloom in deoxygenated water → recovery within days.", "isCorrect": false, "rationale": "Eutrophication does not work through direct chemical toxicity to fish. The mechanism is indirect: nutrients fuel algal blooms whose subsequent decomposition consumes oxygen, and the process unfolds over weeks to months, not days."}, {"text": "Bacterial decomposition → algal bloom → nutrient loading → hypoxia.", "isCorrect": false, "rationale": "This reverses the causal sequence. Nutrient loading drives the cascade; bacterial decomposition occurs after the algal bloom collapses, not before."}, {"text": "Light attenuation → reduced photosynthesis raises DO → algal bloom exhausts DO directly during growth phase.", "isCorrect": false, "rationale": "Algae produce O₂ during active photosynthesis, increasing daytime DO. Hypoxia develops after the bloom collapses, when bacterial decomposers consume DO during decay. The first half of this sequence reverses the actual gas exchange."}]}, {"question": "A river receives no nutrient discharges from any single point source, yet a 5,300 mi² hypoxic zone forms each summer at its mouth. Which of the following BEST explains this paradox under the Clean Water Act framework?", "options": [{"text": "Point-source regulation under NPDES is failing because the river contains many unpermitted industrial discharges.", "isCorrect": false, "rationale": "The Mississippi watershed dead zone is overwhelmingly fueled by agricultural nonpoint sources, not unpermitted point-source pollution. Industrial NPDES permits have been substantially effective post-1972."}, {"text": "The dominant nitrogen sources are nonpoint — agricultural runoff and tile-drain effluent from the Corn Belt — which are largely excluded from NPDES permit requirements and rely on voluntary best management practices.", "isCorrect": true, "rationale": "Approximately 1.5 million metric tons of dissolved inorganic nitrogen reach the Gulf each year from the Mississippi-Atchafalaya watershed (drainage = ~41% of the contiguous US), the majority from fertilizer and tile-drain effluent. These sources are diffuse nonpoint sources, regulated only by voluntary Section 319 BMPs that lack the regulatory force of NPDES permits."}, {"text": "The Clean Water Act expressly forbids regulating coastal waters; only inland lakes are protected.", "isCorrect": false, "rationale": "The CWA covers navigable waters including coastal waters; the issue is not coverage but the diffuse nature of agricultural nonpoint sources, which the NPDES permit system cannot reach."}, {"text": "Coastal hypoxia is unrelated to upstream agricultural inputs and is caused exclusively by oceanic currents.", "isCorrect": false, "rationale": "Decades of NOAA monitoring tie Gulf hypoxia directly to nitrogen loads from the Mississippi River, dominated by Corn Belt agriculture. Currents shape spatial pattern but do not explain the nutrient source."}]}, {"question": "Which of the following BEST distinguishes cultural eutrophication from natural eutrophication?", "options": [{"text": "Cultural eutrophication unfolds on timescales of years to decades and is reversible by reducing nutrient inputs; natural eutrophication unfolds over thousands of years as lakes accumulate organic sediment.", "isCorrect": true, "rationale": "Natural lakes follow a successional trajectory from oligotrophic to eutrophic over millennia. Human land use compresses this timeline from millennia to decades — a pristine mountain lake can shift to eutrophic within a human lifetime if its watershed is converted to intensive agriculture. Reversibility through nutrient-input reduction is the policy-relevant distinction."}, {"text": "Cultural eutrophication is caused by industrial chemicals only; natural eutrophication is caused by fertilizers.", "isCorrect": false, "rationale": "Both are driven by nutrient enrichment (primarily N and P), and cultural eutrophication's main sources are agricultural fertilizer and sewage, not industrial chemicals exclusively."}, {"text": "Natural eutrophication produces hypoxic dead zones, while cultural eutrophication does not.", "isCorrect": false, "rationale": "The reverse is closer to true: cultural eutrophication produces severe, recurring dead zones (Gulf of Mexico, Chesapeake Bay, Baltic Sea) on timescales humans can directly observe."}, {"text": "Cultural eutrophication is irreversible while natural eutrophication can be reversed by reducing inputs.", "isCorrect": false, "rationale": "Cultural eutrophication is reversible — though sediment-bound phosphorus (\"internal loading\") can sustain eutrophic conditions for years after external inputs are reduced. Natural eutrophication occurs over geological time and is not typically reversed within human policy timeframes."}]}, {"question": "An algal bloom collapses; over the following two weeks, dissolved oxygen in bottom waters falls from 6 mg/L to 1.2 mg/L. Which classification applies, and what biological process produces the depletion?", "options": [{"text": "Anoxic conditions caused by reduced atmospheric oxygen above the water surface.", "isCorrect": false, "rationale": "Anoxic conditions occur below 0.5 mg/L; 1.2 mg/L is hypoxic, not anoxic. Atmospheric oxygen does not change appreciably; the depletion is biological, driven by bacterial decomposition consuming dissolved O₂."}, {"text": "Hypoxic conditions caused by aerobic bacterial decomposition of dead algal biomass consuming dissolved oxygen faster than re-aeration can restore it.", "isCorrect": true, "rationale": "Hypoxia is defined as DO below 2 mg/L. After algal blooms collapse, vast amounts of dead biomass sink and aerobic bacteria decompose it, consuming dissolved oxygen at rates that exceed re-aeration from the surface — particularly in stratified water bodies where a thermocline prevents mixing."}, {"text": "Hypoxic conditions caused by living algae directly consuming oxygen during photosynthesis.", "isCorrect": false, "rationale": "Algae produce oxygen during photosynthesis, raising DO during the bloom itself. Hypoxia develops post-bloom, when decomposers consume DO during decay of the algal biomass."}, {"text": "Normal seasonal mixing causing thermocline formation that increases DO in bottom waters.", "isCorrect": false, "rationale": "Thermocline formation prevents mixing between surface and bottom waters, isolating the bottom and worsening hypoxia. Mixing would increase DO; stratification decreases it."}]}, {"question": "The 2008 Gulf Hypoxia Action Plan targeted reducing the dead zone to less than 5,000 mi², yet by 2024 the five-year average dead-zone area remained above 5,500 mi². Which of the following BEST explains the persistent shortfall?", "options": [{"text": "Climate change has increased ocean temperatures, making nutrient management irrelevant.", "isCorrect": false, "rationale": "While warming exacerbates eutrophication by raising metabolic rates, the primary obstacle to meeting the target is nutrient input volume — voluntary programs in the Corn Belt have not delivered the fertilizer reductions the science requires."}, {"text": "The Gulf Hypoxia Action Plan relies on voluntary nutrient-management programs (cover crops, reduced fertilizer applications, constructed wetland buffers) that lack enforcement mechanisms; binding nutrient standards for agricultural sources have not been adopted.", "isCorrect": true, "rationale": "Voluntary programs paying farmers for cover crops, reduced fertilizer application, and constructed wetlands lack the enforcement teeth needed to compel large-scale nutrient reductions. Scientists argue meeting the target requires binding nutrient standards for agricultural sources — a regulatory step the US has not yet taken."}, {"text": "The hypoxic zone is fundamentally untreatable because nitrogen cannot be removed from water.", "isCorrect": false, "rationale": "Nitrogen can be removed through riparian buffers (denitrification), constructed wetlands (40–80% removal of dissolved nitrogen), and tertiary wastewater treatment. The barrier is policy and economics, not technical capacity."}, {"text": "The Mississippi River drainage area is too small to deliver enough nitrogen to support a dead zone.", "isCorrect": false, "rationale": "The Mississippi-Atchafalaya system drains ~41% of the contiguous US — the most intensively farmed corn-and-soybean acreage in the world. Roughly 1.5 million metric tons of dissolved inorganic nitrogen reach the Gulf each year, more than enough to fuel the largest recurring dead zone in the Western Hemisphere."}]}, {"question": "A coastal lake develops a thick surface mat of cyanobacteria. Beyond oxygen depletion, which immediate health concern arises specifically from cyanobacteria, and why?", "options": [{"text": "Cyanobacteria are entirely harmless to humans; the only concern is aesthetic discoloration.", "isCorrect": false, "rationale": "Many cyanobacteria species produce hepatotoxins, neurotoxins, and skin irritants that are dangerous to humans, pets, and livestock. Beach closures and dog deaths from cyanobacterial blooms are well-documented."}, {"text": "Cyanobacteria produce hepatotoxins, neurotoxins, and skin irritants dangerous to people, pets, and livestock; consumption or contact with bloom-affected water can cause acute illness.", "isCorrect": true, "rationale": "Cyanobacterial blooms (blue-green algae) are particularly harmful because many species secrete potent toxins. Exposure routes include ingestion (drinking contaminated water), dermal contact (swimming), and inhalation of aerosols. Lake closures and livestock-poisoning events are common during cyanobacterial blooms."}, {"text": "Cyanobacteria physically block fish from reaching the surface, killing all aquatic life by suffocation.", "isCorrect": false, "rationale": "Fish kills during eutrophication occur primarily because oxygen depletion follows bloom collapse, not because surface mats physically block fish. The biological pathway is the oxygen sag, not surface obstruction."}, {"text": "Cyanobacteria are the same as zooxanthellae and provide ecosystem benefits identical to coral symbionts.", "isCorrect": false, "rationale": "Cyanobacteria are free-living photosynthetic bacteria, not the symbiotic dinoflagellates (zooxanthellae) that live inside coral polyps. They serve very different ecological roles and many cyanobacteria are harmful, not beneficial."}]}, {"question": "Which of the following control strategies for cultural eutrophication targets nutrient interception rather than source reduction?", "options": [{"text": "Precision fertilizer management — applying fertilizer in quantities and at times crops can absorb.", "isCorrect": false, "rationale": "Precision fertilizer management is a source-reduction strategy: it minimizes the excess nutrient pool generated at the field, before any runoff occurs."}, {"text": "Riparian buffers and constructed wetlands that intercept and denitrify nitrate in groundwater and surface runoff before it enters streams.", "isCorrect": true, "rationale": "Riparian buffers — strips of vegetation along stream banks — intercept dissolved nitrate already mobilized from upland fields; constructed wetlands in tile-drain catchments can remove 40–80% of dissolved nitrogen through denitrification. Both are interception strategies that act after nutrients have left the field."}, {"text": "Phosphorus detergent bans in dishwasher detergents.", "isCorrect": false, "rationale": "Detergent bans are source-reduction strategies; they prevent phosphorus from entering wastewater in the first place, reducing what POTWs must handle."}, {"text": "Soil testing and split-season fertilizer applications.", "isCorrect": false, "rationale": "Both are source-reduction tactics within precision fertilizer management. They calibrate inputs to crop needs, reducing the excess pool available for runoff."}]}, {"question": "The Baltic Sea contains one of the largest persistent dead zones on Earth, covering more than 70,000 km² in some years. Which physical feature of the Baltic makes it especially vulnerable to anthropogenic eutrophication?", "options": [{"text": "It is fully enclosed with no inflow rivers, so nutrients accumulate without flushing.", "isCorrect": false, "rationale": "The Baltic receives substantial inflow from rivers draining intensively farmed catchments in Sweden, Poland, and Germany — that is the source of the nutrient load."}, {"text": "It is a semi-enclosed sea with limited water exchange combined with intensive agriculture in its drainage basin, producing persistent bottom-water anoxia and the largest anthropogenic marine dead zone on Earth.", "isCorrect": true, "rationale": "The Baltic's restricted exchange with the open ocean means accumulated nutrients are not flushed efficiently; combined with intensive agriculture across the catchment in Sweden, Poland, and Germany, this produces persistent bottom-water anoxia covering more than 70,000 km² in some years — the largest anthropogenic marine dead zone documented."}, {"text": "Its tropical climate accelerates algal growth year-round.", "isCorrect": false, "rationale": "The Baltic is a temperate, cold-water sea, not tropical. Eutrophication occurs across many climate zones; what makes the Baltic exceptional is restricted exchange combined with high nutrient loads."}, {"text": "It contains no aquatic life, so no organisms can die during hypoxia.", "isCorrect": false, "rationale": "The Baltic supports significant fisheries (cod, herring, sprat) and benthic communities. The dead zone is a serious ecological and economic problem precisely because it eliminates productive habitat."}]}, {"question": "Why does sediment-bound phosphorus pose a long-term challenge for cultural eutrophication recovery, even after external nutrient inputs are reduced?", "options": [{"text": "Sediment-bound phosphorus permanently fixes itself into bedrock and is biologically inaccessible.", "isCorrect": false, "rationale": "The opposite is true: sediment-bound phosphorus can be re-released into the water column under low-oxygen conditions or with disturbance, sustaining eutrophic conditions for years."}, {"text": "Phosphorus stored in lake or coastal sediments can be re-released into the water column over years through internal loading, sustaining eutrophic conditions even after external inputs are reduced.", "isCorrect": true, "rationale": "\"Internal loading\" describes the gradual release of phosphorus from sediment back into the water column, particularly under hypoxic conditions where iron-bound phosphate becomes mobilized. This sustains eutrophic conditions for years after external inputs (fertilizer, sewage) are controlled, complicating recovery timelines."}, {"text": "External nutrient reductions immediately eliminate all eutrophic conditions because lakes have no internal nutrient pools.", "isCorrect": false, "rationale": "Lakes and coastal sediments hold substantial historical nutrient pools. Internal loading is a documented obstacle to rapid recovery, not an absent factor."}, {"text": "Phosphorus is volatile and escapes to the atmosphere within weeks of deposition.", "isCorrect": false, "rationale": "Phosphorus has no significant atmospheric phase under environmental conditions. Unlike nitrogen, P does not cycle through the atmosphere; it accumulates in sediments and waters until physically removed."}]}, {"question": "The Gulf of Mexico dead-zone case is often described as a \"spatial-scale mismatch\" between the source of pollution and its victims. Which of the following BEST captures this mismatch and its policy implication?", "options": [{"text": "Corn Belt farmers in Iowa, Illinois, and Indiana apply nitrogen fertilizer; Gulf Coast shrimpers and fishers bear the ecological and economic cost. No single regulatory body governs both regions, making coordinated reduction difficult.", "isCorrect": true, "rationale": "The pollution source (Iowa/Illinois/Indiana cornfields) and the affected ecosystem (Louisiana coastal waters) are separated by thousands of kilometers, multiple state lines, and very different political constituencies. No single regulatory body has jurisdiction over both; this scale mismatch is the structural reason that voluntary nutrient-management programs in source states lack the regulatory force to compel the fertilizer reductions the science requires."}, {"text": "The mismatch is purely temporal — nitrogen takes 100 years to travel from Iowa to the Gulf.", "isCorrect": false, "rationale": "The transit time is much shorter — nutrients move through tile drains and the Mississippi River within weeks to months. The mismatch is spatial and political, not temporal."}, {"text": "There is no mismatch; the Gulf hypoxia is caused by Louisiana-based industries alone.", "isCorrect": false, "rationale": "NOAA tracking of nitrogen sources unambiguously identifies Corn Belt agriculture as the dominant nitrogen source for Gulf hypoxia. Local Louisiana industries contribute much smaller fractions."}, {"text": "The mismatch can be resolved by Louisiana banning shrimp fishing.", "isCorrect": false, "rationale": "Banning shrimp fishing addresses the symptom (fishery collapse), not the cause (excess nitrogen loading). The pollution source remains in Corn Belt agriculture; resolving the mismatch requires reducing upstream nutrient inputs."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
