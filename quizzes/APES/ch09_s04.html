    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Climate Consequences II: Ocean Warming and Acidification</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The ocean has absorbed approximately 91% of the excess heat trapped by anthropogenic greenhouse gases since 1970. What does this percentage primarily reveal about the climate system?", "options": [{"text": "The atmosphere has reached saturation and can no longer absorb additional greenhouse gases.", "isCorrect": false, "rationale": "The atmosphere is far from saturation; greenhouse gas concentrations continue to rise. The ocean simply has enormous heat capacity relative to the atmosphere."}, {"text": "The ocean's enormous heat capacity has buffered atmospheric warming significantly — without ocean uptake, surface air temperatures would have risen by many tens of degrees C — but ocean heat content is now rising at an accelerating rate.", "isCorrect": true, "rationale": "The ocean stores ~1000x more heat per unit volume than air. The 91% uptake explains why surface warming has been only ~1.2 C despite massive forcing, but ocean heat content rises mean the buffering has costs (thermal expansion, heatwaves, stratification)."}, {"text": "Ocean heat uptake is reaching its physical limit and will reverse in coming decades.", "isCorrect": false, "rationale": "Ocean heat uptake continues, especially in the Southern Ocean and upper 700 m. There is no near-term physical limit being approached."}, {"text": "The number reflects measurement artifacts and is not physically meaningful.", "isCorrect": false, "rationale": "Ocean heat content is well-measured by Argo floats, satellite altimetry, and traditional oceanography. The 91% figure is well-established."}]}, {"question": "The pre-industrial ocean pH was approximately 8.2; the current pH is 8.1. Using pH = -log10[H+], what is the percentage increase in hydrogen ion concentration?", "options": [{"text": "1% — pH changed by 1 unit.", "isCorrect": false, "rationale": "pH changed by 0.1, not 1. And because pH is logarithmic, even a 0.1 change represents a substantial change in [H+]."}, {"text": "10% — pH is on a percentage scale.", "isCorrect": false, "rationale": "pH is logarithmic, not percentage-based. The actual change in [H+] is calculated by 10^(0.1) - 1."}, {"text": "26% — [H+] ratio = 10^(8.2 - 8.1) = 10^0.1 = 1.26.", "isCorrect": true, "rationale": "Exactly correct. The [H+] increased by a factor of 10^0.1 = 1.26, or 26%. This calculation is the standard worked example for ocean acidification."}, {"text": "100% — pH dropped by half a unit.", "isCorrect": false, "rationale": "pH did not drop by half a unit; it dropped by 0.1. A 100% increase would correspond to a doubling of [H+]."}]}, {"question": "The ocean has absorbed approximately 30% of all anthropogenic CO2 emitted since the Industrial Revolution. What chemical reaction sequence describes how this absorption produces ocean acidification?", "options": [{"text": "CO2 + H2O -> O2 + carbohydrate (photosynthesis-like).", "isCorrect": false, "rationale": "This is photosynthesis, not the carbonate system. Photosynthesis does not lower seawater pH."}, {"text": "CO2 + H2O equilibrium with H2CO3 (carbonic acid), which dissociates to H+ + HCO3- (bicarbonate). The added H+ ions lower pH and react with carbonate ions: H+ + CO3^2- -> HCO3-, reducing carbonate available for shell formation.", "isCorrect": true, "rationale": "This is the canonical ocean acidification chemistry. CO2 dissolves to form carbonic acid, which releases H+ ions, lowering pH and consuming carbonate ions."}, {"text": "CO2 + Ca^2+ -> CaCO3 (direct precipitation of calcium carbonate).", "isCorrect": false, "rationale": "CO2 does not directly precipitate CaCO3. CaCO3 requires reaction with carbonate ions, and ocean acidification reduces those ions."}, {"text": "CO2 + NaCl -> Na2CO3 + Cl2.", "isCorrect": false, "rationale": "This is not a real ocean chemistry reaction. The carbonate system involves H2O, H2CO3, HCO3-, and CO3^2-, not chloride."}]}, {"question": "Why are pteropods (free-swimming pelagic snails called sea butterflies) considered a critical indicator species for ocean acidification?", "options": [{"text": "They produce shells of silica that record acidification chemistry.", "isCorrect": false, "rationale": "Pteropods build shells of aragonite (calcium carbonate), not silica. Silica shells (e.g., diatoms) are not directly threatened by acidification."}, {"text": "They build thin aragonite shells especially vulnerable to dissolution, occupy primary-consumer roles in polar food webs (linking phytoplankton to fish, seabirds, whales), and laboratory plus field studies already document shell dissolution in the Southern Ocean.", "isCorrect": true, "rationale": "Pteropod thin aragonite shells are particularly sensitive to lower aragonite saturation. They occupy a foundational position in polar food webs, so their decline cascades up the food chain. Documented dissolution in the Southern Ocean makes them a sentinel species."}, {"text": "Their populations are easy to count from satellites.", "isCorrect": false, "rationale": "Pteropods are tiny pelagic organisms not visible from space. Their study requires net tows and microscopy."}, {"text": "They are commercially harvested in large numbers.", "isCorrect": false, "rationale": "Pteropods are not commercially fished. Their ecological importance is as a food-web link, not a fishery."}]}, {"question": "A marine heatwave (MHW) is defined by a specific quantitative threshold. Which definition is correct?", "options": [{"text": "Sea-surface temperatures above 25 degrees C for one week.", "isCorrect": false, "rationale": "MHW is defined relative to local climatology, not an absolute threshold of 25 C. Some MHWs occur at much lower water temperatures in cold regions."}, {"text": "Temperatures exceeding the 90th percentile of the historical local distribution for at least five consecutive days, classified by intensity from 'moderate' to 'extreme'.", "isCorrect": true, "rationale": "MHWs are defined relative to the local 90th-percentile threshold for at least 5 consecutive days. This relative-threshold definition allows MHWs to be identified in any ocean region by reference to local climatology."}, {"text": "Any sea-surface temperature warmer than the previous year's average.", "isCorrect": false, "rationale": "MHWs require a substantial anomaly persisting for at least 5 days, not any warming compared to the previous year."}, {"text": "Temperatures that cause coral bleaching anywhere on a reef.", "isCorrect": false, "rationale": "Coral bleaching is one consequence of MHWs but not the definition. The definition is statistical (90th percentile, 5+ days)."}]}, {"question": "Coral bleaching occurs when corals expel their symbiotic photosynthetic algae (zooxanthellae) under thermal stress. Why does prolonged bleaching kill coral?", "options": [{"text": "Bleached coral skeletons dissolve immediately under the warmer water.", "isCorrect": false, "rationale": "Skeletons do not dissolve immediately upon bleaching. Bleached coral can recolonize zooxanthellae if temperatures return to normal within weeks."}, {"text": "Without zooxanthellae, the coral loses 70-90% of its energy supply (from algal photosynthesis). If thermal stress persists for months, the coral starves and dies.", "isCorrect": true, "rationale": "Zooxanthellae provide 70-90% of the coral's energy through photosynthesis. Loss of this energy supply is the proximate cause of mortality if bleaching persists too long for recolonization."}, {"text": "The white coral becomes too visible to predators and is consumed quickly.", "isCorrect": false, "rationale": "Coral predation does not increase markedly with bleaching. The mortality mechanism is starvation, not predation."}, {"text": "Coral immune systems are disrupted, leading to bacterial infection.", "isCorrect": false, "rationale": "Bacterial infection can contribute to mortality but is secondary to the energy starvation caused by zooxanthellae loss."}]}, {"question": "An aragonite saturation state Omega-aragonite > 1 means the water is supersaturated with aragonite and shells can form; Omega-aragonite < 1 means corrosive water. By 2100 under high-emission scenarios, where is aragonite undersaturation projected to first appear extensively?", "options": [{"text": "Tropical oceans, due to higher water temperatures.", "isCorrect": false, "rationale": "Tropical waters are warmer and have lower CO2 solubility, so they retain aragonite saturation longer than cold waters."}, {"text": "Polar and sub-polar surface waters, where colder temperatures increase CO2 solubility and reduce aragonite saturation.", "isCorrect": true, "rationale": "Cold water dissolves more CO2 (higher solubility), driving lower pH and lower carbonate saturation. The Southern Ocean and Arctic surface waters are the first regions where aragonite undersaturation is projected to develop extensively."}, {"text": "The Mediterranean basin, due to high industrial activity in surrounding nations.", "isCorrect": false, "rationale": "Industrial activity nearby does not determine local pH; ocean chemistry depends on global CO2 and water temperature, not local emissions."}, {"text": "Equatorial Pacific, due to upwelling of deep water.", "isCorrect": false, "rationale": "Equatorial upwelling can locally lower pH but the most extensive future undersaturation is projected for cold polar waters."}]}, {"question": "The Pacific Northwest oyster hatchery collapses in the 2000s and 2010s were among the first documented economic impacts of ocean acidification. What was the specific chemical mechanism that caused larval oyster failure?", "options": [{"text": "Warming water reduced dissolved oxygen, suffocating oyster larvae.", "isCorrect": false, "rationale": "Warming and oxygen depletion are real ocean problems but the Pacific Northwest collapse was specifically linked to acidification chemistry, not hypoxia."}, {"text": "Cold, upwelled water carrying naturally lower-pH seawater (already pre-acidified by anthropogenic CO2 absorbed decades ago) had aragonite saturation states below 1, dissolving the thin aragonite shells of larval oysters before they could harden.", "isCorrect": true, "rationale": "Pacific Northwest upwelling brings deep water that absorbed CO2 decades ago and is now corrosive (Omega-aragonite < 1). Larval oyster shells are thin and vulnerable; they dissolve before the larvae can survive."}, {"text": "Excess nutrients caused harmful algal blooms that produced toxins.", "isCorrect": false, "rationale": "Eutrophication and toxic algae are concerns but the specific Pacific NW oyster crisis was attributed to acidification chemistry, not algal toxins."}, {"text": "Boat traffic disturbed larval oyster settlement.", "isCorrect": false, "rationale": "Boat traffic is not a primary cause; the documented mechanism was chemical (acidification of upwelled water)."}]}, {"question": "How do ocean warming and ocean acidification interact synergistically to threaten coral reefs?", "options": [{"text": "Warming causes bleaching mortality, while acidification slows reef recovery between bleaching events by reducing calcification rates — making the reef increasingly unable to rebuild before the next thermal anomaly.", "isCorrect": true, "rationale": "Warming causes bleaching which kills colonies. Acidification reduces aragonite saturation, slowing the calcification rate at which coral skeletons can rebuild. Together they create conditions where reefs cannot recover between successive bleaching events."}, {"text": "Warming and acidification cancel each other out, leaving net coral reef impact small.", "isCorrect": false, "rationale": "Warming and acidification both stress coral reefs; they do not cancel. Their combined effect is more severe than either alone."}, {"text": "Acidification kills corals immediately, then warming bleaches the dead skeletons.", "isCorrect": false, "rationale": "Reef-scale mortality from acidification alone is slow; rapid mortality is from bleaching events. Acidification operates on slower timescales."}, {"text": "Warming displaces fish that fertilize coral, then acidification weakens coral skeletons.", "isCorrect": false, "rationale": "Fish do not fertilize coral; the mechanism described does not match coral biology."}]}, {"question": "Which statement correctly describes the fate of CO2 absorbed by the ocean and its long-term implications?", "options": [{"text": "Absorbed CO2 is permanently sequestered as solid carbonate sediment, removing it from the climate system entirely.", "isCorrect": false, "rationale": "Some CO2 is sequestered in carbonate sediments over millennia, but most stays in solution. And acidification is reducing carbonate precipitation rates."}, {"text": "The ocean has absorbed ~30% of anthropogenic CO2 since 1750, slowing atmospheric accumulation but acidifying seawater. Acidification reduces carbonate ion availability, threatens calcifying organisms, and is largely irreversible on human timescales.", "isCorrect": true, "rationale": "Ocean uptake of ~30% of anthropogenic CO2 has buffered atmospheric concentrations but at the cost of ocean chemistry shifts. Carbonate-saturation reduction harms calcifiers, and the chemistry adjusts only on geological (millennial+) timescales."}, {"text": "Ocean CO2 uptake will accelerate with warming, providing a stronger climate buffer.", "isCorrect": false, "rationale": "The opposite — warmer water dissolves less CO2 (lower solubility), so warming actually weakens ocean CO2 uptake."}, {"text": "The ocean has fully absorbed all anthropogenic CO2, leaving none in the atmosphere.", "isCorrect": false, "rationale": "The ocean has absorbed only ~30%; the rest remains in the atmosphere or has been taken up by land sinks."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
