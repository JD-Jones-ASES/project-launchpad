    };

<body>
<div class="quiz-container">

        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Nuclear Energy — Fission, Reactors, Waste, and Disasters</div>
    </div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When a slow neutron is absorbed by a uranium-235 nucleus, the resulting fission releases additional neutrons and energy. Approximately how much energy is released per fission event, and how does this compare to a chemical combustion reaction?", "options": [{"text": "About 200 keV per fission, roughly equal to a typical chemical reaction.", "isCorrect": false, "rationale": "Fission releases ~200 MeV (mega-electron-volts), not keV. The energy yield is about 50 million times that of a chemical reaction, not equal to it."}, {"text": "About 200 MeV per fission, approximately 50 million times more energy per atom than a chemical combustion reaction.", "isCorrect": true, "rationale": "The text specifies 200 MeV per fission event. This enormous energy density per atom is why a tiny mass of uranium fuel can supply the energy that would require enormous masses of fossil fuel — and why nuclear waste, though small in volume, is so radiologically intense."}, {"text": "About 2 GeV per fission, releasing only gamma radiation but no neutrons.", "isCorrect": false, "rationale": "Fission releases ~200 MeV (not 2 GeV) and emits 2-3 neutrons in addition to gamma radiation. Without neutrons, no chain reaction would be possible."}, {"text": "About 2 keV per fission, comparable to a single photon of visible light.", "isCorrect": false, "rationale": "Visible-light photons carry only a few eV, and 200 MeV per fission is enormously larger. The energy is ~50 million times a chemical reaction, not comparable to a photon."}]}, {"question": "Natural uranium contains only about 0.7% U-235, with the remainder being U-238. Why must most commercial reactors use enriched uranium, and what enrichment level distinguishes commercial fuel from weapons-grade material?", "options": [{"text": "Enrichment is unnecessary; natural uranium can sustain criticality in any reactor design.", "isCorrect": false, "rationale": "Most commercial reactors require 3-5% U-235 enrichment to maintain criticality. Only specialized designs (CANDU heavy-water reactors) can operate on natural uranium."}, {"text": "U-238 does not fission with thermal neutrons; commercial reactors require 3-5% U-235 to sustain a chain reaction. Weapons-grade uranium requires >90% enrichment, so commercial fuel is not weapons-usable.", "isCorrect": true, "rationale": "U-238 is not fissile under thermal neutrons, so the rare U-235 must be concentrated to maintain k = 1. Commercial reactors typically use 3-5% U-235 enrichment, well below the >90% required for weapons. This enrichment gap is one of the central technical features of civilian nuclear power."}, {"text": "Enrichment to 50% is standard for both commercial reactors and weapons.", "isCorrect": false, "rationale": "Commercial reactors use 3-5% enrichment; weapons require >90%. There is no 50% standard."}, {"text": "Commercial reactors require depleted uranium (<0.7% U-235); enrichment makes the fuel less reactive.", "isCorrect": false, "rationale": "This reverses the actual requirement. Enrichment increases U-235 fraction; depleted uranium has even less U-235 than natural and cannot sustain a typical reactor's chain reaction."}]}, {"question": "A reactor operator describes the neutron multiplication factor k. What does k represent, and what value defines stable reactor operation?", "options": [{"text": "k is the ratio of fission products to fissile fuel; stable operation requires k = 100.", "isCorrect": false, "rationale": "k is the average number of fission neutrons that go on to cause another fission, not a ratio of products to fuel. Stable operation is k = 1, not k = 100."}, {"text": "k is the average number of fission neutrons that go on to cause another fission. A reactor maintains k = 1.0 (criticality) for steady output. k > 1 means power growth (prompt criticality is the bomb condition); k < 1 means the chain reaction dies.", "isCorrect": true, "rationale": "k = 1 corresponds to criticality (steady chain reaction), k > 1 to supercriticality (growing power), and k < 1 to subcriticality (decaying chain). Reactors precisely control k via control rods (neutron absorbers) and moderators (neutron speed reducers) to maintain k = 1."}, {"text": "k is the kelvin temperature of the reactor core; stable operation requires k = 273.", "isCorrect": false, "rationale": "k stands for the multiplication factor, not kelvin temperature. Stable operation requires k = 1, the criticality condition."}, {"text": "k is the gamma emission probability; stable operation requires k = 0.", "isCorrect": false, "rationale": "k is the neutron multiplication factor. k = 0 would mean no chain reaction at all (subcritical decay)."}]}, {"question": "A pressurized water reactor (PWR) and a boiling water reactor (BWR) are both light-water designs. What is the key operational difference, and which design was used at the Fukushima Daiichi units that melted down in 2011?", "options": [{"text": "PWR uses heavy water as moderator; BWR uses light water. Fukushima used PWRs.", "isCorrect": false, "rationale": "PWRs use ordinary (light) water at high pressure, not heavy water. CANDU is the heavy-water design. Fukushima used BWRs, not PWRs."}, {"text": "In PWRs, water under high pressure (~155 atm) prevents boiling and transfers heat to a secondary loop where steam is generated. In BWRs, water boils directly in the reactor vessel and the steam drives the turbine. All six Fukushima Daiichi reactors are BWRs, including the three (Units 1, 2, 3) whose cores melted down in 2011.", "isCorrect": true, "rationale": "PWRs separate the radioactive primary loop from the steam-turbine loop via pressurization (~155 atm prevents boiling); BWRs are simpler but allow some radioactive contamination of the turbine circuit. Fukushima units are BWRs."}, {"text": "PWR uses gas coolant; BWR uses water. Fukushima used gas-cooled reactors.", "isCorrect": false, "rationale": "Both PWR and BWR are light-water designs, neither uses gas coolant. Fukushima used BWRs."}, {"text": "PWR has no moderator; BWR uses graphite. Fukushima used graphite-moderated reactors.", "isCorrect": false, "rationale": "Both designs use water as moderator. Graphite-moderated water-cooled is the RBMK design used at Chernobyl, not at Fukushima."}]}, {"question": "What design feature of the Chernobyl RBMK reactor is most directly blamed for the 1986 explosion, and what does the term 'void' refer to in this context?", "options": [{"text": "A negative void coefficient; voids refer to vacuum bubbles in the steel pressure vessel.", "isCorrect": false, "rationale": "The RBMK had a positive void coefficient, not negative. Voids refer to steam bubbles in the cooling water, not vacuum bubbles in steel."}, {"text": "A positive void coefficient; voids are steam bubbles in the cooling water. As cooling water turned to steam, reactor power increased rather than decreased — the opposite of self-stabilizing behavior in water-moderated designs. Combined with control-rod-tip graphite effects, this produced an uncontrolled power surge ~30,000x normal.", "isCorrect": true, "rationale": "In the RBMK, water acts as a neutron absorber. When water boils into steam (voids), absorption decreases and reactivity rises, accelerating boiling further — a runaway feedback. Most other designs have negative void coefficients (boiling reduces power). The RBMK control rods also had graphite tips that briefly increased reactivity when first inserted."}, {"text": "A negative temperature coefficient; voids refer to gaps in the fuel rod cladding.", "isCorrect": false, "rationale": "The RBMK's positive void coefficient (not negative temperature coefficient) caused the runaway. Voids refer to steam bubbles, not gaps in cladding."}, {"text": "A positive thermal coefficient; voids refer to power outages.", "isCorrect": false, "rationale": "The relevant property is positive void coefficient, where steam-bubble voids in coolant increase reactivity. Power outages are unrelated."}]}, {"question": "After removal from a US reactor today, spent nuclear fuel rods must be isolated from the biosphere for up to 10^6 years. Why is isolation needed for such an enormous timespan?", "options": [{"text": "Spent fuel emits visible light for millennia, so it must be hidden in dark caves.", "isCorrect": false, "rationale": "The hazard is ionizing radiation (alpha, beta, gamma, neutron) and chemical/biological toxicity, not visible light. Half-life is the determinant, not visibility."}, {"text": "Transuranic actinides such as plutonium-239 (t1/2 = 24,100 yr) and americium-241 (t1/2 = 432 yr) plus other long-lived isotopes keep the spent fuel radiologically hazardous for 10^5 to 10^6 years.", "isCorrect": true, "rationale": "The 200-MeV-per-fission energy yield comes at the cost of producing nuclei (and transuranic elements via neutron capture) with very long half-lives. Pu-239 alone takes ~24,100 years per half-life, and 10 half-lives are needed to drop activity by ~1000-fold. Hence the multi-100,000-year isolation requirement."}, {"text": "Spent fuel emits radioactivity for only a few decades; 10^6-year isolation is a clerical error.", "isCorrect": false, "rationale": "Short-lived fission products do decay in decades, but transuranic actinides have half-lives of thousands to tens of thousands of years, requiring far longer isolation."}, {"text": "Isolation prevents thermal expansion of casks; the timescale is unrelated to radioactivity.", "isCorrect": false, "rationale": "The timescale is set by radioactive half-lives, not thermal expansion."}]}, {"question": "A sample of cesium-137 (t1/2 = 30 yr) is deposited in a cooling pool in 2026. After 10 half-lives (300 years), what fraction of the original activity remains?", "options": [{"text": "1/10 — about 10% remains.", "isCorrect": false, "rationale": "Half-lives are exponential, not linear. After n half-lives the fraction remaining is (1/2)^n, not 1/n."}, {"text": "1/1024 — about 0.1% of original activity remains, since (1/2)^10 = 1/1024.", "isCorrect": true, "rationale": "Each half-life cuts activity by a factor of 2. After 10 half-lives the fraction remaining is (1/2)^10 = 1/1024 ≈ 0.000977 ≈ 0.1%. This explains why ~10 half-lives is a common rule of thumb for 'effectively decayed' for short-lived isotopes."}, {"text": "1/100 — about 1% remains.", "isCorrect": false, "rationale": "(1/2)^10 = 1/1024 ≈ 0.1%, not 1%. The correct fraction is approximately 1/1024."}, {"text": "Zero — all activity has decayed.", "isCorrect": false, "rationale": "Radioactive decay is exponential and never reaches exactly zero. After 10 half-lives, ~1/1024 of activity remains; the sample is greatly reduced but not absent."}]}, {"question": "How does spent nuclear fuel transition from cooling pools to dry-cask storage, and why is this transition needed?", "options": [{"text": "Immediately after removal, the rods are sealed in casks; the pools are used only during reactor operation.", "isCorrect": false, "rationale": "Immediately after removal, decay heat is too intense for dry storage. Pools provide both shielding and active heat removal during the first 5-10 years, before transition to dry casks."}, {"text": "Spent rods first sit in water-filled cooling pools (water absorbs radiation and carries away decay heat). After 5-10 years, sufficiently cooled rods can move to dry casks — concrete and steel containers that provide passive air-convection cooling and radiation shielding by mass.", "isCorrect": true, "rationale": "Spent fuel emits substantial decay heat right after removal. Water-filled pools absorb radiation and remove that heat. Once decay heat has dropped enough (5-10 years), rods can move to passively cooled dry casks. As of 2024, essentially all US spent fuel sits in on-site pools or dry casks because no permanent repository exists."}, {"text": "Rods bypass cooling and go directly to a permanent geological repository.", "isCorrect": false, "rationale": "No permanent geological repository operates in the US (Yucca Mountain was effectively halted after 2010). Finland's Onkalo is the world's first permanent repository under construction."}, {"text": "Pools and dry casks are not used; rods are reprocessed within a year of removal.", "isCorrect": false, "rationale": "The US does not commercially reprocess spent fuel. Spent rods sit on-site in pools or dry casks. France and a few other nations do reprocess, but that is not the US practice."}]}, {"question": "How did the immediate causes of the Chernobyl (1986) and Fukushima Daiichi (2011) disasters fundamentally differ?", "options": [{"text": "Both were caused by the same RBMK design flaw; only the year differed.", "isCorrect": false, "rationale": "Only Chernobyl used the RBMK design with positive void coefficient. Fukushima used BWRs with very different physics."}, {"text": "Chernobyl resulted from a fundamentally flawed reactor design (positive void coefficient, control-rod graphite tips) combined with procedural violations during a safety test. Fukushima resulted from an external natural hazard — a magnitude-9.0 earthquake and >14 m tsunami — that exceeded the plant's design basis (5.7 m seawall) and disabled cooling.", "isCorrect": true, "rationale": "Chernobyl was a design + procedural failure: the RBMK had inherent physics problems exacerbated by operator violations. Fukushima was a beyond-design-basis natural hazard: the tsunami flooded backup diesel generators, killed all cooling power, and led to core melts in Units 1, 2, 3 plus hydrogen explosions from zirconium-cladding oxidation."}, {"text": "Both were caused by terrorist attacks.", "isCorrect": false, "rationale": "Neither accident involved sabotage. Chernobyl was a design + procedural failure; Fukushima was a natural-hazard failure."}, {"text": "Both were caused by tsunamis; the only difference was the country.", "isCorrect": false, "rationale": "Chernobyl is inland in Ukraine and was not affected by a tsunami. Only Fukushima was triggered by a tsunami."}]}, {"question": "A policy analyst describes the central trade-off of nuclear energy. Which characterization most accurately captures the trade-off?", "options": [{"text": "Nuclear has the highest CO2 emissions per kWh of any technology, balanced by minimal waste production.", "isCorrect": false, "rationale": "Nuclear has among the lowest lifecycle CO2 emissions per kWh, lower than solar PV on most estimates. It also produces long-lived high-level waste, the opposite of minimal waste."}, {"text": "Nuclear produces no direct CO2 during operation, has very low lifecycle emissions, and runs at the highest capacity factor (~92%) of any source — but generates spent fuel that must be isolated from the biosphere for up to 10^6 years and carries a finite risk of catastrophic accidents.", "isCorrect": true, "rationale": "The text frames the trade-off as zero direct CO2 + highest capacity factor + low lifecycle emissions vs. multi-100,000-year waste isolation requirement + low-probability/high-consequence accident risk. How one weighs certain near-term climate benefits against long-tail outcomes is a normative environmental risk question."}, {"text": "Nuclear is unambiguously the worst electricity source on every metric — emissions, cost, and safety.", "isCorrect": false, "rationale": "Nuclear ranks well on emissions, capacity factor, and life-cycle impact. The trade-off is real but not one-sided; the question is how much weight to place on long-lived waste and accident risk."}, {"text": "Nuclear is unambiguously the best electricity source on every metric.", "isCorrect": false, "rationale": "There is a genuine trade-off involving waste and accident risk, even alongside nuclear's strengths. The text emphasizes that no purely technical analysis can resolve the question."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
