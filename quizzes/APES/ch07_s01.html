<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Environmental Science &mdash; Primary versus Secondary Pollutants and the Six Criteria Pollutants</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best distinguishes a primary pollutant from a secondary pollutant?", "options": [{"text": "Primary pollutants are more toxic than secondary pollutants", "isCorrect": false, "rationale": "Toxicity does not define the distinction; secondary pollutants like tropospheric ozone can be highly damaging."}, {"text": "Primary pollutants are emitted directly from a source in the form that causes harm, while secondary pollutants form in the atmosphere from precursor reactions", "isCorrect": true, "rationale": "Correct. The defining criterion is whether the harmful substance is released directly (primary) or formed via atmospheric chemistry from precursors (secondary)."}, {"text": "Primary pollutants come from natural sources, while secondary pollutants come from anthropogenic sources", "isCorrect": false, "rationale": "Both primary and secondary pollutants can have natural or human origins; the distinction is about formation pathway, not source type."}, {"text": "Primary pollutants are regulated by the EPA while secondary pollutants are not regulated", "isCorrect": false, "rationale": "Both categories are regulated under the Clean Air Act; tropospheric ozone (secondary) is one of the six criteria pollutants."}]}, {"question": "Why is tropospheric ozone (O3) classified as a secondary pollutant?", "options": [{"text": "It is emitted directly from vehicle tailpipes at high concentrations", "isCorrect": false, "rationale": "Vehicles emit NOx and VOCs (precursors), not ozone itself."}, {"text": "It is naturally present in the stratosphere and migrates downward", "isCorrect": false, "rationale": "Stratospheric ozone is a separate layer; tropospheric ozone forms locally from precursor chemistry."}, {"text": "It forms in the atmosphere when VOCs and NOx react in the presence of sunlight", "isCorrect": true, "rationale": "Correct. Ground-level ozone is produced via photochemical reactions between primary precursors (VOCs and NOx) under UV radiation."}, {"text": "It results from the direct combustion of fossil fuels in power plants", "isCorrect": false, "rationale": "Combustion produces SO2, NOx, CO, and PM directly, but not O3."}]}, {"question": "A coal-fired power plant in the Ohio Valley releases SO2, which then reacts with water vapor and oxygen in cloud droplets to form sulfuric acid that deposits as fine sulfate particles in New England. Classify the SO2 and the resulting sulfate particles.", "options": [{"text": "Both SO2 and sulfate particles are primary pollutants", "isCorrect": false, "rationale": "Sulfate particles are not emitted directly; they form via atmospheric chemistry."}, {"text": "SO2 is a primary pollutant; sulfate particles are a secondary pollutant", "isCorrect": true, "rationale": "Correct. SO2 is released directly (primary), while sulfate particles result from atmospheric reactions (secondary)."}, {"text": "Both SO2 and sulfate particles are secondary pollutants", "isCorrect": false, "rationale": "SO2 is emitted directly from combustion, making it primary."}, {"text": "SO2 is a secondary pollutant; sulfate particles are a primary pollutant", "isCorrect": false, "rationale": "This reverses the correct classification."}]}, {"question": "Why is carbon monoxide (CO) particularly dangerous to humans even at relatively low concentrations?", "options": [{"text": "It is a strong acid that corrodes lung tissue on contact", "isCorrect": false, "rationale": "CO is not an acid; the mechanism is competitive hemoglobin binding."}, {"text": "It binds to hemoglobin with about 200 times the affinity of oxygen, displacing O2 and causing cellular hypoxia", "isCorrect": true, "rationale": "Correct. CO's high affinity for hemoglobin reduces oxygen delivery to tissues, producing hypoxia at modest exposure levels."}, {"text": "It dissociates DNA in lung cells, triggering rapid mutations", "isCorrect": false, "rationale": "CO is not directly genotoxic; its toxicity is via oxygen displacement."}, {"text": "It triggers a massive immune response leading to anaphylaxis", "isCorrect": false, "rationale": "CO does not act as an allergen; toxicity is biochemical, not immunological."}]}, {"question": "Which of the following correctly lists the six criteria pollutants regulated under the Clean Air Act?", "options": [{"text": "SO2, NO2, CO, tropospheric O3, particulate matter, and lead", "isCorrect": true, "rationale": "Correct. These are the six criteria pollutants for which EPA establishes National Ambient Air Quality Standards."}, {"text": "SO2, CO2, methane, nitrous oxide, ozone, and lead", "isCorrect": false, "rationale": "CO2, methane, and nitrous oxide are greenhouse gases regulated under different authority, not criteria pollutants."}, {"text": "Mercury, lead, arsenic, asbestos, dioxin, and benzene", "isCorrect": false, "rationale": "These are hazardous air pollutants (HAPs), regulated under a separate program from the criteria pollutants."}, {"text": "PM2.5, ammonia, hydrogen sulfide, chlorine, sulfur dioxide, and ozone", "isCorrect": false, "rationale": "Ammonia, hydrogen sulfide, and chlorine are not criteria pollutants."}]}, {"question": "What distinguishes a primary NAAQS from a secondary NAAQS?", "options": [{"text": "Primary NAAQS regulate primary pollutants; secondary NAAQS regulate secondary pollutants", "isCorrect": false, "rationale": "The terminology is independent: NAAQS classify by what they protect, not by formation pathway."}, {"text": "Primary NAAQS apply outdoors; secondary NAAQS apply indoors", "isCorrect": false, "rationale": "Both apply to ambient (outdoor) air; the Clean Air Act does not regulate indoor air via NAAQS."}, {"text": "Primary NAAQS are set to protect public health; secondary NAAQS are set to protect public welfare (visibility, crops, materials, ecosystems)", "isCorrect": true, "rationale": "Correct. Primary protects health (with margin of safety for sensitive populations); secondary protects welfare effects like visibility, agriculture, and materials."}, {"text": "Primary NAAQS are voluntary; secondary NAAQS are legally enforceable", "isCorrect": false, "rationale": "Both are legally enforceable concentration limits."}]}, {"question": "[Stimulus] Section 108(a)(1) of the Clean Air Act directs the EPA Administrator to list pollutants whose emissions \"may reasonably be anticipated to endanger public health or welfare,\" come from \"numerous or diverse mobile or stationary sources,\" and for which air quality criteria had not been issued before 1970. Which feature of this statutory framework best explains why lead was added to the criteria-pollutant list in 1978 rather than 1970?", "options": [{"text": "The statute requires criteria to reflect the latest scientific knowledge, allowing the list to expand as health evidence accumulates", "isCorrect": true, "rationale": "Correct. The 'latest scientific knowledge' clause and the litigation mechanism allowed advocacy groups to compel EPA to add lead once health evidence and source diversity satisfied the 108 triggers."}, {"text": "The 1990 amendments required EPA to review and add new pollutants every five years", "isCorrect": false, "rationale": "The five-year review applies to existing NAAQS, not adding new criteria pollutants; lead was added in 1978, before 1990."}, {"text": "Lead emissions did not exist in 1970 and emerged only after catalytic converters were introduced", "isCorrect": false, "rationale": "Lead emissions from leaded gasoline were widespread in 1970; the issue was regulatory recognition, not emission origin."}, {"text": "Section 108 specifically prohibits adding pollutants after the original 1970 list", "isCorrect": false, "rationale": "The statute is a living framework explicitly designed to accommodate revisions and additions."}]}, {"question": "What happens to a US geographic area that the EPA designates as \"nonattainment\" for a criteria pollutant?", "options": [{"text": "Federal Clean Air Act protections are suspended in that area", "isCorrect": false, "rationale": "Nonattainment triggers more stringent oversight, not suspension of protections."}, {"text": "The state must submit a State Implementation Plan (SIP) describing how it will achieve the standard, or face EPA imposition of a Federal Implementation Plan and potential withholding of federal highway funds", "isCorrect": true, "rationale": "Correct. Nonattainment triggers SIP requirements with real enforcement teeth, including FIPs and highway-funding sanctions."}, {"text": "All industrial facilities in the area must immediately cease operations", "isCorrect": false, "rationale": "Nonattainment requires planned reductions, not immediate shutdowns."}, {"text": "The area is exempt from the NAAQS until concentrations naturally decline", "isCorrect": false, "rationale": "Nonattainment areas face stricter, not looser, regulation."}]}, {"question": "Why are secondary pollutants generally more difficult to regulate than primary pollutants?", "options": [{"text": "Secondary pollutants do not have legally binding standards", "isCorrect": false, "rationale": "Secondary pollutants like tropospheric ozone have NAAQS just as primary ones do."}, {"text": "Controlling them requires regulating multiple precursor emissions from many separate sources rather than capturing a single substance at the smokestack or tailpipe", "isCorrect": true, "rationale": "Correct. Reducing a secondary pollutant such as ozone requires simultaneous reductions in VOCs and NOx from hundreds of mobile and stationary sources, not a single-source fix."}, {"text": "Secondary pollutants are emitted at much higher concentrations than primary pollutants", "isCorrect": false, "rationale": "By definition, secondary pollutants are not emitted at all; they form in the atmosphere."}, {"text": "EPA lacks legal authority to regulate secondary pollutants", "isCorrect": false, "rationale": "EPA has full statutory authority via the Clean Air Act."}]}, {"question": "[Stimulus] In Los Angeles, decades of effort to attain the ozone NAAQS required simultaneous reductions in vehicle emissions, stationary-source NOx, and consumer-product VOC content. What does this multi-front strategy reveal about the regulatory architecture for secondary pollutants?", "options": [{"text": "Ozone is impossible to control in any urban environment", "isCorrect": false, "rationale": "Ozone has been successfully reduced in many cities; the LA case shows that multi-source coordinated reductions work."}, {"text": "Local government cannot regulate ozone; only federal agencies can act", "isCorrect": false, "rationale": "States and localities co-implement via SIPs, often with measures stricter than federal floor."}, {"text": "Because ozone forms from multiple precursors emitted by hundreds of distinct sources, attaining the NAAQS requires coordinated reductions across the full inventory of VOC and NOx emitters", "isCorrect": true, "rationale": "Correct. Secondary-pollutant control requires precursor-level regulation across many source categories, contrasting with single-source primary-pollutant control."}, {"text": "Photochemical smog is a regional, not local, problem and only interstate compacts can address it", "isCorrect": false, "rationale": "Although regional transport matters, the LA basin's smog is largely controlled through in-basin measures."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
