<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Spatial Patterns of Global Agriculture</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Von Thünen proposed his model of agricultural land use in 1826 based on observations of his own estate near Rostock. Which of the following correctly identifies the variable that, in von Thünen's model, determines where each agricultural activity locates relative to the central market?", "options": [{"text": "Soil fertility, which is highest near the city and decreases with distance.", "isCorrect": false, "rationale": "Von Thünen's model explicitly assumes a uniform agricultural plain—equally fertile throughout. The sorting mechanism is transport cost and perishability, not differential soil quality."}, {"text": "The interaction of transport cost per unit and product perishability, which determines which land use offers the highest bid-rent at each distance.", "isCorrect": true, "rationale": "Von Thünen's core insight is that a farmer will plant whichever crop yields the highest rent—the surplus after transport costs are deducted from market price. Because transport costs increase with distance, high-value perishable products can only be profitable near the market, while bulky, storable, low-value products absorb the cost of production farther away."}, {"text": "Government agricultural subsidies, which favor certain crop types in zones close to urban administrative centers.", "isCorrect": false, "rationale": "Von Thünen's model is a pure economic model based on transport cost and market price—it predates modern government subsidy programs and does not incorporate political intervention. The model is based on market competition, not policy."}, {"text": "The availability of irrigation infrastructure, which allows intensive farming only in zones with water access.", "isCorrect": false, "rationale": "Von Thünen's model assumes a homogeneous plain with no rivers or infrastructure differences. Irrigation availability would distort the rings in practice, which is acknowledged as a limitation of the model, not a variable in it."}], "id": "q01"}, {"question": "A food systems researcher maps the origins of produce sold in London supermarkets and finds that Kenyan green beans harvested yesterday are available today. According to a globalized interpretation of von Thünen's model, this pattern best illustrates which of the following?", "options": [{"text": "Kenya has become part of von Thünen's outer ring because its agricultural wages are lower than those in Europe.", "isCorrect": false, "rationale": "Kenya occupies an 'inner ring' position in the globalized model, not an outer ring. Lower wages affect profit margins but do not determine ring placement in von Thünen's logic, which is driven by perishability and transport cost-to-value ratios."}, {"text": "Airfreight logistics have compressed distance so that high-value, highly perishable crops from Kenya effectively occupy an 'inner ring' position relative to London regardless of physical distance.", "isCorrect": true, "rationale": "The text explicitly uses Kenyan roses and green beans airfreighted to London as the example of how the globalized model works: high value and high perishability justify the high transport cost of airfreight, placing Kenya 'in von Thünen's inner ring by the logic of high value, high perishability, and high transport-cost tolerance—even though Kenya is literally on the other side of the planet from London.'"}, {"text": "Global trade agreements have overridden the von Thünen model, making geography irrelevant to agricultural location.", "isCorrect": false, "rationale": "The text argues that the rings have not disappeared—they have gone global. Geography remains relevant, but the decisive variable has shifted from cart distance to airfreight economics. The model's core logic is preserved, not overridden."}, {"text": "Kenya is located in von Thünen's outer ring because livestock and bulk grain production are its primary agricultural exports.", "isCorrect": false, "rationale": "The text specifically identifies Kenyan roses and green beans—high-value, highly perishable crops—as inner-ring productions in the globalized model. Outer-ring logic applies to bulk, low-value, low-perishability commodities like grain or livestock, not to airfreighted fresh produce."}], "id": "q02"}, {"question": "Shifting cultivation (swidden agriculture) is described as sustainable at low population densities but breaking down as populations grow. Which combination of factors explains this relationship?", "options": [{"text": "Swidden is sustainable at low density because forests regenerate quickly, but higher density forces farmers to cultivate more nutrient-rich land near rivers.", "isCorrect": false, "rationale": "The sustainability mechanism is about fallow period length, not about relocating to river land. The key variable is the ratio of fallow period to cultivation period, not access to better soils."}, {"text": "Swidden is sustainable at low density because long fallow periods allow forest regeneration and nutrient rebuilding; higher populations shorten fallow periods, preventing regeneration and causing soil fertility decline.", "isCorrect": true, "rationale": "The text describes the system as cultivating land for two to five years, then abandoning it for a fallow period of ten to twenty-five years during which the forest regenerates and nutrients rebuild. As populations grow, more land must be under cultivation simultaneously, which shortens fallow periods, prevents adequate regeneration, and causes the system to break down."}, {"text": "Swidden is unsustainable even at low density because burning always releases more carbon than the soil can replace.", "isCorrect": false, "rationale": "The text explicitly states that traditional swidden at low densities is 'closed-loop,' distinguishing it from commercial deforestation. The carbon dynamics of traditional swidden are sustainable; the breakdown occurs specifically when population pressure shortens fallow periods."}, {"text": "Swidden requires increasingly large inputs of labor at higher densities, making it economically unviable compared to paddy rice farming.", "isCorrect": false, "rationale": "Labor requirements are not the driver of swidden's population-density constraint. The issue is ecological—specifically the soil fertility cycle and fallow period length—not economic competition with other farming systems."}], "id": "q03"}, {"question": "A geographer is comparing intensive subsistence agriculture in the Yangtze Delta with extensive grain farming on the American Great Plains. Which statement correctly distinguishes these two systems using the concept of input intensity?", "options": [{"text": "Intensive subsistence applies more land per unit of labor; extensive grain farming applies more labor per unit of land.", "isCorrect": false, "rationale": "This reverses the relationship. Intensive agriculture applies more labor and capital per unit of land; extensive agriculture uses low inputs per unit of land but operates at large scale. The Yangtze Delta's paddy rice requires ten to twenty times the labor input per hectare of comparable dryland grain farming."}, {"text": "Both systems produce comparable yields per hectare because they optimize different variables to achieve the same output.", "isCorrect": false, "rationale": "Yield per hectare differs substantially: intensive paddy rice routinely exceeds 4–6 tonnes per hectare; extensive grain farms produce lower yields per hectare but compensate through sheer scale. The systems do not converge on the same yield level."}, {"text": "Intensive subsistence applies very high labor inputs per hectare to achieve high yields on limited land; extensive grain farming uses low inputs per hectare across vast areas to produce commercially viable aggregate output.", "isCorrect": true, "rationale": "The text explicitly defines extensive agriculture as characterized by low inputs of labor and capital per unit of land, relying on large farm sizes. Intensive subsistence—particularly wet-rice cultivation—requires ten to twenty times the labor input per hectare of comparable dryland grain farming, with yields routinely exceeding 4–6 tonnes per hectare."}, {"text": "Intensive subsistence is practiced only in urban zones, while extensive farming is limited to rural peripheries far from markets.", "isCorrect": false, "rationale": "Intensive subsistence rice farming is not an urban activity—it is found in the river deltas and coastal plains of East and South Asia. The intensive/extensive distinction refers to input levels per unit of land, not proximity to cities."}], "id": "q04"}, {"question": "Plantation agriculture is described as 'historically inseparable from colonialism.' Which of the following best supports this claim using evidence from the text?", "options": [{"text": "Plantation crops like coffee and cacao require tropical climates that were only accessible after European colonization established trade routes.", "isCorrect": false, "rationale": "While European colonization did open trade routes, the claim about inseparability from colonialism is specifically about the economic and political organization of plantation systems—export-crop dependence, foreign corporate control, and the legacy of coerced labor—not just climate access."}, {"text": "Tropical colonies were organized to produce raw commodities for metropolitan processors, creating export-crop dependence and large landholdings by multinationals that persist today.", "isCorrect": true, "rationale": "The text states: 'The plantation system is historically inseparable from colonialism: tropical colonies were organized to produce raw agricultural commodities for metropolitan processors and consumers.' The legacy is visible today in former colonies' export-crop dependence, multinational landholdings, and the 'banana republic' archetype of politically dominated single-crop economies."}, {"text": "Colonial governments banned traditional subsistence farming, forcing all colonial populations into plantation wage labor.", "isCorrect": false, "rationale": "While colonial agriculture did displace traditional land use, the text's specific claim about colonialism's connection to plantation systems is about export-commodity organization and the structural legacy of that system—not a universal ban on subsistence farming."}, {"text": "Plantation crops were only introduced to tropical regions after the abolition of slavery, creating free-labor commercial agriculture in former colonies.", "isCorrect": false, "rationale": "The text describes plantation agriculture as using 'a hired or historically coerced labor force,' acknowledging its roots in coerced labor. The plantation system predates the abolition of slavery and did not originate as a post-abolition free-labor institution."}], "id": "q05"}, {"question": "Scenario: A dairy farmer in Vermont is considering relocating operations to rural Montana, where land costs are significantly lower. Based on von Thünen's model, what geographic reasoning should most strongly caution against this decision?", "options": [{"text": "Montana's climate is too cold for dairy cattle, making milk production biologically impossible.", "isCorrect": false, "rationale": "Climate is a real-world consideration, but von Thünen's model does not incorporate climate—it assumes a uniform plain. The reasoning from the model concerns transport cost and perishability economics, not biological suitability."}, {"text": "Dairy products are highly perishable and require intensive production close to urban markets; the transport cost of shipping fresh milk from Montana would likely eliminate the land-cost savings.", "isCorrect": true, "rationale": "Von Thünen's model places dairy in the innermost ring precisely because fresh milk is highly perishable and loses value rapidly in transit. The model predicts that only proximity to the market makes highly perishable products profitable. Increased transport costs from Montana would likely outweigh the savings in land costs."}, {"text": "Grain farming is more profitable than dairy farming in Montana, so the farmer should switch crops rather than relocate.", "isCorrect": false, "rationale": "While this may be economically true, it does not apply von Thünen's reasoning to the original question of whether dairy production should relocate. The model's logic is about transport cost and perishability determining optimal location, not comparing profitability of different crops in a single location."}, {"text": "Montana's distance from major cities places it in von Thünen's timber zone, where only forestry is economically viable.", "isCorrect": false, "rationale": "The timber zone is a historical artifact of von Thünen's pre-industrial context, where wood was the primary fuel and construction material. The text notes that this zone 'has largely disappeared in post-industrial economies.' The reasoning should focus on perishability and transport cost, not on the literal timber-zone placement."}], "id": "q06"}, {"question": "Pastoral nomadism evolved as a strategy for extracting nutritional value from environments where crop cultivation was unreliable. Which physical-geographic condition most directly explains why pastoralism—rather than grain farming—became the dominant agricultural system in the Mongolian steppe and the Sahel?", "options": [{"text": "These regions lack access to international markets, making commercial grain production economically unviable.", "isCorrect": false, "rationale": "Market access is an economic rather than physical-geographic explanation, and the text grounds pastoralism's distribution in the physical character of these environments: aridity and variability that make crop production unreliable, not market disconnection."}, {"text": "These regions have high population densities that demand mobile food production systems capable of covering large territories.", "isCorrect": false, "rationale": "Pastoral zones are typically characterized by low population densities, not high ones. The text notes that pastoral nomadism evolved as an efficient strategy for extracting value from landscapes 'too arid or variable for reliable crop production'—a physical constraint, not a population pressure argument."}, {"text": "These regions are too arid and ecologically variable for reliable crop production, making mobile herding across seasonal grazing ranges the most efficient strategy for extracting nutritional value.", "isCorrect": true, "rationale": "The text states that pastoral nomadism 'evolved as an efficient strategy for extracting nutritional value from landscapes too arid or variable for reliable crop production.' The Sahel and Central Asian steppe are precisely the semi-arid, ecologically variable landscapes where this logic applies."}, {"text": "Government policies in these regions historically prohibited crop farming, channeling agricultural investment exclusively into livestock.", "isCorrect": false, "rationale": "The text does not attribute pastoralism's distribution to government prohibition of crop farming. It explains pastoralism as an ecological adaptation to arid, variable landscapes—not as a politically mandated system."}], "id": "q07"}, {"question": "The original von Thünen model placed forestry in the second ring, between dairy/market gardening and extensive crop farming. In contemporary post-industrial economies, which of the following best explains why this timber ring has largely disappeared?", "options": [{"text": "Urban demand for wood has declined because modern construction uses concrete and steel, making the timber ring economically obsolete.", "isCorrect": false, "rationale": "While construction materials have diversified, the text's explanation for the timber ring's disappearance is not primarily about reduced demand for wood but about changes in transportation technology that altered the cost structure that originally made heavy timber only viable for short hauls."}, {"text": "In von Thünen's pre-industrial era, wood was the primary fuel and construction material, too heavy to transport cheaply; modern transportation infrastructure has reduced timber's transport-cost disadvantage, making it viable to source from distant forests.", "isCorrect": true, "rationale": "The text explains: 'In von Thünen's pre-industrial era, wood was the primary fuel and construction material, too heavy to transport cheaply. This zone has largely disappeared in post-industrial economies.' Rail, trucking, and waterway transport have so reduced the per-unit transport cost of heavy timber that it no longer needs to be produced in the immediate urban hinterland."}, {"text": "Deforestation has eliminated forests near all major cities, forcing urban timber supplies to come from distant regions regardless of the model's prediction.", "isCorrect": false, "rationale": "While urban deforestation is real, the text's explanation for the timber ring's disappearance is structural—about how changes in transportation economics have altered the cost relationships on which the ring depended—not simply about physical forest removal near cities."}, {"text": "Von Thünen included timber in his model by mistake; empirical surveys showed it was never actually concentrated near cities.", "isCorrect": false, "rationale": "The text states that von Thünen verified the ring pattern 'empirically by mapping actual land use around Rostock,' including the timber ring. The ring was real in its historical context; it has disappeared as economic conditions changed."}], "id": "q08"}, {"question": "Mixed crop-livestock farming predominates in the American Corn Belt. Which ecological logic best explains the integration of livestock raising with corn and feed-grain production in this system?", "options": [{"text": "Livestock provide transportation for moving grain from farms to urban markets, reducing reliance on mechanized logistics.", "isCorrect": false, "rationale": "This reflects an outdated pre-industrial understanding of livestock's role. In the modern Corn Belt, livestock do not serve a transportation function. The ecological integration concerns soil fertility and feed-conversion economics, not logistics."}, {"text": "Livestock convert low-value feed grains and crop residues into higher-value meat and dairy products while producing manure that replenishes soil fertility.", "isCorrect": true, "rationale": "The text explicitly states: 'The ecological logic is that livestock convert low-value feed grains and crop residues into higher-value meat and dairy products, while also producing manure that replenishes soil fertility.' This circular flow—grains feed livestock, livestock enrich soil—defines the mixed crop-livestock system's logic."}, {"text": "The Corn Belt's climate is too cold for grain-only farming, so farmers diversify into livestock to maintain year-round income.", "isCorrect": false, "rationale": "Climate is not the explanatory variable for mixed crop-livestock farming. The Corn Belt produces massive grain harvests; the integration with livestock is an economic and ecological efficiency strategy, not a climate-driven necessity."}, {"text": "Government subsidies require Corn Belt farmers to raise both crops and livestock to qualify for agricultural support programs.", "isCorrect": false, "rationale": "The text explains mixed crop-livestock farming through ecological logic—the feed-conversion cycle and soil fertility maintenance—not through government subsidy requirements."}], "id": "q09"}, {"question": "Scenario: A researcher compares two commodity flows—Chilean blueberries airfreighted to British supermarkets in January, and Australian wheat shipped by bulk carrier to Asian flour mills. Applying von Thünen's globalized model, which of the following correctly describes the ring position of each commodity and explains the difference?", "options": [{"text": "Both commodities occupy the outer ring because both originate in the Southern Hemisphere, far from Northern Hemisphere consumption centers.", "isCorrect": false, "rationale": "Von Thünen's ring position is determined by perishability and transport-cost-to-value ratio, not by physical distance per se. Airfreight can 'teleport' high-value perishable products to inner-ring proximity regardless of geographic distance."}, {"text": "Chilean blueberries occupy an inner-ring position because their high value and high perishability justify airfreight costs; Australian wheat occupies an outer-ring position because its low value per unit and low perishability make bulk shipping economically viable.", "isCorrect": true, "rationale": "The text applies exactly this logic: high-value, perishable commodities (flowers, fresh berries, green beans) can 'teleport' to inner-ring proximity regardless of physical distance, while bulk commodities (grain, soybeans) remain outer-ring productions because their transport costs per unit of value are low. Blueberries are high-value and highly perishable; wheat is low-value per unit and storable."}, {"text": "Australian wheat occupies the inner ring because it is produced close to Asian markets, while Chilean blueberries occupy the outer ring because they must cross the equator.", "isCorrect": false, "rationale": "Ring position is not determined by hemispheric proximity. Australia is not particularly close to most Asian urban markets on a global scale, and crossing the equator has no special significance in the model. The determining variables are perishability and transport cost relative to value."}, {"text": "Both commodities occupy the inner ring because both are products of modern agribusiness supply chains integrated into global markets.", "isCorrect": false, "rationale": "Integration into global supply chains does not determine ring position. The text maintains that the ring distinction between inner (perishable, high-value) and outer (storable, low-value) remains valid in the globalized model—the key variables are perishability and the ratio of transport cost to product value."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
