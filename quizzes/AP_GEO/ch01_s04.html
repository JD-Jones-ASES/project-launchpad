<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Scales of Analysis and the Spatial Perspective</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "At the global scale, economists describe the shift of manufacturing from the United States to Vietnam as a rational response to lower labor costs — an 'economic efficiency' outcome. A community organizer in Kannapolis, North Carolina, describes the same process as the 'destruction of a town.' Which geographic principle BEST explains why both characterizations can be simultaneously accurate?", "options": [{"text": "The gravity model predicts that manufacturing will always gravitate toward lower-cost labor markets, making both outcomes inevitable and equally correct.", "isCorrect": false, "rationale": "The gravity model predicts interaction between places based on population size and distance; it does not explain manufacturing location decisions or the human consequences of deindustrialization. The question calls for a scale-analysis explanation."}, {"text": "The same geographic phenomenon reveals different causal structures and human consequences at different scales of analysis; a process that appears as rational efficiency at the global scale produces specific, devastating local outcomes that the global scale cannot capture.", "isCorrect": true, "rationale": "This is the core scale-crossing principle the section develops through the outsourcing example. At the global scale, factor-cost differences explain manufacturing migration as economic efficiency. At the local scale (Kannapolis), the same process is the story of Pillowtex's closure, 4,500 layoffs, and a depopulated downtown. Both are true; neither scale alone provides a complete explanation."}, {"text": "The economist is using quantitative data while the community organizer is using qualitative data, so their accounts are not comparable.", "isCorrect": false, "rationale": "The quantitative/qualitative distinction is real and relevant, but it does not explain why the two accounts describe different aspects of the same phenomenon. The section's argument is that the difference in characterization results from the difference in geographic scale, not from data type."}, {"text": "The community organizer is wrong because the national scale shows that manufacturing employment in the U.S. has actually increased since 1979.", "isCorrect": false, "rationale": "The source text states that U.S. manufacturing employment fell from approximately 19 million in 1979 to approximately 13 million in 2022 — a significant decline. The community organizer's account of local devastation is consistent with national-scale deindustrialization data."}], "id": "q01"}, {"question": "In the first wave of the COVID-19 pandemic (spring 2020), major metropolitan areas like New York City, Milan, and Madrid bore disproportionate burdens. By the second and third waves (fall–winter 2020), the geographic center shifted toward rural areas and the interior Sun Belt. Which scale of analysis BEST explains this geographic shift, and what mechanism does it reveal?", "options": [{"text": "The global scale; the shift reflects changes in international airline routes that redirected the virus from coastal cities to rural airports.", "isCorrect": false, "rationale": "The global scale explains the initial seeding of the pandemic along international airline networks — why the virus arrived in major gateway cities first. The subsequent shift from urban to rural regions is a within-country geographic dynamic better captured at the regional and national scales."}, {"text": "The local scale; the shift resulted from specific public health decisions made by individual city health departments.", "isCorrect": false, "rationale": "Local-scale analysis captures within-city disparities (e.g., by zip code) but does not explain the broad urban-to-rural geographic shift across an entire country. That pattern requires regional-scale analysis."}, {"text": "The regional scale; it reveals how urban-rural density gradients shaped the pandemic's wave sequence — dense metro areas were seeded first, while rural areas faced successive waves as urban populations gained immunity and rural hospital capacity proved insufficient.", "isCorrect": true, "rationale": "The source text explicitly identifies the regional scale as the level at which the urban-rural COVID-19 dynamic is visible. Dense coastal metro areas were seeded earliest via airline networks; later waves shifted to rural interior areas as urban first-wave susceptibles were exhausted, indoor venues reopened in warm-weather states, and rural hospitals lacked surge capacity."}, {"text": "The national scale; it shows that countries with universal healthcare shifted COVID burden from cities to rural areas more effectively than countries with market-based systems.", "isCorrect": false, "rationale": "National-scale analysis compares aggregate outcomes across sovereign states — case fatality rates, vaccination equity, health system capacity. It does not explain the within-country urban-to-rural geographic shift that the question describes."}], "id": "q02"}, {"question": "Using the COVID-19 pandemic as a geographic case study, a student is asked on an FRQ to explain why COVID-19 mortality in Chicago's south and west side zip codes was two to three times higher than in majority-white zip codes in spring 2020. At which scale of analysis should the student focus, and what causal mechanisms should the response identify?", "options": [{"text": "The global scale; the student should explain how international airline routes seeded Chicago with more viral variants than other U.S. cities.", "isCorrect": false, "rationale": "Airline network seeding explains how the virus arrived in major cities generally, not why mortality was concentrated in specific neighborhoods within a single city. The within-city mortality disparity requires local-scale analysis."}, {"text": "The national scale; the student should compare U.S. public health infrastructure to other countries' systems to explain why Chicago's outcomes were worse than comparable global cities.", "isCorrect": false, "rationale": "National-scale analysis compares aggregate outcomes across countries. The question asks about disparities within a single city — Chicago's south and west side zip codes compared to other Chicago zip codes — which is a local-scale question."}, {"text": "The local scale; the response should identify how the spatial concentration of essential workers, overcrowded housing, and limited access to primary care and testing — shaped by the legacy geography of racial residential segregation — produced concentrated COVID mortality in specific zip codes.", "isCorrect": true, "rationale": "The source text explicitly provides this local-scale analysis: Chicago's highest COVID mortality zip codes in spring 2020 were on the south and west sides, mapping closely onto existing geographies of poverty, race, and healthcare access. The causal mechanisms — essential worker concentration, overcrowded housing preventing household isolation, limited primary care — are only visible at the local scale."}, {"text": "The regional scale; the response should explain how the Midwest's lower population density compared to the Northeast reduced testing capacity in Chicago.", "isCorrect": false, "rationale": "The Midwest's regional characteristics do not explain within-Chicago zip code variation. The mortality disparity between Chicago neighborhoods reflects local geographies of race, housing density, occupational structure, and healthcare access — local-scale factors."}], "id": "q03"}, {"question": "A geographer studying a river basin analyzes flooding patterns at four scales: a single farm's drainage ditches; the watershed of the river's main tributaries; the national policy framework for floodplain management; and the global climate system driving rainfall intensity. Which of the following CORRECTLY matches each level to its standard scale of analysis?", "options": [{"text": "Farm drainage = regional; tributary watershed = local; national policy = global; global climate = national.", "isCorrect": false, "rationale": "This shuffles the scales incorrectly. A single farm is the local scale; a tributary watershed spanning multiple counties is the regional scale; national policy operates at the national scale; global climate systems operate at the global scale."}, {"text": "Farm drainage = local; tributary watershed = regional; national policy = national; global climate = global.", "isCorrect": true, "rationale": "The four standard scales align precisely: local (a specific farm or site), regional (a watershed or multi-county area), national (sovereign state policies and aggregate data), and global (planetary-scale systems and processes). Each reveals different causal mechanisms — local drainage management, regional flood routing, national policy incentives, and global atmospheric circulation."}, {"text": "Farm drainage = local; tributary watershed = national; national policy = regional; global climate = global.", "isCorrect": false, "rationale": "A tributary watershed spanning multiple counties or a drainage basin is a regional phenomenon — it does not reach the national scale. National policy frameworks operate at the national (sovereign state) level, not at the regional level."}, {"text": "Farm drainage = regional; tributary watershed = national; national policy = local; global climate = global.", "isCorrect": false, "rationale": "A single farm's drainage infrastructure is the most intimate, local scale. National policy frameworks govern entire sovereign territories — they are national, not local. The tributary watershed belongs at the regional scale."}], "id": "q04"}, {"question": "A student argues: 'The COVID-19 pandemic proves geography no longer matters because a virus can reach any country in the world within hours via airplane.' Using evidence from this section, which response BEST refutes this claim?", "options": [{"text": "The student is correct; the pandemic demonstrated that geographic distance is no longer a barrier to disease diffusion.", "isCorrect": false, "rationale": "The section provides extensive evidence that geography shaped every aspect of the pandemic — which cities were seeded first (airline network geography), which countries suppressed it (island nation geography and border control), which regions were hit in successive waves (urban-rural density gradients), and which neighborhoods suffered highest mortality (residential segregation geography)."}, {"text": "The student is partially correct that air travel accelerated diffusion, but geography still determined which cities were seeded first, which countries could use border controls, which regions were hit in successive waves, and which neighborhoods had the highest mortality — demonstrating that location, distance, and scale all matter.", "isCorrect": true, "rationale": "The spatial perspective insists that location, distance, and scale always matter — and the COVID-19 evidence confirms this at every scale. The airline network (geography) determined the first seeding events; island geography enabled New Zealand and Taiwan's early suppression; urban-rural density gradients shaped the wave sequence; and residential segregation geography produced within-city mortality disparities. Speed of diffusion increased, but geography was the framework through which the pandemic played out."}, {"text": "The student is correct that geography no longer matters for disease diffusion, but geography still matters for economic and cultural processes.", "isCorrect": false, "rationale": "The section shows that geography structured the COVID-19 pandemic at every scale — initial seeding along airline routes, national suppression capacity, regional wave sequence, and local mortality disparities. Geography did not stop mattering for disease diffusion; the pandemic is one of the strongest recent demonstrations that it still does."}, {"text": "The student is wrong because pre-industrial diseases could not travel across the world, proving that geographic barriers have always been absolute.", "isCorrect": false, "rationale": "Pre-industrial diseases did travel intercontinentally (the Black Death, smallpox, the 1918 flu), though more slowly. The claim that geographic barriers were ever 'absolute' is historically inaccurate. The stronger refutation of the student's position is the COVID-19 evidence itself, showing that geography structured every scale of the pandemic even when the virus moved quickly."}], "id": "q05"}, {"question": "Which of the following BEST describes the spatial perspective as a foundational geographic lens?", "options": [{"text": "The spatial perspective asks primarily 'when did this happen?' — placing geographic events within their historical sequence to understand causes and consequences.", "isCorrect": false, "rationale": "'When did this happen?' is the historian's question. The source text explicitly contrasts this with the geographer's spatial perspective, which asks 'where is this, and why there?' The spatial perspective focuses on location and spatial distribution as constitutive features of social life, not on temporal sequence."}, {"text": "The spatial perspective asks 'where is this, and why there?' — treating location as a constitutive feature of social, economic, and political life, and asking how distance, scale, and spatial distribution shape outcomes.", "isCorrect": true, "rationale": "The source text defines the spatial perspective as asking, 'first and most basically: where is this, and why there?' It insists that location is not a backdrop but a constitutive feature — the spatial questions (Does location matter? Does distance matter? Does scale change what I see?) are the defining questions of geographic analysis."}, {"text": "The spatial perspective treats geography as merely a backdrop for understanding social processes, recognizing that location is rarely the primary cause of human behavior.", "isCorrect": false, "rationale": "The source text explicitly rejects this view: the spatial perspective 'insists that location is not a backdrop or accident but a constitutive feature of social, economic, and political life.' Location is treated as a primary analytical variable, not a neutral background."}, {"text": "The spatial perspective is the same as the temporal perspective because geographic patterns are always the result of historical processes.", "isCorrect": false, "rationale": "While geographic patterns do have historical dimensions, the source text identifies the spatial perspective as a distinct disciplinary lens — asking where and why there, not when. The text contrasts the geographer's spatial questions with the historian's temporal questions, presenting them as complementary but distinct."}], "id": "q06"}, {"question": "The Piedmont region of North and South Carolina experienced the closure of textile mills in the 1990s and 2000s while simultaneously seeing the construction of logistics and distribution centers employing many of the same communities. Which scale of analysis is MOST useful for revealing this simultaneous implosion and explosion of different economic sectors within the same bounded area?", "options": [{"text": "The global scale; it reveals the trade liberalization policies (GATT, WTO) and containerization that caused manufacturers to relocate to East Asia.", "isCorrect": false, "rationale": "The global scale explains why outsourcing happened — trade liberalization and transportation cost reductions. But the simultaneous within-region restructuring (mills closing, Amazon fulfillment centers opening in the same counties) is a spatial pattern that only the regional scale reveals."}, {"text": "The regional scale; it captures the spatial restructuring within a bounded geographic area — the sector-by-sector transformation of a defined region — that national averages conceal and that local analysis fragments into individual stories.", "isCorrect": true, "rationale": "The source text explicitly identifies the regional scale (the Piedmont) as the level at which the simultaneous collapse of textiles and rise of logistics becomes visible as a coherent spatial restructuring story. National-scale analysis shows aggregate job losses; local-scale analysis shows individual factory stories. The regional scale reveals the geographic pattern of one sector replacing another across an identifiable area."}, {"text": "The local scale; each individual mill town's experience must be studied separately to understand the Piedmont's economic transformation.", "isCorrect": false, "rationale": "Local-scale analysis (e.g., Kannapolis specifically) reveals the granular human story of specific buildings, specific workers, and specific community responses — but it cannot reveal the regional pattern of sector replacement across the Piedmont as a whole. That spatial restructuring pattern is a regional phenomenon."}, {"text": "The national scale; it reveals how the Rust Belt and Carolinas textile counties together account for most U.S. manufacturing job loss.", "isCorrect": false, "rationale": "The national scale aggregates data to show geographic concentration of job loss across the entire country. It points to the Rust Belt and Carolinas as hard-hit regions but cannot show the simultaneous sector restructuring occurring within the Piedmont itself."}], "id": "q07"}, {"question": "New Zealand, an island nation in the Pacific, achieved early suppression of COVID-19 in 2020 through aggressive testing, contact tracing, and border management — a suppression strategy unavailable to most continental economies. Which geographic factor MOST explains this difference in strategic capacity?", "options": [{"text": "New Zealand's smaller population gave it a lower absolute number of cases, making contact tracing easier regardless of geography.", "isCorrect": false, "rationale": "Population size alone does not determine suppression capacity — many small continental nations failed to suppress early spread. The source text identifies island geography and the ability to enforce border closures as the key geographic enabling factor for New Zealand's strategy."}, {"text": "New Zealand's island geography allowed it to enforce border closures that were simply not available to continental economies with extensive land borders — a national-scale geographic advantage.", "isCorrect": true, "rationale": "The source text explicitly states that 'island nations with stringent early border closures (New Zealand, Taiwan) achieved suppression unavailable to continental economies with porous borders.' Island geography is a site-scale physical characteristic that created a national-scale strategic advantage — demonstrating how physical geography and political geography interact across scales."}, {"text": "New Zealand's advanced healthcare system was the primary factor; geography had no independent effect on suppression outcomes.", "isCorrect": false, "rationale": "While healthcare capacity is a national-scale factor the section discusses, the text specifically attributes New Zealand's suppression advantage — relative to continental economies — to its island geography enabling border enforcement, not to healthcare quality alone."}, {"text": "New Zealand's distance from China reduced initial viral exposure, giving the country more time to prepare than geographically closer nations.", "isCorrect": false, "rationale": "While distance from the outbreak origin may have provided some lead time, the source text attributes New Zealand's suppression success to its island geography enabling strict border control, not simply to distance. Taiwan — geographically close to China — also achieved early suppression through the same island-border strategy."}], "id": "q08"}, {"question": "A complete geographic explanation of global outsourcing requires analysis at the global, national, regional, and local scales. Which of the following BEST describes what would be LOST if the analysis stopped at the global scale only?", "options": [{"text": "Nothing would be lost; the global scale captures all relevant causal mechanisms because outsourcing is driven by international trade policy and global labor markets.", "isCorrect": false, "rationale": "The section's central argument is that each scale reveals causal mechanisms invisible at other scales. Stopping at the global scale misses national-scale deindustrialization patterns, regional-scale sector restructuring, and the specific human and community stories that only local-scale analysis can provide."}, {"text": "The global scale is sufficient for policy analysis; only artistic or journalistic accounts require local-scale detail.", "isCorrect": false, "rationale": "The source text presents local-scale analysis — including specific data about Kannapolis, the Pillowtex closure, and community retraining responses — as essential geographic analysis, not merely journalistic color. Policy without local-scale analysis would miss where implementation succeeds or fails."}, {"text": "Stopping at the global scale would lose the national-scale geography of job loss distribution, the regional-scale spatial restructuring within affected areas, and the local-scale human consequences — all of which are invisible from the global perspective alone.", "isCorrect": true, "rationale": "The source text builds the outsourcing example across all four scales explicitly to show what each adds. The global scale explains why manufacturing moved; the national scale reveals where job loss concentrated (Rust Belt, Carolinas); the regional scale shows simultaneous implosion and new-sector growth; the local scale provides the specific story of Pillowtex, Kannapolis, and community responses. Stopping at global loses all three lower scales' insights."}, {"text": "Stopping at the global scale would lose precision in measuring how many jobs were lost in each affected country.", "isCorrect": false, "rationale": "Aggregate job-loss counts are national-scale statistics, not primarily a local-scale concern. The deeper loss from stopping at the global scale is the causal and human dimensions revealed by national, regional, and local analysis — not just numeric precision."}], "id": "q09"}, {"question": "A geographer examines economic inequality in Brazil using data at three scales: a global comparison of GDP per capita (Brazil vs. other countries); a regional map of income distribution by state; and a local analysis of income variation by neighborhood in São Paulo. The geographer finds that at each scale, the patterns and apparent causes look different. Which geographic concept BEST explains this finding, and what does it imply for how geographic questions should be answered?", "options": [{"text": "Distance decay; interactions between wealthy and poor areas diminish with distance, which is why inequality appears differently at each scale.", "isCorrect": false, "rationale": "Distance decay describes how the intensity of interaction decreases with distance — it is a principle about spatial interaction, not about how inequality patterns change when viewed at different scales of analysis."}, {"text": "The scalar difference principle; because the same phenomenon produces different geographic narratives at different scales, a complete geographic explanation typically requires multi-scalar analysis to identify which causal mechanisms operate at which spatial extent.", "isCorrect": true, "rationale": "The source text's central argument is that scale choice determines which patterns are visible and which causal mechanisms can be identified. Brazil's inequality looks different globally (structural differences between countries), regionally (north-south development gradient within Brazil), and locally (within São Paulo, the geography of favelas vs. commercial districts). A complete explanation requires all scales because each reveals different causal structures."}, {"text": "The spatial perspective insists that inequalities are best understood at the local scale because that is where people experience them directly.", "isCorrect": false, "rationale": "The spatial perspective does not privilege any single scale; it insists that all scales are necessary for complete understanding. The local scale captures direct human experience, but global and national causal forces — structural adjustment, trade policy, colonial history — are invisible from the local scale alone."}, {"text": "Cartographic scale; a map of Brazil at 1:10,000,000 cannot show neighborhood-level data, which is why inequality patterns look different.", "isCorrect": false, "rationale": "Cartographic scale (the representative fraction on a map) is a technical feature of map design. The geographic phenomenon described here concerns analytical scale — the spatial extent at which a process is studied — which is a different concept, even though both use the word 'scale.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
