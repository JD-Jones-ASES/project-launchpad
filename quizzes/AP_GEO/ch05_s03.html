<script>
var QUESTIONS = [{"question": "Cargill, Incorporated controls fertilizer production, grain purchasing and storage, flour milling, meat processing, shipping, and branded food retail. Which agribusiness strategy does this model exemplify?", "options": [{"text": "Horizontal acquisition, because Cargill operates at many stages of the food chain simultaneously.", "isCorrect": false, "rationale": "Horizontal acquisition refers to purchasing competitors at the same stage of the commodity chain—e.g., buying rival grain elevators. Cargill's control over multiple successive stages from input supply through production, processing, and distribution is the definition of vertical integration, not horizontal acquisition."}, {"text": "Vertical integration, because Cargill controls multiple successive stages of the commodity chain from input supply through retail.", "isCorrect": true, "rationale": "The text defines vertical integration as a company's control over multiple successive stages of the commodity chain—from input supply through production, processing, and distribution. Cargill is cited as the canonical example: it sells fertilizer, buys and stores grain, operates mills and meat-processing facilities, manages shipping, and sells branded food products."}, {"text": "Subsistence diversification, because Cargill reduces its vulnerability by operating across many food categories.", "isCorrect": false, "rationale": "'Subsistence diversification' is not a concept in agribusiness analysis. Cargill's multi-stage integration is a strategic corporate structure—vertical integration—designed to capture value at each stage of the chain, not a risk-reduction subsistence strategy."}, {"text": "Commodity chain fragmentation, because Cargill separates the stages of food production to avoid regulatory oversight.", "isCorrect": false, "rationale": "Cargill's strategy is integration—the opposite of fragmentation. The text describes Cargill as concentrating control over multiple stages in one corporation, not dispersing them to separate entities."}]}, {"question": "A commodity chain analysis of bananas from Honduras to Wisconsin reveals that a farm worker receives approximately $0.01–0.02 per pound while the consumer pays $0.59–0.69. Which of the following best explains this disparity using the concept of value capture in commodity chains?", "options": [{"text": "Honduran farm workers are paid below their true market wage because banana multinationals collude to suppress wages globally.", "isCorrect": false, "rationale": "While labor exploitation is a legitimate concern, the text's commodity chain analysis explains the wage-price gap through the structure of value added at each stage—logistics, processing, and retail—rather than through a wage-suppression conspiracy narrative."}, {"text": "The majority of value is captured at the logistics, processing, and retail stages—all dominated by corporations headquartered in wealthy countries—leaving farm workers and farmers with only a small fraction of the final price.", "isCorrect": true, "rationale": "The text's central finding from commodity chain analysis is that 'the majority of value in agricultural commodity chains is captured not by farmers or farm workers but by the logistics, processing, and retail stages—all of which are dominated by corporations headquartered in wealthy countries.' The farm-gate value ($3.50 per 18-kg box) versus retail value ($12–14 per box) illustrates this directly."}, {"text": "The price difference reflects the high cost of banana production in Honduras, where labor and land are expensive relative to the retail market.", "isCorrect": false, "rationale": "The text describes farm-worker wages as roughly $10–15 per day—not particularly high. The price disparity reflects where value is added and captured in the chain (logistics, ripening, retail), not the cost of production in Honduras."}, {"text": "The consumer price is inflated by taxation, and the majority of the retail price goes to government rather than to corporations or workers.", "isCorrect": false, "rationale": "The text does not mention taxation as the explanation for the farm-gate to retail price gap. The analysis attributes the gap to value added and captured at the logistics, processing, and retail stages."}]}, {"question": "Scenario: Imagine you are an economist advising a government in a country that derives 60% of its export earnings from a single crop. Based on the section's analysis of cash-crop dependence, which of the following risks should you prioritize in your advisory report?", "options": [{"text": "The risk that domestic consumers will prefer imported food over the locally grown export crop.", "isCorrect": false, "rationale": "Domestic consumer preference for imports is not the structural risk that cash-crop dependence analysis highlights. The text focuses on the vulnerability of export earnings to external price volatility, weather shocks, and policy changes—not domestic consumption patterns."}, {"text": "The structural vulnerability to commodity price volatility, weather shocks in producing regions, importing country policy changes, and synthetic substitutes, which can devastate foreign exchange earnings.", "isCorrect": true, "rationale": "The text states: 'Commodity prices are highly volatile—subject to weather shocks in major producing regions, to policy changes in importing countries, and to the substitution of synthetics. A country that derives 60% of its export earnings from coffee (as Ethiopia does) or 40% from cocoa (as Ivory Coast does) has very limited ability to cushion the impact of a bad harvest or a price collapse.'"}, {"text": "The risk that farmers will abandon export-crop agriculture and return to subsistence farming, reducing export revenues.", "isCorrect": false, "rationale": "The text does not identify farmer abandonment of export agriculture as a primary structural risk of cash-crop dependence. The risks are external—price volatility, weather shocks, and policy changes in importing countries—not internal defection from export agriculture."}, {"text": "The risk of overproduction, which would lower global commodity prices and harm all export nations simultaneously.", "isCorrect": false, "rationale": "While overproduction can depress prices, the text's analysis of cash-crop dependence focuses on the structural vulnerability of single-commodity export dependence—the lack of diversification buffers against shocks—not specifically on overproduction as the primary risk."}]}, {"question": "The seed industry underwent dramatic consolidation between 1996 and 2020. Which agribusiness strategy does this consolidation exemplify, and what was its primary market consequence?", "options": [{"text": "Vertical integration; it allowed seed companies to also control fertilizer and pesticide supply chains, creating a one-stop-shop for farmers.", "isCorrect": false, "rationale": "The seed industry consolidation is described as horizontal acquisition—companies buying competitors at the same stage of the commodity chain (seed production)—not vertical integration across different stages. The consolidation reduced the number of competitors from hundreds to effectively four major companies."}, {"text": "Horizontal acquisition; it reduced the number of seed companies from hundreds to effectively four dominant players controlling roughly 60% of the global commercial seed market.", "isCorrect": true, "rationale": "The text defines horizontal acquisition as a company's purchase of competitors at the same stage of the commodity chain, reducing competition and building market share. Monsanto's acquisition of hundreds of smaller seed companies (DeKalb Genetics, Holden's Foundation Seeds, Asgrow, etc.) between 1995 and 2015 exemplifies this, with the result that by 2020 four companies controlled roughly 60% of the global commercial seed market."}, {"text": "Just-in-time logistics; it allowed seed companies to deliver seeds to farmers precisely when needed, reducing storage costs.", "isCorrect": false, "rationale": "Just-in-time logistics is a supply chain management principle about minimizing inventory, not a corporate consolidation strategy. The seed industry story is about horizontal acquisition—buying competitors to reduce market competition."}, {"text": "Cold chain development; it preserved seed viability over long distances, enabling global seed distribution from centralized production centers.", "isCorrect": false, "rationale": "Cold chain management is about temperature-controlled logistics for perishable goods. Seed viability is a biological concern, but the text's analysis of the seed industry focuses entirely on corporate consolidation through horizontal acquisition, not logistics technology."}]}, {"question": "The Mexican avocado case study illustrates that the global food system 'operates within—and is sometimes shaped by—local political economies of violence and coercion that are invisible to the Wisconsin grocery store consumer.' Which evidence from the case study best supports this claim?", "options": [{"text": "Avocado production in Michoacán requires intensive irrigation, reflecting Mexico's water management challenges.", "isCorrect": false, "rationale": "Water management is mentioned in the case study (declining aquifer levels), but it does not illustrate the 'political economies of violence' claim. The specific evidence for that claim involves cartel extortion and the USDA suspension."}, {"text": "US per capita avocado consumption increased tenfold between 1990 and 2020, demonstrating the power of demographic shifts and culinary trends to reshape agricultural geographies.", "isCorrect": false, "rationale": "Demand growth illustrates how consumer behavior shapes production geography, but it does not illustrate the 'local political economies of violence' claim. The evidence for that claim is specifically about cartel involvement in the supply chain."}, {"text": "Organized crime cartels began extorting avocado farmers, charging 'taxes' per truckload, ultimately causing the USDA to temporarily suspend its inspection program in Michoacán after threats to inspectors.", "isCorrect": true, "rationale": "The text states that the Knights Templar Cartel and, later, the Jalisco New Generation Cartel (CJNG) began extorting avocado farmers and packers, charging 'taxes' of hundreds of dollars per truckload. By the early 2020s, the US Department of Agriculture temporarily suspended its USDA inspection program in Michoacán after its inspectors received threats. This is the evidence the text cites for the claim that local violence shapes the global food system invisibly to end consumers."}, {"text": "NAFTA eliminated tariffs that had previously protected US avocado producers from Mexican competition, restructuring the North American market.", "isCorrect": false, "rationale": "NAFTA's tariff elimination explains the avocado trade boom, but it represents a transparent trade policy change—not a 'local political economy of violence and coercion.' The cartel extortion is what makes the political economy 'invisible' to the consumer."}]}, {"question": "Scenario: A logistics manager explains to their team: 'Our entire avocado supply chain can be disrupted by a port strike in one city, an extreme weather event closing one highway, or a cyber attack on our scheduling software.' What supply chain concept does this statement reflect, and why is the food system particularly vulnerable to it?", "options": [{"text": "Cash-crop dependence, because the manager's concern reflects over-reliance on a single commodity across the entire system.", "isCorrect": false, "rationale": "Cash-crop dependence refers to a country's or region's economic reliance on a single export commodity, not to the logistical fragility of a supply chain. The manager is describing a vulnerability in the logistics system itself, not a problem of economic diversification."}, {"text": "Just-in-time logistics, which optimizes efficiency by minimizing inventory buffers but creates high vulnerability to disruptions at any single point in the chain.", "isCorrect": true, "rationale": "The text describes JIT systems as 'highly efficient under normal conditions but vulnerable to disruptions (port strikes, extreme weather, pandemic closures, and cyber attacks on logistics software)'—precisely the examples the manager cites. JIT minimizes inventory at every stage, removing the buffer that would otherwise absorb disruptions."}, {"text": "Vertical integration, because centralized corporate control of all supply chain stages creates a single point of failure.", "isCorrect": false, "rationale": "Vertical integration describes corporate ownership across multiple supply chain stages. While it may contribute to fragility in some cases, the specific vulnerability the manager describes—to port strikes, weather, and cyber attacks—is the text's definition of JIT logistics vulnerability, not vertical integration per se."}, {"text": "Horizontal consolidation, because fewer competing distributors means any single distributor's disruption affects a larger share of the market.", "isCorrect": false, "rationale": "Horizontal consolidation refers to reducing competition within a supply chain stage through acquisitions. The manager's concern is about the logistical coordination requirements and lack of inventory buffers characteristic of JIT systems, not about the number of competing firms."}]}, {"question": "The container shipping revolution, initiated by Malcom McLean in 1956, is described as 'the enabling infrastructure for the global agribusiness system.' Which combination of features most directly explains this enabling role?", "options": [{"text": "Containers standardized cargo dimensions and could carry refrigerated units, transfer between ships/trains/trucks without unpacking, and were tracked via GPS—together reducing freight costs by an estimated 90% between 1950 and 2000.", "isCorrect": true, "rationale": "The text identifies all four elements as constituting the container revolution's enabling role: standardized 20- and 40-foot containers; reefer-unit compatibility for perishables; intermodal transfer without unpacking; GPS tracking; and the resulting estimated 90% inflation-adjusted reduction in freight costs between 1950 and 2000, which made global food sourcing economically viable."}, {"text": "Container ships were faster than pre-container bulk carriers, reducing transit times and making more agricultural commodities viable for long-distance trade.", "isCorrect": false, "rationale": "The text does not attribute the container revolution's impact to ship speed. The key innovations were standardization, intermodal transfer capability, refrigeration compatibility, and the dramatic cost reduction—not transit time reduction."}, {"text": "Container shipping was subsidized by governments seeking to expand agricultural exports, making it artificially cheap compared to other modes.", "isCorrect": false, "rationale": "The text attributes the cost reduction to the efficiency of standardization and intermodal transfer—not to government subsidies. The container revolution was a private-sector innovation that reduced costs through operational efficiency."}, {"text": "Containers provided uniform storage temperatures that replaced the need for refrigeration, allowing any agricultural commodity to be shipped globally without spoilage.", "isCorrect": false, "rationale": "Containers do not inherently maintain temperature; that requires additional reefer (refrigeration) equipment. The text describes containers as capable of being loaded with reefer units for perishables—not as inherently temperature-controlled."}]}, {"question": "Climate change is shifting Arabica coffee's optimal growing zones upslope in Tanzania, Colombia, and Mexico. Which geographic consequence of this shift is most directly relevant to the structure of global coffee supply chains?", "options": [{"text": "Upslope migration allows farmers to access cooler temperatures that improve coffee bean quality, potentially increasing premium prices.", "isCorrect": false, "rationale": "While some quality effects are possible, the text's analysis of the coffee-climate case focuses on vulnerability and concentration—not on premium quality gains from higher altitude. The text emphasizes shrinking viable zones and supply chain fragility."}, {"text": "As viable coffee zones shrink and concentrate in fewer locations, global supply chains face greater price volatility and vulnerability to disruption in those remaining zones.", "isCorrect": true, "rationale": "The text states: 'For global supply chains, this means growing geographic concentration of coffee production in a shrinking number of viable zones—increasing price volatility and the vulnerability of importing countries to supply disruptions.' The squeeze is not just a local farming problem but a structural supply chain vulnerability."}, {"text": "Higher altitude production zones are less accessible to container shipping, increasing transport costs and making coffee less competitive against synthetic substitutes.", "isCorrect": false, "rationale": "While transport logistics from high-altitude farms can be challenging, the text's analysis focuses on the shrinking of viable growing zones and the concentration of production, not on transport access to altitude. Coffee's relationship to synthetic substitutes is mentioned briefly in the cash-crop section, not the climate section."}, {"text": "Mountain runout—where no higher altitude is available—will immediately end coffee production in all affected regions within the next decade.", "isCorrect": false, "rationale": "The text states that in some regions 'no higher altitude exists to retreat to; the mountain simply runs out,' but presents this as a future risk for some areas, not an immediate total cessation of production globally. The case study emphasizes ongoing transition and income loss, not immediate total collapse."}]}, {"question": "Which of the following correctly distinguishes between vertical integration and horizontal acquisition in agribusiness, and provides a correctly matched example for each?", "options": [{"text": "Vertical integration = controlling multiple stages of the commodity chain; Cargill (fertilizer → grain storage → milling → retail) is the example. Horizontal acquisition = purchasing competitors at the same stage; Monsanto buying DeKalb Genetics, Holden's, and Asgrow is the example.", "isCorrect": true, "rationale": "Both definitions and examples are correctly matched from the text. Vertical integration is control over successive stages (Cargill's model); horizontal acquisition is purchasing competitors at the same stage to reduce competition and build market share (Monsanto's seed company acquisitions)."}, {"text": "Vertical integration = purchasing competitors at the same stage; Monsanto buying seed companies is the example. Horizontal acquisition = controlling multiple stages; Cargill's operations are the example.", "isCorrect": false, "rationale": "This reverses the two concepts. The text explicitly defines vertical integration as control over multiple successive stages (Cargill) and horizontal acquisition as purchasing competitors at the same stage (Monsanto's seed acquisitions)."}, {"text": "Both strategies describe the same process of corporate growth; the distinction is only between domestic (horizontal) and international (vertical) expansion.", "isCorrect": false, "rationale": "Vertical and horizontal integration are fundamentally different strategies—one concerns the stages of the commodity chain (vertical) and the other concerns competition within a single stage (horizontal). Neither is defined by the domestic/international dimension."}, {"text": "Vertical integration refers to sustainable farming practices that reduce environmental impact; horizontal acquisition refers to corporate mergers that consolidate market power.", "isCorrect": false, "rationale": "'Vertical integration' in agribusiness analysis has nothing to do with sustainable farming. Both terms describe corporate structure—vertical integration is about control of multiple supply chain stages, horizontal acquisition is about consolidating market share at a single stage."}]}, {"question": "Scenario: A development economist argues: 'Export agriculture in the Global South is always extractive and never contributes to development.' Based on the section's nuanced treatment of cash-crop agriculture, which response best challenges this claim?", "options": [{"text": "The claim is correct because commodity chain analysis shows that all value in agricultural export chains is captured by corporations in the Global North.", "isCorrect": false, "rationale": "The text does state that most value in commodity chains is captured at the logistics/retail stages dominated by Global North corporations, but it explicitly acknowledges that cash-crop agriculture has in many cases been 'the primary vehicle for rural income growth and development investment in the Global South.' The claim of zero development benefit is not supported."}, {"text": "The claim overstates the case: Kenyan smallholder tea and flower growers, Colombian coffee cooperatives, and Vietnamese rice and coffee farmers have used export earnings to fund education, health care, and business investment—illustrating that the relationship between export agriculture and development is complex and context-dependent.", "isCorrect": true, "rationale": "The text directly challenges the blanket negative claim: 'The relationship between cash-crop specialization and development is not simply negative; it is complex and context-dependent.' It cites Kenyan smallholders, Colombian coffee cooperatives, and Vietnamese farmers as examples where export earnings have funded real development investments."}, {"text": "The claim is correct but for the wrong reason: export agriculture fails to contribute to development because farmers lack the education to invest earnings wisely.", "isCorrect": false, "rationale": "The text does not attribute development failures in cash-crop systems to farmer education deficits. The structural risks are systemic—price volatility, corporate value capture, single-crop dependence—not individual farmer capacity failures."}, {"text": "The claim is entirely wrong: all evidence shows that commodity export specialization leads to robust development in every context where it is practiced.", "isCorrect": false, "rationale": "The text explicitly acknowledges structural vulnerabilities in cash-crop dependence—price volatility, colonial legacy landholding patterns, the banana republic archetype. It does not claim export agriculture is uniformly positive; it argues the relationship is 'complex and context-dependent,' which means neither always positive nor always negative."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
