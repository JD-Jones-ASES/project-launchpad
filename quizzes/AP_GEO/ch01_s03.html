<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Place, Space, and Region</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A Vietnamese factory produces athletic shoes that are sold to consumers in the United States, using raw materials from Brazil and financed by investment capital from Singapore. A geographer argues that this factory's 'spatial existence' cannot be understood from its latitude-longitude coordinates alone. Which geographic concept BEST supports this argument?", "options": [{"text": "Absolute location, because the factory's coordinates precisely identify where production occurs.", "isCorrect": false, "rationale": "Absolute location provides the factory's precise coordinate position but says nothing about why it is located there or how it functions within broader economic networks. The argument in the question points to relational dimensions of location that absolute location cannot capture."}, {"text": "Site, because the factory's physical characteristics — land, topography, and local labor force — explain its location.", "isCorrect": false, "rationale": "Site refers to the intrinsic physical characteristics of a location (topography, hydrology, etc.). While site conditions may be relevant, the scenario emphasizes supply chains, investment flows, and market connections — the web of external relations that defines a place in the relational sense."}, {"text": "Relational space, because the factory's location is constituted by the global supply chains, container routes, investment flows, and consumer markets that connect it to the rest of the world.", "isCorrect": true, "rationale": "Doreen Massey's concept of space as 'the sphere of the possibility of the existence of multiplicity' insists that locations are not just coordinates but positions in webs of ongoing social and economic relations. The Vietnamese factory's spatial existence is constituted by its connections — raw material sources in Brazil, consumer markets in California, capital flows from Singapore — exactly as the scenario describes."}, {"text": "Topophilia, because Vietnamese workers have developed an emotional bond with their factory environment.", "isCorrect": false, "rationale": "Topophilia (Yi-Fu Tuan's concept) describes the emotional bond between people and their environments. While relevant to the concept of place, it does not explain how a factory's location is defined by global supply chains and investment networks — the relational, economic dimension the question addresses."}], "id": "q01"}, {"question": "Yi-Fu Tuan coined the term 'topophilia' in 1974. Which of the following scenarios BEST illustrates this concept?", "options": [{"text": "A cartographer chooses the Robinson projection because it minimizes visible distortion across a world map.", "isCorrect": false, "rationale": "This describes a technical cartographic decision with no emotional or experiential dimension. Topophilia concerns the deep affective bond between people and their environments, not map design choices."}, {"text": "A city planner uses GIS to identify all flood-prone parcels within a metropolitan area.", "isCorrect": false, "rationale": "GIS-based spatial analysis is a quantitative, technical process. It does not involve the emotional attachment to place that topophilia describes."}, {"text": "An indigenous community maintains oral traditions, sacred ceremonies, and named places tied to an ancestral homeland from which they were displaced, refusing resettlement offers to a different region.", "isCorrect": true, "rationale": "Tuan described topophilia as the range of human emotional bonds to the physical environment, from powerful attachments of indigenous communities to ancestral homelands to diffuse urban pleasures. The indigenous community's sustained connection to their specific homeland — expressed through oral traditions, ceremonies, and place names — is a textbook illustration of deep topophilia."}, {"text": "A company relocates its headquarters from one city to another to reduce operating costs.", "isCorrect": false, "rationale": "A corporate relocation based on cost calculations reflects economic rationality and the gravity model's logic of mass and distance, not an emotional bond to a specific place. Topophilia is the affective inverse of such placeless economic decision-making."}], "id": "q02"}, {"question": "New Orleans was founded in 1718 on a crescent of relatively high ground between the Mississippi River and Lake Pontchartrain. For much of the nineteenth century, it was the largest city in the South and a major commercial hub. By the late twentieth century, it had been surpassed by cities with better interstate highway and airline access. Using the concepts of site and situation, which explanation BEST accounts for New Orleans's rise and relative decline?", "options": [{"text": "New Orleans had an excellent situation in the nineteenth century because it sat at the mouth of the Mississippi River system, controlling access between the interior continent and Gulf of Mexico trade. Its situation deteriorated as rail and road transportation networks shifted trade routes away from river commerce.", "isCorrect": true, "rationale": "Situation describes relative location in terms of surrounding transportation networks and trade routes. In the nineteenth century, New Orleans's position at the mouth of the Mississippi gave it unmatched access to interior continental trade — an outstanding situation. As railroads and later highways bypassed river transport, cities with better rail and road connectivity acquired superior situations, while New Orleans's relative position weakened."}, {"text": "New Orleans declined because its site — the crescent of high ground — became geologically unstable over time, reducing its suitability for urban growth.", "isCorrect": false, "rationale": "While New Orleans does face subsidence and flood-risk challenges related to its site, the section specifically links the city's relative economic decline to changes in transportation networks (situation), not to physical deterioration of the land itself."}, {"text": "New Orleans rose because of its topophilia — residents' strong emotional attachment to the city created economic advantages. It declined when that attachment weakened after hurricanes.", "isCorrect": false, "rationale": "Topophilia describes an emotional bond between people and environments, not an economic competitive advantage. While New Orleans has a famously strong place identity, the explanation for its economic rise and decline requires site and situation, not topophilia."}, {"text": "New Orleans's rise and decline reflect changes in its absolute location as the Mississippi River shifted its course over centuries.", "isCorrect": false, "rationale": "Absolute location is a fixed mathematical position that does not change unless the physical Earth changes dramatically. The scenario describes changes in the city's competitive position relative to transportation networks — the definition of changing situation, not changing absolute location."}], "id": "q03"}, {"question": "A geographer classifies the following three geographic entities. Match each to the CORRECT region type: (i) the Chicago Metropolitan Statistical Area (MSA), defined by counties with strong commuting ties to downtown Chicago; (ii) the Corn Belt, defined by counties where corn accounts for more than 50% of planted cropland; (iii) 'the South,' whose boundaries vary widely depending on who draws them.", "options": [{"text": "(i) Formal; (ii) Functional; (iii) Perceptual.", "isCorrect": false, "rationale": "This reverses formal and functional. The Chicago MSA is defined by commuting flows toward a central node (Chicago) — the hallmark of a functional/nodal region. The Corn Belt is defined by measurable internal homogeneity in agricultural land use — a formal region."}, {"text": "(i) Functional; (ii) Formal; (iii) Perceptual.", "isCorrect": true, "rationale": "The Chicago MSA is a functional region because it is organized around a central node (the city) to which surrounding counties have strong commuting ties. The Corn Belt is a formal region defined by quantifiable internal homogeneity (corn's share of planted cropland). 'The South' is a perceptual/vernacular region because its boundaries exist in the collective mental maps of Americans rather than in any measurable, uniform characteristic."}, {"text": "(i) Perceptual; (ii) Formal; (iii) Functional.", "isCorrect": false, "rationale": "The Chicago MSA has precisely defined boundaries drawn by the U.S. Office of Management and Budget based on commuting data — it is not a perceptual region. 'The South' is the classic American perceptual region, not a functional one."}, {"text": "(i) Functional; (ii) Perceptual; (iii) Formal.", "isCorrect": false, "rationale": "The Corn Belt is defined by quantitative agricultural statistics — it is a formal, not a perceptual, region. 'The South' lacks crisp, measurable boundaries and exists primarily in collective mental maps — it is perceptual, not formal."}], "id": "q04"}, {"question": "A city council is debating whether to rename a major boulevard that currently bears the name of a nineteenth-century figure now widely regarded as a symbol of racial oppression. Opponents of the renaming argue that the existing name is simply 'what it's always been called' and has no geographic significance. Which geographic framework BEST challenges this view?", "options": [{"text": "The gravity model; the name's influence on interaction between the boulevard and nearby districts can be calculated.", "isCorrect": false, "rationale": "The gravity model predicts spatial interaction based on population size and distance — it is not a framework for analyzing the cultural or political meaning of place names."}, {"text": "The concept of toponymy; place names encode history, power, and cultural identity, and renaming is always a geographic as well as a political statement about whose sense of place receives official recognition.", "isCorrect": true, "rationale": "Toponymy is the study of place names as geographic data. The source text explicitly states that toponyms 'encode history, power, and cultural identity' and that renaming is 'always a geographic as well as a political statement about whose understanding of place should prevail.' The opponent's claim that names have no geographic significance directly contradicts the geographic understanding of toponymy."}, {"text": "The concept of situation; the boulevard's position relative to surrounding streets and districts is what gives it geographic meaning, not its name.", "isCorrect": false, "rationale": "Situation describes a place's relative position in terms of connectivity and surrounding geography — a different dimension from the cultural and political meanings encoded in place names. Situation would not directly address the controversy over naming."}, {"text": "The concept of absolute location; the coordinate position of the boulevard is independent of its name and is therefore the geographically relevant information.", "isCorrect": false, "rationale": "Absolute location is a value-neutral coordinate position that is the same regardless of what a place is called. The debate over renaming is precisely about meaning — the part of geography that absolute location cannot capture."}], "id": "q05"}, {"question": "Which of the following BEST describes the distinction between space and place in human geography?", "options": [{"text": "Space refers to large geographic areas (continents, oceans); place refers to small, locally bounded areas (neighborhoods, cities).", "isCorrect": false, "rationale": "The geographic distinction between space and place is not about scale. A neighborhood can be studied as abstract space (in terms of location, distance, and layout) or as lived place (in terms of meaning, memory, and identity). Scale is a separate analytical dimension."}, {"text": "Space is the abstract, undifferentiated coordinate backdrop against which locations are measured; place is what space becomes when human beings invest it with meaning, memory, and identity.", "isCorrect": true, "rationale": "This is precisely the distinction the source text establishes. Space is the theoretical grid — coordinates before meaning is attached. Place is Yi-Fu Tuan's 'concretion of value' — the lived, emotionally textured experience of a specific location. The transformation of space into place occurs through experience, memory, and emotion."}, {"text": "Space is the term used for rural areas; place is the term for urban environments where dense human activity creates geographic meaning.", "isCorrect": false, "rationale": "The space/place distinction applies to any location regardless of whether it is urban or rural. Tuan's concept of topophilia applies equally to indigenous homelands (rural), urban neighborhoods, and coastlines — the distinction is about meaning, not density."}, {"text": "Space refers to the physical environment; place refers to the social environment built on top of it.", "isCorrect": false, "rationale": "Space in geographic thought is not the physical environment — it is an abstract coordinate system. The physical environment is more closely related to site. Place is not simply a social overlay on physical space but rather the integration of experience, meaning, and memory with a specific location."}], "id": "q06"}, {"question": "Acadiana, the roughly twenty-two parishes of south-central and southwestern Louisiana associated with Cajun culture, has no legal definition and no surveyed boundary. Yet residents of Lafayette strongly identify with it, and its boundaries appear on commercial signage and tourism materials. Which region type does Acadiana exemplify, and what makes it geographically real despite having fuzzy boundaries?", "options": [{"text": "A formal region; it is real because the cultural homogeneity of Cajun cuisine, music, and language can be statistically measured across the parishes.", "isCorrect": false, "rationale": "While Cajun cultural markers could in principle be measured, the text classifies Acadiana as a perceptual/vernacular region precisely because its boundaries are defined by collective identity rather than by official surveys or consistent data thresholds. It does not have the crisp, measurable interior homogeneity that defines a formal region."}, {"text": "A functional region; it is defined by the flows of Cajun cultural products (music, food) that radiate outward from a dominant node like Lafayette.", "isCorrect": false, "rationale": "A functional region is organized around flows toward a central node, like commuting patterns or a newspaper distribution area. Acadiana's identity does not depend on measurable flows toward a hub but on shared cultural self-identification — the defining feature of a perceptual region."}, {"text": "A perceptual region; it is geographically real because shared cultural identity and place-based self-identification produce measurable effects on political behavior, migration choices, and economic expectations — even without crisp geographic edges.", "isCorrect": true, "rationale": "The source text explicitly classifies Acadiana as an example of a perceptual/vernacular region and explains that perceptual regions are 'real as social facts' even when their boundaries are fuzzy. The region's geographic weight comes from how it shapes residents' identity, commercial signage, and community self-understanding — not from a legal boundary."}, {"text": "A perceptual region; but it is not geographically real because without official boundaries it cannot be used for any analytical purpose.", "isCorrect": false, "rationale": "The source text directly contradicts this view. Perceptual regions 'are not unreal; they are real as social facts' and shape identity, migration, political behavior, and economic expectations in empirically measurable ways. The absence of crisp edges does not make a perceptual region analytically useless."}], "id": "q07"}, {"question": "A historical geographer notes that in 1850, Chicago was described as a 'remote outpost at the edge of a vast frontier.' By 1900, it was the 'principal rail hub of a continental economy.' The city's absolute location did not change. What geographic concept BEST explains this transformation?", "options": [{"text": "Topophilia; as more people moved to Chicago, they developed emotional bonds that increased the city's attractiveness.", "isCorrect": false, "rationale": "Topophilia describes personal and community emotional attachment to place. While Chicago certainly developed a strong local identity, topophilia does not explain the structural shift in the city's economic and transportation role between 1850 and 1900."}, {"text": "Changing relative location (situation); as rail networks expanded westward through Chicago, its position relative to continental transportation systems was transformed, making it the dominant transfer point between Great Lakes commerce and the interior.", "isCorrect": true, "rationale": "Relative location (situation) is context-dependent and changes as surrounding geography changes. Chicago's absolute coordinates were the same in 1850 and 1900, but its situation changed fundamentally as the transcontinental rail network made it the junction between eastern markets, Great Lakes shipping, and western expansion. This is the textbook definition of changing situation."}, {"text": "Changing absolute location; as the city expanded its boundaries, its geographic coordinates shifted westward to reflect its new territorial extent.", "isCorrect": false, "rationale": "Absolute location is a fixed mathematical position and does not change as a city grows or as transportation networks develop. This answer confuses the expansion of the city's physical area with a change in its locational coordinates."}, {"text": "Distance decay; as Chicago grew, the friction of distance between it and other cities decreased, increasing interaction.", "isCorrect": false, "rationale": "Distance decay describes the tendency for interaction to decrease with distance — it is a general spatial principle, not a concept explaining why a specific city's role changed over time. The transformation of Chicago is better explained by changes in its situation as transportation infrastructure shifted."}], "id": "q08"}, {"question": "A political scientist argues that 'the South' as a region is meaningless because different people draw its boundaries differently. Which geographic response BEST challenges this argument?", "options": [{"text": "The political scientist is correct; regions without precise, legally defined boundaries cannot be used in geographic analysis.", "isCorrect": false, "rationale": "The source text explicitly refutes this position. Perceptual regions are 'real as social facts' even without crisp boundaries. Geographers regularly analyze perceptual regions precisely because they shape political behavior, migration, and cultural production in measurable ways."}, {"text": "The political scientist's argument is correct only for perceptual regions; formal and functional regions with measurable criteria are the only legitimate regional concepts.", "isCorrect": false, "rationale": "The source text presents all three region types as legitimate and useful. Dismissing perceptual regions ignores their demonstrable influence on political identity, migration decisions, cultural production, and economic expectations."}, {"text": "Perceptual regions like 'the South' are geographically real because they function as social facts — shaping political behavior, migration patterns, cultural identity, and economic expectations in ways that are empirically measurable, even if exact boundaries are contested.", "isCorrect": true, "rationale": "The source text directly addresses this objection: 'Perceptual regions are not unreal; they are real as social facts, even when they lack crisp geographic edges.' The South's geographic reality is demonstrated by the way it organizes political affiliation, migration decisions, cultural production, and commercial identity — all measurable effects that arise from the shared perception of the region."}, {"text": "The South is actually a formal region because its historical connection to the Confederacy provides a precise, historically defined boundary of eleven states.", "isCorrect": false, "rationale": "The source text notes that Americans draw the boundary of 'the South' widely differently — from the eleven Confederate states to broader definitions including Missouri, Oklahoma, and parts of Ohio. The variation in mental maps is precisely what makes it a perceptual region, not a formal one with agreed-upon criteria."}], "id": "q09"}, {"question": "Two urban geographers debate the site and situation of San Francisco. Geographer A says: 'San Francisco's success as a city is explained by its excellent site — a sheltered harbor on a hilly peninsula.' Geographer B says: 'Its situation — position on the Pacific Coast and proximity to the Sierra Nevada gold fields after 1848 — is more important.' Which evaluation BEST assesses their debate?", "options": [{"text": "Geographer A is correct; site is always more important than situation because physical geography is permanent.", "isCorrect": false, "rationale": "While site characteristics are relatively stable (though humans can modify them, as San Francisco has done by filling tidal flats), the source text does not claim site is always more important than situation. In fact, situation — which changes as surrounding networks change — often explains growth and decline more dynamically than site."}, {"text": "Geographer B is correct; situation is always more important than site because economic and political connections drive urban growth.", "isCorrect": false, "rationale": "Neither concept is universally dominant. The source text presents site and situation as complementary. Excellent site conditions (like San Francisco's harbor) create initial settlement advantages, while favorable situation (connections to trade routes and resource frontiers) often explains subsequent growth."}, {"text": "Both geographers are partially correct; site and situation are complementary concepts. San Francisco's excellent harbor site enabled initial settlement and port activity, while its situation — connected to Pacific trade routes and the Gold Rush hinterland — drove explosive growth after 1848.", "isCorrect": true, "rationale": "The source text establishes site and situation as distinct but complementary concepts. Site (hilly peninsula with a fine natural harbor) explains why San Francisco was settled and why it could function as a port. Situation (its connectivity to Pacific trade routes and, after 1848, to the Sierra Nevada gold fields) explains why it grew rapidly. Neither concept alone provides a complete explanation."}, {"text": "The debate is irrelevant because San Francisco's growth is best explained by topophilia — the strong cultural attachment Californians have to the Bay Area.", "isCorrect": false, "rationale": "Topophilia describes emotional bonds between people and places; it cannot explain why a city grew initially or why it became a commercial hub. Site and situation are the appropriate analytical concepts for explaining the origins and growth trajectory of urban settlements."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
