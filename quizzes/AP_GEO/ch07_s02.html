<script>
var QUESTIONS = [{"question": "A development economist presents the following data: Country X has a GNI per capita of $4,200 at nominal exchange rates, but when adjusted for purchasing power parity (PPP), its figure rises to $11,600. Which conclusion is best supported by this difference?", "options": [{"text": "Country X has a very large population that inflates its raw GNI without reflecting household welfare.", "isCorrect": false, "rationale": "GNI per capita already divides by population. The gap between nominal and PPP-adjusted figures reflects price-level differences across countries, not population size. A haircut costs $30 in New York and $3 in Dhaka, but the real output is the same — PPP corrects for this."}, {"text": "Country X's price level is lower than the reference country's, so nominal exchange-rate comparisons understate its residents' real living standards.", "isCorrect": true, "rationale": "The text explains that 'comparing nominal incomes at market exchange rates understates living standards in poor countries' because goods and services cost less there. PPP adjusts GNI per capita by the price levels of a standardized basket of goods, making comparisons more meaningful — as with India, whose per capita income 'roughly triples' under PPP adjustment."}, {"text": "Country X receives large remittance inflows from abroad, which boost GNI above GDP.", "isCorrect": false, "rationale": "Remittances explain the difference between GDP and GNI — countries like the Philippines and Mexico have GNI above GDP because migrants send earnings home. That is a separate adjustment from the PPP conversion that accounts for price-level differences."}, {"text": "Country X's currency is artificially overvalued, distorting nominal exchange-rate comparisons.", "isCorrect": false, "rationale": "Currency overvaluation can contribute to the gap, but the text's explanation is broader: PPP corrects for systematically lower price levels in poorer countries, not specifically for currency manipulation. The PPP adjustment applies even when exchange rates are market-determined."}]}, {"question": "Mahbub ul Haq and Amartya Sen introduced the Human Development Index in 1990, explicitly as a challenge to GDP-based rankings. Consider two countries: Country A has a GDP per capita of $18,000 but very low life expectancy and poor school enrollment. Country B has a GDP per capita of $9,000 but high life expectancy and near-universal education. How would the HDI most likely rank them, and why?", "options": [{"text": "Country A higher, because GDP per capita is the dominant pillar in the HDI calculation.", "isCorrect": false, "rationale": "The HDI combines three equally weighted pillars — health, education, and standard of living — using a geometric mean. No single pillar dominates, and a very low score in health or education pulls the composite down regardless of income. Country A's low life expectancy and poor education would severely depress its HDI despite higher income."}, {"text": "Country B higher, because the HDI's geometric mean means a low score in any one dimension pulls the composite down significantly.", "isCorrect": true, "rationale": "The text specifies that 'the use of the geometric mean means that a country cannot compensate for a very low score in one dimension by scoring extremely high in another — all three dimensions must develop together for the overall index to rise.' Country A's low health and education scores would sharply depress its HDI despite higher income."}, {"text": "Country A higher, because economic output per person is the first purpose of human development.", "isCorrect": false, "rationale": "The HDI was designed to challenge the 'GDP-only paradigm.' The first Human Development Report declared 'People are the real wealth of nations' — explicitly subordinating income to broader human well-being. High income alone does not secure a high HDI if health and education lag."}, {"text": "They would rank identically, because the HDI is simply an average of GDP per capita and social indicators.", "isCorrect": false, "rationale": "The HDI uses a geometric mean, not a simple arithmetic average. A simple average would allow high scores in one dimension to offset low scores in another; the geometric mean does not. The countries' very different health and education profiles would produce very different HDI scores."}]}, {"question": "Walt Rostow subtitled his 1960 book 'A Non-Communist Manifesto.' What does this subtitle reveal about the intellectual and political purpose of his Stages of Economic Growth model?", "options": [{"text": "It shows Rostow believed economic growth was impossible in communist states, which he used as evidence against Wallerstein's world-systems framework.", "isCorrect": false, "rationale": "Wallerstein's framework was not published until 1974, fourteen years after Rostow's book. Rostow was responding to Marxist development theory, not to Wallerstein specifically. His 'Non-Communist Manifesto' subtitle signaled a Cold War counter-narrative to Marxism, not a refutation of world-systems theory."}, {"text": "It reveals that the Stages model was designed as a Cold War policy document arguing that Western-style capitalist development — supported by foreign aid — could substitute for Marxist development paths.", "isCorrect": true, "rationale": "The text states: 'Rostow wrote explicitly as a Cold War policy document, subtitling his book \"A Non-Communist Manifesto.\" The U.S. government adopted the Stages as the theoretical justification for foreign aid and development assistance: give them capital and technical assistance, and they will take off along the Western road, with no need to borrow Marxist frameworks.'"}, {"text": "It indicates Rostow opposed all foreign aid programs, arguing that poor countries must self-finance their take-off stage.", "isCorrect": false, "rationale": "The opposite is true: Rostow's model was the U.S. government's justification for foreign aid and development assistance. The logic was that external capital infusions could trigger take-off in poor countries and win them to the Western bloc during the Cold War."}, {"text": "It demonstrates that Rostow considered the end of colonialism a prerequisite for any country's take-off, distinguishing his model from earlier imperial development theories.", "isCorrect": false, "rationale": "The text's critique of Rostow is precisely that his model ignores colonialism's role in shaping preconditions in non-Western societies. His model does not treat decolonization as a prerequisite — critics argue it erases colonialism's role entirely."}]}, {"question": "Immanuel Wallerstein argues that the modern world economy is a single capitalist world-system that reproduces inequality through 'unequal exchange.' The text gives the example of a Congolese miner extracting cobalt for a dollar a day that ends up in a battery sold in Frankfurt for $80,000. What does Wallerstein mean by 'unequal exchange' in this context?", "options": [{"text": "The cobalt trade is conducted at unfair prices because Frankfurt merchants illegally manipulate commodity markets to cheat Congolese suppliers.", "isCorrect": false, "rationale": "Wallerstein's concept of unequal exchange is a structural argument, not an allegation of illegal price manipulation. He argues that 'trade at world prices looks equal; the embedded labor values are not' — exploitation is built into the structure of the world system, not into individual corrupt transactions."}, {"text": "Value produced by low-wage peripheral labor is captured by core-country firms through trade at world market prices, reproducing poverty structurally rather than through direct coercion.", "isCorrect": true, "rationale": "The text explains: 'When a Congolese miner extracts cobalt for a dollar a day and that cobalt ends up in a lithium-ion battery sold in Frankfurt for $80,000, the value created by labor in the periphery is captured in the core. Trade at world prices looks equal; the embedded labor values are not. This reproduces poverty without requiring direct coercion.'"}, {"text": "Congo loses economically because it exports raw cobalt rather than finished batteries, a problem solvable by industrializing to process its own resources before exporting.", "isCorrect": false, "rationale": "While this describes a real policy challenge, Wallerstein's world-systems argument goes further: he sees the structure of the entire system as self-reproducing, not simply a problem of processing-stage decisions. Individual countries can move between zones, but 'someone must occupy the periphery.'"}, {"text": "The Congo's currency is undervalued relative to the euro, so the dollar-per-day wage translates to very little purchasing power in Europe.", "isCorrect": false, "rationale": "The exchange-rate dynamic is a symptom, not the structural cause Wallerstein identifies. His argument is about the systemic extraction of labor value through the structure of core–periphery trade relations, independent of currency valuation."}]}, {"question": "The text notes that Cuba and Sri Lanka 'typically score higher on HDI than their GNI would predict.' Which explanation is most consistent with the HDI framework described in the source?", "options": [{"text": "Cuba and Sri Lanka have underreported GDP figures, so their real income is higher than official statistics show.", "isCorrect": false, "rationale": "The text's explanation for Cuba and Sri Lanka's HDI outlier status is their 'strong public investment in health and education,' not income data underreporting. The HDI framework rewards health and education outcomes independently of income."}, {"text": "Strong public investment in health and education has raised life expectancy and school enrollment far above what their per capita income level would typically produce.", "isCorrect": true, "rationale": "The text states directly: 'Cuba and Sri Lanka typically score higher on HDI than their GNI would predict, because of strong public investment in health and education.' This is the canonical AP Human Geography example of countries overperforming on HDI relative to income."}, {"text": "Cuba and Sri Lanka have large diaspora populations whose remittances inflate GNI above GDP but are not captured in consumption data.", "isCorrect": false, "rationale": "Remittances affect the GNI–GDP gap, but the text's explanation for Cuba and Sri Lanka's HDI outlier performance is public investment in health and education — the health and education pillars of the HDI — not remittance flows."}, {"text": "Both countries have very low income inequality, which the HDI's geometric mean rewards over high average incomes with wide dispersion.", "isCorrect": false, "rationale": "The standard HDI does not directly measure income distribution — it uses GNI per capita (an average). The text's explanation for Cuba and Sri Lanka is their public health and education investment, not low inequality per se. The Inequality-adjusted HDI is a separate measure."}]}, {"question": "A researcher analyzing the 1990–2019 global poverty reduction data notices that the headline decline from 38% to 9% of humanity in extreme poverty masks very uneven geographic patterns. Which geographic observation does the text specifically identify?", "options": [{"text": "Poverty declined fairly uniformly across all regions, with Latin America and Sub-Saharan Africa recording the largest absolute reductions.", "isCorrect": false, "rationale": "The text says the opposite: the decline was geographically concentrated, not uniform. Sub-Saharan Africa 'saw the absolute number of extremely poor people rise between 1990 and 2015 as population growth outpaced poverty reduction' — the opposite of the largest absolute reduction."}, {"text": "The bulk of the reduction occurred in East and South Asia, with China alone accounting for over 800 million people escaping poverty, while Sub-Saharan Africa's absolute poor numbers actually rose.", "isCorrect": true, "rationale": "The text states: 'The geographic story … is concentrated: the bulk of the reduction occurred in East and South Asia, with China alone accounting for over 800 million people escaping poverty between 1981 and 2015. Sub-Saharan Africa made progress in percentage terms but saw the absolute number of extremely poor people rise between 1990 and 2015.'"}, {"text": "South Asia reduced poverty fastest because of IMF structural adjustment programs that redirected spending from military to social services.", "isCorrect": false, "rationale": "The text does not attribute South and East Asian poverty reduction to IMF programs. In fact, the text notes that IMF conditionality programs in Africa and Latin America are 'argued to have deepened poverty' — the opposite framing from crediting IMF intervention for poverty reduction."}, {"text": "The COVID-19 pandemic erased all poverty gains made since 1990, returning global extreme poverty to 1990 levels by 2022.", "isCorrect": false, "rationale": "The text states the pandemic reversed some gains — the World Bank estimated 97 million additional people fell into extreme poverty in 2020 — but this did not return to 1990 levels. The base had fallen from 1.9 billion (38%) to around 700 million (9%) before COVID, and the reversal was partial, not total."}]}, {"question": "The Gender Inequality Index (GII) was introduced in 2010 partly to replace earlier gender-development measures. What conceptual advance does the GII represent over simply reporting sex-disaggregated HDI scores?", "options": [{"text": "The GII uses GDP per capita to measure gender inequality, which makes it more comparable to the HDI's income pillar than earlier measures.", "isCorrect": false, "rationale": "The GII uses reproductive health (maternal mortality, adolescent birth rates), political empowerment (parliamentary seats, education by sex), and labor market participation — not GDP per capita. The text notes it was introduced because it 'explicitly frames gender inequality as a loss of human development,' not because it borrows the HDI's income methodology."}, {"text": "It explicitly frames gender inequality as a loss of human development, measuring how much potential HDI is forfeited when women lack equal opportunities.", "isCorrect": true, "rationale": "The text states the GII 'was introduced in 2010 to replace earlier gender-development measures because it explicitly frames gender inequality as a loss of human development — countries lose HDI points they could have earned if women and men had equal opportunities.'"}, {"text": "The GII measures only economic gender gaps, making it more actionable for labor-market policymakers than earlier composite measures.", "isCorrect": false, "rationale": "The GII is explicitly multi-dimensional, covering reproductive health, political empowerment, and labor market participation across three dimensions. It is broader than a purely economic measure, not narrower."}, {"text": "Unlike earlier measures, the GII ranks countries on an absolute scale from 0 to 100 rather than a relative index, eliminating the comparison problem.", "isCorrect": false, "rationale": "The GII is indeed indexed from 0 (minimal inequality) to 1 (maximum inequality), but this is a relative index, and earlier measures also used normalized scales. The text's stated advance is the conceptual framing of gender inequality as a development cost, not a technical rescaling."}]}, {"question": "The Multidimensional Poverty Index (MPI) can identify a household as 'multidimensionally poor' even if its daily income exceeds the $2.15 extreme-poverty line. What does this reveal about the limitation of income-only poverty measurement?", "options": [{"text": "Income measures are more accurate in urban areas and consistently overcount poverty in rural areas, while the MPI corrects for rural bias.", "isCorrect": false, "rationale": "The text does not present the MPI as a rural-urban correction. Its innovation is measuring simultaneous deprivations across health, education, and living standards — not correcting for a geographic bias in income data."}, {"text": "A household just above the income poverty line can still lack clean water, sanitation, and schooling, demonstrating that monetary income alone misses substantial deprivation across multiple dimensions.", "isCorrect": true, "rationale": "The text states: 'The MPI consistently reveals that income poverty alone misses substantial deprivation: a family may earn just above the $2.15/day poverty line but lack clean water, sanitation, and any schooling.' A household is 'multidimensionally poor' if deprived in at least a third of weighted indicators across health, education, and living standards."}, {"text": "Daily income figures are unreliable in developing countries because informal economies are unmeasured, so the MPI provides a more accurate count of the absolute poor.", "isCorrect": false, "rationale": "While informality can distort income data, the text's point about the MPI is conceptual rather than about data accuracy: even when income is correctly measured, it misses deprivations in health, sanitation, electricity, and education that shape human well-being."}, {"text": "The $2.15 threshold is set too low for middle-income countries, so the MPI recalibrates the poverty line upward to account for higher costs of living.", "isCorrect": false, "rationale": "The MPI does not adjust the income threshold — it adds non-income dimensions rather than raising the monetary cutoff. The text describes the MPI as identifying poor households 'not by income alone but by simultaneous deprivations across ten indicators.'"}]}, {"question": "Critics of Wallerstein's World-Systems Theory argue it suffers from 'structural determinism.' Using evidence from the text, which example most directly challenges this determinism criticism?", "options": [{"text": "The fact that Sub-Saharan Africa has remained in the periphery for decades, consistent with the system's self-reproducing logic.", "isCorrect": false, "rationale": "Sub-Saharan Africa's persistent periphery position actually supports Wallerstein's structural argument, not the determinism critique. Evidence that challenges structural determinism must show countries moving between zones — demonstrating that structure is not absolutely fixed."}, {"text": "South Korea's movement from semi-periphery to core status, demonstrating that individual countries can change their position within the world-system.", "isCorrect": true, "rationale": "The text acknowledges this directly: 'Wallerstein acknowledged that individual countries can move between zones. South Korea moved from semi-periphery to core; Mexico moved from periphery to semi-periphery.' This mobility challenges pure structural determinism, though Wallerstein would argue it proves the rule — someone else must occupy the periphery."}, {"text": "The Prebisch-Singer hypothesis showing persistent terms-of-trade deterioration for commodity exporters, supporting the unequal-exchange argument.", "isCorrect": false, "rationale": "The Prebisch-Singer hypothesis is cited as evidence for Wallerstein's world-systems framework, not against it. It supports, rather than challenges, the structural argument about persistent peripheral disadvantage."}, {"text": "China's rapid poverty reduction showing that billions can escape extreme poverty within the capitalist world-system.", "isCorrect": false, "rationale": "While China's rise is noted as evidence for Rostow's supporters, Wallerstein would classify China as a semi-peripheral country moving toward core functions — consistent with semi-peripheral mobility, which the world-systems framework accommodates. This is not the strongest challenge to determinism."}]}, {"question": "The text presents Rostow's Stages model and Wallerstein's World-Systems Theory as offering fundamentally different diagnoses of why some countries remain poor. Which statement best captures the core analytical difference between the two models?", "options": [{"text": "Rostow focuses on geographic factors like climate and natural resources, while Wallerstein focuses on cultural factors like religion and work ethic.", "isCorrect": false, "rationale": "Neither model centers on climate, natural resources, or cultural work ethic. Rostow's model is about sequential economic stages driven by investment and technology; Wallerstein's is about structural inequality in the capitalist world-system through unequal exchange. Both are fundamentally economic-structural arguments."}, {"text": "Rostow treats poverty as a developmental lag that capital and technology can overcome, while Wallerstein treats poverty as a structural outcome produced by the world economy for the benefit of core countries.", "isCorrect": true, "rationale": "The text contrasts them directly: Rostow argues all countries travel the same developmental road and just need capital and technical assistance to take off; Wallerstein argues 'poverty is not an original condition but a produced condition' — the system requires some zones to be subordinate. This is the central analytical divide."}, {"text": "Rostow's model applies only to Western Europe and North America, while Wallerstein's is a truly global model applicable to all regions.", "isCorrect": false, "rationale": "Rostow explicitly claimed his model described universal stages 'roughly replicating the historical experience of Western Europe and North America' — his critics' main objection is that he generalizes from a Western experience to a universal claim. Wallerstein, by contrast, explicitly built a global structural theory. But the key analytical difference is about development mechanism, not geographic scope."}, {"text": "Rostow is descriptive (mapping what happened historically) while Wallerstein is prescriptive (recommending specific policies for development).", "isCorrect": false, "rationale": "Rostow was explicitly prescriptive — his model was the U.S. government's justification for foreign aid policy. Wallerstein's framework is more structural-analytical and historically descriptive than policy-prescriptive. The core difference between them is their diagnosis of why poverty persists, not which is prescriptive."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
