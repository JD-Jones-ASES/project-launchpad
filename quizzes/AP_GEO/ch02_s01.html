        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Population Distribution and Density</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A country has a total population of 80 million, a total land area of 400,000 km², and only 20,000 km² of arable land. Its agricultural labor force numbers 2 million workers. Which of the following correctly ranks the country's three density measures from lowest to highest?", "options": [{"text": "Arithmetic < Agricultural < Physiological", "isCorrect": false, "rationale": "While arithmetic density (200/km²) is lower than physiological density (4,000/km²), agricultural density equals 100 farmers per km² of arable land, which falls between the two — so the order would be Arithmetic < Agricultural < Physiological, but that is actually this option. Re-examine: arithmetic = 200, agricultural = 100, physiological = 4,000. So the correct order is Agricultural < Arithmetic < Physiological."}, {"text": "Agricultural < Arithmetic < Physiological", "isCorrect": true, "rationale": "Arithmetic density = 80M ÷ 400,000 = 200/km². Agricultural density = 2M ÷ 20,000 = 100 farmers/km² arable. Physiological density = 80M ÷ 20,000 = 4,000/km² arable. Ranking: 100 < 200 < 4,000 — Agricultural is lowest, arithmetic is in the middle, physiological is highest."}, {"text": "Physiological < Arithmetic < Agricultural", "isCorrect": false, "rationale": "This reverses the actual ranking. Physiological density (4,000) is the highest of the three, not the lowest, because so few km² of arable land must support the entire population."}, {"text": "Arithmetic < Physiological < Agricultural", "isCorrect": false, "rationale": "This places physiological density below agricultural density, which is incorrect. Physiological density counts all people per km² of arable land (4,000), while agricultural density counts only farmers (100) — physiological is always at least as large as agricultural when there are non-farming residents."}], "id": "q01"}, {"question": "The concept of the ecumene is best defined as:", "options": [{"text": "The total land area of Earth divided by its current population.", "isCorrect": false, "rationale": "That description would produce a per-capita land figure, not the ecumene. The ecumene is a spatial concept about habitability, not a ratio."}, {"text": "The permanently inhabited portion of Earth's surface.", "isCorrect": true, "rationale": "The source text defines the ecumene precisely this way: 'The permanently inhabited portion of the Earth's surface.' It is concentrated in low-elevation, mid-latitude zones with reliable precipitation, fertile soils, and access to navigable water."}, {"text": "Any area of Earth where annual rainfall exceeds 500 mm.", "isCorrect": false, "rationale": "Precipitation is one environmental factor influencing habitability, but the ecumene is defined by permanent human settlement, not a specific rainfall threshold. Irrigated deserts can be part of the ecumene despite low rainfall."}, {"text": "The portion of Earth's surface covered by arable land.", "isCorrect": false, "rationale": "Arable land is a component used in physiological density calculations; it differs from the ecumene. The ecumene includes cities, fishing communities, and other non-agricultural settlements, while some arable land may be only seasonally inhabited."}], "id": "q02"}, {"question": "Egypt has an arithmetic density of approximately 104 people per km² but a physiological density approaching 3,000 people per km². What best explains this large discrepancy?", "options": [{"text": "Egypt's total population has been underestimated in census data.", "isCorrect": false, "rationale": "The discrepancy is not a data error. It reflects a genuine geographic reality: the vast majority of Egypt's territory is non-arable desert, so the same population that appears modest at the national scale is densely packed onto a tiny cultivable fraction."}, {"text": "Only 3–5 percent of Egypt's territory — the Nile floodplain and delta — is cultivable, concentrating population on a narrow strip of arable land.", "isCorrect": true, "rationale": "The source text explains exactly this: roughly 28,000–35,000 km² of arable land (out of ~1 million km² total) must support 104 million people, yielding a physiological density of ~3,000/km². Arithmetic density treats all land equally; physiological density exposes the true pressure on food-producing land."}, {"text": "Egypt has an unusually high agricultural density, meaning mechanized farming inflates the physiological figure.", "isCorrect": false, "rationale": "Agricultural density concerns the ratio of farmers to arable land, not the cause of high physiological density. The high physiological density in Egypt stems from extreme land scarcity, not the intensity of labor applied to it."}, {"text": "Egypt's non-ecumene covers only a small fraction of its territory, making arithmetic and physiological densities nearly equal.", "isCorrect": false, "rationale": "The opposite is true. Egypt's non-ecumene (Sahara and Eastern Desert) covers roughly 95–97% of the country's land area, which is precisely why arithmetic and physiological densities diverge so dramatically."}], "id": "q03"}, {"question": "The Netherlands has one of the lowest agricultural densities in Europe despite having very high arithmetic and physiological densities. Which of the following best explains this combination?", "options": [{"text": "The Netherlands imports most of its food, so domestic farmers are not needed.", "isCorrect": false, "rationale": "The source text states the Netherlands exports food to the world — it is a net food exporter, not importer. Low agricultural density reflects technological intensity, not food importation."}, {"text": "Dutch farming is extraordinarily mechanized and capital-intensive, allowing very few farmers to produce large quantities of food.", "isCorrect": true, "rationale": "The source text explains that Dutch greenhouse agriculture is so capital-intensive that 'a single farm operator managing a greenhouse complex of several hectares can produce more food than fifty smallholders in a subsistence economy,' driving agricultural density below 3 farmers per km² of arable land."}, {"text": "A large portion of Dutch land is non-arable, making physiological density lower than arithmetic density.", "isCorrect": false, "rationale": "The source text states the Netherlands has 'very high' physiological density because Dutch agricultural land is extremely productive. The country has reclaimed land from the sea, not lost it to wasteland."}, {"text": "The Netherlands has a very small total population, keeping all three density measures low.", "isCorrect": false, "rationale": "The Netherlands has roughly 510 people per km² — among the highest arithmetic densities in Europe. Its total population is not small; the distinctive pattern is high arithmetic and physiological densities paired with a very low agricultural density."}], "id": "q04"}, {"question": "A geographic study shows that a country in South Asia has a youth dependency ratio exceeding 80 and an elderly dependency ratio below 10. Based on the population geography framework from this section, which additional characteristic is most consistent with this profile?", "options": [{"text": "The country's population is concentrated in high-altitude zones with low carrying capacity.", "isCorrect": false, "rationale": "High-altitude terrain is part of the non-ecumene and would indicate sparse rather than dense population. A high youth-dependency ratio signals a growing population with high fertility, typically located in low-elevation, fertile zones — not high-altitude non-ecumene areas."}, {"text": "The country is likely located within the South Asia population cluster and has a high physiological density relative to its total area.", "isCorrect": true, "rationale": "The South Asia cluster (India, Bangladesh, Pakistan) has nearly 2 billion people concentrated on fertile plains. High youth-dependency ratios correlate with Stage-2 demographic profiles common in rapidly growing developing populations, consistent with the intense settlement of the Indo-Gangetic Plain."}, {"text": "The country has a highly mechanized agricultural sector and low physiological density.", "isCorrect": false, "rationale": "Low agricultural density and mechanized farming characterize wealthy, Stage-4 or Stage-5 countries with low fertility and aging populations — the opposite of a high youth-dependency-ratio profile."}, {"text": "The country is experiencing population decline and is most likely located in Eastern Europe.", "isCorrect": false, "rationale": "Eastern Europe shows declining populations with high elderly-dependency ratios and low youth-dependency ratios — precisely the reverse of the profile described in the question."}], "id": "q05"}, {"question": "Which of the following best characterizes the concept of 'carrying capacity' as used in population geography?", "options": [{"text": "A fixed biological constant determined solely by a region's soil quality.", "isCorrect": false, "rationale": "The source text explicitly states that carrying capacity 'is not a fixed biological constant — it shifts upward with technological innovation... and downward with environmental degradation.' Soil quality is one factor, but technology, trade, and social organization also affect the ceiling."}, {"text": "The maximum population an environment can support indefinitely given available technology, resources, and cultural practices.", "isCorrect": true, "rationale": "This is the source text's definition verbatim. Crucially, carrying capacity is dynamic: the Green Revolution expanded it, while soil salinization and aquifer depletion can contract it."}, {"text": "The total number of people who can inhabit a country's non-ecumene regions.", "isCorrect": false, "rationale": "Carrying capacity applies to any inhabited environment and is concerned with sustainable support, not with the non-ecumene specifically. The non-ecumene is, by definition, largely unsustainable for permanent habitation."}, {"text": "The ratio of arable land to total land area in a given country.", "isCorrect": false, "rationale": "That ratio is relevant to physiological density calculations, not carrying capacity. Carrying capacity is concerned with the maximum sustainable population, a more holistic concept than an arable-land ratio."}], "id": "q06"}, {"question": "The four great population clusters — East Asia, South Asia, Europe, and Northeast North America — share which common characteristic?", "options": [{"text": "All four clusters developed primarily because of agricultural productivity rather than industrial or commercial activity.", "isCorrect": false, "rationale": "While East Asia and South Asia have agricultural roots, Europe's high densities 'reflect urban rather than agricultural concentration in the modern era,' and Northeast North America's cluster was driven by 'industrial and commercial development, rather than agricultural capacity.'"}, {"text": "All four are located in the low-elevation, mid-latitude band of the Northern Hemisphere and are separated by thinly settled zones.", "isCorrect": true, "rationale": "The source text places all four clusters within the mid-latitude Northern Hemisphere (roughly 20°N–60°N) and explicitly notes they are 'separated by sparsely inhabited zones' such as the Sahara, boreal forest, tundra, and tropical rainforests."}, {"text": "All four are coastal clusters whose density is explained solely by access to maritime trade.", "isCorrect": false, "rationale": "While coastal access plays a role, South Asia's Indo-Gangetic Plain and much of Europe's interior are not coastal. The clusters are explained by multiple factors including fertile soils, river valleys, and industrial development, not maritime trade alone."}, {"text": "All four clusters are located in the Southern Hemisphere, where temperate climates support the highest densities.", "isCorrect": false, "rationale": "All four major population clusters are in the Northern Hemisphere. The Southern Hemisphere has much lower total population and no equivalent concentration."}], "id": "q07"}, {"question": "When a geographer reads a population density choropleth map of a large country like China or Russia, which of the following is the most important analytical limitation to keep in mind?", "options": [{"text": "Choropleth maps use arithmetic density, which cannot distinguish between densely populated cities and empty rural hinterlands within the same political unit.", "isCorrect": true, "rationale": "The source text's Data Analysis skill box warns exactly this: 'a single arithmetic-density value cannot distinguish a city from a rural hinterland at most map scales' and advises asking 'what is the unit of analysis?' before interpreting any choropleth."}, {"text": "Choropleth maps always use physiological density, which overstates population pressure in countries with large arable land areas.", "isCorrect": false, "rationale": "Standard population density choropleths typically use arithmetic density, not physiological density. The limitation described is about the masking of internal variation within political units, not about which density measure is used."}, {"text": "Choropleth maps cannot represent population at the national scale and are only useful for city-level analysis.", "isCorrect": false, "rationale": "Choropleth maps are routinely used at national and global scales. The limitation is that uniform shading within a political unit masks internal spatial variation, not that the national scale is inherently impossible to represent."}, {"text": "Choropleth maps that use natural-breaks classification always show more accurate patterns than those using equal-interval classification.", "isCorrect": false, "rationale": "Different classification schemes reveal different aspects of the data — none is inherently 'more accurate.' The source text notes that equal interval, quantile, and natural breaks each 'reveals different patterns,' and the analyst must understand which is appropriate for the question at hand."}], "id": "q08"}, {"question": "According to the source text, approximately what fraction of Earth's land surface is covered by non-ecumene zones?", "options": [{"text": "About 10 percent", "isCorrect": false, "rationale": "10 percent is the share of land that the ecumene occupies — the opposite of the non-ecumene. The source text states that roughly 90 percent of humanity lives on about 10 percent of total land area, implying the non-ecumene is far larger."}, {"text": "About 30 percent", "isCorrect": false, "rationale": "30 percent significantly underestimates the extent of uninhabited terrain. The source text specifies that non-ecumene regions 'cover roughly 60 percent of Earth's land surface.'"}, {"text": "About 60 percent", "isCorrect": true, "rationale": "The source text states that high-altitude zones, extreme arid regions, boreal and tundra zones, and ice sheets 'together cover roughly 60 percent of Earth's land surface but support less than 5 percent of its population.'"}, {"text": "About 80 percent", "isCorrect": false, "rationale": "While the non-ecumene is extensive, the source text gives the figure as approximately 60 percent, not 80 percent. 80 percent would suggest that only a fifth of Earth's land is inhabited, which overstates the uninhabited share."}], "id": "q09"}, {"question": "Country X has a high physiological density but a low agricultural density. Country Y has a high physiological density and a high agricultural density. Which of the following inferences is best supported by these data?", "options": [{"text": "Country X has more arable land than Country Y.", "isCorrect": false, "rationale": "Physiological density depends on the ratio of people to arable land, not the absolute amount. Both countries could have equally limited arable land despite different agricultural density values. Agricultural density differences reflect labor intensity, not land quantity."}, {"text": "Country X likely has a more technologically advanced and mechanized agricultural sector than Country Y.", "isCorrect": true, "rationale": "The source text explains that low agricultural density signals highly mechanized farming (like the Netherlands), while high agricultural density indicates dependence on hand labor. Both countries face similar pressure on arable land (high physiological density), but Country X has resolved it through technology rather than labor."}, {"text": "Country Y faces less food-security stress than Country X because it has more farmers working the land.", "isCorrect": false, "rationale": "More farmers per unit of arable land (high agricultural density) does not mean better food security. The source text notes that 'a country with high physiological density and no offsetting technological advantage faces genuine food-security stress' — Country Y, with high labor but presumably less capital-intensive farming, may face more stress, not less."}, {"text": "Country X and Country Y are both in the non-ecumene because high physiological density indicates uninhabitable terrain.", "isCorrect": false, "rationale": "This confuses the concept. High physiological density indicates heavy pressure on the food-producing land base and is characteristic of densely inhabited countries like Egypt or Bangladesh — firmly in the ecumene, not the non-ecumene."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
