<body>
<div class="quiz-container">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "A family from rural Guatemala migrates to California to work in agriculture. The father earns approximately $2 per day at home and $12 per hour doing comparable work in California. Which framework best analyzes this migration, and which category of factors is most significant here?", "options": [{"text": "Zelinsky's Migration Transition Model; the migration reflects Stage-1 circular mobility common in pre-modern societies.", "isCorrect": false, "rationale": "Zelinsky's Stage 1 describes pre-modern societies with very limited mobility where people rarely move beyond their birth village. The Guatemala–California labor migration involves international economic migration driven by large wage differentials — consistent with Zelinsky's Stage-2 or Stage-3 transitional mobility, and best analyzed through the push–pull framework."}, {"text": "The push–pull framework; economic pull factors (large wage differentials) combined with economic push factors (a rural economy unable to absorb its labor force) explain the migration.", "isCorrect": true, "rationale": "The source text uses exactly this example to illustrate economic push and pull factors: 'A worker who earns $2 per day in rural Guatemala and $12 per hour doing the same agricultural work in California is responding to a pull factor of extraordinary strength — and to the push of a rural economy that cannot absorb its own labor force.'"}, {"text": "Ravenstein's Law 5; the migration reflects women's dominance of short-distance moves in agricultural economies.", "isCorrect": false, "rationale": "Ravenstein's Law 5 concerns gender patterns in migration distance. The Guatemala–California movement is a long-distance international migration driven by economic factors. The source text explicitly notes that the nineteenth-century gender pattern Ravenstein described 'has changed significantly in the modern era.'"}, {"text": "The forced-migration framework; the family is a political refugee fleeing ethnic persecution in Guatemala.", "isCorrect": false, "rationale": "The scenario describes economic motivation (wage differentials), not forced displacement due to persecution or violence. The source text distinguishes economic migrants from political refugees, noting the distinction is 'legally and morally significant.'"}]}, {"question": "According to Ravenstein's Laws of Migration, which of the following patterns would you expect to observe in census data from a rapidly industrializing country?", "options": [{"text": "Most migrants move directly from their village of origin to the country's largest international export city in a single step.", "isCorrect": false, "rationale": "Ravenstein's Law 2 describes step-migration: migrants move first to nearby market towns, then to regional cities, then potentially to national capitals. Direct long-distance moves to major export cities in a single step contradict the step-migration pattern. Ravenstein's Law 1 also establishes that most migrants travel short distances."}, {"text": "Migration volumes are low regardless of economic development because most people prefer to stay in their place of birth.", "isCorrect": false, "rationale": "Ravenstein's Law 6 states that the volume of migration increases with the development of technology (transport and communication). As travel costs fall, migration volumes rise — so an industrializing country should see increasing, not low, migration volumes."}, {"text": "Most migrants travel short distances; rural-to-urban movement proceeds in stages through a hierarchy of market towns and regional cities; and a counterstream of return migrants accompanies the dominant flow.", "isCorrect": true, "rationale": "This captures three of Ravenstein's core laws: (1) most migrants travel short distances; (2) migration proceeds in steps through the urban hierarchy; (4) every stream generates a counterstream. The source text confirms these laws 'have proven remarkably durable' across different national contexts."}, {"text": "Female migrants dominate all long-distance moves because industrializing countries need domestic service workers in large cities.", "isCorrect": false, "rationale": "Ravenstein's Law 5 states women dominate short-distance migration; men dominate long-distance moves. Even this pattern has become outdated — the source text notes women now constitute approximately 48% of international migrants globally. Female dominance of all long-distance moves contradicts both Ravenstein's original finding and contemporary data."}]}, {"question": "A Somali community established in Minneapolis over the past decade has grown rapidly as subsequent migrants arrive, drawn by housing assistance, employment networks, and cultural familiarity offered by the existing community. Which concept best explains this pattern?", "options": [{"text": "Intervening obstacles; the cultural familiarity reduces the psychological barriers that prevent most Somalis from migrating internationally.", "isCorrect": false, "rationale": "Intervening obstacles are barriers that raise the cost or risk of migration. While cultural familiarity does reduce friction, the pattern described — where an established community attracts subsequent migrants — is specifically called chain migration in the source text, not the removal of intervening obstacles."}, {"text": "Chain migration; early migrants establish networks that lower the cost and risk for subsequent migrants from the same community, transforming the established enclave into a powerful pull factor.", "isCorrect": true, "rationale": "The source text defines chain migration as exactly this: 'the process by which early migrants establish networks that lower the cost and risk for subsequent migrants from the same community.' It uses the Somali-Minneapolis example directly, noting that housing, employment information, and cultural familiarity become a 'powerful pull factor for subsequent migrants.'"}, {"text": "Step-migration; Somali migrants first move to a regional center in East Africa, then to a major African city, then to Minneapolis.", "isCorrect": false, "rationale": "Step-migration describes the geographic progression of an individual migrant through an urban hierarchy. The Minneapolis Somali community pattern describes how an established diaspora attracts additional migrants through social networks — this is chain migration, a distinct concept."}, {"text": "Forced migration; Somalis are classified as refugees and therefore have no choice but to settle in designated host communities.", "isCorrect": false, "rationale": "The source text uses the Minneapolis example specifically to illustrate chain migration as a social pull factor — a voluntary process. While some Somali migrants are refugees, the pattern described emphasizes how established community networks attract subsequent migrants, which is chain migration regardless of the legal status of those migrants."}]}, {"question": "What is the legal and practical difference between a refugee and an internally displaced person (IDP), and why does this distinction matter?", "options": [{"text": "Refugees are economic migrants who cross borders voluntarily; IDPs are political migrants who remain within their own country by choice.", "isCorrect": false, "rationale": "This reverses the key characteristics. Refugees have crossed an international border and face persecution — they are not economic migrants. IDPs have not crossed an international border, but not by choice — they remain within their country's borders, often because they are unable to leave safely."}, {"text": "A refugee has crossed an international border and cannot return due to well-founded fear of persecution; an IDP is forced from home by conflict or disaster but remains within their own country's borders and lacks the legal protections of the 1951 Refugee Convention.", "isCorrect": true, "rationale": "The source text defines both precisely: refugees 'cannot return because of a well-founded fear of persecution' and are protected by the 1951 Refugee Convention's principle of non-refoulement. IDPs 'remain within their own country's borders' and 'are not covered by the 1951 Refugee Convention because they have not crossed an international border; they depend on their own government for protection, which is often the party responsible for their displacement.'"}, {"text": "Refugees and IDPs are legally identical categories; the distinction is purely geographic and has no implications for legal protection.", "isCorrect": false, "rationale": "The source text explicitly states the distinction 'matters because forced migrants have different legal protections and different psychological and logistical needs.' IDPs lack the international legal protections of the 1951 Refugee Convention — the gap in protection is precisely why the distinction is significant."}, {"text": "An IDP has officially been granted asylum by a host country; a refugee is still awaiting a determination of status.", "isCorrect": false, "rationale": "The source text defines asylum seekers (asylees) as those who have applied for refugee status but whose application has not been adjudicated — not IDPs. IDPs have not crossed international borders and are categorically different from asylum seekers or granted asylees."}]}, {"question": "The Zelinsky Migration Transition Model predicts that a country in DTM Stage 2 will experience which dominant type of migration?", "options": [{"text": "Primarily inter-city and suburban migration as the rural-to-urban transition is already complete.", "isCorrect": false, "rationale": "Inter-city and suburban migration characterizes Zelinsky's Stage 4 (Advanced society), corresponding to DTM Stage 4 countries where urbanization is largely complete. Stage-2 countries are still in the early phases of rural-to-urban transition."}, {"text": "Massive rural-to-urban migration as agricultural surpluses release labor from the countryside; significant emigration to 'new lands' abroad.", "isCorrect": true, "rationale": "The source text states that in Zelinsky's early transitional stage (DTM Stage 2): 'Massive rural-to-urban migration as agricultural surpluses release labor; significant emigration to new lands.' The nineteenth-century waves from Europe and East Asia to the Americas and Australia are cited as the historical example."}, {"text": "Circular mobility and seasonal agricultural labor within a small geographic radius, with very limited long-distance movement.", "isCorrect": false, "rationale": "Circular mobility within a small radius characterizes Zelinsky's Stage 1 (pre-modern traditional society, DTM Stage 1), where 'most people rarely move beyond their birth village.' Stage-2 countries experience dramatically increased mobility as agricultural surpluses push labor toward cities."}, {"text": "Primarily return migration and retirement migration from cities back to rural or coastal settings.", "isCorrect": false, "rationale": "Return migration, retirement migration, and counterstreams from cities to desirable rural/coastal settings characterize Zelinsky's Stage 4 (Advanced society). These flows emerge after urbanization is largely complete — not during the early transitional Stage-2 period of rapid rural-to-urban movement."}]}, {"question": "A scholar criticizes Ravenstein's Laws of Migration by noting that contemporary Syrian refugee flows do not follow the expected distance-decay pattern or the economic motivation he identified. Which aspect of Ravenstein's work does this critique most directly target?", "options": [{"text": "Ravenstein's Law 6, which predicts that migration volumes decrease as transportation technology improves.", "isCorrect": false, "rationale": "Law 6 states the opposite — migration volumes increase with technological development. The critique of refugee flows concerns their motivation (political persecution rather than economics) and their departure from distance-decay patterns, not the relationship between technology and volume."}, {"text": "The derivation of Ravenstein's laws from mid-Victorian Britain, a context of economic labor migration that may not predict forced migration or modern long-distance flows driven by persecution.", "isCorrect": true, "rationale": "The source text notes exactly this critique: 'Ravenstein derived his laws from mid-Victorian Britain — a rapidly industrializing country with specific labor markets and transport infrastructure. Modern forced migration (refugee flows) is not primarily economically motivated; long-distance air travel has weakened distance-decay effects for international migrants.'"}, {"text": "Ravenstein's assumption that all migration is voluntary and freely chosen, which he explicitly acknowledged excluded refugee populations.", "isCorrect": false, "rationale": "Ravenstein wrote in 1885 — before modern refugee law and the mass displacement of the twentieth and twenty-first centuries. He did not acknowledge refugee exclusions explicitly; the critique is that his empirical base (British census data) simply did not capture forced migration at scale."}, {"text": "Ravenstein's Law 3, which predicts that long-distance migrants gravitate to large urban centers, a pattern clearly not observed in Syrian refugee camps in Jordan.", "isCorrect": false, "rationale": "While refugee camps do represent an interesting counter-case, the source text's main critique is broader: it concerns the economic motivation assumption and the distance-decay limitation. The Law 3 urban-gravity pattern is actually partially visible even in refugee flows (many Syrian refugees did head to Istanbul, Beirut, or Berlin), making this critique less direct than the economic-motivation critique."}]}, {"question": "The Philippines remittance economy is described in the source text as both an economic success story and a source of 'brain waste.' Which of the following best captures this dual character?", "options": [{"text": "The Philippines benefits from remittances (9–10% of GDP) while losing trained professionals who take lower-skilled work abroad, weakening the country's healthcare and education systems.", "isCorrect": true, "rationale": "The source text describes this exactly: remittances 'constitute approximately 9–10 percent of Philippine GDP,' but 'brain waste' occurs when 'highly educated professionals — nurses, engineers, teachers — take lower-skilled positions abroad because the wage gap is so large.' The result is that 'the remittance economy encodes a structural dependency' and 'worsens the public-service capacity of the country they left.'"}, {"text": "The Philippines gains skilled workers from abroad through return migration while losing low-skilled workers to Gulf States, creating a net human capital gain.", "isCorrect": false, "rationale": "The flow described in the source text is the reverse: highly skilled Filipino workers (nurses, engineers) leave for lower-skilled work abroad, not the other way around. The Philippines is a net exporter of labor, not a recipient of skilled return migrants offsetting the outflow."}, {"text": "Philippines overseas workers are concentrated in the United States, where they work in professional roles matching their training, generating remittances without brain waste.", "isCorrect": false, "rationale": "The source text notes OFWs are concentrated in the Gulf States (Saudi Arabia, UAE, Kuwait), Hong Kong, and Singapore, and specifically highlights brain waste — working below their professional level. The U.S. is not identified as the primary destination, and professional-level employment does not characterize the dominant pattern described."}, {"text": "The remittance income has fully funded improvements in Philippine healthcare and education, eliminating the long-term costs of professional emigration.", "isCorrect": false, "rationale": "The source text presents an unresolved tension, not a resolved one. Remittances 'fund consumption, education, and small business investment at home,' but the departure of professionals 'worsens the public-service capacity of the country they left.' The source explicitly calls this a 'structural dependency,' not a solved problem."}]}, {"question": "Samuel Stouffer's theory of 'intervening opportunities' (1940) adds which nuance to the basic push–pull framework for explaining migration?", "options": [{"text": "Migrants are exclusively motivated by political conditions at the destination, not economic conditions at the origin.", "isCorrect": false, "rationale": "Stouffer's theory is about migration decision-making relative to closer opportunities, not a claim about the primacy of political motivations. It complements rather than contradicts the economic emphasis of push–pull analysis."}, {"text": "Migrants do not simply move toward the most attractive distant destination but stop at the nearest place offering an equivalent opportunity, explaining step-migration and why internal migration often precedes international migration.", "isCorrect": true, "rationale": "The source text states Stouffer's theory 'added a nuance: migrants do not simply move toward the most attractive distant destination — they stop at the nearest place that offers an equivalent opportunity.' This explains step-migration (regional city → national capital → international destination) and why most migrants move to nearby rather than distant places even when more attractive farther destinations exist."}, {"text": "Migrants always choose the destination with the highest wages regardless of distance, because economic returns outweigh all other factors.", "isCorrect": false, "rationale": "This describes a purely economic utility-maximization model, not Stouffer's theory. Stouffer's insight is precisely that migrants do not always leapfrog to the most advantageous distant destination — they respond to nearby equivalent opportunities, which limits the role of absolute wage differentials in predicting destination choice."}, {"text": "Physical barriers such as oceans and mountains are the primary determinants of migration flows because they create absolute intervening obstacles.", "isCorrect": false, "rationale": "Intervening obstacles (physical, political, economic, cultural) are a separate concept from Stouffer's intervening opportunities. The source text discusses obstacles and opportunities as distinct frameworks; Stouffer's specific contribution was about how closer equivalent opportunities redirect migration flows, not about barriers to movement."}]}, {"question": "Colombia and Syria are presented as case studies in internal displacement. What do these two cases have in common, and what distinguishes them geographically?", "options": [{"text": "Both are primarily examples of economic migration driven by wage differentials; Colombia's displaced people move to cities for employment, while Syrians move to Jordan for agricultural work.", "isCorrect": false, "rationale": "Both cases involve forced displacement from conflict, not voluntary economic migration. The source text explicitly frames them as 'internally displaced populations' driven by civil conflict. Syria's case also involves large-scale cross-border refugee flows, not agricultural labor migration to Jordan."}, {"text": "Both involve large-scale conflict-driven displacement; Colombia's is primarily internal (IDPs pushed toward urban peripheries within Colombia), while Syria's conflict produced both internal IDPs and approximately 6 million cross-border international refugees.", "isCorrect": true, "rationale": "The source text presents these as 'the two largest internally displaced populations on Earth.' Colombia's displacement is 'overwhelmingly... pushed toward peripheral urban barrios' within Colombia. Syria illustrates how the same conflict produces both IDPs (who cannot leave) and refugees (who cross international borders), depending on individuals' capacity to reach a border."}, {"text": "Both cases involve environmental displacement driven by climate change: Colombia by flooding, Syria by drought-driven conflict over water resources.", "isCorrect": false, "rationale": "The source text identifies political causes — civil conflict in Colombia (guerrillas, paramilitaries, drug networks) and civil war in Syria — not environmental displacement. While drought may have been a background stressor in Syria, the source text focuses on political conflict as the displacement driver in both cases."}, {"text": "Both Colombia and Syria are Stage-5 countries experiencing population decline, and their IDP populations reflect return migration of diaspora communities.", "isCorrect": false, "rationale": "Neither Colombia nor Syria is a Stage-5 country experiencing population decline. Both are developing countries with growing populations in Stage 2 or 3 of the DTM. Their IDP populations reflect forced displacement from conflict, not return migration."}]}, {"question": "In Ravenstein's primary source text, he presents his findings as 'laws' in the spirit of the physical sciences. The sourcing analysis notes this 'rhetorical move' gave his findings legitimacy while also 'obscuring the extent to which his categories encoded Victorian social assumptions.' Which of the following best illustrates this tension?", "options": [{"text": "Ravenstein's use of census tables made his work more reliable than Malthus's theoretical approach, but the census itself was flawed by Victorian-era underreporting of urban populations.", "isCorrect": false, "rationale": "The tension identified in the sourcing analysis is about Ravenstein's gender categories encoding Victorian social assumptions, not about census underreporting. The critique is that presenting patterns as universal 'laws' obscured their historically and culturally specific foundations."}, {"text": "Ravenstein's Law 5 — women dominate short-distance migration; men dominate long-distance migration — was presented as a universal law when it actually reflected the specific labor markets and gender roles of mid-Victorian Britain, which do not characterize contemporary global migration.", "isCorrect": true, "rationale": "The source text notes that Law 5 'encoded Victorian social assumptions' and explicitly states this 'pattern has changed significantly in the modern era: women now make up approximately 48% of international migrants globally.' Presenting a historically specific gender pattern as a universal 'law' is precisely the tension the sourcing analysis identifies."}, {"text": "Ravenstein deliberately chose a small, unrepresentative census sample to produce results that supported his pre-existing theory about distance decay.", "isCorrect": false, "rationale": "The source text presents Ravenstein as working rigorously with the full 1871 and 1881 British censuses — 'large-scale demographic data.' The critique is not about sample manipulation but about the unacknowledged cultural specificity of his interpretive categories."}, {"text": "By using the Statistical Society as his audience, Ravenstein ensured his laws would be accepted by geographers but rejected by economists who favored theoretical models over empirical observation.", "isCorrect": false, "rationale": "The source text notes that Everett Lee's 1966 push–pull model 'largely confirmed the empirical regularities while adding theoretical structure' — suggesting economists and social scientists broadly accepted Ravenstein's empirical foundation. The tension is about Victorian gender assumptions masquerading as universal laws, not about audience-specific acceptance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
