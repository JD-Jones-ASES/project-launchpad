<script>
var QUESTIONS = [{"question": "Read the following excerpt from Thomas Malthus's Essay on the Principle of Population (1798): 'Population, when unchecked, increases in a geometrical ratio. Subsistence increases only in an arithmetical ratio.' What is the core geographic implication Malthus draws from this mathematical disparity?", "options": [{"text": "Population growth is primarily driven by geographic factors such as climate and soil fertility, which vary by region.", "isCorrect": false, "rationale": "Malthus treats his two premises — food necessity and human sexuality — as universal laws of nature, not regional variables. His argument is about the universal relationship between population and food supply, not geographic variation in environmental conditions."}, {"text": "Population will always tend to press against the limits of subsistence, leading to 'positive checks' such as famine, disease, and war that restore equilibrium.", "isCorrect": true, "rationale": "The source text states Malthus derived from this disparity that 'population will always tend to press against the limits of subsistence,' with 'positive checks' (famine, disease, war) as the inevitable mechanism restoring balance. This is the Malthusian crisis: geometric population growth outrunning arithmetic food-supply growth."}, {"text": "Food production can eventually match population growth if agricultural technology improves fast enough.", "isCorrect": false, "rationale": "This is the Boserupian counter-argument, not Malthus's conclusion. Malthus explicitly assumed agricultural technology as essentially fixed — his arithmetic food-supply growth represents a ceiling, not a modifiable variable."}, {"text": "The passion between the sexes will eventually diminish as societies become more educated, solving the population problem over time.", "isCorrect": false, "rationale": "Malthus explicitly rejects this reasoning in the excerpt: 'towards the extinction of the passion between the sexes, no progress whatever has hitherto been made.' He treats sexual drive as a permanent feature of human nature that cannot be relied upon to fade away."}]}, {"question": "Paul Ehrlich's The Population Bomb (1968) predicted mass famine across South Asia in the 1970s–1980s. What actually happened in India during this period, and what does it illustrate about the Malthusian model?", "options": [{"text": "India experienced severe famine as predicted, confirming Malthusian theory and vindicating Ehrlich's forecast.", "isCorrect": false, "rationale": "The source text states the opposite: 'India transformed from a food-aid recipient into a net food exporter by the late 1970s.' The Green Revolution produced yield explosions, and child mortality fell globally during the period Ehrlich designated as catastrophic."}, {"text": "India's population stabilized near replacement-level fertility, eliminating the food-demand pressure Ehrlich had projected.", "isCorrect": false, "rationale": "India's population did not stabilize in the 1970s–80s; it continued to grow rapidly. The food-security improvement came from agricultural technology (the Green Revolution), not from reduced population growth. The Malthusian trap was escaped through innovation, not fertility decline."}, {"text": "India became a net food exporter through the Green Revolution, demonstrating that Malthus's model underestimated the capacity for agricultural technology to raise carrying capacity.", "isCorrect": true, "rationale": "The source text presents India as 'the canonical illustration of Malthusian failure': the Green Revolution's high-yield wheat and rice varieties produced yield explosions precisely when Ehrlich predicted famine. This demonstrates that Malthus incorrectly treated agricultural technology as fixed rather than as a variable responsive to need and investment."}, {"text": "India avoided famine only because of massive foreign aid, proving that Malthusian crises can be prevented through international redistribution rather than technological change.", "isCorrect": false, "rationale": "The source text attributes India's food transformation to the Green Revolution — the development of new crop varieties and agricultural techniques — not to foreign aid. Ehrlich had specifically argued that foreign aid could not avert mass death; the actual outcome refuted that claim through technological rather than redistributive means."}]}, {"question": "Ester Boserup argued that 'necessity is the mother of agricultural invention.' Which of the following real-world examples from the source text best supports the Boserupian model?", "options": [{"text": "The Sahel region of sub-Saharan Africa in the 1970s–1980s, where population growth led to agricultural adaptation.", "isCorrect": false, "rationale": "The source text presents the Sahel as a partial counter-example to Boserup: 'in sub-Saharan Africa in the 1970s–80s — population growth outpaced agricultural adaptation and famine resulted, a partial vindication of Malthus.' This region is cited as a critique of Boserup, not evidence for her model."}, {"text": "The agricultural histories of China, Java (Indonesia), and Bangladesh, where high population densities correlate with intensive multi-cropping rice systems rather than famine.", "isCorrect": true, "rationale": "The source text explicitly cites these regions as Boserupian evidence: 'high population densities correlate with intensive multi-cropping rice systems rather than with famine and collapse.' High density drove intensification — exactly the mechanism Boserup predicted."}, {"text": "France's pronatalist policies, which maintained TFR above 1.7 through cash payments to large families.", "isCorrect": false, "rationale": "France's pronatalist policies relate to population policy, not agricultural innovation. Boserup's model is about how population pressure drives agricultural intensification, not about how governments use incentives to influence fertility."}, {"text": "The Simon–Ehrlich wager of 1980–1990, in which five industrial metals fell in price despite population growth.", "isCorrect": false, "rationale": "The Simon–Ehrlich wager is about industrial resource prices, not agricultural intensification. While it is consistent with the broader anti-Malthusian argument that human ingenuity expands resource supply, Boserup's specific model concerns agricultural innovation driven by population pressure, not industrial commodity markets."}]}, {"question": "John Snow's investigation of the 1854 Broad Street cholera outbreak is described as 'a founding moment of medical geography.' What methodological innovation made his approach distinctively geographic?", "options": [{"text": "He conducted clinical laboratory tests on water samples from the Broad Street pump to identify the cholera bacterium.", "isCorrect": false, "rationale": "Snow's investigation predated germ theory — he did not identify a bacterium in the laboratory. His method was geographic: plotting deaths spatially on a map to identify the pump as the source through spatial pattern analysis, not laboratory analysis."}, {"text": "He mapped every cholera death as a dot on a large-scale street map, revealing a spatial cluster around the Broad Street pump that identified it as the transmission source.", "isCorrect": true, "rationale": "The source text describes Snow's method precisely: 'Working door to door... Snow recorded the address and water source of every household that had suffered a death. He then plotted each fatality as a dot on a large-scale map.' The spatial cluster around the pump was the evidence that overturned the miasma theory."}, {"text": "He interviewed surviving patients about their symptoms to build a statistical profile of the disease's progression.", "isCorrect": false, "rationale": "While Snow did interview residents, the decisive innovation was spatial — mapping deaths to reveal the pump's role. The source text emphasizes that 'the geographic distribution of a disease... could identify a causal mechanism that no amount of clinical observation at the bedside had been able to reveal.'"}, {"text": "He used aerial photography to identify contaminated water sources across London's sewer network.", "isCorrect": false, "rationale": "Aerial photography did not exist in 1854. Snow worked at street level, conducting door-to-door interviews and plotting deaths on a hand-drawn map of Soho. The source text notes his method 'anticipated modern Geographic Information Systems (GIS) by more than a century.'"}]}, {"question": "The two anomalies in Snow's Broad Street investigation — the brewery workers who did not die and the Hampstead widow who did — are described as having 'strengthened the case rather than weakening it.' Why?", "options": [{"text": "Both anomalies showed that cholera spread through person-to-person contact rather than water, confirming the miasma theory.", "isCorrect": false, "rationale": "Both anomalies support the waterborne theory, not the miasma theory. The brewery workers avoided the contaminated pump; the widow consumed its water despite living far away. Miasma theory could not explain either case — why would bad air selectively spare brewery workers or follow a cart to Hampstead?"}, {"text": "Both anomalies confirmed exceptions to the waterborne theory, suggesting a more complex multi-factor model was needed.", "isCorrect": false, "rationale": "The anomalies are not exceptions to the waterborne theory — they confirm it. The brewery workers survived because they did not use the pump; the widow died because she did use the pump's water. Both cases are perfectly consistent with the waterborne hypothesis."}, {"text": "Both anomalies were consistent with the waterborne hypothesis: workers who never used the pump were unaffected; the widow who sent for the water was infected despite distance from the pump.", "isCorrect": true, "rationale": "The source text presents both anomalies as confirming evidence: brewery workers drank their own well water (no pump exposure → no infection); the widow had the Broad Street water delivered to Hampstead weekly (pump exposure → infection despite geographic distance). Each anomaly tests the waterborne hypothesis and finds it correct."}, {"text": "Both anomalies demonstrated that only people over the age of 60 were susceptible to cholera, revealing an age-based vulnerability pattern.", "isCorrect": false, "rationale": "Neither the brewery workers nor the Hampstead widow's case has anything to do with age-based susceptibility. The anomalies are about exposure to the Broad Street pump's water — the defining variable was water source, not age."}]}, {"question": "A geographer comparing two countries finds: Country A has a growing population and is shifting from forest-fallow to bush-fallow agriculture. Country B has a stable population and uses annual cropping with systematic manuring. Which Boserup stages do these countries represent, and what does the comparison reveal?", "options": [{"text": "Country A is at Boserup's forest-fallow stage; Country B is at the annual-cropping stage. The comparison illustrates that higher population density drives more intensive farming techniques.", "isCorrect": true, "rationale": "The source text describes Boserup's five stages in sequence: forest-fallow is feasible only at very low population densities; annual cropping requires systematic soil management (manuring, crop rotation) and reflects higher population pressure. Country A's shift toward bush-fallow signals rising density; Country B's annual cropping signals a higher-density, more intensified system."}, {"text": "Country A is at the multi-cropping stage; Country B is at the forest-fallow stage. The comparison shows that stable populations use more intensive techniques than growing ones.", "isCorrect": false, "rationale": "This reverses the Boserupian logic. Multi-cropping — two or more harvests per year — requires the most intensive inputs (irrigation, high-yield varieties, heavy fertilization) and occurs under the greatest population pressure, not in slow-growing societies. Forest-fallow is the least intensive stage, used under the lowest population density."}, {"text": "Both countries are at the same Boserup stage because they both rely on fallowing to restore soil fertility.", "isCorrect": false, "rationale": "Country A uses fallow periods; Country B uses annual cropping with manuring — there is no fallow period. The source text explicitly distinguishes annual cropping from fallow systems. Country B is at a more intensive stage, consistent with higher population pressure."}, {"text": "Country A is at the annual-cropping stage; Country B is at the short-fallow stage. The comparison demonstrates that population decline drives agricultural simplification.", "isCorrect": false, "rationale": "Forest-to-bush-fallow is a shift from a less intensive to a slightly more intensive fallow system, consistent with rising (not declining) population. Country B's annual cropping is more intensive than either fallow stage. The comparison does not involve population decline."}]}, {"question": "China's one-child policy (1980–2015) is described in the source text as achieving its demographic goals while creating significant 'legacy costs.' Which combination of outcomes best captures this trade-off?", "options": [{"text": "The policy raised China's TFR to above-replacement level, but created urban overcrowding that strained infrastructure.", "isCorrect": false, "rationale": "The one-child policy reduced China's TFR, not raised it — from approximately 2.8 in 1979 to 1.5–1.6 by the 1990s. Overcrowding is not identified as a legacy cost in the source text; the actual legacy costs concern an aging population and skewed sex ratio."}, {"text": "The policy reduced TFR and youth-dependency ratio while generating an aging population, skewed sex ratio, and shrinking labor force.", "isCorrect": true, "rationale": "The source text states the policy 'reduced China's TFR from approximately 2.8 in 1979 to 1.5–1.6 by the 1990s' and 'is credited with... accelerating economic growth by reducing the youth-dependency ratio,' but produced 'a rapidly aging population, a skewed sex ratio (due to selective abortion of female fetuses), and a shrinking labor force' as legacy costs."}, {"text": "The policy successfully reversed population decline and prevented China from falling into Stage 5 of the DTM.", "isCorrect": false, "rationale": "China was not experiencing population decline when the policy was enacted — it was dealing with rapid growth. The policy reduced fertility; China is now approaching the demographic challenges of Stage 5, not being saved from them. The source text notes the TFR 'has continued to fall regardless' even after moving to two-child and three-child policies."}, {"text": "The policy increased female labor-force participation while accidentally increasing birth rates through pro-family sentiment.", "isCorrect": false, "rationale": "The source text does not link the one-child policy to increased birth rates — it reduced them. 'Womenomics' policies encouraging female labor-force participation are associated with Japan's response to Stage-5 aging, not China's one-child policy."}]}, {"question": "The Simon–Ehrlich wager (1980–1990) involved a bet about inflation-adjusted prices for five industrial metals over a decade. Simon won. What was the significance of this outcome for the Malthus–Boserup debate?", "options": [{"text": "Simon's win proved that all natural resources are infinite and that population can grow indefinitely without any scarcity constraint.", "isCorrect": false, "rationale": "The source text explicitly rejects this reading: 'This record does not license unlimited optimism.' Even while noting Malthus's empirical failures, the text affirms that 'the relationship between population and resources is a real constraint.' The Simon win shows human ingenuity repeatedly relaxes apparent constraints, not that they do not exist."}, {"text": "Simon's win supported the broader anti-Malthusian argument that human ingenuity expands effective resource supply faster than population growth expands demand.", "isCorrect": true, "rationale": "The source text frames the wager as crystallizing the empirical conflict: 'Simon bet Ehrlich that five industrial metals... would fall in inflation-adjusted price over the decade... his argument being that human ingenuity expands effective supply faster than population expands demand.' All five fell in price. This supports the Boserupian/anti-Malthusian view without claiming resources are infinite."}, {"text": "Simon's win demonstrated that population decline, not technological innovation, was responsible for reduced resource prices in the 1980s.", "isCorrect": false, "rationale": "Global population grew throughout the 1980s. Simon's argument was precisely that prices fell despite population growth — because human ingenuity expands supply. Population decline is not part of the explanation."}, {"text": "Simon's win proved that Malthus's geometric–arithmetic model was mathematically correct but that its time horizon was off by a century.", "isCorrect": false, "rationale": "The source text does not suggest Malthus was correct on a different timeline. It argues that the model's central flaw was treating 'agricultural technology as fixed — Resources are not fixed; they are a function of technology, institutions, and incentives.' The failure is structural, not merely temporal."}]}, {"question": "Singapore launched a 'Three or More' pronatalist campaign in 1987 after an earlier antinatalist campaign proved too successful. Despite financial incentives, Singapore's TFR remains around 1.0 in the 2020s. What does this outcome suggest about the effectiveness of pronatalist policies?", "options": [{"text": "Pronatalist policies are universally ineffective and governments should not attempt to influence fertility rates.", "isCorrect": false, "rationale": "The source text does not make such a sweeping claim. France's pronatalist system has helped it maintain a TFR of approximately 1.7–1.9 — higher than most Western European neighbors. The point is that once a country achieves high urbanization and female labor-force participation, reversal is extremely difficult, not that policies never have any effect."}, {"text": "Once a country achieves high urbanization, high costs of living, and high female labor-force participation, financial incentives alone are largely insufficient to reverse the fertility transition.", "isCorrect": true, "rationale": "The source text states precisely this: 'once a country achieves high urbanization, high costs of living, and high female labor-force participation, the fertility transition is extremely difficult to reverse through financial incentives alone.' Singapore's experience illustrates that deep structural economic conditions outweigh government cash transfers."}, {"text": "Singapore's low TFR is primarily explained by its Stage-2 demographic profile and rapidly falling death rates.", "isCorrect": false, "rationale": "Singapore is a highly developed city-state with one of Asia's highest per-capita incomes — firmly in Stage 4 or Stage 5, not Stage 2. Its low TFR reflects the conditions of an advanced economy, not a rapidly developing one with falling mortality."}, {"text": "Singapore's antinatalist campaign was so recent that not enough time has passed for the pronatalist policies to take effect.", "isCorrect": false, "rationale": "Singapore's pronatalist campaign began in 1987 — more than three decades before the 2020s data cited. The source text presents Singapore's persistently low TFR as evidence that the structural conditions of advanced development, not policy timing, explain the outcome."}]}, {"question": "The source text describes Malthus as arguing against the 'perfectibility theories of William Godwin and the Marquis de Condorcet.' Based on the primary source excerpt, what was Malthus's rhetorical strategy in constructing this argument?", "options": [{"text": "Malthus relied on emotional appeals to suffering and poverty to persuade readers that population growth was dangerous.", "isCorrect": false, "rationale": "The source text's sourcing note explains that Malthus 'casts his argument in the form of a geometric proof, establishing two postulata as the logical premises from which his conclusions follow necessarily.' His strategy was mathematical rigor and syllogistic logic, not emotional appeals."}, {"text": "Malthus presented his argument as a logical deduction from two self-evident premises, using syllogistic structure to make the conclusion about the impossibility of perfectibility seem mathematically unavoidable.", "isCorrect": true, "rationale": "The sourcing analysis states Malthus used 'the form of a geometric proof' with two postulata (food is necessary; sexual drive is permanent) from which conclusions 'follow necessarily.' This 'syllogistic structure is deliberate: by presenting his claims as logical deductions from axioms no reasonable reader could deny, Malthus attempts to foreclose debate about the premises.'"}, {"text": "Malthus appealed to the authority of established religious doctrine to argue that population growth was divinely ordained.", "isCorrect": false, "rationale": "While Malthus was a clergyman, his argumentative strategy in the Essay is mathematical, not theological. The sourcing note describes him targeting 'readers sympathetic to Enlightenment optimism about human perfectibility' using geometric proof, not religious authority."}, {"text": "Malthus cited extensive fieldwork data from agricultural regions in Asia and Africa to ground his theory empirically.", "isCorrect": false, "rationale": "The sourcing analysis contrasts Boserup's empirically grounded fieldwork with Malthus's more theoretical approach. Boserup 'spent decades as a researcher... studying agricultural development in Africa, South Asia, and Latin America,' giving her 'an empirical grounding that purely theoretical Malthusianism lacked.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
