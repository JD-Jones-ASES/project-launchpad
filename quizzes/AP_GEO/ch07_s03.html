<script>
var QUESTIONS = [{"question": "The Packard automotive plant on East Grand Boulevard in Detroit employed 36,000 workers in 1955 and was empty by 1958. By the 1980s it was the most photographed ruin in America. What geographic paradox does the text identify in the Packard plant's trajectory?", "options": [{"text": "Global industrial output was declining at the same time that Detroit factories were losing workers to automation.", "isCorrect": false, "rationale": "The text describes the opposite: the paradox is that 'at precisely the moment that global industrial output reached its highest levels in history, the places where modern industry had first grown were losing it fastest.' Global output was rising, not falling."}, {"text": "At the moment global industrial output was at its highest, the places that had invented modern industry were losing manufacturing fastest.", "isCorrect": true, "rationale": "The text states explicitly: 'at precisely the moment that global industrial output reached its highest levels in history, the places where modern industry had first grown were losing it fastest.' The Packard plant is the textbook illustration of this deindustrialization paradox."}, {"text": "Detroit's decline proved that agglomeration economies are self-defeating — the more firms cluster, the faster they eventually disperse.", "isCorrect": false, "rationale": "The text does not argue agglomeration economies are inherently self-defeating. Detroit's decline is attributed to overlapping causes — automation, labor-cost arbitrage, and demand shifts — not to a theoretical reversal of agglomeration logic."}, {"text": "The automobile industry's collapse demonstrated that weight-gaining industries are structurally more vulnerable to deindustrialization than weight-losing industries.", "isCorrect": false, "rationale": "Deindustrialization in the text is driven by technological change, labor-cost arbitrage, and demand shifts — not by the weight-gaining/losing distinction from Weber's location theory. Automobiles are actually a complex assembly industry, not a simple weight-gaining one."}]}, {"question": "A policy analyst studying deindustrialization notes that Detroit's population fell from 1.85 million in 1950 to under 700,000 by 2020, while national US manufacturing output grew over the same period. Which of the three causes identified in the text best explains the combination of rising output and falling employment?", "options": [{"text": "Global labor-cost arbitrage: as container costs fell, assembly migrated to Mexico and East Asia, reducing US output.", "isCorrect": false, "rationale": "Labor-cost arbitrage explains geographic migration of production, but it reduces both employment and output in the origin region. The text's scenario — rising national output alongside falling urban employment — is better explained by technological change reducing the labor content of each unit produced."}, {"text": "Technological change: automation and robotics permanently reduced the labor content of production, allowing more output from fewer workers.", "isCorrect": true, "rationale": "The text states: 'A car body that required 40 welders in 1970 required 4 in 2000 and will require 0 in the next decade.' Automation permanently reduces labor demand per unit of output — consistent with rising national output and falling urban manufacturing employment simultaneously."}, {"text": "Demand composition shifts: consumers switched from manufactured goods to services, reducing total manufacturing output.", "isCorrect": false, "rationale": "Demand composition shifts mean consumers spend more on services (health, finance, entertainment), but this reduces the share of manufacturing in total spending, not necessarily total manufacturing output. This cause better explains the service sector's growth than rising manufacturing output with fewer workers."}, {"text": "Government policy: federal disinvestment from Great Lakes cities directed manufacturing subsidies toward Sun Belt states.", "isCorrect": false, "rationale": "The text identifies three overlapping causes — technological change, labor-cost arbitrage, and demand shifts — but does not mention federal disinvestment or deliberate subsidy reallocation as a primary cause of Rust Belt deindustrialization."}]}, {"question": "Mexico's maquiladora system originated with the Border Industrialization Program (BIP) of 1965. A US electronics company operating a maquiladora in Ciudad Juárez imports circuit boards from Texas, assembles them in Mexico using Mexican labor, and ships the finished products back to the US market. Under the original BIP rules, which statement correctly describes the tariff treatment of this arrangement?", "options": [{"text": "The company pays full US tariff rates on both the imported circuit boards and the finished products, making the arrangement only viable because of very low Mexican wages.", "isCorrect": false, "rationale": "Under BIP, components could be imported duty-free into the Mexican border zone. The company pays tariff only on the value added in Mexico when re-exporting — not on the full product value. The duty-free import provision is the critical mechanism, not just wages."}, {"text": "The company imports components duty-free, pays Mexican assembly wages, and upon re-export pays tariff only on the value added in Mexico — not on the full product value.", "isCorrect": true, "rationale": "The text describes BIP exactly: 'US-owned factories could import components duty-free into a designated border zone, assemble them using Mexican labor, and re-export the finished goods to the United States paying tariff only on the value added in Mexico — not on the full product value.'"}, {"text": "The company pays no tariffs at any stage because NAFTA created a completely duty-free zone across North America in 1965.", "isCorrect": false, "rationale": "NAFTA did not take effect until January 1994, nearly 30 years after BIP. Under BIP, tariffs were reduced but not eliminated — companies paid tariff on the Mexican value-added portion. NAFTA later accelerated the maquiladora boom by removing remaining tariffs and liberalizing investment rules."}, {"text": "The company pays Mexican import tariffs on US components, then collects a US export subsidy when finished goods re-enter the United States.", "isCorrect": false, "rationale": "BIP allowed duty-free importing into the Mexican border zone — there were no Mexican tariffs on the incoming components under the BIP framework. The text describes no US export subsidy mechanism; the benefit to the company came from the tariff reduction on re-export, not a subsidy."}]}, {"question": "A US technology company closes its in-house software development team in California and contracts all software work to a firm in Bangalore, India. A classmate claims this is an example of 'offshoring.' Is the classmate correct, and why or why not?", "options": [{"text": "Yes — any time a function moves to a foreign country it is offshoring, regardless of whether the work is contracted to an external firm or kept in-house.", "isCorrect": false, "rationale": "This partially describes offshoring correctly (it involves international relocation) but misses that the scenario also involves outsourcing — contracting to an external firm. The text defines outsourcing as 'contracting a function out to a separate company,' which is distinct from captive offshoring where the same company runs its own foreign facility."}, {"text": "Partially correct — it is also outsourcing, because the work moves both to a foreign country (offshoring) and to an external firm (outsourcing). The combination is 'offshore outsourcing.'", "isCorrect": true, "rationale": "The text states: 'A US manufacturer that closes its in-house factory and contracts production to a Bangladeshi supplier has both outsourced and offshored. The combination — outsourced offshore manufacturing — is the defining supply-chain structure of the global apparel and electronics industries.' The same logic applies here."}, {"text": "No — it is only outsourcing, because offshoring requires the company to maintain ownership of the foreign facility, which this company does not.", "isCorrect": false, "rationale": "The text defines offshoring as 'relocating a business function to another country, whether within the same company (captive offshoring) or by contracting with a foreign supplier.' It does not require company ownership of the foreign facility — contracting with a foreign firm also qualifies as offshoring."}, {"text": "No — it is neither offshoring nor outsourcing because software services are non-tradable and cannot be moved across borders.", "isCorrect": false, "rationale": "Software services are highly tradable and among the most commonly offshored and outsourced functions globally. The text cites Indian IT services firms Infosys and Wipro in Bangalore as examples of global IT services empires built precisely by receiving this type of work from US and European clients."}]}, {"question": "Shenzhen was designated China's first Special Economic Zone in 1980. By 2024 it housed approximately 12 million people and had a GDP exceeding $450 billion. The text identifies a specific package of factors that made the Shenzhen SEZ work. Which set of factors is most accurate?", "options": [{"text": "State ownership of all factories, a closed border to prevent labor flight, and heavy subsidies from Beijing's central budget.", "isCorrect": false, "rationale": "Shenzhen's SEZ worked by attracting foreign (specifically Hong Kong) capital and management, not through state-owned factories. The border was semi-open to allow Hong Kong capital inflows. The text cites flexible regulation and investor-friendly policy, not heavy central subsidies."}, {"text": "Hong Kong capital and management expertise, cheap land and migrant labor, and a regulatory environment more flexible than the rest of China.", "isCorrect": true, "rationale": "The text states: 'The Shenzhen SEZ worked because of a deliberate package: Hong Kong investors brought capital and management expertise across the border; cheap land and abundant migrant labor from Guangdong and inland provinces were available; the state provided infrastructure and a regulatory environment more flexible than the rest of China.'"}, {"text": "Export-processing zone rules modeled directly on Mexico's maquiladora system, with duty-free importing for re-export only.", "isCorrect": false, "rationale": "The text distinguishes EPZs (primarily designed for labor-intensive assembly with export requirements) from SEZs, which are broader. China's SEZs 'may also permit domestic sales, offer financial sector liberalization, allow special labor regulations, and — as in China's case — serve as testing grounds for market reforms.'"}, {"text": "Large pre-existing manufacturing infrastructure from the Maoist era, updated with foreign technology to compete with Taiwan's export sector.", "isCorrect": false, "rationale": "The text notes Shenzhen was a fishing village of about 30,000 people in 1979 — it had no pre-existing manufacturing infrastructure. Growth started from near zero."}]}, {"question": "Castells and Hall's technopole model argues that Silicon Valley maintains competitive advantage despite 'extremely high land and labor costs.' Which mechanism explains why cost-sensitive firms do not simply relocate to cheaper regions?", "options": [{"text": "Silicon Valley firms benefit from federal government contracts and defense spending that are tied by law to California locations.", "isCorrect": false, "rationale": "While Silicon Valley has benefited historically from defense R&D, the text's explanation for its persistence despite high costs centers on agglomeration economies — the self-reinforcing knowledge spillovers, deep labor markets, and venture capital networks — not regulatory lock-in of government contracts."}, {"text": "Network effects from knowledge spillovers, deep skilled-labor markets, and venture capital are so strong that even high land and labor costs do not cause firms to disperse.", "isCorrect": true, "rationale": "The text states: 'Network effects are so strong that even very high land and labor costs do not cause firms to disperse.' The agglomeration economies — idea spillovers, engineers who can switch employers without relocating, Sand Hill Road venture capital — generate returns that exceed the cost premium of operating in Silicon Valley."}, {"text": "Silicon Valley firms are locked into long-term property leases and labor contracts that make relocation financially prohibitive.", "isCorrect": false, "rationale": "The technopole model explains ongoing location choice through positive agglomeration benefits, not through lock-in mechanisms like leases or contracts. New firms continuously choose Silicon Valley, which cannot be explained by existing firms' sunk costs."}, {"text": "California's regulatory environment uniquely protects high-tech intellectual property, which firms cannot preserve if they relocate to other states.", "isCorrect": false, "rationale": "Federal patent law, not California state law, governs most high-tech IP protection. The text's explanation emphasizes economic agglomeration forces — knowledge spillovers, talent density, venture capital — not regulatory advantages tied to California's legal environment."}]}, {"question": "Britain's manufacturing employment fell from about 38% of the workforce in 1960 to under 9% by 2010. A student argues this proves Britain 'lost' its industrial economy to global competition. The text offers a more nuanced explanation. Which response best represents the text's multi-causal account?", "options": [{"text": "Britain lost its manufacturing base entirely because the pound was chronically overvalued, making British exports uncompetitive in all international markets.", "isCorrect": false, "rationale": "The text identifies three overlapping causes of deindustrialization: technological change, labor-cost arbitrage, and demand-composition shifts. Currency overvaluation is not mentioned as a primary cause, and the text notes that parallel deindustrialization occurred in Germany and the US, which had different currency situations."}, {"text": "Deindustrialization resulted from overlapping causes: automation reducing labor per unit of output, production migrating to lower-wage regions as container costs fell, and consumer spending shifting toward non-tradable services.", "isCorrect": true, "rationale": "The text explicitly identifies three overlapping causes: 'technological change: automation … permanently reduced the labor content of industrial production'; 'global labor-cost arbitrage: as shipping container costs fell … labor-intensive assembly migrated'; and 'demand composition shifts: as incomes rose … consumers spent growing proportions on services.'"}, {"text": "Britain's decline was caused exclusively by Margaret Thatcher's deliberate policy of destroying the trade union movement and closing coal mines.", "isCorrect": false, "rationale": "The text does not attribute British deindustrialization to Thatcher's policies. It situates British decline within a global pattern — Germany's Ruhr, Scotland's Clydeside, and the US Rust Belt all experienced the same structural collapse — driven by technology, labor arbitrage, and demand shifts."}, {"text": "British manufacturing declined because the country failed to invest in the Second Industrial Revolution technologies of steel and electricity, unlike Germany and the United States.", "isCorrect": false, "rationale": "Britain was a major steel and electricity producer in the late nineteenth century. Its twentieth-century deindustrialization reflects structural global forces of automation and labor arbitrage, not a failure to adopt Second Industrial Revolution technologies — which occurred a century earlier."}]}, {"question": "The text describes the Rust Belt–Sun Belt–Maquiladora shift as a single spatial relationships case study. What common causal mechanism produced three geographically distinct outcomes simultaneously?", "options": [{"text": "Federal highway construction, which opened Sun Belt locations to interstate trucking while bypassing older Midwest rail hubs.", "isCorrect": false, "rationale": "While infrastructure investment shaped Sun Belt growth, the text explicitly identifies the common cause as labor arbitrage dynamics and transport cost changes: 'The same causal forces (wage differentials, transport cost changes, union strength) produced three spatially distinct outcomes at the same time.' Infrastructure is not named as the common cause."}, {"text": "Wage differentials, transport cost changes, and union strength differences producing job loss in the Midwest, job gain in the US South, and export-manufacturing growth in northern Mexico.", "isCorrect": true, "rationale": "The text's Skill Connection states: 'The same causal forces (wage differentials, transport cost changes, union strength) produced three spatially distinct outcomes at the same time: job loss in the industrial Midwest, job gain in the US South, and export-manufacturing growth in northern Mexico.' This is the AP-required spatial relationships analysis."}, {"text": "NAFTA's passage in 1994, which simultaneously eliminated tariffs in all three regions and created a unified North American manufacturing zone.", "isCorrect": false, "rationale": "NAFTA (1994) accelerated the maquiladora boom, but the Sun Belt shift and Rust Belt decline had been underway since the 1960s–70s, decades before NAFTA. The text explicitly notes deindustrialization began 'roughly 1970 and 2000,' predating NAFTA by two decades."}, {"text": "Environmental regulation, which forced polluting heavy industries to relocate from Midwest cities to less-regulated Sun Belt and Mexican border locations.", "isCorrect": false, "rationale": "Environmental regulation is mentioned in the context of Weber's model critique, but it is not identified as the common cause of the Rust Belt–Sun Belt–Maquiladora pattern. The text's account centers on labor costs, transport costs, and union dynamics."}]}, {"question": "The text critiques the technopole concept, noting that 'many planned technopoles (\"science cities\" in Korea, \"Silicon Steppes\" in Russia) have failed because agglomeration cannot be manufactured top-down.' Which theoretical principle from the section best explains these failures?", "options": [{"text": "Planned technopoles fail because governments always choose locations with low land costs rather than locations near research universities, violating the Castells–Hall model's core prediction.", "isCorrect": false, "rationale": "The text does not identify poor site selection as the cause of planned technopole failure. The fundamental issue is that the knowledge spillovers, labor market depth, and venture capital networks that make technopoles work 'cannot be manufactured top-down' — they emerge organically from existing concentrations of talent and investment."}, {"text": "Knowledge spillovers, venture capital networks, and deep skilled-labor markets are self-reinforcing agglomeration economies that emerge organically and resist top-down replication.", "isCorrect": true, "rationale": "The text states: 'deindustrialized regions rarely become technopoles simply by building a science park. Many planned technopoles … have failed because agglomeration cannot be manufactured top-down.' The Castells–Hall model explains success through self-reinforcing network effects — precisely what a government decree cannot instantly create."}, {"text": "Planned technopoles fail because they are placed in deindustrialized regions where workers are trained for physical manufacturing rather than knowledge-economy jobs.", "isCorrect": false, "rationale": "While workforce mismatch is a real challenge in deindustrialized regions, the text's explanation is broader: agglomeration economies cannot be manufactured from the top down, regardless of whether the workforce is skilled or unskilled. Even skill-rich regions have failed to replicate Silicon Valley by building planned science parks."}, {"text": "Governments lack the financial resources to sustain the subsidies required to maintain a technopole indefinitely once initial investment is made.", "isCorrect": false, "rationale": "The text's critique focuses on the organic, emergent nature of agglomeration economies — not on governments running out of money. The failure of planned technopoles is attributed to the impossibility of replicating top-down what must grow organically from talent density, research institutions, and investment networks."}]}, {"question": "The text argues the modern global economy is characterized by 'divergence — not convergence — at most spatial scales.' Which evidence from the section most directly supports this claim?", "options": [{"text": "Global manufacturing output has risen continuously since 1950, demonstrating that industrial growth is spreading evenly across all world regions.", "isCorrect": false, "rationale": "Rising global output is consistent with either convergence or divergence depending on where that growth occurs. The text's evidence for divergence is the simultaneous existence of rust belts and booming technopoles within the same countries — geographically uneven outcomes, not even spread."}, {"text": "Deindustrialized rust belts and booming technopoles exist side by side within countries, while globally some developing nations have been enriched by manufacturing migration while others remain locked in primary-commodity dependence.", "isCorrect": true, "rationale": "The text states: 'Within countries, deindustrialized rust belts and booming technopoles exist side by side, often separated by less than a hundred miles. Across countries, the core-periphery logic of manufacturing migration has enriched some developing nations … while others remain locked in primary-commodity dependence.' This multi-scale divergence is the direct evidence."}, {"text": "NAFTA and USMCA have created wage convergence between the US and Mexico, demonstrating that regional trade agreements produce economic convergence over time.", "isCorrect": false, "rationale": "The text notes that 'wages in the maquiladora sector remained a fraction of US manufacturing wages and the benefits were geographically and socially concentrated.' Maquiladora wages have not converged with US wages — this is evidence of persistent divergence, not convergence."}, {"text": "China's SEZ strategy has been successfully replicated in over 130 countries through EPZs, creating uniform industrial development across the Global South.", "isCorrect": false, "rationale": "The text notes EPZs exist in over 130 countries, but explicitly argues the modern economy is characterized by divergence, not uniform industrial development. EPZ success varies enormously; many countries with EPZs remain in primary-commodity export dependence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
