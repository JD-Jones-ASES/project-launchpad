<script>
var QUESTIONS = [{"question": "A sociologist states: 'Race is not a biological fact but a social construct.' A geographer adds: 'Yet race has profound geographic consequences.' Which of the following best reconciles both statements?", "options": [{"text": "Race has no geographic consequences because it is socially constructed and therefore not real.", "isCorrect": false, "rationale": "The text explicitly states that 'the social reality of race — the ways in which racial categories are used to distribute resources, restrict opportunities, and justify violence — has profound geographic consequences.' A social construct can have very real material and spatial effects."}, {"text": "Human genetic research confirms discrete biological races, which produce geographic segregation as a natural outcome.", "isCorrect": false, "rationale": "The text states the opposite: 'Human genetic diversity does not support the existence of discrete biological races: genetic variation within so-called racial groups is generally greater than variation between them.' Race is described as a social construct, not a biological category."}, {"text": "Although racial categories are socially created rather than biologically determined, they have historically structured where people live, what schools they attend, what wealth they accumulate, and how they interact with institutions.", "isCorrect": true, "rationale": "This is precisely the text's reconciliation: race is a social construct (not a biological classification), yet the social enforcement of racial categories has concrete geographic effects on residential location, wealth distribution, and institutional access."}, {"text": "Race is relevant only to ethnic enclaves, where both biological and cultural factors reinforce each other.", "isCorrect": false, "rationale": "The text treats race and ethnicity as distinct though related concepts. Race's geographic consequences extend far beyond ethnic enclaves to residential segregation, wealth accumulation, and institutional interaction across entire metropolitan areas and nations."}]}, {"question": "A neighborhood in San Francisco's Chinatown has Chinese-language signage, herbal medicine shops, and Buddhist and Taoist temples. A Vietnamese-American community in Orange County maintains cultural festivals, Vietnamese-language media, and mutual-aid organizations while dispersed across a suburban area. Which pairing of concepts correctly describes each community's spatial organization?", "options": [{"text": "San Francisco Chinatown = ethnoburb; Orange County Vietnamese community = ethnic enclave.", "isCorrect": false, "rationale": "The definitions are reversed. San Francisco's Chinatown is an inner-city ethnic enclave — a concentrated neighborhood where the cultural landscape visibly expresses the community's ethnic identity. The dispersed Orange County Vietnamese community, maintaining ties through institutions and media without geographic concentration, better fits heterolocalism or the ethnoburb pattern."}, {"text": "San Francisco Chinatown = ethnic enclave (concentrated neighborhood with visible ethnic cultural landscape); Orange County Vietnamese community = heterolocalism or ethnoburb pattern (geographically dispersed but socially connected community).", "isCorrect": true, "rationale": "An ethnic enclave is a concentrated neighborhood with a visibly ethnic cultural landscape — exactly Chinatown. Heterolocalism describes communities that disperse geographically but maintain ethnic community ties through digital communication, shared institutions, and periodic gathering — the pattern described for the Vietnamese-American community."}, {"text": "Both communities illustrate spatial assimilation, because both have moved beyond their original immigrant neighborhoods.", "isCorrect": false, "rationale": "Spatial assimilation involves gradual movement out of ethnic enclaves as economic mobility increases, with loss of concentrated ethnic identity. San Francisco's Chinatown has persisted as a concentrated enclave, not dissolved through assimilation. The Orange County community may reflect dispersal, but it maintains ethnic community ties — which is heterolocalism, not assimilation."}, {"text": "Both communities illustrate ethnic cleansing, because in both cases the original population was displaced by a new group.", "isCorrect": false, "rationale": "Ethnic cleansing is the forced removal or destruction of an ethnic group from a territory to make it homogeneous. Both communities described are thriving, voluntary cultural communities — neither involves forced displacement."}]}, {"question": "Wei Li introduced the term 'ethnoburb' in 1998 to describe places like Monterey Park and San Gabriel in the Los Angeles metro area. Which specific demographic and geographic shift does this concept reflect?", "options": [{"text": "The movement of native-born Americans out of cities into suburbs, leaving urban neighborhoods available for recent immigrants.", "isCorrect": false, "rationale": "This describes 'white flight' and suburbanization of existing urban residents, not the ethnoburb pattern. An ethnoburb is a suburban ethnic enclave — formed by immigrant communities themselves settling in suburbs rather than in inner-city ethnic neighborhoods."}, {"text": "The dispersal of immigrant communities out of ethnic enclaves through spatial assimilation, so that no suburban area retains a visible ethnic identity.", "isCorrect": false, "rationale": "Spatial assimilation involves loss of concentrated ethnic identity. An ethnoburb is the opposite: it is a suburban area that retains a strong, visible ethnic cultural landscape (ethnic commercial strips, foreign-language banks, ethnic media) despite being suburban rather than inner-city."}, {"text": "The post-1965 pattern in which immigrant communities, especially Asian and Latino, settled directly in suburbs — forming ethnically concentrated, culturally distinctive communities outside the traditional inner-city enclave model.", "isCorrect": true, "rationale": "The text defines ethnoburbs as suburban ethnic enclaves that emerged as Asian and Latino immigration increased in the late twentieth century. Monterey Park and San Gabriel are the canonical examples: predominantly Chinese-American suburbs with ethnic commercial strips and foreign-born residents, not inner-city Chinatowns."}, {"text": "The creation of gated communities in suburbs where ethnic majorities exclude minority groups from residential access.", "isCorrect": false, "rationale": "Ethnoburbs are neighborhoods where immigrant ethnic communities settled, often forming a voluntary majority. They are not gated exclusionary communities; they are the result of immigrant settlement patterns in suburban areas."}]}, {"question": "In approximately 100 days in 1994, around 800,000 Tutsi Rwandans were killed by Hutu extremists. The Tutsi-Hutu distinction had been reified and politicized by Belgian colonial-era racial classification policies. International law distinguishes ethnic cleansing from genocide on the basis of intent. Which characterization applies to Rwanda 1994, and why?", "options": [{"text": "Ethnic cleansing only, because the goal was forced relocation rather than destruction of the Tutsi population.", "isCorrect": false, "rationale": "Ethnic cleansing involves forced removal. The Rwanda case involved mass killing with the explicit goal of destroying the Tutsi population — not merely displacing it. The text classifies it as genocide and notes it was 'one of the most rapid mass killings in history.'"}, {"text": "Genocide, because the intent was to destroy the Tutsi group in whole or in part, not merely to displace them from territory.", "isCorrect": true, "rationale": "The text states: 'When the intent is to destroy the group in whole or in part, international law defines the act as genocide.' The organized mass killing of 800,000 Tutsi Rwandans with machetes and firearms — carried out by government-organized militias — meets this definition."}, {"text": "Neither genocide nor ethnic cleansing, because the Tutsi-Hutu distinction was a cultural rather than racial one.", "isCorrect": false, "rationale": "The text explicitly classifies the Rwanda case as genocide. The cultural vs. biological nature of the distinction does not determine whether an event qualifies as genocide under international law — it is the intent to destroy the group that matters."}, {"text": "Ethnic cleansing, because the colonial-era Belgian racial classification was the primary cause, making it a foreign-imposed rather than domestic genocide.", "isCorrect": false, "rationale": "The text acknowledges the Belgian colonial role in reifying the Tutsi-Hutu distinction, but it classifies the 1994 events as genocide. Colonial history as a contributing factor does not change the legal or geographic classification of what occurred."}]}, {"question": "In July 1995, Bosnian Serb forces killed approximately 8,000 Bosniak men and boys at Srebrenica — a town the UN had declared a 'safe area.' The Bosnian War as a whole produced a landscape far more ethnically segregated than existed before the conflict. Which concept best describes the overall spatial process that produced this outcome?", "options": [{"text": "Spatial assimilation, because mixed communities dissolved as each group moved to areas where their ethnicity was dominant.", "isCorrect": false, "rationale": "Spatial assimilation is a voluntary process in which immigrant groups gradually integrate into mainstream society through economic mobility. The Bosnian War produced segregation through violence, forced displacement, and terror — not voluntary integration."}, {"text": "Ethnic cleansing, because the systematic forced displacement of Bosniaks, Serbs, and Croats from mixed communities through violence produced a dramatically more ethnically segregated landscape.", "isCorrect": true, "rationale": "The text explicitly describes the Bosnian War as involving 'systematic ethnic cleansing — the forced displacement of Bosniaks, Serbs, and Croats from mixed communities through violence, destruction of homes, and terror — resulting in a dramatically more ethnically segregated landscape than existed before the war.'"}, {"text": "Heterolocalism, because the displaced communities maintained their ethnic identities despite being scattered across new locations.", "isCorrect": false, "rationale": "Heterolocalism describes communities that disperse geographically but maintain ethnic ties through digital networks and institutions. The Bosnian case involves forced violent displacement producing ethnic segregation — a qualitatively different (and catastrophically harmful) process."}, {"text": "Cultural diffusion, because Bosnian Serb cultural practices spread into previously mixed territories through conquest.", "isCorrect": false, "rationale": "Cultural diffusion describes the spread of cultural elements through human movement or communication. While territorial change was involved, the text's description of systematic forced displacement and mass killing in the Bosnian War is classified as ethnic cleansing, not diffusion."}]}, {"question": "The Rohingya are a predominantly Muslim ethnic minority who have lived in Myanmar's Rakhine State for centuries. The Myanmar government denied them citizenship in 1982. In 2017, a military campaign of mass violence drove approximately 700,000–1,000,000 Rohingya into Bangladesh. The UN Fact-Finding Mission found evidence of 'genocidal intent.' Which combination of geographic concepts does this case best illustrate?", "options": [{"text": "Spatial assimilation and ethnoburb formation, because the Rohingya adapted to their new suburban environment in Bangladesh.", "isCorrect": false, "rationale": "Cox's Bazar displacement camp is one of the world's largest refugee camps, not a suburban ethnic enclave formed through voluntary immigration. Spatial assimilation and ethnoburb concepts apply to voluntary immigrant communities, not forcibly displaced refugee populations."}, {"text": "Statelessness, ethnic cleansing/genocide, and forced displacement — producing one of the largest refugee crises of the 21st century.", "isCorrect": true, "rationale": "The text emphasizes three interlocking factors: statelessness (Rohingya lack citizenship in any country), state violence meeting the UN's genocidal-intent standard, and the creation of Cox's Bazar — the world's largest displacement camp. These together produce a textbook case of forced ethnic displacement."}, {"text": "Relocation diffusion, because the Rohingya carried their cultural practices with them into Bangladesh.", "isCorrect": false, "rationale": "Relocation diffusion describes the voluntary movement of people who carry their culture with them. The Rohingya were violently expelled under threat of death — this is forced displacement, categorically different from voluntary cultural migration."}, {"text": "Possibilism, because the physical environment of Rakhine State limited the Rohingya's ability to resist displacement.", "isCorrect": false, "rationale": "Possibilism is a theoretical framework about the environment-culture relationship. It does not explain state-organized ethnic violence, denial of citizenship, or forced displacement — which are products of political decisions and ethnic nationalism, not environmental constraints."}]}, {"question": "Many traditional South Asian households historically organized domestic space around the 'zenana' — women's quarters separated from male-dominated areas. This spatial arrangement is described in the text as part of a broader geographic pattern. Which concept best describes this pattern at a general level?", "options": [{"text": "Ethnic enclave formation, because women formed a distinct community within the household.", "isCorrect": false, "rationale": "Ethnic enclaves are defined by shared ethnic identity in an urban neighborhood context. The zenana arrangement is an intra-household spatial division based on gender, not an inter-neighborhood spatial pattern based on ethnic identity."}, {"text": "Environmental determinism, because South Asia's hot climate necessitated separate indoor spaces for women.", "isCorrect": false, "rationale": "Environmental determinism attributes social outcomes to physical geography. The zenana is a culturally and historically specific gender-space arrangement with no logical connection to climate — and the text presents it as a cultural-geographic pattern, not an environmental one."}, {"text": "The public/private spatial divide organized along gender lines — domestic space coded as female, public space coded as male — expressed in the built environment.", "isCorrect": true, "rationale": "The text describes the zenana as one expression of the broader public/private divide that has structured built environments across many cultures: domestic space associated with women and private life; public space (street, market, workplace) associated with men. The zenana is the South Asian architectural form of this widespread gender-space organization."}, {"text": "Heterolocalism, because women in zenana households maintained community ties despite geographic separation within the home.", "isCorrect": false, "rationale": "Heterolocalism describes immigrant communities that disperse geographically while maintaining ethnic ties through networks. The zenana is an intra-household gender-space division — a built-environment expression of gender hierarchy, not an immigration or community-dispersal pattern."}]}, {"question": "Judith Carney's research in 'Black Rice' (2001) argued that the success of South Carolina's rice economy depended on the specific agricultural expertise of enslaved African women from West Africa's Rice Coast, who had developed sophisticated techniques for cultivating rice in tidal floodplains. Which broader geographic argument does Carney's research support?", "options": [{"text": "That the South Carolina landscape was entirely the product of European agricultural planning executed by a generic labor force.", "isCorrect": false, "rationale": "Carney's argument directly contradicts this: she demonstrates that the South Carolina rice economy could not have existed without the specific knowledge of enslaved Gambian women — knowledge that was not European agricultural planning but African expertise extracted under coercion."}, {"text": "That environmental determinism explains the South Carolina rice economy because tidal floodplain geography determined which crops could be grown.", "isCorrect": false, "rationale": "Carney's argument is about cultural knowledge and gendered expertise, not environmental determination. The tidal floodplain setting was the medium, but the cultivation techniques — water management, sluice-gate systems, mortar-and-pestle processing — were the product of human knowledge, not environmental necessity."}, {"text": "That women's labor and expertise are often systematically undervalued or rendered invisible in the cultural landscape record, even when that expertise shaped entire regional economies.", "isCorrect": true, "rationale": "The text presents Carney's research as an illustration of this broader point: 'women's labor and expertise are often systematically undervalued or rendered invisible in the historical and geographic record.' The rice fields of the South Carolina lowcountry were created in large part by the knowledge of enslaved Gambian women — knowledge that shaped a regional economy but was not credited in the historical record."}, {"text": "That the Gender Inequality Index was lower in colonial South Carolina than in West Africa because enslaved women had more agricultural freedom.", "isCorrect": false, "rationale": "Enslaved women in colonial South Carolina had no freedom — their knowledge was extracted under extreme coercion. Carney's argument is not a comparative GII analysis; it is a recovery of hidden geographic expertise to understand how the cultural landscape was actually produced."}]}, {"question": "The Gender Inequality Index (GII) combines maternal mortality ratio, adolescent birth rate, shares of parliamentary seats by gender, secondary education attainment by gender, and labor force participation by gender into a single composite score. A GII score of 0 indicates perfect equality; a score of 1 indicates maximum inequality. A researcher notes that Yemen has one of the world's highest GII scores. Which of the following best explains what that score measures and what it does not measure?", "options": [{"text": "A high GII score measures the cultural richness of women's contributions to Yemeni society; it does not measure male contributions.", "isCorrect": false, "rationale": "The GII measures gender-based disadvantage, not cultural richness. The text is explicit: 'a high score indicates that women face severe structural disadvantage relative to men in that society.'"}, {"text": "A high GII score measures severe structural disadvantage for women in reproductive health, political empowerment, and labor market participation; it does not measure the strength or contributions of Yemeni women themselves.", "isCorrect": true, "rationale": "The text states: 'The GII measures gender inequality, not the absence of women's strength or contribution; a high score indicates that women face severe structural disadvantage relative to men in that society.' Yemen's extreme score reflects civil war, poverty, limited healthcare access, and legal restrictions."}, {"text": "A high GII score measures men's economic output relative to women's; a score of 1 means men produce twice as much as women.", "isCorrect": false, "rationale": "The GII does not measure economic output ratios. It measures gender inequality across three dimensions: reproductive health, political empowerment, and labor force participation. A score of 1 indicates maximum inequality, not a specific output ratio."}, {"text": "A high GII score measures how religiously conservative a country is; Yemen's score reflects the influence of Islam on gender roles.", "isCorrect": false, "rationale": "The GII is a composite measure of structural disadvantages — maternal mortality, parliamentary representation, education, labor force participation — not a measure of religious conservatism. The text attributes Yemen's extreme score to civil war, poverty, limited healthcare, and legal restrictions, not religion per se."}]}, {"question": "A geographer studying immigration patterns in a large U.S. city finds two communities: Community A consists of first-generation Korean immigrants who arrived in the 1970s and established a concentrated neighborhood, Koreatown, with Korean-language commercial strips, churches, and community organizations. Community B consists of Filipino immigrants who arrived after 2000 and dispersed across the metropolitan area immediately, but maintain a dense network of community organizations, social media groups, and annual cultural festivals that draw members from across the metro region. Which pairing correctly labels each community's spatial pattern?", "options": [{"text": "Community A = heterolocalism; Community B = ethnic enclave.", "isCorrect": false, "rationale": "The definitions are reversed. Koreatown's concentrated neighborhood with a visible ethnic commercial landscape defines the ethnic enclave. Community B's geographic dispersal combined with maintained ethnic community ties through networks and periodic gathering is the definition of heterolocalism."}, {"text": "Community A = ethnic enclave (concentrated, visibly ethnic neighborhood); Community B = heterolocalism (geographically dispersed but socially cohesive through networks).", "isCorrect": true, "rationale": "An ethnic enclave is a concentrated urban neighborhood with a visible ethnic cultural landscape — the Koreatown model. Heterolocalism describes communities that disperse geographically but maintain ethnic identity through digital networks, shared institutions, and periodic gathering — exactly the pattern of Community B."}, {"text": "Community A = spatial assimilation; Community B = ethnoburb.", "isCorrect": false, "rationale": "Spatial assimilation involves dispersal out of an ethnic enclave as economic mobility increases — but Community A formed a concentrated enclave, the opposite of assimilation. An ethnoburb is a suburban ethnic enclave, not a dispersed community connected through networks."}, {"text": "Both communities illustrate spatial assimilation, because both have adapted to the American urban context over time.", "isCorrect": false, "rationale": "Spatial assimilation requires gradual dispersal with loss of concentrated ethnic identity. Community A maintained a concentrated ethnic neighborhood (enclave); Community B dispersed from the start but maintained ethnic ties (heterolocalism). Neither fits the classic spatial assimilation trajectory."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
