<script>
var QUESTIONS = [{"question": "A linguist notes that English, Hindi, Persian, and Spanish all share systematic vocabulary and grammatical similarities that cannot be explained by borrowing alone. The most precise classification that groups these four languages together is which of the following?", "options": [{"text": "A language group, because they share a common ancestor more recent than the family level.", "isCorrect": false, "rationale": "A language group is a subdivision within a branch — for example, North Germanic within Germanic. English and Hindi belong to different branches (Germanic and Indo-Iranian), so they cannot be in the same language group."}, {"text": "A language branch, because they all use similar alphabets and grammatical structures.", "isCorrect": false, "rationale": "A language branch is a subdivision within a family. English and Hindi belong to different branches of Indo-European (Germanic and Indo-Iranian respectively), so they do not share a branch-level ancestor — only a family-level one."}, {"text": "A language family, because they share a demonstrable common ancestor — Proto-Indo-European.", "isCorrect": true, "rationale": "A language family is the highest-order classification grouping languages that share a reconstructed common ancestor. English (Germanic branch), Hindi (Indo-Iranian branch), Persian (Indo-Iranian branch), and Spanish (Romance branch) are all members of the Indo-European family."}, {"text": "A dialect continuum, because their grammatical differences are gradual rather than abrupt.", "isCorrect": false, "rationale": "A dialect continuum describes gradual variation within a single language across geographic space. English, Hindi, Persian, and Spanish are distinct languages in different branches — not dialects of one another."}]}, {"question": "The Anatolian hypothesis and the Kurgan hypothesis both attempt to answer the same geographic question. What is that question, and in what key respect do the two hypotheses differ?", "options": [{"text": "Both hypotheses seek to explain why English became the global lingua franca; they differ on whether British colonialism or American economic dominance was the primary cause.", "isCorrect": false, "rationale": "Neither hypothesis addresses the modern spread of English. Both concern the prehistoric origin and initial spread of the Proto-Indo-European language family thousands of years before English existed as a distinct language."}, {"text": "Both hypotheses seek to locate the Indo-European hearth; they differ on the proposed location (Anatolia vs. the Pontic-Caspian steppe) and the diffusion mechanism (agricultural expansion vs. pastoral-nomadic expansion).", "isCorrect": true, "rationale": "The Anatolian hypothesis (Renfrew) places the origin among early farmers in Turkey c. 8000 BCE, spreading via agricultural colonization. The Kurgan hypothesis (Gimbutas) places it among steppe pastoralists c. 4000–3500 BCE, spreading through military dominance and cultural prestige."}, {"text": "Both hypotheses seek to explain why Swahili became a lingua franca in East Africa; they differ on whether trade or political conquest was the primary mechanism.", "isCorrect": false, "rationale": "Swahili's spread as an East African lingua franca is a separate historical topic unrelated to the Anatolian or Kurgan hypotheses, which address Indo-European origins specifically."}, {"text": "Both hypotheses address where creole languages form; they differ on whether substrate or superstrate grammar dominates.", "isCorrect": false, "rationale": "Creole language formation is a distinct linguistic process unrelated to the Proto-Indo-European origin debate. The two hypotheses concern the prehistoric hearth and diffusion of a language family, not contact-language formation."}]}, {"question": "In Papua New Guinea, Tok Pisin developed when speakers of many mutually unintelligible indigenous languages needed a common medium for trade and interaction under colonial administration. Native speakers were not born into it; they learned it as a second language. This scenario describes which type of contact language?", "options": [{"text": "A creole, because it blended vocabulary from multiple languages into a new one.", "isCorrect": false, "rationale": "A creole develops when children acquire a pidgin as their native language, expanding its grammar to full natural-language complexity. Tok Pisin at the stage described — no native speakers, learned as a second language — is still a pidgin."}, {"text": "A lingua franca, because it served communication between speakers of different languages.", "isCorrect": false, "rationale": "A lingua franca is any language used as a medium between speakers of different native languages; it can be a full natural language (English, Arabic). Tok Pisin is specifically a pidgin — a simplified contact language with no native speakers — not merely any shared communication medium."}, {"text": "A pidgin, because it is a simplified contact language that nobody speaks as a native tongue.", "isCorrect": true, "rationale": "A pidgin is defined precisely as a simplified contact language that develops between speakers of different native languages, draws vocabulary from a superstrate language, and is learned as a second language — it is nobody's native tongue. Tok Pisin is the text's primary example."}, {"text": "A dialect, because it combines grammatical features from multiple regional varieties.", "isCorrect": false, "rationale": "A dialect is a regional or social variety of a single language, mutually intelligible with other dialects. Tok Pisin arose from contact between entirely different, mutually unintelligible languages — a qualitatively different process from dialect formation within a single language."}]}, {"question": "Haitian Kreyòl is spoken natively by virtually the entire population of Haiti. It developed from a French-based contact language used during the colonial period and now has a regular grammar, rich vocabulary, and a growing literature. Which concept best describes Haitian Kreyòl?", "options": [{"text": "A pidgin, because its vocabulary is derived primarily from French rather than from a native Haitian language.", "isCorrect": false, "rationale": "Drawing vocabulary from a superstrate language (French) is a feature of pidgins, but Haitian Kreyòl has native speakers and has undergone the grammatical expansion that transforms a pidgin into a creole. Having a European vocabulary source does not make it a pidgin."}, {"text": "A creole, because a community of children acquired it natively, expanding and regularizing its grammar into a full natural language.", "isCorrect": true, "rationale": "A creole is specifically what a pidgin becomes when children acquire it as their first language, giving it the full grammatical complexity of a natural language. Haitian Kreyòl fits this definition exactly and is the text's primary example."}, {"text": "A dialect of French, because it shares most of its vocabulary with French.", "isCorrect": false, "rationale": "Haitian Kreyòl is not mutually intelligible with French and has a distinct grammatical substrate from West African languages. Shared vocabulary alone does not make it a dialect — dialects are mutually intelligible regional varieties of the same language."}, {"text": "A lingua franca used by elites in Haiti for diplomatic and commercial purposes.", "isCorrect": false, "rationale": "Haitian Kreyòl is the native language of the entire Haitian population, not a second language used by elites for specialized communication. French serves the elite lingua franca role in Haiti; Kreyòl is the vernacular mother tongue."}]}, {"question": "A linguistic geographer maps the American Midwest and finds a line separating communities where people say 'pop' for a carbonated soft drink from communities to the south and east where 'soda' predominates. Where multiple such boundaries cluster together, they define a dialect region. What is the technical term for each individual boundary line?", "options": [{"text": "Isogloss, because it marks the geographic boundary of a specific linguistic feature.", "isCorrect": true, "rationale": "An isogloss is defined as a line on a linguistic map marking the geographic boundary of a particular linguistic feature — a word, pronunciation, or grammatical construction. The 'pop'/'soda' boundary is a classic example."}, {"text": "Toponym, because it records the local name people use for the same object.", "isCorrect": false, "rationale": "A toponym is a place name — a geographic proper noun like 'Manchester' or 'Mississippi.' It is not a map line marking the distribution boundary of a linguistic feature."}, {"text": "Language branch, because it separates two sub-families of the same language family.", "isCorrect": false, "rationale": "A language branch is a subdivision of a language family based on shared ancestry (e.g., Romance vs. Germanic). It is a classification category, not a map line marking the geographic boundary of a specific vocabulary item."}, {"text": "Lingua franca boundary, because it marks where speakers switch from their native dialect to a shared medium.", "isCorrect": false, "rationale": "A lingua franca is a language used for communication between speakers of different native languages. The 'pop'/'soda' boundary marks vocabulary variation within a single language, not a transition to a shared contact medium."}]}, {"question": "A researcher studying English town names notes that Manchester, Lancaster, and Winchester all contain the suffix '-chester' or '-caster,' derived from the Latin word 'castra,' meaning military camp. The researcher concludes this is evidence of Roman military occupation. This use of place names as historical evidence illustrates which concept?", "options": [{"text": "Contagious diffusion, because the Latin suffix spread outward from Rome through direct contact.", "isCorrect": false, "rationale": "Contagious diffusion is a process by which a cultural practice spreads through a population. The '-chester' suffix is not an ongoing diffusion process; it is a fossil preserved in place names long after the Roman presence ended."}, {"text": "Toponyms functioning as cultural fossils that preserve evidence of past occupance.", "isCorrect": true, "rationale": "The text explicitly defines toponyms as 'cultural fossils' that preserve evidence of languages, peoples, and events that have otherwise vanished. The '-chester'/'-caster' suffix is the text's own example of Roman military presence recorded in English place names."}, {"text": "Stimulus diffusion, because Latin was adapted into English naming conventions.", "isCorrect": false, "rationale": "Stimulus diffusion involves the creative adaptation of a concept from one culture into another. The '-chester' suffix is a direct retention from Roman occupation, not a creative reinterpretation of a Latin idea in a new cultural form."}, {"text": "Dialect formation, because regional pronunciation differences caused the suffix to vary between '-chester' and '-caster.'", "isCorrect": false, "rationale": "While regional pronunciation may explain the '-chester'/'-caster' variation, the broader point being illustrated is toponyms as historical evidence — the names preserve the Latin 'castra' across both spellings, documenting Roman occupation regardless of the phonetic variant."}]}, {"question": "The Austronesian language family is remarkable for covering the greatest longitudinal range of any family, stretching from Madagascar in the west to Easter Island in the east — yet all member languages share a demonstrable common ancestor. Which geographic and historical process best explains this extraordinary distribution?", "options": [{"text": "Hierarchical diffusion from elite maritime trading centers that imposed Austronesian as a lingua franca.", "isCorrect": false, "rationale": "Hierarchical diffusion moves through a prestige rank of places within a connected network, not across thousands of miles of open ocean to isolated islands. The scale and island-hopping character of Austronesian spread reflects migration, not elite-to-mass cultural imposition."}, {"text": "The spread of Austronesian-speaking populations through long-distance maritime migration, carrying their languages as relocation diffusion.", "isCorrect": true, "rationale": "The extraordinary geographic spread of Austronesian languages across the Pacific and Indian Oceans reflects the relocation diffusion process: Austronesian-speaking peoples migrated by sea across vast distances, carrying their languages to Hawaii, Maori New Zealand, Samoan islands, Madagascar, and Easter Island."}, {"text": "Contagious diffusion, because Austronesian vocabulary spread through person-to-person contact across a continuous land mass.", "isCorrect": false, "rationale": "Contagious diffusion requires spatial contiguity. The Austronesian family spans thousands of miles of open ocean with no continuous land bridge — its spread required maritime migration (relocation diffusion), not contiguous land-based contact."}, {"text": "Stimulus diffusion, because local island cultures adapted Austronesian grammatical structures into entirely new languages.", "isCorrect": false, "rationale": "Stimulus diffusion involves the adaptation of an idea into a new form in the receiving culture. The Austronesian family's spread produced related languages through migration and divergence over time, not through independent cultures adopting and transforming a foreign grammatical concept."}]}, {"question": "A student argues: 'Because English and Hindi are both Indo-European languages, they must be closely related — practically dialects of the same language.' A geographer would challenge this claim on which grounds?", "options": [{"text": "English and Hindi are not related because they use different writing systems.", "isCorrect": false, "rationale": "Writing systems do not determine linguistic relatedness. Many unrelated languages share scripts (Arabic script for Arabic, Persian, Urdu), and many related languages use different scripts. Linguistic relationship is determined by shared ancestry, not shared orthography."}, {"text": "Membership in the same language family indicates a common ancestor, not mutual intelligibility; English (Germanic) and Hindi (Indo-Iranian) are in different branches, separated by thousands of years of divergence.", "isCorrect": true, "rationale": "The text explicitly notes that genetic relatedness (sharing a common ancestor) is not the same as geographic proximity or mutual intelligibility. English and Hindi are both Indo-European but belong to different branches (Germanic vs. Indo-Iranian), and no competent linguist would classify them as dialects of each other."}, {"text": "Hindi is not Indo-European because it developed on the Indian subcontinent, not in Europe.", "isCorrect": false, "rationale": "Geographic location does not determine language family membership. The Indo-European family explicitly includes the Indo-Iranian branch, which encompasses Hindi-Urdu, Bengali, and Persian — all of South and Southwest Asian origin. The family name reflects historical spread, not current geography."}, {"text": "The student is correct — all Indo-European languages are mutually intelligible because they share vocabulary.", "isCorrect": false, "rationale": "Shared vocabulary can help with partial comprehension but does not imply mutual intelligibility. English and Hindi speakers cannot understand each other despite belonging to the same family — they have diverged for thousands of years across different branches."}]}, {"question": "A diplomat from West Africa, attending an international climate conference, communicates with delegates from China, Germany, and Brazil using the same shared language that also dominates international aviation and scientific publishing. This scenario illustrates which linguistic phenomenon?", "options": [{"text": "A creole language, because the diplomat learned it from exposure to multiple language communities.", "isCorrect": false, "rationale": "A creole is a language that developed from a pidgin and has native speakers. The scenario describes a diplomat using an established natural language (English) for international communication — a lingua franca, not a creole that formed through the pidginization process."}, {"text": "A lingua franca, because a single language is being used as a medium among speakers of different native tongues.", "isCorrect": true, "rationale": "A lingua franca is defined as a language used for communication between speakers of different native languages. English functions as the dominant global lingua franca today, used in international diplomacy, aviation, scientific publishing, and conferences exactly as described."}, {"text": "Hierarchical diffusion, because English spread from elite British and American centers to the rest of the world.", "isCorrect": false, "rationale": "While English did spread partly through hierarchical mechanisms (colonial centers, economic dominance), the phenomenon being illustrated in the conference scenario is not the diffusion process but the current function of a shared communication medium — a lingua franca."}, {"text": "An isogloss boundary, because the diplomat's usage marks the geographic limit of English-speaking competency.", "isCorrect": false, "rationale": "An isogloss marks the geographic boundary of a specific linguistic feature within a language. The scenario describes international communication between speakers of completely different native languages, which is the defining condition for a lingua franca."}]}, {"question": "A historian studying Spanish place names in southern Spain notes that names like Alcazar, Alhambra, and Almeria all begin with the Arabic prefix 'al-.' The historian uses these toponyms to argue that Arabic-speaking people exercised significant political and cultural influence in the Iberian Peninsula for an extended period. According to the geographic concept of toponyms as cultural fossils, what makes this argument valid?", "options": [{"text": "Place names change frequently in response to market forces and popular culture, so current names accurately reflect current conditions.", "isCorrect": false, "rationale": "The cultural-fossil value of toponyms rests on the opposite premise: place names are among the most durable artifacts of cultural landscapes precisely because they persist long after the communities that created them have disappeared or been displaced."}, {"text": "Place names are durable cultural artifacts that preserve linguistic evidence of past occupance even after that culture has otherwise vanished from living memory.", "isCorrect": true, "rationale": "The text defines toponyms as 'cultural fossils' that function as evidence precisely because they persist. The Arabic 'al-' prefix in Spanish place names documents the Moorish presence (711–1492) centuries after the end of Islamic political control of the Iberian Peninsula."}, {"text": "Place names in Spanish always derive from Arabic because Spanish is a branch of the Afro-Asiatic language family.", "isCorrect": false, "rationale": "Spanish is a Romance language in the Indo-European family, not a member of the Afro-Asiatic family. The Arabic prefixes in some Spanish place names reflect historical contact and cultural overlay during the Moorish period, not genetic linguistic relationship."}, {"text": "The 'al-' prefix proves that Arabic is a branch of Indo-European because Spanish later adopted it.", "isCorrect": false, "rationale": "Arabic is a member of the Afro-Asiatic family, not Indo-European. The presence of Arabic borrowings in Spanish place names reflects historical cultural contact and substrate influence — it does not indicate that Arabic and Spanish share a common proto-language ancestor."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
