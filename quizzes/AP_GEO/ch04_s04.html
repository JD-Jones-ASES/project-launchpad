<body>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Centripetal vs. Centrifugal Forces: Devolution and Supranationalism</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In October 2017, the Catalan government held an independence referendum. The Spanish Constitutional Court declared it unconstitutional, Spanish security forces attempted to prevent the vote, and the Spanish government ultimately invoked Article 155 to suspend the Catalan autonomous government and impose direct rule. Which concept does this sequence of events most directly illustrate?", "options": [{"text": "Supranationalism, because the EU intervened to mediate between Catalonia and the Spanish central government.", "isCorrect": false, "rationale": "The EU did not intervene as a mediating supranational authority in the Catalan crisis. The text describes the episode as an illustration of devolutionary pressure and the limits of subnational self-determination within an existing constitutional order — not a supranational intervention."}, {"text": "Devolution under pressure: Catalonia's centrifugal forces (distinct language, cultural identity, economic grievances) generated a strong independence movement, but the central Spanish government asserted constitutional limits on subnational self-determination.", "isCorrect": true, "rationale": "The text presents Catalonia as a devolution case study showing both the power of centrifugal pressure (Catalan language, distinct identity, fiscal grievances) and the limits of subnational self-determination — the Spanish government suspended Catalan autonomy rather than allowing secession, illustrating that devolution has constitutional boundaries."}, {"text": "The nation-state ideal, because Catalonia successfully achieved its goal of aligning cultural and political boundaries.", "isCorrect": false, "rationale": "Catalonia did not achieve independence or a nation-state. The independence declaration was brief; Spain suspended the Catalan government and imposed direct rule. The episode illustrates failed devolution, not a successful nation-state formation."}, {"text": "A centripetal outcome, because the Spanish central government successfully unified the country by suppressing regional dissent.", "isCorrect": false, "rationale": "Centripetal forces bind a state together and reinforce national identity. Spain's use of Article 155 was a response to centrifugal pressure — it was a coercive reassertion of central authority, not evidence that centripetal forces had organically resolved the underlying grievances. The independence movement persisted."}], "id": "q01"}, {"question": "Scotland voted 55.3% to remain in the United Kingdom in 2014, apparently settling the independence question. Then in the 2016 Brexit referendum, Scotland voted 62% to remain in the EU while England and Wales voted to leave. Scottish independence advocates argued Scotland was being 'dragged out' of the EU against its will. Which of the following best explains why Brexit reinvigorated Scotland's independence movement?", "options": [{"text": "Brexit demonstrated that supranationalism is always irreversible, so Scotland sought to remain in the EU at any cost.", "isCorrect": false, "rationale": "The text makes the opposite point: Brexit 'demonstrated that supranational integration is not necessarily irreversible.' The argument was not about supranationalism being permanent but about Scotland's distinct political preferences being overridden by a UK-wide vote."}, {"text": "Brexit created a new centrifugal force: a divergence between Scotland's democratic preferences and those of England/Wales on a major policy question, reigniting the argument that Scotland's interests were better served by independence.", "isCorrect": true, "rationale": "The text describes this dynamic directly — Scotland voted 62% to remain in the EU while the UK as a whole voted to leave, re-energizing independence advocates who argued Scotland was being dragged out against its will. This represents a new centrifugal pressure: a clear divergence in political preferences between Scotland and the rest of the UK."}, {"text": "The UK Supreme Court ruled in 2016 that Scotland was legally entitled to hold a second independence referendum without Westminster's consent.", "isCorrect": false, "rationale": "The text states the opposite: the UK Supreme Court ruled in 2022 that the Scottish Parliament cannot hold a binding independence referendum without Westminster's consent. No such ruling authorizing a referendum is described."}, {"text": "NATO's expansion into Eastern Europe made Scottish independence strategically necessary to protect North Sea oil fields.", "isCorrect": false, "rationale": "The text does not connect NATO expansion to Scottish independence. The reinvigoration of the Scottish independence movement is attributed to the Brexit vote divergence, not to NATO or energy security concerns."}], "id": "q02"}, {"question": "The European Coal and Steel Community (ECSC, 1951) bound France, West Germany, Italy, Belgium, the Netherlands, and Luxembourg into a common market for two industries that had fueled both world wars. The text states the logic was 'explicitly political.' What was the political logic behind the ECSC?", "options": [{"text": "Economic integration of coal and steel would generate tax revenues to fund post-war reconstruction, thereby stabilizing European democracies against communist influence.", "isCorrect": false, "rationale": "While economic recovery was important in post-war Europe, the text specifically identifies the ECSC's logic as preventing renewed Franco-German war through economic integration — 'if French and German heavy industry were economically integrated, renewed war between them would require destroying their own economies.' Tax revenue is not mentioned as the rationale."}, {"text": "If French and German heavy industry were economically integrated, renewed war between them would require destroying their own economies, making war between the two powers too costly to contemplate.", "isCorrect": true, "rationale": "The text explicitly states this logic: 'The logic was explicitly political: if French and German heavy industry were economically integrated, renewed war between them would require destroying their own economies.' The ECSC used economic interdependence as a peace mechanism."}, {"text": "Pooling coal and steel production would give Europe collective energy independence, reducing dependence on U.S. Marshall Plan aid.", "isCorrect": false, "rationale": "Energy independence from the U.S. is not mentioned as a motivation in the text. The ECSC's explicitly stated political logic was about preventing another European war, not about energy autonomy."}, {"text": "A common coal and steel market would allow member states to collectively outcompete U.S. and Soviet industrial output, establishing European economic supremacy.", "isCorrect": false, "rationale": "The text does not present economic competition with the U.S. or USSR as the ECSC's motivation. The logic was specifically about preventing renewed Franco-German conflict through economic interdependence."}], "id": "q03"}, {"question": "Belgium has both English-as-a-second-language instruction in its schools and a complex system of linguistic community governments. It has also gone nearly two years (2010–2011) without a functioning federal government. Identify which of the following correctly classifies one centripetal and one centrifugal force operating in Belgium.", "options": [{"text": "Centripetal: the physical geography of Belgium as a small, flat country with few internal barriers. Centrifugal: the Dutch-French linguistic divide between Flemish and Walloon communities.", "isCorrect": false, "rationale": "While physical geography can facilitate integration, the text does not specifically identify Belgium's flatness as a centripetal force. The text does identify linguistic division as a centrifugal force, making only half of this answer clearly supported. The answer also doesn't acknowledge the active cultural and institutional centripetal efforts Belgium makes."}, {"text": "Centripetal: Belgium's shared national institutions, constitution, and monarchy bind its communities under a common state framework. Centrifugal: the linguistic and cultural divide between Dutch-speaking Flemish and French-speaking Walloons, which has produced repeated constitutional crises.", "isCorrect": true, "rationale": "The text discusses Belgium's repeated constitutional reforms and linguistic tensions as a prime example of centrifugal forces in a multinational state. Centripetal forces — shared institutions, infrastructure, civic identity — are those that 'bind a state's population together and reinforce national identity,' which Belgium's national framework provides even as linguistic divisions strain it."}, {"text": "Centripetal: Belgium's membership in the EU, which overrides internal linguistic disputes. Centrifugal: Belgium's NATO membership, which forces different linguistic communities into competing military obligations.", "isCorrect": false, "rationale": "EU membership is not described as a centripetal force that resolves Belgium's linguistic tensions. NATO membership is not described as a centrifugal force in Belgium. The centrifugal pressures in Belgium derive from internal linguistic and cultural divisions, not from international organizational memberships."}, {"text": "Centripetal: Belgium's location at the crossroads of France and the Netherlands, which naturally unifies the two language communities. Centrifugal: Belgium's capital Brussels hosting EU institutions, which draws power away from the national government.", "isCorrect": false, "rationale": "The text does not describe geographic crossroads position as a centripetal force in Belgium, nor does it characterize EU institutions in Brussels as a centrifugal force for the Belgian state. The relevant centrifugal force in Belgium is the Dutch-French linguistic division."}], "id": "q04"}, {"question": "The Maastricht Treaty (1993) transformed the EEC into the European Union and launched plans for a common currency. By 1999, 11 member states adopted the euro, eventually expanding to 20 members. The 2008–2012 European debt crisis revealed that states like Greece, Spain, and Portugal 'could not devalue their currencies to adjust to external shocks.' Which aspect of sovereignty did the eurozone most deeply pool?", "options": [{"text": "Military sovereignty, because eurozone members agreed to coordinate defense spending through NATO.", "isCorrect": false, "rationale": "The eurozone is a monetary arrangement, not a military one. NATO handles collective defense. The text discusses eurozone sovereignty pooling in terms of monetary policy — control over interest rates, money supply, and currency exchange rates."}, {"text": "Fiscal sovereignty, because eurozone members transferred their taxing and spending powers to the European Central Bank.", "isCorrect": false, "rationale": "The text states the opposite: 'member states transferred control of interest rates and money supply to the European Central Bank, retaining only fiscal policy (taxing and spending).' Fiscal policy was explicitly retained by member states; monetary policy was what was pooled."}, {"text": "Monetary sovereignty, because member states transferred control of interest rates and money supply to the European Central Bank, removing their ability to use exchange rate adjustments to respond to economic crises.", "isCorrect": true, "rationale": "The text specifies that eurozone members 'transferred control of interest rates and money supply to the European Central Bank, retaining only fiscal policy.' The 2008–2012 debt crisis exposed the consequence: states could not devalue their currencies to adjust to external shocks — precisely because monetary sovereignty had been pooled."}, {"text": "Border sovereignty, because the Maastricht Treaty eliminated all customs checks between eurozone members through the Schengen Agreement.", "isCorrect": false, "rationale": "The Schengen Agreement governs border-free travel and is distinct from the eurozone currency arrangement. The text discusses the Maastricht Treaty in terms of common citizenship and a common currency — the sovereignty pooled was monetary, not primarily border-related. The text also notes the UK opted out of Schengen."}], "id": "q05"}, {"question": "South Sudan voted 98.8% for independence from Sudan in January 2011 and became the world's newest internationally recognized country on July 9, 2011. Within two years, however, it descended into its own internal civil war. Which geographic concept does South Sudan's trajectory most directly illustrate?", "options": [{"text": "Supranationalism, because South Sudan immediately sought membership in the African Union and other regional bodies.", "isCorrect": false, "rationale": "While South Sudan did join international organizations, the text presents it as a devolution/secession case study. The focus is on the combination of centrifugal forces that drove separation from Sudan (religious/cultural differences, oil competition) and the subsequent internal centrifugal forces that produced civil war."}, {"text": "The nation-state ideal, because South Sudan's creation aligned Christian/animist cultural identity with a new political state.", "isCorrect": false, "rationale": "While South Sudan's secession was partly driven by religious and cultural difference from the north, the immediate descent into internal civil war between rival factions shows the new state was not a stable nation-state. The text presents it as a case of successful secession followed by internal fragmentation, not the achievement of the nation-state ideal."}, {"text": "Devolution and the complexity of centrifugal forces: the same forces that drove South Sudan's successful secession from Sudan (centrifugal forces relative to Sudan) became internal centrifugal forces once an independent state was created.", "isCorrect": true, "rationale": "South Sudan illustrates that devolution/secession does not automatically resolve centrifugal pressures. The text notes that 'within two years, however, the country descended into its own internal civil war ... between rival factions' — the new state faced its own internal centrifugal forces. Solving the external centrifugal problem (relationship with Sudan) did not create internal cohesion."}, {"text": "The multinational state problem, because South Sudan forced disparate ethnic and religious groups into a single state through its democratic referendum.", "isCorrect": false, "rationale": "Multinational states contain two or more nations within existing borders (like Russia or Belgium). South Sudan was a new state created through secession, not a multinational state that inherited existing diversity. The text's focus is on the devolution/secession dynamic, not the multinational state classification."}], "id": "q06"}, {"question": "Quebec held two independence referenda (1980: defeated 59.6%–40.4%; 1995: defeated 50.58%–49.42%). Canada responded with the Clarity Act (2000), establishing conditions for negotiating secession: a 'clear question' and a 'clear majority.' The independence movement has since receded. Which conclusion does the text draw from Quebec's case?", "options": [{"text": "Centrifugal pressures in multinational states inevitably lead to secession when the minority group is large enough to win a referendum.", "isCorrect": false, "rationale": "Quebec's case shows the opposite: despite coming within 50,000 votes of passing in 1995, the independence movement receded after the Clarity Act. Centrifugal pressures can be managed — at least temporarily — rather than inevitably producing secession."}, {"text": "Devolutionary pressures can be managed — at least temporarily — through federal accommodation, and democratic processes can contain centrifugal forces without resort to coercion.", "isCorrect": true, "rationale": "The text explicitly states: 'Quebec's independence movement has since receded from its mid-1990s intensity, illustrating that devolutionary pressures can be managed — at least temporarily — through federal accommodation.' The Clarity Act provided a framework that addressed the movement without the coercive suppression seen in Catalonia."}, {"text": "Supranational bodies like NATO were critical to preventing Quebec's secession by threatening economic sanctions against a sovereign Quebec.", "isCorrect": false, "rationale": "NATO and supranational organizations play no role in the text's discussion of Quebec. The management of Quebec's centrifugal pressure was a domestic Canadian political process: referenda, negotiation, and the Clarity Act framework."}, {"text": "The two referenda demonstrated that language differences are insufficient to generate genuine centrifugal pressure, since Quebec never actually seceded.", "isCorrect": false, "rationale": "The text treats Quebec's referenda as genuine centrifugal pressure — a near-miss in 1995, with 49.42% voting for independence. Language difference is identified as a centrifugal force throughout Unit 4. The fact that secession didn't occur shows management of centrifugal pressure, not its absence."}], "id": "q07"}, {"question": "The Responsibility to Protect (R2P) doctrine was invoked to authorize NATO airstrikes in Libya in 2011. After the intervention contributed to Muammar Gaddafi's removal and subsequent Libyan state collapse, Russia and China argued it exceeded its mandate by pursuing regime change. When the Syrian civil war produced larger humanitarian catastrophes, Russia vetoed Security Council action. Which tension in international relations does this sequence best illustrate?", "options": [{"text": "The tension between supranationalism and devolution: NATO's military action in Libya represented an upward pooling of sovereignty, while Syria's civil war led to a devolutionary transfer of authority to rebel groups.", "isCorrect": false, "rationale": "The Libya/Syria sequence does not illustrate the devolution concept, which involves a central government transferring authority to sub-national units. The tension is between R2P (which asserts the international community's right to override state sovereignty for humanitarian protection) and the Westphalian principle that states are sovereign within their own borders."}, {"text": "R2P represents a challenge to Westphalian sovereignty — asserting that states can be held accountable for treatment of their own citizens — but its application depends entirely on great-power politics in the UN Security Council.", "isCorrect": true, "rationale": "The text states that R2P 'has consequently been described as both a meaningful advance in international norms and a doctrine whose application depends entirely on great-power politics.' The Libya intervention used R2P to override Gaddafi's sovereignty; Russia's Syria veto shows that great-power interests determine when R2P can actually be invoked."}, {"text": "The sequence illustrates the organic theory of the state: Libya's state collapsed because it failed to acquire sufficient Lebensraum, while Syria's state survived because it had stronger territorial resources.", "isCorrect": false, "rationale": "Ratzel's organic theory concerns states competing for territorial living space — it has no analytical bearing on R2P, humanitarian intervention, or Security Council veto dynamics. This is an incorrect application of the concept."}, {"text": "The Libya and Syria cases demonstrate that centripetal forces within Arab states are too weak to prevent civil war, making external intervention by supranational organizations the only viable solution.", "isCorrect": false, "rationale": "The text does not draw a conclusion about the relative strength of centripetal forces in Arab states. The focus is on the tension between R2P as an international norm and the practical constraints of Security Council veto power — a lesson about supranationalism and sovereignty, not about state cohesion in a regional context."}], "id": "q08"}, {"question": "A policy analyst notes that environmental regulation in the EU simultaneously involves: a municipal emissions standard, a national carbon price, an EU-wide emissions trading scheme, and the Paris Accord's global targets. Which geographic skill does recognizing all four levels of this policy landscape require?", "options": [{"text": "Spatial diffusion analysis, because the emissions policy originated at one scale and spread outward to other scales.", "isCorrect": false, "rationale": "Spatial diffusion describes how phenomena spread across space from an origin point. Recognizing that the same policy domain operates simultaneously at local, national, regional, and global scales is scale analysis — not the tracing of diffusion from a source."}, {"text": "Scale analysis, because the same process (environmental regulation) looks different depending on which geographic scale is examined, and the most powerful explanations connect multiple scales simultaneously.", "isCorrect": true, "rationale": "The text presents this exact example in its Skill Connection section on scale analysis (SC), stating: 'The Scale Analysis (SC) skill requires you to recognize that the same process looks different depending on which scale you examine, and that the most powerful explanations often connect multiple scales.'"}, {"text": "Mackinder's Heartland analysis, because environmental degradation in the Eurasian interior determines global climate outcomes.", "isCorrect": false, "rationale": "Mackinder's Heartland Theory is a geopolitical model about strategic dominance, not a tool for analyzing multi-scale policy processes. The skill the text identifies for this scenario is scale analysis, not geopolitical theory."}, {"text": "Gerrymandering analysis, because different levels of government are drawing political boundaries around the same emissions territory.", "isCorrect": false, "rationale": "Gerrymandering is the manipulation of electoral district boundaries for partisan advantage. It has no application to multi-scale environmental regulation. The skill required here is scale analysis — recognizing how the same policy process operates differently at different geographic levels."}], "id": "q09"}, {"question": "ASEAN's 'non-interference principle' means member states agree not to criticize or intervene in each other's internal affairs. Critics say this shields authoritarian governments; supporters say it enables sustained economic cooperation in a region of 'remarkable cultural and political diversity.' This tradeoff is most analogous to which tension discussed elsewhere in Unit 4?", "options": [{"text": "The tension between cracking and packing in gerrymandering, because ASEAN distributes political influence unevenly among member states.", "isCorrect": false, "rationale": "Gerrymandering involves the manipulation of electoral districts within a state. ASEAN's non-interference norm is about inter-state relations within a supranational organization — a completely different political context."}, {"text": "The tension between Westphalian sovereignty (states' right to govern their internal affairs without external interference) and international norms that hold states accountable for their treatment of citizens — as illustrated by the R2P debate.", "isCorrect": true, "rationale": "ASEAN's non-interference principle is an explicit commitment to the Westphalian norm of sovereignty non-interference — member states cannot be challenged on their internal governance. This directly parallels the R2P debate in which the international community grapples with whether sovereignty protects states that abuse their own populations. Both cases represent the same underlying tension."}, {"text": "The tension between centripetal and centrifugal forces within ASEAN member states, where the organization simultaneously binds and divides Southeast Asian nations.", "isCorrect": false, "rationale": "While centripetal/centrifugal dynamics are relevant to Southeast Asian states individually, the tradeoff being described is about the norm governing inter-state relations within ASEAN — specifically the tension between sovereignty non-interference and human rights accountability. That maps onto the Westphalian/R2P tension, not primarily the centripetal/centrifugal one."}, {"text": "The tension between antecedent and superimposed boundaries, because ASEAN's non-interference principle was imposed on the organization before Southeast Asian nations had developed distinct political identities.", "isCorrect": false, "rationale": "Boundary typology applies to territorial borders, not to organizational norms. ASEAN's non-interference principle is a diplomatic norm chosen by sovereign member states, not a boundary type. The relevant tension is between sovereignty and accountability — the same tension that defines the R2P debate."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
