<script>
var QUESTIONS = [{"question": "At the Berlin Conference of 1884–85, European powers drew boundaries across Africa based on their own strategic and economic interests, with little reference to existing ethnic homelands, clan territories, or trade networks. Using Hartshorne's classification, what type of boundary did the Berlin Conference primarily produce?", "options": [{"text": "Antecedent boundaries, because the boundaries were drawn before European settlement of the interior.", "isCorrect": false, "rationale": "Antecedent boundaries are drawn before significant human settlement of the region. Africa's interior was densely populated by indigenous peoples with established political structures — it was not a sparsely settled landscape. The European powers ignored, rather than preceded, existing human patterns."}, {"text": "Subsequent boundaries, because the treaties attempted to reflect the cultural and linguistic communities already on the ground.", "isCorrect": false, "rationale": "Subsequent boundaries are explicitly drawn to reflect existing cultural or linguistic patterns. The Berlin Conference did the opposite — it drew boundaries with 'limited knowledge of the interior's ethnic, linguistic, and political geography,' disregarding indigenous communities."}, {"text": "Superimposed boundaries, because an outside power imposed lines across pre-existing cultural and political communities.", "isCorrect": true, "rationale": "The text describes superimposed boundaries as imposed by an outside power with little or no regard for existing ethnic, linguistic, or political communities, and explicitly identifies Africa's colonial borders — produced at the Berlin Conference — as the textbook example."}, {"text": "Relict boundaries, because the boundaries are no longer politically enforced in the post-colonial era.", "isCorrect": false, "rationale": "Relict boundaries are ones that have ceased to function as political boundaries but remain visible in the landscape. Africa's colonial-era borders continue to function as the active international boundaries of postcolonial states — the text notes that the International Court of Justice endorsed their continued validity under the principle of uti possidetis."}], "id": "q01"}, {"question": "The Berlin Wall was demolished beginning November 9, 1989. Yet cultural geographers can still detect the former boundary in Berlin's street patterns, the density of bus routes, the distribution of nightlife venues, and even in satellite images showing differences in forest composition between the former East and West Germany. Which boundary type does this describe?", "options": [{"text": "Antecedent boundary", "isCorrect": false, "rationale": "An antecedent boundary is drawn before significant settlement. The Berlin Wall was built in 1961 through an already densely populated city — it was not drawn before settlement, and it is not described as antecedent in the text."}, {"text": "Superimposed boundary", "isCorrect": false, "rationale": "While the Berlin Wall was indeed imposed on the landscape (by the East German government), the question describes its status after demolition — when it no longer functions as a political boundary but still leaves traces in the landscape. That is the definition of a relict boundary."}, {"text": "Relict boundary", "isCorrect": true, "rationale": "The text explicitly defines a relict boundary as one that has ceased to function as a political boundary but remains visible in the cultural or physical landscape, and uses the Berlin Wall — demolished but still traceable in urban fabric and land management differences — as its primary modern example."}, {"text": "Subsequent boundary", "isCorrect": false, "rationale": "A subsequent boundary is drawn after settlement to reflect existing cultural or linguistic patterns. The Berlin Wall was not drawn to reflect cultural patterns; it was a militarized political division. And the question concerns the Wall's residual presence after its removal, not its original drawing."}], "id": "q02"}, {"question": "Under the United Nations Convention on the Law of the Sea (UNCLOS, 1982), a coastal state discovers substantial oil and gas reserves beneath the seabed 180 nautical miles from its coastline. Which UNCLOS zone applies, and what rights does the coastal state have?", "options": [{"text": "The territorial sea (12 nm); the state exercises full sovereignty, including resource extraction.", "isCorrect": false, "rationale": "The territorial sea extends only 12 nautical miles from the baseline. At 180 nm, the resource deposit falls well beyond the territorial sea."}, {"text": "The contiguous zone (12–24 nm); the state may enforce customs and immigration laws but cannot claim resource rights.", "isCorrect": false, "rationale": "The contiguous zone extends only from 12 to 24 nautical miles. At 180 nm, the deposit is far outside this zone."}, {"text": "The Exclusive Economic Zone (EEZ, up to 200 nm); the coastal state has exclusive rights to explore and exploit all natural resources in the water column and on the seabed.", "isCorrect": true, "rationale": "The text describes the EEZ as extending 200 nautical miles from the baseline and granting the coastal state exclusive rights to exploit all natural resources — fish, oil, natural gas, and deep-sea minerals. At 180 nm, the oil and gas deposit falls squarely within the EEZ."}, {"text": "The continental shelf zone (beyond 200 nm); the state must submit a claim to the Commission on the Limits of the Continental Shelf.", "isCorrect": false, "rationale": "The continental shelf zone applies beyond the 200 nm EEZ limit where the physical continental shelf extends further. At 180 nm, the deposit is within EEZ range and does not require a separate continental shelf submission."}], "id": "q03"}, {"question": "Halford Mackinder argued in his 1904 paper that the spread of railways across the Eurasian interior was transforming global geopolitics. What was the core strategic implication of his argument?", "options": [{"text": "Sea power was becoming more decisive than land power because naval technology was advancing faster than rail.", "isCorrect": false, "rationale": "Mackinder argued the opposite — that railways were restoring strategic mobility to land-based powers, challenging the long dominance of sea power. His central claim was that the era of maritime supremacy was ending."}, {"text": "Whoever controlled the landlocked interior of Eurasia — the Heartland — would be positioned to dominate the World-Island and potentially the world, because the Heartland was now accessible by rail but immune to sea-based attack.", "isCorrect": true, "rationale": "The text summarizes Mackinder's argument directly: railways were making the Eurasian interior strategically decisive; the Heartland's inaccessibility to sea power combined with new rail-based mobility meant whoever controlled it could threaten in every direction. His formula — 'Who rules East Europe commands the Heartland; who rules the Heartland commands the World-Island; who rules the World-Island commands the World' — captures this."}, {"text": "African coastal regions would become strategically decisive because European powers needed direct sea routes to their colonies.", "isCorrect": false, "rationale": "Mackinder's argument centered on the Eurasian interior (the Heartland), not African coastal regions. His concern was the rise of land-based continental power challenging maritime empires."}, {"text": "The Rimland of Eurasia — its coastal periphery — contained the decisive concentration of population and industrial capacity.", "isCorrect": false, "rationale": "This describes Spykman's Rimland Theory (1944), not Mackinder's. Spykman explicitly inverted Mackinder's logic by arguing the coastal Rimland, not the interior Heartland, was strategically decisive."}], "id": "q04"}, {"question": "A geopolitical analyst argues: 'U.S. Cold War alliances with Western Europe (NATO), Japan, and South Korea, and military interventions in Korea and Vietnam, all reflected the same underlying geographic logic.' Which geopolitical theory best explains this pattern of U.S. Cold War strategy?", "options": [{"text": "Mackinder's Heartland Theory, because the U.S. sought to control the Eurasian interior by occupying its strategic center.", "isCorrect": false, "rationale": "Mackinder's theory emphasized the importance of the landlocked interior Heartland. U.S. Cold War strategy focused on preventing Soviet expansion into the coastal Rimland states — not on controlling the Heartland itself."}, {"text": "Ratzel's Organic Theory, because the U.S. was expanding its territorial control as a growing organism seeking Lebensraum.", "isCorrect": false, "rationale": "Ratzel's organic theory described states as organisms needing living space. U.S. Cold War strategy was not about territorial annexation but about preventing Soviet domination of coastal Eurasia — a different logic entirely."}, {"text": "Spykman's Rimland Theory, because it held that controlling the coastal periphery of Eurasia was strategically decisive, and Soviet expansion into Rimland states must be contained.", "isCorrect": true, "rationale": "The text states that Spykman's Rimland Theory 'directly informed U.S. Cold War containment doctrine: if the Soviet Union (which controlled the Heartland) attempted to expand into the Rimland states, the United States and its allies should contain that expansion at the rim' — precisely the logic of NATO, alliances with Japan and South Korea, and interventions in Korea and Vietnam."}, {"text": "UNCLOS maritime zone theory, because the U.S. sought to protect its Exclusive Economic Zones in the Pacific and Atlantic.", "isCorrect": false, "rationale": "UNCLOS (1982) is a legal framework for maritime resource zones, not a grand geopolitical strategy. The Cold War alliance system predated UNCLOS and was driven by geopolitical containment logic, not EEZ protection."}], "id": "q05"}, {"question": "Friedrich Ratzel's concept of Lebensraum (\"living space\") was originally an academic descriptor within a scholarly geographic framework. Which of the following most accurately describes how his ideas were later misused?", "options": [{"text": "Ratzel's Lebensraum concept was adopted by the League of Nations to justify redistribution of colonial territories after World War I.", "isCorrect": false, "rationale": "The League of Nations used different justifications — such as the mandate system — for post-WWI territorial redistribution. Ratzel's vocabulary was adopted by Nazi geopoliticians, not by the League of Nations."}, {"text": "Karl Haushofer and the German school of Geopolitik stripped Ratzel's framework of scholarly caution, married it to racial ideology, and used it to justify Nazi territorial expansion eastward.", "isCorrect": true, "rationale": "The text states that 'Karl Haushofer and the German school of Geopolitik stripped the organic-state framework of its scholarly caution and married it to racial ideology, transforming Lebensraum from a descriptive category into a justification for eastward conquest.' Nazi propaganda explicitly cited Ratzel's vocabulary."}, {"text": "Ratzel's organic state theory was used by the Soviet Union to justify the annexation of Eastern European states as natural extensions of the Russian organism.", "isCorrect": false, "rationale": "The text attributes the misuse of Ratzel's ideas to Karl Haushofer and the Nazi Geopolitik school, not to Soviet ideology. Soviet expansionism was justified through different ideological frameworks (communist internationalism, security buffer logic)."}, {"text": "Ratzel's framework was used by colonial powers at the Berlin Conference to establish the doctrine of effective occupation as the legal basis for claiming African territory.", "isCorrect": false, "rationale": "The Berlin Conference predates Ratzel's Politische Geographie (1897) and used its own doctrine of effective occupation. The text does not connect Ratzel's ideas to the Berlin Conference legal framework."}], "id": "q06"}, {"question": "The Senkaku/Diaoyu Islands in the East China Sea are uninhabited outcroppings totaling approximately 7 square kilometers. Yet they are at the center of a serious geopolitical dispute involving Japan, China, and the United States. Which of the following best explains why such small, uninhabited islands generate such intense international conflict?", "options": [{"text": "The islands are strategically located along ancient maritime Silk Road trade routes that still carry the majority of global commerce.", "isCorrect": false, "rationale": "While the islands are near important sea lanes, the text emphasizes that the primary driver of conflict is the overlapping EEZ claims and the oil, gas, and fisheries resources they control — not historic Silk Road trade."}, {"text": "Sovereignty over the islands determines control of overlapping EEZs in resource-rich waters, making their strategic and economic value far exceed their physical size.", "isCorrect": true, "rationale": "The text directly answers this: 'Whoever controls the islands controls overlapping exclusive economic zones in resource-rich waters that may contain significant oil and gas reserves and that support major commercial fisheries.' The EEZ framework transforms tiny features into strategically significant claims."}, {"text": "The islands contain the only deep-water port in the East China Sea, making them vital for Chinese and Japanese naval strategy.", "isCorrect": false, "rationale": "The text describes the islands as uninhabited outcroppings. They contain no port. The strategic value derives from EEZ rights over surrounding waters, not from any infrastructure on the islands themselves."}, {"text": "The islands are symbolically important because they were the site of the 1895 treaty ending the First Sino-Japanese War.", "isCorrect": false, "rationale": "While China's historical claim references the islands' status before Japan's 1895 acquisition, the text focuses on the EEZ resource dimension as the primary explanation for why the islands matter so intensely, not symbolic treaty history."}], "id": "q07"}, {"question": "The post-World War I Paris Peace Conference (1919) attempted to redraw European boundaries according to the Wilsonian principle of self-determination — drawing borders to reflect the ethnic and linguistic communities on the ground. Which of Hartshorne's boundary types describes what the Paris Peace Conference was attempting to produce?", "options": [{"text": "Antecedent boundaries, because the new borders would precede the formation of the new states.", "isCorrect": false, "rationale": "Antecedent boundaries precede settlement. The Paris Peace Conference was dealing with a region that had been settled for centuries. The attempt was to make the new borders match existing human patterns — the definition of subsequent, not antecedent."}, {"text": "Subsequent boundaries, because the goal was to draw borders that reflected the cultural and linguistic patterns already present in the region.", "isCorrect": true, "rationale": "The text defines subsequent boundaries as drawn after settlement has already occurred and typically attempting to reflect the cultural or linguistic pattern already on the ground. It cites post-WWI European boundary changes — including the Wilsonian self-determination framework — as prime examples."}, {"text": "Superimposed boundaries, because the victorious Allied powers imposed the new borders on the defeated Central Powers without their consent.", "isCorrect": false, "rationale": "Superimposed boundaries are defined by their disregard for existing cultural communities — lines drawn through ethnic homelands by outside powers. The Paris Conference explicitly tried to align borders with ethnic communities, even if imperfectly. The intent was subsequent, not superimposed."}, {"text": "Relict boundaries, because many of the pre-war Ottoman and Austro-Hungarian internal boundaries remained visible in the landscape even after the new states were created.", "isCorrect": false, "rationale": "Relict boundaries are politically defunct boundaries whose traces persist in the landscape. The Paris Conference was creating new, active political boundaries — not acknowledging defunct ones."}], "id": "q08"}, {"question": "A critic of Mackinder's Heartland Theory argues: 'The USSR controlled the Heartland for 70 years yet was outcompeted economically and technologically by maritime-oriented states.' Which broader criticism of geopolitical theory does this observation best support?", "options": [{"text": "That geopolitical theories are irrelevant because all political outcomes are determined by cultural factors rather than geography.", "isCorrect": false, "rationale": "The text does not argue that culture is the sole determinant, nor does it dismiss geography entirely. The critique is more specific: that geographic advantage does not automatically translate into strategic dominance when technology, institutions, and economic development intervene."}, {"text": "That Mackinder's theory was geographic determinism — assuming geography drives strategic outcomes independently of technology, political institutions, or economic development — which the USSR's failure demonstrated was unjustified.", "isCorrect": true, "rationale": "The text explicitly identifies geographic determinism as the primary critique of Mackinder's theory: 'the assumption that geography drives strategic outcomes independently of technology, political institutions, or economic development.' The Soviet Union's control of the Heartland without achieving global dominance is cited as evidence against the theory's core claim."}, {"text": "That UNCLOS maritime law, not land-based geography, is the true determinant of great-power competition.", "isCorrect": false, "rationale": "UNCLOS (1982) governs maritime zones and was not the reason maritime-oriented states outcompeted the USSR. The critique of Mackinder focuses on the inadequacy of geographic determinism, not on international maritime law."}, {"text": "That Spykman's Rimland Theory disproves Mackinder because it correctly predicted the outcome of the Cold War.", "isCorrect": false, "rationale": "While Spykman's theory did inform Cold War containment doctrine, the specific critique in the text is about geographic determinism in Mackinder's framework — not about Spykman disproving Mackinder. The text applies the same determinism critique to both theories."}], "id": "q09"}, {"question": "The India–Pakistan border at the Wagah-Attari checkpost is the site of a nightly flag-lowering ceremony performed by soldiers from both nations in an elaborate, synchronized ritual. The border was drawn in 1947 during Partition, splitting Muslim-majority and Hindu-majority populations. Which combination of boundary characteristics does this case best illustrate?", "options": [{"text": "An antecedent boundary that has become relict, because it was drawn before the modern populations arrived and is no longer militarized.", "isCorrect": false, "rationale": "The 1947 Partition border was drawn among an already-settled, diverse population — not before settlement. It also remains an active, heavily monitored international boundary, not a relict. Both descriptors are incorrect."}, {"text": "A superimposed boundary that functions as a relict, because it was imposed by British colonial authorities and is no longer enforced.", "isCorrect": false, "rationale": "While the border was drawn during British colonial rule, the text describes it as a subsequent boundary — drawn along ethnic and religious lines. It also remains a functioning, militarized border, not a relict."}, {"text": "A subsequent boundary that simultaneously functions as a site of nationalist rivalry, performative ritual, and (occasionally) tourism.", "isCorrect": true, "rationale": "The text explicitly describes the Wagah-Attari border as 'a subsequent border (drawn in 1947 along ethnic and religious lines during Partition) that is simultaneously a site of rivalry, ritual, and, on some occasions, tourism' — directly matching this answer option."}, {"text": "A relict boundary that retains cultural significance, because the Partition-era communities it once separated have since been fully integrated.", "isCorrect": false, "rationale": "The India–Pakistan border is one of the most closely monitored active international boundaries in the world. India and Pakistan remain separate, often hostile states. The border has not become relict — it is politically, militarily, and culturally very much alive."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
