<body>
<div class="quiz-container">

        <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Culture and the Physical Landscape</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Carl Sauer's 1925 essay 'The Morphology of Landscape' was written as a direct reaction against which prevailing intellectual position in geography?", "options": [{"text": "Possibilism, which held that human agency was the only force shaping landscapes.", "isCorrect": false, "rationale": "Possibilism was Sauer's ally, not his opponent. He was arguing against environmental determinism, not for it."}, {"text": "Environmental determinism, which claimed that physical environment shapes or determines human behavior.", "isCorrect": true, "rationale": "Sauer explicitly reacted against the doctrine that climate and terrain determine human outcomes, associated with figures like Ellsworth Huntington and Ellen Churchill Semple."}, {"text": "Stimulus diffusion theory, which argued cultural traits always change when they spread.", "isCorrect": false, "rationale": "Stimulus diffusion is a concept within cultural diffusion theory, not a school of thought Sauer was arguing against."}, {"text": "Placelessness theory, which argued popular culture erodes geographic distinctiveness.", "isCorrect": false, "rationale": "Placelessness was introduced by Edward Relph in 1976, decades after Sauer's 1925 essay."}], "id": "q01"}, {"question": "According to Sauer's model, which formula best captures the relationship between culture, environment, and landscape?", "options": [{"text": "Natural landscape + time = cultural landscape (regardless of technology or values).", "isCorrect": false, "rationale": "Time alone is insufficient; Sauer stressed that a culture group's tools, values, and economic needs are the active agents — without human agency, the physical landscape simply remains natural."}, {"text": "Culture (agent) acting on a natural landscape (medium) over time produces a cultural landscape (result).", "isCorrect": true, "rationale": "This is Sauer's own definition: 'Culture is the agent, the natural area the medium, the cultural landscape the result.' Culture drives the transformation; the environment is the raw material."}, {"text": "Climate (agent) acting on human societies (medium) produces a cultural landscape (result).", "isCorrect": false, "rationale": "This describes environmental determinism — the view Sauer was explicitly arguing against, which gives priority to physical causes rather than human agency."}, {"text": "Popular culture (agent) acting on folk culture (medium) over time produces a standardized landscape (result).", "isCorrect": false, "rationale": "While popular culture does produce landscape uniformity, this is not Sauer's foundational formula, which deals with the nature/culture relationship, not folk vs. popular culture."}], "id": "q02"}, {"question": "A geographer studying the American South notices antebellum plantation houses standing next to sharecropper cabins, which are surrounded by post–Civil War railroad towns that grew around mid-twentieth-century highway interchanges. This landscape best illustrates which concept?", "options": [{"text": "Placelessness, because the elements look similar to landscapes elsewhere in the country.", "isCorrect": false, "rationale": "Placelessness describes the uniformity produced by popular culture. The American South's landscape described here is highly specific, layered, and locally distinctive — the opposite of placelessness."}, {"text": "Relocation diffusion, because each era's people carried their cultural practices from elsewhere.", "isCorrect": false, "rationale": "Relocation diffusion explains the movement of culture with migrants, not the layering of successive occupances on the same territory."}, {"text": "The cultural landscape as palimpsest — successive occupances layering traces upon one another.", "isCorrect": true, "rationale": "Sauer emphasized the cumulative, layered quality of real landscapes. Each era inscribes itself without fully erasing earlier features, producing a palimpsest — exactly what this description shows across Civil War, Reconstruction, and highway-era traces."}, {"text": "Contagious diffusion, because cultural practices spread outward in all directions from a single hearth.", "isCorrect": false, "rationale": "Contagious diffusion describes the outward spatial spread of a cultural trait from its origin point, not the vertical layering of different historical periods on a single place."}], "id": "q03"}, {"question": "Pizza originated as a Neapolitan street food in southern Italy. When Italian immigrants brought it to the United States in the late nineteenth century, it took root in Italian-American urban neighborhoods in New York and Chicago. This scenario best exemplifies which type of diffusion?", "options": [{"text": "Hierarchical diffusion, because the practice moved through a ranked network of cities.", "isCorrect": false, "rationale": "Hierarchical diffusion moves top-down through a prestige or size hierarchy — from elites or large cities outward. Pizza's arrival via immigrant communities reflects population movement, not elite-to-mass filtering."}, {"text": "Stimulus diffusion, because the pizza was adapted to American tastes and took a new form.", "isCorrect": false, "rationale": "Stimulus diffusion does involve adaptation, but the defining feature here is that the culture carriers (immigrants) physically moved and transplanted what they knew from home — the mechanism is migration, not adoption-with-adaptation by a receiving culture that never contacted the source population."}, {"text": "Relocation diffusion, because migrating people carried the cultural practice with them.", "isCorrect": true, "rationale": "Relocation diffusion occurs when people migrate and physically carry their culture with them. Italian immigrants transported their culinary tradition to new neighborhoods, creating faithful transplants of a home practice."}, {"text": "Contagious diffusion, because the practice spread outward in all directions through direct contact.", "isCorrect": false, "rationale": "Contagious diffusion spreads through direct contact across a continuous population without requiring migration of the origin group. Pizza's spread to the US required the physical movement of Italian immigrants, making relocation diffusion the correct type."}], "id": "q04"}, {"question": "Buddhism spread from India into China, where it incorporated local ancestor-veneration practices, adapted to Chinese aesthetic sensibilities, and developed the bodhisattva concept resonant with Confucian ethics. This is the best example of which diffusion type?", "options": [{"text": "Relocation diffusion, because Indian monks physically migrated to China.", "isCorrect": false, "rationale": "While monks did travel, the key feature of this scenario is that the receiving culture adapted the religion into a distinctly new form rather than merely transplanting it. Migration alone would produce a faithful copy, not a creative hybrid."}, {"text": "Stimulus diffusion, because the underlying idea spread but was transformed into a new form in the receiving culture.", "isCorrect": true, "rationale": "Stimulus diffusion occurs when the hearth idea spreads but takes a distinctly new form adapted to local conditions. Chinese Mahayana Buddhism is the canonical example: the doctrine diffused, but Chinese cultural values shaped a recognizably different expression."}, {"text": "Hierarchical diffusion, because Buddhism spread from the Buddha (elite) downward to common people.", "isCorrect": false, "rationale": "Hierarchical diffusion moves through a ranked network of places or social strata. The China case does not primarily illustrate a top-down rank structure; it shows cross-cultural transformation as the religion crossed a cultural boundary."}, {"text": "Contagious diffusion, because Buddhism spread through direct person-to-person contact across Eurasia.", "isCorrect": false, "rationale": "Contagious diffusion spreads uniformly in all directions without transformation. The defining feature here — that Buddhism was creatively remade in China — marks this as stimulus diffusion, not contagious diffusion."}], "id": "q05"}, {"question": "High fashion originates in Paris, Milan, London, and New York, then filters through secondary cities and eventually reaches mass-market retailers. This pattern describes which diffusion mechanism?", "options": [{"text": "Contagious diffusion, because the fashion spread through direct contact throughout a connected population.", "isCorrect": false, "rationale": "Contagious diffusion spreads outward equally in all directions from the hearth. Fashion does not spread uniformly; it moves through a prestige hierarchy of cities, which is the defining feature of hierarchical diffusion."}, {"text": "Relocation diffusion, because fashion designers physically move between cities.", "isCorrect": false, "rationale": "Relocation diffusion requires the cultural trait to move with migrating people. Fashion trends spread through communication and adoption by ranked places, not primarily through the physical migration of designers."}, {"text": "Hierarchical diffusion, because the practice moves through a ranked network from elite centers to smaller markets.", "isCorrect": true, "rationale": "Hierarchical diffusion moves from elites or high-status places downward through a prestige or size hierarchy. Fashion's path from Paris/Milan to secondary cities to mass-market is the textbook example."}, {"text": "Stimulus diffusion, because mass-market fashion adapts high-fashion designs into new forms.", "isCorrect": false, "rationale": "Stimulus diffusion emphasizes the creative transformation of a concept in a new cultural setting. While mass-market fashion does simplify high-fashion designs, the primary mechanism here is the hierarchical rank through which the trend travels, not cross-cultural transformation."}], "id": "q06"}, {"question": "Edward Relph introduced the concept of 'placelessness' to describe a landscape condition. Which scenario best illustrates placelessness as Relph defined it?", "options": [{"text": "A New England town whose skyline is defined by colonial-era church spires built by local Puritan communities.", "isCorrect": false, "rationale": "This landscape reflects locally specific cultural and historical choices — it is geographically distinctive and tied to a particular culture group over time, the opposite of placelessness."}, {"text": "A Philippine Cordillera hillside covered in rice terraces carved by the Ifugao people over two thousand years.", "isCorrect": false, "rationale": "The Ifugao terraces are a classic example of folk culture producing a distinctive, locally adapted landscape — the opposite of the standardized uniformity Relph associated with placelessness."}, {"text": "A highway corridor in Ohio with the same gas stations, fast-food outlets, and big-box retail as a corridor in Texas.", "isCorrect": true, "rationale": "This is the example the text uses verbatim to illustrate Relph's placelessness: popular culture's demand for efficient distribution produces standardized landscapes that drain places of their geographic particularity."}, {"text": "A Mexican-heritage neighborhood in San Antonio with Catholic church architecture reflecting immigrant traditions.", "isCorrect": false, "rationale": "This landscape reflects a culturally specific identity embedded in a particular place through relocation diffusion — it is geographically distinctive and locally meaningful, not placeless."}], "id": "q07"}, {"question": "Ellsworth Huntington argued in 'Civilization and Climate' (1915) that temperate climates produce vigorous, creative peoples while tropical climates produce less-developed societies. Which of the following is the strongest intellectual critique of this framework?", "options": [{"text": "Huntington failed to distinguish between folk culture and popular culture in his analysis.", "isCorrect": false, "rationale": "The folk/popular culture distinction is a different analytical framework unrelated to the main logical flaws in environmental determinism."}, {"text": "It cannot explain why the same climatic zone produced vastly different outcomes in different eras, and it ignores technology, trade, and historical contingency.", "isCorrect": true, "rationale": "The text identifies this as the framework's core logical problem: the Mediterranean basin was the center of classical civilization yet is not the wealthiest region today — same climate, radically different outcomes. This exposes environmental determinism's inability to account for change over time."}, {"text": "His framework was based on possibilist assumptions that overstated the role of human agency.", "isCorrect": false, "rationale": "Huntington's framework was the opposite of possibilist — it attributed human outcomes to physical environment, not human agency. Possibilism was proposed by Vidal de la Blache as the alternative to Huntington."}, {"text": "Huntington relied on contagious diffusion models that did not account for relocation diffusion.", "isCorrect": false, "rationale": "Diffusion models are not part of Huntington's argument or its critique. His theory concerns the environmental causes of civilizational achievement, not the pathways by which cultural traits spread."}], "id": "q08"}, {"question": "A student reads that Jared Diamond's 'Guns, Germs, and Steel' (1997) has been called 'neo-determinism' by critics. Which of the following best explains why this label is applied to Diamond's argument while distinguishing it from Huntington's earlier environmental determinism?", "options": [{"text": "Diamond argues that racial characteristics explain why Eurasian peoples developed superior technology, while Huntington emphasized climate.", "isCorrect": false, "rationale": "This reverses the relationship: it is Huntington who made arguments entangled with racial hierarchies. Diamond explicitly avoided racial essentialism and instead emphasized biogeographic factors like the availability of domesticable plants and animals."}, {"text": "Diamond grounds historical outcomes in biogeographic variables (plant/animal domestication, Eurasian east-west axis) rather than racial traits, but still privileges physical-geographic explanation over cultural agency.", "isCorrect": true, "rationale": "The text describes this distinction precisely: Diamond avoids Huntington's racial essentialism and emphasizes biogeographic rather than purely climatic factors, but critics argue he still naturalizes global inequality by treating it as an environmental outcome rather than a product of human choices."}, {"text": "Diamond's framework is purely possibilist because he shows that Eurasians chose to exploit their geographic advantages.", "isCorrect": false, "rationale": "A possibilist framework emphasizes human choice among possibilities. Diamond's argument grounds historical outcomes in biogeographic structure, which critics see as still deterministic despite avoiding racial language."}, {"text": "Diamond and Huntington hold identical views; the 'neo' prefix simply indicates Diamond's more recent publication date.", "isCorrect": false, "rationale": "The text explicitly distinguishes them: Diamond avoids Huntington's racial essentialism and uses biogeographic rather than climatic variables. The 'neo' prefix signals a modified, updated form of deterministic reasoning, not a mere chronological distinction."}], "id": "q09"}, {"question": "A geography teacher presents two communities: (A) an Amish farming community in Pennsylvania with building styles and practices that evolved over generations in response to local ecology, and (B) a suburban development in Arizona featuring the same franchise restaurants and chain retail stores found across the United States. Which pairing of concepts correctly describes each community?", "options": [{"text": "Community A illustrates popular culture; Community B illustrates folk culture.", "isCorrect": false, "rationale": "The definitions are reversed. The Amish community's locally distinctive, slow-changing, place-specific practices define folk culture, while the uniform suburban commercial landscape defines popular culture."}, {"text": "Community A illustrates folk culture; Community B illustrates placelessness produced by popular culture.", "isCorrect": true, "rationale": "The Amish community exhibits all defining features of folk culture: small, homogeneous, rural, place-specific practices evolved in relative isolation. The uniform suburban commercial landscape matches Relph's definition of placelessness — geographic distinctiveness eroded by popular culture's demand for standardized distribution."}, {"text": "Both communities illustrate stimulus diffusion, because each adapted cultural traits to local conditions.", "isCorrect": false, "rationale": "Stimulus diffusion involves the creative adaptation of a hearth idea in a new cultural context. The Amish community illustrates folk culture, and the suburban landscape illustrates popular culture's standardization — neither scenario centers on the process of cross-cultural diffusion with adaptation."}, {"text": "Community A illustrates environmental determinism; Community B illustrates possibilism.", "isCorrect": false, "rationale": "Environmental determinism and possibilism are frameworks for explaining the environment-culture relationship at a theoretical level, not labels for describing the character of specific cultural communities."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
