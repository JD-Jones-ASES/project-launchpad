<script>
var QUESTIONS = [{"question": "Modern archaeological and genomic evidence indicates that the First Agricultural Revolution produced at least six independent hearths. Which of the following best explains why domestication did NOT originate in the great alluvial floodplains of the Nile or Tigris rivers, according to Carl Sauer's seedbed hypothesis?", "options": [{"text": "The floodplains lacked adequate rainfall to support any grain cultivation.", "isCorrect": false, "rationale": "Sauer's argument was not about rainfall scarcity in floodplains but about ecological diversity and predictability. Floodplains received seasonal flooding—the issue was unpredictability and ecological narrowness, not aridity."}, {"text": "Floodplain environments were too ecologically uniform and unpredictable to permit the patient, multigenerational observation that domestication required.", "isCorrect": true, "rationale": "Sauer argued that domestication required ecological diversity and material security, not stress. Floodplains, despite their eventual productivity, were too prone to catastrophic flooding and too ecologically narrow to sustain the long-term, low-pressure tinkering that domestication demanded."}, {"text": "Hunter-gatherer bands avoided floodplains because they were too densely populated by other communities.", "isCorrect": false, "rationale": "Sauer's seedbed hypothesis focuses on ecological conditions and material security, not on avoiding rival populations. The floodplain argument is about environmental suitability for domestication, not social competition."}, {"text": "Floodplain soils were too saline for early crop cultivation techniques.", "isCorrect": false, "rationale": "Soil salinity is a consequence of irrigation agriculture (discussed in Section 5.4), not a precondition that prevented initial domestication. Sauer's critique of floodplains centered on ecological unpredictability, not soil chemistry."}]}, {"question": "A student is reviewing skeletal evidence from early agricultural sites and discovers that farmers had shorter statures, higher rates of anemia, and more dental cavities than their hunter-gatherer contemporaries. Which of the following best reconciles this evidence with the eventual triumph of farming?", "options": [{"text": "The skeletal evidence is unreliable because early farmers were exposed to more sunlight, which distorted bone density measurements.", "isCorrect": false, "rationale": "The text accepts the skeletal evidence as accurate and does not question its validity. The reconciliation lies in understanding why farming prevailed despite individual health costs."}, {"text": "Agricultural communities prevailed because farming produced surplus, enabling far higher population densities and the support of non-farming specialists.", "isCorrect": true, "rationale": "Agriculture succeeded not because it improved individual health but because it generated surplus. Surplus allowed population densities orders of magnitude higher than foraging, support for artisans, soldiers, and administrators, and the storage of food against lean years—advantages that outweighed individual health costs at the community scale."}, {"text": "Farmers developed immunity to zoonotic diseases within a few generations, eliminating the health disadvantage.", "isCorrect": false, "rationale": "While some disease immunity developed over generations, the text does not use immunity as the explanation for why farming prevailed. The key advantage was surplus and population density, not disease immunity."}, {"text": "Hunter-gatherer populations declined because they lacked the political organization to defend territories against farmers.", "isCorrect": false, "rationale": "The text explains farming's success through the advantages of surplus—supporting specialists, building surpluses, enabling urbanization—not primarily through military superiority over foragers."}]}, {"question": "The Mesoamerican 'three sisters' intercropping system combined maize, beans, and squash. Which of the following correctly identifies the ecological role each crop played in the system?", "options": [{"text": "Maize fixed nitrogen, beans provided climbing support, and squash retained soil moisture.", "isCorrect": false, "rationale": "The roles are reversed: it is beans (legumes) that fix atmospheric nitrogen, not maize. Maize provides the climbing structure, and squash retains moisture and suppresses weeds."}, {"text": "Maize provided structural support, beans fixed atmospheric nitrogen, and squash's broad leaves retained moisture and suppressed weeds.", "isCorrect": true, "rationale": "This correctly matches the source description: the corn stalk gave beans a climbing structure; beans (as legumes) fixed atmospheric nitrogen to replenish the soil; and squash's broad leaves retained moisture and suppressed weeds—making the system ecologically efficient enough to support dense urban populations."}, {"text": "Squash fixed nitrogen, maize retained moisture, and beans provided structural support for squash vines.", "isCorrect": false, "rationale": "Squash is not a nitrogen-fixer; only legumes like beans perform biological nitrogen fixation. This answer misassigns all three ecological roles."}, {"text": "All three crops contributed equally to nitrogen fixation, making the system self-sustaining without crop rotation.", "isCorrect": false, "rationale": "Only leguminous plants like beans fix nitrogen biologically. Maize and squash do not fix nitrogen; their roles are structural support and ground cover, respectively."}]}, {"question": "A researcher studying the Second Agricultural Revolution in Britain argues that the enclosure movement was 'primarily a story of agricultural modernization.' A critic responds that this framing ignores a crucial social dimension. Which evidence would best support the critic's position?", "options": [{"text": "The enclosure movement increased yields by enabling consolidated, managed farming across previously fragmented strips.", "isCorrect": false, "rationale": "This evidence supports the 'agricultural modernization' framing, not the critic's position. The critic is arguing for attention to the social costs, not the productivity gains."}, {"text": "The enclosure of commons dispossessed rural laborers of subsistence rights, forcing migration to industrial cities and creating the factory labor supply.", "isCorrect": true, "rationale": "The text explicitly states enclosure eliminated the subsistence safety net that had allowed the rural poor to survive outside the wage-labor system. Dispossessed of common grazing rights, rural families migrated to industrial towns and accepted factory wages—connecting agricultural modernization directly to the social violence of early industrial capitalism."}, {"text": "Parliament passed enclosure acts too slowly, delaying agricultural modernization by several decades.", "isCorrect": false, "rationale": "The speed of Parliamentary enclosure acts is not the critic's point. The critic challenges the framing that emphasizes productivity while minimizing dispossession—a social, not a legislative, argument."}, {"text": "Mechanized reapers like McCormick's 1834 patent replaced six laborers per machine, reducing agricultural employment.", "isCorrect": false, "rationale": "Mechanization is a separate process from the enclosure movement. The critic's point specifically concerns the dispossession of common-land rights through enclosure, not displacement by machinery."}]}, {"question": "Norman Borlaug's high-yield, semi-dwarf wheat varieties differed from traditional tall-stemmed varieties in a way that was essential to the Green Revolution's success. What was the key mechanical advantage of the semi-dwarf design?", "options": [{"text": "Semi-dwarf varieties required far less irrigation, making them viable in dryland regions where traditional wheat failed.", "isCorrect": false, "rationale": "The text states the opposite: HYVs generally require substantial irrigation to realize their yield potential. The advantage of the semi-dwarf design was not water efficiency but the ability to absorb heavy nitrogen fertilization without lodging."}, {"text": "Semi-dwarf varieties had shorter, stiffer stems that did not collapse under heavy nitrogen fertilization, converting fertilizer directly into grain.", "isCorrect": true, "rationale": "Traditional tall-stemmed wheat 'lodged' (fell over) when fertilized heavily, actually reducing yields. Borlaug's semi-dwarf varieties had shorter, stiffer stems that could support the larger grain heads produced by heavy nitrogen application, turning fertilizer inputs directly into harvestable grain."}, {"text": "Semi-dwarf varieties were naturally disease-resistant without requiring pesticide inputs, reducing production costs.", "isCorrect": false, "rationale": "While Borlaug did develop disease-resistant varieties, the specific mechanical advantage described in the text is the lodging resistance—the short, stiff stems that allowed the plant to use heavy nitrogen fertilization productively rather than falling over."}, {"text": "Semi-dwarf varieties matured faster, allowing double-cropping in temperate climates where traditional varieties only produced one harvest.", "isCorrect": false, "rationale": "Early maturity is mentioned in the HYV definition as enabling double- or triple-cropping in tropical climates, but the specific mechanical advantage of the semi-dwarf design against which traditional varieties failed was lodging resistance under heavy fertilization."}]}, {"question": "A journalist in 1970 writes: 'The Green Revolution has solved the problem of hunger in Asia.' A geographer reading this headline identifies two important flaws in this claim. Which response best captures both flaws?", "options": [{"text": "The claim is wrong because HYV seeds did not actually increase grain yields in South Asia.", "isCorrect": false, "rationale": "Yield increases were real and dramatic. India's rice production tripled between 1970 and 2000, and wheat self-sufficiency was achieved in India and Pakistan within a decade of Borlaug's varieties being introduced. The flaws are about distribution and long-term costs, not whether yields increased."}, {"text": "The claim overstates success because the technology package favored wealthier farmers, deepening inequality, and created long-term ecological costs including aquifer depletion and biodiversity loss.", "isCorrect": true, "rationale": "The text identifies two major limitations: (1) the Green Revolution's benefits were unevenly distributed—capital requirements for HYV seeds, fertilizers, irrigation, and pesticides favored larger farmers while marginalizing small and tenant farmers; and (2) ecological consequences including aquifer depletion, genetic erosion, pesticide contamination, and nitrogen runoff created long-term vulnerabilities."}, {"text": "The claim is premature because the revolution's varieties were still in development and had not yet been widely distributed by 1970.", "isCorrect": false, "rationale": "By 1970 the revolution was well underway: Borlaug won the Nobel Peace Prize in 1970, IRRI's IR8 miracle rice was released in 1966, and India and Pakistan had already made major gains. The flaws are about equity and ecology, not deployment timing."}, {"text": "The claim is wrong because famines, as Amartya Sen argued, are caused by overproduction rather than distribution failures.", "isCorrect": false, "rationale": "Sen argued the opposite: famines are primarily political phenomena caused by failures in distribution and purchasing power, not overproduction. And the Green Revolution did increase aggregate production—its limitations were distributional and ecological, not that it somehow caused overproduction."}]}, {"question": "Which of the following best explains why the Fertile Crescent served as the most intensively studied agricultural hearth for the First Agricultural Revolution?", "options": [{"text": "The Fertile Crescent was the only region where both plants and animals were domesticated simultaneously.", "isCorrect": false, "rationale": "Other hearths also domesticated both plants and animals simultaneously—for example, the Yangtze River valley domesticated rice and pigs concurrently. The Fertile Crescent was not unique in this respect."}, {"text": "The Fertile Crescent's Mediterranean climate produced annual grasses with storable seeds, and it domesticated multiple foundational crops and livestock simultaneously.", "isCorrect": true, "rationale": "The Fertile Crescent's Mediterranean climate—winter rains and summer droughts—produced annual grasses whose seeds could be harvested, dried, and stored for months. By around 9,500 BCE, communities were cultivating wheat and barley, herding sheep and goats, and later cattle and pigs, making it an exceptionally rich domestication complex that provided the ecological basis for surplus storage and urbanization."}, {"text": "It is the only hearth confirmed through genomic analysis; other hearths lack biological evidence.", "isCorrect": false, "rationale": "Modern genomic analysis has confirmed multiple independent hearths. The text states that at least six have been identified using convergent evidence from archaeobotany, zooarchaeology, and population genomics—not just the Fertile Crescent."}, {"text": "The Fertile Crescent diffused its crops and animals to all other hearths, making it the single origin of global agriculture.", "isCorrect": false, "rationale": "The text explicitly states that domestication was not a single invention from a single source. At least six independent hearths are documented; the Fertile Crescent did not diffuse its practices to Mesoamerica, the Andes, or New Guinea."}]}, {"question": "The Second Agricultural Revolution in Britain between 1750 and 1850 is described as causally intertwined with the Industrial Revolution. Which of the following correctly identifies the mechanism connecting the two?", "options": [{"text": "Industrial factories supplied new machinery to farms, which then used that machinery to increase yields and hire more workers.", "isCorrect": false, "rationale": "The causal direction described here is reversed. Agricultural mechanization released labor from farms; it did not create more farm employment. The mechanism ran from farm to factory, not factory to farm."}, {"text": "Agricultural mechanization reduced farm labor requirements, releasing workers who—after enclosure stripped their subsistence rights—migrated to industrial cities as the factory labor supply.", "isCorrect": true, "rationale": "The text describes a two-part mechanism: (1) agricultural mechanization reduced the labor required per unit of food, releasing workers from the land; and (2) the enclosure of commons eliminated subsistence safety nets, forcing dispossessed rural families to migrate to industrial towns and accept factory wages. These two processes together created the urban labor supply that industrialization required."}, {"text": "The Industrial Revolution's new iron-casting technology was applied to farm tools, which only marginally improved yields without any social dislocation.", "isCorrect": false, "rationale": "While improved iron casting did contribute to better farm implements, the social dislocation was massive and is central to the text's analysis. The enclosure movement dispossessed hundreds of thousands of rural laborers."}, {"text": "Urban factory workers demanded more food, creating price incentives that motivated farmers to innovate and increase production.", "isCorrect": false, "rationale": "While demand effects existed, the text's causal argument runs primarily from agricultural changes to urban labor supply—not from urban demand back to agricultural innovation. The text emphasizes push factors (mechanization + enclosure) over pull factors (demand)."}]}, {"question": "Which of the following pairs of crops and their domestication hearths is correctly matched, based on the text?", "options": [{"text": "Potato — Mesoamerica; Sorghum — Fertile Crescent", "isCorrect": false, "rationale": "Potatoes were domesticated in the Andean highlands of South America (Solanum tuberosum, from frost-resistant varieties bred above 3,000 meters), not Mesoamerica. Sorghum was domesticated in the Chad basin or Ethiopian highlands of sub-Saharan Africa, not the Fertile Crescent."}, {"text": "Rice — Yangtze River valley; Maize — Mesoamerica", "isCorrect": true, "rationale": "The text correctly identifies Oryza sativa (rice) as domesticated along the Yangtze River in southern China by around 7,000 BCE, and Zea mays (maize), derived from the wild grass teosinte, as domesticated in the Balsas River valley of modern Guerrero, Mexico, by at least 7,000–6,500 BCE."}, {"text": "Taro — sub-Saharan Africa; Millet — Fertile Crescent", "isCorrect": false, "rationale": "Taro was domesticated in New Guinea, not sub-Saharan Africa. Millet (foxtail and broomcorn) was domesticated along the Yellow River in northern China, not the Fertile Crescent (which produced wheat and barley)."}, {"text": "Wheat — East Asia; Llama — Mesoamerica", "isCorrect": false, "rationale": "Wheat (emmer and einkorn) was domesticated in the Fertile Crescent, not East Asia. Llamas and alpacas were domesticated in the Andean highlands of South America—the only large domesticated pack animals native to the Americas—not in Mesoamerica."}]}, {"question": "Scenario: A student reads a passage that states the Green Revolution 'saved one billion human lives' while simultaneously causing 'aquifer depletion, soil compaction, and biodiversity loss.' The student claims these two statements are contradictory and cannot both be true. How should a geographer respond to this claim?", "options": [{"text": "The geographer should agree, because a technology that saves lives cannot simultaneously cause environmental harm.", "isCorrect": false, "rationale": "This reflects a logical error. Real-world interventions regularly produce benefits at one scale while creating costs at another. The Green Revolution's case is precisely cited in the text as an example of a spatial problem being 'solved' at one scale while generating new problems at other scales."}, {"text": "The statements are compatible: the Green Revolution's benefits (aggregate caloric production, price reductions) operated at different geographic and temporal scales than its ecological costs (local aquifer depletion, regional biodiversity loss).", "isCorrect": true, "rationale": "The text's skill connection explicitly addresses this tension: at the global scale, the Green Revolution reduced aggregate hunger; at the regional scale it transformed agricultural landscapes; at the local scale it deepened inequality and degraded specific aquifers and ecosystems. Both statements can be true simultaneously because they describe effects at different scales and over different time horizons."}, {"text": "The statements reflect a conspiracy: the Green Revolution was designed to benefit corporations while intentionally harming the environment.", "isCorrect": false, "rationale": "The text presents the Green Revolution as a genuine scientific effort to address famine, with unintended and sometimes overlooked ecological consequences—not as a designed strategy to harm the environment. This answer mischaracterizes the nature of the trade-offs."}, {"text": "The ecological costs were short-term and have since been fully reversed through better farming practices.", "isCorrect": false, "rationale": "The text describes ongoing and unresolved ecological consequences: the Punjab aquifer continues to deplete at 0.33 meters per year; genetic diversity in major food crops has not been restored; and nitrogen runoff dead zones have grown. The text explicitly describes these as 'ecological stresses that remain unresolved today.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
