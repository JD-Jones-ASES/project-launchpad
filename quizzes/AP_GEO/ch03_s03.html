<script>
var QUESTIONS = [{"question": "Christianity is practiced on every inhabited continent and actively seeks converts through missionary activity worldwide. Shinto is practiced overwhelmingly in Japan and does not pursue converts outside of Japanese cultural communities. Which classification pair correctly describes these two religions and explains the spatial difference between them?", "options": [{"text": "Both are universalizing religions; the difference is explained by the relative age of each tradition.", "isCorrect": false, "rationale": "Shinto is classified as an ethnic religion, not a universalizing religion. The distinction is based on whether the religion actively seeks converts and claims a universal message — age is not the determining variable."}, {"text": "Christianity is a universalizing religion (seeks all converts, spreads globally); Shinto is an ethnic religion (membership tied to Japanese cultural descent, producing a concentrated spatial distribution).", "isCorrect": true, "rationale": "Universalizing religions actively seek converts and claim their message is for all humanity, producing global distributions. Ethnic religions define membership through descent or cultural belonging, producing highly concentrated distributions — exactly the Shinto pattern."}, {"text": "Christianity is an ethnic religion tied to European descent; Shinto is universalizing because it accepts any sincere believer.", "isCorrect": false, "rationale": "Christianity is the canonical example of a universalizing religion — it has spread to the Philippines, Nigeria, Brazil, and elsewhere through missionary diffusion across all ethnicities. Shinto is classified as ethnic because membership is tied to Japanese cultural identity."}, {"text": "Both are ethnic religions; Christianity's global spread reflects population migration rather than missionary conversion.", "isCorrect": false, "rationale": "While some Christian spread occurred through migration (relocation diffusion), Christianity is fundamentally defined as a universalizing religion by its active missionary tradition and its claim that its message is appropriate for all humanity regardless of ancestry."}]}, {"question": "Buddhism was founded in present-day Nepal in the sixth century BCE and spread widely across Asia. However, in most of South Asia — the religion's birthplace — it was later largely displaced by a resurgent Hinduism. Today, Buddhism is concentrated primarily in East and Southeast Asia, Tibet, and Sri Lanka. Which combination of diffusion processes best explains this pattern?", "options": [{"text": "Contagious diffusion from Nepal outward, followed by hierarchical diffusion through urban Buddhist monasteries in East Asia.", "isCorrect": false, "rationale": "While both processes may have played partial roles, this answer ignores the pivotal role of imperial patronage (Ashoka's missionary sponsorship) and trade-route diffusion in the religion's spread, and does not address why Buddhism declined in its South Asian hearth."}, {"text": "Hierarchical diffusion through imperial patronage (Ashoka), followed by trade-route diffusion into Central, East, and Southeast Asia, and then displacement from the South Asian hearth by resurgent Hinduism.", "isCorrect": true, "rationale": "The text traces Buddhism's spread precisely: first through the Mauryan emperor Ashoka's missionary patronage (hierarchical/imperial), then along trade routes into China, Korea, Japan, and Southeast Asia. Later displacement by Hindu resurgence in South Asia explains why the hearth region lost the faith."}, {"text": "Relocation diffusion only, because monks physically carried the faith from India to every Buddhist country.", "isCorrect": false, "rationale": "While monks did travel, the text emphasizes that Buddhism spread along trade routes and through imperial sponsorship, not only through the physical migration of religious practitioners. Relocation diffusion alone cannot account for the faith's continental-scale reach."}, {"text": "Stimulus diffusion only, because every Buddhist country independently invented a similar religion based on common human spiritual needs.", "isCorrect": false, "rationale": "Stimulus diffusion produces creative adaptations of a hearth idea, not independent inventions of the same religion. Buddhism did undergo stimulus diffusion as it adapted to Chinese, Japanese, and Southeast Asian cultures — but this explains regional variation within the religion, not the establishment of Buddhism itself in each country."}]}, {"question": "A traveler in an unfamiliar city notices that every mosque she passes has its long axis oriented in the same direction, and that direction is consistently toward the southeast. Where is the city most likely located?", "options": [{"text": "In Indonesia, because mosques there face northwest toward Mecca.", "isCorrect": false, "rationale": "A mosque in Indonesia, which is east of Mecca, would orient northwest. If the mosques face southeast, the city is located northwest of Mecca, which places it in Europe — not Southeast Asia."}, {"text": "In Spain or another part of Western Europe, because mosques there must face southeast toward Mecca.", "isCorrect": true, "rationale": "The text explains that mosques orient toward the qibla — the direction of Mecca — for the five daily prayers. A city where mosques face southeast is located to the northwest of Mecca, which corresponds to Western Europe, including Spain. The text uses Madrid as the example: 'a mosque in Madrid faces southeast.'"}, {"text": "In Egypt or North Africa, because mosques there face southeast toward Mecca.", "isCorrect": false, "rationale": "North African cities (Egypt, Morocco, Algeria) are generally south or southwest of Mecca, so their mosques would orient northeast or east, not southeast. A southeast orientation indicates the city is considerably northwest of Mecca."}, {"text": "In Central Asia, because mosques in that region orient southeast to avoid facing Jerusalem.", "isCorrect": false, "rationale": "Mosques orient toward Mecca, not away from Jerusalem. Central Asian cities (Kazakhstan, Uzbekistan) are northeast of Mecca, so their mosques would face southwest, not southeast."}]}, {"question": "The Old City of Jerusalem covers approximately one square kilometer yet contains the Western Wall (holiest accessible Jewish prayer site), the Dome of the Rock and Al-Aqsa Mosque (sacred to Muslims as Al-Haram al-Sharif), and the Church of the Holy Sepulchre (sacred to Christians). This configuration illustrates which geographic concept and explains why the conflict over Jerusalem is especially difficult to resolve?", "options": [{"text": "Placelessness, because the density of religious sites in one area erases their individual meaning.", "isCorrect": false, "rationale": "Placelessness describes the erosion of geographic distinctiveness by popular culture's standardization. The opposite is true in Jerusalem: the sites have deeply specific, concentrated meaning for hundreds of millions of people — the problem is too much place-meaning, not too little."}, {"text": "Contagious diffusion, because religious practices spread outward from Jerusalem to the rest of the world.", "isCorrect": false, "rationale": "While Jerusalem is a hearth for the Abrahamic faiths, contagious diffusion describes a process of cultural spread, not the geographic overlap of mutually exclusive sacred claims in a single small territory."}, {"text": "Tripartite sacred space — the physical overlap of mutually exclusive sacred claims in a single small area, making any political decision about sovereignty carry religious implications for hundreds of millions of people worldwide.", "isCorrect": true, "rationale": "The text uses Jerusalem as the case study for this concept. The physical overlap of Jewish, Muslim, and Christian sacred claims in one square kilometer means no political resolution on sovereignty, access, or construction can avoid affecting the religious interests of three global faiths."}, {"text": "Ethnic enclave formation, because three religious communities have each established a separate neighborhood within the Old City.", "isCorrect": false, "rationale": "Ethnic enclaves are urban neighborhoods defined by a single community's cultural identity. The Jerusalem case is about the overlap of sacred claims in the same physical space, not the formation of separate, bounded neighborhood territories."}]}, {"question": "Islam spread from its hearth in Mecca (Arabia) to Indonesia, which is now the world's most populous Muslim-majority country. Yet Indonesia was never conquered by Arab armies. Which diffusion mechanism primarily explains Islam's spread to Indonesia?", "options": [{"text": "Relocation diffusion, because Arab populations migrated en masse to Indonesia and established Muslim communities.", "isCorrect": false, "rationale": "The text explicitly states that Indonesia's Islamization was 'not military conquest.' Large-scale Arab migration to Indonesia did not occur. The religion arrived through trade networks and Sufi missionaries, not through the physical relocation of Arab populations."}, {"text": "Environmental determinism, because Indonesia's tropical climate made its population receptive to a Middle Eastern religion.", "isCorrect": false, "rationale": "Environmental determinism attributes cultural outcomes to physical geography. The text provides no basis for such a claim, and the concept is thoroughly discredited as an explanatory framework for religious adoption."}, {"text": "Trade-route and Sufi missionary diffusion — Islam spread through maritime commerce and religious teachers without requiring military conquest.", "isCorrect": true, "rationale": "The text states directly: 'Further expansion into sub-Saharan Africa and Southeast Asia occurred through trade networks and Sufi missionary activity. Today, Indonesia is the world's most populous Muslim-majority country, reflecting the faith's reach through maritime trade routes, not military conquest.'"}, {"text": "Hierarchical diffusion from the Arab Caliphate through a ranked network of cities across the Indian Ocean.", "isCorrect": false, "rationale": "While urban commercial centers did play a role in Southeast Asian trade routes, the text identifies trade networks and Sufi missionary activity as the primary mechanisms — emphasizing bottom-up religious persuasion through commerce and personal conversion, not top-down imposition through a ranked political hierarchy."}]}, {"question": "A student examining a photograph of Notre-Dame Cathedral in Paris identifies the pointed arches, flying buttresses, and large rose windows. A second student examining a photograph of a Gothic cathedral in Cologne, Germany, observes the same features. Which geographic concept best explains why both cathedrals share these architectural characteristics?", "options": [{"text": "Placelessness, because both cathedrals look essentially the same, draining each city of its distinctiveness.", "isCorrect": false, "rationale": "Placelessness describes the erosion of local distinctiveness by popular culture's standardization. Gothic cathedrals reflect a shared medieval Christian architectural tradition — their similarity reflects cultural diffusion within a religious tradition, not popular culture's homogenizing effect."}, {"text": "The sacred-space concept — both buildings use height, light, and symbolic geometry to orient worshippers toward heaven, reflecting shared Christian cosmological beliefs.", "isCorrect": true, "rationale": "The text explains that Gothic cathedrals 'use pointed arches and flying buttresses to achieve tremendous height, directing worshippers' eyes upward toward heaven.' The shared architectural vocabulary across both cathedrals reflects the shared cosmological beliefs of Western Christianity and the diffusion of a sacred-building tradition."}, {"text": "Stimulus diffusion, because French architects adapted German Romanesque forms into a distinctly new Gothic style.", "isCorrect": false, "rationale": "While Gothic architecture did develop and diffuse across medieval Europe, the question asks what concept explains the shared features in the finished buildings. The shared cosmological purpose — directing eyes heavenward toward the divine — is the concept the text emphasizes when explaining Gothic architectural choices."}, {"text": "Ethnic religion characteristics, because Christianity's ethnic concentration in Europe explains why both churches look similar.", "isCorrect": false, "rationale": "Christianity is classified as a universalizing religion, not an ethnic religion. Furthermore, the similarity of the buildings reflects shared architectural traditions and cosmological beliefs, not ethnic concentration."}]}, {"question": "The conflict in Northern Ireland (1968–1998) involved Unionists (predominantly Protestant, identifying with British national identity) and Nationalists (predominantly Catholic, identifying with Irish national identity). The physical landscape of Belfast featured 'peace walls,' territorial murals, and flags marking which streets belonged to which community. Which concept does this landscape best illustrate?", "options": [{"text": "Placelessness, because the peace walls made both communities' neighborhoods look identical to each other.", "isCorrect": false, "rationale": "The landscape of Belfast was intensely place-specific — peace walls, murals, and flags encoded strong territorial identities. This is the opposite of placelessness, which describes the erosion of local distinctiveness."}, {"text": "The use of sacred space as the primary driver — because both communities were fighting over control of specific churches.", "isCorrect": false, "rationale": "The text describes Northern Ireland as a case where 'religion served as a marker of ethnic and political identity rather than primarily as a theological difference.' The conflict was about national belonging and political sovereignty, not competing claims to specific sacred sites."}, {"text": "Ethno-religious territorial conflict — religion serving as a marker of ethnic and political identity, producing a visibly segregated built landscape.", "isCorrect": true, "rationale": "The text classifies Northern Ireland as an 'ethno-religious territorial conflict.' The peace walls, murals, and flags are the material cultural landscape of that segregation. Crucially, the text notes religion functioned as an ethnic and political identity marker, not primarily a theological division."}, {"text": "Ethnic enclave formation, because both communities established ethnically homogeneous neighborhoods through voluntary residential clustering.", "isCorrect": false, "rationale": "Ethnic enclaves typically form through voluntary clustering for mutual support. The Belfast landscape of peace walls and territorial markers reflects forced segregation through violence and fear — ethnic cleansing pressures, not voluntary community formation."}]}, {"question": "Hinduism has approximately 1.2 billion adherents, most of whom live in India, Nepal, and diaspora communities in Fiji, Trinidad, and South Africa. Despite its size, it does not actively seek converts from outside Hindu cultural communities. Which characteristic distinguishes it from Christianity and Islam as a spatial phenomenon?", "options": [{"text": "Hinduism is smaller than Christianity and Islam, so it lacks the resources to spread globally.", "isCorrect": false, "rationale": "With 1.2 billion adherents, Hinduism is one of the world's largest religions. The geographic concentration of Hindus is not a function of limited resources but of the religion's classification as ethnic — membership is defined primarily through cultural descent rather than universal missionary outreach."}, {"text": "Hinduism is an ethnic religion whose membership is defined through cultural descent rather than active missionary conversion, producing a highly concentrated spatial distribution.", "isCorrect": true, "rationale": "Hinduism is classified as an ethnic religion — membership is defined by descent, ethnicity, and cultural belonging rather than conversion. This produces the concentrated geographic distribution the text describes, contrasted with the global distributions of Christianity and Islam."}, {"text": "Hinduism is a universalizing religion, but its spread has been blocked by competing religions in other world regions.", "isCorrect": false, "rationale": "Hinduism is classified as an ethnic religion, not a universalizing one. Its geographic concentration is not the result of external barriers to spread but is inherent in how the religion defines membership — through descent, not missionary conversion."}, {"text": "Hinduism has no sacred spaces, which reduces its geographic influence compared to religions with pilgrimage sites.", "isCorrect": false, "rationale": "Hinduism has extensive sacred spaces, pilgrimage sites (Varanasi, Tirupati, Puri), and sacred rivers (the Ganges). The concept of sacred space applies fully to Hinduism. The geographic concentration of Hinduism is explained by its ethnic-religion classification, not by an absence of sacred geography."}]}, {"question": "A scholar of religion applies Mircea Eliade's concept of the 'axis mundi' to analyze two religious sites: the Hindu temple's central tower (shikhara) rising above the garbhagriha, and the Dome of the Rock in Jerusalem. What does the axis mundi concept claim about these structures?", "options": [{"text": "The axis mundi concept claims that both structures are economically valuable because they attract pilgrimage tourism.", "isCorrect": false, "rationale": "Eliade's axis mundi is a concept from the history of religion about cosmological meaning, not economic function. It addresses the religious experience of sacred space as a cosmic center, not the material benefits of pilgrimage."}, {"text": "Both structures mark a cosmic center — a point where the sacred and the profane meet — giving sacred space a qualitatively different character from ordinary space.", "isCorrect": true, "rationale": "The text defines the axis mundi as Eliade's concept: in religious experience, sacred spaces are not uniform. Sacred places are qualitatively different from profane ones, 'oriented toward a cosmic center.' Both the Hindu temple (conceived as a microcosm of Mount Meru) and the Dome of the Rock (site of Muhammad's ascent to heaven) embody this axis mundi function."}, {"text": "Both structures prove that Hinduism and Islam share a common hearth in the ancient Near East.", "isCorrect": false, "rationale": "Hinduism's hearth is the Indian subcontinent; Islam's is the Arabian Peninsula. The axis mundi concept addresses how sacred spaces function cosmologically, not the historical origins or genetic relationships of religious traditions."}, {"text": "The axis mundi concept shows that only universalizing religions can create sacred spaces with cosmological significance.", "isCorrect": false, "rationale": "The axis mundi concept applies to sacred spaces across all religious traditions, including ethnic religions. Hinduism is classified as an ethnic religion, yet its temples are described as embodying the axis mundi concept (the shikhara as microcosm of Mount Meru, the cosmic center)."}]}, {"question": "A geographer comparing the Kashmir conflict to the Northern Ireland conflict argues that 'in neither case is religion the complete explanation for the conflict's persistence.' Based on the text's treatment of both cases, which statement best supports this argument?", "options": [{"text": "Neither conflict involves competing sacred space claims, so religion is entirely irrelevant to both.", "isCorrect": false, "rationale": "Religion is relevant to both conflicts — it shapes identity framing, demographic claims, and political mobilization. The argument is that religion is not the complete explanation, not that it is irrelevant."}, {"text": "Kashmir's conflict is driven by strategic territory, water resources, and nationalist political mobilization as much as by religious identity; Northern Ireland's conflict used religion as an ethnic identity marker more than a theological difference.", "isCorrect": true, "rationale": "The text explicitly states both nuances: Kashmir 'has as much to do with strategic territory, water resources, and nationalist political mobilization as with religion'; in Northern Ireland, 'religion served as a marker of ethnic and political identity rather than primarily as a theological difference.' Both cases show religion as one factor among several."}, {"text": "Both conflicts are entirely explained by colonial-era boundary drawing, making religion merely incidental.", "isCorrect": false, "rationale": "Colonial history is relevant to both (British partition of India; British rule of Ireland), but the text presents religion as a real contributing factor, not a mere incidental overlay. The claim that religion is merely incidental is too strong."}, {"text": "Both conflicts would resolve immediately if the competing religious communities converted to the same faith.", "isCorrect": false, "rationale": "The text's analysis shows that both conflicts involve political sovereignty, territorial control, and ethnic identity that transcend theological difference. In Northern Ireland especially, religion functions as an ethnic marker — changing the theological label would not dissolve the underlying national and political disputes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
