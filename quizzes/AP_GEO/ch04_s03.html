<script>
var QUESTIONS = [{"question": "France governs through a centralized bureaucracy in Paris; its 101 departments are administrative units of the national government, not autonomous sovereignties. Germany's Basic Law (1949) gives 16 Länder distinct competences, including control over education and local policing. Based on this information, which statement correctly classifies these two countries?", "options": [{"text": "Both France and Germany are federal states, because both have sub-national administrative divisions.", "isCorrect": false, "rationale": "Having sub-national divisions does not make a state federal. In France, the departments are administrative units of the central government — they cannot override Paris. Germany's Länder have constitutionally protected competences that the central government cannot unilaterally abolish. Only Germany meets the definition of a federal state."}, {"text": "France is a unitary state and Germany is a federal state, because France's departments exercise only delegated powers while Germany's Länder have constitutionally protected authority.", "isCorrect": true, "rationale": "The text defines a unitary state as one where sub-national units exercise only powers the center delegates to them (France), and a federal state as one where the constitution divides authority between central and sub-national governments and neither can unilaterally abolish the other (Germany's 16 Länder)."}, {"text": "France is a federal state and Germany is a confederation, because Germany's Länder retain sovereign powers their central government cannot override.", "isCorrect": false, "rationale": "Germany is a federal state, not a confederation. In a confederation, sovereign states retain the right to withdraw from or veto the common body. Germany's Länder are not sovereign states — they operate within a constitutional framework that balances national and sub-national authority."}, {"text": "Both France and Germany are unitary states, because both have a single national constitution and a central legislature.", "isCorrect": false, "rationale": "Having a single constitution and central legislature does not make a state unitary. Germany's Basic Law explicitly establishes a federal structure with constitutionally protected Länder powers. France's constitution creates a genuinely centralized system."}]}, {"question": "After the 2020 U.S. Census, Texas gained two House seats while California, New York, and Illinois each lost one. Which process describes this reallocation of congressional seats, and what is its direct cause?", "options": [{"text": "Redistricting caused by electoral map manipulation by the dominant party in each state legislature.", "isCorrect": false, "rationale": "Redistricting redraws district boundaries within states — it determines which areas correspond to each seat. The question describes states gaining and losing seats between states, which is reapportionment. Manipulation of district lines would be gerrymandering, not reapportionment."}, {"text": "Reapportionment caused by differential population growth across states, as measured by the decennial census.", "isCorrect": true, "rationale": "The text defines reapportionment as the redistribution of seats in a legislative body among states following a census, to reflect population change. Texas gaining two seats while slower-growing states lost one is precisely the reapportionment mechanism described, citing the 2020 Census results."}, {"text": "Gerrymandering caused by partisan line-drawing that concentrated Texas voters into fewer districts.", "isCorrect": false, "rationale": "Gerrymandering manipulates district boundaries within a state, not the number of seats allocated to states. Gaining or losing seats between states is reapportionment, not gerrymandering."}, {"text": "Devolution caused by the federal government transferring greater legislative authority to faster-growing states.", "isCorrect": false, "rationale": "Devolution transfers governing authority from central to sub-national governments within a state. The reallocation of congressional seats is a representation mechanism tied to population change, not a transfer of authority."}]}, {"question": "A state legislature draws a congressional map that places all of the most reliably Democratic precincts into a single district, which the Democratic candidate wins with 82% of the vote. The surrounding five districts each have roughly 55% Republican voters. Which gerrymandering technique is being used, and what is the strategic purpose?", "options": [{"text": "Cracking: dispersing Democratic voters across multiple districts to dilute their strength so they form a minority in each.", "isCorrect": false, "rationale": "Cracking disperses opposition voters across many districts. The scenario describes concentration of Democratic voters into one district — the opposite of dispersion. This is the defining feature of packing."}, {"text": "Packing: concentrating Democratic voters into as few districts as possible, wasting their votes in overwhelming margins while the drawing party wins more districts by comfortable margins.", "isCorrect": true, "rationale": "The text defines packing as concentrating the opposing party's voters into as few districts as possible, creating a small number of districts where the opposition wins by enormous margins (here, 82%) while the drawing party wins many more districts by comfortable but not wasteful margins (here, 55%). This matches the scenario exactly."}, {"text": "Reapportionment: redistributing House seats among states based on population changes from the census.", "isCorrect": false, "rationale": "Reapportionment reallocates seats between states after a census. The scenario describes the drawing of district boundaries within a state to manipulate electoral outcomes — that is gerrymandering, not reapportionment."}, {"text": "Redistricting: redrawing district lines to reflect population shifts and ensure the one-person-one-vote principle.", "isCorrect": false, "rationale": "Redistricting is the legitimate process of redrawing district lines to reflect population changes. The scenario describes deliberate manipulation of those lines to engineer partisan outcomes — that is gerrymandering (specifically packing), which can occur during the redistricting process but is not synonymous with it."}]}, {"question": "India's constitution lists 'Union List' powers (exclusive to the central government), 'State List' powers (exclusive to states), and a 'Concurrent List' shared between them. The United States under the Articles of Confederation (1781–1788) allowed each state to retain sovereignty and gave the central body only limited authority. Based on these descriptions, which classification is correct?", "options": [{"text": "India is a confederation and the early United States was a federal republic.", "isCorrect": false, "rationale": "India has a constitution that divides authority between central and state governments — a federal structure. The early U.S. under the Articles was a confederation in which each state retained sovereignty and the central government had only limited, delegated powers. The descriptions are reversed here."}, {"text": "Both India and the early United States are examples of federal republics, because both had constitutions dividing power between national and sub-national governments.", "isCorrect": false, "rationale": "The early U.S. under the Articles of Confederation is specifically classified by the text as a confederation — not a federal republic. The Constitution of 1788 created the federal republic. The Articles deliberately avoided creating a strong central government, keeping sovereignty at the state level."}, {"text": "India is a federal republic and the early United States under the Articles of Confederation was a confederation.", "isCorrect": true, "rationale": "The text classifies India as a federal republic with a constitutionally divided three-list system, and explicitly identifies the United States under the Articles of Confederation (1781–1788) as a confederation — an association of sovereign states delegating limited authority to a common body while retaining sovereignty."}, {"text": "India is a unitary state because its constitution gives the Union List precedence, and the early United States was a federal republic because each state had its own government.", "isCorrect": false, "rationale": "A unitary state has central government supremacy over all sub-national units. India's three-list system gives states exclusive authority over the State List — that is a federal structure. The early U.S. was not federal but confederal, because member states retained sovereignty and the central body could not compel them."}]}, {"question": "In Rucho v. Common Cause (2019), the Supreme Court ruled 5–4 that federal courts have no role in adjudicating claims of partisan gerrymandering. The majority held that courts have no 'judicially manageable standard' to distinguish unjust partisan line-drawing from acceptable political considerations. Which of the following best describes the practical outcome of this ruling?", "options": [{"text": "Partisan gerrymandering became permanently immune from all legal challenge, ensuring that whichever party controls a state legislature can draw any district map it chooses.", "isCorrect": false, "rationale": "The text states that Rucho explicitly left open state-court remedies under state constitutions. Within four years, North Carolina and Pennsylvania courts struck down partisan gerrymanders under state constitutional provisions. Federal judicial review was eliminated, not all legal challenge."}, {"text": "Partisan gerrymandering became a political question under federal law, but state-court challenges under state constitutional provisions remained possible, producing a patchwork outcome across states.", "isCorrect": true, "rationale": "The text directly describes this outcome: Rucho made partisan gerrymandering 'a political question rather than a constitutional one under federal law,' but explicitly left state-court remedies open. North Carolina and Pennsylvania courts subsequently struck down gerrymanders under state constitutions, creating the 'patchwork outcome' the text describes."}, {"text": "The ruling prohibited both federal and state courts from reviewing any form of gerrymandering, including racial gerrymandering cases like Shaw v. Reno.", "isCorrect": false, "rationale": "Rucho concerned partisan gerrymandering only. The ruling did not address racial gerrymandering (Shaw v. Reno), which involves different constitutional frameworks. State courts were also explicitly left open for partisan challenges by the ruling itself."}, {"text": "Congress immediately passed legislation establishing independent redistricting commissions in all 50 states in response to the ruling.", "isCorrect": false, "rationale": "The text mentions independent redistricting commissions as one potential remedy the Rucho majority identified, but notes that the remedy must come from the political process — from state legislatures, state courts, commissions, or Congress. No such federal legislation is described as having passed."}]}, {"question": "North Carolina's 12th Congressional District, as drawn after the 2010 Census, stretched 160 miles along Interstate 85, at times only as wide as the highway itself, specifically connecting African-American neighborhoods in Charlotte and Greensboro. The Supreme Court scrutinized this map in Shaw v. Reno (1993). Which gerrymandering technique does this district most clearly exemplify?", "options": [{"text": "Cracking, because African-American voters were dispersed along the highway into multiple districts to dilute their strength.", "isCorrect": false, "rationale": "Cracking disperses voters across many districts to prevent them from forming a plurality in any. The 12th District did the opposite — it concentrated African-American voters from multiple cities into one long, narrow district. That is the defining feature of packing, or in this specific context, racial gerrymandering through concentration."}, {"text": "Packing (racial gerrymandering), because African-American voters from Charlotte and Greensboro were concentrated into a single district, creating a majority-Black seat while reducing Black voter influence in surrounding districts.", "isCorrect": true, "rationale": "The text describes the 12th District as 'specifically to connect African-American neighborhoods in Charlotte and Greensboro into a single majority-Black district — a form of racial gerrymandering.' This exemplifies packing: concentrating a demographic group into one district (creating enormous margins there) while reducing their influence elsewhere."}, {"text": "Reapportionment, because North Carolina gained additional congressional seats after the 2010 Census due to population growth.", "isCorrect": false, "rationale": "Reapportionment determines how many seats each state receives. The 12th District's contorted shape is a product of redistricting — the drawing of boundary lines within North Carolina — not the reapportionment of seats among states."}, {"text": "Antecedent boundary-drawing, because the district was established before African-American communities fully formed in Charlotte and Greensboro.", "isCorrect": false, "rationale": "Antecedent boundary is a concept applied to international or state boundaries drawn before settlement — not to electoral districts. The 12th District was explicitly designed to incorporate already-existing African-American communities. The concept does not apply here."}]}, {"question": "A political science student claims: 'The advantage of federal systems is that they can accommodate regional diversity, but the disadvantage is that they generate persistent tensions over fiscal transfers and regulatory authority between levels of government.' Based on the text, which of the following evaluations of this claim is most accurate?", "options": [{"text": "The claim is partially correct: while federal systems do accommodate diversity, the text does not identify any specific disadvantages of federalism.", "isCorrect": false, "rationale": "The text explicitly states that federal systems 'generate persistent tensions over fiscal transfers and regulatory authority between levels' — the student's claim about disadvantages is directly supported."}, {"text": "The claim is accurate: the text describes federal systems as better at accommodating diversity through multiple sub-national governments while also noting they produce persistent tensions over fiscal and regulatory authority.", "isCorrect": true, "rationale": "The text states directly: 'Federal systems tend to accommodate diversity better — multiple sub-national governments can adopt policies suited to regional needs — but they also generate persistent tensions over fiscal transfers and regulatory authority between levels.' This matches the student's claim precisely."}, {"text": "The claim is incorrect: the text argues unitary systems are superior for accommodating diversity, because a single national standard reduces conflict.", "isCorrect": false, "rationale": "The text describes unitary systems as having the advantage of policy coherence but being 'inflexible in culturally or geographically diverse societies.' It does not argue unitary systems are superior for diversity — federal systems are described as better at accommodation."}, {"text": "The claim is incorrect: the text identifies fiscal transfers as a centripetal force that reinforces federal unity, not a source of tension.", "isCorrect": false, "rationale": "The text does not characterize fiscal transfers as a centripetal force. Infrastructure and economic interdependence are mentioned as centripetal forces in section 4.4. In the federal system discussion, fiscal transfers are identified as a source of tension, not unity."}]}, {"question": "The term 'gerrymandering' derives from an 1812 Massachusetts redistricting bill that created a district shaped like a salamander. The bill was signed by Governor Elbridge Gerry. Two hundred years later, sophisticated computer modeling has made gerrymandering 'far more precise and durable.' Which conclusion about the evolution of gerrymandering does the text support?", "options": [{"text": "Technology has made gerrymandering illegal, because computer-drawn maps are easier for courts to scrutinize and invalidate.", "isCorrect": false, "rationale": "The text states the opposite: computer modeling has made gerrymandering 'more precise and durable,' and Rucho v. Common Cause (2019) removed federal court jurisdiction over partisan gerrymandering claims. Technology has made manipulation more effective, not more easily defeated."}, {"text": "The underlying manipulation technique is the same as in 1812, but modern computer modeling has increased the precision with which political data can be used to engineer durable electoral advantages.", "isCorrect": true, "rationale": "The text connects the 1812 origin to the modern practice, noting that while the name and basic technique (manipulating district boundaries for partisan advantage) are the same, 'sophisticated computer modeling has made gerrymandering far more precise and durable' — the same manipulation, engineered with much greater accuracy."}, {"text": "Computer modeling has made gerrymandering obsolete because algorithms draw districts based purely on equal population, eliminating partisan manipulation.", "isCorrect": false, "rationale": "The text says nothing of the kind. Computer modeling is described as a tool that makes gerrymandering more precise — algorithms are used by the party in power to optimize partisan advantage, not to eliminate it."}, {"text": "Modern gerrymandering is primarily conducted by independent redistricting commissions rather than state legislatures, making it more neutral.", "isCorrect": false, "rationale": "The text states that 'in most states redistricting is controlled by the state legislature — meaning the party in power in the state capitol draws the district lines.' Independent redistricting commissions are mentioned only as one potential remedy, not as the dominant current practice."}]}, {"question": "A confederation, a federal republic, and a unitary state represent three forms of internal political organization. Which of the following correctly ranks them from most centralized to least centralized?", "options": [{"text": "Confederation → Federal Republic → Unitary State (most to least centralized)", "isCorrect": false, "rationale": "This is reversed. Confederations are the least centralized — member states retain sovereignty and can withdraw or veto collective action. Unitary states are the most centralized, with the central government holding supreme authority over all sub-national units."}, {"text": "Unitary State → Federal Republic → Confederation (most to least centralized)", "isCorrect": true, "rationale": "The text describes unitary states as having supreme central authority (most centralized), federal states as constitutionally dividing authority between central and sub-national levels (intermediate), and confederations as associations of sovereign states delegating only limited authority to a common body (least centralized, most prone to instability)."}, {"text": "Federal Republic → Unitary State → Confederation (most to least centralized)", "isCorrect": false, "rationale": "Federal republics divide authority between levels but give the central government significant powers. Unitary states concentrate all ultimate authority at the center — more centralized than federal. This ranking is incorrect."}, {"text": "Unitary State → Confederation → Federal Republic (most to least centralized)", "isCorrect": false, "rationale": "Confederations are less centralized than federal republics, not more. In a confederation, member states retain sovereignty; in a federal republic, the national constitution limits sub-national authority in important ways."}]}, {"question": "After the 2020 U.S. Census, the majority party in a state legislature redraws congressional district boundaries. The party uses census data to identify neighborhoods where the opposition party won with margins above 70% and places all such neighborhoods into a single district. The remaining neighborhoods, where the opposition wins with margins of 52–58%, are each distributed among three different majority-party districts. Which combination of techniques is this legislature using?", "options": [{"text": "Reapportionment and redistricting, because the legislature is responding to census data by redrawing boundaries.", "isCorrect": false, "rationale": "Reapportionment reallocates seats among states; redistricting redraws boundaries within a state. Both are legitimate processes. The question describes the deliberate manipulation of those boundaries for partisan advantage — specifically combining packing (concentrating high-margin opposition precincts) with cracking (distributing lower-margin opposition precincts). That is gerrymandering."}, {"text": "Packing the high-margin opposition neighborhoods into one district, and cracking the lower-margin opposition precincts across multiple majority-party districts.", "isCorrect": true, "rationale": "The text describes how effective gerrymandering combines both techniques: pack the most reliable opposition precincts into one or two districts (here, neighborhoods where opposition wins by 70%+), then crack any remaining concentrations across surrounding districts (here, 52–58% opposition neighborhoods spread across three majority-party seats). This matches the described scenario precisely."}, {"text": "Cracking the high-margin opposition neighborhoods and packing the low-margin opposition precincts.", "isCorrect": false, "rationale": "This is the reverse of standard practice. Packing targets the most concentrated opposition voters (high margins) to waste their votes; cracking targets areas where the opposition still has significant presence (lower margins) to dilute it. The question's scenario follows the standard packing-then-cracking pattern, not the reverse."}, {"text": "Devolution and redistricting, because the legislature is transferring authority to sub-state electoral units.", "isCorrect": false, "rationale": "Devolution transfers governing authority from central to sub-national governments — it is not related to drawing electoral district lines. The scenario describes gerrymandering, not devolution."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
