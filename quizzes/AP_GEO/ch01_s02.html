    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Geospatial Technologies and Spatial Data</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A nonprofit organization is mapping water access points in a remote region of sub-Saharan Africa where official government surveys are incomplete. Volunteers with smartphones add wells, boreholes, and pumping stations directly to an open online platform. Which geospatial concept BEST describes the type of data the volunteers are producing?", "options": [{"text": "Quantitative spatial data collected through government census operations.", "isCorrect": false, "rationale": "Government census data is produced by trained official agencies, not private individuals with smartphones contributing voluntarily. This scenario describes a grassroots, community-driven data production process."}, {"text": "Volunteered Geographic Information (VGI), because private individuals are creating and sharing spatial data using networked devices without formal surveying credentials.", "isCorrect": true, "rationale": "VGI is defined as spatial data created and shared by private individuals using internet-connected devices — exactly what the nonprofit volunteers are doing. The term was coined by geographer Michael Goodchild in 2007. The scenario mirrors how OpenStreetMap works, particularly in regions where official mapping is incomplete."}, {"text": "Remote sensing data, because the volunteers are acquiring information about the Earth's surface from a distance.", "isCorrect": false, "rationale": "Remote sensing involves sensors on satellites or aircraft acquiring data without direct physical contact. Volunteers personally visiting water access points and entering data via smartphones is the opposite of remote sensing — it is direct, ground-level field observation."}, {"text": "Raster data, because the platform stores the water points as a grid of cells each assigned a value.", "isCorrect": false, "rationale": "Wells and boreholes are discrete, located objects best represented as vector point data, not as a raster grid. Raster format divides the landscape into a regular cell grid and is used for continuous surface data like elevation or satellite imagery."}], "id": "q01"}, {"question": "In 2010, LiDAR surveys over the rainforest of northern Guatemala revealed an interconnected network of Mayan cities, causeways, and agricultural terraces invisible to aerial photography. Which property of LiDAR made this discovery possible?", "options": [{"text": "LiDAR is a passive sensor that detects visible light reflected from the forest canopy, enabling better optical resolution than standard cameras.", "isCorrect": false, "rationale": "LiDAR is an active sensing system, not a passive one. It emits its own laser pulses rather than detecting naturally reflected light. Optical cameras (passive sensors) cannot see through dense forest canopy to structures below."}, {"text": "LiDAR emits laser pulses and measures their return time, building a three-dimensional point cloud that can 'see through' forest canopy to detect ground-level structures beneath.", "isCorrect": true, "rationale": "LiDAR's active laser pulses travel through gaps in the canopy and return precise elevation measurements from both the treetops and the ground beneath. By filtering out canopy returns, analysts can reconstruct the ground surface, revealing ancient structures that are invisible to optical or passive sensors."}, {"text": "LiDAR captures multispectral imagery across near-infrared and thermal bands that highlight organic material disturbance in the soil.", "isCorrect": false, "rationale": "Multispectral imagery is associated with passive sensors like Landsat, not with LiDAR. LiDAR measures precise distance using laser pulse return times to build 3D point clouds; it does not capture spectral bands."}, {"text": "LiDAR uses satellite trilateration to map structures, achieving meter-level accuracy over large rainforest areas.", "isCorrect": false, "rationale": "Trilateration is the technique used by GPS receivers to determine location from satellite signals, not a property of LiDAR. LiDAR relies on the time-of-flight of laser pulses emitted and received by an airborne sensor, not satellite geometry."}], "id": "q02"}, {"question": "A city planner needs to identify all residential parcels within a 100-year flood zone that are also within 1 km of a school. Which description BEST explains how GIS would approach this analysis?", "options": [{"text": "The planner would use GPS trilateration to calculate the position of each parcel relative to the flood zone and nearest school.", "isCorrect": false, "rationale": "GPS determines the location of a single receiver by measuring satellite signals; it is not a tool for multi-criteria spatial queries across existing datasets. This task requires the overlay and query capabilities of a GIS."}, {"text": "The planner would overlay three data layers — a flood zone polygon layer, a parcel boundary layer, and a school point layer — perform a 1 km buffer on the school points, then spatially join the results to identify parcels inside both the flood zone and the buffer.", "isCorrect": true, "rationale": "GIS is specifically designed for this type of multi-layer spatial query. The flood zone, parcels, and schools are stored as separate vector layers. A buffer operation generates a 1 km zone around each school; a spatial intersection identifies parcels that fall within both the flood zone polygon and the school buffer — precisely the operation GIS was built to perform."}, {"text": "The planner would use remote sensing to detect flood damage to residential structures near schools.", "isCorrect": false, "rationale": "Remote sensing acquires observational data from satellites or aircraft; it cannot perform spatial queries against administrative databases like parcel records. It also detects existing damage rather than identifying at-risk parcels."}, {"text": "The planner would use VGI contributions from residents to determine which homes are near schools and in flood-prone areas.", "isCorrect": false, "rationale": "While VGI can supplement geographic datasets, this specific task requires authoritative cadastral (parcel) and flood-zone data — not crowdsourced contributions — and requires systematic spatial analysis across all qualifying parcels, not voluntary individual reports."}], "id": "q03"}, {"question": "A GPS receiver on a hiking trail receives signals from exactly three satellites. Which of the following BEST explains why the receiver cannot yet produce a reliable position fix?", "options": [{"text": "Three satellites are sufficient for two-dimensional positioning, but the hiker's receiver requires five satellites for the mountain terrain.", "isCorrect": false, "rationale": "Three satellites constrain the receiver's position to two possible points in space (the intersection of three spheres), not a unique solution. A fourth satellite is needed to resolve this ambiguity and also correct for clock drift — not five satellites as this option claims."}, {"text": "Three satellites constrain the receiver to two possible points; a fourth satellite is needed to resolve the position to a unique point and correct for receiver clock drift.", "isCorrect": true, "rationale": "GPS position is determined through trilateration. A signal from one satellite defines a sphere; two satellites define a circle (intersection of two spheres); three satellites produce two possible points. The fourth satellite eliminates one of those points and — critically — corrects for the receiver's internal clock inaccuracy, which would otherwise introduce significant position error."}, {"text": "Three satellites can only provide longitude data; latitude requires at least four satellites.", "isCorrect": false, "rationale": "GPS trilateration does not separate the calculation of latitude and longitude — all coordinates are solved simultaneously. The requirement for four satellites stems from the geometry of resolving two candidate positions and correcting clock error, not from needing separate satellites for each coordinate."}, {"text": "Three satellites are sufficient for a precise location, but the signal was blocked by the mountain, reducing accuracy to within 10 km.", "isCorrect": false, "rationale": "Three satellites geometrically produce two possible solutions, not a single location with reduced precision. Signal blockage (multipath interference) is a real accuracy issue in mountains, but the fundamental reason four satellites are required is the trilateration geometry, not terrain obstruction."}], "id": "q04"}, {"question": "Examine the following scenario: In 2007, following a disputed election in Kenya, a group of bloggers built the Ushahidi platform to crowdsource violence incident reports via text message, geocoding them in near-real time. The resulting map was detailed in urban areas and near universities but showed sparse data in rural regions. Which of the following BEST explains this geographic pattern in the Ushahidi data?", "options": [{"text": "Rural violence was less severe than urban violence during the crisis, so fewer incidents needed to be reported.", "isCorrect": false, "rationale": "The source text does not support this interpretation. The sparse rural coverage in Ushahidi is explicitly attributed to lower mobile penetration and digital literacy, not to lower levels of actual violence."}, {"text": "The Ushahidi platform could only receive reports from verified journalists and researchers, who were concentrated at universities.", "isCorrect": false, "rationale": "Ushahidi was designed to receive reports from anyone with a mobile phone, requiring no credentials or verification. Its openness to all contributors was a core feature, which is also why the coverage bias reflects who had phones, not who was authorized to report."}, {"text": "The data reflect a spatial coverage bias: areas with higher mobile phone penetration and digital literacy — urban centers and university communities — were over-represented, while rural areas with limited phone access remained underrepresented.", "isCorrect": true, "rationale": "This is the analytical challenge the source text identifies explicitly for Ushahidi and VGI in general. The map was most detailed where contributors had mobile phones and the knowledge to use text-based reporting, creating a systematic spatial bias toward urban and educated populations — not a neutral representation of where events occurred."}, {"text": "The Ushahidi platform was deliberately designed to focus on urban areas because urban violence has greater economic consequences.", "isCorrect": false, "rationale": "Ushahidi was designed as a universal crisis-mapping tool, not an urban-focused one. The urban concentration of data points was an unintended consequence of mobile penetration patterns, not a design choice."}], "id": "q05"}, {"question": "The Normalized Difference Vegetation Index (NDVI) is derived from satellite multispectral imagery. Which of the following BEST explains why healthy vegetation produces a high NDVI value?", "options": [{"text": "Healthy plants absorb near-infrared radiation strongly, producing a high ratio of absorbed to reflected energy.", "isCorrect": false, "rationale": "This reverses the spectral behavior of vegetation. Healthy plants strongly reflect (not absorb) near-infrared radiation. NDVI captures this high reflectance relative to red-band absorption."}, {"text": "Healthy plants strongly reflect near-infrared radiation while absorbing red light for photosynthesis; NDVI captures this high near-infrared-to-red reflectance ratio.", "isCorrect": true, "rationale": "NDVI is calculated as the ratio of near-infrared reflectance minus red reflectance divided by their sum. Healthy green vegetation reflects near-infrared strongly (a property invisible to human eyes) while absorbing red wavelengths for photosynthesis. Stressed or dead vegetation reflects less near-infrared, producing lower NDVI values."}, {"text": "NDVI measures the thermal infrared radiation emitted by plant canopies, with cooler, denser canopies indicating healthier vegetation.", "isCorrect": false, "rationale": "NDVI uses the near-infrared and red spectral bands, not thermal infrared. Thermal infrared bands measure heat emission and are used for different applications such as land surface temperature mapping, not vegetation greenness."}, {"text": "Healthy vegetation produces a low NDVI because it absorbs most incoming solar radiation rather than reflecting it.", "isCorrect": false, "rationale": "High NDVI values correspond to healthy, dense vegetation. Low NDVI values indicate bare soil, dead vegetation, or water. The index is designed so that the high near-infrared reflectance of healthy plants produces high positive values."}], "id": "q06"}, {"question": "A GIS analyst is choosing between vector and raster data formats for two separate projects: (1) mapping the exact boundaries of 10,000 land ownership parcels, and (2) modeling elevation across a mountain range to calculate watershed flow directions. Which data format is MOST appropriate for each project?", "options": [{"text": "Raster for both projects, because it can represent both discrete objects and continuous surfaces as a uniform grid.", "isCorrect": false, "rationale": "While raster can technically represent any spatial phenomenon, it is poorly suited for discrete, bounded objects like legal parcel boundaries because a grid of cells cannot precisely represent sharp polygon edges without significant distortion or large file sizes at high resolution."}, {"text": "Vector polygons for land parcels; raster for the elevation model — each format is optimized for the type of spatial data it represents.", "isCorrect": true, "rationale": "Vector data (points, lines, polygons) excels at representing discrete, bounded objects — parcel boundaries are exactly this kind of sharp-edged polygon. Raster data excels at representing continuous spatial variation — elevation is a classic continuous surface where each grid cell stores an elevation value, and raster's cell-based structure supports slope and flow-direction calculations."}, {"text": "Vector for both projects, because vector data is always more precise than raster for any geographic application.", "isCorrect": false, "rationale": "Vector is not universally more precise. For continuous surfaces like elevation, raster format supports operations (slope, watershed delineation, surface analysis) that vector data structures cannot perform efficiently. The choice of format should match the nature of the phenomenon being represented."}, {"text": "Raster for land parcels; vector for the elevation model, because raster grid cells align better with irregular boundary shapes.", "isCorrect": false, "rationale": "This reverses the appropriate choices. Raster cells are a poor match for precise legal boundaries, which require the clean polygon edges that vector data provides. Elevation, as a continuously varying surface, is naturally stored and analyzed as a raster grid."}], "id": "q07"}, {"question": "A geographer studying gentrification in a major city combines census income data with residents' oral histories describing how their neighborhood 'used to feel' before redevelopment. Which of the following BEST describes the TWO types of geographic data the geographer is using?", "options": [{"text": "Both sources are quantitative spatial data because they are both attached to specific locations on a map.", "isCorrect": false, "rationale": "Spatial attachment alone does not determine whether data are quantitative or qualitative. Census income data is numeric and measurable (quantitative); oral histories are descriptive, interpretive, and narrative (qualitative). Both can be spatially referenced, but they differ fundamentally in their type."}, {"text": "Census income data is quantitative spatial data; oral histories of neighborhood experience constitute qualitative spatial data.", "isCorrect": true, "rationale": "The source text explicitly distinguishes quantitative spatial data (measurable, numeric values like income, population counts) from qualitative spatial data (descriptive, interpretive accounts of how people experience places). Oral histories are a classic example of qualitative geographic data, as Yi-Fu Tuan's foundational work on topophilia similarly drew on personal narratives."}, {"text": "Census data is primary data; oral histories are secondary data, because residents are not trained researchers.", "isCorrect": false, "rationale": "The relevant distinction in this section is between quantitative and qualitative data types, not between primary and secondary sources. Oral histories collected directly from residents are in fact primary data; the primary/secondary distinction is separate from the quantitative/qualitative distinction."}, {"text": "Both are qualitative data because gentrification is a social process that cannot be measured numerically.", "isCorrect": false, "rationale": "Gentrification can be measured through multiple quantitative indicators — income change, property values, displacement rates. Census income data provides precisely these numeric measurements. Describing all data about social processes as qualitative is incorrect."}], "id": "q08"}, {"question": "OpenStreetMap, the world's largest VGI project, has achieved remarkable global coverage. However, a disaster relief team notes that a remote island nation devastated by a typhoon is poorly mapped on the platform. Which of the following BEST explains this coverage gap?", "options": [{"text": "Remote islands lack the terrain features (roads, buildings) that OpenStreetMap is designed to record.", "isCorrect": false, "rationale": "OpenStreetMap records roads, buildings, land use, public transport, and points of interest — all of which exist on inhabited islands. The coverage gap is not due to a lack of mappable features but to a lack of contributors with the connectivity to contribute."}, {"text": "OpenStreetMap only records data for countries that have signed international data-sharing agreements.", "isCorrect": false, "rationale": "OpenStreetMap is an open, freely editable platform that accepts contributions globally without reference to government agreements. Its coverage reflects the distribution of active contributors, not political agreements."}, {"text": "VGI coverage is biased toward communities with higher internet connectivity and digital literacy; remote island nations with limited mobile and internet infrastructure have fewer contributors and thus less VGI coverage.", "isCorrect": true, "rationale": "This is the systemic VGI limitation the source text describes. Coverage on platforms like OpenStreetMap reflects who has the connectivity and digital skills to contribute. In regions — like remote island nations — where mobile penetration and internet access are limited, the communities most in need of accurate maps are often the least represented in VGI datasets."}, {"text": "The typhoon physically destroyed the GPS infrastructure needed to collect location data on the island.", "isCorrect": false, "rationale": "GPS infrastructure is space-based (satellite constellations) and is not destroyed by local weather events. The coverage gap predates the typhoon and reflects the broader pattern of VGI under-representation in low-connectivity regions."}], "id": "q09"}, {"question": "An AP exam stimulus shows a table comparing data from a Landsat multispectral satellite image (250 m per pixel) with data from a LiDAR airborne survey (10 cm vertical precision) of the same urban area. A student concludes that the Landsat data is 'better' because it covers more area. Which geographic response BEST evaluates this claim?", "options": [{"text": "The student is correct; broader coverage always makes a dataset more geographically useful.", "isCorrect": false, "rationale": "The value of a dataset depends on the geographic question being asked, not on coverage alone. A dataset with broad but coarse coverage may be entirely unsuitable for questions requiring fine spatial detail — such as measuring building heights for flood risk analysis."}, {"text": "The student's claim is incomplete; the appropriate data source depends on the geographic question. Landsat is better for global-scale vegetation and land-cover monitoring; LiDAR is better for precise elevation modeling, building-height analysis, or detecting sub-meter features like ancient structures.", "isCorrect": true, "rationale": "The source text identifies each technology's strengths and limitations. Landsat's moderate resolution (250 m) suits continental and global monitoring of vegetation (NDVI), land cover, and surface temperature. LiDAR's centimeter-scale precision makes it irreplaceable for 3D urban modeling, flood risk, and archaeological detection — tasks where Landsat's 250 m pixel is far too coarse. Neither is universally 'better.'"}, {"text": "LiDAR is always superior to Landsat because active sensors are more accurate than passive sensors in all applications.", "isCorrect": false, "rationale": "Active vs. passive is a meaningful distinction but does not make one type universally superior. Landsat's multispectral passive sensors provide globally consistent vegetation and land-cover data that LiDAR — limited by aircraft coverage area and high operating costs — cannot replicate at planetary scale."}, {"text": "Landsat data is better because it is a government program, making it more reliable than privately operated LiDAR surveys.", "isCorrect": false, "rationale": "The appropriate data source is determined by spatial resolution and the nature of the geographic question, not by the institutional origin of the program. LiDAR surveys are conducted by government agencies (USGS, Army Corps of Engineers) as well as private firms, and their precision is not diminished by their operator."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
