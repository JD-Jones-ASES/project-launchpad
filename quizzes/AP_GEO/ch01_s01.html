<script>
var QUESTIONS = [{"question": "A student is analyzing a world map in a classroom and notices that Greenland appears to be roughly the same size as Africa. Which map projection is the student most likely viewing, and what property does it preserve at the cost of this distortion?", "options": [{"text": "The Peters projection; it preserves area so continents appear in their true relative sizes.", "isCorrect": false, "rationale": "The Peters projection is an equal-area (equivalence) projection designed specifically to correct the size distortion seen in the Mercator. On a Peters map, Africa appears far larger than Greenland."}, {"text": "The Mercator projection; it preserves local angles and shape (conformality) at the cost of severe area distortion near the poles.", "isCorrect": true, "rationale": "The Mercator is a conformal projection engineered for maritime navigation. To keep local angles accurate, it stretches landmasses progressively toward the poles, inflating high-latitude areas like Greenland to appear roughly the size of Africa, even though Africa is approximately fourteen times larger."}, {"text": "The Robinson projection; it is a compromise projection that minimizes all distortions simultaneously.", "isCorrect": false, "rationale": "The Robinson projection attempts to minimize all distortions but does not produce the extreme polar inflation that makes Greenland appear as large as Africa. It was adopted by National Geographic in 1988 as a visually balanced alternative."}, {"text": "Goode's Homolosine projection; it interrupts ocean surfaces to preserve continental shapes.", "isCorrect": false, "rationale": "Goode's Homolosine is an interrupted, near-equal-area projection that would show Africa as far larger than Greenland. Its distinctive feature is the split lobes for the oceans, not polar inflation."}]}, {"question": "A public health researcher wants to map the rate of obesity by county across the United States. The researcher shades each county using a graduated color scale from light yellow (low rates) to dark red (high rates). Which map type is the researcher using, and what key methodological requirement must be met to avoid misleading results?", "options": [{"text": "A proportional symbol map; the researcher must use raw totals rather than rates so that populous counties receive larger symbols.", "isCorrect": false, "rationale": "A proportional symbol map uses scaled symbols (typically circles) at each location, not shaded administrative units. Additionally, using raw totals rather than rates would introduce the very bias the question warns against."}, {"text": "A dot density map; the researcher must place one dot for every case of obesity to show the actual spatial distribution.", "isCorrect": false, "rationale": "A dot density map places dots to represent individual occurrences or clusters, not a graduated color scheme applied to predefined units. It also struggles with overlapping dots in dense areas."}, {"text": "A choropleth map; the researcher must use normalized data (rates or densities, not raw totals) to avoid equating large-area counties with high-magnitude values.", "isCorrect": true, "rationale": "A choropleth shades predefined geographic units according to a numeric variable using a graduated color scale. Proper choropleth construction requires normalized data — rates or densities — because large, low-population counties (like those in the Mountain West) would visually dominate the map if raw totals were used, misleading the reader."}, {"text": "An isoline map; the researcher must connect points of equal obesity rate with continuous lines to reveal gradients across the country.", "isCorrect": false, "rationale": "An isoline (isarithmic) map connects points of equal value with continuous lines and is best suited for continuous phenomena like temperature or elevation, not bounded administrative data like county-level health statistics."}]}, {"question": "In 1569, Gerardus Mercator published his famous world map. Which of the following BEST explains why using the Mercator projection as a standard classroom world map has been criticized as ideologically problematic?", "options": [{"text": "The Mercator projection distorts direction, making compass bearings inaccurate for navigation.", "isCorrect": false, "rationale": "This is the opposite of the truth. The Mercator projection was specifically designed to preserve compass bearings (rhumb lines) as straight lines, making it excellent for maritime navigation — its stated purpose."}, {"text": "The Mercator projection systematically enlarges the apparent size of high-latitude landmasses, inflating Europe and North America while shrinking Africa, South America, and South and Southeast Asia.", "isCorrect": true, "rationale": "The progressive polar stretching required to maintain conformality causes high-latitude landmasses like Europe, Greenland, and North America to appear far larger relative to equatorial regions. When adopted as a classroom map, this distortion carries ideological implications: it visually magnifies the Global North while diminishing the Global South, a context for which the projection was never designed."}, {"text": "The Mercator projection is technically inaccurate for its stated purpose of maritime navigation.", "isCorrect": false, "rationale": "The Mercator projection is mathematically correct and highly accurate for its stated purpose. The critique is not that it fails at navigation but that it was misapplied to educational contexts where area comparison, not bearing accuracy, is the relevant concern."}, {"text": "The Mercator projection interrupts the ocean surfaces, making it impossible to trace sea routes on a global map.", "isCorrect": false, "rationale": "It is Goode's Homolosine projection, not the Mercator, that interrupts ocean surfaces. The Mercator displays a continuous, uninterrupted ocean surface — ideal for plotting sea routes."}]}, {"question": "City A has a population of 1,000,000 and City B has a population of 500,000. The two cities are 100 km apart. A second city pair consists of City C (population 1,000,000) and City D (population 500,000), but they are 200 km apart. Using the gravity model, how does the predicted interaction between the A–B pair compare to the C–D pair?", "options": [{"text": "The A–B pair has twice the predicted interaction of the C–D pair, because the distance between them is half as great.", "isCorrect": false, "rationale": "The gravity model divides by distance squared, not by distance alone. Halving the distance increases the predicted interaction by a factor of four (2² = 4), not two."}, {"text": "The A–B pair has four times the predicted interaction of the C–D pair, because the gravity model divides by the square of distance.", "isCorrect": true, "rationale": "The gravity model predicts interaction proportional to the product of populations divided by distance squared. Since the populations are identical for both pairs, only the distance term differs. (100 km)² = 10,000 vs. (200 km)² = 40,000, so A–B has 40,000/10,000 = 4 times greater predicted interaction than C–D."}, {"text": "The C–D pair has greater predicted interaction because larger distances attract more trade through comparative advantage.", "isCorrect": false, "rationale": "The gravity model expresses distance decay — interaction decreases as distance increases. Greater distance reduces, not increases, predicted interaction in the basic gravity model."}, {"text": "Both pairs have identical predicted interaction because the populations are the same.", "isCorrect": false, "rationale": "Population (mass) is only one component of the gravity model. Distance, which appears squared in the denominator, is equally critical. Different distances with identical populations produce different predicted interaction values."}]}, {"question": "Which of the following BEST illustrates the concept of relative location, as distinct from absolute location?", "options": [{"text": "The Eiffel Tower is located at approximately 48.858°N, 2.295°E.", "isCorrect": false, "rationale": "A latitude-longitude coordinate is the definition of absolute location — a precise, mathematically fixed position on the Earth's surface that is the same regardless of context or observer."}, {"text": "Chicago is the principal inland transportation hub of North America, positioned at the junction of the Great Lakes water system and the continental interior.", "isCorrect": true, "rationale": "This description of Chicago defines its position in relation to surrounding geography (transportation networks, natural features, trade routes) rather than by coordinate. It also reflects how the city's relative location changed over time as railroads replaced water transport — demonstrating the context-dependence that is the defining feature of relative location."}, {"text": "GPS navigation systems place a user's device at a specific set of coordinates updated in real time.", "isCorrect": false, "rationale": "GPS calculates absolute location — precise latitude, longitude, and elevation coordinates that are universal and context-independent, exactly as the definition of absolute location specifies."}, {"text": "A surveyor uses trigonometry to determine the precise boundary line between two adjacent land parcels.", "isCorrect": false, "rationale": "Surveying establishes fixed, measurable positions on the Earth's surface — absolute location. It is not context-dependent and does not describe a place in relation to surrounding geography or changing transport networks."}]}, {"question": "A teacher shows students two maps of the same region. Map 1 uses a scale of 1:10,000; Map 2 uses a scale of 1:1,000,000. Which of the following statements CORRECTLY describes the relationship between these two maps?", "options": [{"text": "Map 1 is a small-scale map that shows a large portion of the Earth's surface in low detail.", "isCorrect": false, "rationale": "Map 1 has a scale of 1:10,000 — a small denominator — which makes it a large-scale map. Large-scale maps show small areas in great detail, not large areas in low detail."}, {"text": "Map 2 is a large-scale map because it covers a larger geographic area.", "isCorrect": false, "rationale": "This is a common misconception. In cartography, 'large-scale' refers to the representative fraction, not the geographic area shown. A 1:1,000,000 scale is a small fraction (0.000001) and is therefore a small-scale map, despite showing a large area."}, {"text": "Map 1 is a large-scale map showing a small area in great detail; Map 2 is a small-scale map showing a large area with little detail.", "isCorrect": true, "rationale": "Cartographic scale is the ratio between map distance and ground distance. A scale of 1:10,000 (large fraction) is a large-scale map — it shows a small area with high detail. A scale of 1:1,000,000 (small fraction) is a small-scale map — it covers a large area but sacrifices detail. The terminology is counterintuitive but technically precise."}, {"text": "Both maps show the same level of detail but cover different areas because scale only affects the physical size of the map.", "isCorrect": false, "rationale": "Scale directly determines the level of geographic detail that is legible on a map. A 1:10,000 map can show individual buildings; a 1:1,000,000 map cannot. Scale is not merely a matter of physical print size."}]}, {"question": "An AP Human Geography teacher distributes a stimulus showing a proportional symbol map of global earthquake magnitudes, with larger circles at epicenter locations. A student argues this map would look identical if a choropleth were used instead. Which response BEST challenges the student's claim?", "options": [{"text": "The student is correct because both map types use graduated scales to represent varying magnitudes.", "isCorrect": false, "rationale": "While both map types use scaled visual variables, they encode data entirely differently and are not interchangeable. The student's claim is incorrect."}, {"text": "A choropleth would require administrative boundaries and would average earthquake data across entire regions, misrepresenting the precise point locations where quakes actually occur — which is what proportional symbols show.", "isCorrect": true, "rationale": "Choropleth maps shade predefined administrative or geographic units, forcing all data within a unit to be averaged or summed. Earthquake epicenters are point phenomena with precise locations; a choropleth would assign them to countries or states, obscuring where they actually strike. Proportional symbols are not constrained by political boundaries and can locate phenomena where they actually occur."}, {"text": "A choropleth could represent earthquake data identically because darker shading can replace larger circles without any loss of spatial information.", "isCorrect": false, "rationale": "Shading a predefined geographic unit (choropleth) does not preserve point-specific spatial information. If a country experiences earthquakes in one corner, the choropleth shades the entire country, falsely implying uniform earthquake risk across its interior."}, {"text": "The two map types are interchangeable for earthquake data because both use the same geographic boundaries.", "isCorrect": false, "rationale": "Proportional symbol maps are explicitly noted for NOT being constrained by political or administrative unit boundaries — a key advantage over choropleth maps for phenomena like earthquake epicenters that occur at specific point locations."}]}, {"question": "The Peters projection was promoted by its creator as an 'anti-colonial' statement in 1973. Which of the following BEST explains the geographic basis for this political claim?", "options": [{"text": "The Peters projection is conformal, preserving local shapes for all landmasses equally, unlike the Mercator, which distorts shapes in certain regions.", "isCorrect": false, "rationale": "The Peters projection is actually an equal-area projection, not a conformal one. It deliberately sacrifices shape accuracy — stretching and compressing landmasses — to achieve accurate area representation."}, {"text": "The Peters projection shows sea routes as straight lines, correcting the Mercator's navigational bias that prioritized European maritime powers.", "isCorrect": false, "rationale": "The straight-line property for compass bearings (rhumb lines) belongs to the Mercator projection, not the Peters. The Peters made no claim to navigational accuracy."}, {"text": "By preserving relative area, the Peters projection displays Africa and South America in their true continental scale, countering the Mercator's systematic visual inflation of European and North American landmasses.", "isCorrect": true, "rationale": "Peters argued that the Mercator's enlargement of high-latitude (largely Global North) landmasses was not a cartographic accident but a Eurocentric bias. His equal-area projection shows Africa and South America at their true sizes relative to Europe and North America, a correction he framed as a political as well as cartographic act."}, {"text": "The Peters projection is an interrupted projection that repositions the continents to place the Global South at the center of the map.", "isCorrect": false, "rationale": "The Peters projection is not an interrupted projection and does not reposition the continents. Interrupted projections (like Goode's Homolosine) split the map across ocean surfaces. Peters' projection maintains a rectangular format similar to the Mercator's."}]}, {"question": "An isoline map of annual precipitation across South America connects points receiving the same millimeter totals in continuous curved lines. A classmate suggests this map type would work equally well for mapping the political boundaries of South American nations. Which response is MOST geographically accurate?", "options": [{"text": "The classmate is correct; isolines can represent any geographic variable regardless of whether it is continuous or bounded.", "isCorrect": false, "rationale": "Isolines excel at revealing continuous gradients across space but are explicitly noted as struggling with phenomena that are bounded rather than continuous. Political boundaries are discrete and bounded, not continuous gradients."}, {"text": "Isoline maps struggle with bounded phenomena because political boundaries are discrete lines, not gradients of smoothly varying values — making a choropleth or polygon map far more appropriate for political units.", "isCorrect": true, "rationale": "Isoline maps connect points of equal value and are designed for continuously varying phenomena like precipitation, temperature, or elevation. Political boundaries are sharp, discrete lines with no gradient property, making isolines a conceptually inappropriate tool. A choropleth or simple polygon map correctly represents bounded administrative units."}, {"text": "The classmate is incorrect because isoline maps can only be used for physical geography phenomena, never human geography data.", "isCorrect": false, "rationale": "While isobar, isotherm, and contour maps are primarily physical geography tools, isolines can in principle represent any continuously varying phenomenon, including some human geography variables like population density when modeled as a continuous surface. The issue is not physical vs. human geography but continuous vs. bounded phenomena."}, {"text": "Isoline maps are best used for political boundaries because they produce precise, unambiguous lines that correspond well to the legal clarity of national borders.", "isCorrect": false, "rationale": "Isoline maps produce lines connecting points of equal value — they are interpolated from point data and represent gradients, not legal boundaries. Political borders are not isolines of any geographic variable and should not be mapped with isoline methodology."}]}, {"question": "A geographer studying migration flows between cities argues that the gravity model is a useful predictor but has real limitations. Which of the following BEST identifies a genuine limitation of the basic gravity model as described in this section?", "options": [{"text": "The gravity model cannot be applied to city pairs at distances greater than 500 km.", "isCorrect": false, "rationale": "There is no such distance limit mentioned in the section. The gravity model has been applied to predict flows at intercontinental scales, including international migration and airline passenger volumes."}, {"text": "The gravity model assumes all population 'mass' is equivalent and treats distance as the primary frictional force, but a megacity of 5 million specialists interacts differently than 5 million subsistence farmers, and transportation improvements reduce the friction of distance.", "isCorrect": true, "rationale": "The section explicitly identifies these two limitations: the model treats all 'mass' as equivalent (ignoring economic structure and specialization) and assumes distance is the primary friction (which becomes less true as transportation and communication costs fall). Both are genuine constraints on the model's predictive accuracy."}, {"text": "The gravity model only works for predicting trade flows, not migration, commuting, or tourist visits.", "isCorrect": false, "rationale": "The section explicitly states the gravity model has been applied to predict migration flows, retail trade areas, telephone traffic, internet bandwidth allocation, and airline passenger volumes — a broad range of interaction types."}, {"text": "The gravity model requires accurate population data from the census, which is unavailable in most countries.", "isCorrect": false, "rationale": "The section does not cite data availability as a limitation of the gravity model. Its identified limitations concern conceptual assumptions — the equivalence of all population mass and the role of distance friction — not data access."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
