<script>
var QUESTIONS = [{"question": "A historian studying mid-twentieth-century American housing policy finds federal maps that color-coded neighborhoods by perceived mortgage risk, systematically marking Black neighborhoods as 'hazardous' regardless of actual borrower creditworthiness. Which policy practice do these maps represent, and what was its primary long-term geographic consequence?", "options": [{"text": "Blockbusting — real-estate agents deliberately frightened White homeowners into selling at below-market prices, transferring wealth from sellers to brokers.", "isCorrect": false, "rationale": "Blockbusting was a real-estate industry practice, not a federal mapping and mortgage-insurance policy. The maps described—color-coded by perceived risk with 'hazardous' designations for Black neighborhoods—are specifically the HOLC redlining maps."}, {"text": "Redlining — federal mortgage insurance was withheld from neighborhoods designated 'hazardous,' systematically preventing Black families from building home equity during the postwar housing boom and contributing to the wealth gap that persists today.", "isCorrect": true, "rationale": "The source defines redlining as the HOLC and FHA practice of denying mortgage loans or insurance to 'hazardous' neighborhoods, applied almost universally to areas with significant Black populations. Its primary long-term consequence was blocking Black families from the wealth-building homeownership that created the White middle class."}, {"text": "Urban renewal — federal programs demolished 'blighted' neighborhoods and replaced them with highways, stadiums, and upscale housing, displacing communities of color.", "isCorrect": false, "rationale": "Urban renewal involved physical demolition and displacement, authorized by the Housing Act of 1949. The maps described are HOLC mortgage-risk maps used to deny insurance—a financial exclusion tool, not a demolition program."}, {"text": "White flight — the mass out-migration of White middle-class households from cities to suburbs, driven by racial transition and federal transportation subsidies.", "isCorrect": false, "rationale": "White flight describes population movement by White residents away from urban neighborhoods, not the federal mapping and mortgage-denial practice described in the question."}]}, {"question": "A real-estate agent in 1960s Chicago tells White homeowners in a transitional neighborhood that Black families are moving in and their property values will collapse, then purchases their homes cheaply and resells them to Black families at inflated prices on contract-for-deed arrangements. This practice is best described as which of the following?", "options": [{"text": "Redlining, because the agent is using race to determine the financial viability of the neighborhood.", "isCorrect": false, "rationale": "Redlining was a federal mortgage-insurance policy denying loans to entire designated neighborhoods. The described practice—an agent deliberately inducing panic selling and then reselling at inflated prices—is blockbusting, a real-estate industry practice."}, {"text": "Blockbusting, because the agent deliberately frightened White homeowners into selling below market, then resold to Black families above market on exploitative contracts that built no equity.", "isCorrect": true, "rationale": "The source defines blockbusting as real-estate agents frightening White homeowners into quick low-price sales by warning of racial transition, then reselling at inflated prices to Black families—often on contract-for-deed arrangements that built no legal title or equity until fully paid."}, {"text": "Gentrification, because higher-income buyers are entering a lower-income neighborhood and driving up property values.", "isCorrect": false, "rationale": "Gentrification involves higher-income households rehabilitating previously disinvested neighborhoods, typically occurring from the 1990s onward. The described 1960s practice of panic-induced selling and exploitative resale to Black families is blockbusting."}, {"text": "White flight, because White homeowners are departing an urban neighborhood due to racial transition.", "isCorrect": false, "rationale": "White flight refers to the broader demographic trend of White residents leaving cities for suburbs. While the White homeowners in the scenario are leaving, the specific practice being described—the deliberate exploitation by the real-estate agent—is blockbusting."}]}, {"question": "A community advocate in a historically redlined neighborhood argues that gentrification, while improving physical infrastructure and reducing crime, ultimately harms the existing community. Which concept from the source best supports the structural explanation for why gentrification displaces existing residents?", "options": [{"text": "The rank-size rule, because neighborhoods near the city center are expected to become denser than peripheral areas as the city matures.", "isCorrect": false, "rationale": "The rank-size rule describes population distributions across national urban hierarchies, not the economic mechanisms driving neighborhood-level displacement."}, {"text": "The rent gap, because the difference between the current low rent in a disinvested neighborhood and its potential post-redevelopment rent attracts investors who drive displacement through rising land values.", "isCorrect": true, "rationale": "The source attributes Neil Smith's rent gap argument: gentrification is driven primarily by investors responding to the gap between current depressed rents and potential rents after redevelopment—not by residential taste preferences. When the gap is large enough, investors move in and displacement follows."}, {"text": "The filtering process, because as new luxury housing is built at the urban fringe, older central-city housing becomes affordable to lower-income residents over time.", "isCorrect": false, "rationale": "Filtering (from the Hoyt Sector Model) predicts that used housing becomes available to lower-income groups over time—the opposite of gentrification's effect. Gentrification is precisely the failure or reversal of filtering in disinvested neighborhoods."}, {"text": "Invasion and succession, because each new income tier displaces the previous occupants of an urban zone as the city grows outward.", "isCorrect": false, "rationale": "Burgess's invasion and succession describes outward zone expansion in a growing industrial city. Gentrification is an inward movement of higher-income residents into previously lower-income neighborhoods—the reverse spatial direction."}]}, {"question": "Portland, Oregon's Urban Growth Boundary, established in 1979, is frequently cited as a key example of smart growth policy. Which of the following best describes both its intended benefit and a significant criticism it has faced?", "options": [{"text": "Intended benefit: eliminated all carbon emissions from urban transportation. Criticism: the boundary prevented any new housing construction within Portland's city limits.", "isCorrect": false, "rationale": "The source does not claim the boundary eliminated carbon emissions. The boundary restricts development beyond a defined perimeter—it does not prevent new housing within the boundary."}, {"text": "Intended benefit: limited low-density sprawl and preserved agricultural land beyond the urban perimeter for over four decades. Criticism: the policy has contributed to rising housing prices by constraining the supply of developable land.", "isCorrect": true, "rationale": "The source explicitly states both: the Urban Growth Boundary has 'successfully limited sprawl for over four decades,' and critics note it has 'contributed to rising housing prices by constraining the supply of developable land'—a classic supply-demand tension in smart growth policy."}, {"text": "Intended benefit: created a bus rapid transit system equivalent to a metro at a fraction of the cost. Criticism: high-density development along BRT corridors displaced lower-income residents from surrounding neighborhoods.", "isCorrect": false, "rationale": "The bus rapid transit system described is Curitiba, Brazil's—not Portland's. Portland's smart growth example is the Urban Growth Boundary, not BRT."}, {"text": "Intended benefit: closed city streets to automobiles on Sundays to assert that urban space is a public good. Criticism: the program inconvenienced commercial businesses that depend on automobile access.", "isCorrect": false, "rationale": "The street closure program is Bogotá, Colombia's Ciclovía—not Portland's Urban Growth Boundary."}]}, {"question": "Rotterdam's Benthemplein water square functions as a skateboard park during dry weather and as a temporary stormwater reservoir during heavy rainfall. This design approach is best described as an example of which climate-adaptation strategy?", "options": [{"text": "Smart growth, because it concentrates new development in existing urban cores near transit infrastructure rather than allowing suburban sprawl.", "isCorrect": false, "rationale": "Smart growth addresses land-use patterns and density near transit—not the dual-function flood-control/public-space design strategy represented by the water square."}, {"text": "Climate-adaptive urbanism using the 'Room for the River' philosophy, in which flood control is designed as public amenity infrastructure rather than hidden engineering.", "isCorrect": true, "rationale": "The source describes Rotterdam's Benthemplein as embodying the Dutch shift from 'fight the water' to 'make room for the water,' designing flood infrastructure to serve double duty as public space. The water square holds 1.7 million liters while functioning as a public plaza."}, {"text": "Blockbusting, because it converts low-value urban land into higher-value mixed-use public infrastructure.", "isCorrect": false, "rationale": "Blockbusting is a real-estate practice involving racial panic selling, entirely unrelated to climate-adaptive infrastructure design."}, {"text": "Transit-oriented development, because the water square concentrates density around a transportation node to reduce automobile dependence.", "isCorrect": false, "rationale": "Transit-oriented development focuses on concentrating density around transit stops to reduce car trips—not on dual-function stormwater/public-space infrastructure."}]}, {"question": "Consider the following scenario: A coastal agricultural district in a low-lying delta country has historically produced rice on polders. Over several decades, shrimp farming has introduced saline water into the soil. By the 2020s, saltwater intrusion from a combination of shrimp farming and sea-level rise has rendered large areas unfit for rice cultivation, and poor agricultural laborers are migrating to coastal mega-cities. This scenario most closely matches which case study from the source?", "options": [{"text": "Rotterdam's Room for the River program, because the scenario involves the need to manage freshwater systems in a delta environment.", "isCorrect": false, "rationale": "Rotterdam's program is a case of high-income engineered infrastructure adaptation in the Netherlands. The scenario describes rural agricultural abandonment and climate-driven rural-to-urban migration in a low-income setting—the Bangladesh case."}, {"text": "Phoenix's urban heat island mitigation, because extreme temperatures threaten agricultural productivity in both cases.", "isCorrect": false, "rationale": "Phoenix's case addresses urban heat in a desert city through cool pavements and tree canopy expansion. The scenario involves saltwater intrusion and agricultural abandonment, not heat mitigation."}, {"text": "Bangladesh's Khulna/Satkhira coastal districts, where shrimp farming and sea-level rise have driven saltwater intrusion, rendered former rice paddies unproductive, and forced poor laborers to migrate to Dhaka and Chittagong.", "isCorrect": true, "rationale": "The source describes exactly this sequence in Bangladesh: shrimp farming introduces brackish water, sea-level rise intensifies saltwater intrusion, rice farming becomes unviable, and laborers who cannot adapt migrate to coastal mega-cities."}, {"text": "New York City's post-Hurricane Sandy OneNYC resilience plan, because the scenario involves a coastal area requiring seawall and stormwater management infrastructure.", "isCorrect": false, "rationale": "New York's post-Sandy planning involves seawalls and building codes in a high-income urban setting. The scenario describes rural agricultural disruption and climate-driven migration in a low-income deltaic country."}]}, {"question": "Jeff Speck's walkability framework argues that a city is truly walkable only when walking is simultaneously useful, safe, comfortable, and interesting. A zoning code that legally separates all residential areas from all commercial uses most directly undermines which of these four conditions?", "options": [{"text": "Safety, because segregated zoning forces pedestrians to cross dangerous arterial roads to reach commercial areas.", "isCorrect": false, "rationale": "While separated zoning may create dangerous crossings, the source specifically identifies 'useful' as the condition most directly threatened by automobile-dependent zoning that separates residential from commercial uses—making walking to shops 'structurally impossible.'"}, {"text": "Usefulness, because separating residential from commercial uses makes it structurally impossible to walk to shops and services, eliminating a basic reason to walk.", "isCorrect": true, "rationale": "The source specifically states that conventional American zoning separates residential from commercial uses 'in ways that make walking to shops and services structurally impossible,' which most directly attacks the 'useful' condition in Speck's framework."}, {"text": "Comfort, because segregated zoning produces monotonous landscapes with long stretches of single-family houses that lack shade and street furniture.", "isCorrect": false, "rationale": "Comfort involves physical amenities like shade and street design. While separated zoning may reduce comfort, the source identifies usefulness—not comfort—as the condition most directly threatened when commercial uses are legally excluded from residential areas."}, {"text": "Interest, because segregated zoning produces homogeneous neighborhoods without the visual variety that makes walking engaging.", "isCorrect": false, "rationale": "Interest relates to the visual and sensory character of streets. The source links the 'interesting' condition to high crime as the primary threat, not to separated zoning—which most directly undermines usefulness."}]}, {"question": "The source describes the Bangladesh shrimp-farming case as illustrating how 'climate change translates local agricultural decisions into regional migration pressures and national urban growth trajectories—a chain that operates across multiple geographic scales.' Which scale-analysis framing best describes the full chain?", "options": [{"text": "Global carbon emissions → global sea-level rise → regional delta saltwater intrusion → local farm abandonment → national urban migration to Dhaka and Chittagong.", "isCorrect": true, "rationale": "The source explicitly describes this multi-scale cascade: global carbon emissions produce sea-level rise at the global scale, saltwater intrusion operates at the regional delta scale, individual farmers respond at the local scale, and the aggregate effect is a migration stream reshaping national urban systems."}, {"text": "Local shrimp farming decisions → regional soil salinization → national food-security crisis → global commodity price increases.", "isCorrect": false, "rationale": "While shrimp farming contributes to salinization, the source emphasizes that sea-level rise (a global process driven by global carbon emissions) intensifies the intrusion. The chain the source traces ends in national urban migration, not global commodity prices."}, {"text": "National government shrimp-export policies → regional land-use conversion → local agricultural labor surplus → global migration streams.", "isCorrect": false, "rationale": "The source focuses on climate-driven environmental change (sea-level rise + saltwater intrusion) as the mechanism—not national export policy as the initiating force. The migration described is domestic (to Dhaka and Chittagong), not global."}, {"text": "Local flooding events → regional infrastructure failure → national disaster relief programs → global climate-adaptation funding.", "isCorrect": false, "rationale": "The Bangladesh case is about agricultural abandonment and rural-to-urban migration driven by long-term salinization, not acute flooding events triggering disaster relief programs."}]}, {"question": "Which of the following best explains why James Baldwin's 1963 observation—'urban renewal means Negro removal'—has been largely validated by subsequent urban history research?", "options": [{"text": "Urban renewal programs applied to all low-income neighborhoods equally, and Black communities happened to be overrepresented in low-income areas because of prior economic disadvantages.", "isCorrect": false, "rationale": "The source does not describe urban renewal as race-neutral in application. It states that the 'blighted' designation 'overwhelmingly targeted low-income Black and immigrant communities,' indicating racial targeting beyond simple income geography."}, {"text": "Federal urban renewal programs, authorized by the Housing Act of 1949, empowered cities to demolish neighborhoods designated 'blighted'—a designation that overwhelmingly targeted Black and immigrant communities—and replace them with highways, stadiums, or upscale housing.", "isCorrect": true, "rationale": "The source directly supports Baldwin's characterization: urban renewal programs empowered cities to demolish 'blighted' neighborhoods—a designation that overwhelmingly targeted low-income Black and immigrant communities—and replace them with highways, sports stadiums, universities, or upscale housing."}, {"text": "Urban renewal was a voluntary program in which Black communities chose to relocate in exchange for improved public housing built on the cleared land.", "isCorrect": false, "rationale": "Urban renewal was not voluntary—it involved federal empowerment of cities to demolish neighborhoods. The source does not describe it as a voluntary exchange program; it describes it as displacement."}, {"text": "Redlining prevented Black residents from moving to suburbs, so they were disproportionately displaced by urban renewal because they had no alternative housing markets.", "isCorrect": false, "rationale": "While redlining did limit Black housing options, the source's explanation for why Baldwin's characterization was validated focuses on the deliberate targeting of Black and immigrant neighborhoods by the 'blighted' designation—not primarily on their lack of suburban alternatives."}]}, {"question": "Curitiba, Brazil designed a bus rapid transit (BRT) system in the 1970s with high-density development concentrated along BRT corridors and lower-density housing filling the areas between. A geographer notes that this metropolitan spatial logic mirrors a principle from Walter Christaller's central place theory transposed to a city scale. Which principle does this most closely resemble?", "options": [{"text": "The K=3 marketing principle, which maximizes the number of central places to minimize consumer travel distances to everyday goods.", "isCorrect": false, "rationale": "K=3 places lower-order centers at the corners of higher-order hexagons to maximize the number of service centers. Curitiba's BRT-corridor development concentrates density along linear transit arteries—closer to K=4's emphasis on roads linking higher-order centers."}, {"text": "The K=4 transportation principle, which aligns lower-order places along routes between higher-order cities to minimize transport infrastructure cost—a logic that when applied at the metropolitan scale produces dense development concentrated along transit corridors.", "isCorrect": true, "rationale": "The source explicitly draws this parallel: Curitiba's BRT design, 'concentrating high-density development along the BRT corridors,' embodies 'exactly the spatial logic that Christaller's transportation principle would predict, transposed from the regional scale to the metropolitan scale.'"}, {"text": "The K=7 administrative principle, which ensures that each transit station serves as an unambiguous administrative center for the surrounding residential neighborhoods.", "isCorrect": false, "rationale": "K=7 is about administrative containment—ensuring lower-order places fall under a single jurisdiction. Curitiba's model is about aligning development density with transport routes, which the source connects to K=4, not K=7."}, {"text": "The rank-size rule, because Curitiba's transit system ensures the largest BRT terminal serves the most riders, with smaller stations serving proportionally fewer passengers.", "isCorrect": false, "rationale": "The rank-size rule is an empirical description of national city-population distributions, not a principle about the spatial relationship between transit infrastructure and residential density at the metropolitan scale."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
