<body>

        <div class="subtitle">AP Human Geography &mdash; Globalization, Trade, and Sustainable Development</div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Read the following excerpt: 'The Tariff Act of 1930 … raised average ad valorem rates on dutiable imports to approximately fifty per cent … Within months, over 25 foreign governments had retaliated … Global trade, already contracting under the weight of the Depression, collapsed further … the value of world merchandise trade fell by more than sixty per cent between 1929 and 1933.' Based on this source, which conclusion is most directly supported?", "options": [{"text": "The Smoot-Hawley tariff was the primary cause of the Great Depression, triggering bank failures and unemployment across the United States.", "isCorrect": false, "rationale": "The text and the primary source both specify that 'economists of subsequent generations reached near-consensus that Smoot-Hawley did not cause the Great Depression — the contraction was already under way.' The tariff deepened and prolonged the Depression; it did not cause it."}, {"text": "Retaliatory protectionism — each country raising tariffs in response to others — can compound trade contraction beyond what any single tariff would produce, deepening a pre-existing economic crisis.", "isCorrect": true, "rationale": "The primary source describes a cascade: the US raised tariffs; over 25 governments retaliated; global trade volumes fell 60%. This is the canonical example of retaliatory protectionism amplifying an economic downturn, which the text calls 'the canonical case study in the failure of protectionism.'"}, {"text": "Tariffs are always more economically destructive than quotas because they apply to a larger number of product categories simultaneously.", "isCorrect": false, "rationale": "The text distinguishes tariffs from quotas without asserting one is always more destructive than the other. Quotas cap physical volume regardless of price, while tariffs allow unlimited imports at a higher price — different mechanisms with different economic effects depending on context."}, {"text": "The Smoot-Hawley Tariff reduced the US trade deficit by making imports more expensive, demonstrating that protectionism can achieve its intended economic goals.", "isCorrect": false, "rationale": "The text presents Smoot-Hawley as a case study in self-defeating protectionism: the intended goal (protecting domestic farmers and manufacturers) was undermined by foreign retaliation that collapsed global trade and harmed US export sectors, particularly agriculture."}], "id": "q01"}, {"question": "David Ricardo's principle of comparative advantage is described as the theoretical foundation of international trade. Country A can produce both wheat and cloth more efficiently than Country B, but Country A is relatively more productive at wheat. According to comparative advantage theory, what should happen?", "options": [{"text": "Country A should produce both wheat and cloth, because it is absolutely more productive at both, and trade would only give Country B unearned economic benefits.", "isCorrect": false, "rationale": "Comparative advantage specifically argues that even if one country is absolutely more productive at everything, both countries gain from specialization. The relevant concept is opportunity cost, not absolute productivity. Country A forfeits less by specializing in wheat; Country B forfeits less by specializing in cloth."}, {"text": "Country A should specialize in wheat and Country B in cloth, because each has a lower opportunity cost in its respective good, and trade increases total output of both.", "isCorrect": true, "rationale": "The text explains comparative advantage: 'even if one country is absolutely more productive at every good, both countries gain from trade if each specializes in the goods at which it is relatively more productive.' Country A's opportunity cost of producing wheat is lower; Country B's opportunity cost of producing cloth is lower. Specialization and trade raises total output."}, {"text": "Neither country should specialize, because free trade without tariffs eliminates government revenue and leaves countries vulnerable to supply disruptions.", "isCorrect": false, "rationale": "This describes arguments for protectionism, not comparative advantage. Ricardo's model shows that specialization and free trade increase total output for both countries. While governments do use tariffs for revenue and protection, this contradicts the theoretical case for free trade."}, {"text": "Country B should specialize in both goods and trade the surplus to Country A, because less-productive countries gain more from trade than already-efficient countries.", "isCorrect": false, "rationale": "Comparative advantage does not hold that the less-productive country should produce both goods. The principle is about relative productivity (opportunity cost), not absolute productivity. Each country specializes in the good where its relative advantage is greatest — or its relative disadvantage is least."}], "id": "q02"}, {"question": "The WTO was established in January 1995. The text identifies two key advances the WTO made over its predecessor, GATT. Which statement best captures these advances?", "options": [{"text": "The WTO eliminated all remaining tariffs among its members and replaced GATT's most-favored-nation principle with bilateral preferential agreements.", "isCorrect": false, "rationale": "The WTO did not eliminate all tariffs — GATT had reduced average tariffs from 40% to under 5% by 1994, but the WTO governs continued negotiation, not zero tariffs. The WTO maintained and extended the MFN principle; it did not replace it with bilateral agreements."}, {"text": "The WTO added a binding dispute-resolution mechanism (the Appellate Body) and extended coverage to services (GATS) and intellectual property (TRIPS), beyond GATT's goods-only framework.", "isCorrect": true, "rationale": "The text states the WTO 'added a binding dispute-resolution mechanism (the Appellate Body) and extended coverage to services (the General Agreement on Trade in Services, GATS) and intellectual property (the Agreement on Trade-Related Intellectual Property Rights, TRIPS).'"}, {"text": "The WTO replaced GATT's consensus-based governance with majority voting, allowing trade agreements to pass over the objections of individual members.", "isCorrect": false, "rationale": "The text states the WTO 'is governed by consensus, which gives any member a veto and has produced gridlock in multilateral negotiations since the Doha Round (launched 2001) collapsed without agreement.' The WTO retained, not replaced, consensus governance."}, {"text": "The WTO merged with the IMF and World Bank to create a single international economic governance institution with authority over trade, finance, and development lending.", "isCorrect": false, "rationale": "The WTO, IMF, and World Bank are separate institutions with distinct mandates. The text discusses them separately: the IMF provides short-term balance-of-payments financing; the World Bank provides development lending; the WTO governs trade. They were not merged."}], "id": "q03"}, {"question": "Economists Autor, Dorn, and Hanson (2013) estimated that Chinese import competition cost the US approximately 2–2.4 million manufacturing jobs between 1999 and 2011. The 'China shock' research is said to help explain a political puzzle. What is that puzzle and how does the research resolve it?", "options": [{"text": "The puzzle is why US GDP growth slowed after China's WTO accession, despite predictions that free trade increases total output; the research shows China cheated on WTO rules, reducing expected gains.", "isCorrect": false, "rationale": "The text does not frame the puzzle as GDP growth slowdown or WTO rule-breaking. US GDP continued to grow after China's accession. The puzzle is political, not macroeconomic: why did broad economic gains coexist with intense political backlash against trade?"}, {"text": "The puzzle is why broad economic gains from trade coexisted with intense political backlash; the research resolves it by showing that losses were geographically concentrated in specific communities while gains were widely dispersed as slightly lower prices.", "isCorrect": true, "rationale": "The text states: 'The China-shock research helped explain a political puzzle: why did broad-based economic gains from trade coexist with intense political backlash? The answer is distributional and spatial: gains were widely dispersed (slightly lower prices for all consumers), while losses were concentrated (severe unemployment in specific communities). The geographically concentrated nature of trade losses makes them politically potent.'"}, {"text": "The puzzle is why Chinese workers did not emigrate to the US to fill the jobs created by trade expansion; the research shows immigration restrictions prevented labor market equalization.", "isCorrect": false, "rationale": "The text does not discuss labor migration as the China shock puzzle. The puzzle is entirely about why US political opposition to trade intensified despite aggregate economic gains, explained by the geographic concentration of job losses."}, {"text": "The puzzle is why US manufacturing employment fell even as wages rose; the research shows automation, not trade with China, was the dominant cause of employment loss.", "isCorrect": false, "rationale": "The text acknowledges that automation and trade both reduced manufacturing employment, but the China shock research specifically attributes 2–2.4 million job losses to Chinese import competition. The political puzzle is about concentrated geographic losses, not a wages-vs-employment paradox."}], "id": "q04"}, {"question": "The COVID-19 pandemic revealed that approximately 70% of the Active Pharmaceutical Ingredients (APIs) used in developing-country generic drugs are produced in India. The US had largely exited API manufacturing in the 1990s. What does this supply-chain geography illustrate about the tension between efficiency and resilience?", "options": [{"text": "Geographic concentration of production in India maximizes global API supply chain resilience because a single major producer can scale output rapidly during emergencies.", "isCorrect": false, "rationale": "The text presents India's API dominance as creating vulnerability, not resilience: 'when COVID-19 struck in 2020, shutdowns at Chinese chemical facilities disrupted the API supply chain. Firms found they had no domestic alternative.' Geographic concentration creates a single point of failure, not a resilient buffer."}, {"text": "Global supply-chain efficiency and supply-chain resilience are in tension: geographic concentration of production minimizes costs but creates strategic vulnerabilities that market prices alone cannot capture.", "isCorrect": true, "rationale": "The text states explicitly: 'global supply-chain efficiency and supply-chain resilience are in tension — and that the geographic concentration of production creates strategic vulnerabilities that market prices alone cannot capture.' The US exited API manufacturing for cost reasons but lost the resilience benefit of domestic supply."}, {"text": "Comparative advantage theory correctly predicted that India would specialize in APIs, and the COVID disruption was an anomaly that validates free-trade specialization overall.", "isCorrect": false, "rationale": "While comparative advantage explains why production concentrated in India, the text's point is normative: this efficiency-driven geographic concentration created strategic public-health vulnerabilities that were not priced into the market. The lesson is about the limits of pure market logic for critical goods, not a validation of free trade."}, {"text": "The pharmaceutical supply chain demonstrates that WTO rules must be reformed to require all countries to maintain domestic production capacity for essential medicines.", "isCorrect": false, "rationale": "The text does not argue for specific WTO reforms. It describes the episode as catalyzing US legislation and EU industrial policy to reshore critical medical supply chains, but frames it as a broader lesson about the efficiency-resilience tension — not a prescription for WTO rule changes."}], "id": "q05"}, {"question": "UN Sustainable Development Goal 13 (Climate Action) is described as being 'in direct tension' with Goal 8 (Decent Work and Economic Growth). Which scenario from the text best illustrates this tension?", "options": [{"text": "Rich countries are unwilling to fund climate adaptation in poor countries, causing the SDGs to fail for lack of financing (Goal 17: Partnerships).", "isCorrect": false, "rationale": "While development financing is a real SDG challenge, the text specifically identifies the tension as between climate action and industrialization-based economic growth for developing countries — not as a financing gap between rich and poor nations."}, {"text": "Developing economies cannot simultaneously eliminate carbon emissions and industrialize at the pace required to lift populations out of poverty.", "isCorrect": true, "rationale": "The text states: 'Goal 13 (Climate Action) is in direct tension with Goal 8 (Decent Work and Economic Growth) for many developing economies that cannot simultaneously eliminate carbon emissions and industrialize at the pace required to lift populations out of poverty.' This is the direct statement of the tension."}, {"text": "Industrial growth in core countries generates carbon emissions that harm peripheral countries disproportionately, requiring core countries to transfer clean technology to the periphery.", "isCorrect": false, "rationale": "While climate justice arguments include this dynamic, the text's specific statement of tension is about developing economies facing a trade-off between industrialization-led growth and carbon reduction — not about technology transfers from core to periphery."}, {"text": "The SDGs were adopted in 2015, but most goals are on track for completion by 2030 because global economic growth has accelerated since the 2015 adoption.", "isCorrect": false, "rationale": "The text states a 2023 mid-term assessment found 'most goals off track' — the opposite of on track. It also notes the COVID-19 pandemic reversed some gains, returning approximately 97 million additional people to extreme poverty in 2020."}], "id": "q06"}, {"question": "Muhammad Yunus founded Grameen Bank in 1983, using group lending as a substitute for collateral. A student argues that microfinance is the most effective anti-poverty tool because it bypasses corrupt state institutions and directly empowers the poor. Based on the text's account of the evidence, how should this claim be assessed?", "options": [{"text": "Fully supported — the text presents randomized controlled trials showing microfinance reliably lifts households out of poverty and significantly empowers women.", "isCorrect": false, "rationale": "The text explicitly states the evidence is mixed: 'Randomized controlled trials in India, Bangladesh, and Ethiopia found that microcredit had modest positive effects on enterprise formation and consumption but did not reliably lift households out of poverty or significantly empower women.' The student's claim overstates the evidence."}, {"text": "Partially supported but overstated — RCTs found modest positive effects on enterprise formation but not reliable poverty escape; critics point to mission drift toward high interest rates and the 2010 Andhra Pradesh crisis as evidence of harm.", "isCorrect": true, "rationale": "The text presents a balanced assessment: 'modest positive effects on enterprise formation and consumption but did not reliably lift households out of poverty.' It also notes mission drift (20–100% interest rates in some cases) and 'the 2010 microfinance crisis in Andhra Pradesh, India, where aggressive lending practices contributed to a wave of farmer suicides.'"}, {"text": "Unsupported — the text presents microfinance as uniformly harmful, causing more farmer suicides and indebtedness than economic empowerment.", "isCorrect": false, "rationale": "The text does not argue microfinance is uniformly harmful. It acknowledges positive effects (enterprise formation, consumption) while noting limits and risks (mission drift, Andhra Pradesh crisis). The text's overall assessment is 'mixed,' not uniformly negative."}, {"text": "Fully supported — Yunus's Nobel Peace Prize (2006) validates microfinance as a uniquely effective poverty-reduction mechanism endorsed by the international community.", "isCorrect": false, "rationale": "The Nobel Prize validates Yunus's contribution to development thinking, but the text notes the subsequent evidence is mixed and the field experienced a crisis in 2010. The prize's endorsement does not override the empirical evidence the text presents."}], "id": "q07"}, {"question": "The text distinguishes between tariffs, quotas, and non-tariff barriers. A country wants to limit imported steel without explicitly setting a volume ceiling and without levying a tax. It mandates that all steel sold domestically must include a certificate of origin from a government-approved domestic facility. Which category of trade barrier does this represent, and what makes it different from a tariff?", "options": [{"text": "A tariff, because it adds a cost burden to imported steel equivalent to a tax collected at the border.", "isCorrect": false, "rationale": "A tariff is explicitly a tax levied on imported goods at the border. The certificate-of-origin requirement is a regulatory measure that restricts market access without being an explicit tax or volume limit — the definition of a non-tariff barrier."}, {"text": "A non-tariff barrier, because it is a regulatory measure that functions as a trade restriction without being an explicit tax or volume limit.", "isCorrect": true, "rationale": "The text defines non-tariff barriers as 'regulatory measures that function as trade restrictions without being explicit taxes or volume limits: product safety standards that foreign manufacturers cannot meet, packaging requirements that add cost, customs procedures designed to delay imports, or \"buy domestic\" requirements in government procurement.' The certificate-of-origin requirement fits this definition."}, {"text": "A quota, because it effectively limits the volume of imported steel by creating a bureaucratic bottleneck that caps the flow.", "isCorrect": false, "rationale": "A quota is a quantity limit specifying the maximum volume that may be imported. This policy does not set a volume ceiling — it imposes a certification requirement. It is a non-tariff barrier that restricts access through regulatory compliance, not through a numerical volume cap."}, {"text": "A most-favored-nation violation, because GATT requires all WTO members to apply identical tariff rates to all trading partners.", "isCorrect": false, "rationale": "The MFN principle requires that tariff concessions granted to one WTO member be extended to all. The certificate requirement is a non-tariff barrier, not a tariff concession. While it may violate WTO rules on technical barriers to trade, the text does not frame the classification of this measure around MFN status."}], "id": "q08"}, {"question": "The text describes the pharmaceutical supply chain as operating at multiple geographic scales simultaneously. At the local scale, an API factory in Hyderabad employs chemical engineers. At the national scale, India's dominance of global API supply creates both leverage and vulnerability. At the global scale, concentration creates public-health risks. Which analytical skill does the text explicitly label this as demonstrating?", "options": [{"text": "Concepts and Processes (CP) — because the pharmaceutical example applies Weber's Least Cost Theory to show why API production migrated to India.", "isCorrect": false, "rationale": "The text's Skill Connection explicitly labels the pharmaceutical supply chain as a 'Scale Analysis (SC) case,' not a Concepts and Processes (CP) application. CP skills are associated with Weber's location triangle (as in Section 7.1), not multi-scale policy analysis."}, {"text": "Scale Analysis (SC) — because the same event (API production concentration) generates different policy problems depending on which geographic scale is analyzed.", "isCorrect": true, "rationale": "The text's Skill Connection states: 'The global pharmaceutical supply chain is a textbook Scale Analysis (SC) case … Scale-crossing analysis asks: what looks like a corporate cost-minimization decision at the firm level looks like a national security issue at the state level and a global public-health governance problem at the international level.'"}, {"text": "Spatial Relationships (SR) — because the pharmaceutical supply chain illustrates how core-periphery dynamics produce geographically dispersed effects from a common cause.", "isCorrect": false, "rationale": "The text labels the Rust Belt–Sun Belt–Maquiladora triangle as the Spatial Relationships (SR) case in this unit. The pharmaceutical supply chain is explicitly labeled a Scale Analysis (SC) case because it requires analyzing the same phenomenon across local, national, and global scales."}, {"text": "Data Analysis (DA) — because the pharmaceutical case requires interpreting quantitative data on API production shares to assess supply-chain concentration risk.", "isCorrect": false, "rationale": "The text labels development indicators (HDI, GII, GNI per capita tables) as Data Analysis (DA) tools in Section 7.2. The pharmaceutical supply chain is explicitly labeled Scale Analysis (SC), not DA, in the Skill Connection box in Section 7.4."}], "id": "q09"}, {"question": "The text argues that the post-WWII multilateral trade architecture — GATT (1947), WTO (1995), and the IMF — was 'consciously designed' as a response to a specific historical episode. Which episode, and what aspect of the post-WWII architecture did it most directly shape?", "options": [{"text": "The Great War (1914–1918), which showed that economic interdependence reduces conflict; the post-WWII architecture was designed to tie nations together economically to prevent another world war.", "isCorrect": false, "rationale": "While economic interdependence and peace are related themes in international political economy, the text specifically identifies Smoot-Hawley and the trade collapse of 1929–1934 as the negative reference point for the postwar trade architecture, not WWI."}, {"text": "The Smoot-Hawley tariff and the 60% collapse in world trade (1929–1934), which became the negative reference point that the GATT–WTO multilateral framework was explicitly designed to prevent from recurring.", "isCorrect": true, "rationale": "The text states: 'Smoot-Hawley is thus simultaneously a textbook case of self-defeating protectionism and the negative reference point against which the entire postwar liberal trading order was consciously designed.' The Reciprocal Trade Agreements Act (1934) and GATT (1947) both trace directly to the Smoot-Hawley lesson."}, {"text": "The British Corn Laws (1846), whose repeal demonstrated that free trade enriches all nations; the GATT framework codified this insight into binding multilateral commitments.", "isCorrect": false, "rationale": "While the Corn Laws repeal is a foundational event in free-trade history, the text specifically identifies Smoot-Hawley as the negative reference point for the postwar architecture. The Reciprocal Trade Agreements Act of 1934 and GATT (1947) were direct institutional responses to the 1930s trade collapse."}, {"text": "OPEC's 1973 oil embargo, which showed that commodity-exporting countries could weaponize trade; the WTO dispute mechanism was designed specifically to prevent resource cartels.", "isCorrect": false, "rationale": "The WTO was established in 1995, two decades after the 1973 oil embargo, and its dispute-resolution mechanism was designed to adjudicate the full range of trade disagreements — not specifically to prevent commodity cartels. The text traces the postwar trade architecture to Smoot-Hawley, not the oil embargo."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
