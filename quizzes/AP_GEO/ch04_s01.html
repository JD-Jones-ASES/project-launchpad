<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; States, Nations, and Sovereignty</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A political science student lists four criteria for statehood from the 1933 Montevideo Convention: (1) permanent population, (2) defined territory, (3) effective government, and (4) capacity to enter into relations with other states. A territory has a permanent population, a defined territory, and an effective government — but no other state recognizes it as legitimate. Which of the following best describes this territory's status?", "options": [{"text": "It fully meets all Montevideo criteria and is therefore a sovereign state.", "isCorrect": false, "rationale": "The territory fails criterion 4 — the capacity to enter into relations with other states — because no outside power recognizes it. All four criteria must be present for full statehood."}, {"text": "It meets three of the four Montevideo criteria but lacks the international recognition required to be considered a fully sovereign state.", "isCorrect": true, "rationale": "The text explicitly uses Kosovo and Taiwan as examples of territories that satisfy the first three criteria but struggle with the fourth — recognition by other states — and therefore do not fully achieve sovereignty under the Montevideo framework."}, {"text": "Recognition by other states is irrelevant to sovereignty; internal control alone determines statehood.", "isCorrect": false, "rationale": "The text distinguishes internal sovereignty (monopoly on legitimate force) from external sovereignty (recognition by other states) and states that both conditions must be present for sovereignty to be fully meaningful."}, {"text": "The territory is best classified as a stateless nation because its government is not recognized.", "isCorrect": false, "rationale": "A stateless nation is a cultural or ethnic group lacking its own state — not a government lacking recognition. The scenario describes a political entity with governance structures, not a cultural community without any state."}], "id": "q01"}, {"question": "Which of the following pairs of countries best illustrates the nation-state ideal, in which cultural and political boundaries closely coincide?", "options": [{"text": "Russia and Belgium", "isCorrect": false, "rationale": "Russia contains more than 100 recognized ethnic groups and Belgium is divided between Dutch-speaking Flemish and French-speaking Walloons — both are multinational states, the opposite of the nation-state ideal."}, {"text": "Japan and Iceland", "isCorrect": true, "rationale": "The text cites Japan as coming as close to the nation-state ideal as any large country — a relatively homogeneous language and cultural community — and Iceland as another frequently cited example: small, geographically isolated, and culturally cohesive with a language spoken nowhere else on earth."}, {"text": "South Korea and North Korea", "isCorrect": false, "rationale": "The two Koreas represent a multi-state nation — one cultural group (Koreans) divided between two separate political states — which is a mismatch between nation and state, not an alignment."}, {"text": "Nigeria and India", "isCorrect": false, "rationale": "Nigeria contains hundreds of ethnolinguistic groups and India is a multi-religious, multilingual federal republic. Both are multinational states with significant nation-state mismatches."}], "id": "q02"}, {"question": "The Peace of Westphalia (1648) is described as the foundation of the modern state system. Which of the following principles did it establish that is most directly relevant to the modern concept of sovereignty?", "options": [{"text": "That the United Nations would serve as the arbiter of all territorial disputes.", "isCorrect": false, "rationale": "The United Nations was founded in 1945, nearly three centuries after Westphalia. The 1648 treaties predated any such global organization."}, {"text": "That European states had the right to colonize non-European territories freely.", "isCorrect": false, "rationale": "While colonialism did expand after 1648, the Westphalian treaties focused on sovereign equality among European rulers and non-interference — not a license for colonization. The Berlin Conference (1884–85) later provided the framework for colonial partition of Africa."}, {"text": "That signatory states recognized each other's sovereignty as equal in legal standing, with rulers having the right to determine their territories' affairs without outside interference.", "isCorrect": true, "rationale": "The text states that the Peace of Westphalia established that rulers had the right to determine the religion of their territory without outside interference, and that signatory states recognized each other's sovereignty as equal in legal standing — the core of the Westphalian system."}, {"text": "That cultural nations had the right to self-determination and their own independent states.", "isCorrect": false, "rationale": "The principle of national self-determination emerged much later, associated with Woodrow Wilson and the 1919 Paris Peace Conference. Westphalia concerned the rights of rulers over their territories, not the rights of cultural nations."}], "id": "q03"}, {"question": "An estimated 25–35 million Kurds live dispersed across southeastern Turkey, northern Syria, northern Iraq, and northwestern Iran. They share dialects, traditions, and a strong sense of national identity, yet no recognized Kurdish state exists. Which political-geographic concept best describes this situation?", "options": [{"text": "Multi-state nation", "isCorrect": false, "rationale": "A multi-state nation describes a cultural group divided between two or more existing states — such as the Korean people split between North and South Korea. The Kurds are not divided between states they govern; they lack any state of their own."}, {"text": "Multinational state", "isCorrect": false, "rationale": "A multinational state is a single political state containing two or more nations (e.g., Russia or Belgium). The Kurds are not a state containing multiple nations; they are a nation without a state."}, {"text": "Stateless nation", "isCorrect": true, "rationale": "The text explicitly identifies the Kurds as the most frequently cited example of a stateless nation — a cultural or ethnic group that perceives itself as a distinct nation but lacks its own sovereign state, with roughly 25–35 million Kurds dispersed across four countries."}, {"text": "Nation-state", "isCorrect": false, "rationale": "A nation-state is the idealized form in which cultural and political boundaries coincide. The Kurdish case is the opposite: a coherent cultural nation with no corresponding political state."}], "id": "q04"}, {"question": "Belgium regularly experiences political deadlock between its Dutch-speaking Flemish north and French-speaking Walloon south — in 2010–2011 going 589 days without a functioning federal government. Which concept does Belgium most clearly illustrate?", "options": [{"text": "Stateless nation, because French-speaking Walloons lack a state of their own.", "isCorrect": false, "rationale": "The Walloons are a linguistic community within Belgium; they have political representation within that state. A stateless nation is a group with no state at all, such as the Kurds or Palestinians."}, {"text": "Multinational state, because a single state contains two or more nations with distinct identities that produce political strain.", "isCorrect": true, "rationale": "The text describes Belgium as a sharp case study of the multinational state — a state roughly the size of Maryland divided between Flemish and Walloon communities — and notes that the resulting tensions have produced devolution and, as in 2010–2011, prolonged governmental paralysis."}, {"text": "Multi-state nation, because the Flemish share cultural ties with the Netherlands.", "isCorrect": false, "rationale": "While linguistic overlap between Flemish and Dutch exists, the text uses Belgium to illustrate the multinational state problem, not the multi-state nation concept. The key issue is strains within Belgium, not transborder cultural unity."}, {"text": "Confederation, because Belgium's federal structure delegates authority downward to linguistic communities.", "isCorrect": false, "rationale": "Belgium is a federal state, not a confederation. The text distinguishes federal states (where the constitution divides sovereignty between levels) from confederations (where sovereign states delegate limited authority upward to a common body)."}], "id": "q05"}, {"question": "Consider the following excerpt from the 1648 Treaty of Westphalia: \"it shall be free perpetually to each of the States of the Empire, to make Alliances with Strangers for their Preservation and Safety.\" Which concept from political geography does this passage most directly support?", "options": [{"text": "Internal sovereignty, because it describes a government's monopoly on the use of force within its borders.", "isCorrect": false, "rationale": "Internal sovereignty refers to a government's control over its own territory. The passage describes the right to form alliances with outside parties, which is a dimension of external relations, not internal authority."}, {"text": "External sovereignty, because it establishes that states may enter into independent international relations without requiring another authority's approval.", "isCorrect": true, "rationale": "The passage grants each state the permanent right to form alliances with foreign powers for its own preservation — directly expressing external sovereignty, the principle that other states recognize a government's exclusive right to manage its own affairs, including making alliances."}, {"text": "Supranationalism, because it authorizes an international body to approve alliances between states.", "isCorrect": false, "rationale": "The passage grants states the freedom to make alliances without requiring anyone else's approval (provided they are not against the Emperor and Empire). Supranationalism involves states pooling sovereignty upward — the opposite dynamic."}, {"text": "Devolution, because it transfers alliance-making authority from the emperor to lower-level states.", "isCorrect": false, "rationale": "Devolution is the transfer of authority from a central government to sub-national units within a state. The passage addresses sovereign states' rights in international relations, not the internal distribution of power."}], "id": "q06"}, {"question": "Myanmar's 1982 Citizenship Law recognized 135 'national races' but excluded the Rohingya, who were subsequently stripped of citizenship. Beginning in 2017, approximately 700,000 Rohingya were driven into Bangladesh. Which of the following best explains how this case illustrates the concept of statelessness?", "options": [{"text": "The Rohingya became a stateless nation because they voluntarily chose to migrate to Bangladesh in search of economic opportunities.", "isCorrect": false, "rationale": "The text describes coordinated military operations that drove the Rohingya out — this was forced displacement, not voluntary migration. The cause was political violence and legal exclusion, not economic choice."}, {"text": "Statelessness was produced by a deliberate legal and political decision — the 1982 Citizenship Law — that denied the Rohingya recognition as citizens, demonstrating that statelessness is a political condition, not a natural one.", "isCorrect": true, "rationale": "The text explicitly states that 'statelessness is not a natural condition but a political one — the product of deliberate state decisions, imperial line-drawing, and international indifference.' The Rohingya case illustrates how a state law (1982 Citizenship Law) created statelessness by exclusion."}, {"text": "The Rohingya are a multi-state nation because they now live in both Myanmar and Bangladesh.", "isCorrect": false, "rationale": "A multi-state nation is a cultural group whose members govern themselves across two states (e.g., North and South Korea). The Rohingya have no state of their own in either country — they are a stateless nation, not a multi-state one."}, {"text": "The Rohingya exemplify external sovereignty erosion because the UN's inability to intervene shows the limits of international authority.", "isCorrect": false, "rationale": "While the UN's limitations are relevant to the Rohingya case, the question asks specifically about statelessness, which the text grounds in the 1982 Citizenship Law's deliberate exclusion — a domestic political decision, not primarily an international sovereignty question."}], "id": "q07"}, {"question": "Which of the following developments best illustrates how supranational organizations have eroded the Westphalian ideal of absolute sovereignty since 1945?", "options": [{"text": "The establishment of the Berlin Wall in 1961, which physically enforced the boundary between East and West Germany.", "isCorrect": false, "rationale": "The Berlin Wall was an expression of a state asserting control over its own territory — consistent with the Westphalian principle of internal sovereignty — not an erosion of it by an outside body."}, {"text": "The European Union requiring member states to accept the supremacy of EU law in specified domains, limiting their ability to act unilaterally.", "isCorrect": true, "rationale": "The text explicitly identifies supranational organizations like the EU, which place binding obligations on member states, as one of the key forces eroding the Westphalian ideal of absolute sovereignty. EU law supremacy directly constrains member states' unilateral authority."}, {"text": "Japan's constitutional homogeneity, which has allowed it to remain the closest approximation to a true nation-state.", "isCorrect": false, "rationale": "Japan's cultural homogeneity illustrates the nation-state concept, not sovereignty erosion. The question asks about forces eroding absolute sovereignty, which involves external constraints on state authority."}, {"text": "The partition of Korea along the 38th parallel in 1945, which created two separate Korean states from one cultural nation.", "isCorrect": false, "rationale": "Korea's partition illustrates the multi-state nation concept. It was imposed by outside powers (the U.S. and USSR) post-WWII, but it created states rather than eroding the sovereignty of existing ones through supranational obligations."}], "id": "q08"}, {"question": "San Marino (61 sq km) and Nauru (21 sq km) are recognized member states of the United Nations, yet their external sovereignty depends 'entirely on the goodwill of larger neighbors.' Which of the following best explains this apparent paradox?", "options": [{"text": "San Marino and Nauru do not actually meet the Montevideo criteria for statehood because they lack effective governments.", "isCorrect": false, "rationale": "Both states meet all four Montevideo criteria and are UN members. The paradox is not about formal criteria but about the practical gap between theoretical and actual sovereignty."}, {"text": "Formal legal sovereignty (UN membership, recognized borders) does not guarantee practical sovereignty; size, economic power, and military capacity all shape how effectively a state can exercise its theoretical rights.", "isCorrect": true, "rationale": "The text states that 'not all states are equally sovereign in practice' and lists size, economic power, military capacity, and strategic location as factors shaping how robustly a state can exercise its sovereignty — directly explaining the microstates' vulnerability despite formal recognition."}, {"text": "Microstates like San Marino are stateless nations because their small size prevents genuine self-governance.", "isCorrect": false, "rationale": "A stateless nation is a cultural group without a state. San Marino is a recognized state with a government — the issue is not the absence of statehood but the limits of practical power relative to larger neighbors."}, {"text": "The UN Charter requires microstates to defer all foreign policy decisions to their larger neighbors as a condition of membership.", "isCorrect": false, "rationale": "No such requirement exists in the UN Charter. The vulnerability of microstates arises from power asymmetries, not from any formal legal obligation to defer to larger neighbors."}], "id": "q09"}, {"question": "A coastal island nation in the Pacific has a permanent population, a defined territory, a functioning government, and full international recognition. However, scientists project that rising sea levels will submerge the entire island within 50 years. Which challenge to political geography does this scenario most directly illustrate?", "options": [{"text": "It demonstrates the multi-state nation problem, because the island's population will eventually need to share citizenship across multiple host countries.", "isCorrect": false, "rationale": "A multi-state nation involves a cultural group already divided between states they control. The scenario involves a state losing its physical territory — a question about the relationship between territorial statehood and sovereignty, not about nations divided across states."}, {"text": "It shows the limits of the Westphalian system, because climate displacement raises genuine questions about whether sovereignty and statehood can persist when a state's territory disappears.", "isCorrect": true, "rationale": "The text cites Kiribati and Tuvalu as exactly this scenario and poses the questions directly: 'does sovereignty persist? Can a population be a nation without land?' It identifies these as urgent, no-longer-theoretical challenges to the concept of the territorial state."}, {"text": "It exemplifies the organic theory of the state, because a state losing territory is the equivalent of an organism dying.", "isCorrect": false, "rationale": "Ratzel's organic theory was about states growing and competing for Lebensraum. While the metaphor of a dying state has superficial fit, the scenario is about climate displacement challenging the concept of territorial sovereignty — not about competitive territorial expansion."}, {"text": "It illustrates external sovereignty erosion, because the international community has failed to prevent climate change from threatening the state.", "isCorrect": false, "rationale": "External sovereignty erosion involves other states or supranational bodies interfering in a state's affairs. Climate displacement is an environmental process, not an act of interference. The text frames this as a challenge to the territorial basis of statehood itself."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
