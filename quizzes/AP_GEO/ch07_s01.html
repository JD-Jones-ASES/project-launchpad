<script>
var QUESTIONS = [{"question": "A steel company in the 1880s is choosing between two sites: Site A is adjacent to Appalachian coal fields and Mesabi Range iron ore deposits, while Site B is near the large coastal city that consumes most of its steel output. According to Weber's Least Cost Theory, where should the company locate, and why?", "options": [{"text": "Site B, because proximity to consumers reduces the cost of distributing finished steel.", "isCorrect": false, "rationale": "Weber's model predicts weight-losing industries locate near raw materials, not markets. Steel-making is weight-losing: coal and iron ore weigh far more than the finished product, so assembling those inputs near the source minimizes total transport cost."}, {"text": "Site A, because steel-making is a weight-losing industry where raw materials weigh more than the finished product.", "isCorrect": true, "rationale": "The text explicitly states that for weight-losing industries such as steel-making, 'the minimum-cost location is near the raw materials.' Carnegie's Homestead Works outside Pittsburgh is cited as the real-world example — Appalachian coal plus Great Lakes ore delivered via the Erie Canal."}, {"text": "Site B, because agglomeration economies with consumers are stronger than raw-material pull.", "isCorrect": false, "rationale": "Agglomeration economies in Weber's model arise from clustering with related firms and suppliers, not from proximity to end consumers. The raw-material transport weight dominates for steel, pulling location to Site A."}, {"text": "Midway between the two sites, because the location triangle always places the factory at the geometric midpoint.", "isCorrect": false, "rationale": "Weber's location triangle places the optimal site at the point that minimizes total transport weight, pulled toward whichever vertex 'exerts the greatest transport weight' — not automatically the midpoint. For steel, the pull is overwhelmingly toward raw materials."}]}, {"question": "Manchester earned the nickname 'Cottonopolis' in the early nineteenth century. Which combination of geographic factors best explains why Manchester — rather than an inland town far from any port — became the dominant British cotton-spinning center?", "options": [{"text": "Abundant coal, proximity to iron ore deposits, and a large pre-existing skilled metalworking workforce.", "isCorrect": false, "rationale": "These factors describe the Black Country or Sheffield steel districts, not Manchester. Manchester's competitive advantage rested on moisture, waterpower/steam, displaced agricultural labor, and break-of-bulk access to raw cotton via Liverpool — not metalworking."}, {"text": "Moist air that reduced thread breakage, waterpower and steam, a labor pool from agricultural enclosure, and break-of-bulk access to raw cotton via Liverpool.", "isCorrect": true, "rationale": "The text explicitly lists all four factors: moist air, waterpower supplemented by steam, migrants displaced by agricultural enclosure swelling the labor pool, and the canal link to Liverpool where raw cotton transferred from ocean ships to barges — the classic break-of-bulk point."}, {"text": "Government-subsidized factories, a coastal location for direct ocean shipping, and pre-existing craft weaving guilds.", "isCorrect": false, "rationale": "Manchester is not a coastal city; raw cotton arrived via canal from Liverpool. There is no mention of government subsidies or craft guilds driving Manchester's rise — its growth was market-driven by the listed geographic advantages."}, {"text": "Proximity to wool-producing sheep farms, access to dye chemicals, and a tradition of linen weaving.", "isCorrect": false, "rationale": "Manchester specialized in cotton, not wool or linen. The text identifies moist air, steam power, enclosure migrants, and canal-break-of-bulk access — none involving wool farming or dye chemicals — as the key factors."}]}, {"question": "A firm manufacturing soft drinks is deciding where to locate its bottling plant. The raw inputs — concentrate and flavoring syrup — are lightweight relative to the finished beverage, because water is added at the plant. Applying Weber's Least Cost Theory, where should the bottling plant locate?", "options": [{"text": "Near the syrup concentrate factory, because raw-material proximity minimizes assembly costs.", "isCorrect": false, "rationale": "Soft-drink bottling is a weight-gaining (bulk-increasing) industry: water added at the plant makes the finished product heavier than the inputs. Weber's model prescribes market-oriented location for such industries, not raw-material orientation."}, {"text": "Near the market, because the finished product is heavier than the raw ingredients, making distribution the dominant cost.", "isCorrect": true, "rationale": "The text uses soft-drink bottling as the canonical weight-gaining example: 'the finished product is heavier (and cheaper per unit) than the ingredients,' so 'the minimum-cost location is near the market.' This is why bottling plants cluster near population centers in every country."}, {"text": "At a break-of-bulk point, because all manufacturing should locate where transport modes intersect.", "isCorrect": false, "rationale": "Break-of-bulk points attract industries that transfer cargo between modes, but Weber's weight-gaining logic specifically directs soft-drink bottling toward the market — where the heavy finished product will be consumed — not simply toward any break-of-bulk location."}, {"text": "In a low-wage region, because labor cost deviation always overrides the transport-minimum location.", "isCorrect": false, "rationale": "Weber's model says firms deviate to a cheaper-labor location only if the wage saving exceeds the added transport cost — it is conditional, not absolute. For soft-drink bottling, the market pull is strong and the labor content relatively low, so market proximity typically dominates."}]}, {"question": "The Ford Model T assembly line at Highland Park, Michigan (1913) reduced assembly time from 12.5 hours to 93 minutes. Beyond speed, what was the deeper organizational consequence that the text identifies as most significant for industrial geography?", "options": [{"text": "It concentrated all functions — design, engineering, and assembly — on the factory floor, eliminating separate office work.", "isCorrect": false, "rationale": "The text says the opposite: the assembly line 'fundamentally separated mental labor (design, engineering) from physical labor (assembly), concentrating the former in offices and the latter on the factory floor.' It dispersed, not concentrated, mental and physical work."}, {"text": "It separated mental labor (design, engineering) from physical labor (assembly), enabling each to locate differently over time.", "isCorrect": true, "rationale": "The text explicitly states the assembly line 'separated mental labor (design, engineering) from physical labor (assembly), concentrating the former in offices and the latter on the factory floor.' This division is the geographic foundation of the later pattern in which R&D stays in high-wage cores while assembly migrates to low-wage peripheries."}, {"text": "It made steel production unnecessary by replacing heavy metal parts with lighter standardized components.", "isCorrect": false, "rationale": "The assembly line organized production of existing components — it did not replace steel. Detroit's location near steel and transport networks is specifically noted as part of its agglomeration advantage, not as something the assembly line made irrelevant."}, {"text": "It required locating factories near coal fields to power the moving assembly belt.", "isCorrect": false, "rationale": "By 1913 the second industrial revolution had introduced electricity as a factory power source. The text identifies Detroit's proximity to steel and transport networks, not coal fields, as the location rationale for Highland Park."}]}, {"question": "South Korea, Taiwan, Hong Kong, and Singapore are described as Newly Industrializing Economies (NIEs) that pursued export-led growth in the 1960s–80s. Which explanation best accounts for Singapore's specific success compared to a landlocked country pursuing the same export-led strategy?", "options": [{"text": "Singapore's large domestic market provided the consumer base needed to absorb industrial output before exporting.", "isCorrect": false, "rationale": "Singapore is a city-state with a very small domestic market. Its success was explicitly based on attracting foreign manufacturing investment through a break-of-bulk location on the Strait of Malacca — not domestic consumption."}, {"text": "Singapore's government-owned zaibatsu conglomerates directed investment into heavy industry, replicating the Japanese model.", "isCorrect": false, "rationale": "Zaibatsu were Japanese (and chaebol were South Korean) private family conglomerates. Singapore's model differed: it attracted foreign manufacturing investment via political stability, an English-speaking workforce, and geographic position — not through state-directed conglomerates."}, {"text": "Singapore's break-of-bulk position on the Strait of Malacca, through which a quarter of global maritime trade passes, attracted foreign manufacturing investment.", "isCorrect": true, "rationale": "The text states directly that Singapore 'attracted foreign manufacturing investment by offering political stability, a disciplined English-speaking labor force, and a strategic break-of-bulk location on the Strait of Malacca, through which a quarter of global maritime trade passes.'"}, {"text": "Singapore's large coal and iron ore deposits gave it the same raw-material advantage as Britain during the first Industrial Revolution.", "isCorrect": false, "rationale": "Singapore is a small island with no significant coal or iron ore deposits. Its industrial advantage was geographic position and human capital, not raw-material endowment."}]}, {"question": "What was the primary mechanism by which the 1956 shipping container revolution altered the balance of Weber's three location factors for labor-intensive manufacturing industries?", "options": [{"text": "It raised transport costs, making raw-material proximity more important and strengthening the pull toward core industrial regions.", "isCorrect": false, "rationale": "The text states ocean freight rates fell roughly 90 percent in real terms between the 1950s and 1970s — the opposite of rising. Lower transport costs weakened the raw-material pull and amplified the labor-cost deviation factor."}, {"text": "It collapsed transport costs by about 90 percent, making the labor-cost deviation far more powerful and enabling assembly to migrate to low-wage peripheries.", "isCorrect": true, "rationale": "The text states: 'By the 1970s ocean freight rates had fallen roughly 90 percent in real terms compared to the 1950s. This collapse in transport costs was the logistical foundation of the modern global supply chain: it became cheaper to manufacture goods halfway around the world and ship them back.' This directly amplified Weber's labor-deviation pull."}, {"text": "It created new break-of-bulk points in inland cities, shifting industrial agglomeration away from port cities.", "isCorrect": false, "rationale": "Containerization actually strengthened major port cities (Rotterdam, Singapore, Hong Kong) that could handle container operations, rather than shifting agglomeration inland. The revolution reduced port labor costs but reinforced port centrality."}, {"text": "It standardized production methods globally, eliminating differences in labor productivity that previously rewarded low-wage locations.", "isCorrect": false, "rationale": "The container revolution was a logistics innovation, not a production-method standardization. Labor productivity and wage differentials between countries remained large; what changed was that lower shipping costs made it economical to exploit those wage differences across greater distances."}]}, {"question": "Alfred Weber identified agglomeration as his third location factor. Which of the following examples from the text best illustrates 'localization economies' specifically, as opposed to the other two subtypes Weber's framework encompasses?", "options": [{"text": "A textile firm locating in London because of the city's financial services, legal expertise, and cultural amenities.", "isCorrect": false, "rationale": "Benefits from being in a large city — financial services, legal expertise, amenities — are urbanization economies, not localization economies. Localization economies arise from many firms in the same industry sharing specialized workers, suppliers, and information spillovers."}, {"text": "Silicon Valley semiconductor firms benefiting from a deep labor market where engineers can switch employers without relocating.", "isCorrect": true, "rationale": "The text cites this as a localization economy: 'when many firms in the same industry cluster, they share a pool of specialized workers … Silicon Valley's semiconductor firms benefit from a labor market so deep that engineers can switch employers without relocating.'"}, {"text": "A factory choosing a site equidistant from two raw-material sources to minimize total transport cost.", "isCorrect": false, "rationale": "Equidistant siting is pure transport-cost logic from Weber's location triangle, not an agglomeration economy of any type. Agglomeration economies arise from clustering with other firms, not from raw-material geometry."}, {"text": "A firm relocating from Detroit to Alabama because of lower wages, offsetting higher transport costs.", "isCorrect": false, "rationale": "This describes Weber's labor-cost deviation mechanism — deviating from the transport minimum when wage savings exceed added transport expense. It is a separate location factor from agglomeration economies."}]}, {"question": "Belgium was the first continental European country to industrialize. Which combination of factors best explains why Belgium's industrialization trajectory closely paralleled Britain's rather than, say, Spain's or Italy's?", "options": [{"text": "Belgium had a large coastal empire supplying tropical raw materials and colonial labor for its factories.", "isCorrect": false, "rationale": "Belgium's early industrialization in the 1820s–40s preceded its acquisition of the Congo and was driven by domestic coal at Liège and Charleroi, navigable rivers, and British technical knowledge — not colonial raw materials or labor."}, {"text": "Belgium had accessible coalfields at Liège and Charleroi, navigable rivers, and actively recruited British engineers despite Britain's ban on machinery export.", "isCorrect": true, "rationale": "The text states Belgium industrialized first among continental states 'for reasons that echo Britain's: accessible coal at Liège and Charleroi, navigable rivers, and proximity to British technical knowledge (Belgian entrepreneurs actively recruited British engineers despite Britain's ban on machinery export).'"}, {"text": "Belgium adopted a state-directed zaibatsu model, with government-owned model factories seeded by the king.", "isCorrect": false, "rationale": "The state-directed model factory approach is specifically attributed to Japan's Meiji government, not Belgium. Belgian industrialization was driven by private entrepreneurs exploiting favorable geography and recruiting British expertise."}, {"text": "Belgium's large population provided the consumer base for mass-produced goods before exporting became feasible.", "isCorrect": false, "rationale": "Belgium is a small country. Its industrialization was driven by geological and locational advantages — coalfields, rivers, British know-how — not by domestic market size."}]}, {"question": "A geographer studying Japan's industrialization describes it as 'compressive' — completing in three to four decades what Britain took a century to accomplish. Which factor most directly explains this compression?", "options": [{"text": "Japan possessed larger and more accessible coalfields than Britain, eliminating the early bottleneck that slowed British industrialization.", "isCorrect": false, "rationale": "The text does not describe Japan's coal endowment as superior to Britain's. Japan's compression is attributed to deliberate state direction — dispatching engineers abroad, importing machinery wholesale, and establishing government model factories — not to superior resource endowment."}, {"text": "Japan's geography as an island nation gave it natural port advantages that dramatically lowered transport costs compared to landlocked European rivals.", "isCorrect": false, "rationale": "While Japan's coastline facilitated trade, the text attributes its compressed industrialization to deliberate Meiji-era state policy — not to geographic accident. The state's role in directing the process is the key explanatory factor cited."}, {"text": "The Meiji state deliberately directed industrialization by importing machinery, dispatching engineers abroad, establishing model factories, and then transferring facilities to private zaibatsu.", "isCorrect": true, "rationale": "The text describes Japan's industrialization as 'uniquely state-directed': the Meiji government dispatched engineers, imported machinery wholesale, established government model factories, then handed them to private zaibatsu — a top-down acceleration that compressed a century of British development into three to four decades."}, {"text": "Japan benefited from free-trade agreements with Britain that gave it access to British industrial technology without industrial espionage.", "isCorrect": false, "rationale": "Japan acquired industrial technology through state-sponsored dispatch of engineers and students to European factories and wholesale machinery imports — not through trade agreements. Britain had actively banned machinery export; there was no free-technology-sharing treaty."}]}, {"question": "A critic of Weber's Least Cost Theory argues the model is limited in practical application. Which of the following represents the most substantive limitation identified in the source text?", "options": [{"text": "The model only applies to weight-losing industries and has no analytical framework for weight-gaining industries.", "isCorrect": false, "rationale": "Weber's model explicitly addresses both weight-losing industries (locating near raw materials) and weight-gaining industries (locating near markets). The text covers both cases. The limitations cited are different in nature."}, {"text": "The model assumes perfect information, a flat plain, and a single-minded cost minimizer, and ignores government policy, environmental regulation, and land rent.", "isCorrect": true, "rationale": "The text states directly: 'Weber's model assumes perfect information, a flat plain, and a single-minded cost minimizer. It ignores agglomeration economies that arise from proximity to consumers (not only producers), the role of government policy (tax incentives, EPZs), environmental regulation as a location pull, and the role of land rent in urban industrial districts.'"}, {"text": "The model was developed before the era of steam power and therefore cannot account for any post-1850 industrial geography.", "isCorrect": false, "rationale": "Weber published his location theory in 1909, well into the era of steam and the second industrial revolution. The text applies his model to twentieth-century cases like the textile shift from New England to the US South to Bangladesh."}, {"text": "The model predicts that all industries will eventually locate in low-wage developing countries, which has not occurred.", "isCorrect": false, "rationale": "Weber's model does not predict all industries migrate to low-wage regions — it predicts conditional deviation only when labor savings exceed added transport costs. The text notes that R&D and design remain in high-wage cores even as assembly migrates, consistent with the model's logic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
