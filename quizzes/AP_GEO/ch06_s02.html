<script>
var QUESTIONS = [{"question": "A country's five largest cities have populations of 12 million, 2 million, 900,000, 700,000, and 600,000. A geographer analyzing this distribution would most likely conclude which of the following?", "options": [{"text": "The system follows the rank-size rule because each city is progressively smaller than the one above it.", "isCorrect": false, "rationale": "The rank-size rule requires that the second city be approximately half the size of the first (6 million here), the third approximately one-third (4 million), and so on. The actual values deviate sharply from this pattern."}, {"text": "The system displays primacy because the largest city (12 million) is disproportionately larger than all others, with the second city at only 2 million rather than the expected ~6 million.", "isCorrect": true, "rationale": "The rank-size rule would predict a second city of about 6 million and a third of about 4 million. A second city of only 2 million (a 6:1 ratio rather than the expected 2:1) signals a primate distribution where one city is supereminently dominant."}, {"text": "The system is consistent with a mature, developed-world urban hierarchy because the cities decrease in size from largest to smallest.", "isCorrect": false, "rationale": "Simply decreasing in size is a necessary but not sufficient condition for rank-size regularity. The key test is the ratio between consecutive ranks, which in this case strongly indicates primacy, not rank-size regularity."}, {"text": "The system follows Christaller's K=7 administrative principle because each larger city encompasses exactly seven lower-order cities.", "isCorrect": false, "rationale": "The K=7 principle describes the spatial arrangement of hexagonal service areas in a regional landscape, not the numerical relationship between national city populations."}], "id": "q01"}, {"question": "Which of the following best explains why countries with colonial histories and strong centralized states are more likely to have primate cities than countries with diverse regional economies?", "options": [{"text": "Colonial powers intentionally applied Christaller's hexagonal lattice model to distribute population evenly across their territories.", "isCorrect": false, "rationale": "Central place theory assumes a uniform plain and perfect competition—idealized conditions that colonial powers did not attempt to create. Colonial urban systems were characterized by concentrated investment in port cities, the opposite of even distribution."}, {"text": "Colonial port cities received disproportionate investment in infrastructure and institutions, and post-independence political centralization reinforced that advantage through agglomeration economies and migration flows toward the dominant city.", "isCorrect": true, "rationale": "The source identifies colonial history, political centralization, agglomeration economies, and rural-to-urban migration—all converging on the same city—as the causes of primacy, particularly in countries shaped by colonial-era port concentration."}, {"text": "Primate cities form exclusively in small countries where a single city efficiently serves the entire national population.", "isCorrect": false, "rationale": "While Singapore and Kuwait are cited as examples where a single dominant city may reflect efficient spatial organization, primacy also occurs in large countries like Thailand, Mexico, and France—driven by political and colonial factors, not just country size."}, {"text": "Countries with colonial histories tend to have flat, uniform terrain that prevents the formation of competing regional centers.", "isCorrect": false, "rationale": "Physical terrain is not the driver of primacy identified in Jefferson's model. Countries like Thailand and Argentina have varied terrain but still exhibit strong primacy due to political and economic concentration."}], "id": "q02"}, {"question": "A convenience store owner evaluating a potential location on an idealized Christaller plain considers that bread and milk can realistically only attract customers from within a 2-mile radius. This 2-mile limit is best described as which central place theory concept?", "options": [{"text": "Threshold, because it represents the minimum number of customers needed for the store to be profitable.", "isCorrect": false, "rationale": "Threshold is the minimum demand level required to make a service economically viable—the floor of demand. The 2-mile radius describes the maximum distance customers will travel, which is range."}, {"text": "Range, because it represents the maximum distance consumers will travel to obtain the good.", "isCorrect": true, "rationale": "Range is defined as the maximum distance a consumer will travel to obtain a particular good or service. Low-order goods like bread and milk have small ranges, generating small market areas and densely spaced central places."}, {"text": "The K value, because it determines how many lower-order places the store will serve within its hexagonal market area.", "isCorrect": false, "rationale": "K values describe the organizing principle that determines the spatial relationship between higher- and lower-order places in the hexagonal lattice, not the individual travel distance of consumers."}, {"text": "Break-of-bulk point, because goods must be transferred from regional distribution centers to the store within this distance.", "isCorrect": false, "rationale": "A break-of-bulk point is a location where goods transfer between transport modes, a concept from site-situation analysis, not from central place theory's threshold-range framework."}], "id": "q03"}, {"question": "Walter Christaller's central place theory has been applied most successfully in agricultural regions of Iowa and the Netherlands rather than in mountain countries. Which of the following best explains this pattern?", "options": [{"text": "Agricultural regions have larger urban populations than mountain regions, producing more total demand for central place services.", "isCorrect": false, "rationale": "Population density alone does not explain the fit. The key theoretical assumption is a uniform flat plain—which flat agricultural regions approximate but mountain countries violate—not total population size."}, {"text": "Flat agricultural plains more closely approximate Christaller's assumptions of a uniform landscape and uniformly distributed population, allowing hexagonal market areas to form without geographic disruption.", "isCorrect": true, "rationale": "Christaller's model rests on an idealized flat plain with uniformly distributed population. Mountain terrain breaks the hexagonal pattern by creating natural barriers to movement, violating the model's core assumptions."}, {"text": "Mountain countries lack sufficient agricultural surplus to generate the demand required for central place hierarchies to emerge.", "isCorrect": false, "rationale": "Mountain countries can generate significant agricultural activity and demand. The issue is geometric—mountains obstruct the uniform distance-decay patterns that hexagonal market areas require—not a deficit of total demand."}, {"text": "Christaller developed his theory specifically for agricultural regions and explicitly limited its applicability to flat terrain in his original 1933 work.", "isCorrect": false, "rationale": "Christaller presented the theory as a general model of settlement hierarchies, testing it in Bavaria (which has mountains). Later critics identified the flat-terrain limitation as an empirical finding, not an explicit self-imposed constraint."}], "id": "q04"}, {"question": "A regional transportation authority wants to design a highway system that routes all roads between major cities through intermediate smaller cities. Which of Christaller's K values best describes the organizing principle the planners are attempting to implement?", "options": [{"text": "K=3, because this principle maximizes the number of market centers to minimize consumer travel distances to lower-order goods.", "isCorrect": false, "rationale": "K=3 is the marketing principle, which maximizes the number of market centers and places each lower-order place at the corner of three higher-order hexagons—useful for consumer access but not for routing roads through intermediate cities."}, {"text": "K=4, because this principle places all lower-order cities at the midpoint of roads between higher-order cities, minimizing transport infrastructure cost.", "isCorrect": true, "rationale": "K=4 is the transportation principle, which places each lower-order place at the midpoint of an edge between two higher-order hexagons. This arrangement routes all lower-order cities on straight roads between higher-order cities."}, {"text": "K=7, because this principle ensures every lower-order place falls unambiguously within a single higher-order city's jurisdiction.", "isCorrect": false, "rationale": "K=7 is the administrative principle, designed to maximize administrative efficiency by enclosing lower-order places entirely within higher-order jurisdictions—useful for governance but not specifically for road-routing efficiency."}, {"text": "Rank-size, because the population distribution of cities determines which cities should be connected by highways.", "isCorrect": false, "rationale": "The rank-size rule is an empirical description of population distributions, not a geometric organizing principle for transport network design."}], "id": "q05"}, {"question": "A city planner uses the gravity model to estimate the volume of commuter traffic between two neighboring cities. City A has a population of 500,000 and City B has a population of 100,000. They are 50 kilometers apart. A third city, City C, has a population of 500,000 but is 200 kilometers from City A. According to the gravity model, how does the predicted interaction between A and B compare to the interaction between A and C?", "options": [{"text": "The interaction between A and C is greater because City C's large population outweighs the distance disadvantage.", "isCorrect": false, "rationale": "The gravity model weighs population and distance together: I = (P1 × P2) / d². Between A and C: (500,000 × 500,000) / 200² = 250,000,000,000 / 40,000 = 6,250,000. Between A and B: (500,000 × 100,000) / 50² = 50,000,000,000 / 2,500 = 20,000,000. A–B interaction is higher."}, {"text": "The interaction between A and B is greater because even though City B is smaller, it is much closer, and the gravity model squares distance in the denominator.", "isCorrect": true, "rationale": "The gravity model formula I = (P1 × P2) / d² squares distance. For A–B: (500,000 × 100,000) / 2,500 = 20,000,000. For A–C: (500,000 × 500,000) / 40,000 = 6,250,000. Despite C being 5× larger than B, A's interaction with B is more than 3× greater due to B's proximity."}, {"text": "The interactions are equal because both city pairs involve City A with a population of 500,000.", "isCorrect": false, "rationale": "The interactions depend on both the populations of both cities in the pair and the distance between them—not just one city's population. City B and City C have different populations and different distances from A."}, {"text": "The gravity model cannot compare interactions between city pairs with different population sizes.", "isCorrect": false, "rationale": "The gravity model explicitly handles city pairs with different populations. The formula multiplies the two populations and divides by the square of distance, yielding comparable interaction values regardless of whether the cities are the same size."}], "id": "q06"}, {"question": "Bangkok, Thailand's largest city, has approximately 10–12 million residents, while Thailand's second city, Chiang Mai, holds roughly 300,000. This pattern most strongly supports which geographic model?", "options": [{"text": "The rank-size rule, because Bangkok is the largest city in Thailand's national urban system.", "isCorrect": false, "rationale": "The rank-size rule would predict Chiang Mai's population at approximately half of Bangkok's—roughly 5–6 million. A ratio exceeding 30:1 is a dramatic deviation from rank-size regularity, not evidence for it."}, {"text": "Jefferson's law of the primate city, because Bangkok's dominance far exceeds what the rank-size rule would predict, signaling supereminent political, economic, and cultural concentration.", "isCorrect": true, "rationale": "Jefferson described primate cities as not merely the largest but qualitatively dominant, concentrating political, economic, and cultural power. Bangkok's 30:1 ratio over Chiang Mai is a textbook case cited in the source."}, {"text": "Christaller's K=7 administrative principle, because Bangkok serves as the single administrative center encompassing all lower-order Thai cities.", "isCorrect": false, "rationale": "Christaller's K=7 describes a geometric spatial relationship where higher-order cities entirely encompass six lower-order places. It is a model of regional service hierarchies, not an explanation for extreme national urban primacy."}, {"text": "The multiple nuclei model, because Thailand's urban system has developed multiple specialized nodes rather than concentrating all activity in Bangkok.", "isCorrect": false, "rationale": "The multiple nuclei model describes the internal structure of a single metropolitan area with several activity centers. Thailand's pattern is the opposite of multiple nuclei at the national scale—it is extreme concentration in one city."}], "id": "q07"}, {"question": "Why did Christaller propose hexagonal rather than circular market areas in his central place theory?", "options": [{"text": "Hexagons reflect the actual shape of administrative boundaries in southern Germany, where Christaller conducted his research.", "isCorrect": false, "rationale": "The hexagonal shape emerges from a mathematical argument about efficient coverage, not from empirical observation of German administrative boundaries. Christaller derived the hexagon theoretically before testing the model empirically."}, {"text": "Hexagons tile perfectly without gaps or overlaps and minimize the average distance from any farm to its nearest central place, making them more efficient than circles for covering a uniform plain.", "isCorrect": true, "rationale": "The source explains that circular market areas leave gaps or create overlapping zones of ambiguity, while hexagons tile perfectly and minimize average distance to the central place—making the hexagon the mathematically optimal shape for the problem."}, {"text": "Hexagons reflect the shape of the drainage basins that Christaller used as natural boundaries for market areas in Bavaria.", "isCorrect": false, "rationale": "The hexagonal shape is a mathematical property derived from the geometric problem of covering a plane without gaps, not from drainage basin geography."}, {"text": "Hexagons were used because they could be divided into exactly three equal parts, matching the K=3 marketing principle that Christaller considered the most important.", "isCorrect": false, "rationale": "The hexagonal shape is adopted first for its tiling efficiency, and then the K values (K=3, K=4, K=7) describe different ways of nesting hexagons of different orders—the K value does not determine the shape."}], "id": "q08"}, {"question": "The digital economy has dramatically altered some assumptions underlying Christaller's central place theory. Which of the following best describes this impact?", "options": [{"text": "Online commerce has increased the range of low-order goods like groceries by enabling delivery to any location, while high-order goods have seen their ranges decrease.", "isCorrect": false, "rationale": "The source emphasizes that for information goods specifically, range collapses to near zero because consumers can 'travel' zero distance online. The asymmetric claim that low-order goods see increased range while high-order goods decrease is not supported."}, {"text": "The internet has collapsed the range of information goods to near zero, as consumers can access specialized products from any location without traveling, undermining a core assumption of the model.", "isCorrect": true, "rationale": "The source explicitly states that 'a customer anywhere in the world can now travel zero distance to buy a specialized good online, collapsing range to near-zero for information goods'—directly undermining the range concept for digital products."}, {"text": "Online commerce has eliminated the threshold concept entirely because digital goods can be provided to unlimited consumers at zero marginal cost.", "isCorrect": false, "rationale": "While zero marginal cost of digital goods does affect threshold calculations, the source specifically identifies range—not threshold—as the concept most directly disrupted by the digital collapse of distance for information goods."}, {"text": "E-commerce has made the hexagonal lattice more accurate because delivery logistics reinforce the optimal spatial coverage pattern Christaller originally described.", "isCorrect": false, "rationale": "The critique runs in the opposite direction: digital commerce undermines the model's relevance by collapsing the distance-friction assumptions that make the hexagonal pattern emerge. It does not reinforce the hexagonal lattice."}], "id": "q09"}, {"question": "A human geography student notes that Christaller's central place theory was used by Nazi planners during World War II to reorganize settlement patterns in occupied Poland. What does this historical episode illustrate about spatial models in geography?", "options": [{"text": "It demonstrates that Christaller's theory is fundamentally flawed and should no longer be taught in geography courses.", "isCorrect": false, "rationale": "The source explicitly states: 'This is not an argument against the theory's mathematical logic—it remains an important conceptual tool.' The episode illustrates misapplication, not a flaw in the theory's analytical framework."}, {"text": "It proves that all geographic models are inherently political and cannot claim scientific objectivity.", "isCorrect": false, "rationale": "The source does not make this sweeping claim. It calls the episode 'a sobering reminder that spatial models are not politically neutral'—acknowledging political dimension without claiming all geographic models are nothing but political instruments."}, {"text": "Spatial models that appear mathematically neutral can be weaponized for harmful political purposes, illustrating that geographic analysis carries social responsibility.", "isCorrect": true, "rationale": "The source describes the wartime application as 'a sobering reminder that spatial models are not politically neutral' and calls it 'a cautionary case study in the social responsibility of spatial scientists'—the central lesson of the episode."}, {"text": "Central place theory is only valid when applied in democratic societies, because authoritarian governments distort market behavior and undermine the model's assumptions.", "isCorrect": false, "rationale": "The validity of the model's mathematical logic is not contingent on the political system in which it is applied. The wartime episode is a misuse of the model, not evidence that the model requires democracy to function analytically."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
