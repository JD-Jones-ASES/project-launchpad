<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; The Origins and Evolution of Urban Settlements</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A city planner studying a historical settlement notes that it was founded on a peninsula at the confluence of two rivers, surrounded by fertile farmland. Which geographic concept best describes the set of characteristics the planner is analyzing?", "options": [{"text": "Situation, because the settlement's position relative to surrounding resources and routes defines its advantages.", "isCorrect": false, "rationale": "Situation describes relational connectivity to surrounding places and routes, not the intrinsic physical characteristics of the land itself."}, {"text": "Site, because the physical and intrinsic characteristics of the land—water access, defensible terrain, and fertile hinterland—define the location's inherent advantages.", "isCorrect": true, "rationale": "Site refers to the physical, place-bound characteristics of the land: access to water, defensible terrain, fertile hinterland, and proximity to resources. The peninsula, river confluence, and farmland are all intrinsic physical features."}, {"text": "Break-of-bulk point, because the confluence of two rivers implies goods must transfer between transport modes.", "isCorrect": false, "rationale": "A break-of-bulk point is a situation factor—it describes connectivity in a transport network, not the intrinsic physical qualities of the land itself."}, {"text": "Threshold, because the fertile farmland indicates a minimum population required to support services in the settlement.", "isCorrect": false, "rationale": "Threshold is a central-place theory concept describing the minimum demand needed to support a service, not a description of physical land characteristics."}]}, {"question": "Chicago's explosive growth in the mid-nineteenth century is best explained by which of the following?", "options": [{"text": "Its outstanding site advantages, including a deep natural harbor, abundant timber, and defensible terrain on Lake Michigan.", "isCorrect": false, "rationale": "The source describes Chicago's site as 'uninspiring'—a flat, swampy shoreline prone to flooding, lacking timber or stone. Site was not Chicago's strength."}, {"text": "Its situation as the hinge point connecting the Great Lakes drainage to the Mississippi watershed, amplified by canal and railroad investment.", "isCorrect": true, "rationale": "Chicago's situation—the Chicago Portage linking the Great Lakes to the Mississippi via the Illinois and Michigan Canal (1848) and subsequent rail network—was the decisive factor, not its modest physical site."}, {"text": "Political decisions by the federal government to relocate national capital functions to the Midwest during the Civil War era.", "isCorrect": false, "rationale": "No such capital relocation occurred. Chicago's growth was driven by its situational advantages in the continental transport network, not political capital functions."}, {"text": "Its position in Borchert's Steel Rail epoch, which was the first epoch to allow inland cities to form.", "isCorrect": false, "rationale": "Inland cities began forming in the Iron Horse epoch (1830–1870), not the Steel Rail epoch. Chicago's foundational growth began with the canal and early railroads of the Iron Horse era."}]}, {"question": "According to Sjoberg's Pre-Industrial City model, which spatial arrangement would a geographer expect to find in a medieval Islamic medina?", "options": [{"text": "The wealthiest residents occupying the outermost ring of the city, with the poor concentrated near the center.", "isCorrect": false, "rationale": "This is the inverse of Sjoberg's model. In modern North American cities, the affluent have historically been in outer zones; the pre-industrial pattern places elites at the center."}, {"text": "A single dominant commercial district at the periphery, surrounded by residential zones of mixed income.", "isCorrect": false, "rationale": "Sjoberg's model places political and religious power—not commerce—at the center, with mixed residential and craft functions in middle rings and the poor at the periphery."}, {"text": "Elite residences, temples, and palaces clustered at the city's center, with the poorest residents at the exposed fringe.", "isCorrect": true, "rationale": "Sjoberg argued that all pre-industrial cities share this pattern: elites at the center near seats of power and major religious institutions, the poorest and most transient at the periphery—the opposite of the modern North American city."}, {"text": "Functional zoning with separate commercial, residential, and industrial districts radiating outward from the center.", "isCorrect": false, "rationale": "Functional zoning is a feature of industrial and post-industrial cities. Sjoberg's pre-industrial city combined residential, commercial, and craft activities with little functional separation."}]}, {"question": "A student claims that Borchert's five epochs show that energy and transportation technology are the sole drivers of American urban growth. Which of the following is the strongest critique of this claim?", "options": [{"text": "Borchert's model applies only to cities founded after 1830, excluding older coastal cities from analysis.", "isCorrect": false, "rationale": "Borchert's Sail-Wagon epoch (pre-1830) explicitly includes the oldest coastal port cities like Boston, New York, and Baltimore. The model covers the full arc of American urban development."}, {"text": "The model ignores social forces—racial segregation, federal housing policy, and zoning law—that shaped urban form at least as powerfully as technology.", "isCorrect": true, "rationale": "The source text explicitly identifies this as the key critique: Borchert focuses on energy and transport while critics note that 'social forces (racial segregation, federal housing policy, zoning law) shaped urban form at least as powerfully as technology.'"}, {"text": "Borchert's model is invalid because Chicago did not follow the epochal pattern he describes.", "isCorrect": false, "rationale": "Chicago is presented as the textbook illustration of Borchert's framework, not a counterexample. Its growth through each epoch closely matches Borchert's predictions."}, {"text": "The model incorrectly places the High-Tech epoch before the Auto-Air epoch in historical sequence.", "isCorrect": false, "rationale": "The sequence is accurate: Auto-Air (1920–1970) precedes High-Tech (1970–present). No sequencing error exists in the model."}]}, {"question": "A researcher studying urban form in a nineteenth-century industrial city finds that residential neighborhoods extend along streetcar lines but remain tightly clustered around the city core. This pattern is most consistent with which of Borchert's epochs?", "options": [{"text": "Sail-Wagon, because coastal and river cities dominated the early transport network.", "isCorrect": false, "rationale": "The Sail-Wagon epoch (pre-1830) featured compact, walking-scale mixed-use cities without streetcars. Streetcar suburbs emerged later."}, {"text": "Steel Rail, because high-capacity railroads and industrial electric power enabled streetcar suburb formation while the city core remained dominant.", "isCorrect": true, "rationale": "Borchert's Steel Rail epoch (1870–1920) explicitly describes urban form beginning to spread along streetcar lines while the city core remains dominant—exactly the pattern described."}, {"text": "Auto-Air, because the automobile decoupled residence from transit corridors and enabled sprawl in all directions.", "isCorrect": false, "rationale": "The Auto-Air epoch (1920–1970) decoupled residence from transit corridors. The described pattern—tied to streetcar lines—is characteristic of the earlier Steel Rail epoch, not auto-dependent sprawl."}, {"text": "High-Tech, because edge cities emerged as secondary suburban nodes around the city's periphery.", "isCorrect": false, "rationale": "Edge cities and digital knowledge clusters characterize the High-Tech epoch (1970–present), not the streetcar-suburb pattern described."}]}, {"question": "Which of the following best explains why site advantages are described as more stable over time than situation advantages?", "options": [{"text": "Site advantages are more difficult to measure quantitatively, so they appear unchanged across historical periods.", "isCorrect": false, "rationale": "The stability of site is not a measurement artifact. Site factors—physical terrain, water access, soil—are inherently place-bound and change only on geological timescales."}, {"text": "Situation advantages depend on political decisions rather than physical geography and therefore shift more frequently.", "isCorrect": false, "rationale": "While political decisions can affect situation, the source emphasizes that transportation technology—not just politics—is the primary driver of changing situational advantage."}, {"text": "Site describes intrinsic physical characteristics of the land that change only geologically, while situation describes connectivity in transport networks that can be transformed by new technology.", "isCorrect": true, "rationale": "The source explicitly states that 'situation factors can change dramatically as transportation technology evolves,' while site factors are place-bound and describe what a location offers independent of surrounding places."}, {"text": "Situation advantages are fixed by initial founding decisions, making them as permanent as physical geography.", "isCorrect": false, "rationale": "The opposite is true. The source notes that cities with good sites sometimes found their situation 'deteriorating when new transport corridors bypassed them'—situation is highly dynamic."}]}, {"question": "Consider the following scenario: A city founded in 1820 at the junction of two important rivers thrived for decades as a transfer point for goods. By 1870, a new railroad bypassed the city entirely, routing goods through a rival settlement 80 miles away. Which concept best explains the original city's decline?", "options": [{"text": "The city's site deteriorated because the rivers it depended on shifted course during this period.", "isCorrect": false, "rationale": "The scenario describes a change in transport routing, not a change in the physical geography of the rivers. River courses shifting would be a change in site, but that is not what happened here."}, {"text": "The city's situation declined because its position in the regional transport network lost value when the railroad created a new preferred corridor.", "isCorrect": true, "rationale": "Situation describes a city's position relative to transport networks and surrounding places. When the railroad bypassed the city, its situational advantage—being a key transfer node—was eliminated even though its physical site remained unchanged."}, {"text": "The city experienced invasion and succession as commercial uses replaced residential uses in the core.", "isCorrect": false, "rationale": "Invasion and succession is a Burgess concentric-zone concept describing internal land-use change within a growing city, not the relative decline of a city in a regional transport network."}, {"text": "The city's threshold for high-order services collapsed because central place hierarchies reorganized under the new railroad system.", "isCorrect": false, "rationale": "While central-place hierarchy reorganization is a related idea, the most direct and precise explanation for the city's decline is the loss of situational advantage when the railroad created a competing corridor."}]}, {"question": "Sjoberg's Pre-Industrial City model has been criticized for which of the following weaknesses?", "options": [{"text": "It overemphasizes the role of the automobile in shaping pre-industrial urban form.", "isCorrect": false, "rationale": "Sjoberg's model predates the automobile entirely and is explicitly built around the constraints of a walking-speed economy. The automobile plays no role in the model."}, {"text": "It overgeneralizes across very different societies and is fundamentally a static cross-section that says little about urban change.", "isCorrect": true, "rationale": "The source explicitly identifies these two critiques: Sjoberg's model has been criticized for 'overgeneralizing across very different societies' and for being 'a static cross-section rather than an explanation of urban processes.'"}, {"text": "It applies only to cities in the Western Hemisphere and ignores evidence from Asian and African urban traditions.", "isCorrect": false, "rationale": "Sjoberg's model is praised for its cross-cultural reach. The source cites evidence from medieval Baghdad, seventeenth-century Kyoto, and pre-Columbian Tenochtitlan, among others."}, {"text": "It incorrectly predicts that pre-industrial cities would be less dense than their industrial successors.", "isCorrect": false, "rationale": "The opposite is true: Sjoberg's model correctly reflects that pre-industrial cities were enormously dense because the walking-distance constraint limited their radius to roughly a mile and a half."}]}, {"question": "In Borchert's framework, which epoch first allowed American cities to grow significantly inland from the coast?", "options": [{"text": "Sail-Wagon, because sailing ships navigated inland rivers as far as Pittsburgh and Cincinnati.", "isCorrect": false, "rationale": "While the Sail-Wagon epoch included interior river cities like Pittsburgh, the Great Lakes were not yet integrated and the interior remained 'largely non-urban.' The massive inland expansion came with the next epoch."}, {"text": "Iron Horse, because coal-fired steam locomotives enabled railroad junction cities to grow far from coastal ports.", "isCorrect": true, "rationale": "Borchert explicitly states that the Iron Horse epoch (1830–1870) 'allowed cities to grow inland from the coast,' with railroad junction cities like Albany, Buffalo, Cleveland, Detroit, and Chicago as the dominant new urban centers."}, {"text": "Steel Rail, because high-capacity steel rails were required before interior cities could receive manufactured goods efficiently.", "isCorrect": false, "rationale": "Inland expansion began in the Iron Horse epoch. The Steel Rail epoch built on this growth by expanding manufacturing in existing interior cities, but it was not the epoch that first enabled inland urbanization."}, {"text": "Auto-Air, because the gasoline engine was required to move goods from interior farms to distant markets.", "isCorrect": false, "rationale": "The Auto-Air epoch (1920–1970) is associated with suburban sprawl and Sunbelt growth, not the initial inland expansion of cities, which had already occurred decades earlier."}]}, {"question": "A geographer argues that 'the walking city was dense because distance was expensive, while the automobile city sprawled because the car made movement in any direction roughly equivalent in cost.' This argument best illustrates which broader principle?", "options": [{"text": "The primate city effect, in which dominant cities concentrate economic activity regardless of transport costs.", "isCorrect": false, "rationale": "The primate city concept (Jefferson) describes dominance within a national urban hierarchy, not the relationship between transportation technology and urban density and form."}, {"text": "Sjoberg's law, in which elite groups always cluster at the center of a city regardless of the transportation era.", "isCorrect": false, "rationale": "Sjoberg's model is limited to pre-industrial cities and does not address how changing transport costs reshape urban form across different technological eras."}, {"text": "The inverse relationship between the friction of distance and urban density: as transport technology reduces the cost of overcoming distance, cities can expand in scale and decrease in density.", "isCorrect": true, "rationale": "The source synthesizes the entire section around this principle: 'Each new transport technology reduced the friction of space... and each reduction reshaped the urban landscape accordingly.' The walking city's density and the automobile city's sprawl are both products of changing distance costs."}, {"text": "The rank-size rule, in which the density of a city is inversely proportional to its rank in the national urban system.", "isCorrect": false, "rationale": "The rank-size rule describes the population distribution across cities in a national system, not the relationship between transportation costs and the internal density and spatial form of individual cities."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
