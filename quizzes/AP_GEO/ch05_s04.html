<script>
var QUESTIONS = [{"question": "The Aral Sea once ranked as the world's fourth-largest lake. By the 2010s it had lost more than 90% of its original surface area. Which human decision most directly caused this environmental catastrophe?", "options": [{"text": "Overgrazing by nomadic pastoralists in the surrounding steppe removed vegetation that had previously channeled runoff into the lake.", "isCorrect": false, "rationale": "The Aral Sea catastrophe was not caused by pastoral overgrazing. The text identifies Soviet irrigation policy—specifically the diversion of the Amu Darya and Syr Darya rivers to irrigate cotton fields—as the cause. This was an industrial-scale water diversion decision, not a land degradation process."}, {"text": "Soviet policy diverted the two major rivers feeding the Aral—the Amu Darya and Syr Darya—to irrigate cotton monoculture fields, eliminating the lake's water supply.", "isCorrect": true, "rationale": "The text states: 'Beginning in the 1960s, the Soviet government diverted the two major rivers feeding the Aral—the Amu Darya and the Syr Darya—to irrigate cotton fields across the Central Asian steppe.' This deliberate irrigation policy eliminated the lake's inflow, causing the loss of more than 90% of its surface area."}, {"text": "Climate change reduced precipitation across Central Asia, cutting off the lake's natural water supply from rainfall and snowmelt.", "isCorrect": false, "rationale": "The Aral Sea catastrophe is explicitly attributed to irrigation policy diversion of rivers, not to climate-driven precipitation changes. The text distinguishes this case from climate-driven desertification by calling it a consequence of 'Soviet irrigation policy,' not natural variability."}, {"text": "Industrial pollution from Soviet factories raised water temperatures in the lake, increasing evaporation rates beyond natural recharge levels.", "isCorrect": false, "rationale": "Industrial thermal pollution is not the mechanism described in the text. The Aral Sea shrank because its river inflows were diverted for irrigation—a hydrological diversion, not a temperature or evaporation change."}]}, {"question": "Soil salinization is described as 'the principal cause of agricultural land loss in irrigated arid and semi-arid regions worldwide.' What is the sequence of processes by which irrigation causes salinization?", "options": [{"text": "Irrigation water raises the water table, which brings salt from deep rock formations to the surface; the salt then washes into rivers, making them too saline for further use.", "isCorrect": false, "rationale": "While waterlogging can raise water tables, the primary salinization mechanism described in the text is evaporative salt accumulation in the root zone—not salt transport from rock formations to rivers. The problem is salt left in soil as water evaporates, not salt mobilization to rivers."}, {"text": "Irrigation water dissolves salt from the soil and transports it to the ocean, eventually depleting the soil of minerals necessary for plant growth.", "isCorrect": false, "rationale": "This describes the opposite process—leaching salts away. Salinization occurs when drainage is insufficient to carry dissolved salts below the root zone, causing them to accumulate rather than being transported away."}, {"text": "Irrigation water evaporates from the soil surface, leaving dissolved salts behind; if drainage is insufficient to flush these salts below the root zone, they accumulate until soil salinity exceeds the tolerance of crops.", "isCorrect": true, "rationale": "The text states precisely this process: 'when crops are irrigated, water evaporates from the soil surface but leaves dissolved salts behind; if drainage is insufficient to carry those salts below the root zone, they accumulate over years and decades until the soil becomes too saline for crops to absorb water.'"}, {"text": "Irrigation water introduces salt-tolerant weed species that compete with crops and eventually replace them, creating a biological rather than chemical change in the soil.", "isCorrect": false, "rationale": "Salinization is a chemical soil process—the physical accumulation of soluble salts—not a biological displacement of crops by salt-tolerant weeds. The text describes a geochemical process driven by evaporation and inadequate drainage."}]}, {"question": "A satellite image shows a geometric pattern of cleared land advancing into intact Amazon rainforest, with roads providing the initial entry point. The caption describes the pattern as 'the systematic advance of the agricultural frontier.' Based on the text, which sequence of actors most accurately describes this frontier advance?", "options": [{"text": "Soy farmers → loggers → cattle ranchers, in that order, as agribusiness corporations lead the advance and prepare the land for subsequent ranching.", "isCorrect": false, "rationale": "The text describes the sequence in a different order: roads are built first, loggers extract timber, then cattle ranchers move in behind the loggers, and finally soy farmers purchase land that ranchers have made accessible and cheap. Soy farming is the final stage, not the first."}, {"text": "Road construction → loggers extracting timber → cattle ranchers → soy farmers purchasing accessible land.", "isCorrect": true, "rationale": "The text describes this sequence explicitly: 'roads are built, loggers follow to extract valuable timber, cattle ranchers move in behind the loggers, and soy farmers eventually purchase land from ranchers who have made it accessible and cheap.' Roads enable the progression; soy farming is the final stage."}, {"text": "Subsistence farmers practicing swidden agriculture → cattle ranchers buying cleared land → corporate soy production.", "isCorrect": false, "rationale": "The text does not describe traditional swidden farmers as the frontier pioneers in the Amazon. The text earlier distinguished traditional swidden (sustainable, closed-loop) from commercial deforestation. The Amazon frontier advance begins with road construction and is driven by export commodity demand."}, {"text": "Government resettlement programs move landless families into the forest, who clear land and sell it to cattle ranchers.", "isCorrect": false, "rationale": "While Brazilian government colonization programs did occur historically, the text's description of the satellite image focuses on the road-logging-ranching-soy sequence driven by export commodity demand, not on government resettlement as the initiating mechanism."}]}, {"question": "The Gulf of Mexico dead zone is described as a 'concrete, spatially mappable consequence of agricultural decisions made on farms in Iowa, Illinois, and Indiana.' Which process links Corn Belt farming decisions to dead-zone formation in the Gulf?", "options": [{"text": "Intensive farming depletes freshwater aquifers, reducing river flow to the Gulf, which concentrates pollutants already present in coastal waters.", "isCorrect": false, "rationale": "Aquifer depletion is a real consequence of intensive agriculture, but the dead-zone mechanism is specifically nutrient runoff—not reduced river flow. Dead zones form from excess nutrients, not from water concentration of existing pollutants."}, {"text": "Excess nitrogen and phosphorus from synthetic fertilizers run off into drainage systems and rivers, ultimately entering the Gulf of Mexico, where they fuel algal blooms whose bacterial decomposition depletes dissolved oxygen.", "isCorrect": true, "rationale": "The text describes this mechanism precisely: excess nutrients from Corn Belt fertilization run off into streams, rivers, and the Mississippi River, which carries them to the Gulf of Mexico; there they fuel algal blooms, and when the algae die, their bacterial decomposition consumes dissolved oxygen, creating hypoxic conditions where oxygen falls below the level necessary to sustain marine life."}, {"text": "Pesticide runoff from Corn Belt farms enters the Mississippi River and directly kills marine organisms in the Gulf, creating dead zones through chemical toxicity.", "isCorrect": false, "rationale": "The dead-zone mechanism is nutrient-driven hypoxia (oxygen depletion through algal decomposition), not direct pesticide toxicity. The text specifies nitrogen and phosphorus from synthetic fertilizers as the causal nutrients, not pesticide chemicals."}, {"text": "Soil erosion from intensive tillage on Corn Belt farms deposits sediment in the Gulf of Mexico, smothering the seafloor and eliminating oxygen-producing seagrasses.", "isCorrect": false, "rationale": "While sediment runoff can harm coastal ecosystems, the text's explanation of hypoxic zones specifically identifies nitrogen and phosphorus from synthetic fertilizers as the causal nutrients driving algal blooms and oxygen depletion—not sediment smothering seagrasses."}]}, {"question": "Scenario: A policy analyst is comparing two Brazilian administrations: one (2004–2012) that reduced Amazon deforestation by 85%, and another (2019–2022) under which deforestation accelerated. What does the comparison suggest about the primary driver of deforestation rates?", "options": [{"text": "Deforestation rates are primarily driven by global commodity prices, which the 2004–2012 government happened to benefit from by coincidence.", "isCorrect": false, "rationale": "While commodity prices affect deforestation incentives, the text's analysis of the Amazon case emphasizes that deforestation is 'primarily a political and economic choice, not an ecological inevitability.' The 85% reduction under active enforcement—and the subsequent acceleration under weakened enforcement—points to policy as the primary determinant."}, {"text": "Deforestation is primarily a political and economic choice: national enforcement, supply-chain governance (like the Soy Moratorium), and international pressure can produce dramatic reversals in a relatively short time when political will supports them.", "isCorrect": true, "rationale": "The text's explicit conclusion is: 'The Amazon case illustrates that deforestation is primarily a political and economic choice, not an ecological inevitability—and that national policy, supply-chain governance, and international pressure can make a measurable difference in a relatively short timeframe.' The 85% reduction under active enforcement and the subsequent acceleration under reduced enforcement demonstrate this directly."}, {"text": "Deforestation is inevitable once population growth exceeds carrying capacity; governments can only manage the speed of clearing, not prevent it.", "isCorrect": false, "rationale": "The text explicitly rejects ecological inevitability as a framework for understanding Amazon deforestation. The dramatic reversal under one administration and the acceleration under another demonstrate that policy choices—not population inevitability—are the primary drivers."}, {"text": "The comparison shows that only international treaty obligations, not domestic policy, are capable of reducing deforestation in developing countries.", "isCorrect": false, "rationale": "The 85% reduction was achieved through domestic policy instruments: federal enforcement by IBAMA, satellite monitoring systems (PRODES/DETER), and domestic supply-chain pressure (the Soy Moratorium). International pressure played a role, but domestic enforcement was central and the text does not argue that international treaties were the decisive factor."}]}, {"question": "Biodiversity loss from industrial agriculture operates at two levels: genetic diversity within crop species and ecological diversity in surrounding landscapes. Which pair of consequences from the text best illustrates both levels?", "options": [{"text": "Genetic level: more than 100,000 rice varieties displaced by a small number of HYVs, reducing the gene pool for disease and climate resistance. Ecological level: transformation of diverse habitats to monoculture fields eliminates pollinators and other ecosystem-service providers.", "isCorrect": true, "rationale": "The text addresses both levels: at the genetic level, the International Rice Research Institute estimates that more than 100,000 rice varieties existed before the Green Revolution, displaced by a small number of HYVs, reducing the gene pool for future breeding. At the ecological level, monoculture field conversion eliminates the insects, birds, soil organisms, and wild plants that maintain ecosystem services—including wild bee pollination of one-third of global food crops."}, {"text": "Genetic level: crop monocultures attract invasive pest species. Ecological level: irrigation systems dry up rivers, reducing fish biodiversity in agricultural regions.", "isCorrect": false, "rationale": "While invasive pest pressure and irrigation-related river impacts are real concerns, neither is the pair of biodiversity losses the text specifically documents. The text focuses on HYV displacement of traditional crop cultivars (genetic level) and monoculture field conversion eliminating ecosystem-service providers (ecological level)."}, {"text": "Genetic level: synthetic fertilizers inhibit natural genetic variation in crops. Ecological level: pesticide use selects for pesticide-resistant insect species, increasing biodiversity among pest populations.", "isCorrect": false, "rationale": "Neither of these is the biodiversity loss argument presented in the text. The text focuses on HYV adoption displacing traditional cultivars (not fertilizer-induced genetic inhibition) and on monoculture conversion eliminating beneficial species (not pesticide-induced pest evolution)."}, {"text": "Genetic level: farmers in developing countries lack seeds suited to their climates because multinationals only develop crops for wealthy country conditions. Ecological level: large farm machinery compacts soil, reducing soil organism diversity.", "isCorrect": false, "rationale": "These are not the biodiversity loss arguments the text makes in Section 5.4. The text specifically addresses the displacement of thousands of traditional rice varieties by HYVs and the ecosystem service disruption caused by monoculture field conversion—not climate-suitability gaps or machinery-induced soil compaction."}]}, {"question": "The text describes contour plowing, no-till agriculture, cover crops, and agroforestry as sustainable practices. Which correctly matches each practice to the specific environmental problem it primarily addresses?", "options": [{"text": "Contour plowing → soil erosion; no-till → soil structure, moisture, and carbon sequestration; cover crops → erosion, nitrogen fixation, and water retention; agroforestry → shade, windbreaks, pollinator habitat, and carbon sequestration.", "isCorrect": true, "rationale": "All four matches align with the text's descriptions: contour plowing reduces runoff speed and cuts soil erosion; no-till preserves soil structure, reduces erosion, retains moisture, and sequesters carbon in undisturbed organic matter; cover crops suppress erosion, fix nitrogen (if leguminous), and improve water retention; agroforestry provides shade, windbreaks, habitat for pollinators and pest-control species, and carbon sequestration."}, {"text": "Contour plowing → nitrogen runoff; no-till → salinization; cover crops → deforestation; agroforestry → aquifer recharge.", "isCorrect": false, "rationale": "None of these pairings matches the text's descriptions. Contour plowing addresses erosion, not nitrogen specifically; no-till addresses soil structure and carbon, not salinization; cover crops address erosion and soil fertility, not deforestation; agroforestry addresses biodiversity and carbon, not aquifer recharge."}, {"text": "Contour plowing → waterlogging; no-till → pesticide residues; cover crops → excess nutrient runoff; agroforestry → desertification.", "isCorrect": false, "rationale": "None of these matches the text. Contour plowing addresses soil erosion by slowing runoff; no-till preserves soil structure and sequesters carbon; cover crops suppress erosion and fix nitrogen; agroforestry integrates trees for multiple ecological functions. None of the problems listed here is the primary target of the corresponding practice."}, {"text": "All four practices primarily address climate change by sequestering carbon, though they differ in scale and effectiveness.", "isCorrect": false, "rationale": "Carbon sequestration is a benefit of some practices (no-till, agroforestry) but is not the primary problem each practice addresses. The text presents each practice as targeting specific environmental problems: erosion, soil degradation, nitrogen loss, biodiversity decline—with climate co-benefits in some cases."}]}, {"question": "Climate change is altering agricultural geography in two opposite directions in the text's examples. Which pair of examples from the section correctly illustrates how warming can simultaneously expand production in some regions while threatening it in others?", "options": [{"text": "Expanding: American Corn Belt shifting northward into previously marginal Wisconsin, Minnesota, and Canadian Prairies. Threatening: Mekong Delta rice production facing saltwater intrusion and storm surge from sea-level rise.", "isCorrect": true, "rationale": "The text explicitly contrasts these two patterns: warming temperatures allow corn cultivation in previously marginal northern areas (expansion), while in the Mekong Delta—where large areas sit less than one meter above sea level—saltwater intrusion and storm surge intensification threaten rice yields (contraction). The text notes the northward Corn Belt expansion is 'not uniformly good news' because northern soils are shallower and frost risk remains."}, {"text": "Expanding: coffee production zones moving to higher altitudes in Tanzania. Threatening: wheat farming in the American Midwest facing drought.", "isCorrect": false, "rationale": "The text presents the upslope migration of coffee as a threat (shrinking viable zones, possible mountain runout) rather than an expansion. And while Midwest drought is a real concern, the text's specific example of northward agricultural expansion involves Corn Belt corn, not wheat facing drought."}, {"text": "Expanding: tropical forest conversion to agriculture in the Amazon benefiting from warming temperatures. Threatening: European dairy farming facing heat stress.", "isCorrect": false, "rationale": "Amazon deforestation for agriculture is treated in the text as a driver of climate change, not as a consequence of warming enabling new production. European dairy heat stress is not among the climate impacts the text discusses. These are not the examples the text provides for the expansion-versus-contraction dynamic."}, {"text": "Expanding: irrigated rice production in the Sahel benefiting from increased rainfall. Threatening: American Great Plains wheat facing soil salinization from over-irrigation.", "isCorrect": false, "rationale": "The text mentions some Sahelian greening from increased rainfall in the 1990s but does not present Sahel rice expansion as a climate change agricultural expansion example. Great Plains soil salinization is a concern but not among the text's specific climate change agricultural geography examples."}]}, {"question": "Drip irrigation is described as reducing water use by 30–50% compared to flood or sprinkler irrigation while actually increasing yields. Which mechanism explains both benefits simultaneously?", "options": [{"text": "Drip irrigation uses cooler water that reduces crop stress, and the reduced volume prevents nutrient leaching that would otherwise lower yields.", "isCorrect": false, "rationale": "The text does not attribute drip irrigation's benefits to water temperature or nutrient leaching prevention. The mechanism described is precision delivery of water directly to the root zone when plants need it—maximizing plant uptake and minimizing evaporative loss."}, {"text": "Drip irrigation delivers water directly to each plant's root zone through surface or underground tubes, minimizing evaporation and runoff losses while delivering water precisely when plants need it.", "isCorrect": true, "rationale": "The text explains drip irrigation's dual benefit exactly: it delivers water directly to the root zone of individual plants through underground or surface tubes—which reduces total water use by 30–50% by eliminating evaporation and surface runoff—while actually increasing yields by delivering water more precisely when and where plants need it."}, {"text": "Drip irrigation allows farmers to apply fertilizer through the water lines, combining irrigation and fertilization into one efficient step.", "isCorrect": false, "rationale": "While fertigation (fertilizer delivery through irrigation lines) is a real agricultural practice, the text does not describe this as the mechanism for drip irrigation's water savings and yield improvements. The text focuses on the precision delivery of water to the root zone."}, {"text": "Drip irrigation prevents weed growth by keeping the soil surface dry, reducing competition for water and nutrients and improving crop yields.", "isCorrect": false, "rationale": "Dry surface soils from drip irrigation can indeed reduce weed pressure, but the text does not identify weed reduction as the mechanism explaining drip irrigation's yield improvement. The text attributes both benefits—water savings and yield increase—to precision root-zone delivery."}]}, {"question": "Scenario: A student writes in an essay: 'The Sahel's desertification is entirely caused by overgrazing, and the Sahara is clearly expanding southward at a steady rate.' An AP Human Geography teacher marks this paragraph as requiring revision. What two corrections does the teacher most likely have in mind?", "options": [{"text": "The teacher wants the student to identify the Sahel as a zone of expanding agriculture, not degradation, and to distinguish desertification from urban expansion.", "isCorrect": false, "rationale": "The Sahel is indeed a desertification zone, not an expanding agricultural region. And the distinction the text draws is between desertification and natural desert processes—not between desertification and urban expansion."}, {"text": "The teacher wants the student to recognize that desertification is driven by a combination of climate variability and human land use (not overgrazing alone), and that satellite data shows more complex dynamics—including some greening—rather than a simple steady southward Saharan advance.", "isCorrect": true, "rationale": "The text describes two problems with the student's claim: (1) desertification is driven by a combination of climate variability (reduced/erratic rainfall) and human land use (overgrazing, fuel-wood extraction, overcultivation)—not overgrazing alone; and (2) satellite data shows a more complex picture: 'more recent analyses suggest that some greening has occurred in response to increased rainfall since the 1990s,' cautioning against 'simple desertification narratives.'"}, {"text": "The teacher wants the student to identify the Sahel as a North African rather than a West African phenomenon, and to recognize that desertification is caused by synthetic fertilizer use rather than overgrazing.", "isCorrect": false, "rationale": "The Sahel does span West and Central Africa (from Senegal through Mali, Niger, Chad, and Sudan), so calling it a 'West African phenomenon' is partially accurate but incomplete. And synthetic fertilizer is not identified as a Sahel desertification driver—the causes are overgrazing, fuel-wood extraction, and overcultivation combined with climate variability."}, {"text": "The teacher wants the student to acknowledge that all desertification is caused by climate change, and that human land use plays no role in the Sahel's degradation.", "isCorrect": false, "rationale": "This reverses the student's error in the wrong direction. The text explicitly identifies human land use (overgrazing, fuel-wood extraction, overcultivation) as a key component of desertification—not climate change alone. Desertification is the interaction of human and climate factors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
