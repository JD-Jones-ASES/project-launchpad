<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Modeling Demographic Change: DTM and Population Pyramids</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "A demographer examining census data for a sub-Saharan African country finds that the crude death rate has fallen sharply over the past two decades while the crude birth rate remains near 40 per 1,000. Which DTM stage does this profile most clearly represent, and what is the expected demographic consequence?", "options": [{"text": "Stage 1; population remains large but nearly stationary because high birth rates and falling death rates cancel each other out.", "isCorrect": false, "rationale": "Stage 1 features both high birth rates and high death rates. The scenario describes falling death rates while birth rates remain high — the hallmark of Stage 2, not Stage 1. Stage 1 does not involve a sharp CDR decline."}, {"text": "Stage 2; the gap between high birth rates and newly low death rates produces explosive natural increase.", "isCorrect": true, "rationale": "The source text defines Stage 2 as the period when 'death rates fall sharply' while 'birth rates remain high because cultural, economic, and religious norms... do not change quickly. The result is explosive natural increase.' Niger, Mali, and Chad are cited as current Stage-2 examples."}, {"text": "Stage 3; birth rates are just beginning to fall, producing a moderate but decelerating growth rate.", "isCorrect": false, "rationale": "Stage 3 is defined by birth rates beginning to fall as urbanization, women's education, and contraceptive access take hold. The scenario describes a birth rate still near 40 per 1,000 with no indication of decline — this is still Stage 2."}, {"text": "Stage 4; both rates are stabilizing at a low level, resulting in near-zero natural increase.", "isCorrect": false, "rationale": "Stage 4 requires both CBR and CDR to be low. A birth rate near 40 per 1,000 is far above the low-stationary level (typically below 15 per 1,000) that characterizes Stage 4 countries like the United States or France."}]}, {"question": "Which of the following correctly identifies Warren Thompson's and Frank Notestein's respective contributions to the Demographic Transition Model?", "options": [{"text": "Thompson proposed the model in 1945; Notestein provided the original 1929 empirical observation.", "isCorrect": false, "rationale": "The source text reverses this relationship. Thompson's 1929 paper in the American Journal of Sociology first observed the pattern; Notestein formalized it into the DTM in 1945."}, {"text": "Thompson observed the pattern of staggered birth and death rate declines in industrialized countries in 1929; Notestein formalized those observations into the DTM in 1945.", "isCorrect": true, "rationale": "The source text states explicitly: 'Thompson's observation was formalized into the Demographic Transition Model (DTM) by Frank Notestein in 1945.' Thompson's contribution was the empirical observation; Notestein's was the formal theoretical model."}, {"text": "Both Thompson and Notestein independently developed competing versions of the DTM in the same year.", "isCorrect": false, "rationale": "The source text presents a sequential rather than competing relationship: Thompson's 1929 observation preceded and informed Notestein's 1945 formalization. They did not produce competing models simultaneously."}, {"text": "Notestein derived the DTM from the demographic experience of sub-Saharan Africa, while Thompson applied it to Western Europe.", "isCorrect": false, "rationale": "The source text states the DTM was 'derived from Western European experience.' Sub-Saharan Africa is cited as a region that has 'resisted the expected fertility decline' — it is used as a critique of the model, not its empirical foundation."}]}, {"question": "A population pyramid for Country Z shows bars of roughly equal width through age cohorts 15–60, a slight narrowing in the 0–14 bracket, and very narrow bars above age 70. Which DTM stage and pyramid type does this best represent?", "options": [{"text": "Stage 2; expansive pyramid with a very wide base.", "isCorrect": false, "rationale": "An expansive pyramid (Stage 2) has a very wide base reflecting high fertility and a rapidly growing young population — the opposite of the slight narrowing at the base described in the question. Niger's wide-base triangle is the prototypical Stage-2 shape."}, {"text": "Stage 4; stationary pyramid with roughly equal-width bars across working-age cohorts.", "isCorrect": true, "rationale": "The source text describes the stationary pyramid as having 'roughly equal-width bars through most age cohorts, with a slight narrowing at the very top.' The slight narrowing at the 0–14 base and narrow apex for the 70+ group is consistent with near-replacement fertility and low mortality — Stage-4 characteristics."}, {"text": "Stage 5; constrictive pyramid that is narrow at the base and widening through middle age.", "isCorrect": false, "rationale": "A constrictive pyramid (Stage 5, like Japan) is 'narrow at the base and widening through the middle and upper age brackets.' The description in the question shows equal-width working-age bars, not a pyramid that widens toward the middle — more consistent with Stage 4."}, {"text": "Stage 1; high-stationary pyramid with uniformly wide bars at all ages.", "isCorrect": false, "rationale": "Stage 1 features both high birth and death rates, which would produce a wide base but also wide middle bars thinning toward old age. The source text says no country currently occupies Stage 1; it describes pre-industrial societies, not the balanced profile described here."}]}, {"question": "Japan's population has been declining in absolute numbers since 2009. Which combination of demographic indicators is most consistent with this trend?", "options": [{"text": "TFR ≈ 2.1; CDR slightly above CBR; dependency ratio below 50.", "isCorrect": false, "rationale": "A TFR of 2.1 is replacement-level fertility, which would stabilize rather than shrink a population. Japan's TFR is approximately 1.2 — far below replacement — and its dependency ratio is rising past 70, not below 50."}, {"text": "TFR ≈ 1.2; CBR below CDR without immigration; elderly dependency ratio rising past 70.", "isCorrect": true, "rationale": "The source text reports Japan's TFR at approximately 1.2, its population peak in 2009, and its elderly-dependency ratio as 'the world's highest among large countries,' rising past 70. When CBR falls below CDR and immigration is insufficient to compensate, absolute population decline results."}, {"text": "TFR ≈ 7.0; rapid natural increase outpacing immigration; youth dependency ratio above 100.", "isCorrect": false, "rationale": "A TFR of 7 is characteristic of Niger (Stage 2), not Japan (Stage 5). Japan's TFR of approximately 1.2 is among the world's lowest, producing population decline rather than rapid increase."}, {"text": "TFR ≈ 3.5; high CDR from infectious disease; Stage-3 country with declining birth rates.", "isCorrect": false, "rationale": "A TFR of 3.5 with high CDR from infectious disease characterizes a Stage-2 or early Stage-3 country. Japan is firmly Stage 5: birth rates have been below replacement since the 1970s, and the Epidemiological Transition Model places Japan in the 'Age of Degenerative and Human-Made Diseases.'"}]}, {"question": "The Epidemiological Transition Model (ETM) proposed by Abdel Omran complements the DTM by explaining which aspect of demographic change?", "options": [{"text": "The spatial distribution of population across urban and rural areas as countries industrialize.", "isCorrect": false, "rationale": "The ETM is concerned with causes of death, not spatial distribution of settlement. The spatial dimension of development is addressed by other geographic models. Omran's contribution was specifically about how leading killers shift as countries develop."}, {"text": "The shift in leading causes of death from infectious and parasitic diseases to chronic, degenerative diseases as countries develop.", "isCorrect": true, "rationale": "The source text states that the ETM 'describes the causes of death that accompany demographic transition,' identifying three phases moving from the Age of Pestilence and Famine (Stage 1) to the Age of Degenerative and Human-Made Diseases (Stages 4–5). It explains the why of falling death rates that the DTM simply records."}, {"text": "The reasons why birth rates lag behind death rate declines in Stage 2.", "isCorrect": false, "rationale": "The lag between birth and death rate declines in Stage 2 is explained by the DTM itself (cultural norms, economic incentives for large families persist after mortality declines). The ETM adds the explanation of what diseases are declining, not why birth rates remain high."}, {"text": "The mathematical relationship between population size and food supply as nations modernize.", "isCorrect": false, "rationale": "That relationship is the domain of the Malthusian and Boserupian population theories discussed elsewhere in this unit. The ETM is specifically about causes of death, not food supply."}]}, {"question": "A country's dependency ratio is calculated at 75. Among its population, 35% are under age 15, 55% are aged 15–64, and 10% are over 64. What does this dependency ratio primarily reveal about this country's economic situation?", "options": [{"text": "The country faces no significant economic strain because a dependency ratio under 100 is always manageable.", "isCorrect": false, "rationale": "The source text does not define any ratio below 100 as automatically manageable. The type of dependency matters: this country has a high youth-dependency ratio (35% under 15), which may imply a large future labor force but creates immediate strain on education and healthcare services."}, {"text": "The ratio of economically dependent people (under 15 and over 64) to working-age people (15–64) is 75 per 100 workers, indicating meaningful strain on the productive population.", "isCorrect": true, "rationale": "The dependency ratio formula is (population < 15 + population > 64) ÷ population 15–64 × 100 = (35 + 10) ÷ 55 × 100 ≈ 82, close to the 75 given. This indicates that for every 100 workers, roughly 75–82 dependents must be supported, a meaningful productive burden consistent with a Stage-2 or Stage-3 country."}, {"text": "The high elderly share (10% over 64) is the primary driver of the dependency ratio and will generate immediate pension system collapse.", "isCorrect": false, "rationale": "At 10%, the elderly share is relatively modest. The bigger driver in this country is the 35% under-15 youth cohort, indicating a Stage-2 or Stage-3 profile. The source text distinguishes youth from elderly dependency ratios precisely because their fiscal implications differ."}, {"text": "The country is in Stage 5 of the DTM because its dependency ratio exceeds 65.", "isCorrect": false, "rationale": "Stage 5 is characterized by elderly-dominated dependency ratios (Japan's is rising past 70 due to aging). This country's ratio is driven by youth (35% under 15), indicating a younger, growing population more consistent with Stage 2 or 3, not Stage 5."}]}, {"question": "Which of the following is a major critique of the Demographic Transition Model as presented in the source text?", "options": [{"text": "The DTM fails to predict that both birth rates and death rates will eventually fall — a pattern it was designed to model.", "isCorrect": false, "rationale": "The DTM was specifically designed around the observation that birth and death rates both decline through industrialization. It succeeds in modeling this trajectory; the critiques concern its universality and omissions, not this core prediction."}, {"text": "The DTM was derived from Western European experience, omits migration, and may not be a universal law applicable to all countries.", "isCorrect": true, "rationale": "The source text lists these critiques explicitly: the model 'was derived from Western European experience and may not be a universal law'; 'the model also omits migration'; and some regions have resisted expected fertility declines or skipped expected stages."}, {"text": "The DTM incorrectly predicts that death rates will fall before birth rates in all developing countries.", "isCorrect": false, "rationale": "The DTM's prediction that death rates decline first is empirically supported — it is the sequence observed in Western Europe and East Asia. The critiques concern whether this sequence applies universally, not whether the sequence itself is wrong where it has been observed."}, {"text": "The model was first proposed in the 1990s and lacks the historical data to be reliable.", "isCorrect": false, "rationale": "The DTM's origins date to Thompson's 1929 paper and Notestein's 1945 formalization, giving it nearly a century of empirical testing. The critique is about its Western-European derivation and omissions, not its recency or lack of historical evidence."}]}, {"question": "A population geographer examining South Korea in 2023 notes a TFR of approximately 0.7 — the world's lowest for a large nation. According to the DTM framework, which of the following best describes South Korea's demographic trajectory and associated challenges?", "options": [{"text": "South Korea is in Stage 3, experiencing declining birth rates that will stabilize near replacement level within one generation.", "isCorrect": false, "rationale": "Stage 3 describes countries where birth rates are just beginning to fall, typically from around 30 per 1,000 toward replacement level. South Korea's TFR of 0.7 is the world's lowest — far below replacement — placing it firmly in Stage 5, not Stage 3."}, {"text": "South Korea is in Stage 5, with below-replacement fertility generating absolute population decline, aging workforce, and pension system strain.", "isCorrect": true, "rationale": "The source text explicitly cites South Korea alongside Japan as a Stage-5 country, noting its TFR fell to approximately 0.7 in 2023. The cascading consequences — shrinking labor force, rising elderly-dependency ratio, pension solvency pressure — are the same challenges described for Japan."}, {"text": "South Korea is in Stage 2, with declining death rates driving rapid natural increase.", "isCorrect": false, "rationale": "Stage 2 features explosive population growth driven by falling death rates against a backdrop of still-high birth rates. South Korea has one of the world's lowest TFRs, the antithesis of a Stage-2 profile."}, {"text": "South Korea's low TFR is unrelated to the DTM because the model only applies to countries with high death rates.", "isCorrect": false, "rationale": "The DTM explicitly includes Stage 5 to describe countries with below-replacement fertility and declining populations. South Korea is a prime example; the model applies directly to it."}]}, {"question": "In a constrictive population pyramid like Japan's, the widest age bars are found in the 50–70 age range rather than at the base. What historical demographic event does this pattern encode?", "options": [{"text": "Japan experienced a sudden surge in immigration in the 1960s and 1970s that swelled the middle-age cohorts.", "isCorrect": false, "rationale": "The source text notes Japan has 'historically resisted mass immigration.' The wide 50–70 cohorts reflect high birth rates from decades ago (before TFR fell below replacement in the 1970s), not an immigration surge."}, {"text": "Birth rates were higher in Japan in the 1950s–1970s than in subsequent decades, creating larger cohorts that now occupy the middle and upper age brackets.", "isCorrect": true, "rationale": "The source text states Japan's TFR has been below replacement 'since the 1970s,' meaning cohorts born before the 1970s were larger. Those cohorts are now aged 50–70 in the 2020s, creating the wide bars characteristic of Japan's constrictive pyramid. Each subsequent birth cohort is smaller, narrowing the base."}, {"text": "Japan had very high childhood mortality in the 1950s–1970s that thinned the younger cohorts relative to the surviving older ones.", "isCorrect": false, "rationale": "Japan had already completed its epidemiological transition by mid-century; childhood mortality was not elevated in the 1950s–1970s relative to the current period. The pattern reflects fertility decline, not elevated childhood mortality."}, {"text": "Japan's pension policy required workers to remain employed until age 70, concentrating population records in that age bracket.", "isCorrect": false, "rationale": "Population pyramids record actual population counts by age, not employment status or policy eligibility. Retirement age policies do not create wider age cohorts; fertility rates and historical birth volumes do."}]}, {"question": "The source text notes that Germany opened its borders to Syrian refugees in 2015 'partly to address projected labor shortfalls.' Which DTM-related demographic logic underlies this decision?", "options": [{"text": "Germany is in Stage 2 and sought to reduce its rapid population growth by encouraging emigration from its own population to Syria.", "isCorrect": false, "rationale": "Germany is a Stage-5 country with declining population and an aging workforce — the opposite of Stage 2. The logic is to import working-age labor from younger-population countries to offset Germany's shrinking labor force, not to reduce growth."}, {"text": "As a Stage-5 country with below-replacement fertility and a shrinking labor force, Germany used immigration as a demographic remedy to fill gaps that natural population growth could not supply.", "isCorrect": true, "rationale": "The source text explains that 'the demographic remedy for Stage-5 shrinkage is immigration — young workers from Stage-2 and Stage-3 countries filling the labor-force gap.' Germany's decision fits this pattern exactly: accepting working-age Syrian refugees addressed projected shortfalls that its low TFR could not resolve domestically."}, {"text": "Germany is in Stage 3 and accepted refugees to increase its youth-dependency ratio, stimulating consumer spending.", "isCorrect": false, "rationale": "Germany is a Stage-5 country, not Stage 3. The goal of accepting working-age refugees was to add productive labor to the workforce, not to increase youth dependents. Germany's challenge is an insufficient working-age population relative to its growing elderly population."}, {"text": "The decision reflected Germany's high agricultural density and need for farm laborers to expand arable land cultivation.", "isCorrect": false, "rationale": "Germany's labor shortfall is an economy-wide issue driven by an aging population and below-replacement fertility, not a need for agricultural workers specifically. The country has a highly mechanized agricultural sector with low agricultural density."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
