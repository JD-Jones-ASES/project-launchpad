        <h1>QUIZ</h1>
        <div class="subtitle">AP Human Geography &mdash; Theoretical Models of Internal City Structure</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "A city planner studying Detroit notices that as new luxury housing is built in the outermost northern suburbs, older-but-still-decent housing in the same northern corridor gradually becomes available to middle-income residents, who vacate slightly older housing for lower-income residents. This cascading process is best described by which model and concept?", "options": [{"text": "Burgess Concentric Zone Model — invasion and succession, in which each zone continuously expands into the next outer zone.", "isCorrect": false, "rationale": "Invasion and succession in Burgess describes zones expanding outward over time, not the cascading transfer of housing quality from wealthy to lower-income groups along a single directional corridor."}, {"text": "Hoyt Sector Model — filtering, in which older high-quality housing in the same income sector passes to progressively lower-income occupants as wealthier residents build new housing at the fringe.", "isCorrect": true, "rationale": "Hoyt's filtering concept describes exactly this cascade: new high-quality housing is built at the outer edge of the high-income sector, the previously newest housing passes to the next income tier, and so on down the income ladder—all within the same sectoral corridor."}, {"text": "Harris-Ullman Multiple Nuclei Model — agglomeration economies, in which similar income-level housing clusters around specialized employment nodes.", "isCorrect": false, "rationale": "Agglomeration economies in the multiple nuclei model explain why similar businesses cluster near specialized facilities, not the directional transfer of housing quality between income groups."}, {"text": "Galactic City Model — edge city formation, in which suburban employment nodes attract upscale residential development independent of the historic CBD.", "isCorrect": false, "rationale": "Edge city formation describes suburban employment and retail nodes growing around freeway interchanges, not the filtering of housing quality through income tiers in a residential sector."}], "id": "q01"}, {"question": "A geographer working in São Paulo, Brazil observes that the wealthiest residential neighborhoods are concentrated along a single prestigious boulevard extending outward from the historic city center, while the poorest settlements occupy steep hillsides and floodplains at the urban periphery. This pattern most closely matches which urban structure model?", "options": [{"text": "Burgess Concentric Zone Model, because the wealthy live in the outermost commuter zone while the poor occupy the zone of transition near the CBD.", "isCorrect": false, "rationale": "In Burgess, the wealthy occupy the outermost zone and the poor the zone of transition (Zone II). In São Paulo's pattern, the wealthy extend from the center along a spine, and the poorest are at the periphery—the opposite of the Burgess concentric arrangement."}, {"text": "Griffin-Ford Latin American City Model, because affluent residents radiate from the CBD along a prestigious spine while the disamenity sector occupies topographically difficult peripheral land.", "isCorrect": true, "rationale": "The Griffin-Ford model describes exactly this: a vibrant CBD, a spine of high-income development extending outward in one direction, and a disamenity sector of extreme poverty on topographically marginal land (steep hillsides, floodplains, ravines) at the periphery."}, {"text": "McGee Southeast Asian City Model, because the tripartite structure of colonial commercial zones creates separate high-income enclaves independent of the CBD.", "isCorrect": false, "rationale": "McGee's model describes three distinct commercial cores (Western port district, Chinese commercial zone, indigenous market area) rooted in colonial ethnic history—not the spine of elite residential development extending from the CBD described in the scenario."}, {"text": "Sub-Saharan African City Model, because the pattern reflects three distinct CBD-like zones with large informal settlements at the periphery.", "isCorrect": false, "rationale": "The Sub-Saharan African model features three CBDs (modern colonial, traditional market, transitional zone) and informal settlements, but the defining feature of São Paulo's pattern—a prestigious residential spine from the center—is characteristic of the Griffin-Ford model, not the Sub-Saharan one."}], "id": "q02"}, {"question": "Which of the following is the most significant conceptual advance the Harris-Ullman Multiple Nuclei Model made over both the Burgess and Hoyt models?", "options": [{"text": "It recognized that racial segregation and federal housing policy shaped American urban form, which the earlier models ignored.", "isCorrect": false, "rationale": "While important critiques of Burgess and Hoyt involve racial segregation, the multiple nuclei model's specific advance was recognizing multiple employment centers—not adding social policy factors."}, {"text": "It acknowledged that the post-automobile American city had developed multiple centers of specialized activity rather than organizing around a single dominant CBD.", "isCorrect": true, "rationale": "The source states that Harris and Ullman recognized the American city could 'no longer be adequately described by either concentric rings or simple sectors' because the automobile had created multiple nodes—universities, hospitals, airports, suburban retail—that both Burgess and Hoyt's single-CBD assumptions could not accommodate."}, {"text": "It introduced the concept of filtering, explaining how housing quality cascades from wealthy to lower-income residents over time.", "isCorrect": false, "rationale": "Filtering is a concept from Hoyt's Sector Model (1939), not from Harris and Ullman's Multiple Nuclei Model (1945)."}, {"text": "It provided a predictive formula specifying how many nuclei a city of a given size would develop and where they would locate.", "isCorrect": false, "rationale": "The source explicitly identifies this as the multiple nuclei model's weakness, not its strength: 'The multiple-nuclei model describes rather than predicts; it does not specify where nuclei will form or how many there will be.'"}], "id": "q03"}, {"question": "A government report describes a Southeast Asian city containing a colonial port district with European-style offices and banks, a separate commercial quarter historically operated by Chinese merchants, and a traditional indigenous market area—none of which has merged into a single downtown. This description most closely fits which model?", "options": [{"text": "Hoyt Sector Model, because the three commercial districts represent high-, middle-, and low-income sectors radiating outward from the city center.", "isCorrect": false, "rationale": "Hoyt's sectors are organized by income and transportation corridors within North American cities. The three-zone structure described is organized by colonial ethnic and administrative history, not income gradients."}, {"text": "McGee Southeast Asian City Model, because colonial history produced three distinct urban cores—Western commercial, Chinese commercial, and indigenous market—rather than a single Western-style CBD.", "isCorrect": true, "rationale": "McGee's 1967 model specifically describes this tripartite structure created by colonial rule in Southeast Asia: a Western commercial zone, a Chinese 'alien commercial zone,' and a traditional indigenous market area that remain spatially and functionally distinct."}, {"text": "Griffin-Ford Latin American City Model, because the Chinese commercial quarter represents the prestigious spine extending from the CBD.", "isCorrect": false, "rationale": "The Griffin-Ford model's spine is a residential and commercial corridor of the wealthiest residents extending in one direction from a vibrant single CBD—not a separate colonial-era ethnic commercial district."}, {"text": "Galactic City Model, because the three commercial districts represent edge cities that have grown up independent of the historic downtown.", "isCorrect": false, "rationale": "Edge cities in the Galactic City model are automobile-dependent suburban employment nodes built around freeway interchanges, not colonial-era ethnic commercial districts in a compact city core."}], "id": "q04"}, {"question": "Ernest Burgess proposed the concept of 'invasion and succession' to describe how the Chicago industrial city grew. Which of the following scenarios best illustrates this process?", "options": [{"text": "Warehouses and light manufacturing near the CBD are gradually converted to luxury apartments as higher-income residents move toward the city center.", "isCorrect": false, "rationale": "This describes gentrification—a later phenomenon in which investment reverses the outward expansion Burgess described. Invasion and succession in Burgess's model is a process of outward zone expansion, not inward reinvestment."}, {"text": "Working-class Zone III neighborhoods, which absorbed immigrants from Zone II, are now being converted to Zone II uses as the CBD expands, while working-class families move outward into former Zone IV areas.", "isCorrect": true, "rationale": "Burgess's invasion and succession describes each zone continuously expanding outward into the next, with each zone's population displacing the former occupants of the zone beyond them. Zone III families moving into Zone IV territory as Zone III is absorbed by Zone II expansion captures this dynamic."}, {"text": "Suburban edge cities develop around freeway interchanges as employment decentralizes away from the historic CBD.", "isCorrect": false, "rationale": "Edge city development is a concept from the Galactic City model (1980s), reflecting post-1970 decentralization driven by the automobile. It is not part of Burgess's 1923 model."}, {"text": "High-income residential areas expand outward along a prestigious lakefront corridor while lower-income areas occupy sectors near industrial zones.", "isCorrect": false, "rationale": "This describes the sectoral expansion in Hoyt's model, where land uses radiate outward from the CBD along corridors—not the concentric ring expansion by invasion and succession that Burgess proposed."}], "id": "q05"}, {"question": "Tysons Corner, Virginia; the Galleria area of Houston; and Schaumburg, Illinois are all cited as examples of which urban geographic concept?", "options": [{"text": "Primate cities, because each represents the dominant urban node in its respective metropolitan region.", "isCorrect": false, "rationale": "Primate cities (Jefferson) are the dominant cities in a national urban system, not suburban employment nodes. These locations are suburban nodes within larger metropolitan areas, not national urban dominants."}, {"text": "Central places at the K=4 transportation principle level, because they are located on major transportation arteries between larger metropolitan centers.", "isCorrect": false, "rationale": "Central place theory (Christaller) applies to regional hierarchies of service centers on idealized uniform plains—not to the specialized suburban employment and retail nodes that emerged from automobile-dependent metropolitan decentralization."}, {"text": "Edge cities, which are large suburban office-retail complexes that have effectively become secondary downtowns—often with more employment than the historic CBDs they nominally orbit.", "isCorrect": true, "rationale": "The source explicitly lists these locations as examples of edge cities in the Galactic City model: large suburban nodes that grew up around freeway interchanges where residents can 'live, work, shop, and find entertainment... without ever entering the historic downtown.'"}, {"text": "Zones of transition, because each represents an area of mixed land uses on the frontier between residential and commercial development.", "isCorrect": false, "rationale": "Zones of transition in Burgess's model are inner-city areas immediately surrounding the CBD where commercial expansion threatens residential stability. Tysons Corner, the Galleria, and Schaumburg are mature suburban nodes, not inner-city transitional zones."}], "id": "q06"}, {"question": "The source notes that the North American urban models were derived from American cities under specific historical conditions. Which combination of conditions most directly explains why these models cannot be applied universally to cities in Latin America or Southeast Asia?", "options": [{"text": "American cities were built on flat terrain that enabled concentric rings, while Latin American and Southeast Asian cities were built on hilly terrain that disrupted ring formation.", "isCorrect": false, "rationale": "The source identifies social, historical, and economic conditions—not physical terrain—as the reasons for the North American models' limited universality. Many Latin American cities with Griffin-Ford patterns also sit on plains."}, {"text": "Industrial capitalism, mass automobile ownership, racial segregation enforced by law, a weak welfare state, and federal policies subsidizing suburban single-family homeownership shaped North American urban form in ways that do not apply in other world regions.", "isCorrect": true, "rationale": "The source explicitly lists these conditions as the historical context for the North American models and notes that 'none of these conditions apply universally,' which is why global models for Southeast Asia, Latin America, and Sub-Saharan Africa produce fundamentally different spatial organizations."}, {"text": "North American cities are larger than cities in Latin America and Southeast Asia, so the models require scaling adjustments before they can be applied to smaller urban systems.", "isCorrect": false, "rationale": "City size is not the issue identified. The models differ because of fundamentally different historical processes (colonialism, informal housing, absence of suburban homeownership subsidies), not because of population scale differences."}, {"text": "The Chicago School sociologists lacked access to data from cities outside North America, producing models that were inadvertently incomplete rather than deliberately parochial.", "isCorrect": false, "rationale": "While the Chicago School did focus on Chicago, the source's critique is that the historical conditions of American industrial capitalism are not universal—not that the researchers simply lacked data. The global models emerge from different historical conditions, not just more data."}], "id": "q07"}, {"question": "Gideon Sjoberg's pre-industrial city model is described as the baseline from which the industrial and post-industrial models diverge. In which contemporary urban setting is the pre-industrial spatial logic most likely to persist alongside modern city forms?", "options": [{"text": "In the central business districts of North American cities, where tall office buildings continue the pre-industrial pattern of elite concentration at the center.", "isCorrect": false, "rationale": "Modern North American CBDs are commercial and financial centers, not elite residential zones. The Sjoberg pre-industrial pattern of elite residence at the center has been inverted in North America, where affluent households historically moved outward."}, {"text": "In edge cities like Tysons Corner and Schaumburg, where automobile-dependent development has concentrated high-income employment at the urban periphery.", "isCorrect": false, "rationale": "Edge cities are a product of post-1970 automobile-dependent suburbanization—the opposite of the pre-industrial walking-scale city. They represent one of the furthest departures from Sjoberg's model."}, {"text": "In the medinas of North African and Middle Eastern cities, where pre-industrial spatial logic—elite and religious institutions at the center, mixed residential-commercial land use, walking-scale form—persists in the historic core.", "isCorrect": true, "rationale": "The source explicitly states that Sjoberg's pre-industrial spatial logic 'persists today in the medinas of North African and Middle Eastern cities (Fes, Marrakech, Tunis, Cairo's historic core),' existing alongside and in tension with modern industrial and post-industrial city forms."}, {"text": "In Latin American disamenity sectors on hillsides and ravines, where the poorest residents replicate the pre-industrial pattern of extreme poverty at the urban fringe.", "isCorrect": false, "rationale": "The disamenity sector in the Griffin-Ford model shares superficial similarities with Sjoberg's peripheral poverty, but it reflects modern informal urbanization of the poor—not the elite-at-center, poor-at-periphery walking-city structure Sjoberg described, which had different historical causes."}], "id": "q08"}, {"question": "A critic of the Burgess Concentric Zone Model argues that the model's most serious limitation is its assumption of a single dominant CBD. Which of the following urban developments most directly supports this critique?", "options": [{"text": "The growth of primate cities in developing countries, where one metropolitan area dominates all others in the national urban system.", "isCorrect": false, "rationale": "Primacy is a concept about national urban hierarchies, not about the internal structure of a single city. The Burgess model's CBD assumption refers to a single commercial center within one city, not national dominance."}, {"text": "The development of Los Angeles with dispersed employment centers in downtown, Century City, the San Fernando Valley, the South Bay aerospace zone, and the port of San Pedro—each functioning as an independent node.", "isCorrect": true, "rationale": "The source cites Los Angeles as the 'canonical case' for the multiple nuclei model precisely because it has multiple employment centers spread across the metropolitan area—directly contradicting Burgess's assumption of a single dominant CBD organizing all land use in concentric rings."}, {"text": "The emergence of filtering in Chicago's North Shore suburbs, where housing quality cascades through income levels along the lakefront sector.", "isCorrect": false, "rationale": "Chicago's North Shore filtering illustrates the Hoyt Sector Model, not a critique of the single-CBD assumption. Hoyt's model still assumes a single CBD—it modifies the ring structure to sectors but retains the single-center assumption."}, {"text": "The colonial fragmentation of Southeast Asian cities into separate Western, Chinese, and indigenous commercial zones.", "isCorrect": false, "rationale": "While the McGee model does challenge the single-CBD assumption through colonial fragmentation, the source specifically identifies the auto-enabled American city—exemplified by Los Angeles—as the most direct challenge to Burgess's single-CBD concentric model."}], "id": "q09"}, {"question": "The Galactic City model argues that post-1970 American metropolitan residents increasingly live, work, shop, and seek entertainment in suburban nodes without entering the historic downtown. Which of the following is identified in the source as a significant social cost of this urban form?", "options": [{"text": "The collapse of the rank-size distribution in American metropolitan areas as edge cities grow larger than the historic CBDs.", "isCorrect": false, "rationale": "The rank-size rule applies to the national urban hierarchy of independent cities, not to the internal distribution of employment between a downtown and its suburban edge cities. The source does not identify rank-size collapse as a social cost of the galactic city."}, {"text": "Large-scale disinvestment from historic downtowns and inner-city neighborhoods, combined with automobile dependency, air quality problems, infrastructure inefficiency, and displacement of lower-income residents.", "isCorrect": true, "rationale": "The source identifies these as the urban consequences of edge cities: 'large-scale disinvestment from historic downtowns and inner-city neighborhoods,' automobile dependency, 'severe traffic congestion,' and—via the related critique—'displacement of lower-income residents from inner cities now being gentrified or simply bypassed by economic activity.'"}, {"text": "The emergence of Sjoberg-like pre-industrial spatial patterns in American suburbs, with elites at the suburban center and poor residents at the outer fringe.", "isCorrect": false, "rationale": "Sjoberg's pre-industrial pattern (elites at the city center) is essentially the inverse of the Galactic City pattern. Edge cities are auto-dependent suburban nodes far from any city center, not a return to walking-scale elite concentration at a core."}, {"text": "The expansion of the central business district's high land values outward to encompass formerly residential Zone III neighborhoods, displacing working-class residents.", "isCorrect": false, "rationale": "This describes CBD expansion and displacement—a feature of Burgess's invasion and succession or of gentrification—not the defining characteristic of edge city development, which is decentralization away from the CBD."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
