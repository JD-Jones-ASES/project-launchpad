<script>
var QUESTIONS = [{"question": "According to the text, which of the following best describes the fundamental characteristics of Plato's Forms?", "options": [{"text": "Visible, temporary, and subject to change, knowable through sensory experience.", "isCorrect": false, "rationale": "This option describes the characteristics of the sensible world, not Plato's Forms, which are explicitly stated to be invisible and eternal."}, {"text": "Eternal, perfect, invisible, and knowable only through reason.", "isCorrect": true, "rationale": "The text explicitly states: 'the Forms are eternal, perfect, invisible, and knowable only through reason.'"}, {"text": "Relative, subjective, and dependent on human perception and cultural context.", "isCorrect": false, "rationale": "Plato's Forms are presented as objective, unchanging realities, not subjective interpretations."}, {"text": "Known through empirical observation, imperfect, and existing in particular instances.", "isCorrect": false, "rationale": "Forms are known through reason, not empirical observation, and are perfect, not imperfect particulars."}], "id": "q01"}, {"question": "Plato's concept of 'participation' is crucial to the Theory of Forms. How does this concept explain the existence of qualities like beauty or justice in the sensible world?", "options": [{"text": "It suggests that beautiful things create the Form of Beauty through collective human agreement and experience.", "isCorrect": false, "rationale": "Plato's Forms are pre-existent and unchanging realities that particular things participate in, not creations of human agreement."}, {"text": "It means that sensible things are merely illusions, and true beauty or justice exists only in the mind.", "isCorrect": false, "rationale": "While sensible things are imperfect reflections, Plato doesn't claim they are mere illusions, but rather that their qualities derive from real Forms."}, {"text": "It implies that particular beautiful things embody or share in the perfect, eternal Form of Beauty itself.", "isCorrect": true, "rationale": "The text clearly states: 'Every beautiful thing in the world is beautiful by participating in Beauty itself. Every just act is just by participating in Justice itself.'"}, {"text": "It posits that qualities like beauty are entirely subjective and vary from person to person.", "isCorrect": false, "rationale": "Plato's Forms are objective and provide a universal standard for qualities, not subjective preferences."}], "id": "q02"}, {"question": "In the Republic, Plato introduces the Form of the Good as the highest of all Forms. Which of the following best describes its role, according to the text?", "options": [{"text": "It is the ultimate source of all sensory experiences and material existence in the visible world.", "isCorrect": false, "rationale": "While it is the source of being, the text emphasizes its role in the intelligible world, not solely the sensory world."}, {"text": "It provides the truth by which we know and the being by which things exist, analogous to the sun's role in the visible world.", "isCorrect": true, "rationale": "The text directly states the Form of the Good 'provides both the truth by which we know and the being by which things exist,' drawing the analogy with the sun."}, {"text": "It is the specific Form that dictates all moral and ethical laws in a society, independent of reason.", "isCorrect": false, "rationale": "The Form of the Good is broader than just ethical laws; it's the source of all truth and being, and its understanding requires reason."}, {"text": "It represents the collective wisdom of all philosophers throughout history, constantly evolving.", "isCorrect": false, "rationale": "Plato's Forms are eternal and unchanging, not an evolving collective wisdom."}], "id": "q03"}, {"question": "The text states that the Form of the Good provides 'the truth by which we know and the being by which things exist,' much like the sun provides 'the light by which we see and the energy by which things grow.' Based on this analogy, what would a philosopher primarily 'grow' or acquire in the presence of the Form of the Good?", "options": [{"text": "Physical strength and material wealth, by understanding the natural world.", "isCorrect": false, "rationale": "The analogy relates to 'truth' and 'being,' not physical or material attributes. The philosopher's ascent is intellectual."}, {"text": "Social influence and political power, by manipulating others with superior knowledge.", "isCorrect": false, "rationale": "While philosophers may govern, the primary 'growth' from the Form of the Good is intellectual and moral, not manipulative power."}, {"text": "Intellectual understanding and moral insight into the fundamental nature of reality.", "isCorrect": true, "rationale": "Just as the sun enables physical growth and sight, the Form of the Good, as the source of truth and being, enables intellectual growth, knowledge, and understanding of ultimate realities."}, {"text": "Sensory acuity and a heightened awareness of the visible world's details.", "isCorrect": false, "rationale": "The ascent is 'into the intellectual world,' moving away from primary reliance on sensory perception of the visible world."}], "id": "q04"}, {"question": "In Plato's Allegory of the Cave, what do the prisoners initially believe to be the only reality?", "options": [{"text": "The actual objects being carried on the raised walkway behind them.", "isCorrect": false, "rationale": "The prisoners are chained and can only see the wall in front of them, so they cannot see the actual objects."}, {"text": "The fire blazing behind them that casts the shadows.", "isCorrect": false, "rationale": "The prisoners are chained and cannot turn their heads to see the fire."}, {"text": "The shadows cast by the objects and themselves on the cave wall.", "isCorrect": true, "rationale": "The text states: 'The prisoners, knowing nothing else, take these shadows for reality.' and 'To them... the truth would be literally nothing but the shadows of the images.'"}, {"text": "The echoing voices of those carrying objects, which they attribute to the shadows.", "isCorrect": false, "rationale": "While they hear voices and associate them with shadows, their primary visual reality is the shadows themselves, which they mistake for real objects."}], "id": "q05"}, {"question": "The Allegory of the Cave uses various symbols to illustrate philosophical concepts. What does the 'sun outside the cave' specifically represent in this allegory?", "options": [{"text": "The physical sun that provides light and warmth to the natural world.", "isCorrect": false, "rationale": "While it's analogous to the physical sun, its allegorical meaning is philosophical, not literal."}, {"text": "The Form of the Good, the ultimate source of all truth and being in the intellectual world.", "isCorrect": true, "rationale": "The text explicitly states: 'The sun outside the cave is the Form of the Good.'"}, {"text": "The individual philosopher's moment of sudden enlightenment and understanding.", "isCorrect": false, "rationale": "The sun is the source of enlightenment, but it is not the enlightenment itself; it is the Form of the Good."}, {"text": "The visible world of imperfect particulars and sense-impressions.", "isCorrect": false, "rationale": "The visible world is represented by the cave itself and its contents, while the sun is outside it, representing a higher reality."}], "id": "q06"}, {"question": "When the freed prisoner in the Allegory of the Cave is first brought into the sunlight, what is his immediate reaction or experience?", "options": [{"text": "He immediately understands the true nature of reality and feels profound enlightenment.", "isCorrect": false, "rationale": "The text describes a painful, gradual adjustment, not instant understanding."}, {"text": "He is instantly able to see the sun clearly and grasp its significance as the Form of the Good.", "isCorrect": false, "rationale": "The text states he would be 'blinded at first' and requires time to adjust, seeing things gradually."}, {"text": "He experiences sharp pain, distress, and is unable to see the realities, initially preferring the familiar shadows.", "isCorrect": true, "rationale": "The text states he would 'suffer sharp pains; the glare will distress him, and he will be unable to see the realities... he will fancy that the shadows which he formerly saw are truer than the objects which are now shown to him.'"}, {"text": "He feels joy and relief at finally escaping the darkness and immediately embraces the new visible world.", "isCorrect": false, "rationale": "His initial experience is one of discomfort and confusion, not joy or immediate embrace of the new reality."}], "id": "q07"}, {"question": "The 'return to the cave' by the freed philosopher is a crucial part of the allegory's meaning. What does this action primarily signify in Plato's philosophy, especially when considering the Republic?", "options": [{"text": "The philosopher's rejection of the intellectual world in favor of practical affairs, realizing the Forms are irrelevant to daily life.", "isCorrect": false, "rationale": "The return is a duty, not a rejection of the intellectual world, which is still seen as superior."}, {"text": "The inevitable relapse into ignorance and illusion after experiencing truth, as the visible world's pull is too strong.", "isCorrect": false, "rationale": "It's a conscious, difficult choice to descend for the benefit of others, not an involuntary relapse into ignorance."}, {"text": "The obligation of enlightened individuals to share their knowledge, guide others, and potentially govern society.", "isCorrect": true, "rationale": "The text states this return 'anticipates the Republic's argument that philosophers must govern, not retreat from the world' and is 'the philosopher's obligation to help others see the truth.'"}, {"text": "The recognition that the Forms are ultimately unknowable and unattainable for most people.", "isCorrect": false, "rationale": "The Forms are knowable, and the return is about attempting to lead others towards that knowledge, not abandoning them to futility."}], "id": "q08"}, {"question": "The text highlights how the Phaedo and the Republic complement each other regarding Plato's philosophy. What specific aspect of the philosopher's journey and duty does the Republic uniquely emphasize that builds upon the Phaedo's ideas?", "options": [{"text": "The metaphysical definition of Forms as eternal, perfect, and invisible.", "isCorrect": false, "rationale": "The Phaedo gives Plato's 'most explicit statement of the theory' regarding the Forms' characteristics."}, {"text": "The soul's liberation from the body through philosophical pursuit as a means to perceive the Forms directly.", "isCorrect": false, "rationale": "The Phaedo places emphasis 'on the soul's escape from the body' to perceive Forms."}, {"text": "The political dimension of the philosopher's duty to return to the cave and rule based on their knowledge of the Good.", "isCorrect": true, "rationale": "The text states: 'In the Republic, Plato adds a political dimension: the philosopher who has seen the Good must return to the cave to rule.'"}, {"text": "The concept of 'anabasis' or the intellectual ascent from the world of imperfect particulars to knowledge of the Forms.", "isCorrect": false, "rationale": "The Phaedo already introduces the ascent as the philosopher's task; the Republic elaborates with the Cave but adds the political obligation."}], "id": "q09"}, {"question": "Which of the following best summarizes Aristotle's main objection to Plato's Theory of Forms, as mentioned in the text?", "options": [{"text": "Aristotle believed the Forms were too specific and did not account for universal qualities effectively.", "isCorrect": false, "rationale": "This is not the specific criticism mentioned in the text. Aristotle's objection was more fundamental to their necessity."}, {"text": "Aristotle argued that the Forms were unnecessary and created philosophical problems, exemplified by the 'Third Man' argument.", "isCorrect": true, "rationale": "The text states: 'Aristotle... came to reject the Forms as unnecessary and philosophically problematic. The most famous objection is the \"Third Man\" argument.'"}, {"text": "Aristotle thought the Forms were too abstract to be known through reason alone, requiring empirical evidence.", "isCorrect": false, "rationale": "The text does not specify Aristotle's objection to the mode of knowing the Forms, but rather to their existence and utility."}, {"text": "Aristotle contended that the Form of the Good was not truly the highest Form, proposing a different ultimate principle.", "isCorrect": false, "rationale": "While he disagreed with Plato, the text does not state this specific criticism about the hierarchy of Forms."}], "id": "q10"}, {"question": "Augustine wrote that he 'read in the books of the Platonists' ideas that closely paralleled the opening of the Gospel of John. What did Augustine identify as the decisive thing the Platonists had that Christianity uniquely added?", "options": [{"text": "The Platonists had the concept of the soul's immortality, which Christianity rejected in favor of bodily resurrection.", "isCorrect": false, "rationale": "Christianity affirms the soul's immortality while also adding bodily resurrection. Christianity did not reject the soul's immortality — it transformed and extended it."}, {"text": "The Platonists showed the soul could ascend toward the eternal, but lacked the proclamation that the eternal had come down — the Incarnation.", "isCorrect": true, "rationale": "The text states: 'What the Platonists lacked, Augustine said, was the Incarnation — the astonishing claim that the Word \"became flesh and dwelt among us.\" Plato showed that the soul can rise toward the eternal; Christianity proclaimed that the eternal had come down to meet the soul.'"}, {"text": "The Platonists taught that God is incorporeal and evil is the absence of good, which Christianity rejected entirely.", "isCorrect": false, "rationale": "The text says these Platonic insights about God's incorporeality and evil as absence of good actually prepared Augustine for Christian faith — they are points of convergence, not divergence."}, {"text": "The Platonists had the concept of the Logos (Word), which Christianity simply borrowed and renamed.", "isCorrect": false, "rationale": "While both Plato and the Gospel of John use the concept of the Logos, Augustine's point is about what was missing from Plato — not that Christianity merely borrowed the term, but that it added something new: the Word becoming flesh."}], "id": "q11"}, {"question": "The text notes that the deaths of Socrates and Christ are 'the two most famous deaths in Western civilization' and are often compared, yet differ fundamentally. Which statement best captures the deepest difference between them?", "options": [{"text": "Socrates died by poison, while Christ died by crucifixion — the difference is primarily a matter of method and historical context.", "isCorrect": false, "rationale": "The text focuses on the meaning and nature of each death, not the method. The text says 'the differences are as striking as the similarities' and points to something deeper than historical circumstance."}, {"text": "Socrates died to demonstrate the philosophical life; Christ died as a sacrifice to redeem others — one death vindicates a way of living, the other transforms the human condition.", "isCorrect": true, "rationale": "The text states: 'Socrates' death vindicates the philosophical life... Christ's death redeems humanity — it is not a demonstration but a sacrifice, an act of atonement for the sins of the world. Socrates dies for himself... Christ dies for others.'"}, {"text": "Socrates accepted death willingly, while Christ agonized and resisted — making Socrates the more philosophically consistent of the two.", "isCorrect": false, "rationale": "The text explains that Christ's anguish in Gethsemane reflects the Christian view that death is 'an enemy to be conquered, not a friend to be welcomed' — this is a theological difference, not a measure of consistency."}, {"text": "Socrates' death founded the philosophical tradition, while Christ's death founded a religious tradition — the difference is between philosophy and religion.", "isCorrect": false, "rationale": "While both deaths were foundational, the text's point about the deepest difference concerns the nature and meaning of each death (demonstration vs. redemption), not merely the traditions they founded."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
