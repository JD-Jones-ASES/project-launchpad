        <div class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 2, Section 2</div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "What was the specific mathematical problem Socrates helped Meno's slave boy solve in the Meno dialogue?", "options": [{"text": "How to calculate the circumference of a circle.", "isCorrect": false, "rationale": "The Meno dialogue focuses on geometry, specifically squares, not circles or their circumference."}, {"text": "How to construct a square with exactly twice the area of a given square.", "isCorrect": true, "rationale": "The text explicitly states that Socrates 'leads the boy to discover how to construct a square with exactly twice the area of a given square,' concluding that 'the double square is built on the diagonal of the original.'"}, {"text": "How to determine the value of Pi.", "isCorrect": false, "rationale": "The dialogue does not involve the constant Pi, which is related to circles, not the construction of squares with double area."}, {"text": "How to divide a square into three equal parts.", "isCorrect": false, "rationale": "Socrates' demonstration was about doubling the area of a square, not dividing it into three equal parts."}], "id": "q01"}, {"question": "According to Socrates in the Meno, what is the fundamental nature of all learning?", "options": [{"text": "It is the passive reception of information from a teacher.", "isCorrect": false, "rationale": "Socrates explicitly states he 'never tells him the answer' and only 'asks questions,' contradicting the idea of passive reception."}, {"text": "It is the active discovery of new facts through empirical observation.", "isCorrect": false, "rationale": "While discovery is involved, Socrates argues the knowledge comes from within, not solely through new empirical observation. The boy had 'no mathematical training.'"}, {"text": "It is the recollection of knowledge already present in the soul.", "isCorrect": true, "rationale": "Socrates concludes that the slave boy's 'spontaneous recovery of knowledge in him is recollection,' meaning the knowledge was 'already in the boy's soul — placed there before birth.'"}, {"text": "It is the result of divine revelation through prophecy.", "isCorrect": false, "rationale": "The text describes a philosophical argument about innate knowledge and recollection, not divine revelation or prophecy."}], "id": "q02"}, {"question": "How does the Meno's slave boy demonstration relate to the argument about equal sticks in the Phaedo?", "options": [{"text": "Both dialogues present the same metaphysical explanation for innate knowledge.", "isCorrect": false, "rationale": "The text distinguishes their roles: 'The Meno dramatizes the process; the Phaedo gives the underlying metaphysical explanation.'"}, {"text": "The Meno dramatizes the process of recollection, while the Phaedo provides its underlying metaphysical explanation.", "isCorrect": true, "rationale": "The text states, 'The Meno dramatizes the process; the Phaedo gives the underlying metaphysical explanation,' specifically mentioning how in the Phaedo we recollect a Form (Equality) known before birth."}, {"text": "The Meno focuses on empirical learning, while the Phaedo explores abstract mathematical truths.", "isCorrect": false, "rationale": "Both dialogues are used to support the idea of innate knowledge and recollection, challenging purely empirical learning. The Meno demonstration itself involves abstract mathematical truth."}, {"text": "The Meno disproves the existence of Forms, whereas the Phaedo confirms it.", "isCorrect": false, "rationale": "Both dialogues are consistent with and support Plato's theory of Forms and innate knowledge derived from them."}], "id": "q03"}, {"question": "Which of the following ideas did René Descartes consider to be innate, implanted by God, rather than derived from sensory experience?", "options": [{"text": "The idea of a specific color, like red.", "isCorrect": false, "rationale": "Descartes believed sensory experiences like colors are derived from the senses, not innate."}, {"text": "The concept of historical events, such as the Roman Empire.", "isCorrect": false, "rationale": "Knowledge of historical events is acquired through experience, study, and external information, not innate."}, {"text": "The idea of an infinite, perfect being (God) and basic mathematical truths.", "isCorrect": true, "rationale": "The text explicitly states Descartes argued 'the idea of God (an infinite, perfect being), the idea of infinity itself, and the basic truths of mathematics' are 'innate,' placed in us by God."}, {"text": "Practical skills, such as how to build a shelter.", "isCorrect": false, "rationale": "Practical skills are learned through experience, practice, and instruction, not considered innate ideas by Descartes."}], "id": "q04"}, {"question": "While not a Platonist in the same sense, Immanuel Kant's theory of a priori knowledge shares what fundamental similarity with Plato's theory of recollection?", "options": [{"text": "Both believe knowledge is literally remembered from a prior existence.", "isCorrect": false, "rationale": "The text states Kant 'did not believe we remember a prior existence (he was no Platonist in that sense).'"}, {"text": "Both argue that the mind is a blank slate at birth.", "isCorrect": false, "rationale": "Both Plato and Kant's theories contradict the idea of the mind as a blank slate; they both argue the mind brings something to experience."}, {"text": "Both contend that the mind brings pre-existing structures or knowledge to experience, rather than passively receiving everything from the world.", "isCorrect": true, "rationale": "The text states the 'core idea is the same: the mind is not a blank slate that passively receives impressions from the world. It brings something of its own to the encounter.'"}, {"text": "Both attribute innate ideas directly to divine implantation.", "isCorrect": false, "rationale": "Descartes attributed ideas to divine implantation, but Kant focused on categories inherent to the mind itself, not necessarily divinely implanted ideas in the same way."}], "id": "q05"}, {"question": "The idea that the mind is a 'blank slate' (tabula rasa) at birth, with all knowledge coming from experience, is primarily associated with which philosophical tradition?", "options": [{"text": "Platonism", "isCorrect": false, "rationale": "Platonism argues against the blank slate, positing innate knowledge (recollection of Forms)."}, {"text": "Cartesian rationalism", "isCorrect": false, "rationale": "Cartesian rationalism, like Plato's, argues for innate ideas, opposing the blank slate concept."}, {"text": "British empiricism", "isCorrect": true, "rationale": "The text states, 'The British empiricists, especially John Locke (1632–1704), argued that the mind begins as a 'blank slate' (tabula rasa) and that all knowledge comes from experience.'"}, {"text": "Kantian transcendentalism", "isCorrect": false, "rationale": "Kantian philosophy, like Platonism and Cartesianism, argues the mind brings a priori structures to experience, rejecting the blank slate."}], "id": "q06"}, {"question": "Plato's dualism, as described in the text, posits what fundamental relationship between the body and the soul?", "options": [{"text": "The body and soul are two names for the same physical entity.", "isCorrect": false, "rationale": "Plato's dualism is the view that 'mind (or soul) and body are fundamentally different kinds of thing,' making them distinct entities, not just different names for the same thing."}, {"text": "The body is a helpful tool for the soul to achieve truth and wisdom.", "isCorrect": false, "rationale": "Plato saw the body as 'a source of confusion, distraction, and error' and 'an active obstacle to the soul's proper activity,' not a helpful tool."}, {"text": "The body and soul are fundamentally different kinds of things, with the body often acting as an obstacle to the soul's pursuit of truth.", "isCorrect": true, "rationale": "The text defines dualism as 'the doctrine that the soul and the body are two fundamentally different kinds of thing,' and states for Plato, 'the body is an active obstacle to the soul's proper activity.'"}, {"text": "The soul is merely an emergent property of the complex physical brain.", "isCorrect": false, "rationale": "This view, common in some modern materialist philosophies, contradicts Plato's strong dualism where the soul is a distinct, pre-existent entity."}], "id": "q07"}, {"question": "In what specific aspect do Plato's philosophy and the Apostle Paul's writings, as interpreted in the text, find common ground regarding human nature?", "options": [{"text": "Both believe the physical body is inherently evil and must be escaped for salvation.", "isCorrect": false, "rationale": "While Plato sees the body as an obstacle, Paul's 'flesh' refers to rebellion against God, not the physical body as inherently evil. Christianity explicitly refuses to call the body evil."}, {"text": "Both emphasize a tension or conflict within human nature between a 'higher' part (spirit/soul) and 'lower' desires (flesh/body).", "isCorrect": true, "rationale": "The text states, 'In this respect, Plato and the Christian tradition agree: there is a real conflict within human nature, and the higher part of us — the part that reaches toward truth and goodness — must struggle against the lower.'"}, {"text": "Both teach that true knowledge comes from direct communion with perfect Forms.", "isCorrect": false, "rationale": "Direct communion with Forms is a Platonic concept; Paul's writings do not present this as the source of knowledge in the same philosophical sense."}, {"text": "Both advocate for salvation through the resurrection of a transformed physical body.", "isCorrect": false, "rationale": "The resurrection of the body is a Christian doctrine that 'parts company with Plato's' view of escaping the body."}], "id": "q08"}, {"question": "What is a crucial point on which Christian theology, as discussed in the text, fundamentally 'parts company' with Plato's view of the body?", "options": [{"text": "Christianity believes the soul is immortal, while Plato does not.", "isCorrect": false, "rationale": "Both Plato and Christian theology affirm the immortality of the soul."}, {"text": "Plato asserts God created the body as 'very good,' a concept Christianity rejects.", "isCorrect": false, "rationale": "This reverses the actual positions: Christianity asserts the body was created 'very good,' while Plato viewed it as inherently inferior."}, {"text": "Christianity holds that the body is inherently inferior and a prison, whereas Plato sees it as neutral.", "isCorrect": false, "rationale": "This statement misrepresents both positions. Plato saw the body as a 'prison' and 'obstacle,' while Christianity explicitly 'refuses to call the body evil' and asserts its goodness."}, {"text": "Christianity views the body as created good by God and anticipates its resurrection, contrasting with Plato's view of the body as an obstacle to be escaped.", "isCorrect": true, "rationale": "The text clearly states, 'Christianity refuses to go this far. The body is created by God and declared 'very good'... The Christian hope is not the escape of the soul from the body but the resurrection of the body.'"}], "id": "q09"}, {"question": "If Socrates were to hear about the Christian doctrine of the 'resurrection of the body,' based on the provided text, he would most likely consider it:", "options": [{"text": "Good news, as it promises the ultimate triumph of the soul over the body.", "isCorrect": false, "rationale": "Socrates' philosophy views the body as an impediment; a return to a body, even a glorified one, would contradict his goal of the soul's complete separation and withdrawal from bodily influence."}, {"text": "Irrelevant, as his philosophy does not concern itself with the afterlife.", "isCorrect": false, "rationale": "Socrates' philosophy, particularly in the Phaedo, is deeply concerned with the nature of the soul, death, and the afterlife."}, {"text": "Bad news or problematic, because his philosophy sees the body as an impediment from which the soul seeks final separation.", "isCorrect": true, "rationale": "The text highlights that for Plato, 'death is the final, complete separation' from the body, which is an 'obstacle.' The resurrection of the body would directly contradict this core tenet, as noted in the teacher's comment: 'The resurrection of the body is a direct contradiction of Platonic escapism.'"}, {"text": "A neutral concept, as it aligns with his idea of the soul eventually finding a perfect physical form.", "isCorrect": false, "rationale": "Socrates' philosophy aims for the soul's pure, unhindered activity, free from the physical body, not finding a 'perfect physical form.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
