<script>
var QUESTIONS = [{"question": "How does the Phaedo primarily distinguish itself from Plato's earlier dialogues, such as those described as 'short, sharp, and dramatic'?", "options": [{"text": "It focuses exclusively on political philosophy rather than personal ethics.", "isCorrect": false, "rationale": "The text describes the Phaedo as philosophically deeper and more complex, but its focus is on the soul and Forms, not exclusively political philosophy, which wasn't the primary focus of earlier dialogues either."}, {"text": "It is significantly longer, more complex, and delves deeper into sustained philosophical arguments like the immortality of the soul and the Theory of Forms.", "isCorrect": true, "rationale": "The text explicitly states the Phaedo is 'longer, more complex, and philosophically deeper than all three combined,' serving as Plato's 'most sustained argument for the immortality of the soul' and 'most developed statement of the Theory of Forms.'"}, {"text": "It features Plato himself as a central character, directly participating in the philosophical discussions.", "isCorrect": false, "rationale": "The text explicitly states that Plato was not present on the day Socrates died and that the story is relayed through a frame narrative, making this option incorrect."}, {"text": "It presents a lighthearted and humorous tone, contrasting with the serious nature of earlier works.", "isCorrect": false, "rationale": "The context of Socrates' death and the profound philosophical topics indicate a serious and moving tone, not a lighthearted or humorous one."}]}, {"question": "What was the specific reason for the delay in Socrates' execution, as detailed in the text?", "options": [{"text": "Socrates was awaiting an appeal to a higher court.", "isCorrect": false, "rationale": "The text does not mention an appeal; it specifies a religious reason for the delay."}, {"text": "The Athenian authorities were waiting for a new supply of hemlock.", "isCorrect": false, "rationale": "The text makes no mention of a delay related to the availability of hemlock."}, {"text": "A religious festival was underway, during which a sacred ship was at sea, prohibiting any executions in Athens.", "isCorrect": true, "rationale": "The text clearly states, 'Socrates' execution had been delayed for several weeks because of a religious festival: each year the Athenians sent a sacred ship to the island of Delos... and no one could be put to death while the ship was at sea.'"}, {"text": "Socrates was gravely ill, and his execution was postponed until he regained his strength.", "isCorrect": false, "rationale": "The text indicates Socrates was awake and active (rubbing his leg), and his execution was delayed for a religious reason, not his health."}]}, {"question": "Socrates' casual observation on his death day about pleasure and pain being 'fastened together' primarily reveals what about his character?", "options": [{"text": "His resignation to his fate and acceptance of impending suffering.", "isCorrect": false, "rationale": "While he accepts his fate, the observation itself is philosophical, indicating a deeper thought process than mere resignation."}, {"text": "His consistent philosophical mindset, prompting him to engage in abstract thought even in the face of death.", "isCorrect": true, "rationale": "The text states, 'It is a small remark, almost offhand, but it sets the tone for what follows. Even on the morning of his death, Socrates is thinking philosophically,' directly supporting this option."}, {"text": "His desire to distract his friends from the gravity of the situation with a simple anecdote.", "isCorrect": false, "rationale": "The text presents it as a philosophical observation setting a tone, not a distraction tactic."}, {"text": "His physical discomfort from the removed shackles, influencing his thoughts.", "isCorrect": false, "rationale": "While he was rubbing his leg, the text emphasizes the *philosophical* nature of the remark, not merely a physical complaint."}]}, {"question": "The 'frame narrative' structure of the Phaedo, where Phaedo recounts events to Echecrates, primarily serves which of the following purposes?", "options": [{"text": "To allow Plato to present a fictionalized, idealized version of Socrates' death without historical accuracy.", "isCorrect": false, "rationale": "While 'literary device' is mentioned for Plato's absence, the text emphasizes the effect of 'distance and reflection' and filtered emotions, not necessarily an intent to create fiction over accuracy."}, {"text": "To simplify complex philosophical arguments for a broader audience through a dialogue within a dialogue.", "isCorrect": false, "rationale": "The text states the dialogue is 'more complex' and 'philosophically deeper,' not simplified. The purpose is about narrative perspective and emotional depth."}, {"text": "To create a sense of distance and allow for reflection, filtering the raw emotions of the day through memory and narrative.", "isCorrect": true, "rationale": "The text explicitly states this structure 'creates a sense of distance and reflection,' allowing 'emotions of that day [to be] filtered through memory, and the result is both more intimate and more controlled than a direct account would be.'"}, {"text": "To provide a direct, real-time account of Socrates' final conversation.", "isCorrect": false, "rationale": "The text explicitly states, 'We are not watching events unfold in real time; we are hearing them recalled by someone,' contradicting this option."}]}, {"question": "What is the primary significance of Echecrates' role in the frame narrative of the Phaedo?", "options": [{"text": "He acts as an objective historian, ensuring the factual accuracy of Phaedo's account.", "isCorrect": false, "rationale": "Echecrates is described as an 'interested but absent listener' whose reactions guide the story, not as a historian verifying facts."}, {"text": "He serves as the internal audience whose questions and Pythagorean background help guide Phaedo's narration and highlight philosophical nuances.", "isCorrect": true, "rationale": "The text explains Echecrates 'serves as the audience within the dialogue — his questions and reactions guide Phaedo's telling of the story. His Pythagorean background makes him especially receptive to arguments about the soul's immortality, but also alert to their weaknesses.'"}, {"text": "He represents the Athenian jury, offering a continued critique of Socrates' philosophical arguments.", "isCorrect": false, "rationale": "Echecrates is a philosopher from Phlius, interested in the account, not a representative of the Athenian jury or a constant critic in that sense."}, {"text": "He is a co-narrator who shares his own memories of Socrates' last day, complementing Phaedo's story.", "isCorrect": false, "rationale": "Echecrates 'did not witness Socrates' death'; he is an audience member, not a co-narrator sharing his own memories of that day."}]}, {"question": "Simmias' significant objection to the soul's immortality in the Phaedo, as outlined in the text, is based on an analogy that suggests the soul is comparable to what?", "options": [{"text": "A weaver who outlasts many cloaks but eventually dies, implying the soul too could wear out.", "isCorrect": false, "rationale": "This analogy is attributed to Cebes, not Simmias, in the text."}, {"text": "A temporary guest residing in a house, implying it can move on but has no permanent existence.", "isCorrect": false, "rationale": "This specific analogy is not mentioned in the text for Simmias' objection."}, {"text": "The harmony produced by a lyre, suggesting that like music, the soul ceases to exist when the body (instrument) is destroyed.", "isCorrect": true, "rationale": "The text states Simmias 'raises one of the most powerful objections... that the soul might be nothing more than a 'harmony' produced by the body, the way music is produced by a lyre.'"}, {"text": "A shadow cast by a physical object, implying it has no independent reality.", "isCorrect": false, "rationale": "This analogy is not associated with Simmias' objection in the provided text."}]}, {"question": "Cebes' objection to the soul's immortality, as described in the text, challenges Socrates by arguing that:", "options": [{"text": "The soul is merely a biological function and cannot exist independently of the brain.", "isCorrect": false, "rationale": "Cebes grants the soul might be 'more durable than the body' and survive deaths, which contradicts it being a mere biological function in that sense. His objection is about ultimate durability."}, {"text": "Even if the soul outlasts many bodies, it could still eventually perish, like a weaver who outlives many cloaks but ultimately dies.", "isCorrect": true, "rationale": "The text states Cebes 'argues that it could still eventually wear out — like a weaver who outlasts many cloaks but finally dies,' directly matching this option."}, {"text": "The soul's existence is entirely dependent on divine intervention and not on its inherent nature.", "isCorrect": false, "rationale": "While Pythagorean influence is noted, Cebes' specific objection focuses on the soul's potential for eventual decay, not solely divine dependency."}, {"text": "The soul cannot exist without being visibly manifested in the physical world.", "isCorrect": false, "rationale": "This objection is not attributed to Cebes in the text."}]}, {"question": "According to the text, the Phaedo's most profound influence on Western civilization lies in its transformation of ideas concerning:", "options": [{"text": "The Athenian legal system and the proper conduct of trials.", "isCorrect": false, "rationale": "While the setting is a trial's aftermath, the text identifies the central influence as related to the soul and Forms, not legal systems."}, {"text": "The nature of the soul, positing its immortality, pre-existence, and post-existence in a realm of eternal realities.", "isCorrect": true, "rationale": "The text explicitly states, 'Of all Plato's dialogues, the Phaedo has had the greatest influence on how Western civilization thinks about the soul,' detailing its arguments for immortality, pre-existence, and its true home in 'eternal and unchanging realities.'"}, {"text": "The social structure of ancient Greek city-states and the role of philosophers within them.", "isCorrect": false, "rationale": "The text mentions Plato's influence on ideas about the soul, not primarily social or political structures."}, {"text": "The development of scientific methods through observation and empirical study.", "isCorrect": false, "rationale": "The Phaedo's philosophical arguments about the soul and Forms are distinct from the development of scientific methods."}]}, {"question": "The text emphasizes that the Phaedo contains Plato's 'most developed account of the Theory of Forms.' What makes this account so significant in the dialogue?", "options": [{"text": "It is the first time Plato introduces the concept of Forms in any of his writings.", "isCorrect": false, "rationale": "The text mentions Forms were 'hinted at in the Euthyphro' and 'Apology,' indicating it's not the first introduction, but the 'most developed' account."}, {"text": "It argues that Forms are subjective ideals existing only within the human mind.", "isCorrect": false, "rationale": "The text describes Forms as 'perfect, eternal realities' that exist 'behind the changing, imperfect things we see and touch,' knowable by 'reason alone,' which implies objective existence, not subjective ideals."}, {"text": "It firmly establishes the Forms as central, eternal, and unchanging realities distinct from the physical world, which the soul can know through reason.", "isCorrect": true, "rationale": "The text states, 'In the Phaedo, the Forms take center stage,' and describes them as 'perfect, eternal realities — Beauty itself, Justice itself, Equality itself — that the soul can know through reason alone,' fulfilling this description."}, {"text": "It links the Theory of Forms directly to specific political structures and governance models.", "isCorrect": false, "rationale": "While Plato discusses Forms in other contexts (e.g., the Republic), the text for the Phaedo emphasizes their role in the soul's immortality and understanding reality, not specific political structures."}]}, {"question": "What is the broader message Plato intends for readers to grasp about philosophy through the Phaedo, beyond its specific arguments?", "options": [{"text": "That philosophy is an abstract academic discipline best pursued in isolation from worldly concerns.", "isCorrect": false, "rationale": "The text highlights Socrates' actions and the 'moving death scene' as showing that philosophy is 'a way of life that shapes how a person faces the ultimate test,' not an isolated academic pursuit."}, {"text": "That philosophy is fundamentally about disproving religious beliefs and advocating for atheism.", "isCorrect": false, "rationale": "The dialogue explores the immortality of the soul and the realm of Apollo, engaging with metaphysical and theological ideas rather than disproving religion."}, {"text": "That philosophy is a way of life that profoundly shapes how an individual faces ultimate challenges, such as death.", "isCorrect": true, "rationale": "The text concludes by stating, 'Plato wants us to feel the force of Socrates' arguments as well as think about them — to see that philosophy is not an abstract exercise but a way of life that shapes how a person faces the ultimate test.'"}, {"text": "That philosophical inquiry is only accessible and beneficial to a select intellectual elite.", "isCorrect": false, "rationale": "The text doesn't suggest exclusivity; instead, it frames philosophy as a 'way of life' applicable to facing ultimate tests, implying a more universal relevance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
