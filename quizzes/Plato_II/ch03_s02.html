<script>
var QUESTIONS = [{"question": "According to Hilary Putnam's functionalism, how is a mental state like pain primarily defined?", "options": [{"text": "By the specific type of physical material (e.g., neurons) that constitutes it.", "isCorrect": false, "rationale": "Functionalism explicitly states the mind is not identical with the brain's physical material, but with its organization."}, {"text": "By its functional role within a system, including its causes and effects.", "isCorrect": true, "rationale": "The text states, 'A mental state like pain is defined not by which neurons fire but by what role it plays in the system: it is caused by bodily damage, it causes distress and avoidance behavior, and so on.'"}, {"text": "By its ability to oppose the body's physical impulses, as described by Socrates.", "isCorrect": false, "rationale": "This concept relates to Socrates' objection to the soul-as-harmony and Chalmers' hard problem, not the definition of functionalism itself."}, {"text": "By its inherent subjective experience, which cannot be reduced to functional roles.", "isCorrect": false, "rationale": "This describes David Chalmers' 'hard problem of consciousness,' which is a critique or challenge to functionalist-like views, not a defining feature of functionalism."}], "id": "q01"}, {"question": "The text draws a parallel between Simmias' 'soul-as-harmony' objection and functionalism. Which statement best captures the core similarity between these two views?", "options": [{"text": "Both views argue that the mind/soul is an immaterial substance separate from the body.", "isCorrect": false, "rationale": "Both Simmias' harmony and functionalism propose that the soul/mind is dependent on, and arises from, the organization of the physical body/brain, rather than being a separate substance."}, {"text": "Both propose that the mind/soul is reducible to the physical material of the brain or body.", "isCorrect": false, "rationale": "Neither view reduces the mind/soul to the 'stuff' itself. Simmias refers to the 'arrangement' of elements, and functionalism refers to 'functional organization,' not the raw material."}, {"text": "Both suggest that the mind/soul is the organization or pattern of activity, rather than the physical substance itself.", "isCorrect": true, "rationale": "The text explicitly states: 'Simmias proposed that the soul is the harmony... not the stuff itself but the arrangement of the stuff. Functionalism says something very similar: the mind is not the brain's matter but its organization.'"}, {"text": "Both assert that consciousness possesses an inherent ability to resist or govern bodily impulses.", "isCorrect": false, "rationale": "This ability to resist or govern is precisely the point of *critique* against both the soul-as-harmony and functionalist-like views, raised by Socrates and Chalmers, respectively."}], "id": "q02"}, {"question": "David Chalmers' 'hard problem of consciousness' primarily refers to which challenge?", "options": [{"text": "Explaining how physical processes in the brain give rise to complex behaviors and decision-making.", "isCorrect": false, "rationale": "This is considered an 'easy problem' that functionalist explanations aim to address, focusing on observable functions and behaviors."}, {"text": "Identifying the specific neurological pathways involved in different mental states.", "isCorrect": false, "rationale": "This is an empirical problem for neuroscience, not the philosophical 'hard problem' Chalmers formulated."}, {"text": "Understanding why and how physical processes create subjective experience or 'what it is like' to be conscious.", "isCorrect": true, "rationale": "The text defines the hard problem as, 'Even if we could explain every functional operation... we would still not have explained why there is something it is like to be conscious.'"}, {"text": "Reconciling the ancient Greek concept of the soul with modern scientific materialism.", "isCorrect": false, "rationale": "While related, the hard problem is more specifically about the nature of subjective experience within a materialist framework, rather than a broad reconciliation of ancient and modern views."}], "id": "q03"}, {"question": "The text suggests that Socrates' argument against Simmias' soul-as-harmony and Chalmers' hard problem touch the 'same nerve.' What is this common philosophical difficulty they highlight?", "options": [{"text": "The problem of proving the existence of an immortal soul.", "isCorrect": false, "rationale": "While Socrates did argue for an immortal soul, the 'same nerve' here refers to the mind's apparent independence and subjective experience, not specifically its immortality."}, {"text": "The difficulty in explaining how mental phenomena can emerge from purely physical processes and possess apparent independence.", "isCorrect": true, "rationale": "The text states this 'touches the same nerve that Chalmers' hard problem exposes in modern materialism... how to account for the mind's apparent independence from the body.'"}, {"text": "The challenge of creating artificial intelligence that can replicate human cognitive functions.", "isCorrect": false, "rationale": "This is a modern technological application, not the core philosophical difficulty about the nature of consciousness itself."}, {"text": "The inability to empirically observe or measure consciousness in a scientific laboratory setting.", "isCorrect": false, "rationale": "This is a methodological challenge, but the 'hard problem' is a deeper philosophical question about *why* subjective experience exists at all, even if we could perfectly correlate brain states with experience."}], "id": "q04"}, {"question": "A student is studying for a difficult exam. They desperately want to give up and watch TV (Appetite), but they also feel a strong sense of determination to succeed and prove their capabilities (Spirit), which is reinforced by their rational understanding of the exam's importance for their future (Reason). According to Plato's tripartite soul, what does this scenario best illustrate?", "options": [{"text": "The soul acting as a single, unified entity in pursuit of a single goal.", "isCorrect": false, "rationale": "The scenario clearly describes internal conflict, which is why Plato argues for distinct parts of the soul, directly contrasting a single unified entity."}, {"text": "The body's physical impulses overriding the soul's rational decisions.", "isCorrect": false, "rationale": "While the desire to watch TV is an appetite, the scenario shows reason and spirit (emotional drive) potentially overcoming this impulse, not being overridden by it."}, {"text": "The internal conflict within the soul, with different parts vying for control, and spirit aligning with reason.", "isCorrect": true, "rationale": "The text explains that the Republic introduces 'conflict within the soul' and that 'spirit (thumos)... sides with reason in this conflict, providing the emotional energy to resist temptation.'"}, {"text": "The soul's harmony with the body, leading to balanced desires and actions.", "isCorrect": false, "rationale": "The scenario depicts a struggle and imbalance of desires, not harmony between the soul and body or within the soul itself, at least initially."}], "id": "q05"}, {"question": "In Plato's Republic, which part of the soul is primarily associated with the emotional energy and drive that might lead someone to be ambitious or courageous, often aligning with reason against base desires?", "options": [{"text": "Appetite.", "isCorrect": false, "rationale": "Appetite is associated with basic bodily desires like hunger and thirst, not emotional drives for ambition or courage."}, {"text": "Reason.", "isCorrect": false, "rationale": "Reason is the rational, calculating part, but it needs spirit's emotional energy to enforce its judgments against appetite."}, {"text": "Spirit (Thumos).", "isCorrect": true, "rationale": "The text states: 'Thumos: the spirited or passionate part of the soul. It is the seat of anger, indignation, ambition, and courage. Spirit naturally allies with reason against appetite.'"}, {"text": "The Will.", "isCorrect": false, "rationale": "While related, 'the Will' is not one of the three distinct parts Plato outlines in the Republic (Appetite, Reason, Spirit)."}], "id": "q06"}, {"question": "How does Plato's portrayal of the soul in the Republic differ from its presentation in the Phaedo, as discussed in the text?", "options": [{"text": "The Phaedo emphasizes the soul's mortality, while the Republic asserts its immortality.", "isCorrect": false, "rationale": "The Phaedo is well-known for presenting arguments for the *immortality* of the soul."}, {"text": "The Phaedo depicts the soul as a unified, single entity, whereas the Republic describes it as having three distinct, potentially conflicting parts.", "isCorrect": true, "rationale": "The text states: 'The Phaedo presents the soul as a single thing set against the body. But in the Republic... Plato develops a richer picture. The soul is not simple but has three distinct parts.'"}, {"text": "The Phaedo focuses on the soul's ability to resist bodily impulses, while the Republic details its harmony with the body.", "isCorrect": false, "rationale": "Both dialogues discuss the soul's relationship with the body, but the Republic's main addition is the *internal conflict* within the soul itself, not primarily harmony with the body."}, {"text": "The Phaedo relates the soul to functional organization, while the Republic grounds it in physical matter.", "isCorrect": false, "rationale": "Simmias' harmony objection in the Phaedo involves functional organization, but this is the *objection*, not Plato's own view of the soul in that dialogue. Neither grounds the soul in physical matter."}], "id": "q07"}, {"question": "What is the core principle Socrates uses in Republic, Book IV, to argue for the existence of distinct parts within the soul?", "options": [{"text": "The principle that all human actions are driven by a single, underlying desire for the good.", "isCorrect": false, "rationale": "While Plato believes in an ultimate good, this is not the specific logical principle used to differentiate parts of the soul; that argument relies on internal conflict."}, {"text": "The idea that the same thing cannot simultaneously experience contrary states or actions in the same respect.", "isCorrect": true, "rationale": "The text states: 'The same thing clearly cannot act or be acted upon in the same part or in relation to the same thing at the same time, in contrary ways; and therefore whenever this contradiction occurs in things apparently the same, we know that they are really not the same, but different.'"}, {"text": "The observation that the soul is naturally immortal and therefore distinct from the mortal body.", "isCorrect": false, "rationale": "This argument for immortality is prominent in the Phaedo, but the argument for *parts* of the soul in the Republic uses the principle of opposites due to internal conflict."}, {"text": "The argument that the state is a macrocosm of the individual soul, mirroring its structure.", "isCorrect": false, "rationale": "This is an analogy Socrates uses to illustrate the tripartite soul, but it is not the *logical principle* used to establish the existence of those parts."}], "id": "q08"}, {"question": "Imagine a person who is both strongly attracted to a decadent dessert due to its taste and simultaneously repulsed by the idea of eating it because they are on a strict diet. According to Socrates' principle used in the Republic, what does this internal conflict indicate?", "options": [{"text": "That the person's physical body is fighting against their rational mind.", "isCorrect": false, "rationale": "While there is a mind-body aspect, Socrates' argument focuses on internal conflict *within the soul*, demonstrating different parts of the soul are responsible for these opposing inclinations."}, {"text": "That the person's soul is a single, unified entity capable of complex, contradictory desires.", "isCorrect": false, "rationale": "This scenario precisely illustrates why Socrates argues *against* the soul being a single entity, using the principle that one thing cannot desire and refuse the same object simultaneously in the same respect."}, {"text": "That different parts of the soul are at play, each driving a contrary desire or aversion towards the same object.", "isCorrect": true, "rationale": "This directly applies Socrates' principle: since the same thing cannot simultaneously desire and refuse the same object, distinct parts of the soul (e.g., appetite for the dessert, reason/spirit for the diet) must be involved."}, {"text": "That the person is experiencing a temporary mental delusion rather than a genuine conflict of desires.", "isCorrect": false, "rationale": "Plato treats these internal conflicts as genuine and fundamental to understanding the soul's structure, not as temporary delusions."}], "id": "q09"}, {"question": "The section 'Objections and Replies' highlights that Simmias' and Cebes' ancient objections 'opened lines of inquiry that philosophers, theologians, and scientists have pursued ever since.' What is the most significant takeaway from tracing these lines of inquiry in the text?", "options": [{"text": "Ancient Greek philosophy definitively solved the mind-body problem without further need for debate.", "isCorrect": false, "rationale": "The text explicitly states that Socrates did not 'solve' the hard problem, and that the 'same fundamental difficulty... has persisted from ancient Athens to the present day.'"}, {"text": "Modern science has entirely superseded philosophical discussions about the mind and soul.", "isCorrect": false, "rationale": "Chalmers' 'hard problem' demonstrates that philosophical challenges regarding subjective experience remain, even with advanced scientific understanding of the brain."}, {"text": "Fundamental philosophical questions about the nature of the mind and its relationship to the body have a remarkable persistence across centuries and different intellectual traditions.", "isCorrect": true, "rationale": "The entire section demonstrates how ancient objections anticipate modern debates (functionalism, hard problem) and how Plato's own later work developed earlier ideas, showing the enduring nature of these core philosophical inquiries."}, {"text": "Plato's specific theories of the soul, while historically interesting, have no relevance to contemporary philosophical or scientific thought.", "isCorrect": false, "rationale": "The section directly contradicts this by drawing clear parallels between Plato's arguments and modern philosophical concepts like functionalism and the hard problem of consciousness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
