<script>
var QUESTIONS = [{"question": "Why did Plato's philosophical ideas resonate so strongly with early Christian thinkers, particularly the Church Fathers?", "options": [{"text": "Plato advocated for a polytheistic worldview that aligned with early Christian reverence for saints.", "isCorrect": false, "rationale": "Plato's worldview was not polytheistic in the sense that early Christians understood God, and Christianity is fundamentally monotheistic. The text highlights metaphysical alignment, not polytheism."}, {"text": "Plato's doctrines of an immortal soul, a transcendent reality, and a highest Good provided a philosophical framework congenial to Christian convictions.", "isCorrect": true, "rationale": "The text explicitly states that Plato's ideas about the immortal soul, a reality beyond the physical world, and a highest Good 'resonated powerfully with Christian convictions about God, the soul, and eternal life'."}, {"text": "Plato's emphasis on empirical observation of the natural world provided a scientific basis for Christian miracles.", "isCorrect": false, "rationale": "Plato's philosophy emphasized a reality beyond the physical, not empirical observation of the natural world in the way Aristotle did. The text does not link Plato to scientific basis for miracles."}, {"text": "Plato's political philosophy provided a blueprint for the hierarchical structure of the early Church.", "isCorrect": false, "rationale": "The text does not mention Plato's political philosophy as a reason for his appeal to early Christian thinkers; rather, it focuses on his metaphysical and spiritual concepts."}], "id": "q01"}, {"question": "Justin Martyr's concept of *logoi spermatikoi* (seeds of truth) was crucial for early Christian engagement with Greek philosophy because it implied what about pagan thought?", "options": [{"text": "That all Greek philosophy was fundamentally flawed and should be rejected in favor of pure revelation.", "isCorrect": false, "rationale": "This contradicts Justin Martyr's approach, which sought to find common ground and truth within pagan philosophy, claiming it for Christianity."}, {"text": "That pagan philosophers possessed partial truths about God because they were inspired by the divine Logos.", "isCorrect": true, "rationale": "The text explains that Justin Martyr claimed 'Whatever the pagan philosophers had said that was true... belonged by right to the Christians,' implying that elements of truth were present due to the divine Logos."}, {"text": "That Plato had directly copied his ideas from the Hebrew scriptures.", "isCorrect": false, "rationale": "Justin Martyr claimed Plato 'had been inspired by Moses,' which implies divine influence or parallel truth, not direct copying, and the *logoi spermatikoi* concept is broader than just Plato."}, {"text": "That Greek gods were merely different manifestations of the one true Christian God.", "isCorrect": false, "rationale": "Justin Martyr's argument was about finding truth within philosophy that pointed to the monotheistic Christian God, not syncretism of pagan deities."}], "id": "q02"}, {"question": "Augustine of Hippo credited 'the books of the Platonists' with a significant intellectual breakthrough. What was the *limitation* of Platonism that Augustine identified, despite its helpfulness?", "options": [{"text": "It taught him to seek material rather than immaterial reality, hindering his spiritual progress.", "isCorrect": false, "rationale": "Augustine credited Platonism with teaching him to seek 'immaterial reality,' which was a crucial step beyond his earlier materialist beliefs."}, {"text": "It presented a compelling argument for the Word being with God, but failed to show that the Word became flesh.", "isCorrect": true, "rationale": "Augustine explicitly stated in his Confessions that in Platonic books he found 'the doctrine that the Word was with God — but not that the Word became flesh.' He concluded that 'Plato had seen the destination from afar; only Christ provided the way to reach it.'"}, {"text": "It fully reconciled faith and reason, leaving no room for divine revelation.", "isCorrect": false, "rationale": "Augustine fused Platonic philosophy with Christian faith, acknowledging the distinct roles of both, and the text states Platonic philosophy 'could not save the soul,' implying its incompleteness without Christ."}, {"text": "It was a comprehensive system for saving the soul, but lacked practical ethics.", "isCorrect": false, "rationale": "Augustine insisted that Platonic philosophy, however noble, 'could not save the soul.' Its limitation was spiritual salvation, not merely practical ethics."}], "id": "q03"}, {"question": "The dramatic reintroduction of Aristotle's major philosophical works to Western Europe during the twelfth and thirteenth centuries primarily occurred through which process?", "options": [{"text": "Direct rediscovery of original Greek manuscripts by Byzantine scholars.", "isCorrect": false, "rationale": "The text specifies that Aristotle's works came to Western Europe 'not from Greek originals, but from Arabic translations.'"}, {"text": "Translations from Syriac Christian texts directly into Latin.", "isCorrect": false, "rationale": "Syriac was an intermediate step. The primary source for the Latin translations that impacted Western Europe were Arabic texts."}, {"text": "A chain of translations from Greek to Syriac, then to Arabic, and finally into Latin.", "isCorrect": true, "rationale": "The text clearly describes this chain: 'Syriac Christians translated Aristotle into their language; from Syriac, his works passed into Arabic... When these Arabic translations... were translated into Latin...'"}, {"text": "The independent development of Aristotelian ideas by medieval European scholars.", "isCorrect": false, "rationale": "The process described was a recovery and translation of existing works, not an independent philosophical development in Europe."}], "id": "q04"}, {"question": "Considering Thomas Aquinas's synthesis of Platonic and Aristotelian thought, how would he most accurately describe the human soul in relation to the body?", "options": [{"text": "The soul is an independent entity, eternally pre-existent and merely housed temporarily within the body.", "isCorrect": false, "rationale": "This view is more purely Platonic. Aquinas incorporated Aristotle's concept of the soul as the body's form, rather than a pre-existent entity."}, {"text": "The soul is the form of the body, and though it naturally belongs with the body, the rational soul can subsist after death and be reunited with the body at resurrection.", "isCorrect": true, "rationale": "The text states Aquinas 'took Aristotle's concept of the soul as the form of the body and argued that the human rational soul is a special kind of form — one that can subsist without the body after death, even though it naturally belongs with the body and will be reunited with it at the resurrection.'"}, {"text": "The soul is entirely mortal, perishing with the body, as Aristotle implied.", "isCorrect": false, "rationale": "Aquinas sought to reconcile Aristotle's view with the Christian belief in the soul's immortality, not to adopt a purely mortal soul concept."}, {"text": "The soul is a divine spark that can only be understood through mystical experience, separate from philosophical reasoning.", "isCorrect": false, "rationale": "While Aquinas recognized revelation, his work was a 'masterpiece of philosophical engineering' integrating reason with faith regarding the soul."}], "id": "q05"}, {"question": "Upon its reintroduction, Aristotle's comprehensive philosophy posed a significant challenge to Christian doctrine because some of his conclusions suggested which of the following?", "options": [{"text": "That the physical world was an illusion, undermining the goodness of creation.", "isCorrect": false, "rationale": "Aristotle affirmed the reality and goodness of the physical world, which Christian theology also largely embraced, unlike some Platonic interpretations that might view the physical as less real."}, {"text": "That the soul was merely the form of the body and thus mortal, and that the universe was eternal without a specific creation event.", "isCorrect": true, "rationale": "The text states: 'It was also deeply troubling, because Aristotle's conclusions sometimes conflicted with Christian doctrine. The soul as the form of the body (and therefore mortal)? An eternal universe with no creation?'"}, {"text": "That true knowledge could only be gained through divine illumination, negating the role of human reason.", "isCorrect": false, "rationale": "Aristotle emphasized empirical observation and rational inquiry, which Aquinas integrated with, rather than negated by, divine illumination."}, {"text": "That ethical behavior was determined solely by individual will, rather than objective moral law.", "isCorrect": false, "rationale": "Aristotle's ethics were based on practical reason and natural law, which Aquinas built upon within a theological framework, not on pure individual will."}], "id": "q06"}, {"question": "The core of the philosophical tension between Augustinian theologians and Thomists in the late Middle Ages primarily revolved around which of the following dichotomies?", "options": [{"text": "The use of Latin versus vernacular languages in theological discourse.", "isCorrect": false, "rationale": "While language was an issue in later periods, the philosophical debate between Augustinians and Thomists was not primarily about language use but about theological method and underlying philosophical assumptions."}, {"text": "The primacy of faith over reason versus the equal standing of faith and reason.", "isCorrect": false, "rationale": "Both traditions valued faith and reason, but their *methods* for integrating them differed. The Augustinian approach leaned more on direct divine illumination and will, while Thomism emphasized the intellect and abstract reasoning."}, {"text": "The soul's direct illumination by God and the primacy of will versus knowledge through abstraction and a more balanced view of intellect and will.", "isCorrect": true, "rationale": "The text describes the Augustinian tradition as preferring 'the soul's direct illumination by God, the primacy of will over intellect, the deep suspicion of the body and the senses,' while Thomists 'defended the Aristotelian synthesis' which emphasized reason and abstraction."}, {"text": "The belief in divine predestination versus free will.", "isCorrect": false, "rationale": "While a significant theological debate, the text highlights the philosophical differences regarding the integration of Greek thought (Plato vs. Aristotle, illumination vs. abstraction) as the core tension between these groups."}], "id": "q07"}, {"question": "How did the Protestant Reformation's attitude towards Aristotle compare with the post-Council of Trent Catholic Church's position?", "options": [{"text": "Both the Reformers and the Catholic Church universally rejected Aristotle as pagan.", "isCorrect": false, "rationale": "The text states that 'Catholic theology after the Council of Trent reaffirmed Thomism,' which is based on Aristotle, thus contradicting a universal rejection."}, {"text": "The Reformers generally favored a return to Platonic-Augustinian thought, while post-Trent Catholicism reaffirmed Thomism's Aristotelian synthesis.", "isCorrect": true, "rationale": "The text states, 'Martin Luther famously called Aristotle 'that buffoon' and urged a return to Scripture and Augustine — which meant, in philosophical terms, a return to Plato's influence.' In contrast, 'Catholic theology after the Council of Trent reaffirmed Thomism.'"}, {"text": "Both traditions adopted a skeptical approach, seeing philosophy as secondary to direct biblical interpretation.", "isCorrect": false, "rationale": "While the Reformers prioritized Scripture and were suspicious of scholastic method, Catholic theology, especially Thomism, continued to see significant value in philosophical integration."}, {"text": "The Reformers embraced Aristotle's logical methods, while Catholic theology shifted towards a purely mystical approach.", "isCorrect": false, "rationale": "The Reformers were generally suspicious of the scholastic method rooted in Aristotle, and Catholic theology did not shift to a purely mystical approach."}], "id": "q08"}, {"question": "Based on the 'teacher note' at the end of the section, which statement best characterizes the Christian tradition's engagement with Greek philosophy?", "options": [{"text": "Christianity fully adopted Greek philosophical concepts, preserving them unchanged for future generations.", "isCorrect": false, "rationale": "The teacher note explicitly states: 'Christianity did not simply adopt Greek philosophy. It transformed it.'"}, {"text": "Christianity used Greek philosophy as a starting point but fundamentally transformed its ideas to align with Christian doctrine.", "isCorrect": true, "rationale": "The teacher note emphasizes transformation, giving examples like the soul being 'created by God, not eternally pre-existent' (Plato) and 'bodily resurrection, not merely the survival of an abstract form' (Aristotle), indicating a deep modification rather than simple adoption."}, {"text": "Christianity completely rejected Greek philosophy as pagan and incompatible with its tenets.", "isCorrect": false, "rationale": "The entire section details how Greek philosophy became 'two great conversation partners' and was deeply drawn upon by Christian thought, directly contradicting rejection."}, {"text": "Christianity selectively borrowed elements from Greek philosophy that did not require any modification.", "isCorrect": false, "rationale": "The examples provided in the note (created soul vs. pre-existent, bodily resurrection vs. abstract form survival) show that modifications and transformations were central to the engagement."}], "id": "q09"}, {"question": "Which statement best summarizes the overarching relationship between Greek philosophy (Plato and Aristotle) and Christian thought throughout history, as described in the text?", "options": [{"text": "Greek philosophy was initially adopted wholesale by the Early Church but completely abandoned after the Reformation.", "isCorrect": false, "rationale": "The text states the Church 'never simply adopted either one' and demonstrates an ongoing influence well past the Reformation, particularly in Catholic theology."}, {"text": "Christian thought consistently rejected Greek philosophy as incompatible with revelation, leading to minimal influence.", "isCorrect": false, "rationale": "The text clearly states the encounter was 'one of the most consequential events in the history of ideas' and details profound and continuous influence."}, {"text": "Plato and Aristotle became enduring conversation partners, whose ideas were both embraced for their insights and adapted or challenged where they conflicted with Christian doctrine.", "isCorrect": true, "rationale": "This statement captures the core theme: 'The Church never simply adopted either one, but it drew deeply on both — and the tension between their two visions of reality runs through Christian thought... Christianity did not simply adopt Greek philosophy. It transformed it.'"}, {"text": "Aristotle's philosophy dominated Christian thought from the very beginning, with Plato's influence being negligible.", "isCorrect": false, "rationale": "The text explicitly states 'For roughly the first thousand years of Christianity, Plato was the philosopher,' and Aristotle's major works were only widely recovered much later."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
