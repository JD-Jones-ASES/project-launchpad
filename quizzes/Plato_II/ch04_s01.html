<script>
var QUESTIONS = [{"question": "Before his 'second sailing,' what was Socrates' primary area of philosophical interest as a young man?", "options": [{"text": "Ethics and the nature of moral virtues.", "isCorrect": false, "rationale": "While Socrates is famous for ethics, the text states his initial passion was natural philosophy before his intellectual journey led him elsewhere."}, {"text": "The study of logical arguments and definitions.", "isCorrect": false, "rationale": "This describes the focus of his 'second sailing,' which came after his initial interests."}, {"text": "Natural philosophy, investigating the physical causes of natural phenomena.", "isCorrect": true, "rationale": "The text explicitly states Socrates 'was passionately interested in natural philosophy — the investigation of nature' as a young man."}, {"text": "Political philosophy and the ideal structure of the state.", "isCorrect": false, "rationale": "The text does not indicate this was his primary initial interest, focusing instead on natural phenomena."}], "id": "q01"}, {"question": "Socrates was 'bitterly disappointed' with Anaxagoras primarily because:", "options": [{"text": "Anaxagoras' writings were too complex and inaccessible.", "isCorrect": false, "rationale": "The text does not mention the complexity of Anaxagoras' writings as the reason for Socrates' disappointment."}, {"text": "Anaxagoras failed to acknowledge the existence of the Forms.", "isCorrect": false, "rationale": "The Theory of Forms is Socrates' own contribution, not something Anaxagoras was expected to posit."}, {"text": "Anaxagoras invoked Mind ($nous$) only to initiate the cosmos, then relied on purely physical causes for specific phenomena.", "isCorrect": true, "rationale": "Socrates was disappointed because Anaxagoras used Mind only as a starting point, then explained specific events through mechanical forces rather than purpose."}, {"text": "Anaxagoras' theories contradicted basic observed realities, such as the shape of the earth.", "isCorrect": false, "rationale": "Socrates' disappointment was about the type of explanation, not a specific factual inaccuracy regarding physical observations."}], "id": "q02"}, {"question": "A doctor explains that a patient's pain is caused by a pinched nerve. According to Socrates' distinction between a cause and a necessary condition, how would he most likely classify the pinched nerve in this explanation?", "options": [{"text": "It is the true $aitia$ (cause) of the pain, as it explains the ultimate purpose of the body's sensation.", "isCorrect": false, "rationale": "Socrates' true $aitia$ goes beyond physical mechanisms to underlying purposes or Forms. A pinched nerve is a mechanism, a 'how,' not a 'why' in his sense."}, {"text": "It is a necessary condition for the pain, but the true $aitia$ would involve understanding the underlying formal reason why the sensation exists.", "isCorrect": true, "rationale": "The pinched nerve is a physical mechanism that must be present (a condition), but for Socrates, the 'true sense' of cause involves a deeper, formal reason. As the text notes, the bones and muscles 'are conditions — without them, Socrates could not sit anywhere — but they are not the cause in the true sense.'"}, {"text": "It is an irrelevant factor in the true philosophical explanation of pain.", "isCorrect": false, "rationale": "It's not irrelevant; it's a necessary condition. Socrates distinguishes its role, he doesn't dismiss it."}, {"text": "It represents a 'higher hypothesis' for understanding all bodily sensations.", "isCorrect": false, "rationale": "A pinched nerve is a specific observation or condition, not a fundamental philosophical principle or 'higher hypothesis' in Socrates' method."}], "id": "q03"}, {"question": "The 'second sailing' represents a fundamental shift in Socrates' philosophical method, characterized by:", "options": [{"text": "A renewed focus on empirical observation and direct sensory experience of reality.", "isCorrect": false, "rationale": "The 'second sailing' is explicitly a turn away from studying things directly through the senses, likened to 'staring at the sun.'"}, {"text": "The investigation of reality through rational inquiry, arguments, definitions, and hypotheses.", "isCorrect": true, "rationale": "The text defines the 'second sailing' as a 'turn from studying things directly through the senses to studying them through arguments, definitions, and hypotheses,' examining reality through 'the mirror of reason' ($logoi$)."}, {"text": "A primary reliance on mythological narratives and poetic interpretation to explain the cosmos.", "isCorrect": false, "rationale": "While Socrates does employ myth at the end, the 'second sailing' itself is about rational inquiry, not primarily mythological explanation."}, {"text": "The development of advanced scientific instruments to observe natural phenomena more accurately.", "isCorrect": false, "rationale": "This is entirely anachronistic and contrary to Socrates' turn away from direct sensory observation."}], "id": "q04"}, {"question": "According to the method established by Socrates' 'second sailing,' what is the true $aitia$ (cause/explanation) for why a specific act is considered courageous?", "options": [{"text": "Because it results in a successful outcome or victory.", "isCorrect": false, "rationale": "This describes a consequence or effect, not the underlying $aitia$ (explanation/reason) in Socrates' sense."}, {"text": "Because it aligns with the cultural norms and expectations of society.", "isCorrect": false, "rationale": "This would be a social condition or description, not the fundamental Form that makes the act what it is."}, {"text": "Because it participates in the Form of Courage itself.", "isCorrect": true, "rationale": "Socrates states that the true answer to 'Why is this flower beautiful?' is 'because it participates in Beauty itself.' Applying this to courage, participation in the Form of Courage is the true $aitia$."}, {"text": "Because an individual feels a strong sense of duty or inner strength.", "isCorrect": false, "rationale": "While related, this is a subjective internal state, not the objective, perfect Form that defines the essence of Courage."}], "id": "q05"}, {"question": "When applying the method of hypothesis, what should a philosopher do if a foundational hypothesis itself is directly challenged?", "options": [{"text": "Abandon the hypothesis immediately and seek a completely new one.", "isCorrect": false, "rationale": "The text states that one should not abandon it, but 'go up' to a higher hypothesis."}, {"text": "Defend the hypothesis vigorously by gathering more empirical data from sensory observations.", "isCorrect": false, "rationale": "The method of hypothesis relies on $logoi$ (arguments/reason) rather than senses, and it advises 'going up' to a higher hypothesis if challenged, not defending at the same level."}, {"text": "Ascend to a more fundamental, higher hypothesis for justification.", "isCorrect": true, "rationale": "The text clearly states, 'If someone challenges the hypothesis itself, you do not defend it at that level but instead \"go up\" to a higher hypothesis — a more fundamental principle — and test that one in the same way.'"}, {"text": "Reiterate the initial hypothesis with greater conviction, assuming its truth will eventually become apparent.", "isCorrect": false, "rationale": "This does not engage with the challenge in the way Socrates describes; it avoids it."}], "id": "q06"}, {"question": "Which of the following best exemplifies Step 2 of Socrates' Final Argument for Immortality?", "options": [{"text": "The Form of Justice can never embody injustice.", "isCorrect": false, "rationale": "This describes Step 1, where Forms themselves exclude their opposites."}, {"text": "A specific beautiful painting can be destroyed or lose its beauty over time.", "isCorrect": false, "rationale": "This example focuses on the perishability of concrete things, rather than their inherent exclusion of opposite Forms when carrying a specific Form."}, {"text": "The number three, while not the Form of Oddness, cannot simultaneously be an even number because it always carries oddness.", "isCorrect": true, "rationale": "Step 2 states that 'concrete things that carry a Form also exclude the opposite Form.' The number three always carries oddness and thus excludes evenness, paralleling the example of fire carrying heat and excluding cold."}, {"text": "The concept of 'life' is the direct opposite of 'death,' and they cannot coexist.", "isCorrect": false, "rationale": "This relates to the opposition of concepts but doesn't specifically illustrate how a concrete thing carrying a Form excludes the opposite, as described in Step 2."}], "id": "q07"}, {"question": "In the context of Socrates' Final Argument, what is the fundamental relationship he posits between the soul ($psyche$) and life?", "options": [{"text": "The soul is merely a temporary vessel or container for life, which can reside elsewhere.", "isCorrect": false, "rationale": "Socrates describes the soul as intrinsically tied to life, not just a container. It brings life."}, {"text": "The soul is a necessary condition for life, but not its direct cause or essence.", "isCorrect": false, "rationale": "The text states, 'The soul is to life what fire is to heat... The soul always carries life with it,' indicating a fundamental, causative relationship, not just a condition."}, {"text": "The soul is the life principle; wherever the soul is present, the body is alive.", "isCorrect": true, "rationale": "The text explicitly states, 'What makes a body alive? The soul.' and 'For Plato, the soul is not merely a feeling or consciousness but the very thing that makes a living being alive.'"}, {"text": "The soul and life are independent entities that often coincide but are not inherently linked.", "isCorrect": false, "rationale": "The argument rests on their inherent and inseparable link; the soul brings life."}], "id": "q08"}, {"question": "Many later philosophers have identified the weakest point in Socrates' Final Argument for Immortality as the assumption that:", "options": [{"text": "Forms exist independently of the physical world.", "isCorrect": false, "rationale": "The existence of Forms is a foundational premise of the argument, but the text specifically identifies a weakness within the argument's steps."}, {"text": "Concrete things that carry a Form necessarily exclude the opposite Form.", "isCorrect": false, "rationale": "This is described as a 'crucial new insight' (Step 2), not the weakest point of the argument."}, {"text": "The soul, being 'immortal' (not admitting death), is necessarily 'indestructible' (cannot cease to exist).", "isCorrect": true, "rationale": "The text explicitly states, 'But the fifth step — the leap from \"immortal\" to \"indestructible\" — is the weakest point.' Snow does not admit heat while remaining snow, but it can still be destroyed by melting — might the soul be similar?"}, {"text": "Life is always associated with the presence of the soul.", "isCorrect": false, "rationale": "This is Step 3, a key premise, which is foundational to the argument and not identified as its weakest point."}], "id": "q09"}, {"question": "A modern psychologist observes that a specific cognitive bias consistently leads individuals to make irrational decisions. Applying Socrates' philosophical approach from the 'second sailing,' how would he most likely conceptualize the cognitive bias's role?", "options": [{"text": "It is the ultimate $aitia$ (cause) of the irrational decision, explaining the inherent purpose behind it.", "isCorrect": false, "rationale": "A cognitive bias is a mechanism or condition, a 'how.' Socrates would seek a deeper, formal $aitia$, not find it in the mechanism itself."}, {"text": "It is a necessary condition for the irrational decision, but the true $aitia$ would involve understanding the underlying formal reason for the decision's deviation from reason.", "isCorrect": true, "rationale": "The cognitive bias is a mechanism or condition that explains how the irrationality occurs. For Socrates, the true $aitia$ would delve into the deeper 'why' — what the irrational decision participates in."}, {"text": "It provides sufficient proof that neuroscience is the superior method for understanding human behavior.", "isCorrect": false, "rationale": "Socrates' 'second sailing' specifically turned away from reliance on purely physical or mechanical explanations."}, {"text": "It would be considered a higher hypothesis, requiring no further justification for understanding human irrationality.", "isCorrect": false, "rationale": "A cognitive bias is an observed phenomenon or mechanism, not a foundational philosophical principle or 'higher hypothesis' in Socrates' sense."}], "id": "q10"}, {"question": "Socrates ends his final philosophical discussions with an elaborate myth of the afterlife, then adds a remarkable qualification. What does he admit about the myth's details?", "options": [{"text": "He claims certainty about every detail, insisting the myth describes the afterlife exactly as it is.", "isCorrect": false, "rationale": "The text states the opposite: Socrates explicitly admits he cannot be 'very confident' that his description is 'exactly true.'"}, {"text": "He admits the details may not be exactly true, while insisting that something of the kind is true — that the soul is immortal and virtue matters.", "isCorrect": true, "rationale": "The text quotes Socrates directly: 'A man of sense ought not to say, nor will I be very confident, that the description which I have given of the soul and her mansions is exactly true.' But he maintains the spirit of the myth is worth believing."}, {"text": "He concedes that the myth contradicts his philosophical arguments and should be disregarded.", "isCorrect": false, "rationale": "The myth is presented as complementary to the arguments, expressing truths that argument alone cannot fully capture. Socrates does not say it contradicts his reasoning."}, {"text": "He claims the myth was revealed to him directly by the gods and is therefore infallible.", "isCorrect": false, "rationale": "Socrates presents the myth as his own imaginative speculation, not as divine revelation. His characteristic humility about knowledge extends to the myth's details."}], "id": "q11"}, {"question": "Socrates' last words were: 'Crito, I owe a cock to Asclepius; will you remember to pay the debt?' What is the most widely accepted interpretation of this final remark?", "options": [{"text": "It was an expression of regret — Socrates wished he had devoted more time to religious practice rather than philosophy.", "isCorrect": false, "rationale": "The text does not support this interpretation. Socrates shows no regret for his philosophical life; his final words are characteristically thoughtful, not self-critical."}, {"text": "It expressed Socrates' gratitude for being healed — death itself is a kind of healing, the soul's final liberation from the sickness of the body.", "isCorrect": true, "rationale": "Asclepius was the god of healing, and sick people offered roosters in thanks for being cured. The text states: 'By asking Crito to pay this debt, Socrates suggests that death itself is a kind of healing — the final liberation of the soul from the sickness of the body.'"}, {"text": "It was a reminder to fulfill a mundane religious obligation he had forgotten — a practical note with no deeper meaning.", "isCorrect": false, "rationale": "The text acknowledges this as one possible reading but notes that the most widely accepted interpretation is that the remark is 'characteristically philosophical — even at the very end, he is thinking about debts owed and obligations fulfilled.' The healing interpretation is more central."}, {"text": "It was meant to comfort his friends by showing that even in death he was cheerful and unconcerned with great matters.", "isCorrect": false, "rationale": "While the remark does reflect Socrates' calm and composure, the specific symbolism of Asclepius (god of healing) points toward a deeper philosophical significance about death as healing."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
