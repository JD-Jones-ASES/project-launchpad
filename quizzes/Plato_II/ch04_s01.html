<script>
var QUESTIONS = [{"question": "Before his \"second sailing,\" what was Socrates' primary area of philosophical interest as a young man?", "options": [{"text": "Ethics and the nature of moral virtues.", "isCorrect": false, "rationale": "While Socrates is famous for ethics, the text states his initial passion was natural philosophy before his intellectual journey led him elsewhere."}, {"text": "The study of logical arguments and definitions.", "isCorrect": false, "rationale": "This describes the focus of his \"second sailing,\" which came after his initial interests."}, {"text": "Natural philosophy, investigating the physical causes of natural phenomena.", "isCorrect": true, "rationale": "The text explicitly states Socrates \"was passionately interested in natural philosophy — the investigation of nature\" as a young man."}, {"text": "Political philosophy and the ideal structure of the state.", "isCorrect": false, "rationale": "The text does not indicate this was his primary initial interest, focusing instead on natural phenomena."}]}, {"question": "Socrates was \"bitterly disappointed\" with Anaxagoras primarily because:", "options": [{"text": "Anaxagoras' writings were too complex and inaccessible.", "isCorrect": false, "rationale": "The text does not mention the complexity of Anaxagoras' writings as the reason for Socrates' disappointment."}, {"text": "Anaxagoras failed to acknowledge the existence of the Forms.", "isCorrect": false, "rationale": "The Theory of Forms is Socrates' own contribution, not something Anaxagoras was expected to posit."}, {"text": "Anaxagoras invoked Mind (nous) only to initiate the cosmos, then relied on purely physical causes for specific phenomena.", "isCorrect": true, "rationale": "Socrates was disappointed because Anaxagoras used Mind only as a starting point, then explained specific events through mechanical forces rather than purpose, which Socrates sought."}, {"text": "Anaxagoras' theories contradicted basic observed realities, such as the shape of the earth.", "isCorrect": false, "rationale": "Socrates' disappointment was about the *type* of explanation, not a specific factual inaccuracy regarding physical observations."}]}, {"question": "A doctor explains that a patient's pain is caused by a pinched nerve. According to Socrates' distinction between a cause and a necessary condition, how would he most likely classify the pinched nerve in this explanation?", "options": [{"text": "It is the true *aitia* (cause) of the pain, as it explains the ultimate purpose of the body's sensation.", "isCorrect": false, "rationale": "Socrates' true *aitia* goes beyond physical mechanisms to underlying purposes or Forms. A pinched nerve is a mechanism, a 'how,' not a 'why' in his sense."}, {"text": "It is a necessary condition for the pain, but the true *aitia* would involve understanding the underlying Form of Pain or the rational purpose behind its manifestation.", "isCorrect": true, "rationale": "The pinched nerve is a physical mechanism that must be present for the pain (a condition), but for Socrates, the 'true sense' of cause (aitia) would relate to a deeper, formal reason or purpose, such as participation in the Form of Pain itself or why the sensation exists for the organism."}, {"text": "It is an irrelevant factor in the true philosophical explanation of pain.", "isCorrect": false, "rationale": "It's not irrelevant; it's a necessary condition. Socrates distinguishes between its role, not dismisses it."}, {"text": "It represents a 'higher hypothesis' for understanding all bodily sensations.", "isCorrect": false, "rationale": "A pinched nerve is a specific observation or condition, not a fundamental philosophical principle or 'higher hypothesis' in Socrates' method."}]}, {"question": "The \"second sailing\" represents a fundamental shift in Socrates' philosophical method, characterized by:", "options": [{"text": "A renewed focus on empirical observation and direct sensory experience of reality.", "isCorrect": false, "rationale": "The 'second sailing' is explicitly a *turn away* from studying things directly through the senses, likened to 'staring at the sun'."}, {"text": "The investigation of reality through rational inquiry, arguments, definitions, and hypotheses.", "isCorrect": true, "rationale": "The text defines the 'second sailing' as a 'turn from studying things directly through the senses to studying them through arguments, definitions, and hypotheses,' examining reality through 'the mirror of reason' (*logoi*)."}, {"text": "A primary reliance on mythological narratives and poetic interpretation to explain the cosmos.", "isCorrect": false, "rationale": "While Socrates does employ myth at the end, the 'second sailing' itself is about rational inquiry, not primarily mythological explanation."}, {"text": "The development of advanced scientific instruments to observe natural phenomena more accurately.", "isCorrect": false, "rationale": "This is entirely anachronistic and contrary to Socrates' turn away from direct sensory observation."}]}, {"question": "According to the method established by Socrates' \"second sailing,\" what is the true *aitia* (cause/explanation) for why a specific act is considered courageous?", "options": [{"text": "Because it results in a successful outcome or victory.", "isCorrect": false, "rationale": "This describes a *consequence* or *effect*, not the underlying *aitia* (explanation/reason) in Socrates' sense."}, {"text": "Because it aligns with the cultural norms and expectations of society.", "isCorrect": false, "rationale": "This would be a social condition or description, not the fundamental Form that makes the act what it is."}, {"text": "Because it participates in the Form of Courage itself.", "isCorrect": true, "rationale": "Socrates states that the true answer to 'Why is this flower beautiful?' is 'because it participates in Beauty itself.' Applying this to courage, participation in the Form of Courage is the true *aitia*."}, {"text": "Because an individual feels a strong sense of duty or inner strength.", "isCorrect": false, "rationale": "While related, this is a subjective internal state, not the objective, perfect Form that defines the essence of Courage."}]}, {"question": "When applying the method of hypothesis, what should a philosopher do if a foundational hypothesis itself is directly challenged?", "options": [{"text": "Abandon the hypothesis immediately and seek a completely new one.", "isCorrect": false, "rationale": "The text states that one should not abandon it, but 'go up' to a higher hypothesis."}, {"text": "Defend the hypothesis vigorously by gathering more empirical data from sensory observations.", "isCorrect": false, "rationale": "The method of hypothesis relies on *logoi* (arguments/reason) rather than senses, and it advises 'going up' to a higher hypothesis if challenged, not defending at the same level."}, {"text": "Ascend to a more fundamental, higher hypothesis for justification.", "isCorrect": true, "rationale": "The text clearly states, 'If someone challenges the hypothesis itself, you do not defend it at that level but instead “go up” to a higher hypothesis — a more fundamental principle — and test that one in the same way.'"}, {"text": "Reiterate the initial hypothesis with greater conviction, assuming its truth will eventually become apparent.", "isCorrect": false, "rationale": "This does not engage with the challenge in the way Socrates describes; it avoids it."}]}, {"question": "Which of the following best exemplifies Step 2 of Socrates' Final Argument for Immortality?", "options": [{"text": "The Form of Justice can never embody injustice.", "isCorrect": false, "rationale": "This describes Step 1, where Forms themselves exclude their opposites."}, {"text": "A specific beautiful painting can be destroyed or lose its beauty over time.", "isCorrect": false, "rationale": "This example focuses on the perishability of concrete things, rather than their inherent exclusion of opposite Forms when carrying a specific Form."}, {"text": "The number three, while not the Form of Oddness, cannot simultaneously be an even number because it always carries oddness.", "isCorrect": true, "rationale": "Step 2 states that 'concrete things that carry a Form also exclude the opposite Form.' The number three always carries oddness and thus excludes evenness, paralleling the example of fire carrying heat and excluding cold."}, {"text": "The concept of 'life' is the direct opposite of 'death,' and they cannot coexist.", "isCorrect": false, "rationale": "This relates to the opposition of concepts but doesn't specifically illustrate how a concrete thing *carrying* a Form excludes the opposite, as described in Step 2."}]}, {"question": "In the context of Socrates' Final Argument, what is the fundamental relationship he posits between the soul (*psyche*) and life?", "options": [{"text": "The soul is merely a temporary vessel or container for life, which can reside elsewhere.", "isCorrect": false, "rationale": "Socrates describes the soul as intrinsically tied to life, not just a container. It *brings* life."}, {"text": "The soul is a necessary condition for life, but not its direct cause or essence.", "isCorrect": false, "rationale": "The text states, 'The soul is to life what fire is to heat... The soul always carries life with it,' indicating a fundamental, causative relationship, not just a condition."}, {"text": "The soul *is* the life principle; wherever the soul is present, the body is alive.", "isCorrect": true, "rationale": "The text explicitly states, 'What makes a body alive? The soul.' and 'For Plato, the soul is not merely a feeling or consciousness but the very thing that makes a living being alive. Wherever the soul is present, the body is alive.'"}, {"text": "The soul and life are independent entities that often coincide but are not inherently linked.", "isCorrect": false, "rationale": "The argument rests on their inherent and inseparable link; the soul *brings* life."}]}, {"question": "Many later philosophers have identified the weakest point in Socrates' Final Argument for Immortality as the assumption that:", "options": [{"text": "Forms exist independently of the physical world.", "isCorrect": false, "rationale": "The existence of Forms is a foundational premise of the argument, but the text specifically identifies a weakness *within* the argument's steps, not in the foundational premise itself."}, {"text": "Concrete things that carry a Form necessarily exclude the opposite Form.", "isCorrect": false, "rationale": "This is described as a 'crucial new insight' (Step 2), not the weakest point of the argument."}, {"text": "The soul, being 'immortal' (not admitting death), is necessarily 'indestructible' (cannot cease to exist).", "isCorrect": true, "rationale": "The text explicitly states, 'But the fifth step — the leap from “immortal” to “indestructible” — is the weakest point.' It questions whether 'not admitting death' logically entails 'surviving forever' rather than 'going out of existence'."}, {"text": "Life is always associated with the presence of the soul.", "isCorrect": false, "rationale": "This is Step 3, a key premise, which is foundational to the argument and not identified as its weakest point."}]}, {"question": "A modern psychologist observes that a specific cognitive bias consistently leads individuals to make irrational decisions. Applying Socrates' philosophical approach from the \"second sailing,\" how would he most likely conceptualize the cognitive bias's role?", "options": [{"text": "It is the ultimate *aitia* (cause) of the irrational decision, explaining the inherent purpose behind it.", "isCorrect": false, "rationale": "A cognitive bias is a mechanism or condition, a 'how.' Socrates would seek a deeper, formal *aitia* (like a Form of Irrationality or the purpose behind the decision-making process), not find it in the mechanism itself."}, {"text": "It is a necessary condition for the irrational decision, but the true *aitia* would involve understanding the underlying Form or rational purpose of the decision's deviation.", "isCorrect": true, "rationale": "The cognitive bias is a mechanism or condition that explains *how* the irrationality occurs. For Socrates, the true *aitia* would delve into the deeper 'why' or the essence (Form) of irrationality itself, which the bias merely participates in or enables."}, {"text": "It provides sufficient proof that natural philosophy (or neuroscience in this modern context) is the superior method for understanding human behavior.", "isCorrect": false, "rationale": "Socrates' 'second sailing' specifically turned away from reliance on purely physical or mechanical explanations, suggesting *logoi* (rational inquiry) is superior for true understanding."}, {"text": "It would be considered a higher hypothesis, requiring no further justification for understanding human irrationality.", "isCorrect": false, "rationale": "A cognitive bias is an observed phenomenon or mechanism, not a foundational philosophical principle or 'higher hypothesis' in Socrates' sense, which would be abstract and universal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
