<script>
var QUESTIONS = [{"question": "According to Socrates in the Phaedo, what is the philosopher's true attitude toward death?", "options": [{"text": "To view it as the ultimate escape from life's inherent suffering.", "isCorrect": false, "rationale": "Socrates clarifies that he 'does not mean that life is worthless or that we should seek to die,' which contradicts the idea of viewing death as an escape from suffering."}, {"text": "To welcome it as a necessary separation of the soul from the body.", "isCorrect": true, "rationale": "The text states, 'His argument is that the philosopher's whole life is a kind of preparation for death — a gradual separation of the soul from the distractions of the body.' Therefore, welcoming death signifies embracing this separation."}, {"text": "To fear it intensely, as it marks the end of all understanding.", "isCorrect": false, "rationale": "Socrates makes a 'startling claim: the true philosopher does not fear death but actually welcomes it,' which directly contradicts this option."}, {"text": "To ignore it completely, focusing only on the present life.", "isCorrect": false, "rationale": "Socrates' philosophy views life as a 'preparation for death,' indicating that death is a significant consideration, not something to be ignored."}], "id": "q01"}, {"question": "Which statement best characterizes Socrates' approach to presenting arguments for the soul's immortality in the Phaedo?", "options": [{"text": "He presents a single, comprehensive argument that resolves all doubts.", "isCorrect": false, "rationale": "The text explicitly states, 'Socrates makes not one but several arguments for the soul's immortality,' refuting the idea of a single argument."}, {"text": "He offers multiple arguments from different angles, which are critically examined by his friends.", "isCorrect": true, "rationale": "The section notes, 'Socrates presents several distinct arguments... Each one approaches the question from a different angle,' and 'Socrates' friends are not passive listeners: they test each argument.'"}, {"text": "He expects his friends to accept his arguments uncritically due to his wisdom.", "isCorrect": false, "rationale": "The text states, 'The arguments are not meant to be accepted uncritically; they are meant to be weighed, questioned, and understood,' directly contradicting this option."}, {"text": "He focuses solely on empirical evidence to prove the soul's survival.", "isCorrect": false, "rationale": "The text describes philosophical arguments and the Theory of Forms, not a sole reliance on empirical evidence."}], "id": "q02"}, {"question": "Based on Socrates' view in the Phaedo, if someone were to accept his sharp division between body and soul completely, what challenge might they face?", "options": [{"text": "Difficulty in understanding the material world.", "isCorrect": false, "rationale": "Socrates' division separates the soul from the body, but it doesn't suggest a difficulty in understanding the material world."}, {"text": "The need to reconcile the body's potential role in reason and understanding.", "isCorrect": true, "rationale": "Socrates draws a 'sharp line' where 'the body is a source of confusion and desire; the soul is the seat of reason and understanding.' The text prompts the reader to ask 'whether this division is too sharp. Can the body really be so neatly separated from the mind? What would be lost if we accepted Socrates' view completely?'"}, {"text": "The inability to distinguish between different types of souls.", "isCorrect": false, "rationale": "The text does not suggest that accepting the division would hinder the differentiation of souls."}, {"text": "A diminished appreciation for eternal realities.", "isCorrect": false, "rationale": "Accepting Socrates' view that the soul belongs to the 'invisible, unchanging, eternal world' would likely enhance, not diminish, appreciation for eternal realities."}], "id": "q03"}, {"question": "How does the Theory of Forms, as presented in the Phaedo, conceptually support the argument for the soul's immortality?", "options": [{"text": "It demonstrates that the body, like the Forms, is eternal and unchanging.", "isCorrect": false, "rationale": "Socrates states the body 'belongs to the visible, changing, perishable world,' which contradicts the eternal nature of Forms."}, {"text": "It suggests that the soul's ability to know eternal Forms implies its own eternal nature.", "isCorrect": true, "rationale": "The text explicitly links them: 'Watch how the Forms connect to the arguments about the soul: if the soul can know eternal things, perhaps the soul itself is eternal.'"}, {"text": "It proves that sensory experience is the ultimate path to true knowledge.", "isCorrect": false, "rationale": "Socrates argues 'we know about perfect Equality, perfect Beauty, and perfect Justice not through our senses but through the soul's direct acquaintance with the Forms before birth,' contradicting the role of sensory experience."}, {"text": "It establishes a hierarchy of Forms, with the soul at the apex.", "isCorrect": false, "rationale": "While the Theory of Forms involves a hierarchy of realities, the text does not state that the soul is a Form itself or at the apex of this hierarchy, but rather that it knows the Forms."}], "id": "q04"}, {"question": "When Socrates turns to myth in the Phaedo, what is his primary purpose?", "options": [{"text": "To provide literal, factual descriptions of the afterlife.", "isCorrect": false, "rationale": "The text clearly states, 'Socrates himself warns that the details should not be taken literally,' indicating that the myths are not factual descriptions."}, {"text": "To entertain his friends with vivid stories before his death.", "isCorrect": false, "rationale": "While the myths are 'vivid and imaginative,' their primary purpose, as described, is not entertainment but conveying deeper truths."}, {"text": "To express profound truths that arguments alone cannot fully capture, concerning the consequences of choices and the universe's order.", "isCorrect": true, "rationale": "The text explains, 'The myths express truths that argument alone may not be able to capture: that how we live matters, that the soul's destiny depends on the choices we make, and that the universe is ultimately ordered by something good.'"}, {"text": "To admit the limitations of philosophy and the superiority of storytelling.", "isCorrect": false, "rationale": "Socrates uses myth as a complement to argument, not as a sign of philosophy's limitations or storytelling's superiority."}], "id": "q05"}, {"question": "Plato intends for Socrates' death scene in the Phaedo to serve as what?", "options": [{"text": "A tragic illustration of philosophical persecution.", "isCorrect": false, "rationale": "While Socrates was persecuted, the text emphasizes a different aspect: 'Plato clearly wants us to see this death as the ultimate proof of Socrates' philosophy.'"}, {"text": "The ultimate proof of Socrates' philosophical teachings regarding the soul's triumph over death.", "isCorrect": true, "rationale": "The section explicitly states, 'Plato clearly wants us to see this death as the ultimate proof of Socrates' philosophy — that the man who has spent his life caring for his soul meets death without fear.'"}, {"text": "A final opportunity for Socrates to present a new argument for immortality.", "isCorrect": false, "rationale": "The death scene is depicted as a demonstration of his philosophy in action, not an occasion for new arguments."}, {"text": "A cautionary tale about the dangers of challenging societal norms.", "isCorrect": false, "rationale": "While Socrates' trial and execution were due to challenging norms, the text focuses on the philosophical implications of how he faced death, not just the societal consequences."}], "id": "q06"}, {"question": "A student is struggling to understand the complex arguments in the Phaedo on their first read-through. Based on the 'Note on reading the Phaedo,' what advice would be most helpful?", "options": [{"text": "Skim the entire dialogue quickly to get to the ending.", "isCorrect": false, "rationale": "The note advises 'work through the arguments more carefully,' which is contrary to merely skimming."}, {"text": "Focus only on the parts where Socrates' friends raise objections.", "isCorrect": false, "rationale": "The note suggests reading 'each section once for the general flow of the conversation' before focusing on specific arguments, implying a broader initial approach."}, {"text": "Stop reading if a section is too difficult and move to a different text.", "isCorrect": false, "rationale": "The note explicitly says, 'Do not be discouraged if you find certain arguments difficult on first reading,' and 'Patience with the arguments will be rewarded.'"}, {"text": "Read each section for the general flow first, then re-read for a careful examination of the arguments.", "isCorrect": true, "rationale": "The note advises, 'Read each section once for the general flow of the conversation, then go back and work through the arguments more carefully with the help of the explanation sections.'"}], "id": "q07"}, {"question": "Socrates' claim that 'the philosopher's whole life is a kind of preparation for death' implies which of the following about a philosopher's priorities?", "options": [{"text": "Accumulating worldly wisdom and material possessions.", "isCorrect": false, "rationale": "The 'separation of the soul from the distractions of the body' suggests a de-emphasis on material possessions, not their accumulation."}, {"text": "Engaging in a continuous process of separating the soul from bodily distractions.", "isCorrect": true, "rationale": "The text directly states this: 'His argument is that the philosopher's whole life is a kind of preparation for death — a gradual separation of the soul from the distractions of the body.'"}, {"text": "Actively seeking an early end to their earthly existence.", "isCorrect": false, "rationale": "Socrates clarifies he 'does not mean that life is worthless or that we should seek to die,' ruling out actively seeking an early death."}, {"text": "Mastering physical disciplines and bodily control.", "isCorrect": false, "rationale": "The focus is on separating the soul from the body's distractions, not on mastering the body itself, which would still imply engagement with the physical."}], "id": "q08"}, {"question": "According to Socrates' distinction in the Phaedo, which characteristic primarily defines the body?", "options": [{"text": "It is the seat of reason and understanding.", "isCorrect": false, "rationale": "Socrates states that the 'soul is the seat of reason and understanding,' not the body."}, {"text": "It belongs to the invisible, unchanging, eternal world.", "isCorrect": false, "rationale": "Socrates contrasts this, stating 'the body belongs to the visible, changing, perishable world,' while the soul is 'invisible, unchanging, eternal.'"}, {"text": "It is a source of confusion and desire.", "isCorrect": true, "rationale": "The text explicitly states, 'The body is a source of confusion and desire.'"}, {"text": "It is capable of direct acquaintance with the Forms.", "isCorrect": false, "rationale": "Socrates argues 'the soul's direct acquaintance with the Forms' is the means of knowing them, not the body."}], "id": "q09"}, {"question": "What role do Socrates' friends, particularly Simmias and Cebes, play in the philosophical discourse of the Phaedo?", "options": [{"text": "They serve as passive scribes, recording Socrates' monologues.", "isCorrect": false, "rationale": "The text clearly states they are 'not passive listeners' and 'push back with serious objections.'"}, {"text": "They act as critical interlocutors, challenging Socrates' arguments with powerful objections.", "isCorrect": true, "rationale": "The text highlights this, saying 'his friends push back with serious objections' and 'two of them — Simmias and Cebes — raise objections so powerful that the conversation nearly collapses.'"}, {"text": "They consistently agree with Socrates, affirming his every claim.", "isCorrect": false, "rationale": "This contradicts the description of them 'pushing back' and raising 'serious objections.'"}, {"text": "They introduce new philosophical theories distinct from Socrates'.", "isCorrect": false, "rationale": "While they raise objections, their role is described as testing 'each argument' of Socrates, rather than introducing entirely new philosophical theories of their own."}], "id": "q10"}, {"question": "The section notes that the Phaedo 'is longer and more philosophically demanding than the dialogues we read in Volume I.' Which factor most clearly distinguishes the Phaedo's philosophical structure from that of the Euthyphro, Apology, and Crito?", "options": [{"text": "The Phaedo is written in prose, while the earlier dialogues use verse.", "isCorrect": false, "rationale": "All of Plato's dialogues are written in prose. The distinction the text draws is about philosophical complexity, not literary form."}, {"text": "The Phaedo presents multiple distinct arguments for a single philosophical conclusion, each approaching the question from a different angle.", "isCorrect": true, "rationale": "The text states 'Socrates makes not one but several arguments for the soul's immortality,' each from 'a different angle.' The earlier dialogues focus on single themes (piety, the examined life, civic duty) rather than building a multi-argument philosophical case."}, {"text": "The Phaedo is the only dialogue in which Socrates admits he does not know the answer.", "isCorrect": false, "rationale": "Socratic ignorance — acknowledging the limits of knowledge — runs throughout all the dialogues, including the Euthyphro and Apology."}, {"text": "The Phaedo features more characters than the other dialogues, making it harder to follow.", "isCorrect": false, "rationale": "The greater difficulty is not attributed to the number of characters but to the philosophical complexity of multiple interlocking arguments."}], "id": "q11"}, {"question": "The section describes the Phaedo's death scene as raising 'a question that transcends any single argument.' What is that transcendent question?", "options": [{"text": "Whether Socrates was truly innocent of the charges brought against him.", "isCorrect": false, "rationale": "Socrates' innocence or guilt was the subject of the Apology, not the question the death scene raises in the Phaedo."}, {"text": "What kind of life produces the courage to face death with composure and even humor.", "isCorrect": true, "rationale": "The text explicitly asks: 'Whether or not you find the philosophical arguments convincing, the death scene raises a question that transcends any single argument: what kind of life produces the courage to die like this?'"}, {"text": "Whether the arguments for the soul's immortality are logically valid.", "isCorrect": false, "rationale": "The question of argument validity is precisely what the text says this deeper question 'transcends' — the death scene points beyond the arguments themselves."}, {"text": "Whether Socrates should have accepted Crito's offer to escape from prison.", "isCorrect": false, "rationale": "The question of escape was resolved in the Crito. The death scene in the Phaedo raises a question about the philosophical life itself, not revisiting the escape decision."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
