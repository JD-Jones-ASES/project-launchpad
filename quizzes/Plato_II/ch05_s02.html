<script>
var QUESTIONS = [{"question": "What does Plato's Theory of Forms suggest about the ultimate nature of reality?", "options": [{"text": "Reality is primarily composed of the material objects perceived by the senses.", "isCorrect": false, "rationale": "Plato explicitly states that the physical world is less real and merely a 'shadow' or 'imperfect copy' of true reality, which resides in the Forms."}, {"text": "The physical world is an imperfect reflection of a more fundamental, unchanging realm of Forms.", "isCorrect": true, "rationale": "This accurately summarizes Plato's core belief: the Forms are the perfect, eternal, and unchanging realities, and the physical world 'participates' in them but never perfectly embodies them."}, {"text": "Ultimate reality is subjective, varying from one individual's perception to another.", "isCorrect": false, "rationale": "Plato's Forms are objective, universal realities, not subject to individual interpretation or perception. He sought an unchanging basis for truth."}, {"text": "Reality is a constant state of flux, with no stable underlying principles.", "isCorrect": false, "rationale": "While Plato acknowledged the changing nature of the physical world, his Theory of Forms was precisely an attempt to find stable, unchanging principles (the Forms) behind this flux."}], "id": "q01"}, {"question": "According to Aristotle's concept of hylomorphism, what constitutes a 'substance' like a horse?", "options": [{"text": "A separate, perfect Form of Horse existing in an ideal realm.", "isCorrect": false, "rationale": "This describes Plato's view. Aristotle explicitly rejected the idea of Forms existing in a separate realm, arguing the form is 'right here, in the thing itself.'"}, {"text": "Matter and form united together, where the form is embedded within the physical thing itself.", "isCorrect": true, "rationale": "Hylomorphism is defined as every physical substance being a composite of matter and form, neither of which exists independently in the physical world but are always found together in concrete substances."}, {"text": "Pure potentiality, also known as 'prime matter,' that has not yet acquired any form.", "isCorrect": false, "rationale": "Prime matter is described as indeterminate potentiality, which requires form to become a definite kind of thing. A substance is an actual, definite thing, not pure potentiality."}, {"text": "A collection of qualities and quantities that exist independently of any underlying stuff.", "isCorrect": false, "rationale": "Aristotle's 'Categories' states that qualities, quantities, and relations exist only as features of some 'substance,' not independently."}], "id": "q02"}, {"question": "How does Aristotle's 'Third Man' argument challenge Plato's Theory of Forms?", "options": [{"text": "It suggests that Forms are not eternal but change over time.", "isCorrect": false, "rationale": "The Third Man argument does not focus on the temporal nature of Forms, but on a logical problem of infinite regress."}, {"text": "It demonstrates that knowledge derived from the senses is superior to pure reason.", "isCorrect": false, "rationale": "While Aristotle valued observation, the 'Third Man' argument is a logical critique of the Forms' explanatory power, not a direct argument for the superiority of sensory data."}, {"text": "It exposes an infinite regress, implying that a separate Form is always needed to explain the commonality between things and their Forms.", "isCorrect": true, "rationale": "The argument states that if a Form is needed to explain what individual beautiful things have in common, then a 'second Form of Beauty' would be needed to explain what the beautiful things *and* the first Form of Beauty have in common, leading to an endless chain."}, {"text": "It argues that the Form of the Good is not the highest Form.", "isCorrect": false, "rationale": "The Third Man argument can be applied to any Form and focuses on the logical flaw of infinite regress in explanation, not the hierarchy of Forms."}], "id": "q03"}, {"question": "Imagine a scientist meticulously observing and classifying various species of birds to understand their fundamental characteristics. How would Plato most likely view the knowledge gained from this activity?", "options": [{"text": "As the highest form of knowledge, leading directly to the apprehension of the Form of Bird.", "isCorrect": false, "rationale": "Plato believed true knowledge comes from pure reason and direct apprehension of Forms, not through observation of the imperfect physical world."}, {"text": "As mere opinion or a study of appearances, useful perhaps, but not true knowledge of unchanging reality.", "isCorrect": true, "rationale": "Plato saw the physical world as 'shadows' and knowledge gained through the senses as 'mere opinion.' The philosopher's task is to 'turn the soul away' from this world."}, {"text": "As a necessary first step that, once completed, allows for a direct ascent to the world of Forms.", "isCorrect": false, "rationale": "While observation might spark curiosity, Plato emphasized transcending, rather than extensively studying, the physical world to reach true knowledge."}, {"text": "As irrelevant to philosophical inquiry, which should solely focus on mathematical truths.", "isCorrect": false, "rationale": "While Plato highly valued mathematics, he did not deem all empirical inquiry irrelevant, just less real and unable to yield true knowledge of Forms."}], "id": "q04"}, {"question": "What is a key difference in the philosophical task of a scholar following Aristotle's approach, compared to one following Plato's?", "options": [{"text": "The Aristotelian scholar would focus on turning away from the physical world to achieve knowledge through pure reason.", "isCorrect": false, "rationale": "This describes Plato's philosophical task, where the physical world is a distraction from the Forms."}, {"text": "The Aristotelian scholar would primarily seek to classify objects based on their participation in separate, ideal Forms.", "isCorrect": false, "rationale": "Aristotle rejected the idea of separate Forms and thus would not classify based on participation in them. His classification is based on forms *within* things."}, {"text": "The Aristotelian scholar would engage in careful observation and classification of the physical world to discover the forms embedded within it.", "isCorrect": true, "rationale": "Aristotle believed the physical world is the real world, and knowledge comes from studying it carefully, classifying findings, and reasoning about the patterns, discovering the forms 'at work in the world around us.'"}, {"text": "The Aristotelian scholar would argue that true knowledge is unattainable, as reality is inherently unknowable.", "isCorrect": false, "rationale": "Aristotle firmly believed that genuine knowledge about the world could be attained through systematic observation and reasoning."}], "id": "q05"}, {"question": "In Aristotle's philosophy, what does 'matter' (hyle) represent in a physical substance?", "options": [{"text": "The structure or pattern that makes a thing the kind of thing it is.", "isCorrect": false, "rationale": "This describes Aristotle's concept of 'form,' not 'matter.' The form provides the structure and essence."}, {"text": "A separate, independent entity that exists in a heavenly realm.", "isCorrect": false, "rationale": "For Aristotle, neither matter nor form exists independently in the physical world; they are always found together in concrete substances. This concept also aligns more with Plato's Forms."}, {"text": "The underlying stuff of which a thing is made, which is indeterminate until it receives form.", "isCorrect": true, "rationale": "The text defines Aristotelian matter as 'the underlying stuff of which a thing is made... Matter by itself is indeterminate; it requires form to become a definite kind of thing.'"}, {"text": "The inherent potentiality of a thing to become something different from what it currently is.", "isCorrect": false, "rationale": "While matter is associated with potentiality (prime matter as 'pure potentiality'), the definition given is specifically about the 'stuff' that constitutes a thing, which then has the potential to be actualized by form."}], "id": "q06"}, {"question": "Both Plato and Aristotle used the term 'form' (eidos/idea). Which statement accurately distinguishes their core understanding of it?", "options": [{"text": "Plato believed form was the organizing principle of living things, while Aristotle saw it as an unchanging ideal.", "isCorrect": false, "rationale": "This reverses their positions. Aristotle identified form with the soul as the organizing principle for living things, while Plato's Forms were unchanging ideals."}, {"text": "Plato held that forms exist independently in a separate realm, whereas Aristotle maintained forms are inseparable from the matter they inform.", "isCorrect": true, "rationale": "This is the fundamental difference: Plato's Forms are transcendent, existing apart; Aristotle's forms are immanent, existing within the particular things, united with matter."}, {"text": "Aristotle viewed forms as subjective mental constructs, while Plato considered them objective realities.", "isCorrect": false, "rationale": "Both philosophers regarded forms as objective realities; their disagreement concerned where these realities existed."}, {"text": "Both agreed that forms are mere human conventions for classifying similar objects.", "isCorrect": false, "rationale": "Both Plato and Aristotle believed forms represented genuine essences or structures of reality, not just arbitrary human conventions."}], "id": "q07"}, {"question": "The text states that if Aristotle is right, 'Observation is not a distraction from truth but the path to it.' Which of the following modern disciplines best exemplifies this Aristotelian perspective?", "options": [{"text": "Pure mathematics, such as number theory or abstract algebra.", "isCorrect": false, "rationale": "Pure mathematics, dealing with abstract truths independent of sensory observation, aligns more closely with Plato's view of knowledge gained through pure reason."}, {"text": "Metaphysics, focusing on abstract concepts of being and reality through pure reason.", "isCorrect": false, "rationale": "While important to both, the emphasis here is on 'observation as the path to truth,' which points to empirical fields rather than purely abstract reasoning."}, {"text": "Experimental physics, where theories are developed and tested through empirical data collection.", "isCorrect": true, "rationale": "Experimental physics, with its reliance on systematic observation, measurement, and testing in the physical world, directly embodies Aristotle's belief that truth is found by carefully looking at the world."}, {"text": "Theology, specifically the study of divine revelations and sacred texts.", "isCorrect": false, "rationale": "Theology, while a discipline of knowledge, typically relies on faith, revelation, and textual analysis rather than direct observation of the physical world in the Aristotelian scientific sense."}], "id": "q08"}, {"question": "The text concludes that both Plato and Aristotle contained 'genuine insight.' What is the main point of agreement or complementary truth highlighted for Plato's insight?", "options": [{"text": "That true knowledge is always found by studying particular things through sensory experience.", "isCorrect": false, "rationale": "This is a key insight attributed to Aristotle, not Plato. Plato argued against relying on sensory experience for true knowledge."}, {"text": "That mathematical, moral, and logical truths exist and are eternal, going beyond any particular observed thing.", "isCorrect": true, "rationale": "The text states, 'Plato was right that we can grasp truths — mathematical truths, moral truths, logical truths — that go beyond any particular thing we observe... There does seem to be something eternal and unchanging about such truths, something that Plato's Forms were designed to explain.'"}, {"text": "That the forms are at work in the world around us, waiting to be discovered by careful observation.", "isCorrect": false, "rationale": "This is presented as Aristotle's genuine insight, emphasizing the immanence of forms and the importance of empirical study."}, {"text": "That the physical world is ultimately more real than any abstract concept.", "isCorrect": false, "rationale": "This contradicts Plato's core philosophy, which posits the ideal world of Forms as more real than the physical world."}], "id": "q09"}, {"question": "Consider a blueprint for a house. According to Aristotelian hylomorphism, how would this blueprint relate to the actual house being built?", "options": [{"text": "The blueprint is the 'matter' of the house, and the finished structure is the 'form.'", "isCorrect": false, "rationale": "This reverses the concepts. The blueprint provides the pattern/structure (form), and the physical materials are the matter. The finished structure is the complete substance."}, {"text": "The blueprint represents the 'form' of the house, which, when realized in brick and wood ('matter'), creates the 'substance' of the house.", "isCorrect": true, "rationale": "The blueprint serves as the structure or pattern (form) that shapes the indeterminate physical materials (matter) like brick and wood into a concrete, individual entity (substance) – the actual house. This is a classic application of hylomorphism."}, {"text": "The blueprint is a 'shadow' of the ideal Form of House, much like Plato's Forms.", "isCorrect": false, "rationale": "This interpretation applies Plato's framework of ideal, separate Forms and shadows, which is what Aristotle argued against with hylomorphism."}, {"text": "The blueprint is an independent entity, existing separately from any actual house, making it more real.", "isCorrect": false, "rationale": "While a blueprint can exist without a house, Aristotle's forms are always embodied in matter to create a *real substance*. An unbuilt blueprint is potential, not a complete substance. This option again leans towards a Platonic, separate existence of form."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
