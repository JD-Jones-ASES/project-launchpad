<script>
var QUESTIONS = [{"question": "What was the primary focus of the previous two volumes of this series, as described in the introductory paragraph?", "options": [{"text": "An exploration of ancient Greek political systems and their founders.", "isCorrect": false, "rationale": "While ancient Greek politics are covered later with Aristotle, the initial volumes focused on Socrates and Plato, not a broad exploration of political systems."}, {"text": "The life, philosophy, and death of Socrates, as depicted by Plato.", "isCorrect": true, "rationale": "The text states, 'We have followed Socrates from the courthouse steps to the prison cell to the hemlock cup. We have watched him question the pious, defend the philosophical life, refuse to escape, argue for the soul's immortality, and die with a calm that has haunted readers for twenty-four centuries.'"}, {"text": "A comparative analysis of pre-Socratic philosophers and their influence.", "isCorrect": false, "rationale": "The text specifically mentions Plato and Socrates, not a general survey of pre-Socratic thinkers."}, {"text": "The development of early scientific methods and their application.", "isCorrect": false, "rationale": "Scientific methods are associated more with Aristotle in the text, and the focus of the prior volumes was on Socrates' life and philosophical outlook."}], "id": "q01"}, {"question": "Which of the following works is NOT listed as one of Aristotle's most important works to be covered in the next volume?", "options": [{"text": "The Nicomachean Ethics", "isCorrect": false, "rationale": "The Nicomachean Ethics is explicitly listed as one of Aristotle's key works to be covered."}, {"text": "The Metaphysics", "isCorrect": true, "rationale": "The text lists The Nicomachean Ethics, The Politics, The Poetics, and Aristotle's logic. The Metaphysics is not mentioned in this section."}, {"text": "The Politics", "isCorrect": false, "rationale": "The Politics is explicitly listed as one of Aristotle's key works to be covered."}, {"text": "The Poetics", "isCorrect": false, "rationale": "The Poetics is explicitly listed as one of Aristotle's key works to be covered."}], "id": "q02"}, {"question": "How does Aristotle's approach to ethics, as presented in The Nicomachean Ethics, fundamentally differ from Plato's typical approach?", "options": [{"text": "Aristotle grounds ethics in abstract, universal Forms, while Plato focuses on practical character development.", "isCorrect": false, "rationale": "This statement inverts the described positions; Plato is associated with abstract Forms, and Aristotle with practical character."}, {"text": "Aristotle emphasizes the pursuit of eudaimonia through intellectual contemplation, whereas Plato values community life.", "isCorrect": false, "rationale": "While Aristotle discusses eudaimonia, his ethics is grounded in human character and community, not solely intellectual contemplation, and Plato's view on community is not the distinguishing factor mentioned here."}, {"text": "Aristotle derives ethics from the realities of human character and community life, rather than abstract ideals.", "isCorrect": true, "rationale": "The text states, 'This is ethics grounded not in abstract ideals but in the realities of human character and community life,' directly contrasting with Plato's focus on abstract ideals (Forms)."}, {"text": "Aristotle views virtue as innate, while Plato argues it must be cultivated through rigorous philosophical training.", "isCorrect": false, "rationale": "Aristotle's ethics emphasizes developing good habits and practical wisdom, which implies cultivation, not innate virtue. Plato also stressed rigorous training."}], "id": "q03"}, {"question": "Kant's statement that 'logic had not needed to take a single step forward since Aristotle' implies which of the following about Aristotle's system of syllogistic reasoning?", "options": [{"text": "It was a temporary system, eventually replaced by more advanced forms of logic.", "isCorrect": false, "rationale": "The quote suggests the opposite, that it was enduring and fundamental, not temporary or replaced."}, {"text": "It was so foundational and comprehensive that its principles remained unchallenged for millennia.", "isCorrect": true, "rationale": "The phrase 'had not needed to take a single step forward' means it was complete and robust, serving as 'the logic' for over two thousand years."}, {"text": "It was primarily concerned with philosophical debate, not scientific method.", "isCorrect": false, "rationale": "The text explicitly states it was 'the foundation of clear thinking, scientific method, and rigorous argument.'"}, {"text": "It was an initial attempt at formal logic, needing further development by later philosophers.", "isCorrect": false, "rationale": "The quote indicates it was not merely an 'initial attempt' but a fully developed system that stood the test of time without needing advancement."}], "id": "q04"}, {"question": "What major contribution did Aristotle make through The Politics that led him to be called the 'founder of political science'?", "options": [{"text": "He introduced the concept of the ideal philosopher-king as the best ruler.", "isCorrect": false, "rationale": "The concept of the philosopher-king is associated with Plato, not Aristotle."}, {"text": "He advocated for a global, unified government structure for all city-states.", "isCorrect": false, "rationale": "The text does not mention Aristotle advocating for a global government; rather, he studied existing Greek constitutions."}, {"text": "He conducted a comparative study of over 150 Greek constitutions with empirical rigor.", "isCorrect": true, "rationale": "The text states, 'His comparative study of over 150 Greek constitutions makes him the founder of political science.'"}, {"text": "He argued that human beings are naturally solitary and thrive in isolation.", "isCorrect": false, "rationale": "The text states the opposite: 'human beings are by nature \"political animals\" who can only flourish in community.'"}], "id": "q05"}, {"question": "The text describes a fundamental difference between Plato and Aristotle's philosophical approaches. Where Plato 'looked upward to the Forms,' Aristotle primarily 'looked outward.' What does this distinction signify?", "options": [{"text": "Plato focused on the divine, while Aristotle focused on the human.", "isCorrect": false, "rationale": "While there might be elements of this, the text's primary distinction is about the source of truth and knowledge, not simply divine vs. human."}, {"text": "Plato sought truth in abstract, eternal ideals, while Aristotle sought it in the observable, particular world.", "isCorrect": true, "rationale": "The text explicitly states, 'Where Plato looked upward to the Forms, Aristotle looked outward at the extraordinary variety of the world... and tried to understand each thing on its own terms.'"}, {"text": "Plato was an idealist, while Aristotle was a relativist.", "isCorrect": false, "rationale": "Aristotle was an empiricist, not a relativist. He believed in objective truth found in the world."}, {"text": "Plato believed in innate knowledge, while Aristotle believed all knowledge comes from a single grand theory.", "isCorrect": false, "rationale": "Aristotle 'did not impose a single grand theory on everything'; rather, he developed 'different methods for different subjects.'"}], "id": "q06"}, {"question": "Given Aristotle's insistence that 'the precision we expect from a mathematician would be foolish to demand from a politician, and that the storyteller works by different principles than the logician,' how would he likely approach the study of different subjects?", "options": [{"text": "He would apply a single, rigorous scientific method to all fields of inquiry.", "isCorrect": false, "rationale": "The quote directly contradicts this, stating that different subjects demand different levels of precision and principles."}, {"text": "He would adapt his methods and expectations of precision to suit the nature of each specific subject.", "isCorrect": true, "rationale": "The text states he 'developed different methods for different subjects, insisting that the precision we expect from a mathematician would be foolish to demand from a politician,' which implies tailoring his approach."}, {"text": "He would prioritize artistic and literary understanding over logical or mathematical precision.", "isCorrect": false, "rationale": "Aristotle valued all these fields but understood they require different methods and expectations, not a general prioritization of one over the others."}, {"text": "He would conclude that certain subjects, like politics or storytelling, are not amenable to systematic study.", "isCorrect": false, "rationale": "Aristotle wrote systematic treatises on politics and poetics, demonstrating his belief they *are* amenable to study, just with different methods."}], "id": "q07"}, {"question": "According to the text, what makes Aristotle's philosophy particularly accessible and useful for students today, especially in contrast to Plato's?", "options": [{"text": "It encourages escape from physical reality to contemplate abstract ideals.", "isCorrect": false, "rationale": "This describes an aspect of Plato's philosophy, not Aristotle's. Aristotle's philosophy is grounded in reality."}, {"text": "It provides a practical ethics that can be applied immediately through habits, wisdom, and community engagement.", "isCorrect": true, "rationale": "The text states, 'You do not need to escape a cave or contemplate the Form of the Good to begin living well. You need to develop good habits, seek practical wisdom, cultivate friendships, and engage with the community around you. Aristotle's ethics is an ethics you can start practicing today.'"}, {"text": "It requires advanced logical training before one can begin to live well.", "isCorrect": false, "rationale": "While Aristotle developed logic, the accessibility of his ethics is presented as independent of needing advanced logical training upfront."}, {"text": "It offers a single, grand theory that explains everything in the universe.", "isCorrect": false, "rationale": "The text explicitly states Aristotle 'did not impose a single grand theory on everything.'"}], "id": "q08"}, {"question": "Raphael's painting, 'Plato pointing up, Aristotle reaching out,' is used to symbolize the 'two great impulses of Western thought.' What do these impulses represent?", "options": [{"text": "The conflict between scientific discovery and religious faith.", "isCorrect": false, "rationale": "While these can be impulses, the text defines the 'two great impulses' in terms of philosophical approaches to truth and reality."}, {"text": "The individual's pursuit of happiness versus the state's demands.", "isCorrect": false, "rationale": "This is not the specific interpretation of the painting provided in the text."}, {"text": "The pull toward the ideal (Plato) and the pull toward the real (Aristotle).", "isCorrect": true, "rationale": "The text explicitly states these represent 'the pull toward the ideal and the pull toward the real,' associating Plato with the ideal (pointing up) and Aristotle with the real (reaching out)."}, {"text": "The superiority of abstract reasoning over empirical observation.", "isCorrect": false, "rationale": "The text argues for the necessity of *both* impulses, not the superiority of one over the other."}], "id": "q09"}, {"question": "The text concludes that a 'complete education needs both' Plato and Aristotle. What is the fundamental reason given for this necessity?", "options": [{"text": "To ensure that students understand the historical progression of philosophy from idealism to realism.", "isCorrect": false, "rationale": "While students would learn this, the text's primary reason is about avoiding philosophical pitfalls, not merely historical understanding."}, {"text": "To prevent philosophy from collapsing into relativism (Plato's role) and from becoming otherworldly and impractical (Aristotle's role).", "isCorrect": true, "rationale": "The text states, 'Without that conviction [Plato's], philosophy collapses into relativism... Without that conviction [Aristotle's], philosophy becomes otherworldly and impractical.'"}, {"text": "To demonstrate that only the combination of their theories can lead to the Form of the Good.", "isCorrect": false, "rationale": "The Form of the Good is a Platonic concept, and the text emphasizes the practical value of Aristotle's approach alongside Plato's, not as a means to achieve a specific Platonic ideal."}, {"text": "To teach students how to choose between the ideal and the real based on personal preference.", "isCorrect": false, "rationale": "The text argues for the necessity of *both*, not for choosing one over the other based on preference."}], "id": "q10"}, {"question": "The text says that The Poetics established categories that 'every screenwriter, novelist, and playwright since has worked with, knowingly or not.' What does this claim reveal about the nature of Aristotle's contribution to literary theory?", "options": [{"text": "That Aristotle's theory of storytelling is universally taught in creative writing courses and is consciously applied by all writers.", "isCorrect": false, "rationale": "The phrase 'knowingly or not' specifically rules out the claim that all writers consciously apply his categories. The point is that his analysis captured something so foundational that it operates whether or not the writer has read him."}, {"text": "That Aristotle identified principles of storytelling so fundamental to narrative that they describe what effective stories actually do, whether their authors know his work or not.", "isCorrect": true, "rationale": "The claim that writers work with his categories 'knowingly or not' means Aristotle's analysis was not just one theory among many but a discovery of deep structural features of narrative itself — features that operate in effective stories regardless of the author's training."}, {"text": "That The Poetics is required reading in all modern film schools and creative writing programs.", "isCorrect": false, "rationale": "The text makes no claim about required reading lists. The assertion is about the underlying universality of his categories, not their institutional presence in modern curricula."}, {"text": "That Aristotle's influence on literature has been stronger than his influence on science, logic, or politics.", "isCorrect": false, "rationale": "The text does not rank Aristotle's influence across fields. It presents his achievements across logic, biology, ethics, politics, and literary theory as equally staggering in their range."}], "id": "q11"}, {"question": "The text describes Aristotle as 'the student who honored his teacher by thinking for himself.' What philosophical principle does this characterization embody, particularly in light of the way Aristotle's Lyceum differed from Plato's Academy?", "options": [{"text": "That genuine intellectual respect requires agreement with one's teacher, and Aristotle ultimately returned to Plato's views.", "isCorrect": false, "rationale": "The entire chapter documents Aristotle's fundamental disagreements with Plato — on Forms, the soul, virtue, and method. The characterization celebrates disagreement as a form of honor, not agreement."}, {"text": "That authentic philosophical development means following the evidence and argument wherever they lead, even if they lead away from the teacher's conclusions.", "isCorrect": true, "rationale": "Honoring a teacher 'by thinking for himself' means Aristotle took Plato's questions seriously, subjected them to rigorous scrutiny, and arrived at different conclusions. This models the philosophical ideal: the goal is truth, not loyalty to a school position."}, {"text": "That a student should always ultimately agree with the teacher's method while disagreeing with specific conclusions.", "isCorrect": false, "rationale": "Aristotle disagreed with Plato on method as well as conclusions — most fundamentally, he rejected the turn away from the physical world in favor of empirical study of it. The honor was not in limiting disagreement to conclusions."}, {"text": "That philosophical teachers should discourage independent thinking to preserve the integrity of their school.", "isCorrect": false, "rationale": "This contradicts the entire spirit of the passage. Plato's own method — the Socratic dialogue — was designed to challenge assumptions and arrive at truth through questioning, not to produce disciples who repeat the master's conclusions."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
