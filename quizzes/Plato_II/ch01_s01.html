<script>
var QUESTIONS = [{"question": "What is the primary objective of the 'Story So Far' section within the larger work?", "options": [{"text": "To introduce the specific arguments Socrates will make in the upcoming Phaedo dialogue.", "isCorrect": false, "rationale": "While it sets the stage for the Phaedo, its primary purpose is a retrospective, not a preview of arguments."}, {"text": "To summarize the key events, philosophical concepts, and the overall narrative arc from Volume I, leading into the current volume.", "isCorrect": true, "rationale": "The text explicitly states, 'Let us recall where we have been before we go further,' indicating a summary of past events and ideas as the core purpose."}, {"text": "To provide a comprehensive biographical account of Socrates' early life and intellectual development.", "isCorrect": false, "rationale": "The section focuses on the last weeks of Socrates' life and his trials, not his early biography."}, {"text": "To offer a detailed critical analysis of Plato's literary style across the Euthyphro, Apology, and Crito.", "isCorrect": false, "rationale": "The section focuses on philosophical content and narrative progression, not literary criticism."}], "id": "q01"}, {"question": "In the Euthyphro dialogue, what is the 'Euthyphro Dilemma' that Socrates poses?", "options": [{"text": "Whether it is more pious to prosecute one's father for a crime or to forgive him.", "isCorrect": false, "rationale": "This was Euthyphro's personal situation, but not the broader philosophical dilemma Socrates extracted from it."}, {"text": "The question of whether the gods love pious acts because they are inherently pious, or if acts become pious simply because the gods love them.", "isCorrect": true, "rationale": "This is the exact formulation of the Euthyphro Dilemma presented in the text, exploring the source and nature of goodness and piety."}, {"text": "The difficulty in determining who truly possesses expertise in religious matters versus those who merely claim it.", "isCorrect": false, "rationale": "This was an outcome of the dialogue (that experts often know least), but not the central dilemma posed by Socrates about the nature of piety itself."}, {"text": "The conflict between human laws and divine commands when judging moral actions.", "isCorrect": false, "rationale": "While related to religion, this is not the specific dilemma about the relationship between divine love and the inherent nature of piety."}], "id": "q02"}, {"question": "A modern researcher begins their study by acknowledging the limits of current scientific knowledge on a complex topic and states that true progress requires first understanding what we don't know. This approach most directly reflects which Socratic concept?", "options": [{"text": "The Socratic method", "isCorrect": false, "rationale": "The Socratic method is about questioning to find contradictions, not necessarily the initial recognition of ignorance itself, though it may lead to it."}, {"text": "Socratic ignorance", "isCorrect": true, "rationale": "Socratic ignorance is defined as 'True wisdom begins with recognizing how little we know,' directly matching the researcher's approach."}, {"text": "The priority of the soul", "isCorrect": false, "rationale": "The priority of the soul concerns moral and ethical well-being over material concerns, which is not what the researcher's statement implies."}, {"text": "The Euthyphro Dilemma", "isCorrect": false, "rationale": "The Euthyphro Dilemma is a specific problem in the philosophy of religion about the source of piety/goodness, unrelated to general research methodology."}], "id": "q03"}, {"question": "In the Apology, what did Socrates conclude was his 'small but real' advantage over the politicians, poets, and craftsmen he questioned after the Oracle's declaration?", "options": [{"text": "He possessed a unique understanding of the gods' will that others lacked.", "isCorrect": false, "rationale": "Socrates explicitly stated he possessed no special knowledge and was puzzled by the Oracle's declaration, leading him to investigate rather than claim divine insight."}, {"text": "He was able to persuade juries and crowds more effectively than his contemporaries.", "isCorrect": false, "rationale": "Socrates refused to play on the jury's emotions and was convicted, indicating persuasion was not his advantage in this context."}, {"text": "He knew that he did not know, while others falsely believed they possessed knowledge.", "isCorrect": true, "rationale": "The text states, 'Socrates concluded that his own advantage was small but real: at least he knew that he did not know. This recognition of ignorance — Socratic ignorance — was the beginning of genuine wisdom.'"}, {"text": "He had a more comprehensive education in various fields of knowledge than anyone else in Athens.", "isCorrect": false, "rationale": "Socrates' advantage was philosophical insight into knowledge itself, not the breadth of his factual knowledge."}], "id": "q04"}, {"question": "Which statement best captures the meaning of 'Apology' in the context of Plato's dialogue about Socrates' trial?", "options": [{"text": "A heartfelt expression of sorrow and regret for one's actions.", "isCorrect": false, "rationale": "The text explicitly states, 'Apology comes from the Greek apologia, meaning 'a speech in one's own defense.' It has nothing to do with apologizing in the modern sense.'"}, {"text": "A formal speech delivered in one's own defense against accusations.", "isCorrect": true, "rationale": "As defined in the text, an 'apology' in ancient Greek context was a legal defense speech, not an expression of regret."}, {"text": "A philosophical essay reflecting on the nature of justice and injustice.", "isCorrect": false, "rationale": "While the Apology discusses justice, its primary form is a speech of defense delivered in a trial setting, not a general essay."}, {"text": "A plea for mercy directed towards the jury to avoid conviction.", "isCorrect": false, "rationale": "Socrates 'refused to beg for mercy or play on the jury's emotions,' making this option incorrect."}], "id": "q05"}, {"question": "According to the Crito, what was the foundational argument presented by the 'Laws of Athens' to persuade Socrates not to escape prison?", "options": [{"text": "His escape would cause significant financial burden and legal trouble for his friends.", "isCorrect": false, "rationale": "While Crito made this argument, the 'Laws' focused on Socrates' tacit agreement and obligations to the city, not the burden on his friends."}, {"text": "His flight would be seen as an admission of guilt, thus validating the unjust verdict.", "isCorrect": false, "rationale": "The Laws' argument was more about the integrity of the state and Socrates' duty, rather than the perception of his guilt."}, {"text": "He had tacitly agreed to obey the Laws by choosing to live his entire life under their protection and benefit from the city's order.", "isCorrect": true, "rationale": "This directly reflects the text's explanation: 'The Laws argued that Socrates had lived his entire life under their protection, had benefited from their order, and had tacitly agreed to obey them by choosing to remain in the city.'"}, {"text": "His children would suffer more from his absence if he fled as an exile than if he died honorably.", "isCorrect": false, "rationale": "Crito brought up his children, but the 'Laws' themselves did not use this argument to counter the escape."}], "id": "q06"}, {"question": "The 'rule of reason' is identified as a key idea from Volume I. Which scenario best exemplifies this principle?", "options": [{"text": "A politician changes their stance on an issue to align with recent public opinion polls.", "isCorrect": false, "rationale": "This contradicts the principle, which states, 'We must follow the best argument wherever it leads, not the opinions of the crowd or the pressures of the moment.'"}, {"text": "A scientist disregards popular theories to pursue evidence-based conclusions, even if unpopular.", "isCorrect": true, "rationale": "This aligns perfectly with 'We must follow the best argument wherever it leads, not the opinions of the crowd or the pressures of the moment,' prioritizing logical evidence over popularity."}, {"text": "An individual makes a decision based primarily on their gut feeling or immediate emotional reaction.", "isCorrect": false, "rationale": "The 'rule of reason' emphasizes rational thought and argument, not emotional responses."}, {"text": "A group adopts a policy because it is traditional, without examining its current effectiveness.", "isCorrect": false, "rationale": "Following tradition without critical examination goes against the principle of following the 'best argument wherever it leads.'"}], "id": "q07"}, {"question": "What is the overarching conclusion drawn from the 'Arc of Volume I' regarding the philosophical life, as exemplified by Socrates?", "options": [{"text": "Philosophy is a pursuit best left to self-proclaimed experts who can provide definitive answers to life's hardest questions.", "isCorrect": false, "rationale": "The Euthyphro explicitly shows that self-proclaimed experts often know least, and definitive answers are hard to achieve."}, {"text": "The philosophical life is primarily about gaining a positive reputation and avoiding political condemnation through clever argumentation.", "isCorrect": false, "rationale": "Socrates prioritized truth over reputation and accepted condemnation, showing this is not the overarching message."}, {"text": "True wisdom is found in recognizing ignorance, relentlessly questioning, and living by one's reasoned principles even in the face of death.", "isCorrect": true, "rationale": "This synthesizes the key messages from Euthyphro (hard questions, Socratic method), Apology (Socratic ignorance, examined life), and Crito (live by principles even unto death)."}, {"text": "It is always justifiable to break unjust laws if doing so allows one to continue their intellectual pursuits.", "isCorrect": false, "rationale": "Socrates explicitly refused to break the laws in the Crito, even to save his life, because it would violate the principles he had lived by."}], "id": "q08"}, {"question": "The 'priority of the soul' is a key concept. How did Socrates demonstrate this principle throughout the events of Volume I?", "options": [{"text": "By emphasizing the importance of securing financial stability and social connections for a comfortable life.", "isCorrect": false, "rationale": "The text states, 'Care for the soul matters more than wealth, reputation, or physical comfort,' directly contradicting this option."}, {"text": "By seeking popular acclaim for his wisdom and philosophical insights from the citizens of Athens.", "isCorrect": false, "rationale": "Socrates was unconcerned with popular opinion and indeed made himself unpopular by challenging others' supposed wisdom."}, {"text": "By choosing to live by his moral and philosophical principles, even when it meant risking his life and ultimately accepting execution.", "isCorrect": true, "rationale": "The text explains, 'Socrates consistently chose what was right over what was safe,' illustrating how he prioritized his soul's integrity over physical comfort, reputation, or even survival."}, {"text": "By advising his friends to prioritize their own safety and well-being over adherence to abstract moral codes.", "isCorrect": false, "rationale": "Socrates himself prioritized justice and reason over safety, even when Crito advised him otherwise."}], "id": "q09"}, {"question": "What question, introduced at the end of 'The Story So Far,' signals the main philosophical theme to be explored in the subsequent dialogue, the Phaedo?", "options": [{"text": "What are the limits of human knowledge regarding divine justice?", "isCorrect": false, "rationale": "While a philosophical question, it's not the specific one explicitly stated as the focus for the Phaedo."}, {"text": "How does a good citizen reconcile personal ethics with the demands of the state?", "isCorrect": false, "rationale": "This theme was central to the Crito, not the upcoming Phaedo, which focuses on a different ultimate question."}, {"text": "What happens to the soul after death?", "isCorrect": true, "rationale": "The text explicitly states: 'And on this final day, Socrates will raise a question that dwarfs everything that came before: What happens to the soul after death?'"}, {"text": "Is it possible for individuals to achieve true wisdom through continuous self-examination?", "isCorrect": false, "rationale": "This was a theme explored in the Apology, establishing the 'examined life,' but the Phaedo's specific new question goes beyond this."}], "id": "q10"}, {"question": "The Euthyphro Dilemma is described as 'one of the most important questions in the philosophy of religion.' Why does the text say this question still matters today?", "options": [{"text": "It settles the debate between monotheism and polytheism by showing that divine disagreement makes religion impossible.", "isCorrect": false, "rationale": "The dilemma is not about settling the question of how many gods exist; it concerns the relationship between divine will and moral standards regardless of the number of gods."}, {"text": "It forces us to ask whether goodness exists independently of divine command or whether God's will alone creates the standard of right and wrong.", "isCorrect": true, "rationale": "The text states the dilemma 'forces us to ask whether goodness exists independently of divine command or whether God's will alone creates the standard of right and wrong' — a question with enduring relevance to ethics and theology."}, {"text": "It proves that no human being can ever have genuine knowledge of virtue, making ethics purely a matter of opinion.", "isCorrect": false, "rationale": "The dilemma raises a question about the source of moral standards; it does not conclude that ethics is purely a matter of opinion."}, {"text": "It demonstrates that Euthyphro was right to prosecute his father, setting a legal precedent for religious duty.", "isCorrect": false, "rationale": "The dialogue ends without endorsing Euthyphro's actions; the dilemma concerns the nature of piety itself, not the specific prosecution."}], "id": "q11"}, {"question": "The social contract idea is mentioned in relation to the Crito. How does the text describe the relationship between Socrates' argument in the Crito and this later political theory?", "options": [{"text": "Socrates directly borrowed the social contract idea from Hobbes and applied it to justify his imprisonment.", "isCorrect": false, "rationale": "Hobbes, Locke, and Rousseau came centuries after Socrates; the text says Socrates' argument anticipates their theory, not that he borrowed from them."}, {"text": "Socrates' argument that citizens tacitly consent to obey the state by choosing to live under it anticipates later social contract theory.", "isCorrect": true, "rationale": "The text notes that the Laws' argument — that Socrates consented to obey by remaining in the city — 'anticipates the modern idea of the social contract' developed by Hobbes, Locke, and Rousseau."}, {"text": "The social contract theory directly refutes Socrates' argument by showing that unjust verdicts void a citizen's obligation to obey.", "isCorrect": false, "rationale": "The text presents the social contract idea as an analogy for Socrates' reasoning, not as a refutation of it."}, {"text": "Both the Crito and social contract theory conclude that citizens are never truly obligated to obey unjust laws.", "isCorrect": false, "rationale": "Socrates in the Crito concludes he must obey even the unjust verdict; the text does not say social contract theory leads to the same conclusion."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
