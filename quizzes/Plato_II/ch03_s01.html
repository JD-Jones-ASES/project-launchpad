<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental distinction upon which Socrates builds his Argument from Affinity?", "options": [{"text": "The distinction between arguments from reason and arguments from emotion.", "isCorrect": false, "rationale": "While Socrates primarily uses reason, this is not the fundamental metaphysical distinction central to the Argument from Affinity. The argument distinguishes between types of existence, not types of arguments."}, {"text": "The distinction between things that are visible, changing, and mortal, and things that are invisible, unchanging, and divine.", "isCorrect": true, "rationale": "Socrates explicitly states this distinction as the foundation: 'On one side stands everything that is visible, changing, and mortal... On the other side stands everything that is invisible, unchanging, and divine — the world of the Forms.'"}, {"text": "The distinction between objects perceived by the senses and those perceived through scientific instruments.", "isCorrect": false, "rationale": "The text contrasts things grasped by the senses with those grasped by the mind alone. The core distinction is about the nature of reality (changing vs. unchanging, visible vs. invisible), not modes of perception via instruments."}, {"text": "The distinction between the human mind and the minds of animals.", "isCorrect": false, "rationale": "The Argument from Affinity focuses on the human soul's nature in relation to broader categories of existence, not a comparative analysis with animal minds."}], "id": "q01"}, {"question": "Socrates acknowledges a significant limitation of the Argument from Affinity. What is this limitation?", "options": [{"text": "It relies too heavily on empirical evidence, which is inherently unreliable.", "isCorrect": false, "rationale": "The argument from Affinity is philosophical, not empirical. Its limitation is not about empirical evidence but the nature of the logical connection it draws."}, {"text": "It is an argument from analogy, meaning resemblance does not equate to identity or strict proof.", "isCorrect": true, "rationale": "The text explicitly states: 'But we should notice the argument's limitation: it is an argument from analogy, not a strict proof. Socrates shows that the soul resembles the unchanging, but resemblance is not identity.'"}, {"text": "It only proves the soul existed before birth, not that it survives after death.", "isCorrect": false, "rationale": "This was the limitation of the previous arguments (Opposites and Recollection), not the Argument from Affinity."}, {"text": "It contradicts the common understanding of the soul as a physical entity.", "isCorrect": false, "rationale": "The argument challenges common understanding but this is its strength, not a limitation it itself acknowledges. The limitation is about its logical structure."}], "id": "q02"}, {"question": "According to Socrates' 'Ghost Passage,' what is the primary determinant of a soul's fate after death?", "options": [{"text": "The amount of wealth accumulated during one's lifetime.", "isCorrect": false, "rationale": "Socrates makes no mention of wealth as a factor in the soul's destiny; the focus is on one's character and philosophical pursuits."}, {"text": "The specific rituals performed at one's burial.", "isCorrect": false, "rationale": "The passage discusses the soul's post-death state based on its life choices, not burial rituals."}, {"text": "Whether the soul was purified by philosophy or polluted by attachment to physical pleasures.", "isCorrect": true, "rationale": "The passage states: 'The soul that has been purified by philosophy... departs to the invisible world... But the soul that has been polluted by the body — that has loved physical pleasures and believed only in what it could touch and see — cannot easily depart.'"}, {"text": "The intellectual capacity of the individual during their life.", "isCorrect": false, "rationale": "While philosophy involves intellect, the passage emphasizes the moral and lifestyle choices (seeking truth vs. physical pleasures) rather than pure intellectual capacity."}], "id": "q03"}, {"question": "If a contemporary philosopher argues that human consciousness is an emergent property of complex neural networks, which of Socrates' interlocutors would likely find this view most compatible with their objection?", "options": [{"text": "Cebes, with his Weaver Objection.", "isCorrect": false, "rationale": "Cebes grants the soul is an independent substance but questions its permanence, which is different from claiming it's a byproduct of the body's organization."}, {"text": "Simmias, with his Harmony Objection.", "isCorrect": true, "rationale": "Simmias argues the soul might be a 'harmony' or 'particular arrangement' of the body's physical elements, just as music is a product of the lyre. This closely parallels the idea of consciousness as an emergent property of brain activity, ceasing when the physical structure is destroyed."}, {"text": "Phaedo, as the narrator, expressing general doubt.", "isCorrect": false, "rationale": "Phaedo is the narrator and expresses the collective 'crisis of confidence,' but he does not present a specific philosophical objection of his own that aligns with this view."}, {"text": "Echecrates, questioning the validity of argument itself.", "isCorrect": false, "rationale": "Echecrates expresses misology due to shattered faith, not a specific philosophical theory about the soul's nature as emergent from the body."}], "id": "q04"}, {"question": "What is the core philosophical distinction between Simmias' Harmony Objection and Cebes' Weaver Objection?", "options": [{"text": "Simmias denies the existence of the soul, while Cebes argues for its eternal nature.", "isCorrect": false, "rationale": "Simmias does not deny the soul's reality but its independence, while Cebes questions its permanence, not its eternity."}, {"text": "Simmias believes the soul is identical to the Forms, while Cebes believes it is merely akin to them.", "isCorrect": false, "rationale": "Neither objection addresses the soul's identity with or kinship to the Forms directly. Their focus is on the soul's relationship to the body and its lifespan."}, {"text": "Simmias argues the soul depends entirely on the body, whereas Cebes argues the soul is independent but may still be destructible over time.", "isCorrect": true, "rationale": "As stated in the 'caution' box: 'Simmias says the soul depends on the body (like music on an instrument). Cebes says the soul is independent of the body but may still be destructible (like a weaver who outlasts many garments but eventually dies).'"}, {"text": "Simmias focuses on the soul's post-death state, while Cebes focuses on its pre-birth existence.", "isCorrect": false, "rationale": "Both objections primarily concern the soul's survival after the body's death and its permanence, not pre-birth existence or the details of the afterlife."}], "id": "q05"}, {"question": "In the context of the Argument from Affinity, what does Socrates mean when he states the soul has a 'natural affinity' with the divine and unchanging?", "options": [{"text": "The soul is identical to the divine and unchanging Forms.", "isCorrect": false, "rationale": "The text explicitly clarifies: 'Socrates argues the soul is akin to the divine and unchanging realm, not identical with it.' Affinity means kinship or likeness, not identity."}, {"text": "The soul is created by the gods and therefore immortal.", "isCorrect": false, "rationale": "While the soul is linked to the 'divine,' the argument focuses on the soul's characteristics resembling the divine realm, not its origin as proof of immortality in this specific argument."}, {"text": "The soul shares characteristics (invisibility, activity of reason, contemplation of Forms) with the kind of reality that is immune to dissolution.", "isCorrect": true, "rationale": "Socrates notes the soul is 'invisible,' 'reasons, reflects, and contemplates the Forms,' activities belonging to the 'invisible, unchanging realm,' suggesting a likeness to what cannot be destroyed."}, {"text": "The soul's physical composition is made of divine elements.", "isCorrect": false, "rationale": "The argument contrasts the soul with the 'physical world' and 'flesh and bone,' suggesting it is not itself physical. The affinity is qualitative, not compositional."}], "id": "q06"}, {"question": "Based on the description of the 'Ghost Passage,' what would be the likely fate of a soul that practiced 'civil and social virtues' out of habit rather than philosophical understanding?", "options": [{"text": "It would be admitted directly into the company of the gods.", "isCorrect": false, "rationale": "The text explicitly states: 'Only the philosopher who has pursued genuine wisdom — not merely conventional virtue — is admitted to the company of the gods after death.'"}, {"text": "It would become a ghost prowling tombs and sepulchres.", "isCorrect": false, "rationale": "Ghosts are described as souls 'polluted by the body,' those who 'loved physical pleasures.' Moderately virtuous souls are not described this way."}, {"text": "It would be reborn into the body of a social creature like a bee or an ant.", "isCorrect": true, "rationale": "The text states: 'Even the moderately virtuous — those who practiced \"civil and social virtues\" out of habit rather than philosophy — return as social creatures like bees or ants.'"}, {"text": "It would cease to exist entirely, having not pursued genuine wisdom.", "isCorrect": false, "rationale": "The Ghost Passage describes reincarnation and specific fates for different types of souls, implying continued existence rather than cessation for moderately virtuous souls."}], "id": "q07"}, {"question": "What philosophical danger does Socrates warn against in the 'Misology Digression'?", "options": [{"text": "Becoming too attached to the body's pleasures.", "isCorrect": false, "rationale": "While this is a danger Socrates warns against generally, the Misology Digression specifically addresses a different kind of danger related to trust in arguments."}, {"text": "Developing a hatred of argument or reason after being disillusioned by poor arguments.", "isCorrect": true, "rationale": "Socrates diagnoses the danger as becoming 'misologoi — haters of argument,' arising when arguments repeatedly prove false, leading to a loss of trust in all reasoning."}, {"text": "Mistaking resemblance for identity in philosophical reasoning.", "isCorrect": false, "rationale": "This is a limitation of the Argument from Affinity, but not the specific subject of the Misology Digression, which is about the emotional response to philosophical setbacks."}, {"text": "Confusing the soul's independence with its permanence.", "isCorrect": false, "rationale": "This is the essence of Cebes' objection, a specific philosophical problem, not the general danger of 'misology' as described by Socrates in his digression."}], "id": "q08"}, {"question": "The text describes the immediate aftermath of Simmias' and Cebes' objections as a 'Crisis of Confidence.' Why did these objections have such a profound impact on the characters?", "options": [{"text": "The objections were personal attacks on Socrates, undermining his authority.", "isCorrect": false, "rationale": "The objections were philosophical challenges, not personal attacks. The text emphasizes their philosophical strength, not any personal animosity."}, {"text": "The objections were so powerful that they seemed to dismantle Socrates' earlier, seemingly convincing arguments for the soul's immortality.", "isCorrect": true, "rationale": "The text states: 'The arguments that had seemed so convincing only moments before now appear to be in ruins. If Simmias is right, the soul is not even a real thing. If Cebes is right, the soul is real but doomed.'"}, {"text": "Socrates admitted he had no further replies to offer.", "isCorrect": false, "rationale": "Socrates immediately shifts to the Misology Digression, indicating he is preparing to address the objections, not giving up."}, {"text": "The objections proved that the soul was undeniably mortal and perishable.", "isCorrect": false, "rationale": "The objections raised strong doubts and presented compelling counter-arguments, but they did not constitute definitive proof of the soul's mortality."}], "id": "q09"}, {"question": "According to the 'note' section following the Ghost Passage, what does Plato consider to be the soul's true preparation for eternity?", "options": [{"text": "Practicing conventional social virtues out of habit and tradition.", "isCorrect": false, "rationale": "The note explicitly states that 'conventional virtue' is distinguished from genuine wisdom and does not lead to the company of the gods."}, {"text": "Engaging in academic exercises to display intellectual prowess.", "isCorrect": false, "rationale": "The note clarifies: 'Philosophy, for Plato, is not an academic exercise. It is the soul's preparation for eternity.'"}, {"text": "Seeking genuine wisdom and pursuing philosophy to purify the soul.", "isCorrect": true, "rationale": "The note states: 'Only the philosopher who has pursued genuine wisdom... is admitted to the company of the gods after death. ... Philosophy, for Plato, is not an academic exercise. It is the soul's preparation for eternity.'"}, {"text": "Avoiding all physical contact and sensory experiences throughout life.", "isCorrect": false, "rationale": "While the soul should avoid the 'body's distractions,' the text emphasizes seeking truth and philosophy, not a complete ascetic withdrawal from all physical contact."}], "id": "q10"}, {"question": "Socrates refutes Simmias' harmony theory with three arguments. Which is described as 'the most important' refutation?", "options": [{"text": "A harmony cannot pre-exist the instrument that produces it, but the Argument from Recollection showed the soul pre-existed the body.", "isCorrect": false, "rationale": "This is the first and logically cleanest of the three refutations, forcing Simmias into a dilemma, but the text identifies a different argument as 'the most important.'"}, {"text": "Some souls are 'more of a soul' than others, just as a lyre can be better or worse tuned.", "isCorrect": false, "rationale": "This is the second argument about degrees of harmony. The text treats it as secondary and moves quickly to the third, 'most important' point."}, {"text": "The soul can oppose and overrule the body's desires, which a harmony can never do to the instrument that produces it.", "isCorrect": true, "rationale": "The text explicitly marks this as the most important argument: 'A harmony can never oppose the instrument that produces it... But the soul does oppose the body... If the soul were merely a product of the body, this would be impossible.'"}, {"text": "The soul is invisible, while a lyre's harmony is audible, demonstrating they belong to different categories.", "isCorrect": false, "rationale": "This is not one of the three numbered refutations given in the text. The argument about invisibility belongs to the Argument from Affinity earlier in the section."}], "id": "q11"}, {"question": "The Misology Digression is described as 'one of the most important passages in the Phaedo — and one of the most relevant to students today.' What makes Socrates' warning especially applicable to contemporary life?", "options": [{"text": "Most students today have encountered Plato's arguments and found them unconvincing.", "isCorrect": false, "rationale": "The text's claim about contemporary relevance is not about students' reactions to Plato specifically, but about a broader cultural pattern."}, {"text": "In an age when people routinely dismiss arguments by attacking the very idea of rational debate, the warning against abandoning reason remains urgent.", "isCorrect": true, "rationale": "The text explicitly states: 'In an age when people routinely dismiss arguments they dislike by attacking the very idea of rational debate, Socrates' warning against misology is more urgent than ever.'"}, {"text": "Modern students encounter far more philosophical arguments than ancient students did, increasing their exposure to potential misology.", "isCorrect": false, "rationale": "The text does not make this comparison about volume of exposure. The concern is about the cultural tendency to reject rational debate altogether, not the frequency of encountering arguments."}, {"text": "Misology was unknown in antiquity and only became a problem in the modern era.", "isCorrect": false, "rationale": "The passage occurs in the Phaedo itself, showing Socrates recognized this danger in his own time. The point is that the danger has persisted and become more prevalent."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
