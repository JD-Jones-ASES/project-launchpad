<script>
var QUESTIONS = [{"question": "Plato structures the Phaedo with a frame narrative, where Phaedo retells Socrates' final day to Echecrates. Which of the following best explains Plato's primary reasons for using this narrative technique?", "options": [{"text": "To suggest that all philosophical dialogues should be presented as personal anecdotes to increase reader engagement.", "isCorrect": false, "rationale": "While it might increase engagement, the text specifies more profound reasons related to emotional distance and philosophical tradition, not a general rule for all dialogues."}, {"text": "To create emotional distance from the raw experience of Socrates' death and to signal the dialogue's connection to pre-Socratic Pythagorean ideas about the soul.", "isCorrect": true, "rationale": "The text explicitly states these two reasons: it 'creates a layer of emotional distance' and, because Echecrates is a Pythagorean, 'Plato is signaling that the questions in this dialogue... arise from a tradition of serious philosophical inquiry.'"}, {"text": "To demonstrate Phaedo's superior memory and storytelling abilities, ensuring historical accuracy.", "isCorrect": false, "rationale": "The text mentions Phaedo's memory is 'colored by his grief and his admiration,' implying it's not solely about factual accuracy but emotional perspective."}, {"text": "To avoid directly depicting a potentially controversial execution, thereby protecting Plato from political repercussions.", "isCorrect": false, "rationale": "The text does not mention political repercussions. The reasons given are literary and philosophical, focusing on the reader's experience and the dialogue's intellectual context."}], "id": "q01"}, {"question": "When Socrates observes how pleasure and pain are 'fastened together' after his chains are removed, what deeper philosophical theme is he introducing?", "options": [{"text": "The idea that all physical sensations are inherently contradictory and unreliable.", "isCorrect": false, "rationale": "While senses can be unreliable, Socrates' point here is specifically about the inseparable nature of pleasure and pain, linking them to the body and its demands."}, {"text": "The practical difficulties faced by prisoners and the importance of empathy for their suffering.", "isCorrect": false, "rationale": "This is too literal and misses the philosophical thrust. Socrates immediately elevates this observation beyond mere 'small talk' into a core philosophical problem."}, {"text": "The central distinction between the body, which experiences sensation, and the soul, which belongs to a different realm.", "isCorrect": true, "rationale": "The text states: 'His observation about pleasure and pain introduces the central theme of the entire dialogue: the relationship between the body and the soul. The body is the realm of sensation... The soul... belongs to a different realm.'"}, {"text": "A stoic acceptance of physical discomfort as an unavoidable part of life.", "isCorrect": false, "rationale": "While Socrates displays calm, his comment is presented as an active philosophical observation that sets up the dialogue's main theme, not merely a passive acceptance of pain."}], "id": "q02"}, {"question": "Socrates makes the striking claim that the true philosopher spends his entire life 'practicing dying.' According to the text, what does this practice primarily entail?", "options": [{"text": "Engaging in ascetic self-harm to desensitize oneself to physical pain.", "isCorrect": false, "rationale": "The text describes withdrawing the soul from bodily demands, not harming the body. Suicide is explicitly argued against."}, {"text": "Constantly reflecting on the brevity of life to appreciate every moment more deeply.", "isCorrect": false, "rationale": "While philosophers might reflect on life's brevity, 'practicing dying' in Socrates' context is about detaching the soul from the body's influence, not enhancing appreciation for bodily life."}, {"text": "Disciplining the soul to withdraw from bodily pleasures and distractions, allowing it to pursue truth independently.", "isCorrect": true, "rationale": "The text explicitly states: 'The philosopher who disciplines himself to do this is, in a very real sense, practicing for death. For what is death except the complete separation of soul from body?'"}, {"text": "Preparing one's affairs and legacy so that death, when it comes, causes minimal disruption to others.", "isCorrect": false, "rationale": "This is a practical preparation for death but not the philosophical 'practice of dying' that Socrates describes, which is about the soul's relationship to the body and truth."}], "id": "q03"}, {"question": "Socrates argues that death is a liberation for the philosopher. However, he is careful to clarify what this does *not* mean. Which of the following actions would Socrates explicitly condemn based on the provided text?", "options": [{"text": "Seeking wisdom through intellectual pursuits that neglect physical needs.", "isCorrect": false, "rationale": "Socrates advocates for this 'separation' of soul from body to pursue wisdom. This is precisely what a philosopher does."}, {"text": "Embracing a life of severe austerity and denying all forms of pleasure.", "isCorrect": false, "rationale": "While the philosopher withdraws from bodily pleasures, the text explicitly condemns only one specific action — not austerity in general."}, {"text": "Actively seeking to end one's own life to achieve spiritual freedom.", "isCorrect": true, "rationale": "The text explicitly states: 'Earlier in the conversation, he explicitly argues that suicide is wrong — we are, as it were, the 'property of the gods,' and we have no right to destroy what belongs to them.'"}, {"text": "Questioning the value of earthly existence in comparison to a divine realm.", "isCorrect": false, "rationale": "This questioning is inherent to Socrates' philosophy, which posits something 'better than bodily life' and that the soul, freed from the body, can contemplate truth without distraction."}], "id": "q04"}, {"question": "According to Socrates, true virtue ($katharsis$) differs from ordinary people's 'courage' and 'temperance.' What is the fundamental difference he identifies?", "options": [{"text": "Ordinary virtue is based on logical reasoning, while true virtue is an innate, unreasoned disposition.", "isCorrect": false, "rationale": "Socrates' philosophy highly values reason. His argument implies true virtue is reasoned and disciplined, not unreasoned."}, {"text": "Ordinary virtue is motivated by external rewards or social approval, whereas true virtue comes from divine inspiration.", "isCorrect": false, "rationale": "The text doesn't mention divine inspiration as the source of true virtue, but rather the soul's disciplined pursuit of wisdom."}, {"text": "Ordinary virtue is a practical skill for managing daily life, while true virtue is an abstract philosophical concept.", "isCorrect": false, "rationale": "Socrates' virtue is deeply practical in its application to how one lives and faces death, not merely an abstract concept."}, {"text": "Ordinary virtue is a trade-off of one fear or desire for another, while true virtue is the soul's purification and independence from bodily influence, driven by a love for wisdom.", "isCorrect": true, "rationale": "The text states: 'Ordinary people... are 'courageous' because they fear something worse than death... and 'temperate' because they are afraid of losing certain pleasures. But this is merely trading one fear or desire for another. True virtue... is katharsis — purification... The truly virtuous person disciplines the soul to act independently of the body... out of love for wisdom.'"}], "id": "q05"}, {"question": "In the Argument from Opposites, Socrates asserts that everything comes into being from its opposite. He applies this principle to life and death. What is the central inference he draws about the soul's fate after death?", "options": [{"text": "The soul is merely a temporary state of the body, and it dissipates entirely upon death, like heat from a cooling object.", "isCorrect": false, "rationale": "This contradicts the conclusion of the argument. Socrates is trying to prove the soul's continued existence, not its dissipation."}, {"text": "Death is the final cessation of being, and thus the soul must be recreated anew with each birth, not persist.", "isCorrect": false, "rationale": "If the cycle only went one way (living to dead), 'eventually everything would be dead and nothing would be alive.' This suggests persistence and return, not recreation from nothing."}, {"text": "The souls of the dead must exist somewhere, waiting to return to life, because the living come from the dead.", "isCorrect": true, "rationale": "The text states: 'if the process only went one way (living to dead), eventually everything would be dead... Therefore, there must be a corresponding process going the other direction: the dead must come back to life. The souls of the dead must exist somewhere, waiting to return.'"}, {"text": "The process of change from life to death is unique and does not follow the same rules as other opposing qualities.", "isCorrect": false, "rationale": "Socrates' argument relies on life and death following the same rules of opposition as hot/cold, large/small, etc."}], "id": "q06"}, {"question": "The text raises a significant criticism of Socrates' Argument from Opposites concerning the analogy used. What is this criticism?", "options": [{"text": "The argument incorrectly assumes that hot and cold are true opposites, when they are merely different degrees of temperature.", "isCorrect": false, "rationale": "The criticism focuses on the nature of the things undergoing change, not the validity of the 'opposite' concept for physical properties."}, {"text": "It assumes that life and death are qualities of an enduring 'thing' (the soul) in the same way that hotness and coldness are qualities of a log, which begs the question of the soul's persistence.", "isCorrect": true, "rationale": "The text says: 'A log can go from cold to hot and back again because the log persists through the change. But in death, what persists? Socrates assumes it is the soul — but that is precisely what he is trying to prove.'"}, {"text": "The argument relies on an outdated understanding of biology and the processes of birth and decomposition.", "isCorrect": false, "rationale": "The criticism is philosophical, regarding the logic and assumptions of the analogy, not an appeal to modern science."}, {"text": "It fails to account for the possibility of a third, neutral state between life and death.", "isCorrect": false, "rationale": "The criticism is about the persistence of the subject (the soul) through the change, not the number of states."}], "id": "q07"}, {"question": "According to the Argument from Recollection, how do humans acquire knowledge of perfect concepts like 'perfect Equality'?", "options": [{"text": "Through extensive observation and averaging of countless imperfect examples from the physical world.", "isCorrect": false, "rationale": "The text explicitly states this is not how it happens: 'It could not have come from our senses, because the senses never show us perfect equality.'"}, {"text": "By intuitively synthesizing diverse sensory data into a coherent, ideal form through innate cognitive abilities developed during life.", "isCorrect": false, "rationale": "Socrates argues the knowledge is pre-existing, not synthesized during life from sensory data."}, {"text": "The soul must have known these perfect Forms directly before birth, and encountering imperfect examples in this life triggers a recollection of that prior knowledge.", "isCorrect": true, "rationale": "The text states: 'Socrates concludes that we must have acquired this knowledge before we were born... At some point before birth, our souls knew the Forms directly... When we encounter imperfect examples in this life... we 'recollect' the perfect Form that we once knew.'"}, {"text": "It is a divinely implanted knowledge that manifests spontaneously at certain stages of mental development.", "isCorrect": false, "rationale": "The text links it to the soul's pre-birth existence and knowledge of Forms, not spontaneous divine implantation in life."}], "id": "q08"}, {"question": "A student argues that the Argument from Recollection is flawed because perfect concepts like 'Equality' could simply be abstract constructs of the human mind, formed through advanced reasoning, rather than knowledge from a pre-natal existence. How might Socrates respond based on the text?", "options": [{"text": "Socrates would agree, noting that his argument is more of a poetic metaphor than a literal claim about pre-natal knowledge.", "isCorrect": false, "rationale": "Socrates presents this as a serious philosophical argument for the soul's pre-existence and immortality, not a metaphor."}, {"text": "He would concede that the argument is weak but essential to setting up his later, stronger arguments for the soul's immortality.", "isCorrect": false, "rationale": "The text calls this argument 'more original and more powerful' than the Argument from Opposites, indicating it's considered significant in its own right."}, {"text": "He would reiterate that since our senses only show us imperfect examples, and nothing in the physical world is perfectly equal, the concept could not have originated from this life's experience.", "isCorrect": true, "rationale": "Socrates' core reasoning is that 'It could not have come from our senses... It could not have come from the physical world,' thus necessitating a pre-birth origin."}, {"text": "Socrates would suggest that whether it comes from pre-natal knowledge or advanced reasoning, the existence of such concepts still proves the soul's independence from the body.", "isCorrect": false, "rationale": "The argument from recollection specifically uses the origin of these concepts (pre-natal knowledge) to prove the soul's pre-existence, which is a stronger claim than mere independence from the body after birth."}], "id": "q09"}, {"question": "Considering all the arguments presented in this section, what is the overarching ambition Plato attributes to Socrates in the Phaedo regarding the soul's immortality?", "options": [{"text": "To provide comfort to grieving friends by asserting a popular belief in the soul's survival without rigorous proof.", "isCorrect": false, "rationale": "The text explicitly states Socrates' ambition is 'not merely to assert that the soul survives death, but to prove it through argument.'"}, {"text": "To demonstrate that philosophical inquiry is inherently futile in resolving questions about the afterlife, emphasizing faith instead.", "isCorrect": false, "rationale": "The dialogue is presented as a serious philosophical inquiry aiming for proof, not a demonstration of futility or a shift to faith."}, {"text": "To outline a new moral code for living a virtuous life, independent of any beliefs about the soul's fate.", "isCorrect": false, "rationale": "While virtue is redefined, it is deeply intertwined with the soul's nature and destiny, not independent of it."}, {"text": "To move beyond mere assertion (like the Pythagoreans) and offer a systematic, reasoned philosophical proof for the soul's immortality and pre-existence.", "isCorrect": true, "rationale": "The text states: 'The Pythagoreans had long believed in the soul's immortality. What Socrates will attempt is something more ambitious: not merely to assert that the soul survives death, but to prove it through argument.'"}], "id": "q10"}, {"question": "The text notes that Phaedo felt 'a strange admixture' of pleasure and pain on Socrates' final day, with friends 'laughing and weeping by turns.' How does this emotional texture relate to Socrates' opening philosophical observation about pleasure and pain being 'fastened together'?", "options": [{"text": "It shows that Socrates' friends had not truly understood his teaching about separating the soul from bodily emotions.", "isCorrect": false, "rationale": "The emotional response of the friends is presented as natural and human, not as a philosophical failing. The text wants readers to 'feel the weight' of the day."}, {"text": "It demonstrates that Socrates' philosophical observation about opposites being intertwined is confirmed by the lived experience of his friends on that day.", "isCorrect": true, "rationale": "The very same intertwining of pleasure and pain that Socrates identifies philosophically when his chains are removed is then embodied in the emotional experience of those present — grief mixed with the pleasure of being with a beloved teacher on his last day."}, {"text": "It contradicts Socrates' teaching, since truly philosophical people should be able to separate grief from joy.", "isCorrect": false, "rationale": "Socrates does not claim that philosophical people feel no emotions. His point about body and soul is about the soul's priority in pursuing truth, not an elimination of all human feeling."}, {"text": "It is purely a literary device Plato uses to make the death scene more emotionally moving for readers, with no philosophical significance.", "isCorrect": false, "rationale": "The text explicitly connects the emotional texture to philosophical purpose: Plato 'wants us to feel the weight of that even as we follow the arguments.' The two levels reinforce each other."}], "id": "q11"}, {"question": "The text notes that the Argument from Opposites and the Argument from Recollection together leave 'a crucial gap' that Simmias and Cebes identify. What precisely is this gap?", "options": [{"text": "Neither argument explains why the soul is inclined toward goodness rather than evil.", "isCorrect": false, "rationale": "The gap identified by Simmias and Cebes is specifically about the soul's fate after death, not its moral orientation."}, {"text": "Neither argument has established that the soul exists at all, independent of the body.", "isCorrect": false, "rationale": "Both arguments do establish something about the soul's independent existence — the Argument from Recollection shows the soul knew Forms before birth. The gap is specifically about what happens after death."}, {"text": "The arguments show at most that the soul has a history before birth, but do not prove it has a future after death.", "isCorrect": true, "rationale": "The text states: 'The Argument from Opposites suggests (at best) that there is a cycle between life and death. The Argument from Recollection shows (at best) that the soul existed before birth. But neither argument proves what Socrates really needs: that the soul survives after death.'"}, {"text": "The arguments apply only to philosophers' souls and say nothing about the souls of ordinary people.", "isCorrect": false, "rationale": "The objection raised by Simmias and Cebes is about the arguments' logical scope — they may not extend to post-mortem survival at all — not about which souls they cover."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
