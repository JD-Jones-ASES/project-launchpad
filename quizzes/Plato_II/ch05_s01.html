    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Plato_II.html">&larr; Back to The Death of Socrates (Plato II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements accurately describes Aristotle's initial involvement with Plato's Academy?", "options": [{"text": "He was a contemporary who engaged in philosophical debates with Plato from an external school.", "isCorrect": false, "rationale": "The text states that Aristotle enrolled in Plato's Academy as a student, rather than being an external contemporary."}, {"text": "He enrolled as a seventeen-year-old student and remained for two decades as both student and teacher.", "isCorrect": true, "rationale": "The text explicitly states, 'In the year 367 BC, a seventeen-year-old boy...enrolled in Plato's Academy...He was, by all accounts, the most brilliant mind Plato ever trained. He was also the one who would most thoroughly challenge everything Plato believed.'"}, {"text": "He founded the Academy in 387 BC, a decade before Plato became involved.", "isCorrect": false, "rationale": "The text clearly states, 'The Academy was the school Plato founded around 387 BC,' not Aristotle."}, {"text": "He briefly visited the Academy to present his biological research before establishing his own school.", "isCorrect": false, "rationale": "Aristotle remained at the Academy for twenty years, first as a student and then as a teacher and researcher, which is far from a brief visit."}], "id": "q01"}, {"question": "Aristotle's decision to leave Athens after Plato's death is primarily attributed to which of the following?", "options": [{"text": "A disagreement over the philosophical direction of the Academy with Plato himself.", "isCorrect": false, "rationale": "Plato had already died in 347 BC when Aristotle left Athens, making a disagreement with Plato himself impossible at that time."}, {"text": "The Academy's leadership passing to Plato's nephew Speusippus instead of to Aristotle.", "isCorrect": true, "rationale": "The text states, 'After Plato's death in 347 BC, Aristotle left Athens — possibly because the Academy's leadership passed to Plato's nephew Speusippus rather than to him.'"}, {"text": "His desire to establish a new philosophical movement completely independent of Plato's teachings.", "isCorrect": false, "rationale": "While he eventually founded his own school, the immediate reason for leaving Athens after Plato's death was tied to the succession of the Academy, not solely an independent philosophical pursuit at that moment."}, {"text": "An immediate invitation from King Philip II of Macedon to found the Lyceum.", "isCorrect": false, "rationale": "Aristotle spent 'several years traveling and conducting biological research on the island of Lesbos' before accepting Philip II's invitation to tutor Alexander, and founded the Lyceum even later."}], "id": "q02"}, {"question": "The term 'Peripatetics' associated with Aristotle's Lyceum students reflects which aspect of his teaching methodology?", "options": [{"text": "Their dedication to theoretical philosophy, remaining stationary for deep thought.", "isCorrect": false, "rationale": "The term 'Peripatetics' literally means 'those who walk around,' directly contradicting the idea of remaining stationary."}, {"text": "Their practice of conducting philosophical discussions while walking in the Lyceum's covered walkways.", "isCorrect": true, "rationale": "The text explains, 'Because he and his students walked the covered walkways (peripatoi) while discussing philosophy, they became known as the Peripatetics.'"}, {"text": "Their extensive travels across Greece to spread Aristotle's philosophical ideas.", "isCorrect": false, "rationale": "While Aristotle traveled at certain points, the term 'Peripatetics' specifically refers to the walking done during teaching at the Lyceum, not extensive travels to spread ideas."}, {"text": "Their focus on studying the movement of celestial bodies, which they observed while walking outdoors.", "isCorrect": false, "rationale": "The text does not mention the study of celestial bodies as the origin of the term 'Peripatetics'; it specifies walking while discussing philosophy."}], "id": "q03"}, {"question": "Raphael's depiction of Plato pointing upwards and Aristotle gesturing outwards in 'The School of Athens' primarily symbolizes their contrasting views on:", "options": [{"text": "The importance of formal education versus self-study.", "isCorrect": false, "rationale": "The gestures do not relate to educational methods but to their fundamental philosophical outlooks on reality."}, {"text": "The value of written dialogues compared to systematic treatises.", "isCorrect": false, "rationale": "While true that they used different forms, the gestures are interpreted as symbolizing their views on the nature of reality, not their literary styles."}, {"text": "The nature of ultimate reality and how it is apprehended.", "isCorrect": true, "rationale": "The text states, 'Plato...points one finger straight up — toward the heavens, toward the invisible world of the Forms. Aristotle...extends his hand outward, palm down — toward the earth, toward the visible world of particular things.' This directly contrasts their views on where ultimate reality lies and how it's understood."}, {"text": "The role of the individual philosopher in society.", "isCorrect": false, "rationale": "The fresco's central figures' gestures are interpreted as representing their metaphysical beliefs rather than their social roles."}], "id": "q04"}, {"question": "Given the description of Plato as a 'poet-philosopher,' which of the following approaches would a reader most likely encounter in his works?", "options": [{"text": "Detailed biological classifications and empirical observations.", "isCorrect": false, "rationale": "This describes Aristotle's approach as a 'biologist-philosopher,' not Plato's."}, {"text": "Rigorous, systematic arguments presented in a lecture-note style.", "isCorrect": false, "rationale": "This is characteristic of Aristotle's surviving works, which read 'more like lecture notes than literature.'"}, {"text": "Allegories, myths, and dialogues designed to provoke intellectual inquiry rather than state definitive conclusions.", "isCorrect": true, "rationale": "The text states Plato 'wrote in dialogue form, filled his works with myths and images...and believed that the highest truths could only be approached through a kind of intellectual vision, not fully captured in words...often deliberately ambiguous. He wanted his readers to think, not merely to memorize conclusions.'"}, {"text": "A focus on precise definitions and the organization of knowledge into distinct sciences.", "isCorrect": false, "rationale": "This is characteristic of Aristotle, who was 'always precise' and 'organized all human knowledge into distinct sciences.'"}], "id": "q05"}, {"question": "Aristotle's 'biologist-philosopher' temperament suggests he would prioritize which of the following in his philosophical investigations?", "options": [{"text": "Seeking truths through abstract intellectual visions and unquantifiable concepts.", "isCorrect": false, "rationale": "This describes Plato's approach, where 'the highest truths could only be approached through a kind of intellectual vision.'"}, {"text": "Presenting ideas through dramatic narratives and metaphorical language.", "isCorrect": false, "rationale": "This describes Plato's literary and poetic style, using myths and images."}, {"text": "Careful observation, classification, and systematic analysis of the visible world.", "isCorrect": true, "rationale": "The text states Aristotle 'classified, categorized, and analyzed. He dissected sea creatures, catalogued constitutions, and organized all human knowledge into distinct sciences, each with its own method.'"}, {"text": "Emphasizing the ambiguity of language to encourage deeper contemplation.", "isCorrect": false, "rationale": "While Plato's prose was 'deliberately ambiguous,' Aristotle's works were 'always precise.'"}], "id": "q06"}, {"question": "The famous remark attributed to Aristotle, 'Plato is dear to me, but dearer still is truth,' best illustrates which aspect of his relationship with his teacher?", "options": [{"text": "His complete rejection of all Platonic doctrines after founding the Lyceum.", "isCorrect": false, "rationale": "The text states he 'never lost his respect for his teacher' and implies a critical engagement rather than a complete rejection."}, {"text": "His personal affection for Plato coupled with an intellectual independence that allowed him to rigorously test his teacher's ideas.", "isCorrect": true, "rationale": "The text explains this saying 'accurately reflects the independence Aristotle showed toward Plato's ideas while maintaining genuine affection for the man himself. He could disagree with Plato precisely because he took Plato's ideas seriously enough to test them rigorously.'"}, {"text": "His belief that Plato intentionally presented ambiguous ideas to challenge future philosophers.", "isCorrect": false, "rationale": "While Plato's works were ambiguous, the quote speaks to Aristotle's intellectual priority of truth over personal loyalty, not Plato's intent behind his style."}, {"text": "His agreement with Plato on all fundamental philosophical principles, despite minor disagreements.", "isCorrect": false, "rationale": "The text states they 'disagreed about nearly everything that mattered,' indicating significant philosophical divergence, not just minor disagreements."}], "id": "q07"}, {"question": "Why did Aristotle choose to flee Athens after Alexander the Great's death?", "options": [{"text": "He feared being accused of treason due to his role in tutoring Alexander.", "isCorrect": false, "rationale": "He was charged with impiety, not treason, although the underlying cause was anti-Macedonian sentiment due to his connections."}, {"text": "He was invited by Alexander's successor to establish a new school in Macedon.", "isCorrect": false, "rationale": "The text does not mention an invitation from Alexander's successor; it states he 'chose to flee' due to charges."}, {"text": "He was charged with impiety amidst surging anti-Macedonian sentiment in Athens due to his connections.", "isCorrect": true, "rationale": "The text states, 'After Alexander's death in 323 BC, anti-Macedonian feeling surged in Athens, and Aristotle — a resident alien with Macedonian connections — was charged with impiety.'"}, {"text": "He sought to find a new philosophical center outside of Athenian political influence.", "isCorrect": false, "rationale": "His flight was directly precipitated by the charge of impiety and the associated political climate, not a pre-planned desire for a new philosophical center."}], "id": "q08"}, {"question": "Despite their significant philosophical differences, Plato and Aristotle shared common ground on which of the following fundamental beliefs?", "options": [{"text": "The primary importance of the visible, empirical world for understanding reality.", "isCorrect": false, "rationale": "This was a core tenet of Aristotle's philosophy, in direct contrast to Plato's belief in the invisible world of Forms."}, {"text": "The necessity of a poetic and allegorical approach to convey complex truths.", "isCorrect": false, "rationale": "This was characteristic of Plato's writing style, while Aristotle's was systematic and precise, not poetic."}, {"text": "That the soul is more important than the body and that knowledge is worth pursuing.", "isCorrect": true, "rationale": "The 'note' section explicitly states they 'agreed on much: that philosophy is the highest human activity, that virtue is essential to the good life, that knowledge is possible and worth pursuing, and that the soul is more important than the body.'"}, {"text": "The idea that ultimate reality resides in eternal, unchanging Forms accessible only by the mind.", "isCorrect": false, "rationale": "This was Plato's central theory, which Aristotle 'would most thoroughly challenge.'"}], "id": "q09"}, {"question": "Which statement best characterizes the overall relationship between Plato and Aristotle, as presented in the text?", "options": [{"text": "A mentorship that eventually led to a complete and irreconcilable ideological break.", "isCorrect": false, "rationale": "While they diverged, the text emphasizes their mutual respect and shared commitments, not an 'irreconcilable ideological break.'"}, {"text": "A friendly rivalry that primarily focused on who could attract the most students to their respective academies.", "isCorrect": false, "rationale": "The text highlights intellectual differences and personal affection, with no mention of rivalry over student recruitment."}, {"text": "A collaboration where Aristotle primarily refined and systematized Plato's existing theories without introducing major new ideas.", "isCorrect": false, "rationale": "Aristotle was the one 'who would most thoroughly challenge everything Plato believed,' indicating significant divergence and new ideas, not just refinement."}, {"text": "A master-student dynamic marked by mutual respect, intellectual challenge, and significant philosophical divergence within a shared commitment to philosophy.", "isCorrect": true, "rationale": "The text describes them as 'the master and the student who loved each other, learned from each other, and disagreed about nearly everything that mattered,' while also noting their 'disagreements were real, but they were disagreements within a shared commitment to the philosophical life.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
