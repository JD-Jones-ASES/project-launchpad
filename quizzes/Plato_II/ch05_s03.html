<script>
var QUESTIONS = [{"question": "According to Plato, how does the body relate to the soul in the pursuit of the good life?", "options": [{"text": "It is an essential partner, providing the means for the soul to interact with the world and achieve its goals.", "isCorrect": false, "rationale": "Plato's dualism views the body not as a partner but as fundamentally separate and often at odds with the soul. He sees it as a source of distractions and unreliable senses."}, {"text": "It is an obstacle that distracts the soul from its highest activity and true home in the realm of Forms.", "isCorrect": true, "rationale": "The text explicitly states that for Plato, 'the body is not merely different from the soul; it is an obstacle to the soul's highest activity' and its 'distractions' prevent the soul from returning to its 'true home'."}, {"text": "It is a neutral vessel, neither helping nor hindering the soul's true purpose, as long as it is kept healthy.", "isCorrect": false, "rationale": "Plato's philosophy is far from neutral; he views the body's appetites and senses as significant impediments to the soul's purification and philosophical pursuits."}, {"text": "It is the material manifestation of the soul's form, inseparable in life and equally important for existence.", "isCorrect": false, "rationale": "This describes Aristotle's hylomorphic view of the soul, where the soul is the 'form of the body,' entirely opposite to Plato's dualism."}], "id": "q01"}, {"question": "Aristotle's hylomorphic view of the soul implies which of the following about its existence?", "options": [{"text": "The soul is an independent, immaterial entity that can exist apart from the body after death.", "isCorrect": false, "rationale": "Aristotle explicitly states that 'the soul cannot exist apart from the body any more than the shape of a statue can exist apart from the bronze,' directly refuting the idea of an independent soul."}, {"text": "The soul is the organizing principle (form) of a living body and ceases to exist when that particular body dies.", "isCorrect": true, "rationale": "The text explains that for Aristotle, the soul is 'the form of the body' and that 'When the body dies, the soul — as the form of that particular body — ceases to exist.'"}, {"text": "The soul is a heavenly visitor trapped in the body, awaiting release upon death to return to the world of Forms.", "isCorrect": false, "rationale": "This is a core tenet of Plato's philosophy, explicitly contrasted with Aristotle's view, which rejects pre-existence or flight to the world of Forms."}, {"text": "The soul is primarily a collection of appetites and desires that are overcome by the rational part of the mind.", "isCorrect": false, "rationale": "While Aristotle acknowledges different capacities of the soul, his overall view is that the soul is the form of the body, not merely a collection of appetites. This option also leans more towards Plato's tripartite soul description."}], "id": "q02"}, {"question": "In Plato's Republic, an individual achieves justice when:", "options": [{"text": "All three parts of the soul (reason, spirit, appetite) are equally powerful and pursue their own desires without conflict.", "isCorrect": false, "rationale": "Plato's concept of justice in the soul requires a specific hierarchy, not equality, to prevent internal conflict and chaos."}, {"text": "The appetitive part of the soul dominates, ensuring that all bodily needs and desires are satisfied, leading to contentment.", "isCorrect": false, "rationale": "This would lead to an unjust and chaotic soul, as appetite is meant to be governed, not to govern, according to Plato."}, {"text": "Reason rules, spirit supports its authority, and appetite obeys its commands.", "isCorrect": true, "rationale": "The text states: 'Justice in the individual consists of each part doing its proper work, with reason ruling, spirit supporting reason's authority, and appetite obeying.'"}, {"text": "The spirit part of the soul inspires courage to overcome rational doubts and physical appetites.", "isCorrect": false, "rationale": "Spirit's role is to support reason's authority, not to usurp it or act independently against rational thought."}], "id": "q03"}, {"question": "According to Aristotle, a plant possesses which level(s) of soul?", "options": [{"text": "Only the rational soul, as it exhibits complex growth patterns and adaptation.", "isCorrect": false, "rationale": "The rational soul is unique to humans and involves thought and deliberation; plants do not possess this."}, {"text": "Both the nutritive and sensitive souls, allowing for growth and basic interaction with the environment.", "isCorrect": false, "rationale": "While plants have the nutritive soul, the sensitive soul is associated with sensation, desire, and movement, which plants do not possess. Animals have both nutritive and sensitive souls."}, {"text": "The nutritive soul, enabling growth, nourishment, and reproduction.", "isCorrect": true, "rationale": "The text explicitly states: 'Nutritive soul: the capacity for growth, nourishment, and reproduction. Plants have this level of soul and nothing higher.'"}, {"text": "All three levels of soul: nutritive, sensitive, and rational.", "isCorrect": false, "rationale": "Only humans possess all three levels of soul, as humans can grow, perceive, and think."}], "id": "q04"}, {"question": "Plato's statement that 'no one does wrong willingly' implies that for him, virtue is primarily a matter of:", "options": [{"text": "Cultivating emotional control through spiritual discipline.", "isCorrect": false, "rationale": "While control is part of Plato's ethics, his primary emphasis for virtue is intellectual understanding, not solely emotional discipline."}, {"text": "Developing good habits through repeated moral actions and practice.", "isCorrect": false, "rationale": "This describes Aristotle's view of virtue (hexis), which Plato sharply disagreed with regarding the acquisition of virtue."}, {"text": "Acquiring true knowledge of what is genuinely good for the soul.", "isCorrect": true, "rationale": "The text states: 'For Plato, virtue is fundamentally a matter of knowledge. If you truly understand what is good, you will do it; no one does wrong willingly.' Wrongdoing is seen as a form of ignorance."}, {"text": "Balancing desires and reason to achieve a harmonious inner state.", "isCorrect": false, "rationale": "While harmony is a result of justice in the soul for Plato, the *cause* of virtue, and therefore the good life, is knowledge, enabling correct balance."}], "id": "q05"}, {"question": "How does Aristotle's view of virtue as a 'hexis' (habit) distinguish it from Plato's understanding?", "options": [{"text": "Aristotle believes virtue is innate and present from birth, while Plato sees it as acquired through effort.", "isCorrect": false, "rationale": "Neither philosopher believes virtue is purely innate; both see it as something that must be cultivated, albeit through different means."}, {"text": "Aristotle emphasizes intellectual contemplation as the sole path to virtue, while Plato focuses on active moral engagement.", "isCorrect": false, "rationale": "This statement reverses their positions. Plato's good life is contemplative, while Aristotle emphasizes active engagement and practice."}, {"text": "Aristotle argues virtue is a stable disposition developed through repeated practice and experience, not merely intellectual knowledge, unlike Plato.", "isCorrect": true, "rationale": "The text explicitly contrasts them: 'For Plato, virtue is knowledge of the Good. For Aristotle, virtue is a habit of choosing well, developed through repeated practice.' Aristotle's 'hexis' is defined as 'stable dispositions acquired through practice.'"}, {"text": "Aristotle suggests virtue is primarily a gift from the gods, whereas Plato believes it's a purely human achievement.", "isCorrect": false, "rationale": "Neither philosopher presents virtue as primarily a divine gift. Both frameworks emphasize human agency and effort in its acquisition."}], "id": "q06"}, {"question": "According to Aristotle's doctrine of the Golden Mean, courage is the mean between cowardice and recklessness. This implies that:", "options": [{"text": "Courage is always found at the exact mathematical midpoint between fearing nothing and fearing everything.", "isCorrect": false, "rationale": "The text clarifies that the mean is 'not a mathematical midpoint, but the response that practical wisdom judges to be appropriate.'"}, {"text": "The virtuous act of courage is the same for every person in every situation, as it follows universal rules.", "isCorrect": false, "rationale": "The text states that 'Different people in different circumstances may find the mean at different points,' indicating context-dependency, not universality."}, {"text": "Courage requires finding the appropriate response to a situation, which is determined by practical wisdom rather than a fixed rule.", "isCorrect": true, "rationale": "The definition of the Golden Mean states it is 'the right response for the right situation, as determined by practical wisdom (phronesis).'"}, {"text": "One can only be truly courageous by experiencing extreme fear and then consciously choosing to act in its absence.", "isCorrect": false, "rationale": "While experience is crucial for Aristotle, this option describes a specific, narrow condition for courage rather than the general principle of finding the mean through habit and practical wisdom."}], "id": "q07"}, {"question": "What is 'phronesis' (practical wisdom) for Aristotle, and how is it primarily acquired?", "options": [{"text": "It is theoretical knowledge of universal truths, learned through dialectic and contemplation.", "isCorrect": false, "rationale": "This describes sophia (contemplative wisdom), which Aristotle distinguishes from phronesis, and also aligns more with Plato's method of acquiring virtue."}, {"text": "It is the ability to discern the right thing to do in a particular situation, developed through experience and practice.", "isCorrect": true, "rationale": "The text defines phronesis as 'the intellectual virtue that enables a person to discern, in any particular situation, what the right thing to do is' and states it 'comes from experience, from watching good people act, and from practicing good action yourself.'"}, {"text": "It is an innate moral compass that guides individuals toward ethical choices without prior instruction or effort.", "isCorrect": false, "rationale": "Phronesis requires active development through experience and is not an innate faculty that functions without effort or learning."}, {"text": "It is the spiritual strength to overcome bodily desires and achieve a state of inner peace, learned through asceticism.", "isCorrect": false, "rationale": "This describes a specific spiritual practice, not Aristotle's concept of practical wisdom, which is focused on ethical action in the world."}], "id": "q08"}, {"question": "Aristotle's concept of 'eudaimonia' is best understood as:", "options": [{"text": "A temporary feeling of intense pleasure or happiness that can fluctuate daily.", "isCorrect": false, "rationale": "The text explicitly states: 'Eudaimonia is not a feeling of pleasure but an activity — the activity of the soul in accordance with virtue over the course of a complete life.' It is not temporary."}, {"text": "The ultimate goal of life, achieved primarily through accumulating wealth and social status.", "isCorrect": false, "rationale": "While external goods might contribute, eudaimonia is fundamentally an 'activity of the soul in accordance with virtue,' not primarily about external possessions."}, {"text": "A state of flourishing or living well, attained by developing virtues and engaging actively in one's community over a complete life.", "isCorrect": true, "rationale": "The definition highlights it as 'flourishing' or 'living well and doing well,' achieved through 'developing the virtues, exercising practical wisdom, and living in a community that supports the good life.'"}, {"text": "The intellectual contemplation of eternal Forms, leading to detachment from worldly affairs and concerns.", "isCorrect": false, "rationale": "This describes Plato's 'good life' for the philosopher, whereas Aristotle's eudaimonia is rooted in active engagement within the human community and practical life."}], "id": "q09"}, {"question": "Which of the following statements accurately summarizes a key difference between Plato and Aristotle regarding 'the good life'?", "options": [{"text": "Plato believes the good life is primarily communal and civic, while Aristotle sees it as solitary and contemplative.", "isCorrect": false, "rationale": "This reverses their positions. Aristotle's good life includes 'civic engagement,' while Plato's 'philosophical life' is more focused on contemplation."}, {"text": "Plato identifies the good life with the philosophical contemplation of eternal truths, while Aristotle sees it as virtuous activity embedded in practical life and community.", "isCorrect": true, "rationale": "The comparison section states: 'For Plato, the contemplative life of the philosopher, devoted to eternal truths.' and 'For Aristotle, a life of activity in accordance with virtue — including friendship, civic engagement, and the pleasures of a well-ordered life.'"}, {"text": "Both Plato and Aristotle agree that the good life is achieved exclusively through innate moral knowledge, without any practice.", "isCorrect": false, "rationale": "Aristotle explicitly states that virtue is a habit acquired through practice, and both agree virtue is not purely innate. Plato emphasizes knowledge but does not exclude practice entirely for living justly."}, {"text": "Plato argues the good life is accessible only after death, while Aristotle contends it can be fully realized in this life.", "isCorrect": false, "rationale": "Plato's philosopher 'practices dying' and lives 'the philosophical life' in this world. While the soul's true home is after death, the 'good life' is lived here by striving towards that. Aristotle's eudaimonia is clearly an achievement in 'a complete life' on earth."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
