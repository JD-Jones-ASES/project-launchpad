<script>
var QUESTIONS = [{"question": "Which of the following BEST explains why falling commodity prices in the 1880s and 1890s produced political radicalism among farmers rather than simply individual hardship?", "options": [{"text": "Farmers were uniquely politically organized because of their isolated rural communities, which allowed grievances to be aired without the social controls that urban industrial workplaces imposed on workers", "isCorrect": false, "rationale": "Isolation would more likely inhibit than enable political organizing. The Populists succeeded precisely by building new organizational infrastructure — the Alliances and their lecture circuits — to overcome the obstacles of rural dispersal."}, {"text": "Farmers operated within a structural economic system — railroad freight monopolies, deflationary monetary policy, compound-interest mortgage debt, and crop-lien systems — that made their problems collective and structural rather than individual, creating the basis for political diagnosis and collective action", "isCorrect": true, "rationale": "The source emphasizes that the material conditions — falling wheat prices ($1.19 → $0.49/bushel), railroad freight rates, mortgage debt at 8–12%, and contractionary monetary policy — were structural, affecting millions simultaneously. The Alliances' lecturers explained structural causes in 'remarkably sophisticated economic terms,' transforming individual hardship into political radicalism."}, {"text": "Farmers had more political rights than industrial workers because the 15th Amendment had been specifically interpreted to guarantee agrarian voting rights against disenfranchisement", "isCorrect": false, "rationale": "The 15th Amendment prohibits racial disenfranchisement, not disenfranchisement of farmers specifically, and has no special agrarian application. The political strength of the farmer movement came from structural conditions and organizational innovation, not special constitutional protection."}, {"text": "Falling commodity prices disproportionately affected wheat and cotton farmers while leaving corn and livestock farmers unaffected, creating a politically coherent regional bloc in the Plains and South", "isCorrect": false, "rationale": "While wheat and cotton farmers were most affected, the source does not present regional commodity specialization as the explanation for why hardship became radicalism. The structural explanation — railroad monopoly, deflationary policy, debt — applies broadly and is the source's preferred causal account."}]}, {"question": "The Grange (Patrons of Husbandry) secured the passage of Granger laws setting maximum railroad rates in the 1870s. The subsequent Supreme Court decision in Wabash v. Illinois (1886) was significant because:", "options": [{"text": "It upheld the Granger laws as constitutional exercises of states' police power, encouraging other states to regulate railroad rates", "isCorrect": false, "rationale": "Wabash was decided the other way: the Court ruled that states could not regulate interstate commerce even within their borders, effectively gutting the Granger laws for interstate routes. This ruling prompted Congress to pass the Interstate Commerce Act (1887)."}, {"text": "It ruled that states could not regulate interstate railroad commerce even within state borders, effectively gutting the Granger laws and directly prompting Congress to pass the Interstate Commerce Act of 1887", "isCorrect": true, "rationale": "The source explicitly describes this sequence: Wabash ruled 'that states could not regulate interstate commerce even within their borders — a decision that directly prompted Congress to pass the Interstate Commerce Act of 1887.' This is the standard account of the regulatory gap Wabash created and Congress's response."}, {"text": "It declared the Sherman Antitrust Act unconstitutional as applied to railroad monopolies, leaving the Grange without any legal tool for challenging rate discrimination", "isCorrect": false, "rationale": "Wabash was decided in 1886; the Sherman Antitrust Act was not passed until 1890. The decisions are not causally related in the way described. Wabash was a federalism decision about state vs. federal regulatory jurisdiction."}, {"text": "It ruled that the Patrons of Husbandry (Grange) was an illegal combination in restraint of trade under common-law precedent, forcing the dissolution of cooperative purchasing networks", "isCorrect": false, "rationale": "Wabash addressed state regulatory jurisdiction over railroads, not the Grange's organizational status. The Grange's cooperatives were not challenged in Wabash."}]}, {"question": "Read the following excerpt from William Jennings Bryan's 'Cross of Gold' speech (1896): 'You shall not press down upon the brow of labor this crown of thorns. You shall not crucify mankind upon a cross of gold.' Perform a HAPP analysis. What was the PRIMARY purpose of this speech?", "options": [{"text": "To announce Bryan's candidacy for the Democratic presidential nomination and outline his fiscal policy platform in technical economic terms accessible to financial experts", "isCorrect": false, "rationale": "The Cross of Gold speech was not a technical policy document. Its purpose was emotional and political — to electrify a convention audience and secure a presidential nomination through a peroration that crystallized agrarian grievance into a memorable metaphor. The audience was delegates, not financial experts."}, {"text": "To win the Democratic presidential nomination by framing the monetary question in moral and religious terms that crystallized agrarian grievance, expanded the definition of 'businessman' to include farmers and workers, and positioned free silver as the cause of democratic justice against financial oligarchy", "isCorrect": true, "rationale": "The source describes Bryan as 'virtually unknown nationally before that day' who 'delivered a peroration that electrified the hall and won him the Democratic presidential nomination.' The speech expands the definition of businessman (farmer = businessman), frames gold as crucifixion, and positions silver as the producing classes' cause against East Coast financial oligarchy."}, {"text": "To address the Republican National Convention and persuade Republicans to adopt a silver plank, arguing that industrial workers' economic interests were better served by free silver than by the gold standard", "isCorrect": false, "rationale": "Bryan spoke at the Democratic National Convention, not the Republican. The Republican Party under McKinley championed the gold standard; Bryan's speech was directed at Democrats and the broader agrarian/silver constituency, not at Republicans."}, {"text": "To formally launch the Populist Party's 1896 presidential campaign and announce the adoption of the Omaha Platform as the basis for Populist-Democratic fusion", "isCorrect": false, "rationale": "The Cross of Gold speech was delivered at the Democratic National Convention, not the Populist founding. The Populist nomination of Bryan came afterward, as a painful strategic decision by Populist leaders to fuse with the Democrats."}]}, {"question": "The Populist (People's) Party's Omaha Platform of 1892 has been described as one of the most comprehensive economic reform programs in American political history. Which of the following demands from the platform eventually became law — but only after the Populists' defeat?", "options": [{"text": "Government ownership of the railroads, telegraph, and telephone", "isCorrect": false, "rationale": "Government ownership of railroads and communications was NOT enacted — the Progressive Era regulatory approach (ICC strengthening, rate regulation) was chosen instead. The Populists' state-ownership demand was the one major plank that was not subsequently adopted."}, {"text": "The graduated income tax, direct election of senators, and greater government oversight of banking and currency", "isCorrect": true, "rationale": "The source explicitly states that 'the core Populist demands — graduated income tax (16th Amendment, 1913), direct election of senators (17th Amendment, 1913)…greater government oversight of banking and currency (Federal Reserve Act, 1913) — were enacted in modified form by the Progressive Era administrations of Roosevelt, Taft, and Wilson.'"}, {"text": "Free silver at 16:1 ratio — eventually enacted through executive action by President Theodore Roosevelt in 1903", "isCorrect": false, "rationale": "Free silver was never enacted. The U.S. stayed on the gold standard after McKinley's 1896 victory; the Gold Standard Act (1900) formally codified the gold standard, and the Federal Reserve Act (1913) created a managed currency system that did not include free silver coinage."}, {"text": "The eight-hour workday for all workers, enacted through the Adamson Act of 1906 as part of Roosevelt's Square Deal program", "isCorrect": false, "rationale": "The Adamson Act (1916, not 1906) established an eight-hour workday for railroad workers specifically, not all workers. The Omaha Platform's eight-hour demand was limited to government workers; general eight-hour day legislation came much later (Fair Labor Standards Act, 1938)."}]}, {"question": "The Farmers' Alliances developed the 'sub-treasury plan' as a response to the crop-lien system. Which of the following BEST explains what problem the sub-treasury plan was designed to solve?", "options": [{"text": "The plan was designed to eliminate crop surpluses by paying farmers to reduce acreage, redistributing production quotas to prevent price-collapsing overproduction", "isCorrect": false, "rationale": "The sub-treasury plan addressed access to credit, not production control. Acreage reduction and production quotas were Agricultural Adjustment Administration (1933) ideas, not Populist sub-treasury thinking."}, {"text": "Government-owned warehouses where farmers could store crops and borrow against them at low interest rates would circumvent the crop-lien system and cotton factor networks that kept farmers in cycles of debt", "isCorrect": true, "rationale": "The source explicitly describes the sub-treasury plan: 'government-owned warehouses where farmers could store crops and borrow against them at low interest rates, circumventing the crop-lien system and the cotton factor that kept Southern farmers in cycles of debt.'"}, {"text": "The plan would create a federal treasury branch in every county seat, providing farmers with direct access to U.S. Treasury deposits for short-term agricultural credit at the prime interest rate", "isCorrect": false, "rationale": "The sub-treasury plan involved government-owned storage warehouses (sub-treasuries), not county-level bank branches. The credit mechanism was the stored crop itself as collateral, not Treasury deposit access."}, {"text": "Government sub-treasuries would purchase all surplus crops at a fixed price guarantee, eliminating the price volatility that made long-range farm planning impossible", "isCorrect": false, "rationale": "The sub-treasury plan offered storage and low-interest credit against stored crops — not a purchase guarantee or price support. Price supports came later (AAA 1933)."}]}, {"question": "McKinley's 1896 campaign against Bryan succeeded despite Bryan's oratorical advantages. Which of the following BEST explains McKinley's winning strategy?", "options": [{"text": "McKinley won primarily by suppressing Black voter turnout in Southern states that had previously supported the Democratic Party", "isCorrect": false, "rationale": "Black voter suppression in the South served the Democratic Party, not McKinley's Republican campaign. McKinley won by persuading industrial workers and urban consumers in the Northeast and Midwest, not by voter suppression in the South."}, {"text": "Mark Hanna's $3.5 million campaign (funded primarily by corporate donations) allowed McKinley to persuade industrial workers and urban consumers that a stable gold-backed currency and high tariffs served their interests better than inflationary silver policy", "isCorrect": true, "rationale": "The source explicitly describes this: 'Republican nominee William McKinley, financed by businessman and political operative Mark Hanna with an unprecedented $3.5 million campaign fund (primarily from corporate donations)' countered Bryan with the argument that 'a stable gold-backed currency, high protective tariffs, and industrial prosperity served workers' interests better than inflationary silver policy.'"}, {"text": "McKinley won because Bryan's Cross of Gold speech alienated moderate Democratic voters who were committed to the gold standard and refused to support a free-silver candidate", "isCorrect": false, "rationale": "The Cross of Gold speech won Bryan the Democratic nomination and energized his base. The problem for Bryan was not Democratic defection but his inability to win the industrial Northeast and Midwest, where McKinley's message about gold standard stability and tariff protection resonated with industrial workers."}, {"text": "The Populist Party's decision to nominate Bryan damaged his credibility among mainstream Democratic voters, who saw fusion as evidence that Bryan had abandoned the Democratic Party's traditions", "isCorrect": false, "rationale": "The fusion nomination damaged the Populist Party more than Bryan's Democratic standing. The source identifies the decisive factor as McKinley's appeal to urban industrial workers, not Democratic voter alienation from fusion."}]}, {"question": "The source argues that the Populist movement's defeat in 1896 was 'the defeat of a political coalition, not the defeat of an intellectual framework.' Which of the following BEST supports this interpretation?", "options": [{"text": "Bryan ran again as the Democratic presidential candidate in 1900 and 1908, demonstrating that the silver issue remained politically viable despite the 1896 defeat", "isCorrect": false, "rationale": "Bryan's subsequent candidacies don't support the 'intellectual framework' argument — they demonstrate the persistence of a political candidacy, not the adoption of the Populist policy framework by a broader coalition."}, {"text": "The core Populist demands — graduated income tax, direct election of senators, railroad regulation, banking reform — were enacted by Progressive Era administrations in the decade after the Populists' defeat, adopted by the urban middle-class coalition the Populists had failed to reach", "isCorrect": true, "rationale": "The source explicitly makes this argument: Populists 'had identified the problems correctly; they were simply a generation too early, before the urban middle class had experienced enough of the industrial system's costs to join the coalition they were trying to build.' The specific Populist demands enacted as the 16th and 17th Amendments, ICC strengthening, and Federal Reserve Act directly support the 'framework survived, coalition failed' argument."}, {"text": "Free silver was eventually adopted by the Federal Reserve as a tool for expanding the money supply during the economic crisis of 1907, vindicating the core Populist monetary demand", "isCorrect": false, "rationale": "Free silver was never adopted; the Federal Reserve Act (1913) created a managed currency system without free silver coinage. The Populist monetary framework was adopted in modified form (managed currency, easier credit), not in its literal silver-coinage demand."}, {"text": "The Populist Party survived the 1896 defeat and continued to elect candidates to Congress throughout the Progressive Era, demonstrating its organizational resilience", "isCorrect": false, "rationale": "The Populist Party 'disintegrated as an independent force after 1896' — the source explicitly states this. The Party's intellectual legacy survived through other parties and movements, not through the Populist Party itself."}]}, {"question": "The Farmers' Alliance developed a reputation for political education — its lecturers explaining structural economic causes to farm audiences across the Plains and South. Which of the following BEST explains the significance of this educational function?", "options": [{"text": "Alliance lecturers taught farm families to read and write, which dramatically increased rural literacy rates and enabled farmers to participate in the formal political process for the first time", "isCorrect": false, "rationale": "Alliance lecturers explained economic structural causes, not basic literacy. Most adult farm families in the Midwest and South were already literate in the Gilded Age. The Alliance's educational contribution was political economy, not literacy instruction."}, {"text": "By translating individual hardship into structural economic analysis — explaining how railroad monopolies, deflationary policy, and crop-lien systems operated against farmers collectively — Alliance lecturers transformed private suffering into political radicalism and laid the intellectual foundation for the Omaha Platform", "isCorrect": true, "rationale": "The source emphasizes that Alliance lecturers explained 'the structural causes of agricultural distress in remarkably sophisticated economic terms to audiences of farm families who were eager to understand why their situation kept getting worse despite their own hard work.' This transformation of individual experience into structural understanding was the intellectual foundation of Populism."}, {"text": "Alliance lecturers served primarily as recruitment agents for the Populist Party, using emotional appeals to party loyalty rather than economic analysis to build membership", "isCorrect": false, "rationale": "The source specifically describes Alliance lecturers as providing 'remarkably sophisticated economic terms' — emphasizing structural analysis, not emotional party loyalty appeals."}, {"text": "Alliance lecturers focused primarily on explaining the injustice of the Civil War tariff system, arguing that southern and Plains farmers were being taxed to subsidize northern industrial development", "isCorrect": false, "rationale": "While tariff policy was a Populist concern, the source describes Alliance lecturers as explaining the broader structural causes of agricultural distress — railroad rates, deflationary monetary policy, crop-lien debt — not primarily the tariff."}]}, {"question": "The fusion strategy — Populists nominating Bryan on the Democratic ticket in 1896 — proved 'fatal to the independent Populist movement.' Why?", "options": [{"text": "The Democratic National Convention rejected the Populist nomination of Bryan, forcing the Populists to run their own candidate who split the reform vote and delivered the election to McKinley", "isCorrect": false, "rationale": "The reverse occurred: the Democratic Convention nominated Bryan first; the Populists then made the 'painful strategic decision' to fuse by also nominating Bryan, subordinating their broader agenda to single-issue free silver within the Democratic coalition."}, {"text": "By subordinating their broader reform agenda to the single issue of free silver and becoming an appendage of the Democratic Party, the Populists surrendered the organizational independence that had been their greatest asset", "isCorrect": true, "rationale": "The source explicitly states this: 'by subordinating their broader reform agenda to the single issue of free silver, and by becoming an appendage of the Democratic Party, the Populists surrendered the organizational independence that had been their greatest asset.' After Bryan's defeat, the Populist Party had no independent organizational base to rebuild from."}, {"text": "Bryan's personal popularity among agrarian voters was so dominant that he absorbed the entire Populist identity, leaving no organizational space for the independent Populist platform after his defeat", "isCorrect": false, "rationale": "The problem was not Bryan's personal popularity but the organizational consequence of fusion: the Populists had given up their independent organizational infrastructure to join the Democratic coalition, leaving them with nothing to fall back on after the defeat."}, {"text": "The Populist Party's Southern members refused to support Bryan because he was a Northern candidate who had never experienced the crop-lien system that was central to Southern agrarian distress", "isCorrect": false, "rationale": "Bryan was from Nebraska, not truly a Northern candidate in the Populist coalition's geography. The fatal problem was the fusion strategy's organizational consequences, not Bryan's regional origin."}]}, {"question": "A historian describes the 1896 election as 'a contest over the political economy of industrial capitalism, staged through democratic institutions.' Which of the following BEST supports this characterization?", "options": [{"text": "Bryan and McKinley agreed on all major issues except currency — both supported high tariffs, railroad regulation, and federal land grants — making 1896 a referendum on a single economic policy question", "isCorrect": false, "rationale": "Bryan and McKinley differed substantially on tariffs (Bryan attacked them as consumer taxes), monetary policy, and labor relations — the election was a comprehensive contest over the political economy of industrial capitalism, not a single-issue referendum."}, {"text": "Bryan's coalition of Southern farmers, Plains debtors, and silver advocates represented those bearing the costs of industrial capitalism and deflation; McKinley's coalition of manufacturers, financiers, and industrial workers persuaded that gold and tariffs served their interests represented the system's beneficiaries — making the vote a choice about who bears industrial capitalism's costs", "isCorrect": true, "rationale": "The source explicitly describes these two coalitions: Bryan's — 'Southern farmers, Great Plains debtors, silver miners, and labor sympathizers…the producing classes who bore the costs of industrial concentration and deflationary monetary policy'; McKinley's — 'Eastern manufacturers, financiers, and the industrial workers whom Hanna successfully persuaded that their interests lay with a stable currency and high tariffs…the beneficiaries of the existing order.'"}, {"text": "The 1896 election was primarily about corruption: Bryan ran on a platform of anti-bossism and civil service reform, while McKinley represented the Gilded Age spoils system", "isCorrect": false, "rationale": "The 1896 election was about monetary policy (gold vs. silver) and the broader political economy — not primarily civil service reform or anti-corruption. Bryan's platform was about restructuring the economic system to benefit producers; McKinley's was about maintaining the existing gold-standard industrial order."}, {"text": "The 1896 election resulted in Bryan's victory, establishing the precedent that democratic majorities could override the financial establishment's preferences on monetary policy", "isCorrect": false, "rationale": "McKinley won 51% to Bryan's 47% and carried 271 electoral votes to Bryan's 176. The election did not produce a Bryan victory; it settled the monetary question in favor of the gold standard for a generation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
