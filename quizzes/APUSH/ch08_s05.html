<script>
var QUESTIONS = [{"question": "The Gulf of Tonkin Resolution (1964) is historically significant primarily because", "options": [{"text": "it was the first time Congress authorized the use of military force without evidence that an attack had occurred.", "isCorrect": false, "rationale": "While the second Gulf of Tonkin incident may not have occurred, Congress believed it had; the significance is about the breadth of authority granted and how Johnson used it, not that Congress knew it was acting on false premises."}, {"text": "Johnson used its broad authorization to escalate US military involvement to over 500,000 troops without a formal declaration of war, raising fundamental questions about the constitutional distribution of war powers.", "isCorrect": true, "rationale": "The resolution authorized 'all necessary measures' and Johnson used it as the functional equivalent of a declaration of war; by 1968, over 500,000 troops were in Vietnam without Congress ever formally declaring war — the constitutional war-powers question it raised was addressed (inadequately, critics argued) only by the War Powers Resolution of 1973."}, {"text": "it was the first time a president had committed American forces to combat in Asia without explicit congressional approval.", "isCorrect": false, "rationale": "Truman had committed forces in Korea (1950) without a formal declaration of war; the Gulf of Tonkin Resolution was actually broader than most precedents because Congress specifically authorized the use of force."}, {"text": "its passage demonstrated strong bipartisan opposition to American military involvement in Southeast Asia.", "isCorrect": false, "rationale": "The resolution passed 416-0 in the House and 88-2 in the Senate — overwhelming bipartisan support, not opposition."}], "id": "q01"}, {"question": "The attrition strategy pursued by General Westmoreland in Vietnam failed primarily because", "options": [{"text": "American troops refused to follow orders to engage the enemy in search-and-destroy operations.", "isCorrect": false, "rationale": "Military discipline problems emerged later in the war; early strategy failure was about the strategic logic of attrition itself, not troop refusal to fight."}, {"text": "the body-count metrics that the strategy depended on masked the enemy's capacity for replenishment, meaning American firepower could not inflict casualties at a rate that prevented North Vietnam from continuing the war.", "isCorrect": true, "rationale": "The source states the strategy 'failed' because 'body-count metrics masked the enemy's capacity for replenishment' — the enemy could absorb losses at a rate that American firepower could not sustain, making attrition logically self-defeating."}, {"text": "China intervened directly in the conflict as it had in Korea, forcing American commanders to adopt defensive positions.", "isCorrect": false, "rationale": "China did not directly intervene in Vietnam as it had in Korea; the Korean lesson actually shaped Vietnam strategy — commanders accepted limits specifically to avoid triggering Chinese intervention."}, {"text": "the South Vietnamese government was unwilling to allow American forces to conduct offensive operations against the Viet Cong.", "isCorrect": false, "rationale": "The South Vietnamese government supported American military operations; the strategic problem was the ineffectiveness of attrition strategy, not South Vietnamese restrictions on American operations."}], "id": "q02"}, {"question": "The Tet Offensive (January 1968) was a military defeat for the North Vietnamese and Viet Cong but a decisive psychological victory. This paradox is best explained by which of the following?", "options": [{"text": "The offensive destroyed the South Vietnamese will to fight, causing mass desertions from the ARVN.", "isCorrect": false, "rationale": "The source focuses on the American public's response to Tet, not South Vietnamese military collapse; the psychological impact was on American public opinion, not primarily on South Vietnamese morale."}, {"text": "The Johnson administration had publicly claimed the war was being won; Tet's scale demonstrated those claims were false, shattering public trust in official accounts of the war's progress.", "isCorrect": true, "rationale": "The source explicitly states that Johnson's administration 'had been publicly claiming the war was being won; Tet made those claims untenable' — the credibility gap between official optimism and the reality revealed by Tet was the decisive psychological blow."}, {"text": "Walter Cronkite's editorial declaration of stalemate caused American military commanders to request an immediate withdrawal of forces.", "isCorrect": false, "rationale": "Cronkite's declaration influenced public opinion and reportedly influenced Johnson's own assessment of where 'Middle America' stood, but it did not cause military commanders to request withdrawal."}, {"text": "The Viet Cong's ability to hold major South Vietnamese cities for several months demonstrated the failure of American pacification programs.", "isCorrect": false, "rationale": "The source states the offensive 'was militarily defeated: the attackers suffered enormous casualties and held no captured cities for long' — the Viet Cong did not hold cities for months."}], "id": "q03"}, {"question": "The Great Society's Medicare and Medicaid programs (1965) are historically significant primarily because", "options": [{"text": "they privatized the American healthcare system by replacing public hospital funding with insurance subsidies.", "isCorrect": false, "rationale": "Medicare and Medicaid were government programs that expanded public provision of healthcare — the opposite of privatization."}, {"text": "they established a permanent federal role in health insurance for the elderly and the poor, transforming healthcare access for those populations.", "isCorrect": true, "rationale": "The source states they 'transformed health care access for the elderly and the poor and established a permanent federal role in health insurance' — the institutional significance is the creation of a permanent federal healthcare commitment that subsequent administrations could modify but not eliminate."}, {"text": "they provided universal health insurance to all American citizens, making the US the first developed nation with a comprehensive national health system.", "isCorrect": false, "rationale": "Medicare and Medicaid targeted specific populations (elderly and low-income Americans), not all citizens; the US did not adopt universal health insurance in 1965."}, {"text": "they were funded entirely by payroll taxes, making them fiscally self-sustaining without requiring annual congressional appropriations.", "isCorrect": false, "rationale": "Medicare Part A is funded through payroll taxes, but Medicaid requires general revenue appropriations; and Medicare Part B and subsequent expansions require appropriations — the programs are not entirely self-financing."}], "id": "q04"}, {"question": "The Immigration and Nationality Act of 1965's most historically significant long-term consequence was", "options": [{"text": "its reduction of total immigration levels, which the Johnson administration intended to reduce labor market competition with American workers.", "isCorrect": false, "rationale": "The 1965 Act did not reduce immigration levels; by replacing national origin quotas with family reunification and skills-based criteria, it changed the sources of immigration rather than its volume, and eventually increased it."}, {"text": "its abolition of the National Origins Formula (1924) and replacement with family reunification and skills-based criteria, which dramatically shifted immigration sources toward Asia, Latin America, and Africa — transforming American demographics in ways its architects did not anticipate.", "isCorrect": true, "rationale": "The source explicitly states the act abolished the discriminatory National Origins Formula, replaced it with new criteria, 'dramatically changing the demographic sources of American immigration toward Asia, Latin America, and Africa,' and that 'the long-term demographic consequences were not anticipated.'"}, {"text": "its creation of an undocumented immigrant population by imposing numerical caps on Latin American immigration for the first time.", "isCorrect": false, "rationale": "While the 1965 Act did impose hemispheric caps, describing it primarily as creating undocumented immigration overstates one consequence while understating the act's broader demographic significance."}, {"text": "its explicit goal of transforming the United States into a multiracial democracy by deliberately recruiting immigrants from underrepresented regions.", "isCorrect": false, "rationale": "The source explicitly states that 'the long-term demographic consequences were not anticipated by the act's architects' — the transformation was an unintended consequence, not a deliberate goal."}], "id": "q05"}, {"question": "Second-wave feminism's political crystallization is best traced to", "options": [{"text": "the 1963 Equal Pay Act, which provided women with the legal framework to demand workplace equality for the first time.", "isCorrect": false, "rationale": "While the Equal Pay Act (1963) was an important legislative achievement, the source identifies Friedan's Feminine Mystique (also 1963) as the intellectual catalyst for political mobilization; the movement required both naming the problem (Friedan) and legal tools (Title VII, ERA) to organize around."}, {"text": "Betty Friedan's 1963 The Feminine Mystique, which named the 'problem that has no name' — the frustration of educated women confined to domestic roles — providing the political crystallization for second-wave feminism.", "isCorrect": true, "rationale": "The source states the feminist movement's political crystallization 'came with Betty Friedan's 1963 The Feminine Mystique, which named the problem that has no name — the frustration of educated women confined to domestic roles.'"}, {"text": "the Supreme Court's Roe v. Wade decision (1973), which unified previously fragmented women's organizations around abortion rights.", "isCorrect": false, "rationale": "Roe v. Wade (1973) came a decade after the movement's crystallization; Friedan and NOW were already organized when Roe was decided. The abortion question both united and divided feminist organizations rather than unifying them."}, {"text": "the SNCC's 1964 position paper on women's status within civil rights organizations, which catalyzed White women's awareness of their own subordination.", "isCorrect": false, "rationale": "This references a real historical moment, but the source identifies Friedan's Feminine Mystique as the political crystallization, not the SNCC internal debate; the latter was one influence, not the primary catalyst."}], "id": "q06"}, {"question": "SOURCING: Betty Friedan's The Feminine Mystique (1963) has been criticized by feminist scholars (notably bell hooks) for which limitation?", "options": [{"text": "Its argument was too radical for mainstream American women, who rejected its analysis and instead embraced the domestic role the book criticized.", "isCorrect": false, "rationale": "The Feminine Mystique was a bestseller that resonated widely; the criticism of the book was not that it was too radical for its audience but that its audience was too narrow."}, {"text": "Its audience was educated white middle-class women, excluding working-class women and women of color who had never had the luxury of choosing domesticity — limiting the movement it helped launch.", "isCorrect": true, "rationale": "The source explicitly notes this limitation: 'Critics, notably bell hooks, have noted that this audience excluded working-class women and women of color who had never had the luxury of choosing domesticity.' Friedan's diagnosis of suburban domestic confinement assumed a specific class and racial position."}, {"text": "It failed to mention the legal mechanisms through which women could challenge workplace discrimination.", "isCorrect": false, "rationale": "Friedan's book was a diagnostic cultural critique of the 'problem that has no name'; its role was to name the problem, not to specify legal remedies — the omission of legal mechanisms was not the basis of critics' concerns."}, {"text": "It overemphasized the role of men in perpetuating women's subordination, alienating potential male allies in the feminist movement.", "isCorrect": false, "rationale": "The feminist critique by hooks and others focused on Friedan's class and racial exclusions, not on her analysis of male power; this option misrepresents the nature of the scholarly critique."}], "id": "q07"}, {"question": "The Stonewall uprising (June 1969) is historically significant primarily because", "options": [{"text": "it was the first time gay and lesbian Americans had organized politically in the United States.", "isCorrect": false, "rationale": "Earlier organizations (Mattachine Society, Daughters of Bilitis) had organized since the 1950s; Stonewall was significant as a turning point toward mass public activism, not as the first gay organizing effort."}, {"text": "it launched the modern gay rights movement by demonstrating that resistance to police harassment of gay people could catalyze sustained political organizing.", "isCorrect": true, "rationale": "The source states the Stonewall uprising 'launched the modern gay rights movement' — the resistance to a police raid on the Stonewall Inn in Greenwich Village marked the beginning of a sustained, public gay rights movement."}, {"text": "it produced a Supreme Court ruling that criminalization of homosexual conduct violated the Fourteenth Amendment.", "isCorrect": false, "rationale": "The Supreme Court did not immediately intervene following Stonewall; the Stonewall uprising was a street confrontation, not a legal case; Lawrence v. Texas (2003) ultimately struck down sodomy laws."}, {"text": "it united the women's movement and the gay rights movement into a single coalition that lobbied Congress for anti-discrimination protections.", "isCorrect": false, "rationale": "Stonewall launched the modern gay rights movement as a distinct movement; it did not immediately create a unified coalition with the women's movement, though connections between feminist and gay rights organizing developed over time."}], "id": "q08"}, {"question": "The fracturing of the liberal consensus by 1968 was driven by which combination of forces identified in the source?", "options": [{"text": "The Republican Party's mobilization of the religious right, the economic recession of 1968, and the conservative resurgence in the South.", "isCorrect": false, "rationale": "The religious right as a organized political force was not yet mobilized in 1968; the economic recession and the Moral Majority are associated with the late 1970s, not 1968 specifically."}, {"text": "Vietnam (consuming resources and moral credibility), the urban uprisings (frightening white working-class Democrats), and the rights movements' demands for substantive equality (pushing liberalism beyond what its coalition would accept).", "isCorrect": true, "rationale": "The source explicitly identifies these three forces as driving the collapse of postwar liberal consensus: Vietnam consumed resources and moral authority; urban uprisings frightened the white working-class Democratic base; and rights movements pushed demands beyond what the majority coalition was willing to accept."}, {"text": "Johnson's personal unpopularity, the failure of Great Society programs to reduce poverty, and the 1968 assassination of Robert Kennedy.", "isCorrect": false, "rationale": "While all three events were real, the source's analysis of liberal collapse emphasizes structural forces (Vietnam, urban uprisings, rights movement demands) rather than personality factors or specific political events."}, {"text": "Economic stagflation, the oil embargo, and the Watergate scandal's erosion of public trust in government.", "isCorrect": false, "rationale": "These are causes from the 1970s that contributed to the conservative opening described in Section 6; the liberal consensus fracture of 1968 was driven by the forces listed in the source."}], "id": "q09"}, {"question": "The United Farm Workers (UFW) grape boycott (1965–70) is historically significant as an example of", "options": [{"text": "an exclusively California phenomenon that had no broader implications for national labor organizing.", "isCorrect": false, "rationale": "The boycott was national — consumers across the country were asked not to buy California grapes. Its success demonstrated that consumer boycott tactics could extend labor organizing power beyond the workplace."}, {"text": "how the civil rights movement's rights language and organizing tactics were adopted by Chicano farm workers to win labor rights for agricultural workers — among the most exploited in the country.", "isCorrect": true, "rationale": "The source connects the UFW to the broader rights revolution that the civil rights movement enabled, noting that Cesar Chavez and Dolores Huerta 'founded the United Farm Workers (UFW) in 1962 and led a successful nationwide grape boycott to win union contracts for agricultural laborers — among the most exploited workers in the country.'"}, {"text": "the failure of labor organizing strategies when applied outside the industrial manufacturing sector.", "isCorrect": false, "rationale": "The grape boycott succeeded in winning union contracts for farmworkers — it was a demonstrable success, not a failure."}, {"text": "the Johnson administration's support for agricultural labor organizing as part of the Great Society's War on Poverty.", "isCorrect": false, "rationale": "The UFW's organizing was independent of direct federal government support; the administration's relationship with the UFW was not one of active sponsorship."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
