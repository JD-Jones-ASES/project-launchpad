<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Encomienda, Casta, and the Las Casas–Sepúlveda Debate</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The encomienda system was described in theory as a 'reciprocal arrangement grounded in paternalistic duty.' Read the following description of conditions at Potosí's silver mines: 'The mercury amalgamation process... exposed workers to toxic mercury vapor and collapsed their lungs; indigenous miners at Potosí had a life expectancy measurable in months.' What does this evidence MOST directly reveal about the gap between the encomienda's stated purpose and its actual function?", "options": [{"text": "That the encomienda succeeded in its stated goal of Christianizing indigenous workers, even if living conditions were harsh.", "isCorrect": false, "rationale": "The source notes that encomienda mortality rates were so high that the system 'accelerated the very demographic collapse they depended on for their labor supply' — conditions that made any sustained Christianization program impossible and directly violated the system's stated protective purpose."}, {"text": "That the encomienda's paternalistic stated purpose was contradicted by a practice of murderous forced labor in which indigenous workers were exposed to lethal conditions, with life expectancy measurable in months — revealing a system designed to extract maximum labor regardless of survival.", "isCorrect": true, "rationale": "The source explicitly states the encomienda 'was forced labor of a particularly brutal variety' and that encomenderos 'worked indigenous laborers in mines and on agricultural estates with little regard for survival' — directly contrasting the theory of reciprocal Christianization with a lethal extractive reality."}, {"text": "That the encomienda was designed primarily as a missionary program that only incidentally involved labor extraction.", "isCorrect": false, "rationale": "The source describes the encomienda as 'the foundational labor institution of the early Spanish colonial economy' — labor extraction was its primary function; Christianization was the ideological justification that masked coercive labor practices."}, {"text": "That the Spanish crown closely supervised the encomienda to prevent abuses, but colonial administrators subverted these efforts.", "isCorrect": false, "rationale": "The source describes the crown's response as being forced to act only when the system threatened to destroy its own labor supply — not close supervision preventing abuse, but reactive intervention after the contradiction became economically unsustainable."}], "id": "q01"}, {"question": "The source describes the casta system as 'not an accurate description of social reality' but 'a powerful ideological instrument for organizing inequality.' Which of the following BEST explains this distinction?", "options": [{"text": "The casta system accurately reflected genetic differences between racial groups but was applied inconsistently in practice.", "isCorrect": false, "rationale": "The source explicitly rejects any suggestion that the casta system reflected actual biological categories; it was an ideological and administrative construction that 'organized inequality' — not a description of genetic reality."}, {"text": "The casta system's rigid racial categories were an administrative and ideological construct that colonial society was too fluid and contested to reflect accurately — but the system's legal force in assigning tax obligations, occupational restrictions, and social standing made it a real instrument of power regardless of its inaccuracy.", "isCorrect": true, "rationale": "The source states directly: 'The casta system was not an accurate description of social reality — actual colonial society was far more fluid and contested — but it was a powerful ideological instrument for organizing inequality.' The system's power derived from legal force, not descriptive accuracy."}, {"text": "The casta system was accurate in theory but was only applied to the poorest segments of colonial society, leaving elites to self-identify without legal restrictions.", "isCorrect": false, "rationale": "The source describes the casta hierarchy from peninsulares at the top to enslaved Africans at the bottom — it applied to all social levels, with legal disabilities and privileges attached at every tier, not only to the poor."}, {"text": "The casta system reflected indigenous social hierarchies that the Spanish adopted rather than invented, making it a fusion of European and indigenous organizing principles.", "isCorrect": false, "rationale": "The source attributes the casta system to Spanish colonial elaboration in response to demographic complexity — the crown 'responded by elaborating an intricate racial classification system' — not to adoption of indigenous hierarchies."}], "id": "q02"}, {"question": "Read the following excerpt from Bartolomé de Las Casas's Brief Account (1542): 'The Christians, with their horses and swords and lances, began to slaughter and practice strange cruelty among them... They took infants from their mothers' breasts, snatching them by the legs and pitching them headfirst against the crags.' Using the HAPP framework, what was the PRIMARY purpose of this graphic violence in Las Casas's account?", "options": [{"text": "To provide a neutral, objective historical record of Spanish atrocities for future historians to study.", "isCorrect": false, "rationale": "The source explicitly identifies Las Casas's purpose as 'unambiguously political' — he was not writing neutral history but crafting a political argument. The graphic violence was 'deliberate' — designed to shock the king and his advisors into confronting the reality of conquest."}, {"text": "To demonstrate Las Casas's personal sympathy for indigenous peoples by displaying his emotional sensitivity to their suffering.", "isCorrect": false, "rationale": "While Las Casas expressed moral outrage, the source identifies his purpose as political lobbying — he 'wanted to force the king and his advisors to confront what was being done in the name of the Spanish crown' — not personal emotional expression."}, {"text": "To exert political pressure on the Spanish crown to abolish the encomienda by forcing the king to confront the violence being committed in his name — the graphic descriptions were a deliberate rhetorical strategy, not mere reportage.", "isCorrect": true, "rationale": "The source states: 'His purpose was not description for its own sake but political pressure... The graphic violence of the descriptions was deliberate — he wanted to force the king and his advisors to confront what was being done in the name of the Spanish crown.'"}, {"text": "To provide evidence for prosecuting individual encomenderos in Spanish courts for specific crimes against indigenous peoples.", "isCorrect": false, "rationale": "Las Casas addressed his work to the king, targeting the system of encomienda as an institution — not specific criminal prosecutions of individual colonizers. His goal was systemic reform through royal decree."}], "id": "q03"}, {"question": "Juan Ginés de Sepúlveda argued that indigenous peoples were 'natural slaves' in the Aristotelian sense. Which of the following BEST describes how Las Casas countered this specific argument?", "options": [{"text": "Las Casas agreed that some indigenous peoples were natural slaves but argued that Spanish conquistadores had exceeded their authority in enslaving peaceful tribes.", "isCorrect": false, "rationale": "Las Casas rejected the natural slave argument entirely. The source states he argued 'from natural law that all human beings possessed rational souls and the capacity for reason, regardless of their cultural practices' — denying the philosophical premise, not merely limiting its application."}, {"text": "Las Casas countered that natural law affirmed all human beings possessed rational souls and the capacity for reason regardless of cultural practices; that indigenous cultures exhibited sophisticated social and political organization; and that peaceful persuasion, not conquest, was the only legitimate means of conversion.", "isCorrect": true, "rationale": "The source explicitly lists these as Las Casas's counter-arguments: natural law guaranteeing rational souls to all humans; indigenous cultural sophistication refuting 'barbarism'; and peaceful missionary persuasion as the only legitimate conversion method — each directly answering Sepúlveda's four claims."}, {"text": "Las Casas argued that the Aristotelian category of 'natural slave' was valid but that Europeans themselves were the true natural slaves because they lacked the physical endurance of indigenous peoples.", "isCorrect": false, "rationale": "Las Casas did not invert the natural slave argument; he rejected the entire category as applicable to any human being — grounding his argument in natural law and universal human rationality, not in reassigning the category to Europeans."}, {"text": "Las Casas conceded that conquest was morally legitimate but argued that the specific methods used by Cortés and Pizarro violated Church law and should be prosecuted.", "isCorrect": false, "rationale": "The source describes Las Casas as opposing the very premise of conquest by military force, not merely its methods in specific cases — he argued for 'peaceful missionary conversion' as the only legitimate model, not for a better-supervised military conquest."}], "id": "q04"}, {"question": "The source describes the casta hierarchy: peninsulares → criollos → mestizos/mulattoes → indigenous and enslaved Africans. A student notes that criollos 'could hold significant wealth but were formally excluded from the highest royal offices.' How did this exclusion contribute to later historical developments?", "options": [{"text": "It led criollos to ally with enslaved Africans to overthrow the Spanish colonial system in the seventeenth century.", "isCorrect": false, "rationale": "The source notes that criollo exclusion from royal offices was 'a grievance that would eventually fuel the independence movements of the nineteenth century' — not a seventeenth-century alliance with enslaved Africans."}, {"text": "Criollo exclusion from the highest royal offices created a class of wealthy, educated, American-born elites who felt politically marginalized by colonial institutions — a grievance that would eventually fuel nineteenth-century independence movements across Latin America.", "isCorrect": true, "rationale": "The source explicitly states that criollo exclusion from 'the highest royal offices' was 'a grievance that would eventually fuel the independence movements of the nineteenth century' — directly connecting this colonial-era structural discrimination to later revolutionary politics."}, {"text": "Criollo resentment drove them to seek alliance with the British Empire, resulting in English colonization of Spanish America.", "isCorrect": false, "rationale": "The source identifies criollo grievances as a driver of independence movements — which were anti-colonial, not pro-British. British colonization of Spanish America is a different historical process not described in this source."}, {"text": "The exclusion had no lasting political consequences because criollos were able to purchase their way into royal appointments through bribery.", "isCorrect": false, "rationale": "The source specifically identifies the exclusion as generating a lasting 'grievance that would eventually fuel the independence movements of the nineteenth century' — treating it as historically consequential, not easily circumvented."}], "id": "q05"}, {"question": "The source notes that Las Casas 'had himself been an encomendero before his conversion to indigenous advocacy.' How does this biographical detail affect the analysis of his Brief Account as a historical source?", "options": [{"text": "It invalidates his testimony entirely because an encomendero would have financial incentives to exaggerate Spanish violence.", "isCorrect": false, "rationale": "The source presents Las Casas's prior encomendero status as giving his testimony 'the authority of eyewitness experience' — strengthening, not invalidating, his credibility as a witness to the conditions he describes."}, {"text": "It strengthens his credibility as an eyewitness while simultaneously revealing the limits of his perspective: his goal was indigenous Christianization, not indigenous sovereignty — he questioned the methods of conquest, not Spain's right to colonize.", "isCorrect": true, "rationale": "The source makes both points explicitly: 'His testimony about Spanish atrocities was the testimony of an eyewitness' (strengthening credibility); and 'his point of view remained that of a European Dominican friar whose ultimate goal was indigenous Christianization, not indigenous sovereignty. He did not question Spain's right to colonize the Americas; he questioned the methods.'"}, {"text": "It proves that all encomenderos eventually came to oppose the encomienda system, suggesting the system was self-correcting over time.", "isCorrect": false, "rationale": "Las Casas's individual conversion is presented as exceptional and morally remarkable — not as evidence that encomenderos typically developed indigenous advocacy positions. His trajectory 'embodied the moral contradiction at the heart of Spanish colonialism.'"}, {"text": "His conversion to Dominican friar means his testimony should be evaluated as religious propaganda rather than historical evidence.", "isCorrect": false, "rationale": "The source treats Las Casas's account as a primary source with real evidentiary value precisely because of his eyewitness standing — while also noting his point of view was shaped by his goals as a friar, which historians must account for in analysis."}], "id": "q06"}, {"question": "The Valladolid Debate (1550–1551) is described as 'the first formal governmental proceeding in any colonial empire in which the rights of colonized people were seriously debated.' Which of the following BEST explains why this characterization is historically significant even though the debate produced no resolution?", "options": [{"text": "Because the debate resulted in the immediate abolition of the encomienda system and the release of all indigenous workers from forced labor.", "isCorrect": false, "rationale": "The source explicitly states 'the debate did not end the conquest' and that Las Casas's legal reforms were 'circumvented by colonial realities' — no abolition resulted from the debate. Its significance lies elsewhere."}, {"text": "Because it demonstrates that the Spanish empire was uniquely virtuous compared to other colonial empires, since only Spain was willing to debate the rights of colonized peoples.", "isCorrect": false, "rationale": "The source does not characterize Spain as uniquely virtuous; it notes the significance of the arguments being made at all within the institutional structure of a conquering power, while documenting that those arguments were ultimately overridden by colonial economic interests."}, {"text": "Because the debate produced arguments for natural human equality that survived within the institutional record of the conquering power — available to be read, cited, and built upon by later generations arguing against slavery and colonialism, even though the conquest itself continued.", "isCorrect": true, "rationale": "The source states: 'it produced arguments for natural human equality that would echo in later centuries' and notes 'the significance... lies not in its resolution — there was none — but in the fact that arguments for indigenous humanity were made at all within the institutional structure of the conquering power, and that those arguments survived to be read, cited, and built upon by later generations.'"}, {"text": "Because the fourteen theologians who served as judges unanimously ruled in Las Casas's favor, legally ending the natural slave argument within Spanish colonial law.", "isCorrect": false, "rationale": "The source states 'neither man was declared the winner' — the judges issued no ruling declaring a victor, and the conquest continued. The debate's significance is in the arguments made, not a legal ruling in Las Casas's favor."}], "id": "q07"}, {"question": "Examine the following scenario: A colonial official in 1560s New Spain must classify a child born to a mestizo father and a Spanish-born mother. The casta system would classify this child as a castizo. The official notes privately that the family 'acts entirely Spanish in every respect.' Based on the source, what does this scenario BEST illustrate about the casta system?", "options": [{"text": "That the casta system was fundamentally accurate and that the official's private observation merely confirmed the accuracy of the racial classification.", "isCorrect": false, "rationale": "The source explicitly states that 'actual colonial society was far more fluid and contested' than the casta system's rigid categories — the official's observation illustrates this fluidity, not the system's accuracy."}, {"text": "That the casta system's rigid legal categories imposed classifications that did not necessarily reflect lived social reality — illustrating the gap between the colonial racial taxonomy and the 'fluid and contested' actual social world it attempted to govern.", "isCorrect": true, "rationale": "The source states directly that 'The casta system was not an accurate description of social reality — actual colonial society was far more fluid and contested.' The official's private observation — that a legally classified castizo 'acts entirely Spanish' — is precisely the kind of social reality the casta taxonomy failed to capture."}, {"text": "That Spanish colonial officials were universally hostile to the casta system and worked to undermine it from within the colonial bureaucracy.", "isCorrect": false, "rationale": "The scenario describes one official's private observation — not a systematic bureaucratic resistance to the casta system. The source describes the system as a 'powerful ideological instrument' that functioned at the structural level regardless of individual ambivalence."}, {"text": "That the casta system was only applied in Mexico and did not extend to the Andes or the Caribbean, where social classification was more flexible.", "isCorrect": false, "rationale": "The source describes the casta system as a broad colonial institution, not one limited to Mexico. The Caribbean was actually the first site of Spanish colonization and the encomienda system from which colonial racial hierarchy developed."}], "id": "q08"}, {"question": "The repartimiento succeeded the encomienda as indigenous populations collapsed. Which of the following BEST describes the change that the repartimiento represented?", "options": [{"text": "A fundamental reform that abolished coerced indigenous labor and replaced it with a voluntary wage-labor system.", "isCorrect": false, "rationale": "The source describes the repartimiento as 'distribut[ing] the labor burden more broadly but preserv[ing] its coercive character' — it reformed the organizational structure without abolishing coercion, which remained central."}, {"text": "The end of indigenous labor in mining, replaced by enslaved African workers in all major mines.", "isCorrect": false, "rationale": "The source describes enslaved Africans as partially replacing indigenous workers in some sectors, but the repartimiento specifically continued indigenous labor in mining — the mita system in the Andes used repartimiento-style labor drafts in silver mines."}, {"text": "A system in which colonial officials drafted rotating cohorts of indigenous workers for specific projects — distributing the labor burden more broadly than the encomienda while preserving its coercive character.", "isCorrect": true, "rationale": "The source explicitly defines the repartimiento this way: 'a system in which colonial officials drafted rotating cohorts of indigenous workers for specific projects, especially mining. The repartimiento distributed the labor burden more broadly but preserved its coercive character.'"}, {"text": "A reform imposed by the New Laws of 1542 that completely abolished forced indigenous labor throughout the Spanish colonial system.", "isCorrect": false, "rationale": "The New Laws theoretically prohibited new encomiendas but did not abolish forced labor; the repartimiento emerged as the encomienda's evolution, and 'formal indigenous slavery, never entirely abolished in practice, continued in various disguised forms throughout the colonial period.'"}], "id": "q09"}, {"question": "The source identifies a 'contradiction' at the heart of the Spanish colonial project: 'the Spanish colonial project depended simultaneously on the labor and the Christianization of indigenous people, yet the conditions of that labor made Christianization impossible and accelerated the demographic collapse that threatened the labor supply itself.' Which of the following BEST illustrates this contradiction in practice?", "options": [{"text": "Spanish missionaries converted large numbers of indigenous people to Christianity, providing a stable and contented workforce for colonial mines and estates.", "isCorrect": false, "rationale": "The source describes the exact opposite: encomienda conditions were 'forced labor of a particularly brutal variety' with life expectancy 'measurable in months' — conditions incompatible with sustained religious instruction or a stable, contented workforce."}, {"text": "Encomenderos worked indigenous laborers at Potosí with life expectancies measurable in months — conditions that killed the very people the system needed for labor AND that violated the Christianization obligation that legally justified the grant — accelerating the demographic collapse that threatened the entire colonial economy.", "isCorrect": true, "rationale": "The source describes exactly this: mortality from toxic mercury exposure gave miners 'a life expectancy measurable in months'; 'mortality rates were so high that encomiendas accelerated the very demographic collapse they depended on for their labor supply — a contradiction that the system's defenders could not resolve.'"}, {"text": "The Spanish crown resolved the contradiction by importing enough enslaved Africans to replace indigenous populations, stabilizing the colonial economy by 1540.", "isCorrect": false, "rationale": "The source describes an ongoing contradiction that 'the system's defenders could not resolve' — not a resolution through African slavery by 1540. The import of enslaved Africans partially addressed the labor gap but did not resolve the fundamental contradiction."}, {"text": "Las Casas resolved the contradiction by convincing the Spanish crown to adopt a peaceful missionary model that eliminated both encomienda labor and demographic collapse.", "isCorrect": false, "rationale": "The source states Las Casas 'died in 1566 having seen most of his legal reforms circumvented by colonial realities' — the contradiction was not resolved during his lifetime or through his advocacy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
