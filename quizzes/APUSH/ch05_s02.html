        <div class="subtitle">AP United States History &mdash; The Collapse of Compromise</div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The Compromise of 1850 included five separate measures. Which provision proved MOST destructive to Northern public opinion and why?", "options": [{"text": "California's admission as a free state, because it permanently broke the Senate balance between free and slave states.", "isCorrect": false, "rationale": "California's admission as a free state was actually what the free-state North wanted; it was a concession extracted from the South in exchange for the other provisions, including the strengthened Fugitive Slave Act."}, {"text": "The application of popular sovereignty to New Mexico and Utah territories, because Northerners believed only Congress had the right to decide the slavery question.", "isCorrect": false, "rationale": "While popular sovereignty was controversial in constitutional terms, the source identifies the Fugitive Slave Act — not popular sovereignty — as 'the compromise's fatal weakness in Northern public opinion.'"}, {"text": "The strengthened Fugitive Slave Act, which required Northern citizens to assist in capturing alleged fugitives and denied accused persons the right to testify on their own behalf.", "isCorrect": true, "rationale": "The source explicitly identifies the Fugitive Slave Act as 'the compromise's fatal weakness in Northern public opinion,' explaining that it required Northern citizens to act as agents of the slave system under penalty of fine and imprisonment — a direct imposition on Northerners who opposed slavery."}, {"text": "The abolition of the slave trade in the District of Columbia, because Southern senators believed it was an unconstitutional interference with property rights.", "isCorrect": false, "rationale": "The DC slave trade abolition was a concession to Northerners, not a source of Northern outrage; Southern senators did object to it but the source identifies Northern reaction to the Fugitive Slave Act as the compromise's fatal weakness."}]}, {"question": "Read the following description: 'Federal commissioners adjudicating fugitive slave cases were paid $10 for ruling a captured person was enslaved but only $5 for ruling they were free. The accused person had no right to testify on their own behalf.' Based on this description, which historical interpretation is BEST supported?", "options": [{"text": "The Fugitive Slave Act was a carefully balanced compromise that protected the rights of both slaveholders and accused fugitives.", "isCorrect": false, "rationale": "The fee differential and the denial of the right to testify demonstrate structural bias toward the slaveholder's claim; the description supports the conclusion that the law was structurally designed to produce rulings of enslavement, not balance competing rights."}, {"text": "The Fugitive Slave Act's structural design — monetary incentives favoring findings of enslavement and denial of testimony rights — made it an instrument of the slave system that imposed obligations on Northerners.", "isCorrect": true, "rationale": "The $10/$5 fee differential is direct evidence of structural bias, and the denial of testimony rights removed the most basic procedural protection. The source explicitly calls the Act 'a declaration that Northerners who opposed slavery were legally obligated to act as agents of the slave system.'"}, {"text": "The differential fee structure was a minor procedural flaw that Congress corrected before the law took effect.", "isCorrect": false, "rationale": "The fee structure was not corrected; it remained a feature of the Act throughout its operation and became one of the most cited grievances in Northern anti-slavery literature, including Harriet Beecher Stowe's Uncle Tom's Cabin."}, {"text": "Northern states immediately nullified the Fugitive Slave Act by passing personal liberty laws, rendering it unenforceable.", "isCorrect": false, "rationale": "While some Northern states did pass personal liberty laws restricting state cooperation with federal fugitive slave enforcement, this happened over time and was not immediate universal nullification; the Act sparked both legal challenges and extralegal resistance, but Northern resistance was 'sometimes violent' rather than uniformly nullifying."}]}, {"question": "Popular sovereignty was proposed as a democratic solution to the territorial slavery question. What was its 'fundamental ambiguity' that made it politically unworkable?", "options": [{"text": "It was unclear whether territorial delegates had the legal authority to ratify a state constitution without congressional approval.", "isCorrect": false, "rationale": "The constitutional process for state admission did require congressional approval, but that was not the ambiguity at the heart of popular sovereignty's failure; the source identifies the timing question — when residents could vote on slavery — as the fatal uncertainty."}, {"text": "It was unclear whether the doctrine required a simple majority or a supermajority of territorial residents to decide the slavery question.", "isCorrect": false, "rationale": "The source does not identify the required vote threshold as the ambiguity; it identifies the timing question — at what stage of territorial development could residents vote — as the core problem."}, {"text": "It was unclear at what stage of territorial development residents could vote on slavery — before or only after drafting a state constitution — making the doctrine exploitable by both sides.", "isCorrect": true, "rationale": "The source explicitly identifies this as popular sovereignty's 'fundamental ambiguity': 'at what stage of territorial development could residents vote on slavery? before drafting a state constitution, or only then?' Douglas argued one interpretation; Southern Democrats argued another — and the Kansas crisis made it a battlefield rather than a ballot question."}, {"text": "It was unclear whether popular sovereignty applied to slavery already existing in a territory or only to slavery newly introduced after territorial organization.", "isCorrect": false, "rationale": "The distinction between pre-existing and newly introduced slavery was less central to the debate than the timing question the source identifies; the major confrontation was over whether a territorial legislature (before constitutional convention) could ban slavery."}]}, {"question": "Stephen Douglas's Kansas-Nebraska Act (1854) had a specific practical motivation beyond the slavery question. What was it, and why did it require Southern support?", "options": [{"text": "Douglas wanted to organize the unincorporated Louisiana Purchase territory to secure a transcontinental railroad route through Chicago, and needed Southern votes to pass the organizing legislation.", "isCorrect": true, "rationale": "The source states precisely this: Douglas 'sought to organize the remaining unorganized territory of the Louisiana Purchase to secure a route for his desired transcontinental railroad through Chicago' and offered the repeal of the Missouri Compromise and popular sovereignty 'to win Southern support for the organizing legislation.'"}, {"text": "Douglas wanted to create new states quickly to dilute Southern Senate power before the 1856 election.", "isCorrect": false, "rationale": "This reverses the logic; Douglas needed Southern support, which means he had no interest in diluting Southern power. The bill's concessions to the South — repealing the Missouri Compromise — were designed to attract, not alienate, Southern votes."}, {"text": "Douglas was responding to the Supreme Court's ruling that Congress lacked authority to organize territories without explicit constitutional authorization.", "isCorrect": false, "rationale": "No such Supreme Court ruling preceded the Kansas-Nebraska Act; the Dred Scott decision (1857) came after the Act, not before it. Douglas's motivation was railroad politics and territorial organization, not judicial compliance."}, {"text": "Douglas sought to resolve the Bleeding Kansas crisis by replacing territorial governments with a congressional commission.", "isCorrect": false, "rationale": "Bleeding Kansas was a consequence of the Kansas-Nebraska Act, not a preceding crisis that motivated it; the violence in Kansas resulted from the Act's passage and the ambiguous operation of popular sovereignty, not the other way around."}]}, {"question": "The caning of Charles Sumner on the Senate floor (May 1856) and its aftermath revealed something significant about how North and South interpreted the event. What did their contrasting reactions demonstrate?", "options": [{"text": "That Southern politicians had lost control of their representatives, while Northern politicians were effectively managing their response to the violence.", "isCorrect": false, "rationale": "The source does not frame the reactions in terms of political management; it uses the contrasting reactions to illustrate that the two sections had developed incompatible moral frameworks for interpreting the same events."}, {"text": "That Congress was unable to maintain order in its own chambers, requiring the Army to restore discipline in Washington.", "isCorrect": false, "rationale": "No military intervention was required; the caning was treated by the South as a legitimate response to Sumner's speech and by the North as an outrage — the divergence in interpretation, not the need for external enforcement, is what the source emphasizes."}, {"text": "That the two sections had fundamentally incompatible moral frameworks: Brooks was lionized in the South as a defender of honor; Sumner's empty chair became a Northern symbol of Southern brutality.", "isCorrect": true, "rationale": "The source explicitly states: 'Brooks was lionized in the South; Sumner's empty chair, left vacant for three years as a symbol of the assault, became a Republican rallying image.' The same event was interpreted as honor vindicated in the South and as barbaric assault in the North — demonstrating that the sections were 'living in separate moral universes.'"}, {"text": "That individual acts of political violence had no long-term impact on sectional relations because the parties were already committed to compromise.", "isCorrect": false, "rationale": "The source treats the caning as a significant escalation of sectional tension, not an isolated incident without impact; it contributed to the Republican Party's mobilization and the intensification of anti-slavery sentiment in the North."}]}, {"question": "The Republican Party was founded in 1854 from the wreckage of the Kansas-Nebraska Act. Which of the following BEST describes the Republican Party's position at its founding?", "options": [{"text": "Immediate abolition of slavery throughout the United States, including in the existing slave states.", "isCorrect": false, "rationale": "The source is explicit: 'It was not, in 1854, an abolitionist party; most Republicans accepted slavery where it already existed. But on the question of expansion, they were uncompromising.' Conflating free soil with abolitionism is a common error the AP exam tests."}, {"text": "Opposition to the extension of slavery into any new territories, while generally accepting its continued existence where it already was.", "isCorrect": true, "rationale": "The source states: 'The new party... organized around a single, unifying principle: slavery must not expand into the territories. It was not, in 1854, an abolitionist party; most Republicans accepted slavery where it already existed.'"}, {"text": "Popular sovereignty for all territories, with Congress to ratify the decisions made by territorial residents.", "isCorrect": false, "rationale": "Popular sovereignty was the Douglas/Democratic position that Republicans specifically opposed; the Republican position was that Congress had the power and obligation to exclude slavery from the territories, not to defer to territorial residents."}, {"text": "Repeal of the Fugitive Slave Act and compensation for formerly enslaved people who had escaped to the North.", "isCorrect": false, "rationale": "While many Republicans opposed the Fugitive Slave Act, the party's defining, unifying principle at its founding was non-extension of slavery in the territories, not the specific agenda of Fugitive Slave Act repeal or compensation."}]}, {"question": "Historians identify a structural flaw shared by all three major antebellum compromises on territorial slavery — the Missouri Compromise (1820), the Compromise of 1850, and the Kansas-Nebraska Act (1854). What was that shared flaw?", "options": [{"text": "Each compromise was secretly negotiated without congressional debate, so it lacked democratic legitimacy from the start.", "isCorrect": false, "rationale": "All three compromises involved extensive congressional debate; the flaw identified by the source is substantive, not procedural."}, {"text": "Each compromise substituted procedural formulas for a substantive resolution, postponing rather than answering whether slavery would expand — ensuring the question would return with greater force.", "isCorrect": true, "rationale": "The source's KEY CONCEPT states: 'each postponed rather than resolved the underlying question by substituting procedural formulas (a geographic line; popular sovereignty; another geographic reset) for a substantive answer.' The Kansas-Nebraska Act's collapse into Bleeding Kansas made the pattern undeniable."}, {"text": "Each compromise was declared unconstitutional by the Supreme Court within five years of passage.", "isCorrect": false, "rationale": "The Supreme Court did not strike down the Missouri Compromise or the Compromise of 1850 at the time; the Dred Scott decision (1857) declared the Missouri Compromise unconstitutional retroactively, but this was not a pattern of immediate judicial invalidation."}, {"text": "Each compromise was constructed by Southern politicians to protect slavery's expansion and was never genuinely acceptable to Northern representatives.", "isCorrect": false, "rationale": "Northern politicians, including Henry Clay, Stephen Douglas, and Daniel Webster, were centrally involved in engineering the compromises; calling them Southern constructs misrepresents the political dynamics. The source frames the flaw as structural — about postponement vs. resolution — not as a Southern political plot."}]}, {"question": "Harriet Beecher Stowe's Uncle Tom's Cabin (1852) drew its emotional power 'directly from the Fugitive Slave Act's horrors.' What does this connection suggest about the relationship between law and public opinion in antebellum America?", "options": [{"text": "That fictional literature had no political influence in the nineteenth century and should not be used as historical evidence.", "isCorrect": false, "rationale": "The opposite is true; Uncle Tom's Cabin was the best-selling novel of the nineteenth century and is one of the most cited examples of literature shaping political opinion in American history."}, {"text": "That the Fugitive Slave Act, by forcing Northern citizens into direct contact with the machinery of slavery, transformed an abstract moral question into a concrete lived experience that political fiction could dramatize and amplify.", "isCorrect": true, "rationale": "The Fugitive Slave Act made Northerners legally complicit in slavery — required to assist in captures under penalty of law. This transformed anti-slavery sentiment from a distant abstraction into personal moral stakes, providing exactly the emotional material Stowe's novel dramatized. The law created the outrage; the novel spread and intensified it."}, {"text": "That Southern politicians successfully used literature to counter Northern abolitionist propaganda and win public support for the Fugitive Slave Act.", "isCorrect": false, "rationale": "Uncle Tom's Cabin was anti-slavery literature published in the North that intensified opposition to the Fugitive Slave Act; it was not a Southern counter-propaganda effort."}, {"text": "That Congress passed the Fugitive Slave Act specifically in response to the publication of Uncle Tom's Cabin.", "isCorrect": false, "rationale": "The chronology is reversed: the Fugitive Slave Act was passed in 1850; Uncle Tom's Cabin was published in 1852 as a response to the Act, not the other way around."}]}, {"question": "The 'Border Ruffians' and the New England Emigrant Aid Company both sent settlers and resources to Kansas after 1854. What does the competition between these groups reveal about the nature of popular sovereignty as a political mechanism?", "options": [{"text": "That popular sovereignty successfully channeled sectional conflict into democratic competition, proving that it could resolve the slavery question peacefully.", "isCorrect": false, "rationale": "The source describes Kansas as 'a war zone' with 'hundreds of dead' and two rival governments — a clear demonstration that popular sovereignty failed to channel sectional conflict democratically."}, {"text": "That in conditions of organized and funded migration, popular sovereignty was indistinguishable from armed competition for territorial control, making democratic decision-making impossible.", "isCorrect": true, "rationale": "This is the source's KEY CONCEPT: 'popular sovereignty in conditions of organized migration was indistinguishable from armed competition for territorial control.' Each side sought to create a ground-level majority through settlement before the other could, producing Bleeding Kansas rather than democratic resolution."}, {"text": "That the federal government successfully prevented violence in Kansas by enforcing neutrality between the two factions.", "isCorrect": false, "rationale": "The federal government under Pierce did not successfully prevent violence; the sack of Lawrence, the Pottawatomie massacre, and hundreds of deaths demonstrated that federal neutrality (or complicity with pro-slavery forces) did not prevent Bleeding Kansas."}, {"text": "That Northern organizations were willing to use peaceful means while Southern organizations used violence, demonstrating that the conflict was between democratic and anti-democratic forces.", "isCorrect": false, "rationale": "The source describes both sides as engaged in organized competition, including violence on the anti-slavery side — John Brown's Pottawatomie massacre killed five pro-slavery settlers. Framing one side as entirely peaceful misrepresents the source's account."}]}, {"question": "The second American party system (Whig vs. Democrat) collapsed in the 1850s and was replaced by a system (Republican vs. Democrat) that the source describes as 'explicitly sectional.' What made the new system more dangerous for national unity than the old one?", "options": [{"text": "The Republican Party was funded by foreign governments seeking to destabilize the United States, making its electoral victories illegitimate.", "isCorrect": false, "rationale": "No such foreign funding is described in the source; this option is a fabrication with no basis in the historical record."}, {"text": "The Democrat Party supported states' rights while the Republicans supported federal power, creating an irreconcilable constitutional conflict.", "isCorrect": false, "rationale": "While the parties did have different views on federal power, the source identifies the defining danger of the new system as sectional geography, not constitutional philosophy; a party with no Southern representation meant a sectional election was inevitable."}, {"text": "The Republican Party had no support in the South, meaning that a Republican presidential victory could be achieved without a single Southern electoral vote — making Southern acceptance of the result politically impossible.", "isCorrect": true, "rationale": "The source states the Republican Party 'drew no support in the South' — it was 'explicitly sectional.' A system where one party can win the presidency without any Southern votes creates the structural conditions for secession if that party wins, as the 1860 election demonstrated."}, {"text": "Both parties had merged into a single coalition by 1856, leaving voters with no meaningful choice and suppressing democratic competition.", "isCorrect": false, "rationale": "The parties did not merge; the Whig Party disintegrated and was replaced by the Republicans, but the Democrat Party survived as the opposing major party. The new system was more polarized, not merged."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
