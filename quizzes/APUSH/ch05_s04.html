<script>
var QUESTIONS = [{"question": "The Union Enrollment Act (1863) allowed wealthy men to hire substitutes or pay a $300 commutation fee to avoid the draft. How did this provision contribute to the New York City Draft Riots of July 1863?", "options": [{"text": "Wealthy men who paid the fee then demanded the right to command units made up of draftees, generating resentment from officers who had earned their commissions.", "isCorrect": false, "rationale": "The fee purchased exemption from service, not a command position; the source identifies resentment of class exemptions (combined with racial competition for labor) as the riots' cause, not officer appointment disputes."}, {"text": "Working-class Irish immigrants, competing with free Black workers for unskilled labor, resented both the class exemptions that protected wealthy men and a war they associated with Black emancipation and labor competition.", "isCorrect": true, "rationale": "The source identifies exactly this combination: Irish immigrants 'competed with free Black workers for unskilled labor and resented both the draft's class exemptions and a war they associated with Black emancipation and unwanted labor competition.' The riots targeted both the draft system and the city's Black community."}, {"text": "The commutation fee was paid into a fund that directly financed the Emancipation Proclamation, making rioters believe their money was being used to free enslaved people who would then compete with them.", "isCorrect": false, "rationale": "No such fund existed; the commutation fee purchased individual exemption, not a war-funding mechanism specifically for emancipation. The source identifies racial labor competition and class grievance, not a specific financial connection to emancipation funding."}, {"text": "Irish immigrants were specifically excluded from the commutation fee option due to their immigrant status, making the draft disproportionately burdensome for them compared to native-born workers.", "isCorrect": false, "rationale": "The source does not identify immigrant status as a criterion for fee exclusion; the class nature of the exemption (the fee represented months of a laborer's wages) was the grievance — the fee was theoretically available to anyone who could afford it, which poor immigrant workers could not."}], "id": "q01"}, {"question": "Harriet Tubman served as a Union spy and scout and guided the Combahee River Raid (June 2, 1863). What was the significance of her role that MOST directly challenges traditional narratives of the Civil War?", "options": [{"text": "She organized the first interracial military unit in American history, demonstrating that Northern and Southern soldiers could serve together.", "isCorrect": false, "rationale": "No such interracial unit is described; the Combahee River Raid was a Union Army operation against Confederate territory — not a unit combining Northern and Southern soldiers."}, {"text": "As a Black woman who had escaped enslavement, became an intelligence operative, and led an armed military raid that liberated more than 700 enslaved people, Tubman represents enslaved people as active agents of their own liberation rather than passive recipients of white Northern action.", "isCorrect": true, "rationale": "The source describes Tubman as 'the only woman to lead an armed raid during the Civil War' and details her role as spy, scout, and raid leader. This directly counters narratives that depict Black people as passive beneficiaries of Lincoln's emancipation — Tubman organized liberation, not just received it."}, {"text": "Her role as a spy proved that women could perform military intelligence work more effectively than men, leading Congress to pass legislation allowing women to serve in the Union Army.", "isCorrect": false, "rationale": "Congress passed no such legislation; the source describes Tubman's extraordinary individual role, not a policy change enabling broader women's military service."}, {"text": "The Combahee River Raid demonstrated that enslaved people would not flee toward Union lines unless a military escort was provided, confirming Confederate arguments about the loyalty of enslaved laborers.", "isCorrect": false, "rationale": "The raid liberated 700+ enslaved people — hardly evidence of Confederate loyalty. Enslaved people fled toward Union lines throughout the war (the source notes approximately 180,000 fled after the Emancipation Proclamation); the Combahee Raid's significance is Tubman's intelligence-enabled leadership, not proof of reluctance to flee."}], "id": "q02"}, {"question": "The United States Colored Troops (USCT) had approximately 179,000–200,000 Black soldiers serving by war's end, about 10 percent of the Union Army. They faced unequal pay until 1864. What does the struggle for equal pay reveal about the politics of Black military service?", "options": [{"text": "It shows that the Lincoln administration opposed Black military service from the beginning and only created the USCT under Congressional pressure.", "isCorrect": false, "rationale": "The Lincoln administration did resist Black enlistment in the early war years but not primarily over pay; the resistance was about border-state politics. The Bureau of Colored Troops was established in May 1863 after the Emancipation Proclamation changed the calculus — it was not purely Congressional-pressure driven."}, {"text": "Black soldiers' sustained protest against pay inequality — combined with their military service and valor at engagements like Fort Wagner — forced Congress to reckon with the contradiction between using Black men as soldiers while denying them equal treatment.", "isCorrect": true, "rationale": "The source notes: 'They were initially paid less than white soldiers... Congress equalized pay in June 1864 after sustained protest.' Combined with the 54th Massachusetts's Fort Wagner assault suffering 40% casualties, the USCT's service made the pay inequality politically untenable — soldiers who died for the Union could not be permanently denied equal treatment without moral cost."}, {"text": "Pay inequality was largely symbolic since most USCT soldiers were enslaved people who had never received wages and had no expectation of equal pay.", "isCorrect": false, "rationale": "Many USCT soldiers were free Black men from Northern states (like the 54th Massachusetts Infantry, composed primarily of free Black Northerners) who absolutely had wage expectations and conducted organized protests, including some who refused their pay entirely until equalized."}, {"text": "Congress equalized pay in 1862 before the USCT was officially established, eliminating pay inequality as a practical issue from the start.", "isCorrect": false, "rationale": "Pay was equalized in June 1864, not 1862; the Bureau of Colored Troops was established in May 1863. The inequality was real and sustained for over a year of active USCT service."}], "id": "q03"}, {"question": "The Republican Congress enacted several landmark economic measures during the Civil War while freed of Southern Democratic obstruction: the Homestead Act, the Morrill Land-Grant Act, the Pacific Railway Act, and the National Banking Acts. What do these measures share that makes them a coherent vision?", "options": [{"text": "They all focused on immediate military needs — providing food, weapons, and transportation for Union forces — rather than long-term economic development.", "isCorrect": false, "rationale": "These measures were explicitly designed for long-term economic development, not immediate military supply; the Homestead Act allocated land for settlement, the Morrill Act funded universities, the Pacific Railway Act directed continental infrastructure, and the National Banking Acts standardized currency — none primarily addressed immediate military supply."}, {"text": "They each transferred economic functions from the federal government to private corporations, fulfilling the Jacksonian vision of limited government and free markets.", "isCorrect": false, "rationale": "This is the opposite of what the legislation did; it represented an expansion of federal economic involvement (federal land grants, federal railroad charters, federal banking standards, federal education funding) — explicitly inverting the Jacksonian vision of limited government."}, {"text": "They collectively represented an activist federal government directing national economic development — taxing income, funding education, standardizing currency, and directing continental infrastructure — inverting the antebellum Democratic preference for limited federal economic involvement.", "isCorrect": true, "rationale": "The source explicitly frames these measures as 'a fundamental inversion of the antebellum federal-state balance' and notes that 'all areas that antebellum Democrats had insisted were exclusively state prerogatives' were now within the federal domain. Together they constituted the Republican vision of an activist developmental state."}, {"text": "They were all declared unconstitutional by the Supreme Court after the war but reinstated by the Reconstruction Amendments.", "isCorrect": false, "rationale": "None of these measures were struck down by the Supreme Court; they became foundational pieces of American economic law that remained in force. The Reconstruction Amendments addressed citizenship and voting rights, not the economic legislation of the war years."}], "id": "q04"}, {"question": "The Confederate Congress declared in May 1863 that captured Black Union soldiers and their white officers would not be treated as prisoners of war. The Fort Pillow Massacre (April 1864) resulted in Confederate forces under Nathan Bedford Forrest massacring Black soldiers who had surrendered. What was the significance of Confederate policy toward Black soldiers?", "options": [{"text": "It was an isolated incident that did not reflect official Confederate policy and was condemned by Confederate leadership.", "isCorrect": false, "rationale": "The source describes official Confederate Congressional policy (May 1863 declaration that Black soldiers would not be treated as POWs), of which Fort Pillow was a violent implementation. It was not isolated or unofficial."}, {"text": "It demonstrates that Confederate refusal to recognize Black soldiers' POW status was a legal mechanism for denying the legitimacy of Black military service — and that Fort Pillow's massacre served as a rallying cry that intensified Black soldiers' determination.", "isCorrect": true, "rationale": "The source connects the May 1863 Confederate policy to Fort Pillow and notes that 'Remember Fort Pillow!' became 'a rallying cry that intensified Black soldiers' determination.' The policy was not merely military but ideological — refusing to recognize Black men as legitimate combatants was consistent with Dred Scott's denial of Black citizenship."}, {"text": "It caused Lincoln to immediately suspend the exchange of all Confederate prisoners of war as retaliation, leading to the catastrophic conditions at Andersonville prison camp.", "isCorrect": false, "rationale": "While the Union did suspend prisoner exchanges partly over the Black soldier treatment issue, the source does not describe this causal chain; and Andersonville's conditions reflected Confederate organizational failures and resource shortages, not a specific Lincoln retaliation policy."}, {"text": "It led Congress to create separate, better-equipped units for Black soldiers to protect them from Confederate retaliation, addressing the pay inequality at the same time.", "isCorrect": false, "rationale": "Congress did not create separate better-equipped units in response to Confederate policy; pay equalization came in June 1864, but it resulted from USCT soldiers' own sustained protest, not from a protection-motivated Congressional response to the Confederate POW policy."}], "id": "q05"}, {"question": "Read the following excerpt from the source: 'The war was creating, through violence, a new American nation in which the Declaration of Independence's promise was at least potentially extended to all.' What is the significance of the word 'potentially' in this statement?", "options": [{"text": "It signals that the Civil War failed entirely to achieve its stated aims of freedom and equality, producing only continued oppression.", "isCorrect": false, "rationale": "'Potentially' signals contingency and partial achievement, not complete failure; the Emancipation Proclamation, USCT service, and federal legislative expansion were real achievements — but the word acknowledges that the promise of equality was not automatically fulfilled, as Reconstruction's subsequent overthrow would demonstrate."}, {"text": "It acknowledges that the Civil War's transformations were structural and contingent — creating the conditions for equality's extension without guaranteeing it, a gap that would define the struggle through Reconstruction and beyond.", "isCorrect": true, "rationale": "The word 'potentially' is analytically crucial: it acknowledges the genuine achievements (Emancipation Proclamation, USCT service, federal power expansion) while signaling that these achievements were not self-executing. The gap between the war's potential and its realization is precisely what Reconstruction, its overthrow, and Jim Crow are about."}, {"text": "It indicates that Lincoln personally was uncertain whether emancipation was the right policy decision, maintaining ambiguity about the war's moral purpose.", "isCorrect": false, "rationale": "By the time Lincoln issued the Gettysburg Address (November 1863), he had committed fully to the moral repurposing of the war; 'potentially' in the source's analysis is about structural transformation, not Lincoln's personal uncertainty."}, {"text": "It shows that the Civil War's outcomes were negotiated rather than imposed, reflecting a compromise between Union and Confederate representatives about the terms of reunion.", "isCorrect": false, "rationale": "The Civil War was decided by military force, not negotiated settlement; the source's 'potentially' refers to the contingent nature of democratic promise, not a compromise settlement."}], "id": "q06"}, {"question": "The National Banking Acts (1863–64) created a system of nationally chartered banks with standardized currency. The source notes this 'was, in effect, the national banking system that Hamilton had sought in 1791 and Jackson had killed in 1832.' What continuity and change does this observation highlight?", "options": [{"text": "That economic policy debates are resolved by technological innovation rather than political decisions, and the telegraph made national banking feasible in 1863 as it had not been in 1832.", "isCorrect": false, "rationale": "The source's observation highlights political transformation, not technological enablement; the National Banking Acts were politically possible because Southern Democrats had left Congress, removing the opposition that had blocked Hamilton's bank vision for decades."}, {"text": "It illustrates how the Civil War's political transformation — the removal of Southern Democratic obstruction through secession — allowed the Republican Congress to achieve in four years what decades of peacetime Hamiltonian advocacy had failed to accomplish.", "isCorrect": true, "rationale": "The source frames the National Banking Acts as the fulfillment of Hamilton's 1791 vision, noting that Jackson 'killed' the national bank in 1832. The key variable was political: with Southern Democrats gone from Congress after secession, the Republican majority could enact Hamiltonian economic nationalism that had been blocked for seventy years."}, {"text": "It shows that economic policy in America is fundamentally unchanging, with the same Hamiltonian vision consistently dominating federal economic policy from the founding to the Civil War.", "isCorrect": false, "rationale": "The 1832 killing of the Bank of the United States by Jackson demonstrates precisely the opposite: Hamiltonian economic nationalism was defeated and the Democratic vision of limited federal economic involvement dominated for decades. The Civil War was a change, not a continuity."}, {"text": "It demonstrates that the Confederacy's secession was economically motivated — the slave states had opposed national banking to maintain their financial independence from Northern capital markets.", "isCorrect": false, "rationale": "While Southern Democrats did oppose the national bank, the source frames this as a general federal-state balance argument (states'-rights economic philosophy), not specifically as Confederate financial independence seeking. The National Banking Acts' significance is about the transformation of federal power, not Confederate economic motives."}], "id": "q07"}, {"question": "The Confederate treatment of enslaved people during the war involved both impressment (forced labor for military purposes) and, in the final months, Jefferson Davis's controversial proposal to arm enslaved men in exchange for freedom. What does Davis's proposal reveal about the Confederacy's fundamental contradiction?", "options": [{"text": "It demonstrates that Confederate leaders were willing to abandon slavery in exchange for military victory, showing that states' rights, not slavery, was the Confederacy's true cause.", "isCorrect": false, "rationale": "The source frames Davis's proposal as an admission of contradiction, not an abandonment of slavery's cause; Davis proposed arming a small number of enslaved men as a desperate measure, not a principled rejection of slavery. Alexander Stephens and other Confederate leaders vigorously opposed the proposal precisely because it contradicted the Confederacy's founding purpose."}, {"text": "If implemented on a large scale, arming enslaved men with freedom as the reward would have admitted that enslaved people could be loyal soldiers — contradicting the racial hierarchy that the Confederacy insisted justified slavery.", "isCorrect": true, "rationale": "The source states: 'a proposal that, had it been implemented on a large scale, would have admitted the Confederacy's central contradiction: a slave society fighting for the right to hold slaves.' If enslaved men would fight for freedom, the claim that they were suited only for bondage collapsed."}, {"text": "Davis's proposal was immediately accepted by Confederate Congress and implemented, with thousands of formerly enslaved soldiers joining Confederate forces in the war's final weeks.", "isCorrect": false, "rationale": "The proposal was deeply controversial; the Confederate Congress passed a limited version in March 1865, just weeks before Appomattox, but it was never implemented on any meaningful scale. The war ended before the policy could be put into practice."}, {"text": "Davis's proposal reflected Lincoln's influence — he had been privately communicating with Confederate leaders to suggest that gradual emancipation could end the war without military defeat.", "isCorrect": false, "rationale": "No such private communication is described in the source or historical record; Davis's proposal was an independent Confederate military desperation measure, not a product of Lincoln's influence."}], "id": "q08"}, {"question": "The New York Draft Riots (July 1863) killed at least 119 people and included attacks on the Colored Orphan Asylum. What do these events reveal about Northern society's relationship to the Civil War?", "options": [{"text": "They demonstrate that the Northern population was unanimously opposed to the Civil War by 1863 and that Lincoln's re-election in 1864 was fraudulent.", "isCorrect": false, "rationale": "The Draft Riots were a specific urban crisis among specific working-class communities with specific racial and class grievances; Lincoln was legitimately re-elected in 1864 with 55% of the popular vote and overwhelming soldier support. Northern public opinion was divided, not uniformly opposed."}, {"text": "They revealed that class and racial tensions within Northern society were so deep that the war's social meaning was contested even among those nominally fighting for the Union — and that Black communities in Northern cities bore the physical cost of that contest.", "isCorrect": true, "rationale": "The source states: 'They revealed the depth of class and racial tensions within Northern society and demonstrated that the war's social meaning was contested even among those fighting for the Union.' The attack on the Colored Orphan Asylum demonstrates that Black New Yorkers suffered violence from people nominally on the same side of the war."}, {"text": "They were primarily motivated by anti-war sentiment among Irish Catholic immigrants who opposed the war on religious grounds, with racial attacks being incidental to the political protest.", "isCorrect": false, "rationale": "The source identifies both class grievance (draft inequity) and racial labor competition as motivations, not primarily religious opposition. The attacks on the Black community were not incidental — they were central to the riots' logic of racial resentment."}, {"text": "The riots were suppressed by New York City police without federal military involvement, demonstrating the effectiveness of local law enforcement in managing wartime civil unrest.", "isCorrect": false, "rationale": "The source states the riots 'were suppressed only when Union troops, some fresh from Gettysburg, were rushed to the city' — demonstrating the opposite: local law enforcement was insufficient, requiring federal military intervention."}], "id": "q09"}, {"question": "The Civil War produced 'the most dramatic expansion of federal power in American history to that point.' Which of the following best captures the LASTING significance of this expansion?", "options": [{"text": "The expansion was temporary and was fully reversed after Appomattox when the South rejoined the Union and reinstated antebellum constitutional arrangements.", "isCorrect": false, "rationale": "The source explicitly states: 'many of these powers were exercised under the argument of 'military necessity' and were intended as temporary wartime measures — but most proved permanent.' The Homestead Act, national banking system, land-grant universities, and income tax framework all endured."}, {"text": "The Civil War state created permanent institutional changes — income tax, national banking, transcontinental railroad, land-grant universities — embedding the Republican vision of an activist developmental federal government into the constitutional order.", "isCorrect": true, "rationale": "The source's KEY CONCEPT states: 'The Civil War state was not merely larger; it was structurally different, and the Republican vision of an activist federal government directing national economic development had been built into the constitutional order.' The permanence is the essential analytical point."}, {"text": "Federal power expansion was primarily a Confederate achievement, since the Confederate government invented conscription first and more extensively managed its economy.", "isCorrect": false, "rationale": "The Confederacy did achieve the first national conscription act in American history (April 1862), but the source's analysis of lasting federal power expansion focuses on Union legislation; Confederate governmental expansion 'collapsed with defeat' while the Union's 'expansion proved permanent.'"}, {"text": "The expansion was purely military and had no economic dimensions — the federal government enlarged its army and navy but did not extend its authority over the domestic economy.", "isCorrect": false, "rationale": "The expansion was explicitly economic: income tax, national banking system, Pacific Railway Act, Homestead Act, and Morrill Land-Grant Act all represent federal authority over the domestic economy — the source's entire legislative section documents this economic transformation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
