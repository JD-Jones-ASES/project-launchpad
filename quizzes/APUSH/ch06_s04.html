<script>
var QUESTIONS = [{"question": "Which of the following BEST explains the distinction contemporaries drew between 'old' and 'new' immigrants in the Gilded Age?", "options": [{"text": "Old immigrants were skilled craftsmen who settled in rural areas; new immigrants were unskilled factory workers who settled in cities — a purely economic and occupational distinction", "isCorrect": false, "rationale": "The distinction was explicitly racial and ethnic as well as economic. Immigration restrictionists argued that southern and eastern Europeans were racially inferior and culturally unassimilable — claims that went far beyond occupational differences."}, {"text": "Old immigrants came primarily from northwestern Europe and were seen as racially compatible with American democracy; new immigrants came from southern and eastern Europe and were characterized as racially inferior, Catholic or Jewish, and economically threatening — claims that were pseudoscientific and politically effective", "isCorrect": true, "rationale": "The source explicitly describes this distinction: old immigrants from 'Germany, Ireland, Britain, Scandinavia'; new immigrants from 'southern and eastern Europe: Italians, Poles, Russians, Hungarians, Romanians.' The source also explicitly characterizes nativist arguments as 'pseudoscientific and morally bankrupt' while noting they were 'politically effective.'"}, {"text": "Old immigrants came voluntarily seeking economic opportunity; new immigrants were primarily refugees from political persecution — a distinction in motivation that produced different settlement patterns", "isCorrect": false, "rationale": "While persecution (especially pogroms driving Jewish immigration from the Russian Pale) was a factor for new immigrants, economic motivation was also central. And old immigrants also fled hardship (Irish famine, German political upheaval). The distinction contemporaries emphasized was racial/ethnic/cultural, not motivational."}, {"text": "Old immigrants had successfully assimilated through intermarriage with native-born Americans within one generation; new immigrants maintained separate cultural identities for three or more generations — an empirically observed difference that justified different immigration policy", "isCorrect": false, "rationale": "The source explicitly states that the 'melting pot' described a desired process, not an observed one — and that old immigrant assimilation was also partial and contested. The distinction was not empirically based on observed assimilation rates but on racial ideology."}], "id": "q01"}, {"question": "The experience of immigrants at Ellis Island differed fundamentally from the experience of Chinese immigrants at Angel Island. Which of the following BEST explains this difference?", "options": [{"text": "Ellis Island processed a much larger volume of immigrants, requiring faster and less thorough inspection; Angel Island processed fewer arrivals and could therefore conduct more careful scrutiny", "isCorrect": false, "rationale": "The volume difference does not explain why Angel Island conditions were designed to discourage entry, why detentions lasted weeks or months rather than hours, or why the 'paper son' examinations were elaborate attempts to catch fraudulent claims — all of which reflect deliberate policy hostility, not administrative capacity."}, {"text": "The Chinese Exclusion Act (1882) had barred most Chinese immigration by race and nationality, so Angel Island was explicitly designed to discourage entry through prolonged detention and elaborate examinations, while Ellis Island processed European arrivals under a presumption of admissibility", "isCorrect": true, "rationale": "The source explicitly describes Angel Island's conditions as 'designed to discourage entry' with detentions lasting 'weeks or months, far longer than Ellis Island detentions' and 'paper son' examinations intended to catch immigrants claiming false family connections. The Chinese Exclusion Act's racial exclusion created the hostile legal framework that made Angel Island's design possible and intentional."}, {"text": "Ellis Island was operated by federal immigration authorities with legal training; Angel Island was operated by military personnel without immigration expertise, producing inconsistent and arbitrary decisions", "isCorrect": false, "rationale": "Both stations were operated by federal authorities. The different experience was not a product of operator expertise but of the different legal frameworks — the presumption of admissibility for Europeans vs. exclusion for most Chinese."}, {"text": "Asian immigrants at Angel Island had access to better legal counsel because San Francisco's Chinese community was more politically organized than New York's immigrant communities", "isCorrect": false, "rationale": "Angel Island conditions were systematically worse, not better, reflecting the hostile legal and institutional framework of exclusion. San Francisco's Chinese community did provide some support, but the poem-carving testimony in the barracks walls documents suffering, not advantage."}], "id": "q02"}, {"question": "Jacob Riis's How the Other Half Lives (1890) documented tenement conditions in New York. The source notes that while Riis's work was important, it embedded a particular framing. What was that framing?", "options": [{"text": "Riis framed tenement poverty as primarily a product of immigrant cultural practices that could be corrected through Americanization programs", "isCorrect": false, "rationale": "The source identifies a different framing problem: Riis cast immigrants as objects of sympathy and reform rather than as agents of their own lives — a paternalism about immigrants' passivity, not their cultural practices."}, {"text": "Riis framed immigrants as objects of middle-class sympathy and reform rather than as agents of their own lives, obscuring the churches, mutual aid societies, and union halls immigrants built to sustain their communities", "isCorrect": true, "rationale": "The source explicitly states that Riis's work 'embedded a particular framing: immigrants as objects of sympathy and reform, rather than as agents of their own lives' and notes that 'the working-class families Riis photographed were not passive victims; they maintained churches, mutual aid societies, synagogues, and union halls that sustained community life under extraordinary pressure.'"}, {"text": "Riis framed tenement poverty as caused by landlord greed and could only be solved by government ownership of rental housing", "isCorrect": false, "rationale": "Riis's proposed solution was tenement reform legislation (building codes, sanitation standards), not government ownership. The framing problem the source identifies is about how Riis portrayed immigrant subjects, not his policy prescriptions."}, {"text": "Riis framed immigration itself as the cause of urban poverty, implicitly arguing for restriction as the solution to tenement conditions", "isCorrect": false, "rationale": "Riis was sympathetic to immigrants and did not argue for restriction. His framing problem was paternalism — casting immigrants as passive victims needing middle-class rescue — not nativism."}], "id": "q03"}, {"question": "The ethnic enclave in Gilded Age American cities served which primary social and economic functions, according to the source?", "options": [{"text": "Ethnic enclaves served primarily as tax havens where immigrant businesses could avoid the municipal taxes and licensing requirements that applied to native-born-owned enterprises", "isCorrect": false, "rationale": "Ethnic enclaves provided social capital (language, kin networks, religious institutions, job information, credit access), not tax advantages. There were no differential tax exemptions for immigrant neighborhoods."}, {"text": "Ethnic enclaves provided crucial social capital — job information, familiar language and religious institutions, kin networks, and business credit — while also functioning as economic intermediary systems through structures like the padrone system and contractor networks", "isCorrect": true, "rationale": "The source explicitly describes these functions: ethnic enclaves provided 'information about jobs and housing, familiar language and food and religious institutions, kin networks that cushioned the shock of arrival, and business networks that provided credit to co-ethnics.' The padrone system and garment-industry contractor networks illustrate the economic intermediary function."}, {"text": "Ethnic enclaves allowed immigrant communities to maintain autonomous legal systems based on their homeland laws, reducing friction with the American legal system", "isCorrect": false, "rationale": "No autonomous ethnic legal systems existed. Ethnic enclaves operated within American law; their social institution was the mutual aid society, not a parallel legal system."}, {"text": "Ethnic enclaves served primarily a political function — registering voters and coordinating bloc voting — as the primary mechanism through which political machines organized immigrant communities", "isCorrect": false, "rationale": "While political machines did operate through ethnic neighborhoods, the source describes the enclave's primary functions as social capital provision and economic intermediation, not primarily electoral organization."}], "id": "q04"}, {"question": "Tammany Hall served the immigrant working class of New York City through a systematic exchange. Which of the following BEST describes both sides of this exchange?", "options": [{"text": "Tammany provided city jobs, legal intervention, and social services (food, coal, entertainment) in exchange for voter loyalty that maintained machine control of city contracts and patronage revenue", "isCorrect": true, "rationale": "The source explicitly describes this exchange: 'Precinct captains attended christenings and funerals…found jobs in city government for loyal voters, intervened with courts…distributed coal and food…organized entertainments.' In exchange, 'they delivered the votes that kept Tammany bosses in control of city contracts, patronage jobs, and the revenue streams that flowed through city government.'"}, {"text": "Tammany provided legal immigrant status and citizenship documentation in exchange for a portion of workers' wages, combining social services with extortion", "isCorrect": false, "rationale": "Tammany did not control immigration status or citizenship documentation. Its exchange was political — city services for votes — not a wage-extraction scheme."}, {"text": "Tammany provided access to public education and English-language instruction in exchange for endorsement of machine candidates in school board elections", "isCorrect": false, "rationale": "Education provision is not among the services the source describes. Tammany's services were immediate material assistance — jobs, legal help, coal, food — not institutional educational programs."}, {"text": "Tammany negotiated wages between immigrant workers and their employers, providing arbitration services in exchange for a percentage of the wage gains it secured", "isCorrect": false, "rationale": "Tammany was a political machine, not a labor arbitration service. Its relationship was between the machine and voters, not between workers and employers."}], "id": "q05"}, {"question": "The settlement house movement, embodied in Jane Addams's Hull House (1889), is described in the source as simultaneously important and culturally paternalistic. In what sense was it paternalistic?", "options": [{"text": "Settlement houses were funded by industrial corporations like Carnegie Steel, which used them as instruments of worker control and surveillance in immigrant neighborhoods", "isCorrect": false, "rationale": "Settlement houses were funded primarily by middle-class philanthropy and staffed by college-educated women, not by industrial corporations. The paternalism the source identifies is cultural and class-based, not corporate-control paternalism."}, {"text": "The implicit assumption that educated middle-class reformers would uplift immigrant workers rather than learn from them, and that immigrant cultural practices were obstacles to assimilation rather than sources of community strength, reflected class and ethnic condescension even where the care was genuine", "isCorrect": true, "rationale": "The source explicitly identifies this paternalism: 'the implicit assumption that educated middle-class reformers would uplift immigrant workers rather than learn from them, or that immigrant cultural practices were obstacles to assimilation rather than sources of community strength, reflected class and ethnic condescension even where the care was genuine.'"}, {"text": "Settlement houses imposed mandatory English-language instruction on immigrant residents, making access to services conditional on abandoning their native languages", "isCorrect": false, "rationale": "While Hull House offered English classes among many services, there is no indication of mandatory conditions attached to service access. The paternalism the source identifies is attitudinal and structural, not coercive."}, {"text": "Settlement house workers assumed that immigrants' poverty was primarily a result of their own cultural backwardness rather than structural economic conditions, blaming individuals for systemic failures", "isCorrect": false, "rationale": "The source notes that Hull House produced Hull-House Maps and Papers (1895), 'a pioneering urban sociological study that documented living and working conditions' with statistical rigor — this research tradition explicitly linked poverty to structural conditions, not individual cultural failure."}], "id": "q06"}, {"question": "Read the source's description of the mutual aid society: 'These organizations were the welfare state of the working class in an era when the federal and state governments provided virtually nothing.' This characterization MOST directly illustrates which historical theme?", "options": [{"text": "The WXT theme — mutual aid societies were economic enterprises that provided immigrant workers with access to capital markets that mainstream banks denied them", "isCorrect": false, "rationale": "While mutual aid societies did provide small loans and economic functions, the 'welfare state' characterization primarily illustrates the social theme (SOC) and the political theme (POL) — the absence of government social provision and the immigrant communities' self-organization to fill that gap."}, {"text": "The MIG + SOC themes — mass immigration created communities whose internal social institutions (mutual aid) substituted for absent government social provision, demonstrating immigrant agency and the limits of Gilded Age governance", "isCorrect": true, "rationale": "The 'welfare state' characterization directly illustrates the interaction of migration (MIG) — mass immigration creating communities with specific needs — and social organization (SOC) — immigrants building the institutions that filled the welfare gap the Gilded Age state left open. The phrase also implicitly indicts the minimal-government politics of the era."}, {"text": "The GEO theme — mutual aid societies developed because immigrant communities were geographically isolated in urban neighborhoods too far from government services", "isCorrect": false, "rationale": "Geographic isolation was not the cause; immigrants were in the heart of major cities where government was present (however inadequately). The cause was the ideological commitment to minimal government, not spatial inaccessibility."}, {"text": "The CUL theme — mutual aid societies preserved homeland cultural practices and linguistic heritage across generations, demonstrating cultural resilience against forced assimilation", "isCorrect": false, "rationale": "While mutual aid societies did preserve cultural connections (landsmanshaftn organized by hometown, ethnic religious societies), the source's 'welfare state' characterization emphasizes their social insurance function, not primarily their cultural preservation role."}], "id": "q07"}, {"question": "The Chinese Exclusion Act of 1882 was 'the only American law to bar immigration explicitly by nationality and race.' A historian studying this act alongside the treatment of new European immigrants would most likely conclude that:", "options": [{"text": "American immigration policy was consistently and uniformly restrictive across all immigrant groups during the Gilded Age, treating Asian and European immigrants with equal hostility", "isCorrect": false, "rationale": "The source explicitly distinguishes the two: European immigrants were processed at Ellis Island under a general presumption of admissibility; Chinese immigrants faced an explicit racial and national exclusion law and the deliberately hostile conditions of Angel Island. The treatment was not equal."}, {"text": "American immigration policy embedded a racial hierarchy, treating European immigrants as potentially assimilable (if inferior) while categorically excluding Chinese immigrants as racially ineligible for citizenship and membership — a distinction that reveals the racial logic underlying nativist ideology", "isCorrect": true, "rationale": "The source describes nativism as applying pseudoscientific racial arguments to both groups, but the Chinese Exclusion Act represented a qualitatively different level of exclusion — categorical, by law, on racial and national grounds — while European new immigrants faced discrimination and eventual restriction but not outright categorical exclusion until 1924."}, {"text": "The Chinese Exclusion Act was primarily an economic measure aimed at protecting Pacific Coast workers' wages, with no racial ideology embedded in its design or application", "isCorrect": false, "rationale": "The source explicitly identifies racial ideology as central to both Chinese exclusion and nativist anti-immigrant sentiment generally. The act's racial and national specificity — 'the only American law to bar immigration explicitly by nationality and race' — makes a purely economic reading impossible."}, {"text": "Chinese immigrants at Angel Island ultimately received better legal protection than European immigrants at Ellis Island because San Francisco courts were more willing to hear habeas corpus petitions from Chinese detainees", "isCorrect": false, "rationale": "While Chinese immigrants did use habeas corpus petitions in some cases, Angel Island conditions were systematically worse than Ellis Island, and the legal framework (Chinese Exclusion Act) placed Chinese immigrants in a categorically more vulnerable position, not a better-protected one."}], "id": "q08"}, {"question": "New York's dumbbell tenements (named for their floor-plan shape) were designed in response to an 1879 regulation requiring an air shaft between buildings. What does this detail reveal about urban housing policy in the Gilded Age?", "options": [{"text": "New York was exceptional in having strong tenant protection laws; other cities had no building regulations whatsoever", "isCorrect": false, "rationale": "The dumbbell example reveals the weakness of New York's regulations, not their strength — the design complied with the letter of the air shaft requirement while defeating its public health purpose. Other cities had similarly inadequate housing codes."}, {"text": "Minimal building regulations could be satisfied through design innovations that technically met the letter of the law while defeating its public health purpose, revealing the limits of reform efforts in the face of market pressure to maximize rentable space", "isCorrect": true, "rationale": "The dumbbell tenement illustrates exactly this dynamic: landlords designed buildings that technically provided an air shaft (complying with the 1879 regulation) but whose floor plan — five to seven stories, four apartments per floor, three rooms each, families of 5–10 sharing minimal bathroom facilities — maximized occupant density while providing inadequate ventilation, lighting, and sanitation."}, {"text": "The air shaft requirement successfully improved tenement ventilation and eliminated tuberculosis as a major cause of death in New York's immigrant neighborhoods by 1890", "isCorrect": false, "rationale": "The source describes tenements as overcrowded and poorly ventilated even after the 1879 regulation; the dumbbell design technically met the air shaft requirement without solving the underlying public health problems. Tuberculosis mortality in immigrant neighborhoods remained devastating throughout the period."}, {"text": "The 1879 regulation was passed specifically to reduce population density by requiring buildings to be set further apart, not to improve ventilation", "isCorrect": false, "rationale": "The source specifies the requirement was for an air shaft between buildings — a ventilation measure — not a setback requirement. The dumbbell floor plan provided the air shaft while maintaining maximum density."}], "id": "q09"}, {"question": "A student argues: 'The political machine was simply a corrupt institution that exploited immigrant voters.' A historian familiar with this source would most likely revise this claim by arguing that:", "options": [{"text": "Political machines were actually incorrupt: the charges of graft and patronage abuse were fabricated by nativist reformers who resented immigrants' political participation", "isCorrect": false, "rationale": "The source acknowledges that the corruption 'was real and extensive' — Boss Tweed stole $30–200 million; systematic graft was a documented feature of machine politics. The historian's revision would not deny corruption."}, {"text": "Political machines combined real and extensive corruption with genuine social services that the Gilded Age state refused to provide — the machine was simultaneously exploitative and the immigrant working class's most reliable intermediary with state power", "isCorrect": true, "rationale": "The source explicitly holds both truths: 'The corruption was real and extensive' AND 'Tammany and its counterparts also served a real function. In an era of minimal government social services, the machine was the working class's most reliable intermediary with state power. The people Tammany organized were the people whom middle-class reform politics ignored.'"}, {"text": "Political machines should be understood as benevolent institutions that used the profits from corruption to fund social services that otherwise would not have existed", "isCorrect": false, "rationale": "The source does not portray machines as benevolent or frame corruption as socially productive. It acknowledges machines' genuine social function while also criticizing the extractive costs of that corruption — the two coexisted without either canceling the other."}, {"text": "Progressive Era reformers were correct that machines were purely parasitic, and the social services machines provided could have been obtained more efficiently through honest government", "isCorrect": false, "rationale": "The source explicitly says reformers 'had a point' about corruption costs but also 'misunderstand' the machine because 'the people Tammany organized were the people whom middle-class reform politics ignored.' Reformers' 'honest government' did not actually deliver equivalent services to immigrant communities."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
