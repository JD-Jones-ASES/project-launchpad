<body>

        <div class="subtitle">AP United States History &mdash; Dred Scott, John Brown, and the Election of 1860</div>

    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Chief Justice Roger Taney's opinion in Dred Scott v. Sandford (1857) made three distinct holdings. Which combination CORRECTLY identifies all three?", "options": [{"text": "(1) Enslaved people had limited rights in federal courts; (2) Congress could restrict but not ban slavery in territories; (3) the Missouri Compromise line was constitutional.", "isCorrect": false, "rationale": "All three of these are wrong: Dred Scott had no standing at all (not limited standing); Congress had NO power to ban slavery from territories (not could restrict); and the Missouri Compromise was declared unconstitutional (not constitutional)."}, {"text": "(1) Black Americans — enslaved or free — had no citizenship and no standing to sue; (2) Congress had never had constitutional authority to ban slavery from territories; (3) enslaved people were property protected by the Fifth Amendment's due process clause.", "isCorrect": true, "rationale": "The source explicitly states all three: Scott 'was not a citizen of the United States and had no standing to sue in federal court'; Congress 'had never had the constitutional authority to ban slavery from the territories'; and enslaved people were 'property protected by the Fifth Amendment's due process clause.'"}, {"text": "(1) Enslaved people born in free states were automatically free; (2) the Missouri Compromise's geographic line was retroactively constitutional; (3) territories could ban slavery before achieving statehood.", "isCorrect": false, "rationale": "All three contradict the actual holding: Taney ruled Scott was not free despite living in a free state; he declared the Missouri Compromise unconstitutional; and his ruling implied territories could not ban slavery (since Congress could not delegate what it did not possess)."}, {"text": "(1) The Fourteenth Amendment guaranteed birthright citizenship; (2) Congress had plenary power over territories; (3) the Wilmot Proviso was constitutional.", "isCorrect": false, "rationale": "The Fourteenth Amendment had not yet been ratified (it came in 1868, eleven years after Dred Scott); Taney's decision denied Congress's plenary power over territories; and the Wilmot Proviso was effectively invalidated by the decision, not validated."}], "id": "q01"}, {"question": "Read the following passage from Justice Benjamin Curtis's dissent in Dred Scott v. Sandford: through 'exhaustive historical evidence,' Curtis demonstrated 'that free Black men had been citizens at the time of ratification — making Taney's historical argument untenable.' What was the significance of Curtis's dissent?", "options": [{"text": "It had no practical effect because dissents in Supreme Court cases are merely advisory and carry no legal weight.", "isCorrect": false, "rationale": "While Curtis's dissent did not change the legal outcome, its significance was political and intellectual: it exposed the majority's historical claims as fabrications, delegitimizing the decision in Northern eyes and providing the factual ammunition that Republicans would use to frame Taney's opinion as politically motivated rather than legally sound."}, {"text": "It demonstrated through historical evidence that Taney's claim that Black Americans had never been citizens was factually wrong, delegitimizing the majority's historical argument and intensifying Northern outrage at the decision.", "isCorrect": true, "rationale": "The source states Curtis proved 'through exhaustive historical evidence that free Black men had been citizens at the time of ratification — making Taney's historical argument untenable.' Curtis resigned from the Court in protest. His dissent provided the factual basis for Northern rejection of the decision as judicial politics rather than constitutional law."}, {"text": "It convinced three of the seven majority justices to reconsider their positions within two years, eventually leading to a partial reversal of the Dred Scott holding.", "isCorrect": false, "rationale": "No partial reversal occurred; the Dred Scott holding was not overturned until the Fourteenth Amendment (1868). Curtis himself resigned from the Court after issuing the dissent."}, {"text": "It was the first time in Supreme Court history that a justice had disagreed with a majority opinion, establishing the tradition of written dissents.", "isCorrect": false, "rationale": "Dissents existed from the early republic; the significance of Curtis's dissent was its specific historical argument about Black citizenship at ratification, not any procedural novelty."}], "id": "q02"}, {"question": "The Dred Scott decision was supposed to settle the slavery question constitutionally and permanently. Instead, its effect was 'the opposite.' Why did the decision intensify rather than resolve the crisis?", "options": [{"text": "Because it applied only to Dred Scott personally and did not address the broader question of slavery in the territories.", "isCorrect": false, "rationale": "The decision explicitly addressed and ruled on the broader territorial slavery question — declaring the Missouri Compromise unconstitutional and implying that Congress had no power to ban slavery from territories. Its scope was the source of its explosive impact, not its narrowness."}, {"text": "By declaring the Republican platform unconstitutional, stripping Black Americans of any citizenship claim, and effectively threatening popular sovereignty, the decision made the slavery question more explosive by closing off every moderate resolution.", "isCorrect": true, "rationale": "The source's KEY CONCEPT states the decision 'did not merely rule on a specific case; it attempted to resolve the slavery question permanently in slavery's favor.' By invalidating the Republican platform (Congress cannot ban slavery in territories) and stripping Black Americans of citizenship, it made the slavery question more, not less, urgent."}, {"text": "Because it was overturned immediately by Congress through a joint resolution restoring the Missouri Compromise.", "isCorrect": false, "rationale": "Congress did not immediately overturn Dred Scott; the decision was effectively overturned only by the Fourteenth Amendment (1868), ratified eleven years later. No joint resolution restored the Missouri Compromise."}, {"text": "Because the decision applied only to enslaved people in the South and did not address the status of free Black Americans in Northern states.", "isCorrect": false, "rationale": "The decision explicitly addressed the status of Black Americans — whether enslaved or free — holding that none could be citizens of the United States. This categorical denial of any Black citizenship was central to the decision's explosive impact in the North."}], "id": "q03"}, {"question": "John Brown's raid on Harpers Ferry (October 1859) was a military failure. Yet it deepened the sectional crisis more than a successful raid might have. Why?", "options": [{"text": "Because the raid proved that the Union Army was unable to defend federal arsenals, revealing a weakness that encouraged Southern secession.", "isCorrect": false, "rationale": "The arsenal was swiftly recaptured by Colonel Robert E. Lee within thirty-six hours; the raid demonstrated federal capacity to suppress insurrection, not military weakness."}, {"text": "Because the enslaved population rose in support of Brown, confirming Southern fears of race war and Northern hopes for liberation from within.", "isCorrect": false, "rationale": "The source states explicitly: 'The enslaved population did not rise.' The failure of the uprising's core premise — that enslaved people would join a liberating force — was actually the opposite of this answer."}, {"text": "Because the contrasting Northern and Southern reactions to Brown's capture and execution — lionization in some Northern quarters vs. Southern conviction of Northern genocidal intent — revealed that the two sections were operating in incompatible moral frameworks.", "isCorrect": true, "rationale": "The source details this explicitly: the South's 'incandescent' reaction (confirming fears of Northern intent to incite rebellion) vs. the North's more complex response (Republican condemnation but Northern intellectuals like Emerson calling Brown 'a new saint'). The reactions 'confirmed that the two sections were now living in separate moral universes.'"}, {"text": "Because Brown's capture gave Southern states the legal pretext to secede before the 1860 election, forcing Lincoln to issue the Emancipation Proclamation immediately.", "isCorrect": false, "rationale": "No Southern state seceded in 1859; secession followed Lincoln's election in December 1860–February 1861. The Emancipation Proclamation was issued in January 1863, not in response to Brown's raid."}], "id": "q04"}, {"question": "The election of 1860 was effectively two simultaneous elections in different regions. Which of the following BEST describes the four-candidate field and the sectional character of the outcome?", "options": [{"text": "Lincoln (Republican) won all states; Douglas (Northern Democrat) came second nationally; Breckinridge (Southern Democrat) and Bell (Constitutional Union) were regional candidates with no electoral votes.", "isCorrect": false, "rationale": "Lincoln did NOT win all states — he won only free states and received no electoral votes from the Deep South. Breckinridge won most of the Deep South, and Bell won several border/Upper South states."}, {"text": "Lincoln won 180 electoral votes entirely from free states; Breckinridge won the Deep South; Bell won border Upper South states; Douglas won only Missouri and part of New Jersey despite running second in popular vote.", "isCorrect": true, "rationale": "The source describes this outcome: Lincoln won '180 electoral votes — entirely from free states'; the Democratic Party had fractured between Douglas (popular sovereignty, Northern Democrat) and Breckinridge (federal slave-code, Southern Democrat); Bell ran as Constitutional Union; the result demonstrated complete sectional polarization."}, {"text": "Lincoln won with a majority of the popular vote; Breckinridge came second; Douglas came third; Bell received fewer than 1 percent of popular votes.", "isCorrect": false, "rationale": "Lincoln received 39.8 percent of the popular vote — a plurality, not a majority. The source explicitly notes: 'a majority of Americans had voted against him.' He won decisively only in the Electoral College."}, {"text": "Lincoln won only Northern states above the Mason-Dixon Line; Douglas won the Midwest; Breckinridge won the Upper South; Bell won the Deep South.", "isCorrect": false, "rationale": "This regional allocation is inaccurate; Breckinridge won most of the Deep South (not the Upper South), while Bell won Kentucky, Tennessee, and Virginia (Upper South border states). Douglas won Missouri and part of New Jersey despite his national campaign."}], "id": "q05"}, {"question": "South Carolina's secession declaration cited 'the election of a man to the high office of President of the United States, whose opinions and purposes are hostile to slavery.' What constitutional argument did Southern secessionists use to justify this step?", "options": [{"text": "The compact theory of government: if the Constitution was a contract among sovereign states, each state retained the right to withdraw when the federal government violated the contract's terms.", "isCorrect": true, "rationale": "The source explains: 'The constitutional basis of secession was asserted by the compact theory of government: if the Constitution was a compact among sovereign states rather than an instrument of the people as a whole, then states retained the right to withdraw from the compact when the federal government violated its terms.'"}, {"text": "The nullification doctrine: individual states could void any federal law within their borders that they deemed unconstitutional, and persistent federal violations justified withdrawal.", "isCorrect": false, "rationale": "Nullification (associated with Calhoun and South Carolina's 1832 crisis) was the claim that states could void specific federal laws — a different, more limited claim than the secession argument, which asserted a complete right of withdrawal from the Union itself."}, {"text": "The Tenth Amendment reservation of powers to the states: since the Constitution did not explicitly grant the federal government the power to restrict slavery, that power belonged to the states.", "isCorrect": false, "rationale": "While Tenth Amendment arguments were used in debates about congressional power over slavery, the specific constitutional basis for secession articulated by Southern theorists was the compact theory, not a Tenth Amendment reservation of powers."}, {"text": "The Declaration of Independence's right of revolution: oppressed peoples have the right to alter or abolish governments that deny them their rights.", "isCorrect": false, "rationale": "While some Southern rhetoric invoked Revolutionary analogies, the formal constitutional argument for secession rested on the compact theory — the idea that the Constitution was a revocable agreement among sovereign states. The Declaration's 'right of revolution' was a political argument, not the constitutional basis Southern theorists advanced."}], "id": "q06"}, {"question": "The 'Freeport Doctrine' was Douglas's response to Lincoln's 1858 debate question about popular sovereignty after Dred Scott. What was the doctrine, and why did it destroy Douglas's political future?", "options": [{"text": "Douglas argued that territorial legislatures could exclude slavery by passing positive slave codes, but this satisfied neither North nor South and he lost the Senate race.", "isCorrect": false, "rationale": "Douglas argued the opposite: territorial legislatures could effectively exclude slavery by REFUSING to pass slave codes needed to protect it — not by passing codes. The implication was that popular sovereignty could still operate even after Dred Scott."}, {"text": "Douglas argued that territorial residents could effectively exclude slavery by refusing to pass the slave codes needed to protect it, but this satisfied the North while alienating the Southern Democrats who would deny him the 1860 presidential nomination.", "isCorrect": true, "rationale": "The source explains: Douglas argued 'yes' (territorial residents could exclude slavery via the Freeport Doctrine), while 'the Southern wing of the Democratic Party said no. The split destroyed Douglas's presidential prospects and fractured the last major national party.'"}, {"text": "Douglas argued that the Dred Scott decision was unconstitutional and should be ignored by territorial governments, positioning him as a Northern free-soil candidate for 1860.", "isCorrect": false, "rationale": "Douglas accepted Dred Scott as binding precedent; he did not argue for ignoring it. His Freeport Doctrine was an attempt to reconcile popular sovereignty with the decision's holding — not a repudiation of the decision itself."}, {"text": "Douglas argued that all new territories should be admitted as states immediately, without a territorial phase, making popular sovereignty moot and satisfying both sections.", "isCorrect": false, "rationale": "No such proposal appears in the historical record; the Freeport Doctrine specifically addressed how popular sovereignty could operate within the Dred Scott framework, not how to eliminate the territorial phase."}], "id": "q07"}, {"question": "Confederate Vice President Alexander Stephens's 'Cornerstone Speech' (1861) declared that slavery was 'the corner-stone' of the Confederacy. How does this statement relate to the CED theme of National Identity (NAT)?", "options": [{"text": "It illustrates how both the Confederacy and the Union defined their national identities in opposition to slavery, creating a conflict over which side was truly defending liberty.", "isCorrect": false, "rationale": "The Union's national identity in 1861 was not explicitly defined in opposition to slavery; Lincoln's first inaugural promised no interference with slavery where it existed. Only after the Emancipation Proclamation (1863) did the Union define itself explicitly as anti-slavery. Stephens's speech was a Confederate national identity statement, not a mirror of a comparable Union claim."}, {"text": "It shows that the Confederate national identity was explicitly grounded in the permanence of racial slavery — not merely a defense of states' rights — directly contradicting the 'Lost Cause' interpretation that secession was about constitutional principle rather than slavery.", "isCorrect": true, "rationale": "The source uses Stephens's statement to illustrate NAT: 'The Confederate States of America did not merely secede — they constructed a new national identity explicitly grounded in the permanence of racial slavery.' This is primary source evidence directly contradicting the post-war 'Lost Cause' narrative that the Confederacy fought for constitutional principle, not slavery."}, {"text": "It demonstrates that Southern leaders were willing to admit publicly that secession was about tariff protection and economic inequality between the sections.", "isCorrect": false, "rationale": "Stephens explicitly said slavery was the cornerstone, not tariffs or economic inequality. The 'Lost Cause' narrative later reframed the cause as states' rights and economic grievances — but Stephens's own words, delivered in 1861, directly contradict this."}, {"text": "It shows that Confederate leaders believed slavery would be abolished voluntarily within a generation, and the Confederacy was established only as a transitional government.", "isCorrect": false, "rationale": "Stephens said precisely the opposite: the Confederacy's 'foundations are laid, its cornerstone rests, upon the great truth that the negro is not equal to the white man' — a declaration of permanence and racial hierarchy, not a transitional arrangement."}], "id": "q08"}, {"question": "Lincoln's first inaugural address (March 4, 1861) promised 'We are not enemies, but friends. We must not be enemies.' Fort Sumter was attacked on April 12, 1861. What does this interval reveal about the limits of political rhetoric in the secession crisis?", "options": [{"text": "It shows that Lincoln's conciliatory language was insincere and that he secretly planned to provoke the Confederacy into firing first.", "isCorrect": false, "rationale": "There is no historical evidence that Lincoln planned to provoke the attack; he was attempting to maintain federal positions (including Fort Sumter's resupply) without initiating hostilities. The Confederate decision to fire was made in Montgomery, not in response to a Lincoln provocation strategy."}, {"text": "It demonstrates that by March 1861, the political and constitutional crisis had progressed beyond what rhetorical conciliation could address — the Confederate states had already acted on their constitutional theory of secession, and no speech could undo that structural fact.", "isCorrect": true, "rationale": "The source notes: 'His conciliatory rhetoric could not bridge the divide.' Seven states had already seceded; the Confederate government had been formed; Jefferson Davis was president. The crisis had passed the point where presidential appeals to friendship could have structural effect, illustrating that rhetoric operates within structural constraints it cannot overcome."}, {"text": "It illustrates that Southern leaders agreed with Lincoln's analysis but were forced by public pressure to attack Fort Sumter against their own preferences.", "isCorrect": false, "rationale": "There is no evidence Confederate leaders attacked Fort Sumter against their preferences; the decision to fire was made deliberately to force the crisis to a decision point before Lincoln could build Union military strength."}, {"text": "It shows that Lincoln deliberately provoked the Confederate attack to gain Northern political support for a war he had already decided to fight.", "isCorrect": false, "rationale": "While Lincoln did choose to resupply Fort Sumter — knowing the Confederacy might fire — the decision to actually fire was Confederate, not manufactured by Lincoln. The historical consensus does not support the 'deliberate provocation' interpretation."}], "id": "q09"}, {"question": "The Dred Scott decision implied that popular sovereignty was also unconstitutional, not just the Missouri Compromise. How did this logical extension affect the Democratic Party?", "options": [{"text": "It united the Democratic Party around a new platform of congressional protection of slavery in all territories, giving them a winning strategy for 1860.", "isCorrect": false, "rationale": "The implication split the Democratic Party rather than uniting it: Douglas maintained that popular sovereignty could still operate (Freeport Doctrine); Southern Democrats insisted that Congress must actively protect slavery in the territories. This split fractured the last major national party and produced two Democratic candidates in 1860."}, {"text": "It forced Douglas to articulate the Freeport Doctrine (territorial residents can effectively exclude slavery by refusing slave codes), which satisfied Northern Democrats but alienated Southern Democrats, fracturing the party and destroying Douglas's presidential prospects.", "isCorrect": true, "rationale": "The source describes exactly this chain of events: the Dred Scott implication threatened popular sovereignty; 'Douglas argued yes (the Freeport Doctrine); the Southern wing of the Democratic Party said no. The split destroyed Douglas's presidential prospects and fractured the last major national party.'"}, {"text": "It caused most Northern Democrats to join the Republican Party, effectively making the 1860 election a contest between the Republicans and Southern Democrats.", "isCorrect": false, "rationale": "While some Northern Democrats did eventually drift toward the Republican Party, the more immediate effect was the split within the Democratic Party that produced two separate Democratic candidates in 1860, not a mass migration to the Republicans."}, {"text": "It had no effect on the Democratic Party because Douglas had already publicly renounced popular sovereignty before the Dred Scott decision was issued.", "isCorrect": false, "rationale": "Douglas was still publicly committed to popular sovereignty at the time of Dred Scott (1857) and throughout the 1858 Lincoln-Douglas debates; the Freeport Doctrine was his attempt to rescue popular sovereignty after the decision, not an abandonment of it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
