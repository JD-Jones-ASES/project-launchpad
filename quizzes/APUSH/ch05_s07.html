        <div class="subtitle">AP United States History &mdash; The Overthrow of Reconstruction and the Origins of Jim Crow</div>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The source states: 'Reconstruction did not die quietly. It was killed — by organized violence, by political exhaustion, by economic crisis, and by a Supreme Court that progressively read the Reconstruction Amendments as narrowly as possible.' Which of the following BEST characterizes this multi-causal argument?", "options": [{"text": "Reconstruction failed primarily because of Black political inexperience — freedpeople lacked the organizational capacity to sustain Reconstruction governments against Southern resistance.", "isCorrect": false, "rationale": "This is the Dunning School interpretation the source explicitly rejects: 'Reconstruction was not a failure of Black political capacity. It was overthrown.' The source attributes Reconstruction's end to organized violence and political abandonment, not to any incapacity of freedpeople."}, {"text": "Reconstruction ended because the constitutional amendments were poorly drafted and contained too many loopholes that Southern states could exploit.", "isCorrect": false, "rationale": "While the Thirteenth Amendment's exception clause was exploited through convict leasing, the source does not attribute Reconstruction's overthrow primarily to drafting flaws; it identifies four causes — violence, political exhaustion, economic crisis, and judicial narrowing — not constitutional text failures."}, {"text": "Reconstruction was overthrown by a convergence of organized paramilitary violence, Northern political exhaustion after the Panic of 1873, the Compromise of 1877's political abandonment, and the Supreme Court's progressive narrowing of the Reconstruction Amendments.", "isCorrect": true, "rationale": "The source identifies all four: KKK and paramilitary terror (violence); Panic of 1873 and Northern voter refocus (political exhaustion); Compromise of 1877 (political abandonment); Civil Rights Cases 1883 and Plessy 1896 (judicial narrowing). This multi-causal explanation is the source's analytical framework."}, {"text": "Reconstruction failed because it was never intended to be permanent — Radical Republicans designed it as a temporary military occupation, not a lasting transformation of Southern society.", "isCorrect": false, "rationale": "Radical Republicans did intend the Reconstruction Amendments to be permanent constitutional changes, not temporary measures; the problem was not design intent but the withdrawal of the political will to enforce permanent changes."}], "id": "q01"}, {"question": "The Ku Klux Klan was described as 'not simply a criminal organization; it was a political instrument for the Redemption of the South from Republican governance.' How did the federal government respond, and why did that response ultimately fail?", "options": [{"text": "The federal government did not respond to Klan violence — the Grant administration refused to deploy federal power against Southern paramilitary organizations.", "isCorrect": false, "rationale": "The source describes an initially effective federal response: the Ku Klux Klan Acts of 1870 and 1871, successful prosecutions of Klansmen in South Carolina by Attorney General Akerman, and temporary suppression of the organized Klan. The failure was in sustaining the response, not in initially acting."}, {"text": "The Ku Klux Klan Acts and Attorney General Akerman's 1871 South Carolina prosecutions successfully suppressed the Klan temporarily, but the political will to sustain federal enforcement dissolved under Liberal Republican pressure for reconciliation and the General Amnesty Act's restoration of Confederate political rights.", "isCorrect": true, "rationale": "The source describes exactly this trajectory: KKK Acts → Akerman prosecutions → temporary suppression → dissolution of political will. By 1872, the General Amnesty Act restored Confederate political rights; by 1873, Liberal Republicans were calling for reconciliation over justice for Black Southerners. The response worked; sustaining it didn't."}, {"text": "The Klan was permanently suppressed by 1872 and had no influence on subsequent elections, making the Compromise of 1877 unrelated to Klan terror.", "isCorrect": false, "rationale": "While the organized Klan was temporarily suppressed, paramilitary terror continued through the Red Shirts and White League in the 1870s; and the Compromise of 1877's political abandonment came after sustained violence that had already weakened Reconstruction governments in most states."}, {"text": "President Grant refused to deploy federal troops because the Constitution prohibited federal military action within state borders.", "isCorrect": false, "rationale": "Grant did deploy federal troops and federal legal authority under the Klan Acts; the Reconstruction Acts themselves had established military districts. The Constitution's limits on federal military action within states were debated but did not prevent federal intervention when the political will existed."}], "id": "q02"}, {"question": "Sharecropping was the dominant agricultural arrangement that emerged after emancipation. Which of the following BEST explains why sharecropping functioned as a system of labor coercion despite being a nominally voluntary arrangement?", "options": [{"text": "Sharecropping gave Black families full economic independence because they owned the crops they grew and could sell them at market prices.", "isCorrect": false, "rationale": "The source describes the opposite: 'landlords kept the accounts and the croppers rarely came out ahead; debt-peonage bound families to the same land year after year.' The crop-lien system's usurious rates deepened indebtedness, and legal mechanisms (vagrancy laws, labor contract enforcement) prevented leaving while indebted."}, {"text": "Sharecropping was coercive because landlords controlled the accounts, the crop-lien system created permanent debt-peonage, and vagrancy laws and labor contract enforcement statutes made leaving while indebted a criminal offense.", "isCorrect": true, "rationale": "The source describes this system precisely: 'landlords kept the accounts and the croppers rarely came out ahead; debt-peonage bound families to the same land year after year... Black sharecroppers who tried to leave faced criminal prosecution — vagrancy laws, labor contract enforcement statutes, and enticement laws... all functioned to bind free laborers to the land.'"}, {"text": "Sharecropping was voluntary and fair — most Black sharecroppers accumulated significant savings within five to ten years and were able to purchase land by 1880.", "isCorrect": false, "rationale": "The source describes debt-peonage and permanent indebtedness, not accumulation; the crop-lien system's usurious rates and landlords' control of accounts systematically prevented the accumulation the source's description would contradict."}, {"text": "Sharecropping was only practiced in Mississippi and Alabama; most formerly enslaved people in other Southern states obtained wage labor or land ownership after emancipation.", "isCorrect": false, "rationale": "The source describes sharecropping as 'the dominant agricultural arrangement' across the South, not a geographically limited practice; it replaced slavery as the region-wide labor system."}], "id": "q03"}, {"question": "Read the following: 'Southern states arrested Black men on trivial charges — loitering, petty theft, speaking too loudly — and leased them to private employers who worked them under conditions comparable to slavery. The mortality rates in some convict lease camps exceeded those on antebellum plantations.' Which constitutional provision did convict leasing exploit?", "options": [{"text": "The Fifteenth Amendment's failure to prohibit non-racial disfranchisement mechanisms, allowing states to imprison Black voters and remove them from the electorate.", "isCorrect": false, "rationale": "The Fifteenth Amendment's weaknesses related to voting rights, not involuntary labor; convict leasing was enabled by the Thirteenth Amendment's exception clause, not the Fifteenth Amendment."}, {"text": "The Fourteenth Amendment's due process clause, which allowed states to define 'due process' to include summary criminal procedures against Black defendants.", "isCorrect": false, "rationale": "While the due process clause was used (or ignored) in convict leasing prosecutions, the specific constitutional provision that enabled the system was the Thirteenth Amendment's exception: 'except as a punishment for crime.' This is what the source identifies as 'a loophole exploited for decades.'"}, {"text": "The Thirteenth Amendment's exception clause allowing involuntary servitude 'as a punishment for crime,' which states exploited by arresting Black men on trivial or pretextual charges to supply coerced labor.", "isCorrect": true, "rationale": "The source explicitly identifies this: 'The convict leasing system exploited the Thirteenth Amendment's exception clause allowing involuntary servitude 'as a punishment for crime.'' States used selective prosecution of Black men on trivial charges to supply private employers with forced labor — recreating slavery through the criminal justice system."}, {"text": "The commerce clause, which allowed states to lease convict labor to private companies engaged in interstate commerce such as railroads.", "isCorrect": false, "rationale": "The constitutional basis for convict leasing was the Thirteenth Amendment's criminal punishment exception, not the commerce clause; the commerce clause governed federal, not state, regulation of interstate commerce."}], "id": "q04"}, {"question": "Mississippi's post-Reconstruction constitution imposed literacy tests that reduced Black voter registration from approximately 190,000 to fewer than 9,000. How was this mechanism designed to evade the Fifteenth Amendment?", "options": [{"text": "The literacy test was designed to evade the Fifteenth Amendment by requiring ALL voters to pass regardless of race, appearing racially neutral while exploiting racially disparate access to education to produce racial exclusion.", "isCorrect": true, "rationale": "The source explains the mechanism: literacy tests 'administered selectively and capriciously — Black applicants might be asked to interpret an obscure constitutional provision; white applicants were asked nothing.' Even when administered 'evenhandedly,' racially disparate educational access (produced by decades of denied schooling) meant literacy tests produced racial exclusion while appearing race-neutral in their text — evading the Fifteenth Amendment's explicit prohibition on racial exclusion."}, {"text": "The literacy test was designed to evade the Fifteenth Amendment by applying only to new registrants, grandfathering in existing voters including all formerly enslaved people.", "isCorrect": false, "rationale": "Grandfather clauses operated separately, exempting people whose grandfathers had been eligible voters before 1867 — which protected white voters while leaving Black voters (whose grandfathers had been enslaved and could not vote) subject to all restrictions."}, {"text": "The literacy test was constitutional because it was mentioned specifically in the Fifteenth Amendment's implementing legislation as a permissible voter qualification.", "isCorrect": false, "rationale": "No such provision existed; the Fifteenth Amendment prohibited racial denial of voting rights and Congress passed implementing legislation, but this legislation did not authorize literacy tests. The tests' constitutionality was upheld by courts through narrow construction of 'on account of race' — not through textual authorization."}, {"text": "The literacy test was administered only in federal elections, where the Fifteenth Amendment applied, not in state elections, where it did not.", "isCorrect": false, "rationale": "The Fifteenth Amendment applied to both federal and state elections; and the disenfranchisement mechanisms were applied across elections. The 'evade' strategy was to appear race-neutral while producing racial exclusion through discriminatory administration."}], "id": "q05"}, {"question": "The Compromise of 1877 resulted in Hayes becoming president. What did Hayes agree to in exchange, and why did this agreement effectively end Reconstruction?", "options": [{"text": "Hayes agreed to appoint Southern Democrats to Cabinet positions and support federal funding for Southern railroad construction, providing economic incentives that ended the need for military enforcement.", "isCorrect": false, "rationale": "The source describes the Compromise as Hayes agreeing to 'withdraw the remaining federal troops from the South and abandon the Republican Reconstruction governments there' — not Cabinet appointments or railroad funding."}, {"text": "Hayes agreed to withdraw the remaining federal troops from the South and abandon the Reconstruction Republican governments, removing the last federal protection for Black political rights and allowing Redeemer Democrats to seize control of every Southern state.", "isCorrect": true, "rationale": "The source states: 'In the Compromise of 1877, Hayes assumed the presidency in exchange for agreeing to withdraw the remaining federal troops from the South and abandon the Republican Reconstruction governments there. The withdrawal ended the last federal protection for Black political rights. Within months, 'Redeemer' Democratic governments had seized control of every Southern state.'"}, {"text": "Hayes agreed to appoint former Confederate General Robert E. Lee as his Secretary of War, symbolically reconciling the two sections at the expense of Black political rights.", "isCorrect": false, "rationale": "Robert E. Lee died in 1870; he could not have been appointed in 1877. The Compromise was about troop withdrawal and the abandonment of Reconstruction governments, not Confederate officer appointments."}, {"text": "Hayes agreed to submit the Fourteenth and Fifteenth Amendments to a second ratification vote, allowing Southern states to effectively nullify them by voting against reratification.", "isCorrect": false, "rationale": "No such re-ratification procedure existed or was proposed; constitutional amendments, once ratified, cannot be unratified by individual states. The Compromise was a political agreement about troop withdrawal, not a constitutional revision procedure."}], "id": "q06"}, {"question": "The Civil Rights Cases (1883) held that the Fourteenth Amendment prohibited only 'state action,' not private discrimination. How did this ruling enable the Jim Crow system?", "options": [{"text": "It prevented states from establishing public school systems for Black students, since education was a private matter beyond constitutional regulation.", "isCorrect": false, "rationale": "The 'state action' doctrine restricted Congress's authority under the Fourteenth Amendment to prohibit private discrimination; it did not prevent states from establishing public schools. States maintained segregated schools as state action — the Fourteenth Amendment's limits on state action were the relevant question, not its prohibition of state school systems."}, {"text": "By holding that the Fourteenth Amendment did not reach private discrimination, the Court allowed private businesses to discriminate racially, while states then chose not to prohibit this private discrimination — creating the legal architecture of racial separation without being bound by the Amendment's terms.", "isCorrect": true, "rationale": "The source states: 'The Supreme Court's 1883 decision in the Civil Rights Cases struck down the Civil Rights Act of 1875, holding that the Fourteenth Amendment prohibited only state action, not private discrimination — opening the door to privately enforced segregation that states then chose not to prohibit.' Private discrimination + state non-prohibition = Jim Crow."}, {"text": "It ruled that all civil rights legislation since the Civil War was unconstitutional because Congress lacked the authority to pass any laws addressing racial discrimination.", "isCorrect": false, "rationale": "The Civil Rights Cases struck down the Civil Rights Act of 1875 on state-action grounds, but they did not rule that all civil rights legislation was unconstitutional; Congress could still address state action and its own government's discrimination. The ruling's specific holding was that the Fourteenth Amendment governed state, not private, conduct."}, {"text": "It established the 'separate but equal' doctrine, directly validating state-mandated racial segregation in all public facilities.", "isCorrect": false, "rationale": "The 'separate but equal' doctrine was established in Plessy v. Ferguson (1896), not the Civil Rights Cases (1883). The Civil Rights Cases' state-action holding was a prerequisite for Plessy but a distinct ruling."}], "id": "q07"}, {"question": "Historians have characterized the 'Lost Cause' mythology as having served specific ideological functions. Based on the source, what were those functions?", "options": [{"text": "The Lost Cause justified white supremacy's restoration as the restoration of 'natural order,' portrayed Reconstruction as an oppressive imposition rather than a democratic experiment, and provided intellectual legitimation for Jim Crow.", "isCorrect": true, "rationale": "The source states: 'The Lost Cause mythology, which portrayed the Confederacy as a noble cause and Reconstruction as an oppressive imposition, served ideological functions (ARC): it justified the restoration of white supremacy as the restoration of 'natural' order, not as the violent reversal of a democratic experiment.'"}, {"text": "The Lost Cause was a primarily literary movement with no political consequences, serving only to console defeated Confederate veterans emotionally.", "isCorrect": false, "rationale": "The source explicitly characterizes the Lost Cause as serving ideological (ARC) functions — justifying white supremacy's restoration as natural order. It was politically consequential, providing intellectual foundations for Jim Crow's legitimation, not merely literary consolation."}, {"text": "The Lost Cause justified Northern sectional reconciliation by providing a narrative in which both sides had fought honorably for legitimate causes, enabling political compromise.", "isCorrect": false, "rationale": "While the Lost Cause did enable sectional reconciliation between white Northerners and white Southerners, the source identifies its ideological function more specifically as justifying the restoration of racial hierarchy — not merely enabling biracial national reconciliation."}, {"text": "The Lost Cause was the Confederate states' official diplomatic strategy to seek British recognition after Appomattox by portraying the Confederacy as a legitimate nation wrongfully destroyed.", "isCorrect": false, "rationale": "The Lost Cause was a post-war domestic ideological construction, not a diplomatic strategy; Britain recognized the Confederacy's defeat after Appomattox and the Lost Cause served internal American purposes, not international diplomatic ones."}], "id": "q08"}, {"question": "The Panic of 1873 reshaped Northern politics in ways that accelerated Reconstruction's end. What was the causal connection between economic depression and the abandonment of Black Southerners?", "options": [{"text": "The Panic directly caused the failure of the Freedmen's Bureau, since the federal government could no longer fund it after the economic collapse.", "isCorrect": false, "rationale": "The Freedmen's Bureau was abolished by Congress in 1872 — before the Panic of 1873. The Panic's effect was political: it shifted Northern voter attention to economic recovery, reducing the electoral support for the Reconstruction program and enabling Democrats to win the House in 1874."}, {"text": "Economic depression shifted Northern voters' attention to economic recovery, fracturing the political coalition that had sustained Reconstruction — Northern voters lost interest in freedpeople's condition, Democrats won the House in 1874, and the political basis for federal enforcement of Black rights dissolved.", "isCorrect": true, "rationale": "The source states: 'Northern voters, focused on economic recovery, lost interest in the condition of freedpeople in the South. In the midterm elections of 1874, Democrats won the House of Representatives for the first time since before the Civil War. The political coalition that had sustained Reconstruction was fracturing.' The Panic did not directly end Reconstruction but removed the Northern political will to sustain it."}, {"text": "The Panic strengthened Reconstruction by forcing Northern industrialists to demand cheaper Southern labor, creating economic incentives for maintaining federal control of the South.", "isCorrect": false, "rationale": "The Panic's actual political effect was to fracture the Northern Republican coalition by shifting voter attention to economic concerns — the opposite of strengthening Reconstruction. Northern industrial interests in the post-Panic period were more focused on tariffs and monetary policy than on Southern Reconstruction."}, {"text": "The Panic was caused by Reconstruction's corruption, providing economic evidence that Republican governance of the South was incompetent and needed to be ended.", "isCorrect": false, "rationale": "The Panic of 1873 was triggered by the collapse of Jay Cooke and Company and the over-expansion of railroad construction — national financial causes unrelated to Reconstruction governance. Connecting it to Reconstruction corruption was a Redeemer and Dunning School argument, not an economic causal claim the source supports."}], "id": "q09"}, {"question": "The source states that for AP purposes: 'Reconstruction was not a failure of Black political capacity. It was overthrown.' Why is this distinction analytically essential for AP essay writing?", "options": [{"text": "Because it shifts moral responsibility from Black Southerners to white Northerners for Reconstruction's failure, providing a politically correct interpretation for contemporary purposes.", "isCorrect": false, "rationale": "The distinction is historically accurate, not merely politically correct; the evidence — organized Klan terror, federal troop withdrawal, disfranchisement mechanisms, convict leasing — demonstrates that external forces, not internal Black political failure, ended Reconstruction. Analytical accuracy, not political motivation, drives the distinction."}, {"text": "Because it directs historical argument toward the specific external causes (violence, political abandonment, economic depression, judicial narrowing) that ended Reconstruction rather than accepting a narrative that obscures those causes by attributing the outcome to inherent incapacity.", "isCorrect": true, "rationale": "The distinction is analytically essential because it forces examination of specific causes — the KKK, the Compromise of 1877, the Panic of 1873, the Civil Rights Cases — rather than accepting a naturalistic explanation (Black incapacity) that forecloses causal analysis. For AP essays, identifying specific causal mechanisms is the analytical requirement; the 'it was overthrown' framing meets that requirement; the 'it failed' framing does not."}, {"text": "Because it allows students to avoid analyzing Reconstruction's genuine shortcomings — corruption, inexperience, inadequate land redistribution — which are too complex for AP essay purposes.", "isCorrect": false, "rationale": "AP essays reward nuance, including analysis of Reconstruction's genuine limitations (underfunding of Freedmen's Bureau, failure of land redistribution, corruption); the 'it was overthrown' framing does not require ignoring these — it only requires not misattributing the collapse to Black political incapacity."}, {"text": "Because it enables students to argue that Reconstruction fully achieved its goals and that subsequent civil rights problems were entirely the product of Northern racism rather than Southern resistance.", "isCorrect": false, "rationale": "The source's framing is not 'Reconstruction fully succeeded' — it was a genuine revolution that was overthrown. Claiming full success would be as historically inaccurate as claiming inherent failure. The distinction is specifically between overthrow (external causes) and failure (inherent incapacity)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
