<script>
var QUESTIONS = [{"question": "A historian argues that the Reconquista was 'an essential precondition for understanding Spanish behavior in the Americas.' Which of the following BEST explains this connection?", "options": [{"text": "The Reconquista taught Spanish soldiers advanced agricultural techniques that they then used to establish colonies in the Americas.", "isCorrect": false, "rationale": "The Reconquista was a military-religious campaign, not an agricultural training program. The source explicitly connects it to military culture, religious ideology, and legal frameworks for subjugation — not agricultural practices."}, {"text": "The Reconquista created a Spanish culture that celebrated holy war, rewarded soldiers with land and tribute, and developed legal frameworks for subordinating non-Christian peoples — all of which transferred almost directly into the framework for American conquest.", "isCorrect": true, "rationale": "The source explicitly states the 'ideology of the Reconquista — Christian holy war against infidels, authorized by the Church and rewarded with land and tribute — translated almost seamlessly into the framework for American conquest,' and names the requerimiento as a direct legal transfer."}, {"text": "The Reconquista ended Spain's military campaigns in Europe, freeing soldiers to seek new conquests overseas once they had no domestic wars to fight.", "isCorrect": false, "rationale": "While the completion of the Reconquista in January 1492 is historically linked to Columbus's voyage that same year, the source emphasizes ideological and legal continuity rather than simply the availability of idle soldiers."}, {"text": "The Reconquista exposed Spain to Islamic navigational technology that made transoceanic voyaging possible for the first time.", "isCorrect": false, "rationale": "The source credits Portuguese navigators (under Prince Henry the Navigator) with developing the lateen-rigged caravel and accumulating the navigational data that made transoceanic voyaging practical — not Islamic technology absorbed through the Reconquista."}], "id": "q01"}, {"question": "The Treaty of Tordesillas (1494) divided the non-European world between Spain and Portugal along a line west of the Cape Verde Islands. This agreement is historically significant primarily because it:", "options": [{"text": "Required Spain and Portugal to share profits from all trade routes with other European powers.", "isCorrect": false, "rationale": "The Treaty of Tordesillas was a bilateral agreement between Spain and Portugal only; it explicitly excluded other European powers, who were not parties to it and increasingly challenged it as the sixteenth century proceeded."}, {"text": "Gave Portugal the exclusive right to colonize all of North and South America.", "isCorrect": false, "rationale": "The treaty gave Spain the vast majority of the Americas; Portugal's share was limited to the area that became Brazil plus its already-established routes in Africa and Asia."}, {"text": "Established the colonial map of the Americas by giving Spain claim to most of the Western Hemisphere and Portugal jurisdiction over Brazil and the African and Asian trade routes, demonstrating the role of papal authority in legitimizing European imperial claims.", "isCorrect": true, "rationale": "The source notes the treaty 'shaped the subsequent colonial map: it gave Portugal jurisdiction over Brazil and the African and Asian trade routes, while Spain claimed the vast remainder of the Americas' — and specifies it was 'brokered by Pope Alexander VI,' underscoring papal authority as the legitimizing force."}, {"text": "Ended conflict between Spain and Portugal by requiring both powers to withdraw from territories the other had already claimed.", "isCorrect": false, "rationale": "The treaty divided future claims rather than resolving existing conflicts over settled territory; it organized the projected expansion of both empires, not a withdrawal from claimed land."}], "id": "q02"}, {"question": "Read the following: 'Cortés found willing allies among subject peoples, most critically the Tlaxcalans, who supplied tens of thousands of indigenous warriors to fight alongside the Spanish.' What does this evidence BEST suggest about the nature of the Aztec Empire on the eve of Spanish conquest?", "options": [{"text": "The Aztec Empire was militarily weak and lacked a standing army capable of resisting even a small Spanish force.", "isCorrect": false, "rationale": "The source describes Tenochtitlan as a city of 200,000 people and the Aztec as an empire of 'several million people' — the issue was not military weakness in the abstract but the political vulnerability created by tribute extraction and accumulated grievances."}, {"text": "The Aztec Empire had accumulated enemies through its aggressive tribute-extraction system, creating internal political fractures that Spanish invaders could exploit by positioning themselves as liberators.", "isCorrect": true, "rationale": "The source explicitly identifies Aztec 'aggressive tribute-extraction system' as the reason Cortés found willing allies, noting the Tlaxcalans — a subject people — supplied 'tens of thousands of indigenous warriors.' This demonstrates that the conquest was a civil conflict as much as a foreign invasion."}, {"text": "Indigenous peoples throughout Mesoamerica welcomed Spanish arrival because they believed Cortés was the returning god Quetzalcóatl.", "isCorrect": false, "rationale": "The source mentions religious uncertainty about the newcomers as one factor — 'historians debate how decisive this factor was' — but the primary alliance explanation is the political grievances of tribute-subject peoples, not messianic religious belief."}, {"text": "The Tlaxcalans joined the Spanish exclusively because they had already been converted to Christianity by earlier missionaries.", "isCorrect": false, "rationale": "The source does not suggest the Tlaxcalans were Christian converts; they joined because of political grievances against the Aztec tribute system, not religious conversion."}], "id": "q03"}, {"question": "Which of the following BEST explains why Francisco Pizarro's conquest of the Inca Empire (1532) succeeded even though he arrived with only 168 soldiers?", "options": [{"text": "Pizarro arrived when the Inca state was already weakened by a succession war triggered by the death of Emperor Huayna Capac — himself almost certainly killed by smallpox transmitted overland from the Caribbean before any Spaniard had reached Peru.", "isCorrect": true, "rationale": "The source explicitly links Huayna Capac's death 'around 1527 — almost certainly of smallpox transmitted overland from the Caribbean' to the civil war between Huascar and Atahualpa that Pizarro exploited at Cajamarca, demonstrating disease and political fragmentation preceded and enabled the military conquest."}, {"text": "Pizarro's force possessed cannon and firearms that the Inca had never encountered, making any military resistance futile.", "isCorrect": false, "rationale": "While technological advantages played a role, the source emphasizes that the Inca state was already 'mid-collapse due to a succession war' — political fragmentation, not simply technology, was decisive. The Inca had organized armies that vastly outnumbered Pizarro's 168 soldiers."}, {"text": "The Inca Empire had no military tradition and had never fought a war before the Spanish arrived.", "isCorrect": false, "rationale": "The source describes a devastating civil war between Atahualpa and Huascar just prior to Spanish arrival — the Inca were clearly experienced warriors engaged in active military conflict."}, {"text": "Portugal had already established trade relationships with the Inca, which allowed Pizarro to use diplomatic channels rather than military force.", "isCorrect": false, "rationale": "No Portuguese contact with the Inca is described or implied in the source; Pizarro operated under Spanish royal authority and used military force — the source describes the capture and execution of Atahualpa after a surprise attack."}], "id": "q04"}, {"question": "Examine this scenario: A Spanish hidalgo (minor noble) in 1519 joins Cortés's expedition to Mexico, citing honor, Christian duty, and the opportunity for wealth. Which of the following MOST accurately characterizes the ideological and economic motivations described?", "options": [{"text": "The hidalgo's motivations were purely religious — spreading Christianity to indigenous peoples — with no connection to economic self-interest.", "isCorrect": false, "rationale": "The source explicitly names wealth alongside honor and religious mission: conquistadores were 'minor nobles or commoners from Castile and Extremadura seeking honor, wealth, and social advancement,' and the capitulación system rewarded them with 'a share of the spoils.'"}, {"text": "The hidalgo's motivations blended the Reconquista ideology of holy war with personal ambitions for land, tribute, and social advancement — a combination the legal structure of the capitulación institutionalized.", "isCorrect": true, "rationale": "The source links all three: the Reconquista ideology of 'Christian holy war... rewarded with land and tribute'; the conquistador's personal goals of 'honor, wealth, and social advancement'; and the capitulación's legal structure granting 'the right to conquer specific territories in exchange for a share of the spoils.'"}, {"text": "The hidalgo's motivations were exclusively economic — he sought to establish a trading company rather than engage in military conquest.", "isCorrect": false, "rationale": "The source describes conquistadores as military entrepreneurs motivated by honor and social advancement alongside wealth; the trading company model belonged to different colonial systems (Dutch, later English)."}, {"text": "The expedition was organized by the Spanish crown, which paid soldiers a regular salary and claimed all conquered land as royal property.", "isCorrect": false, "rationale": "The source describes Cortés's expedition as 'unauthorized' — he organized it privately under a capitulación structure that split spoils between the crown and the conquistadores, not a salaried royal army."}], "id": "q05"}, {"question": "The Portuguese development of the lateen-rigged caravel under Prince Henry the Navigator most directly enabled which of the following developments?", "options": [{"text": "Spain's colonization of the Caribbean, since Portugal shared its caravel technology with Castile as part of the Treaty of Tordesillas.", "isCorrect": false, "rationale": "Columbus sailed on Spanish-funded ships in 1492, two years before Tordesillas; Portugal's caravel technology informed Spanish shipbuilding but was not specifically shared under Tordesillas, which was a territorial division agreement, not a technology-sharing treaty."}, {"text": "Open-ocean navigation independent of coastal routes, making the sustained exploration of the African coast and eventually transoceanic voyaging to Asia and the Americas practically feasible.", "isCorrect": true, "rationale": "The source describes the caravel as 'capable of sailing against the wind and in shallow coastal waters' and links it to Portugal's accumulated 'astronomical and navigational data that made open-ocean navigation feasible' — culminating in Dias rounding the Cape of Good Hope (1488) and da Gama reaching India (1498)."}, {"text": "The Spanish Reconquista's final campaigns in Granada, since the caravel's speed allowed rapid military resupply across the Mediterranean.", "isCorrect": false, "rationale": "The Reconquista was a land campaign on the Iberian Peninsula; the caravel's significance was for oceanic exploration, not Mediterranean land-war logistics."}, {"text": "The elimination of the Islamic monopoly on overland Silk Road trade by providing an entirely sea-based alternative to Middle Eastern routes.", "isCorrect": false, "rationale": "While da Gama's voyage to India in 1498 did eventually undercut overland routes, the source frames the caravel's significance in terms of enabling systematic coastal exploration and transoceanic voyaging — not specifically as a response to Islamic trade monopolies."}], "id": "q06"}, {"question": "Cortés's 'Noche Triste' (June 1520), in which nearly half of his Spanish force was killed, is mentioned in the source to make which of the following analytical points?", "options": [{"text": "That the Spanish conquest of the Aztec Empire was inevitable because of Spanish military and technological superiority.", "isCorrect": false, "rationale": "The source explicitly inverts this argument: it mentions the Noche Triste as evidence that 'the conquests were contingent events that could easily have failed' — not that Spanish superiority made conquest inevitable."}, {"text": "That the Spanish conquest succeeded because Cortés personally was a military genius who could not be defeated.", "isCorrect": false, "rationale": "The source describes Cortés as an 'extraordinary' political manipulator rather than a military genius, and the Noche Triste is used to demonstrate that the conquest nearly failed — directly undermining any claim of personal invincibility."}, {"text": "That Spanish success was not the product of inevitable superiority but of a contingent convergence of disease, political alliance, and military technology that could have gone otherwise.", "isCorrect": true, "rationale": "The source states explicitly that the Noche Triste 'killed nearly half his Spanish force,' and then concludes: 'That they succeeded as completely as they did reflects not Spanish invincibility but the catastrophic convergence of biology, politics, and military technology in favor of the invaders.'"}, {"text": "That the Aztec military was more powerful than historians have previously acknowledged, and that Spanish success remains unexplained.", "isCorrect": false, "rationale": "The source does not leave the conquest unexplained; it offers a multi-causal explanation involving disease, indigenous alliances, military advantages, and religious uncertainty — not an acknowledgment of inexplicable mystery."}], "id": "q07"}, {"question": "Read the following passage: 'The religious vocabulary of crusade, the military culture of hidalgo (minor nobility) seeking honor and plunder, and the legal fiction of the requerimiento... all carried Iberian precedents into the Americas.' Based on this passage, the requerimiento is best understood as:", "options": [{"text": "A genuine diplomatic offer of peaceful coexistence that indigenous peoples chose to reject, thereby legally authorizing Spanish military response.", "isCorrect": false, "rationale": "The source explicitly calls the requerimiento a 'legal fiction' — framing it as a performative text that created the appearance of legitimacy without the substance of genuine choice."}, {"text": "A legal fiction that provided formal justification for military attack by claiming to 'offer' indigenous peoples submission before assault — carrying the Reconquista's framework for subordinating non-Christians directly into the Americas.", "isCorrect": true, "rationale": "The source describes the requerimiento as 'a document read aloud to indigenous people \"offering\" them submission before military attack' and explicitly calls it a 'legal fiction' that translated the Reconquista's framework into the Americas."}, {"text": "A comprehensive treaty under which indigenous peoples surrendered sovereignty in exchange for guaranteed protections from the Spanish crown.", "isCorrect": false, "rationale": "No reciprocal treaty is implied; the source describes a one-sided performative declaration that authorized military action regardless of whether those addressed could understand, respond, or consent."}, {"text": "A document developed by Bartolomé de Las Casas to limit the violence of Spanish conquest by requiring a formal offer of peace before battle.", "isCorrect": false, "rationale": "The requerimiento was a legal tool used by conquistadores, not an instrument of Las Casas's advocacy. Las Casas opposed conquest; the requerimiento enabled it."}], "id": "q08"}, {"question": "Columbus's four voyages (1492–1504) 'did not \"discover\" a world unknown to its inhabitants, but they did permanently breach the isolation that had kept the Americas separate from Afro-Eurasian networks of exchange.' The phrase 'permanently breach the isolation' is historically significant because it:", "options": [{"text": "Celebrates Columbus's achievement as the single most important event in world history.", "isCorrect": false, "rationale": "The source uses neutral historical language ('permanently breach the isolation') rather than celebratory framing, and attributes the outcome to structural forces rather than individual heroism."}, {"text": "Implies that prior to 1492 the Americas were unknown to all humans, including indigenous peoples.", "isCorrect": false, "rationale": "The source explicitly rejects this interpretation by noting Columbus 'did not \"discover\" a world unknown to its inhabitants' — the breach was the integration of the Americas into Afro-Eurasian exchange networks, not the first knowledge of America's existence."}, {"text": "Emphasizes that the consequence of Columbus's voyages was structural and permanent — connecting the Americas for the first time to the disease pools, trade systems, and political systems of the Old World — regardless of Columbus's intentions or misunderstandings.", "isCorrect": true, "rationale": "The source emphasizes permanence and structural consequence: Columbus 'permanently breach[ed] the isolation' despite dying 'still convinced he had reached the outskirts of Asia' — the historical significance lies in the structural integration, not in Columbus's understanding of what he had done."}, {"text": "Suggests that European technological superiority made it inevitable that the Americas would eventually be incorporated into Old World networks.", "isCorrect": false, "rationale": "The source does not use inevitability language; it frames the encounter as the product of 'specific pressures — religious, economic, and geopolitical' that converged at a particular moment, not as a teleological outcome of European superiority."}], "id": "q09"}, {"question": "A historian studying the Spanish conquest of the Americas identifies four factors that enabled Spanish success: (1) indigenous political divisions and alliance-building with Aztec subject peoples; (2) epidemic disease weakening indigenous populations before decisive battles; (3) Spanish military advantages including steel, firearms, horses, and war dogs; and (4) possible Aztec religious uncertainty about how to categorize the newcomers. Which of the following BEST represents the source's overall assessment of these four factors?", "options": [{"text": "Factor (3) — military technological superiority — was the single decisive explanation for Spanish success, making the other three factors secondary and unnecessary for analysis.", "isCorrect": false, "rationale": "The source explicitly rejects single-factor explanations, stating the conquest succeeded because of 'the catastrophic convergence of biology, politics, and military technology' — and notes that factor (4) is itself debated among historians."}, {"text": "Factor (2) — epidemic disease — was by far the most important factor, and without it the conquest would have been impossible regardless of the other three factors.", "isCorrect": false, "rationale": "While disease is treated as critical in the source, the overall argument is that all factors converged — and the source's warning that 'conquests were contingent events that could easily have failed' suggests no single factor was determinative by itself."}, {"text": "All four factors contributed to Spanish success, and their convergence — disease, political division, military technology, and religious uncertainty — produced a result that was contingent, not inevitable, and could easily have gone otherwise.", "isCorrect": true, "rationale": "The source's Key Concept section explicitly states: 'The conquests were contingent events that could easily have failed' and attributes success to 'the catastrophic convergence of biology, politics, and military technology' — integrating all factors while rejecting inevitability."}, {"text": "Factor (4) — Aztec religious uncertainty — was decisive because without it, indigenous peoples would have immediately organized effective military resistance and repelled the Spanish.", "isCorrect": false, "rationale": "The source flags factor (4) as the most debated and uncertain: 'there is evidence that Aztec religious frameworks initially created uncertainty... though historians debate how decisive this factor was.' It is treated as supplementary, not decisive."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
