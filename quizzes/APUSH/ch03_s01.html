<body>
<div class="quiz-container">

        <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; The Imperial Crisis and the Road to Revolution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Read the following excerpt from a 1765 colonial petition: 'Your petitioners, as Englishmen, humbly claim the right that no taxes be imposed upon them but with their own consent, given personally or by their representatives.' Which specific parliamentary act most directly provoked this type of petition?", "options": [{"text": "The Proclamation of 1763, which closed western lands to colonial settlement", "isCorrect": false, "rationale": "The Proclamation of 1763 was a land boundary restriction, not a tax measure; petitions about 'taxation without consent' targeted fiscal legislation, not territorial policy."}, {"text": "The Stamp Act of 1765, which required revenue stamps on printed materials and internal colonial transactions", "isCorrect": true, "rationale": "The Stamp Act was Parliament's first direct internal tax on the colonies, provoking the 'no taxation without representation' argument and the Stamp Act Congress's resolutions denying Parliament's taxing authority."}, {"text": "The Navigation Acts, which regulated colonial trade routes and required use of British ships", "isCorrect": false, "rationale": "The Navigation Acts regulated trade rather than imposing direct internal taxes; the petition's language about 'consent' and 'representatives' targets direct parliamentary taxation, which the Navigation Acts did not constitute."}, {"text": "The Declaratory Act, which asserted Parliament's right to legislate for the colonies in all cases", "isCorrect": false, "rationale": "The Declaratory Act followed the Stamp Act's repeal and stated Parliament's authority in principle; it did not itself impose a tax and thus would not have generated a petition against taxation specifically."}]}, {"question": "The Seven Years' War ended with the Peace of Paris (1763), which gave Britain a massive territorial gain in North America. How did this victory paradoxically accelerate the imperial crisis?", "options": [{"text": "The victory eliminated France as a colonial rival, removing the main reason colonists needed British military protection and making them more willing to resist taxation.", "isCorrect": true, "rationale": "By expelling France from North America, Britain removed the primary external threat that had given colonists reason to value British military protection; colonists now felt less need for the empire and more resentment toward new taxes imposed to pay for a war they believed had already been won."}, {"text": "Britain's territorial gain alarmed indigenous peoples, who then attacked colonial settlements, forcing Britain to raise new taxes to fund emergency frontier defense.", "isCorrect": false, "rationale": "While frontier defense costs were real, the source attributes the crisis primarily to Britain's doubled national debt and the political gap between London's reasoning and colonial constitutional objections — not primarily to new indigenous attacks."}, {"text": "The peace treaty required Britain to compensate France for colonial losses, which the British government attempted to recover through colonial taxes.", "isCorrect": false, "rationale": "The Peace of Paris did not require British reparations to France; Britain was the victor. The debt burden came from war costs, not treaty compensation payments."}, {"text": "The territorial gain produced a surplus of colonial land that British landlords claimed, dispossessing colonial settlers and provoking resistance.", "isCorrect": false, "rationale": "The source focuses on fiscal debt and constitutional representation disputes, not landlord displacement of settlers as the source of colonial grievance."}]}, {"question": "Parliament defended the Stamp Act using the doctrine of 'virtual representation.' Colonial leaders rejected this doctrine. Which of the following BEST explains why colonial leaders found virtual representation unconvincing?", "options": [{"text": "Colonists believed members of Parliament were corrupt and therefore could not represent anyone's interests faithfully.", "isCorrect": false, "rationale": "The colonial objection was structural and constitutional — about the principle of representation, not about the personal corruption of individual parliamentarians."}, {"text": "Colonial assemblies had operated for over a century on the principle of actual, direct representation, making virtual representation incompatible with colonists' lived political experience.", "isCorrect": true, "rationale": "Because colonial assemblies since the 1600s had operated on actual, direct representation — delegates chosen by specific constituencies — the doctrine of virtual representation contradicted the constitutional reality colonists knew and relied upon for legitimate governance."}, {"text": "Colonists rejected virtual representation because they wanted to send delegates to Parliament and participate directly in Westminster governance.", "isCorrect": false, "rationale": "Most colonial leaders did not seek seats in Parliament; they sought either exemption from parliamentary taxation or control of their own assemblies — not integration into Westminster."}, {"text": "Virtual representation was rejected because it had already been repudiated by the Glorious Revolution of 1688 in English common law.", "isCorrect": false, "rationale": "The source does not support this specific claim; the colonial argument drew on natural rights and practical assembly experience, not a specific 1688 legal ruling against virtual representation."}]}, {"question": "A historian argues that the escalation of the imperial crisis between 1763 and 1774 followed a recognizable pattern: imposition → resistance → partial British retreat → reassertion of principle → new flashpoint. Which sequence of events BEST illustrates this pattern?", "options": [{"text": "Stamp Act → Stamp Act Congress → Stamp Act repeal + Declaratory Act → Townshend Acts", "isCorrect": true, "rationale": "This sequence precisely matches the pattern: Britain imposed (Stamp Act), colonists resisted (Stamp Act Congress, boycotts), Britain retreated partially (repeal) but reasserted authority (Declaratory Act), then created a new flashpoint (Townshend Acts) — exactly as the source describes."}, {"text": "Proclamation of 1763 → Boston Massacre → Townshend Acts → Tea Act", "isCorrect": false, "rationale": "This list jumps across the pattern without preserving the resistance-and-retreat cycle; the Proclamation was not primarily a taxation measure, and the Boston Massacre followed from Townshend Act-era tensions, not the Proclamation."}, {"text": "Boston Tea Party → Coercive Acts → Quebec Act → First Continental Congress", "isCorrect": false, "rationale": "This sequence is part of the pattern but represents its final stage; it does not show the full iterative cycle of imposition-resistance-retreat that characterized the decade 1763–74."}, {"text": "Seven Years' War → Peace of Paris → Salutary Neglect → Navigation Acts", "isCorrect": false, "rationale": "Salutary neglect preceded the imperial crisis and the Navigation Acts long predate 1763; this sequence does not illustrate the escalation pattern the historian describes."}]}, {"question": "The Coercive Acts (1774) were a response to the Boston Tea Party. Explain why these acts transformed what had been a Massachusetts dispute into a continental emergency.", "options": [{"text": "The Coercive Acts imposed martial law throughout all thirteen colonies, requiring every colonial assembly to suspend operations.", "isCorrect": false, "rationale": "The Coercive Acts targeted Massachusetts specifically — closing Boston's port, suspending Massachusetts's charter, and quartering troops — they did not impose martial law on all thirteen colonies."}, {"text": "By suspending Massachusetts's self-government charter and closing Boston Harbor, Britain signaled that any colony's right to self-governance could be revoked, uniting other colonies in defensive solidarity.", "isCorrect": true, "rationale": "The Coercive Acts showed that Britain was willing to suspend a colonial charter of self-government, which alarmed every other colony that its own assembly and rights were equally vulnerable — transforming Massachusetts's crisis into a continental constitutional threat."}, {"text": "The Coercive Acts banned trade between all American colonies, creating a unified economic crisis that forced coordinated response.", "isCorrect": false, "rationale": "The port closure targeted Boston specifically; there was no general trade ban among all colonies. Colonial solidarity arose from constitutional alarm, not a general trade shutdown."}, {"text": "Britain's passage of the Coercive Acts also dissolved the colonial militias, leaving every colony defenseless and requiring a continental military response.", "isCorrect": false, "rationale": "The Coercive Acts did not dissolve colonial militias; colonial militias remained intact and would form the basis of the resistance at Lexington and Concord in 1775."}]}, {"question": "The Sons of Liberty used multiple tactics to resist the Stamp Act. Which of the following BEST explains why their economic tactics (boycotts) proved more effective than their political petitions in forcing Parliament's repeal?", "options": [{"text": "British manufacturers and merchants, facing economic losses from the colonial boycott, lobbied Parliament to repeal the Stamp Act, applying pressure that political petitions from colonists lacked.", "isCorrect": true, "rationale": "Parliament was more responsive to British economic interests than to colonial constitutional arguments; when the boycott caused real financial losses for British manufacturers and merchants, those domestic interests lobbied for repeal — a form of pressure that colonial petitions alone could not generate."}, {"text": "The boycotts demonstrated that colonists could survive economically without British goods, making them genuinely independent of the empire.", "isCorrect": false, "rationale": "The boycotts demonstrated colonial economic leverage, not self-sufficiency; colonists still depended heavily on British manufactured goods, and the boycott was a pressure tactic rather than a demonstration of economic independence."}, {"text": "Petitions were ineffective because they were written in Latin legal language that parliamentarians could not understand.", "isCorrect": false, "rationale": "This is factually inaccurate; colonial petitions were written in English legal rhetoric that Parliament understood well. Their ineffectiveness stemmed from parliamentary rejection of the constitutional arguments, not language barriers."}, {"text": "Boycotts were more effective because they were legally protected by the English common law tradition of trade refusal.", "isCorrect": false, "rationale": "The source does not frame boycott effectiveness in terms of legal protection; effectiveness came from economic consequences, not legal status."}]}, {"question": "The Townshend Acts (1767) imposed duties on imported goods rather than internal stamps. The colonists objected anyway. Which constitutional principle explains why they resisted external as well as internal taxes?", "options": [{"text": "John Dickinson argued in his Letters from a Pennsylvania Farmer that any parliamentary tax on the colonies — internal or external — was unconstitutional without colonial consent.", "isCorrect": true, "rationale": "Dickinson's Letters made precisely this argument: Parliament had no right to tax the colonies for revenue purposes regardless of whether the tax was called internal or external — the principle was consent through representation, not the technical form of the levy."}, {"text": "The Townshend Acts were unconstitutional because they violated the Navigation Acts, which had reserved external trade regulation to the Crown, not Parliament.", "isCorrect": false, "rationale": "The source does not describe this constitutional argument; colonial resistance to the Townshend Acts centered on parliamentary taxation without representation, not conflicts between the Navigation Acts and parliamentary authority."}, {"text": "Colonists objected because the Townshend duties applied to goods produced in the colonies rather than imported ones.", "isCorrect": false, "rationale": "The Townshend Acts imposed duties on imported goods (glass, lead, paint, paper, tea) — not colonial-produced goods. This answer mischaracterizes what the acts taxed."}, {"text": "The Townshend Acts were objected to solely because they established admiralty courts without juries, not because of the taxes themselves.", "isCorrect": false, "rationale": "The admiralty courts were one grievance, but the primary objection was the constitutional argument against taxation without representation; Dickinson's Letters targeted the taxation principle broadly."}]}, {"question": "Consider the following statement by a colonial pamphleteer (c. 1770): 'We have for a century managed our own affairs through our own assemblies. We are not subjects of Parliament; we are subjects of the King, connected to Britain through the Crown, not through Westminster.' This argument reflects which constitutional theory?", "options": [{"text": "The colonists had no constitutional standing to make any argument against parliamentary authority because they were British subjects.", "isCorrect": false, "rationale": "This dismisses the constitutional argument rather than identifying which theory it represents; the pamphleteer is articulating a specific alternative constitutional position, not making an incoherent claim."}, {"text": "A 'dominion theory' in which colonies were separate from Parliament but connected to Britain through shared allegiance to the Crown — the same structure as the British Empire would later adopt for Canada and Australia.", "isCorrect": true, "rationale": "This colonial argument — that assemblies handled domestic legislation and Parliament had no authority over internal colonial affairs — prefigured the dominion model; the pamphleteer locates constitutional connection through the Crown rather than Parliament, which is the core of this theory."}, {"text": "A rejection of any British connection, amounting to a de facto declaration of independence before 1776.", "isCorrect": false, "rationale": "The pamphleteer affirms allegiance to the king and connection to Britain through the Crown — this is not a declaration of independence but a constitutional redefinition of what parliamentary authority extended to."}, {"text": "The theory of parliamentary sovereignty as developed by Sir William Blackstone in his Commentaries on the Laws of England.", "isCorrect": false, "rationale": "Blackstone's Commentaries supported parliamentary sovereignty and would undermine, not support, the colonial position; the pamphleteer is arguing against Blackstone's framework, not for it."}]}, {"question": "Which of the following accurately describes the significance of the Proclamation of 1763 from a colonial perspective?", "options": [{"text": "Colonists welcomed the Proclamation because it ended the costly frontier conflicts that had destabilized colonial society.", "isCorrect": false, "rationale": "Colonists, particularly land speculators and veterans who had fought expecting western land grants, found the Proclamation infuriating — it denied them access to the territory they believed the war had opened."}, {"text": "The Proclamation confirmed Britain's willingness to protect indigenous land rights even at the cost of colonial ambitions, but colonists experienced it as a punishment for their wartime loyalty.", "isCorrect": true, "rationale": "From London's perspective the Proclamation reduced frontier defense costs; from the colonists' perspective — especially those who had fought expecting to settle western lands — it rewarded their military service with a prohibition that felt like punishment."}, {"text": "The Proclamation was entirely ignored by both colonists and the British government and had no practical effect on settlement patterns.", "isCorrect": false, "rationale": "The Proclamation was widely evaded in practice, but it was a genuine irritant and a source of colonial grievance — its symbolic effect was real even if enforcement was uneven."}, {"text": "The Proclamation was primarily designed to protect colonial settlements from French attacks that continued after the Peace of Paris.", "isCorrect": false, "rationale": "France had ceded Canada and its eastern territories to Britain by the Peace of Paris; there were no ongoing French attacks. The Proclamation targeted indigenous relations and frontier costs, not French threats."}]}, {"question": "Samuel Adams's labeling of the 1770 Boston shooting as the 'Boston Massacre' is an example of which historical concept?", "options": [{"text": "Primary source evidence that establishes the event as a premeditated British military assault on peaceful colonists", "isCorrect": false, "rationale": "The 'Boston Massacre' label is not objective historical evidence but a propagandistic framing; historians continue to debate the circumstances, and the term was a construction by Adams to maximize political effect."}, {"text": "The use of language and framing as political tools to shape public opinion — a practice historians describe as propaganda", "isCorrect": true, "rationale": "Adams's labeling of the event — British soldiers fired after being taunted by a crowd — as a 'massacre' is precisely the kind of deliberate framing that functions as propaganda, shaping how colonists interpreted the event and building anti-British sentiment."}, {"text": "A neutral historical term accepted by all contemporaries and historians as an accurate description of the event", "isCorrect": false, "rationale": "The source explicitly notes that 'Boston Massacre' is a label 'still contested by historians but undeniably effective as propaganda' — it was not a neutral term accepted by all sides."}, {"text": "An example of the natural rights philosophy of John Locke applied to colonial grievances", "isCorrect": false, "rationale": "Natural rights philosophy informed the broader constitutional argument, but the 'Boston Massacre' label is specifically about political communication and propaganda technique, not Lockean philosophy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
