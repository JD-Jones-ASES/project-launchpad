        <div class="subtitle">AP United States History &mdash; McCarthyism and the Affluent Society</div>
    </div>

    <div id="score-box" class="score-box">

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "McCarthyism is best understood historically as which of the following?", "options": [{"text": "A well-documented legal campaign that successfully prosecuted dozens of Soviet spies within the State Department and military.", "isCorrect": false, "rationale": "McCarthy never produced the list he claimed to hold, and his investigations led to no successful espionage prosecutions; his methods were accusation and innuendo, not legal evidence."}, {"text": "A political phenomenon that exploited genuine Cold War anxieties — the Soviet bomb, the fall of China, and real espionage cases — to destroy careers through guilt by association and suppression of dissent.", "isCorrect": true, "rationale": "The source explicitly defines McCarthyism as a political phenomenon, not a legal proceeding, that exploited real anxieties (Soviet bomb, fall of China, Hiss and Rosenberg cases) to conduct guilt-by-association attacks rather than prosecutions based on evidence."}, {"text": "A bipartisan effort by Congress and the executive branch to remove a small number of confirmed Soviet agents from sensitive positions.", "isCorrect": false, "rationale": "McCarthyism was partisan (led by Republicans against a Democratic administration), targeted far more people than confirmed agents, and relied on accusation rather than evidence."}, {"text": "A temporary aberration from American democratic norms driven entirely by McCarthy's personal psychology, with no structural causes.", "isCorrect": false, "rationale": "The source argues McCarthyism was connected to broader Cold War conformism and to genuine anxieties of the era; reducing it to McCarthy's psychology misses its structural context and the fact that HUAC predated McCarthy by over a decade."}], "id": "q01"}, {"question": "The House Un-American Activities Committee (HUAC) investigations of the Hollywood film industry in 1947 are significant primarily because they", "options": [{"text": "successfully prevented communist propaganda from reaching American movie audiences.", "isCorrect": false, "rationale": "HUAC never demonstrated that any Hollywood films had been used to distribute communist propaganda; the investigations targeted people's associations, not specific films."}, {"text": "demonstrated that the First Amendment provided complete protection against congressional investigation of political beliefs.", "isCorrect": false, "rationale": "The Hollywood Ten were imprisoned for refusing to answer HUAC's questions; their First Amendment defense was rejected by the courts, demonstrating precisely the opposite."}, {"text": "produced a blacklist that barred hundreds of writers, directors, and performers from employment based on political associations rather than evidence of illegal conduct.", "isCorrect": true, "rationale": "The Hollywood Ten's imprisonment and the resulting studio blacklist illustrate McCarthyism's core mechanism: career destruction through political association, not legal process."}, {"text": "were quickly ruled unconstitutional by the Supreme Court, establishing important free-speech protections.", "isCorrect": false, "rationale": "The Supreme Court did not immediately rule HUAC's investigations unconstitutional; the Hollywood Ten were convicted, and the blacklist operated for years without judicial intervention."}], "id": "q02"}, {"question": "Historian John Kenneth Galbraith's description of 1950s America as 'The Affluent Society' pointed to which paradox?", "options": [{"text": "Americans had mastered the production of consumer goods but systematically neglected public goods like schools, parks, and mass transit.", "isCorrect": true, "rationale": "Galbraith's core argument was precisely this paradox: private abundance coexisted with public squalor — Americans were excellent at producing things people could buy but poor at investing in shared goods everyone needed."}, {"text": "The postwar economy was growing rapidly for everyone, eliminating the class and racial disparities of the Depression era.", "isCorrect": false, "rationale": "The source emphasizes that prosperity was real but distributed unequally — African Americans were largely excluded by design from its most transformative benefits, particularly through discriminatory GI Bill implementation and suburban homeownership."}, {"text": "Television advertising had created false material needs that distracted Americans from genuine social priorities.", "isCorrect": false, "rationale": "This is a plausible critique associated with the era, but it mischaracterizes Galbraith's specific argument, which focused on the public-private investment imbalance rather than advertising's manipulation of needs."}, {"text": "The Baby Boom had created more consumer demand than American industry could supply, leading to persistent inflation.", "isCorrect": false, "rationale": "The 1950s economy was not characterized by inflationary shortages; GDP growth was robust at about 3.5% annually. Inflation was not the paradox Galbraith identified."}], "id": "q03"}, {"question": "The GI Bill's most significant structural flaw, from a historical perspective, was that", "options": [{"text": "it provided insufficient education benefits to give veterans meaningful economic opportunities.", "isCorrect": false, "rationale": "The education benefits were transformative — nearly 8 million veterans used them by 1956, producing the best-educated generation in American history. The problem was differential access, not insufficiency."}, {"text": "its race-neutral language was administered through racially discriminatory local institutions — banks and universities — that largely excluded Black veterans from its most transformative benefits.", "isCorrect": true, "rationale": "The GI Bill's formal neutrality was filtered through existing Jim Crow institutions: local banks refused mortgages to Black veterans in redlined neighborhoods; Southern universities refused to admit them. The result systematically deepened the racial wealth gap."}, {"text": "its college benefits were limited to veterans who had seen combat, excluding the majority who served in support roles.", "isCorrect": false, "rationale": "The GI Bill did not limit education benefits to combat veterans; all eligible veterans could access tuition subsidies."}, {"text": "it encouraged veterans to migrate to cities rather than suburbs, increasing urban poverty and straining public services.", "isCorrect": false, "rationale": "The opposite is true — the GI Bill's mortgage subsidies, combined with highway construction, fueled a massive migration from cities to the suburbs."}], "id": "q04"}, {"question": "The Army-McCarthy hearings (1954) proved pivotal in McCarthy's downfall primarily because", "options": [{"text": "they produced conclusive evidence that McCarthy had manufactured his list of suspected communists.", "isCorrect": false, "rationale": "The hearings focused on McCarthy's charges against the Army, not on forensically proving his lists were fabricated; his downfall came from the exposure of his methods, not documentary proof of fraud."}, {"text": "television broadcasts exposed McCarthy's bullying tactics to approximately 20 million viewers, shifting national opinion against him.", "isCorrect": true, "rationale": "The hearings were the first major political event in which television's capacity to reveal character — not just report events — proved decisive. Seeing McCarthy's behavior directly, rather than reading reports of it, changed public opinion in ways print media had not."}, {"text": "President Eisenhower publicly condemned McCarthy, removing the political protection that the Republican Party had previously provided.", "isCorrect": false, "rationale": "Eisenhower famously refused to publicly attack McCarthy, even when McCarthy accused General Marshall; the hearings' impact came from direct public exposure, not executive condemnation."}, {"text": "the Supreme Court ruled that McCarthy's investigative procedures violated the Fifth Amendment rights of witnesses.", "isCorrect": false, "rationale": "The Supreme Court did not intervene to end the hearings; McCarthy's censure came from the Senate, not a court ruling."}], "id": "q05"}, {"question": "Levittown is historically significant as a case study because it demonstrates that", "options": [{"text": "private developers could build affordable housing for working-class families without federal subsidies.", "isCorrect": false, "rationale": "Levittown relied heavily on federal mortgage guarantees and highway subsidies; it was not a purely private market achievement independent of federal support."}, {"text": "federal mortgage subsidies and private developer practices combined to produce racially segregated suburban prosperity — benefiting white families while excluding Black veterans from the same wealth-building opportunities.", "isCorrect": true, "rationale": "Levittown's leases explicitly prohibited sale or rental to non-white residents; federal mortgage guarantees subsidized this arrangement. The result was a systematic transfer of wealth-building opportunity to white families and away from Black families, deepening the racial wealth gap."}, {"text": "postwar suburbanization was primarily a cultural choice driven by American preferences for single-family homes, not by government policy.", "isCorrect": false, "rationale": "Government policy — the GI Bill's mortgage subsidies, the Federal Highway Act, and federal redlining through the HOLC — was central to making suburbanization possible and shaping its racial character."}, {"text": "working-class Americans rejected suburban life in favor of urban neighborhoods with established community ties.", "isCorrect": false, "rationale": "Working-class families, particularly white veterans, flocked to Levittown and similar developments; the appeal of affordable homeownership was powerful."}], "id": "q06"}, {"question": "The Federal-Aid Highway Act of 1956 and the suburbanization it accelerated had which unintended negative consequence?", "options": [{"text": "It created traffic congestion that made automobile commuting impractical for most suburban residents.", "isCorrect": false, "rationale": "Congestion did eventually develop, but the source's point about the Highway Act's costs is specifically about the communities displaced during construction — not long-term traffic outcomes."}, {"text": "Highway construction displaced communities — disproportionately African American and immigrant neighborhoods — that stood in the path of new routes.", "isCorrect": true, "rationale": "The source explicitly states that highways 'displaced communities — disproportionately African American and immigrant neighborhoods — that stood in their path.' Urban highway routing decisions reflected and reinforced racial inequalities."}, {"text": "It committed so much federal funding to transportation that the government could not afford the Marshall Plan's European reconstruction commitments.", "isCorrect": false, "rationale": "The Marshall Plan (1948–52) was completed before the Federal Highway Act (1956); these programs did not compete for funds in the way this option implies."}, {"text": "It concentrated population growth in a few large coastal metropolitan areas, leaving most of the country economically stagnant.", "isCorrect": false, "rationale": "The interstate highway system connected inland metropolitan areas as well as coastal cities; suburbanization was a national phenomenon, not concentrated on the coasts."}], "id": "q07"}, {"question": "The Beat Generation's cultural critique of 1950s America is historically significant primarily because", "options": [{"text": "it directly organized the civil rights movement through its emphasis on interracial social mixing and political protest.", "isCorrect": false, "rationale": "The Beats were cultural critics, not political organizers; the civil rights movement had distinct organizational roots in the Black church and the NAACP, not in Beat literary culture."}, {"text": "it articulated a countercultural critique of postwar conformity and materialism that anticipated the mass political and cultural movements of the following decade.", "isCorrect": true, "rationale": "The source explicitly states that the Beats 'anticipated themes that would explode into mass political and cultural movements in the following decade' — counterculture, campus antiwar movements, and youth rebellion against corporate consumer culture all drew on skepticism the Beats had first voiced."}, {"text": "it produced a mass movement that fundamentally challenged the political dominance of the two-party system.", "isCorrect": false, "rationale": "The Beats were 'a small but culturally significant group'; they did not constitute a mass movement or mount a direct political challenge to the two-party system."}, {"text": "it successfully persuaded television networks to produce programming that reflected the diversity of American experience.", "isCorrect": false, "rationale": "Television in the 1950s moved in the opposite direction — toward sanitized images of white suburban normalcy. The Beats had no discernible influence on 1950s network programming."}], "id": "q08"}, {"question": "The CED Theme connection between the GI Bill's formal racial neutrality and its racially unequal outcomes illustrates which broader historical concept?", "options": [{"text": "That federal programs consistently failed to achieve their stated goals due to bureaucratic inefficiency.", "isCorrect": false, "rationale": "The GI Bill did achieve its stated goal of democratizing homeownership and education — just not equally. The issue is not bureaucratic failure but how institutional design interacts with existing discriminatory structures."}, {"text": "That formally neutral institutions can produce racially unequal outcomes when filtered through existing discriminatory social structures, without requiring explicitly racist intent in the law itself.", "isCorrect": true, "rationale": "The source's CED connection explicitly makes this point: 'formal neutrality filtered through existing discriminatory social structures' produced racialized wealth distribution. This is the institutional racism concept — outcomes diverge from intent when context is discriminatory."}, {"text": "That racial equality in economic policy requires explicit race-conscious programs, not race-neutral approaches.", "isCorrect": false, "rationale": "This is a policy conclusion that some historians draw, but it goes beyond what the source establishes; the source identifies the mechanism by which neutral law produces unequal outcome, not what policy response is required."}, {"text": "That the federal government deliberately designed the GI Bill to exclude Black veterans from its benefits.", "isCorrect": false, "rationale": "The source makes the opposite point: the law's formal language was race-neutral. The exclusion occurred through discriminatory implementation by local institutions, not through explicit racist provisions in the federal statute itself."}], "id": "q09"}, {"question": "The 1950s television landscape — with programs like Ozzie and Harriet offering 'white, suburban, nuclear-family normalcy' — is historically significant because it", "options": [{"text": "accurately reflected the lived experience of the majority of Americans in postwar suburbia.", "isCorrect": false, "rationale": "The source contrasts the 'official image' with 'lived reality' — the television image was specifically noted for reflecting only a portion of American experience while marginalizing the experiences of African Americans, women constrained by domesticity, and others."}, {"text": "helped create a mass consumer culture and reinforced the postwar social consensus while marginalizing the experiences of those it excluded.", "isCorrect": true, "rationale": "The source links television to consumer culture creation and 'nuclear-family normalcy' that 'reflected and reinforced the postwar social consensus' — but the Comparison section notes this consensus was experienced very differently by African Americans, women, and others excluded from it."}, {"text": "provided an important platform for civil rights organizations to reach Northern white audiences sympathetic to desegregation.", "isCorrect": false, "rationale": "1950s network television did not provide platforms for civil rights organizations; the civil rights movement used television instrumentally — broadcasting Southern brutality — but this was in the 1960s and was not network programming designed for that purpose."}, {"text": "displaced newspapers and radio as the primary political information sources, making campaigns more substantive and issue-focused.", "isCorrect": false, "rationale": "The source notes Eisenhower's 1952 campaign was the first to use television advertising, but it describes the medium's political use as reflecting and amplifying image-based politics, not increasing substantive issue focus."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
