<script>
var QUESTIONS = [{"question": "Mikhail Gorbachev introduced glasnost and perestroika beginning in 1985. According to the source, what was the fundamental problem with these reforms that contributed to the Soviet Union's dissolution?", "options": [{"text": "Glasnost opened the Soviet Union to Western culture, which the Soviet military saw as a threat and moved to suppress through a coup.", "isCorrect": false, "rationale": "The August 1991 coup was staged by Communist Party hardliners, not the military specifically; and it was triggered by fear of Gorbachev's reforms broadly, not primarily Western cultural influence from glasnost."}, {"text": "Glasnost permitted the articulation of grievances that had been suppressed for decades and proved uncontainable; perestroika's partial marketization created disruption without delivering compensating gains.", "isCorrect": true, "rationale": "The source explicitly states that Gorbachev 'had tried to reform the Soviet system; instead, he unleashed forces that would dissolve it' — glasnost made suppressed grievances expressible and perestroika created disruption without delivering efficiency gains, together accelerating rather than arresting Soviet decline."}, {"text": "Perestroika's introduction of full market economics produced rapid privatization that destroyed the Communist Party's institutional base within two years.", "isCorrect": false, "rationale": "The source specifically notes that perestroika was a 'partial marketization' and fell 'short of a genuine transition to market economics' — it was too limited, not too radical, and its failure was the lack of sufficient reform rather than too much."}, {"text": "Glasnost was intended to expose Soviet leaders to international criticism, which Gorbachev used deliberately to undermine hardliners within the Communist Party.", "isCorrect": false, "rationale": "The source presents glasnost's unintended consequences — the articulation of nationalist and reform grievances — not a deliberate strategy by Gorbachev to use international criticism against hardliners."}]}, {"question": "The INF Treaty (1987) was described as 'remarkable not just for what it accomplished but for what it signaled.' What did it signal about the Soviet Union under Gorbachev?", "options": [{"text": "That the Soviet Union had achieved nuclear parity with the United States and no longer needed intermediate-range missiles as a deterrent.", "isCorrect": false, "rationale": "The source does not suggest the Soviets concluded from a position of nuclear sufficiency; rather, the treaty emerged from negotiations in which SDI fear gave the United States leverage — suggesting Soviet strategic concerns rather than confident parity."}, {"text": "That the Soviets were willing to make verifiable concessions, including on-site inspections, to reduce nuclear confrontation — confounding hardliners who argued the Soviets could never be trusted.", "isCorrect": true, "rationale": "The source states the INF Treaty was remarkable because it showed 'the Soviet Union under Gorbachev was willing to make genuine concessions, verifiable by on-site inspection' — which 'confounded' American hardliners who had argued Soviets could never be trusted to honor arms agreements."}, {"text": "That the Soviet Union was willing to accept American military superiority permanently, abandoning the goal of strategic parity.", "isCorrect": false, "rationale": "The INF Treaty eliminated a specific weapons class but did not constitute Soviet acceptance of permanent American strategic superiority; negotiations continued on other arms categories, and the treaty was a mutual reduction."}, {"text": "That Reagan's confrontational strategy had failed, requiring both powers to return to the détente framework of the Nixon era.", "isCorrect": false, "rationale": "The INF Treaty was not a return to détente but an arms-control achievement that emerged from Reagan's confrontational posture — the source frames Reagan's INF negotiations as a 'pragmatic adjustment' of his confrontational rhetoric, not an abandonment of it."}]}, {"question": "The fall of the Berlin Wall on November 9, 1989, occurred not because of a planned government decision but because of a 'confused press conference.' Which of the following BEST explains why this matters historically?", "options": [{"text": "It proves that Gorbachev had secretly planned the Wall's fall as part of his glasnost policy, using a staged press conference as cover.", "isCorrect": false, "rationale": "The source describes the press conference as genuinely 'confused' — border guards lacked orders and stood aside as crowds gathered. The source presents the fall as an unintended cascade rather than a planned event."}, {"text": "It illustrates how the Soviet empire's collapse was driven by internal dynamics and popular will rather than solely by American pressure, as crowds acted before any clear governmental authorization.", "isCorrect": true, "rationale": "The source emphasizes that the East German government 'announced at a confused press conference' that travel restrictions were lifted; border guards 'lacking orders, stood aside.' This unplanned sequence demonstrates that ordinary people's actions drove the collapse — not a scripted outcome of American foreign policy."}, {"text": "It demonstrates that the East German government deliberately opened the Wall to allow citizens to flee, hoping to relieve pressure on the regime.", "isCorrect": false, "rationale": "The source describes the announcement as confused and unintended — the government was 'hemorrhaging citizens through Hungary and besieged by mass demonstrations' but did not deliberately plan the Wall's opening as a relief valve."}, {"text": "It shows that NATO military planning for the liberation of East Germany was the decisive factor, since the Wall fell only after NATO reached the border.", "isCorrect": false, "rationale": "The source makes no mention of NATO military planning in connection with the Wall's fall; it was a civilian, political event driven by East German popular mobilization and the absence of Soviet military intervention."}]}, {"question": "Political scientist Francis Fukuyama famously argued in 1989 that liberal democracy's apparent triumph represented 'the end of history.' A historian would most likely critique this argument by noting that:", "options": [{"text": "Fukuyama failed to predict the rise of China as a peer competitor, which proved liberal democracy had a serious systemic rival by the 2010s.", "isCorrect": false, "rationale": "While the rise of China is a relevant development, the source does not invoke it; the source's own framing ('How to use this moment wisely, and whether unipolarity was a durable condition or a temporary transition, were questions the 1990s raised without fully answering') suggests that the unipolarity itself was temporary — the broader critique is that 1991 was a transition, not an endpoint."}, {"text": "The concept confused a temporary transition in which liberal democracy had no peer rival with a permanent end-state, ignoring that unipolarity was likely temporary and that new challenges would emerge.", "isCorrect": true, "rationale": "The source directly frames the unipolar moment as a 'period' and asks 'whether unipolarity was a durable condition or a temporary transition' — questions the 1990s could not fully answer. This framing implies that Fukuyama's triumphalism misread a transitional moment as a permanent endpoint."}, {"text": "Liberal democracy had not actually defeated communism — the Soviet collapse was caused by internal economic failure, not by the ideological superiority of democracy.", "isCorrect": false, "rationale": "This conflates the mechanism of Soviet collapse with the validity of Fukuyama's claim; the source does not suggest Fukuyama was wrong about democracy's appeal but rather that he underestimated how contested and temporary the moment of liberal dominance would prove."}, {"text": "Fukuyama's analysis was factually incorrect because China, Cuba, and North Korea all remained communist states, demonstrating that communism had not actually been defeated.", "isCorrect": false, "rationale": "The source does not invoke surviving communist states as the primary problem with Fukuyama's claim; the critique in the source is about the fragility of unipolarity and the persistence of new challenges — not about the survival of specific communist regimes."}]}, {"question": "The Persian Gulf War of 1991 is described in the source as demonstrating 'what American military power could accomplish under favorable conditions.' What specific conditions made it favorable?", "options": [{"text": "The United States had overwhelming nuclear superiority that deterred any Iraqi retaliation against American forces during the ground campaign.", "isCorrect": false, "rationale": "The source does not attribute the Gulf War's success to nuclear deterrence; the favorable conditions listed are political and operational: a clear legal mandate, genuine coalition, limited objective, and defined exit."}, {"text": "A clear UN Security Council mandate, a genuine thirty-four-nation coalition, a limited and achievable military objective (Kuwait liberation), and a defined exit strategy.", "isCorrect": true, "rationale": "The source explicitly lists these four favorable conditions: 'a clear legal mandate, a genuine coalition, a limited and achievable objective, and a defined exit' — contrasting them implicitly with the more ambiguous conflicts of subsequent years and explicitly with the 2003 Iraq War."}, {"text": "Iraq's military was technologically inferior and had no capacity to defend against American air power, making the outcome certain regardless of political conditions.", "isCorrect": false, "rationale": "The source emphasizes political and strategic conditions rather than purely military technology as the key to the Gulf War's success; and it notes the implicit contrast with the 2003 Iraq War, where military superiority did not prevent a disastrous occupation."}, {"text": "The decision to advance to Baghdad and remove Saddam Hussein ensured regional stability by eliminating the source of instability at its root.", "isCorrect": false, "rationale": "The source explicitly states the *opposite*: 'Bush chose not to advance on Baghdad and remove Saddam Hussein from power — a decision that his son's administration would revisit twelve years later with very different consequences.' The restraint of not advancing was part of what made the Gulf War successful."}]}, {"question": "Clinton's intervention in Somalia (1993) ended in the 'Black Hawk Down' disaster. According to the source, what was the most significant long-term consequence of the American withdrawal?", "options": [{"text": "The Somalia withdrawal forced Congress to pass the War Powers Resolution, establishing clearer rules for future humanitarian interventions.", "isCorrect": false, "rationale": "The War Powers Resolution was passed in 1973, before the Somalia intervention; the source does not describe a congressional response to Somalia in these terms."}, {"text": "It emboldened adversaries — including Osama bin Laden — to view American will as fragile, with consequences that became clear later.", "isCorrect": true, "rationale": "The source states the Somalia withdrawal 'emboldened adversaries—including, as would become clear, Osama bin Laden—to view American will as fragile' — directly linking the 1993 withdrawal to perceptions that contributed to later attacks."}, {"text": "It produced a doctrine of non-intervention that prevented the United States from acting in Bosnia and Kosovo.", "isCorrect": false, "rationale": "The source explicitly notes that Clinton did intervene in Bosnia (1995) and Kosovo (1999) using air power under NATO auspices — Somalia did not produce a blanket non-intervention doctrine."}, {"text": "It led to the Rwandan genocide because the United States, burned by Somalia, refused to intervene in Africa despite clear evidence of mass killing.", "isCorrect": false, "rationale": "While the Somalia experience did influence American non-intervention in Rwanda, the source does not mention Rwanda; this connection, however historically important, goes beyond the source's framing."}]}, {"question": "The source describes the Cold War's end as depriving both American political parties of 'their organizing foreign-policy assumption.' What does this suggest about the relationship between foreign policy and domestic political identity in the 1990s?", "options": [{"text": "Without a Soviet threat to frame American foreign policy, both parties had to reconstruct their foreign-policy identities from scratch, producing uncertainty and debate throughout the decade.", "isCorrect": true, "rationale": "The source states: 'Democrats who had been defined by Cold War liberalism and Republicans who had been defined by anti-communism both had to reconstruct their foreign-policy identities — a realignment that was still in progress when September 11 forced an abrupt clarification.' Both parties lost their organizing framework simultaneously."}, {"text": "The end of the Cold War allowed both parties to focus entirely on domestic issues, producing an era of bipartisan consensus on foreign policy.", "isCorrect": false, "rationale": "The source describes exactly the opposite: uncertainty, disagreement, and unresolved debates about when and how to use American power — not bipartisan consensus or a turn away from foreign policy engagement."}, {"text": "Without the Soviet threat, the Republican Party became isolationist while Democrats became interventionist, reversing the partisan alignment of the Cold War era.", "isCorrect": false, "rationale": "The source describes both parties as uncertain and reconstructing their identities, not as having cleanly swapped their Cold War positions; the 1990s produced faction fights within each party, not a clean partisan reversal."}, {"text": "The end of the Cold War strengthened NATO's role as the primary instrument of American foreign policy, giving both parties a shared institutional anchor.", "isCorrect": false, "rationale": "NATO is mentioned in connection with Bosnia and Kosovo but the source does not describe it as solving the problem of both parties' identity reconstruction; the debates over Bosnia, Kosovo, and Somalia show that NATO's role was itself contested."}]}, {"question": "The August 1991 coup attempt against Gorbachev by Communist Party hardliners failed within three days. According to the source, what was the primary historical consequence of the coup's failure?", "options": [{"text": "The coup's failure led directly to German reunification, as Gorbachev was forced to accept NATO membership for reunified Germany as a condition of Western support.", "isCorrect": false, "rationale": "German reunification had already occurred on October 3, 1990 — over a year before the August 1991 coup. The coup's consequences were related to Soviet dissolution, not German reunification."}, {"text": "The coup's failure discredited the Communist Party and accelerated the dissolution of the Soviet Union, leading to Gorbachev's resignation on December 25, 1991.", "isCorrect": true, "rationale": "The source states the coup 'fatally discrediting the Communist Party,' and Gorbachev resigned on December 25, 1991, the same day the Soviet flag was lowered over the Kremlin for the last time — the sequence the source traces directly."}, {"text": "The coup's failure convinced Gorbachev to accelerate perestroika, launching a full privatization of the Soviet economy that completed the transition to capitalism by 1995.", "isCorrect": false, "rationale": "Gorbachev resigned on December 25, 1991 — weeks after the coup — and the USSR dissolved the same day. He did not have the opportunity or authority to accelerate perestroika after the coup's failure."}, {"text": "The coup's failure enabled Boris Yeltsin to become Soviet Premier, replacing Gorbachev as the leader of the reformed Communist Party.", "isCorrect": false, "rationale": "Yeltsin became president of Russia (a successor state), not Premier of the Soviet Union; the Soviet Union dissolved, and there was no 'reformed Communist Party' taking power — the party was discredited by the coup."}]}, {"question": "NAFTA (1994) and the WTO (1995) are described in the source as Clinton's 'signature foreign-policy initiatives.' Why does the source characterize trade agreements as foreign policy?", "options": [{"text": "Because NAFTA required Mexico and Canada to adopt American labor and environmental standards, making it primarily a regulatory harmonization agreement rather than a trade deal.", "isCorrect": false, "rationale": "NAFTA did not require adoption of American labor and environmental standards — critics argued the opposite, that it allowed companies to relocate to lower-standard environments; the source frames it as deepening 'North American economic integration.'"}, {"text": "Because in the post-Cold War world, economic integration was itself a form of power projection and international ordering — NAFTA and the WTO bound nations into multilateral economic frameworks that served American strategic as well as commercial interests.", "isCorrect": true, "rationale": "The source frames NAFTA as 'deepening North American economic integration' and the WTO as 'binding the United States more tightly to a multilateral trading regime' — both are presented as tools of international ordering characteristic of the unipolar moment, not merely domestic economic measures."}, {"text": "Because NAFTA was negotiated by the State Department rather than the Commerce Department, making trade negotiations legally a form of foreign policy under separation-of-powers doctrine.", "isCorrect": false, "rationale": "The source does not discuss the bureaucratic location of NAFTA negotiations; it frames NAFTA's significance in terms of economic integration and political controversy, not institutional jurisdiction."}, {"text": "Because Clinton used NAFTA to replace the military alliances of the Cold War with economic alliances, making trade the primary tool of American strategic competition.", "isCorrect": false, "rationale": "The source does not describe Clinton as replacing military alliances with trade agreements; NATO remained active (Bosnia, Kosovo), and the WTO was a multilateral economic body, not a strategic alliance substitute."}]}, {"question": "The source describes the 'paradox of unipolarity' as the condition in which the United States was 'the most powerful nation in world history and genuinely uncertain about what it wanted to do with that power.' Which of the following BEST illustrates this paradox?", "options": [{"text": "The United States succeeded in every foreign-policy intervention of the 1990s, demonstrating that unipolarity eliminated strategic constraints.", "isCorrect": false, "rationale": "The source explicitly describes mixed results in Somalia (failure), Bosnia and Kosovo (limited success without durable settlement), and ongoing debates — not uniform success. Unipolarity created power without automatic direction, not guaranteed success."}, {"text": "The United States had the military and economic power to intervene virtually anywhere, yet each intervention (Somalia, Bosnia, Kosovo) produced ambiguous results and generated fierce debate about when and how to use that power.", "isCorrect": true, "rationale": "This captures the paradox precisely: the source notes 'interventions in Somalia, Bosnia, and Kosovo produced mixed results' while 'the decade's debates — when to intervene, under whose authority, with what objectives — were rehearsals for the far more consequential choices that September 11 would force.' Power without clear purpose is the paradox."}, {"text": "The United States chose not to intervene in any international conflict during the 1990s, demonstrating that unipolarity produced isolationism rather than activism.", "isCorrect": false, "rationale": "The source describes multiple interventions — Somalia, Bosnia, Kosovo, Gulf War — not isolation; the 1990s were characterized by contested interventionism, not abstention."}, {"text": "American military power declined after the Cold War as the defense budget was cut, leaving the United States unable to project power effectively during the 1990s.", "isCorrect": false, "rationale": "The source describes the Gulf War as demonstrating 'what American military power could accomplish' and notes the United States 'had the world's largest economy, an unmatched military' — power did not decline; the problem was strategic direction, not capability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
