<script>
var QUESTIONS = [{"question": "William Lloyd Garrison launched The Liberator on January 1, 1831, with this statement: 'I will be as harsh as truth, and as uncompromising as justice... I will not equivocate — I will not excuse — I will not retreat a single inch — AND I WILL BE HEARD.' Which of the following BEST explains what distinguished Garrison's 'immediatism' from earlier antislavery approaches?", "options": [{"text": "Earlier abolitionists had focused exclusively on the South, while Garrison argued slavery was a national problem requiring Northern complicity to be addressed.", "isCorrect": false, "rationale": "While Garrison did argue slavery implicated all Americans, the source identifies immediatism as distinguished from earlier approaches primarily by its demand for immediate, unconditional abolition — as opposed to gradual emancipation and colonization. The geographic focus is not the defining difference the source identifies."}, {"text": "Garrison demanded immediate, unconditional abolition without compensation to slaveholders and without deportation of freed people, rejecting the gradualism and colonization schemes of earlier antislavery efforts.", "isCorrect": true, "rationale": "The source defines immediatism precisely: 'the demand for the immediate, unconditional abolition of slavery without compensation to slaveholders and without deportation of freed people.' Earlier approaches — including the American Colonization Society (1816) — had proposed gradual emancipation and resettlement in Africa, which most enslaved and free Black Americans rejected as racist. Garrison's distinguishing innovation was the rejection of all compromise, delay, and deportation."}, {"text": "Garrison organized enslaved people to resist their enslavers directly, while earlier abolitionists had limited themselves to moral persuasion of white audiences.", "isCorrect": false, "rationale": "The source does not describe Garrison as organizing enslaved resistance. He was a journalist and moral suasion campaigner. The distinction the source identifies is between his immediatism and earlier gradualism, not between organizing enslaved people vs. persuading white audiences."}, {"text": "Garrison was the first American to argue that slavery was morally wrong, while earlier efforts had focused only on its economic inefficiency.", "isCorrect": false, "rationale": "Garrison was far from the first American to argue slavery was morally wrong — Quakers had been making moral arguments against slavery since the 17th century. His innovation was the specific demand structure (immediate, unconditional, no colonization), not the introduction of moral critique."}]}, {"question": "Garrison called the Constitution 'a covenant with death and an agreement with hell.' Which of the following BEST explains the reasoning behind this characterization?", "options": [{"text": "Garrison believed the Constitution's federal structure gave the South too much political power, making it impossible to pass national legislation ending slavery.", "isCorrect": false, "rationale": "While the federal structure did advantage the South, Garrison's specific characterization focused on the Constitution's explicit accommodations of slavery — the Three-Fifths Compromise, the Fugitive Slave Clause, and the protection of the international slave trade until 1808. His objection was to slavery's constitutional enshrinement, not to the balance of federal power."}, {"text": "Garrison argued that the Constitution's explicit accommodations of slavery — the Three-Fifths Compromise, the Fugitive Slave Clause, and the protection of the slave trade until 1808 — made it a founding document of a slave republic, requiring Northern states to separate from the Union rather than remain complicit.", "isCorrect": true, "rationale": "The source explains: Garrison called the Constitution 'a covenant with death and an agreement with hell because of its accommodations of slavery (the Three-Fifths Compromise, the Fugitive Slave Clause, the protection of the international slave trade until 1808).' He burned copies at public meetings and 'called for Northern states to secede from a Union built on slavery.' His target was the document's structural complicity with slavery."}, {"text": "Garrison was making a religious argument that the Constitution violated biblical law by allowing slavery, which God had condemned in the Old Testament.", "isCorrect": false, "rationale": "While Garrison's language was influenced by religious rhetoric ('covenant with death'), the source presents his reasoning as specifically constitutional — focused on the Three-Fifths Compromise, Fugitive Slave Clause, and slave trade protection. His argument was about the document's specific provisions, not a general claim about biblical law."}, {"text": "Garrison opposed the Constitution because it created a strong federal government that could suppress slave rebellions across state lines, making enslaved resistance less likely to succeed.", "isCorrect": false, "rationale": "The source does not present Garrison's objection as being about federal enforcement of slave rebellions. His specific complaint was about the constitutional provisions that accommodated and protected slavery as an institution."}]}, {"question": "Frederick Douglass taught himself to read against his enslavers' explicit prohibition. The source describes this as 'the first step toward freedom.' Which of the following BEST explains why literacy was so threatening to the slave system?", "options": [{"text": "Literate enslaved people could forge documents — free papers, passes, and ownership records — that made escape more feasible and legal ownership more difficult to enforce.", "isCorrect": true, "rationale": "While the source does not detail this specific mechanism, it does note that Douglass escaped by 'disguised as a free Black sailor, borrowing the documents of a friend' — a process that presupposed the ability to use documents. The source's description of literacy as 'the first step toward freedom' encompasses both the cognitive liberation and the practical escape capacity that literacy enabled."}, {"text": "Literacy gave enslaved people access to Northern antislavery newspapers and legal documents proving their natural rights, leading directly to collective uprisings.", "isCorrect": false, "rationale": "The source does not describe literacy as directly producing collective uprisings. Douglass's own path from literacy to freedom was individual — self-education, escape, then public advocacy — not a collective uprising."}, {"text": "Literacy was threatening because it gave enslaved people access to abolitionist literature and legal arguments that they could share with others, building community resistance and undermining the ideological claim that enslaved people were incapable of self-governance.", "isCorrect": true, "rationale": "The source notes that enslavers explicitly prohibited Douglass from reading — recognizing literacy as subversive. Douglass himself later analyzed how slavery 'systematically' kept enslaved people ignorant. The source describes his Narrative as both a 'foundational text of American literature' and a tool of political persuasion — demonstrating that literacy enabled exactly the kind of testimony and argumentation that undermined the system's ideological foundations."}, {"text": "Literacy made enslaved people economically valuable enough to be hired out to businesses that required skilled labor, enabling them to accumulate earnings for self-purchase.", "isCorrect": false, "rationale": "The source does not describe literacy as a path to self-purchase through skilled hired labor for Douglass. His escape was through disguise and borrowed documents, not through accumulated earnings. The source presents literacy primarily as intellectual liberation and a step toward self-determination."}]}, {"question": "Read the following description: 'Her 1851 speech challenged the ideology of female fragility that underpinned both the defense of slavery and the limits on women's rights: she had worked as hard, borne as much, and suffered as greatly as any man, yet was told she needed to be protected and deferred to.' This description refers to which figure, and which of the following BEST explains the argument she made?", "options": [{"text": "Elizabeth Cady Stanton; she argued that white middle-class women's domestic refinement made them morally superior to men and therefore deserving of equal rights.", "isCorrect": false, "rationale": "The description references physical labor, hardship, and suffering — characteristics of Sojourner Truth's life and argument, not Stanton's domestic middle-class experience. Stanton's argument drew on legal and natural rights philosophy, not personal testimony of physical labor."}, {"text": "Sojourner Truth; she challenged the ideology of female fragility by testifying from her own experience as a formerly enslaved Black woman who had worked and suffered at least as hard as any man, exposing the ideology as specific to white middle-class women's experience and inapplicable to hers.", "isCorrect": true, "rationale": "The source describes Sojourner Truth's 'Ain't I a Woman?' speech (1851): she 'challenged the ideology of female fragility that underpinned both the defense of slavery and the limits on women's rights: she had worked as hard, borne as much, and suffered as greatly as any man, yet was told she needed to be protected.' This exposed the cult of domesticity as applicable only to privileged white women — an argument that intersected racial and gender critique simultaneously."}, {"text": "Lucretia Mott; she argued from her Quaker tradition that women's spiritual equality with men required their political equality as well.", "isCorrect": false, "rationale": "While Mott was an important figure who co-organized the Seneca Falls Convention, the specific description — working as hard, bearing as much, suffering as greatly as any man — refers to Sojourner Truth's personal testimony from experience as an enslaved woman, not Mott's Quaker theological argument."}, {"text": "Harriet Beecher Stowe; she argued that women's experience of domestic suffering gave them special empathy for enslaved people's suffering, connecting female moral authority to abolitionist politics.", "isCorrect": false, "rationale": "Stowe is not described in this section. The description clearly matches Sojourner Truth's 1851 speech combining personal testimony about physical labor and suffering with a challenge to the ideology of female fragility."}]}, {"question": "Lucretia Mott and Elizabeth Cady Stanton were barred from the floor of the World Anti-Slavery Convention in London (1840) because of their sex. According to the source, what was the significance of this experience?", "options": [{"text": "It caused Mott and Stanton to abandon the abolitionist movement and focus entirely on women's rights, since they concluded that male abolitionists were no different from slaveholders in their treatment of women.", "isCorrect": false, "rationale": "The source does not describe Mott and Stanton abandoning abolitionism. Both continued as abolitionists; the London exclusion crystallized a connection between the two causes, not a choice between them. Mott and Stanton remained committed to both."}, {"text": "It crystallized for Mott and Stanton the connection between abolitionist arguments for human equality and the arguments that could be made for women's rights — the same reasoning that condemned slavery could condemn women's political exclusion.", "isCorrect": true, "rationale": "The source states: 'The humiliation crystallized for them the connection between the arguments they made against slavery and the arguments that could be made for women's rights.' Being excluded from an antislavery convention because of their sex demonstrated the logic they would apply at Seneca Falls: if all human beings have equal rights, that principle cannot stop at gender any more than at race."}, {"text": "It discredited the World Anti-Slavery Convention in the eyes of American abolitionists, causing the American Anti-Slavery Society to break ties with British antislavery organizations.", "isCorrect": false, "rationale": "The source does not describe the London exclusion as producing a break between American and British antislavery organizations. The significance was personal and intellectual — shaping Mott and Stanton's consciousness — not organizational."}, {"text": "It proved that women could not lead the abolitionist movement and needed men as their public advocates, leading to a strategic restructuring of women's abolitionist roles.", "isCorrect": false, "rationale": "The opposite conclusion was drawn: the exclusion sharpened Mott and Stanton's commitment to women's public leadership and directly motivated the Seneca Falls Convention, which was organized and led by women. The source presents the London exclusion as radicalizing, not constraining."}]}, {"question": "The Seneca Falls Declaration of Sentiments adapted Jefferson's 'all men are created equal' to 'all men and women are created equal.' Which of the following BEST explains this rhetorical strategy and its effect?", "options": [{"text": "The adaptation claimed that Jefferson had originally intended to include women and that a drafting error in 1776 had produced the exclusion, which the Declaration of Sentiments was correcting.", "isCorrect": false, "rationale": "The source presents the Declaration of Sentiments as a deliberate rhetorical intervention, not a correction of a historical drafting error. Stanton was challenging the document's exclusion of women, not claiming Jefferson intended to include them."}, {"text": "By using Jefferson's language and logic while inserting women explicitly, Stanton challenged Americans to take their own founding principles seriously — demonstrating that the republic's stated ideals of human equality were being applied selectively, with women's exclusion requiring special justification within the framework Americans claimed to honor.", "isCorrect": true, "rationale": "The source describes Stanton's rhetorical strategy: the Declaration of Sentiments was 'a deliberate echo of Jefferson's Declaration of Independence' that adapted the language to include women and replaced colonial grievances with grievances about men's legal domination of women. The strategy forced Americans to either acknowledge the inconsistency or justify women's exclusion on grounds that contradicted their professed principles — turning the founding text against itself."}, {"text": "The adaptation was primarily literary rather than political — Stanton chose Jefferson's language for its rhetorical power without expecting it to have practical political effects at the convention.", "isCorrect": false, "rationale": "The source presents the Declaration of Sentiments as a thoroughly political document with immediate practical goals: the convention adopted 12 resolutions, including the controversial suffrage demand. The choice of Jeffersonian language was strategic political rhetoric, not merely literary."}, {"text": "By invoking the Declaration of Independence, Stanton was arguing that women's rights were guaranteed by the Constitution and that existing laws denying those rights were unconstitutional, requiring only judicial enforcement.", "isCorrect": false, "rationale": "The Declaration of Sentiments was not a constitutional legal argument seeking judicial enforcement — it was a political manifesto seeking social and legislative change. The Founders' Declaration was itself extra-legal political rhetoric; Stanton was using it in the same register."}]}, {"question": "The House of Representatives passed a 'gag rule' in 1836 automatically tabling antislavery petitions without debate. Which of the following BEST explains how this backfired against the pro-slavery interest?", "options": [{"text": "The gag rule prevented antislavery petitions from reaching the Senate, where they would have found majority support, effectively blocking abolitionist legislation.", "isCorrect": false, "rationale": "There is no evidence in the source that antislavery petitions would have found Senate majority support in 1836. The gag rule backfired in a different way: by restricting the right of petition, it made antislavery a First Amendment issue that Northern voters who were indifferent to slavery's morality could nonetheless find compelling."}, {"text": "By tabling antislavery petitions as a free speech restriction, the gag rule transformed slavery from a moral issue only abolitionists cared about into a First Amendment issue that Northern voters who cared nothing about slavery's morality could oppose on free speech grounds — expanding the antislavery coalition.", "isCorrect": true, "rationale": "The source explains: 'The antislavery petition campaign led Congress to adopt the gag rule (1836–44), making antislavery itself a free-speech and First Amendment issue that Northern voters who were indifferent to slavery's morality could nonetheless find compelling.' The gag rule accidentally expanded the antislavery coalition by converting a moral argument into a constitutional rights argument with broader appeal."}, {"text": "The gag rule was ruled unconstitutional by the Supreme Court in 1840, establishing the First Amendment right to petition Congress on slavery questions.", "isCorrect": false, "rationale": "The source does not describe a Supreme Court ruling striking down the gag rule. The rule lasted from 1836 to 1844, when former president John Quincy Adams finally succeeded in getting it repealed through persistent parliamentary maneuvering — not through judicial invalidation."}, {"text": "The gag rule forced abolitionists to organize at the state level, creating a network of state antislavery organizations that eventually formed the basis of the Republican Party.", "isCorrect": false, "rationale": "While state-level antislavery organizing did develop, the source does not describe this as the specific consequence of the gag rule. The source's point is about how the gag rule broadened the antislavery coalition by making it a First Amendment issue."}]}, {"question": "Frederick Douglass spoke in favor of the women's suffrage resolution at the Seneca Falls Convention. The source notes that Douglass and Stanton 'drew on the same arguments.' Which of the following BEST explains the connection Douglass drew between abolition and women's rights?", "options": [{"text": "Douglass supported women's suffrage primarily as a strategic alliance: if women gained the vote, they could elect abolitionist candidates more easily.", "isCorrect": false, "rationale": "The source presents Douglass's support as rooted in shared principles — the same universalist reasoning — not primarily in strategic electoral calculation. The source describes both movements as using 'the Declaration of Independence as their founding text' and confronting 'the same fundamental contradiction.'"}, {"text": "Both abolition and women's rights shared the same universalist logic: if human beings are endowed with equal rights by nature, then those rights cannot be withheld based on race or sex — and a republic that claimed to honor human equality while excluding women from the vote was guilty of the same fundamental hypocrisy as one that excluded Black Americans from freedom.", "isCorrect": true, "rationale": "The source explains: 'Both movements used the Declaration of Independence as their founding text — Garrison against slavery's existence, Stanton against women's legal subordination — and both confronted the same fundamental contradiction: a republic founded on the claim that all men are created equal had excluded most of humanity from the equality it proclaimed.' Douglass recognized that the universalist logic of abolition applied equally to women's rights."}, {"text": "Douglass supported women's suffrage because the abolitionist movement needed women's organizational networks, and endorsing their cause would secure their continued support for abolition.", "isCorrect": false, "rationale": "The source does not present Douglass's endorsement as organizational calculation. Douglass is presented as recognizing the principled connection between the two causes — the universalist logic of human equality that both movements shared."}, {"text": "Douglass viewed women's suffrage as less important than abolition and supported it only reluctantly to avoid fracturing the reform coalition around the Seneca Falls Convention.", "isCorrect": false, "rationale": "The source presents Douglass as actively rising to speak in favor of the suffrage resolution, which 'passed narrowly' with his help. His support is presented as genuine advocacy, not reluctant coalition management."}]}, {"question": "The American Anti-Slavery Society (1833) within five years had 'more than a thousand local chapters and over a hundred thousand members.' Which of the following BEST explains what made the Society's growth possible in this period?", "options": [{"text": "The Society grew rapidly because the federal government actively supported abolitionism, passing laws that required Northern states to host antislavery meetings.", "isCorrect": false, "rationale": "The opposite is true: the federal government was generally hostile to abolitionism in this period, with Southern influence in Congress producing the gag rule (1836). The Society's growth was achieved despite federal resistance, not through federal support."}, {"text": "The organizational techniques pioneered by the temperance movement — mass petitions, tract distribution, lecture tours, local chapter structures — provided a ready-made model that the American Anti-Slavery Society adopted and scaled, while the perfectionist theology of the Second Great Awakening provided the moral framework.", "isCorrect": true, "rationale": "The source describes the Society's methods: 'organized petition campaigns, printed and distributed antislavery literature, sponsored lecture tours, and worked to convince Northern public opinion that slavery was a moral evil.' These techniques were the same tools that the temperance movement had pioneered. The organizational infrastructure of the reform era made rapid growth possible."}, {"text": "The Society's growth was driven primarily by free Black Americans in Northern cities who organized local chapters as a response to increasing race violence and discrimination.", "isCorrect": false, "rationale": "While free Black Americans were important participants in abolitionism, the source does not present the Society's rapid growth as primarily driven by free Black organizing in response to race violence. The Society was founded by Garrison and the Tappan brothers; its growth involved both Black and white antislavery activists."}, {"text": "The Society grew rapidly because the invention of the telegraph allowed real-time communication between chapters across the country, enabling coordinated national campaigns.", "isCorrect": false, "rationale": "The telegraph was not commercially available in 1833 (Samuel Morse sent the first successful telegraph message in 1844). The Society's growth was achieved through printed tracts, lecture tours, and postal campaigns — the organizational tools of the pre-telegraph era."}]}, {"question": "A student argues: 'The abolitionist and women's rights movements failed because neither achieved its goals before the Civil War.' A historian would most likely revise this claim by noting that:", "options": [{"text": "Both movements fully achieved their goals before the Civil War through state-level legislation, making the Civil War unnecessary for the liberation they sought.", "isCorrect": false, "rationale": "Neither movement achieved its central goals before the Civil War. Slavery was not abolished until the 13th Amendment (1865); women's suffrage was not achieved until the 19th Amendment (1920). The Civil War was necessary for abolition, and decades more of struggle were required for women's suffrage."}, {"text": "While neither movement achieved its ultimate goals before the Civil War, they succeeded in building the organizational infrastructure, developing the moral arguments, and expanding the antislavery coalition that made the Civil War's emancipatory outcomes possible — and the Civil War itself was the next act in the drama they had set in motion.", "isCorrect": true, "rationale": "The source concludes: 'Both would ultimately require the Civil War to transform aspiration into law.' But the movements had not failed — they had built the ideas, organizations, and political pressure that shaped what the Civil War would mean and what its aftermath would require. The Seneca Falls Declaration's women's rights demands waited 72 years for the 19th Amendment, but the movement it launched did not fail; it was the beginning of a longer arc."}, {"text": "The abolitionist movement failed, but the women's rights movement succeeded immediately: the Seneca Falls Convention's Declaration of Sentiments was adopted as federal law within a decade.", "isCorrect": false, "rationale": "The Declaration of Sentiments was not adopted as federal law. Women's suffrage required until 1920 (19th Amendment); many of the legal reforms the Declaration demanded (property rights, contract rights, custody rights) required decades of state-by-state legislative change."}, {"text": "Both movements are properly described as failures because they relied on moral suasion rather than political power, and moral suasion can never produce lasting institutional change.", "isCorrect": false, "rationale": "This claim contradicts both the historical record and the source's argument. Moral suasion campaigns contributed to shifting Northern public opinion on slavery and building the coalition that elected Lincoln in 1860. The source does not endorse the view that moral suasion is inherently ineffective."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
