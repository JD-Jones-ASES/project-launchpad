<script>
var QUESTIONS = [{"question": "The Knights of Labor and the American Federation of Labor differed most fundamentally in which of the following ways?", "options": [{"text": "The Knights focused exclusively on political lobbying, while the AFL relied entirely on collective bargaining and strikes", "isCorrect": false, "rationale": "Both organizations used a mix of political and economic tactics. The Knights pursued cooperatives and political reform alongside strikes; the AFL focused primarily on collective bargaining but also lobbied Congress."}, {"text": "The Knights organized workers across craft, racial, and gender lines seeking economic transformation, while the AFL organized only skilled craft workers seeking higher wages and shorter hours within capitalism", "isCorrect": true, "rationale": "The source explicitly contrasts the two: the Knights were inclusive (across craft, racial, and gender lines) and sought cooperative transformation of capitalism; the AFL organized only skilled craft workers and pursued 'pure and simple' trade unionism — higher wages, shorter hours, better conditions — without political radicalism."}, {"text": "The Knights sought an eight-hour workday, while the AFL opposed hour restrictions as government interference with workers' freedom of contract", "isCorrect": false, "rationale": "Both organizations sought an eight-hour workday; it was the AFL's 'signature demand.' The AFL did not oppose hour restrictions on libertarian grounds — that was the employers' argument, not labor's."}, {"text": "The AFL admitted Black, immigrant, and female workers on equal terms, while the Knights maintained explicit membership restrictions by race and gender", "isCorrect": false, "rationale": "The reverse is closer to the truth: the Knights admitted Black workers, women, and workers across craft lines, though Southern assemblies maintained de facto segregation. The AFL explicitly excluded unskilled workers, recent immigrants, and Black workers."}], "id": "q01"}, {"question": "Read the following excerpt from Andrew Carnegie's Gospel of Wealth (1889): 'The man who dies thus rich dies disgraced.' A labor historian studying this document alongside the Homestead Strike of 1892 would MOST likely argue that:", "options": [{"text": "Carnegie's philanthropic commitments genuinely tempered his conduct as an employer, making him more willing to negotiate with the Amalgamated union than his more conservative peers", "isCorrect": false, "rationale": "Carnegie approved the wage cuts that precipitated Homestead and was absent in Scotland during the crisis — his philanthropic commitments did not moderate his conduct as an employer. The source explicitly frames Homestead as exposing the 'gap between his published ideals and his industrial practice.'"}, {"text": "The Gospel of Wealth's stewardship rhetoric served to defend industrial concentration and forestall redistribution while Carnegie's actual industrial conduct — including approving Homestead wage cuts and hiring Pinkertons — exposed the gap between his published philosophy and his practice", "isCorrect": true, "rationale": "The source frames the Gospel of Wealth as written to 'defend industrial concentration by recasting the wealthy as stewards rather than exploiters' and explicitly notes that 'his conduct at Homestead (1892), where he approved wage cuts that precipitated a violent strike, exposed the gap between his published ideals and his industrial practice.'"}, {"text": "Carnegie's essay was a sincere expression of class guilt that motivated his later philanthropy but had no effect on his actual business decisions", "isCorrect": false, "rationale": "The source presents the Gospel as ideologically purposeful — defending concentration, forestalling government redistribution — not merely as personal guilt. And his philanthropy came after he sold Carnegie Steel in 1901, not during his active career."}, {"text": "The Gospel of Wealth represented a working-class ideological victory because Carnegie acknowledged that the 'problem of our age is the proper administration of wealth'", "isCorrect": false, "rationale": "Acknowledging a problem while proposing that the wealthy themselves solve it on their own terms is not a working-class victory. The source treats this framing as a defense mechanism for capital, not a concession to labor."}], "id": "q02"}, {"question": "The Great Railroad Strike of 1877 established an important precedent in American labor relations. Which of the following BEST identifies that precedent?", "options": [{"text": "Workers could successfully use sympathy boycotts to extend local strikes into national actions, forcing federal intervention on labor's behalf", "isCorrect": false, "rationale": "The 1877 strike was broken by federal troops deployed against labor, not on labor's behalf. The Pullman Strike (1894) established the sympathy boycott as a tactic — and the federal injunction as the instrument used to suppress it."}, {"text": "Federal troops could be deployed against striking workers, establishing the federal government's willingness to use military force as the instrument of capital against labor", "isCorrect": true, "rationale": "The source states this explicitly: President Hayes 'used federal troops to break the strike — the first use of federal military force against a labor action — setting a precedent that would be repeated for the next two decades.'"}, {"text": "Railroad companies would negotiate with worker representatives when faced with paralyzing strikes, establishing collective bargaining as the norm in the railroad industry", "isCorrect": false, "rationale": "The 1877 strike ended with federal troops breaking the action, not with collective bargaining. The railroad industry remained resistant to collective bargaining for decades."}, {"text": "State militias were constitutionally prohibited from intervening in labor disputes under the federal commerce clause, making federal troop deployment the only legitimate response to strikes", "isCorrect": false, "rationale": "State militias were extensively used in labor disputes throughout the Gilded Age (most notably, 8,500 National Guard troops at Homestead in 1892). No such constitutional prohibition existed."}], "id": "q03"}, {"question": "The Haymarket Riot of 1886 had its most damaging effect on labor organizing through which of the following mechanisms?", "options": [{"text": "The riot produced congressional legislation banning all labor strikes in industries engaged in interstate commerce", "isCorrect": false, "rationale": "No such legislation resulted from Haymarket. The event's primary damage to labor was reputational — creating a lasting public association between labor organizing and radical violence — not through new statutory prohibitions."}, {"text": "The bombing created a lasting public association between labor organizing and radical violence that employers and conservative politicians exploited for decades, helping destroy the Knights of Labor's momentum", "isCorrect": true, "rationale": "The source states explicitly that 'the Haymarket affair created a lasting association in the public mind between labor organizing and radical violence that employers and conservative politicians exploited for decades' and that the Knights' 'rapid decline followed the Haymarket Riot of 1886, with which they were unfairly but effectively associated.'"}, {"text": "The anarchists convicted in the Haymarket trial were leaders of the Knights of Labor, whose imprisonment removed the organization's national leadership", "isCorrect": false, "rationale": "The eight arrested were anarchist labor leaders, not specifically Knights of Labor officers. The association was reputational (the public linked Haymarket to the Knights), not organizational."}, {"text": "The Supreme Court's Haymarket ruling established that workers who participated in labor rallies could be held collectively responsible for any violence that occurred", "isCorrect": false, "rationale": "The Haymarket prosecutions occurred in Illinois state courts, not the Supreme Court. The legal doctrine applied was conspiracy, not collective responsibility at rallies — and the evidence of defendants' connection to the bombing was widely considered insufficient."}], "id": "q04"}, {"question": "The Pullman Strike of 1894 produced 'government by injunction' — a legal doctrine that labor activists would fight against for the next three decades. What did this doctrine permit?", "options": [{"text": "Federal courts could declare any labor union an illegal combination in restraint of trade and order its immediate dissolution", "isCorrect": false, "rationale": "Government by injunction was more targeted than blanket dissolution orders. Courts could issue injunctions against specific strike actions — prohibiting workers from refusing to handle struck goods — and jail union leaders for contempt without criminal trial."}, {"text": "Federal courts could issue injunctions ordering striking workers to return to work or face imprisonment for contempt of court, without a jury trial, whenever a strike affected interstate commerce", "isCorrect": true, "rationale": "The source describes this: the Cleveland administration obtained 'a federal court injunction against the strike'; Debs was 'arrested and jailed for contempt of court'; and the Supreme Court upheld the injunction in In re Debs (1895), 'establishing the government by injunction pattern that labor activists would fight against for the next three decades.'"}, {"text": "State governors could deputize private Pinkerton agents as official law enforcement officers, allowing companies to use lethal force against strikers with legal immunity", "isCorrect": false, "rationale": "Pinkerton agents were private; their deployment at Homestead was done under private contract, not state deputization. The injunction doctrine operated through federal courts, not state executive action."}, {"text": "The President could send federal troops to break any strike without the consent of the affected state's governor, overriding state authority in labor disputes", "isCorrect": false, "rationale": "Cleveland sent federal troops to Illinois over Governor Altgeld's explicit objection — but the legal basis was the injunction and the federal interest in mail delivery, not a general principle that presidential troops could override gubernatorial authority."}], "id": "q05"}, {"question": "The Homestead Strike of 1892 is significant for which of the following reasons, according to the source?", "options": [{"text": "It resulted in a landmark federal court ruling that private companies could not use armed mercenaries against workers engaged in legal strikes", "isCorrect": false, "rationale": "No such ruling resulted from Homestead. After the strike collapsed, Carnegie Steel remained unorganized for four decades. Pinkerton use was politically controversial but not ruled illegal by the courts."}, {"text": "The strike collapsed after Pennsylvania National Guard troops escorted strikebreakers, the union was destroyed, and Carnegie Steel remained unorganized for four decades — demonstrating the state's consistent role as capital's ally against labor", "isCorrect": true, "rationale": "The source describes exactly this outcome: the Pennsylvania governor's 8,500 National Guard troops ended the siege, strikebreakers were escorted in, 'and by November the strike had collapsed and the union was destroyed at Homestead. Carnegie Steel would remain unorganized for the next four decades.'"}, {"text": "Carnegie personally negotiated a settlement with the Amalgamated union that established the principle of collective bargaining in the steel industry", "isCorrect": false, "rationale": "Carnegie was absent in Scotland; his deputy Frick 'negotiated in bad faith' and then announced a lockout. No settlement with the union occurred — the strike was broken and the union destroyed."}, {"text": "The arrival of Pinkerton agents was ruled unconstitutional under the 13th Amendment's prohibition on involuntary servitude, because workers were being forced from their jobs at gunpoint", "isCorrect": false, "rationale": "No such constitutional ruling was made at Homestead. The 13th Amendment argument was not successfully applied to Pinkerton deployment, which remained a legal (if politically toxic) tool of industrial management."}], "id": "q06"}, {"question": "The AFL's exclusion of unskilled workers, recent immigrants, and Black workers from membership is described in the source as 'sacrificing solidarity for effectiveness.' Which of the following BEST explains the trade-off this phrase describes?", "options": [{"text": "The AFL sacrificed the political goal of labor party formation in order to focus more effectively on Republican Party lobbying for tariff protections that benefited skilled workers", "isCorrect": false, "rationale": "The AFL's 'solidarity for effectiveness' trade-off was about membership exclusivity (skilled vs. unskilled), not political party strategy. Gompers famously maintained political non-partisanship — rewarding labor's friends and punishing its enemies regardless of party."}, {"text": "By organizing only skilled workers whose labor was difficult to replace, the AFL maintained genuine bargaining leverage at the cost of leaving the majority of the industrial workforce — unskilled, immigrant, and Black workers — unrepresented", "isCorrect": true, "rationale": "The source explicitly describes this trade-off: 'By organizing only the skilled workers whose labor could not easily be replaced, the AFL gave its member unions genuine bargaining leverage…By explicitly excluding unskilled workers, recent immigrants, and Black workers…the AFL sacrificed solidarity for effectiveness, a trade-off that would define and divide American labor for the next half century.'"}, {"text": "The AFL accepted lower wage demands in collective bargaining in exchange for employer recognition of union contracts, sacrificing immediate economic gains for long-term organizational stability", "isCorrect": false, "rationale": "This describes contract negotiation tactics, not the structural membership exclusion the 'solidarity for effectiveness' phrase describes. The AFL's trade-off was about who was admitted, not what was bargained for."}, {"text": "The AFL endorsed Republican candidates for office in exchange for favorable labor legislation, sacrificing political independence for the effectiveness of legislative action", "isCorrect": false, "rationale": "This describes a political strategy trade-off, not the membership-exclusion trade-off the source discusses. Gompers maintained political non-partisanship, not Democratic or Republican alignment."}], "id": "q07"}, {"question": "The source states that 'industrial capitalism's class conflict was always simultaneously a conflict along racial and ethnic fault lines.' Which of the following BEST illustrates this observation?", "options": [{"text": "The AFL and Knights of Labor cooperated in joint strikes, demonstrating that organized labor could overcome racial divisions when economic interests aligned", "isCorrect": false, "rationale": "The source describes division, not cooperation, between the AFL and Knights — and notes that employers deliberately used racial and ethnic divisions to prevent working-class solidarity. No systematic AFL-Knights joint strike cooperation is described."}, {"text": "Employers deliberately used Black, immigrant, and Chinese strikebreakers to prevent working-class solidarity across ethnic lines, and the AFL's exclusion of non-white and immigrant workers deepened these divisions", "isCorrect": true, "rationale": "The source explicitly identifies these two reinforcing mechanisms: 'employers' deliberate use of Black, immigrant, and Chinese strikebreakers to prevent working-class solidarity across ethnic lines' and the AFL's exclusion of unskilled and immigrant workers — together creating a structure that 'weakened labor and strengthened capital throughout the Gilded Age.'"}, {"text": "Black workers formed separate union chapters that were formally affiliated with the AFL but paid lower dues and received proportionally less bargaining support", "isCorrect": false, "rationale": "Black workers were explicitly excluded from the AFL, not admitted to separate chapters with lower dues. The source describes exclusion, not differential membership terms."}, {"text": "The Knights of Labor's racial integration program successfully united Black and white workers in the South, creating a multiracial coalition that survived the Haymarket backlash and continued into the 1890s", "isCorrect": false, "rationale": "The source notes that 'Southern assemblies maintained de facto segregation' within the Knights, and the organization collapsed to a shadow of its peak strength by 1890. Southern racial integration within the Knights was nominal, not achieved."}], "id": "q08"}, {"question": "The doctrine of 'liberty of contract' was used by courts in the Gilded Age to limit labor legislation. What was the core argument of this doctrine?", "options": [{"text": "Workers had a constitutional right to bargain collectively, which states could not abridge by requiring arbitration of labor disputes", "isCorrect": false, "rationale": "Liberty of contract was used against labor, not for it. The doctrine argued that workers and employers were equal parties to voluntary negotiations; it was used to strike down protective legislation, not to protect collective bargaining rights."}, {"text": "Workers and employers were formally equal parties freely negotiating wages, making labor protective legislation an unconstitutional interference with voluntary contract", "isCorrect": true, "rationale": "The source describes liberty of contract as 'the idea that workers and employers were equal parties freely negotiating wages,' which made 'labor protective legislation constitutionally suspect.' The doctrine ignored the actual power imbalance between individual workers and industrial employers."}, {"text": "Contracts between corporations and workers were governed exclusively by federal commerce law, making state labor regulations unconstitutional interference with interstate commerce", "isCorrect": false, "rationale": "The source does not describe liberty of contract as primarily a commerce clause argument. It was a substantive due process argument — courts found labor laws unconstitutional because they infringed on the right to contract."}, {"text": "Workers who joined unions voluntarily gave up their individual liberty of contract, making union membership agreements enforceable but making strikes a breach of contract with criminal penalties", "isCorrect": false, "rationale": "Liberty of contract was typically invoked to strike down protective legislation (minimum wage, maximum hours), not to criminalize strikes per se. Strikes were criminalized under conspiracy doctrine and the Sherman Act, not liberty of contract."}], "id": "q09"}, {"question": "A historian argues: 'The Gilded Age United States had the most active labor movement in the industrial world in the 1880s yet developed the weakest union infrastructure by the early twentieth century.' Which of the following BEST explains this paradox?", "options": [{"text": "The AFL's conservative leadership negotiated too many concessions to employers, gradually eroding union membership through agreements that satisfied workers' immediate demands without building long-term organizational strength", "isCorrect": false, "rationale": "The AFL's conservatism was real, but the paradox the source identifies is explained by the combination of employer power, state violence, and judicial hostility — not by AFL negotiating failures."}, {"text": "The combined weight of employer power (blacklists, Pinkertons), state violence (federal troops, injunctions), judicial hostility (Sherman Act against unions, liberty of contract), and racial-ethnic divisions that employers deliberately exploited suppressed the labor movement despite its activity", "isCorrect": true, "rationale": "The source explicitly identifies these factors: 'The combined weight of employer power, state violence, and judicial hostility explains why the United States, which had the most active labor movement in the industrial world in the 1880s, also developed the weakest union infrastructure by the early twentieth century.'"}, {"text": "Immigration from southern and eastern Europe so rapidly increased labor supply that workers could not maintain strike leverage, as employers always had an inexhaustible pool of replacement workers available", "isCorrect": false, "rationale": "Immigration did affect labor markets, but the source identifies the specific institutional mechanisms — employer blacklists, state troops, federal injunctions, and judicial doctrine — as the primary explanation, not simply labor-supply pressure."}, {"text": "The AFL's decision to exclude political radicalism from its program alienated the socialist workers who formed the backbone of the most effective European labor movements, leaving American unions ideologically weakened", "isCorrect": false, "rationale": "European labor movement strength relative to American is a real historical comparison, but the source's explanation for American weakness is structural and coercive, not ideological. The AFL's pragmatic conservatism is presented as a response to an inhospitable environment, not its cause."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
