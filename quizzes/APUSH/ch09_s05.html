<script>
var QUESTIONS = [{"question": "The source states that the Census Bureau projected non-Hispanic whites would become a minority of the U.S. population 'sometime in the 2040s — a projection that carried significant political resonance before most of its demographic effect had arrived.' This framing BEST illustrates which of the following analytical concepts?", "options": [{"text": "That demographic change is always the most important driver of political realignment, as changing populations produce changing electorate preferences.", "isCorrect": false, "rationale": "The source does not claim demographic change is always the most important driver; it specifically notes that the *projected* change produced political resonance even before the demographic reality arrived — suggesting that perception and anxiety about change matter as much as the change itself."}, {"text": "That the anticipation of demographic change can produce political mobilization and backlash before the demographic change itself is fully realized — perceptions of change can be as politically consequential as change itself.", "isCorrect": true, "rationale": "The source's framing — 'significant political resonance before most of its demographic effect had arrived' — explicitly captures this dynamic: political actors responded to a future projection, not a present reality, suggesting that anticipated demographic change drove political behavior in ways independent of the actual current demographic composition."}, {"text": "That population projections are scientifically unreliable, and political actors who respond to them are responding to potentially false information.", "isCorrect": false, "rationale": "The source does not challenge the reliability of the Census Bureau projection; it draws attention to the political resonance of the projection as a fact about political behavior — not to a methodological critique of demographic science."}, {"text": "That immigration policy is the single most important factor in American political polarization, since demographic change is driven primarily by immigration.", "isCorrect": false, "rationale": "While immigration drove demographic change, the source presents a multi-causal account of polarization — education, geography, cultural identity — not a single-factor immigration explanation; and the specific point is about anticipatory political response, not immigration causation."}]}, {"question": "The Immigration and Nationality Act of 1965 is described as the primary driver of the demographic transformation visible by 2020. Which of the following best explains the act's specific mechanism?", "options": [{"text": "It provided a path to citizenship for undocumented immigrants already living in the United States, legalizing millions of workers from Latin America who then became legal residents.", "isCorrect": false, "rationale": "The 1965 Act was a preference system for future immigration, not an amnesty for existing undocumented immigrants; it abolished the national-origins quota system and replaced it with family reunification and occupational preferences for new arrivals."}, {"text": "It abolished the race-based national-origins quota system and replaced it with preferences for family reunification and occupational skills, shifting immigration source regions away from Europe toward Latin America, Asia, and Africa.", "isCorrect": true, "rationale": "The source describes the Act precisely: it 'abolished the race-based national-origins quota system and replaced it with a preference structure based on family reunification and occupational skills' — causing the source regions of immigration to shift from Europe to Latin America, Asia, and Africa over subsequent decades."}, {"text": "It established a guest-worker program that allowed temporary workers from Mexico to work legally in the United States, producing a permanent population over time.", "isCorrect": false, "rationale": "The 1965 Act was an immigration reform addressing permanent legal immigration preferences, not a guest-worker program; the Bracero program (which it followed) was the guest-worker arrangement, and the 1965 Act moved away from that model toward family-based permanent immigration."}, {"text": "It eliminated all numerical caps on immigration, allowing unlimited family-based immigration from any country, which produced the demographic transformation by 2020.", "isCorrect": false, "rationale": "The 1965 Act maintained numerical caps but changed the preference system; it did not eliminate limits on total immigration — it changed which countries and which applicants (family ties vs. national origin) received preference within those caps."}]}, {"question": "Obergefell v. Hodges (2015) held that the Fourteenth Amendment requires states to license and recognize same-sex marriages. Justice Kennedy's majority reasoning relied on which constitutional provisions?", "options": [{"text": "The Equal Protection Clause alone — the Court held that refusing to license same-sex marriages was discriminatory sex-based classification requiring heightened scrutiny.", "isCorrect": false, "rationale": "The source describes Kennedy's majority as relying on BOTH the Due Process Clause (marriage as a fundamental liberty right) and the Equal Protection Clause — not the Equal Protection Clause alone. The majority opinion had a dual constitutional basis."}, {"text": "The Due Process Clause (marriage as a fundamental liberty right not defined by who has historically enjoyed it) and the Equal Protection Clause (both independently supporting the same result).", "isCorrect": true, "rationale": "The source states: 'Kennedy's majority held that marriage is a fundamental right under the Due Process Clause...not defined by who has historically enjoyed it but by what interests it protects — liberty, dignity, and the creation of a family. The Equal Protection Clause independently supported the same result.'"}, {"text": "The First Amendment's association rights and the Ninth Amendment's rights retained by the people — the Court ruled that marriage is a fundamental social association beyond government regulation.", "isCorrect": false, "rationale": "The source does not identify First or Ninth Amendment grounds for the Obergefell decision; the constitutional basis was the Fourteenth Amendment's Due Process and Equal Protection Clauses."}, {"text": "The Privileges or Immunities Clause of the Fourteenth Amendment, reviving the doctrine that the federal Constitution protects fundamental economic and social rights against state infringement.", "isCorrect": false, "rationale": "The source does not mention the Privileges or Immunities Clause; the holding rested on the Due Process and Equal Protection Clauses, not on the Privileges or Immunities Clause."}]}, {"question": "The source connects Obergefell to a 'recurring pattern in American constitutional history: rights denied by one branch of government are eventually vindicated by another.' Which earlier example from APUSH BEST illustrates this same pattern?", "options": [{"text": "The Emancipation Proclamation (1863) — Lincoln used executive power to abolish slavery after Congress failed to act.", "isCorrect": false, "rationale": "The Emancipation Proclamation was an executive action, not a case of a court vindicating rights denied by the legislature; and slavery was formally abolished by the Thirteenth Amendment (Congress and states), not by executive proclamation alone. The pattern the source describes is inter-branch vindication, with the courts acting after legislative failure."}, {"text": "Brown v. Board of Education (1954) — the Supreme Court overturning Plessy v. Ferguson, which had upheld segregation that Congress had permitted and that executive enforcement had not challenged.", "isCorrect": true, "rationale": "Brown is the source's own example: the passage explicitly traces 'Reconstruction's constitutional amendments to Brown's overturning of Plessy to Obergefell' as illustrations of the arc bending 'toward expanding the circle of people included within its protections.' Brown overturned a constitutional doctrine that Congress and the executive had permitted for sixty years."}, {"text": "The Seneca Falls Declaration (1848) — a civil society petition that eventually led Congress to pass the Nineteenth Amendment seventy-two years later.", "isCorrect": false, "rationale": "The Nineteenth Amendment was a constitutional amendment ratified by states (with congressional proposal), not a case of courts vindicating rights denied by another branch — the pattern here is legislative/constitutional change driven by civil society pressure, not the inter-branch vindication the source identifies."}, {"text": "The Wagner Act (1935) — Congress vindicating labor's right to organize after courts had struck down earlier labor regulations under the Lochner era's liberty of contract doctrine.", "isCorrect": false, "rationale": "The Wagner Act represents Congress expanding rights after courts had contracted them — the opposite direction of the pattern; in the Obergefell pattern, courts vindicate rights that legislatures denied, not legislatures recovering after courts acted."}]}, {"question": "The 2016 election's 'diploma divide' — Trump winning non-college whites by 39 points, Clinton winning college-educated whites — replaced what the source describes as the 'gender gap' as the most salient demographic cleavage. Why does the source consider this shift historically significant?", "options": [{"text": "It proved that racial identity had become irrelevant in American politics, since educational attainment determined voting behavior more consistently than race.", "isCorrect": false, "rationale": "The source does not claim racial identity became irrelevant; the diploma divide is described as replacing the gender gap as the 'most salient demographic cleavage,' not as replacing race as a factor — and the source explicitly notes Trump's margins 'in rural, less-educated, and non-Hispanic white communities' alongside Clinton's with racial minorities."}, {"text": "It marked a geographic and educational sorting of the parties that made parties the political expressions of two distinct communities with incompatible visions of America — making ideological cross-cutting and compromise genuinely difficult.", "isCorrect": true, "rationale": "The source states the diploma divide was part of a pattern in which 'American political parties had sorted themselves along cultural and educational lines in ways that made ideological cross-cutting rare and compromise between the parties genuinely difficult' — making each party 'the political expression of two distinct communities with incompatible visions of what America was and what it should become.'"}, {"text": "It demonstrated that economic issues had permanently replaced cultural issues as the primary driver of American voting behavior, since education correlates with income.", "isCorrect": false, "rationale": "The source treats the diploma divide as a cultural and educational sorting, not purely an economic one — the text explicitly describes it as incompatible cultural visions, not just income-based economic interests; and education correlates with but is not identical to income."}, {"text": "It confirmed that the New Deal coalition had fully dissolved, since white working-class voters — once the core of the Democratic coalition — had completely realigned with Republicans.", "isCorrect": false, "rationale": "While the diploma divide contributed to working-class white defection from Democrats, the source does not describe this as the 'complete' dissolution of the New Deal coalition in 2016; the coalition had been eroding since the 1960s–80s, and 2016 accelerated a long-term trend rather than producing a sudden complete realignment."}]}, {"question": "Barack Obama's 2008 election is described as a 'moment of extraordinary historical significance' that 'also accelerated polarization.' How does the source explain this apparent paradox?", "options": [{"text": "Obama's liberal policy agenda drove moderate voters from the Democratic Party, accelerating the sorting of both parties toward their ideological extremes.", "isCorrect": false, "rationale": "While Obama's policy agenda is mentioned (ACA without a Republican vote), the source attributes polarization acceleration primarily to the Tea Party's rise, congressional opposition, and — most directly — the 'extraordinary bitterness of the birther conspiracy theory,' which was a response to Obama's identity, not his policy agenda."}, {"text": "Obama's election as the first Black president simultaneously represented a historic civil-rights achievement and provoked a cultural and racial backlash — Tea Party rise, unprecedented congressional opposition, and the birther conspiracy — that deepened polarization.", "isCorrect": true, "rationale": "The source presents both dimensions: 'extraordinary historical significance' (first Black president, record turnout, Indiana and North Carolina wins) alongside the acceleration of polarization through the Tea Party, the ACA passing without a single Republican vote, and 'the extraordinary bitterness of the birther conspiracy theory' — the false claim promoted by Donald Trump that Obama had not been born in the United States."}, {"text": "Obama's election was historically significant but did not actually produce polarization — the 2010 midterm losses were driven purely by economic dissatisfaction with the recession, not by racial backlash.", "isCorrect": false, "rationale": "The source explicitly attributes polarization acceleration to Tea Party rise, birther conspiracy, and unprecedented congressional opposition — not purely to economic recession; it would be an oversimplification to claim the source reduces all polarization to economic factors."}, {"text": "Obama's election united the country briefly around a post-racial ideal; polarization only accelerated during his second term when his foreign policy disappointed both left and right.", "isCorrect": false, "rationale": "The source locates polarization acceleration in Obama's first term (2009–10): Tea Party emerged in 2009; ACA passed in 2010; midterms produced the 63-seat Republican wave in 2010. The source does not describe a unifying first term followed by divisive second term."}]}, {"question": "The AP US History LEQ rubric scores theses on a six-point scale: thesis (1 pt), contextualization (1 pt), evidence (2 pts), analysis/reasoning (2 pts). According to the source, which of the following is the most common thesis error?", "options": [{"text": "Students write theses that are historically accurate but too specific — they argue a narrow point instead of addressing the full scope of the prompt.", "isCorrect": false, "rationale": "The source identifies the most common error as the opposite: theses that are too general and lack a line of reasoning — 'failing to write a defensible thesis' because the thesis lacks a specific causal claim, not because it is too narrow."}, {"text": "Students fail to write a defensible thesis by making an assertion without a line of reasoning — stating that something changed significantly without explaining why or how.", "isCorrect": true, "rationale": "The source states: 'The single most common error is failing to write a defensible thesis. A defensible thesis must: (a) respond to the prompt with a historically defensible claim; (b) establish a line of reasoning (not just an assertion).' The example given: 'The conservative movement transformed American life significantly' fails because it lacks a line of reasoning."}, {"text": "Students write theses that are too long, embedding contextualization into the thesis paragraph and confusing evidence with argumentation.", "isCorrect": false, "rationale": "The source identifies the failure as not having a line of reasoning, not as writing too long a thesis; the distinction between contextualization and thesis placement is a separate issue, not the 'most common error' the source identifies."}, {"text": "Students fail to address multiple perspectives in their thesis, presenting only one interpretation when the prompt requires historiographical engagement.", "isCorrect": false, "rationale": "While complexity (including multiple perspectives) is a scoring category, the source's identified most common error is the absence of a line of reasoning in the thesis — not the failure to address multiple historiographical perspectives."}]}, {"question": "The source's 'Final Synthesis Prompt' frames the entire course as structured around a permanent tension between the republic's declared principles and its actual practice. Which of the following best traces this tension through TWO different periods of American history?", "options": [{"text": "Unit 1: Native peoples were displaced by European colonizers despite the natural rights philosophy that shaped early colonial charters. Unit 5: The Emancipation Proclamation resolved the tension between Declaration of Independence ideals and slavery by abolishing it. The tension was permanently resolved in 1865.", "isCorrect": false, "rationale": "The source explicitly states the tension 'has not closed, and in some respects has widened' — presenting it as a permanent, ongoing contradiction rather than one resolved in 1865. The claim that the tension was permanently resolved misreads the source's central framing."}, {"text": "Unit 3: The Constitution's framers declared 'all men created equal' while enshrining slavery in the three-fifths clause and the fugitive slave provision. Unit 7: The New Deal extended economic security to millions while systematically excluding Black workers through discriminatory implementation of the AAA and Social Security.", "isCorrect": true, "rationale": "This response traces the tension through specific, documented examples in two periods: the Constitutional period (declared principles vs. slavery's codification) and the New Deal era (economic inclusion vs. racial exclusion in program administration). Both illustrate 'the gap between the republic's declared principles and its actual practice' — the central tension the source identifies."}, {"text": "Unit 2: The American Revolution's ideals of liberty inspired enslaved people to seek freedom, but the Founders suppressed these movements. Unit 9: The election of Barack Obama fully resolved the contradiction between racial equality ideals and racial inequality in practice.", "isCorrect": false, "rationale": "The claim that Obama's election 'fully resolved' the contradiction is explicitly contradicted by the source, which describes polarization and backlash alongside the election's historic significance — the source presents the tension as ongoing and unresolved in Unit 9."}, {"text": "Unit 4: Manifest Destiny reflected American ideals of freedom and prosperity being extended across the continent. Unit 6: Industrialization created prosperity for all Americans, demonstrating that the republic's declared ideals were increasingly realized over time.", "isCorrect": false, "rationale": "Both examples here misread the source's framework: Manifest Destiny was accompanied by the displacement and destruction of indigenous nations (the gap, not the ideal), and industrialization produced Gilded Age inequality alongside prosperity — neither represents a simple realization of ideals."}]}, {"question": "DACA (Deferred Action for Childhood Arrivals, 2012) was created by executive action because Congress repeatedly failed to pass comprehensive immigration reform. According to the source, what does DACA exemplify about American governance?", "options": [{"text": "That executive action can permanently substitute for congressional legislation, demonstrating the president's superior ability to respond to urgent social needs.", "isCorrect": false, "rationale": "The source does not present DACA as a permanent substitute for legislation — it notes that DACA remained 'in legal limbo' after the Trump administration announced its termination, illustrating the vulnerability of executive action compared to statutory law; executive action cannot permanently substitute for legislation."}, {"text": "The broader impasse over immigration policy: Congress's repeated failure to pass comprehensive reform left the executive branch managing consequences through executive action that lacked legislative durability.", "isCorrect": true, "rationale": "The source states explicitly: 'DACA exemplified the broader impasse over immigration policy: Congress had repeatedly failed to pass comprehensive immigration reform, leaving the executive branch to manage the consequences through executive action.' The vulnerability of that action to reversal by the next administration is the key institutional lesson."}, {"text": "The success of bipartisan cooperation in addressing immigration — DACA passed with Republican support in Congress before being sent to the president for signature.", "isCorrect": false, "rationale": "DACA was an executive action, not legislation — it bypassed Congress precisely because bipartisan cooperation on comprehensive immigration reform had failed repeatedly; describing it as a bipartisan congressional success inverts the source's account."}, {"text": "That the federal judiciary is the ultimate arbiter of immigration policy, since courts blocked DACA's termination and the program's survival depended on judicial intervention.", "isCorrect": false, "rationale": "While courts did block the Trump administration's termination of DACA, the source frames DACA as exemplifying the congressional-executive impasse, not as evidence of judicial supremacy in immigration policy; the judiciary's role was to pause the termination, not to permanently determine immigration policy."}]}, {"question": "The source argues that 'the skills this course has tried to give you — the habit of sourcing a document before trusting it, the ability to identify whose voice is absent from the record, the discipline of distinguishing evidence from assertion — are not merely skills for an AP exam. They are the skills of citizenship in a republic.' Which of the following BEST explains why the source connects historical thinking to citizenship specifically?", "options": [{"text": "Because citizens in a democracy vote, and voting requires knowing historical dates and names of presidents, which the AP course provides.", "isCorrect": false, "rationale": "The source explicitly distinguishes the skills it values from 'memorizing the dates of treaties and the names of generals' — the connection to citizenship is about critical thinking, not factual recall; this option mistakes the content (facts) for the skill (critical analysis)."}, {"text": "Because a republic depends on citizens who can read evidence critically, resist manipulation by unsourced claims, identify whose voice is missing from official narratives, and distinguish argument from assertion — especially when evaluating political claims in real time.", "isCorrect": true, "rationale": "The source argues exactly this: 'the skills of citizenship in a republic that has always depended, ultimately, on the capacity of its people to think historically about the present.' The specific skills named — sourcing documents, identifying absent voices, distinguishing evidence from assertion — are the analytical habits that prevent citizens from being manipulated by propaganda and false narratives."}, {"text": "Because historical expertise is required to hold public office, and the AP course prepares students to enter government service by providing the factual foundation for policy-making.", "isCorrect": false, "rationale": "The source does not argue that historical expertise is required for public office; it connects historical thinking to citizenship broadly — not specifically to government careers or policy expertise."}, {"text": "Because the categories through which we interpret the past — race, nation, democracy, liberty, progress — are fixed truths that citizens must know accurately to make informed decisions.", "isCorrect": false, "rationale": "The source argues the opposite: these categories 'are themselves historical constructs that were made by human beings and can be remade by them' — they are not fixed truths but contested constructs that citizens have the agency to reshape."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
