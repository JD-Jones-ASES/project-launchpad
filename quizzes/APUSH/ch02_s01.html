<body>

        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Chesapeake and Southern Plantations</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The Virginia Company introduced the headright system in 1618 primarily to address which problem facing the Chesapeake colony?", "options": [{"text": "A shortage of tobacco seed from Caribbean sources", "isCorrect": false, "rationale": "Tobacco seed was not the limiting factor; John Rolfe had already cultivated Nicotiana tabacum by 1612. The pressing shortage was labor, not seed."}, {"text": "A chronic labor shortage that threatened the colony's economic viability", "isCorrect": true, "rationale": "The headright system directly solved the labor problem by incentivizing passage to Virginia: any person who paid for their own or another's passage received fifty acres, drawing thousands of workers across the Atlantic."}, {"text": "A lack of representative governance that produced political unrest", "isCorrect": false, "rationale": "Representative governance was addressed in 1619 with the House of Burgesses, a separate initiative from the headright system, which was an economic rather than a political mechanism."}, {"text": "Military conflict with the Powhatan Confederacy that required land grants to soldiers", "isCorrect": false, "rationale": "While Powhatan conflict was a real threat, the headright system was a labor-recruitment and immigration incentive, not a military land-grant program for soldiers."}], "id": "q01"}, {"question": "Read the following passage: 'The Virginia Company was a joint-stock enterprise, not a humanitarian project. Its investors expected a return, and for nearly a decade the colony produced nothing of value.' Based on this excerpt, which of the following best explains the significance of John Rolfe's cultivation of Nicotiana tabacum around 1612?", "options": [{"text": "It fulfilled the original promise of gold and silver that investors had been told to expect.", "isCorrect": false, "rationale": "Investors had been promised gold and silver in promotional literature; tobacco was an agricultural commodity, not the precious metals the company originally advertised."}, {"text": "It provided the colony's first viable export commodity, finally delivering economic returns to the Virginia Company's investors.", "isCorrect": true, "rationale": "As the passage notes, the company was a profit-seeking enterprise that had produced nothing for a decade. Rolfe's tobacco strain gave the colony its first marketable product, connecting Virginia to English consumer demand for Spanish-quality tobacco."}, {"text": "It reduced dependence on the Powhatan Confederacy by making the colony self-sufficient in food production.", "isCorrect": false, "rationale": "Tobacco was a cash crop, not a food crop; its cultivation actually increased rather than decreased colonial dependence on trade for food."}, {"text": "It encouraged the Virginia Company to shift its charter from a commercial venture to a religious mission.", "isCorrect": false, "rationale": "The colony never converted to a religious mission; the crown dissolved the Virginia Company in 1624 and converted Virginia into a royal colony, not a religious settlement."}], "id": "q02"}, {"question": "Bacon's Rebellion of 1676 is best understood as a consequence of which structural feature of Virginia's colonial economy?", "options": [{"text": "The House of Burgesses' refusal to levy taxes on tobacco planters to fund frontier defense", "isCorrect": false, "rationale": "The Burgesses were controlled by the tidewater planter elite; tax policy was not the central grievance — the explosion arose from landlessness and elite favoritism, not a specific tax dispute."}, {"text": "The headright system's creation of a class of former indentured servants who were landless, armed, and politically volatile once free", "isCorrect": true, "rationale": "The source explicitly explains that overproduction, falling tobacco prices, and a growing class of freed men who found the best land already claimed by the tidewater elite produced the social kindling. The headright system had drawn thousands over who became competitors, not partners, of the planter class."}, {"text": "African enslaved workers' organized resistance to the plantation labor system", "isCorrect": false, "rationale": "While enslaved people did participate in Bacon's coalition, the rebellion's central dynamic was poor white frustration with the planter elite and Governor Berkeley's favoritism — it was primarily a class conflict, not a slave revolt."}, {"text": "The Powhatan Confederacy's disruption of Atlantic trade routes by blockading Chesapeake rivers", "isCorrect": false, "rationale": "The Powhatan Confederacy was the target of frontier violence in 1675, not the cause of the Atlantic trade disruption; the trigger was an unpaid debt dispute that escalated into raids, not a strategic blockade."}], "id": "q03"}, {"question": "The establishment of the House of Burgesses in 1619 is significant in the long-term history of American governance primarily because it:", "options": [{"text": "Immediately eliminated the Virginia Company's authority over the colony and transferred power to colonists", "isCorrect": false, "rationale": "The Virginia Company authorized the Burgesses but retained authority until 1624 when the crown dissolved the company; the assembly did not immediately supplant the company."}, {"text": "Established the precedent that English colonists held the right to participate in their own governance through elected representatives", "isCorrect": true, "rationale": "The source notes that the Burgesses established the precedent of representative self-governance and that the principle — that Englishmen could not be taxed without their representatives' consent — would become the cornerstone argument against parliamentary taxation in the 1760s."}, {"text": "Extended voting rights to indentured servants, providing the colony's laboring class a political voice", "isCorrect": false, "rationale": "The twenty-two delegates who gathered were property-holding burgesses; indentured servants and enslaved people had no political voice in this assembly."}, {"text": "Outlawed the importation of enslaved Africans, reflecting early colonial opposition to chattel slavery", "isCorrect": false, "rationale": "In the same year (1619), a Dutch warship sold 'twenty and odd' Africans at Point Comfort; the Burgesses did not outlaw slavery — the legal architecture of chattel slavery was actually built by subsequent Virginia assemblies."}], "id": "q04"}, {"question": "A historian argues: 'The tobacco monoculture made indigenous dispossession not a byproduct but a structural requirement of the Chesapeake colonial economy.' Which of the following pieces of evidence best supports this interpretation?", "options": [{"text": "The Virginia Company promoted Virginia as an Eden with gold, misleading potential colonists about the colony's actual conditions.", "isCorrect": false, "rationale": "Misleading promotional literature describes how colonists were recruited, not the economic mechanism that drove land acquisition westward once they arrived."}, {"text": "Tobacco exhausted soils rapidly, constantly pushing cultivation westward onto indigenous territories and making territorial expansion a structural necessity of the plantation economy.", "isCorrect": true, "rationale": "The source explicitly states that tobacco's 'soil exhaustion drove territorial expansion and indigenous dispossession,' and that 'the soil exhaustion that tobacco cultivation imposed—driving planters perpetually westward—made indigenous land dispossession not merely a byproduct but a structural requirement.'"}, {"text": "Governor William Berkeley maintained a profitable trade network with the Powhatan Confederacy, preventing military conflict.", "isCorrect": false, "rationale": "Berkeley's trade network actually restrained some expansion and was a source of resentment for landless settlers, but it does not explain the structural relationship between tobacco's soil exhaustion and westward expansion."}, {"text": "The \"starving time\" of 1609–10 demonstrated that English colonists could not survive without trade with indigenous peoples.", "isCorrect": false, "rationale": "The starving time describes early survival dependency, not the later economic mechanism by which tobacco monoculture structurally required indigenous dispossession."}], "id": "q05"}, {"question": "Consider the following scenario: A Virginia planter in 1640 pays for the passage of eight indentured servants from England. Under the headright system, which of the following outcomes would most directly result?", "options": [{"text": "The planter would receive eight servants to work his existing land for seven years.", "isCorrect": false, "rationale": "While the planter would receive the servants' labor, the headright system's primary mechanism was land accumulation — each passage also granted the planter fifty additional acres, compounding both land and labor simultaneously."}, {"text": "The planter would receive 400 additional acres of land, concentrating landholding among those already possessing capital to import servants.", "isCorrect": true, "rationale": "The headright system awarded fifty acres per passage paid; eight passages yield 400 acres. The source notes this system 'simultaneously solved the labor shortage, incentivized immigration, and concentrated landholding among those with capital' — precisely this scenario."}, {"text": "The planter would be required to provide each servant with fifty acres upon completion of their indenture.", "isCorrect": false, "rationale": "Freedom dues at indenture's end included tools, money, and sometimes a small land grant, but fifty acres per servant was the headright awarded to the master who paid the passage, not the servant themselves."}, {"text": "The planter would gain voting rights in the House of Burgesses proportional to his number of servants.", "isCorrect": false, "rationale": "Voting rights in the Burgesses were tied to property ownership, not directly calculated as proportional to servant numbers; the headright system was a land-grant mechanism, not a political representation formula."}], "id": "q06"}, {"question": "Which of the following best explains why the planter elite's response to Bacon's Rebellion accelerated the shift toward African chattel slavery rather than addressing the grievances of landless white men?", "options": [{"text": "African enslaved workers were more physically suited to tobacco cultivation than European indentured servants.", "isCorrect": false, "rationale": "No credible historical or biological evidence supports a differential physical capacity argument; this is a post-hoc rationalization, not the political calculation the planters made."}, {"text": "African chattel slaves, as permanent hereditary property, could not accumulate the dangerous class of armed free men that indentured servitude inevitably produced.", "isCorrect": true, "rationale": "The source identifies the central political lesson of Bacon's Rebellion: 'a class of poor, armed, landless white men posed an existential threat to planter authority.' Chattel slavery replaced this danger with a permanent, heritable labor force that would never produce a competing class of free armed competitors."}, {"text": "The English Parliament had outlawed the importation of European indentured servants after 1676.", "isCorrect": false, "rationale": "No such parliamentary ban existed; the decline of indenture was a market and political response, not a statutory prohibition."}, {"text": "The Powhatan Confederacy's defeat in 1676 opened new territories that required more agricultural laborers than Europe could supply.", "isCorrect": false, "rationale": "While territorial expansion did increase demand for labor, the specific choice of chattel slavery over indenture was a political response to the class threat revealed by Bacon, not simply a numerical shortage."}], "id": "q07"}, {"question": "Read the following primary source excerpt: 'He that will not work shall not eat.' — Captain John Smith, 1608. In its historical context, this statement most directly reflects which challenge facing the Jamestown colony?", "options": [{"text": "A theological dispute between Anglican and Puritan settlers about the dignity of manual labor", "isCorrect": false, "rationale": "Jamestown was not a religiously divided colony in 1608; the settlement's crisis was material survival, not theological debate about labor ethics."}, {"text": "The need to impose labor discipline on colonists who were disproportionately gentlemen unaccustomed to agricultural work", "isCorrect": true, "rationale": "The source notes the colonists were 'disproportionately gentlemen and artisans unsuited to agricultural labor'; Smith's edict addressed the survival crisis created by men who expected colonial opportunity without agricultural toil."}, {"text": "A scarcity of food caused by drought that required rationing all supplies equally among colonists", "isCorrect": false, "rationale": "The food crisis was primarily caused by poor planning and the colonists' reluctance to work, not a drought; Smith's dictate was a discipline measure rather than a rationing policy."}, {"text": "Indigenous resistance that prevented colonists from farming more than a small protected zone", "isCorrect": false, "rationale": "While Powhatan conflict was a real factor, Smith's directive targeted colonists' own refusal to perform agricultural labor, not external military constraints on farming."}], "id": "q08"}, {"question": "The legal status of the 'twenty and odd' Africans brought to Virginia in 1619 was initially 'genuinely ambiguous,' and some gained freedom after service. What was the long-term significance of this ambiguity?", "options": [{"text": "It established that African workers in Virginia would always receive equal legal treatment as indentured servants.", "isCorrect": false, "rationale": "The ambiguity was not resolved in favor of equality; it was progressively eliminated by slave codes from 1662 onward that systematically stripped Africans of legal personhood."}, {"text": "It demonstrates that race-based chattel slavery was not a predetermined outcome but a constructed legal system built through deliberate legislative choices.", "isCorrect": true, "rationale": "The source emphasizes this point explicitly, noting that the early ambiguity — some Africans like Anthony Johnson obtained freedom and property — shows that slavery was 'built, statute by statute' through deliberate political choices, not an inevitable expression of pre-existing racism."}, {"text": "It allowed the Virginia Company to avoid the moral controversy of slavery during the colony's financially precarious early decades.", "isCorrect": false, "rationale": "There is no evidence the Virginia Company strategically cultivated legal ambiguity for moral cover; the ambiguity reflected the absence of a fully developed racial legal framework, not a deliberate policy."}, {"text": "It provided the legal basis for the House of Burgesses to extend limited voting rights to free Black Virginians throughout the colonial period.", "isCorrect": false, "rationale": "Free Black Virginians lost the right to own white servants in 1670 and faced increasing legal restrictions; the trajectory was toward exclusion, not inclusion."}], "id": "q09"}, {"question": "Which of the following most accurately describes the relationship between indentured servitude and the emergence of African chattel slavery in the seventeenth-century Chesapeake?", "options": [{"text": "Indentured servitude and chattel slavery were parallel systems that coexisted peacefully throughout the colonial period, each serving different labor needs.", "isCorrect": false, "rationale": "The two systems were not parallel cohabitants; chattel slavery rose specifically as planters abandoned indenture after its class dangers became manifest in Bacon's Rebellion, making the transition a direct substitution driven by political calculation."}, {"text": "Indentured servitude was the dominant Chesapeake labor system through the 1670s, but its structural creation of a volatile class of free laborers prompted planters to replace it with race-based chattel slavery.", "isCorrect": true, "rationale": "The source is explicit: indentured servants were the dominant labor force through the 1670s, but the class crisis they created after Bacon's Rebellion led planters to choose chattel slavery — a racial solution to a class problem — over the following three decades."}, {"text": "Chattel slavery predated indentured servitude and gradually absorbed it once the Atlantic slave trade's volume reached the Chesapeake.", "isCorrect": false, "rationale": "The chronology is reversed; indenture preceded the large-scale importation of enslaved Africans, which Virginia's African population grew from under 300 in 1650 to 13,000 by 1700 only after the post-Bacon legislative shift."}, {"text": "Parliament's 1661 statute mandating chattel slavery in all English colonies forced Virginia planters to abandon their preference for European labor.", "isCorrect": false, "rationale": "No such parliamentary statute existed; slavery's legal architecture in Virginia was built by the colonial assembly itself, not mandated from London, and was driven by local class politics rather than imperial decree."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
