<script>
var QUESTIONS = [{"question": "Nixon's opening to China (February 1972) was diplomatically significant primarily because", "options": [{"text": "it formalized a military alliance between the United States and China against the Soviet Union.", "isCorrect": false, "rationale": "The opening established diplomatic relations and exploited the Sino-Soviet split, but it was not a military alliance; Nixon and Kissinger pursued arms control with the Soviets simultaneously — triangular diplomacy, not an anti-Soviet alliance with China."}, {"text": "it ended 23 years of US non-recognition of the People's Republic, exploited the Sino-Soviet split, and altered the global balance of power by bringing China into the network of US diplomatic relations.", "isCorrect": true, "rationale": "The source explicitly identifies these three dimensions: ending 23 years of non-recognition, exploiting the Sino-Soviet split, and altering 'the global balance of power in ways that outlasted the Cold War.'"}, {"text": "it committed China to support the South Vietnamese government against North Vietnamese aggression, providing Nixon with an Asian ally to replace American forces.", "isCorrect": false, "rationale": "The opening to China did not produce a Chinese commitment to South Vietnam; China's relationship with North Vietnam was more complex, and Nixon was not seeking Chinese intervention in Vietnam."}, {"text": "it was Johnson's diplomatic achievement, which Nixon inherited and completed as part of a bipartisan foreign policy consensus.", "isCorrect": false, "rationale": "The China opening was Nixon's and Kissinger's diplomatic achievement; Johnson had maintained non-recognition of China throughout his presidency."}], "id": "q01"}, {"question": "Détente, as practiced by Nixon and Kissinger, represented which departure from earlier Cold War strategy?", "options": [{"text": "It abandoned containment entirely in favor of accommodating Soviet expansion in exchange for trade agreements.", "isCorrect": false, "rationale": "Détente managed the US-Soviet relationship through arms control and normalized trade but did not abandon resistance to Soviet expansion; it was a modification of containment, not its abandonment."}, {"text": "It accepted a tacit recognition that the United States could not roll back Soviet power and must instead stabilize coexistence through arms control and normalized relations.", "isCorrect": true, "rationale": "The source explicitly states that détente 'represented a tacit acceptance that the Kennan containment doctrine had reached its limits — that the United States could not roll back Soviet power and must instead stabilize coexistence.'"}, {"text": "It replaced the arms control approach with a strategy of nuclear superiority to compel Soviet acceptance of American terms.", "isCorrect": false, "rationale": "Détente moved in the opposite direction — toward arms control parity (SALT I) rather than nuclear superiority; the goal was stabilized coexistence, not American dominance."}, {"text": "It was the first time the United States formally accepted the legitimacy of the Soviet government and opened diplomatic relations.", "isCorrect": false, "rationale": "The US had recognized the Soviet government diplomatically since 1933; détente normalized trade and arms control relationships, not diplomatic recognition."}], "id": "q02"}, {"question": "The Watergate scandal is constitutionally significant primarily because", "options": [{"text": "it demonstrated that the federal courts could not effectively constrain presidential abuse of power without legislative support.", "isCorrect": false, "rationale": "The opposite is true — United States v. Nixon (1974) demonstrated that the Supreme Court could constrain the president by ruling that executive privilege was not absolute; the courts were central to resolving the constitutional crisis."}, {"text": "it forced the first presidential resignation in American history after the Supreme Court ruled unanimously that executive privilege was not absolute, requiring Nixon to surrender White House tape recordings.", "isCorrect": true, "rationale": "The constitutional significance of Watergate is precisely the Supreme Court's ruling that executive privilege has limits (United States v. Nixon) and Nixon's subsequent resignation — establishing that no president is above the law."}, {"text": "it produced the 25th Amendment's presidential succession provisions, which were designed to prevent a future president from claiming executive privilege.", "isCorrect": false, "rationale": "The 25th Amendment was ratified in 1967, before Watergate; the succession it governed was used when Ford replaced the resigned Agnew as Vice President — Watergate did not produce the 25th Amendment."}, {"text": "it established that any presidential action taken for national security purposes was protected from congressional investigation by executive privilege.", "isCorrect": false, "rationale": "United States v. Nixon (1974) ruled the opposite — executive privilege was not absolute, and Nixon had to surrender the tapes. The ruling limited, not expanded, executive privilege claims."}], "id": "q03"}, {"question": "The 'smoking gun' tape, which ended Nixon's ability to resist impeachment, proved specifically that Nixon had", "options": [{"text": "personally authorized the break-in at the Democratic National Committee headquarters at the Watergate complex.", "isCorrect": false, "rationale": "The tape proved Nixon had ordered the obstruction of the FBI investigation, not that he personally authorized the break-in; his direct involvement in the break-in authorization was never conclusively established by the tapes."}, {"text": "ordered the CIA to obstruct the FBI investigation of the Watergate break-in six days after it occurred — establishing direct presidential involvement in the cover-up.", "isCorrect": true, "rationale": "The source explicitly states the 'smoking gun' recording of June 23, 1972 'proved Nixon had ordered the CIA to obstruct the FBI investigation six days after the break-in' — obstruction of justice, not the original break-in."}, {"text": "personally planned the filing of false tax returns and the misuse of campaign finance funds to pay the Watergate burglars.", "isCorrect": false, "rationale": "While Nixon's tax returns were one element of the scandal, the 'smoking gun' tape specifically proved obstruction of justice — the CIA obstruction order — which was the immediately impeachable offense."}, {"text": "had knowledge of the break-in plan two months before it was executed but failed to order it stopped.", "isCorrect": false, "rationale": "The tape proved what Nixon did after the break-in (obstruction), not that he had prior knowledge two months before — this option mischaracterizes the specific evidence the tape provided."}], "id": "q04"}, {"question": "Stagflation challenged the Keynesian economic consensus primarily because", "options": [{"text": "Keynesian economics predicted that high unemployment would always coincide with deflation, while stagflation produced both unemployment and inflation simultaneously.", "isCorrect": false, "rationale": "The standard Keynesian assumption (based on the Phillips Curve) was a trade-off between inflation and unemployment — high unemployment should reduce inflation. Stagflation produced both simultaneously, defying this trade-off, but the framing of 'deflation with unemployment' is not precisely the Keynesian prediction."}, {"text": "standard Keynesian theory assumed a trade-off between inflation and unemployment (the Phillips Curve), but stagflation produced both simultaneously, exposing the limits of Keynesian policy prescriptions.", "isCorrect": true, "rationale": "The source explicitly states that stagflation was 'a combination that standard Keynesian economics, which assumed a trade-off between inflation and unemployment (the Phillips Curve), could not explain or prescribe remedies for.'"}, {"text": "Keynesian economics had always argued that government spending should be reduced during periods of inflation, but Nixon increased spending to fight unemployment.", "isCorrect": false, "rationale": "Keynesian economics did counsel reducing spending during inflationary periods; the problem with stagflation was that reducing spending to fight inflation would worsen unemployment, while stimulating demand to fight unemployment would worsen inflation — a policy trap, not a Nixon policy choice."}, {"text": "Keynesian economics required gold-backed currency to function properly, and Nixon's abandonment of the gold standard in 1971 destroyed the fiscal framework.", "isCorrect": false, "rationale": "Keynesian economics is not tied to the gold standard; the Nixon Shock's (1971) end of Bretton Woods removed a constraint on money creation, contributing to inflation, but Keynesian theory does not require the gold standard to function."}], "id": "q05"}, {"question": "The OPEC oil embargo (October 1973) was triggered by which event, and what was its most immediate domestic effect?", "options": [{"text": "The Soviet invasion of Afghanistan; it caused a sharp reduction in industrial production as factories could not obtain sufficient energy supplies.", "isCorrect": false, "rationale": "The Soviet invasion of Afghanistan occurred in December 1979 — the second oil shock. The 1973 embargo was triggered by American support for Israel in the Yom Kippur War."}, {"text": "American support for Israel in the Yom Kippur War; it quadrupled oil prices and created gasoline lines, accelerating inflation that had already been elevated by Vietnam-era spending.", "isCorrect": true, "rationale": "The source explicitly states OPEC cut off exports to nations that had supported Israel in the Yom Kippur War; oil prices quadrupled, gasoline lines appeared, and inflation — already elevated by Vietnam costs — accelerated."}, {"text": "Nixon's abandonment of the gold standard in 1971, which reduced the purchasing power of the dollar and made American oil imports prohibitively expensive.", "isCorrect": false, "rationale": "The Nixon Shock (1971) contributed to inflationary pressure, but it was not the trigger of OPEC's embargo; the embargo was a deliberate geopolitical response to American support for Israel in the 1973 war."}, {"text": "The energy conservation policies of the Carter administration, which OPEC interpreted as an attempt to reduce dependence on Arab oil producers.", "isCorrect": false, "rationale": "The 1973 embargo preceded Carter's presidency (1977–81); Carter faced a second oil shock in 1979 from the Iranian Revolution, not from the 1973 embargo."}], "id": "q06"}, {"question": "Nixon's use of the 'Silent Majority' rhetoric (November 1969) is historically significant primarily because", "options": [{"text": "it successfully persuaded antiwar protesters to abandon their demonstrations and support the administration's Vietnam strategy.", "isCorrect": false, "rationale": "The antiwar movement continued and intensified after Nixon's speech; the Kent State shootings (May 1970) triggered the largest campus strike in American history."}, {"text": "it pioneered the culture-war framing of American politics — positioning patriotic, traditional Americans against a minority of cultural elites — a political strategy that defined conservative politics for decades.", "isCorrect": true, "rationale": "The source explicitly states the Silent Majority address 'pioneered the culture-war framing that would define American conservative politics for decades' — framing the antiwar movement as a disruptive minority imposing on a patient mainstream majority."}, {"text": "it was the first time a president had publicly acknowledged the growing anti-Vietnam sentiment among the American public.", "isCorrect": false, "rationale": "Nixon's speech was not acknowledging antiwar sentiment — it was claiming the opposite, that a silent majority supported the war against the visible minority opposing it."}, {"text": "it provided the political cover Nixon needed to immediately withdraw all American forces from Vietnam.", "isCorrect": false, "rationale": "Nixon's Vietnamization strategy extended American involvement by four years; the Silent Majority speech was political positioning, not a precursor to immediate withdrawal."}], "id": "q07"}, {"question": "Carter's July 1979 'Crisis of Confidence' address is historically significant because", "options": [{"text": "it successfully persuaded the American public to accept energy conservation as a patriotic duty, reducing dependence on foreign oil.", "isCorrect": false, "rationale": "The speech was politically disastrous — it was diagnostically accurate but offered diagnosis rather than solutions. Carter's approval ratings fell further after it; the Iranian hostage crisis compounded his political vulnerability."}, {"text": "it was both an accurate diagnosis of a real national crisis of public trust and a political failure — Americans wanted solutions, not diagnoses from their president.", "isCorrect": true, "rationale": "The source explicitly states the speech 'was both diagnostically accurate and politically disastrous: Americans wanted their president to offer solutions, not diagnoses' — capturing the paradox of a correct analysis that proved politically destructive."}, {"text": "it signaled the end of the Cold War by publicly acknowledging that the United States could no longer sustain its global commitments.", "isCorrect": false, "rationale": "Carter's speech addressed domestic confidence and materialism, not Cold War commitments; it did not signal the end of the Cold War, which would not come until 1991."}, {"text": "it produced a decisive policy shift toward renewable energy that reduced American dependence on oil imports within a decade.", "isCorrect": false, "rationale": "Carter's energy policies had limited impact; the Reagan administration largely dismantled his conservation programs; American oil dependence did not substantially decrease in the decade following the speech."}], "id": "q08"}, {"question": "Gerald Ford's pardon of Nixon (September 1974) is significant because", "options": [{"text": "it was legally required by the Constitution, which prohibited criminal prosecution of former presidents.", "isCorrect": false, "rationale": "There is no constitutional provision prohibiting criminal prosecution of former presidents; Ford's pardon was a discretionary executive decision, not a constitutional requirement."}, {"text": "it removed the possibility of criminal prosecution for Nixon, generated intense public anger (being seen as placing the president above the law), and likely cost Ford the 1976 election.", "isCorrect": true, "rationale": "The source states the pardon 'was politically devastating, almost certainly costing him the 1976 election' and that Ford's explanation 'was rejected by much of the public' who believed it placed the president above the law."}, {"text": "it was broadly accepted by the American public as necessary to allow the country to move forward after the Watergate scandal.", "isCorrect": false, "rationale": "The source states the opposite: the pardon 'generated fury' and Ford's explanation 'was rejected by much of the public'; it was not broadly accepted."}, {"text": "it demonstrated the power of the presidential pardon to resolve constitutional crises through executive action rather than judicial process.", "isCorrect": false, "rationale": "While technically true that the pardon used executive power to avoid judicial process, this framing misses the historical significance the source emphasizes: the political and democratic costs of appearing to place the president above the law."}], "id": "q09"}, {"question": "The 'Crisis of Confidence' of the 1970s is best understood as", "options": [{"text": "a temporary public relations problem that could have been solved with better presidential communication.", "isCorrect": false, "rationale": "The source presents the crisis as structural — the convergence of Vietnam, Watergate, stagflation, and the Iran hostage crisis shattered a governing consensus, not merely public perception; it could not be resolved through better messaging."}, {"text": "the cumulative damage of four converging crises — Vietnam, Watergate, stagflation, and the Iran hostage crisis — that together shattered the governing consensus that had sustained postwar American politics and created the political opening for Reaganism.", "isCorrect": true, "rationale": "The source explicitly frames the 1970s crisis as the convergence of four crises that 'shattered the governing consensus,' drove public trust in government from 75% (mid-1960s) to below 25% (by 1980), and created the conditions for Reagan's 1980 victory."}, {"text": "primarily a product of Carter's failed leadership, which a more capable president would have navigated without the political damage.", "isCorrect": false, "rationale": "The source presents the crisis as structural — Carter inherited the damage of Vietnam and Watergate — though his 'malaise speech' was politically counterproductive; reducing it to personal leadership failure misses the structural causes."}, {"text": "a manifestation of the natural end of the postwar economic boom, which had always been temporary and was unrelated to political scandals or foreign policy failures.", "isCorrect": false, "rationale": "The source links the crisis explicitly to specific political events (Vietnam, Watergate, oil shock, Iran hostage crisis) — treating them as converging causes of a legitimacy crisis, not an inevitably-ending economic cycle."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
