<script>
var QUESTIONS = [{"question": "The Harlem Renaissance (c. 1920–1935) represented which of the following historical developments?", "options": [{"text": "A government-sponsored program to relocate African American artists to urban centers as part of New Deal cultural initiatives", "isCorrect": false, "rationale": "The Harlem Renaissance preceded the New Deal and was not government-sponsored; it was a self-generated cultural movement produced by the Great Migration's concentration of Black artists and intellectuals in northern cities."}, {"text": "The most significant flowering of African American artistic and intellectual culture the nation had yet produced, emerging from the concentration of artists, writers, and musicians that the Great Migration created in Harlem", "isCorrect": true, "rationale": "The source explicitly describes the Harlem Renaissance as 'the most significant flowering of African American artistic and intellectual culture the nation had yet produced,' directly connected to the Great Migration's demographic transformation of northern cities."}, {"text": "A movement primarily concerned with integrating African American artists into mainstream white entertainment venues and commercial publishing", "isCorrect": false, "rationale": "The Harlem Renaissance was a self-conscious assertion of Black cultural identity and dignity, not primarily about integration into white commercial venues — though commercial success and crossover did occur."}, {"text": "A literary movement that celebrated rural Southern Black folk culture while rejecting the urban migration that had uprooted communities", "isCorrect": false, "rationale": "While Zora Neale Hurston drew on Southern Black folk traditions, the Harlem Renaissance was fundamentally an urban northern phenomenon that embraced rather than lamented the Great Migration."}]}, {"question": "The 1920s flapper represented which cultural development?", "options": [{"text": "Working-class immigrant women asserting labor rights through public visibility and political organization", "isCorrect": false, "rationale": "The flapper was primarily associated with middle-class and upper-middle-class young women who had access to consumer culture; it was a gender-norm challenge, not primarily a labor rights movement."}, {"text": "A visible rejection of Victorian gender conventions through bobbed hair, short skirts, public smoking, and dancing — embodying the challenge that mass consumer culture posed to traditional authority structures", "isCorrect": true, "rationale": "The source explicitly links the flapper to 'a visible rejection of Victorian gender conventions' and to the mass consumer culture (automobile, radio, film, advertising) that challenged 'traditional authority structures.'"}, {"text": "A deliberate political movement organized by suffragists to use visible nonconformity as a protest against the Nineteenth Amendment's limited practical impact", "isCorrect": false, "rationale": "The flapper phenomenon was cultural rather than explicitly political, emerging from mass consumer culture rather than suffragist organizing strategy."}, {"text": "The cultural expression of Progressive Era women's settlement-house workers who used public visibility to advocate for labor reform", "isCorrect": false, "rationale": "Settlement-house workers were associated with the Progressive Era, not the 1920s flapper culture; the flapper was a product of 1920s consumer culture and mass entertainment, not Progressive-era social reform."}]}, {"question": "The Scopes Trial (1925) best illustrates which underlying tension of the 1920s?", "options": [{"text": "The conflict between federal authority and states' rights over education policy", "isCorrect": false, "rationale": "While Tennessee's state law was the specific legal context, the source frames the trial as a national cultural conflict between urban modernism (science, pluralism) and rural fundamentalism (biblical literalism) — not primarily a federalism dispute."}, {"text": "The urban-rural cultural divide between scientific modernism and biblical fundamentalism — with Darrow's examination of Bryan on the witness stand exposing the depth of that divide to a national media audience", "isCorrect": true, "rationale": "The source explicitly frames the Scopes Trial as the defining public moment of the urban-rural cultural conflict: Darrow's cross-examination of Bryan 'systematically revealed the contradictions in a literal reading of Genesis,' while the national press portrayed fundamentalism as backward."}, {"text": "The conflict between labor unions and state governments over the right to organize workers in public schools", "isCorrect": false, "rationale": "The Scopes Trial involved a biology teacher's right to teach evolution, not labor union organizing — the cultural conflict was religious-scientific, not labor-management."}, {"text": "The tension between immigrant communities and native-born Americans over the content of public school curricula", "isCorrect": false, "rationale": "The Scopes Trial conflict was between scientific modernism (urban, educated, secular) and Protestant fundamentalism (rural, religious, traditionalist) — not an immigrant-nativist divide over curriculum."}]}, {"question": "Read the following: 'The second Klan expanded well beyond the South and beyond anti-Black violence to target Catholics, Jews, immigrants, and anyone who violated the Klan's version of Protestant moral order.' This expansion of Klan targets most directly reflected", "options": [{"text": "A strategic decision by Klan leaders to recruit nationally by broadening their appeal to economic interests", "isCorrect": false, "rationale": "The broadening of targets reflected genuine ideological expansion of Protestant nativist anxieties, not primarily a recruitment strategy based on economic interests."}, {"text": "The decade's broader 'traditionalist' cultural politics: using a nativist Protestant moral order as the organizing framework against a heterogeneous America that felt threatening to rural and small-town communities", "isCorrect": true, "rationale": "The source frames the second Klan as part of the decade's broader 'traditionalist countermovement' — using Protestant moral order as the framework for resisting the pluralism, urbanization, and cultural change that the 1920s represented."}, {"text": "The influence of European fascism on American political organizations in the post-WWI environment", "isCorrect": false, "rationale": "The second Klan (re-founded 1915) predates the rise of European fascism; the source traces its inspiration to D.W. Griffith's Birth of a Nation and the expansion of its nativist Protestant agenda."}, {"text": "A response to the Palmer Raids' failure to deport sufficient numbers of radical immigrants", "isCorrect": false, "rationale": "The Klan was an independent private organization engaging in terror and political organizing; it is not described as a response to the Palmer Raids' inadequacy."}]}, {"question": "The National Origins Act (1924) set immigration quotas based on the 1890 census rather than the 1910 census. The choice of 1890 as the baseline most directly", "options": [{"text": "Coincidentally benefited Southern and Eastern European immigrants who had arrived in large numbers before 1890", "isCorrect": false, "rationale": "The 1890 baseline deliberately minimized Southern and Eastern European representation because most of that immigration came after 1890; the choice was intentional, not coincidental, in its exclusionary effect."}, {"text": "Encoded a racial hierarchy of preferred immigrants by using a pre-mass-immigration baseline that sharply limited admission from Italy, Poland, Russia, and other predominantly Catholic and Jewish sending countries", "isCorrect": true, "rationale": "The source explains the mechanism precisely: the 1890 baseline predates the mass immigration from Southern and Eastern Europe, so basing quotas on that year 'virtually shut down immigration from Italy, Poland, Russia, and other predominantly Catholic and Jewish sending countries.'"}, {"text": "Reflected a neutral administrative preference for using older, more reliable census data for immigration planning purposes", "isCorrect": false, "rationale": "The choice of 1890 was explicitly designed to discriminate against Southern and Eastern European immigrants; the administrative rationale was a cover for racial and ethnic exclusion."}, {"text": "Was intended primarily to limit immigration from Latin America by using population data from before the Mexican Revolution", "isCorrect": false, "rationale": "Asian and European immigration were the primary targets of the quota system; Mexican immigration was separately managed through other mechanisms and was not the primary target of the 1924 National Origins Act."}]}, {"question": "The Sacco and Vanzetti case (1920–27) became a cause célèbre because", "options": [{"text": "The defendants were wealthy industrialists whose conviction proved that Progressive Era courts could prosecute the powerful as well as the weak", "isCorrect": false, "rationale": "Sacco and Vanzetti were Italian immigrant working-class anarchists — precisely the opposite of wealthy industrialists; the case became significant because it appeared to be a conviction of the powerless based on politics and ethnicity."}, {"text": "Defenders argued that Sacco and Vanzetti were convicted for their immigrant status and anarchist politics rather than the crime — on evidence many historians consider thin and circumstantial", "isCorrect": true, "rationale": "The source states defenders argued 'they were convicted for their politics and ethnicity, not the crime' and that historians have found the evidence 'thin and circumstantial' — making the case a symbol of nativist injustice against immigrant political radicals."}, {"text": "The case demonstrated the effectiveness of the Palmer Raids in identifying and prosecuting genuine anarchist threats to public safety", "isCorrect": false, "rationale": "Sacco and Vanzetti's actual guilt remains historically disputed; the case is significant as a potential miscarriage of justice, not as a validation of the anti-radical suppression apparatus."}, {"text": "Their acquittal proved that American juries could resist nativist bias even during the most intense anti-immigrant periods", "isCorrect": false, "rationale": "Sacco and Vanzetti were convicted and executed, not acquitted; the case's historical significance comes precisely from the injustice many historians believe their conviction represented."}]}, {"question": "Prohibition's failure as a policy is BEST explained by which of the following?", "options": [{"text": "Prohibition was never truly popular and was passed through procedural manipulation by a minority of temperance advocates", "isCorrect": false, "rationale": "Prohibition had broad democratic support from Protestant churches, the Anti-Saloon League, women's organizations, and rural communities — it was passed through standard democratic processes, not procedural manipulation."}, {"text": "Legislating cultural behavior against deeply embedded social practices — particularly in immigrant and urban communities for whom saloons were central social institutions — produced widespread non-compliance, organized crime, and disrespect for law", "isCorrect": true, "rationale": "The source identifies the failure mechanism: organized crime (Al Capone), corrupted law enforcement, and 'widespread disrespect for the law' — the result of trying to legislate away social practices deeply embedded in urban immigrant communities."}, {"text": "The Democratic Party successfully organized against Prohibition in the 1920 elections, preventing effective enforcement", "isCorrect": false, "rationale": "The Democratic Party was internally divided on Prohibition in the 1920s; its failure was not a product of partisan electoral opposition but of widespread non-compliance and the social dynamics of enforcement."}, {"text": "The Supreme Court ruled the Eighteenth Amendment an unconstitutional infringement on individual liberty, preventing enforcement", "isCorrect": false, "rationale": "The Supreme Court upheld Prohibition; it was repealed legislatively by the Twenty-First Amendment in 1933, not struck down judicially."}]}, {"question": "The source states: 'The 1920s revealed that rapid cultural change produces powerful backlash.' Which pairing of developments BEST illustrates this argument?", "options": [{"text": "The Harlem Renaissance and the second Ku Klux Klan's four-million-member peak in the 1920s", "isCorrect": true, "rationale": "The source directly juxtaposes these: 'the same decade that produced the Harlem Renaissance and women's suffrage also produced the second Ku Klux Klan and immigration restriction laws.' The Harlem Renaissance's assertion of Black dignity generated Klan backlash — the pattern the source identifies."}, {"text": "The Scopes Trial and the Federal Reserve Act", "isCorrect": false, "rationale": "The Federal Reserve Act (1913) predates the 1920s and was not part of the cultural clash dynamic; it was a Progressive Era economic reform, not a cultural modernism vs. traditionalism conflict."}, {"text": "The Jazz Age and the Lend-Lease Act", "isCorrect": false, "rationale": "The Lend-Lease Act (1941) is a WWII foreign policy development completely outside the 1920s cultural conflict framework."}, {"text": "Women's suffrage and the Sixteenth Amendment", "isCorrect": false, "rationale": "The Sixteenth Amendment (1913) authorized the income tax — an economic policy measure unrelated to the cultural modernism-traditionalism conflict of the 1920s."}]}, {"question": "F. Scott Fitzgerald's The Great Gatsby (1925) and the 'Lost Generation' writers offered which critique of 1920s America?", "options": [{"text": "They celebrated the prosperity and optimism of the jazz age as evidence of American democratic progress", "isCorrect": false, "rationale": "The Lost Generation writers were critical of 1920s commercial optimism — the source describes Gatsby and Hemingway as offering 'mordant critiques of a society that had sacrificed a generation to industrial warfare and replaced genuine meaning with conspicuous consumption.'"}, {"text": "A mordant critique of a society that had sacrificed a generation to industrial warfare and replaced genuine meaning with conspicuous consumption", "isCorrect": true, "rationale": "The source explicitly describes the Lost Generation as writing 'mordant critiques of a society that had sacrificed a generation to industrial warfare and replaced genuine meaning with conspicuous consumption' — World War I's trauma making 1920s commercial optimism seem shallow and dishonest."}, {"text": "A celebration of immigrant success stories that demonstrated the vitality of the American dream despite nativist restriction", "isCorrect": false, "rationale": "The Lost Generation writers — Hemingway, Fitzgerald — were not primarily writing immigrant success narratives; their critique was aimed at white Anglo-American commercial culture, not at nativist restriction."}, {"text": "An argument for returning to traditional rural Protestant values against the corruption of urban modernism", "isCorrect": false, "rationale": "The Lost Generation writers were urbanists and modernists who rejected traditional Protestant rural values — they were critics of commercial shallowness, not advocates for rural traditionalism."}]}, {"question": "The source's central argument about the 1920s is that the decade's historical significance lies not in either side 'winning' but in what the conflict revealed. Which of the following BEST captures this argument?", "options": [{"text": "The decade demonstrated that American democratic institutions were strong enough to resolve cultural conflicts without violence", "isCorrect": false, "rationale": "The source notes Klan violence, the Sacco and Vanzetti execution, and nativist exclusion — the decade was not violence-free, and the cultural conflicts were not fully resolved."}, {"text": "The conflict revealed how fragile consensus is in a rapidly changing, heterogeneous democracy, where both sides were responding to genuine disruptions and neither had a monopoly on democratic legitimacy", "isCorrect": true, "rationale": "The source explicitly states: 'What makes the 1920s historically significant is not that either side won but that the conflict revealed how fragile consensus is in a rapidly changing, heterogeneous democracy.' Both sides had 'a plausible claim to democratic legitimacy.'"}, {"text": "The decade proved that rural Protestant traditionalism was too powerful to be overcome by urban modernist culture", "isCorrect": false, "rationale": "The source explicitly states 'neither simply won' — if anything, the longer trajectory of the twentieth century shows modernist culture prevailing, but the source resists declaring a winner."}, {"text": "The cultural conflicts were superficial and were quickly resolved once the economic prosperity of the 1920s made both sides' concerns irrelevant", "isCorrect": false, "rationale": "The source takes the cultural conflicts seriously as genuine historical contests between competing visions of American identity — not as superficial tensions dissolved by prosperity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
