<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; The Market Revolution</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The Erie Canal reduced freight costs from Buffalo to New York City from approximately $100 per ton to $4 per ton between 1817 and 1825. Which of the following BEST explains the broader historical significance of this cost reduction?", "options": [{"text": "It allowed New York City to surpass Philadelphia as the nation's most populous city for the first time.", "isCorrect": false, "rationale": "While the Erie Canal contributed to New York City's commercial dominance, the source states New York was 'already the nation's largest city' before the canal — not that the canal first made it largest. The significance the source emphasizes is the structural integration of interior and coastal economies."}, {"text": "It destroyed the economic isolation of the interior by making Ohio wheat, Indiana pork, and Great Lakes timber commercially viable in Atlantic markets, fundamentally integrating regional economies.", "isCorrect": true, "rationale": "The source explicitly states the canal 'destroyed the economic isolation of the interior' and made interior commodities reachable at a fraction of their former cost. The 95% cost reduction was a 'structural transformation,' not merely a convenience — it integrated the Great Lakes basin and the Northeast into a single market economy."}, {"text": "It eliminated turnpike and wagon freight as economic competitors, forcing transportation workers into factory employment.", "isCorrect": false, "rationale": "The source does not describe the elimination of other transportation forms as a labor-displacement mechanism. The canal era was itself 'quickly overtaken by the railroad,' suggesting a sequence of improvements rather than a single displacement event."}, {"text": "It transferred economic control of the interior from Southern planters to Northeastern merchants, accelerating sectional conflict.", "isCorrect": false, "rationale": "The source does not frame the Erie Canal as a direct reallocation of power from Southern planters to Northeastern merchants. Its significance is economic integration of the Northeast and Great Lakes basin, not a realignment of sectional power."}], "id": "q01"}, {"question": "Read the following definition: 'The transformation of the United States economy between approximately 1800 and 1860 from largely self-sufficient household production to participation in regional and national markets organized around wage labor, cash crops, and manufactured goods.' What is the term being defined, and which of the following sets of drivers does the source identify?", "options": [{"text": "The Industrial Revolution; steam engines, iron production, and urban factory systems.", "isCorrect": false, "rationale": "The Industrial Revolution is a broader term associated primarily with Britain and later applied to American manufacturing. The source's term is specifically the 'market revolution,' and the drivers it identifies are transportation improvements, production technologies, and credit expansion — not steam engines and urban factories specifically."}, {"text": "The Market Revolution; transportation improvements (canals, railroads), technological innovations (cotton gin, power loom, interchangeable parts), and expansion of credit and banking.", "isCorrect": true, "rationale": "The source's definition of the market revolution explicitly names these three drivers: 'transportation improvements (canals, railroads, turnpikes), technological innovations (cotton gin, power loom, interchangeable parts), and the expansion of credit and banking.' This is the complete answer as stated in the source."}, {"text": "The Market Revolution; British import competition, Southern plantation agriculture, and federal land sales in the West.", "isCorrect": false, "rationale": "While these factors existed, they are not the drivers the source identifies in its definition of the market revolution. British imports were actually disrupted by the War of 1812, not a positive driver of American market development."}, {"text": "The Commercial Revolution; paper money, long-distance trade, and the Atlantic slave trade.", "isCorrect": false, "rationale": "The Commercial Revolution is a European historiographical term associated with the 16th–17th centuries, not 19th-century America. The source's term is the market revolution, and its drivers are domestic technological and infrastructure changes."}], "id": "q02"}, {"question": "Eli Whitney's cotton gin (patented 1793) increased a single worker's daily cotton-cleaning output from roughly one pound to fifty pounds. A historian has called the cotton gin's social effect 'paradoxical.' Which of the following BEST explains this characterization?", "options": [{"text": "The cotton gin's efficiency allowed Southern planters to reduce their enslaved workforce while maintaining output levels, beginning the slow decline of slavery.", "isCorrect": false, "rationale": "The opposite occurred. The source explicitly states: 'By making cotton profitable enough to cultivate on a mass scale, the gin vastly expanded the demand for enslaved labor rather than replacing it.' The gin increased cotton profitability, which increased the demand for enslaved labor to grow and harvest it."}, {"text": "By making cotton cultivation far more profitable, the gin dramatically increased the demand for enslaved labor, deepening rather than undermining the plantation system it was supposed to make more efficient.", "isCorrect": true, "rationale": "The source calls this 'paradoxical': a labor-saving technology at the ginning stage increased labor demand at the growing and harvesting stage. Cotton production grew from 3,000 bales in 1790 to 4.5 million bales in 1860, requiring a massive enslaved workforce. The gin locked the South into a plantation system organized around enslaved labor."}, {"text": "Whitney's Northern origin created tension when he tried to profit from a technology adopted almost exclusively by Southern planters, producing sectional conflict over patent rights.", "isCorrect": false, "rationale": "While patent disputes occurred, this is not the 'paradox' the source identifies. The paradox is about labor demand, not geographic patent conflict."}, {"text": "The gin's efficiency made short-staple cotton so inexpensive that it undermined the market price, eventually making cotton cultivation unprofitable despite high production volumes.", "isCorrect": false, "rationale": "The source states cotton remained highly profitable and accounted for more than half the value of all American exports by the 1840s — the opposite of unprofitable."}], "id": "q03"}, {"question": "The Lowell mill system was initially celebrated as 'a model of industrial benevolence.' By the 1840s, the system had significantly changed. Which of the following BEST describes what changed and why?", "options": [{"text": "The mill owners shifted from hiring New England farm daughters to Irish immigrants and simultaneously introduced the speed-up and stretch-out, creating a more exploitable workforce with fewer alternatives to accept harsh conditions.", "isCorrect": true, "rationale": "The source describes exactly this transition: the speed-up (accelerated machinery), stretch-out (more looms per worker), and wage cuts were followed by the replacement of New England farm daughters — who could invoke 'republican rhetoric of citizenship' — with Irish immigrants who were 'more desperate, more vulnerable to dismissal, and less able to resist.' The structural change in workforce composition amplified the effects of deteriorating conditions."}, {"text": "Massachusetts law abolished the boarding-house system and required mill owners to allow workers to live independently, increasing labor costs and reducing profits.", "isCorrect": false, "rationale": "The source does not describe legal abolition of the boarding-house system. The changes were market-driven responses to competitive pressure, not legal mandates."}, {"text": "The mill girls organized a permanent union that successfully negotiated wage increases, prompting owners to replace them with cheaper immigrant labor to break union power.", "isCorrect": false, "rationale": "The source describes strikes (1834 and 1836) but does not describe a permanent successful union that forced a labor substitution. The transition to Irish immigrant labor was driven primarily by the post-famine immigration surge of the 1840s."}, {"text": "The Lowell system declined because railroad competition made the mills' canal-powered locations economically obsolete, forcing owners to adopt cost-cutting measures.", "isCorrect": false, "rationale": "The source does not attribute the Lowell system's deterioration to railroad competition displacing canal power. The changes were internal to the labor system — speed-ups, stretch-outs, wage cuts, and workforce replacement."}], "id": "q04"}, {"question": "The 'cult of domesticity' assigned men to the 'competitive public sphere of market work' and women to a 'private domestic sphere of home, family, and moral cultivation.' Which of the following BEST explains why historians describe this ideology as simultaneously elevating and confining women?", "options": [{"text": "The ideology gave women legal rights to property and contract in exchange for accepting domestic roles, creating a formal bargain between gender expectations and legal protections.", "isCorrect": false, "rationale": "The source states the opposite: the cult of domesticity 'confined them legally and economically' — married women could NOT own property, sign contracts, or vote. There was no legal rights exchange; the ideology elevated moral status while denying legal rights."}, {"text": "Women gained elevated moral status and authority within the domestic sphere while being denied property rights, contract rights, and the vote — and the ideology applied only to middle-class white women, excluding enslaved women, immigrants, and frontier women.", "isCorrect": true, "rationale": "The source explicitly identifies both dimensions: the ideology 'simultaneously elevated women's moral status and confined them legally and economically,' and 'applied primarily to middle-class white women; the experiences of enslaved women, immigrant factory workers, and frontier farm women contradicted the ideology's premises entirely.' Both the elevation and the exclusion are essential to understanding the ideology."}, {"text": "The ideology elevated women in rhetoric only, since middle-class women routinely violated its domestic prescriptions by working in the market economy alongside their husbands.", "isCorrect": false, "rationale": "The source does not describe middle-class women routinely violating the domestic ideology by working in the market. The ideology's limits were its legal restrictions and its exclusion of non-white and non-middle-class women, not routine middle-class non-compliance."}, {"text": "Women gained the right to vote in most Northern states by 1840 as compensation for accepting domestic confinement under the cult of domesticity.", "isCorrect": false, "rationale": "Women did not gain voting rights in Northern states by 1840. The Seneca Falls Convention (1848) demanded women's suffrage precisely because women were categorically excluded from voting. The cult of domesticity explicitly denied women political participation."}], "id": "q05"}, {"question": "The source identifies three distinct regional economies produced by the market revolution: the Northeast (manufacturing, finance), the South (slave-grown cotton), and the West (grain, livestock). A student argues these three regions were 'economically integrated but politically unified.' Which of the following BEST evaluates this argument?", "options": [{"text": "The argument is correct: economic integration produced political cooperation as each region recognized its dependence on the others.", "isCorrect": false, "rationale": "The source explicitly argues the opposite: economic interdependence produced antagonism rather than political unity. 'A market revolution that had woven the country together economically was simultaneously pulling it apart politically' because each region developed 'distinct labor systems, social structures, and political interests.'"}, {"text": "The argument is half-correct: the regions were economically integrated (Southern cotton fed Northern mills; Northern credit financed Southern plantations; Western grain fed Eastern cities), but this interdependence produced structural conditions for sectional conflict rather than political unity.", "isCorrect": true, "rationale": "The source directly addresses this: the regions 'needed the others,' but 'each also developed distinct labor systems, social structures, and political interests.' Economic integration and political antagonism were not contradictions but products of the same process — the market revolution 'simultaneously pulling it apart politically.'"}, {"text": "The argument is incorrect on both counts: the regions were economically isolated by the absence of a national transportation network and politically divided by the slavery question.", "isCorrect": false, "rationale": "The source describes a robust transportation network (canals, railroads) that did integrate regional economies — Southern cotton fed Northern mills, Western grain fed Eastern cities. The regions were economically interdependent, even if politically antagonistic."}, {"text": "The argument is correct regarding the South and West but incorrect regarding the Northeast, which developed an independent economy with no significant reliance on Southern or Western production.", "isCorrect": false, "rationale": "The source explicitly states that 'Southern cotton fed Northern mills' and that Northern middle-class prosperity 'rested on the cheap cotton that Southern slavery produced.' The Northeast was deeply dependent on the Southern slave economy."}], "id": "q06"}, {"question": "The internal slave trade moved roughly 700,000 people from the Upper South to the Deep South between 1820 and 1860. Which of the following BEST explains why this development was a direct consequence of the market revolution?", "options": [{"text": "The international slave trade's abolition in 1808 and the cotton gin's expansion of Deep South cotton cultivation created demand for enslaved laborers that could only be met through internal transfer from the Upper South.", "isCorrect": true, "rationale": "The source links these explicitly: the international slave trade was banned in 1808, and the cotton gin made Deep South cotton cultivation profitable at massive scale, creating demand for enslaved labor. With international supply cut off, the internal trade — moving people from the Upper South to the cotton-producing Deep South — became 'a massive commercial system.' The market revolution applied 'its logic of commodification to human beings.'"}, {"text": "Upper South plantation owners voluntarily reduced their enslaved workforces after cotton prices fell, selling the surplus to Deep South planters who remained profitable.", "isCorrect": false, "rationale": "The source notes that enslaved people's 'value rose steadily as cotton prices fluctuated' — the trade was not driven by Upper South surplus from falling prices but by Deep South demand for labor to grow cotton on an expanding scale."}, {"text": "The railroad enabled for the first time the rapid transport of large numbers of enslaved people across state lines, making the internal trade practically possible.", "isCorrect": false, "rationale": "While railroads did eventually facilitate the slave trade, the internal slave trade was already operating at massive scale between 1820 and 1840 — largely before railroads dominated transportation. The driver was demand, not transportation innovation."}, {"text": "Federal law required planters in border states to sell enslaved people south to limit the possibility of escape to Northern free states.", "isCorrect": false, "rationale": "No such federal law existed. The internal slave trade was driven by market forces — demand for labor in the cotton South and the economic incentive for Upper South planters to sell — not by federal legal mandates."}], "id": "q07"}, {"question": "The railroad is described as 'not simply a faster canal — it was a new spatial logic for the economy.' Which of the following BEST explains this distinction?", "options": [{"text": "Unlike canals, railroads could operate year-round, reach areas without navigable water, moved both freight and passengers faster, demanded iron and steel industries, and pushed commercial agriculture's frontier westward at unprecedented speed.", "isCorrect": true, "rationale": "The source identifies all of these as differences: 'Railroads could go where canals could not, ran year-round (canals froze), and moved passengers and freight faster.' They also had 'profound secondary effects: they required iron, then steel; they demanded standardized time zones; and they pushed the frontier of commercial agriculture westward faster than any wagon road could.' Together these constitute a different spatial and economic logic, not merely faster transportation."}, {"text": "Unlike canals, railroads were financed entirely by private capital rather than state government, making them the first market-driven infrastructure in American history.", "isCorrect": false, "rationale": "While railroads attracted substantial private investment, the source does not make this public-vs.-private finance distinction. The Erie Canal was state-financed; railroads had mixed public-private financing. This is not the 'new spatial logic' the source identifies."}, {"text": "Railroads replaced canals as the primary vehicle for Western grain shipment because canal tolls were prohibitively expensive compared to railroad freight rates.", "isCorrect": false, "rationale": "The source does not compare canal tolls to railroad freight rates as the primary distinction. The 'new spatial logic' was about geography (going where canals could not), seasonality (year-round operation), and the secondary economic effects (iron, standardized time)."}, {"text": "The railroad was a 'new spatial logic' because it connected the South to Northern markets for the first time, replacing the Mississippi River system that had previously dominated Southern commerce.", "isCorrect": false, "rationale": "The source does not frame the railroad primarily as a North-South connector displacing the Mississippi system. The railroad's significance in this section is its transformation of the Northern and Western interior economy."}], "id": "q08"}, {"question": "A student argues: 'The market revolution benefited all Americans by increasing the overall wealth of the nation.' Which of the following evidence drawn from the source MOST effectively challenges this claim?", "options": [{"text": "The Lowell mill girls went on strike in 1834 and 1836, demonstrating worker dissatisfaction with the system.", "isCorrect": false, "rationale": "While the strikes show worker grievances, they do not alone establish that the market revolution's costs were unequally distributed across class, race, and region. The more powerful counter-argument requires connecting multiple groups' experiences."}, {"text": "The market revolution produced permanent propertyless wage workers, deepened the internal slave trade that separated families, and concentrated middle-class prosperity in the North on foundations of Southern slave labor and Northern factory exploitation — distributing benefits and costs unevenly along class, race, and regional lines.", "isCorrect": true, "rationale": "The source makes this argument explicitly: 'The market revolution's benefits and costs were distributed with the same regional logic that was hardening into sectionalism.' The permanent proletariat was created, the slave trade moved 700,000 people, and Northern middle-class prosperity 'rested on the cheap cotton that Southern slavery produced and the cheap manufactured goods that Northern factory workers made under increasingly harsh conditions.' The benefits were real but unevenly distributed."}, {"text": "The Erie Canal paid back its construction costs in tolls within a decade, suggesting the market revolution prioritized profit over public welfare.", "isCorrect": false, "rationale": "The Erie Canal's financial success is cited as evidence of the canal's economic success, not as a critique of the market revolution's distributional consequences. Profitability and public welfare are not inherently in conflict."}, {"text": "The market revolution created a middle class of salaried professionals who displaced traditional artisans, showing that its benefits were redistributive rather than broadly generative.", "isCorrect": false, "rationale": "The source does not primarily frame the middle class's rise as the displacement of artisans. The counter-argument to 'all Americans benefited' requires addressing enslaved people, permanent wage workers, and the regional distribution of costs and gains."}], "id": "q09"}, {"question": "Which of the following BEST describes the relationship between the market revolution and the cult of domesticity as the source presents it?", "options": [{"text": "The market revolution and the cult of domesticity were unrelated phenomena — the ideology of domesticity predated industrialization and simply persisted unchanged through the market transformation.", "isCorrect": false, "rationale": "The source presents them as directly connected: the market revolution created the spatial separation of home and workplace (a 'spatial novelty'), the salaried middle class, and the conditions that made the domestic ideology both meaningful and possible. They were co-produced, not coincidental."}, {"text": "The market revolution created a salaried middle class and physically separated home from workplace, generating the social conditions in which the cult of domesticity emerged as an ideology assigning market work to men and domestic management to women.", "isCorrect": true, "rationale": "The source explicitly connects the two: middle-class families 'lived in houses separated from workplaces (a spatial novelty in a world where most people had worked where they lived)' and organized domestic life around the cult of domesticity. The market revolution's structural changes — middle-class formation, spatial separation of spheres — created the social conditions the domestic ideology described and prescribed."}, {"text": "The cult of domesticity was primarily a Southern ideology that the market revolution spread northward by linking Southern plantation culture to Northern commercial life.", "isCorrect": false, "rationale": "The source identifies the cult of domesticity as 'dominant in middle-class Northern culture' — it was a Northern, not Southern, ideology. The South's gender ideology was shaped differently by the plantation system."}, {"text": "The cult of domesticity was a working-class ideology that mill owners promoted to keep factory women from organizing, by telling them their proper place was in the home.", "isCorrect": false, "rationale": "The cult of domesticity is identified by the source as middle-class, not working-class. The source notes it 'applied primarily to middle-class white women' — the experiences of immigrant factory workers contradicted it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
