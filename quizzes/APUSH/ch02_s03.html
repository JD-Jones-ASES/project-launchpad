<script>
var QUESTIONS = [{"question": "John Winthrop's 'city upon a hill' sermon, delivered during the crossing to Massachusetts Bay in 1630, is significant in the long-term history of American political culture primarily because:", "options": [{"text": "It established the legal framework for the Massachusetts Bay Colony's governance before the settlers arrived.", "isCorrect": false, "rationale": "The sermon was a lay address, not a legal document; governance was handled by the charter and the General Court. The sermon's significance is cultural and rhetorical, not constitutional."}, {"text": "It articulated an idea of America as an exemplary community watched by the world — a metaphor invoked by American leaders from the colonial era through the twentieth century, usually stripped of its original communal demands.", "isCorrect": true, "rationale": "The source notes that presidents from Winthrop's era to Ronald Reagan's America have invoked the phrase, 'typically stripped of its original demand for communal self-sacrifice and submission to God's law' — illustrating how founding texts are selectively redeployed across centuries."}, {"text": "It persuaded King Charles I to grant Massachusetts Bay a more permissive charter that allowed religious dissent.", "isCorrect": false, "rationale": "Winthrop's sermon had no direct effect on the royal charter; the Massachusetts Bay charter was already in hand before the crossing. The sermon addressed the Puritan settlers themselves, not the crown."}, {"text": "It defined the relationship between civil and religious authority in a way that prevented future conflicts like the Hutchinson and Williams controversies.", "isCorrect": false, "rationale": "The sermon did not prevent these conflicts; if anything, Winthrop's vision of a godly commonwealth under communal authority was the framework that generated the conflicts with Williams and Hutchinson over the limits of that authority."}]}, {"question": "Roger Williams was banished from Massachusetts Bay in 1636 for two connected arguments that the Puritan leadership found intolerable. Which of the following correctly pairs those two arguments?", "options": [{"text": "He argued that the Bible was not the word of God, and that indigenous peoples had no right to their land.", "isCorrect": false, "rationale": "Williams was a committed Christian minister who accepted the Bible's authority. His position on indigenous land was the opposite: he argued that indigenous peoples had the only legitimate right to their territory."}, {"text": "He argued for separation of civil and religious authority, and that the king could not grant land he did not own — that only indigenous peoples could legitimately sell their territory.", "isCorrect": true, "rationale": "The source explicitly describes both arguments: Williams 'argued that the Massachusetts authorities had no right to punish violations of the first four commandments' (implying separation of civil and religious law) and 'challenged the colonists' title to the land, arguing that the king could not grant what he did not own.'"}, {"text": "He argued that women should be permitted to preach in churches, and that enslaved Africans should be given their freedom.", "isCorrect": false, "rationale": "These positions — women preaching and abolishing slavery — are associated with other figures. Williams' challenges were specifically about church-state separation and indigenous land rights."}, {"text": "He argued that the Half-Way Covenant cheapened church membership and should be rejected, and that civil magistrates had no authority over religious practice.", "isCorrect": false, "rationale": "The Half-Way Covenant was adopted in 1662, twenty-six years after Williams' banishment; he could not have criticized it. His objection to civil authority over religious practice is partly correct, but his land-rights argument is omitted here."}]}, {"question": "Read the following excerpt from the Mayflower Compact (1620): 'Do by these Presents, solemnly and mutually, in the Presence of God and one another, covenant and combine ourselves together into a civil Body Politick, for our better Ordering and Preservation... to enact, constitute, and frame, such just and equal Laws... as shall be thought most meet and convenient for the general Good of the Colony.' Based on this document, what political problem was the Compact designed to solve?", "options": [{"text": "The Pilgrims needed to establish a legal claim to Massachusetts Bay that would be recognized by the Virginia Company.", "isCorrect": false, "rationale": "The Pilgrims were trying to establish authority to settle outside their intended Virginia destination, not to satisfy the Virginia Company's charter. The compact created authority from scratch rather than claiming it from a pre-existing grant."}, {"text": "The Pilgrims had been blown off course from their Virginia charter area and lacked legal authority to settle at Plymouth — the compact created a voluntary political framework to establish governance in the absence of any external grant.", "isCorrect": true, "rationale": "The source's SOURCING NOTE states: 'The Mayflower's Separatist passengers had been blown off course from their intended Virginia destination; they had no legal authority to settle in Plymouth. Without a charter, the compact created a voluntary political framework from scratch — one of the first acts of self-governance in English North America.'"}, {"text": "The Pilgrims needed to reassure the Wampanoag people that the settlers had legitimate civil authority to negotiate land purchases.", "isCorrect": false, "rationale": "The compact was an internal document for the Pilgrim community, not a diplomatic instrument addressed to the Wampanoag; its audience was the settlers themselves and potentially the English crown."}, {"text": "The non-Separatist 'strangers' aboard the Mayflower were threatening to ignore Pilgrim authority once they reached land, requiring a formal agreement to bind all passengers.", "isCorrect": false, "rationale": "While internal tensions aboard the Mayflower may have contributed to the compact's urgency, the source grounds its significance in the absence of any legal charter authority to settle at Plymouth — the political legitimacy problem, not a specific passenger dispute."}]}, {"question": "Anne Hutchinson's antinomianism challenged Puritan authority most directly by:", "options": [{"text": "Claiming that only women could receive genuine divine revelation, excluding men from authentic spiritual experience.", "isCorrect": false, "rationale": "Hutchinson did not restrict revelation to women; her antinomian position was that true saints — of either sex — received direct revelation from the Holy Spirit and were not bound by the moral law as evidence of salvation."}, {"text": "Arguing that true saints received direct revelation from the Holy Spirit and were not bound by the moral law, undermining the authority of ministers whose visible piety was supposed to demonstrate their election.", "isCorrect": true, "rationale": "The source explains that Hutchinson's 'covenant of grace' theology 'undermined the authority of ministers, whose visible piety was supposed to provide evidence of their election.' If saints received direct revelation, ministers' authority as spiritual intermediaries was irrelevant — threatening the entire clerical social order."}, {"text": "Publishing pamphlets arguing that the Puritan colony's governance violated the English constitution.", "isCorrect": false, "rationale": "Hutchinson did not publish pamphlets; her challenge was theological and delivered through private household meetings that attracted large followings, including prominent men, before the authorities moved against her."}, {"text": "Insisting that indigenous peoples be admitted to full church membership on equal terms with English settlers.", "isCorrect": false, "rationale": "Hutchinson's challenge was entirely about the nature of salvation and ministerial authority — she did not address indigenous membership in the church."}]}, {"question": "King Philip's War (1675–78) is described as 'the bloodiest conflict, per capita, in American history.' Which of the following MOST accurately contextualizes the war's long-term significance?", "options": [{"text": "It demonstrated that Puritan religious orthodoxy could survive even catastrophic military violence, strengthening the covenant community.", "isCorrect": false, "rationale": "The war accelerated New England's spiritual crisis rather than strengthening Puritan orthodoxy; the Salem witch trials erupted in 1692 in a community 'already traumatized by war, economic stress, and anxieties about declining piety.'"}, {"text": "It broke the military power of New England's indigenous nations, opening vast new territories to colonial expansion, while traumatizing the colonial community and accelerating the spiritual anxieties that produced the Salem witch trials.", "isCorrect": true, "rationale": "The source explicitly states that 'the war's conclusion broke the military power of New England's indigenous nations, opening vast new territories to colonial expansion,' and that Salem's witch accusations erupted in a community 'already traumatized by war' — directly linking the two events."}, {"text": "It led the English crown to revoke Massachusetts Bay's charter, ending Puritan self-governance and integrating New England into the Dominion of New England.", "isCorrect": false, "rationale": "The Dominion of New England (established 1686) is related to but distinct from King Philip's War's direct consequences; the source does not identify charter revocation as the war's primary significance."}, {"text": "It united all colonial regions — Chesapeake, New England, and Middle Colonies — in a common military defense against indigenous resistance.", "isCorrect": false, "rationale": "King Philip's War was a regional New England conflict; it did not produce intercolonial military unity. The source describes it as a New England event affecting Massachusetts, Plymouth, and Rhode Island."}]}, {"question": "The Half-Way Covenant (1662) is best understood as evidence that:", "options": [{"text": "Puritan New England successfully maintained its theological standards across generations by requiring all members to demonstrate genuine conversion.", "isCorrect": false, "rationale": "The Half-Way Covenant represents the opposite — it was a pragmatic compromise that lowered the bar for membership because fewer second-generation Puritans experienced the dramatic conversion required for full membership. It marks the dilution, not preservation, of original standards."}, {"text": "The original Puritan covenant ideal faced generational challenges as fewer second-generation colonists reported dramatic conversion experiences, requiring pragmatic accommodation at the cost of theological consistency.", "isCorrect": true, "rationale": "The source defines the Half-Way Covenant as 'a pragmatic accommodation that preserved the connection between church and community at the cost of theological consistency' and states it 'marked the beginning of a slow but irreversible dilution of the original Puritan vision' — exactly because second-generation colonists were not reporting the required conversion experiences."}, {"text": "Puritan ministers used the covenant to extend church membership to indigenous converts who had demonstrated loyalty during King Philip's War.", "isCorrect": false, "rationale": "The Half-Way Covenant addressed the children and grandchildren of baptized (but not fully converted) English Puritan settlers; it had nothing to do with indigenous converts."}, {"text": "The colonial government used the covenant to determine which settlers qualified for land grants and tax exemptions in the western frontier territories.", "isCorrect": false, "rationale": "The Half-Way Covenant was a theological and ecclesiastical instrument governing church membership status, not a civil tool for allocating land or tax benefits."}]}, {"question": "The source describes the Salem witch trials of 1692 as possibly reflecting gender tensions, land disputes, and the aftermath of King Philip's War. A historian emphasizing gender would most likely argue that:", "options": [{"text": "The majority of the accusers were men whose land titles were disputed by women claiming inheritance rights.", "isCorrect": false, "rationale": "The accusers were primarily young women and girls, not men asserting land rights; the gender dynamic went the other direction — the accusations involved questions of women's spiritual authority and social position within a patriarchal community."}, {"text": "The trials reflected Puritan anxieties about women's spiritual authority, since the accusers were predominantly young women and many of the accused were women whose social independence or spiritual influence challenged patriarchal norms.", "isCorrect": true, "rationale": "The source asks 'was it primarily about gender and the suppression of women's authority?' — and the Hutchinson precedent (a woman whose spiritual authority drew crowds) was directly analogous. The Salem accusations targeted women whose positions were socially ambiguous, making gender a plausible interpretive lens."}, {"text": "The trials ended quickly because women jurors refused to convict other women, demonstrating a nascent sense of gender solidarity.", "isCorrect": false, "rationale": "No women served as jurors in 1692; the trials ended when accusations reached prominent people including the governor's wife — not because of women's collective resistance."}, {"text": "The accusers were specifically targeting Quaker women who had been using 'Inner Light' theology to claim spiritual equality with men.", "isCorrect": false, "rationale": "Salem Village's accusers targeted community members within Congregationalist New England; Quaker women from Pennsylvania were not the objects of the accusations."}]}, {"question": "The Puritan Paradox, as the source describes it, is that New England's commitment to democratic self-governance and its coercive orthodoxy were 'not opposites; they were two expressions of the same conviction.' Which of the following historical examples from the source best illustrates this paradox?", "options": [{"text": "The Half-Way Covenant's pragmatic accommodation of second-generation members simultaneously strengthened and weakened Puritan community bonds.", "isCorrect": false, "rationale": "The Half-Way Covenant illustrates theological accommodation and generational change, not the paradox between democratic self-governance and coercive orthodoxy that is the source's focus."}, {"text": "The same Congregationalist tradition that trained men in democratic deliberation through church governance also justified banishing Roger Williams and Anne Hutchinson and hanging alleged witches, because community responsibility for maintaining the covenant demanded both.", "isCorrect": true, "rationale": "The source explicitly states: 'The congregationalist tradition of church governance trained ordinary men in democratic deliberation' while 'the same Puritan communities expelled Anne Hutchinson, hanged nineteen alleged witches, and waged devastating war against indigenous peoples' — both expressions of the same conviction that the community bore collective responsibility for its spiritual health."}, {"text": "The House of Burgesses in Virginia used Puritan arguments about self-governance to justify tobacco planters' resistance to royal taxation.", "isCorrect": false, "rationale": "The Burgesses' representative tradition developed from English common law and planter interests, not from Puritan covenant theology; this conflates two distinct colonial governance traditions."}, {"text": "John Winthrop balanced authoritarian discipline with grudging acceptance of representative governance in the General Court.", "isCorrect": false, "rationale": "Winthrop's individual governance style illustrates one tension within Puritanism but does not capture the paradox at the level of institutions — both the democratic church meetings and the coercive orthodoxy functioning simultaneously as expressions of the same collective covenant logic."}]}, {"question": "A student claims: 'New England's tradition of self-governance was entirely democratic because every adult male in a Puritan congregation could vote.' A historian would most directly revise this claim by noting that:", "options": [{"text": "Congregationalist church governance required unanimous decisions, which effectively gave every member a veto and prevented majority rule.", "isCorrect": false, "rationale": "The source does not describe Congregationalist decisions as requiring unanimity; church governance involved voting and debate by admitted male members, with significant ministerial influence."}, {"text": "Full church membership required a public testimony of conversion experience, meaning those who had not 'converted' — including women categorically and many men — were excluded from this democratic participation.", "isCorrect": true, "rationale": "The source states that each congregation 'admitted members through a public testimony of conversion experience' and that women were not among the signatories of the Mayflower Compact. Democratic deliberation in Puritan New England was limited to admitted male church members, excluding women categorically and many men who had not demonstrated conversion."}, {"text": "The English crown required all New England colonies to restrict voting to men who owned more than fifty acres of land.", "isCorrect": false, "rationale": "No such royal land requirement governed voting in Puritan New England; qualifications were theological and property-based under colonial (not crown-dictated) rules."}, {"text": "New England ministers held absolute authority over town meetings and could override any congregational vote they judged contrary to scripture.", "isCorrect": false, "rationale": "Ministers were influential but did not hold absolute authority over town meetings; the congregationalist structure placed authority in the gathered congregation rather than in an external hierarchy — though ministerial influence was substantial."}]}, {"question": "Which of the following best explains why Roger Williams' founding of Providence and later Rhode Island was significant beyond his personal religious journey?", "options": [{"text": "Rhode Island's military alliance with the Narragansett people gave New England its first successful example of indigenous-colonial coexistence.", "isCorrect": false, "rationale": "Rhode Island's relations with the Narragansett were complicated; the colony was caught in the middle of King Philip's War. Williams' significance was in establishing a model of religious toleration and in purchasing rather than seizing indigenous land — not in a military alliance."}, {"text": "Williams established a colonial model of religious toleration based on the separation of civil and religious authority, and purchased land from the Narragansett rather than claiming it by royal grant — anticipating both the First Amendment and a more just approach to indigenous land relations.", "isCorrect": true, "rationale": "The source describes Williams' Rhode Island as 'a colony of religious tolerance' where he 'purchased land from the Narragansett rather than simply seizing it.' Both practices were exceptional in colonial America and pointed forward: toward the First Amendment's disestablishment clause and toward a (briefly attempted) alternative to dispossession."}, {"text": "Rhode Island became the first colony to elect women to its General Assembly, putting Williams' principle of spiritual equality into political practice.", "isCorrect": false, "rationale": "No colonial assembly admitted women members in the seventeenth century; Williams' egalitarianism extended to religious toleration and indigenous land rights, not to gender equality in formal governance."}, {"text": "Williams converted to Catholicism in Rhode Island, demonstrating that toleration meant even the most despised faith could find protection under civil governance.", "isCorrect": false, "rationale": "Williams did not convert to Catholicism; he eventually affiliated with no church, becoming a 'Seeker.' His significance lies in the institutional and political model of toleration, not in personal denominational journey."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
