<script>
var QUESTIONS = [{"question": "Thomas Jefferson called his election in 1800 'the Revolution of 1800.' Which of the following BEST justifies the use of the word 'revolution' to describe this event?", "options": [{"text": "Jefferson immediately abolished the national bank and repealed the Alien and Sedition Acts by executive order upon taking office.", "isCorrect": false, "rationale": "Jefferson did allow the Sedition Act to expire and pardoned those convicted under it, but he did not abolish the national bank immediately; he allowed its charter to lapse later. The revolutionary significance was primarily the peaceful transfer of power, not these specific policy acts."}, {"text": "It marked the first time in the republic's history that power transferred peacefully between rival political parties, demonstrating the Constitution's stability.", "isCorrect": true, "rationale": "The source explicitly identifies this as the revolutionary dimension: 'For the first time in the short life of the republic, power transferred peacefully from one political party to another.' This peaceful transfer was constitutionally unprecedented and validated the republic's institutional design."}, {"text": "Jefferson's strict-constructionist philosophy led him to reduce the size of the federal government to its pre-Hamiltonian state.", "isCorrect": false, "rationale": "Jefferson's presidency was marked by significant departures from strict construction — most notably the Louisiana Purchase — rather than a systematic rollback of Federalist structures. He contradicted his own ideology in practice."}, {"text": "The election produced a constitutional crisis when Federalists in the House refused to certify the electoral results, requiring Supreme Court intervention.", "isCorrect": false, "rationale": "The election did produce a House vote (because of the Jefferson-Burr electoral tie), but the source does not describe Federalist refusal to certify results or Supreme Court intervention. The crisis was resolved through the constitutional process."}]}, {"question": "Read the following passage: 'Jefferson was genuinely troubled. His strict-constructionist reading of the Constitution held that the federal government could only exercise powers explicitly granted in the document. The Constitution said nothing about purchasing foreign territory. He briefly considered asking Congress to amend the document before completing the deal, but Napoleon's impatience foreclosed that option.' According to this passage, what tension does Jefferson's decision to proceed with the Louisiana Purchase reveal?", "options": [{"text": "The tension between Federalist nationalism and Republican agrarianism that had defined American politics since 1789.", "isCorrect": false, "rationale": "While this tension existed, the passage specifically identifies a tension within Jefferson himself — between his stated constitutional philosophy and his pragmatic decision to act. The passage is about Jefferson's internal contradiction, not a broader ideological clash between parties."}, {"text": "The tension between Jefferson's stated commitment to strict constitutional construction and the pragmatic demands of governing, leading him to act beyond the Constitution's explicit authority.", "isCorrect": true, "rationale": "The passage directly describes Jefferson's strict-constructionist belief that the Constitution could only authorize explicit powers, followed by his decision to purchase territory the Constitution nowhere authorized. The source describes this as 'a necessary departure from theory in service of a greater end' — the textbook definition of pragmatic ideological inconsistency."}, {"text": "The tension between Jefferson's republican idealism and Napoleon's imperial ambition, which forced the United States into an unnecessary entanglement with European power politics.", "isCorrect": false, "rationale": "While Napoleon's pressure played a role, the passage locates the tension within Jefferson's own constitutional philosophy, not primarily in the conflict between American and French geopolitical interests."}, {"text": "The tension between Congress's authority to ratify treaties and the president's authority to negotiate them without prior legislative approval.", "isCorrect": false, "rationale": "The source does not describe a conflict between presidential and congressional treaty authority — Jefferson submitted the treaty to the Senate, which confirmed it. The identified tension was Jefferson's constitutional philosophy versus his pragmatic action."}]}, {"question": "Which of the following BEST explains why the Haitian Revolution was a precondition for the Louisiana Purchase becoming available to the United States?", "options": [{"text": "The Haitian Revolution inspired Jefferson to negotiate the purchase as a model of republican self-determination.", "isCorrect": false, "rationale": "Jefferson did not celebrate the Haitian Revolution — he and his fellow slaveholders were alarmed by it. The connection is strategic, not ideological: the revolution destroyed France's Caribbean plans, not Jefferson's inspiration."}, {"text": "The Haitian Revolution alarmed Spain into transferring Louisiana back to France, which then sold it to avoid American expansion.", "isCorrect": false, "rationale": "Spain transferred Louisiana to France in 1800 under the Treaty of San Ildefonso before the Haitian Revolution destroyed France's Caribbean plans. The causal chain is inverted here."}, {"text": "By defeating French forces and denying France a Caribbean empire, the Haitian Revolution eliminated the strategic rationale for France retaining Louisiana as a continental food-supply base, making Napoleon willing to sell.", "isCorrect": true, "rationale": "The source states directly: Napoleon had acquired Louisiana as 'the anchor of a projected French empire in the Caribbean,' and 'the collapse of that project — driven primarily by the Haitian Revolution — left Napoleon without the Caribbean granary Louisiana was meant to supply,' making him willing to sell the entire territory."}, {"text": "The Haitian Revolution bankrupted France's colonial treasury, forcing Napoleon to liquidate American territory to finance his European campaigns.", "isCorrect": false, "rationale": "While Napoleon needed funds (the source notes he was 'desperate for funds'), the primary cause of Louisiana's availability was the collapse of the Caribbean empire that Louisiana was meant to support — not a direct colonial bankruptcy."}]}, {"question": "Chief Justice John Marshall's opinion in Marbury v. Madison (1803) has been described as 'politically shrewd.' Which of the following BEST explains this characterization?", "options": [{"text": "Marshall sided with the Jefferson administration in every aspect of the ruling, avoiding a confrontation he knew the Court could not win.", "isCorrect": false, "rationale": "Marshall did not side with the Jefferson administration in every aspect — he agreed Marbury was entitled to his commission. The shrewdness was in the combination of finding for Jefferson's enemy on the merits while simultaneously denying the Court jurisdiction."}, {"text": "Marshall struck down the Judiciary Act provision that would have required the Court to act, technically ruling against Marbury while establishing the far more consequential power of judicial review — a power the Jefferson administration could not challenge without appearing to support unconstitutional legislation.", "isCorrect": true, "rationale": "The source explains this precisely: 'By ruling against Jefferson's enemy Marbury while simultaneously striking down a Federalist law, Marshall avoided a direct confrontation with the Jefferson administration while establishing a precedent of enormous long-term consequence.' The technical loser was Marbury; the structural winner was the judiciary."}, {"text": "Marshall's opinion deliberately avoided any claim of judicial supremacy, instead framing the ruling as a narrow procedural matter to prevent a constitutional crisis.", "isCorrect": false, "rationale": "The opposite is true: Marshall's opinion made an expansive claim for judicial authority — 'It is emphatically the province and duty of the judicial department to say what the law is.' The shrewdness was in the political packaging, not the avoidance of judicial supremacy claims."}, {"text": "Marshall persuaded Jefferson's own appointees on the Court to join a unanimous ruling, demonstrating that judicial independence could survive partisan pressure.", "isCorrect": false, "rationale": "The Court was not composed of Jefferson's appointees; Marshall was appointed by Adams. The unanimity reflected Marshall's command of his Federalist colleagues, not a cross-partisan coalition."}]}, {"question": "In McCulloch v. Maryland (1819), Marshall declared that 'the power to tax involves the power to destroy.' What doctrine did this reasoning establish?", "options": [{"text": "The doctrine of judicial review — that federal courts could invalidate state legislation conflicting with the Constitution.", "isCorrect": false, "rationale": "Judicial review was established in Marbury v. Madison (1803), not McCulloch. The 'power to tax involves the power to destroy' reasoning addressed the specific question of whether states could tax federal instrumentalities, establishing federal supremacy, not judicial review."}, {"text": "The doctrine of nullification — that states retained sovereign authority to declare federal laws unconstitutional.", "isCorrect": false, "rationale": "The doctrine of nullification was the argument Marshall was rejecting in McCulloch. The ruling held the opposite: federal supremacy prevailed over state authority when they conflicted."}, {"text": "Federal supremacy — that states could not use their taxing authority to interfere with or effectively destroy federal instrumentalities, since federal power prevails when federal and state authority conflict.", "isCorrect": true, "rationale": "The source explains that in McCulloch, Marshall 'declared that the power to tax involves the power to destroy, and that states could not use their taxing authority to nullify federal instrumentalities.' This established federal supremacy: when federal and state authority conflict, federal authority prevails."}, {"text": "The doctrine of implied powers — that Congress possessed powers reasonably implied by the Constitution even if not explicitly listed.", "isCorrect": false, "rationale": "McCulloch did establish implied powers (through the Necessary and Proper Clause interpretation), but the specific 'power to tax involves the power to destroy' reasoning addressed the federal supremacy question — Maryland's inability to tax the Bank — not the Bank's original constitutionality."}]}, {"question": "The Missouri Compromise of 1820 has been called evidence that the Era of Good Feelings was 'a political illusion.' Which of the following BEST explains this characterization?", "options": [{"text": "The Compromise revealed that partisan divisions between Federalists and Republicans had not actually disappeared but had merely gone underground.", "isCorrect": false, "rationale": "The Missouri Compromise did not primarily reveal Federalist-Republican divisions; organized Federalism had essentially collapsed. The compromise revealed sectional divisions over slavery that cut across party lines — a different and deeper cleavage."}, {"text": "The bitter sectional conflict over Missouri's admission as a slave state, resolved only through a formal compromise dividing the Louisiana Territory along a geographic line, revealed that slavery could shatter national unity despite the apparent surface consensus.", "isCorrect": true, "rationale": "The source explains that the Missouri Compromise 'revealed the slavery question's capacity to shatter national unity' and that Jefferson himself described it as 'like a fire bell in the night.' The bitter deadlock over Missouri exposed sectionalism as 'the dominant structural fact of American politics' beneath the surface calm."}, {"text": "Monroe's near-unanimous re-election in 1820 demonstrated that the Era of Good Feelings had consolidated presidential power in ways that made genuine democratic debate impossible.", "isCorrect": false, "rationale": "Monroe's near-unanimous re-election was cited as evidence of the apparent surface consensus (the 'good feelings'), not as evidence that debate was suppressed. The Missouri Crisis was what punctured that consensus."}, {"text": "The Panic of 1819 revealed that the financial policies of the Monroe administration were reckless and created economic suffering that contradicted the era's optimistic self-image.", "isCorrect": false, "rationale": "The Panic of 1819 is mentioned in the source as another piece of evidence debunking the Era of Good Feelings label, but the Missouri Compromise is the specific event that the source uses to demonstrate the 'political illusion' characterization through the slavery question."}]}, {"question": "The War of 1812 produced military results that one historian described as 'inconclusive' — yet it had significant consequences for the United States. Which of the following represents a lasting consequence NOT directly related to territorial gains?", "options": [{"text": "The United States gained Canada as a result of the war's favorable treaty terms.", "isCorrect": false, "rationale": "The United States did not gain Canada. The Treaty of Ghent restored the pre-war status quo: 'no territorial changes, no resolution of impressment.' The War Hawks' goal of annexing Canada was not achieved."}, {"text": "The war's disruption of British imports accelerated American manufacturing by forcing domestic production of goods previously imported.", "isCorrect": true, "rationale": "The source explicitly identifies this as a significant consequence: the war 'accelerated American manufacturing by cutting off British imports.' Economic self-sufficiency received a major boost precisely because British competition was temporarily removed."}, {"text": "The Battle of New Orleans forced Britain to cede Florida to the United States as part of the peace settlement.", "isCorrect": false, "rationale": "The Treaty of Ghent, not the Battle of New Orleans, ended the war, and it produced no territorial gains. Florida was acquired separately from Spain in 1821 under the Adams-Onís Treaty, not as a result of the War of 1812."}, {"text": "The war resolved the impressment dispute with Britain, protecting American sailors from forced service in the Royal Navy thereafter.", "isCorrect": false, "rationale": "The Treaty of Ghent explicitly did NOT resolve impressment — the source states 'no resolution of impressment.' The issue simply became moot as the Napoleonic Wars ended and Britain no longer needed to impress sailors."}]}, {"question": "The Corps of Discovery (1804–06) has been described as a journey whose 'significance was as much symbolic as scientific.' What does this mean?", "options": [{"text": "The expedition's scientific findings were largely inaccurate, making its political symbolism its only lasting contribution.", "isCorrect": false, "rationale": "The source describes the expedition as producing 'the first systematic botanical and geographical survey of the interior' — suggesting genuine scientific value. The 'symbolic' claim does not imply the scientific findings were inaccurate."}, {"text": "Beyond its maps and natural history data, the expedition symbolically asserted American sovereignty and claim across a continent already inhabited by dozens of indigenous nations who had not been consulted about American ownership.", "isCorrect": true, "rationale": "The source makes this argument precisely: 'It asserted American presence and claim across a continent that was already densely inhabited.' The symbolic dimension was the assertion of national sovereignty over territories and peoples who predated and did not consent to American expansion."}, {"text": "The expedition's findings about the Pacific Northwest were suppressed by the Jefferson administration, making the journey diplomatically symbolic but scientifically invisible.", "isCorrect": false, "rationale": "The source describes the expedition as producing detailed information on dozens of indigenous nations and a botanical and geographical survey — findings that were not suppressed. This answer contradicts the source."}, {"text": "Lewis and Clark's journey was primarily a symbolic gesture to France, demonstrating that the United States intended to develop its newly purchased territory.", "isCorrect": false, "rationale": "The expedition was aimed at exploration and assertion of American presence, not at signaling intentions to France. France had already sold the territory; there was no diplomatic message to send to Paris."}]}, {"question": "A student argues: 'The Marshall Court's decisions in Marbury v. Madison and McCulloch v. Maryland were essentially the same ruling, both doing the same thing.' A historian would most likely revise this claim by noting that:", "options": [{"text": "Marbury was a unanimous decision while McCulloch was decided by a narrow majority, making their long-term authority different.", "isCorrect": false, "rationale": "Both decisions were unanimous. The difference between the cases is not in their voting margins but in the distinct dimensions of federal power each addressed."}, {"text": "While both expanded federal power, Marbury addressed a different dimension — judicial authority to interpret the Constitution — than McCulloch, which addressed the scope of congressional power and the limits of state authority over federal institutions.", "isCorrect": true, "rationale": "The source identifies this explicitly: Marbury 'claimed for the judiciary the ultimate authority to interpret the Constitution' while McCulloch 'established the doctrine of implied powers' and 'settled the question of federal supremacy.' They expanded different facets of federal authority: judicial review vs. implied congressional powers and federal supremacy over states."}, {"text": "Marbury expanded federal power at the expense of the states, while McCulloch expanded state power at the expense of the federal government.", "isCorrect": false, "rationale": "This is reversed. McCulloch explicitly limited state power (Maryland could not tax the Bank) and expanded federal power (implied powers). Both decisions moved in the same direction — toward federal authority."}, {"text": "Marbury was immediately recognized as a landmark ruling while McCulloch was ignored by contemporaries and only recognized as significant by later historians.", "isCorrect": false, "rationale": "The source does not suggest McCulloch was ignored by contemporaries — it describes it as directly attacking 'the strict constructionism of Jefferson and the states'-rights tradition.' Both decisions had immediate political significance."}]}, {"question": "Read the following excerpt from Marbury v. Madison: 'It is emphatically the province and duty of the judicial department to say what the law is... a law repugnant to the constitution is void, and courts, as well as other departments, are bound by that instrument.' Which of the following historical developments does this passage MOST directly anticipate?", "options": [{"text": "The Nullification Crisis of 1832, in which South Carolina claimed state authority to void federal law within its borders.", "isCorrect": false, "rationale": "Marshall's reasoning in Marbury was actually the opposite of nullification: he claimed the judiciary, not individual states, was the authoritative interpreter of the Constitution. The passage anticipates federal judicial supremacy, not state nullification."}, {"text": "The Supreme Court's role as final arbiter of constitutional questions in landmark cases such as Dred Scott (1857) and Brown v. Board of Education (1954), exercising the power Marshall claimed here.", "isCorrect": true, "rationale": "The passage establishes judicial review — the power of federal courts to declare laws void if they conflict with the Constitution. This power is precisely what the Court exercised in Dred Scott, Brown, and countless subsequent cases. Marshall was 'writing constitutional law for posterity,' as the source notes."}, {"text": "Congress's passage of the Force Act during the Nullification Crisis, asserting federal military authority over states that refused to enforce federal law.", "isCorrect": false, "rationale": "The Force Act was an assertion of executive-legislative authority, not judicial authority. Marshall's passage anticipated the Court's role in constitutional interpretation, not congressional or executive enforcement power."}, {"text": "Jefferson's decision to proceed with the Louisiana Purchase despite its lack of explicit constitutional authorization.", "isCorrect": false, "rationale": "Jefferson's Louisiana Purchase decision was already in the past (both happened in 1803) and illustrated executive pragmatism, not judicial review. Marshall's passage establishes the Court's authority, not the president's latitude to act beyond explicit constitutional grants."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
