<script>
var QUESTIONS = [{"question": "The Pendleton Civil Service Act of 1883 initially covered only about 10 percent of federal positions. Yet the proportion of classified (merit-protected) positions grew steadily to more than 50 percent by 1900. What mechanism produced this expansion?", "options": [{"text": "Congress passed a series of supplementary acts expanding civil service coverage to specific departments, driven by public pressure from the reform movement", "isCorrect": false, "rationale": "The source describes an administrative mechanism — presidential classification authority — not successive congressional legislation. The expansion was produced by a built-in incentive structure, not by continued congressional action."}, {"text": "Each incoming administration had an incentive to classify additional positions to protect their own appointees from replacement by the next incoming party, creating a self-reinforcing expansion of merit protection", "isCorrect": true, "rationale": "The source explicitly describes this mechanism: 'each incoming administration could \"classify\" (bring under merit protection) additional positions' to protect their own officials from replacement, and 'administrations had an incentive to do so for the positions their own appointees occupied.' This self-reinforcing incentive structure drove the steady expansion from 10% to more than 50% by 1900."}, {"text": "The Civil Service Commission used its administrative authority to reclassify positions independently of presidential control, expanding merit coverage without executive action", "isCorrect": false, "rationale": "The source attributes expansion to administrative classification by incoming presidents protecting their own appointees, not to independent Civil Service Commission action."}, {"text": "Garfield's assassination shocked Congress into passing immediate amendments expanding civil service coverage to 50 percent of positions by the end of 1883", "isCorrect": false, "rationale": "Garfield's assassination catalyzed the Pendleton Act's passage, but the source does not describe immediate congressional expansion to 50%. The expansion to 50% occurred gradually over two decades through the presidential classification mechanism."}]}, {"question": "The Supreme Court's majority opinion in Plessy v. Ferguson (1896), written by Justice Henry Billings Brown, argued that mandated racial separation did not violate the Equal Protection Clause because:", "options": [{"text": "The 14th Amendment protected only economic rights, not social equality, and racial separation in transportation was a social rather than economic arrangement", "isCorrect": false, "rationale": "Brown's opinion made a different argument: not that the 14th Amendment applied only to economic rights but that it 'could not have been intended to abolish distinctions based upon color, or to enforce social, as distinguished from political, equality.' The majority also argued that segregation reflected a natural social distinction and imposed no legal inferiority."}, {"text": "The 14th Amendment could not have been intended to enforce social equality, and segregation reflected a natural social distinction that law could not override; any inferiority was merely a perception that Plessy himself was injecting into the situation", "isCorrect": true, "rationale": "The source quotes Brown's majority: the 14th Amendment 'could not have been intended to abolish distinctions based upon color, or to enforce social, as distinguished from political, equality.' The majority further argued that segregation 'reflected a natural social distinction that law could not override' and that it 'imposed no legal inferiority — only the perception of inferiority, which Plessy himself was injecting into the situation.'"}, {"text": "The 13th Amendment's prohibition on involuntary servitude had superseded the 14th Amendment's Equal Protection Clause for questions of racial separation in transportation", "isCorrect": false, "rationale": "Brown's majority did not argue that the 13th Amendment superseded the 14th. Plessy's argument was that both amendments were violated; Brown's response was to interpret the 14th Amendment narrowly, not to invoke the 13th as superseding it."}, {"text": "The Separate Car Act provided equal facilities in material terms, and the Equal Protection Clause only required equal material provision, not the elimination of racial categories", "isCorrect": false, "rationale": "While the 'separate but equal' doctrine does require material equivalence, Brown's holding was broader — and the key aspect the question tests is the majority's reasoning about why separation does not violate equal protection at all, which the source traces to the 'natural social distinction' argument."}]}, {"question": "Justice John Marshall Harlan wrote a famous dissent in Plessy v. Ferguson arguing that 'the Constitution is color-blind, and neither knows nor tolerates classes among citizens.' Why do historians consider Harlan's dissent the better-aged opinion?", "options": [{"text": "Harlan predicted accurately that 'separate but equal' facilities would in practice be equal in funding and quality, whereas Brown's majority incorrectly assumed they would be inferior", "isCorrect": false, "rationale": "Harlan's dissent did not predict that facilities would be equal in practice. The better-aging of Harlan's opinion refers to Brown v. Board of Education (1954) vindicating his constitutional argument — not to any prediction about facility funding."}, {"text": "Harlan's color-blind constitutional principle was vindicated by Brown v. Board of Education (1954), which overturned Plessy by holding that racial separation was 'inherently unequal' regardless of material comparability — confirming that Brown's majority had been constitutionally wrong for 58 years", "isCorrect": true, "rationale": "The source explicitly states that 'Harlan's dissent, vindicated by Brown, became a landmark text in American constitutional jurisprudence.' Brown v. Board (1954) overturned the 'separate but equal' doctrine by holding that separation itself was 'inherently unequal' — the same principle Harlan had articulated in 1896 when he wrote that the Constitution 'neither knows nor tolerates classes among citizens.'"}, {"text": "Harlan was the only justice to recognize that Plessy was not actually seven-eighths white, which the Court should have verified before ruling on questions of racial classification", "isCorrect": false, "rationale": "The source notes that Plessy 'was seven-eighths European and one-eighth African American (and who appeared white)' — this was a deliberate test-case strategy. Harlan's dissent did not rest on Plessy's phenotype but on the principle that the Constitution prohibits racial classification in law."}, {"text": "Harlan was the only justice who correctly understood the original intent of the 14th Amendment as requiring colorblind government, while Brown's majority misread the framers' purpose", "isCorrect": false, "rationale": "While Harlan did argue from constitutional principle, historians do not primarily credit him with superior originalist textual analysis. His opinion is valued because the principle he articulated — color-blind constitutional equality — was adopted by Brown and subsequent civil rights jurisprudence, demonstrating that his constitutional reasoning was correct."}]}, {"question": "Plessy v. Ferguson (1896) is described as constitutionalizing and protecting a racial segregation system that Southern states had been building for a decade. Which of the following BEST explains what the decision closed off?", "options": [{"text": "Plessy eliminated the possibility of private lawsuits by Black citizens challenging segregated facilities under state common law", "isCorrect": false, "rationale": "Plessy's significance was constitutional — it eliminated the 14th Amendment as a federal legal mechanism for challenging segregation, not private common law suits. The decision established that separate facilities were constitutionally permissible, which shielded the Jim Crow system from federal constitutional challenge for nearly six decades."}, {"text": "By ruling that separate facilities were constitutionally permissible, the Court eliminated the federal legal mechanism that might have challenged the Jim Crow order, creating a constitutional shield behind which the South maintained racial apartheid for nearly 60 years", "isCorrect": true, "rationale": "The source explicitly states: 'The decision's significance lies in what it closed off: by ruling that separate facilities were constitutionally permissible, the Court eliminated the federal legal mechanism that might have challenged the Jim Crow order.' Plessy gave the Jim Crow system a constitutional shield until Brown (1954)."}, {"text": "Plessy prevented Congress from passing the federal civil rights legislation that would have enforced the 15th Amendment's voting rights guarantees in the South", "isCorrect": false, "rationale": "Plessy addressed racial separation in public accommodations, not voting rights. The systematic disenfranchisement of Black voters in the South was accomplished through different mechanisms — poll taxes, literacy tests, grandfather clauses, violence — that were not directly addressed by the Plessy ruling."}, {"text": "Plessy overruled the Civil Rights Act of 1875, which had previously protected Black access to public accommodations, creating a legal vacuum that Southern states filled with Jim Crow legislation", "isCorrect": false, "rationale": "The Civil Rights Act of 1875 was struck down in the Civil Rights Cases (1883), thirteen years before Plessy. Plessy did not overrule the 1875 act; it constitutionalized the affirmative racial separation laws that filled the vacuum the 1883 decision had created."}]}, {"question": "The New Orleans Citizens' Committee organized the Plessy test case deliberately. What does the committee's strategy reveal about the nature of civil rights activism in the Gilded Age?", "options": [{"text": "It demonstrates that Black civil rights activism was primarily spontaneous rather than organized — the committee acted because Homer Plessy happened to be arrested, not because the committee had planned a legal challenge", "isCorrect": false, "rationale": "The source describes a deliberate test case: 'The test case had been organized by the New Orleans Citizens' Committee, a group of Creole civil rights activists, to challenge the constitutionality of racial segregation.' The arrest was organized, not spontaneous."}, {"text": "It demonstrates that organized Black and Creole civil rights activists were actively challenging the Jim Crow order through strategic litigation even before W.E.B. Du Bois and the NAACP formalized the legal challenge model", "isCorrect": true, "rationale": "The Citizens' Committee organized a deliberate constitutional challenge to Louisiana's Separate Car Act (1890) through a carefully designed test case — a strategy that anticipated the NAACP's legal challenges by two decades. This demonstrates continuous organized resistance to Jim Crow, not a gap between Reconstruction and the NAACP era."}, {"text": "The Citizens' Committee's strategy succeeded in establishing the principle that racial separation required at least materially equal facilities, which was a significant legal victory for Black civil rights", "isCorrect": false, "rationale": "The Citizens' Committee lost — Plessy upheld Louisiana's Separate Car Act 7–1. The 'separate but equal' doctrine was not a Black civil rights victory; it was the doctrine used to uphold segregation for nearly 60 years."}, {"text": "The Citizens' Committee strategy demonstrates that Reconstruction-era Black political organizations remained powerful enough to challenge Jim Crow laws in federal court in the 1890s", "isCorrect": false, "rationale": "By the 1890s, Black political power in the South had been effectively suppressed through violence, fraud, and law. The Citizens' Committee represented Creole civil rights activists pursuing a legal strategy precisely because political routes were being systematically closed off."}]}, {"question": "Ida B. Wells documented more than 700 lynchings in the decade after 1882 in Southern Horrors (1892) and A Red Record (1895). Congress refused to pass federal anti-lynching legislation throughout this period. Which of the following BEST explains this refusal?", "options": [{"text": "The Supreme Court had ruled that lynching was a local crime outside federal jurisdiction under the commerce clause, making federal legislation constitutionally impossible", "isCorrect": false, "rationale": "No such Supreme Court ruling on lynching and the commerce clause is described in the source. Congress's refusal was political — Southern Democrats filibustered every attempt — not constitutional."}, {"text": "Southern Democrats in Congress filibustered every federal anti-lynching bill, using their procedural power to block legislation that would have challenged the racial terror system underpinning Southern white supremacy", "isCorrect": true, "rationale": "The source explicitly states that 'Congress refused to pass, with Southern Democrats filibustering every attempt' at federal anti-lynching legislation. This political obstruction, sustained for decades, illustrates the relationship between the Senate's filibuster rules and the maintenance of racial terror in the South."}, {"text": "Republican presidents vetoed anti-lynching legislation because they feared alienating Southern business interests whose capital investment in the New South was critical to national economic growth", "isCorrect": false, "rationale": "The source attributes the failure to congressional filibuster by Southern Democrats, not to presidential veto. Republican presidents occasionally endorsed anti-lynching proposals, but Congress was the blocking point."}, {"text": "The anti-lynching movement lacked sufficient public support in the North because Wells's documentation was not credible to white northern audiences who could not verify her reported statistics", "isCorrect": false, "rationale": "Wells campaigned internationally and her work was influential among Northern reform audiences. The obstruction was political — Senate filibuster by Southern Democrats — not a failure of evidence credibility."}]}, {"question": "Booker T. Washington's Atlanta Compromise speech (1895) and W.E.B. Du Bois's critique of it represent a fundamental strategic disagreement. What was the core of that disagreement?", "options": [{"text": "Washington advocated economic self-improvement and vocational education while accepting social segregation; Du Bois demanded immediate full civil and political equality, arguing that accepting segregation precluded the political power necessary for economic advancement", "isCorrect": true, "rationale": "The source describes Washington's formula as 'industrial education, economic self-improvement, and tactful non-confrontation of racial hierarchy' that 'appeared to accept social segregation in exchange for economic opportunity.' Du Bois and the NAACP (1909) 'articulated an unambiguous demand for full civil and political equality' — a direct challenge to Washington's accommodationism."}, {"text": "Washington advocated immediate political confrontation with Jim Crow through mass boycotts, while Du Bois believed in gradualist economic advancement as the path to eventual equality", "isCorrect": false, "rationale": "This reverses the historical positions. Washington was the gradualist who avoided political confrontation; Du Bois was the one who demanded immediate full equality. Washington's approach was economic accommodationism; Du Bois's was political confrontationism."}, {"text": "Washington and Du Bois agreed on goals but disagreed on tactics — Washington believed in working within existing institutions while Du Bois believed in creating separate Black institutions", "isCorrect": false, "rationale": "The disagreement was substantive, not merely tactical. Washington's acceptance of social segregation 'in exchange for economic opportunity' represented a fundamental concession that Du Bois believed precluded equal citizenship, not simply a tactical disagreement about methods toward shared goals."}, {"text": "Washington focused on rural Black Southerners while Du Bois focused on urban Northern Black professionals, making their disagreement primarily about which constituency to prioritize", "isCorrect": false, "rationale": "While Washington's Tuskegee program did focus on rural Black Southerners and Du Bois's intellectual network was more urban, the disagreement the source identifies was about fundamental strategy — accommodation vs. confrontation on civil equality — not about constituency prioritization."}]}, {"question": "The source describes the systematic disenfranchisement of Black voters after 1877 through 'violence…fraud…and law.' Which of the following BEST illustrates the 'law' mechanism of disenfranchisement?", "options": [{"text": "States passed laws banning Black men from voting directly, which were challenged in federal court under the 15th Amendment but upheld by the Supreme Court as valid exercises of state police power", "isCorrect": false, "rationale": "The 15th Amendment prohibits explicit racial restrictions on voting, so states could not pass direct racial bans. The 'law' mechanism used facially race-neutral tools — poll taxes, literacy tests, grandfather clauses — that effectively excluded Black voters while technically complying with the 15th Amendment."}, {"text": "Poll taxes, literacy tests, and grandfather clauses effectively excluded Black voters while formally complying with the 15th Amendment's prohibition on explicit racial discrimination", "isCorrect": true, "rationale": "The source explicitly identifies these three mechanisms: 'poll taxes, literacy tests, and grandfather clauses that effectively excluded Black voters while formally complying with the 15th Amendment's prohibition on explicit racial discrimination.' These race-neutral laws produced racially discriminatory results."}, {"text": "The Supreme Court's ruling in Plessy v. Ferguson directly overturned the 15th Amendment, eliminating Black voters' constitutional right to vote", "isCorrect": false, "rationale": "Plessy addressed racial separation in public accommodations, not voting rights. Plessy never overturned the 15th Amendment; disenfranchisement was accomplished through facially neutral laws (poll taxes, literacy tests) and extralegal violence, not through Plessy's constitutional ruling."}, {"text": "The Compromise of 1877 included an explicit provision removing Black men from the federal voter rolls, implemented by the Hayes administration as part of the Reconstruction settlement", "isCorrect": false, "rationale": "No such explicit provision existed in the Compromise of 1877. The compromise involved withdrawal of federal troops, not explicit removal from voter rolls. Disenfranchisement was a state-level process accomplished through the race-neutral mechanisms the source describes."}]}, {"question": "The source describes the Gilded Age as characterized by high voter turnout (70–80% in presidential elections) and low governmental accomplishment. Which of the following BEST explains this paradox?", "options": [{"text": "High turnout reflected widespread citizen satisfaction with the existing political system, not political mobilization — content voters participated while dissatisfied minorities stayed home", "isCorrect": false, "rationale": "The source describes high turnout as a feature of a system obsessively focused on patronage and party loyalty, not citizen satisfaction. The Populist revolt and labor conflicts demonstrate massive dissatisfaction that coexisted with high turnout in the party-loyalty era."}, {"text": "The dominant parties were evenly matched and focused on patronage, tariffs, and currency rather than structural economic questions; the party system's competitive balance incentivized mobilizing partisan loyalty rather than addressing the structural issues that the Populists were raising", "isCorrect": true, "rationale": "The source explicitly identifies this: 'The dominant parties were evenly matched and obsessively focused on the politics of patronage, tariffs, and currency rather than on the structural economic questions that the Populists were raising.' High turnout reflected party organization and partisan loyalty, not policy achievement."}, {"text": "High voter turnout was artificially inflated by political machines that fraudulently voted the names of deceased and absent citizens, making the turnout figures unreliable evidence of genuine participation", "isCorrect": false, "rationale": "While machine fraud was real, the source's explanation for the paradox is structural — the party system's focus on patronage and tariff rather than structural reform — not primarily turnout inflation through fraud."}, {"text": "Low governmental accomplishment was a deliberate feature of the system: both parties agreed on laissez-faire principles and intentionally limited the federal government's role to distributing patronage and collecting revenue", "isCorrect": false, "rationale": "While laissez-faire ideology was real, the source does not present minimal government as a deliberate bipartisan design. The Pendleton Act and the Interstate Commerce Act show that some structural reform did occur; the problem was the party system's incentive structure, not an explicit anti-government agreement."}]}, {"question": "A student argues: 'Plessy v. Ferguson was unfortunate but understandable given the racial attitudes of 1896 — we should not judge nineteenth-century jurists by twenty-first-century standards.' A historian familiar with Harlan's dissent would most likely respond by pointing out that:", "options": [{"text": "The majority's decision reflected the consensus of both Black and white Americans in 1896, so judging Brown's majority is indeed presentism", "isCorrect": false, "rationale": "There was no Black American consensus supporting segregation; the New Orleans Citizens' Committee organized the test case specifically to challenge it, and organized Black resistance to Jim Crow was sustained throughout this period. The majority's 'natural social distinction' argument was contested in 1896, not merely by hindsight."}, {"text": "Harlan's dissent, written in 1896, demonstrates that the constitutional principle of color-blind equality was available to the majority at the time — the decision was not a product of unavoidable historical constraint but a choice that a dissenting colleague correctly identified as constitutionally wrong in the same moment", "isCorrect": true, "rationale": "The existence of Harlan's dissent — written in 1896, not 1954 — is the decisive historical evidence against the 'product of its time' defense. Harlan articulated the color-blind constitutional principle in the same year as the majority's decision; the constitutional reasoning that vindicated Harlan in Brown was available to Brown's majority in 1896 but rejected. The decision was a choice, not an inevitability."}, {"text": "By 1896 standards, Plessy was actually a progressive decision because it required at least formally equal facilities, whereas previous court decisions had permitted entirely unequal treatment without any 'equality' requirement", "isCorrect": false, "rationale": "The 'separate but equal' doctrine was not a progressive advance over previous law — it constitutionalized a system of racial separation and provided a framework that Southern states used to maintain separate and systematically inferior facilities for nearly 60 years. Calling it progressive requires ignoring both Harlan's dissent and the documented reality of unequal facilities under Jim Crow."}, {"text": "The student is correct that historical context matters, and Harlan's dissent should be understood as an outlier expression of radical abolitionist ideology that was not constitutionally grounded in mainstream 1896 legal thought", "isCorrect": false, "rationale": "Harlan's dissent drew on mainstream constitutional reasoning grounded in the text and purpose of the post-Civil War amendments; it was not radical abolitionism but careful constitutionalism. Its subsequent vindication by Brown demonstrates it was constitutionally sound, not merely ideologically extreme."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
