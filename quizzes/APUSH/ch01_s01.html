    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Indigenous America Before Contact</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian describes pre-contact indigenous North America as a place of 'breathtaking diversity,' where peoples ranged from small mobile bands to densely urbanized states. Which of the following pieces of evidence BEST supports this characterization?", "options": [{"text": "All indigenous peoples practiced three-sisters agriculture, which produced enough surplus food to sustain large populations.", "isCorrect": false, "rationale": "Three-sisters agriculture was common in the Eastern Woodlands and Mesoamerica but was not universal; Plains peoples were primarily hunter-gatherers and the Southwest had distinct agricultural systems, undermining a claim of uniform farming."}, {"text": "Indigenous societies included consensus-governed confederacies like the Iroquois, mound-building chiefdoms like Cahokia with populations exceeding contemporary London, and hunter-gatherer bands on the Great Plains.", "isCorrect": true, "rationale": "The source explicitly contrasts 'small bands of Plains hunter-gatherers' with 'densely urbanized states whose capitals exceeded any city in contemporary Europe' — and names the Iroquois Confederacy and Cahokia as specific examples of diverse political and demographic forms."}, {"text": "Mesoamerican empires like the Aztec had already conquered and unified most indigenous peoples of North America by 1491.", "isCorrect": false, "rationale": "The source makes clear that Aztec power was centered in central Mexico and that North American peoples — Iroquois, Cahokia's successors, Pueblo peoples, Plains bands — operated independently; no single empire unified the continent."}, {"text": "European explorers found that indigenous peoples shared a common religion and language, simplifying efforts at conversion.", "isCorrect": false, "rationale": "The source explicitly states that indigenous peoples were 'organized into hundreds of distinct nations, languages, and political systems' — the opposite of a shared common culture."}], "id": "q01"}, {"question": "The Iroquois Confederacy's governance structure — a council of fifty sachems making decisions by consensus — differed from the political systems most Spanish and English colonizers brought from Europe primarily because it:", "options": [{"text": "Relied on hereditary monarchy in which power passed automatically from a chief to his eldest son.", "isCorrect": false, "rationale": "The source describes consensus governance among sachems, not hereditary monarchy. Hereditary succession was more characteristic of European monarchies, not the Iroquois system."}, {"text": "Required agreement among representatives of five distinct nations rather than rule by a single sovereign, and operated through consensus rather than command.", "isCorrect": true, "rationale": "The source describes the Confederacy as 'a league of five nations' operating through 'a council of fifty sachems who made decisions by consensus' — a distributed, multi-nation structure that contrasted sharply with European hereditary monarchy and later drew comparisons to American federalism."}, {"text": "Excluded women from any political role, concentrating authority entirely in male warrior-chiefs.", "isCorrect": false, "rationale": "The source explicitly states that women 'held decisive influence over the selection and removal of male sachems' — the opposite of exclusion from political influence."}, {"text": "Was based on written law codes that assigned specific legal rights to each member nation.", "isCorrect": false, "rationale": "The source does not describe written law codes; the Iroquois Confederacy operated through oral tradition and consensus, not written codified law."}], "id": "q02"}, {"question": "Read the following excerpt: 'Corn provided a stalk for beans to climb, beans fixed atmospheric nitrogen back into the soil, and squash's broad leaves shaded the ground to retain moisture and suppress weeds.' What does this description of three-sisters agriculture BEST illustrate?", "options": [{"text": "That Eastern Woodlands peoples randomly discovered that planting these crops together produced higher yields.", "isCorrect": false, "rationale": "The precise ecological interdependence described — each plant benefiting the others in a specific way — indicates sophisticated agricultural knowledge developed over generations, not random discovery."}, {"text": "That indigenous agricultural systems incorporated sophisticated ecological knowledge that produced a self-reinforcing system sustaining soil fertility while feeding large, sedentary populations.", "isCorrect": true, "rationale": "The source describes each plant fulfilling a distinct ecological role — structural support, nitrogen fixation, moisture retention — that collectively sustained 'large, sedentary populations.' This reflects accumulated ecological expertise rather than simple crop selection."}, {"text": "That indigenous peoples of the Eastern Woodlands were primarily dependent on hunting and gathering rather than agriculture.", "isCorrect": false, "rationale": "Three-sisters agriculture is described as the 'signature system' anchoring 'Iroquois and many Algonquian-speaking communities of the Eastern Woodlands' — exactly the opposite of dependence on hunting and gathering."}, {"text": "That indigenous agriculture was inferior to European agricultural systems because it did not use iron plows.", "isCorrect": false, "rationale": "The source makes no such comparison; it describes three-sisters agriculture as a sophisticated and ecologically sound system capable of sustaining dense populations."}], "id": "q03"}, {"question": "Which of the following BEST explains why Cahokia's collapse before European contact is historically significant for understanding pre-contact indigenous America?", "options": [{"text": "It proves that indigenous peoples were unable to build or sustain complex civilizations without European assistance.", "isCorrect": false, "rationale": "The source explicitly challenges this view, noting Cahokia was 'larger than London at the same time' — its rise demonstrates indigenous complexity; its collapse is explained by ecological and political pressures, not European intervention."}, {"text": "It demonstrates that indigenous civilizations were dynamic, rising and falling due to ecological pressures, political fragmentation, and disease long before European contact.", "isCorrect": true, "rationale": "The source explicitly states: 'indigenous civilizations were dynamic, not static; they rose and fell in response to ecological and political pressures long before European contact.' Cahokia's collapse from drought, soil exhaustion, and disease is the direct illustration."}, {"text": "It shows that all major indigenous civilizations had vanished by 1491, leaving only small nomadic bands for Europeans to encounter.", "isCorrect": false, "rationale": "The source notes that 'successor Mississippian chiefdoms — including the Natchez and Caddo peoples — still dominated the region' when Europeans arrived; major indigenous societies remained."}, {"text": "It indicates that indigenous peoples lacked the agricultural technology needed to sustain large urban populations.", "isCorrect": false, "rationale": "The source explains Cahokia was 'supported by intensive maize agriculture in the surrounding floodplains' — agricultural productivity was sufficient; collapse resulted from prolonged drought and other factors, not insufficient technology."}], "id": "q04"}, {"question": "An archaeologist studying Pueblo Bonito in Chaco Canyon, New Mexico, discovers copper bells from Mexico, macaw feathers, and turquoise ornaments at the site. Based on the source, what does this assemblage of materials BEST suggest?", "options": [{"text": "That the Ancestral Puebloans had conquered and incorporated Mesoamerican peoples into a large empire centered in the Southwest.", "isCorrect": false, "rationale": "The source describes Chaco as a 'regional ceremonial and trade center' with roads radiating outward — not as an empire that conquered Mesoamerican peoples."}, {"text": "That Ancestral Puebloan society was part of long-distance trade networks connecting the Southwest to Mesoamerica, suggesting sophisticated economic and cultural exchange.", "isCorrect": true, "rationale": "The source identifies copper bells, macaw feathers, and turquoise as 'imported goods' and states they 'indicate connections reaching far to the south' — evidence of Chaco as a node in extensive trade networks, not an isolated community."}, {"text": "That the Ancestral Puebloans obtained these goods from Spanish traders who had arrived in the Southwest before the 1540s.", "isCorrect": false, "rationale": "The source places Chaco Canyon between 850 and 1150 CE, centuries before Spanish arrival in the 1540s — these goods circulated through indigenous trade networks entirely independent of European contact."}, {"text": "That the collapse of the Chaco system was caused by a military invasion from Mesoamerica that disrupted trade.", "isCorrect": false, "rationale": "The source attributes Chaco's collapse to 'prolonged drought documented in tree-ring records' — not military invasion or disruption of trade by external force."}], "id": "q05"}, {"question": "The Inca Empire (Tawantinsuyu) governed approximately ten million people without a writing system, using instead the quipu. This example BEST illustrates which of the following conclusions about pre-contact civilizations in the Americas?", "options": [{"text": "That American civilizations were uniformly less advanced than Eurasian civilizations because they lacked writing.", "isCorrect": false, "rationale": "The source treats the quipu as a sophisticated administrative tool that enabled governance of ten million people — absence of alphabetic writing did not indicate a lower level of administrative capacity."}, {"text": "That large-scale administrative complexity could be achieved through means other than alphabetic writing, reflecting distinct solutions to the challenges of governing large populations.", "isCorrect": true, "rationale": "The source explicitly notes the Inca administered 'some ten million people under a single administrative structure without a writing system — using instead the quipu' — illustrating that complex governance problems were solved through innovative, culturally distinct technologies."}, {"text": "That the Inca Empire collapsed before European contact because administrative inefficiencies caused by the absence of writing proved fatal.", "isCorrect": false, "rationale": "The source describes the Inca Empire as thriving in 1491, stretching 'six thousand miles' and governing from Cusco — it did not collapse before European contact."}, {"text": "That Mesoamerican civilizations were more advanced than Andean civilizations because they developed hieroglyphic writing systems.", "isCorrect": false, "rationale": "The source does not rank civilizations by technological advancement; it presents both the Aztec and Inca empires as large, sophisticated political systems that responded to distinct geographical and social environments."}], "id": "q06"}, {"question": "A student argues: 'Pre-contact indigenous peoples of North America were all nomadic hunter-gatherers who did not build permanent settlements.' Which of the following pieces of evidence from the source MOST directly refutes this claim?", "options": [{"text": "Plains peoples traded meat and hides to agricultural neighbors in exchange for corn and pottery.", "isCorrect": false, "rationale": "This evidence applies specifically to Plains peoples and actually suggests some nomadic characteristics (trading rather than farming); it does not most directly refute the claim that all peoples were nomadic."}, {"text": "The Ancestral Puebloans built multi-story stone and adobe architecture at Pueblo Bonito, with perhaps eight hundred rooms, that served as a regional ceremonial center.", "isCorrect": true, "rationale": "Pueblo Bonito — a five-story, eight-hundred-room stone structure occupied for centuries — is the clearest single refutation of the claim that all indigenous peoples were nomadic hunter-gatherers without permanent settlements."}, {"text": "The Iroquois Confederacy operated through a council of fifty sachems making decisions by consensus.", "isCorrect": false, "rationale": "This evidence speaks to Iroquois political organization, not directly to the question of nomadic versus sedentary life or the existence of permanent structures."}, {"text": "Cahokia's collapse between 1300 and 1400 CE remains one of the genuine mysteries of North American history.", "isCorrect": false, "rationale": "While Cahokia's collapse implies a prior urban existence, the claim about mystery does not directly refute the nomadic characterization — it requires inferring that Cahokia was previously a permanent settlement."}], "id": "q07"}, {"question": "Which of the following BEST explains why women's control of longhouses, food stores, and sachem selection in Iroquois society represented a significant cultural difference from the European societies that would later colonize North America?", "options": [{"text": "European women also controlled household resources and political appointments, so the difference was minimal.", "isCorrect": false, "rationale": "The source explicitly identifies Iroquois matrilineal organization as standing 'in sharp contrast to the patrilineal European societies that would soon arrive' — the contrast was real and significant, not minimal."}, {"text": "In Iroquois society, kinship, inheritance, and political influence flowed through the mother's line, whereas European societies were patrilineal and male-dominated, creating a fundamental misunderstanding about gender and power during colonial contact.", "isCorrect": true, "rationale": "The source contrasts Iroquois matrilineal organization — women controlling longhouses, food, and sachem selection — directly with 'patrilineal European societies,' noting that 'cultural misunderstanding around gender and power would prove one of many points of friction in later colonial relations.'"}, {"text": "Iroquois women were excluded from political life while Iroquois men controlled all household resources and clan membership.", "isCorrect": false, "rationale": "The source states the opposite: women 'held decisive influence over the selection and removal of male sachems' and 'controlled the longhouses, managed food stores.'"}, {"text": "European colonizers quickly adopted Iroquois matrilineal practices because they found them more efficient for managing colonial settlements.", "isCorrect": false, "rationale": "The source describes the gender difference as 'one of many points of friction in later colonial relations' — not as a model that Europeans adopted."}], "id": "q08"}, {"question": "Consider the geographic theme in the source's discussion of pre-contact civilizations. Which of the following BEST describes the relationship between environment and social organization in the Americas before 1492?", "options": [{"text": "Geography determined the level of civilization achieved, with more temperate climates always producing more complex societies.", "isCorrect": false, "rationale": "The source rejects deterministic arguments, explicitly stating: 'Geography did not determine civilization; it shaped the problems that civilizations solved.' The arid Southwest produced multi-story architecture; the Andes produced the Inca empire — 'more temperate' is not the determining variable."}, {"text": "Geography shaped the specific problems that different civilizations had to solve, producing distinct social, political, and technological responses adapted to particular ecological conditions.", "isCorrect": true, "rationale": "The source's GEO theme connection explicitly states that 'geography did not determine civilization; it shaped the problems that civilizations solved' — the Mississippi floodplains rewarded maize agriculture, the Colorado Plateau pushed toward communal architecture, and the Andean vertical ecology produced the Inca redistribution network."}, {"text": "Geography had no meaningful effect on indigenous social organization; all indigenous cultures evolved the same basic political and economic structures regardless of environment.", "isCorrect": false, "rationale": "The source's entire argument is the opposite: 'each had adapted, with remarkable sophistication, to the ecological conditions of their particular environment' — geographic variation directly produced cultural variation."}, {"text": "Only coastal environments could support complex civilizations because sea trade was the only viable economic base for large populations.", "isCorrect": false, "rationale": "The source's most dramatic urban examples — Cahokia and Tenochtitlan — were both interior sites; Cahokia was at the confluence of inland rivers, and Tenochtitlan was built on a lake. Coastal access was not required for urban complexity."}], "id": "q09"}, {"question": "A teacher asks students to evaluate the claim: 'By 1491, the most advanced civilizations in the Americas were located in Mesoamerica and the Andes, while North American peoples lived in simple, primitive conditions.' Based on the source, a student who disagrees with this claim would BEST cite:", "options": [{"text": "The fact that North American peoples maintained trade networks with Mesoamerican civilizations, showing cultural borrowing.", "isCorrect": false, "rationale": "While the Chaco Canyon site shows connections to Mesoamerica, simply borrowing goods does not itself refute the claim of comparative 'primitivism' — the student needs evidence of independent political and urban complexity in North America."}, {"text": "Cahokia's estimated population of ten to twenty thousand, which exceeded contemporary London, and the Iroquois Confederacy's sophisticated consensus governance, which later historians compared to elements of American federalism.", "isCorrect": true, "rationale": "These two pieces of evidence directly counter the 'simple/primitive' characterization: Cahokia's population exceeding London establishes demographic-urban sophistication, and the Iroquois Confederacy's governance demonstrates political complexity independent of Mesoamerican or Andean models."}, {"text": "The fact that Plains peoples were nomadic hunter-gatherers, since nomadism requires sophisticated knowledge of animal migration patterns.", "isCorrect": false, "rationale": "While this defense of Plains complexity has merit, it actually concedes the contrast with sedentary urban civilizations rather than refuting the claim that North American peoples lacked 'advanced' political and urban development."}, {"text": "The Ancestral Puebloans' adoption of the quipu from the Inca Empire as an administrative tool for managing their trade networks.", "isCorrect": false, "rationale": "The source attributes the quipu to the Inca Empire, not the Ancestral Puebloans — no such connection is made in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
