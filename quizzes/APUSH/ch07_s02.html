<script>
var QUESTIONS = [{"question": "Upton Sinclair famously lamented: 'I aimed at the public's heart and by accident hit it in the stomach.' This statement most directly illustrates which limitation of the Progressive reform movement?", "options": [{"text": "Progressive reformers lacked the political skill to translate public outrage into legislation", "isCorrect": false, "rationale": "The Pure Food and Drug Act and Meat Inspection Act (1906) were legislative successes; the limitation was not in political skill but in whose interests the legislation served."}, {"text": "The reform impulse served middle-class consumer interests rather than the working-class and immigrant exploitation that reformers like Sinclair had intended to address", "isCorrect": true, "rationale": "Sinclair's lament captures the gap between progressive intent (labor exploitation) and legislative outcome (food safety for middle-class consumers) — revealing that the Progressive regulatory state was more responsive to property-owning consumers than to immigrant workers."}, {"text": "Muckraking journalism was too emotionally charged to produce careful deliberative legislation", "isCorrect": false, "rationale": "The emotional impact of The Jungle did produce legislation — the problem was which interests the legislation addressed, not whether it succeeded."}, {"text": "Sinclair's socialist politics made him incapable of influencing mainstream American policy", "isCorrect": false, "rationale": "Sinclair's book directly influenced Roosevelt's decision to send government investigators and to push for the Pure Food and Drug Act — his politics did not prevent policy impact."}], "id": "q01"}, {"question": "Read the following excerpt from The Jungle (1906): 'When they were fished out, there was never enough of them left to be worth exhibiting — sometimes they would be overlooked for days, till all but the bones of them had gone out to the world as Durham's Pure Leaf Lard!' Based on the SOURCING NOTE in the text, which of the following best describes the gap between Sinclair's purpose and the law's content?", "options": [{"text": "Sinclair intended to expose food contamination; the Pure Food and Drug Act instead addressed labor exploitation", "isCorrect": false, "rationale": "This reverses the actual gap: Sinclair intended to expose labor exploitation, but the law addressed food contamination for consumers."}, {"text": "Sinclair intended to expose worker exploitation and build support for socialist restructuring; the law that resulted addressed food safety for consumers rather than labor conditions", "isCorrect": true, "rationale": "The SOURCING NOTE explicitly states: Sinclair's purpose was 'to expose worker exploitation and build support for socialist restructuring of industry,' while 'the effective purpose — the one that produced the Pure Food and Drug Act — was exposing food contamination to consumers.'"}, {"text": "Sinclair intended to expose food contamination; the law that resulted instead regulated railroad shipping rates", "isCorrect": false, "rationale": "The Hepburn Act addressed railroad rates; the Pure Food and Drug Act addressed food safety. Sinclair's stated purpose was labor exploitation, not food safety."}, {"text": "Sinclair intended to build middle-class consumer support for regulation; the law instead served the interests of large meatpacking corporations", "isCorrect": false, "rationale": "While some historians argue the big packers benefited from standardized regulation that disadvantaged small competitors, the source attributes Sinclair's intent specifically to socialist labor goals — not middle-class consumer advocacy."}], "id": "q02"}, {"question": "The Seventeenth Amendment (1913) established direct election of senators in order to", "options": [{"text": "reduce the power of federal courts to overturn democratically enacted legislation", "isCorrect": false, "rationale": "The Seventeenth Amendment addressed senatorial selection, not judicial review; limiting court power was the goal of other Progressive proposals."}, {"text": "break the connection between corporate interests and senators beholden to the state legislative machines those corporations controlled", "isCorrect": true, "rationale": "Progressives argued that the original system produced senators loyal to corporate interests that controlled state machines. Direct election aimed to make senators accountable to voters rather than machine-controlled state legislatures."}, {"text": "allow senators to serve longer terms and build the institutional expertise needed for regulatory oversight", "isCorrect": false, "rationale": "The Seventeenth Amendment changed how senators were chosen, not how long they served; the six-year term remained unchanged."}, {"text": "ensure that Southern states could not use the state legislature system to exclude Black voters from senatorial elections", "isCorrect": false, "rationale": "Direct election was a Progressive democracy reform, not a racial inclusion measure; Black Southern voters remained disenfranchised after the Seventeenth Amendment through poll taxes, literacy tests, and violence."}], "id": "q03"}, {"question": "Which of the following best explains why the Eighteenth Amendment (Prohibition) is considered a Progressive reform failure even though it was enacted through democratic processes?", "options": [{"text": "It was declared unconstitutional by the Supreme Court before it could take effect", "isCorrect": false, "rationale": "Prohibition was not struck down; it was in effect from 1920 to 1933, when it was repealed by the Twenty-First Amendment — a democratic reversal, not a judicial one."}, {"text": "It demonstrated that legislating cultural behavior produces widespread non-compliance, organized crime, corruption of law enforcement, and disrespect for law — the opposite of its intended social improvement", "isCorrect": true, "rationale": "The source describes Prohibition as 'a spectacular policy failure, giving rise to bootlegging, organized crime, and widespread disrespect for the law' — demonstrating that even democratically enacted reform can produce outcomes worse than the problem it addressed."}, {"text": "It was never supported by a majority of Americans and was passed through procedural manipulation of the amendment process", "isCorrect": false, "rationale": "Prohibition had broad democratic support from women's groups, Protestant churches, and rural reformers — the source describes it as 'the culmination of a century of temperance agitation,' not a manipulated minority imposition."}, {"text": "It was struck down in Schechter Poultry Corp. v. United States and invalidated as an unconstitutional federal overreach", "isCorrect": false, "rationale": "The Schechter case struck down the NRA (a New Deal program), not Prohibition; Prohibition was repealed legislatively, not judicially."}], "id": "q04"}, {"question": "The Nineteenth Amendment (1920) guaranteed women the right to vote, but the source notes that in practice it 'largely benefited white women.' Which of the following best explains this limitation?", "options": [{"text": "Most women chose not to vote in the first elections after passage, limiting the amendment's practical effect", "isCorrect": false, "rationale": "The limitation was structural and coercive, not a matter of women's choices; Black women in the South were blocked by the same disenfranchisement machinery as Black men."}, {"text": "Black women in the South continued to face poll taxes, literacy tests, violence, and other disenfranchisement mechanisms that the Nineteenth Amendment did not address", "isCorrect": true, "rationale": "The source explicitly states that Black women 'continued to face the same disenfranchisement machinery as Black men' — meaning the Nineteenth Amendment expanded formal rights without dismantling the racial infrastructure of voter suppression."}, {"text": "The Supreme Court ruled that the Nineteenth Amendment could not apply in states that had not ratified it", "isCorrect": false, "rationale": "Constitutional amendments apply to all states once ratified; no such Supreme Court ruling existed. The disenfranchisement of Black women was accomplished through discriminatory state laws, not a constitutional carve-out."}, {"text": "Women's suffrage organizations had explicitly opposed including Black women in the amendment to secure Southern support", "isCorrect": false, "rationale": "While some suffrage leaders did make compromises on race to court Southern support, the source's explanation of the limitation focuses on the continuation of disenfranchisement machinery, not on a formal exclusion from the amendment's text."}], "id": "q05"}, {"question": "Ida Tarbell's The History of the Standard Oil Company (1904) differed from other muckraking journalism primarily in that", "options": [{"text": "she wrote as a committed socialist exposing capitalism rather than as a neutral investigative journalist", "isCorrect": false, "rationale": "The source says the opposite: 'Tarbell's work was not polemical; it was archival.' She reproduced internal documents and traced specific business transactions — the opposite of ideological advocacy."}, {"text": "her work was archival rather than polemical — she used internal documents, interviews, and specific transactions to build an empirical case rather than relying on emotional appeals", "isCorrect": true, "rationale": "The source explicitly contrasts Tarbell's method: 'Tarbell's work was not polemical; it was archival. She reproduced internal Standard Oil documents, interviewed competitors, and traced specific business transactions.'"}, {"text": "she focused on government corruption rather than corporate malfeasance, making her work more politically consequential", "isCorrect": false, "rationale": "Tarbell focused on Standard Oil's corporate conduct — secret railroad rebates, predatory pricing, corporate espionage — not primarily on government corruption."}, {"text": "her book was never serialized in a magazine and so reached only elite readers rather than a mass audience", "isCorrect": false, "rationale": "The source explicitly states Tarbell's work was 'serialized in McClure's Magazine,' making it a mass-audience publication."}], "id": "q06"}, {"question": "The Hepburn Act (1906) was significant primarily because it", "options": [{"text": "created the first federal income tax, shifting the revenue base from tariffs to graduated income taxation", "isCorrect": false, "rationale": "The federal income tax was authorized by the Sixteenth Amendment (1913), not the Hepburn Act (1906)."}, {"text": "gave the Interstate Commerce Commission power to set maximum railroad rates and inspect company books — for the first time, a federal agency could impose binding rates on a private industry", "isCorrect": true, "rationale": "The source explicitly marks this as the first time 'a federal agency had power to impose binding rates on a private industry,' establishing the principle of continuous federal regulatory authority over a private sector."}, {"text": "established the Federal Reserve system to manage the money supply and regulate banks", "isCorrect": false, "rationale": "The Federal Reserve was created in 1913, not by the Hepburn Act; the Hepburn Act specifically addressed railroad rate regulation."}, {"text": "broke up Standard Oil under the Sherman Antitrust Act, ending Rockefeller's control of American refinery capacity", "isCorrect": false, "rationale": "Standard Oil was broken up by a Supreme Court decision in 1911, following antitrust suits under the Sherman Act initiated during Roosevelt's presidency — a separate action from the Hepburn Act."}], "id": "q07"}, {"question": "The Triangle Shirtwaist Factory fire (1911) most directly contributed to which Progressive Era development?", "options": [{"text": "The passage of the Pure Food and Drug Act and the Meat Inspection Act of 1906", "isCorrect": false, "rationale": "These acts preceded the Triangle fire (1906 vs. 1911) and were triggered by Sinclair's The Jungle, not the fire."}, {"text": "New York's Factory Investigating Commission, which enacted fifty-six labor-safety laws over the subsequent four years", "isCorrect": true, "rationale": "The source explicitly states that the fire 'galvanized the labor movement and produced New York's Factory Investigating Commission, which enacted fifty-six labor-safety laws over the next four years.'"}, {"text": "The passage of the Eighteenth Amendment and the beginning of the Prohibition movement", "isCorrect": false, "rationale": "Prohibition was driven by temperance organizations and religious groups, not by the labor safety movement triggered by the Triangle fire."}, {"text": "The Supreme Court's decision in Muller v. Oregon upholding maximum-hours laws for women workers", "isCorrect": false, "rationale": "Muller v. Oregon was decided in 1908, three years before the Triangle fire; it was a separate legal development in the Progressive labor reform tradition."}], "id": "q08"}, {"question": "The Progressive Era's 'administrative state' was controversial from its inception. Which of the following best captures the three-sided debate about federal regulatory agencies as described in the source?", "options": [{"text": "Business interests called it necessary; labor said it went too far; progressives said it was unconstitutional", "isCorrect": false, "rationale": "This reverses the actual positions: business called it unconstitutional, not necessary; progressives called it essential, not unconstitutional."}, {"text": "Business interests called it unconstitutional; labor said it served business rather than workers; progressives called it essential", "isCorrect": true, "rationale": "The source states precisely this: 'business interests called it unconstitutional, labor said it served business, and progressives called it essential' — a three-way conflict that has 'echoed without resolution through every generation since.'"}, {"text": "Business interests supported it as a check on labor radicalism; labor supported it as a protection for workers; progressives opposed it as insufficient", "isCorrect": false, "rationale": "This misrepresents all three positions; in particular, business interests were the principal opponents of federal regulation, not its supporters."}, {"text": "Democrats supported it as an expansion of federal power; Republicans opposed it as socialism; Populists called it a corporate capture of government", "isCorrect": false, "rationale": "The debate the source describes cuts across party lines — the three positions (unconstitutional, serves business, essential) are class-based rather than party-based distinctions."}], "id": "q09"}, {"question": "Which of the following best describes the limits of the Progressive Era's democratic achievements?", "options": [{"text": "Progressivism failed entirely because it produced no lasting legislation or constitutional change", "isCorrect": false, "rationale": "The source describes 'lasting institutional results: constitutional amendments that reshaped American democracy, landmark federal regulatory statutes, and the modern administrative state' — this characterization is factually wrong."}, {"text": "Progressive reforms served middle-class white Protestant interests while often ignoring or actively harming African Americans, immigrants, and workers outside its definition of the deserving public", "isCorrect": true, "rationale": "The source explicitly identifies this as the movement's structural limit: 'its tendency to serve middle-class white Protestant interests while ignoring or actively harming African Americans, immigrants, and workers who fell outside its definition of the deserving public.'"}, {"text": "Progressivism was entirely co-opted by corporate interests who turned regulatory agencies into instruments of business protection rather than public welfare", "isCorrect": false, "rationale": "While labor's complaint that the regulatory state 'served business' has merit, the source presents a more nuanced three-sided debate — complete corporate capture is an overstatement that the source does not support."}, {"text": "The Progressive Era was a failure of leadership: without Theodore Roosevelt's personal energy and charisma, no significant reform would have occurred", "isCorrect": false, "rationale": "The source attributes Progressive reform to a 'loose coalition of overlapping crusades' including settlement-house workers, muckrakers, labor organizers, and politicians — reducing it to Roosevelt's charisma misses the social movement dimensions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
