<body>

    <div id="score-box" class="score-box">

    <div class="quiz-actions">

<script>
var QUESTIONS = [{"question": "The USA PATRIOT Act (2001) was signed 45 days after the September 11 attacks and passed with minimal congressional opposition (98–1 in the Senate). Which of the following best explains why the source treats this speed and near-unanimity as historically significant?", "options": [{"text": "The speed proved that Congress was capable of bipartisan action on national security issues, a model that subsequent administrations successfully replicated.", "isCorrect": false, "rationale": "The source does not present the PATRIOT Act's passage as a model of successful bipartisan governance; it notes the passage in the context of expanded surveillance authority and subsequent controversy — the speed is significant as a warning about crisis-driven legislation, not as a model."}, {"text": "Legislation passed in the immediate aftermath of catastrophic attacks may expand executive and surveillance powers so broadly that civil-liberties consequences outlast the emergency, as the PATRIOT Act's provisions did — some for two decades.", "isCorrect": true, "rationale": "The source notes the Act passed 'with minimal opposition,' expanded surveillance 'dramatically,' and its provisions 'were renewed multiple times' — some 'scaled back after the NSA surveillance revelations of 2013 demonstrated that the government had interpreted its authorities more broadly than Congress had understood.' The speed is significant as a marker of crisis-driven over-expansion."}, {"text": "The near-unanimous vote demonstrated that American civil liberties protections were strong enough to survive even emergency legislation, since the Act was quickly constrained by the courts.", "isCorrect": false, "rationale": "The source describes courts as pushing back on specific elements (Guantanamo rulings), but the PATRIOT Act itself was renewed multiple times rather than quickly constrained; the source emphasizes the Act's durability, not the resilience of civil liberties against it."}, {"text": "The speed showed that Congress, not the executive branch, was the dominant branch in national security policy during the Bush administration.", "isCorrect": false, "rationale": "The source's narrative consistently emphasizes executive-branch dominance in national security decisions — the PATRIOT Act's rapid passage actually gave the executive expanded surveillance authority, not congressional oversight; the question of executive vs. congressional dominance is about oversight, not legislative speed."}], "id": "q01"}, {"question": "The Bush administration's case for the Iraq War rested on three claims. According to the source, which of the following accurately describes what happened to those claims?", "options": [{"text": "All three claims proved to be false or wildly overstated: no WMD were found, the intelligence was fabricated or misread, and al-Qaeda-Saddam links were essentially nonexistent.", "isCorrect": true, "rationale": "The source states exactly: 'All three claims proved to be false or wildly overstated. No WMD were found after the invasion. The intelligence on which the claims were based was, in significant part, fabricated or misread. The links between Saddam Hussein...and al-Qaeda were essentially nonexistent.'"}, {"text": "Two of the three claims proved true: WMD were discovered in storage but were not functional, and al-Qaeda operatives were found to have attended training in Iraq, though Saddam's direct involvement was not established.", "isCorrect": false, "rationale": "The source states WMD were not found ('No WMD were found after the invasion') and al-Qaeda-Saddam links were 'essentially nonexistent' — the claim of partial truth is inconsistent with the source's direct statements."}, {"text": "The claims about WMD proved false, but the claim about al-Qaeda links proved accurate, as documents captured after the invasion showed coordination between Iraqi intelligence and al-Qaeda.", "isCorrect": false, "rationale": "The source explicitly states al-Qaeda links were 'essentially nonexistent' — this is reinforced by the description of Saddam Hussein as 'a secular Ba'athist whose regime brutally suppressed Islamist movements,' making an al-Qaeda alliance ideologically inconsistent."}, {"text": "Historians debate whether the WMD claims were deliberately falsified by the administration or resulted from genuine intelligence failures; the source acknowledges this uncertainty without reaching a verdict.", "isCorrect": false, "rationale": "While the source notes historians 'continue to debate whether the Iraq War was a catastrophic failure of intelligence and planning, a deliberate deception, or a tragic miscalculation,' it states the intelligence claims proved false — making this option inaccurate in claiming the source refuses to characterize the claims."}], "id": "q02"}, {"question": "The Coalition Provisional Authority's decision to disband the Iraqi army and 'de-Ba'athify' the government is described as 'catastrophically mismanaged.' What were the specific consequences the source identifies?", "options": [{"text": "It eliminated the trained military force that was needed to fight al-Qaeda in Iraq, leaving the U.S. military to manage the insurgency without local partners.", "isCorrect": false, "rationale": "While this captures some of the consequence, the source more specifically focuses on the creation of armed, unemployed, aggrieved men: 'hundreds of thousands of armed, unemployed men with grievances — and the institutional capacity to act on them.'"}, {"text": "It left hundreds of thousands of armed, unemployed men with grievances, fueling an insurgency and sectarian violence that eventually produced al-Qaeda in Iraq and ultimately ISIS.", "isCorrect": true, "rationale": "The source traces this precise causal chain: disbanding the army and de-Ba'athification 'left hundreds of thousands of armed, unemployed men with grievances — and the institutional capacity to act on them. An insurgency erupted; sectarian violence between Sunni and Shi'a compounded it; al-Qaeda in Iraq emerged and evolved...into the Islamic State (ISIS), which seized large parts of Iraq and Syria in 2013–14.'"}, {"text": "It discredited the Iraqi government in the eyes of ordinary citizens, who then turned to Saddam loyalists for governance, producing a prolonged Ba'athist insurgency.", "isCorrect": false, "rationale": "The insurgency drew on multiple forces, not primarily Saddam loyalists; the source traces the evolution through 'al-Qaeda in Iraq' to ISIS — a jihadist, not Ba'athist, trajectory; the source does not describe a primarily Ba'athist insurgency."}, {"text": "It created a power vacuum that Iran immediately exploited, directly installing a pro-Iranian government in Baghdad within months of the invasion.", "isCorrect": false, "rationale": "While the source notes that 'the removal of Saddam Hussein strengthened Iran's regional influence' in the CED theme section, it does not describe Iran as immediately installing a pro-Iranian government; the political process was more complex and the source focuses on the insurgency and ISIS, not Iranian installation."}], "id": "q03"}, {"question": "The Supreme Court issued rulings in Hamdi v. Rumsfeld (2004), Hamdan v. Rumsfeld (2006), and Boumediene v. Bush (2008). What do these cases collectively represent?", "options": [{"text": "Congressional endorsement of the executive's wartime detention policy, ratifying the military commission system established after September 11.", "isCorrect": false, "rationale": "These were Supreme Court rulings pushing back against, not endorsing, the executive's detention policies — Hamdan held that military commissions 'violated federal law,' and Boumediene held that detainees had habeas corpus rights. Congressional action ratifying commissions came after Hamdan, not before."}, {"text": "The judicial branch asserting limits on executive wartime detention authority — holding that detainees had habeas corpus rights and that military commissions violated federal law.", "isCorrect": true, "rationale": "The source explicitly describes these cases as the Supreme Court 'pushing back' against executive detention powers: Hamdi and Boumediene addressed habeas corpus rights; Hamdan held that military commissions 'violated federal law.' Together they represent the judiciary checking executive expansion during the War on Terror."}, {"text": "Congressional legislation creating the Guantánamo detention system and military commission rules, which the Supreme Court later upheld as constitutional.", "isCorrect": false, "rationale": "These are Supreme Court cases, not congressional legislation; and the Court consistently ruled against the executive's detention framework rather than upholding it — the Military Commissions Act (2006) was Congress's legislative response to Hamdan, not the source of the commission system."}, {"text": "International court rulings by the International Criminal Court that held the United States in violation of the Geneva Conventions for its treatment of Guantánamo detainees.", "isCorrect": false, "rationale": "These are U.S. Supreme Court cases, not international tribunal rulings; and the United States has not recognized the ICC's jurisdiction over its own military personnel."}], "id": "q04"}, {"question": "Edward Snowden's 2013 revelations disclosed NSA bulk collection programs gathering metadata on virtually all Americans' phone calls and Internet communications. According to the source, what was the central civil-liberties argument against these programs?", "options": [{"text": "The programs were unconstitutional because they required a warrant for each individual surveillance target, and the NSA had not obtained the required warrants.", "isCorrect": false, "rationale": "The NSA programs' controversy was precisely that they avoided individual warrants through a different legal interpretation — the argument against them was that *bulk* collection without individualized suspicion violated the Fourth Amendment, not that they failed to follow the traditional warrant process."}, {"text": "The programs violated the Fourth Amendment by conducting bulk surveillance without individualized suspicion, were operated under secret legal interpretations never disclosed to the public, and created surveillance infrastructure that could be misused by future governments.", "isCorrect": true, "rationale": "The source enumerates the civil-liberties critique precisely: critics argued the programs 'violated the Fourth Amendment's protections against unreasonable search and seizure, were unconstitutionally secret in their legal basis, and created infrastructure for surveillance that could be misused by future governments.' All three elements are in the source."}, {"text": "The programs were illegal because the NSA's authority extends only to foreign intelligence, not domestic surveillance, and all metadata from American phone calls is domestic by definition.", "isCorrect": false, "rationale": "While the foreign-domestic distinction is relevant to NSA authority debates, the source frames the civil-liberties critique in Fourth Amendment terms (unreasonable search and seizure) and in terms of secret legal interpretations — not primarily in terms of the foreign/domestic intelligence boundary."}, {"text": "The programs were unconstitutional because Congress had not authorized them — the PATRIOT Act explicitly excluded metadata collection, and the administration secretly exceeded its statutory authority.", "isCorrect": false, "rationale": "The source notes the programs 'operated under secret interpretations of the PATRIOT Act' — the administration claimed statutory authorization through that Act; the dispute was over whether those interpretations were legitimate, not whether Congress had explicitly excluded metadata collection."}], "id": "q05"}, {"question": "The source draws an explicit comparison between the post-9/11 security measures and earlier American responses to emergency: Lincoln's suspension of habeas corpus, World War I's Espionage and Sedition Acts, World War II's Japanese American internment, and McCarthyism/COINTELPRO during the Cold War. What pattern does this comparison identify?", "options": [{"text": "American civil liberties expand during wartime because citizens are more willing to exercise them when they know others are sacrificing for their defense.", "isCorrect": false, "rationale": "This reverses the pattern the source identifies; the source traces restriction, not expansion, of civil liberties in wartime — emergency consistently produces contraction of liberties, not expansion."}, {"text": "American political history shows a consistent pattern: emergency consistently expands executive power and contracts civil liberties; powers acquired in crises rarely expire with the crisis.", "isCorrect": true, "rationale": "The source asks 'why does emergency consistently expand executive power? And what, if anything, has prevented that expansion from becoming permanent?' — and the section on NSA surveillance answers: 'powers acquired in crises rarely expire with the crisis. Each administration that inherited these tools used rather than dismantled them.'"}, {"text": "Supreme Court intervention has consistently prevented executive overreach during wartime, restoring civil liberties protections after each emergency.", "isCorrect": false, "rationale": "While the Supreme Court pushed back in the post-9/11 cases (Hamdi, Hamdan, Boumediene), the source's larger pattern is that emergency powers expand and persist — the PATRIOT Act was renewed repeatedly and the Guantánamo facility remained open despite presidential promises to close it."}, {"text": "The United States has systematically overreacted to security threats, producing wartime civil-liberties violations that historians universally condemn as the result of irrational fear rather than genuine threat assessment.", "isCorrect": false, "rationale": "The source does not characterize all the emergency measures as pure overreaction driven by irrational fear; it presents a structural pattern (emergency expands executive power) without universally condemning each instance as irrational — the historian's task is to analyze the pattern, not simply to condemn each episode."}], "id": "q06"}, {"question": "The 'war on terror' framing — describing the response to al-Qaeda as a military conflict rather than a law enforcement operation — had profound legal consequences. Which of the following BEST describes those consequences?", "options": [{"text": "The military framing allowed the United States to seek UN Security Council authorization for offensive operations against al-Qaeda, which a law enforcement framing would have prevented.", "isCorrect": false, "rationale": "The UN Security Council authorized the Afghanistan operation (Resolution 1368, 2001), but the military framing's legal consequences described in the source are domestic, not international: it provided the basis for treating captured fighters as 'unlawful enemy combatants' rather than criminal defendants."}, {"text": "It provided the legal basis for treating captured fighters as 'unlawful enemy combatants' outside Geneva Convention protections and due-process rights — enabling Guantánamo and military commissions.", "isCorrect": true, "rationale": "The source states directly: 'The war on terror framing...provided the legal basis for treating captured fighters as unlawful enemy combatants rather than prisoners of war entitled to Geneva Convention protections or criminal defendants entitled to due-process rights' — enabling the Guantánamo detention regime and military commission system."}, {"text": "It required the government to prove beyond a reasonable doubt that each detainee had committed a specific criminal act before detention was permitted, since military law provides stronger procedural protections than civilian law.", "isCorrect": false, "rationale": "This inverts the consequence: the 'unlawful enemy combatant' category was specifically designed to avoid both Geneva Convention protections (POW rights) and criminal defendant rights (due process, evidence rules) — providing weaker, not stronger, procedural protections."}, {"text": "It transferred authority over detainee cases from the military to the civilian FBI, which applied law enforcement standards instead of military intelligence procedures.", "isCorrect": false, "rationale": "The war-on-terror framing did the opposite — it moved authority toward the military and intelligence community and away from civilian law enforcement; Guantánamo was a military facility under military commission jurisdiction, not FBI jurisdiction."}], "id": "q07"}, {"question": "The Afghanistan War is described as 'the longest war in American history,' costing $2.3 trillion and over 2,400 American military lives, ending with the Taliban retaking control in August 2021. Which of the following BEST explains why the source describes this as the failure of 'nation-building objectives'?", "options": [{"text": "The United States invested too little military force to defeat the Taliban, allowing the insurgency to reconstitute before American objectives were achieved.", "isCorrect": false, "rationale": "The source does not attribute the failure to insufficient force; the failure was in 'nation-building objectives' — building a viable Afghan state with functioning security forces — not in defeating the Taliban militarily in the conventional sense."}, {"text": "The mission expanded beyond the original counter-terrorism objective (destroying al-Qaeda and removing the Taliban) to include building a democratic Afghan state and training security forces — goals that proved unachievable over twenty years.", "isCorrect": true, "rationale": "The source traces this mission expansion precisely: 'the goals quickly multiplied — defeating the Taliban, disrupting al-Qaeda, building a democratic Afghan state, training Afghan security forces — and the conflict that began as a focused counter-terrorism operation became the longest war in American history.' The Taliban's rapid reconquest after withdrawal confirmed the nation-building failure."}, {"text": "The Afghanistan War failed because the United States diverted resources to Iraq before completing the Afghan mission, leaving Afghanistan without sufficient military and development funding.", "isCorrect": false, "rationale": "While the Iraq War diversion is historically relevant and many analysts cite it as a factor, the source does not attribute Afghanistan's failure specifically to the Iraq diversion; it identifies the problem as mission expansion — nation-building objectives that exceeded American capacity regardless of Iraqi resource competition."}, {"text": "The failure resulted from Pakistan's provision of sanctuary to the Taliban, a factor the United States could not control without risking a broader regional war.", "isCorrect": false, "rationale": "Pakistan's Taliban sanctuary is historically significant but the source does not cite it as the primary explanation; it focuses on the structural problem of mission expansion beyond achievable counter-terrorism goals."}], "id": "q08"}, {"question": "Social media platforms were not yet in existence on September 11, 2001. According to the source, how did their development reshape the post-9/11 political environment?", "options": [{"text": "Social media primarily facilitated government counter-terrorism efforts by providing real-time intelligence about potential threats from domestic and foreign extremists.", "isCorrect": false, "rationale": "The source does not describe social media as primarily a counter-terrorism tool; it emphasizes the platforms' role in democratizing political communication, creating information environments with blurred fact/rumor boundaries, and amplifying polarization through engagement-maximizing algorithms."}, {"text": "Social media democratized political communication in empowering ways while simultaneously creating information environments that amplified polarization, blurred fact and rumor, and were exploited by forces the architects of the War on Terror had not anticipated.", "isCorrect": true, "rationale": "The source presents both dimensions: social media 'democratized political communication in ways that were simultaneously empowering and destabilizing' — enabling the Arab Spring and BLM movement while also creating 'information environments in which...the boundary between verified reporting and fabricated rumor was difficult to distinguish' and in which 'emotional intensity rather than factual accuracy determined what spread most widely.'"}, {"text": "Social media had no significant political effect until the 2016 election, when Russian operatives weaponized it for the first time by creating deliberately false content.", "isCorrect": false, "rationale": "The source describes social media's political effects as developing continuously from 2004 onward — shaping the Arab Spring (2010–11), Black Lives Matter (post-2013), and other mobilizations — not as having no effect until 2016."}, {"text": "Social media made the War on Terror impossible to sustain politically by allowing veterans' anti-war messages to reach mass audiences that traditional media gatekeepers would have suppressed.", "isCorrect": false, "rationale": "The source does not describe social media as primarily an anti-war-on-terror force; it describes social media's political effects more broadly — including effects that both supported and challenged the security state, without reducing social media to a single-directional political influence."}], "id": "q09"}, {"question": "Colin Powell presented the Bush administration's case for the Iraq War to the United Nations Security Council on February 5, 2003 — a presentation he later called 'a blot on his record.' This fact BEST illustrates which analytical point about the Iraq War?", "options": [{"text": "It shows that international institutions like the UN Security Council were ineffective obstacles to American military power, since the United States invaded despite Security Council opposition.", "isCorrect": false, "rationale": "While the United States did invade without Security Council authorization, the analytical point the source draws is about the intelligence failure and its consequences — specifically that Powell's credibility was weaponized to sell a case that proved false."}, {"text": "It illustrates how the administration used a credible, moderate figure to make an intelligence-based case that proved false — and the long-term credibility cost that false case imposed on American diplomacy and on Powell personally.", "isCorrect": true, "rationale": "Powell's UN presentation used his personal credibility (he was widely trusted across partisan lines) to sell a case built on intelligence that was 'fabricated or misread.' His later characterization of it as 'a blot on his record' illustrates the personal cost of the intelligence failure — and the broader damage to American credibility when the claims proved false."}, {"text": "It proves that Powell personally fabricated the intelligence evidence he presented, making him individually responsible for the decision to go to war.", "isCorrect": false, "rationale": "The source does not claim Powell personally fabricated the intelligence; it says the intelligence was 'in significant part, fabricated or misread' — Powell was presenting what he had been given, not generating false intelligence himself. Historians debate how much the administration shaped intelligence findings vs. how much was genuine analytical failure."}, {"text": "It demonstrates that the Secretary of State, not the President, is primarily responsible for decisions to use military force under the War Powers Resolution.", "isCorrect": false, "rationale": "The War Powers Resolution governs the President's authority to commit forces, not the Secretary of State's; Powell's presentation was advocacy before the UN, not a legal authorization of military force."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
