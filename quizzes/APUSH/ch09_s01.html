<script>
var QUESTIONS = [{"question": "A historian argues that Reagan's 1980 electoral coalition was 'something genuinely new in American politics' rather than simply a recycled conservatism. Which of the following best supports this interpretation?", "options": [{"text": "Reagan won 489 electoral votes, the largest margin since FDR's landslide in 1936.", "isCorrect": false, "rationale": "The size of the electoral margin reflects the coalition's effectiveness but does not explain what made it structurally new; large margins had been achieved by earlier candidates without the same three-stream synthesis."}, {"text": "Reagan's coalition fused economic libertarians, the religious right, and neoconservative Cold War hawks into a durable electoral alliance that none of those groups had previously managed to build together.", "isCorrect": true, "rationale": "The source explicitly frames this three-way fusion as 'something new: not simply the right but a working majority' that combined three streams that had been developing separately. This structural novelty is precisely what the historian's claim refers to."}, {"text": "Reagan won the South for the first time since Reconstruction, demonstrating the collapse of the old Democratic coalition.", "isCorrect": false, "rationale": "The South's shift had been underway since the 1960s — Nixon carried most of it in 1972 — so Reagan's Southern margins reflected acceleration of an existing trend, not a novel development he created."}, {"text": "Reagan was the first presidential candidate to campaign on supply-side economic theory, distinguishing his platform from previous Republicans.", "isCorrect": false, "rationale": "Supply-side economics was one strand of the coalition but not its defining novelty; previous Republican platforms had included business-friendly tax policy without creating the same three-stream coalition."}]}, {"question": "Read the following excerpt from Reagan's 1983 'Evil Empire' speech: 'I urge you to beware the temptation...to ignore the facts of history and the aggressive impulses of an evil empire...and thereby remove yourself from the struggle between right and wrong and good and evil.' Which of the following BEST describes the strategic purpose of this framing?", "options": [{"text": "To signal Soviet leaders that the United States was willing to abandon arms-control negotiations entirely.", "isCorrect": false, "rationale": "The source notes Reagan made conciliatory remarks about arms control to a different audience the same week — the speech was not a diplomatic signal of abandonment but a domestic political message directed at his evangelical base."}, {"text": "To recast the Cold War as a moral struggle, making any conciliation with the USSR appear to be moral cowardice rather than prudent diplomacy, while rewarding his evangelical coalition.", "isCorrect": true, "rationale": "The source's HAPP analysis explicitly states Reagan's purpose was 'to recast the Cold War as a moral struggle' and that labeling the USSR an 'evil empire' 'made conciliation appear to be a form of moral cowardice, not prudent diplomacy' — serving both ideological and coalition-management goals."}, {"text": "To publicly announce the Strategic Defense Initiative and justify the cost of the military buildup to evangelical audiences.", "isCorrect": false, "rationale": "SDI was announced in a different speech in March 1983 (televised address). The Evil Empire speech was addressed to the National Association of Evangelicals and was focused on moral framing of anti-communism, not on the technical details of missile defense."}, {"text": "To warn Congress that the administration would pursue the Reagan Doctrine without seeking legislative authorization.", "isCorrect": false, "rationale": "The speech was addressed to a religious audience, not Congress; the source does not connect the Evil Empire speech to the Reagan Doctrine's specific covert-operations framework."}]}, {"question": "The Economic Recovery Tax Act of 1981 reduced the top marginal income tax rate from 70 percent to 50 percent. Critics of supply-side economics would most likely argue that this policy would:", "options": [{"text": "Reduce consumer spending by eliminating middle-class tax credits, depressing the economy further.", "isCorrect": false, "rationale": "The critique the source describes focuses on the distribution of benefits — that gains would accrue primarily to the wealthy rather than working and middle-class households — not specifically on eliminating middle-class tax credits."}, {"text": "Generate enough economic growth to offset the revenue lost to the cuts, validating the Laffer Curve argument.", "isCorrect": false, "rationale": "This describes the supply-side supporters' argument, not the critics' position — the question asks what critics would argue, not what proponents claimed."}, {"text": "Concentrate benefits at the top and fail to reliably stimulate broad growth, while tripling the national debt and funding cuts to programs serving the poor.", "isCorrect": true, "rationale": "The source defines the critics' position precisely: 'trickle-down economics' meant benefits 'concentrated at the top would not reliably reach the bottom,' and the source notes Reagan's debt legacy — tripling the national debt from roughly $1 trillion to $2.9 trillion."}, {"text": "Produce immediate hyperinflation by injecting too much money into the economy at a time of already-high inflation.", "isCorrect": false, "rationale": "The source does not attribute an inflation argument to critics of supply-side economics; the critique centers on inequality and debt, not on inflationary money creation."}]}, {"question": "When Reagan fired 11,345 PATCO air traffic controllers in August 1981, what was the broader significance of this action beyond the immediate labor dispute?", "options": [{"text": "It demonstrated that the federal government could outsource essential services to private contractors at lower cost.", "isCorrect": false, "rationale": "The source does not describe outsourcing as the signal or consequence of the PATCO firing; the action is framed as a message about the administration's relationship with organized labor, not as a privatization demonstration."}, {"text": "It sent a signal to the broader labor movement about the new administration's priorities and accelerated the already-declining trend in union membership.", "isCorrect": true, "rationale": "The source explicitly states the firing was 'a dramatic signal to the broader labor movement about the new administration's priorities' and that union membership's declining trend 'accelerated...through the 1980s.'"}, {"text": "It constituted a violation of federal labor law that the Supreme Court subsequently overturned, forcing Reagan to negotiate with PATCO.", "isCorrect": false, "rationale": "The source does not describe a legal reversal or forced negotiation; Reagan's action was not overturned, and the firings stood as a demonstration of executive will toward organized labor."}, {"text": "It reduced federal spending on wages significantly, demonstrating how deregulation could shrink the size of government.", "isCorrect": false, "rationale": "The PATCO firing is categorized in the source under labor policy, not deregulation or spending reduction; it functioned as a political signal, not primarily as a fiscal measure."}]}, {"question": "The Iran-Contra affair (1986–87) raised fundamental constitutional questions that remained relevant in subsequent decades. Which of the following best states those questions?", "options": [{"text": "Whether the president has the authority to negotiate arms-control treaties with hostile powers without Senate ratification.", "isCorrect": false, "rationale": "The Iran-Contra affair involved covert arms sales and fund diversion, not treaty negotiation; the constitutional issues were about covert operations and congressional oversight of secret programs, not the treaty power."}, {"text": "Who authorizes secret operations, what recourse Congress has when the executive defies statutory limits, and whether determined executives can outrun congressional oversight.", "isCorrect": true, "rationale": "The source enumerates these questions precisely: 'Who authorizes secret operations? What recourse does Congress have when the executive defies explicit statutory limits? The answers the episode generated — essentially, that determined executives can often outrun congressional oversight — set precedents that later administrations would exploit.'"}, {"text": "Whether the War Powers Resolution of 1973 applied to covert paramilitary operations and required a sixty-day reporting period.", "isCorrect": false, "rationale": "The source discusses the Boland Amendment and the diversion of funds to the Contras, not the War Powers Resolution; the constitutional issue centered on Congress's power of the purse, not the War Powers framework."}, {"text": "Whether the executive branch can invoke national security to shield criminal convictions from appellate review.", "isCorrect": false, "rationale": "While some convictions were overturned on appeal, the source frames this in terms of Reagan's resilience and constitutional accountability, not as a doctrinal question about national security and appellate review."}]}, {"question": "The Strategic Defense Initiative (SDI) proposed in 1983 was significant for Cold War diplomacy primarily because:", "options": [{"text": "It successfully deployed an operational missile-defense system that deterred Soviet aggression throughout the late 1980s.", "isCorrect": false, "rationale": "The source notes critics questioned 'whether the physics were achievable' — SDI remained a research program and was never deployed as an operational system during the Cold War."}, {"text": "Soviet strategists took SDI seriously enough that fear of it became a major motivator for Soviet interest in arms-control negotiations, giving Reagan leverage at the table.", "isCorrect": true, "rationale": "The source states directly that 'strategists in Moscow took it seriously enough that fear of SDI became a major motivator for Soviet interest in arms control negotiations' — making it diplomatically consequential regardless of its technical feasibility."}, {"text": "It provided the scientific basis for MIRV warhead technology that gave the United States a decisive first-strike advantage.", "isCorrect": false, "rationale": "MIRV technology predated SDI; SDI was a defensive shield concept aimed at intercepting incoming Soviet missiles, not a first-strike offensive weapon program."}, {"text": "Congress endorsed SDI unanimously because it promised to end the nuclear stalemate of mutual assured destruction.", "isCorrect": false, "rationale": "The source describes SDI as facing criticism ('critics called it Star Wars') and debates about its technical feasibility; Congressional enthusiasm was far from unanimous."}]}, {"question": "Historians debate the legacy of Reaganomics. Which of the following best captures the interpretive divide between supporters and critics?", "options": [{"text": "Supporters argue Reagan ended stagflation and produced the 1983–90 expansion; critics argue Reaganomics tripled the national debt, accelerated income inequality, and imposed austerity on programs for the poor while cutting taxes for the wealthy.", "isCorrect": true, "rationale": "The source's definition of Reaganomics explicitly presents both sides: 'Supporters credit Reaganomics with ending the stagflation of the 1970s and producing the long expansion of 1983–90; critics argue it accelerated income inequality, tripled the national debt...and imposed austerity on programs serving the poor while cutting taxes for the wealthy.'"}, {"text": "Supporters argue Reagan's deregulation of savings and loans created the most stable banking environment since the New Deal; critics argue it caused unnecessary inflation.", "isCorrect": false, "rationale": "The source describes S&L deregulation as contributing 'directly to the Savings and Loan crisis of the late 1980s, which cost taxpayers over $130 billion' — supporters did not claim S&L deregulation was a success, and critics pointed to the crisis, not inflation."}, {"text": "Supporters argue Reagan's tax cuts benefited all income groups proportionally; critics argue the cuts only benefited upper-income earners.", "isCorrect": false, "rationale": "While this partially captures one dimension of the debate, it omits the broader arguments about debt, economic expansion, stagflation, and social program cuts that define the actual historiographical divide."}, {"text": "Supporters argue the PATCO firing restored economic order by ending illegal strikes; critics argue it violated collective bargaining rights established by the Wagner Act.", "isCorrect": false, "rationale": "The PATCO firing is relevant context but does not define the central Reaganomics debate, which is about tax policy, growth, inequality, and debt rather than a specific labor action."}]}, {"question": "The Boland Amendment (1984) is best understood as an attempt by Congress to:", "options": [{"text": "Prohibit the United States from selling weapons to any nation on the State Department's list of state sponsors of terrorism.", "isCorrect": false, "rationale": "The Boland Amendment specifically prohibited federal agencies from using funds to support the Nicaraguan Contra rebels; it was not a general arms-sales prohibition tied to the terrorism sponsor list."}, {"text": "Assert congressional power of the purse by prohibiting the use of federal funds to support the Nicaraguan Contra rebels, a restriction the Reagan administration then circumvented.", "isCorrect": true, "rationale": "The source states the Boland Amendment prohibited 'federal agencies from using funds to support the Nicaraguan Contra rebels,' and the Iran-Contra arrangement was specifically designed to circumvent it — making it a direct exercise of congressional spending power and an attempt to limit covert operations."}, {"text": "Authorize the Reagan Doctrine by providing a legal framework for arming anti-communist insurgencies in the developing world.", "isCorrect": false, "rationale": "The Boland Amendment did the opposite — it restricted the Reagan Doctrine by cutting off Contra funding; it was a congressional check on the administration, not an authorization of the Reagan Doctrine."}, {"text": "Establish oversight of the NSC staff to prevent unauthorized covert operations being run from the White House.", "isCorrect": false, "rationale": "The Boland Amendment addressed funding specifically; NSC oversight was not its stated purpose, though the Iran-Contra affair revealed NSC staff had run operations circumventing the Amendment."}]}, {"question": "Reagan's rhetorical legacy — 'government is not the solution to our problem; government is the problem' — is described in the source as having defined American political debate until 'at least 2008 and arguably beyond.' This claim most directly illustrates which broader historical concept?", "options": [{"text": "Federalism — the ongoing tension between state and federal authority that has persisted since the ratification of the Constitution.", "isCorrect": false, "rationale": "While Reagan invoked federalism arguments, the source's claim about his rhetorical legacy defining national political debate refers to the ideological framework governing what policies are politically viable — not specifically the federalism doctrine."}, {"text": "The concept that elections have structural consequences: once certain political ideas become dominant, even opponents must operate within the framework they set.", "isCorrect": true, "rationale": "The source makes precisely this argument: 'after 1980, no Democratic presidential candidate could win by embracing a large expansion of the federal government' — demonstrating that Reagan's rhetorical victory constrained even his opponents, a classic marker of structural political transformation."}, {"text": "The doctrine of judicial restraint — the idea that courts should defer to elected branches on questions of economic regulation.", "isCorrect": false, "rationale": "Judicial restraint is a doctrine of constitutional interpretation, not the concept that Reagan's rhetoric constrained subsequent political discourse; the source's claim is about electoral and policy politics, not judicial philosophy."}, {"text": "The Great Society's lasting influence — Reagan's critique implicitly validated the programs LBJ had built, which survived despite his opposition.", "isCorrect": false, "rationale": "This inverts the source's meaning — the point is that Reagan's anti-government framework constrained expansion of the state, not that the Great Society survived intact; Reagan's legacy is described as limiting further government growth."}]}, {"question": "Using the HAPP framework, a student analyzing Reagan's 'Evil Empire' speech notes that Reagan 'made conciliatory remarks about arms-control negotiations to a different audience' the same week. Which element of HAPP does this fact MOST directly illuminate?", "options": [{"text": "Historical Context — the remark reveals that Soviet military modernization programs were accelerating in March 1983.", "isCorrect": false, "rationale": "The conciliatory arms-control remarks to a different audience illuminate Reagan's strategic communication choices, not Soviet military programs; this is an issue of how the speaker tailored his message, not of the external military environment."}, {"text": "Point of View — it reveals that Reagan's Evil Empire framing was strategic as well as sincere; he calibrated his message to his audience rather than applying the same moral language uniformly.", "isCorrect": true, "rationale": "The source's HAPP sourcing note explicitly identifies this as a Point of View issue: 'Reagan's framing was sincerely held but also strategic; the same week he made conciliatory remarks about arms-control negotiations to a different audience' — demonstrating calculated audience calibration alongside genuine belief."}, {"text": "Audience — it proves the National Association of Evangelicals was a more hawkish audience than Congress on Cold War policy.", "isCorrect": false, "rationale": "The conciliatory remarks to a different audience illustrate Reagan's point of view and strategic communication, not a comparative analysis of audience hawkishness; the point is about the speaker, not about the two audiences' relative positions."}, {"text": "Purpose — it shows that Reagan's primary purpose was to negotiate arms control, and the Evil Empire speech was a deliberate bluff to extract Soviet concessions.", "isCorrect": false, "rationale": "The source describes the Evil Empire speech's primary purpose as galvanizing his evangelical base and justifying the military buildup, not as a negotiating bluff; the conciliatory remarks are evidence of strategic flexibility, not that arms control was the Evil Empire speech's purpose."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
