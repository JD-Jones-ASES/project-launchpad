    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; The Columbian Exchange</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A historian argues that 'the most powerful weapon the Spanish carried was not the sword or the arquebus; it was the pathogen.' Which of the following pieces of evidence BEST supports this interpretation?", "options": [{"text": "Spanish steel swords were superior to obsidian weapons, giving Spanish soldiers an individual combat advantage in every battle.", "isCorrect": false, "rationale": "While steel versus obsidian represents a real military advantage, the historian's claim is specifically about pathogens outweighing weapons. The source's evidence for disease as the decisive force — Hispaniola's near-total indigenous collapse, Mexico's 90% population reduction — is far stronger than individual combat advantage evidence."}, {"text": "Smallpox documented in Hispaniola by 1518 spread southward through indigenous trade networks ahead of Spanish forces, devastating populations before Spanish soldiers arrived, and Mexico's indigenous population fell from roughly 25 million in 1519 to approximately 1 million by 1600.", "isCorrect": true, "rationale": "The source directly states that smallpox 'moved faster than the colonizers themselves,' spreading 'ahead of Cortés's invasion' — and provides the 25-million-to-1-million collapse in Mexico as quantitative evidence for the pathogen's devastating primacy over military weapons."}, {"text": "Spanish forces used biological warfare by deliberately infecting indigenous people with smallpox-covered blankets in every major campaign.", "isCorrect": false, "rationale": "The source does not describe deliberate biological warfare — it emphasizes that disease spread involuntarily through existing indigenous trade networks ahead of Spanish soldiers, not as a calculated weapon."}, {"text": "The introduction of Old World domesticated animals eliminated the food supplies that indigenous peoples depended on, causing starvation rather than disease.", "isCorrect": false, "rationale": "The source describes livestock's ecological disruption of agriculture, but it distinguishes this from the demographic collapse driven primarily by epidemic disease — the two mechanisms are presented separately."}], "id": "q01"}, {"question": "The concept of a 'virgin-soil epidemic' refers specifically to which phenomenon?", "options": [{"text": "An epidemic that devastates crops in previously uncultivated land, causing famine rather than infectious disease.", "isCorrect": false, "rationale": "Virgin-soil epidemics are defined in the source as outbreaks of disease in populations with no prior exposure — not agricultural blights or crop diseases. The term refers to human immunological vulnerability, not agricultural conditions."}, {"text": "An epidemic striking a population with no prior exposure to the disease — and therefore no acquired immunological resistance — that can kill thirty to ninety percent of exposed populations and travel through trade networks faster than European physical expansion.", "isCorrect": true, "rationale": "The source's definition of virgin-soil epidemic specifies 'a population with no prior exposure — and therefore no acquired immunological resistance' and notes it could kill 'thirty to ninety percent of exposed populations,' traveling 'through indigenous trade and diplomatic networks faster than European physical expansion.'"}, {"text": "An epidemic deliberately introduced by European colonizers as an instrument of biological warfare against indigenous peoples.", "isCorrect": false, "rationale": "The source defines virgin-soil epidemics in terms of immunological vulnerability and involuntary transmission — not intentional introduction. The devastating consequences resulted from biological conditions, not deliberate weaponization."}, {"text": "An epidemic that strikes only indigenous peoples who had never encountered Europeans before — meaning it did not affect any mixed-heritage population.", "isCorrect": false, "rationale": "The source's definition is based on prior immunological exposure, not genealogy or heritage. What defined virgin-soil vulnerability was the absence of prior contact with the specific pathogens, not ethnic categorization."}], "id": "q02"}, {"question": "Read the following: 'The global population, roughly 500 million in 1500, grew to approximately 1 billion by 1800 — a growth that would not have been possible without the caloric contribution of American crops.' Which of the following BEST explains the mechanism by which American crops produced this outcome in the Old World?", "options": [{"text": "American crops replaced all existing Old World grain crops, eliminating the vulnerabilities of wheat and rice monocultures.", "isCorrect": false, "rationale": "The source does not claim American crops replaced existing crops; it describes them as additions to Old World agricultural systems that expanded caloric production in previously unsuitable environments."}, {"text": "The potato could be cultivated in soils and climates hostile to grain crops and produced caloric yields per acre far exceeding wheat or rye; maize and sweet potato similarly enabled cultivation of upland soils unsuited to rice — expanding food production into previously unproductive land.", "isCorrect": true, "rationale": "The source explicitly describes the potato's capacity to grow in 'soils and climates hostile to grain crops' with 'caloric yields per acre far exceeding wheat or rye,' and notes that sweet potato and maize 'enabled cultivation of upland soils previously too poor for rice' in China — both mechanisms describing how American crops expanded agricultural production into previously marginal land."}, {"text": "European governments required all farmers to replace traditional crops with American crops as part of mercantilist agricultural reform programs.", "isCorrect": false, "rationale": "The source describes organic adoption of new crops by farmers who found them productive — no government mandates are described; Irish and Chinese farmers adopted the potato and sweet potato because of their productive advantages."}, {"text": "American crops grew far faster than Old World crops, allowing multiple harvests per year that eliminated seasonal food scarcity.", "isCorrect": false, "rationale": "The source explains the potato's advantage in terms of caloric yield per acre and suitability for marginal soils — not multiple harvests per year or general growing speed."}], "id": "q03"}, {"question": "The source notes that West African population growth sustained by American crops (maize and cassava) 'would, in tragic irony, help supply the labor for the transatlantic slave trade.' What larger historical pattern does this irony BEST illustrate?", "options": [{"text": "That American crop adoption in Africa was deliberately designed by European slave traders to increase the supply of enslaved people.", "isCorrect": false, "rationale": "The source presents the irony as unintended and structural — maize and cassava expanded productivity independently of slave trade intentions. The connection was a consequence of overlapping historical processes, not a planned outcome."}, {"text": "That the consequences of the Columbian Exchange were globally interconnected and often asymmetrical — the same biological transfers that sustained population growth in one region simultaneously supplied the conditions for that region's population to be brutally exploited.", "isCorrect": true, "rationale": "The source's 'tragic irony' framing — American crops supporting West African population growth that then supplied slave trade labor — exemplifies the source's Key Concept of asymmetry: the Exchange produced gains for some and profound harm for others, often in interconnected ways the participants could not foresee."}, {"text": "That African peoples deliberately adopted American crops as a form of resistance to European colonialism.", "isCorrect": false, "rationale": "The source presents crop adoption as driven by agricultural productivity, not political resistance. There is no evidence in the source that West African farmers consciously adopted American crops as an anti-colonial strategy."}, {"text": "That the Columbian Exchange had no significant effects on West Africa, which remained isolated from the biological and agricultural changes affecting the rest of the world.", "isCorrect": false, "rationale": "The source explicitly states that 'In West Africa, maize and cassava... expanded agricultural productivity' — directly contradicting the claim that West Africa was isolated from Columbian Exchange effects."}], "id": "q04"}, {"question": "Spanish discovery of silver deposits at Potosí (1545) and Zacatecas (1546) produced consequences described as part of the 'Columbian Exchange.' Which of the following BEST explains why silver mining is classified as part of that exchange rather than as simply a colonial economic development?", "options": [{"text": "Silver was a biological substance like plants and animals, so its movement across hemispheres qualified it as part of the biological exchange.", "isCorrect": false, "rationale": "The source explicitly notes the Columbian Exchange was 'not only biological; it was mineral' — distinguishing silver from biological transfers. Silver's inclusion is based on its global economic circulation, not its biological nature."}, {"text": "American silver was unique to the Western Hemisphere and its extraction and global circulation restructured Eurasian trading systems — integrating American mineral wealth into circuits connecting Potosí, Seville, and Beijing — making it part of the same hemispheric integration that defined the Columbian Exchange.", "isCorrect": true, "rationale": "The source explicitly describes Spanish American silver as flowing 'eastward through Spain to pay for European manufactured goods, then further east... to China,' tying 'the economies of Potosí and Manila to those of Seville and Beijing in a genuinely global economic circuit' — presenting it as part of the same hemispheric integration."}, {"text": "Silver was classified as part of the Columbian Exchange because it was extracted using biological organisms — specifically llamas and horses — imported from the Old World.", "isCorrect": false, "rationale": "The source does not use this reasoning; it classifies silver as part of the Columbian Exchange because of its role in creating the first genuinely global economic circuit, not because of the animals used in its extraction."}, {"text": "Silver became part of the Columbian Exchange only after 1600, when it began flowing through Atlantic trade routes rather than Pacific routes.", "isCorrect": false, "rationale": "The source describes silver flowing both westward to Europe and eastward to China via Pacific routes (Potosí → Spain → Europe; and via Manila to China) — without limiting its significance to Atlantic routes or post-1600."}], "id": "q05"}, {"question": "Consider the case of Ireland: the potato, introduced in the late sixteenth century, became the dietary foundation of the Irish peasantry within two generations, and a blight in 1845–1852 caused the Great Famine. Based on the source, this case MOST directly illustrates which of the following broader patterns?", "options": [{"text": "That American crops were nutritionally inferior to European grains and caused malnutrition wherever they were adopted.", "isCorrect": false, "rationale": "The source describes the potato as a highly productive crop that 'became the dietary foundation of the Irish peasantry' — its adoption was driven by its productivity, not nutritional inferiority."}, {"text": "That the adoption of American crops in the Old World could produce long-term dependency vulnerabilities: the same crop that sustained population growth could cause catastrophic famine if destroyed — with the blight in 1845 destroying a New World crop that Irish survival had come to depend on.", "isCorrect": true, "rationale": "The source explicitly states this irony: 'a reliance that would have catastrophic consequences in the Great Famine of 1845–1852, when a New World blight destroyed the New World crop that Irish survival had come to depend on' — illustrating how Columbian Exchange adoptions created new dependencies alongside new productivities."}, {"text": "That European governments deliberately withheld food aid from Ireland during the famine because of anti-Irish ethnic prejudice.", "isCorrect": false, "rationale": "The source does not discuss government food policy or ethnic dimensions of the famine; it uses the Irish case as evidence of Columbian Exchange-created agricultural dependency and vulnerability."}, {"text": "That American crops were unsuitable for European climates and should not have been adopted in the first place.", "isCorrect": false, "rationale": "The source notes the potato was widely adopted because it was productive — 'cultivated in soils and climates hostile to grain crops' with high caloric yields. The problem was dependency, not unsuitability."}], "id": "q06"}, {"question": "A student studying the Columbian Exchange writes: 'The exchange was fair because both hemispheres received significant biological transfers — Europe got American food crops; the Americas got European livestock.' How would the source's Key Concept of 'The Asymmetry of the Exchange' respond to this claim?", "options": [{"text": "By agreeing that the exchange was fair, since both sides received equally valuable biological transfers.", "isCorrect": false, "rationale": "The source explicitly argues the opposite: 'The Columbian Exchange was not an equal trade.' The Key Concept section directly addresses this symmetry-of-transfers argument."}, {"text": "By acknowledging that transfers flowed in both directions while arguing that the distribution of benefit and harm was radically asymmetrical: the Americas sent crops that supported Old World population growth; they received diseases that killed the majority of their inhabitants and livestock that disrupted their agricultural systems.", "isCorrect": true, "rationale": "The source's Key Concept states explicitly: 'The Columbian Exchange was not an equal trade. The Americas sent to the Old World agricultural crops that substantially improved human nutrition... they received in return epidemic diseases that killed the majority of their inhabitants.' Volume of transfer ≠ equality of outcome."}, {"text": "By arguing that the exchange was harmful to both hemispheres equally, since European populations also died of new diseases introduced from the Americas.", "isCorrect": false, "rationale": "The source does not claim Europeans died from diseases introduced from the Americas in comparable numbers; the demographic catastrophe was overwhelmingly concentrated in the Americas, making the harm radically asymmetrical."}, {"text": "By conceding that while the exchange was asymmetrical in the sixteenth century, it balanced out over the long run as indigenous populations recovered.", "isCorrect": false, "rationale": "The source does not make this long-run recovery argument; it emphasizes the lasting structural asymmetry of the exchange and notes the hemispheric population collapse of 75–90 percent without claiming later demographic recovery as a balancing factor."}], "id": "q07"}, {"question": "The introduction of Old World horses to the Great Plains — horses that spread northward from Spanish settlements and reached the Plains by the late seventeenth century — produced which of the following outcomes described by the source?", "options": [{"text": "It caused the immediate collapse of Plains peoples' economies because they were unable to adapt to the challenges of managing horses.", "isCorrect": false, "rationale": "The source describes the opposite: Plains peoples adapted brilliantly, with nations like the Comanche, Lakota, and Cheyenne reorganizing their 'entire way of life around mounted bison hunting, becoming formidable military powers in the process.'"}, {"text": "It restored the ecological conditions of the Plains to those that had existed before European contact, reversing some of the environmental damage caused by cattle and pigs.", "isCorrect": false, "rationale": "The source does not frame horses as ecologically restorative; it describes horse culture as a social and military transformation, while cattle and pigs are presented as separate and ecologically destructive agents."}, {"text": "Nations like the Comanche, Lakota, and Cheyenne reorganized their entire way of life around mounted bison hunting, becoming formidable military powers — meaning the 'horse culture' that Europeans later romanticized was itself a product of the Columbian Exchange, not an ancient tradition.", "isCorrect": true, "rationale": "The source states exactly this: horse culture 'became formidable military powers' and was 'a transformation that had occurred within living memory of the first contact period' — explicitly noting that what Europeans later romanticized as ancient Plains culture was a recent Columbian Exchange product."}, {"text": "Plains peoples rejected horses entirely because they conflicted with their traditional bison-hunting-on-foot techniques.", "isCorrect": false, "rationale": "The source describes rapid and comprehensive adoption — nations reorganized their 'entire way of life around mounted bison hunting.' No rejection is described."}], "id": "q08"}, {"question": "The source describes the scale of indigenous demographic collapse as follows: 'In Hispaniola... the Taino population numbered perhaps 250,000 to one million at contact. By 1550, fewer than five hundred indigenous people survived on the island.' An AP student should recognize this evidence primarily as supporting which of the following historical arguments?", "options": [{"text": "That Spanish colonizers deliberately planned a genocidal extermination campaign from the moment of first contact in 1492.", "isCorrect": false, "rationale": "The source attributes collapse primarily to disease (the biological mechanism of virgin-soil epidemics) — not a pre-planned genocidal campaign. Las Casas's testimony documents extreme violence, but the source's demographic argument centers on epidemic disease as the primary mechanism."}, {"text": "That the Taino were too small in number to sustain their civilization and would have collapsed without European contact.", "isCorrect": false, "rationale": "The source gives pre-contact population estimates of 250,000 to one million — a substantial population; the collapse is attributed to epidemic disease, not pre-existing population vulnerability."}, {"text": "That the demographic collapse of indigenous Americans was the largest in recorded human history, driven primarily by epidemic disease exploiting the immunological vulnerability created by the Americas' 12,000-to-15,000-year biological isolation from Old World disease pools.", "isCorrect": true, "rationale": "The source explicitly calls the collapse 'the largest demographic catastrophe in recorded human history' and grounds it in the 12,000–15,000-year biological isolation that left indigenous populations 'with no prior exposure — and therefore no acquired immunological resistance.'"}, {"text": "That the Columbian Exchange was primarily a military phenomenon in which Spanish weapons, rather than diseases, explained the scale of indigenous population loss.", "isCorrect": false, "rationale": "The source explicitly argues that disease was more powerful than military force — 'the most powerful weapon the Spanish carried was not the sword or the arquebus; it was the pathogen' — and the Hispaniola statistics document collapse from disease rather than battlefield casualties."}], "id": "q09"}, {"question": "Read the following: 'Between 1500 and 1800, Spanish America produced roughly 85 percent of the world's silver. That silver flowed eastward through Spain... further east... to China, where the Ming dynasty had established silver as the primary medium of taxation.' Based on this passage, the flow of American silver to China is significant primarily because it:", "options": [{"text": "Caused the immediate economic collapse of Ming China by flooding the market with too much money and creating hyperinflation.", "isCorrect": false, "rationale": "The source describes the Ming dynasty's use of silver as the 'primary medium of taxation' as an established policy that American silver supplied — not a disruptive hyperinflation event. The silver integrated into, rather than destabilized, Chinese fiscal structures."}, {"text": "Demonstrated that the Americas contributed only mineral wealth to global trade, while agricultural products remained confined to local and regional markets.", "isCorrect": false, "rationale": "The source describes both American mineral wealth (silver) AND agricultural crops (potato, maize, etc.) as entering global trade networks — explicitly contrasting mineral and agricultural dimensions of the Columbian Exchange."}, {"text": "Tied the economies of American silver mining centers to Chinese fiscal policy, creating the first genuinely global economic circuit connecting the Americas, Europe, and Asia.", "isCorrect": true, "rationale": "The source explicitly states that American silver 'tied the economies of Potosí and Manila to those of Seville and Beijing in a genuinely global economic circuit' — the connection to Ming taxation policy is the mechanism that created this planetary economic integration."}, {"text": "Enabled Spain to purchase Chinese manufactured goods directly, eliminating the need for Portuguese intermediaries in Asian trade.", "isCorrect": false, "rationale": "The source describes silver flowing 'eastward through Spain to pay for European manufactured goods, then further east... to China' — the flow was to China for Chinese goods via established trade networks, not to bypass Portuguese intermediaries."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
