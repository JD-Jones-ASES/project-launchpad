<script>
var QUESTIONS = [{"question": "The Zimmermann Telegram (January 1917) proposed that if the United States entered World War I, Mexico should join Germany and receive assistance recovering 'lost territory in Texas, New Mexico, and Arizona.' The telegram's exposure most directly", "options": [{"text": "confirmed American suspicions that Mexico was already at war with Germany", "isCorrect": false, "rationale": "Mexico was not at war with Germany; the telegram was a proposal for a future alliance, not evidence of an existing military relationship."}, {"text": "shifted American public opinion decisively toward intervention by demonstrating German willingness to sponsor attacks on American territory", "isCorrect": true, "rationale": "The source states that when the telegram's contents were published, 'the political impact was immediate' — Wilson appeared before Congress within weeks, and the proposal to arm Mexico against the U.S. made continued neutrality politically untenable."}, {"text": "led Mexico to declare war on the United States in support of Germany", "isCorrect": false, "rationale": "Mexico did not join Germany; the telegram was intercepted before any Mexican-German alliance could be formed."}, {"text": "provided legal justification for the Espionage Act of 1917 by demonstrating foreign manipulation of American politics", "isCorrect": false, "rationale": "The Espionage Act targeted domestic dissent, not foreign espionage operations; the Zimmermann Telegram was a foreign policy trigger, not the legal basis for domestic suppression of speech."}], "id": "q01"}, {"question": "Wilson's Fourteen Points (January 1918) were 'idealistic by design.' Read the following partial list: self-determination of peoples, freedom of the seas, open diplomacy, arms reduction, and a League of Nations. The Fourteen Points were 'idealistic by design' primarily because", "options": [{"text": "Wilson knew European leaders would reject them, so he designed them to fail", "isCorrect": false, "rationale": "Wilson genuinely believed in the Fourteen Points; the source says he wanted to offer Europe 'an alternative to the nationalist and imperialist war aims that their governments had pursued' — idealistic in aspiration, not strategically designed to fail."}, {"text": "Wilson offered the peoples of Europe a vision organized around principle rather than the nationalist and imperialist war aims European governments had pursued, making the Fourteen Points a deliberate alternative framework", "isCorrect": true, "rationale": "The source states Wilson designed the Fourteen Points to 'offer the peoples of Europe an alternative to the nationalist and imperialist war aims that their governments had pursued' — principled idealism as a deliberate contrast to great-power realpolitik."}, {"text": "the Points were intended to satisfy the Senate's demand for a peace without punitive reparations against Germany", "isCorrect": false, "rationale": "The Fourteen Points were announced before the Senate ratification debate; they were an international diplomatic initiative, not a domestic political accommodation to Senate preferences."}, {"text": "the Points were designed to ensure that American commercial interests would dominate the postwar international economy", "isCorrect": false, "rationale": "The Fourteen Points were framed in principled internationalist terms (self-determination, collective security) rather than as a vehicle for American commercial domination."}], "id": "q02"}, {"question": "The Espionage Act (1917) and the Sedition Act (1918) differed most significantly in that", "options": [{"text": "the Espionage Act targeted only foreign nationals while the Sedition Act applied to American citizens", "isCorrect": false, "rationale": "Both acts applied to anyone within U.S. jurisdiction; Eugene Debs, an American citizen, was prosecuted under the Espionage Act."}, {"text": "the Espionage Act prohibited actions obstructing the military, while the Sedition Act went further to criminalize any disloyal, profane, or abusive language about the government, Constitution, or flag", "isCorrect": true, "rationale": "The source clearly distinguishes the two: the Espionage Act targeted obstruction of military recruitment and insubordination; the Sedition Act prohibited speech that was 'disloyal, profane, scurrilous, or abusive' about the government — a broader speech restriction."}, {"text": "the Espionage Act was struck down by the Supreme Court while the Sedition Act was upheld", "isCorrect": false, "rationale": "Schenck v. United States (1919) upheld the Espionage Act, not struck it down; the Sedition Act was repealed in 1921."}, {"text": "the Sedition Act applied only to criticism of the military while the Espionage Act covered all forms of antiwar speech", "isCorrect": false, "rationale": "This reverses the relationship: the Espionage Act specifically targeted obstruction of military recruitment; the Sedition Act was broader, covering all 'disloyal' speech about the government."}], "id": "q03"}, {"question": "In Schenck v. United States (1919), Justice Holmes wrote: 'The question in every case is whether the words used are used in such circumstances and are of such a nature as to create a clear and present danger that they will bring about the substantive evils that Congress has a right to prevent.' Based on this reasoning, which of the following actions would MOST CLEARLY fall outside First Amendment protection under the Schenck standard?", "options": [{"text": "A newspaper editorial arguing that the United States should negotiate a peace settlement with Germany", "isCorrect": false, "rationale": "Under the Schenck standard as applied, mere advocacy of an unpopular policy position would not constitute a 'clear and present danger' of producing illegal action; this is closer to protected political speech."}, {"text": "A speech at a military recruitment station urging draftees to refuse induction and return home", "isCorrect": true, "rationale": "Speech at the specific site of military recruitment, directly urging concrete illegal action (draft refusal), most clearly meets the 'clear and present danger' standard — the danger of obstruction is immediate and the speech is directly connected to the illegal act."}, {"text": "A pamphlet arguing that capitalism causes wars and that workers should organize politically against the government", "isCorrect": false, "rationale": "General political advocacy of a systemic critique, without specific direction to illegal action, is closer to abstract doctrine — the type Holmes himself would later protect in his Abrams dissent."}, {"text": "A letter to a friend expressing private opposition to the war and refusing to buy war bonds", "isCorrect": false, "rationale": "Private expression of opposition without attempting to incite others to illegal action falls outside the 'clear and present danger' standard, which requires a danger of producing illegal action in others."}], "id": "q04"}, {"question": "Holmes's 'clear and present danger' standard established in Schenck was later modified by Brandenburg v. Ohio (1969), which requires that speech be 'directed to inciting imminent lawless action' and 'likely to produce such action.' This change in standard most directly reflects", "options": [{"text": "the Supreme Court's determination that the First Amendment provides no protection for political speech that is critical of government", "isCorrect": false, "rationale": "Brandenburg expanded First Amendment protections by requiring both direction to imminent lawless action and likelihood of producing it — making the standard more protective of speech, not less."}, {"text": "a broader reading of First Amendment protection that requires both intent to incite imminent lawless action AND likelihood of producing it, providing stronger protection for dissent than the Schenck standard", "isCorrect": true, "rationale": "Brandenburg replaced Schenck's contextual 'clear and present danger' with a two-part test requiring both that speech be directed to inciting imminent lawless action AND likely to produce such action — a more speech-protective standard that reflected postwar civil liberties expansion."}, {"text": "the Supreme Court's response to McCarthyism by expanding congressional power to define national security threats", "isCorrect": false, "rationale": "Brandenburg (1969) expanded speech protections against government suppression — the opposite of expanding congressional power to restrict speech."}, {"text": "a recognition that wartime emergency powers should be permanently available to the executive branch", "isCorrect": false, "rationale": "Brandenburg moved in the opposite direction — restricting government power to suppress speech by requiring a higher threshold of imminence and likelihood."}], "id": "q05"}, {"question": "Eugene V. Debs was sentenced to ten years in federal prison for a speech arguing that workers should not fight a capitalist war. His prosecution under the Espionage Act most directly illustrates which feature of the wartime civil liberties regime?", "options": [{"text": "The Espionage Act was applied exclusively to immigrants and foreign nationals rather than American citizens", "isCorrect": false, "rationale": "Debs was a prominent American citizen and Socialist Party leader; his prosecution demonstrates the Espionage Act's application to American political figures, not just immigrants."}, {"text": "Political speech that challenged the class basis of the war — connecting socialist critique to draft resistance — was treated as a direct threat requiring criminal prosecution, even without evidence of actual obstruction", "isCorrect": true, "rationale": "Debs's speech argued that 'workers should not fight a capitalist war' — a political-class critique rather than direct organization of draft resistance. His prosecution reveals that the wartime suppression targeted political dissent (socialist, labor-organizing) as much as genuine security threats."}, {"text": "Socialist Party leaders were exempt from prosecution because their political status gave them constitutional protection not available to ordinary citizens", "isCorrect": false, "rationale": "The opposite is true: Debs was specifically targeted because of his political prominence and the Socialist Party's influence on working-class antiwar sentiment."}, {"text": "The Espionage Act required proof that the defendant had personally prevented at least one person from enlisting", "isCorrect": false, "rationale": "The Espionage Act did not require proof of actual obstruction; it criminalized speech that might obstruct — the gap between speech and concrete harm was the constitutional problem that later courts would address."}], "id": "q06"}, {"question": "The Palmer Raids (1919–20) were eventually discredited primarily because", "options": [{"text": "they failed to discover any actual Communist infiltration of American institutions, disproving the Red Scare's premises", "isCorrect": false, "rationale": "The specific mechanism of discrediting was different: Palmer's prediction of a May 1, 1920, revolutionary uprising failed to materialize, and Louis Post's review found most detainees had no radical organizational connections."}, {"text": "Palmer's predicted May 1, 1920, revolutionary uprising failed to occur, and case reviews found most detainees had no connection to radical organizations — revealing the raids as mass constitutional violations without proportionate threat", "isCorrect": true, "rationale": "The source specifically identifies these two factors: Palmer's prediction failed, and Post's review revealed that most detainees had no radical connections — discrediting the raids as disproportionate panic rather than proportionate response to genuine threat."}, {"text": "the Supreme Court ruled the deportation of foreign nationals without due process unconstitutional in a landmark decision", "isCorrect": false, "rationale": "No such Supreme Court ruling is described in the source; the raids were politically discredited, not judicially overturned."}, {"text": "Congress passed legislation limiting the executive branch's authority to conduct mass arrests without individual warrants", "isCorrect": false, "rationale": "The source does not describe congressional legislation limiting the raids; the political discrediting came from the failure of Palmer's predictions and internal executive branch review by Louis Post."}], "id": "q07"}, {"question": "The source describes a 'persistent tension in American democracy: the tendency, in moments of perceived national emergency, to suppress the civil liberties that distinguish democracy from the systems it opposes.' Which of the following best supports this claim by connecting WWI civil liberties suppression to a later parallel?", "options": [{"text": "The New Deal's creation of the Federal Deposit Insurance Corporation in 1933 as a response to banking failures", "isCorrect": false, "rationale": "The FDIC was an economic response to banking collapse, not a civil liberties suppression in a national emergency — it does not parallel the Espionage Act pattern."}, {"text": "The internment of Japanese Americans under Executive Order 9066 (1942) — citizens imprisoned based on ancestry without individual evidence of disloyalty, justified by military necessity", "isCorrect": true, "rationale": "The source explicitly cites 'Japanese American internment' as a direct parallel to WWI civil liberties suppression — a recurring pattern of using national emergency to justify constitutional violations disproportionate to the actual threat."}, {"text": "The passage of the Nineteenth Amendment (1920) extending the vote to women while Black women remained disenfranchised", "isCorrect": false, "rationale": "The Nineteenth Amendment was a democratic expansion, not a civil liberties suppression in a national emergency — it does not fit the emergency-suppression pattern."}, {"text": "The New Deal's Social Security Act (1935) excluding agricultural and domestic workers from coverage", "isCorrect": false, "rationale": "Social Security's exclusions reflect political compromise and structural racial discrimination in policymaking, not emergency-justified civil liberties suppression."}], "id": "q08"}, {"question": "Woodrow Wilson won re-election in 1916 on the slogan 'He kept us out of war' and then led the United States into World War I within a month of his second inauguration. This sequence most directly illustrates", "options": [{"text": "Wilson's deliberate deception of voters, who were misled about his foreign policy intentions", "isCorrect": false, "rationale": "The source describes Wilson as genuinely maintaining neutrality until external events — unrestricted submarine warfare and the Zimmermann Telegram — made it politically and strategically untenable; deliberate prior deception is a strong characterization not supported by the source."}, {"text": "a recurring American pattern in which a republic that distrusts entangling alliances finds itself, under sufficient provocation, mobilizing on a scale that seemed impossible the previous year", "isCorrect": true, "rationale": "The source explicitly frames this as 'a recurring American pattern: a republic that distrusts permanent military commitments and entangling alliances finds itself, under sufficient provocation, willing to mobilize on a scale that would have seemed impossible the year before.'"}, {"text": "the constitutional superiority of executive foreign-policy power over legislative preferences for neutrality", "isCorrect": false, "rationale": "Wilson went to Congress for a declaration of war, following constitutional procedure; the sequence illustrates political transformation under pressure, not executive supremacy over legislative foreign-policy preferences."}, {"text": "the failure of American democratic institutions to maintain their foreign-policy commitments under pressure from media and business interests", "isCorrect": false, "rationale": "The source attributes the shift primarily to military provocation (unrestricted submarine warfare) and foreign policy revelation (Zimmermann Telegram), not media or business pressure, though those played supporting roles."}], "id": "q09"}, {"question": "The targets of the Espionage and Sedition Acts were described as 'disproportionately socialists, immigrants, and labor organizers — people already marginal to the mainstream political community.' This pattern most directly illustrates which historical argument?", "options": [{"text": "'National security' suppression consistently targets the groups already considered alien to mainstream political identity, using emergency power to enforce political and social conformity as much as to neutralize genuine threats", "isCorrect": true, "rationale": "The source explicitly makes this argument: 'Both episodes reveal that national security has historically been invoked to enforce social and political conformity as much as to neutralize genuine threats' — the targeting patterns reveal the social function of emergency suppression."}, {"text": "Socialist and immigrant communities posed the greatest genuine security threat to the United States during World War I", "isCorrect": false, "rationale": "The source describes the Palmer Raids' eventual discrediting because most detainees 'had no connection to any radical organization' — the actual security threat was far smaller than the suppression implied."}, {"text": "The Espionage Act was primarily a wartime economic measure to prevent production disruption rather than a political suppression tool", "isCorrect": false, "rationale": "The source characterizes the Espionage and Sedition Acts primarily as tools of political suppression of dissent — prosecuting socialist speeches and antiwar pamphlets, not production disruption."}, {"text": "Labor organizing and immigration posed equal security threats during wartime, requiring equal legal responses", "isCorrect": false, "rationale": "The source's framing is critical, not approving: the targeting of these groups reveals 'social and political conformity enforcement,' not a proportionate security response to equal threats."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
