<body>
<div class="quiz-container">

        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Mercantilism, Salutary Neglect, and the Great Awakening</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The Navigation Acts, beginning in 1651, required that enumerated colonial goods be sold only to England or English colonies, all colonial trade be carried in English ships, and European goods reach the colonies through English middlemen. Which group benefited most directly from these provisions, and which bore the most significant costs?", "options": [{"text": "Benefited: colonial planters; Cost: English merchants who lost access to cheaper European goods.", "isCorrect": false, "rationale": "The relationship is reversed; English merchants and shippers benefited from the guaranteed market and cargo, while colonial planters and merchants bore the cost of being denied access to competing buyers who might pay higher prices."}, {"text": "Benefited: English merchants and shippers; Cost: colonial planters and merchants denied access to competing European buyers.", "isCorrect": true, "rationale": "The source explicitly states: 'The acts benefited English merchants and shippers enormously; they imposed real costs on colonial planters and merchants who might have gotten better prices on the open European market.' This distribution of benefit and cost is the foundation of colonial resentment of the Navigation Acts."}, {"text": "Benefited: colonial assemblies that collected customs revenue; Cost: English merchants forced to compete with Dutch shippers.", "isCorrect": false, "rationale": "Customs revenue went to the English crown, not colonial assemblies; the Navigation Acts were designed to benefit English merchants over Dutch competitors, not to disadvantage English merchants."}, {"text": "Benefited: West African trading kingdoms that gained preferential access to English manufactured goods; Cost: Spanish colonial merchants excluded from the English colonial market.", "isCorrect": false, "rationale": "West African kingdoms and Spanish merchants were not the primary parties in the Navigation Acts' regulatory framework; the acts regulated the relationship between English/colonial parties, not external powers."}]}, {"question": "New England merchants 'ran their own triangular route that brought rum to West Africa, enslaved people to the Caribbean, and molasses back to New England, deliberately cutting out English middlemen and technically violating the Molasses Act of 1733.' This example best illustrates which broader point about the Navigation Acts?", "options": [{"text": "The Navigation Acts were so rigorously enforced that merchants who violated them faced bankruptcy, confirming the effectiveness of British imperial regulation.", "isCorrect": false, "rationale": "The opposite is true; the example illustrates that enforcement was lax — New England merchants ran this route 'with impunity' under the salutary neglect that characterized British imperial policy before 1763."}, {"text": "Colonial merchants found ways to evade the Navigation Acts in practice, operating outside the regulatory framework with impunity — demonstrating that salutary neglect made imperial economic regulation more aspirational than real.", "isCorrect": true, "rationale": "The source describes this New England route as 'deliberately cutting out English middlemen and technically violating the Molasses Act of 1733' — illustrating the gap between the Navigation Acts' regulatory intent and their actual enforcement under salutary neglect."}, {"text": "The triangular trade required colonial merchants to trade directly with West African kingdoms because English merchants refused to participate in the slave trade on moral grounds.", "isCorrect": false, "rationale": "No such moral refusal by English merchants is described; the New England route cut out English middlemen for commercial reasons (capturing more profit), not because English merchants declined to participate."}, {"text": "The Navigation Acts successfully redirected all colonial trade through English ports, generating the customs revenue that funded the French and Indian War.", "isCorrect": false, "rationale": "The New England example shows enforcement was ineffective, not successful; the French and Indian War (Seven Years' War) was itself a catalyst for Parliament's later attempt to enforce the acts more rigorously — precisely because the previous lax enforcement had not generated sufficient revenue."}]}, {"question": "Read the following description of salutary neglect: 'The informal British policy of allowing the American colonies wide latitude in self-governance and commercial affairs while avoiding strict enforcement of imperial regulations... Its unintended consequence was to allow colonial assemblies to accumulate experience, precedent, and expectation of legislative autonomy that made Parliament's post-1763 attempt to assert authority feel like a sudden and arbitrary usurpation rather than a legitimate reassertion of imperial prerogative.' Based on this passage, which of the following BEST explains why the end of salutary neglect after 1763 was so politically explosive?", "options": [{"text": "Colonial assemblies had formally declared independence from Parliament's authority during the period of salutary neglect, making any reassertion of Parliament's power legally impossible.", "isCorrect": false, "rationale": "No formal declaration of independence occurred before 1776; the colonies had not legally denied Parliament's authority — they had simply not been subjected to its exercise. The explosion arose from expectation, not from a formal legal declaration."}, {"text": "The colonial assemblies had accumulated decades of genuine legislative experience and constitutional expectations of autonomy — so Parliament's post-1763 assertion of authority felt like the breaking of an established constitutional understanding, not a return to normal.", "isCorrect": true, "rationale": "The source explains that salutary neglect allowed colonial assemblies to 'accumulate experience, precedent, and expectation of legislative autonomy' — making Parliament's later assertion 'feel like a sudden and arbitrary usurpation rather than a legitimate reassertion of imperial prerogative.' The conflict was a collision of incompatible constitutional expectations."}, {"text": "The Navigation Acts had never been officially passed by Parliament, so colonial merchants had legitimate grounds to argue that any enforcement was illegal.", "isCorrect": false, "rationale": "The Navigation Acts were formally enacted beginning in 1651; their legal status was not in question. The colonial argument was about the legitimacy of Parliament taxing them without representation, not about the acts' formal parliamentary origin."}, {"text": "France's defeat in 1763 eliminated the colonial need for British military protection, making any imperial authority illegitimate once that protection was no longer needed.", "isCorrect": false, "rationale": "While the removal of the French threat after 1763 may have emboldened colonial resistance, the source grounds the conflict in the constitutional expectations built by salutary neglect — not in a post-war calculation that military protection was no longer needed."}]}, {"question": "The source describes mercantilism as 'not a unified economic theory but a set of widely shared assumptions about national wealth and imperial competition.' Which of the following mercantilist assumptions most directly justified England's Navigation Acts?", "options": [{"text": "National wealth was unlimited and could grow indefinitely through free trade among all nations.", "isCorrect": false, "rationale": "This is the opposite of mercantilist thinking; mercantilists held that wealth was finite and zero-sum — what one nation gained, another lost. Free trade was considered mercantilist folly, not wisdom."}, {"text": "Wealth was finite and zero-sum — what England gained, France or Spain lost — making exclusive control of colonial trade essential to national economic power.", "isCorrect": true, "rationale": "The source explicitly states mercantilist thinkers 'held that wealth was finite and zero-sum: what England gained, France or Spain lost' — this zero-sum premise directly justified the Navigation Acts' exclusionary regulation, since allowing colonies to trade freely with rivals would transfer wealth from England to France or Spain."}, {"text": "Colonies were primarily valuable as military bases for projecting power against rival European nations rather than as economic resources.", "isCorrect": false, "rationale": "Mercantilist theory valued colonies primarily for economic contributions (raw materials, captive markets, customs revenue), not primarily for military positioning, though military considerations were present."}, {"text": "Free trade among colonies would increase overall Atlantic wealth, benefiting England more than restriction because England would capture the largest share of a growing market.", "isCorrect": false, "rationale": "This is a proto-free trade argument associated with Adam Smith, not with mercantilism. Mercantilist logic opposed free trade precisely because it would allow rivals to share in gains England could otherwise monopolize."}]}, {"question": "Jonathan Edwards' 1741 sermon 'Sinners in the Hands of an Angry God' and George Whitefield's itinerant preaching tours are both associated with the First Great Awakening. What did their methods have in common that distinguished them from established clerical practice?", "options": [{"text": "Both Edwards and Whitefield delivered their sermons exclusively in Latin, making their message accessible only to educated clergy who could then translate for ordinary congregants.", "isCorrect": false, "rationale": "Both Edwards and Whitefield preached in vernacular English specifically to reach ordinary people; the appeal of revival preaching was its emotional directness and accessibility, not its scholarly exclusivity."}, {"text": "Both appealed directly to ordinary people through emotional intensity — bypassing established churches and their educated, ordained clergy — reaching audiences through persuasion and feeling rather than institutional authority.", "isCorrect": true, "rationale": "The source describes Whitefield as preaching 'directly to ordinary people — servants, women, and enslaved people as well as the propertied — bypassing the established churches and their educated, ordained clergy.' Edwards's sermons 'reduced entire congregations to weeping and terror.' Both reached people through emotional appeal, not institutional authority."}, {"text": "Both explicitly advocated for the abolition of slavery, making the Great Awakening the first mass social reform movement in colonial America.", "isCorrect": false, "rationale": "The source notes that Whitefield 'owned enslaved people and advocated the introduction of slavery into Georgia' — directly contradicting the claim that the Awakening was a unified antislavery movement, though some revivalists did raise abolitionist questions."}, {"text": "Both received formal endorsement from the Church of England, giving their revivals official ecclesiastical approval across colonial denominational lines.", "isCorrect": false, "rationale": "The established clergy — Old Lights — were the very authority that the Awakening challenged; Edwards and Whitefield were associated with revivalist New Lights who threatened established ecclesiastical authority rather than receiving its endorsement."}]}, {"question": "The source states that the Great Awakening 'cultivated the habit of popular democratic judgment that made revolutionary rhetoric legible and compelling to a mass audience.' Which of the following best explains the MECHANISM by which the Awakening contributed to this political effect?", "options": [{"text": "Revivalist preachers directly taught colonists to disobey royal governors, preparing them for organized political resistance.", "isCorrect": false, "rationale": "The source does not describe revivalists as explicitly teaching disobedience to royal authority; the mechanism was cultural and psychological — training people in evaluating authority — not explicit political instruction."}, {"text": "Revivalist preachers modeled a new relationship between speaker and audience — earning authority through persuasion and emotional appeal rather than institutional position — training colonial audiences to evaluate and potentially reject authority on their own terms.", "isCorrect": true, "rationale": "The source explicitly describes this mechanism: 'Revivalist preachers modeled a new relationship between speaker and audience: the itinerant minister earned his following through persuasion and emotional appeal, not through institutional authority. Ordinary colonial men and women who had experienced the freedom to evaluate and choose their own spiritual authority were better prepared, culturally, to evaluate and challenge civil authority as well.'"}, {"text": "The Great Awakening created intercolonial communication networks — newsletters, pamphlets, correspondence — that became the organizational infrastructure of the colonial resistance movement after 1765.", "isCorrect": false, "rationale": "While the Awakening did create some intercolonial connections, the source grounds its political significance in a cultural transformation (popular democratic judgment), not in organizational infrastructure."}, {"text": "The Great Awakening caused most colonists to abandon their Anglican affiliations and join New Light denominations, which were uniformly opposed to British imperial authority.", "isCorrect": false, "rationale": "The Awakening divided denominations between New Light and Old Light factions rather than uniting them; it did not uniformly convert colonists to anti-imperial New Light denominations, and the source does not describe it as producing uniform opposition to imperial authority."}]}, {"question": "The source notes that George Whitefield 'owned enslaved people and advocated the introduction of slavery into Georgia' while simultaneously preaching that every soul was equally capable of receiving grace. Which of the following best characterizes the Awakening's relationship to slavery?", "options": [{"text": "The Great Awakening produced a unified antislavery movement that laid the organizational groundwork for immediate abolition across all the colonies.", "isCorrect": false, "rationale": "The source directly contradicts this characterization: 'The Awakening planted seeds of antislavery sentiment without delivering the fruit' — it was neither unified nor immediate in its antislavery effects."}, {"text": "The Awakening generated internal contradictions about slavery: some revivalists drew abolitionist implications from equal spiritual dignity, while others — including Whitefield himself — 'performed mental gymnastics' to reconcile theology with slaveholding.", "isCorrect": true, "rationale": "The source describes exactly this contradiction: 'Some revivalists... argued that the logic of equal spiritual dignity must extend to enslaved people. Others, including Whitefield himself, who owned enslaved people and advocated the introduction of slavery into Georgia, performed mental gymnastics to reconcile their theology with their economic interests.'"}, {"text": "The Great Awakening had no relationship to questions of slavery, since its focus was entirely on personal salvation and spiritual experience, not social or economic arrangements.", "isCorrect": false, "rationale": "The source explicitly addresses the Awakening's complicated relationship to slavery, including Whitefield's enslaved people, antislavery voices among Quakers, and the planted seeds of antislavery sentiment — establishing that the Awakening was not indifferent to social arrangements."}, {"text": "The Great Awakening persuaded most Southern planters to adopt the Quaker position that slaveholding was incompatible with true Christianity within a generation of Whitefield's tours.", "isCorrect": false, "rationale": "The opposite occurred; slavery in the South deepened over the century after Whitefield's tours. The source's careful language — 'planted seeds... without delivering the fruit' — captures this gap between theological implication and historical practice."}]}, {"question": "By 1750, colonial assemblies 'controlled their governors' salaries, passed their own tax laws, and understood themselves as the local equivalents of Parliament, representing the interests of their constituents against executive overreach.' What was the PRIMARY source of this accumulated power?", "options": [{"text": "The English Glorious Revolution (1688) formally transferred sovereignty to colonial assemblies along with Parliament.", "isCorrect": false, "rationale": "The Glorious Revolution established parliamentary supremacy in England but did not formally transfer equivalent power to colonial assemblies; their accumulation of power was a practical process under salutary neglect, not a formal constitutional grant."}, {"text": "Decades of salutary neglect allowed colonial assemblies to exercise effective legislative authority without challenge from London, producing entrenched expectations of autonomy that colonial legislators treated as constitutional rights.", "isCorrect": true, "rationale": "The source explicitly traces this: 'Colonial assemblies accumulated real power over taxation and appropriations simply because no one in London bothered to challenge them' — the source of power was practical exercise under neglect, not formal grant. By the 1750s, this had produced 'entrenched expectations of representative authority.'"}, {"text": "Colonial assemblies were granted expanded powers by a series of parliamentary statutes passed between 1689 and 1720 recognizing colonial legislative authority.", "isCorrect": false, "rationale": "No such series of parliamentary grants existed; colonial assembly power accumulated de facto through inaction on London's part (salutary neglect), not de jure through parliamentary legislation explicitly expanding assembly authority."}, {"text": "The Great Awakening's democratic impulse directly translated into formal demands by colonial assemblies for expanded legislative authority over royal governors.", "isCorrect": false, "rationale": "The Awakening's effect on political culture was cultural and indirect — training habits of evaluating authority — not a direct organizational movement that produced formal assembly demands for expanded power."}]}, {"question": "New colleges — Princeton (1746), Dartmouth (1769), Brown (1764), Rutgers (1766) — were founded by revivalist denominations to train a new kind of minister. This development most directly illustrates which claim about the Great Awakening?", "options": [{"text": "The Awakening fundamentally transformed colonial intellectual culture by replacing Enlightenment rationalism with emotional revivalism as the basis for higher education.", "isCorrect": false, "rationale": "The revivalist colleges did not replace Enlightenment rationalism; colonial intellectual culture held multiple currents simultaneously. Harvard and Yale (pre-Awakening) were not abolished; the new colleges added alternative institutional voices rather than eliminating existing ones."}, {"text": "The Awakening produced lasting institutional change by generating new educational institutions — colleges founded by New Light denominations to train a different kind of minister, one who preached from the heart — demonstrating that the revival's influence extended beyond emotional experience to institutional foundation-building.", "isCorrect": true, "rationale": "The source notes that the new colleges 'were founded by revivalist denominations to train a new kind of minister, one who preached from the heart rather than the manuscript' — showing the Awakening's organizational and institutional reach, not just its emotional and spiritual dimensions."}, {"text": "Revivalist denominations founded these colleges to serve as military academies training colonial militia officers for the French and Indian War.", "isCorrect": false, "rationale": "The colleges were founded specifically to train ministers, not military officers; the revivalist educational project was about preparing a new clergy, not a military force."}, {"text": "The British Parliament funded these colleges as part of its effort to promote Protestant Christianity among colonial populations as a counterweight to Catholic New France.", "isCorrect": false, "rationale": "Parliament did not fund these colleges; they were founded and supported by the revivalist denominations themselves — their independence from crown funding was part of what made them expressions of the New Light tradition."}]}, {"question": "The source describes the First Great Awakening as 'the first mass communications event in American history — Whitefield's preaching tours reached audiences across all thirteen colonies, one of the few things that did.' Which of the following comparisons would a historian use to illustrate this claim's significance for American history?", "options": [{"text": "Like the Navigation Acts, Whitefield's preaching created a uniform economic experience across all thirteen colonies, building shared interests through commercial regulation.", "isCorrect": false, "rationale": "The Navigation Acts created economic regulations, not a shared cultural or emotional experience; the comparison the source invites is between the Awakening as a cultural unifying force and the absence of other genuinely intercolonial events before 1765."}, {"text": "Whitefield's tours created one of the first shared emotional and cultural experiences to cross all colonial boundaries — building a sense of intercolonial common life that neither geography, economic interest, nor political institutions had yet produced.", "isCorrect": true, "rationale": "The source stresses that Whitefield's audiences 'reached across all thirteen colonies, one of the few things that did' — in a period when colonial politics, economies, and religions were largely regionally distinct, the Awakening provided one of the first genuinely intercolonial cultural experiences, building the psychological precondition for colonial collective identity."}, {"text": "Like the Dominion of New England, the Great Awakening unified the colonies under a single authority that overrode their individual governance structures.", "isCorrect": false, "rationale": "The Dominion of New England (1686–89) was an imposed political administration; the Awakening was a voluntary cultural movement. The Awakening did not create uniform governance; it created shared emotional experience across a diverse political landscape."}, {"text": "Like the Half-Way Covenant, the Great Awakening demonstrated that colonial religious communities were becoming more restrictive and exclusive as they aged.", "isCorrect": false, "rationale": "The Awakening's impulse was the opposite: it expanded who could receive grace (servants, women, enslaved people) and challenged established clerical exclusivity. The Half-Way Covenant was a narrowing accommodation within an established church; the Awakening was a democratizing expansion beyond established churches."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
