<script>
var QUESTIONS = [{"question": "John O'Sullivan's 1845 phrase 'manifest destiny' crystallized a set of interlocking beliefs about American expansion. Which of the following BEST characterizes what those beliefs combined?", "options": [{"text": "Democratic self-determination, free trade, and peaceful negotiation with neighboring peoples.", "isCorrect": false, "rationale": "Manifest Destiny was not grounded in peaceful negotiation; it treated indigenous peoples and Mexicans as obstacles rather than sovereign peoples and justified acquisition by purchase, negotiation, or war."}, {"text": "Anglo-American racial superiority, Protestant providentialism, and the inevitability of continental dominion.", "isCorrect": true, "rationale": "The source explicitly identifies Manifest Destiny as fusing American nationalism, Protestant providential thinking, and a racially inflected belief in Anglo-American superiority — not a neutral description of migration but an ideological argument for territorial acquisition."}, {"text": "Jeffersonian agrarianism, states' rights, and opposition to federal government expansion.", "isCorrect": false, "rationale": "While Manifest Destiny had Jeffersonian agrarian elements, the doctrine was primarily nationalistic and racially providential, not a states'-rights argument; moreover, its application required federal military and diplomatic power."}, {"text": "Industrial capitalism, immigration, and the desire to create new markets for manufactured goods.", "isCorrect": false, "rationale": "Industrial capitalism and market-seeking were features of post-Civil War expansion (New Imperialism); the 1840s ideology of Manifest Destiny was centered on agrarian settlement, racial hierarchy, and divine providence, not market expansion."}]}, {"question": "Examine John Gast's 1872 painting 'American Progress,' in which an allegorical figure of Columbia floats westward trailing telegraph wire while settlers advance and indigenous peoples retreat into darkness. A historian analyzing this image as a primary source would MOST likely argue that it:", "options": [{"text": "Accurately depicts the peaceful, consensual nature of westward settlement in the 1840s and 1850s.", "isCorrect": false, "rationale": "The image is an ideological construction, not a documentary record; the source explicitly notes it 'deliberately effaces the violent dispossession, forced labor, and environmental destruction' that accompanied expansion."}, {"text": "Reveals how the ideology of Manifest Destiny constructed a narrative of progress that erased indigenous agency and sovereignty from the story of continental expansion.", "isCorrect": true, "rationale": "The painting's allegorical framing — light advancing as indigenous peoples retreat — performs the ideological work Manifest Destiny required: naturalizing dispossession by depicting it as providential progress rather than conquest. This is the primary critical insight the source foregrounds."}, {"text": "Was created to protest the violent dispossession of indigenous peoples by Gilded Age railroad corporations.", "isCorrect": false, "rationale": "The painting was created in 1872 to celebrate, not critique, the spirit of expansionism; the source notes it represents the 'ideological spirit of 1840s–1860s expansionism,' not a protest image."}, {"text": "Shows that most Americans in the 1870s had rejected Manifest Destiny in favor of international trade.", "isCorrect": false, "rationale": "The painting's widespread reproduction as an icon of Manifest Destiny indicates continued ideological embrace of continental expansion in the 1870s, not its rejection."}]}, {"question": "President James K. Polk ordered General Zachary Taylor to advance to the Rio Grande in early 1846. What was the central controversy surrounding this order?", "options": [{"text": "Congress had not authorized any military deployment, making the order unconstitutional regardless of where the boundary was located.", "isCorrect": false, "rationale": "The source does not raise a general objection to presidential deployment authority; the specific controversy was about whether the territory between the Nueces River and the Rio Grande was American soil or Mexican, making the 'provocation' a contested claim."}, {"text": "Mexico had already agreed to sell California and New Mexico to the United States, making the military advance an unnecessary provocation.", "isCorrect": false, "rationale": "Mexico had refused to sell the territories, not agreed; Polk hoped to purchase them and, when Mexico refused, used the boundary dispute as the pretext for war."}, {"text": "The territory between the Nueces River and the Rio Grande was disputed, and critics including Abraham Lincoln argued that the 'spot' where American blood was shed was not legitimately American soil.", "isCorrect": true, "rationale": "The source directly notes that Lincoln challenged 'whether the spot where the blood had been shed was genuinely American territory' — the Nueces River vs. Rio Grande boundary dispute was the heart of the controversy over whether Polk had manufactured the casus belli."}, {"text": "Taylor's advance violated a treaty with Britain over the Oregon territory that prohibited American military movements in the Southwest.", "isCorrect": false, "rationale": "The Oregon boundary settlement (1846) concerned the Pacific Northwest, not Texas; there was no such treaty prohibiting Taylor's movements."}]}, {"question": "The Treaty of Guadalupe Hidalgo (1848) promised citizenship and property rights to Mexican residents of the ceded territories. What was the actual experience of those residents in the years that followed?", "options": [{"text": "Mexican residents were rapidly integrated into American civic life and their land grants were upheld by American courts.", "isCorrect": false, "rationale": "The source states the treaty's promises 'were honored selectively at best and violated systematically at worst,' with land grants challenged and owners dispossessed through litigation."}, {"text": "Mexican residents were immediately deported to the Mexican Republic in exchange for the $15 million payment.", "isCorrect": false, "rationale": "No mass deportation occurred; the Treaty offered Mexican residents the choice of retaining Mexican citizenship or becoming American citizens — but the practical experience was dispossession and legal limbo, not deportation."}, {"text": "Land grants were challenged in American courts, owners were dispossessed through litigation, and Mexican and indigenous populations existed in legal and social limbo.", "isCorrect": true, "rationale": "The source explicitly describes this outcome: 'land grants were challenged in American courts, owners were dispossessed through litigation, and the populations designated 'Mexican' by the treaty existed in a legal and social limbo between citizenship and exclusion.'"}, {"text": "Mexican residents successfully organized politically and won representation in the California state legislature within two years.", "isCorrect": false, "rationale": "The source describes systematic dispossession and exclusion, not political success; while some californios participated in early California politics, the dominant experience was loss of property rights and social marginalization."}]}, {"question": "The Wilmot Proviso (1846) passed the House of Representatives repeatedly but failed in the Senate. What does this pattern reveal about American politics in the late 1840s?", "options": [{"text": "The Senate had more members from the South than the House, giving slaveholding states a structural majority in both chambers.", "isCorrect": false, "rationale": "In the House, free-state population majorities prevailed; in the Senate, slave states maintained 'near-parity' — not a majority, but enough to block the Proviso. Senate representation was equal per state, not proportional to population."}, {"text": "The Proviso's failures revealed that most American politicians, North and South, opposed the extension of slavery but could not agree on the constitutional mechanism to prevent it.", "isCorrect": false, "rationale": "The source frames the Proviso's divergent fate in House vs. Senate as revealing sectional arithmetic — Northern free-state majority in the House vs. near-parity in the Senate — not a consensus against extension that lacked a mechanism."}, {"text": "The divergent outcomes in House and Senate dramatized the sectional arithmetic of American politics, where free-state population majorities dominated the House while the Senate's equal-state representation preserved slave-state influence.", "isCorrect": true, "rationale": "The source states precisely this: 'The Wilmot Proviso passed the House (where free-state population majorities prevailed) but failed repeatedly in the Senate (where the slave states maintained near-parity).' This arithmetic would define the sectional struggle for the next fifteen years."}, {"text": "The Proviso's repeated passage in the House demonstrated that Northern voters had already embraced full abolitionism by 1846.", "isCorrect": false, "rationale": "The Proviso was a free-soil (non-extension) measure, not an abolitionist one; it did not call for the abolition of slavery where it existed, only for its exclusion from new territories — a distinction the source carefully maintains."}]}, {"question": "Which of the following BEST describes the long-term political consequence of the Mexican-American War for the United States?", "options": [{"text": "It unified the nation by demonstrating that American military power could achieve continental dominance, reducing sectional tensions over slavery.", "isCorrect": false, "rationale": "The source argues the opposite: the war 'accelerated internal divisions rather than resolving them' and revealed that the Missouri Compromise formula for territorial slavery was 'no longer politically sustainable.'"}, {"text": "It led directly to the abolition of slavery in the acquired territories through the Missouri Compromise extension.", "isCorrect": false, "rationale": "The Missouri Compromise line was not extended to the Mexican cession; the Wilmot Proviso (which would have banned slavery there) never passed, and popular sovereignty was applied instead under the Compromise of 1850."}, {"text": "It made sectional crisis more acute by forcing politicians to confront irreconcilable positions on slavery's expansion into the acquired territories, removing the last territorial buffer.", "isCorrect": true, "rationale": "The source's KEY CONCEPT states: 'every acre of territory the United States acquired from Mexico made sectional crisis more acute rather than less' and 'the Mexican War removed the last territorial buffer that had allowed Americans to avoid confronting the incompatibility of slavery and republican governance.'"}, {"text": "It secured American dominance in the Western Hemisphere by forcing European powers to abandon the Monroe Doctrine.", "isCorrect": false, "rationale": "The Monroe Doctrine was an American policy, not a European one; the Mexican-American War did not involve a European challenge to it, and the war's consequences were primarily internal — the slavery crisis — not about European-American hemispheric relations."}]}, {"question": "Texas was an independent republic for nine years (1836–1845) before annexation. Why did the question of annexation dominate American politics and why was it delayed?", "options": [{"text": "Texas's annexation was delayed because Mexico threatened war with Britain if the United States absorbed Texas.", "isCorrect": false, "rationale": "Britain had diplomatic and economic interests in Texas's independence, preferring a buffer state; it was Mexico that threatened war with the United States over annexation, not with Britain."}, {"text": "Annexation was inseparable from slavery: admitting Texas meant admitting a large slave state, and neither major party wanted to disrupt the sectional balance in the Senate.", "isCorrect": true, "rationale": "The source explicitly states: 'The question of annexation hung over American politics because it was inseparable from slavery: admitting Texas meant admitting a huge slave-holding state.' The sectional arithmetic of the Senate made any such addition deeply contentious."}, {"text": "Northern industrialists opposed annexation because Texas would compete with Northern manufacturing by producing cheap cotton using enslaved labor.", "isCorrect": false, "rationale": "While Northern manufacturers had economic interests connected to the slavery debate, the primary political argument against annexation was about the slavery question and senatorial balance, not direct industrial competition."}, {"text": "Annexation required a two-thirds Senate majority for treaty ratification, which free-state senators blocked until 1845.", "isCorrect": false, "rationale": "The constitutional route of treaty ratification had failed, which is why annexation was ultimately accomplished by joint resolution of Congress (requiring only a simple majority), not by treaty — an important procedural point the source implies."}]}, {"question": "The Mexican-American War produced a generation of military officers who later served on both sides of the Civil War. Read the following excerpt from the source: 'The Mexican-American War also produced a generation of military officers (Grant, Lee, Sherman, Jackson, McClellan) whose Civil War careers would be shaped by their Mexican experience.' What does this observation MOST directly illustrate for the AP APUSH framework?", "options": [{"text": "That the Civil War was inevitable from the moment the Mexican-American War began, because the officers who fought it were destined to divide.", "isCorrect": false, "rationale": "Inevitability is a framework historians dispute; the source notes that the Mexican War 'removed the last territorial buffer' but does not claim Civil War was predetermined — it was caused by a chain of political failures, not individual officers' careers."}, {"text": "How prior military experiences, institutional knowledge, and personal networks created both the capabilities and the tragic human dimensions of the Civil War — former comrades fighting as enemies.", "isCorrect": true, "rationale": "The observation that Grant, Lee, Sherman, Jackson, and McClellan all trained in the same war before fighting each other illustrates continuity/change (same generation, two wars) and the human dimension of sectional crisis — officers who knew each other found themselves on opposite sides."}, {"text": "That the United States military was so weakened by the Mexican-American War that it was unprepared for the Civil War fifteen years later.", "isCorrect": false, "rationale": "The source makes no claim about military unpreparedness; the war produced experienced officers whose skills were deployed in the Civil War, not a weakened institution."}, {"text": "That the Democratic Party used military heroes from the Mexican War to win presidential elections and delay the Civil War.", "isCorrect": false, "rationale": "While Zachary Taylor (Whig) won the presidency in 1848 on his Mexican War fame, the source does not frame the officers' later careers in terms of Democratic electoral strategy."}]}, {"question": "Manifest Destiny's ideology contained what historians describe as an 'internal contradiction.' What was that contradiction?", "options": [{"text": "It celebrated continental expansion while simultaneously opposing the construction of railroads and industrial development.", "isCorrect": false, "rationale": "Manifest Destiny celebrated railroads and infrastructure as instruments of civilization's advance, not as threats to it; the contradiction identified in the source is between liberty claims and dispossession, not industrial vs. agrarian values."}, {"text": "It claimed divine sanction for American expansion while the United States was officially a secular republic with separation of church and state.", "isCorrect": false, "rationale": "While the Protestant providential element in Manifest Destiny did invoke religious justification in a secular republic, the source identifies the contradiction differently: between the celebration of liberty and the denial of liberty to dispossessed peoples."}, {"text": "It celebrated liberty and self-governance while simultaneously denying both to the indigenous peoples and Mexicans it dispossessed.", "isCorrect": true, "rationale": "The source states this explicitly: 'Historians note the doctrine's internal contradictions: it celebrated liberty and self-governance while denying both to the peoples it dispossessed.'"}, {"text": "It advocated for national expansion while relying on the labor of enslaved people who were denied the freedoms the expansion was supposed to secure.", "isCorrect": false, "rationale": "While slavery's role in expansion was a profound contradiction — slaveholders in Texas sought to protect an institution Mexico had banned — the source locates the primary 'internal contradiction' of Manifest Destiny in the liberty-vs.-dispossession tension, not specifically the slavery-expansion paradox."}]}, {"question": "A student argues that Manifest Destiny was simply a description of a natural, inevitable process of American settlement. How would a historian revise this interpretation?", "options": [{"text": "By noting that American settlers moved west because of overpopulation in Eastern cities, making expansion a demographic necessity rather than an ideology.", "isCorrect": false, "rationale": "The source frames Manifest Destiny as an 'argument for territorial acquisition by any means necessary,' not as demographic necessity; and the CED theme note explicitly states the US 'did not fill a vacuum — it imposed a new national identity on populations who already had ones.'"}, {"text": "By demonstrating that Manifest Destiny was an ideological construction that justified dispossession of peoples who already inhabited the continent, using racial and providential claims to naturalize conquest as destiny.", "isCorrect": true, "rationale": "The source is explicit: Manifest Destiny was 'not simply a neutral description of westward movement; it was an argument for territorial acquisition by any means necessary' driven by racial hierarchy and providential thinking. The CED note adds that Mexico had governed the ceded territories for decades; indigenous nations had inhabited them for centuries."}, {"text": "By showing that only a small minority of Americans believed in Manifest Destiny while most opposed westward expansion.", "isCorrect": false, "rationale": "Manifest Destiny was a mainstream, widely shared ideology, not a fringe view; the annexation of Texas passed Congress and the Mexican-American War had broad popular support."}, {"text": "By arguing that Manifest Destiny was actually a Southern conspiracy to extend slavery and was rejected by Northern free-labor advocates.", "isCorrect": false, "rationale": "While Southern expansionists did support Manifest Destiny partly to extend slavery, the ideology was broadly Northern and Southern; even free-soil Northerners often shared its racial and providential assumptions while opposing slavery's extension."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
