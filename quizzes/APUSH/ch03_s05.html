<body>

        <div class="subtitle">AP United States History &mdash; Federalist versus Anti-Federalist</div>

<script>
var QUESTIONS = [{"question": "Read this passage from Federalist No. 10 (Madison): 'Among the numerous advantages promised by a well-constructed Union, none deserves to be more accurately developed than its tendency to break and control the violence of faction... By faction, I understand a number of citizens... who are united and actuated by some common impulse of passion, or of interest, adverse to the rights of other citizens, or to the permanent and aggregate interests of the community.' Madison's argument about factions suggests that a large republic is SAFER than a small one because:", "options": [{"text": "Citizens in a large republic share more common interests, making factional conflict less likely", "isCorrect": false, "rationale": "Madison's argument works in the opposite direction: a large republic contains MORE diversity of interests, not fewer — and this diversity is what prevents any single faction from dominating. The argument that shared interests prevent faction is the small-republic theory Madison is refuting."}, {"text": "A large republic contains a greater variety of factions, making it harder for any single faction to achieve a majority and tyrannize the rest — competition among factions protects liberty", "isCorrect": true, "rationale": "This is precisely Madison's 'extended republic' argument in Federalist No. 10: the greater variety of factions in a large republic means no single interest group can easily capture majority control, whereas in a small republic, one faction can more readily dominate. Faction competes with faction, protecting liberty."}, {"text": "A large republic can maintain a larger standing army to suppress factional violence before it destabilizes government", "isCorrect": false, "rationale": "Madison's argument is about structural design — how the system channels faction through competition — not about military suppression. Using army force to suppress faction is the monarchical solution; Madison's republican solution is to let faction compete with faction."}, {"text": "Citizens in a large republic are more educated and virtuous, making them resistant to factional manipulation", "isCorrect": false, "rationale": "Madison explicitly did not rely on civic virtue — Federalist No. 51's 'ambition must counteract ambition' reveals his rejection of virtue as a reliable safeguard; the system's design, not citizens' virtue, was his protective mechanism."}]}, {"question": "Read this passage from Brutus No. 1 (1787): 'History furnishes no example of a free republic, anything like the extent of the United States. The Grecian republics were of small extent; so also was that of the Romans... In a republic, the manners, sentiments, and interests of the people should be similar.' This argument directly contradicts which Federalist claim?", "options": [{"text": "Hamilton's argument in Federalist No. 78 that judicial review would protect individual rights", "isCorrect": false, "rationale": "Brutus's argument about geographic extent and republican government does not directly address judicial review; Brutus No. 11 and 15 attacked the judiciary separately. The contradiction here is with Madison's extended-republic argument, not Hamilton's judicial review thesis."}, {"text": "Madison's argument in Federalist No. 10 that a large republic is safer from tyranny because it contains a greater variety of competing factions", "isCorrect": true, "rationale": "Brutus argues from classical precedent that free republics require small geographic areas with similar interests — directly contradicting Madison's Federalist No. 10 claim that a large, diverse republic is safer because no single faction can dominate. They cite the same ancient republics and reach opposite conclusions."}, {"text": "Hamilton's argument in Federalist No. 70 that a single, energetic executive is essential to good government", "isCorrect": false, "rationale": "Brutus's classical size argument does not directly address the executive branch debate; Hamilton's defense of an energetic executive in No. 70 addresses a different concern from the geographic extent/republican virtue debate."}, {"text": "Madison's argument in Federalist No. 51 that separation of powers prevents tyranny by making ambition counteract ambition", "isCorrect": false, "rationale": "While Brutus was skeptical of the entire constitutional structure, the specific contradiction here is with Madison's extended-republic theory (No. 10) — Brutus is arguing the size question, which No. 10 addresses directly."}]}, {"question": "Read this passage from Federalist No. 78 (Hamilton): 'Nor does this conclusion by any means suppose a superiority of the judicial to the legislative power. It only supposes that the power of the people is superior to both; and that where the will of the legislature... stands in opposition to that of the people, declared in the Constitution, the judges ought to be governed by the latter.' What doctrine does this passage establish the theoretical foundation for?", "options": [{"text": "The doctrine of parliamentary sovereignty, under which the legislature's acts cannot be challenged by courts", "isCorrect": false, "rationale": "Parliamentary sovereignty is the British constitutional doctrine that Hamilton's argument explicitly rejects — he argues that courts may invalidate legislative acts that conflict with the Constitution's expression of the people's will. This is the opposite of parliamentary sovereignty."}, {"text": "Judicial review — the power of courts to invalidate laws that conflict with the Constitution, as an expression of the people's will over their temporary representatives", "isCorrect": true, "rationale": "Hamilton's argument in No. 78 establishes the theoretical foundation for judicial review: courts do not claim superiority over the legislature but enforce the people's superior will (as expressed in the Constitution) over the legislature's ordinary acts — the basis later used in Marbury v. Madison (1803)."}, {"text": "Executive privilege — the president's authority to withhold information from Congress and the courts in matters of national security", "isCorrect": false, "rationale": "Executive privilege concerns the executive branch's authority to withhold information; No. 78 is specifically about the judiciary's authority relative to the legislature, not executive-legislative relations."}, {"text": "The doctrine of states' rights — the right of states to invalidate federal laws they deem unconstitutional", "isCorrect": false, "rationale": "States' rights to nullify federal law were the Anti-Federalist/Jeffersonian doctrine — articulated in the Kentucky and Virginia Resolutions (1798). Hamilton's No. 78 describes federal court review of federal legislation, not state review of federal authority."}]}, {"question": "The Anti-Federalists lost the ratification vote but won the argument about the Constitution's content. Which of the following BEST supports this claim?", "options": [{"text": "Anti-Federalists were able to block ratification in enough states to prevent the Constitution from taking effect until their demands were met", "isCorrect": false, "rationale": "Anti-Federalists did not block ratification — nine states ratified in time for the new government to take effect; two states (North Carolina and Rhode Island) initially rejected the Constitution but ratified later. The Anti-Federalists' content victory came through the Bill of Rights, not blocking ratification."}, {"text": "James Madison, who had initially opposed a bill of rights as unnecessary, shepherded twelve amendments through the First Congress, ten of which were ratified in 1791 as the Bill of Rights — encoding precisely the protections Anti-Federalists had demanded", "isCorrect": true, "rationale": "The source states explicitly: 'The Anti-Federalists had lost the argument over ratification but won the argument about the constitution's content — the First through Tenth Amendments encode precisely the protections Anti-Federalists had demanded.' Madison's about-face on the bill of rights acknowledged this."}, {"text": "The Anti-Federalist newspapers successfully persuaded the public to reject the Constitution, requiring the Federalists to significantly rewrite the document before it could be ratified", "isCorrect": false, "rationale": "The Constitution's text was not significantly rewritten during the ratification campaign; the Federalists made a political concession (promising to add a bill of rights as amendments) rather than altering the original document."}, {"text": "The Anti-Federalists' arguments convinced a majority of state conventions to ratify with formal conditions limiting federal power", "isCorrect": false, "rationale": "State conventions ratified without formal conditions; the Massachusetts model of ratifying while recommending (but not requiring) amendments became the compromise, but these were recommendations, not binding conditions."}]}, {"question": "Hamilton argued in Federalist No. 70 that 'energy in the executive' was a 'leading character in the definition of good government' and that a single president was preferable to an executive council. What concern was he responding to?", "options": [{"text": "Anti-Federalists had proposed a three-person executive council representing different regions to prevent any single president from accumulating excessive power", "isCorrect": true, "rationale": "Several Anti-Federalists proposed an executive council rather than a single president as a check on executive power; Hamilton responded in No. 70 that a single executive would be more decisive, more accountable, and more capable of effective action in emergencies — arguing that concentrated executive energy was a feature, not a danger."}, {"text": "The Articles of Confederation had created an overly powerful executive whose abuses had convinced the framers to replace it with a weak congressional committee", "isCorrect": false, "rationale": "The Articles had no executive at all; the problem Hamilton addressed was the absence of executive energy, not its excess. The executive council proposal came from the Convention debates and Anti-Federalist ratification critiques."}, {"text": "Washington had indicated he would refuse the presidency unless guaranteed a council of advisors to share the burden of decision-making", "isCorrect": false, "rationale": "There is no historical basis for this claim; Washington accepted the presidency without requiring a council. Hamilton's argument was a response to the Anti-Federalist preference for a plural executive, not Washington's conditions."}, {"text": "The British monarchy's single executive had been the source of all colonial abuses, and Hamilton was arguing that an elected president would behave differently from a king", "isCorrect": false, "rationale": "While Hamilton's argument implicitly contrasted the accountable elected president with a hereditary king, the immediate debate he was addressing was the Anti-Federalist preference for a plural executive council rather than a single president."}]}, {"question": "The absence of a Bill of Rights was the Anti-Federalists' most publicly effective objection to the Constitution. Which Federalist argument did they make against this objection, and why did Anti-Federalists find it unconvincing?", "options": [{"text": "Federalists argued that the Constitution's specific enumeration of rights made additional protection redundant; Anti-Federalists countered that no rights were enumerated in the main document at all", "isCorrect": false, "rationale": "The Federalists' argument was that Congress's limited enumerated powers meant it could not infringe on rights it had no authority to address — not that rights were enumerated in the main document. Anti-Federalists doubted this logic could protect rights against government expansion over time."}, {"text": "Federalists argued a bill of rights was unnecessary because Congress had only enumerated powers; Anti-Federalists countered that governments tend to expand power over time and explicit protections were essential", "isCorrect": true, "rationale": "The source describes this exchange precisely: 'The Federalists argued a bill of rights was unnecessary because the federal government had only enumerated powers. Anti-Federalists countered that explicit protections were essential precisely because governments tended to expand their power over time.'"}, {"text": "Federalists argued that state constitutions already contained bills of rights that protected individual liberties; Anti-Federalists countered that states could not protect rights against the supremacy clause", "isCorrect": false, "rationale": "While state bills of rights existed, the Federalists' primary argument was about enumerated powers, not reliance on state constitutions; the Anti-Federalists' primary concern was the expansion of federal power through necessary-and-proper and supremacy clauses, not the specific inadequacy of state bills."}, {"text": "Federalists argued that a bill of rights was potentially dangerous because listing specific rights might imply that unlisted rights were not protected; Anti-Federalists dismissed this concern as evasion", "isCorrect": false, "rationale": "While this argument was made by some Federalists (and is actually the basis for the Ninth Amendment), it is not the primary exchange described in the source; the source specifically frames the debate as enumerated powers vs. government expansion tendency."}]}, {"question": "Which of the following BEST describes the significance of the Federalist Papers as a historical source?", "options": [{"text": "The Federalist Papers were official state documents that definitively established the intended meaning of the Constitution and are legally binding in constitutional interpretation today", "isCorrect": false, "rationale": "The Federalist Papers were newspaper essays (propaganda for a specific ratification campaign) not official documents; while courts cite them as evidence of constitutional intent, they are not legally binding — their status in constitutional law is persuasive, not controlling."}, {"text": "They were simultaneously political propaganda aimed at a skeptical New York audience AND political philosophy that addressed foundational questions about republican government in ways that transcended the immediate ratification debate", "isCorrect": true, "rationale": "The source describes them as 'simultaneously propaganda... and political philosophy addressing the deepest theoretical questions about republican government in ways that went far beyond what any ratification campaign required' — this dual character explains their enduring influence beyond the 1787–88 ratification campaign."}, {"text": "The Federalist Papers were written by all 55 Philadelphia Convention delegates and represent a consensus view of the Constitution's meaning", "isCorrect": false, "rationale": "The Federalist Papers were written only by Hamilton, Madison, and Jay — three of the 55 delegates — under the pseudonym 'Publius'; they represented the Federalist position in the ratification debate, not a consensus among all delegates, many of whom disagreed with specific provisions."}, {"text": "The Papers were primarily important as legal documents submitted to state ratifying conventions and have little lasting philosophical significance", "isCorrect": false, "rationale": "The Federalist Papers are among the most significant works of political philosophy in American history; their concepts (faction theory, separation of powers, judicial review, federalism) continue to structure American constitutional argument and are cited in Supreme Court decisions."}]}, {"question": "The ratification of the Constitution was genuinely close. Massachusetts ratified 187–168, and New Hampshire, Virginia, and New York all ratified narrowly. What does this close outcome suggest about the Anti-Federalist position?", "options": [{"text": "The Anti-Federalists were a fringe movement of uneducated farmers and debtors whose concerns were not taken seriously by the educated political class", "isCorrect": false, "rationale": "The source explicitly rejects this view: 'Anti-Federalist opposition to the Constitution was not irrational fear of strong government; it was a principled alternative theory of republican self-governance, articulated by serious thinkers who had drawn different conclusions from the same historical evidence the Federalists cited.'"}, {"text": "The Anti-Federalists represented a substantial portion of American political opinion, articulating principled concerns about centralized power that reflected genuine constitutional alternatives, not mere obstruction", "isCorrect": true, "rationale": "The close votes in multiple states demonstrate that Anti-Federalism was a serious political force; the source describes it as 'a principled alternative theory of republican self-governance' — the closeness of the ratification votes validates that Anti-Federalist concerns resonated with a large portion of the political community."}, {"text": "The close votes prove that the Constitution was fundamentally flawed and should have been rejected in favor of a revised Articles of Confederation", "isCorrect": false, "rationale": "Close votes do not prove a document is flawed; they demonstrate contested political choices. The source analyzes both sides as serious positions without concluding that the Anti-Federalist position should have prevailed."}, {"text": "The ratification campaign demonstrated that newspapers and public opinion could easily be manipulated by the Federalists' superior propaganda machine", "isCorrect": false, "rationale": "The source describes the debate as a genuine intellectual confrontation between 'both sides... serious thinkers arguing from genuine principle' — not a manipulation campaign by a superior Federalist propaganda operation."}]}, {"question": "Federalist No. 51 (Madison) argued that 'ambition must be made to counteract ambition.' What does this principle reveal about the Constitution's underlying theory of human nature?", "options": [{"text": "The Constitution assumes that elected officials will be virtuous and self-restrained, making external checks unnecessary — checks and balances were added only to address public anxiety about government", "isCorrect": false, "rationale": "Madison's 'ambition must counteract ambition' argument assumes the opposite: that elected officials are NOT reliably virtuous and self-restrained, and therefore the system must be designed to make self-interest prevent any branch from accumulating tyrannical power."}, {"text": "The Constitution's designers assumed human nature was fallible and self-interested, designing a system that used institutional structure rather than reliance on virtuous officeholders to prevent tyrannical concentration of power", "isCorrect": true, "rationale": "The source states: 'rather than relying on the virtue of officeholders, the system would pit the interests of each branch against the others, so that self-interest would prevent any branch from accumulating tyrannical power.' This is a realistic (not optimistic) view of human nature translated into constitutional design."}, {"text": "The Constitution's designers believed that competition among states would naturally prevent the federal government from becoming too powerful, making additional checks within the federal government unnecessary", "isCorrect": false, "rationale": "Federalist No. 51 describes both federalism (states vs. federal government) AND separated powers (executive, legislative, judicial) as the 'double security' against tyranny — Madison did not rely on federalism alone but designed structural competition within the federal government itself."}, {"text": "Madison's principle was primarily a response to European monarchies, designed to explain why America's system was morally superior rather than as a practical design for American governance", "isCorrect": false, "rationale": "Federalist No. 51 was a practical constitutional argument aimed at the New York ratification debate, not a comparative moral argument about American superiority; the 'ambition must counteract ambition' principle was a design rationale, not a rhetorical flourish."}]}, {"question": "Brutus No. 1 warned that 'the great officers of government would soon become above the control of the people, and abuse their power to the purpose of aggrandizing themselves' in an extended republic. How did Madison's Federalist No. 51 most directly answer this concern?", "options": [{"text": "By arguing that the president would have the authority to remove any federal official who abused power, providing a direct check on officer misconduct", "isCorrect": false, "rationale": "While presidential removal power was part of the executive design, Federalist No. 51's answer to the concern about power concentration was separation of powers and federalism — structural design, not presidential removal authority specifically."}, {"text": "By designing a 'double security' — both federalism (states competing with the federal government) and separated powers (branches competing with each other) — so that structural competition prevented any officials from becoming 'above the control of the people'", "isCorrect": true, "rationale": "No. 51's answer to the concentration-of-power concern is precisely structural: the 'double security' of federalism and separated powers ensures that when any branch or level of government overreaches, another competes and checks it — ambition counteracting ambition at every level."}, {"text": "By arguing that direct popular elections would ensure that officials who abused power would be voted out before they could permanently entrench themselves", "isCorrect": false, "rationale": "While elections were part of the republican design, Federalist No. 51's specific answer to the aggrandizement concern was the structural competition of separated powers and federalism — not the sufficiency of elections alone."}, {"text": "By proposing term limits for all federal officials to ensure that no person could accumulate power over a long tenure", "isCorrect": false, "rationale": "The Constitution does not include statutory term limits for Congress or the Supreme Court; Madison's answer in No. 51 was structural competition among branches and levels of government, not term limits."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
