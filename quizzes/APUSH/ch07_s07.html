<script>
var QUESTIONS = [{"question": "Executive Order 9066 (February 19, 1942) authorized the military exclusion of persons from designated areas. The order was applied specifically to Japanese Americans on the West Coast. General DeWitt's internal report stated: 'The Japanese race is an enemy race and while many second and third generation Japanese born on United States soil...have become Americanized, the racial strains are undiluted.' This reasoning is BEST characterized as", "options": [{"text": "A reasonable military necessity argument based on the demonstrated security threat posed by Japanese American communities", "isCorrect": false, "rationale": "The source explicitly states 'the evidence for this claim was nil' — the FBI and naval intelligence both reported the Japanese American community presented no organized security threat. DeWitt's reasoning was racial, not evidence-based."}, {"text": "Racism operating as security policy — using racial identity as a substitute for evidence of individual disloyalty, despite FBI and naval intelligence reports of no organized threat", "isCorrect": true, "rationale": "The source states directly: 'The internment was racism operating as security policy.' DeWitt's report revealed that the rationale was racial ('racial strains are undiluted'), while intelligence agencies had found no evidence of organized security threat."}, {"text": "A neutral administrative decision reflecting standard wartime relocation procedures applied equally to all immigrant communities", "isCorrect": false, "rationale": "The exclusion was not applied equally — German and Italian Americans were not subjected to mass internment despite the U.S. being at war with Germany and Italy. The order was race-specific in its application."}, {"text": "A proportionate response to demonstrated fifth-column espionage activity by Japanese American organizations", "isCorrect": false, "rationale": "The source explicitly states the FBI and naval intelligence found 'no organized security threat'; the internment was a racially motivated preemptive measure, not a response to demonstrated espionage."}], "id": "q01"}, {"question": "Korematsu v. United States (1944) is described as one of the most criticized Supreme Court decisions in American history. Read the following: Justice Hugo Black wrote that 'pressing public necessity may sometimes justify the existence of such restrictions'; Justice Frank Murphy's dissent called the decision 'a legalization of racism.' Murphy's characterization is historically persuasive primarily because", "options": [{"text": "The Court had previously ruled in Hirabayashi (1943) that curfew orders were constitutional, making Korematsu consistent with established precedent", "isCorrect": false, "rationale": "Consistency with prior precedent does not make a decision correct; if that precedent was also wrong (as the Court acknowledged in 2018), consistency is not a defense."}, {"text": "The exclusion was based on racial ancestry without individual evidence of disloyalty, despite intelligence reports showing no organized threat — meeting the textbook definition of racial discrimination rather than military necessity", "isCorrect": true, "rationale": "Murphy's 'legalization of racism' characterization is persuasive because the internment lacked individual evidence, was contradicted by intelligence assessments, and applied specifically to one racial group — the definition of race-based discrimination, not neutral military necessity."}, {"text": "The Supreme Court had a constitutional obligation to defer to executive military judgment in all wartime cases, making Korematsu correctly decided even if racially motivated", "isCorrect": false, "rationale": "If deference to executive military judgment always trumped constitutional protections, there would be no limit on presidential emergency power — the entire framework of constitutional rights would be suspended. Murphy's dissent correctly rejected this logic."}, {"text": "The decision was technically correct because the Constitution's war powers clause grants unlimited executive authority during declared wars", "isCorrect": false, "rationale": "No such unlimited war powers clause exists; the Fifth Amendment's due process clause and Fourteenth Amendment's equal protection clause apply during wartime, which is precisely why Murphy dissented."}], "id": "q02"}, {"question": "The 442nd Regimental Combat Team was composed entirely of Nisei (second-generation Japanese American) soldiers and became the most decorated unit of its size in U.S. Army history. The existence and record of the 442nd most directly illustrates", "options": [{"text": "The federal government's acknowledgment that internment was unjust, as demonstrated by its decision to allow Japanese Americans to volunteer for military service", "isCorrect": false, "rationale": "The federal government did not acknowledge internment's injustice during the war; it maintained internment while simultaneously drafting Japanese American men — making the contradiction more stark, not less."}, {"text": "The contradiction between the internment's premise (Japanese Americans as presumptively disloyal) and the military record of Japanese American soldiers who fought for the nation that had imprisoned their families", "isCorrect": true, "rationale": "The 442nd's record directly refutes the 'racial disloyalty' rationale for internment — soldiers whose families were imprisoned behind barbed wire became the most decorated unit of their size. The contradiction was not resolved; it was made sharper."}, {"text": "The effectiveness of military service as a rehabilitation program that resolved the security concerns that had justified internment", "isCorrect": false, "rationale": "The 442nd's service did not resolve the internment question; the internment continued even as Japanese Americans served. It was not framed as rehabilitation but as patriotic service demonstrating loyalty the internment denied."}, {"text": "The success of the U.S. government's policy of allowing Japanese Americans to prove their loyalty through combat, thereby earning the right to be treated as full citizens", "isCorrect": false, "rationale": "This framing — that citizenship rights must be earned through combat proof — is precisely what civil rights advocates rejected. The 442nd's service was an assertion of identity under pressure, not a validation of the government's conditionality."}], "id": "q03"}, {"question": "The Bracero Program (1942–64) brought approximately 4.6 million Mexican agricultural workers to the United States. The source notes that 'enforcement was minimal, wages were often below the contractual floor, housing was frequently squalid, and workers who complained could be deported.' This pattern most directly illustrates", "options": [{"text": "The success of bilateral labor agreements in protecting foreign workers' rights through contractual guarantees", "isCorrect": false, "rationale": "The source explicitly describes the program's failure to protect workers despite contractual guarantees — contracts specified protections but enforcement was minimal, directly contradicting the 'success' characterization."}, {"text": "A structural vulnerability in temporary worker programs: workers' deportability gives employers leverage to enforce substandard conditions even when contracts specify otherwise", "isCorrect": true, "rationale": "The deportation threat for complaining workers is the structural mechanism that made contract protections unenforceable; bracero workers had legal rights on paper but no practical power to enforce them because asserting rights risked deportation — the core vulnerability of guest-worker programs."}, {"text": "Mexico's failure to negotiate adequate protections for its citizens before signing the bilateral agreement", "isCorrect": false, "rationale": "The contracts 'theoretically guaranteed minimum wages, decent housing, and return transportation' — the protections were negotiated; the problem was enforcement, not negotiation failure."}, {"text": "American farmers' cultural inability to treat Mexican workers fairly due to racial prejudice that contracts alone could not address", "isCorrect": false, "rationale": "While racial prejudice was real, the source's explanation focuses on structural enforcement failure (deportability as leverage), not cultural prejudice as the primary mechanism of exploitation."}], "id": "q04"}, {"question": "The proportion of women in the paid workforce rose from 27% in 1940 to 37% in 1945 during WWII, then the 'same government and media apparatus that had recruited women into factories ran a new campaign encouraging them to return home.' This sequence most directly illustrates", "options": [{"text": "Women's voluntary preference for returning to domestic roles after the wartime emergency ended", "isCorrect": false, "rationale": "The source explicitly states 'Many had not wanted to leave' — the return was not primarily voluntary but was driven by the same apparatus of government and media that had recruited women in the first place."}, {"text": "That women's industrial wartime role was constructed as temporary from the outset — contingent on male absence — demonstrating that it served manpower needs, not a structural commitment to women's economic equality", "isCorrect": true, "rationale": "The source captures this precisely: the same apparatus that recruited women into factories then ran a campaign to remove them. The wartime change was genuine in skill and wages but artificial in permanence — structured around male absence, not women's right to industrial work."}, {"text": "The weakness of women's labor organizing in protecting wartime job gains against postwar employer pressure", "isCorrect": false, "rationale": "The source attributes the reversal to government and media campaigns, not to labor organizing failure; though union weakness contributed, the source's framing is about structural contingency of wartime female employment."}, {"text": "The success of federal employment policy in managing labor market transitions to prevent postwar unemployment", "isCorrect": false, "rationale": "The source frames the postwar displacement of women workers as a failure of equality, not a successful labor market management — approximately two million women 'left or were displaced' from industrial jobs."}], "id": "q05"}, {"question": "The Double V campaign was launched by the Pittsburgh Courier in February 1942 with a specific demand. Which of the following BEST describes that demand?", "options": [{"text": "That African Americans refuse military service until segregation in the armed forces was abolished", "isCorrect": false, "rationale": "The Double V campaign demanded victory on both fronts — it was not a demand for draft resistance, which was A. Philip Randolph's separate strategy used in 1948 to pressure Truman. The Double V affirmed fighting while demanding equality."}, {"text": "Victory over fascism abroad AND victory over racism at home — demanding that the democratic principles for which the war was being fought be applied to the citizens doing the fighting", "isCorrect": true, "rationale": "The source states the Double V gave this paradox 'a slogan: victory over fascism abroad and victory over racism at home' — affirming military participation while demanding that the war's democratic principles apply domestically."}, {"text": "Full integration of the armed forces as the specific condition for African American support of the war effort", "isCorrect": false, "rationale": "The Double V was a broader demand for democratic equality across all dimensions, not a specific condition tied to war support; it was a demand for consistency between foreign and domestic democracy."}, {"text": "Economic reparations for enslaved ancestors as the necessary prerequisite for African American military service", "isCorrect": false, "rationale": "The Double V campaign was a WWII home-front civil rights demand; it was not about reparations but about contemporary equality — fighting fascism abroad while confronting racism at home."}], "id": "q06"}, {"question": "The Tuskegee Airmen (332nd Fighter Group) flew over 15,000 individual sorties and 'were credited with never losing a bomber to enemy fighters while on escort duty.' The 761st Tank Battalion fought across France, Belgium, and Germany. These records most directly served which historical function?", "options": [{"text": "They provided statistical proof that Black soldiers were genetically superior in combat to white soldiers", "isCorrect": false, "rationale": "The records refuted racial inferiority claims — they did not claim racial superiority. The argument was for equal treatment, not inverted hierarchy."}, {"text": "They systematically disproved the military ideology of segregated service that held Black soldiers were less capable in combat roles, strengthening the postwar case for desegregation", "isCorrect": true, "rationale": "The source explicitly states these units 'systematically disproved' the ideology that Black soldiers were less capable in combat — making their record the most powerful argument against the military rationale for segregation, which contributed to Truman's 1948 desegregation order."}, {"text": "They demonstrated that racially segregated units could achieve equivalent results to integrated units, justifying the continuation of segregation on efficiency grounds", "isCorrect": false, "rationale": "The logic is reversed: the records' contribution was to eliminate the military rationale for segregation (incapacity in combat), not to justify continued segregation as equally efficient."}, {"text": "They provided the basis for FDR's immediate executive order desegregating the armed forces during the war", "isCorrect": false, "rationale": "FDR did not desegregate the armed forces; that was Truman's Executive Order 9981 in 1948, three years after the war ended — the wartime records provided evidence that strengthened the postwar case for desegregation."}], "id": "q07"}, {"question": "Executive Order 9981 (1948), signed by President Truman, desegregated the armed forces. The source describes this as 'taken partly in response to A. Philip Randolph's threat to organize a Black draft resistance movement.' This episode most directly illustrates", "options": [{"text": "The effectiveness of legal challenges through the courts as the primary mechanism for dismantling racial segregation in federal institutions", "isCorrect": false, "rationale": "EO 9981 was an executive action, not a court order; the mechanism was political pressure (Randolph's threatened draft resistance) not judicial challenge."}, {"text": "That the threat of organized mass civil disobedience — using African Americans' military service as political leverage — produced civil rights progress that the WWII military record alone had not", "isCorrect": true, "rationale": "The source notes EO 9981 was 'taken partly in response to Randolph's threat' — the military record established the case; the threat of organized resistance converted that case into political leverage sufficient to compel executive action."}, {"text": "Truman's spontaneous moral commitment to racial equality, driven entirely by personal conviction rather than political calculation", "isCorrect": false, "rationale": "The source attributes the action partly to Randolph's threat — political pressure, not purely personal moral conviction. Truman had political calculations (1948 election, Cold War image) alongside genuine civil rights sympathies."}, {"text": "The constitutional requirement for a Supreme Court ruling before any federal racial desegregation could take effect", "isCorrect": false, "rationale": "EO 9981 was a presidential executive order, not dependent on a Supreme Court ruling; Brown v. Board of Education (1954) addressed school segregation six years later through the judicial pathway."}], "id": "q08"}, {"question": "The source's opening sentence states: 'The war that the United States fought against fascism and racial hierarchy abroad was waged by a nation that practiced racial hierarchy at home.' Which pairing of evidence BEST substantiates this framing?", "options": [{"text": "The Selective Service Act (1917) and the Bonus Army dispersal (1932)", "isCorrect": false, "rationale": "Both examples are from WWI and its aftermath, not WWII; the source's argument requires WWII-era examples that pair foreign anti-fascist mission with domestic racial hierarchy."}, {"text": "Japanese American internment (EO 9066) and the Double V campaign's identification of continued Jim Crow segregation in the armed forces fighting fascism", "isCorrect": true, "rationale": "These two examples directly instantiate the source's framing: internment demonstrates domestic racial hierarchy (citizens imprisoned based on race); the Double V campaign articulates the contradiction between the anti-fascist foreign mission and domestic racial hierarchy in the armies pursuing it."}, {"text": "The Lend-Lease Act and the Bracero Program", "isCorrect": false, "rationale": "Lend-Lease is foreign policy supply, not domestic racial hierarchy; the Bracero Program is relevant to WWII home front but is a labor program, not a racial hierarchy that directly contradicts the anti-fascist mission."}, {"text": "The Manhattan Project and the Neutrality Acts", "isCorrect": false, "rationale": "The Manhattan Project is a military technology story; the Neutrality Acts predate American entry into WWII; neither directly illustrates the home-front racial hierarchy contradiction the source describes."}], "id": "q09"}, {"question": "The source concludes: 'The gap between democratic rhetoric and democratic practice at home is not an embarrassing footnote to the greatest generation narrative — it is the central historical tension of the period.' Which of the following BEST explains why this framing is significant for historical analysis?", "options": [{"text": "It suggests that the United States' WWII victory was achieved despite, not because of, its democratic institutions", "isCorrect": false, "rationale": "The source is not arguing that democratic institutions were an obstacle to victory; it is arguing that the gap between democratic rhetoric and racial practice reveals a more complex — and historically honest — understanding of the period."}, {"text": "It insists that understanding the civil rights movement requires connecting it to the WWII home front — where the contradiction between democratic mission and domestic racial hierarchy was most visible and where African Americans' military service created the moral and political conditions for postwar civil rights demands", "isCorrect": true, "rationale": "The source explicitly states this: 'understanding [the gap] is essential to understanding the civil rights movement that followed.' The WWII home front's contradictions — Double V, Tuskegee, 761st, internment, Bracero — created the conditions and articulated the demands that drove the postwar civil rights movement."}, {"text": "It argues that American democracy was fundamentally hypocritical and could not be considered genuinely democratic until after the Civil Rights Act of 1964", "isCorrect": false, "rationale": "The source is making a historical analysis argument, not a definitional claim about when American democracy became 'genuine.' The framing is about historical understanding, not definitional judgment."}, {"text": "It suggests that the 'greatest generation' narrative is entirely mythological and that WWII should be reinterpreted as a failure of American democratic values", "isCorrect": false, "rationale": "The source does not characterize WWII as a failure; it argues that the tension between democratic rhetoric and racial practice is the 'central historical tension,' not that the war was a failure. Acknowledging contradiction is different from complete reinterpretation as failure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
