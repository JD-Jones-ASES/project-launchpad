    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

<body>
<div class="quiz-container">

        <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; The Imperial Republic</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Alfred Thayer Mahan's The Influence of Sea Power Upon History (1890) argued that national greatness required which of the following?", "options": [{"text": "A powerful navy and overseas bases to project commercial and military power", "isCorrect": true, "rationale": "Mahan's central thesis was that naval power and overseas bases were prerequisites for national greatness — the argument that most directly shaped the expansionist agenda of the 1890s."}, {"text": "Industrial self-sufficiency and the avoidance of overseas entanglements", "isCorrect": false, "rationale": "This describes an isolationist position closer to traditional American foreign policy before the 1890s, not Mahan's expansionist argument."}, {"text": "The annexation of Canada and Mexico to create a continental empire", "isCorrect": false, "rationale": "Mahan focused on naval projection and overseas bases, not continental annexation of neighboring countries."}, {"text": "Diplomatic alliances with European colonial powers to share the burden of imperial governance", "isCorrect": false, "rationale": "Mahan did not advocate alliance with European colonial powers; his argument was that the United States should develop its own independent naval capacity."}], "id": "q01"}, {"question": "Read the following excerpt: 'The most stringent protection of free speech would not protect a man in falsely shouting fire in a theatre and causing a panic.' In the context of the Spanish-American War era, which of the following phenomena most directly parallels the role of the Yellow Press as a political actor?", "options": [{"text": "A government agency using wartime censorship to suppress accurate reporting", "isCorrect": false, "rationale": "The Yellow Press was a private commercial enterprise using exaggeration and emotional appeals, not a censorship apparatus."}, {"text": "Rival newspapers competing for circulation by amplifying atrocity reports and stoking public fury, shaping foreign-policy pressure from below", "isCorrect": true, "rationale": "The Yellow Press operated by amplifying real and embellished stories to drive circulation, which translated into public pressure on policymakers — a bottom-up influence on foreign policy rather than top-down government direction."}, {"text": "Congressional debate in which senators weighed evidence before committing to war", "isCorrect": false, "rationale": "Congressional deliberation is the opposite of the Yellow Press dynamic, which bypassed careful deliberation in favor of emotional mob psychology."}, {"text": "Presidential use of executive agreements to bypass Senate ratification of treaties", "isCorrect": false, "rationale": "The Yellow Press was a media phenomenon, not an executive action bypassing constitutional procedures."}], "id": "q02"}, {"question": "The Treaty of Paris (1898) most directly transformed the United States by", "options": [{"text": "ending a decade of expansionist pressure from business interests and military officers", "isCorrect": false, "rationale": "The Treaty of Paris accelerated rather than ended expansionist ambitions; it triggered the Philippine-American War and extended American imperial reach."}, {"text": "creating the formal legal instrument of American overseas empire, with territories in the Caribbean and the Pacific", "isCorrect": true, "rationale": "The treaty ceded Puerto Rico, Guam, and the Philippines to the United States, formally making the republic a colonial power with Pacific and Caribbean possessions."}, {"text": "granting full constitutional rights and citizenship to inhabitants of newly acquired territories", "isCorrect": false, "rationale": "The treaty's acquisition of territories immediately raised the contested question of whether the Constitution 'followed the flag' — that question was left unresolved, not answered with full citizenship grants."}, {"text": "resolving the constitutional debate about the limits of presidential war-making power", "isCorrect": false, "rationale": "The treaty addressed territorial cession, not the constitutional division of war powers; those debates continued unresolved."}], "id": "q03"}, {"question": "The Philippine-American War (1899–1902) undermined the humanitarian justification used to enter the Spanish-American War primarily because", "options": [{"text": "Emilio Aguinaldo admitted that Filipino nationalism had no legitimate legal basis under international law", "isCorrect": false, "rationale": "Aguinaldo's forces claimed independence based on the same principles of self-determination that Americans had cited; this is the opposite of the source's argument."}, {"text": "the United States employed reconcentrado-style tactics against Filipino civilians — the same practices it had condemned when Spain used them in Cuba", "isCorrect": true, "rationale": "The source explicitly notes that American forces used 'a modified version of Spain's reconcentrado policy' — making the humanitarian rationale for the Spanish-American War a direct hypocrisy when applied to the Philippines."}, {"text": "American casualties in the Philippines were far lower than those suffered in Cuba, suggesting the war was not taken seriously", "isCorrect": false, "rationale": "The source describes the Philippine-American War as 'protracted, brutal, and morally costly,' with 4,200 American soldiers killed — the opposite of a minor engagement."}, {"text": "Congress refused to authorize the Philippine-American War, making it constitutionally illegitimate", "isCorrect": false, "rationale": "The source does not describe a congressional refusal to authorize the Philippine campaign; the constitutional question turned on colonial governance, not the war's authorization."}], "id": "q04"}, {"question": "Which of the following best describes the Anti-Imperialist League's constitutional argument against American empire?", "options": [{"text": "The Constitution prohibited the acquisition of any territory beyond the original thirteen states", "isCorrect": false, "rationale": "No such constitutional prohibition existed; the United States had been acquiring territories (Louisiana, Florida, Texas, California) since 1803 — the anti-imperialist argument was different in nature."}, {"text": "Governing colonial subjects without their consent directly contradicted the Declaration of Independence's foundational principle that just powers derive from the consent of the governed", "isCorrect": true, "rationale": "William Jennings Bryan and others made precisely this argument — that colonial rule over the Philippines violated the Declaration's core premise about consent, making empire a betrayal of American founding principles."}, {"text": "The costs of colonial administration would bankrupt the federal government and require unconstitutional tax increases", "isCorrect": false, "rationale": "The source identifies moral, constitutional, and racial objections — fiscal cost is not among the primary anti-imperialist arguments described."}, {"text": "Military occupation of foreign territory violated the Third Amendment's prohibition on quartering troops", "isCorrect": false, "rationale": "The Third Amendment applies to the quartering of troops in citizens' homes; it was not the basis of anti-imperialist constitutional arguments."}], "id": "q05"}, {"question": "Secretary of State John Hay's Open Door Notes (1899–1900) represented what type of foreign policy approach?", "options": [{"text": "Isolationism — the refusal to engage in any competition over Asian markets", "isCorrect": false, "rationale": "The Open Door Policy was a direct engagement in the competition over China's commercial markets, not a withdrawal from it."}, {"text": "Multilateral collective security — a formal binding treaty among great powers to protect China's sovereignty", "isCorrect": false, "rationale": "The notes were not binding treaties; the European powers and Japan responded with 'polite evasion rather than binding commitment,' making this description inaccurate."}, {"text": "Commercial imperialism framed as universal principle — securing American commercial access to China while dressing that interest in the language of equal access for all", "isCorrect": true, "rationale": "The source explicitly describes the Open Door Policy as 'American interest dressed in the language of universal principle' — commercial expansionism without colonies, framed as opposition to exclusive privilege."}, {"text": "Military deterrence — threatening naval force against any power that attempted to establish exclusive spheres of influence in China", "isCorrect": false, "rationale": "The Open Door Notes relied on diplomacy and moral suasion, not military deterrence; the policy was 'largely unenforceable' because the United States lacked the means to compel compliance."}], "id": "q06"}, {"question": "The Platt Amendment (1901) most clearly reflected which tension at the heart of American foreign policy after the Spanish-American War?", "options": [{"text": "The conflict between Protestant missionaries and commercial interests over the purpose of American expansion", "isCorrect": false, "rationale": "The Platt Amendment was a political-military instrument establishing Cuban protectorate status; it did not address the missionary vs. commercial debate."}, {"text": "The gap between the stated goal of Cuban independence and the actual establishment of American control over Cuban affairs", "isCorrect": true, "rationale": "The Treaty of Paris recognized Cuban independence, but the Platt Amendment gave the United States the right to intervene in Cuban affairs and established Guantánamo Bay — making Cuban 'independence' nominal at best."}, {"text": "Congressional opposition to the Treaty of Paris and the administration's attempt to circumvent the Senate", "isCorrect": false, "rationale": "The Senate ratified the Treaty of Paris (narrowly, by 57–27); the Platt Amendment was a separate action that did not circumvent Senate procedure."}, {"text": "Competition between the Navy and the Army over control of American imperial policy in the Caribbean", "isCorrect": false, "rationale": "The Platt Amendment was a diplomatic and legislative instrument, not an interservice rivalry document."}], "id": "q07"}, {"question": "A student reads the following claim: 'The Spanish-American War was fought purely for humanitarian reasons — to liberate Cuba from Spanish oppression.' A historian would most likely revise this by noting that", "options": [{"text": "American policymakers had no genuine concern for Cuban suffering and the war was driven entirely by commercial greed", "isCorrect": false, "rationale": "The source acknowledges 'genuine humanitarian outrage' over Weyler's reconcentrado policy — dismissing humanitarian concern entirely overcorrects."}, {"text": "humanitarian concern and imperial opportunity arrived together, and the war produced lasting territorial acquisitions that revealed an expansionist agenda beyond Cuban liberation", "isCorrect": true, "rationale": "The source frames the war precisely this way: humanitarian and imperial motives 'arrived together,' and the outcome — acquisition of the Philippines, Puerto Rico, and Guam — demonstrates that Cuban liberation was not the sole or sufficient explanation."}, {"text": "the war was solely the product of Yellow Press manipulation, with no genuine policy debate among American leaders", "isCorrect": false, "rationale": "Mahan, Lodge, and Roosevelt had developed coherent imperial arguments before the Yellow Press crisis; attributing the war solely to media manipulation ignores the preexisting expansionist agenda."}, {"text": "Spain had already agreed to Cuban independence before the war began, making the military campaign unnecessary", "isCorrect": false, "rationale": "Spain's concessions came late and were incomplete; the United States declared war before any Spanish offer of Cuban independence was made."}], "id": "q08"}, {"question": "The Roosevelt Corollary (1904) to the Monroe Doctrine claimed for the United States the right to intervene in Latin American nations that could not manage their own affairs. This policy most directly built upon which aspect of the imperial framework established in 1898?", "options": [{"text": "The Platt Amendment's precedent for reserving American intervention rights in nominally independent nations", "isCorrect": true, "rationale": "The Platt Amendment created a template — recognizing formal independence while reserving the right to intervene — that the Roosevelt Corollary extended to the entire Western Hemisphere."}, {"text": "The Treaty of Paris's transfer of Spanish colonies to American administration", "isCorrect": false, "rationale": "The Roosevelt Corollary applied to independent Latin American nations, not to territories acquired from Spain; it extended American power beyond colonial acquisition."}, {"text": "The Open Door Notes' framework of commercial access without territorial control", "isCorrect": false, "rationale": "The Roosevelt Corollary explicitly claimed intervention rights — the opposite of the Open Door's non-territorial commercial approach."}, {"text": "The Anti-Imperialist League's demand that the United States respect the consent of governed peoples", "isCorrect": false, "rationale": "The Roosevelt Corollary was a statement of American interventionist power, directly contradicting the anti-imperialist principle of respecting self-determination."}], "id": "q09"}, {"question": "Which of the following most accurately describes the nature of American imperialism in the 1890s–1900s as compared to European colonialism of the same period?", "options": [{"text": "American imperialism was indistinguishable from European colonialism in both method and ideological justification", "isCorrect": false, "rationale": "While American imperialism shared features with European colonialism, the Open Door Policy, the Platt Amendment model, and the debate over the Constitution 'following the flag' represented distinctive American forms; and the anti-imperialist opposition was unusually strong."}, {"text": "American imperialism operated simultaneously through formal territorial acquisition (Philippines, Puerto Rico, Guam), protectorate arrangements (Cuba), and commercial expansionism framed as universal principle (Open Door), reflecting the republic's ambivalence about empire", "isCorrect": true, "rationale": "The source describes all three modes operating together, reflecting the 'serious debate about American identity' that accompanied expansion — a characteristic tension between imperial practice and anti-colonial republican ideology."}, {"text": "American imperialism was purely commercial and never involved military force or territorial control", "isCorrect": false, "rationale": "The Philippine-American War, the occupation of Cuba, and the acquisition of Guam and Puerto Rico all involved military force and territorial control — the purely commercial characterization is inaccurate."}, {"text": "American imperialism was driven entirely by the demands of industrial corporations with no ideological or strategic component", "isCorrect": false, "rationale": "Mahan, Lodge, and Roosevelt articulated strategic and ideological arguments for empire that existed independently of direct corporate lobbying."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
