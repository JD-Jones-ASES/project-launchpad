<script>
var QUESTIONS = [{"question": "William Penn's Frame of Government (1682) reflected his Quaker beliefs most directly by:", "options": [{"text": "Establishing the Society of Friends (Quakers) as the official state church of Pennsylvania, supported by public taxation.", "isCorrect": false, "rationale": "Penn's Frame of Government specifically barred any established church — this was the opposite of creating a Quaker establishment. The rejection of established churches was itself a Quaker principle, since Quakers opposed the coercive use of state power in religious matters."}, {"text": "Guaranteeing freedom of worship to all who believed in God, barring any established church, and creating a representative assembly — translating Quaker principles of equality and conscience into constitutional form.", "isCorrect": true, "rationale": "The source states Penn 'designed the colony around his Quaker convictions: his Frame of Government (1682) guaranteed freedom of worship to all who believed in God, barred any established church, and created a representative assembly' — each provision translating a Quaker principle (equality before God, rejection of hierarchy, consent of governed) into law."}, {"text": "Granting land to any Quaker who emigrated to Pennsylvania regardless of wealth, mirroring the Virginia headright system.", "isCorrect": false, "rationale": "Pennsylvania did not replicate the headright system; Penn attracted immigration through the promise of religious freedom, not through a land-grant-per-passage mechanism. Pennsylvania's diverse immigrant base came for religious liberty, not land grants tied to labor importation."}, {"text": "Requiring all Pennsylvania settlers to undergo a period of silent meditation before receiving civil rights, ensuring only spiritually genuine colonists could participate in governance.", "isCorrect": false, "rationale": "No such requirement existed; the Frame of Government extended rights broadly to believers. The 'silent waiting' of Quaker worship was a religious practice, not a civil qualification for political participation."}]}, {"question": "The Dutch colony of New Netherland is described as 'genuinely diverse' in the 1640s, with speakers of at least eighteen languages. Which of the following best explains the source of this diversity, given the Dutch West India Company's priorities?", "options": [{"text": "The Dutch Reformed Church actively recruited immigrants from across Europe to strengthen New Netherland's defenses against English encroachment.", "isCorrect": false, "rationale": "The Dutch Reformed Church was the established religion, but religious recruitment was not the source of the colony's diversity; the source attributes diversity to the company's commercial priorities, which discouraged religious persecution that would drive away useful traders."}, {"text": "The Dutch West India Company's mercantile priorities discouraged religious persecution that might drive away useful traders, creating an environment tolerant enough to attract diverse settlers and merchants.", "isCorrect": true, "rationale": "The source explicitly states: 'The company's mercantile priorities discouraged the kind of religious persecution that would have driven away useful traders' — the diversity was a consequence of commercial logic, not of principled religious toleration."}, {"text": "New Netherland had been settled simultaneously by multiple European nations under a mutual defense treaty, each group retaining its own language and customs.", "isCorrect": false, "rationale": "New Netherland was established by the Dutch West India Company; it was not a multi-national treaty settlement but a Dutch commercial colony whose diversity arose from the company's open trading environment."}, {"text": "Peter Stuyvesant's administration actively recruited persecuted religious minorities across Europe to boost the colony's population and tax base.", "isCorrect": false, "rationale": "Stuyvesant was notably inhospitable to religious minorities, famously trying to expel the Jewish arrivals of 1654 before being overruled by the Amsterdam Jewish community that held company shares. The diversity existed despite Stuyvesant, not because of his recruitment."}]}, {"question": "Consider the following scenario: A Jewish family arrives in New Amsterdam in 1654, seeking refuge after being expelled from Brazil. Director Peter Stuyvesant initially refuses to let them stay. What ultimately allowed them to remain, and what does this reveal about the priorities of the Dutch West India Company?", "options": [{"text": "The Dutch Reformed Church intervened on behalf of the Jewish settlers, citing scripture's command to welcome strangers.", "isCorrect": false, "rationale": "The intervention came from the Amsterdam Jewish community that held shares in the Dutch West India Company — a commercial interest group, not a religious institution extending theological hospitality."}, {"text": "The Amsterdam Jewish community held shares in the Dutch West India Company and successfully pressured the company to overrule Stuyvesant — revealing that commercial interests (shareholder rights) took precedence over the director's religious prejudices.", "isCorrect": true, "rationale": "The source states: 'Jews arrived in 1654; they were reluctantly permitted to stay by Director Peter Stuyvesant after pressure from the Amsterdam Jewish community that held shares in the company' — revealing that the company's commercial priorities (protecting shareholders' interests) overruled even the director's personal religious exclusion."}, {"text": "King Charles II of England ordered Stuyvesant to accept Jewish settlers as part of a diplomatic agreement with the Dutch Republic.", "isCorrect": false, "rationale": "The English conquest of New Netherland did not occur until 1664; in 1654, Charles II had not yet issued any such order. The intervention was internal to the Dutch West India Company, not a royal diplomatic act."}, {"text": "The Jewish settlers proved their commercial value by establishing a profitable trade network with the Caribbean within their first year, demonstrating their economic utility to the colony.", "isCorrect": false, "rationale": "The source does not describe any demonstrated economic performance as the basis for permission to stay; the decision was made by the company in Amsterdam based on shareholder representation, not on the settlers' specific commercial achievements in New Netherland."}]}, {"question": "The source argues that 'the separation of church and state is not a Puritan inheritance; it is a middle-colony inheritance.' Which of the following pieces of evidence most directly supports this claim?", "options": [{"text": "New England Puritans established representative town meetings that operated independently of church authority.", "isCorrect": false, "rationale": "Puritan New England's town meetings operated in close connection with the Congregationalist church, not independent of it; the same men governed both institutions. This evidence supports the Puritan contribution to self-governance, not to church-state separation."}, {"text": "Penn's Frame of Government barred any established church and guaranteed freedom of worship, while New York's Dutch commercial culture discouraged doctrinal enforcement — creating a template for the First Amendment's disestablishment clause.", "isCorrect": true, "rationale": "The source explicitly makes this argument: Penn's prohibition of established churches and guarantee of worship freedom, combined with New York's commercial tolerance, created 'a template — freedom of worship, absence of an established church, coexistence of competing denominations — that would be replicated at the national level in the First Amendment.'"}, {"text": "Virginia's House of Burgesses voted in 1689 to tolerate all Protestant denominations, extending religious pluralism to the Southern colonies.", "isCorrect": false, "rationale": "Virginia maintained the Anglican establishment throughout the colonial period; no 1689 toleration act of this kind is described in the source. The middle-colony model, not Virginia, is the source's basis for First Amendment precedent."}, {"text": "The Great Awakening's itinerant preachers operated outside established church structures in all colonies, effectively modeling disestablishment through practice.", "isCorrect": false, "rationale": "While the Great Awakening did challenge established church authority, it is covered in section 2.5, not this section; more importantly, the source grounds the disestablishment tradition in the middle colonies' constitutional design, not in the revival movement."}]}, {"question": "Quakers 'refused to swear oaths, declined to doff hats to social superiors, opposed war, and extended the principle of equality to women, who could speak and preach in meetings.' Which of the following best characterizes the social implications of these practices in seventeenth-century colonial society?", "options": [{"text": "Quaker practices were largely symbolic and had no practical impact on colonial social hierarchies.", "isCorrect": false, "rationale": "Refusing to doff hats (a required gesture of social deference), refusing court oaths (required for legal proceedings), and allowing women to preach (prohibited in every other Protestant tradition) were radical departures from colonial social norms with real legal, economic, and social consequences — including imprisonment in England."}, {"text": "Quaker practices challenged multiple dimensions of colonial social hierarchy simultaneously — class hierarchy (no hat-doffing), legal hierarchy (no oaths), military hierarchy (pacifism), and gender hierarchy (women's equal voice) — making them genuinely radical in their social implications.", "isCorrect": true, "rationale": "Each practice targeted a specific pillar of colonial social order: hat-doffing enforced class deference; oaths enforced legal hierarchy; military service enforced state authority; women's exclusion enforced gender hierarchy. Quakerism rejected all four simultaneously on the same theological ground — the Inner Light present in every human soul equally."}, {"text": "Quaker practices were quickly adopted by the Anglican Church in England, which recognized their evangelical effectiveness.", "isCorrect": false, "rationale": "The Anglican Church did not adopt Quaker practices; Quakers were persecuted in England and Massachusetts precisely because their rejection of hierarchy and oaths threatened established ecclesiastical and civil order."}, {"text": "Quakers' refusal to participate in military service meant Pennsylvania was unable to defend itself and was conquered by New York in 1700.", "isCorrect": false, "rationale": "Pennsylvania was not conquered by New York; it remained a distinct, prospering colony. Quaker pacifism created political tensions — especially during intercolonial wars — but Penn's Frame of Government survived throughout the colonial period."}]}, {"question": "Philadelphia became the largest city in British North America by the 1750s, and the source argues that 'Benjamin Franklin's career — printer, scientist, civic entrepreneur, diplomat — is incomprehensible outside the Philadelphia that Penn's design had created.' Which aspect of Penn's design most directly explains Philadelphia's rise to intellectual and commercial prominence?", "options": [{"text": "Penn's refusal to allow slavery in Pennsylvania meant the colony's workforce was more educated and productive than the plantation South.", "isCorrect": false, "rationale": "Penn's Frame of Government did not ban slavery; Pennsylvania did have enslaved people, and Quakers' later leadership in abolitionism developed over time, not from a founding prohibition. The source does not cite a slavery ban as explaining Philadelphia's rise."}, {"text": "Penn's Frame of Government attracted massive immigration — English and Welsh Quakers, German Mennonites, Amish, Pietists, and Lutherans — by providing a genuine guarantee of religious freedom unavailable in Europe, creating the diverse, commercial, intellectually fertile Philadelphia of the 1750s.", "isCorrect": true, "rationale": "The source directly connects Penn's charter to Philadelphia's growth: 'Pennsylvania attracted massive immigration from the beginning: not only English and Welsh Quakers but German Mennonites, Amish, Pietists, and Lutherans who found in Penn's charter a genuine guarantee of religious freedom unavailable at home.' This diversity and commercial energy produced the Philadelphia that made Franklin's career possible."}, {"text": "Philadelphia's location at the confluence of the Delaware and Schuylkill rivers gave it a natural geographical advantage over Boston and New York that no other colonial design could have overcome.", "isCorrect": false, "rationale": "Geography played a role in Philadelphia's commercial position, but the source grounds its preeminence in Penn's constitutional design attracting diverse and commercially active immigrants — not in purely geographical factors that operated independently of governance."}, {"text": "Penn's military alliance with the Lenape (Delaware) people gave Philadelphia exclusive trading rights with indigenous peoples of the interior, generating the commercial wealth that funded its intellectual institutions.", "isCorrect": false, "rationale": "Penn purchased land from the Lenape rather than forming an exclusive trading alliance; the source does not describe an exclusive interior trade arrangement as the basis of Philadelphia's prosperity."}]}, {"question": "The English conquest of New Netherland in 1664 was 'less disruptive than it might appear' primarily because:", "options": [{"text": "The English and Dutch had signed a treaty promising to preserve all existing colonial institutions in territories they exchanged.", "isCorrect": false, "rationale": "No such treaty is described in the source; the conquest was military, and the preservation of Dutch institutions was a practical governance decision by the English, not a treaty obligation."}, {"text": "English rule preserved Dutch land titles, the Dutch Reformed Church, and much of the merchant community's commercial network, ensuring continuity even as the colony's name and sovereign changed.", "isCorrect": true, "rationale": "The source explicitly states: 'English rule preserved Dutch land titles, the Dutch Reformed Church, and much of the merchant community's commercial network' — explaining why the transition, though sudden, did not disrupt the colony's underlying social and economic structures."}, {"text": "Peter Stuyvesant organized a successful diplomatic negotiation that exchanged Dutch sovereignty for guaranteed autonomy of all New Netherland institutions.", "isCorrect": false, "rationale": "Stuyvesant submitted without a fight when his population showed no enthusiasm for war; he did not negotiate a diplomatic arrangement — the English simply offered continuity as a practical matter, which the source describes as the reason for the smooth transition."}, {"text": "The Dutch population of New Netherland was so small that the English could grant them all full citizenship immediately, integrating them without conflict.", "isCorrect": false, "rationale": "New Netherland's small population is mentioned, but the source grounds the smooth transition in the preservation of Dutch institutions, not in the simplicity of extending citizenship to a small group."}]}, {"question": "William Penn's practice of purchasing land from the Lenape (Delaware) people rather than claiming it by royal grant stands in contrast to most colonial land acquisition. Which of the following best explains why this practice was exceptional and what it reveals about colonial land relations generally?", "options": [{"text": "Penn's practice was exceptional because most colonial charters specifically prohibited purchasing land from indigenous peoples without crown approval.", "isCorrect": false, "rationale": "No blanket prohibition on land purchases from indigenous peoples existed in colonial charters; the exceptionalism lay in Penn's actually doing it, not in other colonies being legally prohibited from it."}, {"text": "Penn's purchase of Lenape land was exceptional because the dominant colonial model treated royal charters as sufficient title regardless of indigenous occupation — Penn's Quaker theology led him to treat indigenous peoples as rights-holding sellers rather than obstacles to be displaced.", "isCorrect": true, "rationale": "The source notes that Penn 'purchased land rather than simply claiming it by royal grant — a practice that his Quaker contemporaries praised and that stands in marked contrast to the expropriation model common elsewhere in the colonies.' The contrast reveals that the default colonial model was dispossession by royal fiat, not negotiated purchase."}, {"text": "Penn purchased land from the Lenape because the crown required this of all Quaker proprietors as a condition of receiving a charter.", "isCorrect": false, "rationale": "No such crown requirement for Quaker proprietors existed; Penn received his charter under standard conditions. His land-purchase practice was a personal expression of Quaker principles, not a royal requirement."}, {"text": "Penn's purchase model was quickly adopted by the other middle colonies, establishing the Delaware Valley as a region of peaceful indigenous-colonial coexistence throughout the colonial period.", "isCorrect": false, "rationale": "Penn's practice was not widely adopted; the 'expropriation model common elsewhere' remained dominant. Even in Pennsylvania, relations with indigenous peoples deteriorated after Penn's era, most notably in the Walking Purchase of 1737."}]}, {"question": "The source describes Quakers as 'early leaders of the abolitionist movement, declaring slaveholding incompatible with belief in a divine inner light present in all human beings.' This development is best understood as an example of:", "options": [{"text": "Religious ideology having no practical political consequences until the nineteenth-century abolitionist movement transformed it into activism.", "isCorrect": false, "rationale": "Quaker abolitionism was active in the colonial period itself, not dormant until the nineteenth century; the source identifies them as 'early leaders,' meaning they took positions and engaged in advocacy from the colonial era onward."}, {"text": "A theological principle (the Inner Light present in all human beings) generating a specific moral commitment (opposition to slavery) that challenged a colonial economic system — an early example of religious conviction as a driver of social reform.", "isCorrect": true, "rationale": "The source explicitly connects the Quaker theological principle (Inner Light in every soul) to the abolitionist conclusion (slaveholding is incompatible with this belief) — demonstrating how a religious premise produced a social justice commitment that challenged the colonial economic order."}, {"text": "Quaker political power in Pennsylvania enabling them to pass colonial abolition legislation before any other colony.", "isCorrect": false, "rationale": "Pennsylvania did not pass colonial abolition legislation during the colonial period itself; Quakers pioneered abolitionist advocacy and organization, but legal abolition in Pennsylvania came in 1780 with the Pennsylvania Gradual Abolition Act — after independence."}, {"text": "The economic superiority of free labor making abolition a rational economic choice for Quaker merchants independent of their theological convictions.", "isCorrect": false, "rationale": "The source grounds Quaker abolitionism in theology (Inner Light), not in economic calculation; the 'rational economic' argument for free labor was a later nineteenth-century Northern claim not applicable to the colonial-era Quaker position."}]}, {"question": "Which of the following best describes the 'third model' of colonial society that the middle colonies represented, distinct from both the Chesapeake and New England?", "options": [{"text": "A model based on enslaved African labor, export crop agriculture, and a single dominant religious tradition — like the Chesapeake but better organized.", "isCorrect": false, "rationale": "This describes the Chesapeake model, not the middle colonies' distinctiveness; the source contrasts the middle colonies precisely by their rejection of monoculture, plantation slavery (as the dominant system), and doctrinal uniformity."}, {"text": "A model characterized by ethnic diversity, religious pluralism, mixed-grain economies balanced between farming and Atlantic commerce, and the absence of systematic doctrinal enforcement — pointing toward the pluralistic, commercially active society that Philadelphia exemplified by the 1750s.", "isCorrect": true, "rationale": "The source describes the middle colonies as 'distinguished by ethnic diversity, religious pluralism, and economies balanced between grain farming and Atlantic commerce' with 'coexisting' denominations 'without the systematic enforcement of doctrinal uniformity that characterized Massachusetts' — precisely a third model distinct from both the Chesapeake plantation system and New England's covenanted Puritan commonwealth."}, {"text": "A model based entirely on voluntary religious communities with no civil governance, each faith group managing its own affairs in complete separation from colonial law.", "isCorrect": false, "rationale": "The middle colonies had civil governance — Penn's Frame of Government created a representative assembly; New York had an assembly and governor. The model was religious pluralism within civil governance, not an absence of civil authority."}, {"text": "A model in which indigenous peoples were incorporated as equal members of colonial society, reflecting the Quaker principle of the Inner Light in all human beings.", "isCorrect": false, "rationale": "Penn's land purchases represented a more respectful approach, but indigenous peoples were not incorporated as equal members of colonial society in Pennsylvania or elsewhere in the middle colonies; the Inner Light principle was not extended to political equality in practice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
