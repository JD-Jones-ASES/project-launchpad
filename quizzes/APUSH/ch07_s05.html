<script>
var QUESTIONS = [{"question": "The stock market crash of October 1929 (Black Tuesday) is best described in relation to the Great Depression as", "options": [{"text": "The sole cause of the Great Depression, since the broader economy was strong until the crash", "isCorrect": false, "rationale": "The source explicitly distinguishes the crash as 'the trigger, not the underlying cause,' identifying pre-existing structural weaknesses including fragile banking, depressed agriculture since 1921, installment credit dependency, and unresolved war debts."}, {"text": "The trigger that made visible multiple pre-existing structural weaknesses: fragile banking, depressed agriculture, credit-dependent consumer spending, and unresolved global war debts", "isCorrect": true, "rationale": "The source states 'the crash was the trigger, not the underlying cause' and identifies the specific structural weaknesses — banking fragility, farm sector depression since 1921, installment credit collapse, and global war debt/reparations — that the crash made simultaneously visible."}, {"text": "An isolated financial event that would not have produced a depression without Hoover's policy failures", "isCorrect": false, "rationale": "The source identifies structural weaknesses that predated Hoover and preceded the crash; attributing the Depression solely to Hoover's response is an oversimplification the source explicitly rejects."}, {"text": "The culmination of a deliberate speculative fraud orchestrated by Wall Street banks in coordination with the Hoover administration", "isCorrect": false, "rationale": "The source describes structural economic weaknesses, not a deliberate fraud; the crash was a market collapse with multiple structural causes, not a coordinated criminal scheme."}]}, {"question": "Herbert Hoover opposed direct federal relief to individuals primarily because", "options": [{"text": "He believed the Depression would resolve itself without any government intervention", "isCorrect": false, "rationale": "The source notes Hoover was 'not the do-nothing president of later caricature' — he launched the largest peacetime federal relief program to that point (RFC) and the Federal Home Loan Bank Act. His objection was specifically to direct individual relief, not all intervention."}, {"text": "He believed direct individual relief would destroy self-reliance, corrupt local charity institutions, and create a permanent dependent class", "isCorrect": true, "rationale": "The source explicitly states Hoover 'opposed direct federal relief to individuals on the grounds that it would destroy self-reliance, corrupt local charity institutions, and create a permanent dependent class' — ideological commitments, not indifference, defined his response."}, {"text": "Congress refused to appropriate funds for any federal relief program during the Hoover administration", "isCorrect": false, "rationale": "Congress passed the Reconstruction Finance Corporation (1932) and the Federal Home Loan Bank Act under Hoover; it was Hoover's ideological limits, not congressional refusal, that constrained relief."}, {"text": "He believed the states were constitutionally obligated to provide all relief and that federal involvement was unconstitutional", "isCorrect": false, "rationale": "The source attributes Hoover's position to ideological commitments about self-reliance and local institutions, not to a strict constitutional argument against federal domestic action."}]}, {"question": "FDR's First Inaugural Address confronted the banking panic directly. Based on the source's reference to this address ('sources/extracted/fdr_first_inaugural'), which of the following best describes the rhetorical purpose of FDR's inaugural given the context of the crisis?", "options": [{"text": "To explain the complex structural economic causes of the Depression to an educated public audience", "isCorrect": false, "rationale": "The First Inaugural's purpose was primarily inspirational and confidence-restoring, not explanatory; FDR's famous 'the only thing we have to fear is fear itself' was a rhetorical call to action, not an economic lecture."}, {"text": "To restore public confidence and signal decisive action when thirty-eight states had declared bank holidays and the banking system faced acute crisis", "isCorrect": true, "rationale": "The source explicitly notes that 'the banking system was in acute crisis' with 38 states having declared bank holidays before the inaugural; FDR's address 'confronted the panic directly' — restoring confidence was the immediate rhetorical necessity."}, {"text": "To announce the specific legislative agenda of the First Hundred Days before Congress had been convened", "isCorrect": false, "rationale": "The specific legislative agenda was developed and proposed after the inaugural; the inaugural was a confidence-building speech, not a legislative announcement."}, {"text": "To mobilize public support for the court-packing plan that would address the Supreme Court's hostility to reform", "isCorrect": false, "rationale": "The court-packing plan was proposed in February 1937, four years after the inaugural; it was entirely absent from the March 1933 inaugural context."}]}, {"question": "The Social Security Act (1935) excluded domestic servants and agricultural workers from coverage. This exclusion is BEST explained by", "options": [{"text": "Technical administrative difficulty in tracking the earnings of domestic and agricultural workers, which made coverage impractical rather than discriminatory", "isCorrect": false, "rationale": "The source explicitly attributes the exclusion to political reality — 'Southern Democrats had to support the bill for it to pass' — not to technical administrative difficulty."}, {"text": "Political necessity: Southern Democrats would not support the bill if it covered categories of workers that were disproportionately African American and Latino, and their votes were required for passage", "isCorrect": true, "rationale": "The source states explicitly that the exclusion 'reflected the political reality that Southern Democrats had to support the bill for it to pass' — a deliberate political bargain that excluded categories 'disproportionately African American and Latino.'"}, {"text": "The belief that domestic and agricultural workers did not need retirement insurance because they had family support networks", "isCorrect": false, "rationale": "The source attributes the exclusion to the political bargain with Southern Democrats, not to any assessment of domestic and agricultural workers' family support systems."}, {"text": "Constitutional constraints that prevented federal coverage of workers in intrastate rather than interstate commerce", "isCorrect": false, "rationale": "While the constitutional distinction between interstate and intrastate commerce affected some New Deal programs, the source explicitly attributes the Social Security exclusions to Southern Democratic political demands, not constitutional necessity."}]}, {"question": "Roosevelt's court-packing plan (1937) proposed adding up to six new Supreme Court justices for every justice over 70 who did not retire. The plan failed primarily because", "options": [{"text": "Republicans controlled enough Senate seats to defeat any constitutional change Roosevelt proposed", "isCorrect": false, "rationale": "Roosevelt had won 46 of 48 states in 1936 and Democrats had large congressional majorities; it was not Republican opposition but Democratic defections and widespread perception of institutional threat that sank the plan."}, {"text": "It was widely perceived as an attack on judicial independence, and Congress — including many Democrats — refused to pass it, even though it was constitutionally legal", "isCorrect": true, "rationale": "The source states the plan 'was constitutionally legal but was widely perceived as an attack on judicial independence, and Congress refused to pass it' — its defeat came from Democrats who valued judicial independence over FDR's agenda."}, {"text": "The Supreme Court immediately struck down the plan as an unconstitutional interference with the separation of powers", "isCorrect": false, "rationale": "The source notes the plan was 'constitutionally legal' — the Court did not strike it down; it failed in Congress."}, {"text": "Roosevelt abandoned the plan voluntarily after negotiating a compromise with the Supreme Court to uphold future New Deal legislation", "isCorrect": false, "rationale": "The source describes the plan's failure as a political defeat, not a voluntary withdrawal after negotiation; Justice Roberts's 'switch in time' occurred around the same time but was not a negotiated outcome of the court-packing fight."}]}, {"question": "The 'switch in time that saved nine' refers to Justice Owen Roberts's shift in vote to uphold New Deal programs after the court-packing fight. This sequence of events most directly illustrates", "options": [{"text": "The court-packing plan was ultimately successful in changing the Supreme Court's constitutional jurisprudence", "isCorrect": false, "rationale": "The court-packing plan failed to pass Congress; the change in constitutional direction occurred through Roberts's vote shift, not through the addition of new justices — making the plan a political defeat that nonetheless achieved its policy goal."}, {"text": "The court-packing fight ended as FDR's greatest political defeat — but the Supreme Court reversed its New Deal opposition without a single new appointment, demonstrating that the threat of court-packing can accomplish what the act could not", "isCorrect": true, "rationale": "The source explicitly states: 'The Court-packing fight was Roosevelt's most significant political defeat — but by the end of 1937, the Supreme Court had reversed its opposition to the New Deal without a single new appointment' — the threat achieved what the act could not."}, {"text": "Justice Roberts's shift was entirely unconnected to the court-packing fight and reflected purely legal reasoning about the Commerce Clause", "isCorrect": false, "rationale": "While historians debate the exact causation, the source presents 'the switch in time that saved nine' as the dramatic consequence of the court-packing fight — the contemporaneous labeling suggests the connection was widely understood at the time."}, {"text": "The court-packing fight demonstrated that the president had unlimited power to alter the composition of the federal judiciary", "isCorrect": false, "rationale": "Congress refused to pass the court-packing plan, demonstrating the opposite: that legislative and public norms constrain presidential attempts to reshape the judiciary even when they are constitutionally permissible."}]}, {"question": "The Dust Bowl was produced by which combination of factors?", "options": [{"text": "Deliberate federal water policy that diverted irrigation sources from the Great Plains to California", "isCorrect": false, "rationale": "The source identifies drought and ecological destruction from overcultivation as the Dust Bowl's causes; deliberate federal water diversion policy is not mentioned."}, {"text": "Drought compounded by decades of overcultivation that had stripped the Great Plains topsoil of the vegetation needed to hold it in place", "isCorrect": true, "rationale": "The source explicitly identifies the Dust Bowl as the result of 'drought and the ecological destruction wrought by decades of overcultivation' — a combination of natural and human-caused environmental destruction."}, {"text": "Industrial pollution from oil and gas development that poisoned Great Plains agricultural soil", "isCorrect": false, "rationale": "The source identifies drought and overcultivation as the causes; industrial pollution from oil and gas is not among the factors described."}, {"text": "The collapse of commodity prices that forced farmers to abandon the land, leading to natural desertification", "isCorrect": false, "rationale": "Farm commodity prices had indeed been depressed since 1921, but the Dust Bowl was a distinct environmental catastrophe caused by drought and overcultivation, not by farm abandonment."}]}, {"question": "The Wagner Act (National Labor Relations Act, 1935) most directly differed from earlier Progressive Era labor legislation in that it", "options": [{"text": "Set maximum working hours and minimum wages, providing the first federal wage floor", "isCorrect": false, "rationale": "The Fair Labor Standards Act (1938) set the minimum wage and maximum workweek — not the Wagner Act, which addressed labor relations and collective bargaining rights."}, {"text": "Guaranteed workers the right to organize into unions and bargain collectively, and created the National Labor Relations Board to enforce those rights — a positive federal right to organize rather than merely a prohibition on employer interference", "isCorrect": true, "rationale": "The Wagner Act affirmatively guaranteed the right to organize and created the NLRB as an enforcement mechanism — going beyond prior legislation that merely prohibited some employer interference to create a positive federal protection for collective action."}, {"text": "Prohibited labor strikes in essential industries during national emergencies", "isCorrect": false, "rationale": "The Wagner Act protected workers' right to organize; it did not prohibit strikes. Emergency strike restrictions were addressed by later legislation (Taft-Hartley Act of 1947)."}, {"text": "Applied federal labor standards to agricultural and domestic workers for the first time", "isCorrect": false, "rationale": "The Wagner Act, like Social Security, excluded agricultural and domestic workers — the Fair Labor Standards Act (1938) also excluded them from minimum wage protections. Neither the Wagner Act nor FLSA applied to those categories."}]}, {"question": "Which New Deal program most directly transformed the federal government's relationship to rural electrification?", "options": [{"text": "The Agricultural Adjustment Act — by paying farmers to reduce production, it freed capital for infrastructure investment", "isCorrect": false, "rationale": "The AAA addressed agricultural price supports, not rural electrification; the connection to infrastructure investment is not described in the source."}, {"text": "The Tennessee Valley Authority — which built dams and hydroelectric plants across seven Southern states, bringing electricity to rural areas that private utilities had deemed unprofitable", "isCorrect": true, "rationale": "The source explicitly describes the TVA as building 'dams and hydroelectric plants across seven Southern states, bringing electricity to rural areas that private utilities had deemed unprofitable' — making it the New Deal's direct rural electrification instrument."}, {"text": "The Reconstruction Finance Corporation — which provided loans to utility companies to build rural power lines", "isCorrect": false, "rationale": "The RFC provided emergency loans to banks and railroads under Hoover; it was not a rural electrification program."}, {"text": "The Works Progress Administration — whose arts and cultural projects included documentary films about rural life that built public support for electrification", "isCorrect": false, "rationale": "The WPA did produce cultural projects including documentary work, but rural electrification was the TVA's specific achievement, not the WPA's."}]}, {"question": "The New Deal's most lasting transformation of the federal government's domestic role is BEST described as", "options": [{"text": "Transforming the federal government from a primarily regulatory and promotional entity into an insurer, employer, labor-relations arbiter, wage-setter, and direct service provider", "isCorrect": true, "rationale": "The source explicitly lists this transformation: 'the federal government was an insurer (FDIC, Social Security), an employer (WPA, CCC), a labor-relations arbiter (NLRB), a wage-setter (FLSA), and a direct provider of electricity (TVA)' — fundamentally changing the citizen's relationship to the federal government."}, {"text": "Replacing the market economy with a government-planned economy modeled on the Soviet Union's five-year plans", "isCorrect": false, "rationale": "The New Deal operated within the capitalist framework; the source describes an expanded federal role within the market economy, not replacement of it."}, {"text": "Creating a permanent full-employment economy that eliminated the business cycle", "isCorrect": false, "rationale": "The source notes the New Deal reduced unemployment from 25% to 20% — not to full employment. Full employment was achieved only by WWII mobilization."}, {"text": "Returning power to state governments by creating block grants that let states design their own relief programs", "isCorrect": false, "rationale": "The New Deal expanded federal power; many programs (Social Security, Wagner Act, FDIC) established federal standards and federal administration. Block grants to states characterize a different political tradition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
