<script>
var QUESTIONS = [{"question": "John L. O'Sullivan wrote in 1845 of 'our manifest destiny to overspread the continent allotted by Providence for the free development of our yearly multiplying millions.' The source describes Manifest Destiny as 'a doctrine of empire dressed in the language of liberty.' Which of the following BEST explains this characterization?", "options": [{"text": "Manifest Destiny was imperialism because it led to U.S. military conquests in Asia and Africa, not just North America.", "isCorrect": false, "rationale": "Manifest Destiny in this period specifically concerned North American continental expansion — the Louisiana Purchase through the Mexican-American War (1846–48). Expansion into Asia and Africa was a later development (Spanish-American War 1898 and beyond). The 'empire dressed in liberty' argument concerns the domestic content of the ideology, not its later geographic extension."}, {"text": "The doctrine combined claims of divine ordination, American republican mission, and racial hierarchy to assert that expansion was both inevitable and righteous — framing the dispossession of indigenous peoples, Mexicans, and others as providential destiny rather than conquest.", "isCorrect": true, "rationale": "The source identifies the three components: 'territorial expansion was providentially ordained; the United States had a unique mission to spread republican liberty; and the continent's other inhabitants — indigenous nations, Mexicans, Europeans — had no legitimate claim to obstruct this mission.' The 'liberty' language masked what was, from the perspective of those displaced, straightforward conquest. 'A doctrine of empire dressed in the language of liberty' captures this precisely."}, {"text": "The doctrine was imperialism because it was championed primarily by Southern slaveholders who wanted to expand slavery into new territories, using liberty rhetoric to disguise their economic motives.", "isCorrect": false, "rationale": "While Southern slaveholders did support territorial expansion to extend slavery, Manifest Destiny had broader support — it was championed by Democrats including Northern Democrats. The 'empire dressed in liberty' characterization refers to the ideology's structural logic (dispossession framed as destiny), not exclusively to slaveholder economic motives."}, {"text": "The doctrine was imperialist because O'Sullivan explicitly advocated for a formal American colonial government over the territories acquired, modeled on the British colonial system.", "isCorrect": false, "rationale": "Manifest Destiny did not advocate for colonial government modeled on Britain — it advocated for incorporation of territories into the United States as eventual states, which was its own form of conquest distinct from colonial administration."}], "id": "q01"}, {"question": "The Monroe Doctrine (1823) was 'initially more rhetorical than operational.' Which of the following BEST explains why it was enforced by Britain rather than the United States?", "options": [{"text": "The Monroe Doctrine was a joint Anglo-American declaration that both nations had committed to enforcing together through a formal alliance.", "isCorrect": false, "rationale": "The source explicitly describes a unilateral American declaration, not a joint declaration. British Foreign Secretary Canning had proposed a joint declaration, but the Americans 'had issued a unilateral declaration that Britain's navy would actually enforce' — the British enforced it without any formal commitment to do so."}, {"text": "The United States lacked the naval power to enforce a hemispheric doctrine in 1823; Britain possessed the world's dominant navy and had its own strategic interest in preventing European powers from restoring Spanish colonial authority over Latin American trade partners.", "isCorrect": true, "rationale": "The source states: 'The doctrine was, at the time, enforced not by American power (which was modest) but by the British navy (which was not).' Britain's interest was strategic and commercial — Latin American independence opened trade that Spanish colonial monopolies had blocked. Canning was 'privately amused' by the American unilateral declaration that Britain would actually enforce. This illustrates the gap between American ideological assertion and American actual power."}, {"text": "Congress refused to fund the navy to enforce the Monroe Doctrine, leaving the executive branch without operational capability to back its stated policy.", "isCorrect": false, "rationale": "The source does not attribute Monroe's operational weakness to congressional funding refusal. The United States simply lacked the naval capacity to project hemispheric power in 1823, regardless of appropriations. It was a structural limitation of American power, not a domestic political failure."}, {"text": "The Monroe Doctrine was specifically designed as a British commitment — Adams and Monroe wrote it knowing that Britain would enforce it in exchange for American support of British trade interests in Latin America.", "isCorrect": false, "rationale": "The source does not describe a formal exchange or design agreement with Britain. Adams and Monroe issued a unilateral declaration; Britain chose to enforce it because British interests aligned — the source presents this as practical coincidence, not a designed arrangement."}], "id": "q02"}, {"question": "Read the following excerpt from the Monroe Doctrine: 'The American continents, by the free and independent condition which they have assumed and maintained, are henceforth not to be considered as subjects for future colonization by any European powers.' Secretary of State Adams was the doctrine's primary author; Monroe delivered it. Based on this passage and its context, which of the following BEST describes the doctrine's audience and purpose?", "options": [{"text": "The audience was Congress, and the purpose was to obtain funding for a military buildup that would enable the United States to enforce its claims against European powers.", "isCorrect": false, "rationale": "Monroe addressed Congress, but the source describes his purpose as diplomatic deterrence, not a military funding request. The doctrine was 'initially more rhetorical than operational' — it was a statement of principles intended to deter European intervention, not a program for military expansion."}, {"text": "The primary audience was European governments (especially the Holy Alliance and Russia), and the purpose was diplomatic deterrence — asserting American hemispheric primacy and warning that European intervention would be treated as a threat to U.S. interests.", "isCorrect": true, "rationale": "The source describes the Monroe Doctrine's immediate context as fears of Holy Alliance intervention to restore Spanish authority in Latin America, and Russia's expansion down the Pacific coast. The doctrine's 'key assertions' were directed at European powers: the hemisphere was closed to future colonization, and European political-system extension would be treated as dangerous to U.S. peace and safety. Monroe addressed Congress, but the message was for European governments."}, {"text": "The audience was Latin American republics, and the purpose was to secure their agreement to allow the United States to act as their military protector in exchange for commercial access to their markets.", "isCorrect": false, "rationale": "While Latin American republics were arguably addressed by the doctrine, the source emphasizes that they 'had not been consulted' — the doctrine claimed a protectorate relationship without their agreement. The primary audience was European governments; the purpose was deterrence, not a commercial bargain with Latin American nations."}, {"text": "The audience was the American electorate, and the purpose was to boost Monroe's popularity ahead of a difficult re-election campaign by demonstrating presidential leadership on foreign policy.", "isCorrect": false, "rationale": "Monroe's foreign policy speech came after his near-unanimous re-election in 1820 — he faced no difficult electoral campaign in 1823. The doctrine's purpose was diplomatic, not electoral."}], "id": "q03"}, {"question": "Frederick Douglass delivered his Fourth of July speech on July 5, 1852 — the day after Independence Day. Which of the following BEST explains why this timing was a 'deliberate choice'?", "options": [{"text": "Douglass chose July 5 because July 4 events were fully booked by white organizations that would not allow a Black speaker to share the platform.", "isCorrect": false, "rationale": "The source presents the July 5 date as a deliberate rhetorical choice, not a logistical constraint. The choice was meaningful: by speaking the day after the celebration, Douglass positioned himself as an outsider looking at the republic's founding celebration from a perspective of exclusion."}, {"text": "Douglass spoke on July 5 to signal that Independence Day's celebration of liberty was not his day — that the Fourth of July, from an enslaved person's perspective, revealed the gross injustice of a republic that celebrated freedom while holding four million in bondage, making the contrast between the celebration and the reality more visible, not less.", "isCorrect": true, "rationale": "The source states this explicitly: Douglass 'addressed the Rochester Ladies' Anti-Slavery Society in a speech... His speech was not a comfort to them.' He argued: 'What, to the American slave, is your 4th of July? I answer: a day that reveals to him, more than all other days in the year, the gross injustice and cruelty to which he is the constant victim.' The July 5 choice positioned him as outside the celebration, observing its hypocrisy from the perspective of the excluded."}, {"text": "Douglass chose July 5 because the Rochester Ladies' Anti-Slavery Society always met on the second day of the month, making it the organization's regular meeting day.", "isCorrect": false, "rationale": "The source presents the July 5 choice as deliberately meaningful — 'a deliberate choice' — not as a consequence of organizational scheduling. The source's explicit language ('a deliberate choice') forecloses an accidental or scheduling explanation."}, {"text": "Douglass chose July 5 to avoid competing with official government celebrations of Independence Day, which he supported and did not want to disrupt.", "isCorrect": false, "rationale": "The source makes clear that Douglass's speech was a challenge to official celebrations, not a gesture of support. His point was precisely that the official celebration was a 'mockery' from the perspective of the enslaved — he was not trying to avoid disrupting it but to expose its hypocrisy."}], "id": "q04"}, {"question": "The Monroe Doctrine 'said nothing about the rights of the hemisphere's indigenous peoples, enslaved Black Americans, or the Latin American republics themselves.' Douglass's Fourth of July speech 'broke those silences explicitly.' Which of the following BEST describes the connection between these two documents the source draws?", "options": [{"text": "Both documents were produced by the same political administration, suggesting that Monroe and Douglass were collaborating on a comprehensive statement of American foreign and domestic policy.", "isCorrect": false, "rationale": "Monroe's doctrine was issued in 1823, Douglass's speech in 1852, by entirely different people in entirely different contexts. They were not collaborators; the source uses them as contrasting case studies."}, {"text": "The Monroe Doctrine and Douglass's speech both invoked American liberty, but to opposite ends: Monroe used liberty rhetoric to assert American hemispheric power while maintaining silence about domestic slavery, while Douglass used the same rhetoric to expose the hypocrisy of a slave republic claiming to be liberty's guardian.", "isCorrect": true, "rationale": "The source draws this comparison explicitly: 'Both use the language of American liberty — but to entirely different ends.' Monroe claimed the U.S. was 'liberty's guardian in the hemisphere.' Douglass argued the U.S. was 'liberty's betrayer domestically.' Monroe's silences (about indigenous peoples, enslaved Americans, Latin American republics) are what Douglass's speech explicitly broke, demanding that Americans apply their professed principles to those they had excluded."}, {"text": "Both documents were primarily concerned with foreign policy — Monroe addressing European intervention, Douglass addressing British antislavery pressure — making them complementary statements of American international interests.", "isCorrect": false, "rationale": "Douglass's speech was not primarily a foreign policy statement responding to British antislavery pressure. It was a domestic moral indictment of American slavery addressed to a Northern white antislavery audience. The connection the source draws is about how both documents used the language of American liberty for different purposes, not about both addressing foreign policy."}, {"text": "Both documents argued that the United States needed to solve its domestic slavery problem before it could credibly claim a leadership role in hemispheric affairs — making them both calls for domestic reform as a prerequisite for foreign policy credibility.", "isCorrect": false, "rationale": "Monroe did not argue that slavery needed to be resolved before the U.S. could claim hemispheric leadership — the doctrine was issued by a slaveholding president and maintained that contradiction without acknowledging it. Douglass exposed the hypocrisy, but Monroe did not share his analysis."}], "id": "q05"}, {"question": "Douglass's rhetorical strategy in the Fourth of July speech 'was to use the republic's own principles against it.' Which of the following BEST explains this strategy and why it was effective?", "options": [{"text": "Douglass rejected the Declaration of Independence's principles as false and argued that the republic's founding was illegitimate, thereby denying it any moral authority to claim liberty.", "isCorrect": false, "rationale": "The source presents precisely the opposite strategy: 'He did not argue that the Declaration's ideals were false; he argued that the republic's practice made a lie of them.' Douglass accepted the founding principles as genuine moral truths and used them against the republic's practice, not against the principles themselves."}, {"text": "Douglass began by praising the founders and the Declaration's genuine principles of human equality and natural rights, then turned to argue that the republic's practice — four million enslaved, human beings sold in the shadow of the Capitol, the Fugitive Slave Act requiring Northern complicity — made a lie of those principles, making the hypocrisy inescapable.", "isCorrect": true, "rationale": "The source describes this structure precisely: Douglass 'began by accepting the greatness of the founding generation' and the Declaration's genuine moral truths, then 'he turned.' The strategy was to accept the premises of his audience's founding mythology and demonstrate that accepting those premises required condemning slavery — you cannot celebrate July 4 and defend slavery using the same values. 'He did not come to bury the founding; he came to use it.'"}, {"text": "Douglass argued that the Constitution's anti-slavery provisions (the Necessary and Proper Clause and the Fifth Amendment's due process requirement) legally required the immediate emancipation of all enslaved people without further legislation.", "isCorrect": false, "rationale": "This constitutional antislavery argument was part of Douglass's later break with Garrison, but the Fourth of July speech is described as a moral indictment, not primarily a constitutional legal argument. The source presents the speech as using the Declaration's natural rights philosophy, not constitutional law."}, {"text": "Douglass's effectiveness came from his refusal to praise the founders — by condemning them as hypocrites from the beginning, he denied his audience the comfort of separating founding principles from slaveholding practice.", "isCorrect": false, "rationale": "The source describes Douglass as beginning by praising the founders as 'genuinely great men' — the opposite of condemning them from the start. His effectiveness came precisely from honoring the founders' principles and then demonstrating that those principles required condemning the practice."}], "id": "q06"}, {"question": "The Monroe Doctrine was 'initially enforced by the British navy' and 'largely ignored by European powers when they chose to intervene.' Yet the source describes its 'ideological significance as immediate and lasting.' Which of the following BEST explains this apparent contradiction?", "options": [{"text": "There is no contradiction: a doctrine's ideological significance depends on whether it accurately describes reality, and the Monroe Doctrine accurately described British enforcement, making it operationally valid.", "isCorrect": false, "rationale": "This misreads the contradiction. The source identifies the gap between operational weakness (European powers ignored the doctrine when they chose to) and ideological significance (it defined America as the hemisphere's guarantor for a century). The ideological significance was independent of its operational enforcement record."}, {"text": "The Monroe Doctrine's ideological significance was independent of its immediate operational power: by asserting American primacy in the hemisphere, defining Europe as the adversary, and claiming a protectorate relationship with Latin American republics, it established a framework that shaped American foreign policy for a century even when U.S. power was insufficient to enforce it.", "isCorrect": true, "rationale": "The source states: 'as a statement of ideology — America as the hemisphere's guarantor and the Old World as the hemisphere's enemy — it would shape American foreign policy for a century.' The doctrine's lasting significance was its ideological framework, not its 1823 enforcement record. A doctrine can define the terms of future policy without being immediately operationally effective."}, {"text": "The Monroe Doctrine gained its lasting significance because European powers immediately respected it, establishing a precedent of American hemispheric authority that later presidents could invoke.", "isCorrect": false, "rationale": "The source explicitly notes the doctrine 'was largely ignored by European powers when they chose to intervene.' Its significance was not based on immediate European compliance but on its role as an American ideological statement that future presidents could invoke to justify hemispheric intervention."}, {"text": "The Monroe Doctrine's significance came entirely from its domestic political effects — it unified American public opinion behind Monroe's presidency and established his legacy as a defender of republican values.", "isCorrect": false, "rationale": "The source does not present the Monroe Doctrine's significance as primarily domestic political legacy-building. Its lasting significance was as a foreign policy framework that 'would shape American foreign policy for a century' — an international ideological claim, not primarily a domestic political achievement."}], "id": "q07"}, {"question": "The source argues that 'the gap between principle and practice was not an oversight or a temporary delay. It was a choice.' Which of the following BEST illustrates this argument across the period 1800–1848?", "options": [{"text": "The gap between principle and practice reflects the founders' failure to anticipate the moral implications of slavery, which future generations recognized and eventually corrected through the Civil War.", "isCorrect": false, "rationale": "The source specifically rejects the 'oversight or temporary delay' interpretation, arguing instead that the gap was 'a choice.' Jefferson recognized the implications — he described the Missouri debate as 'a fire bell in the night,' demonstrating awareness of the contradiction. Subsequent actors who maintained slavery did so with knowledge of the contradiction."}, {"text": "Each major development of the period simultaneously proclaimed liberty and enforced exclusion: the Louisiana Purchase opened a continent for white settlers while dispossessing indigenous peoples; the market revolution created prosperity built on enslaved labor; Jacksonian democracy expanded white male suffrage while expelling indigenous nations; and the Monroe Doctrine claimed liberty's guardianship for a republic that enslaved one in seven of its people.", "isCorrect": true, "rationale": "The source's 'Key Concept — The Gap Between Principle and Practice' makes exactly this argument: 'Each development simultaneously proclaimed liberty and enforced exclusion.' It lists the Louisiana Purchase, the market revolution, Jacksonian democracy, and the Monroe Doctrine as successive examples of the same pattern. The gap was structural, not accidental."}, {"text": "The gap between principle and practice was primarily a Southern phenomenon — Northern states were genuinely committed to the principles of human equality and only the South's political power prevented their full implementation.", "isCorrect": false, "rationale": "The source does not locate the gap exclusively in the South. Horace Mann's segregated common schools, the gag rule supported by Northern politicians to avoid the slavery question, and the Fugitive Slave Act requiring Northern participation in slave recapture all demonstrate that the North participated in the gap between principle and practice."}, {"text": "The gap between principle and practice was closed by the Seneca Falls Declaration (1848), which updated the republic's founding principles to include women and people of color, beginning the process of full democratic inclusion.", "isCorrect": false, "rationale": "The Seneca Falls Declaration identified the gap — it did not close it. The source's argument is that the gap 'was a choice' that required the Civil War and beyond to begin closing. The Declaration was a demand, not a resolution."}], "id": "q08"}, {"question": "A student writes: 'The Monroe Doctrine was a sign of American weakness in 1823 — since the U.S. couldn't enforce it, it had no real significance.' A historian would most likely revise this claim by noting that:", "options": [{"text": "The student is wrong: the U.S. Navy was the dominant force in the Western Hemisphere by 1823, and the Monroe Doctrine was backed by immediate American military power.", "isCorrect": false, "rationale": "The source explicitly states that American power was 'modest' in 1823 and that enforcement depended on the British navy. The student's factual premise about American military weakness is correct; the conclusion that this meant 'no real significance' is what a historian would challenge."}, {"text": "Operational weakness and ideological significance are separate dimensions: a doctrine can define the terms of future policy, shape how subsequent presidents frame hemispheric relations, and establish an ideological framework invoked for a century — regardless of whether 1823 U.S. military power could enforce it.", "isCorrect": true, "rationale": "This captures the source's argument: Monroe's doctrine was 'initially more rhetorical than operational' but 'as a statement of ideology... would shape American foreign policy for a century.' The student's error is treating military enforceability as the only measure of a doctrine's significance. The framework it established for thinking about hemispheric relations was itself historically consequential."}, {"text": "The student is technically correct about 1823, but wrong to extend this to the doctrine's entire significance, since the U.S. Navy grew powerful enough to enforce the doctrine by 1830.", "isCorrect": false, "rationale": "The source does not describe the U.S. Navy becoming capable of hemispheric enforcement by 1830. American enforcement capacity developed much more gradually. The doctrine's significance preceded American enforcement capacity by decades."}, {"text": "The Monroe Doctrine gained significance when European powers formally agreed to it through a series of treaties in the 1820s and 1830s, converting rhetoric into binding international law.", "isCorrect": false, "rationale": "No such treaties occurred. European powers 'largely ignored' the doctrine 'when they chose to intervene.' The doctrine was never formalized into binding international law; its significance was ideological, not legally codified."}], "id": "q09"}, {"question": "The source pairs the Monroe Doctrine and Douglass's Fourth of July speech as documents that 'define the central moral tension of the period.' Which of the following BEST explains why the source presents them together?", "options": [{"text": "Both documents were issued in the same year (1823) and addressed the same audience, making them complementary texts that together define early 19th-century American ideology.", "isCorrect": false, "rationale": "The Monroe Doctrine was issued in 1823; Douglass's speech in 1852 — 29 years apart, by entirely different people to different audiences. The source pairs them not because of chronological proximity but because of thematic contrast."}, {"text": "Monroe's doctrine and Douglass's speech both use the language of American liberty but deploy it in opposite directions — Monroe to assert power outward, Douglass to expose hypocrisy inward — making them two faces of the same ideological contradiction: America simultaneously claiming to champion liberty and practicing slavery.", "isCorrect": true, "rationale": "The source explicitly frames the pairing this way: 'This section examines two documents that illuminate the gap between the republic's expansionist ideology and its internal practice.' Monroe claimed liberty's guardianship for the hemisphere; Douglass exposed liberty's betrayal within the republic. Read together, 'they define the central moral tension of the period.'"}, {"text": "Both Monroe and Douglass were arguing against European interference in American affairs — Monroe against political intervention, Douglass against British antislavery pressure on Southern slaveholders.", "isCorrect": false, "rationale": "Douglass was not primarily arguing against European interference. His speech was directed at American hypocrisy — at Northern white audiences who celebrated liberty while tolerating slavery. The pairing is not about opposing European interference but about the gap between American rhetoric and American practice."}, {"text": "Both documents were products of the same intellectual tradition — classical republicanism — and together illustrate how republican theory was applied to foreign policy and domestic reform in the early republic.", "isCorrect": false, "rationale": "While both drew on republican and natural rights traditions, the source does not pair them as complementary applications of classical republicanism. The pairing is specifically about the gap between principle (liberty's language) and practice (slavery's reality) — a contradiction, not a complementarity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
