    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; From Indenture to Chattel Slavery</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Virginia statute of 1662 reversed English common law by declaring that a child's legal status followed the status of the mother rather than the father. Which of the following best explains why this change was economically transformative for slaveholders?", "options": [{"text": "It allowed slaveholders to separate mothers from children on the auction block, maximizing the sale value of each individual.", "isCorrect": false, "rationale": "While family separation was a brutal consequence of chattel slavery, the 1662 statute's economic significance was specifically that enslaved women's children were automatically enslaved — expanding the labor supply through reproduction rather than importation."}, {"text": "It meant that enslaved women's children were automatically enslaved regardless of paternity, making sexual violence against enslaved women economically profitable for slaveholders.", "isCorrect": true, "rationale": "The source explicitly states that after 1662, 'masters who sexually assaulted enslaved women now also produced more enslaved laborers' — the statute transformed reproductive exploitation into a mechanism of capital accumulation, and meant that any child born to an enslaved mother was enslaved regardless of who the father was."}, {"text": "It allowed free Black men to have their children's freedom recognized if they paid a fee to the colonial government.", "isCorrect": false, "rationale": "The 1662 statute moved in the opposite direction — it eliminated pathways to freedom, not created new ones. Free Black Virginians faced increasing restrictions in subsequent decades."}, {"text": "It required that enslaved people working as skilled artisans be compensated at half the rate of white craftsmen, generating revenue for the colonial treasury.", "isCorrect": false, "rationale": "No such compensation provision existed; enslaved people were defined as property, not wage-earners, and the statute concerned the hereditary transmission of enslaved status, not labor compensation."}]}, {"question": "Read the following passage from Olaudah Equiano's 1789 memoir describing the Middle Passage: he described 'the suffocating stench of the packed lower decks, the chained bodies pressed together without room to turn, the screaming of those dying of disease, and the despair that drove some captives to attempt suicide rather than endure the crossing.' What was the PRIMARY political context in which Equiano published this account?", "options": [{"text": "The American Constitutional Convention (1787), which was debating whether to allow the slave trade to continue for twenty more years", "isCorrect": false, "rationale": "Equiano's memoir was published in 1789 in Britain, not in America; it targeted the British debate over abolition of the slave trade, not the American Constitutional Convention."}, {"text": "The British parliamentary debate over abolition of the slave trade, where Equiano's memoir was intended to place human suffering before a public that had abstracted it into commodity statistics", "isCorrect": true, "rationale": "The source explicitly states Equiano's account 'was also a political instrument: published in the year Britain was debating the abolition of the slave trade, it placed the human cost of the Middle Passage before a reading public that had previously abstracted it into commodity statistics.'"}, {"text": "The Virginia legislature's consideration of whether to expand or restrict the slave codes in the post-Revolutionary period", "isCorrect": false, "rationale": "Equiano was writing in Britain about the British slave trade; his memoir targeted British parliamentary opinion, not Virginia state legislative debates."}, {"text": "The French Revolution's Declaration of the Rights of Man, which Equiano hoped would inspire British abolitionists by analogy", "isCorrect": false, "rationale": "While the French Revolution occurred in 1789, the source grounds Equiano's purpose in the specific British parliamentary debate over slave trade abolition, not in Continental revolutionary politics."}]}, {"question": "The source argues that 'race-based chattel slavery was not a natural extension of pre-existing racial prejudice. It was built, statute by statute, over the last half of the seventeenth century.' Which of the following developments best supports this argument?", "options": [{"text": "The continuous presence of enslaved Africans in Virginia from 1619 onward demonstrates a consistent and unchanging racial hierarchy.", "isCorrect": false, "rationale": "The presence of Africans from 1619 onward is acknowledged, but the source specifically notes that their status was 'genuinely ambiguous' in the early decades — proving that presence does not equal systematic race-based slavery."}, {"text": "Anthony Johnson's ability to gain freedom, acquire land, and hold servants in the 1630s–40s demonstrates that racial slavery was not predetermined but was subsequently constructed through deliberate legislative choices.", "isCorrect": true, "rationale": "Johnson's case is the source's key evidence that early Virginia had not yet fully racialized servitude — his trajectory was possible then, and would be made impossible by the cascade of slave codes from 1662 to 1705 that deliberately constructed race as a legal category."}, {"text": "The Virginia Company's original charter specified that Africans could only serve as enslaved workers, establishing racial hierarchy from the colony's founding.", "isCorrect": false, "rationale": "No such provision existed in the Virginia Company's charter; the source explicitly describes the early decades as characterized by genuine legal ambiguity about African status."}, {"text": "The importation of enslaved Africans directly from West Africa increased dramatically after 1619, indicating that planters always preferred African labor.", "isCorrect": false, "rationale": "Virginia's African population was fewer than 300 in 1650, decades after 1619 — suggesting that large-scale African importation came after the legal construction of chattel slavery, not before it."}]}, {"question": "Carolina planters in the late seventeenth century 'actively sought enslaved Africans from rice-growing regions of West Africa—precisely because those workers possessed technical knowledge of rice cultivation that English planters lacked.' This fact most directly challenges which common assumption about the Atlantic slave trade?", "options": [{"text": "That enslaved Africans were treated as interchangeable units of labor with no relevant skills or knowledge", "isCorrect": true, "rationale": "The source's description of Carolina planters specifically seeking enslaved workers from rice-growing regions because of their technical expertise directly contradicts the assumption that the slave trade treated Africans as undifferentiated labor. African technical knowledge was the foundation of the Carolina economy, not an incidental feature."}, {"text": "That the Atlantic slave trade was profitable for English merchants", "isCorrect": false, "rationale": "The profitability of the slave trade for English merchants is not being challenged here; the challenge is to assumptions about the nature of enslaved Africans' contribution — as skilled, knowledgeable workers, not just physical labor."}, {"text": "That the Navigation Acts restricted colonial trade with Spanish America", "isCorrect": false, "rationale": "The Navigation Acts regulated colonial commerce broadly; this fact about Carolina rice cultivation has nothing to do with trade restrictions on Spanish American commerce."}, {"text": "That the Middle Passage mortality rate was approximately 15 percent in the eighteenth century", "isCorrect": false, "rationale": "The mortality statistics are separate factual claims about the Middle Passage; this question is about the assumption that enslaved Africans were interchangeable laborers without relevant expertise."}]}, {"question": "The Virginia Slave Code of 1705 consolidated earlier enactments into a comprehensive legal framework. Which of the following was NOT among its provisions, according to the source?", "options": [{"text": "Definition of enslaved Africans and their descendants as property", "isCorrect": false, "rationale": "The 1705 code did define enslaved people as property — this was one of its central provisions. This option is therefore not the exception."}, {"text": "Prohibition of literacy and assembly among enslaved people", "isCorrect": false, "rationale": "The source lists prohibition of literacy and assembly among the provisions of the slave codes, so this is not an exception to the 1705 code's reach."}, {"text": "A guarantee that enslaved people who converted to Christianity would receive their freedom within one year", "isCorrect": true, "rationale": "The opposite was true: the 1667 Virginia statute explicitly declared that Christian baptism did NOT confer freedom — eliminating a religious loophole. The 1705 code reinforced this. No manumission guarantee for converts existed."}, {"text": "Authorization of brutal physical punishments, including dismemberment, for resistance or flight", "isCorrect": false, "rationale": "The source explicitly states that the 1705 code 'authorized brutal physical punishments—including dismemberment—for resistance or flight,' so this was indeed a provision."}]}, {"question": "The Stono Rebellion of 1739 in South Carolina 'confirmed [planter] anxieties and triggered even more repressive legislation.' Which of the following best contextualizes the significance of this rebellion within the broader pattern of colonial slavery?", "options": [{"text": "It proved that enslaved people in the colonies were inherently resistant to slavery, requiring stronger coercion from the beginning.", "isCorrect": false, "rationale": "This framing is ahistorical and perpetuates the very assumptions the source challenges; the Stono Rebellion reflected specific conditions in South Carolina (Black majority, proximity to Spanish Florida) rather than an inherent quality of enslaved people as a group."}, {"text": "It demonstrated that enslaved people were active agents who resisted their bondage, and that the increasingly repressive legal response reflected white minority anxiety in a colony with a Black majority.", "isCorrect": true, "rationale": "The source notes South Carolina had a Black majority and that its slave codes 'reflected planter anxiety about a system of control stretched over an outnumbered white minority.' The Stono rebels' march toward Spanish Florida for freedom reveals the contingent, contested nature of the slave system."}, {"text": "It forced the Carolina assembly to offer gradual emancipation as a compromise to prevent further rebellion.", "isCorrect": false, "rationale": "The opposite occurred: the rebellion triggered more repressive legislation, not liberalization. The Carolina economy's dependence on enslaved labor only deepened after Stono."}, {"text": "It convinced English abolitionists that the slave trade must be ended before further rebellions destabilized the empire.", "isCorrect": false, "rationale": "British abolitionism did not take organized legislative form until the 1780s–1790s, decades after Stono; the rebellion did not produce metropolitan abolitionist response at the time."}]}, {"question": "Virginia's 1667 statute declaring that Christian baptism did not confer freedom was significant primarily because it:", "options": [{"text": "Required all slaveholders to provide religious instruction to enslaved people as a condition of ownership", "isCorrect": false, "rationale": "The statute eliminated a pathway to freedom through conversion; it did not mandate religious education. Subsequent codes actually restricted enslaved people's assembly, including for religious purposes."}, {"text": "Closed a legal loophole by which some enslaved people had petitioned for freedom on religious grounds, tightening the legal architecture of permanent bondage", "isCorrect": true, "rationale": "The source states that the 1667 statute eliminated 'the religious loophole some enslaved people had used to petition for release.' This was one step in the escalating legislative construction of race-based chattel slavery — closing paths to freedom available under earlier, more ambiguous law."}, {"text": "Established for the first time that enslaved people had no legal standing in Virginia courts", "isCorrect": false, "rationale": "The prohibition on enslaved people testifying in court was part of the 1705 code, not the 1667 statute; the 1667 provision specifically addressed the baptism-and-freedom argument."}, {"text": "Prompted mass conversion of enslaved people to Islam, since Christian baptism no longer offered legal benefits", "isCorrect": false, "rationale": "The source does not describe such a response; the statute closed a legal loophole, not a religious pathway to cultural change of this kind."}]}, {"question": "Consider the following scenario: An enslaved woman named Sarah is sexually assaulted by her master in Virginia in 1675. She gives birth to a son. Under the legal framework established by the 1662 statute, which of the following describes the child's legal status?", "options": [{"text": "The child would follow the father's status and be considered free, since the father was a free white man", "isCorrect": false, "rationale": "The 1662 statute reversed exactly this English common-law principle; status now followed the mother, not the father. A child born to an enslaved mother was enslaved regardless of the father's status."}, {"text": "The child would be enslaved, following the mother's status, making the assault also an act of capital accumulation for the master", "isCorrect": true, "rationale": "The source states explicitly that the 1662 law meant 'enslaved women's children were automatically enslaved, that any child born of a white father and an enslaved mother was still enslaved' — and that 'masters who sexually assaulted enslaved women now also produced more enslaved laborers.'"}, {"text": "The child's status would remain ambiguous until the master declared his intentions before the county court", "isCorrect": false, "rationale": "The 1662 statute was designed specifically to eliminate the earlier ambiguity; the child's enslaved status was automatic from birth, following the mother, with no need for a court declaration."}, {"text": "The child would be free but indentured to the master for twenty-one years under the terms of the colonial labor code", "isCorrect": false, "rationale": "No such compromise provision existed; the statute was clear — the child was enslaved. The source notes this was a deliberate choice to eliminate loopholes and make slavery permanent and heritable."}]}, {"question": "The Middle Passage mortality rate averaged roughly 15 percent of captives in the eighteenth century. Which of the following best explains why slavers accepted this mortality rate rather than reducing it by improving conditions?", "options": [{"text": "English law prohibited improving conditions aboard slave ships, requiring slavers to maximize the number of captives per voyage regardless of survival rates.", "isCorrect": false, "rationale": "No such law existed; English and later British law regulating conditions did not come until the late eighteenth century, and the mortality rate reflected the profit calculation of slavers, not a legal requirement for poor conditions."}, {"text": "The economic calculation of slavers — maximizing the number of captives per voyage even at the cost of higher mortality — meant that higher-density packing was more profitable than improved conditions despite the deaths.", "isCorrect": true, "rationale": "The source grounds the horror of the Middle Passage in the profit motive: enslaved captives were cargo, and the trade was organized to maximize cargo per voyage. Equiano's account demonstrates that the 'suffocating' conditions were not accidental but a consequence of this economic calculus."}, {"text": "High mortality was an unintended consequence of tropical disease for which slavers had no medical knowledge, not a predictable outcome of their practices.", "isCorrect": false, "rationale": "While disease was a factor, the source describes conditions — 'chained bodies pressed together without room to turn' — that were the result of deliberate packing choices, not ignorance; slavers understood the mortality costs but accepted them as part of the profit calculation."}, {"text": "West African societies required that slavers pack ships densely as a condition of selling captives, limiting English control over conditions.", "isCorrect": false, "rationale": "The source does not describe West African sellers as controlling packing conditions aboard European ships; the Middle Passage was under the complete control of the slavers once at sea."}]}, {"question": "The source describes the shift from indenture to chattel slavery as a 'conscious political choice to solve a class problem with a racial solution.' Which of the following pairs of developments best illustrates the class problem and the racial solution, respectively?", "options": [{"text": "CLASS: Tobacco overproduction drove down prices; RACIAL: African workers were available at lower cost than European servants.", "isCorrect": false, "rationale": "While economic factors mattered, the source's argument centers on the political threat of free armed white men, not purely price differentials — this framing misses the class-conflict analysis."}, {"text": "CLASS: Bacon's Rebellion revealed that freed indentured servants became a politically volatile class; RACIAL: Virginia's slave codes stripped African workers of legal personhood and made their bondage permanent and heritable.", "isCorrect": true, "rationale": "The source explicitly traces this logic: the class problem was 'a growing class of freed men who were poor, armed, and politically volatile'; the racial solution was 'a cascade of slave codes that stripped African laborers of legal personhood, inscribed slavery into hereditary racial identity, and built a race-based labor system.'"}, {"text": "CLASS: The tidewater elite monopolized the House of Burgesses; RACIAL: Indigenous peoples were expelled from coastal territories by racialized laws.", "isCorrect": false, "rationale": "The Burgesses' oligarchic character is real, but the racial solution in the source refers specifically to the substitution of chattel slavery for indentured servitude — not to indigenous policy."}, {"text": "CLASS: Poor English men refused to emigrate after word of Chesapeake conditions spread; RACIAL: Planters turned to West African workers as the only remaining labor source.", "isCorrect": false, "rationale": "The source does not describe the shift as a passive response to European labor supply reduction; it was an active political choice made precisely because of the dangers that European labor release into freedom had demonstrated."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
