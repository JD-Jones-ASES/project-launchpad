<script>
var QUESTIONS = [{"question": "Andrew Jackson's election in 1828 is often described as a 'democratic revolution.' Which of the following BEST qualifies this characterization?", "options": [{"text": "The election's democratic significance is overstated because voter turnout remained below 50 percent, indicating most Americans were indifferent to Jacksonian politics.", "isCorrect": false, "rationale": "Voter turnout actually increased dramatically in this period — from roughly 27% in 1824 to over 80% of eligible voters by 1840. The qualification the source offers is not about turnout but about who counted as 'the people' in Jacksonian democracy."}, {"text": "The democratic expansion was real for white men but was simultaneous with the forced removal of indigenous nations, the consolidation of plantation slavery, and the legal subordination of women — making 'Jacksonian democracy' democracy for one racial and gender group, not for all.", "isCorrect": true, "rationale": "The source makes this argument explicitly: 'Jacksonian democracy was a genuine expansion of popular politics for white men, and simultaneously a retrenchment of hierarchy for nearly everyone else.' The same years that eliminated property qualifications for white male voters saw Indian removal, slave-labor entrenchment, and women's legal subordination. The qualification is racial and gendered, not about turnout."}, {"text": "Jackson's democratic rhetoric was undermined by his use of the spoils system, which corrupted government and showed his real commitment was to partisan loyalty rather than popular sovereignty.", "isCorrect": false, "rationale": "The spoils system was one critique of Jacksonian democracy, but the source's primary qualification of the 'democratic revolution' claim concerns who was included and excluded from 'the people' — which is a far more fundamental challenge than the spoils system's corruption."}, {"text": "Jackson's claim to represent the common man was fraudulent because he was himself a wealthy planter and slaveholder, not a man of the people.", "isCorrect": false, "rationale": "While the source notes this contradiction (Jackson was 'a wealthy planter and slave-owner who held up to 150 enslaved people'), the democratic expansion was real for white men regardless of Jackson's personal wealth. The qualification is about who was included, not whether the democracy was real for those included."}], "id": "q01"}, {"question": "Read the following definition: 'The practice of distributing government appointments and contracts to members of the winning political party after an election, based on party loyalty rather than professional merit.' Jackson defended this system as democratic. Which of the following BEST represents the strongest counter-argument against Jackson's defense?", "options": [{"text": "The system was unconstitutional because the Founders intended federal appointments to be permanent, regardless of which party won elections.", "isCorrect": false, "rationale": "The Founders did not mandate permanent appointments; the Constitution gave the president appointment power. The source frames the critique as corruption and incompetence, not unconstitutionality."}, {"text": "Critics argued the system rewarded partisan loyalty over competence, corrupting government administration and ultimately requiring civil service reform (Pendleton Act, 1883) to replace patronage with merit-based hiring.", "isCorrect": true, "rationale": "The source presents exactly this critique: 'Critics argued that it corrupted government by rewarding partisan loyalty over competence.' The eventual response — the Pendleton Act (1883) — is mentioned as the reform that replaced the spoils system for most federal positions with merit-based civil service examinations. This is the strongest historical counter-argument."}, {"text": "The system undermined states' rights by centralizing federal patronage appointments in the hands of the executive, creating a powerful presidential machine that threatened the balance of federalism.", "isCorrect": false, "rationale": "The source does not frame the spoils system critique in terms of states' rights or federalism imbalance. The critique was about competence and corruption at the federal level, not about the locus of patronage power between executive and states."}, {"text": "Jackson's defense was hypocritical because he himself had benefited from merit-based military promotions and should have applied the same standard to civilian government.", "isCorrect": false, "rationale": "The source does not present this personal hypocrisy argument as the primary critique of the spoils system. The structural argument — that it corrupts government — was the critics' main concern."}], "id": "q02"}, {"question": "Jackson's veto of the Bank recharter bill (1832) has been described as 'not merely a legal argument but a populist manifesto.' Which of the following BEST explains this characterization?", "options": [{"text": "The veto message framed the Bank as a class enemy — a monster institution concentrating economic power in Eastern financial elites and foreign shareholders at the expense of ordinary farmers, debtors, and the South and West — appealing directly to popular grievances rather than constitutional technicalities.", "isCorrect": true, "rationale": "The source describes Jackson's veto message in precisely these terms: Jackson 'regarded the Bank as a monster institution that concentrated economic power in the hands of Eastern financial elites and foreign shareholders at the expense of ordinary farmers, debtors, and the South and West.' By framing the issue as economic class conflict rather than constitutional law, the veto became a populist appeal."}, {"text": "The veto message declared the Bank unconstitutional on strict-constructionist grounds, arguing that the Constitution gave Congress no authority to charter a financial institution.", "isCorrect": false, "rationale": "This would be a purely legal argument, not a populist manifesto. Moreover, McCulloch v. Maryland (1819) had already established the Bank's constitutionality, so a strict-constructionist argument would have been legally untenable. Jackson's veto was primarily a political-economic appeal."}, {"text": "Jackson used the veto message to appeal to Western land speculators by promising that destroying the Bank would lower interest rates and make credit universally available to small farmers.", "isCorrect": false, "rationale": "The source does not describe the veto message as a promise about interest rates or credit availability. In fact, the destruction of the Bank contributed to the speculative land boom and subsequent Panic of 1837 — consequences that hurt, rather than helped, the people Jackson claimed to champion."}, {"text": "The veto message argued that Congress had overstepped its authority by rechartering the Bank without presidential approval, making it primarily a statement about executive power.", "isCorrect": false, "rationale": "The veto was an exercise of the president's constitutional authority to reject legislation — not primarily a claim that Congress lacked authority to recharter. The populist dimension was the economic class argument, not a constitutional claim about legislative overreach."}], "id": "q03"}, {"question": "South Carolina's Ordinance of Nullification (1832) declared the federal tariff void within its borders. Jackson, despite his general states'-rights sympathies, responded with a threat of military force. Which of the following BEST explains this apparent inconsistency?", "options": [{"text": "Jackson was personally invested in the tariff because it protected Northern industries that he secretly supported.", "isCorrect": false, "rationale": "Jackson was not a supporter of Northern manufacturing; he represented Southern and Western agrarian interests. His response to nullification was not driven by tariff policy preferences but by his conception of the Union's integrity."}, {"text": "Jackson distinguished between his personal policy preferences (states' rights in many contexts) and what he saw as an existential constitutional threat: unilateral nullification would allow any state to void any federal law, making the Union unworkable and amounting to treason.", "isCorrect": true, "rationale": "The source notes Jackson was 'himself a defender of states' rights in other contexts' but 'responded with a ferocity that surprised even his allies,' issuing a Proclamation calling nullification 'treason' and requesting a Force Act. The distinction is between policy disagreements (which Jackson thought states could contest politically) and the constitutional right to nullify federal law (which Jackson believed would destroy the Union)."}, {"text": "Jackson's response to nullification was driven primarily by his personal feud with John C. Calhoun, whom he hated independently of the constitutional issues involved.", "isCorrect": false, "rationale": "While Jackson and Calhoun had a personal feud, the source presents Jackson's response as rooted in constitutional principle — nullification as treason — not personal animosity, though the source does note he 'privately threatened to hang Calhoun.'"}, {"text": "Jackson agreed with nullification in principle but believed South Carolina had chosen the wrong issue (the tariff) rather than the right issue (slavery) on which to invoke the doctrine.", "isCorrect": false, "rationale": "The source presents no evidence that Jackson endorsed nullification in principle on any issue. His Proclamation explicitly rejected the doctrine and threatened military force."}], "id": "q04"}, {"question": "Chief Justice Marshall ruled in Worcester v. Georgia (1832) that the Cherokee Nation possessed treaty rights that Georgia could not abrogate. Which of the following BEST explains why this ruling failed to protect the Cherokee?", "options": [{"text": "The Cherokee Nation did not qualify as a legal entity under U.S. law and therefore lacked standing to bring a case before the Supreme Court.", "isCorrect": false, "rationale": "Marshall's ruling affirmed the Cherokee Nation's legal status as a 'domestic dependent nation' with treaty rights. The Court's ruling was substantively in the Cherokee's favor on the legal merits; the problem was executive non-enforcement, not Cherokee legal standing."}, {"text": "Jackson refused to enforce the Supreme Court's ruling, and his administration proceeded with Indian removal through a combination of fraudulent treaties, military coercion, and political pressure — making the constitutional principle legally correct but practically meaningless.", "isCorrect": true, "rationale": "The source explains: Jackson 'reportedly remarked, \"John Marshall has made his decision; now let him enforce it.\"' Whether or not he said exactly those words, 'his administration's conduct was consistent with the sentiment: he did nothing to enforce the ruling.' This illustrates a fundamental limitation of judicial power: courts can establish constitutional principles but cannot independently enforce them."}, {"text": "Congress overrode the Supreme Court's ruling by passing a joint resolution declaring the Indian Removal Act constitutional, neutralizing Marshall's decision.", "isCorrect": false, "rationale": "Congress did not override Worcester v. Georgia through a joint resolution. The ruling stood as a legal precedent; it was executive non-enforcement, not legislative override, that rendered it practically ineffective."}, {"text": "The Treaty of New Echota, signed by the full Cherokee Nation, voluntarily accepted removal and superseded the Supreme Court's ruling.", "isCorrect": false, "rationale": "The source explicitly states that removal was accomplished through 'fraudulent treaties (some signed by minority factions of tribes without authorization).' The Treaty of New Echota was signed by a small minority faction without tribal authority — not the full Cherokee Nation."}], "id": "q05"}, {"question": "The Indian Removal Act (1830) 'did not technically authorize forced removal; it called for voluntary treaties and compensation.' Which of the following BEST explains why this legal distinction was practically meaningless?", "options": [{"text": "Indigenous nations were unable to read or understand the treaties they signed, so the 'voluntary' consent was not legally informed.", "isCorrect": false, "rationale": "This explanation relies on a stereotype of indigenous illiteracy that the source contradicts: the Cherokee had a written language, a constitutional government, English-language schools, and a newspaper. The source's explanation is about coercive conditions that made 'choice' impossible, not about literacy."}, {"text": "The distinction was meaningless because removal was accomplished through a combination of fraudulent treaties signed by unauthorized minority factions, military coercion, and political pressure that left indigenous nations no viable alternative to compliance.", "isCorrect": true, "rationale": "The source states precisely this: 'Removal was accomplished through a combination of fraudulent treaties (some signed by minority factions of tribes without authorization), military coercion, and political pressure that left indigenous nations with no viable alternative.' The law's text promised voluntary consent; the practice eliminated the conditions under which genuine consent was possible."}, {"text": "The act's compensation provisions were never funded by Congress, making the treaties immediately invalid under contract law.", "isCorrect": false, "rationale": "While compensation was inadequate and often not delivered as promised, the source's explanation of why the 'voluntary' framing was meaningless focuses on fraudulent treaties and military coercion — not technical contractual invalidity due to congressional funding failures."}, {"text": "President Jackson signed executive orders superseding the act's voluntary provisions, personally authorizing the use of military force before any treaty negotiations were attempted.", "isCorrect": false, "rationale": "The source does not describe Jackson signing executive orders superseding the act. The coercive process operated through the treaty mechanism itself — fraudulent treaties and political pressure — not through a direct presidential order overriding the act's voluntary language."}], "id": "q06"}, {"question": "The Trail of Tears (1838–39) resulted in the deaths of approximately 4,000 of the roughly 16,000 Cherokee who began the march. The Cherokee name for this event is Nunna daul Tsuny — 'the trail where they cried.' Which of the following BEST characterizes the historical significance of this event within the broader context of Jacksonian democracy?", "options": [{"text": "The Trail of Tears represented an aberration of Jacksonian democracy — a policy deviation that most Democrats opposed and that contradicted the movement's core principles.", "isCorrect": false, "rationale": "The source argues precisely the opposite: 'The Indian Removal Act was not an aberration of Jacksonian democracy; it was one of its constitutive acts.' The removal of the Five Civilized Tribes opened millions of acres for white settlement and slave-based cotton cultivation — directly serving the interests of the white male electorate Jacksonian democracy championed."}, {"text": "The Trail of Tears illustrated that Jacksonian democracy's expansion of rights for white men was financed by the dispossession of indigenous peoples, making removal not an aberration but a constitutive act of Jacksonian political economy.", "isCorrect": true, "rationale": "The source's 'Key Concept — The Paradox of Jacksonian Democracy' argues exactly this: 'The expansion of political rights for white men was financed, literally and politically, by the dispossession of indigenous peoples and the expansion of Black slavery. The removal of the Five Civilized Tribes opened millions of acres of fertile land for white settlement and slave-based cotton cultivation.' The Trail of Tears was central to, not marginal to, Jacksonian democracy."}, {"text": "The Trail of Tears was the direct result of Georgia's state legislation, and Jackson's federal government was a passive bystander that lacked the constitutional authority to intervene between a state and tribal nations within its borders.", "isCorrect": false, "rationale": "Jackson was not a passive bystander — he signed the Indian Removal Act, refused to enforce Worcester v. Georgia (which ruled Georgia's laws unconstitutional), and oversaw the military removal. Presenting Jackson's government as constitutionally unable to intervene is refuted by Marshall's ruling that federal authority governed indigenous relations."}, {"text": "The Trail of Tears forced the federal government to reconsider the Indian Removal Act, eventually leading to a constitutional amendment protecting indigenous treaty rights.", "isCorrect": false, "rationale": "No constitutional amendment protecting indigenous treaty rights resulted from the Trail of Tears. Removal continued for other tribes; the Seminole fought a seven-year war (1835–42) against removal. The policy was not abandoned or constitutionally revised."}], "id": "q07"}, {"question": "Sequoyah created the Cherokee syllabary in 1821, the Cherokee Nation developed a constitutional government, English-language schools, and a newspaper (The Cherokee Phoenix). How does the source use this information?", "options": [{"text": "To argue that the Cherokee had earned the right to remain on their lands by demonstrating cultural assimilation into American civilization.", "isCorrect": false, "rationale": "The source does not frame this as a 'cultural merit' argument for Cherokee rights. Using accommodation to justify land rights implicitly accepts the premise that indigenous peoples needed to prove themselves by American standards — which the source does not endorse. The source uses this context to demonstrate the bad faith of removal despite Cherokee adaptation."}, {"text": "To establish that the Cherokee had made 'substantial accommodations to the demands of American society,' making their removal — which proceeded despite these accommodations — evidence that accommodation offered no protection against dispossession when white settlers wanted the land.", "isCorrect": true, "rationale": "The source frames the Cherokee's cultural and political developments as context for demonstrating the depths of the injustice: the Cherokee had met Americans' own assimilationist standards, and they were removed anyway. The source's argument is that the real driver was that 'their lands in Georgia, Alabama, and Tennessee sat on valuable cotton-growing territory, and white settlers wanted it' — not any failure of Cherokee accommodation."}, {"text": "To show that the Cherokee had abandoned their traditional culture and were therefore no longer a 'real' indigenous nation deserving of treaty protections under federal law.", "isCorrect": false, "rationale": "This is the opposite of the source's argument. The source does not endorse the view that indigenous authenticity requires cultural stasis. Marshall's ruling affirmed the Cherokee's legal rights regardless of their cultural adaptations."}, {"text": "To explain how the Cherokee's literacy and political sophistication enabled them to mount a successful legal defense that ultimately preserved their lands.", "isCorrect": false, "rationale": "While the Cherokee did mount a sophisticated legal defense (winning Worcester v. Georgia), the ultimate outcome was removal. The Cherokee's literacy and political development did not preserve their lands — it made their removal more starkly unjust, which is how the source uses this context."}], "id": "q08"}, {"question": "Comparing Jackson's response to the Nullification Crisis (1832–33) with his response to Indian removal, which of the following BEST describes what the contrast reveals?", "options": [{"text": "Jackson consistently defended federal supremacy in both cases, using force against South Carolina and the Army against the Cherokee to demonstrate that federal authority was not negotiable.", "isCorrect": false, "rationale": "Jackson defended federal authority in the Nullification Crisis but undermined it in the Indian removal context — he refused to enforce Worcester v. Georgia, which was a federal Supreme Court ruling asserting federal authority over indigenous relations against Georgia's state law. His conduct was inconsistent, not uniformly pro-federal."}, {"text": "The contrast reveals that Jackson's commitment to federal power was selective: he invoked it to defeat South Carolina's challenge to his authority but ignored it when enforcing federal court protection of Cherokee treaty rights would have cost him white Southern political support.", "isCorrect": true, "rationale": "The source presents this as the 'Paradox of Jacksonian Democracy': Jackson threatened to hang Calhoun over nullification (a challenge to federal authority he opposed) but 'did nothing to enforce' Worcester v. Georgia (a federal ruling he could have used to protect the Cherokee). The difference is political interest: nullification threatened the Union he led; Cherokee protection would have alienated the Southern white male constituency he depended on."}, {"text": "The contrast reveals Jackson's strict constructionism: he acted to preserve the constitutional Union in the Nullification Crisis but deferred to states' rights on Indian removal, consistently applying a states'-rights philosophy.", "isCorrect": false, "rationale": "This mischaracterizes the Nullification Crisis response (which was anti-states'-rights) and presents Jackson's Indian removal stance as principled states'-rights federalism, ignoring that Marshall's ruling had already established federal authority over indigenous relations."}, {"text": "Both cases reveal Jackson's fundamental constitutionalism: in both cases, he respected the judiciary's rulings and used executive power only within constitutional boundaries.", "isCorrect": false, "rationale": "The opposite is true in the Indian removal context: Jackson explicitly refused to enforce the Supreme Court's constitutional ruling in Worcester v. Georgia. His constitutionalism was highly selective."}], "id": "q09"}, {"question": "A student writes: 'The Jacksonian era expanded democracy by removing property qualifications for voting, making the United States truly democratic.' A historian would most likely revise this claim by noting that:", "options": [{"text": "Property qualifications were not actually removed in most states; they persisted through the Civil War and were only abolished by the Fifteenth Amendment.", "isCorrect": false, "rationale": "The source states that 'most states had required property ownership or taxpaying to vote in 1800; by 1840, nearly all had abolished such requirements for white men.' Property qualification removal was real, not illusory."}, {"text": "Universal white male suffrage was achieved by the 1840s, but this expansion excluded women categorically, Black Americans in most states, and was built on the simultaneous dispossession of indigenous peoples — making 'truly democratic' accurate only for white men.", "isCorrect": true, "rationale": "The source's fundamental argument is precisely this: 'The same years that saw the last property qualifications for white male voting fall away... were the years that saw the systematic forced removal of the indigenous nations... the consolidation of the plantation South's slave-labor regime, and the legal subordination of women.' The democracy was real but radically limited in scope."}, {"text": "The expansion of voting rights was temporary; conservative Whig legislatures in most Northern states reintroduced property qualifications in the 1840s.", "isCorrect": false, "rationale": "The source provides no evidence of property qualification reintroduction. The expansion of white male suffrage was real and durable."}, {"text": "Voter turnout remained too low to constitute genuine democratic participation; the majority of white men did not exercise their new voting rights.", "isCorrect": false, "rationale": "The source describes voter turnout rising from roughly 27% in 1824 to over 80% of eligible voters (white males) by 1840 — suggesting broad participation among those who were eligible. The democratic expansion's flaw was not low turnout but exclusion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
