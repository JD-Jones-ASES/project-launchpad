<script>
var QUESTIONS = [{"question": "Hamilton argued for a Bank of the United States using the 'necessary and proper' clause of the Constitution. Jefferson argued against it using 'strict construction.' Which of the following BEST captures the difference between these two positions?", "options": [{"text": "Hamilton believed the Constitution was an outdated document that needed to be updated; Jefferson believed it should be followed exactly as written", "isCorrect": false, "rationale": "Neither Hamilton nor Jefferson argued that the Constitution was outdated or needed updating; their disagreement was about how to interpret its existing text — what the 'necessary and proper' clause authorized."}, {"text": "Hamilton argued that 'necessary and proper' authorized any action reasonably connected to an enumerated power (loose/implied powers); Jefferson argued that Congress could only do what the Constitution explicitly authorized (strict construction)", "isCorrect": true, "rationale": "The source states precisely this: Jefferson and Randolph argued 'strict construction — Congress could only do what the Constitution explicitly authorized.' Hamilton countered with 'loose construction (implied powers): the necessary and proper clause authorized any action reasonably connected to the execution of enumerated powers.'"}, {"text": "Hamilton argued that the Constitution was a contract between the states and could be changed by state legislatures; Jefferson argued it was a contract between the people and could only be changed by popular referendum", "isCorrect": false, "rationale": "This describes the nullification debate of the 1820s–30s, not the 1790s bank debate; Hamilton and Jefferson were arguing about the scope of congressional authority, not the amendment process or state authority to change the Constitution."}, {"text": "Hamilton believed the Supreme Court should interpret the Constitution; Jefferson believed the president had final constitutional authority", "isCorrect": false, "rationale": "Both Hamilton and Jefferson accepted judicial review as a constitutional principle; their bank debate concerned the scope of congressional legislative power, not which branch had final interpretive authority."}]}, {"question": "Washington personally led approximately 13,000 militiamen into western Pennsylvania to suppress the Whiskey Rebellion in 1794. What precedent did this establish?", "options": [{"text": "It established that the president could declare war without congressional approval in cases of domestic emergency", "isCorrect": false, "rationale": "Washington did not declare war; he used federal military force to suppress a domestic insurrection — a different constitutional power. The precedent concerned the federal government's authority to enforce its laws against internal resistance, not the war power."}, {"text": "It demonstrated that the new federal government, unlike the old Confederation, possessed both the will and the means to enforce its laws against armed domestic resistance", "isCorrect": true, "rationale": "The source explicitly states this as the precedent's significance: Washington 'demonstrated that the new federal government, unlike the old Confederation, possessed both the will and the means to enforce its laws against internal resistance' — directly contrasting with the Confederation's inability to suppress Shays' Rebellion."}, {"text": "It established the principle that the federal government could only suppress rebellions at the request of a state government, not on its own initiative", "isCorrect": false, "rationale": "Washington acted on federal authority — the whiskey excise tax was a federal law being resisted — not solely at Pennsylvania's request; the precedent was about federal enforcement authority, not state-request requirements."}, {"text": "It proved that popular uprisings against taxation were inevitably futile and would always be suppressed, discouraging future tax resistance", "isCorrect": false, "rationale": "The Whiskey Rebellion's suppression established a governmental capacity precedent, not a historical rule about the futility of popular resistance; future tax resistance and political opposition continued through constitutional channels (elections, legislation)."}]}, {"question": "Jefferson and Hamilton had fundamentally different visions for America's economic future. Which pair of descriptions BEST captures this difference?", "options": [{"text": "Hamilton: agrarian republic of independent farmers; Jefferson: commercial-industrial nation integrated into Atlantic markets", "isCorrect": false, "rationale": "This reverses the positions: Hamilton envisioned the commercial-industrial nation; Jefferson envisioned the agrarian republic of self-sufficient farmers. The descriptions are correct but assigned to the wrong figures."}, {"text": "Hamilton: powerful commercial-industrial republic with strong federal direction of economic development; Jefferson: agrarian nation of self-sufficient farmers, free of financial corruption, governed by states close to the people", "isCorrect": true, "rationale": "The source directly describes Hamilton's vision as 'a powerful commercial-industrial nation, integrated into the Atlantic economy, with a strong federal government capable of directing economic development' and Jefferson's as 'a nation of self-sufficient farmers, free of the corruption that Hamilton's commercial and financial institutions would bring, governed by states close to the people rather than a remote federal authority.'"}, {"text": "Hamilton: free trade without tariffs to maximize consumer welfare; Jefferson: high protective tariffs to develop American industry", "isCorrect": false, "rationale": "Hamilton proposed protective tariffs and government bounties for industry in his Report on Manufactures — Jefferson was the opponent of Hamilton's commercial-industrial program, not its advocate. Neither man's position matches these descriptions."}, {"text": "Hamilton and Jefferson shared similar economic visions but disagreed only about whether the national bank should be privately or publicly owned", "isCorrect": false, "rationale": "Hamilton and Jefferson had fundamentally different economic philosophies — commercial-industrial vs. agrarian — not a narrow technical disagreement about bank ownership structure."}]}, {"question": "Jefferson and Madison responded to the Alien and Sedition Acts with the Kentucky and Virginia Resolutions (1798–99), which argued that states had the right to 'nullify' unconstitutional federal acts within their borders. What was the long-term constitutional significance of this doctrine?", "options": [{"text": "Nullification was immediately accepted as a valid constitutional principle by the Supreme Court, limiting federal power for the next generation", "isCorrect": false, "rationale": "The Supreme Court did not accept nullification; John Marshall's Court consistently expanded federal power against state resistance. Nullification was a political doctrine that other states rejected in 1798–99 and that the Supreme Court never validated as constitutional law."}, {"text": "The nullification theory established the constitutional argument that John C. Calhoun later developed into a full-blown doctrine of secession, contributing directly to the sectional crisis that produced the Civil War", "isCorrect": true, "rationale": "The source states exactly this: 'The resolutions established the constitutional theory of nullification that John C. Calhoun would later develop into a full-blown doctrine of secession' — making the 1798 resolutions a direct ideological precursor to the antebellum Southern position."}, {"text": "Nullification was effectively used by Northern states to block the enforcement of the Fugitive Slave Act in the 1850s, demonstrating its utility as a constitutional tool across regions", "isCorrect": false, "rationale": "While Northern states did resist the Fugitive Slave Act through 'personal liberty laws,' this was a later development and was rejected by the Supreme Court in Ableman v. Booth (1859); the nullification doctrine as articulated by Jefferson/Madison was specifically a Southern states'-rights argument that Calhoun developed, not the Northern resistance strategy."}, {"text": "The resolutions immediately caused Virginia and Kentucky to secede from the United States, creating the first constitutional crisis of the new republic", "isCorrect": false, "rationale": "Virginia and Kentucky did not secede; they issued legislative resolutions protesting the Alien and Sedition Acts as unconstitutional overreach — a political statement, not an act of secession. The first secession crisis came in 1832–33 (South Carolina) and then in 1860–61."}]}, {"question": "The Alien and Sedition Acts (1798) were passed during the Quasi-War with France. What does the Sedition Act's content reveal about the relationship between foreign policy crises and domestic civil liberties?", "options": [{"text": "Foreign policy crises historically have no effect on domestic civil liberties because constitutional protections automatically prevent emergency legislation", "isCorrect": false, "rationale": "The Sedition Act's passage during the Quasi-War demonstrates precisely the opposite: foreign policy crises can produce domestic legislation that restricts civil liberties; the First Amendment's free speech and press protections did not prevent Congress from passing the Sedition Act."}, {"text": "The Sedition Act — making it a crime to publish 'false, scandalous, and malicious' writings against the government — demonstrates that foreign policy crises can be used to justify restricting domestic political opposition through legislation targeting press freedom", "isCorrect": true, "rationale": "The source notes that the Sedition Act 'was transparently aimed at Republican newspaper editors who criticized Adams' — a domestic political use of a foreign policy crisis. The pattern of using national security emergencies to restrict opposition press and speech recurs throughout American history."}, {"text": "The Sedition Act was popular across party lines because all Americans agreed that criticism of the government during wartime was unacceptable", "isCorrect": false, "rationale": "The Sedition Act was sharply contested: Jefferson and Madison responded with the Kentucky and Virginia Resolutions, and Republican newspaper editors who were prosecuted under it became political martyrs. It was anything but a cross-party consensus."}, {"text": "The Sedition Act was constitutionally justified because the First Amendment's free speech protections were not ratified until the Twelfth Amendment in 1804", "isCorrect": false, "rationale": "The First Amendment (including freedom of speech and press) was ratified in 1791 as part of the Bill of Rights — well before the Sedition Act of 1798. The Twelfth Amendment (1804) addressed the Electoral College, not civil liberties."}]}, {"question": "Hamilton's assumption plan — the federal government assuming state war debts — was initially blocked by Madison and Southern states. The compromise that broke the deadlock traded debt assumption for the permanent capital location. What does this episode reveal about early republic governance?", "options": [{"text": "It demonstrates that financial policy and geographic/political interests were completely separate spheres of governance in the early republic", "isCorrect": false, "rationale": "The episode demonstrates precisely the opposite: financial policy (debt assumption) and geographic/political interests (capital location) were directly traded against each other in a bargain — suggesting these were deeply intertwined spheres of governance."}, {"text": "It illustrates that even fundamental economic policy required horse-trading among regional interests, and that the accommodation of Southern concerns (capital location on the Potomac) was necessary to build the coalition for Hamilton's financial program", "isCorrect": true, "rationale": "The source describes a 'dinner-table deal brokered by Thomas Jefferson': Southern states accepted assumption in exchange for a Potomac capital — showing that Hamilton's financial architecture required political accommodation of regional (specifically Southern) interests to be enacted."}, {"text": "It proves that the federal government had no authority over state financial matters and had to purchase state cooperation through political concessions", "isCorrect": false, "rationale": "The Constitution gave Congress authority over federal finances, and assumption was within that authority; the political resistance from Southern states who had paid their debts was about political fairness, not constitutional authority — and the deal was a political compromise, not a constitutional concession."}, {"text": "It demonstrates that Thomas Jefferson consistently supported Hamilton's economic program and only opposed it publicly for political reasons", "isCorrect": false, "rationale": "Jefferson genuinely opposed assumption on philosophical grounds (he had no desire to bind creditors to the federal government) — the dinner deal he brokered was a tactical accommodation to achieve a priority (Potomac capital) he did care about, not a revelation of secret support for Hamilton's program."}]}, {"question": "The Whiskey Rebellion grew from Hamilton's excise tax on distilled spirits. Jefferson's critics saw Washington's military response as 'a dangerous display of federal tyranny.' This Jeffersonian critique is MOST consistent with which broader political principle?", "options": [{"text": "Federalist principle: the federal government must demonstrate its authority by responding forcefully to any challenge to its laws, regardless of the economic circumstances of those resisting", "isCorrect": false, "rationale": "This describes Washington's and Hamilton's perspective, not Jefferson's Jeffersonian critique — the question asks which principle the Jeffersonian critique is consistent with, not which principle justified Washington's response."}, {"text": "Democratic-Republican principle: states and individuals should be the primary sphere of governance; heavy federal military response to a tax dispute represents the kind of excessive federal authority the Revolution had been fought to end", "isCorrect": true, "rationale": "The source states that 'Hamilton's critics, led by Jefferson, saw the episode differently: a massive military response to what amounted to a tax dispute was a dangerous display of federal tyranny, exactly the kind of excessive force the Revolution had been fought to end' — which is consistent with the Democratic-Republican principle of limited federal authority and preference for state/local governance."}, {"text": "Anti-Federalist principle: no taxation should be permitted without ratification by the affected states, regardless of congressional authorization", "isCorrect": false, "rationale": "The Anti-Federalist ratification debate was over; by 1794, the Constitution's taxing authority was settled. Jefferson's Whiskey Rebellion critique was about the proportionality of federal military response, not the constitutionality of the tax itself."}, {"text": "Federalist principle: the president should defer to Congress on matters of domestic policy, including the decision to use military force against American citizens", "isCorrect": false, "rationale": "The Federalist position supported Washington's use of force (Hamilton was enthusiastic about it); the Jeffersonian critique, not the Federalist position, expressed concern about executive military overreach."}]}, {"question": "Hamilton's Report on Manufactures (1791) proposed protective tariffs and government bounties to develop American industry. Congress did not act on the report at the time. What was its longer-term historical significance?", "options": [{"text": "The Report was forgotten within a generation and had no lasting influence on American economic policy", "isCorrect": false, "rationale": "The source states the Report 'established the intellectual framework that Henry Clay would later formalize as the American System and that tariff politics would organize for the next century' — its long-term influence was substantial, even though Congress rejected it initially."}, {"text": "It established the intellectual framework for Henry Clay's 'American System' and structured American tariff politics for the following century, even though Congress did not immediately act on it", "isCorrect": true, "rationale": "The source explicitly credits the Report with this long-term significance: it 'established the intellectual framework that Henry Clay would later formalize as the American System and that tariff politics would organize for the next century' — a case of ideas outlasting their immediate legislative defeat."}, {"text": "Its rejection by Congress proved that Hamilton's economic vision was fundamentally incompatible with American values and led to the permanent defeat of industrial policy in the United States", "isCorrect": false, "rationale": "Hamilton's vision was eventually implemented (in modified form) through Hamiltonian tariff policies, the Second Bank of the United States, and the American System — its initial congressional defeat was a tactical setback, not a permanent repudiation."}, {"text": "The Report persuaded Congress to immediately develop American manufacturing by imposing a 50% tariff on all British manufactured goods", "isCorrect": false, "rationale": "Congress did not act on the Report; there was no immediate 50% tariff. The Report's influence was long-term and indirect, through the intellectual framework it established for future economic nationalists."}]}, {"question": "The first American party system emerged despite the Founders' belief that political parties were dangerous factions. What does this emergence reveal about the relationship between political theory and political practice?", "options": [{"text": "The Founders' anti-party theory was correct but they were too weak-willed to prevent parties from forming, demonstrating that virtue alone is insufficient to preserve republican ideals", "isCorrect": false, "rationale": "This accepts the Founders' anti-party theory as correct and attributes parties' emergence to personal failure; the source suggests instead that 'organized political competition was not only unavoidable but, eventually, the mechanism by which power was peacefully transferred' — parties proved functional, not merely inevitable."}, {"text": "The inevitable emergence of organized parties despite the Founders' opposition demonstrates that political practice — the need to organize competing interests — can override even the most deeply held theoretical commitments", "isCorrect": true, "rationale": "The source states that 'the decade of the 1790s demonstrated that in a republic, organized political competition was not only unavoidable but, eventually, the mechanism by which power was peacefully transferred' — meaning that the practical logic of republican competition produced parties regardless of the Founders' theoretical hostility to them."}, {"text": "The first parties formed because Hamilton and Jefferson had personal antagonism, not because party organization was structurally necessary for republican governance", "isCorrect": false, "rationale": "The source describes the first party system as the crystallization of genuine ideological differences into organization — not merely personal conflict: conflicts over the bank, Whiskey Rebellion, Jay's Treaty, and Alien and Sedition Acts 'crystallized ideological differences between Hamilton and Jefferson into organized political parties.'"}, {"text": "Political parties only became necessary after Washington's retirement, when the absence of a unifying figure forced political leaders to organize around other identities", "isCorrect": false, "rationale": "The source shows party formation occurring throughout the 1790s while Washington was still president — the Federalist and Democratic-Republican coalitions were already coalescing around the bank debate (1791), Whiskey Rebellion (1794), Jay's Treaty (1794), and Alien and Sedition Acts (1798)."}]}, {"question": "The XYZ Affair (1797–98) and the resulting Quasi-War with France illustrates which recurring theme in early American foreign policy?", "options": [{"text": "The United States maintained strict neutrality in all European conflicts throughout the 1790s and never faced military confrontation with European powers", "isCorrect": false, "rationale": "The Quasi-War was an undeclared naval war with France (1798–1800); American neutrality was not effectively maintained — both France and Britain seized American ships, and the United States found itself in armed conflict with France. Strict neutrality was the goal, not the achievement."}, {"text": "European imperial powers' conflicts consistently threatened to draw the United States into alignment with one side against the other, requiring careful diplomatic navigation to protect American commercial and political independence", "isCorrect": true, "rationale": "The XYZ Affair grew from France's response to Jay's Treaty with Britain — France interpreted American-British rapprochement as taking sides and began seizing American ships. This illustrates the recurring theme: European conflicts created pressure to align with one power or the other, threatening the neutrality Washington and Adams sought to maintain."}, {"text": "The United States successfully avoided all foreign entanglements during the 1790s because Washington's personal prestige deterred European interference in American affairs", "isCorrect": false, "rationale": "Washington's prestige did not deter European interference; Jay's Treaty, the XYZ Affair, and the Quasi-War all demonstrate that European powers treated American commerce and diplomacy as instruments of their own strategic competition regardless of Washington's standing."}, {"text": "The XYZ Affair demonstrated that American commerce could not survive without permanent military alliances with European powers to protect merchant shipping", "isCorrect": false, "rationale": "Washington's Farewell Address explicitly warned against 'permanent alliances'; the lesson the Adams administration drew from XYZ was to build a stronger naval defense (the Navy Department was created in 1798), not to pursue permanent alliances — Washington's foreign policy advice was the context for understanding XYZ."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
