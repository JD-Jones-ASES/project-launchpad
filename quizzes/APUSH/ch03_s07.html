<body>
<div class="quiz-container">

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Washington&#x27;s Farewell and the Election of 1800</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Read this excerpt from Washington's Farewell Address (1796): 'The alternate domination of one faction over another, sharpened by the spirit of revenge, natural to party dissension... is itself a frightful despotism. But this leads at length to a more formal and permanent despotism.' Perform a HAPP analysis — what does Washington's Point of View reveal about why this specific warning appears in the Address?", "options": [{"text": "Washington's warning against parties was purely abstract political philosophy derived from his reading of classical republican theory, with no personal dimension", "isCorrect": false, "rationale": "The HAPP framework requires attending to Point of View, which the source explicitly addresses: 'his anti-party warning reflects personal experience as much as abstract principle' — Washington had spent eight years watching Hamilton and Jefferson destroy cabinet unity and fill the press with partisan attacks he found personally devastating."}, {"text": "Washington had spent eight years watching Hamilton and Jefferson destroy cabinet unity and fill the press with venom he found personally devastating — his anti-party warning reflects this lived experience alongside abstract republican principle", "isCorrect": true, "rationale": "The source provides this HAPP Point of View analysis directly: 'Washington had spent eight years watching Hamilton and Jefferson destroy the cabinet unity he had tried to maintain; his anti-party warning reflects personal experience as much as abstract principle.' This is the Point of View insight that a HAPP analysis should surface."}, {"text": "Washington wrote the Address specifically to endorse the Federalist Party in the 1796 election by warning against the Democratic-Republican opposition", "isCorrect": false, "rationale": "Washington's warning was against ALL parties and factional organization, not a partisan endorsement; the Address's political thrust was to elevate national unity above both Federalist and Democratic-Republican partisanship."}, {"text": "Washington's anti-party warning was drafted entirely by Hamilton, making it Hamilton's political philosophy rather than Washington's genuine conviction", "isCorrect": false, "rationale": "While Hamilton helped draft the Address, the source states it expressed 'Washington's own settled convictions'; the anti-party warning particularly reflects Washington's personal experience, not merely Hamilton's political strategy."}], "id": "q01"}, {"question": "Washington's Farewell Address (1796) warned against 'permanent alliances' with foreign nations while encouraging commercial relations. How did this distinction shape American foreign policy in the following century?", "options": [{"text": "Washington's warning led the United States to refuse all commercial treaties with foreign nations, pursuing complete economic isolation from Europe", "isCorrect": false, "rationale": "Washington specifically encouraged 'extending commercial relations' — his warning was against political and military entanglement, not commercial exchange. Economic isolation was not Washington's advice."}, {"text": "Washington's distinction between commercial relations (encouraged) and political/military alliances (discouraged) provided the ideological foundation for the Monroe Doctrine (1823), sustained American neutrality in European conflicts, and fed the persistent suspicion of binding international commitments", "isCorrect": true, "rationale": "The source explicitly traces this influence: the Farewell Address 'shaped American foreign policy for the next century, providing the ideological foundation for the Monroe Doctrine (1823), neutrality in the European conflicts of the nineteenth century, and the persistent American suspicion of binding international commitments.'"}, {"text": "Washington's warning was immediately followed by the United States' formal alliance with France through the French alliance of 1778, which Washington approved as a temporary emergency measure", "isCorrect": false, "rationale": "The French alliance had been signed in 1778 during the Revolutionary War — eighteen years before the Farewell Address; Washington's 1796 warning was a prospective caution against future permanent alliances, not a retroactive endorsement of the French alliance."}, {"text": "Washington's Farewell Address had no practical effect on American foreign policy because the partisan divisions he warned against prevented any coherent national strategy from emerging", "isCorrect": false, "rationale": "The Address did shape American foreign policy — the Monroe Doctrine, neutrality in European conflicts, and the tradition of avoiding binding treaty commitments all drew explicitly on Washington's Farewell Address as foundational doctrine."}], "id": "q02"}, {"question": "The election of 1800 produced a tie between Jefferson and Burr because every Democratic-Republican elector voted for both candidates. Which constitutional mechanism created this crisis, and how was it resolved?", "options": [{"text": "The original Constitution required the House to choose the president in every election; the tie was resolved when Adams, as outgoing president, cast the deciding vote for Jefferson", "isCorrect": false, "rationale": "The original Constitution sent elections to the House only when no candidate received a majority — not in every election. The president had no vote in the House's selection; Adams, as outgoing executive, played no role in resolving the tie."}, {"text": "The original Constitution had no separate ballots for president and vice president; electors cast two votes for president; when all Democratic-Republican electors voted for both Jefferson and Burr, they tied at 73 electoral votes each, sending the decision to the Federalist-controlled House, which chose Jefferson after 36 ballots", "isCorrect": true, "rationale": "The source describes this mechanism precisely: 'The original Constitution had no separate ballots for president and vice president; electors cast two votes, and the person with the most votes became president, the runner-up vice president. In 1800, every Democratic-Republican elector voted for both Jefferson and Burr, producing a tie: 73 electoral votes each. Under the Constitution, the tie went to the House of Representatives.'"}, {"text": "The crisis was resolved by Washington's personal intervention from retirement, who persuaded Federalist electors to switch their votes to Jefferson", "isCorrect": false, "rationale": "Washington died in December 1799, before the 1800 election's resolution; the crisis was resolved in February 1801 through the House's deliberations, not Washington's personal intervention."}, {"text": "The Twelfth Amendment was passed before the election to create separate ballots for president and vice president, resolving the crisis before the House vote was needed", "isCorrect": false, "rationale": "The Twelfth Amendment was passed AFTER the 1800 crisis — ratified in 1804 — specifically to prevent future repetitions of the tie scenario; the 1800 crisis was resolved through the existing House procedure, not constitutional amendment."}], "id": "q03"}, {"question": "Hamilton intervened in the 1800 House vote, working to ensure Jefferson rather than Burr won the presidency despite his personal hatred of Jefferson. What does this decision reveal about Hamilton's political values?", "options": [{"text": "Hamilton secretly supported Jefferson's agrarian vision and took the opportunity to advance Jeffersonian principles now that the Federalists had lost power", "isCorrect": false, "rationale": "The source states Hamilton 'despised Jefferson' — his intervention was not based on endorsing Jefferson's politics but on judging Burr as the greater danger to the republic: 'an unprincipled opportunist more dangerous to the republic.' Principle, not support for Jefferson, motivated Hamilton."}, {"text": "Hamilton prioritized the republic's institutional integrity over personal and partisan advantage, choosing the candidate he found substantively inferior (Jefferson) over one he considered genuinely dangerous (Burr)", "isCorrect": true, "rationale": "The source describes Hamilton's decision as 'an act of political and eventually fatal personal courage' — he despised Jefferson but regarded Burr as an 'unprincipled opportunist more dangerous to the republic,' and chose institutional over personal interest. This decision also contributed to the personal enmity that led to the Burr-Hamilton duel in 1804."}, {"text": "Hamilton calculated that Jefferson would be a weak president easily controlled by Federalists in Congress, making him preferable to Burr who might govern independently", "isCorrect": false, "rationale": "While Hamilton may have had tactical calculations, the source emphasizes his genuine judgment of Burr's character as the motivation — Burr was 'an unprincipled opportunist,' not simply less controllable. Hamilton's characterization of Burr proved accurate and contributed to his being killed in their 1804 duel."}, {"text": "Hamilton's intervention demonstrated that the Federalist Party was prepared to accept a peaceful transfer of power, vindicating Washington's constitutional legacy", "isCorrect": false, "rationale": "The Federalist Party as a whole did not readily accept Jefferson; some Federalists preferred Burr precisely to prevent Jefferson's election. Hamilton's individual choice was not a party decision and does not characterize the Federalists' collective behavior during the crisis."}], "id": "q04"}, {"question": "Jefferson called his election the 'Revolution of 1800.' In what sense was his election genuinely revolutionary, and in what sense was it not?", "options": [{"text": "Genuinely revolutionary: Jefferson overturned the Constitution and replaced it with a democratic charter. Not revolutionary: Hamilton's economic program continued unchanged.", "isCorrect": false, "rationale": "Jefferson did not overturn the Constitution; the 'Revolution of 1800' was about the peaceful transfer of power between parties, not constitutional replacement. And Hamilton's financial architecture survived largely intact — so the 'not revolutionary' part has merit but is disconnected from the first claim."}, {"text": "Genuinely revolutionary: the first peaceful transfer of executive power between opposing parties in republican history. Not revolutionary: Hamilton's financial architecture — debt, Bank, U.S. credit — survived Jefferson's presidency; governing required pragmatism over ideology", "isCorrect": true, "rationale": "The source identifies both dimensions: the transfer 'was genuinely revolutionary by the standards of world history in 1800' as the first peaceful partisan power transfer; but 'Hamilton's financial architecture... survived Jefferson's presidency intact; Jefferson found... that governing required pragmatism' — showing what was and wasn't truly transformed."}, {"text": "Genuinely revolutionary: Jefferson immediately abolished the National Bank and repealed all federal taxes. Not revolutionary: the two-party system Washington had warned against continued.", "isCorrect": false, "rationale": "Jefferson did not immediately abolish the Bank (though he opposed recharter) and the Bank continued until 1811; he did reduce federal expenditures and repeal some taxes, but 'immediately abolished' overstates the case. The source's specific examples of non-revolutionary continuity are Hamilton's financial architecture, not the two-party system."}, {"text": "Genuinely revolutionary: Jefferson executed the Federalist leadership to prevent counter-revolution. Not revolutionary: the economy remained capitalist.", "isCorrect": false, "rationale": "Jefferson executed no one — the 'Revolution of 1800' was explicitly and proudly peaceful; the election of 1800's significance was precisely that violent suppression of the losing party did NOT occur. This answer mischaracterizes the most important aspect of the election."}], "id": "q05"}, {"question": "Washington's decision to retire after two terms was itself described as 'a constitutional act.' Which of the following BEST explains why historians characterize it this way?", "options": [{"text": "The Constitution required presidents to retire after two terms, and Washington was simply following the law", "isCorrect": false, "rationale": "The original Constitution had no two-term limit; the two-term tradition was a norm Washington established by his own choice, not a constitutional requirement. The Twenty-Second Amendment (1951) later made two terms a legal limit, but Washington's voluntary retirement was the precedent that created the norm."}, {"text": "By voluntarily leaving office, Washington proved that the republic did not depend on any single person's continued presence — demonstrating that constitutional authority, not individual genius, was the republic's foundation", "isCorrect": true, "rationale": "The source explicitly makes this argument: 'His decision to retire was itself a constitutional act: by choosing to leave, he established the two-term tradition and proved that the republic did not depend on any single man's continued presence.' The voluntary surrender of power was the act that validated republican self-governance."}, {"text": "Washington's retirement was a constitutional act because it required an amendment process to allow future presidents to serve more than two terms", "isCorrect": false, "rationale": "The two-term tradition was a norm established by precedent, not a constitutional provision requiring amendment to override; Franklin Roosevelt served four terms in 1932–1944 without any amendment being required. The Twenty-Second Amendment (1951) made the norm a legal requirement after Roosevelt's death."}, {"text": "Washington's retirement was required by the Constitutional Convention's rule that the first president could only serve one term as a transitional figure", "isCorrect": false, "rationale": "No such rule existed; Washington served two full four-year terms by choice, not by any constitutional provision limiting the first president to one term."}], "id": "q06"}, {"question": "The source identifies three institutional foundations established in the 1790s that have structured American democracy ever since. Which of the following correctly identifies all three?", "options": [{"text": "Federalism, popular sovereignty, and the Electoral College", "isCorrect": false, "rationale": "While all three are important constitutional features, the source specifically identifies three foundations established/tested in the 1790s: the two-party system, judicial review, and peaceful transfer of power — not the broader structural features of federalism, popular sovereignty, and the Electoral College."}, {"text": "The two-party system, judicial review, and peaceful transfer of power between parties", "isCorrect": true, "rationale": "The source explicitly identifies 'three institutional foundations that have structured American democracy ever since': (1) the two-party system established by the Federalist/Democratic-Republican competition; (2) judicial review, articulated in Federalist No. 78 and assumed by 1800; (3) peaceful transfer of power, established (despite near-failure) by the election of 1800."}, {"text": "The separation of powers, checks and balances, and federalism", "isCorrect": false, "rationale": "These are constitutional design features established in 1787 by the Constitution itself — not specifically the institutional foundations the source identifies as emerging from the 1790s decade of governance and politics."}, {"text": "The national bank, the Hamilton-Jefferson debate, and the Whiskey Rebellion precedent", "isCorrect": false, "rationale": "While these were important events of the 1790s, the source specifically identifies two-party system, judicial review, and peaceful power transfer as the three lasting institutional foundations — not the specific events of Hamilton's economic program."}], "id": "q07"}, {"question": "Washington warned against both 'the spirit of party' and 'permanent alliances' in his Farewell Address. Both warnings were 'immediately overtaken by events.' What does this suggest about the relationship between Washington's advice and subsequent American history?", "options": [{"text": "Washington's advice was entirely wrong and had no lasting influence on American political culture or foreign policy", "isCorrect": false, "rationale": "The source states both warnings were 'immediately overtaken by events' but also that each 'became canonical wisdom' — the Farewell Address influenced the Monroe Doctrine, neutrality policy, and persistent anti-party sentiment. Being overtaken by events and remaining influential are not mutually exclusive."}, {"text": "Washington's warnings were honored more as normative ideals than as operational realities — the two-party system and entangling alliances both emerged despite his advice, but Americans continued to invoke his warnings as standards against which to measure political failure", "isCorrect": true, "rationale": "The source captures this precisely for parties: the election of 1800 'was fought between two organized parties' immediately after the anti-party warning; but the warning 'became canonical wisdom and is still quoted whenever Americans lament partisan polarization.' The gap between ideal and practice is itself a form of influence."}, {"text": "Washington's advice was successfully followed by all subsequent presidents until Woodrow Wilson joined the League of Nations in 1919", "isCorrect": false, "rationale": "Washington's advice on alliances was actually followed for over a century — the United States did not enter permanent military alliances. But Wilson's League attempt is an example of tension with the tradition, not a clean break; the Senate rejected the League partly because of Washington's anti-entanglement tradition."}, {"text": "Washington's warnings were specific to the 1796 political context and were not intended to apply to subsequent American generations", "isCorrect": false, "rationale": "The source states the Address was 'aimed at posterity as much as 1796 readers' — Washington was explicitly writing for future generations. The Address's durability as cited wisdom in every generation of American political debate reflects its trans-contextual ambitions."}], "id": "q08"}, {"question": "The Louisiana Purchase (1803) was authorized by Jefferson, who had argued throughout the 1790s that the Constitution permitted only what it explicitly stated. What does this episode reveal?", "options": [{"text": "Jefferson had secretly supported implied powers all along; the Louisiana Purchase revealed his true constitutional philosophy", "isCorrect": false, "rationale": "Jefferson's use of implied powers in the Louisiana Purchase was a genuine reversal driven by practical opportunity — the source frames it as evidence that 'governing required pragmatism,' not that he had been secretly Hamiltonian all along."}, {"text": "The demands of governing — including the irresistible opportunity of the Louisiana Purchase — demonstrated that even strict constructionists find implied powers necessary in practice, revealing the gap between constitutional philosophy and the pragmatic requirements of executive governance", "isCorrect": true, "rationale": "The source uses the Louisiana Purchase as the paradigm example: 'Jefferson found, like every ideologue who takes office, that governing required pragmatism. The Louisiana Purchase (1803), the single largest expansion of federal power in the early republic's history, was authorized by a president who had spent a decade arguing that the Constitution permitted only what it explicitly stated.'"}, {"text": "The Louisiana Purchase proved that the Constitution's necessary and proper clause explicitly authorized territorial expansion, vindicating Hamilton's original argument", "isCorrect": false, "rationale": "The Louisiana Purchase was not explicitly authorized by the necessary and proper clause or any specific constitutional provision; Jefferson himself knew it stretched strict construction to the breaking point and briefly considered seeking a constitutional amendment before proceeding on implied powers grounds — pragmatism, not textual validation."}, {"text": "Jefferson sought and received a constitutional amendment before completing the Louisiana Purchase, demonstrating his continued commitment to strict construction", "isCorrect": false, "rationale": "Jefferson did not seek a constitutional amendment; he proceeded with the purchase despite recognizing its tension with his strict construction philosophy. The urgency of Napoleon's offer — and the fear that delay might lose the opportunity — pushed Jefferson to act on pragmatic grounds."}], "id": "q09"}, {"question": "The Twelfth Amendment (1804) required separate ballots for president and vice president. What does the need for this amendment reveal about the original Constitution's design?", "options": [{"text": "The original Electoral College was designed to prevent political parties from ever forming, and the Twelfth Amendment was needed to accommodate the reality that parties had emerged", "isCorrect": true, "rationale": "The original system — electors casting two votes for president, runner-up becoming VP — was designed for a republic without parties, where electors would vote for the best qualified men; when organized parties emerged and coordinated all their electors to vote for both party candidates, the system produced ties. The Twelfth Amendment redesigned the process to account for partisan coordination."}, {"text": "The Twelfth Amendment was needed because the original Constitution had accidentally omitted the vice presidency entirely, requiring a correction", "isCorrect": false, "rationale": "The vice presidency existed in the original Constitution (Article II); it was the electoral mechanism for selecting the VP (the runner-up for president) that produced the 1800 problem, not an omission of the office itself."}, {"text": "The Twelfth Amendment reduced presidential power by requiring the vice president to be elected independently, limiting the president's ability to control the executive branch", "isCorrect": false, "rationale": "The Twelfth Amendment addressed the electoral mechanism (separate ballots), not the scope of presidential power over the VP; the relationship between president and VP was not substantially altered by requiring them to be voted for separately."}, {"text": "The Twelfth Amendment was a Federalist amendment designed to prevent Democratic-Republicans from ever winning the presidency again", "isCorrect": false, "rationale": "The Twelfth Amendment was passed by a Democratic-Republican-dominated Congress after the 1800 election; it corrected a technical flaw that had disadvantaged the Democratic-Republicans (producing the Jefferson-Burr tie) — it was not a Federalist measure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
