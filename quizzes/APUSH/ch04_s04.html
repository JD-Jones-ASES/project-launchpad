<script>
var QUESTIONS = [{"question": "The Second Great Awakening's 'theological core' was a 'doctrine of perfectionism.' Which of the following BEST explains why this theological doctrine had 'politically explosive' consequences?", "options": [{"text": "Perfectionism gave revivalists the authority to run for office as moral candidates, directly entering party politics and challenging Jacksonian Democrats.", "isCorrect": false, "rationale": "The source does not describe revivalists seeking elected office as a consequence of perfectionism. The political explosiveness was about how the doctrine authorized challenges to social conditions, not electoral participation by clergy."}, {"text": "By asserting that human beings could achieve moral perfection through divine grace and personal effort, perfectionism implied that social institutions — not just individuals — could be reformed, providing theological authorization for organized reform movements targeting temperance, education, and slavery.", "isCorrect": true, "rationale": "The source makes this chain explicit: perfectionism 'held that human beings, aided by divine grace, could achieve moral perfection in this life.' This was 'politically explosive' because 'if individuals could be saved from sin, then society could be reformed from vice.' The same logic that drove camp-meeting conversions drove the temperance, education, prison reform, and eventually abolitionist movements."}, {"text": "Perfectionism challenged Calvinist predestination in ways that directly threatened the authority of established churches, producing legal conflicts between denominations and state governments.", "isCorrect": false, "rationale": "While perfectionism did reject Calvinist predestination, the source does not describe legal conflicts between denominations and state governments as the 'politically explosive' consequence. The explosion was in the reform movements perfectionism authorized, not in denominational legal battles."}, {"text": "Perfectionism was politically explosive because it justified utopian communities that challenged existing property law, leading to legal conflicts between communal settlements and state authorities.", "isCorrect": false, "rationale": "While utopian communities did emerge from perfectionist premises, the source identifies the broader reform movement — temperance, education, prison reform, abolitionism — as the primary political consequence, not property-law conflicts from utopian settlements."}]}, {"question": "Charles Finney's revival theology is described as bringing 'forensic precision to the mechanics of conversion.' Which of the following BEST explains what distinguished Finney's approach from traditional Calvinist revivalism?", "options": [{"text": "Finney relied entirely on emotional spectacle — speaking in tongues, convulsive physical manifestations — rather than theological argument, making conversion a physical rather than intellectual experience.", "isCorrect": false, "rationale": "The emotional and physical manifestations described are associated with the western camp meetings (like Cane Ridge, Kentucky), not specifically with Finney. The source describes Finney as bringing 'forensic precision' — emphasizing rational argument and systematic technique, not primarily physical spectacle."}, {"text": "Finney rejected Calvinist predestination and asserted human agency in salvation, developing systematic 'new measures' to create the conditions for conversion through deliberate emotional and rhetorical techniques.", "isCorrect": true, "rationale": "The source describes Finney's innovation precisely: he rejected 'Calvinist doctrine of predestination' in favor of 'human agency,' and developed 'new measures' — protracted meetings, the anxious bench, emotional intensity through music and testimonials. His Rochester revivals (1830–31) produced 'mass conversions' and 'measurable declines in alcoholism' and social disorder — demonstrating that conversion was a producible outcome, not a predestined mystery."}, {"text": "Finney combined Calvinist predestination with frontier revivalism, arguing that God had predestined certain communities — rather than individuals — for salvation, making collective revival the path to social reform.", "isCorrect": false, "rationale": "Finney explicitly rejected Calvinist predestination — asserting human agency was the core of his theological innovation. He did not preserve predestination at a collective level; he rejected the doctrine entirely in favor of human choice."}, {"text": "Finney's approach was distinctive because he focused on converting the wealthy and powerful rather than ordinary people, reasoning that elite conversion would produce top-down social reform.", "isCorrect": false, "rationale": "The source describes Finney's Rochester revivals as producing 'mass conversions across the social spectrum' — not a strategy of targeting elites specifically. The conversion strategy was broadly social, not elite-directed."}]}, {"question": "Read the following passage: 'The temperance movement began as a campaign for moderation and evolved into a demand for total abstinence and, eventually, legal prohibition. The American Temperance Society, founded in 1826, enrolled more than a million members by 1833, making it the largest voluntary organization in the country.' Which of the following BEST contextualizes why the temperance movement was so broadly supported across different social groups?", "options": [{"text": "The temperance movement was broadly supported because Calvinist churches had always prohibited alcohol consumption, and the Second Great Awakening revived this traditional restriction.", "isCorrect": false, "rationale": "The source does not describe temperance as a revival of Calvinist prohibition. The source explains the movement's breadth through multiple different motivations across different social groups — not a single religious tradition."}, {"text": "It attracted support from multiple constituencies for different reasons: middle-class reformers and factory owners saw it as social control producing sober, disciplined workers; evangelical ministers saw alcohol as a gateway to other vices; and women found it a legitimate public platform at a time when direct political participation was denied them.", "isCorrect": true, "rationale": "The source explicitly identifies multiple different support bases: factory owners 'supported temperance campaigns because drunk workers broke machines and missed Mondays'; evangelical ministers 'supported them because alcohol was a gateway to other vices'; women found 'the temperance movement gave respectable women a legitimate public platform for moral advocacy.' The movement's breadth reflected its multiple, overlapping motivations."}, {"text": "The temperance movement was primarily an immigration-restriction movement in disguise, targeting Irish and German immigrant drinking cultures rather than alcohol consumption generally.", "isCorrect": false, "rationale": "The source does not frame the temperance movement as primarily anti-immigrant. While the movement did have nativist dimensions in some contexts, the source emphasizes its evangelical, middle-class, and women's-rights dimensions as its primary support bases."}, {"text": "The temperance movement succeeded because its goal — reducing alcohol consumption — was scientifically validated by medical evidence that contemporaries found convincing.", "isCorrect": false, "rationale": "The source does not cite scientific medical evidence as the movement's primary support base. Its breadth is explained through moral, economic, and gender motivations, not scientific validation."}]}, {"question": "Horace Mann argued that education was 'the great equalizer.' Based on the source, which of the following BEST evaluates this claim?", "options": [{"text": "Mann's claim was entirely accurate: the common school system he established provided equal access to quality education for all American children regardless of race or class.", "isCorrect": false, "rationale": "The source directly contradicts this: 'What Mann did not challenge was the racial exclusion built into most common school systems. Schools in the antebellum North were typically segregated; Black children were excluded from or confined to inferior schools.' Mann's 'universal vision had a racial limit built in.'"}, {"text": "Mann's claim was valid for middle- and upper-class white children, as his school reforms provided them higher-quality education at public expense, increasing their advantages over other groups.", "isCorrect": false, "rationale": "Mann's explicit goal was to provide education for the children of the poor alongside the rich — the claim was about equalizing opportunity across class lines. The limitation the source identifies was racial exclusion, not the preservation of class advantage."}, {"text": "Mann's vision was genuine — the common school would provide opportunity based on talent rather than inheritance — but the racial exclusion built into most common school systems meant that 'all children' in practice meant white children, limiting the equalizing vision to within-race class mobility.", "isCorrect": true, "rationale": "The source presents both dimensions: Mann genuinely argued the common school would be the 'great equalizer' where 'talent, not inheritance, would determine success.' But 'What Mann did not challenge was the racial exclusion built into most common school systems.' The equalization was real within the white population; its racial limit was the 'broader constraint of Northern reformism.'"}, {"text": "Mann's school reforms were ineffective at equalizing anything because opposition from wealthy families prevented property-tax funding, leaving common schools chronically underfunded.", "isCorrect": false, "rationale": "The source does not describe Mann's reforms as practically ineffective due to funding opposition. It describes them as successful within their racial limits: Mann doubled the Massachusetts school year, established normal schools, and his reports 'shaped school systems across the country for generations.'"}]}, {"question": "Dorothea Dix 'achieved major institutional reforms without the right to vote or hold office.' Which of the following BEST explains the strategies and ideological framework she used to make her campaign effective?", "options": [{"text": "Dix operated as a covert ally of sympathetic politicians who introduced her findings as their own legislation, concealing her role to avoid the political costs of associating reform with a woman.", "isCorrect": false, "rationale": "The source does not describe Dix's work as covert or as operated through sympathetic politicians who concealed her role. The source emphasizes her personal persuasion and documented moral argument as her direct methods."}, {"text": "Dix secured funding from wealthy industrialists who shared her interest in mental health reform as a way to reduce the social costs of mental illness on factory productivity.", "isCorrect": false, "rationale": "The source does not describe industrial funding as Dix's resource base. Her campaign operated through personal persuasion and documented moral argument directed at state legislatures, not through industrial philanthropy."}, {"text": "Dix used documented evidence (her Memorial presenting clinical findings on conditions in Massachusetts jails and almshouses) and the ideology of female moral superiority — claiming for women a special obligation toward the suffering — to make moral arguments to state legislatures that they could not easily dismiss.", "isCorrect": true, "rationale": "The source explains: Dix 'operated entirely without the right to vote or hold office, working through personal persuasion and documented moral argument.' She drew on 'the ideology of female moral superiority, directing her energy toward the suffering — objects that the domesticity ideology already assigned to female care.' Her documented Memorial presented findings with 'clinical precision and moral urgency,' arguing mental illness was a medical condition requiring humane state response."}, {"text": "Dix mobilized large public protests and mass petitions signed by hundreds of thousands of women, creating political pressure that legislators could not ignore.", "isCorrect": false, "rationale": "The source does not describe Dix using mass protests or large petition campaigns in the way that abolitionist and temperance campaigns used them. Her approach is characterized as 'personal persuasion and documented moral argument' — more targeted and individual than mass mobilization."}]}, {"question": "Brook Farm (1841–47) and the Oneida Community (1848–1881) both aimed to create 'perfect societies.' Which of the following BEST identifies what they shared and how they differed?", "options": [{"text": "Both were religious communities based on evangelical Protestantism; Brook Farm was more orthodox theologically, while Oneida rejected all religious authority and operated as a secular cooperative.", "isCorrect": false, "rationale": "The source presents Brook Farm as rooted in Transcendentalism (secular-leaning intellectual movement), not orthodox evangelical Protestantism. Oneida was explicitly theological — Noyes's perfectionist theology held that the community had already achieved holiness. The difference is not orthodox vs. secular."}, {"text": "Both rejected existing society as inadequate and sought to create intentional communities embodying perfect social organization; Brook Farm attempted to dissolve class distinctions between intellectual and manual labor without radical social departure, while Oneida adopted far more radical departures including 'complex marriage,' communal child-rearing, and eventually eugenics.", "isCorrect": true, "rationale": "The source identifies the shared premise (existing society too corrupted for incremental improvement; need to build anew) and the different approaches: Brook Farm 'combined manual labor with intellectual life, attempting to dissolve the class distinction' and was financially unviable (collapsed 1846). Oneida was 'more radical and more durable' — practicing complex marriage, communal child-rearing, shared property, and eventually eugenics, surviving 33 years before reorganizing as a silverware company."}, {"text": "Both were successful long-term experiments — Brook Farm survived into the 1870s, Oneida into the 1880s — demonstrating that utopian community organization could achieve economic viability.", "isCorrect": false, "rationale": "Brook Farm was financially unviable and collapsed in 1847 after a fire, lasting only six years. Only Oneida achieved long-term durability (33 years). Describing Brook Farm as a long-term success contradicts the source."}, {"text": "Both were primarily economic enterprises: Brook Farm organized agricultural production cooperatively, while Oneida organized manufacturing, with communal social life as a secondary feature.", "isCorrect": false, "rationale": "The source presents both communities primarily as social-spiritual experiments: Brook Farm was founded by Transcendentalist minister George Ripley and attracted literary figures; Oneida was rooted in Noyes's perfectionist theology. Economic organization was a means to social transformation, not the primary goal."}]}, {"question": "The source identifies the reform movements of the 1820s–1840s as forming a connected chain: temperance → education → prison/asylum reform → abolitionism → women's rights. Which of the following BEST explains the logic connecting these movements?", "options": [{"text": "Each reform movement was funded by the same group of wealthy philanthropists who sequentially adopted new causes as earlier ones were successfully resolved.", "isCorrect": false, "rationale": "The source does not describe the reform movements as sequentially funded by the same philanthropists resolving earlier causes. The connection is ideological — shared theological premises and organizational techniques — not a philanthropic funding sequence."}, {"text": "Each movement built on the perfectionist theological premise that human beings and institutions could be improved, and used the organizational techniques pioneered by earlier movements (mass petitions, tract distribution, women's auxiliaries), with women's political consciousness emerging through participation in reform campaigns that the formal political system excluded them from.", "isCorrect": true, "rationale": "The source traces exactly this chain: 'The Second Great Awakening's theological innovations — particularly perfectionism... provided the ideological engine for the antebellum reform movements.' The temperance movement 'pioneered organizational techniques... that later reform movements would adopt wholesale.' And 'The reform impulse... eventually produced the most radical reform demand of the era: the immediate abolition of slavery. It also produced women's political consciousness — the discovery, by women who organized reform campaigns, that they were excluded from the formal political system.'"}, {"text": "Each movement failed in its immediate goals but produced political organizations that merged into the Republican Party, which then advanced the combined reform agenda through legislative action.", "isCorrect": false, "rationale": "The Republican Party connection is not part of the source's argument about the reform impulse's internal logic. The source traces ideological and organizational connections between reforms, not a political party formation process."}, {"text": "The movements were connected by opposition: each reform faced the same Jacksonian Democratic coalition that defended slavery, alcohol, and the status quo, forcing reformers to unite against a common political enemy.", "isCorrect": false, "rationale": "The source does not frame the reform movements' connection as primarily organizational opposition to Jacksonianism. The connection is internal — shared theology, shared organizational techniques, shared personnel — rather than defined by a common external enemy."}]}, {"question": "The source describes the reform movements as 'middle-class, predominantly Northern, heavily female in membership, organized through voluntary associations outside formal government.' Which of the following BEST explains why reform took this particular social form?", "options": [{"text": "Reform was middle-class because working-class Americans were too occupied with survival to participate; Northern because the South had no social problems requiring reform; female-led because men were systematically excluded from voluntary associations.", "isCorrect": false, "rationale": "The source contradicts each of these: working-class communities were direct targets and sometimes participants in reform; the South had significant social problems but a different political culture; men were not excluded from reform associations. The explanation of reform's social form requires connecting the market revolution's social formations to the ideological possibilities created by perfectionism."}, {"text": "The market revolution created the material conditions — a salaried middle class, market surplus enabling leisure, spatial separation of home and work — that made organized voluntary associations possible, while perfectionism provided the ideological mandate and the exclusion of women from formal politics directed female energy toward moral reform outside government.", "isCorrect": true, "rationale": "The source's CED Theme Connection (ARC + SOC) makes exactly this argument: 'Reform was not simply an idea; it was a social formation — a new kind of organized civil society that the market revolution had made possible.' The middle-class had surplus resources for reform; perfectionism provided the mandate; women's exclusion from formal politics directed their energies to moral advocacy through voluntary associations."}, {"text": "Reform was middle-class because wealthy reformers specifically recruited middle-class participants as more credible advocates; Northern because Federal law prohibited Southern reform organizations; and female because the Seneca Falls Convention established that women should lead all reform movements.", "isCorrect": false, "rationale": "None of these explanations appear in the source. The Seneca Falls Convention (1848) came after most reform movements were already established, so it cannot explain their earlier social composition."}, {"text": "Reform took this form because evangelical ministers specifically targeted middle-class women as their primary converts, reasoning that female moral influence would spread reform through the family and then to husbands and children.", "isCorrect": false, "rationale": "While evangelical revivalism did disproportionately convert women, the source's explanation of reform's social form is structural — the market revolution's social formations — not primarily a clerical targeting strategy."}]}, {"question": "Finney's Rochester revivals (1830–31) were followed by 'measurable declines in alcoholism, sabbath-breaking, and public disorder.' A historian argues that this evidence demonstrates that religious enthusiasm and social reform were 'not separate projects but aspects of the same transformation.' Which of the following BEST evaluates this argument?", "options": [{"text": "The argument is too strong because the Rochester revivals produced only temporary changes; within a decade, disorder and alcoholism had returned to pre-revival levels.", "isCorrect": false, "rationale": "The source does not describe the Rochester revival's effects as temporary or reversed within a decade. The source presents Rochester as a successful model that demonstrated the connection between religious enthusiasm and social change, not as a case of short-lived effect."}, {"text": "The argument is supported by the evidence: Finney's revivals produced both individual conversions and measurable social changes in public behavior, demonstrating that the perfectionist theology driving personal conversion was the same theology authorizing organized social reform — they shared the same causal logic.", "isCorrect": true, "rationale": "The source endorses this argument explicitly: 'The Rochester revival became a model: religious enthusiasm and social reform were not separate projects but aspects of the same transformation.' The same perfectionist logic that drove individual conversion toward sobriety drove organized campaigns for temperance, education, and abolitionism — individual and social reform were theologically unified."}, {"text": "The argument is valid for temperance but does not apply to the other reform movements, which drew on secular Enlightenment philosophy rather than evangelical perfectionism.", "isCorrect": false, "rationale": "The source presents all the major reform movements — temperance, education, prison reform, abolitionism, women's rights — as drawing from the same perfectionist theological source. The source does not present abolitionism or education reform as primarily secular Enlightenment projects."}, {"text": "The argument is speculative because Rochester's decline in disorder could be attributed to economic growth rather than religious conversion, making it impossible to establish causation.", "isCorrect": false, "rationale": "Whether or not this methodological objection is historically valid, the source presents the Rochester revival's social effects as evidence for the theology-reform connection, not as a spurious correlation. The question is asking you to evaluate the source's argument, not to offer alternative historical explanations."}]}, {"question": "The source states that the Second Great Awakening's reform impulse 'eventually produced women's political consciousness — the discovery, by women who organized reform campaigns, that they were excluded from the formal political system that governed what they sought to change.' Which of the following events BEST illustrates this insight in concrete historical terms?", "options": [{"text": "Women's participation in temperance campaigns taught them lobbying techniques they then applied to suffrage advocacy, transferring skills from one cause to another.", "isCorrect": false, "rationale": "Skill transfer is part of the story, but the source's specific insight is about exclusion producing consciousness — women discovered through reform work that they lacked the formal political rights needed to achieve their reform goals. The temperance movement was the 'training ground,' but the specific discovery the source describes is more directly illustrated by another event."}, {"text": "Lucretia Mott and Elizabeth Cady Stanton were barred from participating in the World Anti-Slavery Convention floor in London (1840) because of their sex, an experience that crystallized the connection between antislavery principles and women's rights, eventually producing the Seneca Falls Convention (1848).", "isCorrect": true, "rationale": "While this event is described in the next section (ch04_s05), it precisely illustrates this section's insight: women who organized to end slavery discovered that the same logic of human equality applied to their own exclusion from political participation. The source's general claim — that women discovered their political exclusion through reform organizing — finds its most direct historical illustration in this kind of experience."}, {"text": "Dorothea Dix's successful state hospital campaigns demonstrated that women could achieve reform goals without the vote, disproving the connection between political exclusion and women's rights advocacy.", "isCorrect": false, "rationale": "The source presents Dix's success as illustrating 'both the possibilities and the limits of reform politics for women' — she achieved institutional change but only by working within the ideology of female moral superiority rather than claiming political equality. This illustrates the constraint, not a disproof of the connection between exclusion and rights consciousness."}, {"text": "The Lowell mill girls' strikes in 1834 and 1836 demonstrated that working-class women could exercise political voice through economic action even without formal suffrage.", "isCorrect": false, "rationale": "The Lowell strikes are from the market revolution section (ch04_s02) and are not cited by the source in this context. The strikes were about labor conditions, not women's political consciousness arising specifically from reform organizing exclusion — the specific insight the source identifies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
