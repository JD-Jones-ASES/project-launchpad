        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; Articles of Confederation and the Constitutional Convention</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Read the following from the Articles of Confederation: 'Each state retains its sovereignty, freedom, and independence, and every Power, Jurisdiction, and right, which is not by this confederation expressly delegated to the United States, in Congress assembled.' What does this article reveal about the fundamental design principle of the Articles?", "options": [{"text": "The Articles deliberately created a powerful central government capable of taxing citizens directly and enforcing its laws against the states", "isCorrect": false, "rationale": "Article II demonstrates the opposite: sovereignty remained with the states, and Congress had only delegated powers. The Articles deliberately avoided a strong central government in reaction to the colonial experience of distant British authority."}, {"text": "The Articles deliberately concentrated sovereignty in the individual states rather than in a national government, reflecting the revolutionaries' fear of centralized authority after their experience with British rule", "isCorrect": true, "rationale": "Article II explicitly locates sovereignty in each state, retaining for states every power not expressly delegated. The source explains this design: 'The Articles' architects deliberately built a government incapable of those abuses — and in doing so, they built one incapable of governing.'"}, {"text": "The Articles created a national government with enumerated powers and reserved all unenumerated powers to the people rather than to the states", "isCorrect": false, "rationale": "This describes the Tenth Amendment to the Constitution (1791), not the Articles of Confederation; under the Articles, unenumerated powers went to the states, not the people, and the distinction is critical."}, {"text": "The Articles required unanimous consent of all states for any legislation, making it nearly impossible to pass laws of any kind", "isCorrect": false, "rationale": "While the Articles did require unanimous consent for amendments and nine states for major decisions, ordinary legislation required a majority; the source distinguishes between amendment procedures and legislative procedures."}]}, {"question": "Shays' Rebellion (1786–87) alarmed the propertied class and accelerated the calling of the Philadelphia Convention. Which of the following BEST explains why the rebellion had this effect?", "options": [{"text": "Shays' Rebellion demonstrated that state governments were too powerful and needed to be subordinated to a stronger federal authority to prevent future rebellions", "isCorrect": false, "rationale": "The rebellion was actually suppressed by state militia — the problem was that the federal government (Confederation Congress) could not act; the lesson was about federal weakness, not excessive state power."}, {"text": "Shays' Rebellion demonstrated that the Confederation government could not suppress armed domestic resistance, convincing property owners that fundamental reform was needed to protect their economic interests", "isCorrect": true, "rationale": "The source states that the rebellion 'terrified property owners across the country' and that Washington and Madison saw it as proof of the political system's vices requiring reform — it demonstrated the Confederation could not enforce order, directly motivating the Philadelphia Convention."}, {"text": "Shays' Rebellion was a British-organized provocation designed to embarrass the new republic and justify renewed British intervention in American affairs", "isCorrect": false, "rationale": "The source describes Shays' Rebellion as an organic uprising of debt-burdened farmers and veterans facing economic hardship — there is no claim of British organization or foreign provocation."}, {"text": "Shays' Rebellion persuaded small farmers and debtors that the Articles were too protective of property rights and needed amendment to provide greater economic relief", "isCorrect": false, "rationale": "The rebellion represented the interest of debtors seeking relief from property rights — the opposite perspective from what motivated the Philadelphia Convention; the Convention was accelerated by the fear of debtor majorities threatening property rights, not by debtors seeking constitutional reform."}]}, {"question": "The Three-Fifths Compromise counted each enslaved person as three-fifths of a free person for congressional apportionment. Which of the following BEST describes the political consequence of this compromise?", "options": [{"text": "It reduced Southern states' congressional representation because enslaved people were not counted as full persons, limiting the political power of slaveholders", "isCorrect": false, "rationale": "The compromise increased Southern representation relative to what they would have had if enslaved people were not counted at all; slaveholders gained additional representatives in the House (and thus additional electoral votes) precisely because their enslaved property was counted — even at three-fifths — for apportionment."}, {"text": "It gave Southern slave states substantially more congressional representation than their free population alone would have justified, amplifying slaveholder political power for the next seventy years", "isCorrect": true, "rationale": "The source states the Three-Fifths Compromise 'gave the slave states substantial extra representation in Congress for the next seventy years' — Southern states gained House seats and electoral votes based on enslaved populations who had no political rights, amplifying slaveholder power beyond what free population alone warranted."}, {"text": "It resolved the tension between large and small states by ensuring that the Senate and House used different counting methods", "isCorrect": false, "rationale": "The resolution of large vs. small state tension was the Great Compromise (bicameral legislature with population-based House and equal-representation Senate); the Three-Fifths Compromise specifically addressed how to count enslaved people, not the large/small state debate."}, {"text": "It was a temporary measure scheduled to expire in 1808 along with the slave trade protections", "isCorrect": false, "rationale": "The slave trade protection expired in 1808; the Three-Fifths Compromise was a permanent feature of the Constitution and remained in effect until the Fourteenth Amendment (1868) following the Civil War."}]}, {"question": "The Northwest Ordinance of 1787 established a template for organizing new territories into states and banned slavery in the Northwest Territory. What was the broader significance of this Confederation Congress achievement?", "options": [{"text": "It demonstrated that the Confederation Congress was capable of effective governance in all areas and that the critics of the Articles of Confederation were wrong about its weaknesses", "isCorrect": false, "rationale": "The Northwest Ordinance was the Confederation's most significant success, but it was an isolated achievement in the area where Congress had strongest authority (western territory management); it did not demonstrate that the Confederation could tax, regulate commerce, or enforce its laws in other domains — the overall critique of the Articles remained valid."}, {"text": "It established the first federal restriction on slavery's expansion and created the template for orderly westward expansion used until the Civil War — the Confederation's most durable achievement", "isCorrect": true, "rationale": "The source explicitly describes the Northwest Ordinance as 'the Confederation Congress's most durable achievements' — it banned slavery in the Northwest Territory (the first federal restriction on slavery's expansion) and established the pattern of territory-to-state transition used for decades."}, {"text": "It resolved the border disputes between Virginia and Pennsylvania that had nearly caused civil war between the states under the Articles", "isCorrect": false, "rationale": "The Northwest Ordinance dealt with the territory north of the Ohio River (future Ohio, Indiana, Illinois, Michigan, Wisconsin) — not border disputes between Virginia and Pennsylvania; no near-civil-war border dispute of this kind is described in the source."}, {"text": "It effectively ended slavery in the United States by prohibiting its expansion beyond the existing southern states, beginning an immediate process of national emancipation", "isCorrect": false, "rationale": "The Ordinance banned slavery only in the Northwest Territory; slavery continued in the existing states and in the territories that would become the Southwest. It was the first federal restriction on expansion, not a national emancipation measure."}]}, {"question": "The Philadelphia Convention (1787) was officially called to 'revise' the Articles of Confederation. Within days, delegates proposed replacing the Articles entirely with the Virginia Plan. What does this transition reveal about the Convention?", "options": [{"text": "The Convention delegates had been secretly instructed by their state legislatures to replace the Articles, making the 'revision' language a cover story for a pre-planned constitutional revolution", "isCorrect": false, "rationale": "The source presents the Virginia Plan as a proposal that emerged within days of convening, not as a pre-arranged secret plan; Madison drafted the Virginia Plan in advance but the transition from revision to replacement required persuading other delegates, which was a real political process."}, {"text": "The delegates quickly concluded that the Articles' structural defects — no taxation, no commerce power, no executive, supermajority requirements — were too fundamental for amendment and required a new document", "isCorrect": true, "rationale": "The source describes Madison's Virginia Plan as 'something far more radical: scrapping the Articles entirely' with independent taxing power, a bicameral legislature, an executive, and a judiciary — implying the delegates rapidly concluded that revision was insufficient and replacement was required."}, {"text": "The Convention delegates were legally authorized to write a new constitution because the Articles themselves included a provision for complete replacement", "isCorrect": false, "rationale": "The Articles required unanimous consent for amendment — they had no replacement provision. The Convention exceeded its mandate by proposing a new document rather than revision; the new Constitution was submitted for ratification by conventions (9 of 13 states) rather than through the Articles' amendment process, itself a departure from legality."}, {"text": "The Virginia Plan was simply a set of proposed amendments to strengthen the Articles, not a new constitutional document", "isCorrect": false, "rationale": "The source explicitly describes the Virginia Plan as 'scrapping the Articles entirely' — it created an independent taxing power, bicameral legislature apportioned by population, executive, and judiciary; these were not amendments to the Articles but a fundamentally different structure."}]}, {"question": "The Great Compromise resolved the large state vs. small state conflict at the Philadelphia Convention. Which institution did it create?", "options": [{"text": "A Supreme Court with one justice per state, ensuring equal judicial representation regardless of population", "isCorrect": false, "rationale": "The Supreme Court was established by Article III of the Constitution but not as part of the Great Compromise; the Compromise specifically resolved the legislative branch controversy by creating a bicameral Congress with different representation formulas."}, {"text": "A bicameral Congress with a House of Representatives apportioned by population (favoring large states) and a Senate with two seats per state (favoring small states)", "isCorrect": true, "rationale": "The source describes the Great Compromise (proposed by Connecticut delegate Roger Sherman) as creating exactly this structure: 'the House of Representatives apportioned by population, the Senate with two seats per state regardless of size' — giving both large and small states an institution where their interests were protected."}, {"text": "An Electoral College in which each state received votes equal to its combined House and Senate representation, balancing large-state population advantage against small-state senate equality", "isCorrect": false, "rationale": "The Electoral College did emerge from the Convention (indirectly incorporating the Great Compromise's logic), but the Great Compromise itself specifically created the bicameral legislature — the Electoral College was a separate design decision, though related."}, {"text": "A Council of Revision combining executive and judicial officials to review all federal legislation before enactment", "isCorrect": false, "rationale": "A Council of Revision was proposed by Madison in the Virginia Plan but was rejected by the Convention; the Great Compromise addressed the legislative branch composition question, not the executive/judicial review proposal."}]}, {"question": "The Constitution's 'necessary and proper' clause (Article I, Section 8) was described by its critics as a 'blank check' that would swallow states' reserved powers. Based on the source, which of the following BEST explains this concern?", "options": [{"text": "The clause authorized Congress to impose any tax it deemed necessary, eliminating states' ability to levy their own taxes", "isCorrect": false, "rationale": "The necessary and proper clause expanded Congress's legislative authority in relation to its enumerated powers, but did not specifically eliminate state taxation; states retained concurrent taxing authority under the Constitution."}, {"text": "The clause authorized Congress to pass any law reasonably connected to executing its enumerated powers, potentially giving Congress authority over virtually any subject if a connection to an enumerated power could be argued", "isCorrect": true, "rationale": "The source describes this as what critics called a 'blank check that would swallow the states' reserved powers' — if Congress could do anything 'necessary and proper' for executing its enumerated powers, the range of potential federal action was nearly unlimited, threatening state autonomy. Hamilton's loose construction argument in the bank debate would later validate this concern."}, {"text": "The clause gave the president unilateral authority to issue executive orders without congressional approval in domestic policy matters", "isCorrect": false, "rationale": "The necessary and proper clause applies to Congress's legislative power, not the president's executive authority; executive orders and unilateral presidential power are separate constitutional questions."}, {"text": "The clause required states to enforce all federal laws within their borders, eliminating states' ability to resist federal policies they opposed", "isCorrect": false, "rationale": "This describes the supremacy clause more than the necessary and proper clause; they are distinct provisions with different functions, though critics of the Constitution worried about both."}]}, {"question": "A student argues: 'The Constitution's framers were pure idealists who designed a government to protect liberty without compromise.' Which of the following evidence from the source MOST effectively challenges this claim?", "options": [{"text": "The Convention met in secret, suggesting the framers had something to hide from the public", "isCorrect": false, "rationale": "The Convention's secrecy was a pragmatic decision to allow frank debate; it was not evidence of dishonest compromise in the idealistic sense the student's claim implies — it was a procedural choice, not a substantive compromise of principle."}, {"text": "The Three-Fifths Compromise, the Slave Trade Compromise protecting the trade until 1808, and the supremacy clause all represent specific compromises with slavery that embedded protections for an institution incompatible with the equal liberty the Constitution proclaimed", "isCorrect": true, "rationale": "The source explicitly states: 'the Constitution was also a series of compromises with slavery whose long-term cost... was paid most heavily by the people enslaved within it. The same document that made the United States a viable nation simultaneously embedded protections for an institution incompatible with the equal liberty it proclaimed.'"}, {"text": "The delegates replaced the Articles with a new document, exceeding their official mandate to revise the Articles, which showed disregard for legal process", "isCorrect": false, "rationale": "While technically beyond the Convention's mandate, this is a procedural critique rather than evidence that the framers were not idealists; one could be an idealist who thought a new document was necessary regardless of formal mandate."}, {"text": "The Convention excluded women and non-property-owners from participating in the drafting process", "isCorrect": false, "rationale": "While accurate, this is a structural feature of the era rather than specific evidence against the student's particular claim about idealism vs. compromise; the source's direct critique of the student's claim focuses on the slavery compromises embedded in the Constitution's text."}]}, {"question": "Under the Articles of Confederation, the Congress could manage western territories but had no power to tax or regulate commerce. Which of the following BEST explains why the taxation limitation was most fatal to the Confederation's effectiveness?", "options": [{"text": "Without taxing power, Congress could not pay war debts, could not maintain a standing army, and could not fund the daily operations of the federal government — leaving it dependent on state contributions that states frequently ignored", "isCorrect": true, "rationale": "The source describes the financial crisis: 'The Continental Congress owed millions to foreign creditors and to the soldiers who had fought the war.' States could ignore requisitions. Shays' Rebellion grew directly from the fiscal crisis. The inability to tax meant the Confederation literally could not function as a government."}, {"text": "Without taxing power, Congress could not regulate foreign trade, causing a severe trade deficit that drained American specie to European manufacturers", "isCorrect": false, "rationale": "Foreign trade regulation was a separate limitation (the commerce power); the taxation limitation was about revenue for government operation — both were serious problems but the source emphasizes taxation as the fundamental fiscal constraint."}, {"text": "Without taxing power, Congress could not fund the Northwest Ordinance's administration of western territories — the one area where it had success", "isCorrect": false, "rationale": "The Northwest Ordinance was one of the Confederation's genuine achievements; the source does not suggest it was unfunded due to taxation limitations. The lack of taxation created general fiscal crisis but the Ordinance succeeded as a legislative achievement."}, {"text": "Without taxing power, Congress could not maintain diplomatic missions abroad, ending American representation in European capitals and isolating the republic internationally", "isCorrect": false, "rationale": "While the Confederation had financial difficulties with foreign missions, the source attributes the fiscal crisis primarily to unpaid war debts, ungovernable state requisitions, and Shays' Rebellion — not specifically to diplomatic isolation as the primary consequence."}]}, {"question": "The Slave Trade Compromise protected the importation of enslaved people until 1808. Which of the following BEST describes the political calculus behind this compromise?", "options": [{"text": "Northern delegates agreed to the compromise because they believed the slave trade would die out naturally by 1808 without the need for legislative action", "isCorrect": false, "rationale": "Northern delegates may have hoped the trade would wane, but the source frames the compromise as a political deal — not an optimistic prediction. Several delegates wanted immediate ban authority; Southern delegates threatened to leave the Convention if it was granted; the compromise was a transaction, not a forecast."}, {"text": "Several delegates wanted to allow Congress to ban the slave trade immediately; Southern delegates threatened to leave the Convention if such power were granted, producing a twenty-year protection as the price of Southern participation in the new union", "isCorrect": true, "rationale": "The source states exactly this: 'Several delegates wanted to allow Congress to ban the importation of enslaved people immediately; Southern delegates threatened to leave the Convention if any such power were granted' — producing the compromise that prohibited congressional action against the trade before 1808."}, {"text": "The compromise was a moral victory for abolitionists because it set a specific end date for the trade, demonstrating the Convention's commitment to eventual emancipation", "isCorrect": false, "rationale": "While the 1808 date was later used by abolitionists to argue for congressional action, the source presents the compromise as a protection for the slave trade, not a moral victory; it gave the trade a twenty-year guarantee, not a commitment to end it."}, {"text": "The compromise satisfied both sides by allowing Congress to regulate (though not ban) the slave trade between 1787 and 1808 through tariffs and inspection requirements", "isCorrect": false, "rationale": "The compromise was a prohibition on Congress banning the trade — not an authorization to regulate it; Congress was prohibited from taking action against the importation of enslaved people before 1808."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
