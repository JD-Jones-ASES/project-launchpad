<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">AP United States History &mdash; The Conquest of the West</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Pacific Railway Acts of 1862 and 1864 financed the transcontinental railroad primarily through which mechanism?", "options": [{"text": "Direct cash appropriations drawn from a new federal income tax", "isCorrect": false, "rationale": "No federal income tax existed in 1862–1864; it was abolished after the Civil War and not permanently established until the 16th Amendment (1913)."}, {"text": "Federal land grants in alternating square-mile sections and bond loans scaled to terrain difficulty", "isCorrect": true, "rationale": "The acts granted roughly ten million acres in a checkerboard land-grant pattern and loaned $16,000–$48,000 per mile in government bonds, making the federal government capitalism's enabling partner rather than a detached regulator."}, {"text": "Tariff revenues set aside in a dedicated railroad construction fund", "isCorrect": false, "rationale": "Tariff revenues funded general federal expenditures; no dedicated railroad fund was created. The subsidy mechanism was land grants and bond loans, not tariff set-asides."}, {"text": "Mandatory purchase of railroad stock by eastern commercial banks under federal charter", "isCorrect": false, "rationale": "No such mandatory bank-purchase scheme existed. Investment came through private capital markets and, critically, through inflated construction billing via schemes like the Crédit Mobilier."}]}, {"question": "Read the following excerpt from the source text: 'The transcontinental railroad…accelerated the incorporation of the entire trans-Mississippi West into the national commodity economy.' Which of the following BEST identifies a consequence of this incorporation that the source describes?", "options": [{"text": "Texas cattle ranchers gained new markets in the East as herds could be driven to rail terminals and shipped to Chicago slaughterhouses", "isCorrect": true, "rationale": "The source explicitly connects railroad access to the cattle industry, noting that ranchers drove herds to Abilene or Dodge City terminals to ship east — a direct product of western incorporation into the commodity economy."}, {"text": "Plains Indian nations were compensated with guaranteed annuity payments that fully offset the loss of bison habitat", "isCorrect": false, "rationale": "The source describes annuity payments as 'chronically underfunded and subject to corruption,' not as adequate compensation for dispossession."}, {"text": "The Homestead Act allowed most Plains settlers to achieve economic independence because 160 acres was sufficient for viable farming", "isCorrect": false, "rationale": "The source explicitly states that on the semiarid plains west of the 100th meridian, 160 acres was 'frequently too small to be economically viable,' undercutting the independent-farmer ideal."}, {"text": "Freight competition between multiple transcontinental lines permanently eliminated railroad monopoly power", "isCorrect": false, "rationale": "The source notes that freight rates fell on routes served by rail competition, but this does not mean monopoly power was eliminated — many regions had only one carrier, a structural dependency the source emphasizes as the foundation of agrarian radicalism."}]}, {"question": "The Crédit Mobilier scandal of 1872 revealed which characteristic feature of Gilded Age political economy, according to the source?", "options": [{"text": "That railroad executives used political corruption to defeat competing transportation technologies such as canals", "isCorrect": false, "rationale": "Crédit Mobilier involved inflated construction billing and distribution of discounted stock to congressmen — not suppression of rival transport modes."}, {"text": "That the federal government did not stand apart from industrial capitalism but served as capitalism's enabling partner", "isCorrect": true, "rationale": "The source explicitly frames Crédit Mobilier as illustrating 'a central feature of Gilded Age political economy: the federal government did not stand apart from industrial capitalism; it was capitalism's enabling partner.'"}, {"text": "That immigration restriction was driven primarily by economic competition between railroad workers of different ethnicities", "isCorrect": false, "rationale": "Crédit Mobilier concerned construction billing fraud and congressional bribery, not immigration policy or labor competition between ethnic groups."}, {"text": "That western settlement succeeded primarily because Congress refused to allow monopoly control of transcontinental routes", "isCorrect": false, "rationale": "The reverse is true: Crédit Mobilier shows Congress actively facilitating monopoly conditions through favorable legislation and accepting corrupted stock shares."}]}, {"question": "The Dawes Severalty Act of 1887 was supported by reformers who believed it would benefit Native Americans. Which of the following BEST explains why the act's actual effects were catastrophic?", "options": [{"text": "The act forced Native Americans off reservation land entirely, leaving them without any federal land allocation", "isCorrect": false, "rationale": "The act did allocate individual allotments (160 acres per household), but the 'surplus' land beyond what allotments required was sold to white settlers — resulting in massive land loss, not total removal."}, {"text": "All land beyond individual allotments was declared 'surplus' and sold to white settlers and speculators, resulting in the loss of approximately 90 million of 138 million acres by 1934", "isCorrect": true, "rationale": "The source explicitly states that 'surplus' reservation land was opened to white settlement and that Native Americans lost about 90 million of 138 million acres between 1887 and 1934 — the allotment mechanism completed the land dispossession that military conquest had begun."}, {"text": "Native Americans rejected the individual allotments and chose to retain communal land ownership, preventing any transition to farming", "isCorrect": false, "rationale": "The catastrophe was not rejection but the structural mechanism itself: the 'surplus' designation stripped far more land than the allotments provided, regardless of individuals' choices."}, {"text": "The act was immediately ruled unconstitutional, creating legal chaos that allowed speculators to seize reservation land without any federal authorization", "isCorrect": false, "rationale": "The Dawes Act was enforced for nearly five decades until the Indian Reorganization Act of 1934 reversed it; it was never ruled unconstitutional."}]}, {"question": "Frederick Jackson Turner's 1893 Frontier Thesis argued that the frontier experience had shaped a distinctively American democratic character. Historians have criticized this thesis primarily because:", "options": [{"text": "Turner overestimated the economic importance of agriculture relative to mining and ranching on the frontier", "isCorrect": false, "rationale": "The main historical critique of Turner is not about the relative weight of economic sectors but about his erasure of indigenous peoples from the frontier narrative."}, {"text": "Turner's thesis treated the West as empty land awaiting American civilization, erasing indigenous peoples who were sovereign nations with their own history", "isCorrect": true, "rationale": "The source explicitly identifies this as the thesis's central flaw: 'it treated the West as empty land awaiting American civilization, erasing indigenous peoples who were neither wilderness nor obstacle but nations with their own sovereignty.'"}, {"text": "Turner incorrectly identified 1890 as the year the frontier closed, when the Census showed significant unsettled land remaining", "isCorrect": false, "rationale": "The 1890 Census declaration that the frontier line no longer existed is historically accurate — the critique of Turner concerns his erasure of indigenous peoples, not the census date he used."}, {"text": "Turner failed to account for the role of European immigrants in settling the frontier, attributing their contributions to native-born Americans", "isCorrect": false, "rationale": "While Turner did underemphasize immigrant contributions, the dominant scholarly critique is his erasure of indigenous peoples and his treatment of the West as a 'free' or 'empty' space."}]}, {"question": "The Battle of Little Bighorn (1876) was the largest Native military victory of the Plains Wars. Which of the following BEST explains why this victory did not produce a negotiated settlement or lasting military relief for Plains nations?", "options": [{"text": "The Lakota and Cheyenne commanders Sitting Bull and Crazy Horse were killed in the battle, leaving their forces leaderless", "isCorrect": false, "rationale": "Both leaders survived Little Bighorn; Crazy Horse surrendered in 1877 and was killed in custody, while Sitting Bull fled to Canada before eventually surrendering in 1881."}, {"text": "The defeat of Custer's regiment politically discredited advocates of treaty-making and catalyzed overwhelming military retaliation that forced most Lakota onto reservations within a year", "isCorrect": true, "rationale": "The source states that 'the army responded with overwhelming force, and within a year most of the Lakota had surrendered and been returned to reservation life' — the strategic outcome was reversed despite the military victory."}, {"text": "The Grant administration used Little Bighorn as a pretext to propose a new and more generous version of the Fort Laramie Treaty", "isCorrect": false, "rationale": "The opposite occurred: the Grant administration had already failed to enforce the 1868 Fort Laramie Treaty, and Little Bighorn intensified rather than moderated military pressure on Plains nations."}, {"text": "The battle was a tactical draw because Custer's regiment escaped with fewer losses than originally reported", "isCorrect": false, "rationale": "Five companies of the Seventh Cavalry — 210 men — were annihilated. The battle was an unambiguous Native military victory, which made the subsequent political and military backlash more intense."}]}, {"question": "The Wounded Knee Massacre of December 29, 1890, is described in the source as a massacre rather than a battle. Which of the following BEST supports that characterization?", "options": [{"text": "The Lakota at Wounded Knee were armed with rifles and had fortified their position against an anticipated army assault", "isCorrect": false, "rationale": "The source describes an 'attempt to disarm' the Lakota encampment — the army was there to confiscate weapons, not respond to a fortified military position."}, {"text": "Between 150 and 300 Lakota men, women, and children were killed during an attempt to disarm a band participating in a religious movement", "isCorrect": true, "rationale": "The source specifies that soldiers opened fire during a disarmament operation against a band participating in the Ghost Dance, killing 150–300 people including women and children — the civilian character of the dead and the context of attempted disarmament define it as a massacre."}, {"text": "The army's attack was unauthorized by the federal government and the officers involved were later court-martialed", "isCorrect": false, "rationale": "The army awarded twenty Medals of Honor to participants — the opposite of court-martial — indicating federal sanction rather than unauthorized conduct."}, {"text": "The Ghost Dance was a recognized armed uprising that had already attacked several military installations before Wounded Knee", "isCorrect": false, "rationale": "The Ghost Dance was a messianic religious revival; the source notes the army 'interpreted' it as a prelude to insurrection — it was not an armed uprising that had conducted prior attacks."}]}, {"question": "Which of the following BEST explains why the open-range cattle industry collapsed by 1890?", "options": [{"text": "Federal legislation banned cattle drives north of Texas to protect homesteaders' crops", "isCorrect": false, "rationale": "No federal law banned cattle drives; the open range ended because of the brutal winter of 1886–87, the arrival of barbed-wire fencing homesteaders, and the shift to managed ranching — not legislation."}, {"text": "The brutal winter of 1886–87 killed up to 90 percent of range cattle in some areas, followed by the spread of homesteader barbed-wire fencing that closed the public grazing range", "isCorrect": true, "rationale": "The source identifies these two causes directly: the catastrophic 1886–87 winter and the subsequent 'arrival of homesteaders with barbed wire' that ended the open range era by 1890."}, {"text": "Railroad rate increases made it unprofitable to ship cattle to eastern slaughterhouses, eliminating the market that cattle drives served", "isCorrect": false, "rationale": "The source describes freight rates falling with railroad expansion, not rising. The cattle industry's collapse was environmental and agricultural, not caused by railroad pricing."}, {"text": "The discovery of silver and gold in Texas drew cowboys away from cattle work into mining, reducing the labor supply for drives", "isCorrect": false, "rationale": "The source places the major mining rushes in Nevada, Colorado, Montana, and the Black Hills of Dakota — not Texas. The open range collapse was not a labor-supply problem."}]}, {"question": "The source notes that approximately a quarter of cowboys on the cattle drives were Black men or Mexican vaqueros, 'a demographic reality that dime novels systematically erased.' What historical process does this observation illustrate?", "options": [{"text": "The deliberate suppression of western history by eastern newspaper editors who feared westward migration would depopulate eastern cities", "isCorrect": false, "rationale": "The erasure of non-white cowboys reflects racial mythology-making about the frontier, not a conspiracy by eastern editors to prevent migration."}, {"text": "The construction of a racialized mythology of the 'frontier' as a space of white masculine heroism that obscured the multiracial labor that actually built the West", "isCorrect": true, "rationale": "Dime novels erased the demographic reality of Black and Mexican cowboys in order to construct the frontier as a white masculine space — an ideological project that fed Turner-style narratives and justified racial hierarchy."}, {"text": "The economic dominance of Black and Mexican ranchers who owned most Texas cattle herds and therefore controlled the narrative of cattle-drive history", "isCorrect": false, "rationale": "Black cowboys and vaqueros were workers on drives, not owners of herds. The erasure operated against working-class non-white labor, not against wealthy ranchers."}, {"text": "Federal census-taking errors that undercounted non-white westerners and therefore produced misleading population statistics for historians to use", "isCorrect": false, "rationale": "The dime-novel erasure was a cultural and literary phenomenon, not a census error; it was a deliberate narrative choice to produce a white frontier mythology."}]}, {"question": "A student argues: 'The Homestead Act of 1862 successfully fulfilled the free-labor vision by turning landless workers into independent farmers.' A historian would most likely revise this claim by noting that:", "options": [{"text": "The act applied only to male heads of household and therefore excluded women from the benefits of western land distribution", "isCorrect": false, "rationale": "The source states the act offered land to 'any head of household,' and the definition included women and freed people after 1865 — the act's limits were ecological and structural, not primarily gendered in eligibility."}, {"text": "On the semiarid plains west of the 100th meridian, 160 acres was frequently too small to be viable, drought broke many families, and speculators often acquired the best land before homesteaders arrived", "isCorrect": true, "rationale": "The source directly states these three limiting factors: the 100th meridian's semiarid conditions, the viability problem of 160-acre units, drought failures, and speculator pre-emption — all of which meant 'a large proportion ended up in the hands of corporations and large landholders rather than family farmers.'"}, {"text": "Congress repealed the Homestead Act in 1880 after evidence emerged that most claimants had sold their claims within two years", "isCorrect": false, "rationale": "The Homestead Act was not repealed in 1880; the source states it was 'effectively superseded' in 1934 and that approximately 270 million acres were eventually claimed under it between 1862 and 1934."}, {"text": "The railroads sued the federal government for taking land they had already purchased under the Pacific Railway Acts, preventing homesteaders from settling the best locations", "isCorrect": false, "rationale": "Railroads received land grants from the federal government; they did not pre-purchase the land. The checkerboard grant pattern and speculator behavior are described differently in the source."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
