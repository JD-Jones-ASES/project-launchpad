<script>
var QUESTIONS = [{"question": "The Neutrality Acts of 1935, 1936, and 1937 were based on which historical lesson drawn from American entry into World War I?", "options": [{"text": "That presidential rhetoric had been more responsible than commercial entanglement for drawing the United States into war", "isCorrect": false, "rationale": "The Nye Committee conclusion blamed 'merchants of death' — munitions makers and bankers — not presidential rhetoric; the lesson was about commercial and financial entanglement, not presidential speech."}, {"text": "That American entry into WWI had been engineered by munitions makers and bankers who profited from Allied contracts, and that entanglement must be prevented by law, not presidential will", "isCorrect": true, "rationale": "The source states the Nye Committee 'concluded in 1934 that American entry into World War I had been engineered by munitions makers and bankers' and Congress responded by enacting legal prohibitions on arms sales and loans — the lesson was that commercial entanglement required legal prevention."}, {"text": "That the Zimmermann Telegram revealed Germany's aggressive intentions that could never be deterred by neutrality", "isCorrect": false, "rationale": "The lesson drawn from WWI in the isolationist framework was the opposite — that commercial entanglement drew the U.S. in, not that German aggression made intervention inevitable; the Zimmermann Telegram framing belongs to the interventionist case, not the Neutrality Acts' rationale."}, {"text": "That Wilson's Fourteen Points had been insufficiently specific to prevent future wars, requiring more detailed peace frameworks", "isCorrect": false, "rationale": "The Neutrality Acts addressed commercial entanglement as the war cause, not the inadequacy of Wilson's peace vision; the foreign policy lesson drawn was about staying out, not about designing better peace frameworks."}]}, {"question": "The Lend-Lease Act (March 1941) was significant primarily because it", "options": [{"text": "Brought the United States into formal military alliance with Britain and France through a treaty commitment", "isCorrect": false, "rationale": "Lend-Lease was an executive authorization for material transfer, not a formal military alliance treaty; the United States did not make a formal alliance commitment with Britain until after Pearl Harbor."}, {"text": "Authorized the president to lend, lease, or transfer war materials to any nation whose defense he deemed vital to American defense, abandoning the pretense of neutrality and making the United States the 'arsenal of democracy'", "isCorrect": true, "rationale": "The source states Lend-Lease 'authorized the president to lend, lease, or otherwise transfer war materials to any nation whose defense he deemed vital to the defense of the United States' and that it 'abandoned the cash and carry pretense of the Neutrality Acts' — committing the U.S. as the 'arsenal of democracy.'"}, {"text": "Required Congress to approve each individual arms transfer to Allied nations, ensuring democratic oversight of military aid", "isCorrect": false, "rationale": "Lend-Lease gave the president broad discretionary authority to make transfers without case-by-case congressional approval — the opposite of individual congressional oversight."}, {"text": "Established a formal American military presence in Britain by authorizing U.S. naval bases in the British Isles", "isCorrect": false, "rationale": "The Destroyers for Bases Agreement (not Lend-Lease) exchanged destroyers for naval base rights; Lend-Lease was specifically about transferring war materials, not establishing base presence."}]}, {"question": "The attack on Pearl Harbor (December 7, 1941) killed 2,403 American servicemen and 'destroyed or damaged eight battleships, three cruisers, three destroyers, and approximately 200 aircraft.' The attack had which strategic consequence for the Pacific War?", "options": [{"text": "It permanently destroyed American naval capacity in the Pacific, forcing a purely defensive strategy for the remainder of the war", "isCorrect": false, "rationale": "American carriers — the decisive weapon of WWII naval warfare — were not at Pearl Harbor during the attack. The U.S. rebuilt naval capacity rapidly and went on the offensive at Midway (June 1942), only six months after Pearl Harbor."}, {"text": "It formally brought the United States into WWII, and — combined with Germany's subsequent declaration of war — committed the republic to the global conflict the Neutrality Acts had been designed to prevent", "isCorrect": true, "rationale": "The attack triggered the declaration of war on Japan (December 8), and Germany's and Italy's declarations of war three days later drew the United States into the European war as well — 'the global conflict that its Neutrality Acts had been designed to prevent.'"}, {"text": "It destroyed Japan's ability to conduct offensive operations for the remainder of the war, making eventual Japanese defeat immediate", "isCorrect": false, "rationale": "Pearl Harbor was a Japanese offensive success that allowed Japan to expand rapidly across Southeast Asia and the western Pacific in the months that followed; Japanese offensive capability was not destroyed until the Battle of Midway (June 1942)."}, {"text": "It triggered a congressional declaration of war solely against Germany because Japan was not yet threatening the U.S. mainland", "isCorrect": false, "rationale": "Congress declared war on Japan on December 8 in direct response to the Pearl Harbor attack; Germany and Italy then declared war on the United States, triggering reciprocal U.S. declarations against them."}]}, {"question": "The Battle of Midway (June 1942) is described as 'the turning point of the Pacific War' because", "options": [{"text": "It was the first time American naval forces had defeated the Japanese in a surface engagement, demonstrating equal Japanese and American capabilities", "isCorrect": false, "rationale": "Midway was an air and naval battle fought largely by aircraft; its significance was the destruction of Japan's fleet carriers, not a demonstration of equal surface capabilities."}, {"text": "American forces had broken Japanese naval codes, allowing them to ambush the Japanese carrier fleet and destroy four fleet carriers — the core of Japanese naval air power, ending Japanese offensive capability", "isCorrect": true, "rationale": "The source explicitly explains the combination: broken codes allowed the ambush; the destruction of four fleet carriers ended Japanese offensive capability in the Pacific — the two elements together make Midway the turning point."}, {"text": "Midway was the last Japanese attack on American territory, after which Japan adopted a purely defensive strategy", "isCorrect": false, "rationale": "Japan continued offensive operations in the Pacific after Midway, including advances in New Guinea and the Solomon Islands; the island-hopping strategy that followed Midway involved sustained offensive fighting."}, {"text": "President Roosevelt personally commanded the naval forces at Midway, demonstrating executive leadership over military strategy", "isCorrect": false, "rationale": "Roosevelt was Commander-in-Chief but did not personally command naval forces; tactical command at Midway was exercised by Admiral Chester Nimitz's Pacific Fleet."}]}, {"question": "Kaiser Shipyards reduced Liberty ship construction time from 355 days to an average of 42 days. This achievement most directly illustrates", "options": [{"text": "The limits of American industrial mobilization — even with assembly-line techniques, ship construction remained slower than pre-war projections", "isCorrect": false, "rationale": "The example is cited as an illustration of extraordinary industrial mobilization, not its limits; reducing construction time from 355 to 42 days is presented as evidence of unprecedented productive capacity."}, {"text": "The application of assembly-line industrial techniques to military production, contributing to the United States producing more military hardware than all Axis powers combined by 1944", "isCorrect": true, "rationale": "Kaiser Shipyards' assembly-line innovation is cited as a component of the overall mobilization story in which 'by 1944, the United States was producing more military hardware than all the Axis powers combined' — assembly-line techniques applied to warship construction as emblematic of the broader industrial transformation."}, {"text": "The federal government's capacity to plan industrial production through central directives that replaced market-based allocation", "isCorrect": false, "rationale": "Kaiser was a private company that pioneered the technique; while the War Production Board coordinated production, the achievement is attributed to industrial innovation, not central planning replacing markets."}, {"text": "The specific military value of the Liberty ship design — faster construction enabled replacement of ships lost to German submarine warfare", "isCorrect": false, "rationale": "The faster construction time is used in the source to illustrate the scale of American industrial mobilization generally, not specifically as a response to submarine losses, though that context existed."}]}, {"question": "Operation Overlord (D-Day, June 6, 1944) was historically significant primarily because", "options": [{"text": "It was the first Allied offensive operation of the European war, marking the beginning of U.S. involvement in the European theater", "isCorrect": false, "rationale": "American forces had entered the European war through North Africa (Operation Torch, November 1942), Sicily (July 1943), and Italy (September 1943) — D-Day was not the first Allied European offensive."}, {"text": "It was the largest amphibious operation in military history, landing 156,000 Allied troops on Normandy's beaches and establishing the European beachhead that led to the liberation of France and Germany's defeat", "isCorrect": true, "rationale": "The source describes D-Day as 'the largest amphibious operation in military history,' landing 156,000 troops; the source traces the chain from Normandy beachhead to liberation of Paris (August 25) to German surrender (May 8, 1945) — establishing the causal chain that makes D-Day decisive."}, {"text": "It demonstrated that air power alone could defeat a modern industrial nation, obviating the need for ground forces in the final phase of the European war", "isCorrect": false, "rationale": "D-Day was a ground-force amphibious assault demonstrating that defeating Germany required massive land forces; the air-power-alone argument was not confirmed by WWII — it required combined arms operations."}, {"text": "It forced Germany to fight a three-front war simultaneously that it had never expected, producing Germany's surrender within 48 hours", "isCorrect": false, "rationale": "Germany had already been fighting the Eastern Front since June 1941; D-Day added a western front but not a three-front war never anticipated. Germany surrendered on May 8, 1945 — nearly a year after D-Day, not 48 hours."}]}, {"question": "The Manhattan Project employed more than 130,000 people at facilities in Los Alamos, Oak Ridge, and Hanford at a cost of approximately $2 billion. This scale most directly demonstrates", "options": [{"text": "The private sector's capacity to independently fund and manage major weapons development without federal oversight", "isCorrect": false, "rationale": "The Manhattan Project was a secret federal government program, not a private sector initiative; it was coordinated by the government and represented a massive public investment."}, {"text": "The wartime federal government's capacity to direct the entire productive and scientific output of an industrial economy toward a single strategic goal — a capacity that would form the foundation of the postwar military-industrial complex", "isCorrect": true, "rationale": "The source describes the Manhattan Project as part of a broader demonstration that wartime federal capacity — 'the ability to redirect the entire productive output of an industrial economy toward a single strategic goal' — did not disappear after 1945 but became the foundation for the 'permanent military-industrial complex.'"}, {"text": "The scientific community's independence from government control even during wartime mobilization", "isCorrect": false, "rationale": "The Manhattan Project was a tightly controlled government secret; scientists (including Oppenheimer) worked under federal direction and security constraints."}, {"text": "The failure of the normal democratic deliberative process to evaluate the moral implications of weapons of mass destruction before their use", "isCorrect": false, "rationale": "While this is a historically significant point about the bomb's use, the source uses the Manhattan Project's scale to illustrate wartime federal industrial capacity, not the failure of deliberative process."}]}, {"question": "American unemployment stood at 14.6% in 1940 despite seven years of New Deal programs, then fell to 1.2% by 1944. This data most directly supports which historical argument?", "options": [{"text": "The New Deal was a complete failure that had no effect on unemployment before WWII", "isCorrect": false, "rationale": "Unemployment fell from 25% (1933) to 14.6% (1940) — a significant improvement that the source does not characterize as 'no effect.' The point is about the comparison to wartime full employment, not about the New Deal being entirely ineffective."}, {"text": "The war, through massive deficit spending at unprecedented scale, achieved what the New Deal had not — confirming for Keynesian economists that the New Deal mechanism was correct but the scale was insufficient", "isCorrect": true, "rationale": "The source explicitly makes this argument: 'the war accomplished what the New Deal, for all its ambition, had not: the restoration of full employment' and states this 'confirm[ed], for Keynesian economists, that the New Deal had been right about the mechanism but insufficiently large in scale.'"}, {"text": "Market forces alone had resolved the Depression by 1940 even before wartime demand provided the final boost", "isCorrect": false, "rationale": "Unemployment was still 14.6% in 1940 — a rate that does not suggest market recovery; the New Deal's deficit spending and the transition to war production, not unaided market forces, drove the recovery."}, {"text": "Military conscription solved unemployment by removing workers from the civilian labor force, regardless of the level of government spending", "isCorrect": false, "rationale": "While conscription removed some workers from civilian unemployment statistics, the source attributes full employment primarily to wartime production demand and deficit spending — the Keynesian mechanism, not simply statistical removal of men through conscription."}]}, {"question": "President Truman's decision to authorize atomic bomb attacks on Hiroshima and Nagasaki was made in the context of which strategic calculation?", "options": [{"text": "Military planners projected that a land invasion of the Japanese home islands would cost hundreds of thousands of American lives and millions of Japanese lives", "isCorrect": true, "rationale": "The source explicitly presents this as the context for the atomic bomb decision: 'Military planners expected hundreds of thousands of American deaths and millions of Japanese' from a land invasion — the bomb was chosen as an alternative to this projected casualty count."}, {"text": "The bombs were primarily intended to demonstrate American power to the Soviet Union, with Japan's defeat already secured through naval blockade", "isCorrect": false, "rationale": "The source presents the land-invasion casualty projection as the primary justification; while the Soviet dimension was historically present, the source does not offer that as the primary context."}, {"text": "Germany's surrender in May 1945 had freed all available forces for the Pacific, making a quick land invasion feasible without the bombs", "isCorrect": false, "rationale": "The source presents the casualty projections as staggering even with freed European forces — the availability of European forces did not make the land invasion casualty-light; the projections were made with that availability factored in."}, {"text": "Japan had already begun peace negotiations, and the bombs were dropped to prevent Soviet entry into the Pacific War", "isCorrect": false, "rationale": "The source presents the land-invasion casualty calculation as the context for the decision; Japanese peace negotiations were ongoing but not at the level of credible surrender before the bombs were authorized."}]}, {"question": "The source states that after 1945, wartime federal economic capacity 'did not simply disappear' but became 'the foundation for the permanent military-industrial complex that Eisenhower would warn about in his 1961 farewell address.' This argument most directly connects WWII mobilization to which postwar development?", "options": [{"text": "The creation of the United Nations as a permanent multilateral institution for managing international disputes", "isCorrect": false, "rationale": "The UN is a diplomatic institution, not a military-industrial complex; the source's argument is specifically about the federal government's capacity to direct industrial and scientific resources for military purposes."}, {"text": "A permanent federal capacity for large-scale economic direction of military-industrial production that persisted after the war as the Cold War created continuous demand for that capacity", "isCorrect": true, "rationale": "The source traces the causal chain: wartime federal capacity → did not disappear → became foundation for permanent military-industrial complex → Eisenhower warned about it in 1961. The argument is that WWII institutionalized a level of federal economic direction that became permanent because of Cold War demand."}, {"text": "The creation of Social Security and the GI Bill, which extended New Deal social insurance to veterans and their families", "isCorrect": false, "rationale": "Social Security predated WWII (1935); the GI Bill was a social welfare program, not a military-industrial complex — the source's argument is specifically about the institutionalization of federal military production capacity."}, {"text": "The Marshall Plan's reconstruction of European economies through massive foreign aid, establishing American economic dominance", "isCorrect": false, "rationale": "The Marshall Plan was a foreign economic assistance program; the source's argument is about the domestic institutionalization of federal military-industrial production capacity, not foreign aid."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
