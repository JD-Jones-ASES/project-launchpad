<script>
var QUESTIONS = [{"question": "Andrew Carnegie's competitive advantage in the steel industry rested primarily on which strategy?", "options": [{"text": "Horizontal integration — acquiring competing steel producers to achieve monopoly control over the market", "isCorrect": false, "rationale": "Horizontal integration was Rockefeller's strategy with Standard Oil. Carnegie's advantage came from vertical integration — controlling every stage of steel production from raw materials to distribution."}, {"text": "Vertical integration — owning iron ore mines, coal fields, ore boats, railcars, steel mills, and distribution infrastructure to eliminate middlemen's margins", "isCorrect": true, "rationale": "The source explicitly describes Carnegie's vertical integration strategy: by controlling every link in the chain from Mesabi iron ore to finished steel rails, Carnegie eliminated supplier profit margins, could undercut competitors on price, and could absorb short-term losses from accumulated capital to outlast rivals."}, {"text": "Political influence — using congressional contacts from the Crédit Mobilier network to secure favorable tariff rates on imported steel", "isCorrect": false, "rationale": "While Carnegie benefited from protective tariffs, his competitive advantage was structural (vertical integration and Bessemer cost reduction), not primarily political connection to the Crédit Mobilier network."}, {"text": "Labor arbitrage — importing workers from Scotland under long-term contracts at wages below the American market rate", "isCorrect": false, "rationale": "Carnegie's cost advantage came from technological efficiency (Bessemer process) and organizational control (vertical integration), not from imported contract labor."}]}, {"question": "Read the following passage from Andrew Carnegie's Gospel of Wealth (1889): 'This, then, is held to be the duty of the man of Wealth…to consider all surplus revenues which come to him simply as trust funds, which he is called upon to administer…in the manner which, in his judgment, is best calculated to produce the most beneficial results for the community.' A historian would most likely note that this argument was written three years BEFORE:", "options": [{"text": "Carnegie sold his steel company to J.P. Morgan for $480 million and retired to a life of philanthropy", "isCorrect": false, "rationale": "Carnegie sold to Morgan in 1901, twelve years after the Gospel of Wealth (1889), not three years later. The historical juxtaposition the source emphasizes is with the Homestead Strike of 1892."}, {"text": "The Homestead Strike of 1892, in which Carnegie approved wage cuts that precipitated a violent confrontation he was absent for, exposing the gap between his stewardship rhetoric and his industrial practice", "isCorrect": true, "rationale": "The source explicitly notes this juxtaposition: the Gospel of Wealth was published in 1889, 'three years before the Homestead Strike,' where Carnegie approved the wage cuts that led to the 1892 confrontation — a direct contradiction of his claimed stewardship role."}, {"text": "The Sherman Antitrust Act of 1890, which Carnegie lobbied against because it threatened the vertical integration model he had pioneered", "isCorrect": false, "rationale": "The source does not describe Carnegie lobbying against the Sherman Act. The relevant juxtaposition is between his philanthropic rhetoric and the Homestead Strike, not antitrust legislation."}, {"text": "The Interstate Commerce Act of 1887, which Carnegie had supported as a necessary check on the railroad rate discrimination that raised his raw-material costs", "isCorrect": false, "rationale": "The Interstate Commerce Act was passed in 1887, two years before the Gospel of Wealth, not three years after. The source's critical point about the Gospel of Wealth is its contradiction with the Homestead Strike."}]}, {"question": "The Standard Oil Trust (1882) was a legal innovation that allowed Rockefeller to maintain centralized control over oil refining across multiple states. What specific legal problem did the trust form solve?", "options": [{"text": "It allowed Standard Oil to avoid federal corporate income tax because trust certificates were classified as personal property rather than equity shares", "isCorrect": false, "rationale": "No federal corporate income tax existed in 1882. The trust form solved a different legal problem: state laws against out-of-state corporations holding assets within a state's borders."}, {"text": "It evaded state laws against out-of-state corporations by having shareholders of nominally independent affiliates deposit their stock with a central board of trustees, giving Rockefeller centralized control that appeared on paper to be separate companies", "isCorrect": true, "rationale": "The source explicitly explains this mechanism: shareholders of affiliates deposited stock with trustees in exchange for trust certificates, giving centralized control over what 'appeared on paper to be separate companies' — evading state incorporation laws while achieving monopolistic coordination."}, {"text": "It prevented competitors from learning Standard Oil's actual refinery locations by hiding ownership behind nominee directors in each state", "isCorrect": false, "rationale": "Secrecy about refinery locations was not the trust form's purpose. The trust solved a jurisdictional problem: how to coordinate operations across state lines under laws that restricted foreign (out-of-state) corporations."}, {"text": "It allowed Standard Oil to issue stock without regulatory approval because trust certificates were not classified as corporate securities under existing law", "isCorrect": false, "rationale": "The trust form was about coordinating ownership and control across state lines, not circumventing securities regulation. Securities regulation was minimal in the 1880s regardless."}]}, {"question": "The Interstate Commerce Act of 1887 created the ICC to address railroad rate discrimination. Which of the following BEST explains why early ICC enforcement was ineffective?", "options": [{"text": "The railroads successfully lobbied to have the ICC's budget cut to near zero within two years of its creation", "isCorrect": false, "rationale": "The source attributes ICC weakness to court decisions limiting its authority, not budget cuts. The Hepburn Act of 1906 eventually gave the ICC genuine enforcement power."}, {"text": "Court decisions limited the ICC's authority, leaving it unable to enforce fairness requirements; it took the Hepburn Act of 1906 to give it genuine enforcement power", "isCorrect": true, "rationale": "The source explicitly states that 'early ICC enforcement was hamstrung by court decisions limiting its authority' and that the Hepburn Act (1906) 'would eventually give the ICC genuine teeth.' This reflects the broader pattern of courts limiting regulatory challenges to capital."}, {"text": "The act required unanimous agreement among ICC commissioners before issuing any order, giving railroad-friendly members effective veto power", "isCorrect": false, "rationale": "No such unanimity requirement is described in the source. The ICC's weakness came from court decisions, not internal procedural rules."}, {"text": "Southern Democrats in Congress stripped the ICC of subpoena power in exchange for supporting the act's passage, making fact-finding impossible", "isCorrect": false, "rationale": "The source does not describe this legislative compromise. ICC enforcement failure is attributed to hostile court rulings, not congressional amendments stripping enforcement tools."}]}, {"question": "Social Darwinism, as described in the source, provided ideological justification for Gilded Age industrial capitalism. Which of the following BEST identifies the central internal contradiction in how leading industrialists actually applied this ideology?", "options": [{"text": "Carnegie publicly endorsed Social Darwinism while privately funding labor unions that contradicted his laissez-faire philosophy", "isCorrect": false, "rationale": "Carnegie did not fund labor unions; he actively suppressed them, most famously at Homestead. The contradiction the source identifies is between laissez-faire rhetoric and active government support for business."}, {"text": "Industrialists advocated laissez-faire to resist regulation and worker protections, while simultaneously accepting federal tariffs, land grants, and favorable court rulings that used government intervention to benefit capital", "isCorrect": true, "rationale": "The source explicitly calls this the 'central contradiction': 'Laissez-faire was the doctrine they applied to workers and regulators; it was not the doctrine they applied to their own relationship with the state.' Carnegie and Rockefeller were 'enthusiastic recipients of federal tariff protection, railroad land grants, and favorable court rulings on labor law.'"}, {"text": "Social Darwinism argued that the fittest would survive, yet Carnegie and Rockefeller used illegal tactics to eliminate competitors rather than outcompeting them on merit", "isCorrect": false, "rationale": "While this is a valid historical criticism, it is not the 'central contradiction' the source identifies. The source's primary point is the selective application of laissez-faire: government support for capital, no government protection for workers."}, {"text": "Spencer's Social Darwinism was derived from Darwin's biological theory, but industrial competition did not actually select for biological fitness in any meaningful sense", "isCorrect": false, "rationale": "While historically accurate, this intellectual critique is not the central contradiction the source emphasizes. The source focuses on the political hypocrisy of demanding government non-interference for labor while accepting government intervention for business."}]}, {"question": "By 1890 the United States had more railroad track than the entire European continent. The source argues that railroads were significant not only as an industry but as 'the crucible of modern corporate management.' Which of the following BEST supports this claim?", "options": [{"text": "Railroad companies introduced the assembly-line production method that Carnegie later applied to steel manufacturing at the Homestead plant", "isCorrect": false, "rationale": "Assembly-line production was associated with later automobile manufacturing; the source connects railroads to bureaucratic management structures, not production line techniques."}, {"text": "The operational scale of managing a transcontinental railroad — thousands of employees, hundreds of locomotives, continental schedules — forced the development of bureaucratic management, uniform accounting, and the separation of ownership from management", "isCorrect": true, "rationale": "The source explicitly states that the railroad's 'operational scale…forced the development of bureaucratic management structures, uniform accounting practices, and the division between ownership (shareholders) and management (salaried executives) that would define the modern corporation.'"}, {"text": "Railroad companies pioneered the use of the trust form to coordinate operations across state lines, which Rockefeller later adapted for Standard Oil", "isCorrect": false, "rationale": "The trust form was Rockefeller's innovation for Standard Oil, not a railroad invention. Railroads' management contribution was bureaucratic organization and the ownership-management split."}, {"text": "Railroad executives developed the concept of vertical integration by owning both the track and the rolling stock that operated on it", "isCorrect": false, "rationale": "Owning track and rolling stock is not vertical integration in the sense the source defines — vertical integration refers to controlling successive stages of a production process. The source associates vertical integration with Carnegie, not railroad management."}]}, {"question": "The Bessemer steel process was central to Carnegie's cost-cutting strategy. Which of the following BEST explains its economic significance?", "options": [{"text": "It allowed Carnegie to produce steel without iron ore, using recycled scrap metal that was far cheaper than virgin materials", "isCorrect": false, "rationale": "The Bessemer process converts pig iron (made from iron ore) into steel by blowing air through molten iron — it does not use scrap metal as its primary input and did not eliminate Carnegie's need for iron ore from the Mesabi Range."}, {"text": "By applying the Bessemer process at large scale, Carnegie slashed steel production costs from roughly $100 per ton in 1875 to under $12 per ton by the late 1890s, enabling him to undercut all competitors", "isCorrect": true, "rationale": "The source explicitly cites these cost figures ($100/ton to under $12/ton) as the result of Carnegie's large-scale application of the Bessemer process — the technological foundation of his competitive price strategy."}, {"text": "The Bessemer process produced steel of far superior quality to existing wrought iron, commanding premium prices that funded Carnegie's expansion", "isCorrect": false, "rationale": "Carnegie's strategy was cost leadership through price cutting, not premium pricing. His Bessemer advantage was in reducing costs dramatically, then underselling competitors, not in charging more for a superior product."}, {"text": "Carnegie licensed the Bessemer process exclusively through a patent arrangement that prevented competitors from using it for fifteen years", "isCorrect": false, "rationale": "The Bessemer process was a widely known technology; Carnegie's advantage was in the scale and integration of its application, not exclusive patent control."}]}, {"question": "The Sherman Antitrust Act (1890) was the federal government's first statutory response to industrial monopoly. The source notes an irony in its early enforcement. What was that irony?", "options": [{"text": "The act was used more often against labor unions than against business trusts, because courts interpreted strikes and boycotts as 'combinations in restraint of trade'", "isCorrect": true, "rationale": "The source explicitly notes this irony: 'its early enforcement was so weak that federal courts applied it more often against labor unions than against the trusts the statute was ostensibly designed to control.' This reflects the courts' consistent role as allies of capital against labor."}, {"text": "Standard Oil was immediately broken up under the Sherman Act in 1891, but Carnegie Steel was exempted because steel was classified as a necessity of national defense", "isCorrect": false, "rationale": "Standard Oil was not broken up in 1891; it reorganized as a New Jersey holding company and was not dissolved until the Supreme Court's 1911 ruling, more than twenty years after the Sherman Act's passage."}, {"text": "The act's passage caused Rockefeller to voluntarily dissolve the Standard Oil Trust in 1890 before it could be challenged in federal court", "isCorrect": false, "rationale": "Ohio's state antitrust law dissolved the Trust in 1892; Standard Oil then reorganized as a New Jersey holding company — the federal Sherman Act was not the mechanism, and dissolution was not voluntary."}, {"text": "Congress exempted railroads from the Sherman Act because railroad consolidation was seen as necessary for national commerce, applying the act only to manufacturing monopolies", "isCorrect": false, "rationale": "No such railroad exemption existed in the Sherman Act. The act's weakness came from judicial interpretation, not explicit legislative exemptions, and courts used it against labor more than against manufacturing trusts."}]}, {"question": "The source describes the Gilded Age as a period of unprecedented industrial growth. Which set of structural conditions BEST explains why this growth occurred in the United States rather than elsewhere?", "options": [{"text": "The United States had the world's most educated industrial workforce because of the 1862 Morrill Land-Grant College Act, producing engineers and managers that other nations lacked", "isCorrect": false, "rationale": "The source does not cite workforce education as a primary structural condition. The Morrill Act is not mentioned; the structural conditions the source identifies are natural resources, railroad network, population growth, patent culture, and government policy."}, {"text": "Extraordinary natural resource endowments, a continental railroad network, rapid population growth, a patent and invention culture, and federal tariff and land-grant policy created a uniquely favorable environment for industrial capitalism", "isCorrect": true, "rationale": "The source explicitly lists these structural conditions: natural resources (coal, iron, oil, timber), railroad infrastructure, population growth from 31 to 76 million, technical innovation (Bessemer, dynamo, telephone), and federal government support (tariffs, land grants, hard-money policy)."}, {"text": "The United States was uniquely free from government interference in markets, allowing entrepreneurs to compete without the regulatory burdens that hindered European industrialization", "isCorrect": false, "rationale": "The source explicitly contradicts this: 'Carnegie and Rockefeller were enthusiastic recipients of federal tariff protection, railroad land grants, and favorable court rulings.' American industrialization was actively supported by the state, not achieved in spite of it."}, {"text": "The abolition of slavery created a large free labor market that dramatically reduced industrial wage costs compared to European economies relying on guild-controlled craft labor", "isCorrect": false, "rationale": "While emancipation changed the labor market, the source does not identify post-slavery wage structure as a primary driver of industrial growth. Immigrant labor supply is mentioned as a factor, but not in the terms described here."}]}, {"question": "A student argues: 'The \"robber baron\" label for Gilded Age industrialists is unfair because Carnegie and Rockefeller created genuine economic value through efficiency and innovation.' A historian familiar with this source would most likely revise this claim by arguing that:", "options": [{"text": "Carnegie and Rockefeller did not create genuine efficiency — their cost reductions were achieved entirely through wage cuts rather than technological improvement", "isCorrect": false, "rationale": "The source credits Carnegie with genuine technological and organizational innovation (Bessemer process, vertical integration) and Rockefeller with genuine efficiency gains. The historian's revision would not deny the efficiency; it would contextualize its distribution."}, {"text": "Industrial capitalism created enormous aggregate wealth and systematically concentrated it — the gains were real but so were the wage cuts, blacklists, rate discrimination, and legal manipulation that captured those gains for capital at labor's and small competitors' expense", "isCorrect": true, "rationale": "The source explicitly argues both sides: 'Industrial capitalism created enormous aggregate wealth and systematically concentrated it.' The efficiency gains were real; so were the social costs to workers, farmers, and competitors that the robber-baron critique identifies. Both the 'captain of industry' and 'robber baron' framings were accurate from their respective vantage points."}, {"text": "Carnegie's and Rockefeller's fortunes were built primarily on political corruption rather than genuine economic efficiency, making all claims of value creation illegitimate", "isCorrect": false, "rationale": "The source acknowledges genuine efficiency gains from the Bessemer process and vertical integration. Corruption (Crédit Mobilier, railroad rebates) was real but did not negate the genuine technological and organizational innovations."}, {"text": "The 'robber baron' label is appropriate because Carnegie and Rockefeller operated in violation of existing law throughout their careers, making their business models inherently criminal", "isCorrect": false, "rationale": "While some practices (railroad rebates, trust structures) were of questionable legality, the source presents the industrialists' relationship with law as complex — they shaped the legal environment through lobbying and judicial influence rather than simply breaking existing law."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
