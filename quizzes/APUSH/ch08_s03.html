<script>
var QUESTIONS = [{"question": "The Supreme Court's decision in Brown v. Board of Education (1954) was historically significant primarily because it", "options": [{"text": "immediately desegregated all public schools in the South through a specific implementation order.", "isCorrect": false, "rationale": "The implementation order (Brown II, 1955) called only for desegregation 'with all deliberate speed,' which Southern officials interpreted as license for delay; immediate desegregation did not occur."}, {"text": "overturned the 'separate but equal' doctrine of Plessy v. Ferguson (1896) and established that racial segregation in public education violated the Equal Protection Clause of the Fourteenth Amendment.", "isCorrect": true, "rationale": "Brown's legal significance was in overturning the constitutional doctrine that had sustained legal segregation since 1896 and establishing that segregation was inherently harmful regardless of physical facility equality."}, {"text": "authorized the federal government to send troops to enforce desegregation orders in any Southern state that resisted.", "isCorrect": false, "rationale": "Brown itself did not authorize federal troop deployments; that authority came later, through specific confrontations at Little Rock (1957) under separate executive action by President Eisenhower."}, {"text": "extended equal protection to all areas of public life by explicitly overruling Plessy v. Ferguson in its entirety.", "isCorrect": false, "rationale": "Brown overruled Plessy specifically in the field of public education; its logic was later extended to other domains, but the decision itself was limited to public schooling."}], "id": "q01"}, {"question": "Chief Justice Earl Warren's opinion in Brown v. Board of Education rejected the 'original intent' methodology in favor of considering the contemporary role of public schooling. What does this methodological choice reveal about Warren's constitutional reasoning?", "options": [{"text": "Warren believed that the Fourteenth Amendment's framers had explicitly intended to desegregate public schools.", "isCorrect": false, "rationale": "Warren explicitly noted that the historical record of the Fourteenth Amendment's ratification was 'inconclusive regarding public education' — he rejected original intent methodology precisely because the historical evidence was insufficient."}, {"text": "Warren concluded that constitutional meaning must be applied to contemporary social realities, not frozen at the moment of ratification — making segregation's psychological and social harms legally relevant.", "isCorrect": true, "rationale": "By focusing on 'the contemporary role of public schooling in American life' and the psychological harm of segregation, Warren applied a living constitutionalism approach — the Constitution's meaning evolves with social conditions."}, {"text": "Warren was imposing his own personal political views rather than applying established legal methodology.", "isCorrect": false, "rationale": "Warren's opinion reflected established modes of constitutional interpretation that weigh contemporary conditions and social science evidence alongside text and history; calling it merely personal politics mischaracterizes constitutional jurisprudence."}, {"text": "Warren needed to avoid historical analysis because the historical evidence clearly supported the 'separate but equal' doctrine.", "isCorrect": false, "rationale": "Warren noted the historical evidence was inconclusive, not that it supported 'separate but equal'; he turned to contemporary social science precisely because the historical record was ambiguous."}], "id": "q02"}, {"question": "Rosa Parks's role in the Montgomery Bus Boycott is best understood as", "options": [{"text": "a spontaneous individual act of civil disobedience by a tired seamstress that unexpectedly launched the civil rights movement.", "isCorrect": false, "rationale": "The source explicitly states Parks was 'a trained activist and NAACP secretary who had attended the Highlander Folk School, and her arrest was the catalyst the Montgomery chapter had been waiting for' — her act was embedded in a pre-existing organizational context."}, {"text": "a calculated act by a trained activist embedded in an organizational network that had been waiting for the right catalyst for a coordinated boycott.", "isCorrect": true, "rationale": "Parks's strategic role as an NAACP-trained activist, combined with the pre-existing organizational infrastructure of the Montgomery chapter, meant her arrest was not random but was embedded in planned organizing — the movement had been looking for the right catalyst."}, {"text": "a lone protest that succeeded because it attracted media attention that no civil rights organization had previously been able to generate.", "isCorrect": false, "rationale": "The Montgomery Improvement Association coordinated the boycott; Parks's arrest was one catalyst among several that the existing organizational network channeled into sustained action."}, {"text": "an unsuccessful protest that galvanized the movement only after Parks was physically attacked by white supremacists.", "isCorrect": false, "rationale": "The boycott was strategically successful — it lasted 381 days and ended with a Supreme Court ruling desegregating Montgomery's buses; Parks was not attacked at the time of her arrest."}], "id": "q03"}, {"question": "The Montgomery Bus Boycott demonstrated three things that would define the movement's strategy. Which of the following was NOT one of those demonstrated lessons?", "options": [{"text": "Ordinary African Americans could sustain organized collective action over extended periods.", "isCorrect": false, "rationale": "This was one of the three lessons explicitly identified: the 381-day boycott demonstrated that ordinary African Americans could maintain sustained collective discipline."}, {"text": "Federal courts could be compelled to act by combining economic pressure with legal challenges.", "isCorrect": true, "rationale": "The source identifies three lessons: sustained collective action, nonviolent direct action generating moral pressure that legal strategies alone could not, and the television camera as a political weapon. Federal court compulsion through combined pressure is not one of the three listed lessons."}, {"text": "Nonviolent direct action could generate moral pressure that legal strategies alone could not.", "isCorrect": false, "rationale": "This was one of the three explicitly identified lessons from the Montgomery boycott."}, {"text": "The television camera was a powerful political weapon that broadcast Southern brutality into Northern living rooms.", "isCorrect": false, "rationale": "This was the third explicitly identified lesson: the power of television to transform local acts of resistance into national moral crises."}], "id": "q04"}, {"question": "The founding of the Student Nonviolent Coordinating Committee (SNCC) following the Greensboro sit-ins illustrates which tension within the civil rights movement?", "options": [{"text": "The conflict between Christian pacifism and secular political activism as competing philosophical traditions.", "isCorrect": false, "rationale": "SNCC's founding was not primarily a conflict between Christian pacifism and secularism; both SNCC and SCLC embraced nonviolent philosophy, though with different organizational structures."}, {"text": "The tension between the movement's adult leadership (centered in the church) and student activists who wanted organizational autonomy, encouraged by SCLC organizer Ella Baker.", "isCorrect": true, "rationale": "SNCC was explicitly founded to give students independence from adult organizations — with Ella Baker's encouragement. This tension between adult institutional leadership (SCLC, NAACP) and student-driven direct action (SNCC) defined the movement's organizational landscape."}, {"text": "The disagreement between Northern and Southern Black communities about the appropriate pace of desegregation.", "isCorrect": false, "rationale": "SNCC's founding was about organizational autonomy from adult groups, not a North-South disagreement about pace; both SCLC and SNCC were Southern-based organizations."}, {"text": "The conflict between those who supported economic boycotts and those who preferred public demonstrations as the primary tactic.", "isCorrect": false, "rationale": "SNCC and SCLC shared an emphasis on direct action demonstrations; the difference was organizational structure (student autonomy vs. adult leadership), not a tactical preference for boycotts over demonstrations."}], "id": "q05"}, {"question": "The Birmingham campaign of 1963 was strategically designed to provoke which specific response, and why?", "options": [{"text": "A negotiated settlement with moderate white business leaders who would then pressure the city government to desegregate voluntarily.", "isCorrect": false, "rationale": "King chose Birmingham precisely because Bull Connor was expected to respond with violence, not negotiation; the strategy required confrontation, not voluntary settlement by moderates."}, {"text": "Federal troops to enforce desegregation, which the movement hoped to trigger by demonstrating that local authorities could not maintain order.", "isCorrect": false, "rationale": "The Birmingham strategy targeted images of peaceful protesters being brutalized, not a formal request for federal troops; the goal was moral pressure on the Kennedy administration, not military enforcement."}, {"text": "A violent response from Public Safety Commissioner Bull Connor that would generate photographs and moral pressure on the Kennedy administration to pass comprehensive civil rights legislation.", "isCorrect": true, "rationale": "King deliberately chose Birmingham 'because its Public Safety Commissioner, Bull Connor, was a known violent racist who could be counted on to provide the confrontational images the movement needed.' The strategy depended on provoked overreaction generating national outrage."}, {"text": "Support from white Southern moderates who, faced with Connor's extremism, would ally with the movement against the segregationist establishment.", "isCorrect": false, "rationale": "The Letter from Birmingham Jail was addressed to white moderates who had counseled patience, not to potential Southern moderate allies; the strategy targeted Northern opinion and the federal government, not Southern moderate recruitment."}], "id": "q06"}, {"question": "King's Letter from Birmingham Jail was addressed to eight white Alabama clergymen who had called the campaign 'unwise and untimely.' What does the choice of audience reveal about the letter's broader strategic purpose?", "options": [{"text": "King was attempting to recruit white Southern ministers as organizational partners in the Birmingham campaign.", "isCorrect": false, "rationale": "The letter was a refutation of the clergymen's 'wait' argument, not a recruitment document; King was challenging their position, not seeking their partnership."}, {"text": "King was speaking, through the clergymen, to the entire white moderate liberal establishment that agreed segregation was wrong in principle but counseled patience in practice — arguing that 'wait' was itself a form of complicity with injustice.", "isCorrect": true, "rationale": "The source states: 'King was addressing everyone who agreed segregation was wrong in principle but counseled patience in practice.' The clergymen were a vehicle for addressing the broader white liberal audience whose impatience with impatience was the movement's central political obstacle."}, {"text": "King was primarily making a legal argument about the First Amendment right of peaceful assembly, targeted at the judicial authorities who had issued the injunction against demonstrations.", "isCorrect": false, "rationale": "While the letter engages legal argument (just vs. unjust laws), its primary addressees were moral and political — the clergymen and the white moderate liberal establishment they represented, not legal authorities."}, {"text": "King was seeking to convince white Southern clergy that the civil rights movement was compatible with Christian theology, hoping to split white Southern religious opinion.", "isCorrect": false, "rationale": "The eight clergymen were described as 'moderates' who agreed segregation was wrong but counseled patience — they were not defenders of segregation on religious grounds, and King was not attempting to split white Southern religion."}], "id": "q07"}, {"question": "The Freedom Rides of 1961 tested compliance with the Supreme Court's ruling in Boynton v. Virginia (1960). That the riders were violently attacked in Alabama while local police stood aside is most significant because it demonstrated", "options": [{"text": "that the Supreme Court's decisions on interstate travel had been poorly communicated to local law enforcement officers.", "isCorrect": false, "rationale": "The police standing aside was deliberate, not the product of ignorance; local officials knew the law and chose not to enforce it — demonstrating that court decisions alone were insufficient without enforcement mechanisms."}, {"text": "that the movement needed to abandon legal strategies and rely exclusively on mass political action to achieve its goals.", "isCorrect": false, "rationale": "The Freedom Rides combined legal testing with direct action; the movement did not abandon legal strategies but recognized they required enforcement mechanisms that the federal government could be pressured to provide."}, {"text": "that Southern state authorities were willing to permit private violence against those asserting federal civil rights, demonstrating the need for federal enforcement mechanisms that did not depend on local compliance.", "isCorrect": true, "rationale": "The riders were attacked 'while local police stood aside' — demonstrating that court decisions required federal enforcement independent of local authorities, since Southern states would not enforce federal rights against segregation."}, {"text": "that the Kennedy administration was secretly supporting the Freedom Rides and had instructed local police to allow the violence to generate political pressure for legislation.", "isCorrect": false, "rationale": "The Kennedy administration was uncomfortable with the Freedom Rides, not their secret orchestrator; Robert Kennedy 'negotiated an end to the immediate violence' as damage control, not as a planned strategy."}], "id": "q08"}, {"question": "The March on Washington (August 28, 1963) was organized by a coalition including the SCLC, SNCC, NAACP, National Urban League, and labor unions. This coalition structure is historically significant because it", "options": [{"text": "demonstrated that the movement had overcome all internal disagreements and presented a unified strategy for the post-civil rights era.", "isCorrect": false, "rationale": "The coalition contained significant internal tensions — SNCC's John Lewis had his prepared speech moderated — and did not eliminate the strategic debates between the organizations' different approaches."}, {"text": "showed that civil rights was a mass democratic movement with broad institutional support across Black organizational life and its labor union allies, not merely the project of one organization or leader.", "isCorrect": true, "rationale": "The breadth of the coalition — Black fraternal organizations, churches, unions, civic groups — demonstrated that the movement had mobilized a wide institutional base, not merely following one charismatic leader. This was essential to its political legitimacy."}, {"text": "reflected the movement's decision to focus exclusively on federal legislative action and abandon direct-action campaigns in the South.", "isCorrect": false, "rationale": "The March on Washington was a complement to, not a replacement for, direct-action campaigns; the Birmingham campaign was ongoing and would continue to be the model for subsequent efforts."}, {"text": "ensured that President Kennedy would immediately introduce comprehensive civil rights legislation the following week.", "isCorrect": false, "rationale": "Kennedy had introduced civil rights legislation in June 1963, before the March; the March was designed to pressure Congress, not to prompt a new presidential proposal."}], "id": "q09"}, {"question": "A student argues that the civil rights movement's greatest strength was Martin Luther King Jr.'s individual leadership and moral authority. A historian would most likely revise this claim by noting that", "options": [{"text": "King's leadership was a weakness, since his prominence made the movement vulnerable to his assassination in 1968.", "isCorrect": false, "rationale": "While King's assassination was devastating, the movement had built institutional infrastructure (SCLC, SNCC, NAACP, local chapters) that extended well beyond any single leader; his death was not the movement's only institutional vulnerability."}, {"text": "the movement's strength lay in its organizational infrastructure — the Black church network, SCLC, SNCC, NAACP, local chapters — and the strategic intelligence of many leaders and organizers, of whom King was the most visible but not the sole architect.", "isCorrect": true, "rationale": "The source emphasizes organizational breadth: the Montgomery Improvement Association, the SCLC's church infrastructure, SNCC's student networks, Ella Baker's role in SNCC's founding, the NAACP's legal strategy — King led within an ecosystem of institutions and leaders, not above it."}, {"text": "the movement had no coherent strategy and succeeded only because of fortuitous decisions by Southern white authorities who overreacted to peaceful demonstrations.", "isCorrect": false, "rationale": "The movement's strategic intelligence is explicitly described: leaders deliberately chose venues (Birmingham) where overreaction was predictable, and the strategy of provoking visible confrontation was calculated, not fortuitous."}, {"text": "King was not actually a central figure in most of the movement's key campaigns, which were organized by local leaders without his involvement.", "isCorrect": false, "rationale": "King was central to the major campaigns listed in the source; the point is not that he was uninvolved but that he worked within a broader organizational ecosystem, not that he was peripheral."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
