<script>
var QUESTIONS = [{"question": "The source states that the digital revolution and globalization together 'produced enormous aggregate wealth while concentrating that wealth more narrowly.' Which of the following evidence best supports this claim?", "options": [{"text": "The dot-com bubble of 1995–2000 destroyed $1.7 trillion in market capitalization, demonstrating that the digital economy produced more losers than winners.", "isCorrect": false, "rationale": "The source explicitly notes that the dot-com bubble's collapse 'did not slow the underlying technological transformation' — temporary market losses from the bubble do not support a claim about long-run wealth concentration; they represent a financial correction, not the structural outcome the claim describes."}, {"text": "The top one percent's share of national income rose from roughly 10 percent in 1980 to over 20 percent by 2019, while median household income barely grew for most Americans below the top quintile over the same period.", "isCorrect": true, "rationale": "The source provides precisely these figures: the top one percent's income share doubled, the top one percent's wealth share rose from 27% to 35%, and 'median household income, adjusted for inflation, barely grew for most Americans below the top quintile between 1979 and 2010' — together constituting the evidence for enormous aggregate growth alongside narrowing distribution."}, {"text": "Amazon, eBay, and Google destroyed more jobs through automation than they created in the new digital sector, producing net unemployment.", "isCorrect": false, "rationale": "The source does not claim these companies produced net unemployment; it describes a structural shift in which manufacturing declined while digital sectors grew, with the distributional consequences being the problem — not aggregate job destruction."}, {"text": "The United States lost manufacturing jobs primarily because of automation rather than offshoring, meaning globalization was not responsible for the productivity-pay gap.", "isCorrect": false, "rationale": "The source attributes manufacturing job loss to multiple causes — automation, offshoring (especially after China's 2001 WTO accession), and the strong dollar — and does not assign primacy to automation alone; the question of which cause mattered more is itself historically contested."}]}, {"question": "The personal computer revolution is described as originating in 'a specific American environment that combined proximity to research universities, venture capital, and a countercultural ethic of individual empowerment through technology.' This framing most directly illustrates which broader historical concept?", "options": [{"text": "The role of government investment — the federal research funding that produced ARPANET was the essential precondition for the digital revolution.", "isCorrect": false, "rationale": "While ARPANET (a Defense Department project) is mentioned, the specific framing cited — universities, venture capital, countercultural ethic — emphasizes the commercial and cultural environment, not government investment; the question asks about what the specific framing illustrates."}, {"text": "The social and cultural conditions that enable technological innovation — that major technological breakthroughs require specific ecosystems, not just individual genius.", "isCorrect": true, "rationale": "The source's framing of the PC revolution as emerging from a 'specific American environment' explicitly moves beyond the 'Great Man' narrative (individual inventors) to a systemic account: the combination of institutional, financial, and cultural conditions that made Silicon Valley uniquely productive."}, {"text": "The inevitability of American technological supremacy — once the United States entered the computing age, its dominance was guaranteed by market size.", "isCorrect": false, "rationale": "The source does not claim technological outcomes were inevitable; it specifies the particular conditions that made American innovation possible, implying those conditions could have been absent — which is the opposite of inevitability."}, {"text": "The failure of large corporations to drive innovation — the source implies that IBM's dominance of computing before 1975 had prevented the PC from being invented.", "isCorrect": false, "rationale": "The source notes that 'by 1984 the IBM PC had become the standard platform for business computing' — IBM was a major participant in the PC era, not an obstacle to it; the claim about large corporations is not what the framing illustrates."}]}, {"question": "Financialization refers to the growing dominance of the financial sector at the expense of manufacturing. Which of the following best explains how deregulation of financial institutions contributed to the 2008 crisis?", "options": [{"text": "Deregulation allowed banks to reduce interest rates on mortgages to below-market levels, creating an unsustainable housing boom that collapsed when rates normalized.", "isCorrect": false, "rationale": "The crisis was not caused by below-market rates set by banks; it was caused by subprime mortgage lending, complex securitization, and the accumulation of risk in complex instruments that deregulation allowed without adequate oversight."}, {"text": "Deregulation of banking and securities industries from the Reagan years onward allowed the proliferation of complex instruments (mortgage-backed securities, credit default swaps) that concealed and concentrated risk until it became catastrophic.", "isCorrect": true, "rationale": "The source directly connects financialization to deregulation 'beginning in the Reagan years' and names the instruments (mortgage-backed securities, credit default swaps) — and the 2008 crisis as 'a product of financialization's excesses and the regulatory blindness that accompanied them.'"}, {"text": "Deregulation forced banks to compete for depositors by offering higher interest rates, driving them into riskier investments to cover the higher cost of capital.", "isCorrect": false, "rationale": "While competition for capital was a factor in S&L crisis dynamics, the 2008 crisis centered on mortgage securitization and the distribution of subprime risk through complex financial instruments — the source's framework focuses on complex instruments and regulatory blindness, not deposit competition."}, {"text": "Deregulation eliminated the Federal Reserve's ability to raise interest rates, preventing the monetary policy response that could have deflated the housing bubble before it burst.", "isCorrect": false, "rationale": "Deregulation did not eliminate the Federal Reserve's monetary policy powers; the Fed could and did raise rates (2004–2006), though critics argue it acted too slowly. The source attributes the crisis to deregulation of financial instruments, not to constraints on monetary policy."}]}, {"question": "The Tea Party movement (2009–10) and Occupy Wall Street (2011) expressed what the source calls 'a version of the same underlying anger.' What did they share, and what fundamentally divided them?", "options": [{"text": "Both movements shared opposition to the bank bailouts and anger at a system that rewarded the powerful at the expense of everyone else; they divided on whether the solution was smaller government (Tea Party) or redistribution of wealth through government action (Occupy).", "isCorrect": true, "rationale": "The source states both expressed 'anger at a system that appeared to have rewarded the powerful at the expense of everyone else' — the shared grievance about the bailout's distribution of benefits. Their division is implicit in their targets: Tea Party opposed government spending and taxation; Occupy framed inequality as the problem requiring systemic response."}, {"text": "Both movements shared a commitment to electoral politics; they divided on whether to work within the Democratic or Republican Party.", "isCorrect": false, "rationale": "The source describes Occupy as 'deliberately leaderless' and refusing to 'articulate specific policy demands' — explicitly avoiding electoral politics. The Tea Party did work within the Republican Party structure, but Occupy rejected electoral engagement, making this framing incorrect for Occupy."}, {"text": "Both movements were predominantly composed of working-class Americans who had lost manufacturing jobs; they divided on whether to target corporations or government for blame.", "isCorrect": false, "rationale": "The source does not describe the demographic composition of either movement in terms of manufacturing job loss; Tea Party politics combined 'fiscal conservatism and populist anti-establishment energy' while Occupy drew protesters from diverse backgrounds to Zuccotti Park."}, {"text": "Both movements produced major legislative achievements; the Tea Party produced the Tax Cuts and Jobs Act while Occupy produced the Dodd-Frank Act.", "isCorrect": false, "rationale": "Occupy is explicitly described as not producing legislation ('Occupy did not produce legislation, but it shifted the terms of political discourse'); the Tea Party influenced the 2010 midterms, but the Tax Cuts and Jobs Act came in 2017 — not from the Tea Party wave specifically."}]}, {"question": "The source describes the dot-com bubble's collapse in March 2000 as having 'destroyed an estimated $1.7 trillion in market capitalization but did not slow the underlying technological transformation.' What does this suggest about the relationship between financial markets and technological change?", "options": [{"text": "Financial markets accurately predict which technologies will succeed, so the dot-com collapse proves that Internet-based commerce was ultimately not viable.", "isCorrect": false, "rationale": "The source argues the opposite: the bubble collapsed but the technology did not slow — Amazon, Google, and others survived and dominated. The dot-com collapse showed that markets *misvalued* specific companies, not that the underlying technology was unviable."}, {"text": "Speculative financial bubbles can form around transformative technologies and collapse spectacularly without arresting the underlying technological and economic transformation — the technology and the speculation are separable.", "isCorrect": true, "rationale": "This is precisely what the source describes: the bubble's collapse destroyed capital but 'did not slow the underlying technological transformation.' Technologies that survive bubble collapses are distinguished from speculative excesses that disappear — the long-run transformation continued regardless."}, {"text": "The dot-com collapse was caused by excessive government regulation of Internet commerce that reduced investor confidence and triggered the sell-off.", "isCorrect": false, "rationale": "The source does not attribute the dot-com collapse to government regulation; it describes it as a 'speculative frenzy' — a market-driven boom and bust, not a regulatory intervention effect."}, {"text": "Financial market volatility only affects large corporations, not entrepreneurs, so the dot-com collapse accelerated Silicon Valley innovation by eliminating inefficient large companies.", "isCorrect": false, "rationale": "The source does not describe the dot-com collapse as selectively eliminating large corporations or as acceleration through creative destruction; it notes the loss of $1.7 trillion in market capitalization across the sector, suggesting broad impact, not selective elimination of the inefficient."}]}, {"question": "The source describes 'deaths of despair' in deindustrializing communities. This concept, developed by economists Anne Case and Angus Deaton, BEST illustrates which of the following broader historical patterns?", "options": [{"text": "The tendency of democratic governments to over-invest in social safety nets, creating dependency that reduces labor force participation in manufacturing communities.", "isCorrect": false, "rationale": "The 'deaths of despair' concept describes devastating mortality consequences of deindustrialization — opioid addiction, suicide, alcohol-related disease — not government dependency; the source connects these deaths to community devastation following job loss, not to safety-net generosity."}, {"text": "The geographic concentration of the costs of economic transformation: when manufacturing communities lose their economic foundation, the consequences extend to mortality, community stability, and political participation.", "isCorrect": true, "rationale": "The source explicitly states that globalization's 'costs — job displacement in manufacturing, wage pressure, community devastation in deindustrializing regions — were geographically concentrated' and that affected communities experienced 'devastating unemployment, population loss, declining tax bases, and...rising rates of opioid addiction and deaths of despair.' The geographic concentration of costs is the key analytical point."}, {"text": "That free trade agreements are always economically beneficial in aggregate but politically unpopular, creating a gap between expert consensus and public perception.", "isCorrect": false, "rationale": "The source does not frame globalization as universally beneficial in aggregate while only politically problematic; it presents the distributional consequences as genuinely harmful to specific communities — not merely a perception gap."}, {"text": "The failure of labor unions to adapt to the digital economy, which left manufacturing workers without representation when automation began replacing their jobs.", "isCorrect": false, "rationale": "While union decline is mentioned in the Reagan section, the 'deaths of despair' concept as used here is about the multi-dimensional consequences of community-level economic devastation, not primarily about union organizational failures."}]}, {"question": "Occupy Wall Street's slogan 'We are the 99%' framed American inequality explicitly in terms of the top one percent. The source notes that Occupy 'did not produce legislation, but it shifted the terms of political discourse.' Which of the following best explains this distinction?", "options": [{"text": "Occupy failed as a political movement because its refusal to articulate specific policy demands was a strategic error that a more organized movement would not have made.", "isCorrect": false, "rationale": "The source describes this as a choice: the movement was 'deliberately leaderless and refused to articulate specific policy demands, a choice that made it intellectually vibrant and organizationally fragile.' The source presents both sides without declaring it a strategic error — whether the choice was wise is itself debated."}, {"text": "Movements can shift what subjects are considered legitimate in mainstream political debate — elevating income inequality as a central topic — without translating that shift into specific policy outcomes.", "isCorrect": true, "rationale": "The source states: 'income inequality, which had been a marginal subject in mainstream political conversation, became central — and would remain so.' This is a specific form of political impact: changing the agenda and frame of debate without winning legislative victories — a recognized form of political influence."}, {"text": "Occupy's most important legacy was its organizational model — the leaderless, horizontal structure — which was adopted by subsequent progressive movements.", "isCorrect": false, "rationale": "The source does not claim that Occupy's organizational model was its primary legacy; it specifically identifies the shift in political discourse about income inequality as the movement's lasting contribution."}, {"text": "Occupy succeeded in preventing the full implementation of Dodd-Frank by mobilizing public pressure against banking industry lobbying.", "isCorrect": false, "rationale": "The source does not attribute Dodd-Frank's provisions to Occupy's influence; Dodd-Frank was signed in July 2010, before Occupy began in September 2011 — temporally impossible as described."}]}, {"question": "The Emergency Economic Stabilization Act (2008) and the Dodd-Frank Act (2010) are described as generating criticism from both left and right. What did critics from each direction argue?", "options": [{"text": "Critics from the left argued TARP was insufficient; critics from the right argued Dodd-Frank went too far in nationalizing the banking system.", "isCorrect": false, "rationale": "The source does not describe Dodd-Frank as nationalizing banks — it imposed new capital requirements and established oversight mechanisms. And the left's critique was about accountability (no prosecutions), not about the size of TARP."}, {"text": "Critics from the left argued that no major banker faced criminal prosecution; critics from the right argued that compliance costs burdened smaller institutions and hindered recovery.", "isCorrect": true, "rationale": "The source states precisely: 'Critics from the left argued that no major banker faced criminal prosecution; critics from the right argued that compliance costs burdened smaller institutions and hindered recovery.' Both critiques targeted different aspects of the same regulatory response."}, {"text": "Critics from the left argued TARP was too large and created moral hazard; critics from the right argued it was too small to prevent a depression.", "isCorrect": false, "rationale": "The source attributes the moral hazard/too-large critique to the right (not the left), and does not describe the right as arguing TARP was too small; the left's critique was specifically about lack of prosecutions, not TARP's size."}, {"text": "Both left and right agreed that the federal response was inadequate; they disagreed only about whether tax cuts or spending increases would have produced a faster recovery.", "isCorrect": false, "rationale": "The source presents the left and right critiques as targeting different aspects of the response — accountability (left) and regulatory burden (right) — not as sharing an 'inadequacy' diagnosis while disagreeing on remedies."}]}, {"question": "The source compares the digital revolution to the Industrial Revolution of the Gilded Age, noting that both 'created enormous wealth but did not distribute it evenly.' Which evidence from the Gilded Age BEST parallels the 'deaths of despair' in deindustrializing communities of the digital era?", "options": [{"text": "The robber barons of the Gilded Age — Carnegie, Rockefeller, Vanderbilt — concentrated wealth at the top, just as tech billionaires have in the digital era.", "isCorrect": false, "rationale": "The comparison to robber barons parallels the wealth concentration at the top — but the 'deaths of despair' concept describes the consequences for *working-class communities* devastated by economic transformation, not the concentration at the elite level."}, {"text": "The labor conflicts and community devastation of the Gilded Age — Haymarket (1886), Homestead (1892) — paralleled the social costs borne by working-class communities in the deindustrializing regions of the digital era.", "isCorrect": true, "rationale": "The source explicitly makes this connection: 'The Industrial Revolution of the Gilded Age produced Carnegie and Rockefeller alongside Haymarket and Homestead; the digital revolution produced Amazon and Apple alongside the deaths of despair and the opioid crisis.' Haymarket and Homestead represent working-class suffering as the cost of industrial transformation — the parallel the source draws."}, {"text": "The progressive reform movements of the early twentieth century — trust-busting, labor regulations — represent the political response that could address digital-era inequality if revived.", "isCorrect": false, "rationale": "While the Progressive Era comparison is potentially relevant to policy discussions, the source's Gilded Age comparison is about the production of social costs alongside wealth — Haymarket and Homestead as parallels to deaths of despair, not the Progressive response."}, {"text": "The Gilded Age produced rapid economic growth that eventually raised all wages through trickle-down effects, suggesting the digital era's inequality will similarly self-correct.", "isCorrect": false, "rationale": "The source does not suggest trickle-down self-correction as the Gilded Age's lesson; it presents both eras as illustrating 'a recurring pattern: technological revolutions create enormous wealth but do not distribute it evenly' — requiring political choices about distribution."}]}, {"question": "The source notes that the political instability of the 2010s — Tea Party, Occupy, 'electoral earthquakes of 2016' — 'all drew energy from the same source.' What was that source?", "options": [{"text": "Social media's algorithmic amplification of outrage, which politicized previously apolitical citizens and radicalized moderate voters across the ideological spectrum.", "isCorrect": false, "rationale": "While social media's role in polarization is discussed elsewhere in the source, the 'same source' identified for the political instability of the 2010s specifically is economic — the perception about who benefited from the economy's rules."}, {"text": "The perception that the rules of the economy were written by and for people who were already winning — producing populist anger on both left and right at a system seen as rigged.", "isCorrect": true, "rationale": "The source states: 'The political instability of the 2010s — the Tea Party insurgency, Occupy Wall Street, the electoral earthquakes of 2016 — all drew energy from the same source: the perception that the rules of the economy were written by and for people who were already winning.' This is the direct textual answer."}, {"text": "The failure of the Obama administration's stimulus package to produce sufficient job growth, leaving millions of Americans unemployed through the entire recovery period.", "isCorrect": false, "rationale": "While the recovery's inadequacy is relevant context, the source identifies the political energy of the 2010s as rooted in perceptions about the economy's rules and who benefits — a structural grievance broader than the adequacy of one stimulus package."}, {"text": "The rise of China as an economic competitor, which produced job displacement through trade competition and generated nationalist backlash in manufacturing communities.", "isCorrect": false, "rationale": "While China's WTO accession (2001) is mentioned as a contributor to manufacturing job loss, the source's description of the 2010s' political energy points to a broader domestic grievance about economic fairness — not specifically to a nationalist response to China."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
