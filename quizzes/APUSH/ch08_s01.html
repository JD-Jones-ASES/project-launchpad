<script>
var QUESTIONS = [{"question": "George Kennan's Long Telegram (1946) argued that Soviet hostility toward the West was rooted primarily in which of the following?", "options": [{"text": "Specific postwar grievances over the division of Germany that could be resolved through direct diplomacy.", "isCorrect": false, "rationale": "Kennan explicitly rejected the idea that Soviet hostility was the product of specific, resolvable grievances; he argued it was structural, not circumstantial."}, {"text": "Centuries of Russian insecurity reinforced by a Marxist-Leninist ideology that defined permanent coexistence with capitalism as impossible.", "isCorrect": true, "rationale": "Kennan's telegram attributed Soviet behavior to deep historical insecurity combined with ideological imperatives — a structural diagnosis that counseled containment rather than negotiation."}, {"text": "American economic competition in Eastern Europe that threatened Soviet access to raw materials.", "isCorrect": false, "rationale": "Kennan's analysis was ideological and historical, not primarily economic; he did not frame Soviet hostility as a reaction to American commercial competition."}, {"text": "Stalin's personal paranoia, which Kennan believed would end with a change in Soviet leadership.", "isCorrect": false, "rationale": "Kennan argued the problem was systemic — embedded in Russian historical psychology and Marxist-Leninist ideology — not reducible to Stalin's individual psychology."}], "id": "q01"}, {"question": "The Truman Doctrine (1947) represented a departure from earlier American foreign policy primarily because it", "options": [{"text": "committed the United States to defend specific allied nations already named in the original legislation.", "isCorrect": false, "rationale": "The Truman Doctrine's language was deliberately universal — not limited to Greece and Turkey — which was precisely what distinguished it from a limited, specific commitment."}, {"text": "committed the United States to an open-ended global anti-communist mission using universalist language not limited to specific countries.", "isCorrect": true, "rationale": "By pledging support to 'free peoples' anywhere resisting subjugation, Truman's language broke from the tradition of specific, limited commitments and established an open-ended global mandate."}, {"text": "authorized military intervention in Eastern Europe to roll back Soviet influence already established there.", "isCorrect": false, "rationale": "The Truman Doctrine was defensive containment, not rollback; it did not authorize military action to reverse existing Soviet gains in Eastern Europe."}, {"text": "required Senate ratification of all future military assistance agreements with foreign governments.", "isCorrect": false, "rationale": "The Truman Doctrine did not establish new Senate ratification requirements; it was a presidential address to Congress requesting specific appropriations."}], "id": "q02"}, {"question": "The strategic logic of the Marshall Plan (1948) rested on which of the following assumptions?", "options": [{"text": "Military alliances alone could deter Soviet expansion, making economic reconstruction a secondary priority.", "isCorrect": false, "rationale": "The Marshall Plan's architects believed military deterrence without economic stability was insufficient; impoverished democracies were seen as politically vulnerable to communism regardless of military guarantees."}, {"text": "Impoverished, unstable Western European democracies were vulnerable to communist parties, and prosperity was the best protection against radicalism.", "isCorrect": true, "rationale": "The plan's strategic premise was that economic desperation made communist electoral gains possible; American investment in European recovery was designed to undercut the conditions that communist parties exploited."}, {"text": "The Soviet Union would voluntarily reduce its influence in Eastern Europe if offered participation in an American-funded reconstruction program.", "isCorrect": false, "rationale": "The Soviet Union was invited to participate but declined and pressured its satellites to do likewise; the plan's architects had not expected Soviet cooperation to follow."}, {"text": "Western European governments needed American military bases, and the reconstruction funds were primarily intended to support those installations.", "isCorrect": false, "rationale": "The Marshall Plan was explicitly economic reconstruction aid; military basing arrangements followed separately under NATO, formalized in 1949."}], "id": "q03"}, {"question": "The Berlin Airlift (1948–49) demonstrated which of the following about early Cold War strategy?", "options": [{"text": "The United States was willing to use military force preemptively to prevent Soviet territorial gains in Europe.", "isCorrect": false, "rationale": "The airlift was a deliberate non-military response; the US chose to supply West Berlin by air precisely to avoid a direct military confrontation with Soviet ground forces."}, {"text": "Western resolve could be demonstrated through sustained, non-military counterpressure that forced a Soviet retreat without armed conflict.", "isCorrect": true, "rationale": "The 11-month airlift supplied two million Berliners and ended in a Soviet withdrawal — demonstrating that patient, firm, non-military counterpressure could succeed, consistent with Kennan's containment concept."}, {"text": "NATO's Article 5 collective defense guarantee was successfully invoked for the first time.", "isCorrect": false, "rationale": "NATO was not signed until April 1949, after the airlift began; the airlift preceded the formal alliance and was not conducted under Article 5 authority."}, {"text": "Air power could substitute for ground forces in defending disputed European territories indefinitely.", "isCorrect": false, "rationale": "The airlift succeeded because Stalin lifted the blockade — it demonstrated political resolve, not that air supply could permanently substitute for a conventional military presence."}], "id": "q04"}, {"question": "NSC-68 (1950) represented a transformation of Kennan's original containment concept primarily by", "options": [{"text": "restricting containment to Europe and abandoning commitments in Asia after the fall of China.", "isCorrect": false, "rationale": "NSC-68 expanded American military commitments globally; it did not restrict containment to Europe or accept the loss of Asia."}, {"text": "recasting containment from primarily political-economic instruments to a military doctrine requiring massive rearmament.", "isCorrect": true, "rationale": "Kennan's original concept emphasized political and economic tools; NSC-68, authored largely by Paul Nitze, argued that the Soviet bomb, the fall of China, and the Korean invasion required massive military expansion — a transformation Kennan himself protested."}, {"text": "proposing a negotiated settlement with the Soviet Union to reduce the risk of nuclear war.", "isCorrect": false, "rationale": "NSC-68 was a hawkish document calling for rearmament, not negotiation; it reflected the conclusion that diplomacy was insufficient to counter Soviet power."}, {"text": "limiting American military spending by relying on nuclear deterrence rather than conventional forces.", "isCorrect": false, "rationale": "NSC-68 called for dramatically increased overall defense spending, not reliance solely on nuclear deterrence; defense spending quadrupled from 1950 to 1953."}], "id": "q05"}, {"question": "Truman's decision to relieve General Douglas MacArthur of command in April 1951 is most significant for which constitutional principle?", "options": [{"text": "The president's authority to conduct foreign policy without Senate approval of individual diplomatic decisions.", "isCorrect": false, "rationale": "MacArthur's firing was about military command authority and civilian control, not Senate approval of diplomatic decisions."}, {"text": "The constitutional principle of civilian control of the military, which Truman upheld by removing a commander who publicly contradicted civilian policy.", "isCorrect": true, "rationale": "MacArthur publicly demanded expanded war aims contradicting Truman's policy of limited war; his removal affirmed the constitutional subordination of military commanders to civilian political authority."}, {"text": "Congress's exclusive authority to declare war, which MacArthur had violated by conducting unauthorized offensive operations.", "isCorrect": false, "rationale": "The controversy centered on MacArthur's public insubordination, not unauthorized operations; Truman had authorized the operations MacArthur was conducting."}, {"text": "The Supreme Court's authority to review the president's war powers in active military conflicts.", "isCorrect": false, "rationale": "The MacArthur controversy was resolved through executive action — Truman simply fired him — without Supreme Court involvement."}], "id": "q06"}, {"question": "Read the following passage from Kennan's Long Telegram: 'They have always feared foreign penetration, feared direct contact between Western world and their own, feared what would happen if Russians learned truth about world without or if foreigners learned truth about world within.' What does this passage suggest about the nature of Soviet power?", "options": [{"text": "Soviet leaders feared military encirclement and were primarily motivated by security concerns that reasonable American concessions could address.", "isCorrect": false, "rationale": "Kennan was arguing the opposite — that Soviet fears were ideological and structural, not the product of specific military threats that concessions could allay."}, {"text": "Soviet power depended on controlling information flows, suggesting a regime whose legitimacy rested on preventing its subjects from comparing their society to alternatives.", "isCorrect": true, "rationale": "Kennan identified information control as central to Soviet power — a regime that feared its people learning the truth about the outside world was one whose legitimacy rested on enforced isolation, not genuine popular consent."}, {"text": "The Soviet government was primarily concerned with protecting Russian cultural traditions from Western contamination.", "isCorrect": false, "rationale": "Kennan's argument was political and ideological, not cultural preservation; the fear was of political comparison and regime delegitimation, not cultural dilution."}, {"text": "Soviet hostility would moderate once Western nations demonstrated that they posed no military threat to Russian borders.", "isCorrect": false, "rationale": "Kennan explicitly argued that the Soviet threat derived from ideology and historical insecurity, not from Western military posture — accommodation would not reduce hostility."}], "id": "q07"}, {"question": "The Korean War (1950–53) established which precedent that would most directly shape American strategy in Vietnam?", "options": [{"text": "That the United Nations could authorize military action without a formal declaration of war by the United States Congress.", "isCorrect": false, "rationale": "While true, this was not the strategic precedent that most directly shaped Vietnam; the Korean experience's influence on Vietnam was about the logic of limited war."}, {"text": "That containment in Asia required total military victory and the elimination of communist governments from the Korean Peninsula.", "isCorrect": false, "rationale": "Korea ended in an armistice near the prewar division — specifically not total victory — which was the frustrating precedent that shaped subsequent limited-war debates."}, {"text": "That limited war fought under self-imposed constraints — avoiding escalation to conflict with China — could contain communist expansion but at enormous cost and without decisive victory.", "isCorrect": true, "rationale": "Korea established the pattern of fighting within geographical and strategic limits to avoid Chinese intervention, accepting a stalemate rather than pursuing total victory — a model applied with similar frustrations in Vietnam."}, {"text": "That nuclear weapons could substitute for conventional military forces in Asia, reducing the cost of containment commitments.", "isCorrect": false, "rationale": "Korea was fought with conventional forces; the nuclear option was considered but not used, and it did not become a model for reduced-cost containment."}], "id": "q08"}, {"question": "NATO's Article 5 collective defense guarantee represented which departure from prior American foreign policy?", "options": [{"text": "The first time the United States agreed to provide economic assistance to European nations in peacetime.", "isCorrect": false, "rationale": "Economic assistance preceded NATO — the Marshall Plan (1948) predated the NATO treaty (1949); Article 5 addressed military, not economic, commitments."}, {"text": "For the first time in its history, the United States committed in peacetime to the collective defense of foreign nations, breaking with the isolationist tradition.", "isCorrect": true, "rationale": "Washington's Farewell Address had counseled avoiding permanent alliances; NATO's peacetime collective defense commitment was an explicit break from that tradition, unprecedented in American history."}, {"text": "The first alliance in which the United States committed to participate only if Congress issued a formal declaration of war.", "isCorrect": false, "rationale": "Article 5 did not require a congressional declaration of war as a precondition for alliance obligations; this formulation inverts the constitutional reality."}, {"text": "A commitment by the United States to maintain troops in Europe only until the Soviet threat subsided.", "isCorrect": false, "rationale": "NATO created a permanent alliance commitment, not a temporary deployment arrangement contingent on threat levels subsiding."}], "id": "q09"}, {"question": "A historian argues that Kennan's containment doctrine was 'lost in translation' between its original conception and its implementation by American policymakers. Which of the following best supports this interpretation?", "options": [{"text": "Kennan published his ideas under a pseudonym, which prevented policymakers from knowing his true identity and consulting him directly.", "isCorrect": false, "rationale": "Kennan's identity as 'X' became widely known, and he continued to advise the State Department; the translation problem was conceptual, not a communication failure."}, {"text": "Kennan envisioned primarily political and economic instruments of containment, but policymakers translated his geopolitical concept into a military doctrine that he later repudiated.", "isCorrect": true, "rationale": "Kennan later argued that NSC-68 and subsequent policy had militarized his concept far beyond his intent; he had envisioned economic strength and political resilience as the primary containment tools, not military rearmament."}, {"text": "Kennan's concept was limited to Europe, while policymakers applied it globally, which Kennan supported as consistent with his analysis.", "isCorrect": false, "rationale": "Kennan did criticize the global extension of containment, but he also objected to its militarization — the issue was both geographic overextension and the shift from political to military instruments."}, {"text": "Congress rejected the Marshall Plan until it was reframed in military terms, forcing a militarization Kennan had originally opposed.", "isCorrect": false, "rationale": "Congress approved the Marshall Plan as an economic program; it was not reframed in military terms to win passage, and its success was economic, not military."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
