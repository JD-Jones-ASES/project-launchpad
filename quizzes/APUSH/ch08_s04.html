<script>
var QUESTIONS = [{"question": "Title VII of the Civil Rights Act of 1964 prohibited employment discrimination on the basis of race, sex, religion, or national origin. The inclusion of 'sex' is historically significant because", "options": [{"text": "it was included at the insistence of women civil rights activists who had been central to the movement since the Montgomery Bus Boycott.", "isCorrect": false, "rationale": "The source indicates that 'sex' was partly accidental — added by opponents intending to kill the bill — and partly the product of lobbying by women activists. It was not a fully planned outcome of sustained feminist organizing within the civil rights movement itself."}, {"text": "it was partly accidental (added by opponents to kill the bill) and became the legal foundation for decades of sex discrimination litigation by providing women with a statutory enforcement mechanism.", "isCorrect": true, "rationale": "The source explicitly states the inclusion was 'partly accidental' and 'partly a product of lobbying by women activists,' and that it 'became the legal foundation for decades of sex discrimination litigation' — an unintended but consequential provision."}, {"text": "it fulfilled a specific commitment LBJ had made to women voters during the 1964 presidential campaign.", "isCorrect": false, "rationale": "The source does not link Title VII's sex provision to a campaign commitment; it describes the inclusion as partly accidental and partly the result of last-minute lobbying, not a planned campaign promise."}, {"text": "it immediately resulted in equal pay legislation that closed the gender wage gap within a decade.", "isCorrect": false, "rationale": "Title VII's EEOC enforcement was slow and contested; the gender wage gap persisted for decades, and the connection between Title VII and immediate wage equality is not supported by the historical record."}], "id": "q01"}, {"question": "The Watts uprising (August 1965) — occurring five days after the Voting Rights Act was signed — revealed which critical limitation of the civil rights legislation of 1964–65?", "options": [{"text": "That Southern white resistance to the legislation was so intense that federal enforcement would be impossible without military occupation of Southern states.", "isCorrect": false, "rationale": "Watts was in Los Angeles — a Northern/Western city — demonstrating precisely that the problem extended beyond Southern resistance to federal legislation, not that Southern enforcement was impossible."}, {"text": "That the legislation had dismantled legal segregation but had not addressed the economic deprivation, residential segregation, police brutality, and de facto school segregation that structured Black urban life outside the South.", "isCorrect": true, "rationale": "The source explicitly makes this point: Watts 'reflected the conditions of Northern and Western Black urban life: concentrated poverty, police brutality, substandard housing, de facto school segregation, and unemployment that legislation had not addressed.'"}, {"text": "That the civil rights movement had alienated white moderates through the March on Washington's radical demands, making further legislative progress impossible.", "isCorrect": false, "rationale": "The March on Washington had broad public support; the Watts uprising's significance was about the limits of what had already been legislated, not the political cost of previous mobilization."}, {"text": "That Black community leaders had failed to educate residents about the new legal protections the Civil Rights Act provided.", "isCorrect": false, "rationale": "The Watts uprising reflected structural economic and police conditions, not ignorance of legal rights; the uprising was precisely about conditions that the Civil Rights Act had not addressed."}], "id": "q02"}, {"question": "The Kerner Commission's (1968) most important finding was that", "options": [{"text": "Black community leaders bore primary responsibility for urban violence because they had failed to channel grievances into nonviolent political action.", "isCorrect": false, "rationale": "The Kerner Commission explicitly rejected this interpretation, finding that 'the cause was not Black pathology but white racism embedded in housing policy, employment discrimination, and under-investment in urban communities.'"}, {"text": "the United States was 'moving toward two societies, one black, one white — separate and unequal,' and that white racism embedded in structural policies — not Black pathology — caused the urban uprisings.", "isCorrect": true, "rationale": "The source quotes the Kerner Commission's conclusion directly: two societies, and the cause being white racism embedded in housing policy, employment discrimination, and urban under-investment — a structural, not behavioral, diagnosis."}, {"text": "the Great Society programs had been adequate but were undermined by local government corruption that prevented federal funds from reaching Black communities.", "isCorrect": false, "rationale": "The Kerner Commission called for significantly expanded investment in urban communities — suggesting existing programs were insufficient, not that they were adequate but corrupted in implementation."}, {"text": "communist agitators from outside the United States had organized and led the urban uprisings as part of a Soviet influence operation.", "isCorrect": false, "rationale": "The Kerner Commission rejected conspiracy explanations in favor of structural analysis; the Soviet subversion interpretation was characteristic of McCarthyism, not serious post-1960s policy analysis."}], "id": "q03"}, {"question": "Malcolm X's critique of nonviolent integrationism argued that", "options": [{"text": "the pace of nonviolent organizing was too slow and should be accelerated through more aggressive but still peaceful tactics.", "isCorrect": false, "rationale": "Malcolm's critique was not about pace but about goal: integration into a white supremacist society was not liberation but co-optation — the problem was the goal of integration, not the speed of its pursuit."}, {"text": "integration into a society dominated by white supremacy was co-optation rather than liberation, and Black self-determination — economic, political, and cultural — was the necessary alternative.", "isCorrect": true, "rationale": "The source captures Malcolm's argument: integration was 'not liberation but co-optation'; his alternative was 'Black self-determination, Black economic independence, and Black pride' — a fundamentally different goal, not a tactical modification."}, {"text": "the federal government could be persuaded to support Black equality if civil rights activists shifted from demonstrations to legal challenges in federal courts.", "isCorrect": false, "rationale": "Malcolm was deeply skeptical of the federal government and the legal system as vehicles for Black liberation; his critique was precisely that relying on white-controlled institutions was insufficient."}, {"text": "African Americans should pursue full assimilation into white American culture as the most effective path to economic and social equality.", "isCorrect": false, "rationale": "Malcolm rejected assimilation entirely; his philosophy was explicitly about Black pride, separatism, and self-determination — the opposite of cultural assimilation."}], "id": "q04"}, {"question": "Stokely Carmichael's call for 'Black Power' in 1966 is historically significant primarily because", "options": [{"text": "it ended the civil rights movement by replacing it with a new and incompatible ideology.", "isCorrect": false, "rationale": "The source explicitly states that Black Power and nonviolent integration 'were rival emphases within the same struggle, not separate movements' — Black Power did not end the civil rights movement but represented a shift in emphasis and strategy within it."}, {"text": "it introduced a deliberately ambiguous phrase that encompassed a spectrum of meanings — community control, cultural pride, economic self-sufficiency, electoral power — signaling the movement's expansion beyond legal desegregation.", "isCorrect": true, "rationale": "The source emphasizes that Black Power was 'a deliberately ambiguous phrase that encompassed a spectrum of meanings,' signaling the movement's evolution from legal desegregation to a broader agenda of community power and self-determination."}, {"text": "it was a coordinated communication strategy developed by the Black Panther Party to recruit members in Northern cities.", "isCorrect": false, "rationale": "Black Power was called by Stokely Carmichael (SNCC) during the March Against Fear in Mississippi in 1966; the Black Panther Party was founded in Oakland in the same year but independently."}, {"text": "it immediately isolated the civil rights movement from its white liberal allies, ending congressional support for further civil rights legislation.", "isCorrect": false, "rationale": "The relationship between Black Power and white liberal support was complicated; the movement did experience erosion of white liberal support, but this was a process rather than an immediate consequence of a single call."}], "id": "q05"}, {"question": "The Black Panther Party (founded 1966) is best understood as", "options": [{"text": "a purely criminal organization that used the language of political activism to justify violence against police.", "isCorrect": false, "rationale": "The source describes the Panthers' community programs (free breakfast for children, health clinics, legal aid) alongside their armed self-defense posture — reducing them to a criminal organization misrepresents their complex organizational character."}, {"text": "an organization that combined armed community self-defense against police violence with social programs (free breakfast, health clinics) and a revolutionary critique drawing on Malcolm X and Marxist analysis.", "isCorrect": true, "rationale": "The source explicitly describes the Panthers' dual character: armed self-defense plus social service programs plus revolutionary ideology drawing on Malcolm X and Marxism — a complex organization that cannot be reduced to either its radicalism or its community work alone."}, {"text": "a nonviolent community organization that used Black Power rhetoric as symbolic resistance while pursuing integration through conventional political channels.", "isCorrect": false, "rationale": "The Panthers explicitly armed themselves and rejected integration; describing them as nonviolent misrepresents their self-defense posture and their critique of integrationist goals."}, {"text": "a Southern organization that extended the church-based organizing model of the SCLC to urban Northern communities.", "isCorrect": false, "rationale": "The Panthers were founded in Oakland, California, and explicitly rejected the church-based, nonviolent model of the SCLC; their Marxist analysis and armed self-defense posture was a deliberate departure from SCLC's approach."}], "id": "q06"}, {"question": "The 24th Amendment (ratified January 1964) and the Voting Rights Act (1965) together addressed which problem?", "options": [{"text": "The gerrymandering of congressional districts to dilute Black voting strength in Northern cities.", "isCorrect": false, "rationale": "The 24th Amendment abolished poll taxes and the Voting Rights Act suspended literacy tests — both addressed disenfranchisement in Southern states, not Northern gerrymandering."}, {"text": "The formal instruments of Southern Black disenfranchisement operative since the 1890s — poll taxes and discriminatory voting requirements like literacy tests.", "isCorrect": true, "rationale": "The 24th Amendment abolished poll taxes in federal elections; the Voting Rights Act suspended literacy tests and other discriminatory voting requirements in covered jurisdictions — together removing the formal disenfranchisement mechanisms erected during the post-Reconstruction era."}, {"text": "The economic conditions that prevented Black Americans from participating in the political process despite having formal voting rights.", "isCorrect": false, "rationale": "The 24th Amendment and Voting Rights Act addressed formal disenfranchisement mechanisms (taxes, literacy tests, federal registrar requirements); addressing the economic conditions of Black political exclusion required different legislation."}, {"text": "The Supreme Court's interpretation of the Fifteenth Amendment that had allowed states to restrict Black voting since Plessy v. Ferguson.", "isCorrect": false, "rationale": "Plessy v. Ferguson addressed racial segregation, not voting rights; the mechanisms of Black disenfranchisement since the 1890s included poll taxes, literacy tests, grandfather clauses, and white primaries — not derived from Plessy."}], "id": "q07"}, {"question": "King's 'Beyond Vietnam' speech at Riverside Church (1967) connected the anti-war cause to the civil rights and economic justice agenda. This connection cost him support primarily among", "options": [{"text": "Southern Black communities who supported the Vietnam War as an opportunity for African American men to demonstrate patriotism and advance within American society.", "isCorrect": false, "rationale": "Black communities were disproportionately skeptical of the war; the opposition to King's Riverside speech came primarily from white liberals and civil rights establishment figures who feared linking the movement to the antiwar cause."}, {"text": "white liberals and the civil rights establishment who feared that opposing Johnson's Vietnam policy would cost the movement the White House ally it needed for further domestic reforms.", "isCorrect": true, "rationale": "The source states King 'cost him significant support among white liberals and within the civil rights establishment' — those who believed opposing Johnson would sacrifice the political relationship that had produced the Great Society reforms."}, {"text": "SNCC activists who believed King was co-opting their independently developed antiwar position.", "isCorrect": false, "rationale": "SNCC had already moved toward antiwar positions and Black Power; they were not threatened by King's Riverside speech but had already departed from his strategic vision."}, {"text": "African American veterans who felt King was undermining their service and sacrifice by opposing the war.", "isCorrect": false, "rationale": "While African American veterans had complex views on King's speech, the source identifies the primary support erosion as coming from white liberals and the civil rights establishment, not primarily from veterans."}], "id": "q08"}, {"question": "The 'Bloody Sunday' attack on marchers at the Edmund Pettus Bridge in Selma, Alabama (March 7, 1965) produced which political outcome?", "options": [{"text": "It triggered a Supreme Court ruling that the Fourteenth Amendment prohibited all forms of voter discrimination, eliminating the need for separate voting rights legislation.", "isCorrect": false, "rationale": "The Selma violence triggered legislative action, not a Supreme Court ruling; Johnson presented voting rights legislation to Congress in response to the attack, not the Court."}, {"text": "It produced one of the largest outpourings of public support the movement had generated, and directly catalyzed the Voting Rights Act of 1965.", "isCorrect": true, "rationale": "The source states Bloody Sunday's images 'produced one of the largest outpourings of public support the movement had ever generated' and was the immediate catalyst for the Voting Rights Act — passed by Congress and signed in August 1965."}, {"text": "It caused President Johnson to deploy federal troops to protect the marchers and escort them to Montgomery.", "isCorrect": false, "rationale": "Johnson did eventually send troops to protect the third march to Montgomery, but the immediate political outcome of Bloody Sunday was congressional action on voting rights legislation, not troop deployment."}, {"text": "It demonstrated that nonviolent direct action had lost its effectiveness and persuaded the movement to adopt the Black Power strategy.", "isCorrect": false, "rationale": "Bloody Sunday was a tactical success for nonviolent direct action precisely because it generated the confrontational images and moral outrage that produced legislative action; Black Power emerged from different frustrations, not from Selma's failure."}], "id": "q09"}, {"question": "A student argues that the shift from integration to Black Power represented the civil rights movement's abandonment of its founding principles. A historian using the source would most likely respond that", "options": [{"text": "the student is correct: Black Power's rejection of nonviolence made it incompatible with the movement's core values.", "isCorrect": false, "rationale": "The source explicitly states Black Power and nonviolent integration 'were rival emphases within the same struggle, not separate movements'; Black Power was not a betrayal of the movement but an evolution within it responding to the limits of legislative liberalism."}, {"text": "the shift reflected a shared diagnosis of American racial inequality — that legal equality without economic and political power was insufficient — even if Black Power proposed different remedies than integration.", "isCorrect": true, "rationale": "The source's 'Key Concept — The Multiple Meanings of Black Power' states Black Power tendencies 'shared a diagnosis — that legal equality without economic and political power was insufficient' — they responded differently to the same problem the civil rights movement had always confronted."}, {"text": "Black Power was an external influence from international communism that had no organic connection to the American civil rights tradition.", "isCorrect": false, "rationale": "The source roots Black Power in the domestic experience of limits of legislative liberalism and the urban uprising context — not in foreign communist influence."}, {"text": "the civil rights movement had never been committed to integration as a goal; its founding principles were economic rather than social.", "isCorrect": false, "rationale": "Integration — specifically the desegregation of public accommodations, schools, and political institutions — was a central goal of the nonviolent civil rights movement; claiming it never was misrepresents the movement's history."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
