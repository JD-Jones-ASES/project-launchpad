<body>

        <div class="subtitle">AP United States History &mdash; The Revolutionary War and Its Disparate Impacts</div>

<script>
var QUESTIONS = [{"question": "A historian writes: 'The Battle of Saratoga mattered less for what happened on the battlefield than for what happened in Versailles three months later.' This interpretation suggests that Saratoga's primary significance was:", "options": [{"text": "Military — it destroyed the main British army in North America, effectively ending major combat operations in the North", "isCorrect": false, "rationale": "While Saratoga was a major British defeat (5,700 troops surrendered), it did not end combat operations in the North; the British continued fighting, capturing Philadelphia and pursuing a southern strategy. The historian's emphasis on Versailles points to diplomatic, not military, significance."}, {"text": "Diplomatic — it convinced France that the American cause was viable, producing the 1778 alliance that brought French naval power, troops, and loans to the American war effort", "isCorrect": true, "rationale": "The source explicitly states that Saratoga's 'diplomatic consequence was greater' than its military result: France, which had been providing covert aid since 1776, concluded from Saratoga that the Americans could win and signed the formal alliance in February 1778 — transforming the conflict."}, {"text": "Political — it convinced the Continental Congress to grant Washington emergency powers to pursue the war more aggressively", "isCorrect": false, "rationale": "The source does not describe any grant of emergency powers to Washington following Saratoga; the domestic political impact was significant but operated through public morale, not Congressional emergency legislation."}, {"text": "Economic — it allowed the Continental Congress to issue sufficient paper currency to fund the remainder of the war without depreciation", "isCorrect": false, "rationale": "Continental currency depreciated severely throughout the war, with or without Saratoga; the French alliance brought financial assistance but did not resolve the fundamental problem of congressional lack of taxation power."}], "id": "q01"}, {"question": "Lord Dunmore's Proclamation (1775) offered freedom to enslaved men who escaped their patriot masters and joined British forces. Which of the following BEST characterizes the historical significance of this proclamation?", "options": [{"text": "It demonstrates that Britain was committed to abolishing slavery throughout the empire as part of its wartime strategy", "isCorrect": false, "rationale": "Dunmore's Proclamation was a strategic military measure aimed at undermining the Patriot war effort by depriving slaveholders of labor — not a principled commitment to abolition; Britain maintained slavery in its Caribbean colonies throughout and after the Revolution."}, {"text": "It reveals that enslaved people were active agents of their own liberation who read the Revolutionary crisis strategically and acted on their opportunities, rather than passive victims awaiting liberation from outside", "isCorrect": true, "rationale": "The source explicitly states that 'enslaved people were active agents of their own liberation rather than passive victims' — the 800–2,000 who reached British lines, and the tens of thousands who fled during British occupations, demonstrate strategic agency in seizing opportunities created by the war."}, {"text": "It was universally successful, with virtually all enslaved people in the South escaping to British lines before the war ended", "isCorrect": false, "rationale": "The Proclamation had limited reach — approximately 800 to 2,000 reached British lines, and tens of thousands fled during British occupations, but the vast majority of 450,000 enslaved people in the colonies remained enslaved; the Proclamation's effects were significant but far from universal."}, {"text": "It prompted the Continental Congress to offer freedom to enslaved people who served in the Continental Army, creating large African American military units", "isCorrect": false, "rationale": "While some African Americans did serve in the Continental Army, the Congress did not respond to Dunmore with a freedom proclamation; Washington initially resisted enlisting enslaved men, and there was no congressional offer of freedom in direct response to Dunmore."}], "id": "q02"}, {"question": "Read the following passage: 'Republican motherhood elevated women's domestic labor into a patriotic contribution while simultaneously redirecting any claim to political rights into the channels of maternal influence.' This passage describes a concept that BOTH expanded and limited women's position. Which pair of outcomes BEST captures this duality?", "options": [{"text": "Expanded: women could now vote in state elections. Limited: women could not hold federal office.", "isCorrect": false, "rationale": "Republican motherhood did not expand women's voting rights; women remained excluded from voting in virtually all states. The expansion described in the source was ideological — an elevated status within the domestic sphere — not a formal political right."}, {"text": "Expanded: women's domestic and educational labor was recognized as essential to republican governance. Limited: demands for formal political rights were channeled into maternal influence, leaving legal subordination (coverture, property restrictions, voting exclusion) largely intact.", "isCorrect": true, "rationale": "The source explicitly identifies this duality: republican motherhood 'expanded the scope of women's acknowledged contribution' (elevating domestic labor as patriotically essential, prompting expanded female education) 'while leaving their legal subordination — coverture, property restrictions, exclusion from voting — largely intact.'"}, {"text": "Expanded: women could now own property independently of their husbands. Limited: women were still excluded from military service.", "isCorrect": false, "rationale": "Republican motherhood did not change coverture or property law; women still could not independently own property in most states. The concept was ideological — it redefined women's domestic role as patriotically valuable without changing the legal structure of coverture."}, {"text": "Expanded: women could publish pamphlets criticizing the government. Limited: women could not serve in the Continental Congress.", "isCorrect": false, "rationale": "The source does not link republican motherhood to publication rights; the concept specifically concerned the household and motherhood as a civic role — not women's print culture or legislative participation."}], "id": "q03"}, {"question": "The Treaty of Paris (1783) recognized American independence and granted the new nation territory to the Mississippi River. For which group did this territorial settlement represent the greatest loss, and why?", "options": [{"text": "British Loyalists, who had supported the Crown and were now forced to flee to Canada or Britain without compensation", "isCorrect": false, "rationale": "Loyalists did suffer significantly, but the Treaty of Paris included provisions (Article V) recommending that Congress work toward restoring Loyalist property — however imperfectly enforced. Indigenous nations received no comparable provision and faced the loss of sovereignty over their territories without any treaty recognition."}, {"text": "Indigenous nations, whose land rights were not recognized in the treaty — Britain surrendered their territories without consultation, and American westward expansion posed a greater long-term threat than the British empire it replaced", "isCorrect": true, "rationale": "The source states that the treaty 'made no provision for America's indigenous allies or enemies; Britain surrendered their territories without consultation' — and that for indigenous peoples, the Revolution was 'a disaster,' eliminating the Proclamation Line that had offered some protection while granting the United States sovereignty over territories it intended to settle."}, {"text": "Southern enslaved people, who had hoped that American independence would lead to immediate emancipation", "isCorrect": false, "rationale": "The Treaty of Paris had no emancipation provisions and Southern slavery intensified after independence; the source notes 'the Constitution of 1787 would entrench slavery's protections further.' However, the treaty itself was a bilateral agreement between Britain and the United States — it made no provisions about indigenous peoples OR enslaved people, making the indigenous loss the more directly treaty-related consequence."}, {"text": "Northern merchants, whose trade was disrupted by the loss of preferential access to British imperial markets", "isCorrect": false, "rationale": "Northern merchants did face trade disruptions, but these were economic adjustments rather than the loss of territorial sovereignty, cultural survival, and political existence that indigenous nations faced."}], "id": "q04"}, {"question": "The Revolutionary War's outcomes for enslaved people varied dramatically by region. Which of the following BEST explains why the North moved toward emancipation while the South did not?", "options": [{"text": "Northern states had more radical political leaders who were personally committed to abolition, while Southern leaders were uniformly indifferent to the Revolution's ideals", "isCorrect": false, "rationale": "The source emphasizes structural economic factors: 'in the North, where slavery was economically marginal' and in the South, 'where slavery was central to the plantation economy' — ideology alone cannot explain the regional divergence without the economic context."}, {"text": "In the North, slavery was economically marginal, making the Revolution's freedom rhetoric sufficient to drive gradual emancipation; in the South, slavery was central to the plantation economy, and independence actually removed the only external constraint (British authority) on slaveholders' autonomy", "isCorrect": true, "rationale": "The source explicitly frames the divergence in economic structural terms: northern slavery was 'economically marginal' allowing rhetoric to drive change; southern slavery was 'central to the plantation economy,' and 'the removal of British authority eliminated the only external constraint on Southern slaveholders' autonomy.'"}, {"text": "Britain had banned slavery in the Northern colonies before the Revolution, making post-Revolutionary emancipation merely a formalization of existing law", "isCorrect": false, "rationale": "Britain had not banned slavery in the Northern colonies; the Somerset case (1772) addressed slavery in England, not the colonies. Northern emancipation after the Revolution came from state constitutions and gradual emancipation laws, not British precedent."}, {"text": "The Northern states' emancipation was driven by the large number of African Americans who had served in the Continental Army, creating a political debt that legislatures felt obligated to repay", "isCorrect": false, "rationale": "While African Americans did serve in the Continental Army, the source frames Northern emancipation in terms of slavery's economic marginality rather than a political debt to Black soldiers; the source attributes the divergence primarily to economic structure."}], "id": "q05"}, {"question": "The Iroquois Confederacy fractured during the Revolutionary War. What does this fracture reveal about the nature of the conflict for indigenous peoples?", "options": [{"text": "The Iroquois Confederacy had never been a functional political alliance and simply collapsed under external pressure for the first time", "isCorrect": false, "rationale": "The source notes that the Confederacy had 'maintained a policy of neutrality in earlier Anglo-French conflicts' and was an alliance 'that had endured for perhaps three centuries' — its fracture under Revolutionary pressure was historically significant precisely because it destroyed a durable institution."}, {"text": "The Revolution forced indigenous nations into impossible choices between alignment with powers whose ultimate goal was the dispossession of indigenous land — and any choice led to catastrophic loss", "isCorrect": true, "rationale": "The source shows that the Mohawks' British alignment and the Oneidas' American alignment both resulted in devastation: the Sullivan-Clinton expedition targeted the pro-British Haudenosaunee, and the Treaty of Paris ignored American indigenous allies as thoroughly as it ignored British ones. The Confederacy's fracture illustrates that no alignment offered a path to survival."}, {"text": "The fracture demonstrated that the Iroquois Confederacy had been dominated by the Mohawks and collapsed when Mohawk leadership chose the losing British side", "isCorrect": false, "rationale": "While Mohawk leader Joseph Brant chose the British side, the fracture was between multiple nations (Mohawk/Seneca/Cayuga/Onondaga vs. Oneida/Tuscarora) and represented a genuine civil war within a confederation, not simply the consequence of one nation's poor choice."}, {"text": "The Confederacy's fracture was a short-term disruption; most Iroquois nations quickly reunited after the Revolution and maintained their territorial control", "isCorrect": false, "rationale": "The source states 'the Confederacy never recovered' — the fracture was permanent, not temporary. The Sullivan-Clinton expedition's systematic destruction of Haudenosaunee villages, food stores, and orchards ensured that even reunification would not restore the pre-war situation."}], "id": "q06"}, {"question": "Washington's army wintered at Valley Forge in 1777–78 under conditions that killed perhaps a quarter of his men. Why, given these catastrophic conditions, did the Continental Army survive as a fighting force?", "options": [{"text": "The Continental Congress successfully raised taxes to pay and equip the army during the Valley Forge winter", "isCorrect": false, "rationale": "The Continental Congress had no taxation power; it could only request funds from states, which frequently ignored the requests. The army's survival was not a product of adequate financing."}, {"text": "A combination of French covert aid (already flowing since 1776), Washington's leadership in maintaining cohesion, and the military training introduced by Baron von Steuben sustained the army through the winter", "isCorrect": true, "rationale": "The source attributes American survival to 'French intervention, partly of British strategic mistakes, and partly of Washington's genius for keeping an army together when everything conspired to dissolve it' — and the Valley Forge winter preceded the formal French alliance, when covert French aid and Washington's leadership were the primary sustaining factors."}, {"text": "British forces chose not to attack Valley Forge during the winter because European military convention prohibited winter campaigns", "isCorrect": false, "rationale": "While the British did not attack Valley Forge (occupying Philadelphia instead), this was a strategic choice, not a European military convention; and the army's survival was an active achievement despite undersupply, not simply a result of British restraint."}, {"text": "Colonial militias from Pennsylvania and Virginia supplied the Continental Army throughout the winter, preventing starvation", "isCorrect": false, "rationale": "The source does not describe militia supply as the key factor; the army suffered severe shortages throughout the winter — its survival reflected Washington's leadership and the commitment of soldiers who remained despite conditions, not adequate supply from local militias."}], "id": "q07"}, {"question": "The Sullivan-Clinton expedition (1779) targeted Haudenosaunee villages, food stores, and orchards rather than warrior forces in battle. What does this targeting strategy reveal about American military objectives toward indigenous peoples?", "options": [{"text": "The expedition was designed to defeat Iroquois warriors in open battle before they could attack American frontier settlements the following spring", "isCorrect": false, "rationale": "The source explicitly states the expedition was 'scorched earth designed not to defeat warriors in battle but to starve entire communities' — the targeting of food stores and orchards was a deliberate strategy of civilian destruction, not military engagement."}, {"text": "The expedition pursued a strategy of total war against Haudenosaunee civilian society — destroying the material and agricultural foundations of indigenous life to make continued resistance impossible", "isCorrect": true, "rationale": "The source describes 'systematically destroying Haudenosaunee villages, food stores, and orchards — scorched earth designed not to defeat warriors in battle but to starve entire communities.' This reveals that American objectives extended beyond military defeat to the destruction of indigenous society's capacity to sustain itself."}, {"text": "The expedition was a punitive measure specifically targeting pro-British Iroquois who had raided American frontier settlements, not a general campaign against all Haudenosaunee", "isCorrect": false, "rationale": "While the campaign did target pro-British Iroquois nations, the strategy of destroying villages and food stores affected entire communities — women, children, elders, and non-combatants — not only warriors or fighters who had conducted raids."}, {"text": "The expedition was primarily an economic campaign to seize Iroquois farmland and food for redistribution to Continental Army soldiers", "isCorrect": false, "rationale": "The source describes systematic destruction, not seizure; orchards and food stores were destroyed, not harvested. The goal was deprivation and displacement, not economic appropriation for American use."}], "id": "q08"}, {"question": "A student argues: 'The American Revolution proved that the ideals of liberty and equality could be fully realized if a society was committed to them.' Which of the following evidence from the source MOST effectively challenges this claim?", "options": [{"text": "The Continental Army suffered severe supply shortages throughout the war, proving that idealistic rhetoric was insufficient to sustain military operations", "isCorrect": false, "rationale": "Army supply problems are logistical, not a direct challenge to the ideological claim about liberty and equality; the student's claim is about whether revolutionary ideals were realized, not whether the army was well-supplied."}, {"text": "White male property owners gained the fullest expansion of political rights; women gained elevated ideological status but not legal equality; enslaved people in the North gained freedom but those in the South faced strengthened slavery; and indigenous nations lost the Proclamation Line and faced accelerated dispossession", "isCorrect": true, "rationale": "This evidence directly refutes the claim: the Revolution's liberating effects were 'radically uneven' — deeply realizing the ideals for some groups while doing the opposite for others. The same revolution that expanded rights for white male property owners strengthened slavery in the South and destroyed indigenous territorial sovereignty."}, {"text": "France, Spain, and the Netherlands only allied with the Americans for strategic advantage, not out of commitment to liberty and equality", "isCorrect": false, "rationale": "European powers' motivations are not directly relevant to whether the Revolution realized liberty and equality within the United States; this point addresses international relations, not domestic outcomes."}, {"text": "The Articles of Confederation proved too weak to govern effectively, showing that revolutionary enthusiasm alone was insufficient for state-building", "isCorrect": false, "rationale": "Governmental structure problems came after the Revolution and are a separate issue from whether the ideals of liberty and equality were realized for the people within the new republic — the student's claim is about ideals, not governmental efficiency."}], "id": "q09"}, {"question": "Deborah Sampson disguised herself as a man to serve in the Continental Army. What does her case suggest about women's roles during the Revolutionary War?", "options": [{"text": "Women's formal military service was common during the Revolution, with many serving openly in the Continental Army", "isCorrect": false, "rationale": "Sampson was exceptional, not typical; she disguised herself precisely because formal military service was unavailable to women. The source presents her as a rare case among the broader pattern of women's expanded wartime roles."}, {"text": "The Revolution's disruption of social norms created spaces in which some women exceeded the boundaries of expected roles — though such exceptions required disguise and could not be openly claimed, illustrating the gap between individual action and official inclusion", "isCorrect": true, "rationale": "Sampson's disguise was necessary because formal military service was unavailable to women — she could act outside gender norms only by concealing her identity. This illustrates how wartime disruption created individual opportunities while official structures remained closed, foreshadowing the tension between women's demonstrated capacities and their legal exclusion."}, {"text": "Sampson's case proved that gender was irrelevant to military performance, leading Congress to formally integrate women into the Continental Army", "isCorrect": false, "rationale": "Congress did not formally integrate women; Sampson's case was exceptional and exceptional precisely because it required concealment. No formal policy change followed from her service."}, {"text": "Women like Sampson were celebrated as heroines during the war and granted voting rights in recognition of their service in the states where they lived", "isCorrect": false, "rationale": "Voting rights for women were not granted as a result of wartime service; only New Jersey briefly allowed some property-owning women to vote (later revoked in 1807), and this was not a recognition of wartime service."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
