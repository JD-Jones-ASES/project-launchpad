    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Buddha's \"noble silence\" in response to metaphysical questions like \"Is the universe eternal?\" primarily indicates his belief that:", "options": [{"text": "Such questions are inherently unanswerable by human minds.", "isCorrect": false, "rationale": "The text does not state that the questions are unanswerable, but rather that pursuing them is unproductive for liberation. The Buddha was not confused or evasive."}, {"text": "Philosophical speculation on such topics distracts from the immediate task of ending suffering.", "isCorrect": true, "rationale": "The Parable of the Poisoned Arrow illustrates that demanding answers to metaphysical questions (like the man asking about the arrow's shooter) is a 'philosophical luxury' that diverts attention from the urgent problem of suffering and its cessation."}, {"text": "He did not possess the ultimate knowledge to provide definitive answers.", "isCorrect": false, "rationale": "The text explicitly states that the Buddha 'was not confused, and he was not being evasive,' implying his refusal was a deliberate teaching strategy, not a lack of knowledge."}, {"text": "The true answers to these questions are revealed only through meditation.", "isCorrect": false, "rationale": "While meditation is central to Buddhist practice, the reason given for the noble silence is the impracticality of such questions for liberation, not the method of their revelation."}], "id": "q01"}, {"question": "According to the text, the Sanskrit term \"pratityasamutpada\" refers to:", "options": [{"text": "The path to enlightenment through selfless action and service.", "isCorrect": false, "rationale": "This describes a different aspect of spiritual practice, not the core meaning of pratityasamutpada as presented in the text."}, {"text": "The concept of dependent origination, where all phenomena arise in dependence on conditions and nothing exists independently.", "isCorrect": true, "rationale": "The text defines 'pratityasamutpada' as 'dependent origination' or 'dependent arising,' holding that 'all phenomena arise in dependence on conditions: nothing exists independently, on its own, as a self-sufficient entity.'"}, {"text": "The uncaused, eternal creator or first cause of the universe.", "isCorrect": false, "rationale": "Pratityasamutpada explicitly rejects the idea of an uncaused creator or a first cause, positing an 'endless, beginningless web of interdependence.'"}, {"text": "The suffering inherent in human existence due to attachment to worldly things.", "isCorrect": false, "rationale": "While suffering is a central theme in Buddhism, this is a concept related to the Four Noble Truths, not the definition of pratityasamutpada."}], "id": "q02"}, {"question": "Based on the teaching of pratityasamutpada, if a phenomenon were claimed to suddenly exist independently without any preceding conditions, how would Buddhist philosophy described in the text view it?", "options": [{"text": "As evidence of a divine, uncaused creator, even if that creator is not a deity.", "isCorrect": false, "rationale": "The text explicitly states, 'There is no first cause, no uncaused creator' in the context of pratityasamutpada."}, {"text": "As a contradiction to the fundamental principle that nothing exists independently, on its own.", "isCorrect": true, "rationale": "Pratityasamutpada states that 'nothing exists independently, on its own, as a self-sufficient entity.' An independently existing phenomenon would directly contradict this core teaching."}, {"text": "As a temporary illusion that, like all phenomena, will eventually cease to exist.", "isCorrect": false, "rationale": "While impermanence (anicca) is a key Buddhist concept, the primary issue here is the claim of *independent* existence, which violates dependent origination, not merely its temporary nature."}, {"text": "As an anomaly that requires extensive metaphysical investigation to understand its unique origin.", "isCorrect": false, "rationale": "The Buddha generally discouraged 'philosophical luxuries' or metaphysical questions that do not lead to liberation from suffering, making extensive investigation of such an anomaly unlikely to be encouraged."}], "id": "q03"}, {"question": "The opening verses of the Dhammapada state, \"All that we are is the result of what we have thought.\" The text clarifies that this primarily means:", "options": [{"text": "The external world is merely an illusion or dream created by our individual minds.", "isCorrect": false, "rationale": "The text explicitly refutes this common misreading: 'This does not mean that the external world is simply a dream or an illusion we have invented.'"}, {"text": "Our mental state and its orientation profoundly shape how we experience and interact with the objective world.", "isCorrect": true, "rationale": "The text explains, 'It means that the world as we experience it... is profoundly shaped by the quality and orientation of our minds.' A mind with hatred experiences a hostile world, while a compassionate mind experiences it differently."}, {"text": "Human thoughts have the power to directly alter the physical laws and structure of the universe.", "isCorrect": false, "rationale": "This interpretation goes beyond what the text suggests. The focus is on the subjective experience of the world, not its objective physical alteration by thought."}, {"text": "We are responsible for creating the objective reality around us through sheer willpower and intention.", "isCorrect": false, "rationale": "The text clarifies that the world is 'co-created by the minds of those who inhabit it' in terms of *experience*, not as an objective creation by willpower alone."}], "id": "q04"}, {"question": "Consider a situation where a person constantly feels wronged and harbors deep resentment towards others. According to the Dhammapada verses and their interpretation in the text, what is the most effective Buddhist approach to finding peace in this situation?", "options": [{"text": "Demanding apologies and justice from those who have caused them harm to resolve the conflict.", "isCorrect": false, "rationale": "The Dhammapada states that 'in those who harbour such thoughts [like 'He abused me, he beat me'] hatred will never cease.' This suggests that external demands or focusing on others' actions won't resolve internal hatred."}, {"text": "Cultivating a mind of compassion and letting go of resentful thoughts and narratives of being wronged.", "isCorrect": true, "rationale": "The Dhammapada explicitly teaches, 'For hatred does not cease by hatred at any time: hatred ceases by love, this is an old rule.' It also states that in 'those who do not harbour such thoughts hatred will cease,' emphasizing a shift in one's own mental state."}, {"text": "Seeking to understand the complex, interdependent causes that led to their suffering and the actions of others.", "isCorrect": false, "rationale": "While understanding interdependence is fundamental in Buddhism, the Dhammapada verses directly address the cessation of hatred through the cultivation of a specific mental attitude (love/non-harbouring thoughts), making this the most direct answer to the question based on the provided text."}, {"text": "Believing that their current suffering is a pre-destined outcome of past actions, and thus unchangeable.", "isCorrect": false, "rationale": "The Dhammapada emphasizes the *present* power of thought to shape experience ('If a man speaks or acts with a pure thought, happiness follows'), implying that one's current state is not unchangeable but can be transformed."}], "id": "q05"}, {"question": "How does Buddhist cosmology, specifically through pratityasamutpada, fundamentally differ from a creator-deity model regarding the origin and nature of the universe?", "options": [{"text": "Buddhist cosmology proposes a specific cyclical timeline for creation and destruction, unlike a linear creator model.", "isCorrect": false, "rationale": "While Buddhist cosmology involves cycles (as mentioned in 'DID YOU KNOW?'), the core difference highlighted in the main text regarding pratityasamutpada is not primarily the timeline but the *mechanism* of arising."}, {"text": "Buddhist cosmology posits an uncaused first cause, but one that is an impersonal force rather than a deity.", "isCorrect": false, "rationale": "The text explicitly states, 'There is no first cause, no uncaused creator,' making this option incorrect."}, {"text": "Buddhist cosmology views the universe as a self-sustaining, beginningless, and endless web of interdependent conditions, not a created entity.", "isCorrect": true, "rationale": "The text states that pratityasamutpada 'offers a radical alternative to the creator-deity model of cosmology. The universe is not a thing that was created by someone. It is a web of interdependent causes and conditions, each arising from other causes and conditions, in a beginningless and endless process.'"}, {"text": "Buddhist cosmology emphasizes the universe as a temporary illusion, while creator models see it as a concrete reality.", "isCorrect": false, "rationale": "The text clarifies that the 'primacy of mind' does not mean the external world is an illusion, but rather that our *experience* of it is profoundly shaped by mind."}], "id": "q06"}, {"question": "The text states that what the Buddha offers, instead of cosmological certainty, is \"a map of the way out of suffering.\" This highlights Buddhism's primarily:", "options": [{"text": "Academic and theoretical interest in philosophical puzzles about existence.", "isCorrect": false, "rationale": "The text contrasts this with the Buddha's approach, describing metaphysical questions as 'philosophical luxuries' and emphasizing a 'practical orientation.'"}, {"text": "Practical and pragmatic focus on alleviating the human condition of suffering.", "isCorrect": true, "rationale": "The text explicitly states, 'This is the urgent, practical orientation that Buddhism brings to every question, including the grandest cosmological ones,' prioritizing the cessation of suffering."}, {"text": "Metaphysical explanation of the universe's ultimate structure and origin.", "isCorrect": false, "rationale": "The Buddha's 'noble silence' and the parable of the poisoned arrow demonstrate his refusal to engage in such explanations as primary teaching."}, {"text": "Esoteric and mystical teachings accessible only to a select group of initiates.", "isCorrect": false, "rationale": "The focus on a 'map of the way out of suffering' implies a clear and understandable path for sentient beings generally, not an esoteric or restricted teaching."}], "id": "q07"}, {"question": "According to the \"DID YOU KNOW?\" section, the Buddhist concept of anicca (impermanence) extends to:", "options": [{"text": "Only the physical bodies and personal possessions of individual human lives.", "isCorrect": false, "rationale": "The text explicitly states anicca 'applies to the cosmos as well as to individual lives,' indicating a much broader scope than just individuals."}, {"text": "All phenomena within the universe, including vast world-systems, stars, galaxies, and even divine beings.", "isCorrect": true, "rationale": "The 'DID YOU KNOW?' section states that anicca 'applies to the cosmos... Buddhist cosmology describes vast world-systems arising and passing away... Stars are born and die; galaxies form and dissolve; even the gods, in Buddhist cosmology, are subject to impermanence. Nothing, at any scale, is permanent.'"}, {"text": "Everything except the fundamental principles of Buddhist dharma and the state of nirvana.", "isCorrect": false, "rationale": "While the text implies that the cessation of suffering (Nirvana) is attainable, the 'DID YOU KNOW?' section specifically focuses on what *is* impermanent, listing cosmic elements and gods, without explicitly discussing exceptions like Dharma or Nirvana's impermanence. The question asks what it *extends to* based on the text."}, {"text": "Only the subjective experiences of sentient beings, not objective reality.", "isCorrect": false, "rationale": "The text explicitly mentions 'the cosmos,' 'world-systems,' 'stars,' and 'galaxies,' which are generally considered aspects of objective reality, not just subjective experiences."}], "id": "q08"}, {"question": "A student argues that by refusing to answer grand metaphysical questions and focusing on suffering, the Buddha demonstrates a lack of intellectual curiosity. Based on the text, what would be the most accurate counter-argument?", "options": [{"text": "The Buddha's silence was primarily a teaching method to encourage personal introspection, not a lack of curiosity.", "isCorrect": false, "rationale": "While introspection is important, the text frames the Buddha's refusal as a pragmatic decision—such questions 'do not lead to liberation from suffering' and are 'philosophical luxuries.'"}, {"text": "The Buddha understood that such questions, though intellectually stimulating, ultimately lead to further suffering rather than liberation.", "isCorrect": true, "rationale": "The Parable of the Poisoned Arrow directly supports this, likening metaphysical inquiries to demanding information while dying from a poisoned arrow—they distract from the urgent need to address suffering."}, {"text": "The Buddha had already answered these questions in earlier teachings that are not included in this section.", "isCorrect": false, "rationale": "The text describes his refusal as 'famous' and 'one of the most philosophically significant moments,' implying it was a definitive stance, not a temporary withholding of already-given answers."}, {"text": "The Buddha believed all metaphysical truths are relative and therefore not worth pursuing in an absolute sense.", "isCorrect": false, "rationale": "The text emphasizes the *practicality* of questions in relation to suffering, not the relativity of truth as the primary reason for his silence."}], "id": "q09"}, {"question": "The Buddhist assertion that \"To ask 'Who made the first cause?' is... to presuppose that there was a first cause\" implies that:", "options": [{"text": "The concept of a first cause is an unnecessary and unproven assumption that Buddhism challenges.", "isCorrect": true, "rationale": "The text states that such a presupposition 'cannot be justified,' directly implying that the idea of a first cause is an unproven assumption that Buddhist philosophy rejects in favor of an 'endless, beginningless web of interdependence.'"}, {"text": "The first cause is an inherent mystery beyond human comprehension, making the question futile.", "isCorrect": false, "rationale": "The issue is not that the first cause is unknowable, but that its very existence is challenged as an unjustifiable presupposition within the framework of dependent origination."}, {"text": "There are multiple, equally valid first causes depending on one's philosophical perspective.", "isCorrect": false, "rationale": "Buddhism rejects the notion of *any* first cause, singular or plural, in favor of an interdependent web."}, {"text": "All causes are ultimately unknowable, rendering any question about them moot.", "isCorrect": false, "rationale": "Buddhism does not claim all causes are unknowable; rather, it focuses on understanding the causes of suffering. The specific rejection is of a *first* uncaused cause."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
