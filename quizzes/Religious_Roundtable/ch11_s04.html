        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the provided text, what is the undifferentiated ground of being from which all things emerge in Hinduism?", "options": [{"text": "Brahma", "isCorrect": false, "rationale": "While 'Brahma' is a deity in Hinduism, the text specifies 'Brahman' as the undifferentiated ground of being, not 'Brahma'."}, {"text": "Brahman", "isCorrect": true, "rationale": "The text explicitly states that 'Brahman, the undifferentiated ground of being from which all things emerge,' is the source in Hinduism."}, {"text": "Vishnu", "isCorrect": false, "rationale": "Vishnu is a personal deity in Hindu devotion, not described as the ultimate undifferentiated ground of being from which all things emerge."}, {"text": "Shiva", "isCorrect": false, "rationale": "Shiva is a personal deity in Hindu devotion, not described as the ultimate undifferentiated ground of being from which all things emerge."}]}, {"question": "Why does Buddhism, according to the text, reject the question 'Who created the world?'", "options": [{"text": "It asserts that the world was created by multiple competing gods.", "isCorrect": false, "rationale": "Buddhism's stance is not about multiple creators but a rejection of the premise of a creator altogether, as it cannot be established."}, {"text": "It believes the question presupposes a creator and creation event that cannot be established, and shifts focus to liberation.", "isCorrect": true, "rationale": "The text states, 'It presupposes a creator and a creation event, and Buddhism argues that neither can be established. ... The focus shifts from origins to liberation.'"}, {"text": "It confirms that a creator exists but prefers not to name it due to its sacredness.", "isCorrect": false, "rationale": "Buddhism argues that 'neither can be established' (creator or creation event), rather than acknowledging an unnamed creator."}, {"text": "It suggests that humans themselves are the primary creators of their individual realities.", "isCorrect": false, "rationale": "The text mentions 'pratityasamutpada: everything arises in dependence on conditions,' which is about interdependence, not human creation of the world."}]}, {"question": "The text uses an analogy to describe how the Tao gives rise to the cosmos. Which of the following best reflects this analogy?", "options": [{"text": "A craftsman meticulously building a chair through deliberate design.", "isCorrect": false, "rationale": "The text explicitly states, 'The Tao does not create the way a craftsman makes a chair,' rejecting this analogy."}, {"text": "A divine being issuing commands and principles for creation.", "isCorrect": false, "rationale": "The text states the Tao functions 'without design or decision,' which contradicts the idea of commands or deliberate principles."}, {"text": "A spring naturally giving rise to a river, flowing effortlessly.", "isCorrect": true, "rationale": "The text uses this exact analogy: 'it is more like the way a spring gives rise to a river.'"}, {"text": "A cosmic engine periodically restarting and recreating itself.", "isCorrect": false, "rationale": "This analogy is not mentioned in the text and does not align with the Tao's effortless, natural flow."}]}, {"question": "Which of the following statements accurately captures a key distinction among the three traditions regarding the concept of a creator or ultimate source?", "options": [{"text": "Hinduism offers a personal God who creates for a reason, while Buddhism and Taoism deny any ultimate source.", "isCorrect": false, "rationale": "Hinduism's Brahman is 'not a personal God who chose to create for a reason.' Taoism explicitly names 'The Tao' as a source."}, {"text": "Taoism explicitly names a personal creator, unlike Hinduism and Buddhism.", "isCorrect": false, "rationale": "The text states 'The Tao is prior to all names, all distinctions,' indicating it is not a personal creator with a name."}, {"text": "Buddhism directly refutes the idea of a creator or first cause, unlike Hinduism's Brahman or Taoism's Tao as ultimate sources.", "isCorrect": true, "rationale": "Buddhism states 'no first cause, no absolute beginning, no creator,' which is a distinct stance compared to Hinduism's 'Brahman' and Taoism's 'Tao' as origins."}, {"text": "All three traditions agree that a personal, interventionist creator designed the world.", "isCorrect": false, "rationale": "This statement contradicts the descriptions of all three traditions, especially Buddhism's rejection of a creator and Taoism's 'without design or decision' flow."}]}, {"question": "Instead of a creation event or first cause, what concept does Buddhism offer to explain how things arise?", "options": [{"text": "Karma and rebirth, which dictate all cosmic events.", "isCorrect": false, "rationale": "While central to Buddhist thought, Karma and rebirth primarily explain individual experience and cycles, not the general principle of how 'everything arises in dependence on conditions' (pratityasamutpada)."}, {"text": "Nirvana, the ultimate state of enlightenment.", "isCorrect": false, "rationale": "Nirvana is the goal of Buddhist practice, not the explanation for how the cosmos or phenomena arise."}, {"text": "Pratityasamutpada: everything arises in dependence on conditions.", "isCorrect": true, "rationale": "The text explicitly states: 'What Buddhism offers instead is pratityasamutpada: everything arises in dependence on conditions.'"}, {"text": "Divine will, as an unstated but understood cosmic force.", "isCorrect": false, "rationale": "Buddhism denies a creator and first cause, so the concept of 'divine will' is contradictory to its teachings as presented."}]}, {"question": "How does the Nasadiya Sukta, as mentioned in the text, influence the Hindu understanding of cosmic origins?", "options": [{"text": "It confirms Brahman as the sole, definitive creator for all time.", "isCorrect": false, "rationale": "The Nasadiya Sukta adds a layer of intellectual honesty and humility, questioning the absolute certainty of the account, rather than confirming it definitively."}, {"text": "It introduces a pantheon of personal deities as the direct creators of the universe.", "isCorrect": false, "rationale": "The Nasadiya Sukta's role is not to introduce direct creators but to temper the certainty of the origin account itself."}, {"text": "It adds a layer of intellectual honesty and humility, suggesting even this account of origins may not be the full truth.", "isCorrect": true, "rationale": "The text states: 'The Nasadiya Sukta adds a final layer of intellectual honesty: even this account may not be the full truth, and we should hold it with humility.'"}, {"text": "It describes a detailed, empirical explanation for the universe's scientific beginning.", "isCorrect": false, "rationale": "The Nasadiya Sukta is a philosophical hymn, not a scientific explanation. Its focus is on the limits of human knowledge regarding ultimate origins."}]}, {"question": "According to the text, what is the appropriate human response to the Taoist understanding of the cosmos?", "options": [{"text": "Worship and submission to the Tao as a personal deity.", "isCorrect": false, "rationale": "The text explicitly states: 'the appropriate human response is not worship or submission or liberation.'"}, {"text": "Seeking individual liberation from the cycles of suffering and existence.", "isCorrect": false, "rationale": "This is a Buddhist goal, and the text explicitly states for Taoism 'not worship or submission or liberation.'"}, {"text": "Actively designing one's environment to control natural forces.", "isCorrect": false, "rationale": "Taoism emphasizes flowing 'with the grain of reality rather than against it,' which contradicts active control or design."}, {"text": "Alignment, learning to flow with the grain of reality rather than against it.", "isCorrect": true, "rationale": "The text directly states this: 'And the appropriate human response is not worship or submission or liberation, but alignment — learning to flow with the grain of reality rather than against it.'"}]}, {"question": "Despite their significant differences in explaining cosmic origins, what is one point of agreement shared by Hinduism, Buddhism, and Taoism, according to the text?", "options": [{"text": "The cosmos was created by a single, personal divine entity.", "isCorrect": false, "rationale": "This is not true for any of the traditions as presented. Hinduism's Brahman is not a personal god, Buddhism rejects a creator, and Taoism's Tao is an unnamed source without design."}, {"text": "The cosmos is not arbitrary chaos and has a character worth attending to.", "isCorrect": true, "rationale": "The text explicitly states: 'All three agree, in their very different ways, that the cosmos is not arbitrary chaos — that there is something rather than nothing, and that this something has a character worth attending to.'"}, {"text": "The ultimate goal for humans is liberation from suffering through enlightenment.", "isCorrect": false, "rationale": "This is specifically a Buddhist focus; Hinduism emphasizes devotion, and Taoism emphasizes alignment, not necessarily liberation from suffering in the Buddhist sense."}, {"text": "Human meaning depends entirely on understanding the precise moment of cosmic creation.", "isCorrect": false, "rationale": "Buddhism explicitly shifts focus away from origins for meaning, and none of the traditions emphasize a precise 'moment' of creation as the sole source of meaning."}]}, {"question": "The text poses the question: 'Does a universe with a creator have more meaning than one without? Or does meaning depend on something other than origins...' Which tradition presented most strongly emphasizes meaning derived from how one lives *within* the cosmos rather than solely from its origins?", "options": [{"text": "Hinduism, due to its vibrant devotion and direct relationships between humans and gods.", "isCorrect": false, "rationale": "While Hindu devotion is about living within the cosmos, the text also strongly ties its cosmic understanding to Brahman's cycles of creation and dissolution, connecting meaning to origin in a way."}, {"text": "Buddhism, by explicitly shifting its focus from cosmic origins to the pursuit of liberation from suffering.", "isCorrect": true, "rationale": "The text explicitly states: 'The focus shifts from origins to liberation: 'not Where did the world come from?' but How do I get out of suffering?'' This directly addresses meaning derived from living within the cosmos (overcoming suffering) rather than its beginning."}, {"text": "Taoism, by advocating for alignment and flowing with the grain of reality in everyday life.", "isCorrect": false, "rationale": "Taoism emphasizes 'alignment' as how one lives, which is a strong candidate, but Buddhism's rejection of the 'origins' question and explicit 'shift in focus' makes it a stronger, more direct answer to the question's premise."}, {"text": "All three traditions equally emphasize living within the cosmos over understanding its origins.", "isCorrect": false, "rationale": "This is incorrect; Hinduism still places importance on Brahman as the origin, and while Taoism focuses on living, Buddhism makes the most explicit rejection of origins as the primary source of meaning."}]}, {"question": "The text describes Brahman in Hinduism as a 'primordial ocean from which all waves arise' and the Tao in Taoism as 'like the way a spring gives rise to a river.' What is a key conceptual difference highlighted by these descriptions regarding their respective sources?", "options": [{"text": "Brahman is a personal deity with intentional design, while the Tao is an impersonal, chaotic force.", "isCorrect": false, "rationale": "Brahman is 'not a personal God who chose to create for a reason,' and both traditions agree the cosmos is 'not arbitrary chaos.'"}, {"text": "Brahman is explicitly named and associated with vast cycles of creation and dissolution, whereas the Tao is unnamed and fosters continuous, effortless emergence without design.", "isCorrect": true, "rationale": "The text states Brahman is 'pulsating through vast cycles of creation and dissolution' and is a named 'source.' The Tao is 'prior to all names' and the cosmos flows 'naturally, effortlessly, without design or decision,' like a continuous spring."}, {"text": "The Hindu source requires human worship and submission, while the Taoist source demands liberation from material attachment.", "isCorrect": false, "rationale": "Hinduism has devotion but Brahman is not a personal god for worship. Taoism's response is 'alignment,' not 'worship or submission or liberation.'"}, {"text": "The Tao is a temporary, finite source, while Brahman represents an eternal, unchanging creator.", "isCorrect": false, "rationale": "Neither description implies the Tao is temporary or finite; it is a continuous wellspring. Brahman is eternal, but not a 'creator' in the personal sense."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
