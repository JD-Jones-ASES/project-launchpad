    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Islamic scholars, if a Muslim consistently avoids sin and strives for virtuous acts, what would be the expected impact on their *iman*?", "options": [{"text": "It would remain constant, as *iman* is a fixed state of belief.", "isCorrect": false, "rationale": "The text explicitly states that 'faith increases with obedience and decreases with sin,' indicating that *iman* is not a fixed state but is dynamic."}, {"text": "It would strengthen and deepen, reflecting a holistic engagement with faith.", "isCorrect": true, "rationale": "The text defines *iman* as a 'state of the whole person -- heart, mind, and action' and clarifies that 'faith increases with obedience and decreases with sin,' meaning virtuous acts would strengthen it."}, {"text": "It would become solely an intellectual understanding, detached from action.", "isCorrect": false, "rationale": "The text states that *iman* is 'not merely intellectual assent' but a 'state of the whole person,' implying it's connected to action."}, {"text": "It would lead to an accumulation of religious merit, but not necessarily affect *iman* itself.", "isCorrect": false, "rationale": "The text directly links obedience and sin to the increase or decrease of *iman*, indicating a direct effect rather than just an accumulation of merit separate from faith."}], "id": "q01"}, {"question": "The first part of the Shahada, 'There is no god but God,' primarily serves which analytical function within Islamic belief?", "options": [{"text": "To establish the numerical count of deities in the cosmos.", "isCorrect": false, "rationale": "While it implies numerical oneness, the text states that Tawhid is 'not just the arithmetic claim.' The Shahada's function is broader than a simple count."}, {"text": "To intellectually challenge polytheistic theological systems.", "isCorrect": false, "rationale": "This is too narrow. The text specifies it clears 'all false gods, all rivals to the divine, all the things humans tend to treat as ultimate that are not actually ultimate,' which includes ideologies and power, not just other deities."}, {"text": "To identify and reject all perceived ultimacy that is not genuinely divine.", "isCorrect": true, "rationale": "The text explicitly states this part 'negates: it clears the field of all false gods, all rivals to the divine, all the things humans tend to treat as ultimate that are not actually ultimate -- wealth, power, nation, ideology.'"}, {"text": "To emphasize the importance of monotheistic prayer rituals.", "isCorrect": false, "rationale": "This focuses on ritual, not the fundamental conceptual clearing of false ultimacy, which is the primary analytical function described."}], "id": "q02"}, {"question": "A political leader who demands absolute loyalty, declaring their nation's ideology as the ultimate truth to be served above all else, could be seen in Islamic theology as committing which error?", "options": [{"text": "Blasphemy, by speaking ill of God.", "isCorrect": false, "rationale": "Blasphemy involves irreverence towards God. While related, claiming ultimacy for a created entity is specifically addressed by *shirk*."}, {"text": "Heresy, by introducing a new religious doctrine.", "isCorrect": false, "rationale": "Heresy refers to beliefs contrary to established doctrine. This scenario describes attributing divine qualities to something other than God, which is *shirk*."}, {"text": "Shirk, by associating a created entity with divine sovereignty.", "isCorrect": true, "rationale": "The text defines *shirk* as 'associating anything with God that does not belong there' and lists 'wealth, power, nation, ideology' as things humans mistakenly treat as ultimate, which aligns with the scenario."}, {"text": "Apostasy, by abandoning the Islamic faith.", "isCorrect": false, "rationale": "Apostasy is the act of renouncing a religious belief. This scenario describes an act of assigning ultimate devotion to a non-divine entity, not necessarily abandoning faith."}], "id": "q03"}, {"question": "Based on the text, what is the most significant distinction in how Islam views the Quran compared to the Bible?", "options": [{"text": "The Quran contains a more complete historical account of prophets.", "isCorrect": false, "rationale": "While the Quran does contain prophetic narratives, the text does not highlight this as the *most significant* distinction compared to the Bible."}, {"text": "The Quran is considered the direct, uncorrupted word of God, while the Bible is human writings about divine matters.", "isCorrect": true, "rationale": "The text explicitly states: 'Unlike the Bible, which is understood in Islam as a collection of human writings about divine matters, the Quran is understood as the direct speech of God, transmitted verbatim... and preserved perfectly.'"}, {"text": "The Quran was orally transmitted, whereas the Bible was immediately written.", "isCorrect": false, "rationale": "The text mentions the Quran's oral transmission, but the fundamental difference emphasized is its divine origin and preservation versus the Bible's human authorship."}, {"text": "The Quran emphasizes communal responsibility more than the Bible.", "isCorrect": false, "rationale": "The Surah 2 passage highlights communal responsibility within Islam, but this is not presented as the primary distinction between the *books* themselves."}], "id": "q04"}, {"question": "The Islamic concept of 'surrender' (*islam*) is best characterized as:", "options": [{"text": "A passive resignation to an unchangeable fate, devoid of personal agency.", "isCorrect": false, "rationale": "The text states it is 'not the helpless surrender of defeat,' indicating it's not passive or devoid of agency."}, {"text": "An active and conscious alignment with a recognized ultimate reality.", "isCorrect": true, "rationale": "The text defines *islam* as 'the willing, active surrender of a person who recognizes a reality greater than themselves and chooses to align with it.'"}, {"text": "A military defeat leading to capitulation to a superior force.", "isCorrect": false, "rationale": "The text explicitly clarifies it is 'not the helpless surrender of defeat,' which would imply a military or coercive context."}, {"text": "An intellectual agreement with theological doctrines without practical commitment.", "isCorrect": false, "rationale": "The text uses 'willing, active surrender' and 'chooses to align with it,' implying more than just intellectual agreement; it suggests practical commitment."}], "id": "q05"}, {"question": "How does Islam reconcile its reverence for earlier biblical prophets with its unique understanding of its own scripture?", "options": [{"text": "It considers earlier prophets' messages entirely obsolete, replaced by Islam.", "isCorrect": false, "rationale": "The text states that 'all the biblical prophets: Adam, Abraham, Moses, and Jesus are all honored as messengers of God,' indicating their messages are not considered obsolete but integral to revelation history."}, {"text": "It views earlier prophets as legitimate messengers whose original messages were later corrupted, making Muhammad's message the final, perfect one.", "isCorrect": true, "rationale": "The text states that 'Islam's account of revelation includes all the biblical prophets,' but 'the earlier scriptures -- the Torah and the Gospel -- have been partially corrupted over time,' with Muhammad bringing the 'final, perfect, and uncorrupted revelation.'"}, {"text": "It believes that earlier prophets predicted Muhammad's coming, thus validating all their scriptures.", "isCorrect": false, "rationale": "While some Islamic traditions hold this, the text explicitly focuses on the corruption of earlier scriptures, not their wholesale validation."}, {"text": "It distinguishes between the prophets, honoring some but rejecting others as false.", "isCorrect": false, "rationale": "The text clearly states that 'all the biblical prophets... are all honored as messengers of God,' disproving selective honoring."}], "id": "q06"}, {"question": "The verses from Surah 2:285-286 emphasize the Islamic understanding of faith as:", "options": [{"text": "Primarily a matter of individual intellectual debate and personal conviction.", "isCorrect": false, "rationale": "The passage explicitly states, 'The believers affirm that they have heard and obeyed, not heard and debated,' contradicting intellectual debate as primary."}, {"text": "A collective adherence to religious law, minimizing individual spiritual experience.", "isCorrect": false, "rationale": "The text highlights faith as 'simultaneously personal (each soul answers for itself) and communal (the believers speak together),' showing it is not solely collective."}, {"text": "A humble, comprehensive act of communal and personal obedience and trust in God's mercy.", "isCorrect": true, "rationale": "The passage states, 'It captures the Islamic understanding of faith as a comprehensive, communal, and humble act. The believers affirm that they have heard and obeyed... Thy mercy, Lord! for unto thee must we return.'"}, {"text": "A claim to carry heavy burdens, demonstrating strength through suffering.", "isCorrect": false, "rationale": "The verses include 'lay not on us a load like that which thou hast laid on those who have been before us; O our Lord! and lay not on us that for which we have not strength,' which contradicts the idea of claiming heavy burdens."}], "id": "q07"}, {"question": "The emphasis on the Quran being an 'oral revelation' and the high honor of being a *hafiz* highlights what aspect of Islamic scripture?", "options": [{"text": "The necessity of scholarly interpretation to understand its complex meanings.", "isCorrect": false, "rationale": "While interpretation is important, the text specifically focuses on the *oral* nature and *memorization* (hafiz) as a high honor, not primarily scholarly interpretation."}, {"text": "The importance of preserving its original spoken form and ensuring its accessibility through memory.", "isCorrect": true, "rationale": "The text states the Quran was 'originally an oral revelation, spoken to Muhammad and memorized by his companions before it was written down,' and that a *hafiz* 'has memorized the entire Quran by heart,' directly linking oral tradition to preservation."}, {"text": "The belief that only the written text holds true authority, making oral transmission secondary.", "isCorrect": false, "rationale": "The text states it was 'originally an oral revelation' and highlights memorization, which contradicts the idea of written text being *solely* authoritative or oral transmission being secondary."}, {"text": "The role of music and melody in enhancing its spiritual impact during communal gatherings.", "isCorrect": false, "rationale": "While Quranic recitation often involves melodic elements, the text emphasizes 'recitation' (meaning of Quran) and 'memorization' (hafiz) as key, not music itself."}], "id": "q08"}, {"question": "How does the text describe the relationship between *iman* and *islam*?", "options": [{"text": "*Iman* is the external act of surrender, while *islam* is the internal conviction.", "isCorrect": false, "rationale": "The text states 'islam means surrender' (external act/choice) and 'iman -- means faith, trust, and conviction: the interior state,' so this option reverses their meanings."}, {"text": "*Iman* is the internal faith and conviction that transforms *islam* (surrender) from defeat into liberation.", "isCorrect": true, "rationale": "The text states that *iman* is 'the interior state that makes surrender not a capitulation but a liberation,' directly explaining how *iman* positively influences the meaning of *islam*."}, {"text": "They are interchangeable terms, both referring to the intellectual acceptance of God's existence.", "isCorrect": false, "rationale": "The text gives distinct definitions for *islam* (surrender) and *iman* (faith/conviction), and specifies *iman* is not 'merely intellectual assent.'"}, {"text": "*Islam* is the foundational belief, and *iman* is a secondary, optional aspect.", "isCorrect": false, "rationale": "The text clearly states *iman* is 'at the heart of Islamic faith,' indicating its central, not secondary, importance."}], "id": "q09"}, {"question": "What is a key implication of Muhammad being designated as the 'Seal of the Prophets' and the Quran as God's 'final, perfect, and uncorrupted revelation'?", "options": [{"text": "That all previous revelations are entirely invalid and should be disregarded.", "isCorrect": false, "rationale": "The text states that 'all the biblical prophets... are all honored as messengers of God,' implying their original messages were valid, even if their scriptures were later corrupted."}, {"text": "That God's direct communication with humanity concluded with Muhammad and the Quran, establishing the definitive religious guidance.", "isCorrect": true, "rationale": "Calling Muhammad the 'last and final prophet' and the Quran the 'final, perfect, and uncorrupted revelation' strongly implies that this revelation is the definitive and ultimate guidance for humanity, concluding direct prophetic communication."}, {"text": "That spiritual guidance now primarily comes through individual mystical experiences rather than prophetic revelation.", "isCorrect": false, "rationale": "The text focuses on the finality of *prophetic* revelation via Muhammad and the Quran, not a shift to purely individual mystical experiences as the primary source of guidance."}, {"text": "That humanity is now solely responsible for interpreting divine will without further prophetic assistance.", "isCorrect": false, "rationale": "The Quran itself is presented as 'God's final, perfect, and uncorrupted revelation,' serving as the continued divine assistance and guidance for humanity, not an absence of it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
