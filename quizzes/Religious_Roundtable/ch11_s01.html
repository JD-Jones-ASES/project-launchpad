    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What distinguishes the Nasadiya Sukta's approach to the origin of the universe from many other sacred texts?", "options": [{"text": "It confidently asserts a single creator god as the undisputed source.", "isCorrect": false, "rationale": "The text explicitly states the Nasadiya Sukta 'does not tell us confidently where the universe came from' and ends with 'Who really knows?'"}, {"text": "It describes a precise, linear timeline of creation events spanning a few thousand years.", "isCorrect": false, "rationale": "Hindu cosmology is presented as cyclical and spanning billions of years, not a precise, linear timeline, and the Nasadiya Sukta questions origins rather than detailing them."}, {"text": "It begins with fundamental questions and admits profound uncertainty about the ultimate origins of existence.", "isCorrect": true, "rationale": "The text highlights the Nasadiya Sukta's beginning with questions like 'was there being or non-being?' and concluding with 'Who really knows?', emphasizing its intellectual honesty and cosmological humility."}, {"text": "It primarily focuses on the moral implications and ethical rules derived from the act of creation.", "isCorrect": false, "rationale": "While morality is part of Hinduism, the Nasadiya Sukta, as presented, focuses on the metaphysical questions of existence and origin, not primarily moral implications."}], "id": "q01"}, {"question": "According to the text, how does Brahman relate to the Trimurti (Brahma, Vishnu, Shiva)?", "options": [{"text": "Brahman is the most powerful personal god among the Trimurti, leading the others.", "isCorrect": false, "rationale": "The text clarifies that Brahman 'is not a god among gods but the ground of being itself' and explicitly distinguishes it from Brahma, the creator god."}, {"text": "Brahman is a lesser deity subservient to the Trimurti, who are the ultimate divine figures.", "isCorrect": false, "rationale": "Brahman is described as the 'ultimate, undifferentiated reality underlying all of existence,' making it superior to any specific deity, including the Trimurti."}, {"text": "The Trimurti are three distinct, separate gods who compete for cosmic control, independent of Brahman.", "isCorrect": false, "rationale": "The text states: 'These are not three separate gods competing for cosmic control; they are three aspects of the single divine process that is Brahman expressing itself in time.'"}, {"text": "The Trimurti are three aspects of the single divine process that is Brahman expressing itself in time.", "isCorrect": true, "rationale": "The text explicitly states: 'They are three aspects of the single divine process that is Brahman expressing itself in time,' indicating they are manifestations of Brahman."}], "id": "q02"}, {"question": "A person deeply meditates and feels a profound sense of unity, perceiving their individual consciousness as an inseparable part of a greater, ultimate reality. Which Hindu philosophical concept does this experience most closely align with?", "options": [{"text": "The distinct roles of the Trimurti in cosmic control.", "isCorrect": false, "rationale": "The Trimurti's roles (creation, preservation, destruction) describe cosmic functions, not an individual's experience of unity with ultimate reality."}, {"text": "The cyclical destruction of kalpas.", "isCorrect": false, "rationale": "Kalpas refer to vast cosmic time cycles of creation and destruction, not the individual's inner experience of unity."}, {"text": "The identity of atman with Brahman.", "isCorrect": true, "rationale": "The text states: 'The individual self (atman) is, at the deepest level, identical with Brahman — a drop of the ocean discovering it was never separate from the ocean,' which perfectly describes this experience."}, {"text": "The concept of creation as lila, or divine play.", "isCorrect": false, "rationale": "Lila refers to the motivation for the world's creation (divine play), not the individual's experience of identity with ultimate reality."}], "id": "q03"}, {"question": "In Hindu cosmology, what is the approximate duration of a 'kalpa,' a span of time during which the universe is cyclically created and destroyed?", "options": [{"text": "Six thousand years.", "isCorrect": false, "rationale": "The text explicitly contrasts Hindu cosmology by stating the universe 'is not six thousand years old.'"}, {"text": "Thirteen billion years.", "isCorrect": false, "rationale": "The text explicitly contrasts Hindu cosmology by stating the universe is 'not even thirteen billion years old.'"}, {"text": "4.32 billion years.", "isCorrect": true, "rationale": "The text clearly states that kalpas last '4.32 billion years.'"}, {"text": "An unspecified, very short period, constantly fluctuating.", "isCorrect": false, "rationale": "The text gives a specific, immense duration for a kalpa, indicating it is far from short or unspecified."}], "id": "q04"}, {"question": "The text describes the Nasadiya Sukta's conclusion ('Who really knows?') as 'intellectual honesty of a very high order.' What does this phrase imply about the nature of Hindu cosmological inquiry?", "options": [{"text": "It prioritizes dogmatic certainty and clear answers over philosophical exploration.", "isCorrect": false, "rationale": "The conclusion 'Who really knows?' is the opposite of dogmatic certainty, emphasizing questioning and mystery."}, {"text": "It suggests a lack of confidence in divine revelation or the existence of a creator.", "isCorrect": false, "rationale": "It's described as intellectual honesty, not a lack of confidence, and it leaves open the possibility that 'He... verily knows it, or perhaps he knows not,' implying mystery rather than outright denial."}, {"text": "It demonstrates a willingness to acknowledge the limits of human (and even divine) understanding regarding ultimate origins.", "isCorrect": true, "rationale": "The text directly states this willingness to leave the question open 'is not a failure of nerve. It is intellectual honesty of a very high order,' acknowledging that ultimate origins may be beyond full comprehension, even for gods."}, {"text": "It indicates that Hindus believe the universe was created by chance, without any divine involvement.", "isCorrect": false, "rationale": "The text does not state creation by chance; rather, it questions the *specifics* of how and by whom, while still referencing a 'One Thing' and 'he, the first origin.'"}], "id": "q05"}, {"question": "What is the primary distinction between 'Brahman' (the ultimate reality) and 'Brahma' (the creator god)?", "options": [{"text": "They are two alternative names for the same divine entity.", "isCorrect": false, "rationale": "The text explicitly warns against confusing them: 'Brahma the creator (not to be confused with Brahman the ultimate reality).'"}, {"text": "Brahman is a personal god with specific attributes, while Brahma is an impersonal, abstract force.", "isCorrect": false, "rationale": "Brahman is described as 'neither fully personal nor fully impersonal,' whereas Brahma is a specific, personal creator god."}, {"text": "Brahman is the ultimate, undifferentiated ground of being, whereas Brahma is a specific deity within the Trimurti responsible for creation.", "isCorrect": true, "rationale": "The text defines Brahman as the 'ultimate, undifferentiated reality... not a god among gods,' and Brahma as 'the creator' within the Trimurti, clearly distinguishing their roles and nature."}, {"text": "Brahma is eternal, while Brahman is transient and subject to cycles.", "isCorrect": false, "rationale": "Brahman is the 'ultimate, undifferentiated reality' and 'ground of being itself,' implying eternality, while Brahma's role, though immense, is within the cycles of kalpas."}], "id": "q06"}, {"question": "Based on the Hindu concept of 'lila' (divine play), what would be the most accurate statement regarding the primary motivation for the creation of the universe?", "options": [{"text": "God created the world out of necessity, to solve a problem or fulfill a divine need.", "isCorrect": false, "rationale": "The text explicitly states: 'The world is not created because God needed it, or because God was lonely, or because God had a problem to solve.'"}, {"text": "The world was created as a serious, purposeful act to establish divine authority and order.", "isCorrect": false, "rationale": "Lila emphasizes creation as 'freely, joyfully, with no purpose beyond the joy of the activity itself,' contrasting with a strictly serious or authoritarian purpose."}, {"text": "Creation is an overflow of divine abundance, freely and joyfully enacted without external purpose beyond the play itself.", "isCorrect": true, "rationale": "The text states creation is 'the way a child plays: freely, joyfully, with no purpose beyond the joy of the activity itself,' and 'an overflow of divine abundance rather than a response to divine need.'"}, {"text": "The universe was created as a trial or test for humanity to prove their worth.", "isCorrect": false, "rationale": "The text describes lila as 'divine play' and an 'overflow of divine abundance,' not as a trial or test for humanity."}], "id": "q07"}, {"question": "According to the Upanishads, what is the deepest relationship between the individual self (atman) and Brahman?", "options": [{"text": "Atman is a separate entity created by Brahman, distinct but subordinate to it.", "isCorrect": false, "rationale": "The text describes a relationship of identity, not distinct creation and subordination."}, {"text": "Atman is a temporary illusion, completely separate from the true reality of Brahman.", "isCorrect": false, "rationale": "While some schools might emphasize illusion, the text here focuses on the *identity* of atman with Brahman at the deepest level."}, {"text": "Atman is, at the deepest level, identical with Brahman.", "isCorrect": true, "rationale": "The text explicitly states: 'The individual self (atman) is, at the deepest level, identical with Brahman — a drop of the ocean discovering it was never separate from the ocean.'"}, {"text": "Atman is a spiritual guide appointed by Brahman to lead individuals to enlightenment.", "isCorrect": false, "rationale": "The text does not present atman as a guide but as the individual's ultimate true self, which is identical with Brahman."}], "id": "q08"}, {"question": "The text states, 'The cosmos is not a machine built once and left to run; it is a living, breathing, pulsating process.' This perspective primarily challenges which common assumption about the universe?", "options": [{"text": "That the universe is vast and difficult to comprehend.", "isCorrect": false, "rationale": "While true, the 'living, breathing' metaphor more directly challenges the mechanistic view than simply its vastness."}, {"text": "That the universe is governed by divine beings.", "isCorrect": false, "rationale": "Hinduism does involve divine beings (Trimurti), so this statement doesn't challenge the idea of divine governance but rather the *nature* of the cosmic process itself."}, {"text": "That the universe is a static, mechanistic entity set in motion at a single point in time.", "isCorrect": true, "rationale": "The phrase 'not a machine built once and left to run' directly opposes the view of the universe as a static, mechanistic system, emphasizing its dynamic, 'living' nature."}, {"text": "That the universe is subject to cycles of creation and destruction.", "isCorrect": false, "rationale": "The concept of cycles is central to Hindu cosmology and is presented as part of the 'living, breathing process,' not challenged by it."}], "id": "q09"}, {"question": "Which statement best summarizes the unique combination of philosophical attitudes presented in the Hindu creation narrative according to the provided text?", "options": [{"text": "A definitive, single-moment creation event established by an all-knowing creator.", "isCorrect": false, "rationale": "This contradicts the Nasadiya Sukta's uncertainty, the cyclical nature of kalpas, and the concept of 'lila' as free play, not a one-time establishment."}, {"text": "A static, machine-like universe operating on a short, linear timeline, with clear answers to all existential questions.", "isCorrect": false, "rationale": "This contradicts the description of a 'living, breathing, pulsating process,' vast cyclical time, and the explicit 'Who really knows?' about ultimate origins."}, {"text": "A dynamic, cyclical cosmos driven by divine play, coupled with profound intellectual humility about ultimate origins and an identification of the individual self with ultimate reality.", "isCorrect": true, "rationale": "This accurately synthesizes the key themes: cyclical cosmology (kalpas, Trimurti's rhythm), divine play (lila), intellectual humility (Nasadiya Sukta's 'Who really knows?'), and the atman-Brahman identity."}, {"text": "A system where multiple competing gods are solely responsible for creation, with no underlying unified reality.", "isCorrect": false, "rationale": "The text explicitly states the Trimurti are 'not three separate gods competing' but 'three aspects of the single divine process that is Brahman,' highlighting a unified underlying reality."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
