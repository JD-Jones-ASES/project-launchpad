<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; ch06_slides</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the source material, how is the 'Tao' fundamentally different from the Western conception of a god?", "options": [{"text": "The Tao is a personified deity that issues specific moral commands to its followers.", "isCorrect": false, "rationale": "Western deities are often personified, whereas the Tao is explicitly described as nameless and formless."}, {"text": "The Tao is an underlying order and natural flow rather than a person who can be prayed to.", "isCorrect": true, "rationale": "The Tao represents the fundamental nature of the universe moving without force, rather than a conscious, commanding entity."}, {"text": "The Tao is a created entity that functions as the secondary ruler of the physical world.", "isCorrect": false, "rationale": "The text identifies the Tao as the source from which all things arise, not a created or secondary being."}, {"text": "The Tao is a judge that punishes those who do not follow the 'Way'.", "isCorrect": false, "rationale": "The Tao does not issue commands or act as a personal judge; it is the pattern to which things naturally return."}]}, {"question": "Which of the following best describes the Taoist concept of 'wu wei'?", "options": [{"text": "A state of total passivity and laziness where one avoids all forms of work.", "isCorrect": false, "rationale": "The text explicitly states that wu wei is not laziness, but rather a specific way of engaging with the world."}, {"text": "The practice of imposing one's personal agenda onto a situation through sheer willpower.", "isCorrect": false, "rationale": "Imposing one's will is the opposite of wu wei, which emphasizes acting in accordance with the natural flow."}, {"text": "Effortless action that aligns with the natural direction of a situation.", "isCorrect": true, "rationale": "Wu wei is the art of doing exactly what is required without wasted energy or straining against reality."}, {"text": "A ritualistic form of action performed only during religious festivals.", "isCorrect": false, "rationale": "Wu wei is a philosophical principle applicable to practical life, including leadership, martial arts, and farming."}]}, {"question": "In the symbol of yin and yang, what does the presence of a small circle of the opposite color within each half signify?", "options": [{"text": "The inevitable victory of light over darkness in the cosmic struggle.", "isCorrect": false, "rationale": "Taoism does not view yin and yang as a battle between good and evil where one side wins."}, {"text": "That yin and yang are entirely separate and unrelated forces.", "isCorrect": false, "rationale": "The symbol represents interdependence and the idea that the two forces together form a whole."}, {"text": "The idea that each force contains the seed of its opposite and they are interdependent.", "isCorrect": true, "rationale": "The seeds indicate that the forces are complementary dance partners that define and require each other."}, {"text": "A hierarchy where the white 'yang' is superior to the black 'yin'.", "isCorrect": false, "rationale": "The text specifies that neither force is superior; both are necessary components of reality."}]}, {"question": "What is the primary focus of 'Religious Taoism' (daojiao) as opposed to 'Philosophical Taoism'?", "options": [{"text": "Strictly studying the paradoxes found in the Chuang Tzu for intellectual growth.", "isCorrect": false, "rationale": "Studying paradoxes is more characteristic of the contemplative, philosophical stream."}, {"text": "Practical concerns such as healing, community protection, and rituals for longevity.", "isCorrect": true, "rationale": "Religious Taoism is an organized tradition with priests and rituals aimed at health, community well-being, and transcendence."}, {"text": "The total rejection of any belief in gods or spirits in favor of pure logic.", "isCorrect": false, "rationale": "Religious Taoism actually incorporates a rich pantheon of divine figures and shamanic traditions."}, {"text": "Isolating oneself from society to focus solely on personal spontaneity (ziran).", "isCorrect": false, "rationale": "While philosophical Taoism leans toward the contemplative, religious Taoism has strong communal and ritual aspects."}]}, {"question": "According to the legend of the Tao Te Ching's origin, why did Laozi write the text?", "options": [{"text": "He was commissioned by the Emperor to create a new national religion.", "isCorrect": false, "rationale": "The text suggests the writing was a personal request at a border, not a government commission."}, {"text": "He wanted to prove he was wiser than Confucius in a public debate.", "isCorrect": false, "rationale": "The legend focuses on his weary departure from court corruption rather than a competitive desire for fame."}, {"text": "A border guard begged him to record his wisdom before he left for the mountains.", "isCorrect": true, "rationale": "The legend claims Laozi wrote the eighty-one chapters because a guard recognized his wisdom as he rode away on a water buffalo."}, {"text": "He received a direct revelation from the 'Celestial Masters' while meditating.", "isCorrect": false, "rationale": "The revelation from Laozi to Zhang Daoling marks the start of religious Taoism, which occurred much later."}]}, {"question": "How does the writing style of the 'Chuang Tzu' differ from that of the 'Tao Te Ching'?", "options": [{"text": "The Chuang Tzu consists of short, cryptic chapters while the Tao Te Ching is a long, logical essay.", "isCorrect": false, "rationale": "This reverses the styles; the Tao Te Ching is the one known for being compressed and cryptic."}, {"text": "The Chuang Tzu uses parables, humor, and imaginative stories rather than short paradoxes.", "isCorrect": true, "rationale": "Zhuangzi’s work is described as exuberant, full of jokes and flights of imagination like the butterfly dream."}, {"text": "The Chuang Tzu is primarily a book of ritual laws and temple blueprints.", "isCorrect": false, "rationale": "The Chuang Tzu is a philosophical masterpiece, while ritual manuals are part of the later Daozang canon."}, {"text": "The Chuang Tzu was written by a single historical figure, while the Tao Te Ching is purely mythological.", "isCorrect": false, "rationale": "While Zhuangzi's historicity is more certain, both texts are foundational philosophical works."}]}, {"question": "Which quality is associated with 'ziran'?", "options": [{"text": "The rigid adherence to social etiquette and ancestral rites.", "isCorrect": false, "rationale": "Ziran emphasizes spontaneity and naturalness, which often contrasts with rigid social roles."}, {"text": "The quality of being unselfconsciously oneself, like a growing tree.", "isCorrect": true, "rationale": "Ziran is described as naturalness or spontaneity—acting from one's true nature without artifice."}, {"text": "The intensive effort required to master complex ritual ceremonies.", "isCorrect": false, "rationale": "The text notes that effort is usually a sign that ziran has been lost."}, {"text": "The belief that humans must dominate nature through technological advancement.", "isCorrect": false, "rationale": "Taoism suggests that humans should participate in nature rather than master or dominate it."}]}, {"question": "What does the parable of Cook Ding illustrate regarding the application of Taoist principles?", "options": [{"text": "The importance of having the sharpest possible tools to conquer nature.", "isCorrect": false, "rationale": "The story emphasizes the butcher's skill and alignment with the Tao, not the quality of the physical tool."}, {"text": "The necessity of physical strength in overcoming difficult obstacles.", "isCorrect": false, "rationale": "The butcher succeeds through finding space and following the 'Way,' not through blunt force."}, {"text": "Moving through life by finding the natural 'spaces' rather than forcing one's way through.", "isCorrect": true, "rationale": "Cook Ding's knife never dulls because he cuts between the joints, which is a physical embodiment of wu wei."}, {"text": "The religious requirement of animal sacrifice in ancient Taoist temples.", "isCorrect": false, "rationale": "The story is a philosophical parable about the art of living, not a literal ritual instruction."}]}, {"question": "Why does the source material state that 'no two translations' of the Tao Te Ching are exactly the same?", "options": [{"text": "The original manuscripts were partially destroyed by fire, leaving large gaps.", "isCorrect": false, "rationale": "The text attributes the differences to the nature of the language and ambiguity, not physical damage."}, {"text": "Classical Chinese is deliberately ambiguous and allows for multiple readings.", "isCorrect": true, "rationale": "The text’s 250+ English translations vary because the language allows for different interpretations of almost every line."}, {"text": "Translators are forbidden by tradition from copying previous versions.", "isCorrect": false, "rationale": "There is no such prohibition; the variation stems from the linguistic depth of the original Chinese."}, {"text": "The book was originally written in a secret code that has never been fully cracked.", "isCorrect": false, "rationale": "While the language is cryptic and paradoxical, it is a known classical language, not a secret code."}]}, {"question": "Which modern practice is described as a 'physical embodiment' of Taoist philosophy, specifically yin-yang and wu wei?", "options": [{"text": "Traditional Chinese medicine (acupuncture).", "isCorrect": false, "rationale": "While rooted in Taoist cosmology, it is a medical practice rather than a 'martial art' movement practice mentioned in the 'didyouknow' section."}, {"text": "Tai chi (taijiquan).", "isCorrect": true, "rationale": "Tai chi's slow, flowing, and circular movements physically demonstrate meeting force with softness and finding balance."}, {"text": "Feng shui.", "isCorrect": false, "rationale": "Feng shui is a Taoist art of arranging space, but it is not described as a martial movement practice."}, {"text": "Chan Buddhism.", "isCorrect": false, "rationale": "Chan Buddhism is a fusion of Taoism and Buddhism, but it is a spiritual tradition rather than a physical martial art."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
