    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 18, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During the Spring and Autumn period, what was Confucius's primary response to the political fragmentation and collapse of the ritual order?", "options": [{"text": "He advocated for a new divine revelation to restore order from outside.", "isCorrect": false, "rationale": "Confucius did not look forward to a God to fix things from outside. His approach was human-centric and focused on historical precedent."}, {"text": "He looked backward to the sage-kings of antiquity as models for cultivating virtue and practicing ritual.", "isCorrect": true, "rationale": "The text states Confucius's response was 'to look backward to the sage-kings of antiquity (Yao, Shun, the Duke of Zhou) who had...built a genuinely harmonious society through the cultivation of virtue and the faithful practice of ritual (li).'"}, {"text": "He proposed a radical overhaul of the existing social structure to create a completely new system.", "isCorrect": false, "rationale": "Confucius sought to restore an 'ideal' past, not to invent a completely new, radical social structure unrelated to historical precedents."}, {"text": "He focused on individual spiritual enlightenment as the sole path to societal harmony.", "isCorrect": false, "rationale": "While individual virtue was crucial, Confucius's vision was explicitly about societal harmony and the proper functioning of the state and family, not solely individual enlightenment."}]}, {"question": "According to the Book of Rites, which of the following is NOT a characteristic of the Da Tong (Great Harmony) society?", "options": [{"text": "Political leaders are chosen based on hereditary lineage rather than merit.", "isCorrect": true, "rationale": "The text explicitly states that 'Leaders were chosen not because of their birth but because of their virtue and ability,' making hereditary leadership contrary to Da Tong."}, {"text": "People care for all children and elders as if they were their own, not just their immediate family.", "isCorrect": false, "rationale": "This is a key characteristic of Da Tong: 'People cared not only for their own children and parents but for all children and all elders as if they were their own.'"}, {"text": "The able are employed for the good of all, and the weak are supported rather than abandoned.", "isCorrect": false, "rationale": "This aligns with Da Tong principles: 'The strong worked not for their own advantage but for the good of all; the weak were not abandoned but supported.'"}, {"text": "Society functions as a vast family bound by benevolence (ren) and ritual propriety (li).", "isCorrect": false, "rationale": "The text describes Da Tong as a society 'bound together by ren (benevolence) and li (ritual propriety),' functioning as a vast family."}]}, {"question": "How does Confucian eschatology, particularly the vision of Da Tong, primarily differ from typical Western messianic or divine eschatological traditions?", "options": [{"text": "Confucian eschatology emphasizes a supernatural state brought about by divine intervention.", "isCorrect": false, "rationale": "The text clarifies that Da Tong is 'not a supernatural state brought about by divine intervention but a human achievement.'"}, {"text": "It focuses on a future prophecy of the world's end and rebirth through cosmic forces.", "isCorrect": false, "rationale": "Confucian eschatology is described as 'less a prophecy about the future than a recovery of the past' and 'less a divine promise than a human challenge.'"}, {"text": "It views the ideal society as a human achievement, a recovery of a past ideal, and a challenge for human cultivation.", "isCorrect": true, "rationale": "The text explicitly states Confucian eschatology is 'less a prophecy about the future than a recovery of the past, and less a divine promise than a human challenge,' and Da Tong is 'a human achievement made possible by the cultivation of ren (benevolence), yi (righteousness), and li (ritual propriety).'"}, {"text": "It posits a literal resurrection of sage-kings to lead humanity into a golden age.", "isCorrect": false, "rationale": "The text does not mention a literal resurrection; rather, it refers to 'recovery of the past' and taking inspiration from sage-kings as models."}]}, {"question": "Mencius's teaching of *xing shan* (goodness of human nature) is considered an eschatological claim because it implies:", "options": [{"text": "Humanity is destined to revert to a primitive, uncorrupted state.", "isCorrect": false, "rationale": "While *xing shan* suggests inherent goodness, it doesn't imply a reversion to a primitive state but rather the potential for moral progress towards an ideal society."}, {"text": "Moral virtue is externally imposed by divine decree, ensuring eventual harmony.", "isCorrect": false, "rationale": "Mencius argued that moral virtue is 'already within us, like a seed that requires cultivation to grow,' not externally imposed by divine decree."}, {"text": "The Great Harmony is a genuinely achievable human possibility, as humans are capable of virtue.", "isCorrect": true, "rationale": "The text states, 'This is an eschatological claim: if human nature is good, then the Great Harmony is genuinely achievable' and 'History is capable of progress because human beings are capable of virtue.'"}, {"text": "Society will inevitably decline unless strict external laws are enforced to control selfish tendencies.", "isCorrect": false, "rationale": "This view is more aligned with Xunzi's alternative, which held that human nature tends toward selfishness and needs external shaping, not Mencius's *xing shan*."}]}, {"question": "Which of the following scenarios best exemplifies the Confucian ideal of Da Tong in practice?", "options": [{"text": "A nation where economic competition is fierce, leading to significant wealth disparities but also rapid innovation.", "isCorrect": false, "rationale": "Da Tong emphasizes sharing, caring for the weak, and the strong working for the good of all, which contrasts with fierce competition and wealth disparities."}, {"text": "A community where elders are respected but primarily cared for by their biological children, and leaders are chosen through popular vote regardless of moral character.", "isCorrect": false, "rationale": "While respect for elders is Confucian, Da Tong specifically mentions caring for 'all elders as if they were their own,' and leaders chosen by virtue, not just popular vote."}, {"text": "A society where public officials are selected based on their moral integrity and competence, and public services ensure that all citizens, regardless of family ties, have their basic needs met.", "isCorrect": true, "rationale": "This scenario directly aligns with Da Tong: 'Leaders were chosen not because of their birth but because of their virtue and ability' and 'all people share in caring for one another's children and elders, the able are employed and the weak are cared for.'"}, {"text": "A global alliance of nations maintaining strict borders and independent governance, cooperating only on specific economic treaties.", "isCorrect": false, "rationale": "Kang Youwei's reimagining of Da Tong involved 'global governance, social equality, and the elimination of national borders,' contrasting with strict borders and independent governance."}]}, {"question": "The Neo-Confucian tradition of the Song dynasty expanded the Confucian ideal by:", "options": [{"text": "Rejecting the concept of human nature's inherent goodness in favor of external moral enforcement.", "isCorrect": false, "rationale": "Neo-Confucianism developed Mencius's insight further, affirming the goodness of human nature, not rejecting it."}, {"text": "Narrowing the focus of the sage ideal to purely political and administrative excellence.", "isCorrect": false, "rationale": "The text states the sage ideal 'was now also a spiritual ideal, not merely a moral and political one,' indicating an expansion, not a narrowing."}, {"text": "Integrating Buddhist and Taoist ideas, thereby elevating the ideal of the sage to a spiritual dimension.", "isCorrect": true, "rationale": "The text explains Neo-Confucianism 'developed this insight further, weaving it together with Buddhist and Taoist ideas about the ultimate ground of reality: the ideal of the sage was now also a spiritual ideal, not merely a moral and political one.'"}, {"text": "Advocating for a return to pure, unadulterated Confucian texts, free from any external philosophical influences.", "isCorrect": false, "rationale": "Neo-Confucianism actively integrated Buddhist and Taoist ideas, which contradicts a return to pure, unadulterated texts free from external influences."}]}, {"question": "Consider the quote: 'If a man take no thought about what is distant, he will find sorrow near at hand.' Which of the following modern actions best reflects a failure to heed this Confucian principle?", "options": [{"text": "A city council invests in public infrastructure improvements expected to last for decades, despite immediate budget constraints.", "isCorrect": false, "rationale": "This action demonstrates 'thought about what is distant' by prioritizing long-term benefits over short-term ease, aligning with the quote's advice."}, {"text": "A government implements short-term economic policies that boost immediate consumer spending but deplete essential national resources for future generations.", "isCorrect": true, "rationale": "This action exemplifies 'take no thought about what is distant' by prioritizing immediate gain at the expense of potential future 'sorrow' (resource depletion), directly contrary to the Confucian wisdom."}, {"text": "An individual regularly saves a portion of their income for retirement and emergencies.", "isCorrect": false, "rationale": "This action reflects foresight and planning for the 'distant' future, preventing 'sorrow near at hand' in the form of financial hardship, aligning with the quote."}, {"text": "A company invests heavily in research and development for sustainable energy solutions, even if initial profits are low.", "isCorrect": false, "rationale": "This demonstrates thinking about the 'distant' future by investing in sustainability, preventing future environmental or energy-related 'sorrow,' aligning with the quote."}]}, {"question": "What is the fundamental difference between Mencius and Xunzi regarding the achievability of the Great Harmony?", "options": [{"text": "Mencius believed human nature is inherently selfish, requiring external ritual, while Xunzi believed it is fundamentally good, needing only cultivation.", "isCorrect": false, "rationale": "This reverses their positions. Mencius held *xing shan* (goodness), while Xunzi believed human nature tends toward selfishness."}, {"text": "Mencius argued that divine intervention is necessary for Da Tong, whereas Xunzi believed it is solely a human endeavor.", "isCorrect": false, "rationale": "Neither Mencius nor Xunzi advocated for divine intervention for Da Tong; both emphasized human effort, though through different means."}, {"text": "Mencius posited that human nature is fundamentally good, making Da Tong a realistic possibility through cultivation, while Xunzi argued it tends toward selfishness, requiring external shaping.", "isCorrect": true, "rationale": "The text states Mencius believed 'human nature is fundamentally good (xing shan),' making Da Tong 'a realistic possibility.' It contrasts this with 'The alternative view, associated with the Confucian thinker Xunzi, held that human nature tends toward selfishness and must be shaped by external ritual and education.'"}, {"text": "Mencius focused on political reform, while Xunzi emphasized economic equality as the path to Da Tong.", "isCorrect": false, "rationale": "Their debate centered on human nature and moral cultivation, not primarily on political vs. economic reforms, although both were relevant to their wider philosophies."}]}, {"question": "The influence of Da Tong (Great Harmony) in modern Chinese political thought is best demonstrated by:", "options": [{"text": "Its complete rejection by all major political figures and parties due to its ancient origins.", "isCorrect": false, "rationale": "The text clearly states Da Tong had 'enormous influence' and was referenced by Kang Youwei, Sun Yat-sen, and even the Communist Party of China."}, {"text": "Its limited scope, primarily inspiring aesthetic movements rather than political ideologies.", "isCorrect": false, "rationale": "The text describes its influence on 'modern Chinese political thought,' including utopian works, political speeches, and party rhetoric, indicating a political rather than merely aesthetic scope."}, {"text": "Its use by Kang Youwei to advocate for global governance and Sun Yat-sen in political speeches, alongside the Communist Party's adoption of 'harmonious society' language.", "isCorrect": true, "rationale": "The 'DID YOU KNOW?' section details Kang Youwei's 'Book of the Great Unity,' Sun Yat-sen quoting Da Tong, and the Communist Party's appeal to 'harmonious society' (hexie shehui) language, all demonstrating its pervasive influence."}, {"text": "Its exclusive association with revolutionary movements seeking to overthrow existing political structures through violence.", "isCorrect": false, "rationale": "While Kang Youwei was a reformist, and Sun Yat-sen was a revolutionary, the text highlights the concept's broad appeal for harmonious society, not exclusively violent revolution. The CPC's use of 'harmonious society' also shows adaptation within an existing political structure."}]}, {"question": "If a modern-day educational system aims to foster the 'four sprouts' of Mencius's *xing shan* doctrine, its primary focus would be on:", "options": [{"text": "Strict enforcement of rules and punishments to curb students' natural selfish tendencies.", "isCorrect": false, "rationale": "This approach aligns with Xunzi's view that human nature is selfish and needs external shaping, not Mencius's idea of cultivating inherent goodness."}, {"text": "Encouraging rote memorization of ethical texts without practical application or moral examples.", "isCorrect": false, "rationale": "Mencius emphasized cultivation through 'education, ritual, and good examples,' suggesting a more holistic approach than mere rote memorization."}, {"text": "Cultivating inherent moral virtues like benevolence, righteousness, propriety, and wisdom through instruction, practical ritual, and virtuous role models.", "isCorrect": true, "rationale": "Mencius stated 'These four sprouts' (benevolence, righteousness, propriety, and wisdom) 'will grow into full virtue if they are cultivated by education, ritual, and good examples.' This directly describes the proposed educational focus."}, {"text": "Prioritizing individual achievement and competition to develop self-reliance and ambition.", "isCorrect": false, "rationale": "Mencius's focus is on moral virtues that lead to societal harmony and mutual care, which contrasts with an exclusive focus on individual achievement and competition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
