        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines the Islamic concept of the Ummah?", "options": [{"text": "A community bound by shared national identity and political goals.", "isCorrect": false, "rationale": "The text explicitly states that the Ummah transcends nationality and political divisions."}, {"text": "The global community of Muslim believers, transcending all human divisions like race, nationality, language, and class.", "isCorrect": true, "rationale": "The definition provided in the text states: 'The global community of Muslim believers, transcending race, nationality, language, and class.'"}, {"text": "A spiritual brotherhood exclusive to those who have performed the Hajj.", "isCorrect": false, "rationale": "The Ummah encompasses all Muslim believers, not just those who have performed the Hajj."}, {"text": "A local congregation gathering for daily prayers in a specific mosque.", "isCorrect": false, "rationale": "The Ummah is described as a 'global community,' not limited to local congregations."}]}, {"question": "The text states, 'Islam is, in its very structure, a community religion. This is not an accident of history -- it is a theological conviction.' What does this statement imply about the nature of community in Islam?", "options": [{"text": "The emphasis on community developed over time due to historical circumstances rather than religious doctrine.", "isCorrect": false, "rationale": "The text explicitly states 'This is not an accident of history,' contradicting this option."}, {"text": "The communal aspect is an optional practice for individual believers to adopt if they choose.", "isCorrect": false, "rationale": "The text highlights that community is a 'theological conviction' and that 'four of the five have an inherently communal dimension,' suggesting it's not optional."}, {"text": "Community is a fundamental and divinely ordained element of Islamic faith and practice.", "isCorrect": true, "rationale": "The phrase 'theological conviction' indicates that the communal nature is a core, divinely intended aspect of Islam, rather than an accidental or optional feature."}, {"text": "Islamic community is primarily an intellectual gathering for theological debate and study.", "isCorrect": false, "rationale": "While study may occur, the text emphasizes worship, social obligation, and shared experiences as central to the community, not just intellectual debate."}]}, {"question": "Which of the Five Pillars of Islam is most explicitly described as the act of *entering* the Muslim community, requiring public declaration?", "options": [{"text": "Salat (daily prayer)", "isCorrect": false, "rationale": "Salat is performed ideally in congregation, but it is not the act of entering the community."}, {"text": "Zakat (obligatory almsgiving)", "isCorrect": false, "rationale": "Zakat involves giving a portion of one's wealth, but it is not the act of formally entering the community."}, {"text": "Shahada (declaration of faith)", "isCorrect": true, "rationale": "The text states, 'The Shahada...is recited publicly as the act of entering the Muslim community.'"}, {"text": "Hajj (pilgrimage to Mecca)", "isCorrect": false, "rationale": "The Hajj gathers believers, but one must already be a Muslim to undertake the pilgrimage; it is not the entry act itself."}]}, {"question": "The practice of pilgrims wearing identical plain white garments (ihram) during the Hajj best symbolizes which core Islamic principle mentioned in the text?", "options": [{"text": "The spiritual purity achieved through repentance and prayer.", "isCorrect": false, "rationale": "While Hajj is a spiritual journey, the text specifically links the ihram to a social principle, not primarily spiritual purity."}, {"text": "The erasure of every visible distinction of wealth and rank, signifying equality before God.", "isCorrect": true, "rationale": "The text states, 'All wear the same plain white garments (ihram), symbolizing equality before God,' and mentions 'erasing every visible distinction of wealth and rank.'"}, {"text": "The historical tradition of early Muslims who wore simple attire.", "isCorrect": false, "rationale": "The text does not mention this as the primary reason or symbolism for the ihram."}, {"text": "A shared commitment to asceticism and rejection of worldly possessions.", "isCorrect": false, "rationale": "While the garments are simple, their primary symbolism highlighted in the text is equality and the stripping of earthly distinctions, not a universal commitment to asceticism."}]}, {"question": "According to the text, what is a specific requirement for Muslim men regarding the Jumu'ah prayer?", "options": [{"text": "They must perform the prayer silently and individually in their homes.", "isCorrect": false, "rationale": "Jumu'ah is explicitly a 'congregational prayer,' contradicting individual performance."}, {"text": "They are obligated to attend the Friday congregational prayer.", "isCorrect": true, "rationale": "The text explicitly states, 'Attendance at Friday prayer is obligatory for Muslim men.'"}, {"text": "They are required to lead the sermon (khutba) at least once a year.", "isCorrect": false, "rationale": "The sermon (khutba) is part of Jumu'ah, but the text does not state that all Muslim men are required to lead it."}, {"text": "They must wear special religious attire distinct from the ihram for Hajj.", "isCorrect": false, "rationale": "The text does not mention any special attire for Jumu'ah prayer, only the ihram for Hajj."}]}, {"question": "The uniformity of movements, direction, and language during the Jumu'ah prayer is described as 'solidarity made visible.' How does this uniformity contribute to the communal experience according to the text's *theological* explanation of Salat?", "options": [{"text": "It creates a social synchrony effect that fosters a powerful sense of belonging among participants.", "isCorrect": false, "rationale": "The text attributes this to 'social scientists' as a *sociological* explanation, not the *theological* one."}, {"text": "It allows individuals to focus more deeply on their private meditation without distraction.", "isCorrect": false, "rationale": "The text emphasizes community and solidarity, not private meditation during congregational prayer."}, {"text": "It signifies that the believer is turning toward God, and in doing so, finds themselves standing beside every other believer who has turned the same direction.", "isCorrect": true, "rationale": "The text explicitly states: 'Islamic theology does not explain this sociologically; it explains it theologically: the believer is turning toward God, and in doing so, they find themselves standing beside every other believer who has ever turned the same direction.'"}, {"text": "It is a way to ensure that all participants are adhering strictly to the prescribed rituals.", "isCorrect": false, "rationale": "While uniformity ensures adherence, the text describes the deeper *theological* implication as a connection to God and other believers, not just ritual correctness."}]}, {"question": "The text quotes Surah 2:43: 'Establish prayer and give zakat.' What does this verse primarily emphasize about the relationship between worship and social obligation in Islam?", "options": [{"text": "Zakat is a prerequisite for prayer, implying that social giving must precede spiritual acts.", "isCorrect": false, "rationale": "The verse connects them with 'and,' implying equal importance and connection, not a prerequisite."}, {"text": "Worship and social obligation are intrinsically linked and considered part of the same divine command.", "isCorrect": true, "rationale": "The text explicitly states, 'Worship and social obligation are the same sentence,' highlighting their inseparable connection as divine commands."}, {"text": "Prayer is a private spiritual act, while zakat is a public duty, highlighting their distinct spheres.", "isCorrect": false, "rationale": "This contradicts the overarching theme of Islam as a community religion where even private acts like prayer have communal dimensions."}, {"text": "The importance of prayer outweighs the importance of giving zakat.", "isCorrect": false, "rationale": "The verse connects them as equally commanded, without prioritizing one over the other."}]}, {"question": "The text describes the mosque as 'the community's living room.' This analogy highlights which aspect of the mosque's function?", "options": [{"text": "Its role as a quiet space exclusively for private contemplation and individual spiritual retreat.", "isCorrect": false, "rationale": "The text states the mosque is 'not primarily a private meditation space,' directly contradicting this option."}, {"text": "Its function as a central gathering place for the community to connect, address current events, and support those in need.", "isCorrect": true, "rationale": "The analogy 'community's living room' implies a central, informal, and functional space for communal life, supporting activities like addressing 'current events, moral challenges, the needs of the poor.'"}, {"text": "Its architectural design that prioritizes comfort and relaxation over formal worship.", "isCorrect": false, "rationale": "The analogy refers to its social function and importance to the community, not its physical design aesthetics."}, {"text": "Its financial role in collecting and distributing the community's zakat funds.", "isCorrect": false, "rationale": "While zakat is connected to the community, the 'living room' analogy primarily emphasizes its social and gathering function, not just its financial administration."}]}, {"question": "A Muslim from Saudi Arabia and a Muslim from China, despite vast cultural and linguistic differences, consider themselves part of the same global community. This phenomenon is best explained by which core concept in the provided text?", "options": [{"text": "The obligatory attendance at Jumu'ah prayer, which unites them weekly.", "isCorrect": false, "rationale": "Jumu'ah unites local congregations, but the question describes a global unity across vast cultural and linguistic differences, which is a broader concept."}, {"text": "The universal practice of the Shahada, which binds all believers through a common declaration.", "isCorrect": false, "rationale": "While Shahada is the entry point, the Ummah is the concept that specifically describes the ongoing global community that transcends divisions."}, {"text": "The concept of the Ummah, which transcends all human divisions like race, nationality, and language.", "isCorrect": true, "rationale": "The text directly states: 'The Ummah transcends every human division: race, nationality, language, class, tribe. A Muslim in Indonesia and a Muslim in Morocco... are members of the same community.'"}, {"text": "The shared experience of the Hajj, which brings millions together annually.", "isCorrect": false, "rationale": "Hajj is a powerful expression of the Ummah, but the Ummah itself is the overarching concept explaining the continuous global connection beyond specific rituals."}]}, {"question": "While social scientists might explain the synchrony effect of Salat as fostering a powerful sense of belonging, how does Islamic theology primarily explain this uniformity among believers during prayer?", "options": [{"text": "It is a practical method to ensure discipline and order during congregational worship.", "isCorrect": false, "rationale": "This might be a side effect, but it's not the *theological* explanation provided by the text."}, {"text": "It demonstrates the hierarchical structure within the Muslim community, with leaders guiding the movements.", "isCorrect": false, "rationale": "The text emphasizes equality and connection to God and other believers, not a hierarchical structure in this context."}, {"text": "The believer turns toward God, and in doing so, finds themselves standing beside every other believer who has ever turned the same direction.", "isCorrect": true, "rationale": "The text explicitly states: 'Islamic theology does not explain this sociologically; it explains it theologically: the believer is turning toward God, and in doing so, they find themselves standing beside every other believer who has ever turned the same direction.'"}, {"text": "It signifies a rejection of individual expression in favor of collective conformity.", "isCorrect": false, "rationale": "The theological explanation focuses on unity and connection to God and fellow believers, not a rejection of individuality as its primary meaning."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
