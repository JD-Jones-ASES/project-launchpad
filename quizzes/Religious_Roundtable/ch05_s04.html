<script>
var QUESTIONS = [{"question": "In Theravada Buddhism, what is the ideal figure a practitioner strives to become?", "options": [{"text": "A Bodhisattva, delaying personal enlightenment to help others.", "isCorrect": false, "rationale": "The Bodhisattva ideal is central to Mahayana Buddhism, not Theravada. Theravada focuses on individual liberation."}, {"text": "An Arhat, an individual who achieves nirvana for herself through rigorous practice.", "isCorrect": true, "rationale": "The text explicitly states that the arhat is the ideal figure in Theravada Buddhism, representing an individual who attains personal nirvana."}, {"text": "A Lama, a qualified teacher guiding others through mystical practices.", "isCorrect": false, "rationale": "Lamas are specific to Vajrayana (Tibetan) Buddhism, serving as spiritual guides and teachers."}, {"text": "The Dalai Lama, a globally recognized spiritual and political leader.", "isCorrect": false, "rationale": "The Dalai Lama is a specific figure within the Vajrayana tradition, not a general ideal for all practitioners across all vehicles."}]}, {"question": "A central difference between Mahayana and Theravada Buddhism concerns the accessibility of enlightenment. How does Mahayana specifically broaden this accessibility?", "options": [{"text": "By emphasizing rigorous monastic discipline for all practitioners as the sole path.", "isCorrect": false, "rationale": "Emphasis on rigorous monastic life as the primary path to liberation is more characteristic of Theravada Buddhism, not Mahayana's broadening of accessibility."}, {"text": "By introducing the bodhisattva ideal, making buddhahood available to all sentient beings, not just monastics.", "isCorrect": true, "rationale": "The text highlights the bodhisattva ideal in Mahayana as its 'central innovation' which 'democratizes salvation, insisting that buddhahood is available to all, not just to monastics.'"}, {"text": "By asserting that liberation is possible in a single lifetime through specific rituals and visualizations.", "isCorrect": false, "rationale": "The teaching of liberation in a single lifetime through rituals and visualizations is characteristic of Vajrayana Buddhism, not Mahayana's broadening of salvation."}, {"text": "By strictly adhering to the Pali Canon as the ultimate source of spiritual authority.", "isCorrect": false, "rationale": "Strict adherence to the Pali Canon is a defining characteristic of Theravada Buddhism, not Mahayana's unique contribution to broadening accessibility."}]}, {"question": "Which of the following sets of practices is most characteristic of Vajrayana Buddhism, as described in the text?", "options": [{"text": "Strict adherence to the Pali Canon and emphasis on monastic life.", "isCorrect": false, "rationale": "These practices are central to Theravada Buddhism, not Vajrayana."}, {"text": "The vow to delay personal nirvana to help all sentient beings achieve liberation.", "isCorrect": false, "rationale": "This describes the bodhisattva ideal, which is central to Mahayana Buddhism."}, {"text": "Elaborate ritual, visualization practices, mandalas, and the guidance of a qualified teacher (lama).", "isCorrect": true, "rationale": "The text explicitly states that Vajrayana incorporates 'elaborate ritual, visualization practices, mandalas (sacred geometric diagrams), and the guidance of a qualified teacher (lama).'"}, {"text": "Achieving individual nirvana as an arhat through rigorous personal practice.", "isCorrect": false, "rationale": "This is the ideal and path emphasized in Theravada Buddhism."}]}, {"question": "Imagine a Buddhist practitioner who makes a solemn vow to achieve enlightenment not just for personal liberation, but to continuously be reborn and assist all other sentient beings in their journey to freedom from suffering. This practitioner is embodying the core ideal of which vehicle?", "options": [{"text": "Theravada", "isCorrect": false, "rationale": "Theravada Buddhism emphasizes the path to individual liberation as an arhat, not the delay of one's own nirvana for others."}, {"text": "Mahayana", "isCorrect": true, "rationale": "This scenario directly describes the bodhisattva ideal, which is the 'central innovation' and ideal figure of Mahayana Buddhism, characterized by the vow to attain enlightenment for the sake of all sentient beings and willingly delay final nirvana."}, {"text": "Vajrayana", "isCorrect": false, "rationale": "Vajrayana focuses on achieving liberation in a single lifetime through specific mystical practices, not on delaying nirvana for others."}, {"text": "The 'narrow vehicle'", "isCorrect": false, "rationale": "The 'narrow vehicle' is a critical term sometimes applied to Theravada, not a distinct Buddhist vehicle, and does not align with the description of helping all sentient beings before oneself."}]}, {"question": "Which Buddhist tradition is explicitly described as 'dominant in Southeast Asia: Sri Lanka, Thailand, Myanmar (Burma), Laos, and Cambodia'?", "options": [{"text": "Mahayana", "isCorrect": false, "rationale": "Mahayana Buddhism spread north and east into China, Japan, Korea, and Vietnam, not primarily Southeast Asia."}, {"text": "Vajrayana", "isCorrect": false, "rationale": "Vajrayana Buddhism developed in India and Tibet and is associated with those regions, not primarily Southeast Asia."}, {"text": "Theravada", "isCorrect": true, "rationale": "The text explicitly states: 'Theravada... is dominant in Southeast Asia: Sri Lanka, Thailand, Myanmar (Burma), Laos, and Cambodia.'"}, {"text": "Tantric Buddhism", "isCorrect": false, "rationale": "Tantric Buddhism is another name for Vajrayana, which is not dominant in Southeast Asia."}]}, {"question": "Despite the variations in emphasis, art, practices, and understanding of salvation across the three vehicles, what fundamental aspect of Buddhism remains central in every tradition according to the text?", "options": [{"text": "The bodhisattva ideal.", "isCorrect": false, "rationale": "The bodhisattva ideal is central to Mahayana Buddhism, but not explicitly stated as central to *every* tradition in the text."}, {"text": "The guidance of a lama.", "isCorrect": false, "rationale": "The guidance of a lama is specific to Vajrayana Buddhism, not a universally central aspect across all traditions."}, {"text": "The Four Noble Truths.", "isCorrect": true, "rationale": "The text states: 'not in its core diagnosis (the Four Noble Truths remain central in every tradition) but in its emphasis...'"}, {"text": "The pursuit of the arhat ideal.", "isCorrect": false, "rationale": "The arhat ideal is central to Theravada Buddhism, but not to Mahayana or Vajrayana as their primary ideal."}]}, {"question": "Critics sometimes refer to Theravada Buddhism as the 'narrow vehicle.' What is the main reason for this label, and how do Theravadans generally respond?", "options": [{"text": "Critics say it's narrow because it doesn't utilize mandalas; Theravadans respond by stating mandalas are unnecessary for liberation.", "isCorrect": false, "rationale": "Mandalas are associated with Vajrayana, and their absence is not the primary reason for the 'narrow vehicle' critique of Theravada."}, {"text": "Critics suggest its path to liberation is highly individual and emphasizes monasticism; Theravadans counter that its path is precise, demanding, and genuinely transforming.", "isCorrect": true, "rationale": "The text explains, 'This is sometimes described as the narrow vehicle by critics,' likely referring to its emphasis on individual arhatship and monastic life. Theravadans reject this framing, stating 'the path is precise, demanding, and genuinely transforming.'"}, {"text": "Critics argue it lacks compassion for all sentient beings; Theravadans explain their focus on the Pali Canon fosters universal love.", "isCorrect": false, "rationale": "While Mahayana emphasizes universal compassion more directly, the text does not attribute the 'narrow vehicle' critique directly to a lack of compassion or state Theravadans' response in this way."}, {"text": "Critics believe it's geographically limited; Theravadans assert its global reach beyond Southeast Asia.", "isCorrect": false, "rationale": "The term 'narrow' in this context refers to the path or ideal, not geographical distribution."}]}, {"question": "Based on the provided 'keyterm' definition, what is the defining characteristic of a bodhisattva in Mahayana Buddhism?", "options": [{"text": "An individual who achieves nirvana for herself through rigorous practice.", "isCorrect": false, "rationale": "This describes an arhat, the ideal figure in Theravada Buddhism, not a bodhisattva."}, {"text": "A spiritual leader who guides practitioners through elaborate rituals and visualizations.", "isCorrect": false, "rationale": "This describes a lama in Vajrayana Buddhism, not a bodhisattva."}, {"text": "A being who vows to attain enlightenment not for personal liberation but to help all sentient beings, willingly delaying final nirvana.", "isCorrect": true, "rationale": "The 'keyterm' explicitly defines a bodhisattva as 'a being who vows to attain enlightenment not for personal liberation but in order to help all sentient beings be freed from suffering. The bodhisattva willingly delays final nirvana out of compassion.'"}, {"text": "One who strictly adheres to the Pali Canon to ensure the purity of the Buddha's original teachings.", "isCorrect": false, "rationale": "Strict adherence to the Pali Canon is a characteristic of Theravada Buddhism, not the defining feature of a bodhisattva."}]}, {"question": "What makes Vajrayana Buddhism particularly distinct in its approach to achieving liberation compared to the other two vehicles?", "options": [{"text": "Its exclusive reliance on the Pali Canon as the ultimate source of truth for all teachings.", "isCorrect": false, "rationale": "Exclusive reliance on the Pali Canon is characteristic of Theravada Buddhism, not Vajrayana."}, {"text": "Its emphasis on the Bodhisattva vow to help all beings before one's own nirvana.", "isCorrect": false, "rationale": "The Bodhisattva vow is central to Mahayana Buddhism, not Vajrayana."}, {"text": "Its teaching that liberation is possible within a single lifetime through specific methods.", "isCorrect": true, "rationale": "The text states: 'Vajrayana teaches that with the right methods, liberation is possible in a single lifetime,' which is a unique claim compared to the other two vehicles."}, {"text": "Its focus on individual arhatship achieved through a lifetime of monastic discipline.", "isCorrect": false, "rationale": "This describes the ideal and path of Theravada Buddhism, not Vajrayana."}]}, {"question": "The conclusion states that the three traditions 'do not simply disagree; they each illuminate something the others might underemphasize,' holding 'all three in productive tension.' Which statement best summarizes this 'productive tension'?", "options": [{"text": "The vehicles are in constant conflict, each attempting to prove its superiority over the others.", "isCorrect": false, "rationale": "The term 'productive tension' suggests a beneficial relationship, not constant conflict or competition for superiority."}, {"text": "Each tradition offers a unique and valuable perspective—Theravada's rigor, Mahayana's compassion, and Vajrayana's mystical depth—that collectively enriches the understanding of Buddhism.", "isCorrect": true, "rationale": "The concluding paragraph explicitly outlines how 'Theravada's rigor keeps the teaching close to its origins. Mahayana's compassion expands the circle of who belongs. Vajrayana's mystical depth insists that the mind's capacity for awakening is richer than any single method can exhaust,' demonstrating how their unique emphases collectively strengthen Buddhism."}, {"text": "The tension arises from their competition for followers and geographic dominance.", "isCorrect": false, "rationale": "The text describes differences in emphasis and practice as the source of tension, not competition for followers or territory."}, {"text": "They only superficially differ, sharing identical practices and goals despite their labels.", "isCorrect": false, "rationale": "The text details significant differences in ideals, practices, and geographical spread, indicating more than superficial differences."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
