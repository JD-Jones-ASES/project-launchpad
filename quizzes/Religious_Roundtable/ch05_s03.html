var QUESTIONS = [{"question": "What fundamental characteristic distinguishes Buddhist sacred texts from those of religions like Islam or Christianity, as stated in the text?", "options": [{"text": "Buddhism relies on a single, universally accepted scripture compiled by its founder.", "isCorrect": false, "rationale": "The text explicitly states, 'Buddhism has no single scripture the way Islam has the Quran or Christianity has the Bible,' making this option incorrect."}, {"text": "Buddhist traditions possess diverse canons, vast collections of texts regarded as authoritative.", "isCorrect": true, "rationale": "The text highlights that 'Different Buddhist traditions have different canons—different collections of texts they regard as authoritative—and those collections are vast,' which directly supports this answer."}, {"text": "All Buddhist scriptures were orally transmitted for centuries before being written down in a single language.", "isCorrect": false, "rationale": "While oral transmission was part of early Buddhism, the text emphasizes diverse written canons in multiple languages, not a single language or exclusive oral tradition in the current context."}, {"text": "The only authoritative texts in Buddhism are the direct quotes of the Buddha, unedited by disciples or scholars.", "isCorrect": false, "rationale": "The text mentions texts developed by 'later scholars' (Abhidhamma Pitaka) and Mahayana sutras appearing 'centuries after the historical Buddha,' indicating that not all authoritative texts are direct, unedited quotes from the Buddha's lifetime."}]}, {"question": "Which Buddhist tradition is primarily responsible for preserving the oldest and most complete collection of Buddhist scriptures, known as the Pali Canon or Tipitaka?", "options": [{"text": "Mahayana Buddhism", "isCorrect": false, "rationale": "Mahayana Buddhism developed an additional, distinct body of sutras, but it is not the primary preserver of the Pali Canon."}, {"text": "Tibetan Buddhism", "isCorrect": false, "rationale": "Tibetan Buddhism adds further layers of texts, but the Pali Canon is not its primary preserved collection."}, {"text": "Theravada Buddhism", "isCorrect": true, "rationale": "The text clearly states, 'The oldest and most complete is the Pali Canon, also called the Tipitaka ('Three Baskets'), preserved by the Theravada tradition.'"}, {"text": "Zen Buddhism", "isCorrect": false, "rationale": "Zen Buddhism is a school within Mahayana and is not specifically mentioned as the preserver of the Pali Canon."}]}, {"question": "A new monastic practitioner is seeking guidance on the proper conduct for monks and nuns, including rules on eating, dressing, and settling disputes. Which 'basket' of the Tipitaka would be most relevant for their study?", "options": [{"text": "Sutta Pitaka", "isCorrect": false, "rationale": "The Sutta Pitaka contains the discourses of the Buddha, focusing on teachings and conversations, not monastic rules."}, {"text": "Abhidhamma Pitaka", "isCorrect": false, "rationale": "The Abhidhamma Pitaka is a highly technical philosophical analysis, not a collection of practical monastic rules."}, {"text": "Vinaya Pitaka", "isCorrect": true, "rationale": "The text states the Vinaya Pitaka contains 'the rules governing the lives of monks and nuns: how to eat, dress, speak, settle disputes, and conduct ceremonies. It is the practical backbone of monastic life,' making it the correct choice for practical guidance."}, {"text": "Dhammapada", "isCorrect": false, "rationale": "The Dhammapada is a beloved text within the Sutta Pitaka, distilling Buddha's teachings, but it is not the primary source for monastic rules."}]}, {"question": "The Sutta Pitaka is primarily known for containing the discourses of the Buddha. Which widely quoted text, praised for distilling the Buddha's teaching into memorable, poetic form, is a beloved part of this collection?", "options": [{"text": "Heart Sutra", "isCorrect": false, "rationale": "The Heart Sutra is a Mahayana text, not part of the Sutta Pitaka of the Pali Canon."}, {"text": "Diamond Sutra", "isCorrect": false, "rationale": "The Diamond Sutra is a Mahayana text, not part of the Sutta Pitaka of the Pali Canon."}, {"text": "Dhammapada", "isCorrect": true, "rationale": "The text states, 'The most beloved single text within this basket [Sutta Pitaka] is the Dhammapada—423 verses distilling the Buddha's teaching into memorable, poetic form.'"}, {"text": "Bardo Thodol", "isCorrect": false, "rationale": "The Bardo Thodol is a Tibetan Buddhist text, not part of the Sutta Pitaka."}]}, {"question": "What is the distinguishing focus of the Abhidhamma Pitaka compared to the other two 'baskets' of the Tipitaka?", "options": [{"text": "It focuses on providing practical instructions for meditation and mindfulness.", "isCorrect": false, "rationale": "While meditation is central to Buddhism, the Abhidhamma's focus is on philosophical analysis, not practical instructions in the way the Sutta Pitaka might contain them."}, {"text": "It contains the direct, unedited sermons and conversations of the historical Buddha.", "isCorrect": false, "rationale": "This describes the Sutta Pitaka, not the Abhidhamma Pitaka, which is a later systematization."}, {"text": "It presents a highly technical philosophical analysis of mind, matter, and reality, developed by later scholars.", "isCorrect": true, "rationale": "The text clearly defines the Abhidhamma Pitaka as 'a highly technical philosophical analysis of mind, matter, and reality, developed by later scholars to systematize the Buddha's teaching.'"}, {"text": "It details the historical accounts of the Buddha's life and the formation of the early sangha.", "isCorrect": false, "rationale": "While such accounts exist in Buddhist literature, they are not the primary focus described for the Abhidhamma Pitaka."}]}, {"question": "A key difference between the Pali Canon and the additional body of sutras developed by Mahayana Buddhism is that Mahayana sutras often:", "options": [{"text": "Were exclusively focused on monastic discipline and daily rules.", "isCorrect": false, "rationale": "Monastic discipline is the focus of the Vinaya Pitaka, and Mahayana sutras often explore broader philosophical and enlightenment themes."}, {"text": "Are only preserved in the Pali language, unlike the Sanskrit Mahayana texts.", "isCorrect": false, "rationale": "The Pali Canon is in Pali, but Mahayana sutras are often in Sanskrit, among other languages, contradicting this statement."}, {"text": "Appeared centuries after the historical Buddha and offered what practitioners regarded as deeper teachings.", "isCorrect": true, "rationale": "The text states, 'Mahayana Buddhism produced an enormous additional body of sutras, some of which appeared centuries after the historical Buddha,' and 'Mahayana practitioners regard as equally authentic expressions of the Buddha's wisdom, revealed for those ready to receive a deeper teaching.'"}, {"text": "Were all recorded directly by the Buddha's immediate disciples during his lifetime.", "isCorrect": false, "rationale": "The text explicitly states that 'some of which appeared centuries after the historical Buddha,' making this option incorrect regarding Mahayana sutras."}]}, {"question": "If a Buddhist practitioner is interested in exploring a 'compressed meditation on emptiness' (śūnyatā) as described in the text, which Mahayana text would be most relevant to them?", "options": [{"text": "Lotus Sutra", "isCorrect": false, "rationale": "The Lotus Sutra 'expands the vision of who can attain enlightenment,' which is a different theme than 'emptiness.'"}, {"text": "Diamond Sutra", "isCorrect": false, "rationale": "The Diamond Sutra is described as a 'dazzling philosophical dialogue on the nature of perception and non-attachment,' not specifically a 'compressed meditation on emptiness' in the text."}, {"text": "Heart Sutra", "isCorrect": true, "rationale": "The text directly describes the Heart Sutra as 'a compressed meditation on emptiness, recited daily in millions of monasteries,' matching the description."}, {"text": "Vinaya Pitaka", "isCorrect": false, "rationale": "The Vinaya Pitaka focuses on monastic rules and is part of the Pali Canon, not a Mahayana text on emptiness."}]}, {"question": "Tibetan Buddhism adds a further layer of texts to the Buddhist canon. What is the primary purpose of the 'Bardo Thodol,' famously known as the Tibetan Book of the Dead, as described in the text?", "options": [{"text": "To provide a definitive biography of the historical Buddha and his early teachings.", "isCorrect": false, "rationale": "The Bardo Thodol is not a biography of the Buddha; its focus is on post-death states."}, {"text": "To guide individuals through the states of consciousness between death and rebirth.", "isCorrect": true, "rationale": "The text clearly states the Bardo Thodol is 'a guide to navigating the states of consciousness between death and rebirth,' directly supporting this answer."}, {"text": "To offer advanced philosophical arguments on the nature of ultimate reality and emptiness.", "isCorrect": false, "rationale": "While Tibetan Buddhism has philosophical texts, the Bardo Thodol's specific purpose is described as a guide for the dying process, not general philosophy."}, {"text": "To outline the rituals and ceremonies for daily monastic practice in Tibet.", "isCorrect": false, "rationale": "The Bardo Thodol is not focused on daily monastic rituals but on the transitional states of consciousness."}]}, {"question": "The text concludes by stating that the diversity of Buddhist sacred texts implies that Buddhism is 'not a religion with one book and one reading.' What is the most significant consequence of this diversity for understanding Buddhism?", "options": [{"text": "It means Buddhism lacks a coherent set of core teachings or a unified philosophy.", "isCorrect": false, "rationale": "The diversity implies 'intellectually rich and contested,' not a lack of coherence. Different canons offer varied expressions of core teachings."}, {"text": "It suggests that Buddhism is a static tradition with rigid adherence to ancient, immutable texts.", "isCorrect": false, "rationale": "The description 'living tradition with multiple canons, multiple languages, and a long history of commentary and debate' contradicts the idea of a static tradition."}, {"text": "It indicates that Buddhism is a living tradition with multiple canons, languages, and a long history of commentary and debate.", "isCorrect": true, "rationale": "The text directly states, 'It is a living tradition with multiple canons, multiple languages, and a long history of commentary and debate,' which this option perfectly encapsulates."}, {"text": "It implies that only scholars can truly understand Buddhist texts due to their complexity and varied origins.", "isCorrect": false, "rationale": "While complexity exists, the text doesn't limit understanding to scholars; rather, it highlights the rich intellectual tradition available to practitioners and students."}]}, {"question": "Considering the chronological development of Buddhist texts as presented in the section, which statement most accurately describes the origin of the various 'sutras' or 'suttas'?", "options": [{"text": "All sutras, regardless of tradition, were recorded directly by the Buddha's immediate disciples during his lifetime.", "isCorrect": false, "rationale": "The text mentions the Sutta Pitaka discourses were recorded 'after the Buddha's death' and Mahayana sutras 'appeared centuries after the historical Buddha,' refuting this generalization."}, {"text": "The discourses in the Sutta Pitaka were recorded after the Buddha's death, while some Mahayana sutras appeared centuries later.", "isCorrect": true, "rationale": "The text states the Sutta Pitaka discourses were 'recorded (after the Buddha's death) by his disciples' and Mahayana sutras 'appeared centuries after the historical Buddha,' making this the most accurate statement."}, {"text": "Mahayana sutras are the oldest and most complete collection, predating the Pali Canon by centuries.", "isCorrect": false, "rationale": "The text identifies the Pali Canon as 'The oldest and most complete collection' and states Mahayana sutras 'appeared centuries after the historical Buddha,' which contradicts this option."}, {"text": "Tibetan terma texts are the only scriptures directly attributed to the Buddha's original teachings.", "isCorrect": false, "rationale": "Terma are 'revealed by realized masters,' and the Sutta Pitaka also contains teachings attributed to the Buddha. This statement is overly exclusive and incorrect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
