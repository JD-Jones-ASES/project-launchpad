<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary catalyst for the most significant and lasting division within Islamic history?", "options": [{"text": "Disagreements over specific ritual prayer styles.", "isCorrect": false, "rationale": "While minor ritual differences might exist, the text explicitly states the division arose from questions of leadership, not ritual practices."}, {"text": "The absence of clear written instructions from Muhammad regarding his successor.", "isCorrect": true, "rationale": "The text states, 'When Muhammad died in 632, he left no written instructions about who should lead the Muslim community. This question…produced the most significant and lasting division…'"}, {"text": "Economic disputes and trade route control among early Muslim communities.", "isCorrect": false, "rationale": "The text does not mention economic disputes as the primary cause of this major division, focusing instead on religious authority."}, {"text": "Philosophical disagreements about the nature of God and divine attributes.", "isCorrect": false, "rationale": "While theological discussions are part of Islam, the foundational split was specifically about legitimate leadership, not broader philosophical differences about God's nature."}]}, {"question": "According to Sunni Islam, what is the defining characteristic of a legitimate leader, known as a Caliph?", "options": [{"text": "Direct lineal descent from Prophet Muhammad through his daughter Fatima.", "isCorrect": false, "rationale": "This describes the Shia perspective on the Imamate, not the Sunni view of the Caliphate."}, {"text": "Possession of prophetic spiritual authority, capable of receiving new revelations.", "isCorrect": false, "rationale": "The text states that prophecy ended with Muhammad, so no subsequent leader, Sunni or Shia, is considered a prophet."}, {"text": "Selection by community consensus as a qualified individual to govern Muslim affairs and protect the faith.", "isCorrect": true, "rationale": "The text defines a Caliph in Sunni Islam as 'a qualified leader chosen by community consensus who would govern Muslim affairs and protect the faith.'"}, {"text": "Appointment through a hereditary system established by the first four caliphs.", "isCorrect": false, "rationale": "The text emphasizes 'community consensus' for the selection of a Caliph, not a hereditary system."}]}, {"question": "How does the Shia understanding of an Imam's authority fundamentally differ from the Sunni understanding of a Caliph's authority?", "options": [{"text": "Shia Imams primarily hold military power, while Sunni Caliphs focus solely on spiritual guidance.", "isCorrect": false, "rationale": "The text describes Imams as having 'special spiritual authority' and Caliphs as governing affairs and protecting faith, which involves both temporal and spiritual dimensions. The distinction is not purely military vs. spiritual."}, {"text": "Shia Imams possess divinely guided interpretation of revelation, unlike Sunni Caliphs who are chosen by community consensus.", "isCorrect": true, "rationale": "The text states Shia Muslims believe Imams possessed 'divinely guided interpretation of the revelation,' while Sunni Caliphs are 'chosen by community consensus,' highlighting the core difference in the source and nature of their authority."}, {"text": "Sunni Caliphs are considered infallible and sinless, whereas Shia Imams are ordinary political figures.", "isCorrect": false, "rationale": "The concept of infallibility is generally associated with Shia Imams (though not explicitly detailed here), not Sunni Caliphs. Sunni Caliphs are not considered infallible, and Shia Imams are far from 'ordinary political figures' due to their spiritual authority."}, {"text": "Shia Imams are elected for life, while Sunni Caliphs serve fixed terms.", "isCorrect": false, "rationale": "The text does not specify term limits or election specifics for either, but focuses on the basis of their legitimacy and authority."}]}, {"question": "The annual observance of Ashura by Shia Muslims holds profound significance due to its commemoration of which historical event?", "options": [{"text": "The birth of Prophet Muhammad in Mecca.", "isCorrect": false, "rationale": "The text does not link Ashura to the Prophet Muhammad's birth."}, {"text": "The migration (Hijra) of the Muslim community from Mecca to Medina.", "isCorrect": false, "rationale": "The Hijra is a significant event but not the one commemorated by Ashura, according to the text."}, {"text": "The martyrdom of Husayn, Ali's son, at the Battle of Karbala in 680 CE.", "isCorrect": true, "rationale": "The text clearly states, 'The murder of Ali's son Husayn at the Battle of Karbala in 680—a defining tragedy of Islamic history—is commemorated annually by Shia Muslims in the observance of Ashura.'"}, {"text": "The revelation of the first verses of the Quran to Prophet Muhammad.", "isCorrect": false, "rationale": "This event is not associated with Ashura in the provided text."}]}, {"question": "What accurately describes the nature of Sufism's relationship to the broader Sunni and Shia traditions?", "options": [{"text": "Sufism is a separate, independent religion that emerged from Islam with its own distinct holy texts.", "isCorrect": false, "rationale": "The text explicitly states, 'Sufi Islam is not a separate denomination but a spiritual current that runs through both Sunni and Shia traditions.'"}, {"text": "Sufism is a mystical current emphasizing inward practice and direct experience of God, found within both Sunni and Shia Islam.", "isCorrect": true, "rationale": "The text defines Sufism as 'the mystical strand of Islam—a tradition of inward practice, devotion, and contemplation aimed at direct experience of God's presence' and notes it 'runs through both Sunni and Shia traditions.'"}, {"text": "Sufism is primarily a political movement advocating for a unified Islamic caliphate under a Sufi leader.", "isCorrect": false, "rationale": "The text characterizes Sufism as a spiritual current focused on inward devotion, not a political movement seeking a caliphate."}, {"text": "Sufism represents one of the four major schools of legal interpretation (madhabs) within Sunni Islam.", "isCorrect": false, "rationale": "The text identifies madhabs as legal schools within Sunni Islam, distinct from Sufism, which is a spiritual current."}]}, {"question": "According to the text, what is the ultimate spiritual goal of Sufi practice, often referred to as 'qurb'?", "options": [{"text": "Achieving widespread political influence for Muslim rulers.", "isCorrect": false, "rationale": "Sufism's focus is inward and spiritual, not on external political influence."}, {"text": "Becoming an internationally famous poet like Jalal al-Din Rumi.", "isCorrect": false, "rationale": "While Rumi is a famous Sufi, his fame is a byproduct of his spiritual expression, not the ultimate goal of Sufism itself."}, {"text": "Direct experience of God's presence and attaining nearness or closeness to God.", "isCorrect": true, "rationale": "The text states Sufism is 'aimed at direct experience of God's presence' and Sufis 'often speak of qurb—nearness or closeness to God—as the goal of religious life.'"}, {"text": "Establishing new, separate denominations of Islam with unique doctrines.", "isCorrect": false, "rationale": "The text clarifies that Sufism is 'not a separate denomination' but a spiritual current within existing traditions."}]}, {"question": "Sunnis regard the era of the first four Caliphs (Abu Bakr, Umar, Uthman, and Ali) as the 'golden age of Islamic governance' primarily because:", "options": [{"text": "These Caliphs were believed to possess prophetic powers that allowed them to receive divine revelations.", "isCorrect": false, "rationale": "The text clarifies that prophecy ended with Muhammad, so no Caliph would possess prophetic powers."}, {"text": "It was a period of unprecedented territorial expansion and the acquisition of vast wealth.", "isCorrect": false, "rationale": "While there might have been expansion, the text's description of 'golden age of Islamic governance' is directly linked to their role as 'qualified leader[s] chosen by community consensus who would govern Muslim affairs and protect the faith.'"}, {"text": "They were seen as ideal leaders who governed justly, protected the faith, and were chosen by community consensus.", "isCorrect": true, "rationale": "The text calls them the 'Rightly Guided Caliphs' and their era 'the golden age of Islamic governance,' aligning with the Sunni ideal of leaders chosen by consensus to govern and protect the faith."}, {"text": "They successfully eliminated all internal disputes and divisions within the Muslim community.", "isCorrect": false, "rationale": "The text indicates that the fundamental division arose after Muhammad's death and continued, implying that even during this 'golden age,' foundational tensions existed, notably around Ali's succession."}]}, {"question": "Jalal al-Din Rumi is highlighted in the text as a significant figure for Sufism due to his contributions in what area?", "options": [{"text": "His role as a military leader who expanded Islamic territories.", "isCorrect": false, "rationale": "Rumi is identified as a 'Persian poet,' not a military leader."}, {"text": "His development of new schools of Islamic legal interpretation.", "isCorrect": false, "rationale": "Rumi's fame stems from his poetry, not legal scholarship."}, {"text": "His devotional poetry expressing divine love and the soul's longing for God.", "isCorrect": true, "rationale": "The text states Rumi is famous for 'his poems about divine love and the soul's longing for God.'"}, {"text": "His establishment of a new, separate denomination of Islam.", "isCorrect": false, "rationale": "The text clarifies that Sufism is a spiritual current within existing traditions, and Rumi contributed to its expression, not its separation."}]}, {"question": "A newly formed Muslim community is debating who should lead them. They decide to select a leader based on their qualifications and the general agreement of the community members, rather than on inherited lineage. This approach is most consistent with the leadership principles of which Islamic tradition described?", "options": [{"text": "Shia Islam", "isCorrect": false, "rationale": "Shia Islam advocates for leadership based on direct lineage from Ali and his spiritual authority, not community consensus for qualified individuals outside that lineage."}, {"text": "Sufi Islam", "isCorrect": false, "rationale": "Sufism is a spiritual current and does not prescribe a specific political leadership model for the entire community in the way Sunni or Shia Islam do concerning the Caliphate/Imamate."}, {"text": "Sunni Islam", "isCorrect": true, "rationale": "The text states that Sunni Islam 'holds that the community should be led by a caliph…a qualified leader chosen by community consensus.'"}, {"text": "The Rightly Guided Caliphs' tradition (which is distinct from Sunni and Shia)", "isCorrect": false, "rationale": "The Rightly Guided Caliphs' era is considered the golden age *by Sunnis*, and their succession method (consensus) is foundational to Sunni leadership principles, making it part of Sunni Islam, not a distinct, separate tradition in this context."}]}, {"question": "Despite the historical and theological differences between Sunni, Shia, and Sufi Muslims, the text emphasizes a profound underlying unity. Which statement best encapsulates this unity?", "options": [{"text": "All branches are governed by a single, overarching religious authority that ensures uniformity in practice.", "isCorrect": false, "rationale": "The text explicitly details different leadership structures (Caliph vs. Imam) and the existence of different legal schools (madhabs), indicating no single overarching authority governing all branches."}, {"text": "They share fundamental commonalities in worship practices, sacred texts, and central religious sites.", "isCorrect": true, "rationale": "The text concludes, 'Despite their differences, Sunni, Shia, and Sufi Muslims all pray the same prayers, fast the same Ramadan, recite the same Quran, and face the same Ka'ba,' directly highlighting these shared fundamentals."}, {"text": "Their differences are purely cultural and do not involve any theological disagreements.", "isCorrect": false, "rationale": "The text clearly states the division arose from the 'question—who has the legitimate authority to guide the ummah?' which is a theological disagreement, not just a cultural one."}, {"text": "They all ultimately aim to embrace Sufism as the highest form of Islamic spirituality.", "isCorrect": false, "rationale": "Sufism is a 'spiritual current' within both Sunni and Shia traditions, not a universal goal for all Muslims, nor is it presented as such in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
