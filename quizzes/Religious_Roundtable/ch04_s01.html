<script>
var QUESTIONS = [{"question": "According to the text, what is the most distinctive feature of Hinduism's origins compared to most other major religions?", "options": [{"text": "Its emphasis on ritual bathing and purity.", "isCorrect": false, "rationale": "While a characteristic of early and later Hindu practice, this is not presented as the *most distinctive* feature of its *origins* compared to other religions. Many religions have purification rituals."}, {"text": "Its lack of a single founder, founding moment, or definitive revelation.", "isCorrect": true, "rationale": "The text explicitly states: 'Most religions have a founding moment—a prophet, a vision, a decisive event. Hinduism has none of these, and that fact is itself the first thing to understand about it.'"}, {"text": "Its precise dating to around 2500 BCE with the Indus Valley Civilization.", "isCorrect": false, "rationale": "The text identifies the Indus Valley Civilization as the 'earliest archaeological evidence,' but emphasizes that Hinduism is 'the accumulated religious life of a civilization stretching back more than three thousand years,' not a single founding event at this date."}, {"text": "Its development through a rich oral tradition of hymns in Sanskrit.", "isCorrect": false, "rationale": "This describes the Vedic religion brought by the Aryans, which is a significant component of Hinduism's development, but not the *most distinctive* feature of its overall origins compared to other religions, which often have foundational sacred texts or oral traditions."}], "id": "q01"}, {"question": "Which archaeological finding from the Indus Valley Civilization provides the strongest evidence for a connection to later Hindu practices, despite the unreadable script?", "options": [{"text": "The presence of advanced drainage systems in cities like Mohenjo-daro.", "isCorrect": false, "rationale": "Advanced drainage systems demonstrate urban sophistication and engineering prowess, but do not directly suggest a religious continuity with specific later Hindu practices."}, {"text": "The existence of large granaries for food storage.", "isCorrect": false, "rationale": "Granaries indicate economic organization and agricultural capacity, not specific religious links to subsequent Hindu traditions."}, {"text": "Ritual bathing pools and figurines potentially depicting an early form of Shiva.", "isCorrect": true, "rationale": "The text notes 'what appear to be ritual bathing pools—suggesting a concern with purity that still runs through Hindu practice today' and 'figurines and symbols—including what may be an early form of the god Shiva—that suggest connections to later Hindu tradition.'"}, {"text": "The systematic urban planning of cities like Harappa.", "isCorrect": false, "rationale": "Systematic urban planning reflects societal organization and administrative capability, rather than direct religious continuity with later Hindu practices."}], "id": "q02"}, {"question": "How did the Aryan migration fundamentally change the religious landscape of the Indian subcontinent, as described in the text?", "options": [{"text": "By introducing the concept of reincarnation and karma.", "isCorrect": false, "rationale": "While central to later Hinduism, concepts like reincarnation and karma gained prominence during the Upanishadic period, which followed the initial Aryan migration and Vedic religion."}, {"text": "By establishing a sophisticated urban civilization with advanced infrastructure.", "isCorrect": false, "rationale": "This describes the Indus Valley Civilization, which predated the Aryan migration."}, {"text": "By bringing an oral tradition of hymns, the Sanskrit language, and a fire-sacrifice-centered religion.", "isCorrect": true, "rationale": "The text states the Aryans 'brought with them a rich oral tradition of hymns, ritual knowledge, and a language called Sanskrit. Their religious culture became the Vedic religion—centered on fire sacrifices (yajnas).'"}, {"text": "By composing philosophical texts that questioned the nature of reality and the self.", "isCorrect": false, "rationale": "This philosophical shift occurred later, during the Upanishadic period, led by rishis, not as an initial contribution of the Aryan migration itself."}], "id": "q03"}, {"question": "The period of the Upanishads is characterized by a 'profound philosophical turn.' What was the central shift in religious inquiry during this era?", "options": [{"text": "From honoring nature gods to a focus on heroic deeds and epic narratives.", "isCorrect": false, "rationale": "The great epics (Mahabharata and Ramayana) came after the Upanishadic period, and while they feature heroic deeds, the Upanishads were primarily philosophical."}, {"text": "From questions about correct ritual performance to inquiries about the nature of reality and the self.", "isCorrect": true, "rationale": "The text states that rishis 'began composing the Upanishads: philosophical texts that asked deeper questions than How do we perform the sacrifice correctly? They asked: What is reality? What is the self?'"}, {"text": "From complex fire sacrifices to simple devotional worship (bhakti).", "isCorrect": false, "rationale": "Bhakti movements rose in the first millennium CE, significantly later than the Upanishadic period (800–200 BCE)."}, {"text": "From regional cults to a unified pan-Indian religious system under a single founder.", "isCorrect": false, "rationale": "The text emphasizes Hinduism as a 'family of traditions' and 'not a monolith,' contradicting the idea of a unified system under a single founder, especially during the Upanishadic period."}], "id": "q04"}, {"question": "The text mentions the Upanishadic period as part of the 'Axial Age.' What does this classification imply about this era in the development of Hinduism?", "options": [{"text": "It was a time when Hinduism definitively became a monotheistic religion.", "isCorrect": false, "rationale": "The text does not suggest a move to monotheism during this period, and Hinduism's diverse theological views often include polytheism, henotheism, and monism, but not universally monotheism."}, {"text": "It marked a period of profound philosophical and ethical questioning globally, including within Hinduism.", "isCorrect": true, "rationale": "The text explicitly connects it to 'the same era that produced the Hebrew prophets, the Greek philosophers, the Buddha, and Confucius,' indicating a worldwide period of intellectual and spiritual ferment."}, {"text": "It was the precise moment when the term 'Hinduism' was first coined to describe the religion.", "isCorrect": false, "rationale": "The term 'Hinduism' is described as a 'Western construction' coined much later by British colonial officials."}, {"text": "It signified the decline of the Vedic traditions and their replacement by entirely new religious practices.", "isCorrect": false, "rationale": "The Upanishads represented a 'philosophical turn' that reinterpreted and built upon Vedic foundations, rather than completely replacing them."}], "id": "q05"}, {"question": "Which of the following elements is NOT mentioned in the text as a significant influence or development in Hinduism *after* the Upanishadic period?", "options": [{"text": "The composition of the great epics like the Mahabharata and Ramayana.", "isCorrect": false, "rationale": "The text states: 'The tradition continued to develop through the great epics—the Mahabharata and the Ramayana—...'"}, {"text": "The emergence of devotional (bhakti) movements.", "isCorrect": false, "rationale": "The text states: '...the rise of devotional (bhakti) movements in the first millennium CE...'"}, {"text": "The adoption of a centralized ecclesiastical hierarchy led by a single spiritual head.", "isCorrect": true, "rationale": "The text describes Hinduism as 'not a monolith' and a 'family of traditions,' and makes no mention of a centralized hierarchy or single spiritual head. Such a structure is contrary to the diverse, decentralized nature described."}, {"text": "The encounter with Islamic culture during the Mughal period.", "isCorrect": false, "rationale": "The text states: '...and the long encounter with Islamic culture during the Mughal period (1526–1857 CE).'"}], "id": "q06"}, {"question": "The text states that 'the category Hinduism is in part a Western construction.' What is the primary implication of this statement?", "options": [{"text": "That the religious practices of the Indian subcontinent are entirely fabricated and have no authentic historical basis.", "isCorrect": false, "rationale": "The statement refers to the *label* or *category*, not the authenticity or historicity of the religious practices themselves, which are described as stretching back 'more than three thousand years.'"}, {"text": "That 'Hinduism' is a diverse collection of traditions grouped under one label, often by external observers.", "isCorrect": true, "rationale": "The text explains that British colonial officials 'grouped them all under the label Hindu' to describe 'enormously varied religious practices,' and that 'Many practitioners identify more specifically... than as Hindus in a generic sense. Hinduism is not a monolith; it is a family of traditions.'"}, {"text": "That practitioners of these traditions universally reject the term 'Hinduism' in favor of more specific labels.", "isCorrect": false, "rationale": "The text says 'Many practitioners identify more specifically,' implying that some do use the generic term, but not that there is universal rejection."}, {"text": "That the term 'Hinduism' accurately reflects a unified and monolithic religion with a clear, singular doctrine.", "isCorrect": false, "rationale": "This directly contradicts the text's assertion that 'Hinduism is not a monolith; it is a family of traditions.'"}], "id": "q07"}, {"question": "An individual identifies as a 'Vaishnava.' How does this identification, according to the text, relate to the broader concept of Hinduism?", "options": [{"text": "It indicates they follow a tradition that is entirely separate and distinct from Hinduism.", "isCorrect": false, "rationale": "The text states that Vaishnavas are among those who 'identify more specifically... than as Hindus in a generic sense,' implying they are part of the larger family of traditions known as Hinduism."}, {"text": "It signifies adherence to one specific branch or tradition within the larger family of religious practices labeled 'Hinduism.'", "isCorrect": true, "rationale": "The text explains that 'Many practitioners identify more specifically as Vaishnavas, Shaivas, or Shaktas... Hinduism is not a monolith; it is a family of traditions,' meaning these are specific denominations within the broader Hindu umbrella."}, {"text": "It means they are a Hindu who has adopted certain Western philosophical ideas.", "isCorrect": false, "rationale": "Vaishnavas, Shaivas, and Shaktas are traditional internal classifications within Hinduism, not categories related to engagement with Western philosophy."}, {"text": "It suggests they are part of the original Vedic religion that predates later Hindu developments.", "isCorrect": false, "rationale": "Vaishnavism is a devotional (bhakti) movement, which emerged in the first millennium CE, significantly after the Vedic period."}], "id": "q08"}, {"question": "Based on the 'Did you know' box about Sanskrit, what can be inferred about its historical and linguistic significance?", "options": [{"text": "Sanskrit was primarily a language used for everyday communication in ancient India, similar to modern Hindi.", "isCorrect": false, "rationale": "The text highlights its use as 'the language of the Vedas and most Hindu scripture' and describes it as 'remarkably precisely constructed,' suggesting a more formal, sacred, and scholarly role, rather than solely common daily speech."}, {"text": "Its precise construction and ancient roots demonstrate its foundational role in the development of numerous other languages across diverse regions.", "isCorrect": true, "rationale": "The text states Sanskrit is 'one of the oldest recorded languages in the world,' 'remarkably precisely constructed,' the 'ancestor of most languages of South Asia,' and 'a distant relative of Greek, Latin, Russian, and English,' all pointing to its foundational linguistic importance."}, {"text": "The shared root of 'deva' with Latin 'deus' proves that Hinduism originated in ancient Rome.", "isCorrect": false, "rationale": "Shared linguistic roots indicate a common ancestral language (Proto-Indo-European) but do not imply that the religion itself originated in a specific geographical location like Rome."}, {"text": "Sanskrit is a dead language with no modern descendants or linguistic relatives.", "isCorrect": false, "rationale": "The text explicitly states it is the 'ancestor of most languages of South Asia' and a 'distant relative of Greek, Latin, Russian, and English,' demonstrating its continued linguistic legacy."}], "id": "q09"}, {"question": "Which of the following sequences accurately represents the chronological order of significant developments in Hinduism, as described in the text?", "options": [{"text": "Aryan Migration → Upanishadic Period → Indus Valley Civilization → Bhakti Movements.", "isCorrect": false, "rationale": "The Indus Valley Civilization (2500–1900 BCE) predates the Aryan Migration (around 1500 BCE)."}, {"text": "Indus Valley Civilization → Vedic Religion → Philosophical Turn (Upanishads) → Rise of Bhakti Movements.", "isCorrect": true, "rationale": "This sequence correctly follows the timeline in the text: 'earliest archaeological evidence... Indus Valley Civilization' (2500–1900 BCE) → 'Around 1500 BCE, a cattle-herding people called the Aryans migrated... Their religious culture became the Vedic religion' → 'Over the following centuries—roughly 800–200 BCE—the tradition underwent a profound philosophical turn... composing the Upanishads' → 'the rise of devotional (bhakti) movements in the first millennium CE'."}, {"text": "Rise of Bhakti Movements → Mughal Period → Vedic Religion → Swami Vivekananda's reforms.", "isCorrect": false, "rationale": "Vedic Religion (around 1500 BCE) came long before Bhakti Movements (first millennium CE) and the Mughal Period (1526–1857 CE)."}, {"text": "Upanishadic Period → Swami Vivekananda's reforms → Indus Valley Civilization → Aryan Migration.", "isCorrect": false, "rationale": "This sequence is largely incorrect. Indus Valley Civilization and Aryan Migration are among the earliest, while Swami Vivekananda's reforms were in the 19th century."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
