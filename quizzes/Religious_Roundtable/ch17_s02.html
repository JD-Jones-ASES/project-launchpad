<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes Brahman from a conventional 'god among gods' in Hindu theology?", "options": [{"text": "Brahman is the creator of the universe, whereas gods are merely its inhabitants.", "isCorrect": false, "rationale": "While Brahman is the ultimate ground of all reality from which everything arises, the text emphasizes it's not a 'god among gods' in a conventional sense of creation with personal attributes. This option mischaracterizes Brahman's unique ultimate, impersonal nature."}, {"text": "Brahman is the uncaused, unlimited, impersonal, eternal reality underlying all existence.", "isCorrect": true, "rationale": "The text explicitly defines Brahman as 'the uncaused, unlimited, eternal reality from which everything arises, in which everything exists, and to which everything returns' and 'the impersonal, infinite reality that underlies all of existence,' distinguishing it from a personal deity."}, {"text": "Brahman is a personal deity with specific preferences and emotions, unlike the lesser gods.", "isCorrect": false, "rationale": "The text explicitly states Brahman is 'not a personal god with preferences and emotions (though it can appear as one); it is the impersonal, infinite reality.'"}, {"text": "Brahman is the highest of many gods, granting it ultimate authority over the pantheon.", "isCorrect": false, "rationale": "The text clarifies Brahman is 'not a god among gods,' indicating it is beyond a hierarchy of deities, not merely the supreme one within it."}]}, {"question": "A student is struggling to understand the difference between Brahman nirguna and Brahman saguna. Which analogy best explains this distinction based on the provided text?", "options": [{"text": "Nirguna is like a seed, and saguna is like the fully grown tree it becomes.", "isCorrect": false, "rationale": "While there's a progression from seed to tree, this analogy doesn't capture the simultaneous existence and different *ways of understanding* the same ultimate reality. Nirguna and Saguna are aspects, not sequential stages of development."}, {"text": "Nirguna represents the human soul, while saguna represents the physical body it inhabits.", "isCorrect": false, "rationale": "This analogy misrepresents Brahman as a divine soul separate from a body, rather than the ultimate reality itself, and Atman (the self) is identified with Brahman, not with nirguna specifically in contrast to a body."}, {"text": "Nirguna is the fundamental, formless energy of a river, while saguna is the specific waterfall or stream formed by that river.", "isCorrect": true, "rationale": "The text defines nirguna as the 'utterly transcendent, formless, attribute-less ground of being' and saguna as 'Brahman as it appears with a face, a name, a story, a personality.' The river's fundamental energy (formless, underlying) and a specific waterfall (manifest, with qualities) effectively illustrate these two aspects of the *same* reality."}, {"text": "Nirguna is the concept of abstract goodness, while saguna is a specific good deed performed by a person.", "isCorrect": false, "rationale": "This analogy deals with abstract vs. concrete morality, not the ultimate reality and its manifestations described in the text in terms of being with or without qualities."}]}, {"question": "The Upanishadic saying 'Tat tvam asi' ('That thou art') is a central tenet in Hindu thought regarding the relationship between Atman and Brahman. What is the most profound implication of this saying?", "options": [{"text": "It asserts that every individual soul (Atman) is a distinct, created entity separate from Brahman.", "isCorrect": false, "rationale": "This contradicts the core message of 'Tat tvam asi' and the Advaita school, which asserts non-separation and identity between Atman and Brahman."}, {"text": "It suggests that Atman is merely a temporary reflection of Brahman, eventually dissolving back into it.", "isCorrect": false, "rationale": "While the text mentions 'maya' as an illusion of separation, the identity is not merely a temporary reflection that dissolves, but a fundamental, deepest truth, particularly in Advaita Vedanta."}, {"text": "It signifies that the innermost self (Atman) is ultimately identical with the ultimate reality (Brahman).", "isCorrect": true, "rationale": "The text states, 'The atman, the innermost self of every human being, is not ultimately separate from Brahman. ...Brahman and Atman are, at the deepest level, identical.' This directly explains 'Tat tvam asi'."}, {"text": "It establishes Brahman as a divine judge who observes and guides the Atman through reincarnation.", "isCorrect": false, "rationale": "While Brahman is ultimate reality, the saying 'Tat tvam asi' specifically focuses on the identity of the self and ultimate reality, not Brahman's role as a judge."}]}, {"question": "The text distinguishes Hindu thought as panentheistic rather than pantheistic. Which statement accurately captures the meaning of panentheism in this context?", "options": [{"text": "God is the entire universe, and nothing exists outside of God.", "isCorrect": false, "rationale": "This describes pantheism ('the claim that the world simply is God'), which the text explicitly distinguishes from panentheism."}, {"text": "God exists completely separate and apart from the universe, only interacting occasionally.", "isCorrect": false, "rationale": "This describes a deistic or highly transcendent view, but not panentheism, which emphasizes God's immanence *within* the world while also being more than it."}, {"text": "The universe is a part of God, but God's reality extends beyond the universe.", "isCorrect": true, "rationale": "The text defines panentheism as 'the world is within God, and God is more than the world.' This aligns directly with the description."}, {"text": "God is merely a metaphor for the natural laws governing the universe.", "isCorrect": false, "rationale": "This reductive view aligns with philosophical naturalism, not the theological concept of panentheism described in the text."}]}, {"question": "Considering the description of the Upanishads, why might these texts be considered foundational for understanding the concept of Brahman, despite their approach of 'circling persistence' rather than direct answers?", "options": [{"text": "They compile a definitive list of Brahman's direct attributes, making its nature easily comprehensible.", "isCorrect": false, "rationale": "The text states that 'any direct answer is always going to be inadequate' and the Upanishads approach Brahman with 'patient, circling persistence,' implying they do not offer simple, definitive lists of attributes."}, {"text": "They persistently explore Brahman from various angles, encouraging an experiential understanding that transcends simple definitions.", "isCorrect": true, "rationale": "The text highlights their 'patient, circling persistence, approaching from every angle, because any direct answer is always going to be inadequate.' This suggests a deeper, more profound understanding gained through exploration and questioning rather than simple, direct definition, aligning with an experiential approach."}, {"text": "They emphasize that Brahman is unknowable, discouraging further inquiry into its nature.", "isCorrect": false, "rationale": "The Upanishads persist in asking 'What is Brahman?' demonstrating an active and persistent inquiry into its nature, not a dismissal of knowledge about it."}, {"text": "They provide a systematic theological framework that directly equates Brahman with a specific personal deity.", "isCorrect": false, "rationale": "The Upanishads are philosophical and explore Brahman as ultimate reality, emphasizing its ultimate transcendence beyond specific personal forms, even while acknowledging manifestations."}]}, {"question": "Arjuna's vision of Krishna's cosmic form (vishvarupa) in the Bhagavad Gita is described as both 'terrifying' and 'beautiful,' and 'utterly beyond human comprehension and somehow right there.' This passage primarily serves to illustrate which aspect of Brahman?", "options": [{"text": "The exclusive transcendence of Brahman nirguna, demonstrating its complete otherness.", "isCorrect": false, "rationale": "While terrifying and beyond comprehension, the vision occurs through Krishna (Saguna Brahman), and the description 'somehow right there' indicates immanence, contradicting exclusive transcendence."}, {"text": "The personal and approachable nature of Brahman saguna, making the divine relatable.", "isCorrect": false, "rationale": "While Krishna is Saguna Brahman, the *vishvarupa* vision transcends mere approachability; it reveals an overwhelming cosmic reality that goes far beyond a simple personal relationship, encompassing profound transcendence."}, {"text": "The simultaneous immanence and transcendence of Brahman, as it manifests in a relatable form while revealing its ultimate, incomprehensible reality.", "isCorrect": true, "rationale": "The passage describes the vishvarupa as 'both utterly beyond human comprehension and somehow right there, looking back at Arjuna with the face of his friend.' This perfectly illustrates the simultaneous transcendent (beyond comprehension) and immanent (right there, personal form) nature of Brahman."}, {"text": "The illusionary (maya) nature of all forms, including divine manifestations.", "isCorrect": false, "rationale": "While maya is mentioned in the text regarding the illusion of separation, the vision itself is presented as a profound revelation of ultimate reality, not as an illusion."}]}, {"question": "The phrase 'neti neti' (not this, not this) is associated with Brahman nirguna. How does this approach aid in understanding Brahman?", "options": [{"text": "It provides a direct, affirmative definition of Brahman's essential qualities.", "isCorrect": false, "rationale": "'Neti neti' is a negation, explicitly stating what Brahman is *not*, rather than an affirmation of its qualities."}, {"text": "It encourages understanding Brahman by negating all limited, descriptive qualities, pointing towards its utterly transcendent nature.", "isCorrect": true, "rationale": "The text states, 'Nirguna means 'without qualities' -- Brahman as the utterly transcendent, formless, attribute-less ground of being that cannot be described, only approached through negation (neti neti -- not this, 'not this').' This explains how negation points to its transcendent nature."}, {"text": "It suggests that Brahman can only be known through personal, emotional experiences with its various manifestations.", "isCorrect": false, "rationale": "This describes an approach more aligned with Saguna Brahman, which allows for personal encounter; 'neti neti' is for the formless Nirguna Brahman."}, {"text": "It serves as a mnemonic for remembering the many names and forms of Saguna Brahman.", "isCorrect": false, "rationale": "'Neti neti' is associated with Nirguna Brahman, which is explicitly described as formless and without name or personality, making it unsuitable for remembering names and forms."}]}, {"question": "The text mentions the Advaita, Vishishtadvaita, and Dvaita schools of Vedanta, highlighting their differing views on the identity of Brahman and Atman. This diversity primarily illustrates which broader point about Hinduism?", "options": [{"text": "That Hindu theology is a rigid, unified system with a single, agreed-upon dogma.", "isCorrect": false, "rationale": "The text explicitly states Hinduism is 'not a single, unified system but a vast family of traditions' and highlights the 'diversity of Hindu theology,' directly contradicting this option."}, {"text": "That the concept of Brahman is largely irrelevant to most Hindu philosophical discussions.", "isCorrect": false, "rationale": "Brahman is presented as 'the ultimate ground of all reality' holding 'a privileged place' in Hindu thought, making it central, not irrelevant, to philosophical discussions like those of the Vedanta schools."}, {"text": "That Hinduism, as a vast family of traditions, accommodates a wide range of interpretations regarding ultimate reality and its relationship to the self.", "isCorrect": true, "rationale": "The text states, 'The diversity of Hindu theology is, in part, a long argument about just how completely transcendence and immanence can be reconciled,' using these schools as examples of this ongoing discussion and breadth of interpretation."}, {"text": "That only one of these schools can be truly correct, indicating a fundamental flaw in Hindu thought.", "isCorrect": false, "rationale": "The text presents the schools as reflecting diversity and ongoing argument within the tradition, not as an indication of a fundamental flaw or the necessity for only one correct answer."}]}, {"question": "The Advaita school of Vedanta argues that the 'experience of separation' between Brahman and Atman is maya. What does the text clarify about the nature of maya in this context?", "options": [{"text": "Maya means that the physical world does not exist at all and is purely an illusion.", "isCorrect": false, "rationale": "The text explicitly clarifies, 'maya (illusion) -- not that the world does not exist, but that we misunderstand its ultimate nature,' directly contradicting this option."}, {"text": "Maya refers to the temporary, changing forms that Saguna Brahman adopts.", "isCorrect": false, "rationale": "While Saguna Brahman involves forms, maya in this context specifically refers to the illusion of *separation* between Atman and Brahman, rather than merely the forms of the divine."}, {"text": "Maya implies a misunderstanding of the ultimate nature of reality, rather than a denial of the world's existence.", "isCorrect": true, "rationale": "The text states, 'maya (illusion) -- not that the world does not exist, but that we misunderstand its ultimate nature.' This is a direct quote."}, {"text": "Maya is a benevolent divine force that creates the illusion of separation for human spiritual growth.", "isCorrect": false, "rationale": "The text defines maya as a misunderstanding of reality; it does not describe it as a benevolent divine force with a specific purpose for spiritual growth."}]}, {"question": "The word 'Upanishad' means 'sitting down near,' referring to the intimate transmission of wisdom. What does this etymology suggest about the method of seeking knowledge about Brahman within this tradition?", "options": [{"text": "Knowledge of Brahman is primarily acquired through solitary meditation and ascetic practices.", "isCorrect": false, "rationale": "While meditation may be a part of spiritual practice, the meaning 'sitting down near' emphasizes direct, intimate interaction with another person, not primarily solitary practice."}, {"text": "It emphasizes the importance of direct, personal instruction and dialogue with a teacher in the quest for ultimate truth.", "isCorrect": true, "rationale": "The 'Did You Know?' section explains 'sitting down near' suggests 'the intimate, face-to-face transmission of philosophical wisdom from teacher to student' and that teachers 'insisting that the student discover the truth through the process of questioning itself.' This clearly points to direct instruction and dialogue."}, {"text": "It indicates that understanding Brahman requires extensive formal schooling and academic study of ancient texts.", "isCorrect": false, "rationale": "While texts are involved, the emphasis is on intimate, direct transmission and personal discovery through dialogue, rather than just formal schooling or rote academic study."}, {"text": "It implies that Brahman reveals itself spontaneously to anyone, without the need for guidance or effort.", "isCorrect": false, "rationale": "The process of dialogue, questioning, and teacher-student interaction implied by 'sitting down near' suggests a structured, guided effort, not spontaneous revelation without guidance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
