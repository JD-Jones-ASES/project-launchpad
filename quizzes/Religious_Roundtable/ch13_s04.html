    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to the Jewish tradition as described in the text, what defines the nature of the Torah?", "options": [{"text": "It is solely a historical document whose meaning is fixed at the moment of revelation.", "isCorrect": false, "rationale": "The text states the Torah is a revelation given historically, but it is also 'interpreted across all subsequent time,' meaning its meaning is not solely fixed."}, {"text": "It is a timeless, eternal truth discovered through meditation, independent of human history.", "isCorrect": false, "rationale": "This description aligns with the Hindu view of scripture, not the Jewish view, which emphasizes a specific historical moment."}, {"text": "It is a revelation given historically, accompanied by its ongoing interpretation that is also divinely sourced.", "isCorrect": true, "rationale": "The text explains that the Torah is a 'revelation given at a specific historical moment' but also 'interpreted across all subsequent time,' with the Oral Torah 'itself given at Sinai,' indicating that text and interpretation arrive together."}, {"text": "It is a cultural memory imperfectly preserved by non-believers, requiring reconstruction.", "isCorrect": false, "rationale": "This description aligns with the Norse Pagan view of the Eddas, not the Jewish view of the Torah."}]}, {"question": "In Hinduism, how are the Vedas and Upanishads primarily characterized in terms of their origin and nature?", "options": [{"text": "As historical documents detailing specific divine interventions.", "isCorrect": false, "rationale": "The text states they 'were not composed at a particular historical moment' but received from a reality predating history."}, {"text": "As eternal truths 'heard' by seers from a reality predating history, akin to laws of nature.", "isCorrect": true, "rationale": "The text describes them as 'shruti -- 'heard' by seers in the timeless depths of meditation' and 'received from a reality that predates history,' comparing scripture to 'a law of nature'."}, {"text": "As sacred knowledge earned through intense suffering by deities.", "isCorrect": false, "rationale": "This description aligns with the Norse Pagan view of how Odin acquired the runes, not the Hindu view."}, {"text": "As human interpretations of divine revelations that evolve over generations.", "isCorrect": false, "rationale": "The text emphasizes that they were 'heard' from a reality that predates history, implying a direct reception of eternal truth, not human interpretation in the sense described."}]}, {"question": "What distinguishes the Eddas from the Torah and the Vedas, according to the text?", "options": [{"text": "The Eddas are considered eternally true laws of nature, unlike the other two.", "isCorrect": false, "rationale": "This characterization aligns with the Hindu view of the Vedas, not the Norse view of the Eddas."}, {"text": "The Eddas are revelations given at a specific historical moment and then continually interpreted.", "isCorrect": false, "rationale": "This description aligns with the Jewish view of the Torah, not the Norse view of the Eddas."}, {"text": "The Eddas are cultural heritage written down by non-believers, depicting sacred knowledge earned through suffering rather than freely given.", "isCorrect": true, "rationale": "The text explicitly states they 'were written down by Christians preserving a cultural heritage they no longer believed' and that 'Odin did not receive the runes as a gift. He paid for them... not freely given -- it must be earned through suffering.'"}, {"text": "The Eddas contain prophecies about future events that are periodically revealed.", "isCorrect": false, "rationale": "The text does not mention prophecies as a distinguishing feature of the Eddas."}]}, {"question": "How do the Jewish, Hindu, and Norse Pagan traditions, respectively, primarily describe the *acquisition* of their foundational sacred knowledge?", "options": [{"text": "Given as a divine gift; discovered through intuition; received through a historical chain of transmission.", "isCorrect": false, "rationale": "While Judaism's Torah is a gift, Hinduism's 'shruti' is 'heard' (received), not discovered through intuition in the human sense, and Norse knowledge is earned through suffering, not solely a historical transmission."}, {"text": "Revealed at a specific historical event; 'heard' in timeless meditation; earned through suffering.", "isCorrect": true, "rationale": "The text states the Torah was given 'at Sinai, to Moses,' the Vedas were 'heard' by seers 'in the timeless depths of meditation,' and Odin 'paid for' the runes 'with nine nights of agony,' indicating knowledge 'earned through suffering.'"}, {"text": "Interpreted by human scholars; spontaneously generated; passed down orally through generations.", "isCorrect": false, "rationale": "These descriptions do not accurately reflect the primary modes of acquisition for all three traditions as detailed in the text."}, {"text": "Found in ancient ruins; channeled through mediums; debated and codified by councils.", "isCorrect": false, "rationale": "These methods of acquisition are not described in the text for any of the traditions."}]}, {"question": "A scholar aims to critically examine the historical accuracy of the events described in a sacred text to assess its authority. Which tradition, based on the text's description, would consider such an inquiry most central to the text's validity?", "options": [{"text": "Hinduism, because the Vedas are viewed as eternal truths independent of historical context.", "isCorrect": false, "rationale": "The text explicitly states for Hinduism, 'historical questions are beside the point' regarding its eternal truth."}, {"text": "Norse Paganism, as the Eddas were preserved by non-believers, making historical accuracy paramount.", "isCorrect": false, "rationale": "While historical questions ('what did they actually preserve?') are relevant for Norse Paganism, the text indicates they are also 'hermeneutical' and it's a 'memory of a lost world,' making historical accuracy less solely determinative of authority than for Judaism."}, {"text": "Judaism, because the Torah is presented as a revelation given at a specific historical moment.", "isCorrect": true, "rationale": "The text states, 'If scripture is a historical document, then its authority depends partly on historical questions: Was Moses really at Sinai? Was the text preserved accurately?' This directly applies to Judaism's view of the Torah."}, {"text": "All three traditions equally, as all sacred texts are subject to historical verification.", "isCorrect": false, "rationale": "The text clearly differentiates the relevance of historical questions for each tradition's view of its sacred texts."}]}, {"question": "The text describes Jewish scripture as a 'river' and Hindu scripture as a 'law of nature.' What do these metaphors primarily convey about the respective traditions' views on the text's meaning and accessibility?", "options": [{"text": "The 'river' implies dynamic, ongoing interpretation, while 'law of nature' suggests inherent, discoverable truth independent of human engagement.", "isCorrect": true, "rationale": "The 'river' metaphor for Judaism ('flows through every generation') refers to the ongoing interpretation, while 'law of nature' for Hinduism ('always true, whether or not anyone has discovered it yet') points to its inherent and timeless existence."}, {"text": "The 'river' denotes a fixed, unchangeable source, while 'law of nature' indicates a text that constantly changes its form.", "isCorrect": false, "rationale": "This misinterprets both metaphors; the river implies flow and change in understanding, and a law of nature is constant, not changing in form."}, {"text": "Both metaphors emphasize the texts' obscure and inaccessible nature, requiring specialized priesthoods to understand.", "isCorrect": false, "rationale": "Neither metaphor in the text suggests obscurity or inaccessibility in this way."}, {"text": "The 'river' highlights the geographical origins, while 'law of nature' points to the texts' scientific accuracy.", "isCorrect": false, "rationale": "The text uses 'river' to describe the flow of interpretation, not geographical origin, and 'law of nature' for timeless truth, not scientific accuracy."}]}, {"question": "A group of archaeologists unearths evidence contradicting a specific historical event described in a sacred text. Based on the distinctions made in the section, which tradition's view of scripture would be least affected in terms of its core truth by such a discovery?", "options": [{"text": "Judaism, as the Torah's authority stems from its continuous interpretation.", "isCorrect": false, "rationale": "For Judaism, as a 'historical document,' its authority 'depends partly on historical questions,' so contradictory historical evidence would be highly relevant."}, {"text": "Norse Paganism, as the Eddas are already seen as a cultural memory rather than precise history.", "isCorrect": false, "rationale": "While a cultural memory, the text notes 'what did they actually preserve?' as a relevant historical question, so such a discovery would still be significant."}, {"text": "Hinduism, because the Vedas are considered eternal truths, with historical questions being 'beside the point.'", "isCorrect": true, "rationale": "The text states for Hinduism, 'If scripture is eternal truth received by seers, historical questions are beside the point -- the question is whether the seer truly heard,' implying historical accuracy is not central to its truth."}, {"text": "All traditions would be equally affected, as their legitimacy relies on the verifiable accuracy of all content.", "isCorrect": false, "rationale": "The text explicitly details how each tradition has different stakes regarding historical questions and the nature of their texts."}]}, {"question": "The text posits that the three traditions' varying views on sacred texts implicitly address a fundamental philosophical question. What is this question?", "options": [{"text": "How do humans create compelling narratives that inspire devotion?", "isCorrect": false, "rationale": "While narratives are part of sacred texts, this is not the fundamental philosophical question identified by the text."}, {"text": "What is the relationship between a text and the reality it points to?", "isCorrect": true, "rationale": "The text directly states, 'These three positions represent three answers to one of philosophy's deepest questions about language: What is the relationship between a text and the reality it points to?'"}, {"text": "Is it possible for ancient texts to accurately predict future events?", "isCorrect": false, "rationale": "The text does not focus on prediction as the core philosophical question being addressed."}, {"text": "To what extent can historical documents be considered reliable sources of information?", "isCorrect": false, "rationale": "This question is too narrow, primarily relevant to Judaism's view, and does not encompass the broader philosophical inquiry about the text-reality relationship for all three traditions."}]}, {"question": "If a modern practitioner of Norse Paganism sought to gain profound sacred knowledge, consistent with the tradition's description in the text, which approach would be most emphasized?", "options": [{"text": "Diligent study of historical records to reconstruct the original texts.", "isCorrect": false, "rationale": "While reconstruction of texts is mentioned, the emphasis for *gaining sacred knowledge* itself is on a different aspect."}, {"text": "Engaging in timeless meditation to 'hear' eternal truths from a reality predating history.", "isCorrect": false, "rationale": "This approach is described for Hinduism, not Norse Paganism."}, {"text": "Enduring personal hardship or making significant sacrifices to earn the knowledge.", "isCorrect": true, "rationale": "The text explicitly states that 'Odin did not receive the runes as a gift. He paid for them with nine nights of agony,' and 'Sacred knowledge, in the Norse telling, is not freely given -- it must be earned through suffering.'"}, {"text": "Receiving revelation directly from a divine figure as a freely given gift.", "isCorrect": false, "rationale": "The text directly contradicts this by stating 'Odin did not receive the runes as a gift' and knowledge is 'not freely given.'"}]}, {"question": "Which statement best summarizes the fundamental difference in how these three traditions view the *primary mode of acquisition* of sacred knowledge?", "options": [{"text": "Judaism emphasizes divine revelation, Hinduism emphasizes human discovery, and Norse Paganism emphasizes cultural preservation.", "isCorrect": false, "rationale": "Hinduism emphasizes 'reception' ('heard') of eternal truth, not human discovery in a creative sense, and Norse Paganism emphasizes 'earning through suffering' rather than just cultural preservation."}, {"text": "Judaism sees it as a historical gift, Hinduism as a timeless reception, and Norse Paganism as knowledge earned through personal sacrifice.", "isCorrect": true, "rationale": "The Torah is a 'revelation given at a specific historical moment,' Vedas are 'heard' by seers in 'timeless depths,' and Norse knowledge 'must be earned through suffering' (Odin's sacrifice)."}, {"text": "Judaism focuses on interpretation, Hinduism on transmission, and Norse Paganism on reconstruction.", "isCorrect": false, "rationale": "These are descriptions of what happens *with* the texts or knowledge *after* acquisition, rather than the primary mode of acquisition itself."}, {"text": "All three agree that sacred knowledge is freely given by benevolent deities through various means.", "isCorrect": false, "rationale": "This is incorrect, as Norse Paganism explicitly states that sacred knowledge 'is not freely given -- it must be earned through suffering.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
