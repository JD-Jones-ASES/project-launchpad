    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what is the most accurate understanding of the Hebrew word 'Torah' in a broader sense within Judaism?", "options": [{"text": "A strict legal code outlining only divine commands.", "isCorrect": false, "rationale": "The text explicitly states that Torah means 'instruction or teaching,' 'not law in the narrow legal sense,' indicating a broader scope than just legal commands."}, {"text": "The entire body of divine teaching given to Israel, encompassing instruction and teaching beyond mere law.", "isCorrect": true, "rationale": "The text defines 'Torah' in a broader sense as 'the entire body of divine teaching given to Israel,' clarifying that it means 'instruction or teaching,' not solely 'law' in a narrow legal sense."}, {"text": "The five books of Moses (Genesis through Deuteronomy).", "isCorrect": false, "rationale": "This describes the 'narrowest sense' of the Torah, not the broader understanding as requested by the question."}, {"text": "A collection of ancient Hebrew poetry and historical narratives.", "isCorrect": false, "rationale": "While the Torah contains poetry and history, this description is incomplete and does not capture its essence as 'instruction' or the 'entire body of divine teaching' as presented in the text."}]}, {"question": "The text describes the Torah as more than just a 'holy book' in the ordinary sense. Which statement best captures its multifaceted role for a devout Jew?", "options": [{"text": "It functions primarily as a historical record of ancient Israel's origins and battles.", "isCorrect": false, "rationale": "While the Torah includes history, the text presents it as far more, including constitution, law code, poetry, and a personal love story with God, making 'primarily as a historical record' an insufficient description."}, {"text": "It serves as Judaism's constitution, history, law code, poetry, and a personal love story with God, acting as a medium for divine speech.", "isCorrect": true, "rationale": "The text synthesizes these elements, stating the Torah is 'Judaism's constitution, history, law code, poetry, and love story with God all at once' and a 'medium through which God speaks personally to each reader.'"}, {"text": "It is a collection of theological essays designed to explain the universe's mechanics to scholars.", "isCorrect": false, "rationale": "The text states it 'tells you who God is, who you are, and how the universe works,' but characterizes reading it 'less like reading a legal code and more like listening to a parent explain the family's deepest story,' not as a collection of theological essays for scholars."}, {"text": "It is comparable to a legal textbook, providing strict guidelines for every aspect of life.", "isCorrect": false, "rationale": "The text explicitly contrasts this view, stating that 'reading Torah is less like reading a legal code and more like listening to a parent explain the family's deepest story.'"}]}, {"question": "What is the primary theological contribution of the Oral Torah, according to the rabbis, as described in the text?", "options": [{"text": "To introduce new divine commands that were not present in the Written Torah.", "isCorrect": false, "rationale": "The Oral Torah's purpose is described as providing an 'interpretive tradition' to apply the written words, not to add entirely new commands."}, {"text": "To preserve the ancient Hebrew language for future generations.", "isCorrect": false, "rationale": "While it contributes to cultural preservation, its primary theological function as described is interpretive, not linguistic preservation."}, {"text": "To provide an interpretive tradition that makes the written words applicable to every generation and situation.", "isCorrect": true, "rationale": "The text states the Oral Torah was 'the interpretive tradition that would make the written words applicable to every generation in every situation.'"}, {"text": "To replace the Written Torah with a more modern and accessible version.", "isCorrect": false, "rationale": "The Oral Torah complements and interprets the Written Torah; it does not replace it."}]}, {"question": "The doctrine of the Oral Torah has a striking implication regarding revelation and interpretation. What is this implication?", "options": [{"text": "Revelation is complete and static, requiring no further interpretation.", "isCorrect": false, "rationale": "The existence and continuous transmission of the Oral Torah directly contradict the idea of revelation being static or complete without interpretation."}, {"text": "The text is self-interpreting, and external interpretations dilute its original meaning.", "isCorrect": false, "rationale": "The text explicitly states, 'the text is not self-interpreting,' making this option incorrect."}, {"text": "Interpretation is not a threat to revelation but rather an integral part of revelation itself.", "isCorrect": true, "rationale": "The text clearly states this profound implication: 'Interpretation is not a threat to revelation — it is part of revelation.'"}, {"text": "Only a select group of authorized scholars can interpret the sacred texts.", "isCorrect": false, "rationale": "While rabbis were central to its transmission, the core implication is about the *nature* of interpretation as revelation, not solely about who performs it."}]}, {"question": "The practice of 'lectio continua' is described as central to Jewish communal life. What is its main effect?", "options": [{"text": "It ensures that only a designated few are familiar with the entire Torah.", "isCorrect": false, "rationale": "As a 'public' reading, *lectio continua* ensures widespread familiarity, not restricted knowledge."}, {"text": "It keeps the Torah text at the living center of Jewish communal life by ensuring its continuous public reading and re-engagement.", "isCorrect": true, "rationale": "The text states that *lectio continua* 'has kept the text at the living center of Jewish communal life for more than two thousand years,' emphasizing its role in continuous engagement."}, {"text": "It restricts the study of Torah to only the yearly festival of Simchat Torah.", "isCorrect": false, "rationale": "Simchat Torah is the *end* of the annual cycle, marking its completion and immediate restart, not the sole time of study."}, {"text": "It serves primarily as a historical reenactment of ancient synagogue practices.", "isCorrect": false, "rationale": "While it is an ancient practice, its main effect is described as keeping the text *living* and central in contemporary communal life, not merely as a reenactment."}]}, {"question": "How does the Jewish tradition primarily characterize the relationship between Israel and the Torah, as described in the text?", "options": [{"text": "As a purely academic pursuit of knowledge and wisdom.", "isCorrect": false, "rationale": "The text explicitly states the relationship is 'not merely intellectual, it is devotional and even romantic.'"}, {"text": "As a legal contract outlining duties and obligations.", "isCorrect": false, "rationale": "The text contrasts this, explaining that reading Torah is 'less like reading a legal code and more like listening to a parent explain the family's deepest story.'"}, {"text": "As a devotional and romantic bond, often compared to a marriage, where God speaks personally through the text.", "isCorrect": true, "rationale": "The text highlights this, noting it is 'devotional and even romantic,' that 'rabbis later compared the relationship between Israel and the Torah to a marriage,' and that God 'speaks personally to each reader' through it."}, {"text": "As a historical record to be studied for genealogical purposes.", "isCorrect": false, "rationale": "This is too narrow and misses the profound devotional and personal connection described in the text."}]}, {"question": "What does Psalm 119, the longest chapter in the Bible, primarily emphasize about the Torah?", "options": [{"text": "The historical accuracy of its narratives.", "isCorrect": false, "rationale": "The text states Psalm 119 is a 'meditation on the goodness of Torah' and calls it 'a lamp, a light, a treasure, a delight, a counselor, a comfort in affliction,' not primarily focusing on historical accuracy."}, {"text": "The complexity of its legal statutes.", "isCorrect": false, "rationale": "The Psalm's emphasis, as described, is on the positive, comforting, and enlightening qualities of Torah, not its complexity."}, {"text": "The goodness, beauty, necessity, and the deep personal delight and comfort it provides.", "isCorrect": true, "rationale": "The text highlights Psalm 119's focus as a 'meditation on the goodness of Torah,' and how the psalmist calls it 'a lamp, a light, a treasure, a delight, a counselor, a comfort in affliction,' indicating its deep personal and positive impact."}, {"text": "The strict obedience required from its followers.", "isCorrect": false, "rationale": "While obedience is an aspect of Torah, Psalm 119, as described, centers on the *qualities* of the Torah itself and the psalmist's profound love and appreciation for it."}]}, {"question": "How does the annual cycle of 'lectio continua' conclude and immediately restart, symbolizing the Jewish relationship with the Torah?", "options": [{"text": "It ends with a period of silent contemplation, and then a new sacred text is chosen for the following year.", "isCorrect": false, "rationale": "The text specifies the continuation of the *same* Torah, not a new sacred text."}, {"text": "It concludes on Simchat Torah by reading the last words of Deuteronomy and immediately rolling the scroll back to the first words of Genesis.", "isCorrect": true, "rationale": "The text explicitly states: 'The annual cycle ends on the festival of Simchat Torah... when the last words of Deuteronomy are read and the scroll is immediately rolled back to the first words of Genesis.'"}, {"text": "It culminates in a debate among rabbis about the past year's interpretations, followed by a communal feast.", "isCorrect": false, "rationale": "While celebrations may occur, the described conclusion and restart mechanism is specific to the reading of the scroll itself, not a debate."}, {"text": "It transitions to the study of the Talmud for the remainder of the year before restarting the Written Torah.", "isCorrect": false, "rationale": "The text states 'The reading begins again' immediately after concluding Deuteronomy, emphasizing the continuous cycle of Torah reading."}]}, {"question": "The text states that 'Torah' means 'instruction or teaching,' 'not law in the narrow legal sense.' How does this distinction impact understanding its function?", "options": [{"text": "It implies that Torah provides general moral guidance but does not include any specific legal commands.", "isCorrect": false, "rationale": "The Torah *does* include law codes, but its function is broader than just those commands; it's not devoid of specific legal guidance."}, {"text": "It suggests that Torah offers a comprehensive understanding of God, humanity, and the universe, guiding life through narrative and principles rather than just strict rules.", "isCorrect": true, "rationale": "This option reflects the text's explanation: 'Torah does not simply tell you what God commands; it tells you who God is, who you are, and how the universe works,' likening it to a parent explaining a family's deepest story rather than a legal code."}, {"text": "It indicates that the legal aspects of Judaism are found exclusively in the Oral Torah, separate from the Written Torah.", "isCorrect": false, "rationale": "The Written Torah (the five books of Moses) itself contains numerous laws. The Oral Torah interprets and expands on these, rather than being the sole source of legal aspects."}, {"text": "It means the Torah is primarily a book of poetry and metaphorical stories, with no direct relevance to daily conduct.", "isCorrect": false, "rationale": "The text states the Torah is 'Judaism's constitution, history, law code, poetry, and love story,' indicating its relevance to daily conduct and law, not just poetry and metaphors."}]}, {"question": "Based on the descriptions in the text, what best characterizes the overall Jewish attitude and relationship towards the Torah?", "options": [{"text": "A detached, academic reverence for an ancient historical document.", "isCorrect": false, "rationale": "The text explicitly counters this, stating the relationship is 'not merely intellectual, it is devotional and even romantic.'"}, {"text": "A fearful adherence to strict divine commandments, focused on avoiding transgression.", "isCorrect": false, "rationale": "While adherence to commandments is present, the text emphasizes love, delight, comfort, and a 'love story with God,' indicating a deeper, more positive emotional connection than mere fear."}, {"text": "A deep, loving, and devotional engagement with a living, personal instruction that continuously speaks to and shapes the community.", "isCorrect": true, "rationale": "This option synthesizes the descriptions of the Torah as 'beloved,' 'devotional and even romantic,' a 'love story with God,' a 'medium through which God speaks personally,' and continuously re-engaged with 'new eyes, new questions, and new life to words that have never stopped speaking.'"}, {"text": "A practical reliance on the Torah solely for guidance on rituals and ceremonies.", "isCorrect": false, "rationale": "This is too narrow; the text indicates the Torah's role in understanding 'who God is, who you are, and how the universe works,' which extends far beyond just rituals and ceremonies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
