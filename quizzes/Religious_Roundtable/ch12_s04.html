    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 12, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental way Confucianism defines the human person?", "options": [{"text": "Through their individual spiritual journey, aiming for transcendence.", "isCorrect": false, "rationale": "Confucianism does not primarily define the human person through an individual spiritual journey or transcendence; it focuses on societal relationships and practical ethics."}, {"text": "Through their interconnectedness within societal relationships, practicing 'ren'.", "isCorrect": true, "rationale": "The text explicitly states that Confucianism defines the human person 'through relationships' and that 'Our humanity -- ren -- is not a private possession but a practice, realized or failed in the way we actually treat the people around us.'"}, {"text": "Through their inherent capacity for free, conscious, and creative production.", "isCorrect": false, "rationale": "This definition of the human person is central to Communism, not Confucianism, which focuses on relational virtues rather than production."}, {"text": "Through their fated existence as material creatures in a cosmic order.", "isCorrect": false, "rationale": "This definition aligns with Norse Paganism, which emphasizes origin and fate, rather than the relational focus of Confucianism."}], "id": "q01"}, {"question": "According to Communism, what is the primary source of human problems?", "options": [{"text": "The inescapable difficulties of existence in a chaotic cosmos.", "isCorrect": false, "rationale": "This aligns with Norse Paganism's diagnosis of the problem, which sees difficulty embedded in the cosmic order, not Communism's focus on economic systems."}, {"text": "A failure to cultivate personal virtues and maintain harmonious relationships.", "isCorrect": false, "rationale": "This is the problem as identified by Confucianism, which emphasizes cultivation of virtues in relationships, not the economic focus of Communism."}, {"text": "An economic system, specifically Capitalism, that alienates individuals from their labor and each other.", "isCorrect": true, "rationale": "The text states that for Communism, 'The problem is not in the soul or in the failure of virtue -- it is in the economic system. Capitalism alienates workers from the products of their labor, from the act of laboring, from their species-being, and from each other.'"}, {"text": "The lack of guidance from wise teachers and ritual practices.", "isCorrect": false, "rationale": "This refers to the solution proposed by Confucianism for its identified problem of failed cultivation, not the problem itself according to Communism."}], "id": "q02"}, {"question": "If an individual were to adopt the Norse Pagan worldview, what would be their primary focus in addressing life's challenges?", "options": [{"text": "Seeking inward transformation to achieve spiritual transcendence.", "isCorrect": false, "rationale": "Norse Paganism views humans as 'earthly beings' and explicitly states they are 'not primarily spiritual beings aiming for transcendence.'"}, {"text": "Organizing a revolution to dismantle oppressive economic systems.", "isCorrect": false, "rationale": "This is the solution proposed by Communism, which focuses on changing human arrangements, not the cosmic fatalism of Norse Paganism."}, {"text": "Developing virtues through education, self-reflection, and ritual practice.", "isCorrect": false, "rationale": "This is the solution offered by Confucianism to address its problem of failed cultivation, not the approach of Norse Paganism."}, {"text": "Facing inherent difficulties and fate with courage, striving to leave behind deeds worth remembering.", "isCorrect": true, "rationale": "The text states that for Norse Paganism, 'The solution is not escape or revolution; it is living in such a way that you leave behind deeds worth remembering' and to 'face our fated lives with courage and character.'"}], "id": "q03"}, {"question": "The text highlights a key contrast between Norse Paganism and Communism regarding the source of human suffering. Where do they primarily locate the problem, respectively?", "options": [{"text": "In the individual's lack of moral cultivation versus the individual's ego.", "isCorrect": false, "rationale": "This option misrepresents both traditions. Confucianism focuses on cultivation, while neither Norse Paganism nor Communism primarily attributes suffering to 'ego' in the way implied."}, {"text": "In the cosmic order itself versus a specific, changeable human arrangement.", "isCorrect": true, "rationale": "The text explicitly contrasts them: 'For Norse tradition, the problem is embedded in the cosmic order itself... For Communism, the problem is in a specific, changeable human arrangement: the capitalist economic system.'"}, {"text": "In an individual's fated life versus their spiritual detachment from society.", "isCorrect": false, "rationale": "While Norse Paganism emphasizes fate, Communism focuses on economic alienation, not spiritual detachment, as the problem. The contrast is more fundamental regarding the nature of the problem's source."}, {"text": "In a failure of education versus a failure of ritual practice.", "isCorrect": false, "rationale": "These are aspects of the Confucian solution, not the primary differing problem locations for Norse Paganism and Communism."}], "id": "q04"}, {"question": "A community leader observes increasing discord and a decline in ethical behavior among citizens. If they were to apply a Confucian solution, what action would they most likely prioritize?", "options": [{"text": "Establishing a new economic system to eliminate social inequalities.", "isCorrect": false, "rationale": "This is a Communist solution, focusing on systemic economic change, which is not the primary approach of Confucianism for discord and ethical decline."}, {"text": "Encouraging individual citizens to bravely confront their predetermined destinies.", "isCorrect": false, "rationale": "This reflects a Norse Pagan approach, emphasizing courage in the face of fate, which is unrelated to Confucianism's focus on relational ethics."}, {"text": "Implementing educational programs focusing on virtue cultivation and relational responsibilities.", "isCorrect": true, "rationale": "Confucianism identifies the problem as a 'failure of cultivation' and the solution as 'education, self-reflection, ritual practice, and the guidance of wise teachers' to become a better person 'in relation to others.'"}, {"text": "Promoting spiritual retreats for personal transcendence and detachment from worldly problems.", "isCorrect": false, "rationale": "This solution emphasizes transcendence and detachment, which are not central to Confucianism's pragmatic, relationship-oriented approach to human flourishing."}], "id": "q05"}, {"question": "Norse Paganism views human beings primarily as:", "options": [{"text": "Spiritual entities striving for transcendence and divine union.", "isCorrect": false, "rationale": "The text explicitly states that for Norse Paganism, 'We are not primarily spiritual beings aiming for transcendence; we are earthly beings.'"}, {"text": "Material creatures embedded in a web of fate, called to face fated lives.", "isCorrect": true, "rationale": "The text states: 'We are material creatures -- trees given breath, sense, and warmth by three gods -- embedded from birth in a web of fate woven by the Norns. We are not primarily spiritual beings aiming for transcendence; we are earthly beings called to face our fated lives with courage and character.'"}, {"text": "Isolated individuals who voluntarily enter into societal contracts.", "isCorrect": false, "rationale": "This contradicts Confucianism's view (humans are *not* isolated individuals) and doesn't align with Norse Paganism's emphasis on inherent fate."}, {"text": "Beings defined by their capacity for free, conscious, and creative production.", "isCorrect": false, "rationale": "This is the definition of the human person according to Communism, not Norse Paganism."}], "id": "q06"}, {"question": "The text describes Confucianism as occupying an 'interesting middle position.' What characteristic best defines this position relative to Norse Paganism and Communism?", "options": [{"text": "It combines elements of cosmic fate and economic revolution in its solution.", "isCorrect": false, "rationale": "Confucianism does not incorporate cosmic fate or economic revolution into its solutions; it distinctly avoids these focuses."}, {"text": "It primarily focuses on individual spiritual growth, distinct from both cosmic and social issues.", "isCorrect": false, "rationale": "While Confucianism involves self-reflection, its focus is on cultivation within relationships and society, not individual spiritual growth detached from social issues."}, {"text": "It emphasizes personal cultivation within relationships, distinct from cosmic determinism or economic systems.", "isCorrect": true, "rationale": "The text states: 'Confucianism occupies an interesting middle position: it focuses on relationships and cultivation rather than cosmic fate or economic structure. ...the solution is therefore neither courage-in-the-face-of-doom nor political revolution but the patient, disciplined work of becoming a better person in relation to others.'"}, {"text": "It rejects the idea of a 'problem' entirely, seeing human life as inherently good and unchangeable.", "isCorrect": false, "rationale": "Confucianism clearly identifies a problem: 'a failure of cultivation,' and proposes a solution, indicating it does not see life as unchangeable or without problems."}], "id": "q07"}, {"question": "Which tradition is *most* concerned with how external societal structures, rather than internal moral failings or cosmic inevitabilities, determine human well-being?", "options": [{"text": "Confucianism", "isCorrect": false, "rationale": "Confucianism focuses on internal cultivation and relational ethics, seeing the problem as a 'failure of cultivation' rather than external societal structures."}, {"text": "Norse Paganism", "isCorrect": false, "rationale": "Norse Paganism attributes problems to 'the cosmic order itself' and 'fate,' which are cosmic inevitabilities, not changeable societal structures."}, {"text": "Communism", "isCorrect": true, "rationale": "The text states that for Communism, 'The problem is not in the soul or in the failure of virtue -- it is in the economic system' and calls for 'the transformation of the economic structures that produce alienation.'"}, {"text": "All of the above; all focus on external structures to an equal degree.", "isCorrect": false, "rationale": "The text clearly distinguishes between these traditions based on where they locate the problem, indicating they do not all focus on external structures to an equal degree."}], "id": "q08"}, {"question": "In the context of Communism, 'alienation' refers to the separation of workers from all of the following EXCEPT:", "options": [{"text": "The products of their labor.", "isCorrect": false, "rationale": "The text explicitly lists this: 'Capitalism alienates workers from the products of their labor.'"}, {"text": "The act of laboring itself.", "isCorrect": false, "rationale": "The text explicitly lists this: 'Capitalism alienates workers from... the act of laboring.'"}, {"text": "Their species-being.", "isCorrect": false, "rationale": "The text explicitly lists this: 'Capitalism alienates workers from... their species-being.'"}, {"text": "Their innate spiritual essence.", "isCorrect": true, "rationale": "The text states, 'The problem is not in the soul or in the failure of virtue,' and focuses on material and economic aspects of alienation, not separation from an 'innate spiritual essence,' which is not a concept central to Communism's critique."}], "id": "q09"}, {"question": "The text states that Norse tradition and Communism have 'opposite' responses to the difficulty of human existence. This opposition primarily stems from their differing views on:", "options": [{"text": "The importance of education as a means of societal improvement.", "isCorrect": false, "rationale": "Education is a key component of Confucianism's solution, but it is not the primary point of opposition between Norse Paganism and Communism, which focus on different fundamental problems and solutions."}, {"text": "The role of divine intervention in human affairs.", "isCorrect": false, "rationale": "While Norse Paganism has gods, the core opposition highlighted is not about divine intervention but about the nature of the problem and the corresponding human response."}, {"text": "Whether the problem is fixed and cosmic or changeable and societal.", "isCorrect": true, "rationale": "The text states: 'For Norse tradition, the problem is embedded in the cosmic order itself... For Communism, the problem is in a specific, changeable human arrangement... And because the diagnoses differ, the responses are opposite: Norse tradition calls for courage in the face of what cannot be changed; Communism calls for revolution to change precisely what seems most fixed.'"}, {"text": "The value of individual courage in overcoming personal challenges.", "isCorrect": false, "rationale": "While both might value courage in some form, the *opposite* nature of their responses comes from whether courage is used to face an unchangeable fate (Norse) or to instigate revolutionary change (Communism)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
