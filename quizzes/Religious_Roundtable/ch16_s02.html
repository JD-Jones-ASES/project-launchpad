<script>
var QUESTIONS = [{"question": "Which statement best summarizes the unique perspective of Norse Paganism on suffering, as presented in the text?", "options": [{"text": "Suffering is a temporary illusion that can be overcome through spiritual practice.", "isCorrect": false, "rationale": "The text explicitly states that Norse Paganism does not offer escape from suffering like Buddhism, nor does it view suffering as an illusion."}, {"text": "Suffering is a fundamental part of existence, even for the gods, and the appropriate response is courage rather than escape.", "isCorrect": true, "rationale": "The text clearly states, 'suffering is woven into the structure of reality, including for the gods -- and the right response is not escape but courage.' This is the core unique insight presented."}, {"text": "Suffering is primarily a result of economic exploitation, requiring societal revolution.", "isCorrect": false, "rationale": "This view is attributed to Communism in the text, not Norse Paganism."}, {"text": "Suffering is a punishment for moral transgressions, redeemable through divine intervention.", "isCorrect": false, "rationale": "The text does not present suffering as a punishment in the Norse worldview; rather, it is described as 'the price of a life lived fully' and inherent to reality."}], "id": "q01"}, {"question": "According to the text, what distinguishes Ragnarök from a simple catastrophe?", "options": [{"text": "It is a battle where the gods ultimately triumph over their enemies.", "isCorrect": false, "rationale": "The text states that the gods 'will die' and 'will not survive to see' the new world, indicating they do not triumph in the conventional sense."}, {"text": "It signifies the end of the old world and the subsequent birth of a new one.", "isCorrect": true, "rationale": "The text defines Ragnarök as 'not simply catastrophe. It is the death of the old world and the birth of a new one.'"}, {"text": "It is a test of faith for humanity, determining who will ascend to Valhalla.", "isCorrect": false, "rationale": "While Valhalla is mentioned in relation to Ragnarök, the text doesn't describe Ragnarök itself as a test of faith for humanity, but rather a cosmic event involving the gods and the world's destruction and rebirth."}, {"text": "It represents an opportunity for the gods to escape their own suffering.", "isCorrect": false, "rationale": "The text explicitly states that 'the gods now living will not survive to see it,' meaning they do not escape suffering; they face their predestined end."}], "id": "q02"}, {"question": "How does the concept of 'wyrd' function in the Norse worldview regarding personal agency?", "options": [{"text": "Wyrd is an entirely fixed destiny, meaning individuals have no control over their future.", "isCorrect": false, "rationale": "The text explicitly states, 'your wyrd is not entirely fixed.'"}, {"text": "Individuals can completely escape their wyrd through powerful magical rituals or divine intervention.", "isCorrect": false, "rationale": "The text clearly states, 'You cannot escape your wyrd.'"}, {"text": "Wyrd represents a cosmic pattern shaped by past actions, and while inescapable, individuals choose how to confront it.", "isCorrect": true, "rationale": "The text explains, 'your wyrd is not entirely fixed -- it is the accumulated weight of what has been, shaping what can be. You cannot escape your wyrd; you can only choose how to face it.'"}, {"text": "Wyrd is a personal journey of self-discovery, entirely free from external influences.", "isCorrect": false, "rationale": "Wyrd is described as a 'cosmic pattern woven by the Norns' and the 'accumulated weight of what has been,' indicating external and past influences, not entirely free self-discovery."}], "id": "q03"}, {"question": "Based on the Hávamál passage, what is the most significant aspect of human existence that endures beyond death in Norse Paganism?", "options": [{"text": "Material wealth and property accumulated during one's lifetime.", "isCorrect": false, "rationale": "The Hávamál passage explicitly states, 'Cattle die,' indicating that material possessions do not endure."}, {"text": "One's direct descendants and familial lineage.", "isCorrect": false, "rationale": "The passage says, 'kinsmen die,' implying that direct lineage does not endure eternally in the sense of 'fame.'"}, {"text": "The memory of one's genuine virtue, courage, generosity, loyalty, and honesty.", "isCorrect": true, "rationale": "The text clarifies, 'Fame, here, does not mean celebrity. It means the memory of genuine virtue -- the remembrance, by those who knew you, that you were brave, generous, loyal, and honest.'"}, {"text": "A tranquil afterlife in a realm free from suffering.", "isCorrect": false, "rationale": "The Hávamál focuses on earthly remembrance, and the text explicitly states Norse Paganism does not promise nirvana or heaven in the way other traditions do. Valhalla itself is not a tranquil rest."}], "id": "q04"}, {"question": "The text contrasts Norse Paganism's response to suffering with that of Buddhism and Communism. What is the fundamental difference in approach?", "options": [{"text": "Norse Paganism seeks to eliminate suffering, while Buddhism and Communism seek to understand it.", "isCorrect": false, "rationale": "The text states Norse Paganism does *not* seek to eliminate suffering. It's Buddhism that aims to eliminate suffering by extinguishing craving, and Communism by overthrowing exploitation."}, {"text": "Norse Paganism accepts suffering as inherent to reality and advocates for courage, while Buddhism seeks escape and Communism seeks transformation of the system.", "isCorrect": true, "rationale": "The text states Norse Paganism's response is 'not escape but courage,' while Buddhism aims for 'liberation (escaping the cycle)' and Marxism aims for 'revolution (changing the system).'"}, {"text": "Norse Paganism focuses on collective action, whereas Buddhism and Communism emphasize individual spiritual journeys.", "isCorrect": false, "rationale": "This is incorrect. Norse Paganism, as described, focuses on individual courage and deeds, while Communism is inherently about collective action."}, {"text": "Norse Paganism offers a guaranteed afterlife free from suffering, unlike the other traditions.", "isCorrect": false, "rationale": "The text explicitly states Norse Paganism 'does not promise nirvana, or heaven, or a classless society' and even Valhalla is a place of preparation for a 'doomed stand,' not rest."}], "id": "q05"}, {"question": "What is the primary function of Valhalla, according to the 'DID YOU KNOW?' section?", "options": [{"text": "To provide a peaceful eternal rest for valiant warriors.", "isCorrect": false, "rationale": "The text explicitly states Valhalla is 'often misunderstood as a simple 'heaven for warriors'' and that warriors 'are not rewarded with rest.'"}, {"text": "To serve as a training ground for warriors to prepare for the final battle of Ragnarök.", "isCorrect": true, "rationale": "The text clarifies, 'the warriors of Valhalla feast and fight every day in preparation for Ragnarök, when they will fight alongside Odin in the final battle.'"}, {"text": "To judge the moral character of deceased warriors and assign them to various afterlives.", "isCorrect": false, "rationale": "The text does not describe Valhalla as a place of judgment, but rather preparation for battle."}, {"text": "To offer a means for warriors to escape their 'wyrd' and achieve true liberation.", "isCorrect": false, "rationale": "The text states Valhalla warriors are 'being prepared for a last, doomed stand,' indicating acceptance of fate rather than escape."}], "id": "q06"}, {"question": "The text describes Odin's suffering, including giving an eye for wisdom and hanging on Yggdrasil. What does this illustrate about suffering in the Norse worldview?", "options": [{"text": "Suffering is a consequence of divine error or misjudgment.", "isCorrect": false, "rationale": "The text does not frame Odin's suffering as a result of error, but as intentional acts to gain wisdom and power, and part of the cosmic design."}, {"text": "Suffering is an optional experience, which even gods can avoid if they are powerful enough.", "isCorrect": false, "rationale": "The text emphasizes that suffering is 'woven into the structure of reality' and that 'the gods themselves age slowly' and 'suffer loss,' implying it is not optional even for them."}, {"text": "Suffering is a sign that something has gone wrong in the cosmic order.", "isCorrect": false, "rationale": "The text explicitly states, 'Suffering, in the Norse worldview, is not a sign that something has gone wrong. It is the price of a life lived fully.'"}, {"text": "Suffering is an inherent part of existence and can be a price for achieving wisdom or living a full life.", "isCorrect": true, "rationale": "Odin's sacrifices are for wisdom, and the text concludes, 'Suffering... is the price of a life lived fully,' directly aligning with this option."}], "id": "q07"}, {"question": "What kind of 'liberation' does Norse Paganism offer from suffering, considering its unique worldview?", "options": [{"text": "Total eradication of suffering through spiritual enlightenment, similar to nirvana.", "isCorrect": false, "rationale": "The text explicitly states Norse Paganism 'does not promise nirvana' or 'liberation in the way Buddhism or Christianity or Communism does.'"}, {"text": "A classless society free from economic exploitation and its associated hardships.", "isCorrect": false, "rationale": "This promise is attributed to Communism, not Norse Paganism, in the text."}, {"text": "The ability to face one's inescapable fate with courage and live a life remembered for virtue.", "isCorrect": true, "rationale": "The text offers 'the possibility of meeting your fate with your head up, your courage intact, and a life behind you worth remembering.' It's 'the only thing that belongs entirely to you.'"}, {"text": "A guaranteed ascent to a tranquil heaven after death, where all earthly suffering is forgotten.", "isCorrect": false, "rationale": "The text states it 'does not promise... heaven,' and even Valhalla is a place of continued struggle, not tranquil rest."}], "id": "q08"}, {"question": "An individual in a modern context, facing a significant and unavoidable personal loss, seeks guidance from a Norse Pagan perspective. Based on the text, what advice would be most consistent with this tradition?", "options": [{"text": "Focus on spiritual practices to detach from the material world and transcend the feeling of loss.", "isCorrect": false, "rationale": "This aligns more with the Buddhist perspective of 'escaping the cycle' or extinguishing craving, which the text contrasts with Norse Paganism."}, {"text": "Accept the loss as an inherent part of life, and strive to respond with dignity and ensure your actions leave a memorable, virtuous legacy.", "isCorrect": true, "rationale": "The text emphasizes 'acceptance with dignity' of one's wyrd and the importance of 'the quality of your life and the character of your deeds matter absolutely' in the face of universal mortality."}, {"text": "Seek to identify and overthrow the systemic injustices that contributed to the personal loss.", "isCorrect": false, "rationale": "This approach is more aligned with the Communist perspective of 'overthrowing exploitation,' as described in the text, rather than Norse Paganism's focus on individual response to inherent suffering."}, {"text": "Believe that the loss is a temporary trial and that divine intervention will ultimately restore what was lost.", "isCorrect": false, "rationale": "The Norse worldview, as presented, is characterized by 'profound realism' about suffering and inevitable defeat (Ragnarök), not a promise of divine restoration."}], "id": "q09"}, {"question": "The Hávamál is described as 'unusual among sacred texts.' What quality makes it unusual?", "options": [{"text": "Its focus on theological dogma and abstract philosophical concepts.", "isCorrect": false, "rationale": "The text describes it as having 'frankly practical wisdom,' which is the opposite of abstract dogma."}, {"text": "Its frank and practical wisdom regarding everyday life and mortality.", "isCorrect": true, "rationale": "The text states the Hávamál 'is unusual among sacred texts in its frankly practical wisdom. It discusses hospitality, friendship, the uses of knowledge, how to behave as a guest, and how to think about death.'"}, {"text": "Its detailed historical accounts of the Norse gods and their interactions.", "isCorrect": false, "rationale": "While it attributes verses to Odin, the text highlights its practical wisdom, not historical accounts."}, {"text": "Its promise of eternal happiness and liberation from all earthly concerns.", "isCorrect": false, "rationale": "The Hávamál's passage on mortality is described as 'simultaneously beautiful and hard' and its message is about accepting death, not escaping earthly concerns for eternal happiness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
