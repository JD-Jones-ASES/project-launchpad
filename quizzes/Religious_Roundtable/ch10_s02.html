        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the foundational starting point of Jewish faith?", "options": [{"text": "A set of definitive propositions about God's nature.", "isCorrect": false, "rationale": "The text explicitly states, 'Jewish faith does not begin with a definition. It is not first a proposition to be believed.'"}, {"text": "An encounter with God as a presence and a partner in a covenant.", "isCorrect": true, "rationale": "The text states, 'God is a presence to be encountered, a name to be called upon, a partner in a covenant that has been unfolding for thousands of years.'"}, {"text": "A detailed theological explanation of God's name, 'Ehyeh asher ehyeh'.", "isCorrect": false, "rationale": "While God's name is mentioned, the text emphasizes it's 'famously difficult to translate' and that God is a presence to be encountered, not primarily a definition or explanation of the name itself."}, {"text": "A completed transactional agreement between God and humanity.", "isCorrect": false, "rationale": "The text distinguishes a covenant as relational and ongoing, not a transactional agreement that is completed."}]}, {"question": "What is the primary distinction the text makes between a 'covenant' and a 'contract'?", "options": [{"text": "A contract involves mutual obligations, while a covenant does not.", "isCorrect": false, "rationale": "The text states that both involve mutual obligations, making this distinction incorrect."}, {"text": "A covenant is transactional and concludes upon completion, whereas a contract is relational.", "isCorrect": false, "rationale": "This reverses the definitions provided. The text states a contract is transactional and a covenant is relational."}, {"text": "A contract is transactional and concludes upon completion, while a covenant is relational and persists through time.", "isCorrect": true, "rationale": "The text clearly defines: 'A contract is transactional... when the transaction is complete, we are done. A covenant is relational: it creates a bond between persons that persists through time, through failure, through repair.'"}, {"text": "A covenant is only between God and a people, while a contract can be between any two parties.", "isCorrect": false, "rationale": "While the specific context is the covenant between God and Israel, the definition of 'covenant' itself focuses on its relational and enduring nature, not exclusively its parties compared to a contract."}]}, {"question": "The covenant at Sinai is described as doing more than just giving Israel a law. What additional profound effect did it have?", "options": [{"text": "It established a hierarchical religious leadership structure for all future generations.", "isCorrect": false, "rationale": "The text does not mention the establishment of a hierarchical religious leadership structure in connection with the covenant at Sinai; it focuses on the creation of a collective identity."}, {"text": "It made Israel into 'am Yisrael', a distinct people unified by their relationship with God.", "isCorrect": true, "rationale": "The text explicitly states, 'The covenant at Sinai did not merely give Israel a law; it made Israel a people -- am Yisrael, the people of Israel.'"}, {"text": "It provided a universal creed for all humanity to adopt and believe.", "isCorrect": false, "rationale": "The text contrasts Judaism's focus with a 'creed in the Christian sense,' indicating it is not primarily about a universal creed, but a particular relationship."}, {"text": "It completed God's revelation, meaning no further divine instruction was needed.", "isCorrect": false, "rationale": "The text explicitly states that 'Revelation did not end with Moses. It continues in every generation...'"}]}, {"question": "Which statement best characterizes the Shema, according to the provided text?", "options": [{"text": "It is a detailed list of doctrines that observant Jews must accept to be considered faithful.", "isCorrect": false, "rationale": "The text states, 'It is not a creed in the Christian sense. It does not list doctrines to be accepted.'"}, {"text": "It is an ancient historical account of God's deeds in the land of Israel.", "isCorrect": false, "rationale": "While Judaism values history, the Shema (Deuteronomy 6:4-9) is presented as a declaration of unity and relationship, not primarily a historical account."}, {"text": "It is a declaration of relationship with a single God and a call to love that God completely.", "isCorrect": true, "rationale": "The text describes it as 'a declaration of relationship: this God is our God; this God is one; and in response, we are to love this God with everything we have.'"}, {"text": "It is a prayer recited only once in a Jew's lifetime, specifically before death.", "isCorrect": false, "rationale": "The text notes it is 'recited by observant Jews twice daily, upon waking and before sleeping,' in addition to being a final prayer."}]}, {"question": "The instructions following the Shema (e.g., teaching children, talking about words, binding them on hand, writing on doorposts) most strongly illustrate which key feature of Jewish thought?", "options": [{"text": "The importance of abstract theological debate over practical application.", "isCorrect": false, "rationale": "These instructions emphasize concrete actions and integration into daily life, which is the opposite of focusing on abstract debate over practical application."}, {"text": "The exclusive role of religious leaders in interpreting and transmitting divine instruction.", "isCorrect": false, "rationale": "The instructions 'teach them diligently unto thy children' and 'talk of them when thou sittest in thine house' indicate a broader, communal, and familial responsibility for transmission, not an exclusive role for religious leaders."}, {"text": "The emphasis on orthopraxy, embodying faith in daily life through concrete actions.", "isCorrect": true, "rationale": "The text directly connects these instructions to 'Judaism is structured around the embodiment of faith in daily life. This points to one of the most important features of Jewish religious thought: its emphasis on orthopraxy (correct practice).'"}, {"text": "The belief that divine revelation is a static, unchanging set of rules.", "isCorrect": false, "rationale": "While these are rules, the text later clarifies that 'revelation itself is understood as ongoing,' meaning it's not a static set that doesn't evolve in understanding."}]}, {"question": "How does the text primarily characterize the difference in emphasis between Judaism and 'much of Christianity'?", "options": [{"text": "Christianity emphasizes community structure, while Judaism emphasizes individual prayer.", "isCorrect": false, "rationale": "The text does not discuss this particular distinction. Instead, it focuses on belief vs. practice."}, {"text": "Judaism emphasizes 'correct practice' (orthopraxy), while Christianity emphasizes 'correct belief' (orthodoxy).", "isCorrect": true, "rationale": "The text explicitly states: 'Judaism, the fundamental question is equally: 'What do you do?' A Jew who observes the commandments... is considered observant; a Jew who has perfect beliefs but ignores the commandments is considered something else entirely. In much of Christianity, the fundamental question is: 'Do you believe?'' This highlights orthopraxy over orthodoxy in Judaism."}, {"text": "Christianity emphasizes the covenant with God, while Judaism focuses on historical narratives.", "isCorrect": false, "rationale": "The text highlights the covenant as the 'foundation of Jewish faith,' making this statement inaccurate."}, {"text": "Judaism prioritizes spiritual experiences, while Christianity prioritizes moral conduct.", "isCorrect": false, "rationale": "The text's comparison is clearly about belief versus practice, not spiritual experiences versus moral conduct."}]}, {"question": "Based on the text's distinction between orthopraxy and orthodoxy, how would Judaism likely view an individual who consistently performs Jewish rituals and observes commandments but struggles with personal doubts about God?", "options": [{"text": "They would be considered to have imperfect beliefs, making their actions ultimately meaningless.", "isCorrect": false, "rationale": "The text states, 'A Jew who observes the commandments (mitzvot) while struggling with doubt is considered observant,' implying their actions are meaningful despite doubts."}, {"text": "They would be encouraged to cease their practices until their beliefs are fully aligned.", "isCorrect": false, "rationale": "This contradicts the emphasis on orthopraxy, which suggests continued practice even amid doubt is valued."}, {"text": "They would be considered observant, as their actions demonstrate their commitment to the covenant.", "isCorrect": true, "rationale": "The text directly states: 'A Jew who observes the commandments (mitzvot) while struggling with doubt is considered observant.'"}, {"text": "They would be seen as having a weaker relationship with God compared to someone with perfect belief but no practice.", "isCorrect": false, "rationale": "The text contrasts this directly, suggesting a Jew with 'perfect beliefs but ignores the commandments is considered something else entirely,' implying practice is paramount."}]}, {"question": "How does Judaism understand the role of 'belief' in light of its emphasis on orthopraxy?", "options": [{"text": "Belief is entirely secondary and holds no real importance.", "isCorrect": false, "rationale": "The text clarifies, 'This does not mean that belief is unimportant to Judaism.' It indicates belief is important, but in a specific way."}, {"text": "Belief is a private matter, completely disconnected from public action or ritual.", "isCorrect": false, "rationale": "The text states 'belief is enacted -- performed in the world through action, through ritual,' showing a strong connection."}, {"text": "Belief is enacted or performed through actions, rituals, and the ethical treatment of others.", "isCorrect": true, "rationale": "The text states: 'But it means that belief is enacted -- performed in the world through action, through ritual, through the way one treats the poor, the stranger, the widow, and the orphan.'"}, {"text": "Belief serves as a prerequisite for engaging in any Jewish practice.", "isCorrect": false, "rationale": "The example of a Jew struggling with doubt but observing commandments contradicts belief being a strict prerequisite for practice."}]}, {"question": "What does the concept of 'ongoing revelation' in Judaism, as described in the text, primarily signify?", "options": [{"text": "That God's instruction ceased entirely with Moses and is now complete.", "isCorrect": false, "rationale": "The text directly contradicts this, stating, 'Revelation did not end with Moses. It continues in every generation...'"}, {"text": "That the original Torah is constantly being rewritten and updated with new laws.", "isCorrect": false, "rationale": "The text refers to the 'Oral Torah' preserved in the 'Talmud,' which is 'developed' and 'understood as part of God's revelation,' not a rewriting of the original written Torah."}, {"text": "That God continues to reveal insights and understanding through rabbinic discussion and engagement with sacred texts.", "isCorrect": true, "rationale": "The text explains, 'The Oral Torah -- preserved and developed in the Talmud... is itself understood as part of God's revelation at Sinai. Revelation did not end with Moses. It continues in every generation of those who wrestle with the text...'"}, {"text": "That individuals can receive entirely new, private revelations unrelated to the established tradition.", "isCorrect": false, "rationale": "The text emphasizes wrestling 'with the text' and the development in the Talmud, implying a connection to the established tradition, not completely new, private revelations."}]}, {"question": "Considering the entire section, which statement best synthesizes the core essence of Judaism presented?", "options": [{"text": "Judaism is primarily defined by a rigid set of ancient doctrines that must be intellectually affirmed.", "isCorrect": false, "rationale": "The text explicitly states Jewish faith 'does not begin with a definition' and emphasizes relationship, covenant, and orthopraxy over doctrinal affirmation."}, {"text": "Judaism is a relational faith founded on an enduring covenant, expressed through continuous practice and an ongoing engagement with divine instruction in daily life.", "isCorrect": true, "rationale": "This statement synthesizes key themes: 'relational' and 'covenant' from the beginning, 'continuous practice' and 'daily life' from the orthopraxy discussion, and 'ongoing engagement with divine instruction' from the ongoing revelation section."}, {"text": "Judaism is mainly a historical account of a people's journey, with ritual being largely symbolic.", "isCorrect": false, "rationale": "While history is important, the text emphasizes the living covenant, orthopraxy, and the enactment of faith through action and ritual, suggesting rituals are more than merely symbolic."}, {"text": "Judaism is a belief system that prioritizes individual mystical experiences above communal obligations.", "isCorrect": false, "rationale": "The text highlights 'am Yisrael' (a people), the covenant's mutual obligations, and orthopraxy, which involves communal and daily life practices, rather than primarily individual mystical experiences."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
