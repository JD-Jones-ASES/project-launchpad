<script>
var QUESTIONS = [{"question": "According to the text, what is the primary orientation of Jewish eschatology concerning the future God is drawing near?", "options": [{"text": "It describes souls ascending to a heavenly realm for individual salvation.", "isCorrect": false, "rationale": "The text explicitly states that Hebrew prophets 'did not describe souls ascending to a heavenly realm' but rather the transformation of the actual world."}, {"text": "It envisions the transformation and repair of the actual world, including nations, harvests, and cities.", "isCorrect": true, "rationale": "The text states that prophets 'described... the transformation of the actual world -- the world of nations and harvests and cities and swords,' emphasizing that it is 'history transformed -- not escaped, not transcended, but repaired.'"}, {"text": "It focuses on transcending all earthly existence to reach a purely spiritual dimension.", "isCorrect": false, "rationale": "The text clarifies that the vision is 'not escaped, not transcended, but repaired,' indicating a focus on the present world rather than transcendence from it."}, {"text": "It predicts the complete destruction of the current world to make way for an entirely new, supernatural one.", "isCorrect": false, "rationale": "The concept is 'repair of the world' (tikkun olam), implying a mending and transformation of the existing world, not its complete destruction and replacement."}]}, {"question": "Which statement best defines 'tikkun olam' as presented in Jewish teaching?", "options": [{"text": "It is a divine process that human beings must passively await.", "isCorrect": false, "rationale": "The text defines tikkun olam as 'the human obligation to work toward the healing and improvement of the world,' indicating active human involvement, not passive waiting."}, {"text": "It refers to the human obligation to actively work in partnership with God toward the healing and improvement of the world through ethical actions.", "isCorrect": true, "rationale": "The text states, 'tikkun olam refers to the human obligation to work toward the healing and improvement of the world -- through acts of justice (tzedakah), compassion, and ethical behavior,' highlighting partnership with God."}, {"text": "It is primarily about personal spiritual introspection and detachment from worldly concerns.", "isCorrect": false, "rationale": "Tikkun olam emphasizes outward actions like 'acts of justice, compassion, and ethical behavior' to mend the 'torn fabric of the world,' not detachment."}, {"text": "It is the belief that the world is inherently perfect and requires no human intervention.", "isCorrect": false, "rationale": "Tikkun olam 'implies that the present world is broken,' which necessitates human action to mend it."}]}, {"question": "What is a crucial distinction between Jewish and Christian eschatology regarding the Messiah, according to the text?", "options": [{"text": "Jewish eschatology focuses on a spiritual Messiah, while Christian eschatology focuses on a human leader.", "isCorrect": false, "rationale": "The text states that the Jewish Messiah (Mashiach) is 'a human being, a descendant of King David,' which is a human leader, not solely spiritual in this context."}, {"text": "Judaism believes the Messiah has already come and will return, whereas Christianity believes the Messiah has not yet arrived.", "isCorrect": false, "rationale": "This statement reverses the distinction made in the text. The text states: 'Christianity identifies Jesus as the Messiah who has already come... Judaism does not accept this identification. The Messiah has not yet come.'"}, {"text": "Judaism anticipates a future human leader, a descendant of King David, while Christianity identifies Jesus as the Messiah who has already come and will come again.", "isCorrect": true, "rationale": "The text explicitly states, 'This is a crucial distinction from Christian eschatology: Christianity identifies Jesus as the Messiah who has already come and will come again; Judaism does not accept this identification. The Messiah has not yet come.'"}, {"text": "Jewish eschatology primarily associates the Messiah's coming with supernatural events, unlike Christian eschatology which emphasizes observable changes.", "isCorrect": false, "rationale": "The text clarifies that the Jewish Messiah's coming 'is associated with specific, observable changes in the world, not primarily with supernatural events,' making this statement incorrect."}]}, {"question": "A group of Jewish community members regularly volunteers at a soup kitchen, believing it's their responsibility to feed the hungry and reduce suffering. Which Jewish concept does this action best illustrate?", "options": [{"text": "Kashrut, adherence to dietary laws.", "isCorrect": false, "rationale": "Kashrut refers to dietary laws, which are distinct from acts of social justice and compassion as described."}, {"text": "Shabbat, observance of the day of rest.", "isCorrect": false, "rationale": "Shabbat is the Sabbath, a day of rest and spiritual observance, not directly related to active social service in this context."}, {"text": "Tikkun olam, the repair of the world through acts of compassion and justice.", "isCorrect": true, "rationale": "The text explains tikkun olam as the 'human obligation to work toward the healing and improvement of the world -- through acts of justice (tzedakah), compassion, and ethical behavior,' and lists 'every meal shared with the hungry' as a 'small stitch in the torn fabric of the world.'"}, {"text": "Torah study, the lifelong pursuit of religious knowledge.", "isCorrect": false, "rationale": "While important, Torah study is an intellectual and spiritual pursuit, distinct from the physical acts of 'loving-kindness' (gemilut hasadim) described."}]}, {"question": "According to traditional Jewish theology, what is considered a crucial observable test to determine if the Messiah has arrived?", "options": [{"text": "The appearance of the Messiah through a purely supernatural event, visible only to believers.", "isCorrect": false, "rationale": "The text states the Messiah's coming 'is associated with specific, observable changes in the world, not primarily with supernatural events.'"}, {"text": "The establishment of universal peace, justice, and the end of war, injustice, and suffering.", "isCorrect": true, "rationale": "The text explicitly states: 'one traditional test is precisely whether the world has been repaired: as long as war, injustice, and suffering persist, the Messiah has not arrived.'"}, {"text": "The ingathering of exiles to Israel and the rebuilding of the Temple.", "isCorrect": false, "rationale": "While these are aspects of the messianic era, the text highlights the 'repair' of the world from war, injustice, and suffering as *the* traditional test for the Messiah's arrival, encompassing these other aspects."}, {"text": "The collective spiritual enlightenment of all humanity, transcending physical reality.", "isCorrect": false, "rationale": "Jewish eschatology is 'emphatically oriented toward this world' and its transformation, not transcendence from physical reality."}]}, {"question": "The text notes that 'tzedakah' is more accurately translated as 'justice' or 'righteousness' rather than 'charity.' What is the implication of this more accurate translation for Jewish practice?", "options": [{"text": "Giving to the needy is a voluntary act of kindness, which is admirable but not obligatory.", "isCorrect": false, "rationale": "The text states 'giving to those in need is not merely generosity, it is an act of justice owed,' indicating an obligation rather than mere voluntary kindness."}, {"text": "It means providing for the less fortunate is an act of justice owed, essential for mending the brokenness of the world.", "isCorrect": true, "rationale": "The text explains, 'giving to those in need is not merely generosity, it is an act of justice owed, a participation in the repair of a world where some have too much and others too little.'"}, {"text": "It implies that giving should be done anonymously to avoid drawing attention to oneself.", "isCorrect": false, "rationale": "While anonymity in giving is a Jewish value, the text's distinction of 'justice' vs. 'charity' does not primarily focus on the manner of giving but its underlying nature as an obligation."}, {"text": "It restricts giving to only those who are deemed morally worthy of assistance.", "isCorrect": false, "rationale": "The concept of 'justice owed' suggests a universal obligation to address inequality, not a judgment of individual worthiness."}]}, {"question": "The text states that Jewish eschatology 'generates an ethics of urgency.' What does this 'ethics of urgency' imply about the relationship between the messianic future and present actions?", "options": [{"text": "The anticipated future will inevitably come about on its own, rendering present human efforts less critical.", "isCorrect": false, "rationale": "The text explicitly refutes this: 'The future does not excuse us from the present.'"}, {"text": "Humanity's primary duty is to escape the present broken world and prepare for a spiritual afterlife.", "isCorrect": false, "rationale": "Jewish eschatology is 'oriented toward this world' and its 'repair,' not escape or preparation for a spiritual afterlife in the Christian sense."}, {"text": "The hope for a transformed future directly obligates and demands immediate ethical action and work in the present.", "isCorrect": true, "rationale": "The text states, 'The future does not excuse us from the present. On the contrary, it obligates us. The prophet Isaiah's vision of the world-to-come is at the same time a demand on the world-as-it-is.'"}, {"text": "Divine intervention is the sole means of bringing about the messianic era, negating the need for human action.", "isCorrect": false, "rationale": "Tikkun olam clearly states human beings are 'in partnership with God' to mend the world, indicating active human participation."}]}, {"question": "In traditional Jewish theology, what is the nature and origin of the Mashiach (Messiah)?", "options": [{"text": "A divine being who transcends human form and appears supernaturally.", "isCorrect": false, "rationale": "The text describes the Messiah as 'a human being' and states his coming is associated with 'observable changes,' not primarily supernatural events."}, {"text": "An angel chosen by God to lead humanity to redemption.", "isCorrect": false, "rationale": "The text specifies the Messiah is 'a human being, a descendant of King David,' not an angel."}, {"text": "A human leader, a descendant of King David, who will bring about the redemption of Israel and the world.", "isCorrect": true, "rationale": "The text defines Mashiach as 'a human being, a descendant of King David, who will lead the people of Israel and ultimately all humanity to redemption.'"}, {"text": "A symbolic ideal representing collective human potential, rather than an actual individual.", "isCorrect": false, "rationale": "The text refers to the 'figure of the Mashiach,' implying a specific individual with a defined lineage and role."}]}, {"question": "The prophet Isaiah's vision of the world-to-come, as described in the text, primarily emphasizes which aspect?", "options": [{"text": "The escape of righteous souls to a new celestial dwelling.", "isCorrect": false, "rationale": "The text states that prophets 'did not describe souls ascending to a heavenly realm but the transformation of the actual world.'"}, {"text": "The transformation of the physical world into an era of universal peace, harmony in nature, and widespread knowledge of God.", "isCorrect": true, "rationale": "Isaiah envisions 'swords into plowshares,' 'wolf will lie down with the lamb,' and 'the earth will be full of the knowledge of the Lord,' clearly depicting a transformed physical world of peace and divine knowledge."}, {"text": "A return to primitive, pre-civilization conditions to avoid the complexities of modern society.", "isCorrect": false, "rationale": "The vision focuses on peace ('learn war anymore') and knowledge ('earth will be full of the knowledge of the Lord'), not a regression to a primitive state."}, {"text": "The exclusive salvation of a select group of people, while others face eternal punishment.", "isCorrect": false, "rationale": "The vision describes universal harmony, where 'nation shall not lift up sword against nation' and the 'earth will be full of the knowledge of the Lord,' implying a broad, inclusive transformation."}]}, {"question": "The 'DID YOU KNOW?' section discusses varied Jewish responses to the Holocaust. What central idea does this section convey about Jewish fidelity to tradition in the face of immense suffering?", "options": [{"text": "Fidelity to tradition mandates an unquestioning acceptance of divine will, regardless of understanding or suffering.", "isCorrect": false, "rationale": "The text notes responses like 'wrestling, anguished faith that argued with God rather than surrendering to easy answers,' which contradicts unquestioning acceptance."}, {"text": "The Holocaust proved that Jewish eschatology was ultimately incompatible with real-world suffering, leading to widespread abandonment of faith.", "isCorrect": false, "rationale": "While 'some abandoned faith entirely,' others 'deepened it' or maintained 'anguished faith,' indicating a variety of responses, not a universal failure or abandonment."}, {"text": "Honest grappling with suffering, including wrestling with God and questioning, can itself be a form of fidelity to the tradition.", "isCorrect": true, "rationale": "The text concludes, 'This honest grappling with suffering is itself, many Jewish thinkers argue, a form of fidelity to the tradition,' highlighting that anguished engagement is valid."}, {"text": "Maintaining fidelity strictly requires ignoring the reality of suffering and focusing solely on future hope.", "isCorrect": false, "rationale": "The discussion of 'wrestling, anguished faith' and 'honest grappling with suffering' directly contradicts the idea of ignoring suffering."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
