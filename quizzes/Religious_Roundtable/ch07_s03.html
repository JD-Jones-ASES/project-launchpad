    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Confucius view his relationship with the ancient texts he studied?", "options": [{"text": "As the original author and innovator of new philosophical ideas.", "isCorrect": false, "rationale": "Confucius explicitly stated, 'I transmit but do not create,' indicating he did not see himself as an original author of the wisdom he shared."}, {"text": "As a transmitter and lover of ancient wisdom, not its creator.", "isCorrect": true, "rationale": "Confucius described himself as someone who transmits ancient wisdom, believing in and loving the ancients, rather than inventing new concepts."}, {"text": "As a critical editor who sought to entirely rewrite historical records.", "isCorrect": false, "rationale": "While Confucius is said to have edited some texts, his primary role was transmission, and there is no indication he sought to entirely rewrite them."}, {"text": "As a prophet revealing divine truths directly to humanity.", "isCorrect": false, "rationale": "Confucianism emphasizes human wisdom and moral cultivation, not divine revelation in the prophetic sense."}]}, {"question": "What is a key distinguishing characteristic between the Four Books and the Five Classics, based on their compilation and historical role?", "options": [{"text": "The Four Books focus solely on individual ethics, while the Five Classics address only state governance.", "isCorrect": false, "rationale": "Both collections cover a breadth of topics, including individual ethics and governance, demonstrating the comprehensive nature of Confucianism."}, {"text": "The Four Books were compiled and commented on by Zhu Xi and became the imperial examination curriculum, whereas the Five Classics were older texts edited and transmitted by Confucius.", "isCorrect": true, "rationale": "The text explicitly states that Zhu Xi compiled and commented on the Four Books, which became core to imperial exams, while the Five Classics were older texts that Confucius edited and transmitted."}, {"text": "The Four Books were primarily used for divination, whereas the Five Classics formed the metaphysical core of Confucian thought.", "isCorrect": false, "rationale": "The Book of Changes (one of the Five Classics) was used for divination, and the Doctrine of the Mean (one of the Four Books) developed metaphysics. This option reverses their roles and mischaracterizes the collections."}, {"text": "The Four Books are older texts pre-dating Confucius, while the Five Classics are collections of Confucius's own sayings.", "isCorrect": false, "rationale": "This statement is incorrect. The Five Classics are the older texts, and the Analects (one of the Four Books) contains Confucius's sayings."}]}, {"question": "Which Neo-Confucian philosopher was responsible for compiling and commenting on the Four Books, leading to their adoption as the core curriculum of the imperial examination system?", "options": [{"text": "Mencius", "isCorrect": false, "rationale": "Mencius was a significant disciple whose sayings form one of the Four Books, but he was not the compiler of the entire collection or the Neo-Confucian figure mentioned."}, {"text": "Confucius", "isCorrect": false, "rationale": "Confucius is the central figure of Confucianism, and his sayings are in the Analects, but he did not compile the Four Books as a collection in the way Zhu Xi did centuries later."}, {"text": "Zhu Xi", "isCorrect": true, "rationale": "The text explicitly states that 'The Four Books, compiled and commented on by the Neo-Confucian philosopher Zhu Xi (1130–1200 CE), became the core curriculum of the imperial examination system.'"}, {"text": "Laozi", "isCorrect": false, "rationale": "Laozi is a key figure in Daoism, a separate philosophical tradition, and is not associated with the compilation of the Confucian Four Books."}]}, {"question": "A modern student seeking to grasp Confucius's direct, personal thoughts and instructional style would find which text to be the most primary and authentic source?", "options": [{"text": "The Book of Changes (Yijing)", "isCorrect": false, "rationale": "The Book of Changes is a cosmological text used for divination, not a direct record of Confucius's personal sayings or conversations."}, {"text": "The Analects (Lunyu)", "isCorrect": true, "rationale": "The Analects is described as 'the primary source for Confucius's own voice—direct, sometimes cryptic, always demanding,' compiled by his students after his death."}, {"text": "The Great Learning (Daxue)", "isCorrect": false, "rationale": "The Great Learning is a foundational text describing the cultivation of virtue, but it is not a direct collection of Confucius's conversations like the Analects."}, {"text": "The Spring and Autumn Annals (Chunqiu)", "isCorrect": false, "rationale": "The Spring and Autumn Annals is a historical chronicle traditionally attributed to Confucius, but it is not a direct record of his personal sayings or conversations."}]}, {"question": "The Great Learning describes a 'concentric vision of ethics' with 'eight steps' for cultivating virtue. If an individual were to apply this vision, what would be the logical progression of their moral and societal engagement?", "options": [{"text": "Focusing solely on abstract philosophical contemplation before addressing any practical societal issues.", "isCorrect": false, "rationale": "The Great Learning emphasizes an outward progression from the individual to the world, integrating contemplation with practical action, not separating them."}, {"text": "Prioritizing the establishment of universal peace and order globally before improving their immediate family or community.", "isCorrect": false, "rationale": "The concentric vision starts from the individual and expands outward, meaning personal and family cultivation precede global peace."}, {"text": "Cultivating personal moral integrity, then fostering harmony within their family, which extends to governing the state effectively, and ultimately bringing peace to the world.", "isCorrect": true, "rationale": "This option accurately reflects the 'essentially concentric vision of ethics' described in The Great Learning, which moves 'from the individual outward to the family, the state, and the whole world.'"}, {"text": "Emphasizing strict adherence to ancient rituals as the only means to achieve personal virtue and societal order.", "isCorrect": false, "rationale": "While ritual is important in Confucianism, the 'eight steps' of the Great Learning encompass a broader process of virtue cultivation that isn't solely focused on ritual adherence."}]}, {"question": "Which of the Four Books is distinguished by its deeper exploration of the 'metaphysical dimension of Confucian thought' and its connection of human virtue to the cosmic order?", "options": [{"text": "The Analects", "isCorrect": false, "rationale": "The Analects primarily consists of Confucius's sayings and conversations, offering practical wisdom and ethical guidance, but less emphasis on metaphysics compared to other texts."}, {"text": "Mencius", "isCorrect": false, "rationale": "Mencius focuses on the fundamental goodness of human nature and the cultivation of innate virtues, rather than the metaphysical connection to the cosmos."}, {"text": "The Doctrine of the Mean (Zhongyong)", "isCorrect": true, "rationale": "The text states that the Doctrine of the Mean 'develops the metaphysical dimension of Confucian thought more fully than the Analects and connects human virtue to the order of the cosmos.'"}, {"text": "The Great Learning (Daxue)", "isCorrect": false, "rationale": "The Great Learning describes a concentric vision of ethics and the cultivation of virtue from individual to world, but its focus is less on metaphysics than the Doctrine of the Mean."}]}, {"question": "Mencius's most significant contribution to Confucian thought, as presented in the text, centers on which fundamental idea?", "options": [{"text": "That strict legal codes and punitive measures are the most effective way to ensure social order and morality.", "isCorrect": false, "rationale": "This describes Legalism, a different Chinese philosophy, and contradicts Mencius's emphasis on innate goodness."}, {"text": "That human nature is fundamentally good, possessing innate virtues like compassion that require cultivation.", "isCorrect": true, "rationale": "The text explicitly states that Mencius 'developed the crucial argument that human nature is fundamentally good—that virtues like compassion and a sense of right and wrong are present in every person from birth, like seeds that need cultivation.'"}, {"text": "That individuals should withdraw from society to achieve spiritual enlightenment through solitary meditation.", "isCorrect": false, "rationale": "Confucianism, including Mencius's thought, emphasizes active engagement in society and moral development through social interaction, not withdrawal."}, {"text": "That a rigid hierarchy based solely on inherited status is essential for maintaining a stable society.", "isCorrect": false, "rationale": "While hierarchy is present in Confucianism, Mencius's focus was on the moral capacity of individuals, not solely inherited status as the basis for societal structure."}]}, {"question": "A historian researching ancient Chinese governance and its moral foundations would find the Book of History (Shujing) most valuable for which type of content?", "options": [{"text": "Detailed accounts of ritual practices, social customs, and ceremonial forms.", "isCorrect": false, "rationale": "This content is found in the Book of Rites, not the Book of History."}, {"text": "An anthology of ancient Chinese poetry for cultivating moral imagination.", "isCorrect": false, "rationale": "This describes the Book of Songs, not the Book of History."}, {"text": "Records of ancient rulers and their deeds, serving as models of good governance and cautionary tales.", "isCorrect": true, "rationale": "The text describes the Book of History as containing 'Records of ancient rulers and their deeds—models of good governance and cautionary tales of bad governance.'"}, {"text": "A chronological record of events in the state of Lu with embedded moral judgments.", "isCorrect": false, "rationale": "This content is found in the Spring and Autumn Annals, not the Book of History."}]}, {"question": "Among the Five Classics, the Book of Changes (Yijing or I Ching) holds a unique position due to its original use and subsequent Confucian interpretation. What was its primary initial function?", "options": [{"text": "To provide a detailed chronicle of Confucius's era in the state of Lu.", "isCorrect": false, "rationale": "This describes the Spring and Autumn Annals, not the Book of Changes."}, {"text": "As an anthology of ancient Chinese poetry to foster emotional sensitivity.", "isCorrect": false, "rationale": "This describes the Book of Songs, not the Book of Changes."}, {"text": "A cosmological text primarily used for divination, later reinterpreted by Confucian thinkers.", "isCorrect": true, "rationale": "The text states the Book of Changes is 'A cosmological text used for divination, later interpreted by Confucian thinkers as a guide to the patterns underlying change in human and natural affairs.'"}, {"text": "To record the exemplary deeds and failures of ancient rulers as historical lessons.", "isCorrect": false, "rationale": "This describes the Book of History, not the Book of Changes."}]}, {"question": "The broad and diverse nature of the Confucian canon—including poetry, history, ritual, philosophy, and divination—primarily reflects which overarching ambition of Confucianism?", "options": [{"text": "Its exclusive focus on private spiritual salvation and ascetic practices.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'This is not a tradition concerned only with private spiritual life.'"}, {"text": "Its goal to preserve ancient myths and legends solely for academic or antiquarian interest.", "isCorrect": false, "rationale": "While preservation is a component, the primary ambition is the practical application of wisdom to shape individuals and society."}, {"text": "Its aim to shape the whole person—emotional, intellectual, moral, social, and political—and to impact all facets of human life.", "isCorrect": true, "rationale": "The concluding paragraph states, 'This is not a tradition concerned only with private spiritual life. It aims to shape the whole person: emotional, intellectual, moral, social, and political.'"}, {"text": "Its intention to provide a rigid set of dogmas and strict legalistic rules for unquestioning societal adherence.", "isCorrect": false, "rationale": "Confucianism emphasizes cultivation, reflection, and ethical guidance rather than rigid dogma or legalistic enforcement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
