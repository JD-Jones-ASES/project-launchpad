    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Marx's concept of 'historical materialism' primarily suggest about the relationship between a society's economic organization and its cultural or political structures?", "options": [{"text": "Cultural and political structures independently shape the economic organization.", "isCorrect": false, "rationale": "This reverses Marx's primary causal direction. He argued that the economic base determines the superstructure, not vice-versa."}, {"text": "The economic base determines the superstructure, which generally serves the interests of the economic base's controllers.", "isCorrect": true, "rationale": "The text states that 'the economic organization of society... determines everything else,' and that law, religion, art, and politics (the superstructure) 'generally serve the interests of whoever controls that base.'"}, {"text": "Economic organization is determined by the legal and religious frameworks of a society.", "isCorrect": false, "rationale": "This view is contrary to historical materialism, which places the economic organization (base) as the determinant of legal and religious frameworks (superstructure)."}, {"text": "Art and politics are neutral forces that mediate between the economic base and society's values.", "isCorrect": false, "rationale": "Marx argued that these elements of the superstructure are not independent forces but generally serve the interests of the controlling economic class."}]}, {"question": "When Marx famously called religion 'the opiate of the masses,' what was he primarily emphasizing about its function in society?", "options": [{"text": "Religion is inherently evil and designed to mislead people.", "isCorrect": false, "rationale": "The text explicitly clarifies that Marx meant this 'not because it is evil,' but because of its function."}, {"text": "Religion acts as a painkiller, making people more tolerant of suffering and less likely to challenge the economic status quo.", "isCorrect": true, "rationale": "The text explains that religion 'functions as a painkiller, making people accept their suffering in this life by promising rewards in the next,' which benefits those who control the economic base by discouraging demands for better conditions."}, {"text": "Religious beliefs are the ultimate cause of economic inequality and exploitation.", "isCorrect": false, "rationale": "In historical materialism, economic organization is the base; religion is part of the superstructure and a consequence, not the ultimate cause, of economic conditions."}, {"text": "Religion provides a direct path to revolutionary class consciousness.", "isCorrect": false, "rationale": "As an 'opiate,' religion works against revolutionary consciousness by encouraging acceptance of suffering rather than promoting action against it."}]}, {"question": "According to Marx and Engels in The Communist Manifesto, what is identified as the 'driving force of all history'?", "options": [{"text": "The evolution of religious doctrines.", "isCorrect": false, "rationale": "While significant in society, religious doctrines are part of the superstructure and not identified as the primary driving force of history by Marx."}, {"text": "The conflict between social classes with opposing economic interests.", "isCorrect": true, "rationale": "The text defines 'class struggle' as 'Marx's term for the conflict between social classes with opposing economic interests — the driving force of all history.'"}, {"text": "The advancement of technology and scientific knowledge.", "isCorrect": false, "rationale": "Technological advancements are relevant to the means of production, but Marx's primary emphasis for the 'driving force' in the context provided is class struggle."}, {"text": "The actions of individual charismatic leaders.", "isCorrect": false, "rationale": "Marx's theory focuses on structural forces and class dynamics rather than the influence of individual leaders as the driving force of history."}]}, {"question": "Which of the following is *not* one of the four dimensions of alienation identified by Marx under capitalist production?", "options": [{"text": "Alienation from the product of one's labor.", "isCorrect": false, "rationale": "This is one of the four dimensions: 'the worker makes things she does not own and that are sold against her interest.'"}, {"text": "Alienation from the process of labor itself.", "isCorrect": false, "rationale": "This is one of the four dimensions: 'labor in a factory is not creative or fulfilling — it is repetitive, exhausting, and meaningless.'"}, {"text": "Alienation from the capitalist class.", "isCorrect": true, "rationale": "The four dimensions of alienation are from the product, the process, species-being, and other humans. While the capitalist class is the agent of alienation, alienation *from* the capitalist class itself is not listed as one of the four types of estrangement felt by the worker."}, {"text": "Alienation from one's species-being (essential humanity).", "isCorrect": false, "rationale": "This is one of the four dimensions: 'factory labor degrades this essential human quality' (of being naturally creative, purposive beings)."}]}, {"question": "Marx's concept of 'species-being' suggests that humans are distinctively defined by their capacity for free, conscious, purposive creative activity. How does industrial capitalism, according to Marx, primarily undermine this essential human quality?", "options": [{"text": "By offering workers excessive leisure time, reducing their need for creative output.", "isCorrect": false, "rationale": "Industrial capitalism often involves repetitive, exhausting labor, not excessive leisure that fosters creativity. Surplus value implies workers are paid less than their full value."}, {"text": "By compelling workers into repetitive, unfulfilling labor that they do not control or find meaning in.", "isCorrect": true, "rationale": "The text explains, 'The factory worker does not design; she repeats. She does not own the product; she sells it. Her labor, which should be the expression of her humanity, becomes instead a commodity.'"}, {"text": "By encouraging competitive innovation among workers, leading to new forms of creativity.", "isCorrect": false, "rationale": "While capitalism fosters competition, Marx argues it 'sets workers against each other rather than connecting them in genuine community,' which degrades, rather than enhances, their species-being in the sense of creative activity."}, {"text": "By ensuring workers receive fair wages that allow them to pursue creative hobbies outside of work.", "isCorrect": false, "rationale": "Marx's theory of surplus value suggests workers are *not* paid fair wages, but rather less than the full value of their labor, making it harder to pursue fulfilling activities outside work."}]}, {"question": "The delayed discovery and publication of Marx's Economic and Philosophic Manuscripts of 1844 in 1932 significantly altered the understanding of Marxism by revealing what aspect of his thought?", "options": [{"text": "His later rejection of historical materialism in favor of an idealist philosophy.", "isCorrect": false, "rationale": "The manuscripts revealed a more philosophically ambitious thinker but did not indicate a rejection of his core materialist tenets."}, {"text": "A much more philosophically ambitious thinker, particularly regarding the concept of alienation.", "isCorrect": true, "rationale": "The text states that 'When the manuscripts finally appeared, they revealed a much more philosophically ambitious thinker,' and specifically mentions the concept of alienation appearing 'most fully' in them."}, {"text": "Concrete plans for the organization of a fully communist state.", "isCorrect": false, "rationale": "The text notes that Marx was 'deliberately vague about the details' of a fully communist society."}, {"text": "Detailed critiques of 20th-century communist governments.", "isCorrect": false, "rationale": "These manuscripts were written a century before their discovery in 1932, long before most 20th-century communist governments existed."}]}, {"question": "A worker labors for eight hours and produces goods valued at $120. However, she is paid wages equivalent to only four hours of her labor, totaling $60. According to Marx, what does the $60 difference primarily represent?", "options": [{"text": "Legal theft committed by the capitalist.", "isCorrect": false, "rationale": "The text clarifies that 'this is not theft in a legal sense — it is perfectly legal within capitalism.'"}, {"text": "Surplus value, which is the source of capitalist profit and a form of exploitation.", "isCorrect": true, "rationale": "The text defines surplus value as 'The value created by workers beyond what they are paid in wages,' which is 'the source of capitalist profit' and 'exploitation in an economic and moral sense.'"}, {"text": "The worker's voluntary contribution to the company's growth.", "isCorrect": false, "rationale": "Marx viewed this difference as exploitation, not a voluntary contribution, as the worker is paid less than the full value she creates."}, {"text": "The cost of raw materials and machinery used in production.", "isCorrect": false, "rationale": "Surplus value specifically refers to the value created by *labor* beyond wages, not the costs of other inputs to production."}]}, {"question": "Marx argued that capitalism inherently carries the 'seeds of its own destruction.' Which of the following best describes the fundamental dynamic he believed would lead to its collapse?", "options": [{"text": "The natural decline of human innovation over time.", "isCorrect": false, "rationale": "The text does not mention a decline in innovation as a cause for capitalism's collapse; rather, it's about the internal contradictions of the system."}, {"text": "Increasing concentration of capital, growing impoverishment of the working class, and developing class consciousness among workers.", "isCorrect": true, "rationale": "The text states: 'As capital concentrated in fewer and fewer hands, as the working class grew larger and more impoverished, and as workers began to understand their situation (class consciousness), revolution would become inevitable.'"}, {"text": "Excessive government intervention leading to economic stagnation.", "isCorrect": false, "rationale": "Marx's prediction of capitalism's collapse stems from its internal economic logic and class relations, not primarily from external government intervention."}, {"text": "The widespread adoption of religion, preventing workers from organizing.", "isCorrect": false, "rationale": "While religion is seen as an 'opiate,' Marx predicted revolution due to the intensifying contradictions of capitalism and the rise of class consciousness, overcoming such influences."}]}, {"question": "Based on Marx's distinction, which of the following is a defining characteristic of a communist society, as opposed to a socialist state?", "options": [{"text": "The government owns and manages the economy on behalf of all citizens.", "isCorrect": false, "rationale": "This describes the transitional socialist state, where the state still exists and controls the means of production."}, {"text": "Social classes are fully abolished, and the state itself has withered away.", "isCorrect": true, "rationale": "The text explains that 'Communism is the final stage: no state, no classes, no private property — a fully cooperative society.'"}, {"text": "The proletariat has recently overthrown the bourgeoisie and seized the means of production.", "isCorrect": false, "rationale": "This describes the revolutionary act that initiates the socialist (transitional) phase, not the final communist stage itself."}, {"text": "Private property is still permitted for consumer goods, but not for the means of production.", "isCorrect": false, "rationale": "Communism is defined as having 'no private property' at all, implying its abolition even for consumer goods in its final form."}]}, {"question": "Marx's philosophy is described as a 'system' where 'each piece depends on the others.' This implies that to truly understand any single concept, such as alienation, one must primarily grasp what?", "options": [{"text": "Its historical origins within ancient philosophical traditions.", "isCorrect": false, "rationale": "While Marx was influenced by philosophy, the text emphasizes understanding his ideas within his own interconnected system, not primarily by tracing ancient origins."}, {"text": "How it connects to and interlocks with the rest of his core ideas.", "isCorrect": true, "rationale": "The text explicitly states: 'To understand any one idea well, you have to see how it connects to the rest' of his system."}, {"text": "Its independent validity, regardless of other theoretical constructs.", "isCorrect": false, "rationale": "The description 'each piece depends on the others' directly contradicts the idea of independent validity."}, {"text": "Its purely economic implications, separate from its social or political aspects.", "isCorrect": false, "rationale": "Marx's system integrates economic base with social, political, religious, and artistic superstructure, making a purely economic understanding incomplete."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
