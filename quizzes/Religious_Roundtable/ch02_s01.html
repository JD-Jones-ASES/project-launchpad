    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the significance of the covenant established between God and Abraham in the origins of Judaism?", "options": [{"text": "It primarily served as a declaration of God's power over all other deities in Mesopotamia.", "isCorrect": false, "rationale": "While it implicitly demonstrates God's power, the text emphasizes the covenant as a 'formal, sacred agreement between God and a people, with mutual obligations,' not primarily a display of power over other deities."}, {"text": "It was a one-sided promise from God to make Abraham a great nation, with no obligations on Abraham's part.", "isCorrect": false, "rationale": "The text explicitly states it was an agreement 'with mutual obligations on both sides,' making it a two-sided promise, not one-sided."}, {"text": "It established a binding promise between God and a specific people, laying the foundation for their unique relationship and identity.", "isCorrect": true, "rationale": "The text defines the covenant as 'a formal, sacred agreement between God and a people, with mutual obligations on both sides—a binding promise: I will be your God, and you will be my people,' which perfectly aligns with establishing a unique relationship and identity."}, {"text": "Its main purpose was to outline the precise laws and commandments for future generations, similar to the Torah.", "isCorrect": false, "rationale": "The covenant with Abraham established the foundational relationship, while the detailed laws and commandments (Torah) were given centuries later to Moses at Mount Sinai, specifying the 'terms of the covenant' that Abraham's covenant initiated."}]}, {"question": "The text states the Exodus is 'not merely a historical event...it is the defining moment of the entire tradition.' What does this suggest about its role in Jewish identity and practice?", "options": [{"text": "It means the Exodus is a historical narrative that serves as a chronological marker for ancient Jewish history.", "isCorrect": false, "rationale": "While it is a historical narrative and chronological marker, the phrasing 'not merely a historical event' implies a deeper, ongoing significance beyond simple chronology."}, {"text": "It signifies that the event's spiritual and ethical lessons are continually re-experienced and applied to contemporary Jewish life.", "isCorrect": true, "rationale": "The text states Jews 'are commanded to consider themselves as though they personally came out of Egypt,' and the Passover Seder 'retells the Exodus story each year,' indicating its ongoing spiritual and ethical application and re-experience in Jewish identity."}, {"text": "It implies that the physical escape from Egypt is more important than the subsequent receiving of the Torah.", "isCorrect": false, "rationale": "The text highlights the Exodus as the 'foundational act of God's rescue and faithfulness,' but doesn't necessarily diminish the importance of the Torah; rather, it sets the stage for the covenant's terms to be received."}, {"text": "It indicates that the Exodus narrative is exclusively for historical study by scholars, rather than for communal practice.", "isCorrect": false, "rationale": "The mention of the Passover Seder and the command to 'consider themselves as though they personally came out of Egypt' explicitly points to its communal and ongoing practical significance, not just scholarly study."}]}, {"question": "How did the giving of the Torah at Mount Sinai fundamentally shape the 'terms of the covenant' initiated with Abraham?", "options": [{"text": "It replaced the original covenant with a new, more stringent agreement that nullified Abraham's initial promise.", "isCorrect": false, "rationale": "The Torah did not replace or nullify the covenant but rather defined its specific terms. It was the 'specific shape of Israel's relationship with God' within the existing covenant, not a replacement."}, {"text": "It provided a set of 613 commandments, or mitzvot, which detailed the mutual obligations and the specific way Israel was to relate to God.", "isCorrect": true, "rationale": "The text states the Torah 'contained 613 commandments—mitzvot—governing every aspect of life... These were not merely rules. They were the terms of the covenant: the specific shape of Israel's relationship with God.' This directly answers the question."}, {"text": "It marked the end of the wilderness wandering and the immediate entry into the promised land of Canaan.", "isCorrect": false, "rationale": "The Torah was given at Mount Sinai, but the Israelites still underwent 'forty years of wandering in the wilderness' before entering Canaan."}, {"text": "It established Jerusalem as the capital and the site for the First Temple, centralizing Israelite worship.", "isCorrect": false, "rationale": "Jerusalem became the capital under King David, and the First Temple was built by Solomon, centuries after the giving of the Torah."}]}, {"question": "The destruction of the First Temple in 586 BCE by the Babylonians is described as a 'theological crisis.' What core belief was most directly challenged by this event?", "options": [{"text": "The belief in Moses as the sole prophet and lawgiver for the Jewish people.", "isCorrect": false, "rationale": "While Moses is a central figure, the crisis revolved around God's presence and covenantal faithfulness, not Moses's prophetic role."}, {"text": "The notion that God's physical presence was exclusively confined to the Temple building itself.", "isCorrect": true, "rationale": "The text poses the question directly: 'If God lived in the Temple, and the Temple was gone—what did that mean? Had God abandoned his people?' This highlights the challenge to the belief that God's presence was tied to the Temple structure."}, {"text": "The idea that the Jewish people were destined to live as a majority in their ancestral homeland forever.", "isCorrect": false, "rationale": "While the exile certainly challenged their presence in the homeland, the 'theological crisis' specifically referred to the destruction of the Temple and its implications for God's presence and faithfulness."}, {"text": "The concept that the covenant with Abraham required annual sacrifices at the Temple.", "isCorrect": false, "rationale": "Sacrifices were part of Temple worship, but the crisis was deeper, questioning God's presence and covenant itself, not just the form of worship."}]}, {"question": "Which of the following best illustrates the long-term impact of the Second Temple's destruction in 70 CE on the evolution of Jewish religious practice?", "options": [{"text": "It led to the complete abandonment of Jewish religious law and traditions, as there was no central place of worship.", "isCorrect": false, "rationale": "The text states Jewish life 'reconstituted itself' after the First Temple's destruction and, after the Second, the tradition was carried 'in texts, in memory, and in practice,' indicating continuity, not abandonment."}, {"text": "It resulted in a shift from priestly rituals and animal sacrifices as the center of worship to practices focused on rabbis and textual study.", "isCorrect": true, "rationale": "The text clearly states: 'With it gone, the center of Jewish life shifted from priests and sacrifice to rabbis and study.' This directly reflects the long-term impact on religious practice."}, {"text": "It prompted the immediate rebuilding of a Third Temple by the Roman authorities as a gesture of peace.", "isCorrect": false, "rationale": "The text explicitly states: 'The Temple has never been rebuilt' and mentions the Romans were responsible for its destruction, making immediate rebuilding by them highly unlikely."}, {"text": "It caused the Jewish people to consolidate all their communities into a single, unified kingdom within the Roman Empire.", "isCorrect": false, "rationale": "The destruction of the Second Temple accelerated the 'Diaspora—the scattering of Jewish people away from their ancestral homeland,' which is the opposite of consolidation into a single kingdom."}]}, {"question": "How did the prophets, such as Isaiah, Jeremiah, and Ezekiel, interpret the Babylonian Exile for the Jewish people?", "options": [{"text": "They declared that God had permanently abandoned Israel due to their unfaithfulness.", "isCorrect": false, "rationale": "The text states the prophets 'insisted that God had not abandoned Israel, but had allowed the exile as a consequence of Israel's unfaithfulness,' contradicting the idea of permanent abandonment."}, {"text": "They argued that the exile was a random political misfortune unrelated to their covenant with God.", "isCorrect": false, "rationale": "The text presents it as a 'theological crisis' and states the prophets linked it to 'Israel's unfaithfulness,' indicating it was deeply related to their covenant, not a random misfortune."}, {"text": "They explained it as a consequence of Israel's unfaithfulness, meant to deepen their tradition rather than destroy it.", "isCorrect": true, "rationale": "The text explicitly states the prophets 'insisted that God had not abandoned Israel, but had allowed the exile as a consequence of Israel's unfaithfulness. The crisis deepened the tradition rather than destroying it.'"}, {"text": "They predicted that the exile would lead to the immediate return of the Messiah to rebuild the Temple.", "isCorrect": false, "rationale": "The text does not mention the prophets predicting the immediate return of the Messiah in relation to the exile; it focuses on their interpretation of the exile itself as a consequence of unfaithfulness."}]}, {"question": "The 'Did You Know' section explains that 'Israel' means 'one who wrestles with God.' What does this etymology suggest about the nature of the relationship between the Jewish people and God as understood in their tradition?", "options": [{"text": "It implies a relationship primarily characterized by blind obedience and unquestioning faith.", "isCorrect": false, "rationale": "The text explicitly mentions 'challenging, debating, and questioning God,' which is contrary to blind obedience and unquestioning faith."}, {"text": "It highlights a tradition where engaging in struggle, debate, and questioning with God is considered a holy and integral part of faith.", "isCorrect": true, "rationale": "The text directly states that the name is fitting for a people 'whose tradition includes centuries of challenging, debating, and questioning God—and finding that the wrestling itself is holy,' aligning perfectly with this option."}, {"text": "It suggests that God is often at odds with His people, leading to constant conflict and separation.", "isCorrect": false, "rationale": "While 'wrestling' implies struggle, the text frames it as a 'holy' part of the tradition, not necessarily leading to constant conflict and separation from God, but rather a deeper engagement."}, {"text": "It refers exclusively to Jacob's physical struggle and has no broader symbolic meaning for the entire people.", "isCorrect": false, "rationale": "The section notes it is a 'fitting name for a people,' implying a broader symbolic meaning beyond just Jacob's personal struggle."}]}, {"question": "Which sequence correctly orders the major figures and events in the early history of Judaism as presented in the text?", "options": [{"text": "Moses receives the Torah, Abraham establishes the covenant, Solomon builds the First Temple, Babylonian Exile.", "isCorrect": false, "rationale": "Abraham (covenant) came before Moses (Torah), and both preceded Solomon (First Temple) and the Babylonian Exile."}, {"text": "Abraham establishes the covenant, Moses leads the Exodus, King David unifies the kingdom, destruction of the Second Temple.", "isCorrect": true, "rationale": "This sequence is correct: Abraham's covenant (origins), Moses and the Exodus (centuries later), David's monarchy (around 1000 BCE), and the destruction of the Second Temple (70 CE) is the final event listed."}, {"text": "King Solomon builds the First Temple, Abraham receives God's call, Moses leads the Exodus, Persian king Cyrus permits return.", "isCorrect": false, "rationale": "Abraham's call and Moses's Exodus occurred well before Solomon built the First Temple."}, {"text": "The Exodus from Egypt, the giving of the Torah at Sinai, the destruction of the First Temple, King David's reign.", "isCorrect": false, "rationale": "King David's reign occurred before the destruction of the First Temple, and Abraham's covenant preceded the Exodus."}]}, {"question": "The text describes the 40 years of wandering in the wilderness as 'a period of formation and testing.' What does this imply about its significance beyond simply a journey?", "options": [{"text": "It indicates a punitive sentence from God for the Israelites' disobedience, unrelated to their identity.", "isCorrect": false, "rationale": "While there might have been elements of consequence, the phrase 'formation and testing' implies a developmental and purposeful period for shaping the people, not just punishment."}, {"text": "It suggests that this time was crucial for developing the Israelites' collective identity, faith, and adherence to the covenant before entering the promised land.", "isCorrect": true, "rationale": "The terms 'formation and testing' directly imply that this period was essential for forging their identity and solidifying their commitment to the covenant before they could inhabit the land God promised to Abraham."}, {"text": "It was primarily a time for the Israelites to construct magnificent temples and cities in preparation for settlement.", "isCorrect": false, "rationale": "Wandering in the wilderness is inconsistent with building 'magnificent temples and cities.' The period was characterized by mobility and preparation, not settled construction."}, {"text": "It emphasizes the geographic challenges of the desert, rather than any spiritual or communal development.", "isCorrect": false, "rationale": "While geographic challenges were present, the phrase 'formation and testing' points to internal, spiritual, and communal development, not just physical hardship."}]}, {"question": "What common thread connects the Babylonian Exile (586 BCE) and the destruction of the Second Temple (70 CE) in terms of their impact on the Jewish people?", "options": [{"text": "Both events led to the complete cessation of Jewish worship and the abandonment of their religious identity.", "isCorrect": false, "rationale": "The text states the 'crisis deepened the tradition' after the First Temple and Jewish life 'reconstituted itself' after the Second, indicating continuity, not cessation or abandonment."}, {"text": "Both were followed by immediate and successful military revolts that restored Jewish sovereignty and Temple worship.", "isCorrect": false, "rationale": "The Babylonian Exile ended with permission from the Persian king, not an immediate successful military revolt. The destruction of the Second Temple followed a Jewish revolt that was crushed, not successful, and the Temple was not rebuilt."}, {"text": "Both resulted in the scattering of Jewish people (Diaspora) and necessitated a redefinition of how Jewish life and tradition would be maintained without a central Temple.", "isCorrect": true, "rationale": "The text states the Diaspora 'beginning with the Babylonian exile and accelerating after 70' and describes how Jewish life 'reconstituted itself' and traditions were carried 'in texts, in memory, and in practice' after the Temples were gone. This option accurately captures the dual impact."}, {"text": "Both events primarily impacted agricultural practices, leading to new laws about land use and taxation.", "isCorrect": false, "rationale": "While aspects of life were affected, the text emphasizes the 'theological crisis' and the shift in the 'center of Jewish life' away from the Temple, not primarily agricultural impacts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
