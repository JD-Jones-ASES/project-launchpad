<script>
var QUESTIONS = [{"question": "According to Karl Marx, what is the most fundamental aspect of a human being, distinguishing his analysis from those focusing on beliefs or feelings?", "options": [{"text": "Their social relationships within a community.", "isCorrect": false, "rationale": "While social relationships are important in Marx's broader theory, the text explicitly states that Marx began his analysis not with social relationships, but with 'what we do -- specifically, what we produce,' emphasizing labor as the most fundamental aspect."}, {"text": "Their labor: the way they engage with the material world to meet needs and express creativity.", "isCorrect": true, "rationale": "The text states: 'For Marx, the most fundamental thing about a human being is not their soul, their social relationships, or their beliefs about God. It is their labor: the way they engage with the material world to meet their needs and express their creativity.'"}, {"text": "Their innate capacity for moral reasoning and ethical decision-making.", "isCorrect": false, "rationale": "The provided text does not mention moral reasoning or ethical decision-making as Marx's fundamental starting point for understanding human nature. Instead, it focuses on 'what we do' and 'what we produce' (labor)."}, {"text": "Their spiritual connection to a higher power or transcendent reality.", "isCorrect": false, "rationale": "Marx explicitly did not begin his analysis by asking what we believe or feel, and the text mentions that 'beliefs about God' were not the most fundamental thing for him, rather it was labor."}], "id": "q01"}, {"question": "Which of the following best defines Marx's concept of 'species-being' (Gattungswesen)?", "options": [{"text": "The instinctual drive to reproduce and ensure the survival of the human species.", "isCorrect": false, "rationale": "Marx explicitly contrasts human 'species-being' with instinctual activity, using the bee as an example of an animal driven solely by instinct. Humans, in contrast, produce consciously and freely."}, {"text": "The capacity for free, conscious, and creative labor that allows humans to imagine and transform the world.", "isCorrect": true, "rationale": "The text defines 'species-being' as 'the characteristic activity that defines the human species,' specifically 'free, conscious, creative labor' which distinguishes humans from animals, exemplified by the architect who imagines before building."}, {"text": "The universal human desire for social recognition and belonging within a community.", "isCorrect": false, "rationale": "While relevant to human experience, the concept of 'species-being' as defined in the text focuses specifically on the unique human capacity for conscious and creative production, not primarily on social recognition or belonging."}, {"text": "The collective consciousness shared by all members of a particular society or culture.", "isCorrect": false, "rationale": "The text does not associate 'species-being' with collective consciousness in the sociological sense, but rather with the fundamental, inherent nature of *individual* human beings as producers."}], "id": "q02"}, {"question": "The analogy of a human architect building a structure in imagination before realizing it in the world, compared to a bee building a hive purely by instinct, primarily serves to illustrate which Marxist concept?", "options": [{"text": "The historical evolution of human technology and craftsmanship.", "isCorrect": false, "rationale": "While it touches on production, the primary purpose of the analogy is not to trace technological history but to highlight a fundamental difference in how humans and animals engage in creation."}, {"text": "The inherent superiority of human intelligence over animal instinct.", "isCorrect": false, "rationale": "While the analogy does highlight a difference, its main point is not to establish 'superiority' but to define the *nature* of human activity as distinct from animal activity, specifically in relation to conscious and free production."}, {"text": "The distinction between human labor as free and conscious, and animal activity as purely instinctual, defining 'species-being'.", "isCorrect": true, "rationale": "The text explicitly uses this analogy to explain 'species-being,' stating, 'What distinguishes humans from other animals, Marx argued, is that we produce consciously and freely, not merely from instinct. A human architect first builds the structure in imagination, then realizes it in the world. This free, conscious, creative labor -- Gattungswesen -- is what makes us distinctively human.'"}, {"text": "The capitalist division of labor, where some plan and others execute without thought.", "isCorrect": false, "rationale": "The analogy is used to define the fundamental human characteristic (species-being) before discussing capitalism's distortions. It's about inherent human nature, not the specific organization of labor under capitalism."}], "id": "q03"}, {"question": "Based on Marx's ideal vision, what should be the fundamental nature and purpose of work for human beings?", "options": [{"text": "Primarily a means to accumulate wealth and secure a comfortable lifestyle.", "isCorrect": false, "rationale": "While work provides sustenance, Marx's ideal vision of labor goes beyond mere economic gain; it emphasizes dignity, creativity, and self-realization, contrasting sharply with the capitalist focus on accumulating capital."}, {"text": "A source of dignity, creativity, and self-realization.", "isCorrect": true, "rationale": "The text states: 'Work, in Marx's vision, should be a source of dignity, creativity, and self-realization.' This aligns with his concept of 'species-being' where free, conscious, purposeful production defines humanity."}, {"text": "A necessary obligation to contribute to the collective good of society.", "isCorrect": false, "rationale": "While contributing to society is a component of a well-functioning community, Marx's primary emphasis on labor's ideal nature is on individual fulfillment, creativity, and self-expression, not just obligation."}, {"text": "A disciplined routine that fosters order and stability in one's life.", "isCorrect": false, "rationale": "The text highlights creativity and self-realization as core aspects of ideal labor, which are not primarily associated with routine, order, and stability, especially in contrast to the monotonous labor described under capitalism."}], "id": "q04"}, {"question": "The excerpt from *The Communist Manifesto* describes the modern working class (proletarians) as becoming an 'appendage of the machine' whose work has 'lost all individual character'. This description most strongly illustrates which form of alienation Marx identified?", "options": [{"text": "Alienation from the product of labor.", "isCorrect": false, "rationale": "Alienation from the product refers to the worker not owning or controlling what they produce. While related, the excerpt specifically focuses on the nature of the *work itself* and the worker's experience."}, {"text": "Alienation from other human beings.", "isCorrect": false, "rationale": "Alienation from other human beings refers to competition and stunted solidarity. The excerpt focuses on the individual worker's experience of their work, not their relationships with others."}, {"text": "Alienation from species-being.", "isCorrect": true, "rationale": "The text describes alienation from species-being as the worker being 'cut off from the free, creative, conscious labor that defines genuine humanity and reduced to working like an animal.' The Manifesto's description of work losing 'individual character' and the worker becoming an 'appendage of the machine' directly reflects this loss of creative, humanizing labor."}, {"text": "Alienation from the process of labor.", "isCorrect": false, "rationale": "While the loss of charm and becoming an appendage of the machine certainly relates to the process of labor, the description goes deeper to the fundamental loss of *human* character in work, which is more precisely captured by 'alienation from species-being.' The process being compelled and exhausting is part of it, but the loss of 'individual character' points to the degradation of human essence."}], "id": "q05"}, {"question": "A factory worker spends their entire shift repeatedly performing a single, highly specialized task on an assembly line, without understanding how their individual contribution fits into the final product, nor having any say in the production methods. Which two forms of alienation, according to Marx, are most clearly illustrated in this scenario?", "options": [{"text": "Alienation from the product and alienation from other human beings.", "isCorrect": false, "rationale": "While alienation from the product is plausible (not knowing the final product implies lack of ownership), the primary focus of the scenario is on the nature of the work itself and the worker's lack of control, not on competition with other workers."}, {"text": "Alienation from the process and alienation from species-being.", "isCorrect": true, "rationale": "The worker performing a 'single, highly specialized task' with no say in methods reflects 'alienation from the process' (not free and self-directed). The loss of understanding of their contribution and repetitive nature also implies a reduction from 'free, creative, conscious labor,' indicating 'alienation from species-being.'"}, {"text": "Alienation from species-being and alienation from other human beings.", "isCorrect": false, "rationale": "Alienation from species-being is clearly present due to the reduction of human work to a monotonous task. However, the scenario does not describe conditions of competition or stunted solidarity with other workers, making 'alienation from other human beings' less directly illustrated than 'alienation from the process.'"}, {"text": "Alienation from the product and alienation from the process.", "isCorrect": false, "rationale": "Alienation from the product (not understanding how their contribution fits) is suggested. However, the 'single, highly specialized task' and lack of say in methods are prime examples of alienation from the process, and the *implication* that this kind of work strips away human creativity makes 'alienation from species-being' a more encompassing and accurate pairing with 'alienation from the process' given the depth of degradation described."}], "id": "q06"}, {"question": "According to Marx, what is the 'cure' for the 'disease' of alienation caused by industrial capitalism?", "options": [{"text": "Increased worker benefits and improved labor conditions within the capitalist system.", "isCorrect": false, "rationale": "While these might mitigate some suffering, Marx's solution is radical: he argues for the 'abolition of the conditions that produce alienation,' not merely reforms within the existing capitalist framework."}, {"text": "The restoration of individual entrepreneurship and small-scale artisanal production.", "isCorrect": false, "rationale": "Marx's prescription involves 'collective control of the workers,' not a return to individual private ownership, which is still a form of private capital."}, {"text": "A revolution transferring the means of production from private capitalists to collective worker control.", "isCorrect": true, "rationale": "The text explicitly states: 'If alienation is the disease, then the abolition of the conditions that produce alienation is the cure. The revolution that transfers the means of production from private capitalists to the collective control of the workers is not, for Marx, merely an economic reform. It is the restoration of full humanity.'"}, {"text": "Government regulation to ensure fair wages and equitable distribution of profits.", "isCorrect": false, "rationale": "Similar to increased benefits, government regulation is a reformist approach within capitalism, whereas Marx advocated for a fundamental systemic change—the overthrow of capitalism itself and collective ownership of the means of production."}], "id": "q07"}, {"question": "In Marx's utopian vision of a communist society, as described in the Paris Manuscripts, what characterizes human labor and life?", "options": [{"text": "Strict specialization, with each person dedicating their life to a single, highly efficient profession.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'a society in which labor is truly free, in which no human being is reduced to a single function, in which each person can hunt in the morning, fish in the afternoon, rear cattle in the evening, 'criticize after dinner.'' This emphasizes versatility, not specialization."}, {"text": "A universal obligation to perform manual labor for the collective good, without personal choice.", "isCorrect": false, "rationale": "The vision describes labor as 'truly free,' implying choice and self-direction, not a compulsory, undifferentiated obligation, which would still constitute a form of alienation from the process."}, {"text": "Labor that is truly free, allowing individuals to engage in diverse activities and avoid being reduced to a single function.", "isCorrect": true, "rationale": "The text describes a communist society as one 'in which labor is truly free, in which no human being is reduced to a single function, in which each person can hunt in the morning, fish in the afternoon, rear cattle in the evening, 'criticize after dinner.'' This directly supports the idea of diverse and free labor."}, {"text": "The complete abolition of all forms of work, replaced by leisure and intellectual pursuits.", "isCorrect": false, "rationale": "Marx's vision is not the abolition of work, but the transformation of work into something dignified and fulfilling, a central part of human self-realization, not something to be avoided entirely."}], "id": "q08"}, {"question": "The text describes Marx's vision of a communist society as 'humanistic.' What does this term primarily imply about his ultimate goal?", "options": [{"text": "It prioritizes intellectual and artistic development over material production.", "isCorrect": false, "rationale": "While intellectual pursuits are mentioned in the utopian vision, Marx's entire analysis begins with material production (labor). 'Humanistic' in this context relates to the restoration of human dignity and flourishing in all aspects, including labor, not a de-emphasis on material production."}, {"text": "It is grounded in a profound concern for human dignity and flourishing.", "isCorrect": true, "rationale": "The text concludes by stating, 'That the vision is humanistic -- grounded in a profound concern for human dignity and flourishing -- is difficult to deny.' This directly defines the meaning of 'humanistic' in relation to Marx's project."}, {"text": "It rejects religious or spiritual interpretations of human existence.", "isCorrect": false, "rationale": "While Marx's philosophy is atheistic, the term 'humanistic' in this context specifically refers to his concern for human well-being and potential, not primarily his stance on religion, which is not the focus of this particular statement in the text."}, {"text": "It advocates for a return to simpler, pre-industrial forms of social organization.", "isCorrect": false, "rationale": "Marx's solution involves collective control of advanced means of production, not a retreat from industrialization. The 'humanistic' label points to the *purpose* of the societal change, which is the well-being of humanity, not the specific technological stage."}], "id": "q09"}, {"question": "How did Marx's concept of 'historical materialism' differ from Hegel's philosophical view of history, despite being influenced by him?", "options": [{"text": "Marx believed history moved towards a cyclical repetition of events, unlike Hegel's linear progression.", "isCorrect": false, "rationale": "Marx retained Hegel's idea of history moving through 'conflict and resolution toward an ultimate destination,' indicating a linear, progressive view, not cyclical repetition."}, {"text": "Marx saw history as the unfolding of material conditions and the struggle over the means of production, rather than the unfolding of ideas.", "isCorrect": true, "rationale": "The text explains: 'where Hegel saw history as the unfolding of ideas, Marx saw it as the unfolding of material conditions -- the struggle over who controls the means of production. This approach is called historical materialism.'"}, {"text": "Marx rejected the idea of conflict as a driver of historical change, favoring peaceful evolution.", "isCorrect": false, "rationale": "Marx was influenced by Hegel's idea of history moving through 'conflict and resolution,' and his theory of class struggle is central to this, indicating he certainly saw conflict as a driver."}, {"text": "Marx focused on individual actions shaping history, whereas Hegel emphasized collective societal movements.", "isCorrect": false, "rationale": "Both Marx and Hegel engaged with grand, collective historical movements. Marx's 'historical materialism' particularly emphasizes class struggle, which is a collective societal movement, not primarily individual actions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
