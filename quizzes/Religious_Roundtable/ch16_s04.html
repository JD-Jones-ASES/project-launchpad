<script>
var QUESTIONS = [{"question": "According to the provided text, what does Buddhism primarily identify as the root cause of human suffering?", "options": [{"text": "Unjust economic arrangements leading to exploitation.", "isCorrect": false, "rationale": "This is the Communist diagnosis of suffering, not the Buddhist one. Buddhism focuses on internal states, not external structures."}, {"text": "The cosmic inevitability of death and fate.", "isCorrect": false, "rationale": "This is the Norse Pagan perspective on suffering, which locates it in the cosmos itself, not within the individual's mind as Buddhism does."}, {"text": "The craving, grasping, clinging mind mistaking impermanence for permanence.", "isCorrect": true, "rationale": "The text explicitly states: 'Buddhism locates the root of suffering within the individual: in the craving, grasping, clinging mind that mistakes impermanent things for permanent satisfactions.'"}, {"text": "Social structures that create alienation among individuals.", "isCorrect": false, "rationale": "While social factors are not irrelevant, Buddhism's primary focus is not on social structures but on the individual's internal mind. This aligns more with Communist thought regarding alienation."}]}, {"question": "The Norse Pagan tradition, as described in the text, offers what 'prescription' for suffering?", "options": [{"text": "A systematic transformation of one's thinking and actions to achieve liberation.", "isCorrect": false, "rationale": "This describes the Buddhist Eightfold Path, which aims for individual liberation. Norse Paganism does not offer a path to liberation from suffering."}, {"text": "Revolution to dismantle oppressive economic systems and achieve a classless society.", "isCorrect": false, "rationale": "This is the Communist prescription, focusing on structural change rather than cosmic acceptance or individual dignity."}, {"text": "A counsel of dignity: facing one's fate with courage and living a memorable life without expecting escape.", "isCorrect": true, "rationale": "The text states: 'The Norse 'prescription' is therefore not a path to liberation at all -- it is a counsel of dignity: face your wyrd with courage, live so that your deeds are worth remembering, and do not pretend that the world owes you an escape from what it is.'"}, {"text": "Seeking comfort in religious rituals to dull the pain of inevitable hardship.", "isCorrect": false, "rationale": "While comfort might be a byproduct, the Norse 'prescription' emphasizes active courage and dignified living, not passive dulling of pain, and it's distinct from Marx's 'opium of the people' critique."}]}, {"question": "From a Communist perspective, as presented in the text, why is it considered a 'cruel distraction' to tell a suffering worker to meditate or develop courage?", "options": [{"text": "Because spiritual practices are inherently evil and lead to more suffering.", "isCorrect": false, "rationale": "The text does not state that spiritual practices are inherently evil; rather, it critiques their application as a solution to *structural* problems."}, {"text": "Because the problem is structural (economic arrangements), and individual inward solutions ignore the true cause.", "isCorrect": true, "rationale": "The text explains Marx's view: 'The diagnosis is structural: suffering is produced by economic arrangements... The prescription must therefore be structural.' Individual solutions are seen as distractions that 'dull the pain without curing the disease.'"}, {"text": "Because meditation and courage are ineffective against cosmic fate.", "isCorrect": false, "rationale": "This relates to the Norse perspective on cosmic fate, not the Communist critique of individual solutions to economic problems."}, {"text": "Because workers are too busy to engage in such personal development.", "isCorrect": false, "rationale": "While practical constraints might exist, Marx's critique is fundamentally about the *misdiagnosis* of the problem, not merely a lack of time for individual practices."}]}, {"question": "Which of the following statements most accurately reflects a core difference in the primary site of intervention between Buddhism and Communism?", "options": [{"text": "Buddhism focuses on changing the individual mind, while Communism focuses on transforming economic systems.", "isCorrect": true, "rationale": "Buddhism's 'prescription is correspondingly inward: the Eightfold Path is a systematic transformation of how one thinks...' while Communism's 'prescription must therefore be structural: revolution, the abolition of private ownership...'"}, {"text": "Buddhism seeks to accept cosmic fate, while Communism aims for individual liberation.", "isCorrect": false, "rationale": "Accepting cosmic fate is characteristic of Norse Paganism, not Buddhism. Communism aims for societal liberation from exploitation, not primarily individual spiritual liberation."}, {"text": "Both traditions primarily seek to alleviate suffering through collective social action.", "isCorrect": false, "rationale": "Communism does, but Buddhism's primary focus is individual transformation, not collective social action, although it acknowledges the social world."}, {"text": "Both traditions emphasize individual spiritual growth as the ultimate solution.", "isCorrect": false, "rationale": "Buddhism emphasizes individual spiritual growth, but Communism explicitly denies that the root of suffering is inward and focuses on structural change."}]}, {"question": "A community is devastated by a natural disaster, leading to widespread grief, loss, and fear of death. While other traditions might suggest cultivating inner peace or rebuilding societal infrastructure, which tradition's core approach, as described, would uniquely emphasize accepting the inherent lack of safety in the cosmos as a fundamental reality?", "options": [{"text": "Buddhism, by teaching individuals to overcome their craving for safety.", "isCorrect": false, "rationale": "While Buddhism addresses craving, its focus would be on the individual's mental response to loss, not on the cosmic inevitability itself as the primary diagnosis for such an event."}, {"text": "Norse Paganism, by counseling dignity and courage in the face of inevitable fate.", "isCorrect": true, "rationale": "The text states Norse Paganism 'locates suffering... in the cosmos itself: fate is woven before birth... even the most just and courageous life ends in death. The Norse 'prescription' is... a counsel of dignity: face your wyrd with courage...' This directly addresses suffering from cosmic events by accepting them."}, {"text": "Communism, by advocating for revolutionary changes to prevent future disasters.", "isCorrect": false, "rationale": "Communism focuses on suffering caused by economic arrangements and exploitation, not natural disasters, and its solution is structural change to human society, not acceptance of cosmic reality."}, {"text": "All three traditions, as they equally emphasize the acceptance of cosmic suffering.", "isCorrect": false, "rationale": "Only Norse Paganism primarily attributes suffering to cosmic fate and advocates acceptance. Buddhism and Communism have different primary diagnoses and prescriptions."}]}, {"question": "The text identifies a 'deepest disagreement' among the three traditions. What is this fundamental question?", "options": [{"text": "Is liberation from suffering truly possible, or is it an illusion?", "isCorrect": false, "rationale": "While this is a related philosophical question, the text specifically identifies a different 'deepest disagreement' regarding the *source* of suffering."}, {"text": "What is the primary source of human suffering: inside us, outside us, or built into the structure of reality itself?", "isCorrect": true, "rationale": "The text explicitly states: 'Here is the deepest disagreement: Is the primary source of human suffering inside us, outside us, or built into the structure of reality itself?'"}, {"text": "Which specific deity or cosmic force is responsible for creating suffering?", "isCorrect": false, "rationale": "The traditions discuss the *nature* or *location* of suffering's root, not necessarily assigning blame to specific deities, especially given Communism's secular perspective."}, {"text": "Should religious practice be individual or communal?", "isCorrect": false, "rationale": "This is a question about the *mode* of practice, not the fundamental diagnosis of suffering itself."}]}, {"question": "According to the text, if one believes that suffering is 'simply woven into the nature of a cosmos that does not promise safety even for the gods,' what is the most important thing to do?", "options": [{"text": "Work diligently to transform one's inner craving and attachment.", "isCorrect": false, "rationale": "This is the Buddhist prescription for suffering rooted in individual craving, not for cosmic suffering."}, {"text": "Organize for social revolution to change the economic system.", "isCorrect": false, "rationale": "This is the Communist prescription for suffering rooted in economic exploitation, not for cosmic suffering."}, {"text": "Live with honesty and courage, and stop expending energy on escape plans.", "isCorrect": true, "rationale": "The text states: 'And if suffering is simply woven into the nature of a cosmos that does not promise safety even for the gods -- then perhaps the most important thing is to live with honesty and courage, and to stop spending energy on escape plans that will never work.'"}, {"text": "Seek divine intervention to alter cosmic fate.", "isCorrect": false, "rationale": "The Norse tradition described emphasizes accepting fate with dignity, not seeking to change it through divine intervention, especially since even the gods are subject to this fate."}]}, {"question": "Karl Marx's concept of religion as the 'opium of the people' is presented in the context of Communism. What does this metaphor signify in the given text?", "options": [{"text": "That religion is a dangerous drug that directly causes societal suffering.", "isCorrect": false, "rationale": "The metaphor implies it's a comfort that *dulls pain*, not a direct cause of it. The cause is structural economic arrangements."}, {"text": "That religious practices provide comfort that dulls the pain of suffering without addressing its structural causes.", "isCorrect": true, "rationale": "The text explains it as 'a comfort that dulls the pain without curing the disease,' implying it distracts from the true, structural causes of suffering."}, {"text": "That religion is a legitimate and effective path to spiritual liberation.", "isCorrect": false, "rationale": "From a Communist perspective, as presented, religion is seen as a distraction from the real, material solutions to suffering, not a legitimate path to liberation."}, {"text": "That religious beliefs are fundamentally incorrect and should be abolished.", "isCorrect": false, "rationale": "While the Communist perspective might dismiss religious diagnoses, the 'opium' metaphor focuses on its *function* as a painkiller that prevents addressing root causes, rather than simply stating it's 'incorrect.'"}]}, {"question": "Regarding whether the diagnoses of suffering are 'mutually exclusive,' what does the text suggest is possible for practitioners of these traditions?", "options": [{"text": "They are entirely contradictory and cannot be reconciled.", "isCorrect": false, "rationale": "The text explicitly introduces a discussion about whether they are 'mutually exclusive' and then gives examples of how they *can* coexist or acknowledge other perspectives."}, {"text": "While their primary diagnoses differ, aspects of their approaches can coexist or acknowledge other perspectives.", "isCorrect": true, "rationale": "The text provides examples: 'A Buddhist could acknowledge that unjust economic structures make the Eightfold Path harder... A Marxist could acknowledge that even a perfectly just economic system would not eliminate grief... And a practitioner of Norse tradition might say that both inward cultivation and outward resistance to injustice can coexist with the acceptance of ultimate fate...'"}, {"text": "Only one diagnosis can ultimately be correct, rendering the others false.", "isCorrect": false, "rationale": "This contradicts the examples given in the text about how practitioners can find common ground or acknowledge other truths."}, {"text": "The text implies they are all fundamentally the same in their ultimate goals.", "isCorrect": false, "rationale": "The text highlights 'stark contrasts' and a 'deepest disagreement,' indicating they are not fundamentally the same, even if aspects can coexist."}]}, {"question": "Which of the following accurately describes a fundamental contrast between the Buddhist and Norse Pagan approaches to the possibility of ultimate escape from suffering?", "options": [{"text": "Buddhism offers a path to individual liberation (nirvana), whereas Norse Paganism counsels dignity in the face of an inescapable, fated reality without liberation.", "isCorrect": true, "rationale": "The text states: 'Liberation (nirvana) is achieved by the individual practitioner...' for Buddhism. For Norse Paganism: 'The Norse 'prescription' is therefore not a path to liberation at all -- it is a counsel of dignity...'"}, {"text": "Buddhism seeks to change the external social world, while Norse Paganism focuses on internal spiritual transformation.", "isCorrect": false, "rationale": "This reverses the core focus: Buddhism is primarily inward, while Norse focuses on cosmic reality (external to the individual's control), and neither primarily seeks to change the *social world* in the way Communism does."}, {"text": "Buddhism sees suffering as rooted in cosmic forces, while Norse Paganism attributes it to individual psychological states.", "isCorrect": false, "rationale": "This statement is the inverse of what the text describes. Buddhism roots suffering in individual mental states (craving), while Norse Paganism roots it in cosmic fate."}, {"text": "Buddhism and Norse Paganism both primarily emphasize revolution against oppressive structures as the path to freedom.", "isCorrect": false, "rationale": "Revolution against oppressive structures is characteristic of Communism, not Buddhism or Norse Paganism, which have individual/inward and cosmic/acceptance approaches, respectively."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
