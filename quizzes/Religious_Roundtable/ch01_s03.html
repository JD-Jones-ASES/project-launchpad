    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The textbook describes the Bible as 'better understood as a library' rather than a single book. What primary characteristic supports this description?", "options": [{"text": "It was written in a single language by many authors.", "isCorrect": false, "rationale": "The text states the Bible was written in three languages (Hebrew, Aramaic, and Greek), not a single language."}, {"text": "It contains a wide variety of literary genres and authors over a long period.", "isCorrect": true, "rationale": "The text explicitly states it's 'sixty-six books... or seventy-three books, written over roughly a thousand years, in three languages... by dozens of authors ranging from kings to fishermen,' containing 'law, history, poetry, prophecy, biography, letter-writing, and apocalyptic vision,' which all support the 'library' metaphor."}, {"text": "It is exclusively a collection of historical accounts and laws.", "isCorrect": false, "rationale": "While it contains history and law, the text also mentions poetry, prophecy, biography, letter-writing, and apocalyptic vision, making 'exclusively' incorrect."}, {"text": "Its unity is derived from having a single, identifiable author.", "isCorrect": false, "rationale": "The text explicitly states its unity lies 'not in a single author but in a single subject: the relationship between God and humanity.'"}]}, {"question": "According to the text, which of the following statements accurately reflects a difference in the number of books between Protestant and Catholic Bibles?", "options": [{"text": "The Protestant canon includes more books in the Old Testament due to the Apocrypha.", "isCorrect": false, "rationale": "The text states the Catholic canon includes the Deuterocanon or Apocrypha, which are additional works not typically found in the Protestant Old Testament, meaning the Catholic canon has more."}, {"text": "The Catholic canon contains more books overall, primarily due to additional works in the Old Testament.", "isCorrect": true, "rationale": "The text specifies 'sixty-six books (by the Protestant count) or seventy-three books (by the Catholic count)' and that the Old Testament contains 'thirty-nine books in the Protestant canon' and 'forty-six in the Catholic canon, including additional works called the Deuterocanon or Apocrypha.' This confirms the Catholic canon has more books due to the Old Testament additions."}, {"text": "Both canons agree on the exact number of books in the Old Testament but differ in the New Testament.", "isCorrect": false, "rationale": "The text states the Old Testament count differs (39 Protestant, 46 Catholic), while the New Testament count is consistently 27 books across both traditions mentioned."}, {"text": "The New Testament count varies significantly between the two traditions, while the Old Testament count is consistent.", "isCorrect": false, "rationale": "This statement is the inverse of what the text says; the New Testament count is consistent (27 books), while the Old Testament count varies."}]}, {"question": "Which of the following best characterizes the content and focus of the Old Testament as described in the text?", "options": [{"text": "It primarily narrates the life, teachings, death, and resurrection of Jesus Christ.", "isCorrect": false, "rationale": "This describes the primary focus of the New Testament Gospels, not the Old Testament."}, {"text": "It records God's relationship with the people of Israel, including creation stories, prophets, and their history.", "isCorrect": true, "rationale": "The text explicitly states the Old Testament books 'record God's relationship with the people of Israel: the creation story, the stories of Abraham, Moses, and the prophets, the psalms of David, and the long, painful, hopeful history of a people who understood themselves as chosen by God.'"}, {"text": "It consists mainly of letters written by early Christian leaders to various communities.", "isCorrect": false, "rationale": "These are the epistles found in the New Testament, not the Old Testament."}, {"text": "Its central theme is a densely symbolic vision of cosmic history, puzzling readers for millennia.", "isCorrect": false, "rationale": "This describes the Book of Revelation, which is part of the New Testament."}]}, {"question": "Beyond the four Gospels, what other major categories of texts comprise the New Testament, according to the section?", "options": [{"text": "The Psalms of David, the Deuterocanon, and early prophetic books.", "isCorrect": false, "rationale": "These are all components or categories found within the Old Testament or Apocrypha, not the New Testament."}, {"text": "The Tanakh, the Apocrypha, and ancient laws.", "isCorrect": false, "rationale": "The Tanakh is another name for the Hebrew Bible (Old Testament), and the Apocrypha are additional Old Testament works; ancient laws are also primarily Old Testament content."}, {"text": "The Acts of the Apostles, epistles from early Christian leaders, and the Book of Revelation.", "isCorrect": true, "rationale": "The text states, 'Beyond the Gospels, the New Testament contains the Acts of the Apostles (the story of the early church), a collection of epistles (letters written by Paul and other early leaders to young Christian communities), and the Book of Revelation.'"}, {"text": "The creation story, stories of Abraham, and accounts of Moses.", "isCorrect": false, "rationale": "These stories are found in the Old Testament, specifically Genesis and other early books."}]}, {"question": "The text states that the four Gospels 'are not identical biographies; they approach Jesus from different angles and for different audiences.' What is the most significant implication of this statement for biblical scholarship?", "options": [{"text": "It suggests that only one of the Gospels can be considered historically accurate, requiring scholars to identify the definitive account.", "isCorrect": false, "rationale": "The text states 'scholars have long found the differences as illuminating as the agreements,' implying that the differences are not necessarily contradictions negating accuracy but rather different perspectives that add to understanding, not diminish it to a single 'definitive' account."}, {"text": "It implies that studying the agreements between Gospels is more important than studying their differences to understand Jesus.", "isCorrect": false, "rationale": "The text explicitly states 'scholars have long found the differences as illuminating as the agreements,' indicating both are equally valuable, not one more important than the other."}, {"text": "It highlights the value of analyzing the unique perspectives and intended audiences of each Gospel to gain a richer understanding of Jesus.", "isCorrect": true, "rationale": "By noting they 'approach Jesus from different angles and for different audiences' and that 'scholars have long found the differences as illuminating as the agreements,' the text emphasizes that understanding these distinct perspectives enriches comprehension of Jesus rather than hindering it."}, {"text": "It means that early Christians struggled to agree on a single narrative, leading to a fragmented understanding of Jesus's life.", "isCorrect": false, "rationale": "The text presents the different Gospels as intentional approaches for different audiences, not as a result of a 'struggle to agree' or a 'fragmented understanding,' but rather a multifaceted one."}]}, {"question": "If an archaeologist were to discover a Christian text from the second century CE that narrated a teaching of Jesus but was not included in the modern 27-book New Testament canon, what conclusion could be drawn based on the text's description of canon formation?", "options": [{"text": "The text was likely suppressed by early church leaders who disagreed with its theological content.", "isCorrect": false, "rationale": "While theological disagreement could be a reason for exclusion, the text primarily emphasizes that 'Early Christians circulated many texts; not all were accepted everywhere' and that the canon formation was a 'gradual process' of selection, not necessarily 'suppression' due to disagreement."}, {"text": "It represents a text that was circulated among early Christians but ultimately not recognized as authoritative scripture by the late fourth century councils.", "isCorrect": true, "rationale": "The text explains that 'Early Christians circulated many texts; not all were accepted everywhere' and that 'By the late fourth century, councils of bishops... ratified the twenty-seven-book New Testament.' Therefore, a second-century circulating text not in the final canon would be one of those that circulated but was not included in the ratified collection."}, {"text": "Its existence proves that the Council of Carthage made an error in its selection process, as it should have included all circulating texts.", "isCorrect": false, "rationale": "The purpose of the councils was to *ratify* a specific collection, meaning they were making choices. The text does not suggest their selections were 'errors' but rather the culmination of a 'gradual process.'"}, {"text": "This text was probably written much later than the first century and thus could not be part of the original New Testament.", "isCorrect": false, "rationale": "The text states the New Testament books were 'written in the first century by followers of Jesus,' but other texts were 'circulated' by 'early Christians,' which would include second-century writings. Its exclusion from the canon is not necessarily due to a later writing date, but due to not being chosen for the final collection."}]}, {"question": "Christians argue the Bible's unity lies 'not in a single author but in a single subject.' What is this unifying subject?", "options": [{"text": "The chronological history of the ancient Near East.", "isCorrect": false, "rationale": "While the Bible contains historical accounts, its overarching unity, as described, is not limited to mere chronology or geographic region but a deeper theological theme."}, {"text": "The relationship between God and humanity, moving from creation through redemption.", "isCorrect": true, "rationale": "The text explicitly states: 'Its unity, Christians argue, lies not in a single author but in a single subject: the relationship between God and humanity, moving from creation through fall through redemption toward restoration.'"}, {"text": "The detailed biographies of kings, prophets, and early Christian leaders.", "isCorrect": false, "rationale": "Biographies are a part of the Bible's content, but they are elements within the larger unifying subject of God's relationship with humanity."}, {"text": "The linguistic evolution of Hebrew, Aramaic, and Greek in religious texts.", "isCorrect": false, "rationale": "The languages of composition are a descriptive characteristic of the Bible, not its unifying thematic subject."}]}, {"question": "A contemporary Christian believes that understanding the Bible requires not only reading the text itself but also consulting the teaching authority of the Church and established Church traditions. This interpretive approach is characteristic of which Christian tradition?", "options": [{"text": "The Protestant principle of *sola scriptura*.", "isCorrect": false, "rationale": "Sola scriptura, championed by the Protestant Reformation, emphasizes 'Scripture alone as the ultimate authority,' implying a primary focus on the text itself, often distinct from reliance on Church tradition and teaching authority."}, {"text": "The Eastern Orthodox emphasis on the community that produced the Bible.", "isCorrect": false, "rationale": "While Eastern Orthodoxy insists 'that Scripture and the ancient tradition of the Church are inseparable,' the specific mention of 'teaching authority' and 'established Church doctrines' aligns more directly with the magisterium described for Roman Catholicism."}, {"text": "Roman Catholicism's use of Church tradition and the magisterium.", "isCorrect": true, "rationale": "The text states, 'Roman Catholics read it through the lens of Church tradition and the teaching authority (the magisterium) of the Church's hierarchy.' This perfectly matches the scenario described."}, {"text": "A democratized biblical interpretation leading to diverse conclusions.", "isCorrect": false, "rationale": "This describes a *consequence* of the Protestant *sola scriptura* approach, which decentralized interpretive authority, rather than a specific interpretive methodology that relies on centralized Church authority and tradition."}]}, {"question": "The Protestant Reformation championed *sola scriptura* as a principle. What was a direct consequence of this shift in biblical interpretation?", "options": [{"text": "It solidified a single, universally accepted interpretation of all biblical texts across Protestant denominations.", "isCorrect": false, "rationale": "The text explicitly states this shift 'democratized biblical interpretation but also produced remarkable diversity, as different readers, studying the same text seriously, reached different conclusions,' directly contradicting the idea of a single, universally accepted interpretation."}, {"text": "It centralized biblical authority within a hierarchical church structure.", "isCorrect": false, "rationale": "The text states it 'democratized biblical interpretation,' which implies decentralization of authority, moving it away from a single hierarchical structure."}, {"text": "It democratized biblical interpretation, leading to a wide diversity of conclusions among serious readers.", "isCorrect": true, "rationale": "The text states that *sola scriptura* 'democratized biblical interpretation but also produced remarkable diversity, as different readers, studying the same text seriously, reached different conclusions.'"}, {"text": "It reinforced the necessity of translating the Bible into only the original languages for accurate understanding.", "isCorrect": false, "rationale": "The 'did you know' section mentions the Bible's translation into 'more than 700 languages,' indicating a widespread effort for accessibility, not a restriction to original languages."}]}, {"question": "The 'Did You Know' section mentions the Codex Sinaiticus. What is its significance?", "options": [{"text": "It is the oldest complete manuscript of the Old Testament in Aramaic.", "isCorrect": false, "rationale": "The text specifies it is the 'oldest complete manuscript of the New Testament in Greek,' not the Old Testament in Aramaic."}, {"text": "It is a digital archive of all known biblical translations.", "isCorrect": false, "rationale": "The text refers to it as a 'manuscript,' which is a physical document, not a digital archive of all translations, though it 'can be viewed digitally online.'"}, {"text": "It is the oldest complete manuscript of the New Testament in Greek.", "isCorrect": true, "rationale": "The 'Did You Know' section explicitly states, 'The oldest complete manuscript of the New Testament in Greek, the Codex Sinaiticus, dates to approximately 330–360 and can be viewed digitally online.'"}, {"text": "It is the original handwritten draft of the Book of Revelation.", "isCorrect": false, "rationale": "It is a complete manuscript of the entire New Testament (among other things), dating to the 4th century, not the original draft of a single book written in the 1st century."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
