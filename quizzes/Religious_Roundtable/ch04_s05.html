<script>
var QUESTIONS = [{"question": "Based on the text, what is a primary reason Hinduism 'matters' beyond its large number of practitioners and long history?", "options": [{"text": "It established the first global trade routes for religious ideas.", "isCorrect": false, "rationale": "The text does not mention Hinduism establishing global trade routes for religious ideas; it focuses on its influence as a 'mother tradition' and its concepts entering global culture."}, {"text": "It is the root tradition for other major Asian religions like Buddhism and Jainism.", "isCorrect": true, "rationale": "The text explicitly states that Hinduism is the 'mother tradition' of Buddhism and Jainism, which both arose in conversation and creative tension with it."}, {"text": "It holds the oldest continuously unbroken lineage of religious leaders.", "isCorrect": false, "rationale": "While Hinduism is the 'world's oldest living religious tradition' and continuously practiced, the text does not specifically highlight an 'unbroken lineage of religious leaders' as a primary reason why it matters beyond its longevity."}, {"text": "Its philosophical texts directly influenced the founders of modern Western philosophy.", "isCorrect": false, "rationale": "The text notes that Hindu philosophy 'anticipates psychological insights developed independently in the West' and resonates with modern thinking, but it does not claim direct influence on the founders of modern Western philosophy."}], "id": "q01"}, {"question": "The text states that Buddhist concepts like karma, dharma, samsara, and liberation from rebirth have direct Hindu antecedents. What does this suggest about the relationship between Hinduism and Buddhism?", "options": [{"text": "Buddhism is simply a direct continuation of early Hindu practices without any changes.", "isCorrect": false, "rationale": "The text notes that Buddhism redefines or challenges these concepts, indicating it's not simply a direct continuation without changes."}, {"text": "Buddhism emerged as a complete rejection of all Hindu philosophical tenets.", "isCorrect": false, "rationale": "The presence of shared concepts directly contradicts the idea of a complete rejection; rather, Buddhism developed 'in conversation and sometimes in creative tension' with Hindu tradition."}, {"text": "Hinduism provided a foundational intellectual and spiritual context from which Buddhism developed, even if it later diverged.", "isCorrect": true, "rationale": "The text positions Hinduism as the 'mother tradition' and the 'seed' from which Asian religious thought grew, indicating a foundational role despite later redefinitions or challenges by Buddhism."}, {"text": "The shared concepts indicate that Hinduism adopted these ideas from a more ancient Buddhist tradition.", "isCorrect": false, "rationale": "The text clearly states these are 'Hindu antecedents' and that the Buddha was 'raised a Hindu,' indicating the influence flowed from Hinduism to Buddhism, not vice-versa."}], "id": "q02"}, {"question": "Which of the following sets of words, according to the text, demonstrates Hinduism's unrecognized contribution to global culture through its Sanskrit origins?", "options": [{"text": "Zen, Tao, Mandala, Qi", "isCorrect": false, "rationale": "While some of these are Eastern concepts, the text does not identify them as Sanskrit words from the Hindu tradition. Zen and Tao are primarily associated with other Asian traditions."}, {"text": "Karma, Guru, Yoga, Avatar", "isCorrect": true, "rationale": "The text explicitly lists 'yoga, karma, guru, mantra, avatar, nirvana, and dharma' as Sanskrit words from the Hindu tradition now used in English."}, {"text": "Nirvana, Sufi, Dervish, Muezzin", "isCorrect": false, "rationale": "Nirvana is mentioned, but Sufi, Dervish, and Muezzin are terms associated with Islamic traditions, not Hinduism, according to the text."}, {"text": "Shaman, Totem, Oracle, Taboo", "isCorrect": false, "rationale": "These terms are generally associated with indigenous or ancient cultures worldwide, not specifically listed as Sanskrit words from the Hindu tradition in this text."}], "id": "q03"}, {"question": "The text describes yoga as 'originally a rigorous spiritual discipline aimed at uniting the individual self with Brahman.' How does this original purpose contrast with its widespread modern practice?", "options": [{"text": "Modern yoga is exclusively practiced within Hindu temples, adhering strictly to its original spiritual intent.", "isCorrect": false, "rationale": "The text states yoga is 'practiced by hundreds of millions of people worldwide, mostly without any explicitly spiritual intent,' directly contradicting this option."}, {"text": "The modern practice of yoga has completely lost its connection to any physical or mental discipline.", "isCorrect": false, "rationale": "While the spiritual intent may be absent, yoga still involves physical and mental disciplines. The contrast is about the *spiritual intent*, not the complete loss of discipline."}, {"text": "While still a discipline, contemporary yoga is often practiced for physical or mental well-being, detached from its foundational spiritual goal of unification with Brahman.", "isCorrect": true, "rationale": "The text highlights that modern yoga is practiced 'mostly without any explicitly spiritual intent,' indicating a shift from its original spiritual goal towards other benefits like physical or mental well-being."}, {"text": "Modern yoga is now primarily a competitive sport, having abandoned all forms of personal discipline.", "isCorrect": false, "rationale": "The text does not suggest yoga has become primarily a competitive sport, nor does it imply abandonment of all personal discipline. The contrast is specifically about the *spiritual intent*."}], "id": "q04"}, {"question": "The Upanishadic vision of Brahman is described as resonating with modern scientific and ecological thought. What is the core characteristic of Brahman that facilitates this connection?", "options": [{"text": "Its emphasis on a personal deity interacting directly with humanity.", "isCorrect": false, "rationale": "The text describes Brahman as 'a single reality underlying all the apparent diversity of the world,' which is more an impersonal ultimate reality rather than a personal deity in the traditional sense."}, {"text": "Its concept of a divine hierarchy that structures the cosmos.", "isCorrect": false, "rationale": "The resonance with quantum physics and ecological thinking is tied to 'a single reality underlying all the apparent diversity,' not a hierarchical structure."}, {"text": "Its assertion of a unified, singular reality beneath all observed differences, aligning with interdependence and underlying physical principles.", "isCorrect": true, "rationale": "The text explicitly states that the Upanishadic vision of 'Brahman—a single reality underlying all the apparent diversity of the world—resonates with certain interpretations of quantum physics and with ecological thinking that emphasizes the interdependence of all living things.'"}, {"text": "Its focus on individual spiritual enlightenment through ascetic practices.", "isCorrect": false, "rationale": "While enlightenment is a part of Hindu goals, the specific resonance with quantum physics and ecology is attributed to the 'single reality' aspect of Brahman, not individual asceticism."}], "id": "q05"}, {"question": "According to the text, the Bhagavad Gita's insights regarding suffering and freedom 'anticipates psychological insights developed independently in the West.' What is the central psychological principle highlighted by the Gita in this context?", "options": [{"text": "The role of subconscious desires in shaping human behavior.", "isCorrect": false, "rationale": "While related, the text specifically identifies 'attachment' as the cause of suffering and 'detachment' as enabling freedom, not explicitly subconscious desires as the central principle."}, {"text": "The idea that suffering arises from attachment and freedom is found in detachment.", "isCorrect": true, "rationale": "The text directly states, 'The Bhagavad Gita's analysis of how attachment causes suffering and how detachment enables freedom anticipates psychological insights developed independently in the West.'"}, {"text": "The importance of self-actualization through individualistic pursuits.", "isCorrect": false, "rationale": "The concept of 'detachment' suggests a move away from self-centered or individualistic pursuits as a path to freedom, not their importance."}, {"text": "The necessity of external validation for mental well-being.", "isCorrect": false, "rationale": "The Gita's insights on attachment and detachment focus on internal states and liberation, not the necessity of external validation."}], "id": "q06"}, {"question": "The Hindu tradition of 'vigorous, systematic philosophical debate' through its 'great schools (darshanas)' is highlighted. What does this indicate about the intellectual character of Hindu philosophy?", "options": [{"text": "It primarily emphasized dogmatic adherence to sacred texts without critical inquiry.", "isCorrect": false, "rationale": "The phrase 'vigorous, systematic philosophical debate' and 'argued about everything' directly contradicts the idea of mere dogmatic adherence without critical inquiry."}, {"text": "It possessed a sophisticated and diverse intellectual tradition characterized by deep inquiry and rational argumentation.", "isCorrect": true, "rationale": "The text describes it as 'one of the most sophisticated intellectual traditions on earth' that 'argued about everything,' indicating deep inquiry and rational argumentation."}, {"text": "Its debates were largely confined to theological disputes, avoiding metaphysical or epistemological questions.", "isCorrect": false, "rationale": "The text states they 'argued about everything from the reality of the external world to the nature of time and consciousness,' showing a broad range beyond just theological disputes."}, {"text": "The schools were mostly concerned with practical legal and ethical codes for daily life.", "isCorrect": false, "rationale": "While ethical considerations may be part of philosophy, the text emphasizes debates on topics like 'the reality of the external world' and 'nature of time and consciousness,' indicating a broader scope than just practical codes."}], "id": "q07"}, {"question": "The text mentions the caste system as a significant difficulty within Hinduism. What was a primary negative consequence of this system?", "options": [{"text": "It led to the complete cessation of all philosophical debate within Indian society.", "isCorrect": false, "rationale": "The text praises the 'vigorous, systematic philosophical debate' within the Hindu tradition, indicating it did not cease."}, {"text": "It caused immense suffering and systemic discrimination, particularly for those at the bottom of the hierarchy.", "isCorrect": true, "rationale": "The text states the caste system 'stratified Indian society for millennia, with severe consequences for those at the bottom... has caused immense suffering.'"}, {"text": "It prevented any cultural exchange or spread of Hindu concepts to other parts of the world.", "isCorrect": false, "rationale": "The text clearly states Hindu concepts like yoga and karma have 'entered global culture,' contradicting this option."}, {"text": "It resulted in the decline of religious practice and the abandonment of spiritual goals among the populace.", "isCorrect": false, "rationale": "Hinduism remains the world's third-largest religion with 1.2 billion practitioners, indicating continued widespread practice."}], "id": "q08"}, {"question": "Who among the following figures is explicitly mentioned in the text as challenging caste discrimination from within the Hindu tradition?", "options": [{"text": "The Buddha", "isCorrect": false, "rationale": "While the Buddha challenged social norms, the text identifies him as rising *from* the Hindu tradition and challenging its concepts, but not as a *Hindu reformer* specifically against caste discrimination in the context of the mentioned reformers."}, {"text": "Mahatma Gandhi", "isCorrect": true, "rationale": "The text explicitly lists 'Swami Vivekananda, B. R. Ambedkar, and Mahatma Gandhi' as 'Hindu reformers from within the tradition' who challenged caste discrimination."}, {"text": "Laozi", "isCorrect": false, "rationale": "Laozi is associated with Taoism, a Chinese philosophical tradition, not a Hindu reformer."}, {"text": "Confucius", "isCorrect": false, "rationale": "Confucius is associated with Confucianism, a Chinese ethical and philosophical system, not a Hindu reformer."}], "id": "q09"}, {"question": "Considering the entire 'Why It Matters' section, which statement best summarizes the complex nature of Hinduism presented?", "options": [{"text": "Hinduism is primarily a historical artifact, significant only for its age and the number of people who practiced it in the past.", "isCorrect": false, "rationale": "The text emphasizes Hinduism as the 'world's oldest *living* religious tradition' with current global impact and ongoing relevance, not just a past artifact."}, {"text": "Despite its ancient origins and global influence, Hinduism is fundamentally flawed due to the unresolved issue of the caste system.", "isCorrect": false, "rationale": "The text balances the 'difficulties' of the caste system with Hinduism's 'resources,' philosophical contributions, and cultural impact, not concluding it is 'fundamentally flawed' despite the issue's gravity."}, {"text": "Hinduism is a multifaceted tradition, remarkable for its historical depth, philosophical contributions, global cultural impact, and its ongoing internal struggles with issues like social discrimination.", "isCorrect": true, "rationale": "This option synthesizes all the major points from the text: its longevity ('historical depth'), its influence on other religions and global culture, its rich philosophy, and its internal challenges like the caste system, providing a comprehensive summary."}, {"text": "Its significance lies almost exclusively in its contribution to modern psychology and quantum physics, overshadowing its religious or spiritual aspects.", "isCorrect": false, "rationale": "While Hindu philosophy 'resonates' with these modern fields, the text's scope for 'Why It Matters' is far broader, encompassing its role as a mother tradition, its cultural spread, and its spiritual disciplines, not exclusively modern scientific resonance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
