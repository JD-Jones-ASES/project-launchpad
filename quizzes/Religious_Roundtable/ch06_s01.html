    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why does the uncertainty surrounding Laozi's historical existence not 'embarrass' Taoism?", "options": [{"text": "It implies that the teachings of Taoism are universally true, regardless of their source.", "isCorrect": false, "rationale": "While Taoist teachings are considered universal, the text specifically states the reason is Taoism's distrust of rigid definitions, not a claim of universal truth independent of source."}, {"text": "It aligns with the tradition's distrust of rigid definitions and fixed identities, emphasizing the text over biography.", "isCorrect": true, "rationale": "The text explicitly states: 'This uncertainty does not embarrass Taoism; it fits perfectly with a tradition that distrusts rigid definitions and fixed identities. The text is what matters, not the biography.'"}, {"text": "It demonstrates the communal nature of Taoist wisdom, where no single author is truly responsible.", "isCorrect": false, "rationale": "The text mentions scholarly debate about Laozi being a single person or a composite figure, but the primary reason for fitting the tradition is about distrust of rigid definitions, not necessarily proving communal authorship."}, {"text": "It suggests that ancient Chinese historical records are generally unreliable for all philosophical traditions.", "isCorrect": false, "rationale": "The text focuses on Taoism's specific relationship with its own origins, not a general statement about all ancient Chinese historical records."}], "id": "q01"}, {"question": "Which two figures are described as the foundational figures of philosophical Taoism?", "options": [{"text": "Confucius and Zhang Daoling", "isCorrect": false, "rationale": "Confucius was contemporary with Laozi but represents a different philosophical tradition, and Zhang Daoling founded Religious Taoism, not Philosophical Taoism."}, {"text": "Laozi and Zhang Daoling", "isCorrect": false, "rationale": "Laozi is correct for philosophical Taoism, but Zhang Daoling founded Religious Taoism in the 2nd century CE, centuries later."}, {"text": "Laozi and Zhuangzi", "isCorrect": true, "rationale": "The text states: 'Philosophical Taoism—the tradition rooted in Laozi and Zhuangzi—is one strand of a broader movement.'"}, {"text": "Zhuangzi and the Border Guard", "isCorrect": false, "rationale": "Zhuangzi is correct, but the border guard is a minor legendary figure associated with Laozi, not a foundational figure of philosophical Taoism."}], "id": "q02"}, {"question": "How do the literary styles of the Tao Te Ching and Zhuangzi's work primarily differ?", "options": [{"text": "The Tao Te Ching is known for its vivid parables, while Zhuangzi's work is straightforward and practical.", "isCorrect": false, "rationale": "This reverses the descriptions; Zhuangzi's work is known for parables, while the Tao Te Ching is more compressed and cryptic."}, {"text": "The Tao Te Ching is compressed and cryptic, while Zhuangzi's work is exuberant and uses parables, jokes, and paradoxes.", "isCorrect": true, "rationale": "The text states: 'Where the Tao Te Ching is compressed and cryptic, Zhuangzi's work is exuberant: full of parables, jokes, paradoxes, and flights of imagination.'"}, {"text": "The Tao Te Ching focuses on historical accounts, while Zhuangzi's work explores scientific theories.", "isCorrect": false, "rationale": "Neither text is described as focusing on historical accounts or scientific theories within the provided content."}, {"text": "The Tao Te Ching contains detailed rituals, while Zhuangzi's work is a guide to longevity practices.", "isCorrect": false, "rationale": "These descriptions relate more to Religious Taoism, not the philosophical texts themselves."}], "id": "q03"}, {"question": "Zhuangzi's famous dream of being a butterfly, and then wondering if he was a man who dreamed he was a butterfly or vice-versa, best illustrates which concept?", "options": [{"text": "The importance of achieving physical immortality through meditation.", "isCorrect": false, "rationale": "This concept is associated with Religious Taoism and practices for longevity, not specifically illustrated by the butterfly dream."}, {"text": "The superiority of human consciousness over the natural world.", "isCorrect": false, "rationale": "The story's point is the blurring of distinctions, not the superiority of one state over another."}, {"text": "The unsettling gift for dissolving the boundaries and distinctions we take for granted.", "isCorrect": true, "rationale": "The text explicitly states this story 'captures Zhuangzi's unsettling gift for dissolving the boundaries we take for granted.'"}, {"text": "The practical application of Taoist principles in everyday life.", "isCorrect": false, "rationale": "While Taoism has practical applications, the butterfly dream is highlighted for its philosophical insight into identity and boundaries, not practical application."}], "id": "q04"}, {"question": "Religious Taoism (daojiao) is distinguished from Philosophical Taoism by which of the following characteristics?", "options": [{"text": "Its emphasis on understanding the nature of the Way (Tao).", "isCorrect": false, "rationale": "Both philosophical and religious Taoism engage with the concept of the Way, though their approaches differ."}, {"text": "Its historical foundation in the writings of Laozi and Zhuangzi.", "isCorrect": false, "rationale": "This describes Philosophical Taoism; Religious Taoism emerged later and claimed a revelation from Laozi, but its direct origin is distinct."}, {"text": "Its emergence as an organized tradition with priests, rituals, temples, and practices for health and immortality.", "isCorrect": true, "rationale": "The text states Religious Taoism became 'an organized tradition with priests, rituals, temples, scriptures, and a rich tradition of practices aimed at health, longevity, and even immortality,' which distinguishes it from the earlier philosophical tradition."}, {"text": "Its focus on parables and paradoxes to convey complex philosophical ideas.", "isCorrect": false, "rationale": "This is a characteristic of Zhuangzi's philosophical work, not a distinguishing feature of Religious Taoism."}], "id": "q05"}, {"question": "According to legend, what was Laozi's role at the royal court of Zhou before he departed?", "options": [{"text": "A military general", "isCorrect": false, "rationale": "The text does not mention Laozi having a military role."}, {"text": "A spiritual advisor to the emperor", "isCorrect": false, "rationale": "While he was wise, his specific role mentioned was not primarily as a spiritual advisor."}, {"text": "An archivist", "isCorrect": true, "rationale": "The text states: 'According to legend, Laozi was an archivist at the royal court of Zhou...'"}, {"text": "A border guard", "isCorrect": false, "rationale": "The border guard was the person who requested Laozi to write down his wisdom, not Laozi's profession."}], "id": "q06"}, {"question": "The 'Did You Know' section highlights that the Tao Te Ching is the second most translated book in history. What aspect of the text does this fact, combined with the observation that no two translations quite agree, primarily illustrate?", "options": [{"text": "Its historical significance as a document from ancient China.", "isCorrect": false, "rationale": "While it is historically significant, the 'no two translations agree' part points to a different quality."}, {"text": "The difficulty of translating classical Chinese into modern languages.", "isCorrect": false, "rationale": "While translation is difficult, the text specifically attributes the disagreement to the original's 'deliberately ambiguous Chinese,' rather than just general translation difficulty."}, {"text": "The universal appeal of its clear and concise philosophical statements.", "isCorrect": false, "rationale": "The text describes it as 'deliberately ambiguous,' not necessarily clear and concise in a way that leads to universal agreement in translation."}, {"text": "Its deliberately ambiguous nature, which allows for multiple interpretations.", "isCorrect": true, "rationale": "The text states, 'each translator finding something slightly different in its deliberately ambiguous Chinese. The fact that no two translations quite agree is perhaps the most Taoist thing about it.'"}], "id": "q07"}, {"question": "What led Laozi, according to legend, to leave the royal court of Zhou and journey west?", "options": [{"text": "A command from the emperor to explore new lands.", "isCorrect": false, "rationale": "The legend states he left out of weariness of corruption, not imperial command."}, {"text": "A desire to seek out the teachings of Confucius in the west.", "isCorrect": false, "rationale": "He was contemporary with Confucius, but the reason for his departure was weariness of the court's corruption, not to seek Confucius."}, {"text": "Weariness of the court's corruption.", "isCorrect": true, "rationale": "The text states: 'Laozi was an archivist at the royal court of Zhou who, weary of the court's corruption, loaded his belongings onto a water buffalo and rode west...'"}, {"text": "A revelation from the Tao that commanded him to write the Tao Te Ching.", "isCorrect": false, "rationale": "He was asked by a border guard to write it, and the motivation for leaving was weariness of corruption, not a divine command."}], "id": "q08"}, {"question": "The founder of the Way of the Celestial Masters, who initiated Religious Taoism in the 2nd century CE, claimed to have received a revelation from whom?", "options": [{"text": "Zhuangzi", "isCorrect": false, "rationale": "Zhuangzi was a philosophical figure, not the source of revelation for the Celestial Masters."}, {"text": "Confucius", "isCorrect": false, "rationale": "Confucius is from a different philosophical tradition."}, {"text": "Zhang Daoling", "isCorrect": false, "rationale": "Zhang Daoling was the founder himself, not the source of the revelation."}, {"text": "Laozi", "isCorrect": true, "rationale": "The text states: 'the Way of the Celestial Masters, founded by Zhang Daoling, who claimed to have received a revelation from Laozi himself.'"}], "id": "q09"}, {"question": "Which statement best summarizes the difference in historical certainty between Laozi and Zhuangzi?", "options": [{"text": "Both Laozi and Zhuangzi are considered purely mythological figures by scholars.", "isCorrect": false, "rationale": "The text states that Laozi's historicity is debated, but Zhuangzi is 'far more certainly historical.'"}, {"text": "Laozi is a purely historical figure, while Zhuangzi is likely a composite of several authors.", "isCorrect": false, "rationale": "This reverses the historical certainty; Laozi's historicity is debated, while Zhuangzi's is more certain."}, {"text": "Laozi's existence is uncertain, with the first reliable mention coming centuries later, whereas Zhuangzi is much more certainly historical.", "isCorrect": true, "rationale": "The text states: 'Whether Laozi was a real historical person is genuinely uncertain. The first reliable historical mention of him comes centuries after he supposedly lived.' In contrast, 'The second great figure of philosophical Taoism is far more certainly historical: Zhuangzi...'"}, {"text": "Neither figure has any historical basis, but their works are highly influential.", "isCorrect": false, "rationale": "Zhuangzi is described as 'far more certainly historical,' contradicting this statement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
