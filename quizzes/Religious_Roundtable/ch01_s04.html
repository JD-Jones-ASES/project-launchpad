    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>

        <div class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental characteristic that defines Christianity today?", "options": [{"text": "It is a unified global religion with a single central authority guiding all two billion adherents.", "isCorrect": false, "rationale": "The text explicitly states, 'Christianity today is not one thing. It is a vast family of traditions—sharing a common ancestry and a common core, but disagreeing, sometimes passionately, on matters of authority, worship, and practice.' This contradicts the idea of a single central authority."}, {"text": "It is a diverse family of traditions sharing a common core but disagreeing on matters of authority, worship, and practice.", "isCorrect": true, "rationale": "The text opens by stating, 'Christianity today is not one thing. It is a vast family of traditions—sharing a common ancestry and a common core, but disagreeing, sometimes passionately, on matters of authority, worship, and practice.' This accurately summarizes the defining characteristic."}, {"text": "It is primarily characterized by its three major branches, which are entirely distinct with no shared beliefs.", "isCorrect": false, "rationale": "While it has three major branches, the text emphasizes they share a 'common core' of beliefs, such as the Trinity and Resurrection, making the claim of no shared beliefs incorrect."}, {"text": "Its main feature is the ongoing theological debate between the Pope and the Patriarch of Constantinople.", "isCorrect": false, "rationale": "While this was a historical point of tension during the Great Schism, it is not the primary defining characteristic of 'Christianity today' as a whole. The text describes much broader diversity and historical splits."}], "id": "q01"}, {"question": "The Great Schism of 1054 was primarily caused by tensions over which fundamental issue between the Western and Eastern Christian leaderships?", "options": [{"text": "Disagreements about the exact date of Easter and the number of sacraments.", "isCorrect": false, "rationale": "While liturgical differences may have existed, the text specifically identifies 'Tensions over the Pope's claimed authority over all Christians, combined with theological differences and centuries of cultural drift' as the primary causes, not just the date of Easter or number of sacraments."}, {"text": "The Western Church's opposition to the use of icons in worship, which the Eastern Church strongly supported.", "isCorrect": false, "rationale": "The text states Eastern Orthodoxy maintained a 'deep reverence for icons,' but it does not specify this as the primary point of tension leading to the Great Schism. The iconoclast controversies predated the Schism as its immediate cause."}, {"text": "The Pope's asserted authority over all Christians, combined with theological and cultural differences.", "isCorrect": true, "rationale": "The text clearly states, 'Tensions over the Pope's claimed authority over all Christians, combined with theological differences and centuries of cultural drift, finally snapped.' This directly addresses the main causes."}, {"text": "Martin Luther's ninety-five objections to the sale of indulgences.", "isCorrect": false, "rationale": "Martin Luther's actions initiated the Protestant Reformation in 1517, which was centuries after the Great Schism of 1054. This refers to a completely different historical event."}], "id": "q02"}, {"question": "Which of the following theological concepts is a distinctive feature of Eastern Orthodoxy, as mentioned in the text?", "options": [{"text": "Sola scriptura, emphasizing Scripture alone as the final authority.", "isCorrect": false, "rationale": "Sola scriptura is a rallying cry of the Protestant Reformation, not a distinctive feature of Eastern Orthodoxy."}, {"text": "Theosis, the belief that human beings can be gradually transformed to share in the divine nature.", "isCorrect": true, "rationale": "The text states that Eastern Orthodoxy kept 'the theological concept of theosis—the belief that human beings can be gradually transformed to share in the divine nature through prayer, sacrament, and holy living.'"}, {"text": "The veneration of Mary and the saints, exclusively through the lens of papal authority.", "isCorrect": false, "rationale": "While Eastern Orthodoxy venerates Mary and saints, the 'lens of papal authority' is a characteristic emphasis of Roman Catholicism, not Eastern Orthodoxy, which rejected papal supremacy."}, {"text": "Salvation achieved through faith alone, not works or sacraments.", "isCorrect": false, "rationale": "This concept, 'sola fide,' is another rallying cry of the Protestant Reformation, not a distinctive belief of Eastern Orthodoxy."}], "id": "q03"}, {"question": "Martin Luther's critique, which sparked the Protestant Reformation, went deeper than just the sale of indulgences. What core problem did he argue the Church had developed?", "options": [{"text": "The Church had become too focused on scientific inquiry rather than spiritual matters.", "isCorrect": false, "rationale": "The text does not mention Luther's concern about scientific inquiry. His critique focused on theological and institutional issues."}, {"text": "The Church had buried the simple Gospel truth beneath layers of tradition and institutional power.", "isCorrect": true, "rationale": "The text states, 'But his critique went deeper: he argued that the Church had buried the simple Gospel truth beneath layers of tradition and institutional power.' This directly reflects Luther's core argument."}, {"text": "The Church had lost its reverence for icons, moving away from ancient liturgical traditions.", "isCorrect": false, "rationale": "This concern is more aligned with the distinctions of Eastern Orthodoxy, and the text does not attribute this specific critique to Martin Luther."}, {"text": "The Church had failed to establish a strong central authority, leading to widespread chaos.", "isCorrect": false, "rationale": "Luther's critique was largely against *too much* institutional power and authority, particularly that of the Pope, rather than a lack thereof."}], "id": "q04"}, {"question": "A modern Christian denomination emphasizes that personal faith in Jesus Christ is the sole requirement for salvation, and that the Bible, interpreted by individual believers, is the ultimate source of religious truth. Which two rallying cries of the Protestant Reformation do these emphases most directly reflect?", "options": [{"text": "Theosis and veneration of saints.", "isCorrect": false, "rationale": "Theosis is a concept from Eastern Orthodoxy, and veneration of saints is common in Roman Catholicism and Orthodoxy, not central to Protestant rallying cries."}, {"text": "Sola scriptura and papal infallibility.", "isCorrect": false, "rationale": "Sola scriptura aligns with the first part of the description, but papal infallibility (the Pope's inability to err in matters of faith and morals) is a Roman Catholic doctrine, directly opposed to the Protestant emphasis on individual scriptural interpretation."}, {"text": "Sola fide and the importance of seven sacraments.", "isCorrect": false, "rationale": "Sola fide aligns with the 'faith alone' aspect, but the 'importance of seven sacraments' is a Roman Catholic emphasis that Luther critiqued, moving towards 'faith alone, not works or sacraments.'"}, {"text": "Sola scriptura and sola fide.", "isCorrect": true, "rationale": "The description highlights 'the Bible, interpreted by individual believers, is the ultimate source of religious truth' (sola scriptura) and 'personal faith in Jesus Christ is the sole requirement for salvation' (sola fide). These are the direct rallying cries mentioned in the text for the Protestant Reformation."}], "id": "q05"}, {"question": "Which of the following statements accurately describes a key characteristic or emphasis of Roman Catholicism, according to the provided text?", "options": [{"text": "It is the dominant tradition in Russia, Greece, and much of Eastern Europe.", "isCorrect": false, "rationale": "The text states that 'Eastern Orthodox Christianity is the dominant tradition in Russia, Greece, and much of Eastern Europe,' not Roman Catholicism."}, {"text": "It emphasizes the authority of the Pope and bishops as successors of the apostles and the belief that bread and wine truly become the body and blood of Christ in the Eucharist.", "isCorrect": true, "rationale": "The text states Roman Catholicism 'emphasizes the authority of the Pope and the bishops as successors of the apostles, seven sacraments (including the Eucharist, where Catholics believe bread and wine truly become the body and blood of Christ).'"}, {"text": "It advocates for 'sola scriptura' as the final authority, encouraging individual interpretation of the Bible above church tradition.", "isCorrect": false, "rationale": "Sola scriptura is a Protestant rallying cry. Roman Catholicism emphasizes 'reading of Scripture through the lens of Church tradition,' a contrasting view."}, {"text": "It rejects the veneration of Mary and the saints as a departure from early Christian practice.", "isCorrect": false, "rationale": "The text states Roman Catholicism emphasizes 'the veneration of Mary and the saints,' so this statement is incorrect."}], "id": "q06"}, {"question": "Despite their divisions, all three major Christian branches (Catholic, Orthodox, Protestant) share a 'common core' of beliefs. Which of the following is explicitly listed as part of this common core?", "options": [{"text": "The number of sacraments required for salvation.", "isCorrect": false, "rationale": "The number of sacraments is a point of difference (e.g., seven for Catholics) and not listed as part of the common core. The text mentions 'disagreeing... on matters of... practice' which would include sacraments."}, {"text": "The Pope's authority as the head of all Christians.", "isCorrect": false, "rationale": "The Pope's authority was a primary point of division in the Great Schism and is rejected by Orthodox and Protestant branches, thus it cannot be part of the common core."}, {"text": "The Trinity, the Incarnation, and the Resurrection.", "isCorrect": true, "rationale": "The text explicitly states: 'Christians across all three branches share what might be called the common core: the Trinity, the Incarnation, the Resurrection, the authority of Scripture, and the hope of eternal life.'"}, {"text": "The exclusive use of ancient Greek liturgical tradition.", "isCorrect": false, "rationale": "The ancient Greek liturgical tradition is specific to Eastern Orthodoxy and not shared by Roman Catholicism or Protestantism, making it incorrect as part of the common core."}], "id": "q07"}, {"question": "The text notes that the Protestant Reformation 'produced an explosion of new Christian movements.' What does this outcome primarily suggest about the nature of authority and interpretation within Protestantism, especially when compared to Roman Catholicism?", "options": [{"text": "It signifies a stronger emphasis on centralized ecclesiastical authority to prevent schisms.", "isCorrect": false, "rationale": "The 'explosion of new movements' directly indicates a decentralization and fragmentation of authority, leading to many denominations, rather than a strengthening of central authority."}, {"text": "It implies a greater reliance on individual interpretation of Scripture and less on a single institutional authority.", "isCorrect": true, "rationale": "The shift to 'sola scriptura' and 'sola fide' emphasized individual access to and interpretation of the Bible, reducing the central authority of the Church hierarchy and leading to diverse movements and interpretations. The 'did you know' section also notes 'no central authority has been able to suppress the impulse to return to the original sources and ask, What does this “actually mean?”'."}, {"text": "It demonstrates a uniform acceptance of Luther's ninety-five objections without further debate.", "isCorrect": false, "rationale": "An 'explosion of new Christian movements' suggests ongoing debate, new interpretations, and diversification beyond just Luther's initial objections, not uniform acceptance."}, {"text": "It indicates a return to the unified leadership structure present before the Great Schism.", "isCorrect": false, "rationale": "The Reformation caused further fragmentation, moving away from any unified leadership structure, and certainly not back to a pre-Great Schism unity, which was already divided."}], "id": "q08"}, {"question": "Why does the textbook emphasize understanding the three major branches of Christianity for most of the two billion people who identify with it?", "options": [{"text": "Because it simplifies Christianity into a single, cohesive doctrine for global understanding.", "isCorrect": false, "rationale": "The text immediately clarifies that 'Christianity today is not one thing.' Understanding the branches highlights diversity, not simplification into a single doctrine."}, {"text": "Because these three branches represent the only forms of Christian faith in existence.", "isCorrect": false, "rationale": "The 'did you know' section specifically mentions 'somewhere between 30,000 and 45,000 distinct Christian denominations worldwide,' indicating many more forms exist beyond the three major branches."}, {"text": "Because they clarify what Christianity actually looks like for the majority of its adherents, despite internal disagreements.", "isCorrect": true, "rationale": "The text states: 'Understanding the three major branches helps clarify what Christianity actually looks like for most of the two billion people who identify with it.' This is the explicit reason provided."}, {"text": "Because the disputes among these branches are the only significant theological debates in Christianity.", "isCorrect": false, "rationale": "While significant, the text implies that within each branch, particularly Protestantism, there are 'hundreds of further denominations' and 'its own emphases, worship styles, and interpretations,' suggesting many other debates exist."}], "id": "q09"}, {"question": "According to the 'Did You Know' section, what is a notable aspect of the diversity within Christianity?", "options": [{"text": "The strict adherence of all denominations to a single, ancient creed, ensuring doctrinal uniformity.", "isCorrect": false, "rationale": "The text explicitly highlights 'somewhere between 30,000 and 45,000 distinct Christian denominations worldwide,' indicating vast diversity and a lack of 'doctrinal uniformity' across all. The ancient creeds unite on the 'common core' but not on all doctrine."}, {"text": "The successful suppression of new interpretations by central authorities to maintain tradition.", "isCorrect": false, "rationale": "The 'did you know' section states: 'no central authority has been able to suppress the impulse to return to the original sources and ask, What does this “actually mean?”', directly contradicting this option."}, {"text": "The existence of tens of thousands of distinct Christian denominations, many locally organized.", "isCorrect": true, "rationale": "The 'did you know' section states: 'Scholars estimate that there are somewhere between 30,000 and 45,000 distinct Christian denominations worldwide—though many of these are very small, locally organized congregations.' This accurately describes the notable aspect."}, {"text": "The complete absence of any shared beliefs among the various denominations.", "isCorrect": false, "rationale": "The main text highlights a 'common core' of beliefs shared by the three major branches, and the existence of many denominations does not imply a complete absence of shared beliefs across all of them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
