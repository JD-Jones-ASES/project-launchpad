<body>
<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the introduction, what is the primary insight gained from examining the nine great questions across different traditions?", "options": [{"text": "The fundamental questions posed by humanity have consistently evolved over time.", "isCorrect": false, "rationale": "The text explicitly states that 'the questions themselves never changed,' making this option incorrect."}, {"text": "While the questions remained constant, the answers provided by different traditions varied significantly.", "isCorrect": true, "rationale": "The text highlights this as a 'remarkable' observation: 'the questions themselves never changed. What changed — radically, beautifully, sometimes shockingly — were the answers.'"}, {"text": "Most traditions ultimately converged on very similar answers to the great questions.", "isCorrect": false, "rationale": "The text emphasizes that answers changed 'radically, beautifully, sometimes shockingly,' indicating divergence, not convergence."}, {"text": "The answers to the great questions are universally provable and lead to certainty.", "isCorrect": false, "rationale": "The section, particularly Cycle One, delves into the distinction between 'faith from certainty' and 'trust something you cannot prove,' suggesting answers aren't about universal provability."}], "id": "q01"}, {"question": "In the context of 'Cycle One: Faith,' which statement best encapsulates the distinctive understanding of faith in Judaism compared to Christianity and Islam?", "options": [{"text": "Judaism defines faith primarily as a single, absolute declaration of belief in God's oneness.", "isCorrect": false, "rationale": "This description aligns with Islam's understanding of faith, beginning with 'la ilaha illallah,' not Judaism."}, {"text": "Judaism views faith as inseparable from a multi-generational covenant relationship with God.", "isCorrect": true, "rationale": "The text states, 'For Judaism, faith is inseparable from covenant relationship: you do not merely believe in God; you are bound to God through a promise that runs through generations,' directly supporting this option."}, {"text": "Judaism emphasizes faith as trust in an incarnate God who lived and died in human history.", "isCorrect": false, "rationale": "This description aligns with Christianity's understanding of faith as 'trust in a Person — the incarnate God,' not Judaism."}, {"text": "Judaism declines to define faith, focusing instead on ethical conduct.", "isCorrect": false, "rationale": "While ethical conduct is important in Judaism, the text provides a clear definition of faith related to covenant, making this option incorrect."}], "id": "q02"}, {"question": "When addressing 'Cycle Two: Creation,' Buddhism's unique approach to the question 'Where did the world come from?' implies which of the following?", "options": [{"text": "The cosmos originates from a singular, primordial unity akin to Brahman.", "isCorrect": false, "rationale": "This view is associated with Hinduism, not Buddhism, which 'declined the question' about a first cause."}, {"text": "The ultimate creator is an unnamed, ineffable force that cannot be spoken.", "isCorrect": false, "rationale": "This description aligns with Taoism's concept of the 'unnamed Tao,' not Buddhism."}, {"text": "Understanding the world's origin is unnecessary for comprehending its present functioning, which arises through dependent origination.", "isCorrect": true, "rationale": "The text states, 'Buddhism declined the question: the cosmos arises by dependent origination; asking for a first cause is like asking for the edge of a circle.' This implies that focusing on the origin is not seen as productive or relevant for understanding existence."}, {"text": "Even the gods are uncertain about the true origins of the universe.", "isCorrect": false, "rationale": "This acknowledgement of uncertainty from the Nasadiya Sukta is attributed to Hinduism, not Buddhism."}], "id": "q03"}, {"question": "In 'Cycle Three: The Human Person,' Norse Paganism's perspective suggests that while destiny is predetermined by the Norns, human agency is primarily expressed through which aspect?", "options": [{"text": "Our ability to alter the weave of fate through powerful magical rituals.", "isCorrect": false, "rationale": "The text states 'fate woven before our birth by the Norns,' implying destiny cannot be altered, making this option incorrect."}, {"text": "Our capacity for productive labor and contribution to the communal economic system.", "isCorrect": false, "rationale": "This perspective on humans as 'productive beings' estranged by systems of production belongs to Communism, not Norse Paganism."}, {"text": "Our cultivation of ren (benevolence) and li (proper conduct) in social relationships.", "isCorrect": false, "rationale": "These concepts are central to Confucianism's definition of the human person, not Norse Paganism."}, {"text": "The courage and dignity with which we confront our preordained circumstances.", "isCorrect": true, "rationale": "The text clearly states: 'What we control is not our destiny but our character: the courage and dignity with which we face what has been given to us.'"}], "id": "q04"}, {"question": "Considering 'Cycle Four: Sacred Texts,' if a tradition views its primary sacred text as a 'seed' that continues to grow through centuries of interpretation and commentary, which tradition's approach does this most closely resemble?", "options": [{"text": "Hinduism's layered archive of shruti and smriti.", "isCorrect": false, "rationale": "While Hinduism has a layered archive, the 'seed' metaphor for ongoing interpretation leading to vast commentary is not specifically attributed to it in the text. Hinduism is described with shruti (heard) giving rise to smriti (remembered)."}, {"text": "Norse Paganism's preservation of texts by non-believers.", "isCorrect": false, "rationale": "Norse Paganism's unique aspect is the preservation of texts by those who no longer believe, and the suffering of Odin to receive runes, not a 'seed' model of interpretation."}, {"text": "Judaism's living tradition of interpretation, exemplified by the Torah and Talmud.", "isCorrect": true, "rationale": "The text states, 'Judaism showed us a living tradition of interpretation — the Torah as seed, the Talmud as centuries of growth.' This directly matches the description in the question."}, {"text": "A universal understanding where texts are static and unchanging divine decrees.", "isCorrect": false, "rationale": "This contradicts the dynamic, interpretive nature implied by the 'seed' and 'growth' metaphor."}], "id": "q05"}, {"question": "In 'Cycle Five: Morality,' how do the approaches of Christianity and Communism diverge regarding the primary source or condition for ethical living?", "options": [{"text": "Christianity focuses on individual spiritual enlightenment, while Communism emphasizes adherence to strict legal codes.", "isCorrect": false, "rationale": "Christianity grounds ethics in 'love,' not primarily individual enlightenment or legal codes. Communism focuses on material conditions, not just strict legal codes."}, {"text": "Christianity roots ethics in universal human reason, whereas Communism derives it from historical necessity.", "isCorrect": false, "rationale": "Christian ethics are grounded in 'love God and neighbor,' not explicitly universal human reason as described here. Historical necessity is not the direct emphasis for Communism, but rather current 'material conditions of society.'"}, {"text": "Christianity grounds ethics in divine love and personal struggle, while Communism ties morality to the justice of societal economic structures.", "isCorrect": true, "rationale": "The text states Christianity 'grounded ethics in love... and wrestled with the gap between the standard and our ability to meet it.' For Communism, 'morality cannot be separated from the material conditions of society: you cannot have justice in your soul while injustice is built into the structure of your economy.' This option accurately captures the distinct emphasis of each."}, {"text": "Christianity advocates for 'wu wei' (non-action), while Communism promotes revolutionary action for social change.", "isCorrect": false, "rationale": "'Wu wei' is associated with Taoism, not Christianity. While Communism might advocate for change, the core divergence is on the *source* of morality, not simply action vs. non-action in this specific comparison."}], "id": "q06"}, {"question": "According to 'Cycle Six: Community and Worship,' Confucianism emphasizes that 'li' (ritual) is not merely decorative, but serves a fundamental purpose in community. What is that purpose?", "options": [{"text": "To provide a direct pathway to individual spiritual liberation from suffering.", "isCorrect": false, "rationale": "While rituals can have spiritual significance, the text states for Confucianism, li is 'the architecture of community itself' and 'how trust and order are made visible,' not primarily individual liberation."}, {"text": "To make abstract concepts of trust and social order tangible and visible within the community.", "isCorrect": true, "rationale": "The text explicitly states, 'Confucianism offered li as the architecture of community itself: ritual is not decoration; it is how trust and order are made visible.' This directly aligns with the option."}, {"text": "To facilitate shared submission to a transcendent deity five times daily.", "isCorrect": false, "rationale": "This describes the Islamic practice of the ummah and daily prayer, not Confucian li."}, {"text": "To symbolically re-enact ancient myths of creation and cosmic origins.", "isCorrect": false, "rationale": "While some rituals do this, the text highlights li's role in making 'trust and order' visible within the community, not primarily re-enacting myths."}], "id": "q07"}, {"question": "If an individual believes that their personal suffering is a direct consequence of a global economic system built on exploitation, which tradition's diagnosis of suffering from 'Cycle Seven' would they most align with?", "options": [{"text": "Buddhism, which identifies craving (tanha) as the root.", "isCorrect": false, "rationale": "Buddhism locates the root of suffering within the individual's mental state (craving), not an external economic system."}, {"text": "Norse Paganism, which views suffering as an unchangeable condition to be faced with courage.", "isCorrect": false, "rationale": "Norse Paganism sees suffering as a cosmic condition and fate, advising courage in the face of it, but does not attribute it to a specific economic system."}, {"text": "Communism, which sees suffering as the predictable output of an exploitative system.", "isCorrect": true, "rationale": "The text states, 'Communism located the root outside the individual entirely: suffering is not a personal spiritual problem; it is the predictable output of a system built on exploitation.' This perfectly matches the scenario."}, {"text": "Christianity, which grapples with suffering as a result of the fallen human condition.", "isCorrect": false, "rationale": "Christianity, though not explicitly detailed in the suffering cycle, often links suffering to sin or the human condition, but not specifically to economic exploitation in the way Communism does here."}], "id": "q08"}, {"question": "In 'Cycle Eight: Transcendence and Immanence,' which tradition most explicitly engages with the paradox of the divine being both utterly beyond human comprehension and intimately present within the world?", "options": [{"text": "Islam, with its insistence on Allah's absolute transcendence and the Sufi tradition's allowance for intimacy.", "isCorrect": true, "rationale": "The text describes Islam as 'insisting on the absolute transcendence of Allah,' yet 'allowing the Sufi tradition to approach him with an intimacy that seems to contradict it.' This demonstrates an explicit engagement with and accommodation of the paradox between divine remoteness and closeness."}, {"text": "Hinduism, by simply stating that Brahman nirguna and Brahman saguna are held at once without further explanation.", "isCorrect": false, "rationale": "While Hinduism 'held both at once,' the Islamic description of 'allowing' an approach that 'seems to contradict' its core insistence highlights a more dynamic and explicit engagement with the paradox as presented in the text."}, {"text": "Taoism, by naming the paradox of the Tao being everywhere and nowhere, but then 'leaving it named'.", "isCorrect": false, "rationale": "Taoism 'named the paradox and then left it named,' suggesting an acknowledgement rather than an active 'allowing' or 'holding at once' that suggests a deeper integration or engagement as described for Islam."}, {"text": "Buddhism, through its focus on dependent origination as neither transcendent nor immanent.", "isCorrect": false, "rationale": "Buddhism is not mentioned in this cycle regarding the transcendence/immanence question; its concept of dependent origination relates to creation, not the nature of the divine."}], "id": "q09"}, {"question": "In 'Cycle Nine: History and Hope,' the Jewish concept of 'tikkun olam' (repair of the world) suggests a specific direction for history. Which of the following best describes this direction?", "options": [{"text": "History is cyclical, with periods of destruction and renewal that repeat indefinitely.", "isCorrect": false, "rationale": "The text presents this as one of the alternative possibilities at the end of the cycle, distinct from the Jewish Messianic hope."}, {"text": "History is moving towards a cosmic ending, divine judgment, and an ultimate heavenly kingdom.", "isCorrect": false, "rationale": "This view is attributed to Christianity's understanding of history, not Judaism's 'tikkun olam' which 'runs through this world'."}, {"text": "History progresses through human efforts to bring justice and repair to the world in the present.", "isCorrect": true, "rationale": "The text states, 'Judaism answered: the Messianic hope is real, but it runs through this world — justice, repair (tikkun olam), return.' This directly aligns 'tikkun olam' with present-day efforts towards justice and repair."}, {"text": "History aims for the emergence of an exemplary individual (junzi) as a civilizational ideal.", "isCorrect": false, "rationale": "This describes Confucianism's hope, centered on the 'junzi' as a model for society, not 'tikkun olam'."}], "id": "q10"}, {"question": "The concluding 'bigquestion' section emphasizes that 'education does not answer' these profound questions, but rather 'deepens them.' What does this imply about the value of engaging with diverse perspectives on these questions?", "options": [{"text": "The primary goal of studying these questions is to identify the single, universally correct answer among the diverse traditions.", "isCorrect": false, "rationale": "The text explicitly states that education 'does not answer' but 'deepens' questions, contradicting the idea of finding a single correct answer."}, {"text": "Engaging with diverse perspectives helps in achieving intellectual certainty and eliminating all doubt about the answers.", "isCorrect": false, "rationale": "Cycle One's discussion of 'faith from certainty' and the overall theme of deepening questions, not answering them, contradicts the goal of eliminating doubt or achieving certainty."}, {"text": "The value lies in appreciating the complexity of the questions and expanding one's understanding, rather than finding definitive solutions.", "isCorrect": true, "rationale": "The statement 'the questions are often better than any of the answers' and that education 'deepens them' implies that the process of exploration and expanded understanding is the true value, rather than reaching definitive solutions."}, {"text": "The diverse answers demonstrate that none of the traditions offer any meaningful insight into the questions.", "isCorrect": false, "rationale": "The text describes the answers as changing 'radically, beautifully, sometimes shockingly,' indicating their richness and meaning, not their lack thereof."}], "id": "q11"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
