    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The textbook notes that scholars have debated the definition of religion for centuries. Which of the following best explains why defining religion is considered \"surprisingly difficult\"?", "options": [{"text": "Religion is exclusively a private experience, making it impossible for external observation or study.", "isCorrect": false, "rationale": "While private experience is a component, the text emphasizes scholarly debate and various approaches, not the impossibility of study. Scholars actively study religion, implying it's not entirely private or unobservable."}, {"text": "Religious traditions intentionally obscure their core tenets, making them inaccessible to academic scrutiny.", "isCorrect": false, "rationale": "The text does not suggest intentional obscurity. The difficulty stems from the inherent complexity and diversity of religious phenomena, not a deliberate act by religious traditions."}, {"text": "Religion encompasses a vast and diverse spectrum of human experiences, beliefs, and practices that resist a single, universally accepted definition.", "isCorrect": true, "rationale": "The text highlights the disagreement among scholars and the complexity of religion, stating it is 'deeper than any of those things' like rules, beliefs, or buildings, which points to its multifaceted nature and the difficulty in encapsulating it in one definition."}, {"text": "Academic definitions of religion are inherently flawed because they are not derived from religious adherents themselves.", "isCorrect": false, "rationale": "The text discusses scholarly approaches to defining religion, but does not suggest these definitions are inherently flawed due to their origin. The challenge lies in the subject matter itself."}]}, {"question": "William James's functional approach to defining religion, as presented in the text, places primary emphasis on which aspect?", "options": [{"text": "The institutional structures and organizational hierarchies of religious groups.", "isCorrect": false, "rationale": "James's approach explicitly focuses 'not on institutions or doctrines,' but on individual experience."}, {"text": "The observable rituals and communal practices shared within a religious community.", "isCorrect": false, "rationale": "While rituals are part of religion, James's definition emphasizes individual 'feelings, acts, and experiences' in solitude, not primarily communal observation."}, {"text": "The individual's inner experiences, feelings, and personal apprehension of a perceived 'divine' or ultimate reality.", "isCorrect": true, "rationale": "James described religion as 'the feelings, acts, and experiences of individual men in their solitude, so far as they apprehend “themselves to stand in relation to whatever they may consider the divine.” This directly aligns with the focus on inner experience."}, {"text": "The specific doctrines, creeds, or lists of beliefs held by a religious tradition.", "isCorrect": false, "rationale": "James's approach focuses 'not on institutions or doctrines,' which would include specific beliefs."}]}, {"question": "In contrast to the functional approach, a substantive definition of religion focuses on:", "options": [{"text": "What religion achieves or 'does' for people in their lives.", "isCorrect": false, "rationale": "This describes the functional approach, which focuses on the 'function' or purpose of religion."}, {"text": "The observable impact of religious practices on societal norms and political structures.", "isCorrect": false, "rationale": "The text does not mention this as a primary focus for either definition type."}, {"text": "The internal content of religious belief, particularly regarding gods, spirits, or supernatural beings.", "isCorrect": true, "rationale": "The text states, 'A substantive definition focuses on what religion is made of — its content. On this view, religion involves belief in gods, spirits, or supernatural beings.'"}, {"text": "The emotional and psychological comfort religion provides to its adherents.", "isCorrect": false, "rationale": "This relates more to the 'feelings' and 'experiences' emphasized by the functional approach."}]}, {"question": "Why do many scholars, as noted in the text, prefer a functional approach or a combination of approaches over a purely substantive definition of religion?", "options": [{"text": "The functional approach is historically older and therefore more established in academic discourse.", "isCorrect": false, "rationale": "The text does not provide a historical timeline comparison for the age of these approaches."}, {"text": "Substantive definitions are often too broad and encompass non-religious belief systems.", "isCorrect": false, "rationale": "The text states the opposite: substantive definitions are 'more specific' and can exclude traditions."}, {"text": "A purely substantive definition may fail to include certain traditions universally considered religious, such as some forms of Buddhism, because they do not involve belief in a creator God.", "isCorrect": true, "rationale": "The text explicitly states this problem: 'some traditions that everyone calls “religious” (like certain forms of Buddhism) do not involve belief in a creator God at all. That is why many scholars prefer the functional approach, or a combination of both.'"}, {"text": "Functional definitions are easier to apply in quantitative research methods.", "isCorrect": false, "rationale": "The text does not discuss the ease of research application for either approach."}]}, {"question": "The textbook's working understanding of religion centers on 'a human being's deepest orientation toward whatever they consider ultimate.' What does the term 'ultimate' signify in this context?", "options": [{"text": "Whatever provides immediate material benefits and personal pleasure.", "isCorrect": false, "rationale": "This contradicts the idea of 'deepest orientation' and 'worthy of reverence.'"}, {"text": "The most powerful political or societal authority in their community.", "isCorrect": false, "rationale": "While influential, political authority is not equated with 'ultimate' in the spiritual sense described."}, {"text": "That which is treated as the most real, the most important, and the most worthy of reverence.", "isCorrect": true, "rationale": "The text directly defines 'ultimate' as 'whatever they treat as the most real, the most important, and the most worthy of reverence.'"}, {"text": "Any widely accepted scientific theory about the origin of the universe.", "isCorrect": false, "rationale": "Scientific theories, while important, are not necessarily the object of a 'deepest orientation' or 'reverence' in the religious sense."}]}, {"question": "A community gathers regularly for storytelling sessions that explain the origin of the world, performs symbolic actions during rites of passage, and adheres to a code of conduct for ethical living. Based on the textbook's keyterm definition of 'religion,' which element is implied but *least* explicitly detailed in this specific description?", "options": [{"text": "Stories that explain existence.", "isCorrect": false, "rationale": "'storytelling sessions that explain the origin of the world' directly aligns with 'stories that explain existence.'"}, {"text": "Moral demands on how to live.", "isCorrect": false, "rationale": "'adheres to a code of conduct for ethical living' directly aligns with 'moral demands on how to live.'"}, {"text": "Rituals that mark important moments.", "isCorrect": false, "rationale": "'performs symbolic actions during rites of passage' directly aligns with 'rituals that mark important moments.'"}, {"text": "A specific belief about what they consider sacred or ultimate.", "isCorrect": true, "rationale": "While the description implies a system relating to the sacred/ultimate through its practices and stories, it doesn't explicitly detail *what* that sacred/ultimate specifically *is* (e.g., gods, spirits, cosmic force) as a specific 'belief.' The definition of religion starts with 'beliefs, practices, and values through which people relate to what they consider sacred or ultimate,' and while practices/values are evident, the specific 'beliefs' about the nature of the sacred/ultimate are less detailed than the other options."}]}, {"question": "A university department is dedicated to investigating the meaning of ancient sacred texts, exploring the nature of the divine as understood by different traditions, and analyzing how spiritual concepts relate to human experience. This field of study is best identified as:", "options": [{"text": "Religious Anthropology, focusing on cultural development.", "isCorrect": false, "rationale": "While related, anthropology typically studies culture, human behavior, and societal structures. The description emphasizes the *meaning of beliefs* and the *nature of the divine*."}, {"text": "Religious History, tracing the evolution of religious movements.", "isCorrect": false, "rationale": "History focuses on the past events and evolution, not primarily the *meaning* of beliefs or the *nature* of the divine."}, {"text": "Theology, involving the formal study of religious beliefs and their meaning.", "isCorrect": true, "rationale": "The keyterm 'theology' is defined as 'The formal study of religious beliefs and their meaning,' asking questions like 'What is God like? How does the divine relate to the world? What does our tradition's sacred text mean?' This perfectly matches the scenario."}, {"text": "Philosophy of Religion, examining the logical validity of religious claims.", "isCorrect": false, "rationale": "While philosophy of religion overlaps, theology specifically focuses on understanding and articulating the beliefs *within* a tradition, rather than just critiquing their logical validity from an external perspective."}]}, {"question": "A common theme across many religious traditions is the idea of a reality or presence that exists beyond the observable physical universe, transcending human comprehension and material limitations. According to the text, this concept is best termed:", "options": [{"text": "Immanence", "isCorrect": false, "rationale": "Immanence (though not defined in the text) refers to the divine being present *within* the natural world, which is the opposite of going beyond it."}, {"text": "Dogma", "isCorrect": false, "rationale": "Dogma refers to established, authoritative beliefs within a religion, not the specific characteristic of 'going beyond ordinary experience.'"}, {"text": "Sacrament", "isCorrect": false, "rationale": "A sacrament is a ritual or ceremony, not the concept of a reality beyond the physical world."}, {"text": "Transcendence", "isCorrect": true, "rationale": "The keyterm 'transcendence' is defined as 'That which goes beyond ordinary experience — the ultimate, the divine, the sacred. Something is transcendent if it lies beyond the limits of the natural, material world as we normally experience it.'"}]}, {"question": "The 'Did You Know' section states that the questions religions ask about meaning, purpose, and what lies beyond death are 'remarkably consistent' across the thousands of diverse religions. This observation primarily supports which perspective on studying religion?", "options": [{"text": "It suggests that all religions are fundamentally the same in their core beliefs, despite outward differences.", "isCorrect": false, "rationale": "The text notes consistency in *questions*, not necessarily in *beliefs or answers*. The existence of thousands of distinct religions implies diversity in beliefs."}, {"text": "It reinforces the value of a functional approach, as it highlights what religion 'does' for people by addressing universal human concerns.", "isCorrect": true, "rationale": "The consistency of questions points to a universal human need or 'function' that religion fulfills—addressing ultimate concerns like meaning and purpose. This aligns with the functional approach's emphasis on what religion 'does' for people."}, {"text": "It argues for the necessity of a substantive definition, proving that all religions share a common belief in a creator God.", "isCorrect": false, "rationale": "This contradicts the problem identified with the substantive definition earlier in the text (e.g., certain forms of Buddhism do not believe in a creator God)."}, {"text": "It indicates that the sheer number of distinct religions is exaggerated, as many are simply variations of major global faiths.", "isCorrect": false, "rationale": "The text provides a range for the number of religions and specifies that most are small, not that the count is exaggerated due to variations."}]}, {"question": "According to the 'Did You Know' section, what is a key characteristic of the global landscape of religious adherence?", "options": [{"text": "The vast majority of the world's population follows one of the thousands of religions with fewer than 10,000 adherents.", "isCorrect": false, "rationale": "The text states 'Most have fewer than 10,000 followers,' but 'Only about 20 have more than a million adherents,' implying that the majority of *people* belong to the larger religions, even if most *religions* are small."}, {"text": "There are relatively few distinct religions, making their classification straightforward.", "isCorrect": false, "rationale": "The text states there are 'between 4,000 and 10,000 distinct religions' and notes 'depending on how you count,' implying complexity, not straightforward classification."}, {"text": "A small number of religious traditions account for the vast majority of religious followers worldwide.", "isCorrect": true, "rationale": "The text notes 'Only about 20 have more than a million adherents,' while the total number of religions is in the thousands. This means the overwhelming majority of religious people are adherents of these relatively few, very large traditions."}, {"text": "The commonality of questions asked by religions means their practices and beliefs are largely identical.", "isCorrect": false, "rationale": "The text says 'questions they ask... are remarkably consistent,' not that their practices and beliefs are identical, which would contradict the idea of thousands of distinct religions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
