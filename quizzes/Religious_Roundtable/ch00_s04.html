        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What does the 'roundtable' image primarily suggest about the book's approach to studying different traditions?", "options": [{"text": "That all traditions will ultimately find common ground and agree on the great questions.", "isCorrect": false, "rationale": "The text explicitly states, 'They do not agree with each other. In some cases, they disagree profoundly,' indicating that the roundtable is not about achieving ultimate consensus."}, {"text": "That the traditions are presented equally, engaging with shared fundamental questions despite profound disagreements.", "isCorrect": true, "rationale": "The text says the traditions 'sit together and address the great questions of human life' and that 'they are all at the same table, and they are all taking the questions seriously,' even though 'they do not agree with each other.'"}, {"text": "That the book prioritizes Western philosophical traditions over Eastern ones in its discussions.", "isCorrect": false, "rationale": "The list of traditions includes both Western (Christianity, Judaism, Islam, Norse Paganism, Communism) and Eastern (Hinduism, Buddhism, Taoism, Confucianism) traditions, indicating a broad and inclusive scope rather than prioritization."}, {"text": "That the author will mediate disputes among traditions to declare one superior to the others.", "isCorrect": false, "rationale": "The book positions the reader as the 'thoughtful host' who forms 'your own considered view,' implying the author's role is not to declare superiority but to facilitate the conversation."}], "id": "q01"}, {"question": "According to the 'About This Book' section, what is the most accurate description of the reader's role?", "options": [{"text": "To passively absorb information and accept the author's interpretations of each tradition.", "isCorrect": false, "rationale": "The text encourages active engagement, stating the reader should 'listen carefully,' 'notice where they agree and where they clash,' and 'begin to form your own considered view,' which goes beyond passive absorption."}, {"text": "To identify the single 'correct' tradition among those presented by the end of the book.", "isCorrect": false, "rationale": "The focus is on forming 'your own considered view' after listening to diverse perspectives, not on identifying a single 'correct' tradition as the book's goal."}, {"text": "To actively engage with the material, observe similarities and differences, and formulate a personal, informed perspective.", "isCorrect": true, "rationale": "The text describes the reader's role as 'something like that of a thoughtful host: you listen carefully to each voice, you notice where they agree and where they clash, and you begin to form your own considered view.'"}, {"text": "To primarily focus on memorizing the sacred texts and core beliefs of each tradition.", "isCorrect": false, "rationale": "While sacred texts and beliefs are covered, the reader's role emphasizes critical engagement, comparative thinking, and forming one's own view, which is more than just memorization."}], "id": "q02"}, {"question": "The book includes 'Communism' alongside religious traditions like Christianity and Hinduism. What does this inclusion primarily suggest about the book's scope?", "options": [{"text": "It indicates a bias towards political ideologies over traditional religious beliefs.", "isCorrect": false, "rationale": "Communism is listed *among* religious traditions, indicating a broad scope that includes both, not a bias towards one type over the other. The text refers to 'Nine religious and philosophical traditions'."}, {"text": "It implies that the 'great questions of human life' can be addressed by both religious and philosophical/ideological frameworks.", "isCorrect": true, "rationale": "The introduction states the book features 'Nine religious and philosophical traditions' addressing 'the great questions of human life,' suggesting that non-religious frameworks like Communism are considered valid participants in this intellectual inquiry."}, {"text": "It suggests that Communism is considered a religion in its own right by the author.", "isCorrect": false, "rationale": "The text categorizes the traditions as 'religious and philosophical,' allowing for the inclusion of Communism as a philosophical/ideological tradition without necessarily classifying it as a religion."}, {"text": "It signifies an intention to critique non-religious systems as inherently flawed when compared to religions.", "isCorrect": false, "rationale": "The book's aim is to take the answers from all traditions 'seriously,' not to critique or debunk non-religious systems as inherently flawed."}], "id": "q03"}, {"question": "What is the main purpose of Chapters 1-9, which introduce each tradition individually?", "options": [{"text": "To immediately compare and contrast the traditions on specific questions.", "isCorrect": false, "rationale": "The text states, 'These introduction chapters are meant to give you a foundation before the traditions begin speaking to each other,' indicating that comparative discussion happens later in the cycles."}, {"text": "To provide a foundational understanding of each tradition on its own terms before comparative discussion begins.", "isCorrect": true, "rationale": "The text explicitly states these chapters 'introduce each tradition on its own terms: its origins, its core beliefs... meant to give you a foundation before the traditions begin speaking to each other.'"}, {"text": "To argue for the superiority of certain traditions based on their historical origins.", "isCorrect": false, "rationale": "The book's approach emphasizes understanding and comparative thinking, not arguing for the superiority of any single tradition."}, {"text": "To exclusively detail the sacred texts of each tradition without broader contextual information.", "isCorrect": false, "rationale": "The chapters cover 'origins, its core beliefs, its sacred texts, its major branches, and why it matters,' indicating a comprehensive introduction beyond just sacred texts."}], "id": "q04"}, {"question": "In each cycle, every tradition's response includes a direct quotation from its primary sacred text. What is the most significant reason for this inclusion?", "options": [{"text": "To demonstrate the author's extensive knowledge of various sacred scriptures.", "isCorrect": false, "rationale": "While the author must have knowledge, the primary purpose from the reader's perspective is to engage with the source material directly, not to highlight the author's expertise."}, {"text": "To allow readers to engage directly with the authentic voice and foundational source material of each tradition.", "isCorrect": true, "rationale": "The text mentions 'each is given space to respond in its own voice' and that the quotation is 'a real passage,' ensuring authenticity and direct engagement with the tradition's primary sources."}, {"text": "To provide irrefutable proof of each tradition's claims regarding the great questions.", "isCorrect": false, "rationale": "The inclusion is about representing the tradition's voice, not necessarily providing 'irrefutable proof,' especially since traditions 'disagree profoundly.'"}, {"text": "To ensure that only traditions with written sacred texts are represented in the conversations.", "isCorrect": false, "rationale": "While direct quotations are used where available, this isn't stated as a prerequisite for inclusion, and the overall aim is broader than just written texts."}], "id": "q05"}, {"question": "What is the primary function of the 'At the Roundtable' synthesis section within each cycle?", "options": [{"text": "To declare a winner among the three traditions in the conversation.", "isCorrect": false, "rationale": "The text describes it as drawing 'connections and tensions,' asking 'follow-up questions,' and inviting 'you to think comparatively,' which contradicts the idea of declaring a 'winner.'"}, {"text": "To present the author's definitive conclusion on the great question discussed in the cycle.", "isCorrect": false, "rationale": "The section 'invites you to think comparatively,' implying the reader is meant to form their own conclusions rather than being given the author's definitive one."}, {"text": "To draw connections, highlight tensions, and prompt the reader to engage in comparative thought about the responses.", "isCorrect": true, "rationale": "The text clearly states this section 'draws connections and tensions, asks follow-up questions, and invites you to think comparatively,' directly matching this option."}, {"text": "To provide a concise summary of all the sacred texts quoted in the cycle.", "isCorrect": false, "rationale": "While it synthesizes, its main function is more analytical—drawing connections and tensions, rather than simply summarizing the texts."}], "id": "q06"}, {"question": "The sequence of cycles begins with epistemology ('how do we know anything?'). Why is this likely the starting point for building a complete account of reality?", "options": [{"text": "Because knowledge acquisition is universally agreed upon as the most important human pursuit by all traditions.", "isCorrect": false, "rationale": "The text doesn't claim universal agreement on its importance, but rather positions it as a foundational philosophical step."}, {"text": "Understanding *how* knowledge is acquired and validated is fundamental before exploring what exists or what human beings are.", "isCorrect": true, "rationale": "Epistemology, the study of knowledge, logically precedes other inquiries. Before determining 'what exists' (cosmology) or 'what is a human being' (anthropology), one must first consider 'how do we know anything?' about these topics."}, {"text": "Epistemology is the simplest of the technical terms and thus the easiest for readers to comprehend first.", "isCorrect": false, "rationale": "The complexity of the term is not given as the reason for its placement; its foundational nature in philosophical inquiry is the implicit reason for its position in the sequence."}, {"text": "The book aims to debunk traditional religious forms of knowledge before presenting other aspects of reality.", "isCorrect": false, "rationale": "The book states it 'takes those answers seriously,' implying respectful engagement rather than an intent to debunk."}], "id": "q07"}, {"question": "If a cycle explored how different traditions offer paths to inner peace, spiritual fulfillment, and ultimate liberation from suffering, which technical term from the text would best describe its primary focus?", "options": [{"text": "Cosmology", "isCorrect": false, "rationale": "Cosmology is defined as 'the study of the origin and structure of the universe,' which is unrelated to paths to liberation."}, {"text": "Anthropology", "isCorrect": false, "rationale": "Anthropology (in this sense) is 'the study of human nature,' which, while related to human experience, does not specifically cover paths to liberation."}, {"text": "Soteriology", "isCorrect": true, "rationale": "Soteriology is explicitly defined as 'the study of salvation or liberation,' which perfectly encompasses topics like inner peace, spiritual fulfillment, and freedom from suffering."}, {"text": "Eschatology", "isCorrect": false, "rationale": "Eschatology is 'the study of the end — of individual life, of history, of the cosmos,' which is about ultimate ends, not the process of achieving liberation."}], "id": "q08"}, {"question": "A discussion among traditions about the fundamental nature of existence, the origin of the universe, and its underlying laws would most directly fall under which cycle's topic?", "options": [{"text": "Anthropology", "isCorrect": false, "rationale": "Anthropology focuses on 'what is a human being?' or 'the study of human nature,' not the broader origins and structure of the universe."}, {"text": "Epistemology", "isCorrect": false, "rationale": "Epistemology is 'how do we know anything?,' focusing on the nature of knowledge, not the specific content of what exists."}, {"text": "Cosmology", "isCorrect": true, "rationale": "Cosmology is defined as 'what exists and where did it come from?' and 'the study of the origin and structure of the universe,' precisely matching the description."}, {"text": "Ethics", "isCorrect": false, "rationale": "Ethics would deal with moral principles and conduct, which is a different aspect of human life than the origin and structure of the universe."}], "id": "q09"}, {"question": "Based on the description, what is a key characteristic of this book's overall approach to studying diverse traditions?", "options": [{"text": "It seeks to establish a hierarchical ranking of the traditions based on their philosophical coherence.", "isCorrect": false, "rationale": "The book's aim is to foster understanding and comparative thinking, allowing the reader to form their 'own considered view,' rather than establishing a hierarchy."}, {"text": "It focuses on presenting each tradition's unique perspective on fundamental questions, highlighting both agreements and profound disagreements.", "isCorrect": true, "rationale": "The text emphasizes that traditions 'do not agree with each other' and 'disagree profoundly' while still addressing 'great questions.' The 'At the Roundtable' section explicitly 'draws connections and tensions,' affirming this approach."}, {"text": "It aims to develop a syncretic understanding where all traditions merge into one universal truth.", "isCorrect": false, "rationale": "The book explicitly notes profound disagreements and focuses on connections and tensions, indicating it does not seek to merge traditions into a single truth."}, {"text": "It primarily serves as an encyclopedia for factual recall of religious doctrines and historical facts.", "isCorrect": false, "rationale": "While foundational information is provided, the 'heart of the book' is the 'structured conversation' in cycles, aimed at 'thinking comparatively' and forming 'your own considered view,' which goes beyond mere factual recall."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
