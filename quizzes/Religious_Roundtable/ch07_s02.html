    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental starting point of Confucian thought, according to the text?", "options": [{"text": "The nature of God and the afterlife.", "isCorrect": false, "rationale": "The text explicitly states that Confucianism 'does not begin with God, or the afterlife, or the structure of the cosmos.'"}, {"text": "How human beings should treat each other.", "isCorrect": true, "rationale": "The text states, 'It begins with a question that is both simpler and harder: How should human beings treat each other? Everything else in Confucian thought flows from the attempt to answer that question.'"}, {"text": "The structure of the cosmos and its divine laws.", "isCorrect": false, "rationale": "The text explicitly states that Confucianism 'does not begin with God, or the afterlife, or the structure of the cosmos.'"}, {"text": "The ultimate purpose of human suffering.", "isCorrect": false, "rationale": "The text does not mention suffering as a primary starting point or focus of Confucian thought."}]}, {"question": "Which of the following best describes the Confucian concept of *ren*?", "options": [{"text": "A temporary feeling of sympathy for others.", "isCorrect": false, "rationale": "The text clarifies that *ren* 'is not merely a feeling' but a 'quality of character.'"}, {"text": "An inner disposition of genuine care for others' well-being, reflected in action.", "isCorrect": true, "rationale": "The text defines *ren* as 'the inner disposition of a person who genuinely cares about the well-being of others and whose every action reflects that care.'"}, {"text": "The outward performance of social rituals and ceremonies.", "isCorrect": false, "rationale": "This describes *li* (ritual propriety), which is distinct from *ren* but expresses and cultivates it."}, {"text": "The ability to discern right from wrong in complex situations.", "isCorrect": false, "rationale": "This describes *yi* (righteousness), which is a separate virtue from *ren*."}]}, {"question": "How does Confucius view the relationship between *li* (ritual propriety) and *ren* (supreme virtue)?", "options": [{"text": "*Li* is merely empty formalism that distracts from genuine *ren*.", "isCorrect": false, "rationale": "The text explicitly states that Confucius 'saw something deeper in it,' indicating it is not empty formalism but has a deeper purpose."}, {"text": "*Ren* is cultivated through *li*, as the outward form expresses and strengthens inner feeling.", "isCorrect": true, "rationale": "The text explains, 'When ritual is performed with genuine inner feeling, it both expresses and strengthens that feeling. ...Form and feeling educate each other.'"}, {"text": "*Li* is a substitute for *ren* when one lacks true inner feeling.", "isCorrect": false, "rationale": "Confucius emphasizes that *li* performed without inner feeling ('empty formalism') misses its true purpose; it's meant to express and cultivate *ren*, not replace it."}, {"text": "*Ren* and *li* are unrelated concepts, representing distinct moral domains.", "isCorrect": false, "rationale": "The text clearly links them, stating *li* is the means by which *ren* is 'expressed and cultivated' and is 'the outward expression of inner virtue (ren).'"}]}, {"question": "A ruler who chooses to implement a just but unpopular policy, despite facing potential political backlash, would be primarily demonstrating which Confucian virtue?", "options": [{"text": "*Ren* (Benevolence)", "isCorrect": false, "rationale": "While benevolence might be an underlying motivation, the act of discerning what is right and having the courage to act on it despite difficulty aligns more directly with *yi*."}, {"text": "*Li* (Ritual Propriety)", "isCorrect": false, "rationale": "*Li* refers to proper forms of conduct and ceremony, not the moral judgment and courage to make difficult policy decisions."}, {"text": "*Yi* (Righteousness)", "isCorrect": true, "rationale": "The text defines *yi* as 'the virtue of doing what is genuinely right in a given situation. *Yi* requires both knowledge of what is right and the courage to act on that knowledge even when it is difficult.' This perfectly describes the scenario."}, {"text": "*Xiao* (Filial Piety)", "isCorrect": false, "rationale": "*Xiao* is devotion and care for parents and ancestors and is not directly applicable to a ruler's policy decisions regarding the state."}]}, {"question": "According to Confucius's concept of *zhengming*, what is the implication if a leader who governs tyrannically is still referred to as a 'ruler'?", "options": [{"text": "It encourages subjects to exercise *li* by outwardly respecting the title.", "isCorrect": false, "rationale": "*Zhengming* is about honesty and accuracy in language to reflect reality, not about superficial respect when reality is distorted."}, {"text": "It signifies a profound understanding of *ren* by acknowledging the leader's inherent position.", "isCorrect": false, "rationale": "Referring to a tyrant as a 'ruler' distorts reality and undermines the pursuit of *ren*, which requires benevolent leadership from a true ruler."}, {"text": "It leads to clarity of thought and speech, strengthening societal foundations.", "isCorrect": false, "rationale": "The text states that when words are used dishonestly, society 'loses its ability to think clearly about what is actually happening.'"}, {"text": "It hinders society's ability to think clearly about reality and undermines future reforms.", "isCorrect": true, "rationale": "The text explains, 'When words are used dishonestly... society loses its ability to think clearly about what is actually happening. Zhengming is the insistence that language must track reality, because clarity of speech and clarity of thought are the foundations of every other reform.'"}]}, {"question": "Which of the Five Relationships is identified as the foundational relationship for all others in Confucian thought?", "options": [{"text": "Ruler and subject.", "isCorrect": false, "rationale": "While important for societal order, the text identifies another relationship as the foundation for *all* others."}, {"text": "Husband and wife.", "isCorrect": false, "rationale": "This relationship involves mutual care and duty, but it is not stated as the foundation for all other relationships."}, {"text": "Father and son.", "isCorrect": true, "rationale": "The text explicitly states: 'Father and son... This relationship is the foundation of all the others.'"}, {"text": "Friend and friend.", "isCorrect": false, "rationale": "This is the 'one relationship among equals' but is not considered the foundation of all other relationships."}]}, {"question": "What is a key characteristic of all Five Relationships in Confucianism, as described in the text?", "options": [{"text": "They primarily emphasize the subordinate party's blind obedience to authority.", "isCorrect": false, "rationale": "The text clarifies, 'Confucius was not simply advocating blind obedience to authority.' Each relationship involves mutual obligations."}, {"text": "They involve mutual obligations and accountability between both parties.", "isCorrect": true, "rationale": "The text states, 'Notice that every relationship in this list is mutual: both parties have obligations.'"}, {"text": "They are strictly hierarchical, with no reciprocal duties from the superior party.", "isCorrect": false, "rationale": "The text directly contradicts this, stating, 'A ruler who governs tyrannically has no claim to loyalty; a father who shows no love has no claim to filial piety,' indicating reciprocal duties."}, {"text": "They are purely instrumental, designed only for state control.", "isCorrect": false, "rationale": "The text describes them as a 'web of mutual care,' indicating a broader social and ethical purpose beyond mere state control."}]}, {"question": "Imagine a situation where a child, out of love and devotion (*xiao*), consistently performs daily duties to care for an ailing parent. This action, driven by inner feeling and expressed through proper conduct, best illustrates the interplay of which two primary Confucian concepts?", "options": [{"text": "*Yi* and *Zhengming*.", "isCorrect": false, "rationale": "*Yi* (righteousness) relates to moral judgment, and *zhengming* (rectification of names) to honest language; while underlying moral judgment might be present, the core dynamic of inner care and its expression is better captured by *ren* and *li*."}, {"text": "*Ren* and *Li*.", "isCorrect": true, "rationale": "*Ren* is the 'inner disposition of a person who genuinely cares' (the love and devotion or *xiao*), and *li* is the 'proper forms of conduct' (the consistent daily duties) that both express and strengthen that inner feeling. The text states *ren* is cultivated through 'faithful performance of ritual' (*li*)."}, {"text": "*Li* and *Zhengming*.", "isCorrect": false, "rationale": "While *li* is relevant, *zhengming* (rectification of names) is not the primary concept illustrated by the act of caring for a parent."}, {"text": "*Ren* and *Yi*.", "isCorrect": false, "rationale": "While *ren* (inner care) is central, the *expression* through consistent daily duties is captured by *li*, making *ren* and *li* a better pair than *ren* and *yi* for this scenario."}]}, {"question": "If a Confucian scholar observes widespread corruption in government and argues that the officials are not truly fulfilling their roles, which core principle is the scholar most likely invoking to criticize the situation and suggest a path to reform?", "options": [{"text": "The emphasis on individual enlightenment through solitary meditation.", "isCorrect": false, "rationale": "Confucianism focuses on social ethics and interaction, not solitary meditation or individual enlightenment apart from society."}, {"text": "The belief that natural disasters are divine punishments for moral failings.", "isCorrect": false, "rationale": "The text does not mention this as a core principle of Confucianism, which is 'not primarily a theology.'"}, {"text": "The principle of *zhengming* and the mutual obligations within the Five Relationships.", "isCorrect": true, "rationale": "*Zhengming* would apply because officials acting corruptly are not truly 'officials,' and the 'Ruler and subject' relationship, part of the Five Relationships, involves mutual obligations where the ruler (or official) must govern with benevolence, implying honesty and service rather than corruption."}, {"text": "The rejection of all forms of ritual and ceremony as empty.", "isCorrect": false, "rationale": "Confucius saw ritual (*li*) as vital for expressing and cultivating virtue, not as something to be rejected."}]}, {"question": "Overall, Confucianism is primarily characterized by its focus on:", "options": [{"text": "Developing an understanding of the supernatural realm and divine prophecies.", "isCorrect": false, "rationale": "The text explicitly states, 'Confucianism is not primarily a theology. It does not begin with God, or the afterlife, or the structure of the cosmos.'"}, {"text": "Cultivating moral character and establishing social harmony through proper human relationships.", "isCorrect": true, "rationale": "The text highlights the core question 'How should human beings treat each other?' and describes the system as one where 'all proper human relationships and social harmony flow' from *ren*, cultivated through *li*, and structured by the Five Relationships."}, {"text": "Achieving personal salvation through ascetic practices and withdrawal from society.", "isCorrect": false, "rationale": "The text emphasizes social interaction and relationships, not withdrawal or asceticism for personal salvation."}, {"text": "Economic theories related to market regulation and wealth distribution.", "isCorrect": false, "rationale": "The provided text does not mention economic theories as a primary focus of Confucianism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
