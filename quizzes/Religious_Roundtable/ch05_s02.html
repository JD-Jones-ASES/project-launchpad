    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most precise meaning of the Pali word 'dukkha' in Buddhist teachings, as described in the text?", "options": [{"text": "Intense physical pain and illness.", "isCorrect": false, "rationale": "While physical pain is a form of dukkha, the text specifies that dukkha is 'more precisely meaning the unsatisfactory, unstable quality of all conditioned experience,' and ranges from obvious pain to subtle dissatisfaction, making this option too narrow."}, {"text": "The unsatisfactory, unstable quality of all conditioned experience, including subtle dissatisfaction.", "isCorrect": true, "rationale": "The text defines 'dukkha' as 'the unsatisfactory, unstable quality of all conditioned experience,' noting that it 'ranges from obvious pain to the subtle dissatisfaction of knowing that even good things end.' This option accurately captures the broad and nuanced meaning."}, {"text": "The suffering caused solely by external misfortunes and losses.", "isCorrect": false, "rationale": "The text states that suffering occurs even in moments of pleasure because 'pleasure does not last and we know it,' indicating that dukkha is an inherent quality of conditioned existence, not just external misfortunes."}, {"text": "Emotional distress and sadness resulting from personal attachments.", "isCorrect": false, "rationale": "While emotional distress is part of dukkha, the definition in the text is broader, encompassing the 'unsatisfactory, unstable quality of all conditioned experience,' not just emotional states stemming from attachments."}]}, {"question": "Which of the following accurately lists the Three Marks of Existence, which the Buddha taught apply to every conditioned thing in the universe?", "options": [{"text": "Dukkha, Karma, Samsara", "isCorrect": false, "rationale": "Karma and Samsara are core Buddhist teachings but are not listed as the Three Marks of Existence. The text specifies Dukkha, Anicca, and Anatta."}, {"text": "Anicca, Anatta, Nirvana", "isCorrect": false, "rationale": "Nirvana is the goal of liberation, not one of the Three Marks of Existence, which describe the nature of conditioned reality. The correct marks are Dukkha, Anicca, and Anatta."}, {"text": "Dukkha, Anicca, Anatta", "isCorrect": true, "rationale": "The text explicitly states: 'Dukkha is the first of the Three Marks of Existence... The second mark is anicca: impermanence... The third mark is anatta: non-self.'"}, {"text": "Tanha, Samudaya, Nirodha", "isCorrect": false, "rationale": "Tanha, Samudaya, and Nirodha are terms related to the Four Noble Truths (craving, arising of suffering, cessation of suffering), not the Three Marks of Existence."}]}, {"question": "The Buddhist concept of 'anatta' (non-self) is considered radical because it proposes that:", "options": [{"text": "The self is a permanent soul that transmigrates through endless rebirths.", "isCorrect": false, "rationale": "This contradicts the definition of anatta, which denies a permanent, unchanging self or soul. The text states 'what we call the self... is not, in fact, a permanent thing.'"}, {"text": "The self is an illusion created by delusion, having no reality whatsoever.", "isCorrect": false, "rationale": "While the 'solid I' is seen as a misconception, the text clarifies that the self is a 'process: a constantly shifting bundle of physical and mental events,' implying it exists as a dynamic process, not a complete illusion."}, {"text": "The self is a fixed, unchanging entity that is the center of individual experience.", "isCorrect": false, "rationale": "This is precisely what anatta denies. The text explicitly states that the 'solid I' that we assume is 'not, in fact, a permanent thing' but a 'dynamic process.'"}, {"text": "What we call the self is a dynamic and constantly shifting process, not a fixed or permanent entity.", "isCorrect": true, "rationale": "The text defines anatta as 'the teaching that there is no permanent, unchanging self or soul underlying experience. 'What we call the self' is a dynamic process, not a fixed thing.' This option perfectly reflects that definition."}]}, {"question": "According to the Four Noble Truths, what is identified as the root cause of suffering (dukkha)?", "options": [{"text": "The impermanence of all things (anicca).", "isCorrect": false, "rationale": "Impermanence (anicca) is a characteristic of existence that leads to suffering, but the text identifies craving (tanha) as the direct root cause, arising from the inability to accept impermanence."}, {"text": "Tanha, which is the craving or thirst for things to be permanent and for a non-existent self.", "isCorrect": true, "rationale": "The second Noble Truth, Samudaya, states that 'Suffering arises from tanha (craving or thirst)—the grasping, clinging habit of mind that demands that things be permanent when they are not, and that the world revolve around a self that does not exist.'"}, {"text": "The absence of a permanent self (anatta).", "isCorrect": false, "rationale": "Anatta is a characteristic of reality, an insight that helps understand suffering, but it is not the *cause* of suffering; rather, clinging to the idea of a permanent self contributes to craving (tanha), which is the cause."}, {"text": "External societal injustices and misfortunes.", "isCorrect": false, "rationale": "While external factors can certainly contribute to distress, the Four Noble Truths focus on an internal root cause—tanha—which perpetuates suffering even in the face of external events."}]}, {"question": "A business owner decides to restructure their company to ensure all employees receive fair wages and that the company's products are ethically sourced, even if it means slightly lower profits. Which factor of the Noble Eightfold Path is this action primarily demonstrating?", "options": [{"text": "Right View", "isCorrect": false, "rationale": "Right View involves understanding the Four Noble Truths and the nature of reality. While understanding informs ethical actions, the action itself falls under a different factor."}, {"text": "Right Action", "isCorrect": false, "rationale": "Right Action focuses on not harming oneself or others through physical deeds. While related, 'Right Livelihood' specifically addresses how one earns a living."}, {"text": "Right Livelihood", "isCorrect": true, "rationale": "The text defines 'Right Livelihood' as 'earning one's living in ways that do not cause harm.' The business owner's actions directly align with this principle by ensuring ethical practices in their profession."}, {"text": "Right Effort", "isCorrect": false, "rationale": "Right Effort is about cultivating wholesome mental states and releasing unwholesome ones. While effort is involved, the specific ethical nature of earning a living points to Right Livelihood."}]}, {"question": "In Buddhist teachings, what is the ultimate goal of escaping samsara, the cycle of death and rebirth?", "options": [{"text": "To be reborn into a higher caste or a better realm in the next life.", "isCorrect": false, "rationale": "The text explicitly states the goal is 'not to have a better next life, but to reach the unconditioned freedom of nirvana.' Rebirth into a higher state is a consequence of good karma within samsara, not liberation from it."}, {"text": "To achieve immortality and become a divine being in a heavenly paradise.", "isCorrect": false, "rationale": "The concept of anatta (non-self) and the focus on nirvana as 'unconditioned freedom' contradict the idea of achieving personal immortality or becoming a fixed divine being."}, {"text": "To reach the unconditioned freedom of nirvana, where suffering and craving cease.", "isCorrect": true, "rationale": "The text directly states: 'The goal is to escape samsara altogether, not to have a better next life, but to reach the unconditioned freedom of nirvana.' Nirvana is described as the state 'in which suffering ceases—reached when craving is extinguished.'"}, {"text": "To accumulate enough good karma to permanently reside in a blissful spiritual plane.", "isCorrect": false, "rationale": "Accumulating good karma leads to favorable conditions within samsara, but the ultimate goal is liberation *from* the cycle of karma and rebirth entirely, to reach the 'unconditioned freedom' of nirvana."}]}, {"question": "The Buddha's practice of 'noble silence' regarding certain metaphysical questions, such as whether the universe is eternal or if the self survives death, implies that he believed:", "options": [{"text": "Such questions had no definitive answers and were therefore pointless to consider.", "isCorrect": false, "rationale": "The text clarifies that these questions were set aside 'not because they have no answer, but because debating them gets in the way' of the primary goal, suggesting the issue wasn't the existence of answers but their practical utility."}, {"text": "These inquiries, while interesting, were irrelevant and potentially distracting from the practical goal of liberation from suffering.", "isCorrect": true, "rationale": "The text compares the Buddha to a doctor focusing on removing an arrow rather than philosophical lectures. It states: 'The goal is liberation from suffering. Questions that do not serve that goal are set aside... because debating them gets in the way.'"}, {"text": "His followers were meant to discover the answers to these deep questions through their own meditative insights.", "isCorrect": false, "rationale": "While personal insight is crucial in Buddhism, the 'noble silence' was about actively *declining to answer* these specific questions because they were deemed unhelpful for liberation, not to delegate the answers to followers."}, {"text": "He lacked the wisdom or knowledge to adequately address such profound philosophical inquiries.", "isCorrect": false, "rationale": "The text implies a deliberate choice based on pedagogical wisdom, comparing him to a doctor prioritizing immediate healing, rather than a lack of knowledge or ability to address the questions."}]}, {"question": "Cultivating wholesome mental states, releasing unwholesome ones, and developing deep meditative focus are all factors that fall under which main training area of the Noble Eightfold Path?", "options": [{"text": "Wisdom", "isCorrect": false, "rationale": "Wisdom includes Right View and Right Intention. While wisdom is foundational, these specific practices fall under a different category."}, {"text": "Ethical Conduct", "isCorrect": false, "rationale": "Ethical Conduct covers Right Speech, Right Action, and Right Livelihood, which relate to outward behavior and interaction, not primarily mental cultivation or meditation."}, {"text": "Cultivation (or Meditation)", "isCorrect": true, "rationale": "The text groups 'Right Effort — cultivating wholesome mental states... Right Mindfulness — maintaining clear, present awareness... Right Concentration — developing deep meditative focus' under the heading 'Cultivation'."}, {"text": "Right Understanding", "isCorrect": false, "rationale": "Right Understanding is synonymous with Right View, which is part of the Wisdom grouping, not a main training area itself, nor does it encompass these specific practices."}]}, {"question": "How do the Four Noble Truths systematically build upon the insights of 'dukkha,' 'anicca,' and 'anatta'?", "options": [{"text": "They provide a mythological origin story that explains why these universal conditions exist.", "isCorrect": false, "rationale": "The Four Noble Truths are presented as a 'systematic account of suffering and liberation,' a diagnosis and remedy, not an origin myth. They build on the *observation* of these conditions, not their mythological origin."}, {"text": "They offer a comprehensive diagnosis of suffering, its cause, its cessation, and the practical path to liberation, all rooted in the impermanent and non-self nature of conditioned experience.", "isCorrect": true, "rationale": "The text states: 'The Four Noble Truths build on these insights into a systematic account of suffering and liberation.' They start with dukkha (suffering), identify its cause (tanha, which stems from not accepting anicca and anatta), propose its cessation (nirvana), and offer a path (Eightfold Path) consistent with these realities."}, {"text": "They describe the various stages of reincarnation through which beings must pass before attaining final liberation.", "isCorrect": false, "rationale": "While Buddhism teaches samsara (reincarnation), the Four Noble Truths focus on the *process* of suffering and liberation, not the stages of rebirth itself. The goal is to escape samsara, not detail its stages."}, {"text": "They outline a set of rituals and prayers necessary to overcome the inherent difficulties of existence.", "isCorrect": false, "rationale": "The Four Noble Truths lead to the Noble Eightfold Path, which is described as 'a way of living,' focusing on ethical conduct, meditation, and wisdom, rather than rituals and prayers."}]}, {"question": "The text identifies 'tanha' as the root cause of suffering. Which of the following situations best exemplifies 'tanha'?", "options": [{"text": "Feeling profound sadness and grief after the death of a cherished family member.", "isCorrect": false, "rationale": "This is an example of dukkha (suffering/unsatisfactoriness) arising from loss, but tanha specifically refers to the *clinging* or *craving* that demands things be permanent, leading to this suffering, rather than the grief itself."}, {"text": "Experiencing physical pain and discomfort from a chronic illness.", "isCorrect": false, "rationale": "Physical pain is a form of dukkha. While a *desire* for the pain to end might be a form of craving, the pain itself is not tanha, which is the *cause* of suffering, not suffering itself."}, {"text": "A person constantly seeking new sensory pleasures and becoming upset when those pleasures inevitably fade, wishing they could last forever.", "isCorrect": true, "rationale": "The text describes tanha as 'the grasping, clinging habit of mind that demands that things be permanent when they are not, and that the world revolve around a self that does not exist.' This scenario directly illustrates craving for pleasure to last and dissatisfaction when impermanence sets in."}, {"text": "The natural process of aging and the eventual decay of all physical forms.", "isCorrect": false, "rationale": "Aging and decay are examples of anicca (impermanence) and contribute to dukkha, but they are characteristics of existence, not the *craving* (tanha) that makes us suffer in response to them."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
