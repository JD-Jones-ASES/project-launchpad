<script>
var QUESTIONS = [{"question": "According to Marx's theory of historical materialism, what is the fundamental driver of human history?", "options": [{"text": "The evolution of religious beliefs and spiritual practices.", "isCorrect": false, "rationale": "The text explicitly states that historical materialism asserts that human history is *not* driven by ideas or religion, but by material conditions."}, {"text": "The material conditions of production, including ownership of means of production and labor organization.", "isCorrect": true, "rationale": "The definition of historical materialism directly states it is Marx's theory that the fundamental driver of human history is 'the material conditions of production -- who owns the means of production and how labor is organized.'"}, {"text": "The influence of great leaders and their revolutionary ideas.", "isCorrect": false, "rationale": "The text specifies that historical materialism is 'not ideas, religion, or great leaders,' but material conditions."}, {"text": "The innate human desire for individual freedom and self-expression.", "isCorrect": false, "rationale": "While freedom is part of Marx's vision of the good life, historical materialism focuses on the underlying material structures, not innate desires, as the fundamental driver of history."}]}, {"question": "Based on Marx's view that 'The ruling ideas of every age are the ideas of the ruling class,' how would he likely interpret the widespread belief in 'individual rights' in a capitalist society?", "options": [{"text": "As an eternal and universal moral truth discovered through human reason.", "isCorrect": false, "rationale": "Marx argues against concepts like 'individual rights' being 'eternal truths,' instead seeing them as ideological tools."}, {"text": "As an ideological tool that serves to legitimize the interests of the bourgeoisie.", "isCorrect": true, "rationale": "The text states that 'Concepts like individual rights, private property, fair contracts, and meritocracy are not eternal truths; they are ideological tools. They legitimize a system in which a small class owns everything....'"}, {"text": "As a natural outcome of human progress towards a more equitable society.", "isCorrect": false, "rationale": "Marx sees these concepts as serving specific class interests, not as natural progress toward a truly equitable society under capitalism."}, {"text": "As a genuine moral principle that, while flawed, offers a path to worker liberation.", "isCorrect": false, "rationale": "Marx sees bourgeois morality as distinct from and opposed to the 'ethics of human liberation,' not as a flawed path to it."}]}, {"question": "Which statement best characterizes Marx's moral vision, according to the text?", "options": [{"text": "Marx was a moral relativist who believed there was no objective right or wrong, only power dressed in moral language.", "isCorrect": false, "rationale": "The text explicitly states: 'Marx is sometimes read as a moral relativist... But this badly misreads him.'"}, {"text": "Marx believed that all moral codes are inherently meaningless, serving only as distractions from economic realities.", "isCorrect": false, "rationale": "The text clarifies that Marx had a 'deeply moral vision' and saw exploitation as 'genuinely wrong,' contradicting the idea that all moral codes are meaningless."}, {"text": "Marx had a strong moral vision, viewing worker exploitation and alienation as genuinely wrong and advocating for a good life of free, creative activity in community.", "isCorrect": true, "rationale": "The text states, 'Marx has a strong moral vision: the exploitation of workers is genuinely wrong. Alienation... is a real harm... The good life, for Marx, is one in which people can exercise their creative capacities freely, in community with others, without coercion or exploitation.'"}, {"text": "Marx was primarily concerned with economic analysis, and his writings contain no explicit moral judgments.", "isCorrect": false, "rationale": "The 'DID YOU KNOW?' section and subsequent paragraphs strongly refute this, highlighting Marx's moral outrage and positive vision."}]}, {"question": "In Marxist ethics, what is considered the 'supreme social virtue' and its primary antithesis?", "options": [{"text": "Justice; oppression.", "isCorrect": false, "rationale": "While justice is implied, the text specifically identifies 'solidarity' as the supreme virtue and 'individualism' as the primary vice."}, {"text": "Efficiency; wastefulness.", "isCorrect": false, "rationale": "These concepts are not mentioned as the supreme virtue or primary vice in the provided text."}, {"text": "Solidarity; individualism.", "isCorrect": true, "rationale": "The text explicitly states: 'Class solidarity is, in Marxist ethics, the supreme virtue -- and individualism is the primary vice.'"}, {"text": "Equality; hierarchy.", "isCorrect": false, "rationale": "While equality is a goal, solidarity and individualism are the direct terms used for the supreme virtue and primary vice, respectively."}]}, {"question": "How does Marx view the Communist revolution, as described in the closing lines of The Communist Manifesto?", "options": [{"text": "As a destructive act that eradicates all existing societal structures and values.", "isCorrect": false, "rationale": "The text states the revolution 'is not destructive; it is emancipatory,' and that 'nothing valuable will be lost... except the conditions of exploitation themselves.'"}, {"text": "As a necessary but unfortunate step that will ultimately lead to new forms of class oppression.", "isCorrect": false, "rationale": "Marx envisions the revolution as abolishing class antagonisms and classes generally, not creating new forms of oppression."}, {"text": "As an emancipatory process that abolishes exploitation and creates the conditions for a good life, akin to a religious vision of liberation.", "isCorrect": true, "rationale": "The text describes it as 'emancipatory' and the 'condition for the good life that capitalism has prevented,' noting its shared structure with 'religious eschatology: a present condition of suffering, a diagnosis of its cause, a vision of liberation, and a call to act.'"}, {"text": "As a spontaneous uprising with no clear moral purpose or long-term vision.", "isCorrect": false, "rationale": "The Manifesto's closing lines function as a 'moral exhortation' and clearly outline a vision of liberation and a post-revolutionary society."}]}, {"question": "According to the text, what is 'alienation' for Marx, and why is it considered a harm?", "options": [{"text": "It is a psychological state of feeling isolated from society due to personal failings, which Marx considered a minor inconvenience.", "isCorrect": false, "rationale": "The text defines alienation as being 'estranged from their labor, their products, their fellow workers, and their own human nature,' and explicitly calls it 'a real harm, not merely a preference.'"}, {"text": "It is the condition where human beings are estranged from their labor, products, fellow workers, and human nature, constituting a real harm.", "isCorrect": true, "rationale": "The text directly states: 'Alienation -- the condition in which human beings are estranged from their labor, their products, their fellow workers, and their own human nature -- is a real harm, not merely a preference.'"}, {"text": "It is the philosophical concept of existential dread, which Marx believed was a natural part of the human condition.", "isCorrect": false, "rationale": "Marx's concept of alienation is tied to specific material conditions and exploitation, not general existential dread, and it's presented as a harm to be overcome."}, {"text": "It is the feeling of being overwhelmed by too many choices in a consumerist society, which Marx saw as an unfortunate side effect of progress.", "isCorrect": false, "rationale": "This definition of alienation is not consistent with Marx's description in the text, which focuses on estrangement from production and human nature under capitalism."}]}, {"question": "Which of the following best describes the 'proletariat' in Marxist theory?", "options": [{"text": "The class that owns the means of production and benefits from capitalist society.", "isCorrect": false, "rationale": "This describes the 'bourgeoisie,' not the proletariat."}, {"text": "The intellectual elite who develop theories of social change.", "isCorrect": false, "rationale": "While intellectuals may theorize, the proletariat is defined by its economic role as a working class."}, {"text": "The class of workers who do not own the means of production and must sell their labor to survive, serving as the agent of historical transformation.", "isCorrect": true, "rationale": "The definition provided states: 'The class of workers who do not own the means of production and must sell their labor to survive. For Marx, the proletariat is the agent of historical transformation.'"}, {"text": "The small business owners and skilled artisans who bridge the gap between the ruling class and the working class.", "isCorrect": false, "rationale": "The proletariat is specifically the class that lacks ownership of the means of production and sells its labor, not a bridging class."}]}, {"question": "According to the closing paragraphs of The Communist Manifesto quoted in the text, what is the ultimate outcome for 'public power' and 'class antagonisms' once class distinctions have disappeared?", "options": [{"text": "Public power will be transferred to a new, benevolent ruling class, and class antagonisms will be managed through strict regulation.", "isCorrect": false, "rationale": "The text states public power 'will lose its political character' and that the conditions for 'class antagonisms and of classes generally' will be swept away, not merely managed or transferred to a new ruling class."}, {"text": "Public power will lose its political character, and the conditions for the existence of class antagonisms and classes generally will be abolished.", "isCorrect": true, "rationale": "The quote states: 'the public power will lose its political character... [and] have swept away the conditions for the existence of class antagonisms and of classes generally.'"}, {"text": "Public power will become an international governing body, and class antagonisms will shift from national to global conflicts.", "isCorrect": false, "rationale": "The text does not mention an international governing body or a shift to global conflicts in this context. It describes the abolition of class antagonisms."}, {"text": "Public power will be strengthened to enforce absolute equality, thereby suppressing any potential for class antagonisms.", "isCorrect": false, "rationale": "The text suggests public power loses its *political* character (as organized power of one class for oppressing another), implying it's not about strengthening it to suppress, but eliminating the conditions that necessitate such power."}]}, {"question": "A student argues that 'honesty is always good' is an eternal, universal moral truth. How would a Marxist perspective, as presented in the text, likely challenge this claim?", "options": [{"text": "By asserting that morality is purely subjective and has no bearing on societal structure.", "isCorrect": false, "rationale": "Marx does not claim morality is purely subjective; he argues that specific moral ideas often serve class interests, but he has a strong moral vision of his own."}, {"text": "By questioning whose interests the idea of 'honesty is good' primarily serves and if it might legitimize existing power structures.", "isCorrect": true, "rationale": "The text encourages asking exactly this question: 'Could this idea serve the interests of one group more than another? How would you know?' when considering a 'moral idea you consider obvious and universal' like 'honesty is good.'"}, {"text": "By stating that only economic laws are true, and moral ideas are merely illusions.", "isCorrect": false, "rationale": "While economic conditions are primary, Marx does not dismiss all moral ideas as illusions. He seeks to uncover their class-based origins to foster a 'genuine ethics' of liberation."}, {"text": "By pointing out that dishonesty can sometimes lead to greater economic efficiency.", "isCorrect": false, "rationale": "The Marxist critique of bourgeois morality is not about practical efficiency, but about whose interests a moral idea serves in perpetuating exploitation."}]}, {"question": "The text draws a parallel between the structure of the Communist revolution and religious eschatology. What is the shared characteristic highlighted?", "options": [{"text": "Both involve a literal 'end of the world' scenario.", "isCorrect": false, "rationale": "The text refers to a 'vision of liberation' and 'overthrow of capitalism,' not a literal apocalypse."}, {"text": "Both propose a present condition of suffering, diagnose its cause, offer a vision of liberation, and issue a call to action.", "isCorrect": true, "rationale": "The text states: 'Notice what this structure shares with religious eschatology: a present condition of suffering, a diagnosis of its cause, a vision of liberation, and a call to act.'"}, {"text": "Both advocate for non-violent resistance as the primary means of achieving their goals.", "isCorrect": false, "rationale": "The text refers to the proletariat being 'compelled, by the force of circumstances, to organise itself as a class,' and making itself the ruling class 'by means of a revolution,' implying a more forceful, transformative process than solely non-violent resistance."}, {"text": "Both promise an immediate and effortless transition to a perfect utopian society.", "isCorrect": false, "rationale": "The text describes a 'contest with the bourgeoisie' and a process of 'sweeping away' old conditions, implying effort and transformation, not an effortless transition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
