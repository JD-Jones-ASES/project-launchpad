    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what distinguishes the origin of Norse Paganism from religions with a single founder or written revelation?", "options": [{"text": "It was founded by Snorri Sturluson during the Viking Age.", "isCorrect": false, "rationale": "Snorri Sturluson lived much later (1179–1241) and compiled texts about Norse Paganism; he was not its founder. The text explicitly states Norse Paganism did not begin with a single founder."}, {"text": "It emerged gradually over millennia among various Germanic and Scandinavian peoples.", "isCorrect": true, "rationale": "The text states, 'Norse Paganism does not begin with a single founder, a founding moment, or a written revelation. It grew slowly, over centuries and millennia, among the Germanic and Scandinavian peoples.'"}, {"text": "It was revealed in the Poetic Edda by an unknown prophet.", "isCorrect": false, "rationale": "The Poetic Edda was written down much later (around 1270) and is a compilation of older poems, not a founding revelation by a prophet. The text denies a 'written revelation' for its origins."}, {"text": "Its origins are solely traced to the settlement at L'Anse aux Meadows.", "isCorrect": false, "rationale": "L'Anse aux Meadows was an archaeological site established around 1000 CE by Leif Eriksson, long after the millennia-long origins of Norse Paganism."}], "id": "q01"}, {"question": "The text describes skaldic verse as 'dense with alliteration, internal rhyme, and riddle-like kennings.' What analytical function did this complex poetic structure serve for the oral tradition?", "options": [{"text": "It primarily made the poems more entertaining for chieftains.", "isCorrect": false, "rationale": "While skalds were entertainers, the text emphasizes the functional aspect of the complexity: 'The complex poetic forms... made the poems difficult to alter in transmission.'"}, {"text": "It ensured that the poems could be easily translated into other languages.", "isCorrect": false, "rationale": "Complex poetic forms, especially those rich in specific cultural imagery like kennings, typically make translation more challenging, not easier. The text does not mention translation."}, {"text": "It functioned as a reliable form of oral record by making alterations difficult during transmission.", "isCorrect": true, "rationale": "The text explicitly states: 'The complex poetic forms of skaldic verse... made the poems difficult to alter in transmission and thus functioned as a reliable form of oral record.'"}, {"text": "It allowed skalds to improvise new stories on the spot without preparation.", "isCorrect": false, "rationale": "The description of dense, complex forms suggests careful composition and memorization, not easy improvisation, which would be prone to changes."}], "id": "q02"}, {"question": "Which statement accurately describes the term 'Viking' as presented in the text regarding the Viking Age?", "options": [{"text": "The term 'Viking' applied to all Norse people during the Viking Age.", "isCorrect": false, "rationale": "The text clarifies, 'The word 'Viking' referred specifically to those who went on sea-raids; not all Norse people were Vikings.'"}, {"text": "'Viking' specifically referred to Norse individuals who undertook sea-raids.", "isCorrect": true, "rationale": "The text states, 'The word 'Viking' referred specifically to those who went on sea-raids.'"}, {"text": "The Viking Age was when Norse Paganism began to decline significantly.", "isCorrect": false, "rationale": "The text indicates the opposite: Norse Paganism 'reached its most dramatic expression during the Viking Age (approximately 793–1066).'"}, {"text": "The term 'Viking' was coined by Snorri Sturluson to describe ancient Norse explorers.", "isCorrect": false, "rationale": "Snorri Sturluson lived after the Viking Age (1179–1241), and the text defines the term 'Viking' by activity, not by its coiner."}], "id": "q03"}, {"question": "The text identifies a 'crucial problem' for understanding Norse Paganism. Which of the following scenarios best illustrates this core challenge for modern scholars?", "options": [{"text": "Most mythological texts were destroyed during the Viking raids.", "isCorrect": false, "rationale": "The text does not mention widespread destruction of texts during the Viking raids. Instead, it notes that surviving written sources *were recorded* later."}, {"text": "The only surviving accounts were written by Christian scholars who no longer practiced the religion.", "isCorrect": true, "rationale": "The text states, 'all of our surviving written sources were recorded after Scandinavia converted to Christianity... written down by Christian scholars who wanted to preserve the old stories even as they themselves no longer believed them.'"}, {"text": "The original oral traditions were never recorded in any form.", "isCorrect": false, "rationale": "The text clarifies that the Poetic Edda and Prose Edda did record these oral traditions, albeit through a later, Christian lens."}, {"text": "Norse Paganism had a single founder whose teachings were never fully written down.", "isCorrect": false, "rationale": "The text explicitly states Norse Paganism did not have a single founder or a written revelation at its origin."}], "id": "q04"}, {"question": "What was the primary purpose of Snorri Sturluson's Prose Edda?", "options": [{"text": "To document the conversion of Iceland to Christianity.", "isCorrect": false, "rationale": "Snorri Sturluson wrote the Heimskringla, a history of Norwegian kings, which would likely cover such topics, but the Prose Edda's purpose was different."}, {"text": "To provide a comprehensive handbook of Norse mythology and skaldic poetic technique.", "isCorrect": true, "rationale": "The text describes the Prose Edda as 'a handbook of Norse mythology and skaldic poetic technique.'"}, {"text": "To compile older mythological and heroic poems without any original commentary.", "isCorrect": false, "rationale": "This description aligns more with the Poetic Edda ('a collection of older mythological and heroic poems gathered by an unknown compiler'), whereas the Prose Edda was compiled and presented by Snorri."}, {"text": "To offer a critical analysis refuting pagan beliefs from a Christian perspective.", "isCorrect": false, "rationale": "While Snorri was Christian, his primary motivation for the Prose Edda was to preserve and explain the myths for understanding skaldic poetry, not to refute pagan beliefs directly."}], "id": "q05"}, {"question": "When the text describes surviving Norse Paganism texts as a 'window filtered through time, conversion, and the perspective of one highly educated 13th-century Icelander,' what is the most significant implication for interpretation?", "options": [{"text": "The texts are inherently unreliable and should be dismissed as fiction.", "isCorrect": false, "rationale": "The text advises 'neither dismissing it as mere fiction,' acknowledging its value despite the filtering."}, {"text": "The texts offer a perfectly preserved, unbiased account of original pagan beliefs.", "isCorrect": false, "rationale": "The text advises 'nor treating it as a perfectly preserved original,' directly contradicting this option due to the 'filtered' nature."}, {"text": "The content likely reflects some degree of Christian influence or interpretation alongside authentic pagan traditions.", "isCorrect": true, "rationale": "The 'filtered window' metaphor and the mention of 'scholars debate endlessly how much the Christian worldview of these scribes shaped — or distorted — what they recorded' directly imply this mixed influence."}, {"text": "Only the Poetic Edda is a reliable source, as it was compiled by an unknown author.", "isCorrect": false, "rationale": "The Poetic Edda was also written down in Iceland around 1270, placing it within the post-conversion context and likely subject to similar filtering, even if the compiler is unknown."}], "id": "q06"}, {"question": "Based on the definition provided for 'kennings,' which of the following phrases is the best example of a kenning?", "options": [{"text": "Swift horse", "isCorrect": false, "rationale": "This is a simple adjective-noun phrase, directly describing a horse. Kennings are described as 'compound poetic images' or 'riddle-like'."}, {"text": "Battle-sweat for blood", "isCorrect": true, "rationale": "This is a compound poetic image ('battle-sweat') that refers to something else ('blood') in a riddle-like manner, directly mirroring the example 'the whale-road' for the sea."}, {"text": "The great hall", "isCorrect": false, "rationale": "This is a direct, descriptive noun phrase. It is not a compound poetic image used to refer to something else indirectly."}, {"text": "Singing loudly", "isCorrect": false, "rationale": "This is a verb phrase, describing an action. Kennings are described as compound *poetic images*."}], "id": "q07"}, {"question": "The 'Did You Know' section mentions Leif Eriksson, a Christian explorer, whose sailors still carried 'memories of the old Norse myths.' How does this detail contribute to understanding the overall 'crucial problem' discussed in the main text?", "options": [{"text": "It proves that Christian conversion had no impact on the preservation of Norse myths.", "isCorrect": false, "rationale": "It shows memories persisted, but it doesn't negate the 'crucial problem' of Christian scribes later shaping how those myths were written down. The text emphasizes that the written sources are from *after* conversion and are 'filtered.'"}, {"text": "It illustrates the gradual, often overlapping nature of religious change, where old traditions persisted even after official conversion.", "isCorrect": true, "rationale": "Eriksson being Christian while his sailors retained pagan memories demonstrates that the shift from paganism to Christianity was not always immediate or absolute, supporting the idea that Christian scholars could still access and record these 'old stories' from memory or surviving oral traditions."}, {"text": "It demonstrates that Norse myths were primarily spread through sea voyages rather than oral traditions.", "isCorrect": false, "rationale": "The text states the stories 'were sung by skalds... and passed from generation to generation as the living memory of a people,' emphasizing oral tradition as the primary means of transmission."}, {"text": "It suggests that the conversion to Christianity happened much earlier than the text indicates.", "isCorrect": false, "rationale": "The text explicitly states Iceland converted in 1000 CE, which aligns perfectly with Leif Eriksson's activities around the same time. It does not suggest an earlier conversion date."}], "id": "q08"}, {"question": "The text states Snorri Sturluson's work is 'both invaluable and complicated.' What is the primary reason for this complication?", "options": [{"text": "His writings are incomplete and only cover a small portion of Norse mythology.", "isCorrect": false, "rationale": "Snorri's Prose Edda is described as 'our most comprehensive account of Norse mythology,' suggesting it's quite extensive, not incomplete in scope."}, {"text": "He was a Christian writing about a pagan past, potentially interpreting myths through his own religious lens.", "isCorrect": true, "rationale": "The text explicitly states: 'He was a Christian writing about a pagan past — which makes his work both invaluable and complicated. He preserved much that would otherwise have been lost, but he also inevitably interpreted the myths through a medieval Christian lens.'"}, {"text": "His poetic style was too complex for most people to understand.", "isCorrect": false, "rationale": "While skaldic verse (which Snorri explained) was complex, the complication in *his own work* for scholars is not about accessibility but about the lens of interpretation."}, {"text": "He only recorded myths from a single region of Scandinavia, limiting their scope.", "isCorrect": false, "rationale": "The text does not mention any regional limitations to Snorri's collection of myths."}], "id": "q09"}, {"question": "Which sequence of events related to Norse Paganism and its documentation is most accurate according to the provided text?", "options": [{"text": "Norse Paganism's peak expression → Scandinavia converts to Christianity → Snorri Sturluson compiles the Prose Edda.", "isCorrect": true, "rationale": "The Viking Age (793–1066) was the 'most dramatic expression.' Conversion of kingdoms occurred approximately 960–1100. Snorri compiled the Prose Edda around 1220. This sequence is chronologically correct."}, {"text": "Snorri Sturluson compiles the Prose Edda → Norse Paganism's peak expression → Scandinavia converts to Christianity.", "isCorrect": false, "rationale": "Snorri wrote after both the peak expression and the main period of conversion, making this sequence incorrect."}, {"text": "Scandinavia converts to Christianity → Norse Paganism's peak expression → The Poetic Edda is written down.", "isCorrect": false, "rationale": "Norse Paganism reached its peak during the Viking Age, which largely *preceded* or overlapped the early stages of the main conversion period, not after it. The Poetic Edda was written down even later."}, {"text": "Oral traditions are lost → Christian scholars rediscover pagan myths → Leif Eriksson establishes L'Anse aux Meadows.", "isCorrect": false, "rationale": "Oral traditions were preserved through skalds and later written down, not lost. Leif Eriksson's settlement (~1000 CE) predates the main compilation of the Eddas by Christian scholars (13th century)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
