    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The term shruti is used to describe the Vedas, signifying what characteristic of these sacred texts?", "options": [{"text": "They were composed by human poets inspired by divine visions.", "isCorrect": false, "rationale": "The text explicitly states that the Vedas are 'not human compositions' but eternal truths perceived by ancient seers."}, {"text": "They are believed to be eternal truths directly 'heard' by ancient sages in deep meditation.", "isCorrect": true, "rationale": "The word shruti means 'that which was heard,' indicating they are eternal truths perceived ('heard') by rishis (ancient seers) in meditation, rather than human creations."}, {"text": "They contain the foundational ethical laws and social codes for Hindu society.", "isCorrect": false, "rationale": "While significant, this describes texts like the Dharmashastra, not the primary meaning or function of shruti in relation to the Vedas."}, {"text": "They were originally written down by divine beings before being translated into human languages.", "isCorrect": false, "rationale": "The text states the Vedas were 'transmitted orally for thousands of years before being written down,' indicating they were not initially written by divine beings."}], "id": "q01"}, {"question": "While the Upanishads are 'attached to the Vedas,' they represent a distinct 'philosophical heart' of Hinduism. What is their primary distinguishing focus compared to the foundational Vedas?", "options": [{"text": "The Upanishads focus primarily on ritual hymns and prayers to various gods, while the Vedas focus on philosophical dialogues.", "isCorrect": false, "rationale": "This statement reverses the primary focus; the Vedas contain hymns, while the Upanishads are known for philosophical dialogues."}, {"text": "The Upanishads delve into the nature of ultimate reality (Brahman) and the self (atman) through dialogues, unlike the Vedas' emphasis on hymns and perceived truths.", "isCorrect": true, "rationale": "The text states the Upanishads are 'focused on the nature of ultimate reality (Brahman) and the self (atman)' and are 'dialogues,' distinguishing them from the Vedas, which are described as 'hymns to the gods' and 'eternal truths perceived.'"}, {"text": "The Upanishads introduce the concept of nishkama karma, which is absent in the Vedas.", "isCorrect": false, "rationale": "Nishkama karma is a core concept of the Bhagavad Gita, not the Upanishads."}, {"text": "The Upanishads are unique in being composed in regional vernaculars, whereas the Vedas are exclusively in archaic Vedic Sanskrit.", "isCorrect": false, "rationale": "Both the Vedas and Upanishads are primarily in Sanskrit (Vedic or classical). The text mentions 'regional vernaculars' in the broader context of Hinduism's library, not specifically for Upanishads as distinct from Vedas."}], "id": "q02"}, {"question": "The Nasadiya Sukta (Hymn of Creation) in the Rigveda, by asking 'Who really knows?' and holding the question open, exemplifies what aspect of Hindu wisdom?", "options": [{"text": "A definitive assertion of a single, omniscient creator god as the source of all knowledge.", "isCorrect": false, "rationale": "The hymn 'does not answer; it simply holds the question open,' which contradicts a definitive assertion of knowledge."}, {"text": "The importance of scientific inquiry and empirical evidence over spiritual contemplation.", "isCorrect": false, "rationale": "The context is philosophical and spiritual, not scientific in a modern empirical sense."}, {"text": "A form of 'reverent uncertainty' that acknowledges the limits of human comprehension regarding ultimate origins.", "isCorrect": true, "rationale": "The text explicitly states that 'this kind of reverent uncertainty is itself a form of wisdom,' highlighting an acceptance of the unknowable."}, {"text": "The belief that all answers to cosmic questions are found exclusively through rigorous ascetic practices.", "isCorrect": false, "rationale": "The text does not link this 'reverent uncertainty' to ascetic practices but rather to a philosophical stance on creation."}], "id": "q03"}, {"question": "According to the Bhagavad Gita and the concept of nishkama karma, what is the essential principle guiding one's actions?", "options": [{"text": "Performing one's duty with the sole aim of achieving favorable outcomes and rewards.", "isCorrect": false, "rationale": "The text states, 'You have a right to perform your duty, but not to the fruits of your actions,' directly contradicting the aim of achieving favorable outcomes."}, {"text": "Acting decisively based on divine instruction, regardless of personal feelings or familial ties.", "isCorrect": false, "rationale": "While Krishna does instruct Arjuna, the core of nishkama karma is detachment from *outcomes*, not solely acting on instruction regardless of feelings, though that is a related theme in the Gita."}, {"text": "Engaging in one's duties diligently while remaining detached from the desire for specific results or 'fruits of your actions.'", "isCorrect": true, "rationale": "The 'did you know' box defines nishkama karma as 'acting without being attached to the outcome,' and the main text mentions 'performing one's duty without attachment to outcomes.'"}, {"text": "Prioritizing personal spiritual liberation above all worldly responsibilities and duties.", "isCorrect": false, "rationale": "The Gita emphasizes the importance of performing one's duty (dharma), integrating spiritual understanding with action rather than abandoning worldly responsibilities."}], "id": "q04"}, {"question": "The Bhagavad Gita is described as a 720-verse poem embedded within a larger epic. Which epic is this, and what does this embedding suggest about the Gita's role?", "options": [{"text": "The Ramayana; it functions as a concluding philosophical summary of the epic's moral lessons.", "isCorrect": false, "rationale": "The Bhagavad Gita is embedded within the Mahabharata, not the Ramayana."}, {"text": "The Puranas; it serves as a collection of ancient stories about gods, separate from the main narrative.", "isCorrect": false, "rationale": "The Bhagavad Gita is part of the Mahabharata, not the Puranas, and it is integral to the narrative, not separate."}, {"text": "The Mahabharata; it provides a crucial philosophical and ethical dialogue at a pivotal moment within a vast narrative of war and duty.", "isCorrect": true, "rationale": "The text states the Gita is 'embedded within the great epic Mahabharata' and is a conversation addressing 'Arjuna's immediate dilemma' and 'the whole human condition,' making it pivotal within the epic's themes of duty and conflict."}, {"text": "The Dharmashastra; it lays out specific laws and social order rules for the epic's characters.", "isCorrect": false, "rationale": "The Bhagavad Gita is part of the Mahabharata, and the Dharmashastra is a separate category of texts focused on law and social order."}], "id": "q05"}, {"question": "Given the 'clear architecture' of Hindu sacred texts, how would the Bhagavad Gita be best positioned in relation to the foundational Vedas and the philosophical Upanishads?", "options": [{"text": "It is a direct continuation and expansion of the ritualistic practices found in the Samaveda.", "isCorrect": false, "rationale": "The Gita focuses on ethical and spiritual instruction, not primarily on ritualistic practices like the Samaveda."}, {"text": "It serves as a practical application and synthesis of Upanishadic philosophical insights (like the nature of the self) within an ethical framework of duty, action, and devotion, building upon the Vedic foundation.", "isCorrect": true, "rationale": "The Gita is described as the 'ethical and spiritual summit,' addressing 'the nature of the self' (an Upanishadic theme) and 'duty, action, devotion,' effectively synthesizing deeper philosophical truths with practical living, building upon the foundational Vedas."}, {"text": "It precedes the Vedas as an even older, orally transmitted text, making it the true foundational scripture.", "isCorrect": false, "rationale": "The Vedas are explicitly stated as the 'oldest and most authoritative' and 'at the foundation,' while the Gita is embedded in a later epic."}, {"text": "It is an independent text unrelated to the Vedas or Upanishads, focusing solely on mythology.", "isCorrect": false, "rationale": "The Gita's themes of 'nature of the self' and 'paths of knowledge' connect it to Upanishadic thought, and it is deeply respected as an ethical/spiritual text, not just mythology."}], "id": "q06"}, {"question": "The text states that the Upanishads 'are not for passive readers; they require the reader to wrestle with ideas that exceed normal categories.' What characteristic primarily contributes to this demand for active engagement?", "options": [{"text": "Their prescriptive legal codes which demand strict adherence and interpretation.", "isCorrect": false, "rationale": "Legal codes are characteristic of Dharmashastra texts, not the Upanishads, which are philosophical."}, {"text": "Their extensive use of historical accounts and genealogies that require memorization.", "isCorrect": false, "rationale": "Historical accounts and genealogies are found in the Puranas, not the primary focus of the Upanishads."}, {"text": "Their use of paradoxical answers and deep philosophical questions about ultimate reality, challenging conventional understanding.", "isCorrect": true, "rationale": "The text mentions 'the deepest questions' and 'answers are often paradoxical' (e.g., Brahman being both smaller and larger than the earth), which forces readers to 'wrestle with ideas' beyond ordinary thought."}, {"text": "Their archaic Vedic Sanskrit language, which necessitates scholarly linguistic expertise.", "isCorrect": false, "rationale": "While the language can be challenging, the text emphasizes the *ideas* and their paradoxical nature, rather than just the language barrier, as the reason for active engagement."}], "id": "q07"}, {"question": "The Bhagavad Gita is described as addressing 'the whole human condition' and being a 'complete manual for living.' What is its overarching purpose, as presented in the text?", "options": [{"text": "To primarily narrate the ancient history and genealogies of Hindu gods and heroes.", "isCorrect": false, "rationale": "This describes the Puranas and the epics (Mahabharata, Ramayana) more broadly, not the specific purpose of the Gita as an ethical manual."}, {"text": "To provide a comprehensive guide on performing one's duty, understanding the self, and finding paths to God amidst life's moral dilemmas.", "isCorrect": true, "rationale": "Krishna 'instructs the warrior Arjuna on duty, action, devotion, and the nature of the self,' addressing 'not just Arjuna's immediate dilemma but the whole human condition,' making it a 'manual for living.'"}, {"text": "To compile a definitive set of ritual hymns and prayers for daily religious observance.", "isCorrect": false, "rationale": "This is characteristic of the Vedas, particularly the Samaveda, not the Bhagavad Gita."}, {"text": "To establish strict legal and social order guidelines for all aspects of Hindu society.", "isCorrect": false, "rationale": "This is the domain of the Dharmashastra texts, not the Bhagavad Gita."}], "id": "q08"}, {"question": "The description of the Mahabharata and Ramayana as 'not just literature' but 'lived,' being 'performed, danced, televised, and retold' across the Indian subcontinent, implies what about their role in Hindu tradition?", "options": [{"text": "They serve primarily as historical archives, documenting factual events of ancient India.", "isCorrect": false, "rationale": "While they contain historical elements, the emphasis on being 'lived,' performed, and retold points to a cultural and spiritual role beyond mere historical documentation."}, {"text": "Their importance is confined to scholarly study and academic interpretation of ancient texts.", "isCorrect": false, "rationale": "The widespread performance, dancing, and televising of these stories indicates their popular and accessible nature, not confined to academia."}, {"text": "They are integral to the cultural, ethical, and spiritual fabric of Hindu society, continually informing and shaping daily life and values.", "isCorrect": true, "rationale": "Being 'lived,' performed, danced, televised, and retold across the subcontinent signifies their profound and continuous influence on the culture, ethics, and spirituality of the people."}, {"text": "They function exclusively as entertainment, devoid of deeper religious or philosophical meaning.", "isCorrect": false, "rationale": "The text mentions 'the divine king Rama, his faithful wife Sita, and the cosmic struggle between good and evil,' implying deep religious and philosophical meaning beyond mere entertainment."}], "id": "q09"}, {"question": "At the 'foundation' of Hinduism's sacred library, described as the 'oldest and most authoritative scriptures,' are which texts?", "options": [{"text": "The Puranas, due to their vast collection of ancient stories.", "isCorrect": false, "rationale": "The Puranas are listed 'Beyond these core texts,' not at the foundation."}, {"text": "The Upanishads, as they contain the 'philosophical heart' of the tradition.", "isCorrect": false, "rationale": "The Upanishads are 'attached to the Vedas' and represent the 'philosophical heart,' but the Vedas themselves are explicitly stated as the 'foundation.'"}, {"text": "The Bhagavad Gita, revered as the 'ethical and spiritual summit' by most Hindus.", "isCorrect": false, "rationale": "The Bhagavad Gita is embedded within the Mahabharata, and while highly revered, the Vedas are identified as the foundational texts."}, {"text": "The Four Vedas (Rigveda, Samaveda, Yajurveda, and Atharvaveda).", "isCorrect": true, "rationale": "The text explicitly states: 'At the foundation are the four Vedas—the oldest and most authoritative scriptures of Hinduism—Rigveda, Samaveda, Yajurveda, and Atharvaveda.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
