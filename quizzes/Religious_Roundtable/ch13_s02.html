<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental distinction between Shruti and Smriti in Hinduism?", "options": [{"text": "Shruti texts are written in Sanskrit, while Smriti texts are composed in regional Indian languages.", "isCorrect": false, "rationale": "The language of composition is not the fundamental distinction; both categories can be in Sanskrit."}, {"text": "Shruti texts are considered directly revealed ('heard') by ancient seers, while Smriti texts are humanly composed yet divinely inspired.", "isCorrect": true, "rationale": "The text explicitly states that Shruti is 'that which is heard' by rishis in meditation, implying direct revelation, while Smriti is 'humanly composed texts -- still sacred and authoritative, but arising from human wisdom rather than direct revelation.'"}, {"text": "Shruti texts focus on rituals and hymns, while Smriti texts primarily deal with philosophical speculation.", "isCorrect": false, "rationale": "While contents vary, both categories can contain elements of rituals, hymns, and philosophy. The core distinction lies in their origin, not content focus."}, {"text": "Shruti texts are accessible only to priests, whereas Smriti texts are meant for the general populace.", "isCorrect": false, "rationale": "The text does not mention restrictions on accessibility based on the Shruti/Smriti classification."}], "id": "q01"}, {"question": "According to the provided text, which of these sets of sacred texts exclusively belongs to the Shruti category?", "options": [{"text": "The Mahabharata and the Ramayana", "isCorrect": false, "rationale": "The text classifies the Mahabharata and Ramayana as epics, which fall under the Smriti category."}, {"text": "The Vedas and the Upanishads", "isCorrect": true, "rationale": "The text explicitly states that Shruti 'Includes the Vedas and Upanishads.'"}, {"text": "The Bhagavad Gita and the Puranas", "isCorrect": false, "rationale": "The Bhagavad Gita is 'technically' Smriti (as part of the Mahabharata), and the Puranas are also listed under Smriti."}, {"text": "The Upanishads and the Bhagavad Gita", "isCorrect": false, "rationale": "While Upanishads are Shruti, the Bhagavad Gita is classified as Smriti."}], "id": "q02"}, {"question": "The text notes that the Bhagavad Gita, though technically Smriti, is 'treated with the same reverence as the Vedas' by millions of Hindus. What does this observation primarily suggest about the Shruti-Smriti distinction?", "options": [{"text": "The formal classification system is largely irrelevant and ignored by practitioners.", "isCorrect": false, "rationale": "The text states the distinction is 'crucial' but notes the boundary is 'porous,' implying it's not irrelevant but flexible in practice."}, {"text": "The practical devotional experience of adherents can sometimes transcend or blur formal theological categories.", "isCorrect": true, "rationale": "The statement highlights that despite its technical classification, the Gita's practical reverence is akin to Shruti, suggesting that in practice, the boundary is 'porous' and the reverence for a text can be independent of its formal category."}, {"text": "The Bhagavad Gita is an exception and should be reclassified as a Shruti text.", "isCorrect": false, "rationale": "The text maintains its 'technical' Smriti classification, but points out the practical reverence, not a reclassification."}, {"text": "Hindus prioritize texts that feature divine dialogue over those that are directly revealed.", "isCorrect": false, "rationale": "The text says 'same reverence as the Vedas,' not that it is preferred or prioritized over Shruti texts generally."}], "id": "q03"}, {"question": "A new generation of Hindu students is taught sacred hymns and philosophical insights by their spiritual guide, who in turn learned from their own teacher, continuing a tradition passed down through centuries. This process most accurately illustrates which Hindu concept?", "options": [{"text": "The experience of ancient rishis 'hearing' revealed texts in deep meditation.", "isCorrect": false, "rationale": "Rishis 'hearing' refers to the origin of Shruti, not the ongoing transmission of established knowledge."}, {"text": "The human composition of Smriti texts inspired by divine wisdom.", "isCorrect": false, "rationale": "This describes the origin of Smriti, not the method of passing on existing sacred knowledge."}, {"text": "The unbroken chain of teacher-to-student transmission, known as Parampara, facilitated by a Guru.", "isCorrect": true, "rationale": "The text defines 'Guru' as the 'living link in the chain of transmission' and 'Parampara' as the 'unbroken chain of teacher-to-student transmission through which sacred knowledge is preserved and passed on.' This scenario perfectly matches these definitions."}, {"text": "The idea that sacred truth is spontaneously reinvented by each generation's spiritual leaders.", "isCorrect": false, "rationale": "The text emphasizes that sacred knowledge is 'preserved and passed on' and is 'eternal truth' that is recovered, not reinvented."}], "id": "q04"}, {"question": "Krishna's revelation in Gita 4:1-3, where he explains that the teaching was originally given to Vivasvat, lost, and then restored by him, implies what about the nature of sacred knowledge?", "options": [{"text": "Sacred knowledge is a human invention that evolves and improves over time with new philosophical insights.", "isCorrect": false, "rationale": "The text states, 'Sacred knowledge, in this view, is not invented by human genius – it is eternal truth.'"}, {"text": "Divine teachings are inherently fragile and frequently altered by human interpretation, requiring constant re-composition.", "isCorrect": false, "rationale": "The knowledge is 'lost' and 'recovered,' implying its eternal nature, not inherent fragility or need for re-composition."}, {"text": "Sacred knowledge is an eternal truth that exists independently and must be periodically recovered or restored, often through divine grace.", "isCorrect": true, "rationale": "The text explicitly states, 'it is eternal truth that has always existed, periodically lost, and periodically recovered through the grace of a divine teacher.'"}, {"text": "Only texts directly 'heard' by rishis are truly eternal; humanly composed texts are always ephemeral.", "isCorrect": false, "rationale": "While it describes the origin of this specific teaching as eternal, the statement applies to the nature of sacred truth itself, not just Shruti texts. The Gita, a Smriti text, transmits this eternal truth."}], "id": "q05"}, {"question": "The Bhagavad Gita presents its deepest sacred teaching in the unique context of:", "options": [{"text": "A solitary monk meditating in a peaceful monastery.", "isCorrect": false, "rationale": "The text explicitly states: 'the deepest sacred teaching is given not to a monk in a monastery.'"}, {"text": "A philosophical symposium discussing abstract metaphysical concepts.", "isCorrect": false, "rationale": "While it covers metaphysics, the setting is a dialogue on a battlefield, not a symposium."}, {"text": "A warrior facing an existential crisis and moral dilemma on a battlefield.", "isCorrect": true, "rationale": "The text describes it as spoken 'to the warrior Arjuna on a battlefield just before a catastrophic war' when 'Arjuna is paralyzed by doubt and grief.'"}, {"text": "A royal court where a king seeks guidance on governance and ethics.", "isCorrect": false, "rationale": "While dharma is a theme, the immediate setting for the dialogue is the battlefield, not a royal court."}], "id": "q06"}, {"question": "The text highlights that the Gita's format as a conversation between a questioning student and a divine teacher is 'itself a theological statement.' What is the most significant implication of this format for understanding the nature of revelation?", "options": [{"text": "Revelation is a one-way, unchanging broadcast of divine truths, universally applicable without individual interpretation.", "isCorrect": false, "rationale": "The text states, 'Revelation is not a one-way broadcast dropped from the sky.'"}, {"text": "Divine wisdom is primarily accessed through strict adherence to ritualistic practices and ancient ceremonies.", "isCorrect": false, "rationale": "The format emphasizes dialogue and response to personal need, not just ritual."}, {"text": "Revelation is a dynamic response, tailored to genuine human needs and shaped by the specific questions and circumstances of an individual.", "isCorrect": true, "rationale": "The text states, 'It is a response to genuine human need, spoken in the language of a particular moment, shaped by the questions of a particular person.'"}, {"text": "Only those deemed 'worthy' or 'enlightened' by birthright can truly receive and comprehend sacred truth.", "isCorrect": false, "rationale": "The text indicates 'Arjuna's confusion is not a failure; it is the opening through which wisdom enters,' implying an open access for genuine seekers."}], "id": "q07"}, {"question": "In Gita 4:1-3, Krishna describes the initial transmission of the 'deathless Yoga.' According to his account, who was the first recipient of this teaching from Krishna?", "options": [{"text": "Manu, the first man.", "isCorrect": false, "rationale": "Krishna states that Vivasvat taught it to Manu, not that Krishna taught it to Manu first."}, {"text": "Ikshvaku, the first king.", "isCorrect": false, "rationale": "Ikshvaku received the teaching from Manu, making him further down the chain, not the first recipient from Krishna."}, {"text": "Vivasvat, the Lord of Light.", "isCorrect": true, "rationale": "Krishna explicitly states: 'I taught Vivaswata, the Lord of Light.'"}, {"text": "Arjuna, the warrior prince.", "isCorrect": false, "rationale": "Arjuna is the current recipient, to whom Krishna is restoring the lost teaching, not the first."}], "id": "q08"}, {"question": "In the excerpt from Bhagavad Gita 4:1-3, Krishna explains, 'When Righteousness Declines... when Wickedness Is strong, I rise, from age to age, and take Visible shape, and move a man with men.' This statement primarily illustrates Krishna's role as:", "options": [{"text": "A human sage who occasionally gains profound insights to guide humanity.", "isCorrect": false, "rationale": "Krishna refers to himself as 'Unborn, undying, indestructible, The Lord of all things living,' indicating a divine, not merely human, nature."}, {"text": "The primary composer of all Smriti texts, ensuring their accuracy.", "isCorrect": false, "rationale": "This passage describes his periodic divine incarnations to restore cosmic balance, not his role in composing texts generally."}, {"text": "An eternal, divine being who cyclically incarnates on earth in various forms to restore dharma and vanquish evil.", "isCorrect": true, "rationale": "Krishna states 'Manifold the renewals of my birth Have been... I come, and go, and come. When Righteousness Declines... I rise, from age to age,' which perfectly describes the concept of divine avatars appearing to restore balance."}, {"text": "A mythical figure whose stories inspire moral lessons but are not meant to be taken literally.", "isCorrect": false, "rationale": "The context is Krishna speaking of his own direct actions and nature, implying a literal reality within the narrative."}], "id": "q09"}, {"question": "The text concludes by stating, 'every reader who brings their own genuine questions to the Gita is, in a sense, Arjuna.' What is the most significant implication of this comparison for a modern reader of the Bhagavad Gita?", "options": [{"text": "Readers must strictly adhere to ancient interpretations without personal inquiry, just as Arjuna eventually accepted Krishna's wisdom.", "isCorrect": false, "rationale": "The phrase 'brings their own genuine questions' directly contradicts the idea of unquestioning adherence."}, {"text": "The Gita's teachings are exclusively relevant to specific historical contexts and military dilemmas, not contemporary life.", "isCorrect": false, "rationale": "The comparison implies universal relevance, allowing modern readers to find personal meaning in their own questions."}, {"text": "The act of engaging with the text is an active, personal journey of seeking wisdom, where one's own struggles and questions become an opening for sacred truth.", "isCorrect": true, "rationale": "The text states, 'Arjuna's confusion is not a failure; it is the opening through which wisdom enters,' implying that a reader's genuine questions serve a similar purpose in accessing the text's wisdom."}, {"text": "To truly understand the Gita, a reader must undergo a physical battlefield experience themselves.", "isCorrect": false, "rationale": "The comparison is metaphorical, inviting readers to engage with their internal dilemmas, not literal external battles."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
