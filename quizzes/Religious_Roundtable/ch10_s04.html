        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what is the central focus of revelation in Christianity?", "options": [{"text": "A comprehensive set of laws given at Sinai.", "isCorrect": false, "rationale": "This describes the focus of revelation in Judaism, not Christianity, which centers on a person."}, {"text": "God becoming a human being in Jesus Christ.", "isCorrect": true, "rationale": "The text states, 'Christianity centers its account of revelation on a person. God did not merely send a message or dictate a scripture; God became a human being.'"}, {"text": "The verbatim recitation of God's final speech to humanity.", "isCorrect": false, "rationale": "This describes the focus of revelation in Islam, which centers on a recitation."}, {"text": "A continuous process of rabbinic interpretation and argument.", "isCorrect": false, "rationale": "This describes a facet of revelation in Judaism, not Christianity, which focuses on a singular event and person."}], "id": "q01"}, {"question": "How does the Jewish tradition described in the text primarily define the appropriate response to God's revelation?", "options": [{"text": "Through intellectual assent and deep theological study alone.", "isCorrect": false, "rationale": "While study is important in Judaism, the text emphasizes 'doing it, embodying it in the rhythms of daily life,' rather than just intellectual assent."}, {"text": "By trusting in a specific person through whom God's ultimate revelation occurred.", "isCorrect": false, "rationale": "This describes the Christian understanding of faith ('trusting in that event and in the person through whom it happened'), not the Jewish emphasis on practice."}, {"text": "By embodying the Torah's instructions in daily life and engaging in ongoing interpretation.", "isCorrect": true, "rationale": "The text states for Judaism: 'The appropriate response is not simply believing the Torah but doing it, embodying it in the rhythms of daily life. Revelation, moreover, did not stop at Sinai. It continues in every generation of rabbinic interpretation...'"}, {"text": "Primarily through the declaration of faith (Shahada) and adherence to the Five Pillars.", "isCorrect": false, "rationale": "This describes the Islamic understanding of faith (iman) and practice, not the Jewish approach."}], "id": "q02"}, {"question": "What distinguishes Islam's understanding of revelation, as presented in the text, regarding the nature of the Quran?", "options": [{"text": "It is a collection of parables and teachings from various prophets.", "isCorrect": false, "rationale": "The text specifies the Quran as 'God's direct, verbatim, and final speech to humanity,' not a collection of parables from various sources."}, {"text": "It represents God's spirit made manifest in human form.", "isCorrect": false, "rationale": "This concept aligns more with the Christian understanding of revelation (God becoming human) than the Islamic view of the Quran."}, {"text": "It is God's direct, verbatim, and final speech, preserved perfectly in Arabic.", "isCorrect": true, "rationale": "The text explicitly states: 'The Quran is God's direct, verbatim, and final speech to humanity, transmitted through the prophet Muhammad and preserved perfectly in Arabic.'"}, {"text": "It serves as a starting point for continuous, evolving human interpretation of God's will.", "isCorrect": false, "rationale": "While interpretation exists, the text emphasizes the Quran as 'final speech' and 'preserved perfectly,' implying a fixed authority rather than an evolving starting point in the Jewish sense."}], "id": "q03"}, {"question": "The text notes that Christian faith (pistis) 'precedes full understanding rather than waiting for it.' This implies that for Christians, the act of faith is primarily:", "options": [{"text": "An intellectual endeavor to grasp divine truths before commitment.", "isCorrect": false, "rationale": "The text states faith 'precedes full understanding,' directly contradicting the idea of waiting for intellectual grasp before commitment."}, {"text": "A personal and relational trust in an event and a person.", "isCorrect": true, "rationale": "The text defines Christian faith as 'personal, relational, oriented toward Jesus Christ,' and 'trusting in that event and in the person through whom it happened,' which aligns with it preceding full understanding."}, {"text": "A disciplined adherence to a set of practices and rituals.", "isCorrect": false, "rationale": "This describes the response in Islam ('structured, disciplined life of practice') or Judaism ('doing it, embodying it'), not the Christian emphasis on personal trust that precedes understanding."}, {"text": "A continuous debate and reinterpretation of sacred texts.", "isCorrect": false, "rationale": "This describes a characteristic of Jewish revelation (rabbinic interpretation), not the primary nature of Christian faith as described."}], "id": "q04"}, {"question": "What is a shared affirmation among all three Abrahamic traditions, according to the text?", "options": [{"text": "That earlier revelations have been superseded by later ones.", "isCorrect": false, "rationale": "The text explicitly states they 'disagree... whether earlier revelations remain authoritative or have been superseded,' indicating this is not a shared affirmation."}, {"text": "That God became a human being to reveal divine will.", "isCorrect": false, "rationale": "This is a core belief of Christianity, but not shared by Judaism or Islam, which do not believe God became human."}, {"text": "That the Quran is the final and verbatim word of God.", "isCorrect": false, "rationale": "This is a core belief of Islam, but not shared by Christianity or Judaism."}, {"text": "That God speaks to humanity.", "isCorrect": true, "rationale": "The text explicitly states: 'All three traditions affirm that God speaks to humanity.' This is the fundamental commonality before their disagreements."}], "id": "q05"}, {"question": "The statement 'A Christian reading the Quran, a Muslim reading the Gospels, a Jew reading both -- each encounters a family member and a stranger at the same time' primarily highlights which aspect of interfaith engagement?", "options": [{"text": "The inevitable conversion of adherents when encountering other traditions.", "isCorrect": false, "rationale": "The text does not imply conversion; rather, it speaks to shared lineage and profound differences in understanding."}, {"text": "The underlying monotheistic belief shared, alongside significant theological and practical differences.", "isCorrect": true, "rationale": "The 'family member' refers to the shared Abrahamic heritage and 'One God,' while the 'stranger' refers to the 'remarkably different accounts of how that God speaks -- and what it means to respond' and their deep disagreements."}, {"text": "The historical and political tensions that define their relationships.", "isCorrect": false, "rationale": "While such tensions exist, the text explicitly states: 'The tension among these three traditions is not merely historical or political. It is deeply philosophical,' indicating the metaphor points beyond these surface tensions."}, {"text": "The complete incompatibility of their sacred texts and beliefs.", "isCorrect": false, "rationale": "The 'family member' aspect indicates a shared root and not complete incompatibility, even with significant differences."}], "id": "q06"}, {"question": "The text poses a 'deeply philosophical' tension. Which of the following best encapsulates this tension?", "options": [{"text": "Whether political borders should reflect religious demographics.", "isCorrect": false, "rationale": "The text explicitly states the tension 'is not merely historical or political,' but 'deeply philosophical,' relating to the nature of divine communication itself."}, {"text": "How to reconcile three distinct accounts of revelation from the same God.", "isCorrect": true, "rationale": "The text asks: 'If the same God truly spoke to Abraham, Moses, Jesus, and Muhammad, how do we account for the differences? Did God speak differently...? Did human beings hear imperfectly? Is one account correct...?' This directly addresses the philosophical challenge of reconciling the differing revelations from a single divine source."}, {"text": "The debate over which prophet was the first to receive divine communication.", "isCorrect": false, "rationale": "The focus is on the *differences* in the accounts of revelation and their implications, not simply the chronological order of prophets."}, {"text": "The difficulty in accurately translating ancient religious texts into modern languages.", "isCorrect": false, "rationale": "The philosophical tension is about the *nature* of the revelation itself and its reception, not primarily about translation challenges."}], "id": "q07"}, {"question": "Judaism's understanding that revelation 'continues in every generation of rabbinic interpretation, argument, and wrestling with the text' implies which of the following about divine communication?", "options": [{"text": "Revelation is a closed book, fixed and unchangeable since Sinai.", "isCorrect": false, "rationale": "The statement directly contradicts this, emphasizing that revelation 'continues' beyond Sinai through interpretation."}, {"text": "God's word is dynamic and requires ongoing human engagement to be fully lived and understood.", "isCorrect": true, "rationale": "The continuous nature of rabbinic interpretation, argument, and wrestling implies that God's word is not static but requires active, generational engagement to be applied and understood in evolving contexts."}, {"text": "Humanity's understanding of God's word is inherently perfect from the outset.", "isCorrect": false, "rationale": "The idea of 'wrestling with the text' suggests an ongoing effort to understand, implying that initial understanding may not be perfect or complete."}, {"text": "Religious law is entirely subject to individual opinion without communal guidance.", "isCorrect": false, "rationale": "Rabbinic interpretation is a communal and structured process, not merely individual opinion, providing guidance for living God's word."}], "id": "q08"}, {"question": "If a Muslim scholar were to critically analyze Christian or Jewish texts based on the perspective provided, what is a likely point of emphasis regarding the finality of revelation?", "options": [{"text": "They would likely assert that all three revelations are equally authoritative and complete.", "isCorrect": false, "rationale": "The text notes Islam centers on the Quran as 'final speech,' implying a view that it supersedes earlier revelations, rather than seeing them as equally complete."}, {"text": "They would likely accept that Christian revelation through Jesus represents God's ultimate message.", "isCorrect": false, "rationale": "The text states Islam considers the Quran 'God's direct, verbatim, and final speech,' transmitted through Muhammad, implying it is the ultimate message, not Jesus's revelation."}, {"text": "They would likely question the notion of ongoing rabbinic interpretation, emphasizing the Quran's definitive status.", "isCorrect": true, "rationale": "Islam's emphasis on the Quran as 'direct, verbatim, and final speech' would likely lead a Muslim scholar to view ongoing interpretation (as in Judaism) or a personal manifestation (as in Christianity) differently, asserting the definitive and unchanging nature of the Quran as the last word."}, {"text": "They would likely commend the open-ended nature of Jewish and Christian interpretations.", "isCorrect": false, "rationale": "Given Islam's emphasis on the Quran as 'final speech' and 'preserved perfectly,' it is less likely they would commend the open-ended nature of other traditions' interpretations as aligning with their core understanding of finality."}], "id": "q09"}, {"question": "The 'question to carry forward' at the end of the section primarily invites the reader to consider:", "options": [{"text": "Which of the three traditions has the largest global following.", "isCorrect": false, "rationale": "The 'question to carry forward' is philosophical, asking about the implications of the differing understandings of revelation, not about demographics or popularity."}, {"text": "The possibility that the nature of divine communication itself is complex and resists simple, unified description.", "isCorrect": true, "rationale": "The question asks: 'That one of them is wrong? That all of them are partially right? That the nature of divine communication itself resists simple description?' The final option directly refers to the complexity of divine communication, aligning with the philosophical depth of the question."}, {"text": "Whether political intervention is necessary to resolve interfaith conflicts.", "isCorrect": false, "rationale": "The section explicitly states the tension is 'not merely historical or political' and the question focuses on theological/philosophical conclusions, not political solutions."}, {"text": "How each tradition can merge its core beliefs into a single, cohesive theology.", "isCorrect": false, "rationale": "The text highlights profound disagreements, not an invitation to merge beliefs, but rather to analyze the implications of these differences."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
