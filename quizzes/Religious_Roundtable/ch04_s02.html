    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes Brahman, according to the Upanishads?", "options": [{"text": "A personal god with intentions and feelings, often prayed to for guidance.", "isCorrect": false, "rationale": "The text explicitly states Brahman is 'not a god you can pray to, not a person with feelings and intentions,' emphasizing its impersonal nature."}, {"text": "The ultimate, infinite, impersonal reality that underlies and pervades all existence, serving as the ground of all being.", "isCorrect": true, "rationale": "The text defines Brahman as 'the ultimate, infinite, impersonal reality that underlies and pervades all existence; not a god among gods, but the ground of all being—the source from which everything arises and to which everything returns.'"}, {"text": "The collective consciousness of all individual souls (atman) merged into one entity.", "isCorrect": false, "rationale": "While Atman is identical with Brahman, Brahman is described as the foundational reality itself, not merely a sum of individual consciousnesses. It is the 'ocean' rather than a collection of 'waves'."}, {"text": "A temporary illusion (maya) that distracts individuals from their true self.", "isCorrect": false, "rationale": "Brahman is the ultimate reality, not an illusion. Maya is the misidentification of the self with the individual personality, preventing the experience of Brahman."}], "id": "q01"}, {"question": "The famous Upanishadic statement 'Tat tvam asi' ('That art thou') fundamentally implies which of the following?", "options": [{"text": "That the individual self is a distinct fragment of the universe, observing it from an external perspective.", "isCorrect": false, "rationale": "The text states the opposite: 'At the deepest level, you are not a fragment of the universe looking at it from outside.'"}, {"text": "That personal suffering is an inevitable part of the human condition and cannot be transcended.", "isCorrect": false, "rationale": "While suffering exists, 'Tat tvam asi' points towards the path of liberation from it, not its inevitability. Maya, not 'Tat tvam asi', is linked to suffering."}, {"text": "The ultimate identity of the individual soul (atman) with the universal ultimate reality (Brahman).", "isCorrect": true, "rationale": "The text directly states, 'the same tradition insists that the innermost self of every human being—called atman...is not separate from Brahman... The Upanishads sum this up in one of the most famous sentences in the history of philosophy: 'Tat tvam asi'—That art thou.''"}, {"text": "The importance of adhering strictly to one's dharma to achieve a favorable rebirth.", "isCorrect": false, "rationale": "While dharma is important, 'Tat tvam asi' is a statement about metaphysical identity, not primarily about ethical conduct or rebirth."}], "id": "q02"}, {"question": "According to Hindu philosophy, 'maya' is considered the root of all human suffering primarily because it:", "options": [{"text": "Causes individuals to experience endless cycles of birth and death (samsara).", "isCorrect": false, "rationale": "Samsara is the vehicle through which karma operates, but maya is the *cause* of the karma that leads to samsara, by creating the illusion of separateness."}, {"text": "Prompts individuals to pursue righteous actions (dharma) at the expense of spiritual liberation.", "isCorrect": false, "rationale": "Dharma is not the cause of suffering; it's a path towards aligning with reality. Maya is the misidentification, not the pursuit of dharma."}, {"text": "Creates the misidentification of the self with the individual personality rather than with Brahman.", "isCorrect": true, "rationale": "The text states: 'This misidentification of the self with the individual personality rather than with Brahman is called 'maya'...and it is the root of all human suffering.'"}, {"text": "Is an external force that punishes individuals for their past negative karma.", "isCorrect": false, "rationale": "Maya is an internal illusion or misidentification, not an external punitive force. Karma operates as a natural moral structure, not a punishment from an outside judge."}], "id": "q03"}, {"question": "How does 'dharma' function within the Hindu ethical and cosmic framework?", "options": [{"text": "It is solely a personal code of conduct, varying widely for each individual based on their desires.", "isCorrect": false, "rationale": "Dharma is not solely a personal code, and it's not based on individual desires. It's tied to nature, stage of life, and social position, and has a cosmic dimension."}, {"text": "It represents an individual's accumulated good deeds, determining their next life's conditions.", "isCorrect": false, "rationale": "This describes karma, not dharma. Dharma refers to duties and cosmic/moral order, acting in accordance with which produces good karma."}, {"text": "It is both a cosmic principle that holds the universe together and specific duties that individuals must fulfill according to their nature and position.", "isCorrect": true, "rationale": "The text explains, 'Dharma is both a cosmic principle (the order that holds the universe together) and a personal obligation (the specific duties each person has, which differ by stage of life, gender, and social position).'"}, {"text": "It is the liberation from the cycle of rebirth, achieved through spiritual insight.", "isCorrect": false, "rationale": "This describes moksha, the ultimate goal, not dharma. Dharma is a means towards aligning with reality, which can eventually lead to moksha."}], "id": "q04"}, {"question": "A person acts with genuine kindness and compassion throughout their life, believing that their actions have consequences beyond immediate rewards. According to Hindu understanding, this behavior primarily demonstrates a recognition of:", "options": [{"text": "The illusion of maya, leading to detachment from worldly desires.", "isCorrect": false, "rationale": "While detachment from worldly desires can be a result of understanding maya, the direct action of kindness and belief in consequences points more directly to karma."}, {"text": "The impersonal nature of Brahman, which guides all ethical decisions.", "isCorrect": false, "rationale": "Brahman is the ultimate reality, but the concept that 'every action generates consequences' is the core of karma."}, {"text": "The law of karma, where intentional actions generate consequences that shape future experience.", "isCorrect": true, "rationale": "The text defines karma as 'the law of moral cause and effect; every action generates consequences that will be experienced in this life or in future lives; good actions create good karma, harmful actions create negative karma.' The person's belief aligns perfectly with this."}, {"text": "The immediate pursuit of moksha, the final liberation from samsara.", "isCorrect": false, "rationale": "Moksha is the ultimate goal, but the description is about the operation of moral actions and their consequences, which falls under karma, a step towards moksha."}], "id": "q05"}, {"question": "Which statement accurately characterizes the relationship between karma and samsara?", "options": [{"text": "Samsara is the ultimate goal of Hinduism, achieved by accumulating sufficient good karma.", "isCorrect": false, "rationale": "Moksha is the ultimate goal, which is liberation *from* samsara. Samsara is the cycle, not the goal."}, {"text": "Karma is a divine punishment for past misdeeds, while samsara is the judgment delivered by the gods.", "isCorrect": false, "rationale": "The text clarifies that karma is 'not as punishment from an outside judge, but as the natural moral structure of a universe.' Samsara is the cycle of rebirth, not a divine judgment."}, {"text": "Karma is the natural moral law dictating that actions have consequences, and samsara is the vehicle through which these consequences are experienced across multiple lives.", "isCorrect": true, "rationale": "The text states, 'Every intentional action generates karma... The vehicle through which karma operates across time is samsara—the endless cycle of birth, death, and rebirth... Each soul takes on new bodies in new lives, shaped by the karma of previous lives.'"}, {"text": "Samsara is the illusion (maya) that prevents individuals from understanding their true karma.", "isCorrect": false, "rationale": "Maya is the illusion of separateness. Samsara is the cycle of rebirth, a reality within the illusion, through which karma unfolds."}], "id": "q06"}, {"question": "Moksha, the ultimate goal in Hinduism, is best understood as:", "options": [{"text": "A heavenly afterlife where the soul resides eternally with specific deities.", "isCorrect": false, "rationale": "The text explicitly states, 'Moksha is not heaven in the sense of a pleasant afterlife'."}, {"text": "The accumulation of enough positive karma to achieve a permanent, exalted human rebirth.", "isCorrect": false, "rationale": "Moksha is liberation *from* rebirth, not achieving a better rebirth. While good karma can lead to favorable rebirths, moksha transcends the cycle entirely."}, {"text": "Liberation from the cycle of samsara, achieved by recognizing the atman's identity with Brahman and dissolving the illusion of separateness.", "isCorrect": true, "rationale": "The text defines moksha as 'liberation from the cycle of samsara; the ultimate goal of Hindu spiritual life, in which the individual soul (atman) recognizes its identity with Brahman and is freed from rebirth. Moksha is... the complete dissolution of the illusion of separateness.'"}, {"text": "The complete fulfillment of all personal and cosmic duties (dharma) over many lifetimes.", "isCorrect": false, "rationale": "While fulfilling dharma is part of the spiritual path, moksha is not merely the *fulfillment* of duties but the *transcendence* of the need for them through realizing ultimate identity."}], "id": "q07"}, {"question": "If an individual achieves moksha, what is the most significant change in their existence, according to the provided text?", "options": [{"text": "They gain the ability to manipulate the cosmic order (dharma) and influence the karma of others.", "isCorrect": false, "rationale": "Moksha is about liberation and dissolution of separateness, not gaining supernatural powers over cosmic principles or other individuals."}, {"text": "They escape the illusion of maya and cease to generate new karma, thereby ending the cycle of samsara.", "isCorrect": true, "rationale": "The text states, 'When you fully know that your deepest self is Brahman, there is no more karma to generate, no more rebirths to undergo, no more wheel to turn.' This implies escaping maya and stopping karma generation."}, {"text": "They become a personal deity (Brahman) that can be prayed to by other individuals seeking guidance.", "isCorrect": false, "rationale": "Brahman is described as impersonal, and moksha is the recognition of identity with this impersonal reality, not becoming a personal deity."}, {"text": "They are granted eternal residence in a specific heavenly realm, having earned divine favor.", "isCorrect": false, "rationale": "The text clarifies that moksha is 'not heaven in the sense of a pleasant afterlife,' but rather a dissolution of separateness."}], "id": "q08"}, {"question": "Consider a student who believes that their academic effort directly influences their future opportunities, and therefore dedicates themselves to studying diligently. In a Hindu philosophical context, this student's understanding aligns most closely with the principle of:", "options": [{"text": "Brahman, as it represents the ultimate reality shaping all outcomes.", "isCorrect": false, "rationale": "While Brahman is the ultimate reality, the direct link between effort and outcome is more specifically addressed by karma."}, {"text": "Maya, as the belief in individual agency can be an illusion.", "isCorrect": false, "rationale": "Maya is the illusion of separateness. The student's belief in cause-and-effect aligns with reality as understood by karma, not illusion."}, {"text": "Dharma, as it emphasizes the duties associated with one's stage of life.", "isCorrect": false, "rationale": "Diligence in studies could be considered a dharma for a student, but the core of the statement emphasizes the *consequences* of actions, which is the essence of karma."}, {"text": "Karma, as their intentional actions (studying) are believed to generate consequences (future opportunities).", "isCorrect": true, "rationale": "The text defines karma as the 'law of moral cause and effect; every action generates consequences that will be experienced in this life or in future lives.' The student's belief directly reflects this principle of actions leading to consequences."}], "id": "q09"}, {"question": "The text suggests that fully realizing the identity of one's deepest self (atman) with ultimate reality (Brahman) would feel like 'waking up from a dream.' This analogy implies that prior to this realization, one's experience of life is characterized by:", "options": [{"text": "A state of perfect bliss and unwavering connection to the divine.", "isCorrect": false, "rationale": "Waking up from a dream implies a less real or illusory previous state, not a perfect one. The text links the unrealized state to suffering caused by maya."}, {"text": "A clear understanding of the cosmic order (dharma) and one's place within it.", "isCorrect": false, "rationale": "While dharma provides order, the 'dream' analogy points to a fundamental misperception of reality, not merely a lack of understanding of one's duties."}, {"text": "Being caught in an illusory state (maya) where one perceives oneself as separate and distinct from ultimate reality.", "isCorrect": true, "rationale": "The text explicitly connects the experience of separateness to 'maya—often translated as 'illusion' or 'the veil'—and it is the root of all human suffering.' Waking from a dream fits this description of an illusory prior state."}, {"text": "The predetermined flow of destiny (karma), which cannot be altered by individual choice.", "isCorrect": false, "rationale": "The text clarifies that karma is not fate and individuals shape their future by choice. The dream analogy focuses on the nature of reality perception, not predestination."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
