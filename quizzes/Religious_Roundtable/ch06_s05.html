    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which of the following Chinese cultural practices is NOT explicitly mentioned in the text as having its roots or being shaped by Taoism?", "options": [{"text": "The internal martial arts like tai chi.", "isCorrect": false, "rationale": "The text explicitly states that 'The internal martial arts (tai chi, bagua, xinyi) are explicit embodiments of wu wei,' indicating their Taoist roots."}, {"text": "Traditional Chinese calligraphy.", "isCorrect": true, "rationale": "The text mentions Chinese medicine, Feng shui, internal martial arts, and Chinese painting and poetry as being shaped by Taoism, but calligraphy is not explicitly named."}, {"text": "The practice of Feng shui.", "isCorrect": false, "rationale": "The text states, 'Feng shui, the practice of arranging spaces in harmony with natural forces, is a Taoist art.'"}, {"text": "The concept of 'qi' in Chinese medicine.", "isCorrect": false, "rationale": "The text clearly links 'Chinese medicine—acupuncture, herbalism, the concept of qi...—is rooted in Taoist cosmology and the yin-yang framework.'"}]}, {"question": "The Taoist concept of 'wu wei' is described as countercultural in the modern world because it challenges:", "options": [{"text": "The importance of physical activity and exercise.", "isCorrect": false, "rationale": "Wu wei is not about physical inactivity in general, but specifically challenges ceaseless, often unproductive activity. The text mentions internal martial arts as embodying wu wei, which are forms of physical activity."}, {"text": "The contemporary emphasis on constant productivity and efficiency.", "isCorrect": true, "rationale": "The text states, 'There is something quietly radical about Taoism's challenge to the modern obsession with productivity, efficiency, and ceaseless activity,' directly linking wu wei to this challenge."}, {"text": "The need for strategic planning and goal-setting in business.", "isCorrect": false, "rationale": "Wu wei is about the *approach* to problems, not necessarily the rejection of all planning. It suggests wisdom in observation and allowing natural movement, which can still be strategic, but not obsessively 'doing more'."}, {"text": "The pursuit of spiritual enlightenment through doctrine.", "isCorrect": false, "rationale": "While Taoism (and Zen, influenced by it) emphasizes direct experience over doctrine, this option is more related to its religious/philosophical aspect than its 'countercultural' challenge to modern societal values like productivity."}]}, {"question": "How did Taoism contribute to the development of Chan Buddhism (Zen Buddhism)?", "options": [{"text": "It introduced the idea of strict monastic discipline and rigorous study of scriptures.", "isCorrect": false, "rationale": "The text states Zen's 'distrust of elaborate systems' and 'emphasis on direct experience over doctrine,' which contrasts with strict adherence to scriptures and elaborate systems."}, {"text": "It provided the foundational texts like the Lotus Sutra, which Zen adopted.", "isCorrect": false, "rationale": "The Lotus Sutra is a distinctly Buddhist text, not Taoist. The text mentions Zen's debt to Zhuangzi and Laozi, who are Taoist philosophers, not authors of Buddhist sutras."}, {"text": "It influenced Zen's emphasis on direct experience and a distrust of elaborate doctrines.", "isCorrect": true, "rationale": "The text explicitly states, 'Zen's emphasis on direct experience over doctrine, its distrust of elaborate systems, its practice of sitting quietly with what is—all of these owe a substantial debt to Zhuangzi and Laozi.'"}, {"text": "It established the concept of karma and reincarnation within Buddhist thought.", "isCorrect": false, "rationale": "Karma and reincarnation are core Buddhist doctrines that predate and are not specific contributions from Taoism to Buddhism."}]}, {"question": "A key Taoist insight that resonates with contemporary environmental thinking is that humans are primarily:", "options": [{"text": "The most intelligent species, destined to manage natural resources efficiently.", "isCorrect": false, "rationale": "The text states that 'Taoism never taught that human beings are the summit of creation, or that the natural world exists for human use,' which contradicts the idea of humans as masters or sole managers."}, {"text": "Participants in nature, rather than its masters.", "isCorrect": true, "rationale": "The text explicitly highlights this insight: 'The insight that humans are not masters of nature but participants in it—that the attempt to dominate natural systems inevitably generates resistance and disorder—resonates powerfully with contemporary environmental thinking.'"}, {"text": "Stewards of creation, responsible for its preservation and improvement.", "isCorrect": false, "rationale": "While 'stewardship' implies responsibility, the Taoist view emphasizes *participation* and avoiding domination, which is a subtle but important distinction from 'improving' nature or asserting control, even benevolent control."}, {"text": "Separate from nature, capable of observing and influencing it from a distance.", "isCorrect": false, "rationale": "The Taoist view emphasizes interconnectedness and participation, rejecting the idea of separation between humans and nature."}]}, {"question": "According to the text, the Taoist aesthetic that has influenced Chinese painting and poetry is characterized by:", "options": [{"text": "Bold colors, dramatic contrasts, and clear, definitive forms.", "isCorrect": false, "rationale": "The text describes the Taoist aesthetic as 'emptiness, suggestion, and naturalness,' which contrasts with bold, dramatic, and definitive characteristics."}, {"text": "Grand narratives, heroic figures, and explicit moral lessons.", "isCorrect": false, "rationale": "This describes a different artistic tradition, potentially more aligned with Confucianism or other narrative forms, rather than the subtle Taoist aesthetic of suggestion."}, {"text": "Emptiness, suggestion, and naturalness.", "isCorrect": true, "rationale": "The text directly states: 'Chinese painting and poetry have been shaped for centuries by the Taoist aesthetic of emptiness, suggestion, and naturalness.'"}, {"text": "Intricate detail, complex symbolism, and vibrant allegories.", "isCorrect": false, "rationale": "While some art forms use these, the Taoist aesthetic emphasizes 'emptiness' and 'suggestion,' which often means less intricate detail and more implied meaning."}]}, {"question": "A city council is debating whether to dam a river to create a new reservoir for municipal water, which would displace local wildlife and alter the ecosystem. From a Taoist ecological perspective, what primary concern might arise?", "options": [{"text": "The project might not be efficient enough to justify the financial investment.", "isCorrect": false, "rationale": "While efficiency is a modern concern, the Taoist ecological perspective focuses on the relationship with nature, not primarily financial efficiency."}, {"text": "Humans attempting to dominate a natural system will likely generate resistance and disorder.", "isCorrect": true, "rationale": "The text states, 'the insight that humans are not masters of nature but participants in it—that the attempt to dominate natural systems inevitably generates resistance and disorder—resonates powerfully with contemporary environmental thinking.'"}, {"text": "The displaced wildlife might seek new habitats in urban areas, causing new problems.", "isCorrect": false, "rationale": "This is a potential consequence, but the primary Taoist concern is the act of domination and its inherent imbalance, not just the specific logistical problems it might create."}, {"text": "It could set a precedent for future development projects that harm nature.", "isCorrect": false, "rationale": "This is a valid ethical concern, but the Taoist core insight is about the fundamental relationship of humans to nature as participants, not masters, and the consequences of violating that."}]}, {"question": "The statement 'The Tao flows through everything equally' implies what about the Taoist view of creation?", "options": [{"text": "Some parts of nature are more sacred or important than others.", "isCorrect": false, "rationale": "If the Tao flows through *everything equally*, it suggests no inherent hierarchy of sacredness or importance among different parts of creation."}, {"text": "Human beings are the pinnacle of creation and have a unique connection to the Tao.", "isCorrect": false, "rationale": "The text explicitly states, 'Taoism never taught that human beings are the summit of creation,' directly contradicting this option."}, {"text": "The natural world exists primarily for human utilization and benefit.", "isCorrect": false, "rationale": "The text states, 'the natural world exists for human use' is a concept Taoism did not teach. If the Tao flows equally, it suggests inherent value, not merely utilitarian value for humans."}, {"text": "All elements of the natural world possess intrinsic value and interconnectedness.", "isCorrect": true, "rationale": "If the 'Tao flows through everything equally,' it implies that all parts of creation share in the fundamental essence of the Tao, granting them equal intrinsic value and suggesting their interconnectedness within this flow."}]}, {"question": "Which statement best describes the Taoist perspective on problem-solving, particularly when facing complex challenges?", "options": [{"text": "Aggressively pursuing all possible solutions until one is found.", "isCorrect": false, "rationale": "This approach aligns with 'ceaseless activity' and 'doing more,' which the text suggests wu wei challenges, advocating for a different, often less forceful, method."}, {"text": "Relying on detailed plans and expert advice for every step.", "isCorrect": false, "rationale": "While planning can be useful, the Taoist emphasis on 'allowing the natural movement of things to reveal itself' suggests a flexibility that may not always align with rigid, detailed plans, especially those that over-control."}, {"text": "Recognizing that sometimes the wisest action is to pause, observe, and allow natural processes to unfold.", "isCorrect": true, "rationale": "The text states, 'Sometimes the wisest action is to stop, observe, and allow the natural movement of things to reveal itself,' directly describing the Taoist approach to problem-solving through wu wei."}, {"text": "Delegating responsibility to others to avoid direct involvement.", "isCorrect": false, "rationale": "Wu wei is not about shirking responsibility or laziness, but about the *manner* of engagement, which can still involve active observation and presence, rather than direct forceful action."}]}, {"question": "A community organization is struggling with low volunteer engagement. Following a Taoist principle inspired by 'wu wei,' what might be the most appropriate first step to address the issue?", "options": [{"text": "Immediately launch a new, aggressive recruitment campaign with incentives.", "isCorrect": false, "rationale": "This aligns with 'doing more' and 'ceaseless activity,' which wu wei challenges. It's a forceful intervention rather than an observational approach."}, {"text": "Analyze past volunteer data, survey current volunteers, and observe underlying dynamics before acting.", "isCorrect": true, "rationale": "The text states wu wei means 'recognizing that not all problems are solved by doing more. Sometimes the wisest action is to stop, observe, and allow the natural movement of things to reveal itself.' This option embodies 'stop, observe, and allow.'"}, {"text": "Assign mandatory volunteer hours to all members to boost participation.", "isCorrect": false, "rationale": "This is an act of domination or forceful intervention, rather than allowing natural movement, which is contrary to wu wei."}, {"text": "Consult external experts to devise a comprehensive strategic plan.", "isCorrect": false, "rationale": "While external consultation can be helpful, the primary Taoist principle would be internal observation and allowing the situation's 'natural movement' to inform action, rather than immediately deferring to an elaborate external system."}]}, {"question": "Considering all the influences and modern relevance discussed in the 'Why It Matters' section, the overall significance of Taoism can be best described as:", "options": [{"text": "Primarily a historical curiosity with limited impact on contemporary thought outside of Asia.", "isCorrect": false, "rationale": "The section emphasizes 'its influence on human civilization is immense and still very much alive' and its resonance with 'contemporary environmental thinking' and challenge to 'modern obsession,' contradicting it being merely a historical curiosity."}, {"text": "A foundational philosophical system that continues to offer profound insights for cultural practices, inter-religious dialogue, and modern societal challenges.", "isCorrect": true, "rationale": "This option encompasses all the major points: influence on Chinese culture (medicine, arts, martial arts), cross-cultural fusion (Buddhism), and modern relevance (ecological ethics, challenge to productivity), showing its broad and enduring significance."}, {"text": "Chiefly important for its contributions to Chinese medicine and the internal martial arts.", "isCorrect": false, "rationale": "While these contributions are significant, this option is too narrow and neglects its impact on Zen Buddhism, ecological ethics, and its challenge to modern productivity, which are also highlighted as reasons why it matters."}, {"text": "A system primarily focused on individual spiritual enlightenment through quiet meditation.", "isCorrect": false, "rationale": "While quiet sitting is mentioned in relation to Zen (influenced by Taoism), the section focuses on a much broader range of influences and applications, not just individual spiritual practices."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
