<script>
var QUESTIONS = [{"question": "What is the primary, surprising revelation the Roundtable revealed about human inquiry across different eras and cultures?", "options": [{"text": "Humans are inherently incapable of discovering entirely new philosophical questions.", "isCorrect": false, "rationale": "The text states humans ask 'essentially the same things,' but does not claim an inability to discover new questions, rather points to the surprising constancy of certain core questions."}, {"text": "The fundamental questions concerning human existence transcend specific times, cultures, and geographical locations.", "isCorrect": true, "rationale": "The text explicitly states: 'across thousands of years, across every language and climate and culture, human beings have asked the same questions.' This directly supports the idea of transcendent, universal questions."}, {"text": "Modern societies have lost the ability to deeply ponder existential mysteries, unlike ancient civilizations.", "isCorrect": false, "rationale": "The text includes a 19th-century economist among those asking these questions, implying continuity, not decline, in philosophical inquiry up to more recent times."}, {"text": "Ancient civilizations possessed a deeper, more sophisticated understanding of reality than contemporary ones.", "isCorrect": false, "rationale": "The text focuses on the shared nature of the questions, not the comparative depth of understanding between different eras."}], "id": "q01"}, {"question": "According to the text, what is the most significant reason proposed for the convergence of the same fundamental questions across diverse human experiences?", "options": [{"text": "Humans inherit a genetic predisposition that universally programs them to ask certain philosophical inquiries.", "isCorrect": false, "rationale": "While the questions are innate, the text attributes their origin to 'the human condition itself' (experiences like love/loss, being born unasked, etc.), which is broader than just genetics."}, {"text": "These questions are intrinsic responses to shared, universal aspects of the human condition and experience.", "isCorrect": true, "rationale": "The text states, 'One possibility is that the questions are not philosophical accidents — they arise from the human condition itself,' citing universal experiences like love, loss, and the desire for meaning."}, {"text": "They are culturally transmitted ideas that spread across civilizations primarily through trade and conquest.", "isCorrect": false, "rationale": "The text emphasizes people 'separated by millennia, oceans, and entire cosmologies,' making cultural transmission through direct contact an unlikely primary explanation."}, {"text": "Ancient prophets and philosophers universally taught these specific questions to their followers, ensuring their spread.", "isCorrect": false, "rationale": "The text highlights individuals like the Hebrew poet, wandering prince, and medieval philosopher all asking these questions, implying an organic emergence rather than mandated teaching."}], "id": "q02"}, {"question": "Based on Huston Smith's observations about world religions, how would he likely characterize a newly emerging spiritual movement?", "options": [{"text": "As a unique and unprecedented inquiry into previously unexplored aspects of reality, distinct from older traditions.", "isCorrect": false, "rationale": "Smith found that 'every tradition he encountered was trying to answer the same underlying question,' which suggests new movements would also grapple with this shared question."}, {"text": "As another attempt to grapple with the universal question of reality's nature and proper human conduct within it.", "isCorrect": true, "rationale": "Huston Smith's central finding was that 'every tradition he encountered was trying to answer the same underlying question: What is the nature of reality, and how should I live in light of it?' He would see a new movement similarly."}, {"text": "As a cultural artifact, primarily reflecting the specific socio-economic conditions and anxieties of its time.", "isCorrect": false, "rationale": "While a movement might reflect its time, Smith's emphasis was on the timeless, underlying question shared across traditions, not just the contextual factors."}, {"text": "As a potential threat to established traditions due to its divergent answers to fundamental existential questions.", "isCorrect": false, "rationale": "Smith acknowledged that 'Different traditions give different answers,' but his focus was on the shared question itself as an 'important fact about human beings,' not on inter-tradition conflict."}], "id": "q03"}, {"question": "According to Ludwig Wittgenstein, what distinguishes the 'riddles' of human existence from 'puzzles' that science might solve?", "options": [{"text": "Puzzles are historical inquiries into past events, while riddles are forward-looking scientific predictions.", "isCorrect": false, "rationale": "Wittgenstein's distinction is about solvability and purpose, not historical vs. scientific inquiry."}, {"text": "Riddles are subjective and personal beliefs, whereas puzzles are objective and universally agreed-upon facts.", "isCorrect": false, "rationale": "The text does not frame riddles as purely subjective; rather, they are 'mysteries that orient our lives' and are considered 'deepest human questions' that remain untouched by factual answers."}, {"text": "Puzzles are factual problems with discoverable solutions, while riddles are profound mysteries that orient and shape human lives without necessarily being 'solved'.", "isCorrect": true, "rationale": "The text explicitly states Wittgenstein called them 'riddles' – 'not puzzles with solutions but mysteries that orient our lives,' clarifying this exact distinction."}, {"text": "Riddles are culturally specific and unintelligible to outsiders, while puzzles are universal across all societies.", "isCorrect": false, "rationale": "The section's overarching theme is the *universality* of these profound 'riddles,' making them shared, not culturally specific."}], "id": "q04"}, {"question": "How do the nine traditions discussed in the Roundtable fundamentally engage with the deepest human questions, as described in the text?", "options": [{"text": "By providing definitive, universally accepted solutions to all existential dilemmas, resolving them permanently.", "isCorrect": false, "rationale": "The text states the traditions are 'not solving puzzles' and are for 'living inside the mystery,' implying no definitive, universal solutions."}, {"text": "By presenting frameworks that enable individuals to navigate and live meaningfully within unresolved mysteries, rather than solving them.", "isCorrect": true, "rationale": "The text explains they offer 'a way of living inside the mystery — a story, a practice, a community, a set of disciplines for facing the questions that will not go away.'"}, {"text": "By scientifically investigating the origins and psychological impacts of these enduring questions to find their root causes.", "isCorrect": false, "rationale": "The traditions are described as offering stories and practices, not as engaging in scientific investigation."}, {"text": "By systematically documenting the various answers provided by different cultures throughout history for comparative study.", "isCorrect": false, "rationale": "While documentation might occur, the primary role described is offering 'a way of living,' implying active engagement, not just passive recording."}], "id": "q05"}, {"question": "The text suggests that the impulse to ask profound questions is 'one of the most distinctively human things about us.' What does this primarily imply about human nature compared to animal nature?", "options": [{"text": "Human intelligence is primarily focused on practical problem-solving for immediate survival, similar to animals.", "isCorrect": false, "rationale": "The text explicitly contrasts this: 'Animals solve problems. Humans ask why the problems exist in the first place.'"}, {"text": "Humans possess a unique capacity for metacognition and inquiring into ultimate causes and meanings beyond immediate utility.", "isCorrect": true, "rationale": "The statement 'Humans ask why the problems exist in the first place' directly implies a higher level of abstract, reflective thought and a search for deeper meaning, which is metacognitive."}, {"text": "Animal intelligence is superior in its efficiency at resolving immediate environmental challenges for survival.", "isCorrect": false, "rationale": "The text doesn't suggest superiority, but rather a difference in the *type* of intelligence and inquiry between humans and animals."}, {"text": "The complexity of human social structures uniquely necessitates asking abstract questions for societal cohesion.", "isCorrect": false, "rationale": "While social structures are complex, the text attributes the questioning impulse to individual human nature ('one of the most distinctively human things about us') and the 'human condition itself,' not solely societal necessity."}], "id": "q06"}, {"question": "The section's 'big question' asks whether traditions, despite disagreeing on answers, could all be 'pointing, from different angles, at something real.' What is the most significant implication of this idea?", "options": [{"text": "It implies that one of the traditions must hold the single, absolute truth, while all others are fundamentally misguided.", "isCorrect": false, "rationale": "The phrase 'pointing, from different angles' suggests multiple valid perspectives on a shared reality, not a single exclusive truth held by one tradition."}, {"text": "It suggests that objective truth is ultimately unattainable, and all beliefs are merely equally valid subjective interpretations.", "isCorrect": false, "rationale": "The phrase 'at something real' implies the existence of an objective truth, even if approached and understood differently by various traditions."}, {"text": "It proposes that fundamental human questions may tap into an underlying objective reality, even if its nature is perceived and articulated differently by various traditions.", "isCorrect": true, "rationale": "The text directly states 'Could they all be pointing, from different angles, at something real?' This encapsulates the idea that different traditions might be engaging with the same underlying truth, albeit from diverse perspectives and with varied answers."}, {"text": "It advocates for the synthesis of all traditions into a single, unified global philosophy to eliminate disagreements.", "isCorrect": false, "rationale": "The text does not suggest synthesizing traditions, but rather reflects on the meaning of their shared inquiry despite their differences."}], "id": "q07"}, {"question": "Which of the following scenarios best exemplifies one of the specific shared human questions identified in the text?", "options": [{"text": "A scientist developing a new algorithm to predict stock market trends with greater accuracy.", "isCorrect": false, "rationale": "This is a problem-solving task focused on a specific practical outcome, not one of the deep existential questions listed like 'What happens after I die?' or 'Why do the innocent suffer?'"}, {"text": "A community organizing a fundraiser to build a new local park for children.", "isCorrect": false, "rationale": "This is a social initiative focused on community improvement, not an existential inquiry into the nature of reality or suffering."}, {"text": "An individual grappling with the sudden, inexplicable loss of a loved one and questioning the fairness or meaning of such suffering.", "isCorrect": true, "rationale": "This scenario directly relates to the question 'Why do the innocent suffer?' and the broader human search for meaning in the face of loss, which is a core theme of the section."}, {"text": "An architect designing a bridge to withstand extreme weather conditions in a challenging environment.", "isCorrect": false, "rationale": "This is an engineering challenge focused on structural integrity and practical application, not a fundamental human question about existence or morality."}], "id": "q08"}, {"question": "When the text states that fundamental human questions are 'not philosophical accidents,' what does it primarily seek to convey?", "options": [{"text": "That these questions are a result of deliberate, planned philosophical inquiry by ancient sages and their schools.", "isCorrect": false, "rationale": "The text suggests they 'arise from the human condition itself,' implying an organic, inherent emergence rather than planned intellectual construction by specific individuals."}, {"text": "That these questions are random occurrences in human thought, without any deep underlying cause or significance.", "isCorrect": false, "rationale": "The phrase 'not philosophical accidents' means precisely the opposite, indicating they are significant and non-random."}, {"text": "That these questions emerge naturally and inevitably from the universal experiences and realities of human existence.", "isCorrect": true, "rationale": "The text immediately follows 'not philosophical accidents' with 'they arise from the human condition itself,' directly supporting this interpretation of natural, inherent emergence from shared human experiences."}, {"text": "That only highly educated individuals are capable of formulating such profound and enduring questions.", "isCorrect": false, "rationale": "The text refers to 'all humans' asking these questions, including diverse figures from poets to economists, without limiting it to the highly educated."}], "id": "q09"}, {"question": "Considering the entire section, what is the author's main purpose in highlighting the universality and persistence of certain human questions?", "options": [{"text": "To argue that all religious and philosophical traditions are essentially the same in their answers to these questions.", "isCorrect": false, "rationale": "The text explicitly states 'Different traditions give different answers' and 'disagree on almost everything,' so advocating sameness of answers is incorrect."}, {"text": "To demonstrate that ancient people were just as intelligent and curious about the world as modern humans.", "isCorrect": false, "rationale": "While the examples show intelligence across eras, the main purpose is about the *questions themselves* and their implications for humanity, not a comparison of intellect."}, {"text": "To underscore a fundamental, shared aspect of human nature that drives profound inquiry and the search for meaning.", "isCorrect": true, "rationale": "The section consistently points to these questions arising from 'the human condition itself' and being 'distinctively human,' ultimately highlighting a core aspect of humanity's drive for understanding and meaning-making."}, {"text": "To propose a new, unified theory of human psychology based on the shared pursuit of existential inquiry.", "isCorrect": false, "rationale": "The text observes and reflects on human behavior and traditions; it does not propose a new scientific theory."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
