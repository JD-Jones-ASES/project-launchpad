    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>

    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Karl Marx, what was the primary function of religion?", "options": [{"text": "To provide a path to spiritual enlightenment and inner peace.", "isCorrect": false, "rationale": "Marx, an atheist and materialist, did not view religion as a path to spiritual enlightenment. Instead, he saw it as an obstacle to truth."}, {"text": "To serve as a unifying force that transcends class divisions and promotes social harmony.", "isCorrect": false, "rationale": "Marx argued that religion perpetuated suffering and maintained the status quo by pacifying the oppressed, rather than unifying society in a meaningful way that addressed class divisions."}, {"text": "To numb the pain of human suffering, much like opium, without addressing its root causes.", "isCorrect": true, "rationale": "The text explicitly states Marx's view that religion is 'the opium of the people,' meaning it numbs pain without curing its cause, thereby perpetuating human suffering by distracting from demands for justice in this life."}, {"text": "To inspire revolutionary action by highlighting social injustices and advocating for the poor.", "isCorrect": false, "rationale": "Marx believed religion deterred revolutionary action by encouraging followers to pray for a better afterlife rather than demanding justice in the present. Liberation theology, mentioned later, is a counter-example, but not Marx's view."}], "id": "q01"}, {"question": "Why would Karl Marx object to his system of thought being classified as a religion?", "options": [{"text": "Because he believed only traditional, supernatural belief systems could be considered religions.", "isCorrect": false, "rationale": "While Marx was an atheist and materialist, his objection primarily stemmed from his belief that religion was an obstacle to truth and a projection of human hopes, not a semantic distinction about 'traditional' systems."}, {"text": "Because his theories were based on scientific materialism and economic analysis, not spiritual dogma.", "isCorrect": true, "rationale": "The text states Marx was an atheist and a materialist, believing religion was an obstacle to truth. He based his system on scientific and materialist principles, which he would see as antithetical to religious thinking."}, {"text": "Because the concept of 'religion' was irrelevant to his focus on class struggle and political revolution.", "isCorrect": false, "rationale": "Marx's critique of religion as 'opium' shows it was very relevant to his understanding of social control and class struggle, but in a negative light."}, {"text": "Because he saw religion as a personal matter, separate from public or political ideology.", "isCorrect": false, "rationale": "Marx viewed religion as a social phenomenon with significant political implications, particularly its role in maintaining power structures, not merely a private affair."}], "id": "q02"}, {"question": "According to Paul Tillich's definition of faith, which of the following best exemplifies an 'ultimate concern' in a person's life?", "options": [{"text": "A hobby that a person dedicates significant time and resources to.", "isCorrect": false, "rationale": "While a hobby can be important, Tillich's 'ultimate concern' refers to the highest value, the thing one would sacrifice everything else for, which goes beyond typical hobby dedication."}, {"text": "A person's commitment to regularly attending religious services and following rituals.", "isCorrect": false, "rationale": "Tillich defined faith not as belief in doctrines or rituals, but as the state of being 'ultimately concerned.' Rituals might be an expression of it, but not the definition itself."}, {"text": "The pursuit of a fulfilling career that brings personal satisfaction and financial stability.", "isCorrect": false, "rationale": "A fulfilling career is important, but it is typically not the 'ultimate loyalty' one would 'sacrifice everything else for' in the sense Tillich describes, unless it directly embodies a higher, overarching value."}, {"text": "A nationalist who prioritizes their nation's interests above all personal needs and other loyalties.", "isCorrect": true, "rationale": "The text uses this specific example to illustrate Tillich's point: 'A person whose ultimate concern is their nation is, in Tillich's framework, practicing a kind of religion of nationalism.' This demonstrates sacrificing everything else for that highest value."}], "id": "q03"}, {"question": "How do Communist movements demonstrate characteristics of religion, according to Tillich's framework?", "options": [{"text": "By encouraging members to find individual spiritual fulfillment through meditation.", "isCorrect": false, "rationale": "The text describes Communist movements demanding subordination of personal interests to the cause, rather than individual spiritual fulfillment through meditation."}, {"text": "By prioritizing personal wealth accumulation as a sign of divine favor.", "isCorrect": false, "rationale": "This aligns more with certain capitalist ideologies or some interpretations of Protestant ethics, not with the stated principles of Communism or how it functioned as a religion according to Tillich."}, {"text": "By demanding members subordinate personal interests to the cause and treating party defection as apostasy.", "isCorrect": true, "rationale": "The text explicitly states: 'Party members were expected to subordinate personal interests to the cause. To defect from the Party was apostasy; to criticize the leader could be heresy,' aligning perfectly with Tillich's definition of ultimate concern."}, {"text": "By promoting a pantheistic view of nature where all living things are divine.", "isCorrect": false, "rationale": "Communism is generally materialist and focuses on social and economic structures, not pantheism or the divinity of nature."}], "id": "q04"}, {"question": "Mircea Eliade's concept of the 'sacred and the profane' helps classify Communism as a religion by highlighting what aspect of its ideology?", "options": [{"text": "The reverence for natural landscapes and ancient historical sites.", "isCorrect": false, "rationale": "Eliade's focus for Communism is not on natural landscapes, but on how it transforms history itself, marking out certain actors and events as profoundly significant."}, {"text": "The distinction between spiritual leaders and ordinary party members.", "isCorrect": false, "rationale": "While hierarchies exist, Eliade's framework, as applied here, emphasizes the sacredness attached to specific historical entities and events (proletariat, revolution), not just leader-follower distinctions."}, {"text": "The elevation of certain historical actors and events to a status of ultimate significance.", "isCorrect": true, "rationale": "Eliade argued that Communism 'performs a similar operation on history itself,' treating 'the proletariat, the revolutionary vanguard' as sacred agents and the revolution as 'the turning point of all time,' moving from profane to sacred history."}, {"text": "The division between secular governance and religious institutions within a state.", "isCorrect": false, "rationale": "Eliade's analysis concerns the internal structure of Communism as a belief system, not its relationship with external religious institutions."}], "id": "q05"}, {"question": "In the structural parallel of Communism to religion, what does 'Historical materialism' correspond to in traditional religious frameworks?", "options": [{"text": "Moral demands (ethics), by outlining rules for social conduct.", "isCorrect": false, "rationale": "Historical materialism is described as providing a 'complete account of where the world came from... how it fell... and where it is going,' which corresponds to a cosmic story or cosmology, not ethics."}, {"text": "Salvation (soteriology), by offering a path to liberation.", "isCorrect": false, "rationale": "While historical materialism points towards salvation, it is the overarching narrative of the world's origin, fall, and future, not the act of salvation itself. Salvation is specifically 'Revolution.'"}, {"text": "Cosmic story (cosmology), offering a creation-fall-redemption narrative.", "isCorrect": true, "rationale": "The text directly states: 'Cosmic story (cosmology): Historical materialism provides a complete account of where the world came from (primitive communism), how it fell (the emergence of private property and class division), and where it is going (the revolution and the classless society). This is a creation-fall-redemption narrative.'"}, {"text": "Sacred texts (canon), as the foundational writings of the ideology.", "isCorrect": false, "rationale": "Historical materialism is the narrative or framework, while sacred texts are the specific documents like The Manifesto that contain and transmit this narrative."}], "id": "q06"}, {"question": "Which of the following best describes 'salvation (soteriology)' in the Communist structural parallel?", "options": [{"text": "Attaining individual spiritual enlightenment in the afterlife.", "isCorrect": false, "rationale": "Communist 'salvation' is explicitly described as 'collective, this-worldly liberation from structural oppression,' not individual enlightenment or an afterlife."}, {"text": "The collective, this-worldly liberation from structural oppression through revolution.", "isCorrect": true, "rationale": "The text states: 'Salvation (soteriology): Revolution — collective, this-worldly liberation from structural oppression. Not heaven after death but communism in history.'"}, {"text": "Adherence to a strict moral code to achieve personal virtue.", "isCorrect": false, "rationale": "Adherence to a moral code falls under 'Moral demands (ethics),' which is distinct from the concept of salvation as a transformative event or state."}, {"text": "The peaceful negotiation of class differences to achieve societal harmony.", "isCorrect": false, "rationale": "Communist 'salvation' is framed as 'Revolution,' which implies a transformative, often violent, overthrow, rather than peaceful negotiation."}], "id": "q07"}, {"question": "In the structural parallel, what does 'The Party' represent within Communism?", "options": [{"text": "The individual's conscience guiding moral decisions.", "isCorrect": false, "rationale": "The Party is a collective organization, not an individual's conscience. Moral decisions are guided by 'ethics' like solidarity with the working class."}, {"text": "The global network of workers united by common suffering.", "isCorrect": false, "rationale": "While Communism speaks of a global working class, 'The Party' is specifically identified as the organized 'community of the faithful' responsible for carrying out the mission."}, {"text": "The community of the faithful, organized to carry the revolutionary mission forward.", "isCorrect": true, "rationale": "The text clearly states: 'Community (ecclesiology): The Party — the community of the faithful, organized to carry the revolutionary mission forward in history.'"}, {"text": "The ruling capitalist class that must be overthrown.", "isCorrect": false, "rationale": "The Party is the vanguard of the revolution, opposed to the capitalist class, not representing it."}], "id": "q08"}, {"question": "What is the primary objective of classifying Communism as a religion in the context of this textbook section?", "options": [{"text": "To prove that Karl Marx was secretly a religious man despite his claims of atheism.", "isCorrect": false, "rationale": "The text explicitly states: 'We are not saying he was secretly religious. We are saying something more specific: the system of thought he created has the structure of a religion.'"}, {"text": "To validate or invalidate Communist governments and their historical actions.", "isCorrect": false, "rationale": "The text states: 'It does not require us to say that Marx was right or wrong, that Communist governments were good or evil...'"}, {"text": "To recognize structural similarities between Communism and traditional religions and explore what religion does for human beings.", "isCorrect": true, "rationale": "The text clarifies its purpose: 'It requires only that we recognize the structural similarities — and ask what those similarities tell us about what religion does and why human beings seem to need it.'"}, {"text": "To demonstrate that historical materialism is a better explanation of history than divine providence.", "isCorrect": false, "rationale": "The text clearly states it does not require judging whether 'historical materialism is a better or worse explanation of history than divine providence.'"}], "id": "q09"}, {"question": "The text acknowledges Marx's critique of religion as sometimes being used to justify oppression. Which concept or movement is mentioned as taking Marx's challenge seriously within religious thought?", "options": [{"text": "The Protestant Reformation.", "isCorrect": false, "rationale": "The Protestant Reformation predates Marx and is not mentioned in the context of grappling with his specific critique of religion."}, {"text": "Buddhist enlightenment practices.", "isCorrect": false, "rationale": "Buddhist practices are not mentioned in relation to engaging with Marx's critique in this section."}, {"text": "Liberation theology in Christianity.", "isCorrect": true, "rationale": "The text explicitly mentions: 'Liberation theology in Christianity, for example, took Marx's challenge seriously and argued that a properly understood Christianity demands precisely the justice Marx wanted.'"}, {"text": "The Enlightenment philosophical movement.", "isCorrect": false, "rationale": "While the Enlightenment questioned traditional religion, it is not presented here as a direct response by religious thinkers to Marx's specific critique of religion's role in perpetuating suffering."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
