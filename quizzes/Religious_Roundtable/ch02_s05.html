    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason Judaism is considered 'one of the most consequential forces in human history' despite its small global population?", "options": [{"text": "Its unique dietary laws and festivals that influenced global culinary trends.", "isCorrect": false, "rationale": "The text does not mention dietary laws or festivals as a primary reason for Judaism's historical influence, focusing instead on its impact on other religions and intellectual thought."}, {"text": "Its foundational influence on two of the world's largest religions and significant contributions to secular Western culture.", "isCorrect": true, "rationale": "The text explicitly states that Christianity and Islam grew from Jewish roots, inheriting key concepts, and that even secular Western culture carries the 'stamp of Jewish ideas' like linear history and non-negotiable morality."}, {"text": "Its historical military conquests that established vast empires influencing modern political structures.", "isCorrect": false, "rationale": "The text does not discuss military conquests or empire building as a source of Judaism's historical consequence; it highlights intellectual, spiritual, and cultural influence."}, {"text": "Its advanced scientific discoveries from antiquity that laid the groundwork for all modern technology.", "isCorrect": false, "rationale": "While Jewish thinkers made significant scientific contributions, the text attributes its 'consequential force' more broadly to its religious and philosophical impact, not solely ancient technological advancements."}], "id": "q01"}, {"question": "Which of the following ideas is NOT listed as a direct inheritance from Judaism to Christianity and Islam?", "options": [{"text": "Monotheism", "isCorrect": false, "rationale": "The text states that both Christianity and Islam inherited Judaism's monotheism."}, {"text": "The prophetic tradition of speaking truth to power", "isCorrect": true, "rationale": "The text identifies 'the prophetic tradition of speaking truth to power' as a Jewish idea influencing *secular Western culture*, not a direct inheritance into the religious doctrines of Christianity and Islam in the same way as monotheism or covenant theology."}, {"text": "Covenant theology", "isCorrect": false, "rationale": "The text states that both Christianity and Islam inherited Judaism's covenant theology."}, {"text": "A sense of a God who acts in history", "isCorrect": false, "rationale": "The text states that both Christianity and Islam inherited Judaism's 'sense of a God who acts in history'."}], "id": "q02"}, {"question": "The text mentions Baruch Spinoza as a Jewish thinker who significantly contributed to which two fields?", "options": [{"text": "Psychology and quantum physics", "isCorrect": false, "rationale": "Sigmund Freud and Albert Einstein are associated with these fields, not Baruch Spinoza, according to the text."}, {"text": "Modern philosophy and biblical criticism", "isCorrect": true, "rationale": "The text explicitly states that Baruch Spinoza 'laid foundations for modern philosophy and biblical criticism'."}, {"text": "Reconciling Greek philosophy with monotheist theology", "isCorrect": false, "rationale": "This achievement is attributed to Moses Maimonides in the text, not Baruch Spinoza."}, {"text": "Narratives of alienation and survival", "isCorrect": false, "rationale": "Franz Kafka and Primo Levi are associated with these narratives, not Baruch Spinoza, according to the text."}], "id": "q03"}, {"question": "How does the text describe the impact of the Shoah (Holocaust) on Jewish thought since 1945?", "options": [{"text": "It led to a universal abandonment of faith among Jewish thinkers due to the scale of suffering.", "isCorrect": false, "rationale": "The text states that Jewish thinkers wrestled with questions of faith and theodicy, producing 'extraordinary seriousness' and 'honest' reflection, implying continued engagement with, rather than abandonment of, faith."}, {"text": "It prompted a body of theological and philosophical reflection focused on questions of human cruelty, faith, theodicy, and survival.", "isCorrect": true, "rationale": "The text clearly states that 'Jewish thinkers since 1945 have wrestled with these questions with extraordinary seriousness, producing a body of theological and philosophical reflection that is among the most honest in any tradition,' referring to questions about human cruelty, faith, theodicy, and survival."}, {"text": "It primarily resulted in a shift of focus from religious texts to purely secular political activism.", "isCorrect": false, "rationale": "The text highlights theological and philosophical reflection, not a primary shift to purely secular political activism, although such activism might have occurred concurrently."}, {"text": "It solidified a singular, universally accepted explanation for God's permission of evil (theodicy) within Judaism.", "isCorrect": false, "rationale": "The text describes Jewish thinkers 'wrestling' with these questions, implying ongoing debate and reflection, not the establishment of a singular, universally accepted explanation."}], "id": "q04"}, {"question": "Approximately what fraction of the world's Jewish population was murdered during the Holocaust, according to the text?", "options": [{"text": "One-tenth", "isCorrect": false, "rationale": "The text specifies 'roughly one-third of the entire Jewish population of the world at the time'."}, {"text": "One-half", "isCorrect": false, "rationale": "The text specifies 'roughly one-third of the entire Jewish population of the world at the time'."}, {"text": "One-third", "isCorrect": true, "rationale": "The text states, 'Between 1941 and 1945, the Nazi regime of Germany systematically murdered six million Jews—roughly one-third of the entire Jewish population of the world at the time'."}, {"text": "Three-quarters", "isCorrect": false, "rationale": "The text specifies 'roughly one-third of the entire Jewish population of the world at the time'."}], "id": "q05"}, {"question": "Which of the following intellectual pairs is correctly matched with their respective contributions to understanding the mind, and space and time, in the 19th and 20th centuries?", "options": [{"text": "Moses Maimonides and Baruch Spinoza", "isCorrect": false, "rationale": "Maimonides reconciled Greek philosophy with monotheism, and Spinoza laid foundations for modern philosophy and biblical criticism, both earlier than the 19th-20th centuries and different fields than those specified."}, {"text": "Franz Kafka and Primo Levi", "isCorrect": false, "rationale": "Kafka and Levi gave voice to experiences of alienation and survival, not directly transforming understanding of the mind or space and time."}, {"text": "Sigmund Freud and Albert Einstein", "isCorrect": true, "rationale": "The text states: 'Sigmund Freud transformed how we understand the mind; Albert Einstein transformed how we understand space and time'."}, {"text": "Baruch Spinoza and Albert Einstein", "isCorrect": false, "rationale": "Spinoza contributed to modern philosophy and biblical criticism, not understanding the mind, and while Einstein transformed understanding of space and time, the pair is incorrect for the stated contributions."}], "id": "q06"}, {"question": "The text describes the survival of Judaism through two millennia of diaspora, persecution, and attempted annihilation as a 'remarkable fact'. What does it state is still being debated regarding this survival?", "options": [{"text": "The exact number of Jewish people who survived each period of persecution.", "isCorrect": false, "rationale": "While historical demographics are studied, the text specifies the debate is about the *reason* for survival, not simply the numbers."}, {"text": "Whether the Torah and Passover rituals have remained completely unchanged over time.", "isCorrect": false, "rationale": "The text implies continuity ('still reading the same Torah and celebrating the same Passover'), so the debate isn't about whether they are *completely* unchanged, but about the underlying 'something durable' that enabled this continuity."}, {"text": "Whether it is attributable to God's covenant, cultural resilience, or something else entirely.", "isCorrect": true, "rationale": "The text concludes by stating: 'What that something is—whether it is God's covenant, cultural resilience, or something else entirely—is, characteristically, still being debated.'"}, {"text": "The specific locations where Jewish communities established themselves during the diaspora.", "isCorrect": false, "rationale": "The text acknowledges the diaspora but frames the debate around the 'why' of survival, not the geographical specifics."}], "id": "q07"}, {"question": "Which aspect of 'secular Western culture' is explicitly mentioned as carrying 'the stamp of Jewish ideas'?", "options": [{"text": "The development of democratic political systems", "isCorrect": false, "rationale": "The text does not mention the development of democratic political systems as a direct stamp of Jewish ideas on secular Western culture."}, {"text": "The concept of linear history moving toward a purpose", "isCorrect": true, "rationale": "The text states: 'Even secular Western culture carries the stamp of Jewish ideas: the concept of linear history moving toward a purpose...'"}, {"text": "The principles of Roman law and governance", "isCorrect": false, "rationale": "The text mentions Rome as a period of Jewish struggle but does not attribute Roman law or governance to Jewish ideas influencing secular Western culture."}, {"text": "The artistic styles of the Renaissance period", "isCorrect": false, "rationale": "The text does not link Jewish ideas to the artistic styles of the Renaissance."}], "id": "q08"}, {"question": "Moses Maimonides is noted for his significant contribution to which area of thought?", "options": [{"text": "Laying the foundations for modern psychology.", "isCorrect": false, "rationale": "Sigmund Freud is credited with transforming understanding of the mind (psychology), not Moses Maimonides."}, {"text": "Reconciling Greek philosophy with monotheist theology.", "isCorrect": true, "rationale": "The text states: 'Medieval philosopher Moses Maimonides helped reconcile Greek philosophy with monotheist theology in ways that shaped Christian and Islamic thought for centuries.'"}, {"text": "Developing the theory of relativity.", "isCorrect": false, "rationale": "Albert Einstein developed the theory of relativity, not Moses Maimonides."}, {"text": "Pioneering the genre of existentialist literature.", "isCorrect": false, "rationale": "Franz Kafka and Primo Levi are associated with giving voice to experiences of alienation, which relates to existential themes, but this is not Maimonides's specific contribution mentioned."}], "id": "q09"}, {"question": "Considering the entire section, what central paradox about Judaism does the title 'Why It Matters' primarily address?", "options": [{"text": "The conflict between ancient traditions and modern scientific advancements.", "isCorrect": false, "rationale": "While Jewish thinkers contributed to science, the text's central focus for 'Why It Matters' is not this particular conflict, but rather the broader impact of Judaism."}, {"text": "The struggle between religious faith and secular humanism in contemporary society.", "isCorrect": false, "rationale": "The text touches on Jewish ideas influencing secular culture, but the primary paradox isn't this specific societal struggle, but rather Judaism's disproportionate impact."}, {"text": "The disparity between Judaism's small demographic size and its profound, widespread historical and ongoing influence.", "isCorrect": true, "rationale": "The section begins by stating 'By the numbers, Judaism is a small tradition. By its influence, it is one of the most consequential forces in human history,' and then proceeds to detail this influence and its remarkable survival, directly addressing this paradox."}, {"text": "The internal debates within Judaism regarding the interpretation of sacred texts.", "isCorrect": false, "rationale": "The text mentions ongoing debate regarding the nature of Judaism's survival, but this is a specific example, not the overarching central paradox the entire 'Why It Matters' section aims to highlight."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
