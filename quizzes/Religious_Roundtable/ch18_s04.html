        <div class="score-pct" id="score-pct"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental nature of Christian hope regarding the transformation of the world?", "options": [{"text": "It is solely the result of human ethical progress and political revolution.", "isCorrect": false, "rationale": "The text states that Christian hope for a 'new heaven and new earth' is 'not the product of human effort, gradual progress, or political revolution,' making this option incorrect."}, {"text": "It is a supernatural gift dependent on divine action from outside history.", "isCorrect": true, "rationale": "The text clearly states, 'Christianity expects divine action to transform the world from outside history' and that Christian hope is 'supernatural: it depends on something beyond what history, left to itself, could accomplish.' This option accurately reflects the core concept."}, {"text": "It emerges from a human-divine partnership within historical processes.", "isCorrect": false, "rationale": "This description aligns with Jewish eschatology, which emphasizes 'human-divine partnership to repair the world within history,' not the Christian view described."}, {"text": "It is achieved through the cultivation of human virtue and ancient wisdom.", "isCorrect": false, "rationale": "This aligns with the Confucian approach to achieving 'Great Harmony' through 'human effort alone, guided by the wisdom of the ancient sages,' not Christian hope."}], "id": "q01"}, {"question": "In Jewish eschatology, what is the significance of *tikkun olam* in relation to the messianic future?", "options": [{"text": "It represents the ultimate, divinely guaranteed transformation that requires no human input.", "isCorrect": false, "rationale": "The text explicitly states that 'the Messiah's arrival depends in part on whether humanity has done its part,' contradicting the idea of no human input or a guaranteed transformation without effort."}, {"text": "It is a human obligation, signifying humanity's essential role in working towards the messianic future.", "isCorrect": true, "rationale": "The text defines *tikkun olam* as 'a human obligation' and states that 'the future is not already guaranteed, it must be worked for,' emphasizing humanity's active role in partnership with the divine."}, {"text": "It is a symbolic concept that encourages good deeds but does not directly impact the arrival of the Messiah.", "isCorrect": false, "rationale": "The text states that the 'Messiah's arrival depends in part on whether humanity has done its part,' indicating a direct impact, not just symbolic encouragement."}, {"text": "It is a supernatural event that bypasses human history entirely.", "isCorrect": false, "rationale": "*Tikkun olam* is part of a process 'within history' where human action collaborates with divine faithfulness, not an event that bypasses history."}], "id": "q02"}, {"question": "What is the primary mechanism through which Confucianism expects to achieve the 'Great Harmony'?", "options": [{"text": "Divine intervention initiated by prayer and ritual sacrifice.", "isCorrect": false, "rationale": "The text explicitly states for Confucianism, 'There is no divine promise here, no supernatural guarantee, no Messiah,' making divine intervention an incorrect answer."}, {"text": "The collaborative effort of humanity and a faithful deity.", "isCorrect": false, "rationale": "This describes the Jewish concept of 'human-divine partnership,' not the Confucian approach, which relies solely on human effort."}, {"text": "Human effort alone, guided by ancient wisdom, virtue, and ritual practice.", "isCorrect": true, "rationale": "The text states that Confucianism expects 'human effort alone — guided by the wisdom of the ancient sages, powered by the cultivation of virtue, and organized by the practice of proper ritual — to create the Great Harmony.'"}, {"text": "A supernatural transformation brought about by a messianic figure.", "isCorrect": false, "rationale": "The text states that Confucianism has 'no Messiah,' making this option incorrect."}], "id": "q03"}, {"question": "Which tradition's optimistic view is described as 'most vulnerable to the objection from history,' and why?", "options": [{"text": "Christianity, because its reliance on supernatural intervention can lead to passivity.", "isCorrect": false, "rationale": "While the text raises the question of Christian hope potentially leading to passivity, it does not connect this to being 'vulnerable to the objection from history' in the same way it does for Confucianism."}, {"text": "Judaism, due to the immense responsibility it places on each generation to achieve the messianic future.", "isCorrect": false, "rationale": "The text highlights the 'enormous weight of responsibility' in Judaism, but this is not framed as the 'objection from history' in the context of challenging optimism about human nature."}, {"text": "Confucianism, because its belief in human capacity for good is challenged by historical atrocities committed by educated people.", "isCorrect": true, "rationale": "The text states, 'This is the most humanist of the three visions — and the most vulnerable to the objection from history. The twentieth century in particular... gives Confucian optimism about human nature the hardest test it has ever faced.'"}, {"text": "All three traditions, as history consistently demonstrates the failure of human and divine plans.", "isCorrect": false, "rationale": "The text specifically attributes this vulnerability to Confucianism, not all three traditions equally."}], "id": "q04"}, {"question": "A modern philosopher argues that the ultimate purpose of humanity is to perfect society through rational ethical systems and self-improvement, completely independent of any supernatural aid. This perspective most closely mirrors the eschatological approach of which tradition?", "options": [{"text": "Christianity.", "isCorrect": false, "rationale": "Christianity relies on 'divine action to transform the world from outside history' and a 'supernatural' hope, which contradicts the idea of being independent of supernatural aid."}, {"text": "Judaism.", "isCorrect": false, "rationale": "Judaism emphasizes 'human-divine partnership' and 'divine faithfulness,' meaning it is not completely independent of supernatural aid."}, {"text": "Confucianism.", "isCorrect": true, "rationale": "Confucianism focuses on 'human effort alone,' believing 'human nature is good enough, and human wisdom deep enough, to build a just society,' with 'no divine promise here, no supernatural guarantee, no Messiah.' This aligns perfectly with the philosopher's view."}, {"text": "A synthesis of all three.", "isCorrect": false, "rationale": "The philosopher's view explicitly excludes supernatural aid, which is central to Christianity and Judaism, thus ruling out a synthesis of all three."}], "id": "q05"}, {"question": "A key distinction between Christian and Jewish eschatology, as presented in the text, lies in the timing and nature of ultimate transformation. How does the text characterize this difference?", "options": [{"text": "Christianity expects transformation *within* history through human-divine partnership, while Judaism expects it *outside* history through purely divine action.", "isCorrect": false, "rationale": "This option reverses the descriptions given in the text. Christianity expects transformation *from outside* history, and Judaism expects it *within* history through partnership."}, {"text": "Christianity expects supernatural transformation from *outside* history, while Judaism anticipates a human-divine partnership to repair the world *within* history.", "isCorrect": true, "rationale": "The text states, 'Christianity expects divine action to transform the world from outside history' and 'Judaism expects human-divine partnership to repair the world within history.' This directly captures the described distinction."}, {"text": "Christianity focuses on individual salvation, whereas Judaism emphasizes collective societal change.", "isCorrect": false, "rationale": "While these might be general aspects of the traditions, the text's specific comparison of their eschatology focuses on *who* drives the transformation and *where/when* it occurs (inside/outside history), not primarily individual vs. collective focus."}, {"text": "Both traditions agree on the source of transformation but differ on the specific rituals required.", "isCorrect": false, "rationale": "The text clearly shows a fundamental disagreement on the *source* and *nature* of transformation (divine action alone vs. human-divine partnership), not just rituals."}], "id": "q06"}, {"question": "When the text states, 'A tradition's eschatology reveals everything about it,' what is the most significant implication of this statement for understanding religious traditions?", "options": [{"text": "That the study of history is irrelevant to understanding religious beliefs.", "isCorrect": false, "rationale": "The text uses 'the objection from history' to evaluate Confucianism, implying history is highly relevant, contradicting this option."}, {"text": "That a tradition's end-goal belief system dictates its views on God, human nature, and the meaning of hope.", "isCorrect": true, "rationale": "The text elaborates on this, stating, 'What you believe about where history is going tells you what you believe about who is driving it. That, in turn, tells you what you believe about God, about human nature, and about the nature of hope itself.' This is the direct implication."}, {"text": "That all religious traditions ultimately share the same eschatological vision.", "isCorrect": false, "rationale": "The entire section is dedicated to *comparing* and contrasting the distinct eschatological visions of three traditions, demonstrating their differences."}, {"text": "That eschatology is merely an intellectual exercise with no practical implications for daily life.", "isCorrect": false, "rationale": "The final paragraph asks, 'And what does your answer to that question require of you — today, this week, in the life you are living right now?', indicating practical implications."}], "id": "q07"}, {"question": "The text suggests that one tradition 'has perhaps held this tension most honestly' regarding human responsibility and ultimate divine action. Which tradition is this, and what tension does it represent?", "options": [{"text": "Christianity, balancing participation in the kingdom now with the ultimate consummation not being in human hands.", "isCorrect": false, "rationale": "While Christianity holds a similar balance, the text specifically attributes the 'most honestly' held tension of 'human responsibility' versus 'final repair not entirely in human hands' to the Jewish tradition."}, {"text": "Judaism, balancing *tikkun olam* (human responsibility) with the messianic hope (final repair not entirely in human hands).", "isCorrect": true, "rationale": "The text states, 'The Jewish tradition has perhaps held this tension most honestly: tikkun olam insists on human responsibility, while the messianic hope insists that the final repair is not entirely in human hands.'"}, {"text": "Confucianism, balancing human effort with the challenges posed by historical failures.", "isCorrect": false, "rationale": "Confucianism does not involve divine action in its eschatology, so it does not balance human responsibility with divine action. Its challenge is about the realism of human optimism."}, {"text": "All three traditions equally, as they all grapple with the question of human agency versus divine will.", "isCorrect": false, "rationale": "The text explicitly singles out Judaism as holding this specific tension 'most honestly,' indicating it's not equally true for all three."}], "id": "q08"}, {"question": "Based on the concerns raised in the final paragraphs, what potential criticism might be leveled against the Christian view of hope regarding human initiative?", "options": [{"text": "It is overly optimistic about human nature and its capacity for creating a just society.", "isCorrect": false, "rationale": "This criticism is more aligned with the 'objection from history' against Confucianism's optimism about human nature, not a criticism of Christian hope as presented."}, {"text": "Its emphasis on divine action from outside history might lead to human passivity, awaiting supernatural intervention.", "isCorrect": true, "rationale": "The text directly asks, 'Or does dependence on God risk producing passivity — waiting for divine action rather than taking human responsibility?' This highlights a potential criticism of the Christian view."}, {"text": "It places an unreasonable burden of responsibility on individual generations to fix the world.", "isCorrect": false, "rationale": "This describes a characteristic of Jewish eschatology ('enormous weight of responsibility on each generation'), not a criticism of the Christian view discussed here."}, {"text": "It denies the historical evidence of progress and human achievement in ethical development.", "isCorrect": false, "rationale": "The text does not suggest Christianity denies historical progress, but rather that such progress is not the *source* of the ultimate transformation it anticipates."}], "id": "q09"}, {"question": "Which statement best encapsulates the fundamental difference in the perceived 'driver' of history's ultimate direction across the three traditions discussed?", "options": [{"text": "Christianity believes history is driven by human progress, Judaism by divine covenant, and Confucianism by natural cycles.", "isCorrect": false, "rationale": "Christianity does not believe history is driven by human progress for ultimate transformation; it relies on divine action. Confucianism is about human effort, not natural cycles."}, {"text": "Christianity relies on external divine intervention, Judaism on human-divine partnership, and Confucianism on human effort alone.", "isCorrect": true, "rationale": "This accurately summarizes the distinct drivers: 'divine action to transform the world from outside history' (Christianity), 'human-divine partnership to repair the world within history' (Judaism), and 'human effort alone... to create the Great Harmony' (Confucianism)."}, {"text": "All three traditions agree that humanity is the sole driver of history, differing only in the methods employed.", "isCorrect": false, "rationale": "Only Confucianism holds that humanity is the sole driver; Christianity and Judaism involve divine action or partnership."}, {"text": "All three traditions primarily look to ancient sages and rituals for guidance on history's direction.", "isCorrect": false, "rationale": "While Confucianism emphasizes ancient sages and rituals, this is not true for Christianity or Judaism in the context of driving history's ultimate direction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
