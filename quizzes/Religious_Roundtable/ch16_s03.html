    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Karl Marx's fundamental premise regarding the primary source of human suffering?", "options": [{"text": "It is primarily a spiritual condition that must be healed from within.", "isCorrect": false, "rationale": "Marx explicitly states that suffering is 'not primarily a spiritual condition that must be healed from within,' directly contradicting this option."}, {"text": "It stems from individual moral failings and a lack of self-discipline.", "isCorrect": false, "rationale": "Marx's analysis focuses on structural issues rather than individual moral deficiencies, viewing suffering as a systemic problem."}, {"text": "It is produced by material conditions, such as economic structures and property relations.", "isCorrect": true, "rationale": "The text states: 'suffering is not primarily a spiritual condition... It is produced by the material conditions -- the economic structures, the property relations, the organization of labor -- under which human beings actually live.'"}, {"text": "It results from an inherent human struggle against existential meaninglessness.", "isCorrect": false, "rationale": "While a philosophical concept, Marx's focus in this context is on tangible material conditions rather than abstract existential struggles."}]}, {"question": "According to Marx, which of the following best describes the nature of 'alienation' (Entfremdung)?", "options": [{"text": "A subjective feeling of sadness or dissatisfaction experienced by workers.", "isCorrect": false, "rationale": "The text explicitly clarifies: 'Alienation is not a feeling but a structural reality produced by specific economic arrangements.'"}, {"text": "A spiritual void resulting from detachment from traditional religious beliefs.", "isCorrect": false, "rationale": "Marx's materialist premise contrasts with spiritual explanations for human suffering, focusing instead on economic structures."}, {"text": "A structural reality produced by specific economic arrangements under capitalism.", "isCorrect": true, "rationale": "The KEY TERM definition for alienation states it 'is not a feeling but a structural reality produced by specific economic arrangements.'"}, {"text": "An individual psychological state caused by insufficient personal fulfillment.", "isCorrect": false, "rationale": "This option mischaracterizes alienation as an individual psychological state, rather than a systemic, structural reality."}]}, {"question": "A factory worker spends her day assembling electronic devices. Although she contributes significantly to their creation, she has no ownership over the final product, which is sold for profit by the capitalist who owns the factory. This situation primarily exemplifies which dimension of alienation?", "options": [{"text": "Alienation from the act of labor.", "isCorrect": false, "rationale": "While related, this option describes the *process* of labor. The scenario focuses on the lack of ownership over the *outcome*."}, {"text": "Alienation from species-being.", "isCorrect": false, "rationale": "Alienation from species-being concerns the repression of essential human creative nature, which is a broader concept than the specific issue of product ownership."}, {"text": "Alienation from the product of her labor.", "isCorrect": true, "rationale": "The text states this dimension occurs when the worker 'makes things... but those things do not belong to her. They belong to the capitalist who owns the factory.'"}, {"text": "Alienation from other humans.", "isCorrect": false, "rationale": "This dimension relates to instrumental relationships between people, which is not the primary focus of the described scenario."}]}, {"question": "Marx's concept of 'species-being' (Gattungswesen) emphasizes which distinctively human capacity?", "options": [{"text": "The instinctual drive to meet immediate physical needs for survival.", "isCorrect": false, "rationale": "The text states that 'unlike animals, which act from instinct to meet immediate needs, human beings can step back from their immediate situation and consciously shape their world according to an idea.'"}, {"text": "The ability to engage in repetitive tasks efficiently for economic gain.", "isCorrect": false, "rationale": "This describes alienated labor under capitalism, which *strips* workers of their species-being, rather than defining it."}, {"text": "The capacity to make one's own life-activity the object of conscious will and imagination.", "isCorrect": true, "rationale": "The KEY TERM definition states species-being is 'the ability to make one's own life-activity the object of conscious will and imagination.'"}, {"text": "The inherent desire for spiritual transcendence and enlightenment.", "isCorrect": false, "rationale": "Marx's materialist framework does not focus on spiritual transcendence; species-being relates to human creative agency in the material world."}]}, {"question": "According to Marx, how does capitalism fundamentally invert the natural expression of human creativity and freedom?", "options": [{"text": "By encouraging individual competition, leading to greater innovation and efficiency.", "isCorrect": false, "rationale": "While capitalism promotes competition, Marx views it as leading to instrumental relationships, not as an expression of true human freedom."}, {"text": "By transforming work from an expression of creativity into a compelled activity done merely for survival.", "isCorrect": true, "rationale": "The text states: 'Work, which ought to be the expression of human creativity and freedom, becomes under capitalism a compelled activity, something done not for its own sake but to survive.'"}, {"text": "By shifting focus from collective well-being to individual spiritual growth.", "isCorrect": false, "rationale": "Marx's critique is not about a shift from collective well-being to individual spiritual growth, but about how labor itself is distorted."}, {"text": "By promoting consumption as the primary means of personal satisfaction and social status.", "isCorrect": false, "rationale": "While a feature of capitalism, this isn't the primary way Marx describes capitalism inverting the *expression of human creativity and freedom* in the act of labor itself."}]}, {"question": "What does Marx propose as the necessary approach to overcome human suffering caused by alienation?", "options": [{"text": "Individual spiritual practices and self-reflection to heal from within.", "isCorrect": false, "rationale": "Marx explicitly rejects this, stating it's 'to treat the symptom while ignoring the disease.'"}, {"text": "Gradual reforms within the capitalist system to improve working conditions and wages.", "isCorrect": false, "rationale": "Marx's prescription is for a 'forcible overthrow of all existing social conditions,' not gradual reform."}, {"text": "Collective action and organized resistance by the working class to overthrow existing economic structures.", "isCorrect": true, "rationale": "The text states: 'Only collective action -- the organized resistance of the working class... against the owning class... can overthrow the conditions that produce alienation.'"}, {"text": "Increased governmental regulation of property relations to ensure fair distribution of wealth.", "isCorrect": false, "rationale": "While addressing property, Marx calls for a revolutionary overthrow, not merely regulation by the existing state apparatus."}]}, {"question": "Beyond economic restructuring, what is the ultimate human condition Marx envisions through communism in its final form?", "options": [{"text": "A highly efficient economic system maximizing production and consumption for all.", "isCorrect": false, "rationale": "While economic efficiency might be a byproduct, Marx's ultimate vision extends beyond mere economic arrangements to human wholeness."}, {"text": "A society where spiritual leaders guide individuals toward inner peace and contentment.", "isCorrect": false, "rationale": "Marx's materialist perspective contrasts with spiritual guidance as a solution to societal suffering."}, {"text": "A state of human wholeness where individuals are free, creative, and social beings.", "isCorrect": true, "rationale": "The text explicitly states: 'the classless society that Marx envisioned -- communism in its final form -- is not just an economic arrangement but a state of human wholeness. When the structures that produce alienation are abolished, human beings can finally be what they truly are: free, creative, social beings.'"}, {"text": "An egalitarian political system where all citizens have equal voting power and representation.", "isCorrect": false, "rationale": "While political equality might be an aspect, the text emphasizes a broader 'state of human wholeness' and the actualization of human nature, which goes beyond mere political structure."}]}, {"question": "A recent college graduate is advised to attend numerous networking events, where she is encouraged to view other attendees primarily as potential clients or useful contacts for career advancement. This scenario, if it supplants genuine connection, best illustrates which of Marx's dimensions of alienation?", "options": [{"text": "Alienation from the product of labor.", "isCorrect": false, "rationale": "This dimension concerns the lack of ownership or connection to tangible goods produced, which is not the focus here."}, {"text": "Alienation from the act of labor.", "isCorrect": false, "rationale": "This dimension relates to the dehumanizing nature of the work process itself, not primarily interpersonal relationships."}, {"text": "Alienation from species-being.", "isCorrect": false, "rationale": "While instrumental relationships can contribute to alienation from species-being, the immediate and direct impact described is on how humans relate to each other."}, {"text": "Alienation from other humans.", "isCorrect": true, "rationale": "The text states: 'because all human relationships under capitalism are mediated by economic competition and the wage relation, genuine human community... is replaced by instrumental relationships. Even friendship can become networking.'"}]}, {"question": "The 'DID YOU KNOW?' section highlights that Marx's Economic and Philosophic Manuscripts of 1844 were not published until 1932. What is a key implication of this delayed publication for the history of Communism?", "options": [{"text": "Early Marxist regimes successfully implemented Marx's full vision of human wholeness despite lacking this text.", "isCorrect": false, "rationale": "The text suggests the opposite: 'Some scholars argue that had they done so, the history of Communism might have looked very different,' implying the lack of the text was a disadvantage."}, {"text": "Marx intentionally delayed publication to allow for diverse interpretations of his theories to evolve organically.", "isCorrect": false, "rationale": "The text states Marx 'did not publish in his lifetime,' indicating it was not an intentional delay on his part for strategic reasons."}, {"text": "The foundational concept of alienation, central to Marx's early thought, was largely unknown or inaccessible to key Marxist revolutionaries.", "isCorrect": true, "rationale": "The text states: 'many of the most important Marxist regimes of the twentieth century had never read this foundational account of alienation,' implying its inaccessibility."}, {"text": "The Manuscripts contained minor theoretical points that had little bearing on the practical application of Communist ideology.", "isCorrect": false, "rationale": "The text refers to it as 'this foundational account of alienation,' suggesting its significant theoretical importance, not minor points."}]}, {"question": "Given Marx's materialist premise, why would he likely dismiss the advice to a suffering worker to 'extinguish her craving' as an inadequate solution?", "options": [{"text": "Because he believes that all human cravings are inherently good and should be fulfilled without restraint.", "isCorrect": false, "rationale": "Marx's critique is not about the inherent goodness of cravings but about the structural causes of suffering and the inadequacy of internal solutions."}, {"text": "Because such advice treats a symptom of suffering while ignoring its deeper structural economic cause.", "isCorrect": true, "rationale": "The text states: 'To tell the suffering worker to meditate on the Name of God, or to extinguish her craving, is, in Marx's view, to treat the symptom while ignoring the disease. The disease is capitalism itself.'"}, {"text": "Because he advocates for individual self-interest and the accumulation of wealth as the path to liberation.", "isCorrect": false, "rationale": "This contradicts Marx's critique of capitalism and his call for collective action against private property and economic competition."}, {"text": "Because he views human suffering as an inevitable and unchangeable part of the human condition.", "isCorrect": false, "rationale": "Marx explicitly offers a 'prescription' for liberation through 'structural' change, indicating he believes suffering can be overcome."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
