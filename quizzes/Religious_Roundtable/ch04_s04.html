        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the most common misconception about Hindu practice?", "options": [{"text": "That all Hindus are strict vegetarians.", "isCorrect": false, "rationale": "The text does not mention vegetarianism as a common misconception about Hindu practice."}, {"text": "That Hinduism has one pantheon of gods and that Hindus worship all of them equally.", "isCorrect": true, "rationale": "The text explicitly states: 'Perhaps the most common misconception about Hinduism is that it has one pantheon of gods and that Hindus worship all of them equally.'"}, {"text": "That Hinduism has no central scriptures.", "isCorrect": false, "rationale": "The text does not discuss the absence of central scriptures as a misconception."}, {"text": "That moksha is achieved only through asceticism.", "isCorrect": false, "rationale": "While asceticism is mentioned in Shaivism, the text indicates Vaishnavism emphasizes bhakti, disproving this as a universal misconception about 'only' one path."}], "id": "q01"}, {"question": "The metaphor of the mountain with many paths is used to illustrate which aspect of Hindu practice?", "options": [{"text": "The hierarchical structure of divine beings within the Hindu pantheon.", "isCorrect": false, "rationale": "The metaphor focuses on different routes to a unified destination, not the hierarchy of gods."}, {"text": "The diverse philosophical schools that compete for followers, each claiming superiority.", "isCorrect": false, "rationale": "The metaphor suggests that despite differences, all sincere paths lead to the same summit, implying unity of goal rather than competition for superiority."}, {"text": "That different devotional streams, though distinct, ultimately lead to the same spiritual goal.", "isCorrect": true, "rationale": "The text states: 'all paths, followed sincerely, lead to the same summit,' directly supporting this option."}, {"text": "The difficulty in achieving moksha due to the numerous spiritual disciplines available.", "isCorrect": false, "rationale": "The metaphor frames the multiple paths as valid and leading to the summit, not as sources of difficulty."}], "id": "q02"}, {"question": "A devout Hindu seeks to achieve moksha primarily through intense devotional love, singing praises to God, and seeing the divine in every person. Which stream of Hinduism would this practitioner most likely belong to, and what figure would they center their devotion on?", "options": [{"text": "Shaivism, centered on Shiva.", "isCorrect": false, "rationale": "Shaivism emphasizes ascetic practice and yogic discipline, not primarily devotional love as described here."}, {"text": "Shaktism, centered on Kali.", "isCorrect": false, "rationale": "Shaktism centers on the Divine Feminine as a creative and active force, not primarily devotional love and seeing God in every human being in this specific Vaishnava way."}, {"text": "Vaishnavism, centered on Vishnu or his avatars like Krishna.", "isCorrect": true, "rationale": "The text states: 'Vaishnavism emphasizes bhakti—devotional love—as the primary path to moksha. To surrender to God in love, to sing his praises, to see his face in every human being—this is the Vaishnava way.'"}, {"text": "Henotheism, centered on a personal deity of their choice.", "isCorrect": false, "rationale": "Henotheism describes a theological position of worship, not a specific devotional stream with prescribed practices like those mentioned."}], "id": "q03"}, {"question": "A Shaiva practitioner meditates on Shiva as both a destroyer and a regenerator. What underlying philosophical concept does this paradox primarily illustrate within Shaivism?", "options": [{"text": "The belief that human beings possess both destructive and creative potential.", "isCorrect": false, "rationale": "While potentially true, the text focuses on Shiva's cosmic role, not human potential."}, {"text": "The idea that all divine figures in Hinduism are fundamentally contradictory.", "isCorrect": false, "rationale": "This specific paradox is attributed to Shiva within Shaivism, not generalized to all divine figures."}, {"text": "The truth that destruction is a necessary precursor for renewal and recreation in the universe.", "isCorrect": true, "rationale": "The text states: 'Shiva embodies the truth that destruction is necessary for renewal: the universe must be dissolved so that it can be recreated.'"}, {"text": "The ascetic path to moksha requires a complete rejection of worldly existence.", "isCorrect": false, "rationale": "While Shaivism emphasizes asceticism, the destroy/regenerator paradox specifically refers to the cycle of cosmic existence, not merely rejection of the world."}], "id": "q04"}, {"question": "In Shaktism, what is the ultimate reality primarily understood as?", "options": [{"text": "An impersonal absolute, transcendent and beyond all form.", "isCorrect": false, "rationale": "The text explicitly states that in Shaktism, the ultimate reality is 'not an impersonal absolute'."}, {"text": "A transcendent male god who oversees creation.", "isCorrect": false, "rationale": "The text explicitly states that in Shaktism, the ultimate reality is 'not... a transcendent male god'."}, {"text": "A dynamic, maternal divine energy that is the creative and active force of the universe.", "isCorrect": true, "rationale": "The text states: 'In Shaktism, the ultimate reality is not an impersonal absolute or a transcendent male god, but a dynamic, maternal divine energy that dances through all creation.'"}, {"text": "A multitude of separate, equally powerful goddesses.", "isCorrect": false, "rationale": "The text clarifies that Devi, Durga, Kali, Lakshmi, Saraswati 'are not separate goddesses but aspects of a single divine power (Shakti)'."}], "id": "q05"}, {"question": "Which of the following statements accurately differentiates the primary focus of Vaishnavism, Shaivism, and Shaktism, according to the text?", "options": [{"text": "Vaishnavism focuses on inner meditation, Shaivism on cosmic preservation, and Shaktism on divine leadership.", "isCorrect": false, "rationale": "This option inaccurately describes the focus of each stream; for example, Vishnu is the preserver, not Shiva, and Vaishnavism emphasizes bhakti, not primarily inner meditation."}, {"text": "Vaishnavism centers on the sustainer Vishnu, Shaivism on the destroyer/regenerator Shiva, and Shaktism on the Divine Feminine as creative energy.", "isCorrect": true, "rationale": "This accurately summarizes the core tenets and central divine figures of each tradition as presented in the text: Vishnu as sustainer, Shiva as destroyer/regenerator, and Shakti as the creative Divine Feminine."}, {"text": "Vaishnavism emphasizes asceticism, Shaivism devotional love, and Shaktism philosophical debate.", "isCorrect": false, "rationale": "This option reverses key characteristics; Vaishnavism emphasizes devotional love (bhakti), and Shaivism emphasizes asceticism."}, {"text": "Vaishnavism sees all gods as equal, Shaivism denies other gods exist, and Shaktism is exclusively monotheistic.", "isCorrect": false, "rationale": "This misrepresents the concept of henotheism (which applies to these streams) and the nature of their worship, none of which deny other gods or are exclusively monotheistic in the strict sense."}], "id": "q06"}, {"question": "How does the concept of henotheism, as described in the text, differ from polytheism?", "options": [{"text": "Henotheism acknowledges only one God, while polytheism acknowledges multiple gods.", "isCorrect": false, "rationale": "This describes monotheism versus polytheism. Henotheism acknowledges multiple gods but worships one as supreme."}, {"text": "Henotheism is the belief that all gods are roughly equal, whereas polytheism emphasizes one supreme god.", "isCorrect": false, "rationale": "This reverses the definitions provided; polytheism considers all gods roughly equal, while henotheism focuses on one supreme god among others."}, {"text": "Henotheism involves worshipping one god as supreme while still acknowledging the existence and reality of other gods, whereas polytheism considers all gods roughly equal.", "isCorrect": true, "rationale": "The text explicitly defines henotheism as 'worshipping one god as supreme, while acknowledging that other gods exist and are real. This is different from both polytheism (all gods are roughly equal) and monotheism (only one God exists).'"}, {"text": "Henotheism is a rigid theological position, while polytheism is flexible.", "isCorrect": false, "rationale": "The text describes henotheism as a 'theologically flexible position,' not rigid."}], "id": "q07"}, {"question": "A Hindu practitioner regularly visits a Vishnu temple, considering Vishnu the highest manifestation of the divine. However, they also respect Shiva and Devi as real and powerful deities. This approach is best described as an example of:", "options": [{"text": "Monotheism.", "isCorrect": false, "rationale": "Monotheism implies only one God exists, which is contradicted by acknowledging Shiva and Devi as real deities."}, {"text": "Polytheism.", "isCorrect": false, "rationale": "Polytheism implies all gods are roughly equal, whereas this practitioner considers Vishnu 'the highest manifestation of the divine.'"}, {"text": "Pantheism.", "isCorrect": false, "rationale": "Pantheism (God is everything and everything is God) is not discussed in the text as a term or concept in this context."}, {"text": "Henotheism.", "isCorrect": true, "rationale": "This scenario perfectly matches the definition of henotheism: 'worshipping one god as supreme, while acknowledging that other gods exist and are real,' as exemplified by a Vaishnava relating to Vishnu as highest but not denying Shiva."}], "id": "q08"}, {"question": "The text describes the image of Kali—fierce, dark, dancing on the corpse of Shiva—as 'not a horror; it is a meditation on the power that drives transformation.' What does this suggest about the Hindu understanding of divine imagery, particularly in Shaktism?", "options": [{"text": "That terrifying imagery is used primarily to instill fear of the divine in practitioners.", "isCorrect": false, "rationale": "The text explicitly states it's 'not a horror,' countering the idea of instilling fear as the primary purpose."}, {"text": "That seemingly destructive or intense divine forms symbolize deeper, transformative spiritual principles rather than literal evil.", "isCorrect": true, "rationale": "The text directly links Kali's fierce image to 'the power that drives transformation,' indicating a symbolic understanding beyond literal interpretation of destruction or horror."}, {"text": "That Shiva is ultimately subservient to Kali and the Divine Feminine.", "isCorrect": false, "rationale": "While the image depicts Shiva in a subordinate position, the text emphasizes 'transformation' as the core meaning, not simply establishing a hierarchy of deities."}, {"text": "That the true nature of divinity can only be grasped through violent and chaotic representations.", "isCorrect": false, "rationale": "The text focuses on 'transformation' and 'power' rather than suggesting that violence or chaos are the only ways to understand divinity."}], "id": "q09"}, {"question": "The 'didyouknow' section highlights Diwali, the Festival of Lights, being celebrated by various traditions with different meanings. This example best illustrates which broader principle of Hinduism discussed in the main text?", "options": [{"text": "The universal acceptance of Rama as the supreme deity across all Hindu traditions.", "isCorrect": false, "rationale": "The text explicitly states Diwali has different meanings for Vaishnavas (Rama's return), Shaivas, and Jains, indicating no universal acceptance of Rama as supreme."}, {"text": "The strict adherence to a single, unified calendar and set of rituals for all Hindu festivals.", "isCorrect": false, "rationale": "The phrase 'One festival, many meanings' directly contradicts the idea of strict adherence to a single interpretation or ritual."}, {"text": "The capacity of a single tradition to encompass and provide diverse meanings for a common practice, reflecting its inherent flexibility and pluralism.", "isCorrect": true, "rationale": "This exemplifies the 'One Tradition, Many Paths' theme and the theological flexibility (henotheism) discussed, where common practices can hold varied, yet equally valid, significance for different streams."}, {"text": "The dominance of Vaishnavism as the largest stream of Hinduism, imposing its interpretations on other traditions.", "isCorrect": false, "rationale": "The text presents multiple interpretations (Vaishnava, Shaiva, Jain) without suggesting one is imposed upon others, reflecting diversity rather than dominance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
