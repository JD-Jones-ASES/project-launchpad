        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text states Yggdrasil is 'the structural principle of the Norse universe.' Which of the following best describes the fundamental significance of Yggdrasil in Norse cosmology?", "options": [{"text": "It is primarily a beautiful tree where the gods convene for councils.", "isCorrect": false, "rationale": "While gods may gather, the text emphasizes Yggdrasil's role as a fundamental structural principle, not just a meeting place."}, {"text": "It acts as the literal and metaphorical axis that connects and sustains all nine realms.", "isCorrect": true, "rationale": "The text describes Yggdrasil as the 'structural principle' that holds the cosmos together, with its roots and branches spreading through all reality and connecting all realms."}, {"text": "It serves as a prison for the most dangerous giants and monsters.", "isCorrect": false, "rationale": "The text mentions serpents gnawing its roots, but does not describe Yggdrasil itself as a prison for giants or monsters."}, {"text": "Its fruit grants immortality to the Æsir gods.", "isCorrect": false, "rationale": "The text does not mention Yggdrasil bearing fruit that grants immortality; it explicitly states the Æsir are mortal in a cosmic sense."}], "id": "q01"}, {"question": "The two principal families of Norse gods, the Æsir and the Vanir, are described as having made peace and exchanged hostages after a great war. Which of the following accurately distinguishes a key characteristic or association for each family?", "options": [{"text": "The Æsir reside in Jötunheimr, and the Vanir dwell in Ásgarðr.", "isCorrect": false, "rationale": "The text states the Æsir dwell in Ásgarðr, and Jötunheimr is the realm of giants."}, {"text": "The Æsir are associated with wisdom and war, while the Vanir are linked to fertility and the sea.", "isCorrect": true, "rationale": "The text identifies Odin (wisdom, war) and Týr (law, justice) with the Æsir, and Freyr (fertility, prosperity) and Njörðr (sea, fishing) with the Vanir."}, {"text": "The Æsir are mortal and will perish at Ragnarök, whereas the Vanir are immortal and immune.", "isCorrect": false, "rationale": "The text states that 'the Æsir are mortal in a cosmic sense: they will die at Ragnarök,' and implies that all gods are subject to fate."}, {"text": "The Æsir specialize in magic and foresight, while the Vanir are gods of law and justice.", "isCorrect": false, "rationale": "Frigg (Æsir) is associated with foresight, and Týr (Æsir) with law and justice. The Vanir are linked to fertility and the sea."}], "id": "q02"}, {"question": "The Norns are said to weave the threads of destiny for all beings. How does the text characterize the Norse understanding of fate ('wyrd') in contrast to simple predestination?", "options": [{"text": "Wyrd dictates every choice, making free will an illusion for gods and humans alike.", "isCorrect": false, "rationale": "The text explicitly states Norse fate 'is not simply predestination' and is 'better understood as a pattern that unfolds through one's choices and encounters.'"}, {"text": "Wyrd is a pattern that unfolds through one's choices and encounters, even for the gods, but cannot be escaped.", "isCorrect": true, "rationale": "The text clarifies that wyrd is 'a pattern that unfolds through one's choices and encounters with the world' and emphasizes that 'No one escapes their wyrd.'"}, {"text": "Wyrd is a punishment for past transgressions, escapable only through divine intervention.", "isCorrect": false, "rationale": "The text does not mention wyrd as a punishment or suggest it can be escaped through divine intervention; rather, even the gods are subject to it."}, {"text": "Wyrd can be altered or avoided if one demonstrates sufficient courage or magical ability.", "isCorrect": false, "rationale": "The text clearly states, 'No one escapes their wyrd' and 'Even the gods cannot escape what the Norns weave,' implying it cannot be altered or avoided."}], "id": "q03"}, {"question": "Ragnarök is described as 'the prophesied destruction of the Norse cosmos.' What is the ultimate outcome of Ragnarök, as depicted in the text?", "options": [{"text": "The complete and irreversible annihilation of all existence.", "isCorrect": false, "rationale": "The text states the world will 'rise again, green and renewed' and a 'new generation of gods will survive,' indicating it's not total annihilation."}, {"text": "A cyclical event of doom followed by renewal, leading to a new generation of gods and a remade world.", "isCorrect": true, "rationale": "The text explicitly defines Ragnarök as 'not simply doom; it is doom followed by renewal,' with the world rising again and new gods inhabiting it."}, {"text": "The triumph of the gods over chaos, leading to eternal peace in Ásgarðr.", "isCorrect": false, "rationale": "Most gods will perish, including Odin and Thor, so it is not a triumph leading to eternal peace for the current generation of gods."}, {"text": "A judgment day where souls are sorted into eternal reward or punishment.", "isCorrect": false, "rationale": "While there are afterlife realms, Ragnarök is described as a cosmic destruction and renewal, not primarily a day of individual judgment for reward or punishment."}], "id": "q04"}, {"question": "Regarding the Norse afterlife, the text highlights different destinations based on the 'kind of death you died.' Which of the following accurately describes a specific afterlife destination and who goes there?", "options": [{"text": "Valhalla is a gloomy realm for those who die of old age or illness.", "isCorrect": false, "rationale": "Valhalla is Odin's hall for half of those who die in battle; Hel is the dim realm for those who die of illness or old age."}, {"text": "Fólkvangr is Freyja's hall, receiving half of those who die in battle.", "isCorrect": true, "rationale": "The text states, 'The other half of the battle-dead go to the goddess Freyja's hall, Fólkvangr.'"}, {"text": "Hel is a place of eternal torment for the wicked.", "isCorrect": false, "rationale": "The text describes Hel as 'not a place of punishment, but of quiet, pale existence' for those who die of illness or old age."}, {"text": "All gods and humans alike are reincarnated through Yggdrasil's roots.", "isCorrect": false, "rationale": "The text describes distinct afterlife realms (Valhalla, Fólkvangr, Hel) rather than universal reincarnation."}], "id": "q05"}, {"question": "If a Norse poet were to describe the interconnectedness of existence, focusing on the movement of different beings across realms, which element of Norse cosmology would most effectively symbolize this concept?", "options": [{"text": "The Norns at the Well of Urðr, weaving destiny.", "isCorrect": false, "rationale": "The Norns represent fate and destiny, not the physical or metaphorical interconnectedness and movement between the distinct realms."}, {"text": "The Bifröst bridge connecting Ásgarðr to Midgarðr.", "isCorrect": false, "rationale": "Bifröst connects two specific realms, but Yggdrasil's reach is explicitly described as encompassing 'all of reality' and all nine realms."}, {"text": "The roots and branches of Yggdrasil, which extend through all nine realms.", "isCorrect": true, "rationale": "The text states Yggdrasil's 'branches spread through all of reality' and 'Along its roots and branches move gods, giants, humans, elves, dwarves, and the dead,' making it the ultimate symbol of cosmic interconnectedness."}, {"text": "The hall of Valhalla, where fallen warriors feast.", "isCorrect": false, "rationale": "Valhalla is a specific afterlife realm, not a symbol of general cosmic interconnectedness or movement across all realms."}], "id": "q06"}, {"question": "Odin, knowing he will die at Ragnarök, spends his life preparing for a battle he knows he will lose. The text states this is 'not paralyzing — it is clarifying.' What core Norse value does this perspective on inevitable doom best exemplify?", "options": [{"text": "The importance of strategic thinking and avoiding unnecessary conflict.", "isCorrect": false, "rationale": "Odin is preparing for a *necessary* conflict he knows he will lose, which contradicts avoiding conflict."}, {"text": "The belief that personal honor and the manner of one's actions define worth, regardless of the ultimate outcome.", "isCorrect": true, "rationale": "The text explains this perspective means 'If doom is inevitable, then what matters is how you live before it arrives' and 'how you face what cannot be avoided is the measure of who you are,' reflecting a focus on honor and conduct."}, {"text": "The idea that divine intervention can ultimately alter even a fixed destiny.", "isCorrect": false, "rationale": "The text emphasizes that 'No one escapes their wyrd' and 'Even the gods cannot escape,' indicating destiny is fixed and not altered by intervention."}, {"text": "The pragmatic acceptance of fate, leading to a search for peaceful alternatives.", "isCorrect": false, "rationale": "Odin's preparation for battle, rather than seeking peaceful alternatives, suggests a value placed on courageous confrontation of fate."}], "id": "q07"}, {"question": "The fact that the Æsir and Vanir, after a war, made peace and exchanged hostages, and 'remain distinct' while living together, implies what about the nature of divine power or influence in Norse belief?", "options": [{"text": "That all divine power ultimately stems from a single, unified source.", "isCorrect": false, "rationale": "The text highlights their distinct lineages and roles, suggesting diverse sources or aspects of divine power rather than a single unified one."}, {"text": "That different aspects of cosmic function (e.g., war and fertility) are interdependent and require cooperation, even after conflict.", "isCorrect": true, "rationale": "The peaceful resolution and exchange of hostages suggest a recognition of the value and necessity of both families' distinct domains (e.g., Æsir with war/justice, Vanir with fertility/sea) for the cosmos to function."}, {"text": "That warfare is an inherent and irreconcilable aspect of divine interaction.", "isCorrect": false, "rationale": "While there was a war, the key point is they made peace and live together, implying reconciliation is possible, not that conflict is irreconcilable."}, {"text": "That one divine family is ultimately superior and holds dominion over the other.", "isCorrect": false, "rationale": "The exchange of hostages after a war implies a diplomatic resolution and a balance of power, not the clear dominion of one family over the other."}], "id": "q08"}, {"question": "A young Norse warrior, facing a challenging quest, consults a seer about their future. The seer speaks of the warrior's 'wyrd' but emphasizes that 'your choices still shape the path.' Which understanding of the Norns' role and fate is the seer conveying?", "options": [{"text": "The Norns have predetermined every single event, making effort futile.", "isCorrect": false, "rationale": "This contradicts the text's clarification that Norse fate 'is not simply predestination' and involves choices."}, {"text": "The Norns establish the overall framework or pattern of destiny, but individual agency navigates and unfolds within it.", "isCorrect": true, "rationale": "This aligns perfectly with the text's definition of wyrd as 'a pattern that unfolds through one's choices and encounters with the world,' where choices shape the path within a pre-woven destiny."}, {"text": "The Norns only weave the fate of gods, leaving human destiny entirely to free will.", "isCorrect": false, "rationale": "The text explicitly states the Norns 'weave the threads of destiny for gods and humans alike.'"}, {"text": "The Norns' weaving is subject to change based on prayers and sacrifices.", "isCorrect": false, "rationale": "The text emphasizes that 'No one escapes their wyrd' and 'Even the gods cannot escape,' implying fate is fixed in its pattern, not mutable by prayers."}], "id": "q09"}, {"question": "The Norse afterlife places less emphasis on 'reward and punishment' and more on 'what kind of death you died.' What does this suggest about the moral or ethical framework of Norse paganism?", "options": [{"text": "It implies a belief in reincarnation, where the quality of one's death determines the next life.", "isCorrect": false, "rationale": "The text describes distinct afterlife realms (Valhalla, Fólkvangr, Hel) based on the type of death, not reincarnation into a new life."}, {"text": "It suggests that all individuals, regardless of their actions, receive a similar fate after death.", "isCorrect": false, "rationale": "Different destinations (Valhalla, Fólkvangr, Hel) are described based on the manner of death, indicating varied fates, not similar ones."}, {"text": "It indicates a purely nihilistic view where life and death hold no inherent meaning.", "isCorrect": false, "rationale": "The emphasis on courage, loyalty, and how one faces doom suggests a strong ethical framework and a meaningful life, even if fate is inevitable."}, {"text": "It prioritizes the circumstances and manner of death over a person's lifetime deeds or moral character in determining their post-mortem destination.", "isCorrect": true, "rationale": "The text directly states the afterlife 'is less concerned with reward and punishment than with the question of what kind of death you died,' meaning the circumstances of death are paramount for determining the afterlife realm."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
