<script>
var QUESTIONS = [{"question": "How would one best characterize ancient Norse Paganism based on the provided text?", "options": [{"text": "A single, unified religion with fixed scriptures and a central authority.", "isCorrect": false, "rationale": "The text explicitly states that Norse Paganism was 'never a single, unified religion with a central authority, a creed, or a fixed scripture'."}, {"text": "A family of related traditions that varied significantly by region, period, and community.", "isCorrect": true, "rationale": "The text directly states, 'It was a family of related traditions that varied significantly by region, period, and community,' emphasizing its diverse nature."}, {"text": "Primarily practiced only in Scandinavia and Iceland, with no presence elsewhere.", "isCorrect": false, "rationale": "The text mentions Norse religion (Scandinavia/Iceland), Anglo-Saxon religion (England), and Continental Germanic religion (Central Europe), indicating wider practice."}, {"text": "A monotheistic system of beliefs centered around a single creator deity.", "isCorrect": false, "rationale": "The text refers to a 'family of gods' and 'deities,' indicating a polytheistic framework, not monotheistic."}]}, {"question": "The text states that Norse Odin is Anglo-Saxon Woden, and Norse Þórr is Anglo-Saxon Þunor. What does this illustrate about ancient Germanic religions?", "options": [{"text": "They had entirely different pantheons of gods with no common figures.", "isCorrect": false, "rationale": "The examples show different names for the *same* deity (Odin/Woden, Þórr/Þunor), indicating shared figures, not entirely different pantheons."}, {"text": "Regional variations existed primarily in the names used for shared deities and specific cultural emphases.", "isCorrect": true, "rationale": "The text explains that these traditions 'shared the same basic family of gods and a similar cosmological framework' but 'differed in emphasis and in the names they used,' which is precisely what the Odin/Woden and Þórr/Þunor examples demonstrate."}, {"text": "Continental Germanic religions were significantly more dominant and widespread than Norse traditions.", "isCorrect": false, "rationale": "The text describes regional variations but does not assert the dominance of one over the others."}, {"text": "The Eddas served as a universal, authoritative scripture for all ancient Germanic tribes.", "isCorrect": false, "rationale": "The text specifies that 'What we have in the Eddas is specifically the Norse tradition as remembered in medieval Iceland,' not a universal scripture."}]}, {"question": "According to the text, what do the Eddas primarily represent in the context of ancient Norse Paganism?", "options": [{"text": "The complete and unified scripture of all ancient Germanic religions.", "isCorrect": false, "rationale": "The text clarifies that Norse Paganism was not unified and that the Eddas are specific to the Norse tradition."}, {"text": "A collection of Roman myths that heavily influenced pre-Christian Norse beliefs.", "isCorrect": false, "rationale": "The Eddas are described as containing the Norse tradition, not Roman myths."}, {"text": "Specifically the Norse tradition as remembered in medieval Iceland.", "isCorrect": true, "rationale": "The text explicitly states, 'What we have in the Eddas is specifically the Norse tradition as remembered in medieval Iceland,' highlighting their specific origin and content."}, {"text": "A historical account of the Christianization process among Germanic peoples.", "isCorrect": false, "rationale": "The Eddas preserve pre-Christian Norse religious practice, not accounts of Christianization."}]}, {"question": "If an Old English speaker referred to 'Wodnesdæg,' which modern English day of the week would they be referencing, and which Norse deity is associated with it?", "options": [{"text": "Tuesday, associated with Týr.", "isCorrect": false, "rationale": "Tuesday is named for Týr (Tiw in Old English), not Woden. Wodnesdæg refers to Woden."}, {"text": "Wednesday, associated with Odin.", "isCorrect": true, "rationale": "The 'didyouknow' section states, 'Wednesday for Woden (the Anglo-Saxon form of Odin),' directly linking Wodnesdæg to Wednesday and Odin."}, {"text": "Thursday, associated with Thor.", "isCorrect": false, "rationale": "Thursday is named for Þunor/Thor, not Woden."}, {"text": "Friday, associated with Frigg.", "isCorrect": false, "rationale": "Friday is named for Frigg (or Freyja), not Woden."}]}, {"question": "Which of the following statements accurately describes the modern revival of Norse Paganism, specifically Ásatrú?", "options": [{"text": "It began as a clandestine movement with no public recognition.", "isCorrect": false, "rationale": "Ásatrú was officially recognized as a religion by the Icelandic government in 1973, indicating public and official status, not clandestine."}, {"text": "It was officially recognized as a religion by the Icelandic government in 1973 and has since spread globally.", "isCorrect": true, "rationale": "The text explicitly states, 'Ásatrú... was officially recognized as a religion by the Icelandic government in 1973 and has since spread across Scandinavia, North America, Australia, and beyond.'"}, {"text": "Its primary goal is to merge Norse traditions with Christian doctrines.", "isCorrect": false, "rationale": "Ásatrú aims to 'reconstruct pre-Christian Norse religious practice,' indicating a focus on pre-Christian traditions, not merging with Christianity."}, {"text": "It is exclusively practiced in Iceland and has not gained traction elsewhere.", "isCorrect": false, "rationale": "The text notes its spread 'across Scandinavia, North America, Australia, and beyond,' showing global reach."}]}, {"question": "Based on the text, what is a primary objective of Ásatrú practitioners (Heathens)?", "options": [{"text": "To establish a new, universally accepted scripture for all modern pagan religions.", "isCorrect": false, "rationale": "The text states they 'attempt to reconstruct pre-Christian Norse religious practice using the Eddas and archaeological evidence,' not create new universal scripture."}, {"text": "To convert followers of other pagan paths to Ásatrú through missionary work.", "isCorrect": false, "rationale": "The text does not mention missionary work; its focus is on worship, honoring ancestors, and reconstruction."}, {"text": "To reconstruct pre-Christian Norse religious practice using historical texts and archaeological evidence.", "isCorrect": true, "rationale": "The text states practitioners 'attempt to reconstruct pre-Christian Norse religious practice using the Eddas and archaeological evidence,' which is a core objective."}, {"text": "To promote political ideologies aligned with ancient Norse societal structures.", "isCorrect": false, "rationale": "While 'who owns a tradition' is discussed, the description of Ásatrú practices focuses on religious worship, ancestor honor, and reconstruction, not political ideology."}]}, {"question": "What is identified as a 'serious internal controversy' facing modern Norse Paganism?", "options": [{"text": "Disagreements over the accurate translation and interpretation of ancient Norse texts.", "isCorrect": false, "rationale": "While such academic debates might exist, the text highlights a different, more serious internal controversy."}, {"text": "Challenges in adapting ancient rituals to modern technological advancements.", "isCorrect": false, "rationale": "This is not mentioned as a 'serious internal controversy' in the text."}, {"text": "The appropriation of Norse symbols and mythology by white supremacist and neo-Nazi groups.", "isCorrect": true, "rationale": "The text explicitly states, 'Modern Norse Paganism faces a serious internal controversy... some white supremacist and neo-Nazi groups have attempted to claim Norse symbols and mythology.'"}, {"text": "Debates concerning the inclusion of non-Norse deities into the Ásatrú pantheon.", "isCorrect": false, "rationale": "This is not mentioned as the primary or 'serious internal controversy'."}]}, {"question": "How do the overwhelming majority of Ásatrú and Heathen communities respond to attempts by white supremacist groups to claim Norse mythology?", "options": [{"text": "They passively allow the appropriation, believing it will eventually fade from relevance.", "isCorrect": false, "rationale": "The text states they 'explicitly and strongly reject this appropriation,' which is the opposite of passive allowance."}, {"text": "They engage in internal debates but have not yet reached a unified stance on the issue.", "isCorrect": false, "rationale": "The text indicates an 'overwhelming majority' explicitly and strongly reject it, implying a unified stance among the mainstream."}, {"text": "They explicitly and strongly reject such appropriation, affirming that Norse Paganism is open to people of all ethnicities.", "isCorrect": true, "rationale": "The text clearly states, 'The overwhelming majority of Ásatrú and Heathen communities explicitly and strongly reject this appropriation' and that 'Norse Paganism is open to people of all ethnicities and that racists are not welcome.'"}, {"text": "They seek to differentiate themselves by adopting entirely new symbols and rituals.", "isCorrect": false, "rationale": "The text indicates rejection and statements of inclusivity, not a wholesale abandonment of traditional symbols or rituals."}]}, {"question": "The text mentions that 'the gods of the Norse tradition were imagined by people who traded, fought, and intermarried across Europe, the Middle East, and Central Asia.' What is the primary purpose of including this historical detail?", "options": [{"text": "To explain the etymological origins of certain Norse deity names.", "isCorrect": false, "rationale": "The detail focuses on the interactions of people, not the linguistics of names."}, {"text": "To demonstrate the extensive geographical reach of ancient Norse paganism as a unified religion.", "isCorrect": false, "rationale": "While it indicates reach, the text emphasizes *variety* not *unity*, and the detail's primary purpose is contextual to the racism debate."}, {"text": "To provide evidence that Norse mythology inherently belongs to a specific, racially pure ancestral group.", "isCorrect": false, "rationale": "This statement is used to *counteract* claims of racial purity, not support them."}, {"text": "To historically refute the idea that Norse traditions belong exclusively to any single racial group.", "isCorrect": true, "rationale": "This historical detail is provided as direct evidence that 'the idea that they 'belong' to any racial group contradicts the historical record,' directly refuting racial claims."}]}, {"question": "The 'Big Question' section asks, 'Can a religious or cultural tradition be 'owned' by any group?' Based on the overall context of the provided section, what perspective does the author implicitly convey regarding this question?", "options": [{"text": "Traditions are inherently exclusive and can only be genuinely practiced by those with direct ancestral links.", "isCorrect": false, "rationale": "The text counters this by highlighting the historical diversity of people who imagined the gods and the modern rejection of racial exclusivity by mainstream Ásatrú."}, {"text": "The meaning of a tradition is fixed and determined by its earliest practitioners, making modern interpretations largely invalid.", "isCorrect": false, "rationale": "The discussion of modern revival and reconstruction implies ongoing interpretation, and the 'who owns' question suggests fluidity in meaning."}, {"text": "While groups may attempt to claim ownership, the diverse historical origins and modern rejections of exclusivity suggest traditions are more broadly shared and open to interpretation.", "isCorrect": true, "rationale": "The text presents evidence of historical diversity (trade, intermarriage), the explicit rejection of racial claims by modern Ásatrú communities, and the open-ended 'who owns' question, all pointing to a perspective of broader access and interpretation rather than exclusive ownership."}, {"text": "Religious traditions are primarily defined by government recognition, such as Ásatrú's status in Iceland, which grants ownership.", "isCorrect": false, "rationale": "Government recognition is a legal status, not a definitive answer to the question of cultural or spiritual 'ownership' or meaning, which is a philosophical and community-based question explored by the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
