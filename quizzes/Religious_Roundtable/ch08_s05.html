<script>
var QUESTIONS = [{"question": "According to the text, what is the most visible legacy of Norse religion in the English-speaking world?", "options": [{"text": "The pervasive use of Norse runes in modern writing.", "isCorrect": false, "rationale": "While Norse runes are part of Norse culture, the text specifically identifies the names of the days of the week as the 'most visible legacy' in the English-speaking world, not pervasive runic usage."}, {"text": "The names of four days of the week.", "isCorrect": true, "rationale": "The text explicitly states: 'As noted above, four days of the week bear Norse divine names,' calling this the 'most visible legacy of Norse religion'."}, {"text": "The structure of the modern calendar itself.", "isCorrect": false, "rationale": "The calendar is mentioned as reflecting a 'centuries-long fusion of Roman, Christian, and Germanic religious culture,' implying a broader origin than solely Norse religion, and not singled out as the 'most visible legacy' in the same way the days of the week are."}, {"text": "The adoption of Norse mythology into modern religious practices.", "isCorrect": false, "rationale": "The text does not mention the adoption of Norse mythology into modern religious practices as a legacy. It discusses its influence on literature and philosophy."}]}, {"question": "Which of the following modern cultural genres is explicitly stated to be 'saturated' with elements from Norse tradition?", "options": [{"text": "Historical fiction focused on ancient Roman empires.", "isCorrect": false, "rationale": "The text does not mention Norse influence on historical fiction about Roman empires. It highlights fantasy fiction."}, {"text": "Modern fantasy fiction, including Dungeons & Dragons, video games, and film.", "isCorrect": true, "rationale": "The text states: 'The entire genre of modern fantasy fiction — from Dungeons & Dragons to video games to film — is saturated with the Nine Worlds, the World Tree, the heroic warrior code, and the shadowy afterlife of Norse tradition.'"}, {"text": "Contemporary romance novels.", "isCorrect": false, "rationale": "Contemporary romance novels are not mentioned as being influenced by Norse tradition in the text."}, {"text": "Scientific non-fiction about astrophysics and cosmology.", "isCorrect": false, "rationale": "While Norse cosmology is mentioned as influencing Tolkien, the text does not claim it saturates the genre of scientific non-fiction."}]}, {"question": "J.R.R. Tolkien, author of *The Lord of the Rings*, drew deeply on Norse mythology in what specific way, according to the text?", "options": [{"text": "By actively working to debunk Norse myths through his scholarly writings.", "isCorrect": false, "rationale": "The text states Tolkien 'drew deeply on Norse mythology,' implying inspiration and homage, not debunking."}, {"text": "Through his professional scholarship in Old Norse and Old English, influencing his language and cosmology.", "isCorrect": true, "rationale": "The text states Tolkien 'was a professional scholar of Old Norse and Old English who drew deeply on Norse mythology, language, and cosmology,' directly linking his academic background to his creative influences."}, {"text": "Primarily by inventing entirely new mythological structures independent of ancient traditions.", "isCorrect": false, "rationale": "The text emphasizes his borrowing and homage to Norse traditions, not complete invention in isolation."}, {"text": "By focusing exclusively on Roman and Greek myths for character development and plotlines.", "isCorrect": false, "rationale": "The text explicitly mentions Norse mythology as his influence, and the 'Did You Know' section provides specific Norse names used by Tolkien."}]}, {"question": "The 'Did You Know' box about Tolkien's dwarves and Gandalf illustrates which specific aspect of his relationship with Norse mythology?", "options": [{"text": "Tolkien's complete originality in creating all names for his characters.", "isCorrect": false, "rationale": "The 'Did You Know' box explicitly states that names like the dwarves' and 'Gandalf' were 'taken almost directly from the Dvergatal' in the Völuspá, contradicting complete originality."}, {"text": "Tolkien's deliberate concealment of his Norse sources to maintain the illusion of unique creation.", "isCorrect": false, "rationale": "The text clarifies, 'Tolkien was not stealing; he was paying homage,' suggesting an open, respectful borrowing rather than concealment."}, {"text": "Tolkien's direct borrowing of names from the Norse Poetic Edda as a form of homage to a tradition he loved.", "isCorrect": true, "rationale": "The 'Did You Know' box directly states he 'borrowed many names directly from the Norse Poetic Edda' and 'was paying homage to a tradition he loved and studied deeply.'"}, {"text": "Tolkien's criticism of the lack of creativity in ancient Norse naming conventions.", "isCorrect": false, "rationale": "The text describes his use of names as 'paying homage,' indicating respect and admiration, not criticism."}]}, {"question": "What unique philosophical characteristic sets Norse religion apart from every other tradition discussed in the book, according to the text?", "options": [{"text": "It emphasizes the importance of human free will over divine intervention.", "isCorrect": false, "rationale": "While free will might be a theme in some traditions, the text does not highlight this as the *unique* distinction of Norse religion among all others covered."}, {"text": "It promises an ultimate heaven or spiritual reward for all believers.", "isCorrect": false, "rationale": "The text explicitly states that 'every other tradition, including Communism, offers some form of ultimate hope' like heaven or nirvana, contrasting this with Norse tradition where the gods themselves face an end."}, {"text": "It places the death of the gods themselves at the center of its worldview.", "isCorrect": true, "rationale": "The text states: 'It is the only tradition here that places the death of the gods themselves at the center of its worldview,' making this its sharpest distinction."}, {"text": "It advocates for a strict, hierarchical social structure with gods at the apex.", "isCorrect": false, "rationale": "While gods exist in a hierarchy, the unique philosophical point highlighted is their mortality, not just their position."}]}, {"question": "How does the Norse concept of Ragnarök fundamentally differ from the 'ultimate hope' offered by traditions like Christianity (heaven) or Buddhism (nirvana)?", "options": [{"text": "Ragnarök promises a joyous reunion with ancestors and gods in an eternal paradise.", "isCorrect": false, "rationale": "The text explicitly states Ragnarök is 'the end of the gods, the end of the world,' and 'the gods now living will not survive to see' the renewal, which contradicts an eternal paradise for the current gods."}, {"text": "Ragnarök ensures eternal peace and personal enlightenment for all living beings.", "isCorrect": false, "rationale": "This aligns more with concepts like nirvana or certain interpretations of heaven, which the text contrasts with Ragnarök's outcome for the existing gods."}, {"text": "Ragnarök signifies the end of the gods and the world, followed by a renewal that the existing gods will not survive to witness.", "isCorrect": true, "rationale": "The text states Ragnarök is 'the end of the gods, the end of the world, followed by a renewal that the gods now living will not survive to see,' directly contrasting with other traditions' forms of ultimate hope for their deities or practitioners."}, {"text": "Ragnarök guarantees individual salvation through divine grace, regardless of earthly deeds.", "isCorrect": false, "rationale": "The Norse tradition emphasizes that 'how you live matters absolutely' and the 'fame of a dead man's deeds,' which contradicts salvation regardless of deeds."}]}, {"question": "Given the Norse worldview where even protective powers will eventually fail, what is the advised course of action for individuals?", "options": [{"text": "To seek immediate divine intervention and appeal to higher, more enduring gods.", "isCorrect": false, "rationale": "The text implies that the gods themselves are impermanent, so seeking intervention from 'higher, more enduring gods' is not the suggested response. The focus is on human action."}, {"text": "To withdraw from society and contemplate the impending doom in solitude.", "isCorrect": false, "rationale": "The text states, 'You keep faith with your community,' which contradicts withdrawing into solitude."}, {"text": "To live meaningfully by developing skills, courage, and generosity, keeping faith with one's community, and dying well.", "isCorrect": true, "rationale": "The text directly answers this: 'The Norse answer was: you live as if it mattered. You keep faith with your community. You develop your skills, your courage, and your generosity. You die well when your time comes, and you hope that what you did will be remembered.'"}, {"text": "To focus solely on amassing material wealth and power to secure personal comfort.", "isCorrect": false, "rationale": "The emphasis is on deeds, character, and community, not on material accumulation, especially given the quote 'Cattle die...'"}]}, {"question": "The Hávamál quote, 'Cattle die, and kinsmen die, and so one dies one's self; one thing I know that never dies: the fame of a dead man's deeds,' primarily emphasizes which core Norse value?", "options": [{"text": "The futility of human effort in the face of inevitable death.", "isCorrect": false, "rationale": "While it acknowledges death, the second part of the quote ('fame of a dead man's deeds') refutes futility, emphasizing lasting impact."}, {"text": "The importance of leaving a lasting legacy through one's honorable actions and reputation.", "isCorrect": true, "rationale": "The quote directly states that 'the fame of a dead man's deeds' is the one thing that 'never dies,' highlighting the enduring impact of one's actions and reputation over transient life."}, {"text": "The transient nature of all material possessions and social bonds.", "isCorrect": false, "rationale": "The quote does mention the death of 'cattle' and 'kinsmen' but its primary emphasis, conveyed in the concluding line, is on what *does not* die: the fame of one's deeds."}, {"text": "The belief in reincarnation and an eternal cycle of life and death.", "isCorrect": false, "rationale": "The text and the quote do not discuss reincarnation. The focus is on the lasting impact of deeds in *this* life."}]}, {"question": "Despite its 'unflinching honesty about the human condition,' why does the text assert that Norse philosophy 'is not despair'?", "options": [{"text": "Because it holds a secret belief that the gods will ultimately triumph over Ragnarök.", "isCorrect": false, "rationale": "The text explicitly states 'the gods now living will not survive to see' the renewal, contradicting a secret belief in their triumph."}, {"text": "Because it focuses on an individual's conviction that the quality of their life and death is entirely their own to shape.", "isCorrect": true, "rationale": "The text explains: 'It is a kind of unflinching honesty about the human condition, combined with a conviction that how you live matters absolutely — not because God is watching, not because nirvana awaits, but because the quality of your life and your death is the only thing that belongs entirely to you.'"}, {"text": "Because it promises a glorious afterlife in Valhalla for all who die honorably.", "isCorrect": false, "rationale": "While Valhalla is part of Norse myth, the text frames the 'not despair' argument around personal agency and the value of one's life/death, not an external afterlife reward."}, {"text": "Because it ultimately suggests that human actions have no consequence in the grand scheme of the universe.", "isCorrect": false, "rationale": "This contradicts the core message that 'how you live matters absolutely' and the importance of 'the fame of a dead man's deeds.'"}]}, {"question": "According to the section, why is Norse tradition 'worth taking seriously' for modern students who are 'constantly offered easy answers'?", "options": [{"text": "It provides a detailed historical blueprint for achieving societal utopia.", "isCorrect": false, "rationale": "The text does not present Norse tradition as a blueprint for utopia. It contrasts with traditions offering easy hope."}, {"text": "It offers a unique perspective that emphasizes personal agency, responsibility, and the intrinsic value of one's life and death without guaranteed external rewards.", "isCorrect": true, "rationale": "The text concludes by stating this tradition is valuable for its 'unflinching honesty about the human condition, combined with a conviction that how you live matters absolutely — not because God is watching, not because nirvana awaits, but because the quality of your life and your death is the only thing that belongs entirely to you,' directly addressing its relevance beyond easy answers."}, {"text": "It promises certain fame and glory in the afterlife for those who follow a strict warrior code.", "isCorrect": false, "rationale": "The text focuses on the *quality* of life and death and the *hope* of remembrance, rather than a guaranteed promise of fame or glory in an afterlife for all."}, {"text": "It serves primarily as a historical curiosity with limited relevance to contemporary ethical dilemmas.", "isCorrect": false, "rationale": "The section title 'Why It Matters' and the concluding paragraph directly counter the idea of it being merely a historical curiosity, highlighting its philosophical depth and relevance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
