    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Siddhartha Gautama's father attempt to influence his son's destiny?", "options": [{"text": "Encouraged him to seek out spiritual teachers from a young age.", "isCorrect": false, "rationale": "The text states his father shielded him from such realities, hoping he would become a king, not a spiritual teacher."}, {"text": "Shielded him from suffering and surrounded him with luxury.", "isCorrect": true, "rationale": "The text explicitly states: 'His father, determined to raise a king, surrounded young Siddhartha with every luxury and carefully shielded him from the harsher realities of life.'"}, {"text": "Sent him to live with wandering monks to understand their ways.", "isCorrect": false, "rationale": "Siddhartha became a wandering seeker only after he left the palace, defying his father's intentions."}, {"text": "Allowed him to freely explore the world outside the palace walls.", "isCorrect": false, "rationale": "His father actively 'shielded him' from the outside world; Siddhartha ventured out only as a young man against his father's initial protective measures."}]}, {"question": "The primary significance of Siddhartha's encounter with the Four Sights was that they:", "options": [{"text": "Confirmed his father's belief that worldly pleasures lead to true happiness.", "isCorrect": false, "rationale": "The Four Sights directly contradicted his father's attempts to shield him, revealing the suffering inherent in worldly life rather than its happiness."}, {"text": "Demonstrated the importance of asceticism as the only path to spiritual truth.", "isCorrect": false, "rationale": "While the wandering monk suggested a path, Siddhartha later found extreme asceticism to be as unhelpful as indulgence, leading to the Middle Way."}, {"text": "Revealed the universal and inescapable nature of suffering and hinted at a path beyond it.", "isCorrect": true, "rationale": "The text states: 'The first three sights showed Siddhartha that suffering was universal and inescapable. The fourth suggested that a path through suffering might exist.'"}, {"text": "Inspired him to become a king who would eliminate all suffering from his kingdom.", "isCorrect": false, "rationale": "The sights led him to leave his royal life to seek a spiritual solution to suffering, not to rule a kingdom."}]}, {"question": "Siddhartha Gautama's conclusion about the 'Middle Way' was a direct result of:", "options": [{"text": "The prophecy at his birth that he would become a spiritual teacher.", "isCorrect": false, "rationale": "The prophecy foretold his potential paths, but the Middle Way was a personal insight derived from experience, not the prophecy itself."}, {"text": "His realization that extreme asceticism did not lead to liberation.", "isCorrect": true, "rationale": "The text explains: 'For six years Siddhartha tried the most demanding spiritual disciplines... He nearly died. And yet liberation did not come. He concluded that starving the body was no better than indulging it; the truth he sought lay somewhere between the two extremes.'"}, {"text": "His father's insistence on a life of luxury within the palace.", "isCorrect": false, "rationale": "His early life of indulgence was one extreme, but the Middle Way was an insight gained after abandoning that life and then also abandoning extreme asceticism."}, {"text": "The teachings he received from the wandering monk he encountered.", "isCorrect": false, "rationale": "The wandering monk suggested a path, but Siddhartha's own rigorous practice and subsequent realization of the ineffectiveness of extremes led to the Middle Way, not direct instruction from the monk."}]}, {"question": "Which of the following describes the key event that led Siddhartha Gautama to be known as 'The Buddha'?", "options": [{"text": "He delivered his first sermon to five former companions at Deer Park.", "isCorrect": false, "rationale": "His first sermon occurred *after* he became the Buddha; it was the 'turning of the wheel of Dhamma,' not the event of his awakening."}, {"text": "He renounced his princely life and became a wandering seeker.", "isCorrect": false, "rationale": "This was the start of his spiritual journey, but he only became 'The Buddha' after attaining enlightenment."}, {"text": "He attained 'bodhi'—awakening—under a fig tree in Bodh Gaya.", "isCorrect": true, "rationale": "The text states: 'After a night of deep meditation, he attained bodhi: awakening... From that moment he was the Buddha, the Awakened One.'"}, {"text": "He established the Sangha, a community of practitioners.", "isCorrect": false, "rationale": "The Sangha gathered around him after he became the Buddha and began teaching."}]}, {"question": "If a Buddhist practitioner achieves 'nirvana,' what has they primarily accomplished according to the text?", "options": [{"text": "They have completed their cycle of rebirths and achieved ultimate liberation from suffering.", "isCorrect": true, "rationale": "The keyterm defines 'nirvana' as 'The state of liberation from suffering and the cycle of rebirth; the ultimate goal of Buddhist practice.'"}, {"text": "They have become a respected member of the Sangha, guiding others in their practice.", "isCorrect": false, "rationale": "Being a respected member of the Sangha is a role, not the ultimate goal of nirvana itself."}, {"text": "They have gained vast worldly knowledge and material possessions.", "isCorrect": false, "rationale": "Nirvana is about extinguishing craving, hatred, and delusion, moving away from worldly attachments, not accumulating them."}, {"text": "They have successfully taught the Dhamma to a wide audience across India.", "isCorrect": false, "rationale": "Teaching the Dhamma is a characteristic of the Buddha and his disciples, but nirvana is an internal state of liberation, not primarily an external act of teaching."}]}, {"question": "What is signified by the 'turning of the wheel of Dhamma' mentioned in the text?", "options": [{"text": "The Buddha's attainment of enlightenment under the Bodhi tree.", "isCorrect": false, "rationale": "The attainment of enlightenment is 'bodhi,' which happened before the turning of the wheel of Dhamma."}, {"text": "The historical event where Emperor Ashoka sent missionaries across Asia.", "isCorrect": false, "rationale": "Emperor Ashoka's actions occurred centuries after the Buddha and were part of the spread of Dhamma, not its initial 'turning.'"}, {"text": "The Buddha's first sermon, initiating the sharing of his teachings.", "isCorrect": true, "rationale": "The text states: 'His first sermon, delivered to five former companions at the Deer Park near Sarnath, set in motion what Buddhists call the turning of the wheel of “Dhamma.”'"}, {"text": "The practice of deep meditation to achieve awakening.", "isCorrect": false, "rationale": "Deep meditation is a method used to achieve awakening (bodhi), but not the 'turning of the wheel of Dhamma' itself, which refers to the public teaching."}]}, {"question": "The mention of Emperor Ashoka's role in spreading Buddhism primarily highlights:", "options": [{"text": "The immediate and widespread acceptance of the Buddha's teachings during his lifetime.", "isCorrect": false, "rationale": "Ashoka lived centuries after the Buddha's death, indicating that the widespread dissemination of Buddhism was a later development, not immediate."}, {"text": "The strategic political alliances formed by Buddhist leaders with powerful rulers.", "isCorrect": false, "rationale": "While Ashoka was a powerful ruler, the text focuses on his mission to spread the teaching, not on alliances formed by Buddhist leaders."}, {"text": "The significant expansion of Buddhism beyond India centuries after the Buddha's death.", "isCorrect": true, "rationale": "The text explicitly states that 'centuries later, by the great emperor Ashoka... who sent Buddhist missionaries as far as Sri Lanka, Central Asia, and possibly the Mediterranean world,' demonstrating expansion beyond India and time after the Buddha."}, {"text": "The detailed historical records kept by ancient Indian empires regarding religious figures.", "isCorrect": false, "rationale": "While Ashoka's reign is historically documented, the text's focus here is on the impact of his actions on Buddhism's spread, not the nature of historical record-keeping."}]}, {"question": "According to the text, which statement best defines the 'Sangha'?", "options": [{"text": "The ultimate state of liberation from suffering and the cycle of rebirth.", "isCorrect": false, "rationale": "This definition refers to 'nirvana,' not the 'Sangha.'"}, {"text": "The community of Buddhist practitioners, including monks, nuns, and laypeople.", "isCorrect": true, "rationale": "The keyterm defines 'Sangha' as 'The community of Buddhist practitioners—monks, nuns, and laypeople.'"}, {"text": "The state of clear seeing or enlightenment attained by Siddhartha.", "isCorrect": false, "rationale": "This definition refers to 'bodhi,' not the 'Sangha.'"}, {"text": "The teachings or doctrine delivered by the Buddha in his first sermon.", "isCorrect": false, "rationale": "This definition refers to the 'Dhamma,' not the 'Sangha.'"}]}, {"question": "While both 'Bodhi' and 'Nirvana' are central to Buddhism, the text suggests 'Bodhi' is more specifically:", "options": [{"text": "The final cessation of all suffering and rebirth, a permanent state.", "isCorrect": false, "rationale": "This describes 'nirvana,' the ultimate goal. 'Bodhi' is the awakening that leads to the understanding of the path to nirvana."}, {"text": "The initial awakening or enlightenment, a state of clear seeing to be cultivated.", "isCorrect": true, "rationale": "The keyterm for 'Bodhi' states it is 'awakening or enlightenment. The state of clear seeing that Siddhartha attained under the Bodhi tree, and that Buddhist practice aims to cultivate in every practitioner.'"}, {"text": "The historical location where the Buddha delivered his first sermon.", "isCorrect": false, "rationale": "The location for the first sermon was Deer Park near Sarnath, not 'Bodhi' itself."}, {"text": "The community of monks, nuns, and laypeople dedicated to Buddhist practice.", "isCorrect": false, "rationale": "This describes the 'Sangha,' not 'Bodhi.'"}]}, {"question": "The continued reverence for the Bodhi tree at Bodh Gaya, even being a UNESCO World Heritage site, primarily reflects:", "options": [{"text": "The historical importance of trees in ancient Indian agricultural practices.", "isCorrect": false, "rationale": "While trees are important in many ways, the text specifically attributes the reverence to the fact that the Buddha attained enlightenment under it, not its agricultural significance."}, {"text": "The enduring spiritual significance of the location where the Buddha attained enlightenment.", "isCorrect": true, "rationale": "The 'Did You Know' section states: 'The Bodhi tree under which the Buddha attained enlightenment is considered so sacred that a descendant of the original tree still grows at Bodh Gaya, India. Pilgrims travel from around the world to sit beneath it, meditate, and touch its roots. The site is now a UNESCO World Heritage location,' directly linking its reverence to the Buddha's enlightenment."}, {"text": "The strategic political power held by ancient Buddhist kingdoms in South Asia.", "isCorrect": false, "rationale": "The text focuses on the spiritual significance for pilgrims and the UNESCO designation, not political power."}, {"text": "The emphasis in Buddhism on material possessions and grand architectural achievements.", "isCorrect": false, "rationale": "Buddhism generally emphasizes detachment from material possessions, and the site's reverence is spiritual, not about material grandeur."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
