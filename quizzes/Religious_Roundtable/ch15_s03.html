    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the foundational act of becoming Buddhist?", "options": [{"text": "Reciting the Vinaya daily.", "isCorrect": false, "rationale": "The Vinaya is the code of monastic discipline, primarily for monks and nuns, not the foundational act for all Buddhists."}, {"text": "Taking refuge in the Buddha, the Dharma, and the Sangha.", "isCorrect": true, "rationale": "The text explicitly states: 'When a Buddhist takes refuge -- the foundational act of becoming Buddhist -- they take refuge in three things: the Buddha, the Dharma, and the Sangha.'"}, {"text": "Joining a monastic community.", "isCorrect": false, "rationale": "While significant, joining a monastic community is a specific path, not the universal foundational act for all Buddhists, which is taking refuge."}, {"text": "Attaining enlightenment for oneself.", "isCorrect": false, "rationale": "Attaining enlightenment is the ultimate goal of Buddhist practice, not the foundational act of becoming a Buddhist."}]}, {"question": "How do the Theravada and Mahayana traditions primarily differ in their understanding of the Sangha?", "options": [{"text": "Theravada views the Sangha as solely for monks, while Mahayana restricts it to bodhisattvas.", "isCorrect": false, "rationale": "Mahayana expands the Sangha beyond just bodhisattvas to all practitioners, not restricts it."}, {"text": "Theravada limits the Sangha to the monastic community, whereas Mahayana includes all Buddhist practitioners.", "isCorrect": true, "rationale": "The text states: 'In Theravada tradition, typically refers to the monastic community; in Mahayana, extends to all practitioners.'"}, {"text": "Mahayana emphasizes strict adherence to the Vinaya, while Theravada focuses on lay support.", "isCorrect": false, "rationale": "The Vinaya is a monastic code followed in both traditions (though emphasis may vary), and both traditions have lay support. The core difference is the scope of 'Sangha'."}, {"text": "Theravada prioritizes individual liberation, making the Sangha less significant than in Mahayana.", "isCorrect": false, "rationale": "While there are differences in emphasis on individual versus collective liberation, both traditions consider the Sangha one of the Three Jewels and fundamental."}]}, {"question": "A newly ordained *bhikkhu* is struggling with the transition to monastic life, particularly regarding daily routines and interactions within the communal setting. Which aspect of Buddhist practice would provide the most direct guidance for his conduct and harmonious living in the monastery?", "options": [{"text": "The Bodhisattva vow.", "isCorrect": false, "rationale": "The Bodhisattva vow is a Mahayana ideal focused on attaining enlightenment for the benefit of all beings, which guides intention rather than specific daily conduct within a monastery."}, {"text": "The Three Jewels.", "isCorrect": false, "rationale": "Taking refuge in the Three Jewels is foundational to being a Buddhist, but it doesn't provide the detailed code for daily monastic life."}, {"text": "The Vinaya.", "isCorrect": true, "rationale": "The text defines the Vinaya as 'The code of monastic discipline for Buddhist monks and nuns, governing every aspect of communal life in the monastery,' making it the direct guide for a bhikkhu's conduct."}, {"text": "The teachings of *anatta*.", "isCorrect": false, "rationale": "*Anatta* (non-self) is a core philosophical teaching that monastic life helps realize, but it is not a direct code of conduct for daily routines."}]}, {"question": "The bodhisattva ideal fundamentally reshapes the concept of liberation in Mahayana Buddhism by emphasizing what?", "options": [{"text": "The importance of solitary meditation practices for achieving enlightenment.", "isCorrect": false, "rationale": "The bodhisattva ideal is inherently communal, contrasting with solitary enlightenment, as it involves benefiting all beings."}, {"text": "That personal enlightenment is incomplete without striving for the liberation of all sentient beings.", "isCorrect": true, "rationale": "The text states the bodhisattva has 'vowed to attain enlightenment not just for themselves but for the benefit of all sentient beings,' concluding 'you cannot be truly free while others suffer.'"}, {"text": "Strict adherence to monastic rules as the sole path to awakening.", "isCorrect": false, "rationale": "While monastic discipline is valued, the bodhisattva ideal's primary emphasis is on compassion and collective liberation, not solely on monastic rules."}, {"text": "The ultimate goal of achieving Nirvana as quickly as possible.", "isCorrect": false, "rationale": "The bodhisattva ideal often involves delaying personal Nirvana out of compassion to help others, rather than achieving it quickly."}]}, {"question": "The text states the 'very decision to teach rather than remain in solitary awakening was the founding act of Buddhist community.' What does this imply about the inherent nature of Buddhist enlightenment?", "options": [{"text": "True enlightenment is only achievable within a monastic setting.", "isCorrect": false, "rationale": "The Buddha achieved enlightenment solitarily; the implication is about the *consequence* of enlightenment, not its setting."}, {"text": "Enlightenment inherently leads to a compassionate desire to share wisdom with others.", "isCorrect": true, "rationale": "The Buddha's decision to teach, spurred by Brahma, suggests that profound awakening naturally extends into an outward-facing act of compassion and sharing, forming the basis of community."}, {"text": "Solitary awakening is impossible for most practitioners.", "isCorrect": false, "rationale": "The text notes the Buddha *did* achieve solitary awakening; the point is his subsequent decision to teach."}, {"text": "The path to enlightenment requires external validation from a community.", "isCorrect": false, "rationale": "The Buddha's own enlightenment did not require external validation; his decision to teach *created* the community, not the other way around for his awakening."}]}, {"question": "What is the primary purpose of the 'carefully designed environment' of a Buddhist monastery, as described in the text?", "options": [{"text": "To facilitate administrative tasks and record-keeping for the Sangha.", "isCorrect": false, "rationale": "While administrative tasks may occur, the text explicitly states the purpose is for 'awakening' and reducing ego, not primarily administration."}, {"text": "To provide a secure place for storing Buddhist scriptures and artifacts.", "isCorrect": false, "rationale": "This is not mentioned as the primary purpose of the monastery's design for awakening."}, {"text": "To create conditions that reduce ego and distraction while fostering clarity and compassion towards awakening.", "isCorrect": true, "rationale": "The text states the monastery is 'a carefully designed environment for awakening' where 'routines, the relationships, the rules -- all are arranged to reduce the conditions that foster ego and distraction and increase the conditions that foster clarity and compassion.'"}, {"text": "To separate monks and nuns from lay practitioners to prevent distractions.", "isCorrect": false, "rationale": "While separation from ordinary life is a feature, the core purpose is the internal spiritual development of the monastics, not merely preventing external distractions from laypeople."}]}, {"question": "How does living in a monastic community, with its inevitable friction, compromise, and interdependence, specifically help a practitioner realize the Buddhist teaching of *anatta* (non-self)?", "options": [{"text": "It removes all sources of friction, allowing for undisturbed self-reflection.", "isCorrect": false, "rationale": "The text explicitly states 'inevitable friction, compromise, and interdependence,' indicating friction is part of the experience, not removed."}, {"text": "It reinforces individual identity by requiring distinct roles within the community.", "isCorrect": false, "rationale": "The purpose of the communal structure is to reduce ego and the 'fiction of a fixed, permanent self,' not reinforce individual identity."}, {"text": "It challenges the 'fiction of a fixed, permanent self' by constantly exposing one to others who know them intimately and through a life structure designed for letting go.", "isCorrect": true, "rationale": "The text directly states: 'You cannot easily maintain the fiction of a fixed, permanent self when you live in community with people who know you every day, and when the entire structure of your life is organized around letting go.'"}, {"text": "It provides a shared set of beliefs that strengthens one's sense of self within the group.", "isCorrect": false, "rationale": "Strengthening a sense of self, even within a group, contradicts the teaching of *anatta* (non-self)."}]}, {"question": "The text concludes by stating, 'The Sangha is not the background to the spiritual life; it is the medium in which the spiritual life happens.' What is the most accurate interpretation of this statement?", "options": [{"text": "The Sangha merely provides a supportive environment for individual spiritual growth.", "isCorrect": false, "rationale": "'Not the background' suggests it's more than just a supportive environment; it's an intrinsic part."}, {"text": "Spiritual practice can only occur effectively when integrated within the communal context of the Sangha.", "isCorrect": true, "rationale": "'The medium in which the spiritual life happens' implies the Sangha is an essential, pervasive, and constitutive element of spiritual practice, not merely a backdrop or support system."}, {"text": "The Sangha is more important than the Buddha or the Dharma for spiritual development.", "isCorrect": false, "rationale": "The text emphasizes the inseparability of the Three Jewels, not the supremacy of one over the others."}, {"text": "The Sangha represents the final stage of spiritual awakening.", "isCorrect": false, "rationale": "The Sangha is presented as a continuous 'medium' for the ongoing spiritual life, not a final stage."}]}, {"question": "In the Dhammapada passage 'The Elephant,' the comparison of a monk enduring abuse and insult without reacting to a great elephant enduring the arrows of battle primarily illustrates which quality?", "options": [{"text": "The importance of physical strength and dominance over others.", "isCorrect": false, "rationale": "The text clarifies that the elephant's power comes from 'not need[ing] to prove its power,' focusing on internal strength, not dominance."}, {"text": "Passive acceptance of all suffering and injustice without resistance.", "isCorrect": false, "rationale": "The text explicitly states this is 'not passive endurance; it is the strength that comes from freedom,' indicating an active, internally empowered response."}, {"text": "The disciplined self-mastery and inner freedom that allow one to remain unperturbed by external provocations.", "isCorrect": true, "rationale": "The passage highlights 'disciplined self-mastery in community' and the strength from 'freedom' (of mind) to endure abuse without reaction, akin to a 'tamed' self."}, {"text": "The need to retreat from society to avoid conflict and maintain inner peace.", "isCorrect": false, "rationale": "The context is enduring abuse 'in community,' implying engagement with difficult situations while maintaining inner peace, rather than retreating from them."}]}, {"question": "Which statement best encapsulates the text's central argument regarding the Sangha's importance in Buddhist practice?", "options": [{"text": "The Sangha provides optional social support, enhancing an otherwise solitary spiritual journey.", "isCorrect": false, "rationale": "The text strongly refutes this, stating the community is 'not a bonus feature' and is 'one of the three most essential things' and 'the medium in which the spiritual life happens.'"}, {"text": "The Sangha is a secondary component, primarily serving to preserve the Vinaya.", "isCorrect": false, "rationale": "The Sangha is presented as a foundational Jewel, inseparable from the Buddha and Dharma, and its purpose extends far beyond just preserving the Vinaya."}, {"text": "The Sangha is an indispensable, foundational element of Buddhist life, integral to realizing core teachings and fostering collective liberation.", "isCorrect": true, "rationale": "This statement synthesizes multiple key points: the Sangha as one of the Three Jewels, its inseparability, its role in enabling the realization of teachings like *anatta* through communal living, and its connection to the Mahayana ideal of collective liberation."}, {"text": "The Sangha's main role is to provide financial and material support for enlightened teachers.", "isCorrect": false, "rationale": "While lay practitioners support monasteries, this is a functional aspect, not the 'central argument' or primary importance of the Sangha as a spiritual community for awakening."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
