<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary characteristic of 'thinking religiously'?", "options": [{"text": "Adopting a specific faith tradition as one's own.", "isCorrect": false, "rationale": "The text explicitly states that 'thinking religiously' does not mean 'adopting someone else's faith' or 'being devout'."}, {"text": "Grappling with fundamental life questions with genuine curiosity, acknowledging difficulty and uncertainty.", "isCorrect": true, "rationale": "The text defines thinking religiously as 'taking the big questions seriously, approaching them with genuine curiosity, and being willing to sit with difficulty and uncertainty instead of reaching for easy answers'."}, {"text": "Prioritizing scientific and empirical methods to answer life's big questions.", "isCorrect": false, "rationale": "The text notes that these questions 'do not yield to calculation or laboratory experiment,' suggesting they require a different approach than purely empirical methods."}, {"text": "Denying the existence of any divine or ultimate being.", "isCorrect": false, "rationale": "Thinking religiously is about the nature of the questions, not about belief or disbelief in a divine being. The text states it applies 'even if you are not religious'."}], "id": "q01"}, {"question": "A student diligently researches different philosophical views on the meaning of suffering, reading various texts and reflecting deeply, even if they don't arrive at a definitive personal belief. Based on the provided text, this student is exemplifying:", "options": [{"text": "Religious devotion.", "isCorrect": false, "rationale": "The text clarifies that 'thinking religiously' does not mean 'being devout'."}, {"text": "Pretending to believe things they do not.", "isCorrect": false, "rationale": "The text explicitly states that 'thinking religiously' does not mean 'pretending to believe things you do not believe'."}, {"text": "Thinking religiously.", "isCorrect": true, "rationale": "This scenario aligns perfectly with 'taking the big questions seriously, approaching them with genuine curiosity, and being willing to sit with difficulty and uncertainty instead of reaching for easy answers,' which is the text's definition of thinking religiously."}, {"text": "Attempting to convert to a new faith.", "isCorrect": false, "rationale": "There is no indication the student is attempting conversion; instead, they are exploring questions, which is distinct from adopting a faith."}], "id": "q02"}, {"question": "The text highlights Immanuel Kant, Albert Camus, and Karl Marx to illustrate which key idea?", "options": [{"text": "That all great thinkers eventually convert to a specific religious faith.", "isCorrect": false, "rationale": "The text explicitly states that 'the questions religion asks have a kind of gravity...that pulls serious thinkers toward them regardless of their own beliefs'."}, {"text": "That philosophical and political theories are fundamentally superior to religious thought.", "isCorrect": false, "rationale": "The text shows how their work grappled with questions that are religious in structure, suggesting an overlap or shared gravity, not superiority."}, {"text": "That the big questions religion raises have a universal gravity that attracts serious thinkers, regardless of their personal beliefs or academic discipline.", "isCorrect": true, "rationale": "The examples demonstrate how diverse thinkers, including a philosopher, playwright, and political theorist, engaged with questions structurally akin to religious ones, underscoring the universal 'gravity' of these inquiries."}, {"text": "That religion is primarily an 'opiate of the masses,' as Marx suggested.", "isCorrect": false, "rationale": "While Marx's quote is mentioned, it's used to show the *religious structure* of his theory, not to endorse his view of religion itself as the primary message of the examples."}], "id": "q03"}, {"question": "What is the primary role of the student in studying religion, as described in this book?", "options": [{"text": "To determine which religious tradition offers the single correct answer to life's questions.", "isCorrect": false, "rationale": "The text explicitly states: 'Your job is not to decide which tradition is correct'."}, {"text": "To understand different traditions' perspectives, their compelling aspects, and implications for living.", "isCorrect": true, "rationale": "The text states: 'Your job is to understand what each tradition is saying, why it might be compelling, and what it implies about how to live'."}, {"text": "To adopt a new religious faith that aligns with their personal values.", "isCorrect": false, "rationale": "The text says 'it does not mean...adopting someone else's faith'."}, {"text": "To refute the claims of religious traditions using scientific evidence.", "isCorrect": false, "rationale": "The text notes that religious questions 'do not yield to calculation or laboratory experiment,' suggesting scientific refutation is not the primary approach."}], "id": "q04"}, {"question": "Which of the following best describes the concept of 'immanence' as defined in the text?", "options": [{"text": "The belief that God or the ultimate reality is entirely separate from and beyond the physical world.", "isCorrect": false, "rationale": "This description aligns with transcendence, which the text identifies as the opposite of immanence."}, {"text": "The idea that the divine or sacred is present and accessible within the world and human experience.", "isCorrect": true, "rationale": "The text defines immanence as 'The presence of the divine or ultimate within the world and within human experience,' emphasizing its closeness and accessibility."}, {"text": "The historical process by which religious traditions evolve over time.", "isCorrect": false, "rationale": "This concept is unrelated to the definition of immanence provided in the text."}, {"text": "The act of dedicating one's life to devout religious practice.", "isCorrect": false, "rationale": "This describes devotion or asceticism, not the theological concept of immanence."}], "id": "q05"}, {"question": "A religious tradition that emphasizes that 'God is in every rustling leaf and every human heart' would primarily be illustrating which concept?", "options": [{"text": "The secular.", "isCorrect": false, "rationale": "The secular refers to the ordinary world without special religious significance, which is contrary to the divine presence described."}, {"text": "The sacred.", "isCorrect": false, "rationale": "While 'God' is sacred, the phrasing 'in every rustling leaf and every human heart' specifically highlights the divine's *presence within* the world, which is the core of immanence."}, {"text": "Transcendence.", "isCorrect": false, "rationale": "Transcendence refers to the divine being utterly beyond the world, which is the opposite of being present 'in every rustling leaf and every human heart'."}, {"text": "Immanence.", "isCorrect": true, "rationale": "The text states that a tradition emphasizes immanence 'when it teaches that God — or the sacred, or the ultimate — is close, accessible, present in nature, in the human heart, or in everyday life.' This example perfectly matches that description."}], "id": "q06"}, {"question": "What defines something as 'sacred' according to the text?", "options": [{"text": "Its utility in everyday life and ordinary routines.", "isCorrect": false, "rationale": "The text contrasts the sacred with the secular, defining the secular as that which belongs to the ordinary world of everyday life."}, {"text": "Its ability to be proven true through scientific experimentation.", "isCorrect": false, "rationale": "The text implies that religious questions, which touch upon the sacred, 'do not yield to calculation or laboratory experiment'."}, {"text": "Its being set apart from the ordinary and treated with special reverence and awe.", "isCorrect": true, "rationale": "The text defines sacred as 'Set apart from the ordinary; treated with special reverence and awe. The sacred is whatever a tradition regards as holy, ultimate, or deserving of a response beyond normal everyday behavior'."}, {"text": "Its historical age and longevity within a culture.", "isCorrect": false, "rationale": "While age can contribute to reverence, the definition itself focuses on being 'set apart' and 'treated with special reverence and awe,' not merely its age."}], "id": "q07"}, {"question": "A community treats an ancient forest as a 'sacred grove,' believing it to be a place where divine spirits dwell and performing rituals there. In contrast, the nearby town regards another forest simply as a source of lumber. The town's view of the second forest represents:", "options": [{"text": "Immanence.", "isCorrect": false, "rationale": "Immanence relates to the presence of the divine within the world, not simply viewing something as ordinary."}, {"text": "Transcendence.", "isCorrect": false, "rationale": "Transcendence refers to the divine being beyond the world, which is not what the town's view represents."}, {"text": "The secular.", "isCorrect": true, "rationale": "The text defines the secular as 'that which belongs to the ordinary world of everyday life, without special religious significance.' The town's view of the forest solely as a source of lumber fits this definition."}, {"text": "The absurd.", "isCorrect": false, "rationale": "The absurd is a philosophical concept introduced by Camus, describing the conflict between human meaning-seeking and a meaningless universe; it's unrelated to the classification of an ordinary object."}], "id": "q08"}, {"question": "The text states that questions raised by religion 'do not yield to calculation or laboratory experiment.' This implies that these questions are characterized by:", "options": [{"text": "Their irrelevance to modern scientific inquiry.", "isCorrect": false, "rationale": "While not solvable by science, the text emphasizes their 'gravity' and importance to 'every great mind,' suggesting they are not irrelevant."}, {"text": "Their inherent ambiguity and resistance to purely empirical methods of resolution.", "isCorrect": true, "rationale": "The phrase directly means they cannot be definitively answered through scientific or mathematical means, highlighting their qualitative, interpretive nature and the difficulty in finding 'easy answers'."}, {"text": "Their exclusive concern with historical events rather than present-day issues.", "isCorrect": false, "rationale": "The questions like 'What should I do?' or 'What may I hope for?' are timeless and pertain to present-day existence, not just history."}, {"text": "Their universal acceptance among all cultures and individuals.", "isCorrect": false, "rationale": "The text says these questions 'pull serious thinkers toward them,' implying their significance, but not necessarily universal *acceptance* of specific answers or even the questions themselves by everyone."}], "id": "q09"}, {"question": "Considering the introduction to 'Thinking Religiously,' what is the overarching invitation extended to the reader of this textbook?", "options": [{"text": "To identify and embrace a personal religious doctrine that provides definitive answers.", "isCorrect": false, "rationale": "The text explicitly states, 'Your job is not to decide which tradition is correct' and 'it does not mean being devout, adopting someone else's faith'."}, {"text": "To engage deeply with fundamental questions of existence and meaning, even if unsettling, through the lens of diverse religious traditions.", "isCorrect": true, "rationale": "The invitation is to 'think religiously' by 'taking the big questions seriously' and 'being willing to sit with difficulty and uncertainty,' and then to 'encounter traditions that answer these questions in very different ways,' understanding their meaning and implications for life."}, {"text": "To critically evaluate and ultimately reject religious frameworks in favor of secular philosophical systems.", "isCorrect": false, "rationale": "The purpose is to understand and engage with religious traditions, not to reject them in favor of secular alternatives. The text shows how even secular thinkers grapple with religious questions."}, {"text": "To convert others to a particular worldview based on a newfound understanding of religious truths.", "isCorrect": false, "rationale": "The focus is on the student's personal understanding and engagement with the material, not on evangelism or persuasion of others."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
