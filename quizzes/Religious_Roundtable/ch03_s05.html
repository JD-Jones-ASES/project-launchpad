<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text challenges a common assumption about Islam's geographical concentration. What is this challenged assumption?", "options": [{"text": "Islam is primarily practiced by Arabs.", "isCorrect": false, "rationale": "While many Arabs are Muslim, the text's primary point is about the broader global distribution beyond any single ethnic group or region."}, {"text": "The majority of Muslims live in the Middle East.", "isCorrect": true, "rationale": "The text explicitly states: 'It is not primarily a Middle Eastern religion: the countries with the largest Muslim populations are Indonesia, Pakistan, Bangladesh, and India,' directly challenging this assumption."}, {"text": "Islam is predominantly a religion of African nations.", "isCorrect": false, "rationale": "The text does not state or imply this; it highlights Asian countries as having the largest Muslim populations."}, {"text": "Muslims primarily speak Arabic in their daily lives.", "isCorrect": false, "rationale": "The text clarifies that 'Arabic remains the language of prayer and scripture,' but Muslims 'practice their faith in hundreds of languages,' indicating varied daily languages."}]}, {"question": "The text suggests Islamic scholarship was vital for the European Renaissance. Which of the following best explains why?", "options": [{"text": "Islamic scholars directly initiated the European Reformation.", "isCorrect": false, "rationale": "The Reformation was a distinct European movement in a later period (16th century), not directly initiated by Islamic scholars, though intellectual cross-pollination occurred over centuries."}, {"text": "They preserved and advanced ancient knowledge that Europe later rediscovered.", "isCorrect": true, "rationale": "The text explicitly states that scholars 'translating, preserving, and extending the philosophy of Aristotle, the mathematics of Greece and India, and the medicine of Galen' were crucial, implying Europe's later 'rediscovery' during the Renaissance."}, {"text": "Islamic universities exclusively trained all Renaissance European scientists.", "isCorrect": false, "rationale": "This is an overstatement; while Islamic centers of learning were influential, the text doesn't claim they exclusively trained all European scientists."}, {"text": "They invented entirely new scientific fields unknown to the ancient world.", "isCorrect": false, "rationale": "While Islamic scholars made original contributions, the text emphasizes their role in 'preserving, and extending' existing ancient knowledge as key to the Renaissance connection."}]}, {"question": "A student is researching the etymology and development of mathematical terms. Based on the text, which term's origin would likely lead them to an Islamic scholar?", "options": [{"text": "Geometry", "isCorrect": false, "rationale": "Geometry has ancient Greek origins, though it was advanced by Islamic scholars."}, {"text": "Calculus", "isCorrect": false, "rationale": "Calculus was developed centuries later by European mathematicians like Newton and Leibniz."}, {"text": "Algebra", "isCorrect": true, "rationale": "The text states, 'The very word algebra comes from the Arabic al-jabr, from a treatise by the 9th-century mathematician al-Khwarizmi.'"}, {"text": "Trigonometry", "isCorrect": false, "rationale": "While Islamic scholars made significant contributions to trigonometry, the text specifically highlights 'algebra' and 'Hindu-Arabic numerals' for their linguistic and numerical origins coming through Islamic scholarship."}]}, {"question": "What specific aspect of the Alhambra is highlighted in the text as a prime example of Islamic cultural achievement?", "options": [{"text": "Its innovative use of concrete for structural integrity.", "isCorrect": false, "rationale": "While important architecturally, the text does not mention concrete; it focuses on aesthetic and artistic details."}, {"text": "Its grand scale and defensive fortifications.", "isCorrect": false, "rationale": "Although the Alhambra is a fortress, the text emphasizes its artistic beauty rather than its defensive capabilities."}, {"text": "Its intricate geometric tilework and calligraphic poetry.", "isCorrect": true, "rationale": "The text describes the Alhambra 'with its intricate geometric tilework and calligraphic poetry on its walls,' as an example of 'beauty in service of the sacred.'"}, {"text": "Its function as a primary center for theological debate.", "isCorrect": false, "rationale": "The text describes the Alhambra as a monument to beauty and the sacred, not primarily as a center for theological debate."}]}, {"question": "When discussing 'challenges that cannot be ignored' within contemporary Islam, such as questions of violence or treatment of women, the text emphasizes the need for 'context.' What is the main reason provided for this emphasis?", "options": [{"text": "To downplay the severity of these issues.", "isCorrect": false, "rationale": "The text explicitly states these are 'real and serious questions' that 'deserve honest engagement, not dismissal,' refuting the idea of downplaying them."}, {"text": "To understand that every major religious tradition has both positive and negative aspects.", "isCorrect": true, "rationale": "The text explains, 'every major religious tradition has produced both its worst and its best. Islam is no exception,' providing examples like the Inquisition for Christianity."}, {"text": "To avoid criticizing any religious practice.", "isCorrect": false, "rationale": "The text advocates for 'honest engagement' with problems, which implies critical analysis, not avoidance of criticism."}, {"text": "To primarily focus on historical contributions rather than current problems.", "isCorrect": false, "rationale": "The text acknowledges and addresses 'contemporary challenges' directly, indicating that the focus is not solely historical."}]}, {"question": "A historian is writing a book about global religious traditions. They decide to dedicate an entire chapter on Christianity solely to the Spanish Inquisition. Based on the perspective presented in the text, what critique might be leveled against this approach?", "options": [{"text": "It unfairly judges the entirety of Christianity by its worst practitioners.", "isCorrect": true, "rationale": "The text directly uses this example: 'it would be as unfair to judge the whole tradition by its worst practitioners as to judge Christianity by the Inquisition or Buddhism by contemporary Buddhist nationalism.'"}, {"text": "It fails to acknowledge the Inquisition's positive historical impact.", "isCorrect": false, "rationale": "The text does not discuss any positive aspects of the Inquisition; it uses it as an example of a 'worst' aspect by which a whole tradition should not be judged."}, {"text": "It ignores the unique theological differences between various Christian denominations.", "isCorrect": false, "rationale": "While potentially a valid historical critique, it is not the specific point the text makes about judging an entire tradition by its extremes."}, {"text": "It misrepresents the numerical size of the Christian faith.", "isCorrect": false, "rationale": "The numerical size of the faith is irrelevant to the specific point about judging a tradition by its worst elements."}]}, {"question": "According to the text, which of the following statements about Islam's global presence is true?", "options": [{"text": "The vast majority of Muslims live in Arabic-speaking countries.", "isCorrect": false, "rationale": "The text explicitly states Islam 'is not primarily a Middle Eastern religion' and that Muslims 'practice their faith in hundreds of languages,' contradicting this."}, {"text": "Islam is practiced primarily in the Middle East and North Africa.", "isCorrect": false, "rationale": "The text directly refutes this, listing Indonesia, Pakistan, Bangladesh, and India as countries with the largest Muslim populations."}, {"text": "Approximately one-quarter of the world's population identifies as Muslim.", "isCorrect": true, "rationale": "The text states, 'with approximately 1.8 billion adherents—about one in four human beings,' which equates to roughly one-quarter."}, {"text": "Muslims exclusively use Arabic as their daily language due to its role in scripture.", "isCorrect": false, "rationale": "The text notes that Arabic is the language of prayer and scripture, but Muslims 'practice their faith in hundreds of languages,' indicating diverse daily languages."}]}, {"question": "The period often referred to as the Islamic Golden Age, noted for its immense intellectual contributions, roughly spanned which centuries?", "options": [{"text": "1300 to 1800 CE", "isCorrect": false, "rationale": "This period is too late; the text specifies an earlier timeframe."}, {"text": "800 to 1300 CE", "isCorrect": true, "rationale": "The text states, 'The intellectual contributions of Islamic civilization between roughly 800 and 1300 —the period often called the Islamic Golden Age—were immense.'"}, {"text": "100 to 600 CE", "isCorrect": false, "rationale": "This period is too early for what the text identifies as the Islamic Golden Age."}, {"text": "1800 to the present", "isCorrect": false, "rationale": "This refers to modern and contemporary history, not the Islamic Golden Age as defined in the text."}]}, {"question": "Which statement best summarizes the core message of the 'Why It Matters' section regarding the study of Islam?", "options": [{"text": "Islam's historical contributions are far more important than its contemporary challenges.", "isCorrect": false, "rationale": "The text dedicates significant space to both historical contributions and contemporary challenges, emphasizing the importance of engaging with both, not prioritizing one over the other."}, {"text": "Understanding Islam is crucial for comprehending a significant portion of humanity's history, culture, and current global dynamics.", "isCorrect": true, "rationale": "This statement encapsulates all key themes: global demographics ('quarter of humanity'), intellectual and artistic achievements ('immense contributions,' 'breathtaking achievements'), and contemporary relevance ('challenges that cannot be ignored')."}, {"text": "The primary importance of Islam lies in its influence on European intellectual development.", "isCorrect": false, "rationale": "While significant, this is too narrow a focus, as the text also covers Islam's global presence, its own artistic heritage, and contemporary issues independent of Europe."}, {"text": "Islam's impact is largely confined to the Middle East and historical eras.", "isCorrect": false, "rationale": "The text explicitly contradicts this by highlighting Islam's global presence ('on every continent') and addressing 'contemporary world' challenges."}]}, {"question": "The text lists several countries with the largest Muslim populations. Which of the following is NOT mentioned in that list?", "options": [{"text": "Indonesia", "isCorrect": false, "rationale": "Indonesia is explicitly listed as one of the countries with the largest Muslim populations."}, {"text": "Pakistan", "isCorrect": false, "rationale": "Pakistan is explicitly listed as one of the countries with the largest Muslim populations."}, {"text": "Egypt", "isCorrect": true, "rationale": "The text lists 'Indonesia, Pakistan, Bangladesh, and India' as countries with the largest Muslim populations. Egypt is not among them."}, {"text": "India", "isCorrect": false, "rationale": "India is explicitly listed as one of the countries with the largest Muslim populations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
