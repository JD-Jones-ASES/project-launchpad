<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes Jesus's early life and cultural context according to the text?", "options": [{"text": "He was born into a Roman family and spoke Latin, preparing him for imperial leadership.", "isCorrect": false, "rationale": "The text states Jesus was a Jewish child born to Joseph and Mary, spoke Aramaic, and was educated in Jewish scriptures, not Roman with Latin."}, {"text": "He grew up as a Jewish man, educated in scriptures, and aware of the hope for a Messiah.", "isCorrect": true, "rationale": "The text explicitly states he was a 'Jewish child,' 'educated in the Jewish scriptures,' 'observed Jewish law,' and lived in a world 'saturated with the hope for a Messiah'."}, {"text": "He was an ascetic hermit who lived apart from society until his ministry began.", "isCorrect": false, "rationale": "The text identifies him as a 'carpenter's son' who 'grew up in a Jewish world,' implying an integrated life, not an ascetic one."}, {"text": "He was raised in Bethlehem as a Sadducee scholar, focused on temple rituals.", "isCorrect": false, "rationale": "The text states he was 'raised in the Galilean town of Nazareth' and observed 'Jewish law,' but does not specify him as a Sadducee or exclusively focused on temple rituals in his upbringing."}]}, {"question": "The text states Jesus's 'core message was the arrival of the Kingdom of God.' What does this phrase most likely imply about his teachings?", "options": [{"text": "That he intended to establish a new earthly kingdom through military conquest against the Roman Empire.", "isCorrect": false, "rationale": "The text describes the Kingdom of God as 'a new order of justice, mercy, and divine presence breaking into the world,' not a military or political takeover."}, {"text": "That God's divine presence and a new order of justice and mercy were breaking into the world.", "isCorrect": true, "rationale": "The text directly defines 'the Kingdom of God' as 'a new order of justice, mercy, and divine presence breaking into the world,' aligning with this option."}, {"text": "That his primary goal was to reform the existing Jewish temple practices and sacrifices.", "isCorrect": false, "rationale": "While he had controversies with religious authorities, the text identifies 'the arrival of the Kingdom of God' as his *core message*, which is a broader concept than just temple reform."}, {"text": "That he advocated for a secret society of followers who would prepare for a hidden spiritual realm.", "isCorrect": false, "rationale": "The text describes a public ministry and a message of a 'new order' breaking into the world, not a secret or hidden spiritual realm."}]}, {"question": "According to the text, what event became 'the cornerstone of everything that followed' in the early Christian movement?", "options": [{"text": "His birth in Bethlehem, fulfilling ancient prophecies.", "isCorrect": false, "rationale": "While his birth was significant, the text specifies the 'claim of bodily resurrection' as the 'cornerstone of everything that followed'."}, {"text": "The teaching of parables during his public ministry.", "isCorrect": false, "rationale": "His teachings were important, but the text identifies the resurrection as the fundamental event for the movement's subsequent development."}, {"text": "The claim of his bodily resurrection three days after his crucifixion.", "isCorrect": true, "rationale": "The text explicitly states: 'This claim of bodily resurrection became the cornerstone of everything that followed.'"}, {"text": "The descent of the Holy Spirit on Pentecost, empowering the apostles.", "isCorrect": false, "rationale": "Pentecost occurred 'About fifty days after the resurrection' and marked the 'early church was born,' implying it was a consequence of the resurrection, not the cornerstone itself."}]}, {"question": "Based on the definition provided, if a group of people today were 'apostles' in the same sense as Jesus's original twelve, what would their primary role be?", "options": [{"text": "To serve as personal bodyguards for a spiritual leader.", "isCorrect": false, "rationale": "The text defines an apostle as 'one sent out' and commissioned 'to carry his message to the worlds,' which does not involve personal protection."}, {"text": "To manage the financial affairs and properties of the religious community.", "isCorrect": false, "rationale": "The definition focuses on carrying a message, not financial management."}, {"text": "To compile and write new religious scriptures for future generations.", "isCorrect": false, "rationale": "While some apostles' writings became scripture, their primary commissioned role described is to 'carry his message,' not necessarily to author new holy books."}, {"text": "To deliver a specific message or teaching to the wider world.", "isCorrect": true, "rationale": "The text defines apostles as 'disciples personally commissioned by Jesus to carry his message to the worlds,' directly matching this option."}]}, {"question": "Paul of Tarsus is credited with giving Christianity its 'global momentum' primarily because he argued for what principle?", "options": [{"text": "The establishment of a centralized religious authority in Rome for all believers.", "isCorrect": false, "rationale": "The text does not mention Paul's specific contribution as establishing Roman authority, but rather his universalist message."}, {"text": "That faith in Jesus was accessible to all people, not just Jews.", "isCorrect": true, "rationale": "The text states, 'Paul argued that faith in Jesus was open not just to Jews but to everyone—a universalism that would give Christianity its global momentum.'"}, {"text": "The necessity of all believers adhering strictly to Jewish law and customs.", "isCorrect": false, "rationale": "Paul's universalism implied that non-Jews did not need to become Jewish to follow Jesus, which would be contrary to strict adherence to Jewish law for all."}, {"text": "The importance of secret knowledge and mystical experiences for salvation.", "isCorrect": false, "rationale": "The text does not mention Paul's focus on secret knowledge or mysticism as the source of global momentum."}]}, {"question": "How did Emperor Constantine's actions dramatically alter the status of Christianity within the Roman Empire?", "options": [{"text": "He initiated the most intense period of persecution against Christians across the empire.", "isCorrect": false, "rationale": "Constantine's Edict of Milan *ended* persecution and granted religious freedom, directly opposite to initiating persecution."}, {"text": "He issued the Edict of Milan, granting Christians religious freedom and moving the faith towards imperial status.", "isCorrect": true, "rationale": "The text explicitly states: 'The Emperor Constantine issued the Edict of Milan, officially granting Christians religious freedom throughout the empire... and Christianity moved from persecuted minority to imperial religion within a single generation.'"}, {"text": "He declared Christianity to be the sole legal religion, banning all others immediately.", "isCorrect": false, "rationale": "The Edict of Milan granted 'religious freedom,' implying tolerance for other religions, not an immediate ban."}, {"text": "He exiled all Christian leaders from the empire to distant lands.", "isCorrect": false, "rationale": "Constantine 'convened the Council of Nicaea, the first great gathering of Christian bishops,' demonstrating his support, not exile."}]}, {"question": "The Council of Nicaea in 325 CE marked a significant turning point for Christianity by:", "options": [{"text": "Declaring that Jesus was merely a human prophet, not divine, and thus separating him from God.", "isCorrect": false, "rationale": "The council explicitly declared 'that Jesus was not a lesser creation of God, but fully divine—of the “same substance as the Father.”'"}, {"text": "Convening to select the official books of the New Testament canon, finalizing the Christian scriptures.", "isCorrect": false, "rationale": "The text states the council 'hammered out official doctrine' regarding Jesus's nature, not the selection of biblical canon."}, {"text": "Establishing official doctrine regarding Jesus's divinity, transforming Christianity into a more institutionalized faith.", "isCorrect": true, "rationale": "The text states, 'There, the assembled leaders hammered out official doctrine: declaring that Jesus was... fully divine... The faith was no longer just a movement; it was becoming an institution.'"}, {"text": "Initiating the construction of the first Christian cathedrals throughout the empire to display imperial power.", "isCorrect": false, "rationale": "While construction of churches likely followed, the text highlights the doctrinal and institutional implications of the Council of Nicaea, not architecture."}]}, {"question": "The 'did you know' section clarifies that 'Christ' is not Jesus's last name but means 'anointed one.' What does this imply when early Christians called Jesus 'the Christ'?", "options": [{"text": "They were identifying him as a skilled carpenter like his earthly father, Joseph.", "isCorrect": false, "rationale": "The term 'anointed one' carries a theological meaning related to a divine commission, not a trade."}, {"text": "They were giving him a title of nobility, similar to a king or emperor, without religious significance.", "isCorrect": false, "rationale": "The text specifies it was a 'theological claim' and that he was the 'promised deliverer their scriptures had foretold,' indicating religious significance beyond mere nobility."}, {"text": "They were acknowledging his Roman citizenship and social standing within the empire.", "isCorrect": false, "rationale": "The term 'Christ' is a Greek translation of the Hebrew 'Messiah,' referring to a Jewish concept of a deliverer, not Roman citizenship."}, {"text": "They were making a theological claim that he was the promised deliverer foretold in their scriptures.", "isCorrect": true, "rationale": "The 'did you know' box directly states: 'When early Christians 'called Jesus the Christ,' they were making a theological claim: that he was the promised deliverer their scriptures had foretold.'"}]}, {"question": "The text describes Christianity transitioning 'from a movement; it was becoming an institution' after the Council of Nicaea. Which development most directly reflects this institutionalization?", "options": [{"text": "The personal conversion experiences of individual believers.", "isCorrect": false, "rationale": "Individual conversions are characteristic of a 'movement,' not necessarily the structural 'institution' that develops formal rules and hierarchies."}, {"text": "The continued use of parables in teaching by local leaders.", "isCorrect": false, "rationale": "Teaching methods like parables are part of the 'message' or 'movement,' but not a defining feature of institutional structure or formalized doctrine."}, {"text": "The establishment of official doctrine by a gathering of bishops from across the known world.", "isCorrect": true, "rationale": "The text states that the Council 'hammered out official doctrine' and involved a 'great gathering of Christian bishops,' which signifies the formalization and structural organization of an institution."}, {"text": "The widespread use of Aramaic among Christian communities.", "isCorrect": false, "rationale": "Language use is a cultural aspect, not a direct indicator of institutionalization in the sense of formalized structure or doctrine."}]}, {"question": "For nearly three centuries, Christianity 'spread through the Roman Empire despite intermittent persecution.' How does this context make Constantine's Edict of Milan particularly significant?", "options": [{"text": "It proved that Christianity could only thrive under direct state sponsorship and protection.", "isCorrect": false, "rationale": "The text explicitly states it 'spread... despite intermittent persecution,' indicating it thrived even without state sponsorship prior to Constantine."}, {"text": "It demonstrated that imperial persecution was ultimately ineffective in stopping the spread of the faith.", "isCorrect": true, "rationale": "The text highlights the contrast: the faith spread 'despite persecution,' and then 'everything changed' with the Edict, signifying that the previous attempts to suppress it had not succeeded."}, {"text": "It initiated a new era where Christianity actively persecuted other religions within the empire.", "isCorrect": false, "rationale": "The Edict granted 'religious freedom,' which implies tolerance rather than immediate persecution of others, though the faith later gained imperial dominance."}, {"text": "It ended the practice of private worship among Christians, forcing them into public ceremonies.", "isCorrect": false, "rationale": "The Edict granted religious *freedom*, allowing public practice, but does not indicate an end to private worship or forcing specific ceremonies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
