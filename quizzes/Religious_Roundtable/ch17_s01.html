    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary significance of \"La ilaha illa Allah\" in Islamic theology?", "options": [{"text": "It declares the numerical superiority of Allah over other deities.", "isCorrect": false, "rationale": "While it affirms uniqueness, the statement is not about numerical superiority over other 'deities' but about the absolute non-existence of any god other than Allah, emphasizing His categorical difference."}, {"text": "It affirms Allah's absolute oneness and unique existence, fundamentally distinct from creation.", "isCorrect": true, "rationale": "This statement is 'tawhid,' the absolute oneness and uniqueness of Allah, which means He is 'categorically different from everything in creation' and 'Being itself in a way that nothing else is.'"}, {"text": "It emphasizes Allah's role as the greatest being among a pantheon of divine entities.", "isCorrect": false, "rationale": "The text explicitly states, 'Allah is not the greatest being among beings,' contradicting the idea of a pantheon or ranking among multiple entities."}, {"text": "It establishes the foundation for moral conduct and social justice within Islam.", "isCorrect": false, "rationale": "While tawhid is the foundation for 'everything else in Islam' (which includes moral conduct), its primary and most direct theological significance is the nature of God Himself, not immediately moral principles."}], "id": "q01"}, {"question": "According to Islamic theology, why is \"shirk\" considered the gravest error?", "options": [{"text": "It represents a failure to adhere to the five pillars of Islam.", "isCorrect": false, "rationale": "Shirk is a more fundamental theological error than merely failing a ritual observance; it's a misunderstanding of God's nature itself, preceding the pillars."}, {"text": "It is a moral failing that leads to social disorder and injustice.", "isCorrect": false, "rationale": "The text states shirk is 'not merely a moral failing but a fundamental misunderstanding of reality,' indicating it's deeper than just its social or ethical consequences."}, {"text": "It fundamentally misunderstands reality by associating created things with the unique status of God.", "isCorrect": true, "rationale": "The text defines shirk as 'associating anything with God,' which is 'a fundamental misunderstanding of reality' because it 'treats something in creation as having divine status or being comparable to Allah,' violating tawhid."}, {"text": "It prioritizes personal desires over communal worship and devotion.", "isCorrect": false, "rationale": "While shirk might involve prioritizing something over God, its core definition is about attributing divine qualities to creation, not primarily about communal versus individual worship."}], "id": "q02"}, {"question": "The text describes Allah's transcendence as \"radical.\" Which statement best illustrates this concept?", "options": [{"text": "Allah exists in a spiritual realm far removed from human experience.", "isCorrect": false, "rationale": "While true that God is beyond human experience, 'radical' transcendence specifically emphasizes His unique difference and incomparability, not just distance."}, {"text": "Allah is the most powerful being in the universe, surpassing all others in might.", "isCorrect": false, "rationale": "The text explicitly states, 'Allah is not the greatest being among beings,' meaning He is not merely a more powerful version of something else, which contradicts this option."}, {"text": "Allah is uniquely and categorically different from anything in creation, beyond human comparison or imagination.", "isCorrect": true, "rationale": "Radical transcendence means 'God is not like us, not a larger or more powerful version of anything we can see or imagine,' emphasizing His unique, categorical difference from creation."}, {"text": "Allah's wisdom and knowledge are infinitely greater than any human comprehension.", "isCorrect": false, "rationale": "This is a true attribute of God but does not fully capture the 'radical' aspect of His transcendence as being fundamentally distinct from creation in His very essence."}], "id": "q03"}, {"question": "The ninety-nine Beautiful Names of Allah, such as Al-Qarib (the Near) and Al-Mujib (the Responsive), primarily serve to:", "options": [{"text": "Detail the specific commandments and prohibitions found in the Quran.", "isCorrect": false, "rationale": "The Beautiful Names describe God's attributes and character, not specific legal commandments or prohibitions."}, {"text": "Illustrate God's direct and intimate presence and responsiveness to creation.", "isCorrect": true, "rationale": "The text states these names are 'a theology in miniature' and that 'God is present to you in this way,' with names like Al-Qarib (the Near) and Al-Mujib (the Responsive) directly speaking to His immanence and engagement."}, {"text": "Emphasize God's absolute detachment and unknowability.", "isCorrect": false, "rationale": "Names like 'the Near' and 'the Responsive' directly contradict absolute detachment; they highlight God's immanence, balancing His transcendence."}, {"text": "Categorize different types of divine intervention in human history.", "isCorrect": false, "rationale": "While God intervenes, the names themselves describe His inherent attributes rather than a categorization of historical interventions."}], "id": "q04"}, {"question": "How does Islamic theology, as presented, reconcile the concepts of God's radical transcendence and His nearness (immanence)?", "options": [{"text": "It prioritizes transcendence as the ultimate truth, relegating immanence to symbolic language.", "isCorrect": false, "rationale": "The text explicitly states Islamic theology 'has always insisted, with equal force, on God's nearness,' refuting any prioritization of one over the other."}, {"text": "It views them as distinct aspects of God that are simultaneously true and held together in tension.", "isCorrect": true, "rationale": "The text describes this as a 'tension' and notes that Quranic verses like Surah 57:3 ('First and Last,' 'Outward and Inward') 'hold both extremes of the transcendence-immanence spectrum,' affirming they are held together 'in a single breath.'"}, {"text": "It suggests that God's immanence is only accessible through mystical experiences, not intellectual understanding.", "isCorrect": false, "rationale": "While Sufis emphasize mystical experience, the existence of the Beautiful Names and Quranic verses indicates that immanence is also part of general theological understanding, not solely mystical access."}, {"text": "It resolves the tension by positing that God is transcendent in essence but immanent through His prophets and messengers.", "isCorrect": false, "rationale": "The text does not mention prophets or messengers as the mechanism for resolving this tension; instead, it focuses on God's own attributes and presence as described in the Quran and Beautiful Names."}], "id": "q05"}, {"question": "What distinguishes the Sufi approach to God's immanence from a purely intellectual understanding?", "options": [{"text": "Sufis believe God is exclusively immanent, rejecting the concept of transcendence.", "isCorrect": false, "rationale": "Sufis operate within the broader Islamic tradition, which affirms both transcendence and immanence, and are careful to maintain God's distinctness from creation ('the creature remains the creature')."}, {"text": "Sufis focus on ritualistic adherence to the five pillars as the sole path to divine proximity.", "isCorrect": false, "rationale": "While Sufis observe pillars, their distinct focus is on 'spiritual disciplines aimed at qurb, nearness to God,' which goes beyond mere ritual adherence to seek experiential awareness."}, {"text": "Sufis seek direct, experiential awareness of divine presence through spiritual disciplines aimed at nearness (qurb).", "isCorrect": true, "rationale": "The text states Sufis are 'practitioners of spiritual disciplines aimed at qurb, nearness to God, direct experiential awareness of the divine presence,' and that 'tawhid is not a doctrine to be recited but a reality to be experienced.'"}, {"text": "Sufis interpret the Quran metaphorically, seeing God's presence only in nature, not in revelation.", "isCorrect": false, "rationale": "The text does not suggest Sufis reject revelation or limit God's presence to nature; they seek direct encounter with God who is 'truly everywhere,' including through revelation."}], "id": "q06"}, {"question": "The Sufi tradition emphasizes \"proximity, intimacy\" with God but carefully distinguishes this from \"ittihad.\" What does this distinction signify?", "options": [{"text": "Sufis believe that true union (ittihad) is only possible after death.", "isCorrect": false, "rationale": "The text doesn't mention ittihad in the context of an afterlife. It specifically defines ittihad as 'union in the sense of identity,' which is rejected in this life and implies the soul becoming God, which Sufis deny."}, {"text": "Sufi proximity implies the soul merges with God, losing its individual identity.", "isCorrect": false, "rationale": "This describes ittihad, which Sufis explicitly *reject*. They state, 'the creature remains the creature,' ensuring distinctness."}, {"text": "While achieving intimacy, the creature always remains distinct from the Creator.", "isCorrect": true, "rationale": "The text clarifies that the Sufi quest for nearness 'is not ittihad (union in the sense of identity -- the soul becoming God); the creature remains the creature.' This maintains God's unique transcendence even in intimacy."}, {"text": "Ittihad refers to intellectual understanding, while proximity is emotional connection.", "isCorrect": false, "rationale": "The text defines ittihad as 'union in the sense of identity' and proximity as 'a kind of knowing that goes beyond mere intellectual assent,' not simply emotional connection versus intellectual understanding."}], "id": "q07"}, {"question": "The excerpt from Surah 57:3, \"He is the first and the last; the Seen and the Hidden,\" is presented as a stunning expression of:", "options": [{"text": "The linear progression of divine revelation through history.", "isCorrect": false, "rationale": "These specific names ('First and Last,' 'Seen and Hidden') speak to God's eternal nature and His presence/absence in perception, not a historical timeline of revelation."}, {"text": "The absolute certainty of God's final judgment and creation.", "isCorrect": false, "rationale": "While God is involved in creation and judgment, these particular attributes specifically address the dual nature of God's being rather than those events."}, {"text": "The simultaneous nature of God's transcendence (\"Hidden\") and immanence (\"Seen\").", "isCorrect": true, "rationale": "The text explicitly states these 'four names that together hold both extremes of the transcendence-immanence spectrum,' with 'Hidden' referring to unknowable transcendence and 'Seen' (or Outward) to His manifest presence."}, {"text": "The historical events of creation and the eventual return to God.", "isCorrect": false, "rationale": "The terms 'First and Last' do imply eternity, but 'Seen and Hidden' refer more directly to His manifest and unmanifest presence, encapsulating the transcendence-immanence duality rather than just historical events."}], "id": "q08"}, {"question": "The practice of using misbaha (prayer beads) to recite the ninety-nine Beautiful Names of Allah, as described in 'DID YOU KNOW?', exemplifies how this tradition:", "options": [{"text": "Exclusively focuses on God's transcendence by listing His majestic attributes.", "isCorrect": false, "rationale": "The text explicitly states it 'bridges the transcendent... and the immanent,' meaning it's not exclusive to transcendence."}, {"text": "Serves as a purely intellectual exercise to memorize divine characteristics.", "isCorrect": false, "rationale": "The 'DID YOU KNOW?' section mentions 'recite the names in meditation,' indicating it's more than a purely intellectual exercise; it's a spiritual practice."}, {"text": "Bridges the concepts of God's transcendence and immanence through a tangible, meditative practice.", "isCorrect": true, "rationale": "The text states the practice 'bridges the transcendent (the names point beyond any human image of God) and the immanent (the names are something you can hold in your hands and repeat with your lips),' making it a tangible link."}, {"text": "Is primarily intended to secure entry into Paradise by fulfilling a religious obligation.", "isCorrect": false, "rationale": "While the 'Did You Know?' notes that memorizing them 'will enter Paradise,' the description of the *practice* with misbaha highlights its role in bridging theological concepts, not just securing reward."}], "id": "q09"}, {"question": "Based on the entire section, which statement best summarizes the core theological challenge and solution presented in Islam regarding God's nature?", "options": [{"text": "The challenge of reconciling God's singular existence with the diverse manifestations of creation is solved by emphasizing human intellectual limitations.", "isCorrect": false, "rationale": "While human limitations are implicitly recognized, the text focuses on how God Himself embodies both transcendence and immanence, not just that humans can't fully grasp it."}, {"text": "The challenge of understanding God as both utterly unique and intimately present is addressed by holding these seemingly opposite truths in constant dynamic tension.", "isCorrect": true, "rationale": "The entire section explores this 'tension' between 'radical transcendence' (unique, unknowable God) and 'God's nearness' (immanence), describing how Islamic theology 'held together in a single breath' these aspects, with Sufism pushing the experiential side."}, {"text": "The challenge of knowing God is overcome by abandoning rational inquiry in favor of purely mystical experience.", "isCorrect": false, "rationale": "Sufism is a specific strand, not the universal solution, and Islamic theology (as described with 'theology in miniature' of names) involves intellectual understanding as well as spiritual practice."}, {"text": "The challenge of defining God is resolved by presenting Allah as a benevolent ruler who governs the universe according to moral laws.", "isCorrect": false, "rationale": "This describes some of God's attributes but misses the core theological tension and solution related to His absolute uniqueness and simultaneous nearness, which is the main theme of the section."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
